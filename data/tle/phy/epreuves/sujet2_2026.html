<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Terminale",
  "sequence": "Évaluation séquentielle n°2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des Ressources (Ondes mécaniques progressives)",
      "points": "6 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🌊 Situation 1 : Onde sur une corde</h2><p style='margin-bottom: 1rem;'>Pour préparer un spectacle de son et lumière, un technicien utilise une corde tendue de longueur <span class='math'>\\( L = 2,0\\ \\text{m} \\)</span> et de masse linéique <span class='math'>\\( \\mu = 5,0\\times10^{-3}\\ \\text{kg/m} \\)</span>. Il provoque une perturbation à une extrémité.</p><p style='margin-bottom: 1rem;'>La célérité des ondes sur cette corde est donnée par la relation :</p><div class='math-block' style='background-color: white; padding: 0.75rem; border-radius: 0.5rem; margin: 0.75rem 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>$$ v = \\sqrt{\\frac{T}{\\mu}} $$</div></div><p style='margin-bottom: 1rem;'>où <span class='math'>\\( T \\)</span> est la tension de la corde (en newtons).</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Déterminer la dimension de la célérité <span class='math'>\\( v \\)</span> à partir de l'expression ci-dessus. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>La tension <span class='math'>\\( T \\)</span> est une force : <span class='math'>\\( [T] = M \\cdot L \\cdot T^{-2} \\)</span>.</p><p>La masse linéique <span class='math'>\\( \\mu \\)</span> est une masse par unité de longueur : <span class='math'>\\( [\\mu] = M \\cdot L^{-1} \\)</span>.</p><p>Le rapport <span class='math'>\\( \\dfrac{T}{\\mu} \\)</span> a pour dimension :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\left[ \\dfrac{T}{\\mu} \\right] = \\dfrac{M \\cdot L \\cdot T^{-2}}{M \\cdot L^{-1}} = L^2 \\cdot T^{-2} $$</div></div><p>La célérité <span class='math'>\\( v \\)</span> est donc de dimension :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ [v] = L \\cdot T^{-1} $$</div></div><p>La dimension est bien celle d'une vitesse (<span class='math'>\\( \\text{m} \\cdot \\text{s}^{-1} \\)</span>).</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Le technicien crée une onde de fréquence <span class='math'>\\( f = 25\\ \\text{Hz} \\)</span> et mesure une longueur d'onde <span class='math'>\\( \\lambda = 0,80\\ \\text{m} \\)</span>. Calculer la célérité de l'onde. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>La relation entre la célérité, la fréquence et la longueur d'onde est :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ v = \\lambda \\cdot f $$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ v = 0,80 \\times 25 = 20\\ \\text{m/s} $$</div></div><p>La célérité de l'onde est de <strong>20 m/s</strong>.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> En déduire la tension <span class='math'>\\( T \\)</span> de la corde. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>D'après la relation <span class='math'>\\( v = \\sqrt{T/\\mu} \\)</span>, on a :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ T = \\mu \\cdot v^2 $$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ T = 5,0\\times10^{-3} \\times 20^2 = 5,0\\times10^{-3} \\times 400 = 2,0\\ \\text{N} $$</div></div><p>La tension de la corde est de <strong>2,0 N</strong>.</p></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Superposition d'ondes)",
      "points": "6 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🌊 Situation 2 : Interférences</h2><p style='margin-bottom: 1rem;'>Dans le cadre d'un TPE sur les ondes, deux élèves réalisent une expérience d'interférences à la surface de l'eau. Ils utilisent deux sources ponctuelles <span class='math'>\\( S_1 \\)</span> et <span class='math'>\\( S_2 \\)</span> distantes de <span class='math'>\\( a = 4,0\\ \\text{cm} \\)</span>, qui vibrent en phase à la fréquence <span class='math'>\\( f = 20\\ \\text{Hz} \\)</span>. La célérité des ondes à la surface de l'eau est <span class='math'>\\( v = 0,50\\ \\text{m/s} \\)</span>.</p><p style='margin-bottom: 1rem;'>Un point <span class='math'>\\( M \\)</span> est situé à une distance <span class='math'>\\( d_1 = S_1M = 12,5\\ \\text{cm} \\)</span> de <span class='math'>\\( S_1 \\)</span> et <span class='math'>\\( d_2 = S_2M = 13,3\\ \\text{cm} \\)</span> de <span class='math'>\\( S_2 \\)</span>.</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Calculer la longueur d'onde <span class='math'>\\( \\lambda \\)</span> des ondes à la surface de l'eau. <span style='font-weight: 600; color: #2b6cb0;'>(1,5 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>La relation <span class='math'>\\( v = \\lambda \\cdot f \\)</span> donne :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\lambda = \\frac{v}{f} = \\frac{0,50}{20} = 0,025\\ \\text{m} = 2,5\\ \\text{cm} $$</div></div><p>La longueur d'onde est de <strong>2,5 cm</strong>.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Déterminer la différence de marche <span class='math'>\\( \\delta = d_2 - d_1 \\)</span> au point M. <span style='font-weight: 600; color: #2b6cb0;'>(1 pt)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\delta = d_2 - d_1 = 13,3 - 12,5 = 0,8\\ \\text{cm} $$</div></div><p>La différence de marche est de <strong>0,8 cm</strong>.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Le point M est-il un point où les interférences sont constructives ou destructives ? Justifier. <span style='font-weight: 600; color: #2b6cb0;'>(1,5 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>Pour des sources en phase, la condition d'interférences constructives est :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\delta = k \\cdot \\lambda \\quad \\text{avec } k \\in \\mathbb{Z} $$</div></div><p>On calcule le rapport <span class='math'>\\( \\delta / \\lambda \\)</span> :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\frac{\\delta}{\\lambda} = \\frac{0,8}{2,5} = 0,32 $$</div></div><p>La différence de marche n'est pas un multiple entier de la longueur d'onde. Le point M n'est donc <strong>pas en interférence constructive</strong>. Il n'est pas non plus en interférence destructive (car <span class='math'>\\( \\delta / \\lambda \\)</span> n'est pas un demi-entier).</p><p>L'amplitude résultante est intermédiaire entre celle d'un ventre et d'un nœud.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>4)</strong> Si l'on déplace le point M, quelle condition doit vérifier la différence de marche pour observer un ventre d'amplitude maximale ? <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>Pour observer un ventre d'amplitude maximale (interférences constructives) avec deux sources en phase, la différence de marche doit vérifier :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\delta = k \\cdot \\lambda \\quad \\text{où } k \\in \\mathbb{Z} $$</div></div><p>C'est-à-dire :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ d_2 - d_1 = k \\cdot 2,5\\ \\text{cm} $$</div></div><p>Les points d'interférences constructives sont donc situés sur des hyperboles de foyers <span class='math'>\\( S_1 \\)</span> et <span class='math'>\\( S_2 \\)</span>.</p><p>Les nœuds d'amplitude nulle (interférences destructives) correspondent à :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\delta = (2k+1) \\cdot \\frac{\\lambda}{2} $$</div></div></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Phénomène de diffraction)",
      "points": "8 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🌊 Situation 3 : Diffraction d'une onde</h2><p style='margin-bottom: 1rem;'>On réalise une expérience de diffraction d'ondes à la surface de l'eau dans une cuve à ondes. Une source ponctuelle produit des ondes de fréquence <span class='math'>\\( f = 50\\ \\text{Hz} \\)</span> et de célérité <span class='math'>\\( v = 0,25\\ \\text{m/s} \\)</span>.</p><p style='margin-bottom: 1rem;'>Ces ondes rencontrent une fente de largeur <span class='math'>\\( a = 1,0\\ \\text{cm} \\)</span>.</p><div style='background-color: #ebf8ff; padding: 1rem; border-radius: 0.5rem; border-left: 4px solid #3182ce; margin-bottom: 1rem;'><p style='margin: 0; font-weight: 500; color: #2c5282;'>📌 L'angle de diffraction <span class='math'>\\( \\theta \\)</span> est donné par :</p><div class='math-block' style='background-color: white; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1.1rem;'>$$ \\sin \\theta = \\frac{\\lambda}{a} $$</div></div></div><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Calculer la longueur d'onde <span class='math'>\\( \\lambda \\)</span> de l'onde. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\lambda = \\frac{v}{f} = \\frac{0,25}{50} = 5,0\\times10^{-3}\\ \\text{m} = 0,50\\ \\text{cm} $$</div></div></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Calculer l'angle de diffraction <span class='math'>\\( \\theta \\)</span>. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\sin \\theta = \\frac{\\lambda}{a} = \\frac{0,50}{1,0} = 0,50 $$</div></div><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\theta = \\arcsin(0,50) = 30^\\circ $$</div></div></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Si la largeur de la fente est divisée par 2, quel sera le nouvel angle de diffraction ? Justifier. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>La relation <span class='math'>\\( \\sin \\theta = \\lambda / a \\)</span> montre que l'angle est inversement proportionnel à la largeur de la fente.</p><p>Si <span class='math'>\\( a' = a/2 = 0,5\\ \\text{cm} \\)</span>, alors :</p><div class='math-block' style='background-color: #f7fafc; padding: 0.5rem; border-radius: 0.5rem; margin: 0.5rem 0; text-align: center;'><div class='math' style='font-size: 1rem;'>$$ \\sin \\theta' = \\frac{\\lambda}{a'} = \\frac{0,50}{0,5} = 1,00 $$</div></div><p>On obtient <span class='math'>\\( \\theta' = 90^\\circ \\)</span>.</p><p>Le phénomène de diffraction est donc d'autant plus marqué que la fente est étroite.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>4)</strong> Pourquoi le phénomène de diffraction est-il plus facilement observable pour des ondes de grande longueur d'onde ? <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>La diffraction est significative lorsque la longueur d'onde est du même ordre de grandeur que la taille de l'obstacle (ou de l'ouverture).</p><p>D'après la relation <span class='math'>\\( \\sin \\theta = \\lambda / a \\)</span> :</p><ul style='list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem;'><li>Si <span class='math'>\\( \\lambda \\)</span> est grande par rapport à <span class='math'>\\( a \\)</span>, <span class='math'>\\( \\theta \\)</span> est grand : la diffraction est importante.</li><li>Si <span class='math'>\\( \\lambda \\)</span> est petite par rapport à <span class='math'>\\( a \\)</span>, <span class='math'>\\( \\theta \\)</span> est petit : la diffraction est négligeable.</li></ul><p>Les ondes de plus grande longueur d'onde (comme les ondes radio) diffractent donc plus facilement que les ondes de petite longueur d'onde (comme la lumière visible).</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
