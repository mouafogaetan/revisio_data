<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Terminale",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des connaissances",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p>Réponds aux questions suivantes par des réponses courtes et précises.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. a)</strong> Distingue une erreur systématique d'une erreur aléatoire en donnant un exemple pour chacune. (1 pt)</p>",
          "reponse": "<p><strong>Erreur systématique :</strong> Biais constant qui affecte toutes les mesures dans le même sens (exemple : règle graduée mal étalonnée).</p><p><strong>Erreur aléatoire :</strong> Fluctuation due à des causes imprévisibles (exemple : variation de température lors de la mesure).</p>"
        },
        {
          "question": "<p><strong>1. b)</strong> Une mesure est donnée par $x = 5,00 \\pm 0,02$ m. Calcule l'incertitude relative. (1 pt)</p>",
          "reponse": "<p>$\\dfrac{\\Delta x}{x} = \\dfrac{0,02}{5,00} = 0,004 = 0,4\\%$.</p>"
        },
        {
          "question": "<p><strong>1. c)</strong> Détermine la dimension de la force $F = m \\times a$ en utilisant les unités fondamentales du SI. (1 pt)</p>",
          "reponse": "<p>$[F] = M \\times L \\times T^{-2}$ (kg.m.s⁻²).</p>"
        },
        {
          "question": "<p><strong>1. d)</strong> Vérifie l'homogénéité de l'équation $E = \\dfrac{1}{2} m v^2$ où $E$ est l'énergie, $m$ la masse et $v$ la vitesse. (1 pt)</p>",
          "reponse": "<p>$[E] = M \\times L^2 \\times T^{-2}$ (Joule).</p><p>$\\dfrac{1}{2} [m][v]^2 = M \\times (L \\times T^{-1})^2 = M \\times L^2 \\times T^{-2}$.</p><p>L'équation est homogène.</p>"
        }
      ]
    },
    {
      "titre": "Application 1 : Interaction gravitationnelle",
      "points": "5 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Données :</strong> On considère deux planètes de masses $m_1 = 6 \\times 10^{24}$ kg et $m_2 = 4 \\times 10^{23}$ kg. La distance qui les sépare est $d = 2 \\times 10^8$ m. $G = 6,67 \\times 10^{-11}$ N.m².kg⁻².</p></div>",
      "questions": [
        {
          "question": "<p><strong>2. a)</strong> Énonce la loi de l'attraction universelle de Newton. (1 pt)</p>",
          "reponse": "<p>Deux corps ponctuels de masses $m_1$ et $m_2$ séparés par une distance $d$ s'attirent avec une force $F = G \\dfrac{m_1 m_2}{d^2}$ dirigée selon la droite qui les joint.</p>"
        },
        {
          "question": "<p><strong>2. b)</strong> Calcule la force d'interaction gravitationnelle entre ces deux planètes. (1 pt)</p>",
          "reponse": "<p>$F = 6,67 \\times 10^{-11} \\times \\dfrac{6 \\times 10^{24} \\times 4 \\times 10^{23}}{(2 \\times 10^8)^2}$</p><p>$F = 6,67 \\times 10^{-11} \\times \\dfrac{24 \\times 10^{47}}{4 \\times 10^{16}}$</p><p>$F = 6,67 \\times 10^{-11} \\times 6 \\times 10^{31} = 4,002 \\times 10^{21}$ N.</p>"
        },
        {
          "question": "<p><strong>2. c)</strong> Définis le champ de gravitation $\\vec{g}$ créé par une masse ponctuelle $M$ à une distance $r$. (1 pt)</p>",
          "reponse": "<p>Le champ de gravitation est une grandeur vectorielle définie par $\\vec{g} = \\dfrac{\\vec{F}}{m}$, où $\\vec{F}$ est la force subie par une masse test $m$. Pour une masse ponctuelle $M$, $\\vec{g}(r) = -G \\dfrac{M}{r^2} \\vec{u}_r$.</p>"
        },
        {
          "question": "<p><strong>2. d)</strong> Calcule l'intensité du champ de gravitation créé par la première planète à la position de la seconde. (1 pt)</p>",
          "reponse": "<p>$g = G \\dfrac{m_1}{d^2} = 6,67 \\times 10^{-11} \\times \\dfrac{6 \\times 10^{24}}{(2 \\times 10^8)^2}$</p><p>$g = 6,67 \\times 10^{-11} \\times \\dfrac{6 \\times 10^{24}}{4 \\times 10^{16}}$</p><p>$g = 6,67 \\times 10^{-11} \\times 1,5 \\times 10^8 = 1,0005 \\times 10^{-2}$ N/kg.</p>"
        },
        {
          "question": "<p><strong>2. e)</strong> Que vaut le poids de la seconde planète dans ce champ ? (1 pt)</p>",
          "reponse": "<p>$P = m_2 \\times g = 4 \\times 10^{23} \\times 10^{-2} = 4 \\times 10^{21}$ N.</p><p>On retrouve bien $F$.</p>"
        }
      ]
    },
    {
      "titre": "Application 2 : Interaction électrique",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Données :</strong> Deux charges ponctuelles $q_1 = 2 \\times 10^{-6}$ C et $q_2 = -3 \\times 10^{-6}$ C sont placées à une distance $d = 0,2$ m l'une de l'autre dans le vide. $k = 9 \\times 10^9$ N.m².C⁻².</p></div>",
      "questions": [
        {
          "question": "<p><strong>3. a)</strong> Énonce la loi de Coulomb. (1 pt)</p>",
          "reponse": "<p>Deux charges ponctuelles $q_1$ et $q_2$ séparées par une distance $d$ exercent l'une sur l'autre une force $F = k \\dfrac{|q_1 q_2|}{d^2}$ dirigée selon la droite qui les joint.</p>"
        },
        {
          "question": "<p><strong>3. b)</strong> Calcule la force électrostatique exercée par $q_1$ sur $q_2$. (1 pt)</p>",
          "reponse": "<p>$F = 9 \\times 10^9 \\times \\dfrac{|2 \\times 10^{-6} \\times (-3 \\times 10^{-6})|}{(0,2)^2}$</p><p>$F = 9 \\times 10^9 \\times \\dfrac{6 \\times 10^{-12}}{0,04}$</p><p>$F = 9 \\times 10^9 \\times 1,5 \\times 10^{-10} = 1,35$ N.</p>"
        },
        {
          "question": "<p><strong>3. c)</strong> La force est-elle attractive ou répulsive ? Justifie. (1 pt)</p>",
          "reponse": "<p>Les charges sont de signes opposés (positive et négative). La force est donc <strong>attractive</strong>.</p>"
        },
        {
          "question": "<p><strong>3. d)</strong> Définis le champ électrostatique et donne son expression créé par une charge ponctuelle. (1 pt)</p>",
          "reponse": "<p>Le champ électrostatique $\\vec{E}$ est une grandeur vectorielle définie par $\\vec{E} = \\dfrac{\\vec{F}}{q}$. Pour une charge ponctuelle $q$, $\\vec{E}(r) = k \\dfrac{q}{r^2} \\vec{u}_r$.</p>"
        }
      ]
    },
    {
      "titre": "Problème : Interaction magnétique",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p>Une particule de charge $q = 1,6 \\times 10^{-19}$ C (proton) pénètre dans une région où règne un champ magnétique uniforme $\\vec{B}$ de norme $B = 0,5$ T. Sa vitesse initiale est $v = 3 \\times 10^6$ m/s et elle est perpendiculaire à $\\vec{B}$.</p></div>",
      "questions": [
        {
          "question": "<p><strong>4. a)</strong> Donne l'expression de la force de Lorentz subie par la particule. (1 pt)</p>",
          "reponse": "<p>$\\vec{F} = q \\vec{v} \\wedge \\vec{B}$</p>"
        },
        {
          "question": "<p><strong>4. b)</strong> Calcule la norme de la force magnétique. (1 pt)</p>",
          "reponse": "<p>$F = q v B \\sin\\theta$ avec $\\theta = 90°$ car $\\vec{v}$ et $\\vec{B}$ sont perpendiculaires.</p><p>$F = 1,6 \\times 10^{-19} \\times 3 \\times 10^6 \\times 0,5 \\times 1 = 2,4 \\times 10^{-13}$ N.</p>"
        },
        {
          "question": "<p><strong>4. c)</strong> Quelle est la nature du mouvement de la particule ? Justifie. (1 pt)</p>",
          "reponse": "<p>La force de Lorentz est toujours perpendiculaire à la vitesse, donc elle ne travaille pas. La norme de la vitesse reste constante. Le mouvement est <strong>circulaire uniforme</strong> dans le plan perpendiculaire à $\\vec{B}$.</p>"
        },
        {
          "question": "<p><strong>4. d)</strong> Calcule le rayon de la trajectoire de la particule (masse du proton $m_p = 1,67 \\times 10^{-27}$ kg). (1 pt)</p>",
          "reponse": "<p>Le rayon de courbure est donné par $R = \\dfrac{m v}{q B}$.</p><p>$R = \\dfrac{1,67 \\times 10^{-27} \\times 3 \\times 10^6}{1,6 \\times 10^{-19} \\times 0,5}$</p><p>$R = \\dfrac{5,01 \\times 10^{-21}}{8 \\times 10^{-20}} \\approx 6,26 \\times 10^{-2}$ m.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
