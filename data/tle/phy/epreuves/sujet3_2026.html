<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Physique",
 "classe": "Terminale",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Pendule élastique et conservation de l'énergie (6 points)",
     "points": "6 pts",
     "enonce": "<div style='font-size:1rem; line-height:1.8;'>Un pendule élastique est constitué d'un solide de masse <span style='font-weight:bold;'>m = 200 g</span> accroché à l'extrémité d'un ressort de constante de raideur <span style='font-weight:bold;'>k = 40 N/m</span>. Le système est abandonné sans vitesse initiale à partir d'une position où le ressort est allongé de <span style='font-weight:bold;'>A = 5 cm</span> par rapport à sa position d'équilibre. On néglige les frottements.</div><div style='background:#f4f6f7; padding:12px; border-radius:8px; margin-top:10px;'><p style='margin:0;'><strong>Donnée :</strong> <span style='font-style:italic;'>L'énergie potentielle élastique est \( E_{pe} = \\frac{1}{2} k x^2 \)</span>, où \( x \) est l'allongement du ressort.</p></div>",
     "questions":[
       {
         "question": "<strong>1.1)</strong> Établir l'équation différentielle du mouvement du solide en l'absence de frottements.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Bilan des forces :</strong> Le solide est soumis à son poids \( \\vec{P} \), à la réaction du support \( \\vec{R} \) (sur un plan horizontal) et à la force de rappel \( \\vec{F} = -k \\vec{x} \).</li><li><strong>Application du PFD :</strong> Sur l'axe (Ox), on a : \( -k x = m \\ddot{x} \).</li><li><strong>Équation différentielle :</strong> \( \\ddot{x} + \\dfrac{k}{m} x = 0 \\).</li><li>Avec \( \\omega_0^2 = \\dfrac{k}{m} \\), on obtient : <div class='math-block' style='text-align:center; padding:10px 0;'><div class='math'>$$ \\ddot{x} + \\omega_0^2 x = 0 $$</div></div></li></ul>"
       },
       {
         "question": "<strong>1.2)</strong> Donner l'expression de la pulsation propre \( \\omega_0 \) et calculer sa valeur numérique.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Pulsation propre :</strong> \( \\omega_0 = \\sqrt{\\dfrac{k}{m}} \).</li><li><strong>Application numérique :</strong> \( m = 200\\,g = 0,2\\,kg \).</li><li>\( \\omega_0 = \\sqrt{\\dfrac{40}{0,2}} = \\sqrt{200} = 14,14\\,rad/s \\).</li></ul>"
       },
       {
         "question": "<strong>1.3)</strong> Calculer la période propre \( T_0 \) des oscillations.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Période propre :</strong> \( T_0 = \\dfrac{2\\pi}{\\omega_0} \\).</li><li><strong>Application numérique :</strong> \( T_0 = \\dfrac{2\\pi}{14,14} = 0,444\\,s \\).</li></ul>"
       },
       {
         "question": "<strong>1.4)</strong> Établir l'expression de l'énergie mécanique du système et montrer qu'elle se conserve.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Énergie mécanique :</strong> \( E_m = E_c + E_{pe} = \\dfrac{1}{2} m \\dot{x}^2 + \\dfrac{1}{2} k x^2 \\).</li><li><strong>Démonstration de la conservation :</strong> On dérive \( E_m \) par rapport au temps : \( \\dfrac{dE_m}{dt} = m \\dot{x}\\ddot{x} + k x \\dot{x} = \\dot{x} (m\\ddot{x} + kx) = 0 \) d'après l'équation différentielle.</li><li><strong>Conclusion :</strong> L'énergie mécanique est constante : \( E_m = \\dfrac{1}{2} k A^2 \\).</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Pendule simple et amortissement (7 points)",
     "points": "7 pts",
     "enonce": "<div style='font-size:1rem; line-height:1.8;'>Un pendule simple est constitué d'une petite bille de masse <span style='font-weight:bold;'>m = 100 g</span> suspendue à un fil de longueur <span style='font-weight:bold;'>L = 1,0 m</span>. On écarte le pendule d'un angle \( \\theta_0 = 10° \) par rapport à la verticale et on le lâche sans vitesse initiale. Les frottements sont négligés dans un premier temps.</div><div style='background:#f4f6f7; padding:12px; border-radius:8px; margin-top:10px;'><p style='margin:0;'><strong>Donnée :</strong> \( g = 10\\,m/s^2 \).</p></div>",
     "questions":[
       {
         "question": "<strong>2.1)</strong> Établir l'équation différentielle du mouvement du pendule pour les petites oscillations.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Bilan des forces :</strong> Poids \( \\vec{P} \) et tension du fil \( \\vec{T} \).</li><li><strong>Projection sur la tangente :</strong> \( -mg\\sin\\theta = mL\\ddot{\\theta} \\).</li><li><strong>Pour les petites oscillations :</strong> \( \\sin\\theta \\approx \\theta \\).</li><li><strong>Équation différentielle :</strong> \( \\ddot{\\theta} + \\dfrac{g}{L} \\theta = 0 \\).</li></ul>"
       },
       {
         "question": "<strong>2.2)</strong> Donner l'expression de la période \( T \) du pendule et calculer sa valeur.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Période :</strong> \( T = 2\\pi \\sqrt{\\dfrac{L}{g}} \\).</li><li><strong>Application numérique :</strong> \( T = 2\\pi \\sqrt{\\dfrac{1,0}{10}} = 2\\pi \\times 0,316 = 1,99\\,s \\approx 2,0\\,s \\).</li></ul>"
       },
       {
         "question": "<strong>2.3)</strong> On suppose maintenant que le pendule est soumis à une force de frottement de type \( \\vec{f} = -\\alpha \\vec{v} \). Écrire la nouvelle équation différentielle. Quel est le nom du régime observé si \( \\alpha \) est faible ?",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Nouvelle équation :</strong> Avec le frottement, la projection sur la tangente donne : \( -mg\\sin\\theta - \\alpha L\\dot{\\theta} = mL\\ddot{\\theta} \).</li><li>Pour les petites oscillations : \( \\ddot{\\theta} + \\dfrac{\\alpha}{m} \\dot{\\theta} + \\dfrac{g}{L} \\theta = 0 \\).</li><li><strong>Régime observé :</strong> Si \( \\alpha \) est faible, on observe un régime <strong>pseudo-périodique</strong> (oscillations amorties).</li></ul>"
       },
       {
         "question": "<strong>2.4)</strong> On observe que l'amplitude des oscillations diminue de moitié après 10 oscillations. Calculer le décrément logarithmique \( \\delta \).",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Définition :</strong> Le décrément logarithmique est \( \\delta = \\ln\\left(\\dfrac{A_n}{A_{n+1}}\\right) \\).</li><li>Après 10 oscillations, \( A_{10} = \\dfrac{A_0}{2} \\), donc \( \\dfrac{A_0}{A_{10}} = 2 \\).</li><li>Le décrément logarithmique moyen est : \( \\delta = \\dfrac{1}{10} \\ln\\left(\\dfrac{A_0}{A_{10}}\\right) = \\dfrac{1}{10} \\ln(2) = 0,0693 \\).</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Résonance mécanique et énergie (7 points)",
     "points": "7 pts",
     "enonce": "<div style='font-size:1rem; line-height:1.8;'>Un oscillateur mécanique est constitué d'un solide de masse \( m = 1,0\\,kg \) attaché à un ressort de raideur \( k = 100\\,N/m \). Un dispositif exerce sur le solide une force excitatrice \( F(t) = F_0 \\cos(\\omega t) \) de valeur maximale \( F_0 = 10\\,N \). On néglige les frottements.</div>",
     "questions":[
       {
         "question": "<strong>3.1)</strong> Calculer la pulsation propre \( \\omega_0 \) de l'oscillateur.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Pulsation propre :</strong> \( \\omega_0 = \\sqrt{\\dfrac{k}{m}} = \\sqrt{\\dfrac{100}{1,0}} = 10\\,rad/s \\).</li></ul>"
       },
       {
         "question": "<strong>3.2)</strong> À quelle condition observe-t-on la résonance ? Quelle est alors l'amplitude des oscillations en régime permanent (en supposant l'amortissement nul) ?",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Condition de résonance :</strong> La résonance est observée lorsque la pulsation de l'excitateur est égale à la pulsation propre : \( \\omega = \\omega_0 = 10\\,rad/s \\).</li><li><strong>Amplitude :</strong> En l'absence d'amortissement et à la résonance, l'amplitude des oscillations <strong>tend vers l'infini</strong> (elle est théoriquement infinie). En pratique, l'amplitude est limitée par les frottements.</li></ul>"
       },
       {
         "question": "<strong>3.3)</strong> On introduit maintenant un amortissement caractérisé par le coefficient \( \\lambda = 1,0\\,s^{-1} \). L'équation différentielle devient \( \\ddot{x} + 2\\lambda \\dot{x} + \\omega_0^2 x = \\dfrac{F_0}{m} \\cos(\\omega t) \\).<br> La solution en régime permanent est de la forme \( x(t) = A(\\omega) \\cos(\\omega t + \\varphi) \), avec : <div class='math-block' style='text-align:center; padding:5px 0;'><div class='math'>$$ A(\\omega) = \\dfrac{F_0/m}{\\sqrt{(\\omega_0^2 - \\omega^2)^2 + 4\\lambda^2 \\omega^2}} $$</div></div><br> Calculer l'amplitude \( A \) pour \( \\omega = \\omega_0 \).",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>À la résonance :</strong> \( \\omega = \\omega_0 = 10\\,rad/s \\), donc \( \\omega_0^2 - \\omega^2 = 0 \\).</li><li><strong>Amplitude :</strong> \( A = \\dfrac{F_0/m}{\\sqrt{0 + 4\\lambda^2 \\omega_0^2}} = \\dfrac{F_0/m}{2\\lambda \\omega_0} \\).</li><li><strong>Application numérique :</strong> \( A = \\dfrac{10/1}{2 \\times 1,0 \\times 10} = \\dfrac{10}{20} = 0,5\\,m \\).</li></ul>"
       },
       {
         "question": "<strong>3.4)</strong> Comparer qualitativement les amplitudes obtenues en l'absence et en présence d'amortissement à la résonance. Conclure.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Sans amortissement :</strong> L'amplitude tend vers l'infini (divergence).</li><li><strong>Avec amortissement :</strong> L'amplitude est finie (\( A = 0,5\\,m \) dans cet exemple).</li><li><strong>Conclusion :</strong> L'amortissement limite l'amplitude des oscillations à la résonance. Plus l'amortissement est faible, plus le pic de résonance est élevé et étroit.</li></ul>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
