<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Terminale",
  "sequence": "Séquence 5 : Ondes, optique et physique nucléaire",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Ondes mécaniques progressives",
      "points": "4 pts",
      "enonce": "<p>Une onde mécanique progressive se propage le long d'une corde tendue avec une célérité \\( c = 12 \\, \\text{m.s}^{-1} \\). La source génère une onde sinusoïdale de fréquence \\( f = 24 \\, \\text{Hz} \\).</p><div class='math-block'><div class='math'>$$ c = \\lambda \\cdot f $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) a) Définir une onde mécanique progressive. <br>b) Distinguer une onde transversale d'une onde longitudinale et donner un exemple pour chaque type.</p>",
          "reponse": "<p>a) Une <strong>onde mécanique progressive</strong> est une perturbation qui se propage dans un milieu matériel sans transport de matière, mais avec transport d'énergie.</p><p>b) Une <strong>onde transversale</strong> est une onde pour laquelle la direction de la perturbation est perpendiculaire à la direction de propagation (exemple : onde sur une corde). Une <strong>onde longitudinale</strong> est une onde pour laquelle la direction de la perturbation est parallèle à la direction de propagation (exemple : onde sonore dans l'air).</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1 pt) Calculer la longueur d'onde \\( \\lambda \\) de cette onde.</p>",
          "reponse": "<p>\\( \\lambda = \\dfrac{c}{f} = \\dfrac{12}{24} = 0,50 \\, \\text{m} \\).</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (1 pt) Déterminer la période \\( T \\) de l'onde.</p>",
          "reponse": "<p>\\( T = \\dfrac{1}{f} = \\dfrac{1}{24} \\approx 4,17 \\times 10^{-2} \\, \\text{s} \\).</p>"
        },
        {
          "question": "<p><strong>1.4</strong> (1 pt) Analyser l'effet d'une augmentation de la tension de la corde sur la célérité de l'onde.</p>",
          "reponse": "<p>La célérité d'une onde sur une corde est donnée par \\( c = \\sqrt{\\dfrac{T}{\\mu}} \\), où \\( T \\) est la tension de la corde et \\( \\mu \\) sa masse linéique. Si la tension augmente, la célérité augmente également. La longueur d'onde \\( \\lambda = \\dfrac{c}{f} \\) augmentera donc aussi si la fréquence reste constante.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Interférences lumineuses",
      "points": "6 pts",
      "enonce": "<p>On réalise une expérience d'interférences à l'aide du dispositif des trous d'Young. Les deux trous \\( S_1 \\) et \\( S_2 \\) sont distants de \\( a = 0,30 \\, \\text{mm} \\). La source lumineuse utilisée est un laser de longueur d'onde \\( \\lambda = 632,8 \\, \\text{nm} \\). Un écran est placé à une distance \\( D = 3,0 \\, \\text{m} \\) des trous.</p><div class='math-block'><div class='math'>$$ \\delta = \\dfrac{a \\cdot x}{D} $$</div></div><div class='math-block'><div class='math'>$$ i = \\dfrac{\\lambda \\cdot D}{a} $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) Expliquer le phénomène d'interférences lumineuses et préciser les conditions nécessaires pour l'observer.</p>",
          "reponse": "<p>Les interférences lumineuses résultent de la superposition de deux ondes lumineuses cohérentes (même fréquence et différence de phase constante). Les sources doivent être <strong>cohérentes</strong> (même longueur d'onde et en phase).</p><p>La différence de marche \\( \\delta \\) détermine le type d'interférence :</p><ul><li>Constructive (franges brillantes) si \\( \\delta = k\\lambda \\)</li><li>Destructive (franges sombres) si \\( \\delta = (2k+1)\\dfrac{\\lambda}{2} \\)</li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1,5 pts) Calculer l'interfrange \\( i \\) de la figure d'interférences.</p>",
          "reponse": "<p>\\( \\lambda = 632,8 \\, \\text{nm} = 6,328 \\times 10^{-7} \\, \\text{m} \\)</p><p>\\( a = 0,30 \\, \\text{mm} = 3,00 \\times 10^{-4} \\, \\text{m} \\)</p><p>\\( i = \\dfrac{\\lambda \\cdot D}{a} = \\dfrac{6,328 \\times 10^{-7} \\times 3,0}{3,00 \\times 10^{-4}} = 6,33 \\times 10^{-3} \\, \\text{m} = 6,33 \\, \\text{mm} \\)</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (1,5 pts) Déterminer la nature de l'interférence (constructive ou destructive) au point \\( M \\) d'abscisse \\( x = 4,75 \\, \\text{mm} \\) sur l'écran.</p>",
          "reponse": "<p>\\( \\delta = \\dfrac{a \\cdot x}{D} = \\dfrac{3,00 \\times 10^{-4} \\times 4,75 \\times 10^{-3}}{3,0} = 4,75 \\times 10^{-7} \\, \\text{m} \\)</p><p>\\( \\dfrac{\\delta}{\\lambda} = \\dfrac{4,75 \\times 10^{-7}}{6,328 \\times 10^{-7}} \\approx 0,75 \\)</p><p>Donc \\( \\delta = 0,75\\lambda = \\dfrac{3\\lambda}{4} \\). Ce n'est ni un multiple entier de \\( \\lambda \\) ni un multiple impair de \\( \\lambda/2 \\).</p><p>Le point \\( M \\) est donc dans une zone intermédiaire, ni totalement brillant ni totalement sombre (intensité lumineuse moyenne).</p>"
        },
        {
          "question": "<p><strong>2.4</strong> (2 pts) a) Prévoir l'effet sur la figure d'interférences si on augmente la distance \\( D \\) entre les trous et l'écran. <br>b) Prévoir l'effet si on utilise une lumière de longueur d'onde plus grande.</p>",
          "reponse": "<p>a) D'après la formule \\( i = \\dfrac{\\lambda D}{a} \\), l'interfrange est proportionnel à \\( D \\). Si \\( D \\) augmente, les franges s'<strong>écartent</strong> (interfrange plus grand).</p><p>b) D'après la même formule, l'interfrange est proportionnel à \\( \\lambda \\). Si la longueur d'onde augmente, les franges s'<strong>écartent</strong> également.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Effet photoélectrique",
      "points": "5 pts",
      "enonce": "<p>On éclaire une cathode en césium (\\( \\Phi = 2,14 \\, \\text{eV} \\)) avec une lumière monochromatique de longueur d'onde \\( \\lambda = 400 \\, \\text{nm} \\).</p><p>Données : \\( h = 6,63 \\times 10^{-34} \\, \\text{J.s} \\) ; \\( c = 3,00 \\times 10^8 \\, \\text{m.s}^{-1} \\) ; \\( 1 \\, \\text{eV} = 1,60 \\times 10^{-19} \\, \\text{J} \\).</p><div class='math-block'><div class='math'>$$ E = h\\nu = \\dfrac{hc}{\\lambda} $$</div></div><div class='math-block'><div class='math'>$$ E_c^{max} = E - \\Phi $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) Décrire l'effet photoélectrique et indiquer ce qu'il révèle sur la nature de la lumière.</p>",
          "reponse": "<p>L'<strong>effet photoélectrique</strong> est l'émission d'électrons par un matériau lorsqu'il est éclairé par une lumière de fréquence suffisamment élevée.</p><p>Cet effet révèle la <strong>nature corpusculaire</strong> de la lumière : la lumière est constituée de <strong>photons</strong>, des grains d'énergie \\( E = h\\nu \\). Chaque photon cède son énergie à un électron du matériau.</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (2 pts) a) Calculer l'énergie \\( E \\) d'un photon de cette lumière en joules puis en électron-volts. <br>b) Déterminer l'énergie cinétique maximale \\( E_c^{max} \\) des électrons émis.</p>",
          "reponse": "<p>a) \\( E = \\dfrac{hc}{\\lambda} = \\dfrac{6,63 \\times 10^{-34} \\times 3,00 \\times 10^8}{400 \\times 10^{-9}} = \\dfrac{1,989 \\times 10^{-25}}{4,00 \\times 10^{-7}} = 4,97 \\times 10^{-19} \\, \\text{J} \\)</p><p>En eV : \\( E = \\dfrac{4,97 \\times 10^{-19}}{1,60 \\times 10^{-19}} \\approx 3,10 \\, \\text{eV} \\)</p><p>b) \\( E_c^{max} = E - \\Phi = 3,10 - 2,14 = 0,96 \\, \\text{eV} = 0,96 \\times 1,60 \\times 10^{-19} = 1,54 \\times 10^{-19} \\, \\text{J} \\)</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) Calculer la longueur d'onde seuil \\( \\lambda_0 \\) du césium.</p>",
          "reponse": "<p>La longueur d'onde seuil correspond à \\( \\Phi = \\dfrac{hc}{\\lambda_0} \\).</p><p>\\( \\lambda_0 = \\dfrac{hc}{\\Phi} = \\dfrac{6,63 \\times 10^{-34} \\times 3,00 \\times 10^8}{2,14 \\times 1,60 \\times 10^{-19}} = \\dfrac{1,989 \\times 10^{-25}}{3,424 \\times 10^{-19}} \\approx 5,81 \\times 10^{-7} \\, \\text{m} = 581 \\, \\text{nm} \\)</p>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) Analyser ce qui se passerait si on utilisait une lumière de longueur d'onde \\( \\lambda = 700 \\, \\text{nm} \\). Justifier.</p>",
          "reponse": "<p>Si \\( \\lambda = 700 \\, \\text{nm} \\) :</p><p>\\( E = \\dfrac{hc}{\\lambda} = \\dfrac{6,63 \\times 10^{-34} \\times 3,00 \\times 10^8}{700 \\times 10^{-9}} \\approx 2,84 \\times 10^{-19} \\, \\text{J} \\approx 1,78 \\, \\text{eV} \\)</p><p>Comme \\( E = 1,78 \\, \\text{eV} < \\Phi = 2,14 \\, \\text{eV} \\), l'énergie du photon est insuffisante pour arracher un électron au césium. Il n'y a donc <strong>pas d'effet photoélectrique</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Radioactivité et datation",
      "points": "5 pts",
      "enonce": "<p>Le carbone 14 \\( ^{14}_{6}\\text{C} \\) est un isotope radioactif du carbone utilisé en datation. Sa demi-vie est \\( T_{1/2} = 5 730 \\, \\text{ans} \\).</p><p>Un échantillon de matière organique ancienne contient \\( N_0 = 1,00 \\times 10^{12} \\) noyaux de carbone 14 à l'instant initial.</p><div class='math-block'><div class='math'>$$ N(t) = N_0 \\cdot e^{-\\lambda t} $$</div></div><div class='math-block'><div class='math'>$$ \\lambda = \\dfrac{\\ln 2}{T_{1/2}} $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) a) Définir la radioactivité. <br>b) Donner les trois types de rayonnements radioactifs existants (nature et composition).</p>",
          "reponse": "<p>a) La <strong>radioactivité</strong> est le phénomène par lequel des noyaux atomiques instables se transforment spontanément en émettant des particules et/ou des rayonnements électromagnétiques.</p><p>b) Les trois types de radioactivité sont :</p><ul><li><strong>Radioactivité \\( \\alpha \\)</strong> : émission d'un noyau d'hélium \\( ^4_2\\text{He} \\) (particule \\( \\alpha \\)).</li><li><strong>Radioactivité \\( \\beta^- \\)</strong> : émission d'un électron \\( ^0_{-1}\\text{e} \\).</li><li><strong>Radioactivité \\( \\gamma \\)</strong> : émission d'un rayonnement électromagnétique de haute énergie.</li></ul>"
        },
        {
          "question": "<p><strong>4.2</strong> (1 pt) Calculer la constante radioactive \\( \\lambda \\) du carbone 14.</p>",
          "reponse": "<p>\\( \\lambda = \\dfrac{\\ln 2}{T_{1/2}} = \\dfrac{0,693}{5730} \\approx 1,21 \\times 10^{-4} \\, \\text{an}^{-1} \\)</p>"
        },
        {
          "question": "<p><strong>4.3</strong> (1,5 pts) Calculer le nombre de noyaux de carbone 14 restant après une période \\( t = 11 460 \\, \\text{ans} \\) (soit deux demi-vies).</p>",
          "reponse": "<p>Après \\( n \\) demi-vies, le nombre de noyaux restants est \\( N = N_0 \\times \\left(\\dfrac{1}{2}\\right)^n \\).</p><p>\\( n = \\dfrac{t}{T_{1/2}} = \\dfrac{11460}{5730} = 2 \\)</p><p>\\( N = 1,00 \\times 10^{12} \\times \\left(\\dfrac{1}{2}\\right)^2 = 1,00 \\times 10^{12} \\times \\dfrac{1}{4} = 2,50 \\times 10^{11} \\) noyaux.</p>"
        },
        {
          "question": "<p><strong>4.4</strong> (1,5 pts) Un échantillon ancien ne contient plus que \\( 6,25\\% \\) de sa quantité initiale de carbone 14. Déterminer l'âge de cet échantillon.</p>",
          "reponse": "<p>Si \\( N = 0,0625 \\times N_0 \\), alors \\( \\dfrac{N}{N_0} = 0,0625 = \\left(\\dfrac{1}{2}\\right)^n \\).</p><p>On cherche \\( n \\) tel que \\( \\left(\\dfrac{1}{2}\\right)^n = 0,0625 \\).</p><p>Or \\( 0,0625 = \\dfrac{1}{16} = \\left(\\dfrac{1}{2}\\right)^4 \\). Donc \\( n = 4 \\).</p><p>\\( t = n \\times T_{1/2} = 4 \\times 5730 = 22 920 \\, \\text{ans} \\).</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
