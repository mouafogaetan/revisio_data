<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }

    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50; text-align: center;'>Leçon 47 : Dangers des rayonnements et radioprotection</h3><p style='text-align: center; font-size: 1.1em;'>Classe : Terminale</p><p style='text-align: center;'>Matière : Physique</p><div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0; color: #1a5276;'><strong>Objectifs de la leçon :</strong></p><ul style='color: #1a5276;'><li>Identifier les dangers liés à l'exposition aux rayonnements ionisants</li><li>Décrire les méthodes de radioprotection</li><li>Distinguer irradiation et contamination</li></ul></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons aborder la leçon 47 sur les dangers des rayonnements et la radioprotection. Dans cette leçon, nous apprendrons à identifier les dangers liés à l'exposition aux rayonnements ionisants, à décrire les méthodes de protection et à distinguer deux notions importantes : l'irradiation et la contamination. Cette leçon est très importante car les rayonnements sont utilisés dans de nombreux domaines au Cameroun comme en médecine, dans l'industrie et dans la recherche. Il est donc essentiel de connaître les risques et les moyens de s'en protéger.",
    "note": "Objectifs de la leçon : Identifier les dangers, décrire les méthodes de radioprotection, distinguer irradiation et contamination."
  },
  {
    "titre": "Rayonnements ionisants",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Qu'est-ce qu'un rayonnement ionisant ?</h3><div style='background-color: #fdf2e9; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #6c3a0a;'><strong>Définition :</strong> Un rayonnement est dit <strong>ionisant</strong> lorsqu'il possède suffisamment d'énergie pour arracher un ou plusieurs électrons aux atomes ou molécules qu'il traverse, créant ainsi des <strong>ions</strong>.</p></div><p>Les rayonnements ionisants peuvent être de deux types :</p><ul><li><strong>Rayonnements électromagnétiques :</strong> rayons X, rayons gamma (γ)</li><li><strong>Rayonnements particulaires :</strong> particules alpha (α), bêta (β), neutrons</li></ul><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='color: #1a5276; margin: 0;'><strong>À retenir :</strong> L'ionisation est à l'origine des effets biologiques des rayonnements sur les êtres vivants.</p></div></div>",
    "texteParle": "Commençons par définir ce qu'est un rayonnement ionisant. Un rayonnement est dit ionisant lorsqu'il possède assez d'énergie pour arracher un ou plusieurs électrons aux atomes ou molécules qu'il traverse. Cette ionisation est à l'origine des effets biologiques des rayonnements sur les êtres vivants. Les rayonnements ionisants peuvent être de deux types : les rayonnements électromagnétiques comme les rayons X et les rayons gamma, et les rayonnements particulaires comme les particules alpha, bêta et les neutrons. Chaque type de rayonnement a un pouvoir de pénétration et des effets différents sur l'organisme.",
    "note": "Rayonnement ionisant : rayonnement ayant assez d'énergie pour ioniser la matière."
  },
  {
    "titre": "Types de rayonnements",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Les différents types de rayonnements</h3><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #e74c3c;'><p style='margin: 5px 0;'><strong style='color: #e74c3c;'>Rayonnement alpha (α)</strong></p><ul style='margin: 5px 0;'><li>Noyau d'hélium (2 protons + 2 neutrons)</li><li>Faible pouvoir de pénétration (arrêté par une feuille de papier)</li><li>Très ionisant mais dangereux seulement par ingestion ou inhalation</li></ul></div><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #f39c12;'><p style='margin: 5px 0;'><strong style='color: #f39c12;'>Rayonnement bêta (β)</strong></p><ul style='margin: 5px 0;'><li>Électron ou positron émis par le noyau</li><li>Pouvoir de pénétration moyen (arrêté par une plaque d'aluminium)</li><li>Peut pénétrer la peau mais pas les organes profonds</li></ul></div><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #2980b9;'><p style='margin: 5px 0;'><strong style='color: #2980b9;'>Rayonnement gamma (γ) et rayons X</strong></p><ul style='margin: 5px 0;'><li>Rayonnement électromagnétique de très haute énergie</li><li>Très grand pouvoir de pénétration (nécessite du plomb ou du béton épais)</li><li>Peut traverser tout le corps et causer des dommages profonds</li></ul></div></div>",
    "texteParle": "Il existe plusieurs types de rayonnements ionisants. Le rayonnement alpha est constitué de noyaux d'hélium. Il a un faible pouvoir de pénétration et est arrêté par une simple feuille de papier. Cependant, il est très ionisant et devient dangereux s'il est ingéré ou inhalé. Le rayonnement bêta est constitué d'électrons ou de positrons émis par le noyau. Il a un pouvoir de pénétration moyen et peut être arrêté par une plaque d'aluminium. Il peut pénétrer la peau mais pas les organes profonds. Enfin, les rayonnements gamma et les rayons X sont des rayonnements électromagnétiques de très haute énergie. Ils ont un très grand pouvoir de pénétration et nécessitent du plomb ou du béton épais pour être arrêtés. Ils peuvent traverser tout le corps et causer des dommages profonds.",
    "note": "Alpha (faible pénétration, très ionisant) ; Bêta (pénétration moyenne) ; Gamma/X (grande pénétration)."
  },
  {
    "titre": "Effets biologiques",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Effets biologiques des rayonnements</h3><div style='background-color: #fdedec; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #922b21;'><strong>Les rayonnements ionisants peuvent endommager les cellules vivantes de deux manières :</strong></p></div><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #ebf5fb; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #1a5276;'><strong>Effets déterministes (ou précoces)</strong></p><ul style='color: #1a5276; margin: 5px 0;'><li>Apparaissent au-dessus d'un seuil d'exposition</li><li>La gravité augmente avec la dose</li><li>Exemples : brûlures, nausées, vomissements, stérilité, syndrome d'irradiation aiguë</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #7d6608;'><strong>Effets stochastiques (ou aléatoires)</strong></p><ul style='color: #7d6608; margin: 5px 0;'><li>Pas de seuil d'exposition</li><li>La probabilité augmente avec la dose</li><li>Exemples : cancers, leucémies, mutations génétiques</li></ul></div></div><div style='background-color: #eaf2f8; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='color: #1a5276; margin: 0;'><strong>À retenir :</strong> Les effets peuvent apparaître à court terme (jours à semaines) ou à long terme (années à décennies).</p></div></div>",
    "texteParle": "Les rayonnements ionisants peuvent endommager les cellules vivantes de deux manières principales. Premièrement, les effets déterministes, aussi appelés effets précoces, apparaissent au-dessus d'un seuil d'exposition. La gravité de ces effets augmente avec la dose reçue. On peut citer comme exemples les brûlures, les nausées, les vomissements, la stérilité et le syndrome d'irradiation aiguë. Deuxièmement, les effets stochastiques ou aléatoires n'ont pas de seuil d'exposition. La probabilité de leur apparition augmente avec la dose, mais la gravité ne dépend pas de la dose. On trouve parmi ces effets les cancers, les leucémies et les mutations génétiques. Ces effets peuvent apparaître à court terme, c'est-à-dire en quelques jours ou semaines, ou à long terme, c'est-à-dire plusieurs années ou décennies après l'exposition.",
    "note": "Effets déterministes (seuil) et stochastiques (probabilistes)."
  },
  {
    "titre": "Grandeurs dosimétriques",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Comment mesurer l'exposition ?</h3><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='margin: 5px 0;'><strong style='color: #2980b9;'>La dose absorbée D</strong></p><ul style='margin: 5px 0;'><li>Énergie absorbée par unité de masse de matière</li><li>Unité : le gray (Gy) où 1 Gy = 1 J/kg</li></ul></div><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='margin: 5px 0;'><strong style='color: #2980b9;'>La dose équivalente H</strong></p><ul style='margin: 5px 0;'><li>Tient compte du type de rayonnement via un facteur de pondération w_R</li><li>H = w_R × D</li><li>Unité : le sievert (Sv)</li></ul></div><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='margin: 5px 0;'><strong style='color: #2980b9;'>La dose efficace E</strong></p><ul style='margin: 5px 0;'><li>Tient compte de la sensibilité des différents organes</li><li>E = Σ w_T × H_T</li><li>Unité : le sievert (Sv)</li></ul></div><div style='background-color: #eaf2f8; padding: 10px; border-radius: 8px; margin-top: 8px;'><p style='color: #1a5276; margin: 0;'><strong>À retenir :</strong> Pour un même rayonnement, D (Gy) et H (Sv) ont la même valeur numérique. Les différences apparaissent pour les rayonnements de nature différente.</p></div></div>",
    "texteParle": "Pour quantifier l'exposition aux rayonnements, on utilise plusieurs grandeurs dosimétriques. La dose absorbée D représente l'énergie absorbée par unité de masse de matière. Elle s'exprime en gray. La dose équivalente H tient compte du type de rayonnement à travers un facteur de pondération. Elle s'exprime en sievert. Enfin, la dose efficace E tient compte de la sensibilité des différents organes. Pour un même rayonnement, la dose absorbée en gray et la dose équivalente en sievert ont la même valeur numérique. Les différences apparaissent lorsqu'on compare des rayonnements de nature différente. Par exemple, les particules alpha sont plus dommageables que les rayons gamma pour une même énergie absorbée.",
    "note": "Dose absorbée (Gy), dose équivalente (Sv), dose efficace (Sv)."
  },
  {
    "titre": "Irradiation vs Contamination",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Irradiation et Contamination : deux notions différentes</h3><div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #27ae60;'><p style='color: #1a6e34; margin: 0;'><strong>Irradiation</strong></p><p style='color: #1a6e34;'>C'est le fait d'être <strong>exposé</strong> à un rayonnement provenant d'une source extérieure au corps. Quand l'exposition cesse, les effets s'arrêtent. La personne irradiée ne devient pas radioactive.</p><p style='color: #1a6e34;'><em>Exemple : Une radiographie médicale.</em></p></div><div style='background-color: #fdedec; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #e74c3c;'><p style='color: #922b21; margin: 0;'><strong>Contamination</strong></p><p style='color: #922b21;'>C'est le fait d'avoir des <strong>substances radioactives</strong> sur la peau ou à l'intérieur du corps (par inhalation, ingestion, plaie). La personne contaminée <strong>devient elle-même radioactive</strong> et peut contaminer d'autres personnes.</p><p style='color: #922b21;'><em>Exemple : Inhalation de poussières radioactives après un accident nucléaire.</em></p></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='color: #7d6608; margin: 0;'><strong>Important :</strong> Une personne peut être irradiée sans être contaminée, et vice-versa. Les deux situations peuvent coexister.</p></div></div>",
    "texteParle": "Il est très important de distinguer deux notions souvent confondues : l'irradiation et la contamination. L'irradiation, c'est le fait d'être exposé à un rayonnement provenant d'une source extérieure au corps. C'est le cas lors d'une radiographie médicale. Lorsque l'exposition cesse, les effets s'arrêtent. La personne irradiée ne devient pas radioactive. La contamination, en revanche, c'est le fait d'avoir des substances radioactives sur la peau ou à l'intérieur du corps, par inhalation, ingestion ou par une plaie. La personne contaminée devient elle-même radioactive et peut contaminer d'autres personnes. On peut citer l'exemple de l'inhalation de poussières radioactives après un accident nucléaire. Une personne peut être irradiée sans être contaminée, et vice-versa. Les deux situations peuvent également coexister.",
    "note": "Irradiation = exposé à une source externe ; Contamination = présence de matières radioactives dans/corps."
  },
  {
    "titre": "Sources de rayonnements",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Sources naturelles et artificielles</h3><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='margin: 0; color: #1a5276;'><strong>Sources naturelles (85% de l'exposition moyenne)</strong></p><ul style='color: #1a5276; margin: 5px 0;'><li>Rayonnement cosmique (provenant de l'espace)</li><li>Rayonnement tellurique (provenant du sol, du granite, etc.)</li><li>Radon (gaz radioactif naturel)</li><li>Ingestion de radionucléides naturels (potassium 40)</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='margin: 0; color: #7d6608;'><strong>Sources artificielles (15% de l'exposition moyenne)</strong></p><ul style='color: #7d6608; margin: 5px 0;'><li>Médecine : radiologie, radiothérapie, scanner</li><li>Industrie : radiographie industrielle, jauges</li><li>Recherche scientifique</li><li>Production d'énergie nucléaire</li><li>Conséquences des accidents nucléaires</li></ul></div><div style='background-color: #f4f6f7; padding: 10px; border-radius: 8px; margin-top: 8px;'><p style='color: #2c3e50; margin: 0;'><strong>Contexte camerounais :</strong> Au Cameroun, l'exposition est principalement due aux sources naturelles (radon, rayonnement cosmique). Les sources artificielles sont principalement médicales.</p></div></div>",
    "texteParle": "Les rayonnements ionisants proviennent de sources naturelles et artificielles. Environ 85% de l'exposition moyenne provient de sources naturelles. On distingue le rayonnement cosmique qui vient de l'espace, le rayonnement tellurique qui provient du sol et du granite, le radon qui est un gaz radioactif naturel, et l'ingestion de radionucléides naturels comme le potassium 40. Les sources artificielles représentent environ 15% de l'exposition moyenne. Elles sont principalement liées à la médecine avec la radiologie, la radiothérapie et les scanners. On trouve aussi des sources dans l'industrie, la recherche scientifique, la production d'énergie nucléaire et les accidents nucléaires. Au Cameroun, l'exposition est principalement due aux sources naturelles, notamment le radon et le rayonnement cosmique. Les sources artificielles sont principalement médicales.",
    "note": "Sources naturelles (85%) et artificielles (15%)."
  },
  {
    "titre": "Principes de radioprotection",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Les trois principes fondamentaux</h3><div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #1a6e34; margin: 0;'><strong>1. La justification</strong></p><p style='color: #1a6e34;'>Toute exposition aux rayonnements doit être justifiée par un bénéfice pour la personne exposée ou pour la société. Les avantages doivent dépasser les risques.</p></div><div style='background-color: #ebf5fb; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #1a5276; margin: 0;'><strong>2. L'optimisation (principe ALARA)</strong></p><p style='color: #1a5276;'>ALARA = As Low As Reasonably Achievable. L'exposition doit être maintenue au niveau le plus bas possible, en tenant compte des facteurs économiques et sociaux.</p></div><div style='background-color: #fdedec; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #922b21; margin: 0;'><strong>3. La limitation des doses</strong></p><p style='color: #922b21;'>Les doses reçues par les personnes exposées ne doivent pas dépasser les limites réglementaires fixées par les autorités compétentes.</p></div></div>",
    "texteParle": "La radioprotection repose sur trois principes fondamentaux. Le premier principe est la justification. Toute exposition aux rayonnements doit être justifiée par un bénéfice pour la personne exposée ou pour la société. Les avantages doivent dépasser les risques. Le deuxième principe est l'optimisation, également connu sous le sigle ALARA, qui signifie As Low As Reasonably Achievable, c'est-à-dire aussi bas que raisonnablement possible. L'exposition doit être maintenue au niveau le plus bas possible en tenant compte des facteurs économiques et sociaux. Le troisième principe est la limitation des doses. Les doses reçues par les personnes exposées ne doivent pas dépasser les limites réglementaires fixées par les autorités compétentes, comme le ministère de la Santé publique au Cameroun ou l'Autorité de Sûreté Nucléaire.",
    "note": "Justification, Optimisation (ALARA), Limitation des doses."
  },
  {
    "titre": "Moyens de protection",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Les trois moyens de protection</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #ebf5fb; padding: 12px; border-radius: 8px; border-left: 5px solid #2980b9;'><p style='margin: 0; color: #1a5276;'><strong>1. La distance</strong></p><p style='color: #1a5276; margin: 5px 0;'>L'intensité du rayonnement diminue avec le carré de la distance (loi en 1/r²). Plus on est loin de la source, moins on est exposé.</p></div><div style='background-color: #d5f5e3; padding: 12px; border-radius: 8px; border-left: 5px solid #27ae60;'><p style='margin: 0; color: #1a6e34;'><strong>2. Le temps</strong></p><p style='color: #1a6e34; margin: 5px 0;'>La dose reçue est proportionnelle à la durée d'exposition. Il faut limiter le temps passé près des sources radioactives.</p></div><div style='background-color: #fdedec; padding: 12px; border-radius: 8px; border-left: 5px solid #e74c3c;'><p style='margin: 0; color: #922b21;'><strong>3. L'écran (blindage)</strong></p><p style='color: #922b21; margin: 5px 0;'>Des matériaux appropriés peuvent arrêter ou atténuer les rayonnements :</p><ul style='color: #922b21; margin: 5px 0;'><li>Alpha : feuille de papier</li><li>Bêta : plaque d'aluminium</li><li>Gamma et X : plomb, béton épais</li></ul></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='color: #7d6608; margin: 0;'><strong>Application pratique :</strong> Ces trois principes sont utilisés quotidiennement par les manipulateurs en radiologie, les travailleurs du nucléaire et les techniciens de maintenance.</p></div></div>",
    "texteParle": "Pour se protéger contre les rayonnements ionisants, on utilise trois moyens principaux. Le premier est la distance. L'intensité du rayonnement diminue avec le carré de la distance, selon la loi en 1 sur r au carré. Plus on est loin de la source, moins on est exposé. Le deuxième moyen est le temps. La dose reçue est proportionnelle à la durée d'exposition. Il faut donc limiter le temps passé près des sources radioactives. Le troisième moyen est l'écran ou blindage. Des matériaux appropriés peuvent arrêter ou atténuer les rayonnements. Pour les particules alpha, une simple feuille de papier suffit. Pour les particules bêta, une plaque d'aluminium est nécessaire. Pour les rayons gamma et les rayons X, il faut du plomb ou du béton épais. Ces trois principes sont utilisés quotidiennement par les manipulateurs en radiologie, les travailleurs du nucléaire et les techniciens de maintenance.",
    "note": "Distance, Temps, Écran (blindage)."
  },
  {
    "titre": "Équipements de protection",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Les équipements de protection individuelle (EPI)</h3><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0;'><ul style='margin: 5px 0;'><li><strong>Tablier plombé :</strong> Protège le tronc lors des examens radiologiques</li><li><strong>Protection thyroïdienne :</strong> Collier plombé pour protéger la glande thyroïde</li><li><strong>Lunettes plombées :</strong> Protègent les yeux particulièrement sensibles</li><li><strong>Gants plombés :</strong> Pour la manipulation de sources radioactives</li><li><strong>Dosimètre :</strong> Appareil porté par le personnel pour mesurer la dose reçue</li></ul></div><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='color: #1a5276; margin: 0;'><strong>Autres équipements :</strong></p><ul style='color: #1a5276; margin: 5px 0;'><li>Écrans mobiles en plomb</li><li>Vitres plombées pour les salles de radiologie</li><li>Portes blindées</li><li>Surveillance de zone avec détecteurs fixes</li></ul></div><div style='background-color: #fdedec; padding: 10px; border-radius: 8px; margin-top: 8px;'><p style='color: #922b21; margin: 0;'><strong>Important :</strong> Au Cameroun, les équipements de radioprotection sont obligatoires dans les services de radiologie des hôpitaux. Leur utilisation est encadrée par le ministère de la Santé publique.</p></div></div>",
    "texteParle": "Pour se protéger, les professionnels utilisent des équipements de protection individuelle, appelés EPI. On trouve notamment le tablier plombé qui protège le tronc lors des examens radiologiques, la protection thyroïdienne sous forme d'un collier plombé, des lunettes plombées pour protéger les yeux particulièrement sensibles, et des gants plombés pour la manipulation de sources radioactives. Le personnel porte également un dosimètre, un appareil qui mesure la dose reçue. D'autres équipements existent comme les écrans mobiles en plomb, les vitres plombées pour les salles de radiologie, les portes blindées et la surveillance de zone avec des détecteurs fixes. Au Cameroun, ces équipements sont obligatoires dans les services de radiologie des hôpitaux et leur utilisation est encadrée par le ministère de la Santé publique.",
    "note": "Tablier plombé, protection thyroïdienne, lunettes, gants, dosimètre."
  },
  {
    "titre": "Limites de dose",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Limites réglementaires de dose</h3><div style='background-color: #f4f6f7; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='margin: 0;'><strong>Catégories de personnes exposées</strong></p></div><div style='background-color: #ebf5fb; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 5px solid #2980b9;'><p style='margin: 0; color: #1a5276;'><strong>Personnel exposé (travailleurs)</strong></p><ul style='color: #1a5276; margin: 5px 0;'><li>Dose efficace : 20 mSv par an (moyenne sur 5 ans, max 50 mSv par an)</li><li>Dose équivalente pour le cristallin : 15 mSv par an</li><li>Dose équivalente pour la peau : 500 mSv par an</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 5px solid #f39c12;'><p style='margin: 0; color: #7d6608;'><strong>Public (personnes non exposées)</strong></p><ul style='color: #7d6608; margin: 5px 0;'><li>Dose efficace : 1 mSv par an</li><li>Cas particulier : 0,3 mSv par an pour la population sensible</li></ul></div><div style='background-color: #fdedec; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 5px solid #e74c3c;'><p style='margin: 0; color: #922b21;'><strong>Dose moyenne naturelle au Cameroun</strong></p><ul style='color: #922b21; margin: 5px 0;'><li>Environ 2,4 mSv par an (moyenne mondiale)</li><li>Les régions montagneuses ont une exposition plus élevée au radon</li></ul></div></div>",
    "texteParle": "Les limites réglementaires de dose sont fixées pour protéger les personnes exposées. Pour le personnel exposé, c'est-à-dire les travailleurs, la dose efficace est limitée à 20 millisieverts par an en moyenne sur cinq ans, avec un maximum de 50 millisieverts par an. La dose équivalente pour le cristallin de l'œil est limitée à 15 millisieverts par an, et celle pour la peau à 500 millisieverts par an. Pour le public, les personnes non exposées professionnellement, la dose efficace est limitée à 1 millisievert par an. Certaines populations sensibles ont une limite encore plus basse de 0,3 millisievert par an. Au Cameroun, la dose moyenne naturelle est d'environ 2,4 millisieverts par an, ce qui correspond à la moyenne mondiale. Cependant, les régions montagneuses ont une exposition plus élevée au radon, un gaz radioactif naturel.",
    "note": "Personnel : 20 mSv/an ; Public : 1 mSv/an ; Naturelle : ~2,4 mSv/an."
  },
  {
    "titre": "Gestion des accidents",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Conduite à tenir en cas d'accident</h3><div style='background-color: #fdedec; padding: 12px; border-radius: 8px; margin: 8px 0;'><p style='color: #922b21; margin: 0;'><strong>En cas de contamination externe :</strong></p><ul style='color: #922b21; margin: 5px 0;'><li>Retirer les vêtements contaminés (les placer dans un sac étanche)</li><li>Laver la peau à l'eau et au savon (décontamination)</li><li>Mesurer la radioactivité résiduelle</li></ul;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
