<!DOCTYPE html>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);

        border-bottom: 1px solid rgba(255,255,255,0.06);

        min-height: 70px;

        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;

    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;

    }

</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue dans les Oscillations Électriques",
    "contenu": "<div style='text-align: center; padding: 20px; background: linear-gradient(135deg, #1a237e, #0d47a1); border-radius: 15px; color: white;'><h1 style='margin-bottom: 10px;'>🔄 Circuit LC et Oscillations Libres</h1><p style='font-size: 1.2rem;'>L'énergie qui danse entre bobine et condensateur</p><hr style='border-color: #42a5f5; width: 50%; margin: 20px auto;'><p style='font-size: 1rem;'><strong>Objectifs du cours :</strong></p><ul style='list-style: none; padding: 0; text-align: left; display: inline-block;'><li style='margin: 10px 0;'>✅ Étudier les oscillations électriques libres non amorties</li><li style='margin: 10px 0;'>✅ Établir l'équation différentielle</li><li style='margin: 10px 0;'>✅ Déterminer la période des oscillations</li></ul></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons découvrir un phénomène fascinant : les oscillations électriques libres dans un circuit LC. Nous allons voir comment l'énergie oscille entre un condensateur et une bobine, et comment décrire mathématiquement ce mouvement. Préparez-vous pour une leçon où l'électricité rencontre la mécanique !",
    "note": "Introduction de la leçon sur le circuit LC et les oscillations libres."
  },
  {
    "titre": "Le Circuit LC : Présentation",
    "contenu": "<div style='background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #0d47a1; color: #1a237e;'><h3 style='margin-top: 0;'>Composition du Circuit</h3><p>Un circuit <strong>LC</strong> est constitué de :</p><div style='text-align: center; padding: 15px;'><div style='background: #e3f2fd; padding: 10px; border-radius: 8px; display: inline-block;; color: #000000'><span style='font-size: 1.5rem;'>⚡</span> <span style='font-size: 1.5rem;'>──||──</span> <span style='font-size: 1.5rem;'>⬅</span> <span style='font-size: 1.5rem;'>～～～</span> <span style='font-size: 1.5rem;'>➜</span> <span style='font-size: 1.5rem;'>⚡</span></div><p style='font-size: 0.9rem;'><em>Condensateur (C) en série avec une bobine (L)</em></p></div><ul><li><strong>Un condensateur</strong> de capacité $C$ (stocke l'énergie électrique)</li><li><strong>Une bobine</strong> d'inductance $L$ (stocke l'énergie magnétique)</li><li>Pas de résistance ($R = 0$) → oscillations <strong>non amorties</strong></li></ul><div style='background: #e3f2fd; padding: 10px; border-radius: 5px; margin-top: 10px;; color: #000000'><p style='margin: 0;'>📌 C'est un oscillateur électrique parfait, analogue au pendule sans frottement.</p></div></div>",
    "texteParle": "Le circuit LC est composé d'un condensateur et d'une bobine branchés en série. Le condensateur stocke l'énergie sous forme électrique, et la bobine la stocke sous forme magnétique. Comme il n'y a pas de résistance, l'énergie ne se dissipe pas : on obtient des oscillations non amorties. C'est l'équivalent électrique d'un pendule sans frottement.",
    "note": "Un circuit LC est un oscillateur électrique idéal sans résistance."
  },
  {
    "titre": "Principe de Fonctionnement",
    "contenu": "<div style='background: #e8eaf6; padding: 15px; border-radius: 8px; border-left: 5px solid #3949ab; color: #1a237e;'><h3 style='margin-top: 0;'>L'Énergie en Mouvement</h3><p>Le fonctionnement du circuit LC repose sur un <strong>échange d'énergie</strong> :</p><div style='text-align: center; padding: 10px;'><div style='background: #c5cae9; padding: 10px; border-radius: 8px;; color: #000000'><p style='margin: 0;'><strong>Énergie électrique</strong> <span style='font-size: 1.2rem;'>↔</span> <strong>Énergie magnétique</strong></p><p style='margin: 0; font-size: 0.9rem;'><em>Condensateur ↔ Bobine</em></p></div></div><div style='background: #c5cae9; padding: 10px; border-radius: 5px; margin-top: 10px;; color: #000000'><p style='margin: 0;'><strong>Étapes :</strong></p><ol><li>Condensateur chargé → énergie électrique maximale</li><li>Décharge du condensateur → courant dans la bobine</li><li>La bobine crée un champ magnétique → énergie magnétique</li><li>Quand le condensateur est déchargé, la bobine le recharge</li><li>Le processus recommence dans l'autre sens</li></ol></div></div>",
    "texteParle": "Le principe du circuit LC est un échange permanent d'énergie. Quand le condensateur est chargé, toute l'énergie est sous forme électrique. Il se décharge alors dans la bobine, qui stocke l'énergie sous forme magnétique. La bobine recharge ensuite le condensateur, et le processus recommence dans l'autre sens. C'est un véritable mouvement perpétuel de l'énergie !",
    "note": "L'énergie oscille entre le condensateur (électrique) et la bobine (magnétique)."
  },
  {
    "titre": "L'Équation Différentielle",
    "contenu": "<div style='background: #fff3e0; padding: 15px; border-radius: 8px; border-left: 5px solid #e65100; color: #4e342e;'><h3 style='margin-top: 0;'>Établissement de l'Équation</h3><p>En appliquant la loi des mailles au circuit LC :</p><div style='text-align: center; padding: 10px;'><div style='background: #ffe0b2; padding: 10px; border-radius: 8px;; color: #000000'><p style='margin: 0;'>\\( u_L + u_C = 0 \\)</p><p style='margin: 0; font-size: 0.9rem;'><em>La somme des tensions dans la maille est nulle</em></p></div></div><p>Avec :</p><ul><li>\\( u_L = L\\frac{di}{dt} \\) (tension aux bornes de la bobine)</li><li>\\( u_C = \\frac{q}{C} \\) (tension aux bornes du condensateur)</li><li>\\( i = -\\frac{dq}{dt} \\) (relation entre courant et charge)</li></ul><div class='math-block'><div class='math'>$$ L\\frac{d^2q}{dt^2} + \\frac{1}{C}q = 0 $$</div></div><p>Soit :</p><div class='math-block'><div class='math'>$$ \\frac{d^2q}{dt^2} + \\frac{1}{LC}q = 0 $$</div></div></div>",
    "texteParle": "Pour établir l'équation différentielle du circuit LC, on applique la loi des mailles. La tension aux bornes de la bobine est L fois la dérivée du courant, et celle du condensateur est q sur C. En remplaçant le courant par moins la dérivée de la charge, on obtient une équation différentielle du second ordre : la dérivée seconde de q plus 1 sur LC fois q égale zéro.",
    "note": "L'équation différentielle du circuit LC est \\( \\frac{d^2q}{dt^2} + \\frac{1}{LC}q = 0 \\)."
  },
  {
    "titre": "Solution de l'Équation Différentielle",
    "contenu": "<div style='background: #e0f7fa; padding: 15px; border-radius: 8px; border-left: 5px solid #00838f; color: #004d40;'><h3 style='margin-top: 0;'>La Charge Oscille</h3><p>L'équation \\( \\frac{d^2q}{dt^2} + \\omega_0^2 q = 0 \\) a pour solution :</p><div class='math-block'><div class='math'>$$ q(t) = Q_{max}\\cos(\\omega_0 t + \\varphi) $$</div></div><p>avec :</p><div class='math-block'><div class='math'>$$ \\omega_0 = \\frac{1}{\\sqrt{LC}} $$</div></div><ul><li>\\( Q_{max} \\) : charge maximale (amplitude)</li><li>\\( \\omega_0 \\) : pulsation propre (en rad/s)</li><li>\\( \\varphi \\) : phase à l'origine (déterminée par les conditions initiales)</li></ul><div style='background: #b2ebf2; padding: 10px; border-radius: 5px; margin-top: 10px;; color: #000000'><p style='margin: 0;'>📌 La charge oscille de manière <strong>sinusoïdale</strong> autour de 0.</p></div></div>",
    "texteParle": "La solution de l'équation différentielle nous donne la charge en fonction du temps. C'est une fonction cosinusoïdale, ce qui signifie que la charge oscille de manière périodique. La pulsation propre omega zéro est l'inverse de la racine carrée du produit L fois C. C'est cette pulsation qui détermine la rapidité des oscillations.",
    "note": "La charge oscille sinusoïdalement avec une pulsation \\( \\omega_0 = 1/\\sqrt{LC} \\)."
  },
  {
    "titre": "Période des Oscillations",
    "contenu": "<div style='background: #f3e5f5; padding: 15px; border-radius: 8px; border-left: 5px solid #6a1b9a; color: #4a148c;'><h3 style='margin-top: 0;'>La Période Propre \\( T_0 \\)</h3><p>La période des oscillations est liée à la pulsation par :</p><div class='math-block'><div class='math'>$$ T_0 = \\frac{2\\pi}{\\omega_0} = 2\\pi\\sqrt{LC} $$</div></div><div style='background: #e1bee7; padding: 10px; border-radius: 5px; margin-top: 10px;; color: #000000'><p style='margin: 0;'><strong>Propriétés :</strong></p><ul><li>\\( T_0 \\) est la <strong>période propre</strong> du circuit LC</li><li>Elle ne dépend que de <strong>L</strong> et de <strong>C</strong></li><li>Elle ne dépend pas de l'amplitude des oscillations</li><li>Unité : secondes (s)</li></ul></div><div style='background: #ce93d8; padding: 10px; border-radius: 5px; margin-top: 10px;; color: #000000'><p style='margin: 0; color: white;'>📌 C'est l'équivalent électrique de la période d'un pendule simple.</p></div></div>",
    "texteParle": "La période propre du circuit LC est donnée par deux pi fois la racine carrée du produit L fois C. Comme pour le pendule simple, cette période ne dépend que des caractéristiques du circuit (L et C), et pas de l'amplitude des oscillations. C'est une propriété fondamentale des oscillateurs harmoniques.",
    "note": "La période propre du circuit LC est \\( T_0 = 2\\pi\\sqrt{LC} \\)."
  },
  {
    "titre": "Évolution du Courant",
    "contenu": "<div style='background: #fce4ec; padding: 15px; border-radius: 8px; border-left: 5px solid #c62828; color: #4a148c;'><h3 style='margin-top: 0;'>Le Courant Oscille Aussi</h3><p>Le courant est la dérivée de la charge :</p><div style='text-align: center; padding: 10px;'><div style='background: #f8bbd0; padding: 10px; border-radius: 8px;; color: #000000'><p style='margin: 0;'>\\( i(t) = -\\frac{dq}{dt} \\)</p></div></div><p>Avec \\( q(t) = Q_{max}\\cos(\\omega_0 t + \\varphi) \\) :</p><div class='math-block'><div class='math'>$$ i(t) = \\omega_0 Q_{max}\\sin(\\omega_0 t + \\varphi) $$</div></div><p>ou encore :</p><div class='math-block'><div class='math'>$$ i(t) = I_{max}\\sin(\\omega_0 t + \\varphi) $$</div></div><p>avec \\( I_{max} = \\omega_0 Q_{max} \\)</p><div style='background: #ef9a9a; padding: 10px; border-radius: 5px; margin-top: 10px;; color: #000000'><p style='margin: 0; color: white;'>📌 Le courant est en <strong>quadrature de phase</strong> avec la charge.</p></div></div>",
    "texteParle": "Le courant dans le circuit est la dérivée de la charge par rapport au temps. Si la charge est une fonction cosinus, le courant est une fonction sinus. Cela signifie que le courant est déphasé de 90 degrés par rapport à la charge : quand la charge est maximale, le courant est nul, et inversement. C'est ce qu'on appelle la quadrature de phase.",
    "note": "Le courant est en quadrature de phase avec la charge (déphasage de 90°)."
  },
  {
    "titre": "Énergie dans le Circuit LC",
    "contenu": "<div style='background: #e8f5e9; padding: 15px; border-radius: 8px; border-left: 5px solid #2e7d32; color: #1b5e20;'><h3 style='margin-top: 0;'>Conservation de l'Énergie</h3><p>L'énergie totale dans le circuit LC est constante :</p><div style='display: flex; justify-content: space-around; padding: 10px;'><div style='background: #c8e6c9; padding: 10px; border-radius: 5px; flex: 1; margin: 5px; text-align: center;; color: #000000'><p style='margin: 0; font-weight: bold;'>Énergie électrique</p><p style='margin: 0;'>\\( E_C = \\frac{1}{2}\\frac{q^2}{C} \\)</p></div><div style='background: #c8e6c9; padding: 10px; border-radius: 5px; flex: 1; margin: 5px; text-align: center;; color: #000000'><p style='margin: 0; font-weight: bold;'>Énergie magnétique</p><p style='margin: 0;'>\\( E_L = \\frac{1}{2}Li^2 \\)</p></div></div><div class='math-block'><div class='math'>$$ E_{tot} = E_C + E_L = \\frac{1}{2}\\frac{Q_{max}^2}{C} = \\frac{1}{2}LI_{max}^2 $$</div></div><ul><li>L'énergie totale est <strong>constante</strong> (pas de dissipation)</li><li>Elle oscille entre les deux formes d'énergie</li></ul></div>",
    "texteParle": "Dans un circuit LC idéal, l'énergie totale se conserve. L'énergie électrique du condensateur et l'énergie magnétique de la bobine s'échangent en permanence, mais leur somme reste constante. C'est une propriété fondamentale des oscillations non amorties. L'énergie totale peut s'écrire soit en fonction de la charge maximale, soit en fonction du courant maximal.",
    "note": "L'énergie totale dans un circuit LC est constante et se répartit entre les deux composants."

  {

    "contenu": "<div style='background: #fff8e1; padding: 15px; border-radius: 8px; border-left: 5px solid #f57f17; color: #4e342e;'><h3 style='margin-top: 0;'>Le Circuit LC = Un Ressort</h3><p>Il existe des analogies frappantes entre le circuit LC et un oscillateur mécanique :</p><div style='background: #ffecb3; padding: 10px; border-radius: 5px;; color: #000000'><table style='width: 100%; border-collapse: collapse;'><tr style='border-bottom: 1px solid #f57f17;'><th style='text-align: left; padding: 5px;'>Circuit LC</th><th style='text-align: left; padding: 5px;'>Oscillateur mécanique</th></tr><tr><td style='padding: 5px;'>Charge \\( q \\)</td><td style='padding: 5px;'>Position \\( x \\)</td></tr><tr><td style='padding: 5px;'>Courant \\( i \\)</td><td style='padding: 5px;'>Vitesse \\( v \\)</td></tr><tr><td style='padding: 5px;'>Inductance \\( L \\)</td><td style='padding: 5px;'>Masse \\( m \\)</td></tr><tr><td style='padding: 5px;'>Inverse de la capacité \\( 1/C \\)</td><td style='padding: 5px;'>Raideur \\( k \\)</td></tr></table></div><p style='margin-top: 10px;'>📌 Ces analogies aident à comprendre le comportement du circuit LC.</p></div>",
    "texteParle": "Le circuit LC est l'analogue électrique d'un oscillateur mécanique. La charge joue le rôle de la position, le courant celui de la vitesse. L'inductance est analogue à la masse, et l'inverse de la capacité est analogue à la raideur du ressort. Ces analogies sont très utiles pour comprendre intuitivement le comportement du circuit LC.",

    "texteParle": "Pour résumer, retenez les points essentiels. Le circuit LC est un oscillateur électrique idéal. Son équation différentielle est celle d'un oscillateur harmonique. La pulsation propre est l'inverse de la racine carrée de LC, et la période est deux pi fois la racine carrée de LC. L'énergie totale se conserve, alternant entre les deux composants.",

    "texteParle": "Ceci conclut notre leçon sur le circuit LC et les oscillations libres. J'espère que vous avez compris comment l'énergie oscille entre le condensateur et la bobine, et comment décrire mathématiquement ces oscillations. N'hésitez pas à poser des questions et à refaire les exercices. À la prochaine leçon !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
