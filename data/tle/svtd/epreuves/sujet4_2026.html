<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle D",
  "classe": "Terminale D",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Échanges cellulaires et communication nerveuse",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>La cellule est l'unité fondamentale du vivant. Elle échange en permanence avec son milieu et transmet des informations via des signaux électriques et chimiques.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Qu'est-ce que l'osmose ? Expliquer le comportement d'une cellule végétale placée dans une solution hypertonique.</div>",
          "reponse": "<div style='font-size: 16px;'>L'<strong>osmose</strong> est le mouvement passif de l'eau à travers une membrane semi-perméable, du milieu le moins concentré en solutés (hypotonique) vers le milieu le plus concentré (hypertonique).<br><br>Une cellule végétale placée dans une solution <strong>hypertonique</strong> (plus concentrée que le cytoplasme) perd de l'eau par osmose. Le volume cellulaire diminue, la membrane plasmique se décolle de la paroi : c'est le phénomène de <strong>plasmolyse</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Définir le potentiel de repos et le potentiel d'action. Qu'appelle-t-on la loi du \"tout-ou-rien\" ?</div>",
          "reponse": "<div style='font-size: 16px;'>Le <strong>potentiel de repos</strong> est la différence de potentiel électrique (environ -70 mV) qui existe entre les deux faces de la membrane d'un neurone au repos. Il est dû à une répartition inégale des ions (Na⁺, K⁺).<br><br>Le <strong>potentiel d'action</strong> est une inversion brève du potentiel de membrane (+30 mV), liée à une entrée massive d'ions Na⁺ puis à une sortie d'ions K⁺.<br><br>La <strong>loi du tout-ou-rien</strong> stipule que pour une fibre nerveuse donnée, un stimulus efficace (supérieur au seuil de déclenchement) provoque un potentiel d'action dont l'amplitude est toujours la même, indépendante de l'intensité du stimulus.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> Décrire le mécanisme moléculaire de la contraction musculaire (rôle de l'ATP et du calcium).</div>",
          "reponse": "<div style='font-size: 16px;'>La contraction musculaire repose sur le <strong>glissement des filaments d'actine</strong> sur les filaments de myosine.<br><br>1. Le <strong>calcium (Ca²⁺)</strong> libéré du réticulum sarcoplasmique se fixe sur la troponine, modifiant la configuration de la tropomyosine et démasquant les sites de fixation de la myosine sur l'actine.<br>2. La <strong>myosine</strong> se lie à l'actine et, par un mouvement de bascule, fait glisser le filament d'actine (consommation d'<strong>ATP</strong>).<br>3. L'<strong>ATP</strong> est indispensable pour la séparation du complexe actine-myosine et la réinitialisation du cycle.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Génétique formelle - Dihybridisme",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>Chez la drosophile, la couleur du corps (gris/ébène) et la forme des ailes (longues/vestigiales) sont contrôlées par deux gènes distincts. On croise une souche pure corps gris, ailes longues avec une souche pure corps ébène, ailes vestigiales.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Déterminer les génotypes des parents et le génotype et le phénotype de la génération F1.</div>",
          "reponse": "<div style='font-size: 16px;'>Soit (G) l'allèle dominant pour le corps gris et (g) pour le corps ébène. Soit (L) l'allèle dominant pour les ailes longues et (l) pour les ailes vestigiales.<br><br>Parents : <strong>GGLL</strong> (corps gris, ailes longues) × <strong>ggll</strong> (corps ébène, ailes vestigiales).<br>F1 : tous <strong>GgLl</strong> (corps gris, ailes longues).</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> En supposant que les gènes sont indépendants, quelles sont les proportions phénotypiques attendues en F2 (issue d'un croisement F1 × F1) ?</div>",
          "reponse": "<div style='font-size: 16px;'>Les gènes indépendants suivent les lois de Mendel. Le croisement de deux hétérozygotes (GgLl × GgLl) donne en F2 les proportions suivantes :<br><br>9/16 corps gris, ailes longues<br>3/16 corps gris, ailes vestigiales<br>3/16 corps ébène, ailes longues<br>1/16 corps ébène, ailes vestigiales<br><br>Soit le rapport <strong>9:3:3:1</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> Si les gènes étaient liés, comment les proportions en F2 seraient-elles modifiées ?</div>",
          "reponse": "<div style='font-size: 16px;'>Si les gènes sont <strong>liés</strong> (sur le même chromosome), ils ne ségrègent pas indépendamment. Les proportions <strong>9:3:3:1</strong> ne sont plus observées. On observe une <strong>surreprésentation des phénotypes parentaux</strong> (corps gris-ailes longues et corps ébène-ailes vestigiales) et une sous-représentation des phénotypes recombinés, à moins qu'un crossing-over ne se produise (brassage intrachromosomique).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Génétique humaine et hérédité",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>L'albinisme est une maladie génétique autosomique récessive. Un couple non albinos a deux enfants : le premier est albinos et le second est non albinos.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Déterminer les génotypes possibles des parents et des enfants.</div>",
          "reponse": "<div style='font-size: 16px;'>L'albinisme est autosomique récessif : le phénotype albinos correspond au génotype <strong>aa</strong>.<br><br>Parents non albinos ayant un enfant albinos (aa) : chacun a transmis un allèle récessif (a). Leur génotype est donc <strong>hétérozygote (Aa)</strong>.<br><br>Enfant 1 (albinos) : <strong>aa</strong>.<br>Enfant 2 (non albinos) : <strong>AA</strong> ou <strong>Aa</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Calculer la probabilité que le deuxième enfant soit hétérozygote (porteur sain).</div>",
          "reponse": "<div style='font-size: 16px;'>Le croisement Aa × Aa donne : AA (1/4), Aa (2/4), aa (1/4).<br><br>Sachant que l'enfant n'est pas albinos (AA ou Aa), la probabilité qu'il soit hétérozygote (Aa) est de <strong>2/3</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> Si l'enfant non albinos épouse une personne également porteuse (hétérozygote), quel est le risque qu'ils aient un enfant albinos ?</div>",
          "reponse": "<div style='font-size: 16px;'>Le croisement Aa × Aa donne 1/4 d'enfants albinos (aa).<br><br>Le risque est donc de <strong>25%</strong> (1/4) à chaque grossesse, indépendamment du sexe de l'enfant.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Système immunitaire, maladies et vaccination",
      "points": "3 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>Le système immunitaire protège l'organisme contre les agressions. Il peut parfois dysfonctionner.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Distinguer la réponse immunitaire humorale de la réponse immunitaire cellulaire.</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>réponse immunitaire humorale</strong> est assurée par les <strong>lymphocytes B</strong> qui, après activation, se différencient en <strong>plasmocytes</strong> producteurs d'<strong>anticorps</strong>. Les anticorps circulent dans le sang et la lymphe et neutralisent les antigènes extracellulaires.<br><br>La <strong>réponse immunitaire cellulaire</strong> est assurée par les <strong>lymphocytes T cytotoxiques (CD8⁺)</strong> qui reconnaissent et détruisent directement les cellules infectées (par des virus) ou les cellules tumorales.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Qu'est-ce qu'une maladie auto-immune ? Donner deux exemples.</div>",
          "reponse": "<div style='font-size: 16px;'>Une <strong>maladie auto-immune</strong> est une pathologie dans laquelle le système immunitaire (lymphocytes T et/ou anticorps) reconnaît les constituants de l'organisme comme étrangers et déclenche une réaction contre eux.<br><br>Exemples :<br>- <strong>Diabète de type 1</strong> : destruction auto-immune des cellules β du pancréas sécrétant l'insuline.<br>- <strong>Vitiligo</strong> : destruction auto-immune des mélanocytes.<br>- <strong>Myasthénie</strong> : auto-anticorps contre les récepteurs de l'acétylcholine.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> Expliquer le principe de la vaccination.</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>vaccination</strong> consiste à introduire dans l'organisme un <strong>antigène</strong> (pathogène inactivé, atténué ou fragment) pour <strong>stimuler une réponse immunitaire primaire</strong> sans provoquer la maladie. Cela permet la formation de <strong>lymphocytes B et T mémoires</strong>. En cas de rencontre ultérieure avec le pathogène, la <strong>réponse immunitaire secondaire</strong> est plus rapide, plus intense et plus efficace, protégeant ainsi l'individu de la maladie.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Santé reproductive et régulation hormonale",
      "points": "2 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>La reproduction humaine est régulée par des mécanismes hormonaux complexes impliquant l'hypothalamus, l'hypophyse et les gonades.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Décrire le fonctionnement de l'axe hypothalamo-hypophyso-ovarien chez la femme.</div>",
          "reponse": "<div style='font-size: 16px;'>L'<strong>hypothalamus</strong> sécrète la <strong>GnRH</strong> qui stimule l'<strong>hypophyse antérieure</strong> à sécréter les gonadotrophines <strong>FSH</strong> et <strong>LH</strong>.<br><br>- La <strong>FSH</strong> stimule la croissance folliculaire et la sécrétion d'<strong>œstrogènes</strong> par l'ovaire.<br>- Les œstrogènes, à concentration modérée, exercent un <strong>rétrocontrôle négatif</strong> sur la sécrétion de FSH et LH. À forte concentration, ils exercent un <strong>rétrocontrôle positif</strong> déclenchant un <strong>pic de LH</strong> qui provoque l'<strong>ovulation</strong>.<br>- Après l'ovulation, le <strong>corps jaune</strong> sécrète de la <strong>progestérone</strong> qui exerce un rétrocontrôle négatif bloquant de nouvelles ovulations.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Évolution humaine et hominisation",
      "points": "2 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>La lignée humaine a connu plusieurs étapes marquées par des innovations majeures.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Citer et expliquer trois critères d'hominisation qui distinguent les hominidés des autres primates.</div>",
          "reponse": "<div style='font-size: 16px;'>Les principaux critères d'<strong>hominisation</strong> sont :<br><br>1. <strong>La bipédie</strong> : station debout permanente et locomotion sur deux membres. Elle libère les mains pour la préhension et la fabrication d'outils.<br>2. <strong>L'augmentation du volume crânien</strong> : liée au développement du cortex cérébral, particulièrement des aires associatives (langage, pensée abstraite).<br>3. <strong>La fabrication d'outils</strong> : capacité à tailler et utiliser des pierres, puis des os et des bois, témoignant d'une intelligence technique.<br>4. <strong>La maîtrise du feu</strong> : permet la cuisson des aliments, la protection contre les prédateurs et l'éclairage.<br>5. <strong>Le langage articulé</strong> : capacité à communiquer par des sons complexes, à transmettre et accumuler des connaissances.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
