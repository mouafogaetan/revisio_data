<!DOCTYPE html>
<html lang="fr">

    <script>
        MathJax = {
            tex: {

            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>

            <span id="subjectInfo">Matière</span>

            <span id="sequenceInfo">Séquence</span>

        </div>

    <main class="slide-body" id="slideBody"></main>

                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>

                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle D",
  "classe": "Terminale D",
  "sequence": "Evaluation Sequentielle N°3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La méiose et la gamétogenèse",
      "points": "8 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>La reproduction sexuée chez les mammifères fait intervenir deux phénomènes fondamentaux : la méiose et la fécondation. La méiose permet la formation des gamètes (spermatozoïdes et ovules) alors que la fécondation rétablit le nombre diploïde de chromosomes.<br><br> <strong>1.</strong> En vous appuyant sur un schéma que vous dessinerez, décrivez les principales étapes de la méiose. <br> <strong>2.</strong> Distinguez la spermatogenèse de l'ovogenèse en précisant les lieux de formation et le nombre de gamètes fonctionnels produits chez l'homme et chez la femme. <br> <strong>3.</strong> Expliquez en quoi la méiose est une source de diversité génétique. </div>",
      "questions": [
        {
          "question": "1) En vous appuyant sur un schéma que vous dessinerez, décrivez les principales étapes de la méiose.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>La méiose comprend deux divisions cellulaires successives :<br><br><strong>Première division de méiose (division réductionnelle) :</strong><br> - <strong>Prophase I :</strong> Les chromosomes homologues s'apparient (synapsis). Il se produit des enjambements (crossing-over) entre les chromatides de chromosomes homologues, échange de segments d'ADN, source de diversité génétique. <br> - <strong>Métaphase I :</strong> Les paires de chromosomes homologues s'alignent sur la plaque équatoriale, leur orientation étant aléatoire (métaphase aléatoire).<br> - <strong>Anaphase I :</strong> Les chromosomes homologues se séparent et migrent vers les pôles opposés.<br> - <strong>Télophase I :</strong> Les chromosomes sont aux pôles, la cellule se divise en deux cellules haploïdes (contenant un jeu de chromosomes).<br><br><strong>Deuxième division de méiose (division équationnelle) :</strong><br> - <strong>Prophase II :</strong> Les chromosomes se condensent à nouveau.<br> - <strong>Métaphase II :</strong> Les chromosomes s'alignent sur la plaque équatoriale.<br> - <strong>Anaphase II :</strong> Les chromatides sœurs se séparent et migrent vers les pôles.<br> - <strong>Télophase II :</strong> Les chromatides sont aux pôles, la cellule se divise, aboutissant à quatre cellules haploïdes génétiquement différentes.</div>"
        },
        {
          "question": "2) Distinguez la spermatogenèse de l'ovogenèse en précisant les lieux de formation et le nombre de gamètes fonctionnels produits chez l'homme et chez la femme.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><strong>Spermatogenèse :</strong><br> - Lieu : Tubes séminifères des testicules. <br> - Aboutit à la formation de quatre spermatozoïdes fonctionnels à partir d'une spermatogonie (cellule souche). <br> - Les spermatozoïdes sont de petite taille et mobiles. <br><br><strong>Ovogenèse :</strong><br> - Lieu : Ovaire.<br> - Aboutit à la formation d'un seul ovule fonctionnel à partir d'une ovogonie. Les trois autres cellules (les globules polaires) dégénèrent. <br> - L'ovule est de grande taille, riche en réserves nutritives et immobile.</div>"
        },
        {
          "question": "3) Expliquez en quoi la méiose est une source de diversité génétique.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>La méiose génère de la diversité génétique par deux mécanismes principaux :<br><br> <strong>Le brassage interchromosomique :</strong> Lors de la métaphase I, les chromosomes homologues se placent aléatoirement sur la plaque équatoriale. Cette répartition aléatoire des chromosomes paternels et maternels dans les gamètes crée un nombre considérable de combinaisons différentes (2^n combinaisons, où n est le nombre de paires de chromosomes, soit 2^23 chez l'humain).<br><br> <strong>Le brassage intrachromosomique :</strong> Lors de la prophase I, les crossing-over (enjambements) entre les chromatides de chromosomes homologues entraînent un échange de segments d'ADN. Cela crée de nouvelles associations d'allèles sur un même chromosome, augmentant encore la diversité génétique.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Génétique formelle - Monohybridisme et Dihybridisme",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Chez la souris, le pelage peut être de couleur grise ou blanche. La couleur grise est due à l'allèle dominant G et la couleur blanche à l'allèle récessif g. Par ailleurs, une autre paire d'allèles détermine la forme des oreilles : les oreilles normales sont dues à l'allèle dominant N et les oreilles recourbées à l'allèle récessif n. On réalise un croisement entre une souris mâle de race pure à pelage gris et oreilles normales et une femelle de race pure à pelage blanc et oreilles recourbées.<br><br> <strong>1.</strong> Définissez les concepts d'allèle, de dominance et de récessivité. <br> <strong>2.</strong> Établissez le génotype des parents et celui des descendants de la première génération (F1). <br> <strong>3.</strong> On croise deux souris de la génération F1. Quels sont les phénotypes et les proportions phénotypiques obtenus en F2 ? (On suppose que les gènes sont indépendants). <br> <strong>4.</strong> Distinguez le brassage interchromosomique du brassage intrachromosomique en vous appuyant sur cet exemple.</div>",
      "questions": [
        {
          "question": "1) Définissez les concepts d'allèle, de dominance et de récessivité.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><strong>Allèle :</strong> C'est une version différente d'un même gène, situé au même locus sur des chromosomes homologues. Par exemple, l'allèle G (gris) et l'allèle g (blanc) sont deux allèles du gène de la couleur du pelage.<br><br> <strong>Dominance :</strong> Un allèle est dominant lorsqu'il s'exprime dans le phénotype, même en présence de l'allèle récessif. L'allèle G est dominant : un individu de génotype GG ou Gg aura un pelage gris.<br><br> <strong>Récessivité :</strong> Un allèle est récessif lorsqu'il ne s'exprime dans le phénotype qu'à l'état homozygote (c'est-à-dire en présence de deux exemplaires de l'allèle récessif, par exemple gg pour un pelage blanc).</div>"
        },
        {
          "question": "2) Établissez le génotype des parents et celui des descendants de la première génération (F1).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le mâle de race pure à pelage gris et oreilles normales a le génotype <strong>GGNN</strong>. La femelle de race pure à pelage blanc et oreilles recourbées a le génotype <strong>ggnn</strong>. Leurs gamètes sont respectivement GN et gn. La descendance F1 a donc le génotype <strong>GgNn</strong>. Tous les individus F1 ont donc un pelage gris et des oreilles normales (car les allèles G et N sont dominants).</div>"
        },
        {
          "question": "3) On croise deux souris de la génération F1. Quels sont les phénotypes et les proportions phénotypiques obtenus en F2 ? (On suppose que les gènes sont indépendants).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Les souris F1 (GgNn) produisent quatre types de gamètes : GN, Gn, gN, gn. En croisant deux souris F1 (testcross), on obtient, selon la loi de ségrégation indépendante de Mendel, les proportions phénotypiques suivantes en F2 : <br> - 9/16 : pelage gris et oreilles normales (G_N_)<br> - 3/16 : pelage gris et oreilles recourbées (G_nn)<br> - 3/16 : pelage blanc et oreilles normales (ggN_)<br> - 1/16 : pelage blanc et oreilles recourbées (ggnn)<br> Les proportions sont donc de 9:3:3:1.</div>"
        },
        {
          "question": "4) Distinguez le brassage interchromosomique du brassage intrachromosomique en vous appuyant sur cet exemple.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Dans cet exemple, les gènes pour la couleur du pelage et la forme des oreilles sont portés par des chromosomes différents (ils sont indépendants). La diversité phénotypique en F2 (9:3:3:1) résulte du <strong>brassage interchromosomique</strong> : la répartition aléatoire des chromosomes homologues lors de la métaphase I de la méiose. Les allèles G/g et N/n se recombinent librement.<br><br> Si les gènes étaient sur le même chromosome (gènes liés), on observerait un <strong>brassage intrachromosomique</strong> dû aux crossing-over (enjambements) qui se produisent en prophase I, créant de nouvelles combinaisons d'allèles (par exemple, GN et gn majoritaires, et Gn et gN minoritaires).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Génétique humaine - Arbre généalogique et hérédité liée au sexe",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>L'arbre généalogique ci-dessous représente la transmission d'une maladie héréditaire dans une famille. Les individus atteints sont représentés en noir. <br> <div style='text-align: center; margin: 10px 0;'> <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; display: inline-block;'> <span style='font-size: 0.9rem;'>[Arbre généalogique : deux générations, avec deux hommes atteints sur trois fils, et un père sain]</span> </div> </div> <br> <strong>1.</strong> Ce caractère est-il dominant ou récessif ? Justifiez votre réponse. <br> <strong>2.</strong> Le gène responsable est-il porté par un autosome ou par le chromosome X ? Justifiez. <br> <strong>3.</strong> Quels sont les génotypes possibles des individus I₁, I₂, II₁, II₂ et II₃ ? (On utilisera X pour le chromosome X, Y pour le chromosome Y, A pour l'allèle normal et a pour l'allèle muté). <br> <strong>4.</strong> Calculez la probabilité que l'individu II₃ (femme saine) soit porteuse saine de la maladie.</div>",
      "questions": [
        {
          "question": "1) Ce caractère est-il dominant ou récessif ? Justifiez votre réponse.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le caractère est récessif. En effet, deux parents sains (I₁ et I₂) ont un enfant malade (II₁). Cela signifie que les deux parents sont hétérozygotes (porteurs sains) pour le gène muté, et que l'enfant a hérité de l'allèle muté des deux parents.</div>"
        },
        {
          "question": "2) Le gène responsable est-il porté par un autosome ou par le chromosome X ? Justifiez.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le gène est porté par le chromosome X. Justification : Seuls les hommes sont atteints (II₁ et II₃). Si le gène était autosomal, les femmes seraient également touchées. De plus, un père sain (I₁) ne transmet pas son chromosome X à ses fils (il leur transmet son chromosome Y). Or, II₁ est atteint, il a donc hérité son chromosome X muté de sa mère (I₂) qui est porteuse saine. C'est un mode de transmission récessif lié à l'X.</div>"
        },
        {
          "question": "3) Quels sont les génotypes possibles des individus I₁, I₂, II₁, II₂ et II₃ ? (On utilisera X pour le chromosome X, Y pour le chromosome Y, A pour l'allèle normal et a pour l'allèle muté).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'> <ul> <li><strong>I₁ :</strong> X<sup>A</sup>Y (père sain)</li> <li><strong>I₂ :</strong> X<sup>A</sup>X<sup>a</sup> (mère porteuse saine)</li> <li><strong>II₁ :</strong> X<sup>a</sup>Y (fils atteint)</li> <li><strong>II₂ :</strong> X<sup>A</sup>Y (fils sain)</li> <li><strong>II₃ :</strong> X<sup>A</sup>X<sup>A</sup> ou X<sup>A</sup>X<sup>a</sup> (fille saine, peut être porteuse)</li> </ul> </div>"
        },
        {
          "question": "4) Calculez la probabilité que l'individu II₃ (femme saine) soit porteuse saine de la maladie.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>II₃ est une fille du couple I₁ (X<sup>A</sup>Y) et I₂ (X<sup>A</sup>X<sup>a</sup>). Elle a reçu un chromosome X de son père (X<sup>A</sup>) et un chromosome X de sa mère (soit X<sup>A</sup>, soit X<sup>a</sup>). La probabilité qu'elle soit porteuse (X<sup>A</sup>X<sup>a</sup>) est donc de 1/2, car elle a 1 chance sur 2 d'avoir hérité du chromosome X muté de sa mère.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
