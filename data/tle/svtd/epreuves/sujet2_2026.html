<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle D",
  "classe": "Terminale D",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "EXERCICE 1 : Communication nerveuse et contraction musculaire",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p>Le fonctionnement du système neuromusculaire est essentiel pour la motricité volontaire.</p><br><p><strong>Document 1 :</strong> Schéma d'un neurone et d'une fibre musculaire.</p><br><p><strong>Document 2 :</strong> Courbe représentant les variations du potentiel de membrane au cours d'un potentiel d'action.</p></div>",
      "questions": [
        {
          "question": "<div style='color: #333;'>1) Décrire les caractéristiques du potentiel de repos d'une cellule nerveuse. Expliquer comment il est maintenu.</div>",
          "reponse": "<div style='color: #333;'>Le potentiel de repos est une différence de potentiel électrique entre l'intérieur et l'extérieur de la cellule, d'environ -70 mV. Il est maintenu par :<br>- L'inégalité de répartition des ions Na⁺ et K⁺ de part et d'autre de la membrane.<br>- La perméabilité sélective de la membrane (plus perméable au K⁺ qu'au Na⁺).<br>- L'action de la pompe Na⁺/K⁺ qui expulse 3 Na⁺ et fait entrer 2 K⁺, maintenant ainsi le gradient ionique.</div>"
        },
        {
          "question": "<div style='color: #333;'>2) Expliquer le mécanisme du potentiel d'action en précisant les étapes de dépolarisation et de repolarisation.</div>",
          "reponse": "<div style='color: #333;'>Le potentiel d'action se déroule en plusieurs étapes :<br><strong>1. Dépolarisation :</strong> Un stimulus atteint le seuil d'excitabilité, les canaux Na⁺ voltage-dépendants s'ouvrent, les ions Na⁺ entrent massivement dans la cellule, le potentiel de membrane devient positif (environ +40 mV).<br><strong>2. Repolarisation :</strong> Les canaux Na⁺ se ferment, les canaux K⁺ s'ouvrent, les ions K⁺ sortent de la cellule, le potentiel redevient négatif.<br><strong>3. Hyperpolarisation :</strong> Légère baisse en dessous du potentiel de repos avant le retour à l'équilibre.<br>La propagation se fait par conduction saltatoire (avec myéline) ou continue (sans myéline).</div>"
        },
        {
          "question": "<div style='color: #333;'>3) Schématiser et expliquer le mécanisme moléculaire de la contraction musculaire (glissement des filaments).</div>",
          "reponse": "<div style='color: #333;'>La contraction musculaire repose sur le glissement des filaments d'actine et de myosine :<br>1. L'influx nerveux arrive à la jonction neuromusculaire et provoque la libération d'acétylcholine.<br>2. L'acétylcholine se fixe sur les récepteurs du sarcolemme, provoquant un potentiel d'action musculaire.<br>3. Le potentiel d'action se propage dans les tubules T et provoque la libération de Ca²⁺ du réticulum sarcoplasmique.<br>4. Le Ca²⁺ se fixe sur la troponine, dévoilant les sites de fixation de la myosine sur l'actine.<br>5. Les têtes de myosine se fixent sur l'actine (ponts actino-myosiniques).<br>6. Hydrolyse de l'ATP en ADP + Pi, libérant l'énergie nécessaire au glissement.<br>7. Les têtes de myosine se déplacent, entraînant le glissement des filaments d'actine vers le centre du sarcomère.<br>8. La contraction s'arrête quand le Ca²⁺ est pompé dans le réticulum sarcoplasmique.</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE 2 : Reproduction et fécondation",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p>La reproduction sexuée assure le maintien de l'espèce.</p><br><p><strong>Document :</strong> Schéma des étapes de la méiose chez une cellule diploïde (2n=4).</p></div>",
      "questions": [
        {
          "question": "<div style='color: #333;'>1) Décrire les grandes étapes de la méiose et expliquer comment ce processus permet de passer d'une cellule diploïde à des cellules haploïdes.</div>",
          "reponse": "<div style='color: #333;'>La méiose est une division cellulaire qui permet de passer d'une cellule diploïde (2n) à quatre cellules haploïdes (n). Elle comprend deux divisions successives :<br><br><strong>Méiose I (division réductionnelle) :</strong><br>- La cellule diploïde se prépare avant la division.<br>- Les chromosomes homologues s'apparient (synapsis) et échangent des fragments (crossing-over).<br>- Les chromosomes homologues se séparent, chaque cellule fille reçoit un lot complet de chromosomes (n).<br><br><strong>Méiose II (division équationnelle) :</strong><br>- Les deux cellules issues de la méiose I se divisent.<br>- Les chromatides sœurs se séparent.<br>- Quatre cellules haploïdes sont formées, génétiquement différentes.<br><br>La méiose est source de diversité génétique par le brassage interchromosomique et le crossing-over.</div>"
        },
        {
          "question": "<div style='color: #333;'>2) Décrire les étapes de la fécondation chez les mammifères.</div>",
          "reponse": "<div style='color: #333;'>La fécondation chez les mammifères se déroule en plusieurs étapes :<br><br>1. <strong>Rencontre des gamètes :</strong> Le spermatozoïde traverse les enveloppes de l'ovule (zone pellucide).<br>2. <strong>Pénétration du spermatozoïde :</strong> L'acrosome du spermatozoïde libère des enzymes qui lysent la zone pellucide.<br>3. <strong>Activation de l'ovule :</strong> La fusion des membranes déclenche une réaction corticale qui modifie la zone pellucide (blocage de la polyspermie).<br>4. <strong>Fusion des pronoyaux :</strong> Les pronoyaux mâle et femelle fusionnent, formant une cellule-œuf diploïde (zygote) à 2n chromosomes.</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE 3 : Génétique formelle",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p>Chez la drosophile, le corps gris (G) est dominant sur le corps noir (g). On croise des drosophiles mâles homozygotes gris avec des femelles noires.</p></div>",
      "questions": [
        {
          "question": "<div style='color: #333;'>1) Déterminer le génotype des parents et celui de la génération F1.</div>",
          "reponse": "<div style='color: #333;'>Parents :<br>- Mâle homozygote gris : GG<br>- Femelle noire : gg<br><br>Génération F1 :<br>- Tous les individus sont Gg (hétérozygotes) et ont un corps gris (phénotype dominant).</div>"
        },
        {
          "question": "<div style='color: #333;'>2) Croiser deux individus de la génération F1 entre eux. Quels seront les génotypes et les phénotypes de la génération F2 ? Donner les proportions.</div>",
          "reponse": "<div style='color: #333;'>Croisement F1 × F1 : Gg × Gg<br><br>Gamètes possibles : G et g pour chaque parent.<br><br>Échiquier de croisement :<br><table style='width:100%; border-collapse: collapse; text-align:center;'><tr><td style='padding: 5px; border: 1px solid #ddd;'></td><td style='padding: 5px; border: 1px solid #ddd; font-weight:bold;'>G</td><td style='padding: 5px; border: 1px solid #ddd; font-weight:bold;'>g</td></tr><tr><td style='padding: 5px; border: 1px solid #ddd; font-weight:bold;'>G</td><td style='padding: 5px; border: 1px solid #ddd;'>GG</td><td style='padding: 5px; border: 1px solid #ddd;'>Gg</td></tr><tr><td style='padding: 5px; border: 1px solid #ddd; font-weight:bold;'>g</td><td style='padding: 5px; border: 1px solid #ddd;'>Gg</td><td style='padding: 5px; border: 1px solid #ddd;'>gg</td></tr></table><br>Génotypes : 1/4 GG, 1/2 Gg, 1/4 gg<br>Phénotypes : 3/4 corps gris, 1/4 corps noir</div>"
        },
        {
          "question": "<div style='color: #333;'>3) Définir les notions d'allèle, de dominance et de récessivité utilisées dans cet exercice.</div>",
          "reponse": "<div style='color: #333;'><strong>Allèle :</strong> Chacune des formes alternatives d'un gène situé au même locus sur les chromosomes homologues (ex : G et g).<br><br><strong>Allèle dominant :</strong> Allèle qui s'exprime phénotypiquement à l'état hétérozygote (ex : G pour le corps gris).<br><br><strong>Allèle récessif :</strong> Allèle qui ne s'exprime phénotypiquement qu'à l'état homozygote (ex : g pour le corps noir).<br><br><strong>Hétérozygote :</strong> Individu possédant deux allèles différents d'un gène (Gg).<br><strong>Homozygote :</strong> Individu possédant deux allèles identiques d'un gène (GG ou gg).</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE 4 : Système immunitaire et santé",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p>L'organisme humain possède un système immunitaire capable de se défendre contre les agents pathogènes.</p><br><p><strong>Document :</strong> Schéma d'un lymphocyte B et d'un lymphocyte T.</p></div>",
      "questions": [
        {
          "question": "<div style='color: #333;'>1) Identifier les différentes cellules immunitaires (lymphocytes T, lymphocytes B, macrophages, plasmocytes) et préciser leur rôle.</div>",
          "reponse": "<div style='color: #333;'><strong>Cellules immunitaires :</strong><br><br><strong>Lymphocytes B :</strong> Cellules de l'immunité humorale. Elles produisent des anticorps après activation. Se différencient en plasmocytes.<br><br><strong>Plasmocytes :</strong> Cellules dérivées des lymphocytes B, spécialisées dans la production massive d'anticorps.<br><br><strong>Lymphocytes T :</strong> Cellules de l'immunité cellulaire. Incluent les lymphocytes T helpers (CD4+) qui activent d'autres cellules, et les lymphocytes T cytotoxiques (CD8+) qui détruisent les cellules infectées.<br><br><strong>Macrophages :</strong> Cellules phagocytaires qui ingèrent et détruisent les pathogènes, et agissent comme cellules présentatrices d'antigènes (CPA).</div>"
        },
        {
          "question": "<div style='color: #333;'>2) Distinguer la réponse immunitaire humorale de la réponse immunitaire cellulaire.</div>",
          "reponse": "<div style='color: #333;'><strong>Réponse immunitaire humorale :</strong><br>- Implique les lymphocytes B et les plasmocytes.<br>- Produit des anticorps (immunoglobulines) qui circulent dans le sang et la lymphe.<br>- Les anticorps se fixent sur les antigènes des agents pathogènes et forment des complexes immuns.<br>- Permet de neutraliser les agents pathogènes extracellulaires.<br><br><strong>Réponse immunitaire cellulaire :</strong><br>- Implique les lymphocytes T (CD4+ et CD8+).<br>- Les lymphocytes T helpers activent d'autres cellules immunitaires.<br>- Les lymphocytes T cytotoxiques détruisent les cellules infectées ou tumorales.<br>- Nécessite la présentation d'antigènes par les cellules présentatrices d'antigènes (CPA).<br>- Permet de lutter contre les infections intracellulaires (virus, certaines bactéries).</div>"
        },
        {
          "question": "<div style='color: #333;'>3) Expliquer le principe de la mémoire immunitaire et son exploitation dans la vaccination.</div>",
          "reponse": "<div style='color: #333;'><strong>Mémoire immunitaire :</strong><br><br>Lors d'une première rencontre avec un antigène, certains lymphocytes B et T se différencient en cellules mémoires. Ces cellules persistent dans l'organisme pendant des mois ou des années.<br><br>Lors d'une seconde rencontre avec le même antigène, la réponse immunitaire est plus rapide, plus forte et plus efficace. C'est la <strong>réponse immunitaire secondaire</strong>.<br><br><strong>Vaccination :</strong><br>La vaccination exploite la mémoire immunitaire. Elle consiste à introduire dans l'organisme un antigène atténué ou inactivé (vaccin) pour déclencher une réponse immunitaire primaire, sans provoquer la maladie. En cas de rencontre ultérieure avec l'agent pathogène, la réponse immunitaire secondaire permet de le neutraliser rapidement.</div>"

    },
    {
      "titre": "EXERCICE 5 : Régulation de la glycémie",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p>La glycémie est un paramètre strictement régulé chez l'humain. Un déséquilibre peut conduire à des pathologies comme le diabète.</p></div>",

        {

        },
        {
          "question": "<div style='color: #333;'>2) Distinguer le diabète de type 1 du diabète de type 2.</div>",
          "reponse": "<div style='color: #333;'><strong>Diabète de type 1 (insulino-dépendant) :</strong><br>- Maladie auto-immune : destruction des cellules β du pancréas.<br>- Production d'insuline absente ou très faible.<br>- Se manifeste généralement chez l'enfant ou l'adolescent.<br>- Nécessite des injections d'insuline à vie.<br><br><strong>Diabète de type 2 (insulinorésistant) :</strong><br>- Causes environnementales : alimentation déséquilibrée, sédentarité, obésité.<br>- Les cellules deviennent résistantes à l'insuline.<br>- Se manifeste généralement chez l'adulte après 40 ans.<br>- Traité par régime alimentaire, activité physique, et parfois médicaments (antidiabétiques oraux).</div>"

        {

          "reponse": "<div style='color: #333;'>La prévention du diabète de type 2 repose sur :<br><br>1. <strong>Alimentation équilibrée :</strong><br>- Réduire la consommation de sucres rapides et de graisses saturées.<br>- Augmenter la consommation de fruits, légumes, céréales complètes.<br><br>2. <strong>Activité physique régulière :</strong><br>- Au moins 30 minutes d'exercice modéré par jour (marche, natation, vélo).<br><br>3. <strong>Maintien d'un poids santé :</strong><br>- Éviter le surpoids et l'obésité.<br><br>4. <strong>Éviter l'alcool et le tabac :</strong><br>- L'alcool et le tabac augmentent le risque de développer un diabète de type 2.<br><br>5. <strong>Dépistage régulier :</strong><br>- Mesure de la glycémie à jeun chez les personnes à risque (antécédents familiaux, surpoids).</div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
