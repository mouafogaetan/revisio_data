<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux premiers secours",
    "contenu": "<div style='font-size: 1.1rem; line-height: 1.6; color: #333;'><p><strong>Objectif du cours :</strong> Apprendre les gestes qui sauvent en cas d'arrêt cardiaque.</p><p>L'<strong>arrêt cardiaque</strong> est une urgence vitale. En France, environ 50 000 personnes en sont victimes chaque année. Au Cameroun, comme ailleurs, la rapidité d'intervention est cruciale.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'><p style='margin:0;'><strong>💡 À retenir :</strong> Les premières minutes sont décisives. Chaque minute sans massage cardiaque diminue les chances de survie de 10%.</p></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid #ffc107;'><p style='margin:0;'><strong>🔑 La chaîne de survie :</strong> 1. Alerter → 2. Masser → 3. Défibriller → 4. Soins spécialisés</p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons aborder un sujet très important : les gestes de premiers secours en cas d'arrêt cardiaque. C'est une situation qui peut arriver à tout moment, et savoir réagir peut sauver une vie. Au Cameroun, les services d'urgence sont souvent éloignés, c'est pourquoi il est essentiel que nous sachions quoi faire en attendant l'arrivée des secours. Nous allons voir ensemble la chaîne de survie et les gestes qui sauvent.",
    "note": "Introduction aux premiers secours et à la chaîne de survie."
  },
  {
    "titre": "Reconnaître un arrêt cardiaque",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>Avant d'agir, il faut <strong>reconnaître</strong> les signes d'un arrêt cardiaque :</p> <div style='display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; justify-content: center;'> <div style='background: #f8d7da; padding: 15px; border-radius: 10px; flex: 1; min-width: 150px; border-left: 4px solid #dc3545;; color: #000000'> <h4 style='margin:0; color:#721c24;'>⚠️ Signes majeurs</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>😵 <strong>Inconscience</strong></li> <li style='margin: 8px 0;'>🫁 <strong>Absence de respiration</strong> ou respiration anormale (gasps)</li> <li style='margin: 8px 0;'>🩸 <strong>Absence de pouls</strong> (carotide)</li> </ul> </div> <div style='background: #fff3cd; padding: 15px; border-radius: 10px; flex: 1; min-width: 150px; border-left: 4px solid #ffc107;; color: #000000'> <h4 style='margin:0; color:#856404;'>🔍 Signes d'accompagnement</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>😰 Douleur thoracique (précédant l'arrêt)</li> <li style='margin: 8px 0;'>🥵 Pâleur ou cyanose (coloration bleutée)</li> <li style='margin: 8px 0;'>😫 Sudation excessive</li> </ul> </div> </div> <div style='background: #e3f2fd; padding: 12px; border-radius: 8px; margin-top: 10px;; color: #000000'> <p style='margin:0;'><strong>📌 Réflexe à adopter :</strong> Si une personne ne répond pas et ne respire pas normalement, il faut <strong>immédiatement</strong> considérer qu'il s'agit d'un arrêt cardiaque.</p> </div> </div>",
    "texteParle": "La première étape est de reconnaître un arrêt cardiaque. Les signes sont clairs : la personne est inconsciente, elle ne répond pas, elle ne respire pas normalement ou elle a une respiration anormale qu'on appelle gasps, et elle n'a pas de pouls. Il est important d'agir vite, car chaque seconde compte. Si vous avez un doute, il vaut mieux agir comme s'il s'agissait d'un arrêt cardiaque.",
    "note": "Reconnaître les signes d'un arrêt cardiaque."
  },
  {
    "titre": "Étape 1 : Alerter les secours",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>L'alerte est la première étape de la chaîne de survie.</p> <div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px;'> <div style='background: #e8f5e9; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#2e7d32;'>📞 Numéros d'urgence au Cameroun</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'><strong>Samu :</strong> 15 15</li> <li style='margin: 8px 0;'><strong>Pompiers :</strong> 18</li> <li style='margin: 8px 0;'><strong>Police :</strong> 17</li> </ul> </div> <div style='background: #f3e5f5; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#6a1b9a;'>📋 Informations à donner</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>📍 <strong>Lieu</strong> précis de l'accident</li> <li style='margin: 8px 0;'>🆘 <strong>Nature</strong> du problème (arrêt cardiaque)</li> <li style='margin: 8px 0;'>👤 <strong>État</strong> de la victime</li> <li style='margin: 8px 0;'>🔢 <strong>Numéro</strong> de téléphone joignable</li> </ul> </div> </div> <div style='background: #fff3cd; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffc107;; color: #000000'> <p style='margin:0;'><strong>💡 Conseil :</strong> Faire alerter par une autre personne si possible, pendant qu'on commence le massage cardiaque.</p> </div> </div>",
    "texteParle": "La première chose à faire est d'alerter les secours. Au Cameroun, vous pouvez composer le 15 15 pour le Samu, le 18 pour les pompiers ou le 17 pour la police. Il est important de donner des informations claires et précises : le lieu exact, la nature du problème, l'état de la victime et votre numéro de téléphone. Si possible, faites alerter par une autre personne pendant que vous commencez les gestes de secours.",
    "note": "Comment alerter les secours efficacement."
  },
  {
    "titre": "Étape 2 : Le massage cardiaque (1/2)",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>Le <strong>massage cardiaque</strong> est le geste le plus important. Il permet de maintenir une circulation sanguine minimale.</p> <div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px;'> <div style='background: #e3f2fd; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#1565c0;'>🖐️ Position des mains</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>👐 Paume d'une main au <strong>centre de la poitrine</strong></li> <li style='margin: 8px 0;'>🤲 Deuxième main <strong>par-dessus</strong></li> <li style='margin: 8px 0;'>🫴 Doigts <strong>entrelacés</strong></li> <li style='margin: 8px 0;'>💪 Bras <strong>tendus</strong></li> </ul> </div> <div style='background: #fce4ec; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#c62828;'>🔢 Rythme</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>⏱️ <strong>100 à 120</strong> compressions par minute</li> <li style='margin: 8px 0;'>📏 <strong>5 à 6 cm</strong> de profondeur</li> <li style='margin: 8px 0;'>🔄 <strong>30 compressions</strong> suivies de 2 insufflations</li> </ul> </div> </div> </div>",
    "texteParle": "Le massage cardiaque est le geste qui sauve. Pour le réaliser correctement, placez le talon d'une main au centre de la poitrine, entre les mamelons. Placez l'autre main par-dessus et entrelacez vos doigts. Gardez les bras tendus et utilisez le poids de votre corps pour appuyer. Vous devez comprimer la poitrine de 5 à 6 centimètres, à un rythme de 100 à 120 compressions par minute, ce qui correspond au rythme du morceau Staying Alive des Bee Gees.",
    "note": "Technique du massage cardiaque."
  },
  {
    "titre": "Étape 2 : Le massage cardiaque (2/2)",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>Détails supplémentaires pour un massage cardiaque efficace :</p> <div style='display: flex; flex-direction: column; gap: 15px; margin-top: 15px;'> <div style='background: #e8f5e9; padding: 12px; border-radius: 8px; border-left: 4px solid #2e7d32;; color: #000000'> <strong>✅ Points clés</strong> <span style='display:block; margin-top: 5px;'>✔️ Laisser la poitrine <strong>revenir à sa position initiale</strong> entre chaque compression.<br>✔️ Ne pas interrompre le massage plus de <strong>10 secondes</strong>.<br>✔️ Changer de personne toutes les <strong>2 minutes</strong> pour éviter la fatigue.</span> </div> <div style='background: #fff3e0; padding: 12px; border-radius: 8px; border-left: 4px solid #e65100;; color: #000000'> <strong>⚠️ Erreurs à éviter</strong> <span style='display:block; margin-top: 5px;'>❌ Ne pas appuyer sur le ventre.<br>❌ Ne pas poser les mains sur le bas du sternum.<br>❌ Ne pas plier les bras.<br>❌ Ne pas interrompre le massage pour vérifier le pouls.</span> </div> </div> <div style='background: #f3e5f5; padding: 12px; border-radius: 8px; margin-top: 10px;; color: #000000'> <p style='margin:0;'><strong>🎵 Conseil pratique :</strong> Compresser au rythme du morceau <em>\"Staying Alive\"</em> (100 bpm) ou de <em>\"Another One Bites the Dust\"</em> (110 bpm).</p> </div> </div>",
    "texteParle": "Quelques points importants pour un massage cardiaque efficace. Il faut laisser la poitrine remonter complètement entre chaque compression pour permettre au cœur de se remplir. Il ne faut pas interrompre le massage plus de 10 secondes, par exemple pour changer de personne toutes les deux minutes pour éviter la fatigue. Il faut éviter de poser les mains sur le ventre ou sur le bas du sternum, qui est un os fragile. Un petit conseil pratique : compressez au rythme de la chanson Staying Alive, cela vous donnera le bon rythme.",
    "note": "Conseils pratiques pour un massage cardiaque efficace."
  },
  {
    "titre": "La ventilation bouche-à-bouche",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>La <strong>ventilation bouche-à-bouche</strong> permet d'apporter de l'oxygène aux poumons de la victime.</p> <div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px;'> <div style='background: #e3f2fd; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#1565c0;'>📝 Procédure</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>1️⃣ <strong>Basculer</strong> la tête en arrière</li> <li style='margin: 8px 0;'>2️⃣ <strong>Pincer</strong> le nez</li> <li style='margin: 8px 0;'>3️⃣ <strong>Poser</strong> la bouche sur celle de la victime</li> <li style='margin: 8px 0;'>4️⃣ <strong>Souffler</strong> pendant 1 seconde</li> <li style='margin: 8px 0;'>5️⃣ <strong>Observer</strong> le soulèvement de la poitrine</li> </ul> </div> <div style='background: #fce4ec; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#c62828;'>⚠️ Précautions</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>🛡️ Utiliser un <strong>masque de poche</strong> si disponible</li> <li style='margin: 8px 0;'>❌ Ne pas souffler trop fort (risque de lésion pulmonaire)</li> <li style='margin: 8px 0;'>🔄 Alterner avec le massage (30:2)</li> </ul> </div> </div> <div style='background: #fff3cd; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffc107;; color: #000000'> <p style='margin:0;'><strong>💡 En cas de doute :</strong> Si vous ne souhaitez pas faire le bouche-à-bouche, faites uniquement le <strong>massage cardiaque</strong>. Il est toujours plus efficace qu'une inaction.</p> </div> </div>",
    "texteParle": "La ventilation bouche-à-bouche est parfois nécessaire, surtout chez les enfants ou les noyés. La procédure est simple : basculez la tête en arrière pour dégager les voies respiratoires, pincez le nez, posez votre bouche sur celle de la victime et soufflez pendant une seconde. Vous devez voir la poitrine se soulever. Si vous ne vous sentez pas à l'aise, vous pouvez faire uniquement le massage cardiaque. Un massage est toujours mieux que rien !",
    "note": "Technique du bouche-à-bouche."
  },
  {
    "titre": "Étape 3 : Le défibrillateur externe automatisé (DEA)",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>Le <strong>défibrillateur externe automatisé (DEA)</strong> est un appareil qui peut sauver des vies. Au Cameroun, on en trouve dans certains lieux publics (aéroports, stades, grands magasins).</p> <div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px;'> <div style='background: #e8f5e9; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#2e7d32;'>📱 Utilisation du DEA</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>🔘 <strong>Allumer</strong> l'appareil</li> <li style='margin: 8px 0;'>🔌 <strong>Poser</strong> les électrodes sur la poitrine nue</li> <li style='margin: 8px 0;'>🤖 Suivre les <strong>instructions vocales</strong></li> <li style='margin: 8px 0;'>⚡ <strong>Ne pas toucher</strong> la victime lors du choc</li> </ul> </div> <div style='background: #fff3e0; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#e65100;'>✅ Règles d'or</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>🛡️ Le DEA est <strong>sécurisé</strong> : il ne délivre un choc que si nécessaire</li> <li style='margin: 8px 0;'>👶 Utilisable sur les enfants avec des électrodes spécifiques</li> <li style='margin: 8px 0;'>🔄 Continuer le massage entre les chocs</li> </ul> </div> </div> </div>",
    "texteParle": "Le défibrillateur externe automatisé, ou DEA, est un appareil qui peut analyser le rythme cardiaque et délivrer un choc électrique si nécessaire. Il est très simple d'utilisation : il suffit de l'allumer, de suivre les instructions vocales et de poser les électrodes sur la poitrine nue de la victime. Le DEA est sécurisé, il ne délivre un choc que si le cœur en a besoin. Il faut continuer le massage entre les chocs. Au Cameroun, ces appareils se développent dans les lieux publics.",
    "note": "Utilisation du défibrillateur externe automatisé (DEA)."
  },
  {
    "titre": "La position latérale de sécurité (PLS)",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>La <strong>position latérale de sécurité (PLS)</strong> est utilisée lorsque la victime reprend conscience ou lorsqu'on doit laisser une personne inconsciente qui respire.</p> <div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px;'> <div style='background: #e3f2fd; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#1565c0;'>📝 Procédure</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>1️⃣ Mettre le bras de la victime <strong>à angle droit</strong></li> <li style='margin: 8px 0;'>2️⃣ Placer l'autre bras <strong>sur le côté</strong></li> <li style='margin: 8px 0;'>3️⃣ <strong>Fléchir</strong> le genou opposé</li> <li style='margin: 8px 0;'>4️⃣ <strong>Tourner</strong> la victime en la tirant par le genou</li> <li style='margin: 8px 0;'>5️⃣ <strong>Ouvrir</strong> la bouche pour faciliter la respiration</li> </ul> </div> <div style='background: #fce4ec; padding: 15px; border-radius: 10px; flex: 1; min-width: 200px;; color: #000000'> <h4 style='margin:0; color:#c62828;'>✅ Pourquoi la PLS ?</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>🫁 Permet une bonne <strong>respiration</strong></li> <li style='margin: 8px 0;'>🔄 Évite l'<strong>étouffement</strong> par les vomissements</li> <li style='margin: 8px 0;'>🛡️ <strong>Surveillance</strong> facile de la respiration</li> </ul> </div> </div> </div>",
    "texteParle": "La position latérale de sécurité est utilisée lorsqu'une personne est inconsciente mais respire normalement. Cette position permet de maintenir les voies respiratoires dégagées et d'éviter que la victime ne s'étouffe avec ses vomissements. La procédure est simple : placez le bras de la victime à angle droit, pliez le genou opposé, puis tournez-la en la tirant par ce genou. Ouvrez la bouche pour faciliter la respiration. Surveillez ensuite sa respiration en attendant les secours.",
    "note": "Technique de la position latérale de sécurité (PLS)."
  },
  {
    "titre": "Schéma-bilan des gestes de premiers secours",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #dee2e6;'> <div style='display: flex; flex-direction: column; align-items: center;'> <div style='background: #e9ecef; padding: 10px 20px; border-radius: 20px; margin: 5px; width: 100%; text-align: center;; color: #000000'><strong>🆘 1. Vérifier et alerter</strong><br><span style='font-size:0.9rem;'>Inconscience ? Absence de respiration ? → Alerter les secours</span></div> <div style='font-size: 1.5rem; margin: 5px 0;'>⬇️</div> <div style='background: #ffc107; padding: 10px 20px; border-radius: 20px; margin: 5px; width: 100%; text-align: center; color:#333;'><strong>❤️ 2. Masser</strong><br><span style='font-size:0.9rem;'>30 compressions (5-6 cm, 100-120/min) → 2 insufflations</span></div> <div style='font-size: 1.5rem; margin: 5px 0;'>⬇️</div> <div style='background: #28a745; padding: 10px 20px; border-radius: 20px; margin: 5px; width: 100%; text-align: center; color:#fff;'><strong>⚡ 3. Défibriller</strong><br><span style='font-size:0.9rem;'>Utiliser un DEA si disponible, suivre les instructions</span></div> <div style='font-size: 1.5rem; margin: 5px 0;'>⬇️</div> <div style='background: #17a2b8; padding: 10px 20px; border-radius: 20px; margin: 5px; width: 100%; text-align: center; color:#fff;'><strong>🛡️ 4. Attendre les secours</strong><br><span style='font-size:0.9rem;'>Surveiller, continuer le massage si nécessaire</span></div> </div> </div>",
    "texteParle": "Pour résumer, la chaîne de survie se déroule en quatre étapes. D'abord, on vérifie l'état de la victime et on alerte les secours. Ensuite, on commence le massage cardiaque avec 30 compressions suivies de 2 insufflations. Si un défibrillateur est disponible, on le met en place et on suit ses instructions. Enfin, on attend les secours en continuant les gestes si nécessaire. Cette chaîne est votre meilleure chance de sauver une vie.",
    "note": "Schéma récapitulatif des gestes de premiers secours."
  },
  {
    "titre": "Cas particuliers : enfants et nourrissons",
    "contenu": "<div style='color:#333;'> <p style='font-size: 1rem; line-height: 1.6;'>Les gestes de premiers secours sont <strong>adaptés</strong> pour les enfants et les nourrissons.</p> <div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px;'> <div style='background: #e3f2fd; padding: 15px; border-radius: 10px; flex: 1; min-width: 150px;; color: #000000'> <h4 style='margin:0; color:#1565c0;'>👶 Nourrisson</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>🖐️ 2 doigts pour le massage</li> <li style='margin: 8px 0;'>📏 4 cm de profondeur</li> <li style='margin: 8px 0;'>🫁 Bouche sur nez et bouche</li> </ul> </div> <div style='background: #fce4ec; padding: 15px; border-radius: 10px; flex: 1; min-width: 150px;; color: #000000'> <h4 style='margin:0; color:#c62828;'>🧒 Enfant (1-8 ans)</h4> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin: 8px 0;'>🖐️ 1 main pour le massage</li> <li style='margin: 8px 0;'>📏 5 cm de profondeur</li> <li style='margin: 8px 0;'>🫁 Bouche-à-bouche normal</li> </ul> </div> </div> <div style='background: #fff3cd; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffc107;; color: #000000'> <p style='margin:0;'><strong>💡 À retenir :</strong> Les gestes sur les enfants sont <strong>moins forts</strong> que sur les adultes. Ne pas appuyer trop fort pour éviter les fractures.</p> </div> </div>",
    "texteParle": "Les gestes de premiers secours sont différents pour les enfants et les nourrissons. Chez le nourrisson, on utilise deux doigts pour le massage, on appuie moins profondément et on fait le bouche-à-bouche en couvrant à la fois le nez et la bouche. Chez l'enfant de 1 à 8 ans, on utilise une main et on appuie à 5 centimètres de profondeur. Il faut toujours être moins fort que chez l'adulte pour éviter de blesser l'enfant.",
    "note": "Adaptation des gestes de premiers secours pour les enfants."
  },
  {
    "titre": "QCM : Testez vos connaissances",
    "contenu": "<div style='color:#333;'><p><strong>Question 1 :</strong> Quelle est la première chose à faire en cas d'arrêt cardiaque ?</p><div id='qcm1' style='margin-bottom: 20px;'><button onclick='checkAnswer(\"qcm1\", \"alerter\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>A) Commencer immédiatement le massage cardiaque</button><button onclick='checkAnswer(\"qcm1\", \"alerter\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>B) Alerter les secours</button><button onclick='checkAnswer(\"qcm1\", \"alerter\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>C) Mettre la victime en PLS</button><button onclick='checkAnswer(\"qcm1\", \"alerter\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>D) Donner de l'eau à la victime</button></div><p><strong>Question 2 :</strong> Quelle est la bonne position des mains pour le massage cardiaque ?</p><div id='qcm2' style='margin-bottom: 20px;'><button onclick='checkAnswer(\"qcm2\", \"centre\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>A) Sur le ventre</button><button onclick='checkAnswer(\"qcm2\", \"centre\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>B) Au centre de la poitrine, entre les mamelons</button><button onclick='checkAnswer(\"qcm2\", \"centre\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>C) Sur le bas du sternum</button><button onclick='checkAnswer(\"qcm2\", \"centre\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>D) Sur le cou</button></div><p><strong>Question 3 :</strong> À quelle fréquence faut-il comprimer la poitrine lors d'un massage cardiaque ?</p><div id='qcm3' style='margin-bottom: 20px;'><button onclick='checkAnswer(\"qcm3\", \"100-120\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>A) 50-60 compressions par minute</button><button onclick='checkAnswer(\"qcm3\", \"100-120\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>B) 100-120 compressions par minute</button><button onclick='checkAnswer(\"qcm3\", \"100-120\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>C) 150-160 compressions par minute</button><button onclick='checkAnswer(\"qcm3\", \"100-120\")' style='display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; background:#f9f9f9;; color: #000000'>D) 30-40 compressions par minute</button></div><script>function checkAnswer(qcmId, correctAnswer) { const buttons = document.getElementById(qcmId).getElementsByTagName('button'); for (let btn of buttons) { btn.style.borderColor = '#ccc'; btn.style.backgroundColor = '#f9f9f9'; if (btn.innerText.toLowerCase().includes(correctAnswer.toLowerCase())) { btn.style.borderColor = 'green'; btn.style.backgroundColor = '#d4edda'; } else { btn.style.borderColor = 'red;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
