<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='font-size:1.1em; line-height:1.8; color:#333;'>   <p style='font-weight:bold;'>À la fin de cette leçon, vous serez capables de :</p>   <ul style='list-style-type:disc; padding-left:20px;'>     <li><span style='background:#e8f0fe; padding:3px 8px; border-radius:12px;; color: #000000'>✅</span> Schématiser l'organisation du sarcomère.</li>     <li><span style='background:#e8f0fe; padding:3px 8px; border-radius:12px;; color: #000000'>✅</span> Expliquer le mécanisme de glissement des filaments.</li>     <li><span style='background:#e8f0fe; padding:3px 8px; border-radius:12px;; color: #000000'>✅</span> Décrire le rôle de l'ATP et du calcium dans la contraction.</li>     <li><span style='background:#e8f0fe; padding:3px 8px; border-radius:12px;; color: #000000'>✅</span> Comprendre les étapes de la contraction musculaire.</li>   </ul>   <div style='margin-top:20px; background:#f0f8ff; padding:15px; border-radius:10px; border-left:6px solid #2c3e50;; color: #000000'>     <p style='margin:0; font-style:italic;'>🔑 La contraction musculaire est un phénomène complexe qui fait intervenir des filaments protéiques, des ions calcium et de l'énergie.</p>   </div> </div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons découvrir comment fonctionne la contraction musculaire. Nous verrons l'organisation du muscle, le mécanisme de glissement des filaments, le rôle de l'ATP et du calcium, et les différentes étapes de la contraction.",
    "note": "Objectif : Comprendre les mécanismes moléculaires de la contraction musculaire."
  },
  {
    "titre": "Structure du muscle strié squelettique",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>🔬 Organisation hiérarchique du muscle</p>   </div>   <div style='margin-top:15px;'>     <div style='display:flex; flex-wrap:wrap; gap:10px;'>       <div style='flex:1; min-width:150px; background:#e8f5e9; padding:12px; border-radius:8px;; color: #000000'>         <strong>Muscle</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Organe composé de faisceaux</p>       </div>       <div style='flex:1; min-width:150px; background:#e3f2fd; padding:12px; border-radius:8px;; color: #000000'>         <strong>Faisceau</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Ensemble de fibres musculaires</p>       </div>       <div style='flex:1; min-width:150px; background:#fff3e0; padding:12px; border-radius:8px;; color: #000000'>         <strong>Fibre musculaire</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Cellule musculaire (myocyte)</p>       </div>     </div>     <div style='display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;'>       <div style='flex:1; min-width:150px; background:#f3e5f5; padding:12px; border-radius:8px;; color: #000000'>         <strong>Myofibrille</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Structure contractile dans la fibre</p>       </div>       <div style='flex:1; min-width:150px; background:#ffebee; padding:12px; border-radius:8px;; color: #000000'>         <strong>Sarcomère</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Unité fonctionnelle de la myofibrille</p>       </div>     </div>   </div>   <div style='margin-top:15px; background:#fff8e1; padding:12px; border-radius:8px; text-align:center;; color: #000000'>     <p style='margin:0;'>📌 Le sarcomère est l'unité de base de la contraction musculaire.</p>   </div> </div>",
    "texteParle": "Le muscle strié squelettique est organisé de manière hiérarchique. Le muscle est composé de faisceaux, qui contiennent des fibres musculaires. Chaque fibre est une cellule contenant des myofibrilles. La myofibrille est constituée de sarcomères, qui sont les unités fonctionnelles de la contraction. Le sarcomère est donc l'unité de base de la contraction musculaire.",
    "note": "Organisation du muscle : muscle → faisceau → fibre → myofibrille → sarcomère."
  },
  {
    "titre": "Le sarcomère : unité fonctionnelle",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>🧬 Structure du sarcomère</p>   </div>   <div style='margin-top:15px;'>     <div style='display:flex; flex-wrap:wrap; gap:10px;'>       <div style='flex:1; min-width:200px; background:#e8f5e9; padding:12px; border-radius:8px;; color: #000000'>         <strong>📏 Lignes Z</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Délimitent les sarcomères, zones d'ancrage des filaments fins.</p>       </div>       <div style='flex:1; min-width:200px; background:#e3f2fd; padding:12px; border-radius:8px;; color: #000000'>         <strong>🧵 Filaments fins (actine)</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Constitués d'actine, de troponine et de tropomyosine.</p>       </div>       <div style='flex:1; min-width:200px; background:#fff3e0; padding:12px; border-radius:8px;; color: #000000'>         <strong>🧵 Filaments épais (myosine)</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Constitués de myosine avec des têtes (ponts croisés).</p>       </div>     </div>     <div style='display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;'>       <div style='flex:1; min-width:200px; background:#f3e5f5; padding:12px; border-radius:8px;; color: #000000'>         <strong>🔴 Bande A</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Zone des filaments épais (myosine).</p>       </div>       <div style='flex:1; min-width:200px; background:#ffebee; padding:12px; border-radius:8px;; color: #000000'>         <strong>🔵 Bande I</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Zone des filaments fins uniquement (actine).</p>       </div>       <div style='flex:1; min-width:200px; background:#fff8e1; padding:12px; border-radius:8px;; color: #000000'>         <strong>⚪ Ligne M</strong>         <p style='margin:3px 0 0 0; font-size:0.9em;'>Centre du sarcomère, au milieu des filaments épais.</p>       </div>     </div>   </div> </div>",
    "texteParle": "Le sarcomère est délimité par les lignes Z. Il contient des filaments fins d'actine et des filaments épais de myosine. La bande A correspond à la zone des filaments épais, la bande I à la zone des filaments fins uniquement. La ligne M est au centre du sarcomère. Pendant la contraction, les filaments glissent les uns sur les autres, ce qui rapproche les lignes Z et raccourcit le sarcomère.",
    "note": "Le sarcomère : lignes Z, filaments d'actine et de myosine."
  },
  {
    "titre": "Les filaments protéiques",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>🧬 Filaments fins et épais</p>   </div>   <div style='margin-top:15px;'>     <div style='background:#e8f5e9; padding:15px; border-radius:10px; margin-bottom:10px;; color: #000000'>       <strong>📌 Filaments fins (actine)</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li><strong>Actine :</strong> Protéine globulaire (monomères G-actine).</li>         <li><strong>Tropomyosine :</strong> Protéine allongée qui recouvre les sites de fixation sur l'actine.</li>         <li><strong>Troponine :</strong> Complexe protéique qui fixe le calcium.</li>       </ul>     </div>     <div style='background:#fff3e0; padding:15px; border-radius:10px;; color: #000000'>       <strong>📌 Filaments épais (myosine)</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li><strong>Myosine :</strong> Protéine en forme de tige avec des têtes globulaires.</li>         <li><strong>Tête de myosine :</strong> Site actif qui se fixe à l'actine (ponts croisés).</li>         <li>La tête de myosine possède une activité ATPase.</li>       </ul>     </div>   </div>   <div style='margin-top:15px; background:#fff8e1; padding:12px; border-radius:8px; text-align:center;; color: #000000'>     <p style='margin:0;'>💡 Les têtes de myosine sont responsables de la formation des ponts croisés avec l'actine.</p>   </div> </div>",
    "texteParle": "Les filaments fins sont constitués d'actine, de tropomyosine et de troponine. La troponine est le récepteur du calcium. Les filaments épais sont constitués de myosine, avec des têtes globulaires qui portent des sites actifs pour la fixation à l'actine. Ces têtes possèdent une activité ATPase, qui permet de libérer l'énergie nécessaire à la contraction.",
    "note": "Actine + tropomyosine + troponine / Myosine + têtes ATPase."
  },
  {
    "titre": "Le mécanisme de glissement des filaments",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>⚡ Théorie des filaments glissants</p>   </div>   <div style='margin-top:15px;'>     <div style='background:#e8f5e9; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>Principe :</strong>       <p style='margin:5px 0 0 0;'>Les filaments fins (actine) glissent sur les filaments épais (myosine), sans changer de longueur.</p>     </div>     <div style='background:#fff3e0; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>Conséquences sur le sarcomère :</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li>La <strong>bande I</strong> diminue (filaments fins avancent vers le centre).</li>         <li>La <strong>bande A</strong> reste constante (filaments épais ne changent pas de taille).</li>         <li>La <strong>ligne Z</strong> se rapproche de la ligne M (sarcomère se raccourcit).</li>       </ul>     </div>     <div style='background:#ffebee; padding:12px; border-radius:8px;; color: #000000'>       <strong>Résultat :</strong>       <p style='margin:5px 0 0 0;'>Le sarcomère se raccourcit, ce qui raccourcit la fibre et provoque la contraction du muscle.</p>     </div>   </div> </div>",
    "texteParle": "La théorie des filaments glissants explique la contraction musculaire. Les filaments fins d'actine glissent sur les filaments épais de myosine, sans changer de longueur. Pendant cette glissement, la bande I diminue, la bande A reste constante, et les lignes Z se rapprochent. Le sarcomère se raccourcit, ce qui provoque la contraction du muscle.",
    "note": "Glissement des filaments → raccourcissement du sarcomère."
  },
  {
    "titre": "Le rôle du calcium dans la contraction",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>🔬 Rôle du calcium (Ca²⁺)</p>   </div>   <div style='margin-top:15px;'>     <div style='background:#e8f5e9; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>Origine du Ca²⁺ :</strong>       <p style='margin:5px 0 0 0;'>Libéré par le réticulum sarcoplasmique (RS) lors de l'arrivée du potentiel d'action.</p>     </div>     <div style='background:#fff3e0; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>Mécanisme :</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li>Le Ca²⁺ se fixe sur la <strong>troponine</strong> (sous-unité TnC).</li>         <li>Cette fixation modifie la conformation de la tropomyosine.</li>         <li>La tropomyosine se déplace, démasquant les sites de fixation sur l'actine.</li>       </ul>     </div>     <div style='background:#ffebee; padding:12px; border-radius:8px;; color: #000000'>       <strong>Conséquence :</strong>       <p style='margin:5px 0 0 0;'>Les têtes de myosine peuvent se fixer à l'actine et former des ponts croisés.</p>     </div>   </div> </div>",
    "texteParle": "Le calcium joue un rôle clé dans la contraction. Il est libéré par le réticulum sarcoplasmique lors de l'arrivée d'un potentiel d'action. Le calcium se fixe sur la troponine, ce qui modifie la conformation de la tropomyosine. La tropomyosine se déplace alors, démasquant les sites de fixation sur l'actine. Les têtes de myosine peuvent alors se fixer à l'actine et former des ponts croisés.",
    "note": "Ca²⁺ → fixation sur troponine → démasquage des sites actine."
  },
  {
    "titre": "Le cycle des ponts croisés",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>🔄 Cycle des ponts croisés (cycle ATP)</p>   </div>   <div style='margin-top:15px;'>     <div style='display:flex; flex-direction:column; gap:8px;'>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#1565c0; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>1</span>         <div style='flex:1; background:#e3f2fd; padding:10px; border-radius:8px;; color: #000000'>           <strong>Fixation d'ATP</strong>           <p style='margin:3px 0 0 0;'>Sur la tête de myosine → détachement du pont croisé.</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#2e7d32; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>2</span>         <div style='flex:1; background:#e8f5e9; padding:10px; border-radius:8px;; color: #000000'>           <strong>Hydrolyse d'ATP</strong>           <p style='margin:3px 0 0 0;'>ATP → ADP + Pi (énergie) → tête de myosine en position haute.</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#e65100; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>3</span>         <div style='flex:1; background:#fff3e0; padding:10px; border-radius:8px;; color: #000000'>           <strong>Fixation du pont croisé</strong>           <p style='margin:3px 0 0 0;'>Tête de myosine se lie à l'actine (site démasqué).</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#6a1b9a; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>4</span>         <div style='flex:1; background:#f3e5f5; padding:10px; border-radius:8px;; color: #000000'>           <strong>Power stroke (coup de force)</strong>           <p style='margin:3px 0 0 0;'>Tête de myosine pivote → glissement de l'actine (libération de Pi).</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#c62828; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>5</span>         <div style='flex:1; background:#ffebee; padding:10px; border-radius:8px;; color: #000000'>           <strong>Libération d'ADP</strong>           <p style='margin:3px 0 0 0;'>Retour à l'étape 1 (fixation d'un nouvel ATP).</p>         </div>       </div>     </div>   </div> </div>",
    "texteParle": "Le cycle des ponts croisés est un cycle qui nécessite de l'ATP. Il commence par la fixation d'ATP sur la tête de myosine, qui provoque le détachement du pont croisé. L'hydrolyse d'ATP en ADP et phosphate fournit de l'énergie pour que la tête de myosine se positionne. La tête de myosine se fixe alors à l'actine. Le coup de force (power stroke) fait pivoter la tête de myosine, provoquant le glissement de l'actine. La libération d'ADP permet le retour au début du cycle.",
    "note": "Cycle ATP : fixation, hydrolyse, fixation croisée, power stroke, libération."
  },
  {
    "titre": "Rôle de l'ATP dans la contraction",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>⚡ L'ATP, source d'énergie de la contraction</p>   </div>   <div style='margin-top:15px;'>     <div style='background:#e8f5e9; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>Rôles de l'ATP :</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li>Fournir l'énergie pour le <strong>power stroke</strong> (glissement).</li>         <li>Permettre le <strong>détachement</strong> des ponts croisés.</li>         <li>Alimenter la <strong>pompe à calcium</strong> (Ca²⁺-ATPase) du réticulum sarcoplasmique.</li>       </ul>     </div>     <div style='background:#fff3e0; padding:12px; border-radius:8px;; color: #000000'>       <strong>Origine de l'ATP :</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li>Phosphocréatine (réserve rapide).</li>         <li>Glycolyse (anaérobie).</li>         <li>Phosphorylation oxydative (mitochondries, aérobie).</li>       </ul>     </div>   </div>   <div style='margin-top:15px; background:#ffebee; padding:12px; border-radius:8px; text-align:center;; color: #000000'>     <p style='margin:0;'>⚠️ Sans ATP, les ponts croisés restent fixés → <strong>rigidité cadavérique</strong>.</p>   </div> </div>",
    "texteParle": "L'ATP est la source d'énergie de la contraction musculaire. Il joue trois rôles principaux : fournir l'énergie pour le power stroke (glissement), permettre le détachement des ponts croisés, et alimenter la pompe à calcium du réticulum sarcoplasmique. L'ATP provient de la phosphocréatine, de la glycolyse et de la phosphorylation oxydative. Sans ATP, les ponts croisés restent fixés, ce qui provoque la rigidité cadavérique.",
    "note": "ATP : power stroke, détachement des ponts, pompe à calcium."
  },
  {
    "titre": "La relaxation musculaire",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>🔄 La relaxation : retour à l'état de repos</p>   </div>   <div style='margin-top:15px;'>     <div style='background:#e8f5e9; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>1. Arrêt du stimulus nerveux :</strong>       <p style='margin:5px 0 0 0;'>Le potentiel d'action cesse d'arriver au muscle.</p>     </div>     <div style='background:#fff3e0; padding:12px; border-radius:8px; margin-bottom:8px;; color: #000000'>       <strong>2. Reprise du Ca²⁺ :</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li>Le Ca²⁺ est repompé dans le réticulum sarcoplasmique par la <strong>pompe Ca²⁺-ATPase</strong>.</li>         <li>La concentration de Ca²⁺ cytosolique diminue.</li>       </ul>     </div>     <div style='background:#ffebee; padding:12px; border-radius:8px;; color: #000000'>       <strong>3. Blocage des sites actine :</strong>       <ul style='margin:5px 0 0 0; padding-left:18px;'>         <li>Le Ca²⁺ se détache de la troponine.</li>         <li>La tropomyosine revient bloquer les sites de fixation sur l'actine.</li>         <li>Les ponts croisés se détachent → relaxation.</li>       </ul>     </div>   </div> </div>",
    "texteParle": "La relaxation musculaire se produit lorsque le stimulus nerveux cesse. Le calcium est alors repompé dans le réticulum sarcoplasmique par la pompe Ca²⁺-ATPase. La concentration en calcium cytosolique diminue, le calcium se détache de la troponine, et la tropomyosine revient bloquer les sites de fixation sur l'actine. Les ponts croisés se détachent, et le muscle se relâche.",
    "note": "Relaxation : arrêt stimulus → pompage Ca²⁺ → blocage sites actine."
  },
  {
    "titre": "Résumé du mécanisme de contraction",
    "contenu": "<div style='font-size:1em; line-height:1.8; color:#333;'>   <div style='background:#e3f2fd; padding:15px; border-radius:10px;; color: #000000'>     <p style='font-weight:bold; margin:0;'>📋 Étapes de la contraction musculaire</p>   </div>   <div style='margin-top:15px;'>     <div style='display:flex; flex-direction:column; gap:8px;'>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#1565c0; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>1</span>         <div style='flex:1; background:#e3f2fd; padding:10px; border-radius:8px;; color: #000000'>           <strong>Arrivée du potentiel d'action</strong>           <p style='margin:3px 0 0 0;'>Au niveau de la plaque motrice.</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#2e7d32; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>2</span>         <div style='flex:1; background:#e8f5e9; padding:10px; border-radius:8px;; color: #000000'>           <strong>Libération du Ca²⁺</strong>           <p style='margin:3px 0 0 0;'>Du réticulum sarcoplasmique.</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#e65100; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>3</span>         <div style='flex:1; background:#fff3e0; padding:10px; border-radius:8px;; color: #000000'>           <strong>Fixation Ca²⁺ sur troponine</strong>           <p style='margin:3px 0 0 0;'>Déplacement de la tropomyosine.</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#6a1b9a; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>4</span>         <div style='flex:1; background:#f3e5f5; padding:10px; border-radius:8px;; color: #000000'>           <strong>Formation des ponts croisés</strong>           <p style='margin:3px 0 0 0;'>Tête de myosine + actine.</p>         </div>       </div>       <div style='display:flex; align-items:center; gap:10px;'>         <span style='background:#c62828; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold;'>5</span>         <div style='flex:1; background:#ffebee; padding:10px; border-radius:8px;; color: #000000'>           <strong>Glissement des filaments</strong>           <p style='margin:3px 0 0 0;'>Power stroke → contraction.</p>         </div>       </div>     </div>   </div> </div>",
    "texteParle": "La contraction musculaire se déroule en cinq étapes. D'abord, l'arrivée du potentiel d'action au niveau de la plaque motrice. Ensuite, la libération du calcium par le réticulum sarcoplasmique. Puis la fixation du calcium sur la troponine, qui provoque le déplacement de la tropomyosine. Ensuite, la formation des ponts croisés entre la myosine et l'actine. Enfin, le glissement des filaments (power stroke), qui provoque la contraction.",
    "note": "5 étapes : PA → Ca²⁺ → troponine → ponts croisés → glissement."
  },
  {
    "titre": "Conclusion et notions clés",
    "contenu": "<div style='font-size:1.1em; line-height:1.8; text-align:center; color:#333;'>   <p style='font-weight:bold;'>📌 Notions clés à retenir</p>   <div style='background:#f0f8ff; padding:20px; border-radius:15px; text-align:left;; color: #000000'>     <p style='margin:5px 0;'>✅ Le sarcomère est l'unité de base de la contraction.</p>     <p style='margin:5px 0;'>✅ La contraction repose sur le glissement des filaments d'actine sur la myosine.</p>     <p style='margin:5px 0;'>✅ Le Ca²⁺ est le messager qui déclenche la contraction (fixation sur troponine).</p>     <p style='margin:5px 0;'>✅ L'ATP est la source d'énergie (power stroke, détachement, pompe à Ca²⁺).</p>     <p style='margin:5px 0;'>✅ La relaxation survient quand le Ca²⁺ est repompé dans le réticulum sarcoplasmique.</p>   </div>   <div style='margin-top:20px; background:#e;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
