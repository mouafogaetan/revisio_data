<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;

        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;

            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {

    }

    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;

    }
    .btn-play {

    }

</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Racines n-ièmes d'un complexe",
    "contenu": "<div style='padding: 15px; text-align: center;'><h2 style='color: #2c3e50;'>🔢 Racines n-ièmes d'un Nombre Complexe</h2><p style='font-size: 1.1em; color: #34495e;'>Leçon 17 - Nombres complexes (approche géométrique)</p><hr style='width: 50%; margin: 20px auto; border-color: #3498db;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-top: 15px;'><p style='font-weight: bold; color: #1a5276;'>🎯 Objectifs :</p><ul style='list-style: none; padding: 0; text-align: left; color: #2c3e50;'><li>• Déterminer les racines n-ièmes d'un nombre complexe</li><li>• Utiliser la notation exponentielle pour les racines</li><li>• Représenter géométriquement les racines dans le plan complexe</li></ul></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #f1c40f;'><p style='margin: 0; color: #7d6608;'>📌 <strong>À retenir :</strong> Les racines n-ièmes d'un complexe forment un polygone régulier à n sommets.</p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons étudier les racines n-ièmes d'un nombre complexe. Cette notion est fondamentale pour résoudre des équations complexes et pour comprendre la structure des nombres complexes. Nous verrons comment déterminer ces racines en utilisant la forme exponentielle, et nous les représenterons géométriquement dans le plan complexe. Les racines forment un polygone régulier, ce qui donne une interprétation géométrique très élégante.",
    "note": "Objectif : Déterminer et représenter les racines n-ièmes d'un nombre complexe."
  },
  {
    "titre": "Définition des racines n-ièmes",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>📝 Définition</h3><div style='background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><p><strong>Définition :</strong> Soit \\(Z\\) un nombre complexe non nul et \\(n \\in \\mathbb{N}^*\\).</p><p>On appelle <strong>racines n-ièmes</strong> de \\(Z\\) les nombres complexes \\(z\\) tels que :</p><div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math-block'><div class='math'>$$z^n = Z$$</div></div></div><p><strong>Cas particuliers :</strong></p><ul><li>Si \\(Z = 0\\), la seule racine est \\(0\\).</li><li>Si \\(n = 2\\), on parle des racines carrées.</li><li>Si \\(n = 3\\), on parle des racines cubiques.</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #f1c40f;'><p style='color: #7d6608;'>💡 <strong>Remarque :</strong> Tout complexe non nul possède exactement \\(n\\) racines n-ièmes distinctes.</p></div></div>",
    "texteParle": "Commençons par la définition. Soit Z un nombre complexe non nul et n un entier naturel non nul. On appelle racines n-ièmes de Z les nombres complexes z qui vérifient z puissance n égale Z. Par exemple, pour n égal 2, on retrouve les racines carrées que vous connaissez déjà dans les réels. Pour n égal 3, ce sont les racines cubiques. Une propriété importante est que tout nombre complexe non nul possède exactement n racines n-ièmes distinctes. C'est une différence majeure avec les nombres réels où une racine carrée d'un nombre négatif n'existe pas.",
    "note": "Définition : z^n = Z. Tout complexe non nul a n racines n-ièmes."
  },
  {
    "titre": "Formule des racines n-ièmes",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>📐 Formule des racines n-ièmes</h3><div style='background-color: #f4ecf7; padding: 15px; border-radius: 8px;'><p><strong>Théorème :</strong></p><p>Soit \\(Z = \\rho e^{i\\theta}\\) avec \\(\\rho > 0\\) et \\(\\theta \\in \\mathbb{R}\\).</p><p>Les \\(n\\) racines n-ièmes de \\(Z\\) sont données par :</p><div style='background-color: #e8daef; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math-block'><div class='math'>$$z_k = \\rho^{1/n} e^{i\\left(\\frac{\\theta + 2k\\pi}{n}\\right)}$$</div></div><p>pour \\(k = 0, 1, 2, \\dots, n-1\\).</p></div><p><strong>Interprétation :</strong></p><ul><li>Le module commun est \\(\\rho^{1/n} = \\sqrt[n]{\\rho}\\).</li><li>Les arguments sont \\(\\dfrac{\\theta + 2k\\pi}{n}\\).</li><li>Les racines sont sur le cercle de rayon \\(\\sqrt[n]{\\rho}\\).</li></ul></div></div>",
    "texteParle": "Voici la formule fondamentale pour trouver les racines n-ièmes d'un nombre complexe. Si Z s'écrit sous forme exponentielle rho fois e puissance i theta, alors les racines sont données par cette formule. Le module de chaque racine est la racine n-ième de rho. Les arguments sont obtenus en ajoutant 2 k pi sur n. Les k varient de 0 à n moins 1. Ainsi, les racines sont régulièrement espacées sur le cercle de rayon racine n-ième de rho. Cette formule est très puissante et permet de trouver toutes les racines en une seule fois.",
    "note": "Formule : z_k = ρ^(1/n) × e^(i(θ+2kπ)/n), k = 0,...,n-1."
  },
  {
    "titre": "Racines de l'unité",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>⭕ Racines de l'unité</h3><div style='background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><p><strong>Définition :</strong> Les racines n-ièmes de 1 sont appelées <strong>racines n-ièmes de l'unité</strong>.</p><div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math-block'><div class='math'>$$\\omega_k = e^{i\\frac{2k\\pi}{n}} = \\cos\\left(\\frac{2k\\pi}{n}\\right) + i\\sin\\left(\\frac{2k\\pi}{n}\\right)$$</div></div><p>pour \\(k = 0, 1, 2, \\dots, n-1\\).</p></div><p><strong>Propriétés :</strong></p><ul><li>\\(\\omega_0 = 1\\)</li><li>\\(\\omega_k^n = 1\\) pour tout \\(k\\)</li><li>\\(\\omega_k = \\omega_1^k\\) (les puissances de \\(\\omega_1\\))</li><li>\\(\\omega_0 + \\omega_1 + \\dots + \\omega_{n-1} = 0\\)</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #f1c40f;'><p style='color: #7d6608;'>💡 <strong>Astuce :</strong> Les racines de l'unité forment un polygone régulier inscrit dans le cercle unité.</p></div></div>",
    "texteParle": "Un cas particulier très important est celui des racines de l'unité, c'est-à-dire les racines n-ièmes de 1. Elles sont données par la formule e puissance i 2k pi sur n. On les note souvent oméga indice k. La première racine oméga 0 est toujours 1. Toutes les autres racines sont des puissances de oméga 1. Une propriété remarquable est que la somme de toutes les racines de l'unité est égale à 0. Ces racines jouent un rôle fondamental en mathématiques, notamment en théorie des nombres et en analyse de Fourier.",
    "note": "Racines de l'unité : ω_k = e^(i2kπ/n), forment un polygone régulier."
  },
  {
    "titre": "Exemple : Racines cubiques de l'unité",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>📝 Exemple : Racines cubiques de l'unité</h3><div style='background-color: #fef9e7; padding: 15px; border-radius: 8px;'><p><strong>Pour \\(n=3\\), les racines cubiques de l'unité sont :</strong></p><div style='background-color: #f5f5dc; padding: 15px; border-radius: 8px; margin: 10px 0;'><p>\\(\\omega_0 = e^{i0} = 1\\)</p><p>\\(\\omega_1 = e^{i\\frac{2\\pi}{3}} = -\\dfrac{1}{2} + i\\dfrac{\\sqrt{3}}{2}\\)</p><p>\\(\\omega_2 = e^{i\\frac{4\\pi}{3}} = -\\dfrac{1}{2} - i\\dfrac{\\sqrt{3}}{2}\\)</p></div><p><strong>Vérification :</strong></p><ul><li>\\(\\omega_1^3 = 1\\) et \\(\\omega_2^3 = 1\\)</li><li>\\(\\omega_0 + \\omega_1 + \\omega_2 = 1 + (-\\frac{1}{2} + i\\frac{\\sqrt{3}}{2}) + (-\\frac{1}{2} - i\\frac{\\sqrt{3}}{2}) = 0\\)</li><li>\\(\\omega_2 = \\omega_1^2\\)</li></ul><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin-top: 10px; text-align: center;'><p>📌 Représentation : trois points sur le cercle unité, formant un triangle équilatéral.</p></div></div></div>",
    "texteParle": "Prenons un exemple concret avec les racines cubiques de l'unité. Pour n égal 3, nous avons trois racines. La première est 1. La deuxième est e puissance i 2 pi sur 3, ce qui donne moins un demi plus i racine de 3 sur 2. La troisième est e puissance i 4 pi sur 3, soit moins un demi moins i racine de 3 sur 2. On vérifie que ces nombres élevés au cube donnent bien 1. Leur somme est nulle. Géométriquement, ces trois points sont sur le cercle unité et forment un triangle équilatéral.",
    "note": "Racines cubiques de 1 : 1, -1/2 + i√3/2, -1/2 - i√3/2."
  },
  {
    "titre": "Représentation géométrique",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>📊 Représentation géométrique</h3><div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><p><strong>Propriété géométrique :</strong></p><p>Les \\(n\\) racines n-ièmes d'un nombre complexe \\(Z\\) sont les sommets d'un <strong>polygone régulier</strong> à \\(n\\) côtés.</p><ul><li><strong>Centre :</strong> l'origine du repère</li><li><strong>Rayon :</strong> \\(\\sqrt[n]{|Z|}\\)</li><li><strong>Angles :</strong> \\(\\dfrac{\\theta}{n}, \\dfrac{\\theta}{n} + \\dfrac{2\\pi}{n}, \\dots, \\dfrac{\\theta}{n} + \\dfrac{2(n-1)\\pi}{n}\\)</li></ul><div style='background-color: #d5f5e3; padding: 12px; border-radius: 8px; margin-top: 10px;'><p><strong>Exemple :</strong> Pour \\(Z = 8i\\),</p><p>\\(|Z| = 8\\) et \\(\\arg(Z) = \\dfrac{\\pi}{2}\\).</p><p>Les racines cubiques ont pour module \\(\\sqrt[3]{8} = 2\\).</p><p>Les arguments sont : \\(\\dfrac{\\pi/2 + 2k\\pi}{3}\\) pour \\(k = 0,1,2\\).</p></div></div></div>",
    "texteParle": "Les racines n-ièmes d'un nombre complexe ont une interprétation géométrique très élégante. Elles sont les sommets d'un polygone régulier à n côtés, inscrit dans un cercle centré à l'origine. Le rayon de ce cercle est la racine n-ième du module de Z. Les points sont régulièrement espacés d'un angle de 2 pi sur n. Par exemple, si Z égale 8i, son module est 8 et son argument est pi sur 2. Les racines cubiques ont un module de 2. Les arguments sont pi sur 6, 5 pi sur 6, et 3 pi sur 2. Ces points forment un triangle équilatéral sur le cercle de rayon 2.",
    "note": "Les racines n-ièmes sont les sommets d'un polygone régulier de rayon √[n]{|Z|}."
  },
  {
    "titre": "Application : Résolution d'équations",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>🎯 Application : Résolution d'équations</h3><div style='background-color: #f4ecf7; padding: 15px; border-radius: 8px;'><p><strong>Exemple :</strong> Résoudre dans \\(\\mathbb{C}\\) l'équation \\(z^3 = 1 + i\\).</p><div style='background-color: #e8daef; padding: 15px; border-radius: 8px; margin: 10px 0;'><p><strong>Étape 1 :</strong> Écrire \\(1+i\\) sous forme exponentielle.</p><p>\\(|1+i| = \\sqrt{2}\\) et \\(\\arg(1+i) = \\dfrac{\\pi}{4}\\).</p><p>Donc \\(1+i = \\sqrt{2} e^{i\\pi/4}\\).</p><p><strong>Étape 2 :</strong> Appliquer la formule.</p><p>\\(z_k = (\\sqrt{2})^{1/3} e^{i\\left(\\frac{\\pi/4 + 2k\\pi}{3}\\right)}\\)</p><p><strong>Étape 3 :</strong> Donner les 3 solutions.</p><p>Pour \\(k=0,1,2\\), on obtient les trois racines cubiques.</p></div></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #f1c40f;'><p style='color: #7d6608;'>💡 <strong>Méthode :</strong> Toujours commencer par mettre le second membre sous forme exponentielle.</p></div></div>",
    "texteParle": "Voyons maintenant comment utiliser les racines pour résoudre des équations. Prenons l'exemple de l'équation z au cube égale 1 plus i. La méthode est toujours la même. D'abord, on met le second membre sous forme exponentielle. Ici, 1 plus i a pour module racine de 2 et pour argument pi sur 4. Ensuite, on applique la formule des racines avec n égal 3. On obtient trois solutions en faisant varier k de 0 à 2. La clé est de toujours commencer par écrire le second membre sous forme exponentielle, puis d'appliquer la formule.",
    "note": "Méthode : mettre le second membre sous forme exponentielle puis appliquer la formule."

  {
    "titre": "Lien avec l'examen",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>🎓 Lien avec l'examen</h3><div style='background-color: #ebf5fb; padding: 15px; border-radius: 8px;'><p style='font-size: 1.05em;'>Les racines n-ièmes sont souvent présentes à l'examen.</p><div style='background-color: #d4e6f1; padding: 12px; border-radius: 8px; margin-top: 10px;'><p><strong>Exemple d'exercice type :</strong></p><p>Soit \\(z\\) un nombre complexe tel que \\(z^5 = 1\\).</p><p><strong>Questions :</strong></p><ol><li>Donner les 5 solutions de cette équation.</li><li>Les représenter dans le plan complexe.</li><li>Montrer qu'elles forment un pentagone régulier.</li><li>Calculer la somme de toutes les solutions.</li></ol></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #f1c40f;'><p style='color: #7d6608;'>📌 <strong>Conseil :</strong> Les racines de l'unité sont un classique de l'examen. Maîtrisez parfaitement ce cas particulier !</p></div></div>",
    "texteParle": "Les racines n-ièmes sont un thème récurrent à l'examen. Un exercice typique consiste à demander de résoudre l'équation z puissance 5 égale 1. Il faut alors donner les 5 solutions, les représenter dans le plan complexe, montrer qu'elles forment un pentagone régulier, et calculer la somme de toutes les solutions. Les racines de l'unité sont un classique à maîtriser parfaitement, car elles reviennent souvent dans les sujets d'examen. N'oubliez pas que la somme des racines de l'unité est toujours nulle, sauf pour n égal 1.",

  {
    "titre": "Propriétés des racines",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>📌 Propriétés importantes</h3><div style='background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><ul style='font-size: 1.05em; line-height: 2.2;'><li><strong>Périodicité :</strong> \\(z_k = z_{k+n}\\) (les racines se répètent)</li><li><strong>Symétrie :</strong> \\(z_{n-k} = \\overline{z_k}\\) (conjugués symétriques)</li><li><strong>Somme :</strong> \\(\\sum_{k=0}^{n-1} z_k = 0\\) si \\(Z  eq 0\\)</li><li><strong>Produit :</strong> \\(\\prod_{k=0}^{n-1} z_k = (-1)^{n-1} Z\\)</li><li><strong>Racines de l'unité :</strong> \\(\\sum_{k=0}^{n-1} \\omega_k = 0\\) et \\(\\prod_{k=0}^{n-1} \\omega_k = (-1)^{n-1}\\)</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #f1c40f;'><p style='color: #7d6608;'>💡 <strong>Astuce :</strong> La somme des racines est nulle car les vecteurs s'annulent géométriquement.</p></div></div>",
    "texteParle": "Les racines n-ièmes possèdent des propriétés importantes qu'il faut connaître. La première est la périodicité : les racines se répètent tous les n pas. Ensuite, il y a une symétrie par rapport à l'axe des réels : la racine d'indice n moins k est le conjugué de la racine d'indice k. La somme de toutes les racines est nulle, ce qui est une conséquence géométrique de la symétrie. Le produit des racines est moins 1 puissance n moins 1 fois Z. Ces propriétés sont très utiles pour simplifier les calculs et pour résoudre des problèmes.",
    "note": "Propriétés : périodicité, symétrie, somme nulle."
  },
  {
    "titre": "Exemple complet",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2c3e50;'>📝 Exemple complet</h3><div style='background-color: #fef9e7; padding: 15px; border-radius: 8px;'><p><strong>Résoudre \\(z^4 = -16\\) dans \\(\\mathbb{C}\\).</strong></p><div style='background-color: #f5f5dc; padding: 15px; border-radius: 8px; margin: 10px 0;'><p><strong>1. Forme exponentielle de -16 :</strong></p><p>\\(-16 = 16 \\times (-1) = 16 e^{i\\pi}\\)</p><p><strong>2. Application de la formule :</strong></p><p>\\(z_k = 16^{1/4} e^{i\\left(\\frac{\\pi + 2k\\pi}{4}\\right)} = 2 e^{i\\left(\\frac{\\pi}{4} + \\frac{k\\pi}{2}\\right)}\\)</p><p><strong>3. Les 4 solutions :</strong></p><ul><li>\\(k=0 : z_0 = 2 e^{i\\pi/4} = \\sqrt{2} + i\\sqrt{2}\\)</li><li>\\(k=1 : z_1 = 2 e^{i3\\pi/4} = -\\sqrt{2} + i\\sqrt{2}\\)</li><li>\\(k=2 : z_2 = 2 e^{i5\\pi/4} = -\\sqrt{2} - i\\sqrt{2}\\)</li><li>\\(k=3 : z_3 = 2 e^{i7\\pi/4} = \\sqrt{2} - i\\sqrt{2}\\)</li></ul></div><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin-top: 10px; text-align: center;'><p>📌 Ces 4 points forment un carré de rayon 2 sur le cercle centré à l'origine.</p></div></div></div>",
    "texteParle": "Prenons un exemple complet pour bien comprendre. Résolvons l'équation z puissance 4 égale moins 16. D'abord, on écrit moins 16 sous forme exponentielle : c'est 16 fois e puissance i pi. Ensuite, on applique la formule avec n égal 4 et rho égal 16. Le module des racines est racine quatrième de 16, c'est-à-dire 2. Les arguments sont pi sur 4 plus k pi sur 2. On obtient ainsi les quatre solutions. Géométriquement, ces quatre points forment un carré de rayon 2 sur le cercle centré à l'origine. C'est une belle illustration de la propriété géométrique des racines.",
    "note": "Exemple : z^4 = -16 ⇒ 4 solutions formant un carré."

  {
    "titre": "Points à retenir",
    "contenu": "<div style='padding: 15px;'><div style='background: linear-gradient(135deg, #1a5276, #2c3e50); padding: 20px; border-radius: 10px; color: white;'><h3 style='color: #f1c40f; text-align: center;'>📌 Points à retenir</h3><ul style='list-style: none; padding: 0; font-size: 1.05em; line-height: 2.5;'><li>✅ <strong>Définition :</strong> \\(z^n = Z\\) avec \\(Z  eq 0\\)</li><li>✅ <strong>Formule :</strong> \\(z_k = \\rho^{1/n} e^{i(\\theta + 2k\\pi)/n}\\)</li><li>✅ <strong>Racines de l'unité :</strong> \\(\\omega_k = e^{i2k\\pi/n}\\)</li><li>✅ <strong>Géométrie :</strong> Polygone régulier à n côtés</li><li>✅ <strong>Somme :</strong> \\(\\sum z_k = 0\\)</li><li>✅ <strong>Examen :</strong> Classique, particulièrement les racines de l'unité</li></ul></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; border: 2px solid #f1c40f;'><p style='font-weight: bold; font-size: 1.1em; color: #7d6608;'>🎯 La pratique est la clé ! Entraînez-vous à résoudre des équations avec différentes valeurs de n.</p></div></div>",
    "texteParle": "Pour conclure cette leçon, retenons les points essentiels. Un nombre complexe non nul a exactement n racines n-ièmes. La formule permet de les trouver toutes en une fois. Les racines de l'unité sont un cas particulier très important qui revient souvent à l'examen. Géométriquement, les racines forment un polygone régulier. La somme des racines est toujours nulle. Ces propriétés sont fondamentales et vous seront très utiles. N'oubliez pas de vous entraîner sur des exercices variés pour bien maîtriser cette notion.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
