<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux coniques",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Qu'est-ce qu'une conique ?</h3><p style='font-size: 1.1em; line-height: 1.6;'>Une <strong>conique</strong> est une courbe obtenue en coupant un cûÇne de rûˋvolution par un plan.</p><div style='background: #ecf0f1; padding: 15px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'><strong>Les trois types principaux :</strong></p><ul style='font-size: 1em; line-height: 1.8;'><li><strong>Ellipse</strong> : coupe fermûˋe (cercle si le plan est perpendiculaire û  l'axe).</li><li><strong>Parabole</strong> : coupe parallû´le û  une gûˋnûˋratrice.</li><li><strong>Hyperbole</strong> : coupe parallû´le û  l'axe du cûÇne.</li></ul></div><div style='background: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>Þ <strong>Astuce :</strong> L'excentricitûˋ \\( e \\) permet de distinguer les coniques :</p><ul style='font-size: 1em; line-height: 1.8;'><li>Si \\( e = 0 \\) : cercle</li><li>Si \\( 0 < e < 1 \\) : ellipse</li><li>Si \\( e = 1 \\) : parabole</li><li>Si \\( e > 1 \\) : hyperbole</li></ul></div></div>",
    "texteParle": "Bonjour û  tous, aujourd'hui nous allons ûˋtudier les coniques, ces courbes que l'on obtient en coupant un cûÇne de rûˋvolution par un plan. On distingue trois types principaux : l'ellipse, la parabole et l'hyperbole. L'excentricitûˋ est un nombre qui permet de les identifier. Si elle est ûˋgale û  zûˋro, c'est un cercle. Entre zûˋro et un, c'est une ellipse. ûgale û  un, c'est une parabole. Supûˋrieure û  un, c'est une hyperbole. Nous allons voir comment dûˋfinir ces courbes û  l'aide d'un foyer et d'une directrice.",
    "note": "Les coniques ont des applications en astronomie, optique et architecture."
  },
  {
    "titre": "Dûˋfinition monofocale",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>La dûˋfinition par foyer et directrice</h3><p style='font-size: 1.1em; line-height: 1.6;'>Une conique est l'ensemble des points \\( M \\) du plan tels que :</p><div style='background: #eaf2f8; padding: 20px; border-radius: 8px; margin-top: 10px;'><div class='math-block'><div class='math'>$$\\frac{MF}{MH} = e$$</div></div><p style='margin-top: 10px;'>oû¿ :</p><ul style='font-size: 1em; line-height: 1.8;'><li>\\( F \\) est le <strong>foyer</strong> (un point fixe).</li><li>\\( (D) \\) est la <strong>directrice</strong> (une droite fixe).</li><li>\\( M \\) est un point quelconque de la conique.</li><li>\\( H \\) est le projetûˋ orthogonal de \\( M \\) sur la directrice.</li><li>\\( e \\) est l'<strong>excentricitûˋ</strong> (nombre rûˋel positif).</li></ul></div><div style='background: #fdedec; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>ã ÿ¡ Attention : La directrice est une droite, pas un point.</p></div></div>",
    "texteParle": "La dûˋfinition monofocale d'une conique est trû´s ûˋlûˋgante. Une conique est l'ensemble des points pour lesquels le rapport de la distance au foyer sur la distance û  la directrice est constant. Ce rapport constant est appelûˋ l'excentricitûˋ. Le foyer est un point fixe, et la directrice est une droite fixe. Cette dûˋfinition permet de retrouver toutes les coniques en faisant varier l'excentricitûˋ.",
    "note": "La dûˋfinition monofocale est aussi appelûˋe 'dûˋfinition par foyer et directrice'."
  },
  {
    "titre": "Mise en ûˋquation (1)",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Choix du repû´re</h3><p style='font-size: 1.1em; line-height: 1.6;'>Pour obtenir l'ûˋquation rûˋduite, on place le repû´re de faûÏon astucieuse :</p><div style='background: #eaf2f8; padding: 15px; border-radius: 8px; margin-top: 10px;'><ul style='font-size: 1em; line-height: 1.8;'><li>L'axe des abscisses est la <strong>perpendiculaire</strong> û  la directrice passant par le foyer.</li><li>L'origine est le point d'intersection de cet axe avec la directrice.</li><li>Le foyer a pour coordonnûˋes \\( (p, 0) \\) oû¿ \\( p > 0 \\).</li><li>La directrice a pour ûˋquation \\( x = -p \\).</li></ul></div><div style='background: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>Þ Dans ce repû´re, la distance \\( MF \\) et la distance \\( MH \\) s'expriment facilement.</p></div></div>",
    "texteParle": "Pour ûˋtablir l'ûˋquation d'une conique, on choisit un repû´re adaptûˋ. On place l'origine sur la directrice, û  l'intersection avec la perpendiculaire passant par le foyer. L'axe des abscisses est cette perpendiculaire. Le foyer est alors û  la coordonnûˋe p sur l'axe des abscisses, et la directrice est la droite verticale x ûˋgal moins p. Ce choix simplifie beaucoup les calculs.",
    "note": "La distance \\( p \\) est appelûˋe le paramû´tre de la conique."
  },
  {
    "titre": "Mise en ûˋquation (2)",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Calcul des distances</h3><p style='font-size: 1.1em; line-height: 1.6;'>Soit \\( M(x, y) \\) un point quelconque.</p><div style='background: #eaf2f8; padding: 15px; border-radius: 8px; margin-top: 10px;'><p><strong>1. Distance au foyer \\( F(p, 0) \\) :</strong></p><div class='math-block'><div class='math'>$$MF = \\sqrt{(x - p)^2 + y^2}$$</div></div><p><strong>2. Distance û  la directrice \\( (D) : x = -p \\) :</strong></p><div class='math-block'><div class='math'>$$MH = |x + p|$$</div></div><p style='margin-top: 10px;'>La dûˋfinition monofocale donne :</p><div class='math-block'><div class='math'>$$\\frac{\\sqrt{(x - p)^2 + y^2}}{|x + p|} = e$$</div></div></div></div>",

    // ================================================================
    // ûTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Rûˋfûˋrences jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('ã¡');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('ãÑ');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Rûˋinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Prûˋparation vocale...');
        $loadingSub.text('Synthû´se en cours');
        $loadingTimeout.text('ãÝÿ¡ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("ã° Chargement...", 'loading');
        // ÞË TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("ã ÿ¡ Dûˋlai dûˋpassûˋ (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthû´se vocale a pris trop de temps');
                $loadingTimeout.text('ã Dûˋlai dûˋpassûˋ');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("ã¡ Lecture arrûˆtûˋe", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("ã¡ Annulûˋ", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulûˋ par l\'utilisateur');
        $loadingSub.text('Vous pouvez rûˋessayer');
        $loadingTimeout.text('ã Annulation');
    }
    // Arrûˆter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("ã¡ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("Þ Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("ã Synthû´se vocale non supportûˋe", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrûˆter toute lecture en cours
            stopSpeaking();
            // Rûˋinitialiser l'ûˋtat de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("Þ Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("ã Terminûˋ", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("ã ÿ¡ Permission refusûˋe", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("ã ÿ¡ Synthû´se indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("ã¡ Annulûˋ", 'paused');
                    } else {
                        setStatus("ã Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("ã Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("ã Erreur gûˋnûˋrale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrûˆter complû´tement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("Þ Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Rûˋinitialiser l'ûˋtat de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("ã¡ Lecture arrûˆtûˋe", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("Þ Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("Þ Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthûˋtiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on dûˋmarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vûˋrifier la compatibilitûˋ
        if (!window.speechSynthesis) {
            setStatus("ã Synthû´se vocale non supportûˋe", 'error');
            speechSupported = false;
        }
        // Prûˋcharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // ûtat initial
        setStatus("ã¡ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('ã¡ Lecture manuelle');
        // ================================================================
        // ûVûNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gûˋrer les cas oû¿ la synthû´se se termine de maniû´re inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("ã¡ Lecture arrûˆtûˋe", 'paused');
            }
        }, 1000);
    }
    init();
});
