<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths Tle C",
  "classe": "Terminale C",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations dans \\(\\mathbb{C}\\) et factorisation",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>On considère le polynôme \\(P(z) = z^3 - 4z^2 + 9z - 10\\).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>1) Vérifier que \\(z = 2\\) est une racine de \\(P\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>\\(P(2) = 2^3 - 4(2)^2 + 9(2) - 10 = 8 - 16 + 18 - 10 = 0\\). Donc \\(z = 2\\) est bien une racine de \\(P\\).</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>2) Factoriser \\(P(z)\\) dans \\(\\mathbb{C}\\) et résoudre dans \\(\\mathbb{C}\\) l'équation \\(P(z) = 0\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>On effectue la division euclidienne de \\(P(z)\\) par \\((z-2)\\) : \\(P(z) = (z-2)(z^2 - 2z + 5)\\).<br><br>Résolvons \\(z^2 - 2z + 5 = 0\\) : <br>\\(\\Delta = (-2)^2 - 4(1)(5) = 4 - 20 = -16 = (4i)^2\\).<br>Les racines sont \\(z = \\dfrac{2 \\pm 4i}{2} = 1 \\pm 2i\\).<br><br>Donc la factorisation est : \\(P(z) = (z-2)(z - (1+2i))(z - (1-2i))\\).<br><br>Ensemble solution : \\(\\mathcal{S} = \\{2, 1+2i, 1-2i\\}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Similitude directe",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>Le plan complexe est muni d'un repère orthonormé \\((O; \\vec{u}, \\vec{v})\\). On considère la transformation \\(S\\) d'écriture complexe : \\(z' = (1+i)z + 2 - i\\).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>1) Déterminer la nature de \\(S\\) (similitude directe ou indirecte), son rapport, son angle et son centre.</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>\\(S\\) est une similitude directe car son écriture est de la forme \\(z' = az + b\\) avec \\(a = 1+i\\) et \\(b = 2-i\\).<br><br>Rapport : \\(|a| = |1+i| = \\sqrt{1^2+1^2} = \\sqrt{2}\\).<br><br>Angle : \\(\\arg(a) = \\arg(1+i) = \\dfrac{\\pi}{4}\\) (mod \\(2\\pi\\)).<br><br>Centre : point invariant \\(\\omega\\) tel que \\(\\omega = a\\omega + b\\), donc \\((1-a)\\omega = b\\).<br>\\(1-a = 1 - (1+i) = -i\\).<br>\\(\\omega = \\dfrac{b}{1-a} = \\dfrac{2-i}{-i} = \\dfrac{2-i}{-i} \\times \\dfrac{i}{i} = \\dfrac{i(2-i)}{1} = 2i - i^2 = 1 + 2i\\).<br><br>Donc \\(S\\) est la similitude directe de centre \\(\\omega(1+2i)\\), de rapport \\(\\sqrt{2}\\) et d'angle \\(\\dfrac{\\pi}{4}\\).</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>2) Donner l'expression analytique de \\(S\\) dans le repère \\((O; \\vec{u}, \\vec{v})\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>Soit \\(z = x + iy\\) et \\(z' = x' + iy'\\).<br><br>\\(z' = (1+i)(x+iy) + 2 - i = x + iy + ix + i^2 y + 2 - i = x + iy + ix - y + 2 - i = (x - y + 2) + i(x + y - 1)\\).<br><br>Donc \\(\\begin{cases} x' = x - y + 2 \\\\ y' = x + y - 1 \\end{cases}\\).<br><br>L'expression analytique de \\(S\\) est : \\(\\begin{cases} x' = x - y + 2 \\\\ y' = x + y - 1 \\end{cases}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Calcul d'aires et de volumes",
      "points": "5 pts",
      "enonce": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>On considère la fonction \\(f\\) définie sur \\([0, +\\infty[\\) par \\(f(x) = \\dfrac{\\ln x}{x^2}\\) (avec \\(f(1)=0\\)).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>1) Calculer l'aire de la région délimitée par la courbe de \\(f\\), l'axe des abscisses et les droites \\(x = 1\\) et \\(x = e\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>L'aire est \\(\\mathcal{A} = \\displaystyle\\int_1^e \\dfrac{\\ln x}{x^2} \\, dx\\).<br><br>On intègre par parties : posons \\(u = \\ln x\\), \\(dv = \\dfrac{1}{x^2} dx\\), alors \\(du = \\dfrac{1}{x} dx\\) et \\(v = -\\dfrac{1}{x}\\).<br><br>\\(\\mathcal{A} = \\left[-\\dfrac{\\ln x}{x}\\right]_1^e + \\displaystyle\\int_1^e \\dfrac{1}{x^2} \\, dx = \\left[-\\dfrac{\\ln x}{x} - \\dfrac{1}{x}\\right]_1^e = \\left(-\\dfrac{1}{e} - \\dfrac{1}{e}\\right) - (-0 - 1) = -\\dfrac{2}{e} + 1 = 1 - \\dfrac{2}{e}\\) unités d'aire.</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>2) On fait tourner cette région autour de l'axe des abscisses. Calculer le volume du solide de révolution obtenu.</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>Le volume est \\(V = \\pi \\displaystyle\\int_1^e \\left(\\dfrac{\\ln x}{x^2}\\right)^2 \\, dx = \\pi \\int_1^e \\dfrac{(\\ln x)^2}{x^4} \\, dx\\).<br><br>On intègre par parties deux fois :<br>Posons \\(u = (\\ln x)^2\\), \\(dv = \\dfrac{1}{x^4} dx\\), alors \\(du = \\dfrac{2\\ln x}{x} dx\\) et \\(v = -\\dfrac{1}{3x^3}\\).<br><br>\\(\\int \\dfrac{(\\ln x)^2}{x^4} dx = -\\dfrac{(\\ln x)^2}{3x^3} + \\dfrac{2}{3} \\int \\dfrac{\\ln x}{x^4} dx\\).<br><br>On pose \\(u = \\ln x\\), \\(dv = \\dfrac{1}{x^4} dx\\), \\(du = \\dfrac{1}{x} dx\\), \\(v = -\\dfrac{1}{3x^3}\\).<br><br>\\(\\int \\dfrac{\\ln x}{x^4} dx = -\\dfrac{\\ln x}{3x^3} + \\dfrac{1}{3} \\int \\dfrac{1}{x^4} dx = -\\dfrac{\\ln x}{3x^3} - \\dfrac{1}{9x^3}\\).<br><br>Donc \\(\\int \\dfrac{(\\ln x)^2}{x^4} dx = -\\dfrac{(\\ln x)^2}{3x^3} + \\dfrac{2}{3}\\left(-\\dfrac{\\ln x}{3x^3} - \\dfrac{1}{9x^3}\\right) = -\\dfrac{(\\ln x)^2}{3x^3} - \\dfrac{2\\ln x}{9x^3} - \\dfrac{2}{27x^3}\\).<br><br>On évalue en \\(e\\) et en \\(1\\) :<br>En \\(e\\) : \\(\\ln e = 1\\) donc \\(-\\dfrac{1}{3e^3} - \\dfrac{2}{9e^3} - \\dfrac{2}{27e^3} = -\\dfrac{9+6+2}{27e^3} = -\\dfrac{17}{27e^3}\\).<br>En \\(1\\) : \\(\\ln 1 = 0\\) donc \\(-\\dfrac{2}{27}\\).<br><br>Donc \\(V = \\pi \\left(-\\dfrac{17}{27e^3} + \\dfrac{2}{27}\\right) = \\dfrac{\\pi}{27}\\left(2 - \\dfrac{17}{e^3}\\right)\\) unités de volume.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Étude de fonctions et primitives",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>Soit \\(f\\) la fonction définie sur \\(\\mathbb{R}\\) par \\(f(x) = \\dfrac{e^x}{e^x + 1}\\).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>1) Calculer \\(f'(x)\\) et en déduire le sens de variation de \\(f\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>On a \\(f(x) = \\dfrac{e^x}{e^x+1}\\).<br><br>\\(f'(x) = \\dfrac{e^x(e^x+1) - e^x \\cdot e^x}{(e^x+1)^2} = \\dfrac{e^x(e^x+1 - e^x)}{(e^x+1)^2} = \\dfrac{e^x}{(e^x+1)^2}\\).<br><br>Pour tout \\(x \\in \\mathbb{R}\\), \\(e^x > 0\\) et \\((e^x+1)^2 > 0\\), donc \\(f'(x) > 0\\).<br><br>Ainsi \\(f\\) est strictement croissante sur \\(\\mathbb{R}\\).<br><br>De plus, \\(\\lim\\limits_{x \\to -\\infty} f(x) = 0\\) et \\(\\lim\\limits_{x \\to +\\infty} f(x) = 1\\). Donc l'image de \\(f\\) est \\(]0, 1[\\).</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>2) Déterminer une primitive de \\(f\\) sur \\(\\mathbb{R}\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>On remarque que \\(f(x) = \\dfrac{e^x}{e^x+1} = \\dfrac{u'(x)}{u(x)}\\) avec \\(u(x) = e^x+1\\).<br><br>Donc une primitive de \\(f\\) est \\(F(x) = \\ln(e^x+1)\\).<br><br>Vérification : \\(F'(x) = \\dfrac{e^x}{e^x+1} = f(x)\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Problème de synthèse - Ajustement linéaire",
      "points": "3 pts",
      "enonce": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>Un commerçant a relevé ses ventes mensuelles (en milliers de francs CFA) en fonction du nombre de mois d'activité :<br><br>\\(\\begin{array}{|c|c|c|c|c|c|}\\hline \\text{Mois } x & 1 & 2 & 3 & 4 & 5 \\\\ \\hline \\text{Ventes } y & 2 & 4 & 5 & 7 & 8 \\\\ \\hline \\end{array}\\)<br><br>On cherche à ajuster ce nuage de points par la droite des moindres carrés d'équation \\(y = ax + b\\).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>1) Calculer les coordonnées du point moyen \\(G\\) et les coefficients \\(a\\) et \\(b\\) de la droite de régression de \\(y\\) en \\(x\\).</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>\\(\\bar{x} = \\dfrac{1+2+3+4+5}{5} = \\dfrac{15}{5} = 3\\).<br>\\(\\bar{y} = \\dfrac{2+4+5+7+8}{5} = \\dfrac{26}{5} = 5.2\\).<br><br>Donc \\(G(3, 5.2)\\).<br><br>Calcul de \\(a\\) : \\(a = \\dfrac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{\\sum (x_i - \\bar{x})^2}\\).<br><br>\\(\\sum (x_i - \\bar{x})^2 = (1-3)^2 + (2-3)^2 + (3-3)^2 + (4-3)^2 + (5-3)^2 = 4+1+0+1+4 = 10\\).<br><br>\\(\\sum (x_i - \\bar{x})(y_i - \\bar{y}) = (-2)(-3.2) + (-1)(-1.2) + 0(-0.2) + 1(1.8) + 2(2.8) = 6.4 + 1.2 + 0 + 1.8 + 5.6 = 15\\).<br><br>Donc \\(a = \\dfrac{15}{10} = 1.5\\).<br><br>\\(b = \\bar{y} - a\\bar{x} = 5.2 - 1.5 \\times 3 = 5.2 - 4.5 = 0.7\\).<br><br>La droite de régression est \\(y = 1.5x + 0.7\\).</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>2) Estimer le montant des ventes pour le 8<sup>e</sup> mois.</div>",
          "reponse": "<div style='font-size:16px; color:#1a1a1a; font-family: Arial, sans-serif;'>Pour \\(x = 8\\), \\(y = 1.5 \\times 8 + 0.7 = 12 + 0.7 = 12.7\\) milliers de francs CFA.<br><br>Donc une estimation des ventes pour le 8<sup>e</sup> mois est de 12 700 francs CFA.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
