<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths Tle C",
  "classe": "Terminale C",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Similitudes directes et nombres complexes",
      "points": "4 pts",
      "enonce": "Dans le plan complexe muni d'un repère orthonormé direct \\( (O, \\vec{u}, \\vec{v}) \\), on considère la transformation \\( s \\) d'écriture complexe : <div class='math-block' style='background-color:#f0f9ff;padding:12px;border-radius:8px;margin:15px 0;'><div class='math' style='text-align:center;color:#1e293b;'>$$ z' = (1 + i)z + 2 - i $$</div></div>",
      "questions": [
        {
          "question": "1) Déterminer la nature de \\( s \\) et donner ses éléments caractéristiques (rapport, angle, centre).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>L'écriture complexe est de la forme \\( z' = az + b \\) avec \\( a = 1+i \\) et \\( b = 2-i \\).</p><p style='color: #166534; margin: 0;'>On a \\( |a| = |1+i| = \\sqrt{1^2 + 1^2} = \\sqrt{2} \\). Donc le rapport est \\( k = \\sqrt{2} \\).</p><p style='color: #166534; margin: 0;'>L'angle est \\( \\theta = \\arg(a) = \\arg(1+i) = \\dfrac{\\pi}{4} \\).</p><p style='color: #166534; margin: 0;'>Le centre \\( \\omega \\) est le point invariant, solution de \\( \\omega = a\\omega + b \\), soit \\( \\omega(1-a) = b \\).</p><p style='color: #166534; margin: 0;'>\\( 1 - a = 1 - (1+i) = -i \\). Donc \\( \\omega(-i) = 2 - i \\Rightarrow \\omega = \\dfrac{2-i}{-i} = \\dfrac{2-i}{-i} \\times \\dfrac{i}{i} = \\dfrac{2i - i^2}{-i^2} = \\dfrac{2i + 1}{1} = 1 + 2i \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Conclusion :</strong> \\( s \\) est une similitude directe de rapport \\( \\sqrt{2} \\), d'angle \\( \\dfrac{\\pi}{4} \\) et de centre \\( \\omega(1, 2) \\).</p></div>"
        },
        {
          "question": "2) Donner l'expression analytique de \\( s \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>Soit \\( z = x + iy \\) et \\( z' = x' + iy' \\).</p><p style='color: #166534; margin: 0;'>On a \\( z' = (1+i)(x+iy) + 2 - i = x + iy + ix + i^2 y + 2 - i = (x - y + 2) + i(x + y - 1) \\).</p><p style='color: #166534; margin: 0;'>Donc \\( x' = x - y + 2 \\) et \\( y' = x + y - 1 \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Expression analytique :</strong> \\( \\begin{cases} x' = x - y + 2 \\\\ y' = x + y - 1 \\end{cases} \\)</p></div>"
        },
        {
          "question": "3) Déterminer l'image du point \\( A \\) d'affixe \\( z_A = 2i \\) par \\( s \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>L'affixe de l'image de \\( A \\) est \\( z_{A'} = (1+i)(2i) + 2 - i = 2i + 2i^2 + 2 - i = 2i - 2 + 2 - i = i \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Image de \\( A \\) :</strong> \\( A'(0, 1) \\).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Fonctions logarithme et exponentielle",
      "points": "4 pts",
      "enonce": "On considère la fonction \\( f \\) définie sur \\( ]0; +\\infty[ \\) par \\( f(x) = x \\ln x - x \\).",
      "questions": [
        {
          "question": "1) Calculer \\( f'(x) \\) et en déduire les variations de \\( f \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>\\( f'(x) = \\ln x + x \\times \\dfrac{1}{x} - 1 = \\ln x + 1 - 1 = \\ln x \\).</p><p style='color: #166534; margin: 0;'>Le signe de \\( f'(x) \\) est celui de \\( \\ln x \\).</p><p style='color: #166534; margin: 0;'>- Sur \\( ]0; 1[ \\), \\( \\ln x < 0 \\), donc \\( f'(x) < 0 \\) : \\( f \\) est décroissante.</p><p style='color: #166534; margin: 0;'>- Sur \\( ]1; +\\infty[ \\), \\( \\ln x > 0 \\), donc \\( f'(x) > 0 \\) : \\( f \\) est croissante.</p><p style='color: #166534; margin: 0;'>- En \\( x = 1 \\), \\( f'(x) = 0 \\), la fonction admet un minimum.</p><p style='color: #166534; margin-top: 8px;'><strong>Variations :</strong> \\( f \\) est décroissante sur \\( ]0;1] \\) et croissante sur \\( [1; +\\infty[ \\).</p></div>"
        },
        {
          "question": "2) Déterminer \\( \\lim_{x \\to 0^+} f(x) \\) et \\( \\lim_{x \\to +\\infty} f(x) \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>En \\( 0^+ \\) : \\( \\lim_{x \\to 0^+} x \\ln x = 0 \\) (limite de référence), et \\( \\lim_{x \\to 0^+} x = 0 \\). Donc \\( \\lim_{x \\to 0^+} f(x) = 0 \\).</p><p style='color: #166534; margin: 0;'>En \\( +\\infty \\) : \\( \\lim_{x \\to +\\infty} x \\ln x = +\\infty \\) et \\( \\lim_{x \\to +\\infty} x = +\\infty \\). La forme est indéterminée. On factorise : \\( f(x) = x(\\ln x - 1) \\).</p><p style='color: #166534; margin: 0;'>\\( \\lim_{x \\to +\\infty} x = +\\infty \\) et \\( \\lim_{x \\to +\\infty} (\\ln x - 1) = +\\infty \\). Donc \\( \\lim_{x \\to +\\infty} f(x) = +\\infty \\).</p></div>"
        },
        {
          "question": "3) Résoudre dans \\( \\mathbb{R} \\) l'équation \\( f(x) = 0 \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>\\( f(x) = 0 \\Rightarrow x \\ln x - x = 0 \\Rightarrow x(\\ln x - 1) = 0 \\).</p><p style='color: #166534; margin: 0;'>Comme \\( x > 0 \\), on a \\( \\ln x - 1 = 0 \\Rightarrow \\ln x = 1 \\Rightarrow x = e \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Ensemble solution :</strong> \\( S = \\{ e \\} \\)</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Primitives et calcul intégral",
      "points": "4 pts",
      "enonce": "On considère la fonction \\( f \\) définie sur \\( ]0; +\\infty[ \\) par \\( f(x) = \\dfrac{1}{x \\ln x} \\).",
      "questions": [
        {
          "question": "1) Déterminer une primitive \\( F \\) de \\( f \\) sur \\( ]1; +\\infty[ \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>On pose \\( u = \\ln x \\), alors \\( u' = \\dfrac{1}{x} \\).</p><p style='color: #166534; margin: 0;'>On a \\( \\dfrac{1}{x \\ln x} = \\dfrac{u'}{u} \\).</p><p style='color: #166534; margin: 0;'>Une primitive est donc \\( F(x) = \\ln|u| = \\ln(\\ln x) \\) sur \\( ]1; +\\infty[ \\) (car \\( \\ln x > 0 \\)).</p><p style='color: #166534; margin-top: 8px;'><strong>Primitive :</strong> \\( F(x) = \\ln(\\ln x) \\)</p></div>"
        },
        {
          "question": "2) Calculer \\( I = \\displaystyle\\int_{e}^{e^2} \\dfrac{1}{x \\ln x} \\, dx \\).",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>D'après la question précédente, une primitive de \\( f \\) est \\( F(x) = \\ln(\\ln x) \\).</p><p style='color: #166534; margin: 0;'>On a donc :</p><p style='color: #166534; margin: 0;'>\\( I = [\\ln(\\ln x)]_{e}^{e^2} = \\ln(\\ln(e^2)) - \\ln(\\ln e) = \\ln(2) - \\ln(1) = \\ln 2 - 0 = \\ln 2 \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Résultat :</strong> \\( I = \\ln 2 \\)</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Probabilités",
      "points": "4 pts",
      "enonce": "Une urne contient 5 boules blanches et 3 boules noires. On tire successivement et sans remise deux boules.",
      "questions": [
        {
          "question": "1) Calculer la probabilité de tirer deux boules blanches.",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>Soit \\( A \\) l'événement \"tirer deux boules blanches\".</p><p style='color: #166534; margin: 0;'>Au premier tirage, il y a 5 boules blanches sur 8 : \\( P(\\text{1ère blanche}) = \\dfrac{5}{8} \\).</p><p style='color: #166534; margin: 0;'>Au second tirage, il reste 4 boules blanches sur 7 : \\( P(\\text{2ème blanche} \\mid \\text{1ère blanche}) = \\dfrac{4}{7} \\).</p><p style='color: #166534; margin: 0;'>Donc \\( P(A) = \\dfrac{5}{8} \\times \\dfrac{4}{7} = \\dfrac{20}{56} = \\dfrac{5}{14} \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Probabilité :</strong> \\( P(A) = \\dfrac{5}{14} \\)</p></div>"
        },
        {
          "question": "2) Calculer la probabilité de tirer exactement une boule blanche.",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>Soit \\( B \\) l'événement \"tirer exactement une boule blanche\".</p><p style='color: #166534; margin: 0;'>Deux cas possibles :</p><p style='color: #166534; margin: 0;'>- Blanche puis Noire : \\( \\dfrac{5}{8} \\times \\dfrac{3}{7} = \\dfrac{15}{56} \\)</p><p style='color: #166534; margin: 0;'>- Noire puis Blanche : \\( \\dfrac{3}{8} \\times \\dfrac{5}{7} = \\dfrac{15}{56} \\)</p><p style='color: #166534; margin: 0;'>Donc \\( P(B) = \\dfrac{15}{56} + \\dfrac{15}{56} = \\dfrac{30}{56} = \\dfrac{15}{28} \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Probabilité :</strong> \\( P(B) = \\dfrac{15}{28} \\)</p></div>"
        },
        {
          "question": "3) On répète cette expérience 3 fois de suite. Quelle est la probabilité d'obtenir exactement deux fois deux boules blanches ?",
          "reponse": "<div style='background-color: #f0fdf4; padding: 12px; border-radius: 6px;'><p style='color: #166534; margin: 0;'><strong>Solution :</strong></p><p style='color: #166534; margin: 0;'>Soit \\( A \\) l'événement \"tirer deux boules blanches\" lors d'une expérience.</p><p style='color: #166534; margin: 0;'>D'après la question 1, \\( P(A) = \\dfrac{5}{14} \\).</p><p style='color: #166534; margin: 0;'>L'expérience est répétée 3 fois de manière indépendante. On est dans un schéma de Bernoulli.</p><p style='color: #166534; margin: 0;'>La probabilité d'obtenir exactement deux fois \\( A \\) est :</p><p style='color: #166534; margin: 0;'>\\( \\binom{3}{2} \\left(\\dfrac{5}{14}\\right)^2 \\left(1 - \\dfrac{5}{14}\\right)^{1} = 3 \\times \\dfrac{25}{196} \\times \\dfrac{9}{14} = \\dfrac{675}{2744} \\).</p><p style='color: #166534; margin-top: 8px;'><strong>Probabilité :</strong> \\( \\dfrac{675}{2744} \\)</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
