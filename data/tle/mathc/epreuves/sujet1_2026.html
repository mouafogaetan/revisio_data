<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths Tle C",
  "classe": "Terminale C",
  "sequence": "Evaluation Sequentielle N°1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Arithmétique dans ℤ et Équations diophantiennes",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Le but de cet exercice est de résoudre une équation diophantienne et d'utiliser les congruences.<br><br> 1) Déterminer, en justifiant, le PGCD des nombres 1 848 et 1 008.<br> 2) En déduire si l'équation <div class='math-block' style='text-align: center; margin: 10px 0;'><div class='math' style='background-color: #e9ecef; padding: 10px; border-radius: 5px; display: inline-block;'> 1848x - 1008y = 1200 </div></div> admet des solutions dans ℤ².<br> 3) Résoudre dans ℤ² l'équation : <div class='math-block' style='text-align: center; margin: 10px 0;'><div class='math' style='background-color: #e9ecef; padding: 10px; border-radius: 5px; display: inline-block;'> 77x - 42y = 50 </div></div> (On pourra utiliser une solution particulière évidente).</div>",
      "questions": [
        {
          "question": "1) Déterminer, en justifiant, le PGCD des nombres 1 848 et 1 008.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>On utilise l'algorithme d'Euclide :<br> 1 848 = 1 × 1 008 + 840<br> 1 008 = 1 × 840 + 168<br> 840 = 5 × 168 + 0<br> Le dernier reste non nul est 168, donc <b>PGCD(1848, 1008) = 168</b>.</div>"
        },
        {
          "question": "2) En déduire si l'équation \( 1848x - 1008y = 1200 \) admet des solutions dans ℤ².",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>L'équation \( 1848x - 1008y = 1200 \) admet des solutions si et seulement si PGCD(1848, 1008) divise 1200.<br> On a 168 ne divise pas 1200 (car 1200 / 168 ≈ 7,14).<br> Donc <b>l'équation n'admet pas de solutions dans ℤ²</b>.</div>"
        },
        {
          "question": "3) Résoudre dans ℤ² l'équation : \( 77x - 42y = 50 \). (On pourra utiliser une solution particulière évidente).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>On a PGCD(77, 42) = 7. Comme 7 ne divise pas 50, l'équation \( 77x - 42y = 50 \) <b>n'a pas de solution</b> dans ℤ². (Si on avait cherché une solution particulière, on aurait constaté cette impossibilité).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Nombres Complexes (Approche Algébrique)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>L'objectif est de maîtriser les calculs algébriques et la résolution d'équations dans ℂ.<br><br> On donne les nombres complexes suivants : <div class='math-block' style='text-align: center; margin: 10px 0;'> <span class='math' style='background-color: #e9ecef; padding: 5px 10px; border-radius: 4px;'>z₁ = 2 + 3i</span> et <span class='math' style='background-color: #e9ecef; padding: 5px 10px; border-radius: 4px;'>z₂ = 1 - i</span> </div> <br> 1) Calculer \( z₁ + z₂ \), \( z₁ \\times z₂ \) et \( \\frac{z₁}{z₂} \) (donner le résultat sous forme algébrique).<br> 2) Résoudre dans ℂ l'équation : <div class='math-block' style='text-align: center; margin: 10px 0;'><div class='math' style='background-color: #e9ecef; padding: 10px; border-radius: 5px; display: inline-block;'> 2z² - 4z + 10 = 0 </div></div></div>",
      "questions": [
        {
          "question": "1) Calculer \( z₁ + z₂ \), \( z₁ \\times z₂ \) et \( \\frac{z₁}{z₂} \) (donner le résultat sous forme algébrique).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><b>Addition :</b> \( z₁ + z₂ = (2+3i) + (1-i) = 3 + 2i \).<br><b>Multiplication :</b> \( z₁ \\times z₂ = (2+3i)(1-i) = 2 - 2i + 3i - 3i^2 = 2 + i + 3 = 5 + i \).<br><b>Division :</b> \( \\frac{z₁}{z₂} = \\frac{2+3i}{1-i} = \\frac{(2+3i)(1+i)}{(1-i)(1+i)} = \\frac{2 + 2i + 3i + 3i^2}{2} = \\frac{2 + 5i - 3}{2} = \\frac{-1 + 5i}{2} = -\\frac{1}{2} + \\frac{5}{2}i \).</div>"
        },
        {
          "question": "2) Résoudre dans ℂ l'équation : \( 2z² - 4z + 10 = 0 \).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>On divise par 2 : \( z² - 2z + 5 = 0 \).<br> Discriminant : \( \\Delta = (-2)^2 - 4 \\times 1 \\times 5 = 4 - 20 = -16 \\).<br> \( \\sqrt{\\Delta} = 4i \\).<br> Les solutions sont : \( z_1 = \\frac{2 - 4i}{2} = 1 - 2i \) et \( z_2 = \\frac{2 + 4i}{2} = 1 + 2i \).<br> Donc <b>S = {1 - 2i, 1 + 2i}</b>.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Espaces vectoriels et Applications linéaires",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Soit \( E = \\mathbb{R}^3 \) muni de sa structure d'espace vectoriel usuelle. On considère l'application \( f : E \\rightarrow E \) définie par : <div class='math-block' style='text-align: center; margin: 10px 0;'><div class='math' style='background-color: #e9ecef; padding: 10px; border-radius: 5px; display: inline-block;'> f(x, y, z) = (x + y, y + z, x - z) </div></div> <br> 1) Montrer que \( f \) est une application linéaire.<br> 2) Déterminer le noyau \( \\text{Ker}(f) \) et l'image \( \\text{Im}(f) \) de \( f \).</div>",
      "questions": [
        {
          "question": "1) Montrer que \( f \) est une application linéaire.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Pour montrer que \( f \) est linéaire, il faut vérifier que pour tous vecteurs \( u = (x,y,z) \) et \( v = (x', y', z') \) et tout scalaire \( \\lambda \\in \\mathbb{R} \), on a :<br> \( f(u + v) = f(u) + f(v) \) et \( f(\\lambda u) = \\lambda f(u) \).<br> Les coordonnées de \( f(u) \) sont des combinaisons linéaires de celles de \( u \). On peut aussi dire que \( f \) est représentée par la matrice \( M = \\begin{pmatrix} 1 & 1 & 0 \\\\ 0 & 1 & 1 \\\\ 1 & 0 & -1 \\end{pmatrix} \), ce qui prouve sa linéarité.</div>"
        },
        {
          "question": "2) Déterminer le noyau \( \\text{Ker}(f) \) et l'image \( \\text{Im}(f) \) de \( f \).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><b>Noyau (Ker(f)) :</b> On résout \( f(x,y,z) = (0,0,0) \).<br> \( \\begin{cases} x + y = 0 \\\\ y + z = 0 \\\\ x - z = 0 \\end{cases} \) <br> De \( x = -y \) et \( z = -y \), la troisième équation \( (-y) - (-y) = 0 \) est vérifiée. Donc \( \\text{Ker}(f) = \\{ (x, -x, -x) \\ | \\ x \\in \\mathbb{R} \\} = \\text{Vect}\\{ (1, -1, -1) \\} \\).<br><b>Image (Im(f)) :</b> L'image est engendrée par les colonnes de la matrice : \( \\text{Im}(f) = \\text{Vect}\\{ (1, 0, 1), (1, 1, 0), (0, 1, -1) \\} \\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Suites Numériques (Raisonnement par récurrence et convergence)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>On considère la suite \( (u_n)_{n \\in \\mathbb{N}} \) définie par \( u_0 = 2 \) et pour tout \( n \\in \\mathbb{N} \), <div class='math-block' style='text-align: center; margin: 10px 0;'><div class='math' style='background-color: #e9ecef; padding: 10px; border-radius: 5px; display: inline-block;'> u_{n+1} = \\frac{1}{2}u_n + 1 </div></div> <br> 1) Démontrer par récurrence que pour tout \( n \\in \\mathbb{N} \), \( u_n \\ge 2 \).<br> 2) Étudier la monotonie de la suite \( (u_n) \).<br> 3) En déduire que la suite \( (u_n) \) est convergente et déterminer sa limite.</div>",
      "questions": [
        {
          "question": "1) Démontrer par récurrence que pour tout \( n \\in \\mathbb{N} \), \( u_n \\ge 2 \).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><b>Initialisation :</b> Pour \( n=0 \), \( u_0 = 2 \\ge 2 \). La propriété est vraie.<br><b>Hérédité :</b> Supposons \( u_n \\ge 2 \). Alors \( \\frac{1}{2}u_n \\ge 1 \\), donc \( u_{n+1} = \\frac{1}{2}u_n + 1 \\ge 1 + 1 = 2 \\). La propriété est héréditaire.<br> Donc pour tout \( n \\in \\mathbb{N} \), \( u_n \\ge 2 \).</div>"
        },
        {
          "question": "2) Étudier la monotonie de la suite \( (u_n) \).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>On calcule \( u_{n+1} - u_n = \\frac{1}{2}u_n + 1 - u_n = 1 - \\frac{1}{2}u_n = \\frac{2 - u_n}{2} \\).<br> D'après la question 1, \( u_n \\ge 2 \), donc \( 2 - u_n \\le 0 \\). Ainsi, \( u_{n+1} - u_n \\le 0 \\).<br> Donc la suite \( (u_n) \) est <b>décroissante</b>.</div>"
        },
        {
          "question": "3) En déduire que la suite \( (u_n) \) est convergente et déterminer sa limite.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>La suite \( (u_n) \) est décroissante et minorée par 2 (question 1). D'après le théorème de convergence monotone, elle est convergente.<br> Soit \( l = \\lim_{n \\to +\\infty} u_n \). En passant à la limite dans la relation de récurrence : \( l = \\frac{1}{2}l + 1 \\Rightarrow l - \\frac{1}{2}l = 1 \\Rightarrow \\frac{1}{2}l = 1 \\Rightarrow l = 2 \\).<br> Donc <b>\( \\lim_{n \\to +\\infty} u_n = 2 \)</b>.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Statistiques à deux variables (Ajustement linéaire)",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
