<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques Tle C",
  "classe": "Terminale C",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Congruences et arithmétique (Partie A, Session 2022 C)",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>D'après Session 2022 C, Partie A, Exercice 1.</p><div style='background-color: #f4f7fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #1a202c;'>\\( n \\) est un entier naturel.</div></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.1</strong> Déterminer le reste de la division euclidienne de \\( 3^n \\) par 2.</div>",
          "reponse": "<div style='font-size:16px;'>\\( 3 \\equiv 1 \\; [2] \\) donc \\( 3^n \\equiv 1 \\; [2] \\). Le reste est toujours 1.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>1.2</strong> Montrer que pour tout entier naturel \\( n \\), \\( 3^{n+2} \\equiv 9 \\times 3^n \\; [7] \\).</div>",
          "reponse": "<div style='font-size:16px;'>\\( 3^{n+2} = 9 \\times 3^n \\). La congruence est triviale.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>1.3</strong> En utilisant la question précédente, calculer le reste de la division euclidienne de \\( 3^{2024} \\) par 7.</div>",
          "reponse": "<div style='font-size:16px;'>\\( 3^3 = 27 \\equiv -1 \\; [7] \\). Donc \\( 3^{2024} = 3^{3\\times674 + 2} = (3^3)^{674} \\times 9 \\equiv (-1)^{674} \\times 2 \\equiv 2 \\; [7] \\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Nombres complexes et similitudes (Partie A, Session 2024 C)",
      "points": "5 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>D'après Session 2024 C, Partie A, Exercice 2.</p><div style='background-color: #f4f7fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #1a202c;'>Le plan est rapporté à un repère orthonormé direct \\( (O, \\vec{u}, \\vec{v}) \\).</div></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>2.1</strong> Résoudre dans \\( \\mathbb{C} \\) l'équation \\( z^2 - 2z + 2 = 0 \\).</div>",
          "reponse": "<div style='font-size:16px;'>\\( \\Delta = -4 = (2i)^2 \\). Les solutions sont \\( z_1 = 1+i \\) et \\( z_2 = 1-i \\).</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.2</strong> On considère la similitude directe d'écriture complexe \\( z' = (1+i)z - i \\). Déterminer son rapport et son angle.</div>",
          "reponse": "<div style='font-size:16px;'>Le rapport est \\( |1+i| = \\sqrt{2} \\) et l'angle est \\( \\arg(1+i) = \\frac{\\pi}{4} \\).</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.3</strong> Déterminer le centre de cette similitude.</div>",
          "reponse": "<div style='font-size:16px;'>\\( \\omega = \\frac{b}{1-a} = \\frac{-i}{1-(1+i)} = \\frac{-i}{-i} = 1 \\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Suites numériques et récurrence",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>On considère la suite \\( (u_n) \\) définie par \\( u_0 = 1 \\) et pour tout \\( n \\in \\mathbb{N} \\), \\( u_{n+1} = \\sqrt{2u_n + 3} \\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>3.1</strong> Montrer par récurrence que pour tout \\( n \\in \\mathbb{N} \\), \\( -1 \\le u_n \\le 3 \\).</div>",
          "reponse": "<div style='font-size:16px;'>Initialisation : \\( u_0 = 1 \\in [-1;3] \\). Hérédité : Si \\( -1 \\le u_n \\le 3 \\), alors \\( 1 \\le 2u_n+3 \\le 9 \\), donc \\( 1 \\le u_{n+1} \\le 3 \\).</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>3.2</strong> Étudier la monotonie de la suite \\( (u_n) \\).</div>",
          "reponse": "<div style='font-size:16px;'>\\( u_{n+1} - u_n = \\frac{3 - u_n^2}{\\sqrt{2u_n + 3} + u_n} \\). Comme \\( u_n \\ge -1 \\), le dénominateur est positif, donc la suite est croissante.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>3.3</strong> En déduire que la suite \\( (u_n) \\) converge et déterminer sa limite.</div>",
          "reponse": "<div style='font-size:16px;'>La suite est croissante et majorée, donc elle converge vers \\( \\ell \\), solution de \\( \\ell = \\sqrt{2\\ell + 3} \\). Soit \\( \\ell = 3 \\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Probabilités et loi binomiale (Partie A, Session 2022 C)",
      "points": "3 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>D'après Session 2022 C, Partie A, Exercice 4.</p><div style='background-color: #f4f7fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #1a202c;'>Une urne contient 5 boules blanches et 3 boules noires. On tire successivement et avec remise 4 boules.</div></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>4.1</strong> Justifier que cette expérience est un schéma de Bernoulli. Préciser ses paramètres.</div>",
          "reponse": "<div style='font-size:16px;'>Il s'agit d'une répétition de 4 épreuves de Bernoulli indépendantes identiques avec succès 'tirer une boule blanche' de probabilité \\( p = \\frac{5}{8} \\).</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>4.2</strong> Calculer la probabilité de tirer exactement 3 boules blanches.</div>",
          "reponse": "<div style='font-size:16px;'>\\( P(X=3) = \\binom{4}{3} \\left( \\frac{5}{8} \\right)^3 \\left( \\frac{3}{8} \\right) = \\frac{375}{2048} \\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Calcul intégral et volume de révolution (Partie A, Session 2022 C)",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>D'après Session 2022 C, Partie A, Exercice 3.</p><div style='background-color: #f4f7fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #1a202c;'>On considère le domaine \\( \\mathcal{D} \\) délimité par la courbe \\( y = \\ln x \\), l'axe des abscisses et les droites \\( x = 1 \\) et \\( x = e \\).</div></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>5.1</strong> Déterminer l'aire du domaine \\( \\mathcal{D} \\) à l'aide d'une intégration par parties.</div>",
          "reponse": "<div style='font-size:16px;'>\\( \\mathcal{A} = \\int_1^e \\ln x \\, dx = \\left[ x \\ln x - x \\right]_1^e = (e - e) - (0 - 1) = 1 \\) unité d'aire.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>5.2</strong> Calculer le volume du solide engendré par la rotation de \\( \\mathcal{D} \\) autour de l'axe des abscisses.</div>",
          "reponse": "<div style='font-size:16px;'>\\( V = \\pi \\int_1^e (\\ln x)^2 dx = \\pi \\left[ x(\\ln x)^2 - 2x \\ln x + 2x \\right]_1^e = \\pi(e - 2) \\).</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
