<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle C",
  "classe": "Terminale C",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Échanges membranaires et transports cellulaires",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>La membrane plasmique est une barrière sélective qui contrôle les échanges entre la cellule et son milieu extérieur. Les molécules peuvent traverser cette membrane par différents mécanismes.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.</strong> Définir l'osmose et expliquer son rôle dans les échanges d'eau entre la cellule et son milieu.</div>",
          "reponse": "<div style='font-size:16px;'>L'<strong>osmose</strong> est le mouvement passif de l'eau à travers une membrane semi-perméable, du milieu le moins concentré en solutés (hypotonique) vers le milieu le plus concentré (hypertonique). Ce phénomène permet de réguler la turgescence des cellules. En milieu hypotonique, l'eau entre dans la cellule (turgescence) ; en milieu hypertonique, l'eau sort, provoquant une plasmolyse.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.</strong> Distinguer le transport passif du transport actif en précisant leurs critères (énergie, gradient).</div>",
          "reponse": "<div style='font-size:16px;'><table style='width:100%; border-collapse:collapse; font-size:14px;'><tr style='background-color:#e2e8f0;'><th style='border:1px solid #cbd5e1; padding:5px;'>Critère</th><th style='border:1px solid #cbd5e1; padding:5px;'>Transport passif</th><th style='border:1px solid #cbd5e1; padding:5px;'>Transport actif</th></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Énergie</td><td style='border:1px solid #cbd5e1; padding:5px;'>Aucune (diffusion)</td><td style='border:1px solid #cbd5e1; padding:5px;'>Consomme de l'ATP</td></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Gradient</td><td style='border:1px solid #cbd5e1; padding:5px;'>Suivant le gradient de concentration</td><td style='border:1px solid #cbd5e1; padding:5px;'>Contre le gradient</td></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Exemple</td><td style='border:1px solid #cbd5e1; padding:5px;'>Diffusion simple de l'O₂</td><td style='border:1px solid #cbd5e1; padding:5px;'>Pompe Na⁺/K⁺</td></tr></table></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Fécondation, méiose et diversité génétique",
      "points": "5 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>La reproduction sexuée assure la pérennité des espèces tout en créant une diversité génétique chez les individus.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.</strong> Décrire les grandes étapes de la fécondation chez les mammifères en précisant les événements qui conduisent à la fusion des pronoyaux.</div>",
          "reponse": "<div style='font-size:16px;'>La fécondation chez les mammifères se déroule en plusieurs étapes :<br><br>1. <strong>Pénétration du spermatozoïde</strong> : le spermatozoïde traverse la zone pellucide de l'ovule grâce à des enzymes (acrosine).<br>2. <strong>Activation de l'ovule</strong> : la pénétration déclenche une réaction corticale qui modifie la zone pellucide (blocage polyspermique) et active le métabolisme de l'ovule.<br>3. <strong>Fusion des pronoyaux</strong> : le pronoyau mâle (du spermatozoïde) et le pronoyau femelle (de l'ovule) se rapprochent et fusionnent pour former le noyau diploïde de l'œuf (zygote).</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.</strong> Expliquer comment la méiose et la fécondation assurent à la fois la stabilité du caryotype et la diversité génétique.</div>",
          "reponse": "<div style='font-size:16px;'>La <strong>méiose</strong> permet de réduire le nombre de chromosomes (2n → n), assurant que lors de la <strong>fécondation</strong> (fusion de deux gamètes n), le caryotype diploïde (2n) soit restauré. C'est la <strong>stabilité du caryotype</strong>.<br><br>La diversité génétique provient de :<br>- <strong>Crossing-over</strong> (échange de fragments entre chromosomes homologues) lors de la méiose.<br>- <strong>Disjonction aléatoire</strong> des chromosomes homologues (2<sup>n</sup> combinaisons possibles).<br>- <strong>Fécondation aléatoire</strong> (rencontre de gamètes génétiquement différents).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Génétique formelle - Hérédité autosomique",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>L'albinisme est une maladie génétique autosomique récessive. Un couple non albinos (de phénotype normal) a déjà un enfant albinos. Ils souhaitent avoir un deuxième enfant.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.</strong> Déterminer le génotype des parents en justifiant votre réponse.</div>",
          "reponse": "<div style='font-size:16px;'>L'albinisme est une maladie autosomique récessive. Un individu albinos est donc homozygote pour l'allèle muté (aa).<br><br>Les parents sont de phénotype normal (non albinos) mais ont un enfant albinos (aa). Chacun des parents a donc transmis un allèle récessif (a). Leur génotype est donc <strong>hétérozygote (Aa)</strong>.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.</strong> Calculer la probabilité que leur deuxième enfant soit également albinos.</div>",
          "reponse": "<div style='font-size:16px;'>Les parents étant tous les deux hétérozygotes (Aa × Aa), le tableau de croisement donne :<br><br>|   | A | a |<br>|---|---|---|<br>| A | AA | Aa |<br>| a | Aa | aa |<br><br>La probabilité d'avoir un enfant albinos (aa) est de <strong>1/4 (25%)</strong>.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Hérédité gonosomique et mutations",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>Le daltonisme est une maladie héréditaire récessive liée au chromosome X. On étudie une famille où le père est daltonien et la mère est non daltonienne (homozygote).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.</strong> Déterminer les génotypes des parents et le risque pour leurs enfants d'être daltoniens.</div>",
          "reponse": "<div style='font-size:16px;'>Le daltonisme est lié à l'X récessif.<br><br>- Père daltonien : X<sup>d</sup>Y<br>- Mère non daltonienne homozygote : X<sup>D</sup>X<sup>D</sup><br><br>Les enfants :<br>- Filles : X<sup>D</sup>X<sup>d</sup> (non daltoniennes porteuses)<br>- Garçons : X<sup>D</sup>Y (non daltoniens)<br><br>Aucun enfant ne sera daltonien, mais les filles seront toutes porteuses de l'allèle.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.</strong> Si une fille porteuse a un enfant avec un homme non daltonien, quel est le risque d'avoir un enfant daltonien ?</div>",
          "reponse": "<div style='font-size:16px;'>Fille porteuse : X<sup>D</sup>X<sup>d</sup> × Homme non daltonien : X<sup>D</sup>Y<br><br>|   | X<sup>D</sup> | Y |<br>|---|---|---|<br>| X<sup>D</sup> | X<sup>D</sup>X<sup>D</sup> | X<sup>D</sup>Y |<br>| X<sup>d</sup> | X<sup>D</sup>X<sup>d</sup> | X<sup>d</sup>Y |<br><br>Les garçons ont 1/2 risque d'être daltoniens (X<sup>d</sup>Y). Les filles ne le seront jamais.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>3.</strong> Distinguer une mutation génique d'une mutation chromosomique en donnant un exemple pour chaque.</div>",
          "reponse": "<div style='font-size:16px;'><strong>Mutation génique</strong> : modification de la séquence nucléotidique d'un gène. Exemple : délétion (perte d'un ou plusieurs nucléotides) ou insertion (ajout). La drépanocytose est due à une mutation génique ponctuelle (substitution d'un nucléotide).<br><br><strong>Mutation chromosomique</strong> : modification de la structure ou du nombre des chromosomes. Exemple : translocation (échange de segments entre chromosomes non homologues), inversion (retournement d'un segment chromosomique). La trisomie 21 est une mutation chromosomique numérique.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Système immunitaire et maladies auto-immunes",
      "points": "3 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>Le système immunitaire protège l'organisme contre les agressions extérieures. Il peut parfois dysfonctionner et s'attaquer aux cellules de l'organisme lui-même.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.</strong> Expliquer le rôle de la moelle osseuse et du thymus dans la formation et la maturation des lymphocytes.</div>",
          "reponse": "<div style='font-size:16px;'>La <strong>moelle osseuse</strong> est le lieu de production de toutes les cellules sanguines, y compris les précurseurs des lymphocytes. Les <strong>lymphocytes B</strong> y effectuent toute leur maturation.<br><br>Les précurseurs des <strong>lymphocytes T</strong> migrent vers le <strong>thymus</strong>, où ils subissent une sélection : les lymphocytes T reconnaissant les antigènes du soi sont éliminés (tolérance immunitaire). C'est dans le thymus qu'ils acquièrent leur compétence immunitaire.</div>"
        },
        {
          "question": "<div style='font-size:16px;'><strong>2.</strong> Définir une maladie auto-immune en prenant l'exemple du diabète de type 1.</div>",
          "reponse": "<div style='font-size:16px;'>Une <strong>maladie auto-immune</strong> est une pathologie dans laquelle le système immunitaire (lymphocytes T) ne reconnaît plus les cellules de l'organisme comme étant du soi et déclenche une réaction contre elles.<br><br>Dans le <strong>diabète de type 1</strong> (auto-immun), les lymphocytes T détruisent les cellules β des îlots de Langerhans du pancréas. Ces cellules ne produisent plus d'insuline, entraînant une hyperglycémie chronique. C'est une maladie qui survient généralement chez l'enfant ou le jeune adulte.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Communication nerveuse et propagation du message",
      "points": "2 pts",
      "enonce": "<div style='font-size:16px; line-height:1.6; font-family: Arial, sans-serif; padding:5px;'><p>L'influx nerveux se propage le long des fibres nerveuses à des vitesses variables selon plusieurs facteurs.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px;'><strong>1.</strong> Citer les facteurs qui influencent la vitesse de propagation de l'influx nerveux et expliquer leur action.</div>",
          "reponse": "<div style='font-size:16px;'>La vitesse de propagation de l'influx nerveux dépend de :<br><br>1. <strong>Le diamètre de la fibre</strong> : plus le diamètre est grand, plus la vitesse est élevée (résistance interne plus faible).<br>2. <strong>La présence de myéline</strong> : la myéline isole la fibre et permet la propagation saltatoire (de nœud de Ranvier en nœud), accélérant la vitesse.<br>3. <strong>La température</strong> : une augmentation de la température accélère les réactions chimiques et donc la vitesse de propagation.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
