<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle C",
  "classe": "Terminale C",
  "sequence": "Evaluation Sequentielle N°1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les échanges cellulaires et la génétique",
      "points": "8 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Le document ci-dessous représente l'évolution de la masse d'un morceau de pomme de terre (Solanum tuberosum) placé dans une solution d'eau distillée et de sel.<br><br> <div style='text-align: center; margin: 10px 0;'> <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; display: inline-block;'> <span style='font-size: 0.9rem;'>[Graphique : La masse augmente dans l'eau distillée, diminue dans l'eau salée]</span> </div> </div> <br> 1) Identifier le phénomène responsable de la variation de la masse du morceau de pomme de terre dans les deux solutions. Justifier la réponse. <br> 2) Expliquer pourquoi la masse du morceau de pomme de terre augmente dans l'eau distillée et diminue dans la solution saline. <br> 3) Un élève affirme que la membrane plasmique est imperméable à l'eau. Cette affirmation est-elle correcte ? Justifier. <br> 4) Définir les termes : osmose, plasmolyse. </div>",
      "questions": [
        {
          "question": "1) Identifier le phénomène responsable de la variation de la masse du morceau de pomme de terre dans les deux solutions. Justifier la réponse.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le phénomène responsable est l'<strong>osmose</strong> (ou la plasmolyse). L'osmose est le mouvement d'eau à travers une membrane semi-perméable, de la solution la moins concentrée en solutés (la plus diluée) vers la solution la plus concentrée. La pomme de terre étant constituée de cellules contenant des solutés, l'eau se déplace en fonction de la concentration externe.</div>"
        },
        {
          "question": "2) Expliquer pourquoi la masse du morceau de pomme de terre augmente dans l'eau distillée et diminue dans la solution saline.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Dans l'<strong>eau distillée</strong>, le milieu extérieur est plus dilué que le milieu intracellulaire. L'eau entre dans les cellules par osmose, la masse du morceau de pomme de terre augmente (turgescence). Dans la <strong>solution saline</strong>, le milieu extérieur est plus concentré que le milieu intracellulaire. L'eau sort des cellules par osmose, la masse diminue (plasmolyse).</div>"
        },
        {
          "question": "3) Un élève affirme que la membrane plasmique est imperméable à l'eau. Cette affirmation est-elle correcte ? Justifier.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Non, l'affirmation est <strong>incorrecte</strong>. La membrane plasmique est perméable à l'eau. L'eau traverse librement la membrane par osmose, ce qui permet les échanges hydriques entre la cellule et son milieu. L'expérience de la pomme de terre le démontre clairement.</div>"
        },
        {
          "question": "4) Définir les termes : osmose, plasmolyse.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><ul><li><strong>Osmose :</strong> Phénomène de diffusion de l'eau à travers une membrane semi-perméable, des zones où la concentration en solutés est faible (eau pure) vers les zones où elle est élevée.</li><li><strong>Plasmolyse :</strong> Phénomène de sortie d'eau du cytoplasme d'une cellule végétale, provoquant la contraction du contenu cellulaire et le décollement de la membrane plasmique de la paroi pectocellulosique.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : La transmission de l'information génétique",
      "points": "8 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>L'analyse d'un arbre généalogique concernant une maladie héréditaire chez l'humain est présentée ci-dessous. Les individus atteints sont représentés en noir.<br><br> <div style='text-align: center; margin: 10px 0;'> <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; display: inline-block;'> <span style='font-size: 0.9rem;'>[Arbre généalogique : deux générations avec un couple sain ayant un enfant atteint]</span> </div> </div> <br> 1) Quelle est la particularité de ce mode de transmission ? Nommer ce mode de transmission. <br> 2) Déterminer les génotypes des individus I₁, I₂, II₁ et II₂. On utilisera les lettres (A) pour l'allèle normal et (a) pour l'allèle muté. <br> 3) Calculer la probabilité pour que le couple II₁ et II₂ ait un enfant malade. <br> 4) Expliquer l'origine du brassage génétique chez les êtres vivants.</div>",
      "questions": [
        {
          "question": "1) Quelle est la particularité de ce mode de transmission ? Nommer ce mode de transmission.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>La maladie apparaît chez un enfant de parents sains. Ce mode de transmission est <strong>autosomique récessif</strong>. La particularité est que les deux parents sont hétérozygotes (porteurs sains) et transmettent l'allèle muté à leur enfant.</div>"
        },
        {
          "question": "2) Déterminer les génotypes des individus I₁, I₂, II₁ et II₂. On utilisera les lettres (A) pour l'allèle normal et (a) pour l'allèle muté.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Les parents sains (I₁ et I₂) ayant un enfant atteint sont hétérozygotes : <strong>Aa</strong>. L'individu atteint (II₁) a le génotype <strong>aa</strong>. L'individu sain (II₂) a un génotype <strong>AA</strong> ou <strong>Aa</strong> (porteur sain).</div>"
        },
        {
          "question": "3) Calculer la probabilité pour que le couple II₁ et II₂ ait un enfant malade.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Pour que le couple (II₁ × II₂) ait un enfant malade (aa), il faut que II₂ soit hétérozygote (Aa) et transmette l'allèle a. La probabilité que II₂ soit Aa est de 2/3. Si II₂ est Aa, la probabilité que l'enfant soit aa est de 1/2. Donc la probabilité totale est de (2/3) × (1/2) = <strong>1/3</strong>.</div>"
        },
        {
          "question": "4) Expliquer l'origine du brassage génétique chez les êtres vivants.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le brassage génétique provient de deux phénomènes : <br> <ul> <li><strong>Brassage interchromosomique :</strong> Dû à la ségrégation indépendante des chromosomes homologues lors de la méiose. Les allèles portés par des chromosomes différents se recombinent aléatoirement.</li> <li><strong>Brassage intrachromosomique :</strong> Dû aux crossing-over (enjambements) entre chromosomes homologues lors de la méiose, qui créent de nouvelles combinaisons d'allèles sur un même chromosome.</li> </ul> </div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Le système immunitaire et la régulation de la glycémie",
      "points": "8 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Le diabète de type 1 est une maladie auto-immune qui se caractérise par une hyperglycémie chronique. Cette pathologie est due à la destruction des cellules β du pancréas par le système immunitaire.<br><br> 1) Définir une maladie auto-immune et citer deux exemples. <br> 2) Expliquer le rôle de l'insuline dans la régulation de la glycémie. <br> 3) Proposer une explication pour le mécanisme du diabète de type 1. <br> 4) Distinguer le diabète de type 2 du diabète de type 1. </div>",
      "questions": [
        {
          "question": "1) Définir une maladie auto-immune et citer deux exemples.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Une <strong>maladie auto-immune</strong> est une pathologie dans laquelle le système immunitaire attaque les cellules et les tissus de l'organisme qu'il est censé protéger. Exemples : <ul> <li>Diabète de type 1 (destruction des cellules β du pancréas).</li> <li>Vitiligo (destruction des mélanocytes).</li> <li>Polyarthrite rhumatoïde.</li> </ul> </div>"
        },
        {
          "question": "2) Expliquer le rôle de l'insuline dans la régulation de la glycémie.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>L'<strong>insuline</strong> est une hormone hypoglycémiante produite par les cellules β du pancréas. En cas d'augmentation de la glycémie, l'insuline est sécrétée et favorise : <ul> <li>L'entrée du glucose dans les cellules (muscles, foie, tissu adipeux).</li> <li>La transformation du glucose en glycogène (glycogénogenèse) dans le foie et les muscles.</li> <li>La transformation du glucose en lipides (lipogenèse).</li> </ul> </div>"
        },
        {
          "question": "3) Proposer une explication pour le mécanisme du diabète de type 1.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Dans le <strong>diabète de type 1</strong>, le système immunitaire détruit les cellules β des îlots de Langerhans du pancréas. Cette destruction est due à une réaction auto-immune contre les protéines des cellules β. Il en résulte une carence en insuline, entraînant une hyperglycémie chronique.</div>"
        },
        {
          "question": "4) Distinguer le diabète de type 2 du diabète de type 1.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><ul> <li><strong>Diabète de type 1 :</strong> Maladie auto-immune, destruction des cellules β, carence totale en insuline. Débute souvent chez l'enfant ou l'adolescent.</li> <li><strong>Diabète de type 2 :</strong> Résistance des cellules à l'insuline, insuline sécrétée mais inefficace (insulinorésistance). Lié à une alimentation déséquilibrée, la sédentarité et l'obésité. Débute souvent chez l'adulte.</li> </ul> </div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
