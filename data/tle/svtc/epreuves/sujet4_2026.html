<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle C",
  "classe": "Terminale C",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Régulation de la glycémie et diabète",
      "points": "5 pts",
      "enonce": "<p><strong>Partie A : La régulation hormonale</strong></p><p>La glycémie doit rester constante dans l'organisme. Deux hormones pancréatiques, l'insuline et le glucagon, assurent cette régulation.</p><p>1. Indiquez quel organe sécrète ces hormones et précisez leurs effets respectifs sur la glycémie.</p><p>2. Expliquez comment le pancréas réagit après un repas riche en glucides.</p><p><strong>Partie B : Le diabète de type 2</strong></p><p>3. Distinguez le diabète de type 1 du diabète de type 2.</p><p>4. Identifiez trois facteurs favorisant le diabète de type 2.</p><p>5. Proposez deux moyens de lutte contre cette maladie.</p>",
      "questions": [
        {
          "question": "1) Indiquez quel organe sécrète l'insuline et le glucagon et précisez leurs effets respectifs sur la glycémie.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>L'insuline et le glucagon sont sécrétés par le pancréas. L'insuline est une hormone hypoglycémiante : elle fait baisser le taux de glucose dans le sang en favorisant son entrée dans les cellules et son stockage. Le glucagon est une hormone hyperglycémiante : il fait augmenter la glycémie en stimulant la libération de glucose par le foie.</p></div>"
        },
        {
          "question": "2) Expliquez comment le pancréas réagit après un repas riche en glucides.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Après un repas riche en glucides, la glycémie augmente. Cette hausse stimule les cellules β des îlots de Langerhans du pancréas qui sécrètent de l'insuline. L'insuline favorise l'entrée du glucose dans les cellules et son stockage sous forme de glycogène, ce qui fait baisser la glycémie.</p></div>"
        },
        {
          "question": "3) Distinguez le diabète de type 1 du diabète de type 2.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Le diabète de type 1 est une maladie auto-immune caractérisée par la destruction des cellules β du pancréas, ce qui entraîne une absence totale ou quasi-totale d'insuline. Il apparaît généralement chez l'enfant ou l'adolescent. Le diabète de type 2 est caractérisé par une résistance des cellules à l'insuline ; le pancréas produit de l'insuline mais les cellules n'y répondent plus correctement. Il est souvent lié à l'obésité et à la sédentarité et survient généralement à l'âge adulte.</p></div>"
        },
        {
          "question": "4) Identifiez trois facteurs favorisant le diabète de type 2.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Trois facteurs favorisant le diabète de type 2 sont : une alimentation déséquilibrée (riche en sucres et en graisses), la sédentarité (manque d'activité physique), et l'obésité (surpoids important).</p></div>"
        },
        {
          "question": "5) Proposez deux moyens de lutte contre le diabète de type 2.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Deux moyens de lutte contre le diabète de type 2 sont : la pratique d'une activité physique régulière et l'adoption d'une alimentation équilibrée (réduction des sucres rapides et des graisses, augmentation des fibres).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Le système immunitaire",
      "points": "4 pts",
      "enonce": "<p>Le système immunitaire protège l'organisme contre les agressions. Les lymphocytes B et T sont au cœur de cette défense.</p><p>1. Où se forment les lymphocytes B et T ?</p><p>2. Quel est le rôle du thymus dans l'immunité ?</p><p>3. Expliquez le mécanisme de la réponse immunitaire humorale.</p><p>4. Qu'est-ce qu'une maladie auto-immune ? Citez un exemple.</p>",
      "questions": [
        {
          "question": "1) Où se forment les lymphocytes B et T ?",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Les lymphocytes B et T se forment dans la moelle osseuse. Les lymphocytes T migrent ensuite vers le thymus pour y achever leur maturation.</p></div>"
        },
        {
          "question": "2) Quel est le rôle du thymus dans l'immunité ?",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Le thymus est l'organe où les lymphocytes T achevent leur maturation. Il joue un rôle essentiel dans la réponse immunitaire cellulaire en produisant des lymphocytes T matures capables de reconnaître et de détruire les cellules infectées.</p></div>"
        },
        {
          "question": "3) Expliquez le mécanisme de la réponse immunitaire humorale.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>La réponse immunitaire humorale est assurée par les lymphocytes B. Lorsqu'un antigène est reconnu, les lymphocytes B se multiplient et se différencient en plasmocytes. Ces plasmocytes produisent et libèrent des anticorps spécifiques qui se fixent sur l'antigène pour former un complexe immun et le neutraliser.</p></div>"
        },
        {
          "question": "4) Qu'est-ce qu'une maladie auto-immune ? Citez un exemple.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Une maladie auto-immune est une pathologie dans laquelle le système immunitaire se retourne contre les cellules et les tissus de l'organisme lui-même. Des exemples incluent le vitiligo (destruction des mélanocytes), le diabète de type 1 (destruction des cellules β du pancréas) ou la myasthénie.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : La régulation de la pression artérielle",
      "points": "3 pts",
      "enonce": "<p>La pression artérielle est régulée par des mécanismes complexes. Une hypertension peut avoir de graves conséquences sur la santé.</p><p>1. Définissez l'hypertension artérielle.</p><p>2. Citez deux causes possibles de l'hypertension artérielle.</p><p>3. Proposez un moyen de lutter contre cette pathologie.</p>",
      "questions": [
        {
          "question": "1) Définissez l'hypertension artérielle.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>L'hypertension artérielle est une augmentation anormale et chronique de la pression du sang dans les artères. Elle est définie par une pression systolique supérieure à 140 mmHg et/ou une pression diastolique supérieure à 90 mmHg.</p></div>"
        },
        {
          "question": "2) Citez deux causes possibles de l'hypertension artérielle.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Deux causes possibles de l'hypertension artérielle sont une alimentation trop riche en sel et la sédentarité. Le stress chronique et l'obésité sont également des facteurs de risque importants.</p></div>"
        },
        {
          "question": "3) Proposez un moyen de lutter contre l'hypertension artérielle.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Un moyen de lutter contre l'hypertension artérielle est de réduire la consommation de sel, combiné à une activité physique régulière et une alimentation équilibrée riche en fruits et légumes.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Santé reproductive",
      "points": "3 pts",
      "enonce": "<p>La reproduction est régulée par des hormones agissant selon un axe complexe. Des dysfonctionnements peuvent entraîner l'infertilité.</p><p>1. Expliquez le fonctionnement de l'axe hypothalamo-hypophyso-gonadique chez l'homme.</p><p>2. Citez deux causes d'infertilité masculine.</p>",
      "questions": [
        {
          "question": "1) Expliquez le fonctionnement de l'axe hypothalamo-hypophyso-gonadique chez l'homme.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Chez l'homme, l'hypothalamus sécrète la GnRH qui stimule l'hypophyse. L'hypophyse sécrète alors deux hormones : la FSH qui stimule la spermatogenèse et la LH qui stimule la production de testostérone par les cellules de Leydig. La testostérone assure le développement des caractères sexuels secondaires et régule l'ensemble par un rétrocontrôle négatif sur l'hypothalamus et l'hypophyse.</p></div>"
        },
        {
          "question": "2) Citez deux causes d'infertilité masculine.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Deux causes d'infertilité masculine sont l'oligospermie (faible nombre de spermatozoïdes) et l'azoospermie (absence de spermatozoïdes dans le sperme). La cryptorchidie (non-descente des testicules) peut également être une cause.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Gestion des risques et valorisation des déchets",
      "points": "3 pts",
      "enonce": "<p>La gestion des risques et la valorisation des déchets sont des enjeux majeurs pour l'environnement et la santé humaine.</p><p>1. Classez les catastrophes suivantes selon leur origine (naturelle ou humaine) : tsunami, marée noire, séisme, feux de brousse.</p><p>2. Proposez deux éco-gestes pour prévenir les inondations.</p><p>3. Citez deux avantages du recyclage du papier.</p>",
      "questions": [
        {
          "question": "1) Classez les catastrophes suivantes selon leur origine (naturelle ou humaine) : tsunami, marée noire, séisme, feux de brousse.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Catastrophes naturelles : tsunami, séisme. Catastrophes humaines : marée noire, feux de brousse (souvent d'origine humaine).</p></div>"
        },
        {
          "question": "2) Proposez deux éco-gestes pour prévenir les inondations.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Deux éco-gestes pour prévenir les inondations sont : ne pas jeter les déchets dans les canalisations pour éviter les obstructions et favoriser l'infiltration de l'eau en limitant le bétonnage des sols.</p></div>"
        },
        {
          "question": "3) Citez deux avantages du recyclage du papier.",
          "reponse": "<div style='background-color:#f0fdf4;padding:12px;border-radius:6px;'><p style='color:#166534;margin:0;'><strong>Réponse :</strong></p><p style='color:#166534;margin:0;'>Deux avantages du recyclage du papier sont : la préservation des arbres (réduction de la déforestation) et les économies d'énergie par rapport à la production de papier neuf.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
