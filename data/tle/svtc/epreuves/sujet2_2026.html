<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVT Tle C",
 "classe": "Terminale C",
 "sequence": "Séquence 2",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Évaluation des ressources",
     "points": "6 pts",
     "enonce": "<p>Cet exercice porte sur les connaissances fondamentales concernant les échanges cellulaires, la reproduction, la génétique et la communication nerveuse.</p>",
     "questions": [
       {
         "question": "<div class='question-text'>1) Définissez l'osmose et précisez dans quel sens se fait le mouvement de l'eau.</div>",
         "reponse": "<div><p>L'<strong>osmose</strong> est le mouvement passif de l'eau à travers une membrane semi-perméable, depuis la solution la moins concentrée en solutés (hypotonique) vers la solution la plus concentrée (hypertonique).</p></div>"
       },
       {
         "question": "<div class='question-text'>2) Expliquez le rôle de la méiose dans le passage d'une cellule diploïde à des cellules haploïdes.</div>",
         "reponse": "<div><p>La <strong>méiose</strong> est une division cellulaire qui comporte deux divisions successives :</p><ul><li>La première division (méiose I) sépare les chromosomes homologues, réduisant ainsi le nombre de chromosomes de 2n à n.</li><li>La seconde division (méiose II) sépare les chromatides-sœurs.</li></ul><p>Au final, une cellule diploïde (2n) produit quatre cellules haploïdes (n) génétiquement distinctes.</p></div>"
       },
       {
         "question": "<div class='question-text'>3) Citez deux facteurs qui influencent la vitesse de propagation de l'influx nerveux.</div>",
         "reponse": "<div><p>Les deux principaux facteurs sont :</p><ul><li>Le <strong>diamètre de la fibre nerveuse</strong> : plus il est grand, plus la vitesse est élevée.</li><li>La <strong>présence de myéline</strong> : la gaine de myéline accélère la propagation par conduction saltatoire.</li></ul></div>"
       },
       {
         "question": "<div class='question-text'>4) Dans un croisement monohybride entre deux hétérozygotes Aa × Aa, quelles sont les proportions génotypiques et phénotypiques obtenues selon les lois de Mendel (dominance complète) ?</div>",
         "reponse": "<div><p>Les proportions sont :</p><ul><li><strong>Génotypes</strong> : 1/4 AA : 1/2 Aa : 1/4 aa</li><li><strong>Phénotypes</strong> (dominance complète) : 3/4 [A] : 1/4 [a]</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : La fécondation chez les mammifères",
     "points": "5 pts",
     "enonce": "<p>La fécondation est une étape clé de la reproduction sexuée chez les mammifères. Elle assure la fusion des gamètes et le développement d'un nouvel individu.</p>",
     "questions": [
       {
         "question": "<div class='question-text'>1) Décrivez les principales étapes de la fécondation chez les mammifères.</div>",
         "reponse": "<div><p>La fécondation chez les mammifères comprend plusieurs étapes :</p><ul><li><strong>Pénétration du spermatozoïde</strong> : le spermatozoïde traverse la corona radiata et la zone pellucide de l'ovule grâce à l'acrosome (réaction acrosomique).</li><li><strong>Activation de l'ovule</strong> : après la fusion des membranes, l'ovule finit sa deuxième division méiotique et bloque la polyspermie.</li><li><strong>Fusion des pronoyaux</strong> : les pronoyaux mâle et femelle fusionnent pour former le zygote diploïde.</li></ul></div>"
       },
       {
         "question": "<div class='question-text'>2) Expliquez pourquoi la fécondation est un phénomène qui assure à la fois la stabilité et la diversité génétique.</div>",
         "reponse": "<div><p>La <strong>fécondation</strong> permet la stabilité de l'espèce en restaurant le stock diploïde de chromosomes (2n).</p><p>Elle assure également la <strong>diversité génétique</strong> par la rencontre aléatoire de gamètes génétiquement uniques (issus de la méiose) : chaque nouvel individu possède une combinaison originale d'allèles hérités de ses deux parents.</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Analyse d'un arbre généalogique",
     "points": "6 pts",
     "enonce": "<p>On étudie la transmission d'une maladie génétique autosomique récessive (l'albinisme) dans une famille. L'albinisme est caractérisé par une absence de pigmentation de la peau, des cheveux et des yeux. L'allèle normal est noté <em>A</em> et l'allèle muté est noté <em>a</em>.</p><div class='data-table'><table><thead><tr><th>Individu</th><th>Phénotype</th><th>Génotype (si connu)</th></tr></thead><tbody><tr><td>I-1</td><td>Normal</td><td>?</td></tr><tr><td>I-2</td><td>Normal</td><td>?</td></tr><tr><td>II-1</td><td>Albinos</td><td>aa</td></tr><tr><td>II-2</td><td>Normal</td><td>?</td></tr><tr><td>II-3</td><td>Normal</td><td>?</td></tr><tr><td>II-4</td><td>Normal</td><td>?</td></tr><tr><td>III-1</td><td>Normal</td><td>?</td></tr><tr><td>III-2</td><td>Albinos</td><td>aa</td></tr></tbody></table></div>",
     "questions": [
       {
         "question": "<div class='question-text'>1) Déterminez les génotypes possibles des parents I-1 et I-2. Justifiez votre réponse.</div>",
         "reponse": "<div><p>Les parents I-1 et I-2 sont tous les deux de phénotype normal mais ont un enfant albinos (II-1). L'allèle de l'albinisme étant récessif (a), cet enfant est homozygote <strong>aa</strong> et a donc hérité d'un allèle a de chacun de ses parents. Par conséquent, les parents sont tous les deux hétérozygotes : <strong>Aa</strong>.</p></div>"
       },
       {
         "question": "<div class='question-text'>2) Calculez la probabilité pour que II-2 soit porteur sain (hétérozygote Aa).</div>",
         "reponse": "<div><p>II-2 est un enfant de parents hétérozygotes (Aa × Aa). Elle est de phénotype normal, donc elle n'est pas <em>aa</em>. Les génotypes possibles sont donc <strong>AA</strong> ou <strong>Aa</strong>.</p><p>Les proportions chez les descendants sont : 1/4 AA, 1/2 Aa, 1/4 aa.</p><p>Étant donné qu'elle n'est pas albinos (aa), la probabilité qu'elle soit hétérozygote (Aa) est :</p><div class='math-block'><div class='math'>$$ P(Aa) = \\frac{1/2}{1/4 + 1/2} = \\frac{1/2}{3/4} = \\frac{2}{3} $$</div></div></div>"
       },
       {
         "question": "<div class='question-text'>3) Si II-2 (porteur sain) et II-3 (également porteur sain) ont un enfant, quelle est la probabilité qu'il soit albinos ?</div>",
         "reponse": "<div><p>Le croisement est Aa × Aa.</p><p>La probabilité d'obtenir un enfant albinos (aa) est de <strong>1/4</strong> (25%).</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : La réponse immunitaire humorale",
     "points": "5 pts",
     "enonce": "<p>L'organisme dispose d'un système immunitaire capable de reconnaître et d'éliminer les agents pathogènes. La réponse immunitaire humorale est une composante clé de ce système.</p>",
     "questions": [
       {
         "question": "<div class='question-text'>1) Expliquez le mécanisme de production des anticorps par les plasmocytes lors de la réponse immunitaire humorale.</div>",
         "reponse": "<div><p>La réponse immunitaire humorale fait intervenir les <strong>lymphocytes B</strong>. Lorsqu'un lymphocyte B rencontre un antigène pour lequel il possède un récepteur spécifique, il est activé.</p><p>Il se différencie alors en <strong>plasmocytes</strong> qui sont des usines à anticorps : ils produisent et sécrètent en grande quantité des <strong>anticorps</strong> (immunoglobulines) spécifiques de l'antigène. Ces anticorps vont se fixer sur l'antigène pour former un <strong>complexe immun</strong> et permettre son élimination.</p></div>"
       },
       {
         "question": "<div class='question-text'>2) Expliquez le rôle du thymus dans la réponse immunitaire cellulaire.</div>",
         "reponse": "<div><p>Le <strong>thymus</strong> est un organe lymphoïde primaire où se déroule la maturation des <strong>lymphocytes T</strong>.</p><p>Dans le thymus, les précurseurs des lymphocytes T (venant de la moelle osseuse) acquièrent leurs récepteurs T (TCR) et subissent une sélection (positive et négative) qui élimine les cellules autoréactives et favorise la reconnaissance du soi. Les lymphocytes T matures quittent le thymus pour assurer la réponse immunitaire cellulaire dans les organes lymphoïdes secondaires.</p></div>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
