<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Terminale",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Compréhension : Les échanges commerciaux du Cameroun",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Observe</strong> le tableau et <strong>réponds</strong> aux questions.</p><div style='background-color: #f2f2f2; padding: 15px; border-radius: 8px; color: #000000; margin: 15px 0;'><p><em>Tableau : Principaux partenaires commerciaux du Cameroun (2023)</em></p><ul><li>Chine : exportations 23%, importations 18%</li><li>Union Européenne : exportations 35%, importations 28%</li><li>Nigeria : exportations 8%, importations 12%</li><li>États-Unis : exportations 5%, importations 7%</li><li>Autres pays : exportations 29%, importations 35%</li></ul></div></div>",
      "questions": [
        {
          "question": "<p> <strong>Définis</strong> la balance commerciale d'un pays.</p>",
          "reponse": "<p>La <strong>balance commerciale</strong> est la différence entre la valeur des exportations (biens vendus à l'étranger) et la valeur des importations (biens achetés à l'étranger). Un pays a un <strong>excédent</strong> lorsqu'il exporte plus qu'il n'importe, et un <strong>déficit</strong> dans le cas contraire.</p>"
        },
        {
          "question": "<p> <strong>Analyse</strong> le tableau et <strong>identifie</strong> les deux principaux partenaires commerciaux du Cameroun en termes de parts d'exportation.</p>",
          "reponse": "<p>Les deux principaux partenaires commerciaux du Cameroun pour les exportations sont :</p><ul><li><strong>L'Union Européenne</strong> (35 % des exportations)</li><li><strong>La Chine</strong> (23 % des exportations)</li></ul><p>Ces deux partenaires représentent à eux seuls près de 60 % des exportations camerounaises.</p>"
        },
        {
          "question": "<p> <strong>Calcule</strong> le solde commercial du Cameroun avec la Chine (importations – exportations). Le Cameroun est-il excédentaire ou déficitaire avec ce pays ?</p>",
          "reponse": "<p>Solde commercial avec la Chine :<br>- Exportations : 23 %<br>- Importations : 18 %<br>- Solde : 23 - 18 = <strong>+5 %</strong><br><br>Le Cameroun est donc en <strong>excédent commercial</strong> avec la Chine, ce qui signifie qu'il vend plus de biens à la Chine qu'il n'en achète.</p>"
        },
        {
          "question": "<p> <strong>Explique</strong> pourquoi le Cameroun pourrait être en déficit commercial avec le Nigeria.</p>",
          "reponse": "<p>Le Cameroun importe plus du Nigeria (12 %) qu'il n'exporte vers ce pays (8 %), ce qui donne un solde de <strong>-4 %</strong>. Ce déficit peut s'expliquer par :<br>- L'importation de <strong>produits pétroliers</strong> ou de <strong>biens manufacturés</strong> en provenance du Nigeria.<br>- Une <strong>faible capacité d'exportation</strong> du Cameroun vers ce pays voisin.<br>- La <strong>contrebande</strong> et les <strong>échanges informels</strong> qui ne sont pas comptabilisés dans les statistiques officielles.</p>"
        }
      ]
    },
    {
      "titre": "Étude de cas : La mondialisation et le Cameroun",
      "points": "7 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Lis</strong> les documents ci-dessous et <strong>réponds</strong> aux questions.</p><div style='background-color: #f2f2f2; padding: 15px; border-radius: 8px; color: #000000; margin: 15px 0;'><p><strong>Document 1 :</strong> « La mondialisation est un processus d'intensification des échanges et des flux à l'échelle planétaire. Elle est favorisée par le progrès technologique (Internet, conteneurisation), la libéralisation des échanges et la domination des firmes multinationales. »</p><p><strong>Document 2 :</strong> « Le Cameroun participe à la mondialisation principalement par l'exportation de matières premières (pétrole, cacao, café, bois) et l'importation de biens manufacturés. Cette position de pays exportateur de matières premières le rend vulnérable aux fluctuations des cours mondiaux. »</p></div></div>",
      "questions": [
        {
          "question": "<p> D'après le Document 1, <strong>définis</strong> la mondialisation et <strong>cite</strong> trois facteurs qui la favorisent.</p>",
          "reponse": "<p>La <strong>mondialisation</strong> est un processus d'<strong>intensification des échanges</strong> et des flux à l'échelle planétaire. Les trois facteurs qui la favorisent sont :</p><ul><li>Le <strong>progrès technologique</strong> (Internet, conteneurisation)</li><li>La <strong>libéralisation des échanges</strong></li><li>La <strong>domination des firmes multinationales</strong></li></ul>"
        },
        {
          "question": "<p> <strong>Explique</strong> comment le Cameroun participe à la mondialisation d'après le Document 2.</p>",
          "reponse": "<p>Le Cameroun participe à la mondialisation par :</p><ul><li>L'<strong>exportation de matières premières</strong> (pétrole, cacao, café, bois)</li><li>L'<strong>importation de biens manufacturés</strong> (machines, véhicules, produits industriels)</li></ul><p>Cette position de <strong>pays exportateur de matières premières</strong> le rend dépendant des cours mondiaux et expose son économie aux fluctuations des marchés internationaux.</p>"
        },
        {
          "question": "<p> <strong>Analyse</strong> les risques liés à cette position du Cameroun dans la mondialisation.</p>",
          "reponse": "<p>Les risques pour le Cameroun sont :</p><ul><li><strong>Dépendance aux cours mondiaux</strong> : une baisse des prix du pétrole ou du cacao peut fragiliser l'économie.</li><li><strong>Fuite des capitaux</strong> : les bénéfices des filiales étrangères partent souvent à l'étranger.</li><li><strong>Désindustrialisation</strong> : l'importation de biens manufacturés freine le développement de l'industrie locale.</li><li><strong>Vulnérabilité aux crises</strong> : comme la crise du Covid-19 qui a perturbé les chaînes d'approvisionnement mondiales.</li></ul>"
        },
        {
          "question": "<p> <strong>Propose</strong> deux stratégies pour que le Cameroun tire davantage profit de la mondialisation.</p>",
          "reponse": "<p>Deux stratégies possibles :</p><ol><li><strong>Transformer localement</strong> les matières premières (agro-industrie, transformation du bois) pour augmenter leur valeur ajoutée avant exportation.</li><li><strong>Diversifier l'économie</strong> en développant les services, le tourisme, les technologies numériques et l'industrie manufacturière pour réduire la dépendance aux matières premières.</li></ol>"
        }
      ]
    },
    {
      "titre": "Lecture et interprétation de données statistiques",
      "points": "7 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Observe</strong> le tableau ci-dessous et <strong>réponds</strong> aux questions.</p><div style='background-color: #f2f2f2; padding: 15px; border-radius: 8px; color: #000000; margin: 15px 0;'><p><em>Tableau : Évolution des exportations agricoles du Cameroun (en millions de tonnes)</em></p><ul><li>2019 : Cacao 250, Café 120, Caoutchouc 80</li><li>2020 : Cacao 265, Café 115, Caoutchouc 85</li><li>2021 : Cacao 280, Café 130, Caoutchouc 90</li><li>2022 : Cacao 300, Café 140, Caoutchouc 95</li><li>2023 : Cacao 320, Café 150, Caoutchouc 100</li></ul></div></div>",
      "questions": [
        {
          "question": "<p> <strong>Calcule</strong> l'augmentation totale des exportations de cacao entre 2019 et 2023.</p>",
          "reponse": "<p>Exportations de cacao en 2019 : 250 millions de tonnes<br>Exportations de cacao en 2023 : 320 millions de tonnes<br><strong>Augmentation : 320 - 250 = 70 millions de tonnes</strong></p>"
        },
        {
          "question": "<p> <strong>Calcule</strong> le pourcentage d'augmentation des exportations de café entre 2019 et 2023.</p>",
          "reponse": "<p>Exportations de café en 2019 : 120 millions de tonnes<br>Exportations de café en 2023 : 150 millions de tonnes<br><br>Augmentation : 150 - 120 = 30 millions de tonnes<br>Pourcentage d'augmentation = (30 / 120) × 100 = <strong>25 %</strong></p>"
        },
        {
          "question": "<p> <strong>Compare</strong> l'évolution du cacao et celle du caoutchouc sur la même période.</p>",
          "reponse": "<p><strong>Comparaison :</strong><br>- Le cacao a augmenté de <strong>70 millions de tonnes</strong> (de 250 à 320).<br>- Le caoutchouc a augmenté de <strong>20 millions de tonnes</strong> (de 80 à 100).<br><br>L'augmentation du cacao est <strong>plus de 3 fois supérieure</strong> à celle du caoutchouc. La croissance des exportations de cacao est donc plus dynamique que celle du caoutchouc.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
