<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Terminale",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "PARTIE I : MAÎTRISE DES SAVOIRS ET SAVOIR-FAIRE",
      "points": "10 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 8px; color: #212529;'>\n  <p style='font-weight: bold;'>Document 1 : Les évolutions de l'agriculture camerounaise</p>\n  <div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; margin: 10px 0;'>\n    <p>« L'agriculture camerounaise connaît des transformations profondes. Le système traditionnel, basé sur l'agriculture vivrière, la jachère et les outils rudimentaires, coexiste avec un secteur moderne dominé par les grandes plantations. Ces dernières produisent des cultures de rente destinées à l'exportation (cacao, café, caoutchouc, huile de palme, banane) et bénéficient d'investissements importants. La modernisation se traduit également par l'utilisation d'intrants (engrais, pesticides) et de techniques améliorées dans certaines régions, notamment dans les plaines côtières et les hautes terres de l'Ouest. Cependant, l'agriculture vivrière, qui occupe la majorité des agriculteurs, reste confrontée à des difficultés structurelles (accès limité au crédit, faible mécanisation, dégradation des sols, exode rural des jeunes) qui hypothèquent son développement. »</p>\n  </div>\n  <p style='font-weight: bold;'>Document 2 : Les marchés frontaliers du Cameroun</p>\n  <div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; margin: 10px 0;'>\n    <p>« Les marchés frontaliers jouent un rôle essentiel dans l'économie camerounaise et sous-régionale. Situés aux confins du pays, ils facilitent les échanges avec les pays voisins (Nigeria, Tchad, République centrafricaine, Guinée équatoriale, Gabon, Congo). Parmi les plus actifs figurent les marchés de Kousseri (frontière tchadienne), Garoua-Boulaï (frontière centrafricaine), Ekok (frontière nigériane), et Ambam (frontière gabonaise et équato-guinéenne). Ces espaces d'échanges permettent l'écoulement des productions locales (produits agricoles, bétail, poissons, artisanat) et l'approvisionnement en biens de consommation, en hydrocarbures et autres produits manufacturés. Toutefois, ces marchés sont confrontés à de nombreuses difficultés : insécurité, contrebande, infrastructures routières dégradées, lourdeurs administratives, et concurrence des produits importés à bas prix qui fragilisent les producteurs locaux. »</p>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p style='font-weight: bold; color: #0056b3;'>A. Vérification des savoirs (4 pts)</p><p>1. Définis les concepts suivants : <strong>agriculture traditionnelle</strong> et <strong>agriculture de rente</strong>. (2 pts)</p><p>2. Cite deux difficultés de l'agriculture traditionnelle au Cameroun mentionnées dans le document 1. (2 pts)</p>",
          "reponse": "<p><strong>1. Définitions :</strong></p><ul><li><strong>Agriculture traditionnelle :</strong> Système agricole basé sur des méthodes ancestrales, utilisant des outils rudimentaires (houe, machette), une main-d'œuvre familiale, et pratiquant généralement la jachère et la polyculture vivrière pour l'autoconsommation.</li><li><strong>Agriculture de rente :</strong> Système agricole orienté vers la production de cultures destinées à la vente et à l'exportation (cacao, café, caoutchouc, etc.), souvent pratiqué dans de grandes plantations avec des techniques modernes et des investissements importants.</li></ul><p><strong>2. Difficultés de l'agriculture traditionnelle :</strong></p><ul><li><strong>Accès limité au crédit</strong> pour financer les équipements et les intrants.</li><li><strong>Faible mécanisation</strong> et utilisation d'outils rudimentaires limitant la productivité.</li></ul>"
        },
        {
          "question": "<p style='font-weight: bold; color: #0056b3;'>B. Savoir-faire (6 pts)</p><p>1. D'après le document 1, quelles sont les principales transformations de l'agriculture camerounaise ? (2 pts)</p><p>2. À l'aide du document 2, localise deux marchés frontaliers du Cameroun et précise avec quel pays ils sont en contact. (2 pts)</p><p>3. D'après le document 2, quels sont les obstacles au développement des marchés frontaliers ? (2 pts)</p>",
          "reponse": "<p><strong>1. Les principales transformations de l'agriculture :</strong></p><ul><li>La coexistence entre un secteur traditionnel vivrier et un secteur moderne de grandes plantations.</li><li>La modernisation partielle avec l'utilisation d'intrants (engrais, pesticides) et de techniques améliorées.</li></ul><p><strong>2. Localisation de deux marchés frontaliers :</strong></p><ul><li><strong>Kousseri</strong> : frontière avec le Tchad.</li><li><strong>Ekok</strong> : frontière avec le Nigeria.</li></ul><p><strong>3. Les obstacles au développement des marchés frontaliers :</strong></p><ul><li>L'<strong>insécurité</strong> et la contrebande.</li><li>Les <strong>infrastructures routières dégradées</strong>.</li><li>Les <strong>lourdeurs administratives</strong>.</li><li>La <strong>concurrence des produits importés</strong> à bas prix.</li></ul>"
        }
      ]
    },
    {
      "titre": "PARTIE II : DÉVELOPPEMENT CONSTRUIT",
      "points": "10 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 8px; color: #212529;'>\n  <p style='font-weight: bold;'>Sujet : Les défis et les perspectives du secteur primaire au Cameroun.</p>\n  <p style='margin-top: 15px;'>À partir de vos connaissances et des documents, vous répondrez à la question suivante sous forme d'un développement construit d'environ une page et demie.</p>\n  <p style='margin-top: 10px;'>Dans un premier temps, vous présenterez les caractéristiques et les transformations du secteur primaire au Cameroun. Dans un second temps, vous analyserez les contraintes qui limitent le développement de ce secteur. Enfin, vous proposerez des perspectives pour une meilleure valorisation des potentialités agricoles, pastorales et halieutiques du pays.</p>\n</div>",
      "questions": [
        {
          "question": "<p>Rédigez un développement construit répondant au sujet. Votre devoir devra être structuré avec une introduction, un développement en trois parties et une conclusion.</p>",
          "reponse": "<p><strong>Introduction :</strong></p><p>Le secteur primaire occupe une place fondamentale dans l'économie camerounaise. Il emploie plus de la moitié de la population active et contribue significativement aux exportations du pays. Toutefois, ce secteur est confronté à des défis majeurs dans un contexte de mondialisation, de changement climatique et d'urbanisation croissante. Cette analyse s'attachera à décrire les caractéristiques et les transformations de ce secteur, à identifier les contraintes qui en limitent le développement, et à envisager des perspectives pour une valorisation durable de ces activités.</p><p><strong>Développement :</strong></p><p><strong>1. Caractéristiques et transformations du secteur primaire</strong></p><ul><li><strong>L'agriculture :</strong> Coexistence d'un secteur traditionnel (vivrier, extensif, faiblement mécanisé) et d'un secteur moderne (grandes plantations de cacao, café, caoutchouc, huile de palme, banane) avec des cultures de rente destinées à l'exportation [citation:6].</li><li><strong>L'élevage :</strong> Passage d'un élevage traditionnel extensif (bovins, ovins, caprins) à des formes plus modernes (fermes, élevage hors-sol) dans certaines régions.</li><li><strong>La pêche :</strong> Évolution de la pêche artisanale vers une pêche industrielle, notamment en zone côtière, avec des enjeux de préservation des ressources.</li></ul><p><strong>2. Les contraintes majeures du développement</strong></p><ul><li><strong>Contraintes structurelles :</strong> Faible accès au crédit et aux intrants pour les petits producteurs, insuffisance des infrastructures de transport et de stockage, enclavement de certaines régions [citation:6].</li><li><strong>Contraintes environnementales :</strong> Dégradation des sols (érosion, épuisement), déforestation liée à l'expansion agricole, impacts du changement climatique (sécheresses au Nord).</li><li><strong>Contraintes humaines et sociales :</strong> Exode rural des jeunes, vieillissement de la population agricole, faible valorisation de l'artisanat et des métiers traditionnels.</li></ul><p><strong>3. Perspectives et solutions pour le secteur primaire</strong></p><ul><li><strong>Modernisation :</strong> Amélioration de l'accès au crédit, promotion de la mécanisation, formation des agriculteurs, développement de l'irrigation.</li><li><strong>Valorisation des filières :</strong> Soutien aux filières agricoles d'exportation, développement de l'agro-industrie, promotion de la transformation locale des produits.</li><li><strong>Développement durable :</strong> Protection des ressources (sol, eau, biodiversité), lutte contre la déforestation, adaptation aux changements climatiques.</li><li><strong>Renforcement des marchés :</strong> Amélioration des infrastructures routières, lutte contre la contrebande, développement des marchés frontaliers [citation:6].</li></ul><p><strong>Conclusion :</strong></p><p>Le secteur primaire camerounais est à un tournant. Les défis sont nombreux mais les potentialités sont immenses. La mise en œuvre de politiques cohérentes, associant modernisation, durabilité et valorisation des ressources humaines, est indispensable pour garantir la sécurité alimentaire, l'emploi et le développement économique du pays.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
