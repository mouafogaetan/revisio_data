<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "La diversité physique du Cameroun",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #e3f2fd; border-radius: 10px;'><h2 style='color: #0d47a1; text-align: center;'>La diversité physique du Cameroun</h2><p style='font-size: 1.1em; text-align: center;'>L'Afrique en miniature</p><div style='background-color: #bbdefb; padding: 15px; border-radius: 8px; margin-top: 15px;'><p><strong>Objectifs de la leçon :</strong></p><ul><li>Identifier et localiser les différentes zones climatiques du Cameroun</li><li>Décrire les principaux reliefs (montagnes, plateaux, plaines)</li><li>Localiser les principaux cours d'eau et fleuves</li></ul></div><div style='background-color: #1a237e; padding: 10px; border-radius: 5px; margin-top: 15px;'><p style='color: white; text-align: center;'>🌍 Le Cameroun est souvent qualifié de <strong>\"microcosme de l'Afrique\"</strong> en raison de sa diversité physique exceptionnelle [citation:9].</p></div></div>",
    "texteParle": "Bonjour les élèves de Terminale. Aujourd'hui, nous allons aborder un sujet passionnant : la diversité physique du Cameroun. Notre pays est souvent qualifié d'Afrique en miniature en raison de la variété exceptionnelle de ses paysages. Nous allons étudier les différentes zones climatiques, les reliefs et les cours d'eau qui font la richesse de notre territoire.",
    "note": "Le Cameroun est un véritable laboratoire géographique à lui seul."
  },
  {
    "titre": "Situation géographique",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #0d47a1;'>Situation géographique du Cameroun</h3><div style='background-color: #fff3e0; padding: 15px; border-radius: 8px;'><p>Le Cameroun est un État d'Afrique centrale situé au fond du golfe de Guinée [citation:5].</p><p><strong>Coordonnées :</strong></p><ul><li>Du <strong>2e au 13e parallèle nord</strong> [citation:2]</li><li>De <strong>8°30' à 16°10' de longitude est</strong> [citation:4]</li><li>Superficie : <strong>475 442 km²</strong> [citation:2]</li></ul><p><strong>Frontières :</strong></p><ul><li><strong>Nord-ouest :</strong> Nigéria</li><li><strong>Nord :</strong> Tchad</li><li><strong>Est :</strong> République centrafricaine</li><li><strong>Sud :</strong> Guinée équatoriale, Congo, Gabon</li><li><strong>Sud-ouest :</strong> Océan Atlantique [citation:5]</li></ul></div></div>",
    "texteParle": "Le Cameroun est situé en Afrique centrale, au fond du golfe de Guinée. Il s'étend du 2e au 13e parallèle nord, sur une superficie de plus de 475 000 kilomètres carrés. Le pays partage ses frontières avec six pays : le Nigéria, le Tchad, la République centrafricaine, la Guinée équatoriale, le Congo et le Gabon. Il est également bordé par l'océan Atlantique à l'ouest.",
    "note": "La position du Cameroun entre 2° et 13° de latitude nord explique sa diversité climatique."
  },
  {
    "titre": "Les régions climatiques",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #0d47a1;'>Les régions climatiques du Cameroun</h3><div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px;'><p>Le Cameroun connaît une <strong>grande diversité climatique</strong> allant du type équatorial au sud au type sahélien au nord [citation:5].</p><div style='background-color: #c8e6c9; padding: 10px; border-radius: 5px; margin-top: 5px;'><p><strong>1. La zone méridionale (forêt dense humide)</strong></p><ul><li>Pluviométrie > 1 500 mm/an</li><li>Maximum de 2 mois secs</li><li>4 saisons [citation:4]</li></ul></div><div style='background-color: #a5d6a7; padding: 10px; border-radius: 5px; margin-top: 5px;'><p><strong>2. La zone côtière (très humide)</strong></p><ul><li>Pluviométrie : 2 500 à 4 000 mm/an</li><li>Une seule saison sèche peu marquée</li><li>Influences océaniques prépondérantes [citation:4]</li></ul></div><div style='background-color: #66bb6a; padding: 10px; border-radius: 5px; margin-top: 5px; color: white;'><p><strong>3. La zone septentrionale (soudano-sahélienne)</strong></p><ul><li>Saison sèche de 6 à 8 mois</li><li>Domaine des savanes et steppes [citation:4]</li></ul></div><div style='background-color: #43a047; padding: 10px; border-radius: 5px; margin-top: 5px; color: white;'><p><strong>4. Les montagnes et hauts plateaux (altitude > 800 m)</strong></p><ul><li>Variantes climatiques spécifiques</li><li>Végétation montagnarde [citation:4]</li></ul></div></div></div>",
    "texteParle": "Le Cameroun connaît une grande diversité climatique. Au sud, la zone méridionale est caractérisée par une forêt dense humide avec plus de 1 500 millimètres de pluie par an. La zone côtière est très humide avec des précipitations allant de 2 500 à 4 000 millimètres par an. Au nord, la zone septentrionale est de type soudano-sahélien avec une saison sèche de 6 à 8 mois. Enfin, les montagnes et hauts plateaux présentent des climats spécifiques liés à l'altitude.",
    "note": "Le Cameroun offre une transition climatique complète du sud équatorial au nord sahélien."
  },
  {
    "titre": "Les régions de relief",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #0d47a1;'>Les grandes régions de relief</h3><div style='background-color: #fce4ec; padding: 15px; border-radius: 8px;'><p>Le Cameroun se divise en <strong>quatre grandes régions</strong> topographiques [citation:3] :</p><div style='background-color: #f8bbd0; padding: 10px; border-radius: 5px; margin-top: 5px;'><p><strong>1. La région occidentale</strong></p><ul><li>Chaîne de montagnes volcaniques</li><li>Mont Cameroun : <strong>4 070 m</strong> (point culminant)</li><li>Mont Bamboutos : 2 740 m [citation:4]</li></ul></div><div style='background-color: #f48fb1; padding: 10px; border-radius: 5px; margin-top: 5px;'><p><strong>2. La région septentrionale</strong></p><ul><li>Vastes plaines traversées par la Bénoué et le Logone</li><li>Massif de l'Adamaoua (1 370 m d'altitude moyenne)</li><li>Montagnes Mandara [citation:2]</li></ul></div><div style='background-color: #ec407a; padding: 10px; border-radius: 5px; margin-top: 5px; color: white;'><p><strong>3. La région centrale</strong></p><ul><li>Vaste plateau de 800 à 1 500 m d'altitude</li><li>Propice à l'élevage [citation:2]</li></ul></div><div style='background-color: #d81b60; padding: 10px; border-radius: 5px; margin-top: 5px; color: white;'><p><strong>4. La région méridionale</strong></p><ul><li>Système complexe de plaines et collines</li><li>Couvert par la grande forêt</li><li>Relativement déserte au sud-est [citation:2]</li></ul></div></div></div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
