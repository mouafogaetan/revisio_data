<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Espagnol",
  "classe": "Terminale",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Ejercicio 1: Comprensión escrita y análisis de una obra literaria",
      "points": "8 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'><b>Documento: Fragmento de \"La casa de Bernarda Alba\" de Federico García Lorca</b><br><br><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'><i>Bernarda: (Golpeando con el bastón en el suelo.) ¡A callar, he dicho! Las lágrimas cuando estéis solas. ¡A hundirnos todas en un mar de luto! Ella, la hija menor de Bernarda Alba, ha muerto virgen. ¿Me habéis oído? ¡Silencio, silencio he dicho! (A una hija.) ¡A ti se te ha caído el abanico! (La hija recoge el abanico.)<br><br>Angustias: (Con la cabeza baja.) Madre, yo no quiero que se vaya mi hermana. Pero...<br><br>Bernarda: (Interrumpiendo.) ¡Pero nada! ¿Quién ha dado permiso para hablar? (A las criadas.) ¡Y vosotras, a vuestro trabajo! ¡María Josefa, la loca, está encerrada en su cuarto! ¡No quiero que nadie salga de esta casa!<br><br>La Poncia: (A Bernarda.) Bernarda, los vecinos dicen...<br><br>Bernarda: (Furiosa.) ¡Los vecinos no dicen nada! ¿Quién manda aquí, yo o los vecinos? ¡En esta casa se obedece y punto!</i></div><br><br><b>Consigna:</b> Lee el fragmento y responde a las preguntas en español, justificando tus respuestas con el texto.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><b>1)</b> Describe el carácter de Bernarda Alba según se muestra en el fragmento. <i>(2 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Bernarda Alba aparece como una mujer autoritaria y dominante. Impone el silencio con violencia ('golpeando con el bastón'), no tolera que nadie hable sin su permiso y exige obediencia absoluta. Frases como '¡A callar, he dicho!' o '¡En esta casa se obedece y punto!' muestran su carácter intransigente.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>2)</b> ¿Qué temas o conflictos sociales se pueden identificar en este fragmento? <i>(3 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>El fragmento aborda varios temas: la represión de la mujer en la sociedad tradicional, el autoritarismo familiar, la opresión de la libertad individual y el silencio impuesto. Bernarda representa la autoridad patriarcal, y la mención de 'la loca' encerrada sugiere cómo la sociedad castiga a quienes se salen de la norma. El tema de la virginidad como valor impuesto a la mujer también está presente.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>3)</b> ¿Qué significa la expresión \"a hundirnos todas en un mar de luto\" en el contexto de la obra? <i>(3 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Esta expresión metafórica refleja la imposición del luto como una forma de control social y familiar. Bernarda quiere que todas las mujeres de la casa compartan su dolor y su represión, hundiéndose en un \"mar de luto\" que representa tanto el dolor por la muerte como la opresión que ellas mismas deben soportar. Es una imagen de la represión colectiva que impone el autoritarismo.</div>"
        }
      ]
    },
    {
      "titre": "Ejercicio 2: Expresión escrita y reflexión sobre un tema de actualidad",
      "points": "8 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'><b>Tema:</b> La discriminación de género y la violencia contra la mujer<br><br><b>Consigna:</b> Redacta un texto argumentativo de aproximadamente 180 palabras en el que analices las causas de la violencia de género y propongas soluciones para combatirla. Utiliza ejemplos concretos y referencias a obras literarias o cinematográficas que hayas estudiado.</div>",
      "questions": [
        {
          "question": "<div>Escribe tu texto argumentativo en español, estructurado en introducción, desarrollo y conclusión.</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><b>Ejemplo de respuesta:</b><br><br>\n<i>La violencia de género sigue siendo una de las lacras más persistentes de nuestra sociedad. Sus causas son múltiples y complejas: arraigados estereotipos machistas, desigualdad económica, educación basada en roles de género y, como muestra \"La casa de Bernarda Alba\" de Lorca, una estructura social que oprime a la mujer y la silencia. Esta obra maestra nos recuerda que la represión no es solo física, sino también psicológica y cultural.<br><br>Para erradicar esta violencia, es fundamental actuar en varios frentes. En primer lugar, la educación en igualdad desde la infancia, enseñando a niños y niñas que el respeto y la empatía son valores universales. En segundo lugar, las políticas públicas deben garantizar la protección de las víctimas y el castigo ejemplar de los agresores. Finalmente, como sociedad, debemos romper el silencio y denunciar cualquier forma de abuso.<br><br>En conclusión, la lucha contra la violencia de género no es solo una cuestión legal, sino un desafío cultural que requiere el compromiso de todos y todas. Solo así podremos construir una sociedad más justa y libre.</i></div>"
        }
      ]
    },
    {
      "titre": "Ejercicio 3: Gramática y vocabulario en contexto",
      "points": "4 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'>Este ejercicio evalúa tus conocimientos gramaticales y de vocabulario relacionados con los temas estudiados.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><b>1)</b> Conjuga el verbo entre paréntesis en el tiempo adecuado (presente, pretérito indefinido, imperfecto o futuro) y completa la frase: <i>(1.5 pts)</i><br><br>\"Cuando yo ______ (tener) diez años, mi abuela me ______ (contar) historias sobre la guerra civil. Ahora, yo ______ (estudiar) este tema en clase y ______ (comprender) mejor aquel período histórico.\"</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>\"Cuando yo <b>tenía</b> diez años, mi abuela me <b>contaba</b> historias sobre la guerra civil. Ahora, yo <b>estudio</b> este tema en clase y <b>comprendo</b> mejor aquel período histórico.\"<br><br><i>Explicación: se usa el imperfecto para acciones habituales en el pasado (tenía, contaba) y el presente para acciones actuales (estudio, comprendo).</i></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>2)</b> Sustituye las expresiones subrayadas por un pronombre de objeto directo o indirecto: <i>(1.5 pts)</i><br><br>\"La profesora explicó <u>la obra de Lorca</u> a <u>los estudiantes</u>. Después, <u>los estudiantes</u> preguntaron <u>el significado del poema</u>.\"</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>\"La profesora <b>la</b> explicó <b>a los estudiantes</b>.<br>Después, <b>ellos</b> preguntaron <b>el significado</b>.\"</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>3)</b> Define los siguientes conceptos relacionados con los temas del curso y escribe una frase con cada uno: <i>(1 pt)</i><br><br>a) <b>Patriarcado</b><br>b) <b>Diversidad cultural</b></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>a) <b>Patriarcado:</b> Sistema social en el que los hombres tienen el poder y las mujeres están subordinadas. Ejemplo: \"La obra de Lorca critica el patriarcado y la opresión de la mujer.\"<br><br>b) <b>Diversidad cultural:</b> Variedad de culturas y tradiciones que conviven en una sociedad. Ejemplo: \"La diversidad cultural enriquece el patrimonio de los países hispanohablantes.\"</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
