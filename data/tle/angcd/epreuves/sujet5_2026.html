<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>

            <span id="sequenceInfo">Séquence</span>

            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>

        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais Tle CD",

    {

      "questions": [
        {
          "question": "<p> What is the main problem that 'Les Eco-Gardiens' are trying to solve?</p>",
          "reponse": "<p>The main problem is the growing issue of plastic waste in their neighbourhood in Douala, Cameroon.</p>"
        },
        {

        },
        {

          "reponse": "<p>It is important to act now because the future of the community depends on the actions they take today, and they must preserve the environment for future generations.</p>"
        },
        {
          "question": "<p> Identify two challenges that the group faces in their campaign.</p>",
          "reponse": "<p>Two challenges are a lack of government support and limited resources.</p>"
        },
        {
          "question": "<p> In your own words, explain the impact that the initiative of 'Les Eco-Gardiens' has had on other communities.</p>",
          "reponse": "<p>The initiative has inspired other communities in Yaoundé and Bamenda to start similar environmental projects, showing that collective action can lead to change.</p>"
        }
      ]
    },
    {
      "titre": "Vocabulary: Advocacy and Environmental Action",
      "points": "10 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>I.</strong> Complete the following paragraph with the best words from the list below. (5 pts)</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; color: #212529;'><p><strong>LIST:</strong> (awareness, campaign, challenge, initiative, preserve, protect)</p><p>The environmental <strong>1)</strong>______ to save the local forest is a major <strong>2)</strong>______ for our community. The goal is to <strong>3)</strong>______ this vital ecosystem from deforestation. A new student-led <strong>4)</strong>______ has been launched to raise <strong>5)</strong>______ about the importance of these trees for our climate.</p></div><p><strong>II.</strong> Match each word in Column A with its synonym in Column B. (5 pts)</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; color: #212529;'><table style='width: 100%; border-collapse: collapse;'><tr><th style='border: 1px solid #ccc; padding: 8px; text-align: left;'>Column A</th><th style='border: 1px solid #ccc; padding: 8px; text-align: left;'>Column B</th></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>1. Protect</td><td style='border: 1px solid #ccc; padding: 8px;'>A. Difficulty</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>2. Preserve</td><td style='border: 1px solid #ccc; padding: 8px;'>B. Campaign</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>3. Challenge</td><td style='border: 1px solid #ccc; padding: 8px;'>C. Safeguard</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>4. Initiative</td><td style='border: 1px solid #ccc; padding: 8px;'>D. Conserve</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>5. Campaign</td><td style='border: 1px solid #ccc; padding: 8px;'>E. Undertaking</td></tr></table></div></div>",
      "questions": [
        {
          "question": "<p><strong>Question I - 1.</strong> Complete the paragraph.</p>",
          "reponse": "<p><strong>1)</strong> campaign <strong>2)</strong> challenge <strong>3)</strong> preserve <strong>4)</strong> initiative <strong>5)</strong> awareness</p>"
        },
        {
          "question": "<p><strong>Question II.</strong> Match the words.</p>",
          "reponse": "<p>1-C, 2-D, 3-A, 4-E, 5-B</p>"
        }
      ]
    },
    {
      "titre": "Grammar: Using Imperatives for Calls to Action",
      "points": "10 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>I.</strong> Transform the following statements into calls to action by using the imperative form. (5 pts)</p><ol><li>It is important to stop wasting water.</li><li>You must not throw garbage in the street.</li><li>We need to plant more trees to combat climate change.</li><li>It is essential for everyone to recycle their waste.</li><li>You should join a local environmental group.</li></ol><p><strong>II.</strong> Choose the correct imperative form to complete the sentences below. (5 pts)</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; color: #212529;'><ol><li><strong>(Reduce / Reducing)</strong> your plastic consumption today for a better tomorrow.</li><li><strong>(Not throw / Don't throw)</strong> your old batteries in the bin; they are toxic.</li><li><strong>(Let's / Let us)</strong> organize a clean-up day in our neighbourhood.</li><li><strong>(To be / Be)</strong> the change you wish to see in your community.</li><li><strong>(Think / Thinking)</strong> about the planet before you make a purchase.</li></ol></div></div>",

        },

          "question": "<p><strong>Question I - 5.</strong> Join a local environmental group.</p>",
          "reponse": "<p>Join a local environmental group.</p>"
        },

          "question": "<p><strong>Question II - 1.</strong> Reduce your plastic consumption today for a better tomorrow.</p>",
          "reponse": "<p><strong>Reduce</strong> your plastic consumption today for a better tomorrow.</p>"
        },
        {
          "question": "<p><strong>Question II - 2.</strong> Don't throw your old batteries in the bin; they are toxic.</p>",
          "reponse": "<p><strong>Don't throw</strong> your old batteries in the bin; they are toxic.</p>"

          "question": "<p><strong>Question II - 3.</strong> Let's organize a clean-up day in our neighbourhood.</p>",

        },
        {
          "question": "<p><strong>Question II - 4.</strong> Be the change you wish to see in your community.</p>",

          "reponse": "<p><strong>Think</strong> about the planet before you make a purchase.</p>"

    {

      "questions": [

          "question": "<p> Write your article.</p>",
          "reponse": "<p><strong>Title: Our City is Drowning in Waste!</strong></p><p>Dear fellow citizens, our beautiful city of Douala is facing a serious environmental crisis. The streets are littered with plastic bags, empty bottles, and other waste products. This is not just an eyesore; it is a threat to our health and our environment.</p><p>The causes are clear: a lack of proper waste management systems and a careless attitude towards the environment. The consequences are devastating. Blocked drainage systems lead to flooding during the rainy season, and the accumulation of waste becomes a breeding ground for diseases like cholera and malaria.</p><p>But we are not powerless. The solution starts with each of us. <strong>Reduce</strong> your use of plastic. Buy products with minimal packaging. <strong>Reuse</strong> items instead of throwing them away. Turn glass jars into storage containers or old clothes into cleaning rags. <strong>Recycle</strong> everything you can. Separate your waste at home: paper, plastic, and organic matter.</p><p><strong>Join</strong> community clean-up initiatives. <strong>Educate</strong> your neighbours and family members about the importance of proper waste disposal. <strong>Demand</strong> better waste management services from our local authorities.</p><p>Remember, the future of our city depends on the actions we take today. Together, we can make Douala a cleaner, healthier, and more beautiful place to live. Let's act now!</p>"
        }
      ]
    }

};
    // ================================================================

    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">

                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">

                    </div>

                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
