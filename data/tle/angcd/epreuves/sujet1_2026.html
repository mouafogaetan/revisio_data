<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais Tle CD",
  "classe": "Terminale",
  "sequence": "Sequence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Section One: Grammar (10 Marks)",
      "points": "10 pts",
      "enonce": "<p>This section tests your understanding of key grammatical structures studied in class.</p>",
      "questions": [
        {
          "question": "<p><strong>I. Complete the following sentences with the correct passive form of the verbs in brackets. (5 marks)</strong></p><p>1. The Cardio Pad, a revolutionary medical device, __________ (invent) by Cameroonian engineer Arthur Zang.</p><p>2. Many modern medicines __________ (develop) from traditional remedies.</p><p>3. Patients __________ (examine) by specialists in the hospital every day.</p><p>4. A new vaccine __________ (test) by researchers at the moment.</p><p>5. The results of the clinical trials __________ (publish) in a medical journal next month.</p>",
          "reponse": "<p><strong>Corrigé (Indicatif) :</strong></p><p>1. was invented</p><p>2. are developed</p><p>3. are examined</p><p>4. is being tested</p><p>5. will be published</p>"
        },
        {
          "question": "<p><strong>II. Complete the following sentences with a comparative or superlative form of the adjective in brackets. (5 marks)</strong></p><p>6. Traditional medicine is often __________ (accessible) than modern medicine in rural areas.</p><p>7. In my opinion, prevention is __________ (good) than cure.</p><p>8. This is __________ (effective) treatment available for this condition.</p><p>9. Alternative therapies are becoming __________ (popular) nowadays.</p><p>10. The doctor explained that this is one of __________ (challenging) cases he has ever seen.</p>",
          "reponse": "<p><strong>Corrigé (Indicatif) :</strong></p><p>6. more accessible</p><p>7. better</p><p>8. the most effective</p><p>9. more popular</p><p>10. the most challenging</p>"
        }
      ]
    },
    {
      "titre": "Section Two: Vocabulary (10 Marks)",
      "points": "10 pts",
      "enonce": "<p>This section assesses your knowledge of vocabulary related to health, medicine, and innovation.</p>",
      "questions": [
        {
          "question": "<p><strong>I. Choose the correct word from the options to complete each sentence. (5 marks)</strong></p><p>1. The new medical ___________ can diagnose heart problems quickly.</p><ul><li>A) device</li><li>B) specialist</li><li>C) remedy</li></ul><p>2. To stay healthy, it is important to follow a balanced diet and practice good ___________.</p><ul><li>A) hygiene</li><li>B) treatment</li><li>C) innovation</li></ul><p>3. The doctor will ___________ you to take the medication twice a day.</p><ul><li>A) interpret</li><li>B) advise</li><li>C) examine</li></ul><p>4. A chronic ___________ requires long-term medical attention.</p><ul><li>A) symptom</li><li>B) disease</li><li>C) examination</li></ul><p>5. Many people are turning to alternative medicine because it is perceived as having fewer ___________.</p><ul><li>A) options</li><li>B) innovations</li><li>C) risks</li></ul>",
          "reponse": "<p><strong>Corrigé :</strong></p><p>1. A) device</p><p>2. A) hygiene</p><p>3. B) advise</p><p>4. B) disease</p><p>5. C) risks</p>"
        },
        {
          "question": "<p><strong>II. Match each word in Column A with its correct definition in Column B. (5 marks)</strong></p><table><thead><tr><th>Column A</th><th>Column B</th></tr></thead><tbody><tr><td>1. Tradition</td><td>A. The process of finding a new way of doing something.</td></tr><tr><td>2. Innovation</td><td>B. Beliefs and customs passed down from generation to generation.</td></tr><tr><td>3. Outbreak</td><td>C. A person trained to give medical care.</td></tr><tr><td>4. Specialist</td><td>D. The sudden occurrence of a disease.</td></tr><tr><td>5. Symptom</td><td>E. A sign of a disease or illness.</td></tr></tbody></table>",
          "reponse": "<p><strong>Corrigé :</strong></p><p>1 - B</p><p>2 - A</p><p>3 - D</p><p>4 - C</p><p>5 - E</p>"
        }
      ]
    },
    {
      "titre": "Section Three: Reading Comprehension (10 Marks)",
      "points": "10 pts",
      "enonce": "<p>Read the text carefully and answer the questions below. Your answers should be based on the text.</p><div class='reading-text' style='padding:15px; background-color:#f5f5f5; color:#000000; border-radius:8px; margin:15px 0;'><h4>From Tradition to Innovation: Africa's Healthcare Revolution</h4><p>For centuries, communities across Africa have relied on traditional medicine as a primary source of healthcare. Traditional healers, using knowledge passed down through generations, have treated various ailments with plants and herbs. These remedies are often more affordable and accessible than modern medicines, especially in remote areas.</p><p>However, the landscape of healthcare is rapidly changing. A new generation of African innovators is blending traditional wisdom with cutting-edge technology to create modern, effective solutions. One such example is the Cardio Pad, an innovative medical device invented by Cameroonian engineer Arthur Zang. The Cardio Pad is a touchscreen tablet that allows health workers in remote areas to perform heart examinations. The results are then interpreted by specialists in urban centers. This device reduces the need for patients to travel long distances, making healthcare more equitable.</p><p>The integration of modern and traditional approaches is not without its challenges. Some criticize the high cost of modern devices, while others point to a lack of scientific validation for some traditional remedies. Despite these challenges, the future of African healthcare lies in collaboration. By combining the best of both worlds, a more holistic and accessible healthcare system can be built for all.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. What were traditional healers able to do using knowledge passed down through generations?</strong></p>",
          "reponse": "<p>They were able to treat various ailments with plants and herbs.</p>"
        },
        {
          "question": "<p><strong>2. According to the text, why are traditional remedies often preferred in remote areas?</strong></p>",
          "reponse": "<p>They are often more affordable and accessible than modern medicines.</p>"
        },
        {
          "question": "<p><strong>3. Explain in your own words the function of the Cardio Pad.</strong></p>",
          "reponse": "<p>The Cardio Pad is a tablet that lets health workers examine a patient's heart and send the results to a specialist who can read them.</p>"
        },
        {
          "question": "<p><strong>4. What does the word '<em>equitable</em>' in paragraph 2 most likely mean?</strong></p>",
          "reponse": "<p>It means fair and just for everyone.</p>"
        },
        {
          "question": "<p><strong>5. What is a major challenge to the integration of traditional and modern medicine as mentioned in the text?</strong></p>",
          "reponse": "<p>A major challenge is the lack of scientific validation for some traditional remedies.</p>"
        }
      ]
    },
    {
      "titre": "Section Four: Essay Writing (10 Marks)",
      "points": "10 pts",
      "enonce": "<p>Choose only <strong>one</strong> of the following topics and write a well-structured essay of about 200-250 words. Pay attention to content, organization, accuracy, and expression.</p>",
      "questions": [
        {
          "question": "<p><strong>Topic 1:</strong> \"In your opinion, what is the most important health issue facing your community today? Describe the issue and suggest practical solutions to address it.\"</p><p><strong>Topic 2:</strong> \"Write a speech to be delivered to your classmates on the importance of a healthy lifestyle, using persuasive language to encourage them to adopt good habits.\"</p><p><strong>Topic 3:</strong> \"You are the president of the Science Club. Write an article for your school magazine about a recent medical innovation (e.g., the Cardio Pad) and explain how it can benefit people in your country.\"</p>",
          "reponse": "<p><strong>Indicative Marking Guide for Essays:</strong></p><p><strong>Content & Organization (4 marks):</strong> Relevance to the topic, clear argument, logical structure, well-developed paragraphs, an introduction, and a conclusion.</p><p><strong>Accuracy (3 marks):</strong> Correct grammar, spelling, and punctuation. Good use of the target grammatical structures (passive voice, comparatives/superlatives, modals, conditionals).</p><p><strong>Expression & Vocabulary (3 marks):</strong> Rich and appropriate vocabulary, variety of sentence structures, clarity of expression, and a suitable tone for the audience.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
