<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle A",
  "classe": "Terminale A",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : ADN, ARN et biosynthèse des protéines",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>La molécule d'ADN est le support de l'information génétique. Cette information est exprimée en deux grandes étapes : la transcription et la traduction.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Décrire l'architecture de la molécule d'ADN (structure en double hélice, bases azotées).</div>",
          "reponse": "<div style='font-size: 16px;'>L'ADN est une molécule en <strong>double hélice</strong> formée de deux chaînes polynucléotidiques enroulées l'une autour de l'autre. Chaque chaîne est constituée d'une succession de <strong>nucléotides</strong> composés d'un sucre (désoxyribose), d'un groupement phosphate et d'une base azotée. Les bases azotées sont de deux types : <strong>puriques</strong> (Adénine A et Guanine G) et <strong>pyrimidiques</strong> (Thymine T et Cytosine C). Les deux brins sont complémentaires : A s'apparie toujours avec T (par 2 liaisons hydrogène) et G avec C (par 3 liaisons hydrogène).</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Qu'est-ce que la transcription ? Décrire cette étape.</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>transcription</strong> est la première étape de l'expression de l'information génétique. Elle consiste en la <strong>synthèse d'un ARN messager (ARNm)</strong> à partir d'un gène (une séquence d'ADN). L'enzyme <strong>ARN polymérase</strong> se fixe sur le promoteur du gène, déroule la double hélice et utilise un brin d'ADN comme matrice pour assembler les ribonucléotides complémentaires. L'ARNm obtenu est une copie du brin d'ADN, mais avec la base Uracile (U) à la place de la Thymine (T).</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> Comparer l'ADN et l'ARN (structure, sucre, bases, rôle).</div>",
          "reponse": "<div style='font-size: 16px;'><table style='width:100%; border-collapse:collapse; font-size:14px;'><tr style='background-color:#e2e8f0;'><th style='border:1px solid #cbd5e1; padding:5px;'>Caractère</th><th style='border:1px solid #cbd5e1; padding:5px;'>ADN</th><th style='border:1px solid #cbd5e1; padding:5px;'>ARN</th></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Structure</td><td style='border:1px solid #cbd5e1; padding:5px;'>Double hélice</td><td style='border:1px solid #cbd5e1; padding:5px;'>Simple brin</td></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Sucre</td><td style='border:1px solid #cbd5e1; padding:5px;'>Désoxyribose</td><td style='border:1px solid #cbd5e1; padding:5px;'>Ribose</td></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Bases</td><td style='border:1px solid #cbd5e1; padding:5px;'>A, T, G, C</td><td style='border:1px solid #cbd5e1; padding:5px;'>A, U, G, C</td></tr><tr><td style='border:1px solid #cbd5e1; padding:5px;'>Rôle</td><td style='border:1px solid #cbd5e1; padding:5px;'>Stockage de l'info génétique</td><td style='border:1px solid #cbd5e1; padding:5px;'>Transmet l'info génétique (ARNm) ou transporte des acides aminés (ARNt)</td></tr></table></div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>4.</strong> Expliquer l'étape de la traduction en précisant le rôle des ribosomes.</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>traduction</strong> est la deuxième étape de l'expression génétique. Elle se déroule dans le <strong>cytoplasme</strong> au niveau des <strong>ribosomes</strong>. L'ARNm, porteur du message génétique sous forme de codons (triplets de nucléotides), est lu par le ribosome. Les <strong>ARN de transfert (ARNt)</strong>, chacun portant un acide aminé spécifique, reconnaissent les codons de l'ARNm par leur anticodon. Le ribosome catalyse la formation de <strong>liaisons peptidiques</strong> entre les acides aminés successifs, assemblant ainsi une chaîne polypeptidique qui se replie pour former une <strong>protéine</strong> fonctionnelle.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : QCM - Organisation cellulaire et immunité",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>Cochez la (ou les) bonne(s) réponse(s). Chaque question peut avoir une ou plusieurs bonnes réponses.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> La mitochondrie est :</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>mitochondrie</strong> est la <strong>centrale énergétique</strong> de la cellule. Elle est le siège de la <strong>respiration cellulaire</strong> qui produit de l'énergie (ATP) à partir des nutriments. Elle possède une double membrane et son propre ADN [citation:3].</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Les éléments figurés du sang sont :</div>",
          "reponse": "<div style='font-size: 16px;'>Les éléments figurés du sang sont les <strong>globules rouges (hématies)</strong> qui transportent l'oxygène, les <strong>globules blancs (leucocytes)</strong> qui assurent la défense immunitaire et les <strong>plaquettes (thrombocytes)</strong> qui participent à la coagulation [citation:3].</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> L'enzyme responsable de la transcription est :</div>",
          "reponse": "<div style='font-size: 16px;'>L'enzyme de la transcription est l'<strong>ARN polymérase</strong>. Elle catalyse la synthèse de l'ARNm à partir d'une matrice d'ADN [citation:3].</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>4.</strong> Une maladie auto-immune est caractérisée par :</div>",
          "reponse": "<div style='font-size: 16px;'>Une maladie auto-immune est une maladie dans laquelle le <strong>système immunitaire</strong> reconnaît les constituants de l'organisme comme étrangers et déclenche une <strong>réaction contre soi-même</strong>. Exemples : le diabète de type 1 (destruction des cellules pancréatiques) et le vitiligo (destruction des mélanocytes).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Reproduction sexuée et diversité génétique",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>La reproduction sexuée assure à la fois la pérennité de l'espèce et la diversité génétique des individus.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Décrire les grandes étapes de la méiose et expliquer comment ce processus permet de passer d'une cellule diploïde à des cellules haploïdes.</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>méiose</strong> est une division cellulaire qui produit des <strong>gamètes</strong> (cellules sexuelles). Elle comporte deux divisions successives :<br><br><strong>Première division (méiose I) :</strong> séparation des chromosomes homologues. Les cellules filles sont haploïdes (n chromosomes).<br><strong>Deuxième division (méiose II) :</strong> séparation des chromatides sœurs, semblable à une mitose.<br><br>Au total, une cellule diploïde (2n chromosomes) donne <strong>quatre cellules haploïdes</strong> (n chromosomes).</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Expliquer comment la méiose et la fécondation assurent à la fois la stabilité du caryotype et la diversité génétique.</div>",
          "reponse": "<div style='font-size: 16px;'>La <strong>méiose</strong> permet de réduire le nombre de chromosomes (2n → n), assurant que lors de la <strong>fécondation</strong> (fusion de deux gamètes n), le caryotype diploïde (2n) soit restauré. C'est la <strong>stabilité du caryotype</strong>.<br><br>La diversité génétique provient de :<br>- <strong>Crossing-over</strong> (échange de fragments entre chromosomes homologues) lors de la méiose.<br>- <strong>Disjonction aléatoire</strong> des chromosomes homologues (2n combinaisons possibles).<br>- <strong>Fécondation aléatoire</strong> (rencontre de gamètes génétiquement différents).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Gestion des déchets et prévention des catastrophes",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>La gestion des déchets est un enjeu majeur pour l'environnement et la santé publique.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Citer trois avantages du recyclage des déchets papiers.</div>",
          "reponse": "<div style='font-size: 16px;'>Les avantages du recyclage des papiers sont :<br><br>1. <strong>Préservation des arbres</strong> : moins de coupes d'arbres pour la production de pâte à papier.<br>2. <strong>Économie d'énergie</strong> : le recyclage consomme moins d'énergie que la production de papier vierge.<br>3. <strong>Réduction des émissions de CO₂</strong> : moins de gaz à effet de serre liés à la fabrication et au transport.</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> Proposer un slogan pour sensibiliser à la gestion durable des déchets.</div>",
          "reponse": "<div style='font-size: 16px;'><strong>\"Ne laissons pas nos déchets polluer notre futur !\"</strong><br><br>Autres propositions :<br>- \"Chaque déchet à sa place : trions, recyclons, valorisons !\"<br>- \"Moins de déchets, plus de vie : agissons aujourd'hui pour demain.\"</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>3.</strong> Proposer des comportements adaptés face à une inondation (avant, pendant, après).</div>",
          "reponse": "<div style='font-size: 16px;'><strong>Avant l'inondation :</strong> s'informer sur les risques, préparer un kit de survie, élaborer un plan d'évacuation.<br><br><strong>Pendant l'inondation :</strong> monter dans les étages, couper l'électricité et le gaz, ne pas traverser les eaux à pied ou en voiture, écouter les consignes des autorités.<br><br><strong>Après l'inondation :</strong> évaluer les dégâts, évacuer les bâtiments endommagés, aider les personnes vulnérables, désinfecter les zones inondées.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Nutrition et digestion - QCM",
      "points": "2 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; font-family: Arial, sans-serif; padding: 5px;'><p>Cochez la bonne réponse pour chaque question.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 16px;'><strong>1.</strong> Le PH dans l'estomac est :</div>",
          "reponse": "<div style='font-size: 16px;'>Le PH dans l'estomac est <strong>acide</strong> (environ 2). Il permet l'activation des enzymes digestives (pepsine) et la destruction des bactéries [citation:3].</div>"
        },
        {
          "question": "<div style='font-size: 16px;'><strong>2.</strong> La digestion des protéines débute dans :</div>",
          "reponse": "<div style='font-size: 16px;'>La digestion des protéines débute dans l'<strong>estomac</strong> grâce à la <strong>pepsine</strong>, une enzyme qui agit en milieu acide et dégrade les protéines en polypeptides.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
