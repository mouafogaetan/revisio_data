<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT Tle A",
  "classe": "Terminale A",
  "sequence": "Evaluation Sequentielle N°5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Recyclage et valorisation des déchets",
      "points": "10 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Le recyclage des déchets est devenu une nécessité pour préserver l'environnement et réduire l'impact des activités humaines sur la planète. Les déchets papiers et plastiques, en particulier, peuvent être valorisés pour limiter la pollution et économiser les ressources naturelles.<br><br> <strong>Document :</strong> <br> Le graphique ci-dessous présente l'évolution de la production de déchets plastiques en Afrique entre 2000 et 2020 (en millions de tonnes).<br> <div style='text-align: center; margin: 10px 0;'> <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; display: inline-block;'> <span style='font-size: 0.9rem;'>[Graphique : barres représentant une augmentation de 5 à 15 millions de tonnes sur la période]</span> </div> </div> <br> 1) Expliquez les avantages du recyclage des papiers pour l'environnement (au moins 3 arguments). <br> 2) Décrivez brièvement un processus de valorisation des déchets plastiques au Cameroun. <br> 3) Proposez un slogan de sensibilisation pour promouvoir la gestion durable des déchets dans votre communauté. </div>",
      "questions": [
        {
          "question": "1) Expliquez les avantages du recyclage des papiers pour l'environnement (au moins 3 arguments).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le recyclage des papiers présente plusieurs avantages majeurs pour l'environnement :<br> <ul> <li><strong>Préservation des forêts :</strong> En recyclant le papier, on limite l'abattage des arbres. Pour produire 1 tonne de papier, il faut environ 2 à 3 tonnes de bois, soit une quinzaine d'arbres adultes. Recycler permet donc de sauver des forêts, essentielles pour la biodiversité et la régulation du climat.</li> <li><strong>Économie d'énergie :</strong> Le recyclage du papier consomme jusqu'à 60 % d'énergie en moins par rapport à la fabrication à partir de fibres vierges. Cette réduction limite l'utilisation de combustibles fossiles et la pollution associée.</li> <li><strong>Réduction des émissions de CO₂ :</strong> En évitant l'incinération et la décomposition des papiers en décharge, le recyclage réduit les émissions de gaz à effet de serre, notamment le méthane et le CO₂, contribuant ainsi à limiter le réchauffement climatique.</li> <li><strong>Réduction de la pollution des sols et de l'eau :</strong> Moins de déchets papiers dans les décharges signifie une diminution des polluants qui peuvent s'infiltrer dans les nappes phréatiques et les sols.</li> </ul> </div>"
        },
        {
          "question": "2) Décrivez brièvement un processus de valorisation des déchets plastiques au Cameroun.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Un processus simple de valorisation des déchets plastiques consiste à les transformer en pavés ou en dalles pour la construction. Ce processus se déroule en plusieurs étapes : <br> <ul> <li><strong>Collecte :</strong> Les déchets plastiques (sachets, bouteilles) sont collectés par des associations ou des entreprises locales.</li> <li><strong>Triage et nettoyage :</strong> Les plastiques sont triés par type (PE, PP, etc.) et lavés pour éliminer les impuretés.</li> <li><strong>Broyage :</strong> Les plastiques propres sont broyés en petits morceaux (paillettes).</li> <li><strong>Fusion et moulage :</strong> Les paillettes sont chauffées jusqu'à fusion, puis mélangées à du sable ou des agrégats. Le mélange est ensuite moulé dans des formes de pavés ou de dalles.</li> <li><strong>Refroidissement et démoulage :</strong> Après refroidissement, les pavés sont démoulés et prêts à être utilisés pour le pavage de routes, de cours ou de trottoirs.</li> </ul> <p>Ce processus est avantageux car il réduit la quantité de déchets plastiques dans la nature, crée des emplois locaux et produit des matériaux de construction durables et moins coûteux.</p> </div>"
        },
        {
          "question": "3) Proposez un slogan de sensibilisation pour promouvoir la gestion durable des déchets dans votre communauté.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><p><strong>Exemple de slogans :</strong></p> <ul> <li><strong>« Un geste pour la planète : trier, recycler, valoriser ! »</strong></li> <li><strong>« Ne jetez plus, valorisez ! Le futur se construit avec nos déchets. »</strong></li> <li><strong>« Pour un Cameroun plus propre, recyclons ensemble ! »</strong></li> <li><strong>« Le recyclage, c'est l'affaire de tous. Agissons maintenant ! »</strong></li> </ul> <p>Ces slogans visent à sensibiliser la population à l'importance du tri et du recyclage des déchets pour préserver l'environnement et construire un avenir durable.</p> </div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Immunité et maladies auto-immunes",
      "points": "10 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Le système immunitaire joue un rôle crucial dans la protection de l'organisme contre les agents pathogènes. Cependant, il peut parfois dysfonctionner et se retourner contre l'organisme lui-même, provoquant des maladies auto-immunes. Le diabète de type 1 et le vitiligo sont des exemples de ces maladies.<br><br> 1) Définissez une maladie auto-immune et expliquez le mécanisme de la destruction des cellules par le système immunitaire. <br> 2) Expliquez pourquoi le vitiligo est considéré comme une maladie auto-immune. <br> 3) Citez deux autres maladies auto-immunes (autres que le diabète de type 1 et le vitiligo). <br> 4) Décrivez les modes de transmission du VIH et les moyens de prévention. </div>",
      "questions": [
        {
          "question": "1) Définissez une maladie auto-immune et expliquez le mécanisme de la destruction des cellules par le système immunitaire.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Une <strong>maladie auto-immune</strong> est une maladie dans laquelle le système immunitaire, normalement chargé de reconnaître et d'éliminer les éléments étrangers (virus, bactéries), ne distingue plus les cellules de l'organisme (le soi) des agents pathogènes. Il produit alors des anticorps ou des cellules cytotoxiques qui attaquent et détruisent les cellules saines.<br><br> Le mécanisme est le suivant : <ul> <li>Les lymphocytes T et B, qui reconnaissent normalement les antigènes étrangers, deviennent autoréactifs.</li> <li>Ils ciblent des auto-antigènes présents à la surface des cellules de l'organisme.</li> <li>Cette réaction entraîne une inflammation et la destruction des tissus cibles, provoquant les symptômes de la maladie.</li> </ul> </div>"
        },
        {
          "question": "2) Expliquez pourquoi le vitiligo est considéré comme une maladie auto-immune.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le <strong>vitiligo</strong> est une maladie auto-immune car il est causé par la destruction des <strong>mélanocytes</strong>, les cellules responsables de la production du pigment mélanique (la mélanine) qui donne sa couleur à la peau. Dans le vitiligo, le système immunitaire produit des anticorps et des lymphocytes T qui attaquent spécifiquement les mélanocytes, les détruisant localement. Cette destruction entraîne l'apparition de tâches blanches, dépigmentées, sur la peau. Le vitiligo est donc bien une réaction du système immunitaire contre les propres cellules de l'organisme.</div>"
        },
        {
          "question": "3) Citez deux autres maladies auto-immunes (autres que le diabète de type 1 et le vitiligo).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Voici deux autres exemples de maladies auto-immunes :<br> <ul> <li><strong>La polyarthrite rhumatoïde :</strong> Le système immunitaire attaque les articulations, provoquant une inflammation chronique, des douleurs et des déformations articulaires.</li> <li><strong>La sclérose en plaques (SEP) :</strong> Le système immunitaire attaque la gaine de myéline qui entoure les fibres nerveuses du système nerveux central (cerveau et moelle épinière), entraînant des troubles neurologiques (paralysie, troubles de la vision, etc.).</li> <li><strong>Le lupus érythémateux disséminé :</strong> Maladie auto-immune systémique touchant plusieurs organes (peau, articulations, reins, cœur, etc.).</li> </ul> </div>"
        },
        {
          "question": "4) Décrivez les modes de transmission du VIH et les moyens de prévention.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le <strong>VIH (Virus de l'Immunodéficience Humaine)</strong> se transmet de plusieurs manières :<br> <ul> <li><strong>Transmission sexuelle :</strong> Lors de rapports sexuels non protégés (vaginal, anal, oral) avec une personne infectée, par contact avec les muqueuses.</li> <li><strong>Transmission sanguine :</strong> Par partage de matériel contaminé (seringues, aiguilles) ou par transfusion sanguine de sang infecté (rare dans les pays où le dépistage est systématique).</li> <li><strong>Transmission mère-enfant :</strong> Pendant la grossesse, l'accouchement ou l'allaitement, d'une mère infectée à son enfant.</li> </ul> <strong>Moyens de prévention :</strong> <ul> <li><strong>Utilisation systématique du préservatif</strong> (masculin ou féminin) lors des rapports sexuels.</li> <li><strong>Utilisation de matériel stérile à usage unique</strong> pour les injections, les soins médicaux et les tatouages.</li> <li><strong>Dépistage volontaire</strong> pour connaître son statut sérologique.</li> <li><strong>Traitement antirétroviral (ARV)</strong> chez les personnes séropositives pour réduire la charge virale et limiter la transmission.</li> <li><strong>Prévention de la transmission mère-enfant</strong> (PTME) par la prise d'ARV pendant la grossesse et l'accouchement, et l'évitement de l'allaitement maternel lorsque c'est possible.</li> </ul> </div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
