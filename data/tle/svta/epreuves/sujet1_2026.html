<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Tle A",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Organisation de la cellule et support de l'information génétique",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'>Le document ci-dessous représente une cellule eucaryote typique avec ses principaux organites.</div><div style='text-align:center; margin: 15px 0;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 10px; display: inline-block;'><span style='color: #333;'>[Document : Schéma d'une cellule animale avec : noyau, mitochondrie, ribosomes, membrane plasmique, cytoplasme.]</span></div></div><div style='font-size: 1em; line-height: 1.6; text-align: justify;'>L'ADN, support de l'information génétique, est une molécule en double hélice. La séquence de l'un de ses brins est : <strong>5'-ATT GCA TCG-3'</strong>.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> Identifier les organites numérotés de 1 à 4 en vous basant sur le schéma fourni (noyau, mitochondrie, ribosome, membrane plasmique).</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> 1 : Membrane plasmique ; 2 : Noyau ; 3 : Ribosome ; 4 : Mitochondrie.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> Associer à chaque organite identifié un rôle simple, par exemple en lien avec la production d'énergie, la synthèse des protéines, ou la protection de la cellule.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> Membrane plasmique : Protection et échanges ; Noyau : Contient l'ADN et dirige les activités ; Ribosome : Synthèse des protéines ; Mitochondrie : Production d'énergie (respiration cellulaire).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>3.</strong> Indiquer le brin d'ADN complémentaire à la séquence donnée, en respectant les règles d'appariement des bases azotées (A-T, G-C).</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>3.</strong> Le brin complémentaire est : <strong>3'-TAA CGT AGC-5'</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>4.</strong> Expliquer brièvement pourquoi la structure en double hélice de l'ADN est favorable à sa réplication.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>4.</strong> La structure en double hélice permet la séparation des deux brins. Chaque brin sert alors de matrice pour la synthèse d'un nouveau brin complémentaire, assurant une copie conforme de l'information génétique. C'est une réplication semi-conservative.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : De l'ADN à la protéine, la biosynthèse des protéines",
      "points": "3 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'>On s'intéresse à la synthèse d'une protéine dans une cellule. Une portion d'ADN codant pour une petite protéine a la séquence suivante : <strong>5'-TAC GCC TTG GGA AAT CGT-3'</strong>.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> Transcrire ce brin d'ADN en ARN messager (ARNm). Rappeler que l'ARN utilise l'uracile (U) à la place de la thymine (T).</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> L'ARNm correspondant est : <strong>5'-AUG CGG AAC CCU UUA GCA-3'</strong>. (Les bases sont complémentaires : A-U, T-A, G-C, C-G).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> En utilisant le code génétique simplifié fourni (ici un tableau simplifié est présenté), déterminer la séquence d'acides aminés de la protéine synthétisée à partir de cet ARNm.<br><br>Tableau : <br>AUG = Méthionine (Met) ; CGG = Arginine (Arg) ; AAC = Asparagine (Asn) ; CCU = Proline (Pro) ; UUA = Leucine (Leu) ; GCA = Alanine (Ala).</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> La séquence d'acides aminés est : <strong>Méthionine-Arginine-Asparagine-Proline-Leucine-Alanine (Met-Arg-Asn-Pro-Leu-Ala)</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>3.</strong> Citer l'organite cellulaire où se déroule cette étape de traduction.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>3.</strong> La traduction se déroule au niveau des <strong>ribosomes</strong>.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : La digestion, source de nutriments pour les cellules",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'>Lors d'un repas, une élève consomme un menu composé de riz (amidon), de haricot (protéines) et de poisson (protéines et lipides) [citation:2].<br><br>Le document suivant présente un schéma simplifié de l'appareil digestif humain :<br><div style='text-align:center; margin: 10px 0;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 10px; display: inline-block;'><span style='color: #333;'>[Document : Schéma de l'appareil digestif avec les principaux organes : bouche, œsophage, estomac, intestin grêle, gros intestin.]</span></div></div></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> Nommer les grandes étapes de la digestion des aliments.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> Les grandes étapes de la digestion sont : l'<strong>ingestion</strong>, la <strong>digestion mécanique et chimique</strong>, l'<strong>absorption</strong> des nutriments et l'<strong>élimination</strong> des résidus.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> Citer les principales enzymes impliquées dans la digestion de ce repas (exemple : amylase, pepsine, lipase) et indiquer leur rôle respectif. On pourra citer l'amylase salivaire, la pepsine, la lipase pancréatique, etc.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> <br>- <strong>Amylase salivaire (ptyaline)</strong> : transforme l'amidon en maltose dans la bouche [citation:2].<br>- <strong>Pepsine</strong> : transforme les protéines en polypeptides dans l'estomac [citation:2].<br>- <strong>Lipase pancréatique</strong> : transforme les lipides en acides gras et glycérol dans l'intestin grêle [citation:2].</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>3.</strong> Décrire brièvement ce que deviennent les nutriments après leur absorption au niveau de l'intestin grêle.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>3.</strong> Après absorption, les nutriments (glucose, acides aminés, acides gras) passent dans le sang et sont transportés vers les cellules de l'organisme. Ils y sont utilisés pour produire de l'énergie (respiration cellulaire), construire de nouvelles molécules (protéines, membranes) ou être stockés.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>4.</strong> Expliquer ce que deviennent les résidus non digérés de ce repas.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>4.</strong> Les résidus non digérés (fibres, etc.) passent dans le gros intestin (côlon) où l'eau est réabsorbée. Le reste forme les fèces, qui sont stockées dans le rectum puis évacuées par l'anus lors de la défécation.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les troubles digestifs et la santé",
      "points": "2 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'>Un élève se plaint de douleurs abdominales, de ballonnements et de constipation depuis quelques jours.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> Proposer deux causes possibles à ces troubles digestifs en vous basant sur les connaissances acquises.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>1.</strong> Les causes possibles sont : une alimentation pauvre en fibres, un manque d'hydratation, une consommation excessive d'aliments gras ou épicés, ou encore le stress [citation:2].</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> Suggérer deux conseils d'hygiène de vie pour améliorer la digestion et prévenir ces troubles.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; text-align: justify;'><strong>2.</strong> Conseils : Boire suffisamment d'eau (1,5 à 2L par jour), consommer des aliments riches en fibres (fruits, légumes, céréales complètes), pratiquer une activité physique régulière, manger lentement en mastiquant bien. Ces bonnes habitudes facilitent le transit intestinal [citation:2].</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
