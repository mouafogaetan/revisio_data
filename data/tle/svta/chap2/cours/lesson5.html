<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à la traduction",
    "contenu": "<div style='background-color:#e8f5e9;padding:20px;border-radius:12px;margin:10px 0;'><h3 style='color:#2e7d32;margin-top:0;'>Qu'est-ce que la traduction ?</h3><p style='color:#1b5e20;'>La <strong>traduction</strong> est la deuxième étape de la biosynthèse des protéines. C'est le processus par lequel l'information portée par l'ARN messager (ARNm) est <strong>traduite</strong> en une séquence d'acides aminés pour former une protéine.</p></div><div style='background-color:#fff3e0;padding:15px;border-radius:8px;margin:15px 0;'><p style='color:#e65100;'><strong>🔑 Où cela se passe-t-il ?</strong> La traduction se déroule dans le <strong>cytoplasme</strong>, au niveau des <strong>ribosomes</strong>.</p></div><p>La traduction est une étape complexe qui mobilise plusieurs acteurs :</p><ul><li>L'<strong>ARN messager (ARNm)</strong> : le plan de montage.</li><li>Le <strong>ribosome</strong> : l'usine de fabrication des protéines.</li><li>Les <strong>ARN de transfert (ARNt)</strong> : les transporteurs d'acides aminés.</li><li>Les <strong>acides aminés</strong> : les briques de la protéine.</li></ul>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons étudier la traduction, la deuxième étape de la biosynthèse des protéines. Après avoir vu comment l'information génétique est transcrite de l'ADN à l'ARN messager, nous allons maintenant voir comment cet ARN messager est traduit en une protéine. Cette étape se déroule dans le cytoplasme, au niveau des ribosomes. Pour comprendre ce processus, il faut connaître les principaux acteurs : l'ARN messager qui est le plan, le ribosome qui est l'usine, les ARN de transfert qui transportent les acides aminés, et les acides aminés eux-mêmes qui sont les briques de la protéine.",
    "note": "La traduction est l'étape de synthèse des protéines à partir de l'ARNm."
  },
  {
    "titre": "Le code génétique universel",
    "contenu": "<p>Le <strong>code génétique</strong> est le langage qui permet de passer de l'information nucléotidique (ARNm) à l'information protéique (acides aminés).</p><div style='background-color:#e3f2fd;padding:15px;border-radius:8px;margin:15px 0;'><h4 style='color:#0d47a1;margin-top:0;'>📌 Caractéristiques du code génétique</h4><ul><li><strong>Universalité</strong> : le même code est utilisé par tous les êtres vivants (bactéries, plantes, animaux, humains).</li><li><strong>Redondance (ou dégénérescence)</strong> : plusieurs codons différents peuvent coder le même acide aminé.</li><li><strong>Non-ambiguïté</strong> : chaque codon ne code qu'un seul acide aminé.</li><li><strong>Présence de codons stop</strong> : 3 codons (UAA, UAG, UGA) ne codent aucun acide aminé et signalent la fin de la synthèse.</li></ul></div><div style='background-color:#f3e5f5;padding:10px;border-radius:8px;'><p><strong>💡 Exemple :</strong> Le codon <strong>AUG</strong> est un codon universel qui code la <strong>méthionine</strong>. C'est aussi le <strong>codon START</strong>, qui indique le début de la traduction.</p></div>",
    "texteParle": "Pour comprendre la traduction, il faut d'abord connaître le code génétique. C'est le langage qui permet de passer des nucléotides de l'ARNm aux acides aminés de la protéine. Ce code est universel, c'est-à-dire que le même code est utilisé par tous les êtres vivants. Il est aussi redondant, car plusieurs codons différents peuvent coder le même acide aminé. Mais il est non-ambigu, un codon ne code qu'un seul acide aminé. Enfin, il y a trois codons stop qui ne codent rien et qui signalent la fin de la synthèse. Le codon AUG est un codon important car il code la méthionine et sert de codon start.",
    "note": "Le code génétique est universel, ce qui prouve l'unité du monde vivant."
  },
  {
    "titre": "Le rôle des ARN de transfert (ARNt)",
    "contenu": "<div style='display:flex;flex-direction:column;gap:15px;'><div style='background-color:#e0f7fa;padding:15px;border-radius:8px;'><h4 style='color:#006064;margin-top:0;'>🧬 Structure de l'ARNt</h4><p>L'ARN de transfert (ARNt) est une petite molécule d'ARN qui a une forme de <strong>trèfle</strong> en 2D et de <strong>L</strong> en 3D.</p><ul><li><strong>Bras accepteur</strong> : à son extrémité 3', il porte l'acide aminé spécifique.</li><li><strong>Anticodon</strong> : une séquence de 3 nucléotides qui s'apparie de manière complémentaire au codon de l'ARNm.</li></ul></div><div style='background-color:#fff8e1;padding:15px;border-radius:8px;'><h4 style='color:#e65100;margin-top:0;'>🎯 Fonction de l'ARNt</h4><p>L'ARNt est le <strong>transporteur</strong> d'acides aminés. Il lit le code de l'ARNm et amène le bon acide aminé correspondant au ribosome.</p></div></div><div style='background-color:#f3e5f5;padding:10px;border-radius:8px;margin-top:10px;'><p><strong>🔗 Analogie :</strong> L'ARNt est comme un livreur qui transporte un colis (l'acide aminé) vers une adresse précise (le codon sur l'ARNm).</p></div>",
    "texteParle": "Le deuxième acteur important de la traduction est l'ARN de transfert, ou ARNt. C'est une petite molécule d'ARN qui a une forme de trèfle en deux dimensions et de L en trois dimensions. Il a deux parties importantes : le bras accepteur qui porte l'acide aminé, et l'anticodon qui s'apparie avec le codon de l'ARNm. L'ARNt est donc le transporteur d'acides aminés. Il lit le code de l'ARNm et amène le bon acide aminé correspondant au ribosome. On peut le comparer à un livreur qui transporte un colis vers une adresse précise.",
    "note": "Chaque ARNt est spécifique à un acide aminé."
  },
  {
    "titre": "Les étapes de la traduction",
    "contenu": "<div style='display:flex;flex-direction:column;gap:12px;'><div style='background-color:#e8f5e9;padding:12px;border-radius:8px;border-left:4px solid #4CAF50;'><h4 style='color:#2e7d32;margin-top:0;'>1️⃣ Initiation</h4><ul><li>La <strong>petite sous-unité ribosomique</strong> se fixe à l'ARNm au niveau du codon START (AUG).</li><li>Le premier ARNt portant la <strong>méthionine</strong> vient s'apparier au codon AUG.</li><li>La <strong>grande sous-unité ribosomique</strong> se fixe, formant le ribosome fonctionnel.</li></ul></div><div style='background-color:#fff3e0;padding:12px;border-radius:8px;border-left:4px solid #FF9800;'><h4 style='color:#e65100;margin-top:0;'>2️⃣ Élongation</h4><ul><li>Un nouveau codon de l'ARNm entre dans le ribosome.</li><li>Un ARNt avec l'anticodon correspondant apporte l'acide aminé approprié.</li><li>Une <strong>liaison peptidique</strong> se forme entre l'acide aminé et la chaîne peptidique en croissance.</li><li>Le ribosome se déplace d'un codon (translocation).</li></ul></div><div style='background-color:#ffebee;padding:12px;border-radius:8px;border-left:4px solid #f44336;'><h4 style='color:#c62828;margin-top:0;'>3️⃣ Terminaison</h4><ul><li>Le ribosome rencontre un <strong>codon STOP</strong> (UAA, UAG, UGA).</li><li>Un <strong>facteur de libération</strong> se fixe sur le site A du ribosome.</li><li>La <strong>protéine</strong> est libérée et le ribosome se sépare.</li></ul></div></div>",
    "texteParle": "La traduction se déroule en trois étapes principales. La première étape est l'initiation : la petite sous-unité du ribosome se fixe à l'ARNm au niveau du codon start AUG. Un ARNt portant la méthionine s'apparie à ce codon, puis la grande sous-unité se fixe pour former un ribosome fonctionnel. La deuxième étape est l'élongation : le ribosome lit chaque codon, un ARNt apporte l'acide aminé correspondant, une liaison peptidique se forme entre les acides aminés, et le ribosome avance d'un codon. Enfin, la troisième étape est la terminaison : quand le ribosome rencontre un codon stop, un facteur de libération se fixe, la protéine est libérée et le ribosome se sépare.",
    "note": "La traduction est un processus dynamique qui consomme de l'énergie."
  },
  {
    "titre": "Schéma simplifié de la traduction",
    "contenu": "<div style='background-color:#e3f2fd;padding:15px;border-radius:12px;text-align:center;'><p style='font-size:1.1em;color:#0d47a1;'><strong>ARNm → Ribosome → Protéine</strong></p></div><div style='display:flex;flex-direction:column;gap:10px;margin:15px 0;'><div style='background-color:#f5f5f5;padding:12px;border-radius:8px;'><p><strong>🔹 ARNm :</strong> AUG - CGA - UAC - AUG - CCG - UGA</p><p style='font-size:0.9em;color:#555;'>Codons lus par le ribosome</p></div><div style='background-color:#f5f5f5;padding:12px;border-radius:8px;'><p><strong>🔹 ARNt :</strong> Transportent les acides aminés correspondants</p><p style='font-size:0.9em;color:#555;'>Anticodon complémentaire du codon</p></div><div style='background-color:#e8f5e9;padding:12px;border-radius:8px;'><p><strong>🔹 Protéine :</strong> Chaîne d'acides aminés</p><p style='font-size:0.9em;color:#2e7d32;'>Méthionine - Arginine - Tyrosine - Méthionine - Proline</p></div></div><div style='background-color:#fff3e0;padding:10px;border-radius:8px;'><p style='color:#e65100;'><strong>⚠️ Attention :</strong> La séquence des acides aminés détermine la structure et la fonction de la protéine.</p></div>",
    "texteParle": "Pour bien comprendre la traduction, regardons un schéma simplifié. L'ARN messager, avec sa séquence de codons, arrive au ribosome. Chaque codon est lu et un ARN de transfert apporte l'acide aminé correspondant. Par exemple, le codon AUG est reconnu par un ARNt qui apporte la méthionine. Le codon CGA est reconnu par un ARNt qui apporte l'arginine. Et ainsi de suite, jusqu'à ce qu'on arrive à un codon stop qui termine la synthèse. La séquence des acides aminés va déterminer la structure et la fonction de la protéine. C'est donc une étape cruciale pour la cellule.",
    "note": "La séquence des acides aminés détermine la forme et la fonction de la protéine."

  {
    "titre": "Les sites du ribosome",
    "contenu": "<p>Le ribosome possède <strong>3 sites</strong> pour accueillir les ARNt pendant la traduction :</p><div style='display:grid;grid-template-columns:1fr;gap:10px;margin:15px 0;'><div style='background-color:#e8f5e9;padding:12px;border-radius:8px;border-left:5px solid #4CAF50;'><h4 style='color:#2e7d32;margin-top:0;'>Site A (Accepteur)</h4><p>Le site <strong>A</strong> est le site d'arrivée du nouvel ARNt. C'est ici que l'ARNt apportant l'acide aminé se fixe au codon correspondant de l'ARNm.</p></div><div style='background-color:#fff3e0;padding:12px;border-radius:8px;border-left:5px solid #FF9800;'><h4 style='color:#e65100;margin-top:0;'>Site P (Peptidyl)</h4><p>Le site <strong>P</strong> est le site où se trouve la chaîne peptidique en croissance. C'est ici que la liaison peptidique se forme entre les acides aminés.</p></div><div style='background-color:#ffebee;padding:12px;border-radius:8px;border-left:5px solid #f44336;'><h4 style='color:#c62828;margin-top:0;'>Site E (Exit)</h4><p>Le site <strong>E</strong> est le site de sortie de l'ARNt qui a déjà transféré son acide aminé. L'ARNt vide est libéré du ribosome.</p></div></div><div style='background-color:#e3f2fd;padding:10px;border-radius:8px;'><p><strong>🔄 Mouvement :</strong> L'ARNt passe du site A → site P → site E pendant l'élongation.</p></div>",
    "texteParle": "Le ribosome est une structure complexe qui possède trois sites pour accueillir les ARN de transfert. Le premier est le site A, ou site accepteur, qui est le site d'arrivée du nouvel ARNt. C'est ici que l'ARNt apportant un acide aminé se fixe au codon correspondant. Le deuxième est le site P, ou site peptidyl, où se trouve la chaîne peptidique en croissance. C'est ici que la liaison peptidique se forme entre les acides aminés. Le troisième est le site E, ou site de sortie, d'où l'ARNt qui a déjà transféré son acide aminé est libéré. L'ARNt passe donc du site A au site P puis au site E.",
    "note": "Le mouvement des ARNt dans le ribosome est essentiel à la synthèse protéique."

  {
    "titre": "Liaison peptidique et formation de la protéine",
    "contenu": "<div style='background-color:#f3e5f5;padding:15px;border-radius:12px;margin:10px 0;'><h4 style='color:#4a148c;margin-top:0;'>🔗 Qu'est-ce qu'une liaison peptidique ?</h4><p>Une <strong>liaison peptidique</strong> est une liaison covalente qui s'établit entre le groupement <strong>carboxyle (COOH)</strong> d'un acide aminé et le groupement <strong>amine (NH₂)</strong> de l'acide aminé suivant.</p></div><div style='background-color:#e8f5e9;padding:15px;border-radius:8px;'><p><strong>📌 La formation de la liaison peptidique se fait par une réaction de condensation, avec libération d'une molécule d'eau (H₂O).</strong></p></div><div style='background-color:#fff3e0;padding:15px;border-radius:8px;margin:10px 0;'><p><strong>🧬 Structure de la protéine :</strong></p><ul><li><strong>Structure primaire</strong> : la séquence linéaire des acides aminés.</li><li><strong>Structure secondaire</strong> : repliement en hélice α ou feuillet β.</li><li><strong>Structure tertiaire</strong> : repliement global de la protéine dans l'espace.</li><li><strong>Structure quaternaire</strong> : association de plusieurs sous-unités protéiques.</li></ul></div>",
    "texteParle": "La formation d'une protéine se fait par l'établissement de liaisons peptidiques entre les acides aminés. Une liaison peptidique est une liaison covalente qui se forme entre le groupement carboxyle d'un acide aminé et le groupement amine de l'acide aminé suivant. Cette liaison se forme par une réaction de condensation, avec libération d'une molécule d'eau. La protéine obtenue a une structure primaire, qui est la séquence linéaire des acides aminés. Ensuite, elle se replie en structure secondaire, puis en structure tertiaire, et éventuellement en structure quaternaire pour devenir fonctionnelle.",
    "note": "La structure d'une protéine dépend de sa séquence en acides aminés."
  },
  {
    "titre": "Différence transcription/traduction",
    "contenu": "<p>Il est important de ne pas confondre les deux étapes de la biosynthèse des protéines.</p><div style='display:grid;grid-template-columns:1fr;gap:15px;margin:15px 0;'><div style='background-color:#e3f2fd;padding:15px;border-radius:8px;'><h4 style='color:#0d47a1;margin-top:0;'>Transcription</h4><ul><li><strong>Où ?</strong> Dans le noyau</li><li><strong>Quoi ?</strong> ADN → ARNm</li><li><strong>Résultat ?</strong> Copie de l'information génétique</li><li><strong>Enzyme ?</strong> ARN polymérase</li></ul></div><div style='background-color:#e8f5e9;padding:15px;border-radius:8px;'><h4 style='color:#2e7d32;margin-top:0;'>Traduction</h4><ul><li><strong>Où ?</strong> Dans le cytoplasme (ribosome)</li><li><strong>Quoi ?</strong> ARNm → Protéine</li><li><strong>Résultat ?</strong> Synthèse de la protéine</li><li><strong>Acteur ?</strong> Ribosome, ARNt, ARNm</li></ul></div></div><div style='background-color:#fff3e0;padding:10px;border-radius:8px;text-align:center;'><p><strong>📝 Résumé :</strong> <span style='color:#0d47a1;'>ADN</span> <span style='font-size:1.2em;'>→</span> <span style='color:#0d47a1;'>Transcription</span> <span style='font-size:1.2em;'>→</span> <span style='color:#2e7d32;'>ARNm</span> <span style='font-size:1.2em;'>→</span> <span style='color:#2e7d32;'>Traduction</span> <span style='font-size:1.2em;'>→</span> <span style='color:#e65100;'>Protéine</span></p></div>",
    "texteParle": "Il est très important de ne pas confondre la transcription et la traduction. La transcription se déroule dans le noyau et consiste à copier l'information de l'ADN en ARN messager. La traduction, elle, se déroule dans le cytoplasme, au niveau des ribosomes, et consiste à traduire l'ARN messager en une protéine. La transcription donne l'ARNm, la traduction donne la protéine. En résumé, l'information génétique passe de l'ADN à l'ARNm par la transcription, puis de l'ARNm à la protéine par la traduction. Ces deux étapes sont essentielles pour l'expression des gènes.",
    "note": "La transcription ADN → ARNm, la traduction ARNm → protéine."

    "texteParle": "Pour mieux comprendre l'importance de la traduction, prenons un exemple concret : la synthèse de l'insuline. L'insuline est une hormone protéique produite par le pancréas qui régule le taux de glucose dans le sang. Sa synthèse se fait en plusieurs étapes. D'abord, le gène de l'insuline est transcrit en ARN messager dans le noyau des cellules du pancréas. Ensuite, l'ARN messager est exporté dans le cytoplasme, où le ribosome le traduit en une chaîne d'acides aminés. Enfin, cette chaîne se replie pour former une protéine fonctionnelle. Cet exemple est d'autant plus important que le diabète, une maladie liée à un problème d'insuline, est très répandu au Cameroun.",

    "texteParle": "Pour conclure cette leçon sur la traduction, retenons les points essentiels. La traduction est la synthèse des protéines à partir de l'ARN messager. Elle se déroule dans le cytoplasme, au niveau des ribosomes. Les ARN de transfert sont les transporteurs d'acides aminés. Le code génétique est universel, redondant et non-ambigu. Enfin, la traduction se fait en trois étapes : l'initiation, l'élongation et la terminaison. L'information génétique est universelle, et comprendre la traduction, c'est comprendre le fonctionnement même de la vie. C'est une base essentielle pour la suite de vos études en SVT.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
