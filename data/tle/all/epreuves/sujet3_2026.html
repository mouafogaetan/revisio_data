<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Allemand",
  "classe": "Terminale",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Lesen und Verstehen (Compréhension écrite)",
      "points": "16 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><h3 style='color: #2c3e50;'>Die Rolle der Frau im Wandel</h3><p>Früher war die Rolle der Frau in der Gesellschaft oft auf die Familie beschränkt. Frauen waren vor allem <strong>Hausfrauen</strong> und Mütter, die sich um den Haushalt und die Kinder kümmerten. Die <strong>berufstätige Frau</strong> war eher die Ausnahme. Heutzutage hat sich viel verändert. Immer mehr Frauen haben eine <strong>Karriere</strong> und sind in Führungspositionen tätig. Die <strong>Gleichberechtigung</strong> zwischen Mann und Frau ist ein wichtiges gesellschaftliches Ziel.</p><p>Auf dem Land sind die Traditionen jedoch oft noch stärker verankert. In vielen Dörfern ist die Frau immer noch für die Feldarbeit und den Haushalt verantwortlich, während der Mann die Entscheidungen trifft. Die <strong>alleinerziehende Mutter</strong> hat es oft besonders schwer, weil sie sowohl die Familie ernähren als auch die Kinder erziehen muss. Im Gegensatz dazu haben Frauen in der Stadt bessere Chancen auf Bildung und Beruf. Sie können zwischen <strong>Teilzeitarbeit</strong> und <strong>Vollzeitarbeit</strong> wählen.</p><p>Trotz der Fortschritte gibt es immer noch <strong>Vorurteile</strong> gegenüber berufstätigen Müttern. Viele Menschen glauben, dass eine Mutter zu Hause bleiben sollte, um sich um die Kinder zu kümmern. Dabei zeigt die Erfahrung, dass Kinder auch von einer berufstätigen Mutter gut betreut werden können, wenn die Rahmenbedingungen stimmen. Die Gesellschaft muss noch einiges tun, um die <strong>Tradition</strong> der geschlechtsspezifischen Rollenverteilung zu überwinden.</p><p><strong>Worterklärung :</strong></p><ul><li>der Wandel - le changement</li><li>die Führungsposition - le poste de direction</li><li>die Rahmenbedingungen - les conditions-cadres</li><li>überwinden - surmonter</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>A/ Richtig oder falsch ? (8 pts)<br><br>1) Früher waren die meisten Frauen berufstätig.<br>2) Heutzutage ist die Gleichberechtigung ein wichtiges Ziel.<br>3) In Dörfern haben Frauen oft mehr Freiheiten als in der Stadt.<br>4) Alleinerziehende Mütter haben es oft leicht.</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>1) Falsch</strong> - Früher waren Frauen vor allem Hausfrauen und Mütter, die berufstätige Frau war eher die Ausnahme.</p><p><strong>2) Richtig</strong> - Die Gleichberechtigung zwischen Mann und Frau ist ein wichtiges gesellschaftliches Ziel.</p><p><strong>3) Falsch</strong> - Auf dem Land sind die Traditionen oft noch stärker verankert, Frauen in der Stadt haben bessere Chancen auf Bildung und Beruf.</p><p><strong>4) Falsch</strong> - Die alleinerziehende Mutter hat es oft besonders schwer.</p></div>"
        },
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>B/ Beantworte die Fragen und schreibe ganze Sätze ! (4 pts)<br><br>1) Was war die Rolle der Frau früher ?<br>2) Welche Unterschiede gibt es zwischen dem Land und der Stadt ?</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>1)</strong> Früher war die Rolle der Frau auf die Familie beschränkt. Frauen waren Hausfrauen und Mütter, die sich um den Haushalt und die Kinder kümmerten.</p><p><strong>2)</strong> Auf dem Land sind die Traditionen oft noch stärker verankert, während Frauen in der Stadt bessere Chancen auf Bildung und Beruf haben.</p></div>"
        },
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>C/ Finde im Text Synonyme für die folgenden Wörter ! (4 pts)<br><br>1) die Veränderung → ______<br>2) die Gleichstellung → ______<br>3) der Beruf → ______<br>4) das Vorurteil → ______</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>1)</strong> die Veränderung → <strong>der Wandel</strong></p><p><strong>2)</strong> die Gleichstellung → <strong>die Gleichberechtigung</strong></p><p><strong>3)</strong> der Beruf → <strong>die Karriere</strong></p><p><strong>4)</strong> das Vorurteil → <strong>das Vorurteil</strong> (le mot est dans le texte à la fin du dernier paragraphe)</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Strukturen und Wortschatz (Grammaire et vocabulaire)",
      "points": "12 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p>Ce deuxième exercice évalue tes connaissances en grammaire et en vocabulaire.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>A/ Grammatik (Grammaire) (6 pts)</strong></p><p><strong>1) Setze die Adjektive in die richtige Form (Komparation) ! (2 pts)</strong></p><p>a) Heute ist das Wetter ______ (gut) als gestern.</p><p>b) Sie ist ______ (viel) erfolgreich als ihre Kollegin.</p><p><strong>2) Schreibe die Sätze im Konjunktiv II ! (2 pts)</strong></p><p>a) Die Traditionen sind ungerecht. (Man sollte...)</p><p>b) Die Frauen haben keine gleichen Chancen. (Es wäre besser, wenn...)</p><p><strong>3) Ergänze die Relativsätze mit dem richtigen Relativpronomen ! (2 pts)</strong></p><p>a) Die Frau, ______ Mann gestorben ist, heißt Witwe.</p><p>b) Das Erbe, ______ ihr zusteht, ist wichtig.</p></div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>1a)</strong> Heute ist das Wetter <strong>besser</strong> als gestern.</p><p><strong>1b)</strong> Sie ist <strong>mehr</strong> erfolgreich als ihre Kollegin.</p><p><strong>2a)</strong> Man <strong>sollte</strong> diese Traditionen <strong>hinterfragen</strong>.</p><p><strong>2b)</strong> Es <strong>wäre</strong> besser, wenn die Frauen <strong>gleiche Chancen hätten</strong>.</p><p><strong>3a)</strong> Die Frau, <strong>deren</strong> Mann gestorben ist, heißt Witwe.</p><p><strong>3b)</strong> Das Erbe, <strong>das</strong> ihr zusteht, ist wichtig.</p></div>"
        },
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>B/ Wortschatz (Vocabulaire) (6 pts)</strong></p><p><strong>1) Bilde Komposita mit den folgenden Wörtern ! (2 pts)</strong></p><p>Witwe + Riten = ______</p><p>allein + erziehend + Mutter = ______</p><p><strong>2) Ergänze die Sätze mit dem passenden Verb ! (2 pts)</strong></p><p>(vererben - diskriminieren - integrieren - anpassen)</p><p>a) Man sollte Minderheiten nicht ______.</p><p>b) Es ist wichtig, sich an die neue Kultur ______.</p><p><strong>3) Finde das Gegenteil ! (2 pts)</strong></p><p>die Tradition ≠ ______</p><p>die Teilzeitarbeit ≠ ______</p></div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>1)</strong> Witwe + Riten = <strong>die Witwenriten</strong> ; allein + erziehend + Mutter = <strong>die alleinerziehende Mutter</strong></p><p><strong>2a)</strong> Man sollte Minderheiten nicht <strong>diskriminieren</strong>.</p><p><strong>2b)</strong> Es ist wichtig, sich an die neue Kultur <strong>anzupassen</strong>.</p><p><strong>3)</strong> die Tradition ≠ <strong>die Moderne / der Fortschritt</strong> ; die Teilzeitarbeit ≠ <strong>die Vollzeitarbeit</strong></p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Schriftlicher Ausdruck (Expression écrite)",
      "points": "12 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p>Les deux thèmes sont obligatoires !</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Thema 1 : Satzreihenfolge (Remets les phrases dans l'ordre pour former un texte cohérent) (6 pts)</strong></p><ul><li>Außerdem gibt es immer noch Vorurteile gegenüber berufstätigen Frauen.</li><li>Die Rolle der Frau hat sich in den letzten Jahrzehnten stark verändert.</li><li>Viele Frauen arbeiten heute in Führungspositionen.</li><li>Dennoch ist die Gleichberechtigung noch nicht vollständig erreicht.</li><li>Früher waren Frauen vor allem Hausfrauen und Mütter.</li><li>In manchen Kulturen werden Frauen immer noch diskriminiert.</li></ul></div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Ordre correct :</strong></p><ol><li>Die Rolle der Frau hat sich in den letzten Jahrzehnten stark verändert.</li><li>Früher waren Frauen vor allem Hausfrauen und Mütter.</li><li>Viele Frauen arbeiten heute in Führungspositionen.</li><li>Dennoch ist die Gleichberechtigung noch nicht vollständig erreicht.</li><li>Außerdem gibt es immer noch Vorurteile gegenüber berufstätigen Frauen.</li><li>In manchen Kulturen werden Frauen immer noch diskriminiert.</li></ol></div>"
        },
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Thema 2 : Aufsatz (6 pts)</strong></p><p>Schreibe einen Aufsatz von etwa 80-100 Wörtern zum Thema : <strong>« Die Rolle der Frau in der heutigen Gesellschaft »</strong>.</p><p>Berücksichtige dabei :</p><ul><li>die Veränderungen im Vergleich zur Vergangenheit</li><li>die Unterschiede zwischen Land und Stadt</li><li>die Herausforderungen für Frauen heute</li><li>deine eigene Meinung</li></ul></div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Exemple de réponse :</strong></p><p>Die Rolle der Frau hat sich in den letzten Jahrzehnten grundlegend verändert. Früher waren Frauen meist Hausfrauen und Mütter, heute sind viele von ihnen berufstätig und haben Karrieren. In der Stadt haben Frauen mehr Möglichkeiten als auf dem Land, wo traditionelle Rollenbilder oft noch stärker verankert sind. Dennoch gibt es noch Herausforderungen: Frauen kämpfen immer noch für Gleichberechtigung und gegen Vorurteile. Besonders alleinerziehende Mütter haben es schwer. Meiner Meinung nach ist es wichtig, dass Frauen die gleichen Chancen wie Männer haben, sowohl im Beruf als auch in der Familie. Die Gesellschaft muss weiterhin für Gleichberechtigung kämpfen.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
