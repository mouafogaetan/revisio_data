<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Allemand",
 "classe": "Terminale A4",
 "sequence": "Séquence 5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1: Leseverstehen (Compréhension écrite)",
     "points": "6 pts",
     "enonce": "<p><strong>Dokument 1:</strong> Lesen Sie den folgenden Text und beantworten Sie die Fragen.</p><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border-left: 5px solid #4682b4; color: #000;'><h3 style='margin-top: 0;'>Die Rolle der Frau: Ein Wandel zwischen Stadt und Land</h3><p>Früher war die Rolle der Frau in vielen Gesellschaften klar definiert: Sie war die Hausfrau und Mutter, die sich um den Haushalt und die Kinder kümmerte. Heutzutage hat sich dieses Bild jedoch stark gewandelt. In Großstädten sind Frauen oft berufstätig und verfolgen eigene Karrieren. Sie sind nicht mehr nur auf die Rolle der Ehefrau beschränkt. Im Gegensatz dazu bleiben in ländlichen Gebieten viele traditionelle Vorstellungen bestehen. Während die Gleichberechtigung in der Stadt selbstverständlicher ist, sind Frauen auf dem Land häufiger mit Vorurteilen konfrontiert. Eine alleinerziehende Mutter hat es zum Beispiel in einem Dorf oft schwerer als in einer Großstadt, wo es mehr Unterstützungsangebote gibt.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1.1</strong> Welche Rolle hatte die Frau <strong>früher</strong> laut dem Text? (1 pt)</p>",
         "reponse": "<p>Früher war die Rolle der Frau laut dem Text klar definiert: Sie war die <strong>Hausfrau und Mutter</strong>, die sich um den Haushalt und die Kinder kümmerte.</p>"
       },
       {
         "question": "<p><strong>1.2</strong> Wie hat sich die Rolle der Frau in <strong>Großstädten</strong> verändert? (1 pt)</p>",
         "reponse": "<p>In Großstädten sind Frauen heute oft <strong>berufstätig</strong> und verfolgen eigene <strong>Karrieren</strong>. Sie sind nicht mehr nur auf die Rolle der Ehefrau beschränkt.</p>"
       },
       {
         "question": "<p><strong>1.3</strong> Was ist ein großer Unterschied zwischen der Stadt und dem Dorf in Bezug auf die Frauenrolle? (2 pts)</p>",
         "reponse": "<p>Der große Unterschied ist, dass <strong>Gleichberechtigung</strong> in der Stadt selbstverständlicher ist, während Frauen auf dem Land häufiger mit <strong>Vorurteilen</strong> konfrontiert sind und es weniger Unterstützung gibt, zum Beispiel für alleinerziehende Mütter.</p>"
       },
       {
         "question": "<p><strong>1.4</strong> Finden Sie im Text ein Synonym für <strong>„heutzutage“</strong> und einen <strong>Komparativ</strong>. (2 pts)</p>",
         "reponse": "<p>- Ein Synonym für <strong>„heutzutage“</strong> ist <strong>„heute“</strong>.</p><p>- Ein Beispiel für einen <strong>Komparativ</strong> ist <strong>„schwerer“</strong>.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2: Grammatik und Wortschatz (Grammaire et vocabulaire)",
     "points": "6 pts",
     "enonce": "<p><strong>Kontext:</strong> Minderheiten und Integration sind wichtige Themen. Viele Menschen wurden in der Vergangenheit diskriminiert, aber heute gibt es mehr Toleranz. Nutzen Sie die richtigen grammatikalischen Strukturen.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1</strong> Setzen Sie das <strong>Passiv (Präsens oder Präteritum)</strong> ein: <br>Heute <u> </u> (die Minderheiten, integrieren) viel besser als früher. Früher <u> </u> (sie, ausgrenzen) oft. (2 pts)</p>",
         "reponse": "<p>Heute <strong>werden die Minderheiten integriert</strong> viel besser als früher. Früher <strong>wurden sie ausgegrenzt</strong>.</p>"
       },
       {
         "question": "<p><strong>2.2</strong> Formen Sie den Satz in die <strong>indirekte Rede</strong> (Konjunktiv I) um: <br>Die Aktivistin sagt: „Die Diskriminierung wird bekämpft.“<br><u> </u> (1 pt)</p>",
         "reponse": "<p>Die Aktivistin sagt, die Diskriminierung <strong>werde bekämpft</strong>.</p>"
       },
       {
         "question": "<p><strong>2.3</strong> Deklinieren Sie die Adjektive in den folgenden Sätzen: <br>Die <u> </u> (ethnisch) Minderheiten kämpfen für <u> </u> (kulturell) Vielfalt. (2 pts)</p>",
         "reponse": "<p>Die <strong>ethnischen</strong> Minderheiten kämpfen für <strong>kulturelle</strong> Vielfalt.</p>"
       },
       {
         "question": "<p><strong>2.4</strong> Bilden Sie einen Satz mit dem <strong>Relativpronomen</strong>: <br>Die Minderheit. Ihre Rechte werden verletzt. <br><u> </u> (1 pt)</p>",
         "reponse": "<p>Die Minderheit, <strong>deren</strong> Rechte verletzt werden, protestiert.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3: Mediation (Médiation)",
     "points": "4 pts",
     "enonce": "<p><strong>Situation:</strong> Ihre französische Freundin Claire interessiert sich für das Thema „Integration und kulturelle Identität“. Sie erzählt Ihnen: <em>„Je me demande comment les immigrés vivent leur intégration en Allemagne. Est-ce qu'ils perdent leur identité ?“</em></p>",
     "questions": [
       {
         "question": "<p><strong>3.1</strong> Fassen Sie die wichtigsten Ideen aus Ihrem Unterricht über die Herausforderungen der Integration und die Bewahrung der kulturellen Identität für Claire auf Deutsch zusammen. Schreiben Sie einen kurzen Text (ca. 60 Wörter). Nutzen Sie den Wortschatz: <em>sich anpassen, die Herkunft, die Tradition, die Werte, die Sprachkenntnisse</em>.</p>",
         "reponse": "<p>Die Integration ist eine große Herausforderung. Einwanderer müssen sich an eine neue Kultur anpassen und oft neue Sprachkenntnisse erwerben, um am Arbeitsmarkt teilzunehmen. Gleichzeitig ist es wichtig, die eigene Herkunft nicht zu vergessen und Traditionen und Werte zu bewahren. Es ist ein Balanceakt, sich zu integrieren, ohne die eigene kulturelle Identität zu verlieren.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4: Schriftlicher Ausdruck (Production écrite)",
     "points": "4 pts",
     "enonce": "<p>Wählen Sie <strong>eines</strong> der folgenden Themen und schreiben Sie einen zusammenhängenden Text von etwa 150 Wörtern.</p>",
     "questions": [
       {
         "question": "<p><strong>Thema A:</strong> Die Rolle der Frau hat sich in den letzten Jahrzehnten stark verändert. Beschreiben Sie diese Entwicklung in Ihrer Gesellschaft und geben Sie Ihre Meinung zu den aktuellen Herausforderungen (z.B. Witwenriten, Erbschaft) ab.</p>",
         "reponse": "<p>Die Rolle der Frau hat sich in den letzten Jahrzehnten zweifellos verändert. Früher war die Frau hauptsächlich für den Haushalt und die Kindererziehung zuständig. Heute sind viele Frauen berufstätig und unabhängig. Trotzdem gibt es noch viele Herausforderungen. In manchen Traditionen, zum Beispiel bei Witwenriten, werden Frauen ungerecht behandelt. Sie dürfen oft nicht erben oder müssen demütigende Zeremonien durchstehen. Ich finde, man sollte diese Traditionen hinterfragen, weil sie die Gleichberechtigung verhindern. Die Gesellschaft muss dafür sorgen, dass Frauen dieselben Rechte haben wie Männer. Nur so können wir eine gerechtere Welt schaffen.</p>"
       },
       {
         "question": "<p><strong>Thema B:</strong> Integration ist ein wichtiges Thema in unserer globalisierten Welt. Diskutieren Sie die Vor- und Nachteile der Integration für die Gesellschaft und die Einwanderer.</p>",
         "reponse": "<p>Integration ist ein Prozess, der sowohl Chancen als auch Risiken birgt. Für die Gesellschaft ist die Integration von Einwanderern eine Bereicherung, weil sie neue Kulturen und Ideen mitbringen. Die Vielfalt kann zu Innovation und Toleranz führen. Für die Einwanderer selbst bietet die Integration die Möglichkeit, ein besseres Leben zu führen und am gesellschaftlichen Leben teilzunehmen. Allerdings gibt es auch Nachteile. Die Einwanderer müssen ihre Heimat und oft auch ihre Traditionen hinter sich lassen. Sie können unter Heimweh und Identitätskrisen leiden. Auch die Gesellschaft muss sich anpassen, was manchmal zu Konflikten führt. Insgesamt finde ich, dass die Integration eine große Chance für alle ist, wenn sie gelingt.</p>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
