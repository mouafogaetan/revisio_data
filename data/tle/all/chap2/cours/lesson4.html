<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Integration und kulturelle Identität",
    "contenu": "<div style='font-size: 18px; line-height: 1.8; color: #2c3e50; text-align: center; padding: 10px;'><h2 style='color: #1a5276;'>🤝 Integration und kulturelle Identität</h2><p style='font-size: 20px; margin-top: 20px;'>Intégration et identité culturelle</p><p style='font-size: 16px; margin-top: 15px; color: #5d6d7e;'>Classe de Terminale - Allemand</p><p style='font-size: 14px; margin-top: 10px; color: #7f8c8d;'>Leçon 4</p></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons aborder un sujet complexe et important : l'intégration et l'identité culturelle. Cette leçon s'intitule 'Integration und kulturelle Identität'. Nous allons identifier les facteurs qui favorisent ou entravent l'intégration, discuter des défis liés à la préservation de l'identité culturelle dans un nouveau pays, et étudier les structures grammaticales comme les verbes modaux, les conjonctions causales et les prépositions. Préparez-vous à des discussions approfondies et à des réflexions sur la société moderne.",
    "note": "Bienvenue dans la leçon sur l'intégration et l'identité culturelle !"
  },
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 12px; background-color: #eaf2f8; padding: 10px; border-radius: 8px;'>🔍 <strong>Identifier</strong> les facteurs qui favorisent ou entravent l'intégration</li><li style='margin-bottom: 12px; background-color: #eaf2f8; padding: 10px; border-radius: 8px;'>🗣️ <strong>Discuter</strong> des défis liés à la préservation de l'identité culturelle</li><li style='margin-bottom: 12px; background-color: #eaf2f8; padding: 10px; border-radius: 8px;'>📚 <strong>Maîtriser</strong> les verbes modaux, les conjonctions causales et les prépositions</li></ul></div>",
    "texteParle": "Dans cette leçon, nous avons trois objectifs principaux. Premièrement, nous allons identifier les facteurs qui favorisent ou, au contraire, entravent l'intégration des personnes issues de l'immigration. Deuxièmement, nous allons discuter des défis liés à la préservation de sa propre identité culturelle lorsqu'on vit dans un nouveau pays. Troisièmement, nous allons consolider nos connaissances grammaticales avec les verbes modaux, les conjonctions causales comme 'weil' et 'da', et les prépositions. Ces compétences vous aideront à exprimer des opinions complexes sur des sujets de société.",
    "note": "Trois objectifs pour cette leçon sur l'intégration"
  },
  {
    "titre": "Was ist Integration?",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Definition :</strong></p><p><strong>Integration</strong> ist der Prozess, bei dem Menschen mit unterschiedlichen kulturellen Hintergründen gleichberechtigt am gesellschaftlichen Leben teilnehmen können.</p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Dimensionen der Integration :</strong></p><p>• <strong>strukturelle Integration</strong> - Zugang zu Bildung, Arbeit, Wohnung</p><p>• <strong>kulturelle Integration</strong> - Aneignung von Sprache, Werten, Normen</p><p>• <strong>soziale Integration</strong> - Kontakte zu Einheimischen, Freundschaften</p><p>• <strong>identifikative Integration</strong> - Zugehörigkeitsgefühl zur neuen Gesellschaft</p></div>",
    "texteParle": "Commençons par définir ce qu'est l'intégration. L'intégration est le processus par lequel des personnes d'origines culturelles différentes peuvent participer sur un pied d'égalité à la vie de la société. Elle comporte plusieurs dimensions : l'intégration structurelle, qui concerne l'accès à l'éducation, à l'emploi et au logement ; l'intégration culturelle, qui implique l'apprentissage de la langue, des valeurs et des normes de la société d'accueil ; l'intégration sociale, qui concerne les contacts et les amitiés avec les habitants du pays ; et l'intégration identitaire, qui est le sentiment d'appartenance à la nouvelle société. Ces dimensions sont toutes importantes.",
    "note": "Définition et dimensions de l'intégration"
  },
  {
    "titre": "Faktoren, die Integration fördern",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Fördernde Faktoren :</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p>• <strong>Sprachkenntnisse</strong> - Deutsch lernen erleichtert die Kommunikation</p><p>• <strong>Bildung</strong> - guter Schulabschluss und Ausbildung</p><p>• <strong>Arbeit</strong> - ein Job gibt finanzielle Unabhängigkeit</p><p>• <strong>soziale Kontakte</strong> - Freundschaften mit Deutschen</p><p>• <strong>interkulturelle Kompetenz</strong> - Verständnis für andere Kulturen</p><p>• <strong>politische Teilhabe</strong> - Wahlrecht und politisches Engagement</p><p>• <strong>offene Gesellschaft</strong> - Toleranz und Akzeptanz der Mehrheit</p></div>",
    "texteParle": "Plusieurs facteurs peuvent favoriser l'intégration. Les compétences linguistiques sont essentielles : apprendre l'allemand facilite la communication et la vie quotidienne. L'éducation est également importante : un bon diplôme ouvre des portes sur le marché du travail. Le travail est un facteur clé, car il donne une indépendance financière et permet de participer à la société. Les contacts sociaux, comme les amitiés avec les Allemands, facilitent l'intégration. La compétence interculturelle, c'est-à-dire la capacité à comprendre d'autres cultures, est également utile. La participation politique, comme le droit de vote, permet d'influencer les décisions de la société. Enfin, une société ouverte, tolérante et accueillante favorise l'intégration.",
    "note": "Facteurs favorisant l'intégration"
  },
  {
    "titre": "Faktoren, die Integration behindern",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #fdedec; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #e74c3c;'><p><strong>Hindernde Faktoren :</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p>• <strong>Sprachbarrieren</strong> - mangelnde Deutschkenntnisse</p><p>• <strong>Diskriminierung</strong> - Rassismus und Vorurteile</p><p>• <strong>fehlende Anerkennung</strong> - ausländische Abschlüsse werden nicht anerkannt</p><p>• <strong>Isolation</strong> - Leben in abgeschotteten Communities</p><p>• <strong>kulturelle Unterschiede</strong> - Wertekonflikte</p><p>• <strong>fehlende Unterstützung</strong> - keine Integrationskurse oder Beratung</p><p>• <strong>rechtliche Hindernisse</strong> - schwierige Einwanderungsgesetze</p></div>",
    "texteParle": "Malheureusement, certains facteurs entravent l'intégration. Les barrières linguistiques sont un obstacle majeur : sans une maîtrise suffisante de la langue, la communication et la vie quotidienne sont difficiles. La discrimination, le racisme et les préjugés de la part de la population majoritaire constituent un autre obstacle. Le manque de reconnaissance des diplômes étrangers empêche souvent les immigrants d'exercer leur profession. L'isolement, c'est-à-dire le fait de vivre dans des communautés fermées, limite les contacts avec la société d'accueil. Les différences culturelles peuvent créer des conflits de valeurs. L'absence de soutien, comme des cours d'intégration ou des conseils, rend également la situation difficile. Enfin, les obstacles juridiques, comme des lois d'immigration restrictives, compliquent l'intégration.",
    "note": "Facteurs entravant l'intégration"
  },
  {
    "titre": "Was ist kulturelle Identität?",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Definition :</strong></p><p><strong>Kulturelle Identität</strong> ist das Gefühl der Zugehörigkeit zu einer bestimmten Kultur oder ethischen Gruppe.</p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Elemente der kulturellen Identität :</strong></p><p>• <strong>Sprache</strong> - die Muttersprache und Dialekte</p><p>• <strong>Traditionen</strong> - Feste, Bräuche, Feiern</p><p>• <strong>Werte</strong> - Vorstellungen von Gut und Böse, richtig und falsch</p><p>• <strong>Religion</strong> - der Glaube und die religiösen Praktiken</p><p>• <strong>Essen und Trinken</strong> - die nationale Küche</p><p>• <strong>Kunst und Musik</strong> - Ausdrucksformen der Kultur</p></div>",
    "texteParle": "Passons maintenant à la notion d'identité culturelle. L'identité culturelle est le sentiment d'appartenance à une culture ou à un groupe ethnique spécifique. Elle est composée de plusieurs éléments : la langue, qui est la langue maternelle et les dialectes ; les traditions, comme les fêtes et les coutumes ; les valeurs, c'est-à-dire les conceptions du bien et du mal ; la religion, avec les croyances et les pratiques religieuses ; l'alimentation, avec la cuisine nationale ; et l'art et la musique, qui sont des formes d'expression culturelles. L'identité culturelle est un aspect fondamental de notre personnalité.",
    "note": "Définition et éléments de l'identité culturelle"
  },
  {
    "titre": "Herausforderungen der kulturellen Identität",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Herausforderungen :</strong></p></div><div style='background-color: #fdedec; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c;'><p>• <strong>Identitätskonflikte</strong> - zwischen zwei Kulturen stehen</p><p>• <strong>Zugehörigkeitsgefühle</strong> - sich nirgendwo wirklich zuhause fühlen</p><p>• <strong>Sprachverlust</strong> - die Muttersprache vergessen</p><p>• <strong>Kulturschock</strong> - Unterschiede zwischen alter und neuer Kultur</p><p>• <strong>Generationenkonflikte</strong> - unterschiedliche Werte in der Familie</p><p>• <strong>Diskriminierung</strong> - Ablehnung wegen der Herkunft</p></div>",
    "texteParle": "La préservation de l'identité culturelle dans un nouveau pays comporte des défis. Les conflits d'identité sont fréquents : on se retrouve entre deux cultures, sans se sentir complètement chez soi dans l'une ou l'autre. Le sentiment d'appartenance peut être difficile : on peut ne se sentir vraiment chez soi nulle part. Il y a aussi le risque de perdre sa langue maternelle. Le choc culturel est un autre défi : les différences entre la culture d'origine et la culture d'accueil peuvent être déstabilisantes. Les conflits de génération peuvent apparaître lorsque les parents et les enfants ont des valeurs différentes. Enfin, la discrimination liée à l'origine reste un problème important.",
    "note": "Défis de la préservation de l'identité culturelle"
  },
  {
    "titre": "Integration und Identität - Ein Balanceakt",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Integration ≠ Aufgabe der eigenen Identität</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Möglichkeiten :</strong></p><p>• <strong>Anpassung ohne Aufgabe</strong> - neue Sprache und Werte lernen, aber die eigene Kultur bewahren</p><p>• <strong>Hybrididentität</strong> - beide Kulturen verbinden und eine neue Identität schaffen</p><p>• <strong>Interkulturalität</strong> - zwischen verschiedenen Kulturen vermitteln</p><p>• <strong>Dialog der Kulturen</strong> - Austausch und Verständnis fördern</p></div><p style='margin-top: 10px; color: #7f8c8d; font-size: 14px;'>📝 <strong>Wichtig :</strong> Integration bedeutet nicht, die eigene Identität aufzugeben, sondern sie in eine neue Gesellschaft einzubringen.</p></div>",
    "texteParle": "Il est important de comprendre que l'intégration ne signifie pas renoncer à sa propre identité culturelle. L'intégration est un équilibre délicat. On peut s'adapter à la nouvelle société sans abandonner sa culture d'origine : apprendre une nouvelle langue et de nouvelles valeurs, mais continuer à pratiquer ses propres traditions. Une identité hybride est possible, c'est-à-dire combiner les deux cultures pour créer une nouvelle identité unique. L'interculturalité consiste à servir de pont entre les différentes cultures, en favorisant les échanges et la compréhension mutuelle. Le dialogue des cultures est essentiel pour promouvoir la tolérance. L'intégration, c'est apporter sa propre identité à la nouvelle société, pas la laisser derrière soi.",
    "note": "L'intégration n'est pas l'abandon de l'identité"
  },
  {
    "titre": "Grammatik: Modalverben",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Modalverben - Bedeutung :</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p>• <strong>müssen</strong> - obligation (devoir)</p><p>• <strong>sollen</strong> - obligation morale, devoir (devoir)</p><p>• <strong>können</strong> - possibilité, capacité (pouvoir)</p><p>• <strong>dürfen</strong> - permission, autorisation (avoir le droit)</p><p>• <strong>wollen</strong> - volonté, désir (vouloir)</p><p>• <strong>mögen</strong> - aimer, apprécier</p></div><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Beispiele :</strong></p><p>• <em>Migranten <strong>müssen</strong> die Sprache lernen.</em> (Ils doivent apprendre la langue.)</p><p>• <em>Integration <strong>soll</strong> gefördert werden.</em> (L'intégration doit être encouragée.)</p><p>• <em>Man <strong>kann</strong> die eigene Identität bewahren.</em> (On peut préserver sa propre identité.)</p></div>",
    "texteParle": "Les verbes modaux sont très utiles pour parler d'intégration. 'Müssen' exprime une obligation, comme dans 'Migranten müssen die Sprache lernen' - Les migrants doivent apprendre la langue. 'Sollen' exprime une obligation morale, comme dans 'Integration soll gefördert werden' - L'intégration doit être encouragée. 'Können' exprime une possibilité ou une capacité, comme dans 'Man kann die eigene Identität bewahren' - On peut préserver sa propre identité. 'Dürfen' exprime une permission, comme dans 'Sie dürfen hier leben' - Ils ont le droit de vivre ici. 'Wollen' exprime un désir et 'mögen' exprime qu'on aime quelque chose. Ces verbes sont essentiels pour exprimer des nuances.",
    "note": "Modalverben : müssen, sollen, können, dürfen, wollen, mögen"
  },
  {
    "titre": "Grammatik: Kausale Konjunktionen",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Kausale Konjunktionen (cause) :</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p>• <strong>weil</strong> - parce que (Nebensatz, verbe à la fin)</p><p>• <strong>da</strong> - puisque, parce que (Nebensatz, verbe à la fin)</p><p>• <strong>denn</strong> - car (Hauptsatz, verbe en 2ème position)</p></div><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Beispiele :</strong></p><p>• <em>Viele Migranten haben Schwierigkeiten, <strong>weil</strong> sie die Sprache nicht gut sprechen.</em></p><p>• <em><strong>Da</strong> die Integration wichtig ist, gibt es viele Kurse.</em></p><p>• <em>Die Identität ist wichtig, <strong>denn</strong> sie gibt Halt.</em></p></div>",
    "texteParle": "Les conjonctions causales expriment la cause. 'Weil' signifie 'parce que' et introduit une proposition subordonnée où le verbe est à la fin. Par exemple, 'Viele Migranten haben Schwierigkeiten, weil sie die Sprache nicht gut sprechen' - Beaucoup de migrants ont des difficultés parce qu'ils ne parlent pas bien la langue. 'Da' signifie 'puisque' ou 'parce que' et introduit aussi une proposition subordonnée. 'Da die Integration wichtig ist, gibt es viele Kurse' - Puisque l'intégration est importante, il y a beaucoup de cours. 'Denn' signifie 'car' et introduit une proposition principale où le verbe est en deuxième position. 'Die Identität ist wichtig, denn sie gibt Halt' - L'identité est importante, car elle donne des repères.",
    "note": "weil, da, denn - les conjonctions causales"
  },
  {
    "titre": "Grammatik: Präpositionen",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Präpositionen mit Dativ :</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p>• <strong>mit</strong> - avec <em>(mit der Kultur)</em></p><p>• <strong>ohne</strong> - sans <em>(ohne Identität)</em></p><p>• <strong>von</strong> - de <em>(von der Heimat)</em></p><p>• <strong>bei</strong> - chez, auprès de <em>(bei den Deutschen)</em></p></div><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Präpositionen mit Akkusativ :</strong></p><p>• <strong>für</strong> - pour <em>(für die Integration)</em></p><p>• <strong>gegen</strong> - contre <em>(gegen Diskriminierung)</em></p><p>• <strong>ohne</strong> - sans <em>(ohne Arbeit)</em></p></div><p style='margin-top: 10px; color: #7f8c8d; font-size: 14px;'>📝 Attention : Certaines prépositions sont suivies du datif, d'autres de l'accusatif.</p></div>",
    "texteParle": "Les prépositions sont importantes pour structurer les phrases. Avec le datif, on utilise 'mit' pour 'avec', comme dans 'mit der Kultur' - avec la culture ; 'von' pour 'de', comme dans 'von der Heimat' - du pays d'origine ; 'bei' pour 'chez', comme dans 'bei den Deutschen' - chez les Allemands. Avec l'accusatif, on utilise 'für' pour 'pour', comme dans 'für die Integration' - pour l'intégration ; 'gegen' pour 'contre', comme dans 'gegen Diskriminierung' - contre la discrimination. 'Ohne' peut être utilisé avec les deux cas. Il est important de connaître les prépositions et les cas qu'elles régissent.",
    "note": "Präpositionen mit Dativ et Akkusativ"
  },
  {
    "titre": "Récapitulatif",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Ce que nous avons appris :</strong></p><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 8px;'>✅ <strong>Integration</strong> - Prozess der Teilhabe am gesellschaftlichen Leben</li><li style='margin-bottom: 8px;'>✅ <strong>Faktoren</strong> - fördernd (Sprache, Bildung, Arbeit) und hindernd (Diskriminierung, Isolation)</li><li style='margin-bottom: 8px;'>✅ <strong>Kulturelle Identität</strong> - Sprache, Traditionen, Werte, Religion</li><li style='margin-bottom: 8px;'>✅ <strong>Herausforderungen</strong> - Identitätskonflikte, Zugehörigkeitsgefühle</li><li style='margin-bottom: 8px;'>✅ <strong>Modalverben</strong> - müssen, sollen, können, dürfen, wollen, mögen</li><li style='margin-bottom: 8px;'>✅ <strong>Kausale Konjunktionen</strong> - weil, da, denn</li><li style='margin-bottom: 8px;'>✅ <strong>Präpositionen</strong> - mit, ohne, von, für, gegen</li></ul></div><p style='margin-top: 15px; color: #7f8c8d; font-size: 14px;'>🌟 <strong>À retenir :</strong> Integration bedeutet nicht, die eigene Identität aufzugeben, sondern sie in die neue Gesellschaft einzubringen. (L'intégration ne signifie pas renoncer à sa propre identité, mais l'apporter à la nouvelle société.)</p></div>",
    "texteParle": "Pour terminer, récapitulons ce que nous avons appris aujourd'hui. Nous avons défini l'intégration comme le processus de participation à la vie de la société. Nous avons identifié les facteurs qui favorisent l'intégration, comme la langue, l'éducation et le travail, et ceux qui l'entravent, comme la discrimination et l'isolement. Nous avons parlé de l'identité culturelle et de ses éléments : la langue, les traditions, les valeurs et la religion. Nous avons discuté des défis liés à la préservation de l'identité culturelle, comme les conflits d'identité et les sentiments d'appartenance. Nous avons revu les verbes modaux, les conjonctions causales et les prépositions. N'oubliez pas : l'intégration ne signifie pas abandonner sa propre identité, mais l'apporter à la nouvelle société.",
    "note": "Récapitulatif de la leçon sur l'intégration et l'identité culturelle"
  }
];

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
