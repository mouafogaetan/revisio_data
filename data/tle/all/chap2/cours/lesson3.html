<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Minderheiten in deutschsprachigen Ländern",
    "contenu": "<div style='font-size: 18px; line-height: 1.8; color: #2c3e50; text-align: center; padding: 10px;'><h2 style='color: #1a5276;'>🌍 Minderheiten in deutschsprachigen Ländern</h2><p style='font-size: 20px; margin-top: 20px;'>Minorités dans les pays germanophones</p><p style='font-size: 16px; margin-top: 15px; color: #5d6d7e;'>Classe de Terminale - Allemand</p><p style='font-size: 14px; margin-top: 10px; color: #7f8c8d;'>Leçon 3</p></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons aborder un sujet important : les minorités dans les pays germanophones. Cette leçon s'intitule 'Minderheiten in deutschsprachigen Ländern', ce qui signifie 'Minorités dans les pays germanophones'. Nous allons analyser des articles sur la situation des minorités ethniques, culturelles et sexuelles, discuter des concepts d'intégration, de discrimination et de diversité, et étudier les structures grammaticales comme le passif, le discours indirect et la déclinaison des adjectifs.",
    "note": "Bienvenue dans la leçon sur les minorités dans les pays germanophones !"
  },
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 12px; background-color: #eaf2f8; padding: 10px; border-radius: 8px;'>📰 <strong>Analyser</strong> des articles sur la situation des minorités</li><li style='margin-bottom: 12px; background-color: #eaf2f8; padding: 10px; border-radius: 8px;'>🗣️ <strong>Discuter</strong> des concepts d'intégration, de discrimination et de diversité</li><li style='margin-bottom: 12px; background-color: #eaf2f8; padding: 10px; border-radius: 8px;'>📚 <strong>Maîtriser</strong> le passif, le discours indirect et la déclinaison des adjectifs</li></ul></div>",
    "texteParle": "Dans cette leçon, nous avons trois objectifs principaux. Premièrement, nous allons analyser des articles et des reportages sur la situation des minorités ethniques, culturelles et sexuelles dans les pays germanophones. Deuxièmement, nous allons discuter des concepts importants comme l'intégration, la discrimination et la diversité. Troisièmement, nous allons consolider nos connaissances grammaticales avec le passif, le discours indirect et la déclinaison des adjectifs. Ces compétences vous aideront à comprendre des textes complexes et à exprimer votre opinion sur des sujets de société.",
    "note": "Trois objectifs pour cette leçon sur les minorités"
  },
  {
    "titre": "Was ist eine Minderheit?",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Definition :</strong></p><p>Eine <strong>Minderheit</strong> ist eine Gruppe von Menschen, die sich in einem oder mehreren Merkmalen von der Mehrheitsbevölkerung unterscheidet.</p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Arten von Minderheiten :</strong></p><p>• <strong>ethnische Minderheiten</strong> - andere Herkunft, Sprache oder Kultur</p><p>• <strong>religiöse Minderheiten</strong> - andere Religion oder Weltanschauung</p><p>• <strong>sexuelle Minderheiten</strong> - andere sexuelle Orientierung oder Geschlechtsidentität</p><p>• <strong>Menschen mit Behinderung</strong> - körperliche oder geistige Einschränkungen</p></div><p style='margin-top: 10px; color: #7f8c8d; font-size: 14px;'>📝 <strong>Wortschatz :</strong> <em>die Minderheit</em> (la minorité), <em>die Mehrheit</em> (la majorité), <em>die Vielfalt</em> (la diversité).</p></div>",
    "texteParle": "Commençons par définir ce qu'est une minorité. Une minorité est un groupe de personnes qui se distinguent de la population majoritaire par une ou plusieurs caractéristiques. Il existe différents types de minorités : les minorités ethniques, qui ont une origine, une langue ou une culture différente ; les minorités religieuses, qui ont une religion ou une vision du monde différente ; les minorités sexuelles, qui ont une orientation sexuelle ou une identité de genre différente ; et les personnes handicapées, qui ont des limitations physiques ou mentales. Ces groupes sont souvent confrontés à des défis particuliers dans la société.",
    "note": "Définition et types de minorités"
  },
  {
    "titre": "Minderheiten in Deutschland",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Historische Minderheiten :</strong></p><p>• <strong>die Dänen</strong> - in Schleswig-Holstein</p><p>• <strong>die Sorben</strong> - in Brandenburg und Sachsen</p><p>• <strong>die Friesen</strong> - in Norddeutschland</p><p>• <strong>die Roma und Sinti</strong> - in ganz Deutschland</p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Moderne Minderheiten :</strong></p><p>• <strong>Menschen mit Migrationshintergrund</strong> - etwa 25% der Bevölkerung (2023)</p><p>• <strong>Größte Gruppen</strong> - Türken, Polen, Russen, Italiener, Griechen</p><p>• <strong>Muslime</strong> - etwa 5% der Bevölkerung</p></div>",
    "texteParle": "En Allemagne, il existe à la fois des minorités historiques et des minorités modernes. Parmi les minorités historiques, on trouve les Danois dans le Schleswig-Holstein, les Sorabes dans le Brandebourg et la Saxe, les Frisons dans le nord de l'Allemagne, et les Roms et Sintis présents dans toute l'Allemagne. Les minorités modernes sont principalement des personnes issues de l'immigration. Environ 25% de la population allemande a un parcours migratoire. Les plus grands groupes viennent de Turquie, de Pologne, de Russie, d'Italie et de Grèce. Les musulmans représentent environ 5% de la population.",
    "note": "Minorités historiques et modernes en Allemagne"
  },
  {
    "titre": "Diskriminierung und Ausgrenzung",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #fdedec; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #e74c3c;'><p><strong>Formen der Diskriminierung :</strong></p><p>• <strong>Rassismus</strong> - Diskriminierung aufgrund der Hautfarbe oder Herkunft</p><p>• <strong>Fremdenfeindlichkeit</strong> - Ablehnung von Fremden oder Ausländern</p><p>• <strong>Homophobie</strong> - Diskriminierung von LGBTQ+ Personen</p><p>• <strong>Antisemitismus</strong> - Diskriminierung von Jüdinnen und Juden</p><p>• <strong>Behindertenfeindlichkeit</strong> - Diskriminierung von Menschen mit Behinderung</p></div><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Folgen :</strong></p><p>• erschwerter Zugang zu Bildung und Arbeit</p><p>• soziale Ausgrenzung und Isolation</p><p>• psychische Probleme und geringeres Selbstwertgefühl</p><p>• wirtschaftliche Benachteiligung</p></div>",
    "texteParle": "Malheureusement, les minorités sont souvent confrontées à la discrimination et à l'exclusion. La discrimination peut prendre différentes formes : le racisme, qui est la discrimination basée sur la couleur de peau ou l'origine ; la xénophobie, qui est le rejet des étrangers ; l'homophobie, qui vise les personnes LGBTQ+ ; l'antisémitisme, qui cible les Juifs ; et le rejet des personnes handicapées. Les conséquences de cette discrimination sont graves : accès limité à l'éducation et à l'emploi, isolement social, problèmes psychologiques et désavantages économiques. Il est important de comprendre ces réalités pour lutter contre les préjugés.",
    "note": "Formes et conséquences de la discrimination"
  },
  {
    "titre": "Integration und Teilhabe",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Was bedeutet Integration?</strong></p><p><strong>Integration</strong> bedeutet, dass Menschen mit unterschiedlichen Hintergründen gleichberechtigt am gesellschaftlichen Leben teilnehmen können.</p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Faktoren, die Integration fördern :</strong></p><p>• <strong>Sprachkenntnisse</strong> - Deutsch lernen und sprechen</p><p>• <strong>Bildung</strong> - Zugang zu Schulen und Universitäten</p><p>• <strong>Arbeitsmarkt</strong> - Arbeit finden und Geld verdienen</p><p>• <strong>soziale Kontakte</strong> - Freundschaften mit Einheimischen</p><p>• <strong>politische Teilhabe</strong> - wählen gehen und mitgestalten</p></div>",
    "texteParle": "L'intégration est un concept clé. L'intégration signifie que les personnes d'origines différentes peuvent participer à la vie de la société sur un pied d'égalité. Plusieurs facteurs favorisent l'intégration : d'abord, la maîtrise de la langue allemande, qui est essentielle pour communiquer. Ensuite, l'accès à l'éducation, qui ouvre des perspectives. L'accès au marché du travail est également crucial pour gagner sa vie et être indépendant. Les contacts sociaux, comme les amitiés avec les habitants du pays, facilitent l'intégration. Enfin, la participation politique, comme le droit de vote, permet de contribuer aux décisions de la société.",
    "note": "Facteurs favorisant l'intégration"
  },
  {
    "titre": "Herausforderungen der Integration",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Herausforderungen :</strong></p><p>• <strong>Sprachbarrieren</strong> - Deutsch ist schwer zu lernen</p><p>• <strong>kulturelle Unterschiede</strong> - andere Werte und Traditionen</p><p>• <strong>Vorurteile</strong> - negative Stereotype gegenüber Ausländern</p><p>• <strong>Diskriminierung auf dem Arbeitsmarkt</strong> - gleiche Qualifikation, aber weniger Chancen</p><p>• <strong>Ghettoisierung</strong> - Isolation in bestimmten Stadtvierteln</p><p>• <strong>Identitätskonflikte</strong> - zwischen zwei Kulturen leben</p></div>",
    "texteParle": "L'intégration comporte également des défis. Les barrières linguistiques sont souvent le premier obstacle, car l'allemand est une langue difficile à apprendre pour certains. Les différences culturelles peuvent créer des incompréhensions. Les préjugés et les stéréotypes négatifs envers les étrangers persistent dans la société. La discrimination sur le marché du travail est également un problème : des personnes ayant les mêmes qualifications que les Allemands ont moins de chances d'être embauchées. La ghettoïsation, c'est-à-dire la concentration de populations immigrées dans certains quartiers, peut renforcer l'isolement. Enfin, les conflits d'identité, le fait de vivre entre deux cultures, peuvent être difficiles à gérer.",
    "note": "Les défis de l'intégration"
  },
  {
    "titre": "Grammatik: Das Passiv",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Bildung des Passivs :</strong></p><p><strong>werden + Partizip II</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Präsens Passiv :</strong></p><p>• <em>Minderheiten <strong>werden</strong> diskriminiert.</em></p><p>• <em>Die Integration <strong>wird</strong> gefördert.</em></p></div><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Präteritum Passiv :</strong></p><p>• <em>Minderheiten <strong>wurden</strong> ausgegrenzt.</em></p><p>• <em>Die Gesetze <strong>wurden</strong> geändert.</em></p></div><p style='margin-top: 10px; color: #7f8c8d; font-size: 14px;'>📝 Le passif met l'accent sur l'action plutôt que sur celui qui l'accomplit.</p></div>",
    "texteParle": "La grammaire du passif est très utile pour parler des minorités. On forme le passif avec le verbe 'werden' et le participe passé. Au présent, on utilise 'werden' conjugué : 'Minderheiten werden diskriminiert' signifie 'Les minorités sont discriminées'. 'Die Integration wird gefördert' signifie 'L'intégration est encouragée'. Au prétérit, on utilise 'wurden' : 'Minderheiten wurden ausgegrenzt' signifie 'Les minorités étaient exclues'. 'Die Gesetze wurden geändert' signifie 'Les lois ont été modifiées'. Le passif est très utile pour parler des actions subies par les minorités.",
    "note": "Passif : werden + Partizip II"
  },
  {
    "titre": "Grammatik: Indirekte Rede",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Indirekte Rede (Konjunktiv I) :</strong></p><p><strong>Sie sagt, dass sie diskriminiert wird.</strong></p><p>• <strong>sagen</strong> → <strong>er sagt, dass</strong></p><p>• <strong>meinen</strong> → <strong>er meint, dass</strong></p><p>• <strong>erklären</strong> → <strong>er erklärt, dass</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px;'><p><strong>Beispiele :</strong></p><p>• <em>Der Journalist sagt, dass die Minderheiten <strong>diskriminiert werden</strong>.</em></p><p>• <em>Die Politikerin erklärt, dass die Integration <strong>wichtig sei</strong>.</em></p><p>• <em>Der Bericht behauptet, dass die Situation <strong>sich verbessere</strong>.</em></p></div>",
    "texteParle": "Le discours indirect, ou le subjonctif I, est utilisé pour rapporter les paroles de quelqu'un. On l'utilise souvent dans les articles de presse. On dit 'Sie sagt, dass sie diskriminiert wird' pour rapporter qu'elle dit qu'elle est discriminée. Les verbes introducteurs sont 'sagen' (dire), 'meinen' (penser) et 'erklären' (expliquer). Par exemple, 'Der Journalist sagt, dass die Minderheiten diskriminiert werden' - Le journaliste dit que les minorités sont discriminées. 'Die Politikerin erklärt, dass die Integration wichtig sei' - La politicienne explique que l'intégration est importante. Le subjonctif I est la marque du style indirect.",
    "note": "Indirekte Rede : Konjunktiv I"
  },
  {
    "titre": "Grammatik: Adjektivdeklination",
    "contenu": "<div style='font-size: 16px; line-height: 2; color: #2c3e50; padding: 10px;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Adjektivdeklination - gemischte Deklination :</strong></p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 10px;'><p><strong>Nach unbestimmten Artikeln :</strong></p><p>• <em>eine <strong>ethnische</strong> Minderheit</em> (une minorité ethnique)</p><p>• <em>eine <strong>kulturelle</strong> Vielfalt</em> (une diversité culturelle)</p><p>• <em>ein <strong>sexuelles</strong> Orientierung</em> (une orientation sexuelle)</p></div><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px;'><p><strong>Nach bestimmten Artikeln :</strong></p><p>• <em>die <strong>ethnische</strong> Minderheit</em> (la minorité ethnique)</p><p>• <em>die <strong>kulturelle</strong> Vielfalt</em> (la diversité culturelle)</p><p>• <em>die <strong>sexuelle</strong> Orientierung</em> (l'orientation sexuelle)</p></div>",
    "texteParle": "La déclinaison des adjectifs est importante pour décrire les minorités. Avec l'article indéfini, on a 'eine ethnische Minderheit' - une minorité ethnique. 'Eine kulturelle Vielfalt' - une diversité culturelle. 'Ein sexuelles Orientierung' - une orientation sexuelle. Avec l'article défini, on a 'die ethnische Minderheit' - la minorité ethnique, 'die kulturelle Vielfalt' - la diversité culturelle, 'die sexuelle Orientierung' - l'orientation sexuelle. Les adjectifs s'accordent en genre, en nombre et en cas avec le nom qu'ils accompagnent.",
    "note": "Adjektivdeklination - accord des adjectifs"
  },
  {
    "titre": "Fallbeispiel: Muslime in Deutschland",

    "texteParle": "Prenons l'exemple des musulmans en Allemagne pour illustrer la situation des minorités. Il y a environ 5 millions de musulmans en Allemagne, ce qui représente environ 5% de la population. La plupart viennent de Turquie, mais aussi du Moyen-Orient et d'Afrique du Nord. Beaucoup de musulmans en Allemagne ont la nationalité allemande. Cependant, ils font face à des défis importants : la discrimination, car les musulmans sont souvent présentés négativement dans les médias ; le débat sur le voile, qui est très controversé ; et l'islamophobie, car beaucoup de musulmans subissent des attaques verbales ou physiques. Cet exemple montre les difficultés que peuvent rencontrer les minorités religieuses.",

    "texteParle": "Pour terminer, récapitulons ce que nous avons appris aujourd'hui. Nous avons défini ce qu'est une minorité et les différents types de minorités. Nous avons parlé de la discrimination et de ses différentes formes comme le racisme, l'homophobie et l'antisémitisme. Nous avons discuté de l'intégration et des facteurs qui la favorisent. Nous avons étudié le passif pour parler des actions subies par les minorités. Nous avons vu le discours indirect pour rapporter les paroles des journalistes et des politiciens. Et nous avons revu la déclinaison des adjectifs pour décrire les minorités. N'oubliez pas que l'intégration des minorités est une tâche importante pour toute société.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
