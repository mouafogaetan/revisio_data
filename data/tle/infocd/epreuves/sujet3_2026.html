<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info Tle CD",
  "classe": "Terminale",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Algorithmique et Structures de Données",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b;'>Cet exercice porte sur les structures de données et la recherche algorithmique.<br><br>L’enseignant d’informatique a stocké les notes des élèves de la classe dans une structure de données nommée <strong>Tab</strong> : [12 ; 7 ; 16 ; 8 ; 10 ; 14 ; 17] ;<br>Il a également défini une structure pour représenter un <strong>élève</strong> avec les informations suivantes : <strong>Nom</strong>, <strong>Âge</strong>, <strong>Numéro de classe</strong>, <strong>Genre</strong> ;<br></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>1)</strong> Identifier la nature (type) de la structure de données <strong>Tab</strong> et celle de la structure <strong>élève</strong>.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Tab</strong> est un tableau (vecteur) à une dimension.<br><strong>Élève</strong> est une structure (enregistrement) contenant des champs de types différents.</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>2)</strong> Donner la syntaxe de déclaration en langage C de la structure de données <strong>élève</strong>.</div>",
          "reponse": "<pre style='background: #0f172a; padding: 0.75rem; border-radius: 8px; color: #e2e8f0; overflow-x: auto; font-size: 0.9rem;'><code>struct eleve {\n    char nom[50];\n    int age;\n    int numeroClasse;\n    char genre[10];\n};</code></pre>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>3)</strong> Écrire un algorithme qui recherche séquentiellement la note minimale dans le tableau <strong>Tab</strong>.</div>",
          "reponse": "<pre style='background: #0f172a; padding: 0.75rem; border-radius: 8px; color: #e2e8f0; overflow-x: auto; font-size: 0.9rem;'><code>Algorithme rechercheMin\nVariables\n    Tab : tableau[1..7] d'entiers <- [12,7,16,8,10,14,17]\n    i, min : entiers\nDébut\n    min <- Tab[1]\n    Pour i de 2 à 7 Faire\n        Si Tab[i] < min Alors\n            min <- Tab[i]\n        FinSi\n    FinPour\n    Ecrire(\"La note minimale est : \", min)\nFin</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Exécution d'Algorithmes et Programmation en C",
      "points": "12 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b;'>Un paysan souhaite connaître le volume de son réservoir d’eau de forme cylindrique. Son fils, élève en Terminale, décide d’écrire un algorithme pour l’aider sachant que la formule du volume est \( V = \pi \\times r^{2} \\times h \).<br><br>L’algorithme suivant a été proposé :<br><pre style='background: #0f172a; padding: 0.75rem; border-radius: 8px; color: #e2e8f0; overflow-x: auto; font-size: 0.9rem;'>Algorithme volumeCylindre\nVariable ……………… : réel ;\nConstante ……………….. ;\nDébut\n    Ecrire(\"entrer le rayon de base :\") ;\n    Lire(ray) ;\n    Ecrire(\"entrer la hauteur du réservoir :\") ;\n    Lire(haut) ;\n    vol ← ray * ray * haut * pi ;\n    Ecrire(\"Le volume du réservoir est :\", vol) ;\nFin</pre></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>1)</strong> a. Donner le nom correct de cet algorithme.<br>b. Identifier les variables et constantes, puis compléter les lignes 2 et 3 de l’algorithme.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a.</strong> Le nom correct est <strong>volumeCylindre</strong> (ou VolumeCylindre) car il reflète le traitement effectué [citation:3].<br><strong>b.</strong> Ligne 2 : <strong>Variable ray, haut, vol : réel ;</strong><br>Ligne 3 : <strong>Constante pi <- 3.14159 ;</strong></div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>2)</strong> Dans cet algorithme, identifier une instruction d'entrée et une instruction d'affectation.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Instruction d'entrée :</strong> <code>Lire(ray)</code> [citation:3].<br><strong>Instruction d'affectation :</strong> <code>vol ← ray * ray * haut * pi</code>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>3)</strong> Donner le résultat final si <strong>ray = 10</strong> et <strong>haut = 25</strong> (avec \( \pi = 3.14 \)).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>vol = 10 * 10 * 25 * 3.14 = 7850</strong> [citation:3].</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>4)</strong> Justifier pourquoi le langage C est qualifié de langage compilé.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Le langage C est compilé car son code source est transformé en un fichier exécutable (code machine) par un compilateur avant son exécution, contrairement aux langages interprétés qui s'exécutent ligne par ligne [citation:3].</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>5)</strong> Traduire l’algorithme <code>volumeCylindre</code> en un programme en langage C.</div>",
          "reponse": "<pre style='background: #0f172a; padding: 0.75rem; border-radius: 8px; color: #e2e8f0; overflow-x: auto; font-size: 0.9rem;'><code>#include <stdio.h>\n#define PI 3.14159\n\nint main() {\n    float ray, haut, vol;\n    printf(\"entrer le rayon de base : \");\n    scanf(\"%f\", &ray);\n    printf(\"entrer la hauteur du réservoir : \");\n    scanf(\"%f\", &haut);\n    vol = ray * ray * haut * PI;\n    printf(\"Le volume du réservoir est : %.2f\\n\", vol);\n    return 0;\n}</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Système d'Information et Base de Données",
      "points": "8 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b;'>On souhaite gérer les commandes d’une boutique. Une table <strong>COMMANDE</strong> est définie avec les champs suivants : <br><strong>NumCOMM</strong> (entier, clé primaire), <strong>NumSIRET</strong> (entier, clé étrangère), <strong>NumPROD</strong> (entier, clé étrangère), <strong>QUANTITE</strong> (entier).<br></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>1)</strong> Écrire la requête SQL qui permet de <strong>créer</strong> cette table.</div>",
          "reponse": "<pre style='background: #0f172a; padding: 0.75rem; border-radius: 8px; color: #e2e8f0; overflow-x: auto; font-size: 0.9rem;'><code>CREATE TABLE COMMANDE (\n    NumCOMM INT PRIMARY KEY,\n    NumSIRET INT,\n    NumPROD INT,\n    QUANTITE INT\n);</code></pre>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>2)</strong> Écrire la requête SQL qui permet de <strong>supprimer</strong> le champ <strong>QUANTITE</strong> de cette table.</div>",
          "reponse": "<pre style='background: #0f172a; padding: 0.75rem; border-radius: 8px; color: #e2e8f0; overflow-x: auto; font-size: 0.9rem;'><code>ALTER TABLE COMMANDE DROP COLUMN QUANTITE;</code></pre>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>3)</strong> Expliquer ce que fait la requête suivante : <br><code>ALTER TABLE COMMANDE RENAME TO FACTURE;</code></div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Cette requête <strong>renomme</strong> la table <strong>COMMANDE</strong> en <strong>FACTURE</strong> [citation:7].</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>4)</strong> Donner la différence entre une <strong>clé primaire</strong> et une <strong>clé étrangère</strong>.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Une <strong>clé primaire</strong> identifie de manière unique chaque enregistrement dans une table. Une <strong>clé étrangère</strong> est un champ qui fait référence à la clé primaire d'une autre table, établissant une relation entre les tables.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Réseaux Informatiques",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b;'>Pour la configuration d’un réseau local au sein du lycée, l’administrateur réseau utilise des équipements spécifiques et des commandes de diagnostic.<br></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>1)</strong> Donner la définition d’un réseau informatique et citer deux types de réseaux selon leur étendue géographique.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Un réseau informatique est un ensemble d'ordinateurs et de périphériques interconnectés pour échanger des données et partager des ressources.<br><strong>Exemples :</strong> LAN (Local Area Network) et WAN (Wide Area Network) [citation:2].</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>2)</strong> Nommer deux équipements réseaux et préciser leur rôle.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Switch :</strong> Connecte plusieurs équipements au sein d'un même réseau local (LAN) en utilisant les adresses MAC.<br><strong>Routeur :</strong> Assure la liaison entre différents réseaux (par exemple, un réseau local et Internet) en utilisant les adresses IP [citation:2][citation:4].</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>3)</strong> Expliquer l’utilité de la commande <strong>ping</strong> dans le diagnostic d’un réseau.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La commande <strong>ping</strong> permet de tester la connectivité entre deux machines sur un réseau en envoyant des paquets ICMP et en mesurant le temps de réponse, ce qui permet de vérifier si une machine est accessible [citation:4].</div>"
        },
        {
          "question": "<div style='margin-bottom: 1rem;'><strong>4)</strong> Quelle est la différence entre une adresse IP <strong>statique</strong> et une adresse IP <strong>dynamique</strong> ?</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Une adresse IP <strong>statique</strong> est configurée manuellement et ne change pas. Une adresse IP <strong>dynamique</strong> est attribuée automatiquement par un serveur DHCP et peut changer à chaque connexion [citation:4].</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
