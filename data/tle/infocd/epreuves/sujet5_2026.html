<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Terminale CD",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Algorithmique et structures de contrôle (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>L'algorithmique est la base de la programmation. Elle permet de décrire des solutions aux problèmes sous forme d'étapes logiques.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis un <strong>algorithme</strong> et cite les trois parties principales qui le composent.</p>",
          "reponse": "<ul><li><strong>Algorithme :</strong> Une suite finie et ordonnée d'instructions qui permet de résoudre un problème donné.</li><li><strong>Parties :</strong> <strong>Déclaration</strong> (variables et constantes), <strong>Corps</strong> (instructions), <strong>Fin</strong>.</li></ul>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Une structure conditionnelle permet d'orienter le flux d'exécution. Écris la syntaxe algorithmique d'une structure <strong>SI...ALORS...SINON</strong> avec un exemple simple.</p>",
          "reponse": "<p><strong>Syntaxe :</strong></p><pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>Si condition Alors\n    instruction(s)\nSinon\n    instruction(s)\nFinsi</pre><p><strong>Exemple :</strong></p><pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>Si note >= 10 Alors\n    Ecrire(\"L'élève est admis\")\nSinon\n    Ecrire(\"L'élève est recalé\")\nFinsi</pre>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Écris un algorithme qui affiche les nombres pairs de 2 à 20 en utilisant une boucle <strong>POUR</strong>.</p>",
          "reponse": "<pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>Algorithme AfficherPairs\n    Variable i : entier\n    Début\n        Pour i de 2 à 20 pas = 2 faire\n            Ecrire(i)\n        FinPour\n    Fin</pre>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Explique la différence entre les boucles <strong>TANT QUE</strong> et <strong>RÉPÉTER...JUSQU'À</strong>.</p>",
          "reponse": "<ul><li><strong>TANT QUE :</strong> La condition est testée <strong>avant</strong> l'exécution du bloc. Si la condition est fausse, le bloc n'est pas exécuté.</li><li><strong>RÉPÉTER...JUSQU'À :</strong> La condition est testée <strong>après</strong> l'exécution du bloc. Le bloc est donc exécuté <strong>au moins une fois</strong>.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Tableaux et algorithmes de recherche (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #fff5e6; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Les tableaux permettent de stocker plusieurs valeurs de même type. La recherche séquentielle est un algorithme fondamental.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis un <strong>tableau à une dimension</strong> et donne la syntaxe de déclaration en algorithmique.</p>",
          "reponse": "<ul><li><strong>Tableau à une dimension :</strong> Une structure de données qui permet de stocker plusieurs valeurs de même type accessibles par un indice.</li><li><strong>Syntaxe algorithmique :</strong> <code>Variable: nomTableau : tableau [1..N] de type;</code></li></ul>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Écris un algorithme de <strong>recherche séquentielle</strong> d'un élément dans un tableau de 10 entiers. L'algorithme doit afficher la position de l'élément s'il est trouvé, ou un message d'absence.</p>",
          "reponse": "<pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>Algorithme RechercheSequentielle\n    Variables i, position : entiers\n    T : tableau [1..10] d'entiers\n    element : entier\n    trouve : booléen\n    Début\n        // Remplissage du tableau\n        Pour i de 1 à 10 faire\n            Ecrire(\"Saisir l'élément \", i)\n            Lire(T[i])\n        FinPour\n        Ecrire(\"Entrer l'élément à rechercher :\")\n        Lire(element)\n        trouve ← faux\n        position ← 0\n        Pour i de 1 à 10 faire\n            Si T[i] = element Alors\n                trouve ← vrai\n                position ← i\n            Finsi\n        FinPour\n        Si trouve = vrai Alors\n            Ecrire(\"L'élément se trouve à la position \", position)\n        Sinon\n            Ecrire(\"L'élément n'est pas dans le tableau\")\n        Finsi\n    Fin</pre>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Explique le principe du <strong>tri par sélection</strong> en quelques lignes.</p>",
          "reponse": "<p>Le <strong>tri par sélection</strong> consiste à :</p><ul><li>Chercher le <strong>plus petit élément</strong> du tableau.</li><li>Le placer en <strong>première position</strong> en l'échangeant avec l'élément actuel.</li><li>Répéter l'opération sur le <strong>reste du tableau</strong> (sous-tableau non trié).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Introduction au langage C (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='background: #f0fff0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Le langage C permet de traduire des algorithmes en programmes exécutables. Il est structuré et compilé.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite les quatre composants principaux d'un programme en langage C.</p>",
          "reponse": "<ul><li><strong>Bibliothèques :</strong> Inclusion des fichiers d'en-tête (<code>#include &lt;stdio.h&gt;</code>).</li><li><strong>Fonction main :</strong> Point d'entrée du programme (<code>int main() { ... }</code>).</li><li><strong>Déclarations :</strong> Variables et constantes utilisées.</li><li><strong>Instructions et retour :</strong> Corps du programme et <code>return 0;</code>.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Déclare les variables suivantes en C :</p><ul><li><strong>a) age</strong> un nombre entier</li><li><strong>b) moyenne</strong> un nombre décimal</li><li><strong>c) lettre</strong> un caractère</li></ul>",
          "reponse": "<ul><li><strong>int age;</strong></li><li><strong>float moyenne;</strong></li><li><strong>char lettre;</strong></li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> À quoi sert l'instruction <code>#include &lt;stdio.h&gt;</code> dans un programme C ?</p>",
          "reponse": "<p>L'instruction <code>#include &lt;stdio.h&gt;</code> permet d'inclure la <strong>bibliothèque standard d'entrée/sortie</strong>. Elle donne accès aux fonctions comme <code>printf()</code> (affichage) et <code>scanf()</code> (saisie).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Structures de contrôle en C (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #e6f2ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Les structures conditionnelles et les boucles sont traduites en C avec des syntaxes spécifiques.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Écris la syntaxe C d'une structure conditionnelle <strong>if...else</strong> pour vérifier si un nombre <strong>n</strong> est positif.</p>",
          "reponse": "<pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>if (n > 0) {\n    printf(\"Le nombre est positif\");\n} else {\n    printf(\"Le nombre est négatif ou nul\");\n}</pre>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Écris un programme C complet qui affiche les nombres de 1 à 10 en utilisant une boucle <strong>for</strong>.</p>",
          "reponse": "<pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>#include &lt;stdio.h&gt;\n\nint main() {\n    int i;\n    for (i = 1; i <= 10; i++) {\n        printf(\"%d\\n\", i);\n    }\n    return 0;\n}</pre>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Quelle est la différence entre une boucle <strong>while</strong> et une boucle <strong>do...while</strong> en C ?</p>",
          "reponse": "<ul><li><strong>while :</strong> Teste la condition <strong>avant</strong> d'exécuter le bloc.</li><li><strong>do...while :</strong> Exécute le bloc <strong>au moins une fois</strong>, puis teste la condition.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Modèles de données - MCD et MLD (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #f5f0e8; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>La modélisation des données est une étape clé dans la conception d'une base de données. Le MCD et le MLD en sont les deux principaux modèles.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis les termes suivants :</p><ul><li><strong>a) Entité</strong></li><li><strong>b) Association</strong></li></ul>",
          "reponse": "<ul><li><strong>Entité :</strong> Un objet ou concept du monde réel ayant des propriétés (ex: Client, Produit).</li><li><strong>Association :</strong> Un lien entre plusieurs entités (ex: un Client <strong>passe</strong> une Commande).</li></ul>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Explique les cardinalités suivantes dans une association : <strong>(0,1)</strong>, <strong>(1,1)</strong>, <strong>(0,n)</strong>, <strong>(1,n)</strong>.</p>",
          "reponse": "<ul><li><strong>(0,1) :</strong> L'entité peut être associée à 0 ou 1 entité (optionnel).</li><li><strong>(1,1) :</strong> L'entité est associée à exactement 1 entité (obligatoire).</li><li><strong>(0,n) :</strong> L'entité peut être associée à 0, 1 ou plusieurs entités (optionnel).</li><li><strong>(1,n) :</strong> L'entité est associée à au moins 1 entité (obligatoire).</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> À quoi sert le passage du MCD au MLD ?</p>",
          "reponse": "<p>Le passage du MCD (Modèle Conceptuel des Données) au MLD (Modèle Logique des Données) permet de <strong>transformer</strong> la modélisation conceptuelle en une <strong>structure de tables</strong> adaptée à un SGBD relationnel. On y définit les <strong>tables</strong>, les <strong>clés primaires</strong> et les <strong>clés étrangères</strong>.</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Établir la correspondance entre MCD et MLD. Associe chaque élément du MCD à son équivalent dans le MLD.</p>",
          "reponse": "<table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'><tr><th>MCD</th><th>MLD</th></tr><tr><td>Entité</td><td>Table</td></tr><tr><td>Propriété</td><td>Colonne (champ)</td></tr><tr><td>Occurrence d'entité</td><td>Enregistrement (ligne)</td></tr></table>"
        }
      ]
    },
    {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
