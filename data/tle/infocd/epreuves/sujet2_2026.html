<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info Tle CD",
  "classe": "Terminale",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Algorithmique et structures de contrôle",
      "points": "6 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>Un algorithme est une suite d'instructions permettant de résoudre un problème. Les structures de contrôle (conditionnelles et itératives) sont essentielles pour orienter le flux d'exécution.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Définis</em> un algorithme et <em>identifie</em> les trois parties principales qui le composent.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Un algorithme est une suite finie et ordonnée d'instructions non ambiguës qui permet de résoudre un problème. Il est composé de trois parties :</p><ul><li><strong>L'en-tête :</strong> donne le nom de l'algorithme.</li><li><strong>La partie déclarative :</strong> déclaration des variables et constantes.</li><li><strong>Le corps :</strong> contient les instructions (saisie, affectation, sortie, etc.).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Écris</em> un algorithme en LDA qui lit deux nombres A et B, puis affiche le plus grand des deux.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><pre style='background-color: #e2e8f0; padding: 10px; border-radius: 5px; overflow-x: auto;'>Algorithme Max\nVAR A, B : réel\nDEBUT\n  Écrire(\"Entrez le premier nombre : \")\n  Lire(A)\n  Écrire(\"Entrez le second nombre : \")\n  Lire(B)\n  SI (A > B) ALORS\n    Écrire(\"Le plus grand est : \", A)\n  SINON\n    Écrire(\"Le plus grand est : \", B)\n  FINSI\nFIN</pre></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Explique</em> la différence entre une boucle POUR et une boucle TANT QUE.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>La boucle <strong>POUR</strong> est utilisée lorsque le nombre d'itérations est connu à l'avance. Elle s'exécute un nombre défini de fois. La boucle <strong>TANT QUE</strong> est utilisée lorsque le nombre d'itérations dépend d'une condition ; elle s'exécute tant que la condition est vraie, et peut ne pas s'exécuter du tout si la condition est initialement fausse.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Tableaux et algorithmes de recherche",
      "points": "6 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>Les tableaux sont des structures de données permettant de stocker plusieurs valeurs du même type. La recherche séquentielle est une méthode simple pour trouver un élément dans un tableau.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Déclare</em> en algorithmique un tableau nommé \"notes\" contenant 20 valeurs de type réel.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><pre style='background-color: #e2e8f0; padding: 10px; border-radius: 5px; overflow-x: auto;'>VAR notes : tableau[1..20] de réel</pre></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p> (4 pts) <em>Écris</em> un algorithme qui :</p><ul><li>remplit un tableau T de 10 entiers.</li><li>recherche un élément X saisi par l'utilisateur dans le tableau T.</li><li>affiche \"trouvé\" si X est présent, sinon \"non trouvé\".</li></ul></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><pre style='background-color: #e2e8f0; padding: 10px; border-radius: 5px; overflow-x: auto;'>Algorithme Recherche\nVAR T : tableau[1..10] d'entier\n    i, X : entier\n    trouve : booléen\nDEBUT\n  // Saisie du tableau\n  POUR i DE 1 À 10 FAIRE\n    Écrire(\"Entrez T[\", i, \"] : \")\n    Lire(T[i])\n  FINPOUR\n  // Saisie de l'élément à rechercher\n  Écrire(\"Entrez l'élément à rechercher : \")\n  Lire(X)\n  // Recherche séquentielle\n  trouve ← FAUX\n  POUR i DE 1 À 10 FAIRE\n    SI (T[i] = X) ALORS\n      trouve ← VRAI\n    FINSI\n  FINPOUR\n  // Affichage du résultat\n  SI (trouve = VRAI) ALORS\n    Écrire(\"trouvé\")\n  SINON\n    Écrire(\"non trouvé\")\n  FINSI\nFIN</pre></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Modèles de données (MCD et MLD)",
      "points": "4 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>La modélisation des données est une étape clé dans la conception d'une base de données. Elle comprend le MCD (Modèle Conceptuel des Données) et le MLD (Modèle Logique des Données).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Définis</em> les notions suivantes : entité, association, cardinalité.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><ul><li><strong>Entité :</strong> un objet ou concept du monde réel pour lequel on souhaite stocker des informations (ex: ÉTUDIANT).</li><li><strong>Association :</strong> un lien entre deux ou plusieurs entités (ex: Inscrire entre ÉTUDIANT et COURS).</li><li><strong>Cardinalité :</strong> le nombre minimal et maximal de participations d'une entité à une association (ex: 1,1 ou 0,n).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Explique</em> comment on passe du MCD au MLD en précisant les règles de transformation.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Le passage du MCD au MLD se fait selon les règles suivantes :</p><ul><li>Chaque entité du MCD devient une table dans le MLD.</li><li>Chaque propriété d'une entité devient une colonne de la table.</li><li>Chaque table possède une clé primaire qui identifie de manière unique chaque enregistrement.</li><li>Les associations sont représentées par des clés étrangères : on ajoute dans la table la colonne correspondant à la clé primaire de l'autre table.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : SQL - Définition et manipulation des données",
      "points": "4 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>Le langage SQL permet de définir et de manipuler les données d'une base de données relationnelle. Il comporte deux catégories de commandes : DDL (Data Definition Language) et DML (Data Manipulation Language).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Écris</em> les requêtes SQL suivantes :</p><ul><li>Créer une table ÉTUDIANT avec les champs : id (entier, clé primaire), nom (chaîne de 50 caractères), date_naissance (date).</li></ul></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><pre style='background-color: #e2e8f0; padding: 10px; border-radius: 5px; overflow-x: auto;'>CREATE TABLE ETUDIANT (\n    id INT PRIMARY KEY,\n    nom VARCHAR(50),\n    date_naissance DATE\n);</pre></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p> (2 pts) <em>Écris</em> les requêtes SQL suivantes :</p><ul><li>Insérer un étudiant nommé \"Dupont\" né le 15/03/2000.</li><li>Modifier la date de naissance de l'étudiant d'id 1 en la mettant au 20/04/2000.</li></ul></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><pre style='background-color: #e2e8f0; padding: 10px; border-radius: 5px; overflow-x: auto;'>-- Insertion\nINSERT INTO ETUDIANT (id, nom, date_naissance)\nVALUES (1, 'Dupont', '2000-03-15');\n\n-- Modification\nUPDATE ETUDIANT\nSET date_naissance = '2000-04-20'\nWHERE id = 1;</pre></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
