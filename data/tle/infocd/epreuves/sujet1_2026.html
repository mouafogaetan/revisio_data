<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info Tle CD",
  "classe": "Terminale",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Algorithmique et Structures de contrôle (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur les généralités des algorithmes, les structures conditionnelles et itératives.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Définir un algorithme. Citer les trois types d'instructions que l'on peut trouver dans un algorithme et donner un exemple pour chacun.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Définition :</strong> Un algorithme est une suite finie et ordonnée d'instructions qui, lorsqu'elles sont exécutées, permettent de résoudre un problème donné.</p><p><strong>Types d'instructions :</strong></p><ul><li><strong>Saisie :</strong> Permet de lire une donnée fournie par l'utilisateur. <em>Exemple :</em> <code>Lire(n)</code></li><li><strong>Affectation :</strong> Permet de stocker une valeur dans une variable. <em>Exemple :</em> <code>somme = a + b</code></li><li><strong>Sortie :</strong> Permet d'afficher un résultat. <em>Exemple :</em> <code>Afficher(\"Le résultat est \", resultat)</code></li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (2 pts)</strong> On considère l'algorithme suivant :</p><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>Algorithme Calcul\n    Lire(a, b, c)\n    Si a > b Alors\n        Si a > c Alors\n            max = a\n        Sinon\n            max = c\n        Fin Si\n    Sinon\n        Si b > c Alors\n            max = b\n        Sinon\n            max = c\n        Fin Si\n    Fin Si\n    Afficher(\"Le maximum est : \", max)\nFin Algorithme</pre><p>a) Quel est le rôle de cet algorithme ?<br>b) Que donne cet algorithme pour les valeurs <em>a = 12, b = 7, c = 15</em> ? Justifier.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Rôle :</strong> Cet algorithme détermine le maximum parmi trois nombres <em>a</em>, <em>b</em> et <em>c</em> saisis par l'utilisateur.</p><p><strong>b) Résultat :</strong> Pour <em>a = 12, b = 7, c = 15</em> :</p><ul><li>La condition <em>a > b</em> est vraie (12 > 7).</li><li>On vérifie alors <em>a > c</em> (12 > 15) qui est fausse.</li><li>Donc <em>max = c = 15</em>.</li><li>L'algorithme affichera : <strong>\"Le maximum est : 15\"</strong>.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (2.5 pts)</strong> Écrire un algorithme en pseudo-code qui calcule et affiche la somme des entiers pairs compris entre 1 et un entier <em>N</em> saisi par l'utilisateur. Utiliser une boucle <strong>Pour</strong>.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>Algorithme SommePairs\n    Lire(N)\n    somme = 0\n    Pour i de 2 à N par pas de 2\n        somme = somme + i\n    Fin Pour\n    Afficher(\"La somme des entiers pairs est : \", somme)\nFin Algorithme</pre><p><strong>Explication :</strong> La boucle <code>Pour</code> commence à 2 et s'incrémente de 2 jusqu'à <em>N</em>, ce qui permet de ne parcourir que les nombres pairs.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Tableaux et Recherche (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur la manipulation des tableaux et la recherche séquentielle.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Déclarer un tableau de 10 entiers en pseudo-code. Initialiser les 5 premiers éléments à 0 et les 5 derniers à 1.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>Tableau T[1..10] d'Entiers\nPour i de 1 à 10\n    Si i <= 5 Alors\n        T[i] = 0\n    Sinon\n        T[i] = 1\n    Fin Si\nFin Pour</pre></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Écrire un algorithme de recherche séquentielle qui permet de déterminer si une valeur <em>X</em> se trouve dans un tableau <em>T</em> de <em>N</em> éléments. L'algorithme doit afficher l'indice de la première occurrence ou un message indiquant que la valeur n'est pas trouvée.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>Algorithme RechercheSeq\n    Lire(N)\n    Pour i de 1 à N\n        Lire(T[i])\n    Fin Pour\n    Lire(X)\n    i = 1\n    Tant que i <= N et T[i] != X\n        i = i + 1\n    Fin Tant que\n    Si i <= N Alors\n        Afficher(\"Valeur trouvée à l'indice \", i)\n    Sinon\n        Afficher(\"Valeur non trouvée\")\n    Fin Si\nFin Algorithme</pre></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Expliquer le principe du <strong>tri par sélection</strong>. Appliquer ce principe pour trier le tableau suivant par ordre croissant : <em>T = [8, 3, 6, 1, 4]</em> en décrivant les étapes.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Principe du tri par sélection :</strong> On parcourt le tableau et, à chaque itération, on recherche le plus petit élément dans la partie non triée du tableau. On l'échange avec le premier élément de cette partie non triée. On avance ensuite d'une position.</p><p><strong>Application :</strong></p><ul><li><strong>Étape 1 :</strong> Recherche du min dans [8,3,6,1,4] → min = 1 (indice 4). Échange avec 8 → [1,3,6,8,4]</li><li><strong>Étape 2 :</strong> Recherche du min dans [3,6,8,4] → min = 3 (indice 2). Échange avec lui-même → [1,3,6,8,4]</li><li><strong>Étape 3 :</strong> Recherche du min dans [6,8,4] → min = 4 (indice 5). Échange avec 6 → [1,3,4,8,6]</li><li><strong>Étape 4 :</strong> Recherche du min dans [8,6] → min = 6 (indice 5). Échange avec 8 → [1,3,4,6,8]</li></ul><p>Le tableau trié est donc : <strong>[1, 3, 4, 6, 8]</strong></p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Programmation en Langage C (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur les bases de la programmation en langage C.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Écrire la structure complète d'un programme en C qui demande deux nombres entiers à l'utilisateur, calcule leur somme et l'affiche.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>#include &lt;stdio.h&gt;\n#include &lt;stdlib.h&gt;\n\nint main() {\n    int a, b, somme;\n    \n    printf(\"Entrez le premier nombre : \");\n    scanf(\"%d\", &amp;a);\n    printf(\"Entrez le deuxième nombre : \");\n    scanf(\"%d\", &amp;b);\n    \n    somme = a + b;\n    printf(\"La somme de %d et %d est %d\\n\", a, b, somme);\n    \n    return 0;\n}</pre></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Traduire l'algorithme de l'Exercice 1 - Question 3 (calcul de la somme des pairs jusqu'à N) en programme C.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>#include &lt;stdio.h&gt;\n#include &lt;stdlib.h&gt;\n\nint main() {\n    int N, i, somme = 0;\n    \n    printf(\"Entrez un entier N : \");\n    scanf(\"%d\", &amp;N);\n    \n    for (i = 2; i &lt;= N; i = i + 2) {\n        somme = somme + i;\n    }\n    \n    printf(\"La somme des entiers pairs jusqu'à %d est %d\\n\", N, somme);\n    \n    return 0;\n}</pre></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (2 pts)</strong> Soit le programme C suivant :</p><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>#include &lt;stdio.h&gt;\n#include &lt;stdlib.h&gt;\n\nint main() {\n    int i, j;\n    for (i = 1; i &lt;= 3; i++) {\n        for (j = 1; j &lt;= i; j++) {\n            printf(\"%d \", j);\n        }\n        printf(\"\\n\");\n    }\n    return 0;\n}</pre><p>a) Qu'affiche ce programme ?<br>b) Réécrire ce programme en utilisant une boucle <code>while</code> à la place des boucles <code>for</code>.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Affichage :</strong></p><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>1 \n1 2 \n1 2 3</pre><p><strong>b) Version avec <code>while</code> :</strong></p><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>#include &lt;stdio.h&gt;\n#include &lt;stdlib.h&gt;\n\nint main() {\n    int i = 1, j;\n    while (i &lt;= 3) {\n        j = 1;\n        while (j &lt;= i) {\n            printf(\"%d \", j);\n            j++;\n        }\n        printf(\"\\n\");\n        i++;\n    }\n    return 0;\n}</pre></div>"
        }

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
