<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info Tle CD",
  "classe": "Terminale",
  "sequence": "Séquence 6 : Définition des données (DDL)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Syntaxe et types de données",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>langage de définition des données (DDL)</strong> permet de créer et de modifier la structure des bases de données. La commande <strong>CREATE TABLE</strong> est l'une des instructions fondamentales de ce langage.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Donne la <strong>syntaxe générale</strong> de la commande CREATE TABLE.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La syntaxe générale est : <code>CREATE TABLE nom_table (nom_colonne1 type_donnee1, nom_colonne2 type_donnee2, ...);</code></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (2 pts)</strong> Écris la <strong>commande SQL</strong> pour créer une table <strong>Etudiants</strong> avec les colonnes suivantes : <code>ID_Etudiant</code> (entier), <code>Nom</code> (chaîne de 50 caractères), <code>Prenom</code> (chaîne de 50 caractères), <code>Date_Naissance</code> (DATE) et <code>Moyenne</code> (décimal avec 2 chiffres après la virgule).</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>CREATE TABLE Etudiants (\n    ID_Etudiant INT,\n    Nom VARCHAR(50),\n    Prenom VARCHAR(50),\n    Date_Naissance DATE,\n    Moyenne DECIMAL(4,2)\n);</pre></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> Explique la <strong>différence</strong> entre les types <strong>CHAR</strong> et <strong>VARCHAR</strong> en SQL.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>CHAR</strong> stocke les chaînes avec une <strong>longueur fixe</strong>, ce qui signifie qu'il occupe toujours la même place en mémoire, même si la chaîne est plus courte. <strong>VARCHAR</strong> stocke les chaînes avec une <strong>longueur variable</strong>, n'occupant que l'espace nécessaire pour la chaîne stockée. Par exemple, CHAR(10) occupera toujours 10 caractères, tandis que VARCHAR(10) n'occupera que la longueur réelle de la chaîne.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Contraintes d'intégrité",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Les <strong>contraintes d'intégrité</strong> sont des règles qui garantissent la validité et la cohérence des données dans une base de données.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> À quoi sert une <strong>clé primaire</strong> (PRIMARY KEY) dans une table ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Une <strong>clé primaire</strong> garantit que chaque enregistrement est identifié de manière <strong>unique</strong> dans la table. Elle impose que les valeurs de la colonne soient <strong>uniques</strong> et <strong>non nulles</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Quelle est la différence entre les contraintes <strong>UNIQUE</strong> et <strong>PRIMARY KEY</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La contrainte <strong>UNIQUE</strong> garantit que toutes les valeurs d'une colonne sont uniques, mais elle autorise les valeurs <strong>NULL</strong>. La contrainte <strong>PRIMARY KEY</strong> garantit également l'unicité, mais elle <strong>interdit les valeurs NULL</strong> et une table ne peut avoir qu'une seule clé primaire.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> Écris la commande SQL pour créer une table <strong>Produits</strong> avec les colonnes suivantes et les contraintes indiquées :<br>- <code>ID_Produit</code> : entier, <strong>clé primaire</strong><br>- <code>Nom</code> : chaîne de 100 caractères, <strong>ne peut pas être NULL</strong><br>- <code>Prix</code> : décimal (8,2), <strong>doit être supérieur à 0</strong><br>- <code>Quantite</code> : entier, <strong>valeur par défaut</strong> 0</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>CREATE TABLE Produits (\n    ID_Produit INT PRIMARY KEY,\n    Nom VARCHAR(100) NOT NULL,\n    Prix DECIMAL(8,2) CHECK (Prix > 0),\n    Quantite INT DEFAULT 0\n);</pre></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (2 pts)</strong> Explique l'<strong>utilité</strong> d'une <strong>clé étrangère</strong> (FOREIGN KEY) et la notion d'<strong>intégrité référentielle</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Une <strong>clé étrangère</strong> est une colonne qui fait référence à la <strong>clé primaire</strong> d'une autre table. Elle permet d'établir une <strong>relation</strong> entre deux tables et garantit l'<strong>intégrité référentielle</strong>, c'est-à-dire qu'elle assure que chaque valeur de la clé étrangère correspond à une valeur existante dans la table référencée. Cela évite les incohérences, comme des commandes qui feraient référence à des clients inexistants.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Étude de cas",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Une entreprise souhaite créer une base de données pour gérer ses <strong>employés</strong> et les <strong>départements</strong> dans lesquels ils travaillent.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (2 pts)</strong> À partir du cahier des charges suivant, écris les <strong>commandes SQL</strong> pour créer les tables <strong>Departements</strong> et <strong>Employes</strong>.<br><br><strong>Table Departements :</strong><br>- <code>ID_Dept</code> : entier, clé primaire<br>- <code>Nom_Dept</code> : chaîne de 50 caractères, ne peut pas être NULL<br>- <code>Ville</code> : chaîne de 30 caractères<br><br><strong>Table Employes :</strong><br>- <code>ID_Employe</code> : entier, clé primaire<br>- <code>Nom</code> : chaîne de 50 caractères, ne peut pas être NULL<br>- <code>Prenom</code> : chaîne de 50 caractères<br>- <code>Salaire</code> : décimal (8,2)<br>- <code>ID_Dept</code> : entier, clé étrangère référençant la table Departements</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>CREATE TABLE Departements (\n    ID_Dept INT PRIMARY KEY,\n    Nom_Dept VARCHAR(50) NOT NULL,\n    Ville VARCHAR(30)\n);\n\nCREATE TABLE Employes (\n    ID_Employe INT PRIMARY KEY,\n    Nom VARCHAR(50) NOT NULL,\n    Prenom VARCHAR(50),\n    Salaire DECIMAL(8,2),\n    ID_Dept INT,\n    FOREIGN KEY (ID_Dept) REFERENCES Departements(ID_Dept)\n);</pre></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Explique le rôle de la clé étrangère <code>ID_Dept</code> dans la table <strong>Employes</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La colonne <code>ID_Dept</code> est une <strong>clé étrangère</strong> qui permet d'associer chaque employé à un <strong>département</strong>. Elle garantit qu'un employé ne peut être affecté qu'à un département existant dans la table <strong>Departements</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> Que se passe-t-il si on tente d'ajouter un employé avec un <code>ID_Dept</code> qui n'existe pas dans la table <strong>Departements</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La tentative d'ajout sera <strong>rejetée</strong> par le SGBD car la <strong>contrainte d'intégrité référentielle</strong> est violée. Le SGBD vérifie que la valeur de la clé étrangère existe bien dans la table référencée avant d'autoriser l'insertion.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Modification de la structure (ALTER TABLE)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La commande <strong>ALTER TABLE</strong> permet de modifier la structure d'une table existante.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Écris une requête SQL pour <strong>ajouter</strong> une colonne <code>Email</code> de type VARCHAR(100) à la table <strong>Employes</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>ALTER TABLE Employes ADD Email VARCHAR(100);</pre></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Écris une requête SQL pour <strong>modifier</strong> le type de la colonne <code>Salaire</code> pour qu'elle devienne DECIMAL(10,2) dans la table <strong>Employes</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>ALTER TABLE Employes MODIFY Salaire DECIMAL(10,2);</pre></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Écris une requête SQL pour <strong>supprimer</strong> la colonne <code>Ville</code> de la table <strong>Departements</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>ALTER TABLE Departements DROP COLUMN Ville;</pre></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> Quelles précautions faut-il prendre avant d'exécuter une commande <strong>ALTER TABLE</strong> qui supprime une colonne ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Avant de supprimer une colonne, il faut s'assurer que les <strong>données</strong> qu'elle contient ne sont <strong>plus nécessaires</strong>, car l'opération est <strong>définitive</strong> et entraîne la perte des données. Il est recommandé d'effectuer une <strong>sauvegarde</strong> de la base de données avant toute modification structurale.</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
