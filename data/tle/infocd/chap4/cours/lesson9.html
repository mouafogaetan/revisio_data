<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en Programmation C",
    "contenu": "<div style='text-align: center; padding: 20px; background: linear-gradient(135deg, #1a5276, #2e86c1); border-radius: 15px; color: white;'><h2 style='margin: 0; font-size: 1.8em;'>💻 Structures de Contrôle en C</h2><p style='font-size: 1.2em; margin-top: 10px;'>Leçon 9 : Instructions Conditionnelles</p><hr style='width: 50%; border-color: rgba(255,255,255,0.3);'><p style='font-size: 1em;'>Objectif : Traduire les structures conditionnelles algorithmiques en C (if, else if, else).</p><div style='background: #f39c12; padding: 8px 20px; border-radius: 30px; display: inline-block; margin-top: 5px; color: #000; font-weight: bold;'>📌 Classe : Terminale CD</div></div>",
    "texteParle": "Bonjour à tous. Nous entamons aujourd'hui un chapitre passionnant : la traduction de nos algorithmes en langage C. Après avoir appris à écrire des algorithmes avec des structures conditionnelles, nous allons voir comment les implémenter en C. Cette leçon est cruciale car elle vous permettra de donner vie à vos algorithmes. Nous allons nous concentrer sur les instructions if, else if et else. Prêts ? C'est parti !",
    "note": "Le langage C est un langage de programmation puissant et largement utilisé."
  },
  {
    "titre": "Rappel : Structures Conditionnelles",
    "contenu": "<div style='background: #f4f6f7; padding: 15px; border-radius: 10px;; color: #000000'><h3 style='color: #1a5276;'>🔍 Rappel algorithmique</h3><p>En algorithmique, les structures conditionnelles permettent d'orienter le flux d'exécution en fonction d'une condition.</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin: 0; text-align: center;'>Si...Alors</h4><div style='background: #2c3e50; color: #f1c40f; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>Si condition Alors<br>    instruction<br>Fin Si</div></div><div style='background: #d6eaf8; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin: 0; text-align: center;'>Si...Alors...Sinon</h4><div style='background: #2c3e50; color: #f1c40f; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>Si condition Alors<br>    instruction1<br>Sinon<br>    instruction2<br>Fin Si</div></div></div><div style='background: #fdebd0; padding: 15px; border-radius: 10px; margin-top: 15px;; color: #000000'><h4 style='margin: 0; text-align: center;'>Si...Alors...Sinon Si...Sinon</h4><div style='background: #2c3e50; color: #f1c40f; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>Si condition1 Alors<br>    instruction1<br>Sinon Si condition2 Alors<br>    instruction2<br>Sinon<br>    instruction3<br>Fin Si</div></div>",
    "texteParle": "Avant de passer au langage C, rappelons ce que nous avons vu en algorithmique. Une structure conditionnelle permet d'exécuter un bloc d'instructions seulement si une condition est vraie. On distingue trois formes : le 'Si...Alors' simple, le 'Si...Alors...Sinon' qui propose une alternative, et le 'Si...Alors...Sinon Si...Sinon' qui permet plusieurs choix. Ces structures sont essentielles pour créer des programmes intelligents qui prennent des décisions.",
    "note": "Les conditions sont des expressions qui peuvent être vraies ou fausses (booléennes)."
  },
  {
    "titre": "La Structure if en C",
    "contenu": "<div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;; color: #000000'><h3 style='margin: 0; color: #1a5276;'>📝 La structure if (Si)</h3><p style='margin-top: 5px;'>La structure <strong>if</strong> est l'équivalent du 'Si...Alors' en algorithmique. Elle exécute un bloc d'instructions si la condition est vraie.</p></div><div style='background: #1c2833; color: #fdfefe; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 0.95em;'><strong style='color: #f1c40f;'>Syntaxe :</strong><br><span style='color: #2ecc71;'>if</span> (condition) {<br>    <span style='color: #85c1e9;'>// bloc d'instructions</span><br>    instruction1;<br>    instruction2;<br>}</div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #f39c12;; color: #000000'><h4 style='margin: 0;'>📌 Exemple :</h4><div style='background: #2c3e50; color: #fdfefe; padding: 10px; border-radius: 5px; font-family: monospace;'>int age = 18;<br><span style='color: #2ecc71;'>if</span> (age >= 18) {<br>    <span style='color: #85c1e9;'>// Ce bloc s'exécute si age est >= 18</span><br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Vous êtes majeur.\"</span>);<br>}</div></div>",
    "texteParle": "En langage C, la structure 'Si...Alors' s'appelle 'if'. La syntaxe est très simple : on écrit 'if', puis entre parenthèses la condition que l'on veut tester, et entre accolades le bloc d'instructions à exécuter si la condition est vraie. Par exemple, si l'âge de la personne est supérieur ou égal à 18, on affiche 'Vous êtes majeur'. C'est aussi simple que cela.",
    "note": "Les accolades {} délimitent le bloc d'instructions en C. Elles sont obligatoires si le bloc contient plus d'une instruction."
  },
  {
    "titre": "La Structure if...else en C",
    "contenu": "<div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;; color: #000000'><h3 style='margin: 0; color: #1a5276;'>📝 La structure if...else (Si...Alors...Sinon)</h3><p style='margin-top: 5px;'>La structure <strong>if...else</strong> permet d'exécuter un bloc si la condition est vraie, et un autre bloc si elle est fausse.</p></div><div style='background: #1c2833; color: #fdfefe; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 0.95em;'><strong style='color: #f1c40f;'>Syntaxe :</strong><br><span style='color: #2ecc71;'>if</span> (condition) {<br>    <span style='color: #85c1e9;'>// bloc si vrai</span><br>    instruction1;<br>} <span style='color: #e74c3c;'>else</span> {<br>    <span style='color: #85c1e9;'>// bloc si faux</span><br>    instruction2;<br>}</div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #f39c12;; color: #000000'><h4 style='margin: 0;'>📌 Exemple :</h4><div style='background: #2c3e50; color: #fdfefe; padding: 10px; border-radius: 5px; font-family: monospace;'>int age = 16;<br><span style='color: #2ecc71;'>if</span> (age >= 18) {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Vous êtes majeur.\"</span>);<br>} <span style='color: #e74c3c;'>else</span> {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Vous êtes mineur.\"</span>);<br>}</div></div>",
    "texteParle": "La structure 'if...else' est l'équivalent du 'Si...Alors...Sinon' en algorithmique. Elle permet de gérer deux cas : si la condition est vraie, on exécute le premier bloc, sinon on exécute le deuxième bloc. Dans notre exemple, si l'âge est supérieur ou égal à 18, on affiche 'Vous êtes majeur', sinon on affiche 'Vous êtes mineur'. C'est très utile pour les choix binaires.",
    "note": "Le mot-clé 'else' signifie 'sinon' en anglais."
  },
  {
    "titre": "La Structure if...else if...else en C",
    "contenu": "<div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;; color: #000000'><h3 style='margin: 0; color: #1a5276;'>📝 La structure if...else if...else (Multiples conditions)</h3><p style='margin-top: 5px;'>Cette structure permet de tester plusieurs conditions successivement.</p></div><div style='background: #1c2833; color: #fdfefe; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 0.95em;'><strong style='color: #f1c40f;'>Syntaxe :</strong><br><span style='color: #2ecc71;'>if</span> (condition1) {<br>    instruction1;<br>} <span style='color: #e74c3c;'>else if</span> (condition2) {<br>    instruction2;<br>} <span style='color: #e74c3c;'>else if</span> (condition3) {<br>    instruction3;<br>} <span style='color: #e74c3c;'>else</span> {<br>    instruction4; <span style='color: #85c1e9;'>// cas par défaut</span><br>}</div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #f39c12;; color: #000000'><h4 style='margin: 0;'>📌 Exemple : Note scolaire</h4><div style='background: #2c3e50; color: #fdfefe; padding: 10px; border-radius: 5px; font-family: monospace;'>int note = 15;<br><span style='color: #2ecc71;'>if</span> (note >= 16) {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Très bien\"</span>);<br>} <span style='color: #e74c3c;'>else if</span> (note >= 14) {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Bien\"</span>);<br>} <span style='color: #e74c3c;'>else if</span> (note >= 12) {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Assez bien\"</span>);<br>} <span style='color: #e74c3c;'>else</span> {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Passable\"</span>);<br>}</div></div>",
    "texteParle": "Quand nous avons plus de deux possibilités, nous utilisons la structure 'if...else if...else'. C'est l'équivalent du 'Si...Alors...Sinon Si...Sinon' en algorithmique. On teste une première condition, si elle est fausse, on teste la suivante, et ainsi de suite. À la fin, le 'else' final sert de cas par défaut si aucune condition n'est vraie. Dans notre exemple, nous affichons une appréciation en fonction de la note de l'élève.",
    "note": "Les conditions sont testées dans l'ordre. Dès qu'une condition est vraie, les autres ne sont pas évaluées."
  },
  {
    "titre": "Les Opérateurs de Comparaison en C",
    "contenu": "<div style='background: #f4f6f7; padding: 15px; border-radius: 10px;; color: #000000'><h3 style='color: #1a5276;'>⚖️ Opérateurs de comparaison</h3><p>En C, voici les opérateurs qui permettent de construire des conditions :</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'><div style='background: #d5f5e3; padding: 12px; border-radius: 8px;; color: #000000'><p style='margin: 0;'><strong>==</strong> : égal à</p><p style='margin: 0;'><strong>!=</strong> : différent de</p></div><div style='background: #d6eaf8; padding: 12px; border-radius: 8px;; color: #000000'><p style='margin: 0;'><strong>&lt;</strong> : inférieur à</p><p style='margin: 0;'><strong>&gt;</strong> : supérieur à</p></div><div style='background: #fdebd0; padding: 12px; border-radius: 8px;; color: #000000'><p style='margin: 0;'><strong>&lt;=</strong> : inférieur ou égal</p><p style='margin: 0;'><strong>&gt;=</strong> : supérieur ou égal</p></div><div style='background: #e8daef; padding: 12px; border-radius: 8px;; color: #000000'><p style='margin: 0;'><strong>&&</strong> : ET logique</p><p style='margin: 0;'><strong>||</strong> : OU logique</p><p style='margin: 0;'><strong>!</strong> : NON logique</p></div></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #f39c12;; color: #000000'><h4 style='margin: 0;'>📌 Exemple de condition composée :</h4><div style='background: #2c3e50; color: #fdfefe; padding: 10px; border-radius: 5px; font-family: monospace;'>if (age >= 18 && age &lt;= 65) {<br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Âge actif\"</span>);<br>}</div></div>",
    "texteParle": "Pour écrire des conditions en C, nous avons besoin d'opérateurs de comparaison. Le double égal '==' permet de tester l'égalité, attention à ne pas le confondre avec le simple égal '=' qui sert à l'affectation. Nous avons aussi '!=' pour le différent, et les opérateurs de comparaison classiques. Pour combiner plusieurs conditions, nous utilisons '&&' pour le ET logique, '||' pour le OU logique, et '!' pour le NON. Par exemple, pour tester si une personne est en âge de travailler, nous pouvons écrire une condition avec le ET.",
    "note": "Ne confondez pas '=' (affectation) et '==' (comparaison) en C !"
  },
  {
    "titre": "Exemple Complet 1",
    "contenu": "<div style='background: #f4f6f7; padding: 15px; border-radius: 10px;; color: #000000'><h3 style='text-align: center;'>📋 Programme complet : Vérification de la parité</h3></div><div style='background: #1c2833; color: #fdfefe; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9em; margin-top: 10px;'><span style='color: #85c1e9;'>#include &lt;stdio.h&gt;</span><br><br><span style='color: #2ecc71;'>int</span> <span style='color: #f1c40f;'>main</span>() {<br>    <span style='color: #2ecc71;'>int</span> nombre;<br>    <br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Entrez un nombre : \"</span>);<br>    <span style='color: #f1c40f;'>scanf</span>(<span style='color: #e74c3c;'>\"%d\"</span>, &nombre);<br>    <br>    <span style='color: #2ecc71;'>if</span> (nombre % 2 == 0) {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Le nombre %d est pair.\\n\"</span>, nombre);<br>    } <span style='color: #e74c3c;'>else</span> {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Le nombre %d est impair.\\n\"</span>, nombre);<br>    }<br>    <br>    <span style='color: #2ecc71;'>return</span> 0;<br>}</div><div style='background: #eaf2f8; padding: 10px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='margin: 0;'>🔎 <strong>Analyse :</strong></p><ul style='margin-top: 5px;'><li><strong>Saisie</strong> : L'utilisateur entre un nombre.</li><li><strong>Condition</strong> : L'opérateur <strong>%</strong> donne le reste de la division. Si le reste de la division par 2 est 0, le nombre est pair.</li><li><strong>Sortie</strong> : Affichage du résultat.</li></ul></div>",
    "texteParle": "Voyons un programme complet qui utilise les structures conditionnelles. Ce programme demande à l'utilisateur d'entrer un nombre, puis vérifie s'il est pair ou impair. Pour cela, nous utilisons l'opérateur modulo '%' qui donne le reste de la division. Si le nombre modulo 2 est égal à zéro, alors le nombre est pair, sinon il est impair. Le programme affiche ensuite le résultat. C'est un bon exemple de l'utilisation de 'if...else'.",
    "note": "L'opérateur modulo '%' donne le reste de la division entière."
  },
  {
    "titre": "Exemple Complet 2",
    "contenu": "<div style='background: #f4f6f7; padding: 15px; border-radius: 10px;; color: #000000'><h3 style='text-align: center;'>📋 Programme complet : Appréciation d'une note</h3></div><div style='background: #1c2833; color: #fdfefe; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9em; margin-top: 10px;'><span style='color: #85c1e9;'>#include &lt;stdio.h&gt;</span><br><br><span style='color: #2ecc71;'>int</span> <span style='color: #f1c40f;'>main</span>() {<br>    <span style='color: #2ecc71;'>float</span> note;<br>    <br>    <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Entrez votre note (0-20) : \"</span>);<br>    <span style='color: #f1c40f;'>scanf</span>(<span style='color: #e74c3c;'>\"%f\"</span>, &note);<br>    <br>    <span style='color: #2ecc71;'>if</span> (note >= 16) {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Très bien\\n\"</span>);<br>    } <span style='color: #e74c3c;'>else if</span> (note >= 14) {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Bien\\n\"</span>);<br>    } <span style='color: #e74c3c;'>else if</span> (note >= 12) {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Assez bien\\n\"</span>);<br>    } <span style='color: #e74c3c;'>else if</span> (note >= 10) {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Passable\\n\"</span>);<br>    } <span style='color: #e74c3c;'>else</span> {<br>        <span style='color: #f1c40f;'>printf</span>(<span style='color: #e74c3c;'>\"Insuffisant\\n\"</span>);<br>    }<br>    <br>    <span style='color: #2ecc71;'>return</span> 0;<br>}</div><div style='background: #eaf2f8; padding: 10px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='margin: 0;'>🔎 <strong>Analyse :</strong></p><ul style='margin-top: 5px;'><li>Utilisation de <strong>else if</strong> pour tester plusieurs conditions.</li><li>Les conditions sont testées du plus haut score au plus bas.</li><li>Le <strong>else</strong> final capture tous les cas où la note est inférieure à 10.</li></ul></div>",
    "texteParle": "Voici un deuxième exemple qui illustre l'utilisation de 'else if'. Ce programme demande une note et affiche une appréciation. Nous testons d'abord si la note est supérieure ou égale à 16 pour 'Très bien', puis si elle est supérieure ou égale à 14 pour 'Bien', et ainsi de suite. Si aucune de ces conditions n'est vraie, le 'else' final affiche 'Insuffisant'. C'est une application classique des structures conditionnelles pour des classifications.",
    "note": "L'ordre des conditions est important dans un enchaînement 'if...else if...else'."
  },
  {
    "titre": "Les Pièges à Éviter",
    "contenu": "<div style='background: #fdebd0; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c;; color: #000000'><h3 style='margin: 0; color: #922b21;'>⚠️ Pièges courants en C</h3></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'><div style='background: #fadbd8; padding: 15px; border-radius: 10px; border: 1px solid #e74c3c;; color: #000000'><h4 style='margin: 0; color: #922b21;'>❌ Erreur 1 : '=' au lieu de '=='</h4><div style='background: #2c3e50; color: #fdfefe; padding: 8px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>if (age <span style='color: #e74c3c;'>=</span> 18) { <span style='color: #85c1e9;'>// Erreur !</span></div><p style='font-size: 0.9em; margin-top: 8px;'>Utilisez <strong>==</strong> pour la comparaison.</p></div><div style='background: #fadbd8; padding: 15px; border-radius: 10px; border: 1px solid #e74c3c;; color: #000000'><h4 style='margin: 0; color: #922b21;'>❌ Erreur 2 : Point-virgule après if</h4><div style='background: #2c3e50; color: #fdfefe; padding: 8px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>if (age >= 18)<span style='color: #e74c3c;'>;</span> { <span style='color: #85c1e9;'>// Erreur !</span></div><p style='font-size: 0.9em; margin-top: 8px;'>Le point-virgule termine l'instruction <strong>if</strong>.</p></div><div style='background: #fadbd8; padding: 15px; border-radius: 10px; border: 1px solid #e74c3c;; color: #000000'><h4 style='margin: 0; color: #922b21;'>❌ Erreur 3 : Oublier les accolades</h4><div style='background: #2c3e50; color: #fdfefe; padding: 8px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>if (age >= 18)<br>    printf(\"Majeur\");<br>    printf(\"Bonjour\");</div><p style='font-size: 0.9em; margin-top: 8px;'>Sans accolades, seule la première instruction est conditionnée.</p></div><div style='background: #fadbd8; padding: 15px; border-radius: 10px; border: 1px solid #e74c3c;; color: #000000'><h4 style='margin: 0; color: #922b21;'>❌ Erreur 4 : else sans if</h4><div style='background: #2c3e50; color: #fdfefe; padding: 8px; border-radius: 5px; font-family: monospace; font-size: 0.85em; margin-top: 8px;'>else { <span style='color: #85c1e9;'>// Erreur !</span></div><p style='font-size: 0.9em; margin-top: 8px;'>Un <strong>else</strong> doit toujours être associé à un <strong>if</strong>.</p></div></div>",
    "texteParle": "En programmation en C, il y a des erreurs courantes à éviter. La plus classique est d'utiliser un simple égal '=' pour comparer au lieu du double égal '=='. Cela affecte une valeur au lieu de la comparer. Une autre erreur fréquente est de mettre un point-virgule après le 'if', ce qui termine l'instruction et rend le bloc suivant indépendant de la condition. N'oubliez pas non plus les accolades si vous avez plusieurs instructions, et assurez-vous que chaque 'else' est bien associé à un 'if'. Soyez vigilants !",
    "note": "Le point-virgule ; termine une instruction en C. Un 'if' suivi d'un point-virgule est une instruction vide."
  },
  {
    "titre": "Synthèse et Rappel",
    "contenu": "<div style='background: #f1c40f; padding: 20px; border-radius: 12px; text-align: center; color: #2c3e50;'><h2>🔑 Points clés à retenir</h2></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'><div style='background: #2c3e50; padding: 15px; border-radius: 8px; color: white; text-align: center;'><span style='font-size: 2em;'>1️⃣</span><h4 style='margin: 5px 0;'>if</h4><p style='margin: 0;'>Exécute un bloc si la condition est vraie.</p></div><div style='background: #2c3e50; padding: 15px; border-radius: 8px; color: white; text-align: center;'><span style='font-size: 2em;'>2️⃣</span><h4 style='margin: 5px 0;'>if...else</h4><p style='margin: 0;'>Exécute un bloc si vrai, un autre si faux.</p></div><div style='background: #2c3e50; padding: 15px; border-radius: 8px; color: white; text-align: center;'><span style='font-size: 2em;'>3️⃣</span><h4 style='margin: 5px 0;'>if...else if...else</h4><p style='margin: 0;'>Permet de tester plusieurs conditions.</p></div><div style='background: #2c3e50; padding: 15px; border-radius: 8px; color: white; text-align: center;'><span style='font-size: 2em;'>4️⃣</span><h4 style='margin: 5px 0;'>Pièges</h4><p style='margin: 0;'>Attention à '=' vs '==', aux points-virgules et aux accolades.</p></div></div><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center;; color: #000000'><p style='margin: 0;'><strong>💡 Rappel :</strong> Les structures conditionnelles permettent à un programme de prendre des décisions.</p></div>",
    "texteParle": "Pour conclure cette leçon, retenons les points essentiels. La structure 'if' permet d'exécuter un bloc de code si une condition est vraie. 'if...else' ajoute une alternative. 'if...else if...else' permet de gérer plusieurs cas. N'oubliez pas les pièges : utilisez '==' pour comparer, ne mettez pas de point-virgule après le 'if', et utilisez des accolades pour regrouper plusieurs instructions. La maîtrise de ces structures est fondamentale pour écrire des programmes qui prennent des décisions.",
    "note": "La pratique est essentielle pour maîtriser les structures conditionnelles en C."
  }
];
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
