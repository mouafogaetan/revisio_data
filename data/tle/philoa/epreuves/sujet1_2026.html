<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philosophie",
  "classe": "Terminale A",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Vérification des ressources : Histoire de la philosophie et argumentation",
      "points": "9 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Partie A1 : Vérification des savoirs (4 pts)</strong></p>",
      "questions": [
        {
          "question": "<p><strong>1. a)</strong> Distingue la philosophie patristique de la philosophie scolastique en donnant pour chacune un auteur représentatif et une de ses thèses principales. (2 pts)</p>",
          "reponse": "<p><strong>Philosophie patristique</strong> : Période des Pères de l'Église (Ier-VIIIe siècle). Représentant : <strong>Saint Augustin</strong>. Thèse principale : la foi précède la raison (<em>\"Crois pour comprendre\"</em>).</p><p><strong>Philosophie scolastique</strong> : Philosophie enseignée dans les écoles médiévales (IXe-XVe siècle). Représentant : <strong>Thomas d'Aquin</strong>. Thèse principale : harmonie entre foi et raison, la raison peut démontrer l'existence de Dieu (preuves cosmologiques).</p>"
        },
        {
          "question": "<p><strong>1. b)</strong> Explique les deux thèses suivantes : (2 pts)</p><ul><li>\"L'existence précède l'essence\" (Sartre)</li><li>\"Je pense, donc je suis\" (Descartes)</li></ul>",
          "reponse": "<ul><li><strong>\"L'existence précède l'essence\"</strong> (Sartre) : L'homme n'est pas défini par une nature fixe (essence) qu'il aurait à réaliser. Il existe d'abord, se projette, se définit par ses actes et ses choix. La liberté est ainsi au fondement de l'humain.</li><li><strong>\"Je pense, donc je suis\"</strong> (Descartes) : Le doute méthodique permet d'atteindre une première certitude : si je doute, je pense ; si je pense, j'existe. La pensée (la raison) devient le fondement de la connaissance et de l'existence certaine.</li></ul>"
        },
        {
          "question": "<p><strong>Partie A2 : Vérification des savoir-faire (5 pts)</strong></p><p><strong>2. a)</strong> Construis une argumentation structurée (thèse, arguments, exemples) pour défendre l'affirmation suivante : \"Socrate a raison de dire 'Tout ce que je sais, c'est que je ne sais rien'.\" (3 pts)</p>",
          "reponse": "<p><strong>Thèse :</strong> La formule de Socrate invite à une humilité intellectuelle et à une quête permanente de la vérité.</p><p><strong>Arguments :</strong></p><ul><li><strong>Argument 1 :</strong> La reconnaissance de son ignorance est le début de la sagesse. Celui qui croit tout savoir cesse de chercher. Socrate, en avouant ne rien savoir, se distingue des sophistes qui prétendaient détenir la vérité.</li><li><strong>Argument 2 :</strong> Cette ignorance est féconde car elle pousse au questionnement. La maïeutique socratique consiste à accoucher les esprits des vérités qu'ils portent en eux, par le dialogue et la remise en question.</li></ul><p><strong>Exemple :</strong> Socrate interrogeait les Athéniens sur la justice, le courage, la piété. Il montrait que leurs définitions étaient insuffisantes, les conduisant à reconnaître leur propre ignorance et à chercher plus loin.</p>"
        },
        {
          "question": "<p><strong>2. b)</strong> Analyse le type d'argument utilisé dans cet extrait de Descartes : (2 pts)</p><p><em>\"Le bon sens est la chose du monde la mieux partagée ; car chacun pense en être si bien pourvu, que ceux même qui sont les plus difficiles à contenter en toute autre chose, n'ont point coutume d'en désirer plus qu'ils n'en ont.\"</em></p>",
          "reponse": "<p>Cet extrait utilise un <strong>argument d'autorité</strong> et un <strong>argument logique</strong>.</p><ul><li><strong>Argument d'autorité</strong> : Descartes s'appuie sur l'opinion commune ('chacun pense en être bien pourvu') pour introduire sa thèse.</li><li><strong>Argument logique</strong> : Il raisonne par l'absurde en soulignant que même les plus exigeants sont satisfaits de leur bon sens, ce qui prouverait son universalité.</li></ul>"
        }
      ]
    },
    {
      "titre": "Essai personnel",
      "points": "9 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>La liberté : un fardeau ou une chance pour l'homme ?</strong></p><p>Tu feras du sujet ci-dessus une dissertation philosophique en prenant en compte les tâches ci-après :</p><ul><li><strong>Première tâche :</strong> Rédige une introduction dans laquelle, après avoir amené le sujet, tu poses le problème philosophique et élabores la problématique. (3 pts)</li><li><strong>Deuxième tâche :</strong> En t'appuyant sur ta culture philosophique (Sartre, Kant, Spinoza, etc.), élabore une analyse dialectique du problème. (3 pts)</li><li><strong>Troisième tâche :</strong> Rédige une conclusion dans laquelle tu réponds à la problématique et proposes une ouverture. (3 pts)</li></ul></div>",
      "questions": [
        {
          "question": "<p><strong>Première tâche :</strong> Rédige l'introduction.</p>",
          "reponse": "<p><strong>Exemple d'introduction :</strong></p><p>La liberté est souvent célébrée comme la plus haute des valeurs humaines. Être libre, c'est pouvoir choisir, agir selon sa volonté, échapper aux déterminismes. Elle est au cœur de nos démocraties et de nos aspirations. Pourtant, la liberté n'est-elle pas aussi une source d'angoisse ? Être libre, n'est-ce pas être condamné à choisir, à assumer la responsabilité de ses actes sans pouvoir se réfugier derrière des excuses ? [citation:2] Ce paradoxe fait de la liberté à la fois une chance d'épanouissement et un possible fardeau.</p><p><strong>Problématique :</strong> En quoi la liberté constitue-t-elle à la fois une chance et un fardeau pour l'homme ? La liberté est-elle une libération ou une condamnation ?</p>"
        },
        {
          "question": "<p><strong>Deuxième tâche :</strong> Développe l'analyse dialectique.</p>",
          "reponse": "<p><strong>1. Thèse : La liberté est une chance pour l'homme</strong></p><p>La liberté est ce qui permet à l'homme de s'élever au-dessus de la nature, de se réaliser pleinement en tant qu'être humain. Pour Kant, être libre, c'est obéir à la loi morale que l'on se donne à soi-même, c'est être autonome. Sans liberté, il n'y a ni responsabilité ni dignité. Sartre, dans <em>L'Existentialisme est un humanisme</em>, affirme que l'homme est <em>\"condamné à être libre\"</em>, ce qui signifie que la liberté n'est pas une option mais une nécessité ontologique. Elle est le fondement même de l'humanité. La liberté est donc une chance car elle permet l'engagement, la création, la construction d'un sens à sa vie. [citation:4]</p><p><strong>2. Antithèse : La liberté est un fardeau</strong></p><p>Cependant, cette liberté est lourde à porter. Comme le souligne Sartre, <em>\"l'homme est responsable de tout ce qu'il fait\"</em>, et cette responsabilité est écrasante. Être libre, c'est ne pouvoir s'abriter derrière aucune excuse, aucune nature, aucune détermination. C'est être seul face à ses choix, sans guide ni garantie. Spinoza, dans <em>L'Éthique</em>, montre que notre prétendue liberté est souvent l'illusion de notre ignorance des causes qui nous déterminent. Nous croyons être libres, mais nous sommes en réalité déterminés par nos passions, notre histoire, notre société. La liberté serait alors une illusion et un fardeau : l'illusion de croire que nous maîtrisons notre destin, et le fardeau de devoir assumer une responsabilité qui nous dépasse.</p><p><strong>3. Synthèse : La liberté comme conquête et équilibre</strong></p><p>En définitive, la liberté n'est ni un simple fardeau, ni une chance pure. Elle est une conquête qui exige un équilibre entre conscience de ses déterminismes et capacité d'agir. Spinoza montre que la liberté véritable consiste à comprendre les causes qui nous déterminent pour mieux les maîtriser. La liberté est une <em>praxis</em> : elle se gagne par la connaissance, la réflexion et l'engagement. Elle est à la fois une chance et un fardeau : une chance parce qu'elle nous ouvre à l'avenir, un fardeau parce qu'elle nous oblige à nous dépasser. C'est en ce sens que la liberté est une responsabilité assumée, un acte de lucidité et de courage. [citation:4]</p>"
        },
        {
          "question": "<p><strong>Troisième tâche :</strong> Rédige la conclusion.</p>",
          "reponse": "<p><strong>Exemple de conclusion :</strong></p><p>En conclusion, la liberté se révèle être un concept ambivalent. Elle est à la fois le fondement de l'humanité et la source de son angoisse. Elle n'est ni un don gratuit, ni une simple illusion. La liberté est une conquête qui exige de l'homme qu'il assume pleinement sa condition d'être responsable, capable de se dépasser et de donner un sens à son existence. Comme le souligne Njoh-Mouelle, il s'agit d'<em>\"aller de la médiocrité à l'excellence\"</em>, ce qui suppose un effort constant pour s'arracher aux déterminismes et construire sa vie. La liberté est donc une tâche, un projet, une invitation à devenir pleinement soi-même dans un monde où rien n'est écrit d'avance. [citation:6][citation:8]</p>"
        }
      ]
    },
    {
      "titre": "Présentation",
      "points": "2 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p>La présentation de la copie (écriture soignée, organisation claire des idées, qualité de l'expression, respect de la structure de la dissertation) est prise en compte dans la notation.</p></div>",
      "questions": []
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
