<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>

                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>

                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>

                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philo Tle A",
  "classe": "Terminale",
  "sequence": "Évaluation séquentielle n°4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des Ressources (Commentaire de Texte)",
      "points": "9 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>📖 Texte</h2><div style='background: white; padding: 1.25rem; border-radius: 8px; border-left: 4px solid #2b6cb0; margin-bottom: 1.25rem; font-size: 0.95rem;'><p style='margin-bottom: 0.5rem;'><strong>« Par-là, la philosophie entre en conflit avec la religion, du fait que celle-ci se veut l'autorité absolue tant dans le domaine de la vérité que celui de la pratique. (...) ainsi, dans la religion « le contenu est donné, il est considéré comme au-dessus de la raison ». La religion conçoit l'esprit humain comme borné, limité et ayant donc besoin que les vérités essentielles pour l'homme, que sa raison infirme serait incapable de découvrir par elle-même, lui soient révélées d'une façon surnaturelle et mystérieuse. Mais l'idée d'une vérité au-delà de la raison, inaccessible naturellement à l'esprit humain, est absolument inconcevable par la philosophie qui repose sur le principe diamétralement opposé selon lequel la pensée ne doit rien présumer en dehors d'elle-même, c'est-à-dire, que la philosophie ne doit rien admettre comme vrai qui n'ait été saisi comme tel par la pensée. L'homme est certes un être borné, fini, sauf du côté où il est esprit. »</strong></p><p style='text-align: right; font-style: italic; color: #4a5568;'>Marcien Towa, <em>Essai sur la problématique philosophique dans l'Afrique actuelle</em>, Éditions Clé, 1971, p. 62.</p></div><div style='background: #ebf8ff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;'><p style='margin: 0; font-weight: 500; color: #2c5282;'>📌 À travers une production écrite de <strong>15 à 25 lignes</strong>, dégage l'intérêt philosophique de ce texte à partir de l'étude ordonnée des éléments suivants :</p></div><ul style='list-style: none; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.9rem;'><li style='background: white; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0;'>• Définition du problème philosophique <span style='font-weight:600; color:#2b6cb0;'>(1,5 pts)</span></li><li style='background: white; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0;'>• Explication analytique <span style='font-weight:600; color:#2b6cb0;'>(2 pts)</span></li><li style='background: white; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0;'>• Réfutation analytique <span style='font-weight:600; color:#2b6cb0;'>(2 pts)</span></li><li style='background: white; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0;'>• Réinterprétation <span style='font-weight:600; color:#2b6cb0;'>(2 pts)</span></li><li style='background: white; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0; grid-column: span 2;'>• Conclusion <span style='font-weight:600; color:#2b6cb0;'>(1,5 pts)</span></li></ul></div>",
      "questions": [
        {
          "question": "",
          "reponse": "<div style='font-family: 'Segoe UI', Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>📝 Éléments de corrigé :</strong></p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Définition du problème (DP) :</strong> Le texte pose le problème du rapport entre la foi et la raison. La religion revendique une autorité absolue et des vérités révélées, tandis que la philosophie n'accepte comme vrai que ce qui est saisi par la pensée. Le problème central est : la raison humaine peut-elle accéder à la vérité par ses propres moyens, ou a-t-elle besoin d'une révélation surnaturelle ?</li><li><strong>Explication analytique (EA) :</strong> Towa distingue deux positions : 1) La religion, qui affirme une vérité donnée d'en haut, au-dessus de la raison, jugeant l'esprit humain borné. 2) La philosophie, qui repose sur l'autonomie de la raison et refuse toute vérité qui ne serait pas saisie par la pensée. Cette opposition constitue le cœur du conflit entre les deux.</li><li><strong>Réfutation analytique (RT) :</strong> On peut objecter à Towa que la religion n'est pas seulement une autorité extérieure, mais qu'elle peut aussi être une source de sens et de valeurs pour l'homme. Par ailleurs, certains philosophes (comme Thomas d'Aquin) ont tenté d'harmoniser foi et raison, montrant que la raison peut préparer à la foi et que la foi ne contredit pas la raison.</li><li><strong>Réinterprétation (RIT) :</strong> La position de Towa s'inscrit dans une perspective rationaliste héritée de Descartes et de Kant. Elle met en lumière l'exigence d'autonomie de la pensée, essentielle à la démarche philosophique. Dans le contexte africain, cette opposition entre raison et tradition/religion est particulièrement pertinente pour penser la modernité.</li><li><strong>Conclusion :</strong> Le texte de Towa invite à une réflexion sur les conditions de la pensée libre et critique. Il souligne que la philosophie, en refusant toute autorité extérieure, s'affirme comme une quête autonome de la vérité, ce qui est fondamental pour l'émancipation intellectuelle.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Dissertation Philosophique)",
      "points": "9 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>📝 Sujet de dissertation</h2><div style='background: white; padding: 1.5rem; border-radius: 8px; border-left: 4px solid #2b6cb0; margin-bottom: 1.25rem; text-align: center; font-size: 1.05rem;'><p style='font-weight: 500; margin: 0;'><span style='font-size: 1.5rem;'>«</span> La foi s'oppose-t-elle à la raison ? <span style='font-size: 1.5rem;'>»</span></p></div><div style='background: #ebf8ff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;'><p style='margin: 0; font-weight: 500; color: #2c5282;'>🎯 Consigne : Tu feras du sujet ci-dessus une dissertation philosophique en prenant en compte les tâches suivantes :</p></div><ul style='list-style: none; padding: 0; display: grid; grid-template-columns: 1fr; gap: 0.5rem; font-size: 0.9rem;'><li style='background: white; padding: 0.75rem 1rem; border-radius: 6px; border: 1px solid #e2e8f0;'><strong>Première tâche</strong> – Introduction (3 pts)<br><span style='color: #4a5568;'>Après avoir amené le sujet, propose le problème philosophique dont il est question et élabore une problématique subséquente.</span></li><li style='background: white; padding: 0.75rem 1rem; border-radius: 6px; border: 1px solid #e2e8f0;'><strong>Deuxième tâche</strong> – Développement dialectique (3 pts)<br><span style='color: #4a5568;'>À partir de ta culture philosophique, élabore une analyse dialectique du problème soulevé (thèse, antithèse, synthèse).</span></li><li style='background: white; padding: 0.75rem 1rem; border-radius: 6px; border: 1px solid #e2e8f0;'><strong>Troisième tâche</strong> – Conclusion (3 pts)<br><span style='color: #4a5568;'>Rappelle le problème, dresse le bilan de ton développement et propose une conclusion personnelle et contextualisée.</span></li></ul></div>",
      "questions": [
        {
          "question": "",
          "reponse": "<div style='font-family: 'Segoe UI', Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>📝 Éléments de corrigé :</strong></p><div style='background: #f0fff4; padding: 1rem; border-radius: 8px; border-left: 4px solid #38a169; margin-bottom: 1rem;'><h4 style='margin: 0 0 0.5rem 0; color: #2f855a;'>I. Introduction (3 pts)</h4><p><strong>Amorce :</strong> Depuis l'Antiquité, la question du rapport entre la foi et la raison traverse la pensée humaine. Faut-il croire pour comprendre, ou comprendre pour croire ? <strong>Problème :</strong> La foi et la raison sont-elles deux voies inconciliables vers la vérité, ou peuvent-elles coexister harmonieusement ? <strong>Problématique :</strong> En quoi la foi et la raison s'opposent-elles fondamentalement, et dans quelle mesure peuvent-elles être conciliées ?</p></div><div style='background: #fefcbf; padding: 1rem; border-radius: 8px; border-left: 4px solid #d69e2e; margin-bottom: 1rem;'><h4 style='margin: 0 0 0.5rem 0; color: #975a16;'>II. Développement dialectique (3 pts)</h4><p><strong>Thèse :</strong> La foi s'oppose à la raison car elle repose sur la croyance en des vérités révélées, non démontrables. (Ex : Tertullien, Pascal, Kierkegaard).</p><p><strong>Antithèse :</strong> La foi et la raison ne s'opposent pas nécessairement. La raison peut préparer à la foi et la foi peut éclairer la raison. (Ex : Thomas d'Aquin, Augustin).</p><p><strong>Synthèse :</strong> La foi et la raison ont des domaines distincts : la raison s'occupe des vérités démontrables, la foi des vérités transcendantes. Une articulation est possible par la reconnaissance de leurs limites respectives. (Ex : Kant, distinction entre raison pure et raison pratique).</p></div><div style='background: #ebf8ff; padding: 1rem; border-radius: 8px; border-left: 4px solid #2b6cb0;'><h4 style='margin: 0 0 0.5rem 0; color: #2c5282;'>III. Conclusion (3 pts)</h4><p><strong>Bilan :</strong> La question du rapport foi/raison est complexe. Si l'opposition est historique et conceptuelle, des tentatives de conciliation existent. <strong>Ouverture :</strong> Dans le contexte africain, cette question prend une importance particulière, comme le montre Marcien Towa, qui invite à penser l'autonomie de la raison face aux croyances traditionnelles.</p></div></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
