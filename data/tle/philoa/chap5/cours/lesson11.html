<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue !",
    "contenu": "<div style='text-align: center; padding: 20px;'><h1 style='color: #2c3e50;'>La démonstration</h1><h2 style='color: #34495e; margin-bottom: 30px;'>Distinguer démonstration et argumentation</h2><p style='font-size: 1.2rem; line-height: 1.8;'>Leçon 11 - Maîtrise des outils de la logique</p><div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; margin: 20px 0;'><p style='color: #2c3e50;'><strong>Objectifs du cours :</strong></p><ul style='list-style-type: none; padding: 0; text-align: left; color: #2c3e50;'><li>✓ Distinguer démonstration (rigueur mathématique) et argumentation (persuasion)</li><li>✓ Comprendre les principes de la démonstration : axiomes, règles d'inférence</li></ul></div></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous abordons un sujet fondamental en philosophie et en logique : la démonstration. Dans cette leçon, nous allons apprendre à distinguer la démonstration, qui repose sur une rigueur mathématique, de l'argumentation, qui vise plutôt à persuader. Nous allons aussi comprendre les principes de la démonstration, notamment les axiomes et les règles d'inférence. C'est une leçon qui vous sera très utile, que ce soit en philosophie, en mathématiques ou dans la vie quotidienne.",
    "note": "Introduction au cours sur la démonstration"
  },
  {
    "titre": "Démonstration vs Argumentation",
    "contenu": "<div style='padding: 10px;'><div style='display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px; flex: 1 1 45%; min-width: 200px; border-top: 5px solid #2980b9;'><h4 style='color: #2980b9; margin-top: 0;'>La Démonstration</h4><ul style='color: #2c3e50;'><li>Vise à <strong>prouver</strong> une vérité</li><li>S'appuie sur des <strong>règles logiques strictes</strong></li><li>Produit une <strong>certitude</strong> irréfutable</li><li>Exemple : Le théorème de Pythagore</li><li>Utilisée en <strong>mathématiques et en logique</strong></li></ul></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 8px; flex: 1 1 45%; min-width: 200px; border-top: 5px solid #f39c12;'><h4 style='color: #f39c12; margin-top: 0;'>L'Argumentation</h4><ul style='color: #2c3e50;'><li>Vise à <strong>convaincre ou persuader</strong></li><li>S'appuie sur des <strong>raisons</strong> qui peuvent être subjectives</li><li>Produit une <strong>opinion</strong> plus ou moins solide</li><li>Exemple : Un discours politique</li><li>Utilisée en <strong>rhétorique, en philosophie, dans le débat</strong></li></ul></div></div></div>",
    "texteParle": "La première chose à comprendre, c'est la différence entre la démonstration et l'argumentation. La démonstration vise à prouver une vérité de manière irréfutable. Elle s'appuie sur des règles logiques strictes et produit une certitude. C'est ce qu'on utilise en mathématiques, par exemple pour démontrer le théorème de Pythagore. L'argumentation, au contraire, vise à convaincre ou à persuader. Elle s'appuie sur des raisons qui peuvent être subjectives. Elle produit une opinion qui peut être plus ou moins solide, mais qui n'est pas une certitude absolue. C'est ce qu'on utilise dans un discours politique ou dans un débat.",
    "note": "Distinction fondamentale entre démonstration (preuve) et argumentation (persuasion)"
  },
  {
    "titre": "Les caractéristiques de la démonstration",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f4f9f4; padding: 15px; border-radius: 8px; border: 2px solid #27ae60;'><h4 style='color: #27ae60; margin-top: 0;'>Les piliers de la démonstration</h4><div style='background-color: #eaf2f8; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>1. La rigueur logique</strong></p><p style='color: #2c3e50; padding-left: 15px;'>Chaque étape doit être justifiée par une règle logique.</p></div><div style='background-color: #e8f8f5; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>2. La nécessité</strong></p><p style='color: #2c3e50; padding-left: 15px;'>La conclusion découle nécessairement des prémisses.</p></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>3. L'universalité</strong></p><p style='color: #2c3e50; padding-left: 15px;'>Une démonstration valable est acceptée par tous, quel que soit le contexte.</p></div><div style='background-color: #fdedec; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>4. L'objectivité</strong></p><p style='color: #2c3e50; padding-left: 15px;'>Elle ne dépend pas des opinions ou des émotions de celui qui la fait.</p></div></div></div>",
    "texteParle": "La démonstration repose sur plusieurs caractéristiques essentielles. D'abord, la rigueur logique : chaque étape doit être justifiée par une règle logique. Ensuite, la nécessité : la conclusion découle nécessairement des prémisses. Si les prémisses sont vraies et que le raisonnement est correct, la conclusion est forcément vraie. Troisièmement, l'universalité : une démonstration valable est acceptée par tous, quel que soit le contexte. Enfin, l'objectivité : elle ne dépend pas des opinions ou des émotions de celui qui la fait. Ce sont ces caractéristiques qui font la force de la démonstration.",
    "note": "Les quatre caractéristiques qui font la force de la démonstration"
  },
  {
    "titre": "Les principes de la démonstration",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px;'><h4 style='color: #2c3e50; margin-top: 0;'>Deux éléments fondamentaux</h4><div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 5px solid #2980b9;'><h5 style='color: #2980b9; margin-top: 0;'>Les axiomes</h5><p style='color: #2c3e50;'>Ce sont des <strong>prémisses de base</strong> considérées comme évidentes ou acceptées sans démonstration.</p><p style='color: #2c3e50; font-style: italic;'>Exemple : \"Le tout est plus grand que la partie\" (en mathématiques).</p></div><div style='background-color: #e8f8f5; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 5px solid #27ae60;'><h5 style='color: #27ae60; margin-top: 0;'>Les règles d'inférence</h5><p style='color: #2c3e50;'>Ce sont des <strong>règles logiques</strong> qui permettent de passer des prémisses à la conclusion.</p><p style='color: #2c3e50; font-style: italic;'>Exemple : Si A implique B, et que A est vrai, alors B est vrai (modus ponens).</p></div></div></div>",
    "texteParle": "La démonstration repose sur deux principes fondamentaux. Le premier, ce sont les axiomes. Les axiomes sont des prémisses de base considérées comme évidentes ou acceptées sans démonstration. Par exemple, en mathématiques, on admet que le tout est plus grand que la partie. Le deuxième principe, ce sont les règles d'inférence. Ce sont des règles logiques qui permettent de passer des prémisses à la conclusion. Par exemple, la règle du modus ponens dit que si A implique B et que A est vrai, alors B est vrai. C'est grâce à ces axiomes et à ces règles qu'on peut construire une démonstration solide.",
    "note": "Présentation des axiomes et des règles d'inférence comme fondements de la démonstration"
  },
  {
    "titre": "Exemple de démonstration",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f4f9f4; padding: 15px; border-radius: 8px; border: 2px solid #27ae60;'><h4 style='color: #27ae60; margin-top: 0; text-align: center;'>Démonstration simple</h4><div style='background-color: #eaf2f8; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>Prémisses (axiomes) :</strong></p><ul style='color: #2c3e50;'><li>Tous les hommes sont mortels. (Axiome 1)</li><li>Socrate est un homme. (Axiome 2)</li></ul></div><div style='background-color: #e8f8f5; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>Règle d'inférence :</strong></p><p style='color: #2c3e50;'><em>Si tous les X sont Y, et que Z est X, alors Z est Y.</em></p></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>Conclusion :</strong></p><p style='color: #2c3e50; font-weight: bold;'>Socrate est mortel.</p></div></div></div>",
    "texteParle": "Prenons un exemple classique de démonstration. Nous avons deux axiomes. Le premier : tous les hommes sont mortels. Le deuxième : Socrate est un homme. Et nous avons une règle d'inférence qui dit que si tous les X sont Y, et que Z est X, alors Z est Y. En appliquant cette règle à nos axiomes, nous obtenons la conclusion suivante : Socrate est mortel. Cette conclusion découle nécessairement des prémisses. Si les prémisses sont vraies, la conclusion est forcément vraie. C'est une démonstration parfaite, et c'est exactement comme cela qu'on raisonne en logique et en mathématiques.",
    "note": "Exemple illustrant le fonctionnement d'une démonstration logique"
  },
  {
    "titre": "Les types de démonstration",
    "contenu": "<div style='padding: 10px;'><div style='display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;'><div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px; flex: 1 1 45%; min-width: 200px; border-left: 5px solid #2980b9;'><h4 style='color: #2980b9; margin-top: 0;'>Démonstration directe</h4><p style='color: #2c3e50;'>On part des prémisses pour arriver à la conclusion par une <strong>chaîne de raisonnements</strong>.</p><p style='color: #2c3e50; font-style: italic;'>Exemple : La démonstration du théorème de Pythagore.</p></div><div style='background-color: #fef9e7; padding: 15px; border-radius: 8px; flex: 1 1 45%; min-width: 200px; border-left: 5px solid #f39c12;'><h4 style='color: #f39c12; margin-top: 0;'>Démonstration par l'absurde</h4><p style='color: #2c3e50;'>On suppose le contraire de ce qu'on veut prouver, puis on montre que cela mène à une <strong>contradiction</strong>.</p><p style='color: #2c3e50; font-style: italic;'>Exemple : La démonstration qu'il existe une infinité de nombres premiers.</p></div></div></div>",
    "texteParle": "Il existe plusieurs types de démonstration. Il y a d'abord la démonstration directe. Dans ce cas, on part des prémisses pour arriver à la conclusion par une chaîne de raisonnements. C'est le cas de la démonstration du théorème de Pythagore. Il y a aussi la démonstration par l'absurde, qu'on appelle aussi réduction à l'absurde. Dans ce cas, on suppose le contraire de ce qu'on veut prouver, puis on montre que cette hypothèse mène à une contradiction. On peut donc conclure que l'hypothèse de départ était fausse, et que ce qu'on voulait prouver est vrai. C'est une méthode très puissante utilisée en mathématiques.",

  {
    "titre": "La démonstration en philosophie",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px;'><h4 style='color: #2c3e50; margin-top: 0;'>Est-ce que la philosophie use de la démonstration ?</h4><div style='background-color: #eaf2f8; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>Les philosophes qui privilégient la démonstration :</strong></p><ul style='color: #2c3e50;'><li><strong>Descartes</strong> : avec sa méthode du doute et du cogito, il cherche à établir des vérités indubitables par démonstration.</li><li><strong>Spinoza</strong> : dans son \"Éthique\", il présente sa philosophie <em>more geometrico</em>, à la manière des géomètres.</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 6px; margin: 10px 0;'><p style='color: #2c3e50;'><strong>Les limites de la démonstration en philosophie :</strong></p><ul style='color: #2c3e50;'><li>Les axiomes ne sont pas toujours évidents ou universellement acceptés.</li><li>Les questions philosophiques portent souvent sur des sujets complexes (le sens de la vie, la morale, etc.) qui échappent à la démonstration stricte.</li></ul></div></div></div>",
    "texteParle": "La philosophie use-t-elle de la démonstration ? Oui, mais de manière différente des mathématiques. Certains philosophes, comme Descartes ou Spinoza, ont cherché à fonder leur philosophie sur des démonstrations rigoureuses. Descartes utilise sa méthode du doute pour établir des vérités indubitables. Spinoza, lui, présente sa philosophie à la manière des géomètres. Mais il faut aussi reconnaître les limites de la démonstration en philosophie. Les axiomes ne sont pas toujours évidents ou universellement acceptés. De plus, les grandes questions philosophiques, comme le sens de la vie ou la morale, échappent souvent à la démonstration stricte. C'est pourquoi la philosophie combine démonstration et argumentation.",

    "texteParle": "La démonstration est souvent considérée comme la garantie de la vérité. Quand une démonstration est valide, la conclusion est vraie et certaine. Mais il faut faire attention à deux choses. D'abord, la démonstration ne peut produire que la vérité logique, pas la vérité empirique. Par exemple, on peut démontrer logiquement qu'il existe une infinité de nombres premiers, mais on ne peut pas démontrer par la logique qu'il pleut dehors. Ensuite, la vérité d'une démonstration dépend de la validité des prémisses. Si un axiome est faux, la démonstration peut être parfaitement valide mais la conclusion sera fausse. Il faut donc être très attentif aux prémisses de toute démonstration.",
    "note": "Relation entre la démonstration et les différents types de vérité"

    "contenu": "<div style='padding: 10px;'><div style='background-color: #fdedec; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #e74c3c;'><h4 style='color: #c0392b; margin-top: 0;'>Les pièges à éviter</h4></div><div style='display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;'><div style='background-color: #fef9e7; padding: 12px; border-radius: 6px; flex: 1 1 30%; min-width: 150px;'><p style='color: #2c3e50;'><strong>Cercle vicieux</strong></p><p style='color: #2c3e50; font-size: 0.9rem;'>On utilise la conclusion comme preuve des prémisses.</p></div><div style='background-color: #eaf2f8; padding: 12px; border-radius: 6px; flex: 1 1 30%; min-width: 150px;'><p style='color: #2c3e50;'><strong>Pétition de principe</strong></p><p style='color: #2c3e50; font-size: 0.9rem;'>On suppose ce qu'on veut démontrer.</p></div><div style='background-color: #e8f8f5; padding: 12px; border-radius: 6px; flex: 1 1 30%; min-width: 150px;'><p style='color: #2c3e50;'><strong>Généralisation abusive</strong></p><p style='color: #2c3e50; font-size: 0.9rem;'>On tire une règle générale d'un cas particulier.</p></div></div></div>",
    "texteParle": "Il existe aussi des erreurs à éviter dans une démonstration. La première est le cercle vicieux : c'est quand on utilise la conclusion comme preuve des prémisses. La deuxième est la pétition de principe : c'est quand on suppose ce qu'on veut démontrer. Par exemple, dire que Dieu existe parce que la Bible le dit, et que la Bible est vraie parce que c'est la parole de Dieu. C'est un raisonnement circulaire. Enfin, il y a la généralisation abusive : c'est quand on tire une règle générale d'un seul cas particulier. Ces erreurs rendent la démonstration invalide. Il faut donc être très vigilant pour les éviter.",
    "note": "Présentation des erreurs logiques à éviter dans une démonstration"
  },
  {
    "titre": "Résumé et conclusion",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f4f9f4; padding: 15px; border-radius: 8px; border: 2px solid #27ae60;'><h4 style='color: #27ae60; margin-top: 0; text-align: center;'>Ce qu'il faut retenir</h4><div style='background-color: #eaf2f8; padding: 10px; border-radius: 6px; margin: 8px 0;'><p style='color: #2c3e50;'><strong>La démonstration</strong> vise à prouver une vérité avec certitude, contrairement à l'argumentation qui vise à convaincre.</p></div><div style='background-color: #e8f8f5; padding: 10px; border-radius: 6px; margin: 8px 0;'><p style='color: #2c3e50;'><strong>Deux principes fondamentaux</strong> : les axiomes (prémisses de base) et les règles d'inférence (règles logiques).</p></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 6px; margin: 8px 0;'><p style='color: #2c3e50;'><strong>Deux types</strong> : démonstration directe et démonstration par l'absurde.</p></div><div style='background-color: #fdedec; padding: 10px; border-radius: 6px; margin: 8px 0;'><p style='color: #2c3e50;'><strong>À éviter</strong> : cercle vicieux, pétition de principe, généralisation abusive.</p></div></div></div>",
    "texteParle": "Pour terminer cette leçon, faisons un résumé de ce que nous avons appris. La démonstration vise à prouver une vérité avec certitude, contrairement à l'argumentation qui vise à convaincre. Elle repose sur deux principes fondamentaux : les axiomes, qui sont des prémisses de base, et les règles d'inférence, qui permettent de passer des prémisses à la conclusion. Il existe deux types de démonstration : la démonstration directe et la démonstration par l'absurde. Enfin, il faut éviter certaines erreurs comme le cercle vicieux, la pétition de principe ou la généralisation abusive. Ces outils sont essentiels pour raisonner correctement, en philosophie comme dans la vie quotidienne. À bientôt pour la prochaine leçon !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
