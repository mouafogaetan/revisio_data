<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Terminale",
  "sequence": "Séquence 4 : Évaluation bilan (Chapitres 1 à 11)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La Deuxième Guerre mondiale et l'ONU (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la Deuxième Guerre mondiale et la création de l'ONU. Réponds-y en t'aidant de tes connaissances.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Identifie</span> deux causes profondes de la Deuxième Guerre mondiale.</p>",
          "reponse": "<p>Deux causes profondes sont : le <strong>traité de Versailles</strong> (1919), qui a humilié l'Allemagne, et la <strong>montée des fascismes</strong> (nazisme en Allemagne, fascisme en Italie).</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> les principaux acteurs du conflit dans les deux camps.</p>",
          "reponse": "<p><strong>Axe</strong> : Allemagne (Hitler), Italie (Mussolini), Japon (Hirohito).<br><strong>Alliés</strong> : Royaume-Uni (Churchill), URSS (Staline), États-Unis (Roosevelt).</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> l'objectif principal de l'ONU créée en 1945.</p>",
          "reponse": "<p>L'ONU a pour objectif principal de <strong>maintenir la paix et la sécurité internationales</strong> en favorisant la coopération entre les nations pour résoudre les conflits de manière pacifique.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : La Guerre froide et la division de l'Europe (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la Guerre froide et l'Europe sous l'influence des super-grands.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Décris</span> les deux alliances militaires qui structurent la division de l'Europe pendant la Guerre froide.</p>",
          "reponse": "<p>L'<strong>OTAN</strong> (1949) regroupe les pays occidentaux sous influence américaine. Le <strong>Pacte de Varsovie</strong> (1955) regroupe les pays de l'Est sous influence soviétique.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le rôle du <strong>Plan Marshall</strong> (1947) et du <strong>CAEM</strong> (1949).</p>",
          "reponse": "<p>Le <strong>Plan Marshall</strong> est une aide économique américaine pour reconstruire les pays d'Europe de l'Ouest. Le <strong>CAEM</strong> (Conseil d'assistance économique mutuelle) est l'organisation économique des pays d'Europe de l'Est sous influence soviétique.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Analyse</span> les causes de la crise de Budapest en 1956.</p>",
          "reponse": "<p>La crise de Budapest (1956) est une <strong>révolte hongroise</strong> contre le régime communiste imposé par l'URSS. Elle est réprimée par les chars soviétiques. Elle montre les limites de la déstalinisation et la volonté de l'URSS de maintenir son contrôle sur le bloc de l'Est.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les conflits du Moyen-Orient (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les conflits du Moyen-Orient.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Retrace</span> l'origine du conflit israélo-palestinien en citant deux dates-clés.</p>",
          "reponse": "<p>La <strong>Déclaration Balfour</strong> (1917) promet un foyer juif en Palestine. Le <strong>plan de partage de l'ONU</strong> (1947) prévoit la création d'un État juif et d'un État arabe en Palestine.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> la <strong>guerre des Six Jours</strong> (1967) et ses conséquences.</p>",
          "reponse": "<p>La <strong>guerre des Six Jours</strong> (1967) oppose Israël à l'Égypte, la Jordanie et la Syrie. Israël remporte une victoire éclair et occupe <strong>Jérusalem-Est, la Cisjordanie, Gaza, le Golan et le Sinaï</strong>. Cela aggrave le conflit israélo-palestinien.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Analyse</span> l'échec du processus de paix d'Oslo (1993).</p>",
          "reponse": "<p>Les <strong>Accords d'Oslo</strong> (1993) prévoyaient une paix progressive entre Israël et l'OLP. Ils ont échoué à cause de la <strong>colonisation israélienne</strong> en Cisjordanie et des <strong>attentats</strong> palestiniens. Le processus de paix est aujourd'hui bloqué.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : L'émancipation des colonies (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les processus d'émancipation des colonies.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Décris</span> le processus d'indépendance du <strong>Ghana</strong> (1957).</p>",
          "reponse": "<p>Le Ghana, sous la direction de <strong>Kwame Nkrumah</strong>, a obtenu son indépendance de manière <strong>pacifique</strong> en 1957. C'est le premier pays d'Afrique subsaharienne à devenir indépendant.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le rôle de la <strong>révolte des Mau Mau</strong> dans l'indépendance du Kenya (1963).</p>",
          "reponse": "<p>La <strong>révolte des Mau Mau</strong> (1952-1960) est une révolte armée des Kikuyu contre les colons britanniques. Elle a été brutalement réprimée, mais elle a contribué à l'accélération du processus d'indépendance, obtenue en 1963 sous la direction de <strong>Jomo Kenyatta</strong>.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Compare</span> les processus d'indépendance du Ghana et du Kenya.</p>",
          "reponse": "<p>Le Ghana a obtenu son indépendance de manière <strong>pacifique</strong> par la négociation. Le Kenya a connu une <strong>révolte armée</strong> (Mau Mau) avant d'obtenir l'indépendance. Le Ghana montre la voie de l'indépendance négociée, le Kenya celle de la lutte armée.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : L'indépendance du Cameroun (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la marche vers l'indépendance du Cameroun.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le système de <strong>tutelle</strong> de l'ONU sur le Cameroun.</p>",
          "reponse": "<p>Après la Première Guerre mondiale, le Cameroun est placé sous <strong>mandat</strong> de la SDN, puis sous <strong>tutelle</strong> de l'ONU après 1945. Il est administré par la France (Cameroun oriental) et par l'Angleterre (Cameroun occidental).</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> le rôle de l'<strong>Union des Populations du Cameroun (UPC)</strong> dans le nationalisme camerounais.</p>",
          "reponse": "<p>L'<strong>UPC</strong>, créée en 1948, est le premier parti nationaliste camerounais. Ses leaders <strong>Ruben Um Nyobé</strong> et <strong>Félix Moumié</strong> réclament l'indépendance. L'UPC est réprimée par la France, ce qui déclenche une <strong>guerre cachée</strong> (1955-1971).</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Décris</span> le processus de <strong>réunification</strong> du Cameroun (1961).</p>",
          "reponse": "<p>Le Cameroun français devient indépendant le <strong>1er janvier 1960</strong>. Le Cameroun britannique organise un <strong>plébiscite</strong> le 11 février 1961. La partie nord rejoint le Nigeria, la partie sud (Southern Cameroons) rejoint le Cameroun. La <strong>réunification</strong> est effective le <strong>1er octobre 1961</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Synthèse - Le Cameroun de 1960 à nos jours (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Rédige un paragraphe construit sur le sujet suivant : <strong>« Le Cameroun indépendant : construction nationale, défis et perspectives »</strong>.</p>",
      "questions": [
        {
          "question": "<p>Rédige ton développement.</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> Le Cameroun accède à l'indépendance le <strong>1er janvier 1960</strong> sous la présidence d'<strong>Ahmadou Ahidjo</strong>. En <strong>1961</strong>, le Southern Cameroons rejoint le Cameroun après un plébiscite, réalisant ainsi la <strong>réunification</strong> du pays. Ahidjo met en place un <strong>parti unique</strong> (UNC) et une économie libérale. En <strong>1982</strong>, <strong>Paul Biya</strong> lui succède et engage une <strong>démocratisation</strong> avec le retour au multipartisme en <strong>1990</strong>. Cependant, le Cameroun fait face à plusieurs défis : la <strong>crise économique</strong> des années 1980, la <strong>corruption</strong>, et plus récemment la <strong>crise anglophone</strong> (depuis 2016) et le <strong>terrorisme</strong> de Boko Haram dans l'Extrême-Nord. Malgré ces difficultés, le Cameroun reste un pays clé en Afrique centrale, avec un potentiel agricole et minier important.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
