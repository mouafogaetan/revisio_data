<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Histoire",
 "classe": "Terminale",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Analyse de documents – La décolonisation de l'Algérie",
     "points": "6 pts",
     "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>Lisez attentivement les deux documents suivants puis répondez aux questions.</p><div style='background-color: #f5f5dc; padding: 15px; border-radius: 10px; border-left: 5px solid #8B0000; margin-bottom: 15px;'><p style='font-style: italic; font-weight: bold;'>Document 1 : Extrait du discours de Charles de Gaulle, 4 novembre 1954</p><p>« L'Algérie, c'est la France. Il n'y a pas de solution en dehors de la souveraineté française. La France ne peut pas abdiquer en Algérie. Elle y est chez elle. »</p></div><div style='background-color: #e8f0fe; padding: 15px; border-radius: 10px; border-left: 5px solid #1a56db;'><p style='font-style: italic; font-weight: bold;'>Document 2 : Extrait des Accords d'Évian, 18 mars 1962</p><p>« L'Algérie recouvre sa souveraineté et son indépendance. La France reconnaît l'indépendance de l'Algérie. [...] La coopération entre la France et l'Algérie sera établie sur des bases nouvelles. »</p></div>",
     "questions": [
       {
         "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Présentez brièvement le document 1 (auteur, date, contexte).</span></p>",
         "reponse": "<p>Le document 1 est un <strong>extrait d'un discours de Charles de Gaulle</strong>, alors président du Conseil, prononcé le <strong>4 novembre 1954</strong>. Il affirme la position française selon laquelle l'Algérie est « la France » et ne saurait être abandonnée.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Que reconnaît la France dans le document 2 ?</span></p>",
         "reponse": "<p>Le document 2, tiré des <strong>Accords d'Évian (18 mars 1962)</strong>, reconnaît l'<strong>indépendance et la souveraineté</strong> de l'Algérie. La France s'engage à établir une coopération sur de nouvelles bases avec le nouvel État.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>En quoi ces deux documents illustrent-ils l'évolution de la position française entre 1954 et 1962 ?</span></p>",
         "reponse": "<p>Ces deux documents montrent une <strong>évolution radicale de la position française</strong> : en 1954, De Gaulle affirme que l'Algérie est française et qu'il n'y a pas de solution en dehors de la souveraineté française. En 1962, après <strong>huit années de guerre</strong> (1954-1962) et une impasse militaire, la France reconnaît l'indépendance de l'Algérie. Ce revirement s'explique par l'<strong>échec militaire</strong> face au FLN, la <strong>pression internationale</strong> et la <strong>volonté de De Gaulle</strong> de mettre fin à un conflit qui divisait profondément la société française.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Le néocolonialisme en Afrique",
     "points": "5 pts",
     "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>Après les indépendances, les anciennes puissances coloniales ont maintenu leur influence sur les nouveaux États. Répondez aux questions suivantes.</p>",
     "questions": [
       {
         "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Définissez le concept de « néocolonialisme ».</span></p>",
         "reponse": "<p>Le <strong>néocolonialisme</strong> désigne le maintien de l'influence des anciennes puissances coloniales sur les États nouvellement indépendants, par des moyens <strong>économiques, culturels et politiques</strong> plutôt que par une domination directe. Il se manifeste par des <strong>accords de coopération</strong>, le contrôle des <strong>ressources naturelles</strong> et l'<strong>influence diplomatique</strong>.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Citez deux exemples concrets de néocolonialisme en Afrique.</span></p>",
         "reponse": "<p>Deux exemples concrets :<br>- La <strong>Françafrique</strong>, système d'influence politique et économique de la France en Afrique subsaharienne.<br>- La <strong>zone franc CFA</strong>, qui lie les monnaies de plusieurs pays d'Afrique francophone à l'économie française.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Quel est le rôle des multinationales dans le néocolonialisme ?</span></p>",
         "reponse": "<p>Les <strong>multinationales</strong> exploitent les <strong>ressources naturelles</strong> des pays africains (pétrole, minerais) dans des conditions souvent inéquitables. Leurs activités contribuent à la <strong>dépendance économique</strong> des États africains et à la <strong>détérioration de l'environnement</strong>.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Le Cameroun de 1982 à nos jours",
     "points": "5 pts",
     "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>L'histoire du Cameroun depuis 1982 est marquée par la présidence de Paul Biya. Répondez aux questions suivantes.</p>",
     "questions": [
       {
         "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Quand Paul Biya accède-t-il à la présidence du Cameroun ?</span></p>",
         "reponse": "<p>Paul Biya accède à la présidence du Cameroun le <strong>6 novembre 1982</strong>, succédant à Ahmadou Ahidjo.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Quelle a été l'une des grandes réformes politiques de Paul Biya ?</span></p>",
         "reponse": "<p>L'une des grandes réformes politiques de Paul Biya a été le <strong>retour au multipartisme</strong> avec la <strong>loi du 19 décembre 1990</strong>, mettant fin au parti unique.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Identifiez trois défis majeurs auxquels le Cameroun est confronté aujourd'hui.</span></p>",
         "reponse": "<p>Trois défis majeurs :<br>- La <strong>crise anglophone</strong> dans les régions du Nord-Ouest et du Sud-Ouest.<br>- Le <strong>terrorisme</strong> lié à Boko Haram dans l'Extrême-Nord.<br>- La <strong>corruption</strong> qui entrave le développement économique.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Questions à choix multiples",
     "points": "4 pts",
     "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>Pour chacune des affirmations suivantes, cochez la bonne réponse.</p>",
     "questions": [
       {
         "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Quelle colonie britannique a accédé à l'indépendance de manière pacifique en 1957 ?</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) Le Kenya</li><li>B) Le Ghana</li><li>C) L'Angola</li></ul>",
         "reponse": "<p><strong>Réponse correcte : B</strong> - Le <strong>Ghana</strong>, sous la direction de Kwame Nkrumah, a accédé à l'indépendance en 1957 par une voie pacifique.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Les Accords d'Évian ont mis fin à :</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) La guerre du Vietnam</li><li>B) La guerre d'Algérie</li><li>C) La guerre du Congo</li></ul>",
         "reponse": "<p><strong>Réponse correcte : B</strong> - Les <strong>Accords d'Évian</strong>, signés le 18 mars 1962, ont mis fin à la guerre d'Algérie (1954-1962) et reconnu l'indépendance de l'Algérie.</p>"
       },
       {
         "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Le Cameroun a connu son premier président en 1960. Il s'agit de :</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) Paul Biya</li><li>B) Ahmadou Ahidjo</li><li>C) Ruben Um Nyobé</li></ul>",
         "reponse": "<p><strong>Réponse correcte : B</strong> - <strong>Ahmadou Ahidjo</strong> a été le premier président de la République du Cameroun après l'indépendance le 1er janvier 1960.</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
