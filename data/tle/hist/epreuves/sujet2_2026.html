<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Terminale",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Maîtrise des connaissances et des concepts",
      "points": "8 pts",
      "enonce": "<div style='padding: 15px; background-color: #f8fafc; border-radius: 8px; margin-bottom: 15px;'><p style='color: #1e293b;'>Répondez de manière précise et complète aux questions suivantes en mobilisant les connaissances acquises durant la séquence sur les conflits du XXe siècle, la décolonisation et l'émergence d'un monde bipolaire.</p></div>",
      "questions": [
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>1) Expliquez le concept de <strong>Guillaume-Sapin</strong> en vous appuyant sur les doctrines économiques de l'après-Seconde Guerre mondiale. (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='4' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<p style='color: #166534;'>Le concept de <strong>Guillaume-Sapin</strong> renvoie à la division de l'Europe et du monde en deux blocs opposés, caractérisée par l'affrontement des idéologies capitaliste (menée par les États-Unis avec le Plan Marshall et l'OTAN) et communiste (menée par l'URSS avec la doctrine Jdanov et le CAEM) durant la Guerre froide.</p>"
        },
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>2) Citez les deux super-grands qui émergent après la Seconde Guerre mondiale et précisez les organisations qu'ils mettent en place pour structurer leurs blocs respectifs en Europe. (3 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='4' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<div style='color: #166534;'><p>Les deux super-grands sont :</p><ul><li><strong>Les États-Unis</strong> : mettent en place le <strong>Plan Marshall</strong> (aide économique) et l'<strong>OTAN</strong> (alliance militaire).</li><li><strong>L'URSS</strong> : met en place le <strong>CAEM</strong> (aide économique pour les pays de l'Est) et le <strong>Pacte de Varsovie</strong> (alliance militaire).</li></ul></div>"
        },
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>3) Comparez les <strong>processus d'indépendance</strong> du Ghana et du Kenya. (3 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='6' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<div style='color: #166534;'><p><strong>Ghana (1957) :</strong> indépendance obtenue de manière <strong>pacifique</strong> sous la direction de <strong>Kwame Nkrumah</strong>, à l'issue de négociations avec les Britanniques.</p><p><strong>Kenya (1963) :</strong> indépendance précédée par la <strong>révolte des Mau Mau</strong> (1952-1960), un soulèvement armé contre la domination britannique. Cette lutte a conduit à des négociations et à l'indépendance sous <strong>Jomo Kenyatta</strong>.</p></div>"
        }
      ]
    },
    {
      "titre": "Étude de document : Les crises du bloc de l'Est",
      "points": "6 pts",
      "enonce": "<div style='padding: 15px; background-color: #f8fafc; border-radius: 8px; margin-bottom: 15px;'><p style='color: #1e293b;'>Analysez le texte suivant puis répondez aux questions.</p><div style='padding: 15px; background-color: #e2e8f0; border-radius: 8px;'><p style='color: #1e293b; font-style: italic;'>'Le 23 août 1968, les troupes du Pacte de Varsovie, à l'exception de la Roumanie, envahissent la Tchécoslovaquie pour mettre fin au \"Printemps de Prague\", un mouvement de réforme politique et sociale initié par Alexandre Dubček. Ce dernier souhaitait créer un \"socialisme à visage humain\" en assouplissant le contrôle du parti unique et en libéralisant l'économie. L'intervention soviétique a mis fin à ces réformes et a réaffirmé la doctrine de la souveraineté limitée des pays du bloc de l'Est.'</p></div></div>",
      "questions": [
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>1) Qu'est-ce que le <strong>Printemps de Prague</strong> ? (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='3' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<p style='color: #166534;'>Le Printemps de Prague est un mouvement de réforme politique et sociale survenu en Tchécoslovaquie en 1968, mené par Alexandre Dubček, qui visait à assouplir le contrôle du parti unique et à libéraliser l'économie, créant un \"socialisme à visage humain\".</p>"
        },
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>2) Comment l'URSS a-t-elle réagi à ce mouvement et en quelle année ? (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='3' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<p style='color: #166534;'>L'URSS a réagi en <strong>envahissant la Tchécoslovaquie</strong> le <strong>21 août 1968</strong> avec les troupes du Pacte de Varsovie (à l'exception de la Roumanie), mettant ainsi fin aux réformes.</p>"
        },
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>3) Expliquez ce qu'implique la <strong>doctrine de la souveraineté limitée</strong> mentionnée dans le texte. (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='4' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<p style='color: #166534;'>La <strong>doctrine de la souveraineté limitée</strong> (ou doctrine Brejnev) affirme que l'URSS a le droit d'intervenir dans les affaires intérieures des pays du bloc de l'Est si leur régime communiste est menacé. En pratique, cela signifie que les pays satellites n'ont pas une totale souveraineté et doivent se soumettre aux décisions soviétiques.</p>"
        }
      ]
    },
    {
      "titre": "Le conflit israélo-palestinien et les interventions étrangères au Moyen-Orient",
      "points": "6 pts",
      "enonce": "<div style='padding: 15px; background-color: #f8fafc; border-radius: 8px; margin-bottom: 15px;'><p style='color: #1e293b;'>La région du Moyen-Orient est marquée par des conflits récurrents. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>1) Quelles sont les <strong>origines du conflit israélo-palestinien</strong> ? (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='4' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<div style='color: #166534;'><p>Les origines sont multiples :</p><ul><li>La <strong>Déclaration Balfour</strong> de 1917, qui promet un foyer national juif en Palestine.</li><li>Le <strong>mandat britannique</strong> sur la Palestine après la Première Guerre mondiale.</li><li>Le <strong>plan de partage de l'ONU</strong> de 1947, qui prévoit la création d'un État juif et d'un État arabe en Palestine.</li></ul></div>"
        },
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>2) Citez les <strong>principales guerres</strong> du conflit israélo-arabe et leurs dates. (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='4' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<div style='color: #166534;'><p>Les principales guerres sont :</p><ul><li><strong>1948</strong> : guerre entre Israël et les pays arabes (création de l'État d'Israël).</li><li><strong>1956</strong> : crise de Suez.</li><li><strong>1967</strong> : guerre des Six Jours.</li><li><strong>1973</strong> : guerre du Kippour.</li></ul></div>"
        },
        {
          "question": "<div style='padding: 10px;'><p style='color: #1e293b; font-weight: bold;'>3) Expliquez le <strong>rôle des interventions étrangères</strong> dans la guerre civile syrienne (2011-présent). (2 pts)</p><textarea style='width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1;' rows='4' placeholder='Votre réponse...'></textarea></div>",
          "reponse": "<div style='color: #166534;'><p>Les interventions étrangères ont été multiples :</p><ul><li>Soutien de la <strong>Russie</strong> au régime de Bachar al-Assad (intervention militaire directe depuis 2015).</li><li>Soutien des <strong>États-Unis</strong> et de leurs alliés (France, Royaume-Uni) à l'opposition et aux forces kurdes.</li><li>Intervention de la <strong>Turquie</strong> contre les Kurdes.</li><li>Soutien de l'<strong>Iran</strong> et du <strong>Hezbollah</strong> au régime syrien.</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
