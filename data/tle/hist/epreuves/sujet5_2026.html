<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Terminale",
  "sequence": "Séquence 5 : Décolonisation, néocolonialisme et défis contemporains du Cameroun",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Vérification des ressources : définitions et concepts clés",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Consigne :</strong> Réponds par une définition précise et complète à chacune des questions suivantes. Chaque réponse est notée sur <strong>1,5 point</strong>.</p><p><em>Les notions abordées sont extraites des thèmes de la séquence : la décolonisation, le néocolonialisme, la construction nationale camerounaise et les défis contemporains.</em></p></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>1) Définis le concept de <strong>néocolonialisme</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le <strong>néocolonialisme</strong> désigne l'influence persistante qu'exercent les anciennes puissances coloniales ou d'autres pays industrialisés sur les pays nouvellement indépendants, par des moyens économiques, culturels et politiques plutôt que par une domination directe [d'après le programme]. Cette domination se manifeste par le contrôle des ressources, l'imposition de politiques économiques et la présence de multinationales. Le néocolonialisme maintient les pays du Sud dans un état de dépendance, malgré leur indépendance politique [citation:1].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>2) Qu'est-ce qu'un <strong>parti unique</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Un <strong>parti unique</strong> est un système politique dans lequel un seul parti politique est autorisé à fonctionner et à exercer le pouvoir. Toute opposition est interdite ou fortement réprimée. Ce système a été instauré dans de nombreux pays africains après l'indépendance, dont le Cameroun en 1966 avec l'Union Nationale Camerounaise (UNC) [citation:4], sous prétexte d'unité nationale et de développement.</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>3) C'est quoi la <strong>guerre de décolonisation</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>La <strong>guerre de décolonisation</strong> est un conflit armé opposant un peuple colonisé à la puissance coloniale, dans le but d'obtenir son indépendance. Ce type de conflit a marqué l'histoire de plusieurs colonies, notamment l'Algérie (1954-1962) et le Kenya (1952-1960). Au Cameroun, la lutte armée menée par l'Union des Populations du Cameroun (UPC) à partir de 1955 est considérée comme une guerre de décolonisation [citation:2].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>4) Explique le terme de <strong>\"Françafrique\"</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le terme <strong>\"Françafrique\"</strong> désigne les relations étroites, souvent occultes, que la France entretient avec ses anciennes colonies africaines. Ce réseau d'influence mêle intérêts politiques, économiques et personnels, et vise à maintenir la domination française sur le continent. La politique de la Françafrique est souvent critiquée comme une forme de néocolonialisme [d'après le programme].</div>"
        }
      ]
    },
    {
      "titre": "Étude de cas : le processus d'indépendance du Cameroun",
      "points": "8 pts",
      "enonce": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Document :</strong> Chronologie de l'indépendance et de la réunification du Cameroun.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #4caf50; margin: 10px 0; color: #1a1a1a;'><ul><li><strong>1er janvier 1960 :</strong> Indépendance du Cameroun oriental (sous tutelle française).</li><li><strong>21 février 1960 :</strong> Référendum constitutionnel. Ahmadou Ahidjo est élu président le 5 mai 1960.</li><li><strong>1er octobre 1961 :</strong> La partie méridionale du Cameroun britannique (Southern Cameroons) accède à l'indépendance et rejoint la République du Cameroun pour former la République Fédérale du Cameroun [citation:4].</li></ul></div><p><strong>Document 2 :</strong> Les acteurs du nationalisme camerounais.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #ff9800; margin: 10px 0; color: #1a1a1a;'><p>« L'Union des Populations du Cameroun (UPC), créée en 1948, a été le principal mouvement nationaliste au Cameroun. Ses leaders, Ruben Um Nyobé et Félix Moumié, ont réclamé l'indépendance immédiate. Leur lutte armée, commencée en 1955, a été réprimée par les autorités françaises. Le parti a été interdit en 1955. » </p><p style='text-align: right;'>— Source : manuel d'histoire, classe de Terminale.</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>5) À partir du document 1, identifie les deux dates clés de l'indépendance du Cameroun.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les deux dates clés de l'indépendance du Cameroun sont :<br>- Le <strong>1er janvier 1960</strong> : indépendance du Cameroun oriental (sous tutelle française).<br>- Le <strong>1er octobre 1961</strong> : réunification avec le Cameroun méridional (ancien territoire britannique) pour former la République Fédérale du Cameroun [citation:4].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>6) Explique pourquoi l'indépendance du Cameroun s'est faite en deux étapes.</div>",
          "reponse": "<div style='color: #1a1a1a;'>L'indépendance du Cameroun s'est faite en deux étapes en raison de la division du pays entre deux puissances coloniales après la Première Guerre mondiale [citation:4]. La France et le Royaume-Uni administraient séparément leurs territoires sous mandats puis sous tutelle de l'ONU. Chaque territoire a suivi son propre processus de décolonisation, aboutissant à des dates d'indépendance différentes, avant de se réunifier en 1961.</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>7) D'après le document 2, quel rôle l'UPC a-t-elle joué dans le processus d'indépendance ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>L'Union des Populations du Cameroun (UPC) a été le <strong>principal mouvement nationaliste</strong> au Cameroun, réclamant l'indépendance immédiate. Sa lutte armée, initiée en 1955, a été sévèrement réprimée. Bien qu'interdit, l'UPC a contribué à <strong>mettre la question de l'indépendance au centre du débat politique</strong> et a préparé le terrain pour la décolonisation [citation:2].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>8) Pourquoi le nationalisme camerounais a-t-il connu des voies différentes (pacifique et armée) ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le nationalisme camerounais a emprunté des voies différentes en raison des divergences stratégiques entre les acteurs. L'UPC a choisi la <strong>lutte armée</strong> face au refus de la France d'accorder l'indépendance immédiate. D'autres acteurs, comme Ahmadou Ahidjo, ont privilégié la <strong>voie politique et négociée</strong>, qui a finalement abouti à l'indépendance [citation:4].</div>"
        }
      ]
    },
    {
      "titre": "Analyse d'une situation contemporaine : les défis du Cameroun",
      "points": "6 pts",
      "enonce": "<div style='background-color: #fce4ec; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Document :</strong> Les défis du Cameroun contemporain.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #e74c3c; margin: 10px 0; color: #1a1a1a;'><p>« Le Cameroun fait face à plusieurs défis aujourd'hui. La <strong>crise anglophone</strong> dans les régions du Nord-Ouest et du Sud-Ouest, qui a débuté en 2016, oppose les séparatistes au gouvernement central. Le <strong>terrorisme</strong> de Boko Haram menace l'extrême nord du pays depuis 2014. La <strong>corruption</strong> reste un problème majeur. L'économie, bien que diversifiée, reste vulnérable aux chocs extérieurs. »</p><p style='text-align: right;'>— Source : manuel d'histoire, classe de Terminale.</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>9) Identifie les trois défis majeurs auxquels le Cameroun est confronté aujourd'hui.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les trois défis majeurs auxquels le Cameroun est confronté sont :<br>- La <strong>crise anglophone</strong> (Nord-Ouest et Sud-Ouest).<br>- Le <strong>terrorisme</strong> de Boko Haram dans l'extrême nord.<br>- La <strong>corruption</strong> et la vulnérabilité économique [citation:4].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>10) Explique la nature du conflit dans les régions du Nord-Ouest et du Sud-Ouest du Cameroun.</div>",
          "reponse": "<div style='color: #1a1a1a;'>La crise dans les régions du Nord-Ouest et du Sud-Ouest, dite <strong>crise anglophone</strong>, est un conflit qui oppose des mouvements séparatistes réclamant l'indépendance de ces régions (qu'ils appellent \"Ambazonie\") au gouvernement central. Ce conflit a des racines historiques liées au système du fédéralisme et aux frustrations des populations anglophones, qui estiment être marginalisées [citation:4].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>11) Propose deux mesures que le gouvernement pourrait prendre pour renforcer l'unité nationale.</div>",
          "reponse": "<div style='color: #1a1a1a;'><p>Deux mesures possibles pour renforcer l'unité nationale :</p><p>- <strong>Promouvoir le dialogue inclusif</strong> : engager des négociations avec les représentants des différentes communautés pour trouver une solution politique à la crise anglophone.</p><p>- <strong>Renforcer le développement équilibré</strong> : investir dans les régions défavorisées pour réduire les inégalités économiques et sociales entre les différentes parties du pays.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
