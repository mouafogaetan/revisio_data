<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>

<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Philo Tle CD",
 "classe": "Terminale CD",
 "sequence": "Evaluation Sequentielle N°1",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Dissertation philosophique",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>L'évaluation en philosophie au Cameroun, selon les directives officielles, vise à « apprécier l'exercice du jugement du candidat et sa capacité à construire une réflexion personnelle, argumentée et cohérente » et à « vérifier l'approfondissement critique des connaissances déjà acquises » [citation:1].<br><br> En vous appuyant sur les notions et les auteurs abordés dans le chapitre « Qu'est-ce que la philosophie ? », vous traiterez le sujet de dissertation suivant :<br><br> <div style='text-align: center; font-weight: bold; font-size: 1.2rem; margin: 15px 0;'>« La philosophie est-elle une science comme les autres ? »</div> <br> Vous rédigerez une dissertation complète et structurée, en suivant les critères d'évaluation officiels.<br><br> <div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; margin-top: 15px; color: #212529;'> <strong>Rappel des critères d'évaluation de la dissertation au Cameroun :</strong> [citation:1]<br> <ul style='margin: 5px 0; padding-left: 20px;'> <li><strong>Présentation (P)</strong> : 2 pts</li> <li><strong>Introduction (I)</strong> : 4 pts</li> <li><strong>Examen du problème (EP)</strong> : 5 pts</li> <li><strong>Précision des termes, maîtrise du vocabulaire philosophique et rédaction (R)</strong> : 3 pts</li> <li><strong>Connaissance des auteurs (CA)</strong> : 4 pts</li> <li><strong>Conclusion (C)</strong> : 2 pts</li> </ul> </div> </div>",
     "questions": [
       {
         "question": "Rédigez une dissertation complète sur le sujet : « La philosophie est-elle une science comme les autres ? »",
         "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'> <strong>Exemple de plan détaillé pour la dissertation :</strong><br><br> <strong>Introduction :</strong> Amorce (étonnement face à la diversité des savoirs), analyse du sujet (philosophie/science), problématique (la philosophie partage-t-elle la méthode et l'objet des sciences ?), annonce du plan (thèse, antithèse, synthèse).<br><br> <strong>Développement :</strong> <br> <ul> <li><strong>Thèse (I) : La philosophie se distingue de la science par son objet et sa méthode.</strong> <ul> <li>La science a un objet défini, la philosophie interroge l'être, la connaissance et les valeurs (métaphysique, épistémologie, éthique).</li> <li>La méthode scientifique est hypothético-déductive ou expérimentale ; la méthode philosophique est réflexive, critique, conceptuelle (Descartes, doute méthodique).</li> <li>La science cherche des lois, la philosophie cherche le sens.</li> </ul> </li> <li><strong>Antithèse (II) : La philosophie entretient des liens étroits avec la science et partage son idéal de rationalité.</strong> <ul> <li>Historiquement, la philosophie est la « mère » des sciences (Descartes, Comte). La science est née de la philosophie.</li> <li>La philosophie et la science partagent un idéal commun : la recherche de la vérité par la raison (Platon, Aristote).</li> <li>La philosophie éclaire la science en interrogeant ses fondements (rupture épistémologique de Bachelard).</li> </ul> </li> <li><strong>Synthèse (III) : Philosophie et science sont complémentaires.</strong> <ul> <li>La science répond au « comment », la philosophie au « pourquoi ».</li> <li>La philosophie est une « science » au sens étymologique de connaissance, mais une science particulière (Kant).</li> <li>Elles sont nécessaires l'une à l'autre : la science a besoin de la philosophie pour interroger ses présupposés, la philosophie a besoin de la science pour ancrer ses réflexions dans le réel.</li> </ul> </li> </ul> <strong>Conclusion :</strong> Synthèse (la philosophie n'est pas une science comme les autres mais elle en partage l'idéal), réponse à la problématique (non, mais elle est indispensable), ouverture (sur la question du progrès).</div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Explication de texte",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Ce deuxième exercice est une explication de texte. Vous devez analyser le texte proposé en suivant la méthode de l'explication de texte philosophique : dégager le thème, la thèse, le problème, le plan, expliquer les concepts clés et discuter l'intérêt philosophique du texte [citation:2][citation:3].<br><br> <div style='border-left: 4px solid #6c757d; background-color: #e9ecef; padding: 15px; margin: 10px 0; color: #212529;'> <strong>TEXTE :</strong> « Il suffit que nous parlions d’un objet pour nous croire objectifs. »<br> <div style='text-align: right;'> – Gaston Bachelard, <em>Le Nouvel Esprit scientifique</em> (1934) </div> </div> <br> Dans cet extrait, le philosophe Gaston Bachelard, figure majeure de l'épistémologie, met en garde contre une illusion courante. Il s'agit de comprendre en quoi le simple fait de parler d'un objet ne garantit pas l'objectivité de notre discours.<br><br> Pour vous guider dans votre travail, vous répondrez aux questions suivantes : [citation:1] </div>",
     "questions": [
       {
         "question": "1) Dégagez l'idée générale du texte. (3 pts)",
         "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>L'idée générale du texte est que le langage, même lorsqu'il semble désigner des objets réels, peut être le vecteur de subjectivité. Bachelard critique l'illusion selon laquelle le simple fait de nommer et de parler d'une chose nous rendrait objectifs. Le langage est un piège : il nous fait croire que nous avons une connaissance objective alors que nous restons souvent prisonniers de nos préjugés, de nos représentations ou de notre subjectivité. La véritable objectivité ne se réduit pas à l'acte de parole, elle nécessite une démarche scientifique rigoureuse, critique et consciente de ses propres limites.</div>"
       },
       {
         "question": "2) Expliquez les concepts suivants : « parler », « objet », « objectif ». (2 pts)",
         "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><ul><li><strong>« Parler »</strong> : Désigne l'acte de langage, la mise en mots de la pensée. Pour Bachelard, le langage n'est pas un simple reflet neutre du réel, mais une construction humaine chargée de présupposés culturels et personnels.</li><li><strong>« Objet »</strong> : Ce dont on parle, la réalité extérieure visée par le discours. Bachelard souligne que l'objet n'est pas donné immédiatement dans le langage ; il est toujours médiatisé par les mots.</li><li><strong>« Objectif »</strong> : Se dit d'un discours qui prétend être neutre, impartial et conforme à la réalité. Bachelard montre que cette prétention est naïve. L'objectivité est un idéal difficile à atteindre, qui exige une critique constante du langage et des représentations.</li></ul></div>"
       },
       {
         "question": "3) En quoi ce texte illustre-t-il le projet épistémologique de Bachelard ? (3 pts)",
         "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Ce texte illustre parfaitement le projet épistémologique de Bachelard, qui est de fonder une « philosophie du non » ou un « nouvel esprit scientifique ». Bachelard insiste sur la nécessité d'une rupture épistémologique avec les connaissances premières, les opinions et les préjugés. Le simple fait de parler d'un objet, c'est déjà s'engager dans un discours non critique, non scientifique. Pour atteindre une véritable connaissance scientifique, il faut se défaire de ces évidences langagières, soumettre les concepts à la critique et construire un objet de science qui ne se confond pas avec l'objet commun du langage. La phrase « Il suffit que nous parlions d’un objet pour nous croire objectifs » est une critique radicale de cette illusion de transparence du langage.</div>"
       },
       {
         "question": "4) Rédigez un essai (réflexion personnelle) dans lequel vous discutez la thèse de Bachelard. Dans quelle mesure le langage peut-il être un obstacle à l'objectivité ? (12 pts) [citation:1]",
         "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'><strong>Exemple d'essai :</strong><br><br> Bachelard affirme que « Il suffit que nous parlions d’un objet pour nous croire objectifs », soulignant ainsi le caractère trompeur du langage. Cette thèse met en lumière un obstacle majeur à la connaissance objective : le langage n'est pas un outil neutre, mais un système de représentation qui structure notre pensée et peut déformer la réalité. Comme le souligne Bachelard, le langage scientifique, comme tout langage, est imparfait et peut véhiculer des préjugés.<br><br> Le langage nous enferme souvent dans des catégories préétablies. Parler d'un « objet », c'est déjà lui attribuer une existence stable et une identité, ce qui peut être un obstacle à la compréhension de phénomènes complexes et mouvants. Les mots ne sont pas les choses ; ils sont des « images » mentales qui peuvent nous éloigner de la réalité. Par exemple, parler de « temps » ou d'« espace » comme de substances peut nous empêcher de les concevoir comme des relations, comme le fera la physique relativiste. En ce sens, le langage est un obstacle épistémologique, comme l'a montré Bachelard lui-même : il faut se méfier du langage courant et construire un langage scientifique rigoureux, capable de s'affranchir des évidences premières.<br><br> Cependant, il serait excessif de condamner le langage en bloc. Le langage est aussi ce qui permet la connaissance. Il est l'outil de l'échange, de la mise en commun des idées et de la critique. La science elle-même ne peut se passer du langage : elle élabore des concepts, des définitions, des théories, toutes exprimées dans un langage formalisé. L'enjeu est donc de faire un usage critique du langage, de ne pas confondre les mots et les choses, tout en reconnaissant la nécessité des mots pour penser et communiquer. En définitive, Bachelard nous invite à une vigilance constante : l'objectivité n'est pas un don du langage, mais une conquête difficile sur nos propres représentations.</div>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
