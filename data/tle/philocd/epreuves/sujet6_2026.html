<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->

    crossorigin="anonymous">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philosophie Tle CD",
  "classe": "Terminale C et D",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "DISSERTATION PHILOSOPHIQUE",
      "points": "10 points",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p><strong>Traité l'un des deux sujets suivants :</strong></p><br><p><strong>Sujet 1 :</strong> La connaissance scientifique permet-elle de se passer de la philosophie ?</p><br><p><strong>Sujet 2 :</strong> La liberté de l'homme est-elle une illusion ?</p><br><p><strong>Consignes :</strong></p><ul><li>La dissertation doit comporter une introduction, un développement structuré en parties (thèse, antithèse, synthèse) et une conclusion.</li><li>L'introduction doit comporter une amorce, une analyse du sujet, une problématique et une annonce du plan.</li><li>Le développement doit être argumenté avec des références philosophiques précises.</li></ul><br><p><em>Méthodologie pour la dissertation :</em></p><ul><li><strong>Introduction :</strong> Amorce (citation, fait d'actualité, opinion), analyse des termes du sujet, dégagement de la problématique, annonce du plan.</li><li><strong>Développement :</strong> Thèse (défense d'une position), antithèse (limites de la thèse), synthèse (dépassement). Chaque partie comporte des arguments et des références.</li><li><strong>Conclusion :</strong> Rappel du cheminement, réponse à la problématique, ouverture.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='color: #333;'><strong>Sujet 1 :</strong> La connaissance scientifique permet-elle de se passer de la philosophie ?<br><br><em>Indications pour le traitement :</em><br>1) Analyser les termes du sujet : \"connaissance scientifique\", \"se passer de\", \"philosophie\".<br>2) Dégager la problématique : La science suffit-elle à éclairer l'homme et le monde ?<br>3) Construire un plan dialectique.</div>",
          "reponse": "<div style='color: #333;'><p><strong>Éléments de réponse pour le sujet 1 :</strong></p><br><p><strong>Introduction :</strong></p><ul><li><strong>Amorce :</strong> La science moderne, par ses avancées fulgurantes, semble répondre à toutes les questions que l'homme se pose sur le monde. Pourtant, la philosophie continue d'exister et d'interroger la science elle-même.</li><li><strong>Analyse :</strong> La connaissance scientifique est une forme de savoir empirique et vérifiable. \"Se passer de\" signifie que la philosophie pourrait être rendue inutile par la science.</li><li><strong>Problématique :</strong> La science, dans sa quête de vérité objective, rend-elle la philosophie caduque, ou la philosophie demeure-t-elle une démarche irremplaçable ?</li><li><strong>Annonce du plan :</strong> Nous verrons d'abord que la science peut sembler suffire pour expliquer le monde (I), puis que cette position a des limites (II), pour enfin montrer que philosophie et science sont complémentaires (III).</li></ul><br><p><strong>Développement :</strong></p><ul><li><strong>I - La science comme mode de connaissance suffisant :</strong><ul><li>La science produit des connaissances objectives et universellement vérifiables.</li><li>La méthode scientifique (observation, expérimentation, formalisation) semble plus rigoureuse que la spéculation philosophique.</li><li><em>Référence :</em> Auguste Comte et le positivisme : la science est le stade ultime du développement de l'esprit humain.</li></ul></li><li><strong>II - Les limites de cette prétention :</strong><ul><li>La science ne répond pas aux questions du sens (\"pourquoi\" existons-nous ?).</li><li>La science est un produit de l'histoire et de la culture, elle n'est pas neutre.</li><li><em>Référence :</em> Gaston Bachelard : la science procède par rupture épistémologique, elle ne donne pas accès à une vérité définitive.</li></ul></li><li><strong>III - Une complémentarité nécessaire :</strong><ul><li>La philosophie interroge les fondements et les finalités de la science.</li><li>La philosophie nourrit l'esprit critique et permet de penser les enjeux éthiques de la science.</li><li><em>Référence :</em> Kant : la philosophie pose la question de l'usage de la raison.</li></ul></li></ul><br><p><strong>Conclusion :</strong></p><ul><li><strong>Synthèse :</strong> La science ne peut se passer de la philosophie car celle-ci interroge le sens et la finalité de la connaissance.</li><li><strong>Ouverture :</strong> La philosophie est une exigence pour que la science reste humaine.</li></ul></div>"
        },
        {
          "question": "<div style='color: #333;'><strong>Sujet 2 :</strong> La liberté de l'homme est-elle une illusion ?<br><br><em>Indications pour le traitement :</em><br>1) Analyser les termes du sujet : \"liberté\", \"homme\", \"illusion\".<br>2) Dégager la problématique : L'homme est-il vraiment libre ou sa liberté n'est-elle qu'une apparence ?<br>3) Construire un plan dialectique.</div>",
          "reponse": "<div style='color: #333;'><p><strong>Éléments de réponse pour le sujet 2 :</strong></p><br><p><strong>Introduction :</strong></p><ul><li><strong>Amorce :</strong> L'homme se vit comme libre, capable de choisir entre plusieurs possibles. Pourtant, les sciences humaines montrent que ses choix sont déterminés par des causes multiples.</li><li><strong>Analyse :</strong> La liberté est la capacité à agir selon sa propre volonté. L'illusion est une croyance sans fondement dans la réalité.</li><li><strong>Problématique :</strong> La liberté humaine est-elle une réalité effective ou un simple sentiment nous trompant sur nous-mêmes ?</li><li><strong>Annonce du plan :</strong> Nous examinerons d'abord l'expérience vécue de la liberté (I), puis les arguments du déterminisme (II), pour enfin tenter un dépassement (III).</li></ul><br><p><strong>Développement :</strong></p><ul><li><strong>I - L'expérience vécue de la liberté :</strong><ul><li>Chaque homme a le sentiment intime d'être libre.</li><li>Cette expérience est indéniable (je choisis, je décide).</li><li><em>Référence :</em> Descartes : la liberté est une évidence de la conscience.</li></ul></li><li><strong>II - La liberté comme illusion face au déterminisme :</strong><ul><li>Le déterminisme physique : tout événement a une cause, y compris nos actions.</li><li>Le déterminisme social et psychologique : l'individu est façonné par son éducation, son milieu, son inconscient.</li><li><em>Référence :</em> Spinoza : l'homme qui croit être libre est comme une pierre qui croirait tomber librement.</li></ul></li><li><strong>III - La liberté comme projet et responsabilité :</strong><ul><li>L'homme est condamné à être libre : il doit choisir.</li><li>La liberté n'est pas un état mais un acte constant.</li><li><em>Référence :</em> Sartre : l'homme est responsable de ce qu'il fait, la liberté est une responsabilité absolue.</li></ul></li></ul><br><p><strong>Conclusion :</strong></p><ul><li><strong>Synthèse :</strong> La liberté n'est pas une illusion, mais elle n'est pas un donné ; elle est une conquête permanente de l'homme sur les déterminismes.</li><li><strong>Ouverture :</strong> La liberté implique de reconnaître la responsabilité qui en découle.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "EXPLICATION DE TEXTE",
      "points": "10 points",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333;'><p><strong>Texte :</strong></p><br><p>« L'homme est né libre, et partout il est dans les fers. Tel se croit le maître des autres, qui ne laisse pas d'être plus esclave qu'eux. Comment ce changement s'est-il fait ? Je l'ignore. Qu'est-ce qui peut le rendre légitime ? Je crois pouvoir répondre à cette question. Si je ne considérais que la force et l'effet qui en dérive, je dirais : \"Tant qu'un peuple est contraint d'obéir et qu'il obéit, il fait bien ; sitôt qu'il peut secouer le joug et qu'il le secoue, il fait encore mieux ; car, recouvrant sa liberté par le même droit qui la lui a ravie, ou il est fondé à la reprendre, ou l'on n'était pas fondé à la lui ôter.\" Mais l'ordre social est un droit sacré qui sert de base à tous les autres. Cependant ce droit ne vient point de la nature ; il est donc fondé sur des conventions. Il s'agit de savoir quelles sont ces conventions. »</p><br><p style='text-align: right;'>Rousseau, <em>Du Contrat social</em>, Livre I, chapitre 1.</p><br><p><strong>Consignes :</strong></p><ul><li>L'explication de texte doit comporter une introduction, un développement structuré selon les grandes étapes du texte, et une conclusion.</li><li>L'introduction doit présenter : le thème, la thèse de l'auteur, la problématique et le plan.</li><li>Le développement doit suivre le mouvement du texte, en expliquant chaque étape argumentative.</li><li>La conclusion doit rappeler la thèse et dégager l'enjeu philosophique.</li></ul><br><p><em>Méthodologie pour l'explication de texte :</em></p><ul><li><strong>Introduction :</strong> Présentation de l'auteur et de l'œuvre, situation du texte, thème, thèse, problématique, annonce du plan.</li><li><strong>Développement :</strong> Suivre les étapes du texte : premier mouvement (les lignes 1 à ...), deuxième mouvement, etc. Pour chaque mouvement : explication des concepts, des arguments, de la logique.</li><li><strong>Conclusion :</strong> Bilan de l'analyse, réponse à la problématique, enjeux philosophiques du texte.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='color: #333;'><strong>Question 1 :</strong> Rédiger l'introduction de l'explication de texte.<br><br><em>Votre introduction doit comporter :</em><br>1) Une présentation du texte (auteur, œuvre, thème général).<br>2) La formulation de la thèse de Rousseau.<br>3) La problématique dégagée du texte.<br>4) L'annonce du plan (les grandes étapes du texte).</div>",
          "reponse": "<div style='color: #333;'><p><strong>Introduction rédigée :</strong></p><br><p>Jean-Jacques Rousseau, philosophe du XVIIIe siècle, est l'un des penseurs majeurs de la philosophie politique moderne. Dans son ouvrage fondateur <em>Du Contrat social</em> (1762), il s'interroge sur les fondements de l'autorité politique et sur la légitimité du pouvoir. Le texte proposé est l'incipit de l'ouvrage, où Rousseau pose le problème central de la liberté humaine en société.</p><br><p>La thèse de Rousseau est que l'homme, bien que libre par nature, se trouve partout soumis à une autorité qu'il n'a pas choisie. Contre ceux qui justifieraient l'oppression par la force, Rousseau affirme que seul un ordre social fondé sur des conventions libres peut être légitime. Ainsi, la liberté naturelle ne peut être sacrifiée sans raison.</p><br><p>La problématique que soulève ce texte est la suivante : sur quoi fonder la légitimité d'un ordre social qui aliène la liberté naturelle de l'homme ? Autrement dit, comment concilier la liberté individuelle et l'obéissance politique ?</p><br><p>Pour répondre à cette question, nous suivrons le mouvement du texte : dans un premier temps, Rousseau expose le paradoxe de la liberté perdue (lignes 1-4) ; dans un second temps, il écarte la justification par la force pour poser la nécessité d'une convention (lignes 4-8).</p></div>"
        },
        {
          "question": "<div style='color: #333;'><strong>Question 2 :</strong> Rédiger le développement de l'explication de texte.<br><br><em>Consignes :</em><br>1) Découper le texte en mouvements significatifs.<br>2) Pour chaque mouvement, expliquer la pensée de Rousseau en vous appuyant sur le texte.<br>3) Montrer comment Rousseau construit son argumentation.</div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
