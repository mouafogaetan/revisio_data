<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philo Tle CD",
  "classe": "Terminale C/D",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Analyse et construction d'une thèse philosophique",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p>La <strong>thèse</strong> est la première partie du développement d'une dissertation philosophique. Elle consiste à défendre une position argumentée en réponse à la problématique posée, en mobilisant des références philosophiques et des exemples pertinents.</p><p><strong>Sujet :</strong> <em>« La liberté consiste-t-elle à faire ce que l'on veut ? »</em></p><p><strong>Consigne :</strong> Rédigez la partie <strong>thèse</strong> de la dissertation en respectant la structure suivante :</p><ul style='padding-left: 20px;'><li>Présentation claire de la thèse (1 à 2 phrases)</li><li>Argument 1 : justification avec un exemple ou une référence philosophique</li><li>Argument 2 : justification avec un exemple ou une référence philosophique</li><li>Transition vers l'antithèse (1 phrase)</li></ul><p>Votre développement doit comporter environ <strong>200 à 250 mots</strong>.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>Rédiger la partie thèse de la dissertation sur le sujet : « La liberté consiste-t-elle à faire ce que l'on veut ? »</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Thèse :</strong> La liberté ne consiste pas simplement à faire ce que l'on veut, car elle est fondamentalement conditionnée par la raison et la responsabilité.</p><p><strong>Argument 1 :</strong> La liberté véritable suppose la maîtrise de soi et l'usage de la raison. Pour <strong>Kant</strong>, l'homme n'est vraiment libre que lorsqu'il agit selon la loi morale qu'il se donne à lui-même, c'est-à-dire par devoir et non par inclination. Agir selon ses désirs immédiats, c'est au contraire être esclave de ses pulsions, donc perdre sa liberté. La liberté est ainsi autonomie, c'est-à-dire obéissance à une loi que l'on s'est prescrite.</p><p><strong>Argument 2 :</strong> La liberté est aussi limitée par la présence d'autrui. Ma liberté s'arrête là où commence celle des autres. Comme le rappelle la célèbre formule, ma liberté ne consiste pas à nuire à celle d'autrui. La vie en société exige que nos actions soient compatibles avec la liberté d'autrui, ce qui implique des devoirs et des interdits. La liberté est donc fondamentalement relationnelle et sociale.</p><p><strong>Transition :</strong> Cependant, on pourrait soutenir que la liberté est d'abord cette capacité à choisir et à agir selon sa volonté, ce qui semble contredire cette première approche et mérite d'être examiné.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Construction d'une antithèse argumentée",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p>Après avoir développé une thèse, la dissertation philosophique exige une <strong>antithèse</strong>, c'est-à-dire une partie qui expose les limites de la thèse ou une position contradictoire, permettant ainsi de nuancer la réflexion.</p><p><strong>Consigne :</strong> À partir de la thèse que vous avez rédigée dans l'exercice précédent, construisez l'<strong>antithèse</strong> en suivant la même structure :</p><ul style='padding-left: 20px;'><li>Présentation de l'antithèse</li><li>Argument 1 avec référence philosophique</li><li>Argument 2 avec référence philosophique</li><li>Transition vers la synthèse</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>Rédiger la partie antithèse en réponse à la thèse développée précédemment.</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Antithèse :</strong> On peut soutenir au contraire que la liberté consiste précisément à faire ce que l'on veut, car elle est d'abord une puissance d'agir et de choisir selon sa volonté.</p><p><strong>Argument 1 :</strong> La liberté, dans son sens le plus commun, renvoie à l'absence d'obstacle. Être libre, c'est pouvoir réaliser ses désirs et ses projets sans contrainte extérieure. Dans cette perspective, la liberté est une puissance d'agir : plus j'ai de possibilités d'action, plus je suis libre. C'est la conception défendue par <strong>Spinoza</strong> pour qui la liberté est la puissance d'exister et d'agir, et par <strong>Descartes</strong> qui voit dans le libre arbitre la marque de la perfection humaine.</p><p><strong>Argument 2 :</strong> Faire ce que l'on veut, c'est aussi affirmer sa singularité et son autonomie. <strong>Sartre</strong> soutient que l'homme est condamné à être libre : il n'a pas de nature prédéterminée, il se définit par ses choix. Dès lors, la liberté est cette capacité à se créer soi-même par ses actes, ce qui implique de pouvoir faire ce que l'on décide. La liberté est donc projet et création de soi.</p><p><strong>Transition :</strong> Pour dépasser cette opposition, il convient de montrer que la liberté ne se réduit ni à l'absence de contrainte ni à l'obéissance à la raison, mais qu'elle est une construction dynamique entre ces deux pôles.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Synthèse et conclusion d'une dissertation",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p>La <strong>synthèse</strong> est la partie de la dissertation qui dépasse l'opposition thèse/antithèse pour proposer une réponse nuancée à la problématique. Elle est suivie de la <strong>conclusion</strong> qui ouvre vers de nouvelles perspectives.</p><p><strong>Consigne :</strong> À partir des parties thèse et antithèse que vous avez rédigées, rédigez la <strong>synthèse</strong> et la <strong>conclusion</strong> de la dissertation. La synthèse doit comporter environ <strong>150 mots</strong> et la conclusion <strong>50 mots</strong>.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>Rédiger la synthèse et la conclusion de la dissertation sur le sujet : « La liberté consiste-t-elle à faire ce que l'on veut ? »</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Synthèse :</strong> La liberté ne saurait être réduite à un simple faire ce que l'on veut, car elle suppose la maîtrise de soi et le respect d'autrui. Toutefois, elle ne consiste pas non plus en une obéissance aveugle à la raison, car elle est d'abord une expérience vécue de choix et de création de soi. En réalité, la liberté est un idéal qui se conquiert : elle est à la fois pouvoir d'agir et responsabilité. Elle suppose un équilibre entre l'affirmation de sa volonté et la conscience des limites imposées par la raison, la société et la condition humaine. La liberté véritable est donc celle qui intègre la contrainte comme condition de son exercice.</p><p><strong>Conclusion :</strong> Ainsi, la liberté n'est ni le simple accomplissement des désirs, ni la soumission à des règles extérieures. Elle est une construction personnelle et sociale qui exige lucidité, engagement et responsabilité. C'est pourquoi elle demeure une question ouverte, toujours à repenser, et qui fait de l'homme un être inachevé en quête de sens.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Analyse critique d'un plan de dissertation",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Sujet :</strong> <em>« Faut-il avoir peur de la liberté ? »</em></p><p>Voici le plan proposé par un élève :</p><ul style='padding-left: 20px;'><li><strong>Thèse :</strong> La liberté est une valeur positive qu'il ne faut pas craindre.</li><ul><li>Argument 1 : La liberté permet l'épanouissement personnel.</li><li>Argument 2 : La liberté est le fondement de la démocratie.</li></ul><li><strong>Antithèse :</strong> La liberté peut faire peur car elle implique des responsabilités.</li><ul><li>Argument 1 : La liberté engage notre responsabilité.</li><li>Argument 2 : La liberté peut conduire à l'isolement.</li></ul><li><strong>Synthèse :</strong> La liberté est une conquête qui demande du courage.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a;'>Évaluer la pertinence de ce plan. Le plan est-il équilibré ? Les arguments sont-ils bien articulés ? Proposez des améliorations concrètes.</div>",
          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Évaluation :</strong></p><ul style='padding-left: 20px;'><li><strong>Structure :</strong> Le plan respecte la structure ternaire (thèse/antithèse/synthèse). Il est globalement équilibré dans sa forme.</li><li><strong>Problème majeur :</strong> La thèse et l'antithèse ne sont pas suffisamment problématisées. La thèse affirme que la liberté est positive, mais sans nuance ni référence philosophique. L'antithèse évoque la peur, mais sans approfondir les raisons de cette peur.</li><li><strong>Manque de références :</strong> Aucun auteur n'est mentionné. Or une dissertation philosophique doit s'appuyer sur des références (Kant, Sartre, Spinoza, etc.) pour étayer les arguments.</li></ul><p><strong>Plan amélioré :</strong></p><ul style='padding-left: 20px;'><li><strong>Thèse :</strong> La liberté est une valeur émancipatrice qui ne doit pas être crainte.</li><ul><li>Argument 1 : Pour <strong>Kant</strong>, la liberté est autonomie et dignité de l'homme.</li><li>Argument 2 : Pour <strong>Sartre</strong>, la liberté est le fondement de l'humanité.</li></ul><li><strong>Antithèse :</strong> La liberté est source d'angoisse car elle nous confronte à notre responsabilité.</li><ul><li>Argument 1 : <strong>Sartre</strong> parle d'angoisse face à la liberté et à l'absence de repères.</li><li>Argument 2 : <strong>Kierkegaard</strong> évoque le vertige de la liberté.</li></ul><li><strong>Synthèse :</strong> La liberté est une conquête qui implique à la fois joie et angoisse ; elle est le prix de notre humanité et exige du courage.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Application à un sujet de type baccalauréat",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Sujet :</strong> <em>« La liberté est-elle une illusion ? »</em></p><p>En vous appuyant sur le schéma thèse-antithèse-synthèse et sur les auteurs étudiés (Kant, Sartre, Spinoza, Descartes, etc.), rédigez une dissertation complète en respectant les règles de la dissertation philosophique.</p><p><strong>Structure attendue :</strong></p><ul style='padding-left: 20px;'><li>Introduction complète (amorce, analyse du sujet, problématique, annonce du plan)</li><li>Développement (thèse, antithèse, synthèse) avec au moins deux arguments par partie et des références philosophiques</li><li>Conclusion (réponse à la problématique et ouverture)</li></ul></div>",

          "reponse": "<div style='font-size:16px; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: #1a1a1a; line-height: 1.6;'><p><strong>Introduction :</strong></p><p>L'expression « être libre » évoque spontanément l'idée d'agir selon sa volonté, sans contrainte. Pourtant, notre existence est marquée par des déterminismes biologiques, sociaux et psychologiques. Dès lors, la liberté est-elle une réalité ou une illusion ? Si la liberté semble être une évidence pour la conscience, elle est contestée par les sciences humaines et par certaines philosophies déterministes. Faut-il voir dans la liberté une simple construction mentale ou une expérience authentique de l'humanité ?</p><p><strong>Thèse : La liberté est une réalité vécue qui définit l'humanité.</strong></p><p><em>Argument 1 :</em> La conscience que nous avons de notre liberté est indéniable. <strong>Sartre</strong> affirme que l'homme est condamné à être libre. Cette liberté est même le fondement de notre dignité : nous ne sommes pas des choses, nous nous définissons par nos choix.</p><p><em>Argument 2 :</em> La liberté est aussi une exigence morale. Pour <strong>Kant</strong>, être libre, c'est agir selon la loi morale que l'on se donne à soi-même, ce qui distingue l'homme de l'animal et fait de lui une fin en soi. La liberté est ainsi le fondement de la morale.</p><p><strong>Antithèse : La liberté est une illusion entretenue par notre ignorance des déterminismes.</strong></p><p><em>Argument 1 :</em> Les sciences de la nature et les sciences humaines montrent que nos actions sont déterminées par des causes physiques, biologiques ou sociales. <strong>Spinoza</strong> soutient que l'homme croit être libre parce qu'il ignore les causes qui le déterminent.</p><p><em>Argument 2 :</em> La psychanalyse a mis en lumière l'influence de l'inconscient sur nos choix, ce qui relativise la notion de libre arbitre. <strong>Freud</strong> montre que nous ne sommes pas maîtres dans notre propre maison, et que l'inconscient oriente nos décisions.</p><p><strong>Synthèse :</strong> La liberté n'est ni une illusion totale ni une réalité absolue. Elle est une conquête sur les déterminismes. L'homme ne naît pas libre, il le devient en prenant conscience des déterminismes qui pèsent sur lui et en exerçant sa raison pour les surmonter. La liberté est donc une tâche, un projet qui donne sens à l'existence humaine.</p><p><strong>Conclusion :</strong> La liberté n'est pas une illusion, mais elle n'est pas non plus un donné. Elle est un idéal à construire, une responsabilité à assumer. C'est en cela qu'elle fait la grandeur et la difficulté de la condition humaine, et qu'elle demeure une question philosophique fondamentale.</p></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
