<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Philosophie",
 "classe": "Terminale CD",
 "sequence": "Séquence 2",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Question de compréhension - Les fondements de la logique",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>La logique classique, dont Aristote est considéré comme le fondateur, établit les règles formelles du raisonnement valide [citation:3].</p><p>Répondez aux questions suivantes en vous appuyant sur vos connaissances du cours.</p></div>",
     "questions": [
       {
         "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> Quelle est la différence entre un raisonnement déductif et un raisonnement inductif ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Le <strong>raisonnement déductif</strong> part d'une règle générale pour aboutir à une conclusion particulière. Il est valide si la conclusion découle nécessairement des prémisses. Par exemple : \"Tous les hommes sont mortels, Socrate est un homme, donc Socrate est mortel.\" Cette forme de raisonnement, appelée syllogisme, a été formalisée par Aristote.</p><p>Le <strong>raisonnement inductif</strong> part d'observations particulières pour aboutir à une règle générale. Il est probable, mais pas certain. Par exemple : \"Je constate que tous les cygnes que j'ai vus sont blancs, donc tous les cygnes sont blancs.\" Ce raisonnement, théorisé par Bacon, est à la base de la méthode scientifique.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> Expliquez le principe de non-contradiction et donnez un exemple de son application.</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Le <strong>principe de non-contradiction</strong> est un principe fondamental de la logique, énoncé par Aristote. Il stipule qu'il est impossible qu'une chose soit et ne soit pas en même temps et sous le même rapport [citation:3]. En d'autres termes, une proposition ne peut pas être à la fois vraie et fausse.</p><p><strong>Exemple :</strong> Il est impossible qu'à un moment donné, \"il pleut\" et \"il ne pleut pas\" soient tous deux vrais. L'un de ces énoncés est vrai, l'autre est faux, ou les deux sont faux, mais ils ne peuvent pas être vrais simultanément.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> À quoi sert la logique dans une dissertation philosophique ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>La logique est essentielle dans la dissertation philosophique car elle permet de structurer la pensée, d'éviter les contradictions et de convaincre par la rigueur de l'argumentation [citation:3].</p><p>Elle sert à :</p><ul><li>Construire un raisonnement cohérent où chaque idée découle logiquement de la précédente.</li><li>Détecter les failles ou les paralogismes dans son propre raisonnement ou dans celui des auteurs étudiés.</li><li>Assurer la progression de la démonstration, de l'introduction à la conclusion, en passant par la thèse, l'antithèse et la synthèse.</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Question de réflexion - La liberté selon Sartre",
     "points": "6 pts",
     "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Jean-Paul Sartre affirme que \"l'homme est condamné à être libre\". Cette formule célèbre résume la conception existentialiste de la liberté.</p><p>Répondez aux questions suivantes pour analyser cette affirmation.</p></div>",
     "questions": [
       {
         "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> Expliquez en quoi, selon Sartre, la liberté est une condition et un fardeau.</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Pour Sartre, l'homme n'a pas d'essence préétablie, contrairement à un objet comme un coupe-papier qui a une fonction définie. L'homme existe d'abord, et il se définit ensuite par ses actes et ses choix : c'est le principe de l'existentialisme [citation:3].</p><p>La liberté est donc une <strong>condition</strong> parce qu'elle est constitutive de l'être humain : nous ne pouvons pas ne pas être libres. Nous sommes même \"condamnés\" à cette liberté, car nous n'avons pas demandé à naître, ni à avoir à choisir.</p><p>Mais cette liberté est aussi un <strong>fardeau</strong> parce que nous sommes entièrement responsables de nos choix. Comme il n'y a pas de valeurs universelles qui nous guident, nous devons inventer nos propres valeurs. Cette responsabilité totale peut être source d'angoisse.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> Quelle différence Sartre fait-il entre la liberté et le libre arbitre ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Le <strong>libre arbitre</strong> est la capacité de choisir entre plusieurs options, d'être indéterminé. C'est une conception traditionnelle de la liberté, souvent discutée en termes de déterminisme (suis-je libre ou mes choix sont-ils déjà déterminés ?).</p><p>Pour Sartre, la <strong>liberté</strong> est plus radicale. Ce n'est pas seulement la faculté de choisir, c'est le fait même d'exister comme sujet qui doit se définir par ses choix. La liberté est la condition de possibilité de tous les choix, et non l'un d'entre eux. Elle est transcendance, c'est-à-dire dépassement constant de la situation donnée.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> Dans une dissertation sur la liberté, comment pourriez-vous utiliser l'idée de Sartre pour construire une antithèse ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Dans une dissertation, la thèse pourrait défendre l'idée d'une liberté totale et inconditionnée (Sartre).</p><p>L'<strong>antithèse</strong> pourrait consister à montrer les limites de cette liberté en utilisant d'autres auteurs :</p><ul><li><strong>Spinoza</strong> soutient que la liberté est une illusion : nous nous croyons libres parce que nous ignorons les causes qui nous déterminent. La véritable liberté consiste à comprendre les causes qui nous affectent.</li><li><strong>Marx</strong> montre que les conditions sociales et économiques (la lutte des classes) déterminent largement la conscience et les choix des individus.</li><li><strong>Freud</strong> met en évidence l'inconscient qui influence nos comportements à notre insu.</li></ul><p>L'antithèse montrerait donc que la liberté est contrainte par des déterminismes que nous ne maîtrisons pas toujours.</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Analyse de texte - Kant et les Lumières",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Analysez le texte suivant d'Emmanuel Kant et répondez aux questions.</p><div style='background-color: #e9ecef; padding: 12px; border-radius: 6px; margin: 10px 0; color: #212529;'><p><strong>Emmanuel Kant, <em>Qu'est-ce que les Lumières ?</em></strong> (1784)</p><p>\"Les Lumières, c'est la sortie de l'homme hors de l'état de minorité dont il est lui-même responsable. Minorité, c'est-à-dire incapacité de se servir de son entendement sans la direction d'autrui, minorité dont il est lui-même responsable, puisque la cause en est non pas un défaut de l'entendement, mais un défaut de la résolution et du courage de s'en servir sans la direction d'autrui. <strong>Sapere aude !</strong> Aie le courage de te servir de ton propre entendement ! Telle est la devise des Lumières.\"</p></div></div>",
     "questions": [
       {
         "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> Identifiez le thème principal de ce texte.</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Le thème principal de ce texte est la <strong>définition des Lumières</strong>. Kant cherche à définir ce mouvement intellectuel comme un processus d'émancipation de l'homme, où celui-ci apprend à penser par lui-même.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> Qu'est-ce que l'état de minorité selon Kant ? Quelle en est la cause ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>L'état de <strong>minorité</strong> est, pour Kant, l'incapacité de l'homme à se servir de son propre entendement sans être guidé par quelqu'un d'autre. C'est une situation où l'on renonce à penser par soi-même.</p><p>La cause de cette minorité n'est pas un manque d'intelligence (entendement), mais un <strong>manque de courage</strong> et de résolution. Les hommes restent dans cet état par paresse et par lâcheté, préférant se laisser guider plutôt que d'assumer la responsabilité de penser par eux-mêmes.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> Que signifie l'invitation <em>Sapere aude !</em> ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p><em>Sapere aude !</em> est une expression latine qui signifie <strong>\"Ose savoir !\"</strong> ou <strong>\"Aie le courage de te servir de ton propre entendement !\"</strong>.</p><p>C'est la devise des Lumières selon Kant. Elle invite chacun à sortir de la minorité en faisant preuve de courage pour penser par soi-même, sans se soumettre à l'autorité d'autrui. Cette invitation est à la fois un encouragement et un appel à la responsabilité individuelle.</p></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>4.</strong> Quels sont les enjeux de la pensée des Lumières selon Kant ?</div>",
         "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'><p>Les enjeux de la pensée des Lumières selon Kant sont multiples :</p><ul><li><strong>L'émancipation individuelle</strong> : chaque homme doit apprendre à penser par lui-même et à ne plus se laisser diriger.</li><li><strong>Le progrès de l'humanité</strong> : en sortant de la minorité, l'humanité progresse vers un état de majorité où règnent la raison et la liberté.</li><li><strong>La lutte contre l'obscurantisme</strong> : les Lumières s'opposent à toutes les formes d'autorité qui maintiennent les hommes dans l'ignorance (religion dogmatique, despotisme politique).</li><li><strong>La responsabilité individuelle</strong> : chacun est responsable de sa propre émancipation.</li></ul></div>"
       },
       {
         "question": "<div style='margin-bottom: 8px;'><strong>5.</strong> Rédigez une introduction de dissertation sur le sujet : \"Peut-on penser par soi-même ?\"</div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
