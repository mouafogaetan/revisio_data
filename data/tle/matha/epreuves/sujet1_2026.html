<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths Tle A",
  "classe": "Terminale",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations du second degré",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#333;'>Résoudre dans \\(\\mathbb{R}\\) les équations suivantes.</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#333;'>1) \\(2x^2 - 3x + 1 = 0\\)</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>Calcul du discriminant : \\(\\Delta = (-3)^2 - 4(2)(1) = 9 - 8 = 1\\).\n\n\\(\\Delta > 0\\), donc deux racines distinctes :\n\n\\(x_1 = \\dfrac{3 - \\sqrt{1}}{4} = \\dfrac{2}{4} = \\dfrac{1}{2}\\)\n\n\\(x_2 = \\dfrac{3 + \\sqrt{1}}{4} = \\dfrac{4}{4} = 1\\)\n\nEnsemble solution : \\(\\mathcal{S} = \\{\\dfrac{1}{2}; 1\\}\\)</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>2) \\(x^2 - 4x + 4 = 0\\)</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>\\(\\Delta = (-4)^2 - 4(1)(4) = 16 - 16 = 0\\).\n\n\\(\\Delta = 0\\), donc une racine double :\n\n\\(x = \\dfrac{4}{2} = 2\\)\n\nEnsemble solution : \\(\\mathcal{S} = \\{2\\}\\)</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>3) \\(-2x^2 + 3x - 5 = 0\\)</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>\\(\\Delta = 3^2 - 4(-2)(-5) = 9 - 40 = -31\\).\n\n\\(\\Delta < 0\\), donc pas de racine réelle.\n\nEnsemble solution : \\(\\mathcal{S} = \\emptyset\\)</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Signe du trinôme et inéquations",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#333;'>On considère le trinôme \\(f(x) = x^2 - 5x + 6\\).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#333;'>1) Déterminer le signe de \\(f(x)\\) et dresser son tableau de signes.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>\\(\\Delta = (-5)^2 - 4(1)(6) = 25 - 24 = 1\\).\n\nRacines : \\(x_1 = \\dfrac{5 - 1}{2} = 2\\) et \\(x_2 = \\dfrac{5 + 1}{2} = 3\\).\n\nTableau de signes :\n\n<div style='overflow-x:auto;'>\n<table style='border-collapse:collapse; width:100%; text-align:center;'>\n<tr><th style='border:1px solid #000; padding:8px;'><span style='color:#333;'>\\(x\\)</span></th><th style='border:1px solid #000; padding:8px;'><span style='color:#333;'>\\(-\\infty\\)</span></th><th style='border:1px solid #000; padding:8px;'><span style='color:#333;'>2</span></th><th style='border:1px solid #000; padding:8px;'><span style='color:#333;'>3</span></th><th style='border:1px solid #000; padding:8px;'><span style='color:#333;'>\\(+\\infty\\)</span></th></tr>\n<tr><td style='border:1px solid #000; padding:8px;'><span style='color:#333;'>\\(x^2-5x+6\\)</span></td><td style='border:1px solid #000; padding:8px;'><span style='color:#333;'>+</span></td><td style='border:1px solid #000; padding:8px;'><span style='color:#333;'>0</span></td><td style='border:1px solid #000; padding:8px;'><span style='color:#333;'>-</span></td><td style='border:1px solid #000; padding:8px;'><span style='color:#333;'>0</span></td><td style='border:1px solid #000; padding:8px;'><span style='color:#333;'>+</span></td></tr>\n</table>\n</div>\n\n<span style='color:#333;'>Donc \\(f(x) > 0\\) sur \\(]-\\infty; 2[ \\cup ]3; +\\infty[\\) et \\(f(x) < 0\\) sur \\(]2; 3[\\).</span></div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>2) En déduire l'ensemble solution de l'inéquation \\(x^2 - 5x + 6 \\leq 0\\).</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>D'après le tableau de signes, \\(f(x) \\leq 0\\) lorsque \\(x \\in [2; 3]\\).\n\nEnsemble solution : \\(\\mathcal{S} = [2; 3]\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Équations polynomiales de degré 3",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#333;'>Résoudre dans \\(\\mathbb{R}\\) l'équation : \\(x^3 - 3x^2 - 4x + 12 = 0\\).</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#333;'>1) Déterminer une racine évidente de l'équation.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>Testons \\(x = 2\\) : \\(2^3 - 3(2)^2 - 4(2) + 12 = 8 - 12 - 8 + 12 = 0\\).\n\nDonc \\(x = 2\\) est une racine évidente.</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>2) Factoriser le polynôme \\(P(x) = x^3 - 3x^2 - 4x + 12\\).</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>On factorise par \\((x - 2)\\) :\n\n\\(P(x) = (x - 2)(x^2 - x - 6)\\).\n\nOr \\(x^2 - x - 6 = (x - 3)(x + 2)\\).\n\nDonc \\(P(x) = (x - 2)(x - 3)(x + 2)\\).</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>3) En déduire l'ensemble des solutions de l'équation.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>\\((x - 2)(x - 3)(x + 2) = 0\\)\n\nRègle du produit nul : \\(x - 2 = 0\\) ou \\(x - 3 = 0\\) ou \\(x + 2 = 0\\).\n\nDonc \\(x = 2\\) ou \\(x = 3\\) ou \\(x = -2\\).\n\nEnsemble solution : \\(\\mathcal{S} = \\{-2; 2; 3\\}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Systèmes linéaires de trois équations à trois inconnues",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#333;'>Résoudre le système suivant par la méthode du pivot de Gauss :\n\n<div style='text-align:center;'>\n\\(\\begin{cases}\nx + y + z = 6 \\\\\n2x - y + z = 3 \\\\\nx + 2y - z = 3\n\\end{cases}\\)\n</div></div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#333;'>1) Écrire le système sous forme matricielle augmentée.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>\\(\\begin{pmatrix}\n1 & 1 & 1 & | & 6 \\\\\n2 & -1 & 1 & | & 3 \\\\\n1 & 2 & -1 & | & 3\n\\end{pmatrix}\\)</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>2) Résoudre le système en utilisant la méthode du pivot de Gauss.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>Opérations : \\(L_2 \\leftarrow L_2 - 2L_1\\) et \\(L_3 \\leftarrow L_3 - L_1\\) :\n\n\\(\\begin{pmatrix}\n1 & 1 & 1 & | & 6 \\\\\n0 & -3 & -1 & | & -9 \\\\\n0 & 1 & -2 & | & -3\n\\end{pmatrix}\\)\n\nOn permute \\(L_2\\) et \\(L_3\\) :\n\n\\(\\begin{pmatrix}\n1 & 1 & 1 & | & 6 \\\\\n0 & 1 & -2 & | & -3 \\\\\n0 & -3 & -1 & | & -9\n\\end{pmatrix}\\)\n\n\\(L_3 \\leftarrow L_3 + 3L_2\\) :\n\n\\(\\begin{pmatrix}\n1 & 1 & 1 & | & 6 \\\\\n0 & 1 & -2 & | & -3 \\\\\n0 & 0 & -7 & | & -18\n\\end{pmatrix}\\)\n\nOn obtient le système triangulaire :\n\n\\(\\begin{cases}\nx + y + z = 6 \\\\\ny - 2z = -3 \\\\\n-7z = -18\n\\end{cases}\\)\n\nDonc \\(z = \\dfrac{18}{7}\\).\n\n\\(y = -3 + 2z = -3 + \\dfrac{36}{7} = \\dfrac{-21 + 36}{7} = \\dfrac{15}{7}\\).\n\n\\(x = 6 - y - z = 6 - \\dfrac{15}{7} - \\dfrac{18}{7} = \\dfrac{42 - 15 - 18}{7} = \\dfrac{9}{7}\\).\n\nEnsemble solution : \\(\\mathcal{S} = \\left\\{\\left(\\dfrac{9}{7}; \\dfrac{15}{7}; \\dfrac{18}{7}\\right)\\right\\}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Problème de mise en équation",
      "points": "4 pts",
      "enonce": "<div style='font-size:16px; color:#333;'>Dans une ferme, il y a des poules, des chèvres et des vaches. Au total, on compte 30 têtes et 80 pattes. Sachant qu'il y a deux fois plus de poules que de chèvres, déterminer le nombre d'animaux de chaque espèce.</div>",
      "questions": [
        {
          "question": "<div style='font-size:16px; color:#333;'>1) Poser le système d'équations correspondant au problème.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>Soit \\(p\\) le nombre de poules, \\(c\\) le nombre de chèvres et \\(v\\) le nombre de vaches.\n\nNombre de têtes : \\(p + c + v = 30\\)\n\nNombre de pattes : \\(2p + 4c + 4v = 80\\) (les poules ont 2 pattes, les chèvres et vaches en ont 4)\n\nRelation entre poules et chèvres : \\(p = 2c\\)\n\nLe système est :\n\n\\(\\begin{cases}\np + c + v = 30 \\\\\n2p + 4c + 4v = 80 \\\\\np = 2c\n\\end{cases}\\)</div>"
        },
        {
          "question": "<div style='font-size:16px; color:#333;'>2) Résoudre le système et donner le nombre d'animaux de chaque espèce.</div>",
          "reponse": "<div style='font-size:16px; color:#333;'>En remplaçant \\(p = 2c\\) dans les deux premières équations :\n\n\\(2c + c + v = 30\\) donc \\(3c + v = 30\\).\n\n\\(2(2c) + 4c + 4v = 80\\) donc \\(4c + 4c + 4v = 80\\) soit \\(8c + 4v = 80\\), en divisant par 4 : \\(2c + v = 20\\).\n\nOn a donc le système :\n\n\\(\\begin{cases}\n3c + v = 30 \\\\\n2c + v = 20\n\\end{cases}\\)\n\nPar soustraction : \\(c = 10\\).\n\nAlors \\(v = 20 - 2(10) = 0\\) et \\(p = 2(10) = 20\\).\n\nIl y a donc 20 poules, 10 chèvres et aucune vache.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
