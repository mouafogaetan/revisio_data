<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths Tle A",
  "classe": "Terminale",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations et inéquations avec logarithmes et exponentielles",
      "points": "4 pts",
      "enonce": "Résoudre dans \\(\\mathbb{R}\\) les équations et inéquations suivantes :",
      "questions": [
        {
          "question": "1) \\( \\ln(2x - 1) = 3 \\)",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>Domaine de définition : \\(2x - 1 > 0 \\Rightarrow x > \\frac{1}{2}\\).</p><p style='color: #1e293b; margin-top: 8px;'>\\(\\ln(2x - 1) = 3 \\Rightarrow 2x - 1 = e^3 \\Rightarrow 2x = e^3 + 1 \\Rightarrow x = \\dfrac{e^3 + 1}{2}\\).</p><p style='color: #1e293b; margin-top: 8px;'>Cette valeur appartient bien au domaine de définition.</p><p style='color: #1e293b; margin-top: 8px;'><strong>Ensemble solution :</strong> \\( S = \\left\\{ \\dfrac{e^3 + 1}{2} \\right\\} \\)</p></div>"
        },
        {
          "question": "2) \\( e^{2x} + 2e^x - 15 \\ge 0 \\)",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>On pose \\( X = e^x > 0 \\). L'inéquation devient :</p><p style='color: #1e293b; margin: 0;'>\\( X^2 + 2X - 15 \\ge 0 \\).</p><p style='color: #1e293b; margin: 0;'>On calcule \\(\\Delta = 4 + 60 = 64\\), les racines sont \\(X_1 = 3\\) et \\(X_2 = -5\\).</p><p style='color: #1e293b; margin: 0;'>Le trinôme est positif sur \\(] - \\infty ; -5] \\cup [3 ; +\\infty[\\).</p><p style='color: #1e293b; margin: 0;'>Comme \\(X = e^x > 0\\), on a \\(X \\ge 3\\), soit \\(e^x \\ge 3\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Ensemble solution :</strong> \\( S = [\\ln 3 ; +\\infty[ \\)</p></div>"
        },
        {
          "question": "3) \\( \\ln^3 x - \\ln^2 x - 22\\ln x + 40 = 0 \\)",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>Domaine de définition : \\(x > 0\\).</p><p style='color: #1e293b; margin: 0;'>On pose \\( X = \\ln x \\). L'équation devient :</p><p style='color: #1e293b; margin: 0;'>\\( X^3 - X^2 - 22X + 40 = 0 \\).</p><p style='color: #1e293b; margin: 0;'>On remarque que \\(X = 2\\) est une racine évidente car \\(8 - 4 - 44 + 40 = 0\\).</p><p style='color: #1e293b; margin: 0;'>On factorise : \\((X - 2)(X^2 + X - 20) = 0\\).</p><p style='color: #1e293b; margin: 0;'>\\(\\Delta = 1 + 80 = 81\\), les racines sont \\(X_2 = -5\\) et \\(X_3 = 4\\).</p><p style='color: #1e293b; margin: 0;'>On a donc \\(X \\in \\{-5 ; 2 ; 4\\}\\), soit \\(\\ln x \\in \\{-5 ; 2 ; 4\\}\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Ensemble solution :</strong> \\( S = \\{ e^{-5} ; e^2 ; e^4 \\} \\)</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Étude complète d'une fonction",
      "points": "8 pts",
      "enonce": "On considère la fonction \\(f\\) définie par \\(f(x) = x - 3 - \\dfrac{2}{x+2}\\). On note \\(\\mathcal{C}\\) sa courbe représentative dans un repère orthonormé.",
      "questions": [
        {
          "question": "1) Déterminer le domaine de définition de \\(f\\).",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>La fonction \\(f\\) est définie pour tout \\(x\\) tel que \\(x+2 \\neq 0\\), soit \\(x \\neq -2\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Domaine de définition :</strong> \\(D_f = \\mathbb{R} \\setminus \\{-2\\} = ]-\\infty ; -2[ \\cup ]-2 ; +\\infty[\\)</p></div>"
        },
        {
          "question": "2) Calculer les limites de \\(f\\) aux bornes de son domaine de définition.",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>En \\(-\\infty\\) et \\(+\\infty\\) : \\(\\lim_{x \\to \\pm\\infty} \\dfrac{2}{x+2} = 0\\), donc \\(\\lim_{x \\to \\pm\\infty} f(x) = \\lim_{x \\to \\pm\\infty} (x-3) = \\pm\\infty\\).</p><p style='color: #1e293b; margin: 0;'>En \\(-2^{-}\\) : \\(\\lim_{x \\to -2^{-}} (x+2) = 0^{-}\\), donc \\(\\lim_{x \\to -2^{-}} \\dfrac{2}{x+2} = -\\infty\\), et \\(\\lim_{x \\to -2^{-}} (x-3) = -5\\).</p><p style='color: #1e293b; margin: 0;'>Ainsi \\(\\lim_{x \\to -2^{-}} f(x) = +\\infty\\).</p><p style='color: #1e293b; margin: 0;'>En \\(-2^{+}\\) : \\(\\lim_{x \\to -2^{+}} (x+2) = 0^{+}\\), donc \\(\\lim_{x \\to -2^{+}} \\dfrac{2}{x+2} = +\\infty\\), et \\(\\lim_{x \\to -2^{+}} f(x) = -\\infty\\).</p></div>"
        },
        {
          "question": "3) Montrer que la droite \\(\\Delta : y = x - 3\\) est une asymptote oblique à \\(\\mathcal{C}\\).",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>On a \\(f(x) - (x-3) = -\\dfrac{2}{x+2}\\).</p><p style='color: #1e293b; margin: 0;'>Or \\(\\lim_{x \\to \\pm\\infty} -\\dfrac{2}{x+2} = 0\\).</p><p style='color: #1e293b; margin-top: 8px;'>Donc la droite \\(\\Delta : y = x - 3\\) est une asymptote oblique à \\(\\mathcal{C}\\) en \\(-\\infty\\) et \\(+\\infty\\).</p></div>"
        },
        {
          "question": "4) Calculer \\(f'(x)\\) et étudier le signe de la dérivée.",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>\\(f'(x) = 1 - \\left(-\\dfrac{2}{(x+2)^2}\\right) = 1 + \\dfrac{2}{(x+2)^2}\\).</p><p style='color: #1e293b; margin: 0;'>Pour tout \\(x \\neq -2\\), \\((x+2)^2 > 0\\), donc \\(\\dfrac{2}{(x+2)^2} > 0\\).</p><p style='color: #1e293b; margin: 0;'>Ainsi \\(f'(x) > 0\\) sur \\(] -\\infty ; -2[ \\cup ]-2 ; +\\infty[\\).</p><p style='color: #1e293b; margin-top: 8px;'>La fonction \\(f\\) est strictement croissante sur chacun des intervalles de son domaine de définition.</p></div>"
        },
        {
          "question": "5) Dresser le tableau de variations de \\(f\\).",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Tableau de variations :</strong></p><div style='overflow-x: auto; margin-top: 8px;'><table style='width: 100%; border-collapse: collapse; background-color: #f8fafc; color: #1e293b;'><tr><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(x\\)</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(-\\infty\\)</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'></td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(-2\\)</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'></td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(+\\infty\\)</td></tr><tr><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(f'(x)\\)</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;' colspan='2'>+</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>||</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;' colspan='2'>+</td></tr><tr><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(f(x)\\)</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(-\\infty\\)</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>↗</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>||</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>↗</td><td style='border: 1px solid #cbd5e1; padding: 8px; text-align: center;'>\\(+\\infty\\)</td></tr></table></div></div>"
        },
        {
          "question": "6) Déterminer l'équation de la tangente à \\(\\mathcal{C}\\) au point d'abscisse \\(0\\).",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>L'équation de la tangente au point d'abscisse \\(a\\) est donnée par :</p><p style='color: #1e293b; margin: 0;'>\\(y = f'(a)(x - a) + f(a)\\).</p><p style='color: #1e293b; margin: 0;'>Calculons \\(f(0) = 0 - 3 - \\dfrac{2}{2} = -3 - 1 = -4\\).</p><p style='color: #1e293b; margin: 0;'>Calculons \\(f'(0) = 1 + \\dfrac{2}{(0+2)^2} = 1 + \\dfrac{2}{4} = 1 + \\dfrac{1}{2} = \\dfrac{3}{2}\\).</p><p style='color: #1e293b; margin: 0;'>Ainsi, \\(y = \\dfrac{3}{2}(x - 0) - 4 = \\dfrac{3}{2}x - 4\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Équation de la tangente :</strong> \\( y = \\dfrac{3}{2}x - 4 \\)</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Primitives",
      "points": "4 pts",
      "enonce": "Déterminer une primitive des fonctions suivantes :",
      "questions": [
        {
          "question": "1) \\( f(x) = \\dfrac{1}{2x - 1} \\) sur l'intervalle \\( \\left] \\dfrac{1}{2} ; +\\infty \\right[ \\)",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>On a \\(\\dfrac{1}{2x-1} = \\dfrac{1}{2} \\times \\dfrac{2}{2x-1}\\).</p><p style='color: #1e293b; margin: 0;'>La primitive de \\(\\dfrac{u'}{u}\\) est \\(\\ln|u|\\). Ici \\(u = 2x-1\\), donc \\(u' = 2\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Une primitive :</strong> \\( F(x) = \\dfrac{1}{2} \\ln(2x-1) \\)</p></div>"
        },
        {
          "question": "2) \\( g(x) = \\dfrac{x}{x^2 + 1} \\) sur \\(\\mathbb{R}\\)",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>On reconnaît la forme \\(\\dfrac{u'}{u}\\) avec \\(u = x^2 + 1\\), donc \\(u' = 2x\\).</p><p style='color: #1e293b; margin: 0;'>On a \\(\\dfrac{x}{x^2+1} = \\dfrac{1}{2} \\times \\dfrac{2x}{x^2+1}\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Une primitive :</strong> \\( G(x) = \\dfrac{1}{2} \\ln(x^2 + 1) \\)</p></div>"
        },
        {
          "question": "3) \\( h(x) = \\dfrac{1}{x\\ln x} \\) sur \\( ]1 ; +\\infty[ \\)",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>On pose \\(u = \\ln x\\), alors \\(u' = \\dfrac{1}{x}\\).</p><p style='color: #1e293b; margin: 0;'>On a \\(\\dfrac{1}{x\\ln x} = \\dfrac{u'}{u}\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Une primitive :</strong> \\( H(x) = \\ln(\\ln x) \\)</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Vérification d'une primitive",
      "points": "4 pts",
      "enonce": "Soit \\(F(x) = x\\ln x - x\\). Vérifier que \\(F\\) est une primitive de \\(f(x) = \\ln x\\) sur \\(]0 ; +\\infty[\\).",
      "questions": [
        {
          "question": "Vérification de la primitive",
          "reponse": "<div style='background-color: #f0f9ff; padding: 12px; border-radius: 6px;'><p style='color: #1e293b; margin: 0;'><strong>Solution :</strong></p><p style='color: #1e293b; margin: 0;'>Pour vérifier que \\(F\\) est une primitive de \\(f\\), il suffit de calculer \\(F'(x)\\) et de montrer que \\(F'(x) = f(x)\\).</p><p style='color: #1e293b; margin: 0;'>\\(F'(x) = \\ln x + x \\times \\dfrac{1}{x} - 1 = \\ln x + 1 - 1 = \\ln x\\).</p><p style='color: #1e293b; margin: 0;'>On a bien \\(F'(x) = \\ln x = f(x)\\) pour tout \\(x > 0\\).</p><p style='color: #1e293b; margin-top: 8px;'><strong>Conclusion :</strong> \\(F\\) est bien une primitive de \\(f\\) sur \\(]0 ; +\\infty[\\).</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
