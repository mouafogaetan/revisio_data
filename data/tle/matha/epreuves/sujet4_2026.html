<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Tle A",
  "sequence": "Séquence 4 : Statistiques et Ajustement Linéaire",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Ajustement linéaire par la méthode de Mayer",
      "points": "5 pts",
      "enonce": "<div style='padding: 10px;'>Pour la préparation d'une kermesse, une association a relevé le nombre de boissons vendues en fonction du prix unitaire. Le tableau suivant présente les données :<br><br><div style='background-color: #f8f9fa; border-left: 4px solid #007bff; padding: 12px; border-radius: 4px; color: #1d2124; font-family: monospace;'>\n<table style='width: 100%; border-collapse: collapse;'>\n    <tr style='background-color: #007bff; color: white;'>\n        <th style='padding: 8px; border: 1px solid #dee2e6;'>Prix x (FCFA)</th>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>200</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>250</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>300</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>350</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>400</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>450</td>\n    </tr>\n    <tr>\n        <th style='padding: 8px; border: 1px solid #dee2e6; background-color: #007bff; color: white;'>Quantité vendue</th>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>180</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>150</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>130</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>100</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>70</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>50</td>\n    </tr>\n</table>\n</div><br>\n<ol>\n    <li>Représenter le nuage de points de cette série statistique dans un repère orthogonal.</li>\n    <li>Déterminer les coordonnées du point moyen G de la série.</li>\n    <li>Utiliser la méthode de Mayer pour déterminer la droite d'ajustement. On subdivisera la série en deux groupes de trois points chacun.</li>\n    <li>Estimer, à l'aide de cette droite, le nombre de boissons qui seraient vendues si le prix unitaire était fixé à 500 FCFA.</li>\n</ol></div>",
      "questions": [
        {
          "question": "Représenter le nuage de points de cette série statistique dans un repère orthogonal. On prendra comme échelles : 1 cm pour 50 FCFA sur l'axe des abscisses (prix) et 1 cm pour 20 unités sur l'axe des ordonnées (quantités).",
          "reponse": "Nuage de points : chaque couple (prix, quantité) est représenté par un point dans le repère."
        },
        {
          "question": "Déterminer les coordonnées du point moyen G de la série statistique double (x, y).",
          "reponse": "Les coordonnées du point moyen G sont : <div class='math-block'><div class='math'>$$ \\bar{x} = \\frac{200+250+300+350+400+450}{6} = \\frac{1950}{6} = 325 $$</div></div><div class='math-block'><div class='math'>$$ \\bar{y} = \\frac{180+150+130+100+70+50}{6} = \\frac{680}{6} \\approx 113,33 $$</div></div> Donc G(325 ; 113,33)."
        },
        {
          "question": "En subdivisant la série en deux groupes de trois points chacun (les trois premiers puis les trois derniers), calculer les points moyens G₁ et G₂, puis déterminer l'équation de la droite de Mayer.",
          "reponse": "<strong>Groupe 1 :</strong> (200;180), (250;150), (300;130)<br>G₁ : <div class='math-block'><div class='math'>$$ \\bar{x}_1 = \\frac{200+250+300}{3} = \\frac{750}{3} = 250 $$</div></div><div class='math-block'><div class='math'>$$ \\bar{y}_1 = \\frac{180+150+130}{3} = \\frac{460}{3} \\approx 153,33 $$</div></div>G₁(250 ; 153,33).<br><br><strong>Groupe 2 :</strong> (350;100), (400;70), (450;50)<br>G₂ : <div class='math-block'><div class='math'>$$ \\bar{x}_2 = \\frac{350+400+450}{3} = \\frac{1200}{3} = 400 $$</div></div><div class='math-block'><div class='math'>$$ \\bar{y}_2 = \\frac{100+70+50}{3} = \\frac{220}{3} \\approx 73,33 $$</div></div>G₂(400 ; 73,33).<br><br><strong>Équation de la droite (G₁G₂) :</strong><br>Coefficient directeur : <div class='math-block'><div class='math'>$$ a = \\frac{73,33 - 153,33}{400 - 250} = \\frac{-80}{150} = -\\frac{8}{15} \\approx -0,53 $$</div></div>Ordonnée à l'origine : <div class='math-block'><div class='math'>$$ b = y_1 - a x_1 = 153,33 - (-0,53 \\times 250) = 153,33 + 132,5 = 285,83 $$</div></div>L'équation est : <div class='math-block'><div class='math'>$$ y = -\\frac{8}{15}x + \\frac{1715}{6} $$</div></div> ou <div class='math-block'><div class='math'>$$ y \\approx -0,53x + 285,83 $$</div></div>"
        },
        {
          "question": "À l'aide de l'équation de la droite de Mayer, estimer le nombre de boissons vendues pour un prix de 500 FCFA.",
          "reponse": "Pour x = 500 : <div class='math-block'><div class='math'>$$ y = -\\frac{8}{15} \\times 500 + \\frac{1715}{6} = -\\frac{4000}{15} + \\frac{1715}{6} = -\\frac{800}{3} + \\frac{1715}{6} = \\frac{-1600 + 1715}{6} = \\frac{115}{6} \\approx 19,17 $$</div></div>L'association peut estimer la vente d'environ <strong>19 boissons</strong> si le prix est fixé à 500 FCFA."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Utilisation de la droite d'ajustement",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px;'>Le tableau ci-dessous donne l'évolution du nombre d'abonnés à un service de streaming au Cameroun entre 2019 et 2024.<br><br><div style='background-color: #f8f9fa; border-left: 4px solid #28a745; padding: 12px; border-radius: 4px; color: #1d2124; font-family: monospace;'>\n<table style='width: 100%; border-collapse: collapse;'>\n    <tr style='background-color: #28a745; color: white;'>\n        <th style='padding: 8px; border: 1px solid #dee2e6;'>Année</th>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2019</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2020</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2021</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2022</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2023</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2024</td>\n    </tr>\n    <tr>\n        <th style='padding: 8px; border: 1px solid #dee2e6; background-color: #28a745; color: white;'>Rang x</th>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>0</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>1</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>2</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>3</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>4</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>5</td>\n    </tr>\n    <tr>\n        <th style='padding: 8px; border: 1px solid #dee2e6; background-color: #28a745; color: white;'>Abonnés (milliers)</th>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>50</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>65</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>82</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>104</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>130</td>\n        <td style='padding: 8px; border: 1px solid #dee2e6; text-align: center;'>165</td>\n    </tr>\n</table>\n</div><br>\n<ol>\n    <li>En utilisant la méthode de Mayer, déterminer la droite d'ajustement du nombre d'abonnés en fonction du rang x de l'année.</li>\n    <li>Estimer, à l'aide de cette droite, le nombre d'abonnés en 2027.</li>\n</ol></div>",
      "questions": [
        {
          "question": "Déterminer la droite d'ajustement par la méthode de Mayer.",
          "reponse": "<strong>Groupe 1 (3 premiers points) :</strong> (0;50), (1;65), (2;82)<br>G₁ : <div class='math-block'><div class='math'>$$ \\bar{x}_1 = \\frac{0+1+2}{3} = 1 $$</div></div><div class='math-block'><div class='math'>$$ \\bar{y}_1 = \\frac{50+65+82}{3} = \\frac{197}{3} \\approx 65,67 $$</div></div>G₁(1 ; 65,67).<br><br><strong>Groupe 2 (3 derniers points) :</strong> (3;104), (4;130), (5;165)<br>G₂ : <div class='math-block'><div class='math'>$$ \\bar{x}_2 = \\frac{3+4+5}{3} = 4 $$</div></div><div class='math-block'><div class='math'>$$ \\bar{y}_2 = \\frac{104+130+165}{3} = \\frac{399}{3} = 133 $$</div></div>G₂(4 ; 133).<br><br><strong>Équation de la droite (G₁G₂) :</strong><br>Coefficient directeur : <div class='math-block'><div class='math'>$$ a = \\frac{133 - 65,67}{4 - 1} = \\frac{67,33}{3} \\approx 22,44 $$</div></div>Ordonnée à l'origine : <div class='math-block'><div class='math'>$$ b = y_1 - a x_1 = 65,67 - 22,44 \\times 1 = 43,23 $$</div></div>L'équation est : <div class='math-block'><div class='math'>$$ y \\approx 22,44x + 43,23 $$</div></div>"
        },
        {
          "question": "Estimer le nombre d'abonnés en 2027.",
          "reponse": "Pour 2027, le rang est x = 2027 - 2019 = 8. <div class='math-block'><div class='math'>$$ y = 22,44 \\times 8 + 43,23 = 179,52 + 43,23 = 222,75 $$</div></div>Le nombre d'abonnés en 2027 est estimé à environ <strong>222 750 abonnés</strong>."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Approximation d'une droite",
      "points": "3 pts",
      "enonce": "<div style='padding: 10px;'>Les coordonnées du point moyen G d'une série sont (5 ; 12). La méthode de Mayer a donné les points G₁(2 ; 8) et G₂(8 ; 16).<br><br>Déterminer l'équation de la droite de Mayer et vérifier si le point G appartient à cette droite. Comment interpréter ce résultat ?</div>",
      "questions": [
        {
          "question": "Déterminer l'équation de la droite passant par G₁ et G₂.",
          "reponse": "Coefficient directeur : <div class='math-block'><div class='math'>$$ a = \\frac{16 - 8}{8 - 2} = \\frac{8}{6} = \\frac{4}{3} $$</div></div>Ordonnée à l'origine : <div class='math-block'><div class='math'>$$ b = y_1 - a x_1 = 8 - \\frac{4}{3} \\times 2 = 8 - \\frac{8}{3} = \\frac{24 - 8}{3} = \\frac{16}{3} $$</div></div>L'équation de la droite est : <div class='math-block'><div class='math'>$$ y = \\frac{4}{3}x + \\frac{16}{3} $$</div></div>"
        },
        {
          "question": "Vérifier que le point G(5 ; 12) appartient à la droite de Mayer. Que peut-on en conclure ?",
          "reponse": "Vérifions : <div class='math-block'><div class='math'>$$ \\frac{4}{3} \\times 5 + \\frac{16}{3} = \\frac{20 + 16}{3} = \\frac{36}{3} = 12 $$</div></div>Le point G(5 ; 12) appartient bien à la droite de Mayer.<br><br><strong>Interprétation :</strong> Dans ce cas, la droite de Mayer passe par le point moyen de la série. Cela signifie que la répartition des données en deux groupes est équilibrée et que la droite représente bien la tendance centrale de la série [citation:7]."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
