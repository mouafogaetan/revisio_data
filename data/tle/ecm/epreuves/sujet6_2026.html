<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale",
  "classe": "Terminale",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Compréhension du concept de relations internationales",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Le concept de relations internationales est au cœur des échanges entre les États et les organisations. Ce concept s'inscrit dans le cadre plus large de la coopération internationale.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez ce que sont les <strong>relations internationales</strong>. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Les relations internationales sont l'ensemble des rapports, des échanges et des interactions qui s'établissent entre les différents acteurs de la scène internationale, principalement les États, les organisations internationales et les ONG. Elles couvrent les domaines politique, économique, culturel, militaire et social.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Citez trois principaux acteurs des relations internationales et précisez leur rôle. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- <strong>Les États</strong> : acteurs souverains qui entretiennent des relations diplomatiques, signent des traités et participent aux organisations internationales.<br>- <strong>Les organisations internationales</strong> : comme l'ONU, l'Union Africaine ou l'UE, qui facilitent la coopération et la régulation entre les États.<br>- <strong>Les ONG</strong> : organisations non gouvernementales, comme Amnesty International, qui interviennent dans des domaines variés (droits de l'homme, environnement) sans être liées à un État particulier.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Identifiez et expliquez deux domaines de coopération internationale. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- <strong>La coopération économique</strong> : elle regroupe les échanges commerciaux, les investissements et les accords de libre-échange. L'Organisation Mondiale du Commerce (OMC) en est un acteur clé, visant à réduire les barrières douanières et à réguler le commerce mondial.<br>- <strong>La coopération culturelle et éducative</strong> : elle favorise le dialogue entre les peuples à travers des programmes d'échange (comme Erasmus), la promotion des langues et des cultures (Francophonie, Commonwealth).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les formes de coopération internationale",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>La coopération entre les États peut prendre des formes variées, chacune ayant ses spécificités et ses domaines d'application.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Qu'est-ce que la coopération <strong>bilatérale</strong> ? Donnez un exemple. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La coopération bilatérale est un partenariat direct entre deux États, sur la base d'accords spécifiques. Elle peut concerner des domaines comme la défense, l'économie ou la culture. Exemple : les accords entre le Cameroun et la France.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Expliquez la coopération <strong>multilatérale</strong> et citez un exemple d'organisation qui la met en œuvre. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La coopération multilatérale implique plusieurs États au sein d'une même organisation internationale. Elle permet de coordonner les actions et de prendre des décisions communes pour réguler les échanges ou résoudre des problèmes globaux. Un exemple est l'Organisation Mondiale du Commerce (OMC) qui régule le commerce international entre ses nombreux pays membres.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> En quoi la mondialisation renforce-t-elle l'importance de la coopération internationale ? (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>La mondialisation, en intensifiant les flux de biens, de capitaux, d'informations et de personnes, crée une interdépendance accrue entre les États. Aucun État ne peut plus agir isolément face aux enjeux globaux comme le changement climatique, les crises sanitaires ou les défis sécuritaires. La coopération internationale devient donc indispensable pour élaborer des règles communes, garantir la stabilité et assurer un développement durable et partagé.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : La place du Cameroun dans les organisations internationales",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Le Cameroun est un État membre actif de plusieurs organisations internationales, ce qui lui permet de défendre ses intérêts et de participer à la gouvernance mondiale.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Décrivez brièvement la position du Cameroun au sein de l'Organisation des Nations Unies (ONU). (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le Cameroun est membre de l'ONU depuis son accession à l'indépendance en 1960. Il y est un acteur engagé, notamment dans les missions de maintien de la paix (casques bleus) et dans les instances comme le Conseil des Droits de l'Homme. Il soutient les objectifs de l'organisation en matière de paix, de sécurité et de développement durable.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Quels sont les avantages pour le Cameroun de sa participation à la Francophonie ? (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La Francophonie permet au Cameroun de bénéficier d'une plateforme de coopération privilégiée avec d'autres pays francophones, notamment dans les domaines de l'éducation, de la culture, de la santé et du développement économique. Elle favorise également des échanges politiques et diplomatiques, renforçant sa visibilité internationale au sein d'une communauté partageant des valeurs communes.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Le Cameroun fait partie de plusieurs organisations sous-régionales comme la CEMAC. Expliquez l'importance de cette appartenance pour le pays. (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>L'appartenance du Cameroun à la CEMAC (Communauté Économique et Monétaire de l'Afrique Centrale) est cruciale. Elle lui permet de :<br>- Participer à l'intégration économique régionale (libre circulation des biens et des personnes).<br>- Bénéficier d'une monnaie commune (le franc CFA) et d'une politique monétaire coordonnée, qui assurent une stabilité économique.<br>- Coopérer avec ses voisins sur des projets d'infrastructures et de développement, renforçant ainsi sa position de leader naturel dans la sous-région.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les enjeux de l'aide au développement",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>L'aide au développement est un outil majeur des relations internationales, mais elle suscite des débats sur son efficacité et ses effets.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez l'aide au développement. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'aide au développement est l'ensemble des transferts de ressources (financières, techniques ou humaines) consentis par les pays développés ou les organisations internationales aux pays en développement (PED) pour les aider à améliorer leurs conditions de vie, leurs infrastructures et leurs capacités productives.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Identifiez deux avantages et deux inconvénients de l'aide au développement. (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'><strong>Avantages :</strong><br>- Elle permet de financer des projets d'infrastructures (écoles, hôpitaux, routes).<br>- Elle soutient les secteurs sociaux comme la santé et l'éducation.<br><br><strong>Inconvénients :</strong><br>- Elle peut créer une dépendance des pays bénéficiaires vis-à-vis des bailleurs de fonds.<br>- Elle est parfois conditionnée à des réformes économiques qui peuvent avoir des conséquences sociales négatives (comme l'exigeait le FMI dans certains cas).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> D'après vos connaissances, pourquoi l'aide au développement est-elle parfois critiquée ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'aide au développement est critiquée car elle est parfois inefficace, voire contre-productive. Elle peut être détournée par la corruption, créer une dépendance économique qui freine l'initiative locale, ou être utilisée comme un outil de pression politique par les pays donateurs. Elle ne s'accompagne pas toujours d'un transfert de compétences et peut maintenir les PED dans une situation de fragilité.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Synthèse sur l'intégration régionale et les défis",
      "points": "3 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Le Cameroun, à l'instar des autres pays africains, doit relever des défis majeurs pour tirer pleinement parti des relations internationales.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> En quoi l'Union Africaine (UA) est-elle importante pour le Cameroun ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'Union Africaine est importante pour le Cameroun car elle lui offre un cadre de coopération panafricain pour la paix, la sécurité et le développement. Elle permet de coordonner les politiques avec les autres États africains, de défendre des intérêts communs sur la scène mondiale et de contribuer à la résolution des conflits sur le continent.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Citez deux défis majeurs auxquels le Cameroun est confronté dans ses relations internationales. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- La dépendance économique vis-à-vis des anciennes puissances coloniales et des institutions financières internationales.<br>- La vulnérabilité face aux crises sécuritaires dans sa sous-région (Boko Haram, crise anglophone) qui nécessite une coopération renforcée avec ses voisins.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Que proposez-vous pour que le Cameroun améliore sa position dans la mondialisation ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Pour améliorer sa position, le Cameroun pourrait :<br>- Diversifier ses partenariats économiques (vers la Chine, l'Inde, ou d'autres pays émergents).<br>- Investir davantage dans l'éducation, la recherche et l'innovation pour produire des biens à plus forte valeur ajoutée et réduire sa dépendance aux exportations de matières premières.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
