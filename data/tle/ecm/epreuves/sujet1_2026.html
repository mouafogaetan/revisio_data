<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale",
  "classe": "Terminale",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Maîtrise des concepts fondamentaux",
      "points": "6 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'>Cet exercice vise à évaluer votre compréhension des concepts clés des relations internationales et de la coopération.<br><br><b>Consigne :</b> Répondez de manière précise et concise aux questions suivantes en vous appuyant sur vos connaissances.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><b>1)</b> Définissez le concept de <b>relations internationales</b> en précisant son champ d'action et ses principaux acteurs. <i>(2 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Les relations internationales sont l'ensemble des rapports politiques, économiques, sociaux et culturels qui s'établissent entre les acteurs de la scène internationale, principalement les États, mais aussi les organisations intergouvernementales (ONU, UA) et les organisations non gouvernementales (ONG). Elles régissent la coexistence et la coopération entre les peuples.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>2)</b> Identifiez et distinguez les trois formes principales de coopération internationale en donnant un exemple pour chacune. <i>(2 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>- <b>La coopération bilatérale :</b> elle oppose ou unit deux États. <i>Exemple :</i> La coopération entre le Cameroun et la France.<br>- <b>La coopération multilatérale :</b> elle regroupe plusieurs États au sein d'une organisation internationale. <i>Exemple :</i> L'action du Cameroun au sein de l'ONU.<br>- <b>La coopération décentralisée :</b> elle implique des collectivités territoriales (communes, régions). <i>Exemple :</i> Un partenariat entre la ville de Yaoundé et une ville européenne.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>3)</b> Quels sont les deux grands principes qui guident l'action extérieure du Cameroun selon la constitution ? <i>(2 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Les deux grands principes sont :<br>- <b>La paix</b> : le Cameroun privilégie le règlement pacifique des conflits.<br>- <b>La coopération</b> : le Cameroun s'engage dans des partenariats pour son développement, en respectant la souveraineté et l'égalité entre les États.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse d'un document et compréhension des enjeux",
      "points": "8 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'><b>Document :</b> Extrait du discours d'un chef d'État africain sur l'aide au développement. <br><br>\"L'aide au développement, dans sa forme actuelle, crée une relation de dépendance. Elle conditionne souvent nos politiques publiques et freine l'émergence d'une véritable autosuffisance. Notre continent regorge de richesses, mais il est victime de ses propres élites et d'un système économique mondial qui le pénalise. Nous devons repenser notre rapport à l'aide, promouvoir un partenariat gagnant-gagnant et miser sur une coopération Sud-Sud plus solidaire.\" <br><br><b>Consigne :</b> Après avoir analysé le document, répondez aux questions suivantes.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><b>1)</b> Selon l'auteur, quel est le principal effet pervers de l'aide au développement ? <i>(2 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>L'auteur estime que l'aide au développement crée une <b>relation de dépendance</b> qui conditionne les politiques des pays récipiendaires et freine leur autosuffisance.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>2)</b> En vous appuyant sur le texte et vos connaissances, expliquez les limites de l'aide au développement pour un pays comme le Cameroun. <i>(3 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Les limites de l'aide sont multiples : <br>- <b>La dépendance économique :</b> L'aide peut rendre le pays dépendant des financements extérieurs et le fragiliser en cas de baisse des dons.<br>- <b>La conditionnalité :</b> L'aide est souvent assortie de conditions (réformes économiques, politiques) qui ne correspondent pas toujours aux priorités nationales.<br>- <b>La mauvaise gestion :</b> Une partie de l'aide peut être détournée par la corruption ou mal employée, ne profitant pas aux populations.<br>- <b>L'endettement :</b> Une grande partie de l'aide est sous forme de prêts, ce qui contribue à alourdir la dette extérieure.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>3)</b> L'auteur évoque la notion de \"partenariat gagnant-gagnant\". En quoi cette approche pourrait-elle être plus bénéfique pour les pays africains ? <i>(3 pts)</i></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Un partenariat gagnant-gagnant repose sur l'égalité et le respect mutuel, contrairement à l'aide traditionnelle qui peut être perçue comme paternaliste. Il permettrait :<br>- <b>Un respect de la souveraineté :</b> Les pays africains définiraient eux-mêmes leurs priorités.<br>- <b>Un transfert de compétences :</b> Il favoriserait le partage de technologies et de savoir-faire, plutôt qu'un simple transfert de capitaux.<br>- <b>Un accès aux marchés :</b> Il pourrait faciliter l'exportation des produits africains vers les pays partenaires.<br>- <b>Une meilleure utilisation des ressources :</b> L'accent serait mis sur des projets réellement porteurs de développement durable.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Production d'un développement argumenté",
      "points": "6 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'>Cet exercice évalue votre capacité à structurer un raisonnement, à mobiliser vos connaissances et à argumenter de manière cohérente.<br><br><b>Sujet :</b> <i>\"Montrez que le Cameroun, à travers ses partenariats historiques et son engagement dans les organisations internationales, mène une diplomatie active au service de sa souveraineté et de son développement.\"</i></div>",
      "questions": [
        {
          "question": "<div>Votre production devra comporter une introduction, un développement structuré (en deux ou trois parties) et une conclusion. Vous utiliserez vos connaissances issues des chapitres 1 à 4 du programme.</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><b>Corrigé indicatif :</b><br><br><b>Introduction :</b><br>Le Cameroun, soucieux de son rayonnement et de son développement, a forgé une diplomatie active dès son indépendance. Celle-ci s'articule autour de principes forts, de partenariats historiques et d'une adhésion à de grandes organisations internationales. Il s'agit de montrer en quoi cette diplomatie est un instrument au service de sa souveraineté et de son essor.<br><br><b>I- Les principes et partenariats historiques, fondements de la diplomatie camerounaise</b><br>La diplomatie camerounaise repose sur des principes clairs : la paix, la coopération et le respect de la souveraineté des États. Elle s'appuie sur des relations privilégiées avec ses anciennes puissances tutélaires, notamment la France et la Grande-Bretagne, qui se manifestent par des accords de coopération dans les domaines économique, culturel et militaire. Cependant, cette relation est parfois critiquée pour le risque de dépendance qu'elle peut engendrer.<br><br><b>II- L'engagement multilatéral du Cameroun pour le développement et l'influence</b><br>Le Cameroun s'inscrit activement dans le multilatéralisme. Membre de l'ONU, il contribue aux missions de maintien de la paix et défend les droits de l'homme. Au sein de l'Union Africaine, il œuvre pour la paix et l'intégration du continent. Dans sa sous-région (CEMAC, CEEAC), il est un acteur majeur de la stabilité et de la coopération économique. Son adhésion à des organisations culturelles comme la Francophonie et le Commonwealth renforce son influence et ouvre des perspectives de coopération.<br><br><b>Conclusion :</b><br>Ainsi, la diplomatie camerounaise se veut équilibrée entre la préservation de liens historiques, l'engagement régional et la participation à la gouvernance mondiale. Bien que confrontée à des défis (dépendance économique, crises sécuritaires), elle demeure un outil essentiel pour affirmer la souveraineté du Cameroun et attirer les soutiens nécessaires à son développement.</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
