<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale",
  "classe": "Terminale",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Compréhension des relations internationales et de la coopération",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Les relations internationales constituent un domaine complexe mettant en jeu divers acteurs et formes de coopération. Elles sont essentielles pour comprendre la place des États sur la scène mondiale.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Définissez les termes suivants : Relations internationales, Diplomatie, Coopération multilatérale et Organisation non gouvernementale (ONG). <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Relations internationales :</strong> Ensemble des rapports et des échanges politiques, économiques, sociaux et culturels entre les acteurs de la scène internationale (États, organisations internationales, etc.). [citation:1]</li><li><strong>Diplomatie :</strong> Art de négocier et de représenter un État dans ses relations avec les autres États. [citation:4]</li><li><strong>Coopération multilatérale :</strong> Coopération qui implique plusieurs États ou acteurs, souvent dans le cadre d'organisations internationales (ex: ONU, UE). [citation:2]</li><li><strong>Organisation non gouvernementale (ONG) :</strong> Association à but non lucratif qui agit dans des domaines variés (humanitaire, environnement, droits de l'homme) sans être liée à un gouvernement.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Distinguez les principaux acteurs des relations internationales en citant leurs rôles respectifs. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Les États :</strong> Acteurs principaux, ils mènent des politiques étrangères et signent des traités.</li><li><strong>Les organisations internationales (ONU, UA, UE) :</strong> Elles facilitent la coopération, maintiennent la paix et fixent des normes. [citation:2]</li><li><strong>Les ONG :</strong> Elles interviennent sur le terrain (aide humanitaire, défense des droits) et exercent un rôle de vigilance.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Identifiez deux domaines de coopération internationale et donnez un exemple pour chacun. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Domaine économique :</strong> Accords commerciaux (ex: Accords de partenariat économique ACP-UE). [citation:2]</li><li><strong>Domaine humanitaire :</strong> Aide d'urgence (ex: Assistance de l'UNICEF en cas de catastrophe naturelle).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4)</strong> Comparez la coopération bilatérale et la coopération multilatérale. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>La coopération bilatérale oppose un État à un autre (ex: Cameroun-France), tandis que la coopération multilatérale implique plusieurs acteurs sur des enjeux globaux (ex: Cameroun-ONU, Cameroun-UE). [citation:4]</p></div>"
        }
      ]
    },
    {
      "titre": "Le Cameroun et ses partenaires internationaux",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Le Cameroun entretient des relations privilégiées avec plusieurs partenaires historiques et actuels, tant sur le plan bilatéral qu'au sein des organisations internationales.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Expliquez les grandes lignes de la coopération entre le Cameroun et l'Union Européenne (UE). <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>La coopération Cameroun-UE se concrétise par des accords de partenariat (ex: ACP-UE) portant sur l'aide au développement, le commerce et la coopération politique. L'UE est un bailleur de fonds majeur pour des projets d'infrastructure, d'agriculture et de gouvernance au Cameroun. [citation:2]</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Analysez les relations bilatérales privilégiées du Cameroun avec la France et la Grande-Bretagne. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Avec la France :</strong> Coopération intense dans les domaines politique, économique, militaire et culturel (héritage colonial, Franc CFA).</li><li><strong>Avec la Grande-Bretagne :</strong> Relations historiques (partie anglophone) avec des liens privilégiés à travers le Commonwealth, touchant les domaines éducatif, judiciaire et diplomatique. [citation:3]</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Décrivez l'appartenance du Cameroun à la Francophonie et au Commonwealth. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Cette double appartenance est un atout pour le Cameroun : elle lui permet de bénéficier de programmes d'aide et d'échanges culturels, et de jouer un rôle de carrefour entre le monde francophone et le monde anglophone. [citation:3]</p></div>"
        }
      ]
    },
    {
      "titre": "Le Cameroun, acteur de l'intégration régionale et de la paix",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Au-delà de ses partenaires historiques, le Cameroun s'engage activement dans son continent et sa sous-région pour promouvoir le développement, la paix et la stabilité.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Expliquez le rôle et l'engagement du Cameroun au sein de l'Union Africaine (UA). <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Le Cameroun est un membre actif de l'UA. Il contribue aux missions de maintien de la paix, participe aux sommets et soutient les objectifs de l'Agenda 2063 pour un développement intégré du continent. [citation:3]</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Montrez l'importance de l'intégration sous-régionale (CEMAC, CEEAC) pour le Cameroun. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>L'intégration sous-régionale est vitale pour le Cameroun car elle facilite le commerce (libre circulation), renforce la stabilité (mutualisation des forces de défense via le COPAX) et permet le développement d'infrastructures communes. Elle permet de faire face aux défis communs et d'accroître le poids du pays dans les négociations internationales. [citation:3]</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Analysez la contribution du Cameroun dans la gestion des crises sous-régionales. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Le Cameroun a contribué par le passé à des missions de paix en Afrique centrale (ex: RCA) et en Afrique de l'Ouest (ex: Liberia). Il est reconnu pour son rôle dans la médiation et la résolution des conflits dans sa sous-région. [citation:3]</p></div>"
        }
      ]
    },
    {
      "titre": "L'aide au développement : enjeux et perspectives",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; background-color: #f0f7ff; padding: 15px; border-radius: 8px; color: #000;'>L'aide au développement est un sujet complexe. Elle est souvent présentée comme un outil essentiel pour les pays du Sud, mais elle est aussi critiquée pour ses limites et ses effets pervers.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Définissez l'aide au développement. <span style='color: #888;'>(0,5 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>L'aide au développement est l'ensemble des ressources financières, techniques ou matérielles que les pays développés (bailleurs) accordent aux pays en développement pour favoriser leur croissance économique et améliorer les conditions de vie de leurs populations.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Identifiez et expliquez deux types d'aide au développement. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Aide bilatérale :</strong> Aide directe d'un pays à un autre (ex: aide de la France au Cameroun).</li><li><strong>Aide multilatérale :</strong> Aide transitant par des organisations internationales (ex: Banque mondiale, FMI).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Énumérez deux avantages et deux inconvénients de l'aide au développement. <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Avantages :</strong> Financement de projets d'infrastructure (écoles, hôpitaux), aide d'urgence en cas de catastrophe.</li><li><strong>Inconvénients :</strong> Création de dépendance économique, mauvaise gestion et détournement des fonds.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4)</strong> Proposez deux solutions pour que l'aide au développement profite réellement aux populations. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Assurer une meilleure gouvernance :</strong> Renforcer la transparence et la lutte contre la corruption.</li><li><strong>Favoriser l'autonomie :</strong> Orienter l'aide vers le renforcement des capacités locales et le développement du secteur privé.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5)</strong> Analysez les problèmes spécifiques que le Cameroun rencontre dans ses relations internationales. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Le Cameroun fait face à des défis comme la dépendance économique vis-à-vis de quelques partenaires (France, UE), les dettes extérieures, les pressions des institutions financières internationales et parfois l'instabilité sécuritaire dans sa sous-région. [citation:3]</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
