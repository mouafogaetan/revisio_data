<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Terminale C & D",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Vérification des connaissances sur les solutions tampon",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Cet exercice évalue votre maîtrise des concepts fondamentaux liés aux solutions tampon, tels que définis dans le programme de la classe de Terminale au Cameroun.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Définir une <em>solution tampon</em>. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Une <strong>solution tampon</strong> est une solution dont le pH varie très peu lors de l'ajout modéré d'un acide ou d'une base. Elle est généralement constituée d'un acide faible et de sa base conjuguée, ou d'une base faible et de son acide conjugué.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Donner l'expression de la relation de Henderson-Hasselbalch pour le pH d'une solution tampon. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{pH = pKa + \\log\\dfrac{[Base]}{[Acide]}} $$</div></div><p style='margin-top: 8px;'>où pKa est le cologarithme de la constante d'acidité du couple, et [Base] et [Acide] sont les concentrations de la base conjuguée et de l'acide.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Citer deux méthodes de préparation d'une solution tampon. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Méthode 1 :</strong> Mélange d'un acide faible avec un sel de sa base conjuguée (ex : CH<sub>3</sub>COOH / CH<sub>3</sub>COONa).</li><li><strong>Méthode 2 :</strong> Neutralisation partielle d'un acide faible par une base forte (ou d'une base faible par un acide fort).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4)</strong> Expliquer pourquoi le mélange <span style='font-family: monospace;'><strong>CH<sub>3</sub>COOH / CH<sub>3</sub>COONa</strong></span> constitue une solution tampon, contrairement au mélange <span style='font-family: monospace;'><strong>HCl / NaCl</strong></span>. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Le mélange CH<sub>3</sub>COOH / CH<sub>3</sub>COONa contient un <strong>acide faible</strong> (CH<sub>3</sub>COOH) et sa <strong>base conjuguée</strong> (CH<sub>3</sub>COO<sup>-</sup>). Ce couple peut neutraliser les ajouts d'acide ou de base. En revanche, HCl est un acide fort totalement dissocié ; le mélange HCl / NaCl ne contient pas un couple acide-base faible capable de tamponner le pH.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5)</strong> Donner un exemple d'application des solutions tampon dans le corps humain. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Le <strong>sang</strong> contient des solutions tampon, notamment le couple <span style='font-family: monospace;'>H<sub>2</sub>CO<sub>3</sub> / HCO<sub>3</sub><sup>-</sup></span>, qui maintiennent son pH autour de 7,4. Cela permet le bon fonctionnement des enzymes et des processus métaboliques.</p></div>"
        }
      ]
    },
    {
      "titre": "Application des savoirs : Préparation et calcul d'une solution tampon",
      "points": "7.5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>On souhaite préparer une solution tampon de pH = 5,0 en mélangeant un volume \(V_a\) d'une solution d'acide éthanoïque (CH<sub>3</sub>COOH) de concentration \(C_a = 0,10\\ \\mathrm{mol.L^{-1}}\) avec un volume \(V_b\) d'une solution d'éthanoate de sodium (CH<sub>3</sub>COONa) de concentration \(C_b = 0,10\\ \\mathrm{mol.L^{-1}}\).<br>Donnée : pKa(CH<sub>3</sub>COOH / CH<sub>3</sub>COO<sup>-</sup>) = 4,8.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Écrire l'équation de la réaction qui justifie le pouvoir tampon de ce mélange lors de l'ajout d'une base forte (NaOH). <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{CH_3COOH + OH^- \\rightarrow CH_3COO^- + H_2O} $$</div></div><p style='margin-top: 8px;'>L'acide éthanoïque neutralise les ions hydroxyde ajoutés, ce qui limite la variation du pH.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Déterminer le rapport \( \\dfrac{[CH_3COO^-]}{[CH_3COOH]} \) nécessaire pour obtenir un pH de 5,0. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Utilisons la relation de Henderson-Hasselbalch :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{pH = pKa + \\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]}} $$</div></div><p>On a donc :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{5,0 = 4,8 + \\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]}} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = 0,2} $$</div></div><p style='margin-top: 8px;'>Le rapport est :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = 10^{0,2} \\approx 1,58} $$</div></div></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> En déduire le rapport \( \\dfrac{V_b}{V_a} \). <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Après mélange, les concentrations en acide et base conjuguée sont données par :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{[CH_3COO^-] = \\dfrac{C_b \\cdot V_b}{V_a + V_b}} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{[CH_3COOH] = \\dfrac{C_a \\cdot V_a}{V_a + V_b}} $$</div></div><p>Le rapport des concentrations s'écrit donc :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = \\dfrac{C_b \\cdot V_b}{C_a \\cdot V_a} } $$</div></div><p>Comme \( C_a = C_b = 0,10\\ \\mathrm{mol.L^{-1}} \), alors :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\dfrac{V_b}{V_a} = 1,58} $$</div></div></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4)</strong> Si \( V_a = 50\\ \\mathrm{mL} \), quel volume \( V_b \) faut-il prélever ? <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>On a :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{V_b = 1,58 \\times V_a = 1,58 \\times 50 = 79\\ \\mathrm{mL}} $$</div></div></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5)</strong> Décrire brièvement le protocole expérimental pour préparer cette solution tampon à partir des deux solutions mères. <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ol style='margin: 0; padding-left: 20px;'><li>À l'aide d'une pipette graduée ou d'une burette, prélever précisément \( V_a = 50\\ \\mathrm{mL} \) de la solution d'acide éthanoïque.</li><li>Prélever précisément \( V_b = 79\\ \\mathrm{mL} \) de la solution d'éthanoate de sodium.</li><li>Introduire les deux volumes dans un bécher propre et sec.</li><li>Agiter pour homogénéiser.</li><li>Vérifier le pH à l'aide d'un pH-mètre étalonné ; un pH de 5,0 devrait être obtenu.</li></ol></div>"
        }
      ]
    },
    {
      "titre": "Utilisation des savoirs dans une situation complexe",
      "points": "7.5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; background-color: #f0f7ff; padding: 15px; border-radius: 8px; color: #000;'>Un laboratoire d'analyses médicales doit préparer une solution tampon pour étalonner un pH-mètre. Le technicien dispose d'une solution d'acide éthanoïque de concentration \( C_a = 0,20\\ \\mathrm{mol.L^{-1}} \), d'une solution d'éthanoate de sodium de concentration \( C_b = 0,20\\ \\mathrm{mol.L^{-1}} \), et d'eau distillée.<br><br>On donne : pKa(CH<sub>3</sub>COOH / CH<sub>3</sub>COO<sup>-</sup>) = 4,8.<br><br>La notice du pH-mètre indique qu'il doit être étalonné avec une solution tampon de pH = 5,0.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Montrer que le rapport \( \\dfrac{V_b}{V_a} \) à utiliser est de \( 10^{0,2} = 1,58 \). <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>La relation de Henderson-Hasselbalch donne :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{pH = pKa + \\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]}} $$</div></div><p>Avec pH = 5,0 et pKa = 4,8, on obtient :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = 0,2} $$</div></div><p>Donc :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = 10^{0,2} = 1,58} $$</div></div><p>Comme \( C_a = C_b \), on a bien \( \\dfrac{V_b}{V_a} = 1,58 \).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Calculer les volumes \( V_a \) et \( V_b \) à prélever pour préparer \( V = 500\\ \\mathrm{mL} \) de cette solution tampon. <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>On a les relations :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{V_a + V_b = 500 \\ \\mathrm{mL}} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{V_b = 1,58 \\ V_a} $$</div></div><p>En substituant :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{V_a + 1,58 \\ V_a = 500 \\ \\mathrm{mL}} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{V_a = \\dfrac{500}{2,58} \\approx 194 \\ \\mathrm{mL}} $$</div></div><p style='margin-top: 8px;'>On en déduit :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{V_b = 500 - 194 \\approx 306 \\ \\mathrm{mL}} $$</div></div></div>"

        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Proposer un protocole détaillé pour préparer cette solution tampon. <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ol style='margin: 0; padding-left: 20px;'><li>À l'aide d'une pipette graduée, prélever \( V_a = 194\\ \\mathrm{mL} \) de la solution d'acide éthanoïque (0,20 mol.L⁻¹).</li><li>Prélever \( V_b = 306\\ \\mathrm{mL} \) de la solution d'éthanoate de sodium (0,20 mol.L⁻¹).</li><li>Introduire les deux prélèvements dans une fiole jaugée de 500 mL.</li><li>Ajouter de l'eau distillée jusqu'au trait de jauge.</li><li>Agiter vigoureusement pour homogénéiser.</li></ol></div>"

          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Le pH mesuré (4,9) est légèrement inférieur au pH attendu (5,0). Cela peut indiquer une petite erreur de préparation (volume d'acide trop important ou volume de base trop faible), ou un problème d'étalonnage du pH-mètre. La solution reste cependant proche de la valeur souhaitée.</p></div>"

          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>On utilise la relation de Henderson-Hasselbalch :</p><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{pH = pKa + \\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]}} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{4,9 = 4,8 + \\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]}} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\log\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = 0,1} $$</div></div><div class='math-block' style='text-align: center; font-size: 1.2em; padding: 10px;'><div class='math'>$$ \\mathrm{\\dfrac{[CH_3COO^-]}{[CH_3COOH]} = 10^{0,1} \\approx 1,26} $$</div></div><p>Ce rapport est inférieur à 1,58, ce qui est cohérent avec un pH plus acide (la forme acide est en proportion plus élevée).</p></div>"

};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
