<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Terminale",
  "sequence": "Séquence 1 : Solutions aqueuses, pH, acides et bases forts",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Généralités sur les solutions aqueuses",
      "points": "4 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> Répondez aux questions suivantes en justifiant vos réponses.</p></div>",
      "questions": [
        {
          "question": "1) Expliquer la différence entre la dissolution d'un composé ionique et celle d'un composé moléculaire polaire.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Composé ionique :</strong> se dissocie en ions (ex: NaCl → Na⁺ + Cl⁻).</li><li><strong>Composé moléculaire polaire :</strong> se dissout sans se dissocier, les molécules restent intactes (ex: sucre).</li></ul></div>"
        },
        {
          "question": "2) Écrire l'équation de dissolution du chlorure de calcium \( \\mathrm{CaCl_2} \) dans l'eau.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{CaCl_2(s) \\xrightarrow{H_2O} Ca^{2+} + 2Cl^-} $$</div></div></div>"
        },
        {
          "question": "3) Une solution d'acide chlorhydrique \( \\mathrm{HCl} \) est-elle une solution de composé ionique ou moléculaire polaire ? Justifier.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> L'acide chlorhydrique gazeux est une molécule polaire, mais en solution aqueuse, il se dissocie totalement en ions H₃O⁺ et Cl⁻. On parle d'ionisation.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Concentrations et équation d'électroneutralité",
      "points": "6 pts",
      "enonce": "<div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> On dissout 0,02 mol de chlorure de calcium \( \\mathrm{CaCl_2} \) dans 1 L d'eau.</p></div>",
      "questions": [
        {
          "question": "1) Calculer la concentration molaire en ions \( \\mathrm{Ca^{2+}} \) et en ions \( \\mathrm{Cl^-} \).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li>[Ca²⁺] = 0,02 mol·L⁻¹</li><li>[Cl⁻] = 0,04 mol·L⁻¹</li></ul></div>"
        },
        {
          "question": "2) Écrire l'équation d'électroneutralité (EEN) de cette solution.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> Les concentrations sont en mol·L⁻¹. L'équation d'électroneutralité est :</p><div class='math-block'><div class='math'>$$ 2[Ca^{2+}] = [Cl^-] $$</div></div><p>Vérification : 2 × 0,02 = 0,04.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Dilution d'une solution",
      "points": "4 pts",
      "enonce": "<div style='background: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> On dispose d'une solution mère d'acide chlorhydrique de concentration \( C_0 = 0,1 \\, \\mathrm{mol\\cdot L^{-1}} \\). On souhaite préparer 100 mL d'une solution fille de concentration \( C_f = 0,02 \\, \\mathrm{mol\\cdot L^{-1}} \\).</p></div>",
      "questions": [
        {
          "question": "1) Calculer le volume de solution mère à prélever.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p>On applique la relation de dilution : \( C_0 \\times V_0 = C_f \\times V_f \).</p><div class='math-block'><div class='math'>$$ V_0 = \\frac{C_f \\times V_f}{C_0} = \\frac{0,02 \\times 0,100}{0,1} = 0,020 \\, \\mathrm{L} = 20 \\, \\mathrm{mL} $$</div></div></div>"
        },
        {
          "question": "2) Décrire le mode opératoire pour réaliser cette dilution.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ol><li>Prélever 20 mL de la solution mère à l'aide d'une pipette jaugée.</li><li>Introduire le prélèvement dans une fiole jaugée de 100 mL.</li><li>Ajouter un peu d'eau distillée, agiter pour homogénéiser.</li><li>Compléter jusqu'au trait de jauge avec de l'eau distillée.</li><li>Homogénéiser en agitant la fiole.</li></ol></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Autoprotolyse de l'eau et pH",
      "points": "6 pts",
      "enonce": "<div style='background: #f5eef8; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> À 25°C, le produit ionique de l'eau est \( K_e = 10^{-14} \\).</p></div>",
      "questions": [
        {
          "question": "1) Définir l'autoprotolyse de l'eau et écrire l'équation correspondante.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> L'autoprotolyse de l'eau est une réaction entre deux molécules d'eau qui donne un ion oxonium H₃O⁺ et un ion hydroxyde OH⁻.</p><div class='math-block'><div class='math'>$$ \\mathrm{2H_2O \\rightleftharpoons H_3O^+ + OH^-} $$</div></div></div>"
        },
        {
          "question": "2) Calculer la concentration en ions \( \\mathrm{H_3O^+} \) dans une solution de pH = 3.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ [\\mathrm{H_3O^+}] = 10^{-\\mathrm{pH}} = 10^{-3} \\, \\mathrm{mol\\cdot L^{-1}} $$</div></div></div>"
        },
        {
          "question": "3) Déterminer si une solution de pH = 9 est acide, basique ou neutre.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> pH = 9 > 7, la solution est <strong>basique</strong>.</p></div>"
        },
        {
          "question": "4) Calculer le pH d'une solution où \( [\\mathrm{OH^-}] = 10^{-5} \\, \\mathrm{mol\\cdot L^{-1}} \\).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ [\\mathrm{H_3O^+}] = \\frac{10^{-14}}{10^{-5}} = 10^{-9} \\, \\mathrm{mol\\cdot L^{-1}} $$</div><div class='math'>$$ \\mathrm{pH} = -\\log(10^{-9}) = 9 $$</div></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Solutions d'acides et bases forts",
      "points": "6 pts",
      "enonce": "<div style='background: #fdf2e9; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "1) Définir un acide fort et une base forte.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Acide fort :</strong> un acide totalement dissocié en solution aqueuse (ex: HCl, HNO₃).</li><li><strong>Base forte :</strong> une base totalement dissociée en solution aqueuse (ex: NaOH, KOH).</li></ul></div>"
        },
        {
          "question": "2) Calculer le pH d'une solution d'acide chlorhydrique de concentration \( C = 10^{-2} \\, \\mathrm{mol\\cdot L^{-1}} \\).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p>HCl est un acide fort : [H₃O⁺] = C = 10⁻² mol·L⁻¹.</p><div class='math-block'><div class='math'>$$ \\mathrm{pH} = -\\log(10^{-2}) = 2 $$</div></div></div>"
        },
        {
          "question": "3) Calculer le pH d'une solution de soude de concentration \( C = 10^{-3} \\, \\mathrm{mol\\cdot L^{-1}} \\).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p>NaOH est une base forte : [OH⁻] = C = 10⁻³ mol·L⁻¹.</p><div class='math-block'><div class='math'>$$ \\mathrm{pOH} = -\\log(10^{-3}) = 3 $$</div><div class='math'>$$ \\mathrm{pH} = 14 - 3 = 11 $$</div></div></div>"
        },
        {
          "question": "4) On dilue 10 fois une solution d'acide fort de pH = 2. Quel est le nouveau pH ?",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p>La dilution par 10 divise la concentration par 10, donc le pH augmente de 1.</p><div class='math-block'><div class='math'>$$ \\mathrm{pH}_{\\text{new}} = 2 + 1 = 3 $$</div></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Synthèse – Mélange d'acide et de base forts",
      "points": "4 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> On mélange 50 mL d'une solution d'acide chlorhydrique de concentration 0,1 mol·L⁻¹ avec 50 mL d'une solution de soude de concentration 0,2 mol·L⁻¹.</p></div>",
      "questions": [
        {
          "question": "1) Déterminer le réactif limitant.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p>Réaction : H₃O⁺ + OH⁻ → 2H₂O.</p><p>n(H₃O⁺) = 0,1 × 0,050 = 5,0 × 10⁻³ mol.</p><p>n(OH⁻) = 0,2 × 0,050 = 1,0 × 10⁻² mol.</p><p>OH⁻ est en excès. H₃O⁺ est le <strong>réactif limitant</strong>.</p></div>"
        },
        {
          "question": "2) Calculer le pH final de la solution après mélange.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p>OH⁻ restant : 1,0×10⁻² − 5,0×10⁻³ = 5,0×10⁻³ mol.</p><p>Volume total = 0,100 L.</p><p>[OH⁻] = 5,0×10⁻³ / 0,100 = 5,0×10⁻² mol·L⁻¹.</p><p>pOH = −log(5,0×10⁻²) ≈ 1,30.</p><p>pH = 14 − 1,30 = <strong>12,70</strong>.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
