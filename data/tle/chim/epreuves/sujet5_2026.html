<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Terminale",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Dosage d'un acide fort par une base forte (6 points)",
      "points": "6 pts",
      "enonce": "<p>On dose un volume <em>V<sub>A</sub></em> = 20,0 mL d'une solution d'acide chlorhydrique (HCl) de concentration <em>C<sub>A</sub></em> inconnue par une solution d'hydroxyde de sodium (NaOH) de concentration <em>C<sub>B</sub></em> = 0,10 mol.L<sup>-1</sup>. L'équivalence est obtenue pour un volume <em>V<sub>E</sub></em> = 15,0 mL de soude versé.</p>",
      "questions": [
        {
          "question": "1) Écrire l'équation bilan de la réaction de dosage.",
          "reponse": "La réaction de dosage est : <div class='math-block'><div class='math'>$$H_3O^+ + OH^- \\rightarrow 2H_2O$$</div></div>"
        },
        {
          "question": "2) Déterminer la concentration <em>C<sub>A</sub></em> de la solution d'acide chlorhydrique.",
          "reponse": "À l'équivalence, les quantités de matière de l'acide et de la base sont égales : <div class='math-block'><div class='math'>$$C_A \\times V_A = C_B \\times V_E$$</div></div> <div class='math-block'><div class='math'>$$C_A = \\frac{C_B \\times V_E}{V_A} = \\frac{0,10 \\times 15,0}{20,0} = 7,5 \\times 10^{-2} \\text{ mol.L}^{-1}$$</div></div>"
        },
        {
          "question": "3) Calculer le pH de la solution acide avant le dosage.",
          "reponse": "Pour un acide fort comme HCl, <div class='math-block'><div class='math'>$$pH = -\\log C_A = -\\log(7,5 \\times 10^{-2}) = 1,12$$</div></div>"
        },
        {
          "question": "4) Quels indicateurs colorés peut-on utiliser pour ce dosage ? Justifier.",
          "reponse": "Le pH à l'équivalence d'un dosage acide fort / base forte est 7,0. Le saut de pH se produit autour de 7,0. On peut donc utiliser le bleu de bromothymol (zone de virage pH 6,0 - 7,6) ou la phénolphtaléine (zone de virage pH 8,2 - 10,0). Le rouge de méthyle (zone de virage 4,2 - 6,2) peut aussi convenir."
        },
        {
          "question": "5) Décrire le protocole expérimental de ce dosage.",
          "reponse": "Protocole :<br>1) Introduire V<sub>A</sub> = 20,0 mL de la solution d'acide chlorhydrique dans un erlenmeyer.<br>2) Ajouter quelques gouttes d'indicateur coloré (par exemple, le bleu de bromothymol).<br>3) Remplir la burette avec la solution de soude de concentration C<sub>B</sub> = 0,10 mol.L<sup>-1</sup>.<br>4) Verser la soude progressivement dans l'erlenmeyer en agitant jusqu'au virage de l'indicateur (passage du jaune au bleu pour le bleu de bromothymol).<br>5) Noter le volume V<sub>E</sub> versé à l'équivalence."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Dosage d'un acide faible par une base forte (7 points)",
      "points": "7 pts",
      "enonce": "<p>On dose un volume <em>V<sub>A</sub></em> = 20,0 mL d'une solution d'acide éthanoïque (CH<sub>3</sub>COOH) de concentration <em>C<sub>A</sub></em> = 0,10 mol.L<sup>-1</sup> par une solution d'hydroxyde de sodium (NaOH) de concentration <em>C<sub>B</sub></em> = 0,10 mol.L<sup>-1</sup>. La courbe pH = f(V<sub>B</sub>) est obtenue.</p>",
      "questions": [
        {
          "question": "1) Écrire l'équation bilan de la réaction de dosage.",
          "reponse": "La réaction de dosage est : <div class='math-block'><div class='math'>$$CH_3COOH + OH^- \\rightarrow CH_3COO^- + H_2O$$</div></div>"
        },
        {
          "question": "2) Déterminer le volume <em>V<sub>E</sub></em> versé à l'équivalence.",
          "reponse": "À l'équivalence, <div class='math-block'><div class='math'>$$C_A \\times V_A = C_B \\times V_E$$</div></div> <div class='math-block'><div class='math'>$$V_E = \\frac{C_A \\times V_A}{C_B} = \\frac{0,10 \\times 20,0}{0,10} = 20,0 \\text{ mL}$$</div></div>"
        },
        {
          "question": "3) À l'équivalence, le pH est-il égal à 7 ? Justifier.",
          "reponse": "Non, le pH à l'équivalence est supérieur à 7. La réaction de dosage produit l'ion éthanoate CH<sub>3</sub>COO<sup>-</sup> qui est une base faible. Il s'hydrolyse partiellement : CH<sub>3</sub>COO<sup>-</sup> + H<sub>2</sub>O ⇌ CH<sub>3</sub>COOH + OH<sup>-</sup>, ce qui rend la solution basique."
        },
        {
          "question": "4) Définir le point de demi-équivalence et déterminer son volume.",
          "reponse": "Le point de demi-équivalence est le point où la moitié de l'acide a été neutralisée : V = V<sub>E</sub>/2 = 20,0/2 = 10,0 mL. À ce point, pH = pKa. Pour l'acide éthanoïque, pKa = 4,8, donc pH = 4,8."
        },
        {
          "question": "5) Comment peut-on déterminer le pKa de l'acide à partir de la courbe de dosage ?",
          "reponse": "Sur la courbe pH = f(V<sub>B</sub>), on repère le point de demi-équivalence (pour V = V<sub>E</sub>/2). L'ordonnée de ce point donne la valeur du pH = pKa. On lit alors directement pKa sur le graphique."
        },
        {
          "question": "6) Quelle serait l'allure de la courbe pH = f(V<sub>B</sub>) pour ce dosage par rapport à celle d'un acide fort ?",
          "reponse": "Pour un acide faible, le pH initial est plus élevé que pour un acide fort de même concentration. La courbe présente un palier de pH autour du pKa avant l'équivalence. Le saut de pH à l'équivalence est moins brusque que pour un acide fort et le pH à l'équivalence est supérieur à 7."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Dosage d'une base faible par un acide fort (5 points)",
      "points": "5 pts",
      "enonce": "<p>On dose un volume <em>V<sub>B</sub></em> = 25,0 mL d'une solution d'ammoniac (NH<sub>3</sub>) de concentration <em>C<sub>B</sub></em> = 0,080 mol.L<sup>-1</sup> par une solution d'acide chlorhydrique (HCl) de concentration <em>C<sub>A</sub></em> = 0,10 mol.L<sup>-1</sup>.</p>",
      "questions": [
        {
          "question": "1) Écrire l'équation bilan de la réaction de dosage.",
          "reponse": "La réaction de dosage est : <div class='math-block'><div class='math'>$$NH_3 + H_3O^+ \\rightarrow NH_4^+ + H_2O$$</div></div>"
        },
        {
          "question": "2) Déterminer le volume <em>V<sub>E</sub></em> d'acide versé à l'équivalence.",
          "reponse": "À l'équivalence, <div class='math-block'><div class='math'>$$C_B \\times V_B = C_A \\times V_E$$</div></div> <div class='math-block'><div class='math'>$$V_E = \\frac{C_B \\times V_B}{C_A} = \\frac{0,080 \\times 25,0}{0,10} = 20,0 \\text{ mL}$$</div></div>"
        },
        {
          "question": "3) L'ion ammonium NH<sub>4</sub><sup>+</sup> est un acide faible. Quel est le pH à l'équivalence ? Justifier qualitativement.",
          "reponse": "À l'équivalence, la solution contient l'ion NH<sub>4</sub><sup>+</sup> (acide faible) qui s'hydrolyse : NH<sub>4</sub><sup>+</sup> + H<sub>2</sub>O ⇌ NH<sub>3</sub> + H<sub>3</sub>O<sup>+</sup>, ce qui libère des ions H<sub>3</sub>O<sup>+</sup>. Le pH à l'équivalence est donc inférieur à 7 (solution acide)."
        },
        {
          "question": "4) Déterminer le pKa du couple NH<sub>4</sub><sup>+</sup>/NH<sub>3</sub> sachant qu'au point de demi-équivalence, le pH est égal à 9,2.",
          "reponse": "Au point de demi-équivalence, pH = pKa. Donc pKa(NH<sub>4</sub><sup>+</sup>/NH<sub>3</sub>) = 9,2."
        },
        {
          "question": "5) Quel indicateur pourrait-on utiliser pour ce dosage ? Justifier.",
          "reponse": "Le pH à l'équivalence est inférieur à 7. Le saut de pH se produit dans la zone acide. On peut donc utiliser le rouge de méthyle (zone de virage pH 4,2 - 6,2) ou le bleu de bromophénol (zone de virage pH 3,0 - 4,6). La phénolphtaléine ne serait pas adaptée car sa zone de virage est trop basique."
        }
      ]
    },
    {
      "titre": "Exercice 4 : Application des solutions tampon (4 points)",
      "points": "4 pts",
      "enonce": "<p>Une solution tampon est préparée en mélangeant un volume <em>V<sub>1</sub></em> = 100 mL d'une solution d'acide éthanoïque de concentration <em>C<sub>1</sub></em> = 0,10 mol.L<sup>-1</sup> et un volume <em>V<sub>2</sub></em> = 100 mL d'une solution d'éthanoate de sodium de concentration <em>C<sub>2</sub></em> = 0,10 mol.L<sup>-1</sup>. Le pKa du couple CH<sub>3</sub>COOH/CH<sub>3</sub>COO<sup>-</sup> est 4,8.</p>",
      "questions": [
        {
          "question": "1) Définir une solution tampon.",
          "reponse": "Une solution tampon est une solution dont le pH varie très peu par addition modérée d'un acide ou d'une base, ou par dilution modérée. Elle est constituée d'un acide faible et de sa base conjuguée (ou d'une base faible et de son acide conjugué) en proportions voisines."
        },
        {
          "question": "2) Calculer le pH de cette solution tampon.",
          "reponse": "On utilise la relation d' Henderson-Hasselbalch : <div class='math-block'><div class='math'>$$pH = pKa + \\log \\frac{[CH_3COO^-]}{[CH_3COOH]}$$</div></div> Ici, [CH<sub>3</sub>COO<sup>-</sup>] = [CH<sub>3</sub>COOH] = C = 0,10 mol.L<sup>-1</sup> car les volumes sont égaux. <div class='math-block'><div class='math'>$$pH = 4,8 + \\log \\frac{0,10}{0,10} = 4,8 + 0 = 4,8$$</div></div>"
        },
        {
          "question": "3) Citer deux applications des solutions tampon dans la vie courante ou en biologie.",
          "reponse": "Les solutions tampon sont utilisées en biologie (tampon phosphate pour le sang, pH maintenu à 7,4), en chimie analytique (étalonnage des pH-mètres), dans les shampoings (tampon pour maintenir un pH doux), en oenologie (tampon du vin) ou encore dans les médicaments."
        }
      ]
    },
    {
      "titre": "Exercice 5 : Synthèse et choix d'un indicateur (3 points)",
      "points": "3 pts",
      "enonce": "<p>Un laboratoire doit doser une solution d'acide chlorhydrique par une solution d'hydroxyde de sodium. Le technicien dispose de trois indicateurs : le rouge de méthyle (zone de virage 4,2 - 6,2), le bleu de bromothymol (zone de virage 6,0 - 7,6) et la phénolphtaléine (zone de virage 8,2 - 10,0).</p>",
      "questions": [
        {
          "question": "1) Quel indicateur le technicien doit-il choisir pour ce dosage ? Justifier.",
          "reponse": "Le dosage d'un acide fort par une base forte a un pH à l'équivalence égal à 7,0. Le saut de pH se produit autour de 7,0. Le bleu de bromothymol (zone de virage 6,0 - 7,6) est parfaitement adapté car sa zone de virage encadre le pH à l'équivalence. La phénolphtaléine peut aussi convenir (zone de virage 8,2 - 10,0, juste après l'équivalence) mais le bleu de bromothymol est le plus précis."
        },
        {
          "question": "2) Que se passerait-il si le technicien choisissait le rouge de méthyle ?",
          "reponse": "Le rouge de méthyle a une zone de virage comprise entre pH 4,2 et 6,2, donc il vire avant l'équivalence (avant que le pH n'atteigne 7). Le volume de base versé au moment du virage serait inférieur au volume à l'équivalence, ce qui conduirait à une concentration de l'acide sous-estimée."
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
