<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Terminale",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Dosage d'un acide fort par une base forte",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>On dose un volume V\u2090 = 20,0 mL d'une solution d'acide chlorhydrique (H\u2083O\u207A + Cl\u207B) de concentration C\u2090 inconnue par une solution d'hydroxyde de sodium (Na\u207A + OH\u207B) de concentration C\u2091 = 1,0\u00D710⁻² mol/L. On suit le pH en fonction du volume V\u2091 de base vers\u00E9.</strong></p><div style='background-color:#f0f4f8; padding:15px; border-radius:8px; margin:10px 0; color:#1a2332;'><p>L'\u00E9quivalence est obtenue pour un volume V\u2091E = 10,0 mL.</p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> \u00C9crire l'\u00E9quation de la r\u00E9action de dosage.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>H\u2083O\u207A + OH\u207B → 2H\u2082O</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer la concentration C\u2090 de la solution d'acide chlorhydrique.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>\u00C0 l'\u00E9quivalence, on a : n(H\u2083O\u207A) = n(OH\u207B) donc C\u2090 × V\u2090 = C\u2091 × V\u2091E.</p><p>C\u2090 = (C\u2091 × V\u2091E) / V\u2090 = (1,0\u00D710⁻² × 10,0) / 20,0 = <strong>5,0\u00D710⁻³ mol/L</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> Quel est le pH \u00E0 l'\u00E9quivalence pour ce dosage ? Justifier.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Le pH \u00E0 l'\u00E9quivalence est <strong>pH = 7</strong>.</p><p><strong>Justification :</strong> Il s'agit du dosage d'un acide fort par une base forte. \u00C0 l'\u00E9quivalence, on a une solution d'un sel neutre (NaCl) qui ne r\u00E9agit ni avec l'eau ni avec les ions. Le pH est donc celui de l'eau pure, soit 7 \u00E0 25°C.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>4.</strong> Parmi les indicateurs suivants, lequel est le plus adapt\u00E9 pour ce dosage ? Justifier.<br>- Rouge de m\u00E9thyle (zone de virage : 4,4 - 6,2)<br>- Bleu de bromothymol (zone de virage : 6,0 - 7,6)<br>- Ph\u00E9nolphtal\u00E9ine (zone de virage : 8,2 - 10,0)</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Le <strong>bleu de bromothymol</strong> est l'indicateur le plus adapt\u00E9.</p><p><strong>Justification :</strong> Sa zone de virage (6,0 - 7,6) encadre le pH \u00E0 l'\u00E9quivalence (pH = 7). Le rouge de m\u00E9thyle a une zone de virage trop acide et la ph\u00E9nolphtal\u00E9ine a une zone de virage trop basique pour ce dosage.</p></div>"
        }
      ]
    },
    {
      "titre": "Dosage d'un acide faible par une base forte",
      "points": "6 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>On dose un volume V\u2090 = 25,0 mL d'une solution d'acide ac\u00E9tique CH\u2083COOH (acide faible) de concentration C\u2090 = 1,0\u00D710⁻² mol/L par une solution d'hydroxyde de sodium (Na\u207A + OH\u207B) de concentration C\u2091 = 5,0\u00D710⁻² mol/L.</strong></p><div style='background-color:#f0f4f8; padding:15px; border-radius:8px; margin:10px 0; color:#1a2332;'><p>Donn\u00E9e : pKa(CH\u2083COOH/CH\u2083COO⁻) = 4,8.</p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> \u00C9crire l'\u00E9quation de la r\u00E9action de dosage.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>CH\u2083COOH + OH⁻ → CH\u2083COO⁻ + H\u2082O</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer le volume V\u2091E de solution d'hydroxyde de sodium n\u00E9cessaire pour atteindre l'\u00E9quivalence.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>\u00C0 l'\u00E9quivalence : n(CH\u2083COOH) = n(OH⁻) donc C\u2090 × V\u2090 = C\u2091 × V\u2091E.</p><p>V\u2091E = (C\u2090 × V\u2090) / C\u2091 = (1,0\u00D710⁻² × 25,0) / 5,0\u00D710⁻² = <strong>5,0 mL</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> D\u00E9terminer le pH \u00E0 la demi-\u00E9quivalence (V\u2091 = V\u2091E/2). Justifier.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>\u00C0 la demi-\u00E9quivalence, on a : [CH\u2083COOH] = [CH\u2083COO⁻].</p><p>D'apr\u00E8s la relation pH = pKa + log([CH\u2083COO⁻]/[CH\u2083COOH]), on obtient pH = pKa = <strong>4,8</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>4.</strong> Le pH \u00E0 l'\u00E9quivalence est-il acide, basique ou neutre ? Justifier.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Le pH \u00E0 l'\u00E9quivalence est <strong>basique</strong>.</p><p><strong>Justification :</strong> \u00C0 l'\u00E9quivalence, on a une solution d'ac\u00E9tate de sodium (CH\u2083COO⁻Na⁺). L'ion ac\u00E9tate CH\u2083COO⁻, base faible, r\u00E9agit avec l'eau selon : CH\u2083COO⁻ + H\u2082O ⇌ CH\u2083COOH + OH⁻, ce qui lib\u00E8re des ions OH⁻ et rend la solution basique (pH > 7).</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>5.</strong> Choisir un indicateur adapt\u00E9 pour ce dosage sachant que le pH \u00E0 l'\u00E9quivalence est d'environ 8,8.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Le <strong>ph\u00E9nolphtal\u00E9ine</strong> est l'indicateur le plus adapt\u00E9.</p><p><strong>Justification :</strong> Sa zone de virage (8,2 - 10,0) encadre le pH \u00E0 l'\u00E9quivalence (pH ≈ 8,8). Le changement de couleur sera donc visible au moment de l'\u00E9quivalence.</p></div>"
        }
      ]
    },
    {
      "titre": "Dosage d'une base faible par un acide fort",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>On dose un volume V\u2091 = 20,0 mL d'une solution d'ammoniac (NH\u2083, base faible) de concentration C\u2091 = 2,0\u00D710⁻² mol/L par une solution d'acide chlorhydrique (H\u2083O\u207A + Cl⁻) de concentration C\u2090 = 1,0\u00D710⁻² mol/L.</strong></p><div style='background-color:#f0f4f8; padding:15px; border-radius:8px; margin:10px 0; color:#1a2332;'><p>Donn\u00E9e : pKa(NH₄⁺/NH₃) = 9,2.</p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> \u00C9crire l'\u00E9quation de la r\u00E9action de dosage.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>NH\u2083 + H\u2083O⁺ → NH₄⁺ + H\u2082O</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer le volume V\u2090E de solution d'acide chlorhydrique n\u00E9cessaire pour atteindre l'\u00E9quivalence.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>\u00C0 l'\u00E9quivalence : n(NH\u2083) = n(H\u2083O⁺) donc C\u2091 × V\u2091 = C\u2090 × V\u2090E.</p><p>V\u2090E = (C\u2091 × V\u2091) / C\u2090 = (2,0\u00D710⁻² × 20,0) / 1,0\u00D710⁻² = <strong>40,0 mL</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> Calculer le pH \u00E0 la demi-\u00E9quivalence (V\u2090 = V\u2090E/2).</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>\u00C0 la demi-\u00E9quivalence, on a : [NH\u2083] = [NH₄⁺].</p><p>D'apr\u00E8s la relation pH = pKa + log([NH\u2083]/[NH₄⁺]), on obtient pH = pKa = <strong>9,2</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>4.</strong> Le pH \u00E0 l'\u00E9quivalence est-il acide, basique ou neutre ? Justifier.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Le pH \u00E0 l'\u00E9quivalence est <strong>acide</strong>.</p><p><strong>Justification :</strong> \u00C0 l'\u00E9quivalence, on a une solution de chlorure d'ammonium (NH₄⁺Cl⁻). L'ion ammonium NH₄⁺, acide faible, r\u00E9agit avec l'eau selon : NH₄⁺ + H\u2082O ⇌ NH\u2083 + H\u2083O⁺, ce qui lib\u00E8re des ions H\u2083O⁺ et rend la solution acide (pH < 7).</p></div>"
        }
      ]
    },
    {
      "titre": "Solutions tampon",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>On pr\u00E9pare une solution en m\u00E9langeant V\u2090 = 25,0 mL d'une solution d'acide ac\u00E9tique (CH\u2083COOH) de concentration C\u2090 = 0,20 mol/L avec V\u2091 = 25,0 mL d'une solution d'ac\u00E9tate de sodium (CH\u2083COO⁻Na⁺) de concentration C\u2091 = 0,20 mol/L.</strong></p><div style='background-color:#f0f4f8; padding:15px; border-radius:8px; margin:10px 0; color:#1a2332;'><p>Donn\u00E9e : pKa(CH\u2083COOH/CH\u2083COO⁻) = 4,8.</p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> D\u00E9finir une solution tampon.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Une solution tampon est une solution dont le pH varie tr\u00E8s peu lors de l'ajout de petites quantit\u00E9s d'acide ou de base, ou lors d'une dilution mod\u00E9r\u00E9e.</p><p>Elle est constitu\u00E9e d'un acide faible et de sa base conjugu\u00E9e (ou d'une base faible et de son acide conjugu\u00E9) en proportions \u00E9quivalentes.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer le pH de la solution tampon ainsi pr\u00E9par\u00E9e.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Apr\u00E8s m\u00E9lange, on a : [CH\u2083COOH] = C\u2090 × V\u2090 / (V\u2090+V\u2091) = 0,20 × 25,0 / 50,0 = 0,10 mol/L.</p><p>De m\u00EAme, [CH\u2083COO⁻] = C\u2091 × V\u2091 / (V\u2090+V\u2091) = 0,20 × 25,0 / 50,0 = 0,10 mol/L.</p><p>pH = pKa + log([CH\u2083COO⁻]/[CH\u2083COOH]) = 4,8 + log(0,10/0,10) = 4,8 + 0 = <strong>4,8</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> Comment \u00E9volue le pH de cette solution si on y ajoute une petite quantit\u00E9 d'acide fort ? Justifier.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Le pH de la solution tampon varie tr\u00E8s peu.</p><p><strong>Justification :</strong> L'acide fort ajout\u00E9 r\u00E9agit avec la base conjugu\u00E9e CH\u2083COO⁻ pr\u00E9sente en solution : CH\u2083COO⁻ + H\u2083O⁺ → CH\u2083COOH + H\u2082O. Cette r\u00E9action consomme les ions H\u2083O⁺ ajout\u00E9s et la solution r\u00E9siste au changement de pH.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>4.</strong> Citer une application des solutions tampon dans la vie courante.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p>Les solutions tampon ont de nombreuses applications :</p><ul><li><strong>En biologie :</strong> le sang humain est un tampon naturel qui maintient le pH \u00E0 7,4.</li><li><strong>En pharmacie :</strong> pour stabiliser le pH des m\u00E9dicaments.</li><li><strong>En chimie :</strong> pour calibrer les pH-m\u00E8tres.</li><li><strong>Dans l'industrie :</strong> pour contr\u00F4ler le pH de certaines r\u00E9actions.</li></ul></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
