<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths Tle D",
  "classe": "Terminale D",
  "sequence": "Evaluation Sequentielle N°5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Nombres complexes et Similitudes directes",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Le plan complexe est muni d'un repère orthonormé direct <span style='font-style: italic;'>(O, \\(\\vec{u}\\), \\(\\vec{v}\\))</span>. On considère la transformation \\(T\\) du plan qui à tout point \\(M\\) d'affixe \\(z\\) associe le point \\(M'\\) d'affixe \\(z'\\) définie par : <div class='math-block' style='text-align: center; margin: 10px 0;'><div class='math' style='background-color: #e9ecef; padding: 10px; border-radius: 5px; display: inline-block;'> z' = (1 + i\\sqrt{3})z + 2 - i </div></div> <br> 1) Déterminer le rapport et l'angle de la similitude directe \\(T\\). <br> 2) Déterminer l'affixe du centre \\(\\Omega\\) de \\(T\\). <br> 3) On considère le point \\(A\\) d'affixe \\(z_A = 1 + i\\). Déterminer l'affixe \\(z_{A'}\\) de son image \\(A'\\) par \\(T\\). En déduire la nature du triangle \\(\\Omega A A'\\).</div>",
      "questions": [
        {
          "question": "1) Déterminer le rapport et l'angle de la similitude directe \\(T\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>L'écriture complexe est de la forme \\(z' = az + b\\) avec \\(a = 1 + i\\sqrt{3}\\). <br> Le rapport est \\(k = |a| = \\sqrt{1^2 + (\\sqrt{3})^2} = \\sqrt{4} = 2\\). <br> L'angle est un argument de \\(a\\) : \\(\\arg(a) = \\arctan\\left(\\frac{\\sqrt{3}}{1}\\right) = \\frac{\\pi}{3}\\). <br> Donc <b>\\(T\\) est une similitude directe de rapport \\(k=2\\) et d'angle \\(\\theta = \\frac{\\pi}{3}\\)</b>.</div>"
        },
        {
          "question": "2) Déterminer l'affixe du centre \\(\\Omega\\) de \\(T\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le centre \\(\\omega\\) vérifie \\(\\omega = a\\omega + b\\), soit \\((1-a)\\omega = b\\). Donc \\(\\omega = \\frac{b}{1-a}\\). <br> Ici, \\(b = 2 - i\\). <br> \\(\\omega = \\frac{2 - i}{1 - (1 + i\\sqrt{3})} = \\frac{2 - i}{-i\\sqrt{3}}\\). <br> En multipliant par \\(i\\) : \\(\\omega = \\frac{(2 - i)i}{(-i\\sqrt{3})i} = \\frac{2i - i^2}{\\sqrt{3}} = \\frac{1 + 2i}{\\sqrt{3}} = \\frac{\\sqrt{3}}{3} + \\frac{2\\sqrt{3}}{3}i\\). <br> Donc <b>\\(\\Omega\\left(\\frac{\\sqrt{3}}{3}, \\frac{2\\sqrt{3}}{3}\\right)\\)</b>.</div>"
        },
        {
          "question": "3) On considère le point \\(A\\) d'affixe \\(z_A = 1 + i\\). Déterminer l'affixe \\(z_{A'}\\) de son image \\(A'\\) par \\(T\\). En déduire la nature du triangle \\(\\Omega A A'\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>\\(z_{A'} = (1 + i\\sqrt{3})(1+i) + 2 - i = 1 + i + i\\sqrt{3} + i^2\\sqrt{3} + 2 - i = 1 + i\\sqrt{3} - \\sqrt{3} + 2 = 3 - \\sqrt{3} + i\\sqrt{3}\\). <br> Comme \\(A'\\) est l'image de \\(A\\) par la similitude directe de centre \\(\\Omega\\), de rapport 2 et d'angle \\(\\pi/3\\), on a : <br> \\(\\Omega A' = 2 \\times \\Omega A\\) et \\((\\overrightarrow{\\Omega A}, \\overrightarrow{\\Omega A'}) = \\pi/3\\). <br> Donc le triangle \\(\\Omega A A'\\) est <b>rectangle en \\(A\\)</b> car la rotation d'angle \\(\\pi/3\\) et le rapport 2 donnent un triangle dont les côtés \\(\\Omega A\\) et \\(\\Omega A'\\) forment un angle de \\(\\pi/3\\), et l'hypoténuse est \\(AA'\\). En réalité, c'est un triangle \\(\\Omega A A'\\) avec \\(\\Omega A' = 2\\Omega A\\) et l'angle en \\(\\Omega\\) est \\(\\pi/3\\). C'est un triangle quelconque.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Equations différentielles et Primitives",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>On considère l'équation différentielle \\((E) : y'' - 4y' + 4y = 0\\). <br> 1) Résoudre l'équation différentielle \\((E)\\). <br> 2) Déterminer la solution particulière \\(f\\) de \\((E)\\) vérifiant \\(f(0) = 1\\) et \\(f'(0) = 3\\). <br> 3) Soit \\(g\\) la fonction définie par \\(g(x) = \\frac{x}{x^2 + 1}\\). Déterminer une primitive de \\(g\\) sur \\(\\mathbb{R}\\).</div>",
      "questions": [
        {
          "question": "1) Résoudre l'équation différentielle \\((E) : y'' - 4y' + 4y = 0\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>L'équation caractéristique est \\(r^2 - 4r + 4 = 0 \\Leftrightarrow (r-2)^2 = 0\\). <br> Elle admet une racine double \\(r = 2\\). <br> La solution générale de \\((E)\\) est donc : <br> <b>\\(y(x) = (C_1 + C_2 x) e^{2x}\\)</b>, avec \\(C_1, C_2 \\in \\mathbb{R}\\).</div>"
        },
        {
          "question": "2) Déterminer la solution particulière \\(f\\) de \\((E)\\) vérifiant \\(f(0) = 1\\) et \\(f'(0) = 3\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>On a \\(f(x) = (C_1 + C_2 x) e^{2x}\\). <br> \\(f(0) = C_1 = 1\\). <br> \\(f'(x) = C_2 e^{2x} + 2(C_1 + C_2 x)e^{2x} = (C_2 + 2C_1 + 2C_2 x)e^{2x}\\). <br> \\(f'(0) = C_2 + 2C_1 = C_2 + 2 = 3 \\Rightarrow C_2 = 1\\). <br> Donc <b>\\(f(x) = (1 + x)e^{2x}\\)</b>.</div>"
        },
        {
          "question": "3) Soit \\(g\\) la fonction définie par \\(g(x) = \\frac{x}{x^2 + 1}\\). Déterminer une primitive de \\(g\\) sur \\(\\mathbb{R}\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>On reconnaît la dérivée de \\(\\ln(x^2 + 1)\\) : \\((\\ln(x^2 + 1))' = \\frac{2x}{x^2 + 1}\\). <br> Donc une primitive de \\(g\\) est \\(G(x) = \\frac{1}{2} \\ln(x^2 + 1)\\). <br> <b>\\(G(x) = \\frac{1}{2}\\ln(x^2 + 1)\\)</b> est une primitive de \\(g\\) sur \\(\\mathbb{R}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Probabilités et Statistiques",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.8; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>Une urne contient 5 boules blanches et 3 boules noires. On tire successivement et avec remise 3 boules de l'urne. <br> 1) Calculer la probabilité de tirer exactement 2 boules blanches. <br> 2) Soit \\(X\\) la variable aléatoire égale au nombre de boules blanches tirées. Déterminer la loi de probabilité de \\(X\\) puis calculer son espérance. <br> 3) On donne la série statistique suivante : <br> <div style='overflow-x: auto; margin: 10px 0;'> <table style='width: 100%; border-collapse: collapse; background-color: white; color: #212529;'> <thead> <tr style='background-color: #e9ecef;'> <th style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>\\(x_i\\)</th> <th style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>1</th> <th style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>2</th> <th style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>3</th> <th style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>4</th> </tr> </thead> <tbody> <tr> <td style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>\\(y_i\\)</td> <td style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>5</td> <td style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>8</td> <td style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>12</td> <td style='border: 1px solid #dee2e6; padding: 8px; text-align: center;'>15</td> </tr> </tbody> </table> </div> <br> Déterminer l'équation de la droite de Mayer de cette série (on prendra les points moyens des sous-séries \\(x \\le 2\\) et \\(x \\ge 3\\)).</div>",
      "questions": [
        {
          "question": "1) Calculer la probabilité de tirer exactement 2 boules blanches.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>C'est un schéma de Bernoulli de paramètres \\(n=3\\), \\(p = \\frac{5}{8}\\) (probabilité de tirer une boule blanche). <br> \\(P(X=2) = \\binom{3}{2} \\left(\\frac{5}{8}\\right)^2 \\left(\\frac{3}{8}\\right)^1 = 3 \\times \\frac{25}{64} \\times \\frac{3}{8} = \\frac{225}{512}\\). <br> <b>\\(P(X=2) = \\frac{225}{512}\\)</b>.</div>"
        },
        {
          "question": "2) Soit \\(X\\) la variable aléatoire égale au nombre de boules blanches tirées. Déterminer la loi de probabilité de \\(X\\) puis calculer son espérance.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>\\(X\\) suit la loi binomiale \\(\\mathcal{B}(3, \\frac{5}{8})\\). <br> \\(P(X=k) = \\binom{3}{k} \\left(\\frac{5}{8}\\right)^k \\left(\\frac{3}{8}\\right)^{3-k}\\) pour \\(k = 0, 1, 2, 3\\). <br> Les probabilités sont : <br> \\(P(X=0) = (3/8)^3 = 27/512\\) <br> \\(P(X=1) = 3 \\times (5/8) \\times (3/8)^2 = 135/512\\) <br> \\(P(X=2) = 225/512\\) <br> \\(P(X=3) = (5/8)^3 = 125/512\\) <br> L'espérance est \\(E(X) = n p = 3 \\times \\frac{5}{8} = \\frac{15}{8}\\). <br> <b>\\(E(X) = \\frac{15}{8}\\)</b>.</div>"
        },
        {
          "question": "3) Déterminer l'équation de la droite de Mayer de la série (on prendra les points moyens des sous-séries \\(x \\le 2\\) et \\(x \\ge 3\\)).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Sous-série 1 (\\(x \\le 2\\)) : points (1,5) et (2,8). <br> Point moyen \\(G_1 = \\left(\\frac{1+2}{2}, \\frac{5+8}{2}\\right) = \\left(\\frac{3}{2}, \\frac{13}{2}\\right) = (1.5, 6.5)\\). <br> Sous-série 2 (\\(x \\ge 3\\)) : points (3,12) et (4,15). <br> Point moyen \\(G_2 = \\left(\\frac{3+4}{2}, \\frac{12+15}{2}\\right) = \\left(\\frac{7}{2}, \\frac{27}{2}\\right) = (3.5, 13.5)\\). <br> La droite de Mayer est la droite passant par \\(G_1\\) et \\(G_2\\). <br> Coefficient directeur : \\(a = \\frac{13.5 - 6.5}{3.5 - 1.5} = \\frac{7}{2} = 3.5\\). <br> Ordonnée à l'origine : \\(b = 6.5 - 3.5 \\times 1.5 = 6.5 - 5.25 = 1.25 = \\frac{5}{4}\\). <br> L'équation est <b>\\(y = 3.5x + 1.25\\)</b>, soit \\(y = \\frac{7}{2}x + \\frac{5}{4}\\).</div>"

    {

      "questions": [
        {
          "question": "1) Déterminer le domaine de définition et les limites de \\(f\\) en \\(\\pm\\infty\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Le dénominateur \\(x^2 + 1 > 0\\) pour tout \\(x \\in \\mathbb{R}\\). <br> Donc le domaine de définition est <b>\\(D_f = \\mathbb{R}\\)</b>. <br> \\(\\lim_{x \\to +\\infty} f(x) = \\lim_{x \\to +\\infty} \\frac{x}{x^2} = \\lim_{x \\to +\\infty} \\frac{1}{x} = 0^+\\). <br> \\(\\lim_{x \\to -\\infty} f(x) = \\lim_{x \\to -\\infty} \\frac{1}{x} = 0^-\\).</div>"
        },
        {
          "question": "2) Calculer la dérivée \\(f'(x)\\) et dresser le tableau de variations de \\(f\\).",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>\\(f'(x) = \\frac{1 \\times (x^2 + 1) - x \\times 2x}{(x^2 + 1)^2} = \\frac{x^2 + 1 - 2x^2}{(x^2 + 1)^2} = \\frac{1 - x^2}{(x^2 + 1)^2}\\). <br> Signe de \\(f'(x)\\) : <br> \\(1 - x^2 \\ge 0 \\Leftrightarrow -1 \\le x \\le 1\\). <br> Donc \\(f\\) est croissante sur \\([-1, 1]\\) et décroissante sur \\(]-\\infty, -1]\\) et \\([1, +\\infty[\\). <br> \\(f(-1) = -1/2\\), \\(f(1) = 1/2\\). <br> Tableau : \\(f\\) décroît de 0 à -1/2, croît de -1/2 à 1/2, décroît de 1/2 à 0.</div>"
        },
        {
          "question": "3) Déterminer les coordonnées des points d'intersection de la courbe de \\(f\\) avec les axes du repère.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Intersection avec l'axe des abscisses (\\(y=0\\)) : \\(\\frac{x}{x^2+1} = 0 \\Leftrightarrow x = 0\\). Le point est <b>\\((0,0)\\)</b>. <br> Intersection avec l'axe des ordonnées (\\(x=0\\)) : \\(f(0) = 0\\). Le point est <b>\\((0,0)\\)</b>. <br> La courbe passe par l'origine.</div>"

          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Une primitive de \\(\\frac{x}{x^2+1}\\) est \\(\\frac{1}{2} \\ln(x^2+1)\\). <br> \\(I = [\\frac{1}{2} \\ln(x^2+1)]_0^1 = \\frac{1}{2} (\\ln(2) - \\ln(1)) = \\frac{1}{2} \\ln 2\\). <br> <b>\\(I = \\frac{1}{2} \\ln 2\\)</b>.</div>"
        }

      "questions": [
        {
          "question": "1) Déterminer le degré de chaque sommet. Vérifier la relation \\(\\sum d(s) = 2m\\) où \\(m\\) est le nombre d'arêtes.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Arêtes : AB, AC, AD, BC, BE, CD, CE, DE (8 arêtes, \\(m=8\\)). <br> Degrés : <br> \\(d(A) = 3\\) (AB, AC, AD) <br> \\(d(B) = 3\\) (AB, BC, BE) <br> \\(d(C) = 4\\) (AC, BC, CD, CE) <br> \\(d(D) = 3\\) (AD, CD, DE) <br> \\(d(E) = 3\\) (BE, CE, DE) <br> Somme des degrés : \\(3+3+4+3+3 = 16 = 2 \\times 8\\). La relation est vérifiée.</div>"
        },
        {
          "question": "2) Le graphe \\(G\\) admet-il une chaîne eulérienne ? Justifier.",
          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>Un graphe admet une chaîne eulérienne si et seulement si le nombre de sommets de degré impair est 0 ou 2. <br> Ici, les degrés sont : A(3) impair, B(3) impair, C(4) pair, D(3) impair, E(3) impair. <br> Il y a 4 sommets de degré impair (A, B, D, E). <br> Donc <b>le graphe n'admet pas de chaîne eulérienne</b>.</div>"

          "reponse": "<div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529;'>La composée d'une rotation et d'une symétrie orthogonale est une symétrie orthogonale ou une réflexion. <br> Plus précisément, \\(s \\circ r\\) est une symétrie orthogonale (réflexion) d'axe faisant un angle de \\(\\pi/4\\) avec l'axe des abscisses. <br> En effet, une rotation d'angle \\(\\pi/2\\) suivie d'une réflexion d'axe \\((Ox)\\) donne une réflexion d'axe d'angle \\(\\pi/4\\). <br> Donc <b>\\(s \\circ r\\) est une symétrie orthogonale</b>.</div>"

};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
