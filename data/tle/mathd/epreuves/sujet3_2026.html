<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Mathématiques",
 "classe": "Terminale D",
 "sequence": "Évaluation Séquentielle N°3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Nombres Complexes et Similitudes",
     "points": "5 pts",
     "enonce": "<div style='padding: 10px; font-size: 1em; line-height: 1.6;'>\n<p>Le plan complexe est rapporté à un repère orthonormé direct \\( (O; \\vec{u}, \\vec{v}) \\). On considère les points \\( A, B, C \\) et \\( M \\) d'affixes respectives :</p>\n<div class='math-block'><div class='math'>$$ z_A = 1 + i\\sqrt{3}, \\quad z_B = -2, \\quad z_C = \\sqrt{3} - i $$</div></div>\n<ol style='list-style-type: none; padding-left: 0;'>\n<li><strong>1.</strong> (1 pt) Écrire \\( z_A, z_B \\) et \\( z_C \\) sous forme trigonométrique.</li>\n<li><strong>2.</strong> (1,5 pt) Soit \\( S \\) la similitude directe de centre \\( O \\) qui transforme \\( A \\) en \\( B \\).\n<ul style='list-style-type: disc; margin-top: 5px;'>\n<li>a) Déterminer le rapport \\( k \\) et l'angle \\( \\theta \\) de \\( S \\).</li>\n<li>b) Donner l'écriture complexe de \\( S \\).</li>\n</ul>\n</li>\n<li><strong>3.</strong> (1 pt) Déterminer l'affixe \\( z_{M'} \\) de l'image \\( M' \\) du point \\( M \\) d'affixe \\( z = 2 - i \\) par \\( S \\).</li>\n<li><strong>4.</strong> (1,5 pt) Déterminer et construire l'ensemble \\( (E) \\) des points \\( M \\) d'affixe \\( z \\) tels que \\( |z - 1 + i| = |z + 2| \\).</li>\n</ol>\n</div>",
     "questions": [
       {
         "question": "1) Donner les formes trigonométriques de \\( z_A \\), \\( z_B \\) et \\( z_C \\).",
         "reponse": "<div style='padding: 5px 0;'><p>\\( z_A = 2\\left(\\cos\\frac{\\pi}{3} + i\\sin\\frac{\\pi}{3}\\right) \\)</p><p>\\( z_B = 2(\\cos\\pi + i\\sin\\pi) \\)</p><p>\\( z_C = 2\\left(\\cos\\frac{-\\pi}{6} + i\\sin\\frac{-\\pi}{6}\\right) \\)</p></div>"
       },
       {
         "question": "2a) Déterminer le rapport \\( k \\) et l'angle \\( \\theta \\) de la similitude directe \\( S \\) de centre \\( O \\) qui transforme \\( A \\) en \\( B \\).",
         "reponse": "<div style='padding: 5px 0;'><p>On a \\( \\frac{z_B}{z_A} = \\frac{-2}{1 + i\\sqrt{3}} = \\frac{-2}{2e^{i\\pi/3}} = -e^{-i\\pi/3} = e^{i\\pi} \\times e^{-i\\pi/3} = e^{i(2\\pi/3)} \\)</p><p>Donc \\( k = 1 \\) (car \\( |e^{i(2\\pi/3)}| = 1 \\)) et \\( \\theta = \\frac{2\\pi}{3} \\).</p><p>\\( S \\) est une rotation de centre \\( O \\) et d'angle \\( \\frac{2\\pi}{3} \\).</p></div>"
       },
       {
         "question": "2b) Donner l'écriture complexe de \\( S \\).",
         "reponse": "<div style='padding: 5px 0;'><p>L'écriture complexe d'une rotation de centre \\( O \\) et d'angle \\( \\theta \\) est \\( z' = e^{i\\theta} z \\).</p><p>Avec \\( e^{i\\theta} = e^{i\\frac{2\\pi}{3}} = -\\frac{1}{2} + i\\frac{\\sqrt{3}}{2} \\), on obtient :</p><div class='math-block'><div class='math'>$$ z' = \\left(-\\frac{1}{2} + i\\frac{\\sqrt{3}}{2}\\right) z $$</div></div></div>"
       },
       {
         "question": "3) Déterminer l'affixe \\( z_{M'} \\) de l'image \\( M' \\) du point \\( M \\) d'affixe \\( z = 2 - i \\).",
         "reponse": "<div style='padding: 5px 0;'><p>\\( z_{M'} = \\left(-\\frac{1}{2} + i\\frac{\\sqrt{3}}{2}\\right)(2 - i) \\)</p><p>\\( z_{M'} = -1 + \\frac{i}{2} + i\\sqrt{3} - \\frac{i^2\\sqrt{3}}{2} = -1 + \\frac{\\sqrt{3}}{2} + i\\left(\\frac{1}{2} + \\sqrt{3}\\right) \\)</p></div>"
       },
       {
         "question": "4) Déterminer l'ensemble \\( (E) \\) des points \\( M \\) d'affixe \\( z \\) tels que \\( |z - 1 + i| = |z + 2| \\).",
         "reponse": "<div style='padding: 5px 0;'><p>\\( |z - (1 - i)| = |z - (-2)| \\)</p><p>L'ensemble \\( (E) \\) est la médiatrice du segment \\( [A'B] \\) où \\( A' \\) est le point d'affixe \\( 1 - i \\) et \\( B \\) le point d'affixe \\( -2 \\).</p><p>En posant \\( z = x + iy \\), on a :</p><p>\\( |x + iy - 1 + i|^2 = |x + iy + 2|^2 \\)</p><p>\\( (x-1)^2 + (y+1)^2 = (x+2)^2 + y^2 \\)</p><p>\\( x^2 - 2x + 1 + y^2 + 2y + 1 = x^2 + 4x + 4 + y^2 \\)</p><p>\\( -6x + 2y - 2 = 0 \\)</p><p>\\( -3x + y - 1 = 0 \\)</p><p>Donc \\( (E) \\) est la droite d'équation \\( y = 3x + 1 \\).</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Suites et Équations Différentielles",
     "points": "4 pts",
     "enonce": "<div style='padding: 10px; font-size: 1em; line-height: 1.6;'>\n<ol style='list-style-type: none; padding-left: 0;'>\n<li><strong>1.</strong> (1 pt) Une suite \\( (u_n) \\) est définie par \\( u_0 = 2 \\) et \\( u_{n+1} = 3u_n - 2 \\). Calculer \\( u_1, u_2, u_3 \\).</li>\n<li><strong>2.</strong> (1,5 pt) Montrer que \\( (u_n) \\) est une suite géométrique dont on précisera la raison et le premier terme.</li>\n<li><strong>3.</strong> (1,5 pt) Résoudre l'équation différentielle : \\( y'' - 4y' + 4y = 0 \\).</li>\n</ol>\n</div>",
     "questions": [
       {
         "question": "1) Calculer \\( u_1, u_2, u_3 \\).",
         "reponse": "<div style='padding: 5px 0;'><p>\\( u_1 = 3 \\times 2 - 2 = 4 \\)</p><p>\\( u_2 = 3 \\times 4 - 2 = 10 \\)</p><p>\\( u_3 = 3 \\times 10 - 2 = 28 \\)</p></div>"
       },
       {
         "question": "2) Montrer que \\( (u_n) \\) est une suite géométrique. Préciser la raison et le premier terme.",
         "reponse": "<div style='padding: 5px 0;'><p>Soit \\( v_n = u_n - 1 \\).</p><p>\\( v_{n+1} = u_{n+1} - 1 = (3u_n - 2) - 1 = 3u_n - 3 = 3(u_n - 1) = 3v_n \\)</p><p>Donc \\( (v_n) \\) est une suite géométrique de raison \\( 3 \\) et de premier terme \\( v_0 = u_0 - 1 = 1 \\).</p></div>"
       },
       {
         "question": "3) Résoudre l'équation différentielle : \\( y'' - 4y' + 4y = 0 \\).",
         "reponse": "<div style='padding: 5px 0;'><p>L'équation caractéristique est : \\( r^2 - 4r + 4 = 0 \\) soit \\( (r - 2)^2 = 0 \\), donc une racine double \\( r = 2 \\).</p><p>La solution générale de l'équation différentielle est :</p><div class='math-block'><div class='math'>$$ y(x) = (C_1 x + C_2) e^{2x} $$</div></div><p>où \\( C_1 \\) et \\( C_2 \\) sont des constantes réelles.</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Probabilités et Statistiques",
     "points": "4 pts",
     "enonce": "<div style='padding: 10px; font-size: 1em; line-height: 1.6;'>\n<p>Une urne contient 3 boules rouges et 2 boules vertes. On tire successivement et avec remise 3 boules.</p>\n<ol style='list-style-type: none; padding-left: 0;'>\n<li><strong>1.</strong> (1 pt) Déterminer l'univers \\( \\Omega \\) et son cardinal.</li>\n<li><strong>2.</strong> (1,5 pt) Calculer la probabilité d'obtenir exactement deux boules rouges.</li>\n<li><strong>3.</strong> (1,5 pt) Déterminer la loi de probabilité de la variable aléatoire \\( X \\) égale au nombre de boules vertes obtenues.</li>\n</ol>\n</div>",
     "questions": [
       {
         "question": "1) Déterminer l'univers \\( \\Omega \\) et son cardinal.",
         "reponse": "<div style='padding: 5px 0;'><p>L'univers \\( \\Omega \\) est l'ensemble des 3-uplets de boules issues de l'urne, avec remise.</p><p>Pour chaque tirage, on a 5 choix possibles (3 rouges + 2 vertes).</p><p>Donc \\( \\text{Card}(\\Omega) = 5^3 = 125 \\).</p></div>"
       },
       {
         "question": "2) Calculer la probabilité d'obtenir exactement deux boules rouges.",
         "reponse": "<div style='padding: 5px 0;'><p>Soit \\( R \\) l'événement 'obtenir une boule rouge'. \\( P(R) = \\frac{3}{5} \\). Soit \\( V \\) l'événement 'obtenir une boule verte'. \\( P(V) = \\frac{2}{5} \\).</p><p>Obtenir exactement deux rouges signifie une séquence avec deux R et un V.</p><p>Nombre de séquences : \\( \\binom{3}{2} = 3 \\).</p><p>Probabilité d'une séquence : \\( \\left(\\frac{3}{5}\\right)^2 \\times \\frac{2}{5} = \\frac{9}{25} \\times \\frac{2}{5} = \\frac{18}{125} \\).</p><p>Donc \\( P(\\text{exactement deux rouges}) = 3 \\times \\frac{18}{125} = \\frac{54}{125} \\).</p></div>"
       },
       {
         "question": "3) Déterminer la loi de probabilité de \\( X \\) égale au nombre de boules vertes obtenues.",
         "reponse": "<div style='padding: 5px 0;'><p>\\( X \\) suit une loi binomiale de paramètres \\( n = 3 \\) et \\( p = \\frac{2}{5} \\).</p><p>Pour \\( k \\in \\{0, 1, 2, 3\\} \\), \\( P(X = k) = \\binom{3}{k} \\left(\\frac{2}{5}\\right)^k \\left(\\frac{3}{5}\\right)^{3-k} \\).</p><p>Donc la loi de probabilité de \\( X \\) est :</p><p>\\( P(X = 0) = \\frac{27}{125} \\)</p><p>\\( P(X = 1) = \\frac{54}{125} \\)</p><p>\\( P(X = 2) = \\frac{36}{125} \\)</p><p>\\( P(X = 3) = \\frac{8}{125} \\)</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Étude de Fonction et Calcul Intégral",
     "points": "7 pts",
     "enonce": "<div style='padding: 10px; font-size: 1em; line-height: 1.6;'>\n<p>On considère la fonction \\( f \\) définie par :</p>\n<div class='math-block'><div class='math'>$$ f(x) = x + 1 + \\frac{1}{x - 1} $$</div></div>\n<ol style='list-style-type: none; padding-left: 0;'>\n<li><strong>1.</strong> (1 pt) Déterminer le domaine de définition \\( D_f \\) de \\( f \\).</li>\n<li><strong>2.</strong> (1 pt) Calculer les limites de \\( f \\) aux bornes de \\( D_f \\).</li>\n<li><strong>3.</strong> (1 pt) Déterminer les asymptotes éventuelles.</li>\n<li><strong>4.</strong> (1,5 pt) Calculer la dérivée \\( f'(x) \\) et dresser le tableau de variations de \\( f \\).</li>\n<li><strong>5.</strong> (1,5 pt) Calculer l'intégrale \\( I = \\displaystyle\\int_2^3 f(x) \\, dx \\).</li>\n<li><strong>6.</strong> (1 pt) Donner une interprétation géométrique de \\( I \\).</li>\n</ol>\n</div>",
     "questions": [
       {

         "reponse": "<div style='padding: 5px 0;'><p>La fonction \\( f \\) est définie pour \\( x - 1 \\neq 0 \\), c'est-à-dire \\( x \\neq 1 \\).</p><p>Donc \\( D_f = \\mathbb{R} \\setminus \\{1\\} = ]-\\infty; 1[ \\cup ]1; +\\infty[ \\).</p></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
