<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Terminale D",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Nombres complexes et similitudes",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Le plan complexe est muni d'un repère orthonormé direct \\((O, \\vec{u}, \\vec{v})\\).</p><p>On considère les points \\(A\\), \\(B\\) et \\(C\\) d'affixes respectives :</p><p>\\(z_A = 2 + 2i\\sqrt{3}\\), \\(z_B = -4\\) et \\(z_C = 1 - i\\sqrt{3}\\).</p><p>Soit \\(s\\) la similitude directe de centre \\(B\\) qui transforme \\(A\\) en \\(C\\).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> Déterminer le rapport \\(k\\) et l'angle \\(\\theta\\) de la similitude \\(s\\).</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>\\(\\overrightarrow{BA}\\) a pour affixe : \\(z_A - z_B = 2 + 2i\\sqrt{3} - (-4) = 6 + 2i\\sqrt{3}\\).<br>\\(\\overrightarrow{BC}\\) a pour affixe : \\(z_C - z_B = 1 - i\\sqrt{3} - (-4) = 5 - i\\sqrt{3}\\).<br><br>Le rapport est : \\(k = \\frac{|\\overrightarrow{BC}|}{|\\overrightarrow{BA}|} = \\frac{\\sqrt{25 + 3}}{\\sqrt{36 + 12}} = \\frac{\\sqrt{28}}{\\sqrt{48}} = \\frac{2\\sqrt{7}}{4\\sqrt{3}} = \\frac{\\sqrt{21}}{6}\\).<br><br>L'angle est : \\(\\theta = \\arg(z_C - z_B) - \\arg(z_A - z_B) = \\arg\\left(\\frac{z_C - z_B}{z_A - z_B}\\right) = \\arg\\left(\\frac{5 - i\\sqrt{3}}{6 + 2i\\sqrt{3}}\\right)\\).<br><br>En multipliant par le conjugué : \\(\\frac{(5 - i\\sqrt{3})(6 - 2i\\sqrt{3})}{36 + 12} = \\frac{30 - 10i\\sqrt{3} - 6i\\sqrt{3} - 6}{48} = \\frac{24 - 16i\\sqrt{3}}{48} = \\frac{1}{2} - \\frac{\\sqrt{3}}{3}i = \\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\).<br><br>Donc \\(\\cos \\theta = \\frac{1}{2}\\) et \\(\\sin \\theta = -\\frac{\\sqrt{3}}{3}\\) (pas une valeur remarquable classique). On peut aussi exprimer l'angle comme \\(\\theta = \\arg\\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right)\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> Donner l'écriture complexe de la similitude \\(s\\).</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>L'écriture complexe d'une similitude directe de centre \\(\\omega\\) est : \\(z' - z_\\omega = a(z - z_\\omega)\\), avec \\(a = k e^{i\\theta}\\).<br><br>Ici \\(a = \\frac{z_C - z_B}{z_A - z_B} = \\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\).<br><br>Donc \\(z' + 4 = \\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right)(z + 4)\\).<br><br>Soit \\(z' = \\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right)z + 4\\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right) - 4\\).<br><br>\\(z' = \\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right)z + 2 - i\\frac{4\\sqrt{3}}{3} - 4 = \\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right)z - 2 - i\\frac{4\\sqrt{3}}{3}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> Déterminer l'affixe du point \\(D\\), image de \\(C\\) par la similitude \\(s\\).</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>On applique l'écriture complexe à \\(z_C = 1 - i\\sqrt{3}\\) :<br><br>\\(z_D = \\left(\\frac{1}{2} - i\\frac{\\sqrt{3}}{3}\\right)(1 - i\\sqrt{3}) - 2 - i\\frac{4\\sqrt{3}}{3}\\).<br><br>\\(z_D = \\frac{1}{2} - i\\frac{\\sqrt{3}}{2} - i\\frac{\\sqrt{3}}{3} + i^2\\frac{\\sqrt{3} \\times \\sqrt{3}}{3} - 2 - i\\frac{4\\sqrt{3}}{3}\\).<br><br>\\(z_D = \\frac{1}{2} - i\\left(\\frac{\\sqrt{3}}{2} + \\frac{\\sqrt{3}}{3}\\right) - 1 - 2 - i\\frac{4\\sqrt{3}}{3}\\).<br><br>\\(z_D = \\frac{1}{2} - 1 - 2 - i\\left(\\frac{3\\sqrt{3} + 2\\sqrt{3}}{6} + \\frac{8\\sqrt{3}}{6}\\right) = -\\frac{5}{2} - i\\left(\\frac{5\\sqrt{3}}{6} + \\frac{8\\sqrt{3}}{6}\\right) = -\\frac{5}{2} - i\\frac{13\\sqrt{3}}{6}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Équations différentielles",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Résoudre les équations différentielles suivantes :</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> \\(y' - 3y = 0\\)</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>La solution générale est \\(y = C e^{3x}\\), où \\(C \\in \\mathbb{R}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> \\(y' + 2y = 0\\) avec \\(y(0) = 5\\)</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>La solution générale est \\(y = C e^{-2x}\\).<br>En utilisant la condition initiale : \\(5 = C e^{0} = C\\).<br>Donc la solution particulière est \\(y = 5 e^{-2x}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> \\(y'' - 2y' + y = 0\\)</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>L'équation caractéristique est \\(r^2 - 2r + 1 = 0\\), soit \\((r-1)^2 = 0\\). Elle admet une racine double \\(r = 1\\).<br>La solution générale est \\(y = (C_1 + C_2 x)e^{x}\\), où \\(C_1, C_2 \\in \\mathbb{R}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>4.</strong> \\(y'' + 4y' + 13y = 0\\)</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>L'équation caractéristique est \\(r^2 + 4r + 13 = 0\\).<br>Le discriminant est \\(\\Delta = 16 - 52 = -36 = (6i)^2\\).<br>Les racines sont \\(r = \\frac{-4 \\pm 6i}{2} = -2 \\pm 3i\\).<br>La solution générale est \\(y = e^{-2x}(C_1 \\cos(3x) + C_2 \\sin(3x))\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Probabilités",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Une urne contient 3 boules rouges, 2 boules vertes et 1 boule bleue.</p><p>On tire successivement et avec remise 3 boules de l'urne.</p><p>On note \\(R\\) l'événement \"obtenir une boule rouge\", \\(V\\) \"obtenir une boule verte\" et \\(B\\) \"obtenir une boule bleue\".</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> Construire l'arbre de probabilités de cette expérience.</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>L'arbre comporte 3 niveaux. À chaque niveau, on a les branches :<br>- \\(R\\) avec probabilité \\(\\frac{3}{6} = \\frac{1}{2}\\)<br>- \\(V\\) avec probabilité \\(\\frac{2}{6} = \\frac{1}{3}\\)<br>- \\(B\\) avec probabilité \\(\\frac{1}{6}\\)<br>Les probabilités sont identiques à chaque tirage car il y a remise.</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> Calculer la probabilité d'obtenir exactement deux boules rouges.</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>C'est une répétition de 3 épreuves de Bernoulli avec \\(p = \\frac{1}{2}\\).<br>Soit \\(X\\) la variable aléatoire qui compte le nombre de boules rouges obtenues. \\(X \\sim \\mathcal{B}(3; \\frac{1}{2})\\).<br><br>\\(P(X=2) = \\binom{3}{2} \\left(\\frac{1}{2}\\right)^2 \\left(1 - \\frac{1}{2}\\right)^1 = 3 \\times \\frac{1}{4} \\times \\frac{1}{2} = \\frac{3}{8}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> Calculer la probabilité d'obtenir au moins une boule verte.</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>L'événement contraire est \"n'obtenir aucune boule verte\", c'est-à-dire obtenir uniquement des boules rouges ou bleues.<br>La probabilité de ne pas obtenir une boule verte à un tirage est \\(1 - \\frac{1}{3} = \\frac{2}{3}\\).<br><br>\\(P(\\text{au moins une verte}) = 1 - \\left(\\frac{2}{3}\\right)^3 = 1 - \\frac{8}{27} = \\frac{19}{27}\\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Fonctions – étude complète",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Soit \\(f\\) la fonction définie par : \\(f(x) = \\frac{x^2 - 3x + 2}{x - 1}\\).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>1.</strong> Déterminer le domaine de définition de \\(f\\).</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>Le dénominateur s'annule pour \\(x = 1\\).<br>Donc \\(D_f = \\mathbb{R} \\setminus \\{1\\}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>2.</strong> Simplifier l'expression de \\(f(x)\\) pour \\(x \\neq 1\\).</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>Le numérateur se factorise : \\(x^2 - 3x + 2 = (x-1)(x-2)\\).<br>Donc pour \\(x \\neq 1\\), \\(f(x) = \\frac{(x-1)(x-2)}{x-1} = x-2\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>3.</strong> Calculer les limites de \\(f\\) aux bornes de son domaine.</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>\\(\\lim_{x \\to +\\infty} f(x) = \\lim_{x \\to +\\infty} (x-2) = +\\infty\\).<br><br>\\(\\lim_{x \\to -\\infty} f(x) = \\lim_{x \\to -\\infty} (x-2) = -\\infty\\).<br><br>En \\(x=1\\) : \\(\\lim_{x \\to 1} f(x) = \\lim_{x \\to 1} (x-2) = -1\\).<br>La fonction admet un prolongement par continuité en 1 avec \\(f(1) = -1\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>4.</strong> Calculer \\(f'(x)\\) et dresser le tableau de variations de \\(f\\).</div>",
          "reponse": "<div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>\\(f'(x) = 1\\) pour \\(x \\neq 1\\).<br>Donc \\(f'(x) > 0\\) sur \\(] -\\infty; 1[\\) et sur \\(]1; +\\infty[\\).<br><br>Tableau de variations :<br>Sur \\(] -\\infty; 1[\\), \\(f\\) est strictement croissante de \\(-\\infty\\) à \\(-1\\).<br>Sur \\(]1; +\\infty[\\), \\(f\\) est strictement croissante de \\(-1\\) à \\(+\\infty\\).</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
