<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>

    <main class="slide-body" id="slideBody"></main>

    <footer class="slide-footer">
        <div class="footer-top">

                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>

                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais Tle A",
  "classe": "Terminale",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Reading Comprehension: Understanding Health Campaigns",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Read the following text carefully and answer the questions that follow.</p><div style='background-color:#e3f2fd; padding:15px; border-radius:6px; margin:10px 0;'><p><strong>Text:</strong></p><p>In recent years, health campaigns have become essential tools in the fight against preventable diseases. Campaigns such as those against COVID-19, malaria, and HIV/AIDS educate the public on prevention methods, including vaccination, hygiene practices, and safe behaviours. Governments and NGOs collaborate with local communities to spread awareness and encourage people to adopt healthier lifestyles.</p><p>One of the most effective strategies is the use of mass media. Television, radio, and social media platforms are used to reach a wide audience with simple, clear messages. In many African countries, campaigns also involve community health workers who visit villages to provide information and distribute preventive materials like mosquito nets and condoms.</p><p>Despite these efforts, challenges remain. Misinformation, cultural beliefs, and limited access to healthcare facilities often hinder the success of campaigns. To overcome these barriers, health experts recommend tailored approaches that respect local traditions while promoting scientifically proven methods. If communities are properly informed and equipped, they can protect themselves more effectively against disease outbreaks.</p></div></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> What is the main purpose of health campaigns according to the text?</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> The main purpose is to educate the public on prevention methods against preventable diseases and encourage healthier lifestyles.</p>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> List two media used in health campaigns to reach a wide audience.</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> Television and radio (or social media, mass media).</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> What role do community health workers play in health campaigns in African countries?</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> They visit villages to provide information and distribute preventive materials like mosquito nets and condoms.</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> According to the text, what are the main challenges facing health campaigns?</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> Misinformation, cultural beliefs, and limited access to healthcare facilities.</p>"
        },
        {
          "question": "<p><strong>5. (1 pt)</strong> What recommendation do health experts give to improve the success of health campaigns?</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> They recommend tailored approaches that respect local traditions while promoting scientifically proven methods.</p>"
        }
      ]
    },
    {
      "titre": "Grammar: Passive Voice and Reported Speech",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Complete the sentences with the correct passive form or reported speech.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (0.5 pt)</strong> The government _______ (launch) a new vaccination campaign last month. (passive voice)</p>",
          "reponse": "<p><strong>Réponse : was launched</strong><br><em>Explication :</em> The action was performed by the government, so the passive voice is used: 'The government was launched...' is incorrect; the correct form is 'A new vaccination campaign was launched by the government.' The sentence should read: 'A new vaccination campaign was launched by the government last month.' However, since the subject is 'The government', we can also say 'The government launched' in active voice. For passive, the object becomes subject: 'A new vaccination campaign was launched by the government last month.'</p>"
        },
        {
          "question": "<p><strong>2. (0.5 pt)</strong> Health tips _______ (give) to patients during the campaign.</p>",
          "reponse": "<p><strong>Réponse : were given</strong><br><em>Explication :</em> Passive voice (past simple).</p>"
        },
        {
          "question": "<p><strong>3. (0.5 pt)</strong> The doctor said, \"You should take the vaccine.\" → The doctor said that I _______.</p>",
          "reponse": "<p><strong>Réponse : should take the vaccine</strong><br><em>Explication :</em> Reported speech with the modal 'should' does not change.</p>"
        },
        {
          "question": "<p><strong>4. (0.5 pt)</strong> The mayor announced, \"We will launch a new waste management plan.\" → The mayor announced that _______.</p>",
          "reponse": "<p><strong>Réponse : they would launch a new waste management plan</strong><br><em>Explication :</em> Reported speech: 'will' changes to 'would' and the pronoun changes.</p>"
        },
        {
          "question": "<p><strong>5. (0.5 pt)</strong> Many schools _______ (close) during the pandemic. (passive voice)</p>",
          "reponse": "<p><strong>Réponse : were closed</strong><br><em>Explication :</em> Passive voice (past simple).</p>"
        },
        {
          "question": "<p><strong>6. (0.5 pt)</strong> The teacher said, \"The curriculum has been updated.\" → The teacher said that _______.</p>",
          "reponse": "<p><strong>Réponse : the curriculum had been updated</strong><br><em>Explication :</em> Reported speech: present perfect changes to past perfect.</p>"
        },
        {
          "question": "<p><strong>7. (0.5 pt)</strong> The vaccine _______ (develop) by scientists in record time.</p>",
          "reponse": "<p><strong>Réponse : was developed</strong><br><em>Explication :</em> Passive voice (past simple).</p>"
        },
        {
          "question": "<p><strong>8. (0.5 pt)</strong> She said, \"I am feeling better now.\" → She said that _______.</p>",
          "reponse": "<p><strong>Réponse : she was feeling better then</strong><br><em>Explication :</em> Reported speech: present continuous changes to past continuous, and 'now' changes to 'then'.</p>"
        }
      ]
    },
    {
      "titre": "Vocabulary: Environment and Recycling",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Match the words on the left with their correct definitions on the right. Write the letter of the definition next to the word.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (0.5 pt)</strong> Recycle</p>",
          "reponse": "<p><strong>Réponse : D</strong><br><em>Définition :</em> To convert waste into reusable material.</p>"
        },
        {
          "question": "<p><strong>2. (0.5 pt)</strong> Toxic</p>",
          "reponse": "<p><strong>Réponse : G</strong><br><em>Définition :</em> Poisonous; harmful to living organisms.</p>"
        },
        {
          "question": "<p><strong>3. (0.5 pt)</strong> Waste</p>",
          "reponse": "<p><strong>Réponse : F</strong><br><em>Définition :</em> Unwanted materials or substances that are discarded.</p>"
        },
        {
          "question": "<p><strong>4. (0.5 pt)</strong> Contaminate</p>",
          "reponse": "<p><strong>Réponse : B</strong><br><em>Définition :</em> To make something impure by adding harmful substances.</p>"
        },
        {
          "question": "<p><strong>5. (0.5 pt)</strong> Rubbish disposal</p>",
          "reponse": "<p><strong>Réponse : A</strong><br><em>Définition :</em> The process of getting rid of waste materials.</p>"
        },
        {
          "question": "<p><strong>6. (0.5 pt)</strong> Reduce</p>",
          "reponse": "<p><strong>Réponse : C</strong><br><em>Définition :</em> To make something smaller or less in amount.</p>"
        },
        {
          "question": "<p><strong>7. (0.5 pt)</strong> Conservation</p>",
          "reponse": "<p><strong>Réponse : E</strong><br><em>Définition :</em> The protection and preservation of the environment.</p>"
        },
        {
          "question": "<p><strong>8. (0.5 pt)</strong> Erosion</p>",
          "reponse": "<p><strong>Réponse : H</strong><br><em>Définition :</em> The gradual wearing away of soil and rock by wind or water.</p>"
        }
      ]
    },
    {
      "titre": "Writing: A Letter of Complaint about Service Quality",
      "points": "7 pts",
      "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Imagine you recently purchased a faulty product (e.g., a smartphone) online. Write a formal letter of complaint to the customer service department. In your letter, you should:</p><ul style='list-style-type: disc; margin-left:20px;'><li>Introduce yourself and state the purpose of the letter.</li><li>Describe the problem with the product.</li><li>Explain what you expect (e.g., a refund, exchange, or repair).</li><li>Use vocabulary from the lesson (e.g., refund, warranty, complaint, customer service).</li></ul><p>Your letter should be between <strong>180 and 220 words</strong>.</p><p><strong>Structure of a formal letter:</strong></p><ul style='list-style-type: disc; margin-left:20px;'><li>Your address and the date (top right).</li><li>Recipient's address (top left).</li><li>Subject line (e.g., Subject: Complaint about faulty smartphone).</li><li>Salutation (e.g., Dear Customer Service Manager).</li><li>Body: introduction, description of the problem, explanation of expectations, conclusion.</li><li>Closing (e.g., Yours faithfully / Yours sincerely).</li><li>Signature.</li></ul></div>",
      "questions": [
        {
          "question": "<p><strong>Writing Task (7 pts)</strong></p><p><strong>Critères d'évaluation :</strong></p><ul style='list-style-type: disc; margin-left:20px;'><li><strong>Contenu (2.5 pts) :</strong> Le candidat présente clairement le problème, utilise le vocabulaire approprié (refund, warranty, complaint, customer service) et formule une demande précise.</li><li><strong>Structure (2.5 pts) :</strong> La lettre respecte la structure formelle (adresses, objet, salutation, corps, conclusion), est bien organisée et cohérente.</li><li><strong>Langue (2 pts) :</strong> La grammaire, le vocabulaire, l'orthographe et la ponctuation sont corrects.</li></ul>",
          "reponse": "<p><strong>Exemple de réponse :</strong></p><div style='background-color:#fff3e0; padding:15px; border-radius:6px;'><p><em>Your address<br>Yaoundé, Cameroon<br>20 June 2025</em></p><p><em>Customer Service Department<br>XYZ Electronics<br>Douala, Cameroon</em></p><p><em>Subject: Complaint about faulty smartphone</em></p><p><em>Dear Customer Service Manager,</em></p><p><em>I am writing to express my dissatisfaction with a product I recently purchased from your online store. On 10 June 2025, I ordered a smartphone (Model X10) from your website. The device arrived on 15 June, but I was disappointed to find that it does not function properly. The screen frequently freezes, and the battery drains within two hours of light use.</em></p><p><em>This product is clearly defective and does not meet the quality standards I expected. I have tried to contact your technical support team, but I have not received any response. I believe this issue should be covered by the warranty as the phone was purchased less than two weeks ago.</em></p><p><em>I kindly request a full refund or an exchange for a new device. I am attaching a copy of the purchase receipt for your reference. Please let me know how you plan to resolve this matter.</em></p><p><em>I look forward to your prompt response.</em></p><p><em>Yours faithfully,</em></p><p><em>[Your signature]</em></p><p><em>[Your printed name]</em></p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
