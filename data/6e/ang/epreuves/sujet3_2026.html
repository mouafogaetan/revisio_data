<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Sixième",
  "sequence": "Sequence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Reading Comprehension: A Healthy Breakfast",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 8px; color: #1a1a1a;'><p>Read the text carefully and answer the questions.</p><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border-left: 4px solid #2980b9;'><p><strong>A Healthy Breakfast</strong></p><p>Breakfast is the most important meal of the day. A balanced breakfast gives you energy for the whole morning. A good breakfast should include fruits, grains, and protein. For example, you can eat bread with eggs and drink some milk. You can also add a banana or an apple. First, prepare your food. Then, eat slowly. After that, drink some water. Finally, go to school with energy!</p></div></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>1. Comprehension Questions</strong> (2 pts)</p><p style='margin-left: 20px;'>a) What is the most important meal of the day according to the text?</p><p style='margin-left: 20px;'>b) What three food groups should a good breakfast include?</p><p style='margin-left: 20px;'>c) Give two examples of foods you can eat for a healthy breakfast.</p><p style='margin-left: 20px;'>d) What should you do after eating breakfast according to the text?</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>Breakfast</strong> is the most important meal of the day.</p><p>b) A good breakfast should include <strong>fruits, grains, and protein</strong>.</p><p>c) You can eat <strong>bread with eggs</strong> and <strong>milk</strong> (or banana/apple).</p><p>d) After eating breakfast, you should <strong>go to school with energy</strong>.</p></div>"
        }
      ]
    },
    {
      "titre": "Grammar: Demonstrative Pronouns and Amounts",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 8px; color: #1a1a1a;'><p>This section tests your knowledge of demonstrative pronouns and asking about amounts.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>1. Demonstrative Pronouns</strong> (1 pt)</p><p style='margin-left: 20px;'>Complete the sentences with <em>this</em>, <em>that</em>, <em>these</em>, or <em>those</em>.</p><p style='margin-left: 20px;'>a) ______ is my book on my desk. (near the speaker)</p><p style='margin-left: 20px;'>b) ______ are shoes over there. (far from the speaker)</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>This</strong></p><p>b) <strong>Those</strong></p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>2. Asking about Price</strong> (1 pt)</p><p style='margin-left: 20px;'>Complete the questions with the correct form.</p><p style='margin-left: 20px;'>a) ______ ______ is this pen? (Ask the price)</p><p style='margin-left: 20px;'>b) ______ ______ are these oranges? (Ask the price)</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>How much</strong></p><p>b) <strong>How much</strong></p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>3. Filling a Bill</strong> (2 pts)</p><p style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; border-left: 4px solid #2980b9;'>Item: Bread - 250 FCFA<br>Item: Milk - 350 FCFA<br>Total: ______</p><p style='margin-left: 20px;'>What is the total amount?</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p><strong>600 FCFA</strong>. 250 + 350 = 600.</p></div>"
        }
      ]
    },
    {
      "titre": "Vocabulary: Diseases and Symptoms",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 8px; color: #1a1a1a;'><p>This section tests your vocabulary on common diseases and their symptoms.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>1. Matching</strong> (2 pts)</p><p style='margin-left: 20px;'>Match each disease with its correct symptom.</p><p style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; border-left: 4px solid #2980b9;'><strong>Diseases:</strong> Malaria, Cold, Cough, Headache, Stomachache</p><p><strong>Symptoms:</strong> A. high fever and chills, B. runny nose and sneezing, C. pain in the head, D. pain in the belly, E. persistent throat irritation</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>1. Malaria → <strong>A. high fever and chills</strong></p><p>2. Cold → <strong>B. runny nose and sneezing</strong></p><p>3. Cough → <strong>E. persistent throat irritation</strong></p><p>4. Headache → <strong>C. pain in the head</strong></p><p>5. Stomachache → <strong>D. pain in the belly</strong></p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>2. Fill in the Blanks</strong> (2 pts)</p><p style='margin-left: 20px;'>Complete the sentences with the correct disease or symptom word: <em>malaria, fever, headache, cough, stomachache, cold</em>.</p><p style='margin-left: 20px;'>a) I have a terrible ______. I need to take some medicine.</p><p style='margin-left: 20px;'>b) She has a high ______. She is very hot.</p><p style='margin-left: 20px;'>c) He is sneezing and has a runny nose. He has a ______.</p><p style='margin-left: 20px;'>d) ______ is caused by mosquito bites.</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>headache</strong></p><p>b) <strong>fever</strong></p><p>c) <strong>cold</strong></p><p>d) <strong>Malaria</strong></p></div>"
        }
      ]
    },
    {
      "titre": "Writing: Planning a Balanced Meal",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 8px; color: #1a1a1a;'><p><strong>Choose ONE of the following topics and write a paragraph of 4 to 5 sentences.</strong></p></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Topic 1: My Healthy Breakfast</strong></p><p>Write a short paragraph describing what you eat for a healthy breakfast. Include the foods you eat and why they are good for you. Use sequence markers: <em>first, then, after that, finally</em>.</p><hr style='border: 1px solid #ddd; margin: 15px 0;'><p><strong>Topic 2: A Healthy Snack</strong></p><p>Write a short paragraph describing a healthy snack you like to eat. Include the ingredients and how to prepare it. Use sequence markers: <em>first, then, after that, finally</em>.</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Sample Answer for Topic 1:</strong></p><p>For breakfast, I eat bread with eggs and drink milk. First, I prepare my food. Then, I eat slowly. After that, I drink some water. Finally, I feel ready to go to school with energy!</p><p><strong>Sample Answer for Topic 2:</strong></p><p>I like to eat fruit salad as a healthy snack. First, I wash the fruits like apples and bananas. Then, I cut them into small pieces. After that, I put them in a bowl. Finally, I enjoy my healthy snack!</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
