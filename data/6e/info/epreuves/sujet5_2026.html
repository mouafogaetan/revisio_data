<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Sixième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Matériel et Logiciels (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur la découverte des composants matériels et logiciels de l'ordinateur.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Éléments matériels (2 pts)</strong></p><p>a) (1 pt) Cite trois composants matériels de base d'un microordinateur et donne le rôle de chacun.</p><p>b) (1 pt) Classe ces composants en trois catégories : entrée, traitement, sortie.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li><strong>Le clavier :</strong> permet de saisir des données (texte, chiffres).</li><li><strong>Le processeur :</strong> traite les données et exécute les instructions.</li><li><strong>Le moniteur :</strong> affiche les résultats du traitement.</li></ul><p><strong>b) (1 pt)</strong></p><ul><li><strong>Entrée :</strong> Clavier, souris.</li><li><strong>Traitement :</strong> Processeur, mémoire centrale.</li><li><strong>Sortie :</strong> Moniteur, imprimante.</li></ul>"
        },
        {
          "question": "<p><strong>2. Éléments logiciels (3 pts)</strong></p><p>a) (1 pt) Donne la différence entre un logiciel système et un logiciel applicatif.</p><p>b) (1 pt) Cite un exemple de logiciel système et un exemple de logiciel applicatif.</p><p>c) (1 pt) À quoi sert un <em>traitement de texte</em> (texteur) ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Un <strong>logiciel système</strong> gère le matériel et permet le fonctionnement de l'ordinateur (ex: Windows). Un <strong>logiciel applicatif</strong> permet à l'utilisateur de réaliser une tâche spécifique (ex: Word pour écrire un document).</p><p><strong>b) (1 pt)</strong></p><ul><li><strong>Logiciel système :</strong> Windows, Linux, macOS.</li><li><strong>Logiciel applicatif :</strong> Microsoft Word, Google Chrome, un jeu vidéo.</li></ul><p><strong>c) (1 pt)</strong> Un traitement de texte permet de créer, modifier et mettre en forme des documents textuels.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Exploration de l'Environnement (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice évalue la connaissance des composants externes à l'unité centrale.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Périphériques (2 pts)</strong></p><p>a) (1 pt) Qu'est-ce qu'un périphérique ?</p><p>b) (1 pt) La souris, le clavier, l'imprimante et le moniteur : classe-les comme périphériques d'entrée ou de sortie.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Un <strong>périphérique</strong> est un dispositif externe connecté à l'unité centrale. Il permet d'envoyer des données (entrée) ou de recevoir des résultats (sortie).</p><p><strong>b) (1 pt)</strong></p><ul><li><strong>Entrée :</strong> Souris, clavier.</li><li><strong>Sortie :</strong> Imprimante, moniteur.</li></ul>"
        },
        {
          "question": "<p><strong>2. Ports de l'unité centrale (3 pts)</strong></p><p>a) (1.5 pts) Cite trois ports de l'unité centrale et donne un exemple d'utilisation pour chacun.</p><p>b) (1.5 pts) Un utilisateur veut connecter un écran et une souris à son ordinateur. Quels ports doit-il utiliser ?</p>",
          "reponse": "<p><strong>a) (1.5 pts)</strong></p><ul><li><strong>Port USB :</strong> Connecte souris, clavier, clé USB.</li><li><strong>Port HDMI :</strong> Connecte un écran (vidéo et son).</li><li><strong>Port RJ45 :</strong> Connecte un câble réseau pour Internet.</li><li><strong>Port VGA :</strong> Connecte un écran (vidéo uniquement).</li></ul><p><strong>b) (1.5 pts)</strong></p><ul><li><strong>Écran :</strong> Port HDMI ou VGA (selon le modèle).</li><li><strong>Souris :</strong> Port USB (ou PS/2 sur les anciens modèles).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Citoyenneté Numérique (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice aborde l'adoption des bons comportements face au numérique.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Éthique et informations (2.5 pts)</strong></p><p>a) (1 pt) Donne deux qualités d'une bonne information.</p><p>b) (1.5 pts) Pourquoi est-il important de vérifier l'exactitude des données avant de les partager ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Une bonne information doit être :</p><ul><li><strong>Exacte :</strong> elle est vraie et vérifiée.</li><li><strong>Récente :</strong> elle est à jour.</li><li><strong>Vérifiable :</strong> on peut contrôler sa source.</li></ul><p><strong>b) (1.5 pts)</strong> Partager une information non vérifiée peut causer des problèmes :</p><ul><li>Répandre de fausses informations (fake news) qui peuvent tromper les autres.</li><li>Nuire à la réputation d'une personne ou d'une institution.</li><li>Créer de la panique ou des malentendus inutiles.</li></ul>"
        },
        {
          "question": "<p><strong>2. Propriété intellectuelle (2.5 pts)</strong></p><p>a) (1 pt) Qu'est-ce que la propriété intellectuelle ?</p><p>b) (1.5 pts) Que doit faire un élève qui veut utiliser une image trouvée sur Internet pour son exposé ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> La <strong>propriété intellectuelle</strong> protège les créations de l'esprit : livres, musiques, images, vidéos, logiciels. L'auteur a le droit d'être reconnu et d'être rémunéré.</p><p><strong>b) (1.5 pts)</strong> L'élève doit :</p><ul><li>Vérifier si l'image est libre de droits.</li><li>Si elle est protégée, demander la permission à l'auteur.</li><li>Toujours <strong>citer la source</strong> de l'image dans son exposé.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Raisonnement Analytique et Logique (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice permet de développer des compétences de réflexion logique.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Résolution de problème (2 pts)</strong></p><p>Pour préparer son petit-déjeuner, Marie doit : faire chauffer du lait, mettre les céréales dans un bol, verser le lait chaud sur les céréales, et ranger la boîte de céréales.</p><p>a) (1 pt) Quelle action doit-elle faire en premier ? Pourquoi ?</p><p>b) (1 pt) Quelle est la bonne séquence des actions ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Marie doit d'abord <strong>ranger la boîte de céréales</strong> avant de mettre les céréales dans le bol, pour ne pas oublier de la ranger plus tard.</p><p><strong>b) (1 pt)</strong> La bonne séquence :</p><ol><li>Ranger la boîte de céréales.</li><li>Mettre les céréales dans un bol.</li><li>Faire chauffer le lait.</li><li>Verser le lait chaud sur les céréales.</li></ol><p><em>Note : On peut aussi faire chauffer le lait en premier, mais il est logique de ranger la boîte avant de servir le petit-déjeuner.</em></p>"
        },
        {
          "question": "<p><strong>2. Jeu de classement (3 pts)</strong></p><p>Classe les mots suivants en deux groupes selon un critère de ton choix : <strong>Fichier, Logiciel, Dossier, Application, Document, Programme.</strong></p><p>Explique ton critère de classement.</p>",
          "reponse": "<p><strong>Critère proposé :</strong> Ce qui est un conteneur et ce qui est un contenu.</p><ul><li><strong>Conteneurs (organisent) :</strong> Fichier, Dossier.</li><li><strong>Contenus (exécutables ou créés) :</strong> Logiciel, Application, Document, Programme.</li></ul><p><strong>Autre critère possible :</strong> Ce qui est créé par l'utilisateur et ce qui est un outil.</p><ul><li><strong>Créé par l'utilisateur :</strong> Fichier, Document, Dossier.</li><li><strong>Outil :</strong> Logiciel, Application, Programme.</li></ul><p><em>Tout classement cohérent est accepté.</em></p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
