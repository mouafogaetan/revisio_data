<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Sixième",
  "sequence": "Séquence 1 : Découverte de l'environnement microordinateur",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les composants matériels",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>microordinateur</strong> est composé de plusieurs éléments qui travaillent ensemble. Certains servent à <strong>entrer</strong> des données, d'autres à les <strong>traiter</strong> et d'autres à les <strong>sortir</strong>.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Cite deux composants qui servent à <strong>entrer</strong> des données dans l'ordinateur.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Deux composants d'entrée sont le <strong>clavier</strong> et la <strong>souris</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Quel est le rôle du <strong>processeur</strong> (ou CPU) dans un ordinateur ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>processeur</strong> est le cerveau de l'ordinateur. Il <strong>traite</strong> les informations et exécute les instructions des programmes.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Cite deux composants qui servent à <strong>sortir</strong> les résultats de l'ordinateur.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Deux composants de sortie sont le <strong>moniteur</strong> (écran) et l'<strong>imprimante</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> À quelle catégorie appartient le <strong>disque dur</strong> (entrée, traitement ou sortie) ? Justifie ta réponse.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>disque dur</strong> est un périphérique de <strong>stockage</strong> (entrée/sortie). Il permet de <strong>lire</strong> des données (entrée) et d'<strong>écrire</strong> des données (sortie) pour les conserver.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>5. (1 pt)</strong> Représente par un schéma simple les relations entre l'<strong>utilisateur</strong>, le <strong>clavier</strong>, le <strong>processeur</strong> et l'<strong>écran</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #f4f4f4; padding: 10px; border-radius: 5px;'>Utilisateur → Clavier (Entrée) → Processeur (Traitement) → Écran (Sortie) → Utilisateur</pre></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les logiciels",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Pour fonctionner, un ordinateur a besoin de deux types de <strong>logiciels</strong> : les logiciels <strong>système</strong> et les logiciels <strong>d'application</strong>.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Qu'est-ce qu'un <strong>système d'exploitation</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>système d'exploitation</strong> est un logiciel système qui gère les ressources de l'ordinateur et sert d'interface entre l'utilisateur et le matériel.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Cite deux exemples de <strong>systèmes d'exploitation</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Deux exemples de systèmes d'exploitation : <strong>Windows</strong> et <strong>Linux</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> À quoi sert un <strong>logiciel d'application</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>logiciel d'application</strong> permet à l'utilisateur d'effectuer une tâche spécifique comme écrire un texte, faire un dessin ou naviguer sur Internet.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> Classe les logiciels suivants dans la bonne catégorie :<br>- Microsoft Word<br>- Google Chrome<br>- Windows 11<br>- Antivirus</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><ul style='margin-left: 0; padding-left: 20px;'><li><strong>Logiciels système</strong> : Windows 11, Antivirus</li><li><strong>Logiciels d'application</strong> : Microsoft Word, Google Chrome</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les types d'utilisateurs",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>On distingue deux catégories d'<strong>utilisateurs</strong> de l'informatique : les <strong>producteurs</strong> et les <strong>consommateurs</strong>.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Qu'est-ce qu'un <strong>utilisateur producteur</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>utilisateur producteur</strong> est une personne qui <strong>crée</strong> des contenus numériques : logiciels, sites web, vidéos, images, documents.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Qu'est-ce qu'un <strong>utilisateur consommateur</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>utilisateur consommateur</strong> est une personne qui <strong>consulte et utilise</strong> les contenus créés par d'autres : il lit des articles, regarde des vidéos, utilise des logiciels.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Un <strong>développeur de jeux vidéo</strong> est-il un utilisateur producteur ou consommateur ? Justifie ta réponse.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un développeur de jeux vidéo est un <strong>utilisateur producteur</strong> car il <strong>crée</strong> le jeu (contenu numérique).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> Un <strong>élève qui regarde une vidéo éducative</strong> est-il un utilisateur producteur ou consommateur ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un élève qui regarde une vidéo éducative est un <strong>utilisateur consommateur</strong> car il <strong>consulte</strong> un contenu créé par quelqu'un d'autre.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>5. (1 pt)</strong> Que représente le <strong>triangle des relations</strong> entre le matériel, le logiciel et l'utilisateur ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le triangle des relations montre que les trois éléments (<strong>matériel</strong>, <strong>logiciel</strong>, <strong>utilisateur</strong>) sont <strong>indispensables</strong> et <strong>interagissent</strong> entre eux pour faire fonctionner le système informatique.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Le laboratoire informatique",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>laboratoire informatique</strong> est un lieu où sont installés des ordinateurs pour l'apprentissage. Il doit respecter certaines règles pour être fonctionnel et sécurisé.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Cite deux <strong>équipements de sécurité</strong> que l'on trouve dans un laboratoire informatique.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Deux équipements de sécurité sont l'<strong>onduleur</strong> (protège contre les coupures de courant) et l'<strong>extincteur</strong> (pour lutter contre les incendies).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Donne deux <strong>règles de comportement</strong> à adopter dans un laboratoire informatique.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Deux règles : <strong>ne pas manger ni boire</strong> près des ordinateurs et <strong>éteindre correctement</strong> les machines après utilisation.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Qu'est-ce qu'un <strong>parasurtenseur</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>parasurtenseur</strong> est un dispositif qui protège les ordinateurs contre les <strong>surtensions électriques</strong> qui pourraient endommager le matériel.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> Pourquoi est-il important de <strong>nettoyer</strong> régulièrement les équipements informatiques ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Il est important de nettoyer les équipements pour éviter l'accumulation de <strong>poussière</strong> qui peut provoquer une <strong>surchauffe</strong> et endommager les composants.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Initiation au raisonnement logique",
      "points": "2 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>raisonnement logique</strong> consiste à organiser les actions dans un ordre précis pour résoudre un problème.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Voici les actions pour préparer un sandwich. Remets-les dans l'<strong>ordre logique</strong> :<br>- Mettre le pain<br>- Ajouter la garniture<br>- Couper le pain<br>- Refermer le sandwich</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>Ordre logique :</strong><br>1. Couper le pain<br>2. Mettre le pain<br>3. Ajouter la garniture<br>4. Refermer le sandwich</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Cite une situation de la vie quotidienne où il est important de suivre un <strong>ordre précis</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Exemple : <strong>Préparer un gâteau</strong> (il faut suivre les étapes de la recette dans l'ordre).</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
