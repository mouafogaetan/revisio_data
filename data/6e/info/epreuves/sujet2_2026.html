<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Sixième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Découverte de l'Environnement Microordinateur (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur l'identification des éléments matériels et logiciels d'un microordinateur ainsi que les types d'utilisateurs.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Cite deux domaines d'utilisation des microordinateurs.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Exemples de domaines :</strong></p><ul><li>L'éducation (apprentissage, recherche d'informations).</li><li>La santé (gestion des dossiers médicaux, imagerie médicale).</li><li>Le divertissement (jeux vidéo, musique, films).</li><li>La communication (réseaux sociaux, messagerie).</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Classe les composants suivants selon leur type (Entrée, Traitement, Sortie) : Souris, Processeur, Moniteur, Clavier, Imprimante.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li><strong>Périphériques d'entrée :</strong> Souris, Clavier</li><li><strong>Périphériques de sortie :</strong> Moniteur, Imprimante</li><li><strong>Composant de traitement :</strong> Processeur</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Donne le rôle de chaque type de logiciel suivant :<br />a) Logiciel système<br />b) Logiciel d'application</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Logiciel système :</strong> Il permet de gérer les ressources matérielles de l'ordinateur et de faire le lien entre l'utilisateur, les logiciels applicatifs et le matériel. Le système d'exploitation (Windows, Linux, etc.) en est un exemple.</p><p><strong>b) Logiciel d'application :</strong> Il est conçu pour aider l'utilisateur à réaliser une tâche spécifique. Par exemple, un traitement de texte (Word) pour rédiger un document, un navigateur web (Chrome) pour surfer sur Internet.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>4. (1 pt)</strong> Distingue les <strong>utilisateurs producteurs</strong> des <strong>utilisateurs consommateurs</strong> en donnant un exemple pour chacun.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li><span style='font-weight:bold;'>Utilisateur producteur :</span> C'est quelqu'un qui utilise l'ordinateur pour créer du contenu (textes, images, vidéos, programmes). <strong>Exemple :</strong> Un informaticien qui programme, un graphiste qui dessine sur ordinateur.</li><li><span style='font-weight:bold;'>Utilisateur consommateur :</span> C'est quelqu'un qui utilise l'ordinateur principalement pour consulter ou utiliser des contenus créés par d'autres. <strong>Exemple :</strong> Une personne qui regarde des vidéos sur YouTube, qui lit des articles sur Internet ou qui joue à un jeu vidéo.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Exploration de l'Environnement Microordinateur (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur l'exploration des composants matériels externes à l'unité centrale et la présentation d'un laboratoire informatique.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Cite trois opérations que l'on peut faire avec une souris.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Opérations possibles avec une souris :</strong></p><ul><li><span style='font-weight:bold;'>Cliquer (ou Clic) :</span> Appuyer et relâcher rapidement le bouton gauche (ou droit) pour sélectionner ou activer un élément.</li><li><span style='font-weight:bold;'>Double-cliquer :</span> Appuyer deux fois rapidement sur le bouton gauche pour ouvrir un fichier ou un programme.</li><li><span style='font-weight:bold;'>Glisser-déposer :</span> Maintenir le bouton gauche enfoncé tout en déplaçant la souris pour déplacer un objet d'un endroit à un autre.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1 pt)</strong> Cite deux types de supports de stockage et donne un exemple pour chacun.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Exemples de supports de stockage :</strong></p><ul><li><span style='font-weight:bold;'>Supports internes (à l'unité centrale) :</span> Disque dur (HDD), Disque SSD.</li><li><span style='font-weight:bold;'>Supports externes :</span> Clé USB, CD/DVD-ROM, Carte mémoire SD.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Identifie le rôle des ports suivants de l'unité centrale :<br />a) Port USB<br />b) Port HDMI<br />c) Port RJ45 (ou port réseau)</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li><span style='font-weight:bold;'>Port USB :</span> Permet de connecter des périphériques tels que la souris, le clavier, une clé USB, une imprimante, un disque dur externe, etc.</li><li><span style='font-weight:bold;'>Port HDMI :</span> Permet de connecter l'ordinateur à un moniteur, un téléviseur ou un projecteur pour transmettre de l'image et du son en haute qualité.</li><li><span style='font-weight:bold;'>Port RJ45 (ou port réseau) :</span> Permet de connecter l'ordinateur à un réseau local (LAN) ou à Internet via un câble Ethernet.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>4. (1 pt)</strong> Cite deux équipements de sécurité que l'on peut trouver dans un laboratoire informatique et donne leur utilité.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li><span style='font-weight:bold;'>Onduleur (ou UPS) :</span> Il protège les ordinateurs contre les coupures de courant et les fluctuations de tension en fournissant une alimentation de secours temporaire.</li><li><span style='font-weight:bold;'>Parasurtenseur :</span> Il protège les équipements contre les surtensions électriques (comme la foudre) qui pourraient les endommager.</li><li><span style='font-weight:bold;'>Extincteur :</span> Il permet d'éteindre un début d'incendie dans le laboratoire, notamment les incendies d'origine électrique.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Citoyenneté Numérique I (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur l'adoption de comportements éthiques et l'utilisation responsable des équipements numériques.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Cite deux qualités d'une bonne information.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Qualités d'une bonne information :</strong></p><ul><li><span style='font-weight:bold;'>Exactitude (ou fiabilité) :</span> L'information doit être vraie et vérifiée.</li><li><span style='font-weight:bold;'>Actualité :</span> L'information doit être à jour.</li><li><span style='font-weight:bold;'>Clarté :</span> L'information doit être compréhensible.</li><li><span style='font-weight:bold;'>Objectivité :</span> L'information ne doit pas être biaisée ou partiale.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1 pt)</strong> Qu'est-ce que la propriété intellectuelle ? Donne un exemple de respect de la propriété intellectuelle sur Internet.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Définition :</strong> La propriété intellectuelle désigne l'ensemble des droits exclusifs accordés aux créateurs d'œuvres originales (œuvres littéraires, artistiques, scientifiques, logiciels, etc.). Elle protège le travail et l'investissement de l'auteur.</p><p><strong>Exemple de respect :</strong> Citer ses sources (nom de l'auteur, titre de l'article, URL) lorsqu'on réutilise des informations trouvées sur Internet dans un travail personnel.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1 pt)</strong> Cite deux règles d'une utilisation responsable d'un équipement numérique.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Règles d'utilisation responsable :</strong></p><ul><li>Ne pas manipuler les câbles et les prises électriques avec des mains mouillées.</li><li>Éteindre correctement l'ordinateur avant de le débrancher.</li><li>Ne pas manger ni boire à proximité de l'ordinateur.</li><li>Utiliser un mot de passe sécurisé pour protéger ses données.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>4. (1 pt)</strong> Cite une conséquence de la mauvaise utilisation d'un équipement numérique.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Exemples de conséquences :</strong></p><ul><li>Endommagement de l'équipement (ex: casser l'écran, renverser un liquide sur le clavier).</li><li>Perte de données importantes (ex: en cas de coupure de courant sans sauvegarde).</li><li>Infection par un virus informatique.</li><li>Violation de la vie privée (ex: en partageant trop d'informations personnelles).</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Initiation au Raisonnement Analytique et Logique (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice vise à évaluer votre capacité à résoudre des problèmes en utilisant le raisonnement analytique et logique.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Lis le problème suivant : <em>\"Léa veut organiser une fête d'anniversaire. Elle doit inviter ses amis, acheter de la nourriture et des boissons, et préparer des jeux.\"</em></p><p>Identifie les données du problème (ce qu'on sait) et ce qu'on cherche (le résultat souhaité).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Ce qu'on sait (données) :</strong></p><ul><li>Léa organise une fête d'anniversaire.</li><li>Il faut inviter des amis.</li><li>Il faut acheter de la nourriture et des boissons.</li><li>Il faut préparer des jeux.</li></ul><p><strong>Ce qu'on cherche :</strong></p><ul><li>Organiser une fête d'anniversaire réussie.</li></ul></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
