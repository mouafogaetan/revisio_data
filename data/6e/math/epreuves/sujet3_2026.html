<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Sixième",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Nombres entiers naturels et opérations",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On considère les nombres suivants : 24, 15, 36, 10, 45.</p></div>",
      "questions": [
        {
          "question": "<p> Parmi ces nombres, lesquels sont divisibles par 2 ? par 3 ? par 5 ? par 9 ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><ul><li><strong>Divisibles par 2 :</strong> 24, 36, 10 (nombres pairs)</li><li><strong>Divisibles par 3 :</strong> 24, 36, 15, 45 (somme des chiffres multiple de 3)</li><li><strong>Divisibles par 5 :</strong> 15, 10, 45 (terminent par 0 ou 5)</li><li><strong>Divisibles par 9 :</strong> 36, 45 (somme des chiffres multiple de 9)</li></ul></div>"
        },
        {
          "question": "<p> Calcule : <span class='math'>\\(24 + 36 - 15\\)</span> et <span class='math'>\\(10 \\times 4.5\\)</span>.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><span class='math'>\\(24 + 36 - 15 = 60 - 15 = 45\\)</span></p><p><span class='math'>\\(10 \\times 4.5 = 45\\)</span></p></div>"
        },
        {
          "question": "<p> 45 est-il un multiple de 15 ? Justifie ta réponse.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Oui, 45 est un multiple de 15 car <span class='math'>\\(45 = 15 \\times 3\\)</span>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Fractions et opérations",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On donne les fractions : <span class='math'>\\(\\frac{3}{4}, \\frac{5}{6}, \\frac{7}{12}\\)</span>.</p></div>",
      "questions": [
        {
          "question": "<p> Compare <span class='math'>\\(\\frac{3}{4}\\)</span> et <span class='math'>\\(\\frac{5}{6}\\)</span> en les mettant au même dénominateur.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><span class='math'>\\(\\frac{3}{4} = \\frac{9}{12}\\)</span> et <span class='math'>\\(\\frac{5}{6} = \\frac{10}{12}\\)</span></p><p>Donc <span class='math'>\\(\\frac{3}{4} < \\frac{5}{6}\\)</span>.</p></div>"
        },
        {
          "question": "<p> Calcule <span class='math'>\\(\\frac{3}{4} + \\frac{7}{12}\\)</span> et <span class='math'>\\(\\frac{5}{6} - \\frac{7}{12}\\)</span>.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><span class='math'>\\(\\frac{3}{4} + \\frac{7}{12} = \\frac{9}{12} + \\frac{7}{12} = \\frac{16}{12} = \\frac{4}{3}\\)</span></p><p><span class='math'>\\(\\frac{5}{6} - \\frac{7}{12} = \\frac{10}{12} - \\frac{7}{12} = \\frac{3}{12} = \\frac{1}{4}\\)</span></p></div>"
        },
        {
          "question": "<p> Calcule <span class='math'>\\(\\frac{3}{4} \\times \\frac{5}{6}\\)</span> et simplifie le résultat.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><span class='math'>\\(\\frac{3}{4} \\times \\frac{5}{6} = \\frac{3 \\times 5}{4 \\times 6} = \\frac{15}{24} = \\frac{5}{8}\\)</span></p></div>"
        },
        {
          "question": "<p> Donne l'inverse de <span class='math'>\\(\\frac{3}{4}\\)</span>.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>L'inverse de <span class='math'>\\(\\frac{3}{4}\\)</span> est <span class='math'>\\(\\frac{4}{3}\\)</span>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Droites et segments",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On considère trois points A, B et C non alignés. On trace la droite (AB) et la droite (AC).</p></div>",
      "questions": [
        {
          "question": "<p> Construis une figure correspondant à cette situation.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p style='color: #0d6efd; font-weight: bold;'>Instructions :</p><ul><li>Placer trois points A, B, C non alignés.</li><li>Tracer la droite (AB) passant par A et B.</li><li>Tracer la droite (AC) passant par A et C.</li></ul></div>"
        },
        {
          "question": "<p> Quelle est l'intersection des droites (AB) et (AC) ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>L'intersection des droites (AB) et (AC) est le point A.</p></div>"
        },
        {
          "question": "<p> Construis la droite (d) passant par B et parallèle à (AC).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p style='color: #0d6efd; font-weight: bold;'>Instructions :</p><ul><li>À l'aide de la règle et de l'équerre, tracer la droite passant par B et parallèle à (AC).</li></ul></div>"
        },
        {
          "question": "<p> Soit M le milieu du segment [BC]. On sait que BC = 6 cm. Quelle est la longueur BM ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Si M est le milieu de [BC], alors BM = BC/2 = 6/2 = 3 cm.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Angles et triangles",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On considère un triangle ABC rectangle en A. L'angle \\( \\widehat{ABC} \\) mesure 30°.</p></div>",
      "questions": [
        {
          "question": "<p> Quelle est la mesure de l'angle \\( \\widehat{ACB} \\) ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Dans un triangle, la somme des angles est égale à 180°.</p><p>\\( \\widehat{ACB} = 180° - 90° - 30° = 60° \\).</p></div>"
        },
        {
          "question": "<p> Construis ce triangle sachant que AB = 5 cm.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p style='color: #0d6efd; font-weight: bold;'>Instructions :</p><ul><li>Tracer le segment [AB] de 5 cm.</li><li>En A, tracer une droite perpendiculaire à (AB).</li><li>En B, tracer une droite faisant un angle de 30° avec (AB).</li><li>L'intersection des deux droites donne le point C.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Proportionnalité et pourcentage",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>Un élève a acheté 3 cahiers pour 1 200 FCFA.</p></div>",
      "questions": [
        {
          "question": "<p> Quel est le prix d'un cahier ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Prix d'un cahier : 1200 / 3 = 400 FCFA.</p></div>"
        },
        {
          "question": "<p> Combien coûtent 7 cahiers ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>7 cahiers coûtent : 400 × 7 = 2 800 FCFA.</p></div>"
        },
        {
          "question": "<p> Le libraire accorde une remise de 10% sur l'achat de 10 cahiers. Combien paiera l'élève pour 10 cahiers ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Prix de 10 cahiers sans remise : 400 × 10 = 4 000 FCFA.</p><p>Remise : 10% de 4000 = 0,10 × 4000 = 400 FCFA.</p><p>Prix payé : 4000 - 400 = 3 600 FCFA.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
