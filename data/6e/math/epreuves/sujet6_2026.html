<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Mathématiques",
 "classe": "Sixième",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Reconnaître une situation de proportionnalité",
     "points": "3 pts",
     "enonce": "<div style='font-size: 16px; line-height: 1.8;'><p>Indique pour chacun des tableaux suivants s’il s’agit d’un tableau de proportionnalité. Justifie ta réponse en calculant le coefficient de proportionnalité lorsque c’est possible.</p><p><strong>Tableau A</strong></p><table style='width: 80%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Nombre de cahiers</th><th style='padding: 8px; border: 1px solid #ddd;'>2</th><th style='padding: 8px; border: 1px solid #ddd;'>5</th><th style='padding: 8px; border: 1px solid #ddd;'>8</th><th style='padding: 8px; border: 1px solid #ddd;'>10</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Prix (FCFA)</td><td style='padding: 8px; border: 1px solid #ddd;'>400</td><td style='padding: 8px; border: 1px solid #ddd;'>1000</td><td style='padding: 8px; border: 1px solid #ddd;'>1600</td><td style='padding: 8px; border: 1px solid #ddd;'>2000</td></tr></table><p><strong>Tableau B</strong></p><table style='width: 80%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Âge (ans)</th><th style='padding: 8px; border: 1px solid #ddd;'>6</th><th style='padding: 8px; border: 1px solid #ddd;'>10</th><th style='padding: 8px; border: 1px solid #ddd;'>14</th><th style='padding: 8px; border: 1px solid #ddd;'>18</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Taille (cm)</td><td style='padding: 8px; border: 1px solid #ddd;'>115</td><td style='padding: 8px; border: 1px solid #ddd;'>140</td><td style='padding: 8px; border: 1px solid #ddd;'>160</td><td style='padding: 8px; border: 1px solid #ddd;'>175</td></tr></table></div>",
     "questions": [
       {
         "question": "1) Le tableau A est-il un tableau de proportionnalité ? Justifie.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Oui, le tableau A est un tableau de proportionnalité car les quotients sont constants :</p><p>\\(\\frac{400}{2} = \\frac{1000}{5} = \\frac{1600}{8} = \\frac{2000}{10} = 200\\).</p><p>Le coefficient de proportionnalité est 200 (prix d'un cahier).</p></div>"
       },
       {
         "question": "2) Le tableau B est-il un tableau de proportionnalité ? Justifie.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Non, le tableau B n'est pas un tableau de proportionnalité car les quotients ne sont pas égaux :</p><p>\\(\\frac{115}{6} \\approx 19,17\\) ; \\(\\frac{140}{10} = 14\\) ; \\(\\frac{160}{14} \\approx 11,43\\) ; \\(\\frac{175}{18} \\approx 9,72\\).</p><p>L'âge et la taille d'une personne ne sont pas proportionnels.</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Compléter un tableau de proportionnalité",
     "points": "3 pts",
     "enonce": "<div style='font-size: 16px; line-height: 1.8;'><p>Complète les tableaux de proportionnalité suivants.</p><p><strong>Tableau 1 :</strong></p><table style='width: 60%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Quantité (kg)</th><th style='padding: 8px; border: 1px solid #ddd;'>2</th><th style='padding: 8px; border: 1px solid #ddd;'>5</th><th style='padding: 8px; border: 1px solid #ddd;'>...</th><th style='padding: 8px; border: 1px solid #ddd;'>12</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Prix (FCFA)</td><td style='padding: 8px; border: 1px solid #ddd;'>600</td><td style='padding: 8px; border: 1px solid #ddd;'>1500</td><td style='padding: 8px; border: 1px solid #ddd;'>2400</td><td style='padding: 8px; border: 1px solid #ddd;'>...</td></tr></table><p><strong>Tableau 2 :</strong></p><table style='width: 60%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Temps (min)</th><th style='padding: 8px; border: 1px solid #ddd;'>10</th><th style='padding: 8px; border: 1px solid #ddd;'>...</th><th style='padding: 8px; border: 1px solid #ddd;'>40</th><th style='padding: 8px; border: 1px solid #ddd;'>50</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Distance (km)</td><td style='padding: 8px; border: 1px solid #ddd;'>4</td><td style='padding: 8px; border: 1px solid #ddd;'>12</td><td style='padding: 8px; border: 1px solid #ddd;'>...</td><td style='padding: 8px; border: 1px solid #ddd;'>20</td></tr></table></div>",
     "questions": [
       {
         "question": "1) Complète le tableau 1.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Le coefficient de proportionnalité est : \\(\\frac{600}{2} = 300\\).</p><p>Pour un prix de 2400 FCFA, la quantité est : \\(2400 ÷ 300 = 8\\) kg.</p><p>Pour 12 kg, le prix est : \\(12 × 300 = 3600\\) FCFA.</p><p>Le tableau complété est :</p><table style='width: 60%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Quantité (kg)</th><th style='padding: 8px; border: 1px solid #ddd;'>2</th><th style='padding: 8px; border: 1px solid #ddd;'>5</th><th style='padding: 8px; border: 1px solid #ddd;'>8</th><th style='padding: 8px; border: 1px solid #ddd;'>12</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Prix (FCFA)</td><td style='padding: 8px; border: 1px solid #ddd;'>600</td><td style='padding: 8px; border: 1px solid #ddd;'>1500</td><td style='padding: 8px; border: 1px solid #ddd;'>2400</td><td style='padding: 8px; border: 1px solid #ddd;'>3600</td></tr></table></div>"
       },
       {
         "question": "2) Complète le tableau 2.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Le coefficient de proportionnalité est : \\(\\frac{4}{10} = 0,4\\) km/min.</p><p>Pour une distance de 12 km, le temps est : \\(12 ÷ 0,4 = 30\\) min.</p><p>Pour 40 min, la distance est : \\(40 × 0,4 = 16\\) km.</p><p>Le tableau complété est :</p><table style='width: 60%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Temps (min)</th><th style='padding: 8px; border: 1px solid #ddd;'>10</th><th style='padding: 8px; border: 1px solid #ddd;'>30</th><th style='padding: 8px; border: 1px solid #ddd;'>40</th><th style='padding: 8px; border: 1px solid #ddd;'>50</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Distance (km)</td><td style='padding: 8px; border: 1px solid #ddd;'>4</td><td style='padding: 8px; border: 1px solid #ddd;'>12</td><td style='padding: 8px; border: 1px solid #ddd;'>16</td><td style='padding: 8px; border: 1px solid #ddd;'>20</td></tr></table></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Utiliser le produit en croix",
     "points": "4 pts",
     "enonce": "<div style='font-size: 16px; line-height: 1.8;'><p>Utilise la règle du produit en croix pour calculer la valeur manquante dans chaque tableau de proportionnalité.</p><p><strong>Tableau A :</strong></p><table style='width: 40%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr><td style='padding: 8px; border: 1px solid #ddd;'>3</td><td style='padding: 8px; border: 1px solid #ddd;'>7</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>15</td><td style='padding: 8px; border: 1px solid #ddd;'>\\(x\\)</td></tr></table><p><strong>Tableau B :</strong></p><table style='width: 40%; border-collapse: collapse; text-align: center; margin: 10px auto; background: #f8f9fa;'><tr><td style='padding: 8px; border: 1px solid #ddd;'>6</td><td style='padding: 8px; border: 1px solid #ddd;'>\\(y\\)</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>24</td><td style='padding: 8px; border: 1px solid #ddd;'>16</td></tr></table></div>",
     "questions": [
       {
         "question": "1) Calcule la valeur de \\(x\\) dans le tableau A.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>On écrit l'égalité des produits en croix :</p><p>\\(3 \\times x = 15 \\times 7\\)</p><p>\\(3x = 105\\)</p><p>\\(x = 105 ÷ 3 = 35\\)</p></div>"
       },
       {
         "question": "2) Calcule la valeur de \\(y\\) dans le tableau B.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>On écrit l'égalité des produits en croix :</p><p>\\(6 \\times 16 = 24 \\times y\\)</p><p>\\(96 = 24y\\)</p><p>\\(y = 96 ÷ 24 = 4\\)</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Application à la vie courante - Courses au marché",
     "type": "competence",
     "niveau": "medium",
     "points": "5 pts",
     "enonce": "<div style='font-size: 16px; line-height: 1.8;'><p>Au marché, 4 kg de pommes de terre coûtent 2000 FCFA.</p><p>1) Quel est le prix de 7 kg de pommes de terre ?</p><p>2) Avec 3500 FCFA, quelle quantité de pommes de terre peut-on acheter ?</p><p>3) Si le prix augmente de 100 FCFA par kg, quel serait le prix de 5 kg ?</p></div>",
     "questions": [
       {
         "question": "1) Calcule le prix de 7 kg de pommes de terre.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Le prix de 1 kg est : \\(2000 ÷ 4 = 500\\) FCFA.</p><p>Pour 7 kg : \\(7 × 500 = 3500\\) FCFA.</p></div>"
       },
       {
         "question": "2) Détermine la quantité de pommes de terre achetée avec 3500 FCFA.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Avec 3500 FCFA, on peut acheter : \\(3500 ÷ 500 = 7\\) kg.</p></div>"
       },
       {
         "question": "3) Calcule le prix de 5 kg après une augmentation de 100 FCFA par kg.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Nouveau prix par kg : \\(500 + 100 = 600\\) FCFA.</p><p>Prix de 5 kg : \\(5 × 600 = 3000\\) FCFA.</p></div>"
       }
     ]
   },
   {

   {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
