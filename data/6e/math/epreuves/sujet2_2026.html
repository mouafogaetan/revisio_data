<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Sixième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Fractions égales et simplification",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'><strong>1)</strong> Donner trois fractions égales à <span class='math-inline'>\\( \\frac{2}{3} \\)</span>.<br><br><strong>2)</strong> Simplifier la fraction <span class='math-inline'>\\( \\frac{18}{24} \\)</span> pour la rendre irréductible.<br><br><strong>3)</strong> Écrire <span class='math-inline'>\\( 0,75 \\)</span> sous forme de fraction.</div>",
      "questions": [
        {
          "question": "1) Donner trois fractions égales à <span class='math-inline'>\\( \\frac{2}{3} \\)</span>.",
          "reponse": "Par exemple : <span class='math-inline'>\\( \\frac{4}{6} = \\frac{6}{9} = \\frac{8}{12} \\)</span> (en multipliant le numérateur et le dénominateur par 2, 3 ou 4)."
        },
        {
          "question": "2) Simplifier la fraction <span class='math-inline'>\\( \\frac{18}{24} \\)</span> pour la rendre irréductible.",
          "reponse": "On divise le numérateur et le dénominateur par leur PGCD qui est 6. <span class='math-inline'>\\( \\frac{18 \\div 6}{24 \\div 6} = \\frac{3}{4} \\)</span>."
        },
        {
          "question": "3) Écrire <span class='math-inline'>\\( 0,75 \\)</span> sous forme de fraction.",
          "reponse": "<span class='math-inline'>\\( 0,75 = \\frac{75}{100} = \\frac{3}{4} \\)</span> (après simplification par 25)."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Comparaison de fractions",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Comparer les fractions suivantes en utilisant le symbole <, > ou =.<br><br><strong>1)</strong> <span class='math-inline'>\\( \\frac{5}{7} \\)</span> et <span class='math-inline'>\\( \\frac{3}{7} \\)</span><br><br><strong>2)</strong> <span class='math-inline'>\\( \\frac{4}{9} \\)</span> et <span class='math-inline'>\\( \\frac{4}{11} \\)</span><br><br><strong>3)</strong> <span class='math-inline'>\\( \\frac{2}{5} \\)</span> et <span class='math-inline'>\\( \\frac{3}{4} \\)</span></div>",
      "questions": [
        {
          "question": "1) Comparer <span class='math-inline'>\\( \\frac{5}{7} \\)</span> et <span class='math-inline'>\\( \\frac{3}{7} \\)</span>.",
          "reponse": "Les fractions ont le même dénominateur. On compare les numérateurs : 5 > 3. Donc <span class='math-inline'>\\( \\frac{5}{7} > \\frac{3}{7} \\)</span>."
        },
        {
          "question": "2) Comparer <span class='math-inline'>\\( \\frac{4}{9} \\)</span> et <span class='math-inline'>\\( \\frac{4}{11} \\)</span>.",
          "reponse": "Les fractions ont le même numérateur. On compare les dénominateurs : 9 < 11. Donc <span class='math-inline'>\\( \\frac{4}{9} > \\frac{4}{11} \\)</span>."
        },
        {
          "question": "3) Comparer <span class='math-inline'>\\( \\frac{2}{5} \\)</span> et <span class='math-inline'>\\( \\frac{3}{4} \\)</span>.",
          "reponse": "On met au même dénominateur (PPCM de 5 et 4 est 20). <span class='math-inline'>\\( \\frac{2}{5} = \\frac{8}{20} \\)</span> et <span class='math-inline'>\\( \\frac{3}{4} = \\frac{15}{20} \\)</span>. Comme 8 < 15, on a <span class='math-inline'>\\( \\frac{2}{5} < \\frac{3}{4} \\)</span>."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Addition et soustraction de fractions",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Calculer les expressions suivantes et donner le résultat sous forme de fraction simplifiée.<br><br><strong>1)</strong> <span class='math-inline'>\\( \\frac{7}{9} + \\frac{2}{9} \\)</span><br><br><strong>2)</strong> <span class='math-inline'>\\( \\frac{5}{6} - \\frac{1}{6} \\)</span><br><br><strong>3)</strong> <span class='math-inline'>\\( \\frac{3}{4} + \\frac{2}{3} \\)</span><br><br><strong>4)</strong> <span class='math-inline'>\\( \\frac{7}{10} - \\frac{3}{5} \\)</span></div>",
      "questions": [
        {
          "question": "1) Calculer <span class='math-inline'>\\( \\frac{7}{9} + \\frac{2}{9} \\)</span>.",
          "reponse": "<span class='math-inline'>\\( \\frac{7+2}{9} = \\frac{9}{9} = 1 \\)</span>"
        },
        {
          "question": "2) Calculer <span class='math-inline'>\\( \\frac{5}{6} - \\frac{1}{6} \\)</span>.",
          "reponse": "<span class='math-inline'>\\( \\frac{5-1}{6} = \\frac{4}{6} = \\frac{2}{3} \\)</span>"
        },
        {
          "question": "3) Calculer <span class='math-inline'>\\( \\frac{3}{4} + \\frac{2}{3} \\)</span>.",
          "reponse": "PPCM de 4 et 3 est 12. <span class='math-inline'>\\( \\frac{3}{4} = \\frac{9}{12} \\)</span> et <span class='math-inline'>\\( \\frac{2}{3} = \\frac{8}{12} \\)</span>.<br><span class='math-inline'>\\( \\frac{9}{12} + \\frac{8}{12} = \\frac{17}{12} \\)</span>"
        },
        {
          "question": "4) Calculer <span class='math-inline'>\\( \\frac{7}{10} - \\frac{3}{5} \\)</span>.",
          "reponse": "PPCM de 10 et 5 est 10. <span class='math-inline'>\\( \\frac{3}{5} = \\frac{6}{10} \\)</span>.<br><span class='math-inline'>\\( \\frac{7}{10} - \\frac{6}{10} = \\frac{1}{10} \\)</span>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Multiplication de fractions",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Calculer les produits suivants en simplifiant avant d'effectuer les calculs.<br><br><strong>1)</strong> <span class='math-inline'>\\( \\frac{3}{4} \\times \\frac{8}{9} \\)</span><br><br><strong>2)</strong> <span class='math-inline'>\\( \\frac{5}{7} \\times \\frac{14}{15} \\)</span></div>",
      "questions": [
        {
          "question": "1) Calculer <span class='math-inline'>\\( \\frac{3}{4} \\times \\frac{8}{9} \\)</span>.",
          "reponse": "On simplifie : 3 et 9 se simplifient (3/3=1, 9/3=3). 4 et 8 se simplifient (4/4=1, 8/4=2).<br><span class='math-inline'>\\( \\frac{1}{1} \\times \\frac{2}{3} = \\frac{2}{3} \\)</span>"
        },
        {
          "question": "2) Calculer <span class='math-inline'>\\( \\frac{5}{7} \\times \\frac{14}{15} \\)</span>.",
          "reponse": "On simplifie : 5 et 15 se simplifient (5/5=1, 15/5=3). 7 et 14 se simplifient (7/7=1, 14/7=2).<br><span class='math-inline'>\\( \\frac{1}{1} \\times \\frac{2}{3} = \\frac{2}{3} \\)</span>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Problème concret (partage)",
      "points": "3 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Un jardin est planté de fleurs. <span class='math-inline'>\\( \\frac{2}{5} \\)</span> du jardin est planté de roses, <span class='math-inline'>\\( \\frac{1}{3} \\)</span> est planté de tulipes et le reste est planté de marguerites.<br><br><strong>1)</strong> Quelle fraction du jardin est planté de roses et de tulipes ?<br><br><strong>2)</strong> Quelle fraction du jardin est planté de marguerites ?</div>",
      "questions": [
        {
          "question": "1) Calculer la fraction du jardin plantée de roses et de tulipes.",
          "reponse": "Roses + Tulipes = <span class='math-inline'>\\( \\frac{2}{5} + \\frac{1}{3} = \\frac{6}{15} + \\frac{5}{15} = \\frac{11}{15} \\)</span>.<br>La fraction est <strong><span class='math-inline'>\\( \\frac{11}{15} \\)</span></strong>."
        },
        {
          "question": "2) Déterminer la fraction du jardin plantée de marguerites.",
          "reponse": "Le jardin entier représente 1, soit <span class='math-inline'>\\( \\frac{15}{15} \\)</span>. Donc marguerites = <span class='math-inline'>\\( \\frac{15}{15} - \\frac{11}{15} = \\frac{4}{15} \\)</span>.<br>La fraction est <strong><span class='math-inline'>\\( \\frac{4}{15} \\)</span></strong>."
        }
      ]
    },
    {
      "titre": "Exercice 6 : Problème concret (quantités)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Pour faire un gâteau, Marie utilise <span class='math-inline'>\\( \\frac{3}{4} \\)</span> de kilogramme de farine et <span class='math-inline'>\\( \\frac{2}{3} \\)</span> de kilogramme de sucre.<br><br><strong>1)</strong> Quelle est la masse totale de farine et de sucre utilisée ?<br><br><strong>2)</strong> Marie a acheté 2 kg de farine. Quelle quantité de farine lui reste-t-il après avoir fait le gâteau ?</div>",
      "questions": [
        {
          "question": "1) Calculer la masse totale de farine et de sucre.",
          "reponse": "Total = <span class='math-inline'>\\( \\frac{3}{4} + \\frac{2}{3} = \\frac{9}{12} + \\frac{8}{12} = \\frac{17}{12} \\)</span> kg.<br>La masse totale est de <strong><span class='math-inline'>\\( \\frac{17}{12} \\)</span> kg</strong>, soit environ 1,42 kg."
        },
        {
          "question": "2) Calculer la quantité de farine restante.",
          "reponse": "Farine restante = 2 - <span class='math-inline'>\\( \\frac{3}{4} = \\frac{8}{4} - \\frac{3}{4} = \\frac{5}{4} \\)</span> kg.<br>Il lui reste <strong><span class='math-inline'>\\( \\frac{5}{4} \\)</span> kg</strong> de farine, soit 1,25 kg."
        }
      ]
    },
    {
      "titre": "Exercice 7 : Inverse d'une fraction",
      "points": "2 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Donner l'inverse des fractions suivantes :<br><br><strong>1)</strong> <span class='math-inline'>\\( \\frac{3}{5} \\)</span><br><br><strong>2)</strong> <span class='math-inline'>\\( \\frac{7}{2} \\)</span></div>",
      "questions": [
        {
          "question": "1) Donner l'inverse de <span class='math-inline'>\\( \\frac{3}{5} \\)</span>.",
          "reponse": "L'inverse de <span class='math-inline'>\\( \\frac{3}{5} \\)</span> est <span class='math-inline'>\\( \\frac{5}{3} \\)</span>."
        },
        {
          "question": "2) Donner l'inverse de <span class='math-inline'>\\( \\frac{7}{2} \\)</span>.",
          "reponse": "L'inverse de <span class='math-inline'>\\( \\frac{7}{2} \\)</span> est <span class='math-inline'>\\( \\frac{2}{7} \\)</span>."
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
