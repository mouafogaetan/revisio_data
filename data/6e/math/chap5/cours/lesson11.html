<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\(', '\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en Géométrie",
    "contenu": "<div style='text-align: center; padding: 15px;'><h2 style='color: #2c3e50;'>Le Cercle et le Disque</h2><p style='font-size: 1.2em; color: #34495e;'>Vocabulaire et construction</p><hr style='width: 50%; margin: 15px auto;'><p style='font-size: 1.1em;'>Aujourd'hui, nous allons découvrir une forme géométrique très présente dans notre quotidien : <strong>le cercle</strong>.</p><p>Des roues de voiture aux ballons de football, en passant par les pièces de monnaie, le cercle est partout autour de nous !</p></div>",
    "texteParle": "Bonjour à tous et bienvenue en cours de géométrie. Aujourd'hui, nous allons explorer une forme que vous connaissez bien : le cercle. Nous allons apprendre à le tracer correctement et à nommer toutes ses parties. Sortez vos cahiers, vos crayons, vos règles et vos compas, car nous allons avoir besoin de tout notre matériel pour cette leçon.",
    "note": "Introduction du thème avec des exemples concrets du quotidien."
  },
  {
    "titre": "Le Matériel Nécessaire",
    "contenu": "<div style='padding: 10px;'><h3>Pour cette leçon, il vous faut :</h3><div style='display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;'><div style='background: #ecf0f1; border-radius: 10px; padding: 10px; text-align: center; width: 80px;; color: #000000'><div style='font-size: 2em;'>📏</div><p style='margin: 5px 0; font-weight: bold;'>Règle</p></div><div style='background: #ecf0f1; border-radius: 10px; padding: 10px; text-align: center; width: 80px;; color: #000000'><div style='font-size: 2em;'>✏️</div><p style='margin: 5px 0; font-weight: bold;'>Crayon</p></div><div style='background: #ecf0f1; border-radius: 10px; padding: 10px; text-align: center; width: 80px;; color: #000000'><div style='font-size: 2em;'>⭕</div><p style='margin: 5px 0; font-weight: bold;'>Compas</p></div></div><p style='margin-top: 15px;'><span style='background: #f1c40f; padding: 2px 8px; border-radius: 4px;; color: #000000'>Important</span> Sans le compas, impossible de tracer un cercle parfait. Assurez-vous qu'il est bien en état de marche !</p></div>",
    "texteParle": "Pour bien construire un cercle, il nous faut du matériel précis. Vous aurez besoin de votre règle, de votre crayon bien taillé, et surtout de votre compas. Le compas est l'outil indispensable pour tracer des cercles. Prenez le temps de vérifier que votre compas est bien réglé et que la pointe est en bon état.",
    "note": "Rappel du matériel nécessaire pour la construction du cercle."
  },
  {
    "titre": "Qu'est-ce qu'un Cercle ?",
    "contenu": "<div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; color: #1a2a3a;'><h3 style='margin-top: 0;'>Définition du cercle</h3><p>Un <strong>cercle</strong> est une ligne courbe fermée dont tous les points sont à la même distance d'un point fixe appelé le <strong>centre</strong>.</p><div style='text-align: center; margin: 15px 0;'><svg width='150' height='150' xmlns='http://www.w3.org/2000/svg'><circle cx='75' cy='75' r='60' stroke='#2980b9' stroke-width='3' fill='none'/><circle cx='75' cy='75' r='4' fill='#e74c3c'/><text x='78' y='72' font-size='12' fill='#e74c3c'>O</text><line x1='75' y1='75' x2='135' y2='75' stroke='#27ae60' stroke-width='2'/><text x='110' y='70' font-size='12' fill='#27ae60'>M</text></svg></div><p>Dans ce cercle, le point <span style='color: #e74c3c; font-weight: bold;'>O</span> est le centre. Le point <span style='color: #27ae60; font-weight: bold;'>M</span> est sur le cercle. La distance <span style='color: #27ae60; font-weight: bold;'>OM</span> est la même pour tous les points du cercle.</p></div>",
    "texteParle": "Un cercle, c'est une ligne courbe fermée. Ce qui est important, c'est que chaque point de cette ligne est à la même distance d'un point fixe qu'on appelle le centre. Cette distance est toujours la même. Par exemple, si vous prenez un compas, la pointe est le centre et le crayon trace la ligne à une distance fixe.",
    "note": "Définition formelle du cercle avec ses éléments clés."
  },
  {
    "titre": "Le Centre du Cercle",
    "contenu": "<div style='padding: 10px;'><h3>Le point central</h3><p>Le <strong>centre</strong> est le point à l'intérieur du cercle qui est à égale distance de tous les points du cercle.</p><div style='background: #fef9e7; border-left: 5px solid #f39c12; padding: 10px; margin: 15px 0;; color: #000000'><p><strong>Exemple :</strong> Dans une roue de voiture, le centre est l'endroit où se trouve l'axe qui fait tourner la roue.</p></div><p>On note généralement le centre par la lettre <span style='font-weight: bold;'>O</span>.</p><div style='text-align: center;'><svg width='120' height='120' xmlns='http://www.w3.org/2000/svg'><circle cx='60' cy='60' r='50' stroke='#2980b9' stroke-width='3' fill='none'/><circle cx='60' cy='60' r='4' fill='#e74c3c'/><text x='64' y='57' font-size='14' fill='#e74c3c'>O</text></svg></div></div>",
    "texteParle": "Le centre du cercle est un point très important. C'est lui qui permet de définir le cercle. Tous les points du cercle sont à la même distance de ce centre. Dans une roue, le centre est l'axe. On utilise souvent la lettre O pour désigner le centre. Retenez bien que le centre n'est pas sur le cercle, mais à l'intérieur.",
    "note": "Explication du rôle du centre avec un exemple concret."
  },
  {
    "titre": "Le Rayon du Cercle",
    "contenu": "<div style='background-color: #d5f5e3; padding: 15px; border-radius: 10px; color: #1a3a2a;'><h3 style='margin-top: 0;'>Le Rayon</h3><p>Un <strong>rayon</strong> est un segment qui relie le centre à un point quelconque du cercle.</p><div style='text-align: center; margin: 10px 0;'><svg width='150' height='150' xmlns='http://www.w3.org/2000/svg'><circle cx='75' cy='75' r='60' stroke='#2980b9' stroke-width='3' fill='none'/><circle cx='75' cy='75' r='4' fill='#e74c3c'/><text x='78' y='72' font-size='12' fill='#e74c3c'>O</text><line x1='75' y1='75' x2='135' y2='75' stroke='#27ae60' stroke-width='2'/><circle cx='135' cy='75' r='4' fill='#27ae60'/><text x='138' y='72' font-size='12' fill='#27ae60'>M</text></svg></div><ul><li>On note le rayon : <span style='font-weight: bold;'>[OM]</span> ou <span style='font-weight: bold;'>r</span>.</li><li>La longueur du rayon est la <span style='font-weight: bold;'>distance</span> entre le centre O et n'importe quel point M du cercle.</li><li>Tous les rayons d'un même cercle ont la <span style='font-weight: bold;'>même longueur</span>.</li></ul></div>",
    "texteParle": "Le rayon est un segment qui part du centre et va jusqu'au cercle. La distance entre le centre et n'importe quel point du cercle est toujours la même. C'est ce qu'on appelle la longueur du rayon. Tous les rayons d'un même cercle ont la même longueur. On note souvent un rayon par la lettre 'r' minuscule.",
    "note": "Définition du rayon avec illustration et notation."
  },
  {
    "titre": "Le Diamètre du Cercle",
    "contenu": "<div style='background-color: #fdedec; padding: 15px; border-radius: 10px; color: #3a1a1a;'><h3 style='margin-top: 0;'>Le Diamètre</h3><p>Un <strong>diamètre</strong> est un segment qui relie deux points du cercle en passant par le centre.</p><div style='text-align: center; margin: 10px 0;'><svg width='150' height='150' xmlns='http://www.w3.org/2000/svg'><circle cx='75' cy='75' r='60' stroke='#2980b9' stroke-width='3' fill='none'/><circle cx='75' cy='75' r='4' fill='#e74c3c'/><text x='78' y='72' font-size='12' fill='#e74c3c'>O</text><line x1='15' y1='75' x2='135' y2='75' stroke='#c0392b' stroke-width='2'/><circle cx='15' cy='75' r='4' fill='#c0392b'/><text x='5' y='72' font-size='12' fill='#c0392b'>A</text><circle cx='135' cy='75' r='4' fill='#c0392b'/><text x='138' y='72' font-size='12' fill='#c0392b'>B</text></svg></div><ul><li>On note le diamètre : <span style='font-weight: bold;'>[AB]</span> ou <span style='font-weight: bold;'>d</span>.</li><li>La longueur du diamètre est <span style='font-weight: bold;'>deux fois</span> celle du rayon : <span style='font-weight: bold;'>d = 2 × r</span>.</li><li>Le diamètre est le plus grand segment que l'on peut tracer dans un cercle.</li></ul></div>",
    "texteParle": "Le diamètre est un segment qui passe par le centre et dont les extrémités sont sur le cercle. C'est deux fois plus grand que le rayon. Si vous connaissez le rayon, pour trouver le diamètre, il suffit de le multiplier par deux. Inversement, le rayon est la moitié du diamètre. Le diamètre est le plus grand segment qu'on puisse tracer à l'intérieur d'un cercle.",
    "note": "Définition du diamètre avec la relation mathématique avec le rayon."
  },
  {
    "titre": "Comment Tracer un Cercle",
    "contenu": "<div style='padding: 10px;'><h3>Étapes pour tracer un cercle au compas</h3><ol style='background: #f8f9fa; padding: 15px 20px; border-radius: 10px;; color: #000000'><li style='margin-bottom: 8px;'><span style='font-weight: bold;'>1.</span> Choisissez la longueur du <span style='color: #27ae60; font-weight: bold;'>rayon</span> (par exemple 3 cm).</li><li style='margin-bottom: 8px;'><span style='font-weight: bold;'>2.</span> Écartez le compas de cette longueur sur votre règle.</li><li style='margin-bottom: 8px;'><span style='font-weight: bold;'>3.</span> Placez la pointe du compas sur le <span style='color: #e74c3c; font-weight: bold;'>centre</span> choisi.</li><li style='margin-bottom: 8px;'><span style='font-weight: bold;'>4.</span> Tournez le compas en maintenant la pointe fixe.</li><li style='margin-bottom: 8px;'><span style='font-weight: bold;'>5.</span> Le crayon trace alors le cercle.</li></ol><div style='background: #eaf2f8; padding: 10px; border-radius: 8px; margin-top: 10px;; color: #000000'><p><span style='background: #3498db; color: white; padding: 2px 8px; border-radius: 4px;'>Astuce</span> Ne serrez pas trop le compas pour qu'il tourne facilement, mais pas trop lâche pour que le rayon reste constant.</p></div></div>",
    "texteParle": "Tracer un cercle avec un compas est très simple. D'abord, décidez de la longueur du rayon. Ensuite, écartez votre compas de cette longueur en utilisant votre règle. Placez la pointe sur le centre, et faites tourner le compas. Le crayon tracera un cercle parfait. N'oubliez pas de bien tenir la pointe fixe pendant que vous tournez.",
    "note": "Méthode pratique pour tracer un cercle avec le compas."
  },
  {
    "titre": "Tracer avec un Diamètre",
    "contenu": "<div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; color: #1a1a1a;'><h3 style='margin-top: 0;'>Construire un cercle à partir du diamètre</h3><p>Si on vous donne le <strong>diamètre</strong>, le rayon est sa moitié.</p><div style='background: white; padding: 10px; border-radius: 8px; margin: 10px 0;; color: #000000'><p><strong>Exemple :</strong> On veut tracer un cercle de diamètre 8 cm.</p><ul><li>Le rayon est : 8 ÷ 2 = <span style='font-weight: bold;'>4 cm</span>.</li><li>Il faut donc écarter le compas de 4 cm.</li></ul></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px;; color: #000000'><p><span style='font-weight: bold;'>Règle :</span> Rayon = Diamètre ÷ 2</p></div></div>",
    "texteParle": "Il arrive qu'on vous donne le diamètre à la place du rayon. Dans ce cas, il suffit de diviser le diamètre par deux pour obtenir le rayon. Par exemple, si le diamètre est de 8 centimètres, le rayon sera de 4 centimètres. C'est une règle très utile à retenir et à appliquer.",
    "note": "Méthode pour construire un cercle à partir du diamètre."
  },
  {
    "titre": "La Corde",
    "contenu": "<div style='padding: 10px;'><h3>Définition de la corde</h3><p>Une <strong>corde</strong> est un segment qui relie deux points du cercle.</p><div style='text-align: center; margin: 15px 0;'><svg width='150' height='150' xmlns='http://www.w3.org/2000/svg'><circle cx='75' cy='75' r='60' stroke='#2980b9' stroke-width='3' fill='none'/><circle cx='75' cy='75' r='4' fill='#e74c3c'/><text x='78' y='72' font-size='12' fill='#e74c3c'>O</text><line x1='30' y1='45' x2='120' y2='100' stroke='#8e44ad' stroke-width='3'/><circle cx='30' cy='45' r='4' fill='#8e44ad'/><text x='15' y='40' font-size='12' fill='#8e44ad'>A</text><circle cx='120' cy='100' r='4' fill='#8e44ad'/><text x='123' y='100' font-size='12' fill='#8e44ad'>B</text></svg></div><ul><li>Le segment [AB] est une corde.</li><li>La corde ne passe pas nécessairement par le centre.</li><li>Le diamètre est une <span style='font-weight: bold;'>corde particulière</span> qui passe par le centre.</li></ul></div>",
    "texteParle": "Une corde est un segment qui relie deux points sur le cercle. Elle ne passe pas forcément par le centre. Le diamètre est en fait une corde un peu spéciale, car elle passe par le centre. C'est la plus longue des cordes. Les autres cordes sont plus courtes que le diamètre.",
    "note": "Définition de la corde en lien avec le diamètre."
  },
  {
    "titre": "L'Arc de Cercle",
    "contenu": "<div style='background-color: #e8f8f5; padding: 15px; border-radius: 10px; color: #1a3a3a;'><h3 style='margin-top: 0;'>L'Arc de cercle</h3><p>Un <strong>arc de cercle</strong> est une partie de la ligne du cercle délimitée par deux points du cercle.</p><div style='text-align: center; margin: 15px 0;'><svg width='150' height='150' xmlns='http://www.w3.org/2000/svg'><circle cx='75' cy='75' r='60' stroke='#2980b9' stroke-width='3' fill='none'/><circle cx='75' cy='75' r='4' fill='#e74c3c'/><text x='78' y='72' font-size='12' fill='#e74c3c'>O</text><path d='M 30,45 Q 75,15 120,45' stroke='#e67e22' stroke-width='6' fill='none'/><circle cx='30' cy='45' r='4' fill='#e67e22'/><text x='15' y='40' font-size='12' fill='#e67e22'>A</text><circle cx='120' cy='45' r='4' fill='#e67e22'/><text x='123' y='40' font-size='12' fill='#e67e22'>B</text></svg></div><p>Entre les points A et B, on a deux arcs de cercle : un <span style='color: #e67e22; font-weight: bold;'>petit arc</span> et un <span style='font-weight: bold;'>grand arc</span>.</p></div>",
    "texteParle": "Un arc de cercle, c'est simplement une portion du cercle. Si vous prenez deux points sur le cercle, la ligne courbe qui les relie est un arc. Il y a toujours deux arcs entre deux points : un petit et un grand. L'arc est une partie de la circonférence du cercle.",
    "note": "Définition de l'arc de cercle."
  },
  {
    "titre": "Le Disque",
    "contenu": "<div style='background-color: #ebf5fb; padding: 15px; border-radius: 10px; color: #1a2a3a;'><h3 style='margin-top: 0;'>Le Disque</h3><p>Le <strong>disque</strong> est la surface <span style='font-weight: bold;'>intérieure</span> du cercle.</p><div style='display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin: 15px 0;'><div style='text-align: center;'><svg width='100' height='100' xmlns='http://www.w3.org/2000/svg'><circle cx='50' cy='50' r='45' stroke='#2980b9' stroke-width='3' fill='#d4e6f1'/><text x='25' y='55' font-size='14' fill='#1a2a3a'>Disque</text></svg><p><span style='font-weight: bold;'>Disque</span> = surface intérieure</p></div><div style='text-align: center;'><svg width='100' height='100' xmlns='http://www.w3.org/2000/svg'><circle cx='50' cy='50' r='45' stroke='#2980b9' stroke-width='3' fill='none'/><text x='25' y='55' font-size='14' fill='#1a2a3a'>Cercle</text></svg><p><span style='font-weight: bold;'>Cercle</span> = ligne extérieure</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px;; color: #000000'><p><span style='background: #f1c40f; color: #1a1a1a; padding: 2px 8px; border-radius: 4px;'>À retenir</span> Le cercle est la <em>ligne</em>, le disque est la <em>surface</em> à l'intérieur de cette ligne.</p></div></div>",
    "texteParle": "Il est très important de faire la différence entre le cercle et le disque. Le cercle, c'est seulement la ligne courbe extérieure. Le disque, c'est toute la surface à l'intérieur de cette ligne. Par exemple, si vous avez une pièce de monnaie, le bord est le cercle et la surface plane est le disque.",
    "note": "Distinction entre le cercle (ligne) et le disque (surface)."
  },
  {
    "titre": "Vocabulaire : Résumé",
    "contenu": "<div style='background: #f4f6f7; padding: 15px; border-radius: 10px; border: 2px solid #2c3e50; color: #1a1a1a;'><h3 style='margin-top: 0; color: #2c3e50;'>📝 Les éléments d'un cercle</h3><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 8px; padding: 8px; background: white; border-radius: 6px;; color: #000000'>🔵 <strong>Centre (O)</strong> : Point fixe à l'intérieur du cercle.</li><li style='margin-bottom: 8px; padding: 8px; background: white; border-radius: 6px;; color: #000000'>🔴 <strong>Rayon (r)</strong> : Segment du centre à un point du cercle.</li><li style='margin-bottom: 8px; padding: 8px; background: white; border-radius: 6px;; color: #000000'>⚫ <strong>Diamètre (d)</strong> : Segment passant par le centre, reliant deux points du cercle. <br> <span style='font-weight: bold;'>d = 2 × r</span></li><li style='margin-bottom: 8px; padding: 8px; background: white; border-radius: 6px;; color: #000000'>🟡 <strong>Corde</strong> : Segment reliant deux points du cercle (ne passe pas forcément par le centre).</li><li style='margin-bottom: 8px; padding: 8px; background: white; border-radius: 6px;; color: #000000'>🟢 <strong>Arc</strong> : Portion du cercle entre deux points.</li><li style='margin-bottom: 8px; padding: 8px; background: white; border-radius: 6px;; color: #000000'>🔶 <strong>Disque</strong> : Surface intérieure du cercle.</li></ul></div>",
    "texteParle": "Faisons un petit résumé de tout ce que nous avons appris aujourd'hui. Le cercle a un centre, des rayons, des diamètres, des cordes et des arcs. Le rayon relie le centre au cercle. Le diamètre est deux fois plus grand que le rayon et passe par le centre. Une corde relie deux points du cercle. L'arc est une partie de la ligne du cercle. Enfin, le disque est la surface à l'intérieur.",
    "note": "Synthèse du vocabulaire du cercle."
  },
  {
    "titre": "Exercices Pratiques",
    "contenu": "<div style='padding: 10px;'><h3>À vous de tracer !</h3><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; margin: 10px 0;; color: #000000'><p><strong>Exercice 1 :</strong> Tracez un cercle de centre O et de rayon 4 cm.</p><p><strong>Exercice 2 :</strong> Tracez un cercle de diamètre 10 cm. Placez le centre I.</p><p><strong>Exercice 3 :</strong> Sur un même cercle de rayon 3 cm, placez trois points A, B et C. Tracez les segments [AB], [BC] et [CA].</p></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px;; color: #000000'><p><span style='background: #f1c40f; color: #1a1a1a; padding: 2px 8px; border-radius: 4px;'>Consigne</span> Prenez votre temps, soyez précis et n'oubliez pas de <span style='font-weight: bold;'>nommer</span> tous les éléments.</p></div></div>",
    "texteParle": "Il est maintenant temps de passer à la pratique. Je vous propose trois exercices pour vous entraîner. Le premier : tracez un cercle avec un rayon de 4 centimètres. Le deuxième : tracez un cercle de diamètre 10 centimètres. Le troisième : sur un cercle de rayon 3 centimètres, placez trois points et reliez-les. Prenez votre temps et soyez précis dans vos tracés.",

  {

    "contenu": "<div style='text-align: center; padding: 15px;'><h2 style='color: #2c3e50;'>Fin de la leçon</h2><p style='font-size: 1.2em;'>N'oubliez pas de bien réviser le vocabulaire et les constructions.</p><div style='margin: 15px auto; padding: 15px; background: #d5f5e3; border-radius: 10px; display: inline-block;; color: #000000'><p style='margin: 0;'><span style='font-size: 1.5em;'>📚</span> Exercices sur le cercle : pages 78 et 79 du manuel.</p></div><p style='margin-top: 15px; color: #7f8c8d;'>À la prochaine séance !</p></div>",
    "texteParle": "Nous arrivons à la fin de cette leçon sur le cercle. J'espère que vous avez bien compris la différence entre le cercle et le disque, et que vous savez maintenant comment nommer toutes les parties du cercle. N'oubliez pas de faire les exercices à la maison pour vous entraîner. À la prochaine fois, et n'hésitez pas à poser des questions si vous avez des difficultés.",

];
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
