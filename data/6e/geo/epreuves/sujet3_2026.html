<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Sixième",
  "sequence": "Séquence 3 : Évaluation bilan (Modules I, II et III)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La Terre dans l'Univers - Localisation et mouvements (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la localisation et les mouvements de la Terre. Réponds-y en t'aidant de tes connaissances.</p>",
      "questions": [
        {
          "question": "<p> Qu'appelle-t-on <strong>rotation</strong> de la Terre ? Quelle est sa conséquence principale ?</p>",
          "reponse": "<p>La rotation est le mouvement de la Terre sur elle-même autour de son axe. Elle dure environ 24 heures et est à l'origine de l'<strong>alternance des jours et des nuits</strong>.</p>"
        },
        {
          "question": "<p> Qu'est-ce que le <strong>mouvement de révolution</strong> ? Quelle est sa conséquence ?</p>",
          "reponse": "<p>La révolution est le mouvement de la Terre autour du Soleil. Il dure environ 365 jours et est à l'origine des <strong>saisons</strong>.</p>"
        },
        {
          "question": "<p> Cite les deux lignes imaginaires principales qui permettent de se repérer sur Terre.</p>",
          "reponse": "<p>Les deux lignes imaginaires principales sont l'<strong>Équateur</strong> (parallèle 0°) et le <strong>Méridien de Greenwich</strong> (méridien 0°).</p>"
        },
        {
          "question": "<p> À quoi servent les <strong>fuseaux horaires</strong> ?</p>",
          "reponse": "<p>Les fuseaux horaires servent à <strong>déterminer l'heure</strong> dans différentes régions du monde en fonction de la rotation de la Terre. Chaque fuseau correspond à une zone de 15° de longitude.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'océan, le relief et les formes de représentation (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les océans, le relief et la représentation de la Terre.</p>",
      "questions": [
        {
          "question": "<p> Pourquoi la Terre est-elle surnommée la <strong>planète bleue</strong> ?</p>",
          "reponse": "<p>La Terre est surnommée la planète bleue car plus de <strong>70 % de sa surface est recouverte d'eau</strong> (océans et mers).</p>"
        },
        {
          "question": "<p> Quelles sont les principales formes de <strong>relief</strong> que l'on trouve sur Terre ? Cite deux exemples.</p>",
          "reponse": "<p>Les principales formes de relief sont les <strong>montagnes</strong>, les <strong>plaines</strong>, les <strong>plateaux</strong> et les <strong>vallées</strong>.</p>"
        },
        {
          "question": "<p> Quelle est la différence entre un <strong>globe</strong> et une <strong>carte</strong> ?</p>",
          "reponse": "<p>Un <strong>globe</strong> est une représentation sphérique de la Terre, sans déformation. Une <strong>carte</strong> est une représentation plane, qui comporte des déformations, mais qui est plus pratique à utiliser.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les milieux bioclimatiques du Cameroun (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Observe la carte simplifiée des zones climatiques du Cameroun et réponds aux questions.</p><div style='background-color:#f5f5f5;padding:15px;border-radius:8px;border:1px solid #ddd;text-align:center;'><p style='font-weight:bold;'>Carte simplifiée des zones climatiques du Cameroun</p><div style='background-color:#e3f2fd;padding:20px;border-radius:5px;'><p><span style='display:inline-block;background:#2e7d32;color:white;padding:3px 12px;border-radius:10px;margin:3px;'>Subéquatorial</span> <span style='display:inline-block;background:#f57f17;color:white;padding:3px 12px;border-radius:10px;margin:3px;'>Tropical</span> <span style='display:inline-block;background:#bf360c;color:white;padding:3px 12px;border-radius:10px;margin:3px;'>Soudano-sahélien</span></p><p style='font-style:italic;'>[Carte : Le Sud est vert, le Centre est orange, le Nord est rouge]</p></div></div>",
      "questions": [
        {
          "question": "<p> Quelles sont les trois grandes zones climatiques du Cameroun ?</p>",
          "reponse": "<p>Les trois grandes zones sont la zone <strong>subéquatoriale</strong> (Sud), la zone <strong>tropicale</strong> (Centre) et la zone <strong>soudano-sahélienne</strong> (Nord).</p>"
        },
        {
          "question": "<p> Quelle zone climatique est associée à la <strong>forêt dense</strong> ?</p>",
          "reponse": "<p>La <strong>forêt dense</strong> est associée à la zone <strong>subéquatoriale</strong> (Sud).</p>"
        },
        {
          "question": "<p> Quelle zone climatique est la plus touchée par la <strong>sécheresse</strong> ?</p>",
          "reponse": "<p>La zone <strong>soudano-sahélienne</strong> (Nord) est la plus touchée par la sécheresse.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les changements climatiques au Cameroun (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Lis le texte suivant puis réponds aux questions.</p><div style='background-color:#fff8e1;padding:15px;border-radius:8px;border-left:4px solid #f57f17;'><p><em>Au Cameroun, les conséquences du changement climatique sont de plus en plus visibles. Dans le Nord du pays, les pluies se font rares et les températures augmentent, ce qui provoque l'avancée du désert. Les agriculteurs et les éleveurs sont de plus en plus touchés par cette situation [citation:2]. Les conflits pour l'accès à l'eau se multiplient. La montée des eaux menace la ville de Douala et ses habitants.</em></p></div>",
      "questions": [
        {
          "question": "<p> Quelles sont les deux principales conséquences du changement climatique au Cameroun évoquées dans le texte ?</p>",
          "reponse": "<p>Les deux principales conséquences sont la <strong>sécheresse dans le Nord</strong> (avancée du désert) et la <strong>montée des eaux à Douala</strong>.</p>"
        },
        {
          "question": "<p> Quelles populations sont les plus touchées par la sécheresse au Nord ?</p>",
          "reponse": "<p>Les <strong>agriculteurs</strong> et les <strong>éleveurs</strong> sont les plus touchés par la sécheresse au Nord [citation:2].</p>"
        },
        {
          "question": "<p> Cite une solution mise en place au Cameroun pour lutter contre le changement climatique.</p>",
          "reponse": "<p>Une solution mise en place est la création de l'<strong>Observatoire National des Changements Climatiques (ONACC)</strong> pour surveiller et évaluer les impacts et proposer des mesures d'adaptation [citation:5].</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Synthèse - La Terre, l'environnement et les défis climatiques (8 pts)",
      "points": "8 pts",
      "enonce": "<p>Consigne : Rédige un paragraphe construit sur le sujet suivant : <strong>« La Terre, notre planète : un environnement à protéger face aux défis climatiques »</strong>.</p>",
      "questions": [
        {
          "question": "<p>Rédige ton développement.</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> La Terre est notre planète, une planète bleue couverte d'océans et de continents. Les humains y vivent, s'y déplacent et utilisent ses ressources. Les activités humaines, comme la déforestation et l'industrie, produisent des gaz à effet de serre qui provoquent le réchauffement climatique. Ce changement climatique a des conséquences graves : dans le Nord du Cameroun, les sécheresses deviennent plus fréquentes, menaçant les agriculteurs et les éleveurs [citation:2]. À Douala, la montée des eaux menace la ville côtière [citation:2]. Pour protéger notre planète, des actions sont menées comme la création de l'Observatoire National des Changements Climatiques (ONACC) qui suit l'évolution du climat et propose des solutions [citation:5]. Il est aussi important de planter des arbres, de trier les déchets et d'utiliser moins d'énergie. La protection de l'environnement est l'affaire de tous et un défi majeur du 21e siècle.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
