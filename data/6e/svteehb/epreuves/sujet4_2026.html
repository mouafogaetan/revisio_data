<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Sixième",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des ressources",
      "points": "6 pts",
      "enonce": "<p>Cette partie évalue vos connaissances et votre compréhension des notions abordées en classe.</p>",
      "questions": [
        {
          "question": "<p><strong>1) Définitions (2 pts)</strong></p><p>Donne une définition scientifique des termes suivants :</p><ul><li><strong>a)</strong> Matière</li><li><strong>b)</strong> Énergie</li><li><strong>c)</strong> Pollution des sols</li><li><strong>d)</strong> Multiplication végétative</li></ul>",
          "reponse": "<p><strong>a) Matière :</strong> La matière est tout ce qui a une masse et occupe un volume. Elle se présente sous trois états physiques : solide, liquide et gazeux [citation:2].</p><p><strong>b) Énergie :</strong> L'énergie est la capacité qu'a un système de produire un travail, de créer un mouvement ou de provoquer une transformation. Elle existe sous différentes formes (lumineuse, thermique, mécanique, etc.) [citation:2].</p><p><strong>c) Pollution des sols :</strong> C'est la dégradation de la qualité des sols due à l'introduction de substances ou d'agents (déchets, produits chimiques) qui modifient ses propriétés et le rendent impropre à son usage naturel.</p><p><strong>d) Multiplication végétative :</strong> C'est un mode de reproduction asexuée chez les plantes où un nouvel individu se développe à partir d'une partie d'une plante mère (tige, racine, feuille), sans passer par la reproduction sexuée.</p>"
        },
        {
          "question": "<p><strong>2) Vrai ou Faux ? (2 pts)</strong></p><p>Indique si les affirmations suivantes sont Vraies (V) ou Fausses (F). Justifie les réponses fausses par une correction.</p><ul><li><strong>a)</strong> La pluviosité est un facteur du sol qui influence la production végétale.</li><li><strong>b)</strong> Le greffage et le bouturage sont des techniques de multiplication sexuée.</li><li><strong>c)</strong> Une solution neutre a un pH égal à 7.</li><li><strong>d)</strong> Le VIH est un virus qui se transmet par les piqûres de moustiques.</li></ul>",
          "reponse": "<p><strong>a)</strong> Faux. La pluviosité est un facteur <strong>climatique</strong>, elle influence la production végétale mais n'est pas un facteur du sol (qui sont la texture, la structure, la composition).</p><p><strong>b)</strong> Faux. Le greffage et le bouturage sont des techniques de multiplication <strong>végétative</strong> (asexuée).</p><p><strong>c)</strong> Vrai.</p><p><strong>d)</strong> Faux. Le VIH se transmet par les liquides biologiques (sang, sperme, sécrétions vaginales, lait maternel), et non par les piqûres de moustiques.</p>"
        },
        {
          "question": "<p><strong>3) Restitution de connaissances (2 pts)</strong></p><p>Réponds par une phrase courte et précise.</p><ul><li><strong>a)</strong> Cite deux principaux ravageurs ou parasites des végétaux.</li><li><strong>b)</strong> Donne un exemple de transformation d'un produit agricole et le produit obtenu.</li><li><strong>c)</strong> Quels sont les trois principaux facteurs climatiques qui influencent la production végétale ?</li><li><strong>d)</strong> Définis une Grossesse Précoce.</li></ul>",
          "reponse": "<p><strong>a)</strong> Les principaux ravageurs sont les insectes (comme les chenilles) et les champignons (comme le mildiou).</p><p><strong>b)</strong> La transformation du manioc permet d'obtenir du bâton de manioc ou du gari.</p><p><strong>c)</strong> Les trois principaux facteurs climatiques sont la <strong>température</strong>, la <strong>pluviosité</strong> et la <strong>luminosité</strong>.</p><p><strong>d)</strong> Une grossesse précoce est une grossesse qui survient chez une adolescente avant l'âge de 18 ans, avant que son corps et sa vie sociale ne soient suffisamment matures.</p>"
        }
      ]
    },
    {
      "titre": "Mobilisation des compétences",
      "points": "14 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border-left: 5px solid #2c3e50; color: #2c3e50;'><p><strong>⚠️ Situation de vie :</strong></p><p>M. Mbarga, un agriculteur de la région de l'Ouest, souhaite créer un verger de manguiers pour améliorer ses revenus. Il possède un terrain en pente, avec un sol plutôt sablonneux. Il a entendu parler de la technique de greffage pour obtenir de meilleurs fruits. En parallèle, sa fille de 15 ans, qui l'aide à la maison, lui confie qu'elle a peur d'être enceinte après avoir eu des rapports sexuels non protégés. M. Mbarga aimerait aussi protéger son verger contre les parasites tout en préservant l'environnement.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1) Comprendre l'influence du milieu (3 pts)</strong></p><p>Dans la situation de M. Mbarga :</p><ul><li><strong>a)</strong> Explique en quoi le type de sol (sablonneux) peut influencer la croissance de ses futurs manguiers. (1 pt)</li><li><strong>b)</strong> Le terrain étant en pente, quel autre facteur climatique pourrait poser problème et comment y remédier ? (1 pt)</li><li><strong>c)</strong> Propose une solution pour améliorer la qualité de ce sol sablonneux. (1 pt)</li></ul>",
          "reponse": "<p><strong>a)</strong> Un sol sablonneux est perméable : il laisse facilement s'écouler l'eau. Cela peut entraîner un manque d'eau (sécheresse) pour les racines des manguiers, surtout en période de saison sèche.</p><p><strong>b)</strong> L'érosion des sols. La pluie ruisselle sur la pente et emporte la couche fertile du sol. Pour y remédier, M. Mbarga peut :<ul><li>Planter des herbes (couverture végétale) pour fixer le sol.</li><li>Construire des courbes de niveau (des petites digues en terre).</li></ul></p><p><strong>c)</strong> Pour améliorer un sol sablonneux, il peut ajouter de la matière organique (du compost, du fumier). Le compost retient l'eau et apporte les nutriments nécessaires aux plantes.</p>"
        },
        {
          "question": "<p><strong>2) Maîtriser les techniques de production (4 pts)</strong></p><ul><li><strong>a)</strong> Explique à M. Mbarga l'intérêt de la technique de greffage pour son verger. (2 pts)</li><li><strong>b)</strong> La multiplication par voie sexuée (semis) est-elle une autre option ? Explique son inconvénient par rapport au greffage. (1 pt)</li><li><strong>c)</strong> Pour lutter contre les parasites, cite deux méthodes de lutte biologique (respectueuses de l'environnement) qu'il peut utiliser. (1 pt)</li></ul>",
          "reponse": "<p><strong>a)</strong> Le greffage permet de multiplier une plante en conservant fidèlement les caractéristiques du pied-mère (variété, qualité gustative). Il permet aussi d'obtenir des fruits plus rapidement que par semis et d'adapter la plante à différents types de sols grâce au choix du porte-greffe.</p><p><strong>b)</strong> Le semis est une option, mais son inconvénient majeur est qu'il ne garantit pas que le nouveau plant ait les mêmes qualités que le parent (on parle de variabilité). Le greffage assure l'uniformité et la qualité des fruits.</p><p><strong>c)</strong> Deux méthodes de lutte biologique :<ul><li>Utiliser des prédateurs naturels (exemple : coccinelles contre les pucerons).</li><li>Utiliser des extraits de plantes (exemple : purin de neem, ou une décoction de feuilles de papayer).</li></ul></p>"
        },
        {
          "question": "<p><strong>3) Agir sur la santé et l'environnement (4 pts)</strong></p><ul><li><strong>a)</strong> Quels conseils donnerais-tu à la fille de M. Mbarga pour la protéger contre les grossesses précoces et les IST ? (2 pts)</li><li><strong>b)</strong> M. Mbarga souhaite utiliser des déchets de cuisine pour fertiliser son sol. Explique en une phrase le principe de la fabrication du compost. (1 pt)</li><li><strong>c)</strong> Pourquoi l'utilisation de compost est-elle bénéfique pour l'environnement par rapport aux engrais chimiques ? (1 pt)</li></ul>",
          "reponse": "<p><strong>a)</strong> Je lui conseillerais de :<ul><li>Consulter un centre de santé pour un test et une consultation.</li><li>Si elle est sexuellement active, utiliser des préservatifs (masculin ou féminin) pour se protéger des IST et des grossesses non désirées.</li><li>S'informer auprès d'une personne de confiance (assistante sociale, infirmière) sur les méthodes contraceptives.</li></ul></p><p><strong>b)</strong> Le compost est le résultat de la décomposition contrôlée de matières organiques (déchets de cuisine, feuilles) par des micro-organismes pour obtenir un engrais naturel.</p><p><strong>c)</strong> L'utilisation de compost est bénéfique car il réduit la pollution des sols, évite l'accumulation de déchets et ne contient pas de produits chimiques nocifs pour l'environnement [citation:2].</p>"
        },
        {
          "question": "<p><strong>4) Maîtriser les propriétés de la matière (3 pts)</strong></p><p>M. Mbarga veut préparer une bouillie bordelaise (un fongicide) à base de sulfate de cuivre. Il doit mesurer précisément la masse de sulfate de cuivre.</p><ul><li><strong>a)</strong> Avec quel instrument doit-il mesurer la masse de sulfate de cuivre ? (1 pt)</li><li><strong>b)</strong> Pour préparer 1 L d'une solution, il doit utiliser 20 g de sulfate de cuivre. Calcule la concentration massique de cette solution (en g/L). (1 pt)</li><li><strong>c)</strong> Si le sulfate de cuivre ne se dissout pas bien dans l'eau froide, quelle propriété physique (définie en classe) peux-tu utiliser pour accélérer la dissolution ? (1 pt)</li></ul>",
          "reponse": "<p><strong>a)</strong> Il doit utiliser une balance.</p><p><strong>b)</strong> La concentration massique se calcule par la formule : <strong>C = m / V</strong>. Ici, m = 20 g et V = 1 L. Donc C = 20 / 1 = <strong>20 g/L</strong>.</p><p><strong>c)</strong> La <strong>solubilité</strong> est la capacité d'un soluté à se dissoudre dans un solvant. Comme la solubilité augmente avec la température, il peut chauffer l'eau pour accélérer la dissolution.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
