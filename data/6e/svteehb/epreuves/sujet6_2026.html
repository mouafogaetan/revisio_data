<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVTEEHB",
 "classe": "Sixième",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Les plantes médicinales",
     "points": "4 pts",
     "enonce": "<p>Les plantes médicinales sont utilisées depuis des millénaires pour soigner de nombreuses maladies. Au Cameroun, la pharmacopée traditionnelle est très riche. Il est important de connaître les règles de cueillette et d'utilisation de ces plantes.</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (0,75 pt)</strong> Cite trois plantes médicinales que tu connais dans ton environnement.</p>",
         "reponse": "<p>Les plantes médicinales présentes au Cameroun sont nombreuses. Parmi elles, on peut citer :</p><ul><li>Le <strong>neem</strong> (Azadirachta indica) : utilisé contre le paludisme.</li><li>Le <strong>gombo</strong> (Hibiscus esculentus) : utilisé contre les maux de gorge.</li><li>Le <strong>moringa</strong> (Moringa oleifera) : utilisé comme complément alimentaire.</li><li>L'<strong>aloès</strong> (Aloe vera) : utilisé pour soigner les brûlures.</li><li>Le <strong>citronnelle</strong> (Cymbopogon citratus) : utilisée contre la fièvre.</li></ul>"
       },
       {
         "question": "<p><strong>1.2 (1 pt)</strong> Décris les règles de cueillette des plantes médicinales.</p>",
         "reponse": "<p>Les règles de cueillette des plantes médicinales sont :</p><ul><li>Ne pas cueillir les plantes en voie de disparition.</li><li>Ne pas arracher la plante entière, mais prélever seulement les parties nécessaires.</li><li>Cueillir les plantes loin des zones polluées (routes, champs traités avec des pesticides).</li><li>Cueillir les plantes au bon moment de la journée (généralement le matin).</li><li>Laisser une partie de la plante pour qu'elle puisse repousser.</li></ul>"
       },
       {
         "question": "<p><strong>1.3 (1,25 pt)</strong> Explique deux méthodes d'utilisation des plantes médicinales.</p>",
         "reponse": "<p>Les plantes médicinales peuvent être utilisées de différentes manières :</p><ul><li>En <strong>infusion</strong> : on fait bouillir les feuilles ou les fleurs dans de l'eau pour en extraire les principes actifs.</li><li>En <strong>décoction</strong> : on fait bouillir les parties dures (racines, écorces) pendant plusieurs minutes.</li><li>En <strong>macération</strong> : on laisse tremper la plante dans de l'eau froide ou de l'alcool.</li><li>En <strong>onguent</strong> : on mélange les plantes écrasées à une base grasse pour application externe.</li></ul>"
       },
       {
         "question": "<p><strong>1.4 (1 pt)</strong> Pourquoi est-il important de respecter les règles de cueillette des plantes médicinales ?</p>",
         "reponse": "<p>Il est important de respecter les règles de cueillette car :</p><ul><li>Cela permet de <strong>préserver la biodiversité</strong> et d'éviter la disparition de certaines espèces.</li><li>Cela garantit la <strong>qualité et l'efficacité</strong> des plantes médicinales.</li><li>Cela évite la <strong>contamination</strong> par des polluants (pesticides, métaux lourds).</li><li>Cela permet aux plantes de <strong>se régénérer</strong> pour les générations futures.</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : La pollution des sols",
     "points": "4 pts",
     "enonce": "<p>Les sols sont une ressource précieuse et limitée. Malheureusement, ils sont de plus en plus pollués par les activités humaines. Il est urgent d'agir pour les protéger.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (0,75 pt)</strong> Définis la pollution des sols.</p>",
         "reponse": "<p>La <strong>pollution des sols</strong> est la dégradation de la qualité du sol due à l'introduction de substances chimiques ou biologiques nocives. Ces substances altèrent les propriétés physiques, chimiques et biologiques du sol, le rendant impropre à certaines utilisations.</p>"
       },
       {
         "question": "<p><strong>2.2 (1 pt)</strong> Cite trois causes de la pollution des sols.</p>",
         "reponse": "<p>Les principales causes de la pollution des sols sont :</p><ul><li>L'utilisation excessive d'<strong>engrais chimiques</strong> et de <strong>pesticides</strong>.</li><li>Le déversement de <strong>déchets</strong> (plastiques, métaux, produits toxiques).</li><li>Les <strong>déchets industriels</strong> et les <strong>hydrocarbures</strong>.</li><li>La <strong>déforestation</strong> et les <strong>feux de brousse</strong>.</li><li>Les <strong>eaux usées</strong> non traitées.</li></ul>"
       },
       {
         "question": "<p><strong>2.3 (1,25 pt)</strong> Explique les conséquences de la pollution des sols sur l'environnement et sur la santé humaine.</p>",
         "reponse": "<p>Les conséquences de la pollution des sols sont :</p><ul><li>Sur l'<strong>environnement</strong> : perte de la fertilité du sol, diminution de la biodiversité (microorganismes, plantes, animaux), contamination des nappes phréatiques.</li><li>Sur la <strong>santé humaine</strong> : ingestion de polluants par les plantes cultivées, contamination de l'eau potable, maladies (cancers, troubles neurologiques).</li></ul>"
       },
       {
         "question": "<p><strong>2.4 (1 pt)</strong> Propose trois méthodes de prévention de la pollution des sols.</p>",
         "reponse": "<p>Pour prévenir la pollution des sols, on peut :</p><ul><li><strong>Réduire l'utilisation d'engrais chimiques</strong> et privilégier les engrais organiques.</li><li><strong>Recycler et composter</strong> les déchets pour réduire la quantité de déchets envoyés aux décharges.</li><li><strong>Lutter contre la déforestation</strong> et pratiquer le reboisement.</li><li><strong>Éviter les feux de brousse</strong> qui détruisent la couche superficielle du sol.</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Technologie et projets",
     "points": "5 pts",
     "enonce": "<p>La technologie est partout dans notre vie quotidienne. Elle permet de résoudre des problèmes et d'améliorer notre confort. Un projet technologique est réalisé en suivant une démarche précise.</p>",
     "questions": [
       {
         "question": "<p><strong>3.1 (0,75 pt)</strong> Définis la technologie.</p>",
         "reponse": "<p>La <strong>technologie</strong> est l'ensemble des techniques, des méthodes et des savoir-faire utilisés par l'Homme pour transformer, créer ou améliorer des objets, des produits ou des systèmes. Elle est au service des besoins humains.</p>"
       },
       {
         "question": "<p><strong>3.2 (0,75 pt)</strong> Distingue un objet technique d'un objet naturel.</p>",
         "reponse": "<p>Un <strong>objet technique</strong> est un objet fabriqué par l'Homme pour répondre à un besoin précis (ex : une voiture, un téléphone). Un <strong>objet naturel</strong> est un objet qui existe dans la nature sans intervention humaine (ex : une pierre, un arbre).</p>"
       },
       {
         "question": "<p><strong>3.3 (1,25 pt)</strong> Décris les étapes de la démarche technologique.</p>",
         "reponse": "<p>La démarche technologique comprend les étapes suivantes :</p><ol><li><strong>Identification du besoin</strong> : que veut-on réaliser ?</li><li><strong>Recherche d'informations</strong> : comment les autres ont-ils résolu ce problème ?</li><li><strong>Conception</strong> : proposer des solutions (croquis, schémas).</li><li><strong>Réalisation</strong> : fabriquer l'objet.</li><li><strong>Évaluation</strong> : tester l'objet et vérifier s'il répond au besoin.</li><li><strong>Amélioration</strong> : apporter des modifications si nécessaire.</li></ol>"
       },
       {
         "question": "<p><strong>3.4 (1,25 pt)</strong> Définis un cahier des charges et cite les éléments qu'il doit contenir.</p>",
         "reponse": "<p>Un <strong>cahier des charges</strong> est un document qui décrit précisément les besoins et les contraintes d'un projet. Il doit contenir :</p><ul><li>La <strong>description du besoin</strong>.</li><li>Les <strong>contraintes</strong> à respecter (coût, délai, matériaux).</li><li>Les <strong>fonctions</strong> que l'objet doit remplir.</li><li>Les <strong>normes</strong> de sécurité à respecter.</li><li>Les <strong>critères d'évaluation</strong> du projet.</li></ul>"
       },
       {
         "question": "<p><strong>3.5 (1 pt)</strong> Cite deux exemples de projets simples que l'on peut réaliser à l'école.</p>",
         "reponse": "<p>Deux exemples de projets simples à réaliser à l'école sont :</p><ul><li>La fabrication d'un <strong>filtre à eau</strong> à partir de matériaux naturels (sable, charbon, gravier).</li><li>La création d'un <strong>jardin potager</strong> pour produire des légumes et apprendre à cultiver la terre.</li><li>La fabrication d'un <strong>composteur</strong> pour recycler les déchets organiques.</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Énergie et environnement",
     "points": "4 pts",
     "enonce": "<p>L'énergie est indispensable à notre vie quotidienne. Cependant, sa production et son utilisation ont des impacts sur l'environnement. Il est important de connaître les sources d'énergie et leurs effets.</p>",
     "questions": [
       {
         "question": "<p><strong>4.1 (0,75 pt)</strong> Définis la combustion.</p>",
         "reponse": "<p>La <strong>combustion</strong> est une réaction chimique qui dégage de la chaleur et de la lumière. Elle se produit lorsqu'un combustible (bois, charbon, pétrole, gaz) brûle en présence d'un comburant (généralement le dioxygène de l'air).</p>"
       },
       {
         "question": "<p><strong>4.2 (1 pt)</strong> Cite deux produits d'une combustion.</p>",
         "reponse": "<p>Les produits d'une combustion sont :</p><ul><li>Le <strong>dioxyde de carbone (CO₂)</strong>.</li><li>La <strong>vapeur d'eau (H₂O)</strong>.</li><li>Des <strong>cendres</strong> (résidus solides).</li><li>Des <strong>gaz</strong> comme le monoxyde de carbone (CO) si la combustion est incomplète.</li></ul>"
       },
       {
         "question": "<p><strong>4.3 (1,25 pt)</strong> Distingue les sources d'énergie renouvelables des sources d'énergie non renouvelables en donnant deux exemples pour chaque catégorie.</p>",
         "reponse": "<p>Les <strong>sources d'énergie renouvelables</strong> sont inépuisables à l'échelle humaine. Exemples :</p><ul><li>L'<strong>énergie solaire</strong> (soleil).</li><li>L'<strong>énergie éolienne</strong> (vent).</li><li>L'<strong>énergie hydraulique</strong> (eau).</li></ul><p>Les <strong>sources d'énergie non renouvelables</strong> sont limitées et s'épuisent. Exemples :</p><ul><li>Le <strong>pétrole</strong>.</li><li>Le <strong>charbon</strong>.</li><li>Le <strong>gaz naturel</strong>.</li><li>L'<strong>uranium</strong> (pour l'énergie nucléaire).</li></ul>"
       },
       {
         "question": "<p><strong>4.4 (1 pt)</strong> Explique l'impact des combustions sur l'environnement.</p>",
         "reponse": "<p>Les combustions ont un impact négatif sur l'environnement :</p><ul><li>Elles rejettent du <strong>dioxyde de carbone (CO₂)</strong>, un gaz à effet de serre qui contribue au <strong>réchauffement climatique</strong>.</li><li>Elles produisent des <strong>fumées</strong> et des <strong>particules fines</strong> qui polluent l'air et peuvent causer des maladies respiratoires.</li><li>Elles génèrent des <strong>déchets</strong> (cendres, résidus) qui doivent être gérés.</li></ul>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
