<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Sixième",
  "sequence": "Séquence 3 : Le monde vivant, la matière et l'énergie",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Influence du climat et du sol sur la production végétale",
      "points": "5 pts",
      "enonce": "<p>La production végétale dépend de plusieurs facteurs du milieu, notamment le climat et les caractéristiques du sol. Un agriculteur souhaite cultiver du maïs dans deux parcelles différentes.</p><ul><li><strong>Parcelle A</strong> : sol argileux, située en zone de savane avec une saison des pluies de 6 mois.</li><li><strong>Parcelle B</strong> : sol sableux, située en zone désertique avec une pluviométrie très faible.</li></ul>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) a) Citer les trois principaux facteurs climatiques qui influencent la production végétale. <br>b) Expliquer l'influence de la pluviosité sur la croissance des plantes.</p>",
          "reponse": "<p>a) Les trois principaux facteurs climatiques sont : <strong>la température</strong>, <strong>la pluviosité</strong> et <strong>la luminosité</strong>.</p><p>b) La <strong>pluviosité</strong> (quantité d'eau) est essentielle à la croissance des plantes car l'eau est nécessaire à la photosynthèse, au transport des nutriments et au maintien de la turgescence des cellules. Un manque d'eau provoque le flétrissement et la mort des plantes.</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1,5 pts) a) Distinguer un sol argileux d'un sol sableux (texture, propriétés). <br>b) Expliquer pourquoi le sol de la parcelle A est plus favorable à la culture du maïs que celui de la parcelle B.</p>",
          "reponse": "<p>a) Différences entre sol argileux et sol sableux :</p><ul><li><strong>Sol argileux</strong> : particules très fines, retient bien l'eau et les nutriments, mais est souvent compact et difficile à travailler.</li><li><strong>Sol sableux</strong> : particules grossières, draine rapidement l'eau, peu fertile car les nutriments sont lessivés.</li></ul><p>b) La parcelle A (sol argileux en zone de savane) est plus favorable car :</p><ul><li>Le sol argileux retient l'eau et les nutriments nécessaires au maïs.</li><li>La pluviométrie de 6 mois assure un apport en eau suffisant.</li><li>La température de la savane est adaptée à la culture du maïs.</li></ul><p>La parcelle B est défavorable car le sol sableux ne retient pas l'eau et la zone désertique est trop sèche.</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (1,5 pts) a) Expliquer l'influence de la luminosité sur la production végétale. <br>b) Expliquer pourquoi les plantes ont besoin de lumière pour se développer.</p>",
          "reponse": "<p>a) La <strong>luminosité</strong> (intensité et durée de la lumière) influence directement la photosynthèse. Plus la lumière est intense et longue, plus la photosynthèse est active, ce qui augmente la production de matière organique.</p><p>b) Les plantes ont besoin de lumière car c'est la source d'énergie de la <strong>photosynthèse</strong>. Sans lumière, les plantes ne peuvent pas fabriquer leur nourriture (glucose) à partir du CO₂ et de l'eau. La lumière est donc indispensable à leur croissance et à leur production.</p>"
        },
        {
          "question": "<p><strong>1.4</strong> (1 pt) Proposer deux techniques pour améliorer la production végétale sur un sol pauvre.</p>",
          "reponse": "<p>Deux techniques pour améliorer la production sur un sol pauvre :</p><ul><li><strong>Apporter des engrais</strong> (organiques ou chimiques) pour enrichir le sol en nutriments.</li><li><strong>Pratiquer l'irrigation</strong> pour compenser le manque d'eau.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Multiplication et reproduction des plantes",
      "points": "5 pts",
      "enonce": "<p>Les plantes peuvent se multiplier de deux manières : par reproduction sexuée (à partir de graines) et par multiplication végétative (à partir de fragments de la plante).</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) a) Définir la reproduction sexuée chez les plantes. <br>b) Citer les organes reproducteurs d'une fleur.</p>",
          "reponse": "<p>a) La <strong>reproduction sexuée</strong> chez les plantes est la formation d'une nouvelle plante à partir d'une <strong>graine</strong>, issue de la fécondation (fusion des gamètes mâle et femelle).</p><p>b) Les organes reproducteurs d'une fleur sont :</p><ul><li><strong>Organes mâles</strong> : les étamines (anthères + filet) qui produisent le pollen.</li><li><strong>Organes femelles</strong> : le pistil (ovaire, style, stigmate) qui contient les ovules.</li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1,5 pts) a) Définir la multiplication végétative. <br>b) Citer trois techniques de multiplication végétative utilisées par l'Homme.</p>",
          "reponse": "<p>a) La <strong>multiplication végétative</strong> (ou multiplication asexuée) est un mode de reproduction qui ne fait pas intervenir de graines. Une nouvelle plante est obtenue à partir d'un <strong>fragment</strong> de la plante mère (tige, racine, feuille).</p><p>b) Trois techniques de multiplication végétative :</p><ul><li><strong>Le bouturage</strong> : planter un fragment de tige ou de feuille.</li><li><strong>Le marcottage</strong> : faire raciner une branche encore attachée à la plante mère.</li><li><strong>Le greffage</strong> : souder un fragment d'une plante (greffon) sur une autre plante (porte-greffe).</li></ul>"
        },
        {
          "question": "<p><strong>2.3</strong> (1,5 pts) a) Distinguer la reproduction sexuée de la multiplication végétative. <br>b) Expliquer l'intérêt de la multiplication végétative pour l'amélioration de la production agricole.</p>",
          "reponse": "<p>a) Différences :</p><ul><li><strong>Reproduction sexuée</strong> : à partir de graines, donne des plantes avec des caractères variés (diversité génétique).</li><li><strong>Multiplication végétative</strong> : à partir de fragments de la plante, donne des plantes identiques à la plante mère (clones).</li></ul><p>b) La multiplication végétative est intéressante en agriculture car elle permet :</p><ul><li>D'obtenir des plantes <strong>identiques</strong> à la plante mère (conservation des qualités).</li><li>Une <strong>rapidité</strong> de production (pas d'attente pour la germination).</li><li>La <strong>multiplication</strong> de variétés performantes (à gros fruits, résistantes).</li></ul>"
        },
        {
          "question": "<p><strong>2.4</strong> (1 pt) Expliquer pourquoi la reproduction sexuée est importante pour la biodiversité.</p>",
          "reponse": "<p>La reproduction sexuée est importante pour la <strong>biodiversité</strong> car elle crée une <strong>diversité génétique</strong> chez les plantes. Chaque graine produite est génétiquement différente des autres.</p><p>Cette diversité permet :</p><ul><li>Une meilleure <strong>adaptation</strong> aux changements du milieu.</li><li>Une plus grande <strong>résistance</strong> aux maladies.</li><li>Une plus grande <strong>variété</strong> de caractères (taille, couleur, goût).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Propriétés physiques et chimiques de la matière",
      "points": "4 pts",
      "enonce": "<p>La matière possède des propriétés physiques (état, solubilité, perméabilité) et des propriétés chimiques (acidité, basicité). Ces propriétés sont importantes dans la vie quotidienne.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) a) Définir la matière. <br>b) Citer les trois états de la matière en donnant un exemple pour chacun.</p>",
          "reponse": "<p>a) La <strong>matière</strong> est tout ce qui occupe un espace (volume) et possède une masse.</p><p>b) Les trois états de la matière :</p><ul><li><strong>Solide</strong> : exemple, une pierre, le verre.</li><li><strong>Liquide</strong> : exemple, l'eau, le lait.</li><li><strong>Gazeux</strong> : exemple, l'air, le dioxyde de carbone.</li></ul>"
        },
        {
          "question": "<p><strong>3.2</strong> (1 pt) a) Définir la solubilité. <br>b) Donner un exemple de substance soluble dans l'eau et une substance insoluble.</p>",
          "reponse": "<p>a) La <strong>solubilité</strong> est la capacité d'une substance (soluté) à se dissoudre dans un liquide (solvant) pour former une solution homogène.</p><p>b) Exemples :</p><ul><li>Substance <strong>soluble</strong> dans l'eau : le sucre, le sel.</li><li>Substance <strong>insoluble</strong> dans l'eau : l'huile, le sable.</li></ul>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) a) Définir l'acidité et la basicité d'une solution. <br>b) Comment reconnaître une solution acide d'une solution basique à l'aide du papier pH ?</p>",
          "reponse": "<p>a) L'<strong>acidité</strong> caractérise une solution contenant des ions H₃O⁺ (pH < 7). La <strong>basicité</strong> caractérise une solution contenant des ions OH⁻ (pH > 7).</p><p>b) Avec le <strong>papier pH</strong> :</p><ul><li>Une solution <strong>acide</strong> fait virer le papier pH au <span style='color: red;'><strong>rouge</strong></span>.</li><li>Une solution <strong>basique</strong> fait virer le papier pH au <span style='color: blue;'><strong>bleu</strong></span>.</li><li>Une solution <strong>neutre</strong> (pH 7) laisse le papier <span style='color: green;'><strong>vert</strong></span>.</li></ul>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) Expliquer pourquoi il ne faut pas mélanger de l'eau de Javel (basique) avec du vinaigre (acide).</p>",
          "reponse": "<p>Il ne faut pas mélanger l'eau de Javel (basique) avec du vinaigre (acide) car la réaction chimique entre un acide et une base produit un <strong>dégagement de chlore gazeux</strong> (gaz toxique).</p><p>Ce gaz est <strong>dangereux</strong> pour la santé : il irrite les yeux, la peau et les voies respiratoires. L'inhalation de chlore gazeux peut provoquer des intoxications graves.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Énergie et environnement",
      "points": "4 pts",
      "enonce": "<p>L'énergie est indispensable à la vie et aux activités humaines. Elle existe sous différentes formes et provient de différentes sources. La combustion est un phénomène énergétique qui a des conséquences sur l'environnement.</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) a) Définir l'énergie. <br>b) Citer quatre formes d'énergie.</p>",
          "reponse": "<p>a) L'<strong>énergie</strong> est la capacité d'un système à produire un travail, à provoquer un mouvement ou à modifier la température d'un corps.</p><p>b) Quatre formes d'énergie :</p><ul><li><strong>Énergie mécanique</strong> (mouvement).</li><li><strong>Énergie thermique</strong> (chaleur).</li><li><strong>Énergie lumineuse</strong> (lumière).</li><li><strong>Énergie électrique</strong> (courant).</li></ul>"
        },
        {
          "question": "<p><strong>4.2</strong> (1 pt) a) Distinguer une source d'énergie renouvelable d'une source non renouvelable. <br>b) Donner un exemple pour chaque.</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
