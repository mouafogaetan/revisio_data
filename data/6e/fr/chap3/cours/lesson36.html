<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Les verbes du 3ème groupe",
    "contenu": "<div style='background: linear-gradient(135deg, #e44d26 0%, #f7971e 100%); padding: 30px; border-radius: 15px; color: white; text-align: center;'>\n  <h1 style='font-size: 2em; margin-bottom: 10px;'>📚 Les verbes du 3ème groupe</h1>\n  <p style='font-size: 1.2em;'>Cours de Français – Classe de Sixième</p>\n  <div style='margin-top: 20px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px;'>\n    <p style='font-weight: bold;'>Objectif du cours :</p>\n    <p>Conjuguer les verbes du 3ème groupe à tous les temps de l'indicatif</p>\n  </div>\n</div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons approfondir nos connaissances sur les verbes du troisième groupe. Ces verbes sont souvent considérés comme difficiles parce qu'ils sont irréguliers. Mais avec de la pratique et des astuces, vous allez les maîtriser. Nous allons voir ensemble comment les conjuguer à tous les temps de l'indicatif. Prenez vos cahiers, nous commençons !",
    "note": "Les verbes du 3ème groupe sont tous les verbes qui ne sont ni du 1er ni du 2ème groupe."
  },
  {
    "titre": "Qu'est-ce que le 3ème groupe ?",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>🤔 Qu'est-ce que le 3ème groupe ?</h2>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p style='font-style: italic;'>Le <strong>3ème groupe</strong> comprend tous les verbes qui ne se terminent pas en <strong>-er</strong> (1er groupe) et qui n'ont pas le participe présent en <strong>-issant</strong> (2ème groupe).</p>\n  </div>\n  <h3 style='color: #f7971e;'>📌 Caractéristiques :</h3>\n  <ul style='list-style: none; padding: 0;'>\n    <li style='background: #d4edda; margin: 5px 0; padding: 10px; border-radius: 5px;'>🔸 Ils sont <strong>irréguliers</strong> : leur radical change souvent</li>\n    <li style='background: #d4edda; margin: 5px 0; padding: 10px; border-radius: 5px;'>🔸 Ils peuvent se terminer par <strong>-ir, -oir, -re</strong></li>\n    <li style='background: #d4edda; margin: 5px 0; padding: 10px; border-radius: 5px;'>🔸 Il faut les <strong>apprendre par cœur</strong></li>\n  </ul>\n  <div style='background-color: #cce5ff; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #007bff;'>\n    <p style='margin: 0;'>💡 Exemples : aller, venir, faire, dire, pouvoir, vouloir, prendre, etc.</p>\n  </div>\n</div>",
    "texteParle": "Qu'est-ce que le troisième groupe ? C'est le groupe des verbes irréguliers. Tous les verbes qui ne sont pas du premier groupe, c'est-à-dire qui ne se terminent pas en -er, et qui ne sont pas du deuxième groupe, c'est-à-dire qui n'ont pas le participe présent en -issant, appartiennent au troisième groupe. Ces verbes ont des terminaisons en -ir, -oir ou -re. Leur particularité est qu'ils sont irréguliers : leur radical change souvent selon les personnes et les temps. Il faut donc les apprendre par cœur.",
    "note": "Le verbe 'aller' est un verbe du 3ème groupe bien qu'il se termine en -er."
  },
  {
    "titre": "Les verbes du 3ème groupe les plus courants",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>📝 Les verbes du 3ème groupe les plus courants</h2>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>aller</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>venir</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>faire</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>dire</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>pouvoir</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>vouloir</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>prendre</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>mettre</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>savoir</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>voir</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>devoir</strong> (irrégulier)\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>recevoir</strong> (irrégulier)\n    </div>\n  </div>\n</div>",
    "texteParle": "Voici les verbes du troisième groupe les plus courants que vous devez connaître. Il y a 'aller', 'venir', 'faire', 'dire', 'pouvoir', 'vouloir', 'prendre', 'mettre', 'savoir', 'voir', 'devoir' et 'recevoir'. Tous ces verbes sont très utilisés dans la vie quotidienne. Ils sont irréguliers, ce qui signifie que leur conjugaison ne suit pas une règle fixe. Il est donc important de les apprendre progressivement, temps par temps.",
    "note": "Ces verbes sont parmi les plus utilisés en français."
  },
  {
    "titre": "Le présent de l'indicatif (rappel)",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ Le présent de l'indicatif</h2>\n  <p>Rappel des terminaisons du présent pour les verbes du 3ème groupe :</p>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Je</strong> -s, -x, -e\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Tu</strong> -s, -x, -es\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Il/Elle</strong> -t, -d, -e\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Nous</strong> -ons, -ions\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Vous</strong> -ez, -iez\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Ils/Elles</strong> -ent, -ient\n    </div>\n  </div>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 15px;'>\n    <p><strong>Exemple avec 'venir' :</strong></p>\n    <p>Je <strong>viens</strong>, tu <strong>viens</strong>, il <strong>vient</strong>, nous <strong>venons</strong>, vous <strong>venez</strong>, ils <strong>viennent</strong></p>\n  </div>\n</div>",
    "texteParle": "Commençons par un rappel du présent de l'indicatif pour les verbes du troisième groupe. Les terminaisons sont variées : pour je, on peut avoir -s, -x ou -e. Pour tu, -s, -x ou -es. Pour il, -t, -d ou -e. Pour nous, -ons ou -ions. Pour vous, -ez ou -iez. Et pour ils, -ent ou -ient. Prenons l'exemple de 'venir' : je viens, tu viens, il vient, nous venons, vous venez, ils viennent. Chaque verbe a ses propres particularités.",
    "note": "Au présent, la plupart des verbes du 3ème groupe ont un radical qui change."
  },
  {
    "titre": "L'imparfait de l'indicatif",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ L'imparfait de l'indicatif</h2>\n  <p>L'imparfait se forme sur le radical du <strong>nous</strong> du présent.</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Terminaisons :</strong> -ais, -ais, -ait, -ions, -iez, -aient</p>\n  </div>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px;'>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Exemple avec 'faire' :</strong><br>\n      Je faisais, tu faisais,<br> il faisait, nous faisions,<br> vous faisiez, ils faisaient\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Exemple avec 'prendre' :</strong><br>\n      Je prenais, tu prenais,<br> il prenait, nous prenions,<br> vous preniez, ils prenaient\n    </div>\n  </div>\n  <div style='background-color: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #ffc107;'>\n    <p style='margin: 0;'>⚠️ L'imparfait est un temps simple et régulier pour tous les verbes.</p>\n  </div>\n</div>",
    "texteParle": "L'imparfait de l'indicatif est un temps simple qui exprime une action passée qui dure ou qui est habituelle. Pour conjuguer un verbe du troisième groupe à l'imparfait, on prend le radical du nous au présent et on ajoute les terminaisons -ais, -ais, -ait, -ions, -iez, -aient. Par exemple, pour 'faire', on prend le radical de 'nous faisons' qui est 'fais', et on ajoute les terminaisons : je faisais, tu faisais, il faisait, nous faisions, vous faisiez, ils faisaient. C'est un temps régulier, donc une bonne nouvelle pour vous !",
    "note": "L'imparfait est le temps de la description et de l'habitude."
  },
  {
    "titre": "Le passé simple",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ Le passé simple</h2>\n  <p>Le passé simple exprime une action passée, courte et terminée.</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Terminaisons :</strong> -is, -is, -it, -îmes, -îtes, -irent</p>\n  </div>\n  <div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin-top: 10px;'>\n    <p><strong>Exemple avec 'dire' :</strong></p>\n    <p>Je <strong>dis</strong>, tu <strong>dis</strong>, il <strong>dit</strong>, nous <strong>dîmes</strong>, vous <strong>dîtes</strong>, ils <strong>dirent</strong></p>\n  </div>\n  <div style='background-color: #cce5ff; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #007bff;'>\n    <p style='margin: 0;'>📌 On utilise le passé simple dans les récits, les contes et les romans.</p>\n  </div>\n</div>",
    "texteParle": "Le passé simple est le temps du récit. Il exprime une action passée, courte et terminée. On le trouve dans les contes, les romans et les récits historiques. Pour les verbes du troisième groupe, les terminaisons du passé simple sont souvent -is, -is, -it, -îmes, -îtes, -irent. Par exemple, pour le verbe 'dire' : je dis, tu dis, il dit, nous dîmes, vous dîtes, ils dirent. Attention, le passé simple est un temps littéraire qu'on utilise surtout à l'écrit.",
    "note": "Le passé simple est rarement utilisé à l'oral, on lui préfère le passé composé."
  },
  {
    "titre": "Le futur simple",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ Le futur simple</h2>\n  <p>Le futur simple exprime une action future.</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Terminaisons :</strong> -rai, -ras, -ra, -rons, -rez, -ront</p>\n  </div>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px;'>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Exemple avec 'venir' :</strong><br>\n      Je viendrai, tu viendras,<br> il viendra, nous viendrons,<br> vous viendrez, ils viendront\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Exemple avec 'avoir' :</strong><br>\n      J'aurai, tu auras,<br> il aura, nous aurons,<br> vous aurez, ils auront\n    </div>\n  </div>\n  <div style='background-color: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #ffc107;'>\n    <p style='margin: 0;'>⚠️ Attention au changement de radical pour certains verbes.</p>\n  </div>\n</div>",
    "texteParle": "Le futur simple est un temps qui exprime une action à venir. Les terminaisons sont toujours les mêmes pour tous les verbes : -rai, -ras, -ra, -rons, -rez, -ront. Mais attention, pour les verbes du troisième groupe, le radical peut changer. Par exemple, pour 'venir', le radical au futur est 'viendr' : je viendrai, tu viendras, il viendra, nous viendrons, vous viendrez, ils viendront. Pour 'avoir', le radical devient 'aur' : j'aurai, tu auras, il aura, nous aurons, vous aurez, ils auront. Il faut apprendre ces radicaux par cœur.",
    "note": "Les terminaisons du futur simple sont les mêmes que celles du verbe 'avoir' au présent."
  },
  {
    "titre": "Le passé composé",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ Le passé composé</h2>\n  <p>Le passé composé est un temps composé qui exprime une action passée et terminée.</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Formation :</strong> auxiliaire <strong>avoir</strong> ou <strong>être</strong> au présent + participe passé du verbe</p>\n  </div>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px;'>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Exemple avec 'faire' (avoir) :</strong><br>\n      J'ai fait, tu as fait,<br> il a fait, nous avons fait,<br> vous avez fait, ils ont fait\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Exemple avec 'venir' (être) :</strong><br>\n      Je suis venu(e), tu es venu(e),<br> il est venu, elle est venue,<br> nous sommes venus(es), vous êtes venus(es), ils sont venus, elles sont venues\n    </div>\n  </div>\n  <div style='background-color: #cce5ff; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #007bff;'>\n    <p style='margin: 0;'>💡 Le participe passé s'accorde avec le sujet quand l'auxiliaire est 'être'.</p>\n  </div>\n</div>",
    "texteParle": "Le passé composé est un temps très utilisé à l'oral. Il se forme avec un auxiliaire, avoir ou être, conjugué au présent, suivi du participe passé du verbe. Par exemple, pour 'faire', l'auxiliaire est 'avoir' : j'ai fait, tu as fait, il a fait, nous avons fait, vous avez fait, ils ont fait. Pour 'venir', l'auxiliaire est 'être' : je suis venu, tu es venu, il est venu, nous sommes venus, vous êtes venus, ils sont venus. Quand on utilise l'auxiliaire 'être', le participe passé s'accorde en genre et en nombre avec le sujet.",
    "note": "La plupart des verbes du 3ème groupe se conjuguent avec 'avoir' au passé composé."
  },
  {
    "titre": "Le plus-que-parfait",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ Le plus-que-parfait</h2>\n  <p>Le plus-que-parfait exprime une action passée qui a eu lieu avant une autre action passée.</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Formation :</strong> auxiliaire <strong>avoir</strong> ou <strong>être</strong> à l'imparfait + participe passé du verbe</p>\n  </div>\n  <div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin-top: 10px;'>\n    <p><strong>Exemple avec 'prendre' (avoir) :</strong></p>\n    <p>J'<strong>avais pris</strong>, tu <strong>avais pris</strong>, il <strong>avait pris</strong>, nous <strong>avions pris</strong>, vous <strong>aviez pris</strong>, ils <strong>avaient pris</strong></p>\n  </div>\n  <div style='background-color: #cce5ff; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #007bff;'>\n    <p style='margin: 0;'>📌 Le plus-que-parfait sert à montrer l'antériorité dans le passé.</p>\n  </div>\n</div>",
    "texteParle": "Le plus-que-parfait est un temps composé qui exprime une action passée qui a eu lieu avant une autre action passée. Il se forme avec l'auxiliaire avoir ou être à l'imparfait suivi du participe passé du verbe. Par exemple, pour 'prendre', on utilise l'auxiliaire 'avoir' à l'imparfait : j'avais pris, tu avais pris, il avait pris, nous avions pris, vous aviez pris, ils avaient pris. Ce temps permet de montrer qu'une action est antérieure à une autre dans le passé.",
    "note": "Le plus-que-parfait est souvent utilisé avec le passé composé ou le passé simple."
  },
  {
    "titre": "Le futur antérieur",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>⏳ Le futur antérieur</h2>\n  <p>Le futur antérieur exprime une action future qui sera terminée avant une autre action future.</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Formation :</strong> auxiliaire <strong>avoir</strong> ou <strong>être</strong> au futur simple + participe passé du verbe</p>\n  </div>\n  <div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin-top: 10px;'>\n    <p><strong>Exemple avec 'faire' (avoir) :</strong></p>\n    <p>J'<strong>aurai fait</strong>, tu <strong>auras fait</strong>, il <strong>aura fait</strong>, nous <strong>aurons fait</strong>, vous <strong>aurez fait</strong>, ils <strong>auront fait</strong></p>\n  </div>\n  <div style='background-color: #cce5ff; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #007bff;'>\n    <p style='margin: 0;'>📌 Le futur antérieur montre l'antériorité dans le futur.</p>\n  </div>\n</div>",
    "texteParle": "Le futur antérieur est un temps composé qui exprime une action future qui sera terminée avant une autre action future. Il se forme avec l'auxiliaire avoir ou être au futur simple suivi du participe passé du verbe. Par exemple, pour 'faire', on utilise l'auxiliaire 'avoir' au futur simple : j'aurai fait, tu auras fait, il aura fait, nous aurons fait, vous aurez fait, ils auront fait. Ce temps est utile pour montrer l'ordre des actions dans le futur.",
    "note": "Le futur antérieur est souvent utilisé avec 'quand', 'lorsque' ou 'dès que'."
  },
  {
    "titre": "Les verbes en -ir du 3ème groupe",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>📝 Les verbes en -ir du 3ème groupe</h2>\n  <p>Attention : tous les verbes en -ir ne sont pas du 2ème groupe !</p>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 15px 0;'>\n    <p><strong>Comment les reconnaître ?</strong></p>\n    <ul>\n      <li>Leur participe présent ne se termine pas en <strong>-issant</strong></li>\n      <li>Exemples : <strong>venir, dormir, partir, sortir, servir, mentir</strong></li>\n    </ul>\n  </div>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px;'>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Dormir (présent) :</strong><br>\n      je dors, tu dors,<br> il dort, nous dormons,<br> vous dormez, ils dorment\n    </div>\n    <div style='background: #d4edda; padding: 10px; border-radius: 5px;'>\n      <strong>Partir (présent) :</strong><br>\n      je pars, tu pars,<br> il part, nous partons,<br> vous partez, ils partent\n    </div>\n  </div>\n  <div style='background-color: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #ffc107;'>\n    <p style='margin: 0;'>⚠️ Ces verbes ont souvent un changement de radical au pluriel.</p>\n  </div>\n</div>",
    "texteParle": "Il faut faire attention : tous les verbes qui se terminent en -ir ne sont pas du deuxième groupe. Certains verbes en -ir appartiennent au troisième groupe. On les reconnaît parce que leur participe présent ne se termine pas en -issant. Par exemple, 'venir', 'dormir', 'partir', 'sortir', 'servir' et 'mentir' sont des verbes du troisième groupe. Au présent, ils ont souvent un changement de radical entre le singulier et le pluriel. Par exemple, 'je dors' mais 'nous dormons'. Il faut bien les apprendre.",
    "note": "Les verbes en -ir du 3ème groupe sont souvent des verbes de mouvement."
  },
  {
    "titre": "Les verbes en -oir et -re",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>📝 Les verbes en -oir et -re</h2>\n  <p>Tous les verbes se terminant par <strong>-oir</strong> et <strong>-re</strong> sont du 3ème groupe.</p>\n  <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>Verbes en -oir :</strong><br>\n      avoir, voir, devoir,<br> pouvoir, vouloir, savoir\n    </div>\n    <div style='background: #d1ecf1; padding: 10px; border-radius: 5px;'>\n      <strong>Verbes en -re :</strong><br>\n      prendre, mettre,<br> dire, faire (en -ire),<br> écrire, lire, rire\n    </div>\n  </div>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 15px;'>\n    <p><strong>Conjugaison de 'pouvoir' au présent :</strong></p>\n    <p>je <strong>peux</strong>, tu <strong>peux</strong>, il <strong>peut</strong>, nous <strong>pouvons</strong>, vous <strong>pouvez</strong>, ils <strong>peuvent</strong></p>\n  </div>\n</div>",
    "texteParle": "Tous les verbes qui se terminent par -oir et par -re appartiennent au troisième groupe. Parmi les verbes en -oir, on trouve 'avoir', 'voir', 'devoir', 'pouvoir', 'vouloir' et 'savoir'. Parmi les verbes en -re, on trouve 'prendre', 'mettre', 'dire' et 'faire' qui se termine en -ire, ainsi que 'écrire', 'lire' et 'rire'. Ces verbes ont des conjugaisons très particulières. Par exemple, 'pouvoir' au présent donne : je peux, tu peux, il peut, nous pouvons, vous pouvez, ils peuvent. Il faut les apprendre par cœur.",
    "note": "Les verbes en -oir et -re sont très irréguliers."
  },
  {
    "titre": "Astuces pour retenir les conjugaisons",
    "contenu": "<div style='background-color: #f8f9fa; padding: 20px; border-radius: 10px; color: #212529;'>\n  <h2 style='color: #e44d26;'>💡 Astuces pour bien retenir</h2>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 10px 0;'>\n    <p><strong>1. Apprendre par groupes</strong></p>\n    <p>Regrouper les verbes qui ont la même conjugaison (ex: partir, sortir, dormir).</p>\n  </div>\n  <div style='background-color: #e9ecef; padding: 15px; border-radius: 8px; margin: 10px 0;'>\n    <p><strong>2. Faire des tableaux</strong></p>\n    <p>Écrire les conjugaisons dans des tableaux pour mieux visualiser.</p>\n  </div>\n  <div style=';
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
