<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation à la Citoyenneté",
  "classe": "Classe de Sixième",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Les droits et les devoirs des membres d'une famille",
      "points": "3 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>La famille est le premier lieu d'éducation et de socialisation de l'enfant. Elle est régie par des droits et des devoirs qui incombent à chaque membre.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Définir la famille nucléaire et la famille élargie. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Famille nucléaire :</strong> Elle est composée des parents et de leurs enfants (on parle souvent de la famille de base).</li><li><strong>Famille élargie :</strong> Elle inclut, en plus de la famille nucléaire, les grands-parents, les oncles, les tantes, les cousins, etc.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Citer deux droits et deux devoirs des enfants au sein de la famille. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Deux droits :</strong> Droit à l'éducation et droit à la protection et aux soins de santé.</li><li><strong>Deux devoirs :</strong> Devoir de respect envers les parents et devoir d'obéissance et de contribution aux tâches ménagères selon ses moyens.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Expliquer brièvement l'importance de la solidarité familiale. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>La solidarité familiale est importante car elle permet aux membres de se soutenir mutuellement dans les moments difficiles (maladie, deuil, difficultés financières). Elle renforce les liens affectifs et contribue à l'équilibre et au bien-être de chacun.</p></div>"
        }
      ]
    },
    {
      "titre": "L'état civil et le mariage",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>L'état civil et le mariage sont des institutions importantes qui jalonnent la vie des citoyens et structurent la société.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Définir l'état civil. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>L'état civil est l'ensemble des actes officiels qui enregistrent les événements majeurs de la vie d'une personne : sa naissance, son mariage, son décès, etc. Il permet de prouver l'identité et la situation familiale de chaque citoyen.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Citer les trois principaux actes d'état civil et donner l'utilité de chacun. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>L'acte de naissance :</strong> Il prouve l'identité et la filiation d'une personne.</li><li><strong>L'acte de mariage :</strong> Il prouve l'union légale de deux personnes.</li><li><strong>L'acte de décès :</strong> Il prouve le décès d'une personne.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Distinguer le mariage civil, le mariage religieux et le mariage traditionnel. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Le mariage civil :</strong> Célébré à la mairie par un officier d'état civil, il est reconnu par la loi.</li><li><strong>Le mariage religieux :</strong> Célébré dans un lieu de culte (église, mosquée, temple) par un ministre du culte, il a une portée spirituelle et religieuse.</li><li><strong>Le mariage traditionnel :</strong> Célébré selon les coutumes et les rites d'une ethnie, il est parfois la première étape avant les autres formes de mariage.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Les conflits à l'école et entre frères et sœurs",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; background-color: #f0f7ff; padding: 15px; border-radius: 8px; color: #000;'>Dans la cour de récréation, Koffi et Fatou se disputent pour une balle. Koffi dit qu'il l'a trouvée le premier, Fatou prétend qu'elle est à elle. La dispute s'envenime et finit par une bousculade.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Qu'est-ce qu'un conflit ? <span style='color: #888;'>(0,5 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Un conflit est une situation de désaccord, d'opposition ou de tension entre deux ou plusieurs personnes, portant sur des intérêts, des valeurs ou des idées divergentes.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Identifier deux causes de conflits entre frères et sœurs ou entre camarades à l'école. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li>La jalousie ou la rivalité (pour l'attention des parents, pour un jouet, etc.).</li><li>Le partage des biens ou des espaces.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Expliquer les conséquences possibles de ce type de conflit sur l'ambiance de la classe ou de la famille. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Les conflits non résolus peuvent créer un climat de tension, de méfiance et d'insécurité. Ils peuvent nuire à l'harmonie, dégrader les relations entre les personnes et, dans un cadre scolaire, perturber les apprentissages.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4)</strong> Proposer deux solutions pacifiques pour résoudre ce conflit entre Koffi et Fatou. <span style='color: #888;'>(1,5 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Solution 1 :</strong> La médiation par un tiers (un enseignant, un surveillant, un parent) pour écouter chacun et les aider à trouver un accord.</li><li><strong>Solution 2 :</strong> Le dialogue : s'asseoir, exprimer calmement ce qu'on ressent et chercher un compromis (par exemple, jouer à tour de rôle avec la balle).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5)</strong> Expliquer le rôle des acteurs de l'école (éducateurs, délégués) dans la gestion des conflits. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Ces acteurs ont pour rôle de prévenir les conflits (par la sensibilisation au respect et à la tolérance), de les détecter, d'écouter les parties et de les aider à trouver une solution juste, ou d'appliquer les sanctions prévues par le règlement intérieur.</p></div>"
        }
      ]
    },
    {
      "titre": "Les atteintes à la personne humaine et la délinquance juvénile",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>La protection des droits de l'enfant est un enjeu majeur pour l'avenir de la société. Il est essentiel de connaître les dangers qui menacent les enfants et les moyens de les en protéger.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1)</strong> Définir la notion de droits fondamentaux de l'homme. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>Les droits fondamentaux sont des droits inaliénables, universels et essentiels à la dignité humaine. Il s'agit, par exemple, du droit à la vie, à la liberté, à la sécurité et à l'éducation.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2)</strong> Citer deux grandes déclarations ou conventions internationales qui protègent les droits des enfants. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li>La Convention internationale des droits de l'enfant (CIDE) des Nations Unies (1989).</li><li>La Déclaration universelle des droits de l'homme (1948).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3)</strong> Identifier deux formes d'exploitation ou d'abus sur les enfants au Cameroun. <span style='color: #888;'>(1 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li>Le travail des enfants (enfants domestiques, dans les mines, etc.).</li><li>Les abus sexuels et les violences physiques.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4)</strong> Définir la délinquance juvénile. <span style='color: #888;'>(0,5 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><p style='margin: 0;'>La délinquance juvénile désigne l'ensemble des actes délictueux ou criminels commis par des mineurs (de moins de 18 ans).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5)</strong> Citer deux causes de la délinquance juvénile. <span style='color: #888;'>(0,5 pt)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li>La pauvreté ou la grande précarité financière au sein du foyer.</li><li>L'absence d'encadrement ou de figure parentale (négligence, abandon).</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>6)</strong> Proposer deux solutions pour prévenir la délinquance juvénile et aider à la réinsertion des jeunes délinquants. <span style='color: #888;'>(2 pts)</span></div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 4px solid #0d6efd;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Prévention :</strong> Mettre en place des programmes d'éducation et de sensibilisation, offrir des activités sportives et culturelles pour occuper les jeunes, lutter contre l'échec scolaire.</li><li><strong>Réinsertion :</strong> Proposer une prise en charge psychologique et éducative, une formation professionnelle et un accompagnement social pour leur permettre de retrouver une place dans la société.</li></ul></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
