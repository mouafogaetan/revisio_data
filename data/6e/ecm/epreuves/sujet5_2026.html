<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation à la Citoyenneté",
  "classe": "Sixième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Définition des concepts fondamentaux (4 points)",
      "points": "4 pts",
      "enonce": "<p>Cet exercice porte sur la maîtrise des notions clés abordées durant la séquence.</p>",
      "questions": [
        {
          "question": "1) Définis la notion de <strong>divorce</strong>. (1 pt)",
          "reponse": "Le divorce est la rupture légale du mariage entre deux époux, prononcée par un tribunal."
        },
        {
          "question": "2) Qu'est-ce que la <strong>succession</strong> ? (1 pt)",
          "reponse": "La succession est l'ensemble des opérations par lesquelles les biens d'une personne décédée sont transmis à ses héritiers."
        },
        {
          "question": "3) Distingue la <strong>famille nucléaire</strong> de la <strong>famille élargie</strong>. (2 pts)",
          "reponse": "La famille nucléaire est composée des parents et de leurs enfants vivant sous le même toit. La famille élargie inclut, en plus des parents et enfants, d'autres membres comme les grands-parents, les oncles, les tantes, etc."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les conflits et leur résolution (5 points)",
      "points": "5 pts",
      "enonce": "<p><strong>Document :</strong> « Dans un quartier, une famille est déchirée par un conflit de succession depuis la mort de son patriarche. Les frères et sœurs ne se parlent plus et le climat est devenu très tendu. »</p>",
      "questions": [
        {
          "question": "1) D'après toi, qu'est-ce qui peut être à l'origine d'un conflit de succession ? (1,5 pt)",
          "reponse": "Un conflit de succession peut être causé par le partage inéquitable des biens, l'absence de testament, l'ignorance des lois successorales ou encore la jalousie entre héritiers."
        },
        {
          "question": "2) Cite deux conséquences de ce conflit sur la famille. (1,5 pt)",
          "reponse": "1) La rupture des liens familiaux et la perte de cohésion. 2) Des tensions et des disputes qui peuvent mener à des procès longs et coûteux."
        },
        {
          "question": "3) Propose deux solutions pour résoudre pacifiquement ce conflit. (2 pts)",
          "reponse": "1) Organiser une réunion de famille (conseil de famille) avec un médiateur pour discuter du partage. 2) Faire appel à un notaire pour une répartition équitable et légale des biens."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les droits et les devoirs des enfants (4 points)",
      "points": "4 pts",
      "enonce": "<p>Dans une famille, les parents accordent beaucoup d'importance à l'éducation de leurs enfants.</p>",
      "questions": [
        {
          "question": "1) Cite deux droits fondamentaux de l'enfant. (1 pt)",
          "reponse": "1) Le droit à l'éducation. 2) Le droit à la protection contre toutes les formes de violence."
        },
        {
          "question": "2) Cite deux devoirs des enfants envers leurs parents. (1 pt)",
          "reponse": "1) Le devoir de respect. 2) Le devoir d'obéissance."
        },
        {
          "question": "3) Explique pourquoi il est important que les enfants respectent leurs devoirs. (2 pts)",
          "reponse": "Il est important car le respect des devoirs permet de maintenir l'harmonie au sein de la famille. Cela prépare aussi les enfants à devenir des adultes responsables et respectueux des règles de la société."
        }
      ]
    },
    {
      "titre": "Exercice 4 : La sécurité routière (4 points)",
      "points": "4 pts",
      "enonce": "<p>La route est un espace partagé par plusieurs usagers. Pour assurer la sécurité de tous, des règles doivent être respectées.</p>",
      "questions": [
        {
          "question": "1) Cite trois usagers de la route. (1,5 pt)",
          "reponse": "1) Les piétons. 2) Les cyclistes. 3) Les conducteurs de véhicules (motos, voitures, camions)."
        },
        {
          "question": "2) Quels sont les dangers d'une conduite en excès de vitesse ? (1,5 pt)",
          "reponse": "L'excès de vitesse réduit le temps de réaction du conducteur, augmente la distance de freinage et rend les accidents plus graves, provoquant souvent des blessures graves ou des décès."
        },
        {
          "question": "3) Que dois-tu faire avant de traverser une route ? (1 pt)",
          "reponse": "Je dois regarder à gauche, puis à droite, puis à nouveau à gauche pour m'assurer qu'aucun véhicule n'approche, et traverser uniquement lorsque la voie est libre, de préférence sur un passage piéton."
        }
      ]
    },
    {
      "titre": "Exercice 5 : La délinquance juvénile et ses causes (5 points)",
      "points": "5 pts",
      "enonce": "<p><strong>Document :</strong> « Un adolescent de 15 ans est arrêté par la police pour avoir volé un téléphone portable. Il explique qu'il a agi par pression de ses amis et pour avoir de l'argent car ses parents sont en difficulté financière. »</p>",
      "questions": [
        {
          "question": "1) Définis la <strong>délinquance juvénile</strong>. (1 pt)",
          "reponse": "La délinquance juvénile désigne l'ensemble des infractions et des comportements délictueux commis par des mineurs."
        },
        {
          "question": "2) D'après le document, quelles sont les causes de la délinquance de cet adolescent ? (2 pts)",
          "reponse": "1) La pression des mauvaises fréquentations (ses amis). 2) La pauvreté et les difficultés financières de sa famille."
        },
        {
          "question": "3) Quelles mesures pourraient être prises pour aider ce jeune à se réinsérer ? (2 pts)",
          "reponse": "1) Un suivi éducatif et psychologique par un travailleur social. 2) L'orientation vers une formation professionnelle pour lui offrir une alternative honnête. 3) Un accompagnement de sa famille par des services sociaux."
        }
      ]
    },
    {
      "titre": "Exercice 6 : Les formes d'abus et d'exploitation des enfants (4 points)",
      "points": "4 pts",
      "enonce": "<p>Certains enfants dans le monde sont victimes d'exploitation et de violations de leurs droits fondamentaux.</p>",
      "questions": [
        {
          "question": "1) Qu'est-ce que le <strong>travail des enfants</strong> ? (1 pt)",
          "reponse": "Le travail des enfants est le fait d'employer des enfants à des tâches qui les privent de leur enfance, de leur éducation et qui nuisent à leur développement physique et mental."
        },
        {
          "question": "2) Identifie deux autres formes d'abus ou d'exploitation des enfants. (1,5 pt)",
          "reponse": "1) La traite des êtres humains (trafic d'enfants). 2) Les violences physiques ou psychologiques."
        },
        {
          "question": "3) Pourquoi est-il important de dénoncer ces abus ? (1,5 pt)",
          "reponse": "Il est important de les dénoncer pour protéger les enfants, mettre fin à leurs souffrances, et permettre aux autorités de punir les auteurs et de mettre en place des mesures de prévention."
        }
      ]
    },
    {
      "titre": "Exercice 7 : Étude de cas sur les droits humains (4 points)",
      "points": "4 pts",
      "enonce": "<p><strong>Texte :</strong> « Selon la Déclaration Universelle des Droits de l'Homme, tout être humain naît libre et égal en dignité et en droits. Ces droits sont indivisibles et doivent être respectés partout dans le monde. »</p>",
      "questions": [
        {
          "question": "1) À quelle date la Déclaration Universelle des Droits de l'Homme a-t-elle été adoptée ? (0,5 pt)",
          "reponse": "Elle a été adoptée en 1948."
        },
        {
          "question": "2) Cite deux droits fondamentaux mentionnés dans ce texte. (1 pt)",
          "reponse": "1) Le droit à la liberté. 2) Le droit à l'égalité en dignité."
        },
        {
          "question": "3) Selon toi, pourquoi ces droits doivent-ils être respectés ? (2,5 pts)",
          "reponse": "Ces droits doivent être respectés car ils garantissent à chaque personne une vie digne, protègent les individus contre les abus et les injustices, et sont la base d'une société paisible, juste et harmonieuse."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
