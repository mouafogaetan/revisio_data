<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "PCT (Physique-Chimie-Technologie)",
  "classe": "Troisième",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Classification périodique et masses molaires",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>On donne les éléments suivants : Oxygène (O), Hydrogène (H), Carbone (C), Azote (N).<br><br><strong>1)</strong> Donner le numéro atomique (Z) et la masse molaire atomique de chacun de ces éléments.<br><br><strong>2)</strong> Calculer la masse molaire moléculaire des composés suivants :<br>a) <span class='math-inline'>\\( H_2O \\)</span> (eau)<br>b) <span class='math-inline'>\\( CO_2 \\)</span> (dioxyde de carbone)<br>c) <span class='math-inline'>\\( NH_3 \\)</span> (ammoniac)</div>",
      "questions": [
        {
          "question": "1) Donner le numéro atomique (Z) et la masse molaire atomique de l'Oxygène (O), de l'Hydrogène (H), du Carbone (C) et de l'Azote (N).",
          "reponse": "Oxygène (O) : Z = 8, M = 16 g/mol<br>Hydrogène (H) : Z = 1, M = 1 g/mol<br>Carbone (C) : Z = 6, M = 12 g/mol<br>Azote (N) : Z = 7, M = 14 g/mol"
        },
        {
          "question": "2) Calculer la masse molaire moléculaire de H₂O (eau).",
          "reponse": "M(H₂O) = 2 × M(H) + M(O) = 2 × 1 + 16 = 18 g/mol"
        },
        {
          "question": "3) Calculer la masse molaire moléculaire de CO₂ (dioxyde de carbone).",
          "reponse": "M(CO₂) = M(C) + 2 × M(O) = 12 + 2 × 16 = 44 g/mol"
        },
        {
          "question": "4) Calculer la masse molaire moléculaire de NH₃ (ammoniac).",
          "reponse": "M(NH₃) = M(N) + 3 × M(H) = 14 + 3 × 1 = 17 g/mol"
        }
      ]
    },
    {
      "titre": "Exercice 2 : La mole et la constante d'Avogadro",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>On donne la constante d'Avogadro : <span class='math-inline'>\\( N_A = 6,02 \\times 10^{23} \\)</span> mol⁻¹.<br><br><strong>1)</strong> Définir la mole et la constante d'Avogadro.<br><br><strong>2)</strong> Calculer le nombre d'atomes contenus dans 0,5 mole de carbone (C).<br><br><strong>3)</strong> Calculer la quantité de matière (en moles) correspondant à <span class='math-inline'>\\( 1,204 \\times 10^{24} \\)</span> atomes d'hydrogène.</div>",
      "questions": [
        {
          "question": "1) Définir la mole et la constante d'Avogadro.",
          "reponse": "La mole est l'unité de quantité de matière. Une mole d'entités (atomes, molécules, ions) contient un nombre fixe de ces entités, appelé constante d'Avogadro (N_A = 6,02 × 10²³ mol⁻¹)."
        },
        {
          "question": "2) Calculer le nombre d'atomes contenus dans 0,5 mole de carbone (C).",
          "reponse": "N = n × N_A = 0,5 × 6,02 × 10²³ = 3,01 × 10²³ atomes de carbone."
        },
        {
          "question": "3) Calculer la quantité de matière (en moles) correspondant à 1,204 × 10²⁴ atomes d'hydrogène.",
          "reponse": "n = N / N_A = 1,204 × 10²⁴ / 6,02 × 10²³ = 2 moles d'atomes d'hydrogène."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Masse et quantité de matière",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>On donne la masse molaire du fer : M(Fe) = 56 g/mol.<br><br><strong>1)</strong> Calculer la quantité de matière contenue dans un échantillon de fer de masse 112 g.<br><br><strong>2)</strong> Calculer la masse d'un échantillon de fer contenant 0,25 mole de fer.</div>",
      "questions": [
        {
          "question": "1) Calculer la quantité de matière contenue dans un échantillon de fer de masse 112 g.",
          "reponse": "n = m / M = 112 / 56 = 2 mol de fer."
        },
        {
          "question": "2) Calculer la masse d'un échantillon de fer contenant 0,25 mole de fer.",
          "reponse": "m = n × M = 0,25 × 56 = 14 g de fer."
        }
      ]
    },
    {
      "titre": "Exercice 4 : Équations-bilans et conservation de la matière",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>On considère la combustion complète du méthane (<span class='math-inline'>\\( CH_4 \\)</span>) dans le dioxygène (<span class='math-inline'>\\( O_2 \\)</span>).<br><br><strong>1)</strong> Donner les réactifs et les produits de cette réaction.<br><br><strong>2)</strong> Écrire et équilibrer l'équation-bilan de cette combustion.<br><br><strong>3)</strong> Énoncer la loi de Lavoisier (conservation de la matière).</div>",
      "questions": [
        {
          "question": "1) Donner les réactifs et les produits de la combustion du méthane.",
          "reponse": "Réactifs : le méthane (CH₄) et le dioxygène (O₂).<br>Produits : le dioxyde de carbone (CO₂) et l'eau (H₂O)."
        },
        {
          "question": "2) Écrire et équilibrer l'équation-bilan de la combustion du méthane.",
          "reponse": "CH₄ + 2 O₂ → CO₂ + 2 H₂O"
        },
        {
          "question": "3) Énoncer la loi de Lavoisier (conservation de la matière).",
          "reponse": "Loi de Lavoisier (ou loi de conservation de la masse) : Au cours d'une réaction chimique, la masse totale des réactifs est égale à la masse totale des produits. Les atomes se conservent, ils sont réarrangés."
        }
      ]
    },
    {
      "titre": "Exercice 5 : Électrolyse et synthèse de l'eau",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'><strong>1)</strong> Définir l'électrolyse de l'eau.<br><br><strong>2)</strong> Quels sont les gaz produits lors de l'électrolyse de l'eau ? Donner leurs noms, leurs formules chimiques et le test d'identification de chacun.<br><br><strong>3)</strong> Quelle est la relation entre les volumes des gaz produits ?</div>",
      "questions": [
        {
          "question": "1) Définir l'électrolyse de l'eau.",
          "reponse": "L'électrolyse de l'eau est une décomposition de l'eau en ses éléments constitutifs (dihydrogène et dioxygène) sous l'effet du courant électrique."
        },
        {
          "question": "2) Quels sont les gaz produits lors de l'électrolyse de l'eau ? Donner leurs noms, leurs formules chimiques et le test d'identification de chacun.",
          "reponse": "Le dihydrogène (H₂) se dégage à la cathode. Test : une détonation en présence d'une flamme.<br>Le dioxygène (O₂) se dégage à l'anode. Test : il ravive une flamme."
        },
        {
          "question": "3) Quelle est la relation entre les volumes des gaz produits ?",
          "reponse": "Le volume de dihydrogène est le double du volume de dioxygène. V(H₂) = 2 × V(O₂)."
        }
      ]
    },
    {
      "titre": "Exercice 6 : Solutions aqueuses et concentration molaire",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>On dissout 40 g d'hydroxyde de sodium (NaOH) dans 0,5 L d'eau. On donne M(NaOH) = 40 g/mol.<br><br><strong>1)</strong> Définir une solution aqueuse.<br><br><strong>2)</strong> Calculer la concentration molaire de la solution.<br><br><strong>3)</strong> Calculer la concentration massique de la solution.<br><br><strong>4)</strong> Quelle relation existe-t-il entre la concentration molaire et la concentration massique ?</div>",
      "questions": [
        {
          "question": "1) Définir une solution aqueuse.",
          "reponse": "Une solution aqueuse est une solution dont le solvant est l'eau."
        },
        {
          "question": "2) Calculer la concentration molaire de la solution.",
          "reponse": "n(NaOH) = m / M = 40 / 40 = 1 mol.<br>C = n / V = 1 / 0,5 = 2 mol/L."
        },
        {
          "question": "3) Calculer la concentration massique de la solution.",
          "reponse": "Cm = m / V = 40 / 0,5 = 80 g/L."
        },
        {
          "question": "4) Quelle relation existe-t-il entre la concentration molaire et la concentration massique ?",
          "reponse": "La relation est : Cm = C × M (où M est la masse molaire du soluté)."
        }
      ]
    },
    {
      "titre": "Exercice 7 : pH des solutions aqueuses",
      "points": "3 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Le pH de trois solutions A, B et C a été mesuré : pH(A) = 3, pH(B) = 7, pH(C) = 11.<br><br><strong>1)</strong> Classer ces solutions par ordre croissant d'acidité.<br><br><strong>2)</strong> Quelles sont les solutions acide, neutre et basique ?<br><br><strong>3)</strong> Indiquer la couleur approximative du BBT (Bleu de Bromothymol) dans chaque solution.</div>",
      "questions": [
        {
          "question": "1) Classer ces solutions par ordre croissant d'acidité.",
          "reponse": "La solution la plus acide est celle qui a le pH le plus faible. Ordre croissant d'acidité : C (pH=11) < B (pH=7) < A (pH=3)."
        },
        {
          "question": "2) Quelles sont les solutions acide, neutre et basique ?",
          "reponse": "A (pH=3) est acide. B (pH=7) est neutre. C (pH=11) est basique."
        },
        {
          "question": "3) Indiquer la couleur approximative du BBT dans chaque solution.",
          "reponse": "Le Bleu de Bromothymol (BBT) est jaune en milieu acide (solution A), vert en milieu neutre (solution B), et bleu en milieu basique (solution C)."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
