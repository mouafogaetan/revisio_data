<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "PCT (Physique-Chimie-Technologie)",
 "classe": "Troisième",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Classification périodique et mole",
     "points": "3 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Définir la classification périodique des éléments. <br> 2) Donner le symbole et le numéro atomique de l'oxygène. <br> 3) En utilisant la classification périodique, identifier l'élément qui possède un numéro atomique Z = 20.</div>",
     "questions": [
       {
         "question": "1) Définir la classification périodique des éléments.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> La classification périodique des éléments est un tableau qui regroupe les éléments chimiques par numéro atomique croissant et par propriétés chimiques similaires. Elle permet d'identifier un élément à partir de son symbole, de son numéro atomique Z et de sa masse molaire.</div>"
       },
       {
         "question": "2) Donner le symbole et le numéro atomique de l'oxygène.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> L'oxygène a pour symbole O et son numéro atomique Z est 8.</div>"
       },
       {
         "question": "3) Identifier l'élément de numéro atomique Z = 20.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> L'élément de numéro atomique Z = 20 est le calcium (Ca).</div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Électrolyse et synthèse de l'eau",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Définir l'électrolyse de l'eau. <br> 2) Identifier les gaz produits lors de l'électrolyse de l'eau, en indiquant à quelle électrode ils se forment. <br> 3) Donner les tests permettant d'identifier le dihydrogène et le dioxygène.</div>",
     "questions": [
       {
         "question": "1) Définir l'électrolyse de l'eau.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> L'électrolyse de l'eau est une réaction de décomposition de l'eau en dihydrogène et en dioxygène sous l'effet d'un courant électrique.</div>"
       },
       {
         "question": "2) Identifier les gaz produits et les électrodes correspondantes.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> À la cathode (pôle négatif), il se produit du dihydrogène (H₂). À l'anode (pôle positif), il se produit du dioxygène (O₂). Le volume de dihydrogène est le double du volume de dioxygène.</div>"
       },
       {
         "question": "3) Donner les tests d'identification des gaz.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Le dioxygène ravive une flamme mourante. Le dihydrogène produit une détonation caractéristique en présence d'une flamme (il est explosif).</div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Solutions aqueuses et concentration molaire",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Définir une solution aqueuse. <br> 2) Donner l'équation de dissolution du chlorure de sodium (NaCl) dans l'eau. <br> 3) On dissout 0,2 mol de chlorure de sodium dans 0,5 L d'eau. Calculer la concentration molaire de la solution obtenue.</div>",
     "questions": [
       {
         "question": "1) Définir une solution aqueuse.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Une solution aqueuse est une solution dont le solvant est l'eau. Le soluté est la substance dissoute, généralement un solide ionique ou une molécule.</div>"
       },
       {
         "question": "2) Écrire l'équation de dissolution de NaCl dans l'eau.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> NaCl(s) → Na⁺(aq) + Cl⁻(aq) <br> Le chlorure de sodium se dissocie en ions sodium (Na⁺) et ions chlorure (Cl⁻).</div>"
       },
       {
         "question": "3) Calculer la concentration molaire de la solution.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> C = n/V = 0,2/0,5 = 0,4 mol/L. <br> La concentration molaire est de 0,4 mol/L.</div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Machines simples",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Définir une machine simple. <br> 2) Donner le principe de fonctionnement d'une poulie simple. <br> 3) Un treuil a un tambour de rayon r = 10 cm et une manivelle de longueur L = 50 cm. <br> a) Déterminer l'intensité de la force F qu'il faut exercer à la manivelle pour soulever une charge de poids P = 500 N. <br> b) Comment évolue cette force si la longueur de la manivelle augmente ?</div>",
     "questions": [
       {
         "question": "1) Définir une machine simple.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Une machine simple est un dispositif mécanique permettant de réduire l'effort physique nécessaire pour effectuer un travail, en utilisant le principe des leviers, des poulies ou des plans inclinés.</div>"
       },
       {
         "question": "2) Donner le principe de fonctionnement d'une poulie simple.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Une poulie simple est une roue qui tourne autour d'un axe. Elle permet de changer la direction de l'effort. Pour une poulie fixe, la force F exercée est égale au poids P de la charge (F = P). Une poulie mobile permet de diviser l'effort par 2.</div>"
       },
       {
         "question": "3a) Calculer la force F à exercer sur la manivelle.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> On utilise la relation : F × L = P × r <br> F × 50 = 500 × 10 <br> F = 5000/50 = 100 N. <br> La force à exercer est de 100 N.</div>"
       },
       {
         "question": "3b) Comment évolue la force si la longueur de la manivelle augmente ?",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Si la longueur de la manivelle augmente, la force nécessaire diminue proportionnellement. C'est le principe du bras de levier.</div>"
       }
     ]
   },
   {
     "titre": "Exercice 5 : Production du courant alternatif et tensions alternatives",
     "points": "5 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Citer les principales sources de production d'électricité au Cameroun. <br> 2) Décrire brièvement le principe de fonctionnement d'un alternateur. <br> 3) Une tension alternative sinusoïdale a une période T = 20 ms. <br> a) Calculer sa fréquence. <br> b) Calculer la tension maximale Umax si la tension efficace Ueff = 220 V.</div>",
     "questions": [
       {
         "question": "1) Citer les principales sources de production d'électricité au Cameroun.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Les principales sources sont : <br> - Hydroélectriques : barrages de Song Loulou, Lagdo, Edéa. <br> - Thermiques : centrales de Kribi, Dibamba, Limbé. <br> D'autres sources comme le solaire et l'éolien se développent.</div>"
       },
       {
         "question": "2) Décrire le principe de fonctionnement d'un alternateur.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Un alternateur est constitué d'un stator (partie fixe) et d'un rotor (partie mobile). La rotation du rotor devant le stator produit une tension électrique alternative grâce au phénomène d'induction électromagnétique.</div>"
       },
       {
         "question": "3a) Calculer la fréquence F de la tension alternative.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> F = 1/T = 1/(20×10⁻³) = 50 Hz.</div>"
       },
       {
         "question": "3b) Calculer la tension maximale Umax.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Umax = Ueff × √2 = 220 × 1,414 = 311,08 V.</div>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
