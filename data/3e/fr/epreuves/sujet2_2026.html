<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Troisième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Lecture et analyse d'un texte autobiographique",
      "points": "8 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'><b>Texte :</b><br><br><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'>\n<i>J'ai donc passé une enfance heureuse, au milieu de gens qui m'aimaient, dans un monde que j'aimais. Le monde des livres, des images, des mots. Mais le monde réel, celui de la guerre, de la peur, de la faim, était là aussi, juste derrière la porte. Je me souviens d'un après-midi d'été où je jouais dans le jardin, lorsque ma mère est sortie précipitamment de la maison. Son visage était pâle, ses mains tremblaient. Elle a appelé mon père d'une voix étranglée. Ils ont parlé à voix basse, et j'ai compris qu'un drame venait de se produire. Le fils de nos voisins, un jeune homme de vingt ans, venait d'être tué sur le front. Ce jour-là, l'enfance s'est arrêtée. J'ai découvert que le bonheur était fragile, que la guerre pouvait frapper n'importe où, n'importe quand. Je n'ai pas pleuré immédiatement ; j'ai ressenti une sorte de vide immense, une prise de conscience brutale. Les jeux ont perdu leur sens, les rires se sont tus. La vie, soudain, m'a paru bien sérieuse.</i>\n</div><br><br><b>Consigne :</b> Lisez attentivement le texte ci-dessus et répondez aux questions suivantes. Justifiez vos réponses en vous appuyant sur le texte et sur vos connaissances.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><b>1. Identification du genre littéraire (2 pts)</b><br>a) À quel genre littéraire appartient ce texte ? Justifiez votre réponse en relevant deux indices.<br>b) Qui est le narrateur ? Quelle est la particularité de ce type de récit ?</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><b>a)</b> Ce texte est un <b>récit autobiographique</b>. En effet :<br>- Le narrateur utilise la première personne du singulier (« je », « m'aimaient », « jouais »).<br>- Il raconte un épisode marquant de son enfance, une expérience personnelle.<br><br><b>b)</b> Le narrateur est <b>l'auteur lui-même</b>, qui raconte sa propre vie. La particularité de ce récit est que l'auteur, le narrateur et le personnage principal ne font qu'un.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>2. Analyse du point de vue et de la construction (3 pts)</b><br>a) Quel est le point de vue adopté par le narrateur ? Justifiez.<br>b) Le texte est construit autour d'un événement déclencheur. Identifiez-le et expliquez son importance dans la vie du narrateur.</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><b>a)</b> Le narrateur adopte un <b>point de vue interne</b>. Il voit les événements à travers les yeux de l'enfant qu'il était, et il livre ses émotions (« j'ai ressenti une sorte de vide immense »).<br><br><b>b)</b> L'événement déclencheur est l'annonce de la mort du fils des voisins, tué sur le front. Cet événement marque une rupture dans la vie du narrateur : « Ce jour-là, l'enfance s'est arrêtée. » Il prend conscience brutalement de la réalité de la guerre et de la fragilité du bonheur.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>3. Étude de la langue (3 pts)</b><br>a) Relevez deux marques du récit autobiographique (indices de la première personne et temps utilisés).<br>b) Identifiez le temps verbal dominant dans le texte. Quelle est sa valeur ?<br>c) « J'ai découvert que le bonheur était fragile. » Transformez cette phrase au discours indirect : « Le narrateur a dit : \"J'ai découvert que le bonheur était fragile.\" »</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><b>a)</b> Marques du récit autobiographique :<br>- L'emploi de la première personne : « je », « m'aimaient », « j'ai compris ».<br>- L'emploi des temps du passé, notamment le passé composé (« ai passé », « est sortie », « ai ressenti ») et l'imparfait (« était », « jouais »).<br><br><b>b)</b> Le temps dominant est le <b>passé composé</b>, utilisé pour les actions ponctuelles et achevées, et l'<b>imparfait</b> pour la description des souvenirs d'enfance. Le passé composé a ici une valeur de récit, marquant des événements précis qui ont eu lieu dans le passé.<br><br><b>c)</b> Le narrateur a dit qu'il avait découvert que le bonheur était fragile.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Expression écrite",
      "points": "6 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'>\n<b>Sujet :</b> Racontez un événement marquant de votre enfance (un événement heureux ou triste) qui a changé votre regard sur le monde ou sur vous-même. Vous utiliserez la première personne et vous adopterez un point de vue interne.<br><br>\n<b>Consignes :</b><br>\n- Votre récit fera environ 15 à 20 lignes.<br>\n- Vous utiliserez les temps du récit (passé composé, imparfait) à bon escient.<br>\n- Vous exprimerez vos sentiments et vos émotions.<br>\n- Vous pouvez vous inspirer du texte de l'exercice 1.<br><br>\n<b>Critères d'évaluation :</b><br>\n- Cohérence du récit (situation initiale, événement, conséquences).<br>\n- Usage correct des temps du passé.<br>\n- Richesse du vocabulaire et des expressions.<br>\n- Respect des consignes (longueur, point de vue, émotions).</div>",
      "questions": [
        {
          "question": "<div>Rédigez votre récit.</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><b>Exemple de réponse :</b><br><br>\n<i>Je me souviens parfaitement de ce jour où mon grand-père m'a appris à pêcher. J'avais huit ans. Nous étions au bord du lac, le soleil brillait et l'eau était calme. Il m'a montré comment lancer la ligne, avec une infinie patience. Je me sentais si fier ! Puis, soudain, la canne s'est tendue. J'ai tiré de toutes mes forces et j'ai vu un poisson argenté bondir hors de l'eau. Mon grand-père a souri, et ce sourire m'a rempli de joie. Ce n'était pas un simple poisson ; c'était la preuve que je pouvais y arriver, que je pouvais grandir. Ce jour-là, j'ai compris que la confiance des autres pouvait me donner des ailes. Le temps a passé, mais ce souvenir est resté gravé en moi, comme un trésor.</i></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Étude de la langue",
      "points": "6 pts",
      "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px;'>\nCet exercice porte sur les notions de grammaire et d'orthographe vues en classe.<br><br>\n<b>Consigne :</b> Répondez aux questions suivantes.</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><b>1. Les temps du récit (2 pts)</b><br>Conjuguez les verbes suivants à l'imparfait et au passé composé, à la personne indiquée :<br><br>a) <b>être</b> (je) : imparfait ____, passé composé ____<br>b) <b>jouer</b> (il) : imparfait ____, passé composé ____<br>c) <b>venir</b> (elles) : imparfait ____, passé composé ____</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>a) <b>être</b> (je) : imparfait <b>j'étais</b>, passé composé <b>j'ai été</b><br>b) <b>jouer</b> (il) : imparfait <b>il jouait</b>, passé composé <b>il a joué</b><br>c) <b>venir</b> (elles) : imparfait <b>elles venaient</b>, passé composé <b>elles sont venues</b></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>2. Analyse grammaticale (2 pts)</b><br>Identifiez la nature et la fonction du mot souligné :<br><br>a) Il <b>mange</b> une pomme.<br>b) La <b>belle</b> fleur est fanée.<br>c) Elle parle <b>à son ami</b>.</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>a) <b>mange</b> : verbe, fonction = noyau du groupe verbal.<br>b) <b>belle</b> : adjectif qualificatif, fonction = épithète du nom « fleur ». [citation:1]<br>c) <b>à son ami</b> : groupe nominal prépositionnel, fonction = complément d'objet indirect (COI) du verbe « parle ». [citation:1]</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><b>3. Orthographe (2 pts)</b><br>Accordez correctement les participes passés et les adjectifs :<br><br>a) Les fleurs que j'ai (cueillir) ______ sont (fané) ______.<br>b) La maison (construire) ______ par mon grand-père est (vendre) ______.<br>c) (Avoir) ______ (prendre) ______ son temps, il a réussi.</div>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'>a) Les fleurs que j'ai <b>cueillies</b> sont <b>fanées</b>.<br>b) La maison <b>construite</b> par mon grand-père est <b>vendue</b>.<br>c) <b>Ayant pris</b> son temps, il a réussi.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
