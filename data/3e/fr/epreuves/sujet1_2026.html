<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Troisième",
  "sequence": "Séquence 1 : Se chercher, se construire",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Lecture et analyse d'un texte autobiographique",
      "points": "7 pts",
      "enonce": "<div style='background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 15px;'><p><strong>Texte :</strong></p><p><i>\"Je suis né le 15 octobre 1945 à Yaoundé, dans une famille modeste. Mon père était fonctionnaire, ma mère couturière. Nous étions six enfants, et je me souviens de notre petite maison aux murs de terre battue, que ma mère entretenait avec un soin méticuleux. Chaque soir, après l'école, je m'asseyais sous le manguier du jardin pour apprendre mes leçons. Le vent soufflait doucement et le bruit des feuilles m'aidait à me concentrer.\n\nCes moments de ma jeunesse ont forgé ma personnalité. J'ai appris très tôt la valeur du travail et le prix du sacrifice. Mon père me répétait sans cesse : 'Ce que tu feras aujourd'hui déterminera ce que tu seras demain.' Cette phrase résonne encore dans mon esprit comme une promesse et un défi. Je me souviens aussi des longues discussions avec ma mère, qui me parlait de son enfance à la campagne, de ses rêves brisés par la pauvreté. Elle voulait que ses enfants connaissent un destin meilleur.\n\nAujourd'hui, je regarde en arrière avec reconnaissance. Ces souvenirs ne sont pas seulement des images du passé ; ils sont les fondations sur lesquelles j'ai bâti ma vie.\"</i></p></div>",
      "questions": [
        {
          "question": "1. a) Dans ce texte, l'auteur se raconte. À quel genre littéraire appartient ce type de texte ?<br><br>b) Quels indices dans le texte montrent qu'il s'agit d'un récit personnel ?",
          "reponse": "a) Ce texte appartient au genre de l'autobiographie. L'auteur y raconte sa propre vie, en se concentrant sur son enfance et les souvenirs marquants de sa jeunesse.<br><br>b) Les indices qui montrent qu'il s'agit d'un récit personnel sont nombreux : l'utilisation de la première personne du singulier ('je suis né', 'je me souviens', 'j'ai appris'), l'évocation de souvenirs personnels, le regard rétrospectif sur sa vie, et la présence de sentiments et d'émotions propres à l'auteur."
        },
        {
          "question": "2. a) Que représentent le manguier et les moments passés sous cet arbre pour l'auteur ?<br><br>b) Quelles valeurs l'auteur a-t-il apprises pendant son enfance ? Justifie ta réponse.",
          "reponse": "a) Le manguier représente un espace de travail, de concentration et de paix. C'est sous cet arbre que l'auteur apprenait ses leçons, et le bruit des feuilles l'aidait à se concentrer. C'est un lieu symbolique de son apprentissage et de sa construction personnelle.<br><br>b) L'auteur a appris la valeur du travail et le prix du sacrifice. Il dit : 'J'ai appris très tôt la valeur du travail et le prix du sacrifice.' Il mentionne également les conseils de son père et les rêves de sa mère, qui lui ont inculqué l'importance de se battre pour un avenir meilleur."
        },
        {
          "question": "3. a) Quelle est la fonction de la citation du père dans le texte ?<br><br>b) Comment l'auteur perçoit-il son passé aujourd'hui ?",
          "reponse": "a) La citation du père ('Ce que tu feras aujourd'hui déterminera ce que tu seras demain') a une fonction argumentative et éducative. Elle résume la philosophie de vie transmise par le père et montre comment cette leçon a marqué l'auteur. Elle est également une figure de style qui renforce le message du texte.<br><br>b) Aujourd'hui, l'auteur perçoit son passé avec reconnaissance et gratitude. Il dit : 'Je regarde en arrière avec reconnaissance.' Il considère ses souvenirs comme des 'fondations' sur lesquelles il a bâti sa vie, ce qui montre qu'il a su tirer des leçons positives de son enfance."
        },
        {
          "question": "4. a) Identifie et explique deux figures de style présentes dans le texte.<br><br>b) Rédige un paragraphe (5 à 7 lignes) dans lequel tu racontes un souvenir marquant de ton enfance ou de ton adolescence, en utilisant la première personne.",
          "reponse": "a) <ul><li><strong>Métaphore :</strong> 'Ces souvenirs sont les fondations sur lesquelles j'ai bâti ma vie.' Les souvenirs sont comparés à des fondations, ce qui suggère qu'ils sont la base solide sur laquelle l'auteur a construit son existence.</li><li><strong>Personnification :</strong> 'Cette phrase résonne encore dans mon esprit.' La phrase est personnifiée comme un son qui résonne, ce qui montre sa persistance et son importance dans la mémoire de l'auteur.</li></ul><br>b) Rédaction personnelle : l'élève doit écrire un paragraphe à la première personne sur un souvenir marquant."
        }
      ]
    },
    {
      "titre": "Étude de la langue",
      "points": "5 pts",
      "enonce": "<div style='background: #f5f5f5; padding: 15px; border-radius: 8px;'><p><strong>Extrait :</strong></p><p><i>\"Mon père me répétait sans cesse : 'Ce que tu feras aujourd'hui déterminera ce que tu seras demain.' Cette phrase résonne encore dans mon esprit.\"</i></p></div>",
      "questions": [
        {
          "question": "1. a) Dans la phrase 'Mon père me répétait sans cesse', quel est le sujet du verbe 'répétait' ?<br><br>b) À quel temps est conjugué le verbe 'répétait' ? Quelle est la valeur de ce temps ?",
          "reponse": "a) Le sujet du verbe 'répétait' est 'Mon père'.<br><br>b) Le verbe 'répétait' est conjugué à l'imparfait de l'indicatif. Sa valeur est ici l'habitude ou la répétition dans le passé (c'était une action qui se répétait souvent)."
        },
        {
          "question": "2. a) Quelle est la classe grammaticale du mot 'cette' dans 'Cette phrase résonne' ?<br><br>b) Quelle est la fonction du groupe nominal 'dans mon esprit' ?",
          "reponse": "a) 'Cette' est un déterminant démonstratif.<br><br>b) 'dans mon esprit' est un complément circonstanciel de lieu."
        },
        {
          "question": "3. a) Transforme la phrase suivante au discours indirect : 'Mon père me répétait : 'Ce que tu feras aujourd'hui déterminera ce que tu seras demain.''<br><br>b) Identifie le mode et le temps du verbe 'déterminera' dans la citation. Explique son emploi.",
          "reponse": "a) Mon père me répétait que ce que je ferais aujourd'hui déterminerait ce que je serais demain.<br><br>b) 'déterminera' est conjugué au futur simple de l'indicatif. Ce temps est utilisé pour exprimer une action future certaine, en lien avec le conseil donné par le père."
        },
        {
          "question": "4. a) Relève un mot de la famille de 'résonne' (son).<br><br>b) Construis une phrase en utilisant le mot 'conscience' dans le même champ lexical que 'esprit'.",
          "reponse": "a) Des mots de la même famille que 'résonne' : 'son', 'résonance', 'sonore'.<br><br>b) Exemple de phrase : 'La voix de mon père résonne dans ma conscience comme un rappel constant de ses enseignements.'"
        }
      ]
    },
    {
      "titre": "Production écrite",
      "points": "8 pts",
      "enonce": "<div style='background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 15px;'><p><strong>Sujet :</strong></p><p>À l'instar de l'auteur du texte, raconte un moment de ta vie qui a contribué à construire la personne que tu es aujourd'hui. Tu peux parler d'une rencontre, d'une épreuve, d'une réussite ou d'un lieu qui a marqué ton enfance ou ton adolescence.</p><p><strong>Consignes :</strong></p><ul><li>Utilise la première personne du singulier ('je').</li><li>Rédige un récit structuré (situation initiale, événement, situation finale).</li><li>Emploie des temps du passé (imparfait, passé composé, plus-que-parfait).</li><li>Soigne la ponctuation et l'orthographe.</li><li>Fais un texte de 15 à 20 lignes.</li></ul></div>",
      "questions": [
        {
          "question": "",
          "reponse": "Ce sujet est une production écrite personnelle. La réponse sera évaluée selon les critères suivants :<br><br><ul><li><strong>Respect des consignes :</strong> utilisation du 'je', temps du passé, structure du récit.</li><li><strong>Cohérence et organisation :</strong> récit structuré avec une progression logique.</li><li><strong>Qualité de l'expression :</strong> vocabulaire varié, phrases bien construites.</li><li><strong>Correction linguistique :</strong> orthographe, grammaire, conjugaison.</li><li><strong>Capacité à susciter l'intérêt :</strong> récit vivant, émotion ou réflexion personnelle.</li></ul><br>Exemple de récit possible : 'Je me souviens de ce jour où j'ai perdu mon grand-père...' ou 'C'était l'été de mes douze ans lorsque j'ai découvert la bibliothèque de mon oncle...'"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
