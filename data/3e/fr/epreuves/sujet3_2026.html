<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Troisième",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Texte : Le pouvoir des fables",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p><strong>Texte :</strong> Le pouvoir des fables (d'après une fable de Jean de La Fontaine)</p><p style='font-style: italic; margin-top: 10px;'>« Un jeune avocat, plein de rhétorique, voulait convaincre les gens de la ville de construire une nouvelle école. Il parla longtemps, avec des mots compliqués et des gestes grandioses. Personne ne l'écoutait vraiment.</p><p style='font-style: italic;'>Un vieux sage prit alors la parole. Il raconta l'histoire d'un petit ruisseau qui, fatigué de son cours sinueux, décida de couper à travers la montagne. Il creusa, il força, mais la roche était trop dure. Il n'arriva jamais à la mer.</p><p style='font-style: italic;'>Un autre ruisseau, plus modeste, suivit le chemin tracé par la nature, contournant les obstacles. Il arriva, lui, à la mer, en apportant la vie partout sur son passage.</p><p style='font-style: italic;'>Le sage conclut : « Pour construire une école, il ne faut pas vouloir déplacer des montagnes d'un seul coup, mais creuser patiemment le sillon de la persuasion. » Les habitants, touchés par cette image, votèrent enfin la construction de l'école. »</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>1) Quelle est la situation initiale présentée dans ce texte ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>La situation initiale est celle d'un jeune avocat qui échoue à convaincre les habitants de la ville de construire une nouvelle école en utilisant un discours complexe et emphatique.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>2) Quelle est la fonction du discours du vieux sage dans ce récit ? Justifiez votre réponse. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Le discours du vieux sage a une fonction argumentative et persuasive. Il utilise l'exemple du ruisseau (une fable) pour montrer que la patience et la persuasion sont plus efficaces que la force ou les discours compliqués.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>3) À votre avis, que symbolise la montagne dans l'histoire du ruisseau ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>La montagne symbolise l'obstacle, la difficulté ou le problème que l'on veut résoudre de manière trop brutale.</div>"
        }
      ]
    },
    {
      "titre": "Questions de grammaire et vocabulaire",
      "points": "8 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p><strong>Texte support :</strong></p><p style='font-style: italic;'>« Il parla longtemps, avec des mots compliqués et des gestes grandioses. Personne ne l'écoutait vraiment. Un vieux sage prit alors la parole. »</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>1) Identifiez la nature du mot <span style='font-weight: bold;'>« grandioses »</span> et donnez son synonyme. (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>« Grandioses » est un adjectif qualificatif. Un synonyme possible est « imposants » ou « majestueux ».</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>2) « Personne ne l'écoutait. » Quelle est la fonction du pronom <span style='font-weight: bold;'>« l' »</span> dans cette phrase ? (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>« l' » est un pronom personnel complément d'objet direct (COD) qui remplace « le jeune avocat ».</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>3) Réécrivez la phrase suivante en mettant le verbe à la voix passive : <span style='font-style: italic;'>« Un vieux sage prit alors la parole. »</span> (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>« La parole fut alors prise par un vieux sage. »</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>4) Donnez la classe grammaticale des mots suivants : <span style='font-weight: bold;'>« avec »</span> et <span style='font-weight: bold;'>« vraiment »</span>. (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>« avec » est une préposition ; « vraiment » est un adverbe.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>5) Identifiez la phrase subordonnée relative dans ce passage : <span style='font-style: italic;'>« Il raconta l'histoire d'un petit ruisseau qui, fatigué de son cours sinueux, décida de couper à travers la montagne. »</span> (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>La subordonnée relative est « <span style='font-style: italic;'>qui, fatigué de son cours sinueux, décida de couper à travers la montagne</span> ».</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>6) Analysez la phrase <span style='font-style: italic;'>« Il parla longtemps »</span> : donnez la fonction de <span style='font-weight: bold;'>« longtemps »</span>. (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>« longtemps » est un complément circonstanciel de temps.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>7) Dans l'expression <span style='font-style: italic;'>« le sillon de la persuasion »</span>, de quelle figure de style s'agit-il ? Expliquez-la en quelques mots. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Il s'agit d'une métaphore. On compare l'acte de persuader au fait de creuser un sillon dans un champ, suggérant un travail patient et continu.</div>"
        }
      ]
    },
    {
      "titre": "Rédaction : la satire",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p>En vous inspirant de la fable étudiée, rédigez un court texte satirique (environ 20 lignes) qui dénonce un travers de la société camerounaise actuelle (par exemple : les embouteillages, l'incivilité, la mauvaise gestion, etc.).</p><p><span style='font-weight: 600;'>Consignes :</span></p><ul style='margin-left: 20px;'><li>Utilisez un registre ironique ou humoristique.</li><li>Structurez votre texte comme une fable (situation initiale, péripéties, morale implicite ou explicite).</li><li>Employez au moins une figure de style (comparaison, métaphore, hyperbole).</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>Rédigez votre texte satirique (20 lignes).</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Réponse attendue : Un texte structuré, mêlant récit et critique sociale, utilisant des figures de style et un ton ironique.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
