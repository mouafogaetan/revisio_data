<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Troisième",
  "sequence": "Sequence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Reading Comprehension and Vocabulary",
      "points": "5 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 10px; color: #1a1a1a;'><p>Read the text carefully and answer the questions that follow.</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #2980b9; margin: 10px 0; color: #1a1a1a;'><h4 style='color: #2c3e50;'>Climate Change and Its Unequal Impact</h4><p>Climate change is one of the most pressing issues of our time. It affects everyone, but not equally. Studies show that its negative impacts disproportionately affect women and girls, especially in the global south. This is not due to natural vulnerability but rather the result of deep-rooted gender inequalities in political, social, and economic life [citation:4].</p><p>For instance, women in developing countries are more likely to work in the informal sector, making their livelihoods highly vulnerable to environmental shocks. Furthermore, during climate-related events such as floods or droughts, women and girls face increased risks of gender-based violence and are more likely to drop out of school [citation:4].</p><p>However, women are not just victims. Research has shown that they are crucial actors in achieving climate goals. Women often assess risks differently and tend to prioritize the welfare of their families and communities when managing resources. A study even found that national parliaments with more women pass stricter climate policies [citation:4].</p><p>Despite this, women face significant barriers to participating in environmental decision-making. They are underrepresented at all levels, from local communities to international forums. Gender-responsive policies, such as investing in childcare and enforcing anti-discrimination laws, are essential to overcome these systemic barriers and build a more sustainable future for all [citation:4].</p></div></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>1. Comprehension Questions</strong> (3 pts)</p><p style='margin-left: 20px;'>a) According to the text, why do the negative impacts of climate change disproportionately affect women and girls?</p><p style='margin-left: 20px;'>b) List two examples given in the text of how women and girls are affected by climate change.</p><p style='margin-left: 20px;'>c) In what way are women described as part of the solution to climate change?</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) The negative impacts disproportionately affect women and girls because of deep-rooted <strong>gender inequalities</strong> in political, social, and economic life.</p><p>b) 1. They face increased risks of <strong>gender-based violence</strong> during climate-related events. 2. They are <strong>more likely to drop out of school</strong> [citation:4].</p><p>c) Women are described as crucial actors in achieving climate goals. They assess risks differently and prioritize the welfare of their families and communities in resource-management decisions.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>2. Vocabulary</strong> (1 pt)</p><p style='margin-left: 20px;'>Find in the text a synonym for the following words:</p><p style='margin-left: 20px;'>a) serious (Paragraph 1) → ______</p><p style='margin-left: 20px;'>b) weakness (Paragraph 1) → ______</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>pressing</strong></p><p>b) <strong>vulnerability</strong></p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>3. Personal Response</strong> (1 pt)</p><p style='margin-left: 20px;'>Based on the text and your own experience, do you think women are sufficiently represented in environmental decision-making in your community? Justify your answer.</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong> This is a personal response question, but a good answer could be: 'No, I don't think women are sufficiently represented. In my community, it is mostly men who lead discussions on environmental issues. I believe we need more women in decision-making positions because they have valuable knowledge and experience.'</p></div>"
        }
      ]
    },
    {
      "titre": "Grammar and Lexis",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 10px; color: #1a1a1a;'><p>This section tests your knowledge of grammar points seen in Sequence 4.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>1. Conjunctions and Adjuncts</strong> (2 pts)</p><p style='margin-left: 20px;'>Complete the following sentences using the correct words from the list: <em>while, for, although, either...or, neither...nor</em>.</p><p style='margin-left: 20px;'>a) _____ it was raining, the football match continued.</p><p style='margin-left: 20px;'>b) We can go to the restaurant _____ have a picnic at the beach.</p><p style='margin-left: 20px;'>c) She has been working _____ the NGO _____ five years.</p><p style='margin-left: 20px;'>d) _____ my brother _____ my sister is interested in politics.</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>Although</strong></p><p>b) <strong>either...or</strong></p><p>c) <strong>for</strong></p><p>d) <strong>Neither...nor</strong></p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>2. Conditionals</strong> (1 pt)</p><p style='margin-left: 20px;'>Put the verbs in brackets into the correct form (First or Second Conditional).</p><p style='margin-left: 20px;'>a) If we _____ (recycle) more waste, we _____ (reduce) pollution. (Type 1)</p><p style='margin-left: 20px;'>b) If I _____ (be) the president, I _____ (implement) stricter environmental laws. (Type 2)</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>recycle</strong>, <strong>will reduce</strong></p><p>b) <strong>were</strong>, <strong>would implement</strong></p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>3. Phrasal Verbs</strong> (1 pt)</p><p style='margin-left: 20px;'>Replace the underlined words with an appropriate phrasal verb from the list: <em>give up, look after, break down, get into</em>.</p><p style='margin-left: 20px;'>a) My car stopped working on the way to school.</p><p style='margin-left: 20px;'>b) You should stop smoking because it's dangerous.</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>broke down</strong></p><p>b) <strong>give up</strong></p></div>"
        }
      ]
    },
    {
      "titre": "Speech Work",
      "points": "2 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 10px; color: #1a1a1a;'><p>This section evaluates your mastery of phonetics.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>1. Word Stress</strong> (1 pt)</p><p style='margin-left: 20px;'>Indicate the correct syllable stress in the following words by putting a stress mark (') before the stressed syllable. Example: 'ta-ble.</p><p style='margin-left: 20px;'>a) environment</p><p style='margin-left: 20px;'>b) volunteer</p><p style='margin-left: 20px;'>c) democracy</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) en-<strong>'vi</strong>-ron-ment</p><p>b) vo-lun-<strong>'teer</strong></p><p>c) de-<strong>'mo</strong>-cra-cy</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>2. Intonation</strong> (1 pt)</p><p style='margin-left: 20px;'>Read the following sentences and indicate whether the voice goes up (↗) or down (↘) at the end.</p><p style='margin-left: 20px;'>a) Are you going to the festival? → _____</p><p style='margin-left: 20px;'>b) She is a brilliant student. → _____</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Correction:</strong></p><p>a) <strong>↗</strong> (rising for a yes/no question)</p><p>b) <strong>↘</strong> (falling for a statement)</p></div>"
        }
      ]
    },
    {
      "titre": "Composition (Article Writing)",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 10px; color: #1a1a1a;'><p><strong>Choose ONE of the following topics and write an article of 150 to 200 words.</strong></p></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Topic 1:</strong> The Importance of Tolerance and Accepting Others</p><p>Write an article for your school magazine encouraging students to accept and tolerate people from different tribes, cultures, or religions. Include the benefits of tolerance and practical advice.</p><hr style='border: 1px solid #ddd; margin: 15px 0;'><p><strong>Topic 2:</strong> The Importance of Participating in Cross-National Celebrations</p><p>Write an article for a community newspaper explaining why it is important to take part in national celebrations like the 20th of May or National Youth Day. Highlight the values of unity and patriotism.</p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, system-ui, sans-serif; padding: 5px; color: #1a1a1a;'><p><strong>Sample Answer for Topic 1:</strong></p><p style='margin-left: 20px;'><strong>TOGETHER WE STAND: THE POWER OF TOLERANCE</strong></p><p style='margin-left: 20px;'>Tolerance is the key to a peaceful society. In our school, we have students from many different tribes and cultures. Some are Christians, others are Muslims, and some follow traditional religions. It is essential that we accept and respect each other despite our differences.</p><p style='margin-left: 20px;'>Tolerance has many benefits. It helps us learn about each other's customs and traditions. It also prevents conflicts and misunderstandings. When we accept others, we create a safe and friendly environment for everyone.</p><p style='margin-left: 20px;'>To practice tolerance, we should avoid stereotyping others. We should be curious and ask questions politely. We can also participate in cultural events to discover more about our friends' backgrounds.</p><p style='margin-left: 20px;'>In conclusion, tolerance is not just a word; it is an action. Let us all learn to appreciate our differences because, in unity, we find strength. After all, we are one nation, and together we can build a better future for all.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
