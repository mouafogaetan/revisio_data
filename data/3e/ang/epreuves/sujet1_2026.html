<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Troisième",
  "sequence": "Sequence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Reading Comprehension: Tolerating and Accepting Others",
      "points": "10 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Read the text below carefully and answer the questions which follow.</p><div style='background-color:#f7fafc; padding:20px; border-radius:12px; border-left:6px solid #4a5568; color:#1a202c; font-size:1rem; line-height:1.8;'><p>In Cameroon, we have many different tribes and cultures. Some people speak English, others speak French, and many speak local languages. At school, we learn to live together. Our classmates may come from different tribes, speak different languages, or practice different religions.</p><p>But sometimes, we face challenges. Some students make fun of others because of their accent or their traditions. This is not good. We should learn to tolerate and accept everyone. We are all Cameroonians, and we are stronger when we are united. Our national motto is 'Peace, Work, Fatherland'.</p><p>There are many ways to show tolerance. You can invite a friend from another tribe to your home. You can learn a few words in their language. You can also celebrate their festivals with them. In our school, we have a Cultural Week where we share food, music, and dances from different regions. This helps us understand each other better.</p></div>",
      "questions": [
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>1) According to the passage, what makes Cameroon a diverse country?</p>",
          "reponse": "<p style='color:#2f855a;'>Cameroon has many different tribes and cultures, and people speak different languages.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>2) What is the national motto of Cameroon mentioned in the text?</p>",
          "reponse": "<p style='color:#2f855a;'>The national motto is 'Peace, Work, Fatherland'.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>3) Give two examples of how to show tolerance to others according to the passage.</p>",
          "reponse": "<p style='color:#2f855a;'>You can invite a friend from another tribe to your home, learn a few words in their language, or celebrate their festivals with them.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>4) What does the school organise to help students understand each other better?</p>",
          "reponse": "<p style='color:#2f855a;'>The school organises a Cultural Week where students share food, music, and dances from different regions.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>5) Why is it important to tolerate and accept everyone according to the text?</p>",
          "reponse": "<p style='color:#2f855a;'>We are stronger when we are united, and we can live together peacefully.</p>"
        }
      ]
    },
    {
      "titre": "Grammar: Using Conjunctions and Adjuncts",
      "points": "6 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748;'>Complete the following sentences with the correct word or phrase from the box.</p><div style='background-color:#f7fafc; padding:12px; border-radius:8px; margin:12px 0; color:#1a202c;'><p><strong>Words to use:</strong> <em>while, for, neither... nor, either... or, only, also, never, ever, although</em></p></div>",
      "questions": [
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>1) _______ I like football, I prefer basketball.</p>",
          "reponse": "<p style='color:#2f855a;'>Although</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>2) She _______ speaks English, _______ French.</p>",
          "reponse": "<p style='color:#2f855a;'>not only ... but also / also</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>3) He can play _______ football _______ basketball.</p>",
          "reponse": "<p style='color:#2f855a;'>either ... or</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>4) We waited _______ two hours, but the bus didn't come.</p>",
          "reponse": "<p style='color:#2f855a;'>for</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>5) She _______ eats meat. She is a vegetarian.</p>",
          "reponse": "<p style='color:#2f855a;'>never</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>6) He was reading _______ his sister was watching TV.</p>",
          "reponse": "<p style='color:#2f855a;'>while</p>"
        }
      ]
    },
    {
      "titre": "Vocabulary: National Integration and Diversity",
      "points": "4 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Match the words with their correct definitions.</p>",
      "questions": [
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>1) Tolerance</p>",
          "reponse": "<p style='color:#2f855a;'>The ability to accept other people's beliefs or customs even if you don't agree with them.</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>2) Diversity</p>",
          "reponse": "<p style='color:#2f855a;'>The state of being composed of many different elements; variety.</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>3) National Integration</p>",
          "reponse": "<p style='color:#2f855a;'>The process of bringing different ethnic, cultural, and religious groups together into one united nation.</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>4) Festival</p>",
          "reponse": "<p style='color:#2f855a;'>A special celebration or event with traditions, food, music, and dances.</p>"
        }
      ]
    },
    {
      "titre": "Written Composition: Dialogue Writing",
      "points": "5 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Write a dialogue of about 8 to 10 exchanges between two students from different tribes discussing how they can learn to tolerate and accept each other.</p>",
      "questions": [
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>Write a dialogue respecting punctuation and using at least three words from the vocabulary list.</p>",
          "reponse": "<p style='color:#2f855a;'><strong>Example:</strong></p><p><strong>Jean:</strong> Hello, Ambe. How was your weekend?</p><p><strong>Ambe:</strong> Hi, Jean. It was great. We had a traditional dance in our village.</p><p><strong>Jean:</strong> That sounds interesting! I would like to learn about your culture.</p><p><strong>Ambe:</strong> And I would like to learn about yours. I think it's important to understand each other.</p><p><strong>Jean:</strong> Yes, tolerance is very important. We can learn a lot from each other.</p><p><strong>Ambe:</strong> Exactly. Diversity makes our country stronger.</p><p><strong>Jean:</strong> Maybe we can visit each other's homes and learn about our traditions.</p><p><strong>Ambe:</strong> That would be great! I'll ask my mother to cook a traditional meal for you.</p><p><strong>Jean:</strong> Wonderful. And my mother can show you how we make our local dishes.</p><p><strong>Ambe:</strong> I'm looking forward to it. Together we can show that unity is possible.</p>"
        }
      ]
    },
    {
      "titre": "Literature: Poem Analysis",
      "points": "5 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Read the short poem below and answer the questions.</p><div style='background-color:#f7fafc; padding:20px; border-radius:12px; border-left:6px solid #4a5568; color:#1a202c; font-size:1rem; line-height:1.8;'><p><strong>Together We Stand</strong></p><p>Though we speak different tongues,</p><p>Our hearts beat as one.</p><p>From the coast to the savannah,</p><p>We are daughters and sons.</p><p>Let us build bridges, not walls,</p><p>And answer together when Cameroon calls.</p></div>",
      "questions": [
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>1) What is the main theme of this poem?</p>",
          "reponse": "<p style='color:#2f855a;'>The theme is national unity, tolerance, and living together in peace despite differences.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>2) What does the line 'Let us build bridges, not walls' mean?</p>",
          "reponse": "<p style='color:#2f855a;'>It means we should create connections and understand each other instead of separating ourselves.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>3) According to the poet, what makes Cameroonians different?</p>",
          "reponse": "<p style='color:#2f855a;'>We speak different languages or tongues.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
