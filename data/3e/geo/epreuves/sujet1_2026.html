<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Troisième",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Maîtrise des connaissances",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'>Cette partie évalue votre capacité à restituer et expliquer les notions fondamentales des milieux géographiques du Cameroun.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>1) Définissez les concepts suivants : relief, hydrographie, climat. (1.5 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>- <strong>Relief</strong> : ensemble des formes de la surface terrestre (plaines, plateaux, montagnes, etc.).<br>- <strong>Hydrographie</strong> : étude et description des cours d'eau et des masses d'eau (fleuves, rivières, lacs).<br>- <strong>Climat</strong> : succession des conditions atmosphériques sur une longue période dans une région donnée.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>2) Citez quatre grands milieux géographiques du Cameroun. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>1. Le plateau sud-camerounais.<br>2. Les hautes terres de l'ouest.<br>3. L'Adamaoua.<br>4. Les basses terres du nord et les monts Mandara.<br>5. La plaine côtière.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>3) Précisez les caractéristiques du climat de la plaine côtière camerounaise. (1.5 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>La plaine côtière camerounaise bénéficie d'un climat équatorial de type guinéen, caractérisé par de fortes précipitations (jusqu'à 4 000 mm/an à Douala), des températures élevées et une humidité atmosphérique permanente [citation:2].</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>4) Citez les principaux types de végétation que l'on rencontre dans les hautes terres de l'Ouest. (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Les hautes terres de l'Ouest sont caractérisées par une végétation de savane herbeuse parsemée d'arbres, des forêts galeries le long des cours d'eau et des plantations (café, thé) dans les zones d'altitude.</div>"
        }
      ]
    },
    {
      "titre": "Analyse de documents et cartes",
      "points": "8 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p>Observez attentivement les documents suivants et répondez aux questions.</p><div style='background-color: #f0f8ff; padding: 10px; border-radius: 8px; border-left: 4px solid #1e90ff;'><p><strong>Document 1 :</strong> Carte de la plaine côtière camerounaise.</p><p>Cette carte représente la zone côtière du Cameroun, de la frontière nigériane jusqu'à la frontière gabonaise. On y distingue les principaux fleuves (Sanaga, Wouri, Nyong, Ntem), les villes principales (Douala, Kribi, Limbe), les mangroves et les zones de plantation.</p></div><div style='background-color: #f5f5dc; padding: 10px; border-radius: 8px; border-left: 4px solid #8b4513; margin-top: 10px;'><p><strong>Document 2 :</strong> Texte sur les problèmes de la plaine côtière.</p><p>« La plaine côtière du Cameroun est soumise à de nombreuses agressions : l'érosion côtière due aux fortes vagues et aux courants marins, la pollution des eaux par les déchets industriels et domestiques, la déforestation des mangroves pour l'exploitation du bois et l'urbanisation, et les inondations lors des fortes pluies. »</p></div></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>1) D'après le document 1, quels sont les principaux cours d'eau qui traversent la plaine côtière ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Les principaux cours d'eau de la plaine côtière sont le fleuve Sanaga, le Wouri, le Nyong et le Ntem.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>2) Identifiez les deux principales villes de la plaine côtière mentionnées sur la carte. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Les deux principales villes sont Douala et Kribi.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>3) D'après le document 2, quelles sont les principales agressions subies par la plaine côtière ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Les principales agressions sont : l'érosion côtière, la pollution des eaux, la déforestation des mangroves et les inondations.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>4) Proposez deux solutions pour protéger le milieu côtier camerounais. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>1. Lutter contre la pollution en améliorant le traitement des eaux usées et en régulant les rejets industriels [citation:2].<br>2. Protéger les mangroves par une réglementation stricte de l'exploitation du bois et la création de réserves naturelles.</div>"
        }
      ]
    },
    {
      "titre": "Synthèse et production écrite",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p>Après avoir étudié les milieux géographiques du Cameroun, rédigez un texte structuré sur le sujet suivant.</p><p><strong>Sujet :</strong> « Les milieux naturels du Cameroun : diversité, problèmes et solutions pour leur préservation »</p><p><strong>Consignes :</strong></p><ul style='margin-left: 20px;'><li>Introduction : présentez la diversité des milieux naturels du Cameroun.</li><li>Développement : décrivez les principaux milieux (plateau sud-camerounais, hautes terres de l'ouest, Adamaoua, basses terres du nord, plaine côtière), leurs caractéristiques et leurs problèmes environnementaux.</li><li>Conclusion : proposez des actions de protection de l'environnement.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>Rédigez votre dissertation (environ 20 lignes).</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'><p><strong>Introduction :</strong> Le Cameroun est souvent qualifié d'« Afrique en miniature » en raison de sa grande diversité de milieux naturels. Cette variété physique et climatique offre des paysages et des écosystèmes uniques, mais elle est aussi confrontée à de nombreux problèmes environnementaux.</p><p><strong>Développement :</strong> Le plateau sud-camerounais, couvert de forêts denses, est menacé par la déforestation. Les hautes terres de l'ouest, avec leurs sols volcaniques fertiles, subissent l'érosion des terres agricoles. L'Adamaoua, région de savane, est victime de la désertification. Les basses terres du nord et les monts Mandara sont touchés par la sécheresse. La plaine côtière, avec ses mangroves et ses eaux riches en poissons, est polluée par les activités humaines.</p><p><strong>Conclusion :</strong> Pour préserver ces milieux, il est urgent d'adopter des mesures de protection : reboisement, lutte contre la pollution, régulation des activités agricoles, et éducation des populations à la protection de l'environnement.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
