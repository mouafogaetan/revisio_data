<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Troisième",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Maîtrise des connaissances",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'>Cette partie évalue votre capacité à restituer et expliquer les notions fondamentales des chapitres sur la population et les activités économiques du Cameroun.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>1) Définissez les concepts suivants : a) Migration, b) Pyramide des âges, c) Agriculture commerciale. (1.5 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>a) <strong>Migration</strong> : déplacement de population d'un lieu à un autre.<br>b) <strong>Pyramide des âges</strong> : représentation graphique de la structure d'une population par âge et par sexe.<br>c) <strong>Agriculture commerciale</strong> : agriculture intensive visant la vente des produits sur les marchés, souvent destinée à l'exportation.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>2) Citez deux causes de migrations internes au Cameroun et deux causes de migrations externes. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'><strong>Migrations internes</strong> : l'exode rural (recherche d'emploi et de meilleures conditions de vie en ville) et les déplacements liés aux conflits intercommunautaires. <br><strong>Migrations externes</strong> : la recherche de meilleures opportunités économiques à l'étranger et les déplacements forcés par les catastrophes naturelles.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>3) Décrivez la structure de la population camerounaise et nommez les deux principaux groupes ethniques du pays. (1.5 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>La population camerounaise est jeune, avec une majorité de moins de 25 ans. Elle est composée de nombreux groupes ethniques, dont les deux principaux sont les Bantous (au sud) et les Soudanais (au nord).</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>4) Citez trois problèmes majeurs du secteur agricole au Cameroun. (1 pt)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>1. L'utilisation excessive d'engrais et de pesticides qui pollue les sols et les eaux.<br>2. Les difficultés d'accès au financement et aux équipements modernes.<br>3. L'exode rural des jeunes vers les villes, entraînant une baisse de la main-d'œuvre agricole.</div>"
        }
      ]
    },
    {
      "titre": "Analyse de documents",
      "points": "8 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p>Observez attentivement les documents suivants et répondez aux questions.</p><div style='background-color: #f0f8ff; padding: 10px; border-radius: 8px; border-left: 4px solid #1e90ff;'><p><strong>Document 1 :</strong> Texte sur l'agriculture camerounaise.</p><p>« L'agriculture est un secteur clé de l'économie camerounaise, employant plus de 60% de la population active. Elle se divise en deux grands types : une agriculture vivrière, destinée à l'alimentation des populations locales, et une agriculture commerciale, tournée vers l'exportation. Cependant, l'agriculture vivrière est souvent peu productive, tandis que l'agriculture commerciale, bien que rentable, est dépendante des fluctuations des cours mondiaux et fragilise les terres en raison de l'utilisation massive d'engrais chimiques. »</p></div><div style='background-color: #f5f5dc; padding: 10px; border-radius: 8px; border-left: 4px solid #8b4513; margin-top: 10px;'><p><strong>Document 2 :</strong> Carte des zones d'élevage au Cameroun.</p><p>Cette carte présente la répartition de l'élevage au Cameroun. On distingue trois grandes zones :<br>- <strong>Zone 1 (Nord) :</strong> élevage extensif de bovins, ovins et caprins, pratiqué par les populations peules et mbororos.<br>- <strong>Zone 2 (Adamaoua) :</strong> élevage bovin de moyenne importance.<br>- <strong>Zone 3 (Sud et Est) :</strong> élevage de porcs, volailles et petit élevage en basse-cour, pratiqué à petite échelle.</p></div></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>1) D'après le document 1, quels sont les deux types d'agriculture pratiqués au Cameroun ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Les deux types d'agriculture sont : l'agriculture vivrière (destinée à l'alimentation des populations locales) et l'agriculture commerciale (tournée vers l'exportation).</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>2) Selon le document 2, quelle est la principale zone d'élevage extensif de bovins ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>La principale zone d'élevage extensif de bovins est la zone du Nord.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>3) Quels sont les problèmes de l'agriculture commerciale évoqués dans le document 1 ? (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>L'agriculture commerciale est dépendante des fluctuations des cours mondiaux et fragilise les terres en raison de l'utilisation massive d'engrais chimiques.</div>"
        },
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>4) Pourquoi l'agriculture vivrière est-elle considérée comme peu productive ? Proposez une solution. (2 pts)</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'>Elle est peu productive en raison du manque d'équipements modernes, de l'absence de financement et de l'utilisation de techniques traditionnelles. Une solution serait de former les agriculteurs aux nouvelles techniques et de faciliter l'accès au crédit.</div>"
        }
      ]
    },
    {
      "titre": "Synthèse et production écrite",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #1a1a1a; background: #f9f9f9; padding: 15px; border-radius: 8px;'><p>Après avoir étudié la population et les activités économiques du Cameroun, rédigez un texte structuré sur le sujet suivant.</p><p><strong>Sujet :</strong> « Les défis de l'agriculture camerounaise et les solutions pour un développement durable »</p><p><strong>Consignes :</strong></p><ul style='margin-left: 20px;'><li>Introduction : présentez l'importance de l'agriculture pour l'économie et la société camerounaises.</li><li>Développement : distinguez les types d'agriculture, identifiez les problèmes (exode rural, utilisation d'engrais, manque d'équipement), et proposez des solutions (formation, accès au crédit, etc.).</li><li>Conclusion : montrez l'importance des politiques publiques et de la coopération internationale.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size: 15px; font-weight: 600; color: #2c3e50; margin-top: 10px;'>Rédigez votre dissertation (environ 20 lignes).</div>",
          "reponse": "<div style='font-size: 15px; background: #eef9f2; padding: 10px; border-radius: 6px;'><p><strong>Introduction :</strong> L'agriculture est le pilier de l'économie camerounaise, fournissant emploi et subsistance à plus de 60% de la population. Cependant, ce secteur vital est confronté à de nombreux défis qui entravent son développement et compromettent la sécurité alimentaire du pays.</p><p><strong>Développement :</strong> On distingue l'agriculture vivrière, qui nourrit les populations, et l'agriculture commerciale, qui génère des devises. Toutes deux souffrent de problèmes majeurs : l'exode rural prive les campagnes de main-d'œuvre, l'utilisation excessive d'engrais chimiques appauvrit les sols et pollue l'environnement, et le manque d'équipements modernes limite la productivité. Pour y remédier, il est nécessaire de former les agriculteurs aux techniques durables, de faciliter l'accès au crédit et aux intrants, et de valoriser les produits locaux sur les marchés nationaux et internationaux.</p><p><strong>Conclusion :</strong> La modernisation de l'agriculture passe par des politiques publiques volontaristes et une coopération internationale renforcée. En investissant dans ce secteur, le Cameroun pourra non seulement assurer sa souveraineté alimentaire mais aussi créer des emplois et contribuer à la lutte contre la pauvreté.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
