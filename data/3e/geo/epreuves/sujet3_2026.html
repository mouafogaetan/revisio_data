<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Troisième",
  "sequence": "Séquence 2 : Les milieux géographiques, la population et les activités économiques du Cameroun",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Vérification des ressources : définition de concepts clés",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Consigne :</strong> Réponds par une définition précise aux questions suivantes. Chaque réponse est notée sur <strong>1 point</strong>.</p><p><em>Les définitions sont extraites des thèmes abordés dans la séquence : les milieux géographiques, la population et les activités économiques du Cameroun.</em></p></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>1) Définis le terme de <strong>déforestation</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>La <strong>déforestation</strong> est la destruction massive des forêts, souvent due à l'exploitation forestière, à l'agriculture sur brûlis ou à l'urbanisation [citation:3].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>2) Qu'est-ce qu'un <strong>mouvement migratoire</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Un <strong>mouvement migratoire</strong> désigne le déplacement d'une population d'un lieu à un autre, qui peut être interne (à l'intérieur d'un pays) ou externe (vers un autre pays) [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>3) Donne une définition du <strong>sous-développement</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le <strong>sous-développement</strong> est une situation caractérisée par un faible niveau de vie, un manque d'infrastructures, une économie peu diversifiée et des indicateurs sociaux faibles [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>4) C'est quoi une <strong>plaine alluviale</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Une <strong>plaine alluviale</strong> est une zone de basse altitude formée par les dépôts de sédiments (alluvions) apportés par les cours d'eau lors de leurs crues [d'après le programme].</div>"
        }
      ]
    },
    {
      "titre": "Vérification des savoir-faire : analyse de documents et localisation",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Consignes :</strong></p><ul><li><strong>1er exercice (1 pt) :</strong> Relie chaque formation végétale à la région géographique correspondante.<br><em>Formations végétales :</em> Forêt dense, Savane, Forêt galerie.<br><em>Régions :</em> Plateau sud-camerounais, Basses terres du nord, Hautes terres de l'ouest.</li><li><strong>2e exercice (1 pt) :</strong> Sur une carte du Cameroun (fictive), localise <strong>le plateau sud-camerounais</strong> et <strong>les hautes terres de l'ouest</strong>.</li><li><strong>3e exercice (1 pt) :</strong> Délimite sur la même carte la zone de climat équatorial et la zone de climat tropical.</li><li><strong>4e exercice (1 pt) :</strong> Situe deux des quatre activités économiques suivantes sur la carte : l'agriculture de plantation, l'élevage extensif, la pêche maritime, le tourisme.</li><li><strong>5e exercice (1 pt) :</strong> À partir du document 1 ci-dessous, relève deux caractéristiques du milieu physique du Cameroun.</li></ul><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #2c3e50; margin: 15px 0; color: #1a1a1a;'><p><strong>Document 1 :</strong> Le Cameroun présente une grande diversité de milieux physiques. Le relief est varié, allant des plaines côtières aux hautes terres de l'ouest en passant par le plateau sud-camerounais. Le climat est de type équatorial au sud et tropical au nord, avec une saison sèche plus marquée dans les régions septentrionales [d'après le programme].</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>5) Associe chaque formation végétale à la région correspondante (document 2).</div>",
          "reponse": "<div style='color: #1a1a1a;'><ul><li><strong>Forêt dense</strong> → <strong>Plateau sud-camerounais</strong> (climat équatorial).</li><li><strong>Savane</strong> → <strong>Basses terres du nord</strong> (climat tropical).</li><li><strong>Forêt galerie</strong> → <strong>Hautes terres de l'ouest</strong> (zones de transition).</li></ul><p><em>Ces associations sont basées sur les caractéristiques climatiques et végétales des différentes régions du Cameroun.</em></p></div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>6) À partir du document 1, relève deux caractéristiques du milieu physique du Cameroun.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Deux caractéristiques du milieu physique du Cameroun sont :<br>1. Un <strong>relief varié</strong> allant des plaines côtières aux hautes terres de l'ouest.<br>2. Un <strong>climat diversifié</strong> avec une zone équatoriale au sud et tropicale au nord [d'après le programme].</div>"
        }
      ]
    },
    {
      "titre": "Vérification des compétences : analyse d'une situation de dégradation environnementale",
      "points": "9 pts",
      "enonce": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Situation-problème :</strong></p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #4caf50; margin: 10px 0; color: #1a1a1a;'><p>En vacances dans ton village, tu remarques que la forêt a presque disparu à cause de l'agriculture sur brûlis et de l'exploitation forestière. Les habitants se plaignent de la diminution des pluies, de la baisse des rendements agricoles et de l'assèchement des cours d'eau. Le chef du village te demande d'expliquer ce problème et de proposer des solutions durables.</p></div><p><strong>Document 1 :</strong> Les causes de la déforestation au Cameroun.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #ff9800; margin: 10px 0; color: #1a1a1a;'><p>« La déforestation au Cameroun est principalement due aux enjeux économiques qui motivent les différents acteurs : l'État, les compagnies forestières et les populations locales. Les causes sont multiples : l'agriculture sur brûlis, l'exploitation commerciale des produits forestiers, les cultures de rente et la recherche de terres agricoles. Cette exploitation se fait au détriment du climat, de l'environnement et de la biodiversité. » <em>Source : www.m.wikipedia.org [citation:3]</em></p></div><p><strong>Document 2 :</strong> Les conséquences de la déforestation.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #f44336; margin: 10px 0; color: #1a1a1a;'><p>« Les conséquences de la déforestation sont nombreuses : hausse de la température, sécheresse, inondations, pollution hydrique, baisse des rendements agricoles, disparition d'espèces animales et végétales, et conflits entre les populations pour l'accès aux ressources. » <em>Source : www.m.wikipedia.org [citation:3]</em></p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>7) Identifie le problème posé dans la situation-problème.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le problème posé est la <strong>déforestation massive</strong> dans le village, due à l'agriculture sur brûlis et à l'exploitation forestière. Cette situation entraîne des conséquences environnementales graves, comme la baisse des pluies, la diminution des rendements agricoles et l'assèchement des cours d'eau. Elle met en danger la survie des populations et la durabilité des ressources naturelles.</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>8) Relève, dans les documents proposés, deux causes et deux conséquences de la déforestation.</div>",
          "reponse": "<div style='color: #1a1a1a;'><p><strong>Causes (document 1) :</strong></p><ul><li>L'<strong>agriculture sur brûlis</strong> pratiquée par les populations.</li><li>L'<strong>exploitation commerciale des produits forestiers</strong> par les compagnies.</li></ul><p><strong>Conséquences (document 2) :</strong></p><ul><li>La <strong>hausse de la température</strong> et l'<strong>assèchement des cours d'eau</strong>.</li><li>La <strong>baisse des rendements agricoles</strong> et la menace sur la biodiversité.</li></ul></div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>9) Propose deux solutions durables pour lutter contre ce problème, en les justifiant.</div>",
          "reponse": "<div style='color: #1a1a1a;'><p><strong>Solution 1 : Promouvoir l'agroforesterie.</strong> Cela consiste à associer les arbres aux cultures pour protéger les sols, maintenir l'humidité et fournir du bois sans détruire la forêt.</p><p><strong>Solution 2 : Développer des activités économiques alternatives.</strong> Encourager l'éco-tourisme, la transformation locale du bois ou des activités génératrices de revenus pour réduire la pression sur la forêt.</p><p><em>Ces solutions permettent de concilier développement économique et protection de l'environnement.</em></p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
