<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Les Transports au Cameroun",
    "contenu": "<div style='text-align: center; padding: 20px;'><h1 style='font-size: 2.2em; color: #3498DB;'>🚗 LES TRANSPORTS AU CAMEROUN</h1><h2 style='font-size: 1.3em; color: #2C3E50;'>Les moteurs du développement économique</h2><p style='font-size: 1.1em; margin-top: 20px;'>Les transports jouent un rôle essentiel dans l'économie camerounaise. Ils permettent la circulation des personnes, des marchandises et des services.</p><div style='margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;'><div style='background-color: #2ECC71; padding: 12px 20px; border-radius: 12px; color: white;'>🚛 Routier</div><div style='background-color: #E74C3C; padding: 12px 20px; border-radius: 12px; color: white;'>🚂 Ferroviaire</div><div style='background-color: #3498DB; padding: 12px 20px; border-radius: 12px; color: white;'>🚢 Maritime</div><div style='background-color: #F39C12; padding: 12px 20px; border-radius: 12px; color: white;'>✈️ Aérien</div></div></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons parler d'un sujet très important pour le développement du Cameroun : les transports. Les transports sont essentiels car ils permettent aux personnes de se déplacer, aux marchandises de circuler et aux services d'être disponibles. Nous allons découvrir les différents modes de transport au Cameroun, leur rôle dans l'économie, les problèmes qu'ils rencontrent et les solutions pour les améliorer.",
    "note": "Introduction à la leçon sur les transports au Cameroun."
  },
  {
    "titre": "L'Importance des Transports",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #3498DB;'>📊 Pourquoi les transports sont-ils importants ?</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px;'><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><h4 style='color: #3498DB; margin: 0;'>🚛 Déplacement des personnes</h4><p>Les transports permettent aux Camerounais de se déplacer pour le travail, les études, les loisirs et les soins de santé.</p></div><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px;'><h4 style='color: #2ECC71; margin: 0;'>📦 Circulation des marchandises</h4><p>Les transports sont indispensables pour acheminer les produits agricoles, industriels et les matières premières vers les marchés.</p></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px;'><h4 style='color: #E67E22; margin: 0;'>💼 Développement économique</h4><p>Les transports facilitent le commerce, créent des emplois et contribuent à la croissance économique du pays.</p></div><div style='background-color: #F4ECF7; padding: 15px; border-radius: 12px;'><h4 style='color: #9B59B6; margin: 0;'>🌍 Intégration nationale</h4><p>Les transports relient les différentes régions du Cameroun et renforcent l'unité nationale.</p></div></div></div>",
    "texteParle": "Les transports sont importants pour plusieurs raisons. D'abord, ils permettent le déplacement des personnes : les Camerounais se déplacent pour aller travailler, étudier, se soigner ou se divertir. Ensuite, ils assurent la circulation des marchandises : les produits agricoles et industriels doivent être acheminés vers les marchés. Les transports contribuent aussi au développement économique en facilitant le commerce et en créant des emplois. Enfin, ils renforcent l'intégration nationale en reliant les différentes régions du pays.",
    "note": "Présentation de l'importance des transports."
  },
  {
    "titre": "Les Modes de Transport",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #3498DB;'>🚗 Les différents modes de transport</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px; border-left: 6px solid #2ECC71;'><strong>🚛 Transport routier</strong> : Le plus utilisé. Routes, camions, bus, voitures, motos.</div><div style='background-color: #EBF5FB; padding: 12px; border-radius: 8px; border-left: 6px solid #3498DB;'><strong>🚂 Transport ferroviaire</strong> : Train Camrail reliant Douala, Yaoundé, Ngaoundéré.</div><div style='background-color: #FDF2E9; padding: 12px; border-radius: 8px; border-left: 6px solid #E67E22;'><strong>🚢 Transport maritime</strong> : Port de Douala, transport des marchandises par voie maritime.</div><div style='background-color: #F4ECF7; padding: 12px; border-radius: 8px; border-left: 6px solid #9B59B6;'><strong>✈️ Transport aérien</strong> : Aéroports de Douala, Yaoundé, Garoua.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>⛵ Transport fluvial</strong> : Sur les fleuves (Sanaga, Nyong, Bénoué).</div></div></div>",
    "texteParle": "Au Cameroun, on trouve plusieurs modes de transport. Le transport routier est le plus utilisé : ce sont les routes, les camions, les bus, les voitures et les motos. Le transport ferroviaire est assuré par Camrail, le train qui relie Douala à Yaoundé et à Ngaoundéré. Le transport maritime se fait par le port de Douala, qui est le principal port du pays. Le transport aérien est assuré par les aéroports de Douala, Yaoundé et Garoua. Il y a aussi le transport fluvial sur les fleuves comme le Sanaga, le Nyong et la Bénoué.",
    "note": "Présentation des différents modes de transport au Cameroun."
  },
  {
    "titre": "Le Transport Routier",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2ECC71;'>🚛 Le transport routier</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px;'><h4 style='color: #2ECC71; margin: 0;'>Caractéristiques</h4><ul><li><strong>Le plus utilisé</strong> : 90% des déplacements de personnes et de marchandises.</li><li>Réseau routier : environ <strong>80 000 km</strong> de routes.</li><li>Routes bitumées : environ <strong>8 000 km</strong> (10%).</li><li>Routes non bitumées : environ <strong>72 000 km</strong> (90%).</li></ul></div><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><h4 style='color: #3498DB; margin: 0;'>Les acteurs</h4><ul><li>Les <strong>compagnies de transport</strong> interurbain.</li><li>Les <strong>taxis</strong> et motos-taxis (<strong>\"bendskine\"</strong>).</li><li>Les <strong>camions</strong> pour le transport des marchandises.</li></ul></div></div></div>",
    "texteParle": "Le transport routier est de loin le plus utilisé au Cameroun. Il représente environ 90% des déplacements de personnes et de marchandises. Le réseau routier camerounais compte environ 80 000 kilomètres de routes. Mais seulement 10% de ces routes sont bitumées, soit environ 8 000 kilomètres. Les 90% restants sont des routes en terre, souvent en mauvais état. Les principaux acteurs sont les compagnies de transport interurbain, les taxis et les motos-taxis qu'on appelle 'bendskine', ainsi que les camions qui transportent les marchandises.",
    "note": "Présentation détaillée du transport routier."
  },
  {
    "titre": "Le Transport Ferroviaire",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #3498DB;'>🚂 Le transport ferroviaire</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><h4 style='color: #3498DB; margin: 0;'>Caractéristiques</h4><ul><li>Réseau géré par <strong>Camrail</strong>.</li><li>Ligne principale : <strong>Douala - Yaoundé - Ngaoundéré</strong> (1 100 km).</li><li>Lignes secondaires : Mbanga - Kumba, Douala - Bassa.</li><li>Assure le transport des personnes et des marchandises.</li></ul></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px;'><h4 style='color: #E67E22; margin: 0;'>Rôle économique</h4><ul><li>Transport des <strong>produits agricoles</strong> (coton, cacao, café) vers le port de Douala.</li><li>Transport des <strong>produits pétroliers</strong>.</li><li>Transport des <strong>passagers</strong> entre les grandes villes.</li></ul></div></div></div>",
    "texteParle": "Le transport ferroviaire est assuré par la société Camrail. La ligne principale relie Douala à Yaoundé et à Ngaoundéré, sur une distance d'environ 1 100 kilomètres. Il y a aussi des lignes secondaires comme Mbanga à Kumba. Le train assure le transport des personnes et des marchandises. Il joue un rôle économique important en transportant les produits agricoles comme le coton, le cacao et le café vers le port de Douala. Il transporte aussi des produits pétroliers et des passagers entre les grandes villes.",
    "note": "Présentation détaillée du transport ferroviaire."
  },
  {
    "titre": "Le Transport Maritime",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E67E22;'>🚢 Le transport maritime</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px;'><h4 style='color: #E67E22; margin: 0;'>Caractéristiques</h4><ul><li><strong>Port de Douala</strong> : principal port du Cameroun (90% du trafic).</li><li>Port de <strong>Kribi</strong> : en développement (terminal minéralier).</li><li>Port de <strong>Limbé</strong> : port pétrolier.</li><li>Port de <strong>Garoua</strong> : port fluvial sur la Bénoué.</li></ul></div><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><h4 style='color: #3498DB; margin: 0;'>Rôle économique</h4><ul><li>Les ports sont la <strong>porte d'entrée</strong> et de sortie des marchandises.</li><li>Le port de Douala est le <strong>principal port</strong> d'Afrique centrale.</li><li>Assure l'<strong>exportation</strong> des produits camerounais (cacao, café, coton, bois, pétrole).</li><li>Permet l'<strong>importation</strong> des produits de consommation (véhicules, machines, alimentation).</li></ul></div></div></div>",
    "texteParle": "Le transport maritime est essentiel pour le commerce international du Cameroun. Le port de Douala est le principal port du pays, avec environ 90% du trafic maritime. Il y a aussi le port de Kribi, qui est en développement, et le port de Limbé, qui est un port pétrolier. Le port de Garoua est un port fluvial sur la Bénoué. Les ports sont la porte d'entrée et de sortie des marchandises. Ils permettent d'exporter les produits camerounais comme le cacao, le café, le coton, le bois et le pétrole, et d'importer les produits de consommation comme les véhicules, les machines et l'alimentation.",
    "note": "Présentation détaillée du transport maritime."

  {
    "titre": "Le Transport Aérien",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #9B59B6;'>✈️ Le transport aérien</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #F4ECF7; padding: 15px; border-radius: 12px;'><h4 style='color: #9B59B6; margin: 0;'>Les aéroports</h4><ul><li><strong>Aéroport international de Douala</strong> : principal aéroport (90% du trafic).</li><li><strong>Aéroport international de Yaoundé-Nsimalen</strong> : 2e aéroport.</li><li><strong>Aéroport de Garoua</strong> : dessert le nord du pays.</li><li>Plusieurs aérodromes régionaux (Maroua, Bafoussam, Ngaoundéré, etc.).</li></ul></div><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><h4 style='color: #3498DB; margin: 0;'>Rôle</h4><ul><li>Assure les liaisons <strong>internes</strong> et <strong>internationales</strong>.</li><li>Facilite le <strong>tourisme</strong> et les <strong>affaires</strong>.</li><li>Compagnies : Camair-Co, Air France, Brussels Airlines, etc.</li></ul></div></div></div>",
    "texteParle": "Le transport aérien est assuré par plusieurs aéroports. L'aéroport international de Douala est le principal, avec environ 90% du trafic. Il y a aussi l'aéroport international de Yaoundé-Nsimalen et l'aéroport de Garoua. Il existe également plusieurs aérodromes régionaux. Le transport aérien assure les liaisons internes entre les villes du Cameroun et les liaisons internationales vers l'étranger. Il facilite le tourisme et les affaires. Les principales compagnies qui opèrent au Cameroun sont Camair-Co, Air France, Brussels Airlines et d'autres.",
    "note": "Présentation détaillée du transport aérien."
  },
  {
    "titre": "Le Transport Fluvial",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>⛵ Le transport fluvial</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px;'><h4 style='color: #E74C3C; margin: 0;'>Caractéristiques</h4><ul><li>Transport sur les fleuves : <strong>Sanaga, Nyong, Bénoué, Logone</strong>.</li><li>Utilisation de <strong>bateaux traditionnels</strong> (pirogues) et de <strong>bateaux à moteur</strong>.</li><li>Principalement pour le <strong>transport des personnes</strong> et des <strong>marchandises</strong>.</li></ul></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px;'><h4 style='color: #E67E22; margin: 0;'>Importance</h4><ul><li>Important dans les régions où les routes sont <strong>difficiles</strong>.</li><li>Permet le transport des <strong>produits agricoles</strong> et des <strong>passagers</strong>.</li><li>Sur la Bénoué, permet la liaison entre Garoua et la région du Tchad.</li></ul></div></div></div>",
    "texteParle": "Le transport fluvial se pratique sur les fleuves comme le Sanaga, le Nyong, la Bénoué et le Logone. On utilise des bateaux traditionnels comme les pirogues, ainsi que des bateaux à moteur. Ce mode de transport est surtout utilisé pour le transport des personnes et des marchandises. Il est très important dans les régions où les routes sont difficiles ou inexistantes. La navigation sur la Bénoué permet de relier Garoua à la région du Tchad.",
    "note": "Présentation détaillée du transport fluvial."

  {

    "contenu": "<div style='padding: 15px;'><h3 style='color: #3498DB;'>📈 L'impact économique des transports</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px;'><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px;'><h4 style='color: #2ECC71; margin: 0;'>✅ Facilitation du commerce</h4><ul><li>Transport des <strong>produits agricoles</strong> vers les marchés.</li><li>Transport des <strong>produits industriels</strong> vers les consommateurs.</li><li>Exportation vers les marchés internationaux.</li></ul></div><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><h4 style='color: #3498DB; margin: 0;'>✅ Création d'emplois</h4><ul><li>Chauffeurs, mécaniciens, agents de voyage.</li><li>Personnels portuaires, aéroportuaires.</li><li>Activités induites (restauration, hôtellerie).</li></ul></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px;'><h4 style='color: #E67E22; margin: 0;'>✅ Contribution au PIB</h4><ul><li>Le secteur des transports contribue à environ <strong>5% du PIB</strong>.</li><li>Source importante de <strong>recettes fiscales</strong> (taxes, péages).</li></ul></div><div style='background-color: #F4ECF7; padding: 15px; border-radius: 12px;'><h4 style='color: #9B59B6; margin: 0;'>✅ Désenclavement des régions</h4><ul><li>Les transports relient les régions isolées au reste du pays.</li><li>Facilitent l'accès aux services de base (éducation, santé).</li></ul></div></div></div>",

  {
    "titre": "Les Problèmes des Infrastructures Routières",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>⚠️ Les problèmes du transport routier</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>🛣️ Mauvais état des routes</strong> : 90% des routes ne sont pas bitumées, en mauvais état surtout en saison des pluies.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>🚦 Insuffisance des infrastructures</strong> : peu de routes bitumées, manque de ponts, de signalisation.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>💥 Insécurité routière</strong> : nombreux accidents, souvent mortels.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>💰 Coût élevé du transport</strong> : à cause de l'état des routes et du prix du carburant.</div></div></div>",
    "texteParle": "Le transport routier au Cameroun connaît de nombreux problèmes. Le premier est le mauvais état des routes : 90% des routes ne sont pas bitumées et sont en mauvais état, surtout pendant la saison des pluies. Il y a aussi une insuffisance des infrastructures : peu de routes bitumées, manque de ponts et de signalisation. L'insécurité routière est un problème majeur avec de nombreux accidents, souvent mortels. Enfin, le coût du transport est élevé à cause de l'état des routes et du prix du carburant.",

  {
    "titre": "Les Problèmes du Transport Ferroviaire",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>⚠️ Les problèmes du transport ferroviaire</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>🚂 Vétusté du matériel roulant</strong> : trains vieillissants, souvent en panne.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>🛤️ Voies ferrées dégradées</strong> : rails usés, trajets longs.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>⏰ Retards fréquents</strong> : non-respect des horaires.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px; border-left: 6px solid #E74C3C;'><strong>🔒 Problèmes de sécurité</strong> : vols sur les trains, vandalisme.</div></div></div>",
    "texteParle": "Le transport ferroviaire a aussi ses problèmes. Le matériel roulant est vieillissant, les trains sont souvent en panne. Les voies ferrées sont dégradées, les rails usés, ce qui rend les trajets longs. Les retards sont fréquents et les horaires ne sont pas toujours respectés. Enfin, il y a des problèmes de sécurité comme les vols sur les trains et le vandalisme. Ces problèmes réduisent l'attractivité du train pour les passagers et les marchandises.",

  {
    "titre": "Les Problèmes du Transport Maritime et Aérien",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>⚠️ Autres problèmes de transport</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px;'><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px;'><h4 style='color: #E74C3C; margin: 0;'>🚢 Transport maritime</h4><ul><li><strong>Saturation du port de Douala</strong> : engorgement, lenteur des opérations.</li><li><strong>Manque d'infrastructures portuaires</strong> : équipements insuffisants.</li><li><strong>Coûts élevés</strong> : frais portuaires, taxes.</li><li><strong>Piraterie</strong> dans le golfe de Guinée.</li></ul></div><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px;'><h4 style='color: #E74C3C; margin: 0;'>✈️ Transport aérien</h4><ul><li><strong>Coût élevé des billets</strong> : peu accessible pour la plupart des Camerounais.</li><li><strong>Flotte vieillissante</strong> : avions anciens (Camair-Co).</li><li><strong>Desserte limitée</strong> : peu de vols internes.</li><li><strong>Concurrence étrangère</strong> : compagnies étrangères dominent le marché.</li></ul></div></div></div>",
    "texteParle": "Les autres modes de transport connaissent aussi des problèmes. Pour le transport maritime, le port de Douala est saturé, ce qui cause de l'engorgement et des lenteurs. Les équipements portuaires sont insuffisants et les coûts sont élevés. La piraterie dans le golfe de Guinée est aussi une menace. Pour le transport aérien, les billets sont chers et peu accessibles. La flotte de la compagnie nationale Camair-Co est vieillissante. La desserte interne est limitée et les compagnies étrangères dominent le marché.",
    "note": "Présentation des problèmes du transport maritime et aérien."

  {
    "titre": "Les Solutions pour Améliorer les Transports",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2ECC71;'>💡 Les solutions envisagées</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px; border-left: 6px solid #2ECC71;'><strong>🛣️ Amélioration des routes</strong> : bitumage des routes principales, entretien régulier.</div><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px; border-left: 6px solid #2ECC71;'><strong>🚂 Modernisation du chemin de fer</strong> : rénovation des voies et du matériel roulant.</div><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px; border-left: 6px solid #2ECC71;'><strong>🚢 Développement des ports</strong> : extension du port de Douala, développement de Kribi.</div><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px; border-left: 6px solid #2ECC71;'><strong>✈️ Renforcement du transport aérien</strong> : rénovation de la flotte, amélioration de la desserte.</div><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px; border-left: 6px solid #2ECC71;'><strong>📊 Sécurité routière</strong> : sensibilisation, contrôle, aménagement des routes.</div></div></div>",
    "texteParle": "Pour améliorer les transports au Cameroun, plusieurs solutions sont envisagées. D'abord, l'amélioration des routes avec le bitumage des routes principales et un entretien régulier. Ensuite, la modernisation du chemin de fer avec la rénovation des voies et du matériel roulant. Il faut aussi développer les ports en étendant le port de Douala et en développant celui de Kribi. Le transport aérien doit être renforcé avec une rénovation de la flotte et une meilleure desserte. Enfin, la sécurité routière doit être améliorée par la sensibilisation, le contrôle et l'aménagement des routes.",
    "note": "Présentation des solutions pour améliorer les transports."
  },
  {
    "titre": "Les Projets d'Infrastructures",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #3498DB;'>🏗️ Les grands projets en cours</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #EBF5FB; padding: 12px; border-radius: 8px; border-left: 6px solid #3498DB;'><strong>🛣️ Autoroute Yaoundé-Douala</strong> : en construction, pour réduire le temps de trajet.</div><div style='background-color: #EBF5FB; padding: 12px; border-radius: 8px; border-left: 6px solid #3498DB;'><strong>🚢 Port en eau profonde de Kribi</strong> : en développement, pour désengorger Douala.</div><div style='background-color: #EBF5FB; padding: 12px; border-radius: 8px; border-left: 6px solid #3498DB;'><strong>🚂 Réhabilitation du chemin de fer</strong> : modernisation de la ligne Douala-Ngaoundéré.</div><div style='background-color: #EBF5FB; padding: 12px; border-radius: 8px; border-left: 6px solid #3498DB;'><strong>✈️ Rénovation des aéroports</strong> : extension de Douala et Yaoundé-Nsimalen.</div></div></div>",
    "texteParle": "Des projets d'infrastructures sont en cours pour améliorer les transports au Cameroun. L'autoroute Yaoundé-Douala est en construction pour réduire le temps de trajet entre les deux principales villes. Le port en eau profonde de Kribi est en développement pour désengorger le port de Douala. La réhabilitation du chemin de fer permet de moderniser la ligne Douala-Ngaoundéré. Enfin, les aéroports de Douala et de Yaoundé-Nsimalen sont en cours d'extension pour améliorer le transport aérien.",
    "note": "Présentation des grands projets d'infrastructures en cours."
  },
  {
    "titre": "Résumé de la Leçon",
    "contenu": "<div style='padding: 15px;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px;'><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; text-align: center; border: 3px solid #2ECC71;'><h4 style='color: #2ECC71;'>🚛 Transport Routier</h4><ul style='list-style-type: none; padding: 0; text-align: left;'><li>90% des déplacements</li><li>80 000 km de routes</li><li>10% bitumées</li></ul></div><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px; text-align: center; border: 3px solid #3498DB;'><h4 style='color: #3498DB;'>;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
