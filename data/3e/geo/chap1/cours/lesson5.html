<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Les basses terres du nord et les monts Mandara",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h2 style='color: #2c3e50; text-align: center;'>🏜️ Les basses terres du nord et les monts Mandara</h2><div style='background: #e8f4f8; padding: 20px; border-radius: 10px; text-align: center; margin: 20px 0;'><p style='font-size: 1.2rem; margin: 0;'>📌 Une région contrastée du Cameroun septentrional</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; border-left: 5px solid #f39c12;'><p style='margin: 0;'><strong>🎯 Objectifs de la leçon :</strong></p><ul style='margin: 5px 0 0 0;'><li>Localiser les basses terres du nord et les monts Mandara</li><li>Décrire leur relief, hydrographie, climat et végétation</li><li>Expliquer les formes de dégradation et les moyens de protection</li></ul></div></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons étudier une région très particulière du Cameroun : les basses terres du nord et les monts Mandara. Cette région se trouve dans la partie septentrionale du pays. Elle présente des contrastes saisissants entre les plaines arides et les montagnes escarpées. Nous allons découvrir son relief, son climat, sa végétation, ainsi que les problèmes environnementaux et les solutions pour protéger ce milieu fragile.",
    "note": "Le Cameroun septentrional est une région aux paysages contrastés."
  },
  {
    "titre": "Localisation et limites",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>📍 Localisation et limites</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Les basses terres du nord et les monts Mandara sont situées dans <strong>l'Extrême-Nord et le Nord du Cameroun</strong>.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 120px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Au nord</strong><br>Frontière avec le Nigeria</p></div><div style='flex: 1; min-width: 120px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>À l'est</strong><br>Frontière avec le Tchad</p></div><div style='flex: 1; min-width: 120px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>À l'ouest</strong><br>Frontière avec le Nigeria</p></div><div style='flex: 1; min-width: 120px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #8e44ad;'><p style='margin: 0;'><strong>Au sud</strong><br>Région de l'Adamaoua</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Cette région est la <strong>plus aride</strong> du Cameroun. Elle est marquée par un climat sec et des paysages de savane.</p></div></div>",
    "texteParle": "Les basses terres du nord et les monts Mandara se trouvent dans l'Extrême-Nord et le Nord du Cameroun. Cette région est bordée par deux pays voisins : le Nigeria à l'ouest et au nord, et le Tchad à l'est. La frontière sud est marquée par la région de l'Adamaoua. C'est la région la plus sèche du Cameroun, avec un climat aride et des paysages de savane. Cette situation géographique influence fortement les activités humaines et les conditions de vie.",
    "note": "L'Extrême-Nord est la région la plus peuplée du Cameroun."
  },
  {
    "titre": "Le relief",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>⛰️ Le relief</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le relief de la région se compose de <strong>deux grandes unités</strong> :</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>1. Les basses terres du nord</strong><br>Ce sont de vastes plaines situées entre 200 et 400 mètres d'altitude. Elles sont traversées par le fleuve Bénoué et ses affluents. Ces plaines sont propices à l'agriculture et à l'élevage.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>2. Les monts Mandara</strong><br>Ce sont des reliefs montagneux qui culminent à plus de 1 400 mètres d'altitude. Ils forment une barrière naturelle entre le Cameroun et le Nigeria. Les pentes sont raides et les sols souvent pauvres.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 Les monts Mandara sont une <strong>chaîne de montagnes anciennes</strong> qui s'étend du nord au sud.</p></div></div>",
    "texteParle": "Le relief de cette région est très varié. On distingue deux grandes unités. D'abord, les basses terres du nord, qui sont de vastes plaines situées entre 200 et 400 mètres d'altitude. Ces plaines sont traversées par le fleuve Bénoué. Ensuite, les monts Mandara, qui sont des montagnes escarpées culminant à plus de 1 400 mètres. Ces montagnes forment une barrière naturelle entre le Cameroun et le Nigeria. Les pentes y sont raides et les sols souvent pauvres.",
    "note": "Les monts Mandara sont habités par les populations Mafa, Kapsiki et Podoko."
  },
  {
    "titre": "L'hydrographie",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>💧 L'hydrographie</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le réseau hydrographique de la région est <strong>peu dense</strong> en raison du climat sec.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Fleuve Bénoué</strong><br>Principal cours d'eau, il traverse la région du nord au sud.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Lac Tchad</strong><br>Bord oriental de la région, il est partagé avec le Tchad, le Niger et le Nigeria.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>⚠️ La plupart des cours d'eau sont <strong>temporaires</strong> et assèchent pendant la saison sèche.</p></div></div>",
    "texteParle": "Le réseau hydrographique de cette région est peu dense. En effet, le climat sec n'est pas favorable à la formation de nombreux cours d'eau. Le principal fleuve est le Bénoué, qui traverse la région du nord au sud. À l'est, on trouve le lac Tchad, un grand lac partagé avec le Tchad, le Niger et le Nigeria. Cependant, la plupart des cours d'eau sont temporaires. Ils ne contiennent de l'eau que pendant la saison des pluies et s'assèchent complètement pendant la longue saison sèche.",
    "note": "Le fleuve Bénoué est le principal affluent du fleuve Niger."
  },
  {
    "titre": "Le climat",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>☀️ Le climat</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La région connaît un <strong>climat tropical sec</strong> de type sahélien.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Températures</strong><br>Élevées toute l'année : moyenne de 28°C à 32°C.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Précipitations</strong><br>Faibles : entre 600 et 900 mm par an.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La région est marquée par deux saisons : une <strong>longue saison sèche</strong> (9 mois) et une <strong>courte saison des pluies</strong> (3 mois).</p></div></div>",
    "texteParle": "Cette région est caractérisée par un climat tropical sec, de type sahélien. Les températures sont élevées toute l'année, avec une moyenne de 28 à 32 degrés. Les précipitations sont faibles, entre 600 et 900 millimètres par an. La région connaît deux saisons : une longue saison sèche qui dure environ neuf mois, et une courte saison des pluies qui ne dure que trois mois. Cette sécheresse prolongée a des conséquences importantes sur la végétation, les activités agricoles et la vie des populations.",
    "note": "Les températures peuvent dépasser 40°C pendant la saison sèche."
  },
  {
    "titre": "La végétation",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🌿 La végétation</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La végétation est celle de la <strong>savane sahélienne</strong>, adaptée à la sécheresse.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Savane arborée</strong><br>Dans les zones moins sèches, avec des arbres comme le karité et le néré.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Steppe</strong><br>Dans les zones très arides, avec des épineux et des herbes rares.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Les arbres sont souvent <strong>rabougris</strong> et les herbes <strong>dispersées</strong> en raison du manque d'eau.</p></div></div>",
    "texteParle": "La végétation de cette région est typique de la savane sahélienne, c'est-à-dire une végétation adaptée à la sécheresse. Dans les zones où il pleut un peu plus, on trouve une savane arborée avec des arbres comme le karité et le néré. Ces arbres produisent des fruits et des noix qui sont très utiles pour les populations. Dans les zones très arides, la végétation est une steppe, avec seulement quelques épineux et des herbes clairsemées. Les arbres sont souvent rabougris et les herbes sont dispersées à cause du manque d'eau.",

  {
    "titre": "La dégradation du milieu",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>⚠️ La dégradation du milieu</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La région est confrontée à plusieurs formes de dégradation environnementale.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>1. Désertification</strong><br>Avancée du désert vers le sud à cause de la sécheresse prolongée et des activités humaines.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>2. Déforestation</strong><br>Coupe abusive des arbres pour le bois de chauffe, la construction et l'agriculture.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #8e44ad;'><p style='margin: 0;'><strong>3. Érosion des sols</strong><br>Lessivage des sols par les pluies torrentielles et les vents violents.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>⚠️ Ces phénomènes sont aggravés par la <strong>pression démographique</strong> et le <strong>surpâturage</strong>.</p></div></div>",
    "texteParle": "Cette région fragile est confrontée à de graves problèmes de dégradation environnementale. Le premier est la désertification, c'est-à-dire l'avancée du désert vers le sud. Ce phénomène est causé par la sécheresse et les activités humaines. Ensuite, il y a la déforestation : les arbres sont coupés pour le bois de chauffe, la construction et pour faire place à l'agriculture. Enfin, l'érosion des sols est causée par les pluies torrentielles et les vents violents. Tous ces problèmes sont aggravés par la pression démographique et le surpâturage.",

  {
    "titre": "Les causes de la dégradation",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔍 Les causes de la dégradation</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La dégradation du milieu a plusieurs causes, <strong>naturelles et humaines</strong>.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Causes naturelles</strong><br>- Sécheresse prolongée<br>- Vents violents<br>- Pluies torrentielles</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Causes humaines</strong><br>- Déforestation<br>- Surpâturage<br>- Pratiques agricoles inadaptées<br>- Pression démographique</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 Les activités humaines <strong>accentuent</strong> les phénomènes naturels.</p></div></div>",
    "texteParle": "Les causes de la dégradation du milieu sont à la fois naturelles et humaines. Les causes naturelles incluent la sécheresse prolongée, les vents violents et les pluies torrentielles. Les causes humaines sont nombreuses : la déforestation pour le bois de chauffe, le surpâturage qui détruit la végétation, les pratiques agricoles inadaptées comme la culture sur brûlis, et la pression démographique qui augmente les besoins en terres et en ressources. Les activités humaines accentuent les phénomènes naturels, ce qui accélère la dégradation du milieu.",

  {
    "titre": "Les moyens de protection",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🌱 Les moyens de protection</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Plusieurs actions peuvent être menées pour <strong>protéger</strong> ce milieu fragile.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>1. Reboisement</strong><br>Planter des arbres pour lutter contre la désertification et la déforestation.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>2. Gestion durable des ressources</strong><br>Utiliser le bois de façon raisonnée et promouvoir les énergies alternatives.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>3. Lutte contre l'érosion</strong><br>Construire des digues et adopter des techniques agricoles adaptées.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #8e44ad;'><p style='margin: 0;'><strong>4. Sensibilisation</strong><br>Éduquer les populations sur les enjeux environnementaux.</p></div></div></div>",
    "texteParle": "Pour lutter contre la dégradation de ce milieu, plusieurs actions peuvent être menées. D'abord, le reboisement : planter des arbres est essentiel pour lutter contre la désertification et la déforestation. Ensuite, la gestion durable des ressources : il faut utiliser le bois de façon raisonnée et promouvoir les énergies alternatives comme les foyers améliorés ou le gaz. Il faut aussi lutter contre l'érosion en construisant des digues et en adoptant des techniques agricoles adaptées comme le zai ou les cordons pierreux. Enfin, il est important de sensibiliser les populations à l'importance de la protection de l'environnement.",
    "note": "La technique du 'zai' permet de cultiver dans des sols dégradés."
  },
  {
    "titre": "Les solutions durables",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🌍 Les solutions durables</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Pour un <strong>développement durable</strong> de la région, plusieurs solutions sont possibles.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Agriculture durable</strong><br>Adopter des techniques comme le zai et le paillage pour protéger les sols.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Énergies renouvelables</strong><br>Promouvoir l'énergie solaire, l'éolien et les foyers améliorés.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Conservation de l'eau</strong><br>Construire des barrages et des retenues d'eau pour la saison sèche.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 La <strong>coopération régionale</strong> avec les pays voisins est également essentielle.</p></div></div>",
    "texteParle": "Pour un développement durable de la région, il faut adopter des solutions durables. Dans l'agriculture, il faut utiliser des techniques comme le zai et le paillage pour protéger les sols. Il faut promouvoir les énergies renouvelables comme l'énergie solaire, l'énergie éolienne et les foyers améliorés qui consomment moins de bois. Il est aussi important de conserver l'eau en construisant des barrages et des retenues d'eau pour la saison sèche. Enfin, une coopération régionale avec les pays voisins est essentielle pour gérer les ressources communes comme le lac Tchad.",
    "note": "Le lac Tchad est menacé par la sécheresse et la surexploitation."
  },
  {
    "titre": "Le rôle des populations",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>👨‍🌾 Le rôle des populations</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Les populations locales sont <strong>les premières actrices</strong> de la protection de l'environnement.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Organisation communautaire</strong><br>Créer des comités de gestion forestière et de lutte contre les feux de brousse.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Formation</strong><br>Apprendre aux populations des techniques agricoles durables.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Promotion des activités alternatives</strong><br>Encourager d'autres sources de revenus pour réduire la pression sur l'environnement.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 L'implication des populations est <strong>indispensable</strong> pour la réussite des actions de protection.</p></div></div>",
    "texteParle": "Les populations locales jouent un rôle essentiel dans la protection de l'environnement. Elles sont les premières concernées par la dégradation du milieu, mais aussi les premières actrices du changement. Il est important de les organiser en comités de gestion forestière et de lutte contre les feux de brousse. Il faut aussi les former aux techniques agricoles durables pour qu'elles puissent cultiver sans détruire le sol. Enfin, il est nécessaire de promouvoir des activités alternatives pour réduire la pression sur l'environnement, comme l'artisanat ou le petit commerce.",
    "note": "Les femmes sont souvent les premières victimes de la dégradation de l'environnement."
  },
  {
    "titre": "Les perspectives d'avenir",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔮 Les perspectives d'avenir</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>L'avenir de la région dépend de la <strong>mobilisation de tous</strong> pour un développement durable.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Réussites possibles</strong><br>- Stabilisation des sols<br>- Retour de la végétation<br>- Amélioration des conditions de vie</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Défis à relever</strong><br>- Poursuite de la sécheresse<br>- Pression démographique<br>- Manque de moyens financiers</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 L'<strong>espoir</strong> réside dans la volonté des populations et l'aide de l'État et des partenaires internationaux.</p></div></div>",
    "texteParle": "L'avenir de cette région dépend de la mobilisation de tous. Plusieurs réussites sont possibles : la stabilisation des sols, le retour de la végétation et l'amélioration des conditions de vie des populations. Mais il y a aussi des défis à relever : la poursuite de la sécheresse, la pression démographique et le manque de moyens financiers. L'espoir réside dans la volonté des populations, le soutien de l'État et l'aide des partenaires internationaux. Avec une action collective, il est possible d'inverser la tendance et de construire un avenir meilleur pour cette région.",
    "note": "Les pays du Sahel ont lancé la Grande Muraille Verte pour lutter contre la désertification."
  },
  {
    "titre": "Synthèse",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>📝 Synthèse</h3><div style='background: #2c3e50; color: white; padding: 15px; border-radius: 10px; margin: 10px 0; text-align: center;'><p style='font-size: 1.2rem; margin: 0;'>Ce qu'il faut retenir</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 120px; background: #d5f5e3; padding: 12px; border-radius: 8px;'><p style='margin: 0;'><strong>📍 Localisation</strong><br>Extrême-Nord et Nord du Cameroun</p></div><div style='flex: 1; min-width: 120px; background: #d5f5e3; padding: 12px; border-radius: 8px;'><p style='margin: 0;'><strong>⛰️ Relief</strong><br>Plaines et monts Mandara</p></div><div style='flex: 1; min-width: 120px; background: #d5f5e3; padding: 12px; border-radius: 8px;'><p style='margin: 0;'><strong>☀️ Climat</strong><br>Tropical sec (sahélien)</p></div><div style='flex: 1; min-width: 120;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
