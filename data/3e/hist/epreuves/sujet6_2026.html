<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Troisième",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "EXERCICE I : MAÎTRISE DES CONNAISSANCES (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Réponds par Vrai ou Faux aux affirmations suivantes. Justifie ta réponse en une phrase.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>1.</span> La conférence de Berlin (1884-1885) a été organisée par les puissances africaines pour se partager l'Europe.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Faux.</span> La conférence de Berlin a été organisée par les puissances européennes, sous l'impulsion de Bismarck, pour se partager l'Afrique et régler leurs rivalités coloniales.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>2.</span> La résistance des Hereros en Afrique du Sud-Ouest allemande a été réprimée par les Allemands, ce qui a conduit à un génocide.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Vrai.</span> La répression du soulèvement des Hereros (1904-1908) par l'armée allemande est reconnue comme l'un des premiers génocides du XXe siècle.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>3.</span> La révolte des Maji-Maji en Afrique orientale allemande utilisait une eau dite \"maji\" que les combattants croyaient protectrice.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Vrai.</span> Les combattants Maji-Maji utilisaient une eau bénite, appelée \"maji\", qu'ils pensaient pouvoir les protéger des balles des colons.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>4.</span> Rudolf Manga Bell fut un chef de résistance au Cameroun, arrêté et exécuté par les Français en 1914.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Faux.</span> Rudolf Manga Bell a été arrêté et exécuté par les <strong>Allemands</strong>, et non par les Français, en 1914 pour avoir dénoncé les abus coloniaux.</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE II : APPLICATION DES CONNAISSANCES (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Relie chaque résistance à son lieu ou à son leader en écrivant la lettre correspondante dans le tableau.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 20px; color: #1a1a2e;'><p><strong>Résistances :</strong></p><ul style='list-style: none; padding-left: 5px;'><li style='margin-bottom: 5px;'>1. Maji-Maji</li><li style='margin-bottom: 5px;'>2. Hereros</li><li style='margin-bottom: 5px;'>3. Samori Touré</li><li style='margin-bottom: 5px;'>4. Manga Bell</li><li style='margin-bottom: 5px;'>5. Roi Njoya</li></ul><p style='margin-top: 15px;'><strong>Lieux / Leaders :</strong></p><ul style='list-style: none; padding-left: 5px;'><li style='margin-bottom: 5px;'>A. Adamaoua (Cameroun)</li><li style='margin-bottom: 5px;'>B. Cameroun (Duala)</li><li style='margin-bottom: 5px;'>C. Afrique orientale allemande</li><li style='margin-bottom: 5px;'>D. Afrique du Sud-Ouest allemande</li><li style='margin-bottom: 5px;'>E. Afrique de l'Ouest</li></ul></div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><table style='width: 100%; border-collapse: collapse; color: #1a3c34;'><thead><tr style='background: #d4e2c0;'><th style='padding: 6px; border: 1px solid #a0b88a;'>Résistance</th><th style='padding: 6px; border: 1px solid #a0b88a;'>Réponse</th></tr></thead><tbody><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>1. Maji-Maji</td><td style='padding: 6px; border: 1px solid #a0b88a;'>C</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>2. Hereros</td><td style='padding: 6px; border: 1px solid #a0b88a;'>D</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>3. Samori Touré</td><td style='padding: 6px; border: 1px solid #a0b88a;'>E</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>4. Manga Bell</td><td style='padding: 6px; border: 1px solid #a0b88a;'>B</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>5. Roi Njoya</td><td style='padding: 6px; border: 1px solid #a0b88a;'>A</td></tr></tbody></table></div>"
        }
      ]
    },
    {
      "titre": "EXERCICE III : ANALYSE DE DOCUMENT (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Lis attentivement le document ci-dessous, puis réponds aux questions.</p><div style='background: #f0f3f9; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #2c3e50; color: #1a1a2e;'><p style='font-style: italic; margin: 0;'>\"Nous, chefs et notables du peuple Duala, avons vu nos terres et nos droits bafoués par l'administration coloniale. Nous refusons de payer l'impôt injuste et demandons la restitution de nos terres ancestrales. Nous ne voulons pas la guerre, mais nous ne pouvons accepter l'injustice. Nous voulons que nos enfants puissent vivre libres et dans la dignité.\"</p><p style='text-align: right; margin-top: 5px;'><strong>— Rudolf Manga Bell</strong>, 1913 (Adapté)</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>1.</span> D'après le document, quelles sont les principales causes de la résistance de Manga Bell ? (Cite deux causes).</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Les principales causes sont : <strong>la spoliation des terres</strong> et <strong>l'impôt injuste</strong> imposé par l'administration coloniale.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>2.</span> Quel type de résistance Manga Bell privilégie-t-il d'après ce document ?</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Manga Bell privilégie une forme de <strong>résistance légale et pacifique</strong> (ou diplomatique), bien qu'il menace de ne pas payer l'impôt. Il refuse la guerre mais dénonce fermement l'injustice.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>3.</span> En quoi ce discours montre-t-il que la résistance est aussi une lutte pour la dignité des Africains ?</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Le discours montre que la lutte ne vise pas seulement des intérêts matériels mais aussi la <strong>dignité</strong> et la <strong>liberté</strong> des générations futures, comme l'illustre la phrase : \"Nous voulons que nos enfants puissent vivre libres et dans la dignité.\"</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE IV : PRODUCTION ÉCRITE (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> En une dizaine de lignes, rédige un développement construit répondant au sujet suivant :</p><div style='background: #f0f3f9; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #2c3e50; color: #1a1a2e;'><p style='font-weight: bold; margin: 0;'>Sujet : Montre que les résistances des Africains à la colonisation sont diverses et qu'elles expriment le refus de la domination étrangère.</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a2e;'><p style='font-size: 0.95rem; color: #4a4a6a;'><em>Votre production doit comporter une introduction, un développement structuré en paragraphes, et une conclusion.</em></p></div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><p><strong>Éléments de corrigé :</strong></p><ul style='padding-left: 20px;'><li><strong>Introduction :</strong> Présente le contexte de la colonisation et la diversité des réactions africaines.</li><li><strong>Développement :</strong> <ul style='padding-left: 20px;'><li><strong>1. Diversité des formes de résistance :</strong> résistance armée (Samori Touré, Hereros), résistance passive (refus de l'impôt, fuite) et résistance culturelle (Roi Njoya).</li><li><strong>2. Des résistances à différentes échelles :</strong> révoltes locales (Maji-Maji) et luttes nationales (Manga Bell, Ethiopie).</li><li><strong>3. Des causes communes :</strong> défense des terres, des droits et de la dignité face à l'oppression.</li></ul></li><li><strong>Conclusion :</strong> Souligne que ces résistances, bien que souvent vaincues, ont marqué la mémoire collective et préparé les luttes pour l'indépendance.</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
