<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Troisième",
  "sequence": "Séquence 4 : Crises et guerres au XXe siècle, décolonisation et histoire du Cameroun",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Vérification des connaissances : définitions et concepts clés",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Consigne :</strong> Réponds par une définition précise et complète à chacune des questions suivantes. Chaque réponse est notée sur <strong>1,5 point</strong>.</p><p><em>Les notions abordées sont extraites des thèmes de la séquence : les impérialismes, les crises et guerres du XXe siècle, la décolonisation et l'histoire du Cameroun.</em></p></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>1) Définis l'<strong>impérialisme</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>L'<strong>impérialisme</strong> est une politique de domination politique, économique et culturelle exercée par un État sur d'autres territoires ou peuples, souvent dans le but d'exploiter leurs ressources et d'étendre son influence [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>2) Qu'est-ce qu'un <strong>génocide</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Un <strong>génocide</strong> est l'extermination systématique et planifiée d'un groupe humain en raison de son ethnie, de sa nationalité, de sa religion ou de sa race. Il s'agit d'un crime contre l'humanité. L'exemple le plus célèbre est le génocide des juifs par les nazis pendant la Seconde Guerre mondiale [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>3) C'est quoi la <strong>décolonisation</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>La <strong>décolonisation</strong> est le processus par lequel les colonies accèdent à l'indépendance et deviennent des États souverains. Ce mouvement s'est intensifié après la Seconde Guerre mondiale, notamment en Afrique et en Asie [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>4) Définis le <strong>système des mandats</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le <strong>système des mandats</strong> est un système mis en place par la Société des Nations (SDN) après la Première Guerre mondiale pour administrer les colonies des puissances vaincues (Allemagne, Empire ottoman). Les mandats étaient confiés à des puissances victorieuses (France, Royaume-Uni) qui devaient préparer les territoires à l'indépendance [d'après le programme].</div>"
        }
      ]
    },
    {
      "titre": "Analyser une situation historique : la conférence de Berlin et le partage de l'Afrique",
      "points": "7 pts",
      "enonce": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Document :</strong> Extrait sur la Conférence de Berlin (1884-1885).</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #4caf50; margin: 10px 0; color: #1a1a1a;'><p>« La Conférence de Berlin s'est tenue du 15 novembre 1884 au 26 février 1885. Elle a réuni 14 États européens, ainsi que les États-Unis et l'Empire ottoman. Son objectif principal était de régler les rivalités entre les puissances européennes concernant le partage de l'Afrique. Elle a établi le principe de l'occupation effective : un pays ne pouvait revendiquer un territoire que s'il l'occupait effectivement. Cette conférence a accéléré la course aux colonies et a conduit au partage systématique de l'Afrique entre les puissances européennes. »</p><p style='text-align: right;'>— Source : manuel d'histoire, classe de Troisième.</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>5) À partir du document, identifie les objectifs et les principaux acteurs de la Conférence de Berlin.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les objectifs de la Conférence de Berlin étaient de <strong>régler les rivalités entre les puissances européennes</strong> concernant le partage de l'Afrique. Les principaux acteurs étaient les <strong>14 États européens</strong>, les États-Unis et l'Empire ottoman [d'après le document].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>6) Explique le <strong>principe de l'occupation effective</strong> et son importance pour le partage de l'Afrique.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le <strong>principe de l'occupation effective</strong> stipulait qu'un pays ne pouvait revendiquer un territoire que s'il l'occupait effectivement. Ce principe a <strong>accéléré la course aux colonies</strong> car les puissances se sont précipitées pour occuper le plus de territoires possible afin de légitimer leurs revendications. Il a ainsi conduit au <strong>partage systématique de l'Afrique</strong> [d'après le document et le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>7) Quelles ont été les conséquences de cette conférence sur le continent africain ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les conséquences de la Conférence de Berlin pour l'Afrique sont nombreuses :<br>- <strong>Partage arbitraire du continent</strong> : les frontières ont été tracées sans tenir compte des réalités ethniques, linguistiques ou culturelles.<br>- <strong>Exploitation des ressources</strong> : les puissances coloniales ont pillé les richesses de l'Afrique.<br>- <strong>Soumission des populations</strong> : les peuples africains ont été soumis à la domination étrangère, avec des conséquences sociales et humaines désastreuses [d'après le programme].</div>"
        }
      ]
    },
    {
      "titre": "Étude de cas : le Cameroun sous mandat français et britannique",
      "points": "7 pts",
      "enonce": "<div style='background-color: #fdf2e9; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Document :</strong> Le Cameroun après la Première Guerre mondiale.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #ff9800; margin: 10px 0; color: #1a1a1a;'><p>« Après la défaite allemande en 1916, le Cameroun a été partagé entre la France et le Royaume-Uni par l'accord du 4 mars 1916. La France a reçu les quatre cinquièmes du territoire, tandis que le Royaume-Uni a obtenu les deux bandes frontalières du Nigeria, qui seront plus tard réunies pour former le Cameroun septentrional et le Cameroun méridional (Southern Cameroons). Le 20 juillet 1922, la Société des Nations (SDN) a officiellement confié ces territoires sous forme de mandats : la France pour le Cameroun oriental, le Royaume-Uni pour le Cameroun occidental. »</p></div><p><strong>Questions :</strong></p></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>8) Explique comment le Cameroun est passé d'une colonie allemande à un territoire sous mandat après la Première Guerre mondiale.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Après la défaite allemande en 1916, le Cameroun a été <strong>partagé entre la France et le Royaume-Uni</strong> par l'accord du 4 mars 1916. La France a reçu la plus grande partie (les quatre cinquièmes) et le Royaume-Uni a obtenu les deux bandes frontalières du Nigeria. En 1922, la Société des Nations (SDN) a officialisé ce partage en <strong>confiant ces territoires sous forme de mandats</strong> : la France pour le Cameroun oriental, le Royaume-Uni pour le Cameroun occidental [d'après le document et le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>9) Quelles étaient les différences principales entre l'administration française et l'administration britannique au Cameroun ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les différences principales entre les deux administrations étaient :<br>- L'<strong>administration française</strong> pratiquait une <strong>politique d'assimilation</strong> et d'<strong>administration directe</strong>, avec une centralisation forte.<br>- L'<strong>administration britannique</strong> pratiquait le <strong>\"indirect rule\"</strong>, c'est-à-dire qu'elle gouvernait à travers les chefs locaux, ce qui laissait plus d'autonomie aux autorités traditionnelles [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>10) Quelles ont été les conséquences de ce partage sur l'évolution politique du Cameroun ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Ce partage a eu des conséquences majeures :<br>- Il a <strong>divisé le Cameroun</strong> en deux entités distinctes avec des systèmes administratifs, juridiques et éducatifs différents.<br>- Il a créé des <strong>différences de développement</strong> entre les deux parties.<br>- Il a <strong>influencé les processus d'indépendance</strong> : le Cameroun oriental (français) a accédé à l'indépendance en 1960, tandis que le Cameroun occidental (britannique) a été rattaché après un référendum en 1961 [d'après le programme].</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
