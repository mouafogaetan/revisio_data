<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Le paludisme",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h2 style='color: #2c3e50; text-align: center;'>🦟 Le paludisme</h2><div style='background: #e8f4f8; padding: 20px; border-radius: 10px; text-align: center; margin: 20px 0;'><p style='font-size: 1.2rem; margin: 0;'>🩸 Une maladie parasitaire transmise par les moustiques</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; border-left: 5px solid #f39c12;'><p style='margin: 0;'><strong>🎯 Objectifs de la leçon :</strong></p><ul style='margin: 5px 0 0 0;'><li>Définir le paludisme</li><li>Identifier l'agent responsable et le vecteur</li><li>Décrire les symptômes</li><li>Proposer des moyens de lutte</li></ul></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons étudier une maladie très répandue au Cameroun et dans de nombreux pays tropicaux : le paludisme, aussi appelé malaria. C'est une maladie parasitaire grave transmise par la piqûre de certains moustiques. Nous allons voir ce qui cause cette maladie, comment elle se transmet, quels sont ses symptômes et surtout comment on peut la prévenir et la combattre. Cette leçon est importante car le paludisme est une des principales causes de mortalité dans notre pays, en particulier chez les enfants et les femmes enceintes.",
    "note": "Le paludisme est la première cause de mortalité chez les enfants de moins de 5 ans au Cameroun."
  },
  {
    "titre": "Définition du paludisme",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧬 Qu'est-ce que le paludisme ?</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le <strong>paludisme</strong> (ou malaria) est une maladie parasitaire infectieuse due à un parasite du genre <strong>Plasmodium</strong>.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Agent pathogène :</strong> <em>Plasmodium falciparum</em> (la forme la plus dangereuse).</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Vecteur :</strong> le <strong>moustique Anophèle</strong> femelle.</p></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 Le mot \"paludisme\" vient du latin <em>\"palus\"</em> qui signifie \"marais\", car la maladie était autrefois associée aux zones marécageuses.</p></div></div>",
    "texteParle": "Le paludisme est une maladie parasitaire infectieuse. Il est causé par un parasite microscopique appelé Plasmodium. La forme la plus dangereuse est Plasmodium falciparum. Ce parasite est transmis à l'homme par la piqûre d'un moustique, l'Anophèle femelle. Le nom paludisme vient du latin 'palus' qui signifie marais, car la maladie était autrefois associée aux zones marécageuses où ces moustiques se reproduisent. Aujourd'hui, nous savons que le paludisme peut toucher partout où l'Anophèle est présent, surtout dans les régions tropicales et subtropicales.",
    "note": "Seule la femelle du moustique Anophèle transmet le paludisme."
  },
  {
    "titre": "Le cycle de vie du parasite",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔄 Le cycle de vie du parasite</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le cycle du <em>Plasmodium</em> se déroule en <strong>deux phases</strong>.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Phase chez l'homme :</strong> Le parasite se multiplie dans le <strong>foie</strong> puis dans les <strong>globules rouges</strong> (érythrocytes), les détruisant.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Phase chez le moustique :</strong> Le parasite se multiplie dans l'<strong>intestin</strong> du moustique, puis migre vers ses <strong>glandes salivaires</strong>.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Quand le moustique pique un humain, il injecte le parasite contenu dans sa salive, et le cycle recommence.</p></div></div>",
    "texteParle": "Le cycle de vie du Plasmodium est complexe et se déroule en deux phases. Chez l'homme, le parasite pénètre d'abord dans le foie où il se multiplie. Ensuite, il envahit les globules rouges, s'y multiplie et les détruit. C'est cette destruction des globules rouges qui provoque les symptômes du paludisme. Chez le moustique, le parasite se multiplie dans l'intestin puis migre vers les glandes salivaires. Quand le moustique pique une nouvelle personne, il injecte le parasite dans sa salive, et le cycle recommence. C'est ainsi que la maladie se transmet de personne à personne.",
    "note": "Le parasite Plasmodium a un cycle de vie complexe qui lui permet de survivre et de se propager."
  },
  {
    "titre": "Les symptômes du paludisme",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🤒 Les symptômes du paludisme</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Les symptômes du paludisme apparaissent généralement <strong>10 à 15 jours</strong> après la piqûre infectante.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Fièvre</strong><br>Épisodes de fièvre élevée, souvent avec des frissons intenses.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Anémie</strong><br>Destruction des globules rouges entraînant une fatigue intense.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Maux de tête</strong><br>Céphalées sévères, parfois accompagnées de nausées.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #8e44ad;'><p style='margin: 0;'><strong>Courbatures</strong><br>Douleurs musculaires et articulaires.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>⚠️ Sans traitement, le paludisme peut évoluer vers des formes graves (paludisme cérébral, insuffisance rénale) et entraîner la mort.</p></div></div>",
    "texteParle": "Les symptômes du paludisme apparaissent généralement de 10 à 15 jours après la piqûre du moustique infecté. Les principaux symptômes sont une fièvre élevée, souvent accompagnée de frissons intenses. La destruction des globules rouges provoque une anémie, ce qui entraîne une grande fatigue. Des maux de tête sévères et des courbatures sont également fréquents. Si la maladie n'est pas traitée à temps, elle peut évoluer vers des formes graves comme le paludisme cérébral, l'insuffisance rénale, et peut entraîner la mort. C'est pourquoi il est essentiel de consulter rapidement un médecin en cas de suspicion de paludisme.",
    "note": "Le paludisme peut être mortel s'il n'est pas traité rapidement."
  },
  {
    "titre": "Le diagnostic du paludisme",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔬 Le diagnostic du paludisme</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le diagnostic du paludisme se fait par <strong>examen microscopique</strong> ou par <strong>tests rapides</strong>.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Goutte épaisse</strong><br>Examen microscopique d'une goutte de sang pour identifier le parasite.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Test de diagnostic rapide (TDR)</strong><br>Test immunologique simple et rapide, souvent utilisé en zone rurale.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Le diagnostic précoce est <strong>essentiel</strong> pour un traitement efficace et pour éviter les complications.</p></div></div>",
    "texteParle": "Pour diagnostiquer le paludisme, deux méthodes sont principalement utilisées. La première est l'examen microscopique, appelé goutte épaisse ou frottis sanguin. Le technicien prélève une goutte de sang et l'observe au microscope pour y chercher le parasite. La deuxième méthode est le Test de Diagnostic Rapide, ou TDR. C'est un test immunologique qui détecte la présence du parasite dans le sang. Il est simple, rapide et ne nécessite pas de matériel sophistiqué. Il est donc très utile dans les zones rurales. Un diagnostic précoce est essentiel pour un traitement efficace.",
    "note": "Le TDR est recommandé par l'OMS pour le diagnostic du paludisme."
  },
  {
    "titre": "Le traitement du paludisme",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>💊 Le traitement du paludisme</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le traitement du paludisme repose sur des <strong>médicaments antipaludiques</strong>.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Traitement simple</strong><br>Utilisation de combinaisons thérapeutiques à base d'artémisinine (ACT) pour les cas non compliqués.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Traitement sévère</strong><br>Hospitalisation et administration de médicaments par voie intraveineuse (quinine, artésunate).</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>⚠️ Il est <strong>très important</strong> de suivre le traitement prescrit et de ne pas l'interrompre prématurément.</p></div></div>",
    "texteParle": "Le traitement du paludisme repose sur des médicaments antipaludiques. Pour les cas non compliqués, on utilise des combinaisons thérapeutiques à base d'artémisinine, qu'on appelle les ACT. Ces médicaments sont très efficaces. Pour les formes sévères de la maladie, une hospitalisation est nécessaire et les médicaments sont administrés par voie intraveineuse. Il est très important de suivre le traitement prescrit et de ne pas l'interrompre prématurément, même si on se sent mieux. Cela permet d'éviter les rechutes et l'apparition de résistances aux médicaments.",
    "note": "L'artémisinine est un médicament dérivé d'une plante chinoise, l'armoise annuelle."
  },
  {
    "titre": "Moyens de lutte : la prévention",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🛡️ La prévention : première ligne de défense</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La prévention est le <strong>moyen le plus efficace</strong> de lutter contre le paludisme.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Moustiquaires imprégnées</strong><br>Protègent contre les piqûres de moustiques, surtout la nuit.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Insecticides</strong><br>Éliminent les moustiques adultes dans les maisons.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Vêtements longs</strong><br>Réduisent la surface de peau exposée aux piqûres.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Dormir sous une moustiquaire imprégnée d'insecticide réduit de 50% le risque de paludisme.</p></div></div>",
    "texteParle": "La prévention est le moyen le plus efficace de lutter contre le paludisme. Plusieurs mesures peuvent être prises. La première est l'utilisation des moustiquaires imprégnées d'insecticide. Dormir sous une moustiquaire protège contre les piqûres de moustiques, surtout la nuit. L'utilisation d'insecticides à l'intérieur des maisons permet aussi de tuer les moustiques adultes. Porter des vêtements longs, surtout le soir, réduit la surface de peau exposée. Ces mesures simples peuvent réduire considérablement le risque de contracter le paludisme.",
    "note": "Les moustiquaires imprégnées sont distribuées gratuitement dans les centres de santé au Cameroun."
  },
  {
    "titre": "Moyens de lutte : la lutte contre les gîtes larvaires",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🌿 La lutte contre les gîtes larvaires</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Les moustiques se reproduisent dans des <strong>points d'eau stagnante</strong>.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Suppression des gîtes larvaires :</strong> Éliminer les eaux stagnantes autour des maisons (flaques, vieux pneus, canettes, récipients).</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Assainissement du milieu :</strong> Nettoyer régulièrement son environnement, couvrir les réservoirs d'eau.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Utilisation de larvicides :</strong> Traiter les points d'eau avec des produits qui tuent les larves de moustiques.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La lutte contre les gîtes larvaires est une <strong>responsabilité collective</strong> qui implique toute la communauté.</p></div></div>",
    "texteParle": "Les moustiques Anophèles se reproduisent dans des points d'eau stagnante. La lutte contre les gîtes larvaires est donc essentielle pour réduire leur population. Cela consiste à éliminer toutes les eaux stagnantes autour des maisons : flaques d'eau, vieux pneus, canettes ou récipients qui peuvent contenir de l'eau. Il faut aussi assainir régulièrement son environnement et couvrir les réservoirs d'eau. Dans certains cas, on peut utiliser des larvicides pour traiter les points d'eau. Cette lutte est une responsabilité collective qui implique toute la communauté.",
    "note": "Un simple pneu usagé laissé à l'abandon peut devenir un gîte larvaire."
  },
  {
    "titre": "Moyens de lutte : chimioprophylaxie",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>💊 La chimioprophylaxie</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La chimioprophylaxie est la <strong>prise de médicaments</strong> pour prévenir le paludisme.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Pour qui ?</strong><br>Femmes enceintes, enfants, voyageurs dans les zones à risque.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Traitement préventif intermittent (TPI)</strong><br>Administration régulière d'antipaludiques aux femmes enceintes.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 La chimioprophylaxie est recommandée par l'OMS pour les populations vulnérables.</p></div></div>",
    "texteParle": "La chimioprophylaxie consiste à prendre des médicaments antipaludiques pour prévenir l'apparition de la maladie. Elle est particulièrement recommandée pour les femmes enceintes et les enfants, qui sont les plus vulnérables. Pour les femmes enceintes, on parle de Traitement Préventif Intermittent, ou TPI. Il consiste à administrer régulièrement des antipaludiques pendant la grossesse pour protéger à la fois la mère et le bébé. Cette stratégie est recommandée par l'OMS dans les zones où le paludisme est endémique. Les voyageurs se rendant dans des zones à risque peuvent aussi prendre des médicaments préventifs.",
    "note": "La chimioprophylaxie ne remplace pas les mesures de protection contre les moustiques."
  },
  {
    "titre": "Le paludisme au Cameroun",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🇨🇲 Le paludisme au Cameroun</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le paludisme est <strong>endémique</strong> au Cameroun.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Première cause de mortalité</strong><br>Chez les enfants de moins de 5 ans.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Transmission</strong><br>Toute l'année, avec un pic pendant la saison des pluies.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Efforts nationaux</strong><br>Distribution de moustiquaires, campagnes de sensibilisation, traitement gratuit pour les enfants.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 Le Cameroun a mis en place un <strong>Programme National de Lutte contre le Paludisme</strong> (PNLP).</p></div></div>",
    "texteParle": "Au Cameroun, le paludisme est une maladie endémique, c'est-à-dire qu'elle est présente toute l'année. C'est la première cause de mortalité chez les enfants de moins de 5 ans. La transmission est continue, mais elle augmente pendant la saison des pluies quand les moustiques se reproduisent davantage. Pour lutter contre cette maladie, le gouvernement a mis en place plusieurs actions : la distribution gratuite de moustiquaires imprégnées, des campagnes de sensibilisation dans les écoles et les communautés, et la prise en charge gratuite du traitement pour les enfants. Le Programme National de Lutte contre le Paludisme coordonne ces efforts.",
    "note": "Le paludisme est un problème majeur de santé publique au Cameroun."
  },
  {
    "titre": "Les défis de la lutte",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🚧 Les défis de la lutte</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Malgré les progrès, la lutte contre le paludisme fait face à de <strong>nombreux défis</strong>.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Résistance aux médicaments :</strong> Le parasite développe une résistance à certains antipaludiques.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Résistance aux insecticides :</strong> Les moustiques deviennent résistants aux insecticides utilisés.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Accès aux soins :</strong> Difficultés d'accès aux centres de santé pour les populations rurales.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 La <strong>recherche</strong> est essentielle pour développer de nouveaux traitements et de nouvelles stratégies.</p></div></div>",
    "texteParle": "Malgré les progrès réalisés, la lutte contre le paludisme doit faire face à plusieurs défis. Le parasite développe des résistances à certains médicaments, ce qui rend le traitement moins efficace. Les moustiques deviennent également résistants aux insecticides utilisés pour les éliminer. L'accès aux soins reste difficile dans les zones rurales, où les centres de santé sont souvent éloignés. Pour surmonter ces défis, la recherche est essentielle pour développer de nouveaux traitements, de nouveaux insecticides et des stratégies innovantes. La lutte contre le paludisme nécessite une mobilisation continue.",
    "note": "La recherche sur le paludisme est une priorité de santé mondiale."
  },
  {
    "titre": "Que faire en cas de suspicion ?",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>❓ Que faire en cas de suspicion ?</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>En cas de suspicion de paludisme, il faut <strong>agir rapidement</strong>.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>1. Consulter un médecin</strong><br>Ne pas se soigner soi-même. Se rendre au centre de santé le plus proche.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>2. Faire un test</strong><br>Effectuer un test de diagnostic rapide (TDR) ou une goutte épaisse.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>3. Suivre le traitement</strong><br>Si le test est positif, suivre scrupuleusement le traitement prescrit.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>⚠️ Ne pas prendre de médicaments sans avis médical, cela peut aggraver la situation !</p></div></div>",
    "texteParle": "Si vous pensez avoir le paludisme, il est très important d'agir rapidement. La première chose à faire est de consulter un médecin ou de vous rendre au centre de santé le plus proche. Ne vous soignez pas vous-même. Le médecin vous prescrira un test de diagnostic rapide ou une goutte épaisse pour confirmer le diagnostic. Si le test est positif, vous devez suivre scrupuleusement le traitement prescrit. Il est très dangereux de prendre des médicaments sans avis médical, car un mauvais dosage peut aggraver la situation ou entraîner des résistances.",
    "note": "Un diagnostic précoce et un traitement adéquat sauvent des vies."
  },
  {
    "titre": "Synthèse",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>📝 Synthèse</h3><div style='background: #2c3e50; color: white; padding: 15px; border-radius: 10px; margin: 10px 0; text-align: center;'><p style='font-size: 1.2rem; margin: 0;'>Ce qu'il faut retenir</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 120px; background: #d5f5e3; padding: 12px; border-radius: 8px;'><p style='margin: 0;'><strong;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
