<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Troisième",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les anomalies chromosomiques (6 points)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>Un caryotype humain normal comporte 46 chromosomes, dont 22 paires d'autosomes et 1 paire de chromosomes sexuels (XX ou XY). Des anomalies du nombre de chromosomes peuvent survenir et entraîner des modifications des caractères.</div><div style='background:#f4f6f7; padding:12px; border-radius:8px; margin:10px 0;'><p style='margin:0;'><strong>Document :</strong> Le tableau ci-dessous présente quelques anomalies chromosomiques :</p></div><table style='width:100%; border-collapse:collapse; margin:10px 0; background:#f8f9fa; border-radius:8px; overflow:hidden;'><thead style='background:#2c3e50; color:white;'><tr><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Anomalie</th><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Formule chromosomique</th><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Conséquences</th></tr></thead><tbody><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Trisomie 21</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>47, XY, +21</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Retard mental, caractéristiques morphologiques</td></tr><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Trisomie XXY</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>47, XXY</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Syndrome de Klinefelter</td></tr><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Monosomie X</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>45, X</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Syndrome de Turner</td></tr></tbody></table>",
      "questions": [
        {
          "question": "<strong>1.1)</strong> Définir les termes suivants : trisomie, monosomie et autosome.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Trisomie</strong> : présence de trois chromosomes au lieu de deux (anomalie par excès).</li><li><strong>Monosomie</strong> : présence d'un seul chromosome au lieu de deux (anomalie par défaut).</li><li><strong>Autosome</strong> : chromosome non sexuel (22 paires chez l'homme).</li></ul>"
        },
        {
          "question": "<strong>1.2)</strong> Interpréter la formule chromosomique 47, XY, +21. Déterminer le sexe de l'individu et l'anomalie dont il est atteint.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>47</strong> : nombre total de chromosomes (anormal).</li><li><strong>XY</strong> : présence des chromosomes sexuels XY → individu de sexe <strong>masculin</strong>.</li><li><strong>+21</strong> : présence d'un chromosome 21 supplémentaire → <strong>trisomie 21</strong>.</li></ul>"
        },
        {
          "question": "<strong>1.3)</strong> Décrire les conséquences phénotypiques de la trisomie 21.",
          "reponse": "La trisomie 21 se manifeste par :<ul style='margin:0; padding-left:20px;'><li>Un <strong>retard mental</strong> plus ou moins sévère.</li><li>Des <strong>caractéristiques morphologiques</strong> particulières : visage rond, yeux bridés, pli palmaire transverse, hypotonie musculaire.</li><li>Une <strong>malformation cardiaque</strong> fréquente.</li></ul>"
        },
        {
          "question": "<strong>1.4)</strong> Expliquer pourquoi l'étude du caryotype est importante en médecine.",
          "reponse": "L'étude du caryotype permet de :<ul style='margin:0; padding-left:20px;'><li><strong>Détecter des anomalies chromosomiques</strong> (trisomies, monosomies, translocations).</li><li><strong>Diagnostiquer des maladies génétiques</strong> (syndrome de Down, syndrome de Turner, etc.).</li><li><strong>Déterminer le sexe</strong> d'un individu en cas de doute.</li><li><strong>Orienter le conseil génétique</strong> et la prise en charge médicale.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les groupes sanguins et la compatibilité transfusionnelle (6 points)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>Le système ABO est un système de groupes sanguins basé sur la présence d'antigènes (marqueurs du soi) à la surface des globules rouges. Les anticorps sont des protéines défensives présentes dans le plasma.</div><div style='background:#f4f6f7; padding:12px; border-radius:8px; margin:10px 0;'><p style='margin:0;'><strong>Rappel :</strong></p></div><table style='width:100%; border-collapse:collapse; margin:10px 0; background:#f8f9fa; border-radius:8px; overflow:hidden;'><thead style='background:#2c3e50; color:white;'><tr><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Groupe sanguin</th><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Antigènes</th><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Anticorps</th><th style='padding:8px; border:1px solid #ddd; text-align:center;'>Donneurs</th></tr></thead><tbody><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>A</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>A</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Anti-B</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>A, O</td></tr><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>B</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>B</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Anti-A</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>B, O</td></tr><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>AB</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>A et B</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Aucun</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Tous</td></tr><tr><td style='padding:8px; border:1px solid #ddd; text-align:center;'>O</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Aucun</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>Anti-A et Anti-B</td><td style='padding:8px; border:1px solid #ddd; text-align:center;'>O</td></tr></tbody></table>",
      "questions": [
        {
          "question": "<strong>2.1)</strong> Définir les termes suivants : antigène, anticorps et compatibilité transfusionnelle.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Antigène</strong> : substance étrangère (ou marqueur du soi) capable de déclencher une réponse immunitaire.</li><li><strong>Anticorps</strong> : protéine défensive produite par l'organisme en réponse à un antigène, capable de le neutraliser.</li><li><strong>Compatibilité transfusionnelle</strong> : condition selon laquelle le sang d'un donneur peut être transfusé à un receveur sans provoquer d'agglutination.</li></ul>"
        },
        {
          "question": "<strong>2.2)</strong> Un patient du groupe sanguin A reçoit une transfusion de sang du groupe B. Que risque-t-il de se produire ? Justifier la réponse.",
          "reponse": "Un patient du groupe A possède des anticorps <strong>anti-B</strong> dans son plasma. S'il reçoit du sang du groupe B, les anticorps anti-B du receveur vont reconnaître les antigènes B présents sur les globules rouges du donneur, provoquant une <strong>agglutination</strong> (destruction des globules rouges), ce qui peut entraîner un <strong>choc transfusionnel</strong> fatal."
        },
        {
          "question": "<strong>2.3)</strong> Expliquer pourquoi le groupe O est appelé « donneur universel » et le groupe AB « receveur universel ».",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Groupe O (donneur universel)</strong> : les globules rouges ne portent aucun antigène (A ou B). Ils ne seront donc pas reconnus comme étrangers par les anticorps du receveur, quel que soit son groupe.</li><li><strong>Groupe AB (receveur universel)</strong> : le plasma ne contient ni anticorps anti-A ni anti-B, donc il peut recevoir du sang de tous les groupes sans risque d'agglutination.</li></ul>"
        },
        {
          "question": "<strong>2.4)</strong> Définir le facteur Rhésus. Quels sont les risques liés à l'incompatibilité Rh chez une femme enceinte ?",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Facteur Rhésus</strong> : antigène présent à la surface des globules rouges (Rh+ : présent, Rh- : absent).</li><li><strong>Risques chez une femme Rh- enceinte d'un enfant Rh+</strong> : lors de l'accouchement, le sang de l'enfant peut passer dans celui de la mère. La mère produit alors des <strong>anticorps anti-Rh</strong> qui peuvent, lors d'une grossesse ultérieure, traverser le placenta et détruire les globules rouges du fœtus (maladie hémolytique du nouveau-né). La prévention se fait par injection d'anticorps anti-Rh (immunoglobulines) à la mère.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : La transmission de l'information génétique (6 points)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>L'information génétique est transmise de génération en génération par les gamètes (cellules reproductrices). Les gamètes sont formés par un type de division cellulaire appelé méiose, qui aboutit à des cellules à \(n = 23\) chromosomes.</div>",
      "questions": [
        {
          "question": "<strong>3.1)</strong> Distinguer la mitose de la méiose en précisant leur rôle.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Mitose</strong> : division cellulaire aboutissant à deux cellules filles <strong>identiques</strong> à la cellule mère (2n = 46 chromosomes). Rôle : <strong>croissance</strong>, <strong>renouvellement cellulaire</strong> et <strong>réparation</strong>.</li><li><strong>Méiose</strong> : division cellulaire aboutissant à quatre cellules filles <strong>différentes</strong> à \(n = 23\) chromosomes. Rôle : <strong>formation des gamètes</strong> (spermatozoïdes et ovules).</li></ul>"
        },
        {
          "question": "<strong>3.2)</strong> Expliquer comment la méiose et la fécondation assurent la diversité des enfants au sein d'une même famille.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li>Au cours de la méiose, les chromosomes se <strong>brassent</strong> (recombinaison) et les gamètes reçoivent un <strong>mélange aléatoire</strong> des chromosomes de chaque paire.</li><li>Lors de la <strong>fécondation</strong>, un gamète mâle (spermatozoïde) s'unit à un gamète femelle (ovule). Cette union est aléatoire.</li><li>La combinaison des gènes des deux parents donne un individu <strong>unique</strong>. Les enfants d'une même famille sont donc différents les uns des autres.</li></ul>"
        },
        {
          "question": "<strong>3.3)</strong> Expliquer ce qu'est un clone.",
          "reponse": "Un clone est un ensemble d'individus ou de cellules <strong>génétiquement identiques</strong>. Ils possèdent le même patrimoine génétique (même ADN). Le clonage consiste à produire des clones à partir d'une cellule initiale (exemple : clonage de Dolly la brebis)."

    },
    {

      "points": "6 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>L'homme lutte contre les maladies infectieuses grâce à son système immunitaire, mais aussi à des moyens de prévention et de traitement.</div>",

        {

          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Vaccin</strong> : contient des <strong>antigènes</strong> (microbes atténués ou tués). Il <strong>stimule</strong> l'organisme à fabriquer ses propres anticorps (immunité active, durable).</li><li><strong>Sérum</strong> : contient des <strong>anticorps</strong> déjà formés, provenant d'un donneur. Il <strong>donne</strong> une immunité passive immédiate mais temporaire.</li></ul>"

          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Asepsie</strong> : ensemble des méthodes visant à <strong>empêcher</strong> la contamination par des microbes (exemple : utilisation de matériel stérile).</li><li><strong>Stérilisation</strong> : destruction de <strong>tous</strong> les microorganismes (bactéries, virus, spores) par la chaleur, la vapeur ou les rayons.</li><li><strong>Antisepsie</strong> : destruction des <strong>microorganismes</strong> sur les tissus vivants (peau, muqueuses) par des antiseptiques (alcool 90°, eau de javel, etc.).</li></ul>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
