<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Troisième",
  "sequence": "Séquence 6 : Génétique, microbiologie, santé et environnement",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Hérédité humaine et anomalies génétiques",
      "points": "6 pts",
      "enonce": "<p>L'étude de l'hérédité permet de comprendre la transmission des caractères et l'apparition d'anomalies au sein des familles. La drépanocytose est une maladie génétique fréquente en Afrique.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) a) Définir l'hérédité. <br>b) Distinguer un caractère héréditaire d'un caractère acquis (modifié par l'environnement) en donnant un exemple pour chaque.</p>",
          "reponse": "<p>a) L'<strong>hérédité</strong> est la transmission des caractères biologiques des parents à leurs descendants.</p><p>b) Un <strong>caractère héréditaire</strong> est transmis par les gènes (exemple : groupe sanguin, couleur des yeux). Un <strong>caractère acquis</strong> est modifié par l'environnement et non transmis (exemple : cicatrice, bronzage).</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1,5 pts) a) Définir un chromosome et l'ADN. <br>b) Donner le nombre de chromosomes de l'espèce humaine et distinguer les autosomes des gonosomes.</p>",
          "reponse": "<p>a) Un <strong>chromosome</strong> est une structure cellulaire visible lors de la division, constituée d'ADN et de protéines. L'<strong>ADN</strong> (Acide Désoxyribonucléique) est le support de l'information génétique.</p><p>b) L'espèce humaine possède <strong>46 chromosomes</strong> (2n = 46), soit 23 paires. Les <strong>autosomes</strong> sont les 22 paires de chromosomes non sexuels. Les <strong>gonosomes</strong> (chromosomes sexuels) sont la 23e paire : XX chez la femme, XY chez l'homme.</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (1,5 pts) a) Définir la trisomie et la monosomie. <br>b) Décrire les conséquences phénotypiques de la trisomie 21 (syndrome de Down).</p>",
          "reponse": "<p>a) La <strong>trisomie</strong> est la présence d'un chromosome supplémentaire (3 exemplaires au lieu de 2). La <strong>monosomie</strong> est l'absence d'un chromosome (1 exemplaire au lieu de 2).</p><p>b) La <strong>trisomie 21</strong> (syndrome de Down) se caractérise par :</p><ul><li>Un retard mental (troubles cognitifs).</li><li>Des traits physiques particuliers (visage rond, yeux bridés, pli palmaire unique).</li><li>Des malformations cardiaques et digestives fréquentes.</li><li>Un vieillissement prématuré.</li></ul>"
        },
        {
          "question": "<p><strong>1.4</strong> (1 pt) a) Définir un gène et un allèle. <br>b) Expliquer pourquoi la drépanocytose est due à une mutation génique.</p>",
          "reponse": "<p>a) Un <strong>gène</strong> est une portion d'ADN qui porte une information génétique. Un <strong>allèle</strong> est une version d'un même gène.</p><p>b) La <strong>drépanocytose</strong> est due à une <strong>mutation génique</strong> (modification de la séquence d'ADN du gène de l'hémoglobine). Cette mutation provoque la production d'une hémoglobine anormale (HbS), déformant les globules rouges en forme de faucille.</p>"
        },
        {
          "question": "<p><strong>1.5</strong> (1 pt) Expliquer l'importance du conseil génétique dans la prévention des anomalies héréditaires.</p>",
          "reponse": "<p>Le <strong>conseil génétique</strong> permet d'informer les familles sur les risques de transmission d'une anomalie génétique. Il aide à :</p><ul><li>Identifier les couples à risque (porteurs sains de maladies récessives).</li><li>Proposer des tests de dépistage prénatal.</li><li>Informer sur les possibilités de diagnostic et de prise en charge.</li><li>Lutter contre les préjugés liés à l'apparition d'anomalies dans les familles.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Microorganismes, contamination et moyens de lutte",
      "points": "5 pts",
      "enonce": "<p>Les microorganismes sont présents partout dans notre environnement. Certains sont pathogènes et responsables de maladies infectieuses. La connaissance de leur mode de vie permet de lutter efficacement contre la contamination.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) a) Définir un microbe (microorganisme). <br>b) Citer les quatre grands groupes de microorganismes en donnant un exemple pour chacun.</p>",
          "reponse": "<p>a) Un <strong>microbe</strong> (ou microorganisme) est un être vivant microscopique, visible uniquement au microscope.</p><p>b) Les quatre grands groupes de microorganismes :</p><ul><li><strong>Bactéries</strong> : exemple : <em>Escherichia coli</em>.</li><li><strong>Virus</strong> : exemple : VIH, virus de la grippe.</li><li><strong>Champignons microscopiques</strong> : exemple : <em>Aspergillus</em>, levure.</li><li><strong>Protozoaires</strong> : exemple : <em>Plasmodium</em> (agent du paludisme), amibe.</li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1 pt) Distinguer les modes de nutrition des microbes (saprophyte, parasite, autotrophe).</p>",
          "reponse": "<p>Les modes de nutrition des microbes :</p><ul><li><strong>Saprophyte</strong> : se nourrit de matière organique en décomposition (ex : champignons microscopiques).</li><li><strong>Parasite</strong> : se nourrit aux dépens d'un organisme vivant hôte (ex : <em>Plasmodium</em>, virus).</li><li><strong>Autotrophe</strong> : synthétise sa matière organique à partir de matières minérales et d'énergie (ex : certaines bactéries photosynthétiques).</li></ul>"
        },
        {
          "question": "<p><strong>2.3</strong> (1 pt) a) Définir l'infection. <br>b) Citer les principales voies de pénétration des microbes dans l'organisme.</p>",
          "reponse": "<p>a) L'<strong>infection</strong> est l'invasion et la multiplication de microorganismes pathogènes dans l'organisme.</p><p>b) Les principales voies de pénétration des microbes :</p><ul><li><strong>Voie cutanée</strong> : par les plaies, piqûres, brûlures.</li><li><strong>Voie aérienne</strong> : par inhalation (gouttelettes, poussières).</li><li><strong>Voie digestive</strong> : par ingestion (aliments, eau contaminés).</li><li><strong>Voie sexuelle</strong> : par contact avec des sécrétions contaminées.</li></ul>"
        },
        {
          "question": "<p><strong>2.4</strong> (1 pt) a) Définir l'asepsie et la stérilisation. <br>b) Définir l'antisepsie et donner deux exemples d'antiseptiques.</p>",
          "reponse": "<p>a) L'<strong>asepsie</strong> est l'ensemble des méthodes visant à empêcher l'introduction de microbes dans un milieu (ex : nettoyage, désinfection). La <strong>stérilisation</strong> est la destruction complète de tous les microorganismes (par la chaleur, la vapeur, les rayonnements).</p><p>b) L'<strong>antisepsie</strong> est l'ensemble des méthodes visant à détruire les microbes présents sur un tissu vivant (peau, muqueuse). Exemples d'antiseptiques : <strong>alcool à 90°</strong>, <strong>eau de Javel diluée</strong>, <strong>bétadine</strong>.</p>"
        },
        {
          "question": "<p><strong>2.5</strong> (1 pt) Expliquer le rôle des préservatifs dans la lutte contre les Infections Sexuellement Transmissibles (IST).</p>",
          "reponse": "<p>Le <strong>préservatif</strong> (masculin ou féminin) constitue une <strong>barrière mécanique</strong> qui empêche le contact direct entre les sécrétions contaminées (sperme, sécrétions vaginales, sang) lors des rapports sexuels.</p><p>Il protège contre les IST (VIH, syphilis, gonorrhée, etc.) en :</p><ul><li>Empêchant la transmission des microbes par voie sexuelle.</li><li>Réduisant le risque de contamination par les liquides biologiques.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Paludisme, Ebola et réponse immunitaire",
      "points": "5 pts",
      "enonce": "<p>Le paludisme, la fièvre Ebola et le COVID-19 sont des maladies épidémiques qui ont un impact majeur sur la santé publique. La compréhension de leur transmission et de la réponse immunitaire est essentielle pour la lutte.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) a) Définir le paludisme. <br>b) Identifier l'agent pathogène et le vecteur du paludisme.</p>",
          "reponse": "<p>a) Le <strong>paludisme</strong> (ou malaria) est une maladie parasitaire transmise par la piqûre d'un moustique infecté. Elle est caractérisée par des accès de fièvre, des frissons et une anémie.</p><p>b) L'agent pathogène est un <strong>protozoaire</strong> du genre <em>Plasmodium</em> (<em>Plasmodium falciparum</em>). Le <strong>vecteur</strong> est le moustique <em>Anophèle</em> (femelle).</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (1 pt) a) Décrire le mode de transmission du virus Ebola. <br>b) Citer les symptômes de la fièvre Ebola.</p>",
          "reponse": "<p>a) Le virus <strong>Ebola</strong> se transmet :</p><ul><li>Par contact direct avec des <strong>animaux sauvages infectés</strong> (chauves-souris, singes).</li><li>Par contact avec les <strong>liquides biologiques</strong> d'une personne infectée (sang, sueur, salive, vomissements, diarrhée).</li></ul><p>b) Les symptômes de la fièvre Ebola :</p><ul><li>Fièvre élevée, maux de tête, douleurs musculaires.</li><li>Diarrhées, vomissements, douleurs abdominales.</li><li>Hémorragies (saignements internes et externes) dans les cas graves.</li></ul>"
        },
        {
          "question": "<p><strong>3.3</strong> (1,5 pts) a) Distinguer la réponse immunitaire non spécifique de la réponse immunitaire spécifique. <br>b) Décrire les étapes de la phagocytose.</p>",
          "reponse": "<p>a) La <strong>réponse immunitaire non spécifique</strong> (ou innée) est la première ligne de défense, immédiate et non spécifique (peau, muqueuses, phagocytes). La <strong>réponse immunitaire spécifique</strong> (ou adaptative) est dirigée contre un antigène précis et met en jeu les lymphocytes.</p><p>b) Les étapes de la <strong>phagocytose</strong> :</p><ol><li><strong>Attraction</strong> : le phagocyte est attiré par l'agent pathogène (chimiotaxie).</li><li><strong>Adhérence</strong> : le phagocyte adhère à la surface du microbe.</li><li><strong>Ingestion</strong> : le phagocyte englobe le microbe dans une vacuole (phagosome).</li><li><strong>Digestion</strong> : le phagosome fusionne avec un lysosome (phagolysosome) contenant des enzymes qui détruisent le microbe.</li></ol>"
        },
        {
          "question": "<p><strong>3.4</strong> (1,5 pts) a) Distinguer les lymphocytes B des lymphocytes T dans la réponse immunitaire spécifique. <br>b) Expliquer pourquoi le VIH cible les lymphocytes T4 et quelles en sont les conséquences.</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
