<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVTEEHB",
 "classe": "Troisième",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : La circulation sanguine et ses accidents",
     "points": "5 pts",
     "enonce": "<p>L'appareil circulatoire assure le transport du sang dans tout l'organisme. Il est composé du cœur, qui pompe le sang, et des vaisseaux sanguins qui le conduisent. Un dysfonctionnement de cet appareil peut entraîner des accidents graves.</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (0,75 pt)</strong> Cite les trois types de vaisseaux sanguins et indique leur rôle.</p>",
         "reponse": "<p>Les trois types de vaisseaux sanguins sont :</p><ul><li>Les <strong>artères</strong> : elles transportent le sang du cœur vers les organes.</li><li>Les <strong>veines</strong> : elles ramènent le sang des organes vers le cœur.</li><li>Les <strong>capillaires</strong> : ils permettent les échanges entre le sang et les cellules.</li></ul>"
       },
       {
         "question": "<p><strong>1.2 (0,75 pt)</strong> Décris l'organisation du cœur humain en précisant le rôle des oreillettes, des ventricules et des valvules.</p>",
         "reponse": "<p>Le cœur humain est divisé en deux parties : droite et gauche. Chaque partie comprend une oreillette (qui reçoit le sang) et un ventricule (qui pompe le sang). Les <strong>valvules</strong> sont des clapets qui empêchent le sang de refluer en sens inverse.</p>"
       },
       {
         "question": "<p><strong>1.3 (1 pt)</strong> Définis une hémorragie et distingue les trois types d'hémorragies.</p>",
         "reponse": "<p>Une <strong>hémorragie</strong> est une perte de sang due à la rupture d'un vaisseau sanguin. On distingue :</p><ul><li>L'<strong>hémorragie artérielle</strong> : le sang est rouge vif et sort en jet saccadé.</li><li>L'<strong>hémorragie veineuse</strong> : le sang est rouge sombre et s'écoule de façon continue.</li><li>L'<strong>hémorragie capillaire</strong> : le sang suinte de la plaie.</li></ul>"
       },
       {
         "question": "<p><strong>1.4 (1,25 pt)</strong> Cite trois accidents de l'appareil circulatoire et explique brièvement chacun d'eux.</p>",
         "reponse": "<p>Trois accidents de l'appareil circulatoire sont :</p><ul><li>L'<strong>athérosclérose</strong> : dépôt de plaques de graisse sur les parois des artères, réduisant leur diamètre.</li><li>L'<strong>infarctus du myocarde</strong> : destruction d'une partie du muscle cardiaque due à l'obstruction d'une artère coronaire.</li><li>L'<strong>hypertension artérielle</strong> : pression sanguine anormalement élevée dans les artères.</li></ul>"
       },
       {
         "question": "<p><strong>1.5 (1,25 pt)</strong> Propose trois moyens de lutte contre les maladies cardio-vasculaires.</p>",
         "reponse": "<p>Pour lutter contre les maladies cardio-vasculaires, il faut :</p><ul><li><strong>Avoir une alimentation équilibrée</strong> : éviter les excès de gras et de sel.</li><li><strong>Pratiquer une activité physique régulière</strong> : au moins 30 minutes par jour.</li><li><strong>Éviter le tabac et l'alcool</strong> qui sont des facteurs de risque majeurs.</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : La respiration et ses maladies",
     "points": "5 pts",
     "enonce": "<p>L'appareil respiratoire permet les échanges gazeux entre l'organisme et l'air extérieur. Il est composé des voies respiratoires et des poumons. Sa bonne santé est essentielle pour l'oxygénation du sang.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (0,75 pt)</strong> Décris l'organisation de l'appareil respiratoire.</p>",
         "reponse": "<p>L'appareil respiratoire comprend :</p><ul><li>Les <strong>voies respiratoires</strong> : fosses nasales, pharynx, larynx, trachée, bronches et bronchioles.</li><li>Les <strong>poumons</strong> : deux organes spongieux situés dans la cage thoracique, où se font les échanges gazeux.</li></ul>"
       },
       {
         "question": "<p><strong>2.2 (0,75 pt)</strong> Distingue l'inspiration de l'expiration.</p>",
         "reponse": "<p>L'<strong>inspiration</strong> est la phase active de la respiration : les muscles intercostaux et le diaphragme se contractent, le volume de la cage thoracique augmente, l'air entre dans les poumons. L'<strong>expiration</strong> est la phase passive : les muscles se relâchent, le volume thoracique diminue, l'air sort des poumons.</p>"
       },
       {
         "question": "<p><strong>2.3 (1 pt)</strong> Définis la ventilation pulmonaire.</p>",
         "reponse": "<p>La <strong>ventilation pulmonaire</strong> est l'ensemble des mouvements d'inspiration et d'expiration permettant le renouvellement de l'air dans les poumons. Elle assure l'apport d'oxygène et l'élimination du dioxyde de carbone.</p>"
       },
       {
         "question": "<p><strong>2.4 (1,25 pt)</strong> Cite les facteurs perturbant la respiration et explique leurs effets.</p>",
         "reponse": "<p>Les facteurs perturbant la respiration sont :</p><ul><li>L'<strong>air pollué</strong> : les particules fines et les gaz toxiques irritent les voies respiratoires et favorisent les allergies.</li><li>Le <strong>monoxyde de carbone (CO)</strong> : gaz toxique qui se fixe sur l'hémoglobine, empêchant le transport de l'oxygène.</li><li>Le <strong>tabac</strong> : contient des substances cancérigènes et irritantes responsables de bronchites, d'emphysème et de cancer du poumon.</li></ul>"
       },
       {
         "question": "<p><strong>2.5 (1,25 pt)</strong> Énonce trois règles d'hygiène respiratoire.</p>",
         "reponse": "<p>Les règles d'hygiène respiratoire sont :</p><ul><li>Respirer par le <strong>nez</strong> qui filtre, réchauffe et humidifie l'air.</li><li>Éviter les <strong>sources de pollution</strong> et les lieux enfumés.</li><li>Pratiquer une <strong>activité physique</strong> régulière pour renforcer les muscles respiratoires.</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Le système urinaire et ses dysfonctionnements",
     "points": "4 pts",
     "enonce": "<p>Les reins sont des organes essentiels qui filtrent le sang et produisent l'urine. Leur bon fonctionnement est indispensable à la santé.</p>",
     "questions": [
       {
         "question": "<p><strong>3.1 (0,75 pt)</strong> Décris la structure du rein.</p>",
         "reponse": "<p>Le rein est constitué de deux zones :</p><ul><li>La <strong>zone corticale</strong> (périphérique) : contient les corpuscules de Malpighi.</li><li>La <strong>zone médullaire</strong> (centrale) : contient les pyramides de Malpighi.</li><li>L'<strong>unité fonctionnelle</strong> du rein est le néphron.</li></ul>"
       },
       {
         "question": "<p><strong>3.2 (1 pt)</strong> Décris les étapes de formation de l'urine.</p>",
         "reponse": "<p>La formation de l'urine se fait en trois étapes :</p><ol><li>La <strong>filtration glomérulaire</strong> : le sang est filtré dans le glomérule, formant l'urine primitive.</li><li>La <strong>réabsorption</strong> : les substances utiles (eau, glucose, sels minéraux) sont réabsorbées par le sang.</li><li>La <strong>sécrétion</strong> : des substances toxiques sont ajoutées à l'urine.</li></ol>"
       },
       {
         "question": "<p><strong>3.3 (0,75 pt)</strong> Distingue la composition du sang de celle de l'urine.</p>",
         "reponse": "<p>Le sang contient des globules rouges, des globules blancs, des plaquettes et du plasma riche en protéines. L'urine, en revanche, est composée d'eau, d'urée, de sels minéraux et d'acide urique. Elle ne contient pas de cellules ni de protéines normalement.</p>"
       },
       {
         "question": "<p><strong>3.4 (0,75 pt)</strong> Qu'est-ce que l'insuffisance rénale ? Distingue les deux types.</p>",
         "reponse": "<p>L'<strong>insuffisance rénale</strong> est l'incapacité des reins à assurer leurs fonctions de filtration. On distingue :</p><ul><li>L'<strong>insuffisance rénale aiguë</strong> : apparition brutale, souvent réversible.</li><li>L'<strong>insuffisance rénale chronique</strong> : évolution lente et irréversible.</li></ul>"
       },
       {
         "question": "<p><strong>3.5 (0,75 pt)</strong> Décris la technique de dialyse.</p>",
         "reponse": "<p>La <strong>dialyse</strong> est une technique de purification du sang utilisée en cas d'insuffisance rénale. Elle consiste à faire passer le sang à travers un filtre artificiel qui retient les déchets et les excès d'eau, permettant ainsi de suppléer temporairement la fonction des reins.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Microorganismes et contamination",
     "points": "6 pts",
     "enonce": "<p>Notre environnement est rempli de microorganismes. La plupart sont inoffensifs, mais certains sont pathogènes et peuvent causer des infections. Il est important de connaître les moyens de lutte contre la contamination.</p>",
     "questions": [
       {
         "question": "<p><strong>4.1 (0,75 pt)</strong> Cite les quatre grands groupes de microorganismes et donne un exemple pour chacun.</p>",
         "reponse": "<p>Les quatre grands groupes de microorganismes sont :</p><ul><li>Les <strong>bactéries</strong> (ex : le bacille de la tuberculose).</li><li>Les <strong>virus</strong> (ex : le VIH).</li><li>Les <strong>champignons microscopiques</strong> (ex : le champignon du pied d'athlète).</li><li>Les <strong>protozoaires</strong> (ex : le Plasmodium responsable du paludisme).</li></ul>"
       },
       {
         "question": "<p><strong>4.2 (0,75 pt)</strong> Distingue les modes de nutrition hétérotrophe et autotrophe chez les microorganismes.</p>",
         "reponse": "<p>Les <strong>microorganismes hétérotrophes</strong> ont besoin de matière organique préexistante pour se nourrir. Ils sont soit <strong>saprophytes</strong> (ils vivent sur des débris organiques) soit <strong>parasites</strong> (ils vivent aux dépens d'un hôte vivant). Les <strong>microorganismes autotrophes</strong> sont capables de fabriquer leur propre matière organique à partir de matières minérales.</p>"
       },
       {
         "question": "<p><strong>4.3 (1 pt)</strong> Définis une infection et cite les voies de pénétration des microbes dans l'organisme.</p>",
         "reponse": "<p>Une <strong>infection</strong> est une invasion de l'organisme par des microorganismes pathogènes qui se multiplient et provoquent des lésions. Les voies de pénétration sont :</p><ul><li>Le <strong>contact</strong> (peau, muqueuses).</li><li>La <strong>voie aérienne</strong> (inhalation).</li><li>Les <strong>supports contaminés</strong> (aliments, eau, objets).</li><li>Les <strong>vecteurs</strong> (moustiques, tiques).</li></ul>"
       },
       {
         "question": "<p><strong>4.4 (1 pt)</strong> Distingue l'asepsie de la stérilisation et l'antisepsie en donnant des exemples.</p>",
         "reponse": "<p>L'<strong>asepsie</strong> est l'ensemble des méthodes qui empêchent la contamination par les microbes (ex : l'utilisation de gants stériles). La <strong>stérilisation</strong> est la destruction de tous les microbes sur un objet (ex : passage à l'autoclave). L'<strong>antisepsie</strong> est la destruction des microbes sur un tissu vivant (ex : application d'alcool à 90° ou de Bétadine sur une plaie).</p>"
       },
       {
         "question": "<p><strong>4.5 (0,75 pt)</strong> Décris le rôle des préservatifs dans la protection contre les IST.</p>",
         "reponse": "<p>Les <strong>préservatifs</strong> (masculins ou féminins) constituent une barrière physique qui empêche le contact direct entre les muqueuses lors des rapports sexuels. Ils protègent contre la transmission des Infections Sexuellement Transmissibles (IST) en empêchant le passage des virus et des bactéries.</p>"
       },
       {

         "reponse": "<p>La <strong>vaccination</strong> est un procédé qui consiste à introduire dans l'organisme un antigène (fragment de microbe ou microbe atténué) pour stimuler le système immunitaire et provoquer la production d'anticorps spécifiques. Elle permet ainsi de se protéger contre une maladie infectieuse.</p>"

       {

};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
