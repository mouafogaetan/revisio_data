<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Troisième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Applications affines et statistiques",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem;'><p>Cet exercice permet d'évaluer ta maîtrise des applications affines et des représentations graphiques en statistiques.</p></div>",
      "questions": [
        {
          "question": "<p> (2 pts) Une entreprise de transport propose deux tarifs pour un trajet :</p><ul><li>Tarif A : 500 FCFA par kilomètre.</li><li>Tarif B : un forfait de 2 000 FCFA puis 300 FCFA par kilomètre.</li></ul><p>a) Détermine la fonction <span class='math'>\\( f \\)</span> qui donne le prix en FCFA avec le tarif A en fonction du nombre <span class='math'>\\( x \\)</span> de kilomètres parcourus.</p><p>b) Détermine la fonction <span class='math'>\\( g \\)</span> qui donne le prix en FCFA avec le tarif B en fonction du nombre <span class='math'>\\( x \\)</span> de kilomètres parcourus.</p><p>c) Calcule le prix à payer pour un trajet de 8 km avec chaque tarif.</p><p>d) Pour quelle distance les deux tarifs sont-ils égaux ?</p>",
          "reponse": "<p><strong>Correction :</strong></p><p><strong>a)</strong> <span class='math'>\\( f(x) = 500x \\)</span> (fonction linéaire).</p><p><strong>b)</strong> <span class='math'>\\( g(x) = 300x + 2000 \\)</span> (fonction affine).</p><p><strong>c)</strong> Tarif A : <span class='math'>\\( f(8) = 500 \\times 8 = 4000 \\)</span> FCFA.<br> Tarif B : <span class='math'>\\( g(8) = 300 \\times 8 + 2000 = 2400 + 2000 = 4400 \\)</span> FCFA.</p><p><strong>d)</strong> On résout <span class='math'>\\( f(x) = g(x) \\)</span> : <span class='math'>\\( 500x = 300x + 2000 \\)</span> donc <span class='math'>\\( 200x = 2000 \\)</span> d'où <span class='math'>\\( x = 10 \\)</span> km.</p>"
        },
        {
          "question": "<p> (2 pts) Les notes de 20 élèves à un devoir de Mathématiques sont :</p><p><strong>Notes :</strong> 08, 10, 12, 08, 14, 16, 10, 12, 08, 10, 12, 14, 10, 08, 16, 12, 10, 12, 14, 10</p><p>a) Construis le tableau des effectifs et des fréquences en pourcentage.</p><p>b) Calcule la moyenne de la classe.</p><p>c) Construis un diagramme circulaire représentant cette répartition.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p><strong>a)</strong> Tableau des effectifs et fréquences :</p><table style='width: 100%; border-collapse: collapse;'><tr style='background-color: #f2f2f2;'><th style='border: 1px solid #ddd; padding: 8px;'>Note</th><th style='border: 1px solid #ddd; padding: 8px;'>Effectif</th><th style='border: 1px solid #ddd; padding: 8px;'>Fréquence (%)</th></tr><tr><td style='border: 1px solid #ddd; padding: 8px;'>08</td><td style='border: 1px solid #ddd; padding: 8px;'>4</td><td style='border: 1px solid #ddd; padding: 8px;'>20%</td></tr><tr><td style='border: 1px solid #ddd; padding: 8px;'>10</td><td style='border: 1px solid #ddd; padding: 8px;'>6</td><td style='border: 1px solid #ddd; padding: 8px;'>30%</td></tr><tr><td style='border: 1px solid #ddd; padding: 8px;'>12</td><td style='border: 1px solid #ddd; padding: 8px;'>5</td><td style='border: 1px solid #ddd; padding: 8px;'>25%</td></tr><tr><td style='border: 1px solid #ddd; padding: 8px;'>14</td><td style='border: 1px solid #ddd; padding: 8px;'>3</td><td style='border: 1px solid #ddd; padding: 8px;'>15%</td></tr><tr><td style='border: 1px solid #ddd; padding: 8px;'>16</td><td style='border: 1px solid #ddd; padding: 8px;'>2</td><td style='border: 1px solid #ddd; padding: 8px;'>10%</td></tr><tr style='background-color: #f9f9f9;'><td style='border: 1px solid #ddd; padding: 8px;'><strong>Total</strong></td><td style='border: 1px solid #ddd; padding: 8px;'><strong>20</strong></td><td style='border: 1px solid #ddd; padding: 8px;'><strong>100%</strong></td></tr></table><p><strong>b)</strong> Moyenne : <span class='math'>\\( \\bar{x} = \\dfrac{4\\times8 + 6\\times10 + 5\\times12 + 3\\times14 + 2\\times16}{20} = \\dfrac{226}{20} = 11,3 \\)</span>.</p><p><strong>c)</strong> Angles pour le diagramme circulaire :</p><ul><li>08 : <span class='math'>\\( \\dfrac{4}{20} \\times 360^\\circ = 72^\\circ \\)</span></li><li>10 : <span class='math'>\\( \\dfrac{6}{20} \\times 360^\\circ = 108^\\circ \\)</span></li><li>12 : <span class='math'>\\( \\dfrac{5}{20} \\times 360^\\circ = 90^\\circ \\)</span></li><li>14 : <span class='math'>\\( \\dfrac{3}{20} \\times 360^\\circ = 54^\\circ \\)</span></li><li>16 : <span class='math'>\\( \\dfrac{2}{20} \\times 360^\\circ = 36^\\circ \\)</span></li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Théorème de Thalès et trigonométrie",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem;'><p>La figure suivante représente un triangle <span class='math'>\\( ABC \\)</span> rectangle en <span class='math'>\\( A \\)</span> avec <span class='math'>\\( AB = 6 \\)</span> cm et <span class='math'>\\( AC = 8 \\)</span> cm. Les points <span class='math'>\\( M \\)</span> et <span class='math'>\\( N \\)</span> sont respectivement sur les segments <span class='math'>\\( [AB] \\)</span> et <span class='math'>\\( [AC] \\)</span> tels que <span class='math'>\\( AM = 4 \\)</span> cm et <span class='math'>\\( AN = 5 \\)</span> cm.</p><p>(On suppose que la figure est donnée.)</p></div>",
      "questions": [
        {
          "question": "<p> (1 pt) Démontre que les droites <span class='math'>\\( (MN) \\)</span> et <span class='math'>\\( (BC) \\)</span> sont parallèles.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>On a <span class='math'>\\( \\dfrac{AM}{AB} = \\dfrac{4}{6} = \\dfrac{2}{3} \\)</span> et <span class='math'>\\( \\dfrac{AN}{AC} = \\dfrac{5}{8} \\)</span>.</p><p>Comme <span class='math'>\\( \\dfrac{2}{3} \\neq \\dfrac{5}{8} \\)</span> (car <span class='math'>\\( 2 \\times 8 = 16 \\)</span> et <span class='math'>\\( 3 \\times 5 = 15 \\)</span>), la réciproque du théorème de Thalès ne s'applique pas.</p><p><strong>Les droites <span class='math'>\\( (MN) \\)</span> et <span class='math'>\\( (BC) \\)</span> ne sont pas parallèles.</strong></p>"
        },
        {
          "question": "<p> (1 pt) Calcule la longueur <span class='math'>\\( BC \\)</span> (arrondie au dixième).</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>Le triangle <span class='math'>\\( ABC \\)</span> est rectangle en <span class='math'>\\( A \\)</span>, donc d'après le théorème de Pythagore :</p><p><span class='math'>\\( BC^2 = AB^2 + AC^2 = 6^2 + 8^2 = 36 + 64 = 100 \\)</span></p><p><span class='math'>\\( BC = \\sqrt{100} = 10 \\)</span> cm.</p>"
        },
        {
          "question": "<p> (2 pts) Calcule la mesure de l'angle <span class='math'>\\( \\widehat{ABC} \\)</span> (arrondie au degré près).</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>Dans le triangle <span class='math'>\\( ABC \\)</span> rectangle en <span class='math'>\\( A \\)</span>, on a :</p><p><span class='math'>\\( \\cos \\widehat{ABC} = \\dfrac{AB}{BC} = \\dfrac{6}{10} = 0,6 \\)</span></p><p><span class='math'>\\( \\widehat{ABC} = \\cos^{-1}(0,6) \\approx 53^\\circ \\)</span> (arrondi au degré près).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Polygones réguliers",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem;'><p>On considère un hexagone régulier <span class='math'>\\( ABCDEF \\)</span> inscrit dans un cercle de centre <span class='math'>\\( O \\)</span> et de rayon <span class='math'>\\( R = 4 \\)</span> cm.</p></div>",
      "questions": [
        {
          "question": "<p> (1 pt) Détermine la mesure de l'angle au centre <span class='math'>\\( \\widehat{AOB} \\)</span>.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>Un hexagone régulier a 6 côtés. L'angle au centre est <span class='math'>\\( \\dfrac{360^\\circ}{6} = 60^\\circ \\)</span>.</p>"
        },
        {
          "question": "<p> (1 pt) Calcule la mesure de l'angle intérieur <span class='math'>\\( \\widehat{ABC} \\)</span>.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>La mesure d'un angle intérieur d'un polygone régulier à <span class='math'>\\( n \\)</span> côtés est <span class='math'>\\( 180^\\circ - \\dfrac{360^\\circ}{n} \\)</span>.</p><p>Pour <span class='math'>\\( n = 6 \\)</span>, <span class='math'>\\( \\widehat{ABC} = 180^\\circ - \\dfrac{360^\\circ}{6} = 180^\\circ - 60^\\circ = 120^\\circ \\)</span>.</p>"
        },
        {
          "question": "<p> (2 pts) Calcule le périmètre et l'aire de l'hexagone.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>Le côté de l'hexagone régulier est égal au rayon du cercle circonscrit : <span class='math'>\\( AB = R = 4 \\)</span> cm.</p><p>Périmètre : <span class='math'>\\( P = 6 \\times 4 = 24 \\)</span> cm.</p><p>Aire : L'hexagone est composé de 6 triangles équilatéraux de côté 4 cm.</p><p>Aire d'un triangle équilatéral : <span class='math'>\\( \\dfrac{\\sqrt{3}}{4} \\times 4^2 = \\dfrac{\\sqrt{3}}{4} \\times 16 = 4\\sqrt{3} \\)</span> cm².</p><p>Aire totale : <span class='math'>\\( A = 6 \\times 4\\sqrt{3} = 24\\sqrt{3} \\)</span> cm².</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Vecteurs et équations de droites",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem;'><p>Dans un repère orthonormé <span class='math'>\\( (O; \\vec{i}, \\vec{j}) \\)</span>, on donne les points <span class='math'>\\( A(-2; 1) \\)</span>, <span class='math'>\\( B(4; 3) \\)</span> et <span class='math'>\\( C(0; -3) \\)</span>.</p></div>",
      "questions": [
        {
          "question": "<p> (1 pt) Calcule les coordonnées du vecteur <span class='math'>\\( \\overrightarrow{AB} \\)</span>.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p><span class='math'>\\( \\overrightarrow{AB} = (x_B - x_A; y_B - y_A) = (4 - (-2); 3 - 1) = (6; 2) \\)</span>.</p>"
        },
        {
          "question": "<p> (1 pt) Calcule la distance <span class='math'>\\( AB \\)</span>.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p><span class='math'>\\( AB = \\sqrt{(x_B - x_A)^2 + (y_B - y_A)^2} = \\sqrt{6^2 + 2^2} = \\sqrt{36 + 4} = \\sqrt{40} = 2\\sqrt{10} \\)</span>.</p>"
        },
        {
          "question": "<p> (2 pts) Détermine une équation cartésienne de la droite <span class='math'>\\( (AB) \\)</span>.</p>",
          "reponse": "<p><strong>Correction :</strong></p><p>Le vecteur <span class='math'>\\( \\overrightarrow{AB}(6; 2) \\)</span> est un vecteur directeur de la droite <span class='math'>\\( (AB) \\)</span>.</p><p>Un vecteur normal est <span class='math'>\\( \\vec{n}(2; -6) \\)</span> (car <span class='math'>\\( 6 \\times 2 + 2 \\times (-6) = 12 - 12 = 0 \\)</span>).</p><p>L'équation est de la forme <span class='math'>\\( 2x - 6y + c = 0 \\)</span>.</p><p>On utilise le point <span class='math'>\\( A(-2; 1) \\)</span> : <span class='math'>\\( 2(-2) - 6(1) + c = 0 \\)</span> donc <span class='math'>\\( -4 - 6 + c = 0 \\)</span> d'où <span class='math'>\\( c = 10 \\)</span>.</p><p>L'équation cartésienne est <span class='math'>\\( 2x - 6y + 10 = 0 \\)</span>.</p><p>On peut simplifier par 2 : <span class='math'>\\( x - 3y + 5 = 0 \\)</span>.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
