<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Troisième",
  "sequence": "Séquence 2 : Nombres Rationnels et Réels",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Opérations sur les nombres rationnels",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Effectuer les opérations suivantes et donner le résultat sous forme de fraction irréductible :<br><br><div class='math-block'>$$ A = \\frac{2}{3} + \\frac{5}{6} $$</div><div class='math-block'>$$ B = \\frac{7}{4} - \\frac{3}{8} $$</div><div class='math-block'>$$ C = \\frac{4}{5} \\times \\frac{15}{16} $$</div><div class='math-block'>$$ D = \\frac{2}{3} \\div \\frac{5}{9} $$</div></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Calculer \\( A = \\frac{2}{3} + \\frac{5}{6} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$ A = \\frac{2}{3} + \\frac{5}{6} = \\frac{4}{6} + \\frac{5}{6} = \\frac{9}{6} = \\frac{3}{2} $$</div></div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Calculer \\( B = \\frac{7}{4} - \\frac{3}{8} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$ B = \\frac{7}{4} - \\frac{3}{8} = \\frac{14}{8} - \\frac{3}{8} = \\frac{11}{8} $$</div></div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>3) </span> Calculer \\( C = \\frac{4}{5} \\times \\frac{15}{16} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$ C = \\frac{4}{5} \\times \\frac{15}{16} = \\frac{4 \\times 15}{5 \\times 16} = \\frac{60}{80} = \\frac{3}{4} $$</div></div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>4) </span> Calculer \\( D = \\frac{2}{3} \\div \\frac{5}{9} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$ D = \\frac{2}{3} \\div \\frac{5}{9} = \\frac{2}{3} \\times \\frac{9}{5} = \\frac{18}{15} = \\frac{6}{5} $$</div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Racines carrées et simplification",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Simplifier les expressions suivantes :<br><br><div class='math-block'>$$ E = \\sqrt{50} + 2\\sqrt{18} - \\sqrt{32} $$</div><div class='math-block'>$$ F = \\sqrt{27} \\times \\sqrt{12} $$</div></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Simplifier \\( E = \\sqrt{50} + 2\\sqrt{18} - \\sqrt{32} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$ E = \\sqrt{25 \\times 2} + 2\\sqrt{9 \\times 2} - \\sqrt{16 \\times 2} $$</div><div class='math-block'>$$ E = 5\\sqrt{2} + 2 \\times 3\\sqrt{2} - 4\\sqrt{2} = 5\\sqrt{2} + 6\\sqrt{2} - 4\\sqrt{2} = 7\\sqrt{2} $$</div></div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Simplifier \\( F = \\sqrt{27} \\times \\sqrt{12} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$ F = \\sqrt{27 \\times 12} = \\sqrt{324} = 18 $$</div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Comparaison et encadrement",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Comparer les nombres suivants en justifiant, puis encadrer \\( \\sqrt{7} \\) entre deux entiers consécutifs.<br><br><div class='math-block'>$$ \\text{1) } 2\\sqrt{7} \\text{ et } 3\\sqrt{3} $$</div><div class='math-block'>$$ \\text{2) } \\frac{5}{6} \\text{ et } \\frac{7}{8} $$</div></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Comparer \\( 2\\sqrt{7} \\) et \\( 3\\sqrt{3} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On élève au carré (les deux nombres sont positifs) :<br><div class='math-block'>$$ (2\\sqrt{7})^2 = 4 \\times 7 = 28 $$</div><div class='math-block'>$$ (3\\sqrt{3})^2 = 9 \\times 3 = 27 $$</div>Puisque \\( 28 > 27 \\), on a \\( 2\\sqrt{7} > 3\\sqrt{3} \\).</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Comparer \\( \\frac{5}{6} \\) et \\( \\frac{7}{8} \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On met au même dénominateur (24) :<br><div class='math-block'>$$ \\frac{5}{6} = \\frac{20}{24} \\quad ; \\quad \\frac{7}{8} = \\frac{21}{24} $$</div>Puisque \\( 20 < 21 \\), on a \\( \\frac{5}{6} < \\frac{7}{8} \\).</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>3) </span> Encadrer \\( \\sqrt{7} \\) entre deux entiers consécutifs.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On sait que \\( 2^2 = 4 \\) et \\( 3^2 = 9 \\). Comme \\( 4 < 7 < 9 \\), on a \\( 2 < \\sqrt{7} < 3 \\).<br>L'encadrement est \\( 2 < \\sqrt{7} < 3 \\).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Intervalles et intersections",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Soient les intervalles \\( I = [-2; 5[ \\) et \\( J = ]1; 7] \\).<br><br>Déterminer et représenter sur une droite graduée :<br><div class='math-block'>1) \\( I \\cap J \\)</div><div class='math-block'>2) \\( I \\cup J \\)</div></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Déterminer \\( I \\cap J \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>L'intersection est l'ensemble des nombres qui appartiennent à la fois à \\( I \\) et à \\( J \\).<br><div class='math-block'>$$ I \\cap J = ]1; 5[ $$</div>On représente sur une droite graduée l'intervalle ouvert de 1 à 5.</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Déterminer \\( I \\cup J \\)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>La réunion est l'ensemble des nombres qui appartiennent à \\( I \\) ou à \\( J \\).<br><div class='math-block'>$$ I \\cup J = [-2; 7] $$</div>On représente sur une droite graduée l'intervalle fermé de -2 à 7.</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
