<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Troisième",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Applications linéaires et affines",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On considère les applications suivantes :</p><ul><li>\\( f(x) = 3x - 5 \\)</li><li>\\( g(x) = -2x + 4 \\)</li><li>\\( h(x) = 7x \\)</li></ul></div>",
      "questions": [
        {
          "question": "<p> Précise, en justifiant, laquelle de ces applications est linéaire, laquelle est affine non linéaire.</p>",
          "reponse": "<p>\\( h(x) = 7x \\) est une application linéaire car elle est de la forme \\( h(x) = ax \\) avec \\( a = 7 \\).</p><p>\\( f(x) = 3x - 5 \\) et \\( g(x) = -2x + 4 \\) sont des applications affines non linéaires car elles sont de la forme \\( ax + b \\) avec \\( b \\neq 0 \\).</p>"
        },
        {
          "question": "<p> Détermine l'image de \\( -2 \\) par \\( f \\), puis l'image de \\( 3 \\) par \\( h \\).</p>",
          "reponse": "<p>\\( f(-2) = 3(-2) - 5 = -6 - 5 = -11 \\)</p><p>\\( h(3) = 7 \\times 3 = 21 \\)</p>"
        },
        {
          "question": "<p> Détermine l'antécédent de \\( 13 \\) par \\( g \\).</p>",
          "reponse": "<p>On résout \\( g(x) = 13 \\) :</p><p>\\( -2x + 4 = 13 \\)</p><p>\\( -2x = 9 \\)</p><p>\\( x = -4.5 \\)</p><p>L'antécédent de 13 par \\( g \\) est \\( -4.5 \\).</p>"
        },
        {
          "question": "<p> Calcule \\( \\dfrac{f(2)}{g(1)} \\).</p>",
          "reponse": "<p>\\( f(2) = 3(2) - 5 = 6 - 5 = 1 \\)</p><p>\\( g(1) = -2(1) + 4 = -2 + 4 = 2 \\)</p><p>Donc \\( \\dfrac{f(2)}{g(1)} = \\dfrac{1}{2} \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Statistiques - Regroupement en classes",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>Les notes sur 20 obtenues par les élèves d'une classe de Troisième lors d'un devoir sont les suivantes :</p><div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px; margin: 10px 0; text-align: center;'>8 - 12 - 15 - 10 - 14 - 9 - 16 - 11 - 13 - 10 - 17 - 8 - 9 - 12 - 14 - 15 - 11 - 16 - 10 - 13 - 18 - 7 - 12 - 9 - 11 - 14 - 16 - 13 - 10 - 15</div></div>",
      "questions": [
        {
          "question": "<p> Regroupe ces notes en classes d'amplitude 3 en commençant par la classe [6 ; 9[.</p>",
          "reponse": "<p>Classes : [6 ; 9[, [9 ; 12[, [12 ; 15[, [15 ; 18[.</p>"
        },
        {
          "question": "<p> Détermine l'effectif et la fréquence de chaque classe.</p>",
          "reponse": "<ul><li>[6 ; 9[ : effectif 3 (notes : 7, 8, 8) ; fréquence = 3/30 = 0.10 = 10%</li><li>[9 ; 12[ : effectif 9 (notes : 9, 9, 9, 10, 10, 10, 10, 11, 11) ; fréquence = 9/30 = 0.30 = 30%</li><li>[12 ; 15[ : effectif 10 (notes : 12, 12, 12, 13, 13, 13, 14, 14, 14, 15) ; fréquence = 10/30 ≈ 0.33 = 33.3%</li><li>[15 ; 18[ : effectif 8 (notes : 15, 15, 16, 16, 16, 17, 18) ; fréquence = 8/30 ≈ 0.27 = 26.7%</li></ul>"
        },
        {
          "question": "<p> Quelle est la classe modale ?</p>",
          "reponse": "<p>La classe modale est [12 ; 15[ car c'est celle qui a le plus grand effectif (10 élèves).</p>"
        },
        {
          "question": "<p> Calcule la moyenne de cette série statistique, arrondie au dixième.</p>",
          "reponse": "<p>On utilise les centres de classes : 7.5, 10.5, 13.5, 16.5.</p><p>\\( \\bar{x} = \\dfrac{3 \\times 7.5 + 9 \\times 10.5 + 10 \\times 13.5 + 8 \\times 16.5}{30} = \\dfrac{22.5 + 94.5 + 135 + 132}{30} = \\dfrac{384}{30} = 12.8 \\).</p><p>La moyenne est d'environ 12.8.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Équations et inéquations du 1er degré dans ℝ",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>Résous dans \\( \\mathbb{R} \\) les équations et inéquations suivantes :</p></div>",
      "questions": [
        {
          "question": "<p> \\( 5x - 7 = 3x + 9 \\)</p>",
          "reponse": "<p>\\( 5x - 7 = 3x + 9 \\)</p><p>\\( 5x - 3x = 9 + 7 \\)</p><p>\\( 2x = 16 \\)</p><p>\\( x = 8 \\)</p><p>La solution est \\( S = \\{8\\} \\).</p>"
        },
        {
          "question": "<p> \\( (2x - 4)(x + 3) = 0 \\)</p>",
          "reponse": "<p>\\( (2x - 4)(x + 3) = 0 \\)</p><p>Un produit de facteurs est nul si et seulement si l'un des facteurs est nul.</p><p>\\( 2x - 4 = 0 \\) ou \\( x + 3 = 0 \\)</p><p>\\( 2x = 4 \\) ou \\( x = -3 \\)</p><p>\\( x = 2 \\) ou \\( x = -3 \\)</p><p>Les solutions sont \\( S = \\{-3 ; 2\\} \\).</p>"
        },
        {
          "question": "<p> \\( -2x + 5 \\leq 7 \\)</p>",
          "reponse": "<p>\\( -2x + 5 \\leq 7 \\)</p><p>\\( -2x \\leq 7 - 5 \\)</p><p>\\( -2x \\leq 2 \\)</p><p>On divise par \\( -2 \\), qui est négatif, donc le sens de l'inégalité change :</p><p>\\( x \\geq -1 \\)</p><p>L'ensemble solution est \\( S = [-1 ; +\\infty[ \\).</p>"
        },
        {
          "question": "<p> \\( 2(x - 1) > 3(x + 2) \\)</p>",
          "reponse": "<p>\\( 2(x - 1) > 3(x + 2) \\)</p><p>\\( 2x - 2 > 3x + 6 \\)</p><p>\\( 2x - 3x > 6 + 2 \\)</p><p>\\( -x > 8 \\)</p><p>On multiplie par \\( -1 \\), qui est négatif, donc le sens de l'inégalité change :</p><p>\\( x < -8 \\)</p><p>L'ensemble solution est \\( S = ]-\\infty ; -8[ \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Problème - Choix d'un tarif",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>Un club de sport propose deux formules d'abonnement :</p><ul><li><strong>Formule A :</strong> 50 000 FCFA d'abonnement annuel, chaque séance coûte 1 000 FCFA.</li><li><strong>Formule B :</strong> 30 000 FCFA d'abonnement annuel, chaque séance coûte 1 500 FCFA.</li></ul><p>On note \\( x \\) le nombre de séances effectuées par an.</p></div>",
      "questions": [
        {
          "question": "<p> Exprime, en fonction de \\( x \\), le prix \\( A(x) \\) payé avec la formule A et le prix \\( B(x) \\) payé avec la formule B.</p>",
          "reponse": "<p>Formule A : \\( A(x) = 50 000 + 1 000x \\)</p><p>Formule B : \\( B(x) = 30 000 + 1 500x \\)</p>"
        },
        {
          "question": "<p> À partir de combien de séances la formule A est-elle plus avantageuse que la formule B ?</p>",
          "reponse": "<p>On cherche \\( A(x) < B(x) \\) :</p><p>\\( 50 000 + 1 000x < 30 000 + 1 500x \\)</p><p>\\( 50 000 - 30 000 < 1 500x - 1 000x \\)</p><p>\\( 20 000 < 500x \\)</p><p>\\( x > 40 \\)</p><p>La formule A est plus avantageuse à partir de 41 séances (car \\( x \\) est un nombre entier de séances).</p>"
        },
        {
          "question": "<p> Représente graphiquement dans un repère orthogonal les fonctions \\( A \\) et \\( B \\) pour \\( x \\) compris entre 0 et 60. Prends 1 cm pour 5 séances sur l'axe des abscisses et 1 cm pour 10 000 FCFA sur l'axe des ordonnées.</p>",
          "reponse": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #0d6efd; font-weight: bold;'>Instructions pour le graphique :</p><ul><li>Placer l'origine O.</li><li>Axe des abscisses (séances) : 1 cm = 5 séances, donc 60 séances = 12 cm.</li><li>Axe des ordonnées (prix en FCFA) : 1 cm = 10 000 FCFA, donc 120 000 FCFA = 12 cm.</li><li><span style='color: #d32f2f;'>Droite A (rouge)</span> : passe par (0 ; 50 000) et (60 ; 110 000).</li><li><span style='color: #1976d2;'>Droite B (bleue)</span> : passe par (0 ; 30 000) et (60 ; 120 000).</li><li>Les deux droites se coupent au point (40 ; 90 000).</li></ul></div>"
        },
        {
          "question": "<p> Retrouve graphiquement le résultat de la question 2.</p>",
          "reponse": "<p>Graphiquement, la droite \\( A \\) est en dessous de la droite \\( B \\) pour \\( x > 40 \\). Donc la formule A est plus avantageuse à partir de 40 séances.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
