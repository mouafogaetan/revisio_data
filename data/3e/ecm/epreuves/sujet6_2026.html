<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale (ECM)",
  "classe": "Troisième",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Acteurs économiques et citoyenneté",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>L'économie est une activité humaine qui implique plusieurs acteurs aux statuts différents : entreprises, coopératives, tontines et syndicats.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez ce qu'est une <strong>entreprise</strong> et citez ses deux principaux rôles dans la société. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Une <strong>entreprise</strong> est une organisation économique qui produit des biens (produits) ou des services (prestations) destinés à être vendus sur un marché. Ses deux principaux rôles dans la société sont :<br>- Elle crée de la richesse (production).<br>- Elle emploie des travailleurs, contribuant ainsi à l'emploi et à la réduction du chômage.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Expliquez en quoi une <strong>coopérative</strong> se distingue d'une entreprise classique. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Une <strong>coopérative</strong> se distingue d'une entreprise classique par sa finalité : elle n'est pas fondée sur la recherche du profit individuel, mais sur l'aide mutuelle, la solidarité et le développement communautaire. Son fonctionnement est souvent plus démocratique (un adhérent = une voix) et ses bénéfices sont réinvestis au profit de ses membres ou de la communauté.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Qu'est-ce qu'une <strong>tontine</strong> ? Expliquez son rôle social et économique dans le contexte camerounais. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La <strong>tontine</strong> est un système traditionnel d'épargne et de crédit informel. Ses membres versent des sommes d'argent à tour de rôle à un bénéficiaire désigné par un tirage au sort ou selon un ordre préétabli. Sur le plan social, elle renforce les liens de solidarité et d'entraide. Sur le plan économique, elle permet un accès au financement pour les populations non bancarisées, en soutenant des projets personnels ou des micro-entreprises.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Quelle est la mission principale des <strong>syndicats</strong> ? Citez un exemple de leur action. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La mission principale des <strong>syndicats</strong> est de défendre les droits et les intérêts des travailleurs (salariés). Ils négocient avec les employeurs sur les conditions de travail, les salaires, la sécurité au travail, etc. Un exemple d'action est la négociation d'une convention collective ou l'organisation d'un mouvement de grève pour protester contre une décision jugée défavorable aux employés.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : La démocratie camerounaise",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Le Cameroun est un État démocratique. La souveraineté nationale appartient au peuple qui l'exerce par le vote. Les élections sont organisées par des institutions spécialisées.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Distinguez la <strong>démocratie directe</strong> de la <strong>démocratie représentative</strong>. Illustrez par un exemple. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- La <strong>démocratie directe</strong> est un système où les citoyens exercent eux-mêmes le pouvoir, sans intermédiaire. Exemple : le référendum, où le peuple vote directement sur une loi ou une question nationale.<br>- La <strong>démocratie représentative</strong> est un système où les citoyens élisent des représentants (députés, maires, Président) qui exercent le pouvoir en leur nom. Exemple : l'élection présidentielle ou législative au Cameroun.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Citez deux institutions camerounaises chargées de l'organisation des élections et précisez leur rôle. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- Le <strong>Conseil Constitutionnel</strong> : il veille à la régularité des opérations de référendum et des élections présidentielles et législatives ; il proclame les résultats définitifs [citation:0].<br>- <strong>Elections Cameroon (ELECAM)</strong> : c'est l'organe en charge de la gestion de toutes les opérations électorales et référendaires au Cameroun (organisation matérielle, inscription sur les listes électorales, etc.).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Expliquez la notion de <strong>scrutin proportionnel</strong>. Quel est son intérêt pour la représentation politique ? (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le <strong>scrutin proportionnel</strong> est un mode de scrutin qui attribue les sièges aux différents partis politiques en fonction du pourcentage de voix qu'ils ont obtenues. Par exemple, si un parti obtient 30% des voix, il recevra environ 30% des sièges. Son intérêt est d'assurer une représentation plus fidèle et plus juste des opinions politiques dans l'assemblée, y compris pour les partis minoritaires.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Pourquoi dit-on que la <strong>participation citoyenne</strong> est un pilier de la démocratie ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La participation citoyenne est un pilier de la démocratie car c'est elle qui légitime le pouvoir et le système. En votant, en s'engageant dans des associations, en participant à des débats publics, le citoyen exerce sa souveraineté, contribue à la décision collective et contrôle l'action de ses représentants. Sans cette participation, la démocratie n'est qu'un système vide.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Le calcul des sièges (exemple d'application)",
      "points": "3 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Lors d'un scrutin proportionnel, le nombre total de sièges à pourvoir est fixé à 10. Quatre partis politiques (A, B, C et D) ont obtenu les résultats suivants :<br>- Parti A : 3000 voix<br>- Parti B : 4500 voix<br>- Parti C : 1500 voix<br>- Parti D : 1000 voix.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Calculez le nombre total de voix exprimées. (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Total des voix = 3000 + 4500 + 1500 + 1000 = 10 000 voix.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Calculez le quotient électoral (nombre de voix nécessaires pour obtenir un siège). (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Quotient électoral = Total des voix / Nombre de sièges = 10 000 / 10 = 1000 voix. Il faut 1000 voix pour obtenir un siège.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Déterminez le nombre de sièges obtenus par chaque parti. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- Parti A : 3000 / 1000 = 3 sièges<br>- Parti B : 4500 / 1000 = 4 sièges<br>- Parti C : 1500 / 1000 = 1 siège<br>- Parti D : 1000 / 1000 = 1 siège<br>Total : 3+4+1+1 = 9 sièges attribués, il reste 1 siège à attribuer selon le système de la plus forte moyenne (ou du plus fort reste).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Expliquez comment serait attribué le siège restant selon le principe de la <strong>plus forte moyenne</strong>. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Selon la méthode de la plus forte moyenne, on calcule pour chaque parti une nouvelle moyenne en divisant leurs voix totales par le nombre de sièges déjà obtenus + 1. Le parti avec la plus forte moyenne remporte le dernier siège.<br>- Parti A : 3000 / (3+1) = 750<br>- Parti B : 4500 / (4+1) = 900<br>- Parti C : 1500 / (1+1) = 750<br>- Parti D : 1000 / (1+1) = 500<br>Le Parti B a la plus forte moyenne (900). Il obtient donc le 10e siège. Attributions finales : A (3), B (5), C (1), D (1).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Engagement citoyen et vie sociale",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Le citoyen camerounais doit être actif et responsable. Il a des droits, mais aussi des devoirs envers la collectivité.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Distinguez <strong>biens publics</strong> et <strong>biens privés</strong>. Donnez un exemple pour chacun. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- Les <strong>biens publics</strong> sont des biens qui appartiennent à la collectivité et sont gérés par l'État (ou les collectivités). Ils sont accessibles à tous. Exemple : une école publique, une route nationale, un hôpital public.<br>- Les <strong>biens privés</strong> sont des biens qui appartiennent à une personne physique ou morale et qui sont gérés par elle. Exemple : une voiture personnelle, une maison, le fonds de commerce d'une entreprise.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Pourquoi est-il important de lutter contre les <strong>fléaux sociaux</strong> comme la corruption ou le tribalisme ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Lutter contre les fléaux sociaux comme la corruption ou le tribalisme est important car ils menacent la cohésion sociale, la justice, l'égalité des chances et le développement économique. La corruption détourne les ressources publiques au profit de quelques-uns, tandis que le tribalisme favorise la discrimination et peut mener à des conflits intercommunautaires, mettant en péril la paix et l'unité nationale.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Définissez l'<strong>engagement citoyen</strong> et donnez deux exemples concrets. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'<strong>engagement citoyen</strong> est l'ensemble des actions volontaires qu'un individu mène pour contribuer au bien-être de la communauté et à l'amélioration de la vie en société, en dehors de ses obligations légales. Deux exemples concrets :<br>- Participer à une association de quartier pour lutter contre l'insalubrité.<br>- Faire du bénévolat dans une ONG qui soutient l'éducation des enfants défavorisés.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Expliquez le principe du <strong>vivre-ensemble</strong>. Selon vous, comment la tolérance peut-elle y contribuer ? (1 pt)</div>",

      ]
    },
    {

      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Au Cameroun, le multipartisme est une réalité. De nombreux partis politiques coexistent et participent à la vie démocratique, bien que la majorité ait une assise régionale.</p></div>",
      "questions": [

        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Un document mentionne que l'UPC a été fondée en 1948 . À votre avis, pourquoi les partis politiques sont-ils si importants dans une démocratie ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Les partis politiques sont essentiels dans une démocratie car ils sont le canal principal de la participation politique. Ils permettent aux citoyens de s'organiser collectivement, de formuler des choix politiques clairs, de former les futurs dirigeants et de servir de contre-pouvoir face à l'Exécutif, favorisant ainsi le débat d'idées et le pluralisme.</div>"

        {

          "reponse": "<div style='font-size: 1em;'>Le fait que de nombreux partis aient une base ethnique ou régionale est un risque pour la cohésion nationale car cela peut renforcer les clivages communautaires, encourager le repli identitaire et la concurrence malsaine entre les régions. Cela peut également nuire à l'émergence de projets politiques véritablement nationaux et à la stabilité du pays, en fragmentant le champ politique.</div>"

          "reponse": "<div style='font-size: 1em;'>L'État pourrait promouvoir l'éducation à la citoyenneté dès le plus jeune âge, renforcer les mécanismes de dialogue national, encourager les partis à adopter des programmes transcommunautaires, et assurer une répartition équitable des ressources et des postes de responsabilité pour réduire les frustrations régionales.</div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
