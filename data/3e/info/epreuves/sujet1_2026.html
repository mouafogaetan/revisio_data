<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Troisième",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Architecture et Représentation de l'Information (6 pts)",
      "points": "6 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice porte sur l'architecture des ordinateurs et la représentation des données.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Architecture d'un microordinateur (3 pts)</strong></p><p>a) (1 pt) Donne le rôle du processeur (CPU) et de la mémoire vive (RAM) dans l'architecture d'un microordinateur.</p><p>b) (2 pts) Cite deux composants internes d'un microprocesseur et explique brièvement leur rôle.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li><strong>Processeur (CPU) :</strong> C'est le cerveau de l'ordinateur. Il exécute les instructions des programmes et traite les données [citation:5].</li><li><strong>Mémoire vive (RAM) :</strong> C'est la mémoire de travail qui stocke temporairement les données et les programmes en cours d'utilisation pour un accès rapide par le processeur.</li></ul><p><strong>b) (2 pts)</strong></p><ul><li><strong>Unité Arithmétique et Logique (UAL) :</strong> Effectue les opérations arithmétiques (addition, soustraction) et logiques (comparaisons) [citation:2][citation:5].</li><li><strong>Registres :</strong> Petites mémoires très rapides situées à l'intérieur du processeur. Ils stockent temporairement les données et instructions sur lesquelles le CPU travaille [citation:2].</li><li><strong>Unité de Contrôle (UC) :</strong> Dirige les opérations du processeur en envoyant des signaux pour contrôler le flux de données et les instructions [citation:5].</li></ul>"
        },
        {
          "question": "<p><strong>2. Architecture de Von Neumann (1.5 pts)</strong></p><p>a) (0.5 pt) Quel est le principe fondamental de l'architecture de Von Neumann ?</p><p>b) (1 pt) D'après cette architecture, quels sont les trois composants principaux d'un ordinateur ?</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> Le principe fondamental est que les données et les instructions d'un programme sont stockées dans la même mémoire et utilisent le même bus pour la transmission avec le processeur [citation:5].</p><p><strong>b) (1 pt)</strong> Les trois composants principaux de l'architecture de Von Neumann sont :</p><ol><li>Le processeur (CPU)</li><li>La mémoire</li><li>Les périphériques d'entrée/sortie (E/S ou I/O) [citation:5]</li></ol>"
        },
        {
          "question": "<p><strong>3. Codage ASCII (1.5 pts)</strong></p><p>a) (0.5 pt) En utilisant le code ASCII, donne la représentation du caractère <code>A</code>.</p><p>b) (1 pt) Le code ASCII de <code>a</code> est 97. Quelle est sa représentation en binaire ?</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> La représentation décimale de <code>A</code> en ASCII est 65 (en hexadécimal c'est 0x41).</p><p><strong>b) (1 pt)</strong> La représentation binaire de 97 est : (97)<sub>10</sub> = (1100001)<sub>2</sub>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Citoyenneté Numérique (4 pts)",
      "points": "4 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice aborde les concepts de la citoyenneté numérique et de la législation.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Maîtrise de l'information (2 pts)</strong></p><p>a) (1 pt) Explique ce qu'est une <em>fake news</em> (infox) et pourquoi elle représente un danger sur Internet.</p><p>b) (1 pt) Cite une technique simple qui permet de distinguer une information vraie d'une fausse sur Internet.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Une <em>fake news</em> ou infox est une information délibérément fausse ou trompeuse, diffusée pour désinformer ou manipuler l'opinion. Elle représente un danger car elle peut influencer les décisions, créer de la confusion ou nuire à la réputation de personnes ou d'institutions.</p><p><strong>b) (1 pt)</strong> Une technique simple est de vérifier la source de l'information. Consulter plusieurs sources fiables (journaux reconnus, sites officiels) pour confronter les informations permet de détecter les incohérences.</p>"
        },
        {
          "question": "<p><strong>2. Législation et cybercriminalité (2 pts)</strong></p><p>a) (1 pt) Cite un acte considéré comme contraire à l'éthique numérique et pouvant être sanctionné.</p><p>b) (1 pt) Au Cameroun, la loi n° 2010/012 du 21 décembre 2010 relative à la cybersécurité et à la cybercriminalité [citation:3] est un texte important. Cite une des missions de l'Agence Nationale des Technologies de l'Information et de la Communication (ANTIC) dans ce cadre.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Le cyberharcèlement ou le vol de données personnelles (usurpation d'identité) sont des actes contraires à l'éthique numérique.</p><p><strong>b) (1 pt)</strong> L'ANTIC a plusieurs missions, notamment : la promotion des TIC, la régulation des activités de sécurité électronique (comme la certification électronique), l'audit de sécurité et la veille sécuritaire [citation:6].</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Algorithmique et Développement Logiciel (7 pts)",
      "points": "7 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice permet de montrer ses compétences en algorithmique et en structuration des données.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Définition et vocabulaire (1 pt)</strong></p><p>Donne la différence entre une <em>donnée structurée</em> et une <em>donnée non structurée</em>.</p>",
          "reponse": "<p>Les <strong>données structurées</strong> sont organisées selon un modèle prédéfini (comme un tableau avec des lignes et des colonnes), ce qui facilite leur recherche et leur analyse. Les <strong>données non structurées</strong> n'ont pas de format fixe, comme une image ou un texte libre, et sont plus difficiles à interroger.</p>"
        },
        {
          "question": "<p><strong>2. Algorithmique et LDA (4 pts)</strong></p><p>Le Langage de Définition des Algorithmes (LDA) est utilisé pour formaliser la résolution d'un problème.</p><p>a) (1 pt) Qu'est-ce qu'une variable ? Qu'est-ce qu'une constante ?</p><p>b) (3 pts) Un magasin vend des livres à 2000 FCFA l'unité. Le prix total est calculé en multipliant le prix unitaire par la quantité achetée.</p><ul><li>Écris un algorithme en LDA qui demande à l'utilisateur la quantité de livres achetés, calcule le prix total et affiche le résultat.</li></ul>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li>Une <strong>variable</strong> est un emplacement mémoire qui peut stocker une valeur modifiable au cours de l'exécution de l'algorithme.</li><li>Une <strong>constante</strong> est un emplacement mémoire qui stocke une valeur qui ne change pas pendant toute l'exécution de l'algorithme.</li></ul><p><strong>b) (3 pts)</strong></p><pre><code>Algorithme CalculPrixTotal\n  Constante PRIX_UNITAIRE <- 2000\n  Variable quantite, prixTotal : Entier\n  \n  Debut\n    Ecrire(\"Entrez la quantité de livres achetés : \")\n    Lire(quantite)\n    \n    prixTotal <- quantite * PRIX_UNITAIRE\n    \n    Ecrire(\"Le prix total est de : \", prixTotal, \" FCFA\")\n  Fin\n</code></pre><p><em>Remarque : L'instruction <code>Lire</code> est utilisée pour l'entrée, <code>Ecrire</code> pour la sortie, et <code><-</code> pour l'affectation.</em></p>"
        },
        {
          "question": "<p><strong>3. Structures de contrôle (2 pts)</strong></p><p>a) (1 pt) Dans un algorithme, à quoi sert une structure alternative (<code>SI...ALORS...SINON</code>) ?</p><p>b) (1 pt) Quelle structure itérative utiliserait-on pour afficher les nombres de 1 à 10 ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Une structure alternative permet d'exécuter un bloc d'instructions seulement si une condition est vraie (SI), et éventuellement un autre bloc si elle est fausse (SINON). Elle sert à prendre des décisions dans le programme.</p><p><strong>b) (1 pt)</strong> On peut utiliser la boucle <code>POUR</code> (ou <code>REPETER</code> ou <code>TANT QUE</code>) :</p><pre><code>POUR i DE 1 A 10 FAIRE\n  Ecrire(i)\nFIN POUR\n</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Questions de Cours (3 pts)",
      "points": "3 pts",
      "enonce": "<div class='exercise-block'><p>Répondez aux questions suivantes en vous appuyant sur vos connaissances.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Développement logiciel (1.5 pts)</strong></p><p>a) (0.5 pt) Quelle est la différence principale entre un programme et un logiciel ?</p><p>b) (1 pt) Cite les deux principaux types de codage pour les images (numériques) et donne une caractéristique pour chacun.</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> Un <strong>programme</strong> est une suite d'instructions exécutables, tandis qu'un <strong>logiciel</strong> est un ensemble cohérent de programmes, de données et de documentation destiné à une tâche spécifique.</p><p><strong>b) (1 pt)</strong></p><ul><li><strong>Images matricielles (ou bitmap) :</strong> Représentées par une grille de pixels, chaque pixel ayant une couleur. Elles sont dépendantes de la résolution.</li><li><strong>Images vectorielles :</strong> Représentées par des formes géométriques (lignes, courbes) définies par des équations mathématiques. Elles sont indépendantes de la résolution et peuvent être agrandies sans perte de qualité.</li></ul>"
        },
        {
          "question": "<p><strong>2. Santé numérique (1.5 pts)</strong></p><p>Décris un effet négatif que peut avoir une utilisation excessive des outils numériques sur la santé et propose une action pour y remédier.</p>",
          "reponse": "<p><strong>Effet négatif :</strong> La fatigue visuelle (ou syndrome de vision par ordinateur) due à la lumière bleue des écrans peut provoquer des maux de tête et une sécheresse oculaire.</p><p><strong>Action pour y remédier :</strong> Appliquer la règle du 20-20-20 (toutes les 20 minutes, regarder un objet à 20 pieds (environ 6 mètres) pendant 20 secondes) et régler la luminosité de l'écran pour qu'elle soit confortable.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
