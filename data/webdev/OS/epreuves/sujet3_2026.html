<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux Systèmes d'exploitation",
 "classe": "Développement Web",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Questions de Cours (8 pts)",
     "points": "8 pts",
     "enonce": "<h3>Partie 1 : Concepts fondamentaux</h3><p>Répondez de manière claire et concise aux questions suivantes :</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (2 pts)</strong> Définissez un système d'exploitation et énumérez ses trois fonctions principales.</p>",
         "reponse": "<p><strong>Réponse :</strong> Un système d'exploitation (OS) est un logiciel qui sert d'interface entre le matériel de l'ordinateur et l'utilisateur [citation:1]. Ses trois fonctions principales sont :<br>1. La gestion des ressources (processeur, mémoire, périphériques) [citation:1]<br>2. L'abstraction du matériel pour les applications<br>3. La sécurité et la protection des données [citation:5]</p>"
       },
       {
         "question": "<p><strong>1.2 (2 pts)</strong> Expliquez la différence entre un processus et un thread.</p>",
         "reponse": "<p><strong>Réponse :</strong> Un <strong>processus</strong> est un programme en cours d'exécution avec son propre espace d'adressage et ses ressources. Un <strong>thread</strong> est une unité d'exécution légère au sein d'un processus, partageant l'espace mémoire et les ressources de ce processus [citation:1]. Les threads sont donc plus rapides à créer et à gérer [citation:7].</p>"
       },
       {
         "question": "<p><strong>1.3 (2 pts)</strong> Citez et expliquez brièvement les quatre conditions de Coffman nécessaires pour qu'un interblocage (deadlock) se produise.</p>",
         "reponse": "<p><strong>Réponse :</strong> Les quatre conditions de Coffman sont :<br>1. <strong>Exclusion mutuelle</strong> : les ressources ne peuvent être utilisées que par un seul processus à la fois [citation:9]<br>2. <strong>Détention et attente</strong> : un processus maintient des ressources tout en en demandant d'autres [citation:9]<br>3. <strong>Non-préemption</strong> : les ressources ne peuvent être retirées que volontairement<br>4. <strong>Attente circulaire</strong> : une chaîne circulaire de processus où chacun attend une ressource détenue par un autre</p>"
       },
       {
         "question": "<p><strong>1.4 (2 pts)</strong> Qu'est-ce que la mémoire virtuelle et à quoi sert le mécanisme de <em>page fault</em> ?</p>",
         "reponse": "<p><strong>Réponse :</strong> La <strong>mémoire virtuelle</strong> est une technique qui permet à un processus d'utiliser un espace d'adressage plus grand que la mémoire physique disponible [citation:3]. Le <strong>page fault</strong> survient lorsqu'un processus tente d'accéder à une page mémoire qui n'est pas chargée en RAM, provoquant son chargement depuis le disque [citation:3].</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Ordonnancement des processus (6 pts)",
     "points": "6 pts",
     "enonce": "<h3>Partie 2 : Algorithmes d'ordonnancement</h3><p>Considérez les processus suivants avec leurs temps d'exécution (burst time) :</p><div style='background: #f0f0f0; padding: 10px; border-radius: 5px;'><table style='width: 100%; border-collapse: collapse;'><tr style='background: #ddd;'><th style='border: 1px solid #ccc; padding: 8px;'>Processus</th><th style='border: 1px solid #ccc; padding: 8px;'>Temps d'exécution (ms)</th></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P1</td><td style='border: 1px solid #ccc; padding: 8px;'>6</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P2</td><td style='border: 1px solid #ccc; padding: 8px;'>4</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P3</td><td style='border: 1px solid #ccc; padding: 8px;'>8</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P4</td><td style='border: 1px solid #ccc; padding: 8px;'>3</td></tr></table></div><p>Tous les processus arrivent en même temps (temps 0).</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (2 pts)</strong> Calculez le temps d'attente moyen pour l'algorithme SJF (Shortest Job First - non préemptif).</p>",
         "reponse": "<p><strong>Réponse :</strong> L'ordre d'exécution SJF est P4 (3ms), P2 (4ms), P1 (6ms), P3 (8ms).<br><br>Temps d'attente :<br>P4 : 0ms<br>P2 : 3ms<br>P1 : 3+4=7ms<br>P3 : 3+4+6=13ms<br><br>Temps d'attente moyen = (0+3+7+13)/4 = 23/4 = <strong>5,75 ms</strong></p>"
       },
       {
         "question": "<p><strong>2.2 (2 pts)</strong> Calculez le temps d'attente moyen pour l'algorithme Round Robin avec un quantum de temps de 2 ms.</p>",
         "reponse": "<p><strong>Réponse :</strong> L'ordre d'exécution Round Robin (quantum 2ms) :<br>P1(2), P2(2), P3(2), P4(2), P1(2), P2(2), P3(2), P1(2), P3(2), P3(2)<br><br>Les temps de fin :<br>P1 : 2+2+2+2 = 8ms<br>P2 : 2+2+2 = 6ms<br>P3 : 2+2+2+2+2 = 10ms<br>P4 : 2+2 = 4ms<br><br>Temps d'attente = temps de fin - temps d'exécution<br>P1 : 8-6=2ms<br>P2 : 6-4=2ms<br>P3 : 10-8=2ms<br>P4 : 4-3=1ms<br><br>Moyenne = (2+2+2+1)/4 = <strong>1,75 ms</strong></p>"
       },
       {
         "question": "<p><strong>2.3 (2 pts)</strong> L'algorithme Round Robin est-il préemptif ou non-préemptif ? Expliquez pourquoi.</p>",
         "reponse": "<p><strong>Réponse :</strong> Round Robin est un <strong>algorithme préemptif</strong>. Il interrompt le processus en cours d'exécution à chaque fin de quantum pour donner le tour au suivant, même si le processus n'a pas terminé son exécution [citation:1]. Cela permet un bon partage du temps processeur entre tous les processus.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Gestion de la mémoire (6 pts)",
     "points": "6 pts",
     "enonce": "<h3>Partie 3 : Pagination et mémoire virtuelle</h3><p>Un système utilise la pagination avec une taille de page de 4 Ko. La table des pages d'un processus est la suivante :</p><div style='background: #f0f0f0; padding: 10px; border-radius: 5px;'><table style='width: 100%; border-collapse: collapse;'><tr style='background: #ddd;'><th style='border: 1px solid #ccc; padding: 8px;'>Numéro de page (logique)</th><th style='border: 1px solid #ccc; padding: 8px;'>Cadre physique</th></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>0</td><td style='border: 1px solid #ccc; padding: 8px;'>2</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>1</td><td style='border: 1px solid #ccc; padding: 8px;'>5</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>2</td><td style='border: 1px solid #ccc; padding: 8px;'>7</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>3</td><td style='border: 1px solid #ccc; padding: 8px;'>Non chargé</td></tr></table></div>",
     "questions": [
       {
         "question": "<p><strong>3.1 (2 pts)</strong> Calculez l'adresse physique correspondant à l'adresse logique 0x1234 (en hexadécimal). (Rappel : 4 Ko = 0x1000 octets)</p>",
         "reponse": "<p><strong>Réponse :</strong> Adresse logique 0x1234 = 0001 0010 0011 0100₂. Puisque 4Ko = 0x1000 = 2¹², les 4 derniers chiffres hexadécimaux représentent le déplacement. La page est donc 0x1 (page 1) et le déplacement 0x234. La page 1 est dans le cadre 0x5. L'adresse physique = 0x5 * 0x1000 + 0x234 = 0x5000 + 0x234 = <strong>0x5234</strong></p>"
       },
       {
         "question": "<p><strong>3.2 (2 pts)</strong> Que se passe-t-il si le programme accède à l'adresse logique correspondant à la page 3 ? Expliquez le mécanisme mis en œuvre par le système d'exploitation.</p>",
         "reponse": "<p><strong>Réponse :</strong> La page 3 n'est pas chargée en mémoire. Cela provoque une <strong>exception de défaut de page (page fault)</strong> [citation:3]. Le système d'exploitation doit :<br>1. Charger la page depuis le disque vers la RAM<br>2. Mettre à jour la table des pages<br>3. Redémarrer l'instruction qui a provoqué l'erreur</p>"
       },
       {
         "question": "<p><strong>3.3 (2 pts)</strong> Expliquez en quoi consiste l'algorithme de remplacement de pages LRU (Least Recently Used).</p>",
         "reponse": "<p><strong>Réponse :</strong> LRU remplace la page qui n'a pas été utilisée depuis le plus longtemps [citation:3]. Elle fonctionne en suivant l'hypothèse de localité temporelle : une page utilisée récemment a plus de chances d'être réutilisée qu'une page non utilisée. C'est un algorithme optimal dans la pratique mais coûteux à implémenter car il faut maintenir l'historique des accès.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Interblocage - Algorithme du Banquier (5 pts)",
     "points": "5 pts",
     "enonce": "<h3>Partie 4 : Éviter les interblocages</h3><p>Un système a 3 types de ressources A, B, C. Les quantités totales sont : A=10, B=7, C=5. L'état actuel est :</p><div style='background: #f0f0f0; padding: 10px; border-radius: 5px;'><table style='width: 100%; border-collapse: collapse;'><tr style='background: #ddd;'><th style='border: 1px solid #ccc; padding: 8px;'>Processus</th><th style='border: 1px solid #ccc; padding: 8px;'>Allocation (A,B,C)</th><th style='border: 1px solid #ccc; padding: 8px;'>Max (A,B,C)</th></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P0</td><td style='border: 1px solid #ccc; padding: 8px;'>(2,1,0)</td><td style='border: 1px solid #ccc; padding: 8px;'>(6,4,2)</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P1</td><td style='border: 1px solid #ccc; padding: 8px;'>(1,2,1)</td><td style='border: 1px solid #ccc; padding: 8px;'>(5,2,3)</td></tr><tr><td style='border: 1px solid #ccc; padding: 8px;'>P2</td><td style='border: 1px solid #ccc; padding: 8px;'>(0,1,1)</td><td style='border: 1px solid #ccc; padding: 8px;'>(4,3,2)</td></tr></table></div>",
     "questions": [
       {
         "question": "<p><strong>4.1 (2 pts)</strong> Calculez la matrice Besoin (Need = Max - Allocation) et le vecteur Disponible.</p>",
         "reponse": "<p><strong>Réponse :</strong> Ressources totales (10,7,5).<br><br>Allocation totale = (2+1+0, 1+2+1, 0+1+1) = (3,4,2)<br><strong>Disponible = (10-3, 7-4, 5-2) = (7,3,3)</strong><br><br>Need (besoin) :<br>P0 : (6-2, 4-1, 2-0) = <strong>(4,3,2)</strong><br>P1 : (5-1, 2-2, 3-1) = <strong>(4,0,2)</strong><br>P2 : (4-0, 3-1, 2-1) = <strong>(4,2,1)</strong></p>"
       },
       {
         "question": "<p><strong>4.2 (3 pts)</strong> Utilisez l'algorithme du banquier pour déterminer si l'état est sûr. Si oui, donnez la séquence d'exécution sécurisée. Si non, expliquez pourquoi.</p>",
         "reponse": "<p><strong>Réponse :</strong> L'algorithme du banquier vérifie s'il existe une séquence où chaque processus peut obtenir ses ressources maximales [citation:2].<br><br>Disponible = (7,3,3).<br><br>1. P0 : Need (4,3,2) ≤ (7,3,3) ? Oui. On simule sa terminaison : (7+2, 3+1, 3+0) = (9,4,3)<br>2. P1 : Need (4,0,2) ≤ (9,4,3) ? Oui. Terminaison : (9+1, 4+2, 3+1) = (10,6,4)<br>3. P2 : Need (4,2,1) ≤ (10,6,4) ? Oui. Terminaison : (10+0, 6+1, 4+1) = (10,7,5)<br><br>L'état est <strong>sûr</strong> car tous les processus peuvent terminer. <strong>Séquence sécurisée : P0 → P1 → P2</strong> [citation:10].</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
