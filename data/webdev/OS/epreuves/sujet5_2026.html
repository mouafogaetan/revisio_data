<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux Systèmes d'exploitation",
 "classe": "Développement Web",
 "sequence": "Séquence 5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Questions de cours (QCM)",
     "points": "4 pts",
     "enonce": "<p>Pour chaque affirmation, choisissez la ou les bonnes réponses. Une réponse juste rapporte <strong>0.5 point</strong>. Une réponse fausse retire 0.25 point.</p>",
     "questions": [
       {
         "question": "1) La virtualisation consiste à :",
         "reponse": "<p><strong>Réponse :</strong> C</p><ul><li>A. Multiplier le nombre de processeurs physiques</li><li>B. Augmenter la taille de la mémoire RAM</li><li>C. Créer une <strong>abstraction</strong> des ressources matérielles pour exécuter plusieurs environnements</li><li>D. Remplacer le système d'exploitation par un hyperviseur</li></ul>"
       },
       {
         "question": "2) Un hyperviseur de <strong>Type 1 (Bare Metal)</strong> s'exécute :",
         "reponse": "<p><strong>Réponse :</strong> A</p><ul><li>A. <strong>Directement</strong> sur le matériel sans système d'exploitation hôte</li><li>B. Comme une application sur un système d'exploitation existant</li><li>C. Uniquement sur les serveurs Windows</li><li>D. Sur un système d'exploitation Linux uniquement</li></ul>"
       },
       {
         "question": "3) Parmi les exemples suivants, lequel est un hyperviseur de <strong>Type 2</strong> ?",
         "reponse": "<p><strong>Réponse :</strong> B</p><ul><li>A. VMware ESXi</li><li>B. <strong>Oracle VirtualBox</strong></li><li>C. Microsoft Hyper-V</li><li>D. KVM</li></ul>"
       },
       {
         "question": "4) Un <strong>conteneur</strong> (Docker) se distingue d'une machine virtuelle par :",
         "reponse": "<p><strong>Réponse :</strong> A</p><ul><li>A. Le <strong>partage</strong> du noyau de l'hôte avec les autres conteneurs</li><li>B. La nécessité d'un hyperviseur</li><li>C. Une isolation matérielle plus forte</li><li>D. Un démarrage beaucoup plus lent</li></ul>"
       },
       {
         "question": "5) Dans un système Linux, les <strong>namespaces</strong> permettent :",
         "reponse": "<p><strong>Réponse :</strong> B</p><ul><li>A. De limiter la consommation de ressources</li><li>B. D'<strong>isoler</strong> les processus entre conteneurs</li><li>C. De créer des machines virtuelles</li><li>D. De gérer les utilisateurs</li></ul>"
       },
       {
         "question": "6) Les <strong>cgroups</strong> sous Linux servent à :",
         "reponse": "<p><strong>Réponse :</strong> C</p><ul><li>A. Isoler les processus</li><li>B. Créer des conteneurs</li><li>C. <strong>Limiter</strong> et surveiller l'utilisation des ressources (CPU, RAM)</li><li>D. Gérer les permissions des fichiers</li></ul>"
       },
       {
         "question": "7) L'architecture de Docker repose sur :",
         "reponse": "<p><strong>Réponse :</strong> A</p><ul><li>A. Un <strong>daemon</strong> (serveur) et des <strong>images</strong> comme modèles de conteneurs</li><li>B. Un hyperviseur pour chaque conteneur</li><li>C. Un système d'exploitation complet par conteneur</li><li>D. Une machine virtuelle pour chaque image</li></ul>"
       },
       {
         "question": "8) La différence principale entre <strong>buffer</strong> et <strong>cache</strong> est :",
         "reponse": "<p><strong>Réponse :</strong> A</p><ul><li>A. Le buffer <strong>tamponne</strong> pour lisser les vitesses, le cache <strong>stocker</strong> des données réutilisées</li><li>B. Le buffer est sur le disque, le cache est en RAM</li><li>C. Le cache est plus lent que le buffer</li><li>D. Il n'y a pas de différence</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Hyperviseurs et virtualisation",
     "points": "5 pts",
     "enonce": "<p>Vous êtes administrateur système dans une entreprise camerounaise de e-commerce. L'entreprise souhaite optimiser ses serveurs physiques en utilisant la virtualisation.</p>",
     "questions": [
       {
         "question": "1) L'entreprise possède 5 serveurs physiques qui tournent à 30% de leur capacité. Expliquez comment la <strong>virtualisation</strong> pourrait aider à <strong>consolider</strong> ces serveurs. (1 pt)",
         "reponse": "<p><strong>Réponse :</strong></p><p>La virtualisation permettrait de transformer les 5 serveurs en un pool de ressources. Des machines virtuelles seraient créées et réparties sur un plus petit nombre de serveurs physiques (par exemple 2 ou 3). Cela augmenterait le taux d'utilisation des serveurs (de 30% à 70-80%), réduirait la consommation d'énergie, l'espace et les coûts de maintenance.</p>"
       },
       {
         "question": "2) L'entreprise hésite entre un hyperviseur <strong>Type 1</strong> (VMware ESXi) et un hyperviseur <strong>Type 2</strong> (VirtualBox). Pour chaque cas, indiquez lequel est le plus adapté et justifiez :<br>a) Serveurs de production critiques (hébergement de l'application e-commerce).<br>b) Environnement de test pour un développeur sur son poste de travail. (2 pts)",
         "reponse": "<p><strong>Réponse :</strong></p><p>a) Serveurs de production : <strong>Type 1 (VMware ESXi)</strong>. Les hyperviseurs Type 1 offrent de meilleures performances et une plus grande stabilité car ils s'exécutent directement sur le matériel. Ils sont conçus pour les charges de travail critiques où la performance et la fiabilité sont primordiales.</p><p>b) Environnement de test sur poste de travail : <strong>Type 2 (VirtualBox)</strong>. Les hyperviseurs Type 2 sont plus faciles à installer et à utiliser sur un poste de travail. Ils sont parfaits pour le développement et les tests car ils n'affectent pas le système d'exploitation hôte.</p>"
       },
       {
         "question": "3) L'équipe de développement souhaite utiliser Docker pour ses conteneurs. <strong>Expliquez la différence</strong> entre une machine virtuelle (VM) et un conteneur Docker en termes de ressources, de démarrage et d'isolation. (2 pts)",

       }
     ]
   },
   {
     "titre": "Exercice 3 : Buffer, Cache et Spooling",
     "points": "3 pts",
     "enonce": "<p>Associez chaque concept à sa définition et à un exemple concret.</p>",
     "questions": [
       {
         "question": "1) <strong>Buffer</strong> (tampon)",
         "reponse": "<p><strong>Définition :</strong> Zone mémoire temporaire qui lisse les différences de débit entre deux composants. <strong>Exemple :</strong> Tampon d'un lecteur vidéo pour éviter les saccades.</p>"
       },
       {
         "question": "2) <strong>Cache</strong>",
         "reponse": "<p><strong>Définition :</strong> Mémoire rapide qui stocke des données réutilisées pour accélérer les accès futurs. <strong>Exemple :</strong> Cache du navigateur pour les images et scripts.</p>"
       },
       {
         "question": "3) <strong>Spooling</strong>",
         "reponse": "<p><strong>Définition :</strong> Technique qui met en file d'attente les données destinées à un périphérique lent. <strong>Exemple :</strong> File d'attente d'impression (l'utilisateur continue à travailler pendant que l'imprimante imprime).</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Cas pratique - Virtualisation",
     "points": "4 pts",
     "enonce": "<p>Une entreprise d'hébergement web souhaite migrer son infrastructure vers la virtualisation pour offrir des services de cloud computing.</p>",
     "questions": [
       {
         "question": "1) Quel type d'hyperviseur conseilleriez-vous pour cette infrastructure cloud ? Justifiez votre choix. (1 pt)",
         "reponse": "<p><strong>Réponse :</strong></p><p>Il est conseillé d'utiliser un hyperviseur de <strong>Type 1 (Bare Metal)</strong> comme VMware ESXi, KVM ou Hyper-V. Ces hyperviseurs offrent les meilleures performances, une stabilité optimale et sont conçus pour les charges de travail intensives. Ils permettent de maximiser l'utilisation des ressources et d'assurer la haute disponibilité nécessaire à un service cloud.</p>"
       },
       {
         "question": "2) L'entreprise veut également proposer des <strong>conteneurs</strong> (comme Docker) en plus des machines virtuelles. Comment les conteneurs peuvent-ils compléter la virtualisation dans ce contexte ? (1.5 pts)",
         "reponse": "<p><strong>Réponse :</strong></p><p>Les conteneurs sont plus légers et démarrent plus rapidement que les VM. Ils sont idéaux pour le déploiement d'applications microservices. Dans ce contexte, l'entreprise peut utiliser les VM pour l'infrastructure de base (isolation forte) et les conteneurs pour les applications des clients, offrant ainsi une flexibilité maximale et une optimisation des ressources.</p>"
       },
       {
         "question": "3) Quels mécanismes Linux (<strong>namespaces</strong> et <strong>cgroups</strong>) sont utilisés pour l'isolation et le contrôle des ressources des conteneurs ? Expliquez leur rôle. (1.5 pts)",

   {
     "titre": "Exercice 5 : QCM - Virtualisation et conteneurisation",

     "enonce": "<p>Cochez la ou les bonnes réponses pour chaque question.</p>",
     "questions": [
       {
         "question": "1) Quelles sont les caractéristiques d'un hyperviseur de <strong>Type 1</strong> ?",
         "reponse": "<p><strong>Réponses :</strong> A, C, D</p><ul><li>A. S'exécute <strong>directement</strong> sur le matériel</li><li>B. Dépend d'un système d'exploitation hôte</li><li>C. Offre de meilleures <strong>performances</strong></li><li>D. Utilisé dans les <strong>datacenters</strong></li></ul>"

       {

       },
       {
         "question": "3) Les <strong>conteneurs</strong> présentent les avantages suivants par rapport aux machines virtuelles :",
         "reponse": "<p><strong>Réponses :</strong> A, B</p><ul><li>A. <strong>Démarrage</strong> plus rapide</li><li>B. <strong>Consommation</strong> de ressources réduite</li><li>C. Isolation plus forte</li><li>D. Compatible avec tous les systèmes d'exploitation</li></ul>"
       },
       {

         "reponse": "<p><strong>Réponses :</strong> A, B</p><ul><li>A. <strong>Limiter</strong> la consommation de CPU d'un processus</li><li>B. <strong>Limiter</strong> la consommation de mémoire d'un processus</li><li>C. Isoler le réseau d'un processus</li><li>D. Créer des machines virtuelles</li></ul>"

       {

       {

         "reponse": "<p><strong>Réponses :</strong> A, B, C, D</p><ul><li>A. <strong>Consolidation</strong> des serveurs</li><li>B. <strong>Isolation</strong> des applications</li><li>C. <strong>Flexibilité</strong> de déploiement</li><li>D. <strong>Économies</strong> d'énergie et de coûts</li></ul>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
