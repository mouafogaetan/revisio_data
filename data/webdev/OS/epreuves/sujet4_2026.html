<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux Systèmes d'exploitation",
 "classe": "Développement Web",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Questions de Cours",
     "points": "8 pts",
     "enonce": "Répondez aux questions suivantes de manière claire et précise.",
     "questions":[
       {
         "question": "1) Définissez un système d'exploitation. Citez trois de ses rôles principaux. (3 pts)",
         "reponse": "Un système d'exploitation est un ensemble de programmes qui agit comme une interface entre le matériel (la machine physique) et l'utilisateur ou les logiciels applicatifs. Ses rôles principaux sont : la gestion des ressources (processeur, mémoire, périphériques), l'abstraction matérielle (offre une machine virtuelle plus simple à utiliser), et la sécurité (contrôle des accès et protection)."
       },
       {
         "question": "2) Expliquez la différence entre un processus et un thread. (2 pts)",
         "reponse": "Un processus est un programme en cours d'exécution, avec son propre espace d'adressage (mémoire, registres). Un thread est un processus léger, une unité d'exécution plus petite qui partage l'espace d'adressage et les ressources de son processus parent. Plusieurs threads peuvent s'exécuter simultanément au sein d'un même processus."
       },
       {
         "question": "3) Qu'est-ce qu'un appel système (system call) ? Donnez deux exemples concrets. (1.5 pts)",
         "reponse": "Un appel système est un mécanisme qui permet à un programme utilisateur de demander un service au noyau du système d'exploitation. C'est l'interface entre le mode utilisateur et le mode noyau. Exemples : open() pour ouvrir un fichier, read() pour lire des données, write() pour écrire, ou fork() pour créer un nouveau processus."
       },
       {
         "question": "4) Citez deux types de malwares et décrivez brièvement leur fonctionnement. (1.5 pts)",
         "reponse": "Un virus est un malware qui s'attache à un fichier exécutable et se propage lorsque ce fichier est exécuté. Un ver (worm) est un malware qui se propage de manière autonome sur un réseau, sans nécessiter l'action d'un utilisateur."
       }
     ]
   },
   {
     "titre": "Algorithme d'ordonnancement et Gestion Mémoire",
     "points": "5 pts",
     "enonce": "On considère les processus suivants avec leurs temps d'exécution (en ms), arrivés en même temps à t=0 :\n- P1 : 10 ms\n- P2 : 5 ms\n- P3 : 8 ms\n- P4 : 3 ms",
     "questions":[
       {
         "question": "1) Calculez le temps d'attente moyen et le temps de réponse moyen pour l'algorithme SJF (Shortest Job First, non préemptif). (2 pts)",
         "reponse": "Ordre d'exécution : P4 (3), P2 (5), P3 (8), P1 (10).\nTemps d'attente : P4=0, P2=3, P3=8, P1=16.\nTemps d'attente moyen = (0+3+8+16)/4 = 27/4 = 6.75 ms.\nTemps de réponse moyen = temps d'attente + temps d'exécution : P4=3, P2=8, P3=16, P1=26.\nMoyenne = (3+8+16+26)/4 = 53/4 = 13.25 ms."
       },
       {
         "question": "2) Expliquez le concept de 'fragmentation externe' et de 'fragmentation interne' dans le contexte de la gestion de la mémoire. (2 pts)",
         "reponse": "La fragmentation externe se produit lorsqu'il y a suffisamment de mémoire totale disponible pour satisfaire une demande, mais que cette mémoire est morcelée en petits blocs non contigus, ce qui empêche l'allocation. La fragmentation interne se produit lorsqu'un bloc de mémoire alloué à un processus est plus grand que nécessaire, l'espace inutilisé à l'intérieur du bloc est perdu."
       },
       {
         "question": "3) Expliquez le principe de la mémoire virtuelle. (1 pt)",
         "reponse": "La mémoire virtuelle est une technique qui permet à un système d'exploitation de donner à chaque processus l'illusion d'un espace d'adressage continu et de grande taille, souvent plus grand que la mémoire physique (RAM) disponible. Cela est réalisé en utilisant une partie du disque dur (le swap) pour stocker des données qui ne sont pas immédiatement nécessaires en RAM."
       }
     ]
   },
   {
     "titre": "Deadlocks (Interblocages)",
     "points": "4 pts",
     "enonce": "Répondez aux questions suivantes concernant les situations de blocage.",
     "questions":[
       {
         "question": "1) Quelles sont les 4 conditions de Coffman nécessaires à l'apparition d'un interblocage (deadlock) ? (2 pts)",
         "reponse": "Les 4 conditions de Coffman sont :\n- Exclusion mutuelle : la ressource ne peut être utilisée que par un seul processus à la fois.\n- Détention et attente : un processus détient une ressource et attend d'en obtenir une autre détenue par un autre processus.\n- Non-préemption : la ressource ne peut pas être retirée de force à un processus ; seul le processus peut la libérer volontairement.\n- Attente circulaire : il existe une chaîne de processus, chacun attendant une ressource détenue par le suivant dans la chaîne."
       },
       {
         "question": "2) Comment peut-on prévenir un interblocage en agissant sur la condition 'détention et attente' ? (1 pt)",
         "reponse": "On peut prévenir cette condition en imposant à un processus de demander toutes ses ressources en une seule fois, avant de commencer son exécution. S'il ne peut pas toutes les obtenir, il n'en détient aucune et attend."
       },
       {
         "question": "3) Dans un graphe d'attente (wait-for graph), comment identifie-t-on un interblocage ? (1 pt)",
         "reponse": "Dans un graphe d'attente, un interblocage est identifié par la présence d'un cycle. Chaque nœud du graphe représente un processus, et une arête de P1 vers P2 signifie que P1 attend une ressource détenue par P2. Un cycle indique une attente circulaire, donc un deadlock."
       }
     ]
   },
   {
     "titre": "Systèmes de Fichiers",
     "points": "3 pts",
     "enonce": "Répondez aux questions suivantes sur les systèmes de fichiers.",
     "questions":[
       {
         "question": "1) Qu'est-ce qu'un inode dans un système de fichiers UNIX/Linux ? (1.5 pts)",
         "reponse": "Un inode est une structure de données stockée sur le disque qui contient toutes les informations sur un fichier, à l'exception de son nom. Il contient des métadonnées comme la taille du fichier, ses permissions, les dates de création/modification, et surtout les pointeurs vers les blocs de données où le contenu du fichier est réellement stocké."
       },
       {
         "question": "2) Citez deux exemples de systèmes de fichiers et donnez une caractéristique pour chacun. (1.5 pts)",
         "reponse": "NTFS est le système de fichiers principal de Windows, il supporte la journalisation et les permissions fines. ext4 est un système de fichiers largement utilisé sous Linux, il supporte la journalisation et les volumes de grande taille."
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
