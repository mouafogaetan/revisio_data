            {   // Slide 2 : Introduction & concept Health Checks
                content: `
                    <div>
                        <h2 class="text-2xl font-bold text-primary flex items-center gap-2"><i class="fas fa-stethoscope"></i> Qu'est-ce qu'un Health Check ?</h2>

                            <div class="bg-white rounded-lg p-4 shadow">

                        <p class="mt-3 text-gray-700">Ce test vérifie que la base de données répond aux requêtes. Si la connexion échoue, l'état devient <span class="text-red-600 font-semibold">Unhealthy</span>.</p>

            {   // Slide 5 : Services externes / personnalisés

                        <div class="code-block mt-3 text-sm">

                            &nbsp;&nbsp;&nbsp;&nbsp;var response = await httpClient.GetAsync("https://api.exemple.com/health"); <br>
                            &nbsp;&nbsp;&nbsp;&nbsp;return response.IsSuccessStatusCode ? <br>
                            &nbsp;&nbsp;&nbsp;&nbsp;HealthCheckResult.Healthy() : HealthCheckResult.Unhealthy("API externe indisponible"); <br>
                            &nbsp;&nbsp;} <br>

                        <p class="mt-2 text-gray-700">Ensuite enregistrez : <code class="bg-gray-100">builder.Services.AddHealthChecks().AddCheck&lt;ExternalApiHealthCheck&gt;("externe");</code></p>

            },
            {   // Slide 6 : Endpoint /health avancé (json détaillé, tags)
                content: `
                    <div>

                        <div class="code-block mt-3">

                content: `
                    <div class="text-center">

                        <p class="mt-4 max-w-2xl mx-auto">Ajoutez des health checks à votre propre projet API .NET. Vérifiez la disponibilité de SQL Server, puis exposez un endpoint JSON.</p>
                        <div class="bg-gray-100 p-4 rounded-2xl mt-6 text-left">

        let currentSlide = 0;
        let totalSlides = slidesData.length;
        
        // Mise à jour de l'affichage du slide et de la progression
        function renderSlide(index) {
            $('.slide').removeClass('active');
            const slideHtml = slidesData[index].content;
            // On maintient un seul container pour slide courant
            // Notre approche: remplacer contenu du wrapper dédié (mais on gère l'état)
            // Mieux : nous réinjectons la slide courante dans le container parent en gardant une div unique
            // On évite les conflits
            $('#slidesContainer').html(`<div class="slide active fade-in">${slideHtml}</div>`);
            // Si besoin d'exécuter mathjax sur nouveau contenu
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
            $('#currentSlideIdx').text(index+1);
            $('#totalSlides').text(totalSlides);
            let progressPercent = ((index+1) / totalSlides) * 100;
            $('#progressFill').css('width', progressPercent + '%');
            $('#slideIndicator').html(`<i class="fas fa-layer-group"></i> Slide ${index+1} sur ${totalSlides}`);
            // Gérer état des boutons
            $('#prevBtn').prop('disabled', index === 0);
            $('#nextBtn').prop('disabled', index === totalSlides-1);
            if (index === totalSlides-1) {
                $('#nextBtn').html('Terminé <i class="fas fa-check-circle"></i>');
            } else {
                $('#nextBtn').html('Suivant <i class="fas fa-arrow-right"></i>');
            }
        }
        
        // Navigation
        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                renderSlide(currentSlide);
                // Scroll en haut pour confort sur mobile
                $('html, body').animate({ scrollTop: $('.slide-container').offset().top - 20 }, 200);
            }
        }
        
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
                $('html, body').animate({ scrollTop: $('.slide-container').offset().top - 20 }, 200);
            }
        }
        
        // Gestion des touches clavier (gauche/droite)
        $(document).keydown(function(e) {
            if (e.key === 'ArrowLeft') {
                prevSlide();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextSlide();
                e.preventDefault();
            }
        });
        
        // Initialisation
        $(document).ready(function() {
            totalSlides = slidesData.length;
            $('#totalSlides').text(totalSlides);
            renderSlide(0);
            $('#prevBtn').on('click', prevSlide);
            $('#nextBtn').on('click', nextSlide);
            // ajout swipe pour mobile (simple)
            let touchStartX = 0;
            let touchEndX = 0;
            $('#slidesContainer').on('touchstart', function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $('#slidesContainer').on('touchend', function(e) {
                touchEndX = e.originalEvent.changedTouches[0].clientX;
                if (touchStartX - touchEndX > 50) {
                    nextSlide();
                } else if (touchEndX - touchStartX > 50) {
                    prevSlide();
                }
            });
        });
    </script>
    <!-- petite adaptation supplémentaire pour rendre les extraits de code plus lisibles -->
</body>
