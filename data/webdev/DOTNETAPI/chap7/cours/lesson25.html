<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 25 : Tests d'intégration avec WebApplicationFactory | API .NET</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour les slides */
        .slide {
            transition: opacity 0.4s ease-in-out, transform 0.3s ease;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        .slide-visible {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        /* personnalisation scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .card-glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }
        .btn-nav {
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-nav:hover {
            transform: scale(1.02);
            background-color: #1e40af;
        }
        .progress-bar {
            height: 6px;
            background: #cbd5e1;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2563eb;
            transition: width 0.3s ease;
        }
        @media (max-width: 640px) {
            .card-glass {
                border-radius: 1.5rem;
                padding: 1rem !important;
            }
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body class="antialiased p-4 md:p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-4xl w-full mx-auto">
        <!-- Conteneur principal slides -->
        <div class="card-glass p-5 md:p-8 relative">
            
            <!-- En-tête fixe avec titre matière et progression -->
            <div class="flex flex-wrap justify-between items-center border-b border-blue-100 pb-3 mb-4">
                <div>
                    <p class="text-xs uppercase tracking-wide text-blue-600 font-semibold">API .NET (ASP.NET Core) | WebDev</p>
                    <p class="text-sm text-gray-500">Leçon 25 / 39 • Tests d'intégration</p>
                </div>
                <div class="flex gap-2 text-xs bg-blue-50 px-3 py-1 rounded-full">
                    <span class="font-medium text-blue-700">🎯 Intégration & WebApplicationFactory</span>
                </div>
            </div>

            <!-- Zone slide dynamique -->
            <div id="slides-container" class="min-h-[450px] md:min-h-[500px]">
                <!-- Les slides seront injectées ici via jQuery -->
            </div>

            <!-- Navigation + progression -->
            <div class="flex justify-between items-center mt-8 pt-2">
                <button id="prevBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-5 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed shadow-sm text-sm md:text-base">◀ Précédent</button>
                <div class="flex flex-col items-center gap-1 w-2/5">
                    <div class="progress-bar w-full">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="slideCounter" class="text-xs text-gray-500 font-mono">Slide 1 / 1</span>
                </div>
                <button id="nextBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-full transition shadow-sm text-sm md:text-base">Suivant ▶</button>
            </div>

            <!-- petit pied de page -->
            <div class="text-center text-[11px] text-gray-400 mt-5 pt-2 border-t border-gray-100">
                Cours pour étudiants camerounais — Tests complets d’API avec WebApplicationFactory, InMemory DB & authentification JWT
            </div>
        </div>
    </div>

    <script>
        // Définition des slides pour la leçon 25
        // Slide 0: Titre principal
        // Slide 1: Objectifs d'apprentissage
        // Slide 2: Introduction à WebApplicationFactory
        // Slide 3: Tester les contrôleurs avec WebApplicationFactory
        // Slide 4: Base de données InMemory pour les tests
        // Slide 5: Tester les endpoints complets + authentification
        // Slide 6: Exemple concret & bonnes pratiques
        // Slide 7: Résumé / à retenir

        const slidesData = [
            {
                type: "title",
                title: "🧪 Tests d'intégration avancés",
                subtitle: "WebApplicationFactory, InMemory DB & endpoints sécurisés",
                badge: "Leçon 25 · ASP.NET Core Testing",
                icon: "🚀"
            },
            {
                type: "objectives",
                title: "🎯 Objectifs de la leçon",
                points: [
                    "Tester les contrôleurs avec WebApplicationFactory (intégration réelle)",
                    "Configurer une base de données InMemory pour l'isolation des tests",
                    "Tester des endpoints complets incluant l'authentification JWT",
                    "Simuler des requêtes HTTP et valider les réponses JSON",
                    "Appliquer les bonnes pratiques de tests d'API professionnelles"
                ]
            },
            {
                type: "content",
                title: "🏭 Qu'est-ce que WebApplicationFactory ?",
                content: "<p><strong>WebApplicationFactory&lt;TEntryPoint&gt;</strong> est une classe fournie par <code class='bg-gray-200 px-1 rounded'>Microsoft.AspNetCore.Mvc.Testing</code>. Elle permet de <span class='font-semibold text-blue-700'>lancer l'API en mémoire</span> pendant les tests, sans serveur réel.</p><br>" +
                         "<ul class='list-disc pl-6 space-y-2 mt-2'>" +
                         "<li>✅ Crée un <strong>hôte de test</strong> similaire à l'environnement de production.</li>" +
                         "<li>✅ Permet d'<strong>injecter des services personnalisés</strong> (ex: remplacer la vraie BDD par InMemory).</li>" +
                         "<li>✅ Fournit un <strong>HttpClient</strong> prêt à interroger l'API directement.</li>" +
                         "<li>✅ Supporte l’authentification, les middlewares, et toute la pipeline ASP.NET Core.</li>" +
                         "</ul>" +
                         "<div class='bg-blue-50 p-3 rounded-xl mt-4 text-sm border-l-4 border-blue-500'>💡 Idéal pour tester les scénarios complets : de la requête HTTP jusqu’à la base de données !</div>"
            },
            {
                type: "content",
                title: "⚙️ Tester les contrôleurs avec WebApplicationFactory",
                content: "<p><span class='font-bold'>Exemple de base :</span> créer une classe de test xUnit héritant de <code>IClassFixture&lt;WebApplicationFactory&lt;Program&gt;&gt;</code>.</p>" +
                         "<pre class='bg-gray-800 text-gray-100 p-3 rounded-md overflow-x-auto text-sm mt-2'><code>public class ProductsControllerTests : IClassFixture&lt;WebApplicationFactory&lt;Program&gt;&gt;\n{\n    private readonly HttpClient _client;\n    public ProductsControllerTests(WebApplicationFactory&lt;Program&gt; factory)\n    {\n        _client = factory.CreateClient();\n    }\n    \n    [Fact]\n    public async Task GetProducts_ReturnsOk()\n    {\n        var response = await _client.GetAsync(\"/api/products\");\n        Assert.Equal(HttpStatusCode.OK, response.StatusCode);\n    }\n}</code></pre>" +
                         "<p class='mt-3 text-gray-700'>➡️ On utilise le <strong>HttpClient</strong> pour appeler les endpoints comme dans un vrai navigateur ou Postman.</p>"
            },
            {
                type: "content",
                title: "🗄️ Base de données InMemory pour les tests",
                content: "<p>Afin d'isoler les tests (sans toucher à la vraie BDD), on remplace <strong>DbContext</strong> par une instance <strong>InMemory</strong> d'Entity Framework Core.</p>" +
                         "<pre class='bg-gray-800 text-gray-100 p-3 rounded-md overflow-x-auto text-sm mt-2'><code>// Dans la classe fixture ou surcharge de WebApplicationFactory\nprotected override void ConfigureWebHost(IWebHostBuilder builder)\n{\n    builder.ConfigureServices(services =>\n    {\n        var descriptor = services.SingleOrDefault(\n            d => d.ServiceType == typeof(DbContextOptions&lt;AppDbContext&gt;));\n        if (descriptor != null) services.Remove(descriptor);\n\n        services.AddDbContext&lt;AppDbContext&gt;(options =>\n            options.UseInMemoryDatabase(\"TestDb_\" + Guid.NewGuid()));\n    });\n}</code></pre>" +
                         "<div class='mt-3 bg-green-50 p-2 rounded-lg'>🌱 Avantages : rapide, réinitialisable à chaque test, pas de dépendance externe.</div>"
            },
            {
                type: "content",
                title: "🔐 Tester des endpoints complets (authentification incluse)",
                content: "<p>Pour tester des endpoints protégés par <strong>JWT</strong>, il faut ajouter un token dans les en-têtes HTTP. On peut soit :</p>" +
                         "<ul class='list-decimal pl-6 mt-2 space-y-2'>" +
                         "<li><strong>Mocker l’authentification</strong> en ajoutant un AuthenticationHandler factice.</li>" +
                         "<li><strong>Générer un vrai token</strong> via un endpoint de login avant le test.</li>" +
                         "</ul>" +
                         "<pre class='bg-gray-800 text-gray-100 p-3 rounded-md overflow-x-auto text-sm mt-2'><code>// Exemple: ajouter un token JWT factice (solution pratique)\n_client.DefaultRequestHeaders.Authorization = \n    new AuthenticationHeaderValue(\"Bearer\", \"monTokenSimule\");\n\n// Ou via WebApplicationFactory avec un Auth personnalisé\nbuilder.ConfigureTestServices(services => {\n    services.AddAuthentication(defaultScheme: \"Test\")\n        .AddScheme&lt;AuthenticationSchemeOptions, TestAuthHandler&gt;(\n            \"Test\", options => { });\n});</code></pre>"
            },
            {
                type: "content",
                title: "📦 Exemple concret – Tester un POST sécurisé",
                content: "<p><strong>Scénario :</strong> Créer un produit avec un rôle Admin.</p>" +
                         "<pre class='bg-gray-800 text-gray-100 p-3 rounded-md overflow-x-auto text-sm'><code>[Fact]\nasync Task CreateProduct_WhenAuthorized_ReturnsCreated()\n{\n    // Arrange\n    var newProduct = new { Name = \"Laptop\", Price = 1200 };\n    var content = new StringContent(JsonSerializer.Serialize(newProduct), Encoding.UTF8, \"application/json\");\n    \n    // Act : appel POST avec token valide (on suppose _client déjà configuré)\n    var response = await _client.PostAsync(\"/api/products\", content);\n    \n    // Assert\n    Assert.Equal(HttpStatusCode.Created, response.StatusCode);\n    var returned = await response.Content.ReadFromJsonAsync&lt;ProductDto&gt;();\n    Assert.NotNull(returned);\n    Assert.Equal(\"Laptop\", returned.Name);\n}</code></pre>" +
                         "<p class='mt-3'>🧪 On peut aussi vérifier que la base de données InMemory contient bien l'entité créée en injectant directement le DbContext dans le test.</p>"
            },
            {
                type: "summary",
                title: "📌 Récapitulatif & bonnes pratiques",
                points: [
                    "WebApplicationFactory = environnement de test complet qui imite l'API réelle.",
                    "Utiliser une base InMemory pour l'isolation et la vitesse.",
                    "Les tests d'intégration valident le bon fonctionnement des contrôleurs, middlewares, validation, et sécurité.",
                    "Pensez à réinitialiser la BDD entre chaque test (unique GUID ou Cleanup).",
                    "Combinez tests unitaires (services pures) + tests d'intégration (end-to-end)."
                ],
                footnote: "💪 Maîtriser WebApplicationFactory, c'est devenir un développeur .NET professionnel !"
            }
        ];

        let currentIndex = 0;
        const totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'un slide selon son type
        function renderSlide(index) {
            const data = slidesData[index];
            if (!data) return "<div>Erreur slide</div>";
            
            if (data.type === "title") {
                return `
                    <div class="text-center py-6 md:py-10">
                        <div class="text-7xl md:text-8xl mb-4">${data.icon}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-700 to-indigo-600 bg-clip-text text-transparent">${data.title}</h1>
                        <p class="text-gray-600 mt-3 text-lg md:text-xl max-w-lg mx-auto">${data.subtitle}</p>
                        <div class="mt-6 inline-block bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-mono">${data.badge}</div>
                        <div class="mt-8 text-sm text-gray-400">Appuyez sur Suivant pour commencer ➡️</div>
                    </div>
                `;
            }
            else if (data.type === "objectives") {
                return `
                    <div class="py-2">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4 mb-5">${data.title}</h2>
                        <ul class="space-y-4">
                            ${data.points.map(point => `<li class="flex items-start gap-3 bg-white/60 p-3 rounded-xl shadow-sm"><span class="text-blue-600 font-bold text-xl">✓</span><span class="text-gray-700">${point}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 text-center text-sm text-gray-500 italic">🎓 À la fin de cette leçon, vous saurez tester des APIs comme un pro.</div>
                    </div>
                `;
            }
            else if (data.type === "content") {
                return `
                    <div class="py-1">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4 flex items-center gap-2"><span class="text-blue-500 text-3xl">📘</span> ${data.title}</h2>
                        <div class="prose prose-slate max-w-none text-gray-700 leading-relaxed">
                            ${data.content}
                        </div>
                    </div>
                `;
            }
            else if (data.type === "summary") {
                return `
                    <div class="py-2">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-5">${data.title}</h2>
                        <div class="grid gap-3">
                            ${data.points.map(p => `<div class="flex gap-2 items-start bg-white p-3 rounded-xl border border-gray-200"><span class="text-green-600 text-xl">✔️</span><span class="text-gray-700">${p}</span></div>`).join('')}
                        </div>
                        <div class="mt-6 p-4 bg-indigo-50 rounded-xl italic text-indigo-800 border-l-4 border-indigo-500">${data.footnote}</div>
                        <div class="mt-4 text-center text-sm text-gray-500">✨ Bravo ! Vous maîtrisez maintenant WebApplicationFactory et les tests d'intégration ✨</div>
                    </div>
                `;
            }
            return "<div>Contenu non disponible</div>";
        }

        // Mise à jour de l'affichage
        function updateSlide() {
            const container = $("#slides-container");
            if (container.length) {
                const slideHtml = renderSlide(currentIndex);
                container.fadeOut(150, function() {
                    $(this).html(slideHtml).fadeIn(200);
                });
            }
            // Mise à jour compteur + barre progression
            const progressPercent = ((currentIndex + 1) / totalSlides) * 100;
            $("#progressFill").css("width", `${progressPercent}%`);
            $("#slideCounter").text(`Slide ${currentIndex+1} / ${totalSlides}`);
            
            // Gestion désactivation boutons
            $("#prevBtn").prop("disabled", currentIndex === 0);
            $("#nextBtn").text(currentIndex === totalSlides - 1 ? "🏁 Terminer" : "Suivant ▶");
        }

        // Navigation
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlide();
            } else {
                // Terminé, on peut remettre au début ou alerter, on propose boucle douce
                if (currentIndex === totalSlides - 1) {
                    if (confirm("Félicitations ! Vous avez terminé la leçon. Voulez-vous la revoir depuis le début ?")) {
                        currentIndex = 0;
                        updateSlide();
                    }
                }
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
            }
        }

        $(document).ready(function() {
            // Initialisation du premier slide
            updateSlide();
            
            // Événements des boutons
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
            
            // Gestion clavier (flèches droite/gauche)
            $(document).on("keydown", function(e) {
                if (e.key === "ArrowRight") {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    prevSlide();
                    e.preventDefault();
                }
            });
            
            // Ajouter un petit tooltip sur les boutons pour mobile
            $("#nextBtn, #prevBtn").on("touchstart", function() {
                $(this).css("transform", "scale(0.97)");
            }).on("touchend", function() {
                $(this).css("transform", "");
            });
        });
    </script>
    <!-- Ajout de styles supplémentaires pour le code et lisibilité -->
    <style>
        pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
        }
        @media (max-width: 640px) {
            pre {
                font-size: 0.7rem;
                padding: 0.6rem;
            }
            .card-glass {
                padding: 1rem;
            }
            .btn-nav {
                padding: 0.4rem 1rem;
            }
        }
        code {
            background-color: #eef2ff;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            font-size: 0.85em;
            color: #1e3a8a;
        }
        pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
        }
        ul, ol {
            margin-left: 0.5rem;
        }
        li {
            margin-bottom: 0.25rem;
        }
    </style>
</body>
</html>
