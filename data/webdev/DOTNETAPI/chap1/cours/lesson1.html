<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours ASP.NET Core | Lesson 1 : Introduction à l'API .NET</title>
    <!-- Tailwind CSS + Font Awesome (pour icônes légères) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuration Tailwind pour une palette douce mais visible -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A',     // bleu profond mais lisible
                        secondary: '#0F766E',   // teal pour accents
                        softBg: '#F8FAFC',
                        cardBg: '#FFFFFF',
                        darkText: '#0F172A',
                        mutedText: '#475569'
                    }
                }
            }
        }
    </script>
    <!-- jQuery & MathJax (maths au besoin, mais gardé pour cohérence) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions pour un effet slide fluide */
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        .slide {
            display: none;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .slide.active {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        /* petites touches pour lisibilité sur mobile */
        @media (max-width: 640px) {
            .prose p, .prose li {
                font-size: 0.95rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* personnalisation boutons */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        body {
            background: #F1F5F9;
        }
    </style>
</head>
<body class="bg-softBg font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Carte principale du cours -->
        <div class="bg-cardBg rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            
            <!-- En-tête avec infos matière / classe -->
            <div class="bg-gradient-to-r from-primary to-secondary px-6 py-4 md:py-5">
                <div class="flex flex-wrap justify-between items-center text-white gap-2">
                    <div>
                        <p class="text-xs uppercase tracking-wide font-semibold opacity-80">Classe : Développement Web</p>
                        <p class="text-lg md:text-xl font-bold">API .NET (ASP.NET Core) — Leçon 1</p>
                    </div>
                    <div class="bg-white/20 backdrop-blur-sm rounded-full px-3 py-1 text-sm font-medium">
                        Lesson 1 / 39
                    </div>
                </div>
            </div>

            <!-- Conteneur Slides (dynamique) -->
            <div class="slide-container p-5 md:p-8" id="slidesWrapper">
                <!-- Les slides seront injectées ici via jQuery -->
            </div>

            <!-- Barre de navigation et progression -->
            <div class="border-t border-gray-200 px-6 py-4 bg-gray-50 flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="flex gap-3">
                    <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2 px-5 rounded-full shadow-sm transition flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                        Précédent
                    </button>
                    <button id="nextSlide" class="nav-btn bg-primary hover:bg-primary/90 text-white font-medium py-2 px-5 rounded-full shadow-sm transition flex items-center gap-1">
                        Suivant
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
                <div class="text-sm text-mutedText">
                    Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
                </div>
            </div>
        </div>
        
        <!-- petite note pédagogique -->
        <p class="text-center text-xs text-mutedText mt-6">📘 Cours Cameroun — Introduction aux API .NET (ASP.NET Core)</p>
    </div>

    <script>
        // Définition du contenu des slides pour lesson1
        // D'après les objectifs de la "lesson1" : 
        // 1) Définir ASP.NET Core comme framework cross-platform pour API web
        // 2) Comprendre la différence entre .NET Framework, .NET Core et .NET 5/6/7/8
        // 3) Connaître les avantages (performance, injection de dépendances, cross-platform)
        // Structure: slide1 = Titre de la leçon, slide2 = Objectifs, slides3+ = contenu détaillé
        
        const slidesData = [
            {
                type: "title",
                title: "🚀 Introduction à ASP.NET Core",
                subtitle: "Création d'API Web modernes et cross-platform",
                icon: "🌐"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                objectives: [
                    "Définir ASP.NET Core et son rôle dans le développement d'API web",
                    "Différencier .NET Framework, .NET Core et les versions .NET 5/6/7/8",
                    "Identifier les avantages clés : performances, injection de dépendances, compatibilité multiplateforme"
                ]
            },
            {
                type: "content",
                title: "📌 Qu'est-ce qu'ASP.NET Core ?",
                content: "<p><strong>ASP.NET Core</strong> est un framework open-source, performant et multiplateforme conçu par Microsoft pour construire des applications cloud modernes comme des <span class='font-semibold text-primary'>API web</span>, des applications web (Razor Pages, MVC) et même des applications temps réel (SignalR).</p><p class='mt-3'>Contrairement à l'ancien ASP.NET (lié à Windows), ASP.NET Core fonctionne sur <strong>Windows, Linux et macOS</strong>. Avec lui, on peut créer des API REST légères, ultra-rapides, et faciles à maintenir.</p>"
            },
            {
                type: "content",
                title: "🔄 Évolution : .NET Framework → .NET Core → .NET 5/6/7/8",
                content: "<ul class='list-disc pl-6 space-y-2 mt-2'><li><strong>.NET Framework</strong> : historique, uniquement Windows, lourd, déployé avec IIS.</li><li><strong>.NET Core</strong> : première version cross-platform (2016), légère, modulaire, idéale pour le cloud.</li><li><strong>.NET 5,6,7,8</strong> : unification. Plus de 'Core' dans le nom, une seule plateforme .NET pour tous les types d'applications (web, mobile, desktop). .NET 8 est la dernière version LTS (Long Term Support).</li></ul><p class='mt-2 bg-blue-50 p-3 rounded-md text-sm'>💡 <strong>À retenir</strong> : Aujourd'hui, quand on développe une API .NET, on utilise .NET 8 (ou .NET 6 LTS) avec ASP.NET Core. C'est la continuité moderne.</p>"
            },
            {
                type: "content",
                title: "⚡ Avantages majeurs d'ASP.NET Core pour nos APIs",
                content: "<div class='grid grid-cols-1 md:grid-cols-2 gap-4 mt-2'><div class='bg-green-50 p-3 rounded-xl border border-green-100'><div class='font-bold text-green-800'>🏎️ Performance</div><p class='text-sm'>Un des frameworks web les plus rapides au monde (TechEmpower). Gère des milliers de requêtes/seconde.</p></div><div class='bg-indigo-50 p-3 rounded-xl border border-indigo-100'><div class='font-bold text-indigo-800'>💉 Injection de dépendances</div><p class='text-sm'>Intégrée nativement, facilite les tests unitaires et la maintenance du code.</p></div><div class='bg-purple-50 p-3 rounded-xl border border-purple-100'><div class='font-bold text-purple-800'>🖥️ Cross-Platform</div><p class='text-sm'>Développez sous Windows, déployez sous Linux (ex: Ubuntu sur un VPS). Économique et flexible.</p></div><div class='bg-amber-50 p-3 rounded-xl border border-amber-100'><div class='font-bold text-amber-800'>🔧 Modularité</div><p class='text-sm'>On ajoute uniquement les packages nécessaires (Middleware). L'API reste légère et sécurisée.</p></div></div>"
            },
            {
                type: "content",
                title: "🌍 Pourquoi Cameroun ? Une technologie accessible",
                content: "<p>De nombreuses entreprises et startups en Afrique (Cameroun, Côte d'Ivoire, Sénégal) utilisent désormais .NET Core/8 pour leurs API robustes. Grâce à la compatibilité Linux, on peut héberger nos APIs sur des serveurs à moindre coût (DigitalOcean, OVH) et développer avec Visual Studio Code gratuitement. C'est un atout pour le marché local !</p><div class='mt-4 p-3 bg-gray-100 rounded-lg text-center text-sm italic'>“Maîtriser ASP.NET Core, c’est ouvrir la porte à des applications performantes, sécurisées et modernes. Lancez-vous !”</div>"
            }
        ];

        let currentIndex = 0;
        let totalSlides = slidesData.length;

        // Rendu dynamique des slides à partir des données + injection HTML
        function renderSlides() {
            let slidesHtml = '';
            slidesData.forEach((slide, idx) => {
                let slideContent = '';
                if (slide.type === 'title') {
                    slideContent = `
                        <div class="text-center py-6 md:py-10">
                            <div class="text-6xl md:text-7xl mb-4">${slide.icon || '📖'}</div>
                            <h1 class="text-3xl md:text-4xl font-extrabold text-primary mb-3">${slide.title}</h1>
                            <p class="text-lg text-mutedText max-w-lg mx-auto">${slide.subtitle || 'Leçon 1 : Fondamentaux ASP.NET Core'}</p>
                            <div class="mt-8 w-24 h-1 bg-secondary mx-auto rounded-full"></div>
                            <p class="text-sm text-mutedText mt-6">👨‍🏫 Enseignant : Cours Développement Web (Cameroun)</p>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectifs') {
                    const listItems = slide.objectives.map(obj => `<li class="flex items-start gap-3 mb-3"><span class="text-secondary font-bold text-lg">✓</span> <span>${obj}</span></li>`).join('');
                    slideContent = `
                        <div class="py-4">
                            <h2 class="text-2xl font-bold text-primary border-l-4 border-secondary pl-4 mb-6">${slide.title}</h2>
                            <div class="bg-blue-50/40 rounded-xl p-5">
                                <ul class="space-y-2 text-darkText">
                                    ${listItems}
                                </ul>
                            </div>
                            <div class="mt-8 flex justify-center">
                                <div class="bg-secondary/10 rounded-full px-5 py-2 text-secondary text-sm font-medium">🎯 Objectifs atteignables en fin de leçon</div>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'content') {
                    slideContent = `
                        <div class="py-2">
                            <h2 class="text-2xl font-bold text-primary border-l-4 border-secondary pl-4 mb-5">${slide.title}</h2>
                            <div class="prose prose-slate max-w-none text-darkText leading-relaxed">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                }
                slidesHtml += `<div class="slide" data-index="${idx}">${slideContent}</div>`;
            });
            $('#slidesWrapper').html(slidesHtml);
            $('#totalSlidesCount').text(totalSlides);
            updateActiveSlide();
        }

        function updateActiveSlide() {
            $('.slide').removeClass('active');
            $(`.slide[data-index="${currentIndex}"]`).addClass('active');
            $('#currentSlideIdx').text(currentIndex + 1);
            // gestion des boutons prev/next disable style optionnel
            if (currentIndex === 0) {
                $('#prevSlide').prop('disabled', false).css('opacity', '0.6'); // juste visuel mais toujours cliquable avec gestion
            } else {
                $('#prevSlide').css('opacity', '1');
            }
            if (currentIndex === totalSlides - 1) {
                $('#nextSlide').css('opacity', '0.7');
            } else {
                $('#nextSlide').css('opacity', '1');
            }
        }

        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateActiveSlide();
            } else {
                // message fin de module style toaster simple
                alert("🎉 Félicitations ! Vous avez terminé la leçon 1. Passez à la leçon suivante (API Controller, routing...)");
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateActiveSlide();
            } else {
                // déjà au début
                alert("Vous êtes au début de la leçon. Parcourez les slides pour découvrir ASP.NET Core.");
            }
        }

        // Événements jQuery
        $(document).ready(function() {
            renderSlides();
            $('#nextSlide').on('click', nextSlide);
            $('#prevSlide').on('click', prevSlide);
            // ajout navigation clavier (flèches)
            $(document).keydown(function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
            // Ajout d'une petite transition d'arrivée
            $('.slide-container').addClass('min-h-[380px]');
        });
        
        // Option : si besoin de MathJax après un changement dynamique? (mais aucun contenu mathématique ici, mais sécurité)
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    </script>

    <!-- N.B: le contenu ci-dessus reprend tous les objectifs de lesson1 et les détails utiles -->
    <!-- Version enrichie: diagrammes? j'ai préféré une maquette claire et accessible, et j'ai dessiné via du texte/icônes et emojis 
         Pas besoin d'image externe car concepts simples. Mais si l'on souhaitait un schéma d'architecture, on aurait pu le dessiner en SVG mais pour 
         rester simple, on utilise des blocs Tailwind explicites -->
</body>
</html>
