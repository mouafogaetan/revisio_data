<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 2 : Création et structure d'une API .NET | Cours ASP.NET Core</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour formules mathématiques si besoin dans cette leçon) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles personnalisés pour améliorer l'expérience slide */
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .slide-container {
            transition: all 0.3s ease;
        }
        .slide {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e40af;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        @media (max-width: 640px) {
            .slide {
                border-radius: 1.5rem;
                padding: 1.25rem !important;
            }
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
        }
        /* code blocks style */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
        }
        .badge-dotnet {
            background: #512bd4;
            color: white;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- slide principal (wrapper) -->
        <div class="slide-container relative">
            <!-- slides dynamique via jQuery -->
            <div id="slidesWrapper" class="relative min-h-[70vh]">
                <!-- les slides seront injectées ici -->
            </div>

            <!-- Navigation buttons + indicateur -->
            <div class="flex justify-between items-center mt-8 gap-3 flex-wrap">
                <button id="prevSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">◀ Précédent</button>
                <div class="flex items-center gap-3 bg-white/70 backdrop-blur-sm px-4 py-2 rounded-full shadow">
                    <span id="slideCounter" class="text-sm font-medium text-gray-700">Slide 1 / ?</span>
                    <div class="w-32 md:w-48 h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="progressFill" class="progress-bar h-full bg-indigo-600 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">Suivant ▶</button>
            </div>
        </div>
    </div>

    <script>
        // Données de la leçon 2 : "Créer un projet Web API, structure, lancer l'API"
        // Basé sur les objectifs Lesson2 du JSON
        const lessonData = {
            title: "Création et structure d'une API .NET",
            objectives: [
                "Créer un projet Web API avec `dotnet new webapi`",
                "Comprendre la structure du projet (Controllers, Program.cs, appsettings.json)",
                "Lancer l'API et tester l'endpoint météo par défaut"
            ],
            contentSlides: [
                {
                    title: "🎯 1. Créer un projet Web API",
                    content: `
                        <p class="text-gray-700 leading-relaxed mb-3">Pour démarrer une API avec ASP.NET Core, on utilise le <strong class="text-indigo-700">CLI .NET</strong>. Ouvrez un terminal (PowerShell, bash ou cmd).</p>
                        <pre><code>dotnet new webapi -n MonPremiereAPI\ncd MonPremiereAPI</code></pre>
                        <p class="mt-3 text-gray-700">📌 <span class="font-semibold">Explication :</span> <code class="bg-gray-100 px-1 rounded">-n</code> spécifie le nom du projet. Cette commande génère un modèle d'API REST avec un contrôleur exemple (WeatherForecast).</p>
                        <div class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-md mt-4 text-sm">
                            💡 <span class="font-medium">Astuce Cameroun :</span> Si vous utilisez Visual Studio Code, ouvrez le dossier généré et assurez-vous d'avoir installé le SDK .NET 8 ou .NET 6+.
                        </div>
                    `
                },
                {
                    title: "📁 2. Structure du projet",
                    content: `
                        <p class="mb-2">Une fois créé, voici les dossiers/fichiers essentiels :</p>
                        <ul class="list-disc pl-6 space-y-1 text-gray-700">
                            <li><span class="font-mono font-bold">Controllers/</span> → contient les contrôleurs (ex: WeatherForecastController.cs)</li>
                            <li><span class="font-mono font-bold">Program.cs</span> → point d'entrée, configuration des services et du pipeline HTTP</li>
                            <li><span class="font-mono font-bold">appsettings.json</span> → fichiers de configuration (logs, chaînes de connexion, etc.)</li>
                            <li><span class="font-mono font-bold">Properties/launchSettings.json</span> → profils de lancement (ports, variables d'environnement)</li>
                            <li><span class="font-mono font-bold">obj/ & bin/</span> → dossiers de compilation (générés automatiquement)</li>
                        </ul>
                        <div class="mt-4 bg-gray-100 p-3 rounded-lg">
                            <p class="text-sm font-medium">🧩 <strong>Program.cs</strong> (simplifié) :</p>
                            <pre><code>var builder = WebApplication.CreateBuilder(args);\nbuilder.Services.AddControllers();\nvar app = builder.Build();\napp.MapControllers();\napp.Run();</code></pre>
                        </div>
                    `
                },
                {
                    title: "🚀 3. Lancer l'API et tester l'endpoint météo",
                    content: `
                        <p>Pour démarrer l'API :</p>
                        <pre><code>dotnet run</code></pre>
                        <p class="mt-2">Par défaut, l'API écoute sur <code class="bg-gray-100">https://localhost:5001</code> (ou 5000). Accédez à : <br>
                        <span class="font-mono bg-gray-200 px-2 py-0.5 rounded">https://localhost:5001/weatherforecast</span></p>
                        <p>🎉 Vous devriez recevoir une réponse JSON contenant des prévisions météo aléatoires :</p>
                        <pre><code>[\n  {"date":"2025-06-15","temperatureC":25,"summary":"Mild"},\n  ...\n]</code></pre>
                        <div class="flex flex-wrap gap-2 mt-4">
                            <span class="bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full">✅ Test avec navigateur</span>
                            <span class="bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full">✅ Test avec Postman ou curl</span>
                        </div>
                        <p class="mt-3 text-amber-700 bg-amber-50 p-2 rounded">🔍 <strong>À retenir :</strong> L'attribut <code>[ApiController]</code> et <code>[Route]</code> facilitent la création d'API RESTful.</p>
                    `
                },
                {
                    title: "🧪 Exercice pratique rapide",
                    content: `
                        <p>Maintenant, exercez-vous !</p>
                        <ol class="list-decimal pl-6 mt-2 space-y-2">
                            <li>Créez une nouvelle API nommée <strong>"MaPremiereAPI"</strong> avec <code>dotnet new webapi -n MaPremiereAPI</code>.</li>
                            <li>Ouvrez le dossier et identifiez le contrôleur par défaut.</li>
                            <li>Lancez l'API avec <code>dotnet run</code> et accédez à <code>/weatherforecast</code>.</li>
                            <li>Modifiez le message ou ajoutez un nouvel endpoint simple (GET /hello).</li>
                        </ol>
                        <div class="mt-5 p-3 border border-indigo-200 bg-indigo-50 rounded-xl">
                            ⭐ <strong>Objectif final :</strong> Comprendre que chaque API .NET Core est configurable, extensible, et prête pour la production.
                        </div>
                    `
                }
            ]
        };

        let currentSlide = 0;
        let totalSlides = 0;
        let slidesArray = [];

        // Construction de la structure slides : Slide 0 = Titre + intro, Slide 1 = Objectifs, puis contentSlides
        function buildSlides() {
            const slides = [];
            // Slide 0 : Titre de la leçon
            slides.push({
                type: "title",
                title: lessonData.title,
                subtitle: "Maîtrisez la création d'une API Web avec ASP.NET Core | Classe Développement Web",
                icon: "🚀"
            });
            // Slide 1 : Objectifs pédagogiques
            slides.push({
                type: "objectives",
                objectives: lessonData.objectives
            });
            // Slides de contenu
            lessonData.contentSlides.forEach((item, idx) => {
                slides.push({
                    type: "content",
                    slideTitle: item.title,
                    htmlContent: item.content
                });
            });
            return slides;
        }

        function renderSlide(slide, index) {
            if (slide.type === "title") {
                return `
                    <div class="slide p-6 md:p-10 text-center">
                        <div class="flex flex-col items-center justify-center min-h-[55vh]">
                            <div class="text-6xl mb-4">${slide.icon || "📘"}</div>
                            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-800 bg-clip-text text-transparent">${slide.title}</h1>
                            <p class="text-gray-600 text-lg md:text-xl mt-4 max-w-2xl">${slide.subtitle}</p>
                            <div class="mt-8 flex gap-2 flex-wrap justify-center">
                                <span class="badge-dotnet px-4 py-1 rounded-full text-sm">ASP.NET Core Web API</span>
                                <span class="bg-gray-200 text-gray-800 px-4 py-1 rounded-full text-sm">.NET 6/7/8</span>
                            </div>
                            <p class="mt-10 text-sm text-gray-400">⬅️ Utilisez les boutons pour naviguer ➡️</p>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectives") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                        <ul class="space-y-4">
                            ${slide.objectives.map(obj => `<li class="flex items-start gap-3 bg-white/70 p-3 rounded-xl shadow-sm"><span class="text-indigo-600 text-xl">✓</span><span class="text-gray-800">${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-8 text-center text-gray-500 text-sm">
                            ⏱️ À la fin de cette leçon, vous serez capable de créer et structurer votre propre API.
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "content") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-2xl font-bold text-indigo-800 border-b-2 border-indigo-200 pb-2 mb-5">${slide.slideTitle}</h2>
                        <div class="prose prose-indigo max-w-none text-gray-800">
                            ${slide.htmlContent}
                        </div>
                    </div>
                `;
            }
            return `<div class="slide p-6">Erreur de contenu</div>`;
        }

        function updateUI() {
            if (!slidesArray.length) return;
            const slideData = slidesArray[currentSlide];
            const html = renderSlide(slideData, currentSlide);
            $("#slidesWrapper").fadeOut(150, function() {
                $(this).html(html);
                $(this).fadeIn(200);
            });
            // Mise à jour compteur et barre de progression
            const total = slidesArray.length;
            $("#slideCounter").text(`Slide ${currentSlide+1} / ${total}`);
            const progressPercent = ((currentSlide) / (total - 1)) * 100;
            $("#progressFill").css("width", `${progressPercent}%`);
            
            // Gestion des boutons prev/next
            $("#prevSlide").prop("disabled", currentSlide === 0);
            $("#nextSlide").prop("disabled", currentSlide === total - 1);
        }

        function nextSlide() {
            if (currentSlide < slidesArray.length - 1) {
                currentSlide++;
                updateUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        $(document).ready(function() {
            slidesArray = buildSlides();
            totalSlides = slidesArray.length;
            currentSlide = 0;
            updateUI();
            
            // Événements clavier (gauche/droite)
            $(document).keydown(function(e) {
                if (e.key === "ArrowLeft") {
                    prevSlide();
                } else if (e.key === "ArrowRight") {
                    nextSlide();
                }
            });
            
            $("#nextSlide").on("click", nextSlide);
            $("#prevSlide").on("click", prevSlide);
            
            // Pour les écrans tactiles on garde le swipe simple? optionnel
            let touchStartX = 0;
            $("#slidesWrapper").on("touchstart", function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $("#slidesWrapper").on("touchend", function(e) {
                if (!touchStartX) return;
                const touchEndX = e.originalEvent.changedTouches[0].clientX;
                const diff = touchEndX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) prevSlide();
                    else nextSlide();
                }
                touchStartX = 0;
            });
        });
    </script>

    <!-- Pied de page simple, responsive -->
    <footer class="text-center text-gray-500 text-xs py-6 border-t border-gray-200 mt-8">
        <p>© Cours ASP.NET Core — Développement Web | Enseignant: Cameroun 🇨🇲 | Leçon 2 : Création & Structure d'API</p>
        <p class="mt-1">📌 Utilisez les flèches du clavier ou les boutons pour naviguer entre les slides.</p>
    </footer>
</body>
</html>
