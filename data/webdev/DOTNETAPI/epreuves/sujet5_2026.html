<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "API .NET (ASP.NET Core)",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Sécurisation et documentation d'une API .NET",
      "points": "7 pts",
      "enonce": "<p>Vous êtes développeur au sein de l'entreprise <strong>« DigiShop »</strong>, une start-up camerounaise spécialisée dans le e-commerce. Vous devez sécuriser et documenter une API de gestion de produits existante.</p><p>L'API actuelle a les caractéristiques suivantes :</p><ul><li>Un contrôleur <code>ProductsController</code> avec des endpoints CRUD.</li><li>Une authentification basique (pas encore JWT).</li><li>Une documentation Swagger partielle.</li><li>Le projet utilise .NET 8.</li></ul>",
      "questions": [
        {
          "question": "1) Configurez l'authentification <strong>JWT</strong> dans <code>Program.cs</code>. Décrivez les étapes et le code nécessaire. (2 pts)",
          "reponse": "<p><strong>Configuration JWT dans Program.cs</strong> :</p><div class='code-block'><pre>// Installation du package\n// dotnet add package Microsoft.AspNetCore.Authentication.JwtBearer\n\n// Dans Program.cs\nbuilder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)\n    .AddJwtBearer(options =>\n    {\n        options.TokenValidationParameters = new TokenValidationParameters\n        {\n            ValidateIssuer = true,\n            ValidateAudience = true,\n            ValidateLifetime = true,\n            ValidateIssuerSigningKey = true,\n            ValidIssuer = builder.Configuration[\"Jwt:Issuer\"],\n            ValidAudience = builder.Configuration[\"Jwt:Audience\"],\n            IssuerSigningKey = new SymmetricSecurityKey(\n                Encoding.UTF8.GetBytes(builder.Configuration[\"Jwt:Key\"]))\n        };\n    });\n\nbuilder.Services.AddAuthorization();\n\n// Dans le pipeline\napp.UseAuthentication();\napp.UseAuthorization();</pre></div><p>Les clés doivent être stockées dans <code>appsettings.json</code>.</p>"
        },
        {
          "question": "2) Créez un endpoint <strong>/api/auth/login</strong> qui génère un token JWT pour un utilisateur. Le login doit vérifier les identifiants en mémoire (admin/admin). (2 pts)",
          "reponse": "<div class='code-block'><pre>// AuthController.cs\n[ApiController]\n[Route(\"api/[controller]\")]\npublic class AuthController : ControllerBase\n{\n    private readonly IConfiguration _configuration;\n\n    public AuthController(IConfiguration configuration)\n    {\n        _configuration = configuration;\n    }\n\n    [HttpPost(\"login\")]\n    public IActionResult Login([FromBody] LoginDto loginDto)\n    {\n        if (loginDto.Username != \"admin\" || loginDto.Password != \"admin\")\n            return Unauthorized(\"Identifiants incorrects\");\n\n        var claims = new[]\n        {\n            new Claim(ClaimTypes.Name, loginDto.Username),\n            new Claim(ClaimTypes.Role, \"Admin\")\n        };\n\n        var key = new SymmetricSecurityKey(\n            Encoding.UTF8.GetBytes(_configuration[\"Jwt:Key\"]));\n        var creds = new SigningCredentials(key, SecurityAlgorithms.HmacSha256);\n\n        var token = new JwtSecurityToken(\n            issuer: _configuration[\"Jwt:Issuer\"],\n            audience: _configuration[\"Jwt:Audience\"],\n            claims: claims,\n            expires: DateTime.Now.AddHours(1),\n            signingCredentials: creds);\n\n        return Ok(new\n        {\n            Token = new JwtSecurityTokenHandler().WriteToken(token),\n            Expiration = token.ValidTo\n        });\n    }\n}\n\npublic class LoginDto\n{\n    public string Username { get; set; }\n    public string Password { get; set; }\n}</pre></div>"
        },
        {
          "question": "3) Protégez l'endpoint <code>POST /api/products</code> avec l'attribut <strong>[Authorize]</strong>. Limitez l'accès aux utilisateurs ayant le rôle <strong>Admin</strong>. (1 pt)",
          "reponse": "<div class='code-block'><pre>[HttpPost]\n[Authorize(Roles = \"Admin\")]\npublic async Task&lt;ActionResult&lt;ProductDto&gt;&gt; CreateProduct(ProductCreateDto productDto)\n{\n    // Logique de création\n}</pre></div>"
        },
        {
          "question": "4) Configurez <strong>Swagger</strong> pour supporter l'authentification JWT (bouton Authorize). (1 pt)",
          "reponse": "<div class='code-block'><pre>// Dans Program.cs\nbuilder.Services.AddSwaggerGen(options =>\n{\n    options.AddSecurityDefinition(\"Bearer\", new OpenApiSecurityScheme\n    {\n        Description = \"JWT Authorization header using the Bearer scheme. \",\n        Name = \"Authorization\",\n        In = ParameterLocation.Header,\n        Type = SecuritySchemeType.ApiKey,\n        Scheme = \"Bearer\"\n    });\n\n    options.AddSecurityRequirement(new OpenApiSecurityRequirement\n    {\n        {\n            new OpenApiSecurityScheme\n            {\n                Reference = new OpenApiReference\n                {\n                    Type = ReferenceType.SecurityScheme,\n                    Id = \"Bearer\"\n                }\n            },\n            new string[] {}\n        }\n    });\n});</pre></div>"
        }
      ]
    },
    {
      "titre": "Rate Limiting et Caching",
      "points": "6 pts",
      "enonce": "<p>L'API de <strong>« DigiShop »</strong> commence à subir des pics de trafic importants. Vous devez mettre en place des mesures de protection et d'optimisation : le <strong>Rate Limiting</strong> et le <strong>Caching</strong>.</p><p>Votre API utilise .NET 8.</p>",
      "questions": [
        {
          "question": "1) Configurez le <strong>Rate Limiting</strong> avec une politique de fenêtre glissante (Sliding Window) : 100 requêtes par minute par IP. (2 pts)",
          "reponse": "<div class='code-block'><pre>// Dans Program.cs\nbuilder.Services.AddRateLimiter(options =>\n{\n    options.AddSlidingWindowLimiter(\"sliding\", opt =>\n    {\n        opt.PermitLimit = 100;\n        opt.Window = TimeSpan.FromMinutes(1);\n        opt.SegmentsPerWindow = 6;\n        opt.QueueProcessingOrder = QueueProcessingOrder.OldestFirst;\n        opt.QueueLimit = 0;\n    });\n    \n    options.OnRejected = async (context, token) =>\n    {\n        context.HttpContext.Response.StatusCode = 429;\n        await context.HttpContext.Response.WriteAsync(\n            \"{\\\"error\\\": \\\"Rate limit exceeded. Try again later.\\\"}\", token);\n    };\n});</pre></div><p>La limite s'applique ensuite avec <code>app.UseRateLimiter();</code></p>"
        },
        {
          "question": "2) Appliquez la politique de Rate Limiting sur tous les endpoints de <strong>ProductsController</strong>. (1 pt)",
          "reponse": "<div class='code-block'><pre>[EnableRateLimiting(\"sliding\")]\n[ApiController]\n[Route(\"api/[controller]\")]\npublic class ProductsController : ControllerBase\n{\n    // Tous les endpoints sont protégés\n}</pre></div>"
        },
        {
          "question": "3) Expliquez ce qu'est le <strong>caching</strong> et décrivez comment vous implémenteriez un cache en mémoire pour l'endpoint <code>GET /api/products</code>. (2 pts)",
          "reponse": "<p>Le <strong>caching</strong> est une technique qui permet de stocker en mémoire les résultats d'une opération coûteuse pour éviter de la répéter à chaque requête. Cela améliore les performances et réduit la charge sur le serveur.</p><p><strong>Implémentation avec IMemoryCache</strong> :</p><div class='code-block'><pre>// Injection du cache\nprivate readonly IMemoryCache _cache;\n\npublic ProductsController(IMemoryCache cache)\n{\n    _cache = cache;\n}\n\n[HttpGet]\npublic async Task&lt;ActionResult&lt;IEnumerable&lt;ProductDto&gt;&gt;&gt; GetProducts()\n{\n    var cacheKey = \"products_all\";\n    \n    if (!_cache.TryGetValue(cacheKey, out IEnumerable&lt;ProductDto&gt; products))\n    {\n        products = await _productService.GetAllProductsAsync();\n        \n        var cacheOptions = new MemoryCacheEntryOptions()\n            .SetAbsoluteExpiration(TimeSpan.FromMinutes(5));\n        \n        _cache.Set(cacheKey, products, cacheOptions);\n    }\n    \n    return Ok(products);\n}</pre></div>"
        },
        {
          "question": "4) Quelle est la différence entre <strong>[ResponseCache]</strong> et <strong>IMemoryCache</strong> ? (1 pt)",
          "reponse": "<p><strong>[ResponseCache]</strong> est un attribut qui permet de configurer le cache côté client (HTTP caching). Il ajoute les en-têtes <code>Cache-Control</code> dans la réponse.</p><p><strong>IMemoryCache</strong> est un cache côté serveur qui permet de stocker des données en mémoire sur le serveur. Il est plus flexible et permet un contrôle précis du contenu et de la durée de vie des données.</p>"
        }
      ]
    },
    {
      "titre": "Structuration et déploiement",
      "points": "7 pts",
      "enonce": "<p>L'API de <strong>« DigiShop »</strong> a beaucoup évolué. Pour faciliter la maintenance et le déploiement, vous devez structurer l'API en couches et la préparer pour la production.</p><p>L'application utilise maintenant une base de données SQL Server.</p>",
      "questions": [
        {
          "question": "1) Proposez une <strong>architecture en couches</strong> pour l'API. Décrivez chaque couche et son rôle. (2 pts)",
          "reponse": "<p><strong>Architecture en couches proposée</strong> :</p><ul><li><strong>Controllers</strong> : Gestion des requêtes HTTP, validation des entrées, retour des réponses.</li><li><strong>Services</strong> : Logique métier, orchestration des opérations.</li><li><strong>Repository</strong> : Accès aux données via EF Core.</li><li><strong>DTOs</strong> : Objets de transfert de données entre les couches.</li><li><strong>Entities</strong> : Modèles de base de données.</li></ul><p>Cette séparation permet un couplage faible et facilite les tests unitaires.</p>"
        },
        {
          "question": "2) Écrivez un <strong>Dockerfile</strong> pour containeriser l'API .NET. (2 pts)",
          "reponse": "<div class='code-block'><pre># Build stage\nFROM mcr.microsoft.com/dotnet/sdk:8.0 AS build\nWORKDIR /src\nCOPY . .\nRUN dotnet restore\nRUN dotnet publish -c Release -o /app/publish\n\n# Runtime stage\nFROM mcr.microsoft.com/dotnet/aspnet:8.0 AS runtime\nWORKDIR /app\nEXPOSE 80\nEXPOSE 443\nCOPY --from=build /app/publish .\nENTRYPOINT [\"dotnet\", \"DigiShop.API.dll\"]</pre></div>"
        },
        {
          "question": "3) Comment configurer la <strong>chaîne de connexion</strong> en production pour SQL Server ? (1 pt)",
          "reponse": "<p>La chaîne de connexion doit être stockée dans les <strong>variables d'environnement</strong> en production, et non dans <code>appsettings.json</code>.</p><p>Exemple :</p><div class='code-block'><pre>// Dans appsettings.Production.json ou variables d'environnement\n{\n  \"ConnectionStrings\": {\n    \"DefaultConnection\": \"Server=db_server;Database=DigiShopDb;User Id=user;Password=pass;TrustServerCertificate=true;\"\n  }\n}</pre></div><p>En production, on peut utiliser : <code>export ConnectionStrings__DefaultConnection=\"...\"</code></p>"
        },
        {
          "question": "4) Qu'est-ce qu'un <strong>Health Check</strong> et comment l'implémenter dans l'API ? (2 pts)",
          "reponse": "<p>Un <strong>Health Check</strong> est un endpoint qui permet de vérifier la disponibilité et la santé de l'API et de ses dépendances (base de données, services externes).</p><p><strong>Implémentation</strong> :</p><div class='code-block'><pre>// Dans Program.cs\nbuilder.Services.AddHealthChecks()\n    .AddDbContextCheck&lt;AppDbContext&gt;()\n    .AddUrlCheck(new Uri(\"https://external-service.com/health\"));\n\n// Utilisation\napp.MapHealthChecks(\"/health\", new HealthCheckOptions\n{\n    ResponseWriter = async (context, report) =>\n    {\n        var result = new\n        {\n            Status = report.Status.ToString(),\n            Checks = report.Entries.Select(e => new\n            {\n                Name = e.Key,\n                Status = e.Value.Status.ToString()\n            })\n        };\n        await context.Response.WriteJsonAsync(result);\n    }\n});</pre></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
