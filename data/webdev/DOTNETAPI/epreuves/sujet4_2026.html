<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "API .NET (ASP.NET Core)",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de Cours",
      "points": "4 pts",
      "enonce": "<p>Répondez aux questions suivantes par Vrai ou Faux en justifiant brièvement votre réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) Le versionnement d'une API permet de faire évoluer l'API sans casser les clients existants.</p>",
          "reponse": "<p><strong>Vrai.</strong> Le versionnement est une bonne pratique qui permet d'introduire des changements (nouvelles fonctionnalités, modifications de comportement) tout en laissant le temps aux clients de migrer vers les nouvelles versions.</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1 pt) L'attribut <code>[FromRoute]</code> est utilisé pour récupérer des paramètres optionnels dans la query string.</p>",
          "reponse": "<p><strong>Faux.</strong> <code>[FromRoute]</code> est utilisé pour capturer des paramètres <strong>obligatoires</strong> dans le chemin de l'URL (ex: <code>/api/produits/{id}</code>). Les paramètres de query string sont récupérés avec <code>[FromQuery]</code>.</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (1 pt) Un contrôleur d'API doit hériter de la classe <code>Controller</code> et non de <code>ControllerBase</code>.</p>",
          "reponse": "<p><strong>Faux.</strong> Pour une API, on hérite de <code>ControllerBase</code>. La classe <code>Controller</code> est utilisée pour les applications MVC qui nécessitent le rendu de vues (HTML). <code>ControllerBase</code> est plus légère et adaptée aux APIs.</p>"
        },
        {
          "question": "<p><strong>1.4</strong> (1 pt) La durée de vie <code>Scoped</code> dans l'injection de dépendances signifie qu'une nouvelle instance du service est créée à chaque requête HTTP.</p>",
          "reponse": "<p><strong>Vrai.</strong> La durée de vie <code>Scoped</code> crée une instance du service par requête HTTP. C'est la durée de vie recommandée pour les <code>DbContext</code> d'Entity Framework Core.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse de Code",
      "points": "6 pts",
      "enonce": "<p>On considère le contrôleur suivant pour la gestion des produits :</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>[ApiController]\n[Route(\"api/[controller]\")]\npublic class ProduitsController : ControllerBase\n{\n    private readonly IProduitService _service;\n\n    public ProduitsController(IProduitService service)\n    {\n        _service = service;\n    }\n\n    [HttpGet]\n    public IActionResult GetAll([FromQuery] int page = 1, [FromQuery] int size = 10)\n    {\n        var produits = _service.GetAll(page, size);\n        return Ok(produits);\n    }\n\n    [HttpGet(\"{id}\")]\n    public IActionResult GetById(int id)\n    {\n        var produit = _service.GetById(id);\n        if (produit == null)\n            return NotFound();\n        return Ok(produit);\n    }\n\n    [HttpPost]\n    public IActionResult Create([FromBody] ProduitCreateDto dto)\n    {\n        var produit = _service.Create(dto);\n        return CreatedAtAction(nameof(GetById), new { id = produit.Id }, produit);\n    }\n\n    [HttpPut(\"{id}\")]\n    public IActionResult Update(int id, [FromBody] ProduitUpdateDto dto)\n    {\n        var produit = _service.Update(id, dto);\n        if (produit == null)\n            return NotFound();\n        return Ok(produit);\n    }\n\n    [HttpDelete(\"{id}\")]\n    public IActionResult Delete(int id)\n    {\n        var result = _service.Delete(id);\n        if (!result)\n            return NotFound();\n        return NoContent();\n    }\n}</pre>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) Quelle est la route complète pour récupérer un produit par son identifiant ?</p>",
          "reponse": "<p>La route complète est <code>GET /api/produits/{id}</code> où <code>{id}</code> est l'identifiant du produit.</p>"
        },
        {
          "question": "<p><strong>2.2</strong> (1 pt) Quel attribut est utilisé pour récupérer les paramètres de pagination <code>page</code> et <code>size</code> ?</p>",
          "reponse": "<p>L'attribut <code>[FromQuery]</code> est utilisé. Ces paramètres sont optionnels avec des valeurs par défaut (page=1, size=10).</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (1 pt) Que retourne la méthode <code>Create</code> en cas de succès ? Quel code HTTP est renvoyé ?</p>",
          "reponse": "<p>La méthode retourne <code>CreatedAtAction</code> qui renvoie un code HTTP <strong>201 Created</strong> avec l'URL du produit créé dans l'en-tête <code>Location</code>.</p>"
        },
        {
          "question": "<p><strong>2.4</strong> (1 pt) Quelle est la différence entre <code>HttpPut</code> et <code>HttpPatch</code> ?</p>",
          "reponse": "<p><code>HttpPut</code> est utilisé pour un <strong>remplacement complet</strong> de la ressource. <code>HttpPatch</code> est utilisé pour une <strong>modification partielle</strong> de la ressource.</p>"
        },
        {
          "question": "<p><strong>2.5</strong> (1 pt) Pourquoi le contrôleur utilise-t-il une interface <code>IProduitService</code> plutôt que l'implémentation concrète ?</p>",
          "reponse": "<p>Cela permet de respecter le principe d'<strong>inversion de dépendance</strong> et d'avoir un <strong>couplage faible</strong>. Cela facilite les tests unitaires (on peut mocker l'interface) et rend le code plus flexible.</p>"
        },
        {
          "question": "<p><strong>2.6</strong> (1 pt) Que fait la méthode <code>Delete</code> si le produit n'existe pas ?</p>",
          "reponse": "<p>Elle retourne <code>NotFound()</code>, ce qui correspond à un code HTTP <strong>404 Not Found</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Sécurité et Authentification JWT",
      "points": "5 pts",
      "enonce": "<p>Vous développez une API sécurisée avec JWT.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) Citez deux informations (claims) que vous pouvez inclure dans un token JWT.</p>",
          "reponse": "<p>On peut inclure :</p><ul><li>L'identifiant de l'utilisateur (<code>nameidentifier</code> ou <code>sub</code>)</li><li>L'email de l'utilisateur (<code>email</code>)</li><li>Les rôles de l'utilisateur (<code>role</code>)</li></ul>"
        },
        {
          "question": "<p><strong>3.2</strong> (1 pt) Quel attribut utilise-t-on pour protéger un endpoint et exiger une authentification ?</p>",
          "reponse": "<p>On utilise l'attribut <code>[Authorize]</code> sur le contrôleur ou l'action.</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) Comment restreindre l'accès à un endpoint aux utilisateurs ayant le rôle \"Admin\" ?</p>",
          "reponse": "<p>On utilise <code>[Authorize(Roles = \"Admin\")]</code>.</p>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) Pourquoi est-il important de définir une durée d'expiration (expiry) pour un token JWT ?</p>",
          "reponse": "<p>Pour <strong>limiter les risques</strong> en cas de vol du token. Un token qui expire réduit la fenêtre d'exploitation par un attaquant.</p>"
        },
        {
          "question": "<p><strong>3.5</strong> (1 pt) Quel header HTTP est utilisé pour transmettre le token JWT dans une requête ?</p>",
          "reponse": "<p>Le header <code>Authorization</code> avec le schéma <code>Bearer</code> : <code>Authorization: Bearer [token]</code>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Mise en Situation - API de Gestion de Tâches",
      "points": "5 pts",
      "enonce": "<p>Vous devez créer une API pour gérer des tâches (todos). Chaque tâche a un <code>Id</code>, un <code>Titre</code>, une <code>Description</code>, un statut (<code>EstTerminee</code>) et une <code>DateCreation</code>.</p><p>Vous devez :</p><ul><li>Créer le modèle <code>Tache</code></li><li>Créer un contrôleur avec les endpoints CRUD complets</li><li>Utiliser le pattern Repository avec injection de dépendances</li></ul>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) Écrire le modèle <code>Tache</code> (classe C#).</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>public class Tache\n{\n    public int Id { get; set; }\n    public string Titre { get; set; }\n    public string Description { get; set; }\n    public bool EstTerminee { get; set; }\n    public DateTime DateCreation { get; set; }\n}</pre>"
        },
        {
          "question": "<p><strong>4.2</strong> (1 pt) Définir l'interface <code>ITacheRepository</code> avec les méthodes nécessaires pour un CRUD complet.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>public interface ITacheRepository\n{\n    Task<List<Tache>> GetAllAsync();\n    Task<Tache> GetByIdAsync(int id);\n    Task<Tache> CreateAsync(Tache tache);\n    Task<Tache> UpdateAsync(Tache tache);\n    Task<bool> DeleteAsync(int id);\n}</pre>"
        },
        {
          "question": "<p><strong>4.3</strong> (1 pt) Écrire le contrôleur <code>TachesController</code> avec les endpoints <code>GET /api/taches</code> et <code>POST /api/taches</code>.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.8rem;'>[ApiController]\n[Route(\"api/[controller]\")]\npublic class TachesController : ControllerBase\n{\n    private readonly ITacheRepository _repository;\n\n    public TachesController(ITacheRepository repository)\n    {\n        _repository = repository;\n    }\n\n    [HttpGet]\n    public async Task<IActionResult> GetAll()\n    {\n        var taches = await _repository.GetAllAsync();\n        return Ok(taches);\n    }\n\n    [HttpPost]\n    public async Task<IActionResult> Create([FromBody] Tache tache)\n    {\n        tache.DateCreation = DateTime.Now;\n        var created = await _repository.CreateAsync(tache);\n        return CreatedAtAction(nameof(GetById), new { id = created.Id }, created);\n    }\n}</pre>"
        },
        {
          "question": "<p><strong>4.4</strong> (1 pt) Écrire l'endpoint <code>GET /api/taches/{id}</code> qui retourne une tâche par son identifiant ou une erreur 404 si elle n'existe pas.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>[HttpGet(\"{id}\")]\npublic async Task<IActionResult> GetById(int id)\n{\n    var tache = await _repository.GetByIdAsync(id);\n    if (tache == null)\n        return NotFound();\n    return Ok(tache);\n}</pre>"
        },
        {
          "question": "<p><strong>4.5</strong> (1 pt) Écrire l'endpoint <code>DELETE /api/taches/{id}</code>.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>[HttpDelete(\"{id}\")]\npublic async Task<IActionResult> Delete(int id)\n{\n    var result = await _repository.DeleteAsync(id);\n    if (!result)\n        return NotFound();\n    return NoContent();\n}</pre>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
