<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "API .NET (ASP.NET Core)",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Questions à Choix Multiples (QCM) - Architecture et Concepts",
      "points": "6 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice évalue vos connaissances fondamentales sur l'architecture ASP.NET Core, l'injection de dépendances et la structure d'une API.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la ou les bonnes réponses parmi les propositions.</p>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Qu'est-ce qu'ASP.NET Core ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Un framework uniquement pour les applications Windows</li><li>B. Un framework cross-platform pour construire des API web et des applications modernes</li><li>C. Un système de gestion de bases de données</li><li>D. Un langage de programmation</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>ASP.NET Core est un framework open-source et cross-platform développé par Microsoft pour construire des applications web modernes, des API et des services. Il peut s'exécuter sur Windows, Linux et macOS [citation:3].</p>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Dans le contexte de l'injection de dépendances (DI) dans ASP.NET Core, que signifie une durée de vie <strong>Scoped</strong> ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Une nouvelle instance est créée à chaque demande</li><li>B. Une instance unique est créée pour toute l'application</li><li>C. Une instance est créée par requête HTTP</li><li>D. Une instance est créée par session utilisateur</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>La durée de vie Scoped signifie qu'une instance unique du service est créée pour chaque requête HTTP. C'est la durée de vie typique pour DbContext dans ASP.NET Core [citation:2].</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Quelle est la différence principale entre <code>Controller</code> et <code>ControllerBase</code> dans ASP.NET Core ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Controller est pour les API, ControllerBase pour les vues</li><li>B. ControllerBase est optimisé pour les API (sans support des vues)</li><li>C. Il n'y a pas de différence</li><li>D. ControllerBase est uniquement disponible dans .NET Framework</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>ControllerBase est conçu spécifiquement pour les contrôleurs d'API. Il n'inclut pas le support des vues, ce qui le rend plus léger. On l'utilise avec l'attribut [ApiController] pour les API REST.</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Quel attribut permet de définir le chemin de base d'un contrôleur d'API ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. [HttpRoute]</li><li>B. [ApiRoute]</li><li>C. [Route]</li><li>D. [ControllerRoute]</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>L'attribut [Route] permet de définir le modèle de routage pour un contrôleur. Par exemple, [Route(\"api/[controller]\")] définit le chemin de base comme 'api/NomControleur' [citation:5].</p>"
        },
        {
          "question": "<p><strong>5. (1 pt)</strong> Dans le pattern Options, quelle interface permet de recevoir des notifications lorsque la configuration change ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. IOptions&lt;T&gt;</li><li>B. IOptionsSnapshot&lt;T&gt;</li><li>C. IOptionsMonitor&lt;T&gt;</li><li>D. IOptionsWatcher&lt;T&gt;</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>IOptionsMonitor&lt;T&gt; permet de s'abonner à des notifications de changement de configuration via la méthode OnChange. C'est utile pour les configurations qui peuvent être modifiées dynamiquement.</p>"
        },
        {
          "question": "<p><strong>6. (1 pt)</strong> Que signifie l'acronyme CORS en développement web ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Cross-Origin Resource Sharing</li><li>B. Cross-Origin Request Security</li><li>C. Cross-Site Request Sharing</li><li>D. Cross-Site Resource Security</li></ul>",
          "reponse": "<p><strong>Réponse : A</strong></p><p>CORS signifie Cross-Origin Resource Sharing. C'est un mécanisme de sécurité qui permet à une application web d'accéder à des ressources situées sur un domaine différent de celui de l'application [citation:9].</p>"
        }
      ]
    },
    {
      "titre": "Questions à Choix Multiples (QCM) - EF Core et Validation",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice évalue vos connaissances sur Entity Framework Core et la validation des données.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la bonne réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>7. (1 pt)</strong> Avec EF Core, quelle commande permet d'appliquer les migrations à la base de données ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. dotnet ef migrations add</li><li>B. dotnet ef database update</li><li>C. dotnet ef migrations create</li><li>D. dotnet ef database migrate</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>La commande 'dotnet ef database update' applique toutes les migrations en attente à la base de données. Elle crée la base de données si elle n'existe pas.</p>"
        },
        {
          "question": "<p><strong>8. (1 pt)</strong> Quel attribut de validation vérifie qu'une chaîne n'est pas null et qu'elle a une longueur minimale et maximale ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. [Required]</li><li>B. [StringLength]</li><li>C. [MaxLength]</li><li>D. [Required] et [StringLength] ensemble</li></ul>",
          "reponse": "<p><strong>Réponse : D</strong></p><p>Pour vérifier qu'une chaîne est obligatoire ET qu'elle a une longueur entre une valeur minimale et maximale, on combine [Required] et [StringLength]. [Required] vérifie que le champ n'est pas null, [StringLength] vérifie la longueur.</p>"
        },
        {
          "question": "<p><strong>9. (1 pt)</strong> Avec [ApiController], que se passe-t-il automatiquement quand la validation d'un DTO échoue ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Une exception est levée</li><li>B. Un 400 Bad Request est retourné automatiquement</li><li>C. Un 500 Internal Server Error est retourné</li><li>D. La méthode du contrôleur est exécutée normalement</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>Avec [ApiController], la validation est automatique. Si le DTO ne respecte pas les règles de validation, ASP.NET Core retourne automatiquement une réponse HTTP 400 Bad Request avec les détails des erreurs [citation:1].</p>"
        },
        {
          "question": "<p><strong>10. (1 pt)</strong> Quelle méthode LINQ d'EF Core permet de charger les données associées (relations) de manière proactive ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. LoadWith()</li><li>B. ThenInclude()</li><li>C. Include()</li><li>D. Both Include() et ThenInclude()</li></ul>",
          "reponse": "<p><strong>Réponse : D</strong></p><p>Include() permet de charger une propriété de navigation de niveau 1, et ThenInclude() permet de charger des propriétés de navigation imbriquées (relations de niveau 2 et plus).</p>"
        }
      ]
    },
    {
      "titre": "Questions à Choix Multiples (QCM) - Sécurité et Configuration",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice porte sur la sécurité avec JWT et la gestion de la configuration.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la bonne réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>11. (1 pt)</strong> Quel package NuGet est nécessaire pour utiliser l'authentification JWT dans ASP.NET Core ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Microsoft.AspNetCore.Authentication</li><li>B. Microsoft.AspNetCore.Authentication.JwtBearer</li><li>C. Microsoft.IdentityModel.Jwt</li><li>D. System.IdentityModel.Tokens.Jwt</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>Le package Microsoft.AspNetCore.Authentication.JwtBearer est nécessaire pour configurer l'authentification JWT dans ASP.NET Core [citation:2].</p>"
        },
        {
          "question": "<p><strong>12. (1 pt)</strong> Quelle attribut permet de protéger un endpoint d'API pour qu'il ne soit accessible qu'aux utilisateurs authentifiés ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. [Authenticate]</li><li>B. [Authorization]</li><li>C. [Authorize]</li><li>D. [Secure]</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>L'attribut [Authorize] est utilisé pour protéger les endpoints. Il peut être appliqué à un contrôleur entier ou à des actions spécifiques [citation:1].</p>"
        },
        {
          "question": "<p><strong>13. (1 pt)</strong> Dans un fichier appsettings.json, comment accède-t-on à une valeur dans une section imbriquée ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Avec un point (ex: JwtSettings.SecretKey)</li><li>B. Avec deux points (ex: JwtSettings:SecretKey)</li><li>C. Avec un slash (ex: JwtSettings/SecretKey)</li><li>D. Avec un underscore (ex: JwtSettings_SecretKey)</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>Dans ASP.NET Core, on utilise ':' comme séparateur pour accéder aux valeurs dans des sections imbriquées. Par exemple, 'JwtSettings:SecretKey' accède à SecretKey dans la section JwtSettings.</p>"
        },
        {
          "question": "<p><strong>14. (1 pt)</strong> Quelle variable d'environnement détermine l'environnement d'exécution (Development, Staging, Production) ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. ENVIRONMENT</li><li>B. ASPNET_ENVIRONMENT</li><li>C. ASPNETCORE_ENVIRONMENT</li><li>D. DOTNET_ENVIRONMENT</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>ASPNETCORE_ENVIRONMENT est la variable d'environnement utilisée par ASP.NET Core pour déterminer l'environnement d'exécution. Elle permet de charger les fichiers appsettings.{Environment}.json correspondants.</p>"
        }
      ]
    },
    {
      "titre": "Questions à Choix Multiples (QCM) - Middleware et Tests",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice évalue vos connaissances sur le middleware et les tests d'API.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la bonne réponse.</p>",
      "questions": [

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
