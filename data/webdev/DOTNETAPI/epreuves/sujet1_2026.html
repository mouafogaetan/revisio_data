<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "API .NET (ASP.NET Core)",
 "classe": "Développement Web",
 "sequence": "Séquence 1",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Architecture et Concepts Fondamentaux d'ASP.NET Core",
     "points": "4 pts",
     "enonce": "<p>L'écosystème .NET a considérablement évolué, passant du .NET Framework à .NET Core, puis à la version unifiée .NET 5/6/7/8. Cette évolution a apporté des changements majeurs en termes de performance, de modularité et de compatibilité.</p>",
     "questions": [
       {
         "question": "<p><strong>1. (1 pt)</strong> Définissez ce qu'est ASP.NET Core et citez <strong>trois</strong> de ses avantages par rapport à l'ancien .NET Framework.</p>",
         "reponse": "<p><strong>Réponse :</strong> ASP.NET Core est un framework open-source, <strong>cross-platform</strong> (fonctionnant sur Windows, Linux et macOS) pour la création d'APIs web et d'applications modernes [citation:1][citation:10].</p><p><strong>Avantages :</strong></p><ul><li><strong>Cross-platform</strong> : Développement et déploiement sur Windows, Linux ou macOS.</li><li><strong>Performance</strong> : Très rapide grâce au serveur web Kestrel et à une architecture légère [citation:1][citation:10].</li><li><strong>Injection de dépendances intégrée</strong> : Favorise un code découplé, testable et maintenable [citation:1].</li><li><strong>Modularité</strong> : Utilisation des packages NuGet nécessaires uniquement.</li></ul>"
       },
       {
         "question": "<p><strong>2. (1 pt)</strong> Quelle est la différence principale entre une version <strong>LTS</strong> et une version <strong>STS</strong> de .NET ? Vers laquelle devriez-vous vous orienter pour un projet en production ?</p>",
         "reponse": "<p><strong>Réponse :</strong> Les versions <strong>LTS (Long Term Support)</strong> sont supportées pendant <strong>3 ans</strong> et sont recommandées pour les environnements de <strong>production</strong> (ex: .NET 6, .NET 8). Les versions <strong>STS (Standard Term Support)</strong> sont supportées pendant <strong>18 mois</strong> et sont plutôt destinées à l'<strong>innovation</strong> (ex: .NET 7).</p><p>Pour la production, il est conseillé d'utiliser une version LTS pour bénéficier d'une stabilité et d'un support à long terme.</p>"
       },
       {
         "question": "<p><strong>3. (1 pt)</strong> Expliquez le rôle du <strong>middleware</strong> dans le pipeline de traitement d'une requête ASP.NET Core. À quoi sert <code>app.UseRouting()</code> ?</p>",
         "reponse": "<p><strong>Réponse :</strong> Le <strong>middleware</strong> est un composant logiciel qui s'exécute dans un pipeline pour traiter les requêtes HTTP. Chaque middleware peut modifier la requête, la réponse, ou passer la main au middleware suivant [citation:1][citation:2].</p><p><code>app.UseRouting()</code> est un middleware qui active le <strong>routage</strong>. Il analyse l'URL de la requête et sélectionne le contrôleur et l'action correspondants.</p><p><strong>Ordre typique :</strong> UseRouting → UseAuthentication → UseAuthorization → MapControllers.</p>"
       },
       {
         "question": "<p><strong>4. (1 pt)</strong> Quels sont les trois types de durée de vie disponibles pour les services enregistrés dans le conteneur d'injection de dépendances ? Donnez un exemple d'utilisation pour <strong>AddScoped</strong>.</p>",
         "reponse": "<p><strong>Réponse :</strong> Les trois durées de vie sont :</p><ul><li><strong>Transient</strong> : Une nouvelle instance est créée à chaque injection.</li><li><strong>Scoped</strong> : Une instance unique est créée pour chaque requête HTTP.</li><li><strong>Singleton</strong> : Une instance unique est créée pour toute la durée de vie de l'application.</li></ul><p><strong>Exemple pour AddScoped :</strong> Le DbContext d'Entity Framework Core et les Repositories sont généralement enregistrés avec <strong>AddScoped</strong> pour qu'ils partagent la même instance pendant toute la durée d'une requête [citation:1][citation:2].</p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>builder.Services.AddScoped&lt;IProductRepository, ProductRepository&gt;();</pre>"
       }
     ]
   },
   {
     "titre": "Création d'Endpoints REST avec Contrôleurs",
     "points": "6 pts",
     "enonce": "<p>Vous développez une API REST pour gérer des produits. L'API doit permettre de créer, lire, mettre à jour et supprimer des produits (CRUD).</p><p>Les données des produits sont : <code>Id</code> (int), <code>Name</code> (string), <code>Price</code> (decimal), <code>Category</code> (string).</p>",
     "questions": [
       {
         "question": "<p><strong>5. (2 pts)</strong> Écrivez le code d'un contrôleur <strong>ProductsController</strong> avec les attributs nécessaires. Le contrôleur doit hériter de la classe de base appropriée pour une API. Précisez le rôle de <code>[ApiController]</code>.</p>",
         "reponse": "<p><strong>Réponse :</strong></p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>[ApiController]\n[Route(\"api/[controller]\")]\npublic class ProductsController : ControllerBase\n{\n    // Le contrôleur hérite de ControllerBase (et non Controller)\n    // car c'est une API, pas une application MVC avec vues.\n}</pre><p><strong>Rôle de [ApiController] :</strong></p><ul><li>Active la <strong>validation automatique</strong> des modèles.</li><li>Permet le <strong>binding de paramètres</strong> plus flexible.</li><li>Retourne une <strong>réponse Problem Details</strong> (RFC 7807) en cas d'erreur.</li><li>Évite de vérifier <code>ModelState.IsValid</code> manuellement.</li></ul>"
       },
       {
         "question": "<p><strong>6. (2 pts)</strong> Implémentez les actions suivantes dans votre contrôleur, en utilisant les attributs HTTP appropriés :</p><ul><li><strong>GET /api/products</strong> : Récupère la liste de tous les produits (retourne un <code>IEnumerable&lt;Product&gt;</code>).</li><li><strong>GET /api/products/{id}</strong> : Récupère un produit par son identifiant (retourne <code>NotFound</code> si le produit n'existe pas).</li><li><strong>POST /api/products</strong> : Crée un nouveau produit (reçoit un objet <code>CreateProductDto</code> dans le corps de la requête).</li></ul>",
         "reponse": "<p><strong>Réponse :</strong></p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>[HttpGet]\npublic IActionResult GetAll()\n{\n    var products = _repository.GetAll();\n    return Ok(products);\n}\n\n[HttpGet(\"{id}\")]\npublic IActionResult GetById(int id)\n{\n    var product = _repository.GetById(id);\n    if (product == null)\n        return NotFound();\n    return Ok(product);\n}\n\n[HttpPost]\npublic IActionResult Create([FromBody] CreateProductDto productDto)\n{\n    var product = new Product\n    {\n        Name = productDto.Name,\n        Price = productDto.Price,\n        Category = productDto.Category\n    };\n    var created = _repository.Add(product);\n    return CreatedAtAction(nameof(GetById), new { id = created.Id }, created);\n}</pre>"
       },
       {
         "question": "<p><strong>7. (1 pt)</strong> Quelle est la différence entre <strong>PUT</strong> et <strong>PATCH</strong> ? Quand utiliseriez-vous l'un plutôt que l'autre ?</p>",
         "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>PUT</strong> : Met à jour une ressource en la <strong>remplaçant</strong> entièrement. L'objet envoyé doit contenir toutes les propriétés de la ressource.</li><li><strong>PATCH</strong> : Applique une <strong>modification partielle</strong> à une ressource. Seules les propriétés à modifier sont envoyées dans la requête.</li></ul><p><strong>Quand utiliser :</strong> Utilisez <strong>PUT</strong> lorsqu'un client a une connaissance complète de l'état de la ressource. Utilisez <strong>PATCH</strong> pour des mises à jour partielles, ce qui est plus efficace [citation:1][citation:8].</p>"
       },
       {
         "question": "<p><strong>8. (1 pt)</strong> Expliquez comment capturer les paramètres suivants dans une action d'un contrôleur :</p><ul><li>Un paramètre <strong>id</strong> dans l'URL (ex: /api/products/5).</li><li>Un paramètre <strong>category</strong> passé en query string (ex: /api/products?category=Electronics).</li><li>Un objet JSON dans le corps de la requête.</li></ul>",
         "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Paramètre d'URL (id) :</strong> <code>public IActionResult GetById(int id)</code> – Le framework lie automatiquement l'id de la route au paramètre de la méthode.</li><li><strong>Query string (category) :</strong> <code>public IActionResult GetByCategory([FromQuery] string category)</code> – L'attribut <code>[FromQuery]</code> indique au framework de lire la valeur de la query string.</li><li><strong>Corps JSON :</strong> <code>public IActionResult Create([FromBody] CreateProductDto productDto)</code> – L'attribut <code>[FromBody]</code> désérialise le JSON en l'objet spécifié [citation:2].</li></ul>"
       }
     ]
   },
   {
     "titre": "Validation des Données et Gestion des Erreurs",
     "points": "4 pts",
     "enonce": "<p>Pour garantir la qualité des données entrantes, vous devez valider les informations reçues par votre API et gérer les erreurs de manière professionnelle.</p>",
     "questions": [
       {
         "question": "<p><strong>9. (1.5 pts)</strong> Ajoutez des <strong>attributs de validation</strong> au DTO <code>CreateProductDto</code> pour :</p><ul><li>Rendre <code>Name</code> obligatoire et limiter sa longueur à 100 caractères.</li><li>Rendre <code>Price</code> obligatoire et supérieur à 0.</li><li>Rendre <code>Category</code> optionnelle.</li></ul>",
         "reponse": "<p><strong>Réponse :</strong></p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>public class CreateProductDto\n{\n    [Required(ErrorMessage = \"Le nom du produit est obligatoire.\")]\n    [StringLength(100, ErrorMessage = \"Le nom ne peut pas dépasser 100 caractères.\")]\n    public string Name { get; set; }\n\n    [Required(ErrorMessage = \"Le prix est obligatoire.\")]\n    [Range(0.01, double.MaxValue, ErrorMessage = \"Le prix doit être supérieur à 0.\")]\n    public decimal Price { get; set; }\n\n    public string Category { get; set; }\n}</pre>"
       },
       {
         "question": "<p><strong>10. (1.5 pts)</strong> Décrivez deux méthodes pour gérer les erreurs globalement dans une API ASP.NET Core. Quelles sont les bonnes pratiques concernant l'affichage des détails d'erreur en développement et en production ?</p>",
         "reponse": "<p><strong>Réponse :</strong></p><p><strong>Méthode 1 : UseExceptionHandler</strong> – Middleware intégré pour capturer les exceptions. Redirige vers un endpoint /error.</p><p><strong>Méthode 2 : Middleware personnalisé</strong> – Permet un contrôle total sur le logging et le formatage des réponses [citation:2].</p><p><strong>Bonnes pratiques :</strong></p><ul><li><strong>En développement :</strong> Utilisez <code>UseDeveloperExceptionPage()</code> pour afficher les détails complets (stack trace, requête).</li><li><strong>En production :</strong> Utilisez <code>UseExceptionHandler()</code> ou un middleware personnalisé pour retourner des messages génériques (ex: <code>\"Une erreur interne est survenue\"</code>) afin de ne pas exposer d'informations sensibles.</li></ul><p>On peut utiliser <code>app.Environment.IsDevelopment()</code> pour activer conditionnellement [citation:2].</p>"
       },

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
