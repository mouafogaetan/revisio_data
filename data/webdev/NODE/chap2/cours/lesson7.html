<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux concepts clés",
    "contenu": "<div style='padding: 10px;'><p>Node.js repose sur trois concepts fondamentaux pour la gestion des données et des événements :</p><div style='display: flex; flex-direction: column; gap: 8px; margin: 12px 0;'><div style='background: #3498db; color: white; padding: 12px; border-radius: 8px; text-align: center;'><strong>📡 EventEmitter</strong><br><span style='font-size: 0.9em;'>Gère les événements et la communication asynchrone</span></div><div style='background: #2ecc71; color: white; padding: 12px; border-radius: 8px; text-align: center;'><strong>📦 Buffers</strong><br><span style='font-size: 0.9em;'>Manipule des données binaires en mémoire</span></div><div style='background: #e67e22; color: white; padding: 12px; border-radius: 8px; text-align: center;'><strong>🌊 Streams</strong><br><span style='font-size: 0.9em;'>Traite des données par morceaux pour l'efficacité</span></div></div><p>Ces outils sont essentiels pour construire des applications performantes et réactives.</p></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons découvrir trois concepts clés de Node.js : les EventEmitters, les Buffers et les Streams. Les EventEmitters permettent de gérer les événements et la communication asynchrone entre différentes parties de votre application. Les Buffers sont utilisés pour manipuler des données binaires directement en mémoire. Enfin, les Streams permettent de traiter des données par morceaux, ce qui est essentiel pour les applications qui manipulent de gros volumes de données, comme le streaming vidéo ou la lecture de gros fichiers. Ces trois concepts sont fondamentaux pour devenir un développeur Node.js compétent.",
    "note": "Ces trois concepts sont au cœur de l'architecture de Node.js."
  },
  {
    "titre": "EventEmitter - Gestion d'événements",
    "contenu": "<div style='padding: 10px;'><p><code>EventEmitter</code> est une classe du module <code>events</code> qui permet de créer, écouter et émettre des événements.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nconst EventEmitter = require('events');\n\nclass MonEmetteur extends EventEmitter {}\n\nconst monEmetteur = new MonEmetteur();\n\n// Écouter un événement\nmonEmetteur.on('evenement', (data) => {\n  console.log('Événement reçu:', data);\n});\n\n// Émettre un événement\nmonEmetteur.emit('evenement', 'Bonjour le monde !');\n</pre><ul><li><code>on()</code> : Ajoute un écouteur pour un événement</li><li><code>emit()</code> : Déclenche un événement</li><li><code>once()</code> : Écoute un événement une seule fois</li></ul><p>Tous les streams sont des instances d'<code>EventEmitter</code> [citation:1][citation:5].</p></div>",
    "texteParle": "Commençons par le premier concept : l'EventEmitter. C'est une classe du module 'events' qui permet de gérer des événements. C'est comme un système de notification : vous pouvez définir un événement, par exemple 'evenement', et y attacher des fonctions qui seront exécutées quand cet événement est déclenché. Vous avez la méthode 'on' pour écouter un événement, et 'emit' pour le déclencher. Il y a aussi 'once' qui écoute l'événement une seule fois. Ce système est très utilisé dans Node.js. Par exemple, tous les streams sont des instances d'EventEmitter, ce qui signifie qu'ils peuvent émettre des événements comme 'data' ou 'end'.",
    "note": "EventEmitter est le cœur de la programmation événementielle en Node.js."
  },
  {
    "titre": "Buffers - Données binaires en mémoire",
    "contenu": "<div style='padding: 10px;'><p>Un <code>Buffer</code> est un espace mémoire réservé pour stocker des données binaires brutes.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Créer un buffer de 10 octets\nconst buf = Buffer.alloc(10);\n\n// Écrire dans le buffer\nbuf.write('Hello');\n\n// Lire le buffer\nconsole.log(buf.toString()); // 'Hello'\n\n// Buffer à partir d'une chaîne\nconst buf2 = Buffer.from('Bonjour');\nconsole.log(buf2); // <Buffer 42 6f 6e 6a 6f 75 72>\n</pre><ul><li><strong>Utilité</strong> : Manipuler des fichiers, images, données réseau</li><li><strong>Comparaison</strong> : Les <code>TypedArray</code> sont des vues sur des buffers</li><li><strong>Attention</strong> : <code>Buffer.length</code> mesure en octets, pas en caractères [citation:4]</li></ul></div>",
    "texteParle": "Le deuxième concept est le Buffer. Un Buffer est un espace mémoire qui stocke des données binaires. En Node.js, on utilise les buffers pour manipuler des fichiers, des images, ou des données réseau. Vous pouvez créer un buffer, y écrire des données, et les lire. Par exemple, 'Buffer.from' crée un buffer à partir d'une chaîne de caractères. Un point important : la taille d'un buffer est mesurée en octets, pas en caractères. Par exemple, une chaîne en UTF-8 peut prendre plus d'un octet par caractère, donc ne confondez pas la longueur d'une chaîne avec la taille de son buffer. Les buffers sont très efficaces pour manipuler des données binaires.",
    "note": "Les buffers sont essentiels pour le traitement de données binaires en Node.js."
  },
  {
    "titre": "Streams - Traitement par morceaux",
    "contenu": "<div style='padding: 10px;'><p>Les <strong>Streams</strong> permettent de lire ou d'écrire des données progressivement, par petits morceaux appelés <strong>chunks</strong>.</p><div style='background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 8px 0; color: #2c3e50; text-align: center;'>\n📄 Fichier de 1 Go → 📦 Chunks de 64 Ko → ⚡ Traitement progressif\n</div><p><strong>Avantages des streams</strong> :</p><ul><li><strong>Mémoire</strong> : Pas besoin de charger tout le fichier en mémoire [citation:4]</li><li><strong>Temps</strong> : Commencez à traiter dès réception du premier chunk</li><li><strong>UX</strong> : Streaming vidéo (YouTube) [citation:9]</li></ul><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>💡 Utilité :</strong> Idéal pour les gros fichiers, les logs, les vidéos, les téléchargements.</p></div></div>",
    "texteParle": "Le troisième concept est le Stream. Un stream permet de lire ou d'écrire des données progressivement, par petits morceaux qu'on appelle des chunks. Au lieu de charger tout un fichier de 1 Go en mémoire, ce qui pourrait faire planter votre application, vous lisez le fichier chunk par chunk de 64 Ko par exemple. Cela a plusieurs avantages : premièrement, vous économisez la mémoire, deuxièmement, vous pouvez commencer à traiter les données dès que le premier chunk arrive, sans attendre la fin du téléchargement. Et troisièmement, c'est ce qui permet à YouTube de diffuser une vidéo en temps réel, sans que vous ayez à télécharger toute la vidéo avant de la regarder.",
    "note": "Les streams sont la solution pour les applications qui manipulent de gros volumes de données."
  },
  {
    "titre": "Les 4 types de Streams",
    "contenu": "<div style='padding: 10px;'><p>Node.js propose quatre types fondamentaux de streams :</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0;'><div style='background: #3498db; color: white; padding: 10px; border-radius: 6px; text-align: center;'><strong>📖 Readable</strong><br><span style='font-size: 0.85em;'>Lecture de données</span><br><span style='font-size: 0.8em;'>ex: fs.createReadStream()</span></div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px; text-align: center;'><strong>✏️ Writable</strong><br><span style='font-size: 0.85em;'>Écriture de données</span><br><span style='font-size: 0.8em;'>ex: fs.createWriteStream()</span></div><div style='background: #e67e22; color: white; padding: 10px; border-radius: 6px; text-align: center;'><strong>🔄 Duplex</strong><br><span style='font-size: 0.85em;'>Lecture et écriture</span><br><span style='font-size: 0.8em;'>ex: net.Socket</span></div><div style='background: #9b59b6; color: white; padding: 10px; border-radius: 6px; text-align: center;'><strong>⚡ Transform</strong><br><span style='font-size: 0.85em;'>Lecture + transformation</span><br><span style='font-size: 0.8em;'>ex: zlib.createDeflate()</span></div></div><p>Tous les streams héritent d'<code>EventEmitter</code> [citation:1].</p></div>",
    "texteParle": "Node.js propose quatre types de streams. Le stream 'Readable' est utilisé pour lire des données, par exemple avec fs.createReadStream pour lire un fichier. Le stream 'Writable' est utilisé pour écrire des données, comme fs.createWriteStream. Le stream 'Duplex' peut à la fois lire et écrire, comme une connexion socket. Et le stream 'Transform' est un stream duplex qui peut aussi transformer les données, comme un stream de compression. Tous ces streams héritent d'EventEmitter, donc ils peuvent émettre et écouter des événements. C'est un design très puissant et flexible.",
    "note": "Chaque type de stream est conçu pour un usage spécifique."
  },
  {
    "titre": "Exemple pratique - Lecture de fichier",
    "contenu": "<div style='padding: 10px;'><p>Comparons l'approche classique et l'approche avec streams pour lire un gros fichier.</p><div style='background: #e74c3c; color: white; padding: 10px; border-radius: 6px; margin: 8px 0;'><strong>❌ Sans Stream (chargement complet en mémoire) :</strong></div><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nconst fs = require('fs');\n\n// Charge tout le fichier en mémoire\nconst data = fs.readFileSync('gros-fichier.log');\nres.send(data);\n</pre><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px; margin: 8px 0;'><strong>✅ Avec Stream (lecture progressive) :</strong></div><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nconst fs = require('fs');\n\nconst readStream = fs.createReadStream('gros-fichier.log');\nreadStream.pipe(res); // Envoie progressivement à la réponse HTTP\n</pre><p>La version avec stream utilise moins de mémoire et commence à envoyer les données immédiatement [citation:9].</p></div>",
    "texteParle": "Pour bien comprendre l'intérêt des streams, regardons un exemple concret. Supposons que vous ayez un gros fichier à envoyer à un client via une API HTTP. Sans stream, vous utilisez fs.readFileSync, qui charge tout le fichier en mémoire. Si le fichier fait 1 Go, votre serveur va utiliser 1 Go de mémoire pour un seul utilisateur, ce qui n'est pas scalable. Avec un stream, vous créez un readStream et vous le 'pipez' directement vers la réponse HTTP. Le fichier est lu par morceaux et envoyé au fur et à mesure. Votre serveur utilise beaucoup moins de mémoire et le client reçoit les données plus rapidement. C'est une meilleure pratique pour toutes les applications qui manipulent des données volumineuses.",
    "note": "Les streams sont essentiels pour des applications Node.js scalables."
  },
  {
    "titre": "Le Pipe - Connexion de streams",
    "contenu": "<div style='padding: 10px;'><p>La méthode <code>pipe()</code> est l'outil le plus puissant pour connecter les streams entre eux.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nreadableStream.pipe(writableStream);\n</pre><p>Cette seule ligne réalise plusieurs opérations :</p><ul><li>Transfère les données de la source vers la destination</li><li>Gère automatiquement les pauses et reprises (backpressure)</li><li>Gère la fin du stream</li></ul><p><strong>Exemple :</strong> Copier un fichier avec pipe</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nconst source = fs.createReadStream('source.txt');\nconst destination = fs.createWriteStream('dest.txt');\nsource.pipe(destination);\n</pre><p>Le pipe gère aussi les <strong>backpressures</strong> quand le stream de destination est plus lent [citation:1].</p></div>",
    "texteParle": "La méthode pipe est l'outil le plus important pour connecter des streams ensemble. Avec une seule ligne de code, elle réalise plusieurs opérations : elle transfère les données de la source vers la destination, elle gère automatiquement les pauses et reprises quand un stream est plus lent que l'autre, et elle gère la fin du stream. Par exemple, pour copier un fichier, vous créez un readStream sur le fichier source, un writeStream sur le fichier destination, et vous utilisez pipe pour les connecter. Le pipe est très intelligent : si la destination est plus lente, il met la source en pause pour éviter une accumulation de données en mémoire. C'est ce qu'on appelle la gestion des backpressures.",
    "note": "Le pipe est la méthode la plus simple et la plus robuste pour connecter des streams."
  },
  {
    "titre": "Événements des Streams",
    "contenu": "<div style='padding: 10px;'><p>Les streams émettent des événements importants pour contrôler le flux de données.</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0;'><div style='background: #3498db; color: white; padding: 10px; border-radius: 6px;'><strong>Readable Stream</strong><br>• <code>data</code> : un chunk est disponible<br>• <code>end</code> : fin des données<br>• <code>error</code> : erreur</div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>Writable Stream</strong><br>• <code>drain</code> : prêt pour plus de données<br>• <code>finish</code> : écriture terminée<br>• <code>pipe</code> : connecté à une source</div></div><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nconst req = http.request({ ... });\n\nreq.on('data', (chunk) => {\n  console.log('Reçu:', chunk.toString());\n});\n\nreq.on('end', () => {\n  console.log('Plus de données');\n});\n</pre><p>On peut aussi utiliser l'API moderne avec <code>for await...of</code> [citation:3].</p></div>",
    "texteParle": "Les streams émettent également des événements qui vous permettent de contrôler le flux de données. Pour un stream lisible, vous avez l'événement 'data' qui est émis à chaque fois qu'un nouveau morceau de données est disponible. L'événement 'end' signale la fin des données. Pour un stream inscriptible, vous avez l'événement 'drain' qui indique que vous pouvez à nouveau écrire, et 'finish' qui signale que l'écriture est terminée. Ces événements vous donnent un contrôle fin sur le flux de données. Notez que Node.js propose aussi une syntaxe plus moderne avec 'for await...of' pour lire les streams, mais les événements restent très utilisés.",
    "note": "Les événements offrent un contrôle précis sur les streams."
  },
  {
    "titre": "Backpressure - Le goulot d'étranglement",
    "contenu": "<div style='padding: 10px;'><p>La <strong>backpressure</strong> est un mécanisme pour gérer les différences de vitesse entre un producteur et un consommateur de données.</p><div style='background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 8px 0; color: #2c3e50; text-align: center;'>\n📤 Producteur (lecture fichier 100 Mo/s) → 🔄 <strong>Buffer</strong> → 📥 Consommateur (réseau 10 Mo/s)\n</div><p><strong>Comment ça fonctionne :</strong></p><ul><li>Le <code>pipe()</code> gère la backpressure automatiquement</li><li><code>highWaterMark</code> contrôle la taille du buffer [citation:1][citation:4]</li><li>Si le buffer est plein, le producteur est mis en pause</li></ul><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>📌 Important :</strong> La backpressure évite les fuites mémoire en régulant le flux de données.</p></div></div>",
    "texteParle": "Un concept important avec les streams est la backpressure, ou contre-pression. C'est un mécanisme qui permet de gérer la différence de vitesse entre un producteur de données et un consommateur. Par exemple, si vous lisez un fichier très rapidement et que vous l'envoyez sur un réseau lent, le buffer de mémoire va se remplir. Sans backpressure, vous risquez une fuite mémoire. Le pipe gère cela automatiquement. Il met en pause le producteur quand le buffer est plein et le relance quand le consommateur a vidé le buffer. La taille du buffer est contrôlée par le paramètre highWaterMark. C'est un mécanisme essentiel pour construire des applications robustes et sans fuite mémoire.",
    "note": "La backpressure est un concept clé pour éviter les fuites mémoire."
  },
  {
    "titre": "Récapitulatif et bonnes pratiques",
    "contenu": "<div style='padding: 10px;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;'><div style='background: #3498db; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>EventEmitter</strong><br><span style='font-size: 0.8em;'>on(), emit(), once()</span></div><div style='background: #2ecc71; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Buffer</strong><br><span style='font-size: 0.8em;'>alloc(), from(), toString()</span></div><div style='background: #e67e22; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Readable</strong><br><span style='font-size: 0.8em;'>data, end, error</span></div><div style='background: #9b59b6; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Writable</strong><br><span style='font-size: 0.8em;'>drain, finish, pipe</span></div></div><p><strong>Bonnes pratiques :</strong></p><ul><li>✅ Utilisez <code>pipe()</code> pour connecter des streams</li><li>✅ Utilisez les streams pour les gros fichiers</li><li>✅ Gérez les erreurs avec les événements 'error'</li><li>✅ Surveillez la backpressure avec 'drain'</li></ul><div style='background: #f1c40f; color: #2c3e50; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'><strong>💡 À retenir :</strong> Les streams sont la clé pour des applications Node.js performantes et scalables.</p></div></div>",
    "texteParle": "Pour conclure, faisons un récapitulatif de ce que nous avons appris aujourd'hui. Nous avons vu les EventEmitters avec leurs méthodes on, emit et once. Les Buffers pour manipuler des données binaires avec alloc, from et toString. Les Readable Streams avec leurs événements data et end, et les Writable Streams avec drain et finish. En termes de bonnes pratiques, utilisez toujours pipe pour connecter vos streams, utilisez les streams pour les gros fichiers, n'oubliez pas de gérer les erreurs avec l'événement 'error', et soyez attentif à la backpressure. Les streams sont la clé pour construire des applications Node.js performantes et scalables. Ce sont des outils puissants que vous allez utiliser très souvent dans vos projets.",
    "note": "Maîtriser les streams est un must pour tout développeur Node.js."
  }
];
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';

        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {

        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
