<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
    "matiere": "Backend avec Node.js",
    "classe": "Développement Web",
    "sequence": "Séquence 3",
    "anneeScolaire": "2025-2026",
    "exercices": [
        {
            "titre": "Exercice 1 : Architecture de Node.js et modules core (5 pts)",
            "points": "5 pts",
            "enonce": "Node.js est un environnement d'exécution JavaScript côté serveur qui utilise le moteur V8 de Google Chrome. Il est conçu autour d'un modèle asynchrone et non-bloquant, ce qui le rend particulièrement performant pour les applications I/O intensives.",
            "questions": [
                {
                    "question": "1) Expliquez ce qu'est Node.js et donnez trois de ses caractéristiques principales. [citation:2][citation:10]",
                    "reponse": "Node.js est un environnement d'exécution JavaScript open-source et multiplateforme qui permet d'exécuter du JavaScript côté serveur. Ses trois caractéristiques principales sont : un modèle asynchrone non-bloquant, une architecture événementielle (event loop), et l'utilisation du moteur V8 pour une exécution performante du code."
                },
                {
                    "question": "2) Quelle est la différence entre le mode synchrone et asynchrone dans le module 'fs' de Node.js ? Donnez un exemple de code pour chaque mode.",
                    "reponse": "En mode synchrone, l'exécution du code est bloquée jusqu'à ce que l'opération soit terminée. En mode asynchrone, l'opération est lancée et le code continue son exécution, le résultat étant traité via un callback ou une promesse. <br><br>Exemple synchrone : <br><code>const data = fs.readFileSync('fichier.txt', 'utf8');</code><br>Exemple asynchrone : <br><code>fs.readFile('fichier.txt', 'utf8', (err, data) => { if (err) throw err; console.log(data); });</code>"
                },
                {
                    "question": "3) Citez quatre modules core de Node.js et décrivez brièvement l'utilité de chacun.",
                    "reponse": "Les modules core de Node.js incluent : <br>- <strong>http</strong> : création de serveurs HTTP et gestion des requêtes/réponses. [citation:2][citation:6] <br>- <strong>fs</strong> : manipulation du système de fichiers (lecture, écriture). <br>- <strong>path</strong> : manipulation des chemins de fichiers. <br>- <strong>os</strong> : obtention d'informations sur le système d'exploitation."
                }
            ]
        },
        {
            "titre": "Exercice 2 : Gestion des dépendances et Express (6 pts)",
            "points": "6 pts",
            "enonce": "Express est un framework minimaliste pour Node.js qui simplifie la création d'API REST. La gestion des dépendances via npm permet d'organiser et de maintenir un projet.",
            "questions": [
                {
                    "question": "1) À quoi sert le fichier package.json ? Citez trois champs essentiels qu'il contient.",
                    "reponse": "package.json est le manifeste d'un projet Node.js. Il contient les métadonnées du projet et ses dépendances. Trois champs essentiels sont : <br>- <strong>name</strong> : le nom du projet. <br>- <strong>version</strong> : le numéro de version. <br>- <strong>dependencies</strong> : la liste des paquets nécessaires à l'exécution du projet."
                },
                {
                    "question": "2) Écrivez le code nécessaire pour créer un serveur Express basique qui écoute sur le port 3000 et renvoie 'Hello World' sur la route '/'.",
                    "reponse": "<code>const express = require('express'); <br>const app = express(); <br><br>app.get('/', (req, res) => { <br>  res.send('Hello World'); <br>}); <br><br>app.listen(3000, () => { <br>  console.log('Serveur démarré sur le port 3000'); <br>});</code> [citation:5][citation:7]"
                },
                {
                    "question": "3) Expliquez le rôle des middlewares dans Express. Donnez un exemple de middleware de logging personnalisé.",
                    "reponse": "Un middleware est une fonction qui s'exécute avant le traitement final d'une requête. Il permet d'ajouter des fonctionnalités transversales comme le logging, l'authentification, ou la validation. <br><br>Exemple de middleware de logging : <br><code>app.use((req, res, next) => { <br>  console.log(`${req.method} ${req.url}`); <br>  next(); <br>});</code>"
                }
            ]
        },
        {
            "titre": "Exercice 3 : Sécurisation d'une API (5 pts)",
            "points": "5 pts",
            "enonce": "La sécurité est un aspect fondamental dans le développement d'API. Le hashage des mots de passe et l'authentification JWT sont des pratiques essentielles.",
            "questions": [
                {
                    "question": "1) Pourquoi est-il nécessaire de hacher les mots de passe avant de les stocker en base de données ? Quelle bibliothèque recommandez-vous et comment l'utiliser ?",
                    "reponse": "Le hashage des mots de passe est nécessaire car stocker des mots de passe en clair est un grave risque de sécurité. En cas de fuite de données, les mots de passe exposés peuvent compromettre les comptes des utilisateurs. <br><br>La bibliothèque recommandée est <strong>bcrypt</strong>. [citation:9] <br>Exemple d'utilisation : <br><code>const hashedPassword = await bcrypt.hash(password, 10);</code><br>Le deuxième paramètre (10) est le nombre de 'salt rounds'."
                },
                {
                    "question": "2) Qu'est-ce qu'un token JWT et comment est-il utilisé dans le contexte d'une API REST ?",
                    "reponse": "Un JWT (JSON Web Token) est un token d'authentification qui permet de vérifier l'identité d'un utilisateur de manière stateless. Il est généralement envoyé par le client dans l'en-tête 'Authorization' après une connexion réussie. <br><br>Le serveur vérifie la validité du token pour chaque requête protégée. [citation:3][citation:9]"
                },
                {
                    "question": "3) Expliquez la différence entre l'authentification par session (stateful) et l'authentification par JWT (stateless).",
                    "reponse": "L'authentification par session est dite 'stateful' car le serveur stocke les informations de session côté serveur (dans une base de données ou en mémoire). <br><br>L'authentification par JWT est dite 'stateless' car le serveur ne stocke rien : il vérifie simplement la validité du token à chaque requête. Cela permet une meilleure scalabilité mais nécessite de gérer l'expiration des tokens."
                }
            ]
        },
        {
            "titre": "Exercice 4 : Architecture et temps réel (4 pts)",
            "points": "4 pts",
            "enonce": "L'architecture d'un projet Node.js professionnel est cruciale pour la maintenabilité et l'évolutivité. Socket.IO permet d'ajouter des fonctionnalités temps réel.",
            "questions": [
                {
                    "question": "1) Décrivez l'architecture MVC (Modèle-Vue-Contrôleur) et comment elle s'applique à un projet Node.js avec Express.",
                    "reponse": "L'architecture MVC sépare l'application en trois couches : <br>- <strong>Modèle</strong> : gère les données et la logique métier (interactions avec la base de données). <br>- <strong>Vue</strong> : dans le contexte d'une API, ce sont les réponses JSON envoyées au client. <br>- <strong>Contrôleur</strong> : reçoit les requêtes, appelle les services et renvoie les réponses. <br><br>Dans Express, cela se traduit par une organisation en dossiers 'models', 'controllers', 'services', 'routes'."
                },
                {
                    "question": "2) À quoi sert Socket.IO et quel type de communication permet-il ?",
                    "reponse": "Socket.IO permet une communication bidirectionnelle en temps réel entre le serveur et le client. Contrairement au HTTP classique où le client doit faire une requête pour recevoir des données, Socket.IO permet au serveur d'envoyer des données à tout moment (push)."
                },
                {
                    "question": "3) Pourquoi est-il important d'utiliser des variables d'environnement (fichier .env) dans un projet Node.js ?",
                    "reponse": "Les variables d'environnement permettent de séparer la configuration du code. Elles sont essentielles pour : <br>- Ne pas exposer de données sensibles (clés API, mots de passe) dans le code source. <br>- Avoir des configurations différentes selon l'environnement (développement, production). <br><br>La bibliothèque <strong>dotenv</strong> est couramment utilisée pour charger ces variables. [citation:3]"
                }
            ]
        }
    ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
