<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Backend avec Node.js",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Les modules core de Node.js",
      "points": "6 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>📦 Exercice 1</p><p>Node.js dispose de nombreux modules intégrés (core modules) qui permettent d'effectuer des opérations courantes. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Écrivez un script Node.js qui lit le contenu d'un fichier <code>data.txt</code> de manière asynchrone et affiche son contenu dans la console. Utilisez le module <code>fs</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>const fs = require('fs');\n\nfs.readFile('data.txt', 'utf8', (err, data) => {\n  if (err) {\n    console.error('Erreur lors de la lecture du fichier:', err);\n    return;\n  }\n  console.log('Contenu du fichier:', data);\n});</pre><p>On utilise <code>fs.readFile</code> qui prend le chemin du fichier, l'encodage et une fonction callback. Le callback reçoit une erreur (si présente) et les données lues.</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Expliquez la différence entre <code>fs.readFileSync()</code> et <code>fs.readFile()</code>. Dans quel cas utiliseriez-vous l'un plutôt que l'autre ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p><code>fs.readFileSync()</code> est <strong>synchrone</strong> : il bloque l'exécution du programme jusqu'à ce que le fichier soit lu. <code>fs.readFile()</code> est <strong>asynchrone</strong> : il ne bloque pas et exécute le callback une fois la lecture terminée.</p><p>On utilise <code>readFileSync()</code> dans les scripts de configuration ou au démarrage de l'application. On utilise <code>readFile()</code> pour les opérations courantes car il ne bloque pas le thread principal, ce qui est essentiel pour la performance de Node.js [citation:2].</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> Écrivez une fonction qui utilise le module <code>path</code> pour construire le chemin absolu d'un fichier <code>config.json</code> situé dans un dossier <code>config</code> à la racine du projet. Utilisez <code>path.join()</code> et <code>__dirname</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>const path = require('path');\n\nconst configPath = path.join(__dirname, 'config', 'config.json');\nconsole.log('Chemin absolu:', configPath);</pre><p><code>__dirname</code> représente le dossier du fichier en cours d'exécution. <code>path.join()</code> construit un chemin en utilisant les séparateurs appropriés pour l'OS (Windows ou Linux).</p></div>"
        }
      ]
    },
    {
      "titre": "Création d'un serveur HTTP",
      "points": "7 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>🌐 Exercice 2</p><p>Node.js permet de créer des serveurs HTTP avec le module <code>http</code>. Utilisez vos connaissances pour répondre aux questions.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Écrivez un serveur HTTP basique avec Node.js qui écoute sur le port 3000 et répond \"Bonjour depuis Node.js !\" à toute requête GET sur la racine <code>/</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>const http = require('http');\n\nconst server = http.createServer((req, res) => {\n  if (req.url === '/' && req.method === 'GET') {\n    res.writeHead(200, { 'Content-Type': 'text/plain' });\n    res.end('Bonjour depuis Node.js !');\n  } else {\n    res.writeHead(404, { 'Content-Type': 'text/plain' });\n    res.end('Page non trouvée');\n  }\n});\n\nserver.listen(3000, () => {\n  console.log('Serveur démarré sur http://localhost:3000');\n});</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Quels objets sont passés en paramètre à la fonction callback de <code>http.createServer()</code> ? Que contiennent-ils ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>La fonction callback reçoit deux objets :</p><ul><li><strong><code>req</code></strong> (IncomingMessage) : contient les informations de la requête : <code>url</code>, <code>method</code>, <code>headers</code>, etc.</li><li><strong><code>res</code></strong> (ServerResponse) : utilisé pour construire et envoyer la réponse. On y accède via <code>writeHead()</code>, <code>write()</code>, <code>end()</code> [citation:2][citation:8].</li></ul></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> Expliquez pourquoi Node.js peut gérer des milliers de connexions simultanées avec un seul thread, contrairement aux serveurs traditionnels.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Node.js utilise un modèle <strong>asynchrone et non-bloquant</strong> (event loop). Lorsqu'une opération I/O (lecture de fichier, requête réseau, accès base de données) est lancée, Node.js ne bloque pas le thread principal. Il passe à la tâche suivante et revient quand l'opération est terminée via un callback ou une promesse [citation:2][citation:5].</p><p>Cela permet de gérer des milliers de connexions simultanées sans créer un thread par connexion, ce qui évite la surcharge mémoire [citation:2].</p></div>"
        }
      ]
    },
    {
      "titre": "EventEmitter, Buffer et Streams",
      "points": "7 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>⚡ Exercice 3</p><p>Node.js propose des mécanismes avancés comme les événements, les buffers et les streams. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Qu'est-ce qu'un <code>EventEmitter</code> dans Node.js ? Écrivez un exemple simple qui émet un événement <code>message</code> avec un payload.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p><code>EventEmitter</code> est une classe du module <code>events</code> qui permet de créer des objets capables d'émettre et d'écouter des événements. C'est le mécanisme central de la gestion d'événements en Node.js.</p><pre style='margin: 4px 0; white-space: pre-wrap;'>const EventEmitter = require('events');\n\nclass MyEmitter extends EventEmitter {}\n\nconst myEmitter = new MyEmitter();\n\n// Écouter l'événement\nmyEmitter.on('message', (data) => {\n  console.log('Message reçu:', data);\n});\n\n// Émettre l'événement\nmyEmitter.emit('message', { text: 'Bonjour !', date: new Date() });</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Quelle est la différence entre un <strong>Buffer</strong> et un <strong>Stream</strong> en Node.js ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Un <strong>Buffer</strong> est une zone mémoire temporaire qui stocke des données binaires en mémoire. Il est utilisé pour manipuler des données avant de les envoyer ou de les recevoir.</p><p>Un <strong>Stream</strong> est une abstraction qui permet de lire ou d'écrire des données de manière <strong>continue et fragmentée</strong>. Les streams ne stockent pas tout en mémoire, ce qui les rend adaptés aux gros fichiers ou aux données en temps réel.</p><p>Exemples de streams : <code>readable</code>, <code>writable</code>, <code>transform</code> [citation:2].</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> Écrivez un exemple utilisant un stream <code>readable</code> pour lire un gros fichier et afficher son contenu par morceaux (chunks) plutôt que tout d'un coup.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>const fs = require('fs');\n\nconst readStream = fs.createReadStream('gros_fichier.txt', { encoding: 'utf8' });\n\nreadStream.on('data', (chunk) => {\n  console.log('Nouveau chunk reçu:', chunk.length, 'caractères');\n});\n\nreadStream.on('end', () => {\n  console.log('Lecture terminée');\n});\n\nreadStream.on('error', (err) => {\n  console.error('Erreur:', err);\n});</pre><p>Les streams permettent de traiter des fichiers volumineux sans saturer la mémoire [citation:2].</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
