<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 25 : Architecture professionnelle Node.js | Backend</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuration Tailwind pour personnalisation légère (couleurs douces) -->
    <style>
        /* Styles additionnels pour le confort visuel et la lisibilité */
        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 1.2rem 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 0.75rem;
            }
        }
        .highlight-badge {
            background: #e0e7ff;
            color: #3730a3;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .note-glass {
            background: rgba(255,255,245,0.8);
            backdrop-filter: blur(2px);
            border-left: 4px solid #3b82f6;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .folder-tree {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
            font-family: monospace;
            border: 1px solid #cbd5e1;
            font-size: 0.85rem;
        }
        .btn-slide {
            transition: all 0.2s;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #64748b;
            border-radius: 10px;
        }
    </style>
    <!-- jQuery & MathJax (pour d'éventuelles formules mais surtout par précaution) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Zone d'affichage dynamique des slides -->
        <div id="slides-wrapper" class="relative"></div>

        <!-- Navigation -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevSlide" class="bg-white hover:bg-slate-100 text-slate-700 font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed border border-slate-200 text-sm md:text-base">◀ Précédent</button>
            <div class="text-sm bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-sm text-slate-600">
                Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
            </div>
            <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed text-sm md:text-base">Suivant ▶</button>
        </div>
    </div>

    <footer class="text-center text-slate-400 text-xs py-5 border-t border-slate-200 mt-6">
        🇨🇲 Cours Backend Node.js – Enseignant Cameroun | Leçon 25 : Structure professionnelle
    </footer>

    <script>
        // Contenu des slides pour la leçon 25 (Architecture MVC, dossiers, dotenv, logs)
        // Slide 0 : Titre
        // Slide 1 : Objectifs d'apprentissage
        // Slide 2 : Pourquoi une architecture propre ?
        // Slide 3 : Structure MVC (Modèle - Vue - Contrôleur) dans une API
        // Slide 4 : Organisation des dossiers (exemple concret)
        // Slide 5 : Gestion des variables d’environnement avec dotenv
        // Slide 6 : Mise en place des logs avec Winston / Pino
        // Slide 7 : Bonnes pratiques et résumé
        
        const slides = [
            {
                type: "title",
                icon: "🏗️",
                title: "Structurer un projet Node.js professionnel",
                subtitle: "Architecture MVC, organisation des dossiers, variables d'environnement et logs",
                badge: "Leçon 25 · Niveau Intermédiaire"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                list: [
                    "✅ Séparer le code en Modèles, Contrôleurs et Routes (architecture MVC)",
                    "✅ Organiser les dossiers (models, controllers, routes, services, middlewares)",
                    "✅ Implémenter une architecture propre, maintenable et évolutive",
                    "✅ Gérer les configurations multi-environnements avec dotenv",
                    "✅ Mettre en place des logs professionnels avec Winston ou Pino"
                ]
            },
            {
                type: "content",
                title: "🧱 Pourquoi une architecture propre est essentielle ?",
                content: `
                    <p>Dans un projet qui grandit, un code désorganisé devient vite un <strong>cauchemar à maintenir</strong>. Une architecture bien pensée offre :</p>
                    <ul class="list-disc pl-6 mt-3 space-y-1">
                        <li><span class="font-semibold">Maintenabilité</span> : chaque partie a un rôle clair.</li>
                        <li><span class="font-semibold">Réutilisabilité</span> : les contrôleurs/services peuvent être réutilisés.</li>
                        <li><span class="font-semibold">Testabilité</span> : plus facile d'écrire des tests unitaires.</li>
                        <li><span class="font-semibold">Collaboration</span> : les développeurs comprennent vite où mettre le code.</li>
                    </ul>
                    <div class="note-glass mt-3">
                        💡 <strong>Idée clé :</strong> séparation des préoccupations (Separation of Concerns). La logique métier ne doit pas se trouver dans les routes.
                    </div>
                    <p class="mt-2">Sans structure, on aboutit au "spaghetti code". Avec une bonne architecture, votre API REST devient un bâtiment solide. 🏢</p>
                `
            },
            {
                type: "content",
                title: "📐 Architecture MVC (Modèle - Vue - Contrôleur) adaptée aux API",
                content: `
                    <p>Pour le backend, on adapte le pattern MVC :</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 my-4">
                        <div class="bg-indigo-50 p-3 rounded-xl text-center"><span class="font-bold text-indigo-800">📦 Modèles (Models)</span><br>Interaction avec la base de données, schémas (Mongoose, Sequelize)</div>
                        <div class="bg-indigo-50 p-3 rounded-xl text-center"><span class="font-bold text-indigo-800">🎮 Contrôleurs (Controllers)</span><br>Logique métier : traite la requête, appelle les services/models, renvoie la réponse</div>
                        <div class="bg-indigo-50 p-3 rounded-xl text-center"><span class="font-bold text-indigo-800">🗺️ Routes</span><br>Définit les endpoints HTTP, associe chaque route à un contrôleur</div>
                    </div>
                    <p>🔁 <strong>Flux typique :</strong> Requête → Route → Middleware (auth/validation) → Contrôleur → Modèle → Réponse</p>
                    <div class="code-block">
                        // Exemple de contrôleur userController.js
                        exports.getUser = async (req, res) => {
                          try {
                            const user = await User.findById(req.params.id);
                            res.json(user);
                          } catch(err) {
                            res.status(500).json({ error: err.message });
                          }
                        };
                    </div>
                    <p>Les vues (views) sont souvent remplacées par des réponses JSON dans une API REST, mais le principe reste le même.</p>
                `
            },
            {
                type: "content",
                title: "📁 Organisation professionnelle des dossiers",
                content: `
                    <p>Voici une arborescence recommandée pour un projet Node.js / Express scalable :</p>
                    <div class="folder-tree">
                        📂 mon-api/<br>
                        ├── 📂 <span class="text-indigo-600 font-bold">src/</span><br>
                        │   ├── 📂 controllers/      (traitement requêtes)<br>
                        │   ├── 📂 models/           (schémas BDD)<br>
                        │   ├── 📂 routes/           (définition endpoints)<br>
                        │   ├── 📂 middlewares/      (auth, multer, validation)<br>
                        │   ├── 📂 services/         (logique métier complexe)<br>
                        │   ├── 📂 utils/            (fonctions helper)<br>
                        │   ├── 📂 config/           (dotenv, db config)<br>
                        │   └── app.js               (configuration Express)<br>
                        ├── 📂 tests/<br>
                        ├── .env<br>
                        ├── .env.example<br>
                        ├── package.json<br>
                        └── server.js                (point d'entrée)
                    </div>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <span class="highlight-badge">Séparation claire</span>
                        <span class="highlight-badge">Facile à naviguer</span>
                        <span class="highlight-badge">Évolutivité</span>
                    </div>
                    <p class="mt-2">⭐ <strong>Conseil :</strong> utilisez des noms cohérents et évitez les fichiers trop longs (max 200-300 lignes).</p>
                `
            },
            {
                type: "content",
                title: "🔐 Gestion des configurations avec dotenv",
                content: `
                    <p>Ne jamais écrire en dur vos mots de passe, clés API, ou ports. Utilisez <strong>dotenv</strong> pour charger les variables d'environnement.</p>
                    <div class="code-block">
                        // Installation : npm install dotenv<br><br>
                        // Dans config/env.js ou directement dans app.js<br>
                        require('dotenv').config();<br>
                        const PORT = process.env.PORT || 3000;<br>
                        const DB_URI = process.env.MONGODB_URI;<br>
                        const JWT_SECRET = process.env.JWT_SECRET;
                    </div>
                    <p>Créez un fichier <span class="font-mono bg-slate-100 px-1 rounded">.env</span> à la racine :</p>
                    <div class="code-block">
                        PORT=5000<br>
                        DB_URI=mongodb://localhost:27017/monapp<br>
                        JWT_SECRET=supersecretkey
                    </div>
                    <div class="note-glass">
                        📌 <span class="font-bold">Bonnes pratiques :</span> ajouter <strong>.env</strong> dans .gitignore, fournir un <strong>.env.example</strong> pour l'équipe, séparer les environnements (dev, staging, prod).
                    </div>
                    <p>Séparez les configurations par environnement grâce à des fichiers comme <code>config/dev.env</code>, <code>config/prod.env</code> et chargez dynamiquement.</p>
                `
            },
            {
                type: "content",
                title: "📝 Logs professionnels : Winston / Pino",
                content: `
                    <p>Les logs aident à surveiller l'application, déboguer et analyser les erreurs en production. <strong>Winston</strong> est très populaire.</p>
                    <div class="code-block">
                        // Installation : npm install winston<br><br>
                        const winston = require('winston');<br>
                        const logger = winston.createLogger({<br>
                        &nbsp;&nbsp;level: 'info',<br>
                        &nbsp;&nbsp;format: winston.format.json(),<br>
                        &nbsp;&nbsp;transports: [<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;new winston.transports.File({ filename: 'error.log', level: 'error' }),<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;new winston.transports.Console({ format: winston.format.simple() })<br>
                        &nbsp;&nbsp;]<br>
                        });<br>
                        // Utilisation : logger.info("Serveur démarré"), logger.error("Erreur BDD")
                    </div>
                    <p>🎯 <strong>Niveaux de logs :</strong> error, warn, info, http, verbose, debug, silly.<br>
                    ✅ <strong>Bon usage :</strong> en développement, afficher les logs dans la console ; en production, les sauvegarder dans des fichiers ou services externes (Logstash, Sentry).</p>
                    <div class="bg-amber-50 p-3 rounded-lg border-l-4 border-amber-400 mt-2">
                        ⚠️ Évitez de logguer des informations sensibles (mots de passe, tokens). Utilisez des IDs ou des messages génériques.
                    </div>
                `
            },
            {
                type: "content",
                title: "🏁 Résumé & Bonnes pratiques finales",
                content: `
                    <p><span class="font-bold text-indigo-700">✅ Ce qu'il faut retenir :</span></p>
                    <ul class="list-disc pl-6 mt-2 space-y-1">
                        <li>Adopter l'architecture MVC pour séparer la logique métier des routes.</li>
                        <li>Organiser les dossiers (controllers, models, routes, services, middlewares, config).</li>
                        <li>Protéger les secrets avec <strong>dotenv</strong> et ignorer .env dans Git.</li>
                        <li>Mettre en place un système de logs (Winston) pour tracer l'activité.</li>
                        <li>Utiliser des middlewares pour la validation, l'authentification et la gestion d'erreurs.</li>
                    </ul>
                    <div class="grid grid-cols-2 gap-2 mt-4 text-center text-sm">
                        <div class="bg-green-50 p-2 rounded-lg">🔁 Code maintenable</div>
                        <div class="bg-green-50 p-2 rounded-lg">🧪 Tests facilités</div>
                        <div class="bg-green-50 p-2 rounded-lg">🚀 Évolutivité</div>
                        <div class="bg-green-50 p-2 rounded-lg">👥 Collaboration</div>
                    </div>
                    <p class="mt-4 italic text-slate-500">"Un code bien structuré, c'est la fondation d'une application qui dure." – Enseignant Cameroun 🇨🇲</p>
                    <div class="mt-4 text-center">
                        <span class="inline-block bg-indigo-100 text-indigo-800 px-4 py-1 rounded-full text-sm">Prochaine étape : Mettre en pratique !</span>
                    </div>
                `
            }
        ];

        let currentIdx = 0;
        const total = slides.length;
        
        // Fonction pour générer le HTML d'une slide selon son type
        function renderSlide(index) {
            const s = slides[index];
            if (!s) return "<div class='text-center p-10'>⚠️ Slide introuvable</div>";
            
            if (s.type === "title") {
                return `
                    <div class="slide-card bg-gradient-to-br from-indigo-50 to-sky-50 rounded-3xl shadow-xl p-6 md:p-10 text-center border border-indigo-100">
                        <div class="text-7xl mb-4">${s.icon}</div>
                        <h1 class="text-3xl md:text-5xl font-black text-indigo-800 leading-tight">${s.title}</h1>
                        <p class="text-lg md:text-xl text-slate-600 mt-4 max-w-xl mx-auto">${s.subtitle}</p>
                        <div class="mt-6 inline-block bg-indigo-200 px-4 py-1 rounded-full text-indigo-800 text-sm font-medium">${s.badge}</div>
                        <div class="mt-8 w-16 h-1 bg-indigo-300 mx-auto rounded-full"></div>
                    </div>
                `;
            } 
            else if (s.type === "objectifs") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8 border-l-8 border-indigo-500">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 mb-5">${s.title}</h2>
                        <ul class="space-y-3">
                            ${s.list.map(item => `<li class="flex items-start gap-3 text-slate-700 text-base md:text-lg"><span class="text-indigo-500 text-xl shrink-0">📌</span> <span>${item}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 bg-indigo-50 p-3 rounded-xl text-indigo-700 text-sm italic">
                            🧠 Après cette leçon, vous saurez organiser vos projets comme un vrai pro !
                        </div>
                    </div>
                `;
            }
            else if (s.type === "content") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 border-b border-indigo-200 pb-3 mb-5">${s.title}</h2>
                        <div class="prose prose-slate max-w-none text-slate-700 leading-relaxed">
                            ${s.content}
                        </div>
                    </div>
                `;
            }
            return `<div class="bg-white rounded-2xl p-6">Contenu non disponible</div>`;
        }
        
        // Mise à jour de l'affichage et des boutons
        function updateDisplay() {
            const slideHtml = renderSlide(currentIdx);
            $("#slides-wrapper").html(slideHtml);
            $("#currentSlideIdx").text(currentIdx + 1);
            $("#totalSlidesCount").text(total);
            
            // Gestion des boutons
            $("#prevSlide").prop("disabled", currentIdx === 0);
            $("#nextSlide").prop("disabled", currentIdx === total - 1);
            
            // Scroll en haut pour une meilleure expérience sur mobile
            $("html, body").animate({ scrollTop: 0 }, 80);
            
            // MathJax si nécessaire (aucune formule complexe mais appel sécurisé)
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise();
            }
        }
        
        // Navigation
        function next() {
            if (currentIdx < total - 1) {
                currentIdx++;
                updateDisplay();
            }
        }
        
        function prev() {
            if (currentIdx > 0) {
                currentIdx--;
                updateDisplay();
            }
        }
        
        $(document).ready(function() {
            updateDisplay();
            $("#nextSlide").on("click", next);
            $("#prevSlide").on("click", prev);
            
            // Raccourcis clavier ← et →
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") {
                    next();
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    prev();
                    e.preventDefault();
                }
            });
            
            // Support tactiles (swipe simple) pour mobile
            let touchStartX = 0;
            let touchEndX = 0;
            const container = document.getElementById("slides-wrapper");
            if (container) {
                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                container.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchEndX < touchStartX - 45) next();
                    if (touchEndX > touchStartX + 45) prev();
                });
            }
        });
    </script>
</body>
</html>
