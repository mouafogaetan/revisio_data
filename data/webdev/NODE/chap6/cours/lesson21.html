<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux sessions et cookies",
    "contenu": "<div style='padding: 10px;'><p>L'authentification est essentielle pour toute application web. Deux approches principales existent :</p><div style='display: flex; flex-direction: column; gap: 8px; margin: 12px 0;'><div style='background: #3498db; color: white; padding: 12px; border-radius: 8px; text-align: center;'><strong>🍪 Sessions (stateful)</strong><br><span style='font-size: 0.9em;'>Stocke l'état sur le serveur</span></div><div style='background: #2ecc71; color: white; padding: 12px; border-radius: 8px; text-align: center;'><strong>🔑 JWT (stateless)</strong><br><span style='font-size: 0.9em;'>Stocke l'état dans le token</span></div></div><p>Dans ce cours, nous allons nous concentrer sur les <strong>sessions</strong> et les <strong>cookies</strong>.</p><ul><li><strong>Cookie</strong> : Petit fichier stocké dans le navigateur</li><li><strong>Session</strong> : Données stockées sur le serveur associées à un utilisateur</li></ul></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons parler des sessions et des cookies dans Node.js avec Express. C'est un sujet essentiel pour gérer l'authentification et l'état des utilisateurs dans vos applications web. Il existe deux approches principales : les sessions, qui stockent l'état sur le serveur, et les JWT, qui stockent l'état dans un token. Dans ce cours, nous allons nous concentrer sur les sessions et les cookies. Un cookie est un petit fichier stocké dans le navigateur, tandis qu'une session est un ensemble de données stockées sur le serveur et associées à un utilisateur. Ces deux mécanismes fonctionnent ensemble pour maintenir la connexion de l'utilisateur.",
    "note": "Sessions et cookies sont les piliers de la gestion d'état en web."
  },
  {
    "titre": "Les Cookies - Comment ça fonctionne ?",
    "contenu": "<div style='padding: 10px;'><p>Un cookie est une petite donnée envoyée par le serveur et stockée par le navigateur.</p><div style='background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 8px 0; color: #2c3e50; text-align: center;'>\n🌐 Serveur → 📦 Cookie → 🖥️ Navigateur → 🔄 Renvoyé à chaque requête\n</div><p><strong>Caractéristiques des cookies :</strong></p><ul><li>Taille maximale : <strong>4 Ko</strong></li><li>Peuvent avoir une date d'expiration</li><li>Envoyés automatiquement avec chaque requête</li></ul><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Créer un cookie\nres.cookie('nom', 'valeur', {\n  maxAge: 3600000,  // 1 heure en millisecondes\n  httpOnly: true,   // Sécurisé (accessible seulement par le serveur)\n  secure: true      // Envoyé seulement en HTTPS\n});\n\n// Lire un cookie\nconst valeur = req.cookies.nom;\n</pre></div>",
    "texteParle": "Commençons par comprendre les cookies. Un cookie est une petite donnée que le serveur envoie au navigateur et que le navigateur stocke. Ensuite, le navigateur renverra automatiquement ce cookie à chaque requête qu'il fait au même serveur. Les cookies ont une taille maximale de 4 kilooctets, ce qui est suffisant pour stocker un identifiant de session, mais pas pour des données volumineuses. Vous pouvez définir une date d'expiration, après laquelle le cookie est automatiquement supprimé par le navigateur. Pour des raisons de sécurité, il est recommandé d'utiliser les options httpOnly et secure. httpOnly rend le cookie inaccessible par JavaScript, ce qui protège contre les attaques XSS, et secure l'envoie seulement en HTTPS.",
    "note": "Les cookies sont automatiquement envoyés avec chaque requête HTTP."
  },
  {
    "titre": "Installation et configuration",
    "contenu": "<div style='padding: 10px;'><p>Pour utiliser les sessions dans Express, installez ces paquets :</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nnpm install express-session\nnpm install cookie-parser\n</pre><p><strong>cookie-parser</strong> : Permet de lire facilement les cookies</p><p><strong>express-session</strong> : Middleware pour gérer les sessions</p><p><strong>Configuration de base :</strong></p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nconst express = require('express');\nconst session = require('express-session');\nconst cookieParser = require('cookie-parser');\n\nconst app = express();\napp.use(cookieParser());\napp.use(session({\n  secret: 'ma_cle_secrete',\n  resave: false,\n  saveUninitialized: false,\n  cookie: { secure: false, maxAge: 3600000 }\n}));\n</pre></div>",
    "texteParle": "Pour utiliser les sessions dans Express, vous devez installer deux paquets. D'abord, cookie-parser, qui permet de lire facilement les cookies envoyés par le navigateur. Ensuite, express-session, qui est le middleware qui gère les sessions. La configuration est assez simple. Vous utilisez app.use pour enregistrer les middlewares. Le secret est une chaîne de caractères qui sert à signer les cookies de session. Les options resave et saveUninitialized contrôlent le comportement de la session. Enfin, vous pouvez configurer le cookie de session avec des options comme secure, maxAge, et autres. Notez qu'en développement, vous pouvez mettre secure à false, mais en production, il doit être à true.",
    "note": "La clé 'secret' est essentielle pour la sécurité des sessions."
  },
  {
    "titre": "Les Sessions - Stockage côté serveur",
    "contenu": "<div style='padding: 10px;'><p>Une session stocke des données côté serveur associées à un utilisateur via un identifiant unique (ID) stocké dans un cookie.</p><div style='background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 8px 0; color: #2c3e50; text-align: center;'>\n🆔 Session ID → 🍪 Cookie → 🔄 Identifie l'utilisateur\n</div><p><strong>Opérations de base :</strong></p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Stocker des données dans la session\nreq.session.userId = 123;\nreq.session.username = 'john_doe';\nreq.session.role = 'admin';\n\n// Lire des données de la session\nconst userId = req.session.userId;\nconst username = req.session.username;\n\n// Détruire la session (déconnexion)\nreq.session.destroy((err) => {\n  if (err) console.error(err);\n  res.redirect('/login');\n});\n</pre></div>",
    "texteParle": "Les sessions sont stockées côté serveur. Comment ça fonctionne ? Quand un utilisateur se connecte, le serveur crée une session et lui attribue un identifiant unique, le Session ID. Cet identifiant est envoyé au navigateur sous forme de cookie. À chaque requête, le navigateur renvoie ce cookie, le serveur retrouve la session correspondante et peut accéder aux données. Avec express-session, vous pouvez stocker des données dans req.session. Par exemple, vous pouvez stocker l'ID de l'utilisateur, son nom, son rôle, ou n'importe quelle autre information que vous voulez conserver pendant sa session. Pour la déconnexion, vous détruisez simplement la session avec req.session.destroy.",
    "note": "Les sessions sont idéales pour stocker des données utilisateur sensibles."
  },
  {
    "titre": "Sessions avec base de données",
    "contenu": "<div style='padding: 10px;'><p>Pour une application robuste, les sessions doivent être persistées dans une base de données.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Avec MySQL ou PostgreSQL\nconst MySQLStore = require('express-mysql-session')(session);\nconst sessionStore = new MySQLStore({\n  host: 'localhost',\n  user: 'root',\n  password: 'password',\n  database: 'sessions_db'\n});\n\napp.use(session({\n  secret: 'ma_cle_secrete',\n  store: sessionStore,\n  resave: false,\n  saveUninitialized: false\n}));\n</pre><p><strong>Avantages :</strong></p><ul><li>Les sessions survivent aux redémarrages du serveur</li><li>Plusieurs serveurs peuvent partager les sessions (load balancing)</li><li>Meilleure sécurité et scalabilité</li></ul><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>📌 Alternative :</strong> Redis est souvent utilisé pour les sessions car plus rapide que les bases de données relationnelles.</p></div></div>",
    "texteParle": "Par défaut, express-session stocke les sessions en mémoire. Cela signifie que si vous redémarrez votre serveur, toutes les sessions sont perdues et les utilisateurs doivent se reconnecter. Pour une application professionnelle, il est préférable de stocker les sessions dans une base de données. Il existe des stores pour différentes bases de données : MySQL, PostgreSQL, MongoDB, Redis. Le store remplace la mémoire par votre base de données. Cela permet aux sessions de survivre aux redémarrages du serveur, et c'est aussi indispensable si vous avez plusieurs serveurs en parallèle, car ils peuvent partager la même base de données de sessions. Redis est souvent recommandé car il est très rapide et parfait pour ce cas d'usage.",
    "note": "Pour la production, utilisez toujours un store de sessions persistantes."
  },
  {
    "titre": "Sessions vs JWT",
    "contenu": "<div style='padding: 10px;'><p>Comparaison des deux approches d'authentification :</p><table style='width: 100%; border-collapse: collapse; font-size: 0.9em;'><tr style='background: #34495e; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Critère</th><th style='padding: 8px; border: 1px solid #ddd;'>Sessions</th><th style='padding: 8px; border: 1px solid #ddd;'>JWT</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>État</td><td style='padding: 8px; border: 1px solid #ddd;'>Stateful (serveur)</td><td style='padding: 8px; border: 1px solid #ddd;'>Stateless (client)</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Stockage</td><td style='padding: 8px; border: 1px solid #ddd;'>Serveur (base de données)</td><td style='padding: 8px; border: 1px solid #ddd;'>Client (localStorage)</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Scalabilité</td><td style='padding: 8px; border: 1px solid #ddd;'>Nécessite des stores partagés</td><td style='padding: 8px; border: 1px solid #ddd;'>Facile (sans état)</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Révocation</td><td style='padding: 8px; border: 1px solid #ddd;'>Facile (supprimer la session)</td><td style='padding: 8px; border: 1px solid #ddd;'>Difficile (attendre l'expiration)</td></tr></table><p><strong>Quand utiliser quoi ?</strong></p><ul><li>✅ <strong>Sessions</strong> : Applications web classiques, API avec frontend</li><li>✅ <strong>JWT</strong> : Microservices, APIs publiques, applications mobiles</li></ul></div>",
    "texteParle": "Les sessions et les JWT sont deux approches différentes pour l'authentification. Les sessions sont stateful, c'est-à-dire que l'état est stocké sur le serveur. Les JWT sont stateless, l'état est stocké dans le token lui-même. Les sessions nécessitent un stockage côté serveur, ce qui peut poser des problèmes de scalabilité, mais la révocation est facile : il suffit de supprimer la session. Les JWT ne nécessitent pas de stockage serveur, ce qui facilite la scalabilité, mais la révocation est plus difficile car il faut attendre l'expiration du token. En général, les sessions sont utilisées pour les applications web classiques avec un frontend, tandis que les JWT sont plus adaptés aux microservices, aux APIs publiques et aux applications mobiles.",
    "note": "Le choix entre sessions et JWT dépend de votre architecture."
  },
  {
    "titre": "Bonnes pratiques de sécurité",
    "contenu": "<div style='padding: 10px;'><p>Pour sécuriser vos sessions et cookies :</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0;'><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ httpOnly</strong><br>Protège contre XSS</div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ secure</strong><br>Cookie envoyé seulement en HTTPS</div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ SameSite</strong><br>Protège contre CSRF</div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ maxAge</strong><br>Limite la durée de vie</div></div><p><strong>Configuration sécurisée :</strong></p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\napp.use(session({\n  secret: process.env.SESSION_SECRET,\n  resave: false,\n  saveUninitialized: false,\n  cookie: {\n    httpOnly: true,\n    secure: process.env.NODE_ENV === 'production',\n    sameSite: 'lax',\n    maxAge: 7 * 24 * 60 * 60 * 1000 // 7 jours\n  }\n}));\n</pre></div>",
    "texteParle": "La sécurité des sessions est cruciale. Voici quelques bonnes pratiques. httpOnly protège vos cookies contre les attaques XSS en les rendant inaccessibles par JavaScript. secure garantit que le cookie est envoyé uniquement en HTTPS, ce qui protège contre les attaques homme-du-milieu. sameSite protège contre les attaques CSRF en limitant l'envoi des cookies aux requêtes provenant du même site. maxAge limite la durée de vie du cookie pour éviter les sessions persistantes trop longues. En production, vous devriez également utiliser une clé secrète forte stockée dans les variables d'environnement. Ne la stockez jamais en dur dans votre code !",
    "note": "Les cookies sécurisés sont essentiels pour protéger les utilisateurs."
  },
  {
    "titre": "Exemple pratique - Authentification",
    "contenu": "<div style='padding: 10px;'><p>Créons un système d'authentification simple avec sessions :</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Route de connexion\napp.post('/login', (req, res) => {\n  const { username, password } = req.body;\n  const user = findUser(username, password);\n  \n  if (!user) {\n    return res.status(401).json({ error: 'Identifiants invalides' });\n  }\n  \n  // Créer la session\n  req.session.userId = user.id;\n  req.session.username = user.username;\n  req.session.role = user.role;\n  \n  res.json({ message: 'Connexion réussie' });\n});\n\n// Route protégée\napp.get('/profile', (req, res) => {\n  if (!req.session.userId) {\n    return res.status(401).json({ error: 'Non authentifié' });\n  }\n  \n  const user = getUserById(req.session.userId);\n  res.json(user);\n});\n\n// Route de déconnexion\napp.post('/logout', (req, res) => {\n  req.session.destroy((err) => {\n    if (err) console.error(err);\n    res.json({ message: 'Déconnexion réussie' });\n  });\n});\n</pre></div>",
    "texteParle": "Pour mettre en pratique, voici un exemple d'authentification avec sessions. D'abord, la route de connexion. L'utilisateur envoie son nom d'utilisateur et son mot de passe. Si les identifiants sont valides, vous stockez les informations de l'utilisateur dans la session. Ensuite, une route protégée, par exemple /profile. Vous vérifiez d'abord si l'utilisateur est authentifié en vérifiant req.session.userId. Si ce n'est pas le cas, vous renvoyez une erreur 401. Enfin, la route de déconnexion qui détruit simplement la session avec req.session.destroy. C'est un système simple mais très efficace pour gérer l'authentification.",
    "note": "Ce pattern d'authentification est l'un des plus utilisés avec Express."
  },
  {
    "titre": "Middleware d'authentification",
    "contenu": "<div style='padding: 10px;'><p>Créer un middleware pour protéger vos routes de manière réutilisable :</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Middleware d'authentification\nfunction isAuthenticated(req, res, next) {\n  if (!req.session.userId) {\n    return res.status(401).json({ error: 'Authentification requise' });\n  }\n  next();\n}\n\n// Appliquer le middleware à une route\napp.get('/dashboard', isAuthenticated, (req, res) => {\n  res.json({ message: 'Bienvenue sur votre tableau de bord' });\n});\n\n// Middleware avec vérification du rôle\nfunction isAdmin(req, res, next) {\n  if (!req.session.userId) {\n    return res.status(401).json({ error: 'Authentification requise' });\n  }\n  if (req.session.role !== 'admin') {\n    return res.status(403).json({ error: 'Accès refusé' });\n  }\n  next();\n}\n\n// Protéger une route admin\napp.get('/admin', isAdmin, (req, res) => {\n  res.json({ message: 'Espace administrateur' });\n});\n</pre></div>",
    "texteParle": "Pour éviter de répéter la vérification d'authentification dans chaque route, on peut créer un middleware. Le middleware isAuthenticated vérifie simplement si l'utilisateur est connecté, et si ce n'est pas le cas, il renvoie une erreur 401. On peut ensuite appliquer ce middleware à n'importe quelle route. On peut aussi créer des middlewares plus spécifiques, comme isAdmin, qui vérifie en plus le rôle de l'utilisateur. C'est une architecture très propre : vous définissez vos middlewares une fois, et vous les réutilisez partout dans votre application. C'est beaucoup plus maintenable que de copier-coller la vérification dans chaque route.",
    "note": "Les middlewares sont la clé d'une architecture Express propre et maintenable."
  },
  {
    "titre": "Récapitulatif et bonnes pratiques",
    "contenu": "<div style='padding: 10px;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;'><div style='background: #3498db; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Session</strong><br><span style='font-size: 0.8em;'>req.session</span></div><div style='background: #2ecc71; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Cookie</strong><br><span style='font-size: 0.8em;'>res.cookie()</span></div><div style='background: #e67e22; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Store</strong><br><span style='font-size: 0.8em;'>Base de données</span></div><div style='background: #9b59b6; color: white; padding: 8px; border-radius: 6px; text-align: center;'><strong>Middleware</strong><br><span style='font-size: 0.8em;'>isAuthenticated</span></div></div><p><strong>Bonnes pratiques :</strong></p><ul><li>✅ Utilisez <code>httpOnly</code> et <code>secure</code> sur les cookies</li><li>✅ Stockez les sessions dans une base de données en production</li><li>✅ Utilisez un <code>secret</code> fort et stocké dans <code>.env</code></li><li>✅ Utilisez des middlewares pour la vérification d'authentification</li><li>✅ N'oubliez pas de <code>destroy</code> la session à la déconnexion</li></ul></div>",
    "texteParle": "Pour récapituler, les sessions et les cookies sont des outils puissants pour gérer l'authentification et l'état des utilisateurs dans vos applications Express. Vous utilisez req.session pour stocker des données côté serveur, et res.cookie pour envoyer des cookies au navigateur. En production, utilisez toujours un store de sessions persistantes comme une base de données. N'oubliez pas les bonnes pratiques de sécurité : httpOnly, secure, et un secret fort dans les variables d'environnement. Enfin, utilisez des middlewares pour la vérification d'authentification afin de garder votre code propre et maintenable. Ces concepts vous serviront dans tous vos projets Node.js.",
    "note": "Ces bonnes pratiques sont essentielles pour sécuriser vos applications."

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;

        const autoIndicator = document.querySelector('.auto-indicator');

        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {

            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {

        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
