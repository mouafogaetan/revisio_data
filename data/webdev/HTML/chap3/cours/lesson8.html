<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 8 : HTML Sémantique | Cours HTML</title>
  <!-- Tailwind CSS + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (formules mathématiques, utilisé si besoin) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions pour les slides */
    .slide {
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
    }
    .slide-hidden {
      display: none;
      opacity: 0;
      transform: translateX(20px);
    }
    .slide-active {
      display: block;
      opacity: 1;
      transform: translateX(0);
    }
    /* style personnalisé pour les petits écrans */
    @media (max-width: 640px) {
      .container-slide {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
      }
      h2 {
        font-size: 1.5rem;
      }
    }
    /* amélioration accessibilité focus */
    button:focus, a:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }
    /* boîtes mises en avant */
    .highlight {
      background-color: #fef9c3;
      border-left: 4px solid #eab308;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 font-sans antialiased">

  <div class="max-w-5xl mx-auto px-4 py-6 md:py-10 container-slide">
    <!-- Conteneur principal slides -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
      
      <!-- Barre de progression / indicateur slide -->
      <div class="bg-indigo-600 px-5 py-3 flex justify-between items-center text-white flex-wrap gap-2">
        <div class="font-bold text-sm md:text-base">
          📘 HTML Sémantique & Structure – Leçon 8
        </div>
        <div class="flex space-x-2 text-xs md:text-sm bg-indigo-700 px-3 py-1 rounded-full">
          <span id="slideCounter">1</span><span>/</span><span id="totalSlides">0</span>
        </div>
      </div>

      <!-- Zone des slides dynamique -->
      <div id="slidesContainer" class="relative bg-white p-5 md:p-8 min-h-[450px]">
        <!-- Les slides seront injectées ici via jQuery -->
      </div>

      <!-- Navigation entre slides -->
      <div class="bg-gray-50 px-5 py-4 border-t border-gray-200 flex justify-between items-center">
        <button id="prevSlide" class="bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-4 rounded-l-md rounded-r-md border border-gray-300 shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1">
          ◀ Précédent
        </button>
        <div class="text-sm text-gray-500 hidden md:block">
          Slide <span id="currentSlideNum">1</span> / <span id="totalSlidesNum">0</span>
        </div>
        <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-md shadow transition flex items-center gap-1">
          Suivant ▶
        </button>
      </div>
    </div>

    <!-- petite note pédagogique -->
    <div class="text-center text-gray-500 text-xs mt-5">
      ✨ Cours conçu pour les élèves du Cameroun – HTML sémantique, accessibilité et SEO
    </div>
  </div>

  <script>
    $(document).ready(function() {

      // Définition des slides selon la leçon 8 : HTML sémantique
      // Slide 1 : Titre de la leçon
      // Slide 2 : Objectifs d'apprentissage
      // Slides 3 à 6 : Contenu détaillé (balises sémantiques, importance, structuration page)
      
      const slidesData = [
        { // Slide 0 : titre
          type: "title",
          content: `
            <div class="text-center py-6 md:py-12">
              <div class="inline-block p-3 bg-indigo-100 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 md:h-16 md:w-16 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h18v18H3V3zm4 4v10h10V7H7zm2 2h6v6H9V9z" />
                </svg>
              </div>
              <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">🧱 Structure sémantique du HTML</h1>
              <p class="text-gray-600 mt-4 text-lg max-w-xl mx-auto">Organiser une page web avec du sens, pour les humains et les moteurs de recherche</p>
              <div class="mt-8 bg-amber-50 inline-block px-6 py-2 rounded-full text-amber-800 text-sm font-medium shadow-sm">
                Chapitre 3 – Leçon 8
              </div>
            </div>
          `
        },
        { // Slide 1 : Objectifs pédagogiques
          type: "objectifs",
          content: `
            <div>
              <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4 mb-6">🎯 Objectifs d'apprentissage</h2>
              <div class="grid gap-4 md:grid-cols-2">
                <div class="bg-blue-50 p-4 rounded-xl shadow-sm flex items-start gap-3">
                  <span class="text-blue-600 text-xl">1️⃣</span>
                  <span>Comprendre l'importance de la sémantique pour le <strong>SEO</strong> et l'<strong>accessibilité</strong>.</span>
                </div>
                <div class="bg-green-50 p-4 rounded-xl shadow-sm flex items-start gap-3">
                  <span class="text-green-600 text-xl">2️⃣</span>
                  <span>Maîtriser les balises sémantiques : <code class="bg-gray-200 px-1 rounded">&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;aside&gt;</code>, <code>&lt;footer&gt;</code>.</span>
                </div>
                <div class="bg-purple-50 p-4 rounded-xl shadow-sm flex items-start gap-3">
                  <span class="text-purple-600 text-xl">3️⃣</span>
                  <span>Savoir structurer une page web complète avec ces balises (maquette sémantique).</span>
                </div>
                <div class="bg-orange-50 p-4 rounded-xl shadow-sm flex items-start gap-3">
                  <span class="text-orange-600 text-xl">4️⃣</span>
                  <span>Différencier contenu générique (<code>&lt;div&gt;</code>) et contenu sémantique.</span>
                </div>
              </div>
              <div class="mt-8 text-center text-gray-500 text-sm italic">
                ⭐ À la fin de cette leçon, vous serez capable de créer une page bien structurée et accessible !
              </div>
            </div>
          `
        },
        { // Slide 2 : Pourquoi la sémantique ?
          type: "content",
          title: "🧠 Pourquoi utiliser des balises sémantiques ?",
          content: `
            <div class="space-y-5">
              <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg">
                <div class="text-2xl">🤖</div>
                <div><strong class="text-indigo-700">SEO (Référencement naturel)</strong> : Google et les moteurs de recherche comprennent mieux le contenu. Une page avec <code>&lt;article&gt;</code>, <code>&lt;nav&gt;</code> est mieux classée.</div>
              </div>
              <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg">
                <div class="text-2xl">👁️</div>
                <div><strong class="text-indigo-700">Accessibilité (handicap visuel / lecteurs d'écran)</strong> : Les logiciels de lecture vocale annoncent la structure (en-tête, navigation, contenu principal) pour faciliter la navigation.</div>
              </div>
              <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg">
                <div class="text-2xl">🧑‍💻</div>
                <div><strong class="text-indigo-700">Maintenabilité du code</strong> : Pour les développeurs, une structure claire rend le code plus facile à modifier et à comprendre en équipe.</div>
              </div>
              <div class="bg-yellow-50 p-4 rounded-xl border-l-4 border-yellow-400 mt-2">
                💡 <span class="font-semibold">À retenir :</span> Une balise <code>&lt;div&gt;</code> ne donne aucune information sur son contenu, alors que <code>&lt;article&gt;</code> ou <code>&lt;section&gt;</code> apporte du sens.
              </div>
            </div>
          `
        },
        { // Slide 3 : Les principales balises sémantiques (partie 1)
          type: "content",
          title: "📦 Les balises sémantiques essentielles (1/2)",
          content: `
            <div class="overflow-x-auto">
              <table class="min-w-full bg-white border border-gray-200 rounded-lg text-sm">
                <thead class="bg-indigo-100">
                  <tr><th class="px-4 py-2 border">Balise</th><th class="px-4 py-2 border">Signification / utilisation</th></tr>
                </thead>
                <tbody>
                  <tr class="border-b"><td class="font-mono p-2 border"><code>&lt;header&gt;</code></td><td>En-tête de page ou d'une section (logo, titre, navigation).</td></tr>
                  <tr class="border-b bg-gray-50"><td class="font-mono p-2 border"><code>&lt;nav&gt;</code></td><td>Zone de navigation principale (liens, menu).</td></tr>
                  <tr class="border-b"><td class="font-mono p-2 border"><code>&lt;main&gt;</code></td><td>Contenu principal unique de la page (ne doit apparaître qu'une fois).</td></tr>
                  <tr class="border-b bg-gray-50"><td class="font-mono p-2 border"><code>&lt;article&gt;</code></td><td>Contenu indépendant (article de blog, actualité, post).</td></tr>
                  <tr class="border-b"><td class="font-mono p-2 border"><code>&lt;section&gt;</code></td><td>Groupe thématique de contenu (chapitre, groupe d'articles).</td></tr>
                </tbody>
              </table>
            </div>
            <div class="mt-5 p-3 bg-indigo-50 rounded-lg">
              🧩 <strong>Exemple simple :</strong> un article dans une section "Actualités" utilise <code>&lt;section&gt;</code> et chaque actualité utilise <code>&lt;article&gt;</code>.
            </div>
          `
        },
        { // Slide 4 : Balises suite + aside, footer
          type: "content",
          title: "🏁 Suite : aside, footer et compléments",
          content: `
            <div class="overflow-x-auto">
              <table class="min-w-full bg-white border border-gray-200 rounded-lg text-sm">
                <thead class="bg-indigo-100"><tr><th class="px-4 py-2 border">Balise</th><th class="px-4 py-2 border">Utilisation</th></tr></thead>
                <tbody>
                  <tr class="border-b"><td class="font-mono p-2"><code>&lt;aside&gt;</code></td><td>Contenu complémentaire (barre latérale, publicités, notes, liens connexes).</td></tr>
                  <tr class="bg-gray-50"><td class="font-mono p-2"><code>&lt;footer&gt;</code></td><td>Pied de page (mentions légales, copyright, liens secondaires).</td></tr>
                  <tr><td class="font-mono p-2"><code>&lt;figure&gt;</code> & <code>&lt;figcaption&gt;</code></td><td>Pour légender une image, un diagramme ou une vidéo.</td></tr>
                </tbody>
              </table>
            </div>
            <div class="highlight mt-5 p-3 rounded-lg text-sm">
              ✨ <strong>Bon à savoir :</strong> on peut imbriquer <code>&lt;article&gt;</code> dans <code>&lt;section&gt;</code> et vice-versa, selon le contexte.
            </div>
            <!-- petite illustration dessinée en SVG pour montrer une page type -->
            <div class="mt-6 bg-gray-100 p-3 rounded-lg text-center">
              <p class="font-semibold mb-2">📐 Structure typique d'une page sémantique :</p>
              <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" class="w-full max-w-md mx-auto">
                <rect x="10" y="10" width="380" height="30" fill="#6366f1" rx="4" />
                <text x="20" y="30" fill="white" font-size="10">&lt;header&gt;</text>
                <rect x="10" y="48" width="380" height="20" fill="#8b5cf6" rx="3" />
                <text x="20" y="62" fill="white" font-size="9">&lt;nav&gt;</text>
                <rect x="10" y="76" width="270" height="80" fill="#c084fc" rx="4" />
                <text x="20" y="100" fill="white" font-size="9">&lt;main&gt;</text>
                <text x="20" y="120" fill="white" font-size="8">+ article / section</text>
                <rect x="290" y="76" width="100" height="80" fill="#a78bfa" rx="4" />
                <text x="300" y="100" fill="white" font-size="9">&lt;aside&gt;</text>
                <rect x="10" y="164" width="380" height="28" fill="#4f46e5" rx="3" />
                <text x="20" y="182" fill="white" font-size="9">&lt;footer&gt;</text>
              </svg>
            </div>
          `
        },
        { // Slide 5 : Exemple concret de structure complète
          type: "content",
          title: "🏗️ Exemple : structure d'une page complète",
          content: `
            <div class="bg-gray-800 text-gray-100 rounded-xl p-4 font-mono text-xs md:text-sm overflow-x-auto">
&lt;body&gt;
  &lt;header&gt;
    &lt;h1&gt;Mon site web&lt;/h1&gt;
    &lt;nav&gt;... liens ...&lt;/nav&gt;
  &lt;/header&gt;
  &lt;main&gt;
    &lt;section&gt;
      &lt;h2&gt;Derniers articles&lt;/h2&gt;
      &lt;article&gt;
        &lt;h3&gt;HTML sémantique&lt;/h3&gt;
        &lt;p&gt;Le HTML5 introduit des balises...&lt;/p&gt;
      &lt;/article&gt;
    &lt;/section&gt;
    &lt;aside&gt;
      &lt;p&gt;À propos de l'auteur&lt;/p&gt;
    &lt;/aside&gt;
  &lt;/main&gt;
  &lt;footer&gt;
    &lt;p&gt;© 2026 - Cours Web Cameroun&lt;/p&gt;
  &lt;/footer&gt;
&lt;/body&gt;
            </div>
            <div class="mt-4 text-green-700 bg-green-50 p-3 rounded-lg">
              ✅ <strong>Pourquoi c'est mieux ?</strong> Un lecteur d'écran peut directement passer au <code>&lt;main&gt;</code> ou naviguer grâce aux balises <code>&lt;nav&gt;</code>. 
              Et Google indexe mieux chaque contenu !
            </div>
          `
        },
        { // Slide 6 : Petit exercice / mise en pratique et conclusion
          type: "content",
          title: "🧪 Mise en pratique & Rappel",
          content: `
            <div class="space-y-4">
              <div class="bg-white border border-indigo-200 rounded-lg p-4">
                <h3 class="font-bold text-indigo-800 text-lg">✏️ Exercice rapide :</h3>
                <p>Analyse cette maquette et associe les bonnes balises sémantiques :</p>
                <ul class="list-disc list-inside mt-2 space-y-1 text-sm">
                  <li>Le menu principal (Accueil, Cours, Contact) → <span class="font-mono bg-gray-100 px-1">_________</span></li>
                  <li>Un article sur "Les bienfaits du HTML5" → <span class="font-mono bg-gray-100 px-1">_________</span></li>
                  <li>Pied de page avec copyright → <span class="font-mono bg-gray-100 px-1">_________</span></li>
                  <li>Une zone latérale présentant l'auteur → <span class="font-mono bg-gray-100 px-1">_________</span></li>
                </ul>
                <details class="mt-3 cursor-pointer">
                  <summary class="text-indigo-600 font-semibold">🔍 Voir les réponses</summary>
                  <p class="mt-2 p-2 bg-gray-100 rounded">1. &lt;nav&gt;  2. &lt;article&gt;  3. &lt;footer&gt;  4. &lt;aside&gt;</p>
                </details>
              </div>
              <div class="bg-teal-50 p-4 rounded-xl">
                🌍 <strong>Pour aller plus loin :</strong> Assurez-vous que chaque page utilise &lt;main&gt; une seule fois, et que les titres (h1 à h6) suivent une hiérarchie logique.
              </div>
              <div class="text-center pt-2 font-medium text-indigo-800">
                🎓 Félicitations ! Vous maîtrisez la structure sémantique d’une page HTML.
              </div>
            </div>
          `
        }
      ];

      let currentIndex = 0;
      const total = slidesData.length;
      $("#totalSlides").text(total);
      $("#totalSlidesNum").text(total);

      // fonction pour afficher un slide selon son index
      function renderSlide(index) {
        const slide = slidesData[index];
        let htmlContent = '';
        if (slide.type === 'title') {
          htmlContent = `<div class="slide slide-active" id="slide-${index}">${slide.content}</div>`;
        } else if (slide.type === 'objectifs') {
          htmlContent = `<div class="slide slide-active" id="slide-${index}">${slide.content}</div>`;
        } else {
          // content
          htmlContent = `<div class="slide slide-active" id="slide-${index}">
                            <h2 class="text-xl md:text-2xl font-bold text-indigo-700 border-b pb-2 mb-4 flex items-center gap-2">
                              📖 ${slide.title || 'Contenu'}
                            </h2>
                            <div>${slide.content}</div>
                          </div>`;
        }
        $("#slidesContainer").html(htmlContent);
        $("#slideCounter").text(index+1);
        $("#currentSlideNum").text(index+1);
        
        // gestion désactivation des boutons
        $("#prevSlide").prop("disabled", index === 0);
        $("#nextSlide").prop("disabled", index === total-1);
        if(index === total-1) {
          $("#nextSlide").text("✔️ Terminé");
        } else {
          $("#nextSlide").text("Suivant ▶");
        }
        // remonter en haut du container pour bonne UX mobile
        $('html, body').animate({ scrollTop: $("#slidesContainer").offset().top - 20 }, 100);
      }
      
      // initialisation
      renderSlide(0);
      
      // événements navigation
      $("#prevSlide").on("click", function() {
        if(currentIndex > 0) {
          currentIndex--;
          renderSlide(currentIndex);
        }
      });
      
      $("#nextSlide").on("click", function() {
        if(currentIndex < total-1) {
          currentIndex++;
          renderSlide(currentIndex);
        } else if (currentIndex === total-1) {
          // petite notif de fin
          alert("🎉 Bravo ! Vous avez terminé la leçon 8. N'oubliez pas de pratiquer avec des balises sémantiques.");
        }
      });
      
      // Gestion clavier (flèches gauche/droite)
      $(document).on("keydown", function(e) {
        if(e.key === "ArrowLeft") {
          $("#prevSlide").click();
        } else if(e.key === "ArrowRight") {
          $("#nextSlide").click();
        }
      });
      
      // rajout d'un petit effet pour les liens mathjax (aucun besoin ici mais gardé)
    });
  </script>
</body>
</html>
