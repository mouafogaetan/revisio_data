<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au HTML",
  "classe": "Développement Web",
  "sequence": "Séquence 3 - Organisation sémantique et formulaires interactifs",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Structuration sémantique d'une page",
      "points": "4 pts",
      "enonce": "<p>Vous devez créer une page web pour un blog de cuisine. La page doit contenir les éléments suivants :</p><ul><li>Un en-tête avec le nom du blog et un menu de navigation (Accueil, Recettes, À propos, Contact).</li><li>Une section principale avec au moins deux articles de blog. Chaque article doit avoir un titre, une date, une introduction et un lien \"Lire la suite\".</li><li>Une barre latérale (aside) avec une petite présentation de l'auteur et les recettes populaires.</li><li>Un pied de page avec les mentions légales et les droits d'auteur.</li></ul><p>Vous devez utiliser les balises sémantiques appropriées : <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;aside&gt;</code>, <code>&lt;footer&gt;</code>.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Structure sémantique (2 pts)</strong></p><p>Écrivez le code HTML complet de la page décrite ci-dessus. Assurez-vous d'utiliser les balises sémantiques appropriées et de bien structurer la page.</p>",
          "reponse": "<pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"fr\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\" /&gt;\n    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /&gt;\n    &lt;title&gt;Mon Blog Cuisine&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;header&gt;\n      &lt;h1&gt;Mon Blog Cuisine&lt;/h1&gt;\n      &lt;nav&gt;\n        &lt;ul&gt;\n          &lt;li&gt;&lt;a href=\"#\"&gt;Accueil&lt;/a&gt;&lt;/li&gt;\n          &lt;li&gt;&lt;a href=\"#\"&gt;Recettes&lt;/a&gt;&lt;/li&gt;\n          &lt;li&gt;&lt;a href=\"#\"&gt;À propos&lt;/a&gt;&lt;/li&gt;\n          &lt;li&gt;&lt;a href=\"#\"&gt;Contact&lt;/a&gt;&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/nav&gt;\n    &lt;/header&gt;\n\n    &lt;main&gt;\n      &lt;section&gt;\n        &lt;h2&gt;Derniers articles&lt;/h2&gt;\n        &lt;article&gt;\n          &lt;h3&gt;Tarte aux pommes&lt;/h3&gt;\n          &lt;p&gt;&lt;time datetime=\"2025-02-15\"&gt;15 février 2025&lt;/time&gt;&lt;/p&gt;\n          &lt;p&gt;Une recette délicieuse et facile à réaliser...&lt;/p&gt;\n          &lt;a href=\"#\"&gt;Lire la suite&lt;/a&gt;\n        &lt;/article&gt;\n        &lt;article&gt;\n          &lt;h3&gt;Sauce bolognaise&lt;/h3&gt;\n          &lt;p&gt;&lt;time datetime=\"2025-02-10\"&gt;10 février 2025&lt;/time&gt;&lt;/p&gt;\n          &lt;p&gt;La vraie recette de la sauce bolognaise...&lt;/p&gt;\n          &lt;a href=\"#\"&gt;Lire la suite&lt;/a&gt;\n        &lt;/article&gt;\n      &lt;/section&gt;\n\n      &lt;aside&gt;\n        &lt;h3&gt;À propos de l'auteur&lt;/h3&gt;\n        &lt;p&gt;Passionné de cuisine depuis 10 ans...&lt;/p&gt;\n        &lt;h4&gt;Recettes populaires&lt;/h4&gt;\n        &lt;ul&gt;\n          &lt;li&gt;Tiramisu&lt;/li&gt;\n          &lt;li&gt;Quiche lorraine&lt;/li&gt;\n        &lt;/ul&gt;\n      &lt;/aside&gt;\n    &lt;/main&gt;\n\n    &lt;footer&gt;\n      &lt;p&gt;&amp;copy; 2025 Mon Blog Cuisine. Tous droits réservés.&lt;/p&gt;\n      &lt;p&gt;Mentions légales&lt;/p&gt;\n    &lt;/footer&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre>"
        },
        {
          "question": "<p><strong>2. Justification sémantique (2 pts)</strong></p><p>Pour chaque élément de la structure, expliquez pourquoi vous avez choisi cette balise plutôt qu'une autre (ex : pourquoi <code>&lt;article&gt;</code> plutôt que <code>&lt;div&gt;</code>).</p>",
          "reponse": "<ul><li><strong><code>&lt;header&gt;</code></strong> : utilisé pour l'en-tête de la page qui contient le logo et la navigation. C'est la balise sémantique appropriée pour ce type de contenu.</li><li><strong><code>&lt;nav&gt;</code></strong> : utilisé pour le menu de navigation, ce qui indique clairement aux moteurs de recherche et aux lecteurs d'écran qu'il s'agit de liens de navigation.</li><li><strong><code>&lt;main&gt;</code></strong> : contient le contenu principal de la page. Il ne doit y en avoir qu'un seul, ce qui est le cas ici.</li><li><strong><code>&lt;section&gt;</code></strong> : regroupement thématique des articles. Il pourrait être remplacé par une <code>&lt;div&gt;</code>, mais <code>&lt;section&gt;</code> apporte un sens sémantique supplémentaire.</li><li><strong><code>&lt;article&gt;</code></strong> : utilisé pour chaque article de blog, car chaque article est un contenu indépendant et réutilisable.</li><li><strong><code>&lt;aside&gt;</code></strong> : pour la barre latérale, qui contient un contenu secondaire lié au sujet de la page.</li><li><strong><code>&lt;footer&gt;</code></strong> : pour le pied de page, qui contient les informations légales et les droits d'auteur.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Création d'un tableau",
      "points": "3 pts",
      "enonce": "<p>Vous devez créer un tableau HTML pour afficher les horaires d'ouverture d'une boutique. Le tableau doit présenter les informations suivantes :</p><ul><li>Les jours de la semaine (Lundi au Dimanche).</li><li>Les heures d'ouverture du matin et de l'après-midi.</li><li>Une ligne pour le midi (fermé entre 12h et 14h).</li><li>Le week-end, la boutique est fermée.</li></ul><p>Le tableau doit avoir un en-tête pour les jours, une colonne \"Matin\" et une colonne \"Après-midi\".</p>",
      "questions": [
        {
          "question": "<p><strong>1. Code du tableau (1.5 pts)</strong></p><p>Écrivez le code HTML pour créer ce tableau. Utilisez les balises appropriées (<code>&lt;table&gt;</code>, <code>&lt;thead&gt;</code>, <code>&lt;tbody&gt;</code>, <code>&lt;tr&gt;</code>, <code>&lt;th&gt;</code>, <code>&lt;td&gt;</code>).</p>",
          "reponse": "<pre><code>&lt;table&gt;\n  &lt;thead&gt;\n    &lt;tr&gt;\n      &lt;th&gt;Jour&lt;/th&gt;\n      &lt;th&gt;Matin&lt;/th&gt;\n      &lt;th&gt;Après-midi&lt;/th&gt;\n    &lt;/tr&gt;\n  &lt;/thead&gt;\n  &lt;tbody&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Lundi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Mardi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Mercredi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Jeudi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Vendredi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Samedi&lt;/td&gt;\n      &lt;td colspan=\"2\"&gt;Fermé&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Dimanche&lt;/td&gt;\n      &lt;td colspan=\"2\"&gt;Fermé&lt;/td&gt;\n    &lt;/tr&gt;\n  &lt;/tbody&gt;\n&lt;/table&gt;</code></pre>"
        },
        {
          "question": "<p><strong>2. Explication des éléments (1.5 pts)</strong></p><p>Expliquez le rôle de chaque balise utilisée dans votre tableau. Que signifie l'attribut <code>colspan</code> et pourquoi l'avez-vous utilisé ?</p>",
          "reponse": "<ul><li><strong><code>&lt;table&gt;</code></strong> : définit le début et la fin du tableau.</li><li><strong><code>&lt;thead&gt;</code></strong> : regroupe les lignes d'en-tête du tableau. Facilite la mise en forme et le style.</li><li><strong><code>&lt;tbody&gt;</code></strong> : regroupe les lignes de données du tableau. Permet de séparer la structure du contenu.</li><li><strong><code>&lt;tr&gt;</code></strong> : définit une ligne de tableau.</li><li><strong><code>&lt;th&gt;</code></strong> : définit une cellule d'en-tête (gras par défaut).</li><li><strong><code>&lt;td&gt;</code></strong> : définit une cellule de données.</li></ul><p>L'attribut <strong><code>colspan</code></strong> permet de fusionner plusieurs colonnes en une seule cellule. Je l'ai utilisé pour les jours de week-end afin que la cellule \"Fermé\" s'étende sur les deux colonnes (Matin et Après-midi), ce qui est plus propre visuellement.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Formulaire de contact interactif",
      "points": "3 pts",
      "enonce": "<p>Vous devez créer un formulaire de contact pour un site web. Le formulaire doit permettre à l'utilisateur d'envoyer un message à l'administrateur. Il doit contenir les champs suivants :</p><ul><li>Nom (champ texte, obligatoire).</li><li>Email (champ email, obligatoire).</li><li>Sujet (menu déroulant avec les options : \"Demande d'information\", \"Réclamation\", \"Autre\").</li><li>Message (zone de texte, obligatoire).</li><li>Un bouton d'envoi.</li></ul>",
      "questions": [
        {
          "question": "<p><strong>1. Code du formulaire (2 pts)</strong></p><p>Écrivez le code HTML du formulaire décrit ci-dessus. Utilisez les balises appropriées (<code>&lt;form&gt;</code>, <code>&lt;input&gt;</code>, <code>&lt;select&gt;</code>, <code>&lt;textarea&gt;</code>, <code>&lt;button&gt;</code>, <code>&lt;label&gt;</code>).</p>",
          "reponse": "<pre><code>&lt;form action=\"/envoyer\" method=\"POST\"&gt;\n  &lt;div&gt;\n    &lt;label for=\"nom\"&gt;Nom :&lt;/label&gt;\n    &lt;input type=\"text\" id=\"nom\" name=\"nom\" required placeholder=\"Votre nom\" /&gt;\n  &lt;/div&gt;\n\n  &lt;div&gt;\n    &lt;label for=\"email\"&gt;Email :&lt;/label&gt;\n    &lt;input type=\"email\" id=\"email\" name=\"email\" required placeholder=\"votre@email.com\" /&gt;\n  &lt;/div&gt;\n\n  &lt;div&gt;\n    &lt;label for=\"sujet\"&gt;Sujet :&lt;/label&gt;\n    &lt;select id=\"sujet\" name=\"sujet\"&gt;\n      &lt;option value=\"info\"&gt;Demande d'information&lt;/option&gt;\n      &lt;option value=\"reclamation\"&gt;Réclamation&lt;/option&gt;\n      &lt;option value=\"autre\"&gt;Autre&lt;/option&gt;\n    &lt;/select&gt;\n  &lt;/div&gt;\n\n  &lt;div&gt;\n    &lt;label for=\"message\"&gt;Message :&lt;/label&gt;\n    &lt;textarea id=\"message\" name=\"message\" rows=\"5\" required placeholder=\"Votre message...\"&gt;&lt;/textarea&gt;\n  &lt;/div&gt;\n\n  &lt;button type=\"submit\"&gt;Envoyer&lt;/button&gt;\n&lt;/form&gt;</code></pre>"
        },
        {
          "question": "<p><strong>2. Accessibilité et validation (1 pt)</strong></p><p>Expliquez comment vous avez rendu ce formulaire accessible. Quels attributs avez-vous utilisés pour la validation des champs ?</p>",
          "reponse": "<p>Pour rendre le formulaire accessible :</p><ul><li>J'ai utilisé la balise <code>&lt;label&gt;</code> associée à chaque champ via l'attribut <code>for</code> (qui correspond à l'<code>id</code> du champ). Cela permet aux lecteurs d'écran de lire le libellé du champ.</li><li>J'ai utilisé des <code>&lt;div&gt;</code> pour regrouper chaque champ et son label, ce qui améliore la structure.</li></ul><p>Pour la validation des champs :</p><ul><li>J'ai utilisé l'attribut <strong><code>required</code></strong> sur les champs Nom, Email et Message pour les rendre obligatoires.</li><li>J'ai utilisé <strong><code>type=\"email\"</code></strong> pour le champ email, ce qui permet une validation automatique du format par le navigateur.</li><li>Les attributs <strong><code>placeholder</code></strong> fournissent des exemples de saisie pour guider l'utilisateur.</li></ul>"
        }

    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
