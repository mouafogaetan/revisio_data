<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au HTML",
  "classe": "Développement Web",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Structure sémantique d'une page web (Chap 3)",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez structurer une page web de présentation pour une école de formation en informatique.</p><p><strong>Consignes :</strong></p><ol><li>Dessinez ou décrivez la structure sémantique de la page en utilisant les balises : <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;aside&gt;</code>, <code>&lt;footer&gt;</code>.</li><li>Pour chaque balise, indiquez le contenu qu'elle devrait contenir dans le contexte de ce site.</li></ol></div>",
      "questions": [
        {
          "question": "1) Décrivez la structure sémantique de la page en précisant chaque balise utilisée.",
          "reponse": "<strong>Structure proposée :</strong><br><ul><li><strong>&lt;header&gt;</strong> : Logo de l'école, nom, slogan, et éventuellement une bannière.</li><li><strong>&lt;nav&gt;</strong> : Menu de navigation (Accueil, Formations, À propos, Contact).</li><li><strong>&lt;main&gt;</strong> : Contenu principal de la page (contenant plusieurs sections).</li><li><strong>&lt;section&gt;</strong> (plusieurs) : Chaque section regroupe un thème : Présentation de l'école, Liste des formations, Témoignages, etc.</li><li><strong>&lt;article&gt;</strong> : Un article détaillé sur une formation spécifique ou un témoignage.</li><li><strong>&lt;aside&gt;</strong> : Informations complémentaires (ex: actualités, événements à venir).</li><li><strong>&lt;footer&gt;</strong> : Mentions légales, liens vers les réseaux sociaux, plan du site.</li></ul>"
        },
        {
          "question": "2) Expliquez pourquoi il est important d'utiliser des balises sémantiques.",
          "reponse": "Les balises sémantiques sont importantes pour plusieurs raisons :<br><ul><li><strong>SEO (Référencement)</strong> : Les moteurs de recherche comprennent mieux la structure et le contenu de la page, ce qui améliore le classement.</li><li><strong>Accessibilité</strong> : Les lecteurs d'écran utilisent ces balises pour naviguer, ce qui aide les personnes malvoyantes.</li><li><strong>Maintenabilité</strong> : Le code est plus lisible et plus facile à maintenir pour les développeurs.</li><li><strong>Compatibilité</strong> : Respecte les standards du W3C pour un rendu cohérent sur tous les navigateurs.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Création d'un tableau de prix (Chap 3)",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez créer un tableau HTML présentant les offres de formations de l'école.</p><p><strong>Données à intégrer :</strong></p><ul><li>Colonnes : Formation, Durée, Prix, Niveau requis.</li><li>Lignes : Développement Web (6 mois, 500 000 FCFA, Débutant), Data Science (8 mois, 750 000 FCFA, Intermédiaire), Cybersécurité (4 mois, 400 000 FCFA, Intermédiaire), Marketing Digital (3 mois, 250 000 FCFA, Débutant).</li><li>Ajouter une ligne d'en-tête et une ligne de pied (total des prix).</li></ul><p><strong>Consignes :</strong></p><ol><li>Écrire le code HTML complet du tableau.</li><li>Utiliser <code>&lt;thead&gt;</code>, <code>&lt;tbody&gt;</code> et <code>&lt;tfoot&gt;</code>.</li><li>Fusionner les cellules si nécessaire.</li></ol></div>",
      "questions": [
        {
          "question": "1) Écrivez le code HTML du tableau de prix.",
          "reponse": "<pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;table style='width:100%; border-collapse:collapse;'&gt;\n  &lt;thead style='background:#334155; color:#e2e8f0;'&gt;\n    &lt;tr&gt;\n      &lt;th style='padding:8px; border:1px solid #475569;'&gt;Formation&lt;/th&gt;\n      &lt;th style='padding:8px; border:1px solid #475569;'&gt;Durée&lt;/th&gt;\n      &lt;th style='padding:8px; border:1px solid #475569;'&gt;Prix (FCFA)&lt;/th&gt;\n      &lt;th style='padding:8px; border:1px solid #475569;'&gt;Niveau requis&lt;/th&gt;\n    &lt;/tr&gt;\n  &lt;/thead&gt;\n  &lt;tbody&gt;\n    &lt;tr&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Développement Web&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;6 mois&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;500 000&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Débutant&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Data Science&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;8 mois&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;750 000&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Intermédiaire&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Cybersécurité&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;4 mois&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;400 000&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Intermédiaire&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Marketing Digital&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;3 mois&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;250 000&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;Débutant&lt;/td&gt;\n    &lt;/tr&gt;\n  &lt;/tbody&gt;\n  &lt;tfoot style='background:#334155; color:#e2e8f0;'&gt;\n    &lt;tr&gt;\n      &lt;td colspan='2' style='padding:8px; border:1px solid #475569; text-align:right;'&gt;&lt;strong&gt;Total des prix&lt;/strong&gt;&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;&lt;strong&gt;1 900 000&lt;/strong&gt;&lt;/td&gt;\n      &lt;td style='padding:8px; border:1px solid #475569;'&gt;&lt;/td&gt;\n    &lt;/tr&gt;\n  &lt;/tfoot&gt;\n&lt;/table&gt;</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Formulaire d'inscription (Chap 3)",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez créer un formulaire d'inscription pour une formation à l'école.</p><p><strong>Champs requis :</strong></p><ul><li>Nom complet (texte, required).</li><li>Email (email, required).</li><li>Mot de passe (password, required, min 8 caractères).</li><li>Téléphone (tel).</li><li>Formation choisie (liste déroulante : Développement Web, Data Science, Cybersécurité, Marketing Digital).</li><li>Date de début souhaitée (date).</li><li>Message (textarea).</li><li>Bouton Soumettre.</li></ul><p><strong>Consignes :</strong></p><ol><li>Écrire le code HTML complet du formulaire.</li><li>Utiliser les attributs appropriés (<code>required</code>, <code>placeholder</code>, <code>value</code>).</li><li>Associer chaque champ à un <code>&lt;label&gt;</code> pour l'accessibilité.</li></ol></div>",
      "questions": [
        {
          "question": "1) Écrivez le code HTML du formulaire d'inscription.",
          "reponse": "<pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;form action='/inscription' method='POST'&gt;\n  &lt;div&gt;\n    &lt;label for='nom'&gt;Nom complet :&lt;/label&gt;\n    &lt;input type='text' id='nom' name='nom' placeholder='Jean Dupont' required&gt;\n  &lt;/div&gt;\n  \n  &lt;div&gt;\n    &lt;label for='email'&gt;Email :&lt;/label&gt;\n    &lt;input type='email' id='email' name='email' placeholder='jean@exemple.com' required&gt;\n  &lt;/div&gt;\n  \n  &lt;div&gt;\n    &lt;label for='password'&gt;Mot de passe :&lt;/label&gt;\n    &lt;input type='password' id='password' name='password' minlength='8' required&gt;\n  &lt;/div&gt;\n  \n  &lt;div&gt;\n    &lt;label for='telephone'&gt;Téléphone :&lt;/label&gt;\n    &lt;input type='tel' id='telephone' name='telephone' placeholder='6 55 55 55 55'&gt;\n  &lt;/div&gt;\n  \n  &lt;div&gt;\n    &lt;label for='formation'&gt;Formation choisie :&lt;/label&gt;\n    &lt;select id='formation' name='formation'&gt;\n      &lt;option value=''&gt;Sélectionnez une formation&lt;/option&gt;\n      &lt;option value='web'&gt;Développement Web&lt;/option&gt;\n      &lt;option value='data'&gt;Data Science&lt;/option&gt;\n      &lt;option value='cyber'&gt;Cybersécurité&lt;/option&gt;\n      &lt;option value='marketing'&gt;Marketing Digital&lt;/option&gt;\n    &lt;/select&gt;\n  &lt;/div&gt;\n  \n  &lt;div&gt;\n    &lt;label for='date'&gt;Date de début souhaitée :&lt;/label&gt;\n    &lt;input type='date' id='date' name='date'&gt;\n  &lt;/div&gt;\n  \n  &lt;div&gt;\n    &lt;label for='message'&gt;Message :&lt;/label&gt;\n    &lt;textarea id='message' name='message' rows='4' placeholder='Votre message...'&gt;&lt;/textarea&gt;\n  &lt;/div&gt;\n  \n  &lt;button type='submit'&gt;Soumettre&lt;/button&gt;\n&lt;/form&gt;</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Accessibilité et validation (Chap 4)",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez analyser le code HTML suivant et proposer des améliorations pour le rendre plus accessible et valide.</p><pre style='background:#f1f5f9; padding:10px; border-radius:6px; color:#0f172a;'><code>&lt;div class=\"formulaire\"&gt;\n  Nom : &lt;input type=\"text\" id=\"nom\"&gt;\n  &lt;br&gt;\n  Email : &lt;input type=\"email\" id=\"email\"&gt;\n  &lt;br&gt;\n  &lt;input type=\"submit\" value=\"Envoyer\"&gt;\n&lt;/div&gt;</code></pre><p><strong>Consignes :</strong></p><ol><li>Identifiez au moins 3 problèmes d'accessibilité ou de validation HTML dans ce code.</li><li>Proposez une version corrigée du code.</li></ol></div>",
      "questions": [

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
