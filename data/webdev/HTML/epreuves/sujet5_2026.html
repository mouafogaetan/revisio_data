<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au HTML",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Structure de base d'une page web",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #333;'><p>Vous êtes en charge de créer la page d'accueil d'un petit site web pour un projet personnel. Le site présente un bref CV en ligne contenant un titre, des informations sur votre parcours, une image de profil, et un lien vers votre compte professionnel.</p><p>Vous devez écrire le code HTML structuré et valide d'une page web qui répond à la fois aux besoins fonctionnels et aux bonnes pratiques du web (sémantique, accessibilité, encodage).</p></div>",
      "questions": [
        {
          "question": "<div><span style='font-weight: bold;'>1.1) (2 pts)</span> <span style='font-style: italic;'>Écrire la structure minimale d'un document HTML5.</span><br><br>Écrivez le code HTML complet (balises <code>&lt;!DOCTYPE&gt;</code>, <code>&lt;html&gt;</code>, <code>&lt;head&gt;</code>, <code>&lt;body&gt;</code>) en respectant les standards du web. Vous devez y inclure :<br>- La déclaration du type de document (DOCTYPE).<br>- La balise racine <code>&lt;html&gt;</code> avec l'attribut de langue approprié.<br>- La section <code>&lt;head&gt;</code> contenant le jeu de caractères (UTF-8) et un titre de page pertinent.<br>- La section <code>&lt;body&gt;</code> avec un titre principal et un paragraphe d'introduction.</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; overflow-x: auto;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"fr\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\"&gt;\n    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;\n    &lt;title&gt;Mon CV en ligne&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;h1&gt;Bienvenue sur mon CV en ligne&lt;/h1&gt;\n    &lt;p&gt;Je suis développeur web passionné par la création de sites interactifs.&lt;/p&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre><p><strong>Explication :</strong> La structure inclut la déclaration DOCTYPE pour HTML5, la balise <code>&lt;html&gt;</code> avec l'attribut <code>lang</code> pour indiquer la langue, le <code>&lt;head&gt;</code> avec l'encodage UTF-8 (indispensable pour afficher correctement les caractères spéciaux [citation:4]) et un titre, et le <code>&lt;body&gt;</code> qui contient le contenu visible.</p></div>"
        },
        {
          "question": "<div><span style='font-weight: bold;'>1.2) (2 pts)</span> <span style='font-style: italic;'>Intégration d'éléments de contenu.</span><br><br>Complétez le code de la page en ajoutant les éléments suivants :<br>- Un titre de niveau 2 pour la section \"À propos de moi\".<br>- Un paragraphe décrivant votre parcours (utilisez la balise <code>&lt;p&gt;</code>).<br>- Une image de profil (utilisez la balise <code>&lt;img&gt;</code>) en y ajoutant les attributs obligatoires pour l'affichage et l'accessibilité.<br>- Un lien hypertexte vers un réseau social professionnel (utilisez la balise <code>&lt;a&gt;</code> avec l'attribut <code>target</code> pour ouvrir le lien dans un nouvel onglet).</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; overflow-x: auto;'><code>&lt;body&gt;\n  &lt;h1&gt;Bienvenue sur mon CV en ligne&lt;/h1&gt;\n  &lt;p&gt;Je suis développeur web passionné par la création de sites interactifs.&lt;/p&gt;\n  \n  &lt;h2&gt;À propos de moi&lt;/h2&gt;\n  &lt;p&gt;Après plusieurs années dans le secteur du numérique, je me suis spécialisé dans le développement web. Je maîtrise les langages HTML, CSS et JavaScript.&lt;/p&gt;\n  \n  &lt;img src=\"profil.jpg\" alt=\"Photo de profil de l'auteur\" width=\"150\" height=\"150\"&gt;\n  \n  &lt;p&gt;Retrouvez-moi sur &lt;a href=\"https://linkedin.com\" target=\"_blank\"&gt;LinkedIn&lt;/a&gt;.&lt;/p&gt;\n&lt;/body&gt;</code></pre><p><strong>Explication :</strong> L'attribut <code>alt</code> de l'image est obligatoire pour l'accessibilité et le SEO [citation:4][citation:5]. L'attribut <code>target=\"_blank\"</code> sur le lien permet d'ouvrir le lien dans un nouvel onglet, conformément aux bonnes pratiques.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Organisation et sémantique d'une page web",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #333;'><p>Une entreprise souhaite structurer une page web pour présenter ses services. La page doit contenir une en-tête avec le nom de la société, une navigation, un contenu principal divisé en articles, et un pied de page avec les mentions légales. L'objectif est d'utiliser les bonnes balises sémantiques HTML5 pour améliorer le référencement (SEO) et l'accessibilité.</p><p>Le code HTML fourni doit être valide et correctement imbriqué.</p></div>",
      "questions": [
        {
          "question": "<div><span style='font-weight: bold;'>2.1) (2,5 pts)</span> <span style='font-style: italic;'>Structure sémantique d'une page.</span><br><br>Écrivez le code HTML correspondant à une page structurée avec les balises sémantiques suivantes : <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;aside&gt;</code> et <code>&lt;footer&gt;</code>. Vous devez justifier l'utilisation de chaque balise dans un commentaire HTML.</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; overflow-x: auto;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"fr\"&gt;\n&lt;head&gt;\n  &lt;meta charset=\"UTF-8\"&gt;\n  &lt;title&gt;Nos Services&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n\n  &lt;!-- En-tête : contient le logo et le titre principal --&gt;\n  &lt;header&gt;\n    &lt;h1&gt;Nom de la Société&lt;/h1&gt;\n    &lt;p&gt;Votre partenaire numérique&lt;/p&gt;\n  &lt;/header&gt;\n\n  &lt;!-- Navigation : liens vers les principales sections du site --&gt;\n  &lt;nav&gt;\n    &lt;ul&gt;\n      &lt;li&gt;&lt;a href=\"#\"&gt;Accueil&lt;/a&gt;&lt;/li&gt;\n      &lt;li&gt;&lt;a href=\"#\"&gt;Services&lt;/a&gt;&lt;/li&gt;\n      &lt;li&gt;&lt;a href=\"#\"&gt;Contact&lt;/a&gt;&lt;/li&gt;\n    &lt;/ul&gt;\n  &lt;/nav&gt;\n\n  &lt;!-- Contenu principal de la page --&gt;\n  &lt;main&gt;\n    &lt;!-- Section d'introduction --&gt;\n    &lt;section&gt;\n      &lt;h2&gt;Notre expertise&lt;/h2&gt;\n      &lt;p&gt;Nous proposons des solutions sur mesure...&lt;/p&gt;\n    &lt;/section&gt;\n\n    &lt;!-- Article sur un service spécifique --&gt;\n    &lt;article&gt;\n      &lt;h3&gt;Développement Web&lt;/h3&gt;\n      &lt;p&gt;Création de sites web performants...&lt;/p&gt;\n    &lt;/article&gt;\n  &lt;/main&gt;\n\n  &lt;!-- Pied de page : mentions légales et informations de contact --&gt;\n  &lt;footer&gt;\n    &lt;p&gt;&amp;copy; 2026 - Nom de la Société - Tous droits réservés&lt;/p&gt;\n  &lt;/footer&gt;\n\n&lt;/body&gt;\n&lt;/html&gt;</code></pre><p><strong>Explication :</strong> L'utilisation de balises sémantiques comme <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;aside&gt;</code> et <code>&lt;footer&gt;</code> permet de donner du sens au contenu, améliore le référencement (SEO) et l'accessibilité pour les lecteurs d'écran [citation:5]. Les balises doivent être correctement imbriquées, comme le préconise la syntaxe HTML [citation:4].</p></div>"
        },
        {
          "question": "<div><span style='font-weight: bold;'>2.2) (2,5 pts)</span> <span style='font-style: italic;'>Ajout d'un tableau pour les horaires d'ouverture.</span><br><br>Dans le contenu principal (balise <code>&lt;main&gt;</code>), ajoutez un tableau HTML présentant les horaires d'ouverture de l'entreprise. Le tableau doit comporter une ligne d'en-tête (<code>&lt;thead&gt;</code>) et un corps (<code>&lt;tbody&gt;</code>). Structurez le tableau de manière à ce qu'il soit lisible et sémantiquement correct.</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; overflow-x: auto;'><code>&lt;table&gt;\n  &lt;thead&gt;\n    &lt;tr&gt;\n      &lt;th&gt;Jour&lt;/th&gt;\n      &lt;th&gt;Matin&lt;/th&gt;\n      &lt;th&gt;Après-midi&lt;/th&gt;\n    &lt;/tr&gt;\n  &lt;/thead&gt;\n  &lt;tbody&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Lundi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n    &lt;tr&gt;\n      &lt;td&gt;Mardi&lt;/td&gt;\n      &lt;td&gt;08h00 - 12h00&lt;/td&gt;\n      &lt;td&gt;14h00 - 18h00&lt;/td&gt;\n    &lt;/tr&gt;\n  &lt;/tbody&gt;\n&lt;/table&gt;</code></pre><p><strong>Explication :</strong> L'utilisation de <code>&lt;thead&gt;</code> et <code>&lt;tbody&gt;</code> est une bonne pratique pour structurer les tableaux de données et faciliter leur lecture par les agents utilisateurs [citation:4].</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Création d'un formulaire interactif",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #333;'><p>Dans le cadre d'une refonte de son site web, une entreprise souhaite intégrer un formulaire de contact sur sa page. Vous devez concevoir ce formulaire en HTML en respectant les bonnes pratiques d'accessibilité et de structuration, en suivant les normes actuelles du web.</p><p>Le formulaire doit permettre aux visiteurs de laisser un message, tout en étant fonctionnel et facile à utiliser.</p></div>",
      "questions": [
        {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
