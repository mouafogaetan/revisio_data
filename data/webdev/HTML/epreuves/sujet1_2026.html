<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation au HTML",
 "classe": "Développement Web",
 "sequence": "Séquence 1",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Questions de Cours (4 pts)",
     "points": "4 pts",
     "enonce": "Répondez aux questions suivantes en vous basant sur les notions vues en cours.",
     "questions": [
       {
         "question": "1) Quelle est la différence entre une balise en paire et une balise orpheline ? Donnez un exemple pour chaque type. (1 pt)",
         "reponse": "Une <strong>balise en paire</strong> (ou balise ouvrante/fermante) est constituée de deux balises : une balise ouvrante qui indique le début de l'élément et une balise fermante qui indique sa fin. La balise fermante contient une barre oblique \"/\".<br/>Exemple : <code>&lt;p&gt;Texte du paragraphe&lt;/p&gt;</code> [citation:4]<br/><br/>Une <strong>balise orpheline</strong> (ou balise auto-fermante) est une balise unique qui n'a pas besoin de balise fermante. Elle sert à insérer un élément qui n'a pas de contenu textuel.<br/>Exemple : <code>&lt;br&gt;</code> pour un saut de ligne ou <code>&lt;img src=\"image.jpg\" alt=\"Description\"&gt;</code> pour une image [citation:4]."
       },
       {
         "question": "2) Expliquez le rôle des 3 technologies suivantes : HTML, CSS et JavaScript. (1,5 pts)",
         "reponse": "Ces trois technologies sont les piliers du développement web [citation:1] :<br/><br/><strong>HTML (HyperText Markup Language)</strong> : Il sert à structurer le contenu d'une page web. C'est le squelette de la page. Il définit les titres, les paragraphes, les images, les liens, etc. [citation:4]<br/><br/><strong>CSS (Cascading Style Sheets)</strong> : Il s'occupe de la présentation et du style. C'est la peau et les vêtements du site. Il permet de définir les couleurs, les polices, les marges, la disposition des éléments, etc. [citation:1]<br/><br/><strong>JavaScript</strong> : Il gère le comportement interactif de la page. C'est le système nerveux. Il permet d'ajouter de l'interactivité : animations, validation de formulaires, chargement de contenu sans recharger la page, etc. [citation:1]"
       },
       {
         "question": "3) Écrivez la structure de base d'un document HTML en respectant les bonnes pratiques. (1,5 pts)",
         "reponse": "<pre style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85em; overflow-x: auto;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"fr\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\"&gt;\n    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;\n    &lt;title&gt;Titre de ma page&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;!-- Contenu visible de la page --&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre><br/>La structure est composée de : <br/>- <code>&lt;!DOCTYPE html&gt;</code> : déclare la version HTML5 [citation:4]<br/>- <code>&lt;html&gt;</code> : élément racine, avec l'attribut <code>lang</code> pour indiquer la langue<br/>- <code>&lt;head&gt;</code> : contient les métadonnées (titre, encodage, etc.)<br/>- <code>&lt;meta charset=\"UTF-8\"&gt;</code> : définit l'encodage des caractères<br/>- <code>&lt;meta viewport&gt;</code> : assure l'adaptation aux mobiles<br/>- <code>&lt;title&gt;</code> : définit le titre de la page (visible dans l'onglet)<br/>- <code>&lt;body&gt;</code> : contient tout le contenu visible de la page."
       }
     ]
   },
   {
     "titre": "Exercice 2 : Structuration Textuelle (3 pts)",
     "points": "3 pts",
     "enonce": "Structurez le texte suivant en utilisant les balises HTML appropriées. Vous devez obtenir un résultat qui respecte la hiérarchie des titres et la sémantique du texte.",
     "questions": [
       {
         "question": "1) À partir des informations suivantes, rédigez le code HTML correspondant.<br/><br/><span style='font-style: italic;'>\"Mon site de recettes\"</span> est le titre principal du site. <span style='font-style: italic;'>\"La recette du jour\"</span> est le titre de la section principale. <span style='font-style: italic;'>\"Ingrédients\"</span> est un sous-titre suivi d'une liste d'ingrédients. <span style='font-style: italic;'>\"Préparation\"</span> est un autre sous-titre suivi d'un paragraphe. Le mot <span style='font-style: italic;'>\"fraîches\"</span> doit être mis en évidence comme important. (3 pts)",
         "reponse": "<pre style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85em; overflow-x: auto;'><code>&lt;h1&gt;Mon site de recettes&lt;/h1&gt;\n\n&lt;h2&gt;La recette du jour&lt;/h2&gt;\n\n&lt;h3&gt;Ingrédients&lt;/h3&gt;\n&lt;ul&gt;\n  &lt;li&gt;200g de farine&lt;/li&gt;\n  &lt;li&gt;3 œufs&lt;/li&gt;\n  &lt;li&gt;Des herbes &lt;strong&gt;fraîches&lt;/strong&gt;&lt;/li&gt;\n  &lt;li&gt;Un filet d'huile d'olive&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;h3&gt;Préparation&lt;/h3&gt;\n&lt;p&gt;Dans un saladier, mélangez la farine avec les œufs. Ajoutez les herbes fraîches et l'huile d'olive. Mélangez jusqu'à obtenir une pâte homogène.&lt;/p&gt;</code></pre><br/>Les éléments clés :<br/>- <code>&lt;h1&gt;</code> pour le titre principal, <code>&lt;h2&gt;</code> et <code>&lt;h3&gt;</code> pour les sous-titres [citation:4]<br/>- <code>&lt;ul&gt;</code> et <code>&lt;li&gt;</code> pour la liste non ordonnée d'ingrédients<br/>- <code>&lt;p&gt;</code> pour le paragraphe de préparation [citation:4]<br/>- <code>&lt;strong&gt;</code> pour mettre le mot \"fraîches\" en évidence [citation:4]"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Liens et Images (3 pts)",
     "points": "3 pts",
     "enonce": "Écrivez le code HTML pour les situations suivantes.",
     "questions": [
       {
         "question": "1) Créez un lien qui ouvre vers le site <span style='font-style: italic;'>www.monecole.com</span> dans un nouvel onglet. (1 pt)",
         "reponse": "<pre style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85em; overflow-x: auto;'><code>&lt;a href=\"https://www.monecole.com\" target=\"_blank\"&gt;Visiter mon école&lt;/a&gt;</code></pre><br/>L'attribut <code>target=\"_blank\"</code> permet d'ouvrir le lien dans un nouvel onglet ou une nouvelle fenêtre [citation:1][citation:5]."
       },
       {
         "question": "2) Insérez une image nommée <span style='font-style: italic;'>logo.png</span> située dans le dossier <span style='font-style: italic;'>images</span>, avec une largeur de 150 pixels et un texte alternatif décrivant un logo. (1 pt)",
         "reponse": "<pre style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85em; overflow-x: auto;'><code>&lt;img src=\"images/logo.png\" alt=\"Logo de mon entreprise\" width=\"150\"&gt;</code></pre><br/>- <code>src</code> : indique le chemin vers l'image (dossier <code>images/</code> puis le nom du fichier)<br/>- <code>alt</code> : texte alternatif essentiel pour l'accessibilité et le SEO [citation:4]<br/>- <code>width</code> : définit la largeur en pixels [citation:4]"
       },
       {
         "question": "3) Quelle est l'importance de l'attribut <strong>alt</strong> dans la balise <code>&lt;img&gt;</code> ? (1 pt)",
         "reponse": "L'attribut <strong>alt</strong> a plusieurs fonctions cruciales [citation:4] :<br/><br/>- <strong>Accessibilité</strong> : Il permet aux personnes utilisant des lecteurs d'écran de comprendre le contenu de l'image. C'est une obligation pour un site accessible [citation:5].<br/>- <strong>SEO</strong> : Il aide les moteurs de recherche à comprendre le sujet de l'image, ce qui améliore le référencement.<br/>- <strong>Affichage alternatif</strong> : Il s'affiche lorsque l'image ne peut pas être chargée (problème de réseau, lien cassé).<br/>- <strong>Description</strong> : Il fournit une description textuelle de l'image."
       }
     ]
   },
   {
     "titre": "Exercice 4 : Mise en Page et Bonnes Pratiques (5 pts)",
     "points": "5 pts",
     "enonce": "Mettez en pratique les notions de structure de page, de commentaires et d'organisation.",
     "questions": [
       {
         "question": "1) Rédigez le code HTML complet d'une page web simple qui contient les éléments suivants :<br/>- Un en-tête avec le titre \"Bienvenue sur mon site\"<br/>- Une navigation avec 3 liens (Accueil, Services, Contact)<br/>- Une section principale contenant un article avec un titre et un paragraphe<br/>- Un pied de page avec le copyright \"© 2025 MonSite.com\"<br/><br/>Vous devez utiliser les balises sémantiques HTML5 et ajouter des commentaires pour expliquer votre code. (5 pts)",
         "reponse": "<pre style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85em; overflow-x: auto;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"fr\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\"&gt;\n    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;\n    &lt;title&gt;Mon Site&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;!-- En-tête du site --&gt;\n    &lt;header&gt;\n      &lt;h1&gt;Bienvenue sur mon site&lt;/h1&gt;\n    &lt;/header&gt;\n    \n    &lt;!-- Menu de navigation --&gt;\n    &lt;nav&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;Accueil&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;Services&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;Contact&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n    &lt;/nav&gt;\n    \n    &lt;!-- Contenu principal --&gt;\n    &lt;main&gt;\n      &lt;article&gt;\n        &lt;h2&gt;Titre de l'article&lt;/h2&gt;\n        &lt;p&gt;Ceci est le contenu de mon premier article. Il contient des informations importantes.&lt;/p&gt;\n      &lt;/article&gt;\n    &lt;/main&gt;\n    \n    &lt;!-- Pied de page --&gt;\n    &lt;footer&gt;\n      &lt;p&gt;&amp;copy; 2025 MonSite.com&lt;/p&gt;\n    &lt;/footer&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre><br/>Les balises sémantiques utilisées [citation:5] :<br/>- <code>&lt;header&gt;</code> : zone d'en-tête du site<br/>- <code>&lt;nav&gt;</code> : zone de navigation<br/>- <code>&lt;main&gt;</code> : contenu principal de la page<br/>- <code>&lt;article&gt;</code> : contenu indépendant (article)<br/>- <code>&lt;footer&gt;</code> : pied de page<br/>- Les commentaires HTML s'écrivent <code>&lt;!-- texte --&gt;</code> pour documenter le code [citation:4]"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
