<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation \u00E0 React Native",
  "classe": "D\u00E9veloppement Web",
  "sequence": "S\u00E9quence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Composants fondamentaux et mise en page",
      "points": "6 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>📱 Exercice 1</p><p>React Native utilise des composants sp\u00E9cifiques pour la construction d'interfaces mobiles. R\u00E9pondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Quelle est la <strong>diff\u00E9rence fondamentale</strong> entre la direction par d\u00E9faut de Flexbox en CSS et en React Native ? Expliquez comment cela affecte la mise en page.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>En CSS web, la direction par d\u00E9faut de Flexbox est <strong>row</strong> (les \u00E9l\u00E9ments s'alignent horizontalement). En React Native, la direction par d\u00E9faut est <strong>column</strong> (les \u00E9l\u00E9ments s'empilent verticalement). Cette diff\u00E9rence s'explique par le fait que les interfaces mobiles s'adaptent mieux \u00E0 une disposition verticale, car le contenu d\u00E9file souvent de haut en bas. Pour obtenir une disposition horizontale en React Native, il faut explicitement d\u00E9finir <code>flexDirection: 'row'</code>.</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Expliquez la diff\u00E9rence entre <code>ScrollView</code> et <code>FlatList</code>. Dans quel cas utiliseriez-vous l'un plut\u00F4t que l'autre ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p><code>ScrollView</code> est utilis\u00E9 pour du contenu d\u00E9filant simple (< 20 \u00E9l\u00E9ments). Il monte tout son contenu en m\u00E9moire d'un coup, ce qui peut poser des probl\u00E8mes de performance pour les grandes listes.</p><p><code>FlatList</code> est optimis\u00E9 pour les <strong>listes performantes</strong> avec un grand nombre d'\u00E9l\u00E9ments. Il pratique un <strong>rendu paresseux</strong> : seuls les \u00E9l\u00E9ments visibles \u00E0 l'\u00E9cran sont rendus. On utilise <code>FlatList</code> pour les listes de produits, les fils d'actualit\u00E9, etc.</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> Quelles sont les <strong>trois propri\u00E9t\u00E9s obligatoires</strong> de <code>FlatList</code> ? Que fait chacune d'elles ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Les trois propri\u00E9t\u00E9s obligatoires de <code>FlatList</code> sont :</p><ul><li><strong><code>data</code></strong> : le tableau de donn\u00E9es \u00E0 afficher</li><li><strong><code>keyExtractor</code></strong> : fonction qui g\u00E9n\u00E8re une <strong>cl\u00E9 unique</strong> pour chaque \u00E9l\u00E9ment (n\u00E9cessaire pour le rendu efficace)</li><li><strong><code>renderItem</code></strong> : fonction qui d\u00E9finit comment chaque \u00E9l\u00E9ment est affich\u00E9</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Interaction utilisateur et \u00E9v\u00E9nements",
      "points": "7 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>👆 Exercice 2</p><p>Les composants interactifs sont essentiels dans une application mobile. R\u00E9pondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> \u00C9crivez un composant <code>Button</code> r\u00E9utilisable qui accepte les props suivantes : <code>title</code>, <code>onPress</code>, <code>variant</code> ('primary' ou 'secondary'), et <code>disabled</code>. Utilisez <code>TouchableOpacity</code> et <code>StyleSheet</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>import { TouchableOpacity, Text, StyleSheet } from 'react-native';\n\ninterface ButtonProps {\n  title: string;\n  onPress: () => void;\n  variant?: 'primary' | 'secondary';\n  disabled?: boolean;\n}\n\nexport function Button({ \n  title, \n  onPress, \n  variant = 'primary', \n  disabled = false \n}: ButtonProps) {\n  return (\n    &lt;TouchableOpacity\n      style={[\n        styles.button,\n        variant === 'primary' ? styles.primary : styles.secondary,\n        disabled && styles.disabled\n      ]}\n      onPress={onPress}\n      disabled={disabled}\n    &gt;\n      &lt;Text style={styles.text}&gt;{title}&lt;/Text&gt;\n    &lt;/TouchableOpacity&gt;\n  );\n}\n\nconst styles = StyleSheet.create({\n  button: { padding: 12, borderRadius: 8, alignItems: 'center' },\n  primary: { backgroundColor: '#2b6cb0' },\n  secondary: { backgroundColor: '#e2e8f0' },\n  disabled: { opacity: 0.5 },\n  text: { color: 'white', fontWeight: 'bold' },\n});</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Quelle est la diff\u00E9rence entre <code>TouchableOpacity</code> et <code>Pressable</code> ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p><code>TouchableOpacity</code> est un composant simple qui r\u00E9duit l'opacit\u00E9 de l'\u00E9l\u00E9ment au toucher. C'est la solution la plus courante pour les boutons simples.</p><p><code>Pressable</code> est plus <strong>flexible</strong> et offre un <strong>contr\u00F4le plus fin</strong> des interactions : il permet de d\u00E9tecter les \u00E9tats 'pressed', 'hovered', et de personnaliser les retours visuels (highlight, ripple sur Android). Il est recommand\u00E9 pour des interactions plus avanc\u00E9es.</p></div>"
        }
      ]
    },
    {
      "titre": "Gestion des donn\u00E9es et \u00E9tat",
      "points": "7 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>📊 Exercice 3</p><p>La gestion de l'\u00E9tat et des donn\u00E9es est fondamentale dans une application React Native. R\u00E9pondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> \u00C9crivez un composant <code>Counter</code> qui utilise <code>useState</code> pour g\u00E9rer un compteur. Il doit afficher la valeur et proposer des boutons pour incr\u00E9menter, d\u00E9cr\u00E9menter et r\u00E9initialiser.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>import { View, Text, Button, StyleSheet } from 'react-native';\nimport { useState } from 'react';\n\nfunction Counter() {\n  const [count, setCount] = useState(0);\n\n  return (\n    &lt;View style={styles.container}&gt;\n      &lt;Text style={styles.count}&gt;{count}&lt;/Text&gt;\n      &lt;View style={styles.buttons}&gt;\n        &lt;Button title=\"+\" onPress={() => setCount(c => c + 1)} /&gt;\n        &lt;Button title=\"-\" onPress={() => setCount(c => c - 1)} /&gt;\n        &lt;Button title=\"Reset\" onPress={() => setCount(0)} /&gt;\n      &lt;/View&gt;\n    &lt;/View&gt;\n  );\n}</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Expliquez le r\u00F4le de <code>useEffect</code> dans un composant React Native. Donnez un exemple d'utilisation pour un appel API.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p><code>useEffect</code> permet d'ex\u00E9cuter du code <strong>apr\u00E8s le rendu</strong> du composant. Il est utilis\u00E9 pour les <strong>effets de bord</strong> : appels API, abonnements, timers, manipulation du DOM.</p><pre style='margin: 4px 0; white-space: pre-wrap;'>useEffect(() => {\n  fetch('https://api.example.com/data')\n    .then(res => res.json())\n    .then(data => setData(data));\n}, []); // Tableau vide = ex\u00E9cut\u00E9 une seule fois au montage</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> Pourquoi est-il important d'utiliser une <strong>cl\u00E9 unique</strong> dans <code>FlatList</code> ? Que se passe-t-il si l'on utilise l'index comme cl\u00E9 ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>La cl\u00E9 permet \u00E0 React Native d'<strong>identifier chaque \u00E9l\u00E9ment</strong> de mani\u00E8re unique et d'<strong>optimiser les re-rendus</strong> en ne mettant \u00E0 jour que les \u00E9l\u00E9ments qui ont chang\u00E9.</p><p>Utiliser l'<strong>index comme cl\u00E9</strong> est une <strong>mauvaise pratique</strong> : si la liste est r\u00E9organis\u00E9e ou si des \u00E9l\u00E9ments sont ajout\u00E9s/supprim\u00E9s, les indices changent, ce qui peut causer des <strong>bugs d'affichage</strong> et des <strong>probl\u00E8mes de performance</strong>. Il faut utiliser un identifiant stable comme un <code>id</code>.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
