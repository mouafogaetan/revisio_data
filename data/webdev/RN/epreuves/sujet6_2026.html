<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à React Native",
  "classe": "Développement Web",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'><p>Répondez de manière précise et concise aux questions suivantes sur les concepts clés de React Native.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1. (1 pt)</strong> Qu'est-ce que React Native ? En quoi se distingue-t-il des solutions hybrides comme Cordova ou Ionic ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><strong>React Native</strong> est un framework open-source développé par Meta (Facebook) pour créer des applications mobiles natives pour iOS et Android en utilisant JavaScript et React [citation:1].</p><p>Contrairement aux solutions hybrides (Cordova, Ionic) qui utilisent des WebViews pour afficher du contenu web, React Native compile le code JavaScript en <strong>composants natifs</strong> de l'OS, offrant une expérience utilisateur fluide et des performances proches des applications développées en Swift ou Kotlin [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2. (1 pt)</strong> Expliquez le principe du <strong>bridge</strong> dans React Native.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Le <strong>bridge</strong> est le mécanisme qui permet la communication entre le code JavaScript et le code natif (iOS/Android) [citation:1].</p><p>Il agit comme un canal de communication asynchrone : le JavaScript envoie des messages sérialisés via le bridge, et le code natif les reçoit, exécute les opérations correspondantes, et renvoie les résultats. Le bridge est essentiel car il permet d'accéder aux fonctionnalités natives du téléphone (appareil photo, GPS, capteurs, etc.) depuis le code JavaScript [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3. (1 pt)</strong> Quelles sont les principales différences entre Expo Go et React Native CLI pour le développement ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><strong>Expo Go</strong> est un outil qui permet un développement rapide sans configuration complexe. Il propose :</p><ul><li>Prise en main immédiate, pas besoin d'installer Android Studio ou Xcode.</li><li>Rechargement à chaud (hot reloading) et développement via QR code.</li><li>Accès à de nombreuses API natives via Expo SDK.</li></ul><p><strong>React Native CLI</strong> offre un contrôle total sur le projet :</p><ul><li>Nécessite Android Studio (pour Android) et Xcode (pour iOS).</li><li>Permet d'ajouter des modules natifs personnalisés.</li><li>Plus flexible mais plus complexe à configurer [citation:1].</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4. (1 pt)</strong> Pourquoi utilise-t-on <code>FlatList</code> plutôt que <code>ScrollView</code> pour afficher de grandes listes de données ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>FlatList</code> est optimisé pour les <strong>grandes listes</strong> de données grâce au <strong>rendu paresseux</strong> (lazy rendering) : il ne rend que les éléments visibles à l'écran, et réutilise les composants lors du défilement [citation:1].</p><p><code>ScrollView</code> rend <strong>tous ses enfants</strong> en une seule fois, ce qui peut entraîner des problèmes de performance pour de longues listes. <code>FlatList</code> est donc recommandé pour les listes de données dynamiques [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5. (1 pt)</strong> Quelle est la différence entre <code>useState</code> et <code>useRef</code> en React Native ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>useState</code> est utilisé pour gérer des <strong>états</strong> qui, lorsqu'ils changent, déclenchent un <strong>re-rendu</strong> du composant [citation:1].</p><p><code>useRef</code> permet de stocker une <strong>valeur mutable</strong> qui persiste pendant toute la durée de vie du composant, <strong>sans déclencher de re-rendu</strong> lorsqu'elle est modifiée. Elle est souvent utilisée pour référencer des éléments DOM (ou natifs) ou pour stocker des valeurs qui ne doivent pas provoquer de re-rendu [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>6. (1 pt)</strong> Expliquez le fonctionnement de <code>useEffect</code> dans un composant React Native.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>useEffect</code> est un hook qui permet d'exécuter du code <strong>en réaction à des effets de bord</strong> après le rendu du composant [citation:1].</p><p>Le tableau de dépendances contrôle son exécution :</p><ul><li>Sans tableau : exécuté après chaque rendu.</li><li>Avec tableau vide (<code>[]</code>) : exécuté une seule fois au montage.</li><li>Avec dépendances (<code>[variable]</code>) : exécuté quand la variable change.</li></ul><p>La fonction de nettoyage (return) est utilisée pour se désabonner des événements, annuler des timers, etc. [citation:1]</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Concepts et code React Native (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #fefcbf; padding: 15px; border-radius: 8px; color: #1a202c;'><p>Répondez aux questions suivantes en analysant les extraits de code et en appliquant vos connaissances.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1. (1 pt)</strong> Analyser ce code :</div><div style='background: #edf2f7; padding: 10px; border-radius: 6px;'><pre style='margin: 0;'><code>import React, { useState } from 'react';\nimport { View, Text, Button, StyleSheet } from 'react-native';\n\nexport default function Counter() {\n  const [count, setCount] = useState(0);\n\n  return (\n    &lt;View style={styles.container}&gt;\n      &lt;Text&gt;Compteur : {count}&lt;/Text&gt;\n      &lt;Button title=\"+\" onPress={() => setCount(count + 1)} /&gt;\n      &lt;Button title=\"-\" onPress={() => setCount(count - 1)} /&gt;\n    &lt;/View&gt;\n  );\n}\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, justifyContent: 'center', alignItems: 'center' },\n});</code></pre></div><p>a) Quel est le rôle de <code>useState(0)</code> ?</p><p>b) Que se passe-t-il lorsqu'on appuie sur le bouton \"+\" ?</p>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>a) <code>useState(0)</code> initialise l'état <code>count</code> avec la valeur <code>0</code>. Il retourne un tableau avec la valeur actuelle (<code>count</code>) et une fonction pour la mettre à jour (<code>setCount</code>) [citation:1].</p><p>b) Lorsqu'on appuie sur le bouton \"+\", la fonction <code>setCount(count + 1)</code> est appelée. Cela incrémente la valeur de <code>count</code> d'une unité et <strong>déclenche un re-rendu</strong> du composant pour refléter cette nouvelle valeur [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2. (1 pt)</strong> Identifier et corriger les erreurs dans ce code :</div><div style='background: #edf2f7; padding: 10px; border-radius: 6px;'><pre style='margin: 0;'><code>function UserProfile({ user }) {\n  return (\n    &lt;View&gt;\n      &lt;Text&gt;Nom: {user.nom}&lt;/Text&gt;\n      &lt;Text&gt;Email: {user.email}&lt;/Text&gt;\n      &lt;Image source={user.avatar} /&gt;\n    &lt;/View&gt;\n  );\n}</code></pre></div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Erreurs identifiées :</p><ul><li><code>Image</code> n'est pas importé. On doit ajouter <code>import { Image } from 'react-native';</code>.</li><li>Le composant <code>Image</code> ne peut pas recevoir un objet directement. Si <code>user.avatar</code> est une URL, il doit être passé comme <code>{ uri: user.avatar }</code> : <code>&lt;Image source={{ uri: user.avatar }} /&gt;</code>.</li></ul><p>Code corrigé :</p><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import { View, Text, Image } from 'react-native';\n\nfunction UserProfile({ user }) {\n  return (\n    &lt;View&gt;\n      &lt;Text&gt;Nom: {user.nom}&lt;/Text&gt;\n      &lt;Text&gt;Email: {user.email}&lt;/Text&gt;\n      &lt;Image source={{ uri: user.avatar }} /&gt;\n    &lt;/View&gt;\n  );\n}</pre></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3. (1 pt)</strong> Remplacer <code>ScrollView</code> par <code>FlatList</code> dans ce composant pour optimiser les performances :</div><div style='background: #edf2f7; padding: 10px; border-radius: 6px;'><pre style='margin: 0;'><code>import { ScrollView, Text } from 'react-native';\n\nfunction List({ items }) {\n  return (\n    &lt;ScrollView&gt;\n      {items.map(item => &lt;Text key={item.id}&gt;{item.name}&lt;/Text&gt;)}\n    &lt;/ScrollView&gt;\n  );\n}</code></pre></div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import { FlatList, Text } from 'react-native';\n\nfunction List({ items }) {\n  return (\n    &lt;FlatList\n      data={items}\n      keyExtractor={(item) => item.id}\n      renderItem={({ item }) => &lt;Text&gt;{item.name}&lt;/Text&gt;}\n    /&gt;\n  );\n}</pre><p><code>FlatList</code> est plus performant car il ne rend que les éléments visibles à l'écran (lazy rendering) [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4. (1 pt)</strong> Développer le composant <code>CustomButton</code> qui utilise <code>TouchableOpacity</code> et reçoit les props <code>title</code>, <code>onPress</code> et <code>color</code>.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import { TouchableOpacity, Text, StyleSheet } from 'react-native';\n\nfunction CustomButton({ title, onPress, color = '#007AFF' }) {\n  return (\n    &lt;TouchableOpacity\n      style={[styles.button, { backgroundColor: color }]}\n      onPress={onPress}\n    &gt;\n      &lt;Text style={styles.text}&gt;{title}&lt;/Text&gt;\n    &lt;/TouchableOpacity&gt;\n  );\n}\n\nconst styles = StyleSheet.create({\n  button: {\n    paddingVertical: 12,\n    paddingHorizontal: 24,\n    borderRadius: 8,\n    alignItems: 'center',\n    justifyContent: 'center',\n  },\n  text: {\n    color: 'white',\n    fontSize: 16,\n    fontWeight: 'bold',\n  },\n});\n\nexport default CustomButton;</pre></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Application de météo (10 pts)",
      "points": "10 pts",

          "question": "<div style='margin-bottom: 15px;'><strong>1. (1 pt)</strong> Créer l'écran <code>HomeScreen</code> avec un champ de recherche (<code>TextInput</code>) et un bouton de recherche (<code>TouchableOpacity</code>). Gérer l'état <code>city</code> avec <code>useState</code>.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import React, { useState } from 'react';\nimport { View, TextInput, TouchableOpacity, Text, StyleSheet } from 'react-native';\n\nfunction HomeScreen({ navigation }) {\n  const [city, setCity] = useState('');\n\n  const handleSearch = () => {\n    if (city.trim()) {\n      navigation.navigate('Weather', { city });\n    }\n  };\n\n  return (\n    &lt;View style={styles.container}&gt;\n      &lt;TextInput\n        style={styles.input}\n        placeholder=\"Entrez une ville\"\n        value={city}\n        onChangeText={setCity}\n        onSubmitEditing={handleSearch}\n      /&gt;\n      &lt;TouchableOpacity style={styles.button} onPress={handleSearch}&gt;\n        &lt;Text style={styles.buttonText}&gt;Rechercher&lt;/Text&gt;\n      &lt;/TouchableOpacity&gt;\n    &lt;/View&gt;\n  );\n}\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, padding: 20, justifyContent: 'center', backgroundColor: '#f5f5f5' },\n  input: { borderWidth: 1, borderColor: '#ddd', borderRadius: 8, padding: 12, fontSize: 16, backgroundColor: '#fff' },\n  button: { backgroundColor: '#007AFF', padding: 14, borderRadius: 8, alignItems: 'center', marginTop: 12 },\n  buttonText: { color: '#fff', fontWeight: 'bold', fontSize: 16 },\n});\n\nexport default HomeScreen;</pre></div>"

          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import React, { useState, useEffect } from 'react';\nimport { View, Text, ActivityIndicator, StyleSheet } from 'react-native';\n\nfunction WeatherScreen({ route }) {\n  const { city } = route.params;\n  const [loading, setLoading] = useState(true);\n  const [weather, setWeather] = useState(null);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    const API_KEY = 'votre_cle_api';\n    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=fr`;\n\n    fetch(url)\n      .then(response => {\n        if (!response.ok) throw new Error('Ville non trouvée');\n        return response.json();\n      })\n      .then(data => {\n        setWeather(data);\n        setLoading(false);\n      })\n      .catch(err => {\n        setError(err.message);\n        setLoading(false);\n      });\n  }, [city]);\n\n  if (loading) return (&lt;View style={styles.center}&gt;&lt;ActivityIndicator size=\"large\" /&gt;&lt;/View&gt;);\n  if (error) return (&lt;View style={styles.center}&gt;&lt;Text style={styles.error}&gt;Erreur : {error}&lt;/Text&gt;&lt;/View&gt;);\n\n  return (\n    &lt;View style={styles.container}&gt;\n      &lt;Text style={styles.city}&gt;{weather.name}&lt;/Text&gt;\n      &lt;Text style={styles.temp}&gt;{Math.round(weather.main.temp)}°C&lt;/Text&gt;\n      &lt;Text style={styles.desc}&gt;{weather.weather[0].description}&lt;/Text&gt;\n    &lt;/View&gt;\n  );\n}\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, padding: 20, alignItems: 'center', justifyContent: 'center', backgroundColor: '#f5f5f5' },\n  center: { flex: 1, justifyContent: 'center', alignItems: 'center' },\n  city: { fontSize: 28, fontWeight: 'bold', marginBottom: 8 },\n  temp: { fontSize: 48, fontWeight: 'bold', color: '#007AFF' },\n  desc: { fontSize: 20, color: '#666', marginTop: 8 },\n  error: { color: 'red', fontSize: 16 },\n});\n\nexport default WeatherScreen;</pre></div>"

        {
          "question": "<div style='margin-bottom: 15px;'><strong>3. (2 pts)</strong> Configurer une <strong>stack navigation</strong> avec <code>@react-navigation/native</code> et <code>@react-navigation/stack</code> pour gérer les deux écrans.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import React from 'react';\nimport { NavigationContainer } from '@react-navigation/native';\nimport { createNativeStackNavigator } from '@react-navigation/native-stack';\nimport HomeScreen from './screens/HomeScreen';\nimport WeatherScreen from './screens/WeatherScreen';\n\nconst Stack = createNativeStackNavigator();\n\nexport default function App() {\n  return (\n    &lt;NavigationContainer&gt;\n      &lt;Stack.Navigator initialRouteName=\"Home\"&gt;\n        &lt;Stack.Screen name=\"Home\" component={HomeScreen} options={{ title: 'Rechercher une ville' }} /&gt;\n        &lt;Stack.Screen name=\"Weather\" component={WeatherScreen} options={{ title: 'Météo' }} /&gt;\n      &lt;/Stack.Navigator&gt;\n    &lt;/NavigationContainer&gt;\n  );\n}</pre></div>"

          "question": "<div style='margin-bottom: 15px;'><strong>4. (2 pts)</strong> Ajouter la persistance de la <strong>dernière ville recherchée</strong> avec <code>@react-native-async-storage/async-storage</code>. La ville doit être sauvegardée et récupérée au démarrage.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>import React, { useState, useEffect } from 'react';\nimport AsyncStorage from '@react-native-async-storage/async-storage';\n\nfunction HomeScreen({ navigation }) {\n  const [city, setCity] = useState('');\n\n  useEffect(() => {\n    const loadLastCity = async () => {\n      try {\n        const saved = await AsyncStorage.getItem('lastCity');\n        if (saved) setCity(saved);\n      } catch (error) {\n        console.error('Erreur de chargement', error);\n      }\n    };\n    loadLastCity();\n  }, []);\n\n  const handleSearch = async () => {\n    if (city.trim()) {\n      try {\n        await AsyncStorage.setItem('lastCity', city);\n      } catch (error) {\n        console.error('Erreur de sauvegarde', error);\n      }\n      navigation.navigate('Weather', { city });\n    }\n  };\n\n  // ... suite du composant\n}</pre></div>"

          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'>// WeatherCard.js\nimport { View, Text, Image, StyleSheet } from 'react-native';\n\nfunction WeatherCard({ city, temperature, description, icon }) {\n  const iconUrl = `https://openweathermap.org/img/wn/${icon}@2x.png`;\n\n  return (\n    &lt;View style={styles.card}&gt;\n      &lt;Text style={styles.city}&gt;{city}&lt;/Text&gt;\n      &lt;Image source={{ uri: iconUrl }} style={styles.icon} /&gt;\n      &lt;Text style={styles.temp}&gt;{Math.round(temperature)}°C&lt;/Text&gt;\n      &lt;Text style={styles.desc}&gt;{description}&lt;/Text&gt;\n    &lt;/View&gt;\n  );\n}\n\nconst styles = StyleSheet.create({\n  card: { backgroundColor: '#fff', borderRadius: 16, padding: 24, alignItems: 'center', shadowColor: '#000', shadowOffset: { width: 0, height: 2 }, shadowOpacity: 0.1, shadowRadius: 8, elevation: 4 },\n  city: { fontSize: 24, fontWeight: 'bold' },\n  icon: { width: 80, height: 80 },\n  temp: { fontSize: 48, fontWeight: 'bold', color: '#007AFF' },\n  desc: { fontSize: 18, color: '#666' },\n});\n\nexport default WeatherCard;\n\n// Dans WeatherScreen\nreturn (\n  &lt;View style={styles.container}&gt;\n    &lt;WeatherCard\n      city={weather.name}\n      temperature={weather.main.temp}\n      description={weather.weather[0].description}\n      icon={weather.weather[0].icon}\n    /&gt;\n  &lt;/View&gt;\n);</pre></div>"

          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Le code de la question 2 inclut déjà la gestion d'erreur avec :</p><ul><li>Un état <code>error</code> pour stocker le message d'erreur.</li><li>La vérification <code>if (!response.ok) throw new Error('Ville non trouvée')</code> dans la fonction <code>fetch</code>.</li><li>Un affichage conditionnel : si <code>error</code> n'est pas <code>null</code>, on affiche un message d'erreur à l'écran.</li><li>Le <code>catch</code> capture toute erreur réseau et met à jour l'état <code>error</code> [citation:1].</li></ul></div>"

};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
