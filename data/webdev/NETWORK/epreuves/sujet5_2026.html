<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation aux Réseaux informatiques",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les fondamentaux du réseau et le modèle OSI (Chap. 1)",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1em; margin-bottom: 10px;'>Répondez aux questions suivantes en vous appuyant sur vos connaissances des concepts fondamentaux des réseaux et du modèle OSI.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) Définissez un <strong>réseau informatique</strong> et citez deux de ses principaux objectifs.</p>",
          "reponse": "<p>Un réseau informatique est un ensemble d'équipements (ordinateurs, serveurs, etc.) interconnectés pour échanger des informations et partager des ressources. Ses deux principaux objectifs sont le <strong>partage de ressources</strong> (comme des fichiers ou des imprimantes) et la <strong>communication</strong> (comme l'envoi d'emails ou la navigation web).</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1 pt) Nommez les <strong>quatre composants</strong> essentiels de tout réseau informatique.</p>",
          "reponse": "<p>Les quatre composants essentiels sont :</p><ul><li><strong>Émetteur</strong> : la source de l'information.</li><li><strong>Récepteur</strong> : la destination de l'information.</li><li><strong>Support</strong> : le canal physique ou logique de transmission (ex : câble, ondes).</li><li><strong>Protocole</strong> : l'ensemble de règles qui régissent la communication.</li></ul>"
        },
        {
          "question": "<p><strong>1.3</strong> (2 pts) Le modèle <strong>OSI</strong> est un modèle de référence pour les réseaux.</p><ul><li><strong>a)</strong> (1 pt) Combien de couches comporte-t-il et quel est son principal rôle ?</li><li><strong>b)</strong> (1 pt) Comparez brièvement le modèle OSI au modèle <strong>TCP/IP</strong> en citant une de leurs principales différences.</li></ul>",
          "reponse": "<p><strong>a)</strong> Le modèle OSI comporte <strong>7 couches</strong>. Son principal rôle est <strong>pédagogique et conceptuel</strong> : il fournit un cadre standardisé pour comprendre et enseigner les différentes fonctions d'un réseau, de la transmission physique des bits jusqu'aux applications utilisateur.</p><p><strong>b)</strong> Le modèle TCP/IP est le modèle utilisé sur Internet. Sa principale différence avec OSI est qu'il est <strong>plus concis et opérationnel</strong> : il ne comporte que 4 couches, fusionnant ou simplifiant certaines couches du modèle OSI (par exemple, la couche liaison et physique d'OSI sont combinées en une seule couche 'Accès réseau' dans TCP/IP).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Supports et transmission de données (Chap. 2)",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1em; margin-bottom: 10px;'>Cet exercice porte sur les supports physiques et la transmission des données.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) Classez les supports suivants en deux catégories : <strong>guidés</strong> et <strong>non-guidés</strong>.</p><ul><li>Câble à paires torsadées (UTP)</li><li>WiFi</li><li>Fibre optique</li><li>Bluetooth</li></ul>",
          "reponse": "<ul><li><strong>Guidés :</strong> Câble à paires torsadées (UTP), Fibre optique.</li><li><strong>Non-guidés :</strong> WiFi, Bluetooth.</li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1 pt) Expliquez ce qu'est la <strong>bande passante</strong> d'un canal de transmission et en quoi elle diffère du <strong>débit binaire</strong>.</p>",
          "reponse": "<p>La <strong>bande passante</strong> est une largeur de fréquence (en Hertz, Hz) disponible sur un support pour transmettre un signal. Elle représente la capacité théorique maximale du canal. Le <strong>débit binaire</strong> est la quantité réelle de données binaires (en bits par seconde, bps) qui est effectivement transmise sur le canal. La bande passante est une capacité, le débit est une performance.</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (2 pts) L'<strong>adresse MAC</strong> est un identifiant unique.</p><ul><li><strong>a)</strong> (1 pt) Quelle est sa taille (en bits) et quel est son format ?</li><li><strong>b)</strong> (1 pt) À quelle couche du modèle OSI appartient-elle et quel protocole permet de faire le lien entre cette adresse et une adresse IP ?</li></ul>",
          "reponse": "<p><strong>a)</strong> Une adresse MAC est codée sur <strong>48 bits</strong> et s'écrit généralement en hexadécimal sous forme de 6 groupes de 2 caractères (ex: <span style='font-family: monospace;'>AA:BB:CC:DD:EE:FF</span>). Elle est composée de deux parties : l'OUI (identifiant du constructeur) et un identifiant unique attribué par le constructeur.</p><p><strong>b)</strong> L'adresse MAC est utilisée au <strong>niveau 2</strong> (couche Liaison de données) du modèle OSI. Le protocole <strong>ARP (Address Resolution Protocol)</strong> est utilisé pour découvrir l'adresse MAC correspondant à une adresse IP donnée sur un réseau local.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Adressage IP et routage (Chap. 3)",
      "points": "6 pts",
      "enonce": "<p style='font-size: 1.1em; margin-bottom: 10px;'>Les questions suivantes testent vos compétences en adressage IP et en compréhension du routage.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) Donnez la structure d'une adresse <strong>IPv4</strong> (nombre de bits, représentation).</p>",
          "reponse": "<p>Une adresse IPv4 est un nombre binaire de <strong>32 bits</strong>, généralement représenté en notation décimale pointée, ce qui donne 4 nombres (appelés octets) séparés par des points (ex: <span style='font-family: monospace;'>192.168.1.1</span>).</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (2 pts) Soit le réseau <span style='font-family: monospace; background: #eef; padding: 2px 4px;'>192.168.1.0/24</span>.</p><ul><li><strong>a)</strong> (0.5 pt) Quel est le <strong>masque de sous-réseau</strong> associé ?</li><li><strong>b)</strong> (0.5 pt) Quelle est l'<strong>adresse réseau</strong> et l'<strong>adresse de broadcast</strong> ?</li><li><strong>c)</strong> (1 pt) Combien d'<strong>hôtes valides</strong> ce réseau peut-il adresser ?</li></ul>",
          "reponse": "<p><strong>a)</strong> Le masque de sous-réseau est <span style='font-family: monospace;'>255.255.255.0</span>.</p><p><strong>b)</strong> L'adresse réseau est <span style='font-family: monospace;'>192.168.1.0</span> et l'adresse de broadcast est <span style='font-family: monospace;'>192.168.1.255</span>.</p><p><strong>c)</strong> Ce réseau peut adresser <strong>254</strong> hôtes valides (calcul : 2<sup>8</sup> - 2 = 256 - 2 = 254). Les adresses réseau et broadcast ne sont pas assignables à des hôtes.</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (1.5 pts) Expliquez le rôle d'un <strong>routeur</strong> et la fonction d'une <strong>table de routage</strong>.</p>",
          "reponse": "<p>Un <strong>routeur</strong> est un équipement réseau de niveau 3 qui a pour rôle de connecter différents réseaux entre eux et d'acheminer les paquets de données d'un réseau à un autre jusqu'à leur destination finale.</p><p>Pour ce faire, il utilise une <strong>table de routage</strong>, qui est une base de données contenant des informations sur les réseaux connus et les chemins à emprunter pour les atteindre (en spécifiant l'interface de sortie ou le prochain routeur).</p>"
        },
        {
          "question": "<p><strong>3.4</strong> (1.5 pts) Distinguez le <strong>routage statique</strong> du <strong>routage dynamique</strong>. Citez un protocole de routage dynamique.</p>",
          "reponse": "<p>Le <strong>routage statique</strong> est configuré manuellement par l'administrateur réseau. Les routes sont fixes et ne changent pas, sauf si elles sont modifiées manuellement. Il est simple pour les petits réseaux mais ne s'adapte pas bien aux pannes.</p><p>Le <strong>routage dynamique</strong> utilise des protocoles qui permettent aux routeurs de découvrir automatiquement les routes et de les mettre à jour dynamiquement en fonction de l'état du réseau. Il est plus flexible et résilient. Un protocole de routage dynamique couramment utilisé est <strong>OSPF</strong> (Open Shortest Path First). D'autres exemples sont RIP et BGP.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Protocoles de transport (Chap. 4)",
      "points": "6 pts",
      "enonce": "<p style='font-size: 1.1em; margin-bottom: 10px;'>Les protocoles de la couche transport sont au cœur de la communication. Cet exercice les explore.</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) Citez les deux principaux protocoles de la couche transport du modèle TCP/IP et donnez une phrase pour décrire leur caractéristique principale.</p>",
          "reponse": "<ul><li><strong>TCP (Transmission Control Protocol)</strong> : protocole <strong>fiable, orienté connexion</strong> qui assure la livraison correcte et dans l'ordre des données.</li><li><strong>UDP (User Datagram Protocol)</strong> : protocole <strong>non fiable, sans connexion</strong> qui privilégie la rapidité à la fiabilité.</li></ul>"
        },
        {
          "question": "<p><strong>4.2</strong> (2 pts) Les <strong>numéros de port</strong> sont essentiels pour identifier les applications.</p><ul><li><strong>a)</strong> (0.5 pt) À quoi sert un numéro de port ?</li><li><strong>b)</strong> (1 pt) Associez chaque port à son service :<ul><li>80</li><li>22</li><li>443</li><li>53</li></ul></li><li><strong>c)</strong> (0.5 pt) Dans quelle plage de numéros se situent les ports \"well-known\" ?</li></ul>",
          "reponse": "<p><strong>a)</strong> Un numéro de port sert à identifier de manière unique une <strong>application ou un service</strong> spécifique s'exécutant sur un hôte, permettant ainsi au système d'orienter correctement les données reçues vers le bon processus.</p><p><strong>b)</strong> Association port-service :<ul><li><strong>80</strong> : HTTP (Web)</li><li><strong>22</strong> : SSH (Accès sécurisé)</li><li><strong>443</strong> : HTTPS (Web sécurisé)</li><li><strong>53</strong> : DNS (Résolution de noms)</li></ul></p><p><strong>c)</strong> Les ports 'well-known' se situent dans la plage allant de <strong>0 à 1023</strong>.</p>"
        },
        {
          "question": "<p><strong>4.3</strong> (1.5 pt) Décrivez le mécanisme de l'<strong>établissement de connexion TCP</strong>, connu sous le nom de <strong>3-way handshake</strong>. Quels sont les 3 messages échangés ?</p>",
          "reponse": "<p>Le 3-way handshake est le processus permettant d'établir une connexion TCP de manière fiable. Les trois messages échangés sont :</p><ol><li><strong>SYN (Synchronize)</strong> : Le client envoie un segment avec le flag SYN activé pour demander l'ouverture d'une connexion.</li><li><strong>SYN-ACK (Synchronize-Acknowledgment)</strong> : Le serveur répond avec un segment comportant les flags SYN et ACK pour accuser réception de la demande et confirmer sa propre volonté de communiquer.</li><li><strong>ACK (Acknowledgment)</strong> : Le client envoie un dernier segment avec le flag ACK pour confirmer la réception de la réponse du serveur. La connexion est alors établie.</li></ol>"
        },
        {

          "reponse": "<p>Le <strong>contrôle de flux</strong> est un mécanisme de TCP qui empêche un émetteur rapide de submerger un récepteur lent en lui envoyant trop de données à la fois. Il permet de s'assurer que le récepteur a le temps de traiter les données reçues.</p><p>Ce mécanisme est mis en œuvre via la notion de <strong>fenêtre glissante (sliding window)</strong>. Le récepteur annonce à l'émetteur la taille de sa fenêtre (window size), c'est-à-dire le nombre d'octets qu'il est prêt à recevoir à un instant donné. L'émetteur s'engage à ne pas envoyer plus de données que la taille de la fenêtre annoncée.</p>"

          "reponse": "<ul><li><strong>a) Usurpation d'identité (spoofing)</strong> : Technique visant à se faire passer pour une autre entité en falsifiant une information d'identification (comme l'adresse IP ou MAC).</li><li><strong>b) Attaque par déni de service (DoS)</strong> : Attaque dont l'objectif est de rendre un service ou une ressource réseau indisponible pour ses utilisateurs légitimes, souvent en l'inondant de requêtes.</li><li><strong>c) Attaque de l'homme du milieu (MITM)</strong> : Attaque où un attaquant intercepte et relais les communications entre deux parties à leur insu, pouvant ainsi écouter ou modifier les échanges.</li></ul>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
