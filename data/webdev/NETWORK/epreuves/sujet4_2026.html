<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux R\u00E9seaux informatiques",
 "classe": "D\u00E9veloppement Web",
 "sequence": "S\u00E9quence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Protocoles applicatifs et services r\u00E9seau",
     "points": "8 pts",
     "enonce": "<p>R\u00E9pondez aux questions suivantes concernant les protocoles applicatifs et les services r\u00E9seau.</p>",
     "questions": [
       {
         "question": "<p><strong>1) (2 pts)</strong> Expliquez le r\u00F4le du DNS dans le fonctionnement d'Internet. Quelle est la structure hi\u00E9rarchique des noms de domaine ? Citez deux types d'enregistrements DNS.</p>",
         "reponse": "<p>Le DNS (Domain Name System) permet la r\u00E9solution des noms de domaine en adresses IP. Il agit comme un annuaire t\u00E9l\u00E9phonique d'Internet : les humains utilisent des noms (ex: google.com), le DNS les traduit en adresses IP compr\u00E9hensibles par les machines.</p><p>La structure hi\u00E9rarchique des noms de domaine est :</p><ul><li>TLD (Top Level Domain) : .com, .org, .fr, .cm</li><li>Domaine de second niveau : google, yahoo</li><li>Sous-domaines : mail.google.com, drive.google.com</li></ul><p>Types d'enregistrements :</p><ul><li><strong>A</strong> : Associe un nom de domaine \u00E0 une adresse IPv4</li><li><strong>AAAA</strong> : Associe un nom de domaine \u00E0 une adresse IPv6</li><li><strong>CNAME</strong> : Alias d'un nom de domaine vers un autre</li></ul>"
       },
       {
         "question": "<p><strong>2) (2 pts)</strong> Quelles sont les diff\u00E9rences fondamentales entre HTTP et HTTPS ? Expliquez le r\u00F4le de TLS dans HTTPS.</p>",
         "reponse": "<p>HTTP (HyperText Transfer Protocol) est un protocole non s\u00E9curis\u00E9 qui transmet les donn\u00E9es en clair. Les donn\u00E9es peuvent \u00EAtre intercept\u00E9es et lues par des tiers.</p><p>HTTPS (HTTP Secure) est la version s\u00E9curis\u00E9e qui utilise TLS (Transport Layer Security) pour chiffrer les communications. TLS garantit :</p><ul><li><strong>Confidentialit\u00E9</strong> : Les donn\u00E9es sont chiffr\u00E9es</li><li><strong>Int\u00E9grit\u00E9</strong> : Les donn\u00E9es ne peuvent pas \u00EAtre modifi\u00E9es en transit</li><li><strong>Authentification</strong> : Le serveur prouve son identit\u00E9 via un certificat</li></ul><p>HTTPS utilise le port 443 tandis que HTTP utilise le port 80.</p>"
       },
       {
         "question": "<p><strong>3) (2 pts)</strong> D\u00E9crivez le fonctionnement de SMTP. Quels sont les ports utilis\u00E9s ? Quelles diff\u00E9rences existe-t-il entre POP3 et IMAP pour la r\u00E9ception des emails ?</p>",
         "reponse": "<p>SMTP (Simple Mail Transfer Protocol) est le protocole d'envoi d'emails. Il fonctionne en mode client-serveur : le client envoie le message au serveur SMTP qui le transf\u00E8re au serveur du destinataire.</p><p>Ports :</p><ul><li>Port 25 : ancien port, souvent bloqu\u00E9</li><li>Port 587 : port recommand\u00E9 avec authentification</li><li>Port 465 : port pour SMTP avec SSL</li></ul><p>Diff\u00E9rences POP3 vs IMAP :</p><ul><li><strong>POP3</strong> (Post Office Protocol) : T\u00E9l\u00E9charge les emails sur l'appareil et les supprime du serveur. Acc\u00E8s \u00E0 un seul appareil.</li><li><strong>IMAP</strong> (Internet Message Access Protocol) : Laisse les emails sur le serveur, synchronisation entre plusieurs appareils. Plus moderne.</li></ul>"
       },
       {
         "question": "<p><strong>4) (2 pts)</strong> FTP est utilis\u00E9 pour le transfert de fichiers. Quels ports utilise-t-il ? Quelle est la diff\u00E9rence entre FTP actif et FTP passif ? Que propose SFTP comme am\u00E9lioration ?</p>",
         "reponse": "<p>FTP (File Transfer Protocol) utilise deux ports :</p><ul><li><strong>Port 21</strong> : Canal de contr\u00F4le (commandes)</li><li><strong>Port 20</strong> : Canal de donn\u00E9es (transfert)</li></ul><p>Diff\u00E9rence FTP actif vs passif :</p><ul><li><strong>FTP actif</strong> : Le serveur initie la connexion de donn\u00E9es vers le client (probl\u00E8me avec les pare-feux)</li><li><strong>FTP passif</strong> : Le client initie les deux connexions, plus compatible avec les pare-feux modernes</li></ul><p><strong>SFTP</strong> (SSH File Transfer Protocol) : Utilise le port 22 et le protocole SSH pour chiffrer toutes les communications, contrairement \u00E0 FTP qui transmet en clair (y compris les identifiants).</p>"
       }
     ]
    },
    {
      "titre": "\u00C9quipements r\u00E9seau",
      "points": "6 pts",
      "enonce": "<p>Cette section \u00E9value votre connaissance des \u00E9quipements r\u00E9seau et de leur fonctionnement.</p>",
      "questions": [
        {
          "question": "<p><strong>1) (2 pts)</strong> Expliquez le r\u00F4le d'un switch dans un r\u00E9seau local. Comment un switch apprend-il les adresses MAC ? Qu'est-ce que STP et pourquoi est-il n\u00E9cessaire ?</p>",
          "reponse": "<p>Un switch est un \u00E9quipement de niveau 2 (couche liaison) qui connecte plusieurs p\u00E9riph\u00E9riques dans un r\u00E9seau local. Il utilise les adresses MAC pour diriger le trafic uniquement vers le port du destinataire, contrairement \u00E0 un hub qui diffuse \u00E0 tous les ports.</p><p>Apprentissage des adresses MAC :</p><ul><li>Le switch lit l'adresse MAC source de chaque trame entrante</li><li>Il associe cette adresse MAC au port sur lequel elle est arriv\u00E9e dans sa table MAC</li><li>Pour les trames destin\u00E9es \u00E0 une adresse MAC inconnue, il diffuse sur tous les ports (flooding)</li></ul><p>STP (Spanning Tree Protocol) est un protocole qui \u00E9vite les boucles r\u00E9seau lorsqu'il y a plusieurs switches interconnect\u00E9s. Il d\u00E9sactive certains ports pour garantir un chemin unique entre deux points.</p>"
        },
        {
          "question": "<p><strong>2) (2 pts)</strong> Quel est le r\u00F4le d'un routeur dans un r\u00E9seau ? Expliquez ce qu'est une table de routage et comment elle est utilis\u00E9e. Distinguez routage statique et dynamique.</p>",
          "reponse": "<p>Un routeur est un \u00E9quipement de niveau 3 (couche r\u00E9seau) qui connecte diff\u00E9rents r\u00E9seaux entre eux. Il achemine les paquets vers leur destination en utilisant les adresses IP.</p><p>La <strong>table de routage</strong> est une base de donn\u00E9es qui contient :</p><ul><li>Les r\u00E9seaux de destination connus</li><li>La passerelle ou l'interface \u00E0 utiliser</li><li>La distance ou le co\u00FBt pour atteindre chaque r\u00E9seau</li></ul><p><strong>Routage statique</strong> : Les routes sont configur\u00E9es manuellement par l'administrateur. Simple mais non adaptable en cas de panne.</p><p><strong>Routage dynamique</strong> : Les routeurs \u00E9changent des informations entre eux pour d\u00E9couvrir automatiquement les routes. Protocoles : RIP, OSPF, BGP.</p>"
        },
        {
          "question": "<p><strong>3) (2 pts)</strong> D\u00E9finissez le NAT (Network Address Translation) et son r\u00F4le dans les r\u00E9seaux domestiques. Expliquez la diff\u00E9rence entre NAT et PAT.</p>",
          "reponse": "<p>Le NAT (Network Address Translation) est un m\u00E9canisme qui permet de traduire les adresses IP priv\u00E9es d'un r\u00E9seau local en une adresse IP publique pour l'acc\u00E8s \u00E0 Internet. Il r\u00E9sout la p\u00E9nurie d'adresses IPv4 en permettant \u00E0 plusieurs appareils de partager une seule adresse IP publique.</p><p><strong>NAT</strong> : Traduit une adresse priv\u00E9e en une adresse publique (1:1). Utilis\u00E9 pour les serveurs accessibles depuis l'ext\u00E9rieur.</p><p><strong>PAT</strong> (Port Address Translation) : Une variante du NAT qui utilise les num\u00E9ros de port pour distinguer les connexions (N:1). C'est ce qui est utilis\u00E9 dans les routeurs domestiques : des centaines d'appareils partagent une seule adresse IP publique, diff\u00E9renci\u00E9s par leur port source.</p>"
        }
      ]
    },
    {
      "titre": "WiFi, Bluetooth et s\u00E9curit\u00E9 r\u00E9seau",
      "points": "6 pts",
      "enonce": "<p>R\u00E9pondez aux questions sur les technologies sans fil et la s\u00E9curit\u00E9 des r\u00E9seaux.</p>",
      "questions": [
        {
          "question": "<p><strong>1) (2 pts)</strong> Expliquez les principales normes WiFi (802.11a/b/g/n/ac/ax). Quelles sont les bandes de fr\u00E9quence utilis\u00E9es et leurs avantages respectifs ?</p>",
          "reponse": "<p>Les normes WiFi \u00E9voluent selon l'IEEE 802.11 :</p><table><tr><th>Norme</th><th>Bande</th><th>D\u00E9bit max</th></tr><tr><td>802.11b</td><td>2.4 GHz</td><td>11 Mbps</td></tr><tr><td>802.11a</td><td>5 GHz</td><td>54 Mbps</td></tr><tr><td>802.11g</td><td>2.4 GHz</td><td>54 Mbps</td></tr><tr><td>802.11n</td><td>2.4/5 GHz</td><td>600 Mbps</td></tr><tr><td>802.11ac</td><td>5 GHz</td><td>3.5 Gbps</td></tr><tr><td>802.11ax (WiFi 6)</td><td>2.4/5/6 GHz</td><td>9.6 Gbps</td></tr></table><p><strong>Bandes de fr\u00E9quence :</strong></p><ul><li><strong>2.4 GHz</strong> : Meilleure port\u00E9e, mais plus de congestion (micro-ondes, Bluetooth)</li><li><strong>5 GHz</strong> : Moins de congestion, d\u00E9bit plus \u00E9lev\u00E9, port\u00E9e r\u00E9duite</li><li><strong>6 GHz</strong> : WiFi 6E, encore plus de bande passante</li></ul>"
        },
        {
          "question": "<p><strong>2) (2 pts)</strong> Quels sont les protocoles de s\u00E9curit\u00E9 WiFi et leurs \u00E9volutions ? Expliquez la diff\u00E9rence entre WEP, WPA, WPA2 et WPA3.</p>",
          "reponse": "<p><strong>WEP</strong> (Wired Equivalent Privacy) : Premier protocole, aujourd'hui obsol\u00E8te et facilement piratable. Cl\u00E9 de 64 ou 128 bits.</p><p><strong>WPA</strong> (WiFi Protected Access) : Am\u00E9lioration de WEP, utilise TKIP (Temporal Key Integrity Protocol). Plus s\u00E9curis\u00E9 mais encore vuln\u00E9rable.</p><p><strong>WPA2</strong> (WiFi Protected Access 2) : Standard actuel, utilise AES (Advanced Encryption Standard). Tr\u00E8s s\u00E9curis\u00E9. Deux modes :</p><ul><li>WPA2-Personal : Cl\u00E9 partag\u00E9e (PSK) pour usage domestique</li><li>WPA2-Enterprise : Authentification via RADIUS pour usage professionnel</li></ul><p><strong>WPA3</strong> : Derni\u00E8re version, plus s\u00E9curis\u00E9e, prot\u00E8ge contre les attaques par dictionnaire et offre SAE (Simultaneous Authentication of Equals).</p>"
        },
        {
          "question": "<p><strong>3) (2 pts)</strong> D\u00E9crivez le fonctionnement de Bluetooth. Qu'est-ce qu'un piconet ? Quelles sont les applications de la technologie BLE (Bluetooth Low Energy) ?</p>",
          "reponse": "<p>Bluetooth est une technologie de communication sans fil \u00E0 courte port\u00E9e (environ 10 m\u00E8tres) fonctionnant sur la bande 2.4 GHz.</p><p>Un <strong>piconet</strong> est un r\u00E9seau Bluetooth form\u00E9 par un p\u00E9riph\u00E9rique ma\u00EEtre et jusqu'\u00E0 7 esclaves. Les p\u00E9riph\u00E9riques se connectent via un processus d'appairage (pairing).</p><p><strong>BLE</strong> (Bluetooth Low Energy) : Version \u00E9conome en \u00E9nergie, id\u00E9ale pour les objets connect\u00E9s (IoT) qui fonctionnent sur batterie :</p><ul><li>Montres connect\u00E9es et bracelets fitness</li><li>Capteurs (temp\u00E9rature, humidit\u00E9, mouvement)</li><li>Balises de localisation (Beacons)</li><li>Objets connect\u00E9s domotiques</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
