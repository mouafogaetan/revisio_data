<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux Réseaux informatiques",
 "classe": "Développement Web",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Questions de cours sur le diagnostic réseau",
     "points": "6 pts",
     "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #1a1a2e;'><strong>📚 Consignes :</strong> Répondez de manière claire et précise aux questions suivantes. Vos réponses doivent montrer une bonne compréhension des concepts de diagnostic réseau.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1.</strong> Expliquez le fonctionnement de la commande <code>ping</code>. Que signifie l'acronyme ICMP ? À quoi servent les options <code>-c</code> et <code>-t</code> sous Windows ? (2 pts)</p>",
         "reponse": "<p><code>ping</code> est un outil de diagnostic qui permet de tester la connectivité réseau en envoyant des requêtes ICMP Echo Request à une adresse IP et en attendant des réponses ICMP Echo Reply. ICMP signifie Internet Control Message Protocol, un protocole de la couche réseau utilisé pour les messages de contrôle et d'erreur. L'option <code>-c</code> (Unix/Linux) permet de spécifier le nombre de paquets à envoyer, tandis que <code>-t</code> (Windows) permet d'envoyer les paquets en continu jusqu'à l'interruption manuelle.</p>"
       },
       {
         "question": "<p><strong>2.</strong> Décrivez l'utilité de la commande <code>traceroute</code> (ou <code>tracert</code> sur Windows). Comment interprète-t-on des résultats avec des \"<code>* * *</code>\" ? (2 pts)</p>",
         "reponse": "<p><code>traceroute</code> permet de tracer le chemin emprunté par les paquets pour atteindre une destination, en listant chaque routeur intermédiaire. Il utilise les paquets ICMP avec des TTL (Time To Live) croissants pour provoquer des réponses des routeurs successifs. Des \"<code>* * *</code>\" indiquent que les routeurs ne répondent pas aux requêtes, ce qui peut être dû à un pare-feu bloquant les paquets ICMP ou à un routeur non configuré pour répondre.</p>"
       },
       {
         "question": "<p><strong>3.</strong> Quelle est la différence entre <code>ipconfig</code> (Windows) et <code>ifconfig</code> (Linux) ? Que permet de voir la commande <code>netstat</code> ? (2 pts)</p>",
         "reponse": "<p><code>ipconfig</code> (Windows) et <code>ifconfig</code> (Linux) sont des outils d'affichage des interfaces réseau et de leur configuration (adresse IP, masque, passerelle). <code>netstat</code> affiche les connexions réseau actives, les tables de routage et les ports ouverts. Il permet de diagnostiquer les problèmes de communication en vérifiant quelles connexions sont établies ou en attente.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Analyse de trafic avec Wireshark",
     "points": "8 pts",
     "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #1a1a2e;'><strong>🔍 Consignes :</strong> Vous êtes administrateur réseau et devez analyser des captures Wireshark pour diagnostiquer des problèmes.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1.</strong> Lors d'une capture Wireshark, vous voyez de nombreux paquets avec la source <code>192.168.1.1</code> et la destination <code>255.255.255.255</code>. De quel type de paquets s'agit-il ? Quelle est leur fonction ? (2 pts)</p>",
         "reponse": "<p>Il s'agit de paquets de diffusion (broadcast). L'adresse <code>255.255.255.255</code> est l'adresse de diffusion limitée. Ces paquets sont utilisés par des protocoles comme ARP (Address Resolution Protocol) pour découvrir l'adresse MAC correspondante à une IP, ou par DHCP pour découvrir un serveur. Leur fonction est de permettre à une machine de communiquer avec toutes les machines du réseau local sans connaître leur adresse IP spécifique.</p>"
       },
       {
         "question": "<p><strong>2.</strong> Vous appliquez le filtre <code>tcp.port==443</code> dans Wireshark. Quel type de trafic voyez-vous ? À quoi servent les flags <code>SYN</code> et <code>ACK</code> dans une conversation TCP ? (2 pts)</p>",
         "reponse": "<p>Le filtre <code>tcp.port==443</code> affiche le trafic HTTPS (HTTP sécurisé). Les flags <code>SYN</code> et <code>ACK</code> sont utilisés dans l'établissement de la connexion TCP (3-way handshake) : <code>SYN</code> est envoyé par le client pour initier la connexion, <code>SYN-ACK</code> est la réponse du serveur, et <code>ACK</code> finalise la connexion.</p>"
       },
       {
         "question": "<p><strong>3.</strong> Dans une analyse de flux HTTP, vous voyez une requête <code>GET /index.html HTTP/1.1</code> suivie d'une réponse avec le code <code>404 Not Found</code>. Que signifient ces éléments ? (2 pts)</p>",
         "reponse": "<p>La requête <code>GET /index.html HTTP/1.1</code> indique que le client demande le fichier <code>index.html</code> sur le serveur. La réponse <code>404 Not Found</code> signifie que le serveur n'a pas trouvé ce fichier. Ce code HTTP est une erreur côté client, indiquant que la ressource demandée n'existe pas sur le serveur.</p>"
       },
       {
         "question": "<p><strong>4.</strong> Pour suivre l'intégralité d'une conversation TCP dans Wireshark, quelle option utilisez-vous ? Quelles données pouvez-vous visualiser ? (2 pts)</p>",
         "reponse": "<p>On utilise l'option \"Suivre\" puis \"Flux TCP\" (ou \"Follow TCP Stream\" en anglais). Cette fonction permet de voir l'ensemble des données échangées dans les deux sens, y compris les requêtes, les réponses, les headers et le contenu (HTML, JSON, etc.), ce qui facilite le débogage et l'analyse.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Diagnostic de performance",
     "points": "6 pts",
     "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #1a1a2e;'><strong>⚙️ Consignes :</strong> Votre application web est lente à charger. Vous devez identifier les causes possibles en utilisant les outils de diagnostic réseau.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1.</strong> Pour vérifier la connectivité entre votre poste et le serveur web, quelle commande utilisez-vous ? Que pouvez-vous déduire d'un RTT (Round Trip Time) élevé ? (2 pts)</p>",
         "reponse": "<p>On utilise la commande <code>ping</code> pour vérifier la connectivité. Un RTT (temps aller-retour) élevé peut indiquer une congestion réseau, un problème de routage, une latence due à la distance géographique, ou un serveur surchargé.</p>"
       },
       {
         "question": "<p><strong>2.</strong> Comment utiliser <code>traceroute</code> pour identifier un goulot d'étranglement sur le chemin vers le serveur ? Que signifie une augmentation soudaine du temps de réponse sur un saut particulier ? (2 pts)</p>",
         "reponse": "<p><code>traceroute</code> affiche chaque routeur intermédiaire (saut) avec le temps de réponse. Une augmentation soudaine du temps de réponse sur un saut particulier indique que ce routeur est probablement un goulot d'étranglement, possiblement dû à une congestion ou à une capacité insuffisante. Si le temps reste élevé par la suite, le problème est généralement localisé à ce saut.</p>"
       },
       {
         "question": "<p><strong>3.</strong> Vous observez des pertes de paquets avec <code>ping</code>. Quelles pourraient en être les causes ? Proposez deux solutions pour y remédier. (2 pts)</p>",
         "reponse": "<p>Les pertes de paquets peuvent être causées par une congestion réseau, un équipement défectueux, une interférence sur le support physique, ou des problèmes de routage. Pour y remédier, on peut : 1) réduire la charge réseau en limitant les connexions simultanées, 2) vérifier et remplacer les câbles ou équipements défectueux, 3) optimiser la configuration du réseau (QoS, buffer).</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
