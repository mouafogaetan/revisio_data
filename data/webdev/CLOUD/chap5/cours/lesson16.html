<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 16 : Connecter le cloud au monde réel (VPN & Réseaux Hybrides) | Cours Cloud</title>
  <!-- Tailwind CSS via CDN + base responsive -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules si besoin, optionnel mais présent) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* animations douces pour les slides et transparence */
    .slide {
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
    }
    .slide-hidden {
      display: none;
      opacity: 0;
    }
    .slide-active {
      display: block;
      opacity: 1;
    }
    /* personnalisation pour mobile: boutons plus accessibles */
    .nav-btn {
      transition: all 0.2s ease;
    }
    .nav-btn:active {
      transform: scale(0.96);
    }
    /* pour les schémas dessinés en CSS pur */
    .hybrid-schema {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1rem;
    }
    .badge-cloud {
      background: #0284c7;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-100 font-sans antialiased">

  <!-- Conteneur principal avec padding confortable -->
  <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
    <!-- Card principale contenant les slides -->
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden border border-indigo-100">
      
      <!-- Header fixe avec titre de la leçon -->
      <div class="bg-indigo-700 px-5 py-4 md:px-8">
        <h1 class="text-white text-xl md:text-2xl font-bold tracking-tight">☁️ Leçon 16 : Connecter le cloud au monde réel</h1>
        <p class="text-indigo-200 text-sm md:text-base mt-1">VPN, connexion privée & architectures hybrides résilientes</p>
      </div>

      <!-- Zone slides dynamique -->
      <div id="slides-container" class="relative min-h-[70vh] bg-white p-5 md:p-8">
        <!-- Les slides seront injectées via jQuery -->
      </div>

      <!-- Navigation et progression -->
      <div class="bg-gray-50 px-5 py-4 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex gap-3">
          <button id="prevSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
          <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-1">Suivant ▶</button>
        </div>
        <div class="text-sm text-gray-600 bg-white px-4 py-1 rounded-full shadow-inner">
          Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
        </div>
      </div>
    </div>
    
    <footer class="text-center text-gray-500 text-xs mt-6">
      Cours d'initiation au Cloud Computing | Enseignant: Classe Développement Web - Cameroun 🇨🇲
    </footer>
  </div>

  <script>
    // Définition des slides pour la leçon 16 (contenu pédagogique)
    // Slide 1: Titre de la leçon
    // Slide 2: Objectifs d'apprentissage
    // Slides 3 à 5: Contenu détaillé (VPN, Direct Connect / ExpressRoute, Architecture hybride)
    
    const slidesData = [
      { // slide 0 - titre
        type: "title",
        content: `
          <div class="flex flex-col items-center justify-center text-center h-full min-h-[60vh]">
            <div class="bg-gradient-to-r from-indigo-500 to-cyan-500 rounded-full p-4 inline-flex mb-6 shadow-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">🌐 Connecter le cloud <br> au monde réel</h2>
            <p class="text-indigo-700 text-lg max-w-md">VPN, liaisons dédiées & architectures hybrides résilientes</p>
            <div class="mt-8 text-sm text-gray-500">Leçon 16 · Module Réseau Cloud</div>
          </div>
        `
      },
      { // slide 1 - objectifs
        type: "objectifs",
        content: `
          <div class="h-full">
            <h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h3>
            <ul class="space-y-4 text-gray-700">
              <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">🔐</span> <span><strong class="font-semibold">Utiliser VPN (IPsec)</strong> pour connecter un réseau local (on-premise) au cloud de façon sécurisée.</span></li>
              <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">⚡</span> <span><strong class="font-semibold">Comprendre Direct Connect, ExpressRoute, Interconnect</strong> : liaisons privées dédiées.</span></li>
              <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">🏛️</span> <span><strong class="font-semibold">Concevoir une architecture hybride résiliente</strong> : tolérance aux pannes et haute disponibilité.</span></li>
            </ul>
            <div class="mt-8 bg-indigo-50 p-4 rounded-xl italic text-indigo-800">💡 Saviez-vous ? 80% des grandes entreprises adoptent une stratégie cloud hybride pour garder le contrôle de données sensibles.</div>
          </div>
        `
      },
      { // slide 2 - contenu: VPN IPsec
        type: "content",
        title: "🔒 VPN IPsec : Le tunnel sécurisé vers le cloud",
        content: `
          <div class="space-y-5">
            <p class="text-gray-700 leading-relaxed">Le <strong class="text-indigo-700">VPN (Virtual Private Network)</strong> utilise le protocole IPsec pour créer un tunnel chiffré entre votre data center (ou votre bureau) et le cloud public (AWS, Azure, GCP).</p>
            <div class="bg-gray-100 p-4 rounded-xl my-2">
              <h4 class="font-bold text-gray-800 flex items-center gap-2">📡 Comment ça marche ?</h4>
              <ul class="list-disc list-inside mt-2 space-y-1 text-gray-700">
                <li>Passerelle VPN côté client (matériel ou logiciel)</li>
                <li>Passerelle VPN virtuelle dans le cloud (ex: AWS VPN Gateway)</li>
                <li>Tunnel IPsec avec chiffrement AES, authentification IKE</li>
                <li>Le trafic traverse Internet mais reste crypté → sécurité et confidentialité</li>
              </ul>
            </div>
            <div class="grid md:grid-cols-2 gap-4 mt-2">
              <div class="border border-indigo-200 rounded-lg p-3 bg-white shadow-sm"><span class="font-bold text-indigo-600">✔ Avantages :</span> coût réduit, déploiement rapide, standard universel.</div>
              <div class="border border-amber-200 rounded-lg p-3 bg-white shadow-sm"><span class="font-bold text-amber-600">⚠ Limitations :</span> dépendance à Internet, latence variable, bande passante limitée.</div>
            </div>
            <!-- Petit schéma dessiné en CSS/SVG léger -->
            <div class="mt-4 bg-slate-50 p-3 rounded-xl text-center">
              <p class="text-xs font-mono text-gray-500 mb-2">🔁 [On-Premise] <strong>VPN Tunnel IPsec</strong> → [Cloud VPC]</p>
              <div class="flex justify-center items-center gap-1 flex-wrap text-sm">
                <span class="bg-gray-700 text-white px-3 py-1 rounded-full">🏢 Site local</span>
                <span class="text-xl">🔐 ➡️ 🌐 Internet (chiffré) ⬅️ 🔐</span>
                <span class="bg-sky-600 text-white px-3 py-1 rounded-full">☁️ Cloud (VPC)</span>
              </div>
            </div>
          </div>
        `
      },
      { // slide 3 - Direct Connect / ExpressRoute / Interconnect
        type: "content",
        title: "⚡ Liaisons privées dédiées : Direct Connect, ExpressRoute, Interconnect",
        content: `
          <div class="space-y-4">
            <p class="text-gray-700">Pour des applications critiques, on utilise une connexion <strong class="text-indigo-700">privée et dédiée</strong> qui ne passe pas par Internet. Chaque cloud provider offre son service :</p>
            <div class="overflow-x-auto">
              <table class="min-w-full bg-white border border-gray-200 rounded-xl shadow-sm text-sm">
                <thead class="bg-indigo-100">
                  <tr><th class="px-4 py-2 border">Fournisseur</th><th class="px-4 py-2 border">Service dédié</th><th class="px-4 py-2 border">Débit typique</th></tr>
                </thead>
                <tbody>
                  <tr class="border-b"><td class="px-4 py-2 font-semibold">AWS</td><td class="px-4 py-2">AWS Direct Connect</td><td class="px-4 py-2">1 Gbps / 10 Gbps / 100 Gbps</td></tr>
                  <tr class="border-b bg-gray-50"><td class="px-4 py-2 font-semibold">Azure</td><td class="px-4 py-2">ExpressRoute</td><td class="px-4 py-2">50 Mbps - 100 Gbps</td></tr>
                  <tr><td class="px-4 py-2 font-semibold">GCP</td><td class="px-4 py-2">Cloud Interconnect</td><td class="px-4 py-2">10 Gbps / 100 Gbps (ou partenaire)</td></tr>
                </tbody>
              </table>
            </div>
            <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-500 mt-2">
              <p class="font-semibold text-green-800">✅ Avantages majeurs :</p>
              <ul class="list-disc ml-5 text-gray-700 mt-1">
                <li>Latence ultra faible et constante (pas de congestion Internet)</li>
                <li>Sécurité renforcée (liaison physique privée)</li>
                <li>Bande passante garantie, idéal pour big data / bases de données répliquées</li>
              </ul>
            </div>
            <div class="text-center text-sm text-gray-500 italic mt-2">🎨 Schéma simplifié : Data center ← Fibre privée → Cloud Provider (peering)</div>
          </div>
        `
      },
      { // slide 4 - architecture hybride résiliente
        type: "content",
        title: "🏛️ Architecture hybride résiliente : Conception robuste",
        content: `
          <div class="space-y-5">
            <p class="text-gray-700">Une architecture <strong class="text-indigo-700">hybride résiliente</strong> combine ressources on-premise et cloud pour résister aux pannes. Voici les ingrédients clés :</p>
            <div class="grid md:grid-cols-2 gap-4">
              <div class="bg-white shadow rounded-lg p-3 border-t-4 border-indigo-400">
                <h4 class="font-bold">🔁 Redondance des connexions</h4>
                <p class="text-sm">Deux tunnels VPN (ou deux connexions Direct Connect) vers deux zones de disponibilité différentes.</p>
              </div>
              <div class="bg-white shadow rounded-lg p-3 border-t-4 border-indigo-400">
                <h4 class="font-bold">🔄 Failover automatique</h4>
                <p class="text-sm">Utilisation de BGP (Border Gateway Protocol) pour basculer le trafic en cas de panne d'une liaison.</p>
              </div>
              <div class="bg-white shadow rounded-lg p-3 border-t-4 border-indigo-400">
                <h4 class="font-bold">📦 Déploiement multi-région</h4>
                <p class="text-sm">Répliquer des machines critiques dans une autre région cloud pour éviter un sinistre local.</p>
              </div>
              <div class="bg-white shadow rounded-lg p-3 border-t-4 border-indigo-400">
                <h4 class="font-bold">🛡️ Monitoring & alerting</h4>
                <p class="text-sm">Surveiller la latence, les pertes de paquets via CloudWatch / Azure Monitor.</p>
              </div>
            </div>
            <!-- Exemple de dessin d'architecture avec flex et SVG inline simple -->
            <div class="bg-gray-100 p-4 rounded-xl mt-3 text-center">
              <p class="font-mono text-sm font-bold mb-2">📐 Architecture Hybride Résiliente (vue simplifiée)</p>
              <div class="flex flex-wrap justify-center items-center gap-2 text-xs md:text-sm">
                <div class="bg-white p-2 rounded shadow">🏢 On-Premise</div>
                <div class="text-indigo-600 font-bold">⬌</div>
                <div class="bg-green-100 p-2 rounded shadow">🔗 VPN Primaire</div>
                <div class="bg-green-100 p-2 rounded shadow">🔗 VPN Secondaire</div>
                <div class="text-indigo-600 font-bold">⬌</div>
                <div class="bg-blue-100 p-2 rounded shadow">☁️ VPC Cloud (AZ A + AZ B)</div>
              </div>
              <p class="text-xs text-gray-500 mt-3">Le trafic peut emprunter l'un ou l'autre tunnel : si le primaire tombe en panne, BGP bascule sur le secondaire automatiquement ⚡</p>
            </div>
            <div class="bg-amber-50 p-3 rounded-lg text-amber-800 text-sm">
              💡 Exemple concret : Une banque à Douala garde ses données sensibles sur site, mais utilise AWS Direct Connect pour faire du calcul intensif et backup hors site.
            </div>
          </div>
        `
      },
      { // slide 5 - résumé / notions clés (pour réviser)
        type: "recap",
        content: `
          <div class="h-full flex flex-col justify-center">
            <h3 class="text-xl font-bold text-indigo-800 mb-4">📌 Récapitulons ensemble !</h3>
            <div class="space-y-3">
              <div class="flex items-start gap-2"><span class="text-indigo-600 text-lg">✅</span> <span><strong>VPN IPsec</strong> : solution économique, sécurisée, sur Internet.</span></div>
              <div class="flex items-start gap-2"><span class="text-indigo-600 text-lg">✅</span> <span><strong>Direct Connect / ExpressRoute / Interconnect</strong> : connexion privée, faible latence, sans Internet.</span></div>
              <div class="flex items-start gap-2"><span class="text-indigo-600 text-lg">✅</span> <span><strong>Architecture hybride résiliente</strong> : redondance, BGP, multi-AZ pour éviter toute interruption.</span></div>
            </div>
            <div class="mt-8 p-4 bg-indigo-100 rounded-xl text-center">
              <p class="font-semibold">🔧 Mission pour vous : Imaginez une entreprise de e-commerce avec serveurs physiques à Yaoundé souhaitant utiliser le cloud pour gérer les pics de black friday. Quelle solution hybride choisiriez-vous ? </p>
            </div>
            <p class="text-xs text-gray-400 mt-6 text-center">Leçon inspirée des meilleures pratiques AWS, Azure & GCP 🌍</p>
          </div>
        `
      }
    ];

    let currentSlide = 0;
    let total = slidesData.length;

    // Fonction pour générer le HTML d'un slide selon son type
    function renderSlide(slide, index) {
      const { type, content, title } = slide;
      if (type === "title") {
        return `<div class="slide slide-active" data-slide="${index}">${content}</div>`;
      } else if (type === "objectifs") {
        return `<div class="slide slide-active" data-slide="${index}"><div class="h-full">${content}</div></div>`;
      } else if (type === "content") {
        return `<div class="slide slide-active" data-slide="${index}">
                  <h3 class="text-xl md:text-2xl font-bold text-indigo-800 border-b border-indigo-200 pb-2 mb-5">${title || 'Contenu'}</h3>
                  <div>${content}</div>
                </div>`;
      } else if (type === "recap") {
        return `<div class="slide slide-active" data-slide="${index}">
                  <div>${content}</div>
                </div>`;
      }
      return `<div class="slide slide-active" data-slide="${index}"><div>${content}</div></div>`;
    }

    // Construction du conteneur
    function buildSlides() {
      let slidesHtml = '';
      slidesData.forEach((slide, idx) => {
        slidesHtml += renderSlide(slide, idx);
      });
      $('#slides-container').html(slidesHtml);
      $('#totalSlides').text(total);
      updateSlideVisibility();
      updateCounter();
      updateButtonsState();
    }

    function updateSlideVisibility() {
      $('.slide').each(function(idx) {
        if(idx === currentSlide) {
          $(this).removeClass('slide-hidden').addClass('slide-active').css('display', 'block');
        } else {
          $(this).removeClass('slide-active').addClass('slide-hidden').css('display', 'none');
        }
      });
    }

    function updateCounter() {
      $('#currentSlideIdx').text(currentSlide + 1);
    }

    function updateButtonsState() {
      if (currentSlide === 0) {
        $('#prevSlide').prop('disabled', true).addClass('opacity-50 cursor-not-allowed');
      } else {
        $('#prevSlide').prop('disabled', false).removeClass('opacity-50 cursor-not-allowed');
      }
      if (currentSlide === total - 1) {
        $('#nextSlide').prop('disabled', true).addClass('opacity-50 cursor-not-allowed');
      } else {
        $('#nextSlide').prop('disabled', false).removeClass('opacity-50 cursor-not-allowed');
      }
    }

    function goNext() {
      if (currentSlide < total - 1) {
        currentSlide++;
        updateSlideVisibility();
        updateCounter();
        updateButtonsState();
        // scroll en haut pour lisibilité sur mobile
        $('html, body').animate({ scrollTop: $('#slides-container').offset().top - 20 }, 200);
      }
    }

    function goPrev() {
      if (currentSlide > 0) {
        currentSlide--;
        updateSlideVisibility();
        updateCounter();
        updateButtonsState();
        $('html, body').animate({ scrollTop: $('#slides-container').offset().top - 20 }, 200);
      }
    }

    // Événements et toucher swipe pour mobile (simple)
    let touchStartX = 0;
    let touchEndX = 0;
    $('#slides-container').on('touchstart', function(e) {
      touchStartX = e.originalEvent.touches[0].clientX;
    });
    $('#slides-container').on('touchend', function(e) {
      touchEndX = e.originalEvent.changedTouches[0].clientX;
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) {
          goPrev();
        } else {
          goNext();
        }
      }
    });

    $(document).ready(function() {
      buildSlides();
      $('#nextSlide').on('click', goNext);
      $('#prevSlide').on('click', goPrev);
      // Support clavier : flèches droite/gauche
      $(document).keydown(function(e) {
        if (e.key === 'ArrowRight') {
          goNext();
          e.preventDefault();
        } else if (e.key === 'ArrowLeft') {
          goPrev();
          e.preventDefault();
        }
      });
    });
  </script>
</body>
</html>
