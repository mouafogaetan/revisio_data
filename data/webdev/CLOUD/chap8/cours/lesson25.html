<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 25 : CloudFormation & ARM - Initiation au Cloud Computing</title>
  <!-- Tailwind CSS + Font Awesome (pour quelques icônes) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules éventuelles) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions douces pour slides */
    .slide {
      transition: opacity 0.3s ease-in-out;
    }
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    /* couleurs lisibles sans fatigue oculaire */
    .card-bg {
      background-color: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(2px);
    }
    .btn-nav {
      transition: all 0.2s ease;
    }
    .btn-nav:hover {
      transform: scale(1.02);
      background-color: #1e40af;
    }
    .progress-bar {
      transition: width 0.3s ease;
    }
    /* pour les petites écrans, ajustement des textes */
    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }
      .slide-content {
        padding: 1rem;
      }
    }
  </style>
</head>
<body class="flex flex-col min-h-screen p-4 md:p-6">

  <div class="max-w-5xl mx-auto w-full bg-white/70 rounded-3xl shadow-2xl overflow-hidden border border-blue-100">
    <!-- En-tête avec titre de matière / classe -->
    <div class="bg-gradient-to-r from-blue-800 to-indigo-800 px-5 py-4 md:px-8 text-white flex flex-wrap justify-between items-center">
      <div>
        <p class="text-xs uppercase tracking-wider opacity-80">Classe : Développement Web | Matière : Cloud Computing</p>
        <p class="text-lg font-bold">Leçon 25 : Infrastructure as Code — CloudFormation & ARM</p>
      </div>
      <div class="text-sm bg-white/20 rounded-full px-3 py-1 mt-1 md:mt-0">
        <span id="slideCounter">1 / 8</span>
      </div>
    </div>

    <!-- Zone diapositive principale -->
    <div id="slidesContainer" class="relative min-h-[550px] md:min-h-[600px] bg-cover bg-center" style="background-image: radial-gradient(circle at 10% 20%, rgba(219, 234, 254, 0.4) 0%, rgba(255,255,255,0.8) 90%);">
      <!-- les slides seront injectées ici dynamiquement via jQuery -->
    </div>

    <!-- Navigation + progression -->
    <div class="bg-gray-50 px-5 py-4 md:px-8 border-t border-blue-100 flex flex-col md:flex-row justify-between items-center gap-3">
      <div class="flex gap-3 order-2 md:order-1">
        <button id="prevBtn" class="btn-nav bg-blue-600 hover:bg-blue-800 text-white font-semibold py-2 px-6 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">◀ Précédent</button>
        <button id="nextBtn" class="btn-nav bg-blue-600 hover:bg-blue-800 text-white font-semibold py-2 px-6 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">Suivant ▶</button>
      </div>
      <div class="w-full md:w-1/3 order-1 md:order-2">
        <div class="bg-gray-200 rounded-full h-3 w-full overflow-hidden">
          <div id="progressFill" class="progress-bar bg-blue-600 h-3 rounded-full" style="width: 0%;"></div>
        </div>
        <p class="text-xs text-gray-500 text-center mt-1">Progression du cours</p>
      </div>
      <div class="text-sm text-gray-500 order-3">
        <span id="pageIndicator">Slide 1 sur 8</span>
      </div>
    </div>
  </div>

  <footer class="text-center text-gray-500 text-xs mt-6">
    ⚡ Cours conçu pour les élèves camerounais — Initiation au Cloud Computing | Infrastructure as Code
  </footer>

  <script>
    // Définition des slides pour la leçon 25 (CloudFormation & ARM)
    // Basé sur les objectifs de lesson25 du programme : Créer des stacks avec CloudFormation (YAML/JSON), utiliser les templates ARM et paramètres, comparer avec Terraform (multicloud vs natif)
    const slides = [
      { // slide 0 : titre
        type: "title",
        title: "📄 Leçon 25 : AWS CloudFormation & Azure ARM",
        subtitle: "L'Infrastructure as Code (IaC) native du cloud",
        description: "Définir son infrastructure logicielle avec des modèles déclaratifs"
      },
      { // slide 1 : objectifs pédagogiques
        type: "objectifs",
        title: "🎯 Objectifs de la leçon",
        objectives: [
          "✅ Créer et déployer des stacks avec AWS CloudFormation (YAML/JSON).",
          "✅ Utiliser les templates ARM (Azure Resource Manager) et gérer les paramètres.",
          "✅ Comparer CloudFormation / ARM avec Terraform (multicloud vs natif).",
          "✅ Comprendre les avantages, limites et bonnes pratiques de l'IaC native."
        ]
      },
      { // slide 2 : Qu'est-ce que CloudFormation ?
        type: "content",
        title: "☁️ AWS CloudFormation – Présentation",
        content: `<p class="mb-3"><span class="font-bold text-blue-800">CloudFormation</span> est le service d'orchestration d'infrastructure d'AWS. Il permet de décrire toutes vos ressources AWS (EC2, VPC, S3, RDS, etc.) dans un fichier <strong>JSON ou YAML</strong> appelé <em>template</em>.</p>
        <ul class="list-disc pl-6 space-y-2">
          <li><span class="font-semibold">Stack :</span> ensemble de ressources créées et gérées collectivement.</li>
          <li><span class="font-semibold">Template :</span> la recette déclarative de l'infrastructure.</li>
          <li><span class="font-semibold">Modifications :</span> CloudFormation calcule les changements et applique des mises à jour sans downtime (change sets).</li>
          <li><span class="font-semibold">Avantage clé :</span> reproductibilité, versioning, rollback automatique.</li>
        </ul>
        <div class="mt-4 bg-blue-50 p-3 rounded-lg border-l-4 border-blue-500 text-sm">
          💡 <strong>Exemple simple (YAML) :</strong> un bucket S3 et une instance EC2 décrits dans un seul template.
        </div>`
      },
      { // slide 3 : Créer une stack CloudFormation (workflow)
        type: "content",
        title: "⚙️ Créer & gérer une stack CloudFormation",
        content: `<p><strong>Étapes typiques :</strong></p>
        <ol class="list-decimal pl-6 space-y-1 mt-2">
          <li>Écrire le template (fichier .yaml ou .json).</li>
          <li>Utiliser la console AWS, AWS CLI ou SDK pour créer une stack.</li>
          <li>CloudFormation provisionne les ressources dans l'ordre (dépendances gérées).</li>
          <li>En cas d'échec, rollback automatique (supprime les ressources créées).</li>
          <li>Mettre à jour la stack en modifiant le template → CloudFormation applique les deltas.</li>
        </ol>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
          <div class="bg-gray-100 p-3 rounded text-xs font-mono overflow-auto">
            <strong>📄 template exemple (YAML)</strong><br>
            Resources:<br>
 &nbsp;&nbsp;MyBucket:<br>
 &nbsp;&nbsp;&nbsp;&nbsp;Type: AWS::S3::Bucket<br>
 &nbsp;&nbsp;MyInstance:<br>
 &nbsp;&nbsp;&nbsp;&nbsp;Type: AWS::EC2::Instance<br>
 &nbsp;&nbsp;&nbsp;&nbsp;Properties:<br>
 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ImageId: ami-0abcdef123
          </div>
          <div class="bg-gray-100 p-3 rounded text-xs font-mono">
            <strong>🛠️ CLI create-stack</strong><br>
            aws cloudformation create-stack \<br>
            --stack-name monprojet \<br>
            --template-body file://template.yaml
          </div>
        </div>`
      },
      { // slide 4 : Azure ARM Templates (infrastructure as code Azure)
        type: "content",
        title: "🔷 Azure Resource Manager (ARM) Templates",
        content: `<p>ARM est le modèle IaC natif de Microsoft Azure. Basé sur des fichiers <strong>JSON (ou Bicep)</strong>, il permet de déployer des ressources de façon cohérente et idempotente.</p>
        <ul class="list-disc pl-6 mt-2 space-y-1">
          <li><strong>Template ARM :</strong> déclare resources, paramètres, variables, outputs.</li>
          <li><strong>Paramètres :</strong> fichiers .parameters.json pour injecter des valeurs (environnements dev/prod).</li>
          <li><strong>Groupes de ressources :</strong> conteneur logique pour les ressources déployées via un template.</li>
          <li><strong>Déploiement incrémental ou complet :</strong> contrôle du comportement.</li>
        </ul>
        <div class="mt-3 p-3 bg-indigo-50 rounded text-sm border border-indigo-200">
          📌 Azure propose aussi <strong>Bicep</strong> (langage plus lisible) qui se compile en JSON ARM. C’est la voie recommandée pour les nouveaux projets.
        </div>
        <div class="mt-2 text-xs bg-white rounded p-2 font-mono">
          Exemple ARM (ressource compte storage) :<br>
          { "resources": [ { "type": "Microsoft.Storage/storageAccounts", ... } ] }
        </div>`
      },
      { // slide 5 : Comparaison avec Terraform (multicloud vs natif)
        type: "content",
        title: "⚖️ CloudFormation / ARM vs Terraform",
        content: `<p class="mb-3">Terraform (HashiCorp) est un outil IaC <strong>multicloud</strong> tandis que CloudFormation et ARM sont des solutions <strong>natives</strong> (spécifiques à un fournisseur). Voici les différences clés :</p>
        <div class="overflow-x-auto">
          <table class="min-w-full bg-white rounded-lg shadow text-sm border">
            <thead class="bg-gray-100"><tr><th class="px-3 py-2 border">Critère</th><th class="px-3 py-2 border">CloudFormation/ARM</th><th class="px-3 py-2 border">Terraform</th></tr></thead>
            <tbody>
              <tr><td class="border px-3 py-1">Portabilité</td><td class="border px-3 py-1">Natif AWS ou Azure uniquement</td><td class="border px-3 py-1">Multicloud (AWS, Azure, GCP, OCI...)</td></tr>
              <tr><td class="border px-3 py-1">Langage</td><td class="border px-3 py-1">YAML/JSON (CFN) ou JSON/Bicep (ARM)</td><td class="border px-3 py-1">HCL (HashiCorp Language) lisible</td></tr>
              <tr><td class="border px-3 py-1">État (state)</td><td class="border px-3 py-1">Géré automatiquement par le service cloud</td><td class="border px-3 py-1">Fichier d'état local ou distant (backend)</td></tr>
              <tr><td class="border px-3 py-1">Rollback & drift</td><td class="border px-3 py-1">Rollback intégré, drift détection via drift detection</td><td class="border px-3 py-1">Plan/Apply, outils tiers pour drift</td></tr>
            </tbody>
          </table>
        </div>
        <p class="mt-3 text-sm italic">👉 <strong>Choix :</strong> si vous êtes engagé sur un seul cloud → privilégiez la solution native (meilleure intégration, mises à jour rapides). Pour une stratégie multicloud ou évitement du lock-in → Terraform est excellent.</p>`
      },
      { // slide 6 : Bonnes pratiques & paramétrage des templates
        type: "content",
        title: "📐 Paramètres, sorties et bonnes pratiques",
        content: `<div class="space-y-3">
          <div><span class="font-semibold text-blue-700">🔧 Paramètres (Parameters) :</span> rendre les templates réutilisables (ex: taille d'instance, environnement, région).</div>
          <div><span class="font-semibold text-blue-700">📤 Sorties (Outputs) :</span> récupérer des informations après déploiement (URL, adresse IP, nom de bucket).</div>
          <div><span class="font-semibold text-blue-700">🧩 Mappings & Conditions :</span> adapter le comportement selon l'environnement.</div>
          <div><span class="font-semibold text-blue-700">♻️ Nested stacks (CFN) / linked templates (ARM) :</span> modulariser les infrastructures complexes.</div>
          <div class="bg-yellow-50 p-3 rounded border-l-4 border-yellow-400 text-sm">🎯 <strong>Bonnes pratiques :</strong> versionner vos templates dans Git, utiliser des pipelines CI/CD (CodePipeline, Azure DevOps), valider les templates avec des linters (cfn-lint, arm-ttk).</div>
        </div>`
      },
      { // slide 7 : Récapitulatif & conclusion de la leçon
        type: "conclusion",
        title: "🏁 Récapitulatif – Ce qu'il faut retenir",
        contentSummary: [
          "✅ CloudFormation (AWS) et ARM (Azure) sont des services d'Infrastructure as Code natifs, utilisant JSON/YAML ou Bicep.",
          "✅ Permettent de créer, mettre à jour et supprimer des stacks de ressources de manière déclarative.",
          "✅ Gèrent les dépendances, le rollback automatique, l'idempotence et les changements contrôlés.",
          "✅ Tandis que Terraform est l'alternative multicloud populaire, les outils natifs offrent une intégration profonde et une rapidité de support des nouvelles fonctionnalités cloud.",
          "🎓 Savoir utiliser CloudFormation ou ARM est un atout majeur pour tout administrateur cloud / DevOps."
        ],
        callToAction: "🎯 Prochaine étape : atelier pratique – créer une stack avec CloudFormation (bucket S3 + sécurité) et un template ARM pour une VM Azure."
      }
    ];

    let currentSlide = 0;
    const totalSlides = slides.length;

    // Fonction pour générer le HTML d'un slide selon son type
    function renderSlide(slide, idx) {
      const isActive = (idx === currentSlide);
      const displayStyle = isActive ? "block" : "hidden";
      let innerHtml = "";

      if (slide.type === "title") {
        innerHtml = `
          <div class="flex flex-col justify-center items-center text-center h-full py-12 px-5">
            <div class="bg-white/80 backdrop-blur-sm rounded-3xl p-6 md:p-10 shadow-xl max-w-2xl mx-auto border border-blue-200">
              <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent">${escapeHtml(slide.title)}</h1>
              <p class="text-xl md:text-2xl font-semibold text-gray-700 mt-4">${escapeHtml(slide.subtitle)}</p>
              <p class="text-gray-600 mt-3 italic">${escapeHtml(slide.description)}</p>
              <div class="mt-8 flex justify-center">
                <div class="animate-bounce bg-blue-100 rounded-full p-2 w-10 h-10 flex items-center justify-center text-blue-600">▼</div>
              </div>
            </div>
          </div>
        `;
      } 
      else if (slide.type === "objectifs") {
        innerHtml = `
          <div class="h-full py-8 px-4 md:px-8">
            <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 border-l-8 border-blue-500">
              <h2 class="text-2xl md:text-3xl font-bold text-blue-800 flex items-center gap-2">🎯 ${escapeHtml(slide.title)}</h2>
              <ul class="mt-5 space-y-3 text-gray-700 text-base md:text-lg">
                ${slide.objectives.map(obj => `<li class="flex items-start gap-2"><span class="text-green-600 text-xl">✔</span> <span>${escapeHtml(obj)}</span></li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      }
      else if (slide.type === "content") {
        innerHtml = `
          <div class="h-full py-6 px-4 md:px-8">
            <div class="bg-white rounded-2xl shadow-md p-5 md:p-7">
              <h2 class="text-2xl font-bold text-indigo-800 border-b border-indigo-200 pb-2 mb-4">📘 ${escapeHtml(slide.title)}</h2>
              <div class="prose prose-blue max-w-none text-gray-700 leading-relaxed">
                ${slide.content}
              </div>
            </div>
          </div>
        `;
      }
      else if (slide.type === "conclusion") {
        innerHtml = `
          <div class="h-full py-8 px-4 md:px-8">
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl shadow-lg p-6 md:p-8 border-t-4 border-green-500">
              <h2 class="text-2xl font-bold text-green-800">✨ ${escapeHtml(slide.title)}</h2>
              <ul class="mt-4 space-y-2 list-disc pl-5 text-gray-800">
                ${slide.contentSummary.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
              </ul>
              <div class="mt-6 bg-white/60 rounded-xl p-4 text-blue-800 font-semibold text-center">
                💬 ${escapeHtml(slide.callToAction)}
              </div>
            </div>
          </div>
        `;
      }

      return `<div id="slide-${idx}" class="slide ${displayStyle} transition-all duration-300 w-full" style="min-height: 550px;">${innerHtml}</div>`;
    }

    // Helper pour échapper les caractères HTML
    function escapeHtml(str) {
      if(!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // Mise à jour de l'affichage des slides
    function updateSlides() {
      // afficher/masquer chaque slide
      for(let i = 0; i < totalSlides; i++) {
        const slideDiv = $(`#slide-${i}`);
        if (slideDiv.length) {
          if (i === currentSlide) slideDiv.removeClass('hidden').addClass('block');
          else slideDiv.removeClass('block').addClass('hidden');
        }
      }
      // Mettre à jour les contrôles
      $('#prevBtn').prop('disabled', currentSlide === 0);
      $('#nextBtn').prop('disabled', currentSlide === totalSlides - 1);
      const percent = ((currentSlide + 1) / totalSlides) * 100;
      $('#progressFill').css('width', `${percent}%`);
      $('#slideCounter').text(`${currentSlide+1} / ${totalSlides}`);
      $('#pageIndicator').text(`Slide ${currentSlide+1} sur ${totalSlides}`);
    }

    // Charger tous les slides dans le conteneur
    function buildAllSlides() {
      const container = $('#slidesContainer');
      container.empty();
      for(let i=0; i < slides.length; i++) {
        const slideHtml = renderSlide(slides[i], i);
        container.append(slideHtml);
      }
      updateSlides();
      // Appliquer MathJax sur nouveau contenu (si des formules mathématiques étaient présentes, on rafraîchit)
      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    // Navigation événements
    function goPrev() {
      if (currentSlide > 0) {
        currentSlide--;
        updateSlides();
        scrollToTop();
      }
    }
    function goNext() {
      if (currentSlide < totalSlides - 1) {
        currentSlide++;
        updateSlides();
        scrollToTop();
      }
    }
    function scrollToTop() {
      $('html, body').animate({ scrollTop: $('#slidesContainer').offset().top - 20 }, 200);
    }

    $(document).ready(function() {
      buildAllSlides();

      $('#prevBtn').on('click', goPrev);
      $('#nextBtn').on('click', goNext);
      // raccourcis clavier gauche/droite
      $(document).on('keydown', function(e) {
        if (e.key === 'ArrowLeft') {
          goPrev();
          e.preventDefault();
        } else if (e.key === 'ArrowRight') {
          goNext();
          e.preventDefault();
        }
      });
    });
  </script>
</body>
</html>
