<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Cloud Computing",
  "classe": "Développement Web",
  "sequence": "Séquence 2 - Infrastructure, Stockage et Déploiement Cloud",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Concepts et Modèles de Services Cloud",
      "points": "8 points",
      "enonce": "<div style='padding: 10px;'><p>Vous êtes consultant en transformation numérique et vous accompagnez une entreprise camerounaise de livraison de repas nommée <strong>'Yaoundé Express'</strong> dans sa migration vers le cloud. L'entreprise connaît une croissance rapide et souhaite moderniser son infrastructure informatique.</p><p>Son infrastructure actuelle repose sur des serveurs physiques hébergés dans un local à Yaoundé, avec une équipe technique qui gère tout (serveurs, bases de données, mises à jour, sauvegardes).</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1.1) Définition et caractéristiques du cloud (2 points)</strong></p><p>En vous basant sur ce que vous avez appris, définissez le <strong>cloud computing</strong>. Citez et expliquez brièvement <strong>quatre (4) caractéristiques essentielles</strong> du cloud qui pourraient bénéficier à Yaoundé Express.</p></div>",
          "reponse": "<div><p><strong>Définition du cloud computing :</strong> Le cloud computing est un modèle de fourniture de ressources informatiques (serveurs, stockage, bases de données, réseaux, logiciels) à la demande, via Internet, avec un paiement à l'usage [citation:7].</p><p><strong>Caractéristiques essentielles :</strong></p><ul><li><strong>Self-service à la demande :</strong> Yaoundé Express peut provisionner des ressources (serveurs, stockage) sans intervention humaine, simplement via une console web ou une API.</li><li><strong>Accès réseau large :</strong> Les services sont accessibles depuis n'importe quel appareil connecté à Internet (ordinateurs, smartphones des livreurs).</li><li><strong>Mutualisation des ressources (Pooling) :</strong> Les ressources physiques sont partagées entre plusieurs clients, ce qui permet d'optimiser les coûts.</li><li><strong>Élasticité rapide :</strong> L'infrastructure peut s'adapter automatiquement à la charge. Si Yaoundé Express a un pic de commandes le week-end, le cloud s'adapte sans surcoût.</li><li><strong>Paiement à l'usage :</strong> L'entreprise ne paie que pour les ressources qu'elle consomme, ce qui réduit les coûts par rapport à l'achat de serveurs physiques.</li></ul></div>"
        },
        {
          "question": "<div><p><strong>1.2) Modèles de services (IaaS, PaaS, SaaS) (3 points)</strong></p><p>Expliquez ce que sont les trois modèles de services du cloud : <strong>IaaS, PaaS et SaaS</strong>. Pour chacun, donnez un exemple de service qui pourrait aider Yaoundé Express, en justifiant votre choix.</p></div>",
          "reponse": "<div><p><strong>IaaS (Infrastructure as a Service) :</strong> Fournit des ressources d'infrastructure virtualisées comme des machines virtuelles, du stockage et des réseaux. L'entreprise gère l'OS, les applications et les données.</p><ul><li><strong>Exemple pour Yaoundé Express :</strong> Utiliser AWS EC2 ou Azure VMs pour héberger leur site web et leur API de commandes. Ils ont le contrôle total sur l'OS et peuvent migrer leurs applications existantes sans changement majeur.</li></ul><p><strong>PaaS (Platform as a Service) :</strong> Fournit une plateforme de développement et de déploiement d'applications sans gérer l'OS ou l'infrastructure sous-jacente [citation:5].</p><ul><li><strong>Exemple pour Yaoundé Express :</strong> Utiliser Heroku ou Azure App Service pour déployer leur application Node.js. Ils se concentrent sur le code et laissent la gestion du serveur et du scaling à la plateforme.</li></ul><p><strong>SaaS (Software as a Service) :</strong> Fournit des logiciels prêts à l'emploi, accessibles via un navigateur. L'utilisateur ne gère rien du tout [citation:1].</p><ul><li><strong>Exemple pour Yaoundé Express :</strong> Utiliser Google Workspace ou Microsoft Office 365 pour la messagerie et la collaboration de leurs équipes. Pas d'installation ni de maintenance.</li></ul></div>"
        },
        {
          "question": "<div><p><strong>1.3) Choix du modèle de cloud (3 points)</strong></p><p>Yaoundé Express hésite entre un <strong>cloud public, un cloud privé et une architecture hybride</strong>. Comparez ces trois modèles et recommandez celui qui serait le plus adapté à leur situation, en justifiant votre réponse.</p></div>",
          "reponse": "<div><p><strong>Cloud Public :</strong> Ressources partagées avec d'autres clients, hébergées chez un fournisseur comme AWS ou Azure. Avantages : coût réduit, scalabilité, pas de gestion matérielle. Inconvénients : moins de contrôle, partage des ressources.</p><p><strong>Cloud Privé :</strong> Ressources dédiées à une seule organisation, hébergées en interne ou par un fournisseur. Avantages : contrôle total, sécurité renforcée. Inconvénients : coût élevé, maintenance complexe.</p><p><strong>Cloud Hybride :</strong> Combinaison de cloud public et privé. Permet de garder les données sensibles en privé et d'utiliser le public pour les pics de charge [citation:3].</p><p><strong>Recommandation pour Yaoundé Express :</strong> Une <strong>architecture hybride</strong> serait idéale. Ils peuvent garder les données sensibles (informations des clients, données de paiement) sur leur cloud privé ou dans un environnement sécurisé, tout en utilisant le cloud public pour gérer les pics de commandes, héberger leur site web et leur API, et profiter de l'élasticité du cloud. Cela leur permet de contrôler les coûts et la sécurité tout en bénéficiant de la flexibilité du cloud public.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Stockage et Sécurité dans le Cloud",
      "points": "7 points",
      "enonce": "<div style='padding: 10px;'><p>Yaoundé Express a décidé d'adopter une architecture hybride. Ils ont choisi AWS comme fournisseur de cloud public. L'équipe technique doit maintenant décider comment gérer le stockage et la sécurité de leurs données.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>2.1) Types de stockage cloud (3 points)</strong></p><p>Expliquez les différences entre les trois principaux types de stockage dans le cloud : <strong>stockage objet, stockage bloc et stockage fichier</strong>.</p><p>Pour chaque type, donnez un exemple d'utilisation chez Yaoundé Express et proposez un service AWS correspondant.</p></div>",
          "reponse": "<div><p><strong>Stockage Objet :</strong> Stocke les données comme des objets (fichiers) avec des métadonnées. Accès via API HTTP. Idéal pour les données non structurées [citation:5].</p><ul><li><strong>Exemple Yaoundé Express :</strong> Photos des plats, logos, images du site web.</li><li><strong>Service AWS :</strong> Amazon S3 (Simple Storage Service).</li></ul><p><strong>Stockage Bloc :</strong> Stocke les données en blocs, comme un disque dur virtuel. Attaché à une VM, formaté avec un système de fichiers.</p><ul><li><strong>Exemple Yaoundé Express :</strong> Disques pour les bases de données MySQL qui nécessitent une performance élevée.</li><li><strong>Service AWS :</strong> Amazon EBS (Elastic Block Store).</li></ul><p><strong>Stockage Fichier :</strong> Système de fichiers partagé accessible par plusieurs VMs via NFS ou SMB.</p><ul><li><strong>Exemple Yaoundé Express :</strong> Partage de fichiers entre plusieurs serveurs applicatifs pour les logs ou les configurations.</li><li><strong>Service AWS :</strong> Amazon EFS (Elastic File System).</li></ul></div>"
        },
        {
          "question": "<div><p><strong>2.2) Gestion des identités et des accès (2 points)</strong></p><p>Expliquez le principe du <strong>moindre privilège</strong> dans le cadre de la sécurité cloud. Comment Yaoundé Express peut-il l'appliquer avec <strong>AWS IAM</strong> ? Donnez un exemple concret de politique d'accès.</p></div>",
          "reponse": "<div><p><strong>Principe du moindre privilège :</strong> Chaque utilisateur ou service ne doit avoir que les droits strictement nécessaires à l'accomplissement de ses tâches, ni plus ni moins [citation:5].</p><p><strong>Application avec AWS IAM (Identity and Access Management) :</strong></p><ul><li>Créer des <strong>rôles IAM</strong> pour chaque type d'utilisateur ou de service.</li><li>Ne pas utiliser les clés d'accès root pour les tâches quotidiennes.</li><li>Attribuer des politiques précises, en évitant les politiques trop larges comme <code>AdministratorAccess</code>.</li></ul><p><strong>Exemple concret :</strong> L'équipe de développement de Yaoundé Express n'a besoin que de droits pour déployer l'application sur les serveurs. On peut leur créer un groupe avec une politique qui autorise uniquement :</p><ul><li>L'accès en lecture/écriture sur un bucket S3 spécifique (photos des plats).</li><li>La possibilité de déployer des mises à jour sur l'environnement de développement.</li></ul></div>"
        },
        {
          "question": "<div><p><strong>2.3) Gestion des secrets (2 points)</strong></p><p>Les applications de Yaoundé Express utilisent des mots de passe, des clés API (Stripe, Orange Money) et des chaînes de connexion à la base de données. Pourquoi est-il <strong>dangereux</strong> de stocker ces secrets dans le code source ? Proposez une solution cloud sécurisée.</p></div>",
          "reponse": "<div><p><strong>Dangers du stockage dans le code source :</strong></p><ul><li>Les secrets sont visibles dans l'historique Git (même après suppression).</li><li>Un développeur malveillant ou un accès non autorisé au dépôt expose toutes les données sensibles.</li><li>En cas de compromission d'un service, les secrets sont directement accessibles.</li></ul><p><strong>Solution cloud sécurisée : AWS Secrets Manager</strong></p><p>Yaoundé Express peut utiliser <strong>AWS Secrets Manager</strong> pour centraliser et sécuriser leurs secrets. Les avantages :</p><ul><li><strong>Chiffrement :</strong> Les secrets sont chiffrés au repos avec KMS.</li><li><strong>Rotation automatique :</strong> Les secrets peuvent être automatiquement renouvelés.</li><li><strong>Audit :</strong> Tous les accès aux secrets sont journalisés dans CloudTrail.</li><li><strong>Accès contrôlé :</strong> Seuls les services ayant le rôle approprié peuvent accéder aux secrets.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Virtualisation et Conteneurisation",
      "points": "5 points",
      "enonce": "<div style='padding: 10px;'><p>Pour moderniser son application, Yaoundé Express souhaite adopter les conteneurs. L'équipe technique doit comprendre les différences entre les machines virtuelles et les conteneurs.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>3.1) VM vs Conteneur (3 points)</strong></p><p>Expliquez les différences fondamentales entre une <strong>machine virtuelle (VM)</strong> et un <strong>conteneur</strong> en termes d'isolation, de performance et d'utilisation des ressources.</p><p>Dans quel cas Yaoundé Express devrait-il privilégier les conteneurs plutôt que les VMs ?</p></div>",
          "reponse": "<div><p><strong>Machine Virtuelle (VM) :</strong> Une VM émule un ordinateur physique complet avec son propre OS. L'hyperviseur (ex: VMware, KVM) gère les ressources matérielles [citation:8].</p><ul><li><strong>Isolation :</strong> Forte, chaque VM a son propre OS isolé.</li><li><strong>Performance :</strong> Léger overhead dû à la virtualisation.</li><li><strong>Ressources :</strong> Consomme plus de mémoire et de stockage (OS complet).</li><li><strong>Démarrage :</strong> Plus lent (minutes).</li></ul><p><strong>Conteneur :</strong> Un conteneur virtualise au niveau du système d'exploitation. Il partage le noyau de l'hôte mais isole les processus (ex: Docker).</p><ul><li><strong>Isolation :</strong> Légère, partage le noyau hôte.</li><li><strong>Performance :</strong> Pratiquement native.</li><li><strong>Ressources :</strong> Léger, ne contient que l'application et ses dépendances.</li><li><strong>Démarrage :</strong> Très rapide (quelques secondes).</li></ul><p><strong>Recommandation :</strong> Yaoundé Express devrait privilégier les <strong>conteneurs</strong> pour :</p><ul><li>Déployer rapidement leurs microservices (API, site web, etc.).</li><li>Bénéficier d'une meilleure densité sur leurs serveurs.</li><li>Faciliter les mises à jour et le scaling horizontal.</li><li>Réduire les coûts d'infrastructure.</li></ul></div>"
        },
        {
          "question": "<div><p><strong>3.2) Docker et Kubernetes (2 points)</strong></p><p>Quelle est la différence entre <strong>Docker</strong> et <strong>Kubernetes</strong> ? Expliquez comment ces deux outils pourraient être utilisés ensemble pour l'application de Yaoundé Express.</p></div>",
          "reponse": "<div><p><strong>Docker :</strong> Est une plateforme pour créer, déployer et exécuter des conteneurs. Il s'agit de l'outil de base pour conteneuriser une application [citation:8].</p><p><strong>Kubernetes (K8s) :</strong> Est un orchestrateur de conteneurs. Il permet de gérer, mettre à l'échelle et assurer la disponibilité des conteneurs en production [citation:8].</p><p><strong>Utilisation combinée chez Yaoundé Express :</strong></p><ol><li><strong>Développement :</strong> Les développeurs utilisent <strong>Docker</strong> pour créer des conteneurs de leurs applications (site web, API, worker, etc.) et les tester localement.</li><li><strong>Production :</strong> Les conteneurs sont déployés sur un cluster <strong>Kubernetes</strong> (EKS sur AWS ou AKS sur Azure). Kubernetes assure :<ul><li>Le scaling automatique en fonction de la charge.</li><li>Le déploiement progressif des nouvelles versions (rolling update).</li><li>La reprise automatique en cas de panne (self-healing).</li></ul></li></ol><p>Docker construit les conteneurs, Kubernetes les orchestre en production.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
