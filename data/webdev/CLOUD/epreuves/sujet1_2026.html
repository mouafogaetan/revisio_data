<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

    crossorigin="anonymous">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Cloud Computing",
  "classe": "Développement Web",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Compréhension des fondamentaux du Cloud",
      "points": "6 pts",
      "enonce": "<p>Cet exercice porte sur les concepts fondamentaux du cloud computing vus dans les leçons 1, 2 et 3. Répondez aux questions suivantes de manière précise et structurée.</p>",
      "questions": [
        {
          "question": "1) Définissez le cloud computing en citant ses cinq caractéristiques essentielles. Expliquez brièvement chacune d'elles.",
          "reponse": "Le cloud computing est un modèle d'accès à un pool configurable de ressources informatiques (réseaux, serveurs, stockage, applications) qui peut être rapidement provisionné et libéré avec un effort de gestion minimal. Ses cinq caractéristiques essentielles sont : <ul><li><strong>Self-service à la demande</strong> : les utilisateurs peuvent provisionner des ressources automatiquement sans interaction humaine avec le fournisseur.</li><li><strong>Accès réseau large</strong> : les ressources sont accessibles depuis n'importe quel terminal via des protocoles standards.</li><li><strong>Mutualisation des ressources</strong> : les ressources sont partagées entre plusieurs clients, avec une allocation dynamique selon la demande.</li><li><strong>Élasticité rapide</strong> : les ressources peuvent être augmentées ou diminuées rapidement, parfois automatiquement.</li><li><strong>Paiement à l'usage</strong> : la facturation est basée sur la consommation réelle des ressources.</li></ul>"
        },
        {
          "question": "2) Distinguez clairement les trois modèles de service cloud (IaaS, PaaS, SaaS) en donnant un exemple concret pour chacun.",
          "reponse": "Les trois modèles de service cloud sont : <ul><li><strong>IaaS (Infrastructure as a Service)</strong> : fournit des ressources informatiques virtualisées comme des machines virtuelles, du stockage et du réseau. L'utilisateur gère l'OS, les applications et les données. <em>Exemple : AWS EC2 (machines virtuelles)</em>.</li><li><strong>PaaS (Platform as a Service)</strong> : fournit une plateforme de développement et d'hébergement d'applications sans gestion de l'infrastructure sous-jacente. <em>Exemple : AWS Elastic Beanstalk ou Heroku</em>.</li><li><strong>SaaS (Software as a Service)</strong> : fournit des applications prêtes à l'emploi accessibles via un navigateur. L'utilisateur n'a rien à gérer. <em>Exemple : Gmail, Office 365, Salesforce</em>.</li></ul>"
        },
        {
          "question": "3) Expliquez les différences entre un cloud public, un cloud privé et un cloud hybride. Citez un avantage et un inconvénient pour chaque modèle.",
          "reponse": "<ul><li><strong>Cloud public</strong> : les ressources sont fournies par un tiers (AWS, Azure, GCP) et partagées entre plusieurs clients. <em>Avantage</em> : coûts réduits, évolutivité illimitée. <em>Inconvénient</em> : moins de contrôle et de sécurité.</li><li><strong>Cloud privé</strong> : l'infrastructure est dédiée à une seule organisation (sur site ou hébergée). <em>Avantage</em> : contrôle total, sécurité renforcée. <em>Inconvénient</em> : coûts élevés, moins scalable.</li><li><strong>Cloud hybride</strong> : combine cloud public et privé, permettant de garder les données sensibles en privé et d'utiliser le public pour les pics de charge. <em>Avantage</em> : flexibilité, sécurité. <em>Inconvénient</em> : complexité de gestion.</li></ul>"
        }
      ]
    },
    {
      "titre": "Écosystème cloud et fournisseurs",
      "points": "7 pts",
      "enonce": "<p>Cet exercice vous permet de tester vos connaissances sur l'écosystème cloud et les principaux fournisseurs vus dans les leçons 4, 5, 6 et 7.</p>",
      "questions": [
        {
          "question": "1) Citez les trois principaux fournisseurs de cloud public et donnez pour chacun un service phare pour le calcul, un pour le stockage et un pour les bases de données. Précisez la part de marché estimée du leader.",
          "reponse": "Les trois principaux fournisseurs sont : <ul><li><strong>AWS (Amazon Web Services)</strong> : leader avec environ <strong>32-34%</strong> de part de marché. Services phares : EC2 (calcul), S3 (stockage objet), RDS (bases de données relationnelles).</li><li><strong>Microsoft Azure</strong> : deuxième avec environ 22% de part de marché. Services phares : Virtual Machines (calcul), Blob Storage (stockage), Azure SQL (bases de données).</li><li><strong>Google Cloud Platform (GCP)</strong> : troisième avec environ 11% de part de marché. Services phares : Compute Engine (calcul), Cloud Storage (stockage), Cloud SQL (bases de données).</li></ul>"
        },
        {
          "question": "2) Expliquez ce que sont une région, une zone de disponibilité (AZ) et un edge location chez un fournisseur cloud. Quelle est l'importance de ces concepts pour la haute disponibilité ?",
          "reponse": "<ul><li><strong>Région</strong> : une zone géographique indépendante qui contient plusieurs zones de disponibilité. Exemple : eu-west-3 (Paris).</li><li><strong>Zone de disponibilité (AZ)</strong> : un ou plusieurs datacenters physiquement séparés au sein d'une région, avec alimentation et refroidissement indépendants. Si une AZ tombe en panne, les autres continuent de fonctionner.</li><li><strong>Edge location</strong> : un site de cache distribué qui permet de servir du contenu (images, vidéos) avec une très faible latence, au plus proche des utilisateurs.</li></ul>L'importance pour la haute disponibilité : les AZ permettent de déployer des applications sur plusieurs datacenters séparés pour assurer la continuité en cas de sinistre (résilience)."
        },
        {
          "question": "3) Comparer AWS, Azure et GCP sur trois critères de votre choix (services, tarifs, couverture géographique, intégration, etc.). Puis, pour un projet de start-up au Cameroun qui développe une application mobile avec analyse de données, quel fournisseur recommanderiez-vous et pourquoi ?",
          "reponse": "Comparaison sur trois critères : <ul><li><strong>Services</strong> : AWS a le plus grand nombre de services et la plus grande maturité. Azure excelle dans l'intégration Microsoft. GCP est leader en Big Data et Machine Learning.</li><li><strong>Couverture géographique</strong> : AWS et Azure ont le plus grand nombre de régions (AWS > 30, Azure > 60). Aucun des trois n'a de région en Afrique subsaharienne (mais Azure a des régions en Afrique du Sud).</li><li><strong>Tarifs</strong> : AWS est souvent moins cher pour les workloads de base, Azure peut être plus compétitif avec des engagements, GCP est compétitif sur le Big Data.</li></ul>Pour une start-up au Cameroun développant une application mobile avec analyse de données, je recommanderais <strong>AWS</strong> pour plusieurs raisons : <ul><li>Large gamme de services (mobilité, analytics, serverless) qui couvre tous les besoins d'une start-up.</li><li>Très bonne documentation et communauté, facilitant l'apprentissage.</li><li>Programmes d'aide pour les start-ups (AWS Activate).</li><li>Paiement à l'usage qui permet de maîtriser les coûts.</li></ul>GCP serait un bon second choix si l'analyse de données est très importante."
        }
      ]
    },
    {
      "titre": "Analyse de cas d'usage",
      "points": "7 pts",
      "enonce": "<p>Une entreprise camerounaise de e-commerce (vendeurs de produits artisanaux) souhaite migrer son application web vers le cloud. Elle a actuellement un serveur physique hébergé dans un datacenter local. Son trafic est très variable (pics pendant les fêtes de fin d'année, périodes creuses le reste de l'année). Ses besoins :</p><ul><li>Hébergement d'une application web</li><li>Base de données des clients et des commandes</li><li>Stockage des images des produits (volumineuses)</li><li>Analyse des données de vente (tableaux de bord)</li><li>Sécurité des données des clients</li></ul><p>Analysez ce cas et proposez une solution cloud adaptée.</p>",
      "questions": [
        {
          "question": "1) Quel modèle de cloud (public, privé ou hybride) recommanderiez-vous pour cette entreprise ? Justifiez votre réponse.",
          "reponse": "Je recommanderais un <strong>cloud public</strong> pour plusieurs raisons : <ul><li><strong>Coûts</strong> : paiement à l'usage et pas d'investissement initial (CAPEX) → idéal pour une entreprise avec un budget limité.</li><li><strong>Élasticité</strong> : permet de gérer les pics de charge pendant les fêtes et de réduire les ressources en période creuse.</li><li><strong>Services managés</strong> : permet de se concentrer sur le métier sans gérer l'infrastructure.</li><li><strong>Scalabilité</strong> : la solution peut évoluer avec la croissance de l'entreprise.</li></ul>Un cloud privé serait trop coûteux et pas assez flexible. Un cloud hybride serait une sur-architecture car il n'y a pas de données nécessitant un cloud privé."
        },
        {
          "question": "2) Pour chaque besoin (application web, base de données, stockage d'images, analyse de données, sécurité), proposez un service cloud approprié (AWS, Azure ou GCP) et expliquez pourquoi.",
          "reponse": "Solution avec <strong>AWS</strong> (le plus adapté pour une start-up) : <ul><li><strong>Application web</strong> : <strong>AWS Elastic Beanstalk</strong> (PaaS) → déploiement facile de l'application web sans gérer les serveurs, avec auto-scaling automatique.</li><li><strong>Base de données</strong> : <strong>AWS RDS</strong> avec PostgreSQL → base de données relationnelle managée, avec sauvegardes automatiques et haute disponibilité.</li><li><strong>Stockage d'images</strong> : <strong>AWS S3</strong> → stockage objet pour les images, avec CDN (CloudFront) pour une distribution rapide aux utilisateurs.</li><li><strong>Analyse de données</strong> : <strong>AWS QuickSight</strong> (BI) ou <strong>AWS Athena</strong> → analyse des données de vente, création de tableaux de bord (business intelligence).</li><li><strong>Sécurité</strong> : <ul><li><strong>IAM</strong> pour les permissions et l'authentification</li><li><strong>WAF</strong> (Web Application Firewall) pour protéger l'application des attaques</li><li><strong>CloudTrail</strong> pour l'audit des actions</li><li><strong>KMS</strong> pour le chiffrement des données</li></ul></li></ul>"
        },
        {
          "question": "3) Quels sont les avantages de cette solution cloud pour l'entreprise (en termes de coûts, de flexibilité, de performance) par rapport à son infrastructure actuelle ?",
          "reponse": "Les avantages de cette solution cloud par rapport à un serveur physique local : <ul><li><strong>Coûts</strong> : <ul><li>Passage d'un CAPEX (achat du serveur) à un OPEX (paiement à l'usage) → investissement initial nul.</li><li>Réduction des coûts d'électricité, climatisation, maintenance.</li><li>Économies pendant les périodes creuses grâce à la réduction automatique des ressources.</li></ul></li><li><strong>Flexibilité</strong> : <ul><li>Auto-scaling automatique pendant les pics de charge.</li><li>Possibilité d'ajouter de nouveaux services rapidement.</li><li>Déploiement mondial possible pour les clients à l'étranger.</li></ul></li><li><strong>Performance</strong> : <ul><li>CDN pour les images → temps de chargement réduit.</li><li>Bases de données avec haute performance et haute disponibilité.</li><li>Possibilité de choisir des machines virtuelles avec des ressources optimisées.</li></ul></li><li><strong>Sécurité</strong> : <ul><li>Chiffrement des données au repos et en transit.</li><li>Certifications de sécurité et conformité (ISO 27001, GDPR, etc.).</li><li>Gestion des accès centralisée (IAM).</li></ul></li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
