<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation au Cloud Computing",
 "classe": "Développement Web",
 "sequence": "Évaluation Séquentielle N°5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Questions de Cours (6 pts)",
     "points": "6 pts",
     "enonce": "Cet exercice porte sur les concepts fondamentaux du cloud computing vus en cours. Lisez attentivement chaque question et répondez-y de manière précise.",
     "questions": [
       {
         "question": "<strong>1.1 (1 pt)</strong> - Donnez une définition du cloud computing et citez deux de ses caractéristiques essentielles.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><strong>Définition :</strong> Le cloud computing est un modèle qui permet un accès réseau à la demande et à tout moment à un ensemble de ressources informatiques configurables (réseaux, serveurs, stockage, applications, services) qui peuvent être rapidement provisionnées et libérées avec un effort de gestion minimal [citation:1].<br><br><strong>Caractéristiques :</strong> L'élasticité (possibilité d'augmenter ou réduire les ressources selon les besoins), le paiement à l'usage, l'accès réseau large, la mutualisation des ressources.</div>"
       },
       {
         "question": "<strong>1.2 (1.5 pts)</strong> - Distinguez les trois modèles de services cloud : IaaS, PaaS et SaaS. Pour chacun, donnez un exemple concret.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li><strong>IaaS (Infrastructure as a Service)</strong> : Fournit une infrastructure virtualisée (serveurs, stockage, réseau). Exemple : AWS EC2, Azure Virtual Machines [citation:6].</li><li><strong>PaaS (Platform as a Service)</strong> : Fournit une plateforme pour développer et déployer des applications sans gérer l'infrastructure sous-jacente [citation:5]. Exemple : AWS Elastic Beanstalk, Google App Engine.</li><li><strong>SaaS (Software as a Service)</strong> : Fournit des applications prêtes à l'emploi, accessibles via un navigateur. Exemple : Gmail, Office 365, Salesforce [citation:2].</li></ul></div>"
       },
       {
         "question": "<strong>1.3 (1.5 pts)</strong> - Expliquez la différence entre un cloud public, un cloud privé et un cloud hybride. Donnez un exemple de cas d'usage pour chaque modèle.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li><strong>Cloud public</strong> : Ressources partagées, gérées par un fournisseur tiers et accessibles via Internet. Exemple : Une startup qui héberge son site web sur AWS.</li><li><strong>Cloud privé</strong> : Infrastructure dédiée à une seule organisation, gérée en interne ou par un tiers [citation:1]. Exemple : Une banque qui stocke ses données clients sur son propre cloud privé pour des raisons de conformité.</li><li><strong>Cloud hybride</strong> : Combine cloud public et privé, permettant de partager des données et des applications entre eux [citation:5]. Exemple : Une entreprise qui garde ses données sensibles sur son cloud privé mais utilise le cloud public pour des traitements nécessitant beaucoup de ressources.</li></ul></div>"
       },
       {
         "question": "<strong>1.4 (2 pts)</strong> - Comparez brièvement les trois principaux fournisseurs de cloud (AWS, Azure, GCP) sur deux critères : leur force principale et un service phare pour chacun.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li><strong>AWS (Amazon Web Services)</strong> : Force principale : Leader du marché, offre la plus large gamme de services [citation:4]. Service phare : EC2 (machines virtuelles) ou S3 (stockage objet) [citation:6].</li><li><strong>Azure (Microsoft Azure)</strong> : Force principale : Intégration parfaite avec l'écosystème Microsoft (Windows, Active Directory, Office 365) [citation:8]. Service phare : Virtual Machines ou Azure SQL Database.</li><li><strong>GCP (Google Cloud Platform)</strong> : Force principale : Excellence dans le Big Data, l'IA et le Machine Learning [citation:4]. Service phare : BigQuery (data warehouse) ou Kubernetes Engine [citation:6].</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Compréhension des Concepts de Stockage et Calcul (7 pts)",
     "points": "7 pts",
     "enonce": "Répondez aux questions suivantes sur les technologies de stockage et de calcul dans le cloud.",
     "questions": [
       {
         "question": "<strong>2.1 (1.5 pts)</strong> - Expliquez la différence entre le stockage objet (ex: AWS S3) et le stockage bloc (ex: AWS EBS). Dans quel cas d'usage utiliseriez-vous l'un plutôt que l'autre ?",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li><strong>Stockage objet</strong> : Stocke des données sous forme d'objets avec des métadonnées. Idéal pour les données non structurées (images, vidéos, backups), accessible via API HTTP [citation:4].</li><li><strong>Stockage bloc</strong> : Stocke des données en blocs, comme un disque dur classique. Il est attaché à une VM et est utilisé pour les systèmes de fichiers, les bases de données, etc.</li></ul></div>"
       },
       {
         "question": "<strong>2.2 (1.5 pts)</strong> - Qu'est-ce qu'un conteneur (Docker) et en quoi diffère-t-il d'une machine virtuelle (VM) ?",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'>Un conteneur est une unité légère qui empaquette une application et ses dépendances. Il partage le noyau de l'OS hôte, ce qui le rend plus rapide et plus efficace [citation:8]. Une machine virtuelle, elle, virtualise tout un système d'exploitation, ce qui la rend plus lourde. Les conteneurs sont donc plus portables et démarrent plus rapidement.</div>"
       },
       {
         "question": "<strong>2.3 (2 pts)</strong> - Vous devez héberger une application web avec des pics de trafic variables. Vous hésitez entre utiliser une VM traditionnelle (IaaS) et un service serverless comme AWS Lambda. Quels sont les avantages et les inconvénients de chaque approche ?",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li><strong>VM (IaaS)</strong> : <strong>Avantages</strong> : Contrôle total sur le système d'exploitation, prévisibilité des coûts si la charge est constante. <strong>Inconvénients</strong> : Gestion du serveur, paiement même au ralenti.</li><li><strong>Serverless (Lambda)</strong> : <strong>Avantages</strong> : Pas de gestion de serveur, paiement à l'exécution, scaling automatique. <strong>Inconvénients</strong> : Limitations (timeout, mémoire), froid au démarrage (cold start) [citation:9].</li></ul></div>"
       },
       {
         "question": "<strong>2.4 (2 pts)</strong> - Expliquez le fonctionnement de Kubernetes. Quels sont les services managés proposés par les trois grands fournisseurs de cloud pour Kubernetes ?",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'>Kubernetes est un orchestrateur de conteneurs qui permet de gérer des applications conteneurisées à grande échelle. Il assure le déploiement, la mise à l'échelle (scaling) et la gestion des conteneurs [citation:10].<br><br>Les services managés sont :<br>- <strong>AWS</strong> : Amazon EKS (Elastic Kubernetes Service)<br>- <strong>Azure</strong> : Azure Kubernetes Service (AKS)<br>- <strong>GCP</strong> : Google Kubernetes Engine (GKE)</div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Étude de Cas - Migration vers le Cloud (7 pts)",
     "points": "7 pts",
     "enonce": "La startup 'CamTech', basée à Douala, souhaite migrer son infrastructure vers le cloud. Elle a développé une application de e-commerce pour les artisans locaux. L'application est composée d'un frontend (React), d'un backend (Node.js), d'une base de données PostgreSQL, et de fichiers multimédias. Le trafic est très variable avec des pics pendant les périodes de fêtes. L'équipe est composée de 5 développeurs, et ils disposent d'un budget limité.",
     "questions": [
       {
         "question": "<strong>3.1 (2 pts)</strong> - Proposez une architecture cloud pour cette application en justifiant vos choix. Vous pouvez vous aider de vos connaissances des modèles de services (IaaS, PaaS, SaaS).",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><strong>Architecture proposée :</strong><br><ul><li><strong>Frontend</strong> : Hébergé sur un stockage objet (ex: S3) avec un CDN (ex: CloudFront) pour une distribution rapide.</li><li><strong>Backend (Node.js)</strong> : Déployé sur un service PaaS ou conteneur (ex: AWS Elastic Beanstalk, ou ECS avec Fargate) pour simplifier la gestion et permettre le scaling automatique.</li><li><strong>Base de données PostgreSQL</strong> : Utiliser un service de base de données managé (ex: RDS) pour éviter la gestion des sauvegardes et de la réplication.</li><li><strong>Fichiers multimédias</strong> : Stockés dans un bucket S3.</li></ul><strong>Justification :</strong> L'utilisation de services managés (PaaS, DBaaS) réduit l'effort d'administration, ce qui est idéal pour une petite équipe avec un budget limité. Le scaling automatique permet de gérer les pics de trafic, et le paiement à l'usage optimise les coûts [citation:1].</div>"
       },
       {
         "question": "<strong>3.2 (2 pts)</strong> - Pour les fichiers multimédias (images des produits), quel type de stockage cloud recommanderiez-vous et pourquoi ? Quelle classe de stockage serait la plus adaptée pour ce type de données ?",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'>Il est recommandé d'utiliser du <strong>stockage objet</strong> (ex: AWS S3) pour les fichiers multimédias. C'est idéal pour les données non structurées et accessible via API HTTP. La classe de stockage <strong>Standard</strong> est appropriée car ces fichiers sont consultés fréquemment. Pour les données moins consultées, on pourrait passer à la classe <strong>Infrequent Access</strong>.</div>"
       },
       {
         "question": "<strong>3.3 (1 pt)</strong> - Quelles mesures de sécurité devraient être mises en place pour protéger les données des clients de CamTech dans ce nouveau cloud ?",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li>Chiffrement des données au repos et en transit (TLS/SSL) [citation:9].</li><li>Mise en place de contrôles d'accès avec le principe du moindre privilège (IAM).</li><li>Utilisation de groupes de sécurité (Security Groups) pour limiter les accès réseau aux seuls ports nécessaires.</li><li>Sauvegardes automatiques (snapshots) de la base de données.</li><li>Audit des accès (CloudTrail, etc.).</li></ul></div>"
       },
       {
         "question": "<strong>3.4 (2 pts)</strong> - Comment CamTech peut-elle optimiser ses coûts sur le cloud ? Citez au moins trois méthodes.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li>Utiliser des <strong>instances réservées</strong> ou des <strong>Savings Plans</strong> pour les ressources ayant une charge constante (base de données) [citation:6].</li><li>Mettre en place un <strong>auto-scaling</strong> pour les ressources de calcul, afin de réduire les instances hors des heures de pointe.</li><li>Surveiller régulièrement la consommation avec des outils comme AWS Cost Explorer ou Azure Cost Management pour identifier et supprimer les ressources inutilisées [citation:8].</li><li>Utiliser des <strong>instances spot</strong> pour des workloads tolérants aux interruptions (ex: jobs de traitement batch) [citation:8].</li></ul></div>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
