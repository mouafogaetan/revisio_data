<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation au Cloud Computing",
 "classe": "Développement Web",
 "sequence": "Séquence 6 : Maîtrise des technologies d'isolation, des solutions de stockage et de la connectivité réseau",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "QCM - Concepts fondamentaux du Cloud et virtualisation",
     "points": "6 pts",
     "enonce": "Pour chacune des questions suivantes, choisissez la ou les bonnes réponses (une seule réponse par question).",
     "questions": [
       {
         "question": "1. Parmi les caractéristiques essentielles du cloud computing, laquelle permet d'ajuster automatiquement les ressources en fonction de la demande ?<br>A) Self-service à la demande<br>B) Mutualisation des ressources<br><strong>C) Élasticité rapide</strong><br>D) Paiement à l'usage",
         "reponse": "<strong>C) Élasticité rapide</strong> - L'élasticité est la capacité du cloud à adapter les ressources de manière automatique et rapide en fonction des besoins."
       },
       {
         "question": "2. Un hyperviseur de type 1 (bare-metal) se caractérise par :<br>A) Une installation sur un système d'exploitation hôte<br><strong>B) Une exécution directe sur le matériel physique</strong><br>C) Une utilisation uniquement pour le développement<br>D) Des performances moins bonnes qu'un type 2",
         "reponse": "<strong>B) Une exécution directe sur le matériel physique</strong> - Les hyperviseurs de type 1, comme VMware ESXi ou KVM, s'exécutent directement sur le matériel sans nécessiter d'OS hôte."
       },
       {
         "question": "3. Dans le modèle IaaS (Infrastructure as a Service), le fournisseur cloud fournit :<br><strong>A) Des machines virtuelles, du stockage et du réseau</strong><br>B) Un environnement d'exécution pour les applications sans gestion OS<br>C) Des logiciels prêts à l'emploi comme Gmail<br>D) Un service de gestion de conteneurs uniquement",
         "reponse": "<strong>A) Des machines virtuelles, du stockage et du réseau</strong> - IaaS fournit l'infrastructure de base (VM, stockage, réseau) sur laquelle le client peut déployer ses propres systèmes et applications."
       },
       {
         "question": "4. Quel format d'appliance virtuelle se présente comme un fichier unique compressé contenant la VM, ses disques et sa configuration ?<br><strong>A) OVA (Open Virtualization Appliance)</strong><br>B) OVF (Open Virtualization Format)<br>C) VMDK<br>D) AMI (Amazon Machine Image)",
         "reponse": "<strong>A) OVA (Open Virtualization Appliance)</strong> - OVA est une version archivée et compressée d'OVF, présentée comme un fichier unique."
       },
       {
         "question": "5. Dans un VPC (Virtual Private Cloud), quel élément permet à une instance d'accéder à Internet tout en restant dans un sous-réseau privé ?<br>A) Internet Gateway<br><strong>B) NAT Gateway</strong><br>C) Security Group<br>D) Network ACL",
         "reponse": "<strong>B) NAT Gateway</strong> - La NAT Gateway permet aux instances dans un sous-réseau privé d'accéder à Internet tout en les protégeant des accès entrants directs."
       },
       {
         "question": "6. Un Security Group dans un VPC se distingue d'une Network ACL par le fait qu'il est :<br><strong>A) Stateful (le trafic retour est automatiquement autorisé)</strong><br>B) Stateless (le trafic retour doit être explicitement autorisé)<br>C) Appliqué au niveau du sous-réseau<br>D) Supporte les règles DENY",
         "reponse": "<strong>A) Stateful (le trafic retour est automatiquement autorisé)</strong> - Les Security Groups sont stateful : si le trafic entrant est autorisé, le trafic sortant correspondant l'est automatiquement."
       }
     ]
   },
   {
     "titre": "Questions théoriques",
     "points": "8 pts",
     "enonce": "Répondez de manière précise et structurée aux questions suivantes.",
     "questions": [
       {
         "question": "1. Distinguez clairement les modèles IaaS, PaaS et SaaS. Pour chacun, donnez un exemple de service cloud et un cas d'usage concret au Cameroun. (3 pts)",
         "reponse": "<strong>IaaS (Infrastructure as a Service)</strong> : Fournit des ressources informatiques virtualisées (VM, stockage, réseau). L'utilisateur gère l'OS, les applications et les données. <em>Exemple AWS EC2</em>.<br>Au Cameroun : Une entreprise loue des VMs pour héberger ses sites web et bases de données, sans investir dans du matériel.<br><br><strong>PaaS (Platform as a Service)</strong> : Fournit une plateforme pour développer et déployer des applications sans gérer l'infrastructure sous-jacente. <em>Exemple AWS Elastic Beanstalk</em>.<br>Au Cameroun : Une startup développe une application mobile de livraison et utilise PaaS pour déployer son API, sans s'occuper des serveurs.<br><br><strong>SaaS (Software as a Service)</strong> : Fournit des applications logicielles prêtes à l'emploi, accessibles via Internet. <em>Exemple Google Workspace</em>.<br>Au Cameroun : Une PME utilise une suite bureautique en ligne pour ses employés, sans installer de logiciels localement."
       },
       {
         "question": "2. Expliquez le rôle d'un hyperviseur. Comparez les hyperviseurs de type 1 et de type 2 en termes d'architecture, de performances et d'usage. (2 pts)",
         "reponse": "Un <strong>hyperviseur</strong> est un logiciel qui crée et gère des machines virtuelles, en isolant les ressources matérielles entre elles.<br><br><strong>Hyperviseur Type 1 (Bare-Metal)</strong> : S'exécute directement sur le matériel. <em>Performances élevées</em>, faible surcharge. Utilisé en production (ex: VMware ESXi, KVM).<br><br><strong>Hyperviseur Type 2 (Hébergé)</strong> : S'exécute sur un système d'exploitation hôte. <em>Performances moindres</em>, surcharge plus importante. Utilisé pour le développement et les tests (ex: VirtualBox, VMware Workstation)."
       },
       {
         "question": "3. Décrivez les trois types de stockage cloud (objet, bloc, fichier). Pour chacun, donnez un exemple de service et un cas d'usage. (3 pts)",
         "reponse": "<strong>Stockage Objet</strong> : Stocke des données en tant qu'objets avec des métadonnées. Idéal pour les fichiers non structurés (images, vidéos, sauvegardes). <em>Exemple : Amazon S3</em>.<br><br><strong>Stockage Bloc</strong> : Stocke des données en blocs de taille fixe, utilisés comme volumes attachés à des VMs. Idéal pour les bases de données et systèmes de fichiers. <em>Exemple : Amazon EBS</em>.<br><br><strong>Stockage Fichier</strong> : Fournit un système de fichiers partagé accessible par plusieurs VMs via NFS ou SMB. Idéal pour les applications nécessitant un partage de fichiers. <em>Exemple : Amazon EFS</em>."
       }
     ]
   },
   {
     "titre": "Étude de cas",
     "points": "6 pts",
     "enonce": "Vous êtes consultant cloud pour une startup camerounaise de e-commerce qui souhaite migrer son infrastructure vers le cloud. L'application se compose d'un site web, d'une API REST, d'une base de données PostgreSQL et d'un système de recommandations. La startup prévoit des pics de charge importants pendant les périodes de promotions.",
     "questions": [
       {
         "question": "1. Dessinez l'architecture cloud de la solution (schéma à décrire). Précisez les composants à utiliser (VPC, sous-réseaux, load balancer, services de calcul, base de données, stockage). Justifiez vos choix. (2 pts)",
         "reponse": "<strong>Architecture proposée :</strong><br><ul><li><strong>VPC</strong> : 10.0.0.0/16 avec 3 sous-réseaux (2 publics, 1 privé)</li><li><strong>Sous-réseaux publics</strong> (10.0.1.0/24 et 10.0.2.0/24) : hébergent le load balancer et les serveurs web (ou conteneurs) accessibles depuis Internet.</li><li><strong>Sous-réseau privé</strong> (10.0.3.0/24) : héberge la base de données PostgreSQL.</li><li><strong>Load Balancer</strong> (ELB/ALB) : distribue le trafic entre les instances web.</li><li><strong>Calcul</strong> : Utilisation de conteneurs sur ECS/Fargate (serverless containers) pour le site web et l'API, avec auto-scaling automatique.</li><li><strong>Base de données</strong> : RDS pour PostgreSQL (géré, sauvegardes automatiques).</li><li><strong>Stockage</strong> : S3 pour les images des produits et les fichiers statiques.</li><li><strong>Sécurité</strong> : Security Groups pour isoler les couches (web, API, base de données).</li></ul><br><strong>Justification :</strong> Architecture en 3 tiers (web, API, DB) pour une sécurité et une scalabilité optimales. Serverless containers pour l'élasticité. RDS pour une base de données gérée."
       },
       {
         "question": "2. Proposez une stratégie de déploiement continu (CI/CD) pour cette application. Détaillez les outils et les étapes du pipeline. (2 pts)",
         "reponse": "<strong>Pipeline CI/CD proposé :</strong><br><ol><li><strong>Source</strong> : GitHub (code de l'application).</li><li><strong>Build</strong> : GitHub Actions ou AWS CodeBuild construit l'image Docker, exécute les tests.</li><li><strong>Push</strong> : L'image est poussée vers Amazon ECR (Elastic Container Registry).</li><li><strong>Deploy</strong> : AWS CodePipeline ou ECS déploie la nouvelle image sur le service ECS (mise à jour avec déploiement bleu/vert ou rolling update).</li><li><strong>Base de données</strong> : Les migrations sont exécutées automatiquement avant le déploiement de l'application.</li></ol><br><strong>Outils :</strong> GitHub Actions (ou CodePipeline), Docker, ECR, ECS/Fargate."
       },
       {
         "question": "3. La startup souhaite optimiser ses coûts cloud. Quelles recommandations lui feriez-vous ? (2 pts)",
         "reponse": "<strong>Recommandations d'optimisation des coûts :</strong><br><ul><li><strong>Instances réservées ou Savings Plans</strong> pour les ressources à usage constant (RDS, ECS si utilisation continue).</li><li><strong>Auto-scaling</strong> : Configurer l'auto-scaling pour réduire le nombre d'instances web en dehors des heures de pointe.</li><li><strong>Stockage</strong> : Utiliser S3 Intelligent-Tiering ou Glacier pour les données peu consultées. Nettoyer régulièrement les anciennes versions des objets (versioning).</li><li><strong>Rightsizing</strong> : Analyser l'utilisation des instances (CPU, mémoire) et ajuster la taille des VM/services (ou utiliser des instances spot pour les jobs non critiques).</li><li><strong>Monitoring</strong> : Configurer AWS Cost Explorer et des alertes budgétaires pour suivre les dépenses en temps réel.</li></ul>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
