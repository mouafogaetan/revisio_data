<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Cloud Computing",
  "classe": "Développement Web",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Comprendre les technologies d'isolation et de calcul (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> La startup camerounaise <strong>\"AfriCloud Solutions\"</strong> souhaite moderniser son infrastructure pour déployer une nouvelle application de gestion de stock pour les commerçants. L'équipe hésite entre l'utilisation de machines virtuelles (VMs) et de conteneurs.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 1.1 (2 pts) :</strong> Expliquez la <strong>différence fondamentale</strong> entre une machine virtuelle (VM) et un conteneur en termes d'isolation et de gestion des ressources. Identifiez dans chaque cas ce qui est virtualisé.</p></div>",
          "reponse": "<div><p><strong>Différence VM vs Conteneur :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Machine virtuelle :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Virtualise le <strong>matériel</strong> (CPU, mémoire, stockage, réseau).</li><li>Chaque VM inclut son propre système d'exploitation (OS) complet, ce qui consomme plus de ressources.</li><li>Isolation <strong>forte</strong> : les VMs sont complètement séparées les unes des autres.</li><li>Hyperviseur (type 1 ou 2) pour la gestion.</li></ul></li><li><strong>Conteneur :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Virtualise le <strong>système d'exploitation</strong> (OS) au lieu du matériel.</li><li>Partage le noyau de l'OS hôte avec les autres conteneurs, ce qui les rend plus légers et plus rapides.</li><li>Isolation <strong>légère</strong> : les conteneurs partagent les ressources du système hôte.</li><li>Moteur de conteneurs (Docker, containerd, etc.) pour la gestion.</li></ul></li></ul></div>"
        },
        {
          "question": "<div><p><strong>Question 1.2 (2 pts) :</strong> Expliquez le <strong>rôle de Kubernetes</strong> dans le déploiement et la gestion des applications conteneurisées. Décrivez les concepts suivants : <strong>Pod</strong>, <strong>Deployment</strong> et <strong>Service</strong>.</p></div>",
          "reponse": "<div><p><strong>Rôle de Kubernetes :</strong> Kubernetes est un orchestrateur de conteneurs qui automatise le déploiement, la mise à l'échelle et la gestion des applications conteneurisées.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Pod :</strong> Le plus petit élément déployable dans Kubernetes. C'est un groupe d'un ou plusieurs conteneurs qui partagent le même réseau et le même stockage. Un Pod représente une unité de travail atomique.</li><li><strong>Deployment :</strong> Un contrôleur qui gère le cycle de vie des Pods. Il définit l'état souhaité (nombre de réplicas, image à utiliser, etc.) et Kubernetes s'assure que cet état est maintenu en permanence. Il permet les mises à jour sans interruption et les rollbacks.</li><li><strong>Service :</strong> Une abstraction qui définit comment accéder aux Pods. Il fournit une adresse IP stable et un équilibrage de charge pour les Pods. Les types courants sont ClusterIP (interne), NodePort (externe sur un port spécifique) et LoadBalancer (externe via un équilibreur de charge cloud).</li></ul></div>"
        },
        {
          "question": "<div><p><strong>Question 1.3 (2 pts) :</strong> Expliquez ce qu'est un <strong>modèle serverless</strong>. Citez <strong>deux avantages</strong> et <strong>deux limitations</strong> de ce modèle pour une application de gestion de stock à usage variable.</p></div>",
          "reponse": "<div><p><strong>Modèle serverless :</strong> Le serverless est un modèle d'exécution où le fournisseur cloud gère l'infrastructure et alloue dynamiquement les ressources. Le développeur ne paie que pour le temps d'exécution de son code (paiement à l'usage).</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Avantages :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Pas de gestion de serveur :</strong> Le fournisseur s'occupe de tout (OS, runtime, scaling).</li><li><strong>Scalabilité automatique :</strong> Le service s'adapte instantanément à la charge.</li><li><strong>Coût à l'usage :</strong> On ne paie que pour les exécutions réelles, ce qui est économique pour une utilisation variable.</li></ul></li><li><strong>Limitations :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Timeout :</strong> La fonction ne peut pas s'exécuter indéfiniment (limite de temps).</li><li><strong>Cold start :</strong> Le premier appel après une période d'inactivité peut être plus lent.</li><li><strong>Limitations de mémoire :</strong> La mémoire allouée à la fonction est limitée.</li></ul></li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Connectivité et sécurisation des ressources cloud (7 pts)",
      "points": "7 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> AfriCloud Solutions souhaite adopter une approche <strong>cloud hybride</strong>. L'entreprise conserve son centre de données à Douala pour les données sensibles, mais utilise AWS pour ses applications web. Vous êtes chargé de concevoir la connectivité et la sécurité.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 2.1 (2 pts) :</strong> Comparez <strong>VPN IPsec</strong> et <strong>AWS Direct Connect</strong> pour connecter le centre de données on-premise au cloud AWS. Pour chaque solution, indiquez :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Le type de connexion.</li><li>Les avantages et inconvénients.</li><li>Un cas d'usage approprié.</li></ul></div>",
          "reponse": "<div><p><strong>Comparaison VPN IPsec vs Direct Connect :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>VPN IPsec :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Type :</strong> Connexion via Internet, tunnel chiffré.</li><li><strong>Avantages :</strong> Rapide à mettre en place, coût faible (utilise Internet).</li><li><strong>Inconvénients :</strong> Latence variable, dépend de la qualité d'Internet, bande passante limitée.</li><li><strong>Cas d'usage :</strong> Connexion de secours, tests, budget limité.</li></ul></li><li><strong>AWS Direct Connect :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Type :</strong> Connexion privée dédiée via un partenaire réseau (fibre optique).</li><li><strong>Avantages :</strong> Latence faible et constante, bande passante garantie, plus sécurisé.</li><li><strong>Inconvénients :</strong> Coût élevé, délai de mise en place de plusieurs semaines.</li><li><strong>Cas d'usage :</strong> Applications critiques, gros volumes de données, exigences de performance.</li></ul></li></ul></div>"
        },
        {
          "question": "<div><p><strong>Question 2.2 (2 pts) :</strong> Expliquez comment <strong>IAM (Identity and Access Management)</strong> permet de sécuriser les ressources cloud. Décrivez le <strong>principe du moindre privilège</strong> et donnez un exemple concret de son application dans le contexte de la startup.</p></div>",
          "reponse": "<div><p><strong>IAM (Identity and Access Management) :</strong> IAM est un service qui permet de gérer les identités et les accès aux ressources cloud. Il permet de définir qui (utilisateur, groupe, rôle) peut faire quoi (actions) sur quelles ressources.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Principe du moindre privilège :</strong> Un utilisateur ou un service ne doit avoir que les permissions strictement nécessaires à l'exécution de ses tâches, et rien de plus. Cela limite les risques en cas de compromission d'un compte.</li><li><strong>Exemple concret :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>L'application web d'AfriCloud doit lire des objets dans un bucket S3, mais pas les modifier ni les supprimer.</li><li>On crée un <strong>rôle IAM</strong> avec une politique qui autorise uniquement <code>s3:GetObject</code> sur le bucket concerné.</li><li>On attache ce rôle à l'instance EC2 ou au service qui héberge l'application. Ainsi, même si l'application est compromise, l'attaquant ne peut que lire, pas modifier ou supprimer les données.</li></ul></li></ul></div>"
        },
        {
          "question": "<div><p><strong>Question 2.3 (1.5 pts) :</strong> Décrivez deux <strong>bonnes pratiques</strong> pour sécuriser les données dans le cloud, en distinguant le <strong>chiffrement au repos</strong> et le <strong>chiffrement en transit</strong>.</p></div>",
          "reponse": "<div><p><strong>Sécurisation des données :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Chiffrement au repos (encryption at rest) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Les données sont chiffrées lorsqu'elles sont stockées sur le disque ou dans le stockage cloud.</li><li><strong>Bonnes pratiques :</strong><ul style='list-style-type: square; padding-left: 20px;'><li>Utiliser le chiffrement côté serveur (SSE) proposé par le fournisseur cloud pour les buckets S3, les volumes EBS, ou les bases de données.</li><li>Utiliser un service de gestion de clés (KMS) pour centraliser et sécuriser la rotation des clés de chiffrement.</li></ul></li></ul></li><li><strong>Chiffrement en transit (encryption in transit) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Les données sont chiffrées lorsqu'elles circulent sur le réseau (entre le client et le cloud, ou entre les services cloud).</li><li><strong>Bonnes pratiques :</strong><ul style='list-style-type: square; padding-left: 20px;'><li>Utiliser TLS/SSL pour toutes les communications, y compris avec les APIs et les bases de données.</li><li>Configurer les load balancers et les CDN pour terminer les connexions TLS et protéger le trafic.</li></ul></li></ul></li></ul></div>"
        },
        {
          "question": "<div><p><strong>Question 2.4 (1.5 pts) :</strong> Expliquez le <strong>rôle des groupes de sécurité (security groups)</strong> et des <strong>network ACL (NACL)</strong> dans un VPC (Virtual Private Cloud). Quelle est la principale différence entre ces deux mécanismes ?</p></div>",
          "reponse": "<div><p><strong>Security Groups vs Network ACL (NACL) :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Security Groups :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Agissent comme un <strong>pare-feu virtuel</strong> pour les instances (niveau instance).</li><li>Fonctionnement : <strong>Stateful</strong> (si une requête sortante est autorisée, la réponse entrante est automatiquement autorisée).</li><li>Règles : Uniquement <strong>allow</strong> (les règles sont par défaut deny).</li><li>Attachés aux ENI (interfaces réseau) des instances.</li></ul></li><li><strong>Network ACL (NACL) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Agissent comme un <strong>pare-feu</strong> pour les sous-réseaux (niveau sous-réseau).</li><li>Fonctionnement : <strong>Stateless</strong> (les règles pour le trafic entrant et sortant doivent être définies séparément).</li><li>Règnes : Permettent à la fois <strong>allow</strong> et <strong>deny</strong> (et sont évaluées dans l'ordre des numéros de règle).</li><li>Attachés aux sous-réseaux du VPC.</li></ul></li><li><strong>Différence principale :</strong> Les Security Groups sont stateful et s'appliquent au niveau des instances, tandis que les NACL sont stateless et s'appliquent au niveau des sous-réseaux. Les Security Groups sont généralement la première ligne de défense, les NACL une couche supplémentaire.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Optimisation des coûts et automatisation (7 pts)",
      "points": "7 pts",

          "reponse": "<div><p><strong>Modèles de facturation cloud :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>À la demande (On-Demand) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Paiement à l'heure ou à la seconde, sans engagement.</li><li><strong>Cas d'usage :</strong> Charge de travail variable, applications en développement/test, ou pour démarrer un projet sans savoir quelle sera la charge.</li></ul></li><li><strong>Instances réservées (Reserved Instances) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Engagement sur 1 ou 3 ans, offre une réduction significative (jusqu'à 70%).</li><li><strong>Cas d'usage :</strong> Charges de travail stables et prévisibles (serveurs web de production, bases de données). AfriCloud pourrait réserver les instances qui hébergent son application de gestion de stock en production.</li></ul></li><li><strong>Instances spot (Spot Instances) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Instances avec capacité excédentaire, vendues à prix réduit, mais pouvant être interrompues avec un préavis de 2 minutes.</li><li><strong>Cas d'usage :</strong> Workloads tolérants aux interruptions (traitements par lots, analyses de données, tâches de CI/CD). AfriCloud pourrait les utiliser pour des analyses de données nocturnes ou des tests de performance.</li></ul></li></ul></div>"

          "reponse": "<div><p><strong>Terraform :</strong> Terraform est un outil de provisioning <strong>déclaratif</strong> développé par HashiCorp. Il permet de décrire l'infrastructure souhaitée dans des fichiers de configuration (<code>.tf</code>) et de la créer automatiquement sur différents fournisseurs cloud (multi-cloud).</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Workflow Terraform :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>terraform init</code> : Initialise le répertoire de travail, télécharge les providers nécessaires.</li><li><code>terraform plan</code> : Analyse les fichiers de configuration et affiche un plan d'exécution (ce qui va être créé, modifié ou supprimé).</li><li><code>terraform apply</code> : Exécute le plan et crée/modifie les ressources.</li><li><code>terraform destroy</code> : Supprime toutes les ressources gérées par Terraform.</li></ul></li><li><strong>Fichier <code>terraform.tfstate</code> :</strong> C'est le <strong>fichier d'état</strong> de Terraform. Il contient le mappage entre les ressources définies dans la configuration et les ressources réelles dans le cloud. Il permet à Terraform de savoir ce qui a déjà été créé, de planifier les modifications et de gérer les dépendances. Il doit être protégé (peut contenir des données sensibles) et stocké de manière sécurisée (par exemple sur un backend S3 avec verrouillage).</li></ul></div>"

          "reponse": "<div><p><strong>Provisioning (Terraform) vs Configuration (Ansible) :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Provisioning (Terraform) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Objectif :</strong> Créer l'infrastructure (serveurs, réseau, stockage).</li><li><strong>Exemple :</strong> Terraform crée un VPC, des sous-réseaux, une instance EC2, un bucket S3 et une base de données RDS.</li><li><strong>Approche :</strong> Déclarative (décrire l'état final).</li></ul></li><li><strong>Configuration (Ansible) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Objectif :</strong> Installer et configurer les logiciels sur l'infrastructure créée.</li><li><strong>Exemple :</strong> Ansible se connecte aux VMs via SSH, installe Docker, clone le repository de l'application, démarre les conteneurs, et configure Nginx comme reverse proxy.</li><li><strong>Approche :</strong> Déclarative (playbooks YAML) ou impérative.</li></ul></li></ul></div>"

          "reponse": "<div><p><strong>Auto-scaling pour l'optimisation des coûts :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Principe :</strong> L'auto-scaling permet d'ajuster automatiquement le nombre d'instances (ou de conteneurs) en fonction de la charge. Cela garantit que vous avez juste assez de ressources pour répondre à la demande, sans en avoir trop.</li><li><strong>Impact sur les coûts :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>En période de faible activité</strong> (nuit, week-end), l'auto-scaling réduit le nombre d'instances, ce qui diminue les coûts.</li><li><strong>En période de forte activité</strong> (pics de ventes, campagnes marketing), il ajoute des instances pour maintenir les performances.</li></ul></li><li><strong>Exemple pour AfriCloud :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>L'application de gestion de stock est utilisée intensivement entre 8h et 18h par les commerçants, mais très peu la nuit.</li><li>Configurer l'auto-scaling pour maintenir 3 instances EC2 pendant la journée, et réduire à 1 instance pendant la nuit. Cela peut réduire les coûts de près de 50%.</li><li>Pendant les périodes de soldes ou de fêtes, on peut configurer des politiques de scaling plus agressives pour anticiper les pics.</li></ul></li></ul></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
