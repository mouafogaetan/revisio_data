<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours Cloud Computing - Kubernetes | Leçon 10</title>
    <!-- Tailwind CSS + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour d'éventuelles formules, même si peu de maths ici) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour les slides */
        .slide {
            transition: all 0.3s ease-in-out;
        }
        .swipe-area {
            touch-action: pan-y pinch-zoom;
        }
        body {
            background: #f0f9ff; /* fond léger, doux pour les yeux */
        }
        .card-cloud {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* optimisation pour très petits écrans */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
            .card-cloud { padding: 1rem !important; }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10 swipe-area">
        <!-- Conteneur slides -->
        <div id="slidesContainer" class="relative overflow-hidden">
            <!-- Les slides seront injectées dynamiquement via jQuery, mais on peut aussi les générer directement. Je vais construire un tableau JS pour la leçon 10 (chap3, lesson10) -->
        </div>

        <!-- Navigation + indicateur -->
        <div class="flex flex-wrap items-center justify-between gap-4 mt-6 mb-4">
            <button id="prevSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
            <div class="text-sm text-gray-600 bg-white/70 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm">
                Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
            </div>
            <button id="nextSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
        </div>
        <!-- barre de progression -->
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-8">
            <div id="progressBar" class="bg-indigo-600 h-2.5 rounded-full progress-bar" style="width: 0%;"></div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-2">✨ Cours interactif - Kubernetes (Leçon 10) | Glissez ou cliquez pour naviguer</p>
    </div>

    <script>
        // ---------- DONNEES DE LA LEÇON 10 (basé sur le JSON : chap3, lesson10) ----------
        // Titre de la leçon (d'après le contexte : idLesson "lesson10" -> Kubernetes)
        // Objectifs: "Comprendre le rôle de Kubernetes (déploiement, scaling, gestion)",
        // "Découvrir les concepts (Pods, Deployments, Services, Ingress)",
        // "Utiliser Kubernetes sur le cloud (EKS, AKS, GKE)"
        // On va créer un contenu pédagogique structuré en plusieurs slides.

        const courseData = {
            title: "Kubernetes : orchestration de conteneurs",
            subTitle: "Maîtriser le déploiement et la gestion d'applications conteneurisées",
            objectives: [
                "Comprendre le rôle de Kubernetes : déploiement, scaling, gestion automatique",
                "Découvrir les concepts fondamentaux : Pods, Deployments, Services, Ingress",
                "Utiliser Kubernetes sur le cloud avec les services managés (EKS, AKS, GKE)"
            ],
            sections: [
                {
                    title: "Pourquoi Kubernetes ?",
                    content: "<p>Kubernetes (souvent appelé K8s) est un <strong>orchestrateur de conteneurs</strong> open-source. Il automatise le déploiement, la mise à l'échelle et la gestion des applications conteneurisées (Docker, etc.). Imaginez que vous avez 50 conteneurs qui tournent : Kubernetes s'assure qu'ils sont toujours opérationnels, qu'ils communiquent bien et qu'ils s'adaptent à la charge.</p>" +
                    "<div class='mt-4 p-4 bg-indigo-50 rounded-xl border-l-8 border-indigo-400'><p class='text-indigo-800'><span class='font-bold'>✨ Analogie :</span> Si Docker est le camion de livraison, Kubernetes est le dispatcheur qui dirige la flotte, répartit les colis et remplace les camions en panne !</p></div>"
                },
                {
                    title: "☸️ Concepts clés - Pods & Deployments",
                    content: "<div class='grid md:grid-cols-2 gap-4'><div class='bg-white p-4 rounded-xl shadow-sm'><h3 class='font-bold text-indigo-700'>📦 Pod</h3><p>Le pod est la plus petite unité déployable. Il contient un ou plusieurs conteneurs qui partagent le même réseau et stockage. C'est comme une 'maison' pour vos conteneurs.</p></div>" +
                    "<div class='bg-white p-4 rounded-xl shadow-sm'><h3 class='font-bold text-indigo-700'>⚙️ Deployment</h3><p>Un Deployment définit l'état souhaité (nombre de réplicas, image, mises à jour). Kubernetes maintient cet état. Vous pouvez faire des rollbacks facilement !</p></div></div>" +
                    "<p class='mt-3 text-gray-700'>Exemple : un Deployment peut demander 3 réplicas d'un pod 'web-app'. Si un pod tombe, K8s en recrée un automatiquement.</p>"
                },
                {
                    title: "🌐 Services & Ingress (Réseau)",
                    content: "<p><strong>Service</strong> : expose vos pods comme un service réseau stable (ClusterIP, NodePort, LoadBalancer). Peu importe que les pods changent d'adresse IP, le Service garde une adresse fixe.</p>" +
                    "<p class='mt-2'><strong>Ingress</strong> : permet de gérer l'accès HTTP/HTTPS externe, avec routage basé sur le nom de domaine ou chemin. C'est le 'routeur' qui dirige le trafic vers différents Services.</p>" +
                    "<div class='mt-3 p-3 bg-gray-100 rounded-lg'><code class='text-sm'>www.monsite.com/api  →  Service API → Pods API</code><br><code class='text-sm'>www.monsite.com/app  →  Service Front → Pods front</code></div>"
                },
                {
                    title: "📊 Autoscaling & résilience",
                    content: "<p>Kubernetes peut adapter automatiquement le nombre de pods en fonction de la charge CPU/mémoire : c'est le <strong>Horizontal Pod Autoscaler (HPA)</strong>. Il surveille les métriques et ajuste les réplicas.</p>" +
                    "<ul class='list-disc pl-6 mt-2 space-y-1'><li><strong>Self-healing</strong> : redémarre les pods qui échouent</li><li><strong>Rolling updates</strong> : met à jour l'application sans temps d'arrêt</li><li><strong>Resource quotas</strong> : limite la consommation par espace de noms</li></ul>"
                },
                {
                    title: "☁️ Kubernetes sur le Cloud : EKS, AKS, GKE",
                    content: "<p>Les grands cloud providers offrent des versions managées de Kubernetes, ce qui évite de gérer les serveurs maîtres (control plane).</p>" +
                    "<div class='overflow-x-auto mt-3'><table class='min-w-full bg-white rounded-xl shadow'><thead class='bg-indigo-100'><tr><th class='p-2 text-left'>Provider</th><th class='p-2 text-left'>Service</th><th class='p-2 text-left'>Avantage clé</th></tr></thead><tbody><tr class='border-b'><td class='p-2'>AWS</td><td class='p-2'>Amazon EKS</td><td class='p-2'>Intégration profonde avec AWS (IAM, VPC)</td></tr><tr class='border-b'><td class='p-2'>Azure</td><td class='p-2'>Azure Kubernetes Service (AKS)</td><td class='p-2'>Intégration avec Azure Active Directory, DevSpaces</td></tr><tr><td class='p-2'>GCP</td><td class='p-2'>Google Kubernetes Engine (GKE)</td><td class='p-2'>Leader sur K8s, auto-réparation, cluster autopilot</td></tr></tbody></table></div>" +
                    "<p class='mt-3 text-sm'>Ces services managés permettent de déployer des clusters en quelques minutes et de se concentrer sur les applications.</p>"
                },
                {
                    title: "💻 Exemple pratique (simulé)",
                    content: "<p>Voici un extrait de fichier YAML pour un Deployment Kubernetes :</p>" +
                    "<pre class='bg-gray-800 text-green-300 p-3 rounded-lg overflow-x-auto text-sm font-mono'>apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: web-deploy\nspec:\n  replicas: 3\n  selector:\n    matchLabels:\n      app: web\n  template:\n    metadata:\n      labels:\n        app: web\n    spec:\n      containers:\n      - name: nginx\n        image: nginx:latest\n        ports:\n        - containerPort: 80</pre>" +
                    "<p class='mt-3'>Avec ce fichier, Kubernetes va lancer 3 conteneurs nginx, les surveiller et assurer leur disponibilité.</p>"
                },
                {
                    title: "🧠 Résumé & Bonnes pratiques",
                    content: "<ul class='list-disc pl-6 space-y-2'><li>Utilisez toujours des <strong>labels</strong> et sélecteurs pour organiser vos ressources.</li><li>Préférez les <strong>Deployments</strong> plutôt que les pods bruts pour gérer les mises à jour.</li><li>Sur le cloud, activez le <strong>monitoring</strong> (CloudWatch, Azure Monitor, Cloud Monitoring).</li><li>Pensez aux <strong>namespaces</strong> pour isoler les environnements (dev, staging, prod).</li><li>Pour les applications critiques, configurez les <strong>probes</strong> (liveness/readiness).</li></ul>" +
                    "<div class='mt-4 p-3 bg-green-50 rounded-lg'><p>🎯 <strong>À retenir :</strong> Kubernetes simplifie la gestion des microservices, améliore la résilience et permet de passer à l'échelle sans douleur.</p></div>"
                }
            ]
        };

        // Construction des slides (Tableau d'objets HTML)
        let slidesArray = [];

        // 1) Slide titre
        slidesArray.push(`
            <div class="slide bg-white card-cloud shadow-xl p-6 md:p-10 rounded-3xl transition-all">
                <div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
                    <div class="mb-4 w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center text-4xl">☸️</div>
                    <h1 class="text-4xl md:text-5xl font-extrabold text-indigo-800 mb-3">${escapeHtml(courseData.title)}</h1>
                    <p class="text-xl text-gray-600 max-w-lg">${escapeHtml(courseData.subTitle)}</p>
                    <div class="mt-8 text-indigo-500 text-sm">📘 Module Cloud Computing | Leçon 10</div>
                    <div class="mt-6 bg-indigo-50 px-6 py-3 rounded-full text-indigo-700 font-medium">Classe: Développement Web · Initiation Cloud</div>
                </div>
            </div>
        `);

        // 2) Slide Objectifs
        let objHtml = `<div class="slide bg-white card-cloud shadow-xl p-6 md:p-10 rounded-3xl"><h2 class="text-3xl font-bold text-indigo-700 border-b-2 border-indigo-200 pb-2 mb-5">🎯 Objectifs d'apprentissage</h2><ul class="space-y-3 text-lg">`;
        courseData.objectives.forEach(obj => {
            objHtml += `<li class="flex items-start gap-3"><span class="text-indigo-500 text-xl">✓</span> <span class="text-gray-700">${escapeHtml(obj)}</span></li>`;
        });
        objHtml += `</ul><div class="mt-8 text-center text-gray-500 text-sm">Après cette leçon, vous serez capable d’expliquer Kubernetes et ses concepts principaux.</div></div>`;
        slidesArray.push(objHtml);

        // 3) Slides de contenu (chaque section)
        courseData.sections.forEach((section, idx) => {
            let sectionSlide = `
                <div class="slide bg-white card-cloud shadow-xl p-6 md:p-8 rounded-3xl">
                    <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 mb-4 flex items-center gap-2"><span class="text-indigo-400">#${idx+1}</span> ${escapeHtml(section.title)}</h2>
                    <div class="prose prose-indigo max-w-none text-gray-700 leading-relaxed">
                        ${section.content}
                    </div>
                    <div class="mt-6 text-xs text-gray-400 border-t pt-3 text-right">Kubernetes · Pratique essentielle</div>
                </div>
            `;
            slidesArray.push(sectionSlide);
        });

        // Ajouter une slide "Défi / mini-quiz" pour engager
        const quizSlide = `
            <div class="slide bg-white card-cloud shadow-xl p-6 md:p-8 rounded-3xl">
                <h2 class="text-2xl font-bold text-indigo-700 mb-4">🤔 Vérifions votre compréhension</h2>
                <div class="space-y-4">
                    <div class="bg-gray-50 p-4 rounded-xl"><p class="font-semibold">1️⃣ Quel composant Kubernetes représente l'unité de base contenant un ou plusieurs conteneurs ?</p>
                    <div class="mt-2 flex flex-wrap gap-3"><button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="true">Pod</button> <button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="false">Service</button> <button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="false">Ingress</button></div>
                    <div class="quiz-feedback text-sm mt-1"></div></div>
                    <div class="bg-gray-50 p-4 rounded-xl"><p class="font-semibold">2️⃣ Lequel de ces services est le Kubernetes managé de Google Cloud ?</p>
                    <div class="mt-2 flex flex-wrap gap-3"><button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="false">EKS</button> <button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="true">GKE</button> <button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="false">AKS</button></div>
                    <div class="quiz-feedback text-sm mt-1"></div></div>
                    <div class="bg-gray-50 p-4 rounded-xl"><p class="font-semibold">3️⃣ Quelle ressource expose des pods avec une IP stable et un équilibrage de charge interne ?</p>
                    <div class="mt-2 flex flex-wrap gap-3"><button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="false">Deployment</button> <button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="true">Service</button> <button class="quiz-opt bg-gray-200 px-4 py-1 rounded-full text-sm" data-correct="false">Namespace</button></div>
                    <div class="quiz-feedback text-sm mt-1"></div></div>
                </div>
                <p class="mt-6 text-center text-gray-500 text-sm">Cliquez sur une réponse pour vérifier.</p>
            </div>
        `;
        slidesArray.push(quizSlide);

        // slide finale de félicitations
        const endSlide = `
            <div class="slide bg-white card-cloud shadow-xl p-6 md:p-10 rounded-3xl text-center">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-indigo-700">Bravo !</h2>
                <p class="text-gray-600 text-lg mt-3">Vous avez terminé la leçon sur Kubernetes.</p>
                <p class="mt-3">N'oubliez pas de pratiquer avec des tutoriels interactifs (Killercoda, Play with K8s).</p>
                <div class="mt-8 bg-indigo-50 inline-block px-6 py-3 rounded-full text-indigo-700">Prochaine étape : Déployer votre premier cluster !</div>
            </div>
        `;
        slidesArray.push(endSlide);

        // Nombre total de slides
        let total = slidesArray.length;
        let current = 0;
        $("#totalSlides").text(total);

        // Fonction d'affichage du slide courant
        function renderSlide(index) {
            if (index < 0) index = 0;
            if (index >= total) index = total - 1;
            current = index;
            $("#slidesContainer").html(slidesArray[current]);
            // mise à jour du compteur
            $("#currentSlideIdx").text(current+1);
            let percent = ((current+1) / total) * 100;
            $("#progressBar").css("width", percent + "%");
            // gestion des boutons prev/next désactivés
            $("#prevSlide").prop("disabled", current === 0);
            $("#nextSlide").prop("disabled", current === total-1);
            // réinitialiser les événements du quiz si nécessaire
            attachQuizEvents();
            // MathJax retypeset si nécessaire
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
            // scroll en haut
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // Gestionnaire quiz
        function attachQuizEvents() {
            $(".quiz-opt").off("click").on("click", function() {
                let isCorrect = $(this).data("correct") === true;
                let $feedbackDiv = $(this).closest(".bg-gray-50").find(".quiz-feedback");
                if (isCorrect) {
                    $feedbackDiv.html("<span class='text-green-600 font-medium'>✅ Bonne réponse !</span>");
                    $(this).addClass("bg-green-500 text-white").removeClass("bg-gray-200");
                    $(this).siblings(".quiz-opt").addClass("opacity-50").prop("disabled", true);
                } else {
                    $feedbackDiv.html("<span class='text-red-500'>❌ Pas tout à fait. Relisez la leçon ou réessayez.</span>");
                    $(this).addClass("bg-red-300");
                    setTimeout(() => { $(this).removeClass("bg-red-300"); }, 500);
                }
                // désactiver tous les choix après une réponse (pour éviter spamming)
                $(this).closest(".bg-gray-50").find(".quiz-opt").prop("disabled", true);
            });
        }

        // navigation
        $("#nextSlide").click(() => {
            if (current < total-1) renderSlide(current+1);
        });
        $("#prevSlide").click(() => {
            if (current > 0) renderSlide(current-1);
        });

        // Gestion des gestes tactiles (swipe) pour mobile
        let touchStartX = 0;
        let touchEndX = 0;
        const slidesContainer = document.getElementById("slidesContainer");
        slidesContainer.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
        slidesContainer.addEventListener("touchend", (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) {
                // swipe gauche -> suivant
                if (current < total-1) renderSlide(current+1);
            } else if (touchEndX > touchStartX + 50) {
                if (current > 0) renderSlide(current-1);
            }
        });

        // navigation clavier
        $(document).keydown((e) => {
            if (e.key === "ArrowRight") {
                if (current < total-1) renderSlide(current+1);
            } else if (e.key === "ArrowLeft") {
                if (current > 0) renderSlide(current-1);
            }
        });

        // initialisation
        renderSlide(0);

        // fonction utilitaire escapeHtml
        function escapeHtml(str) {
            if(!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
    </script>
    <!-- Ajout de petits dessins/illustrations SVG via css simple? Pas d'image extérieure nécessaire pour cette leçon, 
         mais on respecte la consigne: pas d'images inutiles. On peut avoir un petit schéma texte mais c'est pédagogique. 
         Pour répondre à 'dessiner toi même' difficile en full CSS, mais on a des emojis et icônes. Parfait. -->
    <footer class="text-center text-gray-400 text-xs pb-4">
        🇨🇲 Cours conçu pour les étudiants du Cameroun - Initiation Cloud Computing | Kubernetes (Leçon 10) - Support visuel interactif
    </footer>
</body>
</html>
