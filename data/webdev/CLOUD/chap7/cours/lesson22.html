<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 22 : Sécuriser les données dans le cloud | Cours Cloud Computing</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome (pour quelques icônes) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Ajustement Tailwind pour des couleurs douces -->
  <style>
    /* personnalisations douces pour meilleur lisibilité */
    body {
      background: linear-gradient(145deg, #f8fafc 0%, #eef2f5 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
    }
    /* Style des slides : effet carte avec ombre portée */
    .slide-card {
      transition: all 0.3s ease-in-out;
      backdrop-filter: blur(2px);
    }
    /* curseur des contrôles */
    .nav-btn {
      transition: all 0.2s ease;
    }
    .nav-btn:hover:not(:disabled) {
      transform: scale(1.05);
      background-color: #1e40af;
    }
    /* pour la pagination en mobile */
    @media (max-width: 640px) {
      .slide-card {
        margin: 0.5rem;
        padding: 1rem;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
    /* personnalisation des puces et listes */
    ul, .objective-list {
      list-style-type: disc;
      padding-left: 1.5rem;
    }
    .list-inside-custom {
      list-style-position: inside;
    }
    /* pour l'affichage des codes fictifs */
    .code-block {
      background-color: #1e293b;
      color: #e2e8f0;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules éventuelles - bien qu'ici pas de grosses formules, mais au cas où notion de chiffrement) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

  <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur slides avec navigation -->
    <div id="slides-container" class="relative">
      <!-- zone slide dynamique -->
      <div id="slide-wrapper" class="min-h-[70vh] flex items-center justify-center">
        <!-- le slide courant sera injecté ici -->
      </div>

      <!-- Contrôles de navigation + indicateur -->
      <div class="flex flex-wrap justify-between items-center mt-8 gap-4">
        <button id="prevSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">◀ Précédent</button>
        <div class="text-sm bg-white/70 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm font-medium text-gray-700">
          Diapositive <span id="current-slide-idx">1</span> / <span id="total-slides">0</span>
        </div>
        <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">Suivant ▶</button>
      </div>
      <!-- petite barre de progression -->
      <div class="w-full bg-gray-200 rounded-full h-1.5 mt-5">
        <div id="progress-bar" class="bg-indigo-600 h-1.5 rounded-full" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <script>
    // ----------------------------------------------
    // DONNÉES DE LA LEÇON 22 : "Sécuriser les données dans le cloud"
    // Basé sur l'objectif de l'objet JSON "lesson22" (Chapitre 7, lesson22)
    // Objectifs originaux:
    // 0. "Chiffrer les données au repos (KMS, Cloud KMS, Azure Key Vault)"
    // 1. "Chiffrer les données en transit (TLS/SSL)"
    // 2. "Gérer les secrets avec AWS Secrets Manager, Azure Key Vault"
    // Nous allons construire un cours clair, accessible, avec exemples concrets.
    // Création de slides structurées : Titre, Objectifs, puis contenu détaillé.
    // ----------------------------------------------
    
    // Structure d'une slide : titre, contenu HTML (avec classes Tailwind déjà prêtes)
    const slides = [];

    // ----- SLIDE 1 : TITRE de la leçon -----
    slides.push({
      titre: "🔐 Leçon 22 : Sécuriser les données dans le cloud",
      content: `
        <div class="text-center space-y-5">
          <div class="inline-block p-4 bg-indigo-100 rounded-full shadow-sm">
            <svg class="w-16 h-16 md:w-20 md:h-20 text-indigo-700 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-800 to-sky-700 bg-clip-text text-transparent">Sécuriser les données dans le cloud</h1>
          <p class="text-lg text-gray-600 max-w-xl mx-auto mt-3">Chiffrement au repos & en transit · Gestion des secrets · Services cloud pour protéger vos informations</p>
          <div class="pt-4 text-indigo-500 text-sm font-medium">Initiation au Cloud Computing — Formation Développement Web</div>
        </div>
      `
    });

    // ----- SLIDE 2 : OBJECTIFS PÉDAGOGIQUES (basés sur lesson22 objectifs)
    slides.push({
      titre: "🎯 Objectifs de la leçon",
      content: `
        <div class="bg-white/60 rounded-2xl p-5 shadow-sm border border-indigo-100">
          <h3 class="text-xl font-bold text-indigo-800 mb-4 flex items-center gap-2"><span class="text-2xl">📌</span> À la fin de cette leçon, vous serez capable de :</h3>
          <ul class="space-y-3 text-gray-700">
            <li class="flex items-start gap-3"><span class="text-indigo-600 font-bold text-lg">✓</span> <span><strong>Chiffrer les données au repos</strong> avec des services comme AWS KMS, Cloud KMS ou Azure Key Vault.</span></li>
            <li class="flex items-start gap-3"><span class="text-indigo-600 font-bold text-lg">✓</span> <span><strong>Chiffrer les données en transit</strong> à l’aide de TLS/SSL pour protéger les échanges réseau.</span></li>
            <li class="flex items-start gap-3"><span class="text-indigo-600 font-bold text-lg">✓</span> <span><strong>Gérer les secrets</strong> (mots de passe, clés API) en utilisant AWS Secrets Manager, Azure Key Vault et bonnes pratiques.</span></li>
          </ul>
          <div class="mt-6 bg-indigo-50 p-3 rounded-lg text-sm italic">💡 Pourquoi c'est crucial ? Dans le cloud, vos données voyagent et se stockent sur des infrastructures partagées, le chiffrement garantit confidentialité et conformité.</div>
        </div>
      `
    });

    // ----- SLIDE 3 : Chiffrement des données au repos (Objectif 0) -----
    slides.push({
      titre: "🔒 Chiffrement des données au repos",
      content: `
        <div class="space-y-5">
          <div class="flex items-center gap-2 text-indigo-700 font-bold text-xl"><span>💾</span> Qu’est-ce que le chiffrement "au repos" ?</div>
          <p>Les données <strong>stockées</strong> sur des disques (bases de données, buckets S3, volumes de VM) doivent être illisibles sans la clé de déchiffrement. Les clouds proposent des services de gestion de clés (KMS).</p>
          <div class="grid md:grid-cols-3 gap-4 mt-2">
            <div class="bg-white rounded-xl p-3 shadow border-l-4 border-indigo-500"><span class="font-bold">🔷 AWS KMS</span><br>Gère les clés de chiffrement pour S3, EBS, RDS, etc.</div>
            <div class="bg-white rounded-xl p-3 shadow border-l-4 border-sky-500"><span class="font-bold">☁️ Google Cloud KMS</span><br>Chiffrement intégré pour Cloud Storage, BigQuery, etc.</div>
            <div class="bg-white rounded-xl p-3 shadow border-l-4 border-blue-600"><span class="font-bold">🔐 Azure Key Vault</span><br>Protège clés, secrets et certificats pour les données au repos.</div>
          </div>
          <div class="bg-gray-50 p-4 rounded-lg mt-2">
            <span class="font-semibold">📖 Exemple concret :</span> Vous créez un bucket S3 avec chiffrement SSE-S3 par défaut. AWS chiffre automatiquement chaque objet avec une clé gérée par KMS. Même si quelqu'un accède au disque, les données restent illisibles.
          </div>
          <!-- Petit dessin simple ASCII / SVG fait maison : disque verrouillé -->
          <div class="flex justify-center mt-2">
            <svg width="120" height="80" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" class="text-indigo-500">
              <rect x="20" y="30" width="120" height="50" rx="8" fill="#c7d2fe" stroke="#4f46e5" stroke-width="2"/>
              <text x="80" y="65" text-anchor="middle" fill="#1e1b4b" font-size="12">Données 🔒</text>
              <circle cx="140" cy="55" r="16" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
              <text x="140" y="59" text-anchor="middle" fill="#3730a3" font-size="12">KMS</text>
              <path d="M30 20 L30 10 L50 10 L50 20" stroke="#4f46e5" fill="none" stroke-width="2"/>
              <circle cx="40" cy="20" r="4" fill="#4f46e5"/>
            </svg>
          </div>
        </div>
      `
    });

    // ----- SLIDE 4 : Chiffrement des données en transit (Objectif 1)
    slides.push({
      titre: "🌐 Chiffrement des données en transit (TLS/SSL)",
      content: `
        <div class="space-y-4">
          <div class="flex items-center gap-2 text-indigo-700 font-bold text-xl"><span>📡</span> Protéger les données qui voyagent sur le réseau</div>
          <p>Lorsque des données circulent entre votre navigateur et le cloud, ou entre deux services cloud, il est essentiel d'utiliser <strong>TLS (Transport Layer Security)</strong>, successeur de SSL.</p>
          <div class="bg-gradient-to-r from-indigo-50 to-sky-50 p-4 rounded-xl">
            <p class="font-semibold">✅ Bonnes pratiques :</p>
            <ul class="list-disc pl-6 mt-2 space-y-1">
              <li>Utiliser HTTPS pour toutes les communications web (certificats SSL/TLS).</li>
              <li>Pour les bases de données managées, activer le chiffrement TLS/SSL des connexions.</li>
              <li>Dans un VPC, les échanges entre services doivent également être chiffrés (mTLS).</li>
            </ul>
          </div>
          <div class="code-block text-sm">
            🔧 Exemple : Connexion à une base de données AWS RDS avec SSL obligatoire <br>
            mysql -h mydatabase.cg34fdsa.eu-west-1.rds.amazonaws.com --ssl-ca= rds-ca-2019-root.pem -u admin -p
          </div>
          <div class="mt-3 text-gray-600 italic">Les fournisseurs cloud fournissent des certificats racine pour forcer le chiffrement des connexions. Sans TLS, un attaquant peut "écouter" les informations sensibles.</div>
          <!-- image simple dessinée : cadenas sur un tuyau -->
          <div class="flex justify-center">
            <svg width="150" height="70" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 40 L190 40" stroke="#1e3a8a" stroke-width="3" stroke-dasharray="4 2"/>
              <rect x="80" y="15" width="36" height="28" rx="5" fill="#cbd5e1" stroke="#1e3a8a" stroke-width="1.5"/>
              <path d="M95 15 L95 9 C95 6 99 6 99 9 L99 15" fill="none" stroke="#1e3a8a" stroke-width="2"/>
              <text x="98" y="34" text-anchor="middle" fill="green" font-size="12">🔒</text>
              <text x="150" y="30" fill="#334155" font-size="11">TLS 1.3</text>
            </svg>
          </div>
        </div>
      `
    });

    // ----- SLIDE 5 : Gestion des secrets (Objectif 2)
    slides.push({
      titre: "🗝️ Gestion des secrets : AWS Secrets Manager & Azure Key Vault",
      content: `
        <div class="space-y-4">
          <p>Dans une application cloud, vous avez besoin de stocker <strong>mots de passe, clés API, tokens, certificats</strong>. Ne jamais les coder en dur ! Utiliser des services spécialisés.</p>
          <div class="flex flex-wrap gap-5 justify-between mt-3">
            <div class="flex-1 min-w-[200px] bg-indigo-50 p-3 rounded-xl shadow-sm">
              <h4 class="font-bold text-indigo-800">☁️ AWS Secrets Manager</h4>
              <p class="text-sm">Permet de stocker, renouveler et récupérer des secrets. Rotation automatique pour bases de données RDS, Redshift, etc.</p>
              <div class="text-xs bg-white p-2 rounded mt-2">Exemple CLI : aws secretsmanager get-secret-value --secret-id maBaseDeDonnees</div>
            </div>
            <div class="flex-1 min-w-[200px] bg-sky-50 p-3 rounded-xl shadow-sm">
              <h4 class="font-bold text-sky-800">🔑 Azure Key Vault</h4>
              <p class="text-sm">Centralise les secrets, clés de chiffrement et certificats. Intégration native avec Azure AD et applications.</p>
              <div class="text-xs bg-white p-2 rounded mt-2">API: GetSecretAsync pour récupérer une valeur secrète dans votre code.</div>
            </div>
          </div>
          <div class="mt-4 p-3 border border-amber-200 bg-amber-50 rounded-lg text-amber-800">
            ⚠️ <strong>Règle d’or :</strong> Ne jamais versionner des secrets dans Git. Utilisez des variables d’environnement ou des gestionnaires de secrets. <br>
            ➕ Les services comme HashiCorp Vault sont également populaires, mais les clouds offrent des alternatives managées.
          </div>
          <div class="flex justify-center text-sm text-gray-500 mt-2">🔐 Rotation automatique = changer régulièrement les mots de passe sans intervention humaine.</div>
        </div>
      `
    });

    // ----- SLIDE 6 : Mise en pratique / conseils supplémentaires & bonnes pratiques
    slides.push({
      titre: "🛡️ Bonnes pratiques & synthèse",
      content: `
        <div class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-8 border-emerald-500">
              <h4 class="font-bold text-emerald-800">📌 Chiffrement au repos</h4>
              <ul class="list-disc pl-5 text-sm">
                <li>Activez le chiffrement par défaut sur buckets et disques.</li>
                <li>Utilisez des clés gérées par le cloud (CMK) ou BYOK.</li>
              </ul>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-8 border-sky-500">
              <h4 class="font-bold text-sky-800">📌 Chiffrement en transit</h4>
              <ul class="list-disc pl-5 text-sm">
                <li>HTTPS obligatoire, redirection HTTP → HTTPS.</li>
                <li>Configurer les équilibreurs de charge avec terminaison SSL.</li>
              </ul>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-8 border-purple-500 md:col-span-2">
              <h4 class="font-bold text-purple-800">📌 Gestion des secrets avancée</h4>
              <ul class="list-disc pl-5 text-sm">
                <li>Utiliser IAM / RBAC pour limiter l’accès aux secrets.</li>
                <li>Auditer l’accès aux secrets via les logs CloudTrail / Azure Monitor.</li>
                <li>Préférer les rôles IAM (instance roles) plutôt que clés statiques.</li>
              </ul>
            </div>
          </div>
          <div class="bg-indigo-100 p-4 rounded-2xl mt-2 text-center">
            🌟 À retenir : <strong>Le cloud rend le chiffrement accessible</strong> — la responsabilité est partagée. Le fournisseur gère l’infrastructure, mais à vous d’activer et configurer la protection des données.
          </div>
        </div>
      `
    });

    // ----- SLIDE 7 : Quiz / question pour engager (facultatif)
    slides.push({
      titre: "🧠 Vérification des acquis (question rapide)",
      content: `
        <div class="bg-white rounded-2xl p-6 shadow-md">
          <h3 class="text-xl font-bold text-indigo-700">💬 Question éclair :</h3>
          <p class="mt-3">Vous déployez une application web sur AWS EC2 et vous utilisez une base de données RDS. Quelles sont les <strong>deux couches de sécurité obligatoires</strong> pour protéger les données ?</p>
          <div class="mt-5 space-y-2 text-gray-700">
            <div class="flex items-center gap-2"><span class="bg-green-100 p-1 rounded">✅</span> Chiffrement au repos des volumes EBS et du stockage RDS (KMS).</div>
            <div class="flex items-center gap-2"><span class="bg-green-100 p-1 rounded">✅</span> Chiffrement en transit : TLS entre l’application et la base de données (SSL).</div>
            <div class="flex items-center gap-2"><span class="bg-amber-100 p-1 rounded">🔑</span> Bonus : stocker le mot de passe de la base dans AWS Secrets Manager.</div>
          </div>
          <div class="mt-5 text-sm text-gray-500 border-t pt-3">👉 Dans la prochaine leçon nous verrons la surveillance et l’audit (CloudTrail, CloudWatch). Le chiffrement est indispensable pour la conformité (RGPD, ISO 27001).</div>
        </div>
      `
    });

    // -------------------------------------------------
    // Gestion des slides : état courant, rendu dynamique, navigation
    let currentSlide = 0;
    const total = slides.length;

    function renderSlide(index) {
      const slide = slides[index];
      if (!slide) return;
      const html = `
        <div class="slide-card bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl p-6 md:p-8 w-full transition-all duration-300">
          <h2 class="text-2xl md:text-3xl font-bold text-indigo-900 border-b border-indigo-200 pb-3 mb-6 flex items-center gap-2">
            <span class="text-indigo-500 text-3xl">📖</span> ${slide.titre}
          </h2>
          <div class="prose max-w-none text-gray-800">
            ${slide.content}
          </div>
          <div class="mt-8 text-right text-xs text-gray-400">Leçon 22 • Cloud Computing</div>
        </div>
      `;
      $("#slide-wrapper").html(html);
      $("#current-slide-idx").text(index + 1);
      $("#total-slides").text(total);
      const progressPercent = ((index + 1) / total) * 100;
      $("#progress-bar").css("width", `${progressPercent}%`);

      // Désactiver boutons si nécessaire
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === total - 1);
      
      // Réappliquer MathJax si des formules mathématiques (optionnel, sécurisé)
      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    function nextSlide() {
      if (currentSlide < total - 1) {
        currentSlide++;
        renderSlide(currentSlide);
        // scroll en haut pour mobile
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    $(document).ready(function () {
      renderSlide(0);
      $("#nextSlide").on("click", nextSlide);
      $("#prevSlide").on("click", prevSlide);
      // Gestion clavier : flèches droite/gauche
      $(document).keydown(function(e) {
        if (e.key === "ArrowRight") {
          nextSlide();
        } else if (e.key === "ArrowLeft") {
          prevSlide();
        }
      });
    });
  </script>
  <!-- petits ajustements pour les écrans très petits -->
  <style>
    @media (max-width: 480px) {
      .slide-card {
        padding: 1rem !important;
      }
      h2 {
        font-size: 1.4rem !important;
      }
      .grid {
        gap: 0.75rem;
      }
      .code-block {
        font-size: 0.7rem;
      }
      .nav-btn {
        padding: 0.4rem 1rem;
      }
    }
    /* améliore l'accessibilité des listes */
    ul, .list-disc {
      margin-top: 0.25rem;
      margin-bottom: 0.5rem;
    }
    li {
      margin-bottom: 0.2rem;
    }
  </style>
</body>
</html>
