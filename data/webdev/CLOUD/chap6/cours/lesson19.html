<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 19 : Serverless - Initiation au Cloud Computing</title>
    <!-- Tailwind CSS + Font Awesome (pour icônes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind + couleurs douces -->
    <style>
        /* Transition douce pour les slides */
        .slide {
            transition: all 0.3s ease-in-out;
        }
        /* Style personnalisé pour les puces et lisibilité */
        .bullet-list li {
            margin-bottom: 0.75rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .bullet-list li::before {
            content: "☁️";
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .btn-nav {
            @apply px-5 py-2 rounded-full font-semibold transition-all duration-200 shadow-md;
        }
        .btn-primary {
            @apply bg-indigo-600 text-white hover:bg-indigo-700;
        }
        .btn-secondary {
            @apply bg-gray-200 text-gray-800 hover:bg-gray-300;
        }
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e9f0fa 100%);
        }
        /* amélioration mobile */
        @media (max-width: 640px) {
            .slide-content {
                padding: 1rem;
            }
            h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slide -->
        <div id="slidesContainer" class="relative bg-white/60 backdrop-blur-sm rounded-3xl shadow-xl overflow-hidden border border-indigo-100">
            <!-- Slides générés dynamiquement via jQuery -->
            <div id="slideWrapper" class="slide-wrapper"></div>
            
            <!-- Navigation et indicateurs -->
            <div class="flex flex-wrap justify-between items-center p-5 bg-white/80 border-t border-indigo-100">
                <button id="prevBtn" class="btn-nav btn-secondary flex items-center gap-2"><span>←</span> Précédent</button>
                <div class="flex gap-2 flex-wrap justify-center" id="dotsIndicator"></div>
                <button id="nextBtn" class="btn-nav btn-primary flex items-center gap-2">Suivant <span>→</span></button>
            </div>
        </div>
        
        <!-- petite note pédagogique -->
        <p class="text-center text-sm text-gray-500 mt-4">📘 Leçon 19 : Comprendre le modèle serverless (FaaS) – AWS Lambda, Azure Functions, Google Cloud Functions</p>
    </div>

    <script>
        // Définition des slides pour la lesson19: "Comprendre le modèle serverless (exécution sans gestion de serveur)"
        // Titre, objectifs (repris depuis le programme) et contenu détaillé adapté au public camerounais, accessible.
        const slidesData = [
            {
                type: "title",
                title: "🚀 Fonctions Serverless",
                subtitle: "Exécutez du code sans vous soucier des serveurs",
                bgClass: "bg-gradient-to-br from-indigo-50 to-sky-100"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Comprendre le modèle serverless (FaaS) : exécution sans gestion de serveur",
                    "Développer et déployer une fonction serverless (exemple simple)",
                    "Identifier les limitations : timeout, mémoire, démarrage à froid"
                ]
            },
            {
                type: "content",
                title: "📖 Qu'est-ce que le Serverless ?",
                content: `<p class="mb-4 text-gray-700">Le <strong class="text-indigo-700">serverless</strong> (ou FaaS : Function as a Service) est un modèle d'exécution où le fournisseur cloud gère intégralement les serveurs. Vous écrivez <strong class="font-semibold">une fonction</strong> (ex: Node.js, Python, Java) et le cloud l'exécute uniquement quand elle est appelée.</p>
                <div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-400 my-4">
                    <p class="italic">💡 <strong>Analogie simple:</strong> C'est comme commander un repas dans une cantine: vous ne gérez ni la cuisine ni les plats, vous demandez juste "riz au poisson" et on vous le sert. Vous payez seulement ce que vous mangez !</p>
                </div>
                <p>Plus besoin de provisionner des VM ou de gérer les mises à jour OS. Le code s'exécute de manière <strong>élastique</strong> et <strong>automatiquement scalable</strong>.</p>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="bg-white p-3 rounded-lg shadow-sm"><span class="font-bold">✅ Avantages:</span> Pas de gestion serveur, paiement à l'exécution, scaling automatique.</div>
                    <div class="bg-white p-3 rounded-lg shadow-sm"><span class="font-bold">⚠️ Inconvénients:</span> Démarrage à froid, limitations de durée, debug complexe.</div>
                </div>`
            },
            {
                type: "content",
                title: "⚙️ Comment ça fonctionne ? (Architecture)",
                content: `<p>Le fournisseur cloud (AWS Lambda, Azure Functions, Google Cloud Functions) exécute votre fonction dans un conteneur isolé. <br>Voici le cycle typique :</p>
                <ol class="list-decimal pl-6 mt-3 space-y-2 text-gray-800">
                    <li>Déclenchement : événement (requête HTTP, upload fichier S3, message queue, etc.)</li>
                    <li>Le cloud charge votre code et l'exécute dans un environnement préconfiguré.</li>
                    <li>La fonction traite l'événement et retourne une réponse.</li>
                    <li>Les ressources sont libérées (ou maintenues chaudes quelques minutes).</li>
                </ol>
                <div class="mt-4 p-3 bg-gray-100 rounded-lg text-center">
                    <svg class="w-full max-w-md mx-auto" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="10" y="40" width="80" height="40" rx="8" fill="#6366F1" fill-opacity="0.3" stroke="#4F46E5" stroke-width="1.5"/>
                        <text x="30" y="65" font-size="10" fill="#1E1B4B">Événement</text>
                        <path d="M95 60 L130 60" stroke="#4F46E5" stroke-width="2" stroke-dasharray="4"/>
                        <rect x="140" y="30" width="120" height="60" rx="12" fill="#818CF8" fill-opacity="0.5" stroke="#4F46E5" stroke-width="1.5"/>
                        <text x="170" y="65" font-size="12" fill="#312E81" font-weight="bold">Fonction Serverless</text>
                        <path d="M265 60 L300 60" stroke="#4F46E5" stroke-width="2" stroke-dasharray="4"/>
                        <rect x="310" y="40" width="80" height="40" rx="8" fill="#6366F1" fill-opacity="0.3" stroke="#4F46E5"/>
                        <text x="325" y="65" font-size="10" fill="#1E1B4B">Réponse</text>
                    </svg>
                    <p class="text-xs text-gray-500 mt-1">Schéma simplifié : Événement → Fonction → Résultat</p>
                </div>`
            },
            {
                type: "content",
                title: "💻 Exemple : Déployer une fonction serverless (Python)",
                content: `<p>Voici un mini code de fonction qui répond "Bonjour" à un nom passé en paramètre (exemple AWS Lambda ou Google Cloud Functions).</p>
                <div class="code-block my-3">
def hello_world(request):
    name = request.args.get('name', 'Étudiant')
    return f"Bonjour {name} ! Bienvenue sur le Cloud Serverless ☁️"
                </div>
                <p class="mt-2">Pour déployer :</p>
                <ul class="list-disc pl-6 space-y-1">
                    <li>Sur AWS Lambda : on zip le code + on définit un déclencheur API Gateway.</li>
                    <li>Sur Azure Functions : via 'func init' et 'func deploy'.</li>
                    <li>Sur GCP : 'gcloud functions deploy maFonction --runtime python39 --trigger-http'.</li>
                </ul>
                <div class="bg-green-50 p-3 rounded-lg mt-3 border border-green-200">
                    🌟 Une fois déployée, vous obtenez une URL publique, et vous payez seulement par million d'exécutions et le temps de calcul.
                </div>`
            },
            {
                type: "content",
                title: "⏱️ Limitations à connaître (cold start, timeout, mémoire)",
                content: `<div class="space-y-4">
                    <div class="flex items-start gap-3"><span class="text-2xl">❄️</span><div><strong class="font-bold">Démarrage à froid (Cold Start):</strong> Si la fonction n'est pas utilisée depuis longtemps, le cloud doit allouer des ressources, ce qui ajoute un délai (quelques centaines de ms à quelques secondes).</div></div>
                    <div class="flex items-start gap-3"><span class="text-2xl">⏲️</span><div><strong class="font-bold">Timeout:</strong> La fonction ne peut pas dépasser une durée maximale (ex: AWS Lambda max 15 minutes, Azure Functions 10 min). Pas adaptée aux gros traitements longs.</div></div>
                    <div class="flex items-start gap-3"><span class="text-2xl">🧠</span><div><strong class="font-bold">Mémoire limitée:</strong> Entre 128 Mo et 10 Go selon le fournisseur. Le CPU est proportionnel à la mémoire allouée.</div></div>
                    <div class="flex items-start gap-3"><span class="text-2xl">🔧</span><div><strong class="font-bold">Débogage:</strong> Plus difficile qu'avec un serveur classique car environnement éphémère. Mais les logs sont centralisés (CloudWatch, Azure Monitor).</div></div>
                </div>
                <div class="mt-5 p-3 bg-yellow-50 border-l-4 border-yellow-500 rounded">
                    💡 <strong>Conseil pratique:</strong> Pour les applis métier critiques évitez les fonctions trop lourdes; privilégiez un bon design: fonctions petites et spécialisées.
                </div>`
            },
            {
                type: "content",
                title: "🌍 Utilisations courantes (cas concrets Cameroun & monde)",
                content: `<ul class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">
                    <li class="bg-white p-3 rounded-xl shadow">📸 <strong>Traitement d'images</strong> : redimensionnement auto après upload sur un bucket cloud.</li>
                    <li class="bg-white p-3 rounded-xl shadow">📧 <strong>Envoi d'emails</strong> de bienvenue après inscription utilisateur.</li>
                    <li class="bg-white p-3 rounded-xl shadow">🤖 <strong>API légères</strong> (backend pour applications mobiles) sans gérer de serveur.</li>
                    <li class="bg-white p-3 rounded-xl shadow">📊 <strong>Traitement de données IoT</strong> : analyser les capteurs en temps réel.</li>
                </ul>
                <p class="mt-4 text-gray-700">Au Cameroun, les startups ou projets digitaux utilisent de plus en plus serverless pour réduire les coûts initiaux et se concentrer sur le code métier. La facturation "à l'usage" est idéale pour des trafic variables.</p>
                <div class="mt-3 text-center text-sm text-indigo-600">✨ Exemple : une petite application de commande de mets locale pourrait utiliser une fonction serverless pour gérer les commandes sans dépenser en serveurs 24h/24.</div>`
            },
            {
                type: "content",
                title: "🧪 Comparaison rapide : VM vs Conteneur vs Serverless",
                content: `<div class="overflow-x-auto">
                    <table class="min-w-full bg-white rounded-xl overflow-hidden shadow-md">
                        <thead class="bg-indigo-100">
                            <tr><th class="p-2 text-left">Critère</th><th class="p-2">VM</th><th class="p-2">Conteneur</th><th class="p-2">Serverless</th></tr>
                        </thead>
                        <tbody class="text-sm">
                            <tr class="border-b"><td class="p-2 font-semibold">Gestion serveur</td><td class="p-2">Manuelle (OS, patches)</td><td class="p-2">Partiellement managé</td><td class="p-2 bg-green-50">Aucune gestion</td></tr>
                            <tr class="border-b"><td class="p-2 font-semibold">Scalabilité</td><td class="p-2">Manuelle ou auto-scaling</td><td class="p-2">Auto-scaling via orchestration</td><td class="p-2 bg-green-50">Automatique et instantanée</td></tr>
                            <tr class="border-b"><td class="p-2 font-semibold">Paiement</td><td class="p-2">À l'heure (même si inactif)</td><td class="p-2">À l'heure si VM sous-jacente</td><td class="p-2 bg-green-50">Par exécution + Go-seconde</td></tr>
                            <tr><td class="p-2 font-semibold">Démarrage</td><td class="p-2">Minutes</td><td class="p-2">Secondes</td><td class="p-2 bg-green-50">Millisecondes (sauf cold start)</td></tr>
                        </tbody>
                    </table>
                </div>
                <p class="mt-3 text-center italic text-gray-600">✅ Le serverless excelle pour les charges <strong>par lots ou à trafic intermittent</strong>.</p>`
            },
            {
                type: "recap",
                title: "📌 Récapitulatif & Bonnes pratiques",
                content: `<ul class="space-y-2">
                    <li>✔️ Serverless = focus sur le code, pas sur l'infrastructure.</li>
                    <li>✔️ Idéal pour APIs, traitements événementiels, cron jobs légers.</li>
                    <li>✔️ Attention au <strong>cold start</strong> et <strong>limitations de durée</strong>.</li>
                    <li>✔️ Pensez à découper vos fonctions pour garder une faible taille et une logique unique.</li>
                    <li>✔️ Utilisez des secrets (variables d'environnement chiffrées) pour les clés d'API.</li>
                </ul>
                <div class="mt-5 p-3 bg-indigo-100 rounded-2xl text-indigo-900">
                    🧠 <strong>À retenir :</strong> Une fonction serverless coûte moins cher qu'une VM si elle s'exécute quelques minutes par jour. Pour une charge constante, préférez des instances réservées.
                </div>`
            }
        ];

        let currentSlide = 0;
        const totalSlides = slidesData.length;

        // Fonction pour générer un slide HTML en fonction de son type
        function renderSlide(slide, idx) {
            const isActive = idx === currentSlide ? "block" : "hidden";
            let contentHtml = "";
            let bgExtra = slide.bgClass || "bg-white/80";
            
            if (slide.type === "title") {
                contentHtml = `
                    <div class="text-center py-10 md:py-16 px-4">
                        <div class="inline-block p-4 bg-indigo-100 rounded-full mb-4">☁️</div>
                        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-sky-600">${slide.title}</h1>
                        <p class="text-xl text-gray-600 mt-4">${slide.subtitle || "Fonctions serverless sans gestion de serveur"}</p>
                        <div class="mt-8 flex justify-center gap-2 text-sm text-indigo-500">
                            <span>⚡ Paiement à l'usage</span> • <span>🚀 Scaling auto</span>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectifs") {
                contentHtml = `
                    <div class="p-5 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">${slide.title}</h2>
                        <ul class="space-y-4">
                            ${slide.objectives.map(obj => `<li class="flex items-start gap-3 bg-white/70 p-3 rounded-xl shadow-sm"><span class="text-indigo-600 text-xl">🎯</span><span class="text-gray-800">${obj}</span></li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            else if (slide.type === "content" || slide.type === "recap") {
                contentHtml = `
                    <div class="p-5 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-5">${slide.title}</h2>
                        <div class="prose prose-lg max-w-none text-gray-800">${slide.content}</div>
                    </div>
                `;
            }
            
            return `
                <div class="slide ${isActive} slide-content transition-all duration-300" data-slide-index="${idx}">
                    ${contentHtml}
                </div>
            `;
        }

        // Générer tous les slides dans le wrapper
        function buildSlides() {
            let slidesHtml = '';
            slidesData.forEach((slide, i) => {
                slidesHtml += renderSlide(slide, i);
            });
            $('#slideWrapper').html(slidesHtml);
            updateDots();
            updateButtons();
        }

        // Mettre à jour l'affichage des dots
        function updateDots() {
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const activeClass = (i === currentSlide) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
                dotsHtml += `<button class="dot h-3 rounded-full ${activeClass} transition-all duration-200 mx-1" data-index="${i}"></button>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            $('.dot').on('click', function() {
                let idx = $(this).data('index');
                goToSlide(idx);
            });
        }

        function goToSlide(index) {
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            currentSlide = index;
            // Masquer tous les slides
            $('.slide').each(function() {
                $(this).addClass('hidden');
            });
            $(`.slide[data-slide-index="${currentSlide}"]`).removeClass('hidden');
            updateDots();
            updateButtons();
        }

        function updateButtons() {
            $('#prevBtn').prop('disabled', currentSlide === 0).css('opacity', currentSlide === 0 ? 0.5 : 1);
            $('#nextBtn').text(currentSlide === totalSlides - 1 ? 'Terminé ✓' : 'Suivant →');
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                goToSlide(currentSlide + 1);
            } else {
                // Si dernier slide, afficher une alerte félicitations
                alert("🎉 Félicitations ! Vous avez terminé la leçon sur le Serverless. Vous maîtrisez maintenant les fonctions sans serveur.");
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // Evenements
        $(document).ready(function() {
            buildSlides();
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            // ajout geste clavier flèches droite/gauche
            $(document).keydown(function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
            // Optimisation mobile : swipe simple non implémenté mais navigation tactile via boutons
        });
    </script>
</body>
</html>
