<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 5 : Écosystème Microsoft Azure | Cours Cloud Computing</title>
    <!-- Tailwind CSS CDN + base personnalisée pour lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax (pour formules si besoin, mais optionnel ici, on l'ajoute par précaution) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        /* ajustements pour le défilement fluide et slide actif */
        body {
            background: #f4f7fc; /* fond doux */
        }
        .slide {
            transition: transform 0.3s ease, opacity 0.3s ease;
            scroll-margin-top: 1rem;
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:hover {
            transform: scale(1.02);
        }
        /* améliorer le contraste sur les cartes */
        .card-cloud {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
        }
        @media (max-width: 640px) {
            .container-slides {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10 container-slides">
        <!-- Header avec titre de matière et progression -->
        <div class="mb-6 flex flex-wrap justify-between items-center border-b border-blue-200 pb-3">
            <div>
                <p class="text-sm font-semibold text-blue-700 uppercase tracking-wide">Développement Web / Cloud Computing</p>
                <p class="text-xs text-gray-500">Initiation au Cloud Computing – Chapitre 2 : Écosystème cloud</p>
            </div>
            <div class="bg-white px-3 py-1 rounded-full shadow-sm text-sm font-medium text-blue-800">
                Leçon 5 : Microsoft Azure
            </div>
        </div>

        <!-- Conteneur des slides généré dynamiquement par jQuery -->
        <div id="slidesContainer" class="space-y-8"></div>

        <!-- Navigation + indicateur de progression -->
        <div class="sticky bottom-4 bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-3 mt-8 flex justify-between items-center border border-blue-100 z-10">
            <button id="prevSlide" class="btn-nav bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-5 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>◀ Précédent</button>
            <div class="text-sm text-gray-600 bg-blue-50 px-4 py-1 rounded-full">
                Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
            </div>
            <button id="nextSlide" class="btn-nav bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-full transition">Suivant ▶</button>
        </div>
    </div>

    <script>
        // Données de la leçon 5 d'après le programme JSON (lesson5)
        // Nous construisons la structure complète des slides : Titre, Objectifs, Contenu détaillé
        const lessonData = {
            title: "Microsoft Azure : Écosystème, régions et services clés",
            subtitle: "Découvrir le cloud Azure et son intégration avec l'univers Microsoft",
            objectives: [
                "Découvrir l'écosystème Azure et son intégration avec Microsoft",
                "Comprendre les régions Azure et les zones de disponibilité",
                "Identifier les services phares (VM, Blob Storage, Azure SQL, Functions, AKS)"
            ],
            contentSections: [
                {
                    title: "🌩️ Qu'est-ce que Microsoft Azure ?",
                    paragraphs: [
                        "Microsoft Azure est une plateforme de cloud computing publique proposée par Microsoft. Lancé en 2010, Azure propose plus de 200 services allant du calcul (machines virtuelles) à l'intelligence artificielle, en passant par les bases de données et l'Internet des objets (IoT).",
                        "L'un des atouts majeurs d'Azure est son intégration native avec les produits Microsoft : Windows Server, Active Directory, Office 365, Dynamics 365, et Visual Studio. Cela permet aux entreprises déjà équipées de ces outils de migrer facilement leurs applications vers le cloud tout en gardant une gestion centralisée."
                    ],
                    illustration: "azure_eco" // dessin symbolique
                },
                {
                    title: "🗺️ Régions Azure et Zones de disponibilité",
                    paragraphs: [
                        "Une région Azure est un ensemble de centres de données interconnectés par un réseau à faible latence, situé dans une zone géographique précise (ex: France Centre, France Sud, USA Est, Allemagne Centre). Chaque région est indépendante pour garantir la résilience.",
                        "Les Zones de disponibilité (Availability Zones) sont des emplacements physiques distincts au sein d’une même région, chacun disposant de ses propres alimentations, refroidissements et réseaux. En répartissant vos applications sur plusieurs zones, vous protégez votre service contre une panne de centre de données. Actuellement, plus de 60 régions dans le monde dont plusieurs proposent des zones de disponibilité."
                    ],
                    factBox: "💡 Le saviez-vous ? Azure dispose de régions spécialisées comme « Azure Government » pour les organismes publics américains, ou « Azure China » opéré par 21Vianet."
                },
                {
                    title: "⚙️ Services phares : Calcul et stockage",
                    paragraphs: [
                        "• **Machines Virtuelles (VM)** : Permet de créer des serveurs virtuels Linux ou Windows en quelques minutes. Vous choisissez la taille, les disques et bénéficiez de la mise à l'échelle automatique (scale sets).",
                        "• **Blob Storage** : Service de stockage objet pour données non structurées (images, vidéos, logs, sauvegardes). Idéal pour les applications web, la distribution de contenu et l'archivage (tiers chaud, froid, archive).",
                        "• **Azure SQL Database** : Base de données relationnelle managée compatible SQL Server. La haute disponibilité, les sauvegardes automatiques et le scaling sont intégrés, réduisant la charge d'administration.",
                        "• **Azure Files** : Stockage de fichiers partagé accessible via protocole SMB (Server Message Block), parfait pour migrer des applications legacy partagées."
                    ]
                },
                {
                    title: "🚀 Services modernes : Serverless & conteneurs",
                    paragraphs: [
                        "• **Azure Functions** : Modèle serverless permettant d’exécuter du code (C#, Python, JS, Java) déclenché par des événements (HTTP, timer, message queue). Facturation à l’exécution, idéal pour des tâches ponctuelles ou microservices.",
                        "• **Azure Kubernetes Service (AKS)** : Service Kubernetes managé simplifiant le déploiement, la gestion et la mise à l'échelle d’applications conteneurisées. AKS prend en charge l'intégration avec Azure Active Directory, le monitoring et les mises à jour automatiques.",
                        "• **Azure Container Instances (ACI)** : Exécution de conteneurs sans gestion de serveur ni orchestrateur; parfait pour des charges isolées ou des jobs batch."
                    ],
                    schema: "serverless"
                },
                {
                    title: "🔐 Intégration Microsoft & sécurité",
                    paragraphs: [
                        "Azure Active Directory (Azure AD) est le service d’identité et d’accès qui s’intègre avec Active Directory sur site. Il permet l'authentification unique (SSO) pour des milliers d'applications SaaS et la gestion des accès basée sur les rôles (RBAC).",
                        "Azure dispose également d'outils de sécurité avancés : Azure Security Center, Azure Sentinel (SIEM), et le chiffrement des données au repos via Azure Key Vault pour la gestion des clés et des secrets.",
                        "Cette intégration poussée rassure les entreprises qui souhaitent adopter le cloud tout en respectant leurs politiques de sécurité."
                    ]
                },
                {
                    title: "📊 Comparaison rapide avec d'autres clouds",
                    paragraphs: [
                        "Azure se distingue particulièrement pour les entreprises ayant un patrimoine Microsoft important. Il offre des contrats de licence hybrides (Azure Hybrid Benefit) permettant d’utiliser des licences Windows Server et SQL Server sur site, aussi dans le cloud à moindre coût.",
                        "Bien qu'AWS soit leader, Azure rattrape son retard grâce à sa couverture régionale et ses services IA/ML. GCP reste en avance sur l'analyse de données massive et le machine learning natif."
                    ]
                }
            ]
        };

        // Génération des slides via jQuery
        $(document).ready(function() {
            let slidesArray = [];
            
            // --- SLIDE 1 : TITRE ---
            const slideTitle = $(`
                <div class="slide bg-white rounded-2xl shadow-lg overflow-hidden border border-blue-100 p-6 md:p-8 transition-all">
                    <div class="flex flex-col items-center text-center">
                        <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-cyan-600 rounded-full flex items-center justify-center text-white text-3xl mb-5 shadow-md">
                            ☁️
                        </div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">${lessonData.title}</h1>
                        <p class="text-lg text-blue-700 font-medium">${lessonData.subtitle}</p>
                        <div class="mt-6 w-16 h-1 bg-blue-300 rounded-full"></div>
                        <p class="text-gray-500 mt-6 text-sm">Cours Cloud Computing – Leçon 5</p>
                    </div>
                </div>
            `);
            slidesArray.push(slideTitle);
            
            // --- SLIDE 2 : OBJECTIFS PÉDAGOGIQUES ---
            const objList = lessonData.objectives.map(obj => `<li class="flex items-start space-x-3 mb-3"><span class="text-blue-600 text-lg">🎯</span><span class="text-gray-700">${obj}</span></li>`).join('');
            const slideObjectives = $(`
                <div class="slide bg-white rounded-2xl shadow-lg p-6 md:p-8 border-l-8 border-blue-500">
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 flex items-center gap-2 mb-5"><span class="text-blue-600">📌</span> Objectifs de la leçon</h2>
                    <ul class="space-y-2 text-lg">
                        ${objList}
                    </ul>
                    <div class="mt-6 p-4 bg-blue-50 rounded-xl text-blue-800 text-sm italic">
                        À la fin de cette leçon, vous saurez présenter les forces d’Azure et identifier ses services essentiels.
                    </div>
                </div>
            `);
            slidesArray.push(slideObjectives);
            
            // --- SLIDES CONTENU : parcourir contentSections ---
            lessonData.contentSections.forEach((section, idx) => {
                let extraHtml = '';
                // Dessins / illustrations intégrés pour certains slides (nécessaires, faits maison)
                if (section.illustration === 'azure_eco') {
                    extraHtml = `
                        <div class="mt-5 flex justify-center">
                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 w-full max-w-md">
                                <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto">
                                    <rect x="10" y="40" width="80" height="50" fill="#0078D4" rx="8" />
                                    <text x="25" y="72" fill="white" font-size="12">Windows</text>
                                    <rect x="110" y="20" width="80" height="50" fill="#2F7C31" rx="8" />
                                    <text x="130" y="52" fill="white" font-size="12">Office 365</text>
                                    <rect x="210" y="60" width="80" height="50" fill="#FFB900" rx="8" />
                                    <text x="225" y="92" fill="#333" font-size="12">Active Dir</text>
                                    <rect x="300" y="30" width="80" height="50" fill="#5E2E97" rx="8" />
                                    <text x="318" y="62" fill="white" font-size="12">Visual Studio</text>
                                    <path d="M90 65 L108 48" stroke="#555" stroke-width="2" stroke-dasharray="4" />
                                    <path d="M190 48 L208 80" stroke="#555" stroke-width="2" stroke-dasharray="4" />
                                    <path d="M290 82 L298 70" stroke="#555" stroke-width="2" />
                                    <text x="140" y="130" fill="#0078D4" font-size="10" text-anchor="middle">Azure intégré</text>
                                    <circle cx="200" cy="125" r="18" fill="#0078D4" />
                                    <text x="200" y="130" fill="white" font-size="11" text-anchor="middle">Azure</text>
                                </svg>
                                <p class="text-center text-xs text-gray-500 mt-2">Intégration avec l'écosystème Microsoft</p>
                            </div>
                        </div>`;
                }
                if (section.schema === 'serverless') {
                    extraHtml = `
                        <div class="mt-5 flex justify-center">
                            <div class="bg-gray-50 p-3 rounded-xl border border-blue-100 max-w-md w-full">
                                <div class="flex flex-wrap justify-center gap-3 text-center">
                                    <div class="bg-blue-100 p-2 rounded-lg"><span class="text-2xl">⚡</span><p class="text-xs">Azure Functions</p></div>
                                    <div class="bg-green-100 p-2 rounded-lg"><span class="text-2xl">🐳</span><p class="text-xs">AKS (K8s)</p></div>
                                    <div class="bg-purple-100 p-2 rounded-lg"><span class="text-2xl">📦</span><p class="text-xs">Container Instances</p></div>
                                </div>
                                <p class="text-xs text-center mt-2">Services conteneurs & serverless managés</p>
                            </div>
                        </div>`;
                }
                if (section.factBox) {
                    extraHtml += `<div class="mt-4 bg-amber-50 border-l-4 border-amber-400 p-3 rounded-md text-amber-800 text-sm">💡 ${section.factBox}</div>`;
                }
                
                const parags = section.paragraphs.map(p => `<p class="mb-3 text-gray-700 leading-relaxed">${p}</p>`).join('');
                const slideContent = $(`
                    <div class="slide bg-white rounded-2xl shadow-md p-6 md:p-8">
                        <h2 class="text-xl md:text-2xl font-bold text-blue-800 border-b border-blue-200 pb-2 mb-4 flex items-center gap-2">
                            <span>📘</span> ${section.title}
                        </h2>
                        <div class="prose max-w-none text-gray-700">
                            ${parags}
                        </div>
                        ${extraHtml}
                    </div>
                `);
                slidesArray.push(slideContent);
            });
            
            // Slide bonus : récapitulatif des services phares sous forme de carte mémoire
            const recapSlide = $(`
                <div class="slide bg-white rounded-2xl shadow-md p-6 md:p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">📋 Récapitulatif : Services Azure essentiels</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="bg-blue-50 p-3 rounded-xl"><span class="font-bold">💻 Machines Virtuelles</span><p class="text-sm">IaaS, VM Windows/Linux, scale sets</p></div>
                        <div class="bg-blue-50 p-3 rounded-xl"><span class="font-bold">🗄️ Blob Storage</span><p class="text-sm">Stockage objet, données non structurées</p></div>
                        <div class="bg-blue-50 p-3 rounded-xl"><span class="font-bold">🗃️ Azure SQL</span><p class="text-sm">Base relationnelle managée haute disponibilité</p></div>
                        <div class="bg-blue-50 p-3 rounded-xl"><span class="font-bold">⚙️ Azure Functions</span><p class="text-sm">Serverless, déclencheurs événementiels</p></div>
                        <div class="bg-blue-50 p-3 rounded-xl"><span class="font-bold">🐙 AKS</span><p class="text-sm">Kubernetes managé pour conteneurs</p></div>
                        <div class="bg-blue-50 p-3 rounded-xl"><span class="font-bold">🌍 CDN + Front Door</span><p class="text-sm">Accélération de contenu, WAF</p></div>
                    </div>
                    <div class="mt-5 text-sm text-gray-600 bg-gray-50 p-3 rounded-lg">
                        ✅ À retenir : Azure se distingue par son intégration Microsoft (AD, licences hybrides) et sa couverture mondiale avec zones de disponibilité.
                    </div>
                </div>
            `);
            slidesArray.push(recapSlide);
            
            // Nettoyage et injection
            const $container = $('#slidesContainer');
            $container.empty();
            slidesArray.forEach(slide => {
                $container.append(slide);
            });
            
            const total = slidesArray.length;
            $('#totalSlides').text(total);
            let current = 0;
            
            function updateSlidesVisibility() {
                $('.slide').each(function(index) {
                    if (index === current) {
                        $(this).removeClass('hidden').show();
                        // scroll dans la vue
                    } else {
                        $(this).hide();
                    }
                });
                $('#currentSlideIdx').text(current+1);
                $('#prevSlide').prop('disabled', current === 0);
                $('#nextSlide').prop('disabled', current === total-1);
                // faire défiler vers le haut
                $('html, body').animate({ scrollTop: $('#slidesContainer').offset().top - 20 }, 200);
            }
            
            $('#nextSlide').on('click', function() {
                if (current < total-1) {
                    current++;
                    updateSlidesVisibility();
                }
            });
            $('#prevSlide').on('click', function() {
                if (current > 0) {
                    current--;
                    updateSlidesVisibility();
                }
            });
            
            // initialisation affichage (cacher tous sauf premier)
            updateSlidesVisibility();
            
            // gérer le responsive: toucher navigation swip? optionel
            let touchstartX = 0;
            let touchendX = 0;
            $container.on('touchstart', function(e) {
                touchstartX = e.originalEvent.changedTouches[0].screenX;
            });
            $container.on('touchend', function(e) {
                touchendX = e.originalEvent.changedTouches[0].screenX;
                if (touchendX < touchstartX - 40 && current < total-1) {
                    current++;
                    updateSlidesVisibility();
                } else if (touchendX > touchstartX + 40 && current > 0) {
                    current--;
                    updateSlidesVisibility();
                }
            });
        });
    </script>
    <!-- note: les illustrations SVG sont dessinées manuellement pour un besoin clair et accessible -->
    <!-- ajout d'un style supplémentaire pour améliorer le confort de lecture -->
</body>
</html>
