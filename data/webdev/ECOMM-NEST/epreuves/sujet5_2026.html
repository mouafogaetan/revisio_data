<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une API complète pour plateforme e-commerce",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Conception de Modèles de Données",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333; padding: 10px;'> <p>Vous êtes chargé de concevoir une <strong>base de données pour un système de gestion de commandes</strong> d'une plateforme e-commerce. Le système doit permettre la gestion des clients, des produits, des commandes et des paiements.</p> <p><strong>Spécifications :</strong></p> <ul> <li>Un <strong>client</strong> peut passer plusieurs commandes.</li> <li>Une <strong>commande</strong> peut contenir plusieurs produits.</li> <li>Un <strong>paiement</strong> est associé à une seule commande.</li> <li>Les entités doivent être normalisées jusqu'à la 3NF.</li> </ul> </div>",
      "questions": [
        {
          "question": "<div>1) <strong>(1.5 pts)</strong> Identifiez les entités principales de ce système et proposez pour chacune d'elles une liste d'attributs pertinents. Justifiez votre choix.</div>",
          "reponse": "<div><strong>Entités principales :</strong><br><br> <strong>Client :</strong> idClient (PK), nom, prénom, email, motDePasse, dateInscription, adresseLivraison, téléphone.<br> <strong>Produit :</strong> idProduit (PK), nom, description, prix, stock, image, SKU, catégorie.<br> <strong>Commande :</strong> idCommande (PK), date, statut, total, adresseLivraison, idClient (FK).<br> <strong>CommandeItem :</strong> id (PK), idCommande (FK), idProduit (FK), quantité, prixUnitaire.<br> <strong>Paiement :</strong> idPaiement (PK), idCommande (FK), montant, méthode, statut, datePaiement.<br> <strong>Justification :</strong> Ces entités couvrent l'ensemble du processus de vente : de l'enregistrement du client à la validation du paiement, en passant par la gestion des produits et des commandes. La table CommandeItem permet de traiter la relation Many-to-Many entre Commande et Produit.</div>"
        },
        {
          "question": "<div>2) <strong>(1 pt)</strong> Dessinez le diagramme entité-association (DEA) représentant les relations entre les entités <strong>Client</strong>, <strong>Commande</strong> et <strong>Produit</strong>. Précisez la cardinalité de chaque relation.</div>",
          "reponse": "<div><strong>Cardinalités du DEA :</strong><br><br> <strong>Client (1) ⟶ Commande (N) :</strong> Relation One-to-Many (1,N). Un client peut passer plusieurs commandes, mais une commande appartient à un seul client.<br> <strong>Commande (N) ⟶ Produit (N) :</strong> Relation Many-to-Many (N,N). Une commande peut contenir plusieurs produits, et un produit peut apparaître dans plusieurs commandes. Cette relation est matérialisée par une table de liaison <strong>CommandeItem</strong> qui contient les clés étrangères et le champ Quantité.</div>"
        },
        {
          "question": "<div>3) <strong>(1.5 pts)</strong> Expliquez ce qu'est la <strong>troisième forme normale (3NF)</strong> et appliquez-la à l'entité <strong>Produit</strong> en vous assurant qu'il n'y a pas de dépendances fonctionnelles transitives. Illustrez avec un exemple concret.</div>",
          "reponse": "<div><strong>Troisième Forme Normale (3NF) :</strong> Une table est en 3NF si elle est en 2NF et qu'aucun attribut non-clé ne dépend d'un autre attribut non-clé (dépendance transitive).<br><br> <strong>Application à l'entité Produit :</strong> Pour éviter la redondance et respecter la 3NF, il ne faut pas stocker des informations sur la catégorie dans la table Produit. Par exemple, au lieu de stocker le nom de la catégorie et sa description directement dans la table Produit, on stocke uniquement la clé étrangère <strong>idCategorie</strong>. Les informations détaillées de la catégorie (nom, description) sont stockées dans une table <strong>Categorie</strong> séparée, évitant ainsi une dépendance transitive.</div>"
        }
      ]
    },
    {
      "titre": "Implémentation de l'Authentification JWT",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333; padding: 10px;'> <p>Vous devez sécuriser une API NestJS en implémentant un système d'authentification basé sur des tokens JWT. L'API gère des utilisateurs ayant différents rôles.</p> <p>Extrait du code actuel :</p> <pre style='background-color: #f4f4f4; padding: 15px; border-radius: 5px;'><code>// auth.controller.ts<br>@Post('login')<br>login(@Body() loginDto: LoginDto) {<br>    // Retourner un token JWT<br>}<br><br>// users.controller.ts<br>@Get('profile')<br>getProfile(@Request() req) {<br>    // Retourner le profil de l'utilisateur connecté<br>}<br><br>@Delete(':id')<br>removeUser(@Param('id') id: string) {<br>    // Supprimer un utilisateur (admin uniquement)<br>}</code></pre> </div>",
      "questions": [
        {
          "question": "<div>1) <strong>(1.5 pts)</strong> Expliquez le rôle de <strong>JwtAuthGuard</strong> dans NestJS et décrivez comment il protège les routes d'une API. Donnez un exemple d'utilisation.</div>",
          "reponse": "<div>Le <strong>JwtAuthGuard</strong> est un Guard NestJS qui implémente la stratégie JWT pour valider les tokens d'accès. Il intercepte les requêtes HTTP et vérifie la présence et la validité du token JWT dans l'en-tête 'Authorization'. Si le token est valide, l'utilisateur est authentifié et l'accès à la route est autorisé. Dans le cas contraire, une erreur HTTP 401 (Non autorisé) est renvoyée.<br><br> <strong>Exemple d'utilisation :</strong><br><code>// products.controller.ts<br>@Controller('products')<br>@UseGuards(JwtAuthGuard)<br>export class ProductsController {<br>  @Post()<br>  create(@Body() createProductDto: CreateProductDto) { /* ... */ }<br>}</code> Ici, l'ensemble du contrôleur Products est protégé : seuls les utilisateurs authentifiés peuvent créer un produit.</div>"
        },
        {
          "question": "<div>2) <strong>(2 pts)</strong> Implémentez le <strong>RolesGuard</strong> pour restreindre l'accès à la méthode <code>removeUser()</code> aux utilisateurs ayant le rôle <strong>'admin'</strong>. Écrivez le code du Guard et expliquez son fonctionnement.</div>",
          "reponse": "<div><strong>Implémentation du RolesGuard :</strong><br><br> <code>// common/guards/roles.guard.ts<br>import { Injectable, CanActivate, ExecutionContext, UnauthorizedException } from '@nestjs/common';<br>import { Reflector } from '@nestjs/core';<br><br>@Injectable()<br>export class RolesGuard implements CanActivate {<br>  constructor(private reflector: Reflector) {}<br><br>  canActivate(context: ExecutionContext): boolean {<br>    const requiredRoles = this.reflector.getAllAndOverride<string[]>('roles', [<br>      context.getHandler(),<br>      context.getClass(),<br>    ]);<br>    if (!requiredRoles) {<br>      return true;<br>    }<br>    const request = context.switchToHttp().getRequest();<br>    const user = request.user;<br>    if (!user) {<br>      throw new UnauthorizedException('Utilisateur non authentifié');<br>    }<br>    return requiredRoles.some(role => user.roles?.includes(role));<br>  }<br>}</code><br><br> <strong>Fonctionnement :</strong> Le guard vérifie si des rôles sont spécifiés pour la route via le décorateur @Roles(). Si c'est le cas, il compare la liste des rôles requis avec ceux de l'utilisateur récupéré dans la requête. Si l'utilisateur possède un des rôles requis, il autorise l'accès.</div>"
        },
        {
          "question": "<div>3) <strong>(1.5 pts)</strong> Rédigez le code du décorateur <code>@Roles()</code> nécessaire pour utiliser le guard précédent, puis appliquez ce décorateur à la route <code>removeUser()</code> du contrôleur <code>UsersController</code>.</div>",
          "reponse": "<div><strong>Création du décorateur @Roles() :</strong><br><br> <code>// common/decorators/roles.decorator.ts<br>import { SetMetadata } from '@nestjs/common';<br><br>export const Roles = (...roles: string[]) => SetMetadata('roles', roles);</code><br><br> <strong>Application sur la route :</strong><br><br> <code>// users.controller.ts<br>import { Roles } from '../common/decorators/roles.decorator';<br>import { UseGuards } from '@nestjs/common';<br><br>@Controller('users')<br>@UseGuards(JwtAuthGuard, RolesGuard)<br>export class UsersController {<br>  // ...<br>  @Delete(':id')<br>  @Roles('admin')<br>  removeUser(@Param('id') id: string) {<br>    // Seuls les admins authentifiés peuvent accéder à cette route<br>    return this.userService.remove(id);<br>  }<br>}</code></div>"
        },
        {
          "question": "<div>4) <strong>(1 pt)</strong> Expliquez la différence entre une erreur HTTP 401 (Unauthorized) et 403 (Forbidden) dans le contexte de votre API.</div>",
          "reponse": "<div><strong>Différence :</strong><br><br> <strong>401 Unauthorized :</strong> La requête n'est pas authentifiée. Cela signifie que l'utilisateur n'a pas fourni de token JWT valide ou que le token est manquant. Le serveur demande une identification.<br><br> <strong>403 Forbidden :</strong> La requête est authentifiée (l'utilisateur est identifié), mais il n'a pas les autorisations nécessaires pour accéder à la ressource. Cela est généralement lié à un manque de rôle ou de permission, comme un client tentant d'accéder à une route administrateur.</div>"
        }
      ]
    },
    {
      "titre": "Amélioration des Performances et de la Sécurité",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333; padding: 10px;'> <p>Votre API e-commerce connaît un fort trafic, et les requêtes vers le catalogue de produits ralentissent le système. Vous décidez d'implémenter un système de <strong>cache</strong> avec Redis, de <strong>limitation de débit</strong> (Rate Limiting) et de renforcer la sécurité.</p> <p>Extrait du service actuel :</p> <pre style='background-color: #f4f4f4; padding: 15px; border-radius: 5px;'><code>// products.service.ts<br>async findAll() {<br>    return await this.productRepository.find();<br>}<br><br>async findOne(id: string) {<br>    return await this.productRepository.findOneBy({ id });<br>}<br></code></pre> </div>",
      "questions": [
        {
          "question": "<div>1) <strong>(2 pts)</strong> Proposez une implémentation du cache Redis pour la méthode <code>findAll()</code> et <code>findOne()</code> à l'aide de <code>@nestjs/cache-manager</code>. Expliquez également comment invalider le cache après une modification (création ou mise à jour).</div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
