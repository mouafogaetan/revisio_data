<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une API complète pour plateforme e-commerce",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Conception et Architecture de l'API (10 pts)",
      "points": "10 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> Vous êtes lead développeur chez <strong>\"AfriShop\"</strong>, une jeune startup camerounaise qui souhaite lancer une plateforme e-commerce. L'équipe a défini les besoins suivants :</p><ul style='list-style-type: disc; padding-left: 20px;'><li>Gestion d'un catalogue de produits avec catégories et sous-catégories.</li><li>Authentification et gestion des profils pour 3 types d'acteurs : clients, vendeurs et administrateurs.</li><li>Un système de panier d'achat.</li><li>Un processus de commande avec gestion des statuts.</li><li>Intégration de paiement (Stripe et PayPal).</li><li>Un tableau de bord pour les administrateurs.</li></ul><p>Votre mission est de <strong>concevoir l'architecture</strong> de l'API backend qui répondra à ces besoins.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 1.1 (3 pts) :</strong> Proposez une <strong>structure de projet</strong> modulaire en suivant les bonnes pratiques de NestJS. Identifiez les modules principaux et les modules partagés. Justifiez votre découpage en expliquant les responsabilités de chaque module.</p></div>",
          "reponse": "<div><p><strong>Structure modulaire proposée :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Modules principaux (domaines) :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>AuthModule</code> : Gestion de l'inscription, de la connexion et de la délivrance des tokens JWT.</li><li><code>UsersModule</code> : Gestion des profils utilisateurs (CRUD, rôles, adresses).</li><li><code>ProductsModule</code> : Gestion du catalogue (produits, catégories, variations, images).</li><li><code>CartModule</code> : Gestion du panier d'achat (ajout, modification, fusion).</li><li><code>OrdersModule</code> : Gestion du processus de commande (création, statuts, annulation).</li><li><code>PaymentsModule</code> : Intégration des solutions de paiement (Stripe, PayPal).</li><li><code>AdminModule</code> : Tableau de bord et fonctionnalités d'administration.</li></ul></li><li><strong>Modules partagés :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>CommonModule</code> : DTOs, interfaces, guards, décorateurs, filtres d'exception, intercepteurs.</li><li><code>DatabaseModule</code> : Configuration et gestion de la base de données avec TypeORM.</li><li><code>ConfigModule</code> : Gestion centralisée des variables d'environnement.</li></ul></li><li><strong>Justification :</strong> Ce découpage respecte le principe de <strong>séparation des responsabilités (Separation of Concerns)</strong>. Chaque module a une mission claire et peut être développé, testé et maintenu indépendamment. Les modules partagés évitent la duplication de code et centralisent les configurations critiques.</li></ul></div>"
        },
        {
          "question": "<div><p><strong>Question 1.2 (4 pts) :</strong> Proposez un <strong>diagramme d'entité-association (EA)</strong> pour les entités principales suivantes : <code>User</code>, <code>Product</code>, <code>Category</code>, <code>Order</code> et <code>Cart</code>. Vous devez :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Définir les attributs pertinents pour chaque entité.</li><li>Spécifier les relations entre les entités (OneToMany, ManyToOne, ManyToMany, OneToOne).</li><li>Expliquer votre choix pour la relation entre <code>User</code> et <code>Cart</code>.</li></ul></div>",
          "reponse": "<div><p><strong>Diagramme EA simplifié :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>User</strong> (id, email, password, firstName, lastName, phone, createdAt, updatedAt, lastLogin)</li><li><strong>Role</strong> (id, name: 'admin' | 'customer' | 'seller') <em>Relation ManyToMany avec User</em></li><li><strong>Address</strong> (id, street, city, state, country, zipCode) <em>Relation OneToMany avec User</em></li><li><strong>Product</strong> (id, name, description, price, stock, sku, images) <em>Relation ManyToOne avec Category</em></li><li><strong>Category</strong> (id, name, slug, parentCategory) <em>Relation ManyToOne pour les sous-catégories</em></li><li><strong>ProductVariation</strong> (id, attribute, value, stock) <em>Relation ManyToOne avec Product</em></li><li><strong>Cart</strong> (id, visitorId, userId, expiresAt) <em>Relation OneToOne avec User (optionnelle)</em></li><li><strong>CartItem</strong> (id, quantity) <em>Relations ManyToOne avec Cart et Product</em></li><li><strong>Order</strong> (id, total, status, shippingAddress, paymentMethod, trackingNumber, createdAt) <em>Relation ManyToOne avec User</em></li><li><strong>OrderItem</strong> (id, quantity, priceSnapshot, productSnapshot) <em>Relation ManyToOne avec Order</em></li></ul><p><strong>Justification pour la relation User ↔ Cart :</strong> Un utilisateur a un <strong>seul</strong> panier actif (<code>OneToOne</code>), ce qui simplifie la gestion et la recherche du panier. Cependant, pour gérer les paniers d'utilisateurs non connectés, on utilise un champ <code>visitorId</code> dans l'entité Cart. Ainsi, le panier est associé à l'utilisateur lorsqu'il est connecté, sinon à une session anonyme.</p></div>"
        },
        {
          "question": "<div><p><strong>Question 1.3 (3 pts) :</strong> Pour chaque module que vous avez identifié à la question 1.1, proposez une <strong>liste des endpoints REST</strong> principaux. Pour chaque endpoint, précisez :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>La méthode HTTP.</li><li>Le chemin (URL).</li><li>Le rôle requis (public, client, vendeur, admin).</li></ul><p>Limitez-vous aux 2-3 endpoints les plus critiques par module.</p></div>",
          "reponse": "<div><p><strong>Liste des endpoints principaux :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>AuthModule :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>POST /auth/register</code> - Public - Inscription.</li><li><code>POST /auth/login</code> - Public - Connexion.</li><li><code>POST /auth/refresh</code> - Client - Rafraîchir le token JWT.</li></ul></li><li><strong>UsersModule :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>GET /users/profile</code> - Client - Récupérer son profil.</li><li><code>PUT /users/profile</code> - Client - Mettre à jour son profil.</li><li><code>GET /users</code> - Admin - Lister tous les utilisateurs.</li></ul></li><li><strong>ProductsModule :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>GET /products</code> - Public - Lister les produits (avec filtres, tri, pagination).</li><li><code>GET /products/:id</code> - Public - Récupérer un produit spécifique.</li><li><code>POST /products</code> - Vendeur/Admin - Créer un produit.</li></ul></li><li><strong>CartModule :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>GET /cart</code> - Client - Récupérer le panier de l'utilisateur.</li><li><code>POST /cart/items</code> - Client - Ajouter un article au panier.</li><li><code>DELETE /cart/items/:id</code> - Client - Supprimer un article du panier.</li></ul></li><li><strong>OrdersModule :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>POST /orders</code> - Client - Créer une commande à partir du panier.</li><li><code>GET /orders</code> - Client - Lister les commandes de l'utilisateur.</li><li><code>GET /orders/:id</code> - Client - Récupérer une commande spécifique.</li></ul></li><li><strong>PaymentsModule :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><code>POST /payments/stripe/intent</code> - Client - Créer un PaymentIntent Stripe.</li><li><code>POST /payments/paypal/order</code> - Client - Créer une commande PayPal.</li></ul></li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Authentification et Gestion des Utilisateurs (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> Pour l'API d'AfriShop, vous devez implémenter le système d'authentification et la gestion des utilisateurs.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 2.1 (3 pts) :</strong> Décrivez, de manière détaillée, le <strong>processus d'inscription</strong> d'un nouvel utilisateur dans l'API. Vous devez :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Expliquer les étapes de validation des données (email, mot de passe fort).</li><li>Décrire comment le mot de passe est sécurisé (hachage).</li><li>Indiquer comment gérer l'envoi d'un email de confirmation.</li><li>Préciser le statut du compte avant validation.</li></ul></div>",
          "reponse": "<div><p><strong>Processus d'inscription :</strong></p><ol style='list-style-type: decimal; padding-left: 20px;'><li><strong>Réception des données :</strong> Le client envoie un <code>POST /auth/register</code> avec un DTO contenant <code>email</code>, <code>password</code>, <code>firstName</code>, <code>lastName</code>, <code>phone</code>.</li><li><strong>Validation :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Email :</strong> Vérification du format avec <code>class-validator</code> (<code>@IsEmail()</code>) et de l'unicité en base de données.</li><li><strong>Mot de passe :</strong> Vérification de la robustesse (au moins 8 caractères, une majuscule, un chiffre, un caractère spécial) via un validateur personnalisé.</li></ul></li><li><strong>Hachage du mot de passe :</strong> Utilisation de <code>bcrypt</code> pour hacher le mot de passe avec un salt (coût de 10 ou 12).</li><li><strong>Création du compte :</strong> Le compte est créé en base de données avec le rôle <code>customer</code> par défaut et un statut <code>inactive</code> ou <code>pending</code>.</li><li><strong>Génération d'un token de validation :</strong> Création d'un token JWT à usage unique (valable 24h) contenant l'email de l'utilisateur.</li><li><strong>Envoi de l'email de confirmation :</strong> Envoi d'un email via <code>Nodemailer</code> contenant un lien de validation (ex: <code>/auth/verify?token=...</code>).</li><li><strong>Réponse :</strong> L'API renvoie un message de succès indiquant qu'un email de confirmation a été envoyé.</li></ol><p><strong>Statut du compte :</strong> Le compte reste <strong>inactif</strong> (ou avec le statut <code>pending</code>) jusqu'à ce que l'utilisateur clique sur le lien de confirmation. Cela permet d'éviter les inscriptions avec des emails non valides.</p></div>"
        },
        {
          "question": "<div><p><strong>Question 2.2 (3 pts) :</strong> Expliquez le <strong>fonctionnement du flux d'authentification JWT</strong> avec <strong>Access Token</strong> et <strong>Refresh Token</strong>. Pour chaque type de token, précisez :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Ce qu'il contient (payload).</li><li>Sa durée de vie.</li><li>Son utilité.</li><li>Comment il est utilisé pour sécuriser les endpoints.</li></ul></div>",
          "reponse": "<div><p><strong>Flux JWT avec Access Token et Refresh Token :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Access Token :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Payload :</strong> <code>userId</code>, <code>email</code>, <code>roles</code> (liste des rôles).</li><li><strong>Durée de vie :</strong> Courte (15 minutes à 1 heure).</li><li><strong>Utilité :</strong> Il est envoyé dans le header <code>Authorization: Bearer <token></code> pour accéder aux endpoints protégés.</li><li><strong>Sécurisation :</strong> Le <code>JwtAuthGuard</code> vérifie la validité du token (signature, expiration) et injecte l'utilisateur dans la requête (<code>req.user</code>).</li></ul></li><li><strong>Refresh Token :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li><strong>Payload :</strong> <code>userId</code>, un identifiant unique de la session (pour pouvoir révoquer le token).</li><li><strong>Durée de vie :</strong> Longue (7 jours à 30 jours).</li><li><strong>Utilité :</strong> Il est stocké de manière sécurisée (par exemple dans un cookie HttpOnly) et utilisé via un endpoint <code>/auth/refresh</code> pour obtenir un nouvel Access Token sans que l'utilisateur ait à se reconnecter.</li><li><strong>Sécurisation :</strong> Le <code>RefreshTokenGuard</code> vérifie la validité du Refresh Token et génère un nouveau couple de tokens.</li></ul></li></ul><p>Ce mécanisme améliore la sécurité : l'Access Token, à courte durée de vie, limite l'impact en cas de vol, tandis que le Refresh Token permet une expérience utilisateur fluide.</p></div>"

          "reponse": "<div><p><strong>Implémentation des Guards :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong><code>JwtAuthGuard</code> :</strong> Étend le <code>AuthGuard('jwt')</code> de NestJS. Il vérifie la présence et la validité du token JWT dans le header. Si le token est valide, il ajoute l'utilisateur décodé à l'objet <code>Request</code> (<code>req.user</code>). Si le token est invalide, il renvoie une erreur <code>401 Unauthorized</code>.</li><li><strong><code>RolesGuard</code> :</strong> Il implémente l'interface <code>CanActivate</code>. Il récupère les rôles requis via le <strong>décorateur <code>@Roles()</code></strong> et les compare avec les rôles de l'utilisateur présent dans <code>req.user</code>.</li><li><strong>Décorateur <code>@Roles()</code> :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Création : <code>export const Roles = (...roles: Role[]) => SetMetadata('roles', roles);</code></li><li>Utilisation : <code>@Roles('admin')</code> ou <code>@Roles('admin', 'seller')</code> sur un contrôleur ou une méthode.</li></ul></li><li><strong>Application :</strong> On applique les guards globalement ou sur des contrôleurs avec <code>@UseGuards(JwtAuthGuard, RolesGuard)</code>.</li></ul></div>"

      "points": "10 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> Le processus de commande et l'intégration des paiements sont au cœur de la plateforme AfriShop.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 4.1 (4 pts) :</strong> Expliquez, étape par étape, le <strong>processus de création d'une commande</strong> à partir du panier. Vous devez détailler :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Comment le panier est transformé en commande.</li><li>Comment les stocks sont gérés (déduction, verrouillage).</li><li>La gestion du snapshot du produit pour l'historique.</li><li>L'envoi de l'email de confirmation.</li></ul></div>",
          "reponse": "<div><p><strong>Processus de création d'une commande :</strong></p><ol style='list-style-type: decimal; padding-left: 20px;'><li><strong>Validation du panier :</strong> On récupère le panier de l'utilisateur. On vérifie que le panier contient des articles et que les quantités sont toujours disponibles en stock (avec un verrouillage temporaire pour éviter les conflits).</li><li><strong>Calcul du total :</strong> On calcule le total de la commande (sous-total + taxes + frais de livraison - réduction).</li><li><strong>Création de l'entité <code>Order</code> :</strong> On crée une nouvelle commande avec les informations :<ul style='list-style-type: circle; padding-left: 20px;'><li>Utilisateur : <code>user</code>.</li><li>Total : <code>total</code>.</li><li>Adresse de livraison : <code>shippingAddress</code>.</li><li>Méthode de paiement : <code>paymentMethod</code>.</li><li>Statut initial : <code>pending</code> (en attente de paiement).</li></ul></li><li><strong>Création des <code>OrderItem</code> :</strong> Pour chaque article du panier, on crée un <code>OrderItem</code> qui est un <strong>snapshot</strong> du produit à l'instant de l'achat (nom, prix, variation, quantité, image). Cela permet d'avoir un historique fiable même si le produit est modifié plus tard.</li><li><strong>Déduction des stocks :</strong> On déduit les quantités du stock (produit ou variation). On peut effectuer cette opération après confirmation du paiement pour les commandes avec paiement asynchrone.</li><li><strong>Vidage du panier :</strong> Une fois la commande créée, on vide le panier de l'utilisateur.</li><li><strong>Envoi de l'email de confirmation :</strong> On envoie un email à l'utilisateur récapitulant les détails de sa commande via <code>Nodemailer</code>.</li><li><strong>Réponse :</strong> L'API renvoie l'objet <code>Order</code> créé.</li></ol></div>"

        {
          "question": "<div><p><strong>Question 4.2 (3 pts) :</strong> Intégration de <strong>PayPal</strong> : Décrivez les étapes pour :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Configurer l'API PayPal dans votre application NestJS (variables d'environnement).</li><li>Créer une commande PayPal pour un paiement.</li><li>Capturer le paiement après l'approbation de l'utilisateur.</li></ul></div>",
          "reponse": "<div><p><strong>Intégration de PayPal :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Configuration :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Créer un compte développeur sur <a href='https://developer.paypal.com' target='_blank'>developer.paypal.com</a>.</li><li>Créer une application et récupérer le <strong>Client ID</strong> et le <strong>Secret</strong>.</li><li>Ajouter ces identifiants dans le fichier <code>.env</code> : <code>PAYPAL_CLIENT_ID</code>, <code>PAYPAL_SECRET</code>, <code>PAYPAL_BASE_URL</code> (ex: <code>https://api-m.sandbox.paypal.com</code>).</li></ul></li><li><strong>Création d'une commande PayPal :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Endpoint : <code>POST /payments/paypal/order</code>.</li><li>Le service backend utilise le SDK PayPal ou effectue un appel HTTP direct pour créer une commande avec le montant total de la commande.</li><li>PayPal renvoie un objet contenant un <strong>lien d'approbation</strong> (approval link) que l'API renvoie au frontend.</li></ul></li><li><strong>Capture du paiement :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Endpoint : <code>GET /payments/paypal/success</code> (ou un webhook).</li><li>L'utilisateur est redirigé vers cette URL après son approbation sur PayPal.</li><li>Le backend reçoit un paramètre (ex: <code>token</code> ou <code>PayerID</code>), appelle l'API PayPal pour <strong>capturer</strong> la commande.</li><li>Si la capture est réussie, on met à jour le statut de la commande en base de données (<code>paid</code>) et on déduit les stocks définitivement.</li></ul></li></ul></div>"

        {

          "reponse": "<div><p><strong>Intégration de Stripe :</strong></p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Configuration :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Installer : <code>npm install stripe</code>.</li><li>Ajouter la clé secrète Stripe dans <code>.env</code> : <code>STRIPE_SECRET_KEY</code>.</li><li>Initialiser le client Stripe dans un service NestJS.</li></ul></li><li><strong>Création d'un PaymentIntent :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Endpoint : <code>POST /payments/stripe/intent</code>.</li><li>Le serveur crée un <code>PaymentIntent</code> avec le montant total de la commande.</li><li>La méthode de paiement est définie (ex: <code>card</code>).</li><li>Le serveur renvoie le <code>;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
