<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une API complète pour plateforme e-commerce",
  "classe": "Développement Web",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Gestion du Catalogue et du Panier (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>Vous êtes le lead développeur d'une jeune startup camerounaise de e-commerce, <strong>\"AfriShop\"</strong>. L'équipe a déjà mis en place l'authentification et la gestion des utilisateurs. Votre mission est de développer les modules de <strong>gestion du catalogue</strong> et de <strong>gestion du panier</strong>.</p>\n<p>Pour ce faire, vous devez :</p>\n<ol style='list-style-type: decimal; padding-left: 20px;'>\n<li><strong>Modéliser les entités</strong> pour les produits et les catégories.</li>\n<li><strong>Implémenter les endpoints CRUD</strong> pour les produits (protégés pour les admins).</li>\n<li><strong>Développer la logique du panier</strong> pour un utilisateur connecté.</li>\n</ol>\n<p>Le cahier des charges précise que :</p>\n<ul style='list-style-type: disc; padding-left: 20px;'>\n<li>Un produit appartient à une seule catégorie.</li>\n<li>Le panier doit pouvoir être récupéré à tout moment.</li>\n</ul>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Modélisation (2 pts)</strong></p><p>Proposez le code TypeORM des entités <code>Category</code> et <code>Product</code>.</p><p>Vous définirez les relations nécessaires et ajouterez les champs :</p><ul><li><strong>Category</strong> : <code>id</code>, <code>name</code>, <code>slug</code>.</li><li><strong>Product</strong> : <code>id</code>, <code>name</code>, <code>description</code>, <code>price</code>, <code>stock</code>, <code>category</code>.</li></ul></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>// category.entity.ts<br>@Entity()<br>export class Category {<br>  @PrimaryGeneratedColumn()<br>  id: number;<br><br>  @Column({ unique: true })<br>  name: string;<br><br>  @Column({ unique: true })<br>  slug: string;<br><br>  @OneToMany(() => Product, product => product.category)<br>  products: Product[];<br>}<br><br>// product.entity.ts<br>@Entity()<br>export class Product {<br>  @PrimaryGeneratedColumn()<br>  id: number;<br><br>  @Column()<br>  name: string;<br><br>  @Column({ type: 'text', nullable: true })<br>  description: string;<br><br>  @Column({ type: 'decimal', precision: 10, scale: 2 })<br>  price: number;<br><br>  @Column({ default: 0 })<br>  stock: number;<br><br>  @ManyToOne(() => Category, category => category.products)<br>  @JoinColumn({ name: 'categoryId' })<br>  category: Category;<br>}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) CRUD des produits (3 pts)</strong></p><p>Écrivez le <code>ProductController</code> et le <code>ProductService</code> pour implémenter les endpoints suivants :</p><ul><li><code>POST /products</code> : Ajouter un produit (admin uniquement).</li><li><code>GET /products</code> : Lister tous les produits.</li><li><code>GET /products/:id</code> : Récupérer un produit par son ID.</li></ul><p>Utilisez les Guards et les Décorateurs appropriés pour la protection des routes.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>// product.controller.ts<br>@Controller('products')<br>export class ProductController {<br>  constructor(private productService: ProductService) {}<br><br>  @Post()<br>  @UseGuards(JwtAuthGuard, RolesGuard)<br>  @Roles('admin')<br>  async create(@Body() createProductDto: CreateProductDto) {<br>    return this.productService.create(createProductDto);<br>  }<br><br>  @Get()<br>  async findAll() {<br>    return this.productService.findAll();<br>  }<br><br>  @Get(':id')<br>  async findOne(@Param('id', ParseIntPipe) id: number) {<br>    return this.productService.findOne(id);<br>  }<br>}<br><br>// product.service.ts<br>@Injectable()<br>export class ProductService {<br>  constructor(@InjectRepository(Product) private repo: Repository<Product>) {}<br><br>  async create(dto: CreateProductDto) {<br>    const product = this.repo.create(dto);<br>    return this.repo.save(product);<br>  }<br><br>  async findAll() {<br>    return this.repo.find({ relations: ['category'] });<br>  }<br><br>  async findOne(id: number) {<br>    return this.repo.findOne({ where: { id }, relations: ['category'] });<br>  }<br>}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>3) Logique du panier (3 pts)</strong></p><p>Écrivez le <code>CartService</code> contenant les méthodes suivantes :</p><ul><li><code>getCart(userId: number)</code> : Récupère le panier de l'utilisateur avec ses items.</li><li><code>addItem(userId: number, productId: number, quantity: number)</code> : Ajoute un produit au panier (ou augmente la quantité s'il existe déjà).</li><li><code>removeItem(userId: number, productId: number)</code> : Supprime un produit du panier.</li></ul><p>On suppose que les entités <code>Cart</code> et <code>CartItem</code> sont déjà définies.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>@Injectable()<br>export class CartService {<br>  constructor(<br>    @InjectRepository(Cart) private cartRepo: Repository<Cart>,<br>    @InjectRepository(CartItem) private itemRepo: Repository<CartItem>,<br>  ) {}<br><br>  async getCart(userId: number) {<br>    return this.cartRepo.findOne({<br>      where: { user: { id: userId } },<br>      relations: ['items', 'items.product']<br>    });<br>  }<br><br>  async addItem(userId: number, productId: number, quantity: number) {<br>    let cart = await this.cartRepo.findOne({ where: { user: { id: userId } } });<br>    if (!cart) {<br>      cart = this.cartRepo.create({ user: { id: userId }, items: [] });<br>      cart = await this.cartRepo.save(cart);<br>    }<br><br>    let item = await this.itemRepo.findOne({<br>      where: { cart: { id: cart.id }, product: { id: productId } }<br>    });<br><br>    if (item) {<br>      item.quantity += quantity;<br>    } else {<br>      item = this.itemRepo.create({ cart, product: { id: productId }, quantity });<br>    }<br>    return this.itemRepo.save(item);<br>  }<br><br>  async removeItem(userId: number, productId: number) {<br>    const cart = await this.cartRepo.findOne({ where: { user: { id: userId } } });<br>    if (!cart) throw new Error('Cart not found');<br>    return this.itemRepo.delete({ cart: { id: cart.id }, product: { id: productId } });<br>  }<br>}</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Gestion des Commandes (7 pts)",
      "points": "7 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>Le module de commande est le cœur de l'application <strong>\"AfriShop\"</strong>. L'équipe a finalisé la gestion du panier. Votre tâche est de développer le <strong>processus de validation de commande</strong>.</p>\n<p>Le processus doit :</p>\n<ol style='list-style-type: decimal; padding-left: 20px;'>\n<li>Transformer le panier en commande.</li>\n<li>Décrémenter les stocks des produits concernés.</li>\n<li>Vider le panier après la validation.</li>\n</ol>\n<p>Vous devez également implémenter le <strong>suivi du statut</strong> de la commande.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Entité Order et statuts (2 pts)</strong></p><p>Définissez l'entité <code>Order</code> avec les champs suivants :</p><ul><li><code>id</code>, <code>total</code>, <code>shippingAddress</code>, <code>paymentMethod</code>.</li><li>Un champ <code>status</code> de type enum avec les valeurs : <code>pending</code>, <code>paid</code>, <code>shipped</code>, <code>delivered</code>, <code>cancelled</code>.</li><li>La relation avec l'utilisateur (<code>ManyToOne</code>) et avec les items de la commande (<code>OneToMany</code>).</li></ul></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>export enum OrderStatus {<br>  PENDING = 'pending',<br>  PAID = 'paid',<br>  SHIPPED = 'shipped',<br>  DELIVERED = 'delivered',<br>  CANCELLED = 'cancelled'<br>}<br><br>@Entity()<br>export class Order {<br>  @PrimaryGeneratedColumn()<br>  id: number;<br><br>  @Column({ type: 'decimal', precision: 10, scale: 2 })<br>  total: number;<br><br>  @Column()<br>  shippingAddress: string;<br><br>  @Column()<br>  paymentMethod: string;<br><br>  @Column({ type: 'enum', enum: OrderStatus, default: OrderStatus.PENDING })<br>  status: OrderStatus;<br><br>  @ManyToOne(() => User)<br>  @JoinColumn({ name: 'userId' })<br>  user: User;<br><br>  @OneToMany(() => OrderItem, item => item.order, { cascade: true })<br>  items: OrderItem[];<br><br>  @CreateDateColumn()<br>  createdAt: Date;<br><br>  @UpdateDateColumn()<br>  updatedAt: Date;<br>}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Validation de la commande (3 pts)</strong></p><p>Écrivez la méthode <code>validateOrder(userId: number)</code> dans le <code>OrderService</code>.</p><p>Elle doit :</p><ul><li>Récupérer le panier de l'utilisateur.</li><li>Vérifier que le panier n'est pas vide.</li><li>Calculer le total à partir des items du panier.</li><li>Décrémenter les stocks des produits.</li><li>Créer la commande avec les items.</li><li>Vider le panier.</li></ul></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>async validateOrder(userId: number, shippingAddress: string, paymentMethod: string) {<br>  const cart = await this.cartService.getCart(userId);<br>  if (!cart || cart.items.length === 0) {<br>    throw new Error('Panier vide');<br>  }<br><br>  let total = 0;<br>  const orderItems = [];<br><br>  for (const item of cart.items) {<br>    const product = await this.productRepo.findOne({ where: { id: item.product.id } });<br>    if (product.stock < item.quantity) {<br>      throw new Error(`Stock insuffisant pour ${product.name}`);<br>    }<br>    product.stock -= item.quantity;<br>    await this.productRepo.save(product);<br><br>    total += product.price * item.quantity;<br>    orderItems.push({<br>      product: product,<br>      quantity: item.quantity,<br>      price: product.price<br>    });<br>  }<br><br>  const order = this.orderRepo.create({<br>    user: { id: userId },<br>    total,<br>    shippingAddress,<br>    paymentMethod,<br>    items: orderItems<br>  });<br><br>  await this.orderRepo.save(order);<br>  await this.cartService.clearCart(userId);<br>  return order;<br>}</div>"
        },
        {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
