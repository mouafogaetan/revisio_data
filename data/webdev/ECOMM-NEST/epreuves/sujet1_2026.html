<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Développement d'une API complète pour plateforme e-commerce",
 "classe": "Développement Web",
 "sequence": "Séquence 1 - Conception et Architecture",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Analyse et Conception de l'Architecture",
     "points": "8 points",
     "enonce": "<div style='padding: 10px;'><p>Vous êtes consultant en développement web et vous devez concevoir l'architecture d'une API REST pour une nouvelle plateforme e-commerce camerounaise nommée <strong>'AfriMarket'</strong>. Cette plateforme ambitionne de devenir le leader du commerce en ligne en Afrique centrale.</p><p>AfriMarket souhaite proposer les fonctionnalités suivantes :</p><ul><li>Gestion d'un <strong>catalogue de produits</strong> (pagnes, téléphones, produits alimentaires, etc.)</li><li>Système de <strong>panier d'achat</strong> pour les clients connectés et anonymes</li><li>Processus de <strong>commande et de paiement</strong> avec plusieurs providers (Stripe, Orange Money, MTN Mobile Money)</li><li><strong>Gestion des utilisateurs</strong> avec trois rôles principaux : client, vendeur, administrateur</li></ul><p>Répondez aux questions suivantes en vous basant sur votre connaissance de NestJS et des bonnes pratiques d'architecture d'API.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>1.1) Identification des acteurs (2 points)</strong></p><p>Identifiez les différents acteurs qui interagiront avec la plateforme AfriMarket. Pour chaque acteur, décrivez brièvement ses principales actions sur la plateforme.</p></div>",
         "reponse": "<div><p><strong>Les acteurs sont :</strong></p><ul><li><strong>Client (Customer) :</strong> Peut consulter le catalogue, ajouter des produits au panier, passer des commandes, consulter son historique, gérer son profil et laisser des avis.</li><li><strong>Vendeur (Seller) :</strong> Peut gérer ses produits (CRUD), gérer les commandes qu'il reçoit, consulter ses statistiques de vente et répondre aux avis.</li><li><strong>Administrateur (Admin) :</strong> A la vue d'ensemble sur la plateforme : gère les utilisateurs (bloquer/supprimer), gère les vendeurs, supervise les commandes et le contenu, gère les campagnes marketing.</li></ul></div>"
       },
       {
         "question": "<div><p><strong>1.2) Architecture des modules (3 points)</strong></p><p>En vous inspirant des bonnes pratiques de NestJS [citation:1][citation:3], proposez une structure de modules pour l'API AfriMarket. Vous devez lister les modules principaux et expliquer leur responsabilité.</p><p><em>Exemple de structure attendue : AuthModule, UsersModule, ProductsModule, etc.</em></p></div>",
         "reponse": "<div><p><strong>Structure modulaire proposée :</strong></p><ul><li><strong>CommonModule :</strong> Contient les éléments partagés comme les guards, les intercepteurs, les filtres d'exception, les décorateurs personnalisés et les DTOs de pagination [citation:5].</li><li><strong>ConfigModule :</strong> Centralise la configuration de l'application via <code>@nestjs/config</code>, gère les variables d'environnement.</li><li><strong>DatabaseModule :</strong> Configure la connexion à la base de données (TypeORM/Prisma).</li><li><strong>AuthModule :</strong> Gère l'authentification (inscription, connexion, JWT, rafraîchissement de token).</li><li><strong>UsersModule :</strong> Gère le CRUD des utilisateurs, la gestion des rôles et des profils.</li><li><strong>ProductsModule :</strong> Gère le catalogue de produits, les catégories, les variations, et la recherche [citation:5].</li><li><strong>CartModule :</strong> Gère le panier, avec support des paniers anonymes et authentifiés [citation:1].</li><li><strong>OrdersModule :</strong> Gère le processus de commande, les statuts, et l'historique.</li><li><strong>PaymentsModule :</strong> Abstrait les différents providers de paiement (Stripe, Orange Money, etc.) [citation:4].</li><li><strong>AdminModule :</strong> Regroupe les fonctionnalités réservées aux administrateurs (tableau de bord, gestion des utilisateurs, etc.).</li></ul></div>"
       },
       {
         "question": "<div><p><strong>1.3) Cas d'utilisation (3 points)</strong></p><p>Choisissez un acteur et rédigez trois user stories (ou cas d'utilisation) décrivant ses interactions principales avec la plateforme.</p><p><em>Format attendu : 'En tant que [acteur], je veux [action] afin de [objectif/bénéfice].'</em></p></div>",
         "reponse": "<div><p><strong>User stories pour l'acteur 'Client (Customer)' :</strong></p><ul><li><strong>Story 1 :</strong> En tant que client, je veux pouvoir parcourir le catalogue de produits par catégorie afin de découvrir facilement les articles qui m'intéressent.</li><li><strong>Story 2 :</strong> En tant que client, je veux ajouter des produits à mon panier sans être connecté afin de préparer mes achats, et pouvoir finaliser ma commande après m'être identifié.</li><li><strong>Story 3 :</strong> En tant que client, je veux pouvoir suivre l'état de ma commande (de la confirmation à la livraison) afin de savoir quand je recevrai mon colis.</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Modélisation des Données (Entités et Relations)",
     "points": "6 points",
     "enonce": "<div style='padding: 10px;'><p>La phase d'analyse étant terminée, vous devez maintenant concevoir le modèle de données. La plateforme AfriMarket utilisera une base de données relationnelle PostgreSQL avec l'ORM TypeORM de NestJS.</p><p>Votre tâche est de modéliser les entités principales et leurs relations.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>2.1) Entité Product et ses relations (3 points)</strong></p><p>Dessinez ou décrivez en détail l'entité <code>Product</code> en incluant ses attributs, les relations qu'elle entretient avec d'autres entités, ainsi que les décorateurs TypeORM correspondants.</p><p><em>Conseil : Pensez aux relations avec Category, User (vendeur), CartItem, OrderItem, et Review [citation:5][citation:8].</em></p></div>",
         "reponse": "<div><p><strong>Entité Product :</strong></p><ul><li><strong>Attributs :</strong> id, name, description, price, stock, sku, images (tableau de strings), createdAt, updatedAt.</li><li><strong>Relations :</strong><ul><li><code>@ManyToOne(() => Category, (category) => category.products)</code> : Un produit appartient à une catégorie [citation:5].</li><li><code>@ManyToOne(() => User, (user) => user.products)</code> : Un produit est géré par un vendeur (User avec role='seller').</li><li><code>@OneToMany(() => Review, (review) => review.product)</code> : Un produit peut avoir plusieurs avis.</li><li><code>@OneToMany(() => OrderItem, (orderItem) => orderItem.product)</code> : Un produit peut apparaître dans plusieurs lignes de commande.</li></ul></li></ul></div>"
       },
       {
         "question": "<div><p><strong>2.2) Diagramme Entité-Association (3 points)</strong></p><p>Décrivez ou schématisez les relations entre les entités <strong>User</strong>, <strong>Order</strong>, et <strong>Payment</strong>. Précisez le type de relation (OneToOne, OneToMany, ManyToOne, ManyToMany) et son sens.</p></div>",
         "reponse": "<div><p><strong>Relations entre User, Order et Payment :</strong></p><ul><li><strong>User (1) ---- (n) Order :</strong> Un utilisateur peut passer plusieurs commandes (OneToMany). Chaque commande appartient à un seul utilisateur (ManyToOne).</li><li><strong>Order (1) ---- (1) Payment :</strong> Une commande peut avoir un seul paiement associé (OneToOne). Le paiement est effectué une seule fois pour une commande donnée.</li><li><strong>User (1) ---- (n) Payment :</strong> Un utilisateur peut avoir plusieurs paiements enregistrés (OneToMany). Chaque paiement est effectué par un seul utilisateur (ManyToOne).</li></ul><p><strong>Les entités avec TypeORM :</strong></p><ul><li><strong>User :</strong> <code>@OneToMany(() => Order, (order) => order.user)</code> orders;</li><li><strong>Order :</strong> <code>@ManyToOne(() => User, (user) => user.orders)</code> user; et <code>@OneToOne(() => Payment, (payment) => payment.order)</code> payment;</li><li><strong>Payment :</strong> <code>@OneToOne(() => Order, (order) => order.payment)</code> order; et <code>@ManyToOne(() => User, (user) => user.payments)</code> user;</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Mise en place de l'environnement de développement",
     "points": "6 points",
     "enonce": "<div style='padding: 10px;'><p>Pour commencer le développement de l'API, vous devez configurer un environnement de développement robuste et standardisé. NestJS et son CLI offrent des outils pour cela.</p><p>Dans cet exercice, nous allons nous focaliser sur la création du projet et la mise en place de sa configuration.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>3.1) Initialisation et configuration (3 points)</strong></p><p>Détaillez les étapes et les commandes nécessaires pour :</p><ol><li>Initialiser un nouveau projet NestJS nommé 'afrimarket-api'.</li><li>Configurer TypeScript pour utiliser les chemins d'alias (ex: <code>@common/*</code> pour le dossier <code>src/common</code>).</li><li>Installer les dépendances essentielles : <code>@nestjs/config</code>, <code>@nestjs/typeorm</code>, <code>typeorm</code>, <code>pg</code>.</li></ol></div>",
         "reponse": "<div><p><strong>Procédure :</strong></p><pre><code># 1. Initialiser le projet\nnest new afrimarket-api\ncd afrimarket-api\n\n# 2. Configurer les alias TypeScript (dans tsconfig.json)\n{\n  \"compilerOptions\": {\n    \"baseUrl\": \"./\",\n    \"paths\": {\n      \"@common/*\": [\"src/common/*\"],\n      \"@modules/*\": [\"src/modules/*\"]\n    }\n  }\n}\n\n# 3. Installer les dépendances\nnpm install @nestjs/config @nestjs/typeorm typeorm pg\n</code></pre></div>"
       },
       {
         "question": "<div><p><strong>3.2) Configuration et variables d'environnement (3 points)</strong></p><p>Expliquez comment utiliser <code>@nestjs/config</code> pour gérer la configuration de l'application. Votre explication doit inclure :</p><ol><li>La création d'un fichier <code>.env</code> avec un exemple de variables (port, connexion à PostgreSQL).</li><li>La configuration dans le module principal pour charger et valider les variables d'environnement.</li></ol></div>",
         "reponse": "<div><p><strong>Utilisation de @nestjs/config :</strong></p><ul><li><strong>Fichier .env :</strong><pre><code>PORT=3000\nDB_HOST=localhost\nDB_PORT=5432\nDB_USER=postgres\nDB_PASSWORD=password\nDB_NAME=afrimarket_db</code></pre></li><li><strong>Configuration dans AppModule :</strong><pre><code>@Module({\n  imports: [\n    ConfigModule.forRoot({\n      isGlobal: true,\n      envFilePath: '.env',\n      validationSchema: Joi.object({\n        PORT: Joi.number().default(3000),\n        DB_HOST: Joi.string().required(),\n        DB_PORT: Joi.number().default(5432),\n        DB_USER: Joi.string().required(),\n        DB_PASSWORD: Joi.string().required(),\n        DB_NAME: Joi.string().required(),\n      }),\n    }),\n    TypeOrmModule.forRootAsync({\n      imports: [ConfigModule],\n      inject: [ConfigService],\n      useFactory: (configService: ConfigService) => ({\n        type: 'postgres',\n        host: configService.get('DB_HOST'),\n        port: configService.get('DB_PORT'),\n        username: configService.get('DB_USER'),\n        password: configService.get('DB_PASSWORD'),\n        database: configService.get('DB_NAME'),\n        entities: [__dirname + '/**/*.entity{.ts,.js}'],\n        synchronize: false, // Important: utiliser les migrations en prod\n      }),\n    }),\n  ],\n})\nexport class AppModule {}</code></pre></li></ul></div>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
