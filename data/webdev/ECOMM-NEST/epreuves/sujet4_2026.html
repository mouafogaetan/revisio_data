<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une API complète pour plateforme e-commerce",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Conception du Système d'Avis et de Logging",
      "points": "6 pts",
      "enonce": "<p>Dans le cadre du développement de votre API e-commerce, vous devez concevoir un système d'avis clients et un système de journalisation (logging). Ces deux fonctionnalités sont essentielles pour la crédibilité de la plateforme et la maintenance de l'application.</p>",
      "questions": [
        {
          "question": "1) Proposez un diagramme de classes UML simplifié pour le système d'avis. Vous devez inclure les entités <code>Review</code>, <code>Product</code> et <code>User</code> avec leurs attributs et leurs relations. Justifiez le choix de la relation entre <code>Review</code> et <code>User</code>.",
          "reponse": "Le diagramme de classes doit montrer les entités suivantes : <ul><li><strong>User</strong> : id, email, firstName, lastName, phone</li><li><strong>Product</strong> : id, name, description, price, stock, averageRating</li><li><strong>Review</strong> : id, rating (1-5), comment, images, createdAt</li></ul>Les relations sont : <ul><li>User (1) --- (0..*) Review : un utilisateur peut écrire plusieurs avis</li><li>Product (1) --- (0..*) Review : un produit peut recevoir plusieurs avis</li></ul>La relation <code>Review</code> ↔ <code>User</code> est une <strong>ManyToOne</strong> (ou OneToMany côté User) car un utilisateur peut écrire plusieurs avis, mais chaque avis est écrit par un seul utilisateur. Cette relation permet de tracer l'historique des avis et de vérifier qu'un utilisateur a acheté le produit avant de donner son avis."
        },
        {
          "question": "2) Expliquez, en quelques lignes, pourquoi il est important de vérifier que l'utilisateur a bien acheté le produit avant de lui permettre de donner un avis. Proposez une méthode pour implémenter cette vérification dans le service <code>ReviewsService</code>.",
          "reponse": "La vérification d'achat est cruciale pour garantir l'authenticité et la crédibilité des avis. Elle permet d'éviter les faux avis (positifs ou négatifs) qui pourraient tromper les autres clients et nuire à la réputation de la plateforme.\n\nPour implémenter cette vérification, on peut créer une méthode <code>canReview(userId: number, productId: number)</code> dans le <code>ReviewsService</code> qui interroge la base de données pour vérifier si l'utilisateur a une commande livrée contenant le produit :\n\n<pre style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'>async canReview(userId: number, productId: number) {\n  const orders = await this.orderRepo.find({\n    where: {\n      user: { id: userId },\n      status: 'delivered'\n    },\n    relations: ['items']\n  });\n  return orders.some(order =>\n    order.items.some(item => item.productId === productId)\n  );\n}</pre>"
        },
        {
          "question": "3) Définissez les différents niveaux de log (error, warn, info, debug) et donnez un exemple concret pour chaque niveau dans le contexte d'une application e-commerce.",
          "reponse": "Les niveaux de log sont organisés par priorité :\n\n<ul><li><strong>error</strong> : erreurs critiques nécessitant une action immédiate. Exemple : <code>\"Échec du paiement pour la commande #12345, code erreur : 500\"</code></li>\n<li><strong>warn</strong> : avertissements à surveiller. Exemple : <code>\"Stock bas pour le produit #101 (2 unités restantes)\"</code></li>\n<li><strong>info</strong> : informations générales sur le fonctionnement. Exemple : <code>\"Nouvel utilisateur inscrit : user@example.com\"</code></li>\n<li><strong>debug</strong> : détails pour le développement. Exemple : <code>\"Requête GET /api/products avec les filtres : category=electronics\"</code></li></ul>\n\nEn production, on active généralement les niveaux <strong>info</strong>, <strong>warn</strong> et <strong>error</strong> pour éviter de surcharger les logs."
        }
      ]
    },
    {
      "titre": "Mise en Œuvre du Système d'Avis",
      "points": "8 pts",
      "enonce": "<p>À partir de la conception précédente, vous allez maintenant coder les éléments essentiels du système d'avis avec NestJS et TypeORM.</p>",
      "questions": [
        {
          "question": "1) Écrivez l'entité TypeORM <code>Review</code> avec tous ses attributs et ses relations (ManyToOne vers Product et User). N'oubliez pas les décorateurs et les importations nécessaires.",
          "reponse": "<pre style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'>import { Entity, Column, PrimaryGeneratedColumn, ManyToOne, CreateDateColumn } from 'typeorm';\nimport { Product } from '../products/product.entity';\nimport { User } from '../users/user.entity';\n\n@Entity()\nexport class Review {\n  @PrimaryGeneratedColumn()\n  id: number;\n\n  @Column({ type: 'int' })\n  rating: number;\n\n  @Column({ type: 'text', nullable: true })\n  comment: string;\n\n  @Column({ type: 'simple-array', nullable: true })\n  images: string[];\n\n  @ManyToOne(() => Product, product => product.reviews)\n  product: Product;\n\n  @ManyToOne(() => User)\n  user: User;\n\n  @CreateDateColumn()\n  createdAt: Date;\n}</pre>"
        },
        {
          "question": "2) Écrivez le DTO <code>CreateReviewDto</code> avec les validations appropriées (rating entre 1 et 5, commentaire optionnel, images optionnelles, productId obligatoire). Utilisez les décorateurs de <code>class-validator</code>.",
          "reponse": "<pre style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'>import { IsNumber, IsOptional, IsString, IsArray, Min, Max } from 'class-validator';\n\nexport class CreateReviewDto {\n  @IsNumber()\n  @Min(1)\n  @Max(5)\n  rating: number;\n\n  @IsOptional()\n  @IsString()\n  comment?: string;\n\n  @IsOptional()\n  @IsArray()\n  @IsString({ each: true })\n  images?: string[];\n\n  @IsNumber()\n  productId: number;\n}</pre>"
        },
        {
          "question": "3) Implémentez la méthode <code>create</code> dans le <code>ReviewsService</code>. Elle doit :<br> - Vérifier que l'utilisateur a acheté le produit (on suppose que la méthode <code>canReview</code> existe)<br> - Créer et sauvegarder l'avis<br> - Mettre à jour la note moyenne du produit (on suppose que la méthode <code>updateProductAverageRating</code> existe)<br> - Gérer les erreurs avec des exceptions appropriées",
          "reponse": "<pre style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'>import { Injectable, ForbiddenException } from '@nestjs/common';\nimport { InjectRepository } from '@nestjs/typeorm';\nimport { Repository } from 'typeorm';\n\n@Injectable()\nexport class ReviewsService {\n  constructor(\n    @InjectRepository(Review)\n    private reviewRepo: Repository<Review>,\n    // ... autres dépendances\n  ) {}\n\n  async create(userId: number, dto: CreateReviewDto) {\n    // 1. Vérification d'achat\n    const canReview = await this.canReview(userId, dto.productId);\n    if (!canReview) {\n      throw new ForbiddenException('Vous devez acheter le produit pour donner un avis');\n    }\n\n    // 2. Création et sauvegarde\n    const review = this.reviewRepo.create({\n      ...dto,\n      user: { id: userId },\n      product: { id: dto.productId }\n    });\n    const saved = await this.reviewRepo.save(review);\n\n    // 3. Mise à jour de la note moyenne\n    await this.updateProductAverageRating(dto.productId);\n\n    return saved;\n  }\n}</pre>"
        }
      ]
    },
    {
      "titre": "Intégration du Logging",
      "points": "6 pts",
      "enonce": "<p>Pour assurer la maintenance et le suivi de votre API, vous devez intégrer un système de logging dans le module de paiement.</p>",
      "questions": [
        {
          "question": "1) Expliquez comment configurer Winston dans une application NestJS pour logger dans un fichier et dans la console. Donnez un exemple de configuration.",
          "reponse": "Pour configurer Winston, on installe d'abord le package : <code>npm install winston</code>. On crée ensuite un fichier de configuration :\n\n<pre style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'>import { createLogger, format, transports } from 'winston';\n\nexport const logger = createLogger({\n  level: 'info',\n  format: format.combine(\n    format.timestamp(),\n    format.json()\n  ),\n  transports: [\n    new transports.Console(),\n    new transports.File({ filename: 'logs/error.log', level: 'error' }),\n    new transports.File({ filename: 'logs/combined.log' })\n  ]\n});</pre>\n\nCette configuration permet d'avoir des logs structurés en JSON, envoyés à la fois dans la console et dans des fichiers. Les erreurs sont séparées dans un fichier dédié pour faciliter le diagnostic."
        },
        {
          "question": "2) Dans le cadre du traitement d'un paiement, quelles informations devriez-vous logger avant, pendant et après l'opération ? Rédigez le code d'un service <code>PaymentsService</code> qui utilise un logger pour tracer une transaction Stripe.",
          "reponse": "Pour un paiement, il faut logger :\n<ul><li><strong>Avant</strong> : la tentative de paiement (userId, montant, méthode)</li>\n<li><strong>Pendant</strong> : les appels à Stripe et leurs résultats intermédiaires</li>\n<li><strong>Après</strong> : le succès avec l'ID de transaction ou l'échec avec le message d'erreur</li></ul>\n\n<pre style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'>@Injectable()\nexport class PaymentsService {\n  constructor(private logger: Logger) {}\n\n  async processPayment(data: PaymentData) {\n    this.logger.log({\n      message: 'Tentative de paiement',\n      userId: data.userId,\n      amount: data.amount,\n      method: data.method\n    });\n\n    try {\n      const result = await this.stripeService.charge(data);\n      this.logger.log({\n        message: 'Paiement réussi',\n        transactionId: result.id,\n        userId: data.userId\n      });\n      return result;\n    } catch (error) {\n      this.logger.error({\n        message: 'Échec du paiement',\n        userId: data.userId,\n        error: error.message\n      });\n      throw error;\n    }\n  }\n}</pre>"
        },
        {
          "question": "3) Quels sont les avantages d'intégrer Sentry plutôt qu'un simple fichier de logs pour le suivi des erreurs en production ?",
          "reponse": "Sentry offre plusieurs avantages par rapport aux fichiers de logs traditionnels :\n\n<ul><li><strong>Alertes en temps réel</strong> : notification immédiate en cas d'erreur critique</li>\n<li><strong>Interface d'analyse</strong> : visualisation et tri des erreurs, avec agrégation des occurrences similaires</li>\n<li><strong>Contexte enrichi</strong> : capture automatique des informations système, de l'environnement, de la requête HTTP et de la pile d'appels</li>\n<li><strong>Traçabilité</strong> : suivi de la fréquence des erreurs et identification des régressions après un déploiement</li>\n<li><strong>Intégration avec les outils de développement</strong> : liaison avec GitHub, Slack, etc.</li></ul>\n\nSentry est particulièrement utile en production pour détecter et résoudre rapidement les problèmes sans avoir à consulter manuellement les logs."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
