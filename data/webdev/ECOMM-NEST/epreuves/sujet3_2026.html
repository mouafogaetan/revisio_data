<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une API complète pour plateforme e-commerce",
  "classe": "Développement Web",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Conception des entités et relations (8 pts)",
      "points": "8 pts",
      "enonce": "<p>Dans le cadre de la conception de votre API e-commerce, vous devez modéliser les entités principales du système.</p><div style='background: #f8f9fa; padding: 15px; border-left: 5px solid #0d6efd; border-radius: 5px; margin: 10px 0;'><p style='font-weight: bold;'>Contexte :</p><p>Vous développez une plateforme e-commerce pour le marché camerounais. Les fonctionnalités clés incluent la gestion des produits, des catégories, des utilisateurs, des commandes et des avis.</p></div>",
      "questions": [
        {
          "question": "1) Proposez un diagramme entité-association simplifié pour les entités <code>User</code>, <code>Product</code>, <code>Category</code> et <code>Order</code>. Précisez les attributs clés de chaque entité et les relations entre elles (OneToMany, ManyToMany, OneToOne). <em>(3 pts)</em>",
          "reponse": "<div><p><strong>Diagramme Entité-Association :</strong></p><ul><li><strong>User</strong> (id, email, password, firstName, lastName, phone, createdAt, updatedAt, lastLogin)</li><li><strong>Role</strong> (id, name, description) - Relation ManyToMany avec User</li><li><strong>Product</strong> (id, name, description, price, stock, images, sku, averageRating, reviewCount) - Relation ManyToOne avec Category</li><li><strong>Category</strong> (id, name, slug, parentCategory) - Auto-référence pour les sous-catégories</li><li><strong>Order</strong> (id, total, status, shippingAddress, paymentMethod, trackingNumber, createdAt, updatedAt) - Relation ManyToOne avec User</li><li><strong>OrderItem</strong> (id, quantity, priceSnapshot, productNameSnapshot) - Relation ManyToOne avec Order et Product</li><li><strong>Review</strong> (id, rating, comment, images, createdAt) - Relation ManyToOne avec User et Product</li></ul><p><strong>Relations principales :</strong></p><ul><li>User (1) ⟷ (n) Order</li><li>Order (1) ⟷ (n) OrderItem</li><li>Product (1) ⟷ (n) OrderItem</li><li>Category (1) ⟷ (n) Product</li><li>User (n) ⟷ (n) Role (table de liaison user_roles)</li><li>User (1) ⟷ (n) Review</li><li>Product (1) ⟷ (n) Review</li></ul></div>"
        },
        {
          "question": "2) Expliquez pourquoi il est important de créer une entité <code>OrderItem</code> qui stocke un snapshot du produit plutôt que de simplement faire référence à l'entité <code>Product</code>. <em>(2 pts)</em>",
          "reponse": "<div><p>Il est important de créer une entité <code>OrderItem</code> avec un snapshot du produit pour plusieurs raisons :</p><ul><li><strong>Intégrité des données :</strong> Le prix, le nom ou la description d'un produit peuvent changer après la commande. Le snapshot garantit que la commande reflète exactement ce que le client a acheté au moment de l'achat.</li><li><strong>Preuve juridique :</strong> En cas de litige, le snapshot constitue une preuve des conditions de vente au moment de la transaction.</li><li><strong>Indépendance :</strong> Même si le produit est supprimé du catalogue, la commande reste complète et consultable.</li><li><strong>Analyses historiques :</strong> Permet d'analyser les tendances de prix et les préférences des clients dans le temps.</li></ul></div>"
        },
        {
          "question": "3) Proposez une structure de base de données normalisée jusqu'à la 3NF pour la gestion des produits et des catégories. Expliquez comment vous gérez les catégories parent-enfant (sous-catégories). <em>(3 pts)</em>",
          "reponse": "<div><p><strong>Structure de base de données (3NF) :</strong></p><ul><li><strong>Table Category :</strong> id (PK), name, slug (unique), parentCategoryId (FK vers Category.id, NULL pour les catégories racines), createdAt, updatedAt</li><li><strong>Table Product :</strong> id (PK), name, description, price, stock, images (JSON ou texte), sku (unique), averageRating, reviewCount, categoryId (FK vers Category.id), createdAt, updatedAt</li></ul><p><strong>Gestion des sous-catégories :</strong></p><ul><li>Auto-référence via <code>parentCategoryId</code> qui référence l'id d'une autre catégorie.</li><li>Une catégorie avec parentCategoryId = NULL est une catégorie racine.</li><li>Une catégorie avec parentCategoryId non NULL est une sous-catégorie.</li><li>On peut utiliser des requêtes récursives ou des CTE (Common Table Expressions) pour récupérer l'arborescence complète.</li><li>Alternative : ajouter un champ <code>path</code> (ex: '1/3/5') pour faciliter les recherches dans l'arborescence.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Implémentation des endpoints produits (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Vous devez implémenter les endpoints CRUD pour la gestion des produits dans une API NestJS.</p><div style='background: #fff3cd; padding: 15px; border-left: 5px solid #ffc107; border-radius: 5px; margin: 10px 0;'><p style='font-weight: bold;'>⚠️ Consignes :</p><ul><li>Utilisez TypeORM pour les opérations en base de données.</li><li>Validez les données entrantes avec class-validator.</li><li>Protégez les routes avec JwtAuthGuard et RolesGuard.</li></ul></div>",
      "questions": [
        {
          "question": "1) Écrivez le code du <code>CreateProductDto</code> avec les validations appropriées (nom obligatoire, prix > 0, stock >= 0). <em>(2 pts)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; overflow-x: auto;'>import { IsString, IsNumber, IsPositive, Min, IsOptional, IsInt } from 'class-validator';<br>import { ApiProperty } from '@nestjs/swagger';<br><br>export class CreateProductDto {<br>  @ApiProperty({ example: 'Smartphone Samsung Galaxy S23' })<br>  @IsString()<br>  @IsNotEmpty()<br>  name: string;<br><br>  @ApiProperty({ example: 'Smartphone haut de gamme avec appareil photo 200MP' })<br>  @IsString()<br>  @IsOptional()<br>  description?: string;<br><br>  @ApiProperty({ example: 799.99 })<br>  @IsNumber()<br>  @IsPositive()<br>  price: number;<br><br>  @ApiProperty({ example: 50 })<br>  @IsInt()<br>  @Min(0)<br>  stock: number;<br><br>  @ApiProperty({ example: 1 })<br>  @IsInt()<br>  @IsNotEmpty()<br>  categoryId: number;<br><br>  @ApiProperty({ example: ['https://cdn.cloudinary.com/image1.jpg'] })<br>  @IsOptional()<br>  images?: string[];<br>}</div>"
        },
        {
          "question": "2) Écrivez l'endpoint <code>POST /api/products</code> qui permet de créer un produit. Incluez la gestion de l'upload d'image avec Multer et l'intégration avec Cloudinary. <em>(4 pts)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; overflow-x: auto;'>import { Controller, Post, Body, UseInterceptors, UploadedFile, UseGuards } from '@nestjs/common';<br>import { FileInterceptor } from '@nestjs/platform-express';<br>import { JwtAuthGuard } from '../auth/guards/jwt-auth.guard';<br>import { RolesGuard } from '../auth/guards/roles.guard';<br>import { Roles } from '../auth/decorators/roles.decorator';<br>import { ProductService } from './product.service';<br>import { CloudinaryService } from '../common/cloudinary.service';<br>import { CreateProductDto } from './dto/create-product.dto';<br><br>@Controller('api/products')<br>@UseGuards(JwtAuthGuard, RolesGuard)<br>export class ProductController {<br>  constructor(<br>    private readonly productService: ProductService,<br>    private readonly cloudinaryService: CloudinaryService,<br>  ) {}<br><br>  @Post()<br>  @Roles('admin', 'seller')<br>  @UseInterceptors(FileInterceptor('image', {<br>    limits: { fileSize: 5 * 1024 * 1024 }, // 5 Mo<br>    fileFilter: (req, file, cb) => {<br>      if (file.mimetype.match(/\\/(jpg|jpeg|png|webp)$/)) {<br>        cb(null, true);<br>      } else {<br>        cb(new Error('Format d\\'image non supporté'), false);<br>      }<br>    },<br>  }))<br>  async create(<br>    @Body() createProductDto: CreateProductDto,<br>    @UploadedFile() file: Express.Multer.File,<br>  ) {<br>    let imageUrl: string | null = null;<br>    if (file) {<br>      // Upload vers Cloudinary<br>      const uploadResult = await this.cloudinaryService.uploadImage(file, {<br>        folder: 'ecommerce/products',<br>        transformation: { width: 800, height: 800, crop: 'limit' },<br>      });<br>      imageUrl = uploadResult.secure_url;<br>    }<br><br>    const product = await this.productService.create(createProductDto, imageUrl);<br>    return {<br>      statusCode: 201,<br>      message: 'Produit créé avec succès',<br>      data: product,<br>    };<br>  }<br>}</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Transformation panier → commande (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Vous devez implémenter la logique de transformation d'un panier en commande. Cette opération est critique pour le bon fonctionnement de la plateforme e-commerce.</p><div style='background: #d1ecf1; padding: 15px; border-left: 5px solid #17a2b8; border-radius: 5px; margin: 10px 0;'><p style='font-weight: bold;'>🔍 Contexte :</p><p>Un utilisateur connecté souhaite valider son panier. Le système doit :</p><ul><li>Vérifier la disponibilité des stocks.</li><li>Créer la commande avec les OrderItems.</li><li>Décrémenter les stocks réels.</li><li>Vider le panier.</li><li>Envoyer un email de confirmation.</li></ul></div>",
      "questions": [
        {
          "question": "1) Décrivez les étapes de la transaction de transformation du panier en commande. Pourquoi est-il important d'utiliser une transaction SQL ? <em>(2 pts)</em>",
          "reponse": "<div><p><strong>Étapes de la transaction :</strong></p><ol><li><strong>Début de la transaction</strong></li><li><strong>Récupération du panier</strong> avec les items et les produits associés</li><li><strong>Vérification des stocks</strong> pour chaque produit (quantité demandée ≤ stock disponible)</li><li><strong>Création de la commande</strong> avec statut 'pending'</li><li><strong>Création des OrderItems</strong> (snapshot des produits)</li><li><strong>Décrémentation des stocks</strong> (product.stock -= orderItem.quantity)</li><li><strong>Vidage du panier</strong> (suppression des CartItems)</li><li><strong>Envoi de l'email</strong> de confirmation (peut être asynchrone)</li><li><strong>Validation de la transaction</strong> (COMMIT)</li></ol><p><strong>Importance de la transaction :</strong></p><ul><li><strong>Atomicité :</strong> Si une étape échoue (ex: stock insuffisant), toutes les modifications sont annulées.</li><li><strong>Cohérence :</strong> La base de données reste dans un état cohérent (pas de commande sans décrémentation de stock).</li><li><strong>Isolation :</strong> Évite les problèmes de concurrence (deux clients ne peuvent pas acheter le dernier produit en même temps).</li><li><strong>Durabilité :</strong> Les modifications sont persistées une fois la transaction validée.</li></ul></div>"
        },
        {
          "question": "2) Écrivez le code du service <code>OrderService</code> pour la méthode <code>checkout(userId: number)</code>. Utilisez les transactions TypeORM. <em>(4 pts)</em>",

    // ================================================================

    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
