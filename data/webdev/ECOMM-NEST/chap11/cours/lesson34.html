import { Module } from '@nestjs/common';
import { CacheModule } from '@nestjs/cache-manager';

import { Controller, Get, Param, UseInterceptors, CacheInterceptor, CacheTTL } from '@nestjs/common';

@Controller('products')
@UseInterceptors(CacheInterceptor) // Cache sur TOUTES les méthodes GET
export class ProductsController {
  
  @Get()
  @CacheTTL(30) // 30 secondes pour la liste (données qui changent plus souvent)
  async findAll() {
    return this.productsService.findAll();
  }

  @Get(':id')
  @CacheTTL(3600) // 1 heure pour un produit spécifique
  async findOne(@Param('id') id: number) {
    return this.productsService.findOne(id);
  }

  @Get('categories/:slug')
  @CacheTTL(86400) // 24h pour les catégories (changent rarement)
  async findByCategory(@Param('slug') slug: string) {
    return this.productsService.findByCategory(slug);
  }
}</pre>

import { Inject, Injectable } from '@nestjs/common';
import { CACHE_MANAGER } from '@nestjs/cache-manager';
import { Cache } from 'cache-manager';

@Injectable()
export class ProductsService {
  constructor(
    @Inject(CACHE_MANAGER) private cacheManager: Cache,
  ) {}

  async create(createProductDto: CreateProductDto) {
    const product = await this.productRepository.save(createProductDto);
    // Nettoyer le cache de la liste des produits
    await this.cacheManager.del('GET /products');
    // Option : pattern matching avec store.client
    // await this.cacheManager.store.client.delByPattern('GET /products*');
    return product;
  }

  async update(id: number, updateProductDto: UpdateProductDto) {
    const product = await this.productRepository.update(id, updateProductDto);
    // Supprimer le cache spécifique à ce produit
    await this.cacheManager.del(\`GET /products/\${id}\`);
    await this.cacheManager.del('GET /products'); // Invalider aussi la liste
    return product;
  }

  async remove(id: number) {
    await this.productRepository.delete(id);
    await this.cacheManager.del(\`GET /products/\${id}\`);
    await this.cacheManager.del('GET /products');
  }
}</pre>

async invalidateProductCache() {
  // Accès direct au client Redis (cache-manager-redis-yet)
  const client = this.cacheManager.store.client;
  
  // Supprimer toutes les clés commençant par "GET /products"
  const keys = await client.keys('GET /products*');
  if (keys.length > 0) {
    await client.del(keys);
  }
  
  // Alternative plus élégante : SCAN pour éviter de bloquer Redis
  const stream = client.scanIterator({
    match: 'GET /products*',
    count: 100
  });
  for await (const key of stream) {
    await client.del(key);
  }
}

// Utilisation après modification d'une catégorie
async updateCategory(categoryId: number, data: any) {
  await this.categoryRepository.update(categoryId, data);
  await this.invalidateProductCache(); // Tous les produits de cette catégorie sont recachés
}</pre>

import { CacheKey, CacheInterceptor, ExecutionContext, Injectable } from '@nestjs/common';

@Injectable()
export class UserAwareCacheInterceptor extends CacheInterceptor {
  protected trackBy(context: ExecutionContext): string | undefined {
    const request = context.switchToHttp().getRequest();
    const user = request.user;
    const userRole = user?.role || 'guest';
    const url = request.url;
    // Clé unique : rôle + URL
    return \`\${userRole}:\${url}\`;
  }
}

@Controller('products')
@UseInterceptors(UserAwareCacheInterceptor)
export class ProductsController {
  // Le cache est séparé entre 'admin', 'seller', 'customer', 'guest'
}</pre>
