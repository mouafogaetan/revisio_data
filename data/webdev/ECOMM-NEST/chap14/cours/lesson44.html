<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 44 : Interface d'administration - Dashboard e-commerce</title>
    <!-- Tailwind CSS CDN + base inter font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules éventuelles, discret) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour slides */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }
        /* améliorer lisibilité sur petits écrans */
        @media (max-width: 640px) {
            .prose {
                font-size: 0.95rem;
            }
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- en-tête simple avec progression -->
        <div class="mb-6 flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <h1 class="text-xl md:text-2xl font-bold text-slate-800">Administration e-commerce</h1>
            </div>
            <div class="bg-white/70 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-medium shadow-sm">
                Leçon 44 / 50 · <span id="slideCounter">1</span>/<span id="totalSlides"></span>
            </div>
        </div>

        <!-- zone slide principale -->
        <div id="slidesContainer" class="relative min-h-[70vh] bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <!-- slides générés dynamiquement par JS -->
        </div>

        <!-- navigation + indicateurs -->
        <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <button id="prevBtn" class="btn-nav px-6 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">
                ← Précédent
            </button>
            <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
            <button id="nextBtn" class="btn-nav px-6 py-2.5 bg-indigo-600 text-white rounded-xl shadow-md hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">
                Suivant →
            </button>
        </div>

        <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">
            📘 Cours d'API E-commerce (NestJS) — Module administration | Interface accessible et responsive
        </footer>
    </div>

    <script>
        // ----- Définition des slides pour la leçon 44 : Interface d'administration -----
        // 5 slides au total : Titre, Objectifs, puis 3 slides de contenu (KPIs, gestion utilisateurs, remboursements)
        const slidesData = [
            {
                type: "title",
                title: "📈 Interface d'administration",
                subtitle: "Pilotage de la plateforme e-commerce",
                desc: "Outils essentiels pour les administrateurs : indicateurs clés, gestion des utilisateurs, remboursements."
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                objectives: [
                    "Analyser les indicateurs de performance (CA, commandes, paniers abandonnés).",
                    "Gérer les utilisateurs : lister, bloquer, changer les rôles (client → vendeur).",
                    "Traiter les demandes de remboursement (partiel/total) via Stripe/PayPal."
                ]
            },
            {
                type: "content",
                title: "📊 1. Tableau de bord & KPIs",
                content: `
                    <div class="grid md:grid-cols-2 gap-5 mt-2">
                        <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500">
                            <p class="font-bold text-indigo-800">💰 Chiffre d'affaires</p>
                            <p class="text-2xl font-black text-indigo-900">356 200 FCFA</p>
                            <p class="text-sm text-slate-600">(semaine: +12% vs semaine dernière)</p>
                            <p class="text-xs text-slate-500 mt-1">Périodes : jour / semaine / mois facilement filtrable</p>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-500">
                            <p class="font-bold text-emerald-800">📦 Commandes & paniers</p>
                            <p class="text-xl font-semibold">87 commandes validées · 23 paniers abandonnés</p>
                            <p class="text-sm mt-1">Taux de conversion: 12% <span class="text-emerald-600">↑</span></p>
                        </div>
                        <div class="bg-amber-50 p-4 rounded-xl border-l-4 border-amber-500 md:col-span-2">
                            <p class="font-bold text-amber-800">🏆 Top produits & catégories populaires</p>
                            <p class="mt-1">1. Smartphone X5 (24 ventes) · 2. Casque audio (18 ventes) · 3. Clavier mécanique (15 ventes)</p>
                            <p class="text-sm text-slate-600">Catégorie star : Électronique (52% des ventes)</p>
                        </div>
                    </div>
                    <div class="mt-4 text-sm bg-slate-100 p-3 rounded-lg">
                        <span class="font-semibold">💡 Bon à savoir :</span> Un dashboard efficace permet de détecter les tendances, ajuster les stocks et campagnes marketing.
                    </div>
                `
            },
            {
                type: "content",
                title: "👥 2. Gestion des utilisateurs (Admin)",
                content: `
                    <div class="space-y-5">
                        <div class="flex flex-wrap gap-4 justify-between items-start">
                            <div class="bg-white border rounded-xl p-4 shadow-sm flex-1">
                                <h4 class="font-bold text-slate-700 flex items-center gap-2">🔍 Lister / Filtrer les comptes</h4>
                                <p class="text-sm mt-1">Recherche par email, nom, rôle (customer, seller, admin). Visualisation de l’historique des commandes.</p>
                                <div class="mt-3 bg-gray-50 p-2 rounded-md font-mono text-xs">GET /admin/users?role=seller&page=1</div>
                            </div>
                            <div class="bg-white border rounded-xl p-4 shadow-sm flex-1">
                                <h4 class="font-bold text-slate-700 flex items-center gap-2">⛔ Bloquer / Supprimer</h4>
                                <p class="text-sm mt-1">Action sécurisée avec confirmation. Les comptes bloqués ne peuvent plus se connecter ou passer commande.</p>
                                <div class="mt-2 text-xs text-red-600 bg-red-50 p-1.5 rounded">⚠️ suppression définitive seulement si aucune commande associée.</div>
                            </div>
                        </div>
                        <div class="bg-gradient-to-r from-blue-50 to-cyan-50 p-4 rounded-xl border">
                            <p class="font-semibold text-blue-800">🔄 Changer les rôles : customer → seller</p>
                            <p class="text-sm">Un utilisateur peut demander à devenir vendeur. L'admin valide via un endpoint dédié <code class="bg-white px-1">PATCH /admin/users/:id/role</code>.</p>
                            <div class="mt-2 flex gap-3 text-xs text-slate-700"><span>✅ Avantage : déléguer la gestion des produits</span> <span>🔐 Sécurité : garde-fous pour éviter abus</span></div>
                        </div>
                        <div class="border-t pt-3 mt-2">
                            <p class="italic text-sm text-slate-500">📋 Exemple : Un client devient vendeur, il peut alors ajouter ses propres produits, suivre ses ventes.</p>
                        </div>
                    </div>
                `
            },
            {
                type: "content",
                title: "💸 3. Remboursements & gestion des demandes",
                content: `
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="flex-1 bg-pink-50 rounded-xl p-4">
                            <span class="text-2xl">🔄</span>
                            <h3 class="font-bold text-pink-800 mt-1">Entité Refund</h3>
                            <ul class="list-disc pl-5 mt-2 text-sm space-y-1">
                                <li>Montant, raison, statut (en_attente, accepté, rejeté)</li>
                                <li>Lien avec la commande et l'utilisateur</li>
                                <li>Mode de remboursement (Stripe / PayPal / virement)</li>
                            </ul>
                        </div>
                        <div class="flex-1 bg-slate-50 rounded-xl p-4 border">
                            <h3 class="font-bold">🔁 Workflow admin :</h3>
                            <ol class="list-decimal pl-5 mt-2 text-sm space-y-1">
                                <li>Client demande remboursement (depuis son espace commande)</li>
                                <li>Admin visualise la demande (dashboard /refunds)</li>
                                <li>Validation : remboursement partiel ou total via API Stripe/PayPal</li>
                                <li>Mise à jour stock produit (si remboursement accepté)</li>
                            </ol>
                        </div>
                    </div>
                    <div class="mt-5 bg-yellow-50 p-3 rounded-lg text-sm border-l-4 border-yellow-400">
                        <span class="font-bold">🧾 Intégration technique :</span> Le service RefundService utilise le pattern strategy pour appeler Stripe Refund API ou PayPal. 
                        <code class="block bg-white p-1 mt-1 text-xs rounded">await this.stripeService.refund(paymentIntentId, amount);</code>
                    </div>
                    <div class="mt-3 text-center text-xs text-slate-500">📌 Un remboursement approuvé génère une notification email et met à jour le statut de la commande.</div>
                `
            }
        ];

        let currentIndex = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer tout le HTML des slides (cache DOM)
        function buildSlidesHtml() {
            let slidesHtml = '';
            for (let i = 0; i < slidesData.length; i++) {
                const slide = slidesData[i];
                let innerHtml = '';
                if (slide.type === 'title') {
                    innerHtml = `
                        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
                            <div class="bg-indigo-100 p-4 rounded-full mb-4 inline-block">
                                <span class="text-5xl">🖥️</span>
                            </div>
                            <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
                            <p class="text-lg text-indigo-700 font-medium">${escapeHtml(slide.subtitle)}</p>
                            <div class="mt-6 max-w-md mx-auto bg-white/50 p-4 rounded-xl">
                                <p class="text-slate-600">${escapeHtml(slide.desc)}</p>
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectifs') {
                    let objectivesList = '';
                    slide.objectjectives?.forEach(obj => {
                        objectivesList += `<li class="mb-3 flex items-start gap-2"><span class="text-indigo-500 text-xl">✓</span> <span>${escapeHtml(obj)}</span></li>`;
                    });
                    innerHtml = `
                        <div class="p-6 md:p-8">
                            <h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2>
                            <ul class="space-y-3 text-base md:text-lg list-none">
                                ${objectivesList}
                            </ul>
                            <div class="mt-8 bg-indigo-50 rounded-xl p-4 text-sm italic">
                                💡 À la fin de cette leçon, vous saurez construire un backoffice complet pour votre API e-commerce.
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === 'content') {
                    innerHtml = `
                        <div class="p-5 md:p-7">
                            <h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2>
                            <div class="prose prose-slate max-w-none">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                }
                slidesHtml += `<div class="slide transition-all duration-300" data-slide-index="${i}" style="display: ${i === currentIndex ? 'block' : 'none'};">${innerHtml}</div>`;
            }
            return slidesHtml;
        }

        // Helper escapeHtml simple
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Mise à jour de l'affichage + dots + compteur
        function updateSlidesAndDeps() {
            // Afficher/masquer les slides
            $('.slide').each(function(idx) {
                if (idx === currentIndex) {
                    $(this).fadeIn(150);
                } else {
                    $(this).hide();
                }
            });
            // update compteur
            $('#slideCounter').text(currentIndex + 1);
            // update dots actif
            $('#dotsContainer .dot').each(function(idx) {
                if (idx === currentIndex) {
                    $(this).addClass('bg-indigo-600 w-6');
                    $(this).removeClass('bg-gray-300 w-3');
                } else {
                    $(this).removeClass('bg-indigo-600 w-6');
                    $(this).addClass('bg-gray-300 w-3');
                }
            });
            // gestion état boutons
            $('#prevBtn').prop('disabled', currentIndex === 0);
            $('#nextBtn').prop('disabled', currentIndex === totalSlides - 1);
        }

        function generateDots() {
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                dotsHtml += `<button class="dot h-3 rounded-full transition-all duration-200 mx-1 ${i === currentIndex ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-3'}" data-index="${i}"></button>`;
            }
            $('#dotsContainer').html(dotsHtml);
            $('.dot').on('click', function() {
                let idx = parseInt($(this).data('index'));
                if (!isNaN(idx) && idx !== currentIndex && idx >=0 && idx < totalSlides) {
                    currentIndex = idx;
                    updateSlidesAndDeps();
                }
            });
        }

        // Assurer que tout le contenu est bien interprété (tailwind + mathjax éventuel)
        function refreshMathJax() {
            if (window.MathJax) {
                MathJax.typesetPromise && MathJax.typesetPromise();
            }
        }

        // Initialisation complete
        $(document).ready(function() {
            // Construire les slides dans le container
            const slidesHtml = buildSlidesHtml();
            $('#slidesContainer').html(slidesHtml);
            $('#totalSlides').text(totalSlides);
            generateDots();
            updateSlidesAndDeps();
            refreshMathJax();

            // Navigation précédent / suivant
            $('#prevBtn').on('click', function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateSlidesAndDeps();
                    refreshMathJax();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
            $('#nextBtn').on('click', function() {
                if (currentIndex < totalSlides - 1) {
                    currentIndex++;
                    updateSlidesAndDeps();
                    refreshMathJax();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // support clavier (gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    $('#prevBtn').click();
                } else if (e.key === 'ArrowRight') {
                    $('#nextBtn').click();
                }
            });
        });
    </script>
    <!-- Un petit style additionnel pour le contenu riche (prose) -->
    <style>
        .prose ul, .prose ol {
            margin-top: 0.5rem;
            margin-bottom: 0.75rem;
            padding-left: 1.5rem;
        }
        .prose li {
            margin-bottom: 0.25rem;
        }
        .prose code {
            background-color: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
        }
        .prose p {
            margin-bottom: 0.75rem;
        }
        button:focus {
            outline: 2px solid rgba(99,102,241,0.4);
        }
    </style>
</body>
</html>
