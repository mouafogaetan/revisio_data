import { Injectable, CanActivate, ExecutionContext } from '@nestjs/common';

@Injectable()

}</pre>

import { Injectable, ExecutionContext, UnauthorizedException } from '@nestjs/common';
import { AuthGuard } from '@nestjs/passport';

@Injectable()
export class JwtAuthGuard extends AuthGuard('jwt') {
  canActivate(context: ExecutionContext) {
    // Appelle la stratégie JWT définie précédemment
    return super.canActivate(context);
  }

  handleRequest(err, user, info) {
    if (err || !user) {
      throw err || new UnauthorizedException('Token invalide ou expiré');
    }
    return user;
  }
}</pre>

import { Controller, Get, Post, UseGuards, Request } from '@nestjs/common';
import { JwtAuthGuard } from '../auth/guards/jwt-auth.guard';

@Controller('orders')
@UseGuards(JwtAuthGuard)  // Protection sur TOUTES les routes du contrôleur
export class OrdersController {
  
  @Get()
  getOrders(@Request() req) {

  }
}</pre>

import { Injectable, CanActivate, ExecutionContext } from '@nestjs/common';
import { Reflector } from '@nestjs/core';
import { ROLES_KEY } from './roles.decorator';

@Injectable()
export class RolesGuard implements CanActivate {
  constructor(private reflector: Reflector) {}

  canActivate(context: ExecutionContext): boolean {
    const requiredRoles = this.reflector.getAllAndOverride&lt;string[]&gt;(ROLES_KEY, [
      context.getHandler(),
      context.getClass(),
    ]);
    
    if (!requiredRoles) {
      return true; // Pas de rôle requis → accès libre
    }
    
    const { user } = context.switchToHttp().getRequest();
    if (!user) return false;
    
    // Vérifie si l'utilisateur a au moins un des rôles requis
    return requiredRoles.some(role => user.roles?.includes(role));
  }
}</pre>

export const ROLES_KEY = 'roles';
export const Roles = (...roles: string[]) => SetMetadata(ROLES_KEY, roles);</pre>
