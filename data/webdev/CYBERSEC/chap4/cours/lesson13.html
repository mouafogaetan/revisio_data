<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours cybersécurité : Injection SQL & XSS | Développement Web</title>
    <!-- Tailwind CSS + base adaptée -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques / notations -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind + couleurs agréables (override minimal) -->
    <style>
        /* transitions slides smooth */
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        body {
            background: #f4f7fc; /* fond doux */
        }
        /* card style lisible */
        .slide-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        /* navigation buttons */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover {
            transform: scale(1.02);
            background-color: #1e3a8a !important;
        }
        /* code blocks simulate */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        .badge-risk {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-secure {
            background: #dcfce7;
            color: #166534;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                margin: 0 0.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .text-responsive {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-3 md:px-6 py-6 md:py-10">
        <!-- Conteneur principal slide dynamique -->
        <div id="slides-wrapper" class="relative">
            <!-- Les slides seront injectées ici par JS -->
        </div>

        <!-- Navigation + indicateur de progression -->
        <div class="flex flex-col sm:flex-row justify-between items-center mt-8 gap-4">
            <button id="prevSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-6 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>◀ Précédent</button>
            <div class="flex gap-2 flex-wrap justify-center" id="dotsIndicator"></div>
            <button id="nextSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-6 rounded-full shadow-md transition">Suivant ▶</button>
        </div>
    </div>

    <script>
        // structure des slides selon la leçon 13 : Injection SQL & XSS (chap4, lesson13)
        // objectifs extraits du JSON : comprendre injection SQL, maîtriser XSS, contre-mesures.
        // contenu détaillé, accessible, exemples, dessins ascii si besoin.
        
        const slidesData = [
            {   // slide 0 : titre
                type: "title",
                title: "🔐 Injection SQL & Cross-Site Scripting (XSS)",
                subtitle: "Comprendre les attaques web les plus critiques | Lesson 13",
                bgDecor: "bg-gradient-to-br from-blue-50 to-indigo-50"
            },
            {   // slide 1 : objectifs pédagogiques
                type: "objectifs",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Comprendre l'attaque par injection SQL (exemple 'Bobby Tables')",
                    "Maîtriser les types de Cross-Site Scripting (XSS réfléchi, stocké, DOM)",
                    "Mettre en place les contre-mesures : requêtes paramétrées, échappement, validation"
                ]
            },
            {   // slide 2 : injection SQL - concept et exemple simple
                type: "content",
                title: "🧪 Injection SQL : qu'est-ce que c'est ?",
                content: `
                    <p class="mb-3">L'injection SQL survient quand une application insère des données utilisateur <strong>non nettoyées</strong> directement dans une requête SQL. L'attaquant peut alors modifier la structure de la requête pour lire, modifier ou supprimer des données.</p>
                    <div class="bg-gray-100 p-3 rounded-xl mb-3">
                        <p class="font-mono text-sm">🔻 Exemple vulnérable (PHP/MySQL imaginaire) :</p>
                        <pre class="text-xs md:text-sm">$sql = "SELECT * FROM users WHERE username = '" . $_POST['user'] + "'";</pre>
                        <p class="mt-2">Si l'utilisateur entre : <code class="bg-gray-200 px-1">' OR '1'='1</code> → la requête devient : <code>SELECT * FROM users WHERE username = '' OR '1'='1'</code> → contourne l'authentification.</p>
                    </div>
                    <p class="italic text-sm">💡 "Bobby Tables" : <a href="#" class="text-blue-600 underline">xkcd 327</a> — une blague célèbre illustrant le danger des entrées non filtrées.</p>
                `
            },
            {   // slide 3 : exemples d'impacts + requêtes paramétrées (contre-mesure)
                type: "content",
                title: "🛡️ Contrer l'injection SQL : requêtes paramétrées",
                content: `
                    <p class="mb-2"><strong>Conséquences courantes :</strong> fuite de données (bases de données entières), modification, suppression, prise de contrôle serveur.</p>
                    <div class="bg-green-50 border-l-4 border-green-500 p-3 rounded-md my-3">
                        <p class="font-bold">✅ Meilleure pratique : Requêtes préparées (paramétrées)</p>
                        <pre class="text-xs mt-2">// Exemple avec PDO (PHP)
$stmt = $pdo->prepare("SELECT * FROM users WHERE username = ?");
$stmt->execute([$_POST['user']]);</pre>
                        <p>Séparation entre code SQL et données → injection impossible.</p>
                    </div>
                    <p>✔️ Utiliser les ORM (comme Eloquent, Hibernate) ou des librairies de validation. Éviter la concaténation directe.</p>
                `
            },
            {   // slide 4 : XSS - définition et types (réfléchi, stocké, DOM)
                type: "content",
                title: "🌐 Cross-Site Scripting (XSS) : quand le code s'invite",
                content: `
                    <p>XSS permet à un attaquant d'injecter des scripts malveillants (JavaScript) dans des pages web consultées par d'autres utilisateurs. Objectifs : vol de cookies, session hijacking, phishing.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 my-4">
                        <div class="bg-red-50 p-3 rounded-xl"><span class="font-bold">📤 Réfléchi</span><br>Le script est inclus dans un lien malveillant ; le serveur le reflète dans la réponse (ex: paramètre GET).</div>
                        <div class="bg-orange-50 p-3 rounded-xl"><span class="font-bold">💾 Stocké</span><br>Le script est enregistré en base (commentaire, profil) puis exécuté pour tous les visiteurs → dangereux.</div>
                        <div class="bg-yellow-50 p-3 rounded-xl"><span class="font-bold">📜 DOM-based</span><br>Manipulation du DOM côté client sans passer par le serveur (ex: <code>document.write</code> avec données non sécurisées).</div>
                    </div>
                    <div class="mt-2 p-2 bg-gray-100 rounded">
                        <p class="text-sm font-mono">Exemple XSS réfléchi : <code>https://site.com/search?q=&lt;script&gt;alert('XSS')&lt;/script&gt;</code> → si la page affiche la recherche brute, le script s'exécute.</p>
                    </div>
                `
            },
            {   // slide 5 : contre-mesures XSS (échappement, CSP, sanitize)
                type: "content",
                title: "🛡️ Contre-mesures contre les XSS",
                content: `
                    <ul class="list-disc pl-5 space-y-2 mb-3">
                        <li><strong>Échappement contextuel</strong> : HTML escape des caractères spéciaux (<code>&lt; → &amp;lt;</code>) selon le contexte (HTML, attribut, JavaScript).</li>
                        <li><strong>Politique de sécurité du contenu (CSP)</strong> : restreindre les sources de scripts autorisées.</li>
                        <li><strong>Validation des entrées</strong> : rejeter les balises suspectes côté serveur.</li>
                        <li><strong>Utiliser des bibliothèques comme DOMPurify</strong> pour assainir le HTML tout en gardant certains contenus sûrs.</li>
                    </ul>
                    <div class="bg-blue-50 p-3 rounded-lg text-sm">
                        ✅ En développement web, frameworks modernes (React, Vue, Angular) échappent automatiquement le contenu. Mais restez vigilants avec innerHTML ou les APIs dangereuses.
                    </div>
                    <pre class="mt-3 text-xs">// Échappement PHP natif :
echo htmlspecialchars($userInput, ENT_QUOTES, 'UTF-8');</pre>
                `
            },
            {   // slide 6 : autres bonnes pratiques & protections complémentaires
                type: "content",
                title: "🔒 Recommandations transversales",
                content: `
                    <p>Au-delà des injections SQL et XSS, adoptez une sécurité en profondeur :</p>
                    <div class="flex flex-wrap gap-2 my-3">
                        <span class="bg-indigo-100 px-3 py-1 rounded-full text-sm">✔️ WAF (Web Application Firewall)</span>
                        <span class="bg-indigo-100 px-3 py-1 rounded-full text-sm">✔️ Principe du moindre privilège pour la BDD</span>
                        <span class="bg-indigo-100 px-3 py-1 rounded-full text-sm">✔️ HttpOnly & Secure flags pour cookies</span>
                        <span class="bg-indigo-100 px-3 py-1 rounded-full text-sm">✔️ Test régulier (OWASP ZAP, SQLmap en éthique)</span>
                    </div>
                    <div class="mt-4 p-3 border border-blue-200 rounded-xl bg-white shadow-sm">
                        <p class="font-semibold">📘 Petit dessin conceptuel :</p>
                        <pre class="bg-transparent text-gray-700 text-xs font-mono">
  [Utilisateur] → [Formulaire web] → (Données NON filtrées) → [Base de données]
       ⚠️  Injection SQL ou XSS si aucun contrôle !
        ▲
        └── Résultat : données compromises ou script malveillant.
                        </pre>
                        <p class="text-sm">Remplacer par : validation + requêtes préparées + échappement = 🛡️.</p>
                    </div>
                `
            },
            {   // slide 7 : exemples concrets interactifs (simulation/ explication)
                type: "content",
                title: "📌 Exemple pédagogique : attaque et défense",
                content: `
                    <div class="space-y-3">
                        <div>
                            <p class="font-bold text-red-700">❌ Mauvaise pratique (SQL) :</p>
                            <pre class="text-xs">"SELECT * FROM produits WHERE nom LIKE '%" + $_GET["recherche"] + "%'"</pre>
                            <p>Entrée : <code>a%' UNION SELECT nom, motdepasse FROM users --</code> → attaquant récupère les mots de passe.</p>
                        </div>
                        <div>
                            <p class="font-bold text-green-700">✅ Bonne pratique :</p>
                            <pre class="text-xs">$req = $pdo->prepare("SELECT * FROM produits WHERE nom LIKE :search");
$req->execute(['search' => '%' . $_GET['recherche'] . '%']);</pre>
                            <p>Protection totale contre l'injection SQL.</p>
                        </div>
                        <div class="bg-amber-50 p-2 rounded mt-2">
                            <span class="font-semibold">⚠️ XSS :</span> une application qui affiche un commentaire sans échappement: <code>&lt;script&gt;stealCookies()&lt;/script&gt;</code> → échappez toujours les sorties !
                        </div>
                    </div>
                `
            },
            {   // slide 8 : récapitulatif + quiz / encouragement
                type: "recap",
                title: "📝 Récapitulons !",
                recaps: [
                    "L'injection SQL exploite des requêtes mal construites ; on utilise les requêtes paramétrées.",
                    "XSS injecte du JS malveillant ; échappement + CSP sont les principales défenses.",
                    "Toute entrée utilisateur est non fiable : valider, filtrer, échapper."
                ],
                conclusion: "La sécurité web commence par ces deux failles majeures. En les maîtrisant, vous éviterez des catastrophes ! 💪"
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'une slide
        function renderSlide(index) {
            const data = slidesData[index];
            let innerHtml = "";
            const baseCardClass = "slide-card p-5 md:p-8 transition-all duration-200";
            
            if (data.type === "title") {
                innerHtml = `
                    <div class="${baseCardClass} ${data.bgDecor || 'bg-white'} text-center">
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-800 to-indigo-700">${data.title}</h1>
                        <p class="text-lg md:text-xl text-gray-600 mt-4">${data.subtitle}</p>
                        <div class="mt-8 flex justify-center">
                            <div class="w-20 h-1 bg-blue-400 rounded-full"></div>
                        </div>
                        <p class="text-sm text-gray-500 mt-6">Classe: Développement Web | Matière: Cybersécurité</p>
                    </div>
                `;
            } 
            else if (data.type === "objectifs") {
                innerHtml = `
                    <div class="${baseCardClass} bg-white">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">${data.title}</h2>
                        <ul class="space-y-4">
                            ${data.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700"><span class="text-green-600 text-xl">✓</span> <span class="text-lg">${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 p-3 bg-blue-50 rounded-xl text-blue-800 text-sm">📖 À la fin de cette leçon, vous saurez reconnaître et bloquer ces attaques.</div>
                    </div>
                `;
            }
            else if (data.type === "content") {
                innerHtml = `
                    <div class="${baseCardClass} bg-white">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b-2 border-blue-200 pb-2 mb-5">${data.title}</h2>
                        <div class="prose prose-sm md:prose-lg max-w-none text-gray-700">
                            ${data.content}
                        </div>
                    </div>
                `;
            }
            else if (data.type === "recap") {
                innerHtml = `
                    <div class="${baseCardClass} bg-gradient-to-r from-slate-50 to-white">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-5">${data.title}</h2>
                        <div class="space-y-3">
                            ${data.recaps.map(r => `<div class="flex gap-2 items-start"><span class="text-blue-600 text-xl">🔹</span><p class="text-gray-700 text-lg">${r}</p></div>`).join('')}
                        </div>
                        <div class="mt-6 p-4 bg-indigo-100 rounded-2xl text-center">
                            <p class="font-semibold text-indigo-900">✨ ${data.conclusion}</p>
                        </div>
                        <div class="text-center text-sm text-gray-500 mt-5">✔️ Prêt pour la mise en pratique ? Passez aux exercices.</div>
                    </div>
                `;
            }
            return `<div class="slide-container w-full" id="slide-${index}">${innerHtml}</div>`;
        }

        function updateSlides() {
            const wrapper = $("#slides-wrapper");
            wrapper.empty();
            // affiche uniquement la slide courante
            const slideHtml = renderSlide(currentSlide);
            wrapper.append(slideHtml);
            // Mise à jour des dots
            updateDots();
            // Gestion état des boutons
            $("#prevSlide").prop("disabled", currentSlide === 0);
            $("#nextSlide").prop("disabled", currentSlide === totalSlides - 1);
            // Scroll to top
            window.scrollTo({ top: 0, behavior: "smooth" });
            // Si besoin de réappliquer MathJax (contenu peut contenir des formules, mais ici pas de grosses equations)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function updateDots() {
            const dotsContainer = $("#dotsIndicator");
            dotsContainer.empty();
            for (let i = 0; i < totalSlides; i++) {
                const dot = $("<button>")
                    .addClass(`w-3 h-3 rounded-full mx-1 transition-all ${i === currentSlide ? 'bg-blue-700 w-5' : 'bg-gray-300 hover:bg-gray-400'}`)
                    .attr("data-index", i);
                dot.on("click", () => {
                    currentSlide = i;
                    updateSlides();
                });
                dotsContainer.append(dot);
            }
        }

        // Navigation
        $("#nextSlide").on("click", () => {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlides();
            }
        });
        $("#prevSlide").on("click", () => {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlides();
            }
        });

        // Gestion clavier (gauche/droite)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowLeft") {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlides();
                }
            } else if (e.key === "ArrowRight") {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlides();
                }
            }
        });

        // Lancement initial
        updateSlides();
    </script>

    <!-- Ajout d'un petit pied de page optionnel avec rappel légal -->
    <div class="max-w-5xl mx-auto px-4 pb-6 text-center text-gray-500 text-xs">
        <hr class="my-4 border-gray-300">
        <p>📘 Supports pédagogiques - Formation Développement Web, Cameroun. Les techniques présentées sont à usage éducatif et éthique.</p>
        <p>⚠️ Les injections SQL et XSS sont des vulnérabilités critiques : toujours sécuriser vos applications.</p>
    </div>
</body>
</html>
