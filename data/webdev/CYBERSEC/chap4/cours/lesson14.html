<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux Vulnérabilités Web",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Les failles critiques des applications web</h3><p>Les applications web sont la cible privilégiée des attaquants car elles sont accessibles depuis Internet. Les vulnérabilités peuvent permettre :</p><ul><li><strong>Le vol de données</strong> (informations personnelles, mots de passe).</li><li><strong>La prise de contrôle</strong> des comptes utilisateurs.</li><li><strong>L'exécution de code</strong> malveillant sur le serveur.</li><li><strong>La compromission</strong> totale de l'application.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>📊 Chiffre clé :</strong> Selon l'OWASP, les failles d'authentification et de gestion de session figurent parmi les 10 vulnérabilités les plus critiques.</p></div></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons explorer les vulnérabilités les plus critiques des applications web. Les sites web sont la cible privilégiée des attaquants car ils sont accessibles depuis Internet. Une faille de sécurité peut permettre le vol de données personnelles, la prise de contrôle de comptes utilisateurs, l'exécution de code malveillant ou même la compromission totale de l'application. Selon l'OWASP, qui est une référence en matière de sécurité web, les failles d'authentification et de gestion de session figurent parmi les dix vulnérabilités les plus critiques. Il est donc essentiel de les comprendre pour mieux les prévenir.",
    "note": "OWASP (Open Web Application Security Project) est une référence mondiale en matière de sécurité des applications web."
  },
  {
    "titre": "Comprendre CSRF",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Qu'est-ce que CSRF ?</h3><p><strong>CSRF (Cross-Site Request Forgery)</strong> est une attaque qui force un utilisateur authentifié à exécuter des actions non désirées sur une application web.</p><p><strong>Principe de l'attaque :</strong></p><ul><li>L'utilisateur est connecté à un site (ex: banque en ligne).</li><li>Il visite un site malveillant qui contient un lien ou un formulaire caché.</li><li>Ce site envoie une requête à la banque en utilisant la session active de l'utilisateur.</li><li>L'application exécute l'action (virement, changement de mot de passe) en croyant que c'est l'utilisateur qui l'a demandé.</li></ul><div style='background-color: #fff3cd; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 4px solid #ffc107;'><p><strong>⚠️ Exemple concret :</strong> Un attaquant crée un site avec une image qui cache une requête de virement. L'utilisateur, connecté à sa banque, voit l'image et le virement est exécuté à son insu.</p></div></div>",
    "texteParle": "La première vulnérabilité que nous allons voir est le CSRF, qui signifie Cross-Site Request Forgery. C'est une attaque qui force un utilisateur déjà authentifié à exécuter des actions non désirées sur une application web. Le principe est simple : l'utilisateur est connecté à un site, par exemple sa banque en ligne. Il visite ensuite un autre site malveillant qui contient un formulaire caché ou un lien. Ce site va envoyer une requête à la banque en utilisant la session active de l'utilisateur. La banque va exécuter l'action, comme un virement ou un changement de mot de passe, en croyant que c'est l'utilisateur qui l'a demandé. C'est une attaque très dangereuse car elle est silencieuse.",
    "note": "CSRF exploite la confiance qu'un site a dans le navigateur de l'utilisateur authentifié."
  },
  {
    "titre": "Protection contre CSRF",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Comment se protéger de CSRF ?</h3><p>Plusieurs techniques permettent de bloquer les attaques CSRF :</p><ul><li><strong>Les jetons CSRF (tokens) :</strong> Un jeton aléatoire est généré pour chaque session et inclus dans les formulaires. Le serveur vérifie que le jeton est valide avant d'exécuter l'action.</li><li><strong>Le SameSite Cookie :</strong> Une politique qui empêche les cookies d'être envoyés lors de requêtes cross-site.</li><li><strong>La vérification du referer :</strong> Le serveur vérifie que la requête provient bien du domaine autorisé.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔐 Bonne pratique :</strong> Utiliser des jetons CSRF pour toutes les actions qui modifient l'état de l'application (formulaires, requêtes POST).</p></div></div>",
    "texteParle": "Pour se protéger contre le CSRF, il existe plusieurs techniques efficaces. La première est l'utilisation de jetons CSRF. C'est un jeton aléatoire généré pour chaque session et inclus dans les formulaires. Le serveur vérifie que ce jeton est valide avant d'exécuter toute action. Deuxièmement, il y a la politique SameSite des cookies, qui empêche les cookies d'être envoyés lors de requêtes cross-site. Enfin, on peut vérifier le referer de la requête pour s'assurer qu'elle provient bien du domaine autorisé. La bonne pratique est d'utiliser des jetons CSRF pour toutes les actions qui modifient l'état de l'application, comme les formulaires ou les requêtes POST.",
    "note": "Un jeton CSRF est unique par session et par utilisateur, ce qui le rend très difficile à prédire."
  },
  {
    "titre": "Authentification Défaillante",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Les failles d'authentification</h3><p>L'authentification est le processus qui permet à un utilisateur de prouver son identité. Les défaillances peuvent être :</p><ul><li><strong>Mots de passe faibles :</strong> '123456', 'password', mots du dictionnaire.</li><li><strong>Absence de limitation des tentatives :</strong> L'attaque par force brute est possible.</li><li><strong>Protocoles obsolètes :</strong> HTTP sans chiffrement, Basic Auth sans HTTPS.</li><li><strong>Stockage non sécurisé :</strong> Mots de passe stockés en clair ou avec un hash faible.</li><li><strong>Fonctionnalités de récupération de mot de passe vulnérables :</strong> Réinitialisation sans sécurité suffisante.</li></ul><div style='background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 4px solid #dc3545;'><p><strong>🔴 Exemple :</strong> Le piratage de LinkedIn en 2012 a exposé 117 millions de mots de passe stockés avec un hash faible (SHA-1 non salé).</p></div></div>",
    "texteParle": "La deuxième grande catégorie de vulnérabilités concerne l'authentification défaillante. L'authentification est le processus qui permet à un utilisateur de prouver son identité. Les failles sont nombreuses. D'abord, les mots de passe faibles comme '123456' ou 'password' sont encore trop courants. Ensuite, l'absence de limitation des tentatives permet des attaques par force brute. L'utilisation de protocoles obsolètes comme HTTP sans chiffrement expose les identifiants. Le stockage non sécurisé des mots de passe en clair ou avec des hashs faibles est aussi un problème majeur. Enfin, les fonctionnalités de récupération de mot de passe sont souvent vulnérables. Par exemple, le piratage de LinkedIn en 2012 a exposé 117 millions de mots de passe stockés avec un hash faible, ce qui a permis aux attaquants de les décrypter facilement.",
    "note": "Les mots de passe doivent être stockés avec des algorithmes de hachage modernes comme bcrypt, Argon2 ou PBKDF2."
  },
  {
    "titre": "Gestion de Session",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Les risques liés aux sessions</h3><p>La gestion de session est cruciale car elle permet de maintenir l'authentification d'un utilisateur pendant sa navigation. Les vulnérabilités fréquentes :</p><ul><li><strong>Détournement de session (Session Hijacking) :</strong> Un attaquant vole l'ID de session (par XSS ou sniffing) et l'utilise pour prendre le contrôle du compte.</li><li><strong>Fixation de session (Session Fixation) :</strong> L'attaquant fixe l'ID de session avant que l'utilisateur ne s'authentifie.</li><li><strong>Expiration de session inadéquate :</strong> Les sessions restent actives trop longtemps ou ne sont pas invalidées à la déconnexion.</li><li><strong>Transmission non sécurisée :</strong> Les cookies de session sont envoyés en clair sur HTTP.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔐 Bonne pratique :</strong> Les cookies de session doivent avoir les attributs <code>Secure</code> et <code>HttpOnly</code>.</p></div></div>",
    "texteParle": "La gestion de session est une autre composante critique de la sécurité des applications web. Une session permet de maintenir l'authentification d'un utilisateur pendant sa navigation. Plusieurs vulnérabilités sont fréquentes. D'abord, le détournement de session, où un attaquant vole l'ID de session, par exemple via une faille XSS ou en écoutant le trafic réseau. Ensuite, la fixation de session, où l'attaquant fixe l'ID de session avant que l'utilisateur ne s'authentifie. L'expiration de session inadéquate est aussi un problème : les sessions restent actives trop longtemps ou ne sont pas invalidées à la déconnexion. Enfin, la transmission non sécurisée des cookies en clair sur HTTP est très dangereuse. Les bonnes pratiques incluent l'utilisation des attributs Secure et HttpOnly sur les cookies de session.",
    "note": "Un cookie de session avec l'attribut HttpOnly ne peut pas être lu par JavaScript, ce qui protège contre le XSS."
  },
  {
    "titre": "La Faille XSS (Cross-Site Scripting)",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Qu'est-ce que XSS ?</h3><p><strong>XSS (Cross-Site Scripting)</strong> est une faille qui permet à un attaquant d'injecter du code JavaScript malveillant dans une page web.</p><p><strong>Les types de XSS :</strong></p><ul><li><strong>Réfléchi :</strong> Le script est inclus dans une URL malveillante et exécuté lorsque l'utilisateur clique sur le lien.</li><li><strong>Stocké :</strong> Le script est sauvegardé sur le serveur (ex: dans un commentaire) et exécuté à chaque visite.</li><li><strong>DOM-based :</strong> Le script s'exécute via le DOM du navigateur sans passer par le serveur.</li></ul><div style='background-color: #fff3cd; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 4px solid #ffc107;'><p><strong>⚠️ Impact :</strong> XSS peut voler des cookies, rediriger vers des sites malveillants, ou prendre le contrôle du compte utilisateur.</p></div></div>",
    "texteParle": "Le XSS, ou Cross-Site Scripting, est une autre faille majeure. Elle permet à un attaquant d'injecter du code JavaScript malveillant dans une page web. Il existe trois types de XSS. Le XSS réfléchi, où le script est inclus dans une URL malveillante et exécuté lorsque l'utilisateur clique sur le lien. Le XSS stocké, où le script est sauvegardé sur le serveur, par exemple dans un commentaire, et exécuté à chaque visite. Et le XSS DOM-based, où le script s'exécute via le DOM du navigateur sans passer par le serveur. Les impacts du XSS sont très graves : vol de cookies, redirection vers des sites malveillants, ou prise de contrôle du compte utilisateur.",
    "note": "Les XSS sont l'une des failles les plus répandues sur le web selon l'OWASP."
  },
  {
    "titre": "Protection contre XSS",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Comment se protéger du XSS ?</h3><p>Les bonnes pratiques pour prévenir les XSS :</p><ul><li><strong>Échappement des données :</strong> Échapper les caractères spéciaux (<code>&lt; &gt; &quot; ' &amp;</code>) avant de les afficher.</li><li><strong>Validation des entrées :</strong> Vérifier et filtrer toutes les données saisies par l'utilisateur.</li><li><strong>Politique de sécurité du contenu (CSP) :</strong> Restreindre les sources de scripts autorisées.</li><li><strong>Utiliser des frameworks sécurisés :</strong> Les frameworks modernes (React, Angular, Vue) échappent automatiquement les données.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔐 Bonne pratique :</strong> Toujours échapper les données côté serveur ET côté client pour une sécurité renforcée.</p></div></div>",
    "texteParle": "Pour se protéger du XSS, plusieurs bonnes pratiques existent. La première est l'échappement des données : il faut échapper les caractères spéciaux comme les chevrons ou les guillemets avant de les afficher. Ensuite, la validation des entrées est cruciale : toutes les données saisies par l'utilisateur doivent être vérifiées et filtrées. La politique de sécurité du contenu, ou CSP, permet de restreindre les sources de scripts autorisées. Enfin, l'utilisation de frameworks modernes comme React, Angular ou Vue est recommandée car ils échappent automatiquement les données. La bonne pratique est de toujours échapper les données côté serveur ET côté client pour une sécurité renforcée.",
    "note": "La politique CSP (Content Security Policy) est un en-tête HTTP qui permet de contrôler les sources autorisées pour les scripts."

  {
    "titre": "Les Failles XXE et SSRF",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>XXE et SSRF : deux failles méconnues</h3><p><strong>XXE (XML External Entity) :</strong> Une faille qui exploite les processeurs XML. L'attaquant peut :</p><ul><li>Lire des fichiers locaux sur le serveur.</li><li>Accéder à des ressources réseau internes.</li><li>Provoquer une attaque par déni de service.</li></ul><p><strong>SSRF (Server-Side Request Forgery) :</strong> Une faille qui permet à un attaquant d'effectuer des requêtes depuis le serveur vers d'autres services :</p><ul><li>Accéder à des services internes (métadonnées cloud, bases de données).</li><li>Scanner les ports ouverts derrière le pare-feu.</li></ul><div style='background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 4px solid #dc3545;'><p><strong>🔴 Exemple célèbre :</strong> La faille SSRF dans Capital One en 2019 a exposé 106 millions de dossiers clients.</p></div></div>",
    "texteParle": "Nous allons maintenant aborder deux failles moins connues mais très dangereuses : le XXE et le SSRF. Le XXE, ou XML External Entity, est une faille qui exploite les processeurs XML. Elle permet à un attaquant de lire des fichiers locaux sur le serveur, d'accéder à des ressources réseau internes, ou de provoquer une attaque par déni de service. Le SSRF, ou Server-Side Request Forgery, permet à un attaquant d'effectuer des requêtes depuis le serveur vers d'autres services. Cela peut permettre d'accéder à des services internes comme les métadonnées cloud, ou de scanner les ports ouverts derrière le pare-feu. Un exemple célèbre est la faille SSRF chez Capital One en 2019, qui a exposé 106 millions de dossiers clients.",
    "note": "Pour prévenir le XXE, il faut désactiver les entités externes dans les processeurs XML."

    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Le danger de la désérialisation</h3><p>La <strong>désérialisation non sécurisée</strong> est une faille qui se produit lorsque des données non fiables sont désérialisées par l'application.</p><p><strong>Pourquoi est-ce dangereux ?</strong></p><ul><li>L'attaquant peut contrôler la structure des données désérialisées.</li><li>Cela peut conduire à l'exécution de code arbitraire.</li><li>La vulnérabilité est très grave et souvent critique.</li></ul><p><strong>Exemples de langages vulnérables :</strong></p><ul><li><strong>Java</strong> (attaques via Apache Commons, Log4j).</li><li><strong>PHP</strong> (attaque sur la désérialisation native).</li><li><strong>Python</strong> (Pickle, PyYAML).</li></ul><div style='background-color: #fff3cd; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 4px solid #ffc107;'><p><strong>⚠️ Exemple :</strong> La faille Log4Shell (2021) exploitait la désérialisation pour exécuter du code à distance.</p></div></div>",
    "texteParle": "Une autre vulnérabilité très grave est la désérialisation non sécurisée. Elle se produit lorsque des données non fiables sont désérialisées par l'application. L'attaquant peut contrôler la structure des données, ce qui peut conduire à l'exécution de code arbitraire. Cette vulnérabilité est critique et touche de nombreux langages comme Java, PHP et Python. Par exemple, la célèbre faille Log4Shell de 2021 exploitait la désérialisation pour exécuter du code à distance. C'est une vulnérabilité très dangereuse car elle peut donner un accès total au serveur à l'attaquant.",

    "titre": "Logging Insuffisant",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Pourquoi le logging est crucial ?</h3><p>Un <strong>logging insuffisant</strong> empêche la détection et l'investigation des incidents de sécurité.</p><p><strong>Les problèmes courants :</strong></p><ul><li>Absence de logs pour les échecs d'authentification.</li><li>Pas de journalisation des accès aux données sensibles.</li><li>Logs non protégés et modifiables.</li><li>Absence d'alertes en cas d'activité suspecte.</li></ul><p><strong>Bonnes pratiques :</strong></p><ul><li>Loguer toutes les tentatives d'accès (succès et échecs).</li><li>Protéger les logs contre la modification et la suppression.</li><li>Mettre en place des alertes automatiques.</li><li>Conserver les logs pendant une durée adéquate.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔐 Exemple :</strong> Sans logs, il est impossible de savoir comment une attaque s'est produite ou quelles données ont été compromises.</p></div></div>",
    "texteParle": "Enfin, nous allons parler d'une vulnérabilité souvent négligée : le logging insuffisant. Un logging insuffisant empêche la détection et l'investigation des incidents de sécurité. Les problèmes courants sont l'absence de logs pour les échecs d'authentification, l'absence de journalisation des accès aux données sensibles, des logs non protégés, ou encore l'absence d'alertes en cas d'activité suspecte. Les bonnes pratiques incluent le log de toutes les tentatives d'accès, la protection des logs contre la modification, la mise en place d'alertes automatiques et la conservation des logs pendant une durée adéquate. Sans logs, il est impossible de comprendre comment une attaque s'est produite ou quelles données ont été compromises.",

    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Synthèse des vulnérabilités web</h3><ul><li><strong>CSRF :</strong> L'utilisateur authentifié exécute des actions à son insu. Protection : jetons CSRF, SameSite cookies.</li><li><strong>Authentification défaillante :</strong> Mots de passe faibles, absence de limitation des tentatives, stockage non sécurisé. Protection : MFA, hashage fort.</li><li><strong>Gestion de session :</strong> Détournement, fixation, expiration inadéquate. Protection : cookies Secure et HttpOnly, régénération d'ID.</li><li><strong>XSS :</strong> Injection de code JavaScript. Protection : échappement, CSP.</li><li><strong>XXE et SSRF :</strong> Exploitation des processeurs XML et des requêtes serveur. Protection : désactiver les entités externes, valider les URLs.</li><li><strong>Désérialisation :</strong> Exécution de code arbitraire. Protection : éviter la désérialisation de données non fiables.</li><li><strong>Logging insuffisant :</strong> Impossible de détecter ou d'investiguer les incidents. Protection : logs complets et protégés.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔐 En résumé :</strong> La sécurité d'une application web repose sur la maîtrise de ces vulnérabilités fondamentales.</p></div></div>",
    "texteParle": "Pour conclure cette leçon, faisons une synthèse de ce que nous avons appris. Nous avons vu le CSRF, qui force un utilisateur authentifié à exécuter des actions non désirées. Nous avons parlé des authentifications défaillantes avec des mots de passe faibles ou mal stockés. Nous avons abordé la gestion de session avec les risques de détournement et de fixation. Nous avons exploré les XSS, qui permettent d'injecter du code JavaScript, ainsi que les XXE et SSRF qui exploitent les processeurs XML et les requêtes serveur. Nous avons aussi mentionné la désérialisation non sécurisée et le logging insuffisant. En résumé, la sécurité d'une application web repose sur la connaissance et la maîtrise de ces vulnérabilités fondamentales. Chaque développeur doit les connaître pour les prévenir efficacement.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';

        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
