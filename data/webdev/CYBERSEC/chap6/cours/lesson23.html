<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 23 : Chiffrement des données - Cours de Cybersécurité</title>
    <!-- Tailwind CSS + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind pour couleurs douces -->
    <style>
        /* transitions slides */
        .slide {
            transition: all 0.3s ease-in-out;
        }
        .slide-hidden {
            display: none;
        }
        /* custom scrollbar discret */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        body {
            background: #f8fafc;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            transition: transform 0.2s;
        }
    </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-slate-50 to-gray-100">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal des slides -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-indigo-100 overflow-hidden">
            
            <!-- Header commun : titre matière + progression -->
            <div class="bg-indigo-800 text-white px-5 py-4 flex justify-between items-center flex-wrap gap-2">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide">Initiation à la Cybersécurité</p>
                    <p class="text-lg md:text-xl font-bold">Leçon 23 : Chiffrement des données</p>
                </div>
                <div class="text-sm bg-indigo-700 px-4 py-1 rounded-full shadow-inner">
                    Slide <span id="currentSlideNum">1</span> / <span id="totalSlidesCount"></span>
                </div>
            </div>

            <!-- Zone dynamique des slides -->
            <div id="slidesContainer" class="relative min-h-[500px] md:min-h-[550px]">
                <!-- Les slides seront injectées ici par jQuery -->
            </div>

            <!-- Navigation boutons + indicateurs -->
            <div class="bg-gray-50 border-t border-indigo-100 px-5 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex gap-3">
                    <button id="prevBtn" class="bg-white border border-indigo-300 text-indigo-700 hover:bg-indigo-50 font-medium py-2 px-5 rounded-xl transition shadow-sm flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        ◀ Précédent
                    </button>
                    <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-xl transition shadow-sm flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        Suivant ▶
                    </button>
                </div>
                <!-- dots indicateurs -->
                <div id="dotsNav" class="flex flex-wrap justify-center gap-2"></div>
            </div>
        </div>
        
        <!-- petite note explicative -->
        <p class="text-center text-gray-500 text-xs mt-6">📘 Cours interactif · Utilisez les boutons pour naviguer entre les sections</p>
    </div>

    <script>
        // ----- Définition du contenu des slides (lesson 23: Chiffrement des disques, bases de données, TLS) -----
        // Slide 0: Titre
        // Slide 1: Objectifs pédagogiques
        // Slide 2: Introduction / Pourquoi chiffrer ?
        // Slide 3: Chiffrement des disques (BitLocker, LUKS, FileVault)
        // Slide 4: Chiffrement des bases de données et sauvegardes
        // Slide 5: Chiffrement des communications (TLS, HTTPS, SSH, SFTP)
        // Slide 6: Bonnes pratiques & récapitulatif
        // Slide 7: Exercice / mise en situation (quiz réflexif)
        
        const slidesData = [
            { // slide 0 titre
                type: "title",
                title: "🔒 Chiffrement des données",
                subtitle: "Protéger les informations au repos et en transit",
                icon: "🛡️"
            },
            { // slide 1 objectifs
                type: "objectifs",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Comprendre l'importance du chiffrement des disques (BitLocker, LUKS, FileVault).",
                    "Savoir chiffrer les bases de données et les sauvegardes.",
                    "Maîtriser l'utilisation de TLS pour sécuriser les communications (HTTPS, SSH, SFTP).",
                    "Appliquer des bonnes pratiques pour protéger les données sensibles."
                ]
            },
            { // slide 2 : Pourquoi chiffrer ?
                type: "content",
                title: "📌 Pourquoi chiffrer les données ?",
                content: `<div class="space-y-4">
                    <p class="text-gray-700">Le chiffrement transforme des données lisibles (texte clair) en un format illisible (chiffré) à l'aide d'une clé secrète. Seules les personnes possédant la bonne clé peuvent déchiffrer l'information. Cela protège contre :</p>
                    <ul class="list-disc pl-6 space-y-2 text-gray-700">
                        <li><span class="font-semibold">Vol ou perte d’appareil</span> : ordinateur portable, disque dur externe, clé USB.</li>
                        <li><span class="font-semibold">Accès non autorisé à un serveur</span> : si un attaquant vole un disque, les données restent inaccessibles.</li>
                        <li><span class="font-semibold">Interception réseau</span> : les communications chiffrées empêchent l'espionnage.</li>
                    </ul>
                    <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-400 mt-4">
                        <p class="text-sm text-indigo-800">📐 <strong>Formule simple</strong> : Chiffrement = Fonction $E(K, D) = C$ &nbsp;|&nbsp; Déchiffrement = $D(K, C) = D$<br>
                        où $K$ est la clé, $D$ les données claires, $C$ les données chiffrées.</p>
                    </div>
                </div>`
            },
            { // slide 3 : Chiffrement des disques
                type: "content",
                title: "💽 Chiffrement des disques (stockage au repos)",
                content: `<div class="space-y-4">
                    <p class="text-gray-700">Le chiffrement de disque complet (Full Disk Encryption - FDE) protège l'intégralité du contenu d'un disque dur, y compris le système d'exploitation.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-2">
                        <div class="bg-white rounded-lg border border-gray-200 p-3 shadow-sm card-hover">
                            <h3 class="font-bold text-indigo-700">🔷 BitLocker (Windows)</h3>
                            <p class="text-sm text-gray-600">Intégré aux versions Pro/Entreprise. Utilise TPM (puce sécurisée) + clé de récupération.</p>
                        </div>
                        <div class="bg-white rounded-lg border border-gray-200 p-3 shadow-sm card-hover">
                            <h3 class="font-bold text-indigo-700">🐧 LUKS (Linux)</h3>
                            <p class="text-sm text-gray-600">Standard sous Linux (dm-crypt). Gère plusieurs mots de passe et protège les partitions.</p>
                        </div>
                        <div class="bg-white rounded-lg border border-gray-200 p-3 shadow-sm card-hover">
                            <h3 class="font-bold text-indigo-700">🍏 FileVault (macOS)</h3>
                            <p class="text-sm text-gray-600">Chiffrement XTS-AES-128, intégré à la récupération iCloud ou clé locale.</p>
                        </div>
                    </div>
                    <div class="mt-3 bg-amber-50 p-3 rounded-lg text-amber-800 text-sm">
                        ⚠️ Important : Sauvegardez toujours vos clés de récupération ! Sans clé, les données sont perdues définitivement.
                    </div>
                </div>`
            },
            { // slide 4 : Bases de données et sauvegardes
                type: "content",
                title: "🗄️ Chiffrement bases de données & sauvegardes",
                content: `<div class="space-y-4">
                    <p class="text-gray-700">Les bases de données contiennent des informations critiques (clients, salaires, mots de passe). Le chiffrement s'applique à différents niveaux :</p>
                    <ul class="list-disc pl-6 space-y-2">
                        <li><strong>Chiffrement transparent (TDE)</strong> : Oracle, SQL Server, MySQL Enterprise. Les données sont chiffrées sur le disque, déchiffrées à la volée.</li>
                        <li><strong>Chiffrement au niveau colonne</strong> : pour les données sensibles (numéros de carte bancaire, dossiers médicaux).</li>
                        <li><strong>Sauvegardes chiffrées</strong> : tout backup (cloud, bande, disque externe) doit être chiffré pour éviter les fuites.</li>
                    </ul>
                    <div class="bg-gray-100 p-3 rounded-lg font-mono text-sm">
                        💡 <span class="font-medium">Exemple :</span> MySQL avec AES_ENCRYPT() / PostgreSQL avec pgcrypto. Toujours utiliser des clés fortes (256 bits).
                    </div>
                    <div class="flex items-center justify-center p-2 text-center text-indigo-600">
                        🔐 <span class="ml-2">Règle 3-2-1 : 3 copies, 2 supports différents, 1 hors site → TOUTES chiffrées !</span>
                    </div>
                </div>`
            },
            { // slide 5 : TLS pour communications (HTTPS, SSH, SFTP)
                type: "content",
                title: "🌐 TLS : protéger les communications (chiffrement en transit)",
                content: `<div class="space-y-4">
                    <p class="text-gray-700">TLS (Transport Layer Security) est le protocole universel pour chiffrer les données lors de leur transfert sur un réseau. Empêche l'écoute clandestine (sniffing) et les attaques de type "homme du milieu".</p>
                    <div class="bg-slate-800 text-slate-100 rounded-xl p-4 font-mono text-sm overflow-x-auto">
                        🔒 HTTPS (HTTP over TLS) → navigation web sécurisée.<br>
                        🔑 SSH (Shell sécurisé) → administration à distance, remplace Telnet.<br>
                        📁 SFTP (SSH File Transfer Protocol) → transfert de fichiers chiffré.
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">
                        <div class="border border-green-200 bg-green-50 rounded-lg p-3">
                            <span class="font-bold">✅ Avantages TLS :</span>
                            <ul class="text-sm list-disc pl-4 mt-1">
                                <li>Confidentialité (chiffrement symétrique)</li>
                                <li>Authentification du serveur (certificats X.509)</li>
                                <li>Intégrité des données (MAC)</li>
                            </ul>
                        </div>
                        <div class="border border-red-200 bg-red-50 rounded-lg p-3">
                            <span class="font-bold">⚠️ Ne pas négliger :</span>
                            <ul class="text-sm list-disc pl-4 mt-1">
                                <li>Versions TLS obsolètes (1.0, 1.1)</li>
                                <li>Certificats auto-signés peu fiables</li>
                            </ul>
                        </div>
                    </div>
                    <div class="text-center text-sm text-gray-500 italic">"TLS transforme votre session en tunnel sécurisé — comme une enveloppe scellée avant envoi postal."</div>
                </div>`
            },
            { // slide 6 : Bonnes pratiques & résumé
                type: "content",
                title: "📋 Bonnes pratiques de chiffrement",
                content: `<div class="space-y-3">
                    <div class="flex items-start gap-3">
                        <span class="text-indigo-600 text-xl">🔑</span>
                        <div><strong>Gestion des clés robuste</strong> – Utilisez des modules HSM ou gestionnaires de clés dédiés (KMS). Ne stockez jamais les clés avec les données chiffrées.</div>
                    </div>
                    <div class="flex items-start gap-3">
                        <span class="text-indigo-600 text-xl">🔄</span>
                        <div><strong>Rotation des clés régulière</strong> – Changez les clés de chiffrement périodiquement (ex: tous les ans).</div>
                    </div>
                    <div class="flex items-start gap-3">
                        <span class="text-indigo-600 text-xl">🧪</span>
                        <div><strong>Testez la restauration</strong> – Vérifiez régulièrement que vous pouvez déchiffrer vos sauvegardes.</div>
                    </div>
                    <div class="flex items-start gap-3">
                        <span class="text-indigo-600 text-xl">🧠</span>
                        <div><strong>Algorithmes recommandés</strong> : AES-256, ChaCha20-Poly1305, RSA-2048+ pour les clés asymétriques.</div>
                    </div>
                    <hr class="my-2">
                    <p class="bg-indigo-100 p-3 rounded-lg text-indigo-900">🎯 En entreprise, combinez chiffrement disque (BitLocker/LUKS) + TLS pour le réseau + chiffrement des bases de données sensibles. C’est la <strong>défense en profondeur</strong>.</p>
                </div>`
            },
            { // slide 7 : quiz / exercice réflexif
                type: "exercise",
                title: "✍️ Mise en pratique – Vérifions votre compréhension",
                content: `<div class="space-y-5">
                    <p class="font-medium">Petit quiz interactif (cliquez pour révéler la réponse) :</p>
                    <div class="border rounded-xl p-4 bg-white shadow-sm">
                        <div class="question-item mb-4 cursor-pointer border-b border-gray-100 pb-2" data-answer="BitLocker pour Windows, LUKS pour Linux, FileVault pour macOS.">
                            <p class="font-semibold text-indigo-700 flex justify-between">❓ 1. Quels sont les trois outils principaux de chiffrement de disque pour Windows, Linux et macOS ? <span class="text-gray-400 text-sm">▼</span></p>
                            <p class="answer text-gray-600 mt-1 hidden italic text-sm"></p>
                        </div>
                        <div class="question-item mb-4 cursor-pointer border-b border-gray-100 pb-2" data-answer="TLS (Transport Layer Security) assure la confidentialité et l'intégrité des données en transit. Exemples : HTTPS, SSH, SFTP.">
                            <p class="font-semibold text-indigo-700 flex justify-between">❓ 2. Quel protocole doit-on utiliser pour chiffrer les communications réseau ? Citez deux applications. <span class="text-gray-400 text-sm">▼</span></p>
                            <p class="answer text-gray-600 mt-1 hidden italic text-sm"></p>
                        </div>
                        <div class="question-item mb-4 cursor-pointer border-b border-gray-100 pb-2" data-answer="Oui, absolument. Une sauvegarde non chiffrée peut être volée ou lue par tout tiers ayant accès au support. On doit toujours chiffrer les backups.">
                            <p class="font-semibold text-indigo-700 flex justify-between">❓ 3. Est-il indispensable de chiffrer les sauvegardes ? Pourquoi ? <span class="text-gray-400 text-sm">▼</span></p>
                            <p class="answer text-gray-600 mt-1 hidden italic text-sm"></p>
                        </div>
                        <div class="question-item mb-2 cursor-pointer" data-answer="AES-256 (symétrique) et RSA/ECC pour l'échange de clés.">
                            <p class="font-semibold text-indigo-700 flex justify-between">❓ 4. Donnez un exemple d'algorithme de chiffrement symétrique moderne. <span class="text-gray-400 text-sm">▼</span></p>
                            <p class="answer text-gray-600 mt-1 hidden italic text-sm"></p>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">💡 Cliquez sur chaque question pour afficher la réponse. Auto-évaluation rapide.</p>
                </div>`
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer le HTML de chaque slide selon son type
        function renderSlide(index) {
            const data = slidesData[index];
            if (!data) return "";
            
            if (data.type === "title") {
                return `
                    <div class="slide p-6 md:p-10 text-center">
                        <div class="text-6xl mb-4">${data.icon || "🔐"}</div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-800 mb-3">${data.title}</h1>
                        <p class="text-xl text-gray-600">${data.subtitle}</p>
                        <div class="mt-8 flex justify-center">
                            <div class="w-20 h-1 bg-indigo-300 rounded-full"></div>
                        </div>
                        <p class="mt-8 text-gray-500 text-sm">Classe: Développement Web · Chapitre 6 : Protéger les endpoints et données</p>
                    </div>
                `;
            } 
            else if (data.type === "objectifs") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-5 border-indigo-500 pl-3 mb-6">${data.title}</h2>
                        <div class="bg-indigo-50 rounded-xl p-5 space-y-3">
                            ${data.objectives.map(obj => `
                                <div class="flex items-start gap-3">
                                    <svg class="w-6 h-6 text-indigo-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span class="text-gray-800">${obj}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-6 text-center text-gray-500 text-sm">📖 À la fin de ce cours, vous serez capable de mettre en œuvre ces protections.</div>
                    </div>
                `;
            }
            else if (data.type === "content") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 border-l-4 border-indigo-400 pl-3 mb-5">${data.title}</h2>
                        <div class="prose max-w-none">${data.content}</div>
                    </div>
                `;
            }
            else if (data.type === "exercise") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 border-l-4 border-amber-400 pl-3 mb-5">${data.title}</h2>
                        <div>${data.content}</div>
                        <div class="mt-6 bg-amber-50 p-4 rounded-lg border border-amber-200 text-sm">
                            💬 N'hésitez pas à discuter avec votre formateur ou à faire des recherches supplémentaires. La sécurité se construit par la pratique !
                        </div>
                    </div>
                `;
            }
            return `<div class="slide p-6">Contenu non disponible</div>`;
        }

        // afficher tous les slides et gérer la visibilité
        function updateSlides() {
            const container = $("#slidesContainer");
            container.empty();
            // Générer chaque slide, mais seule la slide active sera visible, les autres cachées avec classe slide-hidden
            for (let i = 0; i < totalSlides; i++) {
                const slideHtml = renderSlide(i);
                const $slide = $(`<div class="slide transition-all duration-200 ${i === currentSlide ? '' : 'slide-hidden'}">${slideHtml}</div>`);
                container.append($slide);
            }
            // Mettre à jour le compteur
            $("#currentSlideNum").text(currentSlide + 1);
            $("#totalSlidesCount").text(totalSlides);
            // Mise à jour des dots
            updateDots();
            // Gérer état des boutons prev/next
            $("#prevBtn").prop("disabled", currentSlide === 0);
            $("#nextBtn").prop("disabled", currentSlide === totalSlides - 1);
            
            // Recharger MathJax si besoin (pour formules fraîchement ajoutées)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
            
            // Gérer les interactions de quiz (questions cliquables) spécifiquement sur la slide exercise
            if (slidesData[currentSlide] && slidesData[currentSlide].type === "exercise") {
                $(".question-item").off("click").on("click", function(e) {
                    e.stopPropagation();
                    const answerText = $(this).data("answer");
                    const $answerPara = $(this).find(".answer");
                    if ($answerPara.text() === "") {
                        $answerPara.html(`<span class="bg-indigo-100 p-2 block rounded-md">📌 ${answerText}</span>`);
                        $answerPara.removeClass("hidden");
                    } else {
                        $answerPara.addClass("hidden");
                        $answerPara.empty();
                    }
                });
            }
        }

        function updateDots() {
            const dotsContainer = $("#dotsNav");
            dotsContainer.empty();
            for (let i = 0; i < totalSlides; i++) {
                const dot = $(`<button class="w-2.5 h-2.5 rounded-full transition-all ${i === currentSlide ? 'bg-indigo-600 w-6' : 'bg-gray-300 hover:bg-indigo-400'}" data-slide-index="${i}"></button>`);
                dot.on("click", function() {
                    currentSlide = parseInt($(this).data("slide-index"));
                    updateSlides();
                });
                dotsContainer.append(dot);
            }
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlides();
            }
        }
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlides();
            }
        }

        // Gestion clavier (flèches gauche/droite)
        $(document).keydown(function(e) {
            if (e.key === "ArrowLeft") {
                prevSlide();
            } else if (e.key === "ArrowRight") {
                nextSlide();
            }
        });

        // Initialisation et événements
        $(document).ready(function() {
            updateSlides();
            $("#prevBtn").click(prevSlide);
            $("#nextBtn").click(nextSlide);
        });
    </script>
</body>
</html>
