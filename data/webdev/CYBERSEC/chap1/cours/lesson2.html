<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 2 : Confidentialité, Intégrité, Disponibilité | Cybersécurité</title>
  <!-- Tailwind CSS + Font Awesome (pour icônes légères) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Personnalisation légère du thème pour meilleure lisibilité / couleurs douces -->
  <style>
    /* Ajustements supplémentaires pour le confort visuel + transitions slides */
    body {
      background: linear-gradient(145deg, #f5f9ff 0%, #eef2f8 100%);
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    }
    .slide-container {
      transition: all 0.3s ease;
    }
    .card-slide {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0,0,0,0.02);
      transition: transform 0.2s;
    }
    .nav-btn {
      transition: all 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .nav-btn:active {
      transform: scale(0.96);
    }
    .progress-bar {
      transition: width 0.3s ease;
    }
    /* pour les petits écrans garantir espacement */
    @media (max-width: 640px) {
      .card-slide {
        border-radius: 1.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
    /* tap highlight */
    button, .nav-btn {
      -webkit-tap-highlight-color: transparent;
    }
    /* style liste objectifs */
    .objective-item {
      background: #f0f4fe;
      transition: 0.1s;
    }
  </style>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules si besoin, mais cette leçon n'en contient pas beaucoup, on l'active quand même pour d'éventuels symboles mathématiques) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased font-sans p-4 md:p-6 min-h-screen flex flex-col justify-center items-center">

  <div class="w-full max-w-4xl mx-auto relative">
    <!-- En-tête simple avec titre de matière & classe -->
    <div class="mb-4 flex justify-between items-center text-sm text-gray-600 px-2 flex-wrap gap-2">
      <div class="bg-white/60 px-3 py-1 rounded-full shadow-sm">📘 Développement Web – Initiation Cybersécurité</div>
      <div class="bg-white/60 px-3 py-1 rounded-full shadow-sm">🔒 Leçon 2 / 40</div>
    </div>

    <!-- Carte principale slide -->
    <div class="card-slide w-full bg-white/95 backdrop-blur-sm border border-gray-100/50 overflow-hidden">
      <div class="p-5 sm:p-8 md:p-10">
        <!-- Conteneur dynamique des slides (géré par jQuery) -->
        <div id="slidesWrapper" class="slide-container min-h-[480px] flex flex-col">
          <!-- Le contenu sera chargé dynamiquement via JS -->
          <div class="animate-pulse flex justify-center items-center h-96">
            <div class="text-slate-400">Chargement des slides...</div>
          </div>
        </div>

        <!-- Indicateur de progression + navigation -->
        <div class="mt-8 pt-4 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
          <div class="flex gap-3 order-2 sm:order-1">
            <button id="prevSlide" class="nav-btn bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-medium py-2 px-5 rounded-full transition flex items-center gap-1 shadow-sm">◀ Précédent</button>
            <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full transition flex items-center gap-1 shadow-md">Suivant ▶</button>
          </div>
          <div class="flex flex-col items-end order-1 sm:order-2 w-full sm:w-auto gap-1">
            <div class="text-sm text-gray-500 font-medium" id="slideCounter">Slide 1 / X</div>
            <div class="w-full sm:w-64 h-2 bg-gray-200 rounded-full overflow-hidden">
              <div id="progressFill" class="progress-bar h-full bg-indigo-500 rounded-full" style="width: 0%;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <p class="text-center text-xs text-gray-500 mt-6">✨ Les trois piliers de la cybersécurité : préserver confidentialité, intégrité et disponibilité des données</p>
  </div>

  <script>
    // --------------------------------------------------------------
    // DONNÉES DES SLIDES pour la LESSON 2 (objectifs du cours)
    // D'après le programme JSON: "objectifsLesson" pour lesson2
    // compétences abordées: Confidentialité (chiffrement, contrôle accès),
    // Intégrité (hash, signatures), Disponibilité (redondance, sauvegardes, DDoS)
    // Nous créons 5 slides: Titre + Objectifs généraux + 3 piliers détaillés
    // --------------------------------------------------------------
    const slidesData = [
      {
        type: "title",
        titre: "🔐 Les trois piliers de la sécurité",
        sousTitre: "Confidentialité · Intégrité · Disponibilité (Modèle CIA)",
        description: "Les bases fondamentales pour protéger systèmes, réseaux et données."
      },
      {
        type: "objectifs",
        titre: "🎯 Objectifs d'apprentissage",
        objectifs: [
          "Comprendre la confidentialité : chiffrement, contrôle d'accès, respect de la vie privée.",
          "Maîtriser l'intégrité : hachage (hash), signatures numériques, prévention des altérations.",
          "Comprendre la disponibilité : redondance, sauvegardes, protection contre les attaques DDoS."
        ]
      },
      {
        type: "pillier",
        pilier: "confidentialite",
        icone: "🤐",
        titre: "Confidentialité",
        definition: "Garantir que seules les personnes autorisées peuvent accéder aux informations.",
        concepts: [
          "Chiffrement symétrique & asymétrique (AES, RSA) pour protéger les données au repos et en transit.",
          "Contrôle d'accès (ACL, authentification forte, moindre privilège).",
          "Chiffrement des disques, bases de données, et communications (TLS/SSL)."
        ],
        schema: "🔒 [Donnée brute] → [Chiffrement] → [Donnée illisible] → (transmission) → [Déchiffrement] → [Donnée originale]"
      },
      {
        type: "pillier",
        pilier: "integrite",
        icone: "✅",
        titre: "Intégrité",
        definition: "Garantir que les données ne sont pas modifiées de manière non autorisée ou accidentelle.",
        concepts: [
          "Fonctions de hachage (SHA-256, MD5 obsolète, SHA-3) pour vérifier l'empreinte.",
          "Signatures numériques : assurer l'authenticité et l'intégrité d'un document ou logiciel.",
          "Contrôles d'intégrité : checksums, codes MAC (HMAC), versioning et journaux immuables."
        ],
        schema: "📄 Donnée → [Hachage] → Empreinte unique → Comparaison → Détection altération"
      },
      {
        type: "pillier",
        pilier: "disponibilite",
        icone: "⚡",
        titre: "Disponibilité",
        definition: "Assurer l'accès aux ressources et données par les utilisateurs légitimes quand ils en ont besoin.",
        concepts: [
          "Redondance matérielle (clusters, RAID, serveurs miroirs) et répartition de charge.",
          "Sauvegardes régulières (règle 3-2-1 : 3 copies, 2 supports différents, 1 hors site).",
          "Protection contre les dénis de service (DDoS) : filtrage, rate limiting, CDN.",
          "Plans de reprise après sinistre (PRA) et haute disponibilité."
        ],
        schema: "🌐 Utilisateurs → [Système redondant] → Service toujours accessible (même en panne partielle)"
      }
    ];

    let currentSlide = 0;
    let totalSlides = slidesData.length;

    // Fonction pour rendre le contenu HTML d'une slide selon son type
    function renderSlide(slide, idx) {
      if (slide.type === "title") {
        return `
          <div class="flex flex-col justify-center items-center text-center h-full min-h-[440px]">
            <div class="bg-indigo-50 rounded-full p-5 mb-6 inline-flex shadow-md">
              <span class="text-6xl md:text-7xl">🛡️</span>
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-purple-800 bg-clip-text text-transparent">${escapeHtml(slide.titre)}</h1>
            <p class="text-xl md:text-2xl font-medium text-indigo-700 mt-4">${escapeHtml(slide.sousTitre)}</p>
            <p class="text-gray-600 mt-6 max-w-md mx-auto text-base md:text-lg">${escapeHtml(slide.description)}</p>
            <div class="mt-8 text-indigo-400 text-sm">📌 Classe: Développement Web – Niveau débutant</div>
          </div>
        `;
      }
      else if (slide.type === "objectifs") {
        return `
          <div class="h-full min-h-[440px]">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-6 border-indigo-500 pl-4 mb-6">${escapeHtml(slide.titre)}</h2>
            <div class="grid gap-4 md:gap-5 mt-4">
              ${slide.objectifs.map((obj, i) => `
                <div class="objective-item rounded-xl p-4 flex items-start gap-3 shadow-sm border border-indigo-100">
                  <span class="bg-indigo-200 text-indigo-800 rounded-full w-7 h-7 flex items-center justify-center font-bold shrink-0 mt-0.5">${i+1}</span>
                  <p class="text-gray-800 text-base md:text-lg leading-relaxed">${escapeHtml(obj)}</p>
                </div>
              `).join('')}
            </div>
            <div class="mt-8 bg-amber-50 p-4 rounded-xl text-amber-800 text-sm flex gap-2 items-start">
              <span class="text-xl">💡</span>
              <span>Ces trois principes sont au cœur de toute stratégie de sécurité. On les appelle aussi « modèle CIA » (Confidentiality, Integrity, Availability).</span>
            </div>
          </div>
        `;
      }
      else if (slide.type === "pillier") {
        // Pilier : confidentialité, intégrité ou disponibilité
        return `
          <div class="h-full min-h-[440px]">
            <div class="flex items-center gap-3 mb-4 flex-wrap">
              <span class="text-5xl">${slide.icone}</span>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${escapeHtml(slide.titre)}</h2>
            </div>
            <div class="bg-indigo-50/50 rounded-xl p-4 mb-6 border-l-8 border-indigo-400">
              <p class="text-gray-700 font-medium text-lg">${escapeHtml(slide.definition)}</p>
            </div>
            <div class="space-y-5">
              <div>
                <h3 class="font-semibold text-indigo-800 flex items-center gap-2 text-lg"><span>📌</span> Concepts clés :</h3>
                <ul class="list-disc pl-6 mt-2 space-y-2 text-gray-700">
                  ${slide.concepts.map(c => `<li class="leading-relaxed">${escapeHtml(c)}</li>`).join('')}
                </ul>
              </div>
              ${slide.schema ? `
              <div class="mt-5 bg-gray-50 p-4 rounded-xl font-mono text-sm border border-gray-200 overflow-x-auto">
                <p class="font-semibold text-gray-600 text-xs uppercase tracking-wide mb-1">🔎 Schéma simplifié :</p>
                <code class="text-sm text-gray-800 break-words">${escapeHtml(slide.schema)}</code>
              </div>
              ` : ''}
              <div class="mt-4 text-xs text-gray-400 border-t pt-3 italic">
                Exemple concret : ${slide.pilier === 'confidentialite' ? 'Un message WhatsApp chiffré de bout en bout' : slide.pilier === 'integrite' ? 'Vérifier qu’un fichier téléchargé n’a pas été modifié via son checksum' : 'Un site web qui reste accessible même sous forte affluence grâce à des serveurs miroirs'}
              </div>
            </div>
          </div>
        `;
      }
      return `<div class="p-4">Erreur de contenu</div>`;
    }

    // fonction utilitaire anti-XSS simple
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // Mettre à jour l'affichage de la slide courante
    function updateSlide() {
      const slide = slidesData[currentSlide];
      const htmlContent = renderSlide(slide, currentSlide);
      $('#slidesWrapper').fadeOut(100, function() {
        $(this).html(htmlContent);
        // Réappliquer MathJax si besoin (pour formules potentielles, mais pas nécessaire ici, mais sécurisé)
        if (window.MathJax) {
          MathJax.typesetPromise && MathJax.typesetPromise();
        }
        $(this).fadeIn(200);
      });
      // Mettre à jour compteur et barre de progression
      $('#slideCounter').text(`Slide ${currentSlide+1} / ${totalSlides}`);
      const progressPercent = ((currentSlide) / (totalSlides - 1)) * 100;
      $('#progressFill').css('width', `${progressPercent}%`);
      
      // Gérer l'état des boutons navigation (désactiver visuellement si première/dernière)
      if (currentSlide === 0) {
        $('#prevSlide').addClass('opacity-50 cursor-not-allowed').prop('disabled', true);
      } else {
        $('#prevSlide').removeClass('opacity-50 cursor-not-allowed').prop('disabled', false);
      }
      if (currentSlide === totalSlides - 1) {
        $('#nextSlide').addClass('opacity-50 cursor-not-allowed').prop('disabled', true);
      } else {
        $('#nextSlide').removeClass('opacity-50 cursor-not-allowed').prop('disabled', false);
      }
    }

    // Navigation
    function nextSlide() {
      if (currentSlide < totalSlides - 1) {
        currentSlide++;
        updateSlide();
      }
    }
    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        updateSlide();
      }
    }

    // Initialisation et gestion des événements
    $(document).ready(function() {
      // Initialisation avec première slide
      totalSlides = slidesData.length;
      currentSlide = 0;
      updateSlide();
      
      // Gestion des clics sur boutons + gestion clavier (flèches droite/gauche) pour meilleure expérience
      $('#nextSlide').on('click', nextSlide);
      $('#prevSlide').on('click', prevSlide);
      
      $(document).on('keydown', function(e) {
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          nextSlide();
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          prevSlide();
        }
      });
      
      // Support tactile (swipe simple optionnel mais pas surcharge)
      let touchStartX = 0;
      let touchEndX = 0;
      const wrapper = document.getElementById('slidesWrapper');
      if(wrapper) {
        wrapper.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].screenX;
        }, false);
        wrapper.addEventListener('touchend', (e) => {
          touchEndX = e.changedTouches[0].screenX;
          if (touchEndX < touchStartX - 40) nextSlide();
          if (touchEndX > touchStartX + 40) prevSlide();
        }, false);
      }
    });
  </script>
  <!-- petite info responsive additionnelle -->
</body>
</html>
