<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Cours : Enjeux et fondamentaux de la cybersécurité | WebDev</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, mais surtout présent par consigne) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour les slides */
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        .slide-visible {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        /* personnalisation du scroll pour rester propre */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        body {
            background: linear-gradient(145deg, #f1f5f9 0%, #e6edf4 100%);
        }
        .card-glass {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
        }
        /* couleurs douces mais lisibles */
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="font-sans antialiased p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <!-- en-tête de navigation fixe avec progression -->
        <div class="sticky top-0 z-20 mb-5 bg-white/80 backdrop-blur-md rounded-2xl shadow-sm p-3 border border-gray-200">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white text-xs font-bold rounded-full w-7 h-7 flex items-center justify-center">📘</div>
                    <span class="text-sm font-semibold text-gray-700 truncate">Chapitre 1 : Fondamentaux</span>
                </div>
                <div class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-700">
                    <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
                <div class="flex gap-2">
                    <button id="prevSlide" class="btn-nav bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1.5 rounded-xl text-sm font-medium disabled:opacity-40 transition">◀ Précédent</button>
                    <button id="nextSlide" class="btn-nav bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-xl text-sm font-medium shadow-sm">Suivant ▶</button>
                </div>
            </div>
            <!-- barre de progression -->
            <div class="w-full bg-gray-200 rounded-full h-1.5 mt-2">
                <div id="progressBar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%;"></div>
            </div>
        </div>

        <!-- conteneur des slides -->
        <div id="slidesContainer" class="relative"></div>
    </div>

    <script>
        // Définition des slides à partir du contenu de la lesson1 (objectifs + contenu enrichi)
        // Slide 1 : Titre de la leçon
        // Slide 2 : Objectifs pédagogiques
        // Slides 3+ : Contenu développé (enjeux, acteurs, périmètre, définitions)
        
        const slidesData = [
            {
                type: "title",
                title: "🔐 Comprendre les enjeux et les fondamentaux de la cybersécurité",
                subtitle: "Lesson 1 – Définition, périmètre et acteurs",
                icon: "🛡️"
            },
            {
                type: "objectives",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Définir la cybersécurité et son périmètre (protection des systèmes, réseaux, données)",
                    "Comprendre les enjeux économiques, politiques et sociétaux",
                    "Identifier les acteurs (attaquants, défenseurs, régulateurs)"
                ]
            },
            {
                type: "content",
                title: "📌 Qu'est-ce que la cybersécurité ?",
                content: "<p>La <strong class='text-blue-700'>cybersécurité</strong> désigne l'ensemble des pratiques, technologies et processus destinés à protéger les systèmes informatiques, les réseaux, les programmes et les données contre les attaques, les dommages ou les accès non autorisés.</p><br><p>Son <strong class='text-blue-700'>périmètre</strong> englobe :</p><ul class='list-disc pl-6 mt-2 space-y-1'><li>✔️ La <strong>protection des infrastructures critiques</strong> (centrales, hôpitaux, transports)</li><li>✔️ La <strong>sécurité des données personnelles</strong> et professionnelles</li><li>✔️ La <strong>sécurité des réseaux</strong> (WiFi, entreprise, internet)</li><li>✔️ La <strong>sécurité applicative</strong> et des systèmes d'exploitation</li></ul><br><div class='bg-blue-50 border-l-4 border-blue-500 p-3 rounded-r-xl mt-2'><span class='font-semibold'>💡 À retenir :</span> La cybersécurité n'est pas seulement technique, c’est aussi un enjeu humain et organisationnel.</div>"
            },
            {
                type: "content",
                title: "🌍 Les enjeux économiques, politiques et sociétaux",
                content: "<p><span class='font-bold text-red-600'>💰 Enjeux économiques :</span> Une cyberattaque peut coûter des millions à une entreprise (rançon, perte de productivité, amende RGPD). La confiance des clients est en jeu.</p><br><p><span class='font-bold text-red-600'>🏛️ Enjeux politiques :</span> Les États protègent leurs infrastructures sensibles et luttent contre l’espionnage industriel, les campagnes de désinformation ou l’ingérence numérique.</p><br><p><span class='font-bold text-red-600'>👥 Enjeux sociétaux :</span> Protéger les données personnelles, la vie privée des citoyens, lutter contre la cybercriminalité (harcèlement, arnaques, usurpation). La transformation numérique exige une cybersécurité accessible à tous.</p><div class='mt-3 p-3 bg-gray-100 rounded-lg text-sm italic'>📊 Selon des études, une attaque par ransomware a lieu toutes les 11 secondes dans le monde. La sécurité devient une priorité nationale.</div>"
            },
            {
                type: "content",
                title: "🎭 Les acteurs de la cybersécurité (attaquants, défenseurs, régulateurs)",
                content: "<div class='grid grid-cols-1 md:grid-cols-3 gap-4'><div class='bg-red-50 p-3 rounded-xl shadow-sm'><span class='font-bold text-red-700 block text-center'>🔥 Attaquants (menaces)</span><ul class='list-disc pl-5 mt-2 text-sm'><li>Script kiddies (débutants)</li><li>Hackers éthiques/pirates</li><li>Groupes APT (commandités par États)</li><li>Cybercriminels (ransomware, phishing)</li><li>Insiders (employés malveillants)</li></ul></div><div class='bg-green-50 p-3 rounded-xl shadow-sm'><span class='font-bold text-green-700 block text-center'>🛡️ Défenseurs</span><ul class='list-disc pl-5 mt-2 text-sm'><li>Analystes SOC / RSSI</li><li>Ingénieurs sécurité</li><li>Pentesters (tests d'intrusion)</li><li>Chercheurs en vulnérabilités</li><li>Équipes CSIRT / CERT</li></ul></div><div class='bg-blue-50 p-3 rounded-xl shadow-sm'><span class='font-bold text-blue-700 block text-center'>⚖️ Régulateurs & cadres</span><ul class='list-disc pl-5 mt-2 text-sm'><li>CNIL (RGPD)</li><li>ANSSI (France) / Cybersecurity agencies</li><li>Normes ISO 27001, NIST</li><li>Législateurs nationaux</li><li>Autorités de certification</li></ul></div></div><p class='mt-4 text-sm text-gray-600'>Ces acteurs interagissent dans un équilibre permanent entre protection, risque et régulation.</p>"
            },
            {
                type: "content",
                title: "🧠 Distinguer menace, vulnérabilité et risque",
                content: "<p><strong>🔹 Menace :</strong> Tout événement ou acteur pouvant causer un dommage (ex: logiciel malveillant, pirate).</p><p><strong>🔸 Vulnérabilité :</strong> Faiblesse dans un système (ex: mot de passe faible, logiciel non patché).</p><p><strong>🔹 Risque :</strong> Probabilité qu'une menace exploite une vulnérabilité et cause un impact. <span class='bg-yellow-100 px-1'>Risque = (Menace × Vulnérabilité) × Impact</span></p><br><div class='bg-indigo-50 p-3 rounded-lg'><p class='font-medium'>Exemple concret :</p><p>- Un hacker (menace) cherche à exploiter une faille dans un serveur web (vulnérabilité). Si le serveur n'est pas à jour, le risque d'intrusion est élevé. → La mise à jour réduit la vulnérabilité.</p></div><p class='mt-3'>La <strong>gestion des risques</strong> consiste à analyser, mitiger (réduire) ou accepter certains risques selon le contexte.</p>"
            },
            {
                type: "content",
                title: "📈 Comprendre les piliers : confidentialité, intégrité, disponibilité (triade CIA)",
                content: "<div class='flex flex-col md:flex-row gap-3 text-center'><div class='flex-1 bg-white border rounded-xl p-3 shadow-sm'><span class='text-2xl block'>🔏</span><span class='font-bold text-blue-800'>Confidentialité</span><p class='text-sm mt-1'>Seules les personnes autorisées accèdent aux données. → Chiffrement, contrôle d'accès</p></div><div class='flex-1 bg-white border rounded-xl p-3 shadow-sm'><span class='text-2xl block'>📝</span><span class='font-bold text-blue-800'>Intégrité</span><p class='text-sm mt-1'>Les données ne sont pas altérées sans autorisation. → Hachage, signatures numériques</p></div><div class='flex-1 bg-white border rounded-xl p-3 shadow-sm'><span class='text-2xl block'>⏳</span><span class='font-bold text-blue-800'>Disponibilité</span><p class='text-sm mt-1'>Les systèmes et données sont accessibles quand nécessaire. → Redondance, sauvegardes, anti-DDoS</p></div></div><p class='mt-4 text-gray-700'>Ces trois piliers sont la base de toute stratégie de cybersécurité. Par exemple, un ransomware attaque la disponibilité (chiffre les fichiers), mais peut aussi violer la confidentialité.</p>"
            },
            {
                type: "content",
                title: "⚡ En résumé (à retenir pour l'étudiant)",
                content: "<ul class='list-disc pl-6 space-y-2'><li>La cybersécurité protège les données, systèmes et réseaux contre les cybermenaces.</li><li>Les enjeux sont ÉCONOMIQUES (pertes financières), POLITIQUES (souveraineté) et SOCIÉTAUX (vie privée).</li><li>Les acteurs : attaquants (hackers, APT), défenseurs (RSSI, analystes) et régulateurs (agences, lois).</li><li>La gestion des risques repose sur l'analyse menace/vulnérabilité/impact.</li><li>Les trois piliers fondamentaux : Confidentialité, Intégrité, Disponibilité (triade CIA).</li></ul><div class='mt-4 bg-green-100 p-3 rounded-lg border border-green-300 text-center'><span class='font-bold'>✅ Objectif de cette leçon : </span>Vous devez être capable d'expliquer la cybersécurité à un camarade et citer les principaux acteurs et enjeux.</div>"
            }
        ];
        
        let currentIndex = 0;
        let totalSlides = slidesData.length;
        
        // Mettre à jour affichage compteur et progression
        function updateUI() {
            $("#slideCounter").text(currentIndex + 1);
            $("#totalSlides").text(totalSlides);
            let progressPercent = ((currentIndex + 1) / totalSlides) * 100;
            $("#progressBar").css("width", progressPercent + "%");
            
            // désactiver les boutons si limites
            if (currentIndex === 0) {
                $("#prevSlide").prop("disabled", true).addClass("opacity-50");
            } else {
                $("#prevSlide").prop("disabled", false).removeClass("opacity-50");
            }
            if (currentIndex === totalSlides - 1) {
                $("#nextSlide").prop("disabled", true).addClass("opacity-50");
            } else {
                $("#nextSlide").prop("disabled", false).removeClass("opacity-50");
            }
        }
        
        // Générer le HTML d'une slide selon son type
        function renderSlide(slide, idx) {
            if (slide.type === "title") {
                return `
                    <div class="slide slide-visible bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                        <div class="bg-gradient-to-r from-blue-800 to-indigo-700 p-8 text-white text-center">
                            <div class="text-6xl mb-3">${slide.icon || "🛡️"}</div>
                            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight">${slide.title}</h1>
                            <p class="text-blue-100 mt-3 text-base md:text-lg">${slide.subtitle}</p>
                            <div class="mt-6 inline-block bg-white/20 backdrop-blur-sm px-4 py-2 rounded-full text-sm">Classe : Développement Web · Matière : Cybersécurité</div>
                        </div>
                        <div class="p-6 text-center text-gray-600 border-t border-gray-100 text-sm">
                            📍 Appuyez sur "Suivant" pour découvrir les objectifs et le contenu.
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectives") {
                let objectivesHtml = slide.objectives.map((obj, i) => `<li class="flex items-start gap-3 mb-3"><span class="bg-blue-100 text-blue-700 rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold shrink-0 mt-0.5">${i+1}</span><span class="text-gray-700">${obj}</span></li>`).join("");
                return `
                    <div class="slide slide-visible bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-gray-100">
                        <div class="flex items-center gap-3 border-b pb-3 mb-5 border-blue-200">
                            <span class="text-3xl">🎯</span>
                            <h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2>
                        </div>
                        <ul class="space-y-2">
                            ${objectivesHtml}
                        </ul>
                        <div class="mt-6 bg-gray-50 p-4 rounded-xl text-sm text-gray-500 italic">✨ À la fin de cette leçon, vous maîtriserez les bases essentielles de la cybersécurité.</div>
                    </div>
                `;
            }
            else if (slide.type === "content") {
                return `
                    <div class="slide slide-visible bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-gray-100">
                        <div class="flex items-center gap-2 mb-5">
                            <div class="h-1 w-8 bg-blue-500 rounded-full"></div>
                            <h2 class="text-xl md:text-2xl font-bold text-gray-800">${slide.title}</h2>
                        </div>
                        <div class="prose max-w-none text-gray-700 leading-relaxed">
                            ${slide.content}
                        </div>
                    </div>
                `;
            }
            return `<div class="slide slide-visible bg-white rounded-2xl p-6">Contenu par défaut</div>`;
        }
        
        // Afficher la slide courante
        function showSlide(index) {
            // construction complète du container slides
            let allSlidesHtml = "";
            for (let i = 0; i < slidesData.length; i++) {
                let slideDiv = renderSlide(slidesData[i], i);
                // On ajoute un id et la classe slide, mais on masque les non actifs
                let displayClass = (i === index) ? "slide-visible" : "slide-hidden";
                allSlidesHtml += `<div id="slide_${i}" class="slide ${displayClass}">${slideDiv}</div>`;
            }
            $("#slidesContainer").html(allSlidesHtml);
            
            // s'assurer que seule la slide active est visible
            for (let i = 0; i < slidesData.length; i++) {
                if (i === index) {
                    $(`#slide_${i}`).removeClass("slide-hidden").addClass("slide-visible");
                } else {
                    $(`#slide_${i}`).removeClass("slide-visible").addClass("slide-hidden");
                }
            }
            updateUI();
            
            // scroll en haut pour une meilleure expérience mobile
            window.scrollTo({ top: 0, behavior: "smooth" });
        }
        
        // Navigation
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                showSlide(currentIndex);
            }
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                showSlide(currentIndex);
            }
        }
        
        // Initialisation et événements
        $(document).ready(function() {
            totalSlides = slidesData.length;
            showSlide(0);
            
            $("#nextSlide").on("click", nextSlide);
            $("#prevSlide").on("click", prevSlide);
            
            // Raccourcis clavier (gauche/droite) pour l'ergonomie
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    prevSlide();
                    e.preventDefault();
                }
            });
            
            // Swipe basique pour mobile (optionnel)
            let touchStartX = 0;
            let touchEndX = 0;
            $("body").on("touchstart", function(e) {
                touchStartX = e.originalEvent.changedTouches[0].screenX;
            });
            $("body").on("touchend", function(e) {
                touchEndX = e.originalEvent.changedTouches[0].screenX;
                if (touchEndX < touchStartX - 40) nextSlide();
                if (touchEndX > touchStartX + 40) prevSlide();
            });
            
            // forcer MathJax à analyser le contenu dynamique (si jamais des formules apparaissaient)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        });
        
        // ajustement final pour le responsive des listes
    </script>
</body>
</html>
