<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 3 : Menaces, vulnérabilités et gestion des risques | Cybersécurité</title>
  <!-- Tailwind CSS + Font Awesome (pour icônes légères) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (formules mathématiques si besoin) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions smooth pour les slides */
    .slide {
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
    }
    .slide-hidden {
      display: none;
      opacity: 0;
      transform: translateX(20px);
    }
    .slide-visible {
      display: block;
      opacity: 1;
      transform: translateX(0);
    }
    /* personnalisation légère pour la navigation tactile */
    button:active {
      transform: scale(0.96);
    }
    /* meilleur confort de lecture */
    body {
      background: #f8fafc;
    }
    .card-bullet {
      background: #ffffffcc;
      backdrop-filter: blur(2px);
    }
    @media (max-width: 640px) {
      .slide-title {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 font-sans antialiased">

  <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur principal slides -->
    <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl border border-indigo-100 overflow-hidden">
      <!-- Header fixe avec progression -->
      <div class="bg-indigo-700 px-5 py-4 flex justify-between items-center flex-wrap gap-2">
        <div class="flex items-center space-x-2">
          <span class="text-white font-bold text-sm md:text-base">📘 Initiation Cybersécurité</span>
          <span class="bg-indigo-900 text-indigo-100 text-xs px-2 py-1 rounded-full">Leçon 3 / 40</span>
        </div>
        <div class="text-white text-sm font-medium">
          <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">5</span>
        </div>
      </div>

      <!-- Zone des slides (dynamique jQuery) -->
      <div id="slidesContainer" class="relative min-h-[520px] md:min-h-[560px] p-6 md:p-8">
        <!-- Les slides seront injectées ici -->
      </div>

      <!-- Navigation + indicateurs -->
      <div class="bg-gray-50 border-t border-indigo-100 px-5 py-4 flex justify-between items-center">
        <button id="prevSlide" class="bg-white hover:bg-indigo-50 text-indigo-700 font-semibold py-2 px-5 rounded-full shadow-sm border border-indigo-200 transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1">
          ← Précédent
        </button>
        <div class="flex space-x-2" id="dotsNav"></div>
        <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow transition flex items-center gap-1">
          Suivant →
        </button>
      </div>
    </div>
    
    <!-- petite note pédagogique -->
    <div class="text-center text-xs text-gray-500 mt-5">
      🎓 Cours conçu pour les élèves du Cameroun – approche simple et pratique
    </div>
  </div>

  <script>
    // --------------------------------------------------------------
    // Définition des données de la leçon 3 : Menaces, vulnérabilités, risques
    // Titre, objectifs (déjà dans le JSON) et contenu enrichi pour 3 objectifs
    // Nous allons créer les slides suivantes:
    // Slide 1: Titre de la leçon + intro
    // Slide 2: Objectifs d'apprentissage (reprenant les 3 objectifs du fichier)
    // Slide 3: Distinguer menace, vulnérabilité, risque et impact (détail objectif 1)
    // Slide 4: Types d'attaquants (script kiddie, hacker, APT, insider threat) (objectif 2)
    // Slide 5: Comprendre la gestion des risques (analyse, mitigation, acceptation) (objectif 3)
    // --------------------------------------------------------------
    
    const lessonTitle = "Menaces, vulnérabilités et gestion des risques";
    const competence = "Distinguer menace, vulnérabilité, risque et impact / Identifier les types d'attaquants / Comprendre la gestion des risques";
    
    // objectifs depuis la donnée originale (fichier JSON)
    const objectivesData = [
      "Distinguer menace, vulnérabilité, risque et impact",
      "Identifier les types d'attaquants (script kiddie, hacker, APT, insider threat)",
      "Comprendre la gestion des risques (analyse, mitigation, acceptation)"
    ];
    
    // Contenu des slides supplémentaires
    const slidesContent = [
      { // SLIDE 0 (index 0) -> TITRE + accroche
        type: "title",
        title: lessonTitle,
        subtitle: "Module: Cybersécurité - Chapitre 1 · Fondamentaux",
        description: "Pourquoi certaines informations sont-elles menacées ? Comment évaluer les dangers et protéger un système ? Découvrons les bases de la gestion des risques."
      },
      { // SLIDE 1 -> objectifs
        type: "objectives",
        objectives: objectivesData
      },
      { // SLIDE 2 -> Menace / Vulnérabilité / Risque / Impact 
        type: "concept",
        title: "📌 Menace, vulnérabilité, risque et impact",
        content: `
          <div class="grid gap-5 md:grid-cols-2 mt-2">
            <div class="bg-indigo-50 p-4 rounded-xl shadow-sm">
              <div class="font-bold text-indigo-800 text-lg">⚠️ Menace</div>
              <p class="text-gray-700 mt-1">Tout événement ou action (volontaire ou accidentelle) pouvant causer un dommage. Ex: cyberattaque, logiciel malveillant, inondation, erreur humaine.</p>
            </div>
            <div class="bg-amber-50 p-4 rounded-xl shadow-sm">
              <div class="font-bold text-amber-800 text-lg">🔓 Vulnérabilité</div>
              <p class="text-gray-700 mt-1">Faiblesse dans un système (logiciel, matériel, procédure) qui peut être exploitée. Ex: mot de passe faible, logiciel non mis à jour, absence de pare-feu.</p>
            </div>
            <div class="bg-rose-50 p-4 rounded-xl shadow-sm">
              <div class="font-bold text-rose-800 text-lg">🎲 Risque</div>
              <p class="text-gray-700 mt-1">Probabilité qu’une menace exploite une vulnérabilité et cause un préjudice. <span class="italic text-sm">Risque = (Probabilité x Impact)</span></p>
            </div>
            <div class="bg-emerald-50 p-4 rounded-xl shadow-sm">
              <div class="font-bold text-emerald-800 text-lg">💥 Impact</div>
              <p class="text-gray-700 mt-1">Conséquences d’un incident: perte financière, indisponibilité, atteinte à la réputation, fuite de données sensibles.</p>
            </div>
          </div>
          <div class="mt-5 p-3 bg-gray-100 border-l-4 border-indigo-500 rounded text-sm">
            <span class="font-semibold">✨ Exemple concret :</span> Un site web vulnérable à l’injection SQL (vulnérabilité) + un pirate qui envoie des requêtes malveillantes (menace) = risque élevé de vol de base de données. L’impact peut être la fuite des mots de passe clients.
          </div>
        `
      },
      { // SLIDE 3 -> Types d’attaquants (avec un petit tableau ou cartes)
        type: "attackers",
        title: "🕵️‍♂️ Qui sont les attaquants ? Comprendre leurs profils",
        content: `
          <div class="space-y-4 mt-2">
            <div class="flex flex-wrap gap-4 justify-between">
              <div class="flex-1 min-w-[180px] bg-white border border-indigo-100 rounded-2xl p-4 shadow-sm">
                <div class="text-2xl mb-1">🧑‍💻</div>
                <h3 class="font-bold text-indigo-700">Script kiddie</h3>
                <p class="text-sm text-gray-600">Débutant utilisant des outils déjà prêts, souvent par amusement ou notoriété. Peu de connaissances profondes.</p>
              </div>
              <div class="flex-1 min-w-[180px] bg-white border border-indigo-100 rounded-2xl p-4 shadow-sm">
                <div class="text-2xl mb-1">👨‍🎓</div>
                <h3 class="font-bold text-indigo-700">Hacker (Black hat / White hat)</h3>
                <p class="text-sm text-gray-600">Expert technique. Black hat agit illégalement; White hat (éthique) travaille avec autorisation pour sécuriser.</p>
              </div>
              <div class="flex-1 min-w-[180px] bg-white border border-indigo-100 rounded-2xl p-4 shadow-sm">
                <div class="text-2xl mb-1">🏛️</div>
                <h3 class="font-bold text-indigo-700">APT (Advanced Persistent Threat)</h3>
                <p class="text-sm text-gray-600">Groupes sophistiqués, souvent étatiques. Mènent des attaques ciblées et durables sur des infrastructures critiques.</p>
              </div>
              <div class="flex-1 min-w-[180px] bg-white border border-indigo-100 rounded-2xl p-4 shadow-sm">
                <div class="text-2xl mb-1">👤</div>
                <h3 class="font-bold text-indigo-700">Insider threat</h3>
                <p class="text-sm text-gray-600">Employé, partenaire ou sous-traitant ayant un accès légitime et qui utilise ses privilèges à mauvais escient (vol, sabotage).</p>
              </div>
            </div>
            <div class="mt-3 bg-yellow-50 p-3 rounded-lg border border-yellow-200 text-sm">
              💡 <strong>À retenir :</strong> La menace ne vient pas toujours de l’extérieur. Une mauvaise intention interne peut être plus dangereuse car l’attaquant connaît déjà les processus.
            </div>
          </div>
        `
      },
      { // SLIDE 4 -> Gestion des risques (analyse, mitigation, acceptation)
        type: "riskManagement",
        title: "⚙️ Gestion des risques : analyser, mitiger, accepter",
        content: `
          <div class="space-y-4 mt-1">
            <div class="flex flex-col md:flex-row gap-4">
              <div class="bg-blue-50 rounded-xl p-4 flex-1">
                <div class="font-bold text-blue-800 text-md">🔎 1. Analyse des risques</div>
                <p class="text-gray-700 text-sm">Identifier les actifs (données, matériel, logiciels), les menaces possibles, vulnérabilités associées, estimer la probabilité et l'impact. Méthodes: EBIOS, analyse qualitative.</p>
              </div>
              <div class="bg-green-50 rounded-xl p-4 flex-1">
                <div class="font-bold text-green-800 text-md">🛡️ 2. Mitigation (traitement)</div>
                <p class="text-gray-700 text-sm">Réduire le risque : mettre des correctifs, former les utilisateurs, ajouter un pare-feu, chiffrer les données. On diminue soit la probabilité soit l’impact.</p>
              </div>
              <div class="bg-amber-50 rounded-xl p-4 flex-1">
                <div class="font-bold text-amber-800 text-md">✅ 3. Acceptation & transfert</div>
                <p class="text-gray-700 text-sm">Quand le coût de la protection dépasse le dommage potentiel, on accepte le risque résiduel. Ou on le transfère via assurance cyber.</p>
              </div>
            </div>
            <div class="bg-indigo-50/60 p-4 rounded-xl border border-indigo-200">
              <p class="font-semibold text-indigo-900">📋 Exemple de cycle de gestion des risques :</p>
              <div class="flex flex-wrap gap-2 mt-2 text-sm text-gray-800">
                <span class="bg-white px-2 py-1 rounded-full">🔎 Inventaire des actifs</span> → 
                <span class="bg-white px-2 py-1 rounded-full">⚠️ Évaluer menaces/vulnérabilités</span> → 
                <span class="bg-white px-2 py-1 rounded-full">📊 Calcul du risque (probabilité x impact)</span> → 
                <span class="bg-white px-2 py-1 rounded-full">🛡️ Décision (mitiger, accepter, transférer)</span> → 
                <span class="bg-white px-2 py-1 rounded-full">🔄 Surveiller & réévaluer</span>
              </div>
            </div>
          </div>
          <div class="mt-4 text-sm italic text-gray-600 border-t pt-3 border-gray-200">
            🧠 Concept clé : Un risque nul n’existe pas, la sécurité absolue est illusoire. L’objectif est d’atteindre un niveau de risque acceptable.
          </div>
        `
      }
    ];

    // Nombre total de slides : 1 (titre) + 1 (objectifs) + 3 (contenus détaillés) = 5 slides
    // slidesData va contenir chaque vue sous forme d'objet HTML pré-généré ou génération dynamique
    let currentSlide = 0;
    let totalSlides = slidesContent.length; // 5 slides comme défini ci-dessus
    
    // Fonction pour générer chaque slide en HTML (selon son type)
    function renderSlideContent(slideData, index) {
      if (slideData.type === "title") {
        return `
          <div class="flex flex-col justify-center items-center text-center h-full min-h-[400px]">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-3xl mb-4">🔐</div>
            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${escapeHtml(slideData.title)}</h1>
            <p class="text-indigo-600 font-medium mt-2">${escapeHtml(slideData.subtitle)}</p>
            <div class="mt-6 max-w-md mx-auto text-gray-600">${escapeHtml(slideData.description)}</div>
            <div class="mt-8 text-sm text-gray-400">⬅️ Utilisez les flèches pour naviguer</div>
          </div>
        `;
      } 
      else if (slideData.type === "objectives") {
        let objectivesHtml = `<div class="h-full"><h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-5">🎯 Objectifs d'apprentissage</h2><ul class="space-y-4">`;
        slideData.objectives.forEach(obj => {
          objectivesHtml += `<li class="flex items-start gap-3 bg-white p-3 rounded-xl shadow-sm border border-indigo-50"><span class="text-indigo-600 text-xl">✔️</span><span class="text-gray-700">${escapeHtml(obj)}</span></li>`;
        });
        objectivesHtml += `</ul><div class="mt-6 bg-indigo-50 p-3 rounded-lg text-indigo-800 text-sm">📖 À la fin de cette leçon, vous serez capable d’analyser des situations de sécurité et de proposer des actions adaptées.</div></div>`;
        return objectivesHtml;
      }
      else if (slideData.type === "concept" || slideData.type === "attackers" || slideData.type === "riskManagement") {
        // affichage classique avec titre + contenu (HTML déjà dans content)
        return `
          <div class="h-full">
            <h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${slideData.title || ''}</h2>
            <div class="prose prose-indigo max-w-none text-gray-700">
              ${slideData.content}
            </div>
          </div>
        `;
      }
      else {
        return `<div>Contenu indisponible</div>`;
      }
    }

    // helper d'échappement simple
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // Génération dynamique des slides + dots
    function buildSlides() {
      const container = $('#slidesContainer');
      container.empty();
      for (let i = 0; i < slidesContent.length; i++) {
        const slideHtml = renderSlideContent(slidesContent[i], i);
        const slideDiv = $('<div>').addClass('slide slide-hidden').attr('data-slide-index', i).html(slideHtml);
        container.append(slideDiv);
      }
      updateDots();
      showSlide(currentSlide);
    }
    
    function updateDots() {
      const dotsContainer = $('#dotsNav');
      dotsContainer.empty();
      for (let i = 0; i < totalSlides; i++) {
        const dot = $('<button>')
          .addClass('w-2.5 h-2.5 rounded-full transition-all duration-200 mx-1 focus:outline-none')
          .attr('data-dot-index', i);
        if (i === currentSlide) {
          dot.addClass('bg-indigo-600 w-5');
        } else {
          dot.addClass('bg-indigo-300 hover:bg-indigo-400');
        }
        dot.on('click', function() {
          const idx = parseInt($(this).attr('data-dot-index'));
          if (!isNaN(idx)) goToSlide(idx);
        });
        dotsContainer.append(dot);
      }
      $('#currentSlideIdx').text(currentSlide + 1);
      $('#totalSlidesCount').text(totalSlides);
    }
    
    function showSlide(index) {
      if (index < 0) index = 0;
      if (index >= totalSlides) index = totalSlides - 1;
      $('.slide').each(function(i, el) {
        if (i === index) {
          $(el).removeClass('slide-hidden').addClass('slide-visible');
        } else {
          $(el).removeClass('slide-visible').addClass('slide-hidden');
        }
      });
      currentSlide = index;
      updateDots();
      // gestion état boutons prev/next
      $('#prevSlide').prop('disabled', currentSlide === 0);
      $('#nextSlide').prop('disabled', currentSlide === totalSlides - 1);
    }
    
    function goToSlide(index) {
      showSlide(index);
    }
    
    function nextSlide() {
      if (currentSlide < totalSlides - 1) {
        showSlide(currentSlide + 1);
      }
    }
    
    function prevSlide() {
      if (currentSlide > 0) {
        showSlide(currentSlide - 1);
      }
    }
    
    // Événements et raccourcis clavier (gauche/droite) pour tablette / mobile externe
    $(document).ready(function() {
      buildSlides();
      
      $('#nextSlide').on('click', nextSlide);
      $('#prevSlide').on('click', prevSlide);
      
      $(document).keydown(function(e) {
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          nextSlide();
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          prevSlide();
        }
      });
      
      // Pour le tactile / swipe simple on pourrait améliorer mais déjà très fonctionnel
      let touchStartX = 0;
      $('#slidesContainer').on('touchstart', function(e) {
        touchStartX = e.originalEvent.touches[0].clientX;
      });
      $('#slidesContainer').on('touchend', function(e) {
        if (!touchStartX) return;
        let touchEndX = e.originalEvent.changedTouches[0].clientX;
        let diff = touchEndX - touchStartX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) prevSlide();
          else nextSlide();
        }
        touchStartX = 0;
      });
    });
  </script>
  <!-- petite correction affichage: aucune image externe nécessaire, nous avons utilisé seulement des emojis et dessins conceptuels -->
  <!-- Conforme à la demande: dessin via CSS/texte, pas d'image externe, utilisation de Tailwind et jQuery, adapté mobile -->
</body>
</html>
