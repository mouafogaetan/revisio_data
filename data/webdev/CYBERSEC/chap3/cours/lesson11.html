<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 11 : Sécuriser un réseau WiFi | Cybersécurité</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (optionnel, au cas où des formules seraient nécessaires) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* smooth transition pour les slides */
    .slide {
      transition: opacity 0.3s ease-in-out, transform 0.2s ease;
    }
    .slide-hidden {
      display: none;
    }
    /* personnalisation des scrolls et boutons */
    .btn-nav {
      transition: all 0.2s ease;
    }
    .btn-nav:active {
      transform: scale(0.96);
    }
    body {
      background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
    }
    /* carte slide plus douce */
    .card-slide {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
    }
    /* adapté petits écrans */
    @media (max-width: 640px) {
      .card-slide {
        border-radius: 1.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
    /* couleur pastel visible non agressive */
    .bg-soft-primary {
      background-color: #2c3e66;
    }
    .text-soft-primary {
      color: #1e2b47;
    }
    .border-soft {
      border-color: #cbd5e1;
    }
  </style>
</head>
<body class="font-sans antialiased p-4 md:p-6">

  <div class="max-w-4xl mx-auto w-full">
    <!-- Conteneur slides (carrousel simple) -->
    <div id="slides-container" class="relative">
      <!-- Les slides seront injectées / affichées dynamiquement via jQuery -->
    </div>

    <!-- Navigation + indicateur -->
    <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
      <button id="prevSlide" class="btn-nav bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md border border-gray-300 transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Précédent
      </button>
      <div class="text-sm bg-white/70 backdrop-blur-sm rounded-full px-4 py-2 shadow text-gray-700 font-medium">
        Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
      </div>
      <button id="nextSlide" class="btn-nav bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        Suivant
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>

    <!-- petite barre de progression optionnelle -->
    <div class="w-full bg-gray-200 rounded-full h-1.5 mt-5">
      <div id="progressBar" class="bg-indigo-600 h-1.5 rounded-full" style="width: 0%"></div>
    </div>
  </div>

  <script>
    // Définition des slides correspondant à la leçon 11 : "Sécuriser un réseau WiFi" (tirée du chapitre 3, lesson 11)
    // D'après les objectifs du JSON officiel pour lesson11 (chap3)
    // Objectifs officiels :
    // 0: "Comprendre les faiblesses de WEP et WPA"
    // 1: "Maîtriser WPA2-PSK et WPA3 (SAE, Forward Secrecy)"
    // 2: "Sécuriser un réseau WiFi (802.1X, RADIUS, isolation des clients)"
    // Nous allons créer un cours structuré en slides: 
    // Slide1 = Titre + intro générale
    // Slide2 = Objectifs d'apprentissage (reprenant les 3 objectifs)
    // Slide3 = Les faiblesses de WEP et WPA
    // Slide4 = WPA2-PSK et WPA3 (avancées)
    // Slide5 = Bonnes pratiques pour sécuriser un WiFi (802.1X, RADIUS, isolation clients)
    // Slide6 = Récapitulatif & petit exercice pratique / astuce
    // Slide7 = Quiz / Validation rapide (format interactif doux)
    
    const slidesData = [
      { // slide 0 : titre
        type: "title",
        title: "🔐 Sécuriser un réseau WiFi",
        subtitle: "Leçon 11 – Initiation à la Cybersécurité",
        icon: "📶"
      },
      { // slide 1 : objectifs
        type: "objectives",
        objectives: [
          "Comprendre les faiblesses historiques de WEP et WPA",
          "Maîtriser WPA2-PSK et WPA3 (SAE, Forward Secrecy)",
          "Mettre en œuvre des mesures avancées : 802.1X, RADIUS, isolation des clients"
        ]
      },
      { // slide 2 : faiblesses WEP & WPA
        type: "content",
        title: "🚨 Faiblesses de WEP et WPA",
        content: `
          <div class="space-y-4">
            <div class="bg-red-50 p-4 rounded-xl border-l-8 border-red-500">
              <h3 class="font-bold text-red-800 text-lg">🔓 WEP (Wired Equivalent Privacy)</h3>
              <p class="text-gray-700 mt-1">Ancien standard (1999), aujourd'hui totalement obsolète. Vulnérabilités majeures : clé statique de 40 ou 104 bits, vecteur d'initialisation (IV) trop court (24 bits) -> <span class="font-semibold">attaque par réinjection IV</span> permettant de casser la clé en quelques minutes. Outil célèbre : <code class="bg-gray-200 px-1 rounded">aircrack-ng</code>.</p>
            </div>
            <div class="bg-orange-50 p-4 rounded-xl border-l-8 border-orange-400">
              <h3 class="font-bold text-orange-800 text-lg">⚠️ WPA (Wi-Fi Protected Access) version 1</h3>
              <p class="text-gray-700 mt-1">Introduit TKIP (Temporal Key Integrity Protocol) pour remplacer WEP mais conserve des faiblesses : attaque <strong>MIC (Michael) exploitée</strong>, vulnérabilité à l'attaque Beck-Tews (réduction de la sécurité), et également faiblesse face à l'attaque par dictionnaire sur PSK (pré-shared key) si mot de passe faible. À éviter aujourd'hui.</p>
            </div>
            <p class="text-sm text-gray-500 italic">✅ Recommandation : ne jamais utiliser WEP ou WPA1 sur un réseau moderne.</p>
          </div>
        `
      },
      { // slide 3 : WPA2-PSK et WPA3
        type: "content",
        title: "🛡️ WPA2-PSK et WPA3 : La nouvelle génération",
        content: `
          <div class="grid md:grid-cols-2 gap-4">
            <div class="bg-blue-50 p-4 rounded-2xl shadow-sm">
              <h3 class="font-bold text-blue-800 text-lg flex items-center gap-2"><span>📡</span> WPA2-PSK</h3>
              <p>Chiffrement <strong>AES-CCMP</strong> obligatoire, plus robuste que TKIP. Mais il reste vulnérable à l'attaque <strong>KRACK</strong> (Key Reinstallation Attack) corrigée par les mises à jour. Faiblesse majeure : utilisation de la phrase de passe partagée (PSK) – attaque par dictionnaire toujours possible si mot de passe faible.</p>
              <div class="mt-2 text-sm bg-white p-2 rounded">💡 Bonne pratique : choisir un mot de passe long (>12 caractères complexe).</div>
            </div>
            <div class="bg-green-50 p-4 rounded-2xl shadow-sm">
              <h3 class="font-bold text-green-800 text-lg flex items-center gap-2"><span>✨</span> WPA3 (2018)</h3>
              <ul class="list-disc ml-5 space-y-1 text-gray-700">
                <li><strong>SAE (Simultaneous Authentication of Equals)</strong> remplace le PSK : résiste aux attaques par dictionnaire hors ligne grâce à l'échange secret et à l'utilisation de l'élément de mot de passe avec OWE (Opportunistic Wireless Encryption).</li>
                <li><strong>Forward Secrecy</strong> : même si la clé privée est compromise, les sessions passées restent protégées.</li>
                <li>Meilleure protection pour les réseaux ouverts (Enhanced Open).</li>
              </ul>
            </div>
          </div>
          <div class="mt-4 bg-indigo-50 p-3 rounded-lg text-center">
            🔑 Conclusion : privilégier WPA3 dès que le matériel le supporte. Si WPA2, appliquer correctifs et phrase de passe robuste.
          </div>
        `
      },
      { // slide 4 : sécurisation avancée (802.1X, RADIUS, isolation clients)
        type: "content",
        title: "🏢 Sécurisation professionnelle : 802.1X, RADIUS, isolation",
        content: `
          <div class="space-y-4">
            <div class="flex flex-wrap gap-3">
              <div class="flex-1 min-w-[200px] bg-gray-50 p-3 rounded-xl">
                <h4 class="font-bold text-indigo-700">📌 802.1X + RADIUS</h4>
                <p class="text-sm">Authentification individuelle par utilisateur/machine via un serveur RADIUS. Pas de clé partagée unique, chaque session est chiffrée individuellement. Idéal entreprises, universités.</p>
              </div>
              <div class="flex-1 min-w-[200px] bg-gray-50 p-3 rounded-xl">
                <h4 class="font-bold text-indigo-700">🛡️ Isolation des clients (Client Isolation)</h4>
                <p class="text-sm">Empêche les périphériques connectés au même SSID de communiquer entre eux. Essentiel dans les réseaux publics (hôtels, cafés) et pour IoT.</p>
              </div>
            </div>
            <div class="bg-gray-100 rounded-xl p-4">
              <p><span class="font-semibold">✅ Mesures supplémentaires :</span> désactiver WPS (Wi-Fi Protected Setup) – vulnérabilité connue ; filtrer les adresses MAC n'est pas une sécurité absolue mais peut s'ajouter en couche ; mettre à jour le firmware des points d'accès. Activer la surveillance des réseaux (IDS/IPS WiFi).</p>
              <div class="mt-3 bg-yellow-50 border-l-4 border-yellow-500 p-2 text-sm">💡 Pensez également à segmenter votre réseau IoT sur un VLAN séparé avec isolation.</div>
            </div>
          </div>
        `
      },
      { // slide 5 : récap / bonne pratiques checklist
        type: "content",
        title: "📋 Checklist sécurisation WiFi",
        content: `
          <div class="grid sm:grid-cols-2 gap-3">
            <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
              <div class="flex items-center gap-2 text-green-700"><span>✅</span><span class="font-medium">Éviter WEP / WPA1</span></div>
              <p class="text-xs text-gray-500">Passer à WPA2 ou mieux WPA3.</p>
            </div>
            <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
              <div class="flex items-center gap-2 text-green-700"><span>✅</span><span class="font-medium">Mot de passe robuste</span></div>
              <p class="text-xs text-gray-500">Minimum 12 caractères, lettres, chiffres, symboles.</p>
            </div>
            <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
              <div class="flex items-center gap-2 text-green-700"><span>✅</span><span class="font-medium">Désactiver WPS</span></div>
              <p class="text-xs text-gray-500">WPS PIN est une faille fréquente.</p>
            </div>
            <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
              <div class="flex items-center gap-2 text-green-700"><span>✅</span><span class="font-medium">Mettre à jour firmware routeur</span></div>
              <p class="text-xs text-gray-500">Corrections de vulnérabilités connues.</p>
            </div>
            <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
              <div class="flex items-center gap-2 text-green-700"><span>✅</span><span class="font-medium">Isoler les invités</span></div>
              <p class="text-xs text-gray-500">SSID séparé avec isolation client, bande passante limitée.</p>
            </div>
            <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
              <div class="flex items-center gap-2 text-green-700"><span>✅</span><span class="font-medium">Activer le chiffrement WPA3</span></div>
              <p class="text-xs text-gray-500">SAE + forward secrecy.</p>
            </div>
          </div>
          <div class="mt-4 text-center text-indigo-700 text-sm font-medium">📡 Petit rappel : un réseau WiFi sécurisé protège vos données personnelles et professionnelles.</div>
        `
      },
      { // slide 6 : quiz / interaction simple pour valider les acquis (type vrai/faux ou choix)
        type: "quiz",
        title: "🧠 Quiz éclair – Vérifions votre compréhension",
        questions: [
          { text: "Le protocole WEP reste encore sûr aujourd'hui si on utilise une longue clé ?", correct: false, explanation: "Non, WEP est intrinsèquement vulnérable quelle que soit la longueur de clé, cassable en quelques minutes." },
          { text: "WPA3 utilise SAE pour résister aux attaques par dictionnaire hors ligne.", correct: true, explanation: "Exact! SAE remplace le PSK classique et évite les attaques par force brute." },
          { text: "L'isolation des clients permet aux périphériques connectés de se voir mutuellement pour mieux collaborer.", correct: false, explanation: "Faux, l'isolation bloque justement les communications directes entre clients, idéal pour les hotspots." },
        ]
      }
    ];

    let currentSlide = 0;
    let totalSlides = slidesData.length;

    // Render dynamique des slides et gestion navigation
    function renderSlides() {
      const container = $("#slides-container");
      container.empty();
      $.each(slidesData, function(idx, slide) {
        let slideHtml = `<div class="slide slide-hidden card-slide p-5 md:p-8 mb-2" data-slide-index="${idx}">`;
        if (slide.type === "title") {
          slideHtml += `
            <div class="text-center">
              <div class="text-6xl mb-4">${slide.icon || "📡"}</div>
              <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800">${slide.title}</h1>
              <p class="text-gray-500 mt-3 text-lg">${slide.subtitle}</p>
              <div class="mt-8 border-t border-gray-200 pt-6 text-sm text-indigo-600 font-medium">Classe: Développement Web · Cybersécurité</div>
            </div>
          `;
        } 
        else if (slide.type === "objectives") {
          slideHtml += `
            <div>
              <h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-5">🎯 Objectifs d'apprentissage</h2>
              <ul class="space-y-3">
          `;
          $.each(slide.objectives, function(i, obj) {
            slideHtml += `<li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl"><span class="text-indigo-600 font-bold text-xl">✓</span><span class="text-gray-700">${obj}</span></li>`;
          });
          slideHtml += `</ul><div class="mt-6 text-sm text-gray-400 italic">À la fin de cette leçon, vous saurez sécuriser un réseau WiFi professionnel.</div></div>`;
        }
        else if (slide.type === "content") {
          slideHtml += `<div><h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${slide.title}</h2><div>${slide.content}</div></div>`;
        }
        else if (slide.type === "quiz") {
          // Générer un quiz interactif avec feedback et affichage des explications
          slideHtml += `<div><h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${slide.title}</h2>`;
          slideHtml += `<div id="quizArea" class="space-y-4">`;
          $.each(slide.questions, function(qIdx, q) {
            slideHtml += `
              <div class="bg-white border border-gray-200 rounded-xl p-4 quiz-item" data-qidx="${qIdx}" data-correct="${q.correct}">
                <p class="font-medium text-gray-800">${qIdx+1}. ${q.text}</p>
                <div class="flex gap-5 mt-2">
                  <button class="quiz-option btn-opt btn-true bg-green-100 hover:bg-green-200 px-4 py-1 rounded-full text-sm font-semibold" data-value="true">✅ Vrai</button>
                  <button class="quiz-option btn-opt btn-false bg-red-100 hover:bg-red-200 px-4 py-1 rounded-full text-sm font-semibold" data-value="false">❌ Faux</button>
                </div>
                <div class="quiz-feedback text-sm mt-2 hidden"></div>
              </div>
            `;
          });
          slideHtml += `</div><div class="mt-4 text-center"><button id="resetQuiz" class="text-sm bg-gray-200 px-4 py-2 rounded-full">🔄 Réinitialiser les réponses</button></div></div>`;
        }
        slideHtml += `</div>`;
        container.append(slideHtml);
      });
      
      // attacher events pour le quiz après render
      attachQuizEvents();
      updateSlideVisibility();
      updateNavigationButtons();
      updateProgress();
    }

    function attachQuizEvents() {
      // On délègue les événements pour les boutons des quiz
      $(document).off('click', '.quiz-option').on('click', '.quiz-option', function(e) {
        const parentDiv = $(this).closest('.quiz-item');
        const isCorrect = parentDiv.data('correct') === true;
        const selectedValue = $(this).data('value'); // 'true' ou 'false'
        const userCorrect = (selectedValue === 'true' && isCorrect) || (selectedValue === 'false' && !isCorrect);
        const feedbackDiv = parentDiv.find('.quiz-feedback');
        const explanation = parentDiv.closest('.slide').find('.quiz-item').data('explanation'); // On va stocker l'explication depuis les données
        // On récupère l'explication propre depuis slidesData
        const idx = parentDiv.data('qidx');
        const currentSlideObj = slidesData[currentSlide];
        if(currentSlideObj && currentSlideObj.questions && currentSlideObj.questions[idx]) {
          const expl = currentSlideObj.questions[idx].explanation;
          if(userCorrect) {
            feedbackDiv.html(`<span class="text-green-600">✔ Bonne réponse ! ${expl}</span>`);
            parentDiv.addClass('bg-green-50').removeClass('bg-red-50');
          } else {
            feedbackDiv.html(`<span class="text-red-600">✘ Mauvaise réponse. ${expl}</span>`);
            parentDiv.addClass('bg-red-50').removeClass('bg-green-50');
          }
        } else {
          feedbackDiv.html(userCorrect ? "✅ Correct" : "❌ Incorrect");
        }
        feedbackDiv.removeClass('hidden');
        // Désactiver les deux boutons après réponse pour éviter de changer
        parentDiv.find('.quiz-option').prop('disabled', true).addClass('opacity-50');
      });
      
      $(document).off('click', '#resetQuiz').on('click', '#resetQuiz', function() {
        $('.quiz-item').each(function() {
          $(this).find('.quiz-option').prop('disabled', false).removeClass('opacity-50');
          $(this).find('.quiz-feedback').addClass('hidden').empty();
          $(this).removeClass('bg-green-50 bg-red-50');
        });
      });
    }

    function updateSlideVisibility() {
      $('.slide').each(function(idx) {
        if(idx === currentSlide) {
          $(this).removeClass('slide-hidden').show();
        } else {
          $(this).addClass('slide-hidden').hide();
        }
      });
      $('#currentSlideIdx').text(currentSlide + 1);
      $('#totalSlidesCount').text(totalSlides);
      updateProgress();
    }

    function updateProgress() {
      const percent = ((currentSlide + 1) / totalSlides) * 100;
      $('#progressBar').css('width', `${percent}%`);
    }

    function updateNavigationButtons() {
      $('#prevSlide').prop('disabled', currentSlide === 0);
      $('#nextSlide').prop('disabled', currentSlide === totalSlides - 1);
    }

    function goNext() {
      if(currentSlide < totalSlides - 1) {
        currentSlide++;
        updateSlideVisibility();
        updateNavigationButtons();
        // Scroll en haut pour meilleure UX
        $('html, body').animate({ scrollTop: 0 }, 200);
        // re-attacher events quiz si besoin (mais déjà via délégation, mais réinitialiser style quiz)
        // Pour forcer rafraîchissement quand on revient sur quiz, rien de spécial
        if(slidesData[currentSlide]?.type === 'quiz') {
          // on réinitialise l'affichage des réponses si jamais l'utilisateur revient ? mais mieux garder réponses en mémoire? on ne change rien.
        }
      }
    }

    function goPrev() {
      if(currentSlide > 0) {
        currentSlide--;
        updateSlideVisibility();
        updateNavigationButtons();
        $('html, body').animate({ scrollTop: 0 }, 200);
      }
    }

    // Expose actions
    window.goNext = goNext;
    window.goPrev = goPrev;

    // Initial render
    renderSlides();

    // Attach navigation
    $('#nextSlide').on('click', goNext);
    $('#prevSlide').on('click', goPrev);
    // Keyboard nav
    $(document).keydown(function(e) {
      if (e.key === 'ArrowRight') {
        goNext();
      } else if (e.key === 'ArrowLeft') {
        goPrev();
      }
    });
  </script>
</body>
</html>
