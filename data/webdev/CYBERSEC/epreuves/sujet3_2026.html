<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à la Cybersécurité",
  "classe": "Développement Web",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Analyse de risque et classification des actifs",
      "points": "6 pts",
      "enonce": "<p>Une start-up camerounaise, <strong>« SecurePay »</strong>, développe une application mobile de paiement. Elle souhaite que vous analysiez la sécurité de son infrastructure.</p><p>L'infrastructure est composée de :</p><ul><li>Un site web vitrine (hébergé chez un fournisseur cloud).</li><li>Une API REST (authentification par JWT).</li><li>Une base de données PostgreSQL (stocke les données clients et les transactions).</li><li>L'application mobile (Android et iOS).</li></ul><p>L'application traite des données sensibles : <strong>noms, numéros de téléphone, coordonnées bancaires et historique des transactions.</strong></p>",
      "questions": [
        {
          "question": "1) Identifiez les <strong>actifs</strong> de cette infrastructure et classez-les par <strong>criticité</strong> (Critique, Important, Secondaire). Justifiez votre classification en quelques mots.",
          "reponse": "<p><strong>Actifs identifiés et classification</strong> :</p><ul><li><strong>Critiques</strong> : Base de données PostgreSQL (données financières et personnelles), API REST (accès aux données sensibles).</li><li><strong>Importants</strong> : Application mobile (interface utilisateur), site web vitrine, serveur hébergeant l'API.</li><li><strong>Secondaires</strong> : Environnement de développement et de test.</li></ul><p><strong>Justification</strong> : La base de données contient les informations les plus sensibles (coordonnées bancaires). L'API est la porte d'entrée vers ces données. L'application et le site sont importants pour l'activité mais moins critiques.</p>"
        },
        {
          "question": "2) Pour chaque actif identifié, listez <strong>deux menaces potentielles</strong> et <strong>deux vulnérabilités</strong> possibles.",
          "reponse": "<p><strong>Base de données</strong> :</p><ul><li>Menaces : Injection SQL, ransomware.</li><li>Vulnérabilités : Absence de chiffrement au repos, mot de passe administrateur faible.</li></ul><p><strong>API REST</strong> :</p><ul><li>Menaces : Attaque par force brute, vol de clés JWT.</li><li>Vulnérabilités : Absence de rate limiting, logs insuffisants.</li></ul><p><strong>Application mobile</strong> :</p><ul><li>Menaces : Ingénierie sociale, malware.</li><li>Vulnérabilités : Stockage local non chiffré, certificats SSL non vérifiés.</li></ul><p><strong>Site web vitrine</strong> :</p><ul><li>Menaces : DDoS, injection XSS.</li><li>Vulnérabilités : Formulaire de contact non protégé, absence de CSP.</li></ul>"
        }
      ]
    },
    {
      "titre": "Mise en place d'une architecture sécurisée",
      "points": "8 pts",
      "enonce": "<p>Pour l'application « SecurePay », vous devez proposer une <strong>architecture sécurisée</strong> en vous basant sur les concepts de cybersécurité vus en cours (<strong>chapitres 1 à 7</strong>).</p><p>Votre proposition doit couvrir les aspects suivants :</p><ul><li><strong>Réseau et infrastructure</strong> : Pare-feu, DMZ, segmentation.</li><li><strong>Authentification et autorisation</strong> : MFA, RBAC, gestion des identités.</li><li><strong>Protection des données</strong> : Chiffrement au repos et en transit, sauvegardes.</li><li><strong>Sécurité applicative</strong> : Validation des entrées, protection contre les injections, JWT sécurisé.</li><li><strong>Surveillance et réponse</strong> : Logs, IDS/IPS, plan de réponse aux incidents.</li></ul>",
      "questions": [
        {
          "question": "1) Décrivez l'architecture sécurisée que vous proposez pour <strong>« SecurePay »</strong> en détaillant les mesures prises pour chaque point mentionné ci-dessus.",
          "reponse": "<p><strong>Architecture sécurisée proposée</strong> :</p><ul><li><strong>Réseau</strong> : Placement de l'API et du site web dans une <strong>DMZ</strong> (zone démilitarisée). La base de données est dans un réseau interne non accessible directement depuis Internet. Utilisation de <strong>VLAN</strong> pour isoler les environnements (prod, test, dev). Pare-feu avec <strong>stateful inspection</strong> pour filtrer le trafic [citation:9].</li><li><strong>Authentification</strong> : Mise en place de la <strong>double authentification</strong> (2FA) via TOTP. Utilisation de <strong>JWT</strong> avec une durée de vie limitée (expiration) et signature avec une clé forte.</li><li><strong>Protection des données</strong> : Chiffrement de la base de données au repos (TDE) et des sauvegardes. Utilisation de <strong>TLS</strong> pour toutes les communications (HTTPS pour l'API et le site). Mise en œuvre de la règle de sauvegarde <strong>3-2-1</strong>.</li><li><strong>Sécurité applicative</strong> : Validation stricte de toutes les entrées utilisateur. Utilisation de requêtes paramétrées pour éviter les injections SQL. Mise en place d'un <strong>rate limiting</strong> sur l'API.</li><li><strong>Surveillance</strong> : Activation des logs d'accès et d'erreur. Mise en place d'un <strong>IDS/IPS</strong> pour détecter les comportements suspects. Élaboration d'un <strong>plan de réponse aux incidents</strong>.</li></ul>"
        },
        {
          "question": "2) Pourquoi la mise en place d'un <strong>rate limiting</strong> et d'un <strong>pare-feu applicatif (WAF)</strong> est-elle cruciale pour l'API de <strong>« SecurePay »</strong> ? Donnez deux raisons pour chaque mesure.",
          "reponse": "<p><strong>Rate limiting</strong> :</p><ul><li>Protège contre les <strong>attaques par force brute</strong> sur l'authentification.</li><li>Prévient les <strong>attaques DDoS</strong> qui visent à saturer le serveur.</li></ul><p><strong>Pare-feu applicatif (WAF)</strong> :</p><ul><li>Filtre les <strong>requêtes malveillantes</strong> avant qu'elles n'atteignent l'API (ex: injections SQL, XSS).</li><li>Protège contre les <strong>vulnérabilités zero-day</strong> en détectant des schémas d'attaque connus.</li></ul>"
        }
      ]
    },
    {
      "titre": "Étude de cas : Injection SQL",
      "points": "6 pts",
      "enonce": "<p>Un développeur de <strong>« SecurePay »</strong> a écrit le code PHP suivant pour interroger la base de données :</p><div class='code-block'><pre>$id = $_GET['id'];<br>$query = \"SELECT * FROM users WHERE id = $id\";<br>$result = mysqli_query($connection, $query);</pre></div><p>Cette requête est vulnérable à une <strong>injection SQL</strong>.</p>",
      "questions": [
        {
          "question": "1) Expliquez ce qu'est une <strong>attaque par injection SQL</strong> et comment elle pourrait être exploitée dans ce code. Donnez un exemple d'entrée malveillante qui pourrait compromettre la base de données.",
          "reponse": "<p>L'<strong>injection SQL</strong> est une technique d'attaque qui consiste à insérer du code SQL malveillant dans une requête via une entrée utilisateur non sécurisée. Ici, l'attaquant pourrait modifier l'URL pour exécuter ses propres commandes SQL.</p><p><strong>Exemple d'attaque</strong> : En saisissant <code>1 OR 1=1</code> dans le paramètre <code>id</code>, la requête devient <code>SELECT * FROM users WHERE id = 1 OR 1=1</code>, renvoyant ainsi <strong>tous les utilisateurs</strong>. En utilisant <code>1; DROP TABLE users; --</code>, l'attaquant pourrait <strong>supprimer la table des utilisateurs</strong>.</p>"
        },
        {
          "question": "2) Proposez <strong>deux méthodes</strong> pour corriger cette vulnérabilité en PHP, en expliquant brièvement leur fonctionnement.",
          "reponse": "<p><strong>Méthode 1 : Requêtes préparées (paramétrées)</strong></p><div class='code-block'><pre>$stmt = $connection->prepare('SELECT * FROM users WHERE id = ?');<br>$stmt->bind_param('i', $id);<br>$stmt->execute();</pre></div><p>Le paramètre est <strong>échappé automatiquement</strong> par le moteur de base de données, rendant l'injection impossible.</p><p><strong>Méthode 2 : Échappement des entrées</strong></p><div class='code-block'><pre>$id = mysqli_real_escape_string($connection, $_GET['id']);<br>$query = \"SELECT * FROM users WHERE id = '$id'\";</pre></div><p>Les caractères spéciaux (comme les guillemets) sont <strong>échappés</strong> avant d'être intégrés à la requête. Cette méthode est <strong>moins sûre</strong> que les requêtes préparées.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
