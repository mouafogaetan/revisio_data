<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->

    crossorigin="anonymous">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
    "matiere": "Initiation à la Cybersécurité",
    "classe": "Développement Web",
    "sequence": "Séquence 5",
    "anneeScolaire": "2025-2026",
    "exercices": [
        {
            "titre": "Évaluation des Connaissances : RGPD et Protection des Données",
            "points": "8 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Lisez attentivement les questions suivantes et répondez-y de manière claire et précise. Cette évaluation porte sur le Règlement Général sur la Protection des Données (RGPD) et les bonnes pratiques associées, conformément au programme de la leçon 35.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Définissez la cybersécurité en vous basant sur le modèle de la confidentialité, de l'intégrité et de la disponibilité (CID). Illustrez chaque concept par un exemple concret tiré du contexte camerounais.</p>",
                    "reponse": "<p><strong>Réponse :</strong> La cybersécurité est l'ensemble des pratiques, technologies et processus conçus pour protéger les systèmes, les réseaux et les données contre les attaques, les dommages ou les accès non autorisés. Elle repose sur trois piliers fondamentaux :</p><ul><li><strong>Confidentialité :</strong> Garantir que seules les personnes autorisées ont accès à l'information. <em>Exemple au Cameroun :</em> Les données médicales des patients dans un hôpital de Yaoundé doivent être protégées par un contrôle d'accès strict pour que seuls les médecins traitants puissent les consulter.</li><li><strong>Intégrité :</strong> Assurer que les données sont exactes et n'ont pas été altérées de manière non autorisée. <em>Exemple au Cameroun :</em> Les relevés bancaires d'une banque comme Afriland First Bank doivent être protégés contre toute modification frauduleuse.</li><li><strong>Disponibilité :</strong> Garantir que les systèmes et les données sont accessibles et utilisables à la demande par les utilisateurs autorisés. <em>Exemple au Cameroun :</em> Le système de paiement mobile d'Orange Money doit être disponible en tout temps pour éviter des pertes économiques majeures.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Quels sont les quatre (04) principaux droits des personnes physiques garantis par le RGPD ? Expliquez brièvement chacun d'eux en une phrase.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Le RGPD garantit plusieurs droits fondamentaux aux citoyens :</p><ul><li><strong>Droit d'accès :</strong> Une personne peut obtenir la confirmation que ses données sont traitées et y accéder.</li><li><strong>Droit de rectification :</strong> Une personne peut faire corriger des données inexactes ou incomplètes.</li><li><strong>Droit à l'effacement (droit à l'oubli) :</strong> Une personne peut demander la suppression de ses données dans certaines conditions.</li><li><strong>Droit à la portabilité :</strong> Une personne peut recevoir ses données et les transmettre à un autre responsable de traitement.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>3) Décrivez deux (02) obligations majeures imposées par le RGPD aux entreprises ou organisations qui traitent des données personnelles.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Les entreprises ont plusieurs obligations clés :</p><ul><li><strong>Notification de violation de données :</strong> L'organisation doit informer l'autorité de contrôle (comme la CNIL en France) dans un délai de 72 heures après avoir pris connaissance d'une violation de données, et en informer également les personnes concernées si le risque est élevé.</li><li><strong>Désignation d'un Délégué à la Protection des Données (DPO) :</strong> Dans certains cas, l'organisation doit nommer un expert indépendant chargé de superviser la conformité au RGPD et de servir d'interlocuteur avec les autorités de contrôle.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>4) Expliquez en quoi consiste l'analyse d'impact relative à la protection des données (DPIA) et dans quels cas elle est obligatoire.</p>",
                    "reponse": "<p><strong>Réponse :</strong> La DPIA est une étude de risque qui doit être réalisée avant tout traitement de données susceptible d'engendrer un risque élevé pour les droits et libertés des personnes. Elle permet d'identifier, d'évaluer et de réduire les risques potentiels pour les données personnelles. Elle est obligatoire, par exemple, pour les traitements impliquant une évaluation systématique des personnes (comme le profilage), des traitements de données sensibles à grande échelle, ou une surveillance des zones accessibles au public.</p>"
                },
                {
                    "question": "<p style='font-weight: bold;'>5) En quoi consiste le principe de 'Privacy by Design' et pourquoi est-il crucial pour un développeur web ?</p>",
                    "reponse": "<p><strong>Réponse :</strong> Le principe de <em>Privacy by Design</em> (ou protection des données dès la conception) signifie que la protection des données doit être intégrée dans le développement du système dès le début, et non pas ajoutée en fin de projet comme une couche supplémentaire. Pour un développeur web, cela implique de :</p><ul><li>Ne collecter que les données strictement nécessaires à l'application (minimisation).</li><li>Chiffrer les données, que ce soit au repos ou en transit (comme avec HTTPS).</li><li>Permettre aux utilisateurs d'exercer leurs droits (accès, effacement).</li><li>Mettre en place des mécanismes de sécurité robustes dès le départ, ce qui permet d'éviter des problèmes de conformité coûteux par la suite.</li></ul>"
                }
            ]
        },
        {
            "titre": "Analyse de Cas et Mise en Situation",
            "points": "4 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Lisez l'étude de cas suivante et répondez aux questions. Utilisez vos connaissances sur les réglementations et les bonnes pratiques pour analyser la situation.</p>",
            "questions": [
                {
                    "question": "<p><strong>Étude de Cas :</strong> Une start-up camerounaise, 'SanteConnect', développe une application mobile permettant aux patients de consulter leurs résultats d'analyses médicales en ligne. L'application n'est pas encore conforme au RGPD. Le fondateur, un jeune entrepreneur, souhaite s'attaquer à la question mais se sent dépassé.</p><p style='font-weight: bold;'>a) (2 pts) Quels sont les principaux risques de non-conformité pour SanteConnect ?</p>",
                    "reponse": "<p><strong>Réponse :</strong> Les risques sont multiples :</p><ul><li><strong>Sanctions financières :</strong> L'entreprise s'expose à des amendes pouvant atteindre jusqu'à 4% de son chiffre d'affaires mondial ou 20 millions d'euros, ce qui pourrait la mettre en faillite.</li><li><strong>Dommage réputationnel :</strong> Une fuite de données médicales pourrait gravement nuire à sa crédibilité et à la confiance de ses utilisateurs.</li><li><strong>Perte de clients :</strong> Les patients pourraient hésiter à utiliser une application qui ne protège pas leurs données sensibles.</li><li><strong>Problèmes juridiques :</strong> L'entreprise pourrait faire l'objet de poursuites judiciaires de la part des patients concernés.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>b) (2 pts) Proposez un plan d'action en trois (03) étapes pour aider SanteConnect à se mettre en conformité avec le RGPD.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Plan d'action en trois étapes pour SanteConnect :</p><ol><li><strong>Audit et Cartographie (Étape 1) :</strong> Identifier et inventorier toutes les données personnelles collectées, comprendre comment elles sont stockées, où elles transitent, et qui y a accès.</li><li><strong>Mise en place d'un cadre juridique et de sécurisation (Étape 2) :</strong> Rédiger une politique de confidentialité claire, mettre en place un système de gestion des consentements des utilisateurs, et appliquer des mesures techniques (comme le chiffrement des données médicales) pour garantir la sécurité des informations.</li><li><strong>Nomination d'un responsable et plan de réponse (Étape 3) :</strong> Désigner un Délégué à la Protection des Données (DPO) pour piloter la stratégie de conformité, et élaborer un plan de notification en cas de violation de données (pour respecter le délai de 72 heures).</li></ol>"
                }
            ]
        },
        {
            "titre": "Questions Théoriques sur la Gestion des Risques",
            "points": "4 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Répondez aux questions suivantes pour démontrer votre compréhension des concepts clés de la gestion des risques dans le contexte de la cybersécurité.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Distinguez clairement les notions de 'menace', 'vulnérabilité' et 'risque' en cybersécurité en utilisant un exemple concret, comme celui d'une entreprise de télécommunications camerounaise.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Ces notions sont fondamentales pour comprendre la sécurité :</p><ul><li><strong>Menace :</strong> C'est un événement ou une action qui peut causer un préjudice. <em>Exemple :</em> Un groupe de hackers (APT) ciblant les infrastructures de télécommunications.</li><li><strong>Vulnérabilité :</strong> C'est une faiblesse dans un système qui peut être exploitée par une menace. <em>Exemple :</em> Un serveur de base de données d'Orange Cameroun qui n'a pas reçu le dernier correctif de sécurité.</li><li><strong>Risque :</strong> C'est la probabilité qu'une menace exploite une vulnérabilité et l'impact que cela aurait. <em>Exemple :</em> Le risque qu'un hacker exploite la faille de sécurité du serveur pour voler des données de clients, entraînant une perte de confiance et des amendes.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Décrivez brièvement le processus de gestion des risques (analyse, mitigation, acceptation) et donnez un exemple pour chaque étape.</p>",
                    "reponse": "<p><strong>Réponse :</strong> La gestion des risques est un processus itératif :</p><ul><li><strong>Analyse :</strong> Étape d'identification et d'évaluation des risques. <em>Exemple :</em> L'organisation analyse les menaces potentielles qui pèsent sur les données de ses clients.</li><li><strong>Atténuation (ou Mitigation) :</strong> Mise en place de mesures pour réduire le risque à un niveau acceptable. <em>Exemple :</em> L'organisation déploie un pare-feu et une solution anti-DDoS pour se protéger contre les attaques.</li><li><strong>Acceptation :</strong> Décision de prendre le risque restant après l'atténuation, car le coût des contre-mesures supplémentaires serait supérieur au coût potentiel de l'incident. <em>Exemple :</em> L'entreprise accepte un risque résiduel pour un service peu critique, car le coût des mesures de sécurité serait trop élevé par rapport à l'impact potentiel.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>3) Expliquez ce qu'est une politique de sécurité de l'information (SMSI) et pourquoi elle est un outil essentiel pour la gouvernance de la sécurité.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Un Système de Management de la Sécurité de l'Information (SMSI), comme celui défini par la norme ISO 27001, est un cadre structuré de politiques et de procédures qui vise à gérer et protéger les actifs informationnels d'une organisation. Il est essentiel car :</p><ul><li>Il permet de définir clairement les responsabilités et les engagements de l'organisation en matière de sécurité.</li><li>Il permet de mettre en place une démarche d'amélioration continue.</li><li>Il offre une approche structurée pour l'évaluation et le traitement des risques.</li><li>Il sert de base à la certification, qui est un gage de confiance et un avantage concurrentiel.</li></ul>"
                }
            ]
        }
    ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
