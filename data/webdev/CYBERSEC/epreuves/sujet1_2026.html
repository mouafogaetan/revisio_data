<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à la Cybersécurité",
  "classe": "Développement Web",
  "sequence": "Évaluation Séquentielle 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de Cours",
      "points": "7 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Répondez de manière claire et précise aux questions suivantes, en vous appuyant sur les notions fondamentales de la cybersécurité vues en cours. Ces questions portent sur la définition de la cybersécurité, la triade CIA, et les concepts de menace et de vulnérabilité.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1) Définir la cybersécurité et son périmètre.</strong></p><p>a) Donnez une définition complète de la cybersécurité, en détaillant les trois piliers (systèmes, réseaux, données) qu'elle vise à protéger.</p><p>b) Expliquez pourquoi la cybersécurité est un enjeu majeur pour les entreprises camerounaises aujourd'hui.</p></div>",
          "reponse": "<div><p>a) La cybersécurité est l'ensemble des moyens techniques, organisationnels et humains visant à protéger les systèmes d'information (matériels, logiciels), les réseaux de communication, et les données contre les cyberattaques, les accès non autorisés ou les dommages. Elle englobe la protection de la confidentialité, de l'intégrité et de la disponibilité des données.</p><p>b) Pour les entreprises au Cameroun, la cybersécurité est cruciale en raison de la digitalisation croissante de l'économie, des risques de fraude financière, de la protection des données clients, et de l'importance de maintenir la confiance dans un contexte de développement du commerce électronique et des services en ligne.</p></div>"
        },
        {
          "question": "<div><p><strong>2) La triade CIA (Confidentialité, Intégrité, Disponibilité).</strong></p><p>a) Expliquez ce que signifie chaque pilier de la triade CIA. Donnez un exemple concret pour chacun d'entre eux dans le contexte d'une application web.</p><p>b) Citez deux risques qui pourraient menacer la disponibilité d'un service web.</p></div>",
          "reponse": "<div><p>a) La triade CIA est le modèle de base de la sécurité de l'information :</p><ul><li><strong>Confidentialité</strong> : Garantir que seules les personnes autorisées peuvent accéder aux données. Exemple : seuls les utilisateurs connectés peuvent voir leur profil sur un site e-commerce.</li><li><strong>Intégrité</strong> : Assurer que les données ne sont pas altérées de manière non autorisée. Exemple : le montant d'une commande ne peut pas être modifié par un utilisateur malveillant.</li><li><strong>Disponibilité</strong> : Garantir que les données et services sont accessibles lorsque nécessaire. Exemple : le site web d'une banque doit être disponible 24h/24, 7j/7.</li></ul><p>b) Deux risques pouvant menacer la disponibilité : une attaque par déni de service distribué (DDoS) et une panne matérielle (serveur, disque dur).</p></div>"
        },
        {
          "question": "<div><p><strong>3) Menace, vulnérabilité et risque.</strong></p><p>a) Distinguez clairement les notions de <strong>menace</strong>, de <strong>vulnérabilité</strong> et de <strong>risque</strong> en cybersécurité.</p><p>b) Donnez un exemple illustrant ces trois notions dans le cadre d'une application web qui utilise une base de données.</p></div>",
          "reponse": "<div><p>a) On distingue :</p><ul><li><strong>Menace</strong> : Tout ce qui peut causer un dommage (ex: un attaquant, un virus).</li><li><strong>Vulnérabilité</strong> : Une faiblesse qui peut être exploitée par une menace (ex: une faille de sécurité dans un logiciel).</li><li><strong>Risque</strong> : La probabilité qu'une menace exploite une vulnérabilité et l'impact potentiel. Il se calcule comme (Menace x Vulnérabilité) x Impact.</li></ul><p>b) Exemple concret :</p><ul><li><strong>Menace</strong> : Un attaquant qui tente d'injecter du code SQL malveillant dans une requête.</li><li><strong>Vulnérabilité</strong> : L'application web ne nettoie pas correctement les entrées utilisateur avant de les intégrer à une requête SQL.</li><li><strong>Risque</strong> : Si l'attaquant réussit son injection, il peut accéder à la base de données et voler des informations sensibles.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Mise en Situation",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Vous êtes chargé(e) de la sécurité d'une petite entreprise de e-commerce au Cameroun. L'entreprise stocke des informations clients (noms, adresses, numéros de téléphone) et des données de paiement.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1) Analyse des risques.</strong></p><p>a) Identifiez trois (3) menaces potentielles pour cette entreprise.</p><p>b) Pour chaque menace, décrivez la vulnérabilité qu'elle pourrait exploiter et évaluez le risque pour l'entreprise (Ex : Menace: Phishing, Vulnérabilité: Employés peu formés, Risque: Fuite de données).</p><p>c) Proposez une mesure de mitigation pour chaque risque identifié.</p></div>",
          "reponse": "<div><p><strong>a) & b) Menaces, vulnérabilités et risques :</strong></p><ol><li><strong>Menace :</strong> Attaque par injection SQL.<br><strong>Vulnérabilité :</strong> Mauvaise validation des entrées utilisateur sur le site e-commerce.<br><strong>Risque :</strong> Vol de la base de données clients et des données de paiement.</li><li><strong>Menace :</strong> Attaque par logiciel malveillant (ransomware).<br><strong>Vulnérabilité :</strong> Absence d'antivirus et de mises à jour régulières sur les postes de travail.<br><strong>Risque :</strong> Perte d'accès aux données, interruption d'activité, demande de rançon.</li><li><strong>Menace :</strong> Attaque par hameçonnage (phishing) ciblant un employé.<br><strong>Vulnérabilité :</strong> Manque de formation des employés à la sécurité.<br><strong>Risque :</strong> Récupération de mots de passe, accès non autorisé aux comptes de l'entreprise.</li></ol><p><strong>c) Mesures de mitigation :</strong></p><ul><li>Injections SQL : Utiliser des requêtes préparées et valider toutes les entrées utilisateur [citation:7].</li><li>Ransomware : Installer un antivirus, effectuer des sauvegardes régulières et mettre à jour les systèmes.</li><li>Phishing : Former les employés à reconnaître les emails suspects et mettre en place une authentification à deux facteurs (2FA).</li></ul></div>"
        },
        {
          "question": "<div><p><strong>2) Mise en place de la triade CIA.</strong></p><p>Pour chaque pilier de la triade (Confidentialité, Intégrité, Disponibilité), proposez une mesure concrète que l'entreprise pourrait mettre en place pour renforcer la sécurité du site e-commerce. Justifiez brièvement chaque proposition.</p></div>",
          "reponse": "<div><ul><li><strong>Confidentialité :</strong> Mettre en place le chiffrement des données personnelles dans la base de données (ex: chiffrement des numéros de téléphone et adresses). Cela garantit que même si un attaquant accède à la base de données, les données restent illisibles.</li><li><strong>Intégrité :</strong> Utiliser des certificats SSL/TLS pour sécuriser toutes les communications entre le navigateur des clients et le serveur. Cela empêche l'altération des données en transit [citation:7].</li><li><strong>Disponibilité :</strong> Mettre en place une solution de sauvegarde régulière des données (sauvegardes automatiques) et un plan de reprise d'activité pour pouvoir restaurer rapidement le site en cas d'incident.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les Acteurs de la Cybersécurité",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>L'écosystème de la cybersécurité est composé de différents acteurs ayant des rôles et des objectifs distincts.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1) Types d'attaquants.</strong></p><p>a) Expliquez ce qu'est un <strong>Script Kiddie</strong> et un <strong>hacker (ou APT)</strong>.</p><p>b) Quelle est la principale différence entre un hacker éthique (ou pentesteur) et un attaquant malveillant ?</p></div>",
          "reponse": "<div><p>a) Un <strong>Script Kiddie</strong> est un attaquant amateur qui utilise des outils et scripts existants sans comprendre leur fonctionnement. Il cherche généralement la notoriété. Un <strong>hacker ou APT (Advanced Persistent Threat)</strong> est un attaquant avancé, souvent soutenu par un État, qui mène des attaques ciblées et sophistiquées sur de longues périodes avec des objectifs précis (espionnage, sabotage).</p><p>b) La principale différence est l'autorisation et l'objectif. Le hacker éthique (ou pentesteur) agit avec l'autorisation de l'organisation cible pour identifier des vulnérabilités et améliorer la sécurité, sans causer de dommages. L'attaquant malveillant agit sans autorisation pour voler, détruire ou nuire [citation:1].</p></div>"
        },
        {
          "question": "<div><p><strong>2) Rôle des régulateurs.</strong></p><p>Citez un organisme de régulation ou une norme internationale en cybersécurité et expliquez brièvement son rôle.</p></div>",
          "reponse": "<div><p><strong>L'ANSSI (Agence Nationale de la Sécurité des Systèmes d'Information)</strong> en France est l'autorité nationale en matière de cybersécurité. Son rôle est de définir des normes, de certifier des produits et services, et de coordonner la réponse aux incidents majeurs.</p><p><strong>ISO/IEC 27001</strong> est une norme internationale qui spécifie les exigences pour établir, mettre en œuvre, maintenir et améliorer un Système de Management de la Sécurité de l'Information (SMSI). Elle aide les organisations à gérer la sécurité de leurs actifs informationnels [citation:7].</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Gestion des Risques",
      "points": "3 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>L'analyse et la gestion des risques sont au cœur de la stratégie de cybersécurité d'une organisation.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1) Analyse des risques.</strong></p><p>Décrivez les quatre (4) étapes principales d'une gestion des risques efficace selon la méthode présentée en cours.</p></div>",
          "reponse": "<div><p>Les quatre étapes principales sont :</p><ol><li><strong>Identification des risques :</strong> Recenser les actifs, les menaces et les vulnérabilités [citation:1].</li><li><strong>Analyse des risques :</strong> Évaluer la probabilité et l'impact potentiel de chaque risque (analyse qualitative ou quantitative) [citation:7].</li><li><strong>Traitement des risques :</strong> Décider de la stratégie à adopter : atténuer (réduire), transférer (assurance), accepter (tolérer) ou éviter (éliminer).</li><li><strong>Suivi et revue :</strong> Surveiller l'efficacité des mesures de sécurité et mettre à jour l'analyse des risques régulièrement.</li></ol></div>"
        },
        {
          "question": "<div><p><strong>2) Exemple de traitement des risques.</strong></p><p>Si l'entreprise e-commerce identifie un risque élevé d'attaque DDoS, quelles options de traitement des risques sont envisageables ?</p></div>",
          "reponse": "<div><p>Pour un risque élevé d'attaque DDoS, l'entreprise peut envisager :</p><ul><li><strong>Atténuer (Mitigation) :</strong> Utiliser un service de protection anti-DDoS (ex: Cloudflare) pour filtrer le trafic malveillant.</li><li><strong>Transférer :</strong> Souscrire une assurance cyber qui couvre les pertes liées à une indisponibilité.</li><li><strong>Accepter :</strong> Prendre le risque si l'entreprise estime que l'impact est limité, mais cela est rare pour une activité e-commerce.</li><li><strong>Éviter :</strong> Délocaliser le site sur une infrastructure plus robuste et résiliente, ce qui est souvent la solution à long terme.</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
