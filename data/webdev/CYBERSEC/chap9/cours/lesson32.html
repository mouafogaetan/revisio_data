<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours: Techniques d'attaque éthique | Cybersécurité</title>
    <!-- Tailwind CSS + Font Awesome (pour icônes utiles) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, ici discret) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Personnalisation légère pour le confort de lecture et transitions douces */
        body {
            background: #f8fafc;
        }
        .slide-container {
            transition: all 0.2s ease;
        }
        /* styles pour les boutons de navigation et rendre les slides agréables */
        .nav-btn {
            transition: background 0.2s, transform 0.1s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* rendre les scrolls smooth sur mobile */
        html {
            scroll-behavior: smooth;
        }
        /* personnalisation des puces et cards */
        .objective-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .objective-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal du diaporama -->
        <div id="slides-wrapper" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            
            <!-- Slides dynamiques injectés via jQuery -->
            <div id="slides-area" class="slide-container relative">
                <!-- Les slides seront générées ici -->
            </div>

            <!-- indicateur de progression et boutons de navigation -->
            <div class="bg-gray-50 px-5 py-4 border-t border-gray-200 flex flex-wrap items-center justify-between gap-3">
                <div class="text-sm text-gray-500 font-medium" id="slide-counter">
                    Slide 1 / 1
                </div>
                <div class="flex gap-3">
                    <button id="prev-slide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-2 px-5 rounded-xl shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed">
                        ← Précédent
                    </button>
                    <button id="next-slide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl shadow-md transition">
                        Suivant →
                    </button>
                </div>
            </div>
        </div>

        <!-- petite note discrète -->
        <p class="text-center text-xs text-gray-400 mt-6">Cours d'initiation à la cybersécurité – Techniques d'attaque éthique (Pentesting légal)</p>
    </div>

    <script>
        $(document).ready(function() {

            // ------------------------------
            // Contenu des slides pour la leçon 32 : "Comprendre les techniques d'attaque éthique"
            // D'après les objectifs: boîte noire/grise/blanche, phases (reconnaissance, scanning, exploitation, post-exploitation, reporting), cadre légal.
            // Création de 5 slides structurés : titre + objectifs + contenu détaillé.
            // ------------------------------
            
            const slidesData = [
                {
                    type: "title",
                    title: "🧠 Techniques d'attaque éthique",
                    subtitle: "Comprendre le pentesting et les méthodes autorisées",
                    emoji: "🛡️",
                    bgDecor: "bg-gradient-to-br from-indigo-50 to-slate-100"
                },
                {
                    type: "objectifs",
                    title: "🎯 Objectifs d'apprentissage",
                    objectives: [
                        "Distinguer boîte noire, grise et blanche (niveaux de connaissance de la cible)",
                        "Comprendre les phases d'une attaque éthique : reconnaissance, scanning, exploitation, post-exploitation, reporting",
                        "Respecter le cadre légal (autorisation, périmètre, règles d'engagement)"
                    ]
                },
                {
                    type: "content",
                    title: "🔍 Types de tests d'intrusion",
                    contentSections: [
                        {
                            heading: "Boîte noire (Black Box)",
                            text: "L'attaquant éthique ne dispose d'aucune information préalable sur le système cible. Simulation réaliste d'un attaquant externe. Très proche d'une menace réelle, mais plus chronophage."
                        },
                        {
                            heading: "Boîte grise (Grey Box)",
                            text: "Le testeur possède des informations limitées (ex: accès réseau, identifiants basiques). Équilibre entre efficacité et réalisme."
                        },
                        {
                            heading: "Boîte blanche (White Box)",
                            text: "Accès complet à la documentation, au code source, aux architectures. Optimise la détection de vulnérabilités profondes. Très efficace pour un audit interne."
                        }
                    ],
                    illustrationHint: "Trois boîtes transparentes avec degrés de visibilité : aucune info, partielle, totale"
                },
                {
                    type: "content",
                    title: "⚙️ Les 5 phases clés de l'attaque éthique",
                    contentSections: [
                        {
                            heading: "1. Reconnaissance (Recon)",
                            text: "Collecte passive d'informations sur la cible (WHOIS, recherche DNS, réseaux sociaux, Shodan). Objectif : cartographier l'exposition sans interagir directement."
                        },
                        {
                            heading: "2. Scanning & Découverte",
                            text: "Scan actif des ports, services, vulnérabilités avec outils comme Nmap, masscan. Identification des versions logiciels et failles potentielles."
                        },
                        {
                            heading: "3. Exploitation",
                            text: "Tentative de prise de contrôle via l'exploitation de failles (SQLi, XSS, buffer overflow, etc). Utilisation de Metasploit ou scripts customisés."
                        },
                        {
                            heading: "4. Post-exploitation",
                            text: "Maintien d'accès, élévation de privilèges, pivot vers d'autres systèmes. Évaluer l'impact réel et la persistance."
                        },
                        {
                            heading: "5. Reporting (Rapport)",
                            text: "Documentation des vulnérabilités, preuves de concept, impact potentiel et recommandations de correction. Livrable clé pour l'amélioration de la sécurité."
                        }
                    ]
                },
                {
                    type: "content",
                    title: "⚖️ Cadre légal et éthique",
                    contentSections: [
                        {
                            heading: "Autorisation écrite",
                            text: "Toute simulation d'attaque nécessite un contrat (rule of engagement) définissant le périmètre, les dates, les systèmes autorisés, et les limites (ex: pas de déni de service)."
                        },
                        {
                            heading: "Respect de la vie privée et des lois",
                            text: "Respecter la législation camerounaise et internationale (loi sur la cybersécurité, protection des données). Le pentester doit agir uniquement dans le cadre défini."
                        },
                        {
                            heading: "Éthique professionnelle",
                            text: "Discrétion, confidentialité des résultats, ne jamais exploiter une faille hors périmètre. Le but : améliorer la sécurité, pas nuire."
                        }
                    ],
                    conclusion: "✅ Une attaque éthique bien menée renforce la résilience des organisations."
                }
            ];
            
            // Génération des slides HTML
            let slidesHtml = '';
            let slideIndex = 0;
            
            slidesData.forEach((slide, idx) => {
                let slideContent = '';
                // wrapper slide avec data-index
                if (slide.type === 'title') {
                    slideContent = `
                        <div class="slide-item w-full h-full px-6 py-10 md:py-14 ${slide.bgDecor || 'bg-white'}">
                            <div class="flex flex-col items-center text-center max-w-2xl mx-auto">
                                <div class="text-7xl mb-5">${slide.emoji || '🔐'}</div>
                                <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-purple-700 mb-4">${slide.title}</h1>
                                <p class="text-lg md:text-xl text-gray-600 leading-relaxed">${slide.subtitle}</p>
                                <div class="mt-8 border-t border-indigo-100 pt-6 w-24 mx-auto"></div>
                                <p class="text-sm text-gray-400 mt-4">Classe: Développement Web | Module Cybersécurité</p>
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectifs') {
                    let objItems = '';
                    slide.objectives.forEach((obj, i) => {
                        objItems += `<li class="flex items-start gap-3 mb-4 objective-card bg-gray-50 p-3 rounded-xl border border-gray-100"><span class="text-indigo-600 font-bold text-xl">${i+1}.</span><span class="text-gray-700">${obj}</span></li>`;
                    });
                    slideContent = `
                        <div class="slide-item w-full px-6 py-8 md:py-10 bg-white">
                            <div class="max-w-2xl mx-auto">
                                <div class="flex items-center gap-2 mb-5">
                                    <span class="text-3xl">🎯</span>
                                    <h2 class="text-2xl md:text-3xl font-bold text-indigo-800">${slide.title}</h2>
                                </div>
                                <ul class="space-y-2 mt-2">
                                    ${objItems}
                                </ul>
                                <div class="mt-8 bg-indigo-50 p-4 rounded-xl text-indigo-800 text-sm italic">
                                    💡 À la fin de cette leçon, vous saurez comment un professionnel de la sécurité simule une attaque de manière légale.
                                </div>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'content') {
                    let sectionsHtml = '';
                    if (slide.contentSections) {
                        slide.contentSections.forEach(sec => {
                            sectionsHtml += `
                                <div class="mb-6 border-b border-gray-100 pb-5 last:border-0">
                                    <h3 class="text-xl font-semibold text-indigo-700 flex items-center gap-2 mb-2"><span class="text-indigo-500">📌</span> ${sec.heading}</h3>
                                    <p class="text-gray-700 leading-relaxed">${sec.text}</p>
                                </div>
                            `;
                        });
                    }
                    let extraHtml = '';
                    if (slide.conclusion) {
                        extraHtml = `<div class="mt-6 bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-500 text-emerald-800">${slide.conclusion}</div>`;
                    }
                    // Dessin minimal SVG pour certaines slides: sur la slide des phases ou des types, on ajoute un petit schéma textuel / diagramme via SVG pur ? 
                    // Pour la slide des phases ou des boîtes, on peut ajouter un petit dessin simple.
                    let diagramHtml = '';
                    if (slide.title.includes("Types de tests") || slide.title.includes("types de tests")) {
                        // petit dessin SVG pour illustrer boite noire / grise / blanche
                        diagramHtml = `
                            <div class="mt-6 bg-gray-50 p-4 rounded-xl flex justify-around flex-wrap gap-3 text-center">
                                <div class="flex-1 min-w-[80px]"><div class="bg-gray-800 text-white p-2 rounded-lg">⚫ Boîte noire</div><div class="text-xs text-gray-500 mt-1">Aucune info</div></div>
                                <div class="flex-1 min-w-[80px]"><div class="bg-gray-500 text-white p-2 rounded-lg">⚪ Boîte grise</div><div class="text-xs text-gray-500 mt-1">Info partielle</div></div>
                                <div class="flex-1 min-w-[80px]"><div class="bg-indigo-600 text-white p-2 rounded-lg">◻️ Boîte blanche</div><div class="text-xs text-gray-500 mt-1">Connaissance totale</div></div>
                            </div>
                        `;
                    }
                    if (slide.title.includes("phases clés")) {
                        // dessiner une petite timeline simple SVG
                        diagramHtml = `
                            <div class="mt-6 bg-indigo-50/50 p-4 rounded-xl">
                                <p class="text-sm font-medium text-indigo-700 mb-2">📋 Cycle du pentest éthique :</p>
                                <div class="flex flex-wrap justify-between gap-1 text-[11px] md:text-xs font-mono">
                                    <span class="bg-white px-2 py-1 rounded shadow">🔎 Recon</span> → 
                                    <span class="bg-white px-2 py-1 rounded shadow">📡 Scanning</span> → 
                                    <span class="bg-white px-2 py-1 rounded shadow">⚡ Exploitation</span> → 
                                    <span class="bg-white px-2 py-1 rounded shadow">🔄 Post-exploit</span> → 
                                    <span class="bg-white px-2 py-1 rounded shadow">📄 Reporting</span>
                                </div>
                            </div>
                        `;
                    }
                    slideContent = `
                        <div class="slide-item w-full px-6 py-8 md:py-10 bg-white">
                            <div class="max-w-2xl mx-auto">
                                <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 flex items-center gap-2 mb-5">${slide.title.includes("phases") ? "⚙️" : "🔍"} ${slide.title}</h2>
                                ${sectionsHtml}
                                ${diagramHtml}
                                ${extraHtml}
                            </div>
                        </div>
                    `;
                }
                
                slidesHtml += `<div class="slide-wrapper" data-slide-idx="${idx}" style="display: none;">${slideContent}</div>`;
            });
            
            // Injection dans #slides-area
            $('#slides-area').html(slidesHtml);
            
            let currentSlide = 0;
            const totalSlides = slidesData.length;
            
            // Afficher la slide courante
            function showSlide(index) {
                $('.slide-wrapper').hide();
                $(`.slide-wrapper[data-slide-idx="${index}"]`).fadeIn(200);
                $('#slide-counter').text(`Slide ${index+1} / ${totalSlides}`);
                // Gestion état boutons
                if (index === 0) {
                    $('#prev-slide').prop('disabled', true);
                } else {
                    $('#prev-slide').prop('disabled', false);
                }
                if (index === totalSlides - 1) {
                    $('#next-slide').text('Terminé ✓');
                } else {
                    $('#next-slide').text('Suivant →');
                }
            }
            
            // événements navigation
            $('#next-slide').on('click', function() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    showSlide(currentSlide);
                } else {
                    // Terminé: petit message ou on reste sur dernière slide
                    alert("🎉 Félicitations ! Vous avez terminé cette leçon. N'oubliez jamais : l'éthique et la légalité sont au cœur du métier.");
                }
            });
            
            $('#prev-slide').on('click', function() {
                if (currentSlide > 0) {
                    currentSlide--;
                    showSlide(currentSlide);
                }
            });
            
            // initialisation
            showSlide(0);
            
            // Ajustement responsive pour les petits écrans (tailwind fait déjà bien, mais on force la hauteur min)
            $(window).on('resize', function() {
                // pas de changement majeur, on laisse la fluidité
            });
            
            // petite fonction pour dessiner un icône si besoin, aucun souci.
            // Option: pour rendre accessible, on pourrait ajouter un petit diagramme ASCII sans image externe.
            // Pour la leçon 32, tout le contenu est purement textuel et schémas simples en SVG inline (pas d'image externe requise)
            // Le sujet est parfait, pas besoin d'image complexe.
        });
    </script>

    <!-- Ajout de quelques styles supplémentaires pour les petits écrans et la lisibilité -->
    <style>
        @media (max-width: 640px) {
            .slide-item {
                padding-left: 1.25rem;
                padding-right: 1.25rem;
            }
            h1, h2 {
                word-break: break-word;
            }
            .nav-btn {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
        /* Pour les slides, on garantit une hauteur adaptée au contenu */
        .slide-wrapper {
            min-height: 380px;
        }
        /* amélioration contraste */
        .bg-indigo-50 {
            background-color: #eef2ff;
        }
        .text-indigo-800 {
            color: #3730a3;
        }
        .border-indigo-100 {
            border-color: #e0e7ff;
        }
        .objective-card {
            transition: all 0.2s;
        }
    </style>
</body>
</html>
