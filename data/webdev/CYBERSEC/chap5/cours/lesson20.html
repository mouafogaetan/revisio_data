<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 20 : Authentification Unique (SSO) - Cours Cybersécurité</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour d'éventuelles formules) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transition slide simple */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        body {
            background: #f0f4f8;
        }
        /* couleurs douces pour l'éducation */
        .card-bg {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        }
        .btn-nav {
            transition: all 0.2s ease;
        }
        .btn-nav:hover {
            transform: scale(1.03);
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* Pour une meilleure lisibilité sur mobile */
        @media (max-width: 640px) {
            .slide h2 {
                font-size: 1.6rem;
            }
            .slide p, .slide li {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Container slides -->
        <div class="card-bg overflow-hidden p-5 md:p-8 relative">
            <!-- Indicateur de progression + compteur -->
            <div class="flex justify-between items-center mb-6 text-sm text-gray-500 flex-wrap gap-2">
                <div class="font-medium bg-gray-100 px-3 py-1 rounded-full">
                    Leçon 20 / Chapitre 5 : Gérer les identités et les accès
                </div>
                <div class="flex items-center space-x-2">
                    <span id="slideCounter" class="bg-gray-100 px-3 py-1 rounded-full">1 / 7</span>
                </div>
            </div>
            <!-- Barre de progression -->
            <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
                <div id="progressFill" class="bg-blue-600 h-2 rounded-full progress-bar" style="width: 14.28%"></div>
            </div>

            <!-- Zone des slides dynamique -->
            <div id="slidesContainer" class="relative min-h-[420px] md:min-h-[480px]">
                <!-- les slides seront injectées via jQuery -->
            </div>

            <!-- Navigation buttons -->
            <div class="flex justify-between mt-8 pt-4 border-t border-gray-100">
                <button id="prevBtn" class="btn-nav bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-2 px-5 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed">
                    ← Précédent
                </button>
                <button id="nextBtn" class="btn-nav bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-full transition">
                    Suivant →
                </button>
            </div>
        </div>
        <!-- Note pédagogique -->
        <p class="text-center text-sm text-gray-500 mt-6">
            📘 Cours interactif - SSO (Authentification unique) | Conçu pour les étudiants en cybersécurité
        </p>
    </div>

    <script>
        // Définition des slides pour la leçon 20: "Comprendre SSO (authentification unique)"
        const slides = [
            { // Slide 1 - Titre
                type: "title",
                title: "Authentification Unique (SSO)",
                subtitle: "Simplifier l'accès, renforcer la sécurité",
                emoji: "🔐"
            },
            { // Slide 2 - Objectifs pédagogiques
                type: "objectives",
                title: "🎯 Objectifs de la leçon",
                objectives: [
                    "Comprendre le concept d'authentification unique (SSO) et ses avantages",
                    "Découvrir les protocoles principaux : SAML, OAuth2, OpenID Connect",
                    "Savoir configurer un fournisseur d'identité (Azure AD, Okta, Keycloak)"
                ]
            },
            { // Slide 3 - Qu'est-ce que SSO ?
                type: "content",
                title: "🔑 Qu'est-ce que le SSO ?",
                content: `
                    <p class="mb-3">Le <strong class="text-blue-700">Single Sign-On (SSO)</strong> est une méthode d'authentification qui permet à un utilisateur de se connecter <strong>une seule fois</strong> et d'accéder à plusieurs applications ou services sans avoir à ressaisir ses identifiants.</p>
                    <div class="bg-blue-50 p-4 rounded-xl mt-3 border-l-4 border-blue-500">
                        <p class="italic">✨ Exemple concret : Une fois connecté à votre compte Google, vous pouvez accéder à Gmail, YouTube, Drive, etc. sans vous reconnecter.</p>
                    </div>
                    <p class="mt-4">Le SSO repose sur une relation de confiance entre :<br>
                    - <strong>Fournisseur d'identité (IdP)</strong> : stocke et vérifie les identifiants.<br>
                    - <strong>Fournisseur de service (SP)</strong> : l'application qui délègue l'authentification à l'IdP.</p>
                `
            },
            { // Slide 4 - Avantages et sécurité
                type: "content",
                title: "✅ Pourquoi adopter le SSO ?",
                content: `
                    <div class="grid md:grid-cols-2 gap-4 mt-2">
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                            <span class="text-green-600 text-xl">✔️</span>
                            <h3 class="font-bold">Expérience utilisateur</h3>
                            <p class="text-sm">Moins de mots de passe à mémoriser, plus de productivité.</p>
                        </div>
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                            <span class="text-green-600 text-xl">✔️</span>
                            <h3 class="font-bold">Sécurité renforcée</h3>
                            <p class="text-sm">Réduction de la réutilisation des mots de passe, centralisation des politiques MFA.</p>
                        </div>
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                            <span class="text-green-600 text-xl">✔️</span>
                            <h3 class="font-bold">Administration simplifiée</h3>
                            <p class="text-sm">Gestion centralisée des accès (onboarding/offboarding).</p>
                        </div>
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                            <span class="text-green-600 text-xl">✔️</span>
                            <h3 class="font-bold">Audit & conformité</h3>
                            <p class="text-sm">Traces de connexion unifiées, meilleure traçabilité.</p>
                        </div>
                    </div>
                    <div class="mt-4 p-3 bg-yellow-50 rounded-lg text-sm">
                        ⚠️ Attention: Le SSO devient un point unique critique — il doit être solidement protégé (MFA, surveillance).
                    </div>
                `
            },
            { // Slide 5 - Protocoles : SAML, OAuth2, OpenID Connect
                type: "protocols",
                title: "📡 Protocoles clés du SSO",
                protocols: [
                    { name: "SAML 2.0", desc: "Security Assertion Markup Language. Basé sur XML, souvent utilisé pour les applications d'entreprise et le SSO fédéré. Échange d'assertions entre IdP et SP." },
                    { name: "OAuth 2.0", desc: "Framework d'autorisation (délégation d'accès). Permet à une application d'accéder à des ressources sans partager le mot de passe. Utilisé pour les APIs, mais pas un protocole d'authentification à lui seul." },
                    { name: "OpenID Connect (OIDC)", desc: "Couche d'authentification au-dessus d'OAuth 2.0. Très répandu (Google, Microsoft, Keycloak). Fournit des informations sur l'utilisateur via un ID Token (JWT)." }
                ],
                note: "Dans une architecture moderne, OIDC est souvent recommandé pour les applications web et mobiles."
            },
            { // Slide 6 - Exemples de fournisseurs d'identité & configuration simplifiée
                type: "content",
                title: "⚙️ Fournisseurs d'identité & mise en place",
                content: `
                    <p><strong>Fournisseurs d'identité populaires :</strong> Microsoft Entra ID (ex Azure AD), Okta, Keycloak (open source), Auth0, Google Identity Platform.</p>
                    <div class="mt-4 bg-gray-50 p-4 rounded-lg">
                        <h3 class="font-semibold text-gray-800">🔧 Étapes typiques pour configurer SSO (avec Keycloak par exemple) :</h3>
                        <ol class="list-decimal list-inside mt-2 space-y-1 text-sm md:text-base">
                            <li>Installer / déployer le fournisseur d'identité (IdP).</li>
                            <li>Créer un "client" (représentant l'application) dans l'IdP.</li>
                            <li>Définir les URLs de redirection (callback) et les paramètres (SAML ou OIDC).</li>
                            <li>Configurer l'application (SP) pour utiliser l'IdP (métadonnées, endpoints).</li>
                            <li>Tester le flux SSO (connexion -> redirection vers IdP -> retour avec token).</li>
                            <li>Activer la double authentification (MFA) au niveau de l'IdP pour renforcer la sécurité.</li>
                        </ol>
                    </div>
                    <div class="mt-4 flex justify-center">
                        <!-- dessin simple d'un flux SSO (texte/shape via SVG dessiné manuellement) -->
                        <svg width="100%" height="120" viewBox="0 0 500 100" class="max-w-md mt-2" xmlns="http://www.w3.org/2000/svg">
                            <rect x="10" y="30" width="80" height="40" fill="#3b82f6" rx="8" />
                            <text x="28" y="55" fill="white" font-size="12">Utilisateur</text>
                            <rect x="200" y="30" width="100" height="40" fill="#10b981" rx="8" />
                            <text x="215" y="55" fill="white" font-size="12">Fournisseur IdP</text>
                            <rect x="380" y="30" width="90" height="40" fill="#f59e0b" rx="8" />
                            <text x="395" y="55" fill="white" font-size="12">Application</text>
                            <path d="M90 50 L195 50" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4"/>
                            <path d="M300 50 L375 50" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
                            <path d="M425 70 L425 85 L250 85 L250 75" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="3"/>
                            <text x="330" y="98" fill="#ef4444" font-size="10">Redirection / Token</text>
                            <defs>
                                <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                                    <path d="M0,0 L8,4 L0,8 Z" fill="#6b7280"/>
                                </marker>
                            </defs>
                            <text x="115" y="28" fill="#4b5563" font-size="9">Authentification</text>
                            <text x="310" y="28" fill="#4b5563" font-size="9">Accès / Assertion</text>
                        </svg>
                        <p class="text-xs text-gray-500 ml-2 self-end">Schéma simple: flux SSO OIDC/SAML</p>
                    </div>
                `
            },
            { // Slide 7 - Bonnes pratiques et conclusion
                type: "conclusion",
                title: "🎓 Bonnes pratiques & Récapitulatif",
                practices: [
                    "Activer l'authentification multi-facteurs (MFA) sur le fournisseur d'identité pour éviter les compromissions.",
                    "Utiliser des protocoles standardisés (OIDC/SAML) plutôt que des solutions propriétaires fragiles.",
                    "Limiter les sessions SSO avec des durées adaptées (timeout).",
                    "Surveiller les logs d'authentification (détection d'anomalies).",
                    "Former les utilisateurs aux risques de vol de session et aux phishing (sensibilisation)."
                ],
                finalMessage: "Le SSO améliore l'expérience utilisateur tout en centralisant la sécurité. Maîtriser Keycloak, Azure AD ou Okta est un atout majeur pour tout professionnel de la cybersécurité."
            }
        ];

        let currentIndex = 0;
        const totalSlides = slides.length;

        // Mettre à jour la progression et le compteur
        function updateUI() {
            const percent = ((currentIndex + 1) / totalSlides) * 100;
            $("#progressFill").css("width", `${percent}%`);
            $("#slideCounter").text(`${currentIndex+1} / ${totalSlides}`);
            
            // Gérer état des boutons
            if (currentIndex === 0) {
                $("#prevBtn").prop("disabled", true);
            } else {
                $("#prevBtn").prop("disabled", false);
            }
            if (currentIndex === totalSlides - 1) {
                $("#nextBtn").text("Terminé ✓").removeClass("bg-blue-600").addClass("bg-green-600");
            } else {
                $("#nextBtn").text("Suivant →").removeClass("bg-green-600").addClass("bg-blue-600");
            }
        }

        // Fonction pour render le slide en fonction de son type
        function renderSlide(slide, idx) {
            switch(slide.type) {
                case "title":
                    return `
                        <div class="slide text-center py-8 md:py-12">
                            <div class="text-7xl md:text-8xl mb-4">${slide.emoji}</div>
                            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-700 to-indigo-600 bg-clip-text text-transparent">${slide.title}</h1>
                            <p class="text-gray-600 text-lg md:text-xl mt-4 max-w-md mx-auto">${slide.subtitle}</p>
                            <div class="mt-8 inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-full text-sm">Leçon 20 · Chapitre 5</div>
                        </div>
                    `;
                case "objectives":
                    return `
                        <div class="slide">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-3 mb-6">${slide.title}</h2>
                            <ul class="space-y-4">
                                ${slide.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-blue-500 text-xl">✓</span><span class="text-gray-700">${obj}</span></li>`).join('')}
                            </ul>
                            <div class="mt-8 bg-indigo-50 p-4 rounded-xl text-indigo-800 text-sm">
                                💡 À la fin de cette leçon, vous serez capable d'expliquer le SSO et d'identifier les protocoles majeurs.
                            </div>
                        </div>
                    `;
                case "content":
                    return `
                        <div class="slide">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-3 mb-4">${slide.title}</h2>
                            <div class="prose prose-blue max-w-none text-gray-700">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                case "protocols":
                    return `
                        <div class="slide">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-3 mb-4">${slide.title}</h2>
                            <div class="space-y-4">
                                ${slide.protocols.map(p => `
                                    <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                                        <h3 class="font-bold text-blue-700 text-xl">${p.name}</h3>
                                        <p class="text-gray-600 mt-1">${p.desc}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-5 p-3 bg-gray-100 rounded-lg text-gray-700 text-sm italic">
                                📌 ${slide.note}
                            </div>
                        </div>
                    `;
                case "conclusion":
                    return `
                        <div class="slide">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-3 mb-4">${slide.title}</h2>
                            <ul class="space-y-2 list-disc list-inside bg-gray-50 p-4 rounded-xl">
                                ${slide.practices.map(p => `<li class="text-gray-700">${p}</li>`).join('')}
                            </ul>
                            <div class="mt-6 p-4 bg-green-50 rounded-lg border-l-4 border-green-500">
                                <p class="text-green-800 font-medium">📖 ${slide.finalMessage}</p>
                            </div>
                            <div class="mt-6 text-center text-sm text-gray-500">
                                <span>🔒 L’authentification unique est un pilier de l’IAM moderne.</span>
                            </div>
                        </div>
                    `;
                default:
                    return `<div class="slide">Contenu par défaut</div>`;
            }
        }

        // Afficher le slide courant
        function showSlide(index) {
            if (index < 0 || index >= totalSlides) return;
            const slideData = slides[index];
            const htmlContent = renderSlide(slideData, index);
            $("#slidesContainer").fadeOut(150, function() {
                $(this).html(htmlContent);
                // déclencher MathJax si besoin, mais il n'y a pas de formule complexe. Pour garantir:
                if (window.MathJax) {
                    MathJax.typesetPromise && MathJax.typesetPromise();
                }
                $(this).fadeIn(150);
            });
            currentIndex = index;
            updateUI();
        }

        // navigation
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                showSlide(currentIndex + 1);
            } else {
                // Fin du cours, afficher une petite notification ou on peut revenir au début
                if(confirm("🎉 Félicitations ! Vous avez terminé la leçon sur SSO. Voulez-vous la reprendre depuis le début ?")){
                    showSlide(0);
                }
            }
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                showSlide(currentIndex - 1);
            }
        }
        
        // Événements
        $(document).ready(function() {
            showSlide(0);
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
            
            // Navigation au clavier (gauche/droite) pour accessibilité
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    prevSlide();
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
