<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 39 : Effectuer un Pentest Éthique | Cours Cybersécurité</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si nécessaire) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind + couleurs douces -->
    <style>
        /* Transition smooth pour les slides */
        .slide-container {
            transition: transform 0.4s ease-in-out, opacity 0.3s ease;
        }
        .slide {
            min-height: 70vh;
            transition: all 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e3a8a;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* Correction overflow pour petits écrans */
        @media (max-width: 640px) {
            .slide {
                padding: 1.25rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
        /* Caches pour défilement fluide */
        body {
            background: #f8fafc;
        }
        .card-bg {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(0px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-8">
        <!-- En-tête avec titre de la matière et progression -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-2">
            <div class="text-center sm:text-left">
                <span class="text-sm font-semibold text-blue-700 bg-blue-100 px-3 py-1 rounded-full">Initiation à la Cybersécurité</span>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mt-1">Leçon 39 : Pentest & Rapport</h1>
            </div>
            <div class="bg-white/70 backdrop-blur-sm rounded-full px-4 py-2 shadow-sm text-gray-700 text-sm font-medium">
                Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
            </div>
        </div>

        <!-- Barre de progression visuelle -->
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6 shadow-inner">
            <div id="progressFill" class="bg-blue-600 h-2.5 rounded-full progress-bar" style="width: 0%;"></div>
        </div>

        <!-- Conteneur principal des slides (carrousel horizontal) -->
        <div class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div id="slidesWrapper" class="slide-container flex overflow-hidden">
                <!-- Les slides seront injectées dynamiquement via jQuery -->
            </div>

            <!-- Flèches navigation -->
            <button id="prevSlide" class="nav-btn absolute left-2 top-1/2 -translate-y-1/2 bg-blue-800 hover:bg-blue-900 text-white p-2 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition z-10" aria-label="Précédent">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <button id="nextSlide" class="nav-btn absolute right-2 top-1/2 -translate-y-1/2 bg-blue-800 hover:bg-blue-900 text-white p-2 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition z-10" aria-label="Suivant">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </button>

            <!-- Indicateurs de pagination (dots) -->
            <div id="paginationDots" class="absolute bottom-3 left-0 right-0 flex justify-center gap-2 pb-2 z-10"></div>
        </div>

        <!-- Note légale / pied de page -->
        <div class="mt-6 text-xs text-gray-500 text-center border-t pt-4">
            ⚠️ Cadre éthique & légal : Toute activité de pentest doit être réalisée avec autorisation écrite et sur des cibles autorisées (environnements de test).
        </div>
    </div>

    <script>
        // Définition du contenu des slides pour la lesson 39 (objectifs détaillés selon le programme)
        // Slide 1 : Titre et introduction
        // Slide 2 : Objectifs d'apprentissage
        // Slides suivants: contenu détaillé (Pentest éthique, phases, méthodologie, outils, preuves, documentation, recommandations)
        const slidesData = [
            {
                type: "title",
                title: "🔐 Effectuer un pentest éthique",
                subtitle: "Apprenez à réaliser une simulation d'attaque légale pour renforcer la sécurité",
                icon: "🛡️"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                objectives: [
                    "✅ Effectuer un test d'intrusion (pentest) sur une cible légale (environnement de test)",
                    "✅ Documenter les vulnérabilités trouvées avec preuves et analyse d'impact",
                    "✅ Proposer des recommandations de correction adaptées au contexte technique"
                ]
            },
            {
                type: "content",
                title: "🧭 Qu'est-ce qu'un pentest éthique ?",
                content: "Un test d'intrusion (ou pentest) est une simulation d'attaque informatique autorisée. Objectif : identifier les failles de sécurité avant les acteurs malveillants. Elle se réalise dans un cadre strict (périmètre défini, règles d'engagement).",
                subpoints: [
                    "🔹 Différence avec une évaluation de vulnérabilité : Le pentest exploite activement les failles pour mesurer l'impact réel.",
                    "🔹 Types : boîte noire (aucune info interne), boîte grise (connaissances partielles), boîte blanche (accès complet).",
                    "🔹 Pour une cible légale : environnement de test dédié, serveur de staging ou application sandbox."
                ]
            },
            {
                type: "content",
                title: "📋 Les 5 phases méthodologiques du pentest",
                content: "Tout pentest bien mené suit un cycle structuré reconnu (PTES, OWASP). Ces étapes garantissent une approche rigoureuse.",
                subpoints: [
                    "1️⃣ Reconnaissance (Information Gathering) : collecte de données publiques (DNS, WHOIS, OSINT).",
                    "2️⃣ Scanning & Énumération : analyse des ports, services, découverte des vulnérabilités potentielles (Nmap, Dirb).",
                    "3️⃣ Exploitation : tentative de prendre contrôle ou d'exploiter une faille (SQLi, XSS, élévation de privilèges).",
                    "4️⃣ Post-exploitation : mesure de l'impact, extraction de preuves, maintien d'accès (simulation).",
                    "5️⃣ Reporting : documentation complète avec preuves, recommandations."
                ]
            },
            {
                type: "content",
                title: "🛠️ Outils essentiels du pentester éthique",
                content: "Des logiciels spécialisés aident à chaque phase. L'important est de comprendre leur usage et leurs limites. Utilisez-les uniquement sur des cibles autorisées.",
                subpoints: [
                    "🔸 Nmap : scan réseau et découverte de ports/services.",
                    "🔸 Burp Suite / OWASP ZAP : test d'intrusion web (requêtes, injection).",
                    "🔸 Metasploit Framework : exploitation de vulnérabilités.",
                    "🔸 Hydra / John the Ripper : attaques par force brute / craquage de mots de passe.",
                    "🔸 Sqlmap : automatisation des injections SQL.",
                    "🔸 Wireshark : analyse de trafic réseau."
                ]
            },
            {
                type: "content",
                title: "📸 Collecte de preuves & documentation",
                content: "La documentation est cruciale pour la crédibilité d’un pentest. Chaque vulnérabilité doit être accompagnée de preuves tangibles : captures d'écran, logs, extraits de requêtes, démonstration de l’exploitation.",
                subpoints: [
                    "📌 Preuve de vulnérabilité : Capture d'écran de la charge utile, enregistrement vidéo de l'exploit.",
                    "📌 Impact : Quelles données compromises ? Accès administrateur obtenu ? Interruption possible ?",
                    "📌 Niveau de criticité : Score CVSS, probabilité d’exploitation réelle.",
                    "📌 Organisation : Tableau récapitulatif (ID vulnérabilité, description, preuve, impact, gravité)."
                ]
            },
            {
                type: "content",
                title: "📝 Rédiger des recommandations efficaces",
                content: "Un pentest ne se limite pas à trouver des failles ; il doit guider vers des correctifs concrets, compréhensibles par les équipes techniques et la direction.",
                subpoints: [
                    "✔ Recommandations techniques : mise à jour de librairie, paramétrage de WAF, correction de code (requêtes paramétrées, échappement HTML).",
                    "✔ Recommandations organisationnelles : politique de mots de passe, durcissement réseau, sensibilisation.",
                    "✔ Priorisation : remédiation urgente pour les failles critiques, planification pour les risques modérés.",
                    "✔ Preuve de correction : retester après correctif pour valider la résolution."
                ]
            },
            {
                type: "content",
                title: "🏁 Exemple pratique simplifié (cible légale)",
                content: "Scénario : application web de test vulnérable (ex: DVWA ou environnement personnel). Phase d’exploitation d’une injection SQL manuelle.",
                subpoints: [
                    "1. Reconnaissance : formulaire de connexion avec paramètre 'id'.",
                    "2. Injection : ' OR '1'='1' --  pour contourner l'authentification.",
                    "3. Preuve : capture de l’accès à la zone admin sans mot de passe.",
                    "4. Impact : Extraction de données utilisateurs possible.",
                    "5. Recommandation : Utiliser des requêtes paramétrées (PDO / prepared statements)."
                ],
                note: "⚠️ N'effectuez que sur des machines dont vous avez l'autorisation expresse (laboratoires CTF, VM légales)."
            },
            {
                type: "conclusion",
                title: "✨ Synthèse & Bonnes pratiques",
                content: "Le pentest éthique est un levier puissant pour améliorer la posture de sécurité. Les livrables (preuves, rapports, recommandations) doivent permettre aux équipes de prioriser et corriger les failles.",
                checklist: [
                    "☑ Toujours obtenir une autorisation écrite avant tout test.",
                    "☑ Définir un périmètre clair (adresses IP, applications, horaires).",
                    "☑ Documenter chaque faille avec preuve et impact estimé.",
                    "☑ Proposer des correctifs concrets et hiérarchisés.",
                    "☑ Effectuer une nouvelle passe de test après corrections."
                ]
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'un slide selon son type
        function renderSlide(slide, idx) {
            const baseClasses = "slide w-full flex-shrink-0 p-6 md:p-8 transition-all bg-white rounded-2xl";
            if (slide.type === "title") {
                return `
                    <div class="${baseClasses} flex flex-col justify-center items-center text-center min-h-[60vh]">
                        <div class="text-6xl mb-4">${slide.icon || "🔒"}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-gray-600 text-lg mt-4 max-w-lg mx-auto">${slide.subtitle}</p>
                        <div class="mt-8 text-sm text-blue-500 font-medium">⬅️ Utilisez les flèches pour naviguer</div>
                    </div>
                `;
            } 
            else if (slide.type === "objectifs") {
                return `
                    <div class="${baseClasses} min-h-[60vh]">
                        <h2 class="text-2xl md:text-3xl font-bold text-blue-800 border-l-4 border-blue-500 pl-4 mb-6">${slide.title}</h2>
                        <ul class="space-y-4 text-gray-700 list-disc pl-6 text-base md:text-lg">
                            ${slide.objectives.map(obj => `<li class="leading-relaxed">${obj}</li>`).join('')}
                        </ul>
                        <div class="mt-8 p-4 bg-blue-50 rounded-lg text-blue-800 text-sm italic">
                            💡 À la fin de cette leçon, vous serez capable de réaliser une petite mission de pentest simple.
                        </div>
                    </div>
                `;
            }
            else if (slide.type === "content") {
                return `
                    <div class="${baseClasses} min-h-[60vh]">
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 border-b-2 border-blue-200 pb-2 mb-4">${slide.title}</h2>
                        <p class="text-gray-700 mb-4 leading-relaxed">${slide.content}</p>
                        ${slide.subpoints ? `<ul class="space-y-2 text-gray-700 list-disc pl-5 mb-4">${slide.subpoints.map(p => `<li>${p}</li>`).join('')}</ul>` : ''}
                        ${slide.note ? `<div class="mt-4 p-3 bg-amber-50 border-l-4 border-amber-400 text-amber-800 text-sm rounded">📢 ${slide.note}</div>` : ''}
                    </div>
                `;
            }
            else if (slide.type === "conclusion") {
                return `
                    <div class="${baseClasses} min-h-[60vh]">
                        <h2 class="text-2xl md:text-3xl font-bold text-green-800 mb-4">${slide.title}</h2>
                        <p class="text-gray-700 mb-5">${slide.content}</p>
                        <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                            <h3 class="font-semibold text-gray-800 text-lg mb-3">📌 Points clés à retenir</h3>
                            <ul class="space-y-2 text-gray-700">
                                ${slide.checklist.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="mt-6 text-center text-sm text-gray-500">
                            🧪 Prochaine étape : Mettez en pratique dans un laboratoire comme HackTheBox ou TryHackMe (autorisé)
                        </div>
                    </div>
                `;
            }
            return `<div class="${baseClasses}">Contenu non disponible</div>`;
        }

        // Génération de tous les slides et injection dans le wrapper
        function buildSlides() {
            const wrapper = $("#slidesWrapper");
            wrapper.empty();
            slidesData.forEach((slide, i) => {
                const slideHtml = renderSlide(slide, i);
                wrapper.append(`<div class="slide shrink-0 w-full" data-slide-index="${i}">${slideHtml}</div>`);
            });
            $("#totalSlides").text(totalSlides);
            updatePaginationDots();
            updateSlideVisibility();
        }

        // Mise à jour des points de pagination
        function updatePaginationDots() {
            const dotsContainer = $("#paginationDots");
            dotsContainer.empty();
            for (let i = 0; i < totalSlides; i++) {
                const dot = $(`<button class="w-2.5 h-2.5 rounded-full mx-1 transition-all focus:outline-none ${i === currentSlide ? 'bg-blue-600 w-5' : 'bg-gray-300 hover:bg-gray-400'}" data-index="${i}"></button>`);
                dot.on("click", function() {
                    goToSlide(parseInt($(this).data("index")));
                });
                dotsContainer.append(dot);
            }
        }

        function updateActiveDot() {
            $("#paginationDots button").each(function(idx) {
                if (idx === currentSlide) {
                    $(this).removeClass("bg-gray-300 w-2.5").addClass("bg-blue-600 w-5");
                } else {
                    $(this).removeClass("bg-blue-600 w-5").addClass("bg-gray-300 w-2.5");
                }
            });
        }

        // Mettre à jour la position du carrousel (translateX)
        function updateSlideVisibility() {
            const slideWidth = $(".slide").outerWidth();
            const wrapper = $("#slidesWrapper");
            const newTranslate = - (currentSlide * slideWidth);
            wrapper.css("transform", `translateX(${newTranslate}px)`);
            
            // Mise à jour du texte slide courant
            $("#currentSlideIdx").text(currentSlide + 1);
            // Progression
            const progressPercent = ((currentSlide + 1) / totalSlides) * 100;
            $("#progressFill").css("width", `${progressPercent}%`);
            
            // Gérer les états des boutons prev/next
            $("#prevSlide").prop("disabled", currentSlide === 0);
            $("#nextSlide").prop("disabled", currentSlide === totalSlides - 1);
            
            updateActiveDot();
        }

        function goToSlide(index) {
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            if (index === currentSlide) return;
            currentSlide = index;
            updateSlideVisibility();
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                goToSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // Ajustement lors du redimensionnement pour recalculer la largeur du slide
        let resizeTimer;
        $(window).on("resize", function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                // Sauvegarde l'index courant mais recalcul la translation
                const slideWidth = $(".slide").outerWidth();
                const wrapper = $("#slidesWrapper");
                wrapper.css("transform", `translateX(${- (currentSlide * slideWidth)}px)`);
            }, 150);
        });

        // Écoute des touches clavier (gauche/droite)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowLeft") {
                prevSlide();
                e.preventDefault();
            } else if (e.key === "ArrowRight") {
                nextSlide();
                e.preventDefault();
            }
        });

        // Initialisation une fois le DOM prêt
        $(document).ready(function() {
            buildSlides();
            // Attendre que le layout soit prêt pour calculer largeur
            setTimeout(() => {
                updateSlideVisibility();
            }, 50);
            
            $("#prevSlide").on("click", prevSlide);
            $("#nextSlide").on("click", nextSlide);
            
            // Rendre le contenu accessible sur mobile (pas de swipe natif complet, mais flèches)
            // On peut ajouter un swipe simple optionnel mais les flèches sont claires.
        });
        
        // MathJax n'est pas central mais le support existe si jamais besoin.
    </script>
</body>
</html>
