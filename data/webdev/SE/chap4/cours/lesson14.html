<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 14 : Diagramme de Séquence UML | Génie Logiciel</title>
  <!-- Tailwind CSS + Font Awesome (pour icônes) + jQuery + MathJax -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <!-- personnalisation légère pour améliorer le contraste et le confort de lecture -->
  <style>
    /* transition slide fluide */
    .slide-container {
      transition: opacity 0.3s ease-in-out;
    }
    body {
      background: #f8fafc;
    }
    /* personnalisation des boutons de navigation */
    .nav-btn {
      transition: all 0.2s ease;
    }
    .nav-btn:hover:not(:disabled) {
      transform: scale(1.05);
      background-color: #1e40af;
    }
    /* style pour les diagrammes simples dessinés en CSS / SVG inline */
    .uml-diagram-svg {
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: 0 4px 14px 0 rgba(0,0,0,0.05);
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur principal slides -->
    <div id="slidesWrapper" class="relative">
      <!-- slide actif -->
      <div id="slideContent" class="slide-container bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300">
        <!-- le contenu sera injecté dynamiquement par jQuery -->
      </div>

      <!-- indicateur de progression et boutons nav -->
      <div class="flex flex-wrap justify-between items-center mt-6 gap-3">
        <button id="prevSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">◀ Précédent</button>
        <div class="text-sm text-gray-600 bg-gray-100 px-4 py-2 rounded-full">
          Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
        </div>
        <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">Suivant ▶</button>
      </div>

      <!-- petit indicateur de navigation tactile / clavier -->
      <p class="text-center text-xs text-gray-400 mt-4">👆 Glisser ou utiliser les boutons | Clavier ← →</p>
    </div>
  </div>

  <script>
    // Définition des slides pour la leçon14 (Chap4, lesson14)
    // Titre : "Représenter les interactions entre objets dans le temps"
    // Objectifs selon JSON: 
    // 1. Représenter les interactions entre objets dans le temps
    // 2. Utiliser les lignes de vie (lifelines), messages, activation
    // 3. Modéliser les boucles (loop) et alternatives (alt)
    const slidesData = [
      {
        type: "title",
        title: "📊 Diagramme de Séquence UML",
        subtitle: "Représenter les interactions entre objets dans le temps",
        chapter: "Chapitre 4 · Maîtrise des diagrammes UML essentiels",
        badge: "Leçon 14"
      },
      {
        type: "objectives",
        title: "🎯 Objectifs d'apprentissage",
        objectives: [
          "Représenter les interactions entre objets dans le temps à l'aide d'un diagramme de séquence.",
          "Utiliser correctement les lignes de vie (lifelines), les messages et les activations.",
          "Modéliser des structures conditionnelles (alt) et des boucles (loop) dans un diagramme de séquence."
        ]
      },
      {
        type: "content",
        title: "🔍 Qu'est-ce qu'un diagramme de séquence ?",
        paragraphs: [
          "Le diagramme de séquence est un diagramme comportemental UML. Il montre comment les objets interagissent entre eux selon un ordre chronologique.",
          "Il est parfait pour visualiser un scénario précis d'un cas d'utilisation : par exemple « un client passe commande » ou « un utilisateur se connecte ».",
          "Contrairement au diagramme de classes (statique), le diagramme de séquence illustre le dynamisme et la communication temporelle entre objets."
        ],
        illustration: "chrono"
      },
      {
        type: "content",
        title: "⏱️ Lignes de vie (Lifelines) et Activateurs",
        paragraphs: [
          "Une ligne de vie représente un objet ou un acteur participant à l'interaction. On la dessine par un rectangle contenant le nom de l'objet (ex: :Utilisateur, :Contrôleur), suivi d'une ligne verticale en pointillés.",
          "L'activation (barre rectangulaire sur la ligne de vie) indique la période pendant laquelle l'objet exécute une opération. Elle commence à la réception d'un message et se termine quand il retourne le contrôle."
        ],
        diagram: "lifeline"
      },
      {
        type: "content",
        title: "✉️ Les messages – Le cœur de l'échange",
        paragraphs: [
          "Les messages sont des flèches horizontales ou obliques qui relient deux lignes de vie. Ils représentent un appel de méthode, un signal ou la réponse.",
          "📤 Message synchrone (appel classique) : flèche pleine à tête triangulaire. L’émetteur attend une réponse avant de continuer.",
          "📥 Message asynchrone : flèche ouverte (simple tête). L'émetteur ne bloque pas.",
          "↩️ Message de retour : flèche en pointillés qui indique la fin d'un traitement (optionnel)."
        ],
        diagram: "messages"
      },
      {
        type: "content",
        title: "🔄 Boucles (loop) & Alternatives (alt)",
        paragraphs: [
          "Pour représenter des répétitions, on utilise le fragment 'loop'. Exemple : une boutique en ligne vérifie chaque article du panier.",
          "Les conditions sont gérées par le fragment 'alt' (alternative) avec plusieurs sections séparées par une ligne pointillée (else).",
          "On peut aussi utiliser 'opt' pour un bloc optionnel (si une condition est vraie). Ces fragments encadrent un ensemble de messages."
        ],
        diagram: "loopAlt"
      },
      {
        type: "content",
        title: "📐 Exemple visuel : diagramme de séquence 'Connexion utilisateur'",
        paragraphs: [
          "Voici un exemple simple pour illustrer lifelines, messages, alt et loop. Scénario : Un utilisateur tente de se connecter. Si le mot de passe est correct, on accède ; sinon on autorise 3 essais maximum."
        ],
        visualExample: true
      },
      {
        type: "content",
        title: "📌 Bonnes pratiques et astuces",
        paragraphs: [
          "🟢 Nommez clairement vos lignes de vie : 'utilisateur:Client', 'app:ApplicationWeb'.",
          "🟢 Évitez les détails d'implémentation : concentrez-vous sur la logique métier.",
          "🟢 Pour les interactions complexes, découpez en plusieurs diagrammes.",
          "🟢 Utilisez les fragments 'alt', 'loop', 'opt' pour rendre le diagramme plus lisible sans noyer le lecteur."
        ],
        tips: true
      },
      {
        type: "recap",
        title: "✅ Récapitulons !",
        points: [
          "Le diagramme de séquence montre les interactions entre objets sur une échelle temporelle.",
          "Ligne de vie + activation = existence et période d'exécution d'un objet.",
          "Messages synchrones (flèche pleine) et asynchrones (flèche ouverte).",
          "Les fragments 'loop' (répétition) et 'alt' (alternatives) structurent la logique.",
          "Outil précieux pour la conception détaillée et la documentation."
        ]
      }
    ];

    let currentIndex = 0;
    let total = slidesData.length;

    function renderSlide(index) {
      const slide = slidesData[index];
      let html = '';
      // styles de base pour le contenu
      const commonContainer = 'p-6 md:p-10';
      if (slide.type === 'title') {
        html = `
          <div class="${commonContainer} bg-gradient-to-br from-indigo-50 to-white text-center">
            <span class="inline-block bg-indigo-100 text-indigo-800 text-sm font-semibold px-3 py-1 rounded-full mb-4">${slide.badge}</span>
            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4">${slide.title}</h1>
            <p class="text-xl text-indigo-700 font-medium">${slide.subtitle}</p>
            <div class="mt-8 h-1 w-20 bg-indigo-300 mx-auto rounded-full"></div>
            <p class="text-gray-500 mt-6 text-sm">${slide.chapter}</p>
          </div>
        `;
      } 
      else if (slide.type === 'objectives') {
        html = `
          <div class="${commonContainer} bg-white">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4 mb-6">${slide.title}</h2>
            <ul class="space-y-4">
              ${slide.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✓</span><span class="text-gray-700 text-lg">${obj}</span></li>`).join('')}
            </ul>
            <div class="mt-8 bg-indigo-50 p-4 rounded-xl italic text-gray-600">📌 À la fin de cette leçon, vous saurez lire et créer des diagrammes de séquence UML.</div>
          </div>
        `;
      }
      else if (slide.type === 'content') {
        html = `<div class="${commonContainer} bg-white">`;
        html += `<h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4 mb-5">${slide.title}</h2>`;
        if (slide.paragraphs) {
          slide.paragraphs.forEach(p => {
            html += `<p class="text-gray-700 mb-4 leading-relaxed text-base md:text-lg">${p}</p>`;
          });
        }
        // dessin svg selon le type de diagramme demandé
        if (slide.diagram === 'lifeline') {
          html += `
            <div class="my-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
              <p class="font-semibold text-gray-700 mb-2">🎨 Représentation d'une ligne de vie + activation</p>
              <svg viewBox="0 0 500 220" class="w-full max-w-md mx-auto uml-diagram-svg">
                <rect x="40" y="15" width="100"  height="35" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" rx="6"/>
                <text x="90" y="37" text-anchor="middle" font-size="12" fill="#1e1b4b">utilisateur:Client</text>
                <line x1="90" y1="50" x2="90" y2="200" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3"/>
                <rect x="75" y="70" width="30" height="80" fill="#c7d2fe" stroke="#4338ca" stroke-width="1" rx="3"/>
                <text x="90" y="115" text-anchor="middle" font-size="10" fill="#312e81">activation</text>
                <line x1="250" y1="30" x2="250" y2="200" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3"/>
                <rect x="280" y="15" width="110"  height="35" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" rx="6"/>
                <text x="335" y="37" text-anchor="middle" font-size="12" fill="#1e1b4b">système:AuthService</text>
                <text x="335" y="115" font-size="10" fill="#4b5563" text-anchor="middle">lifeline</text>
                <path d="M 170 85 L 240 85" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="205" y="78" font-size="10" fill="#1e3a8a" text-anchor="middle">connecter(login, pwd)</text>
                <defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#1e3a8a"/></marker></defs>
              </svg>
              <p class="text-center text-xs text-gray-500 mt-2">Ligne de vie (pointillés) + activation (rectangle bleu clair)</p>
            </div>
          `;
        }
        else if (slide.diagram === 'messages') {
          html += `
            <div class="my-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
              <p class="font-semibold text-gray-700 mb-2">💬 Messages synchrones et asynchrones</p>
              <svg viewBox="0 0 540 200" class="w-full max-w-lg mx-auto uml-diagram-svg">
                <rect x="30" y="15" width="90" height="35" fill="#e0e7ff" stroke="#4f46e5" rx="6"/><text x="75" y="38" text-anchor="middle" font-size="11">Client</text>
                <line x1="75" y1="50" x2="75" y2="180" stroke="#4f46e5" stroke-dasharray="4,3"/>
                <rect x="210" y="15" width="100" height="35" fill="#e0e7ff" stroke="#4f46e5" rx="6"/><text x="260" y="38" text-anchor="middle" font-size="11">Serveur</text>
                <line x1="260" y1="50" x2="260" y2="180" stroke="#4f46e5" stroke-dasharray="4,3"/>
                <path d="M 120 70 L 200 70" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arrowSync)"/><text x="160" y="62" text-anchor="middle" font-size="9">requête synchrone</text>
                <path d="M 120 110 L 200 110" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowAsync)"/><text x="160" y="102" text-anchor="middle" font-size="9">asynchrone</text>
                <path d="M 210 150 L 125 150" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowReturn)"/><text x="170" y="142" text-anchor="middle" font-size="9">retour</text>
                <defs><marker id="arrowSync" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#1e3a8a"/></marker>
                <marker id="arrowAsync" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#1e3a8a" style="fill:#3b82f6"/></marker>
                <marker id="arrowReturn" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#6b7280"/></marker></defs>
              </svg>
            </div>
          `;
        }
        else if (slide.diagram === 'loopAlt') {
          html += `
            <div class="my-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
              <p class="font-semibold text-gray-700 mb-2">🔄 Fragments loop et alt (spécification UML)</p>
              <svg viewBox="0 0 550 240" class="w-full max-w-md mx-auto uml-diagram-svg">
                <rect x="30" y="10" width="100" height="30" fill="#e0e7ff" stroke="#4f46e5" rx="5"/><text x="80" y="30" text-anchor="middle" font-size="10">App</text>
                <line x1="80" y1="40" x2="80" y2="210" stroke="#4f46e5" stroke-dasharray="3,3"/>
                <rect x="200" y="10" width="110" height="30" fill="#e0e7ff" stroke="#4f46e5" rx="5"/><text x="255" y="30" text-anchor="middle" font-size="10">BaseDonnées</text>
                <line x1="255" y1="40" x2="255" y2="210" stroke="#4f46e5" stroke-dasharray="3,3"/>
                <!-- fragment loop -->
                <rect x="120" y="55" width="200" height="55" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" rx="6" stroke-dasharray="4,2"/>
                <text x="135" y="75" font-size="12" fill="#854d0e" font-weight="bold">loop [pour chaque article]</text>
                <path d="M 130 95 L 195 95" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrowSm)"/>
                <text x="165" y="90" text-anchor="middle" font-size="9">vérifierStock()</text>
                <!-- fragment alt -->
                <rect x="120" y="130" width="250" height="70" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="6" stroke-dasharray="4,2"/>
                <text x="135" y="148" font-size="11" fill="#14532d" font-weight="bold">alt [stock disponible]</text>
                <path d="M 135 165 L 195 165" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrowSm)"/><text x="165" y="160" font-size="9">confirmerCommande()</text>
                <line x1="140" y1="175" x2="360" y2="175" stroke="#16a34a" stroke-width="0.8" stroke-dasharray="3,3"/>
                <text x="145" y="192" font-size="10" fill="#2d6a4f">[sinon] : retour erreur</text>
                <defs><marker id="arrowSm" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#1e3a8a"/></marker></defs>
              </svg>
            </div>
          `;
        }
        else if (slide.visualExample) {
          html += `
            <div class="my-6 bg-indigo-50/40 p-5 rounded-2xl border border-indigo-200">
              <p class="font-medium text-indigo-800 mb-3">📱 Exemple concret : tentative de connexion avec alt + loop</p>
              <svg viewBox="0 0 620 380" class="w-full max-w-2xl mx-auto uml-diagram-svg bg-white p-1">
                <rect x="20" y="15" width="90" height="32" fill="#e0e7ff" stroke="#4f46e5" rx="6"/><text x="65" y="36" text-anchor="middle" font-size="10">Utilisateur</text><line x1="65" y1="47" x2="65" y2="340" stroke="#4f46e5" stroke-dasharray="4,3"/>
                <rect x="170" y="15" width="100" height="32" fill="#e0e7ff" stroke="#4f46e5" rx="6"/><text x="220" y="36" text-anchor="middle" font-size="10">:Application</text><line x1="220" y1="47" x2="220" y2="340" stroke="#4f46e5" stroke-dasharray="4,3"/>
                <rect x="380" y="15" width="110" height="32" fill="#e0e7ff" stroke="#4f46e5" rx="6"/><text x="435" y="36" text-anchor="middle" font-size="10">:AuthService</text><line x1="435" y1="47" x2="435" y2="340" stroke="#4f46e5" stroke-dasharray="4,3"/>
                <!-- loop alt complexe -->
                <rect x="90" y="70" width="380" height="130" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" rx="8" stroke-dasharray="5,3"/>
                <text x="100" y="90" font-size="12" fill="#a16207" font-weight="bold">loop (max 3 essais)</text>
                <path d="M 110 110 L 210 110" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr)"/><text x="160" y="105" text-anchor="middle" font-size="9">saisirInfos(login,pwd)</text>
                <path d="M 225 130 L 425 130" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr)"/><text x="325" y="125" text-anchor="middle" font-size="9">verifierCred(login,pwd)</text>
                <rect x="100" y="150" width="360" height="45" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3" rx="5" stroke-dasharray="4,2"/>
                <text x="110" y="168" font-size="11" fill="#14532d" font-weight="bold">alt [valide]</text>
                <path d="M 125 185 L 210 185" stroke="#1e3a8a" stroke-width="1.3" marker-end="url(#arr)"/><text x="170" y="180" font-size="9">succès()</text>
                <line x1="110" y1="195" x2="450" y2="195" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,3"/>
                <text x="115" y="212" font-size="10" fill="#2b6e3c">[sinon] échec → incrémenter tentative</text>
                <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#1e3a8a"/></marker></defs>
              </svg>
              <p class="text-sm text-gray-600 mt-3">💡 On voit la combinaison loop (répétition des tentatives) et alt (condition de validation).</p>
            </div>
          `;
        }
        else if (slide.tips) {
          html += `<div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg mt-4"><p class="text-blue-800">✨ Astuces pratiques :</p><ul class="list-disc ml-5 mt-2 text-gray-700 space-y-1">${slide.paragraphs.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
        }
        else {
          // fallback si aucun diagramme spécifique
          if (!slide.visualExample && !slide.diagram && !slide.tips) {
            html += `<div class="prose max-w-none"></div>`;
          }
        }
        html += `</div>`;
      }
      else if (slide.type === 'recap') {
        html = `
          <div class="${commonContainer} bg-white">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4 mb-5">📌 ${slide.title}</h2>
            <ul class="space-y-3">
              ${slide.points.map(p => `<li class="flex items-start gap-2"><span class="text-green-600 text-xl">✔</span><span class="text-gray-700">${p}</span></li>`).join('')}
            </ul>
            <div class="mt-8 p-4 bg-indigo-100 rounded-xl text-center text-indigo-900 font-medium">🚀 Prochaine étape : s'exercer avec des cas concrets !</div>
          </div>
        `;
      }
      $("#slideContent").fadeOut(150, function() {
        $(this).html(html).fadeIn(200);
      });
      $("#currentSlideIdx").text(index+1);
      $("#totalSlides").text(total);
      // gestion boutons disabled
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === total-1);
    }

    function nextSlide() { if(currentIndex < total-1) { currentIndex++; renderSlide(currentIndex); } }
    function prevSlide() { if(currentIndex > 0) { currentIndex--; renderSlide(currentIndex); } }

    $(document).ready(function(){
      renderSlide(0);
      $("#nextSlide").on("click", nextSlide);
      $("#prevSlide").on("click", prevSlide);
      $(document).keydown(function(e){
        if(e.key === "ArrowRight") nextSlide();
        else if(e.key === "ArrowLeft") prevSlide();
      });
      // swipe simple pour mobile
      let touchStartX = 0;
      $("#slidesWrapper").on("touchstart", function(e){ touchStartX = e.originalEvent.touches[0].clientX; });
      $("#slidesWrapper").on("touchend", function(e){
        if(!touchStartX) return;
        let diff = e.originalEvent.changedTouches[0].clientX - touchStartX;
        if(diff > 60) prevSlide();
        else if(diff < -60) nextSlide();
        touchStartX = 0;
      });
    });
  </script>
</body>
</html>
