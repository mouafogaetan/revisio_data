<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Génie logiciel",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours (8 pts)",
      "points": "8 pts",
      "enonce": "<div><p>Répondez de manière claire et précise aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1.1 (2 pts)</strong> : Distinguez les <strong>exigences fonctionnelles</strong> des <strong>exigences non fonctionnelles</strong> dans le cadre du génie logiciel. Pour chacune, donnez un exemple concret pour un système de <em>gestion de e-commerce</em>. [citation:2][citation:5]</p>",
          "reponse": "<p><strong>Exigences fonctionnelles</strong> : Définissent ce que le système <strong>doit faire</strong>. Ce sont des actions spécifiques. Exemple : \"Le système doit permettre à un client d'ajouter un produit à son panier.\" [citation:2][citation:5]</p><p><strong>Exigences non fonctionnelles</strong> : Qualifient <strong>comment</strong> le système exécute ses fonctions. Ce sont des contraintes de performance, sécurité, etc. Exemple : \"Le temps de réponse pour l'ajout au panier doit être inférieur à 2 secondes.\" [citation:2][citation:5][citation:8]</p>"
        },
        {
          "question": "<p><strong>1.2 (2 pts)</strong> : Expliquez brièvement ce qu'est le <strong>diagramme de cas d'utilisation</strong> en UML. Identifiez ses deux principaux composants et décrivez brièvement la relation <strong>&lt;&lt;include&gt;&gt;</strong>. [citation:8][citation:10]</p>",
          "reponse": "<p>Le diagramme de cas d'utilisation est un diagramme comportemental qui modélise les <strong>interactions</strong> entre les <strong>acteurs</strong> (utilisateurs, systèmes externes) et le système lui-même. [citation:8]</p><p><strong>Composants :</strong></p><ul><li><strong>Acteur</strong> : Entité externe qui interagit avec le système.</li><li><strong>Cas d'utilisation</strong> : Fonctionnalité offerte par le système.</li></ul><p>La relation <strong>&lt;&lt;include&gt;&gt;</strong> indique qu'un cas d'utilisation <strong>inclut obligatoirement</strong> les étapes d'un autre cas d'utilisation. Par exemple, le cas \"Passer une commande\" <strong>inclut</strong> le cas \"S'authentifier\". [citation:10]</p>"
        },
        {
          "question": "<p><strong>1.3 (2 pts)</strong> : Dans le cadre des tests logiciels, définissez ce qu'est un <strong>test de non-régression</strong> et expliquez pourquoi il est important, en citant un exemple concret.</p>",
          "reponse": "<p>Un <strong>test de non-régression</strong> est un test exécuté après toute modification du code (nouvelle fonctionnalité, correction de bug) pour <strong>s'assurer que les fonctionnalités existantes n'ont pas été affectées</strong>. Il permet de détecter les \"régressions\", c'est-à-dire les bugs introduits par le changement. [citation:5][citation:6]</p><p><strong>Exemple</strong> : Après avoir ajouté un nouveau filtre de recherche, on réexécute les tests pour vérifier que l'ancien filtre fonctionne toujours correctement. </p><p><strong>Importance</strong> : C'est un élément clé de la maintenance, car il prévient l'introduction de bugs coûteux et assure la stabilité du logiciel dans le temps. [citation:5][citation:6]</p>"
        },
        {
          "question": "<p><strong>1.4 (2 pts)</strong> : Expliquez les différences entre un <strong>modèle de cycle de vie en cascade</strong> et une <strong>méthode agile (Scrum, XP)</strong>. Dans quel contexte l'approche agile est-elle particulièrement recommandée ? [citation:5][citation:9]</p>",
          "reponse": "<p><strong>Cascade :</strong> Modèle séquentiel et rigide. Les phases (besoins, conception, implémentation, test) se succèdent sans retour en arrière possible. Il est adapté aux projets aux <strong>exigences stables et bien connues dès le départ</strong>. [citation:5][citation:6]</p><p><strong>Agile (Scrum, XP) :</strong> Modèle itératif et incrémental. Le développement se fait par cycles courts (sprints) avec une forte collaboration client. Il est conçu pour <strong>s'adapter aux changements de besoins</strong> et livrer rapidement de la valeur. [citation:5][citation:9]</p><p><strong>Contexte recommandé :</strong> L'approche agile est particulièrement adaptée aux <strong>projets à exigences évolutives</strong>, aux environnements innovants, ou lorsque le client souhaite être impliqué et voir des résultats rapidement. [citation:5][citation:9]</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Cas pratique - Étude de cas (12 pts)",
      "points": "12 pts",
      "enonce": "<div><p>L'entreprise <strong>\"Shop'Innov\"</strong>, une start-up camerounaise, souhaite développer une application mobile pour son service de livraison de repas. L'application doit permettre aux clients de :</p><ul><li>Consulter un catalogue de restaurants et de plats.</li><li>Passer une commande en ligne.</li><li>Suivre la livraison en temps réel (via géolocalisation).</li><li>Payer sécurisé (Mobile Money, carte).</li></ul><p>L'équipe de développement est composée de 5 personnes et souhaite adopter une approche agile (Scrum).</p></div>",
      "questions": [
        {
          "question": "<p><strong>2.1 (3 pts)</strong> : Rédigez <strong>trois user stories</strong> pour ce projet selon le format <strong>\"En tant que... je veux... afin de...\"</strong>. Chaque user story doit être réaliste. [citation:1][citation:4]</p>",
          "reponse": "<p><strong>User Story 1 :</strong> En tant que <em>client</em>, je veux <em>consulter le catalogue des restaurants disponibles près de chez moi</em> afin de <em>choisir mon repas facilement</em>.</p><p><strong>User Story 2 :</strong> En tant que <em>client</em>, je veux <em>suivre la position de mon livreur en temps réel sur une carte</em> afin de <em>savoir quand mon repas arrivera</em>.</p><p><strong>User Story 3 :</strong> En tant que <em>client</em>, je veux <em>payer ma commande via Mobile Money</em> afin de <em>régler rapidement et en toute sécurité</em>. [citation:1][citation:4]</p>"
        },
        {
          "question": "<p><strong>2.2 (4 pts)</strong> : Créez un <strong>diagramme de cas d'utilisation</strong> textuel (ou décrivez précisément un acteur et un cas d'utilisation).</p><ol><li>Identifiez <strong>deux acteurs</strong> du système et justifiez votre choix.</li><li>Proposez un <strong>cas d'utilisation</strong> (ex: \"Passer commande\") et décrivez son scénario nominal en <strong>5 étapes</strong>.</li></ol>",
          "reponse": "<p><strong>1. Acteurs :</strong></p><ul><li><strong>Client :</strong> Acteur principal, il initie les interactions (consulter, commander, payer).</li><li><strong>Livreur :</strong> Acteur secondaire, il a des interactions spécifiques (mise à jour de position, confirmation de livraison).</li></ul><p><strong>2. Cas d'utilisation \"Passer une commande\" :</strong></p><p><strong>Scénario nominal :</strong></p><ol><li>Le client sélectionne un restaurant et un plat dans le catalogue.</li><li>Le client valide son choix et accède à son panier.</li><li>Le client choisit son adresse de livraison.</li><li>Le client sélectionne son mode de paiement (Mobile Money).</li><li>Le système confirme la commande et affiche un récapitulatif. [citation:4]</li></ol>"
        },
        {
          "question": "<p><strong>2.3 (3 pts)</strong> : L'équipe a estimé que l'application doit supporter jusqu'à <strong>10 000 utilisateurs simultanés</strong> lors des heures de pointe. Quel(s) <strong>test(s) de performance</strong> recommanderiez-vous pour valider cette exigence ? Justifiez votre réponse en expliquant l'objectif de chaque test.</p>",
          "reponse": "<p><strong>1. Load Testing (test de charge) :</strong> Pour simuler progressivement une montée en charge jusqu'à <strong>10 000 utilisateurs simultanés</strong> et observer le temps de réponse, l'utilisation des ressources, et le moment où les performances se dégradent. [citation:5][citation:6]</p><p><strong>2. Stress Testing (test de stress) :</strong> Pour pousser le système <strong>au-delà</strong> de 10 000 utilisateurs (ex: 12 000) et observer son comportement et comment il se rétablit. L'objectif est de connaître les limites du système pour anticiper les pannes. [citation:5][citation:6]</p><p><strong>Justification :</strong> Ces deux tests permettent de valider les performances à la charge attendue (load) et de connaître la robustesse du système en cas de pic imprévu (stress), garantissant une expérience utilisateur stable. [citation:6]</p>"
        },
        {
          "question": "<p><strong>2.4 (2 pts)</strong> : L'un des développeurs propose d'utiliser le <strong>patron Singleton</strong> pour gérer la connexion à la base de données. Expliquez en quoi consiste ce patron de conception et discutez brièvement de l'opportunité de son utilisation dans ce contexte. [citation:3][citation:4]</p>",
          "reponse": "<p>Le <strong>Singleton</strong> est un patron de conception qui garantit qu'une <strong>classe n'a qu'une seule instance</strong> et fournit un point d'accès global à celle-ci. [citation:3]</p><p><strong>Opportunité :</strong> Son utilisation pour gérer une connexion à la base de données peut être pertinente car elle évite de créer de multiples connexions, ce qui pourrait saturer les ressources et ralentir l'application. Cependant, il faut l'utiliser avec précaution, car il peut introduire des dépendances globales et complexifier les tests unitaires. [citation:4]</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
