<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Génie logiciel",
  "classe": "Développement Web",
  "sequence": "Séquence 3 : Principes, patrons de conception et architectures",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours sur les principes SOLID et les styles architecturaux",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Répondez aux questions suivantes en vous appuyant sur les notions vues en cours sur les principes de conception et les architectures logicielles [citation:2].</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.1 (1,5 pts)</strong> Expliquez en quelques lignes ce qu'est le principe de responsabilité unique (SRP - Single Responsibility Principle) dans SOLID. Donnez un exemple concret pour une classe d'une application e-commerce.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Le principe de responsabilité unique stipule qu'une classe ne doit avoir qu'une seule raison de changer, c'est-à-dire qu'elle doit avoir une seule responsabilité [citation:2]. Dans une application e-commerce, une classe <code>Product</code> ne devrait gérer que les données du produit (nom, prix, description). La gestion de la base de données ou l'affichage de l'interface utilisateur ne doivent pas être dans cette classe, mais dans des classes séparées comme <code>ProductRepository</code> ou <code>ProductView</code>. Cela rend le code plus facile à maintenir, à tester et à faire évoluer.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.2 (1,5 pts)</strong> Décrivez l'architecture en couches (présentation, métier, persistance). Quel est l'intérêt de cette séparation pour la maintenance d'un logiciel ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> L'architecture en couches organise le code en trois couches principales : <strong>présentation</strong> (interface utilisateur), <strong>métier</strong> (logique métier, règles de gestion) et <strong>persistance</strong> (accès aux données, API) [citation:2]. L'intérêt est la <strong>séparation des préoccupations</strong> : chaque couche a un rôle bien défini. Cela facilite la maintenance car on peut modifier une couche sans impacter les autres. Par exemple, changer de base de données (couche persistance) ne nécessite pas de modifier la logique métier.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.3 (1,5 pts)</strong> Expliquez la différence entre les architectures monolithique et microservices. Dans quel contexte choisir l'une plutôt que l'autre ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> L'architecture <strong>monolithique</strong> regroupe tous les composants (frontend, backend, base de données) dans un seul code base. Elle est simple à développer et déployer, mais difficile à faire évoluer. L'architecture en <strong>microservices</strong> découpe l'application en petits services indépendants, chacun avec sa propre base de données. Elle offre une grande flexibilité mais est plus complexe à gérer. On choisit un monolithe pour un petit projet ou une start-up ; on opte pour les microservices pour un projet complexe avec une grande équipe et des besoins d'évolutivité importants [citation:2].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.4 (1,5 pts)</strong> Pourquoi dit-on que l'architecture hexagonale (ports & adaptateurs) isole le domaine métier des technologies externes ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> L'architecture hexagonale place le domaine métier au centre et le protège des technologies externes (base de données, API, UI) via des <strong>ports</strong> et des <strong>adaptateurs</strong>. Le domaine métier ne dépend pas directement des technologies, mais de contrats (ports) que les technologies implémentent (adaptateurs). Cela permet de changer facilement de technologie (ex: passer de MongoDB à PostgreSQL) sans impacter la logique métier. C'est une architecture très flexible et testable.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyser un code et proposer des améliorations",
      "points": "7 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Vous travaillez sur une application de gestion de commandes. Voici une classe <code>OrderService</code> qui gère à la fois le calcul du prix, l'enregistrement en base de données et l'envoi d'emails. Vous soupçonnez qu'elle viole plusieurs principes SOLID.</p><div style='background: #1e293b; padding: 15px; border-radius: 8px; color: #f1f5f9; font-family: monospace; overflow-x: auto;'>public class OrderService {<br>  public void processOrder(Order order) {<br>    // Calcul du prix total<br>    double total = 0;<br>    for (Item item : order.getItems()) {<br>      total += item.getPrice() * item.getQuantity();<br>    }<br>    order.setTotal(total);<br><br>    // Enregistrement en base de données<br>    Database.save(order);<br><br>    // Envoi d'un email de confirmation<br>    EmailSender.send(order.getCustomerEmail(), \"Commande confirmée\");<br>  }<br>}</div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.1 (1 pt)</strong> Identifiez le principe SOLID que cette classe viole le plus clairement. Justifiez votre réponse.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Cette classe viole le <strong>principe de responsabilité unique (SRP)</strong>. Elle a plusieurs responsabilités : le calcul du prix total, l'enregistrement en base de données et l'envoi d'emails. Une modification dans l'une de ces responsabilités (ex: changer la façon d'envoyer les emails) obligerait à modifier la classe <code>OrderService</code>, ce qui va à l'encontre du SRP [citation:2].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.2 (3 pts)</strong> Proposez une refactorisation en respectant le principe de responsabilité unique. Vous pouvez créer des classes supplémentaires et expliquer leurs rôles.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Une refactorisation possible consiste à déléguer chaque responsabilité à une classe dédiée.<br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px; white-space: pre-wrap;'>public class OrderProcessor {<br>  private PriceCalculator priceCalculator;<br>  private OrderRepository orderRepository;<br>  private NotificationService notificationService;<br><br>  public void processOrder(Order order) {<br>    double total = priceCalculator.calculate(order);<br>    order.setTotal(total);<br>    orderRepository.save(order);<br>    notificationService.sendConfirmation(order);<br>  }<br>}<br><br>public class PriceCalculator {<br>  public double calculate(Order order) { ... }<br>}<br><br>public class OrderRepository {<br>  public void save(Order order) { ... }<br>}<br><br>public class NotificationService {<br>  public void sendConfirmation(Order order) { ... }<br>}</code><br>Chaque classe a une responsabilité unique, ce qui rend le code plus modulaire, testable et facile à maintenir.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.3 (3 pts)</strong> Cette refactorisation pourrait être vue comme une application d'un patron de conception. Lequel ? Expliquez en quoi il est utilisé ici.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Cette refactorisation s'apparente au patron de conception <strong>Facade</strong> (ou <strong>Service Layer</strong>). La classe <code>OrderProcessor</code> agit comme une façade qui orchestre l'exécution des différentes étapes du traitement d'une commande. Elle délègue le travail à des sous-systèmes (calculateur de prix, repository, service de notification) tout en simplifiant l'interface pour le client. Le client n'a besoin de connaître que la classe <code>OrderProcessor</code>, pas les détails des sous-systèmes [citation:2].</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Modéliser avec un diagramme de classes UML",
      "points": "7 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Un site de e-commerce souhaite modéliser son système de gestion de commandes. Voici les spécifications :</p><ul><li>Un <strong>Client</strong> peut passer plusieurs <strong>Commandes</strong>.</li><li>Une <strong>Commande</strong> contient plusieurs <strong>Lignes de commande</strong>, chacune associée à un <strong>Produit</strong> et à une quantité.</li><li>Un <strong>Produit</strong> peut être présent dans plusieurs commandes, mais avec une quantité différente à chaque fois.</li><li>L'application doit pouvoir calculer le <strong>total</strong> d'une commande en fonction du prix de chaque produit et de sa quantité.</li><li>Les <strong>Catégories</strong> de produits sont organisées de manière hiérarchique (une catégorie peut avoir des sous-catégories).</li></ul></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3.1 (2 pts)</strong> Identifiez les classes principales de ce système. Pour chacune, listez les attributs essentiels (avec leur type) et les méthodes principales (avec leur signature).</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><strong>Client</strong><br>Attributs : id: int, nom: String, email: String, adresse: String<br>Méthodes : passerCommande() : Commande, getCommandes() : List<Commande><br><br><strong>Commande</strong><br>Attributs : id: int, date: Date, statut: String, client: Client<br>Méthodes : ajouterLigne(produit: Produit, quantite: int), calculerTotal() : double, getLignes() : List<LigneCommande><br><br><strong>LigneCommande</strong><br>Attributs : produit: Produit, quantite: int<br>Méthodes : getSousTotal() : double<br><br><strong>Produit</strong><br>Attributs : id: int, nom: String, prix: double, categorie: Categorie<br>Méthodes : getPrix() : double<br><br><strong>Categorie</strong><br>Attributs : id: int, nom: String, parent: Categorie<br>Méthodes : getSousCategories() : List<Categorie></p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3.2 (3 pts)</strong> Représentez le diagramme de classes UML en utilisant du texte structuré. Précisez les multiplicités et les types de relations (association, agrégation, composition, héritage).</div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
