<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Génie logiciel",
  "classe": "Développement Web",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Planification et gestion de projet logiciel",
      "points": "8 pts",
      "enonce": "<p style='font-size:1.05rem; line-height:1.7;'>La start-up camerounaise <strong>\"AfriTech Solutions\"</strong> souhaite développer <strong>\"MboaMarket\"</strong>, une plateforme e-commerce mobile destinée à mettre en avant les produits artisanaux et agricoles des dix régions du Cameroun [citation:2][citation:7]. En tant qu'ingénieur logiciel, vous devez planifier ce projet.</p><div style='background-color:#f0f4f8; padding:0.8rem; border-radius:8px; margin-top:0.8rem; color:#1e293b;'><strong>Contexte :</strong> L'application doit être développée en 6 mois avec une équipe de 4 développeurs (2 frontend, 2 backend). Le budget est limité et le pays connaît parfois des instabilités de connexion internet.</div>",
      "questions": [
        {
          "question": "<p><strong>1.1) Estimation et planning</strong> <em>(3 pts)</em></p><p>a) Estimez l'effort de développement de MboaMarket en utilisant la <strong>méthode des points de fonction</strong>. Identifiez au moins 5 fonctions et estimez leur complexité.</p><p>b) Construisez un <strong>diagramme de Gantt</strong> simplifié pour les 6 mois. Identifiez les phases et les tâches principales (analyse, conception, développement, tests, déploiement).</p>",
          "reponse": "<p><strong>a) Points de fonction estimés :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>Fonctionnalités identifiées :<br>1. Catalogue produits (consultation, recherche) - 50 PF (complexité moyenne)<br>2. Panier d'achat (ajout, modification, suppression) - 30 PF (complexité élevée)<br>3. Authentification (inscription, connexion, gestion de profil) - 25 PF (complexité moyenne)<br>4. Paiement en ligne (intégration mobile money, carte) - 40 PF (complexité élevée)<br>5. Interface administrateur (gestion produits, commandes) - 45 PF (complexité moyenne)<br>6. Gestion des commandes (historique, statut, notifications) - 35 PF (complexité moyenne)<br>Total estimé : ~225 points de fonction</code></div><p><strong>b) Diagramme de Gantt simplifié :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>Mois 1-2 : Analyse et conception (spécifications, wireframes, architecture)<br>Mois 3-4 : Développement frontend (React Native) et backend (API NestJS)<br>Mois 5 : Tests unitaires, intégration, QA, et corrections<br>Mois 6 : Déploiement, documentation, formation, et livraison</code></div>"
        },
        {
          "question": "<p><strong>1.2) Gestion des risques</strong> <em>(3 pts)</em></p><p>a) Identifiez et priorisez au moins <strong>4 risques</strong> pour MboaMarket en utilisant une <strong>matrice de risques</strong> (Probabilité × Impact).</p><p>b) Proposez une <strong>stratégie de mitigation</strong> pour chaque risque identifié.</p>",
          "reponse": "<div><p><strong>a) Matrice de risques :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>| Risque | Probabilité | Impact | Niveau de risque |<br>| Connexion internet instable | Élevée | Élevé | CRITIQUE |<br>| Départ d'un développeur | Moyenne | Élevé | ÉLEVÉ |<br>| Problèmes de sécurité (paiement) | Moyenne | Très élevé | ÉLEVÉ |<br>| Retard sur la roadmap | Élevée | Moyen | ÉLEVÉ |</code></div><p><strong>b) Stratégies de mitigation :</strong></p><ul style='list-style-type:disc; padding-left:1.2rem;'><li><strong>Connexion internet instable</strong> : Implémenter un mode hors-ligne avec cache local et synchronisation automatique au retour en ligne.</li><li><strong>Départ d'un développeur</strong> : Pratiquer le pair programming et documenter rigoureusement le code pour faciliter la transmission.</li><li><strong>Problèmes de sécurité</strong> : Intégrer un système de gestion des tokens JWT, utiliser des protocoles HTTPS et faire auditer les transactions de paiement.</li><li><strong>Retard sur la roadmap</strong> : Réviser la roadmap mensuellement, prioriser les fonctionnalités MVP et prévoir des marges de 20% dans le calendrier.</li></ul></div>"
        },
        {
          "question": "<p><strong>1.3) Outils de gestion de projet et métriques</strong> <em>(2 pts)</em></p><p>a) Recommandez un <strong>outil de gestion de projet</strong> (Jira, Trello, ClickUp, etc.) pour MboaMarket. Justifiez votre choix.</p><p>b) Expliquez comment vous utiliseriez la <strong>métrique de vélocité</strong> dans un contexte agile. Qu'est-ce qu'un <strong>burn-down chart</strong> et comment peut-il aider à suivre l'avancement ?</p>",
          "reponse": "<p><strong>a) Outil recommandé :</strong> Je recommande <strong>Jira</strong> ou <strong>ClickUp</strong> car ils supportent bien les méthodologies agiles (Scrum, Kanban) et offrent des fonctionnalités de suivi des sprints, des burndown charts, et des tableaux de bord.</p><p><strong>b) Métrique de vélocité :</strong> La <strong>vélocité</strong> mesure la quantité de travail qu'une équipe peut réaliser par sprint (en points de story). Elle permet de prévoir la capacité future et d'ajuster le planning. Un <strong>burn-down chart</strong> est un graphique qui montre l'évolution du travail restant dans un sprint. Il permet de visualiser si l'équipe est sur la bonne voie pour terminer le sprint dans les délais.</p>"
        }
      ]
    },
    {
      "titre": "Intégration continue, déploiement et qualité",
      "points": "6 pts",
      "enonce": "<p>L'équipe d'AfriTech Solutions a décidé d'adopter l'<strong>Intégration Continue</strong> et le <strong>Déploiement Continu</strong> pour MboaMarket.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1) Pipeline CI/CD</strong> <em>(2 pts)</em></p><p>a) Expliquez les principes de l'<strong>Intégration Continue (CI)</strong> et pourquoi elle est importante pour MboaMarket.</p><p>b) Proposez un <strong>pipeline CI</strong> minimal (étapes) avec un outil comme <strong>GitHub Actions</strong> ou <strong>GitLab CI</strong>.</p>",
          "reponse": "<p><strong>a) Principes de la CI :</strong> L'Intégration Continue (CI) consiste à intégrer automatiquement le code des développeurs dans un dépôt partagé plusieurs fois par jour. À chaque intégration, un pipeline automatisé compile le code, exécute les tests, et vérifie la qualité. Pour MboaMarket, la CI permet de détecter les erreurs d'intégration et les régressions rapidement, garantissant une meilleure qualité et un déploiement plus sûr.</p><p><strong>b) Pipeline CI minimal :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>name: CI Pipeline<br>on: push<br>jobs:<br>  build-and-test:<br>    runs-on: ubuntu-latest<br>    steps:<br>      - uses: actions/checkout@v3<br>      - uses: actions/setup-node@v3<br>      - run: npm install<br>      - run: npm run lint<br>      - run: npm run test<br>      - run: npm run build</code></div>"
        },
        {
          "question": "<p><strong>2.2) Déploiement continu (CD)</strong> <em>(2 pts)</em></p><p>a) Distinguez <strong>livraison continue</strong> et <strong>déploiement continu</strong>.</p><p>b) Expliquez comment utiliser des <strong>feature flags</strong> pour un déploiement plus sûr.</p>",
          "reponse": "<p><strong>a) Distinction :</strong></p><ul style='list-style-type:disc; padding-left:1.2rem;'><li><strong>Livraison continue (CD)</strong> : Le code est automatiquement livré dans un environnement de test ou de staging après validation, mais le déploiement en production nécessite une approbation manuelle.</li><li><strong>Déploiement continu (CD)</strong> : Chaque changement validé est automatiquement déployé en production sans intervention manuelle, après le passage des tests automatisés.</li></ul><p><strong>b) Feature flags :</strong> Les <strong>feature flags</strong> (ou toggles de fonctionnalités) permettent d'activer ou désactiver une fonctionnalité sans redéployer l'application. Cela permet de déployer du code en production sans l'exposer aux utilisateurs, de tester des fonctionnalités sur un sous-ensemble d'utilisateurs (canary deployment), et de désactiver rapidement une fonctionnalité défaillante sans rollback.</p>"
        },
        {
          "question": "<p><strong>2.3) Dette technique et refactoring</strong> <em>(2 pts)</em></p><p>a) Qu'est-ce que la <strong>dette technique</strong> et quel impact a-t-elle sur un projet comme MboaMarket ?</p><p>b) Expliquez le principe <strong>\"DRY\" (Don't Repeat Yourself)</strong> et comment il permet de réduire la dette technique.</p>",
          "reponse": "<p><strong>a) Dette technique :</strong> La dette technique est un concept métaphorique représentant le coût de maintenabilité supplémentaire dû à des choix de conception ou de développement sous-optimaux. Par exemple, une solution rapide mais mal architecturée pour respecter un délai. Pour MboaMarket, une dette technique élevée peut ralentir l'ajout de nouvelles fonctionnalités, augmenter le nombre de bugs, et rendre le code difficile à maintenir pour les développeurs.</p><p><strong>b) Principe DRY :</strong> Le principe <strong>DRY (Don't Repeat Yourself)</strong> signifie qu'il ne faut pas dupliquer le code ou la logique métier. Chaque connaissance (ou règle métier) doit avoir une représentation unique et sans ambiguïté dans le système. En centralisant la logique, DRY réduit le risque d'incohérence (correction d'un bug en un seul endroit) et facilite la maintenance, ce qui réduit la dette technique.</p>"
        }
      ]
    },
    {
      "titre": "Communication et collaboration en équipe",
      "points": "6 pts",
      "enonce": "<p>La communication est un facteur clé pour la réussite de MboaMarket. L'équipe est composée de 4 développeurs répartis entre Douala et Yaoundé.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1) Outils collaboratifs et revues de code</strong> <em>(2 pts)</em></p><p>a) Quels <strong>outils collaboratifs</strong> recommandez-vous pour faciliter la communication et le partage de connaissances au sein d'une équipe distribuée ?</p><p>b) Expliquez l'importance des <strong>revues de code (code reviews)</strong> dans un projet comme MboaMarket.</p>",
          "reponse": "<p><strong>a) Outils collaboratifs :</strong></p><ul style='list-style-type:disc; padding-left:1.2rem;'><li><strong>Slack ou Teams</strong> : Messagerie instantanée pour les communications quotidiennes.</li><li><strong>Confluence ou Notion</strong> : Documentation partagée pour les spécifications, les décisions d'architecture et les procédures.</li><li><strong>GitHub/GitLab</strong> : Gestion de code avec fonctionnalités de revue de code et d'intégration continue.</li><li><strong>Jira ou Trello</strong> : Suivi des tâches, des sprints et de l'avancement.</li></ul><p><strong>b) Revues de code (code reviews) :</strong> Une revue de code est un examen systématique du code par les pairs. Elle permet de :</p><ul style='list-style-type:disc; padding-left:1.2rem;'><li>Détecter les bugs, les erreurs de logique et les failles de sécurité.</li><li>Partager les connaissances et les bonnes pratiques entre les développeurs.</li><li>Vérifier le respect des standards de qualité et des conventions de codage.</li><li>Garantir la maintenabilité et l'évolutivité du code à long terme.</li></ul>"
        },
        {

          "reponse": "<p><strong>a) Daily meetings :</strong> Les <strong>daily meetings (stand-ups)</strong> sont des réunions quotidiennes de 15 minutes où chaque membre répond à 3 questions : Qu'ai-je fait hier ? Que vais-je faire aujourd'hui ? Quels sont les obstacles ? Pour une équipe distribuée, ils permettent de :</p><ul style='list-style-type:disc; padding-left:1.2rem;'><li>Synchroniser les membres et identifier rapidement les blocages.</li><li>Renforcer la cohésion d'équipe malgré la distance géographique.</li><li>Ajuster le planning et la répartition des tâches en temps réel.</li></ul><p><strong>b) Pair programming :</strong> Le <strong>pair programming</strong> est une technique où deux développeurs travaillent ensemble sur un même poste. L'un écrit le code (le pilote), l'autre examine chaque ligne (le navigateur) et propose des améliorations. Les avantages sont :</p><ul style='list-style-type:disc; padding-left:1.2rem;'><li>Réduction du nombre de bugs (le navigateur repère les erreurs en temps réel).</li><li>Transfert de connaissances et montée en compétence des développeurs juniors.</li><li>Meilleure conception du code, car le navigateur apporte un point de vue critique.</li><li>Réduction de l'effet \"bus factor\" (un développeur qui quitte ne laisse pas de code incompréhensible).</li></ul>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
