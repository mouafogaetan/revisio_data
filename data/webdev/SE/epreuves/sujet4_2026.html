<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>

            <span id="subjectInfo">Matière</span>

                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au Génie logiciel",
  "classe": "Développement Web",
  "sequence": "Séquence 4 - Principes SOLID, Patrons de conception et Architecture",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Principes SOLID",
      "points": "4 pts",
      "enonce": "<p>Les principes SOLID sont un ensemble de cinq principes de conception orientée objet qui permettent de créer des logiciels maintenables et évolutifs. Voici une brève description des cinq principes :</p><ul><li><strong>S</strong> - <em>Single Responsibility Principle</em> : Une classe doit avoir une seule responsabilité.</li><li><strong>O</strong> - <em>Open/Closed Principle</em> : Les entités doivent être ouvertes à l'extension mais fermées à la modification.</li><li><strong>L</strong> - <em>Liskov Substitution Principle</em> : Les objets d'une classe dérivée doivent pouvoir remplacer les objets de la classe de base sans altérer le fonctionnement du programme.</li><li><strong>I</strong> - <em>Interface Segregation Principle</em> : Il vaut mieux avoir plusieurs interfaces spécifiques plutôt qu'une seule interface générale.</li><li><strong>D</strong> - <em>Dependency Inversion Principle</em> : Les modules de haut niveau ne doivent pas dépendre des modules de bas niveau, mais des abstractions.</li></ul>",
      "questions": [
        {
          "question": "<p><strong>1. Analyse d'un code (2 pts)</strong></p><p>Considérez la classe suivante en Java :</p><pre><code>public class UserManager {\n    private Database database;\n    private EmailService emailService;\n\n    public UserManager() {\n        this.database = new Database();\n        this.emailService = new EmailService();\n    }\n\n    public void createUser(User user) {\n        database.save(user);\n        emailService.sendWelcomeEmail(user);\n    }\n\n    public void deleteUser(int userId) {\n        database.delete(userId);\n        emailService.sendGoodbyeEmail(userId);\n    }\n\n    public void updateUser(User user) {\n        database.update(user);\n    }\n}</code></pre><p><strong>Quels principes SOLID sont violés par cette classe ? Justifiez votre réponse en citant au moins deux principes et en expliquant comment les corriger.</strong></p>",
          "reponse": "<p>Cette classe viole le <strong>principe de responsabilité unique (SRP)</strong> car elle gère à la fois la persistance des données (base de données) et l'envoi d'emails. Elle devrait être divisée en plusieurs classes, chacune ayant une responsabilité unique.</p><p>Elle viole également le <strong>principe d'inversion de dépendance (DIP)</strong> car elle dépend directement des classes concrètes <code>Database</code> et <code>EmailService</code> plutôt que d'abstractions (interfaces). Cela rend le code difficile à tester et à modifier.</p><p><strong>Correction :</strong></p><ul><li>Créer des interfaces <code>UserRepository</code> et <code>NotificationService</code>.</li><li>Faire dépendre <code>UserManager</code> de ces interfaces via le constructeur (injection de dépendances).</li><li>Extraire la logique d'envoi d'emails dans une classe séparée responsable des notifications.</li></ul>"
        },
        {
          "question": "<p><strong>2. Application du principe Ouvert/Fermé (2 pts)</strong></p><p>Vous devez concevoir un système de calcul de salaire pour différents types d'employés : <code>Intern</code>, <code>Junior</code>, <code>Senior</code> et <code>Manager</code>. Chaque type a une formule de calcul différente.</p><p><strong>Proposez une conception qui respecte le principe Ouvert/Fermé (OCP).</strong> Vous pouvez utiliser un diagramme de classes ou un extrait de code pour illustrer votre réponse.</p>",
          "reponse": "<p>Pour respecter le principe Ouvert/Fermé, on peut utiliser le <strong>patron Strategy</strong> ou une <strong>hiérarchie de classes</strong> avec une méthode <code>calculateSalary()</code>.</p><pre><code>// Interface ou classe abstraite\npublic abstract class Employee {\n    protected String name;\n    protected double baseSalary;\n    public abstract double calculateSalary();\n}\n\n// Classes concrètes\npublic class Intern extends Employee {\n    @Override\n    public double calculateSalary() {\n        return baseSalary * 0.5; // 50% du salaire de base\n    }\n}\n\npublic class Junior extends Employee {\n    @Override\n    public double calculateSalary() {\n        return baseSalary * 1.0;\n    }\n}\n\npublic class Senior extends Employee {\n    @Override\n    public double calculateSalary() {\n        return baseSalary * 1.5 + 200;\n    }\n}\n\npublic class Manager extends Employee {\n    @Override\n    public double calculateSalary() {\n        return baseSalary * 2.0 + 500;\n    }\n}</code></pre><p>Cette conception est ouverte à l'extension : pour ajouter un nouveau type d'employé, il suffit de créer une nouvelle sous-classe sans modifier les classes existantes.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Patrons de conception",
      "points": "3 pts",
      "enonce": "<p>Les patrons de conception (design patterns) sont des solutions éprouvées à des problèmes récurrents en conception logicielle. Voici quelques patrons vus en cours :</p><ul><li><strong>Singleton</strong> : garantir qu'une classe n'a qu'une seule instance.</li><li><strong>Factory Method</strong> : définir une interface pour créer un objet, mais laisser les sous-classes décider quelle classe instancier.</li><li><strong>Observer</strong> : permettre à un objet de notifier d'autres objets de ses changements d'état.</li><li><strong>Strategy</strong> : définir une famille d'algorithmes, les encapsuler et les rendre interchangeables.</li></ul>",
      "questions": [
        {
          "question": "<p><strong>1. Identification du patron (1 pt)</strong></p><p>Voici un extrait de code :</p><pre><code>public class DataStore {\n    private static DataStore instance = null;\n\n    private DataStore() { }\n\n    public static DataStore getInstance() {\n        if (instance == null) {\n            instance = new DataStore();\n        }\n        return instance;\n    }\n\n    public void saveData(String data) { /* ... */ }\n    public String getData() { /* ... */ }\n}</code></pre><p><strong>De quel patron de conception s'agit-il ? À quelle catégorie (créationnel, structurel, comportemental) appartient-il ?</strong></p>",
          "reponse": "<p>Il s'agit du patron <strong>Singleton</strong>. Il appartient à la catégorie des <strong>patrons de création</strong> (creational patterns).</p><p>Le constructeur privé empêche la création d'instances externes, et la méthode statique <code>getInstance()</code> garantit qu'une seule instance de <code>DataStore</code> est créée et partagée dans toute l'application.</p>"
        },
        {
          "question": "<p><strong>2. Mise en œuvre d'un patron (2 pts)</strong></p><p>Vous développez une application de gestion de commandes. Vous devez implémenter un système de notification qui envoie des alertes par email, SMS et notification push. Les notifications peuvent être ajoutées ou supprimées dynamiquement.</p><p><strong>Quel patron de conception utiliseriez-vous et pourquoi ? Proposez une structure de code simple pour illustrer votre réponse.</strong></p>",
          "reponse": "<p>Le patron <strong>Observer</strong> est parfaitement adapté. Il permet à un sujet (<code>Order</code>) de notifier plusieurs observateurs (<code>EmailNotifier</code>, <code>SMSNotifier</code>, <code>PushNotifier</code>) lors d'un changement d'état, sans coupler le sujet aux observateurs.</p><pre><code>// Interface Observateur\npublic interface NotificationObserver {\n    void update(Order order);\n}\n\n// Sujet\npublic class Order {\n    private List&lt;NotificationObserver&gt; observers = new ArrayList&lt;&gt;();\n    private String status;\n\n    public void addObserver(NotificationObserver observer) {\n        observers.add(observer);\n    }\n\n    public void removeObserver(NotificationObserver observer) {\n        observers.remove(observer);\n    }\n\n    public void setStatus(String status) {\n        this.status = status;\n        notifyObservers();\n    }\n\n    private void notifyObservers() {\n        for (NotificationObserver observer : observers) {\n            observer.update(this);\n        }\n    }\n}\n\n// Observateur concret Email\npublic class EmailNotifier implements NotificationObserver {\n    @Override\n    public void update(Order order) {\n        System.out.println(\"Email : La commande est maintenant \" + order.getStatus());\n    }\n}\n\n// Observateur concret SMS\npublic class SMSNotifier implements NotificationObserver {\n    @Override\n    public void update(Order order) {\n        System.out.println(\"SMS : La commande est maintenant \" + order.getStatus());\n    }\n}</code></pre><p>Cette conception permet d'ajouter ou de retirer facilement des canaux de notification sans modifier la classe <code>Order</code>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Architecture logicielle",
      "points": "3 pts",
      "enonce": "<p>L'architecture logicielle définit la structure globale d'un système. Voici quelques styles architecturaux :</p><ul><li><strong>Monolithique</strong> : l'application est une seule unité.</li><li><strong>Microservices</strong> : l'application est divisée en services indépendants.</li><li><strong>Architecture en couches</strong> : organisation en couches (présentation, métier, persistance).</li><li><strong>Architecture hexagonale</strong> : séparation entre le cœur métier et les adaptateurs externes (ports & adaptateurs).</li></ul>",
      "questions": [
        {
          "question": "<p><strong>1. Choix d'architecture (1.5 pts)</strong></p><p>Vous devez développer une application de réservation de vols pour une compagnie aérienne. Les exigences incluent :</p><ul><li>Le système doit être hautement disponible (24h/24, 7j/7).</li><li>Le trafic peut être très variable (périodes de forte demande).</li><li>L'équipe de développement est grande (plusieurs équipes travaillent sur différentes fonctionnalités).</li><li>Le système doit évoluer fréquemment (nouvelles fonctionnalités, partenaires).</li></ul><p><strong>Quel style architectural recommandez-vous et pourquoi ?</strong></p>",
          "reponse": "<p>Je recommande une architecture <strong>microservices</strong> pour les raisons suivantes :</p><ul><li><strong>Disponibilité</strong> : un microservice peut tomber sans affecter les autres (ex : service de paiement vs service de réservation).</li><li><strong>Scalabilité</strong> : on peut scaler horizontalement uniquement les services qui en ont besoin (ex : service de recherche pendant les pics).</li><li><strong>Équipes</strong> : chaque équipe peut développer, déployer et maintenir son propre service de manière indépendante.</li><li><strong>Évolutivité</strong> : on peut ajouter de nouvelles fonctionnalités en créant de nouveaux services sans impacter l'existant.</li><li><strong>Déploiement</strong> : les services peuvent être déployés indépendamment, permettant une fréquence de déploiement plus élevée.</li></ul><p>Les inconvénients (complexité, latence réseau, gestion des transactions distribuées) sont acceptables compte tenu des besoins.</p>"
        },
        {
          "question": "<p><strong>2. Architecture hexagonale (1.5 pts)</strong></p><p>Expliquez en quoi consiste l'<strong>architecture hexagonale</strong> (ou ports & adaptateurs).</p><p><strong>Quels sont ses avantages par rapport à une architecture en couches classique ?</strong></p>",
          "reponse": "<p>L'<strong>architecture hexagonale</strong> (aussi appelée ports & adaptateurs) consiste à placer le <strong>cœur métier</strong> au centre du système, isolé des technologies externes (base de données, API, interfaces utilisateur). Les interactions avec le monde extérieur se font via des <strong>ports</strong> (interfaces) et des <strong>adaptateurs</strong> (implémentations concrètes).</p><p><strong>Avantages par rapport à l'architecture en couches :</strong></p><ul><li><strong>Testabilité</strong> : le cœur métier peut être testé indépendamment des technologies externes (en remplaçant les adaptateurs par des mocks).</li><li><strong>Évolutivité</strong> : il est facile de remplacer un adaptateur (ex : passer de MySQL à MongoDB) sans toucher au cœur métier.</li><li><strong>Clarté</strong> : la séparation entre la logique métier et l'infrastructure est plus stricte, rendant le code plus maintenable.</li><li><strong>Indépendance technologique</strong> : le cœur métier ne dépend d'aucune bibliothèque externe, ce qui facilite les migrations techniques.</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
