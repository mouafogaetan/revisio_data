        ];

        let currentIndex = 0;
        const totalSlides = slidesData.length;

        // Mise à jour affichage slide et compteur
        function renderSlide(index) {
            const slide = slidesData[index];
            if (!slide) return;
            const titleHtml = `<h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-5 pb-2 border-b border-indigo-200">${slide.title}</h2>`;
            const fullContent = `
                <div class="slide fade-in">
                    ${titleHtml}
                    <div class="prose prose-slate max-w-none text-gray-800">
                        ${slide.content}
                    </div>
                </div>
            `;
            $("#slide-content").html(fullContent);
            $("#slide-counter").text(`${index+1} / ${totalSlides}`);
            // désactiver boutons si besoin
            $("#prevSlide").prop("disabled", index === 0);
            $("#nextSlide").prop("disabled", index === totalSlides-1);
            // déclencher MathJax pour les formules si nécessaires
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
            // scroll en haut du container pour une meilleure expérience mobile
            $(".rounded-3xl").animate({ scrollTop: 0 }, 100);
        }

        // Navigation
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                renderSlide(currentIndex);
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        }

        // Gestion clavier (gauche/droite)
        $(document).keydown(function(e) {
            if (e.key === "ArrowLeft") {
                prevSlide();
                e.preventDefault();
            } else if (e.key === "ArrowRight") {
                nextSlide();
                e.preventDefault();
            }
        });

        // Événements boutons
        $("#nextSlide").on("click", nextSlide);
        $("#prevSlide").on("click", prevSlide);

        // Initialisation
        renderSlide(0);
    </script>

    <!-- Ajout d'une petite correction responsive pour le texte des slides -->
