<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {

    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Patrons comportementaux",
    "contenu": "<h2 style='color: #2c3e50; text-align: center;'>Les Patrons de Conception Comportementaux</h2><p style='text-align: center;'>Ces patrons définissent comment les objets interagissent et communiquent entre eux, en répartissant les responsabilités et en rendant le code plus flexible.</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #3498db;'><h3 style='color: #2c3e50; margin-top: 0;'>🎯 Objectifs de la leçon :</h3><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 8px;'>✅ Comprendre Observer (observateur) et Strategy (stratégie)</li><li style='margin-bottom: 8px;'>✅ Maîtriser Command (commande) et Template Method</li><li style='margin-bottom: 8px;'>✅ Utiliser State (état), Chain of Responsibility, Mediator</li></ul></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons explorer les patrons de conception comportementaux. Ces patrons se concentrent sur la manière dont les objets interagissent et communiquent entre eux. Ils aident à répartir les responsabilités et à rendre le code plus flexible et plus facile à maintenir. Nous allons voir des patrons comme Observer qui permet de notifier plusieurs objets d'un changement d'état, Strategy qui permet de changer d'algorithme à l'exécution, Command qui encapsule une requête sous forme d'objet, et bien d'autres. Ces patrons sont essentiels pour créer des applications robustes et évolutives.",
    "note": "Les patrons comportementaux sont souvent utilisés dans les frameworks modernes."
  },
  {
    "titre": "Observer (Observateur)",
    "contenu": "<h3 style='color: #2c3e50;'>Observer</h3><p><strong>Définition :</strong> Définit une dépendance un-à-plusieurs entre objets, de sorte que lorsqu'un objet change d'état, tous ses dépendants sont notifiés et mis à jour automatiquement.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Sujet (Observable)</strong> : Maintient une liste d'observateurs et les notifie en cas de changement.</li><li><strong>Observateur</strong> : Définit une interface de mise à jour pour les objets qui doivent être notifiés.</li><li><strong>Observateurs concrets</strong> : Implémentent l'interface de l'observateur.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Un système de notification où un utilisateur (sujet) change de statut et tous ses abonnés (observateurs) reçoivent une notification.</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>// Sujet\nclass User {\n  constructor(name) {\n    this.name = name\n    this.followers = []\n    this.status = ''\n  }\n  addFollower(observer) {\n    this.followers.push(observer)\n  }\n  setStatus(status) {\n    this.status = status\n    this.notifyAll()\n  }\n  notifyAll() {\n    this.followers.forEach(f => f.update(this))\n  }\n}</code></pre></div></div>",
    "texteParle": "Le patron Observer est très utilisé dans les interfaces utilisateur et les systèmes événementiels. Il permet de créer des objets qui sont notifiés automatiquement lorsqu'un autre objet change d'état. Par exemple, dans une application e-commerce, lorsque le prix d'un produit change, tous les composants qui affichent ce produit doivent être mis à jour. Le patron Observer permet de découpler le sujet des observateurs. Le sujet ne connaît pas les observateurs concrètement, il sait juste qu'il doit les notifier. Cela rend le système flexible et facilite l'ajout de nouveaux observateurs sans modifier le sujet.",
    "note": "Observer est le patron de base des systèmes événementiels et de la programmation réactive."
  },
  {
    "titre": "Strategy (Stratégie)",
    "contenu": "<h3 style='color: #2c3e50;'>Strategy</h3><p><strong>Définition :</strong> Définit une famille d'algorithmes, les encapsule et les rend interchangeables. Le patron Strategy permet de faire varier l'algorithme indépendamment des clients qui l'utilisent.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Stratégie</strong> : Interface commune à toutes les stratégies.</li><li><strong>Stratégies concrètes</strong> : Implémentent l'interface avec des algorithmes spécifiques.</li><li><strong>Contexte</strong> : Utilise une stratégie et peut la changer à l'exécution.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Dans un e-commerce, le calcul des frais de livraison peut utiliser différentes stratégies (Standard, Express, Relais).</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>interface ShippingStrategy {\n  calculate(order): number\n}\n\nclass StandardShipping implements ShippingStrategy {\n  calculate(order) { return order.weight * 0.5 }\n}\n\nclass ExpressShipping implements ShippingStrategy {\n  calculate(order) { return order.weight * 1.5 + 10 }\n}</code></pre></div></div>",
    "texteParle": "Le patron Strategy est idéal quand vous avez plusieurs algorithmes qui font la même chose de manières différentes. Par exemple, pour calculer les frais de livraison, vous pouvez avoir une stratégie standard, une stratégie express, et une stratégie pour les points relais. Le patron Strategy encapsule chaque algorithme dans une classe séparée. Le contexte, ici le panier, peut changer de stratégie dynamiquement. Cela permet d'ajouter de nouveaux algorithmes sans modifier le code existant. C'est très pratique pour les systèmes de paiement, les calculs de prix, ou les stratégies de tri.",
    "note": "Strategy permet d'éviter les grandes structures conditionnelles (if/else ou switch)."
  },
  {
    "titre": "Command (Commande)",
    "contenu": "<h3 style='color: #2c3e50;'>Command</h3><p><strong>Définition :</strong> Encapsule une requête sous forme d'objet, ce qui permet de paramétrer des clients avec différentes requêtes, de mettre en file d'attente des requêtes, ou d'annuler des opérations.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Commande</strong> : Interface avec une méthode <code>execute()</code>.</li><li><strong>Commandes concrètes</strong> : Implémentent l'interface et appellent les méthodes du récepteur.</li><li><strong>Invokeur</strong> : Déclenche l'exécution de la commande.</li><li><strong>Récepteur</strong> : L'objet qui effectue le travail réel.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Dans un éditeur de texte, les commandes Copier, Coller, Annuler.</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>interface Command {\n  execute(): void\n  undo(): void\n}\n\nclass CopyCommand implements Command {\n  constructor(private editor: Editor) {}\n  execute() { this.editor.copy() }\n  undo() { this.editor.undoCopy() }\n}</code></pre></div></div>",
    "texteParle": "Le patron Command transforme une requête en un objet indépendant. Cela permet de séparer l'objet qui émet la requête de l'objet qui l'exécute. C'est très utile pour implémenter des fonctionnalités comme l'annulation (undo/redo), les files d'attente, ou la journalisation des opérations. Par exemple, dans une application de retouche photo, chaque action comme le recadrage ou le filtre est une commande. On peut alors les empiler pour permettre à l'utilisateur d'annuler et de rétablir ses actions. Le patron Command est aussi utilisé dans les systèmes de transaction où chaque opération doit pouvoir être annulée en cas d'échec.",
    "note": "Command est le patron de base des mécanismes d'annulation (Undo/Redo)."
  },
  {
    "titre": "Template Method",
    "contenu": "<h3 style='color: #2c3e50;'>Template Method</h3><p><strong>Définition :</strong> Définit le squelette d'un algorithme dans une méthode, en déléguant certaines étapes à des sous-classes. Permet de réutiliser la structure de l'algorithme tout en modifiant les étapes spécifiques.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Classe abstraite</strong> : Définit la méthode template qui appelle des méthodes abstraites ou concrètes.</li><li><strong>Méthodes concrètes</strong> : Implémentations par défaut.</li><li><strong>Sous-classes</strong> : Redéfinissent les méthodes abstraites pour personnaliser l'algorithme.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Une classe Document qui définit les étapes de génération d'un rapport (ouvrir, charger, formater, sauvegarder).</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>abstract class Document {\n  generate() {\n    this.open()\n    this.loadData()\n    this.format()\n    this.save()\n  }\n  protected abstract loadData()\n  protected abstract format()\n  private open() { /* code */ }\n  private save() { /* code */ }\n}</code></pre></div></div>",
    "texteParle": "Le patron Template Method est très utile pour définir des algorithmes génériques dont certaines étapes peuvent varier. Par exemple, pour générer un rapport, les étapes sont toujours les mêmes : ouvrir le document, charger les données, formater, et sauvegarder. Mais la façon de charger les données et de les formater peut changer selon le type de document. La classe abstraite définit le squelette de l'algorithme, et les sous-classes implémentent les étapes variables. Cela permet de réutiliser la structure de l'algorithme sans dupliquer le code. C'est un patron très utilisé dans les frameworks et les bibliothèques.",
    "note": "Template Method suit le principe de l'inversion de contrôle (Hollywood Principle)."
  },
  {
    "titre": "State (État)",
    "contenu": "<h3 style='color: #2c3e50;'>State</h3><p><strong>Définition :</strong> Permet à un objet de modifier son comportement lorsque son état interne change. L'objet donne l'impression de changer de classe.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Contexte</strong> : Maintient une référence à l'état actuel.</li><li><strong>État</strong> : Interface définissant les comportements.</li><li><strong>États concrets</strong> : Implémentent les comportements spécifiques à chaque état.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Une commande e-commerce peut être en états : En attente, Expédiée, Livrée, Annulée.</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>interface OrderState {\n  cancel(): void\n  ship(): void\n  deliver(): void\n}\n\nclass PendingState implements OrderState {\n  cancel() { /* annuler */ }\n  ship() { /* passer à expédié */ }\n  deliver() { /* erreur */ }\n}</code></pre></div></div>",
    "texteParle": "Le patron State est parfait pour gérer les objets qui ont des comportements différents selon leur état. Par exemple, une commande dans un e-commerce peut avoir différents états : en attente, expédiée, livrée, ou annulée. Chaque état définit comment la commande réagit aux actions comme annuler, expédier, ou livrer. Plutôt que d'avoir de grandes structures conditionnelles dans chaque méthode, le patron State délègue le comportement à un objet d'état. Le contexte, ici la commande, délègue les opérations à son état actuel. Cela rend le code plus propre et facilite l'ajout de nouveaux états.",
    "note": "State est souvent utilisé pour les machines à états (State Machines)."
  },
  {
    "titre": "Chain of Responsibility",
    "contenu": "<h3 style='color: #2c3e50;'>Chain of Responsibility</h3><p><strong>Définition :</strong> Évite de coupler l'émetteur d'une requête à son récepteur en donnant à plusieurs objets la possibilité de traiter la requête. Les objets sont chaînés et la requête circule jusqu'à ce qu'elle soit traitée.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Gestionnaire</strong> : Interface avec une méthode de traitement.</li><li><strong>Gestionnaires concrets</strong> : Traitent la requête ou la passent au suivant.</li><li><strong>Chaîne</strong> : Les gestionnaires sont liés entre eux.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Un système de validation de commandes : vérification du stock, du paiement, de l'adresse.</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>interface Handler {\n  setNext(handler: Handler): Handler\n  handle(request: Request): void\n}\n\nclass StockHandler implements Handler {\n  handle(request) {\n    if (!request.stock) return\n    this.next?.handle(request)\n  }\n}</code></pre></div></div>",
    "texteParle": "Le patron Chain of Responsibility crée une chaîne de gestionnaires pour traiter une requête. Chaque gestionnaire peut traiter la requête ou la passer au suivant. Par exemple, dans un système de commande, vous pouvez avoir une chaîne qui vérifie le stock, puis le paiement, puis l'adresse. Si le stock est insuffisant, le gestionnaire de stock arrête la chaîne et retourne une erreur. Si tout est valide, la requête passe à la fin et la commande est validée. Ce patron permet de découpler l'émetteur de la requête des gestionnaires et de composer facilement des chaînes de validation différentes.",
    "note": "Chain of Responsibility est souvent utilisé pour les filtres et les middlewares."
  },
  {
    "titre": "Mediator (Médiateur)",
    "contenu": "<h3 style='color: #2c3e50;'>Mediator</h3><p><strong>Définition :</strong> Réduit les dépendances chaotiques entre les objets en introduisant un objet qui contrôle les interactions. Les objets ne communiquent plus directement mais via le médiateur.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📋 Structure :</h4><ul><li><strong>Médiateur</strong> : Interface définissant les méthodes de communication.</li><li><strong>Médiateur concret</strong> : Coordonne les interactions entre les collègues.</li><li><strong>Collègues</strong> : Communiquent via le médiateur.</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Exemple :</h4><p>Un chat où les messages ne vont pas directement d'un utilisateur à l'autre mais passent par un serveur (médiateur).</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;'><code>class ChatMediator {\n  users: User[]\n  sendMessage(msg, sender) {\n    users.forEach(u => {\n      if (u !== sender) u.receive(msg)\n    })\n  }\n}</code></pre></div></div>",
    "texteParle": "Le patron Mediator est utile pour réduire les dépendances directes entre de nombreux objets. Au lieu que chaque objet connaisse tous les autres, ils communiquent tous via un médiateur central. Par exemple, dans une interface utilisateur, au lieu que chaque composant connaisse tous les autres composants qui peuvent changer quand il change, il informe simplement le médiateur qui se charge de mettre à jour les composants concernés. Cela réduit considérablement le couplage et rend le système plus facile à maintenir. Le médiateur est souvent utilisé dans les systèmes de chat, les tableaux de bord, ou les interfaces complexes.",
    "note": "Mediator est le patron central des architectures événementielles et des bus de messages."
  },
  {
    "titre": "Résumé et bonnes pratiques",
    "contenu": "<h3 style='color: #2c3e50;'>Récapitulatif des patrons comportementaux</h3><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><strong>Observer</strong><br>Notification automatique de changements</div><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #2ecc71;'><strong>Strategy</strong><br>Algorithmes interchangeables</div><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><strong>Command</strong><br>Encapsulation de requêtes</div><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><strong>Template Method</strong><br>Squelette d'algorithme</div><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #9b59b6;'><strong>State</strong><br>Comportement selon l'état</div><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #1abc9c;'><strong>Chain of Resp.</strong><br>Chaîne de traitement</div><div style='flex: 1; min-width: 150px; background-color: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #f1c40f;'><strong>Mediator</strong><br>Coordinateur central</div></div><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin-top: 15px;'><h4 style='margin-top: 0;'>💡 Bonnes pratiques :</h4><ul><li>Choisissez le patron en fonction du problème, pas l'inverse.</li><li>N'utilisez un patron que s'il apporte une valeur ajoutée.</li><li>Combinez plusieurs patrons pour résoudre des problèmes complexes.</li><li>Documentez les patrons utilisés dans l'architecture du projet.</li></ul></div>",
    "texteParle": "Pour conclure cette leçon, voici un résumé des patrons comportementaux que nous avons vus. Observer est pour les notifications automatiques, Strategy pour les algorithmes interchangeables, Command pour encapsuler des requêtes, Template Method pour définir un squelette d'algorithme, State pour gérer des comportements selon l'état, Chain of Responsibility pour créer une chaîne de traitement, et Mediator pour centraliser les communications. Rappelez-vous que chaque patron répond à un problème spécifique. Il est important de bien identifier le problème avant de choisir un patron. N'utilisez pas un patron juste parce que vous le connaissez ; utilisez-le parce qu'il résout un vrai problème. Et surtout, combinez plusieurs patrons pour créer des architectures robustes et évolutives.",
    "note": "Les patrons comportementaux sont souvent combinés avec d'autres types de patrons."

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';

            block.style.background = 'rgba(0,0,0,0.05)';

        document.querySelectorAll('.btn').forEach(btn => {

        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
