<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours: Fondamentaux du Génie Logiciel | WebDev</title>
    <!-- Tailwind CSS + Google Fonts + Font Awesome (icônes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* personnalisation douce pour le confort visuel */
        body {
            background: #f4f7fc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        /* transitions slides */
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        .slide {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: opacity 0.25s ease, transform 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e3a8a;
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        /* small screens tap friendly */
        button, .dot-nav {
            cursor: pointer;
        }
        .dot-nav {
            transition: all 0.2s;
        }
        .dot-active {
            background-color: #2563eb;
            width: 2rem;
        }
        /* code / highlight simple */
        .highlight-bg {
            background: #eef2ff;
            border-left: 5px solid #3b82f6;
        }
        @media (max-width: 640px) {
            .slide {
                border-radius: 1.5rem;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="antialiased">

    <main class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slides -->
        <div id="slidesWrapper" class="relative">
            <!-- Slides dynamiques via JS -->
            <div id="slidesContainer" class="slide-container"></div>

            <!-- Navigation + indicateurs -->
            <div class="flex flex-col sm:flex-row justify-between items-center mt-8 gap-4">
                <div class="flex gap-3">
                    <button id="prevSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">Suivant ▶</button>
                </div>
                <div class="text-sm text-gray-600 bg-white/70 px-4 py-1 rounded-full">
                    Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>
            <!-- Dots navigation (mobile friendly) -->
            <div id="dotsNav" class="flex flex-wrap justify-center gap-2 mt-5"></div>
        </div>
    </main>

    <script>
        // Définition des slides (adaptés pour la leçon 1 du chapitre 1)
        // Titre, objectifs puis contenu structuré avec exemples simples
        const slidesData = [
            {
                type: "title",
                title: "Initiation au Génie logiciel",
                subtitle: "Comprendre les fondamentaux et ses enjeux",
                chapter: "Chap 1 · Leçon 1",
                icon: "🛠️"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Définir le génie logiciel comme discipline d’ingénierie du logiciel",
                    "Comprendre la différence entre programmation et génie logiciel",
                    "Identifier les enjeux : complexité, délais, coûts, qualité, maintenance"
                ]
            },
            {
                type: "content",
                title: "📌 Qu’est-ce que le Génie Logiciel ?",
                content: `
                    <p class="mb-4 text-gray-800 leading-relaxed">Le <strong class="text-blue-800">génie logiciel (Software Engineering)</strong> est une discipline qui applique des principes d'ingénierie pour la <strong>conception, le développement, la maintenance, le test et l’évolution</strong> de logiciels de qualité, de manière systématique et maîtrisée.</p>
                    <div class="highlight-bg p-4 rounded-xl my-4">
                        <p class="italic text-gray-700">✨ “Ce n’est pas seulement écrire du code, c’est construire un produit fiable, efficace et évolutif en équipe, avec des méthodes.”</p>
                    </div>
                    <p>Contrairement à un simple script, le génie logiciel englobe tout le cycle de vie : de l’idée jusqu’à la livraison et la maintenance à long terme.</p>
                `
            },
            {
                type: "content",
                title: "⚙️ Programmation vs Génie logiciel",
                content: `
                    <div class="grid md:grid-cols-2 gap-5 mt-2">
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                            <h3 class="font-bold text-lg text-blue-700 flex items-center gap-2">💻 Programmation</h3>
                            <ul class="list-disc list-inside space-y-1 mt-2 text-gray-700">
                                <li>Écrire du code fonctionnel</li>
                                <li>Résoudre un problème technique local</li>
                                <li>Souvent individuel ou petite équipe</li>
                                <li>Peu de formalisation</li>
                            </ul>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                            <h3 class="font-bold text-lg text-green-700 flex items-center gap-2">🏗️ Génie logiciel</h3>
                            <ul class="list-disc list-inside space-y-1 mt-2 text-gray-700">
                                <li>Cycle complet : analyse, conception, tests, déploiement</li>
                                <li>Collaboration, documentation, standards</li>
                                <li>Gestion des risques et de la qualité</li>
                                <li>Maintenance et évolutivité</li>
                            </ul>
                        </div>
                    </div>
                    <div class="mt-5 p-3 bg-blue-50 rounded-lg text-center text-sm">🔁 Exemple : Coder une calculatrice (programmation) vs concevoir un système bancaire fiable pendant 10 ans (génie logiciel).</div>
                `
            },
            {
                type: "content",
                title: "⚠️ Les enjeux du Génie logiciel",
                content: `
                    <p class="mb-3 font-medium">Pourquoi a-t-on besoin de méthodes structurées ? Parce que les logiciels modernes sont complexes et critiques :</p>
                    <div class="space-y-3">
                        <div class="flex items-start gap-3 p-2 rounded-lg">
                            <span class="text-2xl">🧩</span> <span><strong class="text-gray-800">Complexité :</strong> Des millions de lignes de code, interactions entre composants.</span>
                        </div>
                        <div class="flex items-start gap-3 p-2 rounded-lg">
                            <span class="text-2xl">⏱️</span> <span><strong class="text-gray-800">Délais :</strong> Livrer dans les temps sans sacrifier la qualité.</span>
                        </div>
                        <div class="flex items-start gap-3 p-2 rounded-lg">
                            <span class="text-2xl">💰</span> <span><strong class="text-gray-800">Coûts :</strong> Optimiser le budget (développement, serveurs, maintenance).</span>
                        </div>
                        <div class="flex items-start gap-3 p-2 rounded-lg">
                            <span class="text-2xl">✅</span> <span><strong class="text-gray-800">Qualité :</strong> logiciel fiable, sécurisé, performant.</span>
                        </div>
                        <div class="flex items-start gap-3 p-2 rounded-lg">
                            <span class="text-2xl">🛠️</span> <span><strong class="text-gray-800">Maintenance :</strong> 70% du coût total d’un logiciel est dû à sa maintenance (corrections, évolutions).</span>
                        </div>
                    </div>
                `
            },
            {
                type: "content",
                title: "📊 Illustration - Coût d’une mauvaise qualité",
                content: `
                    <p class="mb-3">Le génie logiciel vise à réduire les erreurs et à anticiper les problèmes. Une étude célèbre montre que <strong>corriger un bug en production coûte 100 fois plus cher</strong> que de le corriger lors de la conception.</p>
                    <!-- dessin schématique simple en SVG pour la compréhension (léger) -->
                    <div class="my-5 flex justify-center">
                        <svg width="300" height="140" viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg" class="max-w-full">
                            <rect x="20" y="100" width="40" height="30" fill="#4ade80" rx="4" />
                            <text x="22" y="90" font-size="9" fill="#166534">Analyse</text>
                            <rect x="85" y="85" width="40" height="45" fill="#facc15" rx="4" />
                            <text x="92" y="75" font-size="9" fill="#854d0e">Conception</text>
                            <rect x="150" y="70" width="40" height="60" fill="#f97316" rx="4" />
                            <text x="155" y="60" font-size="9" fill="#7c2d12">Implémentation</text>
                            <rect x="215" y="45" width="40" height="85" fill="#ef4444" rx="4" />
                            <text x="218" y="35" font-size="9" fill="#7f1d1d">Production</text>
                            <text x="120" y="135" font-size="11" fill="#1f2937" text-anchor="middle">Coût de correction croissant ➡️</text>
                        </svg>
                    </div>
                    <p class="text-sm text-gray-600">Plus on avance dans le cycle, plus corriger devient coûteux. D’où l’importance d’une approche rigoureuse dès le début.</p>
                `
            },
            {
                type: "content",
                title: "🧠 Résumé - Pourquoi le Génie Logiciel est essentiel",
                content: `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                        <div class="bg-gradient-to-br from-indigo-50 to-white p-4 rounded-xl shadow-sm">
                            <div class="text-3xl mb-1">🏆</div>
                            <h4 class="font-bold">Qualité et fiabilité</h4>
                            <p class="text-sm">Applications qui ne plantent pas et répondent aux besoins.</p>
                        </div>
                        <div class="bg-gradient-to-br from-indigo-50 to-white p-4 rounded-xl shadow-sm">
                            <div class="text-3xl mb-1">🤝</div>
                            <h4 class="font-bold">Travail d’équipe</h4>
                            <p class="text-sm">Méthodes agiles, gestion de version, communication claire.</p>
                        </div>
                        <div class="bg-gradient-to-br from-indigo-50 to-white p-4 rounded-xl shadow-sm">
                            <div class="text-3xl mb-1">📈</div>
                            <h4 class="font-bold">Maîtrise des coûts et délais</h4>
                            <p class="text-sm">Planification et estimation évitent les dépassements.</p>
                        </div>
                        <div class="bg-gradient-to-br from-indigo-50 to-white p-4 rounded-xl shadow-sm">
                            <div class="text-3xl mb-1">♻️</div>
                            <h4 class="font-bold">Maintenabilité</h4>
                            <p class="text-sm">Code propre, tests, documentation pour les évolutions futures.</p>
                        </div>
                    </div>
                    <div class="mt-6 text-center p-3 bg-blue-100 rounded-2xl">
                        💡 <strong>À retenir :</strong> Le génie logiciel transforme l’art de programmer en une véritable discipline d’ingénierie.
                    </div>
                `
            },
            {
                type: "content",
                title: "🔍 Exercice réflexe (auto-évaluation)",
                content: `
                    <p class="font-medium mb-2">Testez votre compréhension :</p>
                    <ol class="list-decimal list-inside space-y-2 bg-gray-50 p-4 rounded-xl">
                        <li>Donnez une différence clé entre "programmation" et "génie logiciel".</li>
                        <li>Citez deux enjeux majeurs du génie logiciel.</li>
                        <li>Pourquoi dit-on que la maintenance est un enjeu critique ?</li>
                    </ol>
                    <div class="mt-4 text-emerald-700 bg-emerald-50 p-3 rounded-lg text-sm">
                        💬 <strong>Indices :</strong> Le génie logiciel ne se limite pas au code ; la maintenance représente souvent le plus gros investissement ; complexité / qualité / délais sont des enjeux permanents.
                    </div>
                `
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'un slide selon son type
        function renderSlide(slide, idx) {
            if (slide.type === "title") {
                return `
                    <div class="slide p-6 md:p-10 text-center">
                        <div class="text-7xl mb-4">${slide.icon || "📘"}</div>
                        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-gray-600 text-lg mt-3">${slide.subtitle}</p>
                        <div class="mt-6 text-sm font-mono text-blue-500 bg-blue-50 inline-block px-4 py-1 rounded-full">${slide.chapter}</div>
                        <div class="mt-8 flex justify-center gap-2 text-gray-400 text-sm">
                            <span>⬅️ ➡️ Navigation</span>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectifs") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-8 border-blue-500 pl-4 mb-6">${slide.title}</h2>
                        <ul class="space-y-4">
                            ${slide.objectives.map(obj => `
                                <li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl shadow-sm">
                                    <span class="text-blue-500 text-xl">✓</span>
                                    <span class="text-gray-700 text-base md:text-lg">${obj}</span>
                                </li>
                            `).join('')}
                        </ul>
                        <div class="mt-8 text-sm text-center text-gray-500 italic">📖 Ces objectifs guideront votre apprentissage.</div>
                    </div>
                `;
            } 
            else if (slide.type === "content") {
                return `
                    <div class="slide p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b-2 border-blue-200 pb-2 mb-5">${slide.title}</h2>
                        <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed">
                            ${slide.content}
                        </div>
                    </div>
                `;
            }
            return `<div class="slide p-6">Contenu</div>`;
        }

        // Mettre à jour l'affichage complet
        function updateSlides() {
            const container = $("#slidesContainer");
            if (!container.length) return;
            // On affiche uniquement le slide courant
            const currentSlideData = slidesData[currentSlide];
            const slideHtml = renderSlide(currentSlideData, currentSlide);
            container.html(slideHtml);
            
            // Mise à jour du compteur et boutons
            $("#currentSlideIdx").text(currentSlide + 1);
            $("#totalSlides").text(totalSlides);
            $("#prevSlide").prop("disabled", currentSlide === 0);
            $("#nextSlide").prop("disabled", currentSlide === totalSlides - 1);
            
            // Mise à jour des dots
            updateDots();
            
            // Scroll doux vers le haut pour les petits écrans
            $("html, body").animate({ scrollTop: 0 }, 150);
        }
        
        // Génération des indicateurs ronds (dots)
        function updateDots() {
            const dotsContainer = $("#dotsNav");
            dotsContainer.empty();
            for (let i = 0; i < totalSlides; i++) {
                const dot = $("<button>")
                    .addClass(`dot-nav w-3 h-3 rounded-full mx-1 transition-all ${i === currentSlide ? 'bg-blue-600 w-7' : 'bg-gray-300 hover:bg-gray-400'}`)
                    .attr("data-index", i);
                dot.on("click", function() {
                    const idx = parseInt($(this).attr("data-index"));
                    if (!isNaN(idx) && idx !== currentSlide) {
                        currentSlide = idx;
                        updateSlides();
                    }
                });
                dotsContainer.append(dot);
            }
        }
        
        // Navigation
        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlides();
            }
        }
        
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlides();
            }
        }
        
        // Gestion clavier (gauche/droite)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowLeft") {
                prevSlide();
                e.preventDefault();
            } else if (e.key === "ArrowRight") {
                nextSlide();
                e.preventDefault();
            }
        });
        
        // Initialisation et chargement
        $(function() {
            updateSlides();
            $("#prevSlide").on("click", prevSlide);
            $("#nextSlide").on("click", nextSlide);
            
            // Swipe minimal pour mobile (touch events simplifiés)
            let touchStartX = 0;
            let touchEndX = 0;
            const slidesWrapper = document.getElementById("slidesWrapper");
            if(slidesWrapper) {
                slidesWrapper.addEventListener("touchstart", (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, false);
                slidesWrapper.addEventListener("touchend", (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    const diff = touchEndX - touchStartX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) prevSlide();
                        else nextSlide();
                    }
                }, false);
            }
        });
    </script>
    <!-- note : utilisation de MathJax au cas où des formules apparaîtraient plus tard, mais cette leçon n'en contient pas -->
    <footer class="text-center text-xs text-gray-400 py-6 border-t mt-6 max-w-4xl mx-auto">
        Cours de Génie Logiciel - Classe Développement Web | Enseignant Cameroun 🇨🇲 | Support interactif
    </footer>
</body>
</html>
