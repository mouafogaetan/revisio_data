<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 5 : Recueil des besoins & User Stories | Génie Logiciel</title>
    <!-- Tailwind CSS + CDN pour typographie de base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules mathématiques si besoin, reste léger) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour slides */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        /* personnalisation fine du défilement */
        .slide-container {
            scroll-behavior: smooth;
        }
        /* style pour les mini cartes de métaphore */
        .soft-card {
            background: rgba(255,255,240,0.5);
            border-left: 4px solid #3b82f6;
        }
        /* rendu plus lisible sur petits écrans */
        @media (max-width: 640px) {
            .prose p, .prose li {
                font-size: 0.95rem;
            }
        }
        /* éviter les débordements */
        img, svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 font-sans antialiased">

    <div class="max-w-5xl mx-auto px-3 sm:px-6 py-6 sm:py-10">
        <!-- En-tête de navigation simple et progress -->
        <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
            <div class="text-sm font-medium text-indigo-700 bg-white/60 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm">
                📘 Matière : Initiation au Génie logiciel | Chapitre 2 : Ingénierie des besoins
            </div>
            <div class="flex gap-2">
                <button id="prevBtn" class="bg-white hover:bg-indigo-100 text-indigo-800 font-semibold py-1.5 px-4 rounded-full shadow transition text-sm disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
                <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-1.5 px-4 rounded-full shadow transition text-sm">Suivant ▶</button>
            </div>
        </div>

        <!-- Conteneur des slides -->
        <div id="slidesContainer" class="slide-container relative w-full overflow-hidden">
            <!-- Les slides seront injectées dynamiquement par jQuery -->
        </div>

        <!-- indicateur de progression / pagination -->
        <div class="flex justify-center mt-6 gap-2 flex-wrap" id="dotsIndicator"></div>
        
        <!-- petit footer discret -->
        <div class="text-center text-xs text-gray-500 mt-8 border-t border-indigo-100 pt-4">
            Cours interactif | Génie Logiciel – Enseignant Cameroun | ✅ Techniques de recueil & User Stories
        </div>
    </div>

    <script>
        // Données de la leçon 5 (basées sur le JSON du programme, enrichi avec explications)
        const lessonData = {
            idLesson: "lesson5",
            titre: "Recueil des besoins : techniques, user stories et personas",
            objectifs: [
                "Utiliser les techniques de recueil (entretiens, questionnaires, observation, ateliers).",
                "Rédiger des user stories efficaces (formule « En tant que, je veux, afin de »).",
                "Créer des personas pour mieux comprendre les utilisateurs et leurs contextes."
            ],
            contenuSlides: [
                {
                    type: "theorie",
                    titre: "🎯 Les techniques de recueil des besoins",
                    content: `
                        <p class="mb-3">Pour bien construire un logiciel, il faut d’abord comprendre ce dont l’utilisateur a vraiment besoin. Voici 4 techniques essentielles utilisées par les analystes et chefs de projet :</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-indigo-400"><span class="font-bold text-indigo-700">🗣️ Entretiens</span><br>Individuels ou collectifs, ils permettent d'explorer en profondeur les attentes et contraintes.</div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-400"><span class="font-bold text-emerald-700">📊 Questionnaires</span><br>Idéal pour un grand nombre de personnes, rapide à analyser (questions fermées/ouvertes).</div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-400"><span class="font-bold text-amber-700">👀 Observation</span><br>Voir les utilisateurs dans leur environnement réel (souvent révélateur de besoins implicites).</div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-rose-400"><span class="font-bold text-rose-700">🧠 Ateliers collaboratifs</span><br>Brainstorming, ateliers JAD (Joint Application Development) pour co-construire la solution.</div>
                        </div>
                        <p class="mt-4 text-sm italic bg-indigo-50 p-3 rounded">💡 Exemple concret : pour une application de gestion d'école au Cameroun, on peut observer les secrétaires, organiser un atelier avec les professeurs, et envoyer un questionnaire aux parents.</p>
                    `
                },
                {
                    type: "theorie",
                    titre: "✍️ Les user stories (histoires utilisateur)",
                    content: `
                        <p class="mb-2">Une user story est une courte description d’une fonctionnalité, écrite du point de vue de l’utilisateur. Structure standard :</p>
                        <div class="bg-gray-800 text-gray-100 p-4 rounded-lg font-mono text-sm my-3 text-center md:text-left">
                            « En tant que <span class="text-yellow-300">[type d’utilisateur]</span>, je veux <span class="text-green-300">[action souhaitée]</span>, afin de <span class="text-blue-300">[bénéfice / valeur]</span> »
                        </div>
                        <ul class="list-disc pl-6 space-y-2 mt-3">
                            <li><strong>Qui ?</strong> Le rôle de l’utilisateur (ex: parent d'élève, enseignant, admin).</li>
                            <li><strong>Quoi ?</strong> Ce qu'il souhaite accomplir.</li>
                            <li><strong>Pourquoi ?</strong> Le bénéfice ou la raison d’être de la fonctionnalité.</li>
                        </ul>
                        <div class="mt-4 bg-green-50 p-3 rounded-lg">
                            <p class="font-semibold">📌 Exemple valide :</p>
                            <p class="italic">« En tant qu’<strong>étudiant en web</strong>, je veux <strong>télécharger mes supports de cours</strong>, afin de <strong>réviser même sans connexion internet</strong>. »</p>
                        </div>
                        <p class="mt-3">Les <strong>critères d’acceptation</strong> précisent les conditions de validation (ex: le fichier PDF doit s’afficher).</p>
                    `
                },
                {
                    type: "theorie",
                    titre: "👥 Personas : donner vie aux utilisateurs",
                    content: `
                        <p>Un <span class="font-bold text-indigo-700">persona</span> est un personnage fictif mais réaliste qui représente un groupe d’utilisateurs cibles. Il permet de garder l’empathie et de prendre de meilleures décisions.</p>
                        <div class="bg-white rounded-xl shadow-md p-5 my-5 border border-indigo-100">
                            <div class="flex flex-col md:flex-row gap-4 items-start">
                                <div class="w-20 h-20 bg-indigo-200 rounded-full flex items-center justify-center text-4xl">👩🏾‍🏫</div>
                                <div>
                                    <h4 class="font-bold text-lg">Mme. Mbarga, 42 ans, enseignante de programmation</h4>
                                    <p><strong>Objectifs :</strong> Suivre les progrès des élèves, donner des feedbacks rapides.</p>
                                    <p><strong>Défis :</strong> Manque de temps, classe hétérogène, connexion instable.</p>
                                    <p><strong>Besoin prioritaire :</strong> Une plateforme simple permettant de noter hors ligne et de synchroniser plus tard.</p>
                                </div>
                            </div>
                        </div>
                        <p>🎭 Pour créer un persona : collecter des données réelles (entretiens), définir nom, âge, métier, frustrations, buts. On en crée généralement 3 à 5 pour bien couvrir les utilisateurs.</p>
                        <div class="bg-yellow-50 text-yellow-800 p-3 rounded mt-2 text-sm">⭐ Astuce : Utilisez des personas pour chaque rôle critique avant d'écrire vos user stories — cela évite les oublis !</div>
                    `
                },
                {
                    type: "exemplePratique",
                    titre: "🛠️ Atelier express : de la technique à la user story",
                    content: `
                        <p class="mb-2"><strong>Mise en situation :</strong> Vous développez une application de gestion de cantine scolaire pour un lycée à Yaoundé.</p>
                        <div class="space-y-4">
                            <div class="soft-card p-4 rounded">
                                <span class="font-bold">🔍 Technique : Atelier collaboratif avec les parents et gestionnaires.</span>
                                <p>Résultat obtenu : « Les parents veulent recevoir une notification quand l’enfant achète un repas. »</p>
                                <p class="mt-2 text-indigo-700 font-medium">→ User story :</p>
                                <div class="bg-gray-100 p-2 rounded text-sm font-mono">En tant que parent, je veux recevoir une notification push après chaque achat, afin de contrôler le budget cantine de mon enfant.</div>
                            </div>
                            <div class="soft-card p-4 rounded">
                                <span class="font-bold">📋 Technique : Questionnaire en ligne.</span>
                                <p>85% des répondants demandent un aperçu du menu de la semaine.</p>
                                <p class="font-medium text-indigo-700">→ User story :</p>
                                <div class="bg-gray-100 p-2 rounded text-sm font-mono">En tant qu'élève, je veux consulter le menu de la semaine chaque lundi, afin de choisir à l'avance mon repas.</div>
                            </div>
                        </div>
                        <p class="mt-4 text-sm text-gray-600">✅ Ainsi, chaque technique de recueil se traduit en exigences compréhensibles par l’équipe de développement.</p>
                    `
                },
                {
                    type: "exercice",
                    titre: "🧪 Exercice rapide : rédigez vos propres user stories",
                    content: `
                        <p class="mb-3">À partir du besoin suivant, rédigez 2 user stories selon la formule apprise.</p>
                        <div class="bg-slate-100 p-4 rounded-lg mb-4">
                            <p><strong>Contexte :</strong> Une bibliothèque universitaire souhaite digitaliser le prêt de livres. Les étudiants se plaignent de ne pas savoir si un livre est disponible. Les bibliothécaires veulent gérer les retards facilement.</p>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="font-semibold">📖 User story 1 (pour l'étudiant) :</label>
                                <textarea id="exoUserStory1" rows="2" class="w-full border border-gray-300 rounded p-2 mt-1" placeholder="Ex: En tant qu'étudiant, je veux ... afin de ..."></textarea>
                            </div>
                            <div>
                                <label class="font-semibold">📚 User story 2 (pour le bibliothécaire) :</label>
                                <textarea id="exoUserStory2" rows="2" class="w-full border border-gray-300 rounded p-2 mt-1" placeholder="Ex: En tant que bibliothécaire, je veux ... afin de ..."></textarea>
                            </div>
                            <button id="validateExo" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition text-sm shadow">💡 Vérifier des exemples</button>
                            <div id="exoFeedback" class="text-sm text-gray-700 hidden p-2 bg-indigo-50 rounded"></div>
                        </div>
                    `
                },
                {
                    type: "synthese",
                    titre: "📌 Récapitulatif & bonnes pratiques",
                    content: `
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>Techniques de recueil :</strong> toujours combiner plusieurs méthodes (entretien + observation + atelier) pour une vision complète.</li>
                            <li><strong>User stories :</strong> courtes, centrées utilisateur, elles doivent apporter une valeur métier. Éviter le jargon technique.</li>
                            <li><strong>Personas :</strong> ils évitent le syndrome « l’utilisateur imaginaire parfait ». Créez-les à partir de vraies données.</li>
                            <li><strong>Bon réflexe :</strong> avant de coder, validez vos histoires avec des vrais utilisateurs (tests utilisateurs précoces).</li>
                        </ul>
                        <div class="mt-5 p-4 bg-emerald-50 rounded-xl flex items-start gap-3">
                            <span class="text-2xl">⭐</span>
                            <p class="text-sm">En entreprise ou en projet scolaire, l’ingénierie des besoins est l’étape clé pour éviter de livrer un produit inutile. Au Cameroun, des solutions innovantes commencent toujours par une bonne écoute terrain !</p>
                        </div>
                    `
                }
            ]
        };

        let currentSlide = 0;
        let slidesArray = [];

        // Construction des slides : slide 0 = titre, slide 1 = objectifs, puis les slides de contenu
        function buildSlides() {
            const slides = [];
            // 1. Slide de titre / présentation de la leçon
            slides.push({
                type: "title",
                titre: `📖 Leçon 5 : ${lessonData.titre}`,
                content: `
                    <div class="text-center py-8 md:py-12">
                        <div class="text-5xl mb-4">🎯📝</div>
                        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">Recueil des besoins</h1>
                        <p class="text-xl text-gray-700 mt-3">Techniques, user stories et personas</p>
                        <p class="text-gray-500 mt-5">Chapitre 2 – Ingénierie des besoins | Durée estimée : 45 min</p>
                        <div class="mt-8 flex justify-center">
                            <div class="bg-white/50 p-3 rounded-full shadow-inner text-sm">👥 Public: Développement Web | Génie logiciel</div>
                        </div>
                    </div>
                `
            });
            // 2. Slide des objectifs d'apprentissage
            slides.push({
                type: "objectifs",
                titre: "🎯 Objectifs de la leçon",
                content: `
                    <div class="space-y-3">
                        ${lessonData.objectifs.map(obj => `<div class="flex items-start gap-3 bg-white p-3 rounded-lg shadow-sm"><span class="text-indigo-600 text-xl">✅</span><span>${obj}</span></div>`).join('')}
                    </div>
                    <p class="mt-5 text-sm text-gray-500 italic">À la fin de cette leçon, vous serez capable de mener une collecte de besoins basique et d'écrire des user stories professionnelles.</p>
                `
            });
            // Ajouter les slides de contenu (théorie, exemple pratique, exercice, synthèse)
            lessonData.contenuSlides.forEach(s => {
                slides.push({
                    type: s.type,
                    titre: s.titre,
                    content: s.content
                });
            });
            return slides;
        }

        // Afficher le slide courant
        function renderSlide(index) {
            const slide = slidesArray[index];
            if (!slide) return;
            let html = `<div class="slide bg-white rounded-2xl shadow-xl p-5 md:p-8 transition-all duration-300 border border-indigo-100">`;
            html += `<h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b border-indigo-200 pb-3 mb-5">${slide.titre}</h2>`;
            html += `<div class="prose prose-indigo max-w-none text-gray-800 leading-relaxed">${slide.content}</div>`;
            html += `</div>`;
            $("#slidesContainer").html(html);
            
            // Réappliquer MathJax si nécessaire (pour formules)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
            
            // Gestion spécifique pour le slide d'exercice : réinitialiser feedback
            if (slide.type === "exercice") {
                $("#exoFeedback").addClass("hidden");
                // réinitialiser les zones de texte ?
                if ($("#exoUserStory1").length) $("#exoUserStory1").val("");
                if ($("#exoUserStory2").length) $("#exoUserStory2").val("");
            }
            
            // Mise à jour des dots
            updateDots(index);
            // Gestion désactivation/activation boutons
            $("#prevBtn").prop("disabled", index === 0);
            $("#nextBtn").prop("disabled", index === slidesArray.length - 1);
        }

        function updateDots(activeIndex) {
            let dotsHtml = "";
            slidesArray.forEach((_, idx) => {
                const activeClass = idx === activeIndex ? "bg-indigo-700 w-8" : "bg-gray-300 w-3";
                dotsHtml += `<button class="dot h-3 rounded-full ${activeClass} transition-all mx-1" data-index="${idx}"></button>`;
            });
            $("#dotsIndicator").html(dotsHtml);
            $(".dot").on("click", function() {
                let idx = $(this).data("index");
                if (idx !== undefined && idx >= 0 && idx < slidesArray.length) {
                    currentSlide = idx;
                    renderSlide(currentSlide);
                }
            });
        }

        // validation de l'exercice (exemples de correction)
        function setupExerciseValidation() {
            $(document).on("click", "#validateExo", function() {
                const story1 = $("#exoUserStory1").val().trim();
                const story2 = $("#exoUserStory2").val().trim();
                let feedbackMsg = "";
                let correct = true;
                // vérification simple: doit contenir "En tant que", "je veux" et "afin de" en casernes approximatives
                const hasPattern = (txt) => {
                    return txt.match(/en tant que/i) && txt.match(/je veux/i) && txt.match(/afin de/i);
                };
                if (!story1) {
                    feedbackMsg += "❌ La première user story est vide. ";
                    correct = false;
                } else if (!hasPattern(story1)) {
                    feedbackMsg += "⚠️ User story 1: la formule correcte doit contenir « En tant que ... je veux ... afin de ... ». ";
                    correct = false;
                }
                if (!story2) {
                    feedbackMsg += "❌ La deuxième user story est vide. ";
                    correct = false;
                } else if (!hasPattern(story2)) {
                    feedbackMsg += "⚠️ User story 2: respectez la structure standard. ";
                    correct = false;
                }
                
                if (correct) {
                    feedbackMsg = "✅ Bravo ! Vos user stories suivent la bonne structure. N'oubliez pas d'ajouter des critères d'acceptation pour chaque story. Exemple correction :\n\n• Étudiant : « En tant qu'étudiant, je veux rechercher la disponibilité d'un livre par titre, afin de savoir s'il est emprunté avant de me déplacer. »\n• Bibliothécaire : « En tant que bibliothécaire, je veux recevoir une alerte pour les retards de plus de 7 jours, afin de relancer les étudiants efficacement. »";
                } else {
                    feedbackMsg += "\n💡 Rappel : structure imposée « En tant que [rôle], je veux [action], afin de [bénéfice] ». Réessayez !";
                }
                $("#exoFeedback").removeClass("hidden").html(feedbackMsg.replace(/\n/g, '<br>'));
            });
        }

        // navigation évènements
        function bindNavigation() {
            $("#prevBtn").on("click", function() {
                if (currentSlide > 0) {
                    currentSlide--;
                    renderSlide(currentSlide);
                }
            });
            $("#nextBtn").on("click", function() {
                if (currentSlide < slidesArray.length - 1) {
                    currentSlide++;
                    renderSlide(currentSlide);
                }
            });
            // raccourci clavier flèches
            $(document).on("keydown", function(e) {
                if (e.key === "ArrowLeft") {
                    if (currentSlide > 0) {
                        currentSlide--;
                        renderSlide(currentSlide);
                    }
                } else if (e.key === "ArrowRight") {
                    if (currentSlide < slidesArray.length - 1) {
                        currentSlide++;
                        renderSlide(currentSlide);
                    }
                }
            });
        }

        // ajuster pour les petits écrans : aucun comportement particulier nécessaire, Tailwind s'occupe.
        // Initialisation au chargement
        $(document).ready(function() {
            slidesArray = buildSlides();
            currentSlide = 0;
            renderSlide(currentSlide);
            bindNavigation();
            setupExerciseValidation();
            // Ajout d'un métrage dynamique pour les utilisateurs mobiles
            $("body").on("touchstart", function() {});
            // s'assurer que le contenu des slides avec mathjax est propre
        });
    </script>
</body>
</html>
