        let currentIndex = 0;
        const totalSlides = slides.length;

        // Fonction pour mettre à jour l'affichage du slide et les dots
        function renderSlide() {
            const slide = slides[currentIndex];
            const htmlContent = `
                <div class="animate-fade-in">
                    <div class="mb-2 text-xs font-medium text-indigo-500 uppercase tracking-wide">Leçon 36 · Mise en pratique finale</div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-5">${slide.title}</h2>
                    <div class="text-gray-700">
                        ${slide.content}
                    </div>
                </div>
            `;
            $("#slide-content").fadeOut(150, function() {
                $(this).html(htmlContent).fadeIn(200);
            });
            updateDots();
            updateButtonsState();
            // scroll automatique en haut de slide (pour mobiles)
            $("html, body").animate({ scrollTop: $(".slide-container").offset().top - 20 }, 100);
        }

        function updateDots() {
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                let activeClass = i === currentIndex ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-2';
                dotsHtml += `<div class="progress-dot h-2 rounded-full ${activeClass} transition-all duration-200 mx-1" data-index="${i}"></div>`;
            }
            $("#slideDots").html(dotsHtml);
            // click sur les dots
            $(".progress-dot").on("click", function() {
                let idx = parseInt($(this).data("index"));
                if (!isNaN(idx) && idx !== currentIndex && idx >=0 && idx < totalSlides) {
                    currentIndex = idx;
                    renderSlide();
                }
            });
        }

        function updateButtonsState() {
            $("#prevSlide").prop("disabled", currentIndex === 0);
            $("#nextSlide").prop("disabled", currentIndex === totalSlides - 1);
            if (currentIndex === 0) {
                $("#prevSlide").addClass("opacity-50");
            } else {
                $("#prevSlide").removeClass("opacity-50");
            }
            if (currentIndex === totalSlides - 1) {
                $("#nextSlide").addClass("opacity-50");
            } else {
                $("#nextSlide").removeClass("opacity-50");
            }
        }

        // Navigation events
        $("#prevSlide").on("click", function() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        });
        $("#nextSlide").on("click", function() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                renderSlide();
            }
        });

        // Ajout d'un raccourci clavier (flèches gauche/droite)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowLeft") {
                $("#prevSlide").click();
            } else if (e.key === "ArrowRight") {
                $("#nextSlide").click();
            }
        });

        // Initialisation
        renderSlide();

        // Petite animation de fade (bonus)
        const styleAnim = document.createElement('style');
        styleAnim.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(8px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.3s ease-out;
            }
        `;
        document.head.appendChild(styleAnim);
    </script>
