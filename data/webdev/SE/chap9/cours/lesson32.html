<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 32 : Outils de gestion de projet et métriques | Génie Logiciel</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques (optionnel mais présent) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Police Google Fonts pour meilleure lisibilité -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        /* Transition douce entre slides */
        .slide {
            transition: opacity 0.4s ease-in-out, transform 0.3s ease;
            opacity: 1;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
        }
        /* boutons navigation */
        .nav-btn {
            transition: all 0.2s ease;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e293b;
        }
        /* slider indicators */
        .dot-active {
            background-color: #3b82f6;
            width: 2rem;
        }
        /* rendu responsive pour petits écrans */
        @media (max-width: 640px) {
            .slide-content {
                padding: 1.25rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* personnalisation scroll bar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-slate-50">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slide -->
        <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            
            <!-- Les slides seront injectées dynamiquement par jQuery -->
            <div id="slidesWrapper" class="relative"></div>

            <!-- Barre de navigation inférieure (flèches + dots) -->
            <div class="bg-white border-t border-slate-200 px-5 py-4 flex flex-wrap items-center justify-between gap-3">
                <button id="prevSlide" class="nav-btn bg-slate-800 hover:bg-slate-700 text-white font-medium px-5 py-2 rounded-full disabled:opacity-40 disabled:cursor-not-allowed transition shadow-sm text-sm flex items-center gap-1">
                    ← Précédent
                </button>
                <div class="flex flex-wrap justify-center gap-2" id="dotsContainer"></div>
                <button id="nextSlide" class="nav-btn bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-full transition shadow-sm text-sm flex items-center gap-1">
                    Suivant →
                </button>
            </div>
        </div>
        
        <!-- Petit pied de page info -->
        <p class="text-center text-slate-500 text-xs mt-6">Cours d'initiation au Génie Logiciel – Cameroun | Leçon 32 : Planification et suivi de projet</p>
    </div>

    <script>
        $(document).ready(function(){
            // ----- Définition des slides selon le contenu de la leçon 32 (objectifs + contenu détaillé)
            // Titre slide1, slide2 objectifs, puis slides suivantes : les trois objectifs détaillés de la leçon 32
            // D'après le JSON : lesson32 objectifs : 
            // 0: "Utiliser des outils de gestion de projet (Jira, Trello, Asana, ClickUp)"
            // 1: "Maîtriser les métriques (vélocité, avancement, burn-down chart, burn-up chart)"
            // 2: "Organiser les daily meetings, revues et rétrospectives"
            // On va répartir en plusieurs slides: intro + plan, puis chaque objectif avec sous-détails.
            
            const slidesData = [
                { // Slide 0 : Titre
                    type: "title",
                    title: "📊 Outils de gestion de projet & Métriques",
                    subtitle: "Planification, suivi agile et indicateurs de performance",
                    bgClass: "bg-gradient-to-br from-blue-50 to-indigo-50"
                },
                { // Slide 1 : Objectifs pédagogiques
                    type: "objectives",
                    title: "🎯 Objectifs de la leçon",
                    objectives: [
                        "Utiliser des outils modernes de gestion de projet (Jira, Trello, Asana, ClickUp)",
                        "Maîtriser les métriques essentielles : vélocité, avancement, burn-down & burn-up charts",
                        "Organiser efficacement les cérémonies agiles : daily meetings, revues, rétrospectives"
                    ]
                },
                { // Slide 2 : Outils de gestion de projet (premier objectif détaillé)
                    type: "content",
                    title: "🛠️ Les outils de gestion de projet",
                    icon: "📌",
                    content: `
                        <div class="space-y-4">
                            <p class="text-slate-700">Pour piloter un projet logiciel, les outils aident à visualiser les tâches, suivre l'avancement et collaborer. Voici les plus utilisés :</p>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
                                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100"><span class="font-bold text-blue-800">Jira</span> <span class="text-sm text-slate-600">– Idéal pour Scrum & suivi avancé, backlogs, sprints, rapports complets.</span></div>
                                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100"><span class="font-bold text-emerald-800">Trello</span> <span class="text-sm text-slate-600">– Kanban simple, cartes, listes adaptées aux petites équipes.</span></div>
                                <div class="bg-amber-50 p-4 rounded-xl border border-amber-100"><span class="font-bold text-amber-800">Asana</span> <span class="text-sm text-slate-600">– Gestion de tâches, chronogrammes, vue tableau et timeline.</span></div>
                                <div class="bg-purple-50 p-4 rounded-xl border border-purple-100"><span class="font-bold text-purple-800">ClickUp</span> <span class="text-sm text-slate-600">– Tout-en-un : docs, objectifs, tableaux de bord, automatisations.</span></div>
                            </div>
                            <div class="bg-slate-100 p-3 rounded-lg mt-2 text-sm italic">💡 Astuce : Choisir l'outil selon la taille de l'équipe et la méthode (Scrum, Kanban). Pour les débutants, Trello est très accessible.</div>
                        </div>
                    `
                },
                { // Slide 3 : Métriques fondamentales – vélocité, avancement
                    type: "content",
                    title: "📈 Métriques : Vélocité & Avancement",
                    icon: "⚡",
                    content: `
                        <div class="space-y-4">
                            <p class="font-medium text-slate-800">La vélocité mesure la quantité de travail qu'une équipe peut accomplir par sprint (exprimée en points de story).</p>
                            <ul class="list-disc pl-6 space-y-2 text-slate-700">
                                <li><span class="font-semibold">Vélocité moyenne</span> = somme des points réalisés sur les derniers sprints / nombre de sprints. Utile pour prédire la livraison.</li>
                                <li><span class="font-semibold">Avancement (progression)</span> = (travail réalisé / travail total) × 100. Permet de savoir si on est en retard ou en avance.</li>
                                <li>Exemple : Si un sprint termine 35 points en moyenne, et qu'il reste 140 points, on estime 4 sprints restants.</li>
                            </ul>
                            <div class="bg-indigo-50 p-3 rounded-lg border-l-4 border-indigo-400 text-sm">🎯 La vélocité ne sert pas à comparer les équipes mais à améliorer la prévisibilité.</div>
                        </div>
                    `
                },
                { // Slide 4 : Burn-down & Burn-up charts
                    type: "content",
                    title: "📉 Diagrammes Burn-down et Burn-up",
                    icon: "📊",
                    content: `
                        <div class="space-y-5">
                            <div>
                                <h4 class="font-bold text-slate-800">🔥 Burn-down chart (diagramme d'avancement)</h4>
                                <p class="text-slate-600">Montre le travail restant au fil du temps. Idéal pour suivre la progression dans un sprint ou un projet.</p>
                                <div class="bg-white p-2 my-2 border border-slate-200 rounded-md text-center text-slate-500 text-sm">📉 Ligne descendante idéale : plus on avance, moins il reste de travail.</div>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-800">📈 Burn-up chart (diagramme de réalisation)</h4>
                                <p class="text-slate-600">Affiche le travail total accompli (cumulé) et le périmètre total. Utile pour visualiser l'ajout de tâches.</p>
                                <div class="bg-white p-2 my-2 border border-slate-200 rounded-md text-center text-slate-500 text-sm">📈 Deux courbes : travail réalisé (monte) et portée totale.</div>
                            </div>
                            <p class="text-sm text-slate-500">💡 Ces graphes sont générés automatiquement par Jira, ClickUp ou via des plugins.</p>
                        </div>
                    `
                },
                { // Slide 5 : Organisation des cérémonies agiles (daily, revues, rétrospectives)
                    type: "content",
                    title: "🔄 Organiser les cérémonies agiles",
                    icon: "🤝",
                    content: `
                        <div class="space-y-4">
                            <div class="bg-slate-50 rounded-xl p-4">
                                <span class="font-bold text-blue-700">☀️ Daily Meeting (mêlée quotidienne)</span>
                                <p class="text-slate-600 text-sm">15 minutes max, chaque membre répond : Qu'ai-je fait hier ? Que ferai-je aujourd'hui ? Quels obstacles ?</p>
                            </div>
                            <div class="bg-slate-50 rounded-xl p-4">
                                <span class="font-bold text-green-700">🔍 Revue de sprint (Sprint Review)</span>
                                <p class="text-slate-600 text-sm">Présentation de l'incrément au Product Owner et aux parties prenantes. Récupération des feedbacks.</p>
                            </div>
                            <div class="bg-slate-50 rounded-xl p-4">
                                <span class="font-bold text-purple-700">🔄 Rétrospective (Sprint Retrospective)</span>
                                <p class="text-slate-600 text-sm">L'équipe analyse ce qui a bien fonctionné, les axes d'amélioration, actions concrètes pour le sprint suivant.</p>
                            </div>
                            <div class="bg-amber-50 p-3 rounded-lg text-sm">✔️ Ces réunions renforcent la communication, la transparence et l'amélioration continue.</div>
                        </div>
                    `
                },
                { // Slide 6 : Exemple concret et métriques avancées (Kanban, lead time, cycle time)
                    type: "content",
                    title: "📐 Autres métriques importantes",
                    icon: "📏",
                    content: `
                        <div class="space-y-3">
                            <p><span class="font-semibold">Lead time</span> : temps entre la demande d'une fonctionnalité et sa livraison.</p>
                            <p><span class="font-semibold">Cycle time</span> : temps entre le début du travail sur une tâche et sa fin.</p>
                            <p><span class="font-semibold">Throughput (débit)</span> : nombre de tâches terminées par unité de temps.</p>
                            <div class="mt-2 flex flex-wrap gap-2 text-xs bg-gray-100 p-3 rounded-lg">
                                <span class="bg-white px-2 py-1 rounded shadow-sm">📊 Graphiques de contrôle</span>
                                <span class="bg-white px-2 py-1 rounded shadow-sm">📉 Cumulative Flow Diagram (CFD)</span>
                                <span class="bg-white px-2 py-1 rounded shadow-sm">🎯 Exemple de calcul : Vélocité = 25 pts/sprint</span>
                            </div>
                            <div class="mt-3 text-center text-indigo-700 bg-indigo-50 p-2 rounded">📌 Formule rapide : <span class="font-mono">Efficacité = (Travail terminé) / (Capacité totale)</span></div>
                        </div>
                    `
                },
                { // Slide 7 : Synthèse & mise en pratique / conseils
                    type: "content",
                    title: "💡 Synthèse & bonnes pratiques",
                    icon: "✅",
                    content: `
                        <div class="space-y-3">
                            <p>✔️ Choisissez l’outil adapté à votre contexte et à la maturité de l'équipe.<br>
                            ✔️ Utilisez les métriques pour prendre des décisions, pas pour "créer de la pression".<br>
                            ✔️ Les daily meetings doivent rester courts et focalisés sur la coordination.<br>
                            ✔️ Le burn-down chart est votre allié pour anticiper les retards.<br>
                            ✔️ Les rétrospectives sont clés pour l'amélioration continue.</p>
                            <div class="bg-slate-100 rounded-lg p-3 mt-2 text-center text-slate-700 text-sm italic">
                                🔁 « Ce qui se mesure s'améliore » – Mais restez humain !
                            </div>
                        </div>
                    `
                }
            ];
            
            let currentIndex = 0;
            const $wrapper = $('#slidesWrapper');
            const $dotsContainer = $('#dotsContainer');
            
            // Générer dynamiquement les slides HTML
            function buildSlides() {
                let slidesHtml = '';
                $.each(slidesData, function(idx, slide) {
                    let innerHtml = '';
                    if (slide.type === 'title') {
                        innerHtml = `
                            <div class="text-center py-12 md:py-16 px-5">
                                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-4">${slide.title}</h1>
                                <p class="text-lg md:text-xl text-slate-600">${slide.subtitle || ''}</p>
                                <div class="mt-8 w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
                                <p class="text-slate-500 mt-6 text-sm">Cameroun · Formation Développement Web</p>
                            </div>
                        `;
                    } else if (slide.type === 'objectives') {
                        let listItems = '';
                        $.each(slide.objectives, function(i, obj) {
                            listItems += `<li class="flex items-start gap-3 mb-3"><span class="text-blue-600 font-bold text-lg">•</span><span class="text-slate-700">${obj}</span></li>`;
                        });
                        innerHtml = `
                            <div class="p-5 md:p-8">
                                <h2 class="text-2xl md:text-3xl font-bold text-slate-800 border-l-4 border-blue-500 pl-4 mb-6">${slide.title}</h2>
                                <ul class="space-y-2 text-base md:text-lg">${listItems}</ul>
                                <div class="mt-8 bg-sky-50 p-4 rounded-xl text-slate-600 text-sm">À la fin de cette leçon, vous saurez animer un tableau de bord projet et interpréter les graphiques de suivi.</div>
                            </div>
                        `;
                    } else if (slide.type === 'content') {
                        innerHtml = `
                            <div class="p-5 md:p-8">
                                <div class="flex items-center gap-3 mb-5">
                                    <span class="text-3xl">${slide.icon || '📘'}</span>
                                    <h2 class="text-2xl md:text-3xl font-bold text-slate-800">${slide.title}</h2>
                                </div>
                                <div class="prose prose-slate max-w-none">
                                    ${slide.content}
                                </div>
                            </div>
                        `;
                    }
                    slidesHtml += `<div class="slide slide-hidden" data-slide-index="${idx}">${innerHtml}</div>`;
                });
                $wrapper.html(slidesHtml);
                // afficher uniquement le premier slide
                $('.slide').addClass('slide-hidden');
                $('.slide').first().removeClass('slide-hidden');
            }
            
            // Mettre à jour les dots (indicateurs)
            function updateDots() {
                $dotsContainer.empty();
                for (let i = 0; i < slidesData.length; i++) {
                    const dot = $(`<button class="h-2.5 rounded-full transition-all duration-200 mx-1 ${i === currentIndex ? 'bg-blue-600 w-8' : 'bg-slate-300 w-2.5 hover:bg-slate-400'}" data-index="${i}"></button>`);
                    $dotsContainer.append(dot);
                }
                // Event click sur les dots
                $('.dot-btn, [data-index]').off('click').on('click', function() {
                    const idx = parseInt($(this).data('index'));
                    if (!isNaN(idx) && idx >= 0 && idx < slidesData.length) {
                        goToSlide(idx);
                    }
                });
                // Renommer les classes pour compatibilité : tous les boutons dots ont data-index
                $dotsContainer.find('button').each(function(){
                    $(this).addClass('dot-btn');
                });
            }
            
            function goToSlide(index) {
                if (index < 0) index = 0;
                if (index >= slidesData.length) index = slidesData.length - 1;
                if (index === currentIndex) return;
                // cacher l'ancien slide avec animation
                const $currentSlide = $(`.slide[data-slide-index="${currentIndex}"]`);
                const $nextSlide = $(`.slide[data-slide-index="${index}"]`);
                $currentSlide.addClass('slide-hidden');
                $nextSlide.removeClass('slide-hidden');
                currentIndex = index;
                updateDots();
                // gestion état des boutons prev/next
                updateNavButtons();
                // scroll en haut du conteneur pour une meilleure UX sur mobile
                $('html, body').animate({ scrollTop: $('#slidesContainer').offset().top - 20 }, 200);
            }
            
            function updateNavButtons() {
                $('#prevSlide').prop('disabled', currentIndex === 0);
                $('#nextSlide').prop('disabled', currentIndex === slidesData.length - 1);
            }
            
            // event listeners navigation
            $('#prevSlide').on('click', function() {
                if (currentIndex > 0) goToSlide(currentIndex - 1);
            });
            $('#nextSlide').on('click', function() {
                if (currentIndex < slidesData.length - 1) goToSlide(currentIndex + 1);
            });
            
            // Gestion clavier (gauche/droite) – Accessibilité
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    if (currentIndex > 0) goToSlide(currentIndex - 1);
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    if (currentIndex < slidesData.length - 1) goToSlide(currentIndex + 1);
                    e.preventDefault();
                }
            });
            
            // swiper simplifié pour mobile (touch)
            let touchStartX = 0;
            let touchEndX = 0;
            $('#slidesContainer').on('touchstart', function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $('#slidesContainer').on('touchend', function(e) {
                touchEndX = e.originalEvent.changedTouches[0].clientX;
                const delta = touchEndX - touchStartX;
                if (Math.abs(delta) > 50) {
                    if (delta > 0 && currentIndex > 0) goToSlide(currentIndex - 1);
                    else if (delta < 0 && currentIndex < slidesData.length - 1) goToSlide(currentIndex + 1);
                }
            });
            
            // Initialiser les slides
            buildSlides();
            updateDots();
            updateNavButtons();
            // s'assurer que le premier slide est bien visible et les autres cachés
            $('.slide').each(function(idx) {
                if (idx !== 0) $(this).addClass('slide-hidden');
                else $(this).removeClass('slide-hidden');
            });
            
            // Ajout de style responsive pour le contenu des slides (math non nécessaire ici mais prêt)
            // Quelques ajustements de la taille du texte: déjà avec tailwind.
            // Ajout d'un petit affichage de numéro de slide (optionnel) discrètement en bas à droite
            function updateSlideCounter() {
                // petit affichage élégant mais optionnel
                let counter = $('.slide-counter');
                if(counter.length === 0) {
                    $wrapper.append('<div class="slide-counter absolute bottom-3 right-4 text-xs text-slate-400 bg-white/60 px-2 py-0.5 rounded-full"></div>');
                    counter = $('.slide-counter');
                }
                counter.text(`${currentIndex+1} / ${slidesData.length}`);
            }
            updateSlideCounter();
            // observer les changements après chaque slide
            const origGoTo = goToSlide;
            window.goToSlide = function(i) {
                origGoTo(i);
                updateSlideCounter();
            };
            goToSlide = function(i) {
                origGoTo(i);
                updateSlideCounter();
            };
            // override la fonction pour conserver le compteur
            const superGo = goToSlide;
            goToSlide = function(idx) {
                superGo(idx);
                updateSlideCounter();
            };
            // appel après chaque changement
            $(document).on('slideChanged', function(){ updateSlideCounter(); });
            // patch manuel
            const originalUpdate = updateNavButtons;
            updateNavButtons = function() {
                originalUpdate();
                updateSlideCounter();
            };
            updateNavButtons();
        });
    </script>
</body>
</html>
