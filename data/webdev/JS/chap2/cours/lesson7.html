<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 7 : Conversion de types en JavaScript | Cours JS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, mais reste léger) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Transition douce pour les slides */
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        .slide {
            display: none;
            animation: fadeSlide 0.4s ease-out;
        }
        .slide.active {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Personnalisation des boutons tactiles */
        .nav-btn {
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* Code blocks plus lisibles */
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            border-radius: 0.75rem;
        }
        /* Scrollbar personnalisée mais discrète */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        body {
            touch-action: pan-y pinch-zoom;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 font-sans antialiased">

    <!-- Conteneur principal avec padding adapté mobile -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 md:py-10 min-h-screen flex flex-col">
        
        <!-- Carte qui contient tout le slide -->
        <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl border border-indigo-100 overflow-hidden">
            <!-- Header fixe avec progression et titre de leçon -->
            <div class="bg-indigo-700 px-5 py-4 md:px-8 flex flex-wrap justify-between items-center gap-2">
                <div class="flex items-center space-x-2">
                    <span class="text-white font-bold text-sm md:text-base">📘 Initiation JavaScript</span>
                    <span class="text-indigo-200 text-xs">| Leçon 7</span>
                </div>
                <div class="text-white text-sm font-medium bg-indigo-800 px-3 py-1 rounded-full">
                    <span id="currentSlideIndicator">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>

            <!-- Contenu dynamique des slides (injecté par jQuery) -->
            <div id="slidesContainer" class="slide-container p-5 md:p-8 lg:p-10">
                <!-- Les slides seront générées ici -->
                <div class="text-center py-12 text-gray-400">Chargement du cours...</div>
            </div>

            <!-- Navigation buttons + progress bar -->
            <div class="border-t border-indigo-100 px-5 py-4 md:px-8 bg-gray-50 flex flex-col sm:flex-row justify-between items-center gap-3">
                <button id="prevBtn" class="nav-btn w-full sm:w-auto bg-white border border-indigo-300 text-indigo-700 font-semibold py-2.5 px-6 rounded-xl shadow-sm hover:bg-indigo-50 transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    ← Précédent
                </button>
                <div class="flex gap-2 flex-wrap justify-center">
                    <!-- pagination dots dynamique -->
                    <div id="paginationDots" class="flex gap-2"></div>
                </div>
                <button id="nextBtn" class="nav-btn w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                    Suivant →
                </button>
            </div>
        </div>

        <!-- petit footer mention -->
        <p class="text-center text-xs text-gray-400 mt-6">Cours pour classe Développement Web — Enseignant Cameroun 🇨🇲</p>
    </div>

    <script>
        // Définition des données de la leçon 7 (conversion types)
        // D'après le programme : objectifsLesson index 0,1,2 de lesson7 dans chapitre 2
        const lessonData = {
            title: "Leçon 7 : Conversion de types (typage dynamique)",
            subtitle: "Transformer chaînes, nombres et booléens avec maîtrise",
            objectives: [
                "Convertir en string avec String(), .toString() ou concaténation",
                "Convertir en nombre avec Number(), parseInt(), parseFloat(), + unaire",
                "Convertir en boolean avec Boolean() et comprendre les valeurs truthy/falsy"
            ],
            contentSlides: [
                {
                    title: "🧠 Pourquoi convertir des types ?",
                    content: `
                        <p class="text-gray-700 text-base md:text-lg leading-relaxed">JavaScript est un langage à typage dynamique : une variable peut changer de type. Mais souvent, on a besoin de <strong class="text-indigo-700">forcer un type spécifique</strong> pour effectuer des opérations ou vérifications.</p>
                        <div class="bg-amber-50 border-l-4 border-amber-400 p-4 my-5 rounded-r-xl">
                            <p class="text-amber-800 text-sm md:text-base">✨ <span class="font-bold">Exemple concret :</span> Les valeurs d’un formulaire sont toujours des chaînes (string). Pour additionner des âges, il faut convertir en nombre.</p>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-2xl mt-3">
                            <p class="font-mono text-sm"><span class="text-indigo-800">let ageUtilisateur = "21";</span> → c’est une chaîne. <br> <span class="text-indigo-800">let ageNombre = Number(ageUtilisateur);</span> → maintenant c'est un nombre.</p>
                        </div>
                    `
                },
                {
                    title: "🔁 Conversion vers String (chaîne de caractères)",
                    content: `
                        <p class="font-semibold text-indigo-800 mb-2">3 manières principales :</p>
                        <ul class="list-disc pl-6 space-y-2 text-gray-700">
                            <li><code class="bg-gray-100 px-1.5 py-0.5 rounded text-red-600">String(valeur)</code> — fonction globale, fiable et explicite.</li>
                            <li><code class="bg-gray-100 px-1.5 py-0.5 rounded text-red-600">valeur.toString()</code> — méthode, mais attention avec <span class="font-mono">null</span> ou <span class="font-mono">undefined</span> (provoque une erreur).</li>
                            <li><code class="bg-gray-100 px-1.5 py-0.5 rounded text-red-600">" " + valeur</code> — concaténation avec une chaîne vide (astuce courante).</li>
                        </ul>
                        <pre class="bg-gray-900 text-gray-100 p-4 rounded-xl mt-4 text-sm overflow-x-auto"><code>// Exemples:
console.log(String(123));       // "123"
console.log(String(true));      // "true"
console.log((42).toString());   // "42"
console.log("" + 999);          // "999"
console.log(String(null));      // "null"</code></pre>
                        <div class="bg-teal-50 p-3 rounded-lg mt-3"><span class="font-bold text-teal-800">💡 À retenir :</span> La concaténation avec une chaîne est pratique, mais <code>String()</code> est plus lisible pour les débutants.</div>
                    `
                },
                {
                    title: "🔢 Conversion vers Number (nombre)",
                    content: `
                        <p class="mb-2">Différentes méthodes avec subtilités :</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-3">
                            <div class="border rounded-xl p-3 bg-white shadow-sm"><code class="font-bold">Number(valeur)</code> → conversion complète.<br> <span class="text-sm">"42" → 42, "42px" → NaN.</span></div>
                            <div class="border rounded-xl p-3 bg-white shadow-sm"><code class="font-bold">parseInt(valeur, base)</code> → entier depuis le début.<br><span class="text-sm">"42px" → 42, "101" base 2 → 5</span></div>
                            <div class="border rounded-xl p-3 bg-white shadow-sm"><code class="font-bold">parseFloat(valeur)</code> → décimal.<br><span class="text-sm">"3.14" → 3.14, "3.14px" → 3.14</span></div>
                            <div class="border rounded-xl p-3 bg-white shadow-sm"><code class="font-bold">+ unaire</code> → rapide mais strict.<br><span class="text-sm">+"99" → 99, +"abc" → NaN</span></div>
                        </div>
                        <pre class="bg-gray-900 text-gray-100 p-4 rounded-xl text-sm"><code>let a = Number("123");      // 123
let b = Number("hello");    // NaN (Not a Number)
let c = parseInt("100px");  // 100
let d = parseFloat("12.99€");// 12.99
let e = +"45";              // 45
let f = +"45.5";            // 45.5</code></pre>
                        <p class="text-amber-700 bg-amber-50 p-3 rounded-lg mt-2">⚠️ <strong>Attention :</strong> <code>NaN</code> (Not a Number) est un nombre invalide, vérifiable avec <code>isNaN()</code>.</p>
                    `
                },
                {
                    title: "🎯 Conversion vers Boolean (vrai/faux)",
                    content: `
                        <p>La conversion booléenne permet de tester si une valeur est "truthy" (considérée comme vraie) ou "falsy" (fausse).</p>
                        <div class="my-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div class="bg-red-50 p-3 rounded-xl border border-red-200">
                                <p class="font-bold text-red-700">⚡ Valeurs falsy (6)</p>
                                <ul class="list-disc pl-5 text-sm">
                                    <li><code class="bg-white px-1">false</code></li><li><code>0</code></li><li><code>""</code> (chaîne vide)</li>
                                    <li><code>null</code></li><li><code>undefined</code></li><li><code>NaN</code></li>
                                </ul>
                            </div>
                            <div class="bg-green-50 p-3 rounded-xl border border-green-200">
                                <p class="font-bold text-green-700">✅ Valeurs truthy (tout le reste)</p>
                                <ul class="list-disc pl-5 text-sm">
                                    <li><code>"hello"</code></li><li><code>42</code></li><li><code>[]</code> (tableau vide)</li>
                                    <li><code>{}</code> (objet)</li><li><code>true</code></li><li><code>Infinity</code></li>
                                </ul>
                            </div>
                        </div>
                        <pre class="bg-gray-900 text-gray-100 p-4 rounded-xl text-sm"><code>console.log(Boolean(0));        // false
console.log(Boolean("JS"));      // true
console.log(Boolean(""));        // false
console.log(Boolean([]));        // true (objet)
console.log(!!"texte");          // true (double négation courte)</code></pre>
                        <p class="italic text-gray-600 mt-2">✨ Utilisez <code>Boolean(valeur)</code> ou <code>!!valeur</code> pour convertir en booléen explicite.</p>
                    `
                },
                {
                    title: "🔄 Bonus : conversions implicites (coercition)",
                    content: `
                        <p>JavaScript convertit souvent automatiquement les types. Comprendre ces règles évite les bugs !</p>
                        <div class="bg-gray-100 p-4 rounded-xl my-3 space-y-2">
                            <p><span class="font-mono">"5" + 3</span> → <span class="bg-white px-2 py-0.5 rounded shadow-sm">"53"</span> (concaténation car une chaîne)</p>
                            <p><span class="font-mono">"5" - 3</span> → <span class="bg-white px-2 py-0.5 rounded shadow-sm">2</span> (soustraction force conversion numérique)</p>
                            <p><span class="font-mono">"5" * "2"</span> → <span class="bg-white px-2 py-0.5 rounded shadow-sm">10</span> (les deux deviennent nombres)</p>
                            <p><span class="font-mono">"hello" - 1</span> → <span class="bg-white px-2 py-0.5 rounded shadow-sm">NaN</span></p>
                        </div>
                        <div class="bg-indigo-100 border-l-4 border-indigo-500 p-3 rounded">
                            🧪 <strong>Bon réflexe</strong> : Pour des additions, convertissez explicitement avec <code>Number()</code> ou <code>parseInt()</code> si vous voulez additionner des nombres issus de formulaires.
                        </div>
                        <p class="mt-3 text-sm text-gray-500">Exemple classique : <code>let somme = Number(valeur1) + Number(valeur2);</code></p>
                    `
                }
            ]
        };

        let currentSlideIndex = 0;
        let totalSlides = 0;

        // Construire l'ensemble des slides: slide 0 = titre, slide 1 = objectifs, puis le reste = contentSlides
        function buildSlidesArray() {
            const slides = [];
            // Slide 0 : Titre + introduction
            slides.push({
                type: "title",
                title: lessonData.title,
                subtitle: lessonData.subtitle,
            });
            // Slide 1 : Objectifs pédagogiques
            slides.push({
                type: "objectives",
                objectives: lessonData.objectives,
            });
            // Slides de contenu
            lessonData.contentSlides.forEach((item, idx) => {
                slides.push({
                    type: "content",
                    slideTitle: item.title,
                    htmlContent: item.content,
                });
            });
            return slides;
        }

        // Rendu d'un slide spécifique
        function renderSlide(slide, index) {
            if (slide.type === "title") {
                return `
                    <div class="text-center py-4 md:py-8">
                        <div class="inline-block p-3 bg-indigo-100 rounded-full mb-4">
                            <span class="text-4xl">🔄</span>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${escapeHtml(slide.title)}</h1>
                        <p class="text-gray-500 text-lg md:text-xl mt-3 max-w-xl mx-auto">${escapeHtml(slide.subtitle)}</p>
                        <div class="mt-8 flex justify-center">
                            <div class="bg-indigo-50 rounded-2xl p-4 inline-block text-sm text-indigo-800 shadow-sm">
                                💡 Apprenez à maîtriser les conversions de type en JavaScript
                            </div>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectives") {
                let objHtml = `<h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b border-indigo-200 pb-3 mb-5">🎯 Objectifs de la leçon</h2>`;
                objHtml += `<div class="grid gap-3 md:gap-4">`;
                slide.objectives.forEach((obj, i) => {
                    objHtml += `
                        <div class="flex items-start gap-3 bg-indigo-50/60 p-4 rounded-xl shadow-sm hover:shadow transition">
                            <span class="flex-shrink-0 w-7 h-7 bg-indigo-600 text-white rounded-full flex items-center justify-center text-sm font-bold">${i+1}</span>
                            <p class="text-gray-800 text-base md:text-lg">${escapeHtml(obj)}</p>
                        </div>
                    `;
                });
                objHtml += `</div><div class="mt-8 text-center text-sm text-gray-400 italic">À la fin de ce module, vous saurez convertir tout type de données comme un pro</div>`;
                return objHtml;
            } 
            else if (slide.type === "content") {
                return `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-5">${escapeHtml(slide.slideTitle)}</h2>
                        <div class="prose prose-indigo max-w-none">
                            ${slide.htmlContent}
                        </div>
                    </div>
                `;
            }
            return "<p>Erreur de contenu</p>";
        }

        // petite fonction anti-XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Mise à jour de l'affichage
        function updateSlide() {
            const slidesArray = buildSlidesArray();
            totalSlides = slidesArray.length;
            $("#totalSlides").text(totalSlides);
            $("#currentSlideIndicator").text(currentSlideIndex + 1);
            
            const currentSlideData = slidesArray[currentSlideIndex];
            const renderedHtml = renderSlide(currentSlideData, currentSlideIndex);
            $("#slidesContainer").html(renderedHtml);
            
            // Appliquer MathJax au cas où des formules existeraient (même si peu probable ici)
            if (window.MathJax) {
                MathJax.typesetPromise ? MathJax.typesetPromise() : MathJax.typeset();
            }
            
            // Gérer état des boutons
            $("#prevBtn").prop("disabled", currentSlideIndex === 0);
            $("#nextBtn").prop("disabled", currentSlideIndex === totalSlides - 1);
            
            // Générer les dots de pagination
            let dotsHtml = "";
            for (let i = 0; i < totalSlides; i++) {
                const activeClass = (i === currentSlideIndex) ? "bg-indigo-600 w-6" : "bg-gray-300 w-3";
                dotsHtml += `<button class="dot-nav h-2 rounded-full ${activeClass} transition-all duration-200" data-index="${i}"></button>`;
            }
            $("#paginationDots").html(dotsHtml);
            
            // Scroll to top pour une meilleure UX sur mobile
            window.scrollTo({ top: 0, behavior: "smooth" });
        }
        
        // Navigation
        function nextSlide() {
            const slidesArray = buildSlidesArray();
            if (currentSlideIndex < slidesArray.length - 1) {
                currentSlideIndex++;
                updateSlide();
            }
        }
        
        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSlide();
            }
        }
        
        // Événements et gestion tactile + clavier
        $(document).ready(function() {
            updateSlide();
            
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
            
            // Délégation pour clic sur les dots
            $(document).on("click", ".dot-nav", function() {
                let idx = $(this).data("index");
                if (idx !== undefined && idx !== currentSlideIndex) {
                    currentSlideIndex = idx;
                    updateSlide();
                }
            });
            
            // Gestion du clavier : flèches droite/gauche
            $(document).on("keydown", function(e) {
                if (e.key === "ArrowRight") {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    prevSlide();
                    e.preventDefault();
                }
            });
            
            // Swipe minimal pour mobile (avec jQuery + touch events)
            let touchStartX = 0;
            let touchEndX = 0;
            $(".slide-container").on("touchstart", function(e) {
                touchStartX = e.originalEvent.changedTouches[0].screenX;
            });
            $(".slide-container").on("touchend", function(e) {
                touchEndX = e.originalEvent.changedTouches[0].screenX;
                const diff = touchEndX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        prevSlide();  // glisser vers la droite = précédent
                    } else {
                        nextSlide();  // glisser vers la gauche = suivant
                    }
                    e.preventDefault();
                }
            });
            
            // Ajuster les styles pre pour mobile
            $("pre").css("overflow-x", "auto");
        });
    </script>
</body>
</html>
