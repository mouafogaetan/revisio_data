<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au JavaScript",
  "classe": "Développement Web",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours (8 pts)",
      "points": "8 pts",
      "enonce": "<div><p>Répondez de manière claire et précise aux questions suivantes. Vos réponses doivent démontrer une compréhension solide des concepts de stockage local, de débogage et de gestion d'erreurs en JavaScript.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1.1 (2 pts)</strong> : Distinguez <strong>localStorage</strong> et <strong>sessionStorage</strong> dans le Web Storage API. Donnez deux différences clés concernant la persistance et la portée des données, et citez un cas d'usage concret pour chacun.</p>",
          "reponse": "<p><strong>localStorage</strong> : Les données persistent indéfiniment, même après la fermeture du navigateur, et sont partagées entre tous les onglets d'un même navigateur pour un domaine donné. <strong>Cas d'usage</strong> : Sauvegarder les préférences de thème (mode clair/sombre) ou l'état d'un panier d'achat non finalisé [citation:7][citation:10].</p><p><strong>sessionStorage</strong> : Les données sont éphémères et sont effacées à la fermeture de l'onglet ou du navigateur. Chaque onglet possède son propre espace de stockage indépendant. <strong>Cas d'usage</strong> : Conserver des données de formulaire en cours de saisie ou un compteur de visites sur l'onglet courant [citation:7][citation:10].</p>"
        },
        {
          "question": "<p><strong>1.2 (2 pts)</strong> : Expliquez comment stocker et récupérer un objet JavaScript complexe (par exemple un tableau d'objets) dans <code>localStorage</code>. Quelle est la contrainte de cette API et comment la contourne-t-on ?</p>",
          "reponse": "<p>La contrainte principale de <code>localStorage</code> et <code>sessionStorage</code> est qu'ils ne peuvent stocker que des <strong>chaînes de caractères</strong> [citation:1][citation:7][citation:10].</p><p>Pour stocker un objet :</p><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>const monObjet = { nom: \"Jean\", age: 25, ville: \"Douala\" };<br>localStorage.setItem('utilisateur', JSON.stringify(monObjet));</pre><p>Pour le récupérer :</p><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>const data = localStorage.getItem('utilisateur');<br>const objetRestore = JSON.parse(data);</pre><p><strong>JSON.stringify()</strong> convertit l'objet en chaîne JSON, et <strong>JSON.parse()</strong> effectue l'opération inverse [citation:1][citation:7][citation:10].</p>"
        },
        {
          "question": "<p><strong>1.3 (2 pts)</strong> : Expliquez le rôle des méthodes <code>setItem()</code>, <code>getItem()</code>, <code>removeItem()</code> et <code>clear()</code> du Web Storage API. Pourquoi est-il conseillé d'utiliser <code>try...catch</code> lors de l'accès au stockage local ?</p>",
          "reponse": "<p><strong>setItem(clé, valeur)</strong> : Stocke ou modifie la valeur associée à une clé.</p><p><strong>getItem(clé)</strong> : Récupère la valeur associée à une clé, ou <code>null</code> si elle n'existe pas.</p><p><strong>removeItem(clé)</strong> : Supprime la paire clé-valeur correspondante.</p><p><strong>clear()</strong> : Supprime toutes les données stockées pour le domaine [citation:7][citation:10].</p><p>Il est conseillé d'utiliser <code>try...catch</code> car les opérations de stockage peuvent échouer, par exemple si le quota de stockage est dépassé (environ 5-10 Mo). Cela permet d'éviter le blocage du script et d'afficher un message d'erreur approprié à l'utilisateur [citation:2].</p>"
        },
        {
          "question": "<p><strong>1.4 (2 pts)</strong> : Qu'est-ce qu'un <strong>point d'arrêt (breakpoint)</strong> dans le contexte du débogage JavaScript ? À quoi servent les boutons <strong>Step Over</strong> et <strong>Step Into</strong> dans l'onglet \"Sources\" des DevTools ?</p>",
          "reponse": "<p>Un <strong>point d'arrêt (breakpoint)</strong> est un marqueur placé sur une ligne de code dans les DevTools du navigateur. Lorsque l'exécution du script atteint cette ligne, elle se met en pause, permettant au développeur d'inspecter l'état des variables, la portée (scope) et la pile d'appels (call stack) à cet instant précis [citation:3].</p><p><strong>Step Over</strong> : Exécute la ligne de code en cours et s'arrête à la ligne suivante. Si la ligne contient un appel de fonction, la fonction est exécutée en une seule fois (sans entrer dans ses détails) [citation:3].</p><p><strong>Step Into</strong> : Exécute la ligne de code en cours et s'arrête sur la première ligne de la fonction appelée (si la ligne contient un appel de fonction), permettant un débogage plus fin [citation:3].</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Gestion des erreurs et débogage (6 pts)",
      "points": "6 pts",
      "enonce": "<div><p>Analysez les situations suivantes et proposez des solutions en utilisant les techniques de gestion d'erreurs ou de débogage appropriées.</p></div>",
      "questions": [
        {
          "question": "<p><strong>2.1 (3 pts)</strong> : Un développeur a écrit le code suivant pour gérer une erreur potentielle, mais il ne fonctionne pas comme prévu. Identifiez le problème et corrigez le code.</p><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>function diviser(a, b) {<br>  if (b === 0) {<br>    throw new Error('Division par zéro interdite !');<br>  }<br>  return a / b;<br>}<br><br>try {<br>  const resultat = diviser(10, 0);<br>  console.log(resultat);<br>}<br>console.log(\"Le programme continue...\");</pre>",
          "reponse": "<p><strong>Problème identifié</strong> : Le bloc <code>try</code> n'est pas suivi d'un bloc <code>catch</code> pour capturer l'erreur. L'erreur sera donc non gérée et le script s'arrêtera [citation:2].</p><p><strong>Correction</strong> :</p><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>function diviser(a, b) {<br>  if (b === 0) {<br>    throw new Error('Division par zéro interdite !');<br>  }<br>  return a / b;<br>}<br><br>try {<br>  const resultat = diviser(10, 0);<br>  console.log(resultat);<br>} catch (error) {<br>  console.error('Une erreur est survenue :', error.message);<br>}<br>console.log(\"Le programme continue...\"); // S'exécute maintenant</pre>"
        },
        {
          "question": "<p><strong>2.2 (3 pts)</strong> : Vous devez déboguer une fonction JavaScript qui ne renvoie pas la valeur attendue. Expliquez les étapes à suivre pour identifier l'origine du problème en utilisant l'onglet \"Sources\" des DevTools (Chrome) :</p><ul><li>Comment placer un point d'arrêt ?</li><li>Quelle est l'utilité du panneau \"Scope\" ?</li><li>Comment utilise-t-on la console du débogueur pour inspecter les variables en temps réel ?</li></ul>",
          "reponse": "<p><strong>Placer un point d'arrêt :</strong> Ouvrir l'onglet \"Sources\", naviguer jusqu'au fichier JavaScript concerné, puis cliquer sur le numéro de ligne où l'on souhaite mettre en pause l'exécution. Un marqueur bleu/rouge apparaît pour indiquer que le point d'arrêt est actif [citation:3].</p><p><strong>Panneau \"Scope\" :</strong> Ce panneau affiche les variables accessibles dans le contexte actuel, y compris les variables locales (dans la fonction), les closures et les variables globales. Il permet de visualiser les valeurs des variables au moment de la pause du débogueur [citation:3].</p><p><strong>Console du débogueur :</strong> Pendant une pause (à un point d'arrêt), l'onglet \"Console\" des DevTools peut être utilisé pour saisir des expressions et inspecter les variables dans le contexte en cours. Par exemple, taper <code>maVariable</code> et appuyer sur Entrée affichera sa valeur actuelle. On peut également modifier des valeurs à la volée pour tester des corrections [citation:3].</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Application pratique - Mini application de gestion de tâches (6 pts)",
      "points": "6 pts",
      "enonce": "<div><p>Une application de gestion de tâches (To-Do List) utilise <code>localStorage</code> pour persister les tâches de l'utilisateur entre les sessions. Le code fourni ci-dessous contient plusieurs erreurs ou omissions.</p><p><strong>Consignes :</strong></p><ol><li>Lisez attentivement le code.</li><li>Identifiez les problèmes (3 problèmes majeurs).</li><li>Proposez des corrections en justifiant chaque modification.</li></ol><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>// Code de l'application To-Do<br><br>const tasks = [];<br><br>function loadTasks() {<br>  const stored = localStorage.getItem('tasks');<br>  if (stored) {<br>    tasks = stored;<br>  }<br>}<br><br>function saveTasks() {<br>  localStorage.setItem('tasks', tasks);<br>}<br><br>function addTask(taskText) {<br>  tasks.push({ text: taskText, done: false });<br>  saveTasks();<br>  renderTasks();<br>}<br><br>function renderTasks() {<br>  const list = document.getElementById('taskList');<br>  list.innerHTML = '';<br>  for (let i = 0; i < tasks.length; i++) {<br>    const li = document.createElement('li');<br>    li.textContent = tasks[i].text;<br>    list.appendChild(li);<br>  }<br>}<br><br>loadTasks();<br>renderTasks();</pre></div>",
      "questions": [
        {
          "question": "<p><strong>3.1 (2 pts)</strong> : Identifiez et corrigez l'erreur concernant la déclaration de la variable <code>tasks</code> dans la fonction <code>loadTasks()</code>. Justifiez votre réponse.</p>",
          "reponse": "<p><strong>Problème</strong> : La variable <code>tasks</code> est déclarée avec <code>const</code> en dehors de la fonction, mais on tente de lui réassigner une valeur dans <code>loadTasks()</code> avec <code>tasks = stored</code>. Une variable <code>const</code> ne peut pas être réaffectée [citation:2].</p><p><strong>Correction</strong> : Déclarer <code>tasks</code> avec <code>let</code> pour permettre la réaffectation : <code>let tasks = [];</code></p>"
        },
        {
          "question": "<p><strong>3.2 (2 pts)</strong> : Identifiez et corrigez l'erreur concernant le chargement des données depuis <code>localStorage</code>. Que faut-il faire pour récupérer correctement la liste des tâches ?</p>",
          "reponse": "<p><strong>Problème</strong> : Les données stockées dans <code>localStorage</code> sont une chaîne JSON. Le code actuel assigne directement cette chaîne à <code>tasks</code>, ce qui rend la variable <code>tasks</code> une chaîne et non plus un tableau. De plus, les tâches ne sont pas chargées si aucune donnée n'est stockée (le tableau reste vide, mais la variable est réassignée à <code>undefined</code>) [citation:1][citation:7][citation:10].</p><p><strong>Correction</strong> :</p><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>function loadTasks() {<br>  const stored = localStorage.getItem('tasks');<br>  if (stored !== null) {<br>    tasks = JSON.parse(stored);<br>  } else {<br>    tasks = []; // Initialiser à un tableau vide si rien n'est stocké<br>  }<br>}</pre>"
        },
        {
          "question": "<p><strong>3.3 (2 pts)</strong> : Identifiez et corrigez l'erreur concernant la sauvegarde des données dans <code>localStorage</code>. Pourquoi est-il nécessaire de transformer les données avant de les stocker ?</p>",
          "reponse": "<p><strong>Problème</strong> : Le code tente de stocker directement le tableau <code>tasks</code> dans <code>localStorage</code> avec <code>localStorage.setItem('tasks', tasks)</code>. Comme <code>localStorage</code> ne stocke que des chaînes, le tableau sera converti en sa représentation string, ce qui ne permettra pas de le récupérer correctement (par exemple, <code>[object Object]</code> ou une chaîne non structurée).</p><p><strong>Correction</strong> : Utiliser <code>JSON.stringify()</code> pour convertir le tableau en une chaîne JSON avant de le stocker [citation:1][citation:7][citation:10].</p><pre style='background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto;'>function saveTasks() {<br>  localStorage.setItem('tasks', JSON.stringify(tasks));<br>}</pre>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
