<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au JavaScript",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours (QCM)",
      "points": "4 pts",
      "enonce": "<p>Pour chaque affirmation, choisissez la ou les bonnes réponses. Une réponse juste rapporte <strong>0.5 point</strong>. Une réponse fausse retire 0.25 point.</p>",
      "questions": [
        {
          "question": "1) La méthode <code>querySelector()</code> en JavaScript permet de :",
          "reponse": "<p><strong>Réponse :</strong> B</p><ul><li>A. Sélectionner uniquement les éléments avec un attribut id</li><li>B. Sélectionner un élément avec un <strong>sélecteur CSS</strong></li><li>C. Créer un nouvel élément HTML</li><li>D. Supprimer un élément du DOM</li></ul>"
        },
        {
          "question": "2) La méthode <code>getElementById()</code> retourne :",
          "reponse": "<p><strong>Réponse :</strong> B</p><ul><li>A. Une collection de tous les éléments avec cet id</li><li>B. L'<strong>élément unique</strong> avec l'id correspondant</li><li>C. Une NodeList d'éléments</li><li>D. Un tableau d'éléments</li></ul>"
        },
        {
          "question": "3) Pour sélectionner <strong>tous</strong> les éléments ayant une classe donnée, on utilise :",
          "reponse": "<p><strong>Réponse :</strong> C</p><ul><li>A. <code>getElementById</code></li><li>B. <code>querySelector</code></li><li>C. <code>querySelectorAll</code></li><li>D. <code>getElementsByTagName</code></li></ul>"
        },
        {
          "question": "4) La propriété <code>textContent</code> permet de :",
          "reponse": "<p><strong>Réponse :</strong> A</p><ul><li>A. Modifier le <strong>contenu textuel</strong> d'un élément</li><li>B. Modifier le style CSS d'un élément</li><li>C. Ajouter un attribut à un élément</li><li>D. Supprimer un élément du DOM</li></ul>"
        },
        {
          "question": "5) <code>classList.add('nouvelleClasse')</code> permet de :",
          "reponse": "<p><strong>Réponse :</strong> C</p><ul><li>A. Supprimer une classe CSS</li><li>B. Vérifier si une classe existe</li><li>C. <strong>Ajouter</strong> une classe à un élément</li><li>D. Changer l'ID d'un élément</li></ul>"

        {
          "question": "6) Les méthodes <code>getAttribute()</code> et <code>setAttribute()</code> servent à manipuler :",
          "reponse": "<p><strong>Réponse :</strong> A</p><ul><li>A. Les <strong>attributs</strong> HTML d'un élément</li><li>B. Le contenu textuel d'un élément</li><li>C. Les styles CSS d'un élément</li><li>D. Les événements d'un élément</li></ul>"
        },
        {
          "question": "7) Pour créer un nouvel élément HTML avec JavaScript, on utilise :",
          "reponse": "<p><strong>Réponse :</strong> B</p><ul><li>A. <code>document.write()</code></li><li>B. <code>document.createElement()</code></li><li>C. <code>document.querySelector()</code></li><li>D. <code>document.append()</code></li></ul>"
        },
        {
          "question": "8) La méthode <code>appendChild()</code> permet de :",
          "reponse": "<p><strong>Réponse :</strong> C</p><ul><li>A. Créer un nouvel élément</li><li>B. Supprimer un élément du DOM</li><li>C. <strong>Ajouter</strong> un élément comme <strong>dernier enfant</strong> d'un parent</li><li>D. Cloner un élément existant</li></ul>"

      ]
    },
    {
      "titre": "Exercice 2 : Sélection et manipulation du DOM",
      "points": "5 pts",
      "enonce": "<p>On considère la page HTML suivante :</p><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto; font-size:0.8rem;'><pre style='margin:0;'>&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;head&gt;\n  &lt;title&gt;Ma Boutique&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1 id=\"titrePrincipal\"&gt;Bienvenue sur ma boutique&lt;/h1&gt;\n  \n  &lt;div id=\"catalogue\"&gt;\n    &lt;p class=\"produit\"&gt;Pagne Wax - 19 990 FCFA&lt;/p&gt;\n    &lt;p class=\"produit\"&gt;Boubou - 25 000 FCFA&lt;/p&gt;\n    &lt;p class=\"produit promo\"&gt;Chemise - 12 500 FCFA&lt;/p&gt;\n  &lt;/div&gt;\n  \n  &lt;button id=\"btnModifier\"&gt;Modifier le titre&lt;/button&gt;\n&lt;/body&gt;\n&lt;/html&gt;</pre></div><p>Écrivez le code JavaScript permettant de réaliser les opérations suivantes.</p>",
      "questions": [
        {
          "question": "1) Sélectionnez le titre principal (h1) avec <strong>getElementById</strong> et affichez son contenu dans la console.",
          "reponse": "<p><strong>Code JavaScript :</strong></p><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>const titre = document.getElementById('titrePrincipal');\nconsole.log(titre.textContent); // Affiche \"Bienvenue sur ma boutique\"</pre></div>"
        },
        {

        },
        {
          "question": "3) Sélectionnez l'élément ayant à la fois la classe 'produit' et la classe 'promo' avec <strong>querySelector</strong> et affichez son texte dans la console.",

        {
          "question": "5) Ajoutez un attribut 'title' avec la valeur 'Boutique en ligne' au titre principal.",
          "reponse": "<p><strong>Code JavaScript :</strong></p><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>const titre = document.getElementById('titrePrincipal');\ntitre.setAttribute('title', 'Boutique en ligne');</pre></div>"
        }

    },
    {
      "titre": "Exercice 3 : Manipulation avancée du DOM",
      "points": "4 pts",
      "enonce": "<p>En utilisant JavaScript, écrivez le code pour réaliser les opérations suivantes sur la page de l'exercice 2.</p>",
      "questions": [
        {
          "question": "1) Créez un nouvel élément <code>&lt;p&gt;</code> avec le texte 'Nouveau produit - 15 000 FCFA' et <strong>ajoutez-le</strong> dans la div avec l'id 'catalogue'. Il doit apparaître <strong>après</strong> les autres produits.",

        {

        {

    {
      "titre": "Exercice 4 : Gestion des événements",

        {
          "question": "1) Créez un bouton avec l'id 'btnColor'. Au clic sur ce bouton, la couleur de fond de la page doit alterner entre 'lightblue' et 'lightcoral'.",
          "reponse": "<p><strong>Code JavaScript :</strong></p><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>const btnColor = document.getElementById('btnColor');\nlet couleurActuelle = 'lightblue';\n\nbtnColor.addEventListener('click', function() {\n  if (couleurActuelle === 'lightblue') {\n    document.body.style.backgroundColor = 'lightcoral';\n    couleurActuelle = 'lightcoral';\n  } else {\n    document.body.style.backgroundColor = 'lightblue';\n    couleurActuelle = 'lightblue';\n  }\n});</pre></div>"

        {

          "reponse": "<p><strong>Code JavaScript :</strong></p><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>const input = document.querySelector('input');\nconst affichage = document.getElementById('affichage');\n\ninput.addEventListener('input', function() {\n  affichage.textContent = this.value;\n});</pre></div>"

      "questions": [
        {
          "question": "Écrivez le code complet HTML + JavaScript pour réaliser cette to-do list.",
          "reponse": "<p><strong>Code HTML :</strong></p><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto; font-size:0.8rem;'><pre style='margin:0;'>&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;head&gt;\n  &lt;title&gt;Ma To-Do List&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Ma To-Do List&lt;/h1&gt;\n  &lt;input type=\"text\" id=\"inputTache\" placeholder=\"Nouvelle tâche...\" /&gt;\n  &lt;button id=\"btnAjouter\"&gt;Ajouter&lt;/button&gt;\n  &lt;ul id=\"listeTaches\"&gt;&lt;/ul&gt;\n\n  &lt;script&gt;\n    const input = document.getElementById('inputTache');\n    const btn = document.getElementById('btnAjouter');\n    const liste = document.getElementById('listeTaches');\n\n    btn.addEventListener('click', function() {\n      const texte = input.value.trim();\n      if (texte === '') {\n        alert('Veuillez saisir une tâche');\n        return;\n      }\n\n      const li = document.createElement('li');\n      li.textContent = texte;\n\n      const btnSuppr = document.createElement('button');\n      btnSuppr.textContent = 'Supprimer';\n      btnSuppr.addEventListener('click', function() {\n        li.remove();\n      });\n\n      li.appendChild(btnSuppr);\n      liste.appendChild(li);\n      input.value = '';\n      input.focus();\n    });\n\n    input.addEventListener('keypress', function(event) {\n      if (event.key === 'Enter') {\n        btn.click();\n      }\n    });\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</pre></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
