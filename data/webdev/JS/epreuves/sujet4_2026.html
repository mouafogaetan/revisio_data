<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au JavaScript",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Manipulation du DOM (Chap 6)",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez créer une page HTML avec un conteneur <code>&lt;div id=\"produits\"&gt;&lt;/div&gt;</code>. À l'aide de JavaScript, vous allez manipuler le DOM pour afficher dynamiquement des produits.</p><p><strong>Consignes :</strong></p><ol><li>Sélectionner le conteneur avec <code>querySelector()</code>.</li><li>Créer un tableau d'objets produits (nom, prix, categorie).</li><li>Pour chaque produit, créer un élément <code>&lt;div&gt;</code> avec la classe <code>produit</code> contenant le nom et le prix.</li><li>Ajouter ces éléments au conteneur avec <code>appendChild()</code>.</li><li>Ajouter un bouton qui permet de supprimer un produit lorsque l'utilisateur clique dessus.</li></ol></div>",
      "questions": [
        {
          "question": "1) Écrivez le code HTML avec le conteneur et le code JavaScript pour afficher dynamiquement les produits.",
          "reponse": "<pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang='fr'&gt;\n&lt;head&gt;\n  &lt;meta charset='UTF-8'&gt;\n  &lt;title&gt;Exercice DOM&lt;/title&gt;\n  &lt;style&gt;\n    .produit { border: 1px solid #ccc; padding: 10px; margin: 5px; cursor: pointer; }\n    .produit:hover { background: #f0f0f0; }\n  &lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;div id='produits'&gt;&lt;/div&gt;\n\n  &lt;script&gt;\n    const conteneur = document.querySelector('#produits');\n    \n    const produits = [\n      { nom: 'Laptop', prix: 500000, categorie: 'Informatique' },\n      { nom: 'Smartphone', prix: 300000, categorie: 'Téléphonie' },\n      { nom: 'Casque', prix: 50000, categorie: 'Audio' }\n    ];\n    \n    produits.forEach(produit => {\n      const div = document.createElement('div');\n      div.className = 'produit';\n      div.textContent = `${produit.nom} - ${produit.prix} FCFA`;\n      \n      div.addEventListener('click', function() {\n        this.remove();\n      });\n      \n      conteneur.appendChild(div);\n    });\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Gestion d'événements (Chap 7)",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez créer un formulaire d'inscription avec les champs suivants : nom, email et un bouton de soumission.</p><p><strong>Consignes :</strong></p><ol><li>Créer le formulaire HTML avec les champs.</li><li>Attacher un événement <code>submit</code> avec <code>addEventListener()</code>.</li><li>Empêcher l'envoi du formulaire avec <code>preventDefault()</code>.</li><li>Récupérer les valeurs saisies et les afficher dans un message d'alerte.</li><li>Si le champ email est vide, afficher un message d'erreur et empêcher la soumission.</li></ol></div>",
      "questions": [
        {
          "question": "1) Écrivez le code HTML et JavaScript du formulaire avec validation.",
          "reponse": "<pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang='fr'&gt;\n&lt;head&gt;\n  &lt;meta charset='UTF-8'&gt;\n  &lt;title&gt;Formulaire&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;form id='inscription'&gt;\n    &lt;div&gt;\n      &lt;label for='nom'&gt;Nom :&lt;/label&gt;\n      &lt;input type='text' id='nom' name='nom' required&gt;\n    &lt;/div&gt;\n    &lt;div&gt;\n      &lt;label for='email'&gt;Email :&lt;/label&gt;\n      &lt;input type='email' id='email' name='email' required&gt;\n    &lt;/div&gt;\n    &lt;button type='submit'&gt;S'inscrire&lt;/button&gt;\n  &lt;/form&gt;\n  &lt;div id='message'&gt;&lt;/div&gt;\n\n  &lt;script&gt;\n    const form = document.getElementById('inscription');\n    const message = document.getElementById('message');\n\n    form.addEventListener('submit', function(event) {\n      event.preventDefault();\n      \n      const nom = document.getElementById('nom').value;\n      const email = document.getElementById('email').value;\n      \n      if (!email) {\n        message.textContent = 'Erreur : L\\'email est obligatoire';\n        message.style.color = 'red';\n        return;\n      }\n      \n      message.textContent = `Inscription réussie ! Bienvenue ${nom}`;\n      message.style.color = 'green';\n      console.log(`Nom : ${nom}, Email : ${email}`);\n    });\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Fonctions modernes et API (Chap 8)",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez consommer une API publique qui renvoie des données sur les utilisateurs.</p><p><strong>Consignes :</strong></p><ol><li>Utiliser <code>fetch()</code> pour récupérer les données depuis <code>https://jsonplaceholder.typicode.com/users</code>.</li><li>Utiliser <code>async/await</code> pour gérer l'asynchrone.</li><li>Afficher les noms et emails des utilisateurs dans une liste HTML.</li><li>Gérer les erreurs avec <code>try...catch</code>.</li></ol></div>",
      "questions": [
        {
          "question": "1) Écrivez le code pour récupérer et afficher les utilisateurs de l'API.",
          "reponse": "<pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang='fr'&gt;\n&lt;head&gt;\n  &lt;meta charset='UTF-8'&gt;\n  &lt;title&gt;API Utilisateurs&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Liste des utilisateurs&lt;/h1&gt;\n  &lt;ul id='userList'&gt;&lt;/ul&gt;\n  &lt;div id='erreur' style='color:red;'&gt;&lt;/div&gt;\n\n  &lt;script&gt;\n    const userList = document.getElementById('userList');\n    const erreurDiv = document.getElementById('erreur');\n\n    async function chargerUtilisateurs() {\n      try {\n        const reponse = await fetch('https://jsonplaceholder.typicode.com/users');\n        \n        if (!reponse.ok) {\n          throw new Error(`Erreur HTTP : ${reponse.status}`);\n        }\n        \n        const utilisateurs = await reponse.json();\n        \n        utilisateurs.forEach(utilisateur => {\n          const li = document.createElement('li');\n          li.textContent = `${utilisateur.name} - ${utilisateur.email}`;\n          userList.appendChild(li);\n        });\n        \n      } catch (erreur) {\n        erreurDiv.textContent = `Erreur : ${erreur.message}`;\n        console.error('Erreur de chargement :', erreur);\n      }\n    }\n    \n    chargerUtilisateurs();\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Stockage local et gestion d'erreurs (Chap 9)",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Vous devez créer une application de gestion de tâches (To-Do List) avec persistance des données.</p><p><strong>Consignes :</strong></p><ol><li>Permettre à l'utilisateur d'ajouter une tâche (champ texte + bouton).</li><li>Stocker les tâches dans <code>localStorage</code>.</li><li>Afficher la liste des tâches au chargement de la page.</li><li>Permettre de supprimer une tâche en cliquant dessus.</li><li>Utiliser <code>try...catch</code> pour gérer les erreurs de parsing JSON.</li></ol></div>",
      "questions": [
        {
          "question": "1) Écrivez le code complet de l'application To-Do List.",
          "reponse": "<pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;!DOCTYPE html&gt;\n&lt;html lang='fr'&gt;\n&lt;head&gt;\n  &lt;meta charset='UTF-8'&gt;\n  &lt;title&gt;To-Do List&lt;/title&gt;\n  &lt;style&gt;\n    .tache { cursor: pointer; padding: 5px; margin: 3px; background: #f0f0f0; }\n    .tache:hover { background: #e0e0e0; }\n  &lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Ma To-Do List&lt;/h1&gt;\n  &lt;input type='text' id='tacheInput' placeholder='Nouvelle tâche...'&gt;\n  &lt;button id='ajouterBtn'&gt;Ajouter&lt;/button&gt;\n  &lt;ul id='tacheList'&gt;&lt;/ul&gt;\n\n  &lt;script&gt;\n    const tacheInput = document.getElementById('tacheInput');\n    const ajouterBtn = document.getElementById('ajouterBtn');\n    const tacheList = document.getElementById('tacheList');\n    const STOCKAGE_CLE = 'taches';\n\n    function getTaches() {\n      try {\n        const data = localStorage.getItem(STOCKAGE_CLE);\n        return data ? JSON.parse(data) : [];\n      } catch (erreur) {\n        console.error('Erreur de parsing :', erreur);\n        return [];\n      }\n    }\n\n    function sauvegarderTaches(taches) {\n      try {\n        localStorage.setItem(STOCKAGE_CLE, JSON.stringify(taches));\n      } catch (erreur) {\n        console.error('Erreur de sauvegarde :', erreur);\n      }\n    }\n\n    function afficherTaches() {\n      const taches = getTaches();\n      tacheList.innerHTML = '';\n      taches.forEach((tache, index) => {\n        const li = document.createElement('li');\n        li.className = 'tache';\n        li.textContent = tache;\n        li.addEventListener('click', function() {\n          const tachesActuelles = getTaches();\n          tachesActuelles.splice(index, 1);\n          sauvegarderTaches(tachesActuelles);\n          afficherTaches();\n        });\n        tacheList.appendChild(li);\n      });\n    }\n\n    ajouterBtn.addEventListener('click', function() {\n      const tache = tacheInput.value.trim();\n      if (!tache) {\n        alert('Veuillez saisir une tâche');\n        return;\n      }\n      const taches = getTaches();\n      taches.push(tache);\n      sauvegarderTaches(taches);\n      tacheInput.value = '';\n      afficherTaches();\n    });\n\n    tacheInput.addEventListener('keypress', function(event) {\n      if (event.key === 'Enter') {\n        ajouterBtn.click();\n      }\n    });\n\n    // Chargement initial\n    afficherTaches();\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Délégation d'événements (Chap 7)",
      "points": "2 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Expliquez le concept de <strong>délégation d'événements</strong> en JavaScript et donnez un exemple concret de son utilisation.</p></div>",
      "questions": [
        {
          "question": "1) Expliquez la délégation d'événements et donnez un exemple.",
          "reponse": "<strong>Délégation d'événements :</strong><br><br>La délégation d'événements est une technique qui consiste à attacher un gestionnaire d'événement à un <strong>élément parent</strong> plutôt qu'à chaque élément enfant individuellement. L'événement remonte jusqu'au parent grâce au <strong>phénomène de propagation (bubbling)</strong>.<br><br><strong>Exemple concret :</strong><br><pre style='background:#1e293b; color:#e2e8f0; padding:10px; border-radius:6px;'><code>&lt;ul id='liste'&gt;\n  &lt;li&gt;Article 1&lt;/li&gt;\n  &lt;li&gt;Article 2&lt;/li&gt;\n  &lt;li&gt;Article 3&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;script&gt;\n  // Au lieu d'ajouter un écouteur sur chaque li\n  document.getElementById('liste').addEventListener('click', function(event) {\n    if (event.target.tagName === 'LI') {\n      console.log('Vous avez cliqué sur :', event.target.textContent);\n    }\n  });\n&lt;/script&gt;</code></pre><br><strong>Avantages :</strong><br><ul><li>✅ Moins de gestionnaires d'événements = meilleure performance.</li><li>✅ Fonctionne même pour les éléments ajoutés dynamiquement.</li><li>✅ Code plus propre et plus maintenable.</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
