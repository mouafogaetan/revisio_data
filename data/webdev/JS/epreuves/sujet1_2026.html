<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au JavaScript",
  "classe": "Développement Web",
  "sequence": "Séquence 1 : Fondamentaux du JavaScript et manipulations des données",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours sur les bases de JavaScript",
      "points": "8 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Répondez aux questions suivantes en vous appuyant sur les notions vues en cours. La maîtrise des concepts fondamentaux de JavaScript est essentielle pour le développement web interactif [citation:1][citation:5].</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.1 (1 pt)</strong> Expliquez en quelques lignes la différence entre JavaScript côté client et JavaScript côté serveur (Node.js). Donnez un exemple d'utilisation pour chaque.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Le JavaScript <strong>côté client</strong> s'exécute dans le navigateur de l'utilisateur et permet d'interagir avec la page HTML (DOM, événements, animations). Exemple : valider un formulaire avant envoi. Le JavaScript <strong>côté serveur</strong> avec Node.js s'exécute sur le serveur et permet de créer des API, d'accéder à des bases de données ou de lire des fichiers. Exemple : construire une API REST pour une application e-commerce.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.2 (1 pt)</strong> Quelle est la différence entre <code>var</code>, <code>let</code> et <code>const</code> en JavaScript ? Dans quel cas utiliser <code>const</code> ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> <code>var</code> est l'ancienne méthode de déclaration, avec une portée de fonction et le hoisting. <code>let</code> et <code>const</code> sont modernes (ES6), avec une portée de bloc. <code>let</code> permet de réassigner une variable, tandis que <code>const</code> empêche la réassignation. On utilise <code>const</code> pour les valeurs qui ne changeront pas (ex: <code>const PI = 3.14</code>). C'est une bonne pratique d'utiliser <code>const</code> par défaut, et <code>let</code> quand la réassignation est nécessaire.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.3 (1 pt)</strong> Expliquez la différence entre les opérateurs de comparaison <code>==</code> et <code>===</code> en JavaScript. Donnez un exemple où ils donnent des résultats différents.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> <code>==</code> est l'opérateur d'égalité faible (ou abstraite). Il effectue une conversion de type avant la comparaison. <code>===</code> est l'opérateur d'égalité stricte. Il compare la valeur et le type sans conversion. Exemple : <code>5 == '5'</code> retourne <code>true</code> (conversion de la chaîne en nombre), tandis que <code>5 === '5'</code> retourne <code>false</code> (types différents). Il est recommandé d'utiliser <code>===</code> pour éviter des comportements inattendus.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.4 (1 pt)</strong> Qu'est-ce que le DOM (Document Object Model) ? Quel est son rôle dans l'interaction entre JavaScript et une page HTML ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Le DOM (Document Object Model) est une représentation arborescente de la page HTML. Il permet à JavaScript de manipuler dynamiquement la structure, le contenu et le style d'une page web. Grâce au DOM, JavaScript peut accéder à des éléments HTML, modifier leur texte, leurs attributs ou leur style, et réagir aux événements utilisateur [citation:5][citation:9].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.5 (1 pt)</strong> Expliquez le rôle de <code>console.log()</code> en JavaScript. Citez deux autres méthodes de la console utilisées pour le débogage.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> <code>console.log()</code> permet d'afficher des messages ou des variables dans la console du navigateur, ce qui est essentiel pour le débogage. <code>console.error()</code> affiche un message d'erreur (en rouge), <code>console.warn()</code> affiche un avertissement (en jaune). D'autres méthodes existent comme <code>console.info()</code> ou <code>console.table()</code> pour afficher des tableaux [citation:1][citation:5].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.6 (1 pt)</strong> Quelle est la syntaxe d'une fonction fléchée (arrow function) ? Donnez un exemple simple et expliquez en quoi elle diffère d'une déclaration de fonction classique.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Syntaxe : <code>(paramètres) => { instructions }</code> . Exemple : <code>const addition = (a, b) => a + b;</code> . Les fonctions fléchées sont plus concises et ne lient pas leur propre <code>this</code> (elles prennent le <code>this</code> du contexte parent). Elles sont souvent utilisées pour les callbacks et les méthodes de tableau [citation:1][citation:5].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.7 (1 pt)</strong> Décrivez ce que fait la boucle <code>for</code> en JavaScript. Écrivez une boucle <code>for</code> qui affiche les nombres de 0 à 9 dans la console.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Une boucle <code>for</code> permet d'exécuter un bloc de code plusieurs fois, avec un compteur géré par trois expressions : initialisation, condition, incrémentation. La boucle s'exécute tant que la condition est vraie. Exemple :<br><br><code>for (let i = 0; i < 10; i++) {<br>  console.log(i);<br>}</code><br><br>Cette boucle affiche les nombres de 0 à 9 dans la console [citation:7].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.8 (1 pt)</strong> Définissez les concepts de <code>null</code> et <code>undefined</code> en JavaScript. Quelle est la différence entre ces deux valeurs ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> <code>undefined</code> est une valeur automatiquement assignée par JavaScript lorsqu'une variable est déclarée mais pas encore initialisée, ou quand une fonction ne retourne rien. <code>null</code> est une valeur qui représente 'aucune valeur' ou 'objet vide', et doit être assignée volontairement. <code>undefined</code> est utilisé par le langage lui-même, tandis que <code>null</code> est utilisé par le développeur pour indiquer l'absence intentionnelle de valeur.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyser et corriger un code JavaScript",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Un développeur débutant a écrit le code JavaScript suivant, qui contient plusieurs erreurs. Analysez-le et corrigez les erreurs.</p><div style='background: #1e293b; padding: 15px; border-radius: 8px; color: #f1f5f9; font-family: monospace; overflow-x: auto;'>// Code avec erreurs<br>function calculerPrix(prix, quantite) {<br>    let total = prix * quantite<br>    console.log('Le prix total est : ' + total)<br>    return total<br>}<br><br>let produit = 'Sac à dos'<br>let prix = 15000<br>let quantite = 3<br>let resultat = calculerPrix(prix, quantite)<br>console.log('Produit : ' + produit + ' - Total : ' + resultat)<br><br>// Deuxième partie : boucle avec tableau<br>let prixProduits = [12000, 25000, 8000, 35000]<br>let totalTous = 0<br>for (i = 0, i < prixProduits.length, i++) {<br>    totalTous += prixProduits[i]<br>}<br>console.log('Total de tous les produits : ' + totalTous)</div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.1 (1 pt)</strong> Identifiez les erreurs de syntaxe dans le code ci-dessus.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Plusieurs erreurs de syntaxe sont présentes :<br>- Dans la fonction <code>calculerPrix</code>, il manque un point-virgule après la première instruction (<code>let total = prix * quantite;</code>).<br>- Dans la boucle <code>for</code>, les expressions sont séparées par des virgules (<code>,</code>) alors qu'elles doivent être séparées par des points-virgules (<code>;</code>).<br>- La variable <code>i</code> dans la boucle n'est pas déclarée avec <code>let</code> ou <code>var</code>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.2 (2 pts)</strong> Réécrivez le code corrigé, en respectant les bonnes pratiques (point-virgule, déclaration de variables, déclaration de boucle correcte).</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px; white-space: pre-wrap;'>// Code corrigé<br>function calculerPrix(prix, quantite) {<br>    let total = prix * quantite;<br>    console.log('Le prix total est : ' + total);<br>    return total;<br>}<br><br>let produit = 'Sac à dos';<br>let prix = 15000;<br>let quantite = 3;<br>let resultat = calculerPrix(prix, quantite);<br>console.log('Produit : ' + produit + ' - Total : ' + resultat);<br><br>// Deuxième partie : boucle avec tableau corrigée<br>let prixProduits = [12000, 25000, 8000, 35000];<br>let totalTous = 0;<br>for (let i = 0; i < prixProduits.length; i++) {<br>    totalTous += prixProduits[i];<br>}<br>console.log('Total de tous les produits : ' + totalTous);</code></p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.3 (1 pt)</strong> Expliquez pourquoi il est important de déclarer les variables avec <code>let</code> ou <code>const</code> plutôt que de les utiliser sans déclaration (comme <code>i</code> dans la boucle).</div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
