<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au JavaScript",
  "classe": "Développement Web",
  "sequence": "Séquence 3 - Fonctions, Tableaux et Objets",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Fonctions et conditions",
      "points": "4 pts",
      "enonce": "<p>Dans cet exercice, vous allez manipuler les fonctions et les structures de contrôle en JavaScript.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Fonction de calcul (2 pts)</strong></p><p>Écrivez une fonction nommée <code>calculerRemise</code> qui prend deux paramètres :</p><ul><li><code>prix</code> : le prix d'un article (nombre).</li><li><code>estMembre</code> : un booléen indiquant si l'acheteur est membre (true) ou non (false).</li></ul><p>La fonction doit retourner le prix après application des règles suivantes :</p><ul><li>Si l'acheteur est membre, une remise de 10% est appliquée.</li><li>Si l'acheteur n'est pas membre, aucune remise n'est appliquée.</li><li>Si le prix est supérieur à 1000 FCFA, une remise supplémentaire de 5% est appliquée (en plus de la remise membre si applicable).</li></ul><p><strong>Exemple :</strong> <code>calculerRemise(1200, true)</code> doit retourner <code>1026</code> (1200 - 10% - 5%).</p>",
          "reponse": "<pre><code>function calculerRemise(prix, estMembre) {\n  let remise = 0;\n  \n  if (estMembre) {\n    remise += 0.10;\n  }\n  \n  if (prix > 1000) {\n    remise += 0.05;\n  }\n  \n  return prix * (1 - remise);\n}\n\n// Tests\nconsole.log(calculerRemise(1200, true));   // 1026\nconsole.log(calculerRemise(800, true));    // 720\nconsole.log(calculerRemise(1200, false));  // 1140</code></pre>"
        },
        {
          "question": "<p><strong>2. Fonction de validation (2 pts)</strong></p><p>Écrivez une fonction nommée <code>validerMotDePasse</code> qui prend une chaîne de caractères en paramètre et retourne <code>true</code> si le mot de passe est valide, <code>false</code> sinon.</p><p>Un mot de passe est considéré valide s'il respecte toutes les conditions suivantes :</p><ul><li>Il fait au moins 8 caractères.</li><li>Il contient au moins une lettre majuscule.</li><li>Il contient au moins un chiffre.</li></ul><p>Utilisez une boucle pour parcourir la chaîne et vérifier les conditions.</p>",
          "reponse": "<pre><code>function validerMotDePasse(mdp) {\n  if (mdp.length < 8) {\n    return false;\n  }\n  \n  let aMajuscule = false;\n  let aChiffre = false;\n  \n  for (let i = 0; i < mdp.length; i++) {\n    const char = mdp[i];\n    \n    if (char >= 'A' && char <= 'Z') {\n      aMajuscule = true;\n    }\n    \n    if (char >= '0' && char <= '9') {\n      aChiffre = true;\n    }\n  }\n  \n  return aMajuscule && aChiffre;\n}\n\n// Tests\nconsole.log(validerMotDePasse('Abc12345')); // true\nconsole.log(validerMotDePasse('abc12345')); // false\nconsole.log(validerMotDePasse('ABcdefgh')); // false\nconsole.log(validerMotDePasse('Abcdefg'));  // false (trop court)</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Manipulation de tableaux et d'objets",
      "points": "3 pts",
      "enonce": "<p>Dans cet exercice, vous allez manipuler des tableaux et des objets en JavaScript. Le code suivant définit un tableau d'objets représentant des produits d'une boutique :</p><pre><code>const produits = [\n  { nom: 'Laptop', prix: 1200, stock: 5 },\n  { nom: 'Souris', prix: 25, stock: 20 },\n  { nom: 'Clavier', prix: 80, stock: 3 },\n  { nom: 'Écran', prix: 350, stock: 0 }\n];</code></pre>",
      "questions": [
        {
          "question": "<p><strong>1. Fonctions sur les produits (1.5 pts)</strong></p><p><strong>a)</strong> Écrivez une fonction <code>produitsDisponibles</code> qui retourne un tableau contenant uniquement les produits dont le stock est supérieur à 0.</p><p><strong>b)</strong> Écrivez une fonction <code>prixTotal</code> qui calcule le prix total de tous les produits en stock (prix × stock).</p>",
          "reponse": "<pre><code>// a) Produits disponibles\nfunction produitsDisponibles(produits) {\n  const resultat = [];\n  for (let i = 0; i < produits.length; i++) {\n    if (produits[i].stock > 0) {\n      resultat.push(produits[i]);\n    }\n  }\n  return resultat;\n}\n\n// Version avec filter\nfunction produitsDisponiblesFilter(produits) {\n  return produits.filter(p => p.stock > 0);\n}\n\n// b) Prix total en stock\nfunction prixTotal(produits) {\n  let total = 0;\n  for (let i = 0; i < produits.length; i++) {\n    total += produits[i].prix * produits[i].stock;\n  }\n  return total;\n}\n\n// Version avec reduce\nfunction prixTotalReduce(produits) {\n  return produits.reduce((total, p) => total + p.prix * p.stock, 0);\n}\n\nconsole.log(produitsDisponibles(produits));\nconsole.log(prixTotal(produits)); // 1200*5 + 25*20 + 80*3 + 350*0 = 6000 + 500 + 240 = 6740</code></pre>"
        },
        {
          "question": "<p><strong>2. Recherche de produits (1.5 pts)</strong></p><p><strong>a)</strong> Écrivez une fonction <code>trouverProduit</code> qui prend un nom de produit en paramètre et retourne l'objet correspondant, ou <code>null</code> si le produit n'existe pas.</p><p><strong>b)</strong> Écrivez une fonction <code>appliquerRemise</code> qui prend un pourcentage de remise et applique cette remise à tous les produits dont le prix est supérieur à 100. La fonction doit modifier directement le tableau des produits.</p>",
          "reponse": "<pre><code>// a) Trouver un produit par son nom\nfunction trouverProduit(produits, nom) {\n  for (let i = 0; i < produits.length; i++) {\n    if (produits[i].nom === nom) {\n      return produits[i];\n    }\n  }\n  return null;\n}\n\n// Version avec find\nfunction trouverProduitFind(produits, nom) {\n  return produits.find(p => p.nom === nom) || null;\n}\n\n// b) Appliquer une remise\nfunction appliquerRemise(produits, pourcentage) {\n  const taux = 1 - pourcentage / 100;\n  for (let i = 0; i < produits.length; i++) {\n    if (produits[i].prix > 100) {\n      produits[i].prix = Math.round(produits[i].prix * taux);\n    }\n  }\n}\n\n// Test\nconst testProduits = [\n  { nom: 'Laptop', prix: 1200, stock: 5 },\n  { nom: 'Souris', prix: 25, stock: 20 },\n  { nom: 'Clavier', prix: 80, stock: 3 }\n];\nappliquerRemise(testProduits, 10);\nconsole.log(testProduits); // Laptop: 1080, Souris: 25 (inchangé), Clavier: 80 (inchangé)</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Interaction DOM et événements",
      "points": "3 pts",
      "enonce": "<p>Dans cet exercice, vous allez créer une petite application de gestion de liste de tâches (To-Do List) en utilisant JavaScript et le DOM.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Structure HTML et JS (1.5 pts)</strong></p><p>Créez une page HTML simple avec :</p><ul><li>Un champ de texte (<code>&lt;input&gt;</code>) pour saisir une nouvelle tâche.</li><li>Un bouton \"Ajouter\" qui ajoute la tâche à la liste.</li><li>Une liste non ordonnée (<code>&lt;ul&gt;</code>) qui affiche les tâches.</li></ul><p>Écrivez le code JavaScript qui permet d'ajouter une tâche à la liste lorsqu'on clique sur le bouton. La tâche doit être ajoutée sous forme d'un élément <code>&lt;li&gt;</code>.</p>",
          "reponse": "<pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=\"fr\"&gt;\n  &lt;head&gt;\n    &lt;meta charset=\"UTF-8\"&gt;\n    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;\n    &lt;title&gt;To-Do List&lt;/title&gt;\n  &lt;/head&gt;\n  &lt;body&gt;\n    &lt;h1&gt;Ma Liste de Tâches&lt;/h1&gt;\n    &lt;input type=\"text\" id=\"tacheInput\" placeholder=\"Nouvelle tâche...\"&gt;\n    &lt;button id=\"ajouterBtn\"&gt;Ajouter&lt;/button&gt;\n    &lt;ul id=\"listeTaches\"&gt;&lt;/ul&gt;\n\n    &lt;script&gt;\n      const input = document.getElementById('tacheInput');\n      const bouton = document.getElementById('ajouterBtn');\n      const liste = document.getElementById('listeTaches');\n\n      function ajouterTache() {\n        const texte = input.value.trim();\n        if (texte === '') {\n          alert('Veuillez saisir une tâche !');\n          return;\n        }\n\n        const li = document.createElement('li');\n        li.textContent = texte;\n        liste.appendChild(li);\n        input.value = '';\n        input.focus();\n      }\n\n      bouton.addEventListener('click', ajouterTache);\n      input.addEventListener('keypress', function(e) {\n        if (e.key === 'Enter') {\n          ajouterTache();\n        }\n      });\n    &lt;/script&gt;\n  &lt;/body&gt;\n&lt;/html&gt;</code></pre>"
        },
        {
          "question": "<p><strong>2. Ajout de fonctionnalités (1.5 pts)</strong></p><p>Améliorez l'application en ajoutant deux fonctionnalités :</p><ul><li>Un bouton <strong>Supprimer</strong> à côté de chaque tâche qui permet de la supprimer de la liste.</li><li>Lorsqu'on clique sur une tâche, elle doit être barrée (toggle de la classe CSS <code>.termine</code>).</li></ul><p>Écrivez le code JavaScript correspondant.</p>",
          "reponse": "<pre><code>// Ajout des fonctionnalités (à intégrer dans le script)\n\n// Modifier la fonction ajouterTache pour inclure un bouton supprimer\nfunction ajouterTache() {\n  const texte = input.value.trim();\n  if (texte === '') {\n    alert('Veuillez saisir une tâche !');\n    return;\n  }\n\n  const li = document.createElement('li');\n  li.textContent = texte;\n\n  // Bouton supprimer\n  const btnSupprimer = document.createElement('button');\n  btnSupprimer.textContent = 'Supprimer';\n  btnSupprimer.addEventListener('click', function() {\n    liste.removeChild(li);\n  });\n\n  // Toggle de la classe 'termine' au clic sur la tâche\n  li.addEventListener('click', function(e) {\n    if (e.target !== btnSupprimer) {\n      li.classList.toggle('termine');\n    }\n  });\n\n  li.appendChild(btnSupprimer);\n  liste.appendChild(li);\n  input.value = '';\n  input.focus();\n}\n\n// CSS associé\n// .termine {\n//   text-decoration: line-through;\n//   color: gray;\n// }</code></pre>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
