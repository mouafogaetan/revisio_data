<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la Leçon 2",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Nous allons apprendre à intégrer JavaScript dans nos pages HTML.</p><ul style='margin-top: 15px; list-style: none; padding: 0;'><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>📄 <strong>Balise script</strong> avec l'attribut <code>src</code> (fichier externe)</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>✏️ <strong>JavaScript en ligne</strong> dans une page HTML</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>⏱️ <strong>Ordre d'exécution</strong> et placement des scripts (<code>defer</code>, <code>async</code>)</li></ul><p style='margin-top: 20px; font-style: italic;'>Le bon placement du JavaScript est crucial pour la performance de votre site. 🇨🇲</p></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons voir comment intégrer du JavaScript dans nos pages HTML. Il existe plusieurs façons de faire : on peut écrire le code directement dans la page HTML, ou bien le placer dans un fichier séparé et le charger via la balise script. Nous allons aussi comprendre l'importance du placement du code JavaScript, car il peut bloquer le chargement de la page s'il est mal positionné. Nous verrons les attributs defer et async qui permettent de contrôler le chargement des scripts.",
    "note": "Le placement des scripts est essentiel pour la performance d'une page web."
  },
  {
    "titre": "La Balise Script",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>La balise <code>&lt;script&gt;</code> est la porte d'entrée du JavaScript dans le HTML.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #4fc3f7;'>À l'intérieur du &lt;head&gt;</strong> : Exécution avant l'affichage du contenu</li><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #4caf50;'>À la fin du &lt;body&gt;</strong> : Exécution après le chargement du contenu (recommandé)</li><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #ffb74d;'>Multiple</strong> : On peut avoir plusieurs balises <code>&lt;script&gt;</code> sur une page</li></ul></div><div style='background: #1a3a1a; padding: 12px; border-radius: 8px; border: 1px solid #4caf50;'><span style='font-weight: bold; color: #4caf50;'>💡 Bonne pratique :</span> Placer les scripts à la fin du <code>&lt;body&gt;</code> pour ne pas bloquer le chargement de la page.</div></div>",
    "texteParle": "La balise script est la manière d'intégrer du JavaScript dans une page HTML. Elle peut être placée à différents endroits. Si vous la mettez dans la section head, le script s'exécutera avant que le contenu de la page ne s'affiche. Si vous la mettez à la fin du body, le script s'exécutera après que tout le contenu HTML ait été chargé. C'est la position recommandée car elle ne bloque pas l'affichage de la page. Vous pouvez aussi avoir plusieurs balises script sur une même page, elles seront exécutées dans l'ordre où elles apparaissent.",
    "note": "Toujours placer les scripts le plus bas possible dans le body pour éviter le blocage."
  },
  {
    "titre": "JavaScript Interne (En Ligne)",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Le code JavaScript peut être écrit directement dans la balise <code>&lt;script&gt;</code>.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #666;'>&lt;!DOCTYPE html&gt;</span><br><span style='color: #ffb74d;'>&lt;html</span> lang=<span style='color: #4fc3f7;'>\"fr\"</span><span style='color: #ffb74d;'>&gt;</span><br>  <span style='color: #ffb74d;'>&lt;head&gt;</span><br>    <span style='color: #ffb74d;'>&lt;meta</span> charset=<span style='color: #4fc3f7;'>\"UTF-8\"</span><span style='color: #ffb74d;'>&gt;</span><br>    <span style='color: #ffb74d;'>&lt;title&gt;</span>JavaScript Interne<span style='color: #ffb74d;'>&lt;/title&gt;</span><br>  <span style='color: #ffb74d;'>&lt;/head&gt;</span><br>  <span style='color: #ffb74d;'>&lt;body&gt;</span><br>    <span style='color: #ffb74d;'>&lt;h1&gt;</span>Mon premier JavaScript<span style='color: #ffb74d;'>&lt;/h1&gt;</span><br>    <br>    <span style='color: #ffb74d;'>&lt;script&gt;</span><br>      <span style='color: #666;'>// Ce code s'exécute quand la page est chargée</span><br>      console.log(<span style='color: #4fc3f7;'>\"Bonjour depuis le JavaScript interne !\"</span>);<br>      <span style='color: #ffb74d;'>const</span> message = <span style='color: #4fc3f7;'>\"Bienvenue sur ma page\"</span>;<br>      alert(message);<br>    <span style='color: #ffb74d;'>&lt;/script&gt;</span><br>  <span style='color: #ffb74d;'>&lt;/body&gt;</span><br><span style='color: #ffb74d;'>&lt;/html&gt;</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Utilisation :</span> Idéal pour les petits scripts ou les tests rapides. À éviter pour les projets importants.</div></div>",
    "texteParle": "Le JavaScript interne, c'est quand on écrit le code directement dans la balise script à l'intérieur de la page HTML. C'est pratique pour des petits scripts ou pour faire des tests rapides. Le code s'exécute quand le navigateur rencontre la balise. Dans l'exemple, on voit une page HTML simple avec un script qui affiche un message dans la console et une alerte. Cette méthode est simple, mais elle a des limites : le code n'est pas réutilisable sur plusieurs pages, et il alourdit le fichier HTML. Pour des projets plus importants, il est préférable d'utiliser des fichiers externes.",
    "note": "Le JavaScript interne est utile pour l'apprentissage mais pas pour la production."
  },
  {
    "titre": "JavaScript Externe",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Le code JavaScript est placé dans un fichier séparé avec l'extension <code>.js</code>.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #666;'>// Fichier script.js</span><br>console.log(<span style='color: #4fc3f7;'>\"Bonjour depuis le fichier externe !\"</span>);<br><span style='color: #ffb74d;'>function</span> afficherMessage() {<br>  alert(<span style='color: #4fc3f7;'>\"Ce message vient du fichier externe\"</span>);<br>}</div><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #666;'>&lt;!-- Dans le HTML --&gt;</span><br><span style='color: #ffb74d;'>&lt;script</span> src=<span style='color: #4fc3f7;'>\"script.js\"</span><span style='color: #ffb74d;'>&gt;&lt;/script&gt;</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4caf50;'>✅ Avantages :</span><br/>- Code <strong>réutilisable</strong> sur plusieurs pages<br/>- Code <strong>plus propre</strong> et mieux organisé<br/>- <strong>Cache</strong> du navigateur : le fichier est chargé une seule fois<br/>- Facilite la <strong>maintenance</strong> et le travail en équipe</div>",
    "texteParle": "La meilleure pratique pour intégrer JavaScript est d'utiliser des fichiers externes. On crée un fichier avec l'extension .js, on y écrit tout notre code, et on le relie à la page HTML avec la balise script et l'attribut src. Cette approche présente plusieurs avantages. D'abord, le code est réutilisable sur plusieurs pages. Ensuite, le code est plus propre et mieux organisé. Le navigateur met en cache le fichier, donc il n'est téléchargé qu'une seule fois, ce qui améliore les performances. Enfin, c'est plus facile à maintenir et à partager avec une équipe. C'est la méthode recommandée pour tous les projets professionnels.",
    "note": "Les fichiers JavaScript externes sont la norme en développement web professionnel."
  },
  {
    "titre": "Attribut src - Les Chemins",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>L'attribut <code>src</code> indique le chemin vers le fichier JavaScript.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1 1 40%; background: #1a2a3a; padding: 12px; border-radius: 8px; border-left: 4px solid #4fc3f7;'>    <strong style='color: #4fc3f7;'>📁 Chemin relatif</strong><br><span style='font-size: 0.9em;'><code>src=\"script.js\"</code> (même dossier)</span><br><span style='font-size: 0.9em;'><code>src=\"js/script.js\"</code> (sous-dossier)</span><br><span style='font-size: 0.9em;'><code>src=\"../script.js\"</code> (dossier parent)</span>  </div>  <div style='flex: 1 1 40%; background: #1a2a3a; padding: 12px; border-radius: 8px; border-left: 4px solid #4caf50;'>    <strong style='color: #4caf50;'>🌐 Chemin absolu</strong><br><span style='font-size: 0.9em;'><code>src=\"/assets/js/script.js\"</code> (depuis la racine)</span><br><span style='font-size: 0.9em;'><code>src=\"https://cdn.jsdelivr.net/...\"</code> (URL externe, CDN)</span>  </div></div><div style='background: #1a1a1a; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.85em;'>  <span style='color: #666;'>// Fichier depuis un CDN (Content Delivery Network) pour une bibliothèque</span><br>  <span style='color: #ffb74d;'>&lt;script</span> src=<span style='color: #4fc3f7;'>\"https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js\"</span><span style='color: #ffb74d;'>&gt;&lt;/script&gt;</span></div>",
    "texteParle": "L'attribut src de la balise script indique où se trouve le fichier JavaScript. On peut utiliser des chemins relatifs, qui sont calculés par rapport à la position du fichier HTML. Par exemple, src='script.js' cherche le fichier dans le même dossier. src='js/script.js' le cherche dans un sous-dossier js. src='../script.js' remonte d'un dossier. On peut aussi utiliser des chemins absolus, qui partent de la racine du site, ou des URLs complètes, souvent pour charger des bibliothèques depuis un CDN, comme jQuery. Les CDN sont des réseaux de serveurs qui distribuent des fichiers populaires pour améliorer les performances.",
    "note": "Les CDN permettent de charger des bibliothèques populaires plus rapidement."
  },
  {
    "titre": "L'Ordre d'Exécution des Scripts",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Les scripts sont exécutés <strong>dans l'ordre</strong> où ils apparaissent dans le HTML.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.8em; overflow-x: auto;'><span style='color: #666;'>&lt;body&gt;</span><br>  <span style='color: #ffb74d;'>&lt;script&gt;</span><br>    console.log(<span style='color: #4fc3f7;'>\"Script 1 - Premier\"</span>);<br>  <span style='color: #ffb74d;'>&lt;/script&gt;</span><br>  <br>  <span style='color: #ffb74d;'>&lt;script&gt;</span><br>    console.log(<span style='color: #4fc3f7;'>\"Script 2 - Deuxième\"</span>);<br>  <span style='color: #ffb74d;'>&lt;/script&gt;</span><br>  <br>  <span style='color: #ffb74d;'>&lt;script</span> src=<span style='color: #4fc3f7;'>\"script3.js\"</span><span style='color: #ffb74d;'>&gt;&lt;/script&gt;</span><br>  <span style='color: #666;'>// script3.js contient : console.log(\"Script 3 - Troisième\");</span><br><span style='color: #ffb74d;'>&lt;/body&gt;</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #ffb74d;'>⚠️ Attention :</span> Un script externe bloque le chargement du reste de la page jusqu'à ce qu'il soit téléchargé et exécuté.</div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px; margin-top: 10px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Console :</span><br/>Script 1 - Premier<br/>Script 2 - Deuxième<br/>Script 3 - Troisième</div></div>",
    "texteParle": "Les scripts s'exécutent dans l'ordre où ils apparaissent dans le code HTML. Si vous avez plusieurs balises script, la première sera exécutée, puis la deuxième, et ainsi de suite. C'est important parce que si un script dépend d'un autre, il doit apparaître après. Mais attention : quand le navigateur rencontre un script externe avec src, il télécharge le fichier et attend qu'il soit complètement chargé avant de continuer. Pendant ce temps, le chargement du reste de la page est bloqué. C'est pour ça que placer les scripts à la fin du body est recommandé.",
    "note": "L'ordre des scripts est crucial quand ils dépendent les uns des autres."
  },
  {
    "titre": "Le Problème du Blocage",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Un script externe bloque le chargement du DOM et peut ralentir l'affichage.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1; min-width: 120px; background: #3a1a1a; padding: 15px; border-radius: 10px; border: 2px solid #f44336;'>    <span style='font-size: 2em;'>⛔</span><br><strong style='color: #f44336;'>Sans</strong> optimisation<br><span style='font-size: 0.8em;'>1️⃣ Chargement HTML<br>2️⃣ <strong>Blocage</strong> : Téléchargement du script<br>3️⃣ Exécution du script<br>4️⃣ Suite du chargement HTML</span>  </div>  <div style='flex: 1; min-width: 120px; background: #1a3a1a; padding: 15px; border-radius: 10px; border: 2px solid #4caf50;'>    <span style='font-size: 2em;'>✅</span><br><strong style='color: #4caf50;'>Avec</strong> optimisation<br><span style='font-size: 0.8em;'>1️⃣ Chargement HTML<br>2️⃣ <strong>Parallèle</strong> : Chargement HTML + Script<br>3️⃣ Affichage immédiat</span>  </div></div><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><span style='font-weight: bold; color: #ffb74d;'>💡 Conséquence :</span><br/>- <strong>Page blanche</strong> plus longtemps<br/>- <strong>Utilisateur impatient</strong> qui quitte la page<br/>- <strong>Mauvaise expérience</strong> utilisateur<br/>- <strong>Impact SEO</strong> négatif</div></div>",
    "texteParle": "Quand le navigateur rencontre un script externe, il arrête le chargement de la page pour télécharger et exécuter le script. Cela crée un blocage qui peut ralentir considérablement l'affichage de la page. Le résultat, c'est une page blanche qui reste affichée plus longtemps, un utilisateur impatient qui risque de quitter le site, et une mauvaise expérience utilisateur. C'est aussi un problème pour le référencement, car les moteurs de recherche pénalisent les pages lentes. Heureusement, il existe des solutions pour éviter ce blocage.",
    "note": "Les pages lentes sont pénalisées par les moteurs de recherche et les utilisateurs."
  },
  {
    "titre": "La Solution : Attribut defer",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>L'attribut <code>defer</code> permet au script d'être téléchargé en parallèle et exécuté après le chargement du HTML.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #ffb74d;'>&lt;script</span> src=<span style='color: #4fc3f7;'>\"script.js\"</span> <span style='color: #ffb74d;'>defer</span><span style='color: #ffb74d;'>&gt;&lt;/script&gt;</span></div><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1 1 40%; background: #1a3a1a; padding: 12px; border-radius: 8px; border-left: 4px solid #4caf50;'>    <strong style='color: #4caf50;'>✅ Caractéristiques :</strong><br/>- <strong>Téléchargement</strong> en parallèle du HTML<br/>- <strong>Exécution</strong> après le chargement du HTML<br/>- <strong>Ordre</strong> d'exécution préservé<br/>- Idéal pour la <strong>plupart des scripts</strong>  </div>  <div style='flex: 1 1 40%; background: #1a2a3a; padding: 12px; border-radius: 8px; border-left: 4px solid #4fc3f7;'>    <strong style='color: #4fc3f7;'>📌 Utilisation :</strong><br/>- Scripts qui modifient le <strong>DOM</strong><br/>- Scripts qui dépendent du <strong>DOM chargé</strong><br/>- Scripts qui <strong>interagissent</strong> avec la page  </div></div>",
    "texteParle": "Pour résoudre le problème du blocage, on peut utiliser l'attribut defer. Quand on ajoute defer à une balise script, le navigateur télécharge le script en parallèle du chargement du HTML, mais il attend que la page soit entièrement chargée pour exécuter le script. L'ordre d'exécution des scripts avec defer est préservé : ils s'exécutent dans l'ordre où ils apparaissent. C'est la solution idéale pour la plupart des scripts, surtout ceux qui interagissent avec le DOM. On peut donc placer les scripts dans le head sans bloquer l'affichage.",
    "note": "defer est la recommandation pour la plupart des scripts JavaScript."
  },
  {
    "titre": "La Solution : Attribut async",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>L'attribut <code>async</code> télécharge le script en parallèle et l'exécute dès qu'il est prêt.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #ffb74d;'>&lt;script</span> src=<span style='color: #4fc3f7;'>\"script.js\"</span> <span style='color: #ffb74d;'>async</span><span style='color: #ffb74d;'>&gt;&lt;/script&gt;</span></div><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1 1 40%; background: #3a2a1a; padding: 12px; border-radius: 8px; border-left: 4px solid #ffb74d;'>    <strong style='color: #ffb74d;'>⚡ Caractéristiques :</strong><br/>- <strong>Téléchargement</strong> en parallèle du HTML<br/>- <strong>Exécution</strong> dès que le script est téléchargé<br/>- <strong>Ordre</strong> NON préservé<br/>- Idéal pour les scripts <strong>indépendants</strong>  </div>  <div style='flex: 1 1 40%; background: #1a2a3a; padding: 12px; border-radius: 8px; border-left: 4px solid #4fc3f7;'>    <strong style='color: #4fc3f7;'>📌 Utilisation :</strong><br/>- <strong>Analytics</strong> (Google Analytics)<br/>- <strong>Publicités</strong><br/>- Scripts <strong>non essentiels</strong><br/>- Scripts qui ne modifient pas le <strong>DOM</strong>  </div></div>",
    "texteParle": "L'attribut async fonctionne un peu différemment. Comme defer, il télécharge le script en parallèle du HTML. Mais contrairement à defer, le script est exécuté dès qu'il est téléchargé, sans attendre que la page soit entièrement chargée. L'ordre d'exécution n'est pas préservé : les scripts async s'exécutent dans l'ordre de leur téléchargement, pas dans l'ordre où ils apparaissent. C'est parfait pour les scripts indépendants qui ne dépendent pas des autres, comme les scripts d'analyse ou les publicités. Pour les scripts qui modifient le DOM, defer est préférable.",
    "note": "async est parfait pour les scripts tiers comme Google Analytics."
  },
  {
    "titre": "Comparaison : Normal vs defer vs async",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Le tableau de bord pour bien choisir.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0; overflow-x: auto;'><table style='width: 100%; border-collapse: collapse; font-size: 0.85em;'>  <thead>    <tr style='background: #1a1a1a;'>      <th style='padding: 8px; border: 1px solid #444; text-align: left;'>Script</th>      <th style='padding: 8px; border: 1px solid #444; text-align: left;'>Téléchargement</th>      <th style='padding: 8px; border: 1px solid #444; text-align: left;'>Exécution</th>      <th style='padding: 8px; border: 1px solid #444; text-align: left;'>Ordre</th>      <th style='padding: 8px; border: 1px solid #444; text-align: left;'>Blocage</th>    </tr>  </thead>  <tbody>    <tr>      <td style='padding: 8px; border: 1px solid #444;'><strong>Normal</strong></td>      <td style='padding: 8px; border: 1px solid #444;'>Blocage</td>      <td style='padding: 8px; border: 1px solid #444;'>Immédiat</td>      <td style='padding: 8px; border: 1px solid #444;'>Préservé</td>      <td style='padding: 8px; border: 1px solid #444;'><span style='color: #f44336;'>Bloquant</span></td>    </tr>    <tr style='background: #1a2a1a;'>      <td style='padding: 8px; border: 1px solid #444;'><strong style='color: #4caf50;'>defer</strong></td>      <td style='padding: 8px; border: 1px solid #444;'>Parallèle</td>      <td style='padding: 8px; border: 1px solid #444;'>Après DOM</td>      <td style='padding: 8px; border: 1px solid #444;'>Préservé</td>      <td style='padding: 8px; border: 1px solid #444;'><span style='color: #4caf50;'>Non bloquant</span></td>    </tr>    <tr>      <td style='padding: 8px; border: 1px solid #444;'><strong style='color: #ffb74d;'>async</strong></td>      <td style='padding: 8px; border: 1px solid #444;'>Parallèle</td>      <td style='padding: 8px; border: 1px solid #444;'>Dès que prêt</td>      <td style='padding: 8px; border: 1px solid #444;'><span style='color: #ffb74d;'>Non préservé</span></td>      <td style='padding: 8px; border: 1px solid #444;'><span style='color: #4caf50;'>Non bloquant</span></td>    </tr>  </tbody></table></div><div style='background: #1a3a1a; padding: 12px; border-radius: 8px; border: 1px solid #4caf50;'><span style='font-weight: bold; color: #4caf50;'>💡 Règle d'or :</span> Par défaut, utilisez <strong>defer</strong>. Utilisez <strong>async</strong> pour les scripts indépendants. Évitez de placer des scripts sans attribut dans le <code>&lt;head&gt;</code>.</div></div>",
    "texteParle": "Pour résumer les différences, voici un tableau comparatif. Un script normal bloque le téléchargement et s'exécute immédiatement, ce qui ralentit la page. Avec defer, le script est téléchargé en parallèle et s'exécute après le chargement du DOM, sans bloquer, en respectant l'ordre. Avec async, le script est aussi téléchargé en parallèle, mais s'exécute dès qu'il est prêt, sans respecter l'ordre. La règle d'or est : utilisez defer par défaut pour la plupart des scripts, async pour les scripts indépendants comme les analytics, et évitez de mettre des scripts sans attribut dans la section head.",
    "note": "defer est le choix par défaut, async est pour les cas spécifiques."
  },
  {
    "titre": "Résumé et Bonnes Pratiques",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Récapitulons les points clés de l'intégration du JavaScript.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📄 <strong style='color: #4fc3f7;'>Externe</strong> : Fichiers .js séparés avec <code>src</code> (recommandé)</li><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>✏️ <strong style='color: #4caf50;'>Interne</strong> : Code dans la balise <code>&lt;script&gt;</code> (pour tests)</li><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>⏱️ <strong style='color: #ffb74d;'>defer</strong> : Téléchargement parallèle, exécution après le DOM, ordre préservé</li><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>⚡ <strong style='color: #ce93d8;'>async</strong> : Téléchargement parallèle, exécution dès que prêt, ordre non préservé</li><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📌 <strong;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
