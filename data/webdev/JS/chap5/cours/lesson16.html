<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la Leçon 16",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Nous allons découvrir les tableaux, une structure de données fondamentale en JavaScript.</p><ul style='margin-top: 15px; list-style: none; padding: 0;'><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>📊 <strong>Créer des tableaux</strong> avec <code>[]</code> ou <code>new Array()</code></li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>🔍 <strong>Accéder, modifier</strong> et ajouter des éléments (<code>push</code>, <code>pop</code>, <code>shift</code>, <code>unshift</code>)</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>📏 <strong>Propriété <code>length</code></strong> et tableaux hétérogènes</li></ul><p style='margin-top: 20px; font-style: italic;'>Les tableaux sont comme des listes qui peuvent contenir tout type de données. 🇨🇲</p></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons découvrir les tableaux en JavaScript. Les tableaux sont des structures de données qui permettent de stocker plusieurs valeurs dans une seule variable. C'est comme une liste où vous pouvez ranger tout ce que vous voulez : des nombres, des textes, des objets, ou même d'autres tableaux. Nous allons apprendre à créer des tableaux, à accéder à leurs éléments, à les modifier, à ajouter ou supprimer des éléments, et à connaître leur taille. C'est une notion essentielle pour tout développeur JavaScript.",
    "note": "Les tableaux sont l'une des structures de données les plus utilisées en programmation."
  },
  {
    "titre": "Qu'est-ce qu'un Tableau ?",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Un tableau est une structure de données qui contient une <strong>collection ordonnée</strong> d'éléments.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #4fc3f7;'>Collection</strong> : Peut contenir plusieurs valeurs</li><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #4caf50;'>Ordonnée</strong> : Chaque élément a une position (index)</li><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #ffb74d;'>Indices</strong> : Les positions commencent à <strong>0</strong> (zéro)</li><li style='margin-bottom: 10px; background: #1a2a3a; padding: 12px; border-radius: 8px;'>📌 <strong style='color: #ce93d8;'>Hétérogène</strong> : Peut contenir différents types de données</li></ul></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Analogie :</span> Un tableau est comme une <strong>boîte à compartiments</strong> numérotés, où chaque compartiment peut contenir un objet différent.</div></div>",
    "texteParle": "Un tableau, c'est une structure de données qui permet de stocker une collection ordonnée d'éléments. C'est comme une liste. Chaque élément du tableau a une position, qu'on appelle un index. Les indices commencent toujours à 0, donc le premier élément est à l'index 0, le deuxième à l'index 1, et ainsi de suite. Une particularité intéressante des tableaux en JavaScript est qu'ils sont hétérogènes, c'est-à-dire qu'ils peuvent contenir des données de différents types dans le même tableau. Vous pouvez avoir un nombre, une chaîne de caractères, et un objet, tous dans le même tableau.",
    "note": "En JavaScript, les indices des tableaux commencent toujours à 0."
  },
  {
    "titre": "Créer un Tableau",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Il existe deux syntaxes principales pour créer un tableau.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1; min-width: 200px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #4fc3f7;'>    <h4 style='color: #4fc3f7; margin: 0 0 10px 0;'>📦 Syntaxe littérale</h4>    <div style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85em;'>      <span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>, <span style='color: #4fc3f7;'>\"orange\"</span>];<br>      <span style='color: #4fc3f7;'>const</span> nombres = [<span style='color: #ffb74d;'>1</span>, <span style='color: #ffb74d;'>2</span>, <span style='color: #ffb74d;'>3</span>, <span style='color: #ffb74d;'>4</span>, <span style='color: #ffb74d;'>5</span>];<br>      <span style='color: #4fc3f7;'>const</span> vide = []; <span style='color: #666;'>// Tableau vide</span><br>    </div>    <p style='font-size: 0.85em; margin-top: 8px;'>✅ <strong>Recommandée</strong> : Simple, rapide, lisible</p>  </div>  <div style='flex: 1; min-width: 200px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #ffb74d;'>    <h4 style='color: #ffb74d; margin: 0 0 10px 0;'>🏗️ Syntaxe avec <code>new Array()</code></h4>    <div style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85em;'>      <span style='color: #4fc3f7;'>const</span> fruits = <span style='color: #ffb74d;'>new</span> Array(<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>, <span style='color: #4fc3f7;'>\"orange\"</span>);<br>      <span style='color: #4fc3f7;'>const</span> nombres = <span style='color: #ffb74d;'>new</span> Array(<span style='color: #ffb74d;'>5</span>); <span style='color: #666;'>// Tableau de 5 éléments vides !</span><br>    </div>    <p style='font-size: 0.85em; margin-top: 8px;'>⚠️ <strong>Moins utilisée</strong> : Piège avec <code>new Array(5)</code> qui crée 5 cases vides</p>  </div></div><div style='background: #1a3a1a; padding: 12px; border-radius: 8px; border: 1px solid #4caf50;'><span style='font-weight: bold; color: #4caf50;'>💡 Recommandation :</span> Utilisez toujours la syntaxe <strong>littérale <code>[]</code></strong> pour créer des tableaux.</div></div>",
    "texteParle": "Il existe deux façons de créer un tableau en JavaScript. La première est la syntaxe littérale, avec les crochets, que je vous recommande. On l'écrit comme ça : const fruits = [\"pomme\", \"banane\", \"orange\"]. C'est simple et lisible. La deuxième est avec le constructeur new Array(). On peut l'utiliser comme new Array(\"pomme\", \"banane\", \"orange\"). Mais attention, new Array(5) crée un tableau de 5 éléments vides, pas un tableau avec l'élément 5 ! C'est un piège classique. Pour cette raison, je vous recommande d'utiliser systématiquement la syntaxe avec les crochets.",
    "note": "La syntaxe avec crochets est la méthode préférée par tous les développeurs JavaScript."
  },
  {
    "titre": "Accéder aux Éléments du Tableau",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>On accède aux éléments d'un tableau en utilisant leur <strong>index</strong> entre crochets.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>, <span style='color: #4fc3f7;'>\"orange\"</span>, <span style='color: #4fc3f7;'>\"mangue\"</span>];<br><br>console.log(fruits[<span style='color: #ffb74d;'>0</span>]); <span style='color: #666;'>// \"pomme\" (premier élément)</span><br>console.log(fruits[<span style='color: #ffb74d;'>2</span>]); <span style='color: #666;'>// \"orange\" (troisième élément)</span><br>console.log(fruits[<span style='color: #ffb74d;'>4</span>]); <span style='color: #666;'>// undefined (index inexistant)</span><br><br><span style='color: #666;'>// Modifier un élément</span><br>fruits[<span style='color: #ffb74d;'>1</span>] = <span style='color: #4fc3f7;'>\"fraise\"</span>;<br>console.log(fruits); <span style='color: #666;'>// [\"pomme\", \"fraise\", \"orange\", \"mangue\"]</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 À retenir :</span><br/>- Le premier élément est à l'index <strong>0</strong><br/>- L'index <strong>existe</strong> si <code>index < tableau.length</code><br/>- Accéder à un index inexistant retourne <strong>undefined</strong></div></div>",
    "texteParle": "Pour accéder à un élément d'un tableau, on utilise son index entre crochets. L'index 0 correspond au premier élément, l'index 1 au deuxième, et ainsi de suite. Si on essaye d'accéder à un index qui n'existe pas, on obtient undefined. On peut aussi modifier un élément en lui assignant une nouvelle valeur. Par exemple, fruits[1] = \"fraise\" remplace le deuxième élément par \"fraise\". C'est aussi simple que ça. Les tableaux en JavaScript sont dynamiques, donc on peut toujours ajouter ou modifier des éléments.",
    "note": "L'accès à un élément hors des limites du tableau retourne undefined, pas une erreur."
  },
  {
    "titre": "Ajouter des Éléments - push() et unshift()",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Deux méthodes principales pour ajouter des éléments à un tableau.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1; min-width: 180px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #4caf50;'>    <h4 style='color: #4caf50; margin: 0 0 10px 0;'>➕ <code>push()</code></h4>    <p style='font-size: 0.9em;'>Ajoute un ou plusieurs éléments à la <strong>fin</strong> du tableau.</p>    <div style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.8em;'>      <span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>];<br>      fruits.push(<span style='color: #4fc3f7;'>\"banane\"</span>);<br>      console.log(fruits); <span style='color: #666;'>// [\"pomme\", \"banane\"]</span><br>    </div>    <p style='font-size: 0.8em; margin-top: 5px;'>Retourne la <strong>nouvelle longueur</strong> du tableau.</p>  </div>  <div style='flex: 1; min-width: 180px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #ffb74d;'>    <h4 style='color: #ffb74d; margin: 0 0 10px 0;'>➕ <code>unshift()</code></h4>    <p style='font-size: 0.9em;'>Ajoute un ou plusieurs éléments au <strong>début</strong> du tableau.</p>    <div style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.8em;'>      <span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>];<br>      fruits.unshift(<span style='color: #4fc3f7;'>\"banane\"</span>);<br>      console.log(fruits); <span style='color: #666;'>// [\"banane\", \"pomme\"]</span><br>    </div>    <p style='font-size: 0.8em; margin-top: 5px;'>Retourne la <strong>nouvelle longueur</strong> du tableau.</p>  </div></div>",
    "texteParle": "Pour ajouter des éléments à un tableau, on a deux méthodes principales. La méthode push() ajoute un ou plusieurs éléments à la fin du tableau. C'est la méthode la plus utilisée. La méthode unshift() ajoute un ou plusieurs éléments au début du tableau. Les deux méthodes retournent la nouvelle longueur du tableau. Ces méthodes sont très pratiques car elles modifient directement le tableau original, ce qu'on appelle une méthode mutatrice. On peut aussi ajouter plusieurs éléments à la fois, comme fruits.push(\"orange\", \"mangue\").",
    "note": "push() est plus performant que unshift() car il n'a pas besoin de décaler tous les éléments."
  },
  {
    "titre": "Supprimer des Éléments - pop() et shift()",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Deux méthodes pour supprimer des éléments d'un tableau.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1; min-width: 180px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #4caf50;'>    <h4 style='color: #4caf50; margin: 0 0 10px 0;'>➖ <code>pop()</code></h4>    <p style='font-size: 0.9em;'>Supprime le <strong>dernier</strong> élément du tableau.</p>    <div style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.8em;'>      <span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>];<br>      <span style='color: #4fc3f7;'>const</span> dernier = fruits.pop();<br>      console.log(dernier); <span style='color: #666;'>// \"banane\"</span><br>      console.log(fruits); <span style='color: #666;'>// [\"pomme\"]</span><br>    </div>    <p style='font-size: 0.8em; margin-top: 5px;'>Retourne l'élément <strong>supprimé</strong>.</p>  </div>  <div style='flex: 1; min-width: 180px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #ffb74d;'>    <h4 style='color: #ffb74d; margin: 0 0 10px 0;'>➖ <code>shift()</code></h4>    <p style='font-size: 0.9em;'>Supprime le <strong>premier</strong> élément du tableau.</p>    <div style='background: #1a1a1a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.8em;'>      <span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>];<br>      <span style='color: #4fc3f7;'>const</span> premier = fruits.shift();<br>      console.log(premier); <span style='color: #666;'>// \"pomme\"</span><br>      console.log(fruits); <span style='color: #666;'>// [\"banane\"]</span><br>    </div>    <p style='font-size: 0.8em; margin-top: 5px;'>Retourne l'élément <strong>supprimé</strong>.</p>  </div></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #ffb74d;'>⚠️ Attention :</span> <code>pop()</code> et <code>shift()</code> modifient le tableau original et retournent l'élément supprimé.</div>",
    "texteParle": "Pour supprimer des éléments d'un tableau, on a les méthodes pop() et shift(). pop() supprime le dernier élément du tableau, et shift() supprime le premier. Les deux méthodes retournent l'élément qui a été supprimé, ce qui est très pratique. Par exemple, const dernier = fruits.pop() va retirer le dernier élément de la liste et le stocker dans la variable dernier. Si le tableau est vide, ces méthodes retournent undefined. Ces méthodes sont aussi des mutatrices, elles modifient directement le tableau original.",
    "note": "shift() est moins performant que pop() car il doit décaler tous les éléments restants."
  },
  {
    "titre": "La Propriété length",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>La propriété <code>length</code> indique le <strong>nombre d'éléments</strong> dans un tableau.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>, <span style='color: #4fc3f7;'>\"orange\"</span>];<br>console.log(fruits.length); <span style='color: #666;'>// 3</span><br><br><span style='color: #666;'>// Ajout d'un élément</span><br>fruits.push(<span style='color: #4fc3f7;'>\"mangue\"</span>);<br>console.log(fruits.length); <span style='color: #666;'>// 4</span><br><br><span style='color: #666;'>// Le dernier index est length - 1</span><br>console.log(fruits[fruits.length - <span style='color: #ffb74d;'>1</span>]); <span style='color: #666;'>// \"mangue\"</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Propriétés de <code>length</code> :</span><br/>- Toujours <strong>supérieur</strong> au plus grand index + 1<br/>- Peut être <strong>modifiée</strong> pour tronquer un tableau<br/>- Le dernier index est <strong>length - 1</strong></div>",
    "texteParle": "La propriété length d'un tableau nous donne le nombre d'éléments qu'il contient. C'est une propriété très utile pour savoir combien d'éléments on a dans notre liste. Quand on ajoute un élément avec push(), length est automatiquement mise à jour. Le dernier index d'un tableau est toujours length - 1, parce que les indices commencent à 0. On peut aussi modifier la propriété length pour tronquer un tableau, mais c'est une pratique à utiliser avec précaution. La propriété length est toujours supérieure au plus grand index du tableau.",
    "note": "La propriété length est automatiquement mise à jour par les méthodes de tableau."
  },
  {
    "titre": "Tableaux Hétérogènes",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Les tableaux JavaScript peuvent contenir <strong>différents types</strong> de données.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #666;'>// Un tableau hétérogène</span><br><span style='color: #4fc3f7;'>const</span> mixte = [<br>  <span style='color: #4fc3f7;'>\"Bonjour\"</span>,    <span style='color: #666;'>// String</span><br>  <span style='color: #ffb74d;'>42</span>,             <span style='color: #666;'>// Number</span><br>  <span style='color: #ffb74d;'>true</span>,           <span style='color: #666;'>// Boolean</span><br>  { nom: <span style='color: #4fc3f7;'>\"Jean\"</span> }, <span style='color: #666;'>// Object</span><br>  [<span style='color: #ffb74d;'>1</span>, <span style='color: #ffb74d;'>2</span>, <span style='color: #ffb74d;'>3</span>]        <span style='color: #666;'>// Array (tableau imbriqué)</span><br>];<br><br>console.log(mixte[<span style='color: #ffb74d;'>0</span>]); <span style='color: #666;'>// \"Bonjour\"</span><br>console.log(mixte[<span style='color: #ffb74d;'>3</span>].nom); <span style='color: #666;'>// \"Jean\"</span><br>console.log(mixte[<span style='color: #ffb74d;'>4</span>][<span style='color: #ffb74d;'>1</span>]); <span style='color: #666;'>// 2 (deuxième élément du tableau imbriqué)</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #ffb74d;'>💡 Avantage :</span> Les tableaux hétérogènes offrent une grande <strong>flexibilité</strong> pour stocker des données variées.</div><div style='background: #3a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #f44336; margin-top: 10px;'><span style='font-weight: bold; color: #f44336;'>⚠️ Attention :</span> Une trop grande hétérogénéité peut rendre le code difficile à comprendre. Privilégiez la clarté.</div></div>",
    "texteParle": "Une particularité intéressante des tableaux JavaScript est qu'ils sont hétérogènes. Cela signifie qu'un même tableau peut contenir des données de types différents. On peut avoir une chaîne de caractères, un nombre, un booléen, un objet, et même un autre tableau, tout dans le même tableau. C'est très flexible, mais il faut l'utiliser avec modération. Un tableau qui contient trop de types différents peut devenir difficile à comprendre et à maintenir. Dans la pratique, on essaie généralement de garder des tableaux avec des données du même type, sauf si on a une bonne raison de faire autrement.",
    "note": "L'hétérogénéité des tableaux est une force, mais à utiliser avec discernement."
  },
  {
    "titre": "Parcourir un Tableau avec for",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>La boucle <code>for</code> est l'une des façons de parcourir un tableau.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.85em; overflow-x: auto;'><span style='color: #4fc3f7;'>const</span> fruits = [<span style='color: #4fc3f7;'>\"pomme\"</span>, <span style='color: #4fc3f7;'>\"banane\"</span>, <span style='color: #4fc3f7;'>\"orange\"</span>];<br><br><span style='color: #666;'>// Boucle for classique</span><br><span style='color: #ffb74d;'>for</span> (<span style='color: #4fc3f7;'>let</span> i = <span style='color: #ffb74d;'>0</span>; i < fruits.length; i++) {<br>  console.log(fruits[i]);<br>}<br><span style='color: #666;'>// Affiche : pomme, banane, orange</span><br><br><span style='color: #666;'>// Boucle for...of (plus moderne)</span><br><span style='color: #ffb74d;'>for</span> (<span style='color: #4fc3f7;'>const</span> fruit <span style='color: #ffb74d;'>of</span> fruits) {<br>  console.log(fruit);<br>}<br><span style='color: #666;'>// Affiche : pomme, banane, orange</span></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Différence :</span><br/>- <code>for</code> classique : accès à l'index et à la valeur<br/>- <code>for...of</code> : accès direct à la valeur (plus lisible)</div></div>",
    "texteParle": "Pour parcourir un tableau, on utilise souvent une boucle. La boucle for classique est très utilisée. On utilise l'index i pour accéder à chaque élément, de 0 jusqu'à fruits.length - 1. C'est une méthode très flexible car on peut aussi modifier les éléments du tableau pendant le parcours. Il y a aussi la boucle for...of qui est plus moderne et plus lisible. Avec for...of, on obtient directement la valeur de chaque élément, sans avoir à gérer l'index. Les deux méthodes sont valables, mais for...of est souvent préférée pour sa simplicité quand on n'a pas besoin de l'index.",
    "note": "La boucle for...of est disponible depuis ES6 et est très pratique pour les tableaux."
  }
  ]

    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
