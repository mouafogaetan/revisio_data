<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 25 : Procédures stockées | Base de données</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Ajustements pour une meilleure lisibilité et transitions slides */
        body {
            background: linear-gradient(145deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            transition: transform 0.35s ease-in-out, opacity 0.3s ease;
        }
        .slide-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
        }
        .nav-btn {
            transition: all 0.2s ease;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                margin-left: 0.75rem;
                margin-right: 0.75rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
        /* code friendly */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'Fira Code', monospace;
        }
        .example-box {
            background: #fef9e3;
            border-left: 6px solid #f59e0b;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center justify-center min-h-screen p-4 md:p-6">

    <div class="w-full max-w-4xl mx-auto relative">
        <!-- Conteneur des slides (vue unique avec découpage) -->
        <div id="slidesWrapper" class="relative overflow-hidden">
            <div id="slidesTrack" class="slide-container flex flex-nowrap transition-all duration-500 ease-out">
                <!-- Les slides seront injectées dynamiquement via jQuery -->
            </div>
        </div>

        <!-- Navigation et indicateurs -->
        <div class="flex flex-wrap justify-between items-center mt-8 gap-3">
            <button id="prevSlide" class="nav-btn bg-white hover:bg-indigo-50 text-indigo-800 font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1">
                ← Précédent
            </button>
            <div class="flex gap-1 flex-wrap justify-center" id="dotsContainer"></div>
            <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-1">
                Suivant →
            </button>
        </div>
        
        <!-- Barre de progression -->
        <div class="mt-5 w-full bg-gray-200 rounded-full h-2 overflow-hidden">
            <div id="progressBar" class="progress-bar bg-indigo-500 h-full rounded-full" style="width: 0%;"></div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-3">📘 Leçon 25 : Procédures stockées – Cours complet</p>
    </div>

    <script>
        $(document).ready(function(){
            // ---------- DONNEES DES SLIDES ----------
            // Slide 0 : Titre principal
            // Slide 1 : Objectifs pédagogiques
            // Slide 2 à N : Contenu détaillé de la leçon 25 (procédures stockées)
            
            const slidesData = [
                { // slide 0 - titre
                    type: "title",
                    title: "📌 Procédure stockée",
                    subtitle: "Automatiser des traitements côté base de données",
                    desc: "Créer et utiliser des procédures stockées pour gagner en performance et sécurité."
                },
                { // slide 1 - objectifs
                    type: "objectives",
                    objectives: [
                        "🎯 Créer une procédure stockée avec <span class='bg-indigo-100 px-1 rounded'>CREATE PROCEDURE</span>",
                        "🎯 Utiliser les paramètres : <strong>IN, OUT, INOUT</strong>",
                        "🎯 Comprendre les avantages : performance, sécurité, réutilisabilité"
                    ]
                },
                { // slide 2 - Qu'est-ce qu'une procédure stockée ?
                    type: "content",
                    title: "🧠 Qu'est-ce qu'une procédure stockée ?",
                    content: `<p class="mb-3">Une <strong class="text-indigo-700">procédure stockée</strong> est un ensemble d'instructions SQL précompilées, enregistrées directement dans la base de données. Elle s'exécute comme une fonction mais ne retourne pas forcément une valeur. On l'appelle par son nom.</p>
                    <div class="bg-slate-50 p-4 rounded-xl border border-indigo-100 mt-2">
                        <p class="font-semibold">📌 Pourquoi l'utiliser ?</p>
                        <ul class="list-disc list-inside space-y-1 mt-2">
                            <li>✅ Réduction du trafic réseau (exécution côté serveur)</li>
                            <li>✅ Sécurité accrue (moins d'exposition directe aux tables)</li>
                            <li>✅ Logique métier centralisée et réutilisable</li>
                            <li>✅ Performances améliorées (plan d'exécution mis en cache)</li>
                        </ul>
                    </div>`
                },
                { // slide 3 - Syntaxe CREATE PROCEDURE
                    type: "content",
                    title: "🔧 Syntaxe de base (MySQL / PostgreSQL)",
                    content: `<p class="mb-2">La structure générale :</p>
                    <pre><code>CREATE PROCEDURE nom_procedure ([paramètres])
BEGIN
    -- Corps de la procédure (instructions SQL)
END;</code></pre>
                    <p class="mt-2 text-sm">⚠️ Dans PostgreSQL on utilise <code class="bg-gray-200 px-1 rounded">LANGUAGE plpgsql</code>, mais le concept est similaire.<br>
                    <span class="font-mono">DELIMITER //</span> est souvent utilisé en MySQL pour gérer le point-virgule.</p>
                    <div class="example-box p-3 rounded-lg mt-3 text-sm">
                        💡 Exemple minimal (MySQL) :
                        <pre class="mt-2"><code>DELIMITER //
CREATE PROCEDURE AfficherBonjour()
BEGIN
    SELECT 'Bonjour les étudiants !';
END //
DELIMITER ;</code></pre>
                    </div>`
                },
                { // slide 4 - Paramètres IN, OUT, INOUT
                    type: "content",
                    title: "📥 Paramètres : IN, OUT, INOUT",
                    content: `<p>Les paramètres permettent de passer des valeurs ou d'en récupérer.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                        <div class="bg-indigo-50 p-3 rounded-2xl"><span class="font-bold text-indigo-800">IN</span><br>Valeur d'entrée. La procédure peut la lire mais pas la modifier pour l'appelant.</div>
                        <div class="bg-emerald-50 p-3 rounded-2xl"><span class="font-bold text-emerald-800">OUT</span><br>Paramètre de sortie. La procédure lui affecte une valeur renvoyée à l'appelant.</div>
                        <div class="bg-amber-50 p-3 rounded-2xl"><span class="font-bold text-amber-800">INOUT</span><br>Mixte : on peut passer une valeur et la modifier, la nouvelle valeur est retournée.</div>
                    </div>
                    <pre class="mt-4"><code>-- Exemple avec IN et OUT (MySQL)
CREATE PROCEDURE AjouterTva(IN prixHT DECIMAL(10,2), OUT prixTTC DECIMAL(10,2))
BEGIN
    SET prixTTC = prixHT * 1.20;
END;

-- Appel:
CALL AjouterTva(100, @total);
SELECT @total;  -- 120.00</code></pre>`
                },
                { // slide 5 - Avantages détaillés
                    type: "content",
                    title: "⚡ Avantages concrets pour vos projets",
                    content: `<div class="space-y-3">
                        <div class="flex items-start gap-3"><span class="text-2xl">🚀</span><div><strong>Performance accrue</strong> – Réduction des allers-retours client/serveur, compilation unique.</div></div>
                        <div class="flex items-start gap-3"><span class="text-2xl">🔐</span><div><strong>Sécurité renforcée</strong> – On peut octroyer le droit d'exécuter une procédure sans donner d'accès direct aux tables.</div></div>
                        <div class="flex items-start gap-3"><span class="text-2xl">♻️</span><div><strong>Maintenabilité</strong> – Une modification de la logique se fait en un seul endroit (la procédure).</div></div>
                        <div class="flex items-start gap-3"><span class="text-2xl">📦</span><div><strong>Réduction du code applicatif</strong> – Les traitements complexes sont déportés en base.</div></div>
                    </div>
                    <div class="bg-green-50 p-3 rounded-xl mt-4 text-green-800"><span class="font-bold">💡 Au Cameroun, les entreprises utilisent les procédures stockées</span> pour la gestion des notes, des salaires, ou inventaires – robustesse assurée !</div>`
                },
                { // slide 6 - Exemple concret : gestion d'étudiant
                    type: "content",
                    title: "📚 Cas pratique : Création d'étudiant avec vérification",
                    content: `<p>Imaginons une table <code>etudiant(id, nom, moyenne)</code>. Créons une procédure qui insère un étudiant seulement si la moyenne est valide (0-20).</p>
                    <pre><code>DELIMITER //
CREATE PROCEDURE InscrireEtudiant(
    IN p_nom VARCHAR(100),
    IN p_moyenne DECIMAL(4,2),
    OUT p_resultat VARCHAR(200)
)
BEGIN
    IF p_moyenne &lt; 0 OR p_moyenne &gt; 20 THEN
        SET p_resultat = 'Erreur : moyenne invalide (0-20)';
    ELSE
        INSERT INTO etudiant(nom, moyenne) VALUES(p_nom, p_moyenne);
        SET p_resultat = CONCAT('Étudiant ', p_nom, ' ajouté avec succès');
    END IF;
END //
DELIMITER ;

-- Appel:
CALL InscrireEtudiant('Aymane', 15.5, @msg);
SELECT @msg;</code></pre>
                    <p class="text-sm mt-2 text-gray-600">🎓 Les procédures stockées aident à maintenir l'intégrité des données côté serveur.</p>`
                },
                { // slide 7 - Stockées dans différents SGBD
                    type: "content",
                    title: "🛢️ Procédures stockées selon SGBD",
                    content: `<div class="overflow-x-auto">
                        <table class="min-w-full bg-white rounded-xl border">
                            <thead class="bg-indigo-100"><tr><th class="p-2">SGBD</th><th>Syntaxe / Spécificités</th></tr></thead>
                            <tbody>
                                <tr class="border-b"><td class="p-2 font-bold">MySQL</td><td>DELIMITER, langage procédural simple, variables avec @ ou DECLARE</td></tr>
                                <tr class="border-b"><td class="p-2 font-bold">PostgreSQL</td><td>CREATE OR REPLACE FUNCTION / PROCEDURE, langage PL/pgSQL</td></tr>
                                <tr class="border-b"><td class="p-2 font-bold">SQL Server</td><td>T-SQL, RETURN pour codes d'état</td></tr>
                                <tr><td class="p-2 font-bold">Oracle</td><td>PL/SQL, packages puissants</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <p class="mt-3 italic text-sm">✨ Quelle que soit la technologie, le principe reste le même : encapsuler la logique SQL.</p>`
                },
                { // slide 8 - Bonnes pratiques & limites
                    type: "content",
                    title: "🧹 Bonnes pratiques à adopter",
                    content: `<ul class="list-disc pl-6 space-y-2">
                        <li>📌 <strong>Noms explicites</strong> : <span class="font-mono">sp_CalculerMoyenneClasse</span> plutôt que <span class="font-mono">proc1</span></li>
                        <li>📌 Gérer les erreurs avec <strong>DECLARE ... HANDLER</strong> (MySQL) ou <strong>EXCEPTION</strong> (PostgreSQL)</li>
                        <li>📌 Éviter les effets de bord inattendus : documenter les paramètres OUT</li>
                        <li>📌 Ne pas abuser des procédures trop complexes : garder un équilibre entre couche métier et base</li>
                        <li>📌 Utiliser les transactions (<code>START TRANSACTION, COMMIT, ROLLBACK</code>) pour maintenir la cohérence</li>
                    </ul>
                    <div class="mt-4 bg-amber-50 p-3 rounded-lg border-l-4 border-amber-400">
                        ⚠️ Attention: Les procédures stockées peuvent devenir difficiles à versionner. Pensez à les sauvegarder dans vos scripts SQL !
                    </div>`
                },
                { // slide 9 - Conclusion et exercice rapide
                    type: "content",
                    title: "🏁 Récapitulons",
                    content: `<div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <p class="font-bold text-indigo-800">✓ Ce qu'on a vu :</p>
                            <ul class="list-disc list-inside text-sm space-y-1">
                                <li>Créer une procédure stockée (<code>CREATE PROCEDURE</code>)</li>
                                <li>Les paramètres IN, OUT, INOUT</li>
                                <li>Avantages : perf, sécu, maintenabilité</li>
                                <li>Exemples concrets adaptés</li>
                            </ul>
                        </div>
                        <div class="bg-indigo-50 p-3 rounded-xl">
                            <p class="font-bold">📝 Mini-exercice :</p>
                            <p class="text-sm">Écrire une procédure <code>CompterEtudiants(OUT nb INT)</code> qui retourne le nombre total d'étudiants d'une table "etudiants". Essayez par vous-même !</p>
                            <details class="mt-2 text-xs"><summary>💡 Solution (MySQL)</summary>
                            <pre class="text-xs mt-1"><code>CREATE PROCEDURE CompterEtudiants(OUT nb INT)
BEGIN
    SELECT COUNT(*) INTO nb FROM etudiants;
END;</code></pre>
                            </details>
                        </div>
                    </div>
                    <p class="text-center text-indigo-600 font-medium mt-5">🚀 Vous êtes prêts à automatiser vos bases de données !</p>`
                }
            ];
            
            // Construction des slides HTML
            let slidesHtml = "";
            $.each(slidesData, function(idx, slide) {
                let slideContent = "";
                if (slide.type === "title") {
                    slideContent = `
                        <div class="flex flex-col items-center text-center space-y-5">
                            <div class="bg-indigo-100 rounded-full p-4 inline-block">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 1.79 4 4 4h8c2.21 0 4-1.79 4-4V7M4 7c0-2.21 1.79-4 4-4h8c2.21 0 4 1.79 4 4M4 7h16M9 12h6" /></svg>
                            </div>
                            <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${slide.title}</h1>
                            <p class="text-xl text-gray-600">${slide.subtitle}</p>
                            <p class="text-gray-500 max-w-md">${slide.desc}</p>
                            <div class="mt-2 text-sm text-indigo-500 font-mono">📂 Base de données • Niveau intermédiaire</div>
                        </div>
                    `;
                } 
                else if (slide.type === "objectives") {
                    let objList = "";
                    $.each(slide.objectives, function(i, obj) {
                        objList += `<li class="flex items-start gap-3 bg-white/60 p-3 rounded-xl shadow-sm mb-2"><span class="text-indigo-500 text-xl">📌</span> <span class="text-gray-700">${obj}</span></li>`;
                    });
                    slideContent = `
                        <div>
                            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b-4 border-indigo-300 inline-block pb-1 mb-5">🎯 Objectifs de la leçon</h2>
                            <ul class="space-y-2 mt-4">${objList}</ul>
                            <div class="mt-8 p-4 bg-indigo-50 rounded-2xl text-center text-indigo-700">
                                ⏱️ Durée estimée : 25 minutes
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === "content") {
                    slideContent = `
                        <div>
                            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 flex items-center gap-2 mb-4">📖 ${slide.title}</h2>
                            <div class="prose max-w-none text-gray-700 leading-relaxed">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                }
                
                // Chaque slide est une "page" dans le track
                slidesHtml += `<div class="slide-item flex-shrink-0 w-full px-2 transition-all duration-300" style="width: 100%;">
                    <div class="slide-card p-6 md:p-8 min-h-[500px] flex flex-col justify-between">
                        ${slideContent}
                        <div class="text-right text-xs text-gray-400 mt-8">Leçon 25 - Slide ${idx+1}/${slidesData.length}</div>
                    </div>
                </div>`;
            });
            
            $("#slidesTrack").html(slidesHtml);
            
            let currentIndex = 0;
            const totalSlides = slidesData.length;
            const $track = $("#slidesTrack");
            const $prevBtn = $("#prevSlide");
            const $nextBtn = $("#nextSlide");
            const $dots = $("#dotsContainer");
            
            // générer les dots
            function updateDots() {
                $dots.empty();
                for(let i = 0; i < totalSlides; i++) {
                    let dot = $(`<button class="w-3 h-3 rounded-full mx-1 transition-all focus:outline-none ${i === currentIndex ? 'bg-indigo-600 w-5' : 'bg-gray-400 hover:bg-indigo-300'}" data-index="${i}"></button>`);
                    $dots.append(dot);
                }
                $(".dot-btn").off('click').on('click', function() {
                    let idx = $(this).data("index");
                    if(idx !== undefined && idx !== currentIndex) goToSlide(idx);
                });
            }
            
            function goToSlide(index) {
                if(index < 0) index = 0;
                if(index >= totalSlides) index = totalSlides - 1;
                currentIndex = index;
                const offset = currentIndex * 100;
                $track.css("transform", `translateX(-${offset}%)`);
                // update progression
                const percent = ((currentIndex) / (totalSlides - 1)) * 100;
                $("#progressBar").css("width", `${percent}%`);
                updateDots();
                // gérer état boutons
                $prevBtn.prop("disabled", currentIndex === 0);
                $nextBtn.prop("disabled", currentIndex === totalSlides - 1);
                // Rendre MathJax actif si besoin (rafraîchit les formules)
                if(window.MathJax) {
                    MathJax.typesetPromise();
                }
            }
            
            $prevBtn.on("click", function() {
                if(currentIndex > 0) goToSlide(currentIndex - 1);
            });
            $nextBtn.on("click", function() {
                if(currentIndex < totalSlides - 1) goToSlide(currentIndex + 1);
            });
            
            // swipe pour mobiles (touch)
            let touchStartX = 0;
            let touchEndX = 0;
            const $sliderContainer = $("#slidesWrapper");
            $sliderContainer.on("touchstart", function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $sliderContainer.on("touchend", function(e) {
                touchEndX = e.originalEvent.changedTouches[0].clientX;
                const diff = touchEndX - touchStartX;
                if(Math.abs(diff) > 50) {
                    if(diff > 0 && currentIndex > 0) goToSlide(currentIndex - 1);
                    else if(diff < 0 && currentIndex < totalSlides-1) goToSlide(currentIndex + 1);
                }
                touchStartX = 0;
            });
            
            // initialisation
            goToSlide(0);
            
            // gestion du clavier (flèches)
            $(document).on("keydown", function(e) {
                if(e.key === "ArrowLeft") {
                    if(currentIndex > 0) goToSlide(currentIndex-1);
                    e.preventDefault();
                } else if(e.key === "ArrowRight") {
                    if(currentIndex < totalSlides-1) goToSlide(currentIndex+1);
                    e.preventDefault();
                }
            });
            
        });
    </script>
</body>
</html>
