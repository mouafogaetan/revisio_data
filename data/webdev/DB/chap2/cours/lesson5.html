<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 5 : Clés primaires et étrangères | Base de données</title>
  <!-- Tailwind CSS + Font Awesome (pour icônes légères) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (formules si nécessaire) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* personnalisation légère pour slides fluides */
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .slide-container {
      transition: transform 0.3s ease, opacity 0.25s ease;
    }
    .slide {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
    }
    .nav-btn {
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) {
      transform: scale(1.03);
      background-color: #1e3a5f;
    }
    .badge-clé {
      background: #fef3c7;
      color: #b45309;
    }
    .progressive-text {
      line-height: 1.6;
    }
    /* optimisation mobile: padding slide */
    @media (max-width: 640px) {
      .slide {
        padding: 1.5rem !important;
      }
      h2 {
        font-size: 1.6rem !important;
      }
    }
  </style>
</head>
<body class="antialiased">

  <div class="max-w-5xl mx-auto px-3 sm:px-5 py-6 md:py-10 min-h-screen flex flex-col">
    <!-- indicateur slide + progression -->
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
      <div class="text-sm font-medium bg-white/60 backdrop-blur-sm rounded-full px-4 py-1 shadow-sm">
        📘 <span id="currentSlideIdx">1</span> / <span id="totalSlides"></span>
      </div>
      <div class="w-32 bg-gray-200 rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="bg-blue-700 h-2 rounded-full transition-all duration-300" style="width: 0%;"></div>
      </div>
      <div class="text-xs text-gray-600 bg-white/50 rounded-full px-3 py-1">
        🗝️ Leçon 5 · Clés primaire & étrangère
      </div>
    </div>

    <!-- conteneur slides (carrousel horizontal) -->
    <div class="overflow-hidden relative rounded-2xl">
      <div id="slidesWrapper" class="slide-container flex transition-transform duration-500 ease-in-out">
        <!-- les slides seront générées dynamiquement via jQuery -->
      </div>
    </div>

    <!-- navigation et boutons -->
    <div class="flex justify-between items-center mt-6 gap-3">
      <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-2xl shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition">
        ⬅️ Précédent
      </button>
      <div class="flex gap-2">
        <button id="gotoFirst" class="text-xs bg-gray-100 hover:bg-gray-200 rounded-full p-2 w-9 h-9 flex items-center justify-center shadow">⏮️</button>
        <button id="gotoLast" class="text-xs bg-gray-100 hover:bg-gray-200 rounded-full p-2 w-9 h-9 flex items-center justify-center shadow">⏭️</button>
      </div>
      <button id="nextSlide" class="nav-btn bg-blue-800 hover:bg-blue-900 text-white font-semibold py-2 px-5 rounded-2xl shadow-md transition">
        Suivant ➡️
      </button>
    </div>

    <!-- petit footer discret -->
    <div class="text-center text-gray-500 text-xs mt-6">
      📚 Cours d'Initiation aux Bases de Données | Classe: Développement Web (Cameroun)
    </div>
  </div>

  <script>
    // Définition des slides selon la leçon 5 (Objectifs + contenu clés primaires/étrangères)
    // Titre du cours: "Clés primaires et étrangères : Structurer des relations solides"
    // Extraits de la lesson5 objectifs: Comprendre la clé primaire, définir clé étrangère, distinguer clé simple, composite, candidate.
    // Nous construisons une présentation pédagogique simple accessible.

    const slidesData = [
      { // slide 0 : titre
        type: "title",
        title: "🔑 Clés primaires et étrangères",
        subtitle: "Le socle des bases de données relationnelles",
        desc: "Leçon 5 · Initiation aux bases de données",
        icon: "🗄️"
      },
      { // slide 1 : objectifs pédagogiques (second slide)
        type: "objectifs",
        title: "🎯 Objectifs d'apprentissage",
        objectives: [
          "Comprendre le concept de clé primaire (Primary Key) : unicité et identification unique de chaque enregistrement.",
          "Définir les clés étrangères (Foreign Key) pour lier les tables entre elles et maintenir l'intégrité référentielle.",
          "Distinguer clé simple, clé composite et clé candidate dans la conception de bases de données."
        ]
      },
      { // slide 2 : Qu'est-ce qu'une clé primaire ?
        type: "content",
        title: "📌 Qu'est-ce qu'une clé primaire ?",
        content: `
          <p class="mb-3">Une <span class="font-bold text-blue-800">clé primaire (Primary Key)</span> est une colonne (ou un groupe de colonnes) qui identifie de manière <strong>unique</strong> chaque ligne d'une table.</p>
          <ul class="list-disc pl-6 space-y-2 mb-3">
            <li>✅ <strong>Unicité</strong> : deux lignes ne peuvent pas avoir la même valeur de clé primaire.</li>
            <li>✅ <strong>Non nullité</strong> : une clé primaire ne peut jamais être NULL.</li>
            <li>✅ <strong>Stabilité</strong> : idéalement, sa valeur ne change jamais dans le temps.</li>
          </ul>
          <div class="bg-gray-100 p-3 rounded-xl font-mono text-sm overflow-x-auto my-2">
            CREATE TABLE etudiant (<br>
            &nbsp;&nbsp;id_etudiant INT PRIMARY KEY,<br>
            &nbsp;&nbsp;nom VARCHAR(50),<br>
            &nbsp;&nbsp;prenom VARCHAR(50)<br>
            );
          </div>
          <p class="text-gray-600 text-sm mt-2">💡 Ici, <span class="font-mono">id_etudiant</span> est la clé primaire. Chaque étudiant aura un numéro unique.</p>
        `
      },
      { // slide 3: Types de clés primaires - simple / composite / candidate
        type: "content",
        title: "🧩 Clé simple, composite et candidate",
        content: `
          <div class="grid md:grid-cols-2 gap-5">
            <div class="bg-blue-50 p-4 rounded-xl">
              <h3 class="font-bold text-blue-800 text-lg">🔹 Clé simple</h3>
              <p>Une seule colonne pour identifier la ligne.<br>Ex: <span class="font-mono">numéro_commande</span> dans une table commande.</p>
            </div>
            <div class="bg-amber-50 p-4 rounded-xl">
              <h3 class="font-bold text-amber-800 text-lg">🔸 Clé composite</h3>
              <p>Deux colonnes (ou plus) combinées pour former l'unicité.<br>Ex: <span class="font-mono">(id_cours, id_etudiant)</span> dans une table inscription.</p>
            </div>
            <div class="bg-emerald-50 p-4 rounded-xl md:col-span-2">
              <h3 class="font-bold text-emerald-800 text-lg">⭐ Clé candidate</h3>
              <p>Attribut (ou groupe) qui pourrait être choisi comme clé primaire car il respecte unicité & non-nullité. <strong>Une seule clé candidate devient primaire</strong> ; les autres sont des clés alternatives.</p>
              <div class="mt-2 font-mono text-xs bg-white p-2 rounded">Ex: dans une table personne, le numéro de sécurité sociale et l'email peuvent être candidats → on choisit l'id_personne comme primaire.</div>
            </div>
          </div>
        `
      },
      { // slide 4 : clé étrangère explication
        type: "content",
        title: "🔗 Qu'est-ce qu'une clé étrangère (Foreign Key) ?",
        content: `
          <p>Une <strong class="text-purple-800">clé étrangère</strong> est une colonne (ou ensemble de colonnes) qui établit un lien entre deux tables. Elle référence généralement la clé primaire d'une autre table.</p>
          <div class="my-4 flex flex-col sm:flex-row gap-4 items-stretch">
            <div class="bg-purple-50 p-3 rounded-xl flex-1">
              <span class="font-bold">🎯 Rôle :</span> Maintenir l'<strong>intégrité référentielle</strong> → on ne peut pas insérer une valeur dans la clé étrangère si elle n'existe pas dans la table référencée.
            </div>
            <div class="bg-indigo-50 p-3 rounded-xl flex-1">
              <span class="font-bold">🧩 Exemple concret :</span> Une table "commande" contient <span class="font-mono">client_id</span> qui fait référence à <span class="font-mono">id_client</span> dans la table "client".
            </div>
          </div>
          <pre class="bg-gray-800 text-gray-100 p-3 rounded-xl overflow-x-auto text-sm font-mono">
CREATE TABLE client (
   id_client INT PRIMARY KEY,
   nom TEXT
);

CREATE TABLE commande (
   id_cmd INT PRIMARY KEY,
   date DATE,
   client_id INT,
   FOREIGN KEY (client_id) REFERENCES client(id_client)
);</pre>
          <p class="text-sm text-gray-700 mt-2">📌 Ainsi, chaque commande est associée à un client existant. Impossible d'avoir une commande "orpheline".</p>
        `
      },
      { // slide 5 : Différence clé primaire vs étrangère et utilité
        type: "content",
        title: "⚖️ Comparaison : Primaire vs Étrangère",
        content: `
          <div class="overflow-x-auto">
            <table class="min-w-full bg-white rounded-xl shadow border text-sm">
              <thead class="bg-gray-100">
                <tr><th class="px-4 py-2 border">Critère</th><th class="px-4 py-2 border">Clé Primaire (PK)</th><th class="px-4 py-2 border">Clé Étrangère (FK)</th></tr>
              </thead>
              <tbody class="divide-y">
                <tr><td class="px-4 py-2 font-medium">Unicité</td><td class="px-4 py-2">Obligatoire</td><td class="px-4 py-2">Pas obligatoire (peut avoir doublons)</td></tr>
                <tr><td class="px-4 py-2 font-medium">Valeur NULL</td><td class="px-4 py-2">Interdit</td><td class="px-4 py-2">Autorisé (sauf contrainte NOT NULL)</td></tr>
                <tr><td class="px-4 py-2 font-medium">Nombre par table</td><td class="px-4 py-2">Une seule PK max</td><td class="px-4 py-2">Zéro, une ou plusieurs</td></tr>
                <tr><td class="px-4 py-2 font-medium">Rôle</td><td class="px-4 py-2">Identifier chaque enregistrement</td><td class="px-4 py-2">Lier les tables / établir des relations</td></tr>
              </tbody>
            </table>
          </div>
          <p class="mt-4 text-center text-indigo-700 bg-indigo-50 p-2 rounded-lg">💡 Ensemble, PK et FK permettent de construire des bases de données robustes et cohérentes.</p>
        `
      },
      { // slide 6 : schéma dessiné moi-même (représentation texte + boîtes avec CSS)
        type: "schema",
        title: "📊 Schéma relationnel : Clients & Commandes",
        content: `
          <div class="text-center mb-2 text-gray-600 font-medium">Un client peut passer plusieurs commandes (relation 1,n)</div>
          <div class="flex flex-col md:flex-row justify-center items-center gap-4 p-4 bg-gray-50 rounded-2xl border">
            <div class="bg-white rounded-xl shadow-md p-3 w-48 text-center border-l-4 border-blue-500">
              <div class="font-bold text-blue-700">🏷️ Client</div>
              <div class="text-xs font-mono">PK id_client (INT)</div>
              <div class="text-xs">nom, email ...</div>
            </div>
            <div class="text-2xl text-gray-400">➡️ 1 ──── * ⬅️</div>
            <div class="bg-white rounded-xl shadow-md p-3 w-56 text-center border-l-4 border-purple-500">
              <div class="font-bold text-purple-700">📦 Commande</div>
              <div class="text-xs font-mono">PK id_commande (INT)</div>
              <div class="text-xs font-mono">FK client_id → Client(id_client)</div>
              <div class="text-xs">date, total</div>
            </div>
          </div>
          <p class="mt-3 text-sm italic text-center">Ce schéma montre que la clé étrangère <span class="font-mono">client_id</span> de la table Commande référence la clé primaire de Client.</p>
        `
      },
      { // slide 7 : exemples concrets et astuces pour bien choisir
        type: "content",
        title: "💡 Conseils & bonnes pratiques",
        content: `
          <div class="space-y-3">
            <div class="flex gap-3 items-start"><span class="text-green-600 text-xl">✓</span><span><strong>Choisir une clé primaire stable</strong> : évitez les noms, adresses ou champs modifiables. Préférez un identifiant technique (auto-incrémenté, UUID).</span></div>
            <div class="flex gap-3 items-start"><span class="text-green-600 text-xl">✓</span><span><strong>Clé composite utile</strong> : pour les tables d'association (many-to-many). Ex: <span class="font-mono">(id_etudiant, id_cours)</span>.</span></div>
            <div class="flex gap-3 items-start"><span class="text-amber-600 text-xl">⚠️</span><span><strong>Attention aux clés étrangères cycliques</strong> : évitez les boucles complexes qui peuvent bloquer les insertions.</span></div>
            <div class="bg-blue-100 p-3 rounded-xl"><span class="font-bold">🔍 Rappel clé candidate :</span> dans une table, plusieurs colonnes peuvent être uniques (email, login). L'une devient primaire, les autres sont candidates. Choisissez la plus naturelle ou la plus performante.</div>
          </div>
        `
      },
      { // slide 8 : quiz / vérification légère (synthèse)
        type: "recap",
        title: "🧠 Vérifions la compréhension",
        content: `
          <div class="grid gap-3">
            <div class="p-3 bg-white rounded-lg shadow-sm"><span class="font-bold">❓ Question 1 :</span> Une table peut-elle avoir plusieurs clés primaires ?</div>
            <div class="p-2 text-green-700 bg-green-50 rounded-lg">✅ Non, une table ne peut avoir qu'une seule clé primaire, mais elle peut être composite (plusieurs colonnes).</div>
            <div class="p-3 bg-white rounded-lg shadow-sm mt-2"><span class="font-bold">❓ Question 2 :</span> Quelle contrainte garantit que les valeurs d'une colonne correspondent à une clé primaire d'une autre table ?</div>
            <div class="p-2 text-purple-700 bg-purple-50 rounded-lg">✅ La clé étrangère (FOREIGN KEY) assure l'intégrité référentielle.</div>
            <div class="p-3 bg-amber-50 rounded-lg text-sm">📌 Pour aller plus loin : essayez de modéliser une petite bibliothèque (livres, auteurs, emprunts) avec vos propres clés primaires / étrangères !</div>
          </div>
        `
      }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    // Helper pour générer le HTML d'un slide
    function renderSlide(slide, idx) {
      const isActive = (idx === currentIndex);
      let contentHtml = '';
      switch(slide.type) {
        case 'title':
          contentHtml = `
            <div class="text-center py-8 md:py-12">
              <div class="text-6xl mb-4">${slide.icon || '🗄️'}</div>
              <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
              <p class="text-xl text-gray-600 mt-4">${slide.subtitle}</p>
              <div class="mt-6 border-t border-gray-200 pt-4 text-gray-500">${slide.desc}</div>
            </div>
          `;
          break;
        case 'objectifs':
          const objList = slide.objectives.map(obj => `<li class="mb-2 flex items-start gap-2"><span class="text-green-600 text-lg">✓</span> ${obj}</li>`).join('');
          contentHtml = `
            <div>
              <h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-5">${slide.title}</h2>
              <ul class="space-y-3 text-gray-800 progressive-text">${objList}</ul>
              <div class="mt-8 p-4 bg-cyan-50 rounded-xl text-sm italic">📖 À la fin de cette leçon, vous saurez concevoir des liens fiables entre vos tables.</div>
            </div>
          `;
          break;
        case 'content':
          contentHtml = `
            <div>
              <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-200 pb-2 mb-4">${slide.title}</h2>
              <div class="prose max-w-none">${slide.content}</div>
            </div>
          `;
          break;
        case 'schema':
          contentHtml = `
            <div>
              <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-200 pb-2 mb-4">${slide.title}</h2>
              <div>${slide.content}</div>
              <p class="text-xs text-center text-gray-400 mt-3">🎨 Schéma illustrant la relation entre clés primaires et étrangères</p>
            </div>
          `;
          break;
        case 'recap':
          contentHtml = `
            <div>
              <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-amber-300 pb-2 mb-4">${slide.title}</h2>
              <div>${slide.content}</div>
            </div>
          `;
          break;
        default:
          contentHtml = `<div>${slide.content || ''}</div>`;
      }
      // wrapper slide avec style card
      return `<div class="slide w-full flex-shrink-0 p-5 md:p-8 transition-all duration-300" data-slide-index="${idx}" style="width: 100%;">${contentHtml}</div>`;
    }

    function buildSlides() {
      const wrapper = $('#slidesWrapper');
      wrapper.empty();
      slidesData.forEach((slide, idx) => {
        const slideHtml = renderSlide(slide, idx);
        wrapper.append(slideHtml);
      });
      $('#totalSlides').text(totalSlides);
      updateSlidePosition();
      updateButtonsAndProgress();
    }

    function updateSlidePosition() {
      const wrapper = $('#slidesWrapper');
      const offset = -currentIndex * 100;
      wrapper.css('transform', `translateX(${offset}%)`);
      $('#currentSlideIdx').text(currentIndex + 1);
      // progress bar width
      const progressPercent = ((currentIndex) / (totalSlides - 1)) * 100;
      $('#progressBar').css('width', `${progressPercent}%`);
    }

    function updateButtonsAndProgress() {
      $('#prevSlide').prop('disabled', currentIndex === 0);
      $('#nextSlide').prop('disabled', currentIndex === totalSlides - 1);
    }

    function goToSlide(index) {
      if (index >= 0 && index < totalSlides) {
        currentIndex = index;
        updateSlidePosition();
        updateButtonsAndProgress();
        // scroll doux en haut (optionnel)
        $('html, body').animate({ scrollTop: $('.slide-container').offset().top - 20 }, 100);
      }
    }

    // Gestion des événements
    $(document).ready(function() {
      buildSlides();

      $('#prevSlide').on('click', () => goToSlide(currentIndex - 1));
      $('#nextSlide').on('click', () => goToSlide(currentIndex + 1));
      $('#gotoFirst').on('click', () => goToSlide(0));
      $('#gotoLast').on('click', () => goToSlide(totalSlides - 1));

      // swipe tactile (mobile) - basique avec jQuery events touchstart/touchmove
      let touchStartX = 0;
      let touchEndX = 0;
      const slidesContainer = document.getElementById('slidesWrapper');
      slidesContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });
      slidesContainer.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const delta = touchEndX - touchStartX;
        if (Math.abs(delta) > 50) {
          if (delta > 0 && currentIndex > 0) goToSlide(currentIndex - 1);
          else if (delta < 0 && currentIndex < totalSlides-1) goToSlide(currentIndex + 1);
        }
      });
      
      // gestion clavier : flèches gauche/droite
      $(document).on('keydown', function(e) {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          goToSlide(currentIndex - 1);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          goToSlide(currentIndex + 1);
        }
      });
    });
  </script>
</body>
</html>
