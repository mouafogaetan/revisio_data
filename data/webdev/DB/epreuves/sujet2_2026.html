<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation aux Bases de données",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Conception de bases de données (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Dans le cadre de la conception d'une base de données pour une bibliothèque, vous devez réaliser les étapes suivantes. Lisez attentivement le cahier des charges.</p><div style='background: #f8f9fa; padding: 15px; border-left: 5px solid #0d6efd; border-radius: 5px; margin: 10px 0;'><p style='font-weight: bold;'>Contexte :</p><p>Une bibliothèque souhaite gérer ses livres, ses auteurs et ses emprunteurs.</p><ul><li>Un livre a un titre, un ISBN, une année de publication et un nombre d'exemplaires.</li><li>Un livre peut avoir un ou plusieurs auteurs.</li><li>Un emprunteur a un nom, un prénom, une adresse email et un numéro de téléphone.</li><li>Un emprunteur peut emprunter plusieurs livres, et un livre peut être emprunté plusieurs fois.</li><li>Un emprunt est caractérisé par une date d'emprunt et une date de retour prévue.</li></ul></div>",
      "questions": [
        {
          "question": "1) Proposez un diagramme entité-association (DER) pour la bibliothèque. Identifiez les entités, les attributs et les associations avec leurs cardinalités. <em>(3 pts)</em>",
          "reponse": "<div><p><strong>Diagramme Entité-Association :</strong></p><ul><li><strong>Livre</strong> (idLivre, titre, ISBN, annee, nbExemplaires) - Entité</li><li><strong>Auteur</strong> (idAuteur, nom, prenom, nationalite) - Entité</li><li><strong>Emprunteur</strong> (idEmprunteur, nom, prenom, email, telephone) - Entité</li><li><strong>Emprunt</strong> (idEmprunt, dateEmprunt, dateRetourPrevue) - Entité</li><li><strong>Ecrire</strong> : Association ManyToMany entre Livre (1,n) et Auteur (1,n). Nécessite une table d'association Livre_Auteur.</li><li><strong>Effectuer</strong> : Association OneToMany entre Emprunteur (1) et Emprunt (0,n).</li><li><strong>Concerter</strong> : Association ManyToOne entre Emprunt (n) et Livre (1).</li></ul></div>"
        },
        {
          "question": "2) Expliquez la notion de clé primaire et de clé étrangère. Identifiez-les dans votre DER. <em>(1,5 pts)</em>",
          "reponse": "<div><p><strong>Clé primaire (Primary Key) :</strong> Un attribut ou un ensemble d'attributs qui identifie de manière unique chaque enregistrement dans une table.</p><p><strong>Clé étrangère (Foreign Key) :</strong> Un attribut qui fait référence à la clé primaire d'une autre table pour établir une relation.</p><p><strong>Dans le DER :</strong></p><ul><li>Clés primaires : idLivre, idAuteur, idEmprunteur, idEmprunt</li><li>Clés étrangères : idEmprunteur dans Emprunt (référence Emprunteur.idEmprunteur), idLivre dans Emprunt (référence Livre.idLivre)</li></ul></div>"
        },
        {
          "question": "3) Citez les propriétés ACID d'une transaction et expliquez brièvement l'Atomicité. <em>(1,5 pts)</em>",
          "reponse": "<div><p><strong>Propriétés ACID :</strong></p><ul><li><strong>Atomicité (Atomicity) :</strong> Une transaction est une unité indivisible. Soit toutes les opérations sont exécutées, soit aucune ne l'est.</li><li><strong>Cohérence (Consistency) :</strong> Une transaction maintient la base de données dans un état cohérent.</li><li><strong>Isolation (Isolation) :</strong> Les transactions sont exécutées comme si elles étaient isolées les unes des autres.</li><li><strong>Durabilité (Durability) :</strong> Les modifications d'une transaction validée sont persistées et survivent aux pannes.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Requêtes SQL (7 pts)",
      "points": "7 pts",
      "enonce": "<p>Soit la base de données suivante d'un e-commerce :</p><div style='background: #e9ecef; padding: 15px; border-radius: 5px; margin: 10px 0; font-family: monospace; font-size: 0.9rem;'><p><strong>Client</strong> (idClient, nom, prenom, email, ville)</p><p><strong>Produit</strong> (idProduit, nom, prix, stock, idCategorie)</p><p><strong>Categorie</strong> (idCategorie, nom, description)</p><p><strong>Commande</strong> (idCommande, idClient, dateCommande, total)</p><p><strong>LigneCommande</strong> (idCommande, idProduit, quantite, prixUnitaire)</p></div><p>Écrivez les requêtes SQL correspondant aux questions suivantes.</p>",
      "questions": [
        {
          "question": "1) Sélectionnez les noms et prénoms des clients habitant à Douala. <em>(1 pt)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 5px; font-family: monospace;'>SELECT nom, prenom FROM Client WHERE ville = 'Douala';</div>"
        },
        {
          "question": "2) Sélectionnez les produits dont le prix est supérieur à 50 000 FCFA, triés par prix décroissant. <em>(1 pt)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 5px; font-family: monospace;'>SELECT * FROM Produit WHERE prix > 50000 ORDER BY prix DESC;</div>"
        },
        {
          "question": "3) Calculez le nombre total de commandes par client. Affichez le nom du client et le nombre de commandes. <em>(1,5 pts)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 5px; font-family: monospace;'>SELECT Client.nom, COUNT(Commande.idCommande) AS nbCommandes<br>FROM Client<br>LEFT JOIN Commande ON Client.idClient = Commande.idClient<br>GROUP BY Client.idClient, Client.nom;</div>"
        },
        {
          "question": "4) Calculez le montant total des commandes (chiffre d'affaires) pour le mois de janvier 2025. <em>(1,5 pts)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 5px; font-family: monospace;'>SELECT SUM(total) AS chiffreAffaires<br>FROM Commande<br>WHERE dateCommande BETWEEN '2025-01-01' AND '2025-01-31';</div>"
        },
        {
          "question": "5) Affichez les produits (nom, prix) de la catégorie 'Électronique' en utilisant une jointure. <em>(2 pts)</em>",
          "reponse": "<div style='background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 5px; font-family: monospace;'>SELECT Produit.nom, Produit.prix<br>FROM Produit<br>INNER JOIN Categorie ON Produit.idCategorie = Categorie.idCategorie<br>WHERE Categorie.nom = 'Électronique';</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : SQL et NoSQL (7 pts)",
      "points": "7 pts",
      "enonce": "<p>Ce chapitre porte sur la comparaison entre SQL et NoSQL, ainsi que sur la compréhension des modèles de données.</p><div style='background: #f8f9fa; padding: 15px; border-left: 5px solid #0d6efd; border-radius: 5px; margin: 10px 0;'><p>Une startup souhaite stocker des profils d'utilisateurs. Chaque profil contient un identifiant, un nom, une liste de compétences (variable) et des informations de contact.</p></div>",
      "questions": [
        {
          "question": "1) Expliquez en quoi une base de données NoSQL de type document (comme MongoDB) serait plus adaptée qu'une base SQL pour stocker ces profils. <em>(2 pts)</em>",
          "reponse": "<div><p>Une base de données documentaire serait plus adaptée pour plusieurs raisons :</p><ul><li><strong>Schéma flexible :</strong> Chaque utilisateur peut avoir une liste de compétences de taille différente.</li><li><strong>Structure naturelle :</strong> Les données sont imbriquées (compétences dans l'utilisateur) comme un document JSON.</li><li><strong>Évolution facile :</strong> Ajouter un nouveau champ ne nécessite pas de migration.</li><li><strong>Performance :</strong> La lecture d'un document complet est plus rapide qu'une jointure.</li></ul></div>"
        },
        {
          "question": "2) Citez et expliquez les quatre grandes familles de bases de données NoSQL. <em>(3 pts)</em>",
          "reponse": "<div><p><strong>Les 4 familles NoSQL :</strong></p><ul><li><strong>Document :</strong> Stocke les données sous forme de documents JSON/BSON. Ex: MongoDB, CouchDB.</li><li><strong>Clé-Valeur :</strong> Stocke des paires (clé, valeur) comme un dictionnaire. Ex: Redis, DynamoDB.</li><li><strong>Colonnaire :</strong> Stocke les données par colonnes pour l'analyse. Ex: Cassandra, HBase.</li><li><strong>Graphe :</strong> Stocke des nœuds et des relations pour les données connectées. Ex: Neo4j, Amazon Neptune.</li></ul></div>"
        },
        {
          "question": "3) Comparez SQL et NoSQL selon les critères suivants : schéma, scalabilité et transactions. <em>(2 pts)</em>",
          "reponse": "<div><table style='width:100%; border-collapse: collapse; font-size: 0.9rem;'><tr style='background:#0d6efd; color:white;'><th style='padding:5px; border:1px solid #ddd;'>Critère</th><th style='padding:5px; border:1px solid #ddd;'>SQL</th><th style='padding:5px; border:1px solid #ddd;'>NoSQL</th></tr><tr><td style='padding:5px; border:1px solid #ddd;'><strong>Schéma</strong></td><td style='padding:5px; border:1px solid #ddd;'>Fixe (migrations)</td><td style='padding:5px; border:1px solid #ddd;'>Flexible (schéma dynamique)</td></tr><tr style='background:#f8f9fa;'><td style='padding:5px; border:1px solid #ddd;'><strong>Scalabilité</strong></td><td style='padding:5px; border:1px solid #ddd;'>Verticale (plus de puissance)</td><td style='padding:5px; border:1px solid #ddd;'>Horizontale (plus de serveurs)</td></tr><tr><td style='padding:5px; border:1px solid #ddd;'><strong>Transactions</strong></td><td style='padding:5px; border:1px solid #ddd;'>ACID (fortes garanties)</td><td style='padding:5px; border:1px solid #ddd;'>BASE (garanties plus souples)</td></tr></table></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
