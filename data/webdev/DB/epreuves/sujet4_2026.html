<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation aux Bases de données",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Modélisation d'une base de données pour une école (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>Vous êtes chargé de concevoir une base de données pour une école primaire. Le système doit gérer :</p>\n<ul style='list-style-type: disc; padding-left: 20px;'>\n<li>Les <strong>élèves</strong> (nom, prénom, date de naissance, classe).</li>\n<li>Les <strong>classes</strong> (nom, niveau, professeur principal).</li>\n<li>Les <strong>professeurs</strong> (nom, prénom, matière enseignée).</li>\n<li>Les <strong>évaluations</strong> (date, matière, note).</li>\n</ul>\n<p>Un élève appartient à une seule classe. Un professeur enseigne une seule matière. Une évaluation est liée à un élève et à une matière.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Diagramme Entité-Association (3 pts)</strong></p><p>Réalisez le diagramme entité-association (DER) correspondant à ce système.</p><p>Identifiez :</p><ul style='list-style-type: disc; padding-left: 20px;'><li>Les <strong>entités</strong> avec leurs attributs.</li><li>Les <strong>associations</strong> avec leurs cardinalités.</li><li>Les <strong>clés primaires</strong> de chaque entité.</li></ul></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n<p><strong>Entités et attributs :</strong></p>\n<ul style='list-style-type: disc; padding-left: 20px;'>\n<li><strong>ÉLÈVE</strong> : id_eleve (PK), nom, prenom, date_naissance</li>\n<li><strong>CLASSE</strong> : id_classe (PK), nom, niveau</li>\n<li><strong>PROFESSEUR</strong> : id_professeur (PK), nom, prenom, matiere</li>\n<li><strong>ÉVALUATION</strong> : id_evaluation (PK), date, note</li>\n</ul>\n<p><strong>Associations et cardinalités :</strong></p>\n<ul style='list-style-type: disc; padding-left: 20px;'>\n<li>ÉLÈVE (0,n) ⇔ (1,1) CLASSE : Un élève appartient à une seule classe.</li>\n<li>PROFESSEUR (1,1) ⇔ (0,n) CLASSE : Une classe a un professeur principal.</li>\n<li>ÉLÈVE (1,1) ⇔ (0,n) ÉVALUATION : Un élève peut avoir plusieurs évaluations.</li>\n<li>MATIÈRE (1,1) ⇔ (0,n) ÉVALUATION : Une matière peut avoir plusieurs évaluations.</li>\n</ul>\n</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Transformations et Clés (3 pts)</strong></p><p>À partir de votre DER :</p><ol style='list-style-type: decimal; padding-left: 20px;'><li>Proposez le schéma relationnel (tables avec leurs colonnes).</li><li>Identifiez les <strong>clés étrangères</strong> nécessaires.</li><li>Expliquez pourquoi la table <code>ÉVALUATION</code> a besoin de clés étrangères.</li></ol></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n<p><strong>Schéma relationnel :</strong></p>\n<ul style='list-style-type: disc; padding-left: 20px;'>\n<li><strong>ÉLÈVE</strong> (id_eleve, nom, prenom, date_naissance, <span style='color: #fbbf24;'>id_classe</span>)</li>\n<li><strong>CLASSE</strong> (id_classe, nom, niveau, <span style='color: #fbbf24;'>id_professeur</span>)</li>\n<li><strong>PROFESSEUR</strong> (id_professeur, nom, prenom, matiere)</li>\n<li><strong>ÉVALUATION</strong> (id_evaluation, date, note, <span style='color: #fbbf24;'>id_eleve</span>, <span style='color: #fbbf24;'>matiere</span>)</li>\n</ul>\n<p><strong>Clés étrangères :</strong></p>\n<ul style='list-style-type: disc; padding-left: 20px;'>\n<li><strong>ÉLÈVE.id_classe</strong> → référence à CLASSE.id_classe</li>\n<li><strong>CLASSE.id_professeur</strong> → référence à PROFESSEUR.id_professeur</li>\n<li><strong>ÉVALUATION.id_eleve</strong> → référence à ÉLÈVE.id_eleve</li>\n</ul>\n<p><strong>Explication :</strong> La table ÉVALUATION est une table d'association qui lie un élève et une matière. Elle permet de stocker les notes obtenues par un élève dans une matière spécifique.</p>\n</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Requêtes SQL (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>On considère la base de données d'une bibliothèque avec les tables suivantes :</p>\n<div style='background: #1f2937; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 0.9rem;'>\n<strong>LIVRE</strong> (id_livre, titre, auteur, annee_publication, genre, disponible)<br>\n<strong>ADHERENT</strong> (id_adherent, nom, prenom, date_inscription)<br>\n<strong>EMPRUNT</strong> (id_emprunt, id_livre, id_adherent, date_emprunt, date_retour_prevue, date_retour_effective)<br>\n</div>\n<p>Répondez aux questions suivantes en SQL.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Sélections et Tris (2 pts)</strong></p><ol style='list-style-type: lower-alpha; padding-left: 20px;'><li>Sélectionner tous les livres de l'auteur \"Camus\" triés par année de publication.</li><li>Sélectionner les adhérents inscrits en 2025 (date_inscription entre '2025-01-01' et '2025-12-31').</li></ol></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n<p><strong>a) Livres de Camus triés :</strong></p>\n<pre style='color: #34d399;'>SELECT * FROM LIVRE WHERE auteur = 'Camus' ORDER BY annee_publication ASC;</pre>\n<p><strong>b) Adhérents de 2025 :</strong></p>\n<pre style='color: #34d399;'>SELECT * FROM ADHERENT WHERE date_inscription BETWEEN '2025-01-01' AND '2025-12-31';</pre>\n</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Agrégations et GROUP BY (3 pts)</strong></p><ol style='list-style-type: lower-alpha; padding-left: 20px;'><li>Compter le nombre de livres par genre.</li><li>Calculer le nombre d'emprunts par adhérent, en affichant le nom et prénom de l'adhérent.</li></ol></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n<p><strong>a) Nombre de livres par genre :</strong></p>\n<pre style='color: #34d399;'>SELECT genre, COUNT(*) AS nb_livres FROM LIVRE GROUP BY genre;</pre>\n<p><strong>b) Emprunts par adhérent :</strong></p>\n<pre style='color: #34d399;'>SELECT a.nom, a.prenom, COUNT(e.id_emprunt) AS nb_emprunts\nFROM ADHERENT a\nLEFT JOIN EMPRUNT e ON a.id_adherent = e.id_adherent\nGROUP BY a.id_adherent;</pre>\n</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>3) Jointures (3 pts)</strong></p><ol style='list-style-type: lower-alpha; padding-left: 20px;'><li>Afficher tous les emprunts en cours (date_retour_effective IS NULL) avec le titre du livre et le nom de l'adhérent.</li><li>Trouver les adhérents qui n'ont jamais emprunté de livre.</li></ol></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n<p><strong>a) Emprunts en cours :</strong></p>\n<pre style='color: #34d399;'>SELECT e.id_emprunt, l.titre, a.nom, a.prenom, e.date_emprunt\nFROM EMPRUNT e\nJOIN LIVRE l ON e.id_livre = l.id_livre\nJOIN ADHERENT a ON e.id_adherent = a.id_adherent\nWHERE e.date_retour_effective IS NULL;</pre>\n<p><strong>b) Adhérents sans emprunt :</strong></p>\n<pre style='color: #34d399;'>SELECT a.nom, a.prenom\nFROM ADHERENT a\nLEFT JOIN EMPRUNT e ON a.id_adherent = e.id_adherent\nWHERE e.id_emprunt IS NULL;</pre>\n</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Transactions et Intégrité (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>Une transaction bancaire est un exemple classique d'opération nécessitant l'utilisation de transactions. Un client veut transférer 50 000 FCFA de son compte (compte A) vers le compte d'un ami (compte B).</p>\n<p>Le schéma de la table <code>COMPTE</code> est :</p>\n<div style='background: #1f2937; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 0.9rem;'>\n<strong>COMPTE</strong> (id_compte, nom_titulaire, solde)<br>\n</div>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Transaction SQL (2 pts)</strong></p><p>Écrivez la transaction SQL complète (BEGIN, COMMIT, ROLLBACK) pour effectuer le virement.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n<pre style='color: #34d399;'>BEGIN;\n\nUPDATE COMPTE SET solde = solde - 50000 WHERE id_compte = 1;\nUPDATE COMPTE SET solde = solde + 50000 WHERE id_compte = 2;\n\n-- Vérification (optionnelle mais recommandée)\n-- Si tout est OK\nCOMMIT;\n\n-- En cas d'erreur\n-- ROLLBACK;</pre>\n</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Propriétés ACID (2 pts)</strong></p><p>Expliquez comment les propriétés <strong>Atomicité</strong> et <strong>Cohérence</strong> sont assurées dans ce virement.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; line-height: 1.6;'>\n<p><strong>Atomicité :</strong> La transaction garantit que les deux opérations (débit et crédit) sont exécutées ensemble. Si une des opérations échoue, le ROLLBACK annule toutes les modifications.</p>\n<p><strong>Cohérence :</strong> Après la transaction, le total des soldes est conservé. Le solde du compte A diminue de 50 000 et le solde du compte B augmente de 50 000.</p>\n</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>3) Gestion des erreurs (2 pts)</strong></p><p>Que se passe-t-il si le compte A a un solde de 30 000 FCFA seulement ? Comment la transaction doit-elle réagir ?</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; line-height: 1.6;'>\n<p>Si le solde est insuffisant (30 000 FCFA), la transaction doit être annulée par un ROLLBACK.</p>\n<p>Il est recommandé d'ajouter une condition vérifiant le solde avant d'exécuter les mises à jour :</p>\n<pre style='color: #34d399; font-family: monospace;'>\nSELECT solde FROM COMPTE WHERE id_compte = 1;\n-- Si solde < 50000, alors ROLLBACK;</pre>\n<p>Cela garantit que le virement n'est effectué que si les fonds sont disponibles.</p>\n</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
