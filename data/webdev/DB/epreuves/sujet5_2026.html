<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux Bases de données",
 "classe": "Développement Web",
 "sequence": "Évaluation Séquentielle N°5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Conception et Normalisation (5 pts)",
     "points": "5 pts",
     "enonce": "Dans le cadre de la digitalisation des services publics au Cameroun, le Ministère de l'Éducation de base souhaite créer une base de données pour gérer les inscriptions des élèves dans les écoles primaires publiques du pays, notamment dans les régions du Littoral et du Centre. \n\nUne école est identifiée par un code unique. On connaît son nom, sa ville (Douala, Yaoundé, etc.) et son quartier. Un élève est identifié par son matricule. On connaît son nom, son prénom, sa date de naissance, son sexe et sa classe. Un élève est inscrit dans une seule école. Une école peut accueillir plusieurs élèves. On veut conserver l'année scolaire de l'inscription de chaque élève.",
     "questions": [
       {
         "question": "<strong>1.1 (1 pt)</strong> - Identifier les entités et leurs attributs.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><strong>Entité ÉCOLE :</strong><br>code (PK), nom, ville, quartier<br><br><strong>Entité ÉLÈVE :</strong><br>matricule (PK), nom, prenom, date_naissance, sexe, classe, annee_scolaire</div>"
       },
       {
         "question": "<strong>1.2 (1.5 pts)</strong> - Définir les associations et leurs cardinalités entre les entités.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><strong>Association INSCRIPTION</strong> entre ÉCOLE et ÉLÈVE :<br>Une école peut inscrire <strong>0,n</strong> élèves.<br>Un élève est inscrit dans <strong>1,1</strong> école.</div>"
       },
       {
         "question": "<strong>1.3 (1 pt)</strong> - Proposer un modèle physique (tables et clés étrangères) pour cette base de données.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'><span style='color: #38bdf8;'>ECOLE</span> (<span style='color: #fbbf24;'>code</span>, nom, ville, quartier)<br><span style='color: #38bdf8;'>ELEVE</span> (<span style='color: #fbbf24;'>matricule</span>, nom, prenom, date_naissance, sexe, classe, annee_scolaire, <span style='color: #f87171;'>code_ecole</span>)<br><br>-- <span style='color: #34d399;'>code_ecole</span> est une clé étrangère vers ECOLE.<br>-- <span style='color: #34d399;'>matricule</span> est la clé primaire d'ELEVE.</div>"
       },
       {
         "question": "<strong>1.4 (1.5 pts)</strong> - La table ELEVE ci-dessous n'est pas normalisée. Décomposez-la en 3ème Forme Normale (3NF).<br><br><div style='background-color: #f8fafc; padding: 0.75rem; border-radius: 4px; font-family: monospace;'>ELEVE (matricule, nom, prenom, classe, professeur_principal, matiere1, note1, matiere2, note2)</div>",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><strong>1NF :</strong> Déjà ok car valeurs atomiques.<br><strong>2NF :</strong> Déjà ok car clé simple.<br><strong>3NF :</strong> Supprimer les dépendances transitives.<br><br><strong>Tables finales :</strong><br><span style='font-weight: bold;'>ELEVE</span> (matricule, nom, prenom, <span style='color: #f87171;'>id_classe</span>)<br><span style='font-weight: bold;'>CLASSE</span> (id_classe, nom_classe, professeur_principal)<br><span style='font-weight: bold;'>NOTE</span> (id_note, matricule, matiere, note)</div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Requêtes SQL d'Interrogation (8 pts)",
     "points": "8 pts",
     "enonce": "On considère la base de données d'une plateforme de vente en ligne (e-commerce) camerounaise nommée \"VenteAuCameroun\". Elle est composée des tables suivantes (structure simplifiée) :\n\n<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'>\n<strong style='color: #38bdf8;'>CLIENT</strong> (id_client, nom, prenom, email, ville, date_inscription)<br>\n<strong style='color: #38bdf8;'>PRODUIT</strong> (id_produit, libelle, prix, stock, id_categorie)<br>\n<strong style='color: #38bdf8;'>CATEGORIE</strong> (id_categorie, nom_categorie)<br>\n<strong style='color: #38bdf8;'>COMMANDE</strong> (id_commande, date_commande, montant_total, id_client)<br>\n<strong style='color: #38bdf8;'>LIGNE_COMMANDE</strong> (id_commande, id_produit, quantite, prix_unitaire)<br>\n</div><br>\nLes clés primaires sont soulignées. Les clés étrangères sont : COMMANDE.id_client référence CLIENT.id_client, LIGNE_COMMANDE.id_commande référence COMMANDE.id_commande, LIGNE_COMMANDE.id_produit référence PRODUIT.id_produit.",
     "questions": [
       {
         "question": "<strong>2.1 (2 pts)</strong> - Écrire une requête SQL pour afficher la liste des clients (nom et prénom) de la ville de Douala qui se sont inscrits en 2025.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'>SELECT nom, prenom<br>FROM CLIENT<br>WHERE ville = 'Douala' <span style='color: #fbbf24;'>AND</span> date_inscription <span style='color: #38bdf8;'>BETWEEN</span> '2025-01-01' <span style='color: #38bdf8;'>AND</span> '2025-12-31';</div>"
       },
       {
         "question": "<strong>2.2 (2 pts)</strong> - Afficher le nombre total de commandes passées par chaque client. Le résultat doit montrer l'id_client et le nombre de commandes.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'>SELECT id_client, <span style='color: #34d399;'>COUNT</span>(*) <span style='color: #38bdf8;'>AS</span> nb_commandes<br>FROM COMMANDE<br><span style='color: #fbbf24;'>GROUP BY</span> id_client;</div>"
       },
       {
         "question": "<strong>2.3 (2 pts)</strong> - Trouver les clients qui ont passé au moins 3 commandes. Afficher leur id_client et le nombre de commandes.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'>SELECT id_client, <span style='color: #34d399;'>COUNT</span>(*) <span style='color: #38bdf8;'>AS</span> nb_commandes<br>FROM COMMANDE<br><span style='color: #fbbf24;'>GROUP BY</span> id_client<br><span style='color: #fbbf24;'>HAVING</span> <span style='color: #34d399;'>COUNT</span>(*) >= 3;</div>"
       },
       {
         "question": "<strong>2.4 (2 pts)</strong> - Écrire une requête qui donne le montant total des ventes par catégorie de produit. On souhaite voir le nom de la catégorie et le montant total.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'>SELECT c.nom_categorie, <span style='color: #34d399;'>SUM</span>(lc.quantite * lc.prix_unitaire) <span style='color: #38bdf8;'>AS</span> montant_total_ventes<br>FROM LIGNE_COMMANDE lc<br><span style='color: #38bdf8;'>INNER JOIN</span> PRODUIT p <span style='color: #38bdf8;'>ON</span> lc.id_produit = p.id_produit<br><span style='color: #38bdf8;'>INNER JOIN</span> CATEGORIE c <span style='color: #38bdf8;'>ON</span> p.id_categorie = c.id_categorie<br><span style='color: #fbbf24;'>GROUP BY</span> c.id_categorie, c.nom_categorie;</div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Gestion des Utilisateurs (4 pts)",
     "points": "4 pts",
     "enonce": "L'administrateur de la base de données \"VenteAuCameroun\" doit gérer les accès pour une équipe qui travaille sur l'application.",
     "questions": [
       {
         "question": "<strong>3.1 (1 pt)</strong> - Écrire la commande SQL pour créer un utilisateur nommé 'gestionnaire' qui ne peut se connecter que depuis le serveur local (localhost), avec le mot de passe 'Passer123'.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'><span style='color: #38bdf8;'>CREATE USER</span> 'gestionnaire'@'localhost' <span style='color: #38bdf8;'>IDENTIFIED BY</span> 'Passer123';</div>"
       },
       {
         "question": "<strong>3.2 (1.5 pts)</strong> - On veut que ce gestionnaire puisse uniquement lire les données des tables CLIENT et PRODUIT. Écrire les commandes GRANT correspondantes.",
         "reponse": "<div style='background-color: #0f172a; padding: 1rem; border-radius: 8px; color: #f8fafc; font-family: monospace;'><span style='color: #38bdf8;'>GRANT SELECT</span> ON VenteAuCameroun.CLIENT <span style='color: #38bdf8;'>TO</span> 'gestionnaire'@'localhost';<br><span style='color: #38bdf8;'>GRANT SELECT</span> ON VenteAuCameroun.PRODUIT <span style='color: #38bdf8;'>TO</span> 'gestionnaire'@'localhost';</div>"
       },
       {
         "question": "<strong>3.3 (0.5 pt)</strong> - Expliquer ce que fait la commande suivante : <span style='font-family: monospace;'>REVOKE DELETE ON VenteAuCameroun.COMMANDE FROM 'gestionnaire'@'localhost';</span>",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'>Cette commande retire à l'utilisateur 'gestionnaire' le droit de supprimer des lignes (DELETE) dans la table COMMANDE de la base VenteAuCameroun.</div>"
       },
       {
         "question": "<strong>3.4 (1 pt)</strong> - Expliquer le principe du 'moindre privilège' en matière de sécurité des bases de données et donner un exemple concret en lien avec ce gestionnaire.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'>Le principe du moindre privilège consiste à n'accorder à un utilisateur que les droits <span style='font-weight: bold;'>strictement nécessaires</span> à l'accomplissement de ses tâches.<br><br><strong>Exemple :</strong> Le gestionnaire a besoin de consulter les clients et produits, mais pas de les modifier ou supprimer. En ne lui donnant que le droit SELECT, on limite les risques en cas de mauvaise manipulation ou de compromission de son compte.</div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Sauvegarde et Sécurité (3 pts)",
     "points": "3 pts",
     "enonce": "",
     "questions": [
       {
         "question": "<strong>4.1 (1 pt)</strong> - Citez deux différences entre une sauvegarde logique et une sauvegarde physique d'une base de données.",
         "reponse": "<div style='background-color: #f1f5f9; padding: 1rem; border-radius: 8px;'><ul><li>La <strong>sauvegarde logique</strong> consiste à exporter les données et la structure sous forme de requêtes SQL (ex: mysqldump). Elle est indépendante du matériel et plus lente pour de gros volumes.</li><li>La <strong>sauvegarde physique</strong> consiste à copier directement les fichiers de la base de données (ex: fichiers .ibd pour InnoDB). Elle est plus rapide mais dépend du système d'exploitation et du matériel.</li></ul></div>"

       {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
