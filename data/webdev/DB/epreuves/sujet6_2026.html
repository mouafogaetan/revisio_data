<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation aux Bases de données",
 "classe": "Développement Web",
 "sequence": "Séquence 6 - Gestion et Sécurité des Bases de Données",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Gestion des Utilisateurs et Privilèges",
     "points": "7 points",
     "enonce": "<div style='padding: 10px;'><p>Vous êtes administrateur de la base de données d'une entreprise de logistique basée à Douala. Cette entreprise gère les livraisons de colis dans tout le Cameroun. La base de données contient des informations sensibles comme les adresses des clients, les détails des colis et les données de paiement.</p><p>Votre mission est de mettre en place une politique de sécurité pour la gestion des utilisateurs et de leurs privilèges.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>1.1) Création d'utilisateurs (2 points)</strong></p><p>Écrivez les commandes SQL (PostgreSQL) nécessaires pour :</p><ol><li>Créer un utilisateur <code>app_web</code> avec le mot de passe <code>securePass123</code>.</li><li>Créer un utilisateur <code>admin</code> avec le mot de passe <code>adminSecure789</code>.</li><li>Créer un utilisateur <code>lecture_seule</code> avec le mot de passe <code>readOnly2025</code>.</li></ol></div>",
         "reponse": "<div><pre><code>-- 1. Création de l'utilisateur app_web\nCREATE USER app_web WITH PASSWORD 'securePass123';\n\n-- 2. Création de l'utilisateur admin\nCREATE USER admin WITH PASSWORD 'adminSecure789';\n\n-- 3. Création de l'utilisateur lecture_seule\nCREATE USER lecture_seule WITH PASSWORD 'readOnly2025';</code></pre><p>Ces utilisateurs auront des droits différents selon leurs besoins : <code>app_web</code> pour l'application, <code>admin</code> pour la gestion complète, et <code>lecture_seule</code> pour les rapports.</p></div>"
       },
       {
         "question": "<div><p><strong>1.2) Attribution des privilèges (3 points)</strong></p><p>Attribuez les privilèges suivants en utilisant les commandes SQL :</p><ol><li>Donner à <code>app_web</code> tous les droits (SELECT, INSERT, UPDATE, DELETE) sur les tables <code>clients</code> et <code>livraisons</code>.</li><li>Donner à <code>admin</code> tous les droits sur toutes les tables de la base de données.</li><li>Donner à <code>lecture_seule</code> uniquement le droit de lecture (SELECT) sur toutes les tables.</li></ol></div>",
         "reponse": "<div><pre><code>-- 1. Droits pour app_web sur clients et livraisons\nGRANT SELECT, INSERT, UPDATE, DELETE ON clients TO app_web;\nGRANT SELECT, INSERT, UPDATE, DELETE ON livraisons TO app_web;\n\n-- 2. Droits pour admin sur toutes les tables\nGRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO admin;\n\n-- 3. Droits pour lecture_seule (lecture uniquement)\nGRANT SELECT ON ALL TABLES IN SCHEMA public TO lecture_seule;</code></pre><p>On applique ici le principe du moindre privilège : chaque utilisateur n'a que les droits dont il a besoin.</p></div>"
       },
       {
         "question": "<div><p><strong>1.3) Principe du moindre privilège (2 points)</strong></p><p>Expliquez ce qu'est le <strong>principe du moindre privilège</strong> en matière de sécurité des bases de données. Donnez un exemple concret dans le contexte de l'entreprise de logistique.</p></div>",
         "reponse": "<div><p><strong>Principe du moindre privilège :</strong> Chaque utilisateur ou processus ne doit avoir que les droits strictement nécessaires à l'accomplissement de ses tâches, ni plus ni moins.</p><p><strong>Exemple dans l'entreprise de logistique :</strong></p><ul><li><strong>Agent de saisie :</strong> A besoin des droits INSERT et UPDATE sur la table <code>livraisons</code> pour enregistrer les nouveaux colis, mais n'a pas besoin de supprimer des données (DELETE). Il n'a pas non plus accès aux données des clients (table <code>clients</code>).</li><li><strong>Comptable :</strong> A besoin des droits SELECT sur les tables <code>livraisons</code> et <code>paiements</code> pour faire les bilans, mais ne peut pas modifier ces données.</li><li><strong>Administrateur :</strong> Seul lui a tous les droits, car il gère la base de données.</li></ul><p>Cela limite les risques en cas de compromission d'un compte.</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Sauvegardes et Automatisation",
     "points": "7 points",
     "enonce": "<div style='padding: 10px;'><p>L'entreprise de logistique a décidé de mettre en place une politique de sauvegarde robuste pour protéger ses données. Vous devez définir et mettre en œuvre cette stratégie.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>2.1) Types de sauvegardes (3 points)</strong></p><p>Expliquez la différence entre une <strong>sauvegarde logique</strong> et une <strong>sauvegarde physique</strong> d'une base de données. Pour chacun, donnez un avantage et un inconvénient.</p><p>Donnez également la commande pour effectuer une sauvegarde logique d'une base PostgreSQL nommée <code>logistique_db</code> avec l'utilisateur <code>postgres</code>.</p></div>",
         "reponse": "<div><p><strong>Sauvegarde Logique :</strong></p><ul><li><strong>Définition :</strong> Extrait les données sous forme de commandes SQL (CREATE, INSERT, etc.).</li><li><strong>Avantage :</strong> Portable entre différents SGBD et lisible par un humain.</li><li><strong>Inconvénient :</strong> Plus lent pour les grosses bases de données.</li></ul><p><strong>Sauvegarde Physique :</strong></p><ul><li><strong>Définition :</strong> Copie directe des fichiers de la base de données sur le disque.</li><li><strong>Avantage :</strong> Rapide et permet une restauration complète en peu de temps.</li><li><strong>Inconvénient :</strong> Spécifique au SGBD et à la version, pas portable.</li></ul><p><strong>Commande de sauvegarde logique (PostgreSQL) :</strong></p><pre><code>pg_dump -U postgres -d logistique_db > sauvegarde_logistique.sql</code></pre></div>"
       },
       {
         "question": "<div><p><strong>2.2) Stratégie de sauvegarde (2 points)</strong></p><p>Proposez une stratégie de sauvegarde pour l'entreprise de logistique, en expliquant :</p><ol><li>La fréquence des sauvegardes</li><li>Le type de sauvegarde utilisé</li><li>Où stocker les sauvegardes</li><li>Combien de temps les conserver</li></ol></div>",
         "reponse": "<div><p><strong>Stratégie proposée :</strong></p><ul><li><strong>Fréquence :</strong><ul><li>Sauvegarde complète quotidienne à 2h00 du matin (période de faible activité)</li><li>Sauvegarde incrémentale toutes les 4 heures en journée</li></ul></li><li><strong>Type :</strong> Sauvegarde logique (pg_dump) pour sa portabilité, complétée par une sauvegarde physique hebdomadaire (pg_basebackup) pour la rapidité de restauration.</li><li><strong>Stockage :</strong><ul><li>Local : Disque dur externe (copie rapide)</li><li>Distant : Serveur à Yaoundé (hors site)</li><li>Cloud : Google Cloud ou AWS S3 (sécurisé et chiffré)</li></ul></li><li><strong>Conservation :</strong><ul><li>Sauvegardes quotidiennes : 7 jours</li><li>Sauvegardes hebdomadaires : 1 mois</li><li>Sauvegardes mensuelles : 1 an</li></ul></li></ul><p>Cela suit la règle 3-2-1 : 3 copies, 2 supports différents, 1 copie hors site.</p></div>"
       },
       {
         "question": "<div><p><strong>2.3) Automatisation avec Cron (2 points)</strong></p><p>Écrivez un script bash pour automatiser une sauvegarde quotidienne de la base PostgreSQL. Le script doit :</p><ol><li>Créer un fichier de sauvegarde avec la date dans son nom (ex: <code>logistique_db_2025-06-21_0200.sql</code>).</li><li>Compresser le fichier en <code>.gz</code>.</li><li>Supprimer les sauvegardes de plus de 7 jours.</li></ol><p>Puis, expliquez comment configurer une tâche cron pour exécuter ce script tous les jours à 2h00.</p></div>",
         "reponse": "<div><p><strong>Script de sauvegarde (backup.sh) :</strong></p><pre><code>#!/bin/bash\n# Sauvegarde de logistique_db\n\nDATE=$(date +%Y-%m-%d_%H-%M)\nBACKUP_DIR=\"/backups/postgres\"\nDB_NAME=\"logistique_db\"\n\n# Créer le répertoire s'il n'existe pas\nmkdir -p $BACKUP_DIR\n\n# Effectuer la sauvegarde et compresser\npg_dump -U postgres -d $DB_NAME | gzip > $BACKUP_DIR/${DB_NAME}_$DATE.sql.gz\n\n# Supprimer les sauvegardes de plus de 7 jours\nfind $BACKUP_DIR -name \"${DB_NAME}_*.sql.gz\" -mtime +7 -delete\n\necho \"Sauvegarde terminée : ${DB_NAME}_$DATE.sql.gz\"</code></pre><p><strong>Configuration de la tâche cron :</strong></p><p>Rendre le script exécutable : <code>chmod +x backup.sh</code></p><p>Éditer le crontab : <code>crontab -e</code></p><p>Ajouter la ligne suivante :</p><pre><code>0 2 * * * /home/user/backup.sh</code></pre><p>Cette ligne signifie : \"exécuter à 2h00, tous les jours, tous les mois, tous les jours de la semaine\".</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Protection contre les Injections SQL",
     "points": "6 points",
     "enonce": "<div style='padding: 10px;'><p>L'entreprise de logistique utilise une application web pour gérer les livraisons. Vous avez découvert que certaines requêtes SQL sont vulnérables aux injections.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>3.1) Qu'est-ce qu'une injection SQL ? (2 points)</strong></p><p>Définissez ce qu'est une <strong>injection SQL</strong>. Expliquez pourquoi elle est dangereuse pour une base de données. Donnez un exemple d'attaque.</p></div>",
         "reponse": "<div><p><strong>Injection SQL :</strong> Technique d'attaque qui consiste à insérer du code SQL malveillant dans une requête via une entrée utilisateur non sécurisée.</p><p><strong>Pourquoi est-ce dangereux ?</strong></p><ul><li>Peut permettre de lire, modifier ou supprimer des données sensibles</li><li>Peut compromettre toute la base de données</li><li>Peut être utilisée pour prendre le contrôle du serveur</li><li>Peut causer des pertes financières et une perte de confiance des clients</li></ul><p><strong>Exemple d'attaque :</strong></p><p>Un attaquant saisit dans un champ de recherche :</p><pre><code>'; DROP TABLE clients; --</code></pre><p>Si l'application construit la requête comme ceci :</p><pre><code>SELECT * FROM livraisons WHERE client_nom = '$nom'</code></pre><p>La requête deviendra :</p><pre><code>SELECT * FROM livraisons WHERE client_nom = ''; DROP TABLE clients; --'</code></pre><p>Ce qui supprimerait la table <code>clients</code>.</p></div>"
       },
       {
         "question": "<div><p><strong>3.2) Comment se protéger ? (2 points)</strong></p><p>Expliquez comment se protéger contre les injections SQL. Citez au moins deux méthodes efficaces.</p></div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
