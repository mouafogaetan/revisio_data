<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 9 : Les contraintes SQL | Cours Base de données</title>
  <!-- Tailwind CSS + Font Awesome (pour icônes discrètes) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Personnalisation Tailwind pour améliorer le confort visuel -->
  <style>
    /* ajustements supplémentaires pour lisibilité et contraste doux */
    body {
      background: #f4f7fc;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    }
    .slide-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .slide-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
    }
    .nav-btn {
      transition: all 0.2s;
    }
    .nav-btn:active {
      transform: scale(0.96);
    }
    /* Pour une meilleure expérience tactile sur mobile */
    button, .slide-indicator {
      touch-action: manipulation;
    }
    /* Personnalisation du défilement si besoin */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    /* Transition pour les slides */
    .slide-container {
      transition: opacity 0.25s ease-in-out;
    }
  </style>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules, bien que cette leçon n'en nécessite pas, on l'inclut par précaution) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

  <main class="max-w-5xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur des slides avec navigation -->
    <div class="relative bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl overflow-hidden border border-blue-100">
      
      <!-- En-tête discret avec titre de la matière -->
      <div class="bg-gradient-to-r from-indigo-700 to-blue-700 px-5 py-3 text-white text-sm md:text-base flex justify-between items-center flex-wrap gap-2">
        <span class="font-semibold tracking-wide">📘 Initiation aux Bases de données</span>
        <span class="bg-white/20 px-3 py-0.5 rounded-full text-xs">Webdev · Chapitre 3 – Contraintes SQL</span>
      </div>
      
      <!-- Zone slide dynamique -->
      <div id="slides-wrapper" class="p-5 md:p-8 min-h-[550px] flex flex-col">
        <!-- le contenu des slides sera injecté ici par jQuery -->
      </div>
      
      <!-- Navigation et indicateurs -->
      <div class="border-t border-gray-200 bg-gray-50/90 px-5 py-4 flex flex-wrap justify-between items-center gap-3">
        <div class="flex gap-2">
          <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-indigo-50 hover:border-indigo-300 text-gray-700 font-medium py-2 px-4 rounded-xl shadow-sm transition flex items-center gap-1 text-sm md:text-base">
            <span>◀</span> <span class="hidden sm:inline">Précédent</span>
          </button>
          <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-xl shadow-sm transition flex items-center gap-1 text-sm md:text-base">
            <span class="hidden sm:inline">Suivant</span> <span>▶</span>
          </button>
        </div>
        <div class="flex items-center gap-2 text-sm text-gray-500 bg-white px-3 py-1 rounded-full shadow-inner">
          <span id="slideCounter">Slide 1 / 1</span>
          <span class="w-1.5 h-1.5 rounded-full bg-indigo-300"></span>
          <span class="hidden sm:inline">Leçon 9 · Contraintes SQL</span>
        </div>
        <div class="flex gap-1" id="dotsIndicator"></div>
      </div>
    </div>
    
    <!-- petite note pédagogique (accessible) -->
    <p class="text-center text-xs text-gray-500 mt-5">📌 Utilisez les boutons ou cliquez sur les points pour naviguer entre les slides</p>
  </main>

  <script>
    // -------- Définition des slides (contenu pédagogique de la leçon 9) --------
    // D'après le programme: lesson9 (chap3) : objectifs: NOT NULL, UNIQUE, DEFAULT, PRIMARY KEY, FOREIGN KEY, CHECK
    // Nous allons construire 5 slides cohérentes: Titre, Objectifs, puis les explications détaillées.
    
    const slides = [
      { // Slide 0 : Titre
        type: "title",
        content: `
          <div class="flex flex-col items-center justify-center text-center h-full min-h-[420px]">
            <div class="bg-indigo-100 rounded-full p-4 mb-5 inline-block">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                <path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z" />
              </svg>
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-blue-700 bg-clip-text text-transparent">Les contraintes SQL</h1>
            <p class="text-gray-600 mt-4 text-lg max-w-xl mx-auto">Garantir l'intégrité et la qualité des données dans vos tables</p>
            <div class="mt-8 flex flex-wrap gap-2 justify-center text-sm text-gray-500">
              <span class="bg-gray-100 px-3 py-1 rounded-full">🔐 PRIMARY KEY</span>
              <span class="bg-gray-100 px-3 py-1 rounded-full">🔗 FOREIGN KEY</span>
              <span class="bg-gray-100 px-3 py-1 rounded-full">⚡ UNIQUE & NOT NULL</span>
              <span class="bg-gray-100 px-3 py-1 rounded-full">✅ CHECK & DEFAULT</span>
            </div>
          </div>
        `
      },
      { // Slide 1 : Objectifs d'apprentissage (basés sur lesson9)
        type: "objectifs",
        content: `
          <div class="h-full">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-5 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
            <div class="grid md:grid-cols-2 gap-5 mt-4">
              <div class="bg-blue-50 rounded-xl p-4 shadow-sm">
                <div class="font-semibold text-indigo-800 text-lg">❶ NOT NULL & UNIQUE</div>
                <p class="text-gray-700 mt-1">Comprendre comment empêcher les valeurs vides et garantir l'unicité d'une colonne.</p>
              </div>
              <div class="bg-blue-50 rounded-xl p-4 shadow-sm">
                <div class="font-semibold text-indigo-800 text-lg">❷ DEFAULT & CHECK</div>
                <p class="text-gray-700 mt-1">Définir des valeurs par défaut et valider des conditions personnalisées sur les données.</p>
              </div>
              <div class="bg-blue-50 rounded-xl p-4 shadow-sm">
                <div class="font-semibold text-indigo-800 text-lg">❸ PRIMARY KEY</div>
                <p class="text-gray-700 mt-1">Savoir identifier de manière unique chaque enregistrement d'une table.</p>
              </div>
              <div class="bg-blue-50 rounded-xl p-4 shadow-sm">
                <div class="font-semibold text-indigo-800 text-lg">❹ FOREIGN KEY</div>
                <p class="text-gray-700 mt-1">Maîtriser les relations entre tables pour maintenir la cohérence référentielle.</p>
              </div>
            </div>
            <div class="mt-6 p-3 bg-indigo-50 rounded-lg text-indigo-800 text-sm italic">
              💡 À la fin de ce cours, vous serez capable d'écrire des commandes SQL (CREATE/ALTER) incluant toutes ces contraintes !
            </div>
          </div>
        `
      },
      { // Slide 2 : NOT NULL, UNIQUE, DEFAULT (explications pratiques)
        type: "content",
        title: "🔒 NOT NULL, UNIQUE et DEFAULT",
        content: `
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2"><span class="text-3xl">🔒</span> Contraintes essentielles</h2>
            <div class="mt-5 space-y-5">
              <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-emerald-500">
                <h3 class="font-bold text-emerald-700 text-lg">🚫 NOT NULL</h3>
                <p class="text-gray-700">Empêche d'insérer une valeur <span class="font-mono bg-gray-200 px-1 rounded">NULL</span> (inconnue ou absente) dans la colonne. Toute insertion sans valeur sera rejetée.</p>
                <pre class="bg-gray-900 text-gray-100 p-3 rounded-lg mt-2 text-sm overflow-x-auto"><code>CREATE TABLE eleves (
    id INT NOT NULL,
    nom VARCHAR(50) NOT NULL
);</code></pre>
              </div>
              <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-amber-500">
                <h3 class="font-bold text-amber-700 text-lg">🆔 UNIQUE</h3>
                <p class="text-gray-700">Garantit que toutes les valeurs d'une colonne (ou combinaison) sont différentes. Pas deux lignes identiques sur ce champ.</p>
                <pre class="bg-gray-900 text-gray-100 p-3 rounded-lg mt-2 text-sm overflow-x-auto"><code>CREATE TABLE utilisateurs (
    email VARCHAR(100) UNIQUE,
    pseudo VARCHAR(50) UNIQUE
);</code></pre>
              </div>
              <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-sky-500">
                <h3 class="font-bold text-sky-700 text-lg">⚙️ DEFAULT</h3>
                <p class="text-gray-700">Fournit une valeur automatique lorsqu'aucune valeur n'est spécifiée lors de l'insertion.</p>
                <pre class="bg-gray-900 text-gray-100 p-3 rounded-lg mt-2 text-sm overflow-x-auto"><code>CREATE TABLE commandes (
    id INT,
    date_creation DATE DEFAULT CURRENT_DATE,
    statut VARCHAR(20) DEFAULT 'en_attente'
);</code></pre>
              </div>
            </div>
            <p class="mt-4 text-sm text-gray-500">📌 <span class="font-medium">Astuce</span> : NOT NULL + UNIQUE = potentielle clé candidate (comme un identifiant alternatif)</p>
          </div>
        `
      },
      { // Slide 3 : PRIMARY KEY & FOREIGN KEY (les clés)
        type: "content",
        title: "🗝️ PRIMARY KEY & FOREIGN KEY – Le socle relationnel",
        content: `
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2"><span class="text-3xl">🗝️</span> Clés primaire et étrangère</h2>
            <div class="mt-5 grid md:grid-cols-2 gap-5">
              <div class="bg-purple-50 rounded-xl p-4 border border-purple-200">
                <div class="flex items-center gap-2"><span class="text-purple-700 text-2xl">⭐</span><h3 class="font-bold text-purple-800 text-lg">PRIMARY KEY</h3></div>
                <p class="text-gray-700 mt-2">Combine <strong>NOT NULL</strong> et <strong>UNIQUE</strong>. Chaque table ne peut avoir qu'une seule clé primaire. Elle identifie chaque ligne de façon unique.</p>
                <pre class="bg-gray-900 text-gray-100 p-2 rounded-md mt-2 text-xs overflow-x-auto"><code>CREATE TABLE clients (
    client_id INT PRIMARY KEY,
    nom VARCHAR(100)
);
-- ou avec contrainte nommée
ALTER TABLE produits ADD PRIMARY KEY (produit_id);</code></pre>
              </div>
              <div class="bg-rose-50 rounded-xl p-4 border border-rose-200">
                <div class="flex items-center gap-2"><span class="text-rose-600 text-2xl">🔗</span><h3 class="font-bold text-rose-800 text-lg">FOREIGN KEY</h3></div>
                <p class="text-gray-700 mt-2">Établit un lien entre deux tables. La valeur dans la colonne doit exister dans la clé primaire de la table référencée (intégrité référentielle).</p>
                <pre class="bg-gray-900 text-gray-100 p-2 rounded-md mt-2 text-xs overflow-x-auto"><code>CREATE TABLE commandes (
    commande_id INT PRIMARY KEY,
    client_id INT,
    FOREIGN KEY (client_id) REFERENCES clients(client_id)
    ON DELETE CASCADE
);</code></pre>
                <p class="text-xs text-gray-500 mt-2">✨ Options : ON DELETE CASCADE, ON DELETE SET NULL …</p>
              </div>
            </div>
            <div class="mt-5 bg-indigo-50 p-4 rounded-lg text-sm">
              <div class="font-semibold text-indigo-800">📖 À retenir :</div>
              <ul class="list-disc list-inside text-gray-700 space-y-1 mt-1">
                <li>La clé étrangère peut porter un nom différent de la colonne référencée.</li>
                <li>Les clés étrangères assurent qu'on ne peut pas créer une "commande" avec un "client" inexistant.</li>
                <li>On peut avoir plusieurs clés étrangères dans une table.</li>
              </ul>
            </div>
          </div>
        `
      },
      { // Slide 4 : CHECK (condition personnalisée) + récapitulatif visuel
        type: "content",
        title: "✅ CHECK et synthèse des contraintes",
        content: `
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2"><span class="text-3xl">✅</span> Contrainte CHECK</h2>
            <div class="bg-teal-50 p-4 rounded-xl border border-teal-200 mt-3">
              <p class="text-gray-800">La contrainte <span class="font-mono font-bold text-teal-700">CHECK</span> valide que les données respectent une condition booléenne avant insertion ou mise à jour.</p>
              <pre class="bg-gray-900 text-gray-100 p-3 rounded-lg mt-3 text-sm overflow-x-auto"><code>CREATE TABLE produits (
    id INT PRIMARY KEY,
    nom VARCHAR(100),
    prix DECIMAL(10,2) CHECK (prix >= 0),
    stock INT CHECK (stock >= 0 AND stock <= 500),
    categorie VARCHAR(20) CHECK (categorie IN ('electronique', 'mode', 'maison'))
);</code></pre>
              <div class="mt-3 flex flex-wrap gap-2">
                <span class="bg-teal-100 text-teal-800 px-2 py-0.5 rounded-full text-xs">✅ Empêche les prix négatifs</span>
                <span class="bg-teal-100 text-teal-800 px-2 py-0.5 rounded-full text-xs">✅ Évite stock négatif</span>
                <span class="bg-teal-100 text-teal-800 px-2 py-0.5 rounded-full text-xs">✅ Restreint catégories</span>
              </div>
            </div>

            <div class="mt-6 bg-gradient-to-r from-gray-50 to-indigo-50 p-4 rounded-xl">
              <h3 class="font-bold text-gray-800 flex items-center gap-1">📋 Tableau récapitulatif des contraintes SQL (lesson9)</h3>
              <div class="overflow-x-auto mt-2">
                <table class="min-w-full text-sm bg-white rounded-lg shadow-sm border">
                  <thead class="bg-indigo-100 text-indigo-800">
                    <tr><th class="px-3 py-2 text-left">Contrainte</th><th class="px-3 py-2 text-left">Rôle</th></tr>
                  </thead>
                  <tbody class="divide-y">
                    <tr><td class="px-3 py-2 font-mono text-xs">NOT NULL</td><td class="px-3 py-2">Interdit les valeurs vides / NULL</td></tr>
                    <tr><td class="px-3 py-2 font-mono text-xs">UNIQUE</td><td class="px-3 py-2">Garantit l'unicité des valeurs dans une colonne</td></tr>
                    <tr><td class="px-3 py-2 font-mono text-xs">DEFAULT</td><td class="px-3 py-2">Valeur par défaut si aucune donnée fournie</td></tr>
                    <tr><td class="px-3 py-2 font-mono text-xs">PRIMARY KEY</td><td class="px-3 py-2">Identifiant unique d'une ligne (NOT NULL + UNIQUE)</td></tr>
                    <tr><td class="px-3 py-2 font-mono text-xs">FOREIGN KEY</td><td class="px-3 py-2">Lien entre tables, référençant une PRIMARY KEY</td></tr>
                    <tr><td class="px-3 py-2 font-mono text-xs">CHECK</td><td class="px-3 py-2">Condition personnalisée pour valider les données</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
            <p class="text-xs text-gray-500 mt-4 text-center">✨ Ces contraintes préservent l'intégrité de votre base de données et évitent les anomalies.</p>
          </div>
        `
      }
    ];
    
    let currentSlideIndex = 0;
    const totalSlides = slides.length;
    
    // Fonction pour afficher le slide courant
    function renderSlide() {
      const slideData = slides[currentSlideIndex];
      let htmlContent = '';
      
      // En fonction du type on peut ajouter une classe spécifique, mais on utilise directement le contenu
      // On ajoute aussi une classe pour le fade
      htmlContent = `<div class="slide-container fadeIn w-full">${slideData.content}</div>`;
      
      $('#slides-wrapper').html(htmlContent);
      $('#slideCounter').text(`Slide ${currentSlideIndex+1} / ${totalSlides}`);
      
      // Mise à jour des indicateurs (dots)
      let dotsHtml = '';
      for (let i = 0; i < totalSlides; i++) {
        const activeClass = i === currentSlideIndex ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
        dotsHtml += `<button class="dot-indicator h-2 rounded-full transition-all ${activeClass} mx-1 hover:bg-indigo-400" data-index="${i}"></button>`;
      }
      $('#dotsIndicator').html(dotsHtml);
      
      // Re-attacher événement aux dots
      $('.dot-indicator').on('click', function() {
        const idx = parseInt($(this).data('index'));
        if (!isNaN(idx) && idx !== currentSlideIndex && idx >=0 && idx < totalSlides) {
          currentSlideIndex = idx;
          renderSlide();
        }
      });
      
      // Scroll en haut de la zone slide (pour mobile)
      $('.slide-container').parent().scrollTop(0);
      // Forcer MathJax à relire si jamais des formules apparaissent (pas nécessaire ici mais au cas où)
      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }
    
    // Navigation
    $('#prevSlide').on('click', function() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        renderSlide();
      } else {
        // feedback visuel (léger shake optionnel)
        $('#prevSlide').addClass('scale-95').delay(100).queue(function(next){ $(this).removeClass('scale-95'); next(); });
      }
    });
    
    $('#nextSlide').on('click', function() {
      if (currentSlideIndex < totalSlides - 1) {
        currentSlideIndex++;
        renderSlide();
      } else {
        $('#nextSlide').addClass('scale-95').delay(100).queue(function(next){ $(this).removeClass('scale-95'); next(); });
        // Optionnel: message de fin de cours
        if(currentSlideIndex === totalSlides-1){
          // petite notification non intrusive
          const msg = $('<div class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-indigo-800 text-white px-4 py-2 rounded-full text-sm shadow-lg z-50">🏁 Fin de la leçon — Félicitations ! 🎉</div>');
          $('body').append(msg);
          setTimeout(()=> msg.fadeOut(500, function(){ $(this).remove(); }), 2000);
        }
      }
    });
    
    // Gestion clavier pour l'accessibilité (flèches)
    $(document).on('keydown', function(e) {
      if (e.key === 'ArrowLeft') {
        $('#prevSlide').trigger('click');
      } else if (e.key === 'ArrowRight') {
        $('#nextSlide').trigger('click');
      }
    });
    
    // Initialisation
    renderSlide();
    
    // Ajout d'un petit effet de transition CSS personnalisé
    $('<style>.fadeIn { animation: fadeSlide 0.3s ease-out; } @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }</style>').appendTo('head');
    
    // Ajustement pour tailles mobiles (rien de plus, Tailwind gère déjà)
  </script>
</body>
</html>
