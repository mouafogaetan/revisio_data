<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 12 : Trier les données avec ORDER BY | Cours SQL</title>
  <!-- Tailwind CSS + Font Awesome (icônes utiles) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Configuration Tailwind pour un thème doux et lisible -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0f3b2c',
            secondary: '#e9f5ef',
            accent: '#2c7a5e',
            lightbg: '#fefcf5'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Google Fonts pour meilleure lisibilité -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- jQuery et MathJax (si besoin, mais ici pas de grosses formules mathématiques complexes, mais on l'inclut par précaution) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions douces pour slides */
    .slide-container {
      transition: all 0.2s ease;
    }
    body {
      background: #f7f9fc;
    }
    /* style personnalisé pour les puces et notes */
    .card-shadow {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .btn-nav {
      transition: all 0.2s;
    }
    .btn-nav:hover {
      transform: scale(1.02);
    }
    code, pre {
      background-color: #1e2a2f;
      color: #e2e8f0;
      border-radius: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .sql-example {
      background: #1e293b;
      border-left: 4px solid #2c7a5e;
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur principal slides -->
    <div id="slides-wrapper" class="relative">
      <!-- slides dynamiques insérés via jQuery, mais on génère en HTML statique pour les 3 slides (titre, objectifs, contenu) -->
      <!-- Nous allons construire une structure de slides personnalisée avec contrôles -->
    </div>

    <!-- Navigation et indicateur de slide -->
    <div class="flex justify-between items-center mt-8 bg-white/70 backdrop-blur-sm rounded-full p-2 shadow-md border border-gray-100 max-w-md mx-auto">
      <button id="prevSlide" class="bg-primary hover:bg-accent text-white font-bold py-2 px-5 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed btn-nav" aria-label="Précédent">◀ Précédent</button>
      <span id="slideCounter" class="text-sm font-medium text-gray-700 bg-gray-100 px-4 py-1 rounded-full">Slide 1 / 3</span>
      <button id="nextSlide" class="bg-primary hover:bg-accent text-white font-bold py-2 px-5 rounded-full transition btn-nav" aria-label="Suivant">Suivant ▶</button>
    </div>
  </div>

  <script>
    // Définition des slides (contenu complet)
    // Slide 1 : Titre de la leçon
    // Slide 2 : Objectifs d'apprentissage
    // Slide 3+ : Contenu de la leçon (explications, exemples, astuces)
    const slidesData = [
      { // Slide 0 : Titre
        type: 'title',
        content: `
          <div class="text-center py-6 md:py-12">
            <div class="inline-block px-5 py-1 rounded-full bg-secondary text-primary text-sm font-semibold tracking-wide mb-4">📚 Initiation aux bases de données</div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-primary mb-4 leading-tight">Trier les données<br>avec <span class="bg-secondary px-3 py-1 rounded-xl">ORDER BY</span></h1>
            <p class="text-lg text-gray-700 max-w-2xl mx-auto mt-4">Maîtriser le tri ascendant, descendant et les combinaisons avec WHERE et LIMIT</p>
            <div class="mt-8 flex justify-center gap-3 text-sm text-gray-500">
              <span class="flex items-center gap-1">🎓 Niveau : Débutant/Intermédiaire</span>
              <span class="flex items-center gap-1">⏱️ Durée : 25 min</span>
            </div>
          </div>
        `
      },
      { // Slide 1 : Objectifs pédagogiques
        type: 'objectives',
        content: `
          <div class="bg-white rounded-2xl card-shadow p-6 md:p-8 border border-gray-100">
            <div class="flex items-center gap-3 mb-5">
              <div class="bg-primary/10 p-3 rounded-full"><svg class="w-7 h-7 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
              <h2 class="text-2xl md:text-3xl font-bold text-primary">Objectifs d'apprentissage</h2>
            </div>
            <ul class="space-y-4 text-lg text-gray-800">
              <li class="flex items-start gap-3"><span class="text-accent font-bold text-xl">✓</span> <span><strong>Trier</strong> par une ou plusieurs colonnes avec ORDER BY.</span></li>
              <li class="flex items-start gap-3"><span class="text-accent font-bold text-xl">✓</span> <span>Utiliser <code class="bg-gray-100 px-2 py-0.5 rounded text-sm">ASC</code> (ascendant) et <code class="bg-gray-100 px-2 py-0.5 rounded text-sm">DESC</code> (descendant).</span></li>
              <li class="flex items-start gap-3"><span class="text-accent font-bold text-xl">✓</span> <span>Combiner <code class="bg-gray-100 px-2 py-0.5 rounded text-sm">ORDER BY</code> avec <code class="bg-gray-100 px-2 py-0.5 rounded text-sm">WHERE</code> et <code class="bg-gray-100 px-2 py-0.5 rounded text-sm">LIMIT</code> pour des requêtes puissantes.</span></li>
              <li class="flex items-start gap-3"><span class="text-accent font-bold text-xl">✓</span> <span>Comprendre l'importance de l'ordre d'évaluation des clauses SQL.</span></li>
            </ul>
            <div class="mt-6 p-4 bg-secondary/40 rounded-xl text-sm text-gray-700">
              💡 <span class="font-semibold">Pourquoi trier ?</span> Les données brutes sont souvent désordonnées. ORDER BY permet de présenter les résultats du plus récent au plus ancien, par ordre alphabétique, par prix croissant, etc.
            </div>
          </div>
        `
      },
      { // Slide 2 : contenu détaillé partie 1 - Syntaxe de base et tri simple
        type: 'content',
        content: `
          <div class="bg-white rounded-2xl card-shadow p-6 md:p-8">
            <h2 class="text-2xl font-bold text-primary border-l-4 border-accent pl-4 mb-5">📌 ORDER BY : ordonner vos résultats</h2>
            <p class="text-gray-700 mb-4">La clause <code class="bg-gray-100 text-primary px-1.5 rounded">ORDER BY</code> est utilisée pour trier les lignes selon une ou plusieurs colonnes. Par défaut, le tri est <span class="font-semibold">ascendant (ASC)</span>.</p>
            <div class="bg-slate-800 text-gray-100 p-4 rounded-xl overflow-x-auto my-5">
              <pre class="text-sm"><code>SELECT colonne1, colonne2 FROM table ORDER BY colonne1 [ASC|DESC];</code></pre>
            </div>
            <div class="grid md:grid-cols-2 gap-6 mt-4">
              <div class="border border-gray-200 rounded-xl p-4 bg-gray-50">
                <p class="font-semibold text-primary flex items-center gap-1">📈 Tri ascendant (de A à Z, du plus petit au plus grand)</p>
                <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm mt-2 overflow-x-auto"><code>SELECT nom, prix FROM produits ORDER BY prix ASC;</code></pre>
                <p class="text-sm text-gray-600 mt-2">→ Les produits du moins cher au plus cher.</p>
              </div>
              <div class="border border-gray-200 rounded-xl p-4 bg-gray-50">
                <p class="font-semibold text-primary flex items-center gap-1">📉 Tri descendant (de Z à A, du plus grand au plus petit)</p>
                <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm mt-2 overflow-x-auto"><code>SELECT nom, date_vente FROM commandes ORDER BY date_vente DESC;</code></pre>
                <p class="text-sm text-gray-600 mt-2">→ Les commandes les plus récentes en premier.</p>
              </div>
            </div>
            <div class="mt-5 p-3 bg-yellow-50 border-l-4 border-yellow-400 rounded">
              <p class="text-sm">⚠️ <strong>ASTUCE :</strong> Si vous n'indiquez ni ASC ni DESC, SQL trie automatiquement en ordre ASC (croissant). Pensez à DESC pour les classements inverses.</p>
            </div>
          </div>
        `
      },
      { // Slide 3 : tri sur plusieurs colonnes + combos avec WHERE
        type: 'content',
        content: `
          <div class="bg-white rounded-2xl card-shadow p-6 md:p-8">
            <h2 class="text-2xl font-bold text-primary border-l-4 border-accent pl-4 mb-5">🎯 Trier sur plusieurs colonnes</h2>
            <p class="text-gray-700">On peut spécifier plusieurs critères. Le tri s’effectue d’abord sur la première colonne, puis sur la seconde en cas d’égalité.</p>
            <div class="bg-slate-800 text-gray-100 p-4 rounded-xl overflow-x-auto my-5">
              <pre><code>SELECT nom, ville, age FROM clients ORDER BY ville ASC, age DESC;</code></pre>
            </div>
            <p class="text-gray-700">💡 <strong>Explication :</strong> Tous les clients sont d'abord regroupés par ville (ordre alphabétique). À l'intérieur de chaque ville, les plus âgés apparaissent en premier (age DESC).</p>
            
            <h3 class="text-xl font-semibold mt-8 text-primary">🔁 Combiner ORDER BY avec WHERE et LIMIT</h3>
            <p class="mb-2">L'ordre des clauses en SQL est important : <code class="bg-gray-100 px-1">WHERE</code> filtre → <code class="bg-gray-100 px-1">ORDER BY</code> trie → <code class="bg-gray-100 px-1">LIMIT</code> restreint le nombre de lignes.</p>
            <div class="sql-example p-4 rounded-xl text-white text-sm overflow-x-auto my-4">
              <pre><code>SELECT produit, prix, categorie
FROM stock
WHERE categorie = 'Electronique'
ORDER BY prix DESC
LIMIT 5;</code></pre>
            </div>
            <p class="text-gray-600">✨ Résultat : les 5 produits électroniques les plus chers. Parfait pour des tops produits ou des dashboards.</p>
          </div>
        `
      },
      { // Slide 4 : exemples pratiques et cas d'usage
        type: 'content',
        content: `
          <div class="bg-white rounded-2xl card-shadow p-6 md:p-8">
            <h2 class="text-2xl font-bold text-primary border-l-4 border-accent pl-4 mb-5">🧪 Exemples concrets de tri</h2>
            <div class="space-y-6">
              <div>
                <p class="font-semibold text-lg">📦 1. Classer les étudiants par notes décroissantes</p>
                <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm mt-1 overflow-auto"><code>SELECT nom, note FROM etudiants ORDER BY note DESC;</code></pre>
              </div>
              <div>
                <p class="font-semibold text-lg">📅 2. Articles du plus récent au plus ancien, limités aux 10 derniers</p>
                <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm mt-1 overflow-auto"><code>SELECT titre, date_publication FROM blog ORDER BY date_publication DESC LIMIT 10;</code></pre>
              </div>
              <div>
                <p class="font-semibold text-lg">📝 3. Trier par ordre alphabétique et en cas de même nom, tri par âge croissant</p>
                <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm mt-1 overflow-auto"><code>SELECT nom, prenom, age FROM users ORDER BY nom ASC, age ASC;</code></pre>
              </div>
            </div>
            <!-- Petit dessin SVG pour illustrer le tri visuel -->
            <div class="mt-8 flex justify-center">
              <svg width="280" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg" class="border rounded-xl p-2 bg-secondary/20">
                <rect x="10" y="20" width="40" height="20" fill="#2c7a5e" rx="4" />
                <text x="18" y="35" fill="white" font-size="10">10€</text>
                <rect x="60" y="40" width="40" height="20" fill="#1f5e48" rx="4" />
                <text x="68" y="55" fill="white" font-size="10">25€</text>
                <rect x="110" y="10" width="40" height="20" fill="#3c9c7a" rx="4" />
                <text x="118" y="25" fill="white" font-size="10">5€</text>
                <text x="170" y="35" class="text-gray-700 text-sm font-medium">→ Tri ASC (prix)</text>
                <path d="M220 30 L240 30 L235 25 M240 30 L235 35" stroke="#2c7a5e" stroke-width="2" fill="none"/>
                <rect x="250" y="10" width="40" height="20" fill="#3c9c7a" rx="4" />
                <rect x="250" y="36" width="40" height="20" fill="#2c7a5e" rx="4" />
                <rect x="250" y="62" width="40" height="20" fill="#1f5e48" rx="4" />
                <text x="256" y="25" fill="white" font-size="9">5€</text>
                <text x="256" y="51" fill="white" font-size="9">10€</text>
                <text x="256" y="76" fill="white" font-size="9">25€</text>
              </svg>
            </div>
            <p class="text-center text-sm text-gray-500 mt-2">Illustration visuelle du tri par prix croissant</p>
          </div>
        `
      },
      { // Slide 5 : pièges à éviter & bonnes pratiques
        type: 'content',
        content: `
          <div class="bg-white rounded-2xl card-shadow p-6 md:p-8">
            <h2 class="text-2xl font-bold text-primary border-l-4 border-accent pl-4 mb-5">⚠️ Pièges fréquents avec ORDER BY</h2>
            <ul class="list-disc pl-5 space-y-2 text-gray-700">
              <li>🔸 <strong>Ordre des clauses :</strong> WHERE avant ORDER BY, jamais l'inverse. ORDER BY doit être placé après WHERE et avant LIMIT.</li>
              <li>🔸 <strong>Colonnes avec valeurs NULL :</strong> Par défaut, dans la plupart des SGBD, les NULL sont traités comme les plus petites valeurs (comportement peut varier selon le système).</li>
              <li>🔸 <strong>Utiliser ORDER BY sur des colonnes non sélectionnées</strong> : C’est tout à fait possible ! On peut trier par une colonne qui n’apparaît pas dans le SELECT.</li>
              <li>🔸 <strong>Combinaison avec DISTINCT :</strong> Le tri est appliqué après suppression des doublons, donc attention aux résultats inattendus.</li>
            </ul>
            <div class="mt-6 bg-blue-50 p-4 rounded-xl border border-blue-200">
              <p class="font-semibold text-blue-800">✅ Bonne pratique :</p>
              <p class="text-gray-700">Pour faciliter la lecture des rapports, utilisez toujours ORDER BY avec des colonnes significatives. Dans le cadre d’une pagination, ORDER BY + LIMIT + OFFSET est essentiel.</p>
            </div>
          </div>
        `
      }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    // Fonction pour mettre à jour l'affichage du slide
    function renderSlide(index) {
      const slide = slidesData[index];
      if (!slide) return;
      let htmlContent = `<div class="slide-container bg-lightbg rounded-3xl shadow-xl p-4 md:p-6 transition-all duration-300">${slide.content}</div>`;
      $('#slides-wrapper').html(htmlContent);
      $('#slideCounter').text(`Slide ${index+1} / ${totalSlides}`);
      
      // Désactiver boutons selon la position
      if (index === 0) {
        $('#prevSlide').prop('disabled', true);
      } else {
        $('#prevSlide').prop('disabled', false);
      }
      if (index === totalSlides - 1) {
        $('#nextSlide').prop('disabled', true);
      } else {
        $('#nextSlide').prop('disabled', false);
      }
      
      // Recharger MathJax si besoin de formules (aucune formule complexe mais par sécurité)
      if (window.MathJax) {
        MathJax.typesetPromise && MathJax.typesetPromise();
      }
    }

    // navigation
    $('#prevSlide').on('click', function() {
      if (currentIndex > 0) {
        currentIndex--;
        renderSlide(currentIndex);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
    $('#nextSlide').on('click', function() {
      if (currentIndex < totalSlides - 1) {
        currentIndex++;
        renderSlide(currentIndex);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // Initialisation avec le premier slide
    renderSlide(0);

    // Ajout gestion clavier (flèches droite/gauche)
    $(document).on('keydown', function(e) {
      if (e.key === 'ArrowLeft') {
        $('#prevSlide').click();
      } else if (e.key === 'ArrowRight') {
        $('#nextSlide').click();
      }
    });

    // Petite info console pour indiquer que tout est prêt
    console.log("📘 Leçon 12 - ORDER BY prête ! Bon apprentissage.");
  </script>
  <!-- Pied de page discret -->
  <footer class="text-center text-gray-400 text-xs py-8 border-t border-gray-200 mt-8 max-w-5xl mx-auto">
    Cours d'initiation aux bases de données — Développement Web — Enseignant au Cameroun 🇨🇲 | Trier avec SQL ORDER BY
  </footer>
</body>
</html>
