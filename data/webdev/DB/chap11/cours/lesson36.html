<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 36 : Projet final - Implémentation complète d'une base de données | Cours BD WebDev</title>
    <!-- Tailwind CSS + Google Fonts + Font Awesome (pour icônes légères) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, mais on le garde) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Transition fluide entre slides et styles personnalisés pour lisibilité */
        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .slide-container {
            max-width: 1280px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        .slide-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .nav-btn:hover:not(:disabled) {
            background: #2c3e66;
            color: white;
            transform: scale(1.02);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 999px;
        }
        .progress-fill {
            background: #2c5f8a;
            border-radius: 999px;
            transition: width 0.3s ease;
        }
        h1, h2, h3 {
            letter-spacing: -0.01em;
        }
        .objectif-badge {
            background: #eef2ff;
            color: #1e3a8a;
            border-left: 4px solid #3b82f6;
        }
        .code-snippet {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            .code-snippet {
                font-size: 0.75rem;
            }
        }
        .table-simple td {
            padding: 0.5rem;
            border-bottom: 1px solid #cbd5e1;
        }
    </style>
</head>
<body class="antialiased">

    <div class="slide-container px-3 md:px-6 py-6 md:py-10">
        <!-- Carte slide principale -->
        <div class="slide-card p-5 md:p-8 relative">
            <!-- Indicateur de progression + compteur -->
            <div class="flex justify-between items-center text-sm text-gray-500 mb-3 flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <span class="font-medium">📘 Base de données</span>
                    <span class="hidden sm:inline">•</span>
                    <span>Projet complet – Leçon 36/36</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="slideCounter">Slide 1 / 7</span>
                    <div class="w-28 progress-bar h-1.5">
                        <div id="progressFill" class="progress-fill h-1.5" style="width: 14%"></div>
                    </div>
                </div>
            </div>

            <!-- Contenu dynamique des slides -->
            <div id="slidesContent">
                <!-- le contenu sera injecté par jQuery -->
            </div>

            <!-- Navigation + boutons -->
            <div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-200">
                <button id="prevSlide" class="nav-btn py-2 px-5 rounded-full font-medium flex items-center gap-1 disabled:opacity-40" disabled>
                    ◀ Précédent
                </button>
                <div class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full hidden md:block">
                    ✨ Projet final : conception → optimisation
                </div>
                <button id="nextSlide" class="nav-btn py-2 px-5 rounded-full font-medium flex items-center gap-1">
                    Suivant ▶
                </button>
            </div>
        </div>
        <!-- Petit pied de page -->
        <div class="text-center text-xs text-gray-400 mt-6">
            Cours d'initiation aux bases de données — Classe Développement Web (Cameroun) — 2026
        </div>
    </div>

    <script>
        // Structure des slides pour la leçon 36 "Concevoir et implémenter une base de données complète"
        // Objectifs combinés dans slide 2, puis les étapes pratiques.
        const slidesData = [
            { // slide 0: titre principal
                type: "title",
                title: "Projet complet : Créer une base de données de A à Z",
                subtitle: "Leçon 36 · Compétence finale",
                description: "Mettez en pratique toutes vos compétences : conception, création, données, requêtes avancées et optimisation.",
                icon: "🚀"
            },
            { // slide 1: objectifs d'apprentissage
                type: "objectifs",
                title: "🎯 Objectifs de cette leçon",
                objectives: [
                    "✅ Choisir un domaine concret (bibliothèque, e‑commerce, gestion de personnel) et modéliser les besoins.",
                    "✅ Créer le diagramme entité-association (DER) à partir des règles de gestion.",
                    "✅ Normaliser les données (3NF) et définir les contraintes (clés primaires/étrangères).",
                    "✅ Implémenter le modèle physique avec SQL (CREATE TABLE, relations).",
                    "✅ Insérer des données de test réalistes.",
                    "✅ Écrire des requêtes complexes (jointures, sous‑requêtes, agrégations).",
                    "✅ Ajouter des index, vues et procédures stockées pour performance & automatisation.",
                    "✅ Présenter et justifier les choix techniques."
                ]
            },
            { // slide 2: Étape 1 - Choix du domaine & Modélisation
                type: "step",
                title: "📌 1. Choisir un domaine & Analyser les besoins",
                content: `<p class="mb-3">Prenons l’exemple d’une <span class="font-semibold text-indigo-700">petite bibliothèque municipale</span>. Règles de gestion :</p>
                <ul class="list-disc list-inside space-y-1 mb-4 text-gray-700">
                    <li>Un <strong>livre</strong> possède un titre, un ISBN, un nombre d’exemplaires, un éditeur.</li>
                    <li>Un <strong>auteur</strong> a un nom, prénom, nationalité.</li>
                    <li>Un livre peut avoir plusieurs auteurs (relation many-to-many).</li>
                    <li>Un <strong>membre</strong> peut emprunter plusieurs livres, mais un emprunt concerne un seul livre à la fois.</li>
                    <li>On souhaite garder trace des dates d’emprunt et de retour.</li>
                </ul>
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 mt-2">
                    <span class="font-semibold">🧠 Diagramme Entité-Association (DER) simplifié :</span>
                    <div class="mt-2 overflow-x-auto text-sm">
                        <svg width="100%" height="140" viewBox="0 0 700 130" class="max-w-full" xmlns="http://www.w3.org/2000/svg">
                            <rect x="20" y="10" width="90" height="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" rx="8"/>
                            <text x="38" y="35" fill="#1E3A8A" font-size="12">📖 LIVRE</text>
                            <rect x="180" y="10" width="100" height="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" rx="8"/>
                            <text x="198" y="35" fill="#1E3A8A" font-size="12">✍️ AUTEUR</text>
                            <rect x="360" y="10" width="110" height="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" rx="8"/>
                            <text x="380" y="35" fill="#1E3A8A" font-size="12">👤 MEMBRE</text>
                            <rect x="540" y="10" width="110" height="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" rx="8"/>
                            <text x="560" y="35" fill="#1E3A8A" font-size="12">📅 EMPRUNT</text>
                            <path d="M110 30 L175 30" stroke="#059669" stroke-width="2" stroke-dasharray="5,3" />
                            <text x="125" y="20" fill="#047857" font-size="10">*—*</text>
                            <path d="M280 30 L355 30" stroke="#059669" stroke-width="2" stroke-dasharray="5,3" />
                            <path d="M470 30 L535 30" stroke="#059669" stroke-width="2" />
                            <text x="495" y="22" fill="#047857" font-size="10">0,n</text>
                            <text x="410" y="55" fill="#4B5563" font-size="10">1,1</text>
                            <rect x="20" y="80" width="90" height="35" fill="#FEF3C7" stroke="#D97706" stroke-width="1" rx="6"/>
                            <text x="30" y="102" fill="#92400E" font-size="10">écrit par</text>
                            <rect x="180" y="80" width="100" height="35" fill="#FEF3C7" stroke="#D97706" stroke-width="1" rx="6"/>
                            <text x="200" y="102" fill="#92400E" font-size="10">(table liaison)</text>
                        </svg>
                    </div>
                    <p class="text-xs text-gray-600 mt-2">Identifions les entités : LIVRE, AUTEUR, MEMBRE, EMPRUNT + table de liaison LIVRE_AUTEUR.</p>
                </div>`
            },
            { // slide 3: Normalisation et passage au modèle relationnel (clés, contraintes)
                type: "step",
                title: "⚙️ 2. Modèle relationnel & Normalisation (3NF)",
                content: `<div><p class="mb-3">À partir du DER, on transforme en tables avec clés primaires/étrangères. Respect de la 3NF pour éviter redondances.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div class="bg-gray-50 rounded-lg p-3">
                        <span class="font-bold text-indigo-800">📚 Table Livre</span>
                        <pre class="code-snippet p-2 mt-1 text-xs">id_livre (PK) INT
titre VARCHAR(100)
isbn VARCHAR(13)
nb_exemplaires INT
editeur VARCHAR(60)</pre>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <span class="font-bold text-indigo-800">✍️ Table Auteur</span>
                        <pre class="code-snippet p-2 mt-1">id_auteur (PK) INT
nom VARCHAR(50)
prenom VARCHAR(50)
nationalite VARCHAR(40)</pre>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <span class="font-bold text-indigo-800">🔗 Livre_Auteur (association)</span>
                        <pre class="code-snippet p-2 mt-1">id_livre (FK) INT
id_auteur (FK) INT
PRIMARY KEY (id_livre, id_auteur)</pre>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <span class="font-bold text-indigo-800">👥 Membre & 📅 Emprunt</span>
                        <pre class="code-snippet p-2 mt-1">Membre(id_membre PK, nom, prenom, email)
Emprunt(id_emprunt PK, date_emprunt, date_retour,
        id_membre FK, id_livre FK)</pre>
                    </div>
                </div>
                <div class="mt-3 text-green-800 bg-green-50 p-3 rounded-lg">
                    💡 Normalisation : Chaque attribut dépend de la clé (pas de dépendances partielles ou transitives).
                </div></div>`
            },
            { // slide 4: Implémentation SQL + insertion données tests
                type: "step",
                title: "🛠️ 3. Création des tables et Insertion de données tests",
                content: `<div>
                <p class="mb-2">Exemple de script SQL (DDL + DML) pour la bibliothèque :</p>
                <pre class="code-snippet p-3 text-sm overflow-auto">
-- Création des tables
CREATE TABLE Livre (
    id_livre INT PRIMARY KEY AUTO_INCREMENT,
    titre VARCHAR(100) NOT NULL,
    isbn VARCHAR(13) UNIQUE,
    nb_exemplaires INT DEFAULT 1,
    editeur VARCHAR(60)
);

CREATE TABLE Membre (
    id_membre INT PRIMARY KEY AUTO_INCREMENT,
    nom VARCHAR(50) NOT NULL,
    prenom VARCHAR(50),
    email VARCHAR(100) UNIQUE
);

-- Table d'emprunt avec clés étrangères
CREATE TABLE Emprunt (
    id_emprunt INT PRIMARY KEY AUTO_INCREMENT,
    date_emprunt DATE NOT NULL,
    date_retour DATE,
    id_membre INT,
    id_livre INT,
    FOREIGN KEY (id_membre) REFERENCES Membre(id_membre),
    FOREIGN KEY (id_livre) REFERENCES Livre(id_livre)
);

-- Insertion de jeux de tests
INSERT INTO Livre (titre, isbn, nb_exemplaires, editeur) VALUES
('Leçons de SQL', '978-2-123-45678-9', 3, 'TechniquePlus'),
('NoSQL pour les nuls', '978-1-23456-789-0', 2, 'DataPress');

INSERT INTO Membre (nom, prenom, email) VALUES
('Mbarga', 'Claire', 'claire.mbarga@example.cm'),
('Ndi', 'Ibrahim', 'ibrahim.ndi@webmail.cm');</pre>
                <div class="bg-amber-50 mt-3 p-2 rounded-md text-amber-800 text-sm">
                    ✅ Astuce : Toujours utiliser des transactions ou des contraintes pour garder l'intégrité.
                </div>
                </div>`
            },
            { // slide 5: Requêtes complexes (jointures, agrégations, sous-requêtes)
                type: "step",
                title: "🔎 4. Requêtes complexes : Extraire la valeur des données",
                content: `<div class="space-y-4">
                <div><span class="font-bold">📌 Jointure : Livres empruntés avec noms des membres</span>
                <pre class="code-snippet p-2 text-xs">SELECT M.nom, M.prenom, L.titre, E.date_emprunt
FROM Emprunt E
JOIN Membre M ON E.id_membre = M.id_membre
JOIN Livre L ON E.id_livre = L.id_livre
WHERE E.date_retour IS NULL;</pre></div>
                <div><span class="font-bold">📌 Agrégation + GROUP BY : Nombre de livres par éditeur</span>
                <pre class="code-snippet p-2 text-xs">SELECT editeur, COUNT(*) AS total_livres
FROM Livre GROUP BY editeur ORDER BY total_livres DESC;</pre></div>
                <div><span class="font-bold">📌 Sous‑requête : Membres qui n'ont jamais emprunté</span>
                <pre class="code-snippet p-2 text-xs">SELECT * FROM Membre 
WHERE id_membre NOT IN (SELECT DISTINCT id_membre FROM Emprunt);</pre></div>
                <div class="bg-indigo-50 p-3 rounded-lg text-sm">
                ✨ Exemple métier : "Quel est le livre le plus emprunté ?" – jointure + COUNT + LIMIT.
                </div>
                </div>`
            },
            { // slide 6: Optimisation (index, vues, procédures)
                type: "step",
                title: "⚡ 5. Optimisation & Automatisation (Index, Vues, Procédures)",
                content: `<div class="space-y-3">
                <div class="flex flex-wrap gap-2 items-start">
                    <div class="bg-white border p-3 rounded-xl w-full md:w-5/12">
                        <h4 class="font-semibold">🔍 Index pour accélérer</h4>
                        <pre class="code-snippet p-2 text-xs mt-1">CREATE INDEX idx_emprunt_dates ON Emprunt(date_emprunt);
CREATE INDEX idx_livre_titre ON Livre(titre);</pre>
                        <p class="text-xs text-gray-600 mt-1">Améliore les recherches WHERE et ORDER BY.</p>
                    </div>
                    <div class="bg-white border p-3 rounded-xl w-full md:w-5/12">
                        <h4 class="font-semibold">👁️ Vue simplifiée : Emprunts actifs</h4>
                        <pre class="code-snippet p-2 text-xs">CREATE VIEW v_emprunts_actifs AS
SELECT M.nom, L.titre, E.date_emprunt
FROM Emprunt E JOIN Membre M JOIN Livre L
WHERE E.date_retour IS NULL;</pre>
                    </div>
                </div>
                <div class="bg-gradient-to-r from-slate-800 to-slate-700 text-white p-3 rounded-xl">
                    <p class="font-mono text-sm">📦 Procédure stockée : enregistrer un emprunt avec contrôle d'exemplaires</p>
                    <pre class="text-xs mt-1 bg-black/30 p-2 rounded">CREATE PROCEDURE NouvelEmprunt(p_membre INT, p_livre INT, p_date DATE)
BEGIN
   INSERT INTO Emprunt(date_emprunt, id_membre, id_livre) VALUES(p_date, p_membre, p_livre);
   UPDATE Livre SET nb_exemplaires = nb_exemplaires - 1 WHERE id_livre = p_livre AND nb_exemplaires > 0;
END;</pre>
                </div>
                </div>`
            },
            { // slide 7: Présentation finale et livrables
                type: "conclusion",
                title: "🎓 6. Présentation du projet & Bonnes pratiques",
                content: `<div class="space-y-4">
                <p>Pour votre projet final, vous devez présenter :</p>
                <ul class="list-disc pl-5 space-y-1">
                    <li><strong>Diagramme entité-association</strong> (papier ou digital) justifiant les choix.</li>
                    <li><strong>Script SQL complet</strong> : création tables, contraintes, inserts de données pertinentes.</li>
                    <li><strong>Au moins 5 requêtes SQL complexes</strong> (jointures, agrégations, sous‑requêtes) avec analyse.</li>
                    <li><strong>Optimisations</strong> : un index pertinent, une vue et une procédure stockée.</li>
                    <li><strong>Documentation</strong> expliquant la démarche et les réponses aux cas d’usage.</li>
                </ul>
                <div class="flex flex-col sm:flex-row gap-3 mt-4">
                    <div class="bg-green-100 p-3 rounded-xl text-green-800"><span class="font-bold">💪 Challenge individuel :</span> Choisissez un autre domaine (ventes, gestion de stock) et répétez le processus !</div>
                </div>
                <div class="text-center text-blue-800 font-medium bg-blue-50 p-3 rounded-xl">✨ Félicitations ! Vous maîtrisez le cycle de vie complet d'une base de données relationnelle.</div>
                </div>`
            }
        ];

        let currentIndex = 0;
        const totalSlides = slidesData.length;

        function renderSlide(index) {
            const slide = slidesData[index];
            let html = '';
            if (slide.type === 'title') {
                html = `
                <div class="text-center py-6 md:py-10">
                    <div class="text-6xl mb-4">${slide.icon || '📀'}</div>
                    <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-sky-700 bg-clip-text text-transparent">${slide.title}</h1>
                    <p class="text-xl text-gray-600 mt-3">${slide.subtitle}</p>
                    <p class="text-gray-500 max-w-2xl mx-auto mt-4">${slide.description}</p>
                    <div class="mt-8 inline-flex items-center gap-2 bg-gray-100 px-5 py-2 rounded-full text-sm">📘 Compétence visée : Concevoir et implémenter une base de données complète</div>
                </div>
                `;
            } else if (slide.type === 'objectifs') {
                html = `<div><h2 class="text-2xl md:text-3xl font-bold text-indigo-900 border-l-8 border-indigo-500 pl-4 mb-6">${slide.title}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                slide.object objectives?.forEach(obj => {
                    html += `<div class="objectif-badge p-3 rounded-xl flex items-start gap-2"><span class="text-green-600 text-lg">✓</span><span class="text-gray-800">${obj}</span></div>`;
                });
                html += `</div></div>`;
            } else if (slide.type === 'step' || slide.type === 'conclusion') {
                html = `<div><h2 class="text-2xl md:text-3xl font-bold text-indigo-900 border-l-8 border-indigo-500 pl-4 mb-5">${slide.title}</h2>
                <div class="prose prose-slate max-w-none">${slide.content}</div></div>`;
            } else {
                // fallback
                html = `<div><h2>${slide.title}</h2><div>${slide.content || ''}</div></div>`;
            }

            $('#slidesContent').fadeOut(150, function() {
                $(this).html(html).fadeIn(200);
            });

            // Update compteur & progression
            $('#slideCounter').text(`Slide ${index+1} / ${totalSlides}`);
            const progressPercent = ((index) / (totalSlides - 1)) * 100;
            $('#progressFill').css('width', `${progressPercent}%`);

            // Gérer les boutons prev/next
            $('#prevSlide').prop('disabled', index === 0);
            $('#nextSlide').prop('disabled', index === totalSlides-1);
            if (index === totalSlides-1) {
                $('#nextSlide').html('🏁 Terminer');
            } else {
                $('#nextSlide').html('Suivant ▶');
            }
        }

        // Navigation events
        $('#nextSlide').on('click', function() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                renderSlide(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        $('#prevSlide').on('click', function() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // keyboard navigation (gauche/droite)
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                $('#nextSlide').click();
            } else if (e.key === 'ArrowLeft') {
                $('#prevSlide').click();
            }
        });

        // initialisation
        renderSlide(0);
    </script>
</body>
</html>
