<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours CSS : Positionnement avancé (static, relative, absolute, fixed, sticky)</title>
    <!-- Tailwind CSS via CDN + base responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, mais inclus pour d'éventuels besoins) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Douceur supplémentaire pour la navigation swipe? Non requis mais pour le confort */
        body {
            background: #f7f9fc;
        }
        .slide-container {
            transition: all 0.2s ease;
        }
        .btn-nav {
            transition: background 0.2s, transform 0.1s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
        /* corrections pour le contenu débordant et lisibilité */
        pre {
            white-space: pre-wrap;
            word-break: break-word;
        }
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.75rem;
                padding: 0.75rem;
            }
        }
        /* personnalisation des puces objectifs */
        .objective-list li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .objective-list li::before {
            content: "🎯";
            font-size: 1rem;
            display: inline-block;
            min-width: 1.5rem;
        }
        .slide-card {
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-3 sm:px-6 py-6 md:py-10">
        <!-- header avec progression simple -->
        <div class="flex justify-between items-center mb-4 text-sm text-gray-500 flex-wrap gap-2">
            <div class="bg-white/70 rounded-full px-3 py-1 shadow-sm">
                <span class="font-semibold">📘 Module CSS · Chapitre 5</span>
            </div>
            <div class="bg-white/70 rounded-full px-3 py-1 shadow-sm">
                <span id="slideCounter" class="font-medium">Diapositive 1 / 6</span>
            </div>
        </div>

        <!-- Conteneur principal des slides -->
        <div id="slidesWrapper" class="relative overflow-hidden">
            <div id="slidesContainer" class="slide-container flex flex-col md:flex-row md:flex-nowrap transition-all duration-300">
                <!-- Chaque slide sera injecté via jQuery -->
            </div>
        </div>

        <!-- Navigation et indicateurs -->
        <div class="flex justify-between items-center mt-8 gap-3 flex-wrap">
            <button id="prevBtn" class="btn-nav bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-medium py-2 px-5 rounded-2xl shadow-sm flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed transition">
                ⬅️ Précédent
            </button>
            <div class="flex gap-2 flex-wrap justify-center" id="dotsIndicator"></div>
            <button id="nextBtn" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-2xl shadow-md flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed transition">
                Suivant ➡️
            </button>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6 border-t pt-4">
            ✨ Utilisez les boutons ou navigation tactile — Cours sur le positionnement CSS (lesson13)
        </p>
    </div>

    <script>
        // Définition du contenu des slides (Lesson13: Comprendre le flux normal / relative, absolute, fixed, sticky, z-index)
        const slidesData = [
            {
                type: "title",
                title: "🎨 Maîtriser le positionnement CSS",
                subtitle: "static, relative, absolute, fixed, sticky · z-index · flux normal",
                badge: "Lesson 13 · Initiation au CSS"
            },
            {
                type: "objectives",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Comprendre le flux normal (static) et son rôle dans le rendu par défaut.",
                    "Utiliser les valeurs relative, absolute, fixed et sticky pour sortir du flux.",
                    "Maîtriser les propriétés top, right, bottom, left et le contexte d'empilement avec z-index."
                ]
            },
            {
                type: "content",
                title: "📌 1. Le flux normal (position: static)",
                explanation: "Par défaut, tous les éléments HTML sont en positionnement statique (<code>position: static</code>). Ils s'affichent dans l'ordre du document (flux normal). Les propriétés top/left/right/bottom n'ont aucun effet.",
                codeExample: "/* Exemple: comportement naturel */\n.div1, .div2 {\n  background: lightblue;\n  margin: 10px;\n}\n/* Aucun décalage possible avec static */",
                visual: "dessiner",
                visualDesc: "Deux blocs l'un sous l'autre (bloc A puis bloc B) – c'est le flux normal."
            },
            {
                type: "content",
                title: "📍 2. position: relative",
                explanation: "L'élément reste dans le flux normal, mais on peut le décaler par rapport à sa position initiale avec <code>top / left / right / bottom</code>. Les autres éléments ne sont pas affectés (ils conservent leur place comme si rien n'avait bougé).",
                codeExample: ".boite-relative {\n  position: relative;\n  top: 20px;\n  left: 30px;\n  background: #facc15;\n}",
                visual: "relative-drawing"
            },
            {
                type: "content",
                title: "🎈 3. position: absolute",
                explanation: "L'élément est retiré du flux normal. Il se positionne par rapport à son <strong>ancêtre le plus proche positionné</strong> (position différente de static). Si aucun ancêtre, il se cale par rapport au <body>. Il ne laisse pas d'espace vide et peut recouvrir d'autres éléments.",
                codeExample: ".parent {\n  position: relative; /* ancre */\n}\n\n.enfant-absolute {\n  position: absolute;\n  top: 0;\n  right: 0;\n  background: #4ade80;\n}",
                visual: "absolute-drawing"
            },
            {
                type: "content",
                title: "📌 4. position: fixed & sticky",
                explanation: "<strong>fixed :</strong> se cale par rapport à la fenêtre du navigateur (viewport). Reste fixe même lors du défilement. <br> <strong>sticky :</strong> hybride : agit comme relative jusqu'à un seuil de défilement, puis se fixe dans son conteneur parent.",
                codeExample: "/* fixed : toujours visible */\n#menu-fixed {\n  position: fixed;\n  bottom: 20px;\n  right: 20px;\n}\n\n/* sticky pour les en-têtes de section */\n.titre-sticky {\n  position: sticky;\n  top: 0;\n  background: white;\n}",
                visual: "sticky-fixed-demo"
            },
            {
                type: "content",
                title: "📐 5. z-index & empilement",
                explanation: "Quand plusieurs éléments positionnés se chevauchent, <code>z-index</code> définit l'ordre (plus la valeur est élevée, plus l'élément apparaît devant). Ne fonctionne que sur les éléments positionnés (relative/absolute/fixed/sticky).",
                codeExample: ".couche1 {\n  position: absolute;\n  z-index: 1;\n  background: red;\n}\n.couche2 {\n  position: absolute;\n  z-index: 10;\n  background: blue;\n} /* bleu passe devant */",
                visual: "zindex-visual"
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer un dessin SVG simple en fonction du type
        function generateDrawing(type, altText) {
            if (type === "dessiner") {
                // Flux normal: deux rectangles empilés
                return `<svg width="280" height="120" viewBox="0 0 280 120" xmlns="http://www.w3.org/2000/svg" class="mx-auto my-2 max-w-full"><rect x="20" y="10" width="100" height="40" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5" rx="6" /><text x="40" y="35" font-size="12" fill="#1e293b">Bloc A (static)</text><rect x="20" y="65" width="100" height="40" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5" rx="6" /><text x="40" y="90" font-size="12" fill="#1e293b">Bloc B (static)</text><text x="140" y="60" font-size="11" fill="#475569">Flux normal vertical</text></svg>`;
            }
            else if (type === "relative-drawing") {
                return `<svg width="300" height="130" viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg" class="mx-auto my-2"><rect x="40" y="20" width="90" height="45" fill="#facc15" stroke="#ca8a04" stroke-width="1.5" rx="5" /><text x="55" y="48" font-size="11" fill="#422006">position: relative</text><path d="M130 42 L150 25" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3" /><text x="145" y="22" font-size="10" fill="#b45309">top:20px; left:30px</text><rect x="70" y="40" width="90" height="45" fill="#facc15" fill-opacity="0.4" stroke="#a16207" stroke-dasharray="4" /><text x="80" y="68" font-size="10" fill="#78350f">Position originale</text></svg>`;
            }
            else if (type === "absolute-drawing") {
                return `<svg width="320" height="160" viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg" class="mx-auto my-2"><rect x="30" y="25" width="180" height="100" fill="#d9f99d" stroke="#65a30d" stroke-width="1.5" rx="8" /><text x="80" y="70" font-size="12" fill="#365314">.parent (relative)</text><circle cx="220" cy="45" r="18" fill="#4ade80" stroke="#15803d" stroke-width="1.5" /><text x="210" y="50" font-size="10" fill="white">abs</text><text x="240" y="50" font-size="10" fill="#166534">top:0; right:0</text><path d="M220 45 L240 45" stroke="#16a34a" stroke-width="1" /></svg>`;
            }
            else if (type === "sticky-fixed-demo") {
                return `<svg width="280" height="150" viewBox="0 0 280 150" xmlns="http://www.w3.org/2000/svg" class="mx-auto my-2"><rect x="15" y="10" width="130" height="35" fill="#c4b5fd" stroke="#6d28d9" rx="4" /><text x="25" y="32" font-size="11" fill="#2e1065">fixed (bas droite)</text><rect x="170" y="90" width="85" height="30" fill="#fda4af" stroke="#be123c" rx="5" /><text x="175" y="109" font-size="10" fill="#4c0519">sticky top:0</text><polygon points="15,130 35,145 55,130" fill="#94a3b8" /><text x="30" y="140" font-size="9" fill="#0f172a">scroll</text></svg>`;
            }
            else if (type === "zindex-visual") {
                return `<svg width="300" height="130" viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg" class="mx-auto my-2"><rect x="50" y="20" width="90" height="50" fill="#ef4444" opacity="0.8" /><text x="75" y="50" fill="white" font-size="12">z-index:1</text><rect x="90" y="45" width="90" height="50" fill="#3b82f6" opacity="0.9" /><text x="115" y="75" fill="white" font-size="12">z-index:10</text><text x="110" y="110" font-size="11" fill="#1e293b">Le bleu (10) passe devant le rouge (1)</text></svg>`;
            }
            // fallback image générique
            return `<img src="" alt="${altText || 'illustration positionnement CSS'}" class="border rounded-lg p-2 bg-gray-100">`;
        }

        // Génération HTML pour chaque slide
        function renderSlide(slide, idx) {
            const isActive = idx === currentSlide ? "block" : "hidden";
            let slideHtml = `<div class="slide-item w-full flex-shrink-0 transition-all duration-300 ${isActive}" data-index="${idx}">`;
            slideHtml += `<div class="bg-white rounded-3xl slide-card p-5 md:p-8 border border-gray-100 shadow-xl">`;
            
            if (slide.type === "title") {
                slideHtml += `
                    <div class="text-center py-6 md:py-12">
                        <span class="inline-block bg-indigo-100 text-indigo-800 text-sm px-4 py-1.5 rounded-full font-semibold">${slide.badge}</span>
                        <h1 class="text-3xl md:text-5xl font-extrabold mt-6 bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-gray-600 text-lg md:text-xl mt-4">${slide.subtitle}</p>
                        <div class="mt-10 flex justify-center">
                            <div class="w-16 h-1 bg-indigo-300 rounded-full"></div>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectives") {
                slideHtml += `<h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">${slide.title}</h2>`;
                slideHtml += `<ul class="objective-list space-y-3 text-gray-800 text-base md:text-lg">`;
                slide.objectives.forEach(obj => {
                    slideHtml += `<li class="flex items-start"><span class="text-indigo-500 text-xl mr-3">📍</span><span>${obj}</span></li>`;
                });
                slideHtml += `</ul><div class="mt-8 p-4 bg-indigo-50 rounded-2xl text-indigo-800 text-sm"><span class="font-bold">💡 Pourquoi c'est important ?</span> Le positionnement CSS permet de créer des interfaces riches (menus flottants, tooltips, headers fixes).</div>`;
            }
            else if (slide.type === "content") {
                slideHtml += `<h2 class="text-2xl font-bold text-gray-800 border-b-2 border-indigo-200 pb-2 mb-5">${slide.title}</h2>`;
                slideHtml += `<div class="prose prose-lg max-w-none text-gray-700 leading-relaxed mb-5">${slide.explanation}</div>`;
                if (slide.codeExample) {
                    slideHtml += `<div class="my-5"><div class="text-sm font-mono font-semibold text-gray-500 mb-1">📝 Exemple CSS :</div><pre class="code-block text-sm overflow-x-auto">${escapeHtml(slide.codeExample)}</pre></div>`;
                }
                // Ajout du visuel
                if (slide.visual) {
                    const visualSvg = generateDrawing(slide.visual, slide.visualDesc || "");
                    slideHtml += `<div class="bg-gray-50 rounded-2xl p-4 mt-4 flex justify-center items-center flex-col border border-gray-200">${visualSvg}<span class="text-xs text-gray-500 mt-2">🔍 Schéma interactif — ${slide.title}</span></div>`;
                } else if (slide.visualDesc) {
                    slideHtml += `<div class="bg-gray-50 p-3 rounded-xl"><img src="" alt="${slide.visualDesc}" class="mx-auto max-h-40"><p class="text-center text-gray-500 text-sm">${slide.visualDesc}</p></div>`;
                }
                // Ajout d'une note ou astuce pour les positionnements
                if (slide.title.includes("absolute") || slide.title.includes("relative") || slide.title.includes("sticky")) {
                    slideHtml += `<div class="mt-5 text-sm bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-xl text-amber-800">⚠️ Rappel : un élément absolute cherche son ancêtre positionné le plus proche. Si aucun, c'est <html>. Le z-index gère la superposition.</div>`;
                }
                if (slide.title.includes("z-index")) {
                    slideHtml += `<div class="mt-5 text-sm bg-blue-50 border-l-4 border-blue-400 p-3 rounded-r-xl">✨ Important: z-index ne fonctionne que sur les éléments avec une position autre que static.</div>`;
                }
            }
            
            slideHtml += `</div></div>`;
            return slideHtml;
        }

        // Helper d'échappement HTML simple
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Mise à jour de l'affichage + gestion des slides visibles
        function updateSlidesVisibility() {
            $('.slide-item').each(function(idx) {
                if (idx === currentSlide) {
                    $(this).removeClass('hidden').addClass('block');
                } else {
                    $(this).removeClass('block').addClass('hidden');
                }
            });
            $('#slideCounter').text(`Diapositive ${currentSlide+1} / ${totalSlides}`);
            // mettre à jour les indicateurs à points
            updateDots();
            // gestion désactivation boutons
            $('#prevBtn').prop('disabled', currentSlide === 0);
            $('#nextBtn').prop('disabled', currentSlide === totalSlides-1);
            // scroll automatique en haut (confort)
            $('html, body').animate({ scrollTop: $('#slidesWrapper').offset().top - 20 }, 150);
        }

        function updateDots() {
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const activeClass = (i === currentSlide) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
                dotsHtml += `<button class="dot-btn h-2 rounded-full transition-all ${activeClass} mx-1 hover:bg-indigo-400" data-slide="${i}"></button>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            $('.dot-btn').click(function() {
                let newIndex = parseInt($(this).data('slide'));
                if (!isNaN(newIndex) && newIndex !== currentSlide) {
                    currentSlide = newIndex;
                    updateSlidesVisibility();
                }
            });
        }

        function buildAllSlides() {
            const container = $('#slidesContainer');
            container.empty();
            slidesData.forEach((slide, idx) => {
                const slideHtml = renderSlide(slide, idx);
                container.append(slideHtml);
            });
            updateSlidesVisibility();
        }

        // navigation
        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateSlidesVisibility();
            }
        }
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlidesVisibility();
            }
        }

        $(document).ready(function() {
            buildAllSlides();
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            // raccourci clavier (flèches)
            $(document).keydown(function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                }
            });
            // optimisation mobile swipe simple (touch)
            let touchStartX = 0;
            $('#slidesWrapper').on('touchstart', function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $('#slidesWrapper').on('touchend', function(e) {
                if (!touchStartX) return;
                let touchEndX = e.originalEvent.changedTouches[0].clientX;
                let diff = touchEndX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) prevSlide();
                    else nextSlide();
                }
                touchStartX = 0;
            });
        });
    </script>
</body>
</html>
