<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 14 : Les bases de Flexbox | CSS Web Dev</title>
    <!-- Tailwind CSS via CDN + base layer for custom overrides -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour d'éventuelles formules, mais peu utilisé ici) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour le slide show */
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        .slide-active {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        /* personnalisation pour un meilleur confort visuel */
        body {
            background: #f8fafc;
        }
        .prose code {
            background-color: #eef2ff;
            padding: 0.2rem 0.4rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            color: #1e40af;
        }
        .custom-card {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
        }
        /* pour les démos flexbox intégrées */
        .demo-flex-container {
            background: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid #cbd5e1;
        }
        .flex-demo-box {
            background-color: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            font-weight: 500;
            padding: 0.75rem;
            min-width: 60px;
            transition: all 0.2s;
        }
        .flex-demo-box:nth-child(odd) {
            background-color: #6366f1;
        }
        .btn-slide {
            transition: background 0.2s;
        }
        .highlight {
            border-left: 4px solid #3b82f6;
            background: #eff6ff;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slides -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden custom-card">
            
            <!-- Header fixe avec indicateur de progression -->
            <div class="bg-indigo-700 text-white px-6 py-4 flex justify-between items-center flex-wrap gap-2">
                <div>
                    <span class="text-sm font-medium opacity-90">Initiation au CSS · Module Flexbox</span>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">Leçon 14 : Display & Flexbox</h1>
                </div>
                <div class="bg-indigo-800 px-3 py-1 rounded-full text-sm font-mono">
                    <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>

            <!-- Zone des slides dynamique -->
            <div id="slidesContainer" class="relative min-h-[550px] bg-gray-50">
                <!-- Les slides seront injectées ici via jQuery -->
            </div>

            <!-- Navigation buttons -->
            <div class="bg-white border-t border-gray-200 px-6 py-4 flex justify-between items-center">
                <button id="prevSlide" class="btn-slide bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-5 rounded-xl transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                    Précédent
                </button>
                <div class="flex gap-2">
                    <button id="gotoSlide1" class="w-2.5 h-2.5 rounded-full bg-gray-300 transition-all slide-dot" data-index="0"></button>
                    <button id="gotoSlide2" class="w-2.5 h-2.5 rounded-full bg-gray-300 transition-all slide-dot" data-index="1"></button>
                    <!-- autres points seront générés dynamiquement -->
                </div>
                <button id="nextSlide" class="btn-slide bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-xl transition flex items-center gap-1">
                    Suivant
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
                </button>
            </div>
        </div>
        
        <!-- petite note pédagogique -->
        <p class="text-center text-sm text-gray-500 mt-6">🧑‍🏫 Cliquez sur Suivant pour découvrir la leçon 14 — Display, Flexbox et mise en page responsive.</p>
    </div>

    <script>
        // Définition des slides selon la lesson14: objectifs et contenu détaillé
        // D'après les objectifs: 
        // lesson14 objectif0: Maîtriser display: block, inline, inline-block, none
        // objectif1: Comprendre le principe de Flexbox (axe principal/transverse)
        // objectif2: Utiliser display: flex, flex-direction, justify-content, align-items

        const slides = [
            {   // slide 0 : titre + intro lesson14
                type: "title",
                title: "🧩 Display & Flexbox",
                subtitle: "Maîtriser les bases du placement flexible",
                desc: "Dans cette leçon, nous allons comprendre comment modifier le comportement d’affichage des éléments et découvrir la puissance de Flexbox pour créer des layouts responsives sans prise de tête."
            },
            {   // slide 1 : objectifs pédagogiques (selon lesson14)
                type: "objectives",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "✅ Maîtriser les différentes valeurs de display : block, inline, inline-block, none.",
                    "✅ Comprendre le principe de Flexbox et la notion d'axe principal / axe transverse.",
                    "✅ Savoir utiliser display: flex, flex-direction, justify-content et align-items."
                ]
            },
            {   // slide 2: display block / inline / inline-block / none
                type: "content",
                title: "📦 Les bases : propriété display",
                content: `
                    <p class="mb-3">La propriété <code class="bg-gray-200 px-1 rounded">display</code> définit le type d'affichage d'un élément. Voici les valeurs essentielles :</p>
                    <div class="grid md:grid-cols-2 gap-4 mt-2">
                        <div class="bg-white p-3 rounded-xl border"><span class="font-bold text-indigo-700">block</span> : occupe toute la largeur, retour à la ligne (div, p, h1).</div>
                        <div class="bg-white p-3 rounded-xl border"><span class="font-bold text-indigo-700">inline</span> : ne coupe pas le flux, largeur selon contenu (span, a).</div>
                        <div class="bg-white p-3 rounded-xl border"><span class="font-bold text-indigo-700">inline-block</span> : comme inline mais accepte largeur/hauteur/marges verticales.</div>
                        <div class="bg-white p-3 rounded-xl border"><span class="font-bold text-indigo-700">none</span> : cache l'élément (disparaît totalement).</div>
                    </div>
                    <div class="highlight mt-5 text-sm">
                        💡 <strong>À retenir :</strong> Un élément <code>inline</code> ignore width/height, tandis que <code>inline-block</code> les prend en compte tout en restant sur la même ligne.
                    </div>
                `
            },
            {   // slide 3 : démo interactive display inline-block vs block
                type: "demoDisplay",
                title: "🧪 Exemple interactif : display en action",
                demoType: "display"
            },
            {   // slide 4: introduction Flexbox (concept axes)
                type: "content",
                title: "✨ Flexbox : le modèle de mise en page flexible",
                content: `
                    <p>Flexbox (CSS Flexible Box Layout) permet de répartir l'espace et d'aligner des éléments facilement, même quand leurs tailles sont dynamiques.</p>
                    <div class="my-4 flex justify-center">
                        <div class="bg-indigo-50 rounded-xl p-4 w-full max-w-md text-center border border-indigo-200">
                            <span class="font-semibold">📐 Axe principal (main axis)</span> → direction définie par flex-direction<br>
                            <span class="font-semibold">↕️ Axe transverse (cross axis)</span> → perpendiculaire
                        </div>
                    </div>
                    <p class="mt-2">Pour activer Flexbox, on applique <code>display: flex</code> au conteneur. Les enfants deviennent des <strong>flex items</strong>.</p>
                `
            },
            {   // slide 5: propriétés flex-direction, justify-content, align-items
                type: "content",
                title: "⚙️ Propriétés fondamentales du conteneur flex",
                content: `
                    <ul class="list-disc pl-5 space-y-2">
                        <li><span class="font-mono text-indigo-700">flex-direction</span> : définit l'axe principal (row | row-reverse | column | column-reverse).</li>
                        <li><span class="font-mono text-indigo-700">justify-content</span> : aligne les éléments sur l'axe principal (flex-start, center, space-between, etc.)</li>
                        <li><span class="font-mono text-indigo-700">align-items</span> : aligne les éléments sur l'axe transverse (stretch, center, flex-start, baseline...).</li>
                    </ul>
                    <div class="mt-3 p-3 bg-gray-100 rounded-lg text-sm">
                        <strong>Exemple :</strong> <code>.container { display: flex; flex-direction: row; justify-content: center; align-items: center; }</code>
                    </div>
                `
            },
            {   // slide 6 : démo interactive flexbox (live)
                type: "demoFlex",
                title: "🧩 Jouons avec Flexbox !",
                demoType: "flexInteractive"
            },
            {   // slide 7 : résumé & prochaines étapes
                type: "conclusion",
                title: "🏁 Récapitulatif",
                summary: "Nous avons découvert display (block, inline, inline-block) ainsi que les bases de Flexbox : conteneur flex, direction, alignement principal et transverse.",
                next: "Prochaine leçon : approfondir flex-wrap, gap, flex-grow, et créer des layouts responsives complets."
            }
        ];

        let currentIndex = 0;
        let total = slides.length;

        // Générer dynamiquement le DOM des slides + points indicateurs
        function buildSlides() {
            const container = $('#slidesContainer');
            container.empty();
            $.each(slides, function(i, slide) {
                let slideHtml = `<div class="slide slide-hidden p-6 md:p-8 transition-all" data-slide-index="${i}" id="slide-${i}">`;
                if (slide.type === 'title') {
                    slideHtml += `
                        <div class="flex flex-col items-center justify-center min-h-[450px] text-center">
                            <h2 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">${escapeHtml(slide.title)}</h2>
                            <p class="text-xl text-gray-600 mt-4">${escapeHtml(slide.subtitle)}</p>
                            <p class="text-gray-500 max-w-lg mt-6">${escapeHtml(slide.desc)}</p>
                            <div class="mt-10 animate-pulse text-indigo-400 text-sm">⬇️ Cliquez sur Suivant pour débuter ⬇️</div>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectives') {
                    let listItems = '';
                    slide.objectives.forEach(obj => { listItems += `<li class="mb-3 flex items-start gap-2"><span class="text-indigo-600 text-xl">✓</span> <span>${escapeHtml(obj)}</span></li>`; });
                    slideHtml += `
                        <div>
                            <h3 class="text-2xl font-bold text-gray-800 border-b border-indigo-200 pb-2 mb-5">${escapeHtml(slide.title)}</h3>
                            <ul class="text-gray-700 text-lg space-y-2 list-none">${listItems}</ul>
                            <div class="mt-8 bg-indigo-50 p-4 rounded-2xl italic text-indigo-800">⭐ Objectifs clés de la Leçon 14 du programme officiel CSS</div>
                        </div>
                    `;
                }
                else if (slide.type === 'content') {
                    slideHtml += `
                        <div>
                            <h3 class="text-2xl font-bold text-gray-800 mb-4">${escapeHtml(slide.title)}</h3>
                            <div class="prose max-w-none text-gray-700">${slide.content}</div>
                        </div>
                    `;
                }
                else if (slide.type === 'demoDisplay') {
                    slideHtml += `
                        <div>
                            <h3 class="text-2xl font-bold text-gray-800 mb-4">${escapeHtml(slide.title)}</h3>
                            <div class="bg-white rounded-xl p-4 shadow-sm border">
                                <div class="mb-3 flex flex-wrap gap-2">
                                    <button class="demo-display-btn bg-indigo-100 px-3 py-1 rounded-full text-indigo-800 text-sm" data-display="block">block</button>
                                    <button class="demo-display-btn bg-indigo-100 px-3 py-1 rounded-full text-indigo-800 text-sm" data-display="inline">inline</button>
                                    <button class="demo-display-btn bg-indigo-100 px-3 py-1 rounded-full text-indigo-800 text-sm" data-display="inline-block">inline-block</button>
                                    <button class="demo-display-btn bg-indigo-100 px-3 py-1 rounded-full text-indigo-800 text-sm" data-display="none">none</button>
                                </div>
                                <div id="displayDemoZone" class="border-2 border-dashed border-gray-300 p-4 rounded-xl bg-gray-50 min-h-[180px]">
                                    <div class="box-demo-item bg-blue-500 text-white p-3 rounded-lg m-1" style="width: 120px;">Élément A</div>
                                    <div class="box-demo-item bg-violet-500 text-white p-3 rounded-lg m-1" style="width: 120px;">Élément B</div>
                                    <div class="box-demo-item bg-teal-500 text-white p-3 rounded-lg m-1" style="width: 120px;">Élément C</div>
                                </div>
                                <p class="text-xs text-gray-500 mt-3">👉 Le display change l'agencement : "none" cache totalement.</p>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'demoFlex') {
                    slideHtml += `
                        <div>
                            <h3 class="text-2xl font-bold text-gray-800 mb-4">${escapeHtml(slide.title)}</h3>
                            <div class="bg-white rounded-xl shadow-sm border p-4">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label class="block text-sm font-medium">flex-direction :</label>
                                        <select id="flexDirection" class="border rounded p-1 w-full">
                                            <option value="row">row (par défaut)</option>
                                            <option value="row-reverse">row-reverse</option>
                                            <option value="column">column</option>
                                            <option value="column-reverse">column-reverse</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium">justify-content :</label>
                                        <select id="justifyContent" class="border rounded p-1 w-full">
                                            <option value="flex-start">flex-start</option>
                                            <option value="center">center</option>
                                            <option value="flex-end">flex-end</option>
                                            <option value="space-between">space-between</option>
                                            <option value="space-around">space-around</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium">align-items :</label>
                                        <select id="alignItems" class="border rounded p-1 w-full">
                                            <option value="stretch">stretch</option>
                                            <option value="flex-start">flex-start</option>
                                            <option value="center">center</option>
                                            <option value="flex-end">flex-end</option>
                                            <option value="baseline">baseline</option>
                                        </select>
                                    </div>
                                </div>
                                <div id="flexDemoContainer" class="demo-flex-container min-h-[220px] flex flex-wrap" style="display: flex;">
                                    <div class="flex-demo-box m-2" style="width: 80px;">1</div>
                                    <div class="flex-demo-box m-2" style="width: 100px;">2</div>
                                    <div class="flex-demo-box m-2" style="width: 70px;">3</div>
                                    <div class="flex-demo-box m-2" style="width: 90px;">4</div>
                                </div>
                                <p class="text-sm text-gray-500 mt-3">💡 Modifiez les menus pour voir la réorganisation des blocs en temps réel.</p>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'conclusion') {
                    slideHtml += `
                        <div class="text-center">
                            <h3 class="text-2xl font-bold text-gray-800 mb-4">${escapeHtml(slide.title)}</h3>
                            <div class="bg-green-50 p-5 rounded-2xl border-l-8 border-green-500 text-left">
                                <p class="text-gray-700 text-lg">✨ ${escapeHtml(slide.summary)}</p>
                            </div>
                            <p class="mt-6 text-indigo-600">📘 ${escapeHtml(slide.next)}</p>
                            <div class="mt-8 text-sm text-gray-400">Félicitations, vous avez terminé la leçon 14 ! 🎉</div>
                        </div>
                    `;
                }
                slideHtml += `</div>`;
                container.append(slideHtml);
            });
            updateSlideVisibility();
            updateDots();
            attachDemoEvents();
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        function updateSlideVisibility() {
            $('.slide').each(function(idx) {
                if(idx === currentIndex) {
                    $(this).removeClass('slide-hidden').addClass('slide-active');
                } else {
                    $(this).removeClass('slide-active').addClass('slide-hidden');
                }
            });
            $('#slideCounter').text(currentIndex+1);
            updateDotsActive();
        }

        function updateDots() {
            const dotsContainer = $('.flex.gap-2').empty();
            for(let i=0; i<total; i++) {
                let dot = $(`<button class="w-2.5 h-2.5 rounded-full transition-all slide-dot" data-index="${i}"></button>`);
                dotsContainer.append(dot);
            }
            updateDotsActive();
            $('.slide-dot').on('click', function() {
                let idx = parseInt($(this).data('index'));
                if(!isNaN(idx)) {
                    currentIndex = idx;
                    updateSlideVisibility();
                }
            });
        }

        function updateDotsActive() {
            $('.slide-dot').each(function(idx) {
                if(idx === currentIndex) {
                    $(this).removeClass('bg-gray-300').addClass('bg-indigo-600 w-3 h-3');
                } else {
                    $(this).removeClass('bg-indigo-600 w-3 h-3').addClass('bg-gray-300');
                }
            });
        }

        function attachDemoEvents() {
            // demo display inline/block
            $('.demo-display-btn').off('click').on('click', function() {
                let val = $(this).data('display');
                $('#displayDemoZone .box-demo-item').css('display', val);
                if(val === 'none') {
                    // rien de plus
                } else if(val === 'inline') {
                    $('#displayDemoZone .box-demo-item').css({display: 'inline', width: 'auto', margin: '5px'});
                } else if(val === 'inline-block') {
                    $('#displayDemoZone .box-demo-item').css({display: 'inline-block', width: '120px'});
                } else if(val === 'block') {
                    $('#displayDemoZone .box-demo-item').css({display: 'block', width: 'auto'});
                }
            });
            // initialisation display demo par défaut block
            $('#displayDemoZone .box-demo-item').css('display', 'block');

            // Flexbox live interaction
            function updateFlexDemo() {
                const direction = $('#flexDirection').val();
                const justify = $('#justifyContent').val();
                const align = $('#alignItems').val();
                const $container = $('#flexDemoContainer');
                $container.css({
                    'display': 'flex',
                    'flex-direction': direction,
                    'justify-content': justify,
                    'align-items': align
                });
                // pour que stretch fonctionne bien sur hauteur
                if(align === 'stretch') {
                    $container.find('.flex-demo-box').css('height', 'auto');
                } else {
                    $container.find('.flex-demo-box').css('height', '');
                }
            }
            $('#flexDirection, #justifyContent, #alignItems').off('change').on('change', updateFlexDemo);
            if($('#flexDemoContainer').length) updateFlexDemo();
        }

        function goNext() {
            if(currentIndex < total-1) {
                currentIndex++;
                updateSlideVisibility();
                // re-attacher les events pour les démos après chaque changement (mais slides déjà créées)
                attachDemoEvents();
            }
        }

        function goPrev() {
            if(currentIndex > 0) {
                currentIndex--;
                updateSlideVisibility();
                attachDemoEvents();
            }
        }

        $(document).ready(function() {
            buildSlides();
            $('#totalSlides').text(total);
            $('#nextSlide').on('click', goNext);
            $('#prevSlide').on('click', goPrev);
            // keyboard events
            $(document).keydown(function(e) {
                if(e.key === 'ArrowRight') goNext();
                else if(e.key === 'ArrowLeft') goPrev();
            });
        });
    </script>
</body>
</html>
