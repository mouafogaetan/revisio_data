<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 15 : Layouts responsives avec Flexbox | CSS Webdev</title>
    <!-- Tailwind CSS + base personnalisée pour lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (au cas où formules, mais surtout pour compatibilité) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* ajustements pour le confort de lecture et slide fluide */
        body {
            background: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        /* simulation de police douce */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        .slide-container {
            max-width: 1100px;
            margin: 0 auto;
            transition: all 0.2s ease;
        }
        .slide-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            background-color: #e2e8f0;
            transform: scale(1.02);
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* code blocks plus lisibles */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            font-family: 'Fira Code', monospace;
        }
        code {
            font-family: 'Fira Code', monospace;
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #0f172a;
        }
        pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .example-demo {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }
        /* responsivité pour petits écrans */
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.25rem;
            }
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
        }
        /* style interactif pour démo flexbox */
        .flex-demo-box {
            background: #cbd5e1;
            border-radius: 0.75rem;
            padding: 0.75rem;
            transition: all 0.2s;
        }
        .demo-item {
            background: #3b82f6;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body class="antialiased">

    <div class="slide-container px-4 py-6 md:py-10">
        <!-- Conteneur slide dynamique -->
        <div id="slidesWrapper" class="relative">
            <!-- Slide actuel injecté par jQuery -->
        </div>

        <!-- Navigation + progression -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-6 mb-8">
            <button id="prevSlide" class="nav-btn px-6 py-2 bg-white border border-slate-300 rounded-full shadow-sm text-slate-700 font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-50 transition">◀ Précédent</button>
            <div class="flex items-center gap-3 text-sm text-slate-500">
                <span id="slideCounter">Slide 1 / 1</span>
                <div class="w-32 md:w-48 h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progressFill" class="progress-bar h-full bg-indigo-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <button id="nextSlide" class="nav-btn px-6 py-2 bg-indigo-600 text-white rounded-full shadow-md font-medium hover:bg-indigo-700 transition">Suivant ▶</button>
        </div>
    </div>

    <script>
        // Définition des slides pour la lesson 15 (chap5, lesson15: "Layouts responsives avec Flexbox")
        // Titre : Maîtriser flex-wrap, align-content, gap, puis flex-grow/shrink/basis, order, align-self, et créer des layouts responsives
        const slidesData = [
            {
                type: "title",
                title: "📱 Layouts responsives avec Flexbox",
                subtitle: "Leçon 15 · Initiation au CSS – Flexbox avancé",
                chapitre: "Chapitre 5 : Positionnement et bases du responsive",
                competence: "Maîtriser flex-wrap, align-content, gap, propriétés enfants (flex-grow, flex-shrink, flex-basis, order, align-self) et créer des interfaces adaptatives."
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                objectifs: [
                    "✅ Maîtriser flex-wrap, align-content et la propriété gap pour gérer le retour à la ligne et les espacements.",
                    "✅ Utiliser les propriétés sur les enfants : flex-grow, flex-shrink, flex-basis (raccourci flex).",
                    "✅ Comprendre order pour réorganiser visuellement les éléments.",
                    "✅ Appliquer align-self pour surcharger l'alignement d'un élément spécifique.",
                    "✅ Créer des layouts responsives avec Flexbox (adaptation mobile → desktop)."
                ]
            },
            {
                type: "content",
                title: "🔁 flex-wrap : contrôle du retour à la ligne",
                content: `
                    <p class="mb-3">Par défaut, <code class="bg-slate-100">display: flex</code> place tous les éléments sur une seule ligne (<code>flex-wrap: nowrap</code>). Sur petit écran, cela peut créer un débordement horizontal. <strong>flex-wrap: wrap</strong> permet aux éléments de passer à la ligne suivante.</p>
                    <div class="bg-indigo-50 p-4 rounded-xl my-4">
                        <p class="font-semibold">🎨 Exemple visuel :</p>
                        <div class="flex flex-wrap gap-3 mt-2 bg-white p-3 rounded-lg border">
                            <div class="bg-blue-500 text-white px-4 py-2 rounded-lg">Élément 1</div>
                            <div class="bg-blue-500 text-white px-4 py-2 rounded-lg">Élément 2</div>
                            <div class="bg-blue-500 text-white px-4 py-2 rounded-lg">Élément 3</div>
                            <div class="bg-blue-500 text-white px-4 py-2 rounded-lg">Élément 4</div>
                            <div class="bg-blue-500 text-white px-4 py-2 rounded-lg">Élément 5</div>
                        </div>
                        <p class="text-sm mt-2 text-gray-600">Redimensionnez votre navigateur → les blocs passent à la ligne automatiquement grâce à <code>flex-wrap: wrap</code> + gap.</p>
                    </div>
                    <pre><code>.parent {
  display: flex;
  flex-wrap: wrap;   /* permet le retour à la ligne */
  gap: 1rem;         /* espacement entre les éléments (moderne) */
}</code></pre>
                    <p class="mt-3">🧩 <strong>align-content</strong> : quand il y a plusieurs lignes (wrap), cette propriété contrôle l'espacement vertical entre les lignes (stretch, flex-start, center, space-between...). Très utile pour les grilles flexibles.</p>
                `
            },
            {
                type: "content",
                title: "📏 gap : l'espacement simplifié entre éléments",
                content: `
                    <p>Avant on utilisait <code>margin</code> sur les enfants; aujourd'hui <code>gap</code> facilite la vie : espacement uniquement entre les éléments, sans marge aux extrémités.</p>
                    <pre><code>.flex-container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;   /* écart horizontal ET vertical */
  row-gap: 30px; /* écart vertical spécifique */
  column-gap: 15px; /* écart horizontal */
}</code></pre>
                    <div class="example-demo mt-3 flex flex-wrap gap-4 justify-center">
                        <div class="bg-emerald-500 text-white p-3 rounded-md w-24 text-center">1</div>
                        <div class="bg-emerald-500 text-white p-3 rounded-md w-24 text-center">2</div>
                        <div class="bg-emerald-500 text-white p-3 rounded-md w-24 text-center">3</div>
                        <div class="bg-emerald-500 text-white p-3 rounded-md w-24 text-center">4</div>
                    </div>
                    <p class="text-sm text-gray-500 mt-2">↑ gap: 1rem entre chaque boîte.</p>
                `
            },
            {
                type: "content",
                title: "📈 flex-grow, flex-shrink, flex-basis – la puissance des enfants flexibles",
                content: `
                    <p><strong>flex-grow</strong> : facteur d'agrandissement (espace libre réparti). <strong>flex-shrink</strong> : facteur de rétrécissement. <strong>flex-basis</strong> : taille de base avant distribution.</p>
                    <p class="mt-2">🎯 Raccourci classique : <code>flex: 1 1 0px;</code> → grow=1, shrink=1, basis=0.</p>
                    <div class="flex flex-col md:flex-row gap-4 my-4">
                        <div class="bg-slate-100 p-3 rounded-lg flex-1"><span class="font-mono">flex: 1</span><div class="bg-indigo-400 h-8 rounded mt-1 w-full"></div> prend l'espace restant</div>
                        <div class="bg-slate-100 p-3 rounded-lg flex-2"><span class="font-mono">flex: 2</span><div class="bg-indigo-600 h-8 rounded mt-1 w-full"></div> deux fois plus large</div>
                        <div class="bg-slate-100 p-3 rounded-lg flex-auto"><span class="font-mono">flex: auto</span><div class="bg-indigo-300 h-8 rounded mt-1 w-full"></div> basé sur le contenu</div>
                    </div>
                    <pre><code>.item { flex: 1; }        /* flex-grow:1, flex-shrink:1, flex-basis:0% */
.item-large { flex: 2; } /* prendra 2 parts d'espace */
.item-fixed { flex: 0 0 150px; } /* taille fixe 150px, ne grossit pas */</code></pre>
                    <p>💡 <strong>Cas pratique responsive</strong> : sur mobile, on peut passer de <code>flex-direction: row</code> à <code>column</code> et utiliser grow pour remplir l'espace vertical.</p>
                `
            },
            {
                type: "content",
                title: "🔄 order : réorganiser l’ordre visuel sans toucher au HTML",
                content: `
                    <p>Propriété <code>order</code> (valeur entière, par défaut 0). Les éléments sont affichés par ordre croissant. Utile pour réagencer un layout sur mobile vs desktop.</p>
                    <div class="flex flex-wrap gap-3 justify-around p-4 bg-gradient-to-r from-purple-50 to-pink-50 rounded-xl my-3">
                        <div class="bg-rose-500 text-white p-2 rounded order-3">Élément A (order:3)</div>
                        <div class="bg-rose-600 text-white p-2 rounded order-1">Élément B (order:1) → premier</div>
                        <div class="bg-rose-700 text-white p-2 rounded order-2">Élément C (order:2)</div>
                    </div>
                    <pre><code>.card:first-child { order: 2; }
.card:nth-child(2) { order: 1; } /* passera devant */
@media (max-width: 640px) {
  .sidebar { order: 3; }   /* la sidebar descend en bas sur mobile */
  .main-content { order: 1; }
}</code></pre>
                    <p class="italic">Astuce : combinez order avec les media queries pour réorganiser les blocs selon la taille d'écran sans changer la structure HTML.</p>
                `
            },
            {
                type: "content",
                title: "🎯 align-self : personnaliser l'alignement d’un enfant",
                content: `
                    <p>Permet de surcharger <code>align-items</code> pour un élément spécifique. Valeurs : auto | flex-start | flex-end | center | baseline | stretch.</p>
                    <div class="flex h-32 bg-gray-100 rounded-xl p-2 gap-2 items-start">
                        <div class="bg-teal-500 p-2 rounded text-white">align-self:auto</div>
                        <div class="bg-teal-600 p-2 rounded text-white self-center">self: center</div>
                        <div class="bg-teal-700 p-2 rounded text-white self-end">self: end</div>
                        <div class="bg-teal-800 p-2 rounded text-white self-stretch">self: stretch</div>
                    </div>
                    <pre><code>.special-item {
  align-self: flex-end; /* descend en bas du conteneur */
}
.another {
  align-self: center;
}</code></pre>
                    <p>✨ Utile dans les cartes, les barres d'outils, pour corriger un élément isolé.</p>
                `
            },
            {
                type: "content",
                title: "📱 Créer des layouts responsives avec Flexbox (étude de cas)",
                content: `
                    <p>🔧 Exemple typique : navigation flexible + grille de produits qui s'adapte.</p>
                    <div class="bg-white border rounded-xl p-4 my-3 shadow-sm">
                        <p class="font-bold">Barre de navigation responsive :</p>
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-3 bg-slate-800 text-white p-3 rounded-lg">
                            <span class="font-bold text-lg">Logo</span>
                            <div class="flex flex-wrap justify-center gap-4">
                                <a href="#" class="hover:text-indigo-300">Accueil</a>
                                <a href="#" class="hover:text-indigo-300">Services</a>
                                <a href="#" class="hover:text-indigo-300">À propos</a>
                                <a href="#" class="hover:text-indigo-300">Contact</a>
                            </div>
                            <button class="bg-indigo-500 px-4 py-1 rounded-full">Connexion</button>
                        </div>
                        <pre class="mt-3 text-xs"><code>/* CSS clé */
.nav {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
@media (min-width: 640px) {
  .nav { flex-direction: row; justify-content: space-between; align-items: center; }
}</code></pre>
                        <p class="mt-2">💡 Avec Flexbox + media queries, on passe d’une disposition verticale (mobile) à horizontale (desktop).</p>
                    </div>
                    <div class="bg-green-50 border-l-4 border-green-500 p-3 rounded-r mt-3">
                        <p class="font-semibold">✅ Bonne pratique : Toujours utiliser <code>flex-wrap: wrap</code> sur les conteneurs d'éléments de contenu, accompagné de gap et de media queries pour affiner.</p>
                    </div>
                `
            },
            {
                type: "content",
                title: "🏁 Exercice pratique rapide",
                content: `
                    <p><strong>🎨 Mini défi :</strong> Construisez une galerie responsive de 6 cartes. Sur mobile, les cartes s'affichent en colonne ; sur tablette, 2 par ligne ; sur desktop, 3 par ligne. Utilisez Flexbox !</p>
                    <pre><code>&lt;div class="gallery"&gt;
  &lt;div class="card"&gt;Carte 1&lt;/div&gt;
  &lt;div class="card"&gt;Carte 2&lt;/div&gt;
  ...
&lt;/div&gt;

.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 1.5rem;
}
.card {
  flex: 1 1 100%; /* mobile: pleine largeur */
}
@media (min-width: 640px) {
  .card { flex: 1 1 calc(50% - 1.5rem); } /* 2 par ligne */
}
@media (min-width: 1024px) {
  .card { flex: 1 1 calc(33.33% - 1.5rem); } /* 3 par ligne */
}</code></pre>
                    <p class="mt-3">✨ Vous pouvez également utiliser <code>order</code> pour changer l'apparition d'un élément sponsorisé sur mobile.</p>
                    <div class="bg-amber-50 p-3 rounded-xl mt-3 flex gap-2 flex-wrap justify-center">
                        <div class="bg-amber-200 px-3 py-1 rounded-full text-sm">📱 mobile → colonne</div>
                        <div class="bg-amber-200 px-3 py-1 rounded-full text-sm">📟 tablette → 2 colonnes</div>
                        <div class="bg-amber-200 px-3 py-1 rounded-full text-sm">💻 desktop → 3 colonnes</div>
                    </div>
                `
            },
            {
                type: "conclusion",
                title: "✨ Récapitulons !",
                resume: `
                    <ul class="list-disc pl-5 space-y-2">
                        <li><strong>flex-wrap</strong> : essentiel pour le responsive, autorise le multi-lignes.</li>
                        <li><strong>gap</strong> : simplifie les marges entre les éléments flexibles.</li>
                        <li><strong>align-content</strong> : gère l'espacement entre les lignes lors du wrap.</li>
                        <li><strong>flex-grow / shrink / basis</strong> : contrôlent la flexibilité des enfants.</li>
                        <li><strong>order</strong> : redéfinit l'ordre visuel sans altérer le DOM.</li>
                        <li><strong>align-self</strong> : alignement individuel puissant.</li>
                        <li>⚡ Combiner media queries + flex-wrap = layouts vraiment adaptatifs.</li>
                    </ul>
                    <div class="mt-6 bg-indigo-100 p-4 rounded-xl text-indigo-900">
                        💪 <span class="font-bold">Mission:</span> Sur votre projet personnel, essayez de créer une barre de navigation qui devient menu hamburger? Mais ceci est une prochaine étape. Pour aujourd'hui, maîtrisez les propriétés flex sur enfants.
                    </div>
                `
            }
        ];

        let currentIndex = 0;
        const totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'un slide selon son type
        function renderSlide(index) {
            const slide = slidesData[index];
            if (!slide) return "";
            let inner = "";
            if (slide.type === "title") {
                inner = `
                    <div class="text-center py-6 md:py-10">
                        <span class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-700 text-sm font-semibold mb-4">${slide.chapitre || "CSS avancé"}</span>
                        <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-xl text-gray-600 mt-4">${slide.subtitle}</p>
                        <div class="mt-8 p-5 bg-indigo-50 rounded-2xl inline-block">
                            <p class="text-indigo-800">🎓 Compétence visée : ${slide.competence}</p>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectifs") {
                inner = `
                    <div class="p-2">
                        <h2 class="text-3xl font-bold text-slate-800 border-l-8 border-indigo-500 pl-4 mb-6">${slide.title}</h2>
                        <div class="grid gap-3 md:grid-cols-2">
                            ${slide.objectifs.map(obj => `<div class="bg-slate-50 p-4 rounded-xl shadow-sm flex items-start gap-3"><span class="text-indigo-600 text-2xl">📌</span><span>${obj}</span></div>`).join('')}
                        </div>
                    </div>
                `;
            }
            else if (slide.type === "content") {
                inner = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 border-b-2 border-indigo-200 pb-2 mb-5">${slide.title}</h2>
                        <div class="prose prose-slate max-w-none">${slide.content}</div>
                    </div>
                `;
            }
            else if (slide.type === "conclusion") {
                inner = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">${slide.title}</h2>
                        <div class="bg-gradient-to-br from-slate-50 to-white p-6 rounded-2xl">${slide.resume}</div>
                        <div class="mt-8 text-center text-sm text-gray-500 border-t pt-6">✨ Fin de la leçon 15 – À vous de coder ! 🚀</div>
                    </div>
                `;
            }
            return `<div class="slide-card p-6 md:p-8 transition-all duration-300">${inner}</div>`;
        }

        function updateSlide() {
            const htmlContent = renderSlide(currentIndex);
            $("#slidesWrapper").html(htmlContent);
            $("#slideCounter").text(`Slide ${currentIndex+1} / ${totalSlides}`);
            const progressPercent = ((currentIndex) / (totalSlides-1)) * 100;
            $("#progressFill").css("width", `${progressPercent}%`);
            // Gestion des boutons désactivés
            $("#prevSlide").prop("disabled", currentIndex === 0);
            $("#nextSlide").prop("disabled", currentIndex === totalSlides-1);
            if (currentIndex === totalSlides-1) {
                $("#nextSlide").text("Terminé ✓");
            } else {
                $("#nextSlide").text("Suivant ▶");
            }
            // Scroll en douceur vers le haut
            $("html, body").animate({ scrollTop: 0 }, 100);
            // Réactiver MathJax si nécessaire
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // Navigation
        $("#nextSlide").on("click", function() {
            if (currentIndex < totalSlides-1) {
                currentIndex++;
                updateSlide();
            }
        });
        $("#prevSlide").on("click", function() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
            }
        });

        // Gestion clavier
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowRight") {
                $("#nextSlide").click();
            } else if (e.key === "ArrowLeft") {
                $("#prevSlide").click();
            }
        });

        // initialisation
        updateSlide();

        // petite démo interactive supplémentaire pour le slide avec contenu dynamique ? (optionnel)
        // On injecte un petit script d'affichage actif sur la démo de flex-wrap (mais déjà statique)
        // Ajout dynamique d'exemples vivants pour l’ordre (pas nécessaire car statique mais clair)
        console.log("Leçon 15 prête — Flexbox responsive !");
    </script>
    <!-- note : aucune image externe, uniquement des démos dessinées avec CSS, conforme consigne -->
</body>
</html>
