<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 9 : Couleurs, unités, fonds, bordures et ombres | Initiation CSS</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour d'éventuelles formules, optionnel mais présent) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Styles personnalisés pour le diaporama & confort visuel -->
    <style>
        /* Couleurs douces, accessibles, contrastées */
        body {
            background: #f1f5f9;  /* fond gris très clair, moins agressif */
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            max-width: 1100px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }
        .slide-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .slide-content {
            padding: 2rem 1.8rem;
        }
        @media (max-width: 640px) {
            .slide-content {
                padding: 1.5rem 1.2rem;
            }
            h2 { font-size: 1.6rem; }
            h3 { font-size: 1.3rem; }
        }
        .nav-btn {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .nav-btn:hover {
            transform: scale(1.03);
            background-color: #e2e8f0;
        }
        .slide-indicator {
            background: #cbd5e1;
            transition: background 0.2s;
        }
        .slide-indicator.active {
            background: #3b82f6;
            width: 2rem;
        }
        /* personnalisation des extraits de code */
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
        }
        .demo-box {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        /* petites animations pour l'exemple */
        .hover-shadow-demo {
            transition: all 0.3s ease;
        }
        .hover-shadow-demo:hover {
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }
        .btn-demo {
            background-color: #3b82f6;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            color: white;
            transition: all 0.2s;
        }
        .btn-demo:hover {
            background-color: #2563eb;
            transform: scale(0.98);
        }
        .border-glow {
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .border-glow:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
        }
        footer {
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="antialiased">

<div class="slide-container">
    <div id="slides-wrapper">
        <!-- Les slides seront injectées dynamiquement avec jQuery, mais on écrit la structure HTML directement pour plus de clarté -->
    </div>

    <!-- Contrôles de navigation + indicateurs -->
    <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
        <button id="prevSlide" class="nav-btn bg-white px-5 py-2 rounded-full shadow-md text-gray-700 font-medium flex items-center gap-1 hover:bg-gray-100 transition">
            ← Précédent
        </button>
        <div id="indicators" class="flex gap-2 flex-wrap justify-center"></div>
        <button id="nextSlide" class="nav-btn bg-blue-600 px-5 py-2 rounded-full shadow-md text-white font-medium flex items-center gap-1 hover:bg-blue-700 transition">
            Suivant →
        </button>
    </div>
</div>

<script>
    // Définition des slides pour la leçon 9 (couleurs, unités, fonds, bordures, ombres)
    // Titre du cours, objectifs, puis contenu réparti en fonction des objectifs de lesson9
    const slidesData = [
        {
            type: "title",
            title: "🎨 Leçon 9 : Couleurs, unités, fonds, bordures & ombres",
            subtitle: "Initiation au CSS – Module Mise en forme avancée",
            bgClass: "bg-gradient-to-br from-indigo-50 to-sky-50"
        },
        {
            type: "objectives",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "✅ Utiliser les différents systèmes de couleurs (nommées, hexadécimal, RGB, RGBA, HSL, HSLA).",
                "✅ Distinguer les unités absolues (px, cm, mm) et relatives (em, rem, %, vw, vh).",
                "✅ Choisir les bonnes unités selon le contexte (responsive, accessibilité).",
                "✅ Appliquer background-color, background-image, background-repeat, background-position.",
                "✅ Maîtriser border (width, style, color) et border-radius pour les coins arrondis.",
                "✅ Ajouter des ombres avec box-shadow et text-shadow."
            ]
        },
        {
            type: "content",
            title: "🌈 1. Systèmes de couleurs en CSS",
            content: `
                <p class="mb-3">Le CSS permet d’exprimer les couleurs de plusieurs manières, selon le besoin :</p>
                <ul class="list-disc pl-6 space-y-1 mb-4">
                    <li><strong>Couleurs nommées</strong> : <code class="bg-gray-100 px-1 rounded">red, blue, lightblue, coral</code> (147 noms)</li>
                    <li><strong>Hexadécimal</strong> : <code class="bg-gray-100 px-1 rounded">#FF5733, #0f0, #1a2b3c</code> (6 ou 3 chiffres)</li>
                    <li><strong>RGB / RGBA</strong> : <code class="bg-gray-100 px-1 rounded">rgb(255,87,51)</code> et <code class="bg-gray-100 px-1 rounded">rgba(255,87,51,0.5)</code> (transparence)</li>
                    <li><strong>HSL / HSLA</strong> : <code class="bg-gray-100 px-1 rounded">hsl(9, 100%, 60%)</code> – teinte, saturation, luminosité.</li>
                </ul>
                <div class="demo-box grid grid-cols-2 sm:grid-cols-4 gap-3 text-center text-sm font-medium mt-2">
                    <div class="p-2 rounded-lg bg-red-500 text-white">Nom: red</div>
                    <div class="p-2 rounded-lg bg-[#3498db] text-white">Hex: #3498db</div>
                    <div class="p-2 rounded-lg bg-rgb(46,204,113) text-white">rgb(46,204,113)</div>
                    <div class="p-2 rounded-lg bg-hsl(280,60%,70%)">hsl(280,60%,70%)</div>
                </div>
                <p class="text-sm text-gray-500 mt-3">💡 Astuce : utilisez RGBA ou HSLA pour gérer la transparence (opacité partielle).</p>
            `
        },
        {
            type: "content",
            title: "📏 2. Unités absolues vs relatives",
            content: `
                <p class="mb-2"><strong>Unités absolues</strong> : fixes, ne changent pas selon l’écran. Ex: <code>px</code>, <code>cm</code>, <code>mm</code>, <code>in</code>. <span class="bg-yellow-100 px-1">Le pixel (px) est le plus utilisé pour les bordures, petites marges.</span></p>
                <p class="mb-3"><strong>Unités relatives</strong> : s’adaptent au contexte. Idéales pour le responsive.</p>
                <ul class="grid grid-cols-1 sm:grid-cols-2 gap-2 list-disc pl-6 mb-4">
                    <li><code>em</code> → relative à la taille de police de l’élément parent.</li>
                    <li><code>rem</code> → relative à la racine (généralement 16px). Parfait pour l’accessibilité.</li>
                    <li><code>%</code> → relative au conteneur parent.</li>
                    <li><code>vw / vh</code> → 1% de la largeur/hauteur de la fenêtre.</li>
                </ul>
                <pre><code>/* Exemples pratiques */
body { font-size: 16px; }
h1 { font-size: 2rem; }   /* = 32px */
.container { width: 80%; margin: 0 auto; }
.hero { height: 60vh; background: lightblue; }</code></pre>
                <div class="bg-blue-50 p-3 rounded-xl border-l-4 border-blue-400 text-sm">📱 Pour le mobile, privilégiez rem, %, vw pour une mise en page fluide.</div>
            `
        },
        {
            type: "content",
            title: "🖌️ 3. Arrière-plans : background-color, image, répétition, position",
            content: `
                <p>Les propriétés <code>background</code> permettent d’habiller vos éléments.</p>
                <div class="grid md:grid-cols-2 gap-4 mt-3">
                    <div class="bg-gray-100 p-3 rounded-xl">
                        <p class="font-semibold">🎨 background-color</p>
                        <div class="h-12 rounded-md bg-teal-500 mt-1"></div>
                    </div>
                    <div class="bg-gray-100 p-3 rounded-xl">
                        <p class="font-semibold">🖼️ background-image</p>
                        <div class="h-12 rounded-md bg-cover bg-center" style="background-image: url('https://picsum.photos/id/1015/200/100'); background-size: cover;"></div>
                        <p class="text-xs mt-1">Exemple motif (image externe)</p>
                    </div>
                    <div class="bg-gray-100 p-3 rounded-xl">
                        <p class="font-semibold">🔁 background-repeat</p>
                        <div class="h-12 rounded-md border" style="background-image: repeating-linear-gradient(45deg, #ddd 0px, #ddd 5px, white 5px, white 10px);"></div>
                        <p class="text-xs">Répétition d’un motif (ou no-repeat)</p>
                    </div>
                    <div class="bg-gray-100 p-3 rounded-xl">
                        <p class="font-semibold">📍 background-position</p>
                        <div class="h-12 rounded-md bg-cover" style="background-image: url('https://picsum.photos/id/104/200/100'); background-position: top right; background-size: cover;"></div>
                        <p class="text-xs">Position : top right, center, 10px 20%</p>
                    </div>
                </div>
                <pre class="mt-3"><code>.hero {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  /* ou image + couleur */
  background-image: url('photo.jpg');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
}</code></pre>
            `
        },
        {
            type: "content",
            title: "🖼️ 4. Bordures et coins arrondis (border & border-radius)",
            content: `
                <p>Personnalisez les contours de vos éléments grâce à <code class="bg-gray-200 px-1">border</code> et <code class="bg-gray-200 px-1">border-radius</code>.</p>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 my-4">
                    <div class="p-3 border-2 border-solid border-blue-500 rounded-lg text-center">Bleue solide</div>
                    <div class="p-3 border-4 border-dashed border-red-400 rounded-full text-center">Ronde pointillée</div>
                    <div class="p-3 border-t-4 border-green-500 bg-gray-50 rounded-b-2xl">Haut épais</div>
                    <div class="p-3 border-l-8 border-amber-500 rounded-md">Bordure gauche</div>
                    <div class="p-3 border-2 border-indigo-300 rounded-3xl shadow-sm">Rounded-3xl</div>
                    <div class="p-3 bg-purple-100 rounded-[2rem] border-2 border-purple-600">Coins personnalisés</div>
                </div>
                <pre><code>/* Exemples */
.card {
  border: 2px solid #ccc;
  border-radius: 16px;
}
.badge {
  border-bottom: 3px solid gold;
  border-radius: 20px;
}</code></pre>
                <p class="text-sm">✨ <strong>border-radius</strong> accepte jusqu'à 4 valeurs (top-left, top-right, bottom-right, bottom-left).</p>
            `
        },
        {
            type: "content",
            title: "✨ 5. Ombres : box-shadow & text-shadow",
            content: `
                <p>Ajoutez de la profondeur à vos blocs et textes avec les ombres CSS.</p>
                <div class="flex flex-col sm:flex-row gap-4 my-4">
                    <div class="p-4 bg-white rounded-xl shadow-md transition-all hover:shadow-xl text-center w-full">
                        <p><code>box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1)</code></p>
                        <div class="h-12 w-full bg-gradient-to-r from-cyan-400 to-blue-500 rounded-lg shadow-lg mt-2"></div>
                    </div>
                    <div class="p-4 bg-white rounded-xl text-center w-full">
                        <p class="text-2xl font-bold drop-shadow-lg" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.3);">Ombre portée texte</p>
                        <p class="text-sm"><code>text-shadow: 2px 2px 4px gray;</code></p>
                        <p class="mt-2 text-shadow-[0_2px_5px_rgba(0,0,0,0.2)]">Même effet subtil</p>
                    </div>
                </div>
                <pre><code>/* Syntaxe box-shadow : offset-x | offset-y | blur-radius | spread | couleur */
.shadow-card {
  box-shadow: 0 20px 25px -12px rgba(0,0,0,0.25);
}
.text-glow {
  text-shadow: 0 0 5px cyan, 0 0 10px blue;
}</code></pre>
                <div class="bg-yellow-50 p-2 rounded-md text-sm mt-2">💡 Les ombres peuvent être multiples (séparées par des virgules).</div>
            `
        },
        {
            type: "content",
            title: "📝 Exemple pratique combiné",
            content: `
                <p>Voici une carte stylisée qui utilise <strong>couleur HSL, unités relatives (rem), border-radius, background dégradé, box-shadow</strong>.</p>
                <div class="demo-box p-5 mt-3" style="background: #fff; border-radius: 1.5rem; box-shadow: 0 12px 28px rgba(0,0,0,0.1);">
                    <div style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); border-radius: 1rem; padding: 1rem; color: white;">
                        <h3 class="text-xl font-bold" style="text-shadow: 0 2px 3px black;">🌄 Carte design</h3>
                        <p style="font-size: 0.9rem;">Unité relative <code class="bg-white/20 px-1">rem</code> , <span style="background: rgba(255,255,255,0.2); padding: 0.2rem 0.6rem; border-radius: 30px;">border-radius</span> et ombre douce.</p>
                        <div class="mt-3 flex gap-2">
                            <div class="w-10 h-10 rounded-full bg-amber-400 shadow"></div>
                            <div class="w-10 h-10 rounded-full bg-sky-400 shadow"></div>
                            <div class="w-10 h-10 rounded-full bg-rose-400 shadow"></div>
                        </div>
                    </div>
                </div>
                <pre><code>.carte {
  background: linear-gradient(135deg, #0f2027, #2c5364);
  border-radius: 1.5rem;
  box-shadow: 0 12px 28px rgba(0,0,0,0.2);
  color: white;
  padding: 1.5rem;
}</code></pre>
                <p class="mt-2">💪 À vous de jouer : combinez couleurs, unités relatives, fonds et bordures !</p>
            `
        },
        {
            type: "summary",
            title: "📌 Récapitulons !",
            points: [
                "Couleurs : nommées, hex, rgb/rgba, hsl/hsla → à adapter selon l’effet (transparence).",
                "Unités : privilégier rem pour les tailles de texte, % ou vw pour les largeurs flexibles, px pour les bordures fines.",
                "Fonds : background-color, image, repeat, position – permet des mises en scène riches.",
                "Bordures & border-radius : pour structurer, décorer ou créer des formes arrondies.",
                "Ombre : box-shadow (pour blocs) et text-shadow (pour textes) donnent du relief.",
                "Toujours penser responsive et accessibilité !"
            ]
        }
    ];

    let currentIndex = 0;
    let totalSlides = slidesData.length;

    // Fonction pour générer le HTML d'un slide selon son type
    function renderSlide(data, idx) {
        if (data.type === "title") {
            return `
                <div class="slide-card ${data.bgClass || 'bg-white'}">
                    <div class="slide-content text-center">
                        <span class="text-sm font-semibold text-blue-600 uppercase tracking-wide">CSS – Initiation</span>
                        <h1 class="text-3xl md:text-5xl font-extrabold mt-4 bg-gradient-to-r from-indigo-700 to-sky-600 bg-clip-text text-transparent">${data.title}</h1>
                        <p class="text-gray-600 text-lg mt-3">${data.subtitle}</p>
                        <div class="mt-8 flex justify-center">
                            <div class="w-16 h-1 bg-blue-400 rounded-full"></div>
                        </div>
                        <p class="text-gray-400 mt-6 text-sm">📖 Leçon 9 · Module couleurs/fonds/bordures/ombres</p>
                    </div>
                </div>
            `;
        } 
        else if (data.type === "objectives") {
            return `
                <div class="slide-card bg-white">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-3 mb-4">${data.title}</h2>
                        <ul class="space-y-3 mt-2">
                            ${data.objectives.map(obj => `<li class="flex items-start gap-2 text-gray-700"><span class="text-green-500 text-xl">✓</span> ${obj}</li>`).join('')}
                        </ul>
                        <div class="mt-6 p-3 bg-sky-50 rounded-xl text-sm italic">À la fin de cette leçon, vous saurez styliser des interfaces avec des couleurs et arrière-plans professionnels.</div>
                    </div>
                </div>
            `;
        }
        else if (data.type === "content") {
            return `
                <div class="slide-card bg-white">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-3">${data.title}</h2>
                        <div class="prose max-w-none text-gray-700">
                            ${data.content}
                        </div>
                    </div>
                </div>
            `;
        }
        else if (data.type === "summary") {
            return `
                <div class="slide-card bg-white">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">${data.title}</h2>
                        <ul class="space-y-2 list-disc pl-6 marker:text-blue-500">
                            ${data.points.map(p => `<li class="text-gray-700">${p}</li>`).join('')}
                        </ul>
                        <div class="mt-7 bg-green-50 p-4 rounded-2xl text-center text-green-800">
                            🎉 Félicitations ! Entraînez-vous sur des maquettes avec dégradés, ombres et unités flexibles.
                        </div>
                    </div>
                </div>
            `;
        }
        return `<div class="slide-card bg-white p-6">Contenu manquant</div>`;
    }

    function updateSlideAndIndicators() {
        const currentSlideData = slidesData[currentIndex];
        const htmlSlide = renderSlide(currentSlideData, currentIndex);
        $("#slides-wrapper").html(htmlSlide);
        
        // Mettre à jour les indicateurs
        let indicatorsHtml = '';
        for (let i = 0; i < totalSlides; i++) {
            let activeClass = (i === currentIndex) ? 'active bg-blue-500 w-8' : 'bg-gray-300 w-6';
            indicatorsHtml += `<button class="slide-indicator h-2 rounded-full transition-all duration-200 ${activeClass}" data-index="${i}"></button>`;
        }
        $("#indicators").html(indicatorsHtml);
        
        // Gestion clic indicateurs
        $(".slide-indicator").on("click", function() {
            let idx = parseInt($(this).data("index"));
            if (!isNaN(idx) && idx >= 0 && idx < totalSlides) {
                currentIndex = idx;
                updateSlideAndIndicators();
            }
        });
        
        // Désactiver les boutons si besoin
        $("#prevSlide").css("opacity", currentIndex === 0 ? 0.5 : 1).prop("disabled", currentIndex === 0);
        $("#nextSlide").css("opacity", currentIndex === totalSlides-1 ? 0.5 : 1).prop("disabled", currentIndex === totalSlides-1);
    }
    
    // Navigation
    $("#prevSlide").on("click", function() {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlideAndIndicators();
        }
    });
    $("#nextSlide").on("click", function() {
        if (currentIndex < totalSlides - 1) {
            currentIndex++;
            updateSlideAndIndicators();
        }
    });
    
    // Initialisation
    updateSlideAndIndicators();

    // Petit bonus : touches clavier gauche/droite pour naviguer
    $(document).on("keydown", function(e) {
        if (e.key === "ArrowLeft") {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlideAndIndicators();
            }
        } else if (e.key === "ArrowRight") {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlideAndIndicators();
            }
        }
    });
</script>
<footer class="text-center text-gray-400 py-6 text-xs">
    Cours CSS pour Développement Web – Enseignant Cameroun | Leçon 9 : Couleurs, Unités, Fonds, Bordures & Ombres | Design responsive & accessible
</footer>
</body>
</html>
