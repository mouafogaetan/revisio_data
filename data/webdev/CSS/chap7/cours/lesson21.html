<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 21 : Images responsives & unités fluides | Cours CSS</title>
    <!-- Tailwind CSS v3 + CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour d'éventuelles formules mathématiques, mais peu utilisé ici, on l'inclut proprement) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Transition douce entre slides et réglages personnalisés pour lisibilité */
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.2s ease;
        }
        .fade-out {
            opacity: 0;
            transform: translateX(10px);
        }
        .fade-in {
            opacity: 1;
            transform: translateX(0);
        }
        /* personnalisation du scroll et focus pour accessibilité */
        :focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
        /* couleurs douces mais contrastées */
        body {
            background: #f8fafc;
        }
        .card-slide {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(0px);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        @media (max-width: 640px) {
            .card-slide {
                border-radius: 1.5rem;
                padding: 1.25rem;
            }
            .btn-nav {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50 font-sans antialiased">

    <!-- Conteneur principal avec espacement sécurisé -->
    <div class="min-h-screen flex flex-col items-center justify-center px-4 py-6 md:py-10">
        <div class="w-full max-w-4xl mx-auto">
            
            <!-- Affichage dynamique des slides via jQuery -->
            <div id="slides-container" class="relative">
                <!-- Les slides seront injectées ici -->
            </div>

            <!-- Navigation + indicateur de progression -->
            <div class="flex flex-wrap items-center justify-between mt-6 gap-3 bg-white/60 backdrop-blur-sm rounded-2xl p-3 shadow-md">
                <button id="prevSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-xl transition-all disabled:opacity-40 disabled:cursor-not-allowed shadow-sm">◀ Précédent</button>
                <div class="text-sm font-medium text-gray-700 bg-gray-100 px-4 py-1.5 rounded-full">
                    Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
                </div>
                <button id="nextSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-xl transition-all disabled:opacity-40 disabled:cursor-not-allowed shadow-sm">Suivant ▶</button>
            </div>

            <!-- Petit rappel de la matière -->
            <div class="text-center text-xs text-gray-500 mt-4">
                📘 Matière: Initiation au CSS | Classe: Développement Web | Leçon 21: Images responsives & unités fluides
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // Données de la leçon 21 (basé sur l'objectif de la lesson21)
        // D'après le JSON: lesson21 -> ObjectifsLesson:
        // index0: "Rendre les images responsives avec max-width: 100%"
        // index1: "Utiliser les unités relatives (%, vw, vh, em, rem) pour des layouts fluides"
        // index2: "Maîtriser l'attribut srcset et la balise picture (en lien avec HTML)"
        // Nous construisons 5 slides : 1 titre, 2 objectifs, puis 3 slides de contenu détaillé.
        // --------------------------------------------------------------
        
        const lessonData = {
            title: "Images responsives & unités fluides",
            subtitle: "CSS moderne pour des sites adaptatifs sur tous les écrans",
            objectives: [
                "📱 Rendre les images responsives avec la règle <code class='bg-gray-200 px-1 rounded'>max-width: 100%</code> et hauteur auto.",
                "📏 Utiliser les unités relatives (%, vw, vh, em, rem) pour créer des layouts fluides et accessibles.",
                "🖼️ Maîtriser les attributs <code class='bg-gray-200 px-1 rounded'>srcset</code> et la balise <code class='bg-gray-200 px-1 rounded'>&lt;picture&gt;</code> pour adapter les images selon la résolution."
            ],
            contentSlides: [
                {
                    title: "📸 1. Images responsives : max-width 100%",
                    body: `<p class="mb-3 text-gray-800">Sur le web mobile, une image trop large dépasse l’écran et oblige l’utilisateur à scroller horizontalement. La solution simple et puissante :</p>
                    <div class="bg-gray-900 text-green-300 p-3 rounded-lg font-mono text-sm overflow-x-auto my-3">
                        img { max-width: 100%; height: auto; }
                    </div>
                    <p class="mb-2"><span class="font-semibold">🔍 Explication :</span> <code class="bg-gray-200 px-1">max-width: 100%</code> garantit que l'image ne dépasse jamais la largeur de son conteneur. <code class="bg-gray-200 px-1">height: auto</code> conserve les proportions naturelles. Résultat : l'image rétrécit sur mobile et grandit sur desktop sans distorsion.</p>
                    <div class="bg-indigo-50 p-3 rounded-xl border-l-4 border-indigo-400 mt-2">
                        💡 <strong>Astuce pédagogique :</strong> Essayez de redimensionner la fenêtre de votre navigateur, l'image ci-dessous suit la largeur sans dépasser !
                    </div>
                    <div class="mt-4 flex justify-center">
                        <!-- Exemple d'image dessinée via CSS? Pour rester cohérent sans vraie image, on utilise une zone de démo SVG dessinée "maison" -->
                        <svg width="100%" height="auto" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" style="max-width:100%; height:auto; border-radius: 1rem; box-shadow: 0 4px 8px rgba(0,0,0,0.1);" class="border">
                            <rect width="400" height="200" fill="#e0e7ff" rx="12" />
                            <text x="200" y="90" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e3a8a">📱 Image responsive</text>
                            <text x="200" y="130" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">max-width:100% + height:auto</text>
                            <circle cx="100" cy="100" r="30" fill="#3b82f6" opacity="0.7" />
                            <circle cx="300" cy="110" r="25" fill="#a855f7" opacity="0.7" />
                        </svg>
                    </div>`
                },
                {
                    title: "📏 2. Unités relatives : %, vw, vh, em, rem",
                    body: `<p class="mb-3">Contrairement aux pixels fixes (<code class="bg-gray-200 px-1">px</code>), les unités relatives s'adaptent au contexte :</p>
                    <ul class="list-disc pl-6 space-y-2 text-gray-800">
                        <li><strong class="text-indigo-700">%</strong> : relative à l'élément parent (largeur, hauteur, marge...).</li>
                        <li><strong class="text-indigo-700">vw / vh</strong> : 1vw = 1% de la largeur de la fenêtre, 1vh = 1% de la hauteur. Parfait pour des sections pleine largeur.</li>
                        <li><strong class="text-indigo-700">em</strong> : relatif à la taille de police de l'élément parent (ex: 2em = 2 fois la taille courante).</li>
                        <li><strong class="text-indigo-700">rem</strong> : relatif à la taille de police racine (généralement 16px). Plus prévisible pour accessibilité.</li>
                    </ul>
                    <div class="bg-gray-100 p-3 rounded-lg my-3 text-sm">
                        🌟 <span class="font-mono">width: 80%; padding: 2rem; font-size: 1.2rem;</span> → bloc flexible qui s'adapte aux écrans.
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2 text-center text-sm">
                        <div class="bg-white p-2 rounded shadow-sm border" style="width: 50%; margin:0 auto;">50% du parent</div>
                        <div class="bg-white p-2 rounded shadow-sm border" style="width: 30vw;">30vw (30% de l'écran)</div>
                    </div>
                    <p class="mt-3 text-sm italic">📐 En responsive, mélangez % / vw / rem pour des interfaces fluides !</p>`
                },
                {
                    title: "🖼️ 3. srcset & balise picture — Images adaptatives",
                    body: `<p class="mb-2">Pour servir des images différentes selon la taille d'écran ou la résolution, on utilise <code class="bg-gray-200 px-1">srcset</code> et <code class="bg-gray-200 px-1">&lt;picture&gt;</code>.</p>
                    <div class="bg-gray-900 text-green-200 p-3 rounded-md overflow-x-auto my-3 text-sm">
                        &lt;img src="petite.jpg" srcset="moyenne.jpg 800w, grande.jpg 1200w" sizes="(max-width: 600px) 100vw, 50vw" alt="exemple"&gt;
                    </div>
                    <p><span class="font-bold">🎯 Explication :</span> Le navigateur choisit la meilleure image selon la largeur de l'écran et la densité de pixels.</p>
                    <div class="bg-amber-50 p-3 rounded-md border-l-4 border-amber-500 my-2">
                        <span class="font-semibold">📸 Balise picture :</span> permet des changements d'image selon media queries (ex: orientation, art direction).
                    </div>
                    <pre class="bg-gray-800 text-gray-200 p-3 rounded text-xs overflow-x-auto">&lt;picture&gt;
  &lt;source media="(max-width: 700px)" srcset="image-petite.jpg"&gt;
  &lt;source media="(min-width: 701px)" srcset="image-grande.jpg"&gt;
  &lt;img src="fallback.jpg" alt="description"&gt;
&lt;/picture&gt;</pre>
                    <p class="mt-3 text-gray-700">✅ Avantage : économie de bande passante, meilleur temps de chargement mobile, et images toujours nettes.</p>
                    <div class="flex justify-center mt-2 text-xs text-gray-500 italic border-t pt-2">Illustration d'une structure "picture" : dessin conceptuel</div>
                    <!-- petit dessin SVG qui illustre les médias queries -->
                    <svg width="100%" height="70" viewBox="0 0 500 50" xmlns="http://www.w3.org/2000/svg" class="mt-2">
                        <rect x="10" y="10" width="100" height="30" fill="#3b82f6" rx="5" />
                        <text x="60" y="31" fill="white" font-size="11" text-anchor="middle">mobile</text>
                        <line x1="120" y1="25" x2="180" y2="25" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" />
                        <rect x="190" y="10" width="120" height="30" fill="#a855f7" rx="5" />
                        <text x="250" y="31" fill="white" font-size="11" text-anchor="middle">tablette</text>
                        <line x1="320" y1="25" x2="370" y2="25" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" />
                        <rect x="380" y="10" width="100" height="30" fill="#10b981" rx="5" />
                        <text x="430" y="31" fill="white" font-size="11" text-anchor="middle">desktop</text>
                    </svg>`
                },
                {
                    title: "✨ Application pratique & bonnes pratiques",
                    body: `<p class="mb-3">🛠️ <span class="font-semibold">Mise en situation :</span> Construisez une galerie flexible en combinant <code class="bg-gray-200 px-1">max-width:100%</code> et unités relatives.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                        <div class="bg-white p-3 rounded-xl shadow">
                            <div class="font-bold text-indigo-800">✅ DO :</div>
                            <ul class="list-disc pl-5 text-sm">
                                <li>Utiliser <code>max-width:100%</code> sur toutes les images.</li>
                                <li>Préférer <code>rem</code> pour les tailles de police.</li>
                                <li>Définir des largeurs en % pour les colonnes.</li>
                                <li>Tester srcset sur les projets riches en médias.</li>
                            </ul>
                        </div>
                        <div class="bg-white p-3 rounded-xl shadow">
                            <div class="font-bold text-rose-700">❌ ÉVITER :</div>
                            <ul class="list-disc pl-5 text-sm">
                                <li>Images avec <code>width</code> fixe en px sans contrainte.</li>
                                <li>Oublier le viewport meta.</li>
                                <li>Utiliser trop de <code>vw</code> pour le texte (problème de zoom).</li>
                            </ul>
                        </div>
                    </div>
                    <div class="mt-5 p-3 bg-gradient-to-r from-indigo-100 to-sky-100 rounded-xl">
                        <p class="text-sm">🧪 <strong>Expérimentation :</strong> Redimensionnez votre navigateur. Le bloc ci-dessous change de largeur selon l'écran, et l'image SVG "responsive" reste dans son conteneur.</p>
                        <div class="w-full bg-white p-2 rounded mt-1 text-center text-sm" style="width: 90%; margin: 8px auto;">bloc fluide width: 90%</div>
                    </div>`
                }
            ]
        };

        // Construction des slides: 
        // Slide 0 : Titre + accroche
        // Slide 1 : Objectifs (reprenant les 3 objectifs détaillés)
        // Slides 2 à 5 = les 4 slides de contenu (contentSlides)
        const slidesArray = [];

        // Slide 0 - Titre
        slidesArray.push(`
            <div class="slide card-slide bg-white rounded-3xl p-6 md:p-8 shadow-xl w-full transition-all">
                <div class="flex flex-col items-center text-center">
                    <span class="text-indigo-500 font-mono text-sm bg-indigo-100 px-3 py-1 rounded-full">Leçon 21 · CSS avancé</span>
                    <h1 class="text-3xl md:text-5xl font-extrabold mt-4 bg-gradient-to-r from-indigo-700 to-sky-600 bg-clip-text text-transparent">${lessonData.title}</h1>
                    <p class="text-gray-600 text-lg mt-3 max-w-lg">${lessonData.subtitle}</p>
                    <div class="mt-8 w-24 h-1 bg-indigo-300 rounded-full mx-auto"></div>
                    <div class="mt-6 flex gap-3 text-gray-500 text-sm">
                        <span>🎯 Classe: Développement Web</span>
                        <span>📘 Module: Initiation au CSS</span>
                    </div>
                    <div class="mt-8 p-4 bg-indigo-50 rounded-2xl inline-block">
                        <svg class="w-12 h-12 text-indigo-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                </div>
            </div>
        `);

        // Slide 1 - Objectifs (affichage des objectifs depuis lessonData objectives + enrichi)
        const objectivesHtml = lessonData.objectives.map(obj => `<li class="mb-3 flex items-start gap-2"><span class="text-indigo-600 text-xl">✓</span> <span class="text-gray-800">${obj}</span></li>`).join('');
        slidesArray.push(`
            <div class="slide card-slide bg-white rounded-3xl p-6 md:p-8 shadow-xl w-full">
                <div class="border-b pb-3 mb-4 border-indigo-200">
                    <h2 class="text-2xl md:text-3xl font-bold text-indigo-800">🎯 Objectifs de la leçon</h2>
                    <p class="text-gray-500 text-sm">À la fin de ce cours, vous serez capable de :</p>
                </div>
                <ul class="space-y-2 mt-4">
                    ${objectivesHtml}
                </ul>
                <div class="mt-8 bg-gray-50 p-4 rounded-xl text-sm italic text-gray-600">
                    💡 Ces compétences sont essentielles pour créer des sites web qui s'adaptent à tous les mobiles, tablettes et ordinateurs.
                </div>
            </div>
        `);

        // Slides de contenu (lessonData.contentSlides)
        lessonData.contentSlides.forEach((slide, idx) => {
            slidesArray.push(`
                <div class="slide card-slide bg-white rounded-3xl p-6 md:p-8 shadow-xl w-full">
                    <h2 class="text-xl md:text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${slide.title}</h2>
                    <div class="prose prose-sm max-w-none text-gray-700">
                        ${slide.body}
                    </div>
                    <div class="mt-6 text-xs text-right text-gray-400">Chapitre 7 · Leçon 21 — step ${idx+1}/${lessonData.contentSlides.length}</div>
                </div>
            `);
        });

        // Ajouter éventuellement slide de conclusion récapitulative (optionnel pour bien finir)
        slidesArray.push(`
            <div class="slide card-slide bg-white rounded-3xl p-6 md:p-8 shadow-xl w-full">
                <h2 class="text-2xl font-bold text-indigo-700 mb-3">🏁 Récapitulatif & défi</h2>
                <p class="mb-2">Vous maîtrisez désormais :</p>
                <ul class="list-disc pl-6 space-y-1">
                    <li>L'utilisation de <strong>max-width:100%</strong> pour des images souples</li>
                    <li>Les unités relatives (<strong>%, vw, vh, em, rem</strong>) pour des layouts fluides</li>
                    <li>Les techniques avancées <strong>srcset / picture</strong> pour l'affichage adaptatif</li>
                </ul>
                <div class="bg-green-50 p-4 rounded-xl mt-5 border border-green-200">
                    ⚡ <strong>Mini projet :</strong> Prenez une page existante, rendez toutes les images responsives, et remplacez des largeurs fixes par des % / vw. Testez avec les outils développeur (mode responsive).
                </div>
                <div class="mt-6 text-center text-indigo-500 text-sm">✨ Félicitations, vous progressez vers le CSS professionnel !</div>
            </div>
        `);

        // Injection des slides dans le DOM
        const container = $("#slides-container");
        container.empty();
        slidesArray.forEach((slideHtml, i) => {
            const slideDiv = $(`<div class="slide-wrapper" data-index="${i}" style="display: none;">${slideHtml}</div>`);
            container.append(slideDiv);
        });

        let currentIndex = 0;
        const total = slidesArray.length;
        $("#totalSlides").text(total);

        function updateSlidesVisibility() {
            $(".slide-wrapper").each(function(idx) {
                if (idx === currentIndex) {
                    $(this).fadeIn(200).css("display", "block");
                } else {
                    $(this).hide();
                }
            });
            $("#currentSlideIdx").text(currentIndex + 1);
            $("#prevSlide").prop("disabled", currentIndex === 0);
            $("#nextSlide").prop("disabled", currentIndex === total - 1);
        }

        // Animation lors du changement: ajout d'une micro-transition douce (effet)
        function changeSlide(delta) {
            const newIndex = currentIndex + delta;
            if (newIndex < 0 || newIndex >= total) return;
            // petite animation de fondu
            const currentWrapper = $(`.slide-wrapper[data-index="${currentIndex}"]`);
            currentWrapper.addClass("fade-out");
            setTimeout(() => {
                currentIndex = newIndex;
                updateSlidesVisibility();
                const newWrapper = $(`.slide-wrapper[data-index="${currentIndex}"]`);
                newWrapper.find(".slide").addClass("fade-in");
                setTimeout(() => {
                    newWrapper.find(".slide").removeClass("fade-out fade-in");
                }, 150);
                currentWrapper.removeClass("fade-out");
            }, 100);
        }

        // Événements
        $("#nextSlide").on("click", () => changeSlide(1));
        $("#prevSlide").on("click", () => changeSlide(-1));

        // Gestion du clavier : flèches droite/gauche pour naviguer
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowRight") {
                changeSlide(1);
                e.preventDefault();
            } else if (e.key === "ArrowLeft") {
                changeSlide(-1);
                e.preventDefault();
            }
        });

        // initialisation
        updateSlidesVisibility();
        
        // Appliquer le style global et éventuellement forcer le redimensionnement des SVG et images
        $(window).on('resize', function() {
            // Rien de spécial, mais pour les éléments SVG ils sont déjà responsives
        });
        
        // petite touche pour rendre toutes les images (ou SVG) déjà fluides via une classe supplémentaire
        $("<style> .slide img, .slide svg { max-width: 100%; height: auto; } </style>").appendTo("head");
        console.log("Leçon 21 prête — Images responsives et unités fluides");
    </script>
</body>
</html>
