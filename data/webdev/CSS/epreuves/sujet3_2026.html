<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au CSS",
  "classe": "Développement Web",
  "sequence": "Séquence 3 : Maîtrise des propriétés CSS et des techniques de mise en page",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "QCM - Concepts fondamentaux du CSS et sélecteurs",
      "points": "6 pts",
      "enonce": "Pour chacune des questions suivantes, choisissez la ou les bonnes réponses (une seule réponse par question).",
      "questions": [
        {
          "question": "1. Quelle est la meilleure pratique pour intégrer du CSS dans une page web ?<br>A) CSS en ligne avec l'attribut style<br>B) CSS interne avec la balise &lt;style&gt;<br><strong>C) CSS externe avec la balise &lt;link&gt;</strong><br>D) CSS directement dans le contenu HTML",
          "reponse": "<strong>C) CSS externe avec la balise &lt;link&gt;</strong> - Le CSS externe permet de séparer le contenu (HTML) de la présentation (CSS), ce qui facilite la maintenance et le référencement."
        },
        {
          "question": "2. Quel sélecteur CSS permet de cibler un élément ayant l'ID 'menu' ?<br>A) .menu<br><strong>B) #menu</strong><br>C) menu<br>D) *menu",
          "reponse": "<strong>B) #menu</strong> - Le sélecteur d'ID utilise le symbole # suivi du nom de l'ID. C'est le sélecteur le plus spécifique après le style en ligne."
        },
        {
          "question": "3. Quelle propriété CSS permet de définir la couleur de fond d'un élément ?<br>A) color<br><strong>B) background-color</strong><br>C) font-color<br>D) bg-color",
          "reponse": "<strong>B) background-color</strong> - background-color définit la couleur de fond d'un élément. color définit la couleur du texte."
        },
        {
          "question": "4. Quelle est la spécificité (poids) correcte des sélecteurs suivants, du plus spécifique au moins spécifique ?<br>A) #id > .classe > balise<br>B) balise > .classe > #id<br><strong>C) #id > .classe > balise</strong><br>D) .classe > balise > #id",
          "reponse": "<strong>C) #id > .classe > balise</strong> - Les sélecteurs d'ID (100) sont plus spécifiques que les classes (10) qui sont plus spécifiques que les balises (1)."
        },
        {
          "question": "5. La pseudo-classe :hover permet de :<br><strong>A) Appliquer un style quand la souris survole l'élément</strong><br>B) Appliquer un style quand l'élément est cliqué<br>C) Appliquer un style au premier élément enfant<br>D) Appliquer un style à l'élément avant un autre",
          "reponse": "<strong>A) Appliquer un style quand la souris survole l'élément</strong> - :hover est utilisée pour créer des effets interactifs comme les changements de couleur ou les animations au survol."
        },
        {
          "question": "6. Que signifie display: none ?<br>A) L'élément est invisible mais occupe toujours de l'espace<br><strong>B) L'élément est complètement supprimé du flux et n'occupe pas d'espace</strong><br>C) L'élément est affiché en ligne<br>D) L'élément est affiché en bloc",
          "reponse": "<strong>B) L'élément est complètement supprimé du flux et n'occupe pas d'espace</strong> - display: none cache complètement l'élément et le retire du flux de la page, contrairement à visibility: hidden qui le cache mais conserve l'espace."
        }
      ]
    },
    {
      "titre": "Questions théoriques",
      "points": "8 pts",
      "enonce": "Répondez de manière précise et structurée aux questions suivantes.",
      "questions": [
        {
          "question": "1. Expliquez la différence entre margin et padding en CSS. Donnez un exemple d'utilisation pour chacun. (2 pts)",
          "reponse": "<strong>Margin :</strong> L'espace externe autour d'un élément. Il sépare l'élément des autres éléments voisins. <em>Exemple : margin: 20px; pour créer un espace de 20px entre deux cartes.</em><br><br><strong>Padding :</strong> L'espace interne entre le contenu d'un élément et sa bordure. Il éloigne le contenu des bords. <em>Exemple : padding: 15px; pour aérer le texte à l'intérieur d'un bouton.</em><br><br><strong>Différence clé :</strong> margin est externe (entre les éléments), padding est interne (entre le contenu et la bordure)."
        },
        {
          "question": "2. Qu'est-ce que la spécificité en CSS ? Comment calcule-t-on le poids d'un sélecteur ? (2 pts)",
          "reponse": "La <strong>spécificité</strong> est le mécanisme qui détermine quelle règle CSS s'applique lorsqu'il y a plusieurs règles qui ciblent le même élément. Elle se calcule comme suit :<br><br>• <strong>Style en ligne</strong> : 1000 points (poids maximum)<br>• <strong>ID</strong> : 100 points chacun (ex: #menu)<br>• <strong>Classe, pseudo-classe, attribut</strong> : 10 points chacun (ex: .maClasse, :hover)<br>• <strong>Balise (type), pseudo-élément</strong> : 1 point chacun (ex: div, ::before)<br><br><strong>Exemple :</strong> #menu .item a → 100 + 10 + 1 = 111 points"
        },
        {
          "question": "3. Décrivez le modèle de boîte (box model) en CSS. Quelles sont les 4 zones qui le composent ? (2 pts)",
          "reponse": "Le <strong>modèle de boîte</strong> est la base du dimensionnement en CSS. Chaque élément HTML est une boîte rectangulaire composée de 4 zones :<br><br>1. <strong>Contenu (content)</strong> : le texte ou l'image à l'intérieur de l'élément<br>2. <strong>Padding (rembourrage)</strong> : espace entre le contenu et la bordure<br>3. <strong>Border (bordure)</strong> : le contour de l'élément<br>4. <strong>Margin (marge)</strong> : espace externe entre la bordure et les autres éléments<br><br>La taille totale de l'élément = largeur + padding + border + margin (hors box-sizing)."
        },
        {
          "question": "4. Quelle est la différence entre un élément block et un élément inline ? Donnez un exemple pour chaque type. (2 pts)",
          "reponse": "<strong>Élément block :</strong><br>• Occupe toute la largeur disponible<br>• Commence sur une nouvelle ligne<br>• Accepte width, height, margin, padding<br>• <em>Exemples :</em> &lt;div&gt;, &lt;p&gt;, &lt;h1&gt;, &lt;section&gt;<br><br><strong>Élément inline :</strong><br>• N'occupe que la largeur de son contenu<br>• Ne commence pas sur une nouvelle ligne<br>• Ne prend pas en compte width et height (sauf cas particuliers)<br>• <em>Exemples :</em> &lt;span&gt;, &lt;a&gt;, &lt;em&gt;, &lt;strong&gt;"
        }
      ]
    },
    {
      "titre": "Exercice pratique - Mise en page avec Flexbox",
      "points": "6 pts",
      "enonce": "Vous devez créer une barre de navigation responsive pour un site web d'une entreprise camerounaise utilisant Flexbox.",
      "questions": [
        {
          "question": "1. Écrivez le code HTML d'une barre de navigation contenant : un logo à gauche et une liste de liens (Accueil, Services, À propos, Contact) à droite. (1 pt)",
          "reponse": "&lt;nav class=\"navbar\"&gt;\n    &lt;div class=\"logo\"&gt;MonEntreprise&lt;/div&gt;\n    &lt;ul class=\"nav-links\"&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;Accueil&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;Services&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;À propos&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href=\"#\"&gt;Contact&lt;/a&gt;&lt;/li&gt;\n    &lt;/ul&gt;\n&lt;/nav&gt;"
        },
        {
          "question": "2. Écrivez le CSS pour : (3 pts)<br>• La barre de navigation doit utiliser Flexbox<br>• Les liens doivent être en ligne (horizontal)<br>• La barre doit avoir un fond bleu foncé, un padding de 15px<br>• Les liens doivent être en blanc avec un espacement de 20px entre eux<br>• Au survol, les liens changent de couleur (jaune)",
          "reponse": ".navbar {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    background-color: #1e3a5f;\n    padding: 15px 30px;\n}\n\n.logo {\n    color: white;\n    font-size: 24px;\n    font-weight: bold;\n}\n\n.nav-links {\n    display: flex;\n    list-style: none;\n    gap: 20px;\n}\n\n.nav-links li a {\n    color: white;\n    text-decoration: none;\n    font-size: 16px;\n    transition: color 0.3s;\n}\n\n.nav-links li a:hover {\n    color: #fcd34d;\n}"
        },
        {
          "question": "3. Rendez la barre de navigation responsive (mobile-first) : sur les écrans de moins de 768px, le menu doit se cacher (display: none) et un bouton hamburger doit apparaître. (2 pts)",
          "reponse": "/* Hamburger button en HTML */\n/* &lt;button class=\"hamburger\"&gt;☰&lt;/button&gt; */\n\n.hamburger {\n    display: none;\n    font-size: 28px;\n    color: white;\n    background: none;\n    border: none;\n    cursor: pointer;\n}\n\n@media (max-width: 768px) {\n    .hamburger {\n        display: block;\n    }\n    \n    .nav-links {\n        display: none;\n        flex-direction: column;\n        width: 100%;\n        gap: 10px;\n    }\n    \n    .navbar {\n        flex-wrap: wrap;\n    }\n    \n    .nav-links.active {\n        display: flex;\n    }\n}"
        }

    {
      "titre": "Mini-projet - Page d'accueil stylisée",
      "points": "10 pts",
      "enonce": "Vous êtes intégrateur web pour une startup camerounaise. Vous devez créer la page d'accueil d'un site de présentation. Utilisez CSS Grid pour la structure et les propriétés vues en cours.",
      "questions": [

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
