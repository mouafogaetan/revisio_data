<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au CSS",
  "classe": "Développement Web",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Fondamentaux du CSS",
      "points": "6 pts",
      "enonce": "<p>Cet exercice porte sur les concepts fondamentaux du CSS vus dans les leçons 1, 2 et 3. Répondez aux questions suivantes de manière précise.</p>",
      "questions": [
        {
          "question": "1) Définissez le CSS et expliquez son rôle dans la création de pages web. Pourquoi dit-on que le CSS permet la séparation du fond et de la forme ?",
          "reponse": "Le CSS (Cascading Style Sheets) est un langage de feuilles de style qui permet de décrire la présentation des documents HTML et XML. Il définit l'apparence des éléments : couleurs, polices, mise en page, etc. La séparation du fond et de la forme signifie que le HTML (structure et contenu) est séparé du CSS (présentation et style). Cette séparation permet de modifier l'apparence d'un site sans toucher à son contenu, facilite la maintenance et permet de réutiliser les mêmes styles sur plusieurs pages."
        },
        {
          "question": "2) Citez les trois méthodes d'intégration du CSS dans une page HTML. Classez-les par ordre de préférence (du meilleur au moins bon) et justifiez votre classement.",
          "reponse": "Les trois méthodes d'intégration sont : <ul><li><strong>CSS externe</strong> (meilleur) : via la balise <code>&lt;link rel=\"stylesheet\" href=\"style.css\"&gt;</code> dans le <code>&lt;head&gt;</code>. Avantages : réutilisable sur plusieurs pages, facile à maintenir, meilleur pour les performances (mise en cache).</li><li><strong>CSS interne</strong> (moyen) : via la balise <code>&lt;style&gt;</code> dans le <code>&lt;head&gt;</code>. Avantages : utile pour des styles spécifiques à une page. Inconvénient : pas réutilisable.</li><li><strong>CSS en ligne</strong> (à éviter) : via l'attribut <code>style</code> sur un élément HTML. Avantages : spécifique à un élément. Inconvénients : difficile à maintenir, mélange structure et style, priorité excessive.</li></ul>"
        },
        {
          "question": "3) Expliquez la structure d'une règle CSS en donnant un exemple complet. Puis, avec le code HTML <code>&lt;div class=\"boite\" id=\"principale\"&gt;Contenu&lt;/div&gt;</code>, écrivez trois règles CSS différentes qui ciblent respectivement : la balise, la classe et l'id.",
          "reponse": "Une règle CSS est composée de trois parties : <ul><li><strong>Sélecteur</strong> : cible l'élément à styliser</li><li><strong>Propriété</strong> : aspect à modifier (color, font-size, etc.)</li><li><strong>Valeur</strong> : la nouvelle valeur de la propriété</li></ul>Exemple : <pre style='background: #2d3748; color: #e2e8f0; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85rem;'>div {<br>  color: blue;<br>  font-size: 16px;<br>}</pre>Pour l'élément donné : <ul><li><strong>Sélecteur de balise</strong> : <code>div { color: red; }</code></li><li><strong>Sélecteur de classe</strong> : <code>.boite { background-color: #f0f0f0; }</code></li><li><strong>Sélecteur d'id</strong> : <code>#principale { border: 2px solid black; }</code></li></ul>"
        }
      ]
    },
    {
      "titre": "Sélecteurs et Priorités",
      "points": "7 pts",
      "enonce": "<p>Cet exercice vous permet de tester vos connaissances sur les sélecteurs CSS et les règles de priorité vues dans les leçons 4, 5 et 6.</p>",
      "questions": [
        {
          "question": "1) Expliquez la différence entre un sélecteur descendant (espace) et un sélecteur enfant (>). Donnez un exemple concret pour chacun.",
          "reponse": "Le sélecteur descendant (espace) cible tous les éléments descendants, quel que soit leur niveau d'imbrication. Exemple : <code>ul li</code> cible tous les <code>li</code> à l'intérieur d'un <code>ul</code>, même s'ils sont dans une liste imbriquée. Le sélecteur enfant (<code>&gt;</code>) cible uniquement les éléments qui sont des enfants directs (premier niveau) du parent. Exemple : <code>ul &gt; li</code> cible seulement les <code>li</code> qui sont directement à l'intérieur d'un <code>ul</code>, pas ceux qui sont dans une sous-liste."
        },
        {
          "question": "2) Qu'est-ce qu'une pseudo-classe ? Donnez deux exemples de pseudo-classes d'état (interaction) et deux exemples de pseudo-classes structurelles en expliquant leur effet.",
          "reponse": "Une pseudo-classe est un mot-clé ajouté à un sélecteur qui cible un état ou une position particulière d'un élément. <strong>Pseudo-classes d'état (interaction) :</strong><ul><li><code>:hover</code> - s'applique quand la souris survole l'élément (ex: <code>a:hover { color: red; }</code>)</li><li><code>:focus</code> - s'applique quand l'élément est sélectionné (ex: <code>input:focus { border-color: blue; }</code>)</li></ul><strong>Pseudo-classes structurelles :</strong><ul><li><code>:first-child</code> - cible le premier enfant d'un parent (ex: <code>li:first-child { font-weight: bold; }</code>)</li><li><code>:nth-child(n)</code> - cible le n-ième enfant (ex: <code>tr:nth-child(even) { background: #f9f9f9; }</code> pour des lignes zébrées)</li></ul>"
        },
        {
          "question": "3) Calculez la spécificité des sélecteurs suivants et déterminez lequel est appliqué si les trois ciblent le même élément : <ul><li><code>#menu .item a</code></li><li><code>nav ul li a</code></li><li><code>a.lien</code></li></ul> Expliquez comment la spécificité est calculée.",
          "reponse": "Le calcul de spécificité suit la règle : (inline, id, classe, balise) : <ul><li><strong><code>#menu .item a</code></strong> : 1 id + 1 classe + 1 balise = (0, 1, 1, 1) → spécificité 111</li><li><strong><code>nav ul li a</code></strong> : 4 balises = (0, 0, 0, 4) → spécificité 4</li><li><strong><code>a.lien</code></strong> : 1 classe + 1 balise = (0, 0, 1, 1) → spécificité 11</li></ul>Le sélecteur avec la plus grande spécificité est <strong><code>#menu .item a</code></strong> (111), donc c'est lui qui sera appliqué. La règle est : plus il y a d'id, puis de classes, puis de balises, plus la spécificité est élevée."
        }
      ]
    },
    {
      "titre": "Analyse et Correction de Code",
      "points": "7 pts",
      "enonce": "<p>On vous donne le code HTML et CSS suivant. Analysez-le et répondez aux questions.</p><div style='background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem;'><span style='color: #f6ad55;'>/* HTML */</span><br>&lt;ul id=\"menu\"&gt;<br>  &lt;li class=\"actif\"&gt;Accueil&lt;/li&gt;<br>  &lt;li&gt;Services&lt;/li&gt;<br>  &lt;li&gt;Contact&lt;/li&gt;<br>&lt;/ul&gt;<br><br><span style='color: #f6ad55;'>/* CSS */</span><br>ul li {<br>  color: blue;<br>}<br><br>#menu li {<br>  color: red;<br>}<br><br>li.actif {<br>  color: green;<br>  font-weight: bold;<br>}<br><br>.actif {<br>  color: orange;<br>}<br><br>li {<br>  color: purple !important;<br>}</div>",
      "questions": [
        {
          "question": "1) Quelle couleur aura l'élément \"Accueil\" (celui avec la classe actif) ? Expliquez votre raisonnement en détaillant l'application des règles de priorité.",
          "reponse": "L'élément \"Accueil\" aura la couleur <strong>purple</strong>. Voici le raisonnement : <ul><li><code>ul li</code> : spécificité (0,0,0,2) → bleu</li><li><code>#menu li</code> : spécificité (0,1,0,1) → rouge</li><li><code>li.actif</code> : spécificité (0,0,1,1) → vert</li><li><code>.actif</code> : spécificité (0,0,1,0) → orange</li><li><code>li</code> avec <code>!important</code> : spécificité la plus haute à cause de !important → pourpre</li></ul>Le <code>!important</code> sur <code>li</code> a la priorité absolue sur toutes les autres règles, donc la couleur pourpre s'applique. Sans ce !important, la règle <code>#menu li</code> (rouge) aurait été appliquée car elle a la plus forte spécificité parmi les règles sans !important."
        },
        {
          "question": "2) Proposez une correction du CSS pour que l'élément avec la classe \"actif\" soit en vert gras, et les autres éléments du menu en bleu. Écrivez le CSS corrigé.",
          "reponse": "CSS corrigé : <pre style='background: #2d3748; color: #e2e8f0; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85rem;'>#menu li {<br>  color: blue;<br>}<br><br>#menu li.actif {<br>  color: green;<br>  font-weight: bold;<br>}</pre>Maintenant, la spécificité de <code>#menu li.actif</code> (0,1,1,1) est supérieure à <code>#menu li</code> (0,1,0,1), donc l'élément actif sera vert gras et les autres bleus."
        },
        {
          "question": "3) Ajoutez une règle CSS qui modifie le comportement des éléments de la liste au survol (hover) : tous les éléments deviennent soulignés. Utilisez un sélecteur approprié.",
          "reponse": "La règle à ajouter est : <pre style='background: #2d3748; color: #e2e8f0; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85rem;'>#menu li:hover {<br>  text-decoration: underline;<br>}</pre>Ce sélecteur cible tous les <code>li</code> à l'intérieur de <code>#menu</code> au survol, ce qui donne le comportement souhaité."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
