<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au CSS",
  "classe": "Développement Web",
  "sequence": "Évaluation Séquentielle 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de Cours",
      "points": "8 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Répondez de manière claire et précise aux questions suivantes. Ces questions portent sur l'ensemble des chapitres vus en Initiation au CSS : des bases de la syntaxe à l'utilisation de <strong>Flexbox</strong>, en passant par le <strong>modèle de boîte</strong> et les <strong>Media Queries</strong>.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1) Définir le CSS et son rôle dans la mise en forme des pages web.</strong></p><p>Expliquez ce qu'est le CSS (Cascading Style Sheets) et quel est son rôle principal dans la création de pages web. Pourquoi est-il essentiel de séparer le fond (CSS) de la forme (HTML) ? [citation:4][citation:3]</p></div>",
          "reponse": "<div><p>Le CSS (Cascading Style Sheets) est un langage de feuille de style utilisé pour décrire la présentation d'un document écrit en HTML ou XML [citation:6]. Son rôle principal est de contrôler l'apparence des éléments HTML : couleurs, polices, mise en page, animations, etc. [citation:2]. La séparation du fond et de la forme est essentielle car elle permet de :</p><ul><li>Modifier l'apparence d'un site entier en changeant un seul fichier CSS [citation:7].</li><li>Améliorer la maintenance et la réutilisabilité du code.</li><li>Faciliter l'accessibilité et l'adaptation du contenu à différents supports (écrans, impressions, etc.).</li></ul></div>"
        },
        {
          "question": "<div><p><strong>2) Les Sélecteurs et la Spécificité.</strong></p><p>a) Expliquez la différence entre un sélecteur de <strong>type</strong> (balise), un sélecteur de <strong>classe</strong> (<code>.maClasse</code>) et un sélecteur d'<strong>id</strong> (<code>#monId</code>). Donnez un exemple d'utilisation pour chacun.</p><p>b) En vous basant sur les règles de <strong>spécificité</strong> CSS, déterminez la couleur qui sera appliquée au paragraphe <code>&lt;p id='unique' class='important'&gt;Texte&lt;/p&gt;</code> avec les styles suivants :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px;'>p { color: blue; }<br>.important { color: orange; }<br>#unique { color: red; }</pre><p>Justifiez votre réponse. [citation:4][citation:2]</p></div>",
          "reponse": "<div><p>a) La différence réside dans leur niveau de spécificité et leur usage :</p><ul><li><strong>Sélecteur de type (balise) :</strong> Cible tous les éléments d'un type donné (ex: <code>p</code> pour tous les paragraphes). Exemple : <code>p { font-size: 16px; }</code>.</li><li><strong>Sélecteur de classe :</strong> Cible les éléments ayant un attribut <code>class</code> spécifique. Il est précédé d'un point (<code>.</code>). Exemple : <code>.maClasse { background-color: yellow; }</code>.</li><li><strong>Sélecteur d'id :</strong> Cible un élément unique avec un attribut <code>id</code> spécifique. Il est précédé d'un dièse (<code>#</code>). Exemple : <code>#monId { font-weight: bold; }</code>.</li></ul><p>b) La couleur du texte sera <strong>rouge</strong> (<code>red</code>). Justification : La spécificité se calcule comme suit : les sélecteurs d'<code>id</code> ont une valeur plus élevée que les classes, qui elles-mêmes ont une valeur plus élevée que les sélecteurs de type. Le sélecteur <code>#unique</code> est donc plus spécifique que <code>.important</code> et <code>p</code>, et sa règle s'applique.</p></div>"
        },
        {
          "question": "<div><p><strong>3) Le Modèle de Boîte.</strong></p><p>Décrivez les quatre (4) zones qui composent le modèle de boîte CSS en commençant par le contenu et en allant vers l'extérieur. Pour chacune, précisez son rôle et la propriété CSS associée. [citation:4]</p></div>",
          "reponse": "<div><p>Le modèle de boîte est composé de quatre zones concentriques [citation:4] :</p><ol><li><strong>Contenu :</strong> La zone où le texte, les images ou autres éléments sont affichés. Sa taille est définie par <code>width</code> et <code>height</code> (ou par le contenu).</li><li><strong>Padding (remplissage) :</strong> L'espace intérieur entre le contenu et la bordure. Il est défini par la propriété <code>padding</code> (ou <code>padding-top</code>, etc.). Il est transparent et agrandit la taille totale de la boîte.</li><li><strong>Border (bordure) :</strong> Une ligne qui entoure le padding et le contenu. Définie par <code>border</code> (avec ses sous-propriétés : <code>border-width</code>, <code>border-style</code>, <code>border-color</code>).</li><li><strong>Margin (marge) :</strong> L'espace extérieur entre la bordure et les autres éléments. Elle est définie par la propriété <code>margin</code> (ou <code>margin-top</code>, etc.). Elle est transparente et sert à créer des espaces entre les boîtes.</li></ol></div>"
        },
        {
          "question": "<div><p><strong>4) Les Media Queries.</strong></p><p>Expliquez le principe des Media Queries dans le cadre du Responsive Design. Donnez un exemple de code CSS qui modifie la couleur de fond d'une page en <span style='color: green;'>vert</span> lorsque la largeur de l'écran est inférieure ou égale à <code>768px</code>. [citation:2]</p></div>",
          "reponse": "<div><p>Les Media Queries permettent d'appliquer des styles CSS en fonction des caractéristiques de l'appareil ou de la fenêtre d'affichage (viewport), comme la largeur, la hauteur, l'orientation, etc. Elles sont au cœur du Responsive Design, car elles permettent d'adapter la mise en page pour offrir une expérience de navigation optimale sur tous les types d'écrans (ordinateur, tablette, mobile) [citation:2][citation:3].</p><p>Exemple de code :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px;'>@media (max-width: 768px) {<br>  body {<br>    background-color: green;<br>  }<br>}</pre><p>Ce code change la couleur de fond de la page en vert lorsque la largeur de l'écran est inférieure ou égale à 768 pixels.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Mise en Pratique - Animation CSS",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Vous allez maintenant mettre en pratique vos connaissances en CSS en écrivant du code. Suivez attentivement les consignes pour réaliser une animation simple.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>1) Code CSS pour une Animation.</strong></p><p>Écrire le code CSS nécessaire pour réaliser une animation nommée <code>bounce</code> qui fait <strong>bouger un élément de 100px vers le bas</strong> puis le ramène à sa position initiale. L'animation doit :</p><ul><li>Utiliser <code>@keyframes</code>.</li><li>Avoir une durée de <code>2s</code>.</li><li>S'exécuter une seule fois (<code>iteration-count: 1</code>).</li><li>Utiliser la fonction de temporisation (<code>ease-in-out</code>).</li><li>Cet élément est une <code>&lt;div&gt;</code> ayant la classe <code>box</code>.</li></ul><p>Vous devez fournir le code CSS complet pour les <code>@keyframes</code> et la classe <code>.box</code>. [citation:2]</p></div>",
          "reponse": "<div><p>Voici le code CSS pour l'animation demandée :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px;'>@keyframes bounce {<br>  0% {<br>    transform: translateY(0);<br>  }<br>  50% {<br>    transform: translateY(100px);<br>  }<br>  100% {<br>    transform: translateY(0);<br>  }<br>}<br><br>.box {<br>  width: 100px;<br>  height: 100px;<br>  background-color: #007bff;<br>  animation-name: bounce;<br>  animation-duration: 2s;<br>  animation-iteration-count: 1;<br>  animation-timing-function: ease-in-out;<br>}</pre></div>"
        },
        {
          "question": "<div><p><strong>2) Transformation et Transition.</strong></p><p>En vous basant sur l'exercice de l'animation, décrivez comment vous utiliseriez une <strong>transition</strong> pour réaliser un effet similaire (un déplacement) lorsqu'un utilisateur survole l'élément <code>.box</code> avec sa souris (pseudo-classe <code>:hover</code>).</p><p>Votre réponse doit inclure les propriétés CSS nécessaires (<code>transition</code> et <code>transform</code>) et expliquer la différence entre une <strong>animation</strong> et une <strong>transition</strong> en termes de déclenchement. [citation:2]</p></div>",
          "reponse": "<div><p>Pour réaliser le déplacement au survol avec une transition, on peut utiliser le code suivant :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px;'>.box {<br>  width: 100px;<br>  height: 100px;<br>  background-color: #007bff;<br>  transition: transform 2s ease-in-out;<br>}<br><br>.box:hover {<br>  transform: translateY(100px);<br>}</pre><p>La <strong>différence fondamentale</strong> est que :</p><ul><li><strong>Une animation</strong> (avec <code>@keyframes</code>) se déclenche automatiquement ou peut être contrôlée, et peut définir des étapes complexes (de 0% à 100%).</li><li><strong>Une transition</strong> est un changement d'état progressif qui se déclenche en réponse à une interaction de l'utilisateur (comme <code>:hover</code>), un changement de classe, ou un événement JavaScript.</li></ul></div>"
        },
        {
          "question": "<div><p><strong>3) Amélioration de l'Animation.</strong></p><p>Ajoutez un effet de <strong>rotation</strong> (<code>rotate</code>) à votre animation <code>bounce</code>.</p><p>Modifiez le code des <code>@keyframes</code> pour que l'élément tourne de <code>360deg</code> sur son axe pendant le mouvement. Écrivez le nouveau code des <code>@keyframes</code> et indiquez les changements apportés.</p></div>",
          "reponse": "<div><p>Le nouveau code des <code>@keyframes</code> avec l'effet de rotation serait :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px;'>@keyframes bounce {<br>  0% {<br>    transform: translateY(0) rotate(0deg);<br>  }<br>  50% {<br>    transform: translateY(100px) rotate(180deg);<br>  }<br>  100% {<br>    transform: translateY(0) rotate(360deg);<br>  }<br>}</pre><p>Les changements apportés :</p><ul><li>Ajout de la fonction <code>rotate()</code> à chaque étape.</li><li>Combinaison des transformations <code>translateY</code> et <code>rotate</code> dans une seule propriété <code>transform</code>.</li><li>L'élément tourne sur lui-même tout en se déplaçant verticalement, rendant l'effet plus dynamique.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Étude de Cas - Layout Flexbox",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Analyser le code CSS ci-dessous et répondre aux questions.</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px;'>.container {\n  display: flex;\n  flex-direction: row;\n  justify-content: space-around;\n  align-items: center;\n  height: 200px;\n  border: 2px solid #333;\n}</pre></div>",
      "questions": [
        {

          "reponse": "<div><p>Analyse ligne par ligne :</p><ul><li><code>display: flex;</code> : Active le mode Flexbox pour le conteneur. Ses enfants deviennent des éléments flexibles.</li><li><code>flex-direction: row;</code> : Définit l'axe principal comme horizontal (ligne). Les éléments s'alignent de gauche à droite.</li><li><code>justify-content: space-around;</code> : Aligne les éléments sur l'axe principal. L'espace disponible est réparti autour des éléments (un espace égal à gauche et à droite de chaque élément, ce qui double l'espace entre deux éléments).</li><li><code>align-items: center;</code> : Aligne les éléments sur l'axe transverse (vertical). Les éléments sont centrés verticalement dans le conteneur.</li><li><code>height: 200px;</code> : Fixe une hauteur au conteneur pour que l'alignement vertical (<code>center</code>) soit visible.</li></ul><p><strong>Comportement final :</strong> Les enfants de <code>.container</code> seront disposés horizontalement sur une seule ligne. Ils seront centrés verticalement et répartis avec un espace égal autour d'eux sur l'axe horizontal.</p></div>"

          "reponse": "<div><p>Le nouvel alignement des éléments sera à <strong>flex-start</strong>, c'est-à-dire qu'ils seront tassés à gauche du conteneur. La propriété <code>justify-content: flex-start;</code> remplace <code>space-around</code>.</p><p>Le sélecteur <code>.container</code> est un sélecteur de <strong>classe</strong>. Comme il est identique au premier (même sélecteur et même spécificité), la règle qui s'applique est celle qui apparaît en dernier dans le code (la cascade). L'ordre du code a donc plus d'importance que la spécificité dans ce cas précis, car les deux sélecteurs sont identiques.</p></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
