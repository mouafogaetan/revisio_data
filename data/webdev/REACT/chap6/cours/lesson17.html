<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à useRef",
    "contenu": "<div style='padding: 10px;'><p><code>useRef</code> est un hook React qui permet de créer une <strong>référence mutable</strong> qui persiste pendant toute la durée de vie du composant.</p><div style='background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 10px 0; color: #2c3e50; text-align: center;'>\n📦 <strong>useRef</strong> → 🔗 Référence mutable → 💾 Persiste sans re-rendu\n</div><p><strong>Deux cas d'usage principaux :</strong></p><ul><li>🎯 <strong>Accéder à un élément DOM</strong> (focus, scroll, mesure)</li><li>📝 <strong>Stocker une valeur qui persiste</strong> sans déclencher de re-rendu</li></ul><p>Contrairement à <code>useState</code>, modifier un <code>ref</code> ne provoque pas de re-rendu du composant.</p><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>📌 Analogie :</strong> useRef est comme une boîte que vous pouvez lire et modifier à tout moment, sans que React ne s'en rende compte.</p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons découvrir un hook très utile en React : useRef. Ce hook permet de créer une référence mutable qui persiste pendant toute la durée de vie du composant. Concrètement, useRef vous donne une boîte dans laquelle vous pouvez stocker n'importe quelle valeur, et cette valeur va survivre aux re-rendus. Contrairement à useState, modifier une référence avec useRef ne déclenche pas de re-rendu du composant. Il y a deux cas d'usage principaux : accéder directement à un élément du DOM pour le manipuler, ou stocker une valeur qui doit persister sans provoquer de re-rendu. C'est un outil très puissant dans certaines situations.",
    "note": "useRef est le hook pour les valeurs qui persistent sans re-rendu."
  },
  {
    "titre": "Syntaxe de useRef",
    "contenu": "<div style='padding: 10px;'><p>La syntaxe de <code>useRef</code> est simple et directe.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nimport { useRef } from 'react';\n\nfunction MonComposant() {\n  // Créer une référence avec une valeur initiale\n  const monRef = useRef(valeurInitiale);\n\n  // Lire la valeur\n  console.log(monRef.current);\n\n  // Modifier la valeur (ne déclenche pas de re-rendu)\n  monRef.current = nouvelleValeur;\n\n  return &lt;div&gt;...&lt;/div&gt;;\n}\n</pre><p><strong>Points clés :</strong></p><ul><li><code>useRef()</code> retourne un objet avec une propriété <code>current</code></li><li>La valeur initiale est optionnelle</li><li><code>current</code> est mutable (vous pouvez le modifier)</li><li>La modification de <code>current</code> ne déclenche <strong>pas</strong> de re-rendu</li></ul></div>",
    "texteParle": "La syntaxe de useRef est très simple. Vous importez le hook depuis React, puis vous l'appelez en lui passant éventuellement une valeur initiale. useRef vous retourne un objet qui a une propriété 'current'. C'est dans cette propriété que vous allez stocker votre valeur. Pour lire la valeur, vous utilisez monRef.current. Pour la modifier, vous faites monRef.current = nouvelleValeur. Et c'est tout ! L'important à retenir est que la modification de current ne déclenche pas de re-rendu, contrairement à useState. C'est ce qui fait la force de useRef pour certaines situations.",
    "note": "useRef retourne un objet avec une propriété current mutable."
  },
  {
    "titre": "Accéder à un élément DOM",
    "contenu": "<div style='padding: 10px;'><p>UseRef est souvent utilisé pour obtenir une référence directe à un élément DOM.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction InputFocus() {\n  const inputRef = useRef(null);\n\n  const focusInput = () => {\n    // Accéder directement à l'élément DOM\n    inputRef.current.focus();\n    inputRef.current.style.backgroundColor = '#e8f4fd';\n  };\n\n  return (\n    &lt;div&gt;\n      &lt;input ref={inputRef} type=\"text\" /&gt;\n      &lt;button onClick={focusInput}&gt;Focus sur l'input&lt;/button&gt;\n    &lt;/div&gt;\n  );\n}\n</pre><ul><li>On attache la ref à l'élément avec l'attribut <code>ref={inputRef}</code></li><li>Après le rendu, <code>inputRef.current</code> pointe vers l'élément DOM</li><li>On peut alors appeler des méthodes comme <code>focus()</code> ou lire des propriétés</li></ul></div>",
    "texteParle": "L'utilisation la plus courante de useRef est d'accéder directement à un élément du DOM. Vous créez une ref avec useRef(null), puis vous l'attachez à un élément JSX avec l'attribut ref={maRef}. Après le rendu, React remplit la propriété current de votre ref avec l'élément DOM correspondant. Vous pouvez alors appeler des méthodes DOM comme focus(), scrollIntoView(), ou lire des propriétés comme value ou offsetHeight. C'est très utile pour gérer le focus, les animations, ou mesurer des éléments. Dans cet exemple, on veut mettre le focus sur un champ de saisie quand on clique sur un bouton.",
    "note": "Les refs permettent de manipuler directement le DOM quand c'est nécessaire."
  },
  {
    "titre": "Stocker une valeur persistante",
    "contenu": "<div style='padding: 10px;'><p>UseRef permet de stocker des valeurs qui persistent sans déclencher de re-rendu.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction Chronometre() {\n  const [temps, setTemps] = useState(0);\n  const intervalRef = useRef(null);\n\n  const demarrer = () => {\n    intervalRef.current = setInterval(() => {\n      setTemps(t => t + 1);\n    }, 1000);\n  };\n\n  const arreter = () => {\n    clearInterval(intervalRef.current);\n    intervalRef.current = null;\n  };\n\n  return (\n    &lt;div&gt;\n      &lt;p&gt;Temps : {temps}s&lt;/p&gt;\n      &lt;button onClick={demarrer}&gt;Démarrer&lt;/button&gt;\n      &lt;button onClick={arreter}&gt;Arrêter&lt;/button&gt;\n    &lt;/div&gt;\n  );\n}\n</pre><ul><li>L'ID de l'intervalle est stocké dans la ref</li><li>Il persiste entre les re-rendus</li><li>Sa modification ne déclenche pas de re-rendu</li></ul></div>",
    "texteParle": "Un autre usage important de useRef est de stocker des valeurs qui doivent persister entre les re-rendus, mais qui ne doivent pas déclencher de re-rendu quand elles changent. Par exemple, dans un chronomètre, on stocke l'ID de l'intervalle dans une ref. Quand l'utilisateur clique sur démarrer, on crée un intervalle et on stocke son ID dans intervalRef.current. Quand il clique sur arrêter, on utilise cet ID pour arrêter l'intervalle. La ref nous permet de garder trace de cet ID même si le composant se re-rend. C'est une solution élégante pour ce type de problème.",
    "note": "Les refs sont parfaites pour stocker des identifiants de timers ou d'intervalles."
  },
  {
    "titre": "useRef vs useState",
    "contenu": "<div style='padding: 10px;'><p>La différence fondamentale entre <code>useRef</code> et <code>useState</code> :</p><table style='width: 100%; border-collapse: collapse; font-size: 0.85em;'><tr style='background: #34495e; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Aspect</th><th style='padding: 8px; border: 1px solid #ddd;'>useRef</th><th style='padding: 8px; border: 1px solid #ddd;'>useState</th></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Re-rendu</td><td style='padding: 8px; border: 1px solid #ddd;'>❌ Non</td><td style='padding: 8px; border: 1px solid #ddd;'>✅ Oui</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Persistance</td><td style='padding: 8px; border: 1px solid #ddd;'>✅ Oui</td><td style='padding: 8px; border: 1px solid #ddd;'>✅ Oui</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Accès DOM</td><td style='padding: 8px; border: 1px solid #ddd;'>✅ Direct</td><td style='padding: 8px; border: 1px solid #ddd;'>❌ Non</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Modification</td><td style='padding: 8px; border: 1px solid #ddd;'>Mutable (current)</td><td style='padding: 8px; border: 1px solid #ddd;'>Immuable (setter)</td></tr></table><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>📌 Règle d'or :</strong> Si vous voulez que le changement déclenche un re-rendu → <code>useState</code>. Sinon → <code>useRef</code>.</p></div></div>",
    "texteParle": "Il est essentiel de bien comprendre la différence entre useRef et useState. Les deux permettent de stocker des données qui persistent entre les re-rendus. La différence fondamentale est que la modification de useRef ne déclenche pas de re-rendu, alors que la modification de useState en déclenche un. Les refs sont mutables, on modifie directement current. Les états sont immuables, on utilise un setter. Si vous avez une donnée qui doit être affichée à l'écran, utilisez useState. Si vous avez une donnée qui doit persister mais qui n'a pas besoin d'être affichée ou de déclencher de re-rendu, utilisez useRef. Par exemple, un compteur d'instances, un ID d'intervalle, ou une référence à un élément DOM.",
    "note": "UseState pour l'affichage, useRef pour les données internes."
  },
  {
    "titre": "Exemple - Gestion du focus",
    "contenu": "<div style='padding: 10px;'><p>Un exemple complet de formulaire avec gestion automatique du focus.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction Formulaire() {\n  const nameRef = useRef(null);\n  const emailRef = useRef(null);\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    if (!nameRef.current.value) {\n      nameRef.current.focus();\n      nameRef.current.style.borderColor = 'red';\n      return;\n    }\n    if (!emailRef.current.value) {\n      emailRef.current.focus();\n      emailRef.current.style.borderColor = 'red';\n      return;\n    }\n    alert('Formulaire soumis !');\n  };\n\n  return (\n    &lt;form onSubmit={handleSubmit}&gt;\n      &lt;input ref={nameRef} placeholder=\"Nom\" /&gt;\n      &lt;input ref={emailRef} placeholder=\"Email\" /&gt;\n      &lt;button type=\"submit\"&gt;Envoyer&lt;/button&gt;\n    &lt;/form&gt;\n  );\n}\n</pre><p>Les refs permettent ici de contrôler précisément le focus sur les champs invalides.</p></div>",
    "texteParle": "Pour illustrer la puissance des refs, voici un exemple de formulaire. On crée deux refs, une pour le champ nom et une pour le champ email. Quand l'utilisateur soumet le formulaire, on vérifie si les champs sont remplis. Si un champ est vide, on met le focus sur ce champ et on change sa couleur de bordure en rouge. Cela permet de guider l'utilisateur vers les erreurs de saisie. C'est une expérience utilisateur bien meilleure que de simplement afficher un message d'erreur générique. Les refs sont parfaites pour ce genre de manipulation directe du DOM.",
    "note": "Les refs permettent d'améliorer l'expérience utilisateur avec des interactions directes."
  },
  {
    "titre": "Exemple - Mesurer un élément",
    "contenu": "<div style='padding: 10px;'><p>Les refs permettent de mesurer des dimensions d'éléments après le rendu.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction CardMesuree() {\n  const cardRef = useRef(null);\n  const [dimensions, setDimensions] = useState({ largeur: 0, hauteur: 0 });\n\n  useEffect(() => {\n    if (cardRef.current) {\n      const { width, height } = cardRef.current.getBoundingClientRect();\n      setDimensions({ largeur: width, hauteur: height });\n    }\n  }, []);\n\n  return (\n    &lt;div ref={cardRef} style={{ padding: '20px', border: '1px solid #ddd' }}&gt;\n      &lt;p&gt;Cette carte mesure {dimensions.largeur}px x {dimensions.hauteur}px&lt;/p&gt;\n    &lt;/div&gt;\n  );\n}\n</pre><ul><li>La ref donne accès à l'élément après le montage</li><li>On utilise <code>getBoundingClientRect()</code> pour les dimensions</li><li>On utilise <code>useEffect</code> pour mesurer après le rendu</li></ul></div>",
    "texteParle": "Un autre usage intéressant des refs est de mesurer les dimensions d'un élément après son rendu. Par exemple, vous voulez connaître la largeur et la hauteur d'une carte pour adapter son contenu. Pour cela, on crée une ref sur l'élément, et dans un useEffect avec un tableau de dépendances vide, on accède à l'élément via la ref et on appelle getBoundingClientRect() pour obtenir ses dimensions. On peut alors stocker ces dimensions dans un état pour les afficher. C'est une technique très utilisée pour créer des composants réactifs qui s'adaptent à leur taille.",
    "note": "Les refs sont indispensables pour mesurer des éléments après le rendu."
  },
  {
    "titre": "Attention - useRef et les re-rendus",
    "contenu": "<div style='padding: 10px;'><p>Un piège courant : la modification d'une ref <strong>ne déclenche pas</strong> de re-rendu.</p><div style='background: #e74c3c; color: white; padding: 12px; border-radius: 8px; margin: 10px 0; text-align: center;'>\n⚠️ <strong>ATTENTION</strong> : Si vous modifiez une ref, le composant ne se re-rendra pas !\n</div><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction Component() {\n  const countRef = useRef(0);\n\n  const increment = () => {\n    countRef.current++; // Modifie la ref\n    console.log(countRef.current); // La valeur change\n    // MAIS le composant ne se re-rend pas !\n  };\n\n  return (\n    &lt;div&gt;\n      &lt;p&gt;Compteur : {countRef.current}&lt;/p&gt; {/* ❌ Ne se met pas à jour ! */}\n      &lt;button onClick={increment}&gt;Incrémenter&lt;/button&gt;\n    &lt;/div&gt;\n  );\n}\n</pre><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>💡 Solution :</strong> Si vous voulez que la valeur s'affiche, utilisez <code>useState</code>.</p></div></div>",
    "texteParle": "Il y a un piège important à connaître avec useRef. La modification d'une ref ne déclenche pas de re-rendu du composant. Cela signifie que si vous affichez la valeur de la ref dans votre JSX, elle ne se mettra pas à jour quand vous modifiez la ref. Dans cet exemple, on a un compteur stocké dans une ref. On clique sur le bouton pour l'incrémenter, la valeur change bien, mais l'affichage reste bloqué sur 0. C'est un bug subtil qui peut être difficile à repérer. Si vous avez besoin d'afficher la valeur, utilisez useState. UseRef est pour les données qui n'ont pas besoin d'être affichées.",
    "note": "N'utilisez pas useRef pour des valeurs qui doivent être affichées à l'écran."
  },
  {

    "contenu": "<div style='padding: 10px;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;'><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Accès DOM</strong><br><span style='font-size: 0.8em;'>Pour focus, scroll, mesure</span></div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Valeurs persistantes</strong><br><span style='font-size: 0.8em;'>Timers, intervalles, IDs</span></div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Références stables</strong><br><span style='font-size: 0.8em;'>useRef ne change jamais entre les rendus</span></div><div style='background: #e67e22; color: white; padding: 10px; border-radius: 6px;'><strong>❌ Pas pour l'affichage</strong><br><span style='font-size: 0.8em;'>useState pour les données affichées</span></div><div style='background: #e67e22; color: white; padding: 10px; border-radius: 6px;'><strong>❌ Pas pendant le rendu</strong><br><span style='font-size: 0.8em;'>Lire/modifier pendant le rendu peut causer des bugs</span></div><div style='background: #e67e22; color: white; padding: 10px; border-radius: 6px;'><strong>❌ Pas de re-rendu</strong><br><span style='font-size: 0.8em;'>La modification ne déclenche pas de re-rendu</span></div></div><p><strong>Cas d'usage typiques :</strong></p><ul><li>🎯 Mettre le focus sur un champ après soumission</li><li>📏 Mesurer la taille d'un élément</li><li>⏱️ Stocker un intervalle ou un timeout</li><li>🔄 Stocker la valeur précédente d'une prop</li></ul></div>",
    "texteParle": "Pour bien utiliser useRef, voici quelques bonnes pratiques. Utilisez les refs pour accéder au DOM et pour stocker des valeurs persistantes comme des timers ou des IDs. Les refs sont stables, elles ne changent jamais entre les re-rendus, ce qui est utile pour éviter des re-rendus inutiles. En revanche, n'utilisez pas les refs pour des données qui doivent être affichées à l'écran, utilisez useState à la place. Ne lisez pas et ne modifiez pas les refs pendant le rendu, cela peut causer des bugs. Et rappelez-vous que la modification d'une ref ne déclenche pas de re-rendu. Les cas d'usage typiques sont le focus, la mesure d'éléments, les timers, et le stockage de valeurs précédentes.",

    "texteParle": "Pour récapituler, useRef est un hook qui permet de créer des références mutables qui persistent pendant toute la durée de vie du composant. Il est utilisé principalement pour deux choses : accéder directement à des éléments du DOM, et stocker des valeurs qui doivent persister sans déclencher de re-rendu. La modification de current ne déclenche pas de re-rendu, ce qui est à la fois une force et une faiblesse. C'est une force parce que c'est efficace pour certaines tâches, mais c'est une faiblesse parce que vous pouvez oublier que la valeur ne se met pas à jour à l'écran. N'utilisez pas useRef pour des valeurs qui doivent être affichées, utilisez useState à la place. Dans la prochaine leçon, nous verrons les hooks de performance.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');

        }

            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {

        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
