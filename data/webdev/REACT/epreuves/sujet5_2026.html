<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation à React",
 "classe": "Développement Web",
 "sequence": "Séquence 5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Questions de Cours sur les Fondamentaux",
     "points": "8 pts",
     "enonce": "Répondez aux questions suivantes de manière claire et précise en vous appuyant sur les concepts clés de React.",
     "questions":[
       {
         "question": "1) Expliquez ce qu'est React et en quoi il se distingue d'un framework traditionnel. Citez deux avantages de son approche par composants. (2 pts)",
         "reponse": "React est une bibliothèque JavaScript pour la construction d'interfaces utilisateur [citation:2]. Elle utilise une approche par composants, qui sont des morceaux de code autonomes et réutilisables [citation:1]. Contrairement aux frameworks qui imposent des conventions strictes, React offre plus de flexibilité [citation:2]. Deux avantages : 1) La réutilisabilité des composants, qui facilite la maintenance et l'évolution du code. 2) La gestion efficace du DOM virtuel, qui améliore les performances en ne mettant à jour que les éléments nécessaires."
       },
       {
         "question": "2) Qu'est-ce que JSX et pourquoi est-il utilisé dans React ? Donnez un exemple de différence avec le HTML standard. (2 pts)",
         "reponse": "JSX est une extension syntaxique de JavaScript qui permet d'écrire du balisage de type HTML directement dans le code JavaScript [citation:2][citation:3]. Il est utilisé car il rend le code plus intuitif et déclaratif, facilitant la création et la compréhension des interfaces. Une différence majeure avec HTML : en JSX, on utilise <code>className</code> au lieu de <code>class</code> pour définir une classe CSS [citation:3]. Exemple : <code>&lt;div className='mon-style'&gt;Contenu&lt;/div&gt;</code>."
       },
       {
         "question": "3) Qu'est-ce que l'état (state) dans React et quel hook permet de le gérer ? Expliquez son fonctionnement. (2 pts)",
         "reponse": "L'état (state) est une donnée qui peut changer au cours du temps et qui influence le rendu d'un composant. Le hook <code>useState</code> permet de gérer un état local dans un composant fonctionnel [citation:3]. Il retourne un tableau contenant la valeur de l'état et une fonction pour le mettre à jour. Exemple : <code>const [count, setCount] = useState(0);</code>. Lorsque <code>setCount</code> est appelée, le composant se re-rend avec la nouvelle valeur [citation:3]."
       },
       {
         "question": "4) Décrivez le concept de props dans React et expliquez pourquoi elles sont immutables. (2 pts)",
         "reponse": "Les props (propriétés) sont des données passées d'un composant parent à un composant enfant [citation:5]. Elles sont utilisées pour configurer et personnaliser les composants. Les props sont immutables car un composant ne doit pas modifier ses propres props ; elles sont en lecture seule [citation:5]. Cette immutabilité garantit que les données circulent de manière prévisible, rendant l'application plus facile à déboguer et à maintenir."
       }
     ]
   },
   {
     "titre": "Exercice Pratique : Composants et État",
     "points": "5 pts",
     "enonce": "On souhaite créer une application React simple qui affiche une liste d'articles avec la possibilité d'ajouter un nouvel article via un formulaire. L'interface sera composée de deux composants : <strong>ArticleList</strong> et <strong>AddArticle</strong>.",
     "questions":[
       {
         "question": "1) Définissez le composant <strong>ArticleList</strong> qui reçoit un tableau d'articles via ses props et les affiche dans une liste. (1.5 pts)",
         "reponse": "<pre style='background:#1e293b; color:#f1f5f9; padding:10px; border-radius:6px; font-size:0.8em;'>function ArticleList({ articles }) {\n  return (\n    &lt;ul&gt;\n      {articles.map(article => (\n        &lt;li key={article.id}&gt;{article.title} - {article.content}&lt;/li&gt;\n      ))}\n    &lt;/ul&gt;\n  );\n}\n\nexport default ArticleList;</pre>"
       },
       {
         "question": "2) Écrivez le composant <strong>AddArticle</strong> qui gère un formulaire avec un champ pour le titre et un champ pour le contenu. Il doit utiliser <code>useState</code> et un gestionnaire <code>onSubmit</code> pour appeler une fonction reçue via les props. (2 pts)",
         "reponse": "<pre style='background:#1e293b; color:#f1f5f9; padding:10px; border-radius:6px; font-size:0.8em;'>import { useState } from 'react';\n\nfunction AddArticle({ onAdd }) {\n  const [title, setTitle] = useState('');\n  const [content, setContent] = useState('');\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    if (!title.trim() || !content.trim()) return;\n    onAdd({ title, content });\n    setTitle('');\n    setContent('');\n  };\n\n  return (\n    &lt;form onSubmit={handleSubmit}&gt;\n      &lt;input type='text' placeholder='Titre' value={title} onChange={(e) => setTitle(e.target.value)} /&gt;\n      &lt;textarea placeholder='Contenu' value={content} onChange={(e) => setContent(e.target.value)} /&gt;\n      &lt;button type='submit'&gt;Ajouter&lt;/button&gt;\n    &lt;/form&gt;\n  );\n}\n\nexport default AddArticle;</pre>"
       },
       {
         "question": "3) Dans le composant parent <strong>App</strong>, utilisez ces deux composants pour afficher la liste et permettre l'ajout d'articles. Gérez l'état des articles avec <code>useState</code>. (1.5 pts)",
         "reponse": "<pre style='background:#1e293b; color:#f1f5f9; padding:10px; border-radius:6px; font-size:0.8em;'>import { useState } from 'react';\nimport ArticleList from './ArticleList';\nimport AddArticle from './AddArticle';\n\nfunction App() {\n  const [articles, setArticles] = useState([]);\n\n  const addArticle = (newArticle) => {\n    setArticles([...articles, { ...newArticle, id: Date.now() }]);\n  };\n\n  return (\n    &lt;div&gt;\n      &lt;h1&gt;Articles&lt;/h1&gt;\n      &lt;AddArticle onAdd={addArticle} /&gt;\n      &lt;ArticleList articles={articles} /&gt;\n    &lt;/div&gt;\n  );\n}\n\nexport default App;</pre>"
       }
     ]
   },
   {
     "titre": "Affichage Conditionnel et Listes",
     "points": "4 pts",
     "enonce": "Expliquez et illustrez les concepts suivants en React.",
     "questions":[
       {
         "question": "1) Quels sont les opérateurs de rendu conditionnel utilisés en React ? Donnez un exemple concret pour chacun. (2 pts)",
         "reponse": "Les opérateurs de rendu conditionnel sont : <br/>- <strong>L'opérateur ternaire <code>? :</code></strong> : <code>{isLoggedIn ? &lt;AdminPanel /&gt; : &lt;LoginForm /&gt;}</code> [citation:3].<br/>- <strong>L'opérateur logique <code>&amp;&amp;</code></strong> pour le rendu court-circuité : <code>{isLoggedIn &amp;&amp; &lt;AdminPanel /&gt;}</code> [citation:3].<br/>On peut aussi utiliser une instruction <code>if</code> à l'extérieur du JSX [citation:3]."
       },
       {
         "question": "2) Expliquez pourquoi l'attribut <code>key</code> est indispensable lors du rendu de listes en utilisant <code>map()</code>. Que se passe-t-il si on utilise l'index du tableau comme clé ? (2 pts)",
         "reponse": "L'attribut <code>key</code> aide React à identifier quels éléments ont changé, été ajoutés ou supprimés dans une liste [citation:3]. Cela permet d'optimiser le processus de réconciliation et d'éviter des re-rendus inutiles. Si on utilise l'index du tableau comme clé, cela peut causer des problèmes de performance et des bugs d'affichage, surtout si la liste est réordonnée ou si des éléments sont supprimés au milieu. Il est recommandé d'utiliser une clé stable et unique provenant des données (ex: un ID) [citation:3]."
       }
     ]
   },
   {
     "titre": "Installation et Structure d'un Projet",
     "points": "3 pts",
     "enonce": "Répondez aux questions relatives à la mise en place d'un projet React.",
     "questions":[
       {
         "question": "1) Quelle commande utilisez-vous pour créer une nouvelle application React avec Create React App ? (1 pt)",
         "reponse": "La commande est : <code>npx create-react-app mon-app</code> [citation:2]."
       },
       {
         "question": "2) Citez deux fichiers importants de la structure d'un projet React et décrivez leur rôle. (2 pts)",
         "reponse": "Les deux fichiers sont : <br/>- <strong>src/index.js (ou main.jsx)</strong> : Le point d'entrée de l'application React. Il contient le code qui rend le composant racine dans le DOM [citation:2].<br/>- <strong>src/App.js</strong> : Le composant racine de l'application. C'est le point de départ de l'arborescence des composants."
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
