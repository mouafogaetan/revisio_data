<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à React",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Composants et props (5 pts)",
      "points": "5 pts",
      "enonce": "React est une bibliothèque JavaScript pour la construction d'interfaces utilisateur. Elle repose sur le concept de composants, des blocs réutilisables qui permettent de construire des applications complexes à partir d'éléments simples. Les composants communiquent entre eux via les props, qui sont des données transmises du parent vers l'enfant.",
      "questions": [
        {
          "question": "1) Expliquez ce qu'est un composant React et citez deux règles de nommage importantes. ",
          "reponse": "Un composant React est une fonction JavaScript qui retourne du JSX, c'est-à-dire du code qui ressemble à du HTML. Il permet de créer des blocs d'interface utilisateur réutilisables et indépendants. <br><br>Les règles de nommage importantes sont : <br>- Le nom du composant doit être en <strong>PascalCase</strong> (commencer par une majuscule, ex: 'MonComposant') <br>- Le nom du fichier doit généralement correspondre au nom du composant (ex: 'MonComposant.jsx')."
        },
        {
          "question": "2) Écrivez un composant fonctionnel 'Greeting' qui reçoit une prop 'name' et affiche 'Bonjour [name] !' en utilisant une fonction flèche et la destructuration des props.",
          "reponse": "<code>const Greeting = ({ name }) => { <br>  return &lt;h1&gt;Bonjour {name} !&lt;/h1&gt;; <br>}; <br><br>export default Greeting;</code>"
        },
        {
          "question": "3) Expliquez pourquoi les props sont immutables (readonly) et ce qui se passe si on tente de les modifier.",
          "reponse": "Les props sont immutables car elles sont transmises du composant parent vers l'enfant. Le composant enfant ne doit pas modifier ses propres props, car cela pourrait créer des bugs imprévisibles. Si on tente de modifier une prop, React générera une erreur ou le comportement sera indéterminé. Cette règle garantit un flux de données unidirectionnel et prévisible, ce qui facilite le debugging et la maintenance du code."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Gestion des états avec useState (6 pts)",
      "points": "6 pts",
      "enonce": "Les hooks permettent de gérer l'état et les effets dans les composants fonctionnels. useState est le hook le plus fondamental, il permet d'ajouter un état local à un composant. L'immutabilité est une règle importante : on ne modifie jamais directement l'état, on utilise toujours le setter fourni par useState.",
      "questions": [
        {
          "question": "1) Qu'est-ce que le hook useState et quelle est sa syntaxe ? Donnez un exemple d'utilisation avec un type string.",
          "reponse": "useState est un hook qui permet d'ajouter un état local à un composant fonctionnel. Il retourne un tableau avec deux éléments : l'état actuel et une fonction pour le mettre à jour. <br><br>Syntaxe : <code>const [state, setState] = useState(valeurInitiale);</code> <br><br>Exemple avec un string : <br><code>const [nom, setNom] = useState('Jean');</code>"
        },
        {
          "question": "2) Pourquoi est-il important de ne pas modifier l'état directement (ex: state.push()) ? Comment doit-on procéder pour mettre à jour un tableau ?",
          "reponse": "Il est important de ne pas modifier l'état directement car React doit détecter les changements pour re-rendre le composant. La mutation directe ne déclenche pas de re-rendu car l'objet ne change pas de référence. <br><br>Pour mettre à jour un tableau, on doit créer un nouveau tableau : <br><code>setItems([...items, nouvelItem]); // ajout <br>setItems(items.filter(item => item.id !== id)); // suppression <br>setItems(items.map(item => item.id === id ? {...item, modifie: true} : item)); // modification</code>"
        },
        {
          "question": "3) Expliquez la forme fonctionnelle de setState : setState(prevState => nouveauState). Quand est-il recommandé de l'utiliser ?",
          "reponse": "La forme fonctionnelle de setState prend une fonction qui reçoit l'état précédent en paramètre et retourne le nouvel état. <br><br>Il est recommandé de l'utiliser quand la nouvelle valeur dépend de l'ancienne, car les mises à jour d'état sont asynchrones et peuvent être groupées. Exemple : <br><code>setCount(prevCount => prevCount + 1);</code> <br><br>Cela garantit qu'on travaille toujours avec la valeur la plus récente de l'état, même si plusieurs mises à jour sont en cours."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Rendu de listes et rendu conditionnel (5 pts)",
      "points": "5 pts",
      "enonce": "Pour afficher dynamiquement du contenu en React, on utilise la méthode map() pour transformer des tableaux en éléments JSX, et des expressions conditionnelles pour afficher ou masquer du contenu. L'opérateur ternaire et l'opérateur && (short-circuit evaluation) sont les deux approches principales pour le rendu conditionnel.",
      "questions": [
        {
          "question": "1) À quoi sert l'attribut 'key' dans les listes renderées avec map() ? Quelles sont les bonnes pratiques pour choisir une clé ?",
          "reponse": "L'attribut 'key' permet à React d'identifier chaque élément d'une liste de manière unique. Cela lui permet d'optimiser les re-rendus en ne modifiant que les éléments qui ont vraiment changé. <br><br>Bonnes pratiques : <br>- Utiliser un <strong>identifiant unique</strong> provenant des données (comme un 'id' de base de données) <br>- Éviter d'utiliser l'<strong>index</strong> du tableau comme clé (car il peut changer lors de réorganisations) <br>- La clé doit être <strong>stable</strong> et <strong>unique</strong> parmi les éléments du même tableau."
        },
        {
          "question": "2) Écrivez un composant 'TaskList' qui reçoit un tableau de tâches en props et affiche une liste non ordonnée avec chaque tâche. Gérez le cas où le tableau est vide en affichant 'Aucune tâche'. Utilisez la bonne approche (conditionnelle ou map()).",
          "reponse": "<code>function TaskList({ tasks }) { <br>  return ( <br>    &lt;div&gt; <br>      {tasks.length === 0 ? ( <br>        &lt;p&gt;Aucune tâche&lt;/p&gt; <br>      ) : ( <br>        &lt;ul&gt; <br>          {tasks.map((task) => ( <br>            &lt;li key={task.id}&gt;{task.nom}&lt;/li&gt; <br>          ))} <br>        &lt;/ul&gt; <br>      )} <br>    &lt;/div&gt; <br>  ); <br>}</code>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Événements et formulaires (4 pts)",
      "points": "4 pts",
      "enonce": "Les événements en React sont similaires aux événements DOM natifs mais avec quelques différences importantes. Les inputs contrôlés sont une approche où la valeur de l'input est gérée par l'état React, ce qui permet un contrôle total sur les données du formulaire.",
      "questions": [
        {
          "question": "1) Qu'est-ce qu'un input contrôlé en React ? Expliquez comment il fonctionne avec useState.",
          "reponse": "Un input contrôlé est un champ de formulaire dont la valeur est gérée par l'état React. Il fonctionne en deux parties : <br>1. La valeur de l'input est liée à une variable d'état via l'attribut 'value'. <br>2. L'événement 'onChange' met à jour cette variable d'état à chaque frappe. <br><br>Ainsi, React contrôle la valeur affichée, d'où le terme 'contrôlé'. Cette approche permet de valider et de transformer les données en temps réel."
        },
        {
          "question": "2) Écrivez un formulaire simple avec un champ texte et un bouton. Utilisez useState pour gérer la valeur du champ et affichez la valeur saisie en dessous du formulaire en temps réel.",
          "reponse": "<code>function Formulaire() { <br>  const [texte, setTexte] = useState(''); <br><br>  return ( <br>    &lt;div&gt; <br>      &lt;input <br>        type='text' <br>        value={texte} <br>        onChange={(e) => setTexte(e.target.value)} <br>        placeholder='Écrivez quelque chose...' <br>      /&gt; <br>      &lt;p&gt;Vous avez écrit : {texte}&lt;/p&gt; <br>    &lt;/div&gt; <br>  ); <br>}</code>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
