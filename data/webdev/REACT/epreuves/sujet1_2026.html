<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à React",
  "classe": "Développement Web",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Concepts fondamentaux et JSX",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333;'><p>Cet exercice porte sur les concepts de base de React et l'écriture JSX.</p><p><strong>Partie A : Définitions</strong> (2 pts)</p><ul><li>Qu'est-ce que le <strong>Virtual DOM</strong> et quel est son avantage par rapport au DOM réel ?</li><li>Pourquoi React est-il qualifié de bibliothèque <strong>Single Page Application</strong> (SPA) ?</li></ul><p><strong>Partie B : JSX</strong> (2 pts)</p><p>Soit le code JSX suivant contenant des erreurs. Corrigez-le :</p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function Greeting() {\n  const name = 'John';\n  return (\n    &lt;div class=\"greeting\"&gt;\n      &lt;h1&gt;Bonjour, {name}!&lt;/h1&gt;\n      &lt;img src=\"profile.jpg\" alt=\"Profile\"&gt;\n    &lt;/div&gt;\n  );\n}</code></pre><p><span style='background-color: #f3f4f6; padding: 5px 10px; border-radius: 20px; font-size: 0.9em;'>💡 Pensez à <code>className</code>, l'auto-fermeture des balises, et l'exportation.</span></p></div>",
      "questions": [
        {
          "question": "1) Définition et avantages du Virtual DOM",
          "reponse": "Le <strong>Virtual DOM</strong> est une représentation légère du DOM réel en mémoire. L'avantage est que React peut comparer cette représentation avec la précédente (diffing) et ne mettre à jour que les éléments qui ont réellement changé dans le DOM réel (reconciliation), ce qui optimise les performances. React permet de créer des <strong>Single Page Applications</strong> car le chargement initial est unique, et les navigations suivantes se font sans recharger la page, en mettant à jour uniquement les composants nécessaires."
        },
        {
          "question": "2) Correction du code JSX",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function Greeting() {\n  const name = 'John';\n  return (\n    &lt;div className=\"greeting\"&gt;  {/* className au lieu de class */}\n      &lt;h1&gt;Bonjour, {name}!&lt;/h1&gt;\n      &lt;img src=\"profile.jpg\" alt=\"Profile\" /&gt;  {/* Auto-fermeture */}\n    &lt;/div&gt;\n  );\n}\nexport default Greeting;  {/* Exportation */}</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Composants, Props et Composition",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333;'><p>On souhaite créer une application d'affichage de cartes de produits.</p><p><strong>Partie A : Création des composants</strong> (2 pts)</p><ul><li>Créez un composant <code>ProductCard</code> qui reçoit en props le nom, le prix et l'image du produit.</li><li>Créez un composant <code>ProductList</code> qui reçoit un tableau de produits et affiche une liste de <code>ProductCard</code>.</li></ul><p><strong>Partie B : Composition avec children</strong> (1.5 pts)</p><p>Utilisez la prop <code>children</code> pour créer un composant <code>Card</code> générique qui peut contenir n'importe quel contenu.</p><p><strong>Partie C : Déstructuration</strong> (1.5 pts)</p><p>Écrivez la fonction <code>ProductCard</code> en utilisant la <strong>déstructuration</strong> des props dans les paramètres de la fonction.</p></div>",
      "questions": [
        {
          "question": "1) Code des composants ProductCard et ProductList",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>// ProductCard.jsx\nfunction ProductCard({ name, price, image }) {\n  return (\n    &lt;div className=\"product-card\"&gt;\n      &lt;img src={image} alt={name} /&gt;\n      &lt;h3&gt;{name}&lt;/h3&gt;\n      &lt;p&gt;{price} FCFA&lt;/p&gt;\n    &lt;/div&gt;\n  );\n}\n\n// ProductList.jsx\nfunction ProductList({ products }) {\n  return (\n    &lt;div className=\"product-list\"&gt;\n      {products.map(product =&gt;\n        &lt;ProductCard key={product.id} {...product} /&gt;\n      )}\n    &lt;/div&gt;\n  );\n}</code></pre>"
        },
        {
          "question": "2) Code du composant Card avec children",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>// Card.jsx\nfunction Card({ children, className }) {\n  return (\n    &lt;div className={`card ${className}`}&gt;\n      {children}\n    &lt;/div&gt;\n  );\n}\n\n// Utilisation\nfunction App() {\n  return (\n    &lt;Card className=\"special\"&gt;\n      &lt;h2&gt;Titre personnalisé&lt;/h2&gt;\n      &lt;p&gt;Contenu passé via children&lt;/p&gt;\n    &lt;/Card&gt;\n  );\n}</code></pre>"
        },
        {
          "question": "3) Exemple de déstructuration des props",
          "reponse": "La déstructuration permet d'extraire directement les propriétés de l'objet `props` passé au composant. Dans l'exemple ci-dessus : <pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function ProductCard({ name, price, image }) {\n  // 'name', 'price' et 'image' sont directement accessibles\n}</code></pre> Sans déstructuration, il faudrait écrire `props.name`, `props.price`, etc."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Gestion d'état avec useState",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333;'><p>On souhaite créer un <strong>compteur de clics</strong> et une <strong>liste de tâches</strong>.</p><p><strong>Partie A : Compteur</strong> (2 pts)</p><ul><li>Créez un composant <code>Counter</code> qui gère un compteur avec un bouton pour incrémenter, décrémenter et réinitialiser.</li><li>Utilisez la forme fonctionnelle de <code>setState</code> pour l'incrémentation.</li></ul><p><strong>Partie B : Liste de tâches</strong> (4 pts)</p><ul><li>Créez un composant <code>TodoList</code> qui gère une liste de tâches.</li><li>Chaque tâche a un texte et un statut (terminée ou non).</li><li>Ajoutez une fonction pour ajouter une nouvelle tâche.</li><li>Ajoutez une fonction pour basculer le statut d'une tâche (terminée / non terminée).</li></ul></div>",
      "questions": [
        {
          "question": "1) Code du composant Counter avec useState",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function Counter() {\n  const [count, setCount] = useState(0);\n\n  const increment = () => {\n    setCount(prev => prev + 1);\n  };\n\n  return (\n    &lt;div&gt;\n      &lt;h2&gt;Compteur : {count}&lt;/h2&gt;\n      &lt;button onClick={increment}&gt;+&lt;/button&gt;\n      &lt;button onClick={() => setCount(prev => prev - 1)}&gt;-&lt;/button&gt;\n      &lt;button onClick={() => setCount(0)}&gt;Réinitialiser&lt;/button&gt;\n    &lt;/div&gt;\n  );\n}</code></pre>"
        },
        {
          "question": "2) Code du composant TodoList",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function TodoList() {\n  const [todos, setTodos] = useState([]);\n  const [input, setInput] = useState('');\n\n  const addTodo = () => {\n    if (!input.trim()) return;\n    const newTodo = { id: Date.now(), text: input, done: false };\n    setTodos(prev => [...prev, newTodo]);\n    setInput('');\n  };\n\n  const toggleTodo = (id) => {\n    setTodos(prev => prev.map(todo =>\n      todo.id === id ? { ...todo, done: !todo.done } : todo\n    ));\n  };\n\n  return (\n    &lt;div&gt;\n      &lt;input value={input} onChange={(e) => setInput(e.target.value)} /&gt;\n      &lt;button onClick={addTodo}&gt;Ajouter&lt;/button&gt;\n      &lt;ul&gt;\n        {todos.map(todo => (\n          &lt;li key={todo.id} style={{ textDecoration: todo.done ? 'line-through' : 'none' }}&gt;\n            {todo.text}\n            &lt;button onClick={() => toggleTodo(todo.id)}&gt;\n              {todo.done ? 'Réactiver' : 'Terminer'}\n            &lt;/button&gt;\n          &lt;/li&gt;\n        ))}\n      &lt;/ul&gt;\n    &lt;/div&gt;\n  );\n}</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Rendu conditionnel et listes",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; color: #333;'><p>On souhaite afficher dynamiquement des éléments.</p><p><strong>Partie A : Rendu conditionnel</strong> (2 pts)</p><ul><li>Affichez 'Bienvenue visiteur' si l'utilisateur n'est pas connecté, et 'Bonjour, [nom]' s'il est connecté.</li><li>Utilisez l'<strong>opérateur ternaire</strong> pour ce rendu conditionnel.</li></ul><p><strong>Partie B : Liste</strong> (2 pts)</p><ul><li>Affichez une liste de commentaires avec <code>map()</code>.</li><li>Expliquez l'importance de la prop <strong>key</strong> et pourquoi il ne faut pas utiliser l'index.</li></ul><p><strong>Partie C : Short-circuit evaluation</strong> (1 pt)</p><ul><li>Affichez un message 'Aucun commentaire' si la liste des commentaires est vide, en utilisant l'opérateur <code>&amp;&amp;</code>.</li></ul></div>",
      "questions": [
        {
          "question": "1) Rendu conditionnel avec l'opérateur ternaire",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function Welcome({ user }) {\n  return (\n    &lt;div&gt;\n      {user ? `Bonjour, ${user.name}` : 'Bienvenue visiteur'}\n    &lt;/div&gt;\n  );\n}</code></pre>"
        },
        {
          "question": "2) Liste de commentaires et importance de la key",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function Comments({ comments }) {\n  return (\n    &lt;ul&gt;\n      {comments.map(comment => (\n        &lt;li key={comment.id}&gt;{comment.text}&lt;/li&gt;\n      ))}\n    &lt;/ul&gt;\n  );\n}</code></pre> La prop <strong>key</strong> permet à React d'identifier chaque élément de manière unique lors des mises à jour. Cela optimise le re-rendu en ne recréant que les éléments modifiés, ajoutés ou supprimés. Utiliser l'index est déconseillé car si l'ordre des éléments change, les clés deviennent instables, ce qui peut causer des bugs d'affichage."
        },
        {
          "question": "3) Affichage conditionnel avec &&",
          "reponse": "<pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>function Comments({ comments }) {\n  return (\n    &lt;div&gt;\n      {comments.length === 0 && &lt;p&gt;Aucun commentaire&lt;/p&gt;}\n      {comments.length > 0 && &lt;ul&gt;...&lt;/ul&gt;}\n    &lt;/div&gt;\n  );\n}</code></pre> L'opérateur <code>&amp;&amp;</code> est utilisé pour le rendu conditionnel court : si la condition à gauche est vraie, le composant à droite est affiché."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
