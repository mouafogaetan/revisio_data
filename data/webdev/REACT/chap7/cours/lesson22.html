<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 22 : Context + useReducer (similaire à Redux) | React</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e9eef3 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        .slide-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 1.2rem 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 0.75rem;
            }
        }
        .note-info {
            background: #dbeafe;
            border-left: 5px solid #2563eb;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .badge-pattern {
            background: #e0e7ff;
            color: #3730a3;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            display: inline-block;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
    <!-- jQuery & MathJax -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Zone d'affichage dynamique des slides -->
        <div id="slides-container" class="relative"></div>

        <!-- Navigation entre slides -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevBtn" class="bg-white hover:bg-slate-100 text-slate-700 font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed border border-slate-300 text-sm md:text-base">◀ Précédent</button>
            <div class="text-sm bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-sm text-slate-600">
                Slide <span id="currentSlide">1</span> / <span id="totalSlides">0</span>
            </div>
            <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed text-sm md:text-base">Suivant ▶</button>
        </div>
    </div>

    <footer class="text-center text-slate-400 text-xs py-5 border-t border-slate-200 mt-6">
        🇨🇲 Cours React – Enseignant Cameroun | Leçon 22 : Context + useReducer
    </footer>

    <script>
        // Contenu des slides pour la leçon 22 (Context + useReducer)
        const slidesData = [
            {
                type: "title",
                icon: "⚛️",
                title: "Combiner Context et useReducer",
                subtitle: "Gérez un état global complexe comme dans Redux, mais avec les hooks natifs",
                badge: "Leçon 22 · Niveau Avancé"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                list: [
                    "✅ Comprendre la limite de useState pour les états globaux complexes",
                    "✅ Maîtriser le pattern reducer (état + action)",
                    "✅ Utiliser useReducer pour gérer une logique de mise à jour prédictible",
                    "✅ Combiner useReducer avec Context pour partager l'état et le dispatch à travers toute l'application",
                    "✅ Créer une mini architecture similaire à Redux sans bibliothèque externe"
                ]
            },
            {
                type: "content",
                title: "🧠 Pourquoi combiner Context et useReducer ?",
                content: `
                    <p><span class="font-bold">useState</span> suffit pour des états locaux simples. Mais pour un état global partagé entre de nombreux composants, avec des règles de mise à jour complexes, on a besoin de plus.</p>
                    <ul class="list-disc pl-6 mt-3 space-y-1">
                        <li><span class="font-semibold">useReducer</span> : sépare la logique de mise à jour (reducer) de l'état. Idéal pour des transitions d'état multiples (ajout, suppression, modification).</li>
                        <li><span class="font-semibold">Context</span> : permet de rendre l'état et la fonction dispatch accessibles à tout l'arbre de composants sans props drilling.</li>
                    </ul>
                    <div class="note-info mt-3">
                        💡 <strong>Résultat</strong> : Une architecture semblable à Redux, mais avec des outils intégrés à React ! Parfaite pour les applications de taille moyenne.
                    </div>
                `
            },
            {
                type: "content",
                title: "🔧 Le pattern Reducer (état, action)",
                content: `
                    <p>Un reducer est une fonction pure qui prend l'état courant et une action, et retourne le nouvel état.</p>
                    <div class="code-block">
                        function reducer(state, action) {
                          switch (action.type) {
                            case 'INCREMENT':
                              return { count: state.count + 1 };
                            case 'DECREMENT':
                              return { count: state.count - 1 };
                            default:
                              return state;
                          }
                        }
                    </div>
                    <p>Dans le composant :</p>
                    <div class="code-block">
                        const [state, dispatch] = useReducer(reducer, { count: 0 });
                        // Utilisation : dispatch({ type: 'INCREMENT' });
                    </div>
                    <div class="bg-green-50 p-3 rounded-lg mt-2">
                        ✅ <strong>Avantage</strong> : Toutes les modifications sont centralisées et prévisibles. Le code devient plus facile à tester et à déboguer.
                    </div>
                `
            },
            {
                type: "content",
                title: "📦 Créer un contexte avec useReducer",
                content: `
                    <p>Étape 1 : Créer le contexte et le fournisseur personnalisé.</p>
                    <div class="code-block">
                        import { createContext, useReducer, useContext } from 'react';

                        const AppContext = createContext();

                        export function AppProvider({ children }) {
                          const [state, dispatch] = useReducer(reducer, initialState);
                          
                          return (
                            &lt;AppContext.Provider value={{ state, dispatch }}&gt;
                              {children}
                            &lt;/AppContext.Provider&gt;
                          );
                        }

                        export function useAppContext() {
                          return useContext(AppContext);
                        }
                    </div>
                    <p>Étape 2 : Envelopper l'application avec <code>&lt;AppProvider&gt;</code>.</p>
                    <p>Étape 3 : Dans n'importe quel composant :</p>
                    <div class="code-block">
                        const { state, dispatch } = useAppContext();
                        // dispatch({ type: 'AJOUTER_TODO', payload: { text: 'Apprendre React' } });
                    </div>
                `
            },
            {
                type: "content",
                title: "📝 Exemple concret : Gestion d'une liste de tâches (Todo List)",
                content: `
                    <p>État initial : <code>{ todos: [] }</code></p>
                    <p>Reducer avec actions :</p>
                    <div class="code-block">
                        function todoReducer(state, action) {
                          switch (action.type) {
                            case 'ADD_TODO':
                              return { todos: [...state.todos, { id: Date.now(), text: action.payload, completed: false }] };
                            case 'TOGGLE_TODO':
                              return { todos: state.todos.map(todo => 
                                todo.id === action.payload ? { ...todo, completed: !todo.completed } : todo
                              ) };
                            case 'DELETE_TODO':
                              return { todos: state.todos.filter(todo => todo.id !== action.payload) };
                            default:
                              return state;
                          }
                        }
                    </div>
                    <p>Dans le composant TodoList :</p>
                    <div class="code-block">
                        const { state, dispatch } = useTodoContext();
                        return (
                          &lt;&gt;
                            {state.todos.map(todo => (
                              &lt;div key={todo.id}&gt;
                                &lt;span style={{ textDecoration: todo.completed ? 'line-through' : 'none' }}&gt;{todo.text}&lt;/span&gt;
                                &lt;button onClick={() => dispatch({ type: 'TOGGLE_TODO', payload: todo.id })}&gt;✓&lt;/button&gt;
                                &lt;button onClick={() => dispatch({ type: 'DELETE_TODO', payload: todo.id })}&gt;🗑️&lt;/button&gt;
                              &lt;/div&gt;
                            ))}
                          &lt;/&gt;
                        );
                    </div>
                `
            },
            {
                type: "content",
                title: "⚡ Optimisation : séparer les contextes (éviter les re-rendus)",
                "content": `
                    <p>Un problème : si tout est dans un seul contexte, chaque action déclenche un re-rendu de tous les composants consommateurs, même ceux qui n'utilisent qu'une partie de l'état.</p>
                    <div class="note-info">
                        🔧 <strong>Solution : créer deux contextes</strong> – un pour l'état, un pour le dispatch (stable). Le dispatch ne change jamais.
                    </div>
                    <div class="code-block">
                        const StateContext = createContext();
                        const DispatchContext = createContext();

                        export function AppProvider({ children }) {
                          const [state, dispatch] = useReducer(reducer, initialState);
                          return (
                            &lt;StateContext.Provider value={state}&gt;
                              &lt;DispatchContext.Provider value={dispatch}&gt;
                                {children}
                              &lt;/DispatchContext.Provider&gt;
                            &lt;/StateContext.Provider&gt;
                          );
                        }

                        export function useAppState() { return useContext(StateContext); }
                        export function useAppDispatch() { return useContext(DispatchContext); }
                    </div>
                    <p>✔️ Les composants qui n'ont besoin que de <code>dispatch</code> ne se re-rendent pas quand l'état change.</p>
                `
            },
            {
                type: "content",
                title: "🏁 Résumé et comparaison avec Redux",
                content: `
                    <p><span class="font-bold text-indigo-700">✅ Ce qu'il faut retenir :</span></p>
                    <ul class="list-disc pl-6 mt-2 space-y-1">
                        <li><strong>useReducer</strong> : gestion d'états complexes avec des actions explicites.</li>
                        <li><strong>Context</strong> : partage global de l'état et du dispatch.</li>
                        <li>Cette combinaison remplace <strong>Redux</strong> pour beaucoup d'applications (sans bibliothèque externe).</li>
                        <li>Pour de très grosses applications, Redux Toolkit apporte encore plus d'outils (middleware, devtools).</li>
                    </ul>
                    <div class="grid grid-cols-2 gap-2 mt-4 text-center text-sm">
                        <div class="bg-indigo-50 p-2 rounded-lg">📦 useReducer = logique</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">🌍 Context = partage</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">⚡ Dispatch stable</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">🧪 Facile à tester</div>
                    </div>
                    <div class="mt-4 p-3 bg-amber-50 rounded-xl text-sm">
                        💡 <strong>Astuce finale</strong> : Commencez par useState, passez à useReducer quand la logique devient complexe, puis ajoutez Context pour le partage global.
                    </div>
                `
            }
        ];

        let currentIdx = 0;
        const total = slidesData.length;

        function renderSlide(index) {
            const s = slidesData[index];
            if (!s) return "<div class='text-center p-10'>Erreur slide</div>";
            
            if (s.type === "title") {
                return `
                    <div class="slide-card bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl shadow-xl p-6 md:p-10 text-center border border-indigo-100">
                        <div class="text-7xl mb-4">${s.icon}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-indigo-800 leading-tight">${s.title}</h1>
                        <p class="text-lg md:text-xl text-slate-600 mt-4 max-w-xl mx-auto">${s.subtitle}</p>
                        <div class="mt-6 inline-block bg-indigo-200 px-4 py-1 rounded-full text-indigo-800 text-sm font-medium">${s.badge}</div>
                        <div class="mt-8 w-16 h-1 bg-indigo-300 mx-auto rounded-full"></div>
                    </div>
                `;
            } 
            else if (s.type === "objectifs") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8 border-l-8 border-indigo-500">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 mb-5">${s.title}</h2>
                        <ul class="space-y-3">
                            ${s.list.map(item => `<li class="flex items-start gap-3 text-slate-700 text-base md:text-lg"><span class="text-indigo-500 text-xl shrink-0">📌</span> <span>${item}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 bg-indigo-50 p-3 rounded-xl text-indigo-700 text-sm italic">
                            🧠 Après cette leçon, vous saurez gérer un état global complexe à la manière de Redux, avec les outils natifs de React !
                        </div>
                    </div>
                `;
            }
            else if (s.type === "content") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 border-b border-indigo-200 pb-3 mb-5">${s.title}</h2>
                        <div class="prose prose-slate max-w-none text-slate-700 leading-relaxed">
                            ${s.content}
                        </div>
                    </div>
                `;
            }
            return `<div class="bg-white rounded-2xl p-6">Contenu non disponible</div>`;
        }

        function updateDisplay() {
            const html = renderSlide(currentIdx);
            $("#slides-container").html(html);
            $("#currentSlide").text(currentIdx + 1);
            $("#totalSlides").text(total);
            
            $("#prevBtn").prop("disabled", currentIdx === 0);
            $("#nextBtn").prop("disabled", currentIdx === total - 1);
            
            $("html, body").animate({ scrollTop: 0 }, 80);
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise();
            }
        }

        function nextSlide() {
            if (currentIdx < total - 1) {
                currentIdx++;
                updateDisplay();
            }
        }
        
        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
                updateDisplay();
            }
        }

        $(document).ready(function() {
            updateDisplay();
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
            
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") { nextSlide(); e.preventDefault(); }
                else if (e.key === "ArrowLeft") { prevSlide(); e.preventDefault(); }
            });
            
            let touchStartX = 0, touchEndX = 0;
            const container = document.getElementById("slides-container");
            if (container) {
                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                container.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchEndX < touchStartX - 45) nextSlide();
                    if (touchEndX > touchStartX + 45) prevSlide();
                });
            }
        });
    </script>
</body>
</html>
