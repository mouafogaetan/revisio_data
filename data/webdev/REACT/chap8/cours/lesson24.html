<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 24 : Routes avec React Router v6 | React</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #f0f9ff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 1.2rem 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 0.75rem;
            }
        }
        .note-info {
            background: #dbeafe;
            border-left: 5px solid #3b82f6;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .badge-router {
            background: #e0e7ff;
            color: #3730a3;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            display: inline-block;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
    <!-- jQuery & MathJax (pour d'éventuelles formules) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Zone d'affichage dynamique des slides -->
        <div id="slides-container" class="relative"></div>

        <!-- Navigation entre slides -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevBtn" class="bg-white hover:bg-slate-100 text-slate-700 font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed border border-slate-300 text-sm md:text-base">◀ Précédent</button>
            <div class="text-sm bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-sm text-slate-600">
                Slide <span id="currentSlide">1</span> / <span id="totalSlides">0</span>
            </div>
            <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed text-sm md:text-base">Suivant ▶</button>
        </div>
    </div>

    <footer class="text-center text-slate-400 text-xs py-5 border-t border-slate-200 mt-6">
        🇨🇲 Cours React – Enseignant Cameroun | Leçon 24 : React Router v6 (Routes, Link, NavLink, Outlet)
    </footer>

    <script>
        // Contenu des slides pour la leçon 24 (React Router v6)
        // Slide 0 : Titre
        // Slide 1 : Objectifs d'apprentissage
        // Slide 2 : Installation et configuration de base (BrowserRouter)
        // Slide 3 : Définir des routes avec Routes et Route
        // Slide 4 : Navigation avec Link et NavLink
        // Slide 5 : Routes imbriquées et Outlet
        // Slide 6 : Route 404 (page non trouvée)
        // Slide 7 : Résumé et bonnes pratiques
        
        const slidesData = [
            {
                type: "title",
                icon: "🧭",
                title: "Définir des routes avec React Router v6",
                subtitle: "Créez des applications multi-pages (SPA) avec une navigation fluide",
                badge: "Leçon 24 · Niveau Intermédiaire"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                list: [
                    "✅ Installer et configurer React Router DOM dans un projet",
                    "✅ Comprendre la différence entre BrowserRouter et HashRouter",
                    "✅ Définir des routes avec les composants Routes et Route",
                    "✅ Utiliser Link et NavLink pour la navigation sans rechargement",
                    "✅ Créer des routes imbriquées avec Outlet",
                    "✅ Gérer les chemins inconnus (page 404)"
                ]
            },
            {
                type: "content",
                title: "📦 Installation et configuration de base",
                content: `
                    <p>Pour ajouter le routage à une application React, on utilise la bibliothèque <strong>react-router-dom</strong>.</p>
                    <div class="code-block">
                        npm install react-router-dom
                    </div>
                    <p>Ensuite, il faut envelopper l'application (ou une partie) avec le <strong>BrowserRouter</strong>. Généralement dans <code>main.jsx</code> ou <code>App.jsx</code>.</p>
                    <div class="code-block">
                        import { BrowserRouter } from 'react-router-dom';
                        import App from './App';

                        function Root() {
                          return (
                            &lt;BrowserRouter&gt;
                              &lt;App /&gt;
                            &lt;/BrowserRouter&gt;
                          );
                        }
                    </div>
                    <div class="note-info mt-2">
                        📌 <span class="font-semibold">BrowserRouter vs HashRouter</span> : BrowserRouter utilise l'API HTML5 (URL propres) et nécessite une configuration côté serveur. HashRouter utilise le fragment (#) mais fonctionne sans configuration. Pour la plupart des projets, BrowserRouter est recommandé.
                    </div>
                `
            },
            {
                type: "content",
                title: "🗺️ Définir des routes avec Routes et Route",
                content: `
                    <p>Les routes sont définies avec le composant <code>Routes</code> qui contient plusieurs <code>Route</code>.</p>
                    <div class="code-block">
                        import { Routes, Route } from 'react-router-dom';
                        import Home from './pages/Home';
                        import About from './pages/About';
                        import Contact from './pages/Contact';

                        function App() {
                          return (
                            &lt;Routes&gt;
                              &lt;Route path="/" element={&lt;Home /&gt;} /&gt;
                              &lt;Route path="/about" element={&lt;About /&gt;} /&gt;
                              &lt;Route path="/contact" element={&lt;Contact /&gt;} /&gt;
                            &lt;/Routes&gt;
                          );
                        }
                    </div>
                    <ul class="list-disc pl-6 mt-2 space-y-1">
                        <li><span class="font-semibold">path</span> : l'URL à faire correspondre.</li>
                        <li><span class="font-semibold">element</span> : le composant React à afficher.</li>
                        <li>React Router affiche le premier <code>Route</code> dont le <code>path</code> correspond à l'URL courante.</li>
                    </ul>
                    <div class="bg-green-50 p-3 rounded-lg mt-2">
                        💡 <strong>Astuce</strong> : Le chemin <code>"/"</code> correspond à la page d'accueil.
                    </div>
                `
            },
            {
                type: "content",
                title: "🔗 Navigation avec Link et NavLink",
                content: `
                    <p>Pour naviguer sans recharger la page, on utilise <code>Link</code> à la place des balises <code>&lt;a&gt;</code>.</p>
                    <div class="code-block">
                        import { Link, NavLink } from 'react-router-dom';

                        function Navigation() {
                          return (
                            &lt;nav&gt;
                              &lt;Link to="/"&gt;Accueil&lt;/Link&gt;
                              &lt;NavLink to="/about" className={({ isActive }) => isActive ? 'active' : ''}&gt;
                                À propos
                              &lt;/NavLink&gt;
                            &lt;/nav&gt;
                          );
                        }
                    </div>
                    <ul class="list-disc pl-6 mt-2 space-y-1">
                        <li><strong>Link</strong> : navigation simple, sans style actif.</li>
                        <li><strong>NavLink</strong> : version améliorée qui ajoute une classe <code>active</code> (ou style) lorsque le chemin correspond.</li>
                        <li>On peut utiliser <code>className</code> avec une fonction pour appliquer un style différent.</li>
                    </ul>
                    <div class="note-info mt-2">
                        🎨 <strong>Exemple CSS</strong> : <code>.active { font-weight: bold; color: blue; }</code>
                    </div>
                `
            },
            {
                type: "content",
                title: "📂 Routes imbriquées et Outlet",
                content: `
                    <p>Les routes imbriquées permettent d'avoir des layouts partagés. Par exemple, un en-tête commun pour plusieurs pages.</p>
                    <div class="code-block">
                        import { Routes, Route, Outlet } from 'react-router-dom';

                        function Layout() {
                          return (
                            &lt;div&gt;
                              &lt;header&gt;Mon Site&lt;/header&gt;
                              &lt;Outlet /&gt; {/* Ici s'affiche la route enfant */}
                              &lt;footer&gt;Pied de page&lt;/footer&gt;
                            &lt;/div&gt;
                          );
                        }

                        function App() {
                          return (
                            &lt;Routes&gt;
                              &lt;Route path="/" element={&lt;Layout /&gt;}&gt;
                                &lt;Route index element={&lt;Home /&gt;} /&gt;
                                &lt;Route path="about" element={&lt;About /&gt;} /&gt;
                                &lt;Route path="contact" element={&lt;Contact /&gt;} /&gt;
                              &lt;/Route&gt;
                            &lt;/Routes&gt;
                          );
                        }
                    </div>
                    <p><code>index</code> est un raccourci pour <code>path=""</code> (la route par défaut du parent).</p>
                `
            },
            {
                type: "content",
                title: "⚠️ Route 404 (page non trouvée)",
                content: `
                    <p>Pour gérer les URLs qui ne correspondent à aucune route, on ajoute une route avec <code>path="*"</code> à la fin.</p>
                    <div class="code-block">
                        &lt;Routes&gt;
                          &lt;Route path="/" element={&lt;Home /&gt;} /&gt;
                          &lt;Route path="/about" element={&lt;About /&gt;} /&gt;
                          &lt;Route path="*" element={&lt;NotFound /&gt;} /&gt;
                        &lt;/Routes&gt;
                    </div>
                    <div class="note-info mt-2">
                        ⚠️ <strong>Ordre important</strong> : La route avec <code>*</code> doit être placée en dernier, car React Router affiche la première route qui correspond. <code>*</code> correspond à n'importe quelle URL.
                    </div>
                    <div class="code-block mt-2">
                        function NotFound() {
                          return &lt;h2&gt;404 - Cette page n'existe pas 😢&lt;/h2&gt;;
                        }
                    </div>
                `
            },
            {
                type: "content",
                title: "🏁 Résumé et bonnes pratiques",
                content: `
                    <p><span class="font-bold text-indigo-700">✅ Ce qu'il faut retenir :</span></p>
                    <ul class="list-disc pl-6 mt-2 space-y-1">
                        <li>Installer <code>react-router-dom</code> et envelopper l'app avec <code>&lt;BrowserRouter&gt;</code>.</li>
                        <li>Définir les routes avec <code>&lt;Routes&gt;</code> et <code>&lt;Route path="..." element={...} /&gt;</code>.</li>
                        <li>Utiliser <code>&lt;Link&gt;</code> pour naviguer, <code>&lt;NavLink&gt;</code> pour les menus actifs.</li>
                        <li>Créer des layouts partagés avec des routes imbriquées et <code>&lt;Outlet&gt;</code>.</li>
                        <li>Ajouter une route <code>path="*"</code> pour la page 404.</li>
                    </ul>
                    <div class="grid grid-cols-2 gap-2 mt-4 text-center text-sm">
                        <div class="bg-indigo-50 p-2 rounded-lg">🧭 BrowserRouter</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">📌 Routes + Route</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">🔗 Link / NavLink</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">📂 Outlet imbriqué</div>
                    </div>
                    <p class="mt-4 italic text-slate-500">"Avec React Router, vos applications React deviennent de vraies SPA navigables !"</p>
                `
            }
        ];

        let currentIdx = 0;
        const total = slidesData.length;

        function renderSlide(index) {
            const s = slidesData[index];
            if (!s) return "<div class='text-center p-10'>Erreur slide</div>";
            
            if (s.type === "title") {
                return `
                    <div class="slide-card bg-gradient-to-br from-indigo-50 to-blue-50 rounded-3xl shadow-xl p-6 md:p-10 text-center border border-indigo-100">
                        <div class="text-7xl mb-4">${s.icon}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-indigo-800 leading-tight">${s.title}</h1>
                        <p class="text-lg md:text-xl text-slate-600 mt-4 max-w-xl mx-auto">${s.subtitle}</p>
                        <div class="mt-6 inline-block bg-indigo-200 px-4 py-1 rounded-full text-indigo-800 text-sm font-medium">${s.badge}</div>
                        <div class="mt-8 w-16 h-1 bg-indigo-300 mx-auto rounded-full"></div>
                    </div>
                `;
            } 
            else if (s.type === "objectifs") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8 border-l-8 border-indigo-500">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 mb-5">${s.title}</h2>
                        <ul class="space-y-3">
                            ${s.list.map(item => `<li class="flex items-start gap-3 text-slate-700 text-base md:text-lg"><span class="text-indigo-500 text-xl shrink-0">📌</span> <span>${item}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 bg-indigo-50 p-3 rounded-xl text-indigo-700 text-sm italic">
                            🧠 Après cette leçon, vous saurez créer des applications React multi-pages avec une navigation professionnelle !
                        </div>
                    </div>
                `;
            }
            else if (s.type === "content") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 border-b border-indigo-200 pb-3 mb-5">${s.title}</h2>
                        <div class="prose prose-slate max-w-none text-slate-700 leading-relaxed">
                            ${s.content}
                        </div>
                    </div>
                `;
            }
            return `<div class="bg-white rounded-2xl p-6">Contenu non disponible</div>`;
        }

        function updateDisplay() {
            const html = renderSlide(currentIdx);
            $("#slides-container").html(html);
            $("#currentSlide").text(currentIdx + 1);
            $("#totalSlides").text(total);
            
            $("#prevBtn").prop("disabled", currentIdx === 0);
            $("#nextBtn").prop("disabled", currentIdx === total - 1);
            
            $("html, body").animate({ scrollTop: 0 }, 80);
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise();
            }
        }

        function nextSlide() {
            if (currentIdx < total - 1) {
                currentIdx++;
                updateDisplay();
            }
        }
        
        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
                updateDisplay();
            }
        }

        $(document).ready(function() {
            updateDisplay();
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
            
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") { nextSlide(); e.preventDefault(); }
                else if (e.key === "ArrowLeft") { prevSlide(); e.preventDefault(); }
            });
            
            let touchStartX = 0, touchEndX = 0;
            const container = document.getElementById("slides-container");
            if (container) {
                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                container.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchEndX < touchStartX - 45) nextSlide();
                    if (touchEndX > touchStartX + 45) prevSlide();
                });
            }
        });
    </script>
</body>
</html>
