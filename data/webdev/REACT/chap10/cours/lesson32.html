<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
    {
        "titre": "Pourquoi TypeScript avec React ?",
        "contenu": "<div style='background: #1a202c; padding: 20px; border-radius: 12px; color: #e2e8f0;'><h3 style='margin-top: 0; color: #63b3ed;'>Les avantages du typage</h3><p>TypeScript apporte une <strong>sécurité</strong> et une <strong>productivité</strong> accrues au développement React .</p><ul style='list-style: none; padding-left: 0;'><li style='margin-bottom: 10px;'>🔍 <strong>Détection précoce</strong> : Les erreurs sont détectées à la compilation, pas à l'exécution .</li><li style='margin-bottom: 10px;'>📚 <strong>Auto-complétion</strong> : Les IDE (VS Code) offrent une meilleure assistance .</li><li style='margin-bottom: 10px;'>📝 <strong>Documentation vivante</strong> : Les types servent de documentation .</li><li style='margin-bottom: 10px;'>🤝 <strong>Meilleure collaboration</strong> : Les types définissent clairement les contrats entre composants .</li></ul></div>",
        "texteParle": "Bonjour à tous. Aujourd'hui, nous allons parler d'un sujet très important : le typage des composants React avec TypeScript. Mais pourquoi utiliser TypeScript avec React ? D'abord, TypeScript détecte les erreurs directement à la compilation. Cela vous évite de découvrir des bugs en production. Ensuite, les IDE comme VS Code vous offrent une auto-complétion beaucoup plus précise, ce qui vous rend plus productif. Les types servent aussi de documentation : en regardant les types d'un composant, vous savez immédiatement quelles props il attend. Enfin, lorsque vous travaillez en équipe, les types définissent clairement les contrats entre les composants.",
        "note": "TypeScript apporte sécurité, productivité et documentation au développement React."
    },
    {
        "titre": "Typer les props d'un composant",
        "contenu": "<div style='background: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><h3 style='margin-top: 0; color: #2b6cb0;'>Interface ou type ?</h3><p>On utilise <code>interface</code> ou <code>type</code> pour définir la forme des props .</p><div style='background: #edf2f7; padding: 15px; border-radius: 8px;'><pre style='margin: 0;'><code style='font-family: monospace;'>// Avec interface\ninterface UserCardProps {\n  name: string;\n  age: number;\n  email?: string;        // Optionnel\n  isActive?: boolean;\n}\n\nfunction UserCard({ name, age, email, isActive = false }: UserCardProps) {\n  return (\n    &lt;div&gt;\n      &lt;h3&gt;{name}&lt;/h3&gt;\n      &lt;p&gt;Âge : {age}&lt;/p&gt;\n      {email && &lt;p&gt;Email : {email}&lt;/p&gt;}\n      &lt;p&gt;Statut : {isActive ? 'Actif' : 'Inactif'}&lt;/p&gt;\n    &lt;/div&gt;\n  );\n}</code></pre></div></div>",
        "texteParle": "Pour typer les props d'un composant, on utilise soit une interface, soit un type. Les deux sont très similaires, mais les interfaces sont souvent préférées pour les objets. Dans l'exemple, on crée une interface UserCardProps qui définit les props attendues : name est une chaîne de caractères obligatoire, age est un nombre obligatoire, email est une chaîne optionnelle, et isActive est un booléen optionnel avec une valeur par défaut. On utilise ensuite cette interface pour typer les props du composant. C'est aussi simple que cela !",
        "note": "Utilisez interface ou type pour définir la forme des props de vos composants."
    },
    {
        "titre": "Typer les hooks : useState",
        "contenu": "<div style='background: #edf2f7; padding: 18px; border-radius: 10px; color: #1a202c;'><h3 style='margin-top: 0; color: #2b6cb0;'>useState avec TypeScript</h3><p>TypeScript <strong>infère</strong> automatiquement le type à partir de la valeur initiale .</p><div style='background: #e2e8f0; padding: 15px; border-radius: 8px;'><pre style='margin: 0;'><code style='font-family: monospace;'>// Inférence automatique (string)\nconst [name, setName] = useState('');\n\n// Inférence automatique (number)\nconst [count, setCount] = useState(0);\n\n// Avec un type explicite pour un état plus complexe\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n}\nconst [user, setUser] = useState&lt;User | null&gt;(null);\n\n// Pour un tableau\nconst [users, setUsers] = useState&lt;User[]&gt;([]);</code></pre></div><p style='margin-top: 10px;'>Pour les types complexes, on spécifie le type générique <code>&lt;T&gt;</code> .</p></div>",
        "texteParle": "TypeScript est très intelligent avec useState. Si vous initialisez avec une chaîne vide, il sait que c'est un string. Si c'est un nombre, il sait que c'est un number. Vous n'avez rien à faire, l'inférence fonctionne. Mais pour des types plus complexes, comme un objet utilisateur, vous devez spécifier le type. Par exemple, pour un état qui peut être un utilisateur ou null, on utilise useState<User | null>(null). Pour un tableau d'utilisateurs, on utilise useState<User[]>([]). C'est une bonne pratique de typer explicitement les états complexes.",
        "note": "useState infère les types simples, mais les types complexes doivent être spécifiés explicitement."
    },
    {
        "titre": "Typer les événements",
        "contenu": "<div style='background: #fefcbf; padding: 18px; border-radius: 10px; color: #1a202c;'><h3 style='margin-top: 0; color: #d69e2e;'>Les événements React typés</h3><p>React fournit des types pour tous les événements DOM.</p><div style='background: #f6e05e; padding: 15px; border-radius: 8px;'><pre style='margin: 0;'><code style='font-family: monospace;'>import { ChangeEvent, FormEvent, MouseEvent } from 'react';\n\n// Input texte\nconst handleChange = (e: ChangeEvent&lt;HTMLInputElement&gt;) => {\n  setValue(e.target.value);\n};\n\n// Formulaire\nconst handleSubmit = (e: FormEvent&lt;HTMLFormElement&gt;) => {\n  e.preventDefault();\n  // ...\n};\n\n// Bouton\nconst handleClick = (e: MouseEvent&lt;HTMLButtonElement&gt;) => {\n  console.log('Click !');\n};</code></pre></div></div>",
        "texteParle": "Quand vous gérez des événements en React, vous pouvez aussi les typer. React fournit des types pour tous les événements DOM. Par exemple, pour un input, on utilise ChangeEvent<HTMLInputElement>. Pour un formulaire, FormEvent<HTMLFormElement>. Pour un bouton, MouseEvent<HTMLButtonElement>. Ces types vous donnent accès à toutes les propriétés de l'événement de manière typée. C'est très pratique pour éviter les erreurs. N'oubliez pas d'importer les types depuis 'react'.",
        "note": "Utilisez ChangeEvent, FormEvent, MouseEvent pour typer les événements React."
    },
    {
        "titre": "Le type React.FC et ses limites",
        "contenu": "<div style='background: #e6fffa; padding: 18px; border-radius: 10px; border-left: 5px solid #319795; color: #1a202c;'><h3 style='margin-top: 0; color: #2b6cb0;'>Function Component avec TypeScript</h3><p><code>React.FC</code> (ou <code>React.FunctionComponent</code>) est un type générique pour les composants fonctionnels .</p><div style='background: #b2f5ea; padding: 15px; border-radius: 8px;'><pre style='margin: 0;'><code style='font-family: monospace;'>// Avec React.FC\nconst UserCard: React.FC&lt;UserCardProps&gt; = ({ name, age, children }) => {\n  return &lt;div&gt;...&lt;/div&gt;;\n};\n\n// Sans React.FC (préféré)\nfunction UserCard({ name, age, children }: UserCardProps) {\n  return &lt;div&gt;...&lt;/div&gt;;\n}\n\n// Ou avec const\nconst UserCard = ({ name, age }: UserCardProps) => {\n  return &lt;div&gt;...&lt;/div&gt;;\n};</code></pre></div><p style='margin-top: 10px;'>⚠️ <code>React.FC</code> inclut <code>children</code> par défaut, ce qui peut être indésirable.</p></div>",
        "texteParle": "React propose un type appelé React.FC, pour Function Component. Il permet de typer un composant fonctionnel avec ses props. Par exemple, 'const UserCard: React.FC<UserCardProps> = ...'. Mais aujourd'hui, beaucoup de développeurs préfèrent ne pas utiliser React.FC. Pourquoi ? Parce que React.FC inclut automatiquement la prop 'children', même si votre composant ne l'utilise pas. Cela peut créer des confusions. La pratique recommandée est soit d'utiliser 'function' avec les props typées, soit de déclarer une const. Les deux approches sont claires et évitent le problème de children implicite.",

        "texteParle": "Avec useRef, on peut soit référencer un élément DOM, soit stocker une valeur mutable. Pour un élément DOM, on utilise le type de l'élément, comme HTMLInputElement, et on initialise avec null. TypeScript sait alors que la valeur peut être null ou l'élément. L'opérateur '?.' (optional chaining) permet d'accéder en toute sécurité à l'élément. Pour une valeur mutable, on utilise le type de la valeur, comme number, et on initialise avec la valeur de départ. C'est aussi simple que ça.",

        "contenu": "<div style='background: #fff5f5; padding: 18px; border-radius: 10px; border-left: 5px solid #e53e3e; color: #1a202c;'><h3 style='margin-top: 0; color: #2b6cb0;'>Créer des composants génériques</h3><p>On peut créer des composants qui acceptent des <strong>types variables</strong> .</p><div style='background: #fed7d7; padding: 15px; border-radius: 8px;'><pre style='margin: 0;'><code style='font-family: monospace;'>interface ListProps&lt;T&gt; {\n  items: T[];\n  renderItem: (item: T) => React.ReactNode;\n  keyExtractor: (item: T) => string | number;\n}\n\nfunction List&lt;T&gt;({ items, renderItem, keyExtractor }: ListProps&lt;T&gt;) {\n  return (\n    &lt;ul&gt;\n      {items.map(item => (\n        &lt;li key={keyExtractor(item)}&gt;\n          {renderItem(item)}\n        &lt;/li&gt;\n      ))}\n    &lt;/ul&gt;\n  );\n}\n\n// Utilisation\n&lt;List\n  items={users}\n  renderItem={(user) => &lt;UserCard user={user} /&gt;}\n  keyExtractor={(user) => user.id}\n/&gt;</code></pre></div></div>",
        "texteParle": "Un concept plus avancé est celui des composants génériques. C'est un composant qui peut fonctionner avec différents types de données. Par exemple, une liste qui peut afficher des utilisateurs, des articles, ou n'importe quel type de données. Pour cela, on utilise un type générique T. L'interface ListProps prend un type T, et on définit que items est un tableau de T, renderItem prend un T et retourne du JSX, et keyExtractor prend un T et retourne une clé. Le composant List est lui aussi générique. À l'utilisation, TypeScript infère automatiquement le type à partir des données qu'on lui passe.",

        "texteParle": "Pour terminer, voici un résumé des types essentiels à retenir pour typer vos composants React. On utilise une interface pour typer les props des composants. On évite React.FC qui inclut children par défaut. Pour les événements, on utilise ChangeEvent, FormEvent, MouseEvent avec le type de l'élément. Pour useState, on spécifie le type avec les génériques, surtout pour les types complexes. Pour useRef, on donne le type de l'élément ou de la valeur. Et pour les composants réutilisables, on peut créer des composants génériques avec des types variables. Avec ces bases, vous pouvez typer efficacement toutes vos applications React.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';

                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
</body>
</html>
