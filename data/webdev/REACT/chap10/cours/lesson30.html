<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux composants génériques",
    "contenu": "<div style='padding: 10px;'><p>Les <strong>composants génériques</strong> sont des blocs réutilisables qui peuvent être adaptés à différents contextes.</p><div style='background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 10px 0; color: #2c3e50; text-align: center;'>\n🧩 <strong>Composant générique</strong> → 📦 <strong>Réutilisable</strong> → 🔄 <strong>Adaptable</strong>\n</div><p><strong>Pourquoi créer des composants génériques ?</strong></p><ul><li>✅ <strong>Réutilisabilité</strong> : Écrivez une fois, utilisez partout</li><li>✅ <strong>Maintenance</strong> : Une seule modification pour tous les usages</li><li>✅ <strong>Cohérence</strong> : Même apparence et comportement partout</li><li>✅ <strong>Productivité</strong> : Moins de code à écrire</li></ul><div style='background: #e8f4fd; padding: 12px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0; color: #2c3e50;'><strong>💡 Exemples :</strong> Button, Card, Modal, Input, Select, Table, etc.</p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons apprendre à créer des composants génériques et réutilisables en React. Un composant générique est un composant qui peut être utilisé dans différents contextes avec des données et des comportements différents. L'objectif est d'écrire du code une fois et de le réutiliser partout. Les avantages sont nombreux : vous gagnez du temps, vous avez une interface cohérente dans toute votre application, et la maintenance est plus facile car vous modifiez un seul composant au lieu de plusieurs. Les exemples typiques sont les boutons, les cartes, les modales, les champs de saisie, les tableaux, etc. C'est une compétence essentielle pour devenir un développeur React professionnel.",
    "note": "Les composants génériques sont la base d'une architecture React maintenable."
  },
  {
    "titre": "Le pattern children",
    "contenu": "<div style='padding: 10px;'><p><code>children</code> est une prop spéciale qui permet de passer du contenu imbriqué à un composant.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Composant Card générique\nfunction Card({ title, children }) {\n  return (\n    &lt;div className=\"card\"&gt;\n      &lt;div className=\"card-header\"&gt;{title}&lt;/div&gt;\n      &lt;div className=\"card-body\"&gt;{children}&lt;/div&gt;\n    &lt;/div&gt;\n  );\n}\n\n// Utilisation\nfunction App() {\n  return (\n    &lt;div&gt;\n      &lt;Card title=\"Bienvenue\"&gt;\n        &lt;p&gt;Ceci est le contenu de la carte.&lt;/p&gt;\n        &lt;button&gt;Cliquez ici&lt;/button&gt;\n      &lt;/Card&gt;\n      &lt;Card title=\"Contact\"&gt;\n        &lt;form&gt;...&lt;/form&gt;\n      &lt;/Card&gt;\n    &lt;/div&gt;\n  );\n}\n</pre><ul><li><code>children</code> peut contenir du texte, des éléments HTML ou d'autres composants</li><li>Le composant parent contrôle la structure, l'enfant contrôle le contenu</li><li>C'est la base du pattern de composition en React</li></ul></div>",
    "texteParle": "Le pattern children est un concept fondamental en React. La prop children permet de passer du contenu imbriqué à un composant. Par exemple, vous créez un composant Card qui a un titre et un corps. Le corps de la carte est défini par children, ce qui signifie que vous pouvez y mettre n'importe quel contenu : du texte, des images, des formulaires, ou même d'autres composants. Cela rend le composant Card très flexible et réutilisable. Vous définissez la structure de la carte une fois, et vous pouvez la remplir avec du contenu différent à chaque utilisation. C'est le cœur du pattern de composition en React.",
    "note": "children est la prop la plus puissante pour la composition de composants."
  },
  {
    "titre": "Exemple - Composant Modal",
    "contenu": "<div style='padding: 10px;'><p>Créons un composant Modal générique avec le pattern children.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction Modal({ isOpen, onClose, title, children }) {\n  if (!isOpen) return null;\n\n  return (\n    &lt;div className=\"modal-overlay\"&gt;\n      &lt;div className=\"modal\"&gt;\n        &lt;div className=\"modal-header\"&gt;\n          &lt;h3&gt;{title}&lt;/h3&gt;\n          &lt;button onClick={onClose}&gt;×&lt;/button&gt;\n        &lt;/div&gt;\n        &lt;div className=\"modal-body\"&gt;{children}&lt;/div&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  );\n}\n\nfunction App() {\n  const [isOpen, setIsOpen] = useState(false);\n\n  return (\n    &lt;div&gt;\n      &lt;button onClick={() => setIsOpen(true)}&gt;Ouvrir Modal&lt;/button&gt;\n      &lt;Modal isOpen={isOpen} onClose={() => setIsOpen(false)} title=\"Confirmation\"&gt;\n        &lt;p&gt;Êtes-vous sûr de vouloir continuer ?&lt;/p&gt;\n        &lt;button onClick={() => setIsOpen(false)}&gt;Confirmer&lt;/button&gt;\n      &lt;/Modal&gt;\n    &lt;/div&gt;\n  );\n}\n</pre></div>",
    "texteParle": "Pour illustrer la puissance du pattern children, créons un composant Modal générique. Une modale est une fenêtre qui s'affiche par-dessus le contenu principal. Notre composant Modal reçoit des props comme isOpen pour savoir si elle est visible, onClose pour la fermer, title pour le titre, et children pour le contenu. Le contenu peut être n'importe quoi : un message de confirmation, un formulaire, des options. C'est grâce à children que la modale est flexible. Dans le composant App, on utilise useState pour gérer l'état d'ouverture de la modale. On passe le contenu spécifique à la modale via children. Ce pattern est très puissant.",
    "note": "Le pattern children rend les composants comme les modales extrêmement flexibles."
  },
  {
    "titre": "Composants contrôlés vs non contrôlés",
    "contenu": "<div style='padding: 10px;'><p>Cette distinction est essentielle pour les champs de formulaire et les composants interactifs.</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0;'><div style='background: #3498db; color: white; padding: 12px; border-radius: 6px;'><strong>🎮 Contrôlé</strong><br><span style='font-size: 0.85em;'>La valeur est gérée par React<br>(useState)</span></div><div style='background: #e67e22; color: white; padding: 12px; border-radius: 6px;'><strong>🎯 Non contrôlé</strong><br><span style='font-size: 0.85em;'>La valeur est gérée par le DOM</span></div></div><p><strong>Composant contrôlé :</strong></p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction InputControle() {\n  const [value, setValue] = useState('');\n  return &lt;input value={value} onChange={(e) => setValue(e.target.value)} /&gt;;\n}\n</pre><p><strong>Composant non contrôlé :</strong></p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction InputNonControle() {\n  const inputRef = useRef(null);\n  return &lt;input defaultValue=\"\" ref={inputRef} /&gt;;\n}\n</pre></div>",
    "texteParle": "Un autre concept important est la distinction entre composants contrôlés et non contrôlés. Cette distinction est particulièrement importante pour les champs de formulaire. Un composant contrôlé est un composant dont la valeur est gérée par React via un état. Chaque changement de l'input met à jour l'état, et la valeur de l'input est toujours synchronisée avec l'état. Un composant non contrôlé est un composant dont la valeur est gérée par le DOM lui-même. Vous utilisez une référence pour lire la valeur quand vous en avez besoin. La règle générale est : utilisez des composants contrôlés pour les formulaires, car ils sont plus prévisibles et plus faciles à valider.",
    "note": "Les composants contrôlés sont la norme en React pour les formulaires."
  },
  {
    "titre": "Exemple - Formulaire contrôlé",
    "contenu": "<div style='padding: 10px;'><p>Un formulaire complet avec des champs contrôlés :</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction Formulaire() {\n  const [form, setForm] = useState({\n    nom: '',\n    email: '',\n    age: 0\n  });\n\n  const handleChange = (e) => {\n    const { name, value } = e.target;\n    setForm(prev => ({ ...prev, [name]: value }));\n  };\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    console.log('Données soumises :', form);\n  };\n\n  return (\n    &lt;form onSubmit={handleSubmit}&gt;\n      &lt;input name=\"nom\" value={form.nom} onChange={handleChange} /&gt;\n      &lt;input name=\"email\" value={form.email} onChange={handleChange} /&gt;\n      &lt;input name=\"age\" type=\"number\" value={form.age} onChange={handleChange} /&gt;\n      &lt;button type=\"submit\"&gt;Envoyer&lt;/button&gt;\n    &lt;/form&gt;\n  );\n}\n</pre><ul><li>Un seul état pour tout le formulaire</li><li>Une seule fonction handleChange pour tous les champs</li><li>L'état est toujours la source de vérité</li></ul></div>",
    "texteParle": "Voici un exemple complet de formulaire contrôlé. On utilise un seul état pour stocker toutes les valeurs du formulaire. Chaque champ a un attribut name qui correspond à la clé dans l'objet d'état. La fonction handleChange est générique : elle utilise le name du champ pour mettre à jour la bonne propriété dans l'état. Le formulaire est entièrement contrôlé par React : les valeurs des champs sont toujours synchronisées avec l'état. Quand l'utilisateur soumet le formulaire, on a accès à toutes les données dans l'état. C'est beaucoup plus prévisible et plus facile à gérer qu'avec des composants non contrôlés.",
    "note": "Les formulaires contrôlés offrent un meilleur contrôle et une meilleure validation."
  },
  {
    "titre": "Composition avancée",
    "contenu": "<div style='padding: 10px;'><p>La composition permet de combiner des composants pour créer des fonctionnalités complexes.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\n// Composants de base\nfunction Input({ label, ...props }) {\n  return (\n    &lt;div&gt;\n      &lt;label&gt;{label}&lt;/label&gt;\n      &lt;input {...props} /&gt;\n    &lt;/div&gt;\n  );\n}\n\nfunction Button({ children, variant = 'primary', ...props }) {\n  return &lt;button className={`btn-${variant}`} {...props}&gt;{children}&lt;/button&gt;;\n}\n\n// Composition\nfunction FormulaireInscription() {\n  return (\n    &lt;form&gt;\n      &lt;Input label=\"Nom\" name=\"nom\" /&gt;\n      &lt;Input label=\"Email\" type=\"email\" name=\"email\" /&gt;\n      &lt;Input label=\"Mot de passe\" type=\"password\" name=\"password\" /&gt;\n      &lt;Button variant=\"success\"&gt;S'inscrire&lt;/Button&gt;\n    &lt;/form&gt;\n  );\n}\n</pre><p>Les composants de base sont réutilisables et peuvent être composés pour créer des interfaces complexes.</p></div>",
    "texteParle": "La composition est le principe qui permet de construire des interfaces complexes à partir de composants simples. Au lieu de créer un énorme composant qui fait tout, vous créez des petits composants spécialisés que vous assemblez. Par exemple, vous créez un composant Input générique qui affiche un label et un champ de saisie. Vous créez un composant Button générique avec différentes variantes. Ensuite, vous composez ces composants pour créer un FormulaireInscription. Chaque composant est simple, testable, et réutilisable. La composition est la clé d'une architecture React propre et maintenable.",
    "note": "La composition est préférable à l'héritage en React."
  },
  {
    "titre": "Props spreading avec ...rest",
    "contenu": "<div style='padding: 10px;'><p>La technique du <strong>props spreading</strong> permet de passer toutes les props non utilisées à un élément enfant.</p><pre style='background: #2d2d2d; color: #f8f8f2; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em;'>\nfunction Input({ label, id, ...rest }) {\n  return (\n    &lt;div&gt;\n      &lt;label htmlFor={id}&gt;{label}&lt;/label&gt;\n      &lt;input id={id} {...rest} /&gt;\n    &lt;/div&gt;\n  );\n}\n\n// Utilisation\nfunction App() {\n  return (\n    &lt;div&gt;\n      &lt;Input \n        label=\"Email\" \n        id=\"email\" \n        type=\"email\" \n        placeholder=\"Entrez votre email\"\n        required\n      /&gt;\n    &lt;/div>\n  );\n}\n</pre><ul><li><code>...rest</code> contient toutes les props non destructurées</li><li>Permet de passer des props HTML standards comme <code>type</code>, <code>placeholder</code>, <code>required</code></li><li>Très utile pour créer des composants génériques</li></ul></div>",
    "texteParle": "Une technique avancée très utile est le props spreading. Quand vous créez un composant générique comme un Input, vous voulez souvent que ce composant accepte toutes les props standards d'un champ HTML (type, placeholder, required, etc.). Au lieu de les définir une par une, vous utilisez le reste de l'opérateur pour capturer toutes les props non utilisées et les passer à l'élément input. Dans l'exemple, le composant Input utilise label et id, et tout le reste est passé à l'élément input. Cela rend votre composant très flexible et compatible avec toutes les props HTML standard.",
    "note": "Le props spreading rend les composants génériques très flexibles."
  },
  {

    "contenu": "<div style='padding: 10px;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;'><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Composants atomiques</strong><br><span style='font-size: 0.8em;'>Un composant = une responsabilité</span></div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Props par défaut</strong><br><span style='font-size: 0.8em;'>Pour les props optionnelles</span></div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Composition</strong><br><span style='font-size: 0.8em;'>Préférer la composition à l'héritage</span></div><div style='background: #2ecc71; color: white; padding: 10px; border-radius: 6px;'><strong>✅ Contrôlé par défaut</strong><br><span style='font-size: 0.8em;'>Préférer les composants contrôlés</span></div><div style='background: #e67e22; color: white; padding: 10px; border-radius: 6px;'><strong>❌ Trop de props</strong><br><span style='font-size: 0.8em;'>Diviser en sous-composants</span></div><div style='background: #e67e22; color: white; padding: 10px; border-radius: 6px;'><strong>❌ Logique métier</strong><br><span style='font-size: 0.8em;'>Séparer la logique de l'affichage</span></div></div><p><strong>Principes à retenir :</strong></p><ul><li>Un composant doit faire <strong>une seule chose</strong> (principe de responsabilité unique)</li><li>Les composants doivent être <strong>indépendants</strong> et <strong>testables</strong></li><li>La <strong>composition</strong> est préférable à l'héritage</li></ul></div>",
    "texteParle": "Voici quelques bonnes pratiques pour la composition de composants. Créez des composants atomiques qui font une seule chose. Utilisez des props par défaut pour les props optionnelles. Préférez la composition à l'héritage, car c'est plus flexible. Utilisez des composants contrôlés par défaut pour les formulaires. Évitez les composants qui ont trop de props : c'est souvent le signe qu'ils devraient être divisés en sous-composants. Et séparez la logique métier de l'affichage. Ces principes vous aideront à créer une architecture propre et maintenable. Un composant doit faire une seule chose, être indépendant, et facile à tester.",
    "note": "Ces bonnes pratiques sont essentielles pour une architecture React professionnelle."

  {

    "contenu": "<div style='padding: 10px;'><p>Quand utiliser un composant générique et quand utiliser un hook personnalisé ?</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0;'><div style='background: #3498db; color: white; padding: 12px; border-radius: 6px;'><strong>🧩 Composant</strong><br><span style='font-size: 0.85em;'>Pour le <strong>rendu</strong> et l'<strong>interface</strong></span><br><span style='font-size: 0.8em;'>Ex: Button, Card, Modal</span></div><div style='background: #2ecc71; color: white; padding: 12px; border-radius: 6px;'><strong>⚡ Hook personnalisé</strong><br><span style='font-size: 0.85em;'>Pour la <strong>logique</strong> et les <strong>effets</strong></span><br><span style='font-size: 0.8em;'>Ex: useFetch, useLocalStorage</span></div></div><p><strong>Exemple : Gestion du thème</strong></p><ul><li><strong>Hook :</strong> <code>useTheme()</code> pour la logique du thème</li><li><strong>Composant :</strong> <code>&lt;ThemeProvider&gt;</code> pour le rendu et le contexte</li></ul><p>Les deux sont complémentaires et se combinent pour créer des solutions complètes.</p></div>",
    "texteParle": "Il est important de savoir quand utiliser un composant générique et quand utiliser un hook personnalisé. Les composants sont pour le rendu et l'interface utilisateur. Si vous voulez créer un bouton réutilisable, vous créez un composant Button. Les hooks personnalisés sont pour la logique et les effets. Si vous voulez réutiliser la logique de récupération de données, vous créez un hook useFetch. Les deux sont complémentaires. Par exemple, pour gérer un thème, vous pouvez avoir un hook useTheme pour la logique, et un composant ThemeProvider pour le rendu. La clé est de séparer clairement ce qui relève de l'affichage et ce qui relève de la logique.",

    "texteParle": "Pour récapituler, nous avons vu comment créer des composants génériques et réutilisables avec le pattern children. Les composants génériques réduisent la duplication de code et facilitent la maintenance. children permet la composition de composants, ce qui est plus flexible que l'héritage. Nous avons distingué les composants contrôlés, dont l'état est géré par React, des composants non contrôlés, dont l'état est géré par le DOM. Pour les formulaires, les composants contrôlés sont recommandés car ils sont plus prévisibles. Enfin, séparez clairement ce qui relève de l'interface utilisateur et ce qui relève de la logique métier. Dans la prochaine leçon, nous verrons comment optimiser les performances avec React.memo.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
