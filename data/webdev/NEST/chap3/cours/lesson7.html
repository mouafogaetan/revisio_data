<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue !",
    "contenu": "<div style='text-align: center; padding: 20px; background: linear-gradient(135deg, #e0234e, #c72a4e); border-radius: 12px; color: white;'><h1 style='color: white;'>✅ Leçon 7 : Validation des données avec DTO et class-validator</h1><p style='font-size: 1.2em;'>Sécurisez vos API en validant les entrées utilisateur</p><p style='font-size: 1em; margin-top: 15px;'>Aujourd'hui, nous allons apprendre à créer des <strong>DTO</strong> (Data Transfer Objects) et à utiliser <strong>class-validator</strong> pour valider les données entrantes dans NestJS.</p><div style='display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px;'><span style='background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px;'>#DTO</span><span style='background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px;'>#Validation</span><span style='background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px;'>#class-validator</span></div></div>",
    "texteParle": "Bonjour à tous et bienvenue dans ce cours sur NestJS. Aujourd'hui, nous allons aborder un sujet essentiel pour toute API robuste : la validation des données. Quand un client envoie des données à votre API, vous devez vous assurer qu'elles sont correctes avant de les traiter. Nous allons voir comment créer des DTO, c'est-à-dire des objets qui définissent la structure attendue des données, et comment utiliser la bibliothèque class-validator pour valider ces données de manière déclarative. C'est une pratique indispensable pour la sécurité et la fiabilité de vos applications.",
    "note": "La validation des données est une bonne pratique de sécurité et de robustesse."
  },
  {
    "titre": "Qu'est-ce qu'un DTO ?",
    "contenu": "<div><p>Un <strong>DTO (Data Transfer Object)</strong> est un objet qui définit la structure des données échangées entre le client et l'API. C'est un <strong>contrat</strong> qui spécifie quelles données sont attendues.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>À quoi servent les DTO ?</strong></p><ul><li>Ils définissent <strong>explicitement</strong> la forme des données attendues.</li><li>Ils permettent d'<strong>encapsuler</strong> les données et de les <strong>valider</strong> avant qu'elles n'atteignent la couche métier.</li><li>Ils améliorent la <strong>maintenabilité</strong> en clarifiant les contrats entre le frontend et le backend.</li><li>Ils aident à prévenir les <strong>erreurs</strong> et les <strong>failles de sécurité</strong>.</li></ul></div><div style='background-color: #f0fdf4; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #22c55e; color: #14532d;'><p><strong>Exemple :</strong></p><p>Pour créer un utilisateur, votre API attend un objet avec <code>nom</code>, <code>email</code> et <code>motDePasse</code>. Le DTO <code>CreateUserDto</code> définit cette structure.</p></div></div>",
    "texteParle": "Un DTO, pour Data Transfer Object, est un objet qui définit la structure des données que votre API attend ou renvoie. C'est un peu comme un contrat entre le client et le serveur. Il permet de savoir exactement quelles propriétés sont attendues et de quel type elles doivent être. Les DTO sont très utiles pour maintenir une API cohérente et pour valider les données avant de les traiter. Par exemple, pour créer un utilisateur, vous allez définir un DTO qui précise que vous attendez un nom, un email et un mot de passe. Sans DTO, vous n'auriez aucun moyen de savoir ce que le client est censé envoyer.",
    "note": "Les DTO sont généralement des classes TypeScript avec des propriétés en lecture seule (readonly). [citation:5]"
  },
  {
    "titre": "Installation de class-validator",
    "contenu": "<div><p>Pour valider les DTO, nous allons utiliser la bibliothèque <strong>class-validator</strong> et <strong>class-transformer</strong>.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>Installation :</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>npm i --save class-validator class-transformer</code></pre></div><p><strong>Pourquoi ces bibliothèques ?</strong></p><ul><li><strong>class-validator</strong> fournit des <strong>décorateurs</strong> pour appliquer des règles de validation sur les propriétés des classes.</li><li><strong>class-transformer</strong> permet de <strong>transformer</strong> les objets (ex: convertir une chaîne en nombre, une chaîne en Date).</li></ul><div style='background-color: #fef2f2; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #ef4444; color: #7f1d1d;'><p><strong>💡 Important :</strong> <code>class-validator</code> et <code>class-transformer</code> sont des bibliothèques JavaScript populaires, mais elles sont <strong>parfaitement intégrées</strong> à NestJS.</p></div></div>",
    "texteParle": "Pour mettre en place la validation dans NestJS, nous allons utiliser deux bibliothèques : class-validator et class-transformer. La première, class-validator, fournit des décorateurs qui permettent de définir des règles de validation directement sur les propriétés de vos classes. La deuxième, class-transformer, permet de transformer les données, par exemple pour convertir une chaîne de caractères en nombre ou en date. Elles s'installent facilement avec la commande 'npm i --save class-validator class-transformer'. Ces bibliothèques sont très populaires dans l'écosystème JavaScript et sont parfaitement intégrées à NestJS.",
    "note": "Le ValidationPipe de NestJS s'appuie sur ces deux bibliothèques pour fonctionner. [citation:3]"
  },
  {
    "titre": "Création d'un DTO avec validation",
    "contenu": "<div><p>Un DTO est une classe TypeScript dont les propriétés sont décorées avec des validateurs de <code>class-validator</code>.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>Exemple : DTO pour créer un utilisateur</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>import { IsString, IsEmail, IsInt, Min, Max, Length } from 'class-validator';\n\nexport class CreateUserDto {\n  @IsString()\n  @Length(2, 30, { message: 'Le nom doit contenir entre 2 et 30 caractères' })\n  readonly name: string;\n\n  @IsEmail({}, { message: 'Email invalide' })\n  readonly email: string;\n\n  @IsString()\n  @Length(8, 50, { message: 'Le mot de passe doit contenir entre 8 et 50 caractères' })\n  readonly password: string;\n\n  @IsInt()\n  @Min(18, { message: 'L\\'âge doit être au moins 18 ans' })\n  @Max(100, { message: 'L\\'âge ne doit pas dépasser 100 ans' })\n  readonly age: number;\n}</code></pre></div><p><strong>Décorateurs utilisés :</strong></p><ul><li><code>@IsString()</code> : Vérifie que la valeur est une chaîne de caractères.</li><li><code>@IsEmail()</code> : Vérifie que la valeur est un email valide.</li><li><code>@IsInt()</code> : Vérifie que la valeur est un nombre entier.</li><li><code>@Length()</code> : Vérifie la longueur d'une chaîne.</li><li><code>@Min()</code>, <code>@Max()</code> : Vérifie les valeurs minimales et maximales.</li></ul></div>",
    "texteParle": "Pour créer un DTO avec validation, vous définissez une classe TypeScript et vous décorez ses propriétés avec des décorateurs de class-validator. Par exemple, pour un formulaire de création d'utilisateur, vous allez avoir des propriétés comme 'name', 'email', 'password' et 'age'. Vous allez utiliser '@IsString()' pour vous assurer que le nom est une chaîne, '@IsEmail()' pour valider l'email, '@IsInt()' pour l'âge, etc. Vous pouvez également ajouter des messages d'erreur personnalisés pour chaque validation. C'est une approche très déclarative et facile à lire.",
    "note": "Les propriétés des DTO sont souvent déclarées en 'readonly' pour les rendre immuables. [citation:5]"
  },
  {
    "titre": "Validation des objets imbriqués",
    "contenu": "<div><p>Il est possible de valider des <strong>objets imbriqués</strong> dans un DTO.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>Exemple : Photo dans un DTO utilisateur</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>// UserPhotoDto\nexport class UserPhotoDto {\n  @IsString()\n  @Length(2, 100)\n  readonly name: string;\n\n  @IsUrl({}, { message: 'URL invalide' })\n  readonly url: string;\n}\n\n// CreateUserDto\nexport class CreateUserDto {\n  // ... autres propriétés\n\n  @IsArray()\n  @ValidateNested({ each: true })\n  @Type(() => UserPhotoDto)\n  readonly photos: UserPhotoDto[];\n}</code></pre></div><p><strong>Décorateurs spécifiques :</strong></p><ul><li><code>@ValidateNested()</code> : Valide les objets imbriqués.</li><li><code>@Type(() => UserPhotoDto)</code> : Indique le type de l'objet imbriqué (nécessaire pour que <code>class-validator</code> sache quel schéma appliquer).</li><li><code>@IsArray()</code> : Vérifie que la propriété est un tableau.</li></ul></div>",
    "texteParle": "Il arrive souvent que vos données contiennent des objets imbriqués. Par exemple, un utilisateur peut avoir une liste de photos. Pour valider ces objets imbriqués, vous devez utiliser le décorateur '@ValidateNested()' et le décorateur '@Type()' de class-transformer. Le décorateur '@ValidateNested()' indique à class-validator qu'il doit valider les objets à l'intérieur de la propriété. Le décorateur '@Type()' est nécessaire parce que TypeScript ne peut pas déterminer automatiquement le type des objets imbriqués. Il permet de spécifier la classe à utiliser pour la validation.",
    "note": "Le décorateur @Type() de class-transformer est essentiel pour la validation des objets imbriqués. [citation:5]"
  },
  {
    "titre": "Utilisation du ValidationPipe",
    "contenu": "<div><p>Le <strong>ValidationPipe</strong> est le mécanisme de NestJS qui déclenche la validation des DTO.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>Configuration globale (recommandée) :</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>// main.ts\nimport { NestFactory } from '@nestjs/core';\nimport { AppModule } from './app.module';\nimport { ValidationPipe } from '@nestjs/common';\n\nasync function bootstrap() {\n  const app = await NestFactory.create(AppModule);\n  app.useGlobalPipes(new ValidationPipe());\n  await app.listen(3000);\n}\nbootstrap();</code></pre></div><div style='background-color: #f0fdf4; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #22c55e; color: #14532d;'><p><strong>Utilisation locale :</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>@Post()\ncreateUser(@Body(new ValidationPipe()) createUserDto: CreateUserDto) {\n  // Les données sont automatiquement validées\n}</code></pre></div><p>Le <code>ValidationPipe</code> va automatiquement :</p><ul><li><strong>Valider</strong> les données par rapport aux règles définies dans le DTO.</li><li><strong>Transformer</strong> les données si nécessaire (ex: conversion de types).</li><li><strong>Rejeter</strong> la requête avec une réponse 400 Bad Request si la validation échoue.</li></ul></div>",
    "texteParle": "Pour que la validation fonctionne, vous devez utiliser le ValidationPipe de NestJS. Vous pouvez le configurer globalement dans votre fichier 'main.ts' avec 'app.useGlobalPipes(new ValidationPipe())'. Cela appliquera la validation à toutes les requêtes. Vous pouvez aussi l'utiliser localement sur un contrôleur ou une route spécifique. Le ValidationPipe va automatiquement vérifier les données entrantes par rapport aux règles définies dans votre DTO. Si la validation échoue, il renverra une erreur 400 Bad Request au client.",
    "note": "Il est recommandé d'utiliser le ValidationPipe globalement pour une validation cohérente. [citation:5]"
  },
  {
    "titre": "Options du ValidationPipe",
    "contenu": "<div><p>Le <strong>ValidationPipe</strong> offre plusieurs options pour personnaliser son comportement.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>Options principales :</strong></p><ul><li><strong>whitelist: true</strong> : Supprime les propriétés qui ne sont pas dans le DTO.</li><li><strong>forbidNonWhitelisted: true</strong> : Rejette la requête si des propriétés non autorisées sont présentes.</li><li><strong>transform: true</strong> : Transforme automatiquement les données selon les types définis (ex: chaîne → nombre).</li></ul></div><div style='background-color: #f0fdf4; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #22c55e; color: #14532d;'><p><strong>Exemple :</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>app.useGlobalPipes(new ValidationPipe({\n  whitelist: true,        // Supprime les propriétés non définies dans le DTO\n  forbidNonWhitelisted: true, // Bloque les propriétés non autorisées\n  transform: true,        // Transforme les types automatiquement\n  disableErrorMessages: false, // Affiche les messages d'erreur (en développement)\n}));</code></pre></div><div style='background-color: #fef2f2; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #ef4444; color: #7f1d1d;'><p><strong>💡 Sécurité :</strong> Utiliser <code>whitelist</code> et <code>forbidNonWhitelisted</code> est une bonne pratique pour éviter les injections de propriétés indésirables.</p></div></div>",
    "texteParle": "Le ValidationPipe est configurable avec plusieurs options. La plus importante, c'est l'option 'whitelist'. Si vous la mettez à 'true', le pipe va supprimer automatiquement toutes les propriétés qui ne sont pas définies dans votre DTO. Cela permet d'éviter que des propriétés malveillantes ou inattendues soient injectées dans votre application. L'option 'forbidNonWhitelisted' va encore plus loin : elle rejette la requête si des propriétés non autorisées sont présentes. L'option 'transform' permet de convertir automatiquement les types, par exemple transformer une chaîne en nombre. C'est très pratique pour les données venues du frontend.",
    "note": "Le ValidationPipe utilise class-validator pour la validation et class-transformer pour la transformation. [citation:3]"
  },
  {
    "titre": "Personnalisation des messages d'erreur",
    "contenu": "<div><p>Il est possible de <strong>personnaliser</strong> les messages d'erreur pour chaque validation.</p><div style='background-color: #f3e8ff; padding: 15px; border-radius: 8px; margin: 10px 0; color: #1e1b4b;'><p><strong>Exemple :</strong></p><pre style='background: #1e1e2f; color: #cdd6f4; padding: 10px; border-radius: 6px;'><code>import { IsString, Length } from 'class-validator';\n\nexport class CreateUserDto {\n  @IsString()\n  @Length(2, 30, {\n    message: 'Le nom doit contenir entre 2 et 30 caractères. Valeur reçue : $value'\n  })\n  readonly name: string;\n}</code></pre></div><p>Les messages d'erreur personnalisés peuvent contenir :</p><ul><li><strong>$value</strong> : La valeur qui a échoué.</li><li><strong>$property</strong> : Le nom de la propriété.</li><li><strong>$target</strong> : L'objet cible.</li><li><strong>$constraints</strong> : Les contraintes qui ont échoué.</li></ul><div style='background-color: #f0fdf4; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 5px solid #22c55e; color: #14532d;'><p><strong>💡 Bonne pratique :</strong> Des messages d'erreur clairs aident les développeurs frontend et les utilisateurs finaux à comprendre ce qui ne va pas.</p></div></div>",
    "texteParle": "Les messages d'erreur par défaut de class-validator sont en anglais et assez génériques. Vous pouvez les personnaliser pour qu'ils soient plus compréhensibles pour vos utilisateurs. Par exemple, vous pouvez spécifier un message personnalisé dans le décorateur '@Length' pour indiquer exactement la longueur attendue. Vous pouvez même utiliser des variables comme '$value' pour afficher la valeur qui a posé problème. Des messages d'erreur clairs et précis facilitent la vie des développeurs qui utilisent votre API.",
    "note": "Des messages d'erreur bien conçus améliorent l'expérience des développeurs utilisant votre API."
  },
  {
    "titre": "Exercice pratique : DTO et validation",
    "contenu": "<div style='background-color: #fefce8; padding: 15px; border-radius: 8px; border-left: 5px solid #eab308; color: #333;'><p><strong>À vous de jouer !</strong></p><p>Vous devez créer une API pour gérer des livres. Chaque livre a les propriétés suivantes :</p><ul><li><strong>titre</strong> : chaîne de caractères, obligatoire, entre 3 et 100 caractères.</li><li><strong>auteur</strong> : chaîne de caractères, obligatoire, entre 2 et 50 caractères.</li><li><strong>annee</strong> : nombre entier, obligatoire, entre 1450 et 2025.</li><li><strong>isbn</strong> : chaîne de caractères, obligatoire, doit suivre le format ISBN-10 ou ISBN-13.</li></ul><p><strong>Consignes :</strong></p><ol><li>Créez un DTO <code>CreateBookDto</code> avec les validations appropriées.</li><li>Créez un contrôleur <code>BooksController</code> avec une route <code>POST /books</code> qui utilise ce DTO.</li><li>Configurez le ValidationPipe globalement.</li></ol><p><span style='background-color: #f3f4f6; padding: 5px 10px; border-radius: 20px; font-size: 0.9em;'>💡 Utilisez <code>@IsString()</code>, <code>@IsInt()</code>, <code>@Length()</code>, <code>@Min()</code>, <code>@Max()</code>, <code>@Matches()</code> pour la validation du format ISBN.</span></p></div>",
    "texteParle": "Pour mettre en pratique ce que nous venons d'apprendre, je vous propose un exercice. Vous allez créer une API pour gérer des livres. Vous devez définir un DTO 'CreateBookDto' avec les propriétés suivantes : titre, auteur, année et ISBN. Chaque propriété doit être validée avec les contraintes appropriées. Par exemple, le titre doit être une chaîne de caractères obligatoire de 3 à 100 caractères. L'année doit être un nombre entier compris entre 1450 et 2025. L'ISBN doit correspondre à un format spécifique. Vous allez ensuite créer un contrôleur avec une route POST pour créer un livre, en utilisant votre DTO. Cet exercice vous permettra de mettre en pratique toutes les notions que nous avons vues.",
    "note": "Pour valider le format ISBN, vous pouvez utiliser le décorateur @Matches() avec une expression régulière."

  {
    "titre": "Résumé et conclusion",
    "contenu": "<div style='background-color: #f0f9ff; padding: 20px; border-radius: 12px; text-align: center; color: #1e3a8a;'><h2 style='color: #0f172a;'>📋 Ce que nous avons appris aujourd'hui</h2><ul style='list-style: none; padding: 0;'><li style='padding: 8px; font-size: 1.1em;'>✅ Les <strong>DTO</strong> (Data Transfer Objects) définissent la structure des données échangées.</li><li style='padding: 8px; font-size: 1.1em;'>✅ <strong>class-validator</strong> fournit des décorateurs pour valider les propriétés des DTO.</li><li style='padding: 8px; font-size: 1.1em;'>✅ Le <strong>ValidationPipe</strong> déclenche la validation automatiquement.</li><li style='padding: 8px; font-size: 1.1em;'>✅ Les options <strong>whitelist</strong> et <strong>forbidNonWhitelisted</strong> améliorent la sécurité.</li></ul><p style='margin-top: 20px; font-style: italic;'>\"Une bonne validation est la première ligne de défense d'une API sécurisée.\"</p><div style='display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px;'><span style='background-color: #bfdbfe; padding: 5px 15px; border-radius: 20px; font-size: 0.9em;'>#NestJS</span><span style='background-color: #bfdbfe; padding: 5px 15px; border-radius: 20px; font-size: 0.9em;'>#Validation</span><span style='background-color: #bfdbfe; padding: 5px 15px; border-radius: 20px; font-size: 0.9em;'>#DTO</span></div></div>",
    "texteParle": "Pour résumer, nous avons vu aujourd'hui comment valider les données entrantes dans une API NestJS. Les DTO permettent de définir la structure des données et class-validator d'appliquer des règles de validation. Le ValidationPipe fait le lien entre les deux et permet d'appliquer la validation automatiquement à toutes les requêtes. N'oubliez pas d'utiliser les options 'whitelist' et 'forbidNonWhitelisted' pour renforcer la sécurité de vos API. Ce sont des pratiques essentielles pour développer des applications robustes et sécurisées.",

    "texteParle": "C'est tout pour aujourd'hui ! J'espère que cette leçon sur les DTO et la validation vous a été utile. N'oubliez pas de pratiquer avec l'exercice et d'explorer les autres décorateurs de class-validator. Il existe des validateurs pour les emails, les URL, les formats de date, et bien d'autres. La validation est une compétence essentielle pour tout développeur NestJS. À bientôt pour la prochaine leçon !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
