<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "NestJS - Framework Node.js progressif",
 "classe": "Développement Web",
 "sequence": "Séquence 2",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Questions de Cours (6 pts)",
     "points": "6 pts",
     "enonce": "<h3>Partie 1 : Concepts fondamentaux</h3><p>Répondez de manière claire et concise aux questions suivantes :</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (2 pts)</strong> Qu'est-ce que le conteneur d'Inversion de Contrôle (IoC) dans NestJS et quel est son rôle principal ?</p>",
         "reponse": "<p><strong>Réponse :</strong> Le conteneur IoC (Inversion of Control) est un mécanisme central de NestJS qui gère la création et l'injection des dépendances. Il permet de découpler la création des objets de leur utilisation en suivant le principe d'injection de dépendances. Grâce au conteneur IoC, les classes déclarent leurs dépendances dans le constructeur et le framework se charge de les fournir automatiquement <span style='color:#7f8c8d;font-size:0.9em;'>[citation:4]</span>.</p>"
       },
       {
         "question": "<p><strong>1.2 (2 pts)</strong> Expliquez brièvement ce qu'est un interceptor et donnez un exemple d'utilisation.</p>",
         "reponse": "<p><strong>Réponse :</strong> Un interceptor est un composant qui permet d'intercepter les requêtes HTTP avant qu'elles n'atteignent le contrôleur et les réponses avant qu'elles ne soient renvoyées au client. Il implémente l'interface <code>NestInterceptor</code> et peut exécuter du code avant et après l'appel à la méthode du contrôleur. Par exemple, on peut utiliser un interceptor pour : <br>- Transformer la structure des réponses (ajouter un timestamp, un statut) <br>- Mesurer le temps d'exécution des requêtes <br>- Gérer la mise en cache des réponses <span style='color:#7f8c8d;font-size:0.9em;'>[citation:3]</span>.</p>"
       },
       {
         "question": "<p><strong>1.3 (2 pts)</strong> Citez et expliquez brièvement les trois niveaux d'application possibles pour un interceptor dans NestJS.</p>",
         "reponse": "<p><strong>Réponse :</strong> Un interceptor peut être appliqué à trois niveaux différents dans NestJS : <br>1. <strong>Niveau méthode</strong> : avec <code>@UseInterceptors()</code> sur une méthode spécifique du contrôleur. <br>2. <strong>Niveau contrôleur</strong> : avec <code>@UseInterceptors()</code> sur la classe du contrôleur, s'applique à toutes ses méthodes. <br>3. <strong>Niveau global</strong> : avec <code>app.useGlobalInterceptors()</code> dans le fichier <code>main.ts</code>, s'applique à toute l'application <span style='color:#7f8c8d;font-size:0.9em;'>[citation:3]</span>.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Implémentation d'un Interceptor (6 pts)",
     "points": "6 pts",
     "enonce": "<h3>Partie 2 : Création d'un Interceptor de Logging</h3><p>Vous devez créer un interceptor qui journalise les requêtes HTTP avec leur temps d'exécution.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (3 pts)</strong> Écrivez le code complet d'un interceptor nommé <code>LoggingInterceptor</code> qui : <br>- Enregistre l'heure de début de la requête <br>- Récupère la méthode HTTP et l'URL <br>- Calcule et affiche le temps d'exécution en millisecondes <br>- Utilise l'opérateur <code>tap</code> de RxJS</p>",
         "reponse": "<p><strong>Réponse :</strong> <br><pre style='background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:5px;overflow-x:auto;font-family:monospace;font-size:0.9rem;'>import { Injectable, NestInterceptor, ExecutionContext, CallHandler } from '@nestjs/common';\nimport { Observable } from 'rxjs';\nimport { tap } from 'rxjs/operators';\n\n@Injectable()\nexport class LoggingInterceptor implements NestInterceptor {\n  intercept(context: ExecutionContext, next: CallHandler): Observable&lt;any&gt; {\n    const now = Date.now();\n    const request = context.switchToHttp().getRequest();\n    const method = request.method;\n    const url = request.url;\n    \n    console.log(`[Requête] ${method} ${url}`);\n    \n    return next.handle().pipe(\n      tap(() => {\n        const duration = Date.now() - now;\n        console.log(`[Réponse] ${method} ${url} - ${duration}ms`);\n      }),\n    );\n  }\n}</pre></p>"
       },
       {
         "question": "<p><strong>2.2 (3 pts)</strong> Expliquez comment appliquer cet interceptor : <br>a) À une méthode spécifique <br>b) À tout un contrôleur <br>c) Globalement à toute l'application</p>",
         "reponse": "<p><strong>Réponse :</strong> <br><strong>a) Niveau méthode :</strong> <br><pre style='background:#2d2d2d;color:#f8f8f2;padding:10px;border-radius:5px;overflow-x:auto;font-family:monospace;font-size:0.85rem;'>@Get()\n@UseInterceptors(LoggingInterceptor)\nfindAll() { ... }</pre><br><strong>b) Niveau contrôleur :</strong> <br><pre style='background:#2d2d2d;color:#f8f8f2;padding:10px;border-radius:5px;overflow-x:auto;font-family:monospace;font-size:0.85rem;'>@Controller('users')\n@UseInterceptors(LoggingInterceptor)\nexport class UsersController { ... }</pre><br><strong>c) Niveau global :</strong> <br><pre style='background:#2d2d2d;color:#f8f8f2;padding:10px;border-radius:5px;overflow-x:auto;font-family:monospace;font-size:0.85rem;'>const app = await NestFactory.create(AppModule);\napp.useGlobalInterceptors(new LoggingInterceptor());</pre></p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Middleware, Guard, Interceptor - Comparaison (4 pts)",
     "points": "4 pts",
     "enonce": "<h3>Partie 3 : Distinguer les composants transversaux</h3>",
     "questions": [
       {
         "question": "<p><strong>3.1 (2 pts)</strong> Remplissez le tableau suivant en comparant les caractéristiques des trois composants :</p><div style='background:#f8f9fa;padding:10px;border-radius:5px;overflow-x:auto;'><table style='width:100%;border-collapse:collapse;font-size:0.9rem;'><tr style='background:#e9ecef;'><th style='border:1px solid #dee2e6;padding:8px;'>Caractéristique</th><th style='border:1px solid #dee2e6;padding:8px;'>Middleware</th><th style='border:1px solid #dee2e6;padding:8px;'>Guard</th><th style='border:1px solid #dee2e6;padding:8px;'>Interceptor</th></tr><tr><td style='border:1px solid #dee2e6;padding:8px;'>Accès à la requête/réponse</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td></tr><tr><td style='border:1px solid #dee2e6;padding:8px;'>Peut modifier la réponse</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td><td style='border:1px solid #dee2e6;padding:8px;'>Non</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td></tr><tr><td style='border:1px solid #dee2e6;padding:8px;'>Peut bloquer l'exécution</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td><td style='border:1px solid #dee2e6;padding:8px;'>Non</td></tr><tr><td style='border:1px solid #dee2e6;padding:8px;'>Utilise RxJS</td><td style='border:1px solid #dee2e6;padding:8px;'>Non</td><td style='border:1px solid #dee2e6;padding:8px;'>Non</td><td style='border:1px solid #dee2e6;padding:8px;'>Oui</td></tr><tr><td style='border:1px solid #dee2e6;padding:8px;'>Cas d'usage typique</td><td style='border:1px solid #dee2e6;padding:8px;'>CORS, Logging brut</td><td style='border:1px solid #dee2e6;padding:8px;'>Authentification</td><td style='border:1px solid #dee2e6;padding:8px;'>Transformation, Cache</td></tr></table></div>",
         "reponse": "<p><strong>Réponse :</strong> Voir le tableau ci-dessus pour les réponses <span style='color:#7f8c8d;font-size:0.9em;'>[citation:3]</span>.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Cycle de Vie - Hooks (4 pts)",
     "points": "4 pts",
     "enonce": "<h3>Partie 4 : Hooks du cycle de vie</h3>",
     "questions": [
       {
         "question": "<p><strong>4.1 (2 pts)</strong> Expliquez la différence entre <code>OnModuleInit</code> et <code>OnApplicationBootstrap</code> et donnez un exemple d'utilisation pour chacun.</p>",
         "reponse": "<p><strong>Réponse :</strong> <br><strong>OnModuleInit</strong> : s'exécute lorsque chaque module est initialisé. Idéal pour initialiser des connexions spécifiques à un module. <br><strong>OnApplicationBootstrap</strong> : s'exécute une fois que tous les modules ont été chargés, juste avant que l'application ne commence à écouter les requêtes. Idéal pour des tâches de démarrage globales, comme vérifier la disponibilité des services ou charger des données en mémoire. <br><br>Exemple d'utilisation : <br><pre style='background:#2d2d2d;color:#f8f8f2;padding:10px;border-radius:5px;overflow-x:auto;font-family:monospace;font-size:0.85rem;'>@Injectable()\nexport class DatabaseService implements OnModuleInit {\n  async onModuleInit() {\n    await this.connectToDatabase(); // Connexion spécifique\n  }\n}\n\n@Injectable()\nexport class AppService implements OnApplicationBootstrap {\n  async onApplicationBootstrap() {\n    await this.loadInitialData(); // Chargement global\n  }\n}</pre></p>"
       },
       {
         "question": "<p><strong>4.2 (2 pts)</strong> Pourquoi utiliser <code>OnApplicationShutdown</code> et comment l'activer ?</p>",
         "reponse": "<p><strong>Réponse :</strong> <code>OnApplicationShutdown</code> permet d'exécuter du code lors de l'arrêt de l'application. Il est utilisé pour : <br>- Fermer proprement les connexions à la base de données <br>- Libérer les ressources (fichiers, sockets, etc.) <br>- Permettre aux requêtes en cours de se terminer (arrêt gracieux) <br><br>Pour l'activer, il faut appeler <code>app.enableShutdownHooks()</code> dans le fichier <code>main.ts</code> avant de démarrer l'application : <br><pre style='background:#2d2d2d;color:#f8f8f2;padding:10px;border-radius:5px;overflow-x:auto;font-family:monospace;font-size:0.85rem;'>const app = await NestFactory.create(AppModule);\napp.enableShutdownHooks();\nawait app.listen(3000);</pre></p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
