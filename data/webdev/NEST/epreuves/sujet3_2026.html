<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "NestJS - Framework Node.js progressif",
  "classe": "Développement Web",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'><p>Répondez de manière précise et concise aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1. (1 pt)</strong> Expliquez le rôle d'un <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>Guard</code> dans NestJS. Quelle est la différence entre un <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>AuthGuard</code> et un Guard personnalisé pour la gestion des rôles ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Un Guard détermine si une requête peut être traitée. Il retourne <code>true</code> (accès autorisé) ou <code>false</code> (accès refusé).</p><p>L'<strong>AuthGuard</strong> (de <code>@nestjs/passport</code>) valide automatiquement les tokens JWT et attache l'utilisateur à <code>req.user</code>.</p><p>Un Guard personnalisé, comme un <strong>RolesGuard</strong>, implémente l'interface <code>CanActivate</code> et peut vérifier des conditions spécifiques (ex: rôles de l'utilisateur). Il peut être combiné avec un décorateur <code>@Roles()</code> pour plus de flexibilité.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2. (1 pt)</strong> Décrivez l'architecture des <strong>microservices</strong> dans NestJS. Quels sont les différents <strong>transports</strong> supportés et quand les utiliser ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>L'architecture microservices dans NestJS découpe l'application en services indépendants communiquant via réseau. Chaque service a sa propre logique et base de données.</p><p>NestJS supporte plusieurs transports :</p><ul><li><strong>TCP</strong> : Simple et performant pour communication interne.</li><li><strong>Redis</strong> : Pub/Sub efficace pour les événements.</li><li><strong>RabbitMQ</strong> : Gestion avancée des files d'attente.</li><li><strong>gRPC</strong> : Haute performance avec protocole binaire.</li></ul><p>Le choix dépend de la latence, du volume de messages et de la complexité souhaitée.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3. (1 pt)</strong> Distinguez les méthodes <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>send()</code> et <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>emit()</code> d'un client de microservices.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>send()</code> est une communication <strong>request-response</strong> synchrone. Le client envoie un message et attend une réponse.</p><p><code>emit()</code> est une communication <strong>event-based</strong> asynchrone. Le client envoie un événement sans attendre de réponse, utile pour les notifications.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>4. (1 pt)</strong> Qu'est-ce qu'un <strong>module dynamique</strong> ? Dans quel cas utiliser <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>register()</code> ou <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>forRoot()</code> ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Un module dynamique est configurable à l'importation. Il renvoie un module dont les providers et imports dépendent d'options passées en paramètre.</p><p><code>forRoot()</code> configure un module qui ne sera importé qu'une seule fois (ex: module de base de données). <code>register()</code> permet des configurations multiples (ex: modules de fonctionnalités).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>5. (1 pt)</strong> Expliquez le rôle du décorateur <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>@MessagePattern()</code> dans un microservice.</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>@MessagePattern()</code> est utilisé dans les contrôleurs de microservices pour définir les modèles de messages écoutés.</p><p>Lorsque le microservice reçoit un message correspondant au modèle (ex: <code>'user.get'</code>), la méthode associée est exécutée. Il utilise <code>@Payload()</code> pour récupérer les données du message.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>6. (1 pt)</strong> Pourquoi éviter d'utiliser <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>@Req()</code> et <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>@Res()</code> dans les contrôleurs NestJS ?</div>",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>@Req()</code> et <code>@Res()</code> donnent accès aux objets natifs d'Express/Fastify. Leur utilisation contourne les mécanismes de NestJS (interceptors, filtres d'exception, etc.).</p><p>On leur préfère les décorateurs dédiés comme <code>@Param()</code>, <code>@Body()</code>, <code>@Query()</code>, <code>@Headers()</code> qui restent intégrés à l'écosystème NestJS.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse de code (7 pts)",
      "points": "7 pts",
      "enonce": "<div style='background: #fefcbf; padding: 15px; border-radius: 8px; color: #1a202c;'><p>Analysez le code ci-dessous et répondez aux questions. Cet extrait provient d'un module de gestion d'articles avec authentification JWT.</p></div>",
      "questions": [
        {
          "question": "<div style='background: #edf2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px;'><pre style='margin: 0;'><code style='font-family: monospace;'>// articles.controller.ts\n@Controller('articles')\n@UseGuards(AuthGuard('jwt'))\nexport class ArticlesController {\n  constructor(private articlesService: ArticlesService) {}\n\n  @Post()\n  create(@Body() createArticleDto: CreateArticleDto) {\n    return this.articlesService.create(createArticleDto);\n  }\n\n  @Get()\n  findAll(@Query('page') page: number, @Query('limit') limit: number) {\n    return this.articlesService.findAll(page, limit);\n  }\n\n  @Get(':id')\n  findOne(@Param('id') id: string) {\n    return this.articlesService.findOne(id);\n  }\n\n  @Patch(':id')\n  @Roles('admin')\n  update(@Param('id') id: string, @Body() updateArticleDto: UpdateArticleDto) {\n    return this.articlesService.update(id, updateArticleDto);\n  }\n\n  @Delete(':id')\n  @Roles('admin')\n  remove(@Param('id') id: string) {\n    return this.articlesService.remove(id);\n  }\n}</code></pre></div><strong>1. (1 pt)</strong> Quelles routes sont protégées par l'<code>AuthGuard</code> ?",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Toutes les routes du contrôleur sont protégées car <code>@UseGuards(AuthGuard('jwt'))</code> est placé au niveau du contrôleur. Cela inclut <code>POST /articles</code>, <code>GET /articles</code>, <code>GET /articles/:id</code>, <code>PATCH /articles/:id</code> et <code>DELETE /articles/:id</code>.</p></div>"
        },
        {
          "question": "<strong>2. (1 pt)</strong> Quel est le rôle du décorateur <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>@Roles('admin')</code> et comment fonctionne-t-il avec le Guard ?",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p><code>@Roles('admin')</code> est un décorateur qui stocke des métadonnées via <code>SetMetadata</code>. Un <strong>RolesGuard</strong> personnalisé lit ces métadonnées avec le <code>Reflector</code> et vérifie si l'utilisateur connecté possède le rôle requis.</p><p>L'<code>AuthGuard</code> valide d'abord l'identité (qui est l'utilisateur ?), puis le <code>RolesGuard</code> vérifie les permissions (qu'a-t-il le droit de faire ?).</p></div>"
        },
        {
          "question": "<strong>3. (1 pt)</strong> Identifiez les décorateurs utilisés pour récupérer les paramètres. Quelle est leur fonction respective ?",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><ul><li><code>@Body()</code> : Récupère les données du corps de la requête POST/PATCH.</li><li><code>@Query()</code> : Récupère les paramètres de la chaîne de requête (<code>?page=1&limit=10</code>).</li><li><code>@Param()</code> : Récupère les paramètres dynamiques de la route (<code>/articles/123</code> → id = '123').</li></ul></div>"
        },
        {
          "question": "<strong>4. (1.5 pts)</strong> Quelle modification apporteriez-vous pour que la route <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>GET /articles</code> soit publique (accessible sans authentification) ?",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Il faut retirer le Guard du contrôleur et le placer uniquement sur les routes à protéger :</p><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'><code>// Supprimer @UseGuards(AuthGuard('jwt')) du contrôleur\n@Controller('articles')\nexport class ArticlesController {\n  @Get()\n  findAll() { /* publique */ }\n\n  @Post()\n  @UseGuards(AuthGuard('jwt'))\n  create() { /* protégée */ }\n\n  @Patch(':id')\n  @UseGuards(AuthGuard('jwt'), RolesGuard)\n  @Roles('admin')\n  update() { /* protégée + admin */ }\n}</code></pre></div>"
        },
        {
          "question": "<strong>5. (1.5 pts)</strong> Proposez une implémentation du DTO <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>CreateArticleDto</code> avec validation (<code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>class-validator</code>). Incluez les champs suivants : <code>title</code> (chaîne, obligatoire), <code>content</code> (chaîne, obligatoire), <code>tags</code> (tableau de chaînes, optionnel).",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><pre style='background: #e2e8f0; padding: 10px; border-radius: 6px;'><code>import { IsString, IsOptional, IsArray, IsNotEmpty } from 'class-validator';\n\nexport class CreateArticleDto {\n  @IsString()\n  @IsNotEmpty({ message: 'Le titre est requis' })\n  title: string;\n\n  @IsString()\n  @IsNotEmpty({ message: 'Le contenu est requis' })\n  content: string;\n\n  @IsOptional()\n  @IsArray()\n  @IsString({ each: true })\n  tags?: string[];\n}</code></pre></div>"
        },
        {
          "question": "<strong>6. (1 pt)</strong> Si un utilisateur non authentifié tente d'accéder à <code style='background: #bee3f8; padding: 2px 6px; border-radius: 4px;'>POST /articles</code>, quelle sera la réponse du serveur ?",
          "reponse": "<div style='background: #e6fffa; padding: 12px; border-radius: 6px;'><p>Le serveur renverra une erreur <strong>401 Unauthorized</strong>, car l'<code>AuthGuard</code> détecte l'absence de token JWT valide dans les en-têtes de la requête.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Microservices (5 pts)",
      "points": "5 pts",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
