<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "NestJS - Framework Node.js progressif",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Architecture et concepts fondamentaux",
      "points": "6 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>📘 Exercice 1</p><p>NestJS est un framework progressif pour Node.js qui s'inspire d'Angular pour son architecture. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Expliquez ce qu'est un <strong>module</strong> dans NestJS et quel est son rôle dans l'architecture de l'application. [citation:5][citation:9]</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Un module est la <strong>unité organisationnelle centrale</strong> de NestJS. Il agroupe un ensemble de fonctionnalités liées : ses <strong>contrôleurs</strong>, <strong>services</strong>, et <strong>imports</strong> de modules. L'application entière est une arborescence de modules, avec le <code>AppModule</code> à la racine. La modularité est un des plus grands atouts du framework, car elle permet de travailler de manière isolée sur des fonctionnalités distinctes. [citation:5]</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Quelle est la différence entre un <strong>contrôleur</strong> et un <strong>service</strong> (provider) dans NestJS ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Un <strong>contrôleur</strong> est responsable de <strong>recevoir les requêtes HTTP</strong> et de retourner des réponses. Il définit les routes avec des décorateurs comme <code>@Get()</code> ou <code>@Post()</code>. En revanche, un <strong>service</strong> (annoté <code>@Injectable()</code>) contient la <strong>logique métier</strong> et peut être injecté dans les contrôleurs ou d'autres services. La séparation est claire : les contrôleurs gèrent l'aspect réseau, tandis que les services gèrent le traitement des données. [citation:5]</p></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> En quoi le système d'<strong>injection de dépendances</strong> (IoC container) de NestJS facilite-t-il la maintenance et les tests ?</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Le conteneur IoC (Inversion of Control) gère <strong>automatiquement la création</strong> et le <strong>cycle de vie</strong> des objets. Un service n'a pas à instancier manuellement ses dépendances, elles sont <strong>fournies externement</strong> via le constructeur. Cela rend le code <strong>plus découplé</strong>, <strong>plus testable</strong> (car on peut facilement substituer des mocks) et <strong>plus facile à maintenir</strong>. [citation:5]</p></div>"
        }
      ]
    },
    {
      "titre": "Controllers et gestion des routes",
      "points": "6 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>🌐 Exercice 2</p><p>Vous devez créer un contrôleur <code>ProductsController</code> pour gérer des produits. Utilisez les décorateurs appropriés.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Écrivez le code d'un contrôleur <code>ProductsController</code> avec les méthodes suivantes :</p><ul><li><code>GET /products</code> : retourne la liste des produits</li><li><code>GET /products/:id</code> : retourne un produit par son ID</li><li><code>POST /products</code> : crée un nouveau produit</li></ul><p>Utilisez les décorateurs <code>@Controller</code>, <code>@Get</code>, <code>@Post</code>, <code>@Param</code> et <code>@Body</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>import { Controller, Get, Post, Body, Param } from '@nestjs/common';\n\n@Controller('products')\nexport class ProductsController {\n  @Get()\n  findAll() {\n    return this.productsService.findAll();\n  }\n\n  @Get(':id')\n  findOne(@Param('id') id: string) {\n    return this.productsService.findOne(+id);\n  }\n\n  @Post()\n  create(@Body() createProductDto: any) {\n    return this.productsService.create(createProductDto);\n  }\n}</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Expliquez comment récupérer un <strong>paramètre de route</strong> (ex: <code>:id</code>) et un <strong>paramètre de requête</strong> (ex: <code>?category=... </code>) dans un contrôleur NestJS.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Pour récupérer un <strong>paramètre de route</strong>, on utilise le décorateur <code>@Param()</code> dans la méthode du contrôleur. Par exemple, <code>@Param('id') id: string</code>.</p><p>Pour récupérer un <strong>paramètre de requête</strong> (query string), on utilise le décorateur <code>@Query()</code>. Par exemple, <code>@Query('category') category: string</code>.</p><p>Ces décorateurs permettent d'extraire facilement les données de la requête. [citation:5]</p></div>"
        }
      ]
    },
    {
      "titre": "Services, DTO et Validation",
      "points": "8 pts",
      "enonce": "<div style='font-size: 0.95rem; line-height: 1.6; background-color: #f0f4f8; padding: 20px; border-radius: 12px; color: #1a202c;'><p style='font-weight: bold; font-size: 1.1rem; margin-top: 0;'>🔧 Exercice 3</p><p>Vous devez créer un service pour la gestion des produits et un DTO pour valider les données entrantes.</p></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>1)</strong> Créez un DTO <code>CreateProductDto</code> avec les propriétés suivantes :</p><ul><li><code>name</code> : chaîne de caractères, obligatoire</li><li><code>price</code> : nombre, obligatoire</li><li><code>description</code> : chaîne, optionnelle</li><li><code>category</code> : chaîne, optionnelle</li></ul><p>Utilisez les décorateurs de <code>class-validator</code> : <code>@IsString()</code>, <code>@IsNumber()</code>, <code>@IsOptional()</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>import { IsString, IsNumber, IsOptional } from 'class-validator';\n\nexport class CreateProductDto {\n  @IsString()\n  name: string;\n\n  @IsNumber()\n  price: number;\n\n  @IsOptional()\n  @IsString()\n  description?: string;\n\n  @IsOptional()\n  @IsString()\n  category?: string;\n}</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>2)</strong> Écrivez un service <code>ProductsService</code> avec une méthode <code>create</code> qui reçoit un DTO <code>CreateProductDto</code> et retourne le produit créé. Utilisez <code>@Injectable()</code>.</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><pre style='margin: 0; white-space: pre-wrap;'>import { Injectable } from '@nestjs/common';\nimport { CreateProductDto } from './dto/create-product.dto';\n\n@Injectable()\nexport class ProductsService {\n  private products = [];\n\n  create(createProductDto: CreateProductDto) {\n    const product = { id: Date.now(), ...createProductDto };\n    this.products.push(product);\n    return product;\n  }\n}</pre></div>"
        },
        {
          "question": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1a202c;'><p><strong>3)</strong> Expliquez le rôle du <code>ValidationPipe</code> global et comment il interagit avec les DTOs annotés par <code>class-validator</code>. [citation:5]</p></div>",
          "reponse": "<div style='background-color: #f0fff4; padding: 12px; border-radius: 8px; color: #22543d;'><p>Le <code>ValidationPipe</code> est un pipe global qui <strong>valide automatiquement</strong> les données entrantes (body, query, params) en se basant sur les <strong>décorateurs de <code>class-validator</code></strong> présents dans les DTOs.</p><p>Si la validation échoue, le pipe retourne une <strong>réponse d'erreur descriptive</strong> avant même que le contrôleur ne soit atteint. Cela permet de <strong>centraliser la validation</strong> et d'assurer l'intégrité des données. [citation:5]</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
