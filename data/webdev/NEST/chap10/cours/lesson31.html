<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 31 : Documentation OpenAPI (Swagger) | NestJS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, mais discret) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        .slide-visible {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        .slide-content {
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        body {
            background: #f8fafc;
        }
        .card-bg {
            background: #ffffff;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 0.75rem;
            }
            .slide-content {
                max-height: 65vh;
            }
        }
        .swagger-badge {
            background: #eef2ff;
            color: #1e40af;
        }
    </style>
</head>
<body class="font-sans antialiased p-4 md:p-6">

<div class="max-w-4xl mx-auto">
    <div class="card-bg rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <!-- Entête avec progression -->
        <div class="bg-gradient-to-r from-sky-700 to-blue-700 px-5 py-4 text-white">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide opacity-80">NestJS - Documentation API</p>
                    <h1 class="text-xl md:text-2xl font-bold">OpenAPI & Swagger</h1>
                    <p class="text-sm opacity-90 mt-1">Leçon 31 · Génération automatique de documentation</p>
                </div>
                <div class="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-mono">
                    <span id="slideCounter">1</span> / <span id="totalSlides"></span>
                </div>
            </div>
            <div class="w-full bg-white/30 rounded-full h-1.5 mt-3">
                <div id="progressBar" class="bg-yellow-300 h-1.5 rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Container des slides -->
        <div id="slidesContainer" class="p-5 md:p-7 bg-gray-50">
            <div class="text-center py-10 text-gray-500">Chargement du cours...</div>
        </div>

        <!-- Navigation -->
        <div class="px-5 py-4 border-t border-gray-200 bg-white flex justify-between items-center flex-wrap gap-3">
            <button id="prevSlide" class="nav-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-5 rounded-full transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                Précédent
            </button>
            <div class="flex gap-1" id="dotsIndicator"></div>
            <button id="nextSlide" class="nav-btn bg-sky-600 hover:bg-sky-700 text-white font-medium py-2 px-5 rounded-full transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                Suivant
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>
    </div>
    <p class="text-xs text-center text-gray-400 mt-5">📘 Swagger UI facilite la compréhension et le test des API REST</p>
</div>

<script>
    // Slides pour la leçon 31 : Documentation OpenAPI / Swagger
    const slidesData = [
        { // slide 1 : titre
            type: "title",
            title: "📖 Documentation OpenAPI avec Swagger",
            subtitle: "Générez automatiquement une documentation interactive pour votre API NestJS",
            icon: "📄"
        },
        { // slide 2 : objectifs pédagogiques
            type: "objectives",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "✅ Installer @nestjs/swagger et swagger-ui-express",
                "✅ Configurer SwaggerModule.setup() dans main.ts",
                "✅ Personnaliser les options (titre, version, description)",
                "✅ Documenter les endpoints avec @ApiTags, @ApiOperation, @ApiResponse",
                "✅ Utiliser @ApiProperty dans les DTO pour une documentation automatique"
            ]
        },
        { // slide 3 : Qu'est-ce que Swagger / OpenAPI ?
            type: "content",
            title: "🔍 Swagger / OpenAPI : une documentation vivante",
            content: `
                <p class="mb-3"><strong class="text-sky-700">OpenAPI</strong> (anciennement Swagger) est une spécification permettant de décrire une API REST. NestJS fournit un module <code class="bg-gray-200 px-1 rounded">@nestjs/swagger</code> qui génère cette documentation automatiquement à partir des décorateurs TypeScript.</p>
                <div class="bg-sky-50 border-l-4 border-sky-500 p-3 rounded-md mb-4">
                    <p class="text-sm font-semibold">✨ Avantages :</p>
                    <ul class="list-disc list-inside text-sm space-y-1">
                        <li>Documentation toujours à jour avec le code</li>
                        <li>Interface interactive (Swagger UI) pour tester les endpoints</li>
                        <li>Génération de clients SDK (TypeScript, Java, etc.)</li>
                    </ul>
                </div>
                <p class="text-sm">Swagger UI est une interface web qui lit la spécification OpenAPI et permet d'explorer et d'exécuter les requêtes directement depuis le navigateur.</p>
            `
        },
        { // slide 4 : Installation et configuration de base
            type: "content",
            title: "📦 Installation & configuration dans main.ts",
            content: `
                <p class="mb-2">Commande d'installation :</p>
                <div class="code-block mb-4">npm install @nestjs/swagger swagger-ui-express</div>
                <p class="mb-2">Dans <code>main.ts</code>, configurez Swagger :</p>
                <div class="code-block">
                    import { NestFactory } from '@nestjs/core';<br>
                    import { SwaggerModule, DocumentBuilder } from '@nestjs/swagger';<br>
                    import { AppModule } from './app.module';<br><br>
                    async function bootstrap() {<br>
                    &nbsp;&nbsp;const app = await NestFactory.create(AppModule);<br>
                    &nbsp;&nbsp;const config = new DocumentBuilder()<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;.setTitle('Mon API NestJS')<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;.setDescription('Documentation générée automatiquement')<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;.setVersion('1.0')<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;.addTag('utilisateurs')<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;.build();<br>
                    &nbsp;&nbsp;const document = SwaggerModule.createDocument(app, config);<br>
                    &nbsp;&nbsp;SwaggerModule.setup('api/docs', app, document);<br>
                    &nbsp;&nbsp;await app.listen(3000);<br>
                    }<br>
                    bootstrap();
                </div>
                <p class="text-sm mt-2">✅ Rendez-vous sur <code>http://localhost:3000/api/docs</code> pour voir l'interface Swagger UI.</p>
            `
        },
        { // slide 5 : Personnalisation des options (titre, description, version)
            type: "content",
            title: "⚙️ Personnaliser les métadonnées globales",
            content: `
                <p>Le <code>DocumentBuilder</code> offre plusieurs méthodes pour enrichir la documentation :</p>
                <div class="code-block my-3">
                    const config = new DocumentBuilder()<br>
                    &nbsp;&nbsp;.setTitle('API E-commerce')<br>
                    &nbsp;&nbsp;.setDescription('API de gestion de produits et commandes')<br>
                    &nbsp;&nbsp;.setVersion('2.0.0')<br>
                    &nbsp;&nbsp;.setContact('Support', 'https://exemple.com', 'contact@exemple.com')<br>
                    &nbsp;&nbsp;.setLicense('MIT', 'https://opensource.org/licenses/MIT')<br>
                    &nbsp;&nbsp;.addBearerAuth()  // Pour l'authentification JWT<br>
                    &nbsp;&nbsp;.addServer('https://api.exemple.com', 'Serveur de production')<br>
                    &nbsp;&nbsp;.build();
                </div>
                <p class="text-sm"><strong>🔐 addBearerAuth()</strong> permet d'ajouter un champ "Authorization: Bearer" dans Swagger UI pour tester les routes protégées.</p>
                <div class="bg-amber-50 p-2 rounded-md mt-2">📌 Astuce : Vous pouvez également créer plusieurs documents (ex: admin vs public) avec des configurations différentes.</div>
            `
        },
        { // slide 6 : Documenter les endpoints (tags, opérations, réponses)
            type: "content",
            title: "🏷️ Décorateurs pour les contrôleurs",
            content: `
                <p>Dans vos contrôleurs, utilisez les décorateurs Swagger pour enrichir la documentation :</p>
                <div class="code-block my-3">
                    import { Controller, Get, Param } from '@nestjs/common';<br>
                    import { ApiTags, ApiOperation, ApiResponse, ApiParam } from '@nestjs/swagger';<br><br>
                    @ApiTags('utilisateurs')<br>
                    @Controller('users')<br>
                    export class UsersController {<br>
                    &nbsp;&nbsp;@Get(':id')<br>
                    &nbsp;&nbsp;@ApiOperation({ summary: 'Récupérer un utilisateur par ID' })<br>
                    &nbsp;&nbsp;@ApiParam({ name: 'id', type: Number, description: 'Identifiant unique' })<br>
                    &nbsp;&nbsp;@ApiResponse({ status: 200, description: 'Utilisateur trouvé.' })<br>
                    &nbsp;&nbsp;@ApiResponse({ status: 404, description: 'Utilisateur inexistant.' })<br>
                    &nbsp;&nbsp;findOne(@Param('id') id: number) { ... }<br>
                    }
                </div>
                <p class="text-sm mt-2">✨ <code>@ApiBearerAuth()</code> sur le contrôleur ou la méthode pour exiger un token JWT. Vous pouvez aussi grouper les endpoints avec <code>@ApiTags('nom')</code>.</p>
            `
        },
        { // slide 7 : Documenter les DTO avec @ApiProperty
            type: "content",
            title: "📦 Documenter les DTO et entités",
            content: `
                <p>Les DTO (Data Transfer Object) sont automatiquement analysés par Swagger. Pour une documentation précise, utilisez <code>@ApiProperty()</code> :</p>
                <div class="code-block my-3">
                    import { ApiProperty } from '@nestjs/swagger';<br><br>
                    export class CreateUserDto {<br>
                    &nbsp;&nbsp;@ApiProperty({ example: 'jean.dupont@email.com', description: 'Email unique' })<br>
                    &nbsp;&nbsp;email: string;<br><br>
                    &nbsp;&nbsp;@ApiProperty({ minimum: 1, maximum: 120, example: 28 })<br>
                    &nbsp;&nbsp;age: number;<br><br>
                    &nbsp;&nbsp;@ApiProperty({ enum: ['admin', 'user'], default: 'user' })<br>
                    &nbsp;&nbsp;role: string;<br>
                    }
                </div>
                <p>Propriétés optionnelles avec <code>@ApiPropertyOptional()</code>. Les types imbriqués se gèrent avec <code>@ApiProperty({ type: () => ProfileDto })</code>.</p>
                <div class="bg-green-50 p-2 rounded-md mt-2">💡 NestJS supporte également les plugins Swagger pour générer automatiquement les propriétés (moins de code à écrire).</div>
            `
        },
        { // slide 8 : Exemple complet et exercice pratique
            type: "content",
            title: "🚀 Mise en pratique : documentez votre API",
            content: `
                <p class="font-semibold">Objectif : Ajouter Swagger à une API NestJS existante.</p>
                <ol class="list-decimal list-inside space-y-2 text-sm mt-2">
                    <li>Installer <code>@nestjs/swagger</code> et <code>swagger-ui-express</code>.</li>
                    <li>Configurer <code>DocumentBuilder</code> dans main.ts avec titre "API Blog" et version "1.0".</li>
                    <li>Ajouter <code>@ApiTags()</code> à votre contrôleur <code>ArticlesController</code>.</li>
                    <li>Utiliser <code>@ApiOperation({ summary: '...' })</code> sur les méthodes GET, POST.</li>
                    <li>Documenter le DTO <code>CreateArticleDto</code> avec <code>@ApiProperty()</code> (titre, contenu).</li>
                    <li>Lancer l'application et naviguer vers <code>/api-docs</code> (ou le chemin configuré).</li>
                </ol>
                <div class="code-block mt-3 text-xs">
                    // Exemple de DTO documenté<br>
                    export class CreateArticleDto {<br>
                    &nbsp;&nbsp;@ApiProperty({ example: 'NestJS Swagger', description: 'Titre article' })<br>
                    &nbsp;&nbsp;title: string;<br>
                    &nbsp;&nbsp;@ApiProperty({ example: 'Contenu détaillé...' })<br>
                    &nbsp;&nbsp;content: string;<br>
                    }
                </div>
                <p class="text-sm mt-3">📌 Pour aller plus loin : générez un fichier OpenAPI JSON avec <code>SwaggerModule.createDocument()</code> et exposez-le à vos clients.</p>
                <div class="bg-indigo-50 p-2 rounded-md mt-2">✨ <span class="font-medium">Challenge</span> : Ajoutez l'authentification Bearer dans Swagger avec <code>.addBearerAuth()</code> et testez un endpoint protégé.</div>
            `
        }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    function renderSlides() {
        const $container = $("#slidesContainer");
        $container.empty();
        slidesData.forEach((slide, idx) => {
            let slideHtml = `<div class="slide slide-hidden" data-slide-index="${idx}" id="slide_${idx}"><div class="slide-content">`;
            if (slide.type === "title") {
                slideHtml += `
                    <div class="text-center py-6 md:py-10">
                        <div class="text-7xl mb-4">${slide.icon || "📘"}</div>
                        <h2 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-sky-700 to-blue-700 bg-clip-text text-transparent">${slide.title}</h2>
                        <p class="text-gray-600 mt-4 text-lg">${slide.subtitle || ""}</p>
                        <div class="mt-8 flex justify-center">
                            <span class="bg-sky-100 text-sky-800 px-4 py-2 rounded-full text-sm">OpenAPI · Swagger UI</span>
                        </div>
                    </div>
                `;
            } else if (slide.type === "objectives") {
                slideHtml += `<h3 class="text-xl font-bold text-gray-800 border-l-4 border-sky-500 pl-3 mb-4">${slide.title}</h3>
                              <div class="grid gap-3 md:grid-cols-2">`;
                slide.objectives.forEach(obj => {
                    slideHtml += `<div class="bg-white rounded-lg p-3 shadow-sm border border-gray-200 flex items-start gap-2"><span class="text-sky-600 text-xl">✓</span><span>${obj}</span></div>`;
                });
                slideHtml += `</div>`;
            } else if (slide.type === "content") {
                slideHtml += `<h3 class="text-xl font-bold text-gray-800 border-l-4 border-sky-500 pl-3 mb-4">${slide.title}</h3>
                              <div class="prose prose-sm max-w-none text-gray-700">${slide.content}</div>`;
            }
            slideHtml += `</div></div>`;
            $container.append(slideHtml);
        });
        updateSlideVisibility();
        updateDotsAndCounter();
    }

    function updateSlideVisibility() {
        $(".slide").each(function(idx) {
            if (idx === currentIndex) {
                $(this).removeClass("slide-hidden").addClass("slide-visible");
            } else {
                $(this).removeClass("slide-visible").addClass("slide-hidden");
            }
        });
        const progressPercent = ((currentIndex + 1) / totalSlides) * 100;
        $("#progressBar").css("width", `${progressPercent}%`);
        $("#slideCounter").text(currentIndex + 1);
        $("#totalSlides").text(totalSlides);
    }

    function updateDotsAndCounter() {
        const $dots = $("#dotsIndicator");
        $dots.empty();
        for (let i = 0; i < totalSlides; i++) {
            const dotClass = (i === currentIndex) ? "bg-sky-600 w-3 h-3" : "bg-gray-300 w-2.5 h-2.5";
            $dots.append(`<button class="dot-nav mx-1 rounded-full ${dotClass} transition-all duration-200 focus:outline-none" data-index="${i}"></button>`);
        }
        $(".dot-nav").on("click", function() {
            let idx = parseInt($(this).data("index"));
            if (!isNaN(idx) && idx >= 0 && idx < totalSlides) {
                currentIndex = idx;
                updateSlideVisibility();
                updateDotsAndCounter();
            }
        });
        $("#prevSlide").prop("disabled", currentIndex === 0);
        $("#nextSlide").prop("disabled", currentIndex === totalSlides - 1);
    }

    function nextSlide() {
        if (currentIndex < totalSlides - 1) {
            currentIndex++;
            updateSlideVisibility();
            updateDotsAndCounter();
        }
    }
    function prevSlide() {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlideVisibility();
            updateDotsAndCounter();
        }
    }

    $(document).ready(function() {
        renderSlides();
        $("#nextSlide").on("click", nextSlide);
        $("#prevSlide").on("click", prevSlide);
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowRight") nextSlide();
            else if (e.key === "ArrowLeft") prevSlide();
        });
        if (window.MathJax) MathJax.typesetPromise();
    });
</script>
</body>
</html>
