<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 51 : Déploiement automatique et routage SPA – React E-commerce</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0F172A',
            accent: '#3B82F6',
            success: '#10B981'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (éventuel) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    .slide { transition: opacity 0.25s ease-in-out; }
    body { background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%); }
    .btn-slide:active { transform: scale(0.96); }
    .prose pre { background-color: #1e293b; color: #e2e8f0; padding: 0.75rem; border-radius: 0.75rem; overflow-x: auto; font-size: 0.8rem; }
    .prose code { background-color: #eef2ff; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-weight: 500; color: #0f172a; }
  </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-5xl mx-auto px-4 py-5 md:py-8">
  <!-- En-tête + progression -->
  <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
    <div class="flex items-center gap-2">
      <span class="text-3xl">🚀</span>
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-800">Déploiement automatique & routage SPA</h1>
        <p class="text-xs text-slate-500">Leçon 51 · Déployer l'application frontend</p>
      </div>
    </div>
    <div class="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full text-sm font-medium shadow-sm border border-slate-200">
      <span id="slideCounter">1</span> / <span id="totalSlides"></span>
    </div>
  </div>

  <!-- Container slides -->
  <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 min-h-[65vh] md:min-h-[70vh]"></div>

  <!-- Navigation + dots -->
  <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
    <button id="prevBtn" class="btn-slide px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">← Précédent</button>
    <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
    <button id="nextBtn" class="btn-slide px-5 py-2.5 bg-primary text-white rounded-xl shadow-md hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">Suivant →</button>
  </div>

  <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">📘 Développement Web – Cameroun. Déployez votre e-commerce React sur Vercel/Netlify avec CI/CD et configuration du fallback pour le routage SPA.</footer>
</div>

<script>
  // ----- Slides pour la leçon 51 (déploiement auto, Vercel/Netlify, routage SPA) -----
  const slidesData = [
    { type: "title", title: "🚀 Déploiement automatique", subtitle: "React Router · Vercel · Netlify", desc: "Apprenez à déployer votre application e-commerce React en production, à automatiser les déploiements depuis GitHub, et à configurer le routage (fallback) pour les Single Page Applications." },
    { type: "objectifs", title: "🎯 Objectifs de la leçon", objectives: [
      "Préparer le build de production (Vite, variables d’environnement).",
      "Déployer automatiquement depuis GitHub sur Vercel et Netlify.",
      "Configurer le routage SPA (fallback) pour éviter les erreurs 404.",
      "Utiliser les preview deployments pour tester les Pull Requests.",
      "Optimiser les performances et la sécurité en production."
    ] },
    { type: "content", title: "📦 1. Préparer le build de production", content: `
      <div class="space-y-4">
        <p>Avant de déployer, assurez-vous que le build est optimisé :</p>
        <div class="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
          npm run build   # génère le dossier /dist (Vite)
        </div>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="bg-indigo-50 p-3 rounded-lg">
            <span class="font-bold">🔧 Variables d'environnement</span>
            <p class="text-sm mt-1">Créez <code>.env.production</code> et utilisez <code>import.meta.env.VITE_API_URL</code>. Vercel/Netlify les injectent automatiquement.</p>
          </div>
          <div class="bg-indigo-50 p-3 rounded-lg">
            <span class="font-bold">⚡ Optimisations</span>
            <p class="text-sm mt-1">Vite s'occupe du tree-shaking et de la minification. Vérifiez que les assets (images) sont bien compressés.</p>
          </div>
        </div>
        <div class="bg-yellow-50 p-3 rounded text-sm">
          💡 <strong>Test local du build :</strong> <code>npm run preview</code> pour simuler l'environnement de production avant déploiement.
        </div>
      </div>
    ` },
    { type: "content", title: "🔁 2. Déploiement automatique depuis GitHub", content: `
      <div class="space-y-3">
        <p><span class="font-bold">Vercel :</span> connectez votre dépôt GitHub, choisissez le framework (Vite) et les variables d'environnement. Chaque push sur <code>main</code> déclenche un déploiement automatique.</p>
        <div class="bg-slate-800 text-white p-3 rounded-lg text-sm font-mono">
          <pre>vercel --prod</pre>
        </div>
        <p><span class="font-bold">Netlify :</span> même principe, avec le dossier de publication <code>dist</code>. Netlify propose aussi des fonctions serverless.</p>
        <div class="flex flex-wrap gap-3 mt-2">
          <div class="bg-green-50 p-2 rounded-lg flex-1 text-center">✅ <strong>Automatique</strong><br/>À chaque git push → build → mise en ligne</div>
          <div class="bg-blue-50 p-2 rounded-lg flex-1 text-center">🔐 <strong>Sécurité</strong><br/>Variables d'environnement chiffrées</div>
        </div>
        <p>Les <strong>prévisualisations (Preview Deployments)</strong> : pour chaque Pull Request, Vercel crée une URL unique (ex: mon-site-git-feature-abc.vercel.app) pour tester les modifications avant fusion.</p>
      </div>
    ` },
    { type: "content", title: "🧭 3. Configurer le routage SPA (fallback)", content: `
      <div class="space-y-4">
        <p>Problème : si l'utilisateur rafraîchit une page comme <code>/products/123</code>, le serveur cherche un fichier <code>products/123</code> et renvoie une erreur 404. Solution : rediriger toutes les requêtes vers <code>index.html</code>.</p>
        <div class="bg-gray-800 text-gray-100 p-3 rounded-lg">
          <h4 class="font-bold">🔧 Sur Vercel (vercel.json)</h4>
          <pre>{
  "rewrites": [{ "source": "/(.*)", "destination": "/" }]
}</pre>
        </div>
        <div class="bg-gray-800 text-gray-100 p-3 rounded-lg">
          <h4 class="font-bold">🔧 Sur Netlify (netlify.toml)</h4>
          <pre>[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200</pre>
        </div>
        <p>Ces configurations garantissent que React Router prend le relais pour toutes les routes.</p>
        <div class="bg-amber-50 p-2 rounded text-sm">⚠️ Si vous utilisez un serveur Node.js personnalisé, configurez un middleware pour servir <code>index.html</code> sur les routes non trouvées.</div>
      </div>
    ` },
    { type: "content", title: "🔄 4. CI/CD avec GitHub Actions (alternatif)", content: `
      <div class="space-y-3">
        <p>Vous pouvez aussi utiliser GitHub Actions pour builder et déployer manuellement sur votre propre VPS. Exemple de workflow :</p>
        <div class="bg-gray-800 text-gray-100 p-3 rounded-lg text-xs overflow-auto">
          <pre>name: Deploy to VPS
on: push: branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm ci && npm run build
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_PATH: /var/www/html
          SOURCE: dist/</pre>
        </div>
        <p>Cette approche convient si vous préférez garder le contrôle total de l'infrastructure.</p>
        <div class="bg-blue-50 p-2 rounded-lg text-sm">✅ <strong>Vercel/Netlify restent plus simples</strong> pour la plupart des projets e-commerce React.</div>
      </div>
    ` },
    { type: "content", title: "⚙️ 5. Bonnes pratiques et checklist finale", content: `
      <div class="grid md:grid-cols-2 gap-4">
        <div class="bg-white border p-3 rounded-lg shadow-sm">
          <h4 class="font-bold text-primary">📋 Checklist pré-déploiement</h4>
          <ul class="list-disc pl-5 text-sm mt-2">
            <li>Variables d'environnement configurées</li>
            <li>Build testé localement (<code>npm run preview</code>)</li>
            <li>Fichiers <code>vercel.json</code> ou <code>netlify.toml</code> présents</li>
            <li>API backend CORS autorisé depuis le domaine de production</li>
            <li>Analytics (Google, Plausible) intégré</li>
          </ul>
        </div>
        <div class="bg-white border p-3 rounded-lg shadow-sm">
          <h4 class="font-bold text-primary">📈 Surveillance</h4>
          <ul class="list-disc pl-5 text-sm mt-2">
            <li>Activer les logs sur Vercel/Netlify</li>
            <li>Configurer Sentry pour les erreurs frontend</li>
            <li>Tester Lighthouse (performance, accessibilité)</li>
            <li>Mettre en place un monitoring uptime (UptimeRobot)</li>
          </ul>
        </div>
      </div>
      <div class="mt-4 p-3 bg-success/10 rounded-lg text-center text-sm">🎉 Après déploiement, vérifiez que le rafraîchissement des routes fonctionne et que les appels API aboutissent.</div>
    ` }
  ];

  let currentSlide = 0;
  const total = slidesData.length;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function buildSlides() {
    let html = '';
    slidesData.forEach((slide, idx) => {
      let inner = '';
      if (slide.type === 'title') {
        inner = `
          <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
            <div class="bg-accent/20 p-5 rounded-full mb-5 shadow-md"><span class="text-5xl">🚀</span></div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
            <p class="text-lg text-accent font-medium">${escapeHtml(slide.subtitle)}</p>
            <div class="mt-6 max-w-md bg-white/60 p-4 rounded-xl shadow-inner"><p class="text-slate-600">${escapeHtml(slide.desc)}</p></div>
          </div>
        `;
      } else if (slide.type === 'objectifs') {
        let list = '';
        slide.objectives.forEach(obj => { list += `<li class="mb-3 flex items-start gap-2"><span class="text-accent text-xl font-bold">✓</span> <span>${escapeHtml(obj)}</span></li>`; });
        inner = `<div class="p-6 md:p-8"><h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2><ul class="space-y-2 text-base md:text-lg list-none">${list}</ul><div class="mt-8 bg-gradient-to-r from-blue-50 to-slate-50 rounded-xl p-4 text-sm italic border">💡 À la fin de cette leçon, vous saurez mettre en production votre boutique en ligne avec des déploiements automatisés.</div></div>`;
      } else if (slide.type === 'content') {
        inner = `<div class="p-5 md:p-7"><h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2><div class="prose prose-slate max-w-none leading-relaxed">${slide.content}</div></div>`;
      }
      html += `<div class="slide" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">${inner}</div>`;
    });
    return html;
  }

  function generateDots() {
    let dotsHtml = '';
    for (let i = 0; i < total; i++) {
      const activeClass = (i === currentSlide) ? 'bg-primary w-6' : 'bg-gray-300 w-3';
      dotsHtml += `<button class="dot-indicator h-3 rounded-full transition-all mx-1 ${activeClass}" data-index="${i}"></button>`;
    }
    $('#dotsContainer').html(dotsHtml);
    $('.dot-indicator').on('click', function() {
      const idx = parseInt($(this).data('index'));
      if (!isNaN(idx) && idx !== currentSlide && idx >= 0 && idx < total) {
        currentSlide = idx;
        updateSlideAndUI();
      }
    });
  }

  function updateSlideAndUI() {
    $('.slide').each(function(idx) {
      if (idx === currentSlide) $(this).fadeIn(180);
      else $(this).hide();
    });
    $('#slideCounter').text(currentSlide + 1);
    $('#totalSlides').text(total);
    $('#dotsContainer .dot-indicator').each(function(idx) {
      if (idx === currentSlide) {
        $(this).removeClass('bg-gray-300 w-3').addClass('bg-primary w-6');
      } else {
        $(this).removeClass('bg-primary w-6').addClass('bg-gray-300 w-3');
      }
    });
    $('#prevBtn').prop('disabled', currentSlide === 0);
    $('#nextBtn').prop('disabled', currentSlide === total - 1);
    if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
  }

  $(document).ready(function() {
    const slidesHtml = buildSlides();
    $('#slidesContainer').html(slidesHtml);
    $('#totalSlides').text(total);
    generateDots();
    updateSlideAndUI();

    $('#prevBtn').on('click', () => {
      if (currentSlide > 0) { currentSlide--; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $('#nextBtn').on('click', () => {
      if (currentSlide < total - 1) { currentSlide++; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $(document).on('keydown', (e) => {
      if (e.key === 'ArrowLeft') $('#prevBtn').click();
      else if (e.key === 'ArrowRight') $('#nextBtn').click();
    });
  });
</script>
</body>
</html>
