<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à l'Optimisation des Performances",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Pourquoi optimiser son application React ?</h3><p>Une application e-commerce doit être rapide pour :</p><ul><li><strong>Améliorer l'expérience utilisateur :</strong> Un site rapide retient les clients.</li><li><strong>Augmenter les conversions :</strong> Chaque seconde de chargement peut réduire le taux de conversion.</li><li><strong>Améliorer le référencement (SEO) :</strong> Google privilégie les sites rapides.</li><li><strong>Réduire les coûts d'infrastructure :</strong> Un code optimisé nécessite moins de ressources.</li></ul><p><strong>Problème courant :</strong> Le bundle JavaScript initial peut être très volumineux, surtout dans une application e-commerce complexe.</p><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>📊 Impact :</strong> 53% des utilisateurs quittent un site mobile qui met plus de 3 secondes à charger.</p></div></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons optimiser les performances de notre application e-commerce avec React.lazy et Suspense. Un site rapide améliore l'expérience utilisateur, augmente les conversions et améliore le référencement. Le problème courant est que le bundle JavaScript initial peut être très volumineux dans une application e-commerce complexe. 53% des utilisateurs quittent un site mobile qui met plus de 3 secondes à charger. Il est donc essentiel d'optimiser.",
    "note": "La performance est un facteur clé de succès pour un site e-commerce."
  },
  {
    "titre": "Code Splitting : Le Principe",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Diviser le bundle pour mieux régner</h3><p>Le <strong>code splitting</strong> consiste à diviser le bundle JavaScript en plusieurs fichiers plus petits.</p><p><strong>Avantages :</strong></p><ul><li><strong>Chargement initial réduit :</strong> Seul le code nécessaire à la page actuelle est chargé.</li><li><strong>Chargement à la demande :</strong> Les autres parties sont chargées quand elles sont nécessaires.</li><li><strong>Meilleure utilisation du cache :</strong> Les parties inchangées sont mises en cache.</li></ul><p><strong>Approches :</strong></p><ul><li><strong>Par route :</strong> Chaque page a son propre bundle.</li><li><strong>Par composant :</strong> Les composants lourds sont chargés à la demande.</li><li><strong>Par fonctionnalité :</strong> Les fonctionnalités indépendantes sont séparées.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔧 Outil :</strong> Vite et Webpack supportent nativement le code splitting.</p></div></div>",
    "texteParle": "Le code splitting consiste à diviser le bundle JavaScript en plusieurs fichiers plus petits. Les avantages sont un chargement initial réduit car seul le code nécessaire à la page actuelle est chargé, un chargement à la demande pour les autres parties, et une meilleure utilisation du cache. On peut faire du code splitting par route, par composant ou par fonctionnalité. Vite et Webpack supportent nativement le code splitting.",
    "note": "Le code splitting est une technique fondamentale pour optimiser les performances des applications React."
  },
  {
    "titre": "React.lazy : Chargement Dynamique",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Importer les composants à la demande</h3><p><strong>React.lazy</strong> permet de charger un composant de manière paresseuse :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>// Avant - Import statique\nimport ProductListPage from './pages/ProductListPage';\n\n// Après - Import dynamique avec React.lazy\nconst ProductListPage = React.lazy(() => \n  import('./pages/ProductListPage')\n);\n\nconst ProductDetailPage = React.lazy(() => \n  import('./pages/ProductDetailPage')\n);\n\nconst CheckoutPage = React.lazy(() => \n  import('./pages/CheckoutPage')\n);\n\nconst CartPage = React.lazy(() => \n  import('./pages/CartPage')\n);</pre><p><strong>Ce que ça fait :</strong></p><ul><li>Le composant n'est chargé que quand il est rendu.</li><li>Un bundle séparé est créé pour chaque import dynamique.</li><li>Le code est divisé automatiquement par route.</li></ul></div>",
    "texteParle": "React.lazy permet de charger un composant de manière paresseuse. Au lieu d'importer statiquement un composant, on utilise un import dynamique avec React.lazy. Le composant n'est chargé que quand il est rendu. Un bundle séparé est créé pour chaque import dynamique. Le code est donc divisé automatiquement par route. C'est une technique simple mais très efficace pour réduire le bundle initial.",
    "note": "React.lazy ne fonctionne qu'avec les exportations par défaut (default exports)."
  },
  {
    "titre": "Suspense : Gérer le Chargement",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Afficher un état de chargement</h3><p><strong>Suspense</strong> est un composant qui permet d'afficher un fallback pendant le chargement :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>import { Suspense } from 'react';\nimport { Spinner } from '@/components/ui/spinner';\n\nfunction App() {\n  return (\n    &lt;RouterProvider router={router} /&gt;\n  );\n}\n\n// Ou au niveau des routes\nconst router = createBrowserRouter([\n  {\n    path: '/',\n    element: (\n      &lt;Suspense fallback={&lt;PageLoader /&gt;}&gt;\n        &lt;HomePage /&gt;\n      &lt;/Suspense&gt;\n    ),\n  },\n  {\n    path: '/products',\n    element: (\n      &lt;Suspense fallback={&lt;PageLoader /&gt;}&gt;\n        &lt;ProductListPage /&gt;\n      &lt;/Suspense&gt;\n    ),\n  },\n]);\n\n// Composant de chargement personnalisé\nfunction PageLoader() {\n  return (\n    &lt;div className=\"flex items-center justify-center h-64\"&gt;\n      &lt;div className=\"text-center\"&gt;\n        &lt;Spinner className=\"w-12 h-12 text-blue-600\" /&gt;\n        &lt;p className=\"mt-4 text-gray-500\"&gt;Chargement en cours...&lt;/p&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  );\n}</pre></div>",
    "texteParle": "Suspense est un composant qui permet d'afficher un fallback pendant le chargement des composants lazy. On entoure le composant lazy avec Suspense et on fournit un fallback, comme un spinner ou un skeleton. Lorsque le composant est en cours de chargement, le fallback s'affiche. Une fois chargé, le composant s'affiche. On peut placer Suspense au niveau de chaque route ou globalement.",
    "note": "Suspense peut aussi être utilisé pour d'autres cas comme la récupération de données (data fetching)."
  },
  {
    "titre": "Mise en Place dans le Routeur",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Lazy loading par route</h3><p>Configuration complète avec React Router :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>import { createBrowserRouter } from 'react-router-dom';\nimport { lazy, Suspense } from 'react';\n\n// Imports lazy\nconst HomePage = lazy(() => import('@/pages/HomePage'));\nconst ProductListPage = lazy(() => import('@/pages/ProductListPage'));\nconst ProductDetailPage = lazy(() => import('@/pages/ProductDetailPage'));\nconst CartPage = lazy(() => import('@/pages/CartPage'));\nconst CheckoutPage = lazy(() => import('@/pages/CheckoutPage'));\nconst AccountPage = lazy(() => import('@/pages/AccountPage'));\nconst LoginPage = lazy(() => import('@/pages/LoginPage'));\nconst RegisterPage = lazy(() => import('@/pages/RegisterPage'));\n\n// Wrapper avec Suspense\nconst lazyLoad = (Component) => (\n  &lt;Suspense fallback={&lt;PageLoader /&gt;}&gt;\n    &lt;Component /&gt;\n  &lt;/Suspense&gt;\n);\n\nconst router = createBrowserRouter([\n  {\n    path: '/',\n    element: &lt;RootLayout /&gt;,\n    children: [\n      { index: true, element: lazyLoad(HomePage) },\n      { path: 'products', element: lazyLoad(ProductListPage) },\n      { path: 'product/:id', element: lazyLoad(ProductDetailPage) },\n      { path: 'cart', element: lazyLoad(CartPage) },\n      { path: 'checkout', element: lazyLoad(CheckoutPage) },\n      { path: 'account', element: lazyLoad(AccountPage) },\n    ],\n  },\n  { path: 'login', element: lazyLoad(LoginPage) },\n  { path: 'register', element: lazyLoad(RegisterPage) },\n]);</pre></div>",
    "texteParle": "Voici la configuration complète avec React Router. On importe tous les composants avec lazy. On crée un wrapper lazyLoad qui entoure chaque composant avec Suspense et un fallback. On utilise ce wrapper dans la définition des routes. Ainsi, chaque page est chargée à la demande quand l'utilisateur y accède. Le bundle initial est beaucoup plus léger.",
    "note": "Cette configuration est la plus courante pour les applications React avec code splitting par route."
  },
  {
    "titre": "Préchargement des Routes",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Précharger avant la navigation</h3><p>Pour améliorer l'expérience, on peut précharger les routes au survol :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>import { Link } from 'react-router-dom';\n\nfunction ProductCard({ product }) {\n  const handleMouseEnter = () => {\n    // Précharger le bundle de la page produit\n    import('@/pages/ProductDetailPage');\n  };\n\n  return (\n    &lt;Link\n      to={`/product/${product.id}`}\n      onMouseEnter={handleMouseEnter}\n      className=\"block transition hover:shadow-lg\"\n    &gt;\n      &lt;img src={product.image} alt={product.name} /&gt;\n      &lt;h3&gt;{product.name}&lt;/h3&gt;\n      &lt;p&gt;{product.price} FCFA&lt;/p&gt;\n    &lt;/Link&gt;\n  );\n}\n\n// Préchargement avec React Router v6.4+\nimport { prefetch } from 'react-router-dom';\n\nconst router = createBrowserRouter([\n  {\n    path: '/product/:id',\n    element: lazyLoad(ProductDetailPage),\n    loader: productLoader,\n    // Préchargement automatique\n    shouldRevalidate: false,\n  },\n]);</pre><p><strong>Avantages :</strong></p><ul><li>Le temps de chargement perçu est réduit.</li><li>L'utilisateur voit la page presque instantanément.</li></ul></div>",
    "texteParle": "Pour améliorer l'expérience, on peut précharger les routes au survol du lien. On utilise onMouseEnter pour déclencher l'import dynamique avant que l'utilisateur ne clique. Ainsi, le bundle est déjà chargé quand l'utilisateur arrive sur la page. Le temps de chargement perçu est réduit et l'utilisateur voit la page presque instantanément. C'est une technique simple mais très efficace.",
    "note": "Le préchargement au hover est une technique d'optimisation de la perception de performance."
  },
  {
    "titre": "Gestion des Erreurs",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Que faire en cas d'échec ?</h3><p>Il est important de gérer les erreurs de chargement :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>import { Suspense } from 'react';\n\nclass ErrorBoundary extends React.Component {\n  constructor(props) {\n    super(props);\n    this.state = { hasError: false };\n  }\n\n  static getDerivedStateFromError(error) {\n    return { hasError: true };\n  }\n\n  componentDidCatch(error, info) {\n    console.error('Erreur de chargement:', error, info);\n  }\n\n  render() {\n    if (this.state.hasError) {\n      return (\n        &lt;div className=\"text-center py-12\"&gt;\n          &lt;AlertCircle className=\"w-16 h-16 text-red-500 mx-auto\" /&gt;\n          &lt;h2 className=\"text-xl font-semibold mt-4\"&gt;\n            Oups ! Quelque chose s'est mal passé\n          &lt;/h2&gt;\n          &lt;p className=\"text-gray-500 mt-2\"&gt;\n            Une erreur est survenue lors du chargement de cette page.\n          &lt;/p&gt;\n          &lt;button\n            onClick={() => window.location.reload()}\n            className=\"mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg\"\n          &gt;\n            Réessayer\n          &lt;/button&gt;\n        &lt;/div&gt;\n      );\n    }\n    return this.props.children;\n  }\n}\n\n// Utilisation\nfunction App() {\n  return (\n    &lt;ErrorBoundary&gt;\n      &lt;Suspense fallback={&lt;PageLoader /&gt;}&gt;\n        &lt;RouterProvider router={router} /&gt;\n      &lt;/Suspense&gt;\n    &lt;/ErrorBoundary&gt;\n  );\n}</pre></div>",
    "texteParle": "Il est important de gérer les erreurs de chargement. On peut utiliser un ErrorBoundary pour capturer les erreurs lors du chargement des composants lazy. Si une erreur survient, on affiche un message convivial avec une option pour réessayer. Cela permet de ne pas laisser l'utilisateur bloqué sur un écran blanc et d'améliorer la robustesse de l'application.",
    "note": "ErrorBoundary est essentiel pour les applications avec code splitting pour éviter les crashes silencieux."
  },
  {
    "titre": "Analyse du Bundle",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Visualiser la taille du bundle</h3><p>Pour vérifier l'impact du code splitting :</p><p><strong>1. Avec Vite :</strong></p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>npm install --save-dev rollup-plugin-visualizer</pre><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>// vite.config.js\nimport { visualizer } from 'rollup-plugin-visualizer';\n\nexport default defineConfig({\n  plugins: [\n    react(),\n    visualizer({\n      filename: 'dist/stats.html',\n      open: true,\n    }),\n  ],\n});</pre><p><strong>2. Avec Webpack :</strong></p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>npm install --save-dev webpack-bundle-analyzer</pre><p><strong>Ce qu'on veut voir :</strong></p><ul><li>Le bundle principal est petit.</li><li>Des bundles séparés existent pour chaque route.</li><li>Les dépendances sont bien réparties.</li></ul></div>",
    "texteParle": "Pour vérifier l'impact du code splitting, on peut analyser le bundle. Avec Vite, on utilise rollup-plugin-visualizer. Avec Webpack, on utilise webpack-bundle-analyzer. Ces outils génèrent une visualisation interactive de la taille des bundles. On veut voir que le bundle principal est petit, qu'il existe des bundles séparés pour chaque route, et que les dépendances sont bien réparties. L'analyse du bundle est essentielle pour identifier les optimisations supplémentaires.",
    "note": "L'analyse du bundle permet de visualiser concrètement l'impact du code splitting."
  },
  {
    "titre": "Bonnes Pratiques",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Optimiser davantage</h3><p>Quelques conseils supplémentaires :</p><p><strong>1. Limiter le nombre de chunks :</strong></p><ul><li>Trop de petits chunks peuvent nuire aux performances.</li><li>Regrouper les fonctionnalités connexes.</li></ul><p><strong>2. Utiliser les imports dynamiques pour les composants lourds :</strong></p><ul><li>Les modales, les graphiques, les éditeurs de texte.</li><li>Les bibliothèques de visualisation.</li></ul><p><strong>3. Configurer la stratégie de cache :</strong></p><ul><li>Utiliser des noms de fichiers avec hash pour le cache.</li><li>Configurer les en-têtes Cache-Control.</li></ul><p><strong>4. Précharger les ressources critiques :</strong></p><ul><li>Utiliser <code>link rel=\"preload\"</code> pour les assets importants.</li><li>Utiliser <code>link rel=\"preconnect\"</code> pour les APIs externes.</li></ul></div>",
    "texteParle": "Quelques conseils supplémentaires pour optimiser davantage. Limiter le nombre de chunks car trop de petits chunks peuvent nuire aux performances. Utiliser les imports dynamiques pour les composants lourds comme les modales, les graphiques ou les éditeurs de texte. Configurer la stratégie de cache avec des noms de fichiers avec hash et des en-têtes Cache-Control. Et précharger les ressources critiques avec preload et preconnect.",
    "note": "L'optimisation est un processus continu qui nécessite une analyse régulière."

  {

    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Synthèse sur le code splitting</h3><ul><li><strong>Code splitting :</strong> Diviser le bundle en plusieurs fichiers plus petits.</li><li><strong>React.lazy :</strong> Charger les composants à la demande.</li><li><strong>Suspense :</strong> Afficher un fallback pendant le chargement.</li><li><strong>Lazy loading par route :</strong> Chaque page a son propre bundle.</li><li><strong>Préchargement :</strong> Charger les routes au survol pour une meilleure perception.</li><li><strong>ErrorBoundary :</strong> Gérer les erreurs de chargement.</li><li><strong>Analyse :</strong> Visualiser le bundle pour identifier les optimisations.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔧 En résumé :</strong> React.lazy et Suspense sont des outils simples mais puissants pour réduire le temps de chargement initial de votre application e-commerce.</p></div></div>",
    "texteParle": "Pour résumer cette leçon, retenons les points clés. Le code splitting divise le bundle en plusieurs fichiers plus petits. React.lazy permet de charger les composants à la demande. Suspense affiche un fallback pendant le chargement. Le lazy loading par route permet à chaque page d'avoir son propre bundle. Le préchargement améliore la perception de performance. ErrorBoundary gère les erreurs de chargement. L'analyse du bundle aide à identifier les optimisations supplémentaires. En résumé, React.lazy et Suspense sont des outils simples mais puissants pour réduire le temps de chargement initial de votre application e-commerce.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    document.addEventListener('DOMContentLoaded', function() {

        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {

        const themeBtn = document.getElementById('themeToggle');
