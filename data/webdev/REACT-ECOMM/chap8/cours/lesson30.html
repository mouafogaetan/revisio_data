<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à la Finalisation de Commande",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Les dernières étapes du processus d'achat</h3><p>Le processus d'achat se termine par deux étapes cruciales :</p><ul><li><strong>Récapitulatif :</strong> L'utilisateur vérifie sa commande avant de valider.</li><li><strong>Validation :</strong> La commande est créée dans le système.</li><li><strong>Confirmation :</strong> L'utilisateur reçoit la confirmation avec le numéro de commande.</li></ul><p><strong>Ces étapes garantissent :</strong></p><ul><li>Une expérience utilisateur rassurante.</li><li>La vérification des informations avant l'engagement.</li><li>La traçabilité de la commande.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🎯 Objectif :</strong> Offrir une expérience de finalisation claire et sans friction.</p></div></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons finaliser le processus d'achat avec le récapitulatif, la validation et la confirmation de commande. L'utilisateur vérifie sa commande, la valide, puis reçoit une confirmation avec son numéro de commande. Ces étapes garantissent une expérience utilisateur rassurante, la vérification des informations et la traçabilité de la commande. L'objectif est d'offrir une expérience de finalisation claire et sans friction.",
    "note": "La finalisation d'achat est l'étape la plus critique du parcours client."
  },
  {
    "titre": "Récapitulatif de la Commande",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Afficher le résumé</h3><p>La page de récapitulatif présente un résumé complet de la commande :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>function OrderSummary({ cart, address, shipping, total }) {\n  return (\n    &lt;div className=\"max-w-4xl mx-auto p-6\"&gt;\n      &lt;h1 className=\"text-2xl font-bold mb-6\"&gt;Récapitulatif de votre commande&lt;/h1&gt;\n\n      &lt;div className=\"space-y-6\"&gt;\n        {/* Produits */}\n        &lt;div className=\"border rounded-lg p-4\"&gt;\n          &lt;h2 className=\"font-semibold mb-4\"&gt;Articles ({cart.length})&lt;/h2&gt;\n          {cart.map(item => (\n            &lt;CartItem key={item.id} item={item} showControls={false} /&gt;\n          ))}\n        &lt;/div&gt;\n\n        {/* Adresse de livraison */}\n        &lt;div className=\"border rounded-lg p-4\"&gt;\n          &lt;h2 className=\"font-semibold mb-4\"&gt;Adresse de livraison&lt;/h2&gt;\n          &lt;AddressDisplay address={address} /&gt;\n        &lt;/div&gt;\n\n        {/* Mode de livraison */}\n        &lt;div className=\"border rounded-lg p-4\"&gt;\n          &lt;h2 className=\"font-semibold mb-4\"&gt;Mode de livraison&lt;/h2&gt;\n          &lt;p&gt;{shipping.method} - {shipping.price} FCFA&lt;/p&gt;\n        &lt;/div&gt;\n\n        {/* Total */}\n        &lt;OrderTotal total={total} /&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  );\n}</pre></div>",
    "texteParle": "La page de récapitulatif présente un résumé complet de la commande. On affiche les articles du panier, l'adresse de livraison, le mode de livraison choisi et le total. Cette page permet à l'utilisateur de vérifier une dernière fois tous les détails avant de finaliser. C'est aussi l'occasion de détecter d'éventuelles erreurs et de les corriger avant la validation définitive.",
    "note": "Le récapitulatif est la dernière chance pour l'utilisateur de corriger sa commande."
  },
  {
    "titre": "Gestion du Panier en Lecture Seule",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Panier en mode récapitulatif</h3><p>Dans le récapitulatif, le panier est en lecture seule :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>function CartItem({ item, showControls = true }) {\n  return (\n    &lt;div className=\"flex items-center justify-between py-3 border-b\"&gt;\n      &lt;div className=\"flex items-center gap-4\"&gt;\n        &lt;img src={item.image} alt={item.name} className=\"w-16 h-16 object-cover rounded\" /&gt;\n        &lt;div&gt;\n          &lt;h3 className=\"font-medium\"&gt;{item.name}&lt;/h3&gt;\n          &lt;p className=\"text-sm text-gray-500\"&gt;{item.quantity} x {item.price} FCFA&lt;/p&gt;\n        &lt;/div&gt;\n      &lt;/div&gt;\n      {showControls ? (\n        &lt;div className=\"flex items-center gap-3\"&gt;\n          &lt;button onClick={() => updateQuantity(item.id, -1)}&gt;-&lt;/button&gt;\n          &lt;span&gt;{item.quantity}&lt;/span&gt;\n          &lt;button onClick={() => updateQuantity(item.id, 1)}&gt;+&lt;/button&gt;\n          &lt;button onClick={() => removeItem(item.id)} className=\"text-red-500\"&gt;\n            &lt;Trash2 size={18} /&gt;\n          &lt;/button&gt;\n        &lt;/div&gt;\n      ) : (\n        &lt;div className=\"font-semibold\"&gt;\n          {item.quantity * item.price} FCFA\n        &lt;/div&gt;\n      )}\n    &lt;/div&gt;\n  );\n}</pre><p><strong>Différences :</strong></p><ul><li>Les contrôles de quantité sont masqués.</li><li>Le prix total est affiché en clair.</li><li>Aucune interaction n'est possible.</li></ul></div>",
    "texteParle": "Dans le récapitulatif, le panier est en lecture seule. On affiche les articles avec leur image, leur nom, leur quantité et leur prix, mais on ne permet pas de modifier la quantité ou de supprimer des articles. L'utilisateur peut tout vérifier, mais pour faire des modifications, il doit retourner à la page du panier. Cette approche évite les changements de dernière minute qui pourraient affecter le calcul du total.",
    "note": "Le panier en lecture seule évite les surprises au moment de la validation."
  },
  {
    "titre": "Validation de la Commande",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Créer la commande</h3><p>La validation envoie les données au backend :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>import { useMutation } from '@tanstack/react-query';\nimport { useNavigate } from 'react-router-dom';\n\nfunction CheckoutPage() {\n  const navigate = useNavigate();\n  const { cart, total } = useCartStore();\n  const { address } = useAddressStore();\n  const { user } = useAuthStore();\n\n  const createOrder = useMutation({\n    mutationFn: async (orderData) => {\n      const response = await api.post('/orders', orderData);\n      return response.data;\n    },\n    onSuccess: (data) => {\n      // Nettoyer le panier\n      useCartStore.getState().clearCart();\n      // Rediriger vers la confirmation\n      navigate(`/order-confirmation/${data.id}`);\n    },\n    onError: (error) => {\n      toast.error('Une erreur est survenue lors de la création de la commande');\n      console.error(error);\n    }\n  });\n\n  const handleSubmit = () => {\n    const orderData = {\n      userId: user.id,\n      items: cart.map(item => ({\n        productId: item.id,\n        quantity: item.quantity,\n        price: item.price\n      })),\n      addressId: address.id,\n      shippingMethod: selectedShipping,\n      total: total,\n      paymentMethod: selectedPayment,\n    };\n    \n    createOrder.mutate(orderData);\n  };</pre></div>",
    "texteParle": "La validation envoie les données de la commande au backend. On utilise une mutation React Query pour créer la commande. Les données incluent l'ID de l'utilisateur, les articles du panier, l'adresse de livraison, le mode de livraison, le total et le moyen de paiement. En cas de succès, on nettoie le panier et on redirige vers la page de confirmation. En cas d'erreur, on affiche un message à l'utilisateur.",
    "note": "La mutation React Query gère automatiquement les états de chargement et d'erreur."
  },
  {
    "titre": "Gestion des États de Validation",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Gérer le chargement et les erreurs</h3><p>Gérez les différents états pendant la validation :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>function CheckoutPage() {\n  const { mutate, isPending, isError, error } = useMutation({...});\n\n  return (\n    &lt;div className=\"max-w-4xl mx-auto p-6\"&gt;\n      &lt;OrderSummary ... /&gt;\n\n      {isError && (\n        &lt;div className=\"bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg my-4\"&gt;\n          {error?.message || 'Une erreur est survenue. Veuillez réessayer.'}\n        &lt;/div&gt;\n      )}\n\n      &lt;div className=\"flex justify-between mt-8\"&gt;\n        &lt;button\n          onClick={() => navigate(-1)}\n          className=\"px-6 py-3 border rounded-lg hover:bg-gray-50\"\n        &gt;\n          Retour\n        &lt;/button&gt;\n\n        &lt;button\n          onClick={handleSubmit}\n          disabled={isPending}\n          className=\"px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2\"\n        &gt;\n          {isPending ? (\n            &lt;&gt;\n              &lt;Loader2 className=\"animate-spin\" size={20} /&gt;\n              Validation en cours...\n            &lt;/&gt;\n          ) : (\n            'Valider la commande'\n          )}\n        &lt;/button&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  );\n}</pre></div>",
    "texteParle": "Il faut gérer les différents états pendant la validation. On peut afficher un état de chargement avec un spinner, un message d'erreur en cas d'échec, et désactiver le bouton de validation pendant le traitement. Ces retours visuels rassurent l'utilisateur et l'informent de ce qui se passe. Une bonne gestion des états améliore l'expérience utilisateur.",
    "note": "Le désactivation du bouton pendant le chargement évite les soumissions multiples."
  },
  {
    "titre": "Page de Confirmation",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Afficher la confirmation</h3><p>La page de confirmation rassure l'utilisateur :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>function OrderConfirmationPage() {\n  const { id } = useParams();\n  const { data: order, isLoading } = useQuery({\n    queryKey: ['order', id],\n    queryFn: () => api.get(`/orders/${id}`).then(res => res.data),\n  });\n\n  if (isLoading) return &lt;Spinner /&gt;;\n\n  return (\n    &lt;div className=\"max-w-2xl mx-auto p-6 text-center\"&gt;\n      &lt;div className=\"w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto\"&gt;\n        &lt;CheckCircle className=\"text-green-600\" size={40} /&gt;\n      &lt;/div&gt;\n\n      &lt;h1 className=\"text-2xl font-bold mt-4\"&gt;Commande confirmée !&lt;/h1&gt;\n      &lt;p className=\"text-gray-600 mt-2\"&gt;\n        Votre commande a été validée avec succès.\n      &lt;/p&gt;\n\n      &lt;div className=\"bg-gray-50 rounded-lg p-4 mt-6\"&gt;\n        &lt;p className=\"text-sm text-gray-500\"&gt;Numéro de commande&lt;/p&gt;\n        &lt;p className=\"font-mono text-lg font-semibold\"&gt;{order.orderNumber}&lt;/p&gt;\n      &lt;/div&gt;\n\n      &lt;OrderDetails order={order} /&gt;\n      &lt;ShippingInfo shipping={order.shipping} /&gt;\n\n      &lt;div className=\"flex gap-4 mt-8 justify-center\"&gt;\n        &lt;Link to=\"/account/orders\" className=\"...\"&gt;\n          Voir mes commandes\n        &lt;/Link&gt;\n        &lt;Link to=\"/\" className=\"...\"&gt;\n          Continuer mes achats\n        &lt;/Link&gt;\n      &lt;/div&gt;\n    &lt;/div&gt;\n  );\n}</pre></div>",
    "texteParle": "La page de confirmation rassure l'utilisateur. On affiche une icône de succès, un message de confirmation, le numéro de commande, les détails de la commande et les informations de livraison. On propose aussi des actions : voir ses commandes ou continuer ses achats. Cette page est la dernière étape du parcours d'achat et doit laisser une impression positive.",
    "note": "La page de confirmation est aussi une opportunité de marketing (produits complémentaires, réduction pour la prochaine commande)."
  },
  {
    "titre": "Nettoyage du Panier",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Vider le panier après validation</h3><p>Après validation, le panier doit être vidé :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>// Store Zustand\nconst useCartStore = create((set) => ({\n  items: [],\n  total: 0,\n  \n  addItem: (product) => { ... },\n  removeItem: (id) => { ... },\n  updateQuantity: (id, quantity) => { ... },\n  \n  clearCart: () => {\n    set({ items: [], total: 0 });\n    localStorage.removeItem('cart');\n  },\n}));\n\n// Dans la mutation de validation\nconst createOrder = useMutation({\n  mutationFn: async (orderData) => {\n    const response = await api.post('/orders', orderData);\n    return response.data;\n  },\n  onSuccess: (data) => {\n    // Vider le panier local\n    useCartStore.getState().clearCart();\n    \n    // Vider le panier côté serveur\n    api.delete('/cart').catch(() => {});\n    \n    // Rediriger\n    navigate(`/order-confirmation/${data.id}`);\n  },\n});</pre><p><strong>À faire :</strong></p><ul><li>Vider le store Zustand.</li><li>Supprimer les données du localStorage.</li><li>Vider le panier côté serveur.</li></ul></div>",
    "texteParle": "Après la validation, le panier doit être vidé. On nettoie le store Zustand, on supprime les données du localStorage, et on vide le panier côté serveur si nécessaire. Cette opération garantit que l'utilisateur ne verra plus les articles déjà commandés dans son panier. C'est aussi important pour la synchronisation avec le backend.",
    "note": "Le nettoyage du panier doit être atomique pour éviter les incohérences."
  },
  {
    "titre": "Suivi de la Commande",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Afficher le statut de la commande</h3><p>Afficher le statut de la commande dans la confirmation :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>function OrderStatus({ status }) {\n  const steps = [\n    { key: 'pending', label: 'En attente', icon: Clock },\n    { key: 'processing', label: 'En traitement', icon: Package },\n    { key: 'shipped', label: 'Expédiée', icon: Truck },\n    { key: 'delivered', label: 'Livrée', icon: CheckCircle },\n  ];\n\n  const currentIndex = steps.findIndex(s => s.key === status);\n\n  return (\n    &lt;div className=\"my-6\"&gt;\n      &lt;div className=\"flex items-center justify-between\"&gt;\n        {steps.map((step, index) => (\n          &lt;div key={step.key} className=\"flex flex-col items-center flex-1\"&gt;\n            &lt;div className={`\n              w-10 h-10 rounded-full flex items-center justify-center\n              ${index <= currentIndex ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-400'}\n            `}&gt;\n              &lt;step.icon size={20} /&gt;\n            &lt;/div&gt;\n            &lt;span className=\"text-xs mt-2\"&gt;{step.label}&lt;/span&gt;\n            {index < steps.length - 1 && (\n              &lt;div className={`\n                h-1 flex-1 absolute -translate-y-5\n                ${index < currentIndex ? 'bg-blue-600' : 'bg-gray-200'}\n              `} /&gt;\n            )}\n          &lt;/div&gt;\n        ))}\n      &lt;/div&gt;\n    &lt;/div&gt;\n  );\n}</pre></div>",
    "texteParle": "Le suivi de la commande est important pour l'utilisateur. On peut afficher un indicateur de statut avec les étapes : en attente, en traitement, expédiée, livrée. Une barre de progression visuelle montre où en est la commande. L'utilisateur peut ainsi savoir quand il recevra son colis. Cette transparence renforce la confiance.",
    "note": "Le suivi de commande est un service attendu par les clients des e-commerces."
  },
  {
    "titre": "Email de Confirmation",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Notifier l'utilisateur par email</h3><p>Une confirmation par email renforce la confiance :</p><pre style='background-color: #e9ecef; padding: 10px; border-radius: 4px; white-space: pre-wrap; word-break: break-word;'>// Backend - Envoi d'email de confirmation\nconst sendOrderConfirmation = async (order) => {\n  await sendEmail({\n    to: order.user.email,\n    subject: `Confirmation de votre commande #${order.orderNumber}`,\n    template: 'order-confirmation',\n    data: {\n      orderNumber: order.orderNumber,\n      items: order.items,\n      total: order.total,\n      shippingAddress: order.shippingAddress,\n      estimatedDelivery: order.estimatedDelivery,\n    }\n  });\n};\n\n// Frontend - Affichage du message\nfunction OrderConfirmationPage() {\n  return (\n    &lt;div&gt;\n      &lt;p className=\"text-sm text-gray-500 mt-2\"&gt;\n        Un email de confirmation a été envoyé à {order.user.email}.\n      &lt;/p&gt;\n      &lt;p className=\"text-sm text-gray-500\"&gt;\n        Vous pourrez suivre votre commande depuis votre compte.\n      &lt;/p&gt;\n    &lt;/div&gt;\n  );\n}</pre><p><strong>Contenu de l'email :</strong></p><ul><li>Numéro de commande.</li><li>Récapitulatif des articles.</li><li>Total et mode de paiement.</li><li>Adresse de livraison.</li><li>Date estimée de livraison.</li></ul></div>",
    "texteParle": "Un email de confirmation est envoyé après validation pour renforcer la confiance. L'email contient le numéro de commande, le récapitulatif des articles, le total, l'adresse de livraison et la date estimée de livraison. Sur la page de confirmation, on informe l'utilisateur de l'envoi de l'email. C'est une pratique standard qui rassure le client et lui donne une trace écrite de sa commande.",
    "note": "L'email de confirmation est aussi un bon support pour le marketing (recommandations, codes promo)."
  },
  {
    "titre": "Points Clés à Retenir",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><h3 style='color: #0d6efd;'>Synthèse sur la validation de commande</h3><ul><li><strong>Récapitulatif :</strong> Afficher tous les détails de la commande.</li><li><strong>Panier en lecture seule :</strong> Éviter les modifications de dernière minute.</li><li><strong>Validation :</strong> Envoyer les données au backend avec mutation React Query.</li><li><strong>États :</strong> Gérer le chargement et les erreurs.</li><li><strong>Confirmation :</strong> Afficher le succès, le numéro de commande et les détails.</li><li><strong>Nettoyage :</strong> Vider le panier local et serveur.</li><li><strong>Email :</strong> Envoyer une confirmation par email.</li></ul><div style='background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-top: 10px;'><p><strong>🔧 En résumé :</strong> Une validation de commande bien conçue rassure l'utilisateur et conclut le parcours d'achat sur une note positive.</p></div></div>",
    "texteParle": "Pour résumer cette leçon, retenons les points clés. Le récapitulatif affiche tous les détails de la commande. Le panier est en lecture seule pour éviter les modifications de dernière minute. La validation envoie les données au backend avec une mutation React Query. On gère les états de chargement et d'erreur. La confirmation affiche le succès, le numéro de commande et les détails. On nettoie le panier local et serveur. Et on envoie un email de confirmation. Une validation de commande bien conçue rassure l'utilisateur et conclut le parcours d'achat sur une note positive.",
    "note": "La finalisation d'achat est le moment clé de conversion d'un e-commerce."
  }
];
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }

            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
