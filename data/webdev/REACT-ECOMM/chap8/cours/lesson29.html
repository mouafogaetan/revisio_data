<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la Leçon 29",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Nous allons intégrer les paiements dans notre application e-commerce.</p><ul style='margin-top: 15px; list-style: none; padding: 0;'><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>💳 <strong>Intégrer Stripe Elements</strong> (paiement par carte bancaire)</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>🟦 <strong>Intégrer PayPal Smart Buttons</strong></li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>🏷️ <strong>Gérer les codes promo</strong></li></ul><p style='margin-top: 20px; font-style: italic;'>Le paiement est l'étape cruciale de tout site e-commerce. 🇨🇲</p></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons aborder un sujet très important pour notre site e-commerce : l'intégration des paiements. Nous allons voir comment intégrer Stripe pour les paiements par carte bancaire, comment intégrer PayPal avec leurs Smart Buttons, et enfin comment gérer des codes promo pour offrir des réductions à nos clients. Ces fonctionnalités sont essentielles pour transformer votre site en une véritable boutique en ligne.",
    "note": "Le paiement est la fonctionnalité qui génère des revenus, elle doit être fiable et sécurisée."
  },
  {
    "titre": "Stripe vs PayPal",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Comparons les deux solutions de paiement les plus populaires.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1; min-width: 150px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #4fc3f7;'>    <h4 style='color: #4fc3f7; margin: 0 0 10px 0;'>💳 Stripe</h4>    <ul style='margin: 0; padding-left: 20px; font-size: 0.95em;'>      <li>✅ Paiement par carte directement sur le site</li>      <li>✅ Interface personnalisable</li>      <li>✅ Support de nombreuses méthodes (Apple Pay, Google Pay)</li>      <li>✅ Frais : ~1.8% + 0.25€ par transaction</li>      <li>❌ Nécessite un compte Stripe</li>    </ul>  </div>  <div style='flex: 1; min-width: 150px; background: #1a2a3a; padding: 15px; border-radius: 10px; border-top: 4px solid #ffb74d;'>    <h4 style='color: #ffb74d; margin: 0 0 10px 0;'>🟦 PayPal</h4>    <ul style='margin: 0; padding-left: 20px; font-size: 0.95em;'>      <li>✅ Très connu et rassurant pour les clients</li>      <li>✅ Pas besoin de créer un compte sur le site</li>      <li>✅ Protection acheteur intégrée</li>      <li>✅ Frais : ~2.9% + 0.30€ par transaction</li>      <li>❌ L'utilisateur quitte le site</li>    </ul>  </div></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #ffb74d;'>💡 Conseil :</span> Pour un site au Cameroun, les deux options sont valables. PayPal est plus connu, Stripe est plus moderne et flexible.</div></div>",
    "texteParle": "Avant de commencer l'intégration, comparons rapidement Stripe et PayPal. Stripe permet à vos clients de payer directement sur votre site avec leur carte bancaire. L'interface est entièrement personnalisable et Stripe supporte aussi Apple Pay et Google Pay. Les frais sont d'environ 1,8 pour cent plus 0,25 euro par transaction. PayPal, lui, est très connu et rassurant pour les clients. Il permet de payer sans créer de compte sur votre site. Les frais sont un peu plus élevés, environ 2,9 pour cent plus 0,30 euro. Pour un site au Cameroun, les deux sont de bonnes options. PayPal est plus connu, mais Stripe est plus moderne et flexible.",
    "note": "Vous pouvez implémenter les deux pour offrir un choix à vos clients."
  },
  {
    "titre": "Installation de Stripe",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Pour intégrer Stripe, nous avons besoin du package <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>@stripe/stripe-js</code>.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 1em; text-align: center;'>npm install @stripe/stripe-js</div><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><span style='font-weight: bold; color: #4fc3f7;'>📦 Dépendances :</span><ul style='margin: 5px 0;'><li><code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>@stripe/stripe-js</code> : Pour charger Stripe et créer des Elements</li><li><span style='font-style: italic;'>Côté backend :</span> Nous aurons besoin d'un serveur avec <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>stripe</code> (Node.js) pour créer des <strong>PaymentIntents</strong></li></ul></div><div style='background: #3a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #f44336;'><span style='font-weight: bold; color: #f44336;'>⚠️ Important :</span> La clé publique Stripe (publishable key) doit être dans vos variables d'environnement (<code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>.env</code>).</div></div>",
    "texteParle": "Pour intégrer Stripe, nous allons installer le package @stripe/stripe-js. Ce package nous permet de charger Stripe et de créer des Elements, qui sont les composants d'interface pour les paiements. Il est important de comprendre que Stripe fonctionne en deux parties : le frontend que nous faisons maintenant, et un backend qui va créer des PaymentIntents pour sécuriser les transactions. Nous allons aussi stocker notre clé publique Stripe dans un fichier .env pour ne pas la mettre en dur dans notre code. C'est une bonne pratique de sécurité.",
    "note": "La clé publique Stripe est sécurisée côté client, la clé secrète ne doit jamais être exposée."
  },
  {
    "titre": "Créer un PaymentIntent (Backend)",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Avant de pouvoir payer, nous devons créer un <strong>PaymentIntent</strong> côté backend.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.8em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> Stripe <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'stripe'</span>;<br><br><span style='color: #ffb74d;'>const</span> stripe = <span style='color: #ffb74d;'>new</span> Stripe(process.env.STRIPE_SECRET_KEY);<br><br><span style='color: #ffb74d;'>export const</span> createPaymentIntent = <span style='color: #ffb74d;'>async</span> (req, res) => {<br>  <span style='color: #ffb74d;'>const</span> { amount, currency, cartItems } = req.body;<br>  <br>  <span style='color: #ffb74d;'>const</span> paymentIntent = <span style='color: #ffb74d;'>await</span> stripe.paymentIntents.create({<br>    <span style='color: #4fc3f7;'>amount</span>: amount, <span style='color: #666;'>// en cents (ex: 1000 = 10€)</span><br>    <span style='color: #4fc3f7;'>currency</span>: currency || <span style='color: #4fc3f7;'>'eur'</span>,<br>    <span style='color: #4fc3f7;'>metadata</span>: { cartItems: <span style='color: #4fc3f7;'>JSON</span>.stringify(cartItems) },<br>  });<br>  <br>  res.json({ clientSecret: paymentIntent.client_secret });<br>};</div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>🔑 Explication :</span> Le <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>clientSecret</code> est nécessaire pour confirmer le paiement côté frontend.</div></div>",
    "texteParle": "Pour que Stripe fonctionne, nous devons d'abord créer un PaymentIntent côté backend. Le PaymentIntent est un objet qui représente l'intention de paiement. Il contient le montant, la devise, et des métadonnées comme les articles du panier. Nous utilisons la clé secrète de Stripe pour créer ce PaymentIntent. En réponse, Stripe nous renvoie un clientSecret, qui est un jeton que nous allons utiliser côté frontend pour confirmer le paiement. C'est ce jeton qui sécurise la transaction. Vous devez donc créer un endpoint API sur votre backend pour cette fonction.",
    "note": "Le clientSecret est un jeton temporaire qui expire après un certain temps."
  },
  {
    "titre": "Intégration Stripe Elements (Frontend)",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Utilisons <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>@stripe/stripe-js</code> pour créer un formulaire de paiement sécurisé.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.8em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { loadStripe } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@stripe/stripe-js'</span>;<br><span style='color: #ffb74d;'>import</span> { Elements, CardElement, useStripe, useElements } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@stripe/react-stripe-js'</span>;<br><br><span style='color: #ce93d8;'>function</span> CheckoutForm() {<br>  <span style='color: #ffb74d;'>const</span> stripe = useStripe();<br>  <span style='color: #ffb74d;'>const</span> elements = useElements();<br>  <br>  <span style='color: #ffb74d;'>const</span> handleSubmit = <span style='color: #ffb74d;'>async</span> (e) => {<br>    e.preventDefault();<br>    <span style='color: #ffb74d;'>const</span> { error, paymentIntent } = <span style='color: #ffb74d;'>await</span> stripe.confirmCardPayment(clientSecret, {<br>      payment_method: { card: elements.getElement(CardElement) }<br>    });<br>    <span style='color: #ffb74d;'>if</span> (error) { <span style='color: #666;'>// Gérer l'erreur</span> }<br>    <span style='color: #ffb74d;'>else</span> { <span style='color: #666;'>// Paiement réussi</span> }<br>  };<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;form onSubmit={handleSubmit}&gt;<br>      &lt;CardElement /&gt;<br>      &lt;button type=<span style='color: #4fc3f7;'>\"submit\"</span> disabled={!stripe}&gt;Payer&lt;/button&gt;<br>    &lt;/form&gt;<br>  );<br>}</div></div>",
    "texteParle": "Côté frontend, nous utilisons les hooks de Stripe pour créer notre formulaire de paiement. Nous importons loadStripe, Elements, CardElement, useStripe et useElements. Le CardElement est un composant qui affiche un champ de carte bancaire sécurisé. Dans notre fonction, nous utilisons useStripe et useElements pour accéder aux méthodes de Stripe. Quand l'utilisateur soumet le formulaire, nous appelons stripe.confirmCardPayment avec le clientSecret et les informations de la carte. Si tout se passe bien, le paiement est confirmé. Si il y a une erreur, nous la gérons et affichons un message à l'utilisateur.",
    "note": "Stripe Elements sont des composants sécurisés qui protègent les données de la carte."
  },
  {
    "titre": "Installation de PayPal",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Pour PayPal, nous allons utiliser le package <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>@paypal/react-paypal-js</code>.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 1em; text-align: center;'>npm install @paypal/react-paypal-js</div><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><span style='font-weight: bold; color: #ffb74d;'>📦 Configuration :</span><ul style='margin: 5px 0;'><li>Créer un compte <strong>PayPal Developer</strong> pour obtenir vos clés</li><li>Stocker la clé client dans <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>.env</code> (<span style='color: #4fc3f7;'>REACT_APP_PAYPAL_CLIENT_ID</span>)</li><li>Envelopper votre composant avec <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>PayPalScriptProvider</code></li></ul></div></div>",
    "texteParle": "Pour PayPal, nous allons utiliser le package @paypal/react-paypal-js. Ce package nous permet d'intégrer facilement les Smart Buttons de PayPal dans notre application React. Pour l'utiliser, vous devez d'abord créer un compte développeur sur PayPal pour obtenir vos clés. Vous allez stocker votre clé client dans un fichier .env, et envelopper votre composant de paiement avec le PayPalScriptProvider. C'est une configuration simple qui vous permet d'afficher les boutons PayPal en quelques minutes.",

  {
    "titre": "Intégration PayPal Smart Buttons",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Le composant <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>PayPalButtons</code> affiche les boutons de paiement.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.8em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { PayPalScriptProvider, PayPalButtons } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@paypal/react-paypal-js'</span>;<br><br><span style='color: #ce93d8;'>function</span> PayPalCheckout({ amount }) {<br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;PayPalScriptProvider options={{ <span style='color: #4fc3f7;'>clientId</span>: process.env.REACT_APP_PAYPAL_CLIENT_ID }}&gt;<br>      &lt;PayPalButtons<br>        createOrder={<span style='color: #ffb74d;'>async</span> () => {<br>          <span style='color: #ffb74d;'>const</span> response = <span style='color: #ffb74d;'>await</span> fetch('/api/paypal/create-order', {<br>            method: <span style='color: #4fc3f7;'>'POST'</span>,<br>            body: <span style='color: #4fc3f7;'>JSON</span>.stringify({ amount })<br>          });<br>          <span style='color: #ffb74d;'>const</span> order = <span style='color: #ffb74d;'>await</span> response.json();<br>          <span style='color: #ffb74d;'>return</span> order.id;<br>        }}<br>        onApprove={<span style='color: #ffb74d;'>async</span> (data) => {<br>          <span style='color: #666;'>// Capturer le paiement</span><br>          <span style='color: #ffb74d;'>await</span> fetch('/api/paypal/capture-order', {<br>            method: <span style='color: #4fc3f7;'>'POST'</span>,<br>            body: <span style='color: #4fc3f7;'>JSON</span>.stringify({ orderId: data.orderID })<br>          });<br>          <span style='color: #666;'>// Rediriger vers la page de confirmation</span><br>        }}<br>      /&gt;<br>    &lt;/PayPalScriptProvider&gt;<br>  );<br>}</div></div>",
    "texteParle": "Le composant principal de PayPal est PayPalButtons. Il affiche les boutons de paiement avec les options standard. Nous configurons ce composant avec deux fonctions principales. La première, createOrder, crée une commande chez PayPal et retourne un identifiant. Pour cela, nous faisons un appel à notre backend qui va utiliser l'API PayPal pour créer la commande. La deuxième, onApprove, est appelée quand l'utilisateur a approuvé le paiement. Nous capturons alors le paiement et redirigeons l'utilisateur vers la page de confirmation. C'est un flux très simple et bien documenté.",
    "note": "Les Smart Buttons de PayPal s'adaptent automatiquement à la langue et au pays de l'utilisateur."
  },
  {
    "titre": "Gestion des Codes Promo",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Les codes promo permettent d'appliquer une réduction sur le montant total.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>  <div style='flex: 1; min-width: 140px; background: #1a2a2a; padding: 15px; border-radius: 10px; border-left: 4px solid #4fc3f7;'>    <span style='font-weight: bold; color: #4fc3f7;'>🏷️ Types de réduction</span><br>    <ul style='font-size: 0.9em; padding-left: 20px;'>      <li>Pourcentage (ex: 10%)</li>      <li>Montant fixe (ex: 5€)</li>      <li>Frais de livraison offerts</li>    </ul>  </div>  <div style='flex: 1; min-width: 140px; background: #1a2a2a; padding: 15px; border-radius: 10px; border-left: 4px solid #ffb74d;'>    <span style='font-weight: bold; color: #ffb74d;'>⏰ Conditions</span><br>    <ul style='font-size: 0.9em; padding-left: 20px;'>      <li>Date d'expiration</li>      <li>Montant minimum</li>      <li>Utilisation unique par utilisateur</li>    </ul>  </div>  <div style='flex: 1; min-width: 140px; background: #1a2a2a; padding: 15px; border-radius: 10px; border-left: 4px solid #4caf50;'>    <span style='font-weight: bold; color: #4caf50;'>✅ Implémentation</span><br>    <ul style='font-size: 0.9em; padding-left: 20px;'>      <li>Valider côté client <strong>et</strong> côté serveur</li>      <li>Recalculer le total en temps réel</li>      <li>Afficher la réduction appliquée</li>    </ul>  </div></div><div style='background: #3a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #f44336;'><span style='font-weight: bold; color: #f44336;'>⚠️ Sécurité :</span> Toujours valider le code promo côté backend. Le frontend ne doit être qu'une interface utilisateur.</div></div>",
    "texteParle": "Les codes promo sont un excellent moyen d'attirer et de fidéliser les clients. Il existe plusieurs types de réductions : un pourcentage du montant total, un montant fixe, ou les frais de livraison offerts. Vous pouvez aussi ajouter des conditions comme une date d'expiration, un montant minimum d'achat, ou une utilisation unique par utilisateur. Pour l'implémentation, il est très important de valider le code promo à la fois côté client pour une bonne expérience utilisateur, mais surtout côté serveur pour des raisons de sécurité. Le serveur doit toujours vérifier que le code promo est valide avant d'appliquer la réduction.",
    "note": "Ne faites jamais confiance aux données venant du client pour les réductions, validez toujours côté serveur."
  },
  {
    "titre": "Exemple de Code Promo (Frontend)",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Créons un composant simple pour appliquer un code promo.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.8em; overflow-x: auto;'><span style='color: #ce93d8;'>function</span> PromoCode({ total, setTotal }) {<br>  <span style='color: #ffb74d;'>const</span> [code, setCode] = useState(<span style='color: #4fc3f7;'>''</span>);<br>  <span style='color: #ffb74d;'>const</span> [error, setError] = useState(<span style='color: #ffb74d;'>null</span>);<br>  <br>  <span style='color: #ffb74d;'>const</span> applyPromo = <span style='color: #ffb74d;'>async</span> () => {<br>    <span style='color: #ffb74d;'>try</span> {<br>      <span style='color: #ffb74d;'>const</span> response = <span style='color: #ffb74d;'>await</span> fetch('/api/promo/validate', {<br>        method: <span style='color: #4fc3f7;'>'POST'</span>,<br>        body: <span style='color: #4fc3f7;'>JSON</span>.stringify({ code, total })<br>      });<br>      <span style='color: #ffb74d;'>const</span> data = <span style='color: #ffb74d;'>await</span> response.json();<br>      <span style='color: #ffb74d;'>if</span> (data.valid) {<br>        setTotal(data.newTotal); <span style='color: #666;'>// Appliquer la réduction</span><br>        setError(<span style='color: #ffb74d;'>null</span>);<br>      } <span style='color: #ffb74d;'>else</span> {<br>        setError(data.message);<br>      }<br>    } <span style='color: #ffb74d;'>catch</span> (err) {<br>      setError(<span style='color: #4fc3f7;'>'Erreur lors de la validation'</span>);<br>    }<br>  };<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;div&gt;<br>      &lt;input<br>        value={code}<br>        onChange={(e) => setCode(e.target.value)}<br>        placeholder=<span style='color: #4fc3f7;'>\"Code promo\"</span><br>      /&gt;<br>      &lt;button onClick={applyPromo}&gt;Appliquer&lt;/button&gt;<br>      {error && &lt;p style={{ color: <span style='color: #4fc3f7;'>'red'</span> }}&gt;{error}&lt;/p&gt;}<br>    &lt;/div&gt;<br>  );<br>}</div></div>",
    "texteParle": "Voici un exemple simple d'implémentation d'un code promo côté frontend. Nous avons un champ de saisie où l'utilisateur entre son code, et un bouton pour l'appliquer. Quand l'utilisateur clique sur le bouton, nous envoyons une requête à notre backend avec le code et le montant total. Le backend vérifie la validité du code et nous renvoie soit une erreur avec un message, soit le nouveau montant total après réduction. Si le code est valide, nous mettons à jour l'affichage du total. Si il y a une erreur, nous affichons un message à l'utilisateur pour lui expliquer le problème.",
    "note": "Le frontend montre la réduction, mais le backend doit toujours recalculer le total final pour éviter les fraudes."
  },
  {
    "titre": "Résumé et Bonnes Pratiques",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Récapitulons les points clés de l'intégration des paiements.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>💳 <strong style='color: #4fc3f7;'>Stripe Elements</strong> : Paiement sécurisé par carte, interface personnalisable</li><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>🟦 <strong style='color: #ffb74d;'>PayPal Smart Buttons</strong> : Paiement rapide, rassurant pour les clients</li><li style='margin-bottom: 10px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>🏷️ <strong style='color: #4caf50;'>Codes promo</strong> : Validation obligatoire côté serveur</li></ul></div><div style='background: #1a3a1a; padding: 15px; border-radius: 10px; border: 1px solid #4caf50;'><span style='font-weight: bold; color: #4caf50;'>🔒 Sécurité :</span><ul><li>Les clés API doivent être dans <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>.env</code></li><li>Toujours valider les paiements côté serveur</li><li>Ne pas stocker les données de carte côté client</li></ul></div></div>",
    "texteParle": "Pour résumer, nous avons vu comment intégrer Stripe Elements pour les paiements par carte bancaire, PayPal Smart Buttons pour un paiement rapide et rassurant, et la gestion des codes promo pour offrir des réductions. Rappelez-vous toujours que la sécurité est primordiale : vos clés API doivent être stockées dans des variables d'environnement, tous les paiements doivent être validés côté serveur, et jamais vous ne devez stocker les données de carte bancaire côté client. Avec ces bonnes pratiques, vous pouvez proposer une expérience de paiement sécurisée et professionnelle à vos clients.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {

        const body = document.body;

        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
