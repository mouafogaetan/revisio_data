<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 4 : Mettre en place l'interface avec TailwindCSS</title>
  <!-- Tailwind CSS + typographie par défaut -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Configuration Tailwind pour un thème personnalisé doux -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1E3A8A',   // bleu profond mais apaisant
            secondary: '#F59E0B',
            accent: '#10B981',
            softBg: '#F9FAFB'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Google Fonts (Inter) pour meilleure lisibilité -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour d'éventuelles formules, discret) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions douces pour les slides */
    .slide {
      transition: opacity 0.25s ease-in-out;
    }
    body {
      background: linear-gradient(145deg, #f3f6fc 0%, #eef2f5 100%);
    }
    .btn-slide {
      transition: all 0.2s;
    }
    .btn-slide:active {
      transform: scale(0.96);
    }
    .dot-indicator {
      transition: all 0.2s ease;
    }
    /* améliorer la lisibilité des blocs de code */
    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
    /* custom scrollbar discret pour mobile */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
  </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-5xl mx-auto px-4 py-5 md:py-8">
  <!-- en-tête avec progression et titre de matière -->
  <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
    <div class="flex items-center gap-2">
      <span class="text-3xl">🎨</span>
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-800">TailwindCSS · Interface e-commerce</h1>
        <p class="text-xs text-slate-500">Leçon 4 · Mise en place de l'interface utilisateur</p>
      </div>
    </div>
    <div class="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full text-sm font-medium shadow-sm border border-slate-200">
      <span id="slideCounter">1</span> / <span id="totalSlides"></span>
    </div>
  </div>

  <!-- Conteneur principal du diaporama -->
  <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 min-h-[65vh] md:min-h-[70vh]">
    <!-- Les slides seront injectées dynamiquement par jQuery -->
  </div>

  <!-- Navigation + indicateurs visuels -->
  <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
    <button id="prevBtn" class="btn-slide px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">
      ← Précédent
    </button>
    <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
    <button id="nextBtn" class="btn-slide px-5 py-2.5 bg-primary text-white rounded-xl shadow-md hover:bg-indigo-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">
      Suivant →
    </button>
  </div>

  <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">
    📘 Cours Développement Web – Création d'une interface e-commerce avec React & TailwindCSS | Interface accessible et responsive
  </footer>
</div>

<script>
  // ---------- Définition des slides pour la leçon 4 : TailwindCSS ----------
  // Slide 1 : Titre, Slide 2 : Objectifs, puis slides de contenu : installation, personnalisation thème, plugins et bonnes pratiques.
  const slidesData = [
    {
      type: "title",
      title: "🎨 Mettre en place l'interface utilisateur",
      subtitle: "TailwindCSS pour un e-commerce moderne",
      desc: "Découvrez comment installer, configurer et personnaliser TailwindCSS afin de créer une interface élégante, rapide et responsive pour votre application React."
    },
    {
      type: "objectifs",
      title: "🎯 Objectifs de la leçon",
      objectives: [
        "Installer et configurer TailwindCSS dans un projet React (Vite).",
        "Personnaliser le thème (couleurs, polices, breakpoints) pour une identité unique.",
        "Utiliser les plugins officiels (forms, typography) pour enrichir les styles.",
        "Construire des composants réutilisables avec les classes utilitaires."
      ]
    },
    {
      type: "content",
      title: "📦 1. Installation de TailwindCSS",
      content: `
        <div class="space-y-4">
          <p class="text-slate-700">TailwindCSS est un framework CSS utilitaire qui accélère le développement. Voici les étapes d'installation sur un projet Vite + React :</p>
          <div class="bg-slate-900 text-green-300 p-4 rounded-xl overflow-x-auto text-sm font-mono">
            <pre>npm install -D tailwindcss postcss autoprefixer
npx tailwindcss init -p</pre>
          </div>
          <p class="mt-2">Configurez <code class="bg-slate-100 px-1 rounded">tailwind.config.js</code> avec les chemins de vos fichiers :</p>
          <div class="bg-slate-800 text-amber-100 p-3 rounded-lg text-xs md:text-sm">
            <pre>content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"],</pre>
          </div>
          <p>Ajoutez les directives Tailwind dans votre fichier <code class="bg-slate-100">index.css</code> :</p>
          <div class="bg-slate-800 text-blue-200 p-3 rounded-lg text-xs">
            <pre>@tailwind base;
@tailwind components;
@tailwind utilities;</pre>
          </div>
          <div class="bg-indigo-50 border-l-4 border-indigo-400 p-3 rounded text-sm">
            💡 <strong>Bon à savoir :</strong> Tailwind ne pèse rien en production grâce à PurgeCSS qui supprime les classes non utilisées.
          </div>
        </div>
      `
    },
    {
      type: "content",
      title: "🎨 2. Personnaliser le thème (couleurs, polices, breakpoints)",
      content: `
        <div class="space-y-4">
          <p>Dans <code class="bg-gray-100 px-1 rounded">tailwind.config.js</code>, étendez le thème pour créer une charte graphique unique :</p>
          <div class="bg-slate-100 p-4 rounded-xl text-sm font-mono overflow-auto">
            <pre>module.exports = {
  theme: {
    extend: {
      colors: {
        'brand': '#2A9D8F',
        'secondary': '#E9C46A',
        'dark': '#264653'
      },
      fontFamily: {
        'display': ['Poppins', 'sans-serif'],
      },
      screens: {
        'xs': '475px',
      }
    }
  }
}</pre>
          </div>
          <div class="grid grid-cols-2 gap-3 mt-2">
            <div class="bg-brand text-white p-2 rounded text-center text-sm">couleur brand #2A9D8F</div>
            <div class="bg-secondary text-dark p-2 rounded text-center text-sm">secondary #E9C46A</div>
          </div>
          <p class="text-slate-600">Vous pouvez aussi surcharger les breakpoints par défaut : <code>sm:640px, md:768px, lg:1024px, xl:1280px</code>.</p>
          <div class="bg-blue-50 p-3 rounded-lg text-sm">
            ✨ <strong>Exemple concret :</strong> <code class="bg-white px-1">text-brand hover:text-secondary</code> – un texte qui change de couleur au survol.
          </div>
        </div>
      `
    },
    {
      type: "content",
      title: "🧩 3. Utiliser les plugins officiels (forms, typography)",
      content: `
        <div class="space-y-3">
          <p>Tailwind propose des plugins pour améliorer le rendu des formulaires et du contenu textuel (blog, descriptions produits).</p>
          <div class="bg-gray-800 text-gray-200 p-3 rounded-lg">
            <pre class="text-sm">npm install @tailwindcss/forms @tailwindcss/typography</pre>
          </div>
          <p>Ajoutez-les dans la configuration :</p>
          <div class="bg-gray-100 p-3 rounded-lg text-sm">
            <pre>plugins: [require('@tailwindcss/forms'), require('@tailwindcss/typography')]</pre>
          </div>
          <div class="flex flex-wrap gap-4 mt-2">
            <div class="flex-1 border p-3 rounded-md bg-white shadow-sm">
              <label class="block text-sm font-medium">Plugin forms</label>
              <input type="text" placeholder="ex: email" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-brand focus:border-brand">
              <p class="text-xs text-slate-500 mt-1">Les champs sont harmonisés automatiquement.</p>
            </div>
            <div class="flex-1 border p-3 rounded-md bg-white">
              <div class="prose prose-sm max-w-none">
                <h5>Plugin typography</h5>
                <p>Idéal pour les <strong>descriptions produit</strong> ou le blog. Appliquez la classe <code>prose</code> sur un contenu HTML riche.</p>
              </div>
            </div>
          </div>
        </div>
      `
    },
    {
      type: "content",
      title: "🛠️ 4. Construire des composants réutilisables",
      content: `
        <div class="space-y-4">
          <p>Avec Tailwind, on privilégie les classes utilitaires, mais pour éviter la répétition, on peut extraire des composants React ou utiliser <code>@apply</code>.</p>
          <div class="bg-white border rounded-xl p-4 shadow-sm">
            <h4 class="font-bold text-primary">Exemple : Button composant réutilisable</h4>
            <div class="bg-slate-800 text-white p-3 rounded-md text-sm mt-2">
              <pre>const Button = ({ children, variant = 'primary' }) => {
  const base = "px-5 py-2 rounded-lg font-semibold transition";
  const variants = {
    primary: "bg-brand text-white hover:bg-opacity-80",
    secondary: "bg-secondary text-dark hover:bg-amber-400"
  };
  return &lt;button className={\`\${base} \${variants[variant]}\`}&gt;{children}&lt;/button&gt;;
};</pre>
            </div>
            <div class="flex gap-3 mt-3">
              <div class="bg-brand text-white px-4 py-1.5 rounded-lg text-sm">Commander</div>
              <div class="bg-secondary text-dark px-4 py-1.5 rounded-lg text-sm">Ajouter au panier</div>
            </div>
          </div>
          <div class="bg-amber-50 p-3 rounded-lg text-sm border-l-4 border-amber-400">
            📌 <span class="font-semibold">Conseils responsive :</span> utilisez les préfixes <code>sm: md: lg:</code> pour adapter l’interface mobile d'abord.
            <code class="block bg-white p-1 mt-1">className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4"</code>
          </div>
        </div>
      `
    }
  ];

  let currentSlide = 0;
  const total = slidesData.length;

  // Construire les slides en HTML
  function buildSlides() {
    let html = '';
    slidesData.forEach((slide, idx) => {
      let inner = '';
      if (slide.type === 'title') {
        inner = `
          <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
            <div class="bg-gradient-to-br from-indigo-100 to-sky-100 p-5 rounded-full mb-5 shadow-md">
              <span class="text-5xl">🎨</span>
            </div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
            <p class="text-lg text-indigo-700 font-medium">${escapeHtml(slide.subtitle)}</p>
            <div class="mt-6 max-w-md bg-white/60 p-4 rounded-xl shadow-inner">
              <p class="text-slate-600">${escapeHtml(slide.desc)}</p>
            </div>
          </div>
        `;
      } 
      else if (slide.type === 'objectifs') {
        let listItems = '';
        slide.objectives.forEach(obj => {
          listItems += `<li class="mb-3 flex items-start gap-2"><span class="text-primary text-xl font-bold">✓</span> <span>${escapeHtml(obj)}</span></li>`;
        });
        inner = `
          <div class="p-6 md:p-8">
            <h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2>
            <ul class="space-y-2 text-base md:text-lg list-none">${listItems}</ul>
            <div class="mt-8 bg-gradient-to-r from-blue-50 to-cyan-50 rounded-xl p-4 text-sm italic border">
              💡 À la fin de cette leçon, vous pourrez lancer une interface e-commerce moderne avec TailwindCSS.
            </div>
          </div>
        `;
      }
      else if (slide.type === 'content') {
        inner = `
          <div class="p-5 md:p-7">
            <h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2>
            <div class="prose prose-slate max-w-none leading-relaxed">
              ${slide.content}
            </div>
          </div>
        `;
      }
      html += `<div class="slide" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">${inner}</div>`;
    });
    return html;
  }

  // Helper d'échappement simple
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  // Générer les points (dots) de navigation
  function generateDots() {
    let dotsHtml = '';
    for (let i = 0; i < total; i++) {
      const activeClass = (i === currentSlide) ? 'bg-primary w-6' : 'bg-gray-300 w-3';
      dotsHtml += `<button class="dot-indicator h-3 rounded-full transition-all mx-1 ${activeClass}" data-index="${i}"></button>`;
    }
    $('#dotsContainer').html(dotsHtml);
    // événements clic sur dot
    $('.dot-indicator').on('click', function() {
      const idx = parseInt($(this).data('index'));
      if (!isNaN(idx) && idx !== currentSlide && idx >= 0 && idx < total) {
        currentSlide = idx;
        updateSlideAndUI();
      }
    });
  }

  // Mise à jour de l'affichage (slide, boutons, dots, compteur)
  function updateSlideAndUI() {
    $('.slide').each(function(idx) {
      if (idx === currentSlide) {
        $(this).fadeIn(180);
      } else {
        $(this).hide();
      }
    });
    $('#slideCounter').text(currentSlide + 1);
    $('#totalSlides').text(total);
    // mise à jour des dots
    $('#dotsContainer .dot-indicator').each(function(idx) {
      if (idx === currentSlide) {
        $(this).removeClass('bg-gray-300 w-3').addClass('bg-primary w-6');
      } else {
        $(this).removeClass('bg-primary w-6').addClass('bg-gray-300 w-3');
      }
    });
    // désactiver boutons si nécessaire
    $('#prevBtn').prop('disabled', currentSlide === 0);
    $('#nextBtn').prop('disabled', currentSlide === total - 1);
    // Déclencher MathJax sur le nouveau contenu (au cas où des formules)
    if (window.MathJax) {
      MathJax.typesetPromise && MathJax.typesetPromise();
    }
  }

  // Initialisation au chargement du DOM
  $(document).ready(function() {
    const slidesHtml = buildSlides();
    $('#slidesContainer').html(slidesHtml);
    $('#totalSlides').text(total);
    generateDots();
    updateSlideAndUI();

    // navigation précédent / suivant
    $('#prevBtn').on('click', function() {
      if (currentSlide > 0) {
        currentSlide--;
        updateSlideAndUI();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
    $('#nextBtn').on('click', function() {
      if (currentSlide < total - 1) {
        currentSlide++;
        updateSlideAndUI();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
    // navigation clavier (flèches)
    $(document).on('keydown', function(e) {
      if (e.key === 'ArrowLeft') {
        $('#prevBtn').click();
      } else if (e.key === 'ArrowRight') {
        $('#nextBtn').click();
      }
    });
  });
</script>

<!-- petit style pour que les blocs de code soient bien lisibles et que prose garde une marge agréable -->
<style>
  .prose pre {
    background-color: #1e293b;
    color: #e2e8f0;
    padding: 1rem;
    border-radius: 0.75rem;
    overflow-x: auto;
    font-size: 0.8rem;
  }
  .prose code {
    background-color: #f1f5f9;
    padding: 0.2rem 0.4rem;
    border-radius: 0.375rem;
    font-weight: 500;
    color: #0f172a;
  }
  .prose h4 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-top: 1rem;
  }
  button:focus-visible, .dot-indicator:focus-visible {
    outline: 2px solid #3b82f6;
    outline-offset: 2px;
  }
  /* couleurs personnalisées pour brand / secondary (aperçu) */
  .bg-brand {
    background-color: #2A9D8F;
  }
  .bg-secondary {
    background-color: #E9C46A;
  }
  .text-brand {
    color: #2A9D8F;
  }
  .hover\:bg-opacity-80:hover {
    background-opacity: 0.8;
  }
</style>
</body>
</html>
