<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 16 : Créer des services et hooks personnalisés (React E-commerce)</title>
  <!-- Tailwind CSS CDN + configuration douce -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Personnalisation thème plus lisible -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0F3B3D',   // vert foncé apaisant
            secondary: '#E7B42C',
            accent: '#2C7A7B',
            lightbg: '#F9FBFD'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules éventuelles, discret) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    .slide { transition: opacity 0.25s ease-in-out; }
    body { background: linear-gradient(125deg, #f0f9f4 0%, #e6f0fa 100%); }
    .btn-nav:active { transform: scale(0.96); }
    .prose pre { background-color: #1e293b; color: #e2e8f0; padding: 0.75rem; border-radius: 0.75rem; overflow-x: auto; font-size: 0.8rem; }
    .prose code { background-color: #eef2ff; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-weight: 500; color: #0f172a; }
  </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-5xl mx-auto px-4 py-5 md:py-8">
  <!-- Entête avec progression -->
  <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
    <div class="flex items-center gap-2">
      <span class="text-3xl">🧩</span>
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-800">Services & hooks personnalisés</h1>
        <p class="text-xs text-slate-500">Leçon 16 · Communiquer avec l'API backend</p>
      </div>
    </div>
    <div class="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full text-sm font-medium shadow-sm border border-slate-200">
      <span id="slideCounter">1</span> / <span id="totalSlides"></span>
    </div>
  </div>

  <!-- Conteneur des slides -->
  <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 min-h-[65vh] md:min-h-[70vh]"></div>

  <!-- Navigation + dots -->
  <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
    <button id="prevBtn" class="btn-nav px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">← Précédent</button>
    <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
    <button id="nextBtn" class="btn-nav px-5 py-2.5 bg-primary text-white rounded-xl shadow-md hover:bg-teal-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">Suivant →</button>
  </div>

  <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">📘 Cours Développement Web (Cameroun) – Interface e-commerce avec React. Apprenez à créer des services et hooks personnalisés pour interagir avec l’API.</footer>
</div>

<script>
  // ----- Définition des slides (Leçon 16 : services + hooks personnalisés) -----
  const slidesData = [
    { type: "title", title: "🔌 Services & hooks personnalisés", subtitle: "Organiser la communication avec l'API", desc: "Découvrez comment créer des services réutilisables (authService, productService) et des hooks personnalisés (useAuth, useCart) pour un code propre et maintenable dans votre e-commerce React." },
    { type: "objectifs", title: "🎯 Objectifs de la leçon", objectives: [
      "Créer des services JavaScript dédiés aux appels API (auth, produits, commandes).",
      "Construire des hooks personnalisés (useAuth, useProducts) qui utilisent ces services.",
      "Gérer les états de chargement et les erreurs de manière élégante.",
      "Appliquer la séparation des préoccupations (UI / logique métier / accès aux données)."
    ] },
    { type: "content", title: "📦 1. Pourquoi séparer les services ?", content: `
      <div class="space-y-4">
        <p>Dans une application e-commerce, on interagit avec le backend pour l’authentification, le catalogue, le panier, les commandes. <strong class="text-primary">Mélanger ces appels dans les composants</strong> rend le code difficile à maintenir.</p>
        <div class="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-lg">
          <span class="font-bold">✅ Bonne pratique :</span> Créer des <code class="bg-white px-1">services/</code> qui centralisent les requêtes Axios. Chaque composant appelle ces fonctions via des hooks personnalisés.
        </div>
        <div class="bg-slate-800 text-gray-100 p-3 rounded-lg text-sm font-mono">
          <pre>📁 src/
  📁 services/
     authService.js
     productService.js
     orderService.js
  📁 hooks/
     useAuth.js
     useProducts.js
     useCart.js</pre>
        </div>
        <p>Avantages : réutilisabilité, tests facilités, composants allégés.</p>
      </div>
    ` },
    { type: "content", title: "🛠️ 2. Exemple : service d'authentification (authService)", content: `
      <div class="space-y-3">
        <p>On utilise Axios pour créer une instance configurée. Ce service expose des méthodes comme <code>login</code>, <code>register</code>, <code>logout</code>.</p>
        <div class="bg-gray-900 text-green-300 p-3 rounded-lg text-xs md:text-sm overflow-x-auto">
          <pre>// services/authService.js
import api from './api';

export const authService = {
  login: (email, password) => api.post('/auth/login', { email, password }),
  register: (userData) => api.post('/auth/register', userData),
  logout: () => api.post('/auth/logout'),
  getProfile: () => api.get('/auth/profile'),
};</pre>
        </div>
        <p>L'instance <code>api</code> gère automatiquement l'URL de base et les intercepteurs (token JWT).</p>
        <div class="bg-primary/10 p-3 rounded-lg text-sm">✨ <strong>À retenir :</strong> Un service ne contient aucune logique UI, uniquement des appels réseau.</div>
      </div>
    ` },
    { type: "content", title: "🎣 3. Hook personnalisé useAuth", content: `
      <div class="space-y-4">
        <p>Le hook <code>useAuth</code> utilise <code>authService</code> et gère l'état (loading, error, user). Il peut aussi interagir avec un store Zustand pour la session.</p>
        <div class="bg-slate-800 text-blue-100 p-3 rounded-lg text-sm font-mono">
          <pre>// hooks/useAuth.js
import { useState } from 'react';
import { authService } from '../services/authService';
import useAuthStore from '../stores/authStore';

export const useAuth = () => {
  const [loading, setLoading] = useState(false);
  const { setUser, logout: clearStore } = useAuthStore();

  const login = async (email, password) => {
    setLoading(true);
    try {
      const { data } = await authService.login(email, password);
      setUser(data.user, data.token);
      return { success: true };
    } catch (error) {
      return { success: false, error: error.response?.data?.message };
    } finally { setLoading(false); }
  };
  return { login, loading, logout: clearStore };
};</pre>
        </div>
        <p>Les composants UI utilisent ce hook pour déclencher l'authentification sans se soucier des appels API.</p>
      </div>
    ` },
    { type: "content", title: "📄 4. Service produits et hook useProducts", content: `
      <div class="grid md:grid-cols-2 gap-5">
        <div class="bg-gray-50 p-3 rounded-lg">
          <h4 class="font-bold text-primary">productService.js</h4>
          <pre class="text-xs mt-2 bg-gray-800 text-gray-200 p-2 rounded">export const productService = {
  fetchAll: (params) => api.get('/products', { params }),
  fetchById: (id) => api.get('/products/'+id),
  create: (data) => api.post('/products', data),
  update: (id, data) => api.put('/products/'+id, data),
  delete: (id) => api.delete('/products/'+id)
};</pre>
        </div>
        <div class="bg-gray-50 p-3 rounded-lg">
          <h4 class="font-bold text-primary">useProducts.js (React Query)</h4>
          <pre class="text-xs mt-2 bg-gray-800 text-gray-200 p-2 rounded">import { useQuery, useMutation } from '@tanstack/react-query';
import { productService } from '../services';

export const useProducts = (filters) => {
  return useQuery({
    queryKey: ['products', filters],
    queryFn: () => productService.fetchAll(filters),
    staleTime: 5 * 60 * 1000
  });
};</pre>
          <p class="text-xs mt-2">+ gestion automatique du cache, revalidation, loading/error.</p>
        </div>
      </div>
      <div class="mt-3 text-sm bg-indigo-50 p-2 rounded">💡 Avec React Query, on évite de gérer manuellement loading/error.</div>
    ` },
    { type: "content", title: "⚠️ 5. Gestion des erreurs et états de chargement", content: `
      <div class="space-y-4">
        <p>Dans un hook personnalisé, on expose <code>isLoading</code> et <code>error</code> pour que le composant affiche des spinners ou messages d'erreur adaptés.</p>
        <div class="bg-white border rounded p-3">
          <p class="font-mono text-sm">const { data: products, isLoading, error } = useProducts(filters);</p>
          <p class="mt-2">Dans le composant :</p>
          <pre class="bg-slate-800 text-white text-xs p-2 rounded mt-1">if (isLoading) return &lt;Spinner /&gt;;
if (error) return &lt;Alert message={error.message} /&gt;;
return &lt;ProductGrid products={products} /&gt;;</pre>
        </div>
        <p>On peut également créer un composant <code>&lt;ErrorBoundary&gt;</code> pour capturer les erreurs inattendues.</p>
        <div class="bg-rose-50 p-3 rounded-lg border-l-4 border-rose-400">🔐 Sécurité : Ne jamais exposer les tokens dans l'URL ou les logs. Les services doivent utiliser des intercepteurs pour ajouter le token aux en-têtes.</div>
      </div>
    ` }
  ];

  let currentSlide = 0;
  const total = slidesData.length;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function buildSlides() {
    let html = '';
    slidesData.forEach((slide, idx) => {
      let inner = '';
      if (slide.type === 'title') {
        inner = `
          <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
            <div class="bg-teal-100 p-5 rounded-full mb-5 shadow-md"><span class="text-5xl">🧩</span></div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
            <p class="text-lg text-teal-700 font-medium">${escapeHtml(slide.subtitle)}</p>
            <div class="mt-6 max-w-md bg-white/60 p-4 rounded-xl shadow-inner"><p class="text-slate-600">${escapeHtml(slide.desc)}</p></div>
          </div>
        `;
      } else if (slide.type === 'objectifs') {
        let list = '';
        slide.objectives.forEach(obj => { list += `<li class="mb-3 flex items-start gap-2"><span class="text-primary text-xl font-bold">✓</span> <span>${escapeHtml(obj)}</span></li>`; });
        inner = `<div class="p-6 md:p-8"><h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2><ul class="space-y-2 text-base md:text-lg list-none">${list}</ul><div class="mt-8 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-xl p-4 text-sm italic border">💡 À la fin, vous saurez organiser les appels API de manière professionnelle.</div></div>`;
      } else if (slide.type === 'content') {
        inner = `<div class="p-5 md:p-7"><h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2><div class="prose prose-slate max-w-none leading-relaxed">${slide.content}</div></div>`;
      }
      html += `<div class="slide" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">${inner}</div>`;
    });
    return html;
  }

  function generateDots() {
    let dotsHtml = '';
    for (let i = 0; i < total; i++) {
      const activeClass = (i === currentSlide) ? 'bg-primary w-6' : 'bg-gray-300 w-3';
      dotsHtml += `<button class="dot-indicator h-3 rounded-full transition-all mx-1 ${activeClass}" data-index="${i}"></button>`;
    }
    $('#dotsContainer').html(dotsHtml);
    $('.dot-indicator').on('click', function() {
      const idx = parseInt($(this).data('index'));
      if (!isNaN(idx) && idx !== currentSlide && idx >= 0 && idx < total) {
        currentSlide = idx;
        updateSlideAndUI();
      }
    });
  }

  function updateSlideAndUI() {
    $('.slide').each(function(idx) {
      if (idx === currentSlide) $(this).fadeIn(180);
      else $(this).hide();
    });
    $('#slideCounter').text(currentSlide + 1);
    $('#totalSlides').text(total);
    $('#dotsContainer .dot-indicator').each(function(idx) {
      if (idx === currentSlide) {
        $(this).removeClass('bg-gray-300 w-3').addClass('bg-primary w-6');
      } else {
        $(this).removeClass('bg-primary w-6').addClass('bg-gray-300 w-3');
      }
    });
    $('#prevBtn').prop('disabled', currentSlide === 0);
    $('#nextBtn').prop('disabled', currentSlide === total - 1);
    if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
  }

  $(document).ready(function() {
    const slidesHtml = buildSlides();
    $('#slidesContainer').html(slidesHtml);
    $('#totalSlides').text(total);
    generateDots();
    updateSlideAndUI();

    $('#prevBtn').on('click', () => {
      if (currentSlide > 0) { currentSlide--; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $('#nextBtn').on('click', () => {
      if (currentSlide < total - 1) { currentSlide++; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $(document).on('keydown', (e) => {
      if (e.key === 'ArrowLeft') $('#prevBtn').click();
      else if (e.key === 'ArrowRight') $('#nextBtn').click();
    });
  });
</script>
</body>
</html>
