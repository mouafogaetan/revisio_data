<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Développement d'une interface utilisateur e-commerce avec React",
 "classe": "Développement Web",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Architecture et Gestion d'État",
     "points": "8 pts",
     "enonce": "<div style='font-size: 1rem; line-height: 1.6;'><p>L'objectif de cet exercice est de vous faire concevoir l'architecture d'une application e-commerce et de mettre en place une gestion d'état globale.</p><p><strong>Contexte :</strong> Vous devez développer un front-office pour une boutique en ligne. L'application doit permettre aux utilisateurs de consulter le catalogue, de gérer leur panier et de passer des commandes.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>Question 1.1 (3 pts) :</strong></p><p>En vous basant sur les principes de l'Atomic Design, décrivez comment vous structureriez les dossiers de votre projet React pour les composants suivants. Justifiez votre réponse en précisant la catégorie de chaque élément :</p><ul><li>Un bouton d'action personnalisé</li><li>Une carte de produit affichant une image, un titre et un prix</li><li>Une barre de navigation contenant des liens et un champ de recherche</li><li>La mise en page de la page d'accueil</li></ul></div>",
         "reponse": "<div><p><strong>Réponse :</strong></p><p>La structure basée sur l'Atomic Design serait la suivante :</p><ul><li><strong>Atoms :</strong> Le bouton d'action personnalisé. C'est le composant le plus élémentaire et non décomposable.</li><li><strong>Molecules :</strong> La carte de produit. Elle est composée d'atomes (image, texte) et forme une unité fonctionnelle simple.</li><li><strong>Organisms :</strong> La barre de navigation. C'est une section complexe de l'interface composée de plusieurs molécules et atomes.</li><li><strong>Templates :</strong> La mise en page de la page d'accueil. C'est un squelette de page qui définit la structure globale sans contenu spécifique.</li></ul></div>"
       },
       {
         "question": "<div><p><strong>Question 1.2 (3 pts) :</strong></p><p>Vous choisissez d'utiliser <strong>Zustand</strong> pour gérer l'état global du panier. Écrivez le code d'un store Zustand qui implémente les fonctionnalités suivantes :</p><ul><li>Ajouter un produit au panier</li><li>Supprimer un produit du panier</li><li>Mettre à jour la quantité d'un produit</li><li>Calculer le nombre total d'articles et le prix total</li></ul><p>Précisez la structure de l'état initial.</p></div>",
         "reponse": "<div style='background-color: #1e1e1e; padding: 15px; border-radius: 8px; color: #d4d4d4; font-family: monospace;'><pre>import { create } from 'zustand';<br><br>interface CartItem {<br>  id: string;<br>  name: string;<br>  price: number;<br>  quantity: number;<br>  image: string;<br>}<br><br>interface CartStore {<br>  items: CartItem[];<br>  addItem: (product: Omit<CartItem, 'quantity'>) => void;<br>  removeItem: (productId: string) => void;<br>  updateQuantity: (productId: string, quantity: number) => void;<br>  getTotalItems: () => number;<br>  getTotalPrice: () => number;<br>}<br><br>export const useCartStore = create<CartStore>((set, get) => ({<br>  items: [],<br>  addItem: (product) => {<br>    const { items } = get();<br>    const existingItem = items.find(item => item.id === product.id);<br>    if (existingItem) {<br>      set({<br>        items: items.map(item =><br>          item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item<br>        )<br>      });<br>    } else {<br>      set({ items: [...items, { ...product, quantity: 1 }] });<br>    }<br>  },<br>  removeItem: (productId) => {<br>    set({ items: get().items.filter(item => item.id !== productId) });<br>  },<br>  updateQuantity: (productId, quantity) => {<br>    if (quantity <= 0) {<br>      get().removeItem(productId);<br>      return;<br>    }<br>    set({<br>      items: get().items.map(item =><br>        item.id === productId ? { ...item, quantity } : item<br>      )<br>    });<br>  },<br>  getTotalItems: () => {<br>    return get().items.reduce((total, item) => total + item.quantity, 0);<br>  },<br>  getTotalPrice: () => {<br>    return get().items.reduce((total, item) => total + (item.price * item.quantity), 0);<br>  }<br>}));</pre></div>"
       },
       {
         "question": "<div><p><strong>Question 1.3 (2 pts) :</strong></p><p>Expliquez l'utilité du middleware <code>persist</code> de Zustand. Dans le contexte de l'application e-commerce, pour quel type de données l'utiliseriez-vous et pourquoi ?</p></div>",
         "reponse": "<div><p><strong>Réponse :</strong></p><p>Le middleware <code>persist</code> de Zustand permet de sauvegarder automatiquement l'état du store dans le <code>localStorage</code> du navigateur. Ainsi, lorsque l'utilisateur actualise la page ou ferme le navigateur, les données sont conservées.</p><p>Dans le contexte d'une application e-commerce, on l'utiliserait principalement pour :</p><ul><li><strong>Le panier :</strong> Pour que les articles ajoutés ne soient pas perdus si l'utilisateur quitte la page.</li><li><strong>Les favoris :</strong> Pour conserver la liste des produits préférés sans avoir à se reconnecter.</li><li><strong>Les préférences utilisateur :</strong> Comme le thème (mode sombre/clair) ou la langue.</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Navigation et Authentification",
     "points": "6 pts",
     "enonce": "<div style='font-size: 1rem; line-height: 1.6;'><p>Cet exercice évalue votre capacité à mettre en place la navigation et à sécuriser les routes d'une application React.</p><p><strong>Contexte :</strong> Vous travaillez sur un site e-commerce qui doit gérer des zones publiques et privées. Seuls les utilisateurs authentifiés peuvent accéder à leur compte, passer une commande ou consulter leurs commandes passées.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>Question 2.1 (3 pts) :</strong></p><p>Écrivez le code d'un composant <code>ProtectedRoute</code> qui assure les fonctionnalités suivantes :</p><ul><li>Vérifier si l'utilisateur est authentifié</li><li>Rediriger vers la page de connexion si ce n'est pas le cas</li><li>Vérifier le rôle de l'utilisateur (user ou admin)</li><li>Afficher la page demandée si l'utilisateur a le bon rôle, sinon rediriger vers une page d'accès non autorisé</li></ul></div>",
         "reponse": "<div style='background-color: #1e1e1e; padding: 15px; border-radius: 8px; color: #d4d4d4; font-family: monospace;'><pre>import { Navigate, Outlet } from 'react-router-dom';\nimport { useAuthStore } from '@/stores/useAuthStore';\n\ninterface ProtectedRouteProps {\n  allowedRoles?: ('admin' | 'user')[];\n}\n\nexport const ProtectedRoute = ({ allowedRoles = [] }: ProtectedRouteProps) => {\n  const { user, isAuthenticated } = useAuthStore();\n\n  // Vérifier si l'utilisateur est authentifié\n  if (!isAuthenticated) {\n    return <Navigate to=\"/login\" replace />;\n  }\n\n  // Si des rôles sont spécifiés, vérifier si l'utilisateur a le bon rôle\n  if (allowedRoles.length > 0 && user && !allowedRoles.includes(user.role)) {\n    return <Navigate to=\"/unauthorized\" replace />;\n  }\n\n  // Si tout est bon, afficher la page demandée\n  return <Outlet />;\n};</pre></div>"
       },
       {
         "question": "<div><p><strong>Question 2.2 (3 pts) :</strong></p><p>En utilisant <code>react-router-dom</code>, configurez un système de routes qui inclut :</p><ul><li>Un Layout public avec Header et Footer</li><li>Un Layout admin protégé avec Sidebar spécifique</li><li>Des routes imbriquées pour les pages du compte utilisateur (profil, commandes, adresses)</li><li>Une redirection 404 pour les routes inexistantes</li></ul><p>Vous devez utiliser <code>createBrowserRouter</code> et la syntaxe moderne de React Router v6.</p></div>",
         "reponse": "<div style='background-color: #1e1e1e; padding: 15px; border-radius: 8px; color: #d4d4d4; font-family: monospace;'><pre>import { createBrowserRouter, Navigate } from 'react-router-dom';\nimport { PublicLayout } from '@/layouts/PublicLayout';\nimport { AdminLayout } from '@/layouts/AdminLayout';\nimport { ProtectedRoute } from '@/components/ProtectedRoute';\n\n// Pages publiques\nimport { HomePage } from '@/pages/HomePage';\nimport { ProductPage } from '@/pages/ProductPage';\nimport { ProductsPage } from '@/pages/ProductsPage';\nimport { LoginPage } from '@/pages/LoginPage';\nimport { RegisterPage } from '@/pages/RegisterPage';\n\n// Pages utilisateur (compte)\nimport { AccountLayout } from '@/layouts/AccountLayout';\nimport { ProfilePage } from '@/pages/ProfilePage';\nimport { OrdersPage } from '@/pages/OrdersPage';\nimport { AddressesPage } from '@/pages/AddressesPage';\n\n// Pages admin\nimport { AdminDashboard } from '@/pages/admin/AdminDashboard';\nimport { AdminProducts } from '@/pages/admin/AdminProducts';\nimport { AdminOrders } from '@/pages/admin/AdminOrders';\nimport { AdminUsers } from '@/pages/admin/AdminUsers';\n\nimport { NotFoundPage } from '@/pages/NotFoundPage';\n\nexport const router = createBrowserRouter([\n  // Routes publiques\n  {\n    path: '/',\n    element: <PublicLayout />,\n    errorElement: <NotFoundPage />,\n    children: [\n      { index: true, element: <HomePage /> },\n      { path: 'products', element: <ProductsPage /> },\n      { path: 'products/:id', element: <ProductPage /> },\n      { path: 'login', element: <LoginPage /> },\n      { path: 'register', element: <RegisterPage /> },\n    ],\n  },\n\n  // Routes privées (compte utilisateur)\n  {\n    path: '/account',\n    element: <ProtectedRoute />,\n    children: [\n      {\n        element: <AccountLayout />,\n        children: [\n          { path: 'profile', element: <ProfilePage /> },\n          { path: 'orders', element: <OrdersPage /> },\n          { path: 'addresses', element: <AddressesPage /> },\n          { index: true, element: <Navigate to=\"/account/profile\" replace /> },\n        ],\n      },\n    ],\n  },\n\n  // Routes admin\n  {\n    path: '/admin',\n    element: <ProtectedRoute allowedRoles={['admin']} />,\n    children: [\n      {\n        element: <AdminLayout />,\n        children: [\n          { index: true, element: <AdminDashboard /> },\n          { path: 'products', element: <AdminProducts /> },\n          { path: 'orders', element: <AdminOrders /> },\n          { path: 'users', element: <AdminUsers /> },\n        ],\n      },\n    ],\n  },\n\n  // Redirection 404 pour toutes les routes non définies\n  { path: '*', element: <NotFoundPage /> },\n]);</pre></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Formulaires et Validation",
     "points": "6 pts",
     "enonce": "<div style='font-size: 1rem; line-height: 1.6;'><p>La gestion des formulaires et la validation des données sont des compétences essentielles en développement front-end.</p><p><strong>Contexte :</strong> Vous devez créer un formulaire d'inscription pour un site e-commerce qui collecte les informations suivantes : nom, email, mot de passe, confirmation du mot de passe, et acceptation des conditions générales.</p></div>",
     "questions": [
       {
         "question": "<div><p><strong>Question 3.1 (4 pts) :</strong></p><p>En utilisant <strong>React Hook Form</strong> et <strong>Zod</strong>, écrivez le code d'un composant <code>RegisterForm</code> qui répond aux exigences suivantes :</p><ul><li>Définition d'un schéma Zod avec les validations suivantes :<br> - Email : format email valide<br> - Mot de passe : minimum 8 caractères, au moins une lettre majuscule, un chiffre et un caractère spécial<br> - Confirmation : doit correspondre au mot de passe<br> - Conditions générales : doit être accepté<br> - Nom : champ requis (minimum 2 caractères)</li><li>Gestion des erreurs et affichage des messages appropriés sous chaque champ</li><li>Désactivation du bouton de soumission si le formulaire est invalide</li><li>Affichage d'un toast de succès lors de la soumission (simulée)</li></ul></div>",
         "reponse": "<div style='background-color: #1e1e1e; padding: 15px; border-radius: 8px; color: #d4d4d4; font-family: monospace;'><pre>import { useForm } from 'react-hook-form';\nimport { zodResolver } from '@hookform/resolvers/zod';\nimport { z } from 'zod';\nimport { toast } from 'sonner';\n\n// 1. Définition du schéma Zod\nconst registerSchema = z.object({\n  name: z.string().min(2, 'Le nom doit contenir au moins 2 caractères'),\n  email: z.string().email('Adresse email invalide'),\n  password: z\n    .string()\n    .min(8, 'Le mot de passe doit contenir au moins 8 caractères')\n    .regex(/[A-Z]/, 'Le mot de passe doit contenir une majuscule')\n    .regex(/[0-9]/, 'Le mot de passe doit contenir un chiffre')\n    .regex(/[^A-Za-z0-9]/, 'Le mot de passe doit contenir un caractère spécial'),\n  confirmPassword: z.string(),\n  terms: z.boolean().refine(val => val === true, 'Vous devez accepter les conditions générales'),\n}).refine(data => data.password === data.confirmPassword, {\n  message: 'Les mots de passe ne correspondent pas',\n  path: ['confirmPassword'],\n});\n\ntype RegisterFormData = z.infer<typeof registerSchema>;\n\nexport const RegisterForm = () => {\n  const {\n    register,\n    handleSubmit,\n    formState: { errors, isSubmitting, isValid },\n  } = useForm<RegisterFormData>({\n    resolver: zodResolver(registerSchema),\n    mode: 'onChange', // Validation en temps réel\n  });\n\n  const onSubmit = async (data: RegisterFormData) => {\n    // Simulation d'appel API\n    await new Promise(resolve => setTimeout(resolve, 1500));\n    console.log('Données du formulaire :', data);\n    toast.success('Inscription réussie ! Bienvenue sur notre boutique.');\n  };\n\n  return (\n    <form onSubmit={handleSubmit(onSubmit)} className=\"space-y-4\">\n      {/* Champ Nom */}\n      <div>\n        <label htmlFor=\"name\">Nom complet</label>\n        <input\n          id=\"name\"\n          {...register('name')}\n          className=\"w-full p-2 border rounded 'inscrire'}\n      </button>\n    </form>\n  );\n};</pre></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
