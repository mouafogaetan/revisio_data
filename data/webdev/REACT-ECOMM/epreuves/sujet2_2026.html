<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>

            <span id="sequenceInfo">Séquence</span>

                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>

                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>

                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>

                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une interface utilisateur e-commerce avec React",
  "classe": "Développement Web",
  "sequence": "Sequence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Architecture et Installation de l'Application (4 pts)",
      "points": "4 pts",
      "enonce": "Pour un projet e-commerce, il est primordial de bien structurer son application React et de mettre en place un environnement de développement performant.",
      "questions": [
        {
          "question": "1) Décrivez la méthode <strong>Atomic Design</strong> et expliquez son intérêt pour structurer les composants d'une application e-commerce. (2 pts)",
          "reponse": "L'Atomic Design est une méthodologie de conception d'interface utilisateur par composants hiérarchiques [citation:1]. Elle repose sur 5 niveaux : <strong>Atomes</strong> (les plus petits composants comme un bouton, un champ de saisie), <strong>Molécules</strong> (assemblage d'atomes comme une barre de recherche), <strong>Organismes</strong> (assemblage de molécules comme un header), <strong>Templates</strong> (structure d'une page sans contenu final) et <strong>Pages</strong> (templates avec contenu réel).<br/><br/>L'intérêt pour un e-commerce est triple : <br/>- <strong>Réutilisabilité</strong> : un même composant peut être utilisé sur plusieurs pages, comme un bouton 'Ajouter au panier'<br/>- <strong>Maintenabilité</strong> : les modifications sont localisées, ce qui facilite les mises à jour<br/>- <strong>Clarté</strong> : l'organisation des dossiers (atoms, molecules, organisms, templates, pages) rend le code compréhensible pour toute l'équipe"
        },
        {
          "question": "2) Expliquez pourquoi Vite est préféré à Create React App (CRA) pour un projet professionnel. (1 pt)",
          "reponse": "Vite est préféré à CRA pour plusieurs raisons : <br/>- <strong>Performance de build</strong> : Vite utilise des modules ES natifs, ce qui rend le démarrage du serveur de développement quasi-instantané (surtout pour les gros projets) [citation:2]<br/>- <strong>Temps de compilation</strong> : Le hot module replacement (HMR) est plus rapide car Vite ne recompile que les fichiers modifiés <br/>- <strong>Bundle final</strong> : La production est optimisée avec un build plus léger grâce à Rollup<br/>- <strong>Flexibilité</strong> : Vite est plus configurable et n'impose pas un structure rigide comme CRA"
        },
        {
          "question": "3) Citez deux fichiers de configuration que vous mettez en place et décrivez brièvement leur rôle. (1 pt)",
          "reponse": "Deux fichiers de configuration essentiels sont : <br/>- <strong>.eslintrc.json (ESLint)</strong> : Définit les règles de qualité du code (indentation, variables inutilisées, syntaxes à éviter, etc.). Cela garantit un code propre et uniforme pour toute l'équipe [citation:3]. <br/>- <strong>.prettierrc (Prettier)</strong> : Automatise le formatage du code (guillemets, virgules, espacements). Il évite les débats sur le style et assure une présentation cohérente du code."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Mise en Place de l'Interface et Navigation (6 pts)",
      "points": "6 pts",
      "enonce": "L'interface utilisateur est la vitrine de votre site e-commerce. Elle doit être responsive, personnalisable et offrir une navigation fluide.",
      "questions": [
        {
          "question": "1) Vous décidez d'utiliser TailwindCSS pour styliser votre application. Expliquez comment vous personnaliseriez le thème (couleurs, breakpoints). (2 pts)",
          "reponse": "Pour personnaliser le thème TailwindCSS :<br/>- <strong>Fichier de configuration</strong> : J'édite le fichier <code>tailwind.config.js</code> [citation:4]<br/>- <strong>Couleurs</strong> : Dans <code>theme.colors</code>, je définis une palette personnalisée (ex: <code>primary: '#1D4ED8'</code>, <code>secondary: '#D97706'</code>) pour correspondre à la charte graphique du e-commerce<br/>- <strong>Breakpoints</strong> : Je modifie la section <code>screens</code> pour définir des points de rupture adaptés : <code>sm: '480px'</code> (mobile), <code>md: '768px'</code> (tablette), <code>lg: '1024px'</code> (desktop)<br/>- <strong>Polices</strong> : J'ajoute une police personnalisée dans <code>theme.fontFamily</code>"
        },
        {
          "question": "2) Décrivez comment vous implémenteriez un dark mode avec Tailwind. (2 pts)",
          "reponse": "L'implémentation du dark mode avec Tailwind se fait en plusieurs étapes :<br/><strong>1. Configuration :</strong> Dans <code>tailwind.config.js</code>, activer la stratégie <code>darkMode: 'class'</code> [citation:5]<br/><strong>2. Classes CSS :</strong> Utiliser la classe <code>dark:</code> devant les classes Tailwind (ex: <code>bg-white dark:bg-gray-900</code>)<br/><strong>3. Persistance des préférences :</strong> Stocker la préférence utilisateur dans <code>localStorage</code> pour qu'elle soit conservée entre les sessions<br/><strong>4. Détection automatique :</strong> Utiliser <code>prefers-color-scheme</code> via un hook useEffect pour détecter la préférence système<br/><strong>5. Bouton de bascule :</strong> Créer un bouton qui alterne entre les classes 'dark' et 'light' sur l'élément <code><html></code>"
        },
        {
          "question": "3) Avec React Router DOM, comment protéger une route pour qu'elle ne soit accessible qu'aux utilisateurs authentifiés ? (2 pts)",
          "reponse": "Pour protéger une route dans React Router DOM v6 :<br/><strong>1. Créer un composant <code>ProtectedRoute</code> :</strong> Ce composant vérifie l'état d'authentification (ex: via un store Zustand qui contient le token JWT)<br/><strong>2. Redirection :</strong> Si l'utilisateur n'est pas authentifié, utiliser <code><Navigate to=\"/login\" /></code> pour le rediriger vers la page de connexion [citation:6]<br/><strong>3. Retour du composant enfant :</strong> Si authentifié, retourner <code><Outlet /></code> pour afficher la page demandée<br/><strong>4. Définition des routes :</strong> Dans la configuration du Router, envelopper les routes protégées avec ce composant <br/><strong>5. Gestion des rôles :</strong> Pour les routes admin, étendre ce concept avec un <code>RoleBasedRoute</code> qui vérifie le rôle de l'utilisateur en plus de l'authentification [citation:6]"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Gestion d'État avec Zustand (5 pts)",
      "points": "5 pts",
      "enonce": "La gestion d'état est cruciale pour synchroniser les données entre les composants de votre site e-commerce.",
      "questions": [
        {
          "question": "1) Pourquoi Zustand est-il souvent préféré à Redux pour un projet de taille moyenne ? (1.5 pts)",
          "reponse": "Zustand est préféré à Redux pour les projets de taille moyenne pour plusieurs raisons :<br/>- <strong>Légèreté</strong> : Zustand fait moins de 1KB, tandis que Redux est plus lourd avec ses dépendances [citation:7]<br/>- <strong>Simplicité d'API</strong> : L'API est intuitive et ne nécessite pas de concepts complexes comme les reducers, actions ou dispatch<br/>- <strong>Peu de boilerplate</strong> : Moins de code à écrire pour la même fonctionnalité, ce qui accélère le développement<br/>- <strong>Performance</strong> : Zustand évite les re-renders inutiles en ne mettant à jour que les composants qui utilisent la donnée modifiée<br/>- <strong>TypeScript friendly</strong> : Le support des types est excellent et natif"
        },
        {
          "question": "2) Écrivez le code d'un store Zustand pour gérer le panier d'achat (cart store) avec les fonctions addToCart, removeFromCart et updateQuantity. (2.5 pts)",
          "reponse": "```typescript\nimport { create } from 'zustand'\nimport { persist } from 'zustand/middleware'\n\ninterface CartItem {\n  id: string\n  name: string\n  price: number\n  quantity: number\n  image: string\n}\n\ninterface CartState {\n  items: CartItem[]\n  total: number\n  addToCart: (item: Omit<CartItem, 'quantity'>) => void\n  removeFromCart: (id: string) => void\n  updateQuantity: (id: string, quantity: number) => void\n  clearCart: () => void\n}\n\nexport const useCartStore = create<CartState>()(\n  persist(\n    (set, get) => ({\n      items: [],\n      total: 0,\n      \n      addToCart: (item) => {\n        const { items } = get()\n        const existingItem = items.find(i => i.id === item.id)\n        \n        if (existingItem) {\n          // Si l'article existe déjà, on met à jour la quantité\n          set({\n            items: items.map(i => \n              i.id === item.id \n                ? { ...i, quantity: i.quantity + 1 }\n                : i\n            )\n          })\n        } else {\n          // Sinon on ajoute l'article avec quantity = 1\n          set({ items: [...items, { ...item, quantity: 1 }] })\n        }\n        \n        // Recalcul du total\n        const newItems = get().items\n        const total = newItems.reduce((sum, i) => sum + (i.price * i.quantity), 0)\n        set({ total })\n      },\n      \n      removeFromCart: (id) => {\n        set({ items: get().items.filter(i => i.id !== id) })\n        // Recalcul du total après suppression\n        const newItems = get().items\n        const total = newItems.reduce((sum, i) => sum + (i.price * i.quantity), 0)\n        set({ total })\n      },\n      \n      updateQuantity: (id, quantity) => {\n        if (quantity <= 0) {\n          get().removeFromCart(id)\n          return\n        }\n        set({\n          items: get().items.map(i => \n            i.id === id ? { ...i, quantity } : i\n          )\n        })\n        // Recalcul du total\n        const newItems = get().items\n        const total = newItems.reduce((sum, i) => sum + (i.price * i.quantity), 0)\n        set({ total })\n      },\n      \n      clearCart: () => set({ items: [], total: 0 })\n    }),\n    { name: 'cart-storage' } // Persistance dans localStorage\n  )\n)\n```"
        },
        {
          "question": "3) Expliquez brièvement l'utilité du middleware persist. (1 pt)",
          "reponse": "Le middleware <strong>persist</strong> de Zustand permet de sauvegarder l'état du store dans le <code>localStorage</code> du navigateur [citation:8]. Cela offre deux avantages :<br/>- L'utilisateur retrouve ses données (panier, préférences, session) après avoir rafraîchi la page ou fermé/rouvert le navigateur<br/>- L'état est restauré automatiquement au chargement de l'application, ce qui améliore l'expérience utilisateur<br/>- Configurable avec un nom unique pour chaque store dans le localStorage"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Communication API (5 pts)",
      "points": "5 pts",
      "enonce": "Votre application doit communiquer avec un backend via une API REST pour récupérer les produits et gérer les commandes.",
      "questions": [
        {
          "question": "1) Expliquez le rôle d'Axios et comment vous configureriez une instance pour votre API. (2 pts)",
          "reponse": "Axios est une bibliothèque HTTP qui simplifie les requêtes API [citation:9]. Sa configuration pour un e-commerce :<br/><strong>1. Création d'une instance :</strong><br/><code>const api = axios.create({ baseURL: 'https://api.monecommerce.com/v1' })</code><br/><strong>2. Intercepteurs de requête :</strong> Pour ajouter automatiquement le token JWT à chaque requête :<br/><code>api.interceptors.request.use(config => {</code><br/><code>  const token = useAuthStore.getState().token</code><br/><code>  if (token) config.headers.Authorization = `Bearer ${token}`</code><br/><code>  return config</code><br/><code>})</code><br/><strong>3. Intercepteurs de réponse :</strong> Pour gérer les erreurs globalement (ex: rafraîchir le token si 401) [citation:9]<br/><strong>4. Avantages d'Axios :</strong> Gestion automatique des JSON, support des promesses, protection contre les XSRF, annulation des requêtes"
        },

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
