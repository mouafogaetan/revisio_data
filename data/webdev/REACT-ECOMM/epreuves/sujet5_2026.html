<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une interface utilisateur e-commerce avec React",
  "classe": "Développement Web",
  "sequence": "Séquence 5 : Tester l'application React",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours sur les tests d'interactions",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Répondez aux questions suivantes en vous appuyant sur les bonnes pratiques vues en cours.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.1 (2 pts)</strong> Expliquez en quelques lignes l'intérêt de tester les interactions utilisateur dans une application e-commerce. Donnez un exemple d'interaction critique pour un site de vente en ligne au Cameroun.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Tester les interactions utilisateur permet de s'assurer que l'application réagit correctement aux actions des utilisateurs réels, comme les clics, les saisies dans les formulaires ou les sélections. Cela réduit les risques de bugs et améliore la confiance dans le code. Pour un site e-commerce au Cameroun, un exemple critique serait le test du processus de paiement : simuler l'ajout d'un produit au panier, la validation du formulaire de livraison et la confirmation de la commande. Une erreur à ce stade pourrait entraîner une perte de clientèle et de chiffre d'affaires.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.2 (2 pts)</strong> Expliquez ce qu'est un <code>mock</code> dans le contexte des tests. Pourquoi utilise-t-on MSW (Mock Service Worker) pour simuler les appels API ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Un <code>mock</code> est une simulation d'une dépendance externe (comme une API, une fonction ou un module). Il permet de contrôler le comportement de cette dépendance lors des tests, pour isoler le composant testé. MSW (Mock Service Worker) est utilisé pour simuler les appels API car il intercepte les requêtes HTTP au niveau du réseau, sans modifier le code de l'application. Cela permet de tester l'application comme si elle communiquait avec un vrai backend, mais avec des réponses prévisibles et rapides, sans dépendre d'un serveur réel. Les tests sont ainsi plus fiables et plus rapides [citation:3].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.3 (2 pts)</strong> Décrivez brièvement la différence entre <code>userEvent</code> et <code>fireEvent</code> de React Testing Library. Lequel est recommandé pour simuler un clic sur un bouton ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> <code>userEvent</code> est une bibliothèque qui simule des interactions utilisateur complètes et réalistes, comme taper du texte ou cliquer sur un bouton. Elle déclenche les événements dans le même ordre qu'un utilisateur réel (par exemple, <code>mousedown</code>, <code>mouseup</code>, <code>click</code>), ce qui rend les tests plus fidèles à la réalité. <code>fireEvent</code> est plus bas niveau : il déclenche un événement unique et immédiat. <code>userEvent</code> est recommandé car il est plus proche du comportement réel et permet de détecter plus de bugs potentiels [citation:3].</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyser un code de test",
      "points": "7 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Vous travaillez sur une application e-commerce. Voici un test écrit par un collègue pour la fonctionnalité de connexion.</p><div style='background: #1e293b; padding: 15px; border-radius: 8px; color: #f1f5f9; font-family: monospace; overflow-x: auto;'>import { render, screen } from '@testing-library/react';<br>import userEvent from '@testing-library/user-event';<br>import { Login } from './Login';<br><br>test('devrait connecter l\\'utilisateur', () => {<br>  render(&lt;Login /&gt;);<br>  const emailInput = screen.getByLabelText(/email/i);<br>  userEvent.type(emailInput, 'test@example.com');<br>  const passwordInput = screen.getByLabelText(/password/i);<br>  userEvent.type(passwordInput, 'password123');<br>  const submitButton = screen.getByText(/se connecter/i);<br>  fireEvent.click(submitButton);<br>  expect(screen.getByText(/bienvenue/i)).toBeInTheDocument();<br>});</div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.1 (1 pt)</strong> Ce test contient plusieurs erreurs ou mauvaises pratiques. Identifiez-en au moins deux.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Erreurs identifiées :<br>- <strong>Absence de <code>await</code></strong> : <code>userEvent.type</code> est asynchrone, il faut donc utiliser <code>await</code> pour attendre la fin de la saisie.<br>- <strong>Utilisation de <code>fireEvent</code></strong> pour le clic plutôt que <code>userEvent.click</code>, ce qui est moins réaliste [citation:3].<br>- <strong>Manque de simulation de l'API</strong> : Le test ne mocke pas l'appel API. Si la fonction de login fait une requête HTTP, le test échouera ou aura un comportement imprévisible.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.2 (3 pts)</strong> Réécrivez ce test correctement en intégrant un mock de l'API avec MSW pour vérifier que l'utilisateur est bien connecté. Vous pouvez vous aider du pseudo-code fourni ci-dessous. <div style='background: #f1f5f9; padding: 10px; border-radius: 8px;'>// Pseudo-code pour le mock MSW<br>// rest.post('/api/login', (req, res, ctx) => {<br>//   return res(ctx.json({ user: { name: 'Jean' }, token: 'fake-jwt-token' }));<br>// });</div></div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px;'>import { render, screen, waitFor } from '@testing-library/react';<br>import userEvent from '@testing-library/user-event';<br>import { rest } from 'msw';<br>import { setupServer } from 'msw/node';<br>import { Login } from './Login';<br><br>// Mock de l'API<br>const server = setupServer(<br>  rest.post('/api/login', (req, res, ctx) => {<br>    return res(ctx.json({ user: { name: 'Jean' }, token: 'fake-jwt-token' }));<br>  })<br>);<br><br>beforeAll(() => server.listen());<br>afterEach(() => server.resetHandlers());<br>afterAll(() => server.close());<br><br>test('devrait connecter l\\'utilisateur', async () => {<br>  const user = userEvent.setup();<br>  render(&lt;Login /&gt;);<br><br>  // Saisie des informations<br>  await user.type(screen.getByLabelText(/email/i), 'test@example.com');<br>  await user.type(screen.getByLabelText(/password/i), 'password123');<br>  await user.click(screen.getByRole('button', { name: /se connecter/i }));<br><br>  // Attendre que le message de bienvenue apparaisse<br>  await waitFor(() => {<br>    expect(screen.getByText(/bienvenue/i)).toBeInTheDocument();<br>  });<br>});</code></p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.3 (3 pts)</strong> Pourquoi est-il important d'utiliser <code>waitFor</code> dans ce test ? Que se passerait-il si on ne l'utilisait pas ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Dans ce test, après le clic sur le bouton de connexion, l'application effectue une requête asynchrone vers l'API (mockée) puis met à jour l'état et affiche un message. <code>waitFor</code> permet de patienter jusqu'à ce que le message de bienvenue soit effectivement présent dans le DOM. Sans <code>waitFor</code>, le test vérifierait immédiatement la présence du message, alors que celui-ci n'a pas encore été affiché, ce qui ferait échouer le test. <code>waitFor</code> est essentiel pour gérer les opérations asynchrones dans les tests [citation:2][citation:3].</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Tester une interaction complexe",
      "points": "7 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>On souhaite tester le processus d'ajout d'un produit au panier dans une boutique en ligne. Le composant <code>ProductCard</code> affiche un bouton 'Ajouter au panier'. Un clic sur ce bouton déclenche une mutation avec React Query pour ajouter le produit au panier. Un toast de confirmation s'affiche si l'ajout est réussi.</p><p style='margin-top: 10px;'>Écrivez un test complet qui vérifie :</p><ul><li>Le bouton 'Ajouter au panier' est affiché.</li><li>Un clic sur le bouton envoie une requête à l'API.</li><li>Le toast de confirmation apparaît après un ajout réussi.</li></ul><p>Vous utiliserez : <code>vitest</code>, <code>React Testing Library</code>, <code>userEvent</code> et <code>MSW</code> pour simuler la réponse de l'API.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3.1 (2 pts)</strong> Décrivez les étapes de configuration nécessaires pour ce test (mise en place du serveur MSW, initialisation du user, etc.).</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Les étapes de configuration sont :<br><br>1. <strong>Importer les dépendances</strong> : <code>@testing-library/react</code>, <code>@testing-library/user-event</code>, <code>vitest</code> et les fonctions de MSW.<br>2. <strong>Définir le mock du serveur</strong> : Créer un serveur MSW avec un handler pour la route d'ajout au panier (ex: <code>POST /api/cart</code>) qui renvoie une réponse de succès.<br>3. <strong>Configurer le serveur</strong> : Utiliser <code>beforeAll(() => server.listen())</code>, <code>afterEach(() => server.resetHandlers())</code> et <code>afterAll(() => server.close())</code>.<br>4. <strong>Initialiser <code>userEvent</code></strong> : Appeler <code>userEvent.setup()</code> dans le test pour créer une instance de l'utilisateur simulé.<br>5. <strong>Rendre le composant</strong> : Utiliser <code>render(&lt;ProductCard product={mockProduct} /&gt;)</code>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3.2 (5 pts)</strong> Rédigez le code du test complet.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px; white-space: pre-wrap;'>import { render, screen, waitFor } from '@testing-library/react';<br>import userEvent from '@testing-library/user-event';<br>import { rest } from 'msw';<br>import { setupServer } from 'msw/node';<br>import ProductCard from './ProductCard';<br><br>const mockProduct = { id: 1, name: 'Smartphone', price: 150000 };<br><br>// Mock de l'API<br>const server = setupServer(<br>  rest.post('/api/cart', (req, res, ctx) => {<br>    return res(ctx.json({ success: true, message: 'Produit ajouté au panier' }));<br>  })<br>);<br><br>beforeAll(() => server.listen());<br>afterEach(() => server.resetHandlers());<br>afterAll(() => server.close());<br><br>test('ajoute un produit au panier et affiche un toast', async () => {<br>  const user = userEvent.setup();<br>  render(&lt;ProductCard product={mockProduct} /&gt;);<br><br>  // 1. Vérifier que le bouton est présent<br>  const addButton = screen.getByRole('button', { name: /ajouter au panier/i });<br>  expect(addButton).toBeInTheDocument();<br><br>  // 2. Simuler le clic<br>  await user.click(addButton);<br><br>  // 3. Vérifier l'apparition du toast de confirmation<br>  await waitFor(() => {<br>    const toast = screen.getByText(/produit ajouté au panier/i);<br>    expect(toast).toBeInTheDocument();<br>  });<br>});</code></p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
