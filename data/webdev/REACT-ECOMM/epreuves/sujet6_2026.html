<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une interface utilisateur e-commerce avec React",
  "classe": "Développement Web",
  "sequence": "Séquence 6 - Gestion du processus d'achat",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Gestion du panier et affichage des produits",
      "points": "4 pts",
      "enonce": "<p>Dans le cadre du développement de la partie frontend de votre application e-commerce, vous devez gérer la logique du panier d'achat et l'affichage des produits.</p> <p>Vous utiliserez l'API REST suivante, dédiée à la gestion des produits, pour interagir avec votre application React. Les endpoints suivants sont disponibles :</p> <ul> <li><code>GET /api/v1/admin/products</code> : Récupère la liste de tous les produits.</li> <li><code>GET /api/v1/admin/products/:product_id</code> : Récupère les détails d'un produit spécifique.</li> </ul> <p>Un exemple de réponse de l'API pour un produit est :</p> <pre><code>{ &quot;id&quot;: 8, &quot;name&quot;: &quot;Apple Macbook Pro&quot;, &quot;description&quot;: &quot;Un ordinateur portable puissant.&quot;, &quot;price&quot;: { &quot;currency&quot;: &quot;EUR&quot;, &quot;subunit&quot;: 199900 } }</code></pre> <p>Vous devez créer les composants et la logique pour répondre aux fonctionnalités décrites dans les questions suivantes. La gestion de l'état et des appels API se fera à l'aide des outils modernes de l'écosystème React, comme vu en cours.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Affichage du panier (2 pts)</strong></p><p>Vous devez créer un composant <code>CartSummary</code> qui affiche la liste des articles dans le panier. Pour chaque article, il doit montrer le <strong>nom du produit</strong>, la <strong>quantité</strong> et le <strong>prix total</strong> pour cet article (quantité × prix unitaire). Le composant doit également calculer et afficher le <strong>sous-total</strong> du panier.</p><p><strong>Quelles structures de données (état) et quel hook de React utiliseriez-vous pour gérer les articles du panier et les mettre à jour ?</strong></p>",
          "reponse": "<p>Pour gérer l'état du panier, on peut utiliser le hook <code>useState</code> pour stocker un tableau d'objets, chacun représentant un article avec son <code>id</code>, sa <code>quantité</code>, son <code>nom</code> et son <code>prix</code>. Alternativement, une solution plus évoluée pour une application complexe serait d'utiliser un store global comme <strong>Zustand</strong> ou <strong>Redux</strong>.</p><p>Un état typique serait :</p><pre><code class=\"language-javascript\">const [cartItems, setCartItems] = useState([ { id: 1, name: 'Macbook Pro', quantity: 1, price: 1999 }, { id: 2, name: 'iPhone 15', quantity: 2, price: 1099 } ]);</code></pre><p>La mise à jour de la quantité se ferait via des fonctions comme <code>updateQuantity(productId, newQuantity)</code> ou <code>removeFromCart(productId)</code>, qui utilisent <code>setCartItems</code> pour mettre à jour l'état.</p>"
        },
        {
          "question": "<p><strong>2. Affichage des produits depuis l'API (2 pts)</strong></p><p>Vous devez créer un composant <code>ProductList</code> qui utilise un hook personnalisé pour récupérer et afficher la liste des produits depuis l'API.</p><p><strong>Expliquez comment vous utiliseriez <code>@tanstack/react-query</code> et un hook personnalisé pour gérer les états de chargement, de succès et d'erreur, en vous appuyant sur les données de l'API fournies.</strong></p>",
          "reponse": "<p>On peut créer un hook personnalisé <code>useProducts</code> qui encapsule la logique de récupération avec <code>useQuery</code>.</p><pre><code class=\"language-javascript\">// hooks/useProducts.js\nimport { useQuery } from '@tanstack/react-query';\nimport { fetchProducts } from '@/services/productService';\n\nexport const useProducts = () =&gt; {\n  return useQuery({\n    queryKey: ['products'],\n    queryFn: fetchProducts,\n    staleTime: 5 * 60 * 1000, // 5 minutes\n  });\n};</code></pre><p>Dans le composant :</p><pre><code class=\"language-jsx\">const ProductList = () =&gt; {\n  const { data: products, isLoading, isError, error } = useProducts();\n\n  if (isLoading) return &lt;div&gt;Chargement...&lt;/div&gt;;\n  if (isError) return &lt;div&gt;Erreur : {error.message}&lt;/div&gt;;\n\n  return (\n    &lt;ul&gt;\n      {products.map(product =&gt; (\n        &lt;li key={product.id}&gt;{product.name} - {product.price.subunit / 100} {product.price.currency}&lt;/li&gt;\n      ))}\n    &lt;/ul&gt;\n  );\n};</code></pre><p>Cette approche gère de manière déclarative les différents états de la requête.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Gestion du processus d'achat",
      "points": "6 pts",
      "enonce": "<p>L'objectif de cet exercice est de gérer la logique métier du processus d'achat de votre application e-commerce React.</p><p>Vous devez maîtriser la création de stores avec <strong>Zustand</strong> pour la gestion d'état globale.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Store du panier avec Zustand (3 pts)</strong></p><p>Créez un store <strong>Zustand</strong> pour le panier qui permettra de gérer les fonctionnalités suivantes :</p><ul><li>Ajouter un produit au panier (avec une quantité).</li><li>Retirer un produit du panier.</li><li>Mettre à jour la quantité d'un produit.</li><li>Calculer le nombre total d'articles et le prix total.</li></ul><p>Fournissez le code du store et expliquez comment vous l'utiliseriez dans un composant pour ajouter un produit.</p>",
          "reponse": "<pre><code class=\"language-javascript\">// stores/cartStore.js\nimport { create } from 'zustand';\n\nexport const useCartStore = create((set, get) =&gt; ({\n  items: [],\n  addToCart: (product, quantity = 1) =&gt;\n    set((state) =&gt; {\n      const existingItem = state.items.find(item =&gt; item.id === product.id);\n      if (existingItem) {\n        return {\n          items: state.items.map(item =&gt;\n            item.id === product.id\n              ? { ...item, quantity: item.quantity + quantity }\n              : item\n          ),\n        };\n      }\n      return { items: [...state.items, { ...product, quantity }] };\n    }),\n  removeFromCart: (productId) =&gt;\n    set((state) =&gt; ({\n      items: state.items.filter(item =&gt; item.id !== productId),\n    })),\n  updateQuantity: (productId, quantity) =&gt;\n    set((state) =&gt; ({\n      items: state.items.map(item =&gt;\n        item.id === productId ? { ...item, quantity } : item\n      ),\n    })),\n  getTotalItems: () =&gt; {\n    return get().items.reduce((total, item) =&gt; total + item.quantity, 0);\n  },\n  getTotalPrice: () =&gt; {\n    return get().items.reduce((total, item) =&gt; total + (item.price * item.quantity), 0);\n  },\n}));</code></pre><p>Pour l'utiliser dans un composant :</p><pre><code class=\"language-jsx\">import { useCartStore } from '@/stores/cartStore';\n\nconst ProductCard = ({ product }) =&gt; {\n  const addToCart = useCartStore(state =&gt; state.addToCart);\n\n  const handleAddToCart = () =&gt; {\n    addToCart(product, 1);\n  };\n\n  return &lt;button onClick={handleAddToCart}&gt;Ajouter au panier&lt;/button&gt;;\n};</code></pre>"
        },
        {
          "question": "<p><strong>2. Formulaire d'adresse de livraison (3 pts)</strong></p><p>Dans le processus de checkout, vous devez créer un formulaire pour l'adresse de livraison.</p><p><strong>Expliquez comment vous utiliseriez <code>react-hook-form</code> avec <code>zod</code> pour la validation, en décrivant les champs nécessaires (nom, prénom, adresse, code postal, ville, pays) et les règles de validation associées.</strong></p>",
          "reponse": "<p>On peut créer un schéma de validation avec Zod :</p><pre><code class=\"language-javascript\">// validations/checkout.js\nimport { z } from 'zod';\n\nexport const addressSchema = z.object({\n  firstName: z.string().min(2, 'Le prénom doit contenir au moins 2 caractères'),\n  lastName: z.string().min(2, 'Le nom doit contenir au moins 2 caractères'),\n  address: z.string().min(5, 'L\\'adresse est trop courte'),\n  postalCode: z.string().regex(/^\\d{5}$/, 'Code postal invalide (5 chiffres)'),\n  city: z.string().min(2, 'La ville est requise'),\n  country: z.string().min(2, 'Le pays est requis'),\n});</code></pre><p>Dans le composant du formulaire :</p><pre><code class=\"language-jsx\">import { useForm } from 'react-hook-form';\nimport { zodResolver } from '@hookform/resolvers/zod';\n\nconst AddressForm = () =&gt; {\n  const { register, handleSubmit, formState: { errors } } = useForm({\n    resolver: zodResolver(addressSchema)\n  });\n\n  const onSubmit = (data) =&gt; { /* Sauvegarder l'adresse */ };\n\n  return (\n    &lt;form onSubmit={handleSubmit(onSubmit)}&gt;\n      &lt;input {...register('firstName')} placeholder=\"Prénom\" /&gt;\n      {errors.firstName && &lt;p&gt;{errors.firstName.message}&lt;/p&gt;}\n      &lt;!-- autres champs --&gt;\n      &lt;button type=\"submit\"&gt;Valider&lt;/button&gt;\n    &lt;/form&gt;\n  );\n};</code></pre>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Intégration de Stripe et gestion des promotions",
      "points": "5 pts",
      "enonce": "<p>Dans cet exercice, vous allez aborder l'intégration de Stripe pour les paiements et la gestion des codes promotionnels.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Intégration de Stripe (3 pts)</strong></p><p>Décrivez les étapes nécessaires pour intégrer <strong>Stripe Elements</strong> dans votre application React afin de collecter les informations de carte bancaire en toute sécurité.</p><p>Expliquez comment vous structureriez le composant de paiement en utilisant <code>@stripe/react-stripe-js</code>.</p>",
          "reponse": "<p>Les étapes clés sont :</p><ol><li><strong>Installation :</strong> <code>npm install @stripe/stripe-js @stripe/react-stripe-js</code></li><li><strong>Configuration :</strong> Créer une instance de Stripe avec votre clé publique.</li><li><strong>Wrapper :</strong> Utiliser <code>Elements</code> comme wrapper autour du composant de paiement.</li><li><strong>Composant de paiement :</strong> Utiliser <code>PaymentElement</code> ou <code>CardElement</code> pour gérer le formulaire de carte.</li></ol><p>Exemple de composant :</p><pre><code class=\"language-jsx\">import { Elements, PaymentElement, useStripe, useElements } from '@stripe/react-stripe-js';\nimport { loadStripe } from '@stripe/stripe-js';\n\nconst stripePromise = loadStripe(process.env.REACT_APP_STRIPE_PUBLIC_KEY);\n\nconst CheckoutForm = () =&gt; {\n  const stripe = useStripe();\n  const elements = useElements();\n\n  const handleSubmit = async (event) =&gt; {\n    event.preventDefault();\n    if (!stripe || !elements) return;\n\n    const { error } = await stripe.confirmPayment({\n      elements,\n      confirmParams: { return_url: 'https://example.com/success' },\n    });\n  };\n\n  return (\n    &lt;form onSubmit={handleSubmit}&gt;\n      &lt;PaymentElement /&gt;\n      &lt;button type=\"submit\" disabled={!stripe}&gt;Payer&lt;/button&gt;\n    &lt;/form&gt;\n  );\n};\n\nconst Payment = () =&gt; (\n  &lt;Elements stripe={stripePromise}&gt;\n    &lt;CheckoutForm /&gt;\n  &lt;/Elements&gt;\n);</code></pre>"
        },
        {
          "question": "<p><strong>2. Gestion des codes promo et des frais de livraison (2 pts)</strong></p><p>Expliquez comment vous implémenteriez la logique pour appliquer un <strong>code promotionnel</strong> (par exemple, une réduction en pourcentage ou un montant fixe) et comment cela interagirait avec le calcul des <strong>frais de livraison</strong> et du <strong>total</strong> de la commande.</p>",
          "reponse": "<p>Il est judicieux de gérer cela dans un store Zustand dédié, par exemple <code>useCheckoutStore</code>, qui contiendrait les informations du panier, l'adresse de livraison, le code promo et le total calculé.</p><p>La logique pourrait être :</p><pre><code class=\"language-javascript\">const applyPromoCode = (code) =&gt; {\n  set((state) =&gt; {\n    // Appel API pour vérifier le code\n    const discount = fetchDiscount(code); // Ex: 0.1 pour 10% de réduction\n    const subtotal = state.getSubtotal();\n    const shipping = state.calculateShipping();\n    const total = (subtotal * (1 - discount)) + shipping;\n    return { promoCode: code, discount, total };\n  });\n};</code></pre><p>Ce store centraliserait toutes les règles de calcul (taxes, frais de livraison selon le poids/adresse, remises) et mettrait à jour le total qui serait affiché dans le récapitulatif de la commande.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
