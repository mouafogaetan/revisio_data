<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une interface utilisateur e-commerce avec React",
  "classe": "Développement Web",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Conception de l'architecture d'une boutique en ligne",
      "points": "8 pts",
      "enonce": "<p>Vous êtes chargé de concevoir l'architecture de la boutique en ligne <strong>\"CamerShop\"</strong>, une plateforme e-commerce qui vend des produits locaux et artisanaux au Cameroun. L'application devra être développée avec React et Vite.</p><p style='margin-top:0.8rem; background-color:#f0f4f8; padding:0.8rem; border-radius:8px; color:#1e293b;'><strong>Contexte camerounais :</strong> Le Cameroun, surnommé « l'Afrique en miniature », compte plus de 200 ethnies et une riche diversité culturelle [citation:5]. L'application devra refléter cette diversité à travers ses produits (artisanat, spécialités culinaires, etc.).</p>",
      "questions": [
        {
          "question": "<p><strong>1.1) Définition des écrans</strong> <em>(2 pts)</em></p><p>Listez et décrivez brièvement les écrans principaux de l'application en précisant leur rôle. Vous devez au minimum inclure : Accueil, Catalogue, Page produit, Panier, Paiement, Compte utilisateur.</p>",
          "reponse": "<ul style='list-style-type:disc; padding-left:1.2rem;'><li><strong>Accueil (Home)</strong> : Page d'entrée avec bannière, produits en vedette, catégories populaires et promotions.</li><li><strong>Catalogue (Products)</strong> : Liste des produits avec filtres (catégorie, prix) et système de tri.</li><li><strong>Page produit (Product Details)</strong> : Détails du produit, images, sélecteur de quantité, avis clients.</li><li><strong>Panier (Cart)</strong> : Récapitulatif des articles, modification des quantités, calcul du total.</li><li><strong>Paiement (Checkout)</strong> : Formulaire d'adresse, choix de livraison, paiement (Stripe/PayPal).</li><li><strong>Compte (Account)</strong> : Profil utilisateur, historique des commandes, adresses enregistrées.</li></ul>"
        },
        {
          "question": "<p><strong>1.2) Architecture des composants</strong> <em>(3 pts)</em></p><p>Expliquez comment vous allez structurer le projet en utilisant l'<strong>Atomic Design</strong> (atoms, molecules, organisms, templates, pages). Donnez un exemple concret pour chaque niveau en lien avec l'application CamerShop.</p>",
          "reponse": "<div><p>L'Atomic Design permet d'organiser les composants du plus simple au plus complexe :</p><ul style='list-style-type:disc; padding-left:1.2rem;'><li><strong>Atoms</strong> : Composants de base (Button, Input, Label, Icon). <em>Ex: Un bouton <code>Button</code> avec différentes variantes (primary, secondary).</em></li><li><strong>Molecules</strong> : Combinaison d'atomes (SearchBar, ProductCard, FormField). <em>Ex: <code>ProductCard</code> composé d'une image, d'un titre, d'un prix et d'un bouton \"Ajouter au panier\".</em></li><li><strong>Organisms</strong> : Sections complexes (Header, Footer, ProductGrid). <em>Ex: <code>ProductGrid</code> qui affiche une grille de ProductCards avec une logique de pagination.</em></li><li><strong>Templates</strong> : Mise en page sans données (Layout, ProductPageTemplate). <em>Ex: <code>ProductPageTemplate</code> avec un layout à deux colonnes (images + détails).</em></li><li><strong>Pages</strong> : Templates avec données et logique métier. <em>Ex: <code>HomePage</code>, <code>ProductPage</code>, <code>CartPage</code>.</em></li></ul></div>"
        },
        {
          "question": "<p><strong>1.3) Gestion d'état et navigation</strong> <em>(3 pts)</em></p><p>a) Quelle solution de gestion d'état global choisissez-vous pour CamerShop ? Justifiez votre choix.<br>b) Proposez la structure des routes principales de l'application en utilisant <code>react-router-dom</code>. Précisez les routes publiques et protégées.</p>",
          "reponse": "<div><p><strong>a) Choix de la gestion d'état</strong> : Je recommande <strong>Zustand</strong> pour sa légèreté, sa simplicité d'utilisation et sa performance. Il est idéal pour un projet e-commerce où nous avons besoin de stores dédiés (auth, cart, products). Contrairement à Redux, Zustand nécessite moins de code boilerplate.</p><p style='margin-top:0.8rem;'><strong>b) Structure des routes</strong> :</p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>/<br>├── / (Home - public)<br>├── /products (Catalogue - public)<br>├── /products/:id (Détail produit - public)<br>├── /cart (Panier - public)<br>├── /checkout (Paiement - protégé)<br>├── /account (Compte - protégé)<br>│   ├── /profile<br>│   ├── /orders<br>│   └── /addresses<br>├── /login (public - redirige si déjà connecté)<br>├── /register (public - redirige si déjà connecté)<br>└── /admin (protégé - rôle admin requis)<br>    ├── /products<br>    ├── /orders<br>    └── /users</code></div></div>"
        }
      ]
    },
    {
      "titre": "Mise en place de l'interface utilisateur",
      "points": "6 pts",
      "enonce": "<p>L'équipe de design a validé les maquettes pour CamerShop. Vous devez maintenant mettre en place l'interface utilisateur en utilisant <strong>TailwindCSS</strong> et <strong>Shadcn/ui</strong>.</p><p style='margin-top:0.8rem; background-color:#f0f4f8; padding:0.8rem; border-radius:8px; color:#1e293b;'><strong>Charte graphique</strong> : Couleurs inspirées de l'art camerounais : vert (#1A7A3A), orange (#E67E22), jaune (#F1C40F), et un fond beige (#F5F0E8).</p>",
      "questions": [
        {
          "question": "<p><strong>2.1) Configuration de TailwindCSS</strong> <em>(2 pts)</em></p><p>Décrivez les étapes pour installer et configurer TailwindCSS dans un projet Vite. Expliquez comment personnaliser le thème avec les couleurs ci-dessus et définir des breakpoints pour les écrans mobiles (ex: 'sm: 640px', 'md: 768px', 'lg: 1024px').</p>",
          "reponse": "<div><p><strong>Étapes d'installation de TailwindCSS :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>npm install -D tailwindcss postcss autoprefixer<br>npx tailwindcss init -p</code></div><p style='margin-top:0.8rem;'><strong>Configuration du thème dans <code>tailwind.config.js</code> :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>module.exports = {<br>  content: [\"./index.html\", \"./src/**/*.{js,ts,jsx,tsx}\"],<br>  theme: {<br>    extend: {<br>      colors: {<br>        'cameroun-green': '#1A7A3A',<br>        'cameroun-orange': '#E67E22',<br>        'cameroun-yellow': '#F1C40F',<br>        'cameroun-beige': '#F5F0E8',<br>      },<br>      screens: {<br>        'xs': '480px',<br>        'sm': '640px',<br>        'md': '768px',<br>        'lg': '1024px',<br>        'xl': '1280px',<br>      }<br>    }<br>  },<br>  plugins: [],<br>}</code></div></div>"
        },
        {
          "question": "<p><strong>2.2) Installation de Shadcn/ui</strong> <em>(2 pts)</em></p><p>a) Expliquez comment installer et configurer Shadcn/ui dans le projet.<br>b) Décrivez comment créer un composant personnalisé <code>ProductCard</code> à partir des composants de base de Shadcn/ui (Card, Button, Badge).</p>",
          "reponse": "<div><p><strong>a) Installation de Shadcn/ui :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>npx shadcn-ui@latest init</code></div><p>Cette commande lance un assistant qui configure le projet avec TailwindCSS, installe les dépendances nécessaires et crée les composants de base.</p><p style='margin-top:0.8rem;'><strong>b) Composant ProductCard personnalisé :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>import { Card, CardContent, CardFooter, CardHeader, CardTitle } from '@/components/ui/card';<br>import { Button } from '@/components/ui/button';<br>import { Badge } from '@/components/ui/badge';<br><br>export const ProductCard = ({ product, onAddToCart }) => {<br>  return (<br>    &lt;Card className=\"hover:shadow-lg transition-shadow\"&gt;<br>      &lt;CardHeader&gt;<br>        &lt;img src={product.image} alt={product.name} className=\"w-full h-48 object-cover rounded-t-lg\" /&gt;<br>      &lt;/CardHeader&gt;<br>      &lt;CardContent&gt;<br>        &lt;CardTitle&gt;{product.name}&lt;/CardTitle&gt;<br>        &lt;p className=\"text-cameroun-green font-bold\"&gt;{product.price} FCFA&lt;/p&gt;<br>        {product.isPromo && &lt;Badge variant=\"destructive\"&gt;Promo&lt;/Badge&gt;}<br>      &lt;/CardContent&gt;<br>      &lt;CardFooter&gt;<br>        &lt;Button onClick={() => onAddToCart(product)} className=\"w-full\"&gt;<br>          Ajouter au panier<br>        &lt;/Button&gt;<br>      &lt;/CardFooter&gt;<br>    &lt;/Card&gt;<br>  );<br>};</code></div></div>"
        },
        {
          "question": "<p><strong>2.3) Implémentation du Dark Mode</strong> <em>(2 pts)</em></p><p>Expliquez comment implémenter le dark mode avec TailwindCSS pour CamerShop. Décrivez :<br>a) La configuration de <code>tailwind.config.js</code> pour supporter le dark mode<br>b) La détection de la préférence système<br>c) La persistance du choix utilisateur dans <code>localStorage</code></p>",
          "reponse": "<div><p><strong>a) Configuration du dark mode :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>module.exports = {<br>  darkMode: 'class',<br>  theme: {<br>    extend: {<br>      colors: {<br>        // Couleurs personnalisées pour le dark mode<br>      }<br>    }<br>  }<br>}</code></div><p><strong>b) Détection de la préférence système :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>useEffect(() => {<br>  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;<br>  const stored = localStorage.getItem('theme');<br>  const isDark = stored ? stored === 'dark' : prefersDark;<br>  document.documentElement.classList.toggle('dark', isDark);<br>}, []);</code></div><p><strong>c) Persistance du choix utilisateur :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>const toggleTheme = () => {<br>  const isDark = document.documentElement.classList.toggle('dark');<br>  localStorage.setItem('theme', isDark ? 'dark' : 'light');<br>};</code></div></div>"
        }
      ]
    },
    {
      "titre": "Gestion de la navigation",
      "points": "6 pts",
      "enonce": "<p>La navigation est un élément clé de l'expérience utilisateur. Vous devez mettre en place le routage avec <code>react-router-dom</code> et créer les layouts appropriés.</p>",
      "questions": [
        {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
