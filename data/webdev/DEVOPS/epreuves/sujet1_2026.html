<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
    "matiere": "Initiation au DevOps",
    "classe": "Développement Web",
    "sequence": "Séquence 1",
    "anneeScolaire": "2025-2026",
    "exercices": [
        {
            "titre": "Comprendre la Culture DevOps et le Cycle de Vie",
            "points": "4 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Lisez attentivement les questions suivantes et répondez-y de manière claire et précise. Cette évaluation porte sur les fondamentaux de la culture DevOps et son cycle de vie.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) D'après les cours, qu'est-ce que DevOps et quels sont les principaux bénéfices de cette culture pour une entreprise, par exemple une startup à Douala ?</p>",
                    "reponse": "<p><strong>Réponse :</strong> DevOps est une culture et un ensemble de pratiques visant à rapprocher les équipes de développement (Dev) et d'exploitation (Ops). Les bénéfices incluent une livraison plus rapide, une meilleure fiabilité des applications, une collaboration renforcée et une réduction des risques [citation:4].</p>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Décrivez les différentes phases du cycle de vie DevOps en les reliant à des activités concrètes d'un projet de développement web.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Le cycle de vie DevOps comprend les phases suivantes :</p><ul><li><strong>Plan :</strong> Définir les besoins et les fonctionnalités.</li><li><strong>Develop :</strong> Écrire le code de l'application.</li><li><strong>Build :</strong> Compiler et empaqueter l'application.</li><li><strong>Test :</strong> Exécuter des tests automatisés.</li><li><strong>Release :</strong> Préparer la version pour le déploiement.</li><li><strong>Deploy :</strong> Mettre en production l'application.</li><li><strong>Operate :</strong> Gérer l'infrastructure et l'application en production.</li><li><strong>Monitor :</strong> Surveiller les performances et les logs [citation:4].</li></ul>"
                }
            ]
        },
        {
            "titre": "Principes CALMS et Rôles DevOps",
            "points": "4 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette section évalue votre compréhension des principes clés de DevOps et des différents rôles au sein d'une organisation.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Expliquez les principes CALMS. Donnez un exemple pour chacun d'eux dans un contexte de développement logiciel.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Les principes CALMS définissent la philosophie DevOps :</p><ul><li><strong>Culture :</strong> Favoriser la collaboration entre les équipes, par exemple en organisant des réunions communes.</li><li><strong>Automation :</strong> Automatiser les tâches répétitives comme les tests et les déploiements.</li><li><strong>Lean :</strong> Éliminer le gaspillage et optimiser les processus.</li><li><strong>Measurement :</strong> Mesurer les performances pour s'améliorer, par exemple avec des métriques sur le temps de déploiement.</li><li><strong>Sharing :</strong> Partager les connaissances et les responsabilités [citation:4].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Décrivez brièvement trois rôles courants en DevOps : DevOps Engineer, SRE (Site Reliability Engineer) et Platform Engineer.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>DevOps Engineer :</strong> Responsable de la mise en place et de la maintenance des pipelines CI/CD, de l'infrastructure et de l'automatisation.</li><li><strong>SRE (Site Reliability Engineer) :</strong> Se concentre sur la fiabilité et la performance des applications en production.</li><li><strong>Platform Engineer :</strong> Conçoit et maintient la plateforme interne sur laquelle les développeurs déploient leurs applications [citation:4].</li></ul>"
                }
            ]
        },
        {
            "titre": "Chaîne d'Outils DevOps",
            "points": "4 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette section évalue votre capacité à identifier et à choisir les outils appropriés pour un pipeline DevOps.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Classez les outils suivants dans les catégories correspondantes du pipeline DevOps : Git, Jenkins, Docker, Kubernetes, Prometheus, Grafana.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Version Control :</strong> Git</li><li><strong>CI/CD :</strong> Jenkins</li><li><strong>Containerisation :</strong> Docker</li><li><strong>Orchestration :</strong> Kubernetes</li><li><strong>Monitoring :</strong> Prometheus et Grafana [citation:2][citation:5]</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Expliquez comment ces outils interagissent dans un pipeline CI/CD moderne, en utilisant l'exemple d'une application web.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Un pipeline moderne commence lorsque le développeur pousse son code sur Git. Jenkins (ou GitHub Actions) détecte le changement, récupère le code, le construit (build) et le teste. Si les tests sont réussis, il crée une image Docker de l'application et la déploie sur Kubernetes, qui gère l'orchestration. Prometheus collecte les métriques de l'application, et Grafana les visualise dans un tableau de bord [citation:2].</p>"
                }
            ]
        },
        {
            "titre": "Mise en Situation : Automatisation d'un Pipeline CI/CD",
            "points": "8 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Lisez l'étude de cas suivante et répondez aux questions. Utilisez vos connaissances sur le pipeline CI/CD et les outils DevOps pour analyser la situation.</p>",
            "questions": [
                {
                    "question": "<p><strong>Étude de Cas :</strong> Une entreprise camerounaise, 'PayTech', développe une application de paiement mobile. L'équipe de développement souhaite mettre en place un pipeline CI/CD pour accélérer les déploiements et améliorer la qualité du code. Actuellement, les déploiements sont manuels et prennent plusieurs heures.</p><p style='font-weight: bold;'>a) (4 pts) Proposez les différentes étapes d'un pipeline CI/CD pour l'application de PayTech, en détaillant chaque phase (CI et CD).</p>",
                    "reponse": "<p><strong>Réponse :</strong> Un pipeline CI/CD pour PayTech pourrait inclure les étapes suivantes :</p><p><strong>Phase CI (Intégration Continue) :</strong></p><ul><li><strong>Build :</strong> Automatiser la compilation et le packaging du code.</li><li><strong>Test :</strong> Exécuter des tests unitaires et d'intégration à chaque commit pour détecter les erreurs rapidement [citation:1].</li></ul><p><strong>Phase CD (Déploiement Continu) :</strong></p><ul><li><strong>Package :</strong> Créer une image Docker de l'application [citation:2].</li><li><strong>Deploy :</strong> Déployer l'image sur un environnement de test, puis de production [citation:10].</li><li><strong>Monitor :</strong> Surveiller l'application en production avec des outils comme Prometheus [citation:5].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>b) (4 pts) Recommandez des outils appropriés pour chaque étape du pipeline. Justifiez vos choix en précisant les avantages de chaque outil pour une entreprise comme PayTech.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Recommandations d'outils :</p><ul><li><strong>Version Control (Git) :</strong> Permet de gérer le code source et de collaborer efficacement.</li><li><strong>CI/CD (GitHub Actions ou Jenkins) :</strong> GitHub Actions est intégré à GitHub et ne nécessite pas de serveur dédié. Jenkins est un standard de l'industrie et offre une grande flexibilité [citation:1][citation:6].</li><li><strong>Containerisation (Docker) :</strong> Permet d'empaqueter l'application et ses dépendances pour garantir un déploiement fiable sur n'importe quel serveur [citation:2].</li><li><strong>Orchestration (Kubernetes) :</strong> Pour gérer, mettre à l'échelle et surveiller l'application conteneurisée en production [citation:5].</li><li><strong>Monitoring (Prometheus et Grafana) :</strong> Prometheus collecte les métriques, Grafana les visualise pour aider à la prise de décision et à la résolution d'incidents [citation:5].</li></ul>"
                }
            ]
        }
    ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
