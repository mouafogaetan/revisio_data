<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au DevOps",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Questions à Choix Multiples (QCM) - Culture DevOps",
      "points": "6 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice vise à évaluer vos connaissances fondamentales sur la culture DevOps, ses principes et son cycle de vie.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la ou les bonnes réponses parmi les propositions.</p>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> DevOps est avant tout :</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Un ensemble d'outils comme Docker et Jenkins</li><li>B. Une culture et une philosophie de collaboration</li><li>C. Le nom d'un langage de programmation</li><li>D. Un poste occupé par une seule personne dans l'équipe</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>DevOps est avant tout une culture et une philosophie qui vise à briser le mur entre les équipes de développement et d'exploitation. Les outils comme Docker ou Jenkins ne sont que des moyens pour mettre en œuvre cette culture.</p>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Le cycle de vie DevOps comprend 8 phases continues. Lesquelles sont correctes ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Plan, Develop, Build, Test, Release, Deploy, Operate, Monitor</li><li>B. Plan, Code, Compile, Deploy, Test, Release, Operate, Monitor</li><li>C. Conceive, Build, Test, Deploy, Operate, Monitor</li><li>D. Plan, Develop, Build, Test, Deploy, Release, Operate, Monitor</li></ul>",
          "reponse": "<p><strong>Réponse : A</strong></p><p>Le cycle de vie DevOps dans l'ordre correct est : Plan, Develop, Build, Test, Release, Deploy, Operate, Monitor. C'est un cycle continu où chaque phase alimente la suivante.</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Parmi les affirmations suivantes concernant les bénéfices de DevOps, laquelle est FAUSSE ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. DevOps permet une livraison plus rapide des fonctionnalités</li><li>B. DevOps améliore la fiabilité grâce à l'automatisation et aux tests</li><li>C. DevOps rend les développeurs complètement indépendants des opérateurs</li><li>D. DevOps renforce la collaboration entre les équipes</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>DevOps ne rend pas les équipes indépendantes, au contraire, il renforce la collaboration et brise les silos. C'est l'opposé de l'indépendance : c'est la synergie.</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Que signifie l'acronyme CALMS dans le contexte DevOps ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Culture, Architecture, Lean, Management, Security</li><li>B. Cloud, Automation, Linux, Microservices, Security</li><li>C. Culture, Automation, Lean, Measurement, Sharing</li><li>D. Code, Automation, Logs, Monitoring, Scaling</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>CALMS est un acronyme qui définit les piliers de DevOps : Culture, Automation (automatisation), Lean, Measurement (mesure) et Sharing (partage).</p>"
        },
        {
          "question": "<p><strong>5. (1 pt)</strong> Lequel de ces éléments N'EST PAS un outil typique de la chaîne DevOps ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Jenkins (CI/CD)</li><li>B. Docker (Conteneurisation)</li><li>C. Microsoft Word (Traitement de texte)</li><li>D. Prometheus (Monitoring)</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>Microsoft Word est un outil de bureautique, pas un outil DevOps. Jenkins, Docker et Prometheus sont respectivement utilisés pour CI/CD, la conteneurisation et le monitoring.</p>"
        },
        {
          "question": "<p><strong>6. (1 pt)</strong> Lequel de ces rôles est typiquement associé à DevOps ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. DevOps Engineer</li><li>B. Site Reliability Engineer (SRE)</li><li>C. Platform Engineer</li><li>D. Tous les rôles ci-dessus</li></ul>",
          "reponse": "<p><strong>Réponse : D</strong></p><p>DevOps Engineer, SRE (Site Reliability Engineer) et Platform Engineer sont tous des rôles associés à la culture DevOps, chacun avec des responsabilités spécifiques.</p>"
        }
      ]
    },
    {
      "titre": "Questions à Choix Multiples (QCM) - Git et Linux",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice évalue vos connaissances sur les commandes Linux et Git, outils fondamentaux du DevOps.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la bonne réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>7. (1 pt)</strong> Quelle commande Git permet de basculer sur une branche existante ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. git branch</li><li>B. git switch</li><li>C. git clone</li><li>D. git commit</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>git switch permet de basculer sur une branche existante. git branch liste les branches, git clone copie un dépôt et git commit enregistre les modifications.</p>"
        },
        {
          "question": "<p><strong>8. (1 pt)</strong> Sous Linux, que fait la commande <code>chmod 755 fichier</code> ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Elle change le propriétaire du fichier</li><li>B. Elle donne des permissions 755 (rwxr-xr-x) au fichier</li><li>C. Elle supprime le fichier</li><li>D. Elle déplace le fichier</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>chmod 755 donne les permissions rwxr-xr-x au fichier (lecture, écriture, exécution pour le propriétaire, lecture et exécution pour le groupe et les autres).</p>"
        },
        {
          "question": "<p><strong>9. (1 pt)</strong> Sous Linux, quel gestionnaire de paquets est utilisé sur Ubuntu et Debian ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. yum</li><li>B. dnf</li><li>C. apt</li><li>D. pacman</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>apt est le gestionnaire de paquets des distributions Debian et Ubuntu. yum et dnf sont utilisés sur Red Hat et CentOS.</p>"
        },
        {
          "question": "<p><strong>10. (1 pt)</strong> Sous Linux, la structure du système de fichiers racine (/) contient des dossiers standards. Le dossier <code>/etc</code> contient :</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Les fichiers des utilisateurs</li><li>B. Les fichiers de configuration système</li><li>C. Les binaires exécutables</li><li>D. Les fichiers temporaires</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>/etc contient les fichiers de configuration du système et des applications. /home contient les fichiers des utilisateurs, /bin les exécutables et /tmp les fichiers temporaires.</p>"
        }
      ]
    },
    {
      "titre": "Questions à Choix Multiples (QCM) - Docker et Kubernetes",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice porte sur les concepts fondamentaux de la conteneurisation avec Docker et de l'orchestration avec Kubernetes.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la bonne réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>11. (1 pt)</strong> Quelle est la différence fondamentale entre un conteneur Docker et une machine virtuelle ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Le conteneur partage le noyau de l'hôte, la VM a son propre noyau</li><li>B. La VM est plus légère qu'un conteneur</li><li>C. Les conteneurs ne peuvent pas être déployés dans le cloud</li><li>D. Il n'y a pas de différence</li></ul>",
          "reponse": "<p><strong>Réponse : A</strong></p><p>La différence fondamentale est que les conteneurs partagent le noyau de l'hôte, ce qui les rend plus légers et plus rapides à démarrer, tandis que les machines virtuelles ont leur propre système d'exploitation complet.</p>"
        },
        {
          "question": "<p><strong>12. (1 pt)</strong> Quelle commande Docker permet d'exécuter un conteneur à partir d'une image ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. docker build</li><li>B. docker run</li><li>C. docker ps</li><li>D. docker pull</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>docker run exécute un conteneur à partir d'une image. docker build construit une image, docker ps liste les conteneurs en cours d'exécution et docker pull télécharge une image.</p>"
        },
        {
          "question": "<p><strong>13. (1 pt)</strong> Dans Kubernetes, quelle est l'unité de base déployable ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. Le Node</li><li>B. Le Pod</li><li>C. Le Container</li><li>D. Le Deployment</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>Le Pod est l'unité de base de déploiement dans Kubernetes. Un Pod peut contenir un ou plusieurs conteneurs qui partagent le même réseau et le même stockage.</p>"
        },
        {
          "question": "<p><strong>14. (1 pt)</strong> Quel composant de Kubernetes stocke l'état du cluster ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. L'API Server</li><li>B. etcd</li><li>C. Le Scheduler</li><li>D. Le kubelet</li></ul>",
          "reponse": "<p><strong>Réponse : B</strong></p><p>etcd est la base de données clé-valeur qui stocke tout l'état du cluster Kubernetes. L'API Server est le point d'entrée, le Scheduler décide où placer les Pods et le kubelet est l'agent sur chaque Node.</p>"
        }
      ]
    },
    {
      "titre": "Questions à Choix Multiples (QCM) - Cloud et Pipeline DevOps",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1rem; line-height: 1.6;'>Cet exercice évalue vos connaissances sur les modèles de cloud et les pipelines CI/CD.</p><p style='font-size: 0.95rem; margin-top: 10px;'><strong>Consignes :</strong> Pour chaque question, choisissez la bonne réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>15. (1 pt)</strong> Quel modèle de service cloud offre le plus de contrôle à l'utilisateur ?</p><ul style='list-style-type: none; padding-left: 0;'><li>A. SaaS (Software as a Service)</li><li>B. PaaS (Platform as a Service)</li><li>C. IaaS (Infrastructure as a Service)</li><li>D. Tous offrent le même niveau de contrôle</li></ul>",
          "reponse": "<p><strong>Réponse : C</strong></p><p>IaaS offre le plus de contrôle car vous gérez l'OS, les applications, les données. SaaS ne nécessite aucune gestion, PaaS gère l'infrastructure pour vous.</p>"
        },

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
