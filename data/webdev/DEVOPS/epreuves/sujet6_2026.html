<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
    "matiere": "Initiation au DevOps",
    "classe": "Développement Web",
    "sequence": "Séquence 6",
    "anneeScolaire": "2025-2026",
    "exercices": [
        {
            "titre": "Infrastructure as Code (IaC) : Concepts et Bonnes Pratiques",
            "points": "4 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette évaluation porte sur les concepts fondamentaux de l'Infrastructure as Code (IaC) et son rôle dans une stratégie DevOps moderne. Répondez aux questions en vous basant sur les connaissances acquises en cours.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Qu'est-ce que l'Infrastructure as Code (IaC) ? Citez trois bénéfices principaux de cette approche pour la gestion d'infrastructure.</p>",
                    "reponse": "<p><strong>Réponse :</strong> L'Infrastructure as Code (IaC) est une approche de gestion d'infrastructure où les ressources (serveurs, réseaux, bases de données, etc.) sont définies et provisionnées via des fichiers de configuration lisibles par une machine, plutôt que par des processus manuels ou des interfaces graphiques [citation:2][citation:5]. Ses bénéfices incluent :</p><ul><li><strong>Répétabilité et cohérence :</strong> La même configuration peut être déployée de manière identique dans différents environnements (développement, test, production) [citation:5].</li><li><strong>Versionnement et audit :</strong> Les changements d'infrastructure sont tracés via Git, offrant un historique complet et facilitant les retours en arrière [citation:2].</li><li><strong>Automatisation :</strong> Les déploiements peuvent être déclenchés automatiquement via des pipelines CI/CD, réduisant les erreurs manuelles [citation:1][citation:6].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Expliquez la différence entre les approches dites 'déclarative' et 'impérative' en IaC, en donnant un exemple d'outil pour chacune.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Approche déclarative :</strong> On décrit l'état final souhaité de l'infrastructure. L'outil détermine par lui-même les actions nécessaires pour atteindre cet état. <em>Exemple :</em> Terraform [citation:2][citation:5].</li><li><strong>Approche impérative :</strong> On spécifie une séquence d'étapes à exécuter pour atteindre un état cible. <em>Exemple :</em> Ansible, bien qu'il puisse aussi être utilisé de manière déclarative [citation:5].</li></ul>"
                }
            ]
        },
        {
            "titre": "IaC dans la Pratique : Terraform",
            "points": "5 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette section évalue votre compréhension du workflow Terraform et des bonnes pratiques de sécurité associées.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Décrivez le workflow standard de Terraform en détaillant les commandes principales (<code>init</code>, <code>plan</code>, <code>apply</code>) et leur utilité dans un pipeline CI/CD.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Le workflow Terraform se compose de trois commandes principales :</p><ul><li><strong><code>terraform init</code> :</strong> Initialise le répertoire de travail, télécharge les providers et modules nécessaires. Elle est généralement exécutée en premier lieu dans un pipeline.</li><li><strong><code>terraform plan</code> :</strong> Analyse les fichiers de configuration et génère un plan d'exécution. Elle permet de visualiser les changements qui seront appliqués sans les réaliser, servant d'étape de validation avant l'application.</li><li><strong><code>terraform apply</code> :</strong> Applique les changements définis dans le fichier de configuration pour atteindre l'état souhaité. C'est la commande qui provisionne ou modifie l'infrastructure [citation:7].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Quelles sont les principales erreurs de configuration que l'on peut rencontrer avec Terraform ? Expliquez comment les outils d'analyse (comme Checkov ou Trivy) peuvent aider à les prévenir.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Les erreurs de configuration courantes avec Terraform incluent :</p><ul><li>L'exposition involontaire de ressources (ex: buckets S3 publics) [citation:2].</li><li>L'absence de chiffrement pour les données sensibles.</li><li>Des politiques IAM trop permissives [citation:2].</li><li>L'injection de secrets en dur dans les fichiers de configuration.</li></ul><p>Les outils de scanning (Checkov, Trivy) analysent les fichiers Terraform (et autres IaC) pour détecter ces problèmes avant le déploiement. En s'intégrant dans le pipeline CI/CD, ils peuvent bloquer les pull requests contenant des violations critiques [citation:2][citation:9].</p>"
                },
                {
                    "question": "<p style='font-weight: bold;'>3) Pourquoi le fichier <code>terraform.tfstate</code> est-il si important ? Quelles sont les bonnes pratiques pour sa gestion ?</p>",
                    "reponse": "<p><strong>Réponse :</strong> Le fichier <code>terraform.tfstate</code> contient l'état actuel de l'infrastructure gérée par Terraform. Il est essentiel car Terraform s'en sert pour déterminer les modifications à appliquer lors des prochains <code>plan</code> et <code>apply</code>. Les bonnes pratiques incluent :</p><ul><li><strong>Ne pas le versionner dans Git :</strong> Il est déconseillé de le commiter manuellement car il peut contenir des secrets et générer des conflits.</li><li><strong>Utiliser un backend distant :</strong> Stocker l'état dans un emplacement partagé comme un bucket S3 (avec versionning activé) ou Azure Storage, idéal pour le travail en équipe et l'intégration CI/CD [citation:2][citation:7].</li></ul>"
                }
            ]
        },
        {
            "titre": "Pipeline CI/CD et Sécurité des Secrets",
            "points": "5 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette section évalue votre capacité à concevoir un pipeline CI/CD sécurisé et à automatiser le déploiement d'une infrastructure.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Un pipeline CI/CD moderne doit intégrer des scans de sécurité. Expliquez ce qu'est une analyse 'Shift Left' et quels types d'outils (SAST, DAST, analyse de dépendances) peuvent être utilisés pour cela.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Le concept 'Shift Left' consiste à déplacer les vérifications de sécurité le plus en amont possible dans le cycle de vie du développement, c'est-à-dire dès l'écriture du code [citation:6]. Cela permet de détecter et corriger les vulnérabilités plus tôt, quand elles sont moins coûteuses à résoudre. Les outils utilisés incluent :</p><ul><li><strong>SAST (Static Application Security Testing) :</strong> Analyse le code source pour y trouver des failles (ex: SonarQube) [citation:9].</li><li><strong>DAST (Dynamic Application Security Testing) :</strong> Teste l'application en cours d'exécution pour détecter des vulnérabilités (ex: OWASP ZAP).</li><li><strong>Analyse de dépendances :</strong> Scanne les bibliothèques tierces utilisées par l'application pour identifier les versions vulnérables.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) En considérant l'importance de l'automatisation [citation:1][citation:6], comment intégreriez-vous un outil d'IaC (comme Terraform) dans un pipeline GitHub Actions ? Décrivez les étapes et les bonnes pratiques de sécurité.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Pour intégrer Terraform dans GitHub Actions, on peut créer un workflow YAML qui s'exécute sur un <code>push</code> ou <code>pull_request</code>. Les étapes seraient :</p><ol><li><strong>Checkout du code :</strong> Utiliser l'action <code>actions/checkout</code>.</li><li><strong>Configuration de Terraform :</strong> Utiliser l'action <code>hashicorp/setup-terraform</code>.</li><li><strong>Exécution de <code>terraform init</code>.</strong></li><li><strong>Exécution de <code>terraform plan</code> :</strong> L'afficher en commentaire sur la PR.</li><li><strong>Exécution de <code>terraform apply</code> :</strong> Uniquement sur la branche principale après validation.</li></ol><p><strong>Bonnes pratiques de sécurité :</strong></p><ul><li>Utiliser des <code>secrets</code> GitHub pour les clés d'accès aux providers cloud [citation:7].</li><li>Utiliser un backend distant sécurisé (ex: S3 avec chiffrement) pour le fichier d'état.</li><li>Scanner les fichiers Terraform avec Checkov ou Trivy avant le <code>apply</code> pour détecter les misconfigurations [citation:2].</li></ul>"
                }
            ]
        },
        {
            "titre": "Étude de Cas : Sécuriser le Pipeline de 'PayTech'",
            "points": "6 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Lisez l'étude de cas suivante et répondez aux questions. Utilisez vos connaissances sur l'IaC, la sécurité et le monitoring pour analyser la situation.</p>",
            "questions": [
                {
                    "question": "<p><strong>Étude de Cas :</strong> 'PayTech', une entreprise de paiement mobile camerounaise, a déjà mis en place des pipelines CI/CD et utilise Terraform pour son infrastructure. Cependant, leur équipe DevOps constate que des ressources sont parfois modifiées manuellement (via la console AWS), ce qui crée des écarts ('drift') entre l'état réel et ce qui est défini dans le code. De plus, des secrets sont encore présents dans certains fichiers de variables Terraform committés sur Git.</p><p style='font-weight: bold;'>a) (3 pts) Expliquez les risques liés à ces deux pratiques : le 'configuration drift' et l'exposition de secrets dans les dépôts Git.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Ces deux pratiques présentent des risques majeurs :</p><ul><li><strong>Configuration Drift :</strong> Lorsque l'infrastructure réelle s'écarte de la configuration définie dans l'IaC, cela provoque une perte de contrôle et de reproductibilité. Il devient alors difficile de savoir quel est l'état exact, et les rollbacks ou le déploiement de nouvelles ressources deviennent risqués [citation:2][citation:3].</li><li><strong>Secrets dans Git :</strong> Committer des secrets (clés API, mots de passe) dans un dépôt Git, même s'ils sont encodés en base64, est une faille de sécurité critique. Ces secrets peuvent être exposés si le dépôt devient public ou si des accès sont compromis [citation:2].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>b) (3 pts) Proposez un plan d'action en trois points pour corriger ces problèmes et renforcer la sécurité du pipeline de 'PayTech'.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Plan d'action pour PayTech :</p><ol><li><strong>Remédier au Drift :</strong> Mettre en place une politique stricte interdisant les modifications manuelles. Automatiser la détection du drift (ex: avec <code>terraform plan</code> en mode lecture seule) et la correction via le pipeline CI/CD [citation:2][citation:4].</li><li><strong>Sécuriser les Secrets :</strong> Utiliser un gestionnaire de secrets dédié (AWS Secrets Manager, HashiCorp Vault) [citation:2]. Supprimer les secrets du code et les injecter via des variables d'environnement ou un backend de secrets.</li><li><strong>Automatiser les Scans :</strong> Ajouter une étape de scan des fichiers Terraform (avec Checkov ou Trivy) dans le pipeline de CI pour détecter les secrets et les misconfigurations avant tout déploiement [citation:2][citation:9].</li></ol>"
                }
            ]
        }
    ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
