<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au DevOps",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Compréhension des concepts et sécurité (Shift Left)",
      "points": "8 pts",
      "enonce": "<div style='background-color: #f8fafc; padding: 15px; border-radius: 8px;'>\n<h3 style='color: #0f172a;'>Contexte</h3>\n<p>Vous travaillez en tant que DevOps Engineer dans une startup camerounaise qui développe des applications web. L'équipe souhaite adopter les bonnes pratiques de sécurité dans son pipeline CI/CD.</p>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Expliquez le concept de <strong>Shift Left</strong> en sécurité. Pourquoi est-il important de l'appliquer dans un pipeline DevOps ?</p>",
          "reponse": "<p>Le Shift Left consiste à intégrer les tests de sécurité en amont, dès les premières phases de développement. Il est important car il permet de détecter les vulnérabilités tôt, ce qui réduit significativement les coûts de correction et limite les risques de faille en production. Cette approche transforme la sécurité en une responsabilité partagée par toute l'équipe, plutôt qu'une vérification tardive en fin de cycle.</p>"
        },
        {
          "question": "<p><strong>2. (3 pts)</strong> Distinguez les approches <strong>SAST</strong> et <strong>DAST</strong>. Pour chacune, citez un outil populaire et précisez à quelle étape du pipeline CI/CD il serait intégré.</p>",
          "reponse": "<p><strong>SAST (Static Application Security Testing)</strong> analyse le code source sans l'exécuter pour identifier des patterns dangereux, comme des injections SQL ou des XSS. Un outil populaire est <strong>SonarQube</strong>. Il est généralement intégré dès l'étape de build (build) ou de test, par exemple lors de la création d'une Pull Request.</p><p><strong>DAST (Dynamic Application Security Testing)</strong> teste l'application en cours d'exécution, simulant des attaques externes pour détecter des failles d'exécution et de configuration. Un outil standard est <strong>OWASP ZAP</strong>. Il est plutôt utilisé dans les phases de staging ou de pré-production, une fois l'application déployée dans un environnement d'intégration.</p>"
        },
        {
          "question": "<p><strong>3. (3 pts)</strong> Expliquez pourquoi il est risqué de stocker des secrets (clés API, mots de passe) dans le code source. Proposez deux solutions pour gérer ces secrets de manière sécurisée dans un contexte DevOps.</p>",
          "reponse": "<p>Stocker des secrets dans le code est une pratique risquée car le code est souvent partagé et versionné. Toute personne ayant accès au dépôt peut voir ces informations sensibles, ce qui peut conduire à des intrusions et des fuites de données.</p><p>Pour une gestion sécurisée, on peut utiliser :</p><ul><li><strong>Un gestionnaire de secrets dédié :</strong> comme <strong>HashiCorp Vault</strong> ou les services cloud (AWS Secrets Manager), qui centralisent le stockage, l'accès et la rotation des secrets.</li><li><strong>Des variables d'environnement sécurisées :</strong> injectées dynamiquement via le pipeline CI/CD ou via des ressources comme <strong>ConfigMap</strong> et <strong>Secret</strong> dans Kubernetes.</li></ul>"
        }
      ]
    },
    {
      "titre": "Analyse de pipeline sécurisé",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f1f5f9; padding: 15px; border-radius: 8px; border-left: 5px solid #3b82f6;'>\n<h3 style='color: #0f172a;'>Description du pipeline</h3>\n<p>Un pipeline CI/CD sur GitHub Actions est configuré comme suit :</p>\n<pre style='background: #0f172a; color: #f8fafc; padding: 10px; border-radius: 5px;'>\n<code>jobs:\n  security:\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v3\n      - name: Run SAST\n        uses: sonarqube-scan-action@v1\n      - name: Run DAST\n        uses: zaproxy/action-baseline@v1\n      - name: Secret scanning\n        uses: gitleaks/gitleaks-action@v1</code></pre>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Analysez ce pipeline. Quel est l'ordre des étapes ? Selon vous, cet ordre est-il pertinent ? Justifiez.</p>",
          "reponse": "<p>L'ordre est : Checkout, SAST, DAST, puis Secret Scanning. Cet ordre est globalement pertinent car il commence par les analyses statiques (SAST et Secret Scanning) qui sont rapides et ne nécessitent pas d'environnement d'exécution. Le DAST, qui exécute l'application, arrive ensuite. Cependant, l'analyse des secrets aurait pu être placée juste après le checkout pour être encore plus précoce.</p>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Si ce pipeline est configuré pour s'exécuter sur chaque <code>pull_request</code>, quel sera l'impact sur le workflow de développement ?</p>",
          "reponse": "<p>Exécuter ce pipeline sur chaque pull request permet de détecter les vulnérabilités et les fuites de secrets avant même que le code ne soit fusionné dans la branche principale. Cela renforce le feedback rapide, un pilier du DevOps, et permet aux développeurs de corriger les problèmes identifiés dès la revue de code.</p>"
        },
        {
          "question": "<p><strong>3. (2 pts)</strong> Vous constatez qu'un des steps du pipeline échoue. Selon vous, quelle pourrait être une cause pour le step <strong>'Run DAST'</strong> et comment y remédier ?</p>",
          "reponse": "<p>Une cause fréquente d'échec du DAST est que l'application cible n'est pas encore accessible ou n'est pas correctement configurée. En effet, le DAST nécessite que l'application soit déployée et accessible via une URL. Pour y remédier, il faut s'assurer qu'un environnement de staging est déployé avant l'exécution du job DAST, ou configurer le pipeline pour que l'application soit lancée localement (via Docker) pendant le test.</p>"
        }
      ]
    },
    {
      "titre": "Gestion des secrets en pratique",
      "points": "6 pts",
      "enonce": "<div style='background-color: #fef2f2; padding: 15px; border-radius: 8px; border-left: 5px solid #dc2626;'>\n<p><strong>Situation :</strong> Un développeur a accidentellement commit un fichier <code>.env</code> contenant la clé API d'un service externe sur le dépôt GitHub public.</p>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Quels sont les risques immédiats pour l'entreprise suite à cet événement ?</p>",
          "reponse": "<p>Le risque majeur est que la clé API soit compromise. Toute personne ayant accès au dépôt ou au commit peut utiliser cette clé pour accéder aux services associés. Cela peut entraîner des accès non autorisés, une fuite de données, des coûts d'utilisation non contrôlés et une perte de confiance des clients.</p>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Expliquez la procédure d'urgence à suivre pour sécuriser l'application et l'infrastructure après ce commit.</p>",
          "reponse": "<p>La procédure d'urgence doit inclure :</p><ul><li><strong>Révocation immédiate :</strong> Désactiver ou régénérer la clé API auprès du fournisseur de service.</li><li><strong>Nettoyage du dépôt :</strong> Supprimer le fichier <code>.env</code> du commit. Il est recommandé d'utiliser <code>git filter-repo</code> ou <code>BFG Repo-Cleaner</code> pour purger l'historique complet du dépôt.</li><li><strong>Rotation des secrets :</strong> Mettre à jour la clé API dans tous les environnements (staging, production) en utilisant un gestionnaire de secrets (Vault, AWS Secrets Manager).</li></ul>"
        },
        {
          "question": "<p><strong>3. (2 pts)</strong> Proposez une mesure préventive pour éviter que cet incident ne se reproduise.</p>",
          "reponse": "<p>Pour prévenir cela, il faut :</p><ul><li><strong>Ajouter un fichier <code>.gitignore</code> :</strong> Y inclure les fichiers sensibles comme <code>.env</code>, <code>*.key</code> ou <code>*.pem</code> pour les empêcher d'être commités.</li><li><strong>Intégrer un outil de détection de secrets :</strong> Configurer un outil comme <strong>Gitleaks</strong> ou <strong>TruffleHog</strong> en hook de pre-commit ou dans le pipeline CI/CD pour analyser automatiquement le code et bloquer les commits contenant des secrets.</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
