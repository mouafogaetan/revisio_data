<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 10 : Git avancé - Hooks, sous-modules et versioning | DevOps</title>
    <!-- Tailwind CSS + Font Awesome (icônes légères) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules (minime ici) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces et responsive */
        .slide-container {
            transition: opacity 0.25s ease-in-out;
        }
        .fadeIn {
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 antialiased">

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <div class="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-indigo-200">
            <!-- en-tête de la leçon -->
            <div class="bg-gradient-to-r from-indigo-800 to-slate-800 px-5 py-4 text-white flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">⚙️</span>
                    <span class="font-bold tracking-wide">Initiation DevOps | Git avancé</span>
                </div>
                <span class="bg-white/20 text-xs px-3 py-1 rounded-full">Leçon 10 · Hooks, submodules & versioning</span>
            </div>

            <!-- zone des slides dynamiques -->
            <div id="slides-wrapper" class="p-5 md:p-8 min-h-[500px] flex flex-col">
                <!-- contenu injecté par jQuery -->
            </div>

            <!-- navigation et indicateurs -->
            <div class="border-t border-gray-200 bg-gray-50/90 px-5 py-4 flex flex-wrap justify-between items-center gap-3">
                <div class="flex gap-2">
                    <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-indigo-100 text-indigo-800 font-medium py-2 px-4 rounded-xl shadow-sm flex items-center gap-1 text-sm md:text-base transition">◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2 px-5 rounded-xl shadow-md flex items-center gap-1 text-sm md:text-base transition">Suivant ▶</button>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600 bg-white px-3 py-1 rounded-full shadow-inner">
                    <span id="slideCounter">Slide 1 / 1</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                    <span class="hidden sm:inline">Git avancé</span>
                </div>
                <div class="flex gap-1" id="dotsIndicator"></div>
            </div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-5">🔁 Navigation par boutons ou flèches du clavier — Git Hooks, submodules et semver</p>
    </main>

    <script>
        // ----- SLIDES POUR LEÇON 10 (Git Hooks, sous-modules, versioning) -----
        const slides = [
            { // Slide 0 : Titre principal
                type: "title",
                content: `
                    <div class="flex flex-col items-center justify-center text-center h-full min-h-[450px]">
                        <div class="bg-indigo-100 rounded-full p-4 mb-5 shadow-md">
                            <svg class="w-12 h-12 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-slate-700 bg-clip-text text-transparent">Git pour les pros</h1>
                        <p class="text-gray-600 max-w-xl mx-auto mt-4 text-lg">Hooks personnalisés, sous-modules et gestion de versions sémantique</p>
                        <div class="flex flex-wrap gap-2 justify-center mt-6 text-sm">
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🔌 Git Hooks (pre-commit, pre-push)</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">📦 Sous-modules (submodules)</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🏷️ SemVer & tags</span>
                        </div>
                    </div>
                `
            },
            { // Slide 1 : Objectifs pédagogiques
                type: "objectifs",
                content: `
                    <div class="h-full">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-5 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">1. Utiliser</div><p class="text-gray-700">Les Git Hooks (pre-commit, pre-push) pour automatiser des vérifications (lint, tests).</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">2. Gérer</div><p class="text-gray-700">Les sous-modules (`git submodule`) pour intégrer des dépôts externes.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">3. Comprendre</div><p class="text-gray-700">Les stratégies de versioning : tags légers/annotés et sémantique (SemVer).</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">4. Appliquer</div><p class="text-gray-700">Les bonnes pratiques pour les hooks et le versionning en équipe.</p></div>
                        </div>
                        <div class="mt-6 p-3 bg-slate-100 rounded-lg text-slate-800 text-sm italic">💡 À la fin, vous automatiserez des contrôles qualité dans vos repos Git !</div>
                    </div>
                `
            },
            { // Slide 2 : Git Hooks – introduction et types
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">🔌 Git Hooks : automatiser avant/après les actions</h2>
                        <p class="mt-2 text-gray-700">Les hooks sont des scripts exécutés automatiquement par Git lors d'événements clés (commit, push, merge). Ils sont stockés dans <code class="bg-gray-100 px-1 rounded">.git/hooks/</code>.</p>
                        <div class="grid md:grid-cols-2 gap-4 mt-4">
                            <div class="bg-amber-50 p-4 rounded-xl border-l-4 border-amber-400">
                                <div class="font-bold">📌 pre-commit</div>
                                <p class="text-sm">Exécuté avant la création du commit. Idéal pour linter le code, exécuter des tests rapides, ou formater.</p>
                                <pre class="bg-gray-800 text-gray-100 p-2 rounded text-xs mt-2 overflow-x-auto"><code>#!/bin/sh\n# .git/hooks/pre-commit\nnpm run lint\nif [ $? -ne 0 ]; then\n  echo "❌ Linting échoué, commit annulé"\n  exit 1\nfi</code></pre>
                            </div>
                            <div class="bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-400">
                                <div class="font-bold">📌 pre-push</div>
                                <p class="text-sm">Déclenché avant `git push`. Vérifie que les tests unitaires passent ou que la branche n'est pas cassée.</p>
                                <pre class="bg-gray-800 text-gray-100 p-2 rounded text-xs mt-2"><code>#!/bin/sh\n# .git/hooks/pre-push\nmake test || exit 1</code></pre>
                            </div>
                            <div class="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-400">
                                <div class="font-bold">📌 commit-msg</div>
                                <p class="text-sm">Valide le message du commit (convention, longueur). Peut intégrer des règles "Conventional Commits".</p>
                            </div>
                            <div class="bg-purple-50 p-4 rounded-xl border-l-4 border-purple-400">
                                <div class="font-bold">📌 post-merge</div>
                                <p class="text-sm">Se lance après un merge réussi (ex: réinstaller les dépendances).</p>
                            </div>
                        </div>
                        <p class="mt-4 text-xs text-gray-500">⚠️ Les hooks ne sont pas versionnés (sauf via outils comme pre-commit, Husky).</p>
                    </div>
                `
            },
            { // Slide 3 : Sous-modules Git
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">📦 Sous-modules : inclure un dépôt dans un autre</h2>
                        <p class="mt-2 text-gray-700">Un sous-module est une référence vers un commit spécifique d'un autre dépôt Git. Utile pour partager une bibliothèque commune ou des configurations.</p>
                        <div class="bg-gray-50 p-4 rounded-lg mt-4 border">
                            <div class="font-mono text-indigo-700">Commandes essentielles :</div>
                            <pre class="bg-gray-900 text-green-300 p-3 rounded text-sm mt-2 overflow-x-auto"><code># Ajouter un sous-module
git submodule add https://github.com/user/librairie.git libs/librairie

# Cloner un projet avec ses sous-modules
git clone --recursive https://github.com/mon-projet.git

# Mettre à jour tous les sous-modules
git submodule update --remote --merge

# Supprimer un sous-module (étapes manuelles)
git rm --cached libs/librairie
rm -rf .git/modules/libs/librairie</code></pre>
                        </div>
                        <div class="mt-4 p-3 bg-yellow-50 rounded-lg text-yellow-800 text-sm">
                            ⚠️ Attention : les sous-modules pointent sur des commits figés. Pensez à `git submodule update` après un clone.
                        </div>
                    </div>
                `
            },
            { // Slide 4 : Versioning sémantique (SemVer) et tags
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🏷️ Tags et version sémantique (SemVer)</h2>
                        <p class="mt-2 text-gray-700">Le versioning sémantique (<span class="font-mono">MAJEUR.MINEUR.CORRECTIF</span>) est une convention universelle :</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
                            <div class="bg-red-50 p-3 rounded-lg text-center"><span class="font-bold text-red-700">MAJEUR</span><br>Changement incompatible</div>
                            <div class="bg-amber-50 p-3 rounded-lg text-center"><span class="font-bold text-amber-700">MINEUR</span><br>Fonctionnalité rétrocompatible</div>
                            <div class="bg-green-50 p-3 rounded-lg text-center"><span class="font-bold text-green-700">CORRECTIF</span><br>Correction bug rétrocompatible</div>
                        </div>
                        <div class="mt-4 bg-gray-50 p-4 rounded-lg">
                            <div class="font-bold">🏷️ Gérer les tags dans Git :</div>
                            <pre class="bg-gray-900 text-gray-100 p-3 rounded text-sm mt-2"><code># Tag léger (simple pointeur)
git tag v1.0.0

# Tag annoté (recommandé, avec métadonnées)
git tag -a v1.2.3 -m "Version stable avec nouvelle API"

# Pousser les tags vers le remote
git push origin --tags

# Lister / supprimer un tag
git tag -l "v*"
git tag -d v1.0.0</code></pre>
                        </div>
                        <p class="text-xs text-gray-500 mt-3">📌 Convention SemVer : `v2.3.1` + prérelease (ex: `v2.4.0-beta.1`).</p>
                    </div>
                `
            },
            { // Slide 5 : Bonnes pratiques et intégration CI/CD
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🚀 Intégration continue : hooks + versioning</h2>
                        <p class="mt-2 text-gray-700">Dans un pipeline DevOps, on combine ces concepts :</p>
                        <ul class="list-disc list-inside mt-2 space-y-1 text-gray-700">
                            <li><strong>Hooks locaux</strong> : pré-commit (linter), pré-push (tests rapides) qualité avant envoi.</li>
                            <li><strong>Sous-modules</strong> : pour gérer des microservices ou des bibliothèques partagées (attention aux versions figées).</li>
                            <li><strong>Tags et SemVer</strong> : déclencher automatiquement un build/release via CI/CD lors de la création d’un tag (ex: GitHub Actions, GitLab CI).</li>
                        </ul>
                        <div class="bg-indigo-50 p-4 rounded-lg mt-4 border border-indigo-200">
                            <div class="font-bold text-indigo-800">Exemple de workflow :</div>
                            <pre class="bg-gray-800 text-gray-200 text-xs p-3 rounded mt-2"><code># commit avec message "feat: ajout module"
git commit -m "feat: ajout nouvelle route"
git push origin main
# puis versioning
git tag -a v1.1.0 -m "Nouvelle fonctionnalité"
git push origin v1.1.0
# dans GitHub Actions : déclenche build et déploiement en production</code></pre>
                        </div>
                        <p class="mt-4 text-center text-indigo-700 text-sm">🎯 Maîtriser ces outils rend votre chaîne DevOps robuste et professionnelle.</p>
                    </div>
                `
            }
        ];

        let currentSlideIndex = 0;
        const totalSlides = slides.length;

        function renderSlide() {
            const data = slides[currentSlideIndex];
            $('#slides-wrapper').html(`<div class="slide-container fadeIn w-full">${data.content}</div>`);
            $('#slideCounter').text(`Slide ${currentSlideIndex+1} / ${totalSlides}`);

            // Génération des indicateurs
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const active = i === currentSlideIndex ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
                dotsHtml += `<button class="dot-indicator h-2 rounded-full transition-all ${active} mx-1 hover:bg-indigo-400" data-index="${i}"></button>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            $('.dot-indicator').on('click', function() {
                const idx = parseInt($(this).data('index'));
                if (!isNaN(idx) && idx !== currentSlideIndex && idx >=0 && idx < totalSlides) {
                    currentSlideIndex = idx;
                    renderSlide();
                }
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        $('#prevSlide').on('click', () => {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        });
        $('#nextSlide').on('click', () => {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                renderSlide();
            } else {
                if (currentSlideIndex === totalSlides-1) {
                    const notif = $('<div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-indigo-800 text-white text-sm px-5 py-2 rounded-full shadow-lg z-50">🎉 Fin du cours Git avancé !</div>');
                    $('body').append(notif);
                    setTimeout(() => notif.fadeOut(500, function(){ $(this).remove(); }), 2000);
                }
            }
        });

        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') $('#prevSlide').click();
            if (e.key === 'ArrowRight') $('#nextSlide').click();
        });

        renderSlide();
    </script>
</body>
</html>
