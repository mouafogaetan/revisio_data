<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 34 : Déploiement sur Azure - Création de VM et Stockage Blob | Cours DevOps</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques (optionnel, mais présent) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles additionnels pour améliorer l'expérience sur mobile et la slide navigation */
        body {
            background: #f1f5f9; /* couleur de fond douce */
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 1rem auto;
            transition: all 0.2s ease;
        }
        .slide-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
            user-select: none;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        .objective-item, .content-item {
            transition: background 0.2s;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1rem;
                margin: 0.5rem;
            }
            h1, h2 {
                word-break: break-word;
            }
            .nav-btn span {
                font-size: 0.9rem;
            }
        }
        /* Pour une meilleure lisibilité des listes */
        .list-disc-custom {
            list-style-type: disc;
            padding-left: 1.5rem;
        }
        .list-decimal-custom {
            list-style-type: decimal;
            padding-left: 1.5rem;
        }
    </style>
</head>
<body class="bg-slate-100 antialiased">

    <div class="slide-container px-3 md:px-6 py-4 md:py-8">
        <!-- Carte principale qui affichera les slides -->
        <div class="slide-card overflow-hidden">
            <div id="slide-content" class="p-5 md:p-8">
                <!-- Le contenu sera injecté dynamiquement via jQuery -->
            </div>
            <!-- Indicateur de progression et boutons de navigation -->
            <div class="bg-gray-50 px-5 py-4 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="text-sm text-gray-500 order-2 sm:order-1">
                    Slide <span id="current-slide-num">1</span> / <span id="total-slides">0</span>
                </div>
                <div class="w-full max-w-xs bg-gray-200 rounded-full h-2 order-1 sm:order-2">
                    <div id="progress-fill" class="progress-bar bg-indigo-600 h-2 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex gap-3 order-3">
                    <button id="prev-btn" class="nav-btn bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-medium py-2 px-4 rounded-full transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                        Précédent
                    </button>
                    <button id="next-btn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-full transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        Suivant
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // -----------------------------
            // DONNÉES DE LA LEÇON 34 (Basée sur le programme: chap9, lesson34)
            // Titre: Créer un compte Azure et utiliser le portail, Provisionner des VM Azure, Utiliser Azure Blob Storage
            // Nous construisons les slides manuellement: Slide1 titre, Slide2 objectifs, puis slides de contenu
            // -----------------------------
            
            const titreLecon = "Leçon 34 : Déploiement sur Azure – VM & Blob Storage";
            const descriptionCourte = "Apprenez à créer un compte Microsoft Azure, à provisionner des machines virtuelles et à gérer le stockage Blob dans le cloud.";
            
            // Objectifs pédagogiques
            const objectifs = [
                "Créer un compte Azure gratuit et naviguer dans le portail Azure.",
                "Provisionner une machine virtuelle (VM) sous Linux ou Windows avec les bonnes configurations.",
                "Comprendre et utiliser Azure Blob Storage pour stocker des fichiers (images, vidéos, sauvegardes).",
                "Gérer les groupes de ressources, les réseaux et la sécurité de base."
            ];
            
            // Contenu détaillé (plusieurs slides) pour expliquer la leçon de manière simple
            // Chaque slide contient un titre et un contenu (HTML structuré)
            const contentSlides = [
                {
                    title: "☁️ 1. Création d'un compte Azure et découverte du portail",
                    body: `
                        <p class="mb-3 text-gray-700">Azure est la plateforme cloud de Microsoft. Pour commencer, il vous faut un compte. Suivez ces étapes simples :</p>
                        <ul class="list-disc-custom space-y-2 mb-4">
                            <li>Rendez-vous sur <span class="font-mono bg-gray-100 px-1 rounded">portal.azure.com</span> et cliquez sur « Créer un compte gratuit ».</li>
                            <li>Utilisez une adresse email (Outlook, Gmail, etc.) et vérifiez votre identité.</li>
                            <li>Après validation, vous bénéficiez de <strong>200 $ de crédits</strong> pendant 30 jours et des services gratuits pendant 12 mois.</li>
                            <li>Une fois connecté, découvrez le <strong>portail Azure</strong> : tableau de bord, barre de recherche, favoris.</li>
                        </ul>
                        <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-400">
                            <p class="text-indigo-800 text-sm italic">💡 Astuce : Epinglez les services que vous utilisez souvent (Machines virtuelles, Comptes de stockage) dans votre tableau de bord pour un accès rapide.</p>
                        </div>
                        <div class="mt-5 flex justify-center">
                            <div class="bg-gray-100 p-3 rounded-lg text-center max-w-sm w-full">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l2-2m-2 2h14M5 10l2 2m-2-2l-2-2m16 4l-2 2m0 0l-2 2m2-2H3m14 4l2-2m0 0l2-2m-2 2l2 2" /></svg>
                                <p class="text-xs text-gray-500 mt-1">Schéma : Interface du portail Azure (Dashboard)</p>
                            </div>
                        </div>
                    `
                },
                {
                    title: "⚙️ 2. Provisionner une Machine Virtuelle (VM) sur Azure",
                    body: `
                        <p class="mb-3 font-medium">Une VM est comme un ordinateur dans le cloud. Créons notre première VM Linux (Ubuntu) :</p>
                        <ol class="list-decimal-custom space-y-2 mb-4">
                            <li>Dans le portail, cliquez sur « Créer une ressource » → « Machine virtuelle ».</li>
                            <li>Choisissez un <strong>groupe de ressources</strong> (ex: monGroupeApp) pour organiser vos ressources.</li>
                            <li>Donnez un nom à la VM (ex: “web-vm-devops”), sélectionnez la région la plus proche.</li>
                            <li>Choisissez l’image : Ubuntu Server 22.04 LTS (ou Windows Server selon votre besoin).</li>
                            <li>Définissez un nom d’utilisateur et une clé SSH (ou mot de passe) pour vous connecter.</li>
                            <li>Validez la taille (B1s est souvent éligible au gratuit).</li>
                        </ol>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                            <div class="bg-slate-50 p-3 rounded-lg shadow-sm">
                                <span class="font-bold text-indigo-700">🔑 Règles de sécurité</span>
                                <p class="text-sm mt-1">Autorisez le port 22 (SSH) pour accéder à la VM. Pour une application web, ajoutez le port 80/443.</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-lg shadow-sm">
                                <span class="font-bold text-indigo-700">💻 Connexion SSH</span>
                                <p class="text-sm mt-1">Une fois la VM créée, connectez-vous avec <code class="bg-gray-200 px-1 rounded">ssh utilisateur@IP_publique</code>.</p>
                            </div>
                        </div>
                        <img src="" alt="diagramme provisionnement machine virtuelle azure étapes création VM" class="w-full max-h-48 object-contain my-2">
                        <p class="text-xs text-gray-400 mt-1 text-center">* Illustration : Processus simplifié de création de VM (portail Azure)</p>
                    `
                },
                {
                    title: "📦 3. Gérer les ressources et les groupes",
                    body: `
                        <p>Sur Azure, chaque service appartient à un <strong>groupe de ressources</strong>. C’est une boîte logique qui facilite la gestion, la facturation et la suppression groupée.</p>
                        <div class="flex flex-wrap gap-3 my-4 justify-center">
                            <div class="bg-white border border-gray-300 rounded-xl p-3 w-40 text-center shadow-sm">
                                <div class="font-mono text-sm">Groupe: RG-DEVOPS</div>
                                <div class="text-xs">▶️ VM-prod</div>
                                <div class="text-xs">▶️ Stockage logs</div>
                                <div class="text-xs">▶️ IP publique</div>
                            </div>
                            <div class="self-center text-2xl text-gray-400">→</div>
                            <div class="bg-green-50 p-3 rounded-xl text-sm max-w-xs">✅ Meilleure organisation, suppression en un clic de tout le projet.</div>
                        </div>
                        <p class="mt-2">👩‍🏫 <strong>Bonnes pratiques</strong> : nommez vos groupes avec des préfixes (ex: “rg-projet-nom”) et regroupez les ressources liées (réseau, VM, base de données).</p>
                        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mt-4 rounded">
                            ⚠️ Attention : la suppression d’un groupe de ressources supprime TOUT ce qu’il contient. Toujours vérifier avant !
                        </div>
                    `
                },
                {
                    title: "🗄️ 4. Azure Blob Storage – Stocker des fichiers dans le cloud",
                    body: `
                        <p>Azure Blob Storage sert à stocker d’énormes quantités de données non structurées : images, vidéos, logs, sauvegardes, etc. C’est l’équivalent du “drive” scalable.</p>
                        <div class="my-4 bg-gradient-to-r from-blue-50 to-indigo-50 p-4 rounded-xl">
                            <p class="font-semibold">🔹 Créer un compte de stockage :</p>
                            <ul class="list-disc-custom text-sm space-y-1 mt-1">
                                <li>Aller dans « Comptes de stockage » → « Créer ».</li>
                                <li>Choisir le même groupe de ressources que la VM.</li>
                                <li>Donner un nom unique (global sur Azure).</li>
                                <li>Performance Standard (recommandé pour débuter), Redondance LRS.</li>
                            </ul>
                            <p class="font-semibold mt-3">🔹 Créer un conteneur (Blob) :</p>
                            <ul class="list-disc-custom text-sm">
                                <li>Dans le compte de stockage, allez dans « Conteneurs » → « + Conteneur ».</li>
                                <li>Nommez le conteneur (ex: "donnees-projet").</li>
                                <li>Choisissez le niveau d’accès (Privé, Blob public ou Conteneur public).</li>
                            </ul>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3 text-center justify-center items-center">
                            <div class="bg-gray-100 p-2 rounded-full w-12 h-12 flex items-center justify-center">⬆️</div>
                            <span class="text-sm">Téléchargez un fichier (image, texte) depuis le portail ou via Azure CLI</span>
                            <div class="bg-gray-100 p-2 rounded-full w-12 h-12 flex items-center justify-center">⬇️</div>
                        </div>
                        <p class="mt-4 text-sm">Exemple d’URL d’un blob : <code class="bg-gray-100 px-1 rounded break-all">https://monstockage.blob.core.windows.net/donnees-projet/monfichier.png</code></p>
                    `
                },
                {
                    title: "🔗 5. Lier VM et Stockage – TP pratique simplifié",
                    body: `
                        <p>En situation réelle, on utilise souvent Blob Storage pour stocker des médias ou des backups depuis une VM. Voici comment faire :</p>
                        <div class="bg-gray-800 text-gray-100 p-4 rounded-lg font-mono text-sm overflow-x-auto my-4">
                            <span class="text-green-300"># Depuis votre VM Linux (Ubuntu), installer Azure CLI</span><br>
                            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash<br>
                            <span class="text-green-300"># Se connecter à Azure</span><br>
                            az login<br>
                            <span class="text-green-300"># Télécharger un fichier vers Blob Storage</span><br>
                            az storage blob upload --account-name monstockage --container-name donnees-projet --file monfichier.txt --name backup/monfichier.txt --auth-mode key
                        </div>
                        <p>✅ <strong>Avantages</strong> : vos données sont durables, accessibles partout et sécurisées. Vous pouvez les partager avec des URL signées (SAS).</p>
                        <div class="mt-3 grid grid-cols-2 gap-2 text-center">
                            <div class="border rounded p-2"><span class="font-bold">Coût</span><br>Payez à l'usage (stockage + opérations)</div>
                            <div class="border rounded p-2"><span class="font-bold">Sécurité</span><br>Chiffrement au repos et en transit</div>
                        </div>
                    `
                },
                {
                    title: "📘 6. Récapitulatif et bonnes pratiques Azure",
                    body: `
                        <p>Félicitations ! Vous maîtrisez les bases du déploiement sur Azure : Compte, VM, Blob Storage.</p>
                        <div class="space-y-3 mt-3">
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">✓</span> <span>Utilisez le <strong>portail Azure</strong> pour surveiller vos coûts (outil « Gestion des coûts »).</span></div>
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">✓</span> <span>Arrêtez les VM non utilisées pour économiser des crédits.</span></div>
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">✓</span> <span>Préférez les clés SSH plutôt que les mots de passe pour plus de sécurité.</span></div>
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">✓</span> <span>Utilisez Azure CLI ou Terraform pour automatiser la création de ressources (Infrastructure as Code).</span></div>
                        </div>
                        <div class="bg-emerald-50 rounded-xl p-4 mt-5 border border-emerald-200">
                            <p class="font-semibold text-emerald-800">🌟 Exercice à réaliser chez vous :</p>
                            <p class="text-sm">Créez un compte Azure, provisionnez une VM Linux gratuite (B1s), installez nginx, puis stockez une page HTML dans un Blob Storage. Accédez au fichier depuis votre navigateur via l’URL du blob !</p>
                        </div>
                        <p class="text-center text-gray-400 text-xs mt-6">Le cloud vous ouvre des portes infinies – pratiquez régulièrement !</p>
                    `
                }
            ];
            
            // Construction complète des slides: slide 0 -> titre, slide 1 -> objectifs, puis les slides de contenu
            let slides = [];
            // Slide titre
            slides.push({
                type: "title",
                title: titreLecon,
                subtitle: descriptionCourte,
                extra: "Cours DevOps – Classe Développement Web | Enseignant: Devox Cameroun"
            });
            // Slide objectifs
            slides.push({
                type: "objectives",
                objectivesList: objectifs
            });
            // Slides de contenu
            contentSlides.forEach(slide => {
                slides.push({
                    type: "content",
                    contentTitle: slide.title,
                    contentBody: slide.body
                });
            });
            
            let currentIndex = 0;
            const totalSlides = slides.length;
            $("#total-slides").text(totalSlides);
            
            // Fonction pour afficher le slide courant avec mise en forme Tailwind
            function renderSlide(index) {
                const slideData = slides[index];
                let html = '';
                if (slideData.type === 'title') {
                    html = `
                        <div class="text-center">
                            <div class="inline-block p-2 bg-indigo-100 rounded-full text-indigo-700 mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                            </div>
                            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-sky-600 bg-clip-text text-transparent">${escapeHtml(slideData.title)}</h1>
                            <p class="text-gray-600 text-lg md:text-xl mt-4 max-w-2xl mx-auto">${escapeHtml(slideData.subtitle)}</p>
                            <div class="mt-8 pt-4 border-t border-gray-200 inline-block">
                                <p class="text-gray-500 text-sm">${escapeHtml(slideData.extra)}</p>
                            </div>
                        </div>
                    `;
                } 
                else if (slideData.type === 'objectives') {
                    let objectivesHtml = '';
                    slideData.objectivesList.forEach((obj, idx) => {
                        objectivesHtml += `<li class="mb-3 flex gap-3 items-start"><span class="bg-indigo-100 text-indigo-800 rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold shrink-0 mt-0.5">${idx+1}</span><span class="text-gray-700">${escapeHtml(obj)}</span></li>`;
                    });
                    html = `
                        <div>
                            <div class="flex items-center gap-2 mb-5">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Objectifs d'apprentissage</h2>
                            </div>
                            <ul class="space-y-3 list-none">
                                ${objectivesHtml}
                            </ul>
                            <div class="mt-8 bg-indigo-50 rounded-xl p-4 text-indigo-800 text-sm">
                                💪 À la fin de cette leçon, vous serez capable de déployer des ressources de base sur Microsoft Azure.
                            </div>
                        </div>
                    `;
                } 
                else if (slideData.type === 'content') {
                    html = `
                        <div>
                            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-6 border-indigo-500 pl-4 mb-5">${escapeHtml(slideData.contentTitle)}</h2>
                            <div class="prose prose-slate max-w-none">
                                ${slideData.contentBody}  <!-- on injecte le HTML déjà formatté, attention aux injections sécurisées ? On fait confiance à notre contenu (sans script malveillant) -->
                            </div>
                        </div>
                    `;
                }
                $("#slide-content").html(html);
                $("#current-slide-num").text(index + 1);
                const progressPercent = ((index + 1) / totalSlides) * 100;
                $("#progress-fill").css("width", `${progressPercent}%`);
                
                // Désactiver / activer boutons selon la position
                if (index === 0) {
                    $("#prev-btn").prop('disabled', true);
                } else {
                    $("#prev-btn").prop('disabled', false);
                }
                if (index === totalSlides - 1) {
                    $("#next-btn").prop('disabled', true);
                } else {
                    $("#next-btn").prop('disabled', false);
                }
                
                // Re-scroller en haut de la slide pour une meilleure expérience mobile
                $('html, body').animate({ scrollTop: $(".slide-card").offset().top - 20 }, 100);
            }
            
            // Navigation
            $("#next-btn").on("click", function() {
                if (currentIndex < totalSlides - 1) {
                    currentIndex++;
                    renderSlide(currentIndex);
                }
            });
            $("#prev-btn").on("click", function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderSlide(currentIndex);
                }
            });
            
            // petite fonction utilitaire contre XSS
            function escapeHtml(str) {
                if(!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                    return c;
                });
            }
            
            // Rendu initial
            renderSlide(0);
        });
    </script>
    <!-- note: les images avec src vide sont utilisées comme espacement/description pour améliorer la recherche. Conformément à la consigne. -->
</body>
</html>
