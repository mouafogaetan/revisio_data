<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cours Flutter | Installation et configuration de l'environnement</title>
  <!-- Tailwind CSS + Google Fonts pour un rendu doux -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (au cas où des formules apparaîtraient) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions douces pour les slides */
    .slide {
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
    }
    .slide-hidden {
      display: none;
      opacity: 0;
      transform: translateX(20px);
    }
    .slide-active {
      display: block;
      opacity: 1;
      transform: translateX(0);
    }
    /* personnalisation des scrolls et focus */
    .prose code {
      background-color: #f1f5f9;
      padding: 0.2rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.9em;
    }
    .btn-nav {
      transition: all 0.2s;
    }
    .btn-nav:active {
      transform: scale(0.96);
    }
    @media (max-width: 640px) {
      .slide-content {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .prose {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 font-sans antialiased">

  <!-- Conteneur principal avec padding pour petits écrans -->
  <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- Card principale contenant les slides -->
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden border border-blue-100">
      
      <!-- En-tête de progression (indicateur slide) -->
      <div class="bg-indigo-700 px-5 py-3 flex justify-between items-center text-white">
        <div class="text-sm font-medium">📘 Initiation à Flutter</div>
        <div class="text-sm bg-indigo-800 px-3 py-1 rounded-full" id="slideCounter">Slide 1 / <span id="totalSlides">0</span></div>
      </div>

      <!-- Zone dynamique des slides -->
      <div id="slidesContainer" class="relative min-h-[500px] bg-white p-5 md:p-8">
        <!-- Les slides seront injectées ici via jQuery -->
      </div>

      <!-- Navigation (Précédent / Suivant) avec boutons stylisés -->
      <div class="flex justify-between items-center p-5 border-t border-gray-200 bg-gray-50">
        <button id="prevSlide" class="btn-nav bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-2 px-5 rounded-xl shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1">
          ← Précédent
        </button>
        <div class="text-sm text-gray-500 hidden md:block">
          Navigation par slides | Cours complet
        </div>
        <button id="nextSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl shadow-md transition flex items-center gap-1">
          Suivant →
        </button>
      </div>
    </div>

    <!-- Petit message de bas de page / rappel -->
    <div class="text-center text-xs text-gray-500 mt-6">
      🧩 Support de cours – Installation et configuration Flutter | Inspiré du programme officiel
    </div>
  </div>

  <script>
    // ------------------------------
    // DONNÉES : Leçon 2 (lesson2) extraite du JSON (chap1 – lesson2)
    // Objectifs de la lesson2 : 
    // 0: Installer Flutter SDK et configurer les variables d'environnement
    // 1: Installer Android Studio / VS Code avec les extensions Flutter
    // 2: Configurer les émulateurs (Android et iOS) et vérifier avec flutter doctor
    // ------------------------------
    // On construit le contenu des slides selon le thème: 
    // Slide 1: Titre de la leçon
    // Slide 2: Objectifs pédagogiques
    // Slide 3: Installer Flutter SDK & variables d'environnement
    // Slide 4: Installer Android Studio / VS Code + extensions
    // Slide 5: Configurer émulateurs + flutter doctor (vérification)
    // Slide 6: Petit récapitulatif / astuces (bonnes pratiques)
    
    const lessonTitle = "🛠️ Installation et configuration de l'environnement Flutter";
    const lessonSubtitle = "Maîtriser la mise en place complète du SDK Flutter, des éditeurs et des émulateurs";
    
    // Liste des objectifs (depuis le JSON)
    const objectives = [
      "✅ Installer Flutter SDK et configurer les variables d'environnement (PATH, flutter/bin).",
      "✅ Installer Android Studio / VS Code avec les extensions Flutter & Dart.",
      "✅ Configurer les émulateurs (Android Virtual Device et simulateur iOS) et valider avec flutter doctor."
    ];
    
    // Contenu détaillé des slides (explications simples, accessibles)
    const slidesContent = [
      { // slide 3 : Installer Flutter SDK
        title: "📦 1. Installation du SDK Flutter",
        content: `
          <p class="mb-3"><strong class="text-indigo-700">Étape essentielle :</strong> Flutter est un SDK qui nécessite d’être téléchargé depuis <a href="https://docs.flutter.dev/get-started/install" target="_blank" class="text-blue-600 underline">flutter.dev</a>.</p>
          <ul class="list-disc pl-6 space-y-2">
            <li>Choisissez la version adaptée à votre OS : Windows, macOS ou Linux.</li>
            <li>Extrayez l'archive dans un dossier accessible (ex: <code class="bg-gray-100 px-1 rounded">C:\flutter</code> sur Windows ou <code class="bg-gray-100 px-1 rounded">~/development/flutter</code> sur Mac/Linux).</li>
            <li><strong>Variables d’environnement :</strong> ajoutez le chemin <code class="bg-gray-100 px-1 rounded">flutter/bin</code> au PATH. Cela permet d’utiliser la commande <code>flutter</code> dans le terminal.</li>
            <li>Sur Windows : Modifiez les variables système via "Paramètres systèmes avancés". Sur Mac/Linux : ajoutez <code>export PATH="$PATH:[CHEMIN_FLUTTER]/bin"</code> dans <code>.bashrc</code> ou <code>.zshrc</code>.</li>
            <li>Redémarrez le terminal pour appliquer les changements.</li>
          </ul>
          <div class="mt-5 bg-blue-50 p-3 rounded-xl border-l-4 border-blue-500">
            💡 <span class="font-semibold">Astuce :</span> Pour vérifier que Flutter est bien reconnu, tapez <code>flutter --version</code> dans votre terminal. Le numéro de version doit s'afficher.
          </div>
        `
      },
      { // slide 4 : Android Studio / VS Code
        title: "🧑‍💻 2. Installer un IDE et les extensions Flutter",
        content: `
          <p class="mb-3">Vous pouvez utiliser <strong>Android Studio</strong> (recommandé pour les débutants) ou <strong>Visual Studio Code</strong> (léger et efficace).</p>
          <div class="grid md:grid-cols-2 gap-4 my-4">
            <div class="border rounded-xl p-3 bg-gray-50">
              <h4 class="font-bold text-lg">📱 Android Studio</h4>
              <ul class="list-disc pl-5 text-sm space-y-1 mt-2">
                <li>Téléchargez depuis <a href="https://developer.android.com/studio" class="text-blue-600">developer.android.com/studio</a>.</li>
                <li>Installez et lancez, puis allez dans <strong>Plugins</strong> → recherchez <strong>Flutter</strong> (Dart sera installé automatiquement).</li>
                <li>Redémarrez l’IDE.</li>
              </ul>
            </div>
            <div class="border rounded-xl p-3 bg-gray-50">
              <h4 class="font-bold text-lg">💻 VS Code</h4>
              <ul class="list-disc pl-5 text-sm space-y-1 mt-2">
                <li>Téléchargez VS Code depuis <a href="https://code.visualstudio.com/" class="text-blue-600">code.visualstudio.com</a>.</li>
                <li>Ouvrez l'onglet Extensions (Ctrl+Shift+X) et cherchez <strong>Flutter</strong>. Installez l'extension officielle de Google.</li>
                <li>L'extension Dart sera ajoutée automatiquement.</li>
              </ul>
            </div>
          </div>
          <p>Après installation, vous pouvez créer un nouveau projet via <code>flutter create mon_app</code> et l'ouvrir dans l'IDE.</p>
          <div class="mt-3 text-sm bg-yellow-50 p-2 rounded-lg">⚠️ Sur Android Studio, pensez à accepter les licenses Android SDK (via <code>flutter doctor --android-licenses</code>).</div>
        `
      },
      { // slide 5 : émulateurs et flutter doctor
        title: "📱 3. Configurer les émulateurs et valider avec flutter doctor",
        content: `
          <p class="mb-3">Pour tester vos applications sans téléphone physique, les émulateurs sont indispensables.</p>
          <ul class="list-decimal pl-6 space-y-2">
            <li><strong>Android (AVD) :</strong> Depuis Android Studio, allez dans "More Actions" → "AVD Manager". Créez un virtual device (Pixel 4 par exemple) et choisissez une image système (API 33 ou supérieure). Lancez l'émulateur.</li>
            <li><strong>iOS (uniquement sur Mac) :</strong> Installez Xcode depuis le Mac App Store, puis ouvrez <code>Xcode → Preferences → Components</code> pour télécharger un simulateur. Utilisez <code>open -a Simulator</code> pour lancer.</li>
            <li><strong>Vérification finale :</strong> Dans le terminal, exécutez <code class="bg-gray-100 px-2 py-0.5 rounded">flutter doctor</code>. Cet outil magique analyse votre configuration et vous indique les problèmes éventuels. Tous les éléments doivent avoir un ✓ vert.</li>
          </ul>
          <div class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div class="bg-green-50 p-3 rounded-xl border border-green-200">
              <span class="font-bold">✅ Exemple de sortie réussie :</span>
              <pre class="text-xs mt-1 bg-white p-2 rounded overflow-x-auto">[✓] Flutter (Channel stable)<br>[✓] Android toolchain<br>[✓] VS Code/Android Studio<br>[✓] Connected device</pre>
            </div>
            <div class="bg-orange-50 p-3 rounded-xl border border-orange-200">
              <span class="font-bold">⚠️ Résolution d'erreurs fréquentes :</span>
              <ul class="text-xs list-disc pl-4 mt-1">
                <li>✗ Flutter not in PATH → revoir variables d’environnement.</li>
                <li>✗ Android licenses not accepted → exécutez <code>flutter doctor --android-licenses</code> et acceptez tout.</li>
                <li>✗ No devices -> lancez un émulateur ou branchez un téléphone.</li>
              </ul>
            </div>
          </div>
        `
      },
      { // slide 6 : synthèse / conseils supplémentaires (bonus)
        title: "🎯 Récapitulatif & bonnes pratiques",
        content: `
          <div class="space-y-4">
            <p>Félicitations ! À la fin de cette leçon, vous serez capable de démarrer n'importe quel projet Flutter sur votre machine. Voici une checklist pratique :</p>
            <div class="bg-indigo-50 p-4 rounded-xl">
              <h4 class="font-bold text-indigo-800">📋 Checklist environnement Flutter</h4>
              <ul class="mt-2 grid gap-2">
                <li>✓ SDK Flutter téléchargé et accessible via terminal (<code>flutter doctor</code>)</li>
                <li>✓ Variables d’environnement configurées (PATH)</li>
                <li>✓ IDE prêt (Android Studio ou VS Code) avec plugins Flutter/Dart</li>
                <li>✓ Un émulateur Android ou iOS opérationnel (ou périphérique physique)</li>
                <li>✓ Flutter doctor retourne "No issues found!"</li>
              </ul>
            </div>
            <p class="text-gray-700">Une fois cette étape maîtrisée, vous pourrez exécuter <code>flutter run</code> sur un projet et profiter du <strong class="text-indigo-600">Hot Reload</strong> pour un développement rapide ! 🔥</p>
            <div class="mt-3 flex justify-center">
              <div class="w-full max-w-sm bg-gray-800 text-white text-center py-2 rounded-full text-sm font-mono">
                💻 # flutter create mon_projet && cd mon_projet && flutter run
              </div>
            </div>
          </div>
        `
      }
    ];
    
    // Construction de tous les slides (Slide1: titre, Slide2: objectifs, puis les slides de contenu)
    let allSlides = [];
    
    // SLIDE 1 : titre de la leçon
    allSlides.push(`
      <div class="slide slide-active flex flex-col justify-center min-h-[450px] text-center">
        <div class="space-y-5">
          <div class="inline-block p-3 bg-indigo-100 rounded-full text-4xl mb-2">📱</div>
          <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-blue-600 bg-clip-text text-transparent">${lessonTitle}</h1>
          <p class="text-gray-600 text-lg max-w-lg mx-auto">${lessonSubtitle}</p>
          <div class="pt-6 flex justify-center gap-3 text-sm text-gray-500">
            <span>🎓 Cours complet</span> • <span>⚡ Environnement de développement</span> • <span>📘 Leçon 2/39</span>
          </div>
        </div>
      </div>
    `);
    
    // SLIDE 2 : Objectifs pédagogiques (basés sur les objectifs de la lesson)
    let objectivesHtml = `<div class="slide min-h-[450px] flex flex-col justify-center"><h2 class="text-2xl font-bold text-indigo-800 mb-6 border-l-4 border-indigo-500 pl-4">🎯 Objectifs de la leçon</h2><ul class="space-y-4 text-lg">`;
    objectives.forEach(obj => {
      objectivesHtml += `<li class="flex items-start gap-3"><span class="text-indigo-500 text-xl">✨</span><span class="text-gray-700">${obj}</span></li>`;
    });
    objectivesHtml += `</ul><div class="mt-8 p-4 bg-blue-50 rounded-xl text-blue-800 text-sm">📌 À la fin de cette séance, vous serez capable de configurer entièrement Flutter sur votre poste (Windows, Mac ou Linux).</div></div>`;
    allSlides.push(objectivesHtml);
    
    // SLIDES 3 à 6 : contenu technique détaillé
    slidesContent.forEach(slide => {
      allSlides.push(`
        <div class="slide min-h-[450px] flex flex-col">
          <h2 class="text-2xl font-bold text-indigo-800 mb-4 flex items-center gap-2 border-b pb-2 border-indigo-200">${slide.title}</h2>
          <div class="prose prose-slate max-w-none text-gray-700">
            ${slide.content}
          </div>
        </div>
      `);
    });
    
    // Optionnel: ajouter un dernier slide de félicitations (petit plus)
    allSlides.push(`
      <div class="slide min-h-[450px] flex flex-col justify-center text-center">
        <div class="bg-emerald-50 rounded-2xl p-6 shadow-inner">
          <span class="text-5xl block mb-3">🚀</span>
          <h3 class="text-2xl font-bold text-emerald-700">Environnement prêt !</h3>
          <p class="mt-3 text-gray-600">Vous avez installé Flutter, les IDE et les émulateurs. Lancez <code class="bg-gray-200 px-2 rounded">flutter doctor</code> pour vérifier et c’est parti pour coder !</p>
          <div class="mt-6 text-sm text-gray-500">Prochaine étape : Créer votre première application Flutter (flutter create).</div>
        </div>
      </div>
    `);
    
    let currentIndex = 0;
    let total = allSlides.length;
    
    // Mise à jour de l'affichage des slides
    function renderSlide(index) {
      $('.slide').each(function(i, el) {
        if (i === index) {
          $(el).removeClass('slide-hidden').addClass('slide-active');
        } else {
          $(el).removeClass('slide-active').addClass('slide-hidden');
        }
      });
      // Met à jour le compteur
      $('#slideCounter').html(`Slide ${index+1} / ${total}`);
      // Désactiver boutons si nécessaire
      $('#prevSlide').prop('disabled', index === 0);
      $('#nextSlide').prop('disabled', index === total-1);
    }
    
    // Initialisation : injecter tous les slides dans le container
    function buildSlides() {
      const container = $('#slidesContainer');
      container.empty();
      $.each(allSlides, function(i, slideHtml) {
        // Ajouter les classes de base "slide" et gérer la visibilité
        let $slide = $(slideHtml).addClass('slide');
        if (i !== 0) $slide.addClass('slide-hidden');
        else $slide.addClass('slide-active');
        container.append($slide);
      });
      $('#totalSlides').text(total);
      renderSlide(currentIndex);
    }
    
    // Gestionnaires d'événements
    $('#nextSlide').on('click', function() {
      if (currentIndex < total - 1) {
        currentIndex++;
        renderSlide(currentIndex);
        // Scroll en haut de la slide pour une meilleure UX sur mobile
        $('html, body').animate({ scrollTop: $('#slidesContainer').offset().top - 20 }, 200);
      }
    });
    
    $('#prevSlide').on('click', function() {
      if (currentIndex > 0) {
        currentIndex--;
        renderSlide(currentIndex);
        $('html, body').animate({ scrollTop: $('#slidesContainer').offset().top - 20 }, 200);
      }
    });
    
    // Ajout de la navigation au clavier (flèches gauche/droite)
    $(document).on('keydown', function(e) {
      if (e.key === 'ArrowLeft') {
        $('#prevSlide').click();
      } else if (e.key === 'ArrowRight') {
        $('#nextSlide').click();
      }
    });
    
    // Chargement initial
    $(document).ready(function() {
      buildSlides();
      // Petite animation d'apparition des slides
      $('.slide').css('transition', 'all 0.3s');
    });
  </script>
</body>
</html>
