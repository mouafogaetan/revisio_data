<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Initiation à Flutter",
 "classe": "Développement Web",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Gestion d'état et navigation",
     "points": "8 pts",
     "enonce": "<div style='background-color: #f8fafc; padding: 15px; border-radius: 8px;'><p><strong>Contexte :</strong> Une startup camerounaise développe une application de <strong>gestion de tâches</strong> avec Flutter. L'application doit permettre de gérer une liste de tâches et de naviguer vers une page de détails pour chaque tâche.</p><p>Vous êtes développeur Flutter et devez implémenter la gestion d'état et la navigation.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1. (2 pts)</strong> Dans le contexte du Provider, expliquez la différence entre <code>ChangeNotifierProvider</code> et <code>Consumer</code> et donnez un exemple d'utilisation pour une liste de tâches.</p>",
         "reponse": "<p><strong>ChangeNotifierProvider</strong> est un widget qui fournit une instance de <code>ChangeNotifier</code> à ses descendants. Il permet de rendre un service ou un modèle accessible dans l'arbre des widgets [citation:6].</p><p><strong>Consumer</strong> est un widget qui écoute les changements d'un <code>ChangeNotifier</code> et reconstruit uniquement la partie de l'interface qui en dépend. Exemple :</p><pre>ChangeNotifierProvider(create: (_) => TaskList()),<br>Consumer&lt;TaskList&gt;(builder: (context, taskList, child) {<br>  return ListView.builder(<br>    itemCount: taskList.tasks.length,<br>    itemBuilder: (context, index) => Text(taskList.tasks[index].title),<br>  );<br>})</pre>"
       },
       {
         "question": "<p><strong>2. (2 pts)</strong> Pour la navigation, vous devez passer un objet <code>Task</code> de la liste vers la page de détails. Expliquez deux méthodes pour réaliser ce passage de données.</p>",
         "reponse": "<p><strong>Méthode 1 : Navigation paramétrée</strong> <br>Lors de la navigation, on passe l'objet comme argument à la nouvelle route :</p><pre>Navigator.push(context, MaterialPageRoute(<br>  builder: (context) => TaskDetailPage(task: task),<br>));</pre><p><strong>Méthode 2 : Navigation nommée avec arguments</strong><br>On utilise <code>Navigator.pushNamed</code> avec un argument :</p><pre>Navigator.pushNamed(context, '/taskDetail', arguments: task);<br>// Dans la page destination : final task = ModalRoute.of(context)!.settings.arguments as Task;</pre>"
       },
       {
         "question": "<p><strong>3. (2 pts)</strong> Comparez <code>StatelessWidget</code> et <code>StatefulWidget</code>. Dans quel cas utiliseriez-vous un <code>StatefulWidget</code> pour gérer l'état local de la page de détails d'une tâche ?</p>",
         "reponse": "<p><strong>StatelessWidget</strong> est un widget immuable : une fois construit, il ne peut pas changer. Il est utilisé pour les parties de l'interface qui ne dépendent pas d'un état dynamique.</p><p><strong>StatefulWidget</strong> est un widget qui peut changer au cours du temps. Il maintient un objet <code>State</code> qui peut être mis à jour avec <code>setState()</code>. On utiliserait un <code>StatefulWidget</code> pour la page de détails si elle permet de modifier la tâche (ex : cocher une case, modifier le texte) et que ces modifications ne nécessitent pas de gestion d'état globale.</p>"
       },
       {
         "question": "<p><strong>4. (2 pts)</strong> Avec Riverpod, comment feriez-vous pour partager la liste des tâches entre plusieurs écrans sans avoir à passer l'objet manuellement ? Écrivez la définition d'un provider approprié.</p>",
         "reponse": "<p>Avec Riverpod, on utilise un <code>StateProvider</code> ou un <code>Provider</code> pour partager la liste des tâches :</p><pre>final taskListProvider = StateProvider&lt;List&lt;Task&gt;&gt;((ref) =&gt; []);</pre><p>Pour accéder à la liste dans un widget :</p><pre>final tasks = ref.watch(taskListProvider);</pre><p>Pour modifier la liste :</p><pre>ref.read(taskListProvider.notifier).state = nouvelleListe;</pre><p>Ce provider est accessible depuis n'importe quel écran, à condition d'utiliser <code>ConsumerWidget</code> ou <code>Consumer</code> pour accéder à <code>ref</code>.</p>"
       }
     ]
   },
   {
     "titre": "Persistance des données",
     "points": "6 pts",
     "enonce": "<div style='background-color: #fef2f2; padding: 15px; border-radius: 8px; border-left: 5px solid #dc2626;'><p><strong>Situation :</strong> Vous devez rendre l'application de gestion de tâches persistante. Les tâches doivent être sauvegardées localement sur l'appareil de l'utilisateur.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1. (2 pts)</strong> Expliquez la différence entre <code>SharedPreferences</code> et <code>Hive</code> pour la persistance de données. Lequel choisiriez-vous pour stocker une liste d'objets <code>Task</code> et pourquoi ?</p>",
         "reponse": "<p><strong>SharedPreferences</strong> est une solution simple pour stocker des données clé-valeur de types primitifs (String, int, bool, double, List&lt;String&gt;). Il est limité pour les objets complexes [citation:6].</p><p><strong>Hive</strong> est une base de données NoSQL légère, écrite en Dart pur. Il est plus performant pour les objets personnalisés grâce aux <code>TypeAdapter</code> [citation:6]. Je choisirais <strong>Hive</strong> car il permet de stocker directement des objets <code>Task</code> avec une API simple et rapide.</p>"
       },
       {
         "question": "<p><strong>2. (2 pts)</strong> Écrivez le code Dart pour définir un modèle <code>Task</code> compatible avec Hive (annotations, champs, génération d'adaptateur).</p>",
         "reponse": "<p>Définition du modèle :</p><pre>import 'package:hive/hive.dart';<br><br>@HiveType(typeId: 0)<br>class Task extends HiveObject {<br>  @HiveField(0)<br>  String title;<br><br>  @HiveField(1)<br>  bool isDone;<br><br>  Task({required this.title, this.isDone = false});<br>}</pre><p>Génération de l'adaptateur :</p><pre>flutter pub run build_runner build</pre><p>Enregistrement de l'adaptateur :</p><pre>Hive.registerAdapter(TaskAdapter());</pre>"
       },
       {
         "question": "<p><strong>3. (2 pts)</strong> Décrivez les étapes pour ouvrir une box Hive, y stocker une liste de tâches et la récupérer au démarrage de l'application.</p>",
         "reponse": "<p>Étapes :</p><ol><li><strong>Initialisation :</strong> Dans <code>main()</code>, avant <code>runApp()</code>, appeler <code>Hive.initFlutter()</code> et enregistrer les adaptateurs.</li><li><strong>Ouverture de la box :</strong> Ouvrir la box asynchrone : <code>var box = await Hive.openBox&lt;Task&gt;('tasks');</code></li><li><strong>Stockage :</strong> Pour sauvegarder une liste : <code>box.put('tasks', taskList);</code></li><li><strong>Récupération :</strong> Au démarrage, récupérer les tâches : <code>List&lt;Task&gt;? savedTasks = box.get('tasks');</code></li></ol><p>Si <code>savedTasks</code> est null, initialiser avec une liste vide.</p>"
       }
     ]
   },
   {
     "titre": "Animations et thèmes",
     "points": "6 pts",
     "enonce": "<div style='background-color: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 5px solid #16a34a;'><p>Pour améliorer l'expérience utilisateur, vous devez ajouter des animations et un thème cohérent à l'application.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1. (2 pts)</strong> Expliquez le fonctionnement du widget <code>Hero</code> dans Flutter. Comment l'utiliseriez-vous pour animer la transition d'une image miniature de la liste vers l'image agrandie dans la page de détails ?</p>",
         "reponse": "<p>Le widget <code>Hero</code> permet de créer des animations de partage d'éléments (shared element transitions) entre deux écrans. Il utilise un <strong>tag</strong> unique pour identifier l'élément source et l'élément destination [citation:6].</p><p>Pour l'utiliser :</p><pre>// Dans la liste<br>Hero(<br>  tag: 'task_${task.id}',<br>  child: Image.network(task.imageUrl),<br>)<br><br>// Dans la page de détails<br>Hero(<br>  tag: 'task_${task.id}',<br>  child: Image.network(task.imageUrl, height: 300),<br>)</pre><p>Flutter animera automatiquement le déplacement et le redimensionnement de l'image.</p>"
       },
       {
         "question": "<p><strong>2. (2 pts)</strong> Comment configurer un thème personnalisé pour l'application dans <code>MaterialApp</code> ? Écrivez un exemple de <code>ThemeData</code> avec une couleur primaire et une police personnalisée.</p>",
         "reponse": "<pre>MaterialApp(<br>  theme: ThemeData(<br>    primarySwatch: Colors.blue,<br>    scaffoldBackgroundColor: Colors.white,<br>    appBarTheme: AppBarTheme(<br>      backgroundColor: Colors.blue,<br>      foregroundColor: Colors.white,<br>    ),<br>    textTheme: TextTheme(<br>      bodyLarge: TextStyle(fontFamily: 'Roboto'),<br>      titleLarge: TextStyle(fontFamily: 'Roboto', fontWeight: FontWeight.bold),<br>    ),<br>  ),<br>  home: MyHomePage(),<br>);</pre><p>Les polices doivent être ajoutées dans <code>pubspec.yaml</code> sous la section <code>fonts</code>.</p>"
       },
       {
         "question": "<p><strong>3. (2 pts)</strong> Citez et expliquez deux widgets d'animation implicite fournis par Flutter. Donnez un exemple d'utilisation pour l'un d'eux.</p>",
         "reponse": "<p><strong>AnimatedContainer :</strong> Permet d'animer les changements de propriétés d'un <code>Container</code> (couleur, taille, padding, etc.) en modifiant simplement ses paramètres dans <code>setState()</code>.</p><pre>AnimatedContainer(<br>  duration: Duration(seconds: 1),<br>  width: isExpanded ? 200 : 100,<br>  height: isExpanded ? 200 : 100,<br>  color: isExpanded ? Colors.blue : Colors.red,<br>)</pre><p><strong>AnimatedOpacity :</strong> Anime l'opacité d'un widget, permettant de faire apparaître ou disparaître un élément en fondu.</p><pre>AnimatedOpacity(<br>  duration: Duration(milliseconds: 500),<br>  opacity: isVisible ? 1.0 : 0.0,<br>  child: Text('Hello World'),<br>)</pre>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
