<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à Flutter",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de Cours",
      "points": "4 pts",
      "enonce": "<p>Répondez aux questions suivantes par Vrai ou Faux en justifiant brièvement votre réponse.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) Le package <code>http</code> est utilisé en Flutter pour effectuer des requêtes vers des API REST.</p>",
          "reponse": "<p><strong>Vrai.</strong> Le package <code>http</code> est la bibliothèque standard en Flutter pour effectuer des requêtes HTTP (GET, POST, PUT, DELETE) vers des APIs.</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1 pt) La méthode <code>Navigator.push()</code> permet de revenir à l'écran précédent en retirant l'écran courant de la pile.</p>",
          "reponse": "<p><strong>Faux.</strong> <code>Navigator.push()</code> ajoute un nouvel écran au sommet de la pile. C'est <code>Navigator.pop()</code> qui permet de revenir à l'écran précédent.</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (1 pt) Le <strong>Hot Reload</strong> permet de recharger l'interface sans perdre l'état de l'application.</p>",
          "reponse": "<p><strong>Vrai.</strong> Le Hot Reload est une fonctionnalité clé de Flutter qui recharge le code modifié tout en préservant l'état actuel de l'application, accélérant ainsi le développement [citation:1].</p>"
        },
        {
          "question": "<p><strong>1.4</strong> (1 pt) Un <code>StatelessWidget</code> peut modifier son propre état interne avec <code>setState()</code>.</p>",
          "reponse": "<p><strong>Faux.</strong> Seul un <code>StatefulWidget</code> peut utiliser <code>setState()</code> pour modifier son état. Un <code>StatelessWidget</code> est immuable et ne peut pas changer son état.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse et Complétion de Code",
      "points": "6 pts",
      "enonce": "<p>On considère le code suivant qui implémente un écran de liste de produits avec navigation vers les détails.</p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>class Product {\n  final int id;\n  final String name;\n  final double price;\n\n  Product({required this.id, required this.name, required this.price});\n}\n\nclass ProductListScreen extends StatelessWidget {\n  final List<Product> products = [\n    Product(id: 1, name: \"Téléphone\", price: 250.0),\n    Product(id: 2, name: \"Ordinateur\", price: 800.0),\n    Product(id: 3, name: \"Tablette\", price: 400.0),\n  ];\n\n  @override\n  Widget build(BuildContext context) {\n    return Scaffold(\n      appBar: AppBar(title: Text(\"Produits\")),\n      body: ListView.builder(\n        itemCount: products.length,\n        itemBuilder: (context, index) {\n          final product = products[index];\n          return ListTile(\n            title: Text(product.name),\n            subtitle: Text(\"\\${product.price} FCFA\"),\n            onTap: () {\n              // TODO : Navigation vers l'écran de détails\n            },\n          );\n        },\n      ),\n    );\n  }\n}</pre>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) Quel est le rôle du widget <code>ListView.builder</code> ? Pourquoi est-il préférable à une <code>ListView</code> simple dans ce contexte ?</p>",
          "reponse": "<p><code>ListView.builder</code> crée les éléments de la liste de manière <strong>paresseuse</strong> (lazy) : il ne construit que les éléments visibles à l'écran. Cela permet d'optimiser les performances pour les grandes listes, contrairement à <code>ListView</code> qui construit tous les éléments en une seule fois [citation:1].</p>"
        },
        {
          "question": "<p><strong>2.2</strong> (1 pt) Que signifie le <code>$</code> dans <code>\"\\${product.price} FCFA\"</code> ?</p>",
          "reponse": "<p>Le <code>$</code> en Dart permet l'<strong>interpolation de chaînes</strong>. Il permet d'insérer la valeur d'une variable à l'intérieur d'une chaîne. Les accolades <code>${}</code> sont utilisées pour évaluer une expression.</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (1 pt) Compléter le code dans le <code>onTap</code> pour naviguer vers l'écran de détails <code>ProductDetailScreen</code> en passant le <code>product</code> sélectionné.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>onTap: () {\n  Navigator.push(\n    context,\n    MaterialPageRoute(\n      builder: (context) => ProductDetailScreen(product: product),\n    ),\n  );\n}</pre>"
        },
        {
          "question": "<p><strong>2.4</strong> (1 pt) Écrire le code du widget <code>ProductDetailScreen</code> qui reçoit un <code>Product</code> en paramètre et affiche son nom, son prix, et un bouton \"Retour\" qui ferme l'écran.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>class ProductDetailScreen extends StatelessWidget {\n  final Product product;\n\n  const ProductDetailScreen({required this.product});\n\n  @override\n  Widget build(BuildContext context) {\n    return Scaffold(\n      appBar: AppBar(title: Text(product.name)),\n      body: Padding(\n        padding: const EdgeInsets.all(16.0),\n        child: Column(\n          crossAxisAlignment: CrossAxisAlignment.start,\n          children: [\n            Text(\"Nom : ${product.name}\", style: TextStyle(fontSize: 24)),\n            SizedBox(height: 10),\n            Text(\"Prix : ${product.price} FCFA\", style: TextStyle(fontSize: 18)),\n            Spacer(),\n            ElevatedButton(\n              onPressed: () => Navigator.pop(context),\n              child: Text(\"Retour\"),\n            ),\n          ],\n        ),\n      ),\n    );\n  }\n}</pre>"
        },
        {
          "question": "<p><strong>2.5</strong> (1 pt) Pourquoi utilise-t-on <code>const</code> dans le constructeur du widget <code>ProductDetailScreen</code> ?</p>",
          "reponse": "<p>Le mot-clé <code>const</code> permet de créer un widget <strong>immutable</strong> et d'optimiser les performances en évitant les rebuilds inutiles. Un widget const peut être reconstruit sans recréer une nouvelle instance [citation:1].</p>"
        },
        {
          "question": "<p><strong>2.6</strong> (1 pt) Comment appelle-t-on la fonctionnalité qui permet de recharger instantanément l'application après une modification du code ? Citez deux avantages.</p>",
          "reponse": "<p>Cette fonctionnalité s'appelle le <strong>Hot Reload</strong> [citation:1]. Ses avantages sont :</p><ul><li>Un <strong>gain de temps</strong> considérable dans le développement.</li><li>La <strong>préservation de l'état</strong> de l'application, ce qui évite de repartir du début après chaque modification.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Gestion d'État avec Provider",
      "points": "5 pts",
      "enonce": "<p>Vous développez une application de compteur avec une gestion d'état avancée. Le compteur doit être accessible depuis plusieurs écrans. Vous utilisez le package <code>provider</code>.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) Créer la classe <code>CounterProvider</code> qui étend <code>ChangeNotifier</code> et contient une variable <code>count</code> ainsi que les méthodes <code>increment()</code> et <code>decrement()</code>.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>class CounterProvider extends ChangeNotifier {\n  int _count = 0;\n\n  int get count => _count;\n\n  void increment() {\n    _count++;\n    notifyListeners();\n  }\n\n  void decrement() {\n    _count--;\n    notifyListeners();\n  }\n}</pre>"
        },
        {
          "question": "<p><strong>3.2</strong> (1 pt) Comment enregistrer ce provider dans <code>main.dart</code> avec <code>ChangeNotifierProvider</code> ?</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>void main() {\n  runApp(\n    ChangeNotifierProvider(\n      create: (context) => CounterProvider(),\n      child: MyApp(),\n    ),\n  );\n}</pre>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) Écrire un widget <code>CounterDisplay</code> qui utilise <code>Consumer</code> pour afficher la valeur du compteur.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>class CounterDisplay extends StatelessWidget {\n  @override\n  Widget build(BuildContext context) {\n    return Consumer<CounterProvider>(\n      builder: (context, counter, child) {\n        return Text(\n          'Compteur: ${counter.count}',\n          style: TextStyle(fontSize: 24),\n        );\n      },\n    );\n  }\n}</pre>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) Quelle est la différence entre <code>Consumer</code> et <code>Provider.of</code> ?</p>",
          "reponse": "<ul><li><code>Consumer</code> est un widget qui <strong>reconstruit</strong> uniquement la partie de l'UI qui en dépend. Il est plus performant.</li><li><code>Provider.of</code> récupère l'instance du provider mais peut reconstruire tout le widget parent.</li><li>On privilégie <code>Consumer</code> pour limiter les rebuilds inutiles.</li></ul>"
        },
        {
          "question": "<p><strong>3.5</strong> (1 pt) Écrire un widget <code>CounterButtons</code> qui utilise <code>Provider.of</code> pour accéder au provider et propose deux boutons : \"+\" et \"-\".</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>class CounterButtons extends StatelessWidget {\n  @override\n  Widget build(BuildContext context) {\n    final counter = Provider.of<CounterProvider>(context, listen: false);\n    return Row(\n      mainAxisAlignment: MainAxisAlignment.center,\n      children: [\n        ElevatedButton(\n          onPressed: counter.increment,\n          child: Text('+'),\n        ),\n        SizedBox(width: 20),\n        ElevatedButton(\n          onPressed: counter.decrement,\n          child: Text('-'),\n        ),\n      ],\n    );\n  }\n}</pre>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Requêtes HTTP et JSON",
      "points": "5 pts",
      "enonce": "<p>Vous devez créer une application qui récupère une liste de posts depuis l'API <code>https://jsonplaceholder.typicode.com/posts</code> et les affiche dans une <code>ListView</code>.</p><p>Le modèle <code>Post</code> a les propriétés suivantes : <code>id</code> (int), <code>title</code> (String), <code>body</code> (String).</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) Écrire la classe <code>Post</code> avec un constructeur <code>fromJson</code> pour décoder le JSON.</p>",
          "reponse": "<pre style='background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem;'>class Post {\n  final int id;\n  final String title;\n  final String body;\n\n  Post({required this.id, required this.title, required this.body});\n\n  factory Post.fromJson(Map<String, dynamic> json) {\n    return Post(\n      id: json['id'],\n      title: json['title'],\n      body: json['body'],\n    );\n  }\n}</pre>"
        },
        {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
