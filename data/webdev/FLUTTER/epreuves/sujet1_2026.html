<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
    "matiere": "Initiation à Flutter",
    "classe": "Développement Web",
    "sequence": "Séquence 1",
    "anneeScolaire": "2025-2026",
    "exercices": [
        {
            "titre": "Fondamentaux de Flutter et de Dart",
            "points": "8 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette première partie évalue votre compréhension des concepts fondamentaux de Flutter, de son écosystème et des bases du langage Dart telles que vues en début de formation.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Définissez Flutter en précisant son créateur, son utilité principale et ses trois avantages majeurs par rapport au développement natif.</p>",
                    "reponse": "<p><strong>Réponse :</strong> Flutter est un kit de développement (SDK) créé par Google permettant de construire des applications mobiles, web et desktop à partir d'une seule base de code [citation:1]. Ses trois avantages majeurs sont :</p><ul><li><strong>Hot reload :</strong> Permet de voir les changements en temps réel sans perdre l'état de l'application.</li><li><strong>Performance native :</strong> Les applications compilées en code natif (ARM) offrent des performances proches du natif.</li><li><strong>UI unifiée :</strong> Une seule interface utilisateur pour toutes les plateformes.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Quelle est la différence fondamentale entre un <code>StatelessWidget</code> et un <code>StatefulWidget</code> ? Donnez un exemple d'utilisation pour chacun.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>StatelessWidget :</strong> Un widget dont l'état ne change jamais après sa construction. Il est immuable. <em>Exemple :</em> Un widget d'affichage de texte statique, une icône ou un bouton qui n'a pas besoin de changer d'état.</li><li><strong>StatefulWidget :</strong> Un widget dont l'état peut changer pendant l'exécution de l'application. Il possède une classe d'état associée qui gère les changements avec la méthode <code>setState()</code>. <em>Exemple :</em> Un compteur interactif, un formulaire avec validation, une liste qui se rafraîchit [citation:1].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>3) Expliquez la différence entre <code>final</code> et <code>const</code> en Dart. Donnez un exemple d'utilisation pour chacun.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>final :</strong> Une variable qui ne peut être assignée qu'une seule fois. Sa valeur est déterminée à l'exécution. <em>Exemple :</em> <code>final now = DateTime.now();</code></li><li><strong>const :</strong> Une variable dont la valeur est connue à la compilation et est immuable. Elle est remplacée par sa valeur littérale dans le code compilé. <em>Exemple :</em> <code>const pi = 3.14159;</code> [citation:1]</li></ul>"
                }
            ]
        },
        {
            "titre": "Widgets de Base et Mise en Page",
            "points": "6 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette section évalue votre capacité à utiliser les widgets fondamentaux de Flutter pour créer des interfaces utilisateur simples.</p>",
            "questions": [
                {
                    "question": "<p style='font-weight: bold;'>1) Expliquez le rôle des widgets <code>Row</code>, <code>Column</code> et <code>Container</code> dans la mise en page Flutter. Donnez un exemple de situation où vous utiliseriez chacun d'eux.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Row :</strong> Place ses enfants horizontalement (en ligne). <em>Exemple :</em> Barre de navigation avec des icônes alignées horizontalement.</li><li><strong>Column :</strong> Place ses enfants verticalement (en colonne). <em>Exemple :</em> Une interface de profil avec photo, nom et description empilés verticalement.</li><li><strong>Container :</strong> Un widget qui combine le positionnement, le dimensionnement, le padding, les marges et le décor. <em>Exemple :</em> Une carte avec un fond coloré, des bordures arrondies et un padding intérieur [citation:1].</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>2) Quelle est la propriété à utiliser pour espacer les éléments dans une <code>Row</code> ou une <code>Column</code> ?</p>",
                    "reponse": "<p><strong>Réponse :</strong> La propriété <code>mainAxisAlignment</code> permet d'espacer les enfants le long de l'axe principal (horizontal pour une Row, vertical pour une Column). Ses valeurs courantes incluent <code>MainAxisAlignment.spaceBetween</code>, <code>MainAxisAlignment.spaceAround</code> et <code>MainAxisAlignment.spaceEvenly</code>. On peut également utiliser les widgets <code>Spacer</code> ou <code>SizedBox</code> pour des espacements personnalisés.</p>"
                },
                {
                    "question": "<p style='font-weight: bold;'>3) Écrivez le code d'un widget <code>StatelessWidget</code> simple qui affiche un <code>Text</code> disant \"Bienvenue à Yaoundé\" avec une police rouge sur fond bleu, en utilisant un <code>Container</code>.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 4px; font-size: 0.85em; overflow-x: auto;'>import 'package:flutter/material.dart';<br><br>class WelcomeWidget extends StatelessWidget {<br>  const WelcomeWidget({super.key});<br><br>  @override<br>  Widget build(BuildContext context) {<br>    return Container(<br>      color: Colors.blue,<br>      padding: const EdgeInsets.all(20.0),<br>      child: const Text(<br>        'Bienvenue à Yaoundé',<br>        style: TextStyle(<br>          color: Colors.red,<br>          fontSize: 24.0,<br>          fontWeight: FontWeight.bold,<br>        ),<br>      ),<br>    );<br>  }<br>}</pre>"
                }
            ]
        },
        {
            "titre": "Pratique : Application de Gestion de Tâches",
            "points": "6 pts",
            "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Cette étude de cas vous demande de mobiliser vos connaissances en Flutter pour concevoir une application simple.</p>",
            "questions": [
                {
                    "question": "<p><strong>Étude de Cas :</strong> Vous devez développer une application de gestion de tâches pour un entrepreneur à Douala. L'application doit permettre d'ajouter des tâches, de les marquer comme terminées et de les supprimer.</p><p style='font-weight: bold;'>a) (2 pts) Proposez une architecture simple pour cette application en identifiant :</p><ul><li>Les widgets nécessaires (Stateless ou Stateful ?)</li><li>La structure de données pour les tâches</li></ul>",
                    "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Widgets principaux :</strong> Un <code>StatefulWidget</code> pour la liste des tâches (<code>TaskList</code>) qui gère l'état, et des <code>StatelessWidget</code> pour les éléments individuels (<code>TaskItem</code>). Un <code>TextField</code> pour l'ajout et un <code>ElevatedButton</code> pour valider.</li><li><strong>Structure de données :</strong> Une classe <code>Task</code> avec les propriétés <code>id</code>, <code>title</code> (String), <code>isDone</code> (bool), et une liste <code>List&lt;Task&gt;</code> dans l'état du widget parent.</li></ul>"
                },
                {
                    "question": "<p style='font-weight: bold;'>b) (2 pts) Écrivez le code de la classe <code>_TaskListState</code> qui définit la liste des tâches et la méthode <code>addTask(String title)</code> qui ajoute une nouvelle tâche.</p>",
                    "reponse": "<p><strong>Réponse :</strong></p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 4px; font-size: 0.85em; overflow-x: auto;'>class _TaskListState extends State&lt;TaskList&gt; {<br>  final List&lt;Task&gt; _tasks = [];<br><br>  void addTask(String title) {<br>    setState(() {<br>      _tasks.add(Task(<br>        id: DateTime.now().microsecondsSinceEpoch,<br>        title: title,<br>        isDone: false,<br>      ));<br>    });<br>  }<br><br>  void toggleTaskStatus(int id) {<br>    setState(() {<br>      final index = _tasks.indexWhere((task) => task.id == id);<br>      if (index != -1) {<br>        _tasks[index].isDone = !_tasks[index].isDone;<br>      }<br>    });<br>  }<br><br>  void deleteTask(int id) {<br>    setState(() {<br>      _tasks.removeWhere((task) => task.id == id);<br>    });<br>  }<br><br>  @override<br>  Widget build(BuildContext context) {<br>    // Utiliser _tasks dans un ListView.builder<br>    return ListView.builder(<br>      itemCount: _tasks.length,<br>      itemBuilder: (context, index) {<br>        final task = _tasks[index];<br>        return ListTile(<br>          title: Text(<br>            task.title,<br>            style: TextStyle(<br>              decoration: task.isDone ? TextDecoration.lineThrough : null,<br>            ),<br>          ),<br>          leading: Checkbox(<br>            value: task.isDone,<br>            onChanged: (_) => toggleTaskStatus(task.id),<br>          ),<br>          trailing: IconButton(<br>            icon: const Icon(Icons.delete),<br>            onPressed: () => deleteTask(task.id),<br>          ),<br>        );<br>      },<br>    );<br>  }<br>}</pre>"
                },
                {
                    "question": "<p style='font-weight: bold;'>c) (2 pts) Expliquez comment vous utiliseriez <code>ListView.builder</code> pour afficher la liste des tâches et pourquoi cette approche est préférable pour une application qui peut contenir de nombreuses tâches.</p>",
                    "reponse": "<p><strong>Réponse :</strong> <code>ListView.builder</code> est préférable car il implémente le <strong>lazy loading</strong> : il ne construit que les widgets visibles à l'écran. Pour une application avec de nombreuses tâches, cette approche est plus performante en termes de mémoire et de temps de rendu. [citation:1]</p>"
                }
            ]
        }
    ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
