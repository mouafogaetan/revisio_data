<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation à Flutter",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Programmation Orientée Objet en Dart",
      "points": "6 pts",
      "enonce": "<p>La Programmation Orientée Objet (POO) est un paradigme fondamental en Dart, le langage utilisé par Flutter. Maîtriser les concepts de classes, d'héritage et de polymorphism est essentiel pour structurer des applications robustes.</p>",
      "questions": [
        {
          "question": "<p><strong>1. (1.5 pts)</strong> Qu'est-ce qu'une <strong>classe abstraite</strong> en Dart ? Donnez un exemple de situation où l'utilisation d'une classe abstraite serait appropriée dans une application Flutter.</p>",
          "reponse": "<p><strong>Réponse :</strong> Une classe abstraite est une classe qui ne peut pas être instanciée directement. Elle sert de modèle pour d'autres classes et peut contenir des méthodes abstraites (sans implémentation) et des méthodes concrètes. Les sous-classes doivent implémenter les méthodes abstraites.</p><p><strong>Exemple :</strong> Dans une application de gestion de formes géométriques, on peut avoir une classe abstraite <code>Shape</code> avec une méthode abstraite <code>getArea()</code>. Les classes <code>Circle</code> et <code>Square</code> héritent de <code>Shape</code> et implémentent <code>getArea()</code> avec leurs propres formules.</p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>abstract class Shape {\n  double getArea();\n}\n\nclass Circle extends Shape {\n  final double radius;\n  Circle(this.radius);\n  @override double getArea() => 3.1416 * radius * radius;\n}</pre>"
        },
        {
          "question": "<p><strong>2. (1.5 pts)</strong> Expliquez la différence entre <strong>extends</strong>, <strong>implements</strong> et <strong>with</strong> en Dart. Donnez un exemple concret d'utilisation de <strong>with</strong> (mixin).</p>",
          "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>extends</strong> : Utilisé pour l'<strong>héritage</strong>. La classe enfant hérite de toutes les propriétés et méthodes de la classe parente et peut les surcharger. Une classe ne peut étendre qu'une seule classe.</li><li><strong>implements</strong> : Utilisé pour les <strong>interfaces</strong>. La classe doit implémenter toutes les méthodes de la ou des classes qu'elle implémente. Une classe peut implémenter plusieurs classes.</li><li><strong>with</strong> : Utilisé pour les <strong>mixins</strong>. Permet de réutiliser du code de plusieurs classes sans héritage. Une classe peut utiliser plusieurs mixins.</li></ul><p><strong>Exemple de mixin :</strong></p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>mixin Logger {\n  void log(String message) => print('Log: $message');\n}\n\nclass User with Logger {\n  String name;\n  User(this.name);\n  \n  void save() {\n    log('Sauvegarde de $name');\n  }\n}</pre>"
        },
        {
          "question": "<p><strong>3. (1.5 pts)</strong> Qu'est-ce que le <strong>null safety</strong> en Dart ? Expliquez les opérateurs <strong>??</strong> (if null) et <strong>!</strong> (assertion non-null) avec des exemples.</p>",
          "reponse": "<p><strong>Réponse :</strong> Le <strong>null safety</strong> est une fonctionnalité de Dart qui empêche les erreurs liées aux références nulles. Par défaut, les variables ne peuvent pas être nulles (types non-nullable). On peut les rendre nullable avec <strong>?</strong>.</p><p><strong>Opérateur ?? (if null) :</strong> Fournit une valeur par défaut si la variable est nulle.</p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>String? name;\nString displayName = name ?? 'Invité'; // Si name est null, 'Invité'</pre><p><strong>Opérateur ! (assertion non-null) :</strong> Force le traitement d'une variable nullable comme non-nullable. Attention, lève une exception si la variable est nulle.</p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>String? name;\nprint(name!.length); // Erreur si name est null</pre>"
        },
        {
          "question": "<p><strong>4. (1.5 pts)</strong> Créez une classe <strong>Product</strong> en Dart avec les propriétés <code>id</code> (int), <code>name</code> (String), <code>price</code> (double). Ajoutez un constructeur nommé <code>fromJson</code> qui crée une instance à partir d'un Map JSON. Utilisez <strong>final</strong> pour les propriétés et le <strong>null safety</strong>.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>class Product {\n  final int id;\n  final String name;\n  final double price;\n\n  // Constructeur principal\n  Product({required this.id, required this.name, required this.price});\n\n  // Constructeur nommé fromJson\n  factory Product.fromJson(Map&lt;String, dynamic&gt; json) {\n    return Product(\n      id: json['id'] as int,\n      name: json['name'] as String,\n      price: json['price'] as double,\n    );\n  }\n\n  // Constructeur de redirection\n  Product.free(String name) : this(id: 0, name: name, price: 0.0);\n}</pre>"
        }
      ]
    },
    {
      "titre": "Widgets Fondamentaux et Gestion d'État",
      "points": "6 pts",
      "enonce": "<p>Dans Flutter, tout est widget. La gestion de l'état est cruciale pour créer des applications interactives. Cette partie évalue votre compréhension des widgets et des solutions de gestion d'état.</p>",
      "questions": [
        {
          "question": "<p><strong>5. (1 pt)</strong> Quelle est la différence entre un <strong>StatelessWidget</strong> et un <strong>StatefulWidget</strong> ? Dans quel cas utilise-t-on <strong>setState()</strong> ?</p>",
          "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>StatelessWidget</strong> : Un widget immuable qui n'a pas d'état interne. Sa méthode <code>build()</code> ne s'exécute qu'une fois et il ne se reconstruit pas tout seul.</li><li><strong>StatefulWidget</strong> : Un widget mutable qui peut changer d'état. Il se compose de deux classes : le widget lui-même et une classe <code>State</code> associée.</li></ul><p><strong>setState()</strong> est utilisé dans un <code>StatefulWidget</code> pour notifier le framework que l'état a changé. Le framework appelle alors <code>build()</code> pour reconstruire le widget avec les nouvelles données.</p>"
        },
        {
          "question": "<p><strong>6. (1.5 pts)</strong> Citez <strong>trois</strong> widgets de mise en page (layout) de Flutter et expliquez leur rôle principal. Donnez un exemple d'utilisation pour chacun.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Column</strong> : Dispose ses enfants verticalement (de haut en bas). Utilisé pour créer des interfaces scrollables verticalement.</li><li><strong>Row</strong> : Dispose ses enfants horizontalement (de gauche à droite). Utilisé pour créer des barres d'outils ou des alignements horizontaux.</li><li><strong>Stack</strong> : Superpose ses enfants les uns sur les autres. Utilisé pour placer des widgets par-dessus d'autres (ex: badge sur une icône).</li><li><strong>Container</strong> : Un widget polyvalent qui peut contenir un seul enfant et lui appliquer des marges, des paddings, des bordures, etc.</li><li><strong>Expanded</strong> : Utilisé dans Row ou Column pour qu'un enfant occupe tout l'espace disponible.</li></ul>"
        },
        {
          "question": "<p><strong>7. (1.5 pts)</strong> Décrivez brièvement <strong>Provider</strong> comme solution de gestion d'état. Quels sont les widgets clés de cette bibliothèque et à quoi servent-ils ?</p>",
          "reponse": "<p><strong>Réponse :</strong> Provider est une solution de gestion d'état pour Flutter qui s'appuie sur <code>InheritedWidget</code>. Elle permet de partager des données dans l'arbre des widgets de manière efficace.</p><p><strong>Widgets clés :</strong></p><ul><li><strong>ChangeNotifierProvider</strong> : Fournit une instance de <code>ChangeNotifier</code> à ses descendants.</li><li><strong>Consumer</strong> : S'abonne aux changements d'un <code>ChangeNotifier</code> et reconstruit le widget lorsqu'il y a des modifications.</li><li><strong>Provider.of&lt;T&gt;(context)</strong> : Permet d'accéder à la donnée fournie par un Provider. Écoute les changements.</li><li><strong>MultiProvider</strong> : Combine plusieurs providers pour éviter l'imbrication.</li></ul>"
        },
        {
          "question": "<p><strong>8. (2 pts)</strong> Dans l'architecture <strong>BLoC</strong> (Business Logic Component), on distingue trois concepts clés : <strong>Event</strong>, <strong>State</strong>, <strong>Bloc</strong>. Expliquez le rôle de chacun et décrivez brièvement le flux de données dans cette architecture.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Event</strong> : Représente une action ou une intention de l'utilisateur (ex: <code>LoginEvent</code>, <code>FetchDataEvent</code>). Les Events sont envoyés au Bloc.</li><li><strong>State</strong> : Représente l'état de l'interface à un moment donné (ex: <code>LoadingState</code>, <code>DataLoadedState</code>, <code>ErrorState</code>). Le Bloc émet des States.</li><li><strong>Bloc</strong> : Reçoit les Events, exécute la logique métier (appels API, calculs) et émet un nouveau State en conséquence.</li></ul><p><strong>Flux de données :</strong></p><ol><li>L'UI envoie un <strong>Event</strong> au Bloc (ex: clic sur un bouton).</li><li>Le Bloc transforme l'Event en un <strong>State</strong> (ex: affiche un loader).</li><li>Le Bloc exécute la logique (ex: requête API).</li><li>Le Bloc émet un nouveau <strong>State</strong> (ex: les données chargées).</li><li>L'UI se reconstruit avec le nouveau State.</li></ol><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>BlocProvider(\n  create: (context) => LoginBloc(),\n  child: BlocBuilder&lt;LoginBloc, LoginState&gt;(\n    builder: (context, state) {\n      if (state is LoadingState) return CircularProgressIndicator();\n      // ...\n    },\n  ),\n)</pre>"
        }
      ]
    },
    {
      "titre": "Navigation et Communication avec API",
      "points": "6 pts",
      "enonce": "<p>Les applications Flutter modernes nécessitent une navigation fluide entre les écrans et une communication efficace avec des API distantes pour récupérer des données.</p>",
      "questions": [
        {
          "question": "<p><strong>9. (1.5 pts)</strong> Quelles sont les deux méthodes principales pour naviguer entre les écrans en Flutter ? Expliquez <strong>Navigator.push()</strong> et <strong>Navigator.pushNamed()</strong>.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><ul><li><strong>Navigator.push()</strong> : Navigation <strong>impérative</strong>. On crée une instance du widget de destination et on la pousse dans la pile. Utile pour des cas simples.</li></ul><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>Navigator.push(\n  context,\n  MaterialPageRoute(builder: (context) => DetailScreen(product: product)),\n);</pre><ul><li><strong>Navigator.pushNamed()</strong> : Navigation <strong>déclarative</strong> avec des routes nommées définies dans <code>MaterialApp</code>. Plus maintenable pour les grandes applications.</li></ul><pre style='background-color: #232f3e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem;'>Navigator.pushNamed(\n  context,\n  '/detail',\n  arguments: product,\n);</pre>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
