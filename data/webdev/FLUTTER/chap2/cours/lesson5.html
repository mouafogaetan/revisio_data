<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours Flutter | Leçon 5 : Fonctions et structures de contrôle en Dart</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Style personnalisé pour slides et ajustements mobiles -->
    <style>
        /* transition smooth pour les slides */
        .slide {
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .slide-active {
            display: block;
            animation: fadeSlide 0.4s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* barre de progression */
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* boutons tactiles adaptés */
        button, .nav-btn {
            touch-action: manipulation;
        }
        /* code snippets */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'Courier New', monospace;
        }
        .card-code {
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
        }
        body {
            background: #f1f5f9;
        }
        .slide-container {
            min-height: 70vh;
        }
        /* couleurs douces mais lisibles */
        .bg-soft-primary {
            background-color: #eef2ff;
        }
        .text-primary-deep {
            color: #1e40af;
        }
        .border-primary-light {
            border-color: #93c5fd;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-3 py-4 md:py-6">
        <!-- Header avec progression -->
        <div class="mb-4 flex justify-between items-center">
            <div class="text-xs text-gray-500">📘 Flutter • Initiation Dart</div>
            <div class="bg-white rounded-full h-2 w-32 overflow-hidden shadow-inner">
                <div id="slideProgressBar" class="progress-bar bg-blue-500 h-full w-0 rounded-full"></div>
            </div>
        </div>

        <!-- Zone des slides dynamique -->
        <div id="slidesContainer" class="slide-container relative">
            <!-- Le contenu sera injecté par jQuery -->
        </div>

        <!-- Navigation et indicateurs -->
        <div class="flex justify-between items-center mt-6 gap-3">
            <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2 px-5 rounded-full shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
            <div class="flex space-x-1.5 overflow-x-auto py-1" id="dotsIndicator"></div>
            <button id="nextSlide" class="nav-btn bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
        </div>

        <!-- small note pédagogique -->
        <div class="text-center text-xs text-gray-400 mt-6 border-t pt-4">
            📖 Leçon 5 – Fonctions et conditions/boucles en Dart • Cours interactif
        </div>
    </div>

    <script>
        // Données de la leçon 5 d'après le programme JSON (chap2, lesson5)
        // enrichi avec des explications détaillées, exemples adaptés au Cameroun et langage simple.
        const lessonData = {
            titre: "Fonctions et structures de contrôle en Dart",
            objectifs: [
                "🎯 Définir des fonctions avec paramètres (positionnels, nommés, optionnels)",
                "🎯 Utiliser les structures conditionnelles : if/else et switch",
                "🎯 Maîtriser les boucles : for, while, do-while",
                "🎯 Comprendre les fonctions fléchées (=>) et les fonctions anonymes"
            ],
            slides: [
                {
                    type: "title",
                    contenu: {
                        titre: "Fonctions et structures de contrôle en Dart",
                        sousTitre: "Leçon 5 – module Dart pour Flutter",
                        icone: "⚙️",
                        description: "Apprenez à organiser votre code et à contrôler le flux d'exécution comme un pro."
                    }
                },
                {
                    type: "objectifs",
                    contenu: {
                        titre: "🎓 Objectifs pédagogiques",
                        liste: [
                            "Définir des fonctions avec différents types de paramètres (positionnels, nommés, optionnels)",
                            "Écrire des conditions if/else et switch pour prendre des décisions",
                            "Utiliser les boucles for, while et do-while pour répéter des actions",
                            "Créer des fonctions fléchées (=>) et des fonctions anonymes (callbacks)"
                        ]
                    }
                },
                {
                    type: "content",
                    contenu: {
                        titre: "1. Les fonctions en Dart - Cœur du code réutilisable",
                        explication: "Une fonction est un bloc d'instructions qui réalise une tâche précise. En Dart, tout est objet, mais les fonctions sont vos meilleures alliées pour éviter la répétition.",
                        exemples: [
                            {
                                titre: "Fonction simple sans paramètre",
                                code: "void direBonjour() {\n  print('Bonjour à toute la classe !');\n}",
                                explication: "void signifie que la fonction ne retourne rien."
                            },
                            {
                                titre: "Paramètres positionnels (obligatoires)",
                                code: "void saluer(String nom, String ville) {\n  print('$nom de $ville, bienvenue en cours de Flutter');\n}\n\n// Appel : saluer('Mohamed', 'Douala');",
                                explication: "Les paramètres sont obligatoires et dans l'ordre défini."
                            }
                        ]
                    }
                },
                {
                    type: "content",
                    contenu: {
                        titre: "2. Paramètres nommés & optionnels",
                        explication: "Dart permet de rendre vos fonctions plus flexibles avec des paramètres nommés (entre {}) ou optionnels (entre [])",
                        exemples: [
                            {
                                titre: "Paramètres nommés (avec required ou optionnels)",
                                code: "void afficherInfos({required String nom, int age = 18, String? ville}) {\n  print('$nom, $age ans, ville: ${ville ?? 'non précisée'}');\n}\n\n// Appel : afficherInfos(nom: 'Aicha', age: 20, ville: 'Yaoundé');",
                                explication: "required → obligatoire, le reste est optionnel avec valeur par défaut possible."
                            },
                            {
                                titre: "Paramètres optionnels positionnels [ ]",
                                code: "void afficherNote(String eleve, [int note = 0, String? appreciation]) {\n  print('$eleve a eu $note/20 ${appreciation ?? ''}');\n}\n\n// Appel: afficherNote('Kevin', 15, 'Très bien');",
                                explication: "Les paramètres entre crochets peuvent être omis. Le dernier est nullable."
                            }
                        ]
                    }
                },
                {
                    type: "content",
                    contenu: {
                        titre: "3. Structures conditionnelles : if/else et switch",
                        explication: "Elles permettent d'exécuter du code selon certaines conditions. Pratique pour répondre à des cas de figure.",
                        exemples: [
                            {
                                titre: "if / else if / else",
                                code: "int note = 14;\nif (note >= 16) {\n  print('Excellent !');\n} else if (note >= 12) {\n  print('Assez bien');\n} else {\n  print('Peut mieux faire');\n}",
                                explication: "Le programme test chaque condition dans l'ordre."
                            },
                            {
                                titre: "Switch (pour multiples valeurs égales)",
                                code: "String jour = 'Lundi';\nswitch (jour) {\n  case 'Samedi':\n  case 'Dimanche':\n    print('Week-end ! 🎉');\n    break;\n  default:\n    print('Jour de cours ou travail');\n}",
                                explication: "Très lisible quand on compare une variable à beaucoup de valeurs fixes."
                            }
                        ]
                    }
                },
                {
                    type: "content",
                    contenu: {
                        titre: "4. Boucles : for, while, do-while",
                        explication: "Les boucles répètent un bloc tant qu'une condition est vraie. Incontournable pour traiter des listes ou répéter des actions.",
                        exemples: [
                            {
                                titre: "Boucle for (classique)",
                                code: "for (int i = 1; i <= 5; i++) {\n  print('Tour numéro $i');\n}\n// Résultat: affiche 1 à 5",
                                explication: "Initialisation, condition, incrémentation."
                            },
                            {
                                titre: "Boucle while",
                                code: "int essai = 0;\nwhile (essai < 3) {\n  print('Tentative ${essai+1}');\n  essai++;\n}",
                                explication: "Vérifie la condition avant d'exécuter."
                            },
                            {
                                titre: "Boucle do-while",
                                code: "int x = 0;\ndo {\n  print('Executé au moins une fois: $x');\n  x++;\n} while (x < 2);",
                                explication: "Exécute le bloc d'abord, puis vérifie la condition."
                            }
                        ]
                    }
                },
                {
                    type: "content",
                    contenu: {
                        titre: "5. Fonctions fléchées (=>) et fonctions anonymes",
                        explication: "Flèche pour les fonctions simples à une seule expression. Les fonctions anonymes sont utiles pour les callbacks (ex: gestion de clic).",
                        exemples: [
                            {
                                titre: "Fonction fléchée",
                                code: "int addition(int a, int b) => a + b;\n\n// Équivalent à:\nint additionLongue(int a, int b) {\n  return a + b;\n}",
                                explication: "Idéal pour les expressions courtes et élégantes."
                            },
                            {
                                titre: "Fonction anonyme (lambda)",
                                code: "var liste = ['Paul', 'Claire', 'Joseph'];\nliste.forEach((nom) {\n  print('Étudiant: $nom');\n});\n\n// ou encore plus court:  liste.forEach((nom) => print(nom));",
                                explication: "On passe une fonction sans nom directement dans un paramètre."
                            }
                        ]
                    }
                },
                {
                    type: "content",
                    contenu: {
                        titre: "6. Exemple concret : Note d’élève avec fonctions et condition",
                        explication: "Mettons en pratique tout ce que nous venons d'apprendre dans un petit programme qui simule l'appréciation d'un élève.",
                        exemples: [
                            {
                                titre: "Mini application console Dart",
                                code: "String evaluerEleve(String nom, int note, {String? classe}) {\n  String appreciation;\n  if (note >= 16) appreciation = 'Excellent';\n  else if (note >= 12) appreciation = 'Bien';\n  else if (note >= 10) appreciation = 'Passable';\n  else appreciation = 'Insuffisant';\n  \n  return '$nom (${classe ?? 'Non spécifiée'}) a $note/20 → $appreciation';\n}\n\nvoid main() {\n  print(evaluerEleve('Fatima', 18, classe: 'Terminale'));\n  print(evaluerEleve('Ibrahim', 9));\n}",
                                explication: "Ce code montre fonction avec param nommé optionnel, condition if/else et retour string."
                            }
                        ]
                    }
                },
                {
                    type: "quiz",
                    contenu: {
                        titre: "🧠 Vérifions votre compréhension",
                        questions: [
                            {
                                question: "Quelle est la différence entre paramètre positionnel et paramètre nommé ?",
                                reponse: "Le paramètre positionnel est défini par son ordre, obligatoire. Le paramètre nommé est identifié par son nom lors de l'appel, rendant le code plus clair et optionnel sauf si marqué 'required'."
                            },
                            {
                                question: "Quand utiliser une boucle 'while' plutôt qu'une boucle 'for' ?",
                                reponse: "Quand on ne connaît pas le nombre d'itérations à l'avance (ex: attendre une condition utilisateur). 'for' est plus adapté pour un nombre fixe d'itérations."
                            },
                            {
                                question: "Que fait une fonction fléchée (=>) ?",
                                reponse: "Elle permet de retourner directement le résultat d'une seule expression, sans accolades ni 'return' explicite. Exemple: int carre(int x) => x * x;"
                            }
                        ]
                    }
                },
                {
                    type: "conclusion",
                    contenu: {
                        titre: "✨ Récapitulons la leçon 5",
                        resume: [
                            "✅ Les fonctions rendent le code modulaire et réutilisable (paramètres nommés, positionnels, optionnels).",
                            "✅ Condition if/else ou switch aident à créer des branches logiques.",
                            "✅ Les boucles for, while, do-while répètent le code efficacement.",
                            "✅ Fonctions fléchées et anonymes rendent le code plus expressif.",
                            "💪 Entraînez-vous sur DartPad avec des exemples liés à la gestion d'élèves, de notes, de listes d’inscriptions."
                        ]
                    }
                }
            ]
        };

        // Variables globales
        let currentIndex = 0;
        let totalSlides = 0;

        // Construction des slides
        function buildSlides() {
            const slidesArray = [];
            // slide titre
            slidesArray.push(renderTitleSlide(lessonData.slides[0].contenu));
            // slide objectifs
            slidesArray.push(renderObjectifsSlide(lessonData.slides[1].contenu));
            // les slides de contenu (type content)
            for(let i = 2; i < lessonData.slides.length; i++) {
                const slide = lessonData.slides[i];
                if(slide.type === "content") {
                    slidesArray.push(renderContentSlide(slide.contenu));
                } else if(slide.type === "quiz") {
                    slidesArray.push(renderQuizSlide(slide.contenu));
                } else if(slide.type === "conclusion") {
                    slidesArray.push(renderConclusionSlide(slide.contenu));
                }
            }
            return slidesArray;
        }

        function renderTitleSlide(data) {
            return `
                <div class="slide bg-white rounded-2xl shadow-xl overflow-hidden p-6 md:p-8 text-center">
                    <div class="text-6xl mb-4">${data.icone || '📱'}</div>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800">${data.titre}</h1>
                    <p class="text-blue-600 font-medium mt-2">${data.sousTitre || ''}</p>
                    <div class="w-20 h-1 bg-blue-500 mx-auto my-5 rounded-full"></div>
                    <p class="text-gray-600 text-lg">${data.description || 'Bienvenue dans cette leçon interactive !'}</p>
                    <div class="mt-8 text-sm text-gray-400">⬅️ Utilisez les boutons pour naviguer</div>
                </div>
            `;
        }

        function renderObjectifsSlide(data) {
            let items = '';
            data.liste.forEach(item => {
                items += `<li class="flex items-start gap-3 mb-3 text-gray-700"><span class="text-blue-500 text-xl">✔️</span> <span>${item}</span></li>`;
            });
            return `
                <div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8">
                    <h2 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-500 pl-3 mb-5">${data.titre}</h2>
                    <ul class="space-y-2">${items}</ul>
                    <div class="mt-6 bg-blue-50 p-4 rounded-xl text-sm text-blue-800">🎯 Objectif final : À la fin de cette leçon, vous saurez structurer vos programmes Dart avec confiance.</div>
                </div>
            `;
        }

        function renderContentSlide(data) {
            let exemplesHtml = '';
            if(data.exemples) {
                data.exemples.forEach(ex => {
                    exemplesHtml += `
                        <div class="mb-6 border border-gray-200 rounded-xl overflow-hidden bg-gray-50">
                            <div class="bg-gray-100 px-4 py-2 font-semibold text-gray-700">${ex.titre}</div>
                            <div class="p-4">
                                <pre><code>${escapeHtml(ex.code)}</code></pre>
                                <p class="text-sm text-gray-600 mt-2 flex items-start gap-1"><span class="text-blue-500">💡</span> ${ex.explication}</p>
                            </div>
                        </div>
                    `;
                });
            }
            return `
                <div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8">
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-2">📘 ${data.titre}</h2>
                    <p class="text-gray-600 my-3">${data.explication}</p>
                    ${exemplesHtml}
                    ${data.astuce ? `<div class="mt-4 bg-yellow-50 p-3 rounded-lg text-yellow-800 text-sm">🔎 ${data.astuce}</div>` : ''}
                </div>
            `;
        }

        function renderQuizSlide(data) {
            let qHtml = '';
            data.questions.forEach((q, idx) => {
                qHtml += `
                    <div class="mb-5 pb-3 border-b border-gray-100">
                        <p class="font-semibold text-gray-800">❓ ${q.question}</p>
                        <div class="mt-2 bg-gray-50 p-3 rounded-lg text-gray-700 text-sm">
                            <span class="font-medium text-green-700">📌 Réponse :</span> ${q.reponse}
                        </div>
                    </div>
                `;
            });
            return `
                <div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.titre}</h2>
                    ${qHtml}
                    <div class="mt-4 text-sm text-gray-500 italic">N'hésitez pas à relire les exemples pour bien comprendre !</div>
                </div>
            `;
        }

        function renderConclusionSlide(data) {
            let points = '';
            data.resume.forEach(p => {
                points += `<li class="flex gap-2 mb-2"><span class="text-blue-500">🎯</span> ${p}</li>`;
            });
            return `
                <div class="slide bg-gradient-to-br from-white to-blue-50 rounded-2xl shadow-xl p-6 md:p-8">
                    <h2 class="text-2xl font-bold text-gray-800">${data.titre}</h2>
                    <ul class="mt-4 space-y-2">${points}</ul>
                    <div class="mt-8 p-3 bg-blue-100 rounded-xl text-center">
                        <p class="font-mono text-sm">🚀 Prochaine leçon : Les classes et la POO en Dart. Continuez comme ça !</p>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Initialisation et affichage du slide
        let slidesHtmlArray = [];
        function initSlides() {
            slidesHtmlArray = buildSlides();
            totalSlides = slidesHtmlArray.length;
            renderCurrentSlide();
            updateDots();
            updateProgress();
            bindEvents();
        }

        function renderCurrentSlide() {
            if(slidesHtmlArray.length === 0) return;
            $('#slidesContainer').html(slidesHtmlArray[currentIndex]);
            // si besoin réappliquer mathjax pour d'éventuelles formules (ici pas nécessaire mais reste générique)
            if(window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function updateDots() {
            let dots = '';
            for(let i=0; i<totalSlides; i++) {
                const activeClass = (i === currentIndex) ? 'bg-blue-600 w-8' : 'bg-gray-300 w-2';
                dots += `<button class="dot-indicator h-2 rounded-full transition-all ${activeClass} mx-1" data-index="${i}"></button>`;
            }
            $('#dotsIndicator').html(dots);
            // click sur les dots
            $('.dot-indicator').on('click', function() {
                let idx = $(this).data('index');
                if(idx !== undefined && idx >=0 && idx < totalSlides) {
                    currentIndex = idx;
                    renderCurrentSlide();
                    updateDots();
                    updateProgress();
                }
            });
        }

        function updateProgress() {
            let percent = ((currentIndex + 1) / totalSlides) * 100;
            $('#slideProgressBar').css('width', percent + '%');
        }

        function bindEvents() {
            $('#prevSlide').off('click').on('click', function() {
                if(currentIndex > 0) {
                    currentIndex--;
                    renderCurrentSlide();
                    updateDots();
                    updateProgress();
                }
            });
            $('#nextSlide').off('click').on('click', function() {
                if(currentIndex < totalSlides - 1) {
                    currentIndex++;
                    renderCurrentSlide();
                    updateDots();
                    updateProgress();
                }
            });
            // Gestion clavier pour accessibilité
            $(document).off('keydown').on('keydown', function(e) {
                if(e.key === 'ArrowLeft') {
                    if(currentIndex > 0) {
                        currentIndex--;
                        renderCurrentSlide();
                        updateDots();
                        updateProgress();
                    }
                } else if(e.key === 'ArrowRight') {
                    if(currentIndex < totalSlides - 1) {
                        currentIndex++;
                        renderCurrentSlide();
                        updateDots();
                        updateProgress();
                    }
                }
            });
        }

        // Démarrer l'application
        $(document).ready(function() {
            initSlides();
        });
    </script>
</body>
</html>
