<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au TypeScript",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Interfaces et Types Alias",
      "points": "3 pts",
      "enonce": "<p style='font-size: 1.1em;'>Cet exercice porte sur la compréhension des structures de données complexes en TypeScript, vues dans le chapitre 4. Répondez aux questions suivantes.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) Quelle est la principale différence entre une <strong>interface</strong> et un <strong>type alias</strong> en TypeScript ? Donnez un cas d'usage pour chacun.</p>",
          "reponse": "<p>La principale différence est que les interfaces peuvent être <strong>étendues</strong> et bénéficient du <strong>declaration merging</strong> (fusion de déclarations), tandis que les type aliases sont plus polyvalents et peuvent définir des unions, des tuples, ou des types primitifs [citation:3][citation:4].</p><p><strong>Cas d'usage :</strong></p><ul><li><strong>Interface</strong> : pour définir la forme d'un objet ou d'une classe, par exemple <span style='font-family: monospace;'>interface Utilisateur { nom: string; age: number; }</span></li><li><strong>Type Alias</strong> : pour créer une union, par exemple <span style='font-family: monospace;'>type Status = 'actif' | 'inactif'</span></li></ul>"
        },
        {
          "question": "<p><strong>1.2</strong> (1 pt) Déclarez une <strong>interface</strong> nommée <span style='font-family: monospace;'>Voiture</span> avec les propriétés suivantes :</p><ul><li><span style='font-family: monospace;'>marque</span> : une chaîne de caractères</li><li><span style='font-family: monospace;'>modele</span> : une chaîne de caractères</li><li><span style='font-family: monospace;'>annee</span> : un nombre</li><li><span style='font-family: monospace;'>couleur</span> : une chaîne de caractères (optionnelle)</li><li><span style='font-family: monospace;'>prix</span> : un nombre (lecture seule)</li></ul>",
          "reponse": "<p>Voici la déclaration de l'interface demandée :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>interface Voiture {\n  marque: string;\n  modele: string;\n  annee: number;\n  couleur?: string; // Propriété optionnelle\n  readonly prix: number; // Propriété en lecture seule\n}</pre>"
        },
        {
          "question": "<p><strong>1.3</strong> (1 pt) En utilisant la technique de l'<strong>extension</strong> (<span style='font-family: monospace;'>extends</span>), créez une interface <span style='font-family: monospace;'>VoitureElectrique</span> qui hérite de <span style='font-family: monospace;'>Voiture</span> et ajoute une propriété <span style='font-family: monospace;'>autonomie</span> de type nombre.</p>",
          "reponse": "<p>L'extension de l'interface se fait comme suit :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>interface VoitureElectrique extends Voiture {\n  autonomie: number; // en kilomètres\n}</pre><p>Cette nouvelle interface hérite de toutes les propriétés de <span style='font-family: monospace;'>Voiture</span> et ajoute <span style='font-family: monospace;'>autonomie</span> [citation:3].</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les Génériques",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1em;'>Les génériques permettent de créer des composants réutilisables. C'est un concept clé du chapitre 6.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) Expliquez en quelques phrases l'utilité des <strong>génériques</strong> en TypeScript. Quel problème résolvent-ils ?</p>",
          "reponse": "<p>Les génériques permettent de créer des composants (fonctions, classes, interfaces) qui fonctionnent avec <strong>n'importe quel type</strong> tout en conservant la sécurité du typage. Ils résolvent le problème de la redondance de code : au lieu d'écrire une fonction pour chaque type (nombre, chaîne, etc.), on écrit une seule fonction générique qui s'adapte au type passé en paramètre.</p>"
        },
        {
          "question": "<p><strong>2.2</strong> (1.5 pt) Écrivez une <strong>fonction générique</strong> nommée <span style='font-family: monospace;'>identite</span> qui prend un paramètre et retourne la même valeur. Utilisez la syntaxe <span style='font-family: monospace;'>&lt;T&gt;</span>. Ensuite, donnez un exemple d'appel avec un nombre et un exemple avec une chaîne de caractères.</p>",
          "reponse": "<p>Voici la fonction générique demandée :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>function identite&lt;T&gt;(valeur: T): T {\n  return valeur;\n}\n\n// Exemple d'appel avec un nombre\nconst nombre = identite&lt;number&gt;(42); // ou identite(42) avec inférence\n\n// Exemple d'appel avec une chaîne\nconst texte = identite&lt;string&gt;('Bonjour'); // ou identite('Bonjour')</pre><p>TypeScript peut souvent inférer le type générique automatiquement [citation:3].</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (1.5 pt) Créez une <strong>classe générique</strong> <span style='font-family: monospace;'>Pile&lt;T&gt;</span> avec :</p><ul><li>Un tableau privé pour stocker les éléments</li><li>Une méthode <span style='font-family: monospace;'>empiler(element: T): void</span></li><li>Une méthode <span style='font-family: monospace;'>depiler(): T | undefined</span></li></ul>",
          "reponse": "<p>Voici la classe générique Pile :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>class Pile&lt;T&gt; {\n  private elements: T[] = [];\n\n  empiler(element: T): void {\n    this.elements.push(element);\n  }\n\n  depiler(): T | undefined {\n    return this.elements.pop();\n  }\n}\n\n// Exemple d'utilisation\nconst pileNombres = new Pile&lt;number&gt;();\npileNombres.empiler(1);\npileNombres.empiler(2);\nconst dernier = pileNombres.depiler(); // 2</pre>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Programmation Orientée Objet",
      "points": "5 pts",
      "enonce": "<p style='font-size: 1.1em;'>Cet exercice porte sur la programmation orientée objet avec TypeScript, abordée dans le chapitre 5.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) Déclarez une <strong>classe abstraite</strong> <span style='font-family: monospace;'>Animal</span> avec :</p><ul><li>Une propriété <span style='font-family: monospace;'>nom</span> (string) rendue publique via le constructeur</li><li>Une méthode abstraite <span style='font-family: monospace;'>faireDuBruit()</span></li></ul>",
          "reponse": "<p>Voici la classe abstraite demandée :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>abstract class Animal {\n  constructor(public nom: string) {}\n\n  abstract faireDuBruit(): void;\n}</pre>"
        },
        {
          "question": "<p><strong>3.2</strong> (2 pts) Créez deux classes <span style='font-family: monospace;'>Chien</span> et <span style='font-family: monospace;'>Chat</span> qui <strong>héritent</strong> de <span style='font-family: monospace;'>Animal</span> et implémentent la méthode <span style='font-family: monospace;'>faireDuBruit()</span>. Utilisez <span style='font-family: monospace;'>super()</span> dans le constructeur.</p>",
          "reponse": "<p>Voici les classes filles :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>class Chien extends Animal {\n  constructor(nom: string) {\n    super(nom);\n  }\n\n  faireDuBruit(): void {\n    console.log(`${this.nom} dit : Ouaf !`);\n  }\n}\n\nclass Chat extends Animal {\n  constructor(nom: string) {\n    super(nom);\n  }\n\n  faireDuBruit(): void {\n    console.log(`${this.nom} dit : Miaou !`);\n  }\n}</pre>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) Expliquez la différence entre <span style='font-family: monospace;'>public</span>, <span style='font-family: monospace;'>private</span> et <span style='font-family: monospace;'>protected</span> en TypeScript.</p>",
          "reponse": "<ul><li><strong>public</strong> : accessible depuis n'importe où (par défaut).</li><li><strong>private</strong> : accessible uniquement à l'intérieur de la classe où elle est déclarée.</li><li><strong>protected</strong> : accessible à l'intérieur de la classe et dans les classes filles (par héritage).</li></ul>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) Qu'est-ce qu'une <strong>classe abstraite</strong> et en quoi est-elle différente d'une <strong>interface</strong> ?</p>",
          "reponse": "<p>Une <strong>classe abstraite</strong> peut contenir à la fois des méthodes avec implémentation et des méthodes abstraites (sans implémentation). Elle ne peut pas être instanciée directement. Une <strong>interface</strong>, en revanche, ne contient que des signatures de méthodes et de propriétés, sans aucune implémentation [citation:3]. Les classes abstraites sont utiles pour partager du code commun, tandis que les interfaces sont des contrats purs.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Types Utilitaires",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1em;'>Les types utilitaires du chapitre 7 permettent de transformer des types existants. Manipulez-les avec soin.</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) À partir de l'interface suivante :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>interface Utilisateur {\n  id: number;\n  nom: string;\n  email: string;\n  motDePasse: string;\n}</pre><p>Utilisez le type utilitaire <span style='font-family: monospace;'>Omit</span> pour créer un type <span style='font-family: monospace;'>UtilisateurPublic</span> qui exclut <span style='font-family: monospace;'>motDePasse</span>.</p>",
          "reponse": "<p>Voici comment utiliser <span style='font-family: monospace;'>Omit</span> :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>type UtilisateurPublic = Omit&lt;Utilisateur, 'motDePasse'&gt;;\n\n// UtilisateurPublic contient uniquement : id, nom, email</pre>"
        },
        {
          "question": "<p><strong>4.2</strong> (1 pt) Avec la même interface, utilisez <span style='font-family: monospace;'>Pick</span> pour créer un type <span style='font-family: monospace;'>UtilisateurSimplifie</span> qui ne contient que <span style='font-family: monospace;'>id</span> et <span style='font-family: monospace;'>nom</span>.</p>",
          "reponse": "<p>Avec <span style='font-family: monospace;'>Pick</span> :</p><pre style='background: #f0f4f8; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace;'>type UtilisateurSimplifie = Pick&lt;Utilisateur, 'id' | 'nom'&gt;;</pre>"
        },
        {
          "question": "<p><strong>4.3</strong> (1 pt) Utilisez <span style='font-family: monospace;'>Partial</span> pour créer un type <span style='font-family: monospace;'>UtilisateurPartiel</span> où toutes les propriétés de <span style='font-family: monospace;'>Utilisateur</span> deviennent optionnelles.</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
