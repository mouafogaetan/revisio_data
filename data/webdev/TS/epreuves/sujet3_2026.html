<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au TypeScript",
  "classe": "Développement Web",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les Génériques en Action (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #f5f7fa; border-radius: 10px; padding: 15px;'>Cet exercice évalue votre compréhension des génériques et des types utilitaires. Les questions peuvent être traitées dans l'ordre de votre choix.</div>",
      "questions": [
        {
          "question": "<div style='background: #e3f2fd; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #0d47a1;'><strong>1.1 (2 pts)</strong></p></div><p>Définissez une fonction générique <code>identite</code> qui prend un paramètre <code>valeur</code> de type <code>T</code> et retourne la même valeur. Utilisez un paramètre de type générique.</p>",
          "reponse": "<pre style='background: #1a237e; color: #ffcc80; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>function identite&lt;T&gt;(valeur: T): T {\n    return valeur;\n}</code></pre>"
        },
        {
          "question": "<div style='background: #e8f5e9; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #1b5e20;'><strong>1.2 (2 pts)</strong></p></div><p>Écrivez une fonction générique <code>fusionner</code> qui prend deux tableaux du même type et retourne un tableau fusionné.</p>",
          "reponse": "<pre style='background: #1b5e20; color: #a5d6a7; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>function fusionner&lt;T&gt;(tab1: T[], tab2: T[]): T[] {\n    return [...tab1, ...tab2];\n}</code></pre>"
        },
        {
          "question": "<div style='background: #fff3e0; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #e65100;'><strong>1.3 (2 pts)</strong></p></div><p>Qu'est-ce qu'un type utilitaire ? Citez deux types utilitaires et expliquez brièvement leur rôle.</p>",
          "reponse": "<p>Un type utilitaire est un type prédéfini par TypeScript qui permet de transformer des types existants [citation:4][citation:7].</p><p><strong>Exemples :</strong></p><ul><li><code>Partial&lt;T&gt;</code> : rend toutes les propriétés de T optionnelles.</li><li><code>Readonly&lt;T&gt;</code> : rend toutes les propriétés de T en lecture seule.</li></ul><p>Ces outils facilitent la manipulation des types sans avoir à les redéfinir manuellement.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Types Conditionnels et Mapped Types (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #f5f7fa; border-radius: 10px; padding: 15px;'>Cet exercice porte sur les types conditionnels et les mapped types.</div>",
      "questions": [
        {
          "question": "<div style='background: #e3f2fd; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #0d47a1;'><strong>2.1 (2 pts)</strong></p></div><p>Expliquez la syntaxe d'un type conditionnel en TypeScript en utilisant l'exemple suivant : <code>T extends string ? string[] : number[]</code>.</p>",
          "reponse": "<p>Un type conditionnel utilise la syntaxe <code>T extends U ? X : Y</code> [citation:7]. Il fonctionne comme un opérateur ternaire :</p><ul><li>Si le type <code>T</code> est assignable à <code>U</code>, alors le résultat est <code>X</code>.</li><li>Sinon, le résultat est <code>Y</code>.</li></ul><p><strong>Exemple :</strong> <code>T extends string ? string[] : number[]</code> retournera <code>string[]</code> si <code>T</code> est une chaîne de caractères, sinon <code>number[]</code>.</p>"
        },
        {
          "question": "<div style='background: #e8f5e9; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #1b5e20;'><strong>2.2 (2 pts)</strong></p></div><p>Définissez un mapped type <code>RendreReadonly&lt;T&gt;</code> qui rend toutes les propriétés de <code>T</code> en lecture seule.</p>",
          "reponse": "<pre style='background: #1b5e20; color: #a5d6a7; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>type RendreReadonly&lt;T&gt; = {\n    readonly [P in keyof T]: T[P];\n};</code></pre><p>Ce mapped type parcourt toutes les propriétés de <code>T</code> et leur ajoute le modificateur <code>readonly</code> [citation:10].</p>"
        },
        {
          "question": "<div style='background: #fff3e0; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #e65100;'><strong>2.3 (2 pts)</strong></p></div><p>Expliquez le rôle du mot-clé <code>infer</code> dans les types conditionnels. Donnez un exemple avec <code>ReturnType&lt;T&gt;</code>.</p>",
          "reponse": "<p><code>infer</code> permet d'inférer un type dans une condition [citation:7]. Il est utilisé dans les types conditionnels pour capturer un type inféré.</p><p><strong>Exemple avec ReturnType :</strong></p><pre style='background: #bf360c; color: #ffcc80; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>type ReturnType&lt;T&gt; = T extends (...args: any[]) => infer R ? R : never;</code></pre><p>Ce type extrait le type de retour d'une fonction en utilisant <code>infer</code> pour capturer le type <code>R</code>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Génériques, Contraintes et Utilitaires (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='background: #f5f7fa; border-radius: 10px; padding: 15px;'>Cet exercice pratique combine génériques, contraintes et types utilitaires.</div>",
      "questions": [
        {
          "question": "<div style='background: #e3f2fd; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #0d47a1;'><strong>3.1 (3 pts)</strong></p></div><p>Définissez une interface <code>Produit</code> avec les propriétés suivantes :</p><ul><li><code>id</code> (nombre, requis)</li><li><code>nom</code> (chaîne, requis)</li><li><code>prix</code> (nombre, requis)</li><li><code>description</code> (chaîne, optionnelle)</li></ul><p>Puis créez un type <code>ProduitSansId</code> qui utilise <code>Omit</code> pour exclure la propriété <code>id</code>.</p>",
          "reponse": "<pre style='background: #1a237e; color: #ffcc80; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>interface Produit {\n    id: number;\n    nom: string;\n    prix: number;\n    description?: string;\n}\n\ntype ProduitSansId = Omit&lt;Produit, 'id'&gt;;</code></pre>"
        },
        {
          "question": "<div style='background: #e8f5e9; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #1b5e20;'><strong>3.2 (3 pts)</strong></p></div><p>Écrivez une fonction générique <code>rechercherParId</code> qui prend un tableau d'éléments de type <code>T</code> et un <code>id</code> (de type <code>number</code>). La fonction doit retourner l'élément trouvé ou <code>null</code>. Utilisez une contrainte pour que <code>T</code> ait une propriété <code>id</code> de type <code>number</code>.</p>",
          "reponse": "<pre style='background: #1b5e20; color: #a5d6a7; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>function rechercherParId&lt;T extends { id: number }&gt;(\n    items: T[],\n    id: number\n): T | null {\n    return items.find(item => item.id === id) || null;\n}</code></pre>"
        },
        {
          "question": "<div style='background: #fff3e0; border-radius: 8px; padding: 12px; margin-bottom: 15px;'><p style='margin: 0; color: #e65100;'><strong>3.3 (2 pts)</strong></p></div><p>Expliquez l'intérêt des contraintes dans les génériques. Donnez un exemple où <code>keyof</code> est utilisé comme contrainte.</p>",
          "reponse": "<p>Les contraintes dans les génériques permettent de limiter les types acceptés par un paramètre générique [citation:4]. Elles garantissent que le type générique possède certaines propriétés ou méthodes.</p><p><strong>Exemple avec keyof :</strong></p><pre style='background: #bf360c; color: #ffcc80; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>function getProperty&lt;T, K extends keyof T&gt;(obj: T, key: K): T[K] {\n    return obj[key];\n}</code></pre><p>Cette fonction garantit que la clé existe bien dans l'objet [citation:7].</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
