<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au TypeScript",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours",
      "points": "6 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #1a1a2e;'><strong>📚 Consignes :</strong> Répondez de manière claire et précise aux questions suivantes. Vos réponses doivent montrer une bonne compréhension des concepts fondamentaux de TypeScript.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Définissez TypeScript en une phrase. Quels sont les trois principaux avantages de TypeScript par rapport à JavaScript ? (2 pts)</p>",
          "reponse": "<p>TypeScript est un sur-ensemble typé de JavaScript qui se compile en JavaScript pur [citation:6]. Ses trois principaux avantages sont : (1) le typage statique qui permet de détecter les erreurs à la compilation plutôt qu'à l'exécution, (2) une meilleure maintenabilité du code grâce à une documentation vivante via les types, et (3) un refactoring plus sécurisé car le compilateur vérifie la cohérence des modifications [citation:6].</p>"
        },
        {
          "question": "<p><strong>2.</strong> Expliquez la différence entre <code>interface</code> et <code>type</code> en TypeScript. Dans quel cas utiliseriez-vous l'un plutôt que l'autre ? (2 pts)</p>",
          "reponse": "<p>Une <code>interface</code> définit un contrat pour la forme d'un objet et peut être étendue avec <code>extends</code>. Elle supporte la déclaration fusion (merging) où plusieurs déclarations de la même interface sont automatiquement combinées. Un <code>type alias</code> est plus polyvalent car il peut définir des types primitifs, des unions, des tuples, etc. <code>type</code> ne peut pas être étendu comme une interface. On utilise généralement <code>interface</code> pour définir des structures d'objets et <code>type</code> pour des unions, des intersections ou des types plus complexes [citation:6].</p>"
        },
        {
          "question": "<p><strong>3.</strong> Qu'est-ce qu'un <strong>type union</strong> en TypeScript ? Donnez un exemple de code où vous utilisez un type union pour une fonction qui peut accepter une chaîne OU un nombre. (2 pts)</p>",
          "reponse": "<p>Un type union permet à une variable ou un paramètre d'accepter plusieurs types différents. On l'écrit avec le symbole <code>|</code>. Exemple : <code>function afficherId(id: string | number) { console.log(`ID : ${id}`); }</code>. Cette fonction peut être appelée avec <code>afficherId(123)</code> ou <code>afficherId('abc')</code> [citation:6].</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Typage des fonctions et des structures",
      "points": "7 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #1a1a2e;'><strong>📝 Consignes :</strong> Écrivez le code TypeScript correspondant aux spécifications suivantes. Assurez-vous de typer correctement les paramètres, les retours et les structures de données.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Écrivez une fonction <code>calculerPrix</code> qui prend un paramètre <code>prixHT</code> (nombre) et un paramètre optionnel <code>tva</code> (nombre, par défaut 0.2). La fonction doit retourner le prix TTC (nombre). (2 pts)</p>",
          "reponse": "<p><pre style='background: #2d2d2d; color: #f8f8f8; padding: 12px; border-radius: 8px; font-family: monospace;'>function calculerPrix(prixHT: number, tva: number = 0.2): number {\n  return prixHT * (1 + tva);\n}</pre></p>"
        },
        {
          "question": "<p><strong>2.</strong> Définissez une interface <code>Produit</code> avec les propriétés suivantes : <code>id</code> (nombre), <code>nom</code> (string), <code>prix</code> (nombre), <code>categorie</code> (string optionnelle). Créez ensuite un objet produit respectant cette interface. (2 pts)</p>",
          "reponse": "<p><pre style='background: #2d2d2d; color: #f8f8f8; padding: 12px; border-radius: 8px; font-family: monospace;'>interface Produit {\n  id: number;\n  nom: string;\n  prix: number;\n  categorie?: string;\n}\n\nconst monProduit: Produit = {\n  id: 1,\n  nom: \"Ordinateur Portable\",\n  prix: 1200,\n  categorie: \"Informatique\"\n};</pre></p>"
        },
        {
          "question": "<p><strong>3.</strong> Créez un type alias <code>Status</code> qui peut être \"en_cours\", \"valide\" ou \"annule\". Utilisez ce type pour typer une variable <code>commandeStatus</code> et affectez-lui la valeur \"valide\". (1 pt)</p>",
          "reponse": "<p><pre style='background: #2d2d2d; color: #f8f8f8; padding: 12px; border-radius: 8px; font-family: monospace;'>type Status = \"en_cours\" | \"valide\" | \"annule\";\n\nconst commandeStatus: Status = \"valide\";</pre></p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Classes et Héritage",
      "points": "7 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #1a1a2e;'><strong>🏗️ Consignes :</strong> Écrivez le code TypeScript pour modéliser un système de gestion de véhicules en utilisant la Programmation Orientée Objet.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Créez une classe <code>Vehicule</code> avec les propriétés suivantes : <code>marque</code> (string), <code>modele</code> (string), <code>annee</code> (number). Ajoutez un constructeur et une méthode <code>afficherInfo()</code> qui retourne une chaîne décrivant le véhicule. (2 pts)</p>",
          "reponse": "<p><pre style='background: #2d2d2d; color: #f8f8f8; padding: 12px; border-radius: 8px; font-family: monospace;'>class Vehicule {\n  constructor(public marque: string, public modele: string, public annee: number) {}\n\n  afficherInfo(): string {\n    return `${this.marque} ${this.modele} (${this.annee})`;\n  }\n}</pre></p>"
        },
        {
          "question": "<p><strong>2.</strong> Créez une classe <code>Voiture</code> qui hérite de <code>Vehicule</code>. Ajoutez une propriété <code>nbPortes</code> (number). Utilisez <code>super()</code> dans le constructeur et redéfinissez la méthode <code>afficherInfo()</code> pour inclure le nombre de portes. (2 pts)</p>",
          "reponse": "<p><pre style='background: #2d2d2d; color: #f8f8f8; padding: 12px; border-radius: 8px; font-family: monospace;'>class Voiture extends Vehicule {\n  constructor(marque: string, modele: string, annee: number, public nbPortes: number) {\n    super(marque, modele, annee);\n  }\n\n  override afficherInfo(): string {\n    return `${super.afficherInfo()} - ${this.nbPortes} portes`;\n  }\n}</pre></p>"
        },
        {
          "question": "<p><strong>3.</strong> Créez une classe abstraite <code>VehiculeElectrique</code> avec une méthode abstraite <code>recharger()</code>. Créez ensuite une classe <code>VoitureElectrique</code> qui hérite à la fois de <code>Voiture</code> (ou de <code>Vehicule</code>) et implémente <code>VehiculeElectrique</code>. Expliquez pourquoi l'héritage multiple n'est pas directement possible en TypeScript. (3 pts)</p>",
          "reponse": "<p>TypeScript ne supporte pas l'héritage multiple direct (une classe ne peut avoir qu'une seule classe parente avec <code>extends</code>). Pour combiner plusieurs comportements, on utilise les <code>interfaces</code> et l'héritage multiple d'interfaces. Exemple de solution :</p><pre style='background: #2d2d2d; color: #f8f8f8; padding: 12px; border-radius: 8px; font-family: monospace;'>interface Rechargeable {\n  recharger(): void;\n}\n\nclass VoitureElectrique extends Vehicule implements Rechargeable {\n  recharger(): void {\n    console.log(\"La voiture se recharge...\");\n  }\n}</pre>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
