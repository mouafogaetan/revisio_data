<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au TypeScript",
  "classe": "Développement Web",
  "sequence": "Séquence 1 (Chapitres 1 à 4)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Fondamentaux et installation",
      "points": "6 pts",
      "enonce": "<p>Cet exercice porte sur les bases de TypeScript : installation, compilation et syntaxe.</p><div class='math-block'><div class='math'>$$ \\text{Durée estimée : 20 minutes} $$</div></div>",
      "questions": [
        {
          "question": "<p>1) Expliquez en quelques phrases ce qu'est TypeScript et quels sont ses principaux avantages par rapport à JavaScript.</p>",
          "reponse": "<p>TypeScript est un sur-ensemble typé de JavaScript qui se compile en JavaScript pur. Ses principaux avantages incluent : le typage statique qui permet de détecter les erreurs à la compilation, une meilleure maintenabilité du code grâce à la clarté des types, un refactoring plus sûr et sécurisé, ainsi qu'une meilleure documentation du code.</p>"
        },
        {
          "question": "<p>2) Vous installez TypeScript globalement via npm. Écrivez la commande d'installation, puis la commande pour compiler un fichier nommé <code>index.ts</code>.</p>",
          "reponse": "<p>Commande d'installation : <code>npm install -g typescript</code></p><p>Commande de compilation : <code>tsc index.ts</code></p>"
        },
        {
          "question": "<p>3) Soit le fichier <code>app.ts</code> contenant le code suivant :</p><pre><code>function greet(name: string): string {<br>  return `Bonjour, ${name} !`;<br>}<br><br>let user = \"Alice\";<br>console.log(greet(user));</code></pre><p>a) Quel type est inféré pour la variable <code>user</code> ?</p><p>b) Que se passe-t-il si vous compilez ce code avec l'option <code>--strict</code> ?</p><p>c) Proposez deux options de compilation pour améliorer l'expérience de développement.</p>",
          "reponse": "<p>a) Le type inféré pour <code>user</code> est <code>string</code>.</p><p>b) Avec <code>--strict</code>, TypeScript applique toutes les vérifications strictes, comme <code>strictNullChecks</code> et <code>noImplicitAny</code>. Le code ci-dessus ne générera pas d'erreur car il est correctement typé.</p><p>c) Options de compilation : </p><ul><li><code>--watch</code> (ou <code>-w</code>) pour la compilation automatique en cas de modification.</li><li><code>--noEmitOnError</code> pour ne pas générer de fichier JavaScript en cas d'erreur de compilation.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Typage des variables et fonctions",
      "points": "6 pts",
      "enonce": "<p>Cet exercice évalue votre maîtrise des types de base, des fonctions et du système de typage.</p><div class='math-block'><div class='math'>$$ \\text{Durée estimée : 25 minutes} $$</div></div>",
      "questions": [
        {
          "question": "<p>1) Déclarez les variables suivantes en TypeScript en leur attribuant un type explicite :</p><ul><li><code>age</code> : un nombre (25)</li><li><code>nom</code> : une chaîne de caractères (\"Dupont\")</li><li><code>estEtudiant</code> : un booléen (<code>true</code>)</li><li><code>resultat</code> : peut être une chaîne ou un nombre (<code>\"succès\"</code> ou <code>42</code>)</li></ul>",
          "reponse": "<pre><code>let age: number = 25;<br>let nom: string = \"Dupont\";<br>let estEtudiant: boolean = true;<br>let resultat: string | number = \"succès\";<br>// ou<br>resultat = 42;</code></pre>"
        },
        {
          "question": "<p>2) Soit la fonction suivante :</p><pre><code>function add(a: number, b: number): number {<br>  return a + b;<br>}</code></pre><p>a) Quelle est la valeur de retour de <code>add(5, 3)</code> ?</p><p>b) Pourquoi le type de retour est-il important ?</p><p>c) Rendez le paramètre <code>b</code> optionnel avec une valeur par défaut de 10.</p>",
          "reponse": "<p>a) <code>add(5, 3)</code> retourne <code>8</code>.</p><p>b) Le type de retour permet de s'assurer que la fonction retourne bien la valeur attendue et d'éviter les erreurs.</p><p>c) <pre><code>function add(a: number, b: number = 10): number {<br>  return a + b;<br>}</code></pre></p>"
        },
        {
          "question": "<p>3) Soit le tableau suivant : <code>let scores: number[] = [85, 92, 78];</code></p><p>a) Utilisez un tuple pour décrire un tableau contenant un nom (string), un âge (number) et une note (number).</p><p>b) Déclarez le tuple correspondant à la variable <code>etudiant</code> avec les valeurs <code>\"Marie\"</code>, <code>22</code>, <code>95</code>.</p>",
          "reponse": "<p>a) <pre><code>let etudiant: [string, number, number];</code></pre></p><p>b) <pre><code>let etudiant: [string, number, number] = [\"Marie\", 22, 95];</code></pre></p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Structures de données (Interfaces et Types)",
      "points": "8 pts",
      "enonce": "<p>Cet exercice se concentre sur la définition et l'utilisation d'interfaces et de types pour modéliser des données complexes.</p><div class='math-block'><div class='math'>$$ \\text{Durée estimée : 30 minutes} $$</div></div>",
      "questions": [
        {
          "question": "<p>1) Définissez une interface <code>Personne</code> avec les propriétés suivantes : <code>nom</code> (string), <code>age</code> (number), <code>email</code> (string optionnel), et <code>adresse</code> (string en lecture seule).</p>",
          "reponse": "<pre><code>interface Personne {<br>  nom: string;<br>  age: number;<br>  email?: string;<br>  readonly adresse: string;<br>}</code></pre>"
        },
        {
          "question": "<p>2) a) Créez un alias de type <code>ID</code> qui peut être soit une chaîne, soit un nombre.</p><p>b) Utilisez cet alias dans une interface <code>Employe</code> qui étend <code>Personne</code> et ajoute une propriété <code>id</code> de type <code>ID</code> et <code>salaire</code> (number).</p>",
          "reponse": "<p>a) <pre><code>type ID = string | number;</code></pre></p><p>b) <pre><code>interface Employe extends Personne {<br>  id: ID;<br>  salaire: number;<br>}</code></pre></p>"
        },
        {
          "question": "<p>3) Soit un objet respectant l'interface <code>Employe</code> :</p><pre><code>const employe: Employe = {<br>  nom: \"Alice\",<br>  age: 30,<br>  adresse: \"123 Rue de Paris\",<br>  id: \"EMP001\",<br>  salaire: 45000<br>};</code></pre><p>a) Pouvez-vous modifier la propriété <code>adresse</code> ? Justifiez.</p><p>b) Écrivez une fonction <code>afficherEmploye</code> qui prend un paramètre de type <code>Employe</code> et affiche toutes ses informations.</p>",
          "reponse": "<p>a) Non, car la propriété <code>adresse</code> est déclarée en lecture seule (<code>readonly</code>) dans l'interface <code>Personne</code>.</p><p>b) <pre><code>function afficherEmploye(e: Employe): void {<br>  console.log(`Nom: ${e.nom}, Âge: ${e.age}, Adresse: ${e.adresse}, ID: ${e.id}, Salaire: ${e.salaire}`);<br>}</code></pre></p>"
        },
        {
          "question": "<p>4) Utilisez l'index signature dans une interface <code>Dictionnaire</code> pour stocker des valeurs de type <code>string</code> indexées par des clés <code>string</code>. Créez ensuite un objet <code>traductions</code> de ce type contenant les traductions de \"bonjour\" en anglais, espagnol et italien.</p>",
          "reponse": "<pre><code>interface Dictionnaire {<br>  [key: string]: string;<br>}<br><br>const traductions: Dictionnaire = {<br>  \"bonjour\": \"hello\",<br>  \"espagnol\": \"hola\",<br>  \"italien\": \"ciao\"<br>};</code></pre>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
