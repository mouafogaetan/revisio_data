<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 29 : Déclarations globales, .d.ts et DefinitelyTyped | TypeScript</title>
  <!-- Tailwind CSS + jQuery + MathJax -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    body { background: #f0f4f8; }
    .slide-card { transition: all 0.2s ease; }
    .progress-fill { transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    pre { white-space: pre-wrap; word-break: break-word; tab-size: 2; }
    button:focus-visible { outline: 2px solid #1e40af; outline-offset: 2px; border-radius: 0.5rem; }
    @media (max-width: 640px) {
      .slide-content { padding-left: 1rem; padding-right: 1rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="max-w-5xl mx-auto px-3 md:px-5 py-5 md:py-8">
    <!-- Barre sticky -->
    <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-md rounded-2xl shadow-sm p-3 mb-6 flex flex-wrap items-center justify-between gap-3 border border-gray-100">
      <div class="flex items-center gap-3">
        <span class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">TypeScript • Déclarations</span>
        <span class="text-gray-600 text-sm font-medium hidden sm:inline-block">Leçon 29</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="slideCounter" class="text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-full font-medium">1 / 7</span>
        <div class="hidden sm:block w-36 h-1.5 bg-gray-200 rounded-full overflow-hidden">
          <div id="progressFill" class="progress-fill h-full bg-indigo-500 rounded-full" style="width: 14%"></div>
        </div>
      </div>
    </div>

    <div id="slidesContainer" class="relative"></div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-8 gap-4">
      <button id="prevSlide" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-5 rounded-xl shadow-sm transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Précédent
      </button>
      <span class="text-xs text-gray-400 hidden md:block">← / →  ou  swipe</span>
      <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        Suivant
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>

    <div class="text-center text-gray-400 text-xs mt-8 pt-4 border-t border-gray-200">
      🇨🇲 Cours TypeScript — Enseignant au Cameroun | Déclarations globales, fichiers .d.ts, DefinitelyTyped
    </div>
  </div>

  <script>
    // Slides pour la leçon 29 (lesson29)
    const slidesData = [
      { // Slide 1 - Titre
        type: "title",
        title: "🌍 Types globaux, déclarations d’ambiance",
        subtitle: "declare var, fichiers .d.ts et DefinitelyTyped (@types)",
        badge: "Leçon 29 • Intégration avancée",
        desc: "Apprenez à parler à du JavaScript brut, à typer des bibliothèques sans TypeScript et à profiter de milliers de types prêts à l'emploi."
      },
      { // Slide 2 - Objectifs (selon programme)
        type: "objectifs",
        title: "🎯 Objectifs de la leçon",
        items: [
          "Déclarer des variables globales avec `declare var`",
          "Utiliser les fichiers `.d.ts` pour les définitions de types",
          "Comprendre le rôle de DefinitelyTyped (`@types/xxx`)"
        ]
      },
      { // Slide 3 - Déclarer des variables globales (declare var)
        type: "content",
        title: "📜 1. `declare var` : parler de variables globales",
        text: "Quand vous utilisez une bibliothèque JavaScript qui expose une variable globale (ex: `$` pour jQuery, `_` pour Lodash), TypeScript ne la connaît pas. On utilise <strong class='text-indigo-700'>declare var</strong> pour informer TypeScript de son existence sans générer de code.",
        list: [
          "Syntaxe : `declare var maVariable: type;`",
          "Cela s'appelle une 'déclaration d'ambiance' (ambient declaration)",
          "Aucun code JavaScript n'est produit, c'est juste pour la vérification de type."
        ],
        example: "// Dans un environnement navigateur avec une librairie 'monLib'\ndeclare var MA_CONSTANTE_GLOBALE: string;\n\ndeclare function faireCalcul(x: number): number;\n\n// Maintenant TypeScript accepte\nconsole.log(MA_CONSTANTE_GLOBALE.toUpperCase());\nconst result = faireCalcul(42);",
        note: "💡 On utilise `declare` devant `var`, `let`, `function`, `class`, `namespace` pour décrire des entités qui existent déjà dans l'environnement d'exécution."
      },
      { // Slide 4 - Fichiers .d.ts : les bibliothèques de types
        type: "code-example",
        title: "📁 2. Fichiers .d.ts (déclaration de types)",
        code: `// ----- fichier "maths.d.ts" -----
// Ce fichier décrit une librairie JavaScript existante
declare module "ma-bibliotheque-maths" {
  export function addition(a: number, b: number): number;
  export function multiplication(a: number, b: number): number;
  export const PI: number;
}

// ----- fichier "app.ts" (notre code) -----
import { addition, PI } from "ma-bibliotheque-maths";
// TypeScript connaît maintenant les types !
console.log(addition(5, 3)); // OK
// console.log(addition("5", 3)); // ❌ Erreur : argument string non accepté`,
        explanation: "✅ Les fichiers `.d.ts` contiennent uniquement des informations de typage. Ils ne sont jamais compilés en JS. On peut les écrire à la main pour typer des librairies anciennes ou non typées. Utile quand on migre un projet JS vers TS."
      },
      { // Slide 5 - DefinitelyTyped ( @types/ )
        type: "definitely-typed",
        title: "📦 3. DefinitelyTyped : la bibliothèque universelle de types",
        text: "Des milliers de bibliothèques JavaScript populaires n'ont pas de types intégrés. La communauté <strong>DefinitelyTyped</strong> fournit des définitions de types via les packages `@types/nom-bibliotheque`.",
        howTo: "Installation : `npm install --save-dev @types/jquery` ou `@types/lodash` ...",
        keyPoints: [
          "Tous les types sont hébergés sur GitHub (DefinitelyTyped/DefinitelyTyped)",
          "On installe seulement les types dont on a besoin en développement",
          "TypeScript les détecte automatiquement si on a `node_modules/@types`"
        ],
        example: "// Exemple avec lodash\nnpm install lodash\nnpm install --save-dev @types/lodash\n\n// Dans app.ts\nimport _ from 'lodash';\nconst tableau = [1, 2, 3];\nconst double = _.map(tableau, (n) => n * 2); // typé grâce à @types/lodash",
        tip: "💡 Quand vous cherchez des types pour une bibliothèque, vérifiez d'abord si le package propose ses propres types (fichier .d.ts intégré). Sinon, cherchez `@types/nom` sur npm."
      },
      { // Slide 6 - Atelier pratique : créer son propre fichier .d.ts
        type: "workshop",
        title: "🔨 Exemple concret : typer une vieille librairie 'analytics.js'",
        description: "Imaginez que vous ayez un fichier JavaScript global `analytics.js` qui expose `window.trackEvent` et `window.userId`. Créons un fichier de déclaration.",
        customCode: `// analytics.d.ts
interface Window {
  trackEvent(eventName: string, properties?: Record<string, any>): void;
  userId: string | null;
}

declare var trackEvent: Window['trackEvent'];
declare var userId: Window['userId'];

// Dans notre code TypeScript
// Plus besoin de // @ts-ignore
window.trackEvent('page_view', { page: 'cours' });
console.log(window.userId);
// Ou bien directement (si global)
trackEvent('click_bouton');`,
        noteFinal: "🎯 Les déclarations globales sont placées dans n'importe quel fichier `.d.ts` à la racine du projet (ou dans un dossier `types/`). TypeScript les inclut automatiquement."
      },
      { // Slide 7 - Récapitulatif et bonnes pratiques
        type: "recap",
        title: "✅ Récapitulatif & astuces du quotidien",
        items: [
          "`declare var` : pour indiquer une variable globale existante (ex: `declare var process: any;` dans Node.js avant d'avoir les types)",
          "Les fichiers `.d.ts` sont vos alliés pour typer du code JavaScript pur ou écrire des API externes.",
          "Préférez toujours `@types/ma-lib` quand elle existe plutôt que d'écrire vos propres types.",
          "Si la librairie a changé, vous pouvez étendre les types avec `declare module 'nom' { ... }`"
        ],
        finalTip: "🧠 Quand vous installez une librairie JS, cherchez d'abord si `@types/nom` est disponible. Cela vous fera gagner un temps fou et bénéficier de la puissance de TypeScript. Bon code !"
      }
    ];

    let currentSlide = 0;
    const total = slidesData.length;

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/\\n/g, '\n');
    }

    function renderSlide(index) {
      const data = slidesData[index];
      const container = $("#slidesContainer");
      container.empty();

      let html = `<div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all">`;
      html += `<div class="bg-gradient-to-r from-purple-50 to-indigo-50 px-5 py-2 border-b border-purple-100 flex justify-between items-center">
                  <span class="text-xs font-mono text-purple-700 bg-purple-100 px-2 py-0.5 rounded-full">slide ${index+1}/${total}</span>
                  <span class="text-purple-400 text-xs">types & déclarations</span>
                </div>`;

      if (data.type === "title") {
        html += `<div class="p-6 md:p-10 text-center">
                  <div class="inline-block mb-3 px-4 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-bold">${data.badge}</div>
                  <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-5">${data.title}</h1>
                  <p class="text-xl text-gray-600 max-w-2xl mx-auto">${data.subtitle}</p>
                  <div class="mt-7 text-gray-500 border-t border-gray-200 inline-block pt-3">${data.desc}</div>
                  <div class="mt-6 flex justify-center"><div class="w-16 h-1 bg-indigo-400 rounded-full"></div></div>
                </div>`;
      }
      else if (data.type === "objectifs") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-4 mb-6">${data.title}</h2>
                  <ul class="space-y-4">`;
        data.items.forEach(item => {
          html += `<li class="flex items-start gap-3"><span class="inline-flex items-center justify-center bg-green-100 text-green-700 rounded-full w-6 h-6 text-sm mt-0.5">✓</span><span class="text-gray-700 text-lg">${item}</span></li>`;
        });
        html += `</ul></div>`;
      }
      else if (data.type === "content") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="text-gray-700 leading-relaxed space-y-4 text-base">`;
        if(data.text) html += `<p>${data.text}</p>`;
        if(data.list) {
          html += `<ul class="list-disc pl-6 space-y-2 mt-2">`;
          data.list.forEach(item => html += `<li>${item}</li>`);
          html += `</ul>`;
        }
        if(data.example) {
          html += `<div class="bg-gray-900 text-gray-100 rounded-lg p-4 font-mono text-sm mt-4 overflow-x-auto">${escapeHtml(data.example)}</div>`;
        }
        if(data.note) html += `<div class="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400 mt-4 text-yellow-800">${data.note}</div>`;
        html += `</div></div>`;
      }
      else if (data.type === "code-example") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="bg-gray-900 rounded-xl overflow-hidden shadow-md">
                    <div class="flex items-center gap-2 bg-gray-800 px-4 py-2 text-gray-300 text-xs font-mono"><span class="w-3 h-3 rounded-full bg-red-500"></span><span class="w-3 h-3 rounded-full bg-yellow-500"></span><span class="w-3 h-3 rounded-full bg-green-500"></span><span class="ml-2">TypeScript .d.ts</span></div>
                    <pre class="text-sm md:text-base text-gray-200 p-5 overflow-x-auto font-mono"><code>${escapeHtml(data.code)}</code></pre>
                  </div>
                  <div class="mt-5 bg-indigo-50 p-4 rounded-xl text-indigo-800 border-l-4 border-indigo-400">${data.explanation}</div>
                </div>`;
      }
      else if (data.type === "definitely-typed") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800">${data.title}</h2>
                  <p class="text-gray-700 mt-2 mb-4">${data.text}</p>
                  <div class="bg-gray-800 text-white rounded-xl p-3 font-mono text-sm mb-4">${data.howTo}</div>
                  <ul class="list-disc pl-6 space-y-1 text-gray-700 mb-5">${data.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul>
                  <div class="bg-gray-900 rounded-xl p-4 mb-4"><pre class="text-gray-200 font-mono text-sm overflow-x-auto"><code>${escapeHtml(data.example)}</code></pre></div>
                  <div class="bg-blue-50 p-3 rounded-lg text-blue-800">${data.tip}</div>
                </div>`;
      }
      else if (data.type === "workshop") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-2">${data.title}</h2>
                  <p class="text-gray-700 mb-4">${data.description}</p>
                  <div class="bg-gray-900 rounded-xl overflow-hidden mb-4">
                    <div class="bg-gray-800 px-4 py-1 text-gray-300 text-xs">📄 custom.d.ts</div>
                    <pre class="text-gray-200 p-4 font-mono text-sm overflow-x-auto"><code>${escapeHtml(data.customCode)}</code></pre>
                  </div>
                  <div class="bg-green-50 p-3 rounded-lg border-l-4 border-green-500">${data.noteFinal}</div>
                </div>`;
      }
      else if (data.type === "recap") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-3 mb-5">📌 ${data.title}</h2>
                  <ul class="space-y-3 mb-6">
                    ${data.items.map(item => `<li class="flex gap-2 items-start"><span class="text-indigo-500 text-xl">▹</span><span class="text-gray-700">${item}</span></li>`).join('')}
                  </ul>
                  <div class="bg-gradient-to-r from-indigo-50 to-purple-50 p-5 rounded-2xl border border-indigo-200 text-indigo-900 font-medium shadow-inner">${data.finalTip}</div>
                </div>`;
      }

      html += `</div>`;
      container.html(html);

      $("#slideCounter").text(`${index+1} / ${total}`);
      let percent = ((index+1) / total) * 100;
      $("#progressFill").css("width", `${percent}%`);
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === total-1);
      if (window.MathJax) MathJax.typesetPromise();
    }

    function next() { if (currentSlide < total-1) { currentSlide++; renderSlide(currentSlide); window.scrollTo({ top: 0, behavior: "smooth" }); } }
    function prev() { if (currentSlide > 0) { currentSlide--; renderSlide(currentSlide); window.scrollTo({ top: 0, behavior: "smooth" }); } }

    $(document).ready(function() {
      renderSlide(0);
      $("#nextSlide").on("click", next);
      $("#prevSlide").on("click", prev);
      $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") { next(); e.preventDefault(); }
        else if (e.key === "ArrowLeft") { prev(); e.preventDefault(); }
      });
      let touchstartX = 0;
      $("body").on("touchstart", function(e) { touchstartX = e.originalEvent.touches[0].clientX; });
      $("body").on("touchend", function(e) {
        if (!touchstartX) return;
        let endX = e.originalEvent.changedTouches[0].clientX;
        let diff = endX - touchstartX;
        if (Math.abs(diff) > 50) { diff > 0 ? prev() : next(); touchstartX = 0; }
      });
    });
  </script>
</body>
</html>
