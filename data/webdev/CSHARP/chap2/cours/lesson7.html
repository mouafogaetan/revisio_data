<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux opérateurs",
    "contenu": "<div style='padding: 10px;'><p>Les <strong>opérateurs</strong> sont des symboles qui permettent d'effectuer des <strong>opérations</strong> sur des données (variables, constantes, littéraux).</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Catégories :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Arithmétiques (<code>+</code>, <code>-</code>, <code>*</code>, <code>/</code>, <code>%</code>, <code>++</code>, <code>--</code>)</li><li>Comparaison (<code>==</code>, <code>!=</code>, <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>)</li><li>Logiques (<code>&amp;&amp;</code>, <code>||</code>, <code>!</code>)</li><li>Affectation (<code>=</code>, <code>+=</code>, <code>-=</code>, <code>*=</code>, <code>/=</code>)</li><li>Ternaire (<code>? :</code>)</li></ul></li></ul><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #add8e6;'><p style='color: #000;'><strong>📋 Pourquoi les opérateurs sont essentiels ?</strong></p><ul style='color: #000; padding-left: 20px;'><li>Ils permettent de <strong>calculer</strong> des valeurs.</li><li>Ils permettent de <strong>comparer</strong> des données.</li><li>Ils permettent de <strong>prendre des décisions</strong> en fonction de conditions.</li></ul></div></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons découvrir les opérateurs en C#. Les opérateurs sont des symboles qui permettent d'effectuer des opérations sur des données, comme des calculs, des comparaisons ou des décisions logiques. Nous allons voir plusieurs catégories d'opérateurs : les opérateurs arithmétiques pour faire des calculs, les opérateurs de comparaison pour comparer des valeurs, les opérateurs logiques pour combiner des conditions, les opérateurs d'affectation pour modifier des variables, et l'opérateur ternaire pour écrire des conditions simplifiées. Ces opérateurs sont les briques de base de tout programme. Sans eux, nous ne pourrions ni calculer, ni comparer, ni prendre de décisions. Ils sont donc essentiels à maîtriser.",
    "note": "Les opérateurs sont les outils fondamentaux qui donnent vie à vos programmes."
  },
  {
    "titre": "Opérateurs arithmétiques",
    "contenu": "<div style='padding: 10px;'><p>Les opérateurs arithmétiques permettent d'effectuer des <strong>calculs mathématiques</strong> sur des nombres.</p><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📊 Tableau des opérateurs :</strong></p><table style='width: 100%; border-collapse: collapse; color: #000; font-size: 14px;'><tr style='background-color: #ddd;'><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Opérateur</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Nom</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Exemple</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Résultat</th></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>+</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Addition</td><td style='padding: 8px; border: 1px solid #ccc;'>5 + 3</td><td style='padding: 8px; border: 1px solid #ccc;'>8</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>-</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Soustraction</td><td style='padding: 8px; border: 1px solid #ccc;'>10 - 4</td><td style='padding: 8px; border: 1px solid #ccc;'>6</td></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>*</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Multiplication</td><td style='padding: 8px; border: 1px solid #ccc;'>6 * 7</td><td style='padding: 8px; border: 1px solid #ccc;'>42</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>/</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Division</td><td style='padding: 8px; border: 1px solid #ccc;'>20 / 4</td><td style='padding: 8px; border: 1px solid #ccc;'>5</td></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>%</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Modulo (reste)</td><td style='padding: 8px; border: 1px solid #ccc;'>17 % 5</td><td style='padding: 8px; border: 1px solid #ccc;'>2</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>++</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Incrémentation</td><td style='padding: 8px; border: 1px solid #ccc;'>int x = 5; x++;</td><td style='padding: 8px; border: 1px solid #ccc;'>x = 6</td></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>--</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Décrémentation</td><td style='padding: 8px; border: 1px solid #ccc;'>int x = 5; x--;</td><td style='padding: 8px; border: 1px solid #ccc;'>x = 4</td></tr></table></div></div>",
    "texteParle": "Commençons par les opérateurs arithmétiques qui servent à faire des calculs. Nous avons l'addition avec le symbole plus, la soustraction avec le moins, la multiplication avec l'astérisque, la division avec la barre oblique, et le modulo qui donne le reste de la division. Le modulo est très utile, par exemple pour savoir si un nombre est pair en vérifiant si n % 2 est égal à 0. Nous avons aussi les opérateurs d'incrémentation et de décrémentation, qui permettent d'augmenter ou de diminuer une variable de 1. Ces opérateurs sont très utiles dans les boucles ou pour compter. Les opérateurs arithmétiques fonctionnent sur tous les types numériques comme int, double, decimal.",
    "note": "Le modulo (%) est très utile pour tester la divisibilité ou pour alterner des comportements."
  },
  {
    "titre": "Opérateurs de comparaison",
    "contenu": "<div style='padding: 10px;'><p>Les opérateurs de comparaison permettent de <strong>comparer deux valeurs</strong> et de retourner un <strong>booléen</strong> (<code>true</code> ou <code>false</code>).</p><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📊 Tableau des opérateurs :</strong></p><table style='width: 100%; border-collapse: collapse; color: #000; font-size: 14px;'><tr style='background-color: #ddd;'><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Opérateur</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Signification</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Exemple</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Résultat</th></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>==</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Égal à</td><td style='padding: 8px; border: 1px solid #ccc;'>5 == 5</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>!=</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Différent de</td><td style='padding: 8px; border: 1px solid #ccc;'>5 != 3</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>&lt;</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Inférieur à</td><td style='padding: 8px; border: 1px solid #ccc;'>3 &lt; 5</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>&gt;</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Supérieur à</td><td style='padding: 8px; border: 1px solid #ccc;'>5 &gt; 3</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>&lt;=</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Inférieur ou égal</td><td style='padding: 8px; border: 1px solid #ccc;'>5 &lt;= 5</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>&gt;=</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Supérieur ou égal</td><td style='padding: 8px; border: 1px solid #ccc;'>3 &gt;= 5</td><td style='padding: 8px; border: 1px solid #ccc;'>false</td></tr></table></div></div>",
    "texteParle": "Les opérateurs de comparaison sont utilisés pour comparer deux valeurs. Le résultat est toujours un booléen, c'est-à-dire vrai ou faux. Nous avons l'égalité avec deux signes égaux, la différence avec un point d'exclamation suivi d'un signe égal, l'infériorité, la supériorité, l'infériorité ou égalité, et la supériorité ou égalité. Ces opérateurs sont très importants car ils sont utilisés dans les conditions, par exemple dans les instructions if, pour décider du chemin d'exécution de votre programme. Par exemple, pour vérifier si un client a assez d'argent pour acheter un produit, ou si un nombre est pair, vous utiliserez ces opérateurs.",
    "note": "Attention à ne pas confondre l'opérateur d'affectation (=) avec l'opérateur de comparaison (==)."
  },
  {
    "titre": "Opérateurs logiques",
    "contenu": "<div style='padding: 10px;'><p>Les opérateurs logiques permettent de <strong>combiner des conditions</strong> booléennes.</p><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📊 Tableau des opérateurs :</strong></p><table style='width: 100%; border-collapse: collapse; color: #000; font-size: 14px;'><tr style='background-color: #ddd;'><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Opérateur</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Signification</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Exemple</th><th style='padding: 8px; border: 1px solid #ccc; text-align: left;'>Résultat</th></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>&amp;&amp;</code></td><td style='padding: 8px; border: 1px solid #ccc;'>ET logique</td><td style='padding: 8px; border: 1px solid #ccc;'>true &amp;&amp; true</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>||</code></td><td style='padding: 8px; border: 1px solid #ccc;'>OU logique</td><td style='padding: 8px; border: 1px solid #ccc;'>true || false</td><td style='padding: 8px; border: 1px solid #ccc;'>true</td></tr><tr style='background-color: #fff;'><td style='padding: 8px; border: 1px solid #ccc;'><code>!</code></td><td style='padding: 8px; border: 1px solid #ccc;'>NON logique</td><td style='padding: 8px; border: 1px solid #ccc;'>!true</td><td style='padding: 8px; border: 1px solid #ccc;'>false</td></tr></table></div><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #add8e6;'><p style='color: #000;'><strong>📋 Exemple concret :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>bool estMajeur = age >= 18;\nbool aLePermis = permis;\nbool peutConduire = estMajeur && aLePermis;</pre></div></div>",
    "texteParle": "Les opérateurs logiques servent à combiner des conditions booléennes. Le ET logique, symbolisé par deux esperluettes, donne vrai uniquement si les deux conditions sont vraies. Le OU logique, symbolisé par deux barres verticales, donne vrai si au moins une des deux conditions est vraie. Le NON logique, symbolisé par un point d'exclamation, inverse la valeur d'une condition : vrai devient faux et faux devient vrai. Ces opérateurs sont très utiles pour écrire des conditions complexes. Par exemple, pour vérifier si un client peut conduire, on peut combiner la condition qu'il est majeur ET qu'il a le permis. Les opérateurs logiques sont fréquemment utilisés dans les instructions if et les boucles while.",
    "note": "Le ET logique (&&) est souvent utilisé pour valider plusieurs conditions simultanément."

ckground-color: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ccc;'><code>%=</code></td><td style='padding: 8px; border: 1px solid #ccc;'>Modulo affecté</td><td style='padding: 8px; border: 1px solid #ccc;'>x %= 3 (x = x % 3)</td></tr></table></div></div>",
    "texteParle": "Les opérateurs d'affectation permettent de modifier la valeur d'une variable de manière concise. L'opérateur de base est le signe égal, qui assigne une valeur à une variable. Mais il existe des opérateurs composés qui combinent une opération arithmétique avec une affectation. Par exemple, 'x += 5' signifie 'x = x + 5', c'est-à-dire qu'on ajoute 5 à la valeur actuelle de x. De même, 'x -= 3' soustrait 3, 'x *= 4' multiplie par 4, et 'x /= 2' divise par 2. Ces opérateurs rendent le code plus concis et plus lisible, surtout lorsqu'on manipule des variables de manière répétitive, par exemple dans des boucles.",
    "note": "Les opérateurs composés (+=, -=, etc.) sont une manière élégante de modifier une variable."

  {
    "titre": "Opérateur ternaire",
    "contenu": "<div style='padding: 10px;'><p>L'opérateur ternaire (<code>? :</code>) permet d'écrire une condition en <strong>une seule ligne</strong>.</p><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📝 Syntaxe :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>condition ? valeur_si_vrai : valeur_si_faux;</pre></div><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #add8e6;'><p style='color: #000;'><strong>📋 Exemples :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>// Exemple 1 : Vérifier la majorité\nstring statut = age >= 18 ? \"Majeur\" : \"Mineur\";\n\n// Exemple 2 : Déterminer le plus grand\nint max = a > b ? a : b;\n\n// Exemple 3 : En contexte camerounais\nstring reduction = estMembreFidele ? \"10%\" : \"0%\";</pre></div></div>",
    "texteParle": "L'opérateur ternaire, aussi appelé opérateur conditionnel, est un moyen compact d'écrire une condition if-else simple. Sa syntaxe est : condition ? valeur_si_vrai : valeur_si_faux. Si la condition est vraie, l'expression prend la première valeur, sinon elle prend la deuxième. C'est très utile pour initialiser une variable en fonction d'une condition. Par exemple, pour déterminer si une personne est majeure ou mineure, on peut écrire : 'string statut = age >= 18 ? \"Majeur\" : \"Mineur\";'. Ou pour trouver le maximum de deux nombres : 'int max = a > b ? a : b;'. L'opérateur ternaire rend le code plus concis, mais il ne doit être utilisé que pour des conditions simples, sinon le code devient difficile à lire.",
    "note": "L'opérateur ternaire est idéal pour des conditions simples, mais à éviter pour des conditions complexes."
  },
  {
    "titre": "Bonnes pratiques et points de vigilance",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border: 1px solid #add8e6;'><p style='color: #000;'><strong>✅ Bonnes pratiques :</strong></p><ul style='color: #000; padding-left: 20px;'><li><strong>Ne pas confondre</strong> <code>=</code> (affectation) et <code>==</code> (comparaison).</li><li><strong>Utiliser les parenthèses</strong> pour clarifier les expressions complexes.</li><li><strong>Préférer <code>&amp;&amp;</code> et <code>||</code></strong> plutôt que <code>&amp;</code> et <code>|</code> (évaluation de court-circuit).</li><li><strong>Vérifier la division par zéro</strong> avant d'utiliser l'opérateur <code>/</code>.</li></ul></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffeeba;'><p style='color: #856404;'><strong>⚠️ Points d'attention :</strong></p><ul style='color: #856404; padding-left: 20px;'><li><strong>Division entière :</strong> En C#, <code>5 / 2</code> donne <strong>2</strong> (pas 2.5). Utilisez <code>5.0 / 2</code> ou <code>5 / 2.0</code> pour obtenir un résultat décimal.</li><li><strong>Débordement (overflow) :</strong> Les opérations sur les entiers peuvent dépasser les limites du type.</li><li><strong>NullReferenceException :</strong> Les opérateurs sur des références null peuvent lever des exceptions.</li></ul></div></div>",
    "texteParle": "Pour conclure, voici quelques bonnes pratiques et points de vigilance concernant les opérateurs en C#. La confusion la plus fréquente est entre l'affectation avec un seul signe égal et la comparaison avec deux signes égaux. Une erreur classique est d'écrire 'if (x = 5)' au lieu de 'if (x == 5)'. Utilisez des parenthèses pour clarifier vos expressions, surtout quand vous combinez plusieurs opérateurs. Préférez les opérateurs && et || qui ont une évaluation de court-circuit : si la première condition est fausse pour un ET, la seconde n'est même pas évaluée. Attention aussi à la division entière : en C#, 5 divisé par 2 donne 2, pas 2.5. Pour obtenir un résultat décimal, il faut qu'au moins un des opérandes soit décimal. Enfin, faites attention aux débordements et aux exceptions quand vous manipulez des références null.",
    "note": "Les opérateurs && et || sont préférables à & et | car ils optimisent l'exécution en évitant d'évaluer inutilement les conditions."

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';

        });

        if (slideCounter) {

        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
