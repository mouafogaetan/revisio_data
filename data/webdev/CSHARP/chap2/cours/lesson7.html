<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>C# - Leçon 7 : Opérateurs arithmétiques, logiques et ternaire | Cours Développement Web</title>
    <!-- Tailwind CSS + Google Fonts + Font Awesome (pour icônes discrètes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuration Tailwind pour personnalisation légère -->
    <style>
        /* Personnalisation douce pour la lisibilité */
        body {
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f6 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        /* Style des slides : effet carte moderne */
        .slide-card {
            transition: all 0.3s ease-in-out;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            border-radius: 2rem;
        }
        /* Navigation buttons */
        .nav-btn {
            transition: transform 0.2s, background 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* Code snippets */
        pre {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            background: #e2e8f0;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            color: #0f172a;
        }
        pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .highlight {
            background: #fef9c3;
            color: #1e293b;
            font-weight: 500;
            border-radius: 0.4rem;
            padding: 0.1rem 0.3rem;
        }
        /* Table simple */
        .simple-table td, .simple-table th {
            padding: 0.6rem;
            border-bottom: 1px solid #cbd5e1;
        }
    </style>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour d'éventuelles expressions mais pas essentiel ici, présent par précaution) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* scroll fluide */
        html {
            scroll-behavior: smooth;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            pre {
                font-size: 0.75rem;
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6 md:py-10">
        <!-- Conteneur slides -->
        <div id="slides-container" class="relative">
            <!-- Les slides seront injectées dynamiquement via jQuery -->
        </div>

        <!-- Navigation et indicateur -->
        <div class="flex justify-between items-center mt-8 gap-3 flex-wrap">
            <button id="prevBtn" class="nav-btn bg-white/80 backdrop-blur-sm border border-slate-200 shadow-md hover:bg-indigo-50 text-slate-700 font-semibold py-2 px-5 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed">
                ← Précédent
            </button>
            <div class="text-sm text-slate-500 bg-white/60 px-4 py-2 rounded-full shadow-sm">
                Diapositive <span id="currentSlideIdx">1</span> / <span id="totalSlides"></span>
            </div>
            <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-full shadow-md transition">
                Suivant →
            </button>
        </div>
    </div>

    <script>
        // Données de la leçon 7 : Opérateurs (d'après objectifs Lesson 7)
        // Titre générique : Maîtrise des opérateurs arithmétiques, de comparaison/logiques et ternaire
        const lessonData = {
            title: "Leçon 7 : Opérateurs en C# - Arithmétique, Logique & Ternaire",
            objectives: [
                "Utiliser les opérateurs arithmétiques (+, -, *, /, %, ++, --)",
                "Maîtriser les opérateurs de comparaison et logiques (==, !=, &&, ||, !)",
                "Comprendre les opérateurs d'affectation et l'opérateur ternaire (?:)"
            ],
            contentSlides: [
                {
                    title: "🧮 Opérateurs arithmétiques",
                    content: `
                        <p class="text-lg mb-3">Les opérateurs arithmétiques permettent d'effectuer des calculs mathématiques simples sur les nombres (int, double, decimal...).</p>
                        <div class="bg-indigo-50 p-4 rounded-xl mb-5">
                            <table class="simple-table w-full text-left">
                                <thead><tr class="bg-indigo-100"><th class="p-2">Opérateur</th><th>Nom</th><th>Exemple</th></tr></thead>
                                <tbody>
                                    <tr><td class="font-mono">+</td><td>Addition</td><td class="font-mono">int s = 5 + 3; // 8</td></tr>
                                    <tr><td class="font-mono">-</td><td>Soustraction</td><td class="font-mono">int d = 10 - 4; // 6</td></tr>
                                    <tr><td class="font-mono">*</td><td>Multiplication</td><td class="font-mono">int p = 7 * 6; // 42</td></tr>
                                    <tr><td class="font-mono">/</td><td>Division</td><td class="font-mono">double q = 15 / 2; // 7 (entier!), double q2 = 15.0/2 = 7.5</td></tr>
                                    <tr><td class="font-mono">%</td><td>Modulo (reste)</td><td class="font-mono">int r = 17 % 5; // 2</td></tr>
                                    <tr><td class="font-mono">++</td><td>Incrémentation</td><td class="font-mono">int x=5; x++; // x devient 6</td></tr>
                                    <tr><td class="font-mono">--</td><td>Décrémentation</td><td class="font-mono">int y=8; y--; // y devient 7</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="bg-slate-800 text-white p-4 rounded-xl">
                            <p class="font-semibold mb-2">🎯 Exemple concret :</p>
                            <pre><code>int prixUnitaire = 2500;
int quantite = 4;
double remise = 0.1;  // 10%
double totalBrut = prixUnitaire * quantite;
double totalNet = totalBrut - (totalBrut * remise);
Console.WriteLine($"Total après remise : {totalNet} FCFA");</code></pre>
                        </div>
                    `
                },
                {
                    title: "⚖️ Opérateurs de comparaison & logique",
                    content: `
                        <p class="mb-3">Ils comparent des valeurs et retournent un booléen (<span class="font-mono">true</span> ou <span class="font-mono">false</span>). Indispensables dans les conditions.</p>
                        <div class="grid md:grid-cols-2 gap-5 mb-4">
                            <div class="bg-white/70 p-4 rounded-xl shadow-sm">
                                <h3 class="font-bold text-indigo-800">🔍 Comparaison</h3>
                                <ul class="list-disc pl-5 space-y-1 mt-2">
                                    <li><span class="font-mono">==</span> égal à : <span class="font-mono">3 == 3</span> → true</li>
                                    <li><span class="font-mono">!=</span> différent : <span class="font-mono">5 != 3</span> → true</li>
                                    <li><span class="font-mono">&lt;</span> plus petit que</li>
                                    <li><span class="font-mono">&gt;</span> plus grand que</li>
                                    <li><span class="font-mono">&lt;=</span> inférieur ou égal</li>
                                    <li><span class="font-mono">&gt;=</span> supérieur ou égal</li>
                                </ul>
                            </div>
                            <div class="bg-white/70 p-4 rounded-xl shadow-sm">
                                <h3 class="font-bold text-indigo-800">🧠 Logique (booléenne)</h3>
                                <ul class="list-disc pl-5 space-y-1 mt-2">
                                    <li><span class="font-mono">&&</span> ET logique : vrai si les deux conditions sont vraies</li>
                                    <li><span class="font-mono">||</span> OU logique : vrai si au moins une condition est vraie</li>
                                    <li><span class="font-mono">!</span> NON logique : inverse la valeur (true → false)</li>
                                </ul>
                            </div>
                        </div>
                        <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-lg">
                            <p class="font-medium">📌 Exemple : vérifier âge et autorisation</p>
                            <pre><code>int age = 19;
bool aParent = true;
if (age >= 18 && aParent) {
    Console.WriteLine("Accès autorisé");
} else {
    Console.WriteLine("Accès refusé");
}</code></pre>
                        </div>
                    `
                },
                {
                    title: "✍️ Opérateurs d'affectation composée",
                    content: `
                        <p>Ils permettent de combiner une opération arithmétique avec une affectation, pour un code plus concis.</p>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 my-5">
                            <div class="bg-slate-100 p-3 rounded-lg text-center"><span class="font-mono font-bold">+=</span><br> a += 5  ↔ a = a+5</div>
                            <div class="bg-slate-100 p-3 rounded-lg text-center"><span class="font-mono font-bold">-=</span><br> b -= 2  ↔ b = b-2</div>
                            <div class="bg-slate-100 p-3 rounded-lg text-center"><span class="font-mono font-bold">*=</span><br> c *= 3  ↔ c = c*3</div>
                            <div class="bg-slate-100 p-3 rounded-lg text-center"><span class="font-mono font-bold">/=</span><br> d /= 4  ↔ d = d/4</div>
                            <div class="bg-slate-100 p-3 rounded-lg text-center"><span class="font-mono font-bold">%=</span><br> e %= 2  ↔ e = e%2</div>
                        </div>
                        <pre><code>int points = 100;
points += 25;   // points devient 125
points *= 2;    // 250
Console.WriteLine(points); // 250</code></pre>
                    `
                },
                {
                    title: "❓ Opérateur ternaire (?:) - Le if compact",
                    content: `
                        <p>C'est le seul opérateur qui prend trois opérandes : <span class="font-mono highlight">condition ? valeur_si_vrai : valeur_si_faux</span>. Il permet d'écrire un if/else simple en une ligne.</p>
                        <div class="grid md:grid-cols-2 gap-6 mt-4">
                            <div>
                                <p class="font-semibold">📘 Syntaxe classique :</p>
                                <pre><code>int age = 20;
string statut;
if (age >= 18) statut = "Majeur";
else statut = "Mineur";</code></pre>
                            </div>
                            <div>
                                <p class="font-semibold">⚡ Avec ternaire :</p>
                                <pre><code>int age = 20;
string statut = (age >= 18) ? "Majeur" : "Mineur";
Console.WriteLine(statut); // Majeur</code></pre>
                            </div>
                        </div>
                        <div class="mt-5 p-3 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-xl">
                            <p>🎯 Autre exemple: afficher une réduction automatique</p>
                            <pre><code>double montant = 4500;
double remise = (montant > 5000) ? 0.15 : 0.05;
Console.WriteLine($"Remise de {remise * 100}%"); // 5%</code></pre>
                        </div>
                    `
                },
                {
                    title: "🧪 Exercices pratiques (réflexe code)",
                    content: `
                        <p class="mb-3">Teste ta compréhension ! Essaie de prédire le résultat de chaque extrait.</p>
                        <div class="space-y-4">
                            <div class="bg-white rounded-xl p-4 shadow">
                                <p class="font-mono">int a = 10, b = 3;<br>int result = a % b + a / b;<br>Console.WriteLine(result);</p>
                                <button class="show-answer text-indigo-600 text-sm underline mt-2">Afficher réponse</button>
                                <p class="answer hidden mt-2 text-green-700 font-medium">🔍 Réponse : 10 % 3 = 1, 10/3 = 3 (division entière), total = 4</p>
                            </div>
                            <div class="bg-white rounded-xl p-4 shadow">
                                <p class="font-mono">bool estChaud = true;<br>bool estPluvieux = false;<br>bool sortir = estChaud && !estPluvieux;<br>Console.WriteLine(sortir);</p>
                                <button class="show-answer text-indigo-600 text-sm underline mt-2">Afficher réponse</button>
                                <p class="answer hidden mt-2 text-green-700 font-medium">☀️ Réponse : true (estChaud true ET !false = true → sortir = true)</p>
                            </div>
                            <div class="bg-white rounded-xl p-4 shadow">
                                <p class="font-mono">int note = 65;<br>string appreciation = note >= 70 ? "Bien" : "Peut mieux faire";<br>Console.WriteLine(appreciation);</p>
                                <button class="show-answer text-indigo-600 text-sm underline mt-2">Afficher réponse</button>
                                <p class="answer hidden mt-2 text-green-700 font-medium">📝 Réponse : "Peut mieux faire" (car 65 n'est pas >= 70)</p>
                            </div>
                        </div>
                        <p class="text-sm mt-5 bg-gray-100 p-3 rounded-lg">💡 Petit conseil : En C#, la division entre deux entiers donne un entier (troncature). Pour un résultat décimal, utilisez au moins un opérande double.</p>
                    `
                }
            ]
        };

        // Construction des slides (slide 0: Titre, slide 1: Objectifs, puis les contentSlides)
        let slides = [];

        // Slide titre
        slides.push({
            type: "title",
            html: `
                <div class="slide-card bg-white/90 backdrop-blur-sm p-6 md:p-10 border border-white/40 text-center">
                    <div class="mb-6 inline-block bg-indigo-100 rounded-full p-3"><span class="text-5xl">🎓</span></div>
                    <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${lessonData.title}</h1>
                    <p class="text-gray-600 mt-4 text-lg max-w-xl mx-auto">Cours d'initiation au C# - Classe Développement Web (Cameroun)</p>
                    <div class="mt-8 flex justify-center gap-4 text-sm text-slate-500">
                        <span>🧑‍🏫 Enseignant: M. Alain</span>
                        <span>⏱️ Durée: 1h30</span>
                    </div>
                    <div class="mt-12 w-16 h-1 bg-indigo-300 mx-auto rounded-full"></div>
                    <p class="mt-6 text-slate-400">Appuyez sur "Suivant" pour démarrer</p>
                </div>
            `
        });

        // Slide objectifs
        let objectivesHtml = `<div class="slide-card bg-white/90 backdrop-blur-sm p-6 md:p-8"><h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b border-indigo-200 pb-3 mb-5">🎯 Objectifs pédagogiques</h2><ul class="space-y-4 text-lg">`;
        lessonData.objectives.forEach(obj => {
            objectivesHtml += `<li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✓</span> <span>${obj}</span></li>`;
        });
        objectivesHtml += `</ul><div class="mt-8 bg-indigo-50 p-4 rounded-xl italic text-slate-600">À la fin de cette leçon, vous saurez manipuler les opérateurs pour contrôler la logique et les calculs dans vos programmes C#.</div></div>`;
        slides.push({ type: "objectives", html: objectivesHtml });

        // Ajouter les slides de contenu
        lessonData.contentSlides.forEach((slide, idx) => {
            slides.push({
                type: "content",
                title: slide.title,
                html: `<div class="slide-card bg-white/95 backdrop-blur-sm p-6 md:p-8"><h2 class="text-2xl font-bold text-slate-800 mb-5 flex items-center gap-2"><span class="bg-indigo-200 w-8 h-8 rounded-full inline-flex items-center justify-center text-indigo-800">${idx+1}</span> ${slide.title}</h2><div>${slide.content}</div></div>`
            });
        });

        let currentIndex = 0;
        let $container = $("#slides-container");

        function renderSlide(index) {
            if (index < 0) index = 0;
            if (index >= slides.length) index = slides.length - 1;
            currentIndex = index;
            $container.empty();
            $container.append(slides[currentIndex].html);
            $("#currentSlideIdx").text(currentIndex + 1);
            $("#totalSlides").text(slides.length);
            // Gestion des boutons réponse (exercices)
            $(".show-answer").off("click").on("click", function() {
                $(this).siblings(".answer").toggleClass("hidden");
            });
            // Scroll en haut pour mobile
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // Navigation
        $("#nextBtn").on("click", function() {
            if (currentIndex < slides.length - 1) {
                renderSlide(currentIndex + 1);
            }
        });
        $("#prevBtn").on("click", function() {
            if (currentIndex > 0) {
                renderSlide(currentIndex - 1);
            }
        });

        // Mise à jour état des boutons selon la slide
        function updateButtons() {
            if (currentIndex === 0) $("#prevBtn").prop("disabled", true).addClass("opacity-50");
            else $("#prevBtn").prop("disabled", false).removeClass("opacity-50");
            if (currentIndex === slides.length - 1) $("#nextBtn").text("Terminé ✓").removeClass("bg-indigo-600").addClass("bg-green-600");
            else $("#nextBtn").text("Suivant →").removeClass("bg-green-600").addClass("bg-indigo-600");
        }

        // Sur render, on appelle updateButtons
        const originalRender = renderSlide;
        window.renderSlide = function(idx) {
            originalRender(idx);
            updateButtons();
        };
        renderSlide = function(idx) {
            originalRender(idx);
            updateButtons();
        };
        // override final
        renderSlide(0);
        window.renderSlide = renderSlide;

        // Support raccourci clavier (flèches)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowRight") {
                $("#nextBtn").click();
            } else if (e.key === "ArrowLeft") {
                $("#prevBtn").click();
            }
        });
    </script>
    <!-- Dessin simplifié / diagramme d'opérateur (pour illustrer sans image externe) on l'ajoute dans le premier slide de contenu arithmétique via code? déjà inclus. 
    aucun besoin d'image externe, tout est texte et tableaux. Mention mathjax (l'utiliserait si besoin mais pas requis ici)-->
    <footer class="text-center text-slate-400 text-xs py-6 border-t border-slate-200 max-w-5xl mx-auto mt-8">
        📘 Cours conçu pour les apprenants camerounais · Programmation C# · Opérateurs essentiels · Tous niveaux
    </footer>
</body>
</html>
