<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 4 : Types de base en C# | Initiation au C#</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour les formules mathématiques (si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles personnalisés pour les slides et transitions douces */
        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f6 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .slide-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
        }
        .slide-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
        }
        .nav-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .badge-pill {
            background-color: #2c3e66;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
        /* code simple style */
        code {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }
        pre {
            background-color: #0f172a;
            color: #f1f5f9;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 0.75rem 0;
        }
        .lesson-icon {
            background: #2563eb20;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="antialiased">

    <div class="slide-container px-4 py-6 md:py-10">
        <!-- Conteneur principal des slides -->
        <div id="slidesWrapper" class="relative">
            <!-- Slide actuel injecté par jQuery -->
            <div id="currentSlide" class="slide-card shadow-2xl overflow-hidden">
                <!-- contenu dynamique -->
            </div>

            <!-- Navigation + indicateurs -->
            <div class="flex flex-wrap justify-between items-center mt-8 gap-4">
                <button id="prevBtn" class="nav-btn bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-6 rounded-full shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                    ← Précédent
                </button>
                <div class="flex flex-col items-center gap-2">
                    <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
                    <div class="w-64 bg-gray-300 rounded-full h-2 overflow-hidden">
                        <div id="progressFill" class="progress-bar h-full bg-blue-600 rounded-full" style="width: 0%;"></div>
                    </div>
                    <span id="slideCounter" class="text-sm text-gray-600 font-medium"></span>
                </div>
                <button id="nextBtn" class="nav-btn bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-full shadow-md transition flex items-center gap-2">
                    Suivant →
                </button>
            </div>
        </div>
    </div>

    <script>
        // Définition des slides pour la leçon 4: "Types et opérations de base" (les objectifs de la lesson4)
        // D'après le fichier JSON, la lesson4 correspond à "lesson4" dans le chap2: 
        // Objectifs: Utiliser les entiers, maîtriser décimaux (float, double, decimal), utiliser bool, char et littéraux.
        // Mais pour une leçon complète et pédagogique, nous allons créer une série de slides :
        // Slide 0: Titre + intro C# types
        // Slide 1: Objectifs d'apprentissage (d'après lesson4)
        // Slide 2: Les entiers (int, long, short, byte) + exemples
        // Slide 3: Décimaux: float, double, decimal + précision
        // Slide 4: booléens et caractères (bool, char)
        // Slide 5: littéraux et bonnes pratiques + petits conseils
        // Slide 6: Exercice rapide / mise en pratique (interactif)
        
        const slidesData = [
            {
                type: "title",
                title: "🧩 Les types fondamentaux en C#",
                subtitle: "Leçon 4 : Maîtriser les types de données et les opérations de base",
                badge: "Initiation au C# • Programmation",
                emoji: "📘"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "Utiliser les entiers signés et non signés : int, long, short, byte",
                    "Maîtriser les types décimaux : float, double, decimal (choix selon précision)",
                    "Manipuler le booléen (bool) et les caractères (char)",
                    "Comprendre les littéraux numériques, caractères spéciaux et bonnes pratiques"
                ]
            },
            {
                type: "content",
                title: "🔢 Les entiers (Integer types)",
                icon: "1️⃣",
                content: `
                    <p class="mb-3">En C#, les entiers représentent des nombres sans partie décimale. Voici les plus courants :</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="bg-blue-50 p-4 rounded-xl"><span class="font-mono font-bold">int</span> (32 bits) : de -2 147 483 648 à 2 147 483 647<br>✅ Le plus utilisé pour les compteurs.</div>
                        <div class="bg-blue-50 p-4 rounded-xl"><span class="font-mono font-bold">long</span> (64 bits) : très grands nombres, suffixe <code>L</code> ex: <code>10000000000L</code></div>
                        <div class="bg-blue-50 p-4 rounded-xl"><span class="font-mono font-bold">short</span> (16 bits) : de -32 768 à 32 767, économique en mémoire.</div>
                        <div class="bg-blue-50 p-4 rounded-xl"><span class="font-mono font-bold">byte</span> (8 bits) : de 0 à 255 (non signé). Idéal pour les données binaires.</div>
                    </div>
                    <pre><code>int age = 22;\nlong populationMonde = 8_000_000_000L;\nshort temperature = -15;\nbyte niveau = 255;\n\nConsole.WriteLine($"Age: {age}, Population: {populationMonde}");</code></pre>
                    <p class="text-sm text-gray-600 mt-2">💡 Astuce : depuis C# 7, on peut utiliser <code>_</code> comme séparateur visuel : <code>1_000_000</code></p>
                `
            },
            {
                type: "content",
                title: "💧 Nombres décimaux : float, double, decimal",
                icon: "2️⃣",
                content: `
                    <p class="mb-3">Pour les nombres à virgule, trois types selon la précision et l’utilisation :</p>
                    <ul class="list-disc pl-6 space-y-2 mb-4">
                        <li><strong>float</strong> (32 bits) : précision ~7 chiffres. Suffixe <code>f</code>. Ex: <code>float pi = 3.14f;</code></li>
                        <li><strong>double</strong> (64 bits) : précision ~15-16 chiffres. C'est le type par défaut pour les décimaux. Ex: <code>double prix = 19.99;</code></li>
                        <li><strong>decimal</strong> (128 bits) : précision élevée (28-29 chiffres). Idéal pour l'argent ou calculs financiers. Suffixe <code>m</code>. Ex: <code>decimal solde = 1249.99m;</code></li>
                    </ul>
                    <pre><code>float hauteur = 1.75f;\ndouble racineCarree = Math.Sqrt(2);  // ≈1.41421356237\ndecimal tauxTVA = 0.196m;\n\nConsole.WriteLine($"Hauteur: {hauteur}, TVA: {tauxTVA}");</code></pre>
                    <div class="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400 mt-2">⚠️ Attention: <code>float</code> et <code>double</code> peuvent causer des erreurs d'arrondi. Pour les calculs monétaires, utilisez <code>decimal</code>.</div>
                `
            },
            {
                type: "content",
                title: "✅ Le booléen (bool) et les caractères (char)",
                icon: "3️⃣",
                content: `
                    <div class="grid md:grid-cols-2 gap-5">
                        <div class="bg-indigo-50 p-4 rounded-2xl">
                            <h3 class="font-bold text-lg flex items-center gap-2"><span class="text-2xl">🔘</span> booléen (bool)</h3>
                            <p>Représente <code>true</code> (vrai) ou <code>false</code> (faux). Utilisé dans les conditions et boucles.</p>
                            <pre class="mt-2"><code>bool estConnecte = true;\nbool estAdulte = age >= 18;\nif (estConnecte) { Console.WriteLine("Bienvenue"); }</code></pre>
                        </div>
                        <div class="bg-purple-50 p-4 rounded-2xl">
                            <h3 class="font-bold text-lg flex items-center gap-2"><span class="text-2xl">🔤</span> caractère (char)</h3>
                            <p>Stocke un unique caractère Unicode entre quotes simples <code>' '</code>.</p>
                            <pre class="mt-2"><code>char premiereLettre = 'C';\nchar symboleEuro = '€';\nchar escape = '\\n';   // saut de ligne\nConsole.WriteLine($"Initiale: {premiereLettre}");</code></pre>
                        </div>
                    </div>
                    <p class="mt-4 text-sm text-gray-600">📌 Les caractères spéciaux (échappement) : <code>\\'</code> <code>\\"</code> <code>\\\\</code> <code>\\n</code> <code>\\t</code> etc.</p>
                `
            },
            {
                type: "content",
                title: "🏷️ Littéraux et initialisation",
                icon: "4️⃣",
                content: `
                    <p>Un <strong>littéral</strong> est une valeur écrite directement dans le code. C# supporte plusieurs notations :</p>
                    <div class="space-y-3 mt-3">
                        <div class="border rounded-xl p-3"><span class="font-mono font-bold">Littéraux entiers</span> : décimal (<code>255</code>), hexadécimal (<code>0xFF</code>), binaire (<code>0b11111111</code>)</div>
                        <div class="border rounded-xl p-3"><span class="font-mono font-bold">Littéraux réels</span> : <code>3.14</code> (double), <code>3.14f</code> (float), <code>3.14m</code> (decimal)</div>
                        <div class="border rounded-xl p-3"><span class="font-mono font-bold">Caractère</span> : <code>'A'</code>, <code>'\\u0061'</code> (unicode)</div>
                        <div class="border rounded-xl p-3"><span class="font-mono font-bold">Chaîne</span> : <code>"Bonjour C#"</code> ou verbatim <code>@"C:\\dossier"</code></div>
                    </div>
                    <pre class="mt-3"><code>int hexa = 0x1A;      // 26 en décimal\nint binaire = 0b1010; // 10\nfloat piFloat = 3.14159f;\ndecimal prix = 99.99m;\nchar lettre = '\\u0043'; // 'C'</code></pre>
                    <p class="text-green-700 bg-green-50 p-2 rounded mt-2">✨ Conseil : Utilisez des noms explicites et choisissez le bon type pour éviter les erreurs.</p>
                `
            },
            {
                type: "exercise",
                title: "🧪 Petit exercice interactif",
                question: "❓ Que va afficher ce code C# ?<br> <code>int a = 10; double b = 3; Console.WriteLine(a / b);</code>",
                options: ["3", "3.33333333333333", "3.0", "Erreur de compilation"],
                correct: 1,
                explanation: "L'opération int / double donne un résultat double (promotion implicite). 10 / 3 = 3.333... affiché sous forme décimale."
            }
        ];
        
        let currentIndex = 0;
        const totalSlides = slidesData.length;

        function renderSlide(index) {
            const slide = slidesData[index];
            let html = '';
            
            // En-tête commun avec indicateur de progression
            if (slide.type === 'title') {
                html = `
                    <div class="p-6 md:p-10 text-center">
                        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-100 text-blue-700 text-4xl mb-5">${slide.emoji}</div>
                        <div class="badge-pill mb-4">${slide.badge}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-xl text-gray-600 mt-4 max-w-2xl mx-auto">${slide.subtitle}</p>
                        <div class="mt-8 flex justify-center">
                            <div class="bg-gray-100 p-3 rounded-full text-gray-500 text-sm">Leçon 4 · Les bases des types C#</div>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === 'objectifs') {
                html = `
                    <div class="p-6 md:p-10">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="lesson-icon text-blue-600 text-2xl">🎯</div>
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${slide.title}</h2>
                        </div>
                        <ul class="space-y-4">
                            ${slide.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700"><span class="text-green-500 text-xl">✓</span> <span class="text-lg">${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-10 bg-blue-50 rounded-2xl p-4 border border-blue-200">
                            <p class="italic">💪 À la fin de cette leçon, vous saurez choisir le bon type pour chaque situation.</p>
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'content') {
                html = `
                    <div class="p-6 md:p-10">
                        <div class="flex flex-wrap items-center gap-3 mb-5 border-b pb-3 border-gray-200">
                            <span class="text-3xl">${slide.icon}</span>
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${slide.title}</h2>
                        </div>
                        <div class="prose prose-lg max-w-none text-gray-700">
                            ${slide.content}
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'exercise') {
                html = `
                    <div class="p-6 md:p-10">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-3xl">🧠</span>
                            <h2 class="text-2xl font-bold">${slide.title}</h2>
                        </div>
                        <div class="bg-amber-50 p-5 rounded-2xl mb-6">
                            <p class="text-gray-800 text-lg font-medium">${slide.question}</p>
                        </div>
                        <div id="quizOptions" class="space-y-3 mb-6">
                            ${slide.options.map((opt, idx) => `
                                <div class="quiz-option bg-white border border-gray-300 rounded-xl p-3 flex items-center gap-3 cursor-pointer hover:bg-gray-50 transition" data-opt-index="${idx}">
                                    <span class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">${String.fromCharCode(65+idx)}</span>
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div id="quizFeedback" class="text-sm italic p-3 rounded-lg hidden"></div>
                        <button id="validateQuiz" class="mt-3 bg-blue-600 text-white px-5 py-2 rounded-full shadow hover:bg-blue-700 transition">Valider ma réponse</button>
                        <p class="text-xs text-gray-400 mt-4">📌 Astuce : la division entre int et double donne un résultat décimal.</p>
                    </div>
                `;
            }
            
            // Ajout dans le conteneur
            $("#currentSlide").fadeOut(150, function() {
                $(this).html(html);
                // Si slide d'exercice, attacher événements
                if (slide.type === 'exercise') {
                    attachQuizEvents(slide.correct, slide.explanation);
                }
                $(this).fadeIn(200);
            });
            
            // Mettre à jour les indicateurs et progress bar
            updateProgressAndDots(index);
        }
        
        function attachQuizEvents(correctIdx, explanation) {
            let selected = null;
            $(".quiz-option").off("click").on("click", function() {
                $(".quiz-option").removeClass("bg-blue-100 border-blue-500");
                $(this).addClass("bg-blue-100 border-blue-500");
                selected = $(this).data("opt-index");
            });
            $("#validateQuiz").off("click").on("click", function() {
                if (selected === undefined) {
                    $("#quizFeedback").removeClass("hidden").addClass("bg-yellow-100 text-yellow-800").html("⚠️ Veuillez sélectionner une réponse d'abord.");
                    return;
                }
                if (selected == correctIdx) {
                    $("#quizFeedback").removeClass("hidden bg-yellow-100 text-yellow-800 bg-red-100 text-red-800").addClass("bg-green-100 text-green-800")
                        .html(`✅ Correct ! ${explanation}`);
                } else {
                    $("#quizFeedback").removeClass("hidden").addClass("bg-red-100 text-red-800")
                        .html(`❌ Oops, ce n'est pas la bonne réponse. ${explanation}`);
                }
            });
        }
        
        function updateProgressAndDots(current) {
            const percent = ((current+1) / totalSlides) * 100;
            $("#progressFill").css("width", `${percent}%`);
            $("#slideCounter").text(`Slide ${current+1} / ${totalSlides}`);
            
            // génération des dots
            let dotsHtml = '';
            for(let i=0; i<totalSlides; i++) {
                let activeClass = (i === current) ? 'bg-blue-600 w-8' : 'bg-gray-400 w-2';
                dotsHtml += `<button class="dot-nav h-2 rounded-full ${activeClass} transition-all mx-1 hover:bg-blue-400" data-index="${i}"></button>`;
            }
            $("#dotsContainer").html(dotsHtml);
            $(".dot-nav").on("click", function() {
                let idx = parseInt($(this).data("index"));
                if(!isNaN(idx) && idx !== currentIndex && idx>=0 && idx<totalSlides) {
                    currentIndex = idx;
                    renderSlide(currentIndex);
                }
            });
            
            // gestion état boutons
            $("#prevBtn").prop("disabled", current === 0);
            if(current === 0) $("#prevBtn").addClass("opacity-50");
            else $("#prevBtn").removeClass("opacity-50");
            
            $("#nextBtn").text(current === totalSlides-1 ? "Terminer ✓" : "Suivant →");
        }
        
        function nextSlide() {
            if(currentIndex < totalSlides-1) {
                currentIndex++;
                renderSlide(currentIndex);
            } else {
                // Fin du cours
                alert("🎉 Félicitations ! Vous avez terminé la leçon sur les types de base. Continuez à pratiquer !");
                // Optionnel: revenir au début ou message
            }
        }
        
        function prevSlide() {
            if(currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        }
        
        $(document).ready(function() {
            renderSlide(0);
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
        });
        
        // Gestion clavier (flèches)
        $(document).on("keydown", function(e) {
            if(e.key === "ArrowRight") nextSlide();
            if(e.key === "ArrowLeft") prevSlide();
        });
        
        // Petite animation supplémentaire pour rendre les slides agréables
    </script>
    <!-- Pied de page simple -->
    <footer class="text-center text-gray-500 text-xs py-6 border-t mt-6 max-w-6xl mx-auto">
        📖 Cours d'initiation C# - Enseignant: Développement Web Cameroun | Tous niveaux • Support interactif
    </footer>
</body>
</html>
