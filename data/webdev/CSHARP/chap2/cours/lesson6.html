<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 6 : Variables et constantes en C# | Initiation au C#</title>
  <!-- Tailwind CSS CDN + base interprétation douce -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (formules mathématiques si besoin) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions douces pour les slides */
    .slide-container {
      transition: transform 0.3s ease-in-out, opacity 0.2s;
    }
    .slide {
      transition: opacity 0.25s ease;
    }
    /* Scroll personnalisé discret */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    body {
      background: #f1f5f9;
    }
    /* amélioration lisibilité sur petits écrans */
    @media (max-width: 640px) {
      .card-padding {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      h2 {
        font-size: 1.5rem;
      }
    }
    .code-block {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 1rem;
      padding: 1rem;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    .badge {
      background: #3b82f6;
      color: white;
      font-size: 0.7rem;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      display: inline-block;
    }
    .slide-nav-btn {
      transition: all 0.2s;
    }
    .slide-nav-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body class="font-sans antialiased">

  <main class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- carte principale conteneur des slides -->
    <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
      <!-- en-tête avec titre matière + progression -->
      <div class="bg-gradient-to-r from-indigo-700 to-blue-700 px-5 py-4 md:py-5 text-white">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
          <div>
            <p class="text-xs uppercase tracking-wider opacity-80">Initiation au C# – Classe : Développement Web</p>
            <h1 class="text-xl md:text-2xl font-bold mt-1">Manipulation des variables & constantes</h1>
          </div>
          <div class="text-sm bg-white/20 rounded-full px-3 py-1 self-start sm:self-center">
            Leçon 6 · Chap 2
          </div>
        </div>
        <!-- indicateur slide -->
        <div class="mt-3 flex justify-between items-center text-xs text-indigo-100">
          <span id="slideCounter">Slide 1 / <span id="totalSlides">0</span></span>
          <div class="flex gap-1">
            <span class="w-2 h-2 rounded-full bg-white/40" id="dot-indicator"></span>
          </div>
        </div>
      </div>

      <!-- zone slides dynamique -->
      <div id="slidesWrapper" class="relative overflow-hidden min-h-[550px] md:min-h-[600px]">
        <div id="slideContainer" class="slide-container flex transition-transform duration-300 ease-out">
          <!-- Les slides seront injectées ici par jQuery -->
        </div>
      </div>

      <!-- navigation + boutons -->
      <div class="px-5 py-4 bg-gray-50 border-t border-gray-200 flex justify-between items-center">
        <button id="prevSlide" class="slide-nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2 px-5 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition">
          ← Précédent
        </button>
        <div class="flex gap-2">
          <span id="currentSlideDisplay" class="text-sm bg-gray-200 px-3 py-1 rounded-full">1</span>
          <span class="text-sm text-gray-500">/</span>
          <span id="totalDisplay" class="text-sm bg-gray-200 px-3 py-1 rounded-full">0</span>
        </div>
        <button id="nextSlide" class="slide-nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition">
          Suivant →
        </button>
      </div>
    </div>

    <!-- petit footer explicatif -->
    <div class="text-center text-xs text-gray-500 mt-6">
      📘 Leçon basée sur le programme officiel – Cameroun | Cours interactif en slides
    </div>
  </main>

  <script>
    // ----- Définition du contenu des slides pour la LESSON6 (chap2, lesson6)
    // Titre de la lesson: "Déclaration de variables, var, const, readonly et portée"
    // Contenu officiel: D'après le JSON: "Déclarer des variables avec var (inférence de type)",
    // "Utiliser const pour les constantes et readonly", "Comprendre la portée des variables (locale, globale/classe)"
    // Nous allons créer 4 slides: Slide1 titre, Slide2 objectifs, Slide3 contenu concept+exemples, Slide4 portée+bonnes pratiques
    
    const slidesData = [
      {
        type: "title",
        title: "📌 Les variables et constantes en C#",
        subtitle: "Maîtriser la déclaration, l'inférence de type, les constantes et la portée",
        icon: "🧠"
      },
      {
        type: "objectives",
        title: "🎯 Objectifs d'apprentissage",
        objectives: [
          "✅ Déclarer des variables avec inférence de type (var) et typage explicite",
          "✅ Utiliser const pour les constantes immuables et readonly pour les champs d'instance",
          "✅ Comprendre la portée des variables : locale, de bloc, et au niveau de la classe",
          "✅ Différencier les bonnes pratiques selon le contexte"
        ]
      },
      {
        type: "content",
        title: "🔍 1. Variables : typage explicite vs 'var'",
        contentBlocks: [
          {
            kind: "text",
            value: "En C#, chaque variable possède un type défini à la compilation. On peut déclarer explicitement le type (<span class='font-mono text-indigo-700'>int age = 25;</span>) ou utiliser le mot-clé <span class='font-bold text-indigo-800'>var</span> : le compilateur déduit le type automatiquement."
          },
          {
            kind: "code",
            value: `// Typage explicite
int nombreEtudiants = 42;
string nomCours = "Développement Web";
bool estActif = true;

// Avec var (inférence de type)
var note = 18.5;      // double
var message = "Bonjour";  // string
var compteur = 100;   // int

// ⚠️ var nécessite une initialisation explicite`
          },
          {
            kind: "text",
            value: "💡 <strong>Bonnes pratiques :</strong> utilisez <code>var</code> quand le type est évident (ex: instanciation d'objet). Privilégiez le type explicite pour la clarté des API publiques."
          }
        ]
      },
      {
        type: "content",
        title: "📐 2. Constantes (const) et Readonly",
        contentBlocks: [
          {
            kind: "text",
            value: "Les <strong>constantes</strong> (<span class='font-mono'>const</span>) sont évaluées à la compilation et ne peuvent jamais changer. <strong>readonly</strong> permet d'initialiser une valeur au moment de la déclaration ou dans le constructeur (plus flexible)."
          },
          {
            kind: "code",
            value: `const double PI = 3.14159;
const string NOM_ECOLE = "Lycée Moderne de Douala";

// readonly (souvent dans une classe)
public class Etudiant
{
    public readonly int AnneeInscription;
    public Etudiant(int annee)
    {
        AnneeInscription = annee; // assignation possible uniquement dans le constructeur
    }
}

// Utilisation
Console.WriteLine(PI);         // constante figée
var eleve = new Etudiant(2025);
// eleve.AnneeInscription = 2026; // ERREUR : readonly ne peut être modifié`
          },
          {
            kind: "text",
            value: "📌 <strong>Différence clé :</strong> const est implicitement statique et doit être connu à la compilation ; readonly est une variable d'instance (ou static readonly) qui peut être différente selon l'instance."
          }
        ]
      },
      {
        type: "content",
        title: "🌍 3. Portée des variables (scope)",
        contentBlocks: [
          {
            kind: "text",
            value: "La <strong>portée</strong> définit où une variable est accessible. On distingue :"
          },
          {
            kind: "list",
            items: [
              "📍 <strong>Locale</strong> : déclarée dans une méthode, accessible uniquement dans cette méthode.",
              "📍 <strong>De bloc</strong> : entre accolades { }, par exemple dans une boucle ou un if.",
              "📍 <strong>Au niveau classe (champ)</strong> : accessible dans toutes les méthodes de la classe (selon modificateur).",
              "📍 <strong>Statique</strong> : partagée entre toutes les instances."
            ]
          },
          {
            kind: "code",
            value: `class ExemplePortee
{
    int niveauClasse = 10;  // champ d'instance (accessible partout dans la classe)

    void Afficher()
    {
        int variableLocale = 5;   // locale à la méthode
        if (variableLocale > 0)
        {
            string message = "Dans le if";   // portée du bloc if
            Console.WriteLine(message);
        }
        // Console.WriteLine(message); // ERREUR : message n'existe pas ici
        Console.WriteLine(niveauClasse); // OK
    }
    
    static void Main()
    {
        // variableLocale n'existe pas ici (hors contexte)
        var obj = new ExemplePortee();
        obj.Afficher();
    }
}`
          }
        ]
      },
      {
        type: "summary",
        title: "✨ Récapitulatif & Astuces pratiques",
        tips: [
          "✔️ Toujours initialiser les variables locales avant utilisation.",
          "✔️ Utiliser const pour des valeurs universelles (taux de TVA, conversions).",
          "✔️ Pour des valeurs qui dépendent de l'instance ou de l'exécution → readonly.",
          "✔️ Évitez de masquer une variable de portée supérieure (ex: même nom qu'un champ).",
          "✔️ var ne rend pas votre code 'non typé' ; le typage reste fort."
        ],
        conclusion: "Maîtriser la déclaration et la portée des variables est fondamental pour écrire du code clair et éviter les bugs."
      }
    ];
    
    let currentSlideIndex = 0;
    let totalSlides = slidesData.length;
    
    // Mise à jour affichage compteurs et boutons
    function updateNavigation() {
      $("#currentSlideDisplay").text(currentSlideIndex + 1);
      $("#totalDisplay").text(totalSlides);
      $("#slideCounter").html(`Slide ${currentSlideIndex+1} / ${totalSlides}`);
      // désactiver boutons si besoin
      if (currentSlideIndex === 0) {
        $("#prevSlide").prop("disabled", true);
      } else {
        $("#prevSlide").prop("disabled", false);
      }
      if (currentSlideIndex === totalSlides - 1) {
        $("#nextSlide").prop("disabled", true);
      } else {
        $("#nextSlide").prop("disabled", false);
      }
      // points indicateurs simples (on peut afficher un petit indicateur)
      let dotsHtml = "";
      for (let i = 0; i < totalSlides; i++) {
        dotsHtml += `<span class="w-2 h-2 rounded-full mx-0.5 ${i === currentSlideIndex ? 'bg-white' : 'bg-white/40'} transition-all"></span>`;
      }
      $("#dot-indicator").html(dotsHtml);
    }
    
    // Fonction pour générer un bloc de code propre, le rendre accessible + MathJax si besoin
    function renderContentBlock(block) {
      if (block.kind === "text") {
        return `<p class="text-gray-800 leading-relaxed mb-4">${block.value}</p>`;
      } else if (block.kind === "code") {
        return `<div class="code-block mb-5 text-sm md:text-base"><pre class="whitespace-pre-wrap break-words font-mono">${escapeHtml(block.value)}</pre></div>`;
      } else if (block.kind === "list") {
        let itemsHtml = block.items.map(item => `<li class="mb-2 flex items-start gap-2"><span class="text-indigo-500 text-lg leading-5">▹</span> <span class="text-gray-700">${item}</span></li>`).join('');
        return `<ul class="list-none space-y-1 mb-5">${itemsHtml}</ul>`;
      }
      return "";
    }
    
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // Génération du HTML d'un slide
    function renderSlide(slide, idx) {
      if (slide.type === "title") {
        return `
          <div class="slide w-full flex-shrink-0 px-5 py-8 md:py-12 flex flex-col items-center justify-center text-center bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl min-h-[500px]">
            <div class="text-6xl mb-5">${slide.icon || "📦"}</div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-indigo-900 mb-3">${slide.title}</h2>
            <p class="text-gray-600 text-lg max-w-lg mx-auto">${slide.subtitle || "Découvrez les fondamentaux essentiels"}</p>
            <div class="mt-8 flex flex-wrap gap-2 justify-center">
              <span class="badge bg-indigo-200 text-indigo-800">C# .NET</span>
              <span class="badge bg-blue-200 text-blue-800">Variables</span>
              <span class="badge bg-emerald-200 text-emerald-800">Portée</span>
            </div>
          </div>
        `;
      } 
      else if (slide.type === "objectives") {
        let objItems = slide.objectives.map(obj => `<li class="flex gap-3 items-start mb-3"><span class="text-indigo-600 text-xl">📌</span><span class="text-gray-700">${obj}</span></li>`).join('');
        return `
          <div class="slide w-full flex-shrink-0 px-5 py-8 md:py-10 bg-white min-h-[500px]">
            <h2 class="text-2xl font-bold border-l-8 border-indigo-500 pl-4 text-indigo-800 mb-6">${slide.title}</h2>
            <ul class="space-y-2 mt-2">
              ${objItems}
            </ul>
            <div class="mt-8 p-4 bg-indigo-50 rounded-2xl italic text-sm text-gray-600">
              💪 Après cette leçon, vous serez capable de manipuler les variables avec confiance !
            </div>
          </div>
        `;
      }
      else if (slide.type === "content") {
        let blocksHtml = "";
        for (let block of slide.contentBlocks) {
          blocksHtml += renderContentBlock(block);
        }
        return `
          <div class="slide w-full flex-shrink-0 px-5 py-6 md:py-8 bg-white min-h-[500px] overflow-y-auto">
            <h2 class="text-xl md:text-2xl font-bold text-indigo-800 border-b border-indigo-200 pb-2 mb-5">${slide.title}</h2>
            <div>
              ${blocksHtml}
            </div>
          </div>
        `;
      }
      else if (slide.type === "summary") {
        let tipsList = slide.tips.map(tip => `<li class="mb-2 flex gap-2"><span class="text-emerald-600">✓</span> <span>${tip}</span></li>`).join('');
        return `
          <div class="slide w-full flex-shrink-0 px-5 py-8 bg-gradient-to-tr from-gray-50 to-indigo-50 min-h-[500px]">
            <h2 class="text-2xl font-bold text-indigo-800 mb-5">${slide.title}</h2>
            <div class="bg-white/70 rounded-2xl p-5 shadow-sm">
              <ul class="space-y-2 mb-6">
                ${tipsList}
              </ul>
              <div class="p-4 bg-indigo-100 rounded-xl border-l-4 border-indigo-600">
                <p class="font-semibold text-indigo-900">📖 À retenir :</p>
                <p class="text-gray-700">${slide.conclusion}</p>
              </div>
              <div class="mt-6 text-center text-sm text-gray-500">
                🔁 Revenez sur les exemples et pratiquez avec Visual Studio !
              </div>
            </div>
          </div>
        `;
      }
      return `<div class="slide w-full flex-shrink-0 p-6">Contenu non disponible</div>`;
    }
    
    // Construire tous les slides et les insérer dans le container
    function buildAllSlides() {
      let slidesHtml = "";
      for (let i = 0; i < slidesData.length; i++) {
        slidesHtml += renderSlide(slidesData[i], i);
      }
      $("#slideContainer").html(slidesHtml);
      $("#totalSlides").text(totalSlides);
      updateNavigation();
      updateSlidePosition();
    }
    
    // Mise à jour transformation translateX en fonction de l'index
    function updateSlidePosition() {
      const slideWidth = $("#slideContainer .slide").first().outerWidth();
      const containerWidth = $("#slidesWrapper").width();
      // On utilise translate en pourcentage par rapport à la largeur de chaque slide
      // mais on calcule avec margin négative en flex? plus simple: décalage en pixels réels
      // on récupère la largeur du premier slide: garantie car tous font width-full flex-shrink-0
      let slideElement = $("#slideContainer .slide").first();
      if (slideElement.length === 0) return;
      let width = slideElement.outerWidth();
      let newTranslate = - (currentSlideIndex * width);
      $("#slideContainer").css("transform", `translateX(${newTranslate}px)`);
    }
    
    // Recalcul au resize
    let resizeTimer;
    $(window).on("resize", function() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        updateSlidePosition();
      }, 100);
    });
    
    // Navigation
    function goNext() {
      if (currentSlideIndex < totalSlides - 1) {
        currentSlideIndex++;
        updateNavigation();
        updateSlidePosition();
        // force MathJax éventuellement si nouvelles formules (aucune formule complexe mais on rafraichit)
        if (window.MathJax) {
          MathJax.typesetPromise();
        }
      }
    }
    
    function goPrev() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        updateNavigation();
        updateSlidePosition();
        if (window.MathJax) MathJax.typesetPromise();
      }
    }
    
    $("#nextSlide").on("click", goNext);
    $("#prevSlide").on("click", goPrev);
    
    // Gestion clavier (flèches droite/gauche)
    $(document).on("keydown", function(e) {
      if (e.key === "ArrowRight") {
        goNext();
        e.preventDefault();
      } else if (e.key === "ArrowLeft") {
        goPrev();
        e.preventDefault();
      }
    });
    
    // Initialisation
    buildAllSlides();
    
    // Une fois chargé, s'assurer que le positionnement est correct après chargement des images (aucune image complexe ici)
    $(window).on("load", function() {
      updateSlidePosition();
    });
    
    // on observe le redimensionnement du wrapper pour ne pas casser
    const resizeObserver = new ResizeObserver(() => {
      updateSlidePosition();
    });
    if(document.getElementById("slidesWrapper")){
      resizeObserver.observe(document.getElementById("slidesWrapper"));
    }
    
    // Pour rendre les extraits de code lisibles (aucune injection dangereuse)
    // Petite illustration ASCII ou dessin personnalisé? Pour respecter la consigne sans image inutile on ne met que du texte
    // Si besoin d'un petit schéma "portée des variables" dessiné en CSS/texte
    // J'ajoute un petit bloc dans le slide summary? mais c'est déjà complet.
    
    // Ajout d'une illustration maison dans le slide portée? (optionnel style diagramme simple)
    // Pour rester cohérent, pas d'image externe requise car les exemples sont explicites.
    // On s'assure également que les slides ne débordent pas sur mobile (overflow-x hidden)
    $(".code-block").each(function() {
      $(this).css("overflow-x", "auto");
    });
    
  </script>
  <!-- note: aucun stockage d'image externe, respect des consignes: pas d'image inutile, aucun dessin complexe nécessaire -->
</body>
</html>
