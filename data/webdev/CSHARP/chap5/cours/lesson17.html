<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 17 : Méthodes en C# - Programmation Orientée Objet</title>
    <!-- Tailwind CSS via CDN + base styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques (si besoin dans exemples) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Font Awesome optionnel pour icones discrètes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* styles supplémentaires pour slides et transitions douces */
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        .slide {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            transition: transform 0.2s, opacity 0.3s;
        }
        .nav-btn {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e3a8a;
            color: white;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        code {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }
        pre {
            background-color: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            color: #cbd5e1;
            font-size: 0.85rem;
        }
        .objective-badge {
            background-color: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }
        @media (max-width: 640px) {
            .slide {
                border-radius: 1.5rem;
                padding: 1rem !important;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-6">

    <div class="max-w-5xl w-full mx-auto relative">
        <!-- Conteneur principal des slides -->
        <div id="slides-wrapper" class="relative overflow-hidden rounded-3xl">
            <!-- Les slides seront injectées dynamiquement -->
        </div>

        <!-- Navigation et progression -->
        <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
            <button id="prevSlide" class="nav-btn bg-white/80 backdrop-blur-sm px-5 py-2 rounded-full shadow-md font-semibold text-blue-800 border border-blue-200 disabled:opacity-40">
                <i class="fas fa-arrow-left mr-2"></i> Précédent
            </button>
            <div class="flex-1 max-w-xs bg-gray-200 rounded-full h-2 overflow-hidden">
                <div id="progressFill" class="progress-bar bg-blue-600 h-full rounded-full" style="width: 0%;"></div>
            </div>
            <button id="nextSlide" class="nav-btn bg-white/80 backdrop-blur-sm px-5 py-2 rounded-full shadow-md font-semibold text-blue-800 border border-blue-200">
                Suivant <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
        <div class="text-center text-sm text-gray-500 mt-3">
            <span id="slideCounter"></span>
        </div>
    </div>

    <script>
        // Données de la leçon 17 (objectifs et contenu détaillé)
        // D'après le JSON: lesson17 objectifs: définir méthodes avec paramètres/retour, ref/out/params, surcharge
        // On crée des slides: 1: titre, 2: objectifs, puis plusieurs slides de contenu.

        const lessonData = {
            title: "Méthodes en C# - Paramètres, retour, ref, out, params et surcharge",
            subtitle: "Programmation Orientée Objet - Niveau Intermédiaire",
            objectives: [
                "✅ Définir des méthodes avec paramètres et valeur de retour",
                "✅ Utiliser les mots-clés `ref`, `out` et `params`",
                "✅ Comprendre la surcharge de méthodes (overloading)",
                "✅ Différence entre passage par valeur, par référence et paramètres optionnels"
            ],
            contentSlides: [
                {
                    title: "📌 Qu'est-ce qu'une méthode ?",
                    body: `<p class="mb-3">Une <strong class="text-blue-700">méthode</strong> est un bloc de code qui exécute une tâche spécifique. Elle permet de structurer, réutiliser et organiser la logique d'un programme.</p>
                    <div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-400">
                        <p class="font-mono text-sm">[modificateurs] type_retour NomMethode(paramètres) { // instructions }</p>
                    </div>
                    <p class="mt-3">Exemple simple :</p>
                    <pre><code>public int Additionner(int a, int b) 
{
    return a + b;
}</code></pre>
                    <p>🔹 <code>public</code> : accessible partout &nbsp;|&nbsp; 🔹 <code>int</code> : retourne un entier &nbsp;|&nbsp; 🔹 <code>a, b</code> : paramètres.</p>`
                },
                {
                    title: "🧠 Passage de paramètres : valeur vs référence",
                    body: `<p>Par défaut, les <strong>types valeur</strong> (int, float, struct) sont passés <span class="font-bold text-amber-700">par copie</span>. Les modifications n'affectent pas la variable d'origine.</p>
                    <p>Les <strong>types référence</strong> (class, tableau) sont passés par référence de référence : l'objet peut être modifié.</p>
                    <pre><code>static void ModifierValeur(int x) { x = 20; } // ne change pas l'original
static void ModifierReference(int[] tab) { tab[0] = 99; } // change l'original</code></pre>
                    <div class="mt-2 p-2 bg-gray-100 rounded"><i class="fas fa-lightbulb text-yellow-500"></i> <em>Pour modifier directement une variable valeur, utilisez <code>ref</code> ou <code>out</code>.</em></div>`
                },
                {
                    title: "🔁 Le mot-clé 'ref'",
                    body: `<p><code>ref</code> permet de passer un argument <strong>par référence</strong> : la méthode peut modifier la variable d'origine.</p>
                    <pre><code>static void Incrementer(ref int nombre)
{
    nombre++;
}

// Utilisation
int compteur = 5;
Incrementer(ref compteur);
Console.WriteLine(compteur); // Affiche 6</code></pre>
                    <p>⚠️ La variable doit être initialisée <strong>avant</strong> d'être passée avec <code>ref</code>.</p>`
                },
                {
                    title: "📤 Le mot-clé 'out'",
                    body: `<p><code>out</code> est similaire à <code>ref</code>, mais la variable n'a pas besoin d'être initialisée avant l'appel. Elle doit être assignée dans la méthode.</p>
                    <pre><code>static void ObtenirValeurs(out int a, out int b)
{
    a = 10;
    b = 20;
}

// Utilisation
ObtenirValeurs(out int x, out int y);
Console.WriteLine($"{x}, {y}"); // 10, 20</code></pre>
                    <p>🎯 Utile pour retourner plusieurs valeurs depuis une méthode !</p>`
                },
                {
                    title: "🎲 Le modificateur 'params'",
                    body: `<p><code>params</code> permet de passer un <strong>nombre variable d'arguments</strong> du même type. Un seul paramètre <code>params</code> autorisé, et il doit être le dernier.</p>
                    <pre><code>static int Somme(params int[] nombres)
{
    int total = 0;
    foreach (int n in nombres) total += n;
    return total;
}

// Appels possibles
int result1 = Somme(1, 2, 3);        // 6
int result2 = Somme(10, 20, 30, 40); // 100
int result3 = Somme();               // 0</code></pre>
                    <p>📦 Pratique pour des fonctions comme <code>Console.WriteLine()</code> ou agrégations flexibles.</p>`
                },
                {
                    title: "⚖️ Surcharge de méthodes (Overloading)",
                    body: `<p>La <strong>surcharge</strong> permet de définir plusieurs méthodes avec le <strong>même nom</strong> mais des <strong>signatures différentes</strong> (nombre, type ou ordre des paramètres).</p>
                    <pre><code>static void Afficher(string message) { ... }
static void Afficher(int nombre) { ... }
static void Afficher(string msg, int valeur) { ... }

// Le compilateur choisit la bonne version selon les arguments passés.</code></pre>
                    <div class="bg-green-50 p-3 rounded-lg mt-2">
                        <i class="fas fa-check-circle text-green-600"></i> <strong>Avantage :</strong> lisibilité et flexibilité sans multiplier les noms de méthodes.
                    </div>
                    <p class="mt-2">❌ La seule différence de type de retour ne suffit pas pour surcharger.</p>`
                },
                {
                    title: "🏗️ Bonnes pratiques & exemples concrets",
                    body: `<ul class="list-disc pl-5 space-y-2">
                        <li>Nommez les méthodes avec un verbe (CalculerTotal, ObtenirClient)</li>
                        <li>Limitez la complexité : une méthode doit faire une seule chose.</li>
                        <li>Utilisez <code>ref/out</code> avec parcimonie, privilégiez les tuples ou objets en retour.</li>
                        <li>Les paramètres optionnels (valeur par défaut) simplifient les appels sans surcharge excessive.</li>
                    </ul>
                    <pre><code>// Paramètre optionnel
static void Saluer(string nom, string salutation = "Bonjour")
{
    Console.WriteLine($"{salutation}, {nom}!");
}
Saluer("Ahmad");            // Bonjour, Ahmad!
Saluer("Fatima", "Salut");  // Salut, Fatima!</code></pre>
                    <p>🧑‍🏫 En entreprise, on favorise la clarté et l'évolutivité du code.</p>`
                },
                {
                    title: "🧪 Exemple complet : mini application",
                    body: `<p>Mettons en pratique ref, out, params et surcharge :</p>
                    <pre><code>using System;

class DemoMethodes
{
    // ref : échange de valeurs
    static void Echange(ref int a, ref int b) { int temp = a; a = b; b = temp; }
    
    // out : retour multiple
    static void Diviser(int dividende, int diviseur, out int quotient, out int reste)
    {
        quotient = dividende / diviseur;
        reste = dividende % diviseur;
    }
    
    // params : moyenne flexible
    static double Moyenne(params double[] notes)
    {
        if(notes.Length == 0) return 0;
        double somme = 0;
        foreach(var n in notes) somme += n;
        return somme / notes.Length;
    }
    
    // Surcharge
    static void AfficherResultat(string operation, double val) => Console.WriteLine($"{operation}: {val:F2}");
    static void AfficherResultat(string operation, int val) => Console.WriteLine($"{operation}: {val}");
    
    static void Main()
    {
        int x=5, y=10;
        Echange(ref x, ref y);
        AfficherResultat("Après échange", $"{x},{y}");
        
        Diviser(17, 4, out int q, out int r);
        AfficherResultat("Quotient", q); AfficherResultat("Reste", r);
        
        double moyenneClasse = Moyenne(12.5, 14, 16.5, 18);
        AfficherResultat("Moyenne", moyenneClasse);
    }
}</code></pre>
                    <p class="italic text-sm text-gray-600">Essayez de modifier ce code dans votre environnement .NET !</p>`
                }
            ]
        };

        // Construction des slides : slide 0 = titre, slide 1 = objectifs, puis contenuSlides
        let slides = [];

        // Slide 0 : Titre + intro
        slides.push(`
            <div class="slide p-6 md:p-10">
                <div class="flex flex-col items-center text-center">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-full p-3 w-20 h-20 flex items-center justify-center shadow-lg mb-4">
                        <i class="fas fa-code fa-2x"></i>
                    </div>
                    <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-800 to-indigo-800">${escapeHtml(lessonData.title)}</h1>
                    <p class="text-gray-600 text-lg mt-3 max-w-xl">${escapeHtml(lessonData.subtitle)}</p>
                    <div class="mt-6 flex flex-wrap gap-2 justify-center">
                        <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm"><i class="fas fa-cogs"></i> POO</span>
                        <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-sm"><i class="fas fa-code-branch"></i> C#/.NET</span>
                        <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-sm"><i class="fas fa-graduation-cap"></i> Niveau intermédiaire</span>
                    </div>
                    <div class="mt-8 border-t pt-6 w-full">
                        <p class="text-sm text-gray-500">Classe : Développement Web (C#) | Enseignant : Cameroun 🇨🇲</p>
                        <i class="fas fa-arrow-down text-blue-500 mt-4 animate-pulse"></i>
                    </div>
                </div>
            </div>
        `);

        // Slide 1 : Objectifs pédagogiques
        let objectivesHtml = `<div class="slide p-6 md:p-8"><h2 class="text-2xl md:text-3xl font-bold text-blue-800 border-b-4 border-blue-300 pb-2 inline-block">🎯 Objectifs de la leçon</h2><ul class="mt-6 space-y-3">`;
        lessonData.objectives.forEach(obj => {
            objectivesHtml += `<li class="objective-badge p-3 rounded-lg flex items-start gap-3"><i class="fas fa-check-circle text-blue-600 mt-1"></i><span>${escapeHtml(obj)}</span></li>`;
        });
        objectivesHtml += `</ul><div class="mt-8 bg-indigo-50 p-4 rounded-xl text-indigo-800"><i class="fas fa-lightbulb"></i> À la fin de ce cours, vous saurez créer des méthodes robustes et flexibles en C#.</div></div>`;
        slides.push(objectivesHtml);

        // Ajouter les slides de contenu
        lessonData.contentSlides.forEach((slideContent, idx) => {
            let contentHtml = `
                <div class="slide p-6 md:p-8">
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 flex items-center gap-2"><span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-base">${idx+1}</span> ${escapeHtml(slideContent.title)}</h2>
                    <div class="mt-5 prose prose-lg max-w-none text-gray-700 leading-relaxed">
                        ${slideContent.body}
                    </div>
                    <div class="mt-8 text-xs text-gray-400 border-t pt-3 text-right">Leçon 17 - Méthodes avancées</div>
                </div>
            `;
            slides.push(contentHtml);
        });

        // Rendu dans le DOM
        let currentIndex = 0;
        const totalSlides = slides.length;

        function renderSlides() {
            const wrapper = $('#slides-wrapper');
            wrapper.empty();
            slides.forEach((slideHtml, i) => {
                const isActive = (i === currentIndex);
                const slideDiv = $(`<div class="slide-container transition-all duration-300 ${isActive ? 'block' : 'hidden'}" data-slide-index="${i}">${slideHtml}</div>`);
                wrapper.append(slideDiv);
            });
            updateProgressAndCounter();
            // réappliquer MathJax si besoin (pour formules dans le contenu)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function updateProgressAndCounter() {
            const percent = ((currentIndex + 1) / totalSlides) * 100;
            $('#progressFill').css('width', `${percent}%`);
            $('#slideCounter').text(`Diapositive ${currentIndex+1} / ${totalSlides}`);
            // gestion désactivation boutons
            $('#prevSlide').prop('disabled', currentIndex === 0);
            $('#nextSlide').prop('disabled', currentIndex === totalSlides - 1);
        }

        function showSlide(index) {
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            if (index === currentIndex) return;
            // cacher l'ancienne, afficher la nouvelle
            $(`.slide-container`).addClass('hidden');
            $(`.slide-container[data-slide-index="${index}"]`).removeClass('hidden');
            currentIndex = index;
            updateProgressAndCounter();
            // Scroll en haut pour confort sur mobile
            $('html, body').animate({ scrollTop: $('#slides-wrapper').offset().top - 20 }, 200);
            if (window.MathJax) MathJax.typesetPromise();
        }

        // Événements navigation
        $('#prevSlide').on('click', () => { if(currentIndex > 0) showSlide(currentIndex - 1); });
        $('#nextSlide').on('click', () => { if(currentIndex < totalSlides - 1) showSlide(currentIndex + 1); });
        
        // Gestion du clavier (flèches)
        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') { $('#prevSlide').click(); }
            else if (e.key === 'ArrowRight') { $('#nextSlide').click(); }
        });
        
        // Fonction utilitaire escapeHtml pour sécurité
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Lancement initial
        renderSlides();
        showSlide(0);
        
        // Ajout d'une meta viewport dynamique déjà présente, mais pour être sûr
        $('head').append('<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">');
        
        // Petit dessin SVG style "tableau" à la main si besoin? pas nécessaire, mais on peut ajouter une illustration d'exemple
        // Aucune image externe nécessaire, tout est texte/code
    </script>
    <!-- Note explicative: conformément aux consignes, nous n'insérons pas d'image compliquée inutile,
    mais nous fournissons un exemple visuel avec des blocs de code et diagrammes textuels. 
    Les formules mathématiques éventuelles sont gérées par MathJax si besoin (ex: explication algorithmique) mais ce cours se concentre sur le code -->
</body>
</html>
