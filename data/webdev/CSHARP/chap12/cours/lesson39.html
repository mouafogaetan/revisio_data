<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 39 : API REST complète - Initiation au C# | Cours WebDev</title>
    <!-- Tailwind CSS CDN + base + inter font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, reste léger) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Custom styles pour slides et transitions douces -->
    <style>
        /* transitions smooth et optimisation mobile */
        .slide-container {
            transition: transform 0.3s ease-in-out, opacity 0.25s ease;
        }
        .slide {
            transition: opacity 0.2s ease;
        }
        .active-slide {
            display: block;
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(8px);}
            to { opacity: 1; transform: translateX(0);}
        }
        /* style pour la navigation tactile */
        button.nav-btn {
            touch-action: manipulation;
        }
        /* code block style inline simple */
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .badge {
            background: #3b82f6;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
        }
        .prose-slide h3 {
            font-weight: 700;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        .prose-slide p, .prose-slide li {
            color: #1e293b;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slides -->
        <div id="slidesWrapper" class="relative bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
            <!-- Header fixe (titre matière + progression) -->
            <div class="bg-indigo-700 px-5 py-3 flex justify-between items-center flex-wrap gap-2 border-b border-indigo-800">
                <div>
                    <span class="text-white/80 text-xs font-medium uppercase tracking-wide">Développement Web · C#</span>
                    <h2 class="text-white text-xl md:text-2xl font-bold">API REST avec ASP.NET Core</h2>
                </div>
                <div class="bg-indigo-800 px-3 py-1 rounded-full text-xs text-white font-mono">
                    <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>

            <!-- Zone des slides dynamique -->
            <div id="slidesContainer" class="relative min-h-[520px] md:min-h-[560px]">
                <!-- Les slides seront injectées ici par jQuery -->
                <div class="flex justify-center items-center h-64"><div class="animate-pulse text-gray-400">Chargement du cours...</div></div>
            </div>

            <!-- Navigation boutons + indicateurs -->
            <div class="bg-gray-50 px-5 py-4 flex justify-between items-center border-t border-gray-200 flex-wrap gap-3">
                <button id="prevSlide" class="nav-btn bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-xl shadow-sm border border-gray-300 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    Précédent
                </button>
                <div class="flex gap-2" id="dotsIndicator"></div>
                <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl shadow-md transition flex items-center gap-1">
                    Suivant
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </div>

        <!-- petite note pédagogique -->
        <p class="text-center text-xs text-gray-500 mt-5">Cours adapté aux étudiants du Cameroun – pratique et exemples concrets.</p>
    </div>

    <script>
        // Définition du contenu des slides pour la lesson39 (CRUD, JWT, validation, Swagger, déploiement)
        // Structure: chaque slide a un titre et un contenu HTML (riche, exemples de code)
        const slidesData = [
            {   // Slide 1 : Titre de la leçon
                title: "📘 Création d'une API REST complète",
                content: `

                            <span class="badge">CRUD</span>

                            <span class="badge bg-purple-600">Swagger</span>
                        </div>
                        <div class="mt-4 text-sm text-gray-500">Leçon 39 · Compétence finale: API REST professionnelle</div>
                    </div>
                `
            },
            {   // Slide 2 : Objectifs de la leçon
                title: "🎯 Objectifs pédagogiques",
                content: `
                    <div class="space-y-5 py-2">
                        <div class="bg-sky-50 p-4 rounded-xl border-l-8 border-sky-500">
                            <h3 class="font-bold text-sky-800 text-xl">À la fin de ce cours, vous saurez :</h3>
                            <ul class="mt-3 space-y-2 list-disc list-inside text-gray-700">
                                <li>Créer une API Web complète (blog / todo list) avec contrôleurs REST</li>
                                <li>Implémenter les opérations CRUD (Create, Read, Update, Delete)</li>
                                <li>Sécuriser l'API avec authentification JWT (JSON Web Token)</li>
                                <li>Ajouter des validations de données (Data Annotations)</li>
                                <li>Documenter et tester l'API avec Swagger / OpenAPI</li>
                                <li>Préparer l'API pour le déploiement (Azure, IIS ou Render)</li>
                            </ul>
                        </div>
                        <div class="flex justify-center text-sm text-gray-500">⭐ Projet pratique : API de gestion de produits ou articles</div>
                    </div>
                `
            },
            {   // Slide 3 : Setup initial + Modèle + DbContext (rappel EF Core)
                title: "⚙️ Étape 1 : Structure & Modèle",
                content: `
                    <div class="space-y-4">
                        <p><span class="font-semibold">Création du projet API :</span> <code class="bg-gray-200 px-1 rounded">dotnet new webapi -n MonApi</code></p>
                        <p>Installer les packages EF Core et JWT :</p>
                        <div class="code-block text-sm">
                            dotnet add package Microsoft.EntityFrameworkCore.Sqlite<br>
                            dotnet add package Microsoft.EntityFrameworkCore.Tools<br>
                            dotnet add package Microsoft.AspNetCore.Authentication.JwtBearer
                        </div>
                        <div>
                            <p class="font-semibold mt-2">Modèle Article (exemple) :</p>
                            <div class="code-block mt-1">
                                public class Article {<br>
                                &nbsp;&nbsp;public int Id { get; set; }<br>
                                &nbsp;&nbsp;public string Titre { get; set; }<br>
                                &nbsp;&nbsp;public string Contenu { get; set; }<br>
                                &nbsp;&nbsp;public DateTime DateCreation { get; set; } = DateTime.UtcNow;<br>
                                }
                            </div>
                        </div>
                        <p><span class="font-semibold">DbContext :</span> hérite de DbContext, DbSet&lt;Article&gt;.</p>
                        <div class="bg-yellow-50 p-3 rounded-lg text-sm">✨ Astuce: Utilisez SQLite pour le développement local.</div>
                    </div>
                `
            },
            {   // Slide 4 : Controller CRUD complet
                title: "📌 Étape 2 : Implémentation CRUD",
                content: `
                    <div class="space-y-3">
                        <p><strong>Controller ArticlesController</strong> avec [ApiController], [Route]</p>
                        <div class="code-block text-xs md:text-sm">
                            [ApiController]<br>
                            [Route("api/[controller]")]<br>
                            public class ArticlesController : ControllerBase {<br>
                            &nbsp;&nbsp;private readonly AppDbContext _context;<br>
                            &nbsp;&nbsp;public ArticlesController(AppDbContext ctx) => _context = ctx;<br>
                            &nbsp;&nbsp;<span class="text-green-300">// GET: api/articles</span><br>
                            &nbsp;&nbsp;[HttpGet] public async Task&lt;IActionResult&gt; Get() => Ok(await _context.Articles.ToListAsync());<br>
                            &nbsp;&nbsp;<span class="text-green-300">// GET by id</span><br>
                            &nbsp;&nbsp;[HttpGet("{id}")] public async Task&lt;IActionResult&gt; GetById(int id) { ... }<br>
                            &nbsp;&nbsp;<span class="text-yellow-300">// POST</span><br>
                            &nbsp;&nbsp;[HttpPost] public async Task&lt;IActionResult&gt; Create(Article article) { ... }<br>
                            &nbsp;&nbsp;<span class="text-blue-300">// PUT</span><br>
                            &nbsp;&nbsp;[HttpPut("{id}")] public async Task&lt;IActionResult&gt; Update(int id, Article article) { ... }<br>
                            &nbsp;&nbsp;<span class="text-red-300">// DELETE</span><br>
                            &nbsp;&nbsp;[HttpDelete("{id}")] public async Task&lt;IActionResult&gt; Delete(int id) { ... }<br>
                            }
                        </div>
                        <p class="text-sm">📌 Pensez à utiliser <strong>FromBody</strong> pour les données JSON, et vérifiez les codes HTTP (200, 201, 404).</p>
                    </div>
                `
            },
            {   // Slide 5 : Authentification JWT (génération + sécurisation)
                title: "🔐 Sécuriser l'API avec JWT",
                content: `
                    <div class="space-y-4">
                        <p>JWT (JSON Web Token) permet d'authentifier les utilisateurs sans état.</p>
                        <div class="code-block">
                            // Dans appsettings.json : "JwtSettings": { "Secret": "votre-clé-super-secrète-plus-de-32-caractères", "ExpiresMinutes": 60 }<br><br>
                            // Service d'authentification : GenerateToken()<br>
                            var tokenHandler = new JwtSecurityTokenHandler();<br>
                            var key = Encoding.ASCII.GetBytes(secret);<br>
                            var tokenDescriptor = new SecurityTokenDescriptor {<br>
                            &nbsp;&nbsp;Subject = new ClaimsIdentity(new[] { new Claim(ClaimTypes.Name, userId) }),<br>
                            &nbsp;&nbsp;Expires = DateTime.UtcNow.AddMinutes(expires),<br>
                            &nbsp;&nbsp;SigningCredentials = new SigningCredentials(new SymmetricSecurityKey(key), SecurityAlgorithms.HmacSha256Signature)<br>
                            };
                        </div>
                        <p><strong>Protéger les endpoints :</strong> ajoutez <code>[Authorize]</code> sur le contrôleur ou certaines méthodes.</p>
                        <div class="bg-indigo-50 p-3 rounded-md text-sm">🔑 Pour tester, envoyer le token dans le header: <code>Authorization: Bearer &lt;token&gt;</code></div>
                    </div>
                `
            },
            {   // Slide 6 : Validation des données
                title: "✅ Validation des modèles (Data Annotations)",
                content: `
                    <div class="space-y-3">
                        <p>Assurez l'intégrité des données grâce aux attributs de validation :</p>
                        <div class="code-block">
                            public class Article {<br>
                            &nbsp;&nbsp;public int Id { get; set; }<br>
                            &nbsp;&nbsp;[Required(ErrorMessage = "Le titre est obligatoire")]<br>
                            &nbsp;&nbsp;[MaxLength(100)]<br>
                            &nbsp;&nbsp;public string Titre { get; set; }<br>
                            &nbsp;&nbsp;[Required]<br>
                            &nbsp;&nbsp;[MinLength(10)]<br>
                            &nbsp;&nbsp;public string Contenu { get; set; }<br>
                            }
                        </div>
                        <p>Dans le contrôleur, vérifier <code>ModelState.IsValid</code> avant d'enregistrer.</p>
                        <div class="code-block mt-1">
                            if (!ModelState.IsValid) return BadRequest(ModelState);
                        </div>
                        <p class="text-gray-600">🔹 Retourne automatiquement les erreurs de validation au client.</p>
                    </div>
                `
            },
            {   // Slide 7 : Tester avec Swagger et déploiement
                title: "🚀 Swagger, Tests & Déploiement",
                content: `
                    <div class="space-y-4">
                        <div>
                            <p><span class="font-bold">Swagger/OpenAPI</span> intégré par défaut dans le template webapi.</p>
                            <div class="code-block">
                                // Program.cs<br>
                                builder.Services.AddEndpointsApiExplorer();<br>
                                builder.Services.AddSwaggerGen();<br>
                                app.UseSwagger();<br>
                                app.UseSwaggerUI();<br>
                            </div>
                            <p>Accès via <strong>/swagger</strong> pour tester tous les endpoints interactivement.</p>
                        </div>
                        <div class="border-t border-gray-300 pt-3">
                            <h3 class="font-bold">🌍 Déployer l'API :</h3>
                            <ul class="list-disc list-inside text-sm space-y-1">
                                <li>Sur <strong>Azure App Service</strong> : via Visual Studio ou GitHub Actions</li>
                                <li>Sur <strong>Render.com / Railway</strong> : facile pour projets étudiants</li>
                                <li>Hébergement local avec IIS ou via <code>dotnet publish</code></li>
                                <li>Variables d'environnement pour la chaîne de connexion et la clé JWT</li>
                            </ul>
                        </div>
                        <div class="bg-green-50 p-3 rounded-lg">
                            💡 <strong>Projet final :</strong> Construisez une API de gestion de "Blog" avec JWT et publiez-la en ligne.
                        </div>
                    </div>
                `
            },
            {   // Slide 8 : Exemple concret (Todo list API) + démonstration code final
                title: "📝 Mini-projet : API TodoList complète",
                content: `
                    <div class="space-y-3">
                        <p>Exemple concret d'implémentation d'une API Todo avec validation + JWT.</p>
                        <div class="code-block text-xs">
                            // Modèle Todo<br>
                            public class Todo { public int Id; public string Titre; public bool EstComplete; [Required] public string UtilisateurId; }<br><br>
                            // Endpoint protégé : [Authorize] -> récupérer l'utilisateur via Claims<br>
                            [HttpPost]<br>
                            public IActionResult AjouterTodo([FromBody] Todo todo) {<br>
                            &nbsp;&nbsp;var userId = User.FindFirst(ClaimTypes.NameIdentifier)?.Value;<br>
                            &nbsp;&nbsp;todo.UtilisateurId = userId; _context.Todos.Add(todo); _context.SaveChanges();<br>
                            &nbsp;&nbsp;return Ok(todo);<br>
                            }
                        </div>
                        <p>Astuce JWT: ajouter middleware d'authentification: <code>app.UseAuthentication(); app.UseAuthorization();</code></p>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <span class="bg-gray-200 text-gray-800 rounded-full px-3 py-1 text-xs">✅ CRUD complet</span>
                            <span class="bg-gray-200 text-gray-800 rounded-full px-3 py-1 text-xs">🔒 JWT login/register</span>
                            <span class="bg-gray-200 text-gray-800 rounded-full px-3 py-1 text-xs">📄 Swagger doc</span>
                        </div>
                        <p class="text-sm italic mt-2">Testez avec Postman ou directement dans Swagger après avoir obtenu un token.</p>
                    </div>
                `
            },
            {   // Slide 9: Conseils pour la certification / examen + rappel final
                title: "🏆 Exercice pratique & validation des acquis",
                content: `
                    <div class="space-y-5">
                        <div class="bg-orange-50 p-4 rounded-xl">
                            <h3 class="font-bold text-orange-800">🎯 À réaliser par vous-même :</h3>
                            <ol class="list-decimal list-inside mt-2 space-y-2 text-gray-700">
                                <li>Créez une API de gestion de "Produits" avec Name, Prix, Stock</li>
                                <li>Ajouter la sécurisation JWT (endpoint /auth/login)</li>
                                <li>Implémenter la validation (prix > 0, nom requis)</li>
                                <li>Testez l'API avec Swagger et générez un token valide</li>
                                <li>Déployez l'API sur un serveur gratuit (exemple : Railway)</li>
                            </ol>
                        </div>
                        <p class="text-center text-lg font-medium text-indigo-700">💪 Félicitations ! Vous maîtrisez la création d'API REST complète avec ASP.NET Core.</p>
                        <div class="flex justify-center pt-2">
                            <div class="w-16 h-1 bg-indigo-300 rounded-full"></div>
                        </div>
                    </div>
                `
            }
        ];

        let currentIndex = 0;
        let totalSlides = slidesData.length;

        // Mise à jour affichage
        function renderSlide(index) {
            const slide = slidesData[index];
            if(!slide) return;
            const html = `
                <div class="slide p-6 md:p-8 transition-all duration-200">
                    <div class="border-b border-gray-200 pb-3 mb-5 flex items-center gap-2">
                        <span class="text-indigo-600 text-2xl">${slide.title.split(' ')[0]}</span>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${slide.title}</h2>
                    </div>
                    <div class="prose-slide max-w-full">
                        ${slide.content}
                    </div>
                </div>
            `;
            $("#slidesContainer").html(html);
            $("#slideCounter").text(index+1);
            updateDots(index);
            updateButtonsState(index);
            // Recharger MathJax si besoin (formules potentielles, mais aucune formule lourde ici)
            if(window.MathJax) {
                MathJax.typesetPromise();
            }
            // scroll en haut (optionnel)
            $("html, body").animate({ scrollTop: $("#slidesWrapper").offset().top - 20 }, 100);
        }

        function updateDots(activeIdx) {
            let dotsHtml = '';
            for(let i=0; i<totalSlides; i++) {
                let activeClass = (i === activeIdx) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
                dotsHtml += `<button class="dot-btn h-2 rounded-full transition-all ${activeClass} hover:bg-indigo-400" data-index="${i}"></button>`;
            }
            $("#dotsIndicator").html(dotsHtml);
            $(".dot-btn").on("click", function() {
                let idx = parseInt($(this).data("index"));
                if(!isNaN(idx) && idx !== currentIndex) {
                    currentIndex = idx;
                    renderSlide(currentIndex);
                }
            });
        }

        function updateButtonsState(index) {
            $("#prevSlide").prop("disabled", index === 0);
            $("#nextSlide").prop("disabled", index === totalSlides-1);
        }

        // navigation
        $("#prevSlide").on("click", function() {
            if(currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        });
        $("#nextSlide").on("click", function() {
            if(currentIndex < totalSlides-1) {
                currentIndex++;
                renderSlide(currentIndex);
            }
        });

        // support swipe (mobile tactile)
        let touchStartX = 0;
        let touchEndX = 0;
        $("#slidesContainer").on("touchstart", function(e) {
            touchStartX = e.originalEvent.touches[0].clientX;
        });
        $("#slidesContainer").on("touchend", function(e) {
            touchEndX = e.originalEvent.changedTouches[0].clientX;
            if (touchEndX < touchStartX - 50) {
                // swipe gauche -> next
                if(currentIndex < totalSlides-1) {
                    currentIndex++;
                    renderSlide(currentIndex);
                }
            } else if (touchEndX > touchStartX + 50) {
                // swipe droite -> prev
                if(currentIndex > 0) {
                    currentIndex--;
                    renderSlide(currentIndex);
                }
            }
        });

        // initialisation
        $("#totalSlides").text(totalSlides);
        renderSlide(0);

        // gestion du clavier (gauche/droite)
        $(document).on("keydown", function(e) {
            if(e.key === "ArrowLeft") {
                if(currentIndex > 0) {
                    currentIndex--;
                    renderSlide(currentIndex);
                }
            } else if(e.key === "ArrowRight") {
                if(currentIndex < totalSlides-1) {
                    currentIndex++;
                    renderSlide(currentIndex);
                }
            }
        });

        // petits ajustements pour mobile : rendre code-block scrollable horizontalement
        $("body").on("click", ".code-block", function() {
            // juste pour UX
        });
    </script>
</body>
</html>
