<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au C#",
  "classe": "Développement Web",
  "sequence": "Sequence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de Cours (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='padding: 15px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); color: #1e293b;'><p style='font-size: 1.1rem;'>Cet exercice teste vos connaissances théoriques sur les bases de C# et la programmation orientée objet.</p></div>",
      "questions": [
        {
          "question": "<div style='padding: 8px 0;'><strong>1.1</strong> (2 pts) Expliquez en 2 à 3 phrases ce qu'est le polymorphisme en C# et citez les deux mots-clés qui permettent de l'implémenter.</div>",
          "reponse": "<div style='padding: 8px 0;'>Le polymorphisme permet à une méthode d'avoir des comportements différents selon le type réel de l'objet qui l'appelle [citation:5]. Il s'implémente avec les mots-clés <code>virtual</code> (dans la classe de base) et <code>override</code> (dans la classe dérivée).</div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>1.2</strong> (2 pts) Quelle est la différence fondamentale entre une <code>class</code> et un <code>struct</code> en C# ? Donnez un exemple de situation où l'utilisation d'un <code>struct</code> est préférable.</div>",
          "reponse": "<div style='padding: 8px 0;'>Une <code>class</code> est un type référence stocké dans le tas (heap), tandis qu'un <code>struct</code> est un type valeur stocké dans la pile (stack) [citation:5]. Le <code>struct</code> est préférable pour de petites structures de données immuables, comme un <code>Point</code> (coordonnées x, y), car il est plus léger et plus performant.</div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>1.3</strong> (2 pts) Expliquez à quoi servent les mots-clés <code>virtual</code> et <code>override</code> dans le contexte de l'héritage. À quoi sert <code>base</code> ?</div>",
          "reponse": "<div style='padding: 8px 0;'><code>virtual</code> autorise une méthode à être redéfinie dans une classe dérivée. <code>override</code> remplace l'implémentation de la méthode de base dans la classe dérivée. <code>base</code> permet d'appeler le constructeur ou une méthode de la classe parente depuis la classe dérivée.</div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>1.4</strong> (2 pts) Expliquez la différence entre les opérateurs <code>==</code> et <code>.Equals()</code> en C#. Quand utilise-t-on l'un plutôt que l'autre ?</div>",
          "reponse": "<div style='padding: 8px 0;'><code>==</code> compare les références pour les types référence (sauf surcharge) et les valeurs pour les types valeur. <code>.Equals()</code> est une méthode virtuelle qui compare le contenu des objets. On utilise <code>==</code> pour la comparaison sémantique standard et <code>.Equals()</code> pour comparer le contenu effectif des objets [citation:5].</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse et Manipulation de Données (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='padding: 15px; background: #f8fafc; border-radius: 12px; border-left: 4px solid #8b5cf6; color: #1e293b;'><p>Une <strong>librairie</strong> souhaite gérer son catalogue de livres. Un livre est défini par son <strong>Titre</strong>, son <strong>Auteur</strong>, son <strong>Nombre de pages</strong> et son <strong>Prix</strong>.</p><p>Le responsable souhaite analyser ce catalogue pour en extraire des informations.</p></div>",
      "questions": [
        {
          "question": "<div style='padding: 8px 0;'><strong>2.1</strong> (1 pt) Écrivez la définition de la classe <code>Livre</code> avec des propriétés automatiques. Utilisez le type <code>decimal</code> pour le prix.</div>",
          "reponse": "<div style='padding: 8px 0;'><pre style='background: #1e293b; color: #facc15; padding: 12px; border-radius: 6px; overflow-x: auto;'>class Livre\n{\n    public string Titre { get; set; }\n    public string Auteur { get; set; }\n    public int NbPages { get; set; }\n    public decimal Prix { get; set; }\n}</pre></div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>2.2</strong> (2 pts) En utilisant LINQ, écrivez le code qui permet de :<br>- Sélectionner les livres dont le prix est <strong>supérieur à 15000 FCFA</strong>.<br>- <strong>Projeter</strong> ces livres pour obtenir uniquement leur Titre et leur Prix.</div>",
          "reponse": "<div style='padding: 8px 0;'><pre style='background: #1e293b; color: #facc15; padding: 12px; border-radius: 6px; overflow-x: auto;'>var livresChers = livres\n    .Where(l => l.Prix > 15000)\n    .Select(l => new { l.Titre, l.Prix });</pre></div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>2.3</strong> (3 pts) Écrivez le code LINQ qui :<br>1. Calcule le <strong>prix moyen</strong> des livres du catalogue.<br>2. Calcule le <strong>nombre total de pages</strong> de tous les livres.<br>3. Trouve le <strong>livre le plus cher</strong> du catalogue.</div>",
          "reponse": "<div style='padding: 8px 0;'><pre style='background: #1e293b; color: #facc15; padding: 12px; border-radius: 6px; overflow-x: auto;'>decimal prixMoyen = livres.Average(l => l.Prix);\nint totalPages = livres.Sum(l => l.NbPages);\nLivre livreCher = livres.OrderByDescending(l => l.Prix).First();</pre></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Gestion d'une Collection de Documents (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='padding: 15px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); color: #1e293b;'><p>Vous travaillez sur une application de gestion de documents. Le cahier des charges demande une hiérarchie de classes :</p><ul><li>Une classe abstraite <code>Document</code> avec les propriétés : <code>Titre</code> et <code>DateCreation</code>.</li><li>Deux classes dérivées : <code>Livre</code> (avec <code>NbPages</code>) et <code>Video</code> (avec <code>DureeMinutes</code>).</li><li>Une méthode <code>Afficher()</code> qui doit afficher un résumé différent selon le type de document.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='padding: 8px 0;'><strong>3.1</strong> (2 pts) Définissez la classe abstraite <code>Document</code> avec ses propriétés et une méthode abstraite <code>Afficher()</code>.</div>",
          "reponse": "<div style='padding: 8px 0;'><pre style='background: #1e293b; color: #facc15; padding: 12px; border-radius: 6px; overflow-x: auto;'>abstract class Document\n{\n    public string Titre { get; set; }\n    public DateTime DateCreation { get; set; }\n    public abstract void Afficher();\n}</pre></div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>3.2</strong> (2 pts) Implémentez les classes <code>Livre</code> et <code>Video</code> qui héritent de <code>Document</code>. Chaque classe doit implémenter la méthode <code>Afficher()</code> pour afficher ses informations spécifiques.</div>",
          "reponse": "<div style='padding: 8px 0;'><pre style='background: #1e293b; color: #facc15; padding: 12px; border-radius: 6px; overflow-x: auto;'>class Livre : Document\n{\n    public int NbPages { get; set; }\n    public override void Afficher()\n    {\n        Console.WriteLine($\"Livre : {Titre}, {NbPages} pages, créé le {DateCreation.ToShortDateString()}\");\n    }\n}\n\nclass Video : Document\n{\n    public int DureeMinutes { get; set; }\n    public override void Afficher()\n    {\n        Console.WriteLine($\"Vidéo : {Titre}, {DureeMinutes} min, créée le {DateCreation.ToShortDateString()}\");\n    }\n}</pre></div>"
        },
        {
          "question": "<div style='padding: 8px 0;'><strong>3.3</strong> (2 pts) Dans la méthode <code>Main</code>, créez une liste contenant un <code>Livre</code> et une <code>Video</code>, puis parcourez-la en appelant <code>Afficher()</code> sur chaque document.</div>",
          "reponse": "<div style='padding: 8px 0;'><pre style='background: #1e293b; color: #facc15; padding: 12px; border-radius: 6px; overflow-x: auto;'>static void Main()\n{\n    List<Document> docs = new List<Document>\n    {\n        new Livre { Titre = \"Le C# facile\", NbPages = 300, DateCreation = DateTime.Now },\n        new Video { Titre = \"Tutoriel C#\", DureeMinutes = 45, DateCreation = DateTime.Now }\n    };\n    foreach (Document d in docs) d.Afficher();\n}</pre></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
