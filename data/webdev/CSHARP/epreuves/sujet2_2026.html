<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au C#",
  "classe": "Développement Web",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : POO - Gestion de comptes bancaires (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> Vous développez un système de gestion de comptes bancaires pour une banque camerounaise. L'application doit gérer différents types de comptes avec des comportements spécifiques.</p><p>Créez les classes suivantes en respectant les principes de l'encapsulation et de l'héritage :</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 1.1 (3 pts) :</strong> Créez la classe de base <code>CompteBancaire</code> avec :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Un champ privé <code>solde</code> (decimal) initialisé à 0.</li><li>Une propriété publique <code>Titulaire</code> (string) avec get et set.</li><li>Un constructeur qui prend le nom du titulaire.</li><li>Une méthode virtuelle <code>Deposer(decimal montant)</code> qui ajoute le montant au solde.</li><li>Une méthode virtuelle <code>Retirer(decimal montant)</code> qui retire le montant si le solde est suffisant.</li><li>Une méthode <code>AfficherSolde()</code> qui affiche le solde formaté.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public class CompteBancaire\n{\n    private decimal solde = 0;\n    public string Titulaire { get; set; }\n    \n    public CompteBancaire(string titulaire)\n    {\n        Titulaire = titulaire;\n    }\n    \n    public virtual void Deposer(decimal montant)\n    {\n        if (montant > 0)\n            solde += montant;\n    }\n    \n    public virtual bool Retirer(decimal montant)\n    {\n        if (montant > 0 && solde >= montant)\n        {\n            solde -= montant;\n            return true;\n        }\n        return false;\n    }\n    \n    public void AfficherSolde()\n    {\n        Console.WriteLine($\"Solde de {Titulaire}: {solde:F2} FCFA\");\n    }\n}</pre>"
        },
        {
          "question": "<div><p><strong>Question 1.2 (2 pts) :</strong> Créez la classe <code>CompteEpargne</code> qui hérite de <code>CompteBancaire</code> avec :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Un champ privé <code>tauxInteret</code> (decimal) avec une valeur par défaut de 0.05m (5%).</li><li>Un constructeur qui prend le nom du titulaire et le taux d'intérêt.</li><li>Une méthode <code>AppliquerInterets()</code> qui ajoute au solde le montant des intérêts (solde * tauxInteret).</li><li>La méthode <code>Retirer</code> doit vérifier que le solde ne descend pas en dessous de 1000 FCFA.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public class CompteEpargne : CompteBancaire\n{\n    private decimal tauxInteret;\n    private const decimal SOLDE_MINIMUM = 1000;\n    \n    public CompteEpargne(string titulaire, decimal tauxInteret = 0.05m) \n        : base(titulaire)\n    {\n        this.tauxInteret = tauxInteret;\n    }\n    \n    public void AppliquerInterets()\n    {\n        // On ne peut pas accéder directement à solde (private)\n        // On utilise la méthode Deposer\n        Deposer(solde * tauxInteret);\n    }\n    \n    public override bool Retirer(decimal montant)\n    {\n        // Vérifier que le solde reste >= SOLDE_MINIMUM\n        if (montant > 0 && solde - montant >= SOLDE_MINIMUM)\n        {\n            solde -= montant;\n            return true;\n        }\n        return false;\n    }\n}</pre>"
        },
        {
          "question": "<div><p><strong>Question 1.3 (2 pts) :</strong> Créez la classe <code>CompteCourant</code> qui hérite de <code>CompteBancaire</code> avec :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Un champ privé <code>decouvertAutorise</code> (decimal) avec une valeur par défaut de 5000.</li><li>Un constructeur qui prend le nom du titulaire et le découvert autorisé.</li><li>Redéfinissez la méthode <code>Retirer</code> pour autoriser un découvert jusqu'à la limite autorisée.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public class CompteCourant : CompteBancaire\n{\n    private decimal decouvertAutorise;\n    \n    public CompteCourant(string titulaire, decimal decouvertAutorise = 5000) \n        : base(titulaire)\n    {\n        this.decouvertAutorise = decouvertAutorise;\n    }\n    \n    public override bool Retirer(decimal montant)\n    {\n        if (montant > 0 && solde + decouvertAutorise >= montant)\n        {\n            solde -= montant;\n            return true;\n        }\n        return false;\n    }\n}</pre>"
        },
        {
          "question": "<div><p><strong>Question 1.4 (1 pt) :</strong> Dans le <code>Main</code>, créez :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Un compte épargne pour \"Jean\" avec un taux de 8%.</li><li>Un compte courant pour \"Marie\" avec un découvert de 10000 FCFA.</li><li>Effectuez des opérations (dépôts, retraits) et affichez les soldes.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>class Program\n{\n    static void Main()\n    {\n        // Création des comptes\n        var compteJean = new CompteEpargne(\"Jean\", 0.08m);\n        var compteMarie = new CompteCourant(\"Marie\", 10000);\n        \n        // Opérations Jean\n        compteJean.Deposer(50000);\n        compteJean.AfficherSolde(); // 50000 FCFA\n        compteJean.AppliquerInterets();\n        compteJean.AfficherSolde(); // 54000 FCFA\n        compteJean.Retirer(1000);\n        compteJean.AfficherSolde(); // 53000 FCFA\n        \n        // Opérations Marie\n        compteMarie.Deposer(20000);\n        compteMarie.AfficherSolde(); // 20000 FCFA\n        compteMarie.Retirer(25000);\n        compteMarie.AfficherSolde(); // -5000 FCFA (découvert)\n    }\n}</pre>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : LINQ et Collections (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='padding: 10px;'><p><strong>Contexte :</strong> Une boutique en ligne camerounaise souhaite analyser ses données de vente. La liste des produits et des commandes est disponible dans une collection.</p></div>",
      "questions": [
        {
          "question": "<div><p><strong>Question 2.1 (2 pts) :</strong> Soit la liste suivante de produits :</p><pre style='background-color: #f5f5f5; padding: 10px; border-radius: 5px; font-size: 14px;'>var produits = new List&lt;Produit&gt;\n{\n    new Produit { Id = 1, Nom = \"T-shirt\", Prix = 5000, Stock = 50, Categorie = \"Vêtements\" },\n    new Produit { Id = 2, Nom = \"Téléphone\", Prix = 150000, Stock = 10, Categorie = \"Électronique\" },\n    new Produit { Id = 3, Nom = \"Ordinateur\", Prix = 350000, Stock = 5, Categorie = \"Électronique\" },\n    new Produit { Id = 4, Nom = \"Pantalon\", Prix = 8000, Stock = 30, Categorie = \"Vêtements\" },\n    new Produit { Id = 5, Nom = \"Montre\", Prix = 25000, Stock = 0, Categorie = \"Accessoires\" }\n};</pre><p>Écrivez une requête LINQ (syntaxe de votre choix) pour :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Récupérer les produits de la catégorie \"Électronique\" triés par prix décroissant.</li><li>Récupérer les noms des produits en stock (Stock > 0) avec leur prix.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>// Syntaxe de méthode\nvar produitsElectronique = produits\n    .Where(p => p.Categorie == \"Électronique\")\n    .OrderByDescending(p => p.Prix);\n\n// Syntaxe de requête\nvar produitsElectronique2 = from p in produits\n                            where p.Categorie == \"Électronique\"\n                            orderby p.Prix descending\n                            select p;\n\n// Produits en stock\nvar produitsEnStock = produits\n    .Where(p => p.Stock > 0)\n    .Select(p => new { p.Nom, p.Prix });</pre>"
        },
        {
          "question": "<div><p><strong>Question 2.2 (2 pts) :</strong> Soit la liste suivante de commandes :</p><pre style='background-color: #f5f5f5; padding: 10px; border-radius: 5px; font-size: 14px;'>var commandes = new List&lt;Commande&gt;\n{\n    new Commande { Id = 1, Client = \"Jean\", Total = 155000, Ville = \"Douala\" },\n    new Commande { Id = 2, Client = \"Marie\", Total = 8000, Ville = \"Yaoundé\" },\n    new Commande { Id = 3, Client = \"Pierre\", Total = 350000, Ville = \"Douala\" },\n    new Commande { Id = 4, Client = \"Sophie\", Total = 25000, Ville = \"Bafoussam\" }\n};</pre><p>Utilisez LINQ pour :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Grouper les commandes par ville.</li><li>Calculer le chiffre d'affaires total par ville.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>// Grouper par ville\nvar commandesParVille = commandes.GroupBy(c => c.Ville);\n\n// Afficher les groupes\nforeach (var groupe in commandesParVille)\n{\n    Console.WriteLine($\"Ville: {groupe.Key}, Commandes: {groupe.Count()}\");\n}\n\n// Chiffre d'affaires par ville\nvar caParVille = commandes\n    .GroupBy(c => c.Ville)\n    .Select(g => new {\n        Ville = g.Key,\n        Total = g.Sum(c => c.Total)\n    });\n\n// Résultats : Douala: 505000, Yaoundé: 8000, Bafoussam: 25000</pre>"
        },
        {
          "question": "<div><p><strong>Question 2.3 (1 pt) :</strong> Utilisez LINQ pour trouver :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>La commande la plus chère.</li><li>Le nombre de commandes de plus de 50000 FCFA.</li><li>Le montant moyen des commandes.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>// Commande la plus chère\nvar commandeMax = commandes.OrderByDescending(c => c.Total).First();\n// ou\nvar commandeMax2 = commandes.MaxBy(c => c.Total);\n\n// Nombre de commandes > 50000\nint nbGrandesCommandes = commandes.Count(c => c.Total > 50000);\n\n// Montant moyen des commandes\ndecimal moyenne = commandes.Average(c => c.Total);</pre>"
        },
        {
          "question": "<div><p><strong>Question 2.4 (1 pt) :</strong> Écrivez une requête LINQ pour trouver les <strong>5 produits les moins chers</strong> parmi ceux qui sont en stock.</p></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>var cinqMoinsChers = produits\n    .Where(p => p.Stock > 0)\n    .OrderBy(p => p.Prix)\n    .Take(5)\n    .Select(p => new { p.Nom, p.Prix, p.Stock });</pre>"
        }

          "question": "<div><p><strong>Question 3.1 (2 pts) :</strong> Écrivez une méthode <code>LireFichierSecurise(string chemin)</code> qui :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Utilise un bloc <code>try-catch</code> pour lire un fichier texte avec <code>File.ReadAllText()</code>.</li><li>Capture <code>FileNotFoundException</code> et <code>IOException</code>.</li><li>Retourne le contenu du fichier ou une chaîne d'erreur appropriée.</li><li>Utilise <code>finally</code> pour afficher un message de fin d'opération.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public string LireFichierSecurise(string chemin)\n{\n    try\n    {\n        return File.ReadAllText(chemin);\n    }\n    catch (FileNotFoundException ex)\n    {\n        return $\"Erreur : Le fichier '{chemin}' n'a pas été trouvé.\";\n    }\n    catch (IOException ex)\n    {\n        return $\"Erreur d'accès au fichier : {ex.Message}\";\n    }\n    catch (Exception ex)\n    {\n        return $\"Erreur inattendue : {ex.Message}\";\n    }\n    finally\n    {\n        Console.WriteLine($\"Opération de lecture terminée pour le fichier : {chemin}\");\n    }\n}</pre>"

          "question": "<div><p><strong>Question 3.2 (2 pts) :</strong> Écrivez une méthode asynchrone <code>async Task TraiterDonneesAsync()</code> qui :</p><ul style='list-style-type: lower-alpha; padding-left: 20px;'><li>Simule le téléchargement de 3 fichiers avec <code>Task.Delay</code> (2s, 3s, 1s).</li><li>Utilise <code>Task.WhenAll</code> pour les lancer en parallèle.</li><li>Affiche un message quand chaque téléchargement est terminé.</li></ul></div>",
          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public async Task TraiterDonneesAsync()\n{\n    var tache1 = TelechargerAsync(\"fichier1\", 2000);\n    var tache2 = TelechargerAsync(\"fichier2\", 3000);\n    var tache3 = TelechargerAsync(\"fichier3\", 1000);\n    \n    await Task.WhenAll(tache1, tache2, tache3);\n    \n    Console.WriteLine(\"Tous les téléchargements sont terminés.\");\n}\n\nprivate async Task TelechargerAsync(string nom, int delai)\n{\n    await Task.Delay(delai);\n    Console.WriteLine($\"Téléchargement de {nom} terminé !\");\n}</pre>"

          "reponse": "<pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public async Task TraiterDonneesAvecTimeoutAsync()\n{\n    using var cts = new CancellationTokenSource();\n    \n    var tache1 = TelechargerAsync(\"fichier1\", 2000, cts.Token);\n    var tache2 = TelechargerAsync(\"fichier2\", 3000, cts.Token);\n    var tache3 = TelechargerAsync(\"fichier3\", 1000, cts.Token);\n    \n    var taches = new List&lt;Task&gt; { tache1, tache2, tache3 };\n    var tacheTimeout = Task.Delay(TimeSpan.FromSeconds(2.5));\n    \n    var tacheTerminee = await Task.WhenAny(Task.WhenAll(taches), tacheTimeout);\n    \n    if (tacheTerminee == tacheTimeout)\n    {\n        cts.Cancel(); // Annuler les tâches restantes\n        Console.WriteLine(\"Timeout : l'opération a pris trop de temps.\");\n    }\n    else\n    {\n        Console.WriteLine(\"Tous les téléchargements sont terminés.\");\n    }\n}\n\nprivate async Task TelechargerAsync(string nom, int delai, CancellationToken token)\n{\n    try\n    {\n        await Task.Delay(delai, token);\n        Console.WriteLine($\"Téléchargement de {nom} terminé !\");\n    }\n    catch (OperationCanceledException)\n    {\n        Console.WriteLine($\"Téléchargement de {nom} annulé.\");\n    }\n}</pre>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
