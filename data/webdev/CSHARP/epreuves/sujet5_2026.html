<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Initiation au C#",
  "classe": "Développement Web",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Bases du langage et contrôle de flux (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>Vous êtes développeur junior dans une startup camerounaise de e-commerce. L'équipe travaille sur un module de gestion de stock et vous devez écrire quelques fonctions utilitaires.</p>\n<p>Pour chaque question, écrivez un extrait de code C# valide.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Conditions (2 pts)</strong></p><p>Écrivez une méthode <code>string GetStockStatus(int quantity)</code> qui retourne :</p><ul style='list-style-type:disc; padding-left:20px;'><li><code>\"Rupture de stock\"</code> si quantity == 0</li><li><code>\"Stock faible\"</code> si quantity > 0 ET quantity <= 5</li><li><code>\"Stock disponible\"</code> si quantity > 5</li></ul></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\npublic string GetStockStatus(int quantity)<br>\n{<br>\n  if (quantity == 0)<br>\n    return \"Rupture de stock\";<br>\n  else if (quantity <= 5)<br>\n    return \"Stock faible\";<br>\n  else<br>\n    return \"Stock disponible\";<br>\n}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Boucles (2 pts)</strong></p><p>Écrivez une méthode <code>void DisplayProducts(string[] products)</code> qui affiche chaque produit précédé de son numéro (1. NomDuProduit, 2. NomDuProduit, ...). Utilisez une boucle <code>for</code>.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\npublic void DisplayProducts(string[] products)<br>\n{<br>\n  for (int i = 0; i < products.Length; i++)<br>\n  {<br>\n    Console.WriteLine($\"{i + 1}. {products[i]}\");<br>\n  }<br>\n}</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Programmation Orientée Objet (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>Vous devez modéliser un système de gestion de produits pour un site e-commerce.</p>\n<p>Un produit a un identifiant, un nom, un prix et une quantité en stock.</p>\n<p>Un produit électronique (ElectronicProduct) est un produit qui a en plus une garantie (en mois) et une tension nominale.</p>\n<p>Répondez aux questions ci-dessous en écrivant les classes et méthodes appropriées.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Classe Product (3 pts)</strong></p><p>Créez la classe <code>Product</code> avec :</p><ul style='list-style-type:disc; padding-left:20px;'><li>Des propriétés automatiques pour <code>Id</code>, <code>Name</code>, <code>Price</code> et <code>Stock</code>.</li><li>Un constructeur pour initialiser ces propriétés.</li><li>Une méthode <code>bool IsAvailable()</code> qui retourne <code>true</code> si le stock est supérieur à 0.</li></ul></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\npublic class Product<br>\n{<br>\n  public int Id { get; set; }<br>\n  public string Name { get; set; }<br>\n  public decimal Price { get; set; }<br>\n  public int Stock { get; set; }<br>\n<br>\n  public Product(int id, string name, decimal price, int stock)<br>\n  {<br>\n    Id = id;<br>\n    Name = name;<br>\n    Price = price;<br>\n    Stock = stock;<br>\n  }<br>\n<br>\n  public bool IsAvailable()<br>\n  {<br>\n    return Stock > 0;<br>\n  }<br>\n}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Héritage - ElectronicProduct (2 pts)</strong></p><p>Créez la classe <code>ElectronicProduct</code> qui hérite de <code>Product</code>. Ajoutez les propriétés <code>WarrantyMonths</code> (entier) et <code>Voltage</code> (décimal). Pensez à appeler le constructeur de la classe de base.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\npublic class ElectronicProduct : Product<br>\n{<br>\n  public int WarrantyMonths { get; set; }<br>\n  public decimal Voltage { get; set; }<br>\n<br>\n  public ElectronicProduct(int id, string name, decimal price, int stock, int warrantyMonths, decimal voltage)<br>\n    : base(id, name, price, stock)<br>\n  {<br>\n    WarrantyMonths = warrantyMonths;<br>\n    Voltage = voltage;<br>\n  }<br>\n}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>3) Polymorphisme (3 pts)</strong></p><p>Surchargez la méthode <code>ToString()</code> dans <code>ElectronicProduct</code> pour afficher : \"Product: [Nom], Prix: [Prix] FCFA, Garantie: [X] mois, Tension: [Y]V\".</p><p>Dans la méthode <code>Main</code>, créez une instance de <code>ElectronicProduct</code> et affichez ses informations.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\n// Dans ElectronicProduct<br>\npublic override string ToString()<br>\n{<br>\n  return $\"Product: {Name}, Prix: {Price} FCFA, Garantie: {WarrantyMonths} mois, Tension: {Voltage}V\";<br>\n}<br>\n<br>\n// Dans Main<br>\nElectronicProduct pc = new ElectronicProduct(1, \"Ordinateur Portable\", 500000, 10, 24, 220);<br>\nConsole.WriteLine(pc.ToString());<br>\n// Output: Product: Ordinateur Portable, Prix: 500000 FCFA, Garantie: 24 mois, Tension: 220V</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Collections et LINQ (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>On considère une liste de clients pour un service de livraison au Cameroun. Chaque client est représenté par la classe suivante :</p>\n<div style='background: #1f2937; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 0.9rem;'>\npublic class Client<br>\n{<br>\n  public int Id { get; set; }<br>\n  public string Nom { get; set; }<br>\n  public string Ville { get; set; }<br>\n  public decimal Solde { get; set; }<br>\n}<br>\n</div>\n<p>Utilisez les collections et LINQ pour répondre aux questions.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>1) Filtrage (2 pts)</strong></p><p>Écrivez une requête LINQ pour sélectionner les clients de la ville de \"Douala\" dont le solde est supérieur à 100 000 FCFA. Affichez leurs noms et soldes.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\nvar clientsDouala = clients<br>\n  .Where(c => c.Ville == \"Douala\" && c.Solde > 100000)<br>\n  .Select(c => new { c.Nom, c.Solde });<br>\n<br>\nforeach (var client in clientsDouala)<br>\n{<br>\n  Console.WriteLine($\"{client.Nom}: {client.Solde} FCFA\");<br>\n}</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>2) Agrégation (2 pts)</strong></p><p>Calculez le solde moyen des clients de la ville de \"Yaoundé\" et affichez-le.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\nvar soldeMoyenYaounde = clients<br>\n  .Where(c => c.Ville == \"Yaoundé\")<br>\n  .Average(c => c.Solde);<br>\n<br>\nConsole.WriteLine($\"Solde moyen à Yaoundé: {soldeMoyenYaounde:F2} FCFA\");</div>"
        },
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>3) Groupement (2 pts)</strong></p><p>Groupez les clients par ville et affichez pour chaque ville le nombre de clients et le solde total.</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\nvar groupes = clients<br>\n  .GroupBy(c => c.Ville)<br>\n  .Select(g => new { Ville = g.Key, NbClients = g.Count(), SoldeTotal = g.Sum(c => c.Solde) });<br>\n<br>\nforeach (var groupe in groupes)<br>\n{<br>\n  Console.WriteLine($\"Ville: {groupe.Ville}, Clients: {groupe.NbClients}, Solde total: {groupe.SoldeTotal} FCFA\");<br>\n}</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Gestion des erreurs et async/await (2 pts)",
      "points": "2 pts",
      "enonce": "<div style='color: #e5e7eb; font-size: 1rem; line-height: 1.6;'>\n<p>L'application doit interroger une API externe pour récupérer des données de livraison.</p>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #e5e7eb;'><p><strong>Méthode asynchrone (2 pts)</strong></p><p>Écrivez une méthode asynchrone <code>async Task&lt;string&gt; GetDeliveryDataAsync(string trackingNumber)</code> qui simule un appel à une API (utilisez <code>Task.Delay</code>).</p><p>Si le numéro de suivi est <code>null</code> ou vide, levez une <code>ArgumentException</code> avec le message \"Numéro de suivi invalide\".</p></div>",
          "reponse": "<div style='color: #d1d5db; background: #111827; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem;'>\npublic async Task<string> GetDeliveryDataAsync(string trackingNumber)<br>\n{<br>\n  if (string.IsNullOrEmpty(trackingNumber))<br>\n  {<br>\n    throw new ArgumentException(\"Numéro de suivi invalide\");<br>\n  }<br>\n<br>\n  await Task.Delay(2000); // Simule un appel API<br>\n  return $\"Données de livraison pour le suivi: {trackingNumber}\";<br>\n}</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
