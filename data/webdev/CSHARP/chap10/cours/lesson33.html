<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux tâches asynchrones",
    "contenu": "<div style='padding: 10px;'><p>La programmation asynchrone permet d'exécuter des opérations <strong>sans bloquer le thread principal</strong>, améliorant ainsi la <strong>réactivité</strong> et la <strong>scalabilité</strong> des applications.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Pourquoi ?</strong> Les opérations longues (appels réseau, accès base de données, lecture de fichiers) peuvent bloquer l'interface utilisateur.</li><li><strong>Solution :</strong> Utiliser <code>async</code>/<code>await</code> et la classe <code>Task</code>.</li><li><strong>Avantages :</strong><ul style='list-style-type: circle; padding-left: 20px;'><li>Interface utilisateur réactive.</li><li>Meilleure utilisation des ressources serveur.</li><li>Code plus lisible et maintenable.</li></ul></li></ul><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #add8e6;'><p style='color: #000;'><strong>📋 Analogie :</strong> Imaginez un restaurant où le serveur prend une commande et l'envoie en cuisine. Pendant que la cuisine prépare le plat, le serveur peut s'occuper d'autres clients au lieu d'attendre debout. C'est exactement ce que fait la programmation asynchrone !</p></div></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons approfondir la programmation asynchrone en C# en voyant comment démarrer des tâches, attendre plusieurs tâches, et gérer l'annulation. La programmation asynchrone est essentielle pour créer des applications réactives et performantes. Elle permet d'exécuter des opérations longues comme des appels réseau ou des accès à la base de données sans bloquer le thread principal. Pour l'analogie, imaginez un serveur dans un restaurant qui prend une commande et la transmet en cuisine. Pendant que le cuisinier prépare le plat, le serveur s'occupe d'autres clients au lieu d'attendre debout devant la cuisine. C'est exactement ce que fait le code asynchrone : il ne bloque pas le thread pendant les opérations longues.",
    "note": "La programmation asynchrone est indispensable pour créer des applications réactives et scalables."
  },
  {
    "titre": "Démarrer des tâches avec Task.Run()",
    "contenu": "<div style='padding: 10px;'><p>La méthode <code>Task.Run()</code> permet de <strong>démarrer une opération</strong> sur un thread du pool de threads.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Syntaxe :</strong> <code>Task.Run(() =&gt; { /* code */ })</code></li><li><strong>Utilité :</strong> Exécuter du code intensif en CPU en arrière-plan.</li><li><strong>Retour :</strong> Un objet <code>Task</code> ou <code>Task&lt;T&gt;</code> pour les résultats.</li></ul><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📝 Exemples :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>// Tâche sans retour (Action)\nTask task = Task.Run(() =>\n{\n    Console.WriteLine(\"Début du traitement long...\");\n    Thread.Sleep(3000); // Simule un traitement de 3 secondes\n    Console.WriteLine(\"Traitement terminé !\");\n});\n\n// Tâche avec retour (Func&lt;T&gt;)\nTask&lt;int&gt; taskCalcul = Task.Run(() =>\n{\n    int resultat = 0;\n    for (int i = 0; i &lt; 1000000; i++)\n        resultat += i;\n    return resultat;\n});\n\n// Attendre le résultat\nint somme = await taskCalcul;\nConsole.WriteLine($\"Somme: {somme}\");</pre></div></div>",
    "texteParle": "Commençons par la méthode 'Task.Run()' qui permet de démarrer une opération sur un thread du pool de threads. C'est la méthode la plus simple pour exécuter du code en arrière-plan. Vous lui passez une action (pour une tâche sans retour) ou une fonction (pour une tâche avec retour). Par exemple, pour simuler un traitement long qui dure 3 secondes, on peut utiliser 'Task.Run' avec un 'Thread.Sleep'. Pour un calcul intensif comme la somme des nombres de 1 à 1 million, on peut également utiliser 'Task.Run' et récupérer le résultat avec 'await'. Attention, 'Task.Run' est généralement réservé aux opérations intensives en CPU. Pour les opérations asynchrones comme les appels réseau, on préfère utiliser directement les méthodes asynchrones des bibliothèques.",
    "note": "Task.Run est idéal pour les opérations intensives en CPU, mais pas pour les opérations asynchrones natives."
  },
  {
    "titre": "Attendre plusieurs tâches avec Task.WhenAll",
    "contenu": "<div style='padding: 10px;'><p><code>Task.WhenAll</code> permet d'<strong>attendre que toutes</strong> les tâches d'une collection soient terminées.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Syntaxe :</strong> <code>await Task.WhenAll(tache1, tache2, ...)</code></li><li><strong>Utilité :</strong> Lancer plusieurs opérations en parallèle et attendre leur achèvement.</li><li><strong>Gain :</strong> Réduit le temps total d'exécution par rapport à un enchaînement séquentiel.</li></ul><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📝 Exemple concret :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>// Récupérer des données depuis plusieurs sources en parallèle\nTask&lt;List&lt;Client&gt;&gt; tacheClients = GetClientsAsync();\nTask&lt;List&lt;Produit&gt;&gt; tacheProduits = GetProduitsAsync();\nTask&lt;List&lt;Commande&gt;&gt; tacheCommandes = GetCommandesAsync();\n\n// Attendre que les trois requêtes soient terminées\nawait Task.WhenAll(tacheClients, tacheProduits, tacheCommandes);\n\n// Récupérer les résultats\nvar clients = await tacheClients;\nvar produits = await tacheProduits;\nvar commandes = await tacheCommandes;\n\n// Les trois opérations se sont déroulées en parallèle</pre></div></div>",
    "texteParle": "La méthode 'Task.WhenAll' est très utile lorsqu'on veut lancer plusieurs opérations en parallèle et attendre qu'elles soient toutes terminées. Par exemple, imaginons une application qui doit récupérer des clients, des produits et des commandes pour construire un tableau de bord. Si on appelle ces trois méthodes les unes après les autres avec 'await', le temps total sera la somme des trois temps. Avec 'Task.WhenAll', on lance les trois requêtes en parallèle, et le temps total sera seulement le temps de la plus lente des trois. C'est un gain de performance significatif ! La syntaxe est simple : on crée les trois tâches, puis on appelle 'await Task.WhenAll' avec les trois tâches en paramètres. Une fois que toutes sont terminées, on récupère les résultats.",
    "note": "Task.WhenAll est idéal pour paralléliser des opérations indépendantes et réduire le temps d'exécution."
  },
  {
    "titre": "Attendre la première tâche avec Task.WhenAny",
    "contenu": "<div style='padding: 10px;'><p><code>Task.WhenAny</code> permet d'<strong>attendre la première</strong> tâche qui se termine parmi une collection.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Syntaxe :</strong> <code>Task completedTask = await Task.WhenAny(tache1, tache2, ...)</code></li><li><strong>Utilité :</strong> Timeout, récupération du résultat le plus rapide, fallback.</li><li><strong>Retour :</strong> La tâche qui s'est terminée en premier.</li></ul><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📝 Exemple : Implémentation d'un timeout</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public async Task&lt;string&gt; RecupererDonneesAvecTimeout()\n{\n    // Tâche principale\n    Task&lt;string&gt; tachePrincipale = AppelApiLentAsync();\n    \n    // Tâche de timeout\n    Task tacheTimeout = Task.Delay(TimeSpan.FromSeconds(5));\n    \n    // Attendre la première tâche qui se termine\n    Task premiereTerminee = await Task.WhenAny(tachePrincipale, tacheTimeout);\n    \n    if (premiereTerminee == tacheTimeout)\n    {\n        return \"Timeout : l'opération a pris trop de temps.\";\n    }\n    else\n    {\n        return await tachePrincipale;\n    }\n}</pre></div></div>",
    "texteParle": "La méthode 'Task.WhenAny' est l'opposé de 'Task.WhenAll' : elle attend la première tâche qui se termine, peu importe laquelle. C'est très utile pour implémenter des mécanismes de timeout. Par exemple, vous avez une tâche principale qui appelle une API, et vous voulez que l'opération échoue si elle dépasse 5 secondes. Vous pouvez créer une tâche de timeout avec 'Task.Delay' et utiliser 'Task.WhenAny' pour attendre la première des deux tâches. Si c'est la tâche de timeout qui se termine en premier, vous gérez le cas d'erreur. Sinon, vous récupérez le résultat de la tâche principale. C'est une manière élégante et robuste de gérer les délais d'attente.",
    "note": "Task.WhenAny est essentiel pour les mécanismes de timeout, de fallback et de sélection de la meilleure source de données."
  },
  {
    "titre": "Annuler des tâches avec CancellationToken",
    "contenu": "<div style='padding: 10px;'><p>Un <code>CancellationToken</code> permet d'<strong>annuler proprement</strong> une opération asynchrone en cours.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Principe :</strong> On passe un <code>CancellationToken</code> à la tâche, et on peut demander l'annulation depuis l'extérieur.</li><li><strong>Source :</strong> <code>CancellationTokenSource</code> pour déclencher l'annulation.</li><li><strong>Vérification :</strong> La tâche doit périodiquement vérifier <code>token.IsCancellationRequested</code>.</li></ul><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📝 Exemple :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public async Task TraiterDonnees(CancellationToken token)\n{\n    for (int i = 0; i &lt; 100; i++)\n    {\n        // Vérifier si l'annulation a été demandée\n        token.ThrowIfCancellationRequested();\n        \n        await Task.Delay(1000, token); // Simule du travail\n        Console.WriteLine($\"Étape {i+1}/100 terminée\");\n    }\n}\n\n// Utilisation\nusing var cts = new CancellationTokenSource();\n\n// Lancer la tâche\nTask tache = TraiterDonnees(cts.Token);\n\n// Annuler après 5 secondes\nawait Task.Delay(5000);\ncts.Cancel(); // Demande d'annulation\n\n// La tâche lèvera une OperationCanceledException</pre></div></div>",
    "texteParle": "Un aspect important de la programmation asynchrone est la possibilité d'annuler une tâche en cours. En C#, cela se fait avec 'CancellationToken'. Le principe est simple : vous créez un 'CancellationTokenSource' qui vous permet de demander l'annulation, et vous passez le token à votre tâche. Dans la tâche, vous vérifiez périodiquement si l'annulation a été demandée, soit en appelant 'ThrowIfCancellationRequested' qui lève une exception, soit en vérifiant la propriété 'IsCancellationRequested'. Dans l'exemple, nous avons une tâche qui effectue 100 étapes. Nous la lançons, puis après 5 secondes, nous demandons l'annulation. La tâche vérifie le token à chaque itération et lève une exception qui peut être capturée pour un nettoyage propre.",
    "note": "CancellationToken est la méthode standard pour annuler proprement des opérations asynchrones en C#."
  },
  {
    "titre": "Combinaison : WhenAll + CancellationToken",
    "contenu": "<div style='padding: 10px;'><p>On peut combiner <code>Task.WhenAll</code> avec <code>CancellationToken</code> pour des opérations <strong>parallèles annulables</strong>.</p><ul style='list-style-type: disc; padding-left: 20px;'><li><strong>Approche :</strong> Passer le même token à toutes les tâches.</li><li><strong>Résultat :</strong> L'annulation annule toutes les tâches en cours.</li><li><strong>Gestion :</strong> Capturer <code>OperationCanceledException</code> pour un traitement propre.</li></ul><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd;'><p style='color: #000;'><strong>📝 Exemple :</strong></p><pre style='background-color: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-size: 14px;'>public async Task TraitementParalleleAnnulable(CancellationToken token)\n{\n    try\n    {\n        var taches = new List&lt;Task&gt;\n        {\n            TraiterSource1(token),\n            TraiterSource2(token),\n            TraiterSource3(token)\n        };\n        \n        await Task.WhenAll(taches);\n        Console.WriteLine(\"Tous les traitements sont terminés.\");\n    }\n    catch (OperationCanceledException)\n    {\n        Console.WriteLine(\"Les traitements ont été annulés.\");\n        // Nettoyage si nécessaire\n    }\n}</pre></div></div>",
    "texteParle": "On peut combiner 'Task.WhenAll' et 'CancellationToken' pour créer des opérations parallèles annulables. Par exemple, si vous lancez trois traitements en parallèle et que vous souhaitez pouvoir tous les annuler d'un seul coup, vous passez le même 'CancellationToken' à toutes les tâches. Quand vous appelez 'Cancel()' sur le 'CancellationTokenSource', toutes les tâches qui vérifient le token recevront la demande d'annulation et lèveront une 'OperationCanceledException'. Vous pouvez capturer cette exception pour effectuer un nettoyage ou informer l'utilisateur. C'est une manière élégante et uniforme de gérer l'annulation d'opérations parallèles complexes.",
    "note": "L'annulation de tâches parallèles avec un même token permet un contrôle centralisé sur des opérations complexes."

  {
    "titre": "Bonnes pratiques et points de vigilance",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border: 1px solid #add8e6;'><p style='color: #000;'><strong>✅ Bonnes pratiques :</strong></p><ul style='color: #000; padding-left: 20px;'><li><strong>Toujours passer un CancellationToken</strong> aux méthodes asynchrones quand c'est possible.</li><li><strong>Utiliser <code>Task.WhenAll</code></strong> pour les opérations parallèles indépendantes.</li><li><strong>Utiliser <code>Task.WhenAny</code></strong> pour les timeouts ou les fallbacks.</li><li><strong>Capturer <code>OperationCanceledException</code></strong> pour gérer proprement l'annulation.</li><li><strong>Ne pas bloquer</strong> le thread avec <code>.Result</code> ou <code>.Wait()</code> dans un contexte async.</li></ul></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffeeba;'><p style='color: #856404;'><strong>⚠️ Points d'attention :</strong></p><ul style='color: #856404; padding-left: 20px;'><li><strong>Deadlocks :</strong> Évitez de mélanger <code>Wait()</code> ou <code>Result</code> avec <code>await</code> dans des contextes UI.</li><li><strong>Gestion des ressources :</strong> Disposez correctement les <code>CancellationTokenSource</code> avec <code>using</code>.</li><li><strong>Ne pas sur-utiliser <code>Task.Run</code></strong> pour des opérations asynchrones qui ont déjà une méthode async disponible.</li></ul></div></div>",
    "texteParle": "Pour conclure, voici quelques bonnes pratiques et points de vigilance pour la gestion des tâches asynchrones. Toujours passer un 'CancellationToken' aux méthodes asynchrones quand c'est possible, même si vous ne pensez pas l'utiliser, car cela rend votre code plus flexible. Utilisez 'Task.WhenAll' pour les opérations parallèles indépendantes, et 'Task.WhenAny' pour les timeouts. Pensez à capturer 'OperationCanceledException' pour gérer proprement l'annulation. Ne bloquez jamais le thread avec '.Result' ou '.Wait()' dans un contexte asynchrone, cela peut causer des deadlocks. Et attention à ne pas sur-utiliser 'Task.Run' pour des opérations qui ont déjà une version asynchrone native. Une bonne maîtrise de ces techniques vous permettra d'écrire des applications réactives et performantes.",
    "note": "La programmation asynchrone bien maîtrisée est un atout majeur pour le développement d'applications modernes."

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';

        document.querySelectorAll('.btn').forEach(btn => {

        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {

        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
