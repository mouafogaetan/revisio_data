<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 11 : Les tableaux en C# | Cours Initiation C#</title>
  <!-- Tailwind CSS + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (formules mathématiques) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* personnalisation douce pour la lisibilité */
    body {
      background: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }
    .slide-container {
      transition: transform 0.3s ease, opacity 0.2s;
    }
    .btn-nav {
      transition: all 0.2s;
    }
    .btn-nav:active {
      transform: scale(0.96);
    }
    /* rendu agréable des puces et code */
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 1rem;
      overflow-x: auto;
      font-size: 0.9rem;
      margin: 1rem 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #eef2ff;
      padding: 0.2rem 0.4rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      color: #1e293b;
    }
    pre code {
      background: transparent;
      padding: 0;
      color: #e2e8f0;
    }
    .card-slide {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
    }
    .progress-bar {
      transition: width 0.2s ease;
    }
    @media (max-width: 640px) {
      .card-slide {
        border-radius: 1.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body class="antialiased">

  <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- En-tête léger avec progression -->
    <div class="mb-5 flex justify-between items-center text-sm text-gray-500 font-medium">
      <span>📘 <span id="chapterRef">Chapitre 4 · Manipuler des séquences</span></span>
      <span class="bg-white/60 px-3 py-1 rounded-full shadow-sm">Leçon 11 : Tableaux monodimensionnels</span>
    </div>

    <!-- Conteneur des slides (carousel style) -->
    <div class="relative overflow-hidden rounded-2xl">
      <div id="slidesWrapper" class="slide-container flex transition-all duration-500 ease-out">
        <!-- Les slides seront injectées dynamiquement avec jQuery -->
      </div>

      <!-- Indicateurs de progression + navigation -->
      <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
        <div class="flex gap-2">
          <button id="prevBtn" class="btn-nav bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition">◀ Précédent</button>
          <button id="nextBtn" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
        </div>
        <div class="text-sm text-gray-500 bg-white/70 px-4 py-1 rounded-full">
          Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
        </div>
      </div>
      <!-- barre de progression -->
      <div class="w-full bg-gray-200 rounded-full h-2 mt-4 overflow-hidden">
        <div id="progressFill" class="progress-bar bg-indigo-500 h-2 rounded-full" style="width: 0%"></div>
      </div>
    </div>

    <!-- Petit pied de page discret -->
    <div class="text-center text-xs text-gray-400 mt-8">
      🇨🇲 Cours d'initiation C# — Lycée Webdev | Support interactif
    </div>
  </div>

  <script>
    // Données de la leçon 11 (basées sur le JSON objectifsLesson de lesson11 : "Déclarer et initialiser des tableaux monodimensionnels" etc.)
    // Nous structurons le contenu en slides : titre, objectifs, puis contenu enrichi avec exemples de code et explications simples.
    const lessonData = {
      title: "Les tableaux monodimensionnels en C#",
      description: "Apprenez à stocker et manipuler plusieurs données du même type dans une seule variable.",
      objectives: [
        "Déclarer et initialiser des tableaux monodimensionnels",
        "Accéder et modifier les éléments par leur index",
        "Utiliser les propriétés Length et Rank"
      ],
      contentSlides: [
        {
          title: "🧱 Qu'est-ce qu'un tableau ?",
          content: `
            <p class="text-lg leading-relaxed">Un <strong class="text-indigo-700">tableau</strong> est comme une <strong class="text-indigo-700">boîte à compartiments</strong> où chaque compartiment contient une valeur du même type (entiers, chaînes, etc.).</p>
            <div class="bg-indigo-50 p-4 rounded-xl my-4 border-l-8 border-indigo-400">
              <p class="font-medium">📌 Exemple concret :</p>
              <p>Une liste de 5 notes d’élèves : <code class="bg-white">[12, 15, 09, 18, 14]</code> → c’est un tableau d’entiers.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
              <div class="bg-white p-3 rounded-lg shadow-sm">
                <span class="font-mono text-sm">📋 Syntaxe :</span>
                <pre class="text-sm"><code>type[] nomTableau;</code></pre>
              </div>
              <div class="bg-white p-3 rounded-lg shadow-sm">
                <span class="font-mono text-sm">✨ Initialisation rapide :</span>
                <pre class="text-sm"><code>int[] notes = new int[5];</code></pre>
              </div>
            </div>
            <p class="mt-3 text-gray-600">Un tableau est <strong>de taille fixe</strong> (une fois défini, on ne peut pas ajouter/supprimer des cases).</p>
          `
        },
        {
          title: "📦 Déclaration et initialisation",
          content: `
            <p>Plusieurs façons d’avoir un tableau prêt à l’emploi :</p>
            <div class="space-y-4 mt-3">
              <div class="bg-gray-800 text-gray-100 rounded-xl p-3">
                <p class="text-amber-300 font-mono text-sm">// 1. Déclaration puis allocation</p>
                <pre><code>int[] nombres;  
nombres = new int[3];  // 3 cases, valeurs par défaut 0</code></pre>
              </div>
              <div class="bg-gray-800 text-gray-100 rounded-xl p-3">
                <p class="text-amber-300 font-mono text-sm">// 2. Initialisation avec valeurs directes</p>
                <pre><code>string[] eleves = new string[] {"Aicha", "Kevin", "Moussa"};</code></pre>
              </div>
              <div class="bg-gray-800 text-gray-100 rounded-xl p-3">
                <p class="text-amber-300 font-mono text-sm">// 3. Syntaxe simplifiée (préférée)</p>
                <pre><code>double[] temperatures = { 23.5, 24.0, 22.8, 25.1 };</code></pre>
              </div>
            </div>
            <div class="mt-4 p-3 bg-green-50 rounded-xl text-green-800 text-sm">
              💡 <span class="font-bold">À retenir :</span> La taille est déterminée par le nombre d’éléments entre <code>{ }</code>.
            </div>
          `
        },
        {
          title: "📍 Accès aux éléments (l'index)",
          content: `
            <p>Chaque case possède un <strong class="text-purple-700">numéro d’ordre (index)</strong> commençant par <strong class="bg-purple-100 px-1 rounded">0</strong> pour le premier élément.</p>
            <div class="my-4 p-3 bg-amber-50 rounded-lg border border-amber-200">
              <p>🎯 <strong>Exemple concret :</strong> tableau <code>couleurs = ["Rouge", "Vert", "Bleu"]</code></p>
              <ul class="list-disc ml-6 mt-2 space-y-1">
                <li><code>couleurs[0]</code> → "Rouge"</li>
                <li><code>couleurs[1]</code> → "Vert"</li>
                <li><code>couleurs[2]</code> → "Bleu"</li>
              </ul>
            </div>
            <pre><code>int[] ages = { 15, 17, 16, 18 };
Console.WriteLine(ages[2]);  // Affiche 16

// Modification
ages[1] = 19;
Console.WriteLine(ages[1]);  // maintenant 19</code></pre>
            <div class="mt-3 bg-red-50 text-red-800 p-3 rounded-lg text-sm">
              ⚠️ Attention : si on utilise un index invalide (ex: <code>ages[4]</code> pour un tableau de taille 4), l'erreur <strong>IndexOutOfRangeException</strong> se produit.
            </div>
          `
        },
        {
          title: "📏 Propriétés Length et Rank",
          content: `
            <p>Les tableaux en C# possèdent des propriétés utiles :</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-4">
              <div class="bg-gradient-to-br from-slate-50 to-slate-100 p-4 rounded-xl shadow-sm">
                <h3 class="font-bold text-indigo-800 text-lg">📐 Length</h3>
                <p>Donne le nombre total d'éléments dans le tableau.</p>
                <pre class="mt-2"><code>int[] tab = { 10, 20, 30, 40 };
Console.WriteLine(tab.Length);  // Affiche 4</code></pre>
              </div>
              <div class="bg-gradient-to-br from-slate-50 to-slate-100 p-4 rounded-xl shadow-sm">
                <h3 class="font-bold text-indigo-800 text-lg">📊 Rank</h3>
                <p>Indique le nombre de dimensions. Pour un tableau simple : <strong>Rank = 1</strong>.</p>
                <pre class="mt-2"><code>int[] simple = new int[5];
Console.WriteLine(simple.Rank); // 1 (monodimensionnel)</code></pre>
              </div>
            </div>
            <p class="italic text-gray-600">Length est très pratique pour parcourir le tableau sans risquer l'erreur d'index.</p>
            <pre><code>for (int i = 0; i < tab.Length; i++) {
    Console.WriteLine(tab[i]);
}</code></pre>
          `
        },
        {
          title: "🧪 Exemple complet & bonnes pratiques",
          content: `
            <p class="font-semibold">📌 Programme simple : moyenne de notes</p>
            <pre><code>using System;

class Program {
    static void Main() {
        double[] notes = { 12.5, 15.0, 8.5, 17.0, 14.5 };
        double somme = 0;
        
        for (int i = 0; i < notes.Length; i++) {
            somme += notes[i];
        }
        
        double moyenne = somme / notes.Length;
        Console.WriteLine($"La moyenne de la classe est : {moyenne:F2}");
    }
}</code></pre>
            <div class="flex flex-wrap gap-2 mt-4 justify-center">
              <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm">✅ Toujours utiliser .Length pour les boucles</span>
              <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm">✅ Les indices commencent à 0</span>
              <span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-sm">✅ Taille figée à la création</span>
            </div>
            <!-- Petit dessin SVG fait maison représentant un tableau -->
            <div class="mt-6 flex justify-center">
              <svg width="280" height="100" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" class="border rounded-lg bg-white p-1 shadow-md">
                <rect x="10" y="15" width="50" height="50" fill="#e0e7ff" stroke="#4338ca" stroke-width="2" rx="6"/>
                <text x="35" y="48" text-anchor="middle" font-size="12" fill="#1e1b4b">[0]</text>
                <rect x="70" y="15" width="50" height="50" fill="#e0e7ff" stroke="#4338ca" stroke-width="2" rx="6"/>
                <text x="95" y="48" text-anchor="middle" font-size="12" fill="#1e1b4b">[1]</text>
                <rect x="130" y="15" width="50" height="50" fill="#e0e7ff" stroke="#4338ca" stroke-width="2" rx="6"/>
                <text x="155" y="48" text-anchor="middle" font-size="12" fill="#1e1b4b">[2]</text>
                <rect x="190" y="15" width="50" height="50" fill="#e0e7ff" stroke="#4338ca" stroke-width="2" rx="6"/>
                <text x="215" y="48" text-anchor="middle" font-size="12" fill="#1e1b4b">[3]</text>
                <rect x="250" y="15" width="40" height="50" fill="#c7d2fe" stroke="#4338ca" stroke-width="2" stroke-dasharray="4" rx="6"/>
                <text x="270" y="48" text-anchor="middle" font-size="10" fill="#3730a3">...</text>
                <text x="150" y="85" text-anchor="middle" fill="#334155" font-size="12">tableau.Length = nombre total cases</text>
              </svg>
            </div>
          `
        },
        {
          title: "🏁 Exercice rapide (auto-évaluation)",
          content: `
            <p class="font-bold">À vous de jouer ! 🧠</p>
            <div class="bg-indigo-50 p-4 rounded-2xl my-3">
              <p class="font-mono">1️⃣ Déclarez un tableau de 4 chaînes contenant les noms de vos matières préférées.</p>
              <p class="font-mono mt-2">2️⃣ Affichez la deuxième matière en utilisant l'index.</p>
              <p class="font-mono mt-2">3️⃣ Remplacez la première valeur par "C# avancé" et affichez la nouvelle longueur du tableau avec <code>.Length</code>.</p>
            </div>
            <details class="bg-white border rounded-xl p-3 mt-2 cursor-pointer">
              <summary class="font-semibold text-indigo-600">📖 Voir une solution possible</summary>
              <pre class="mt-2"><code>string[] matieres = { "Algorithmique", "BD", "Réseaux", "C#" };
Console.WriteLine(matieres[1]);  // "BD"
matieres[0] = "C# avancé";
Console.WriteLine(matieres.Length);  // 4</code></pre>
            </details>
            <div class="mt-6 text-center text-sm text-gray-500">
              💪 Maîtriser les tableaux, c'est la première étape pour structurer des données !
            </div>
          `
        }
      ]
    };

    // Construction des slides : slide0 (titre), slide1 (objectifs), puis les contentSlides
    let slidesArray = [];

    // Slide de titre
    slidesArray.push({
      type: "title",
      html: `
        <div class="flex flex-col items-center justify-center text-center min-h-[60vh] p-6">
          <div class="bg-indigo-100 rounded-full p-4 w-20 h-20 flex items-center justify-center mx-auto mb-4 shadow-md">
            <span class="text-4xl">📚</span>
          </div>
          <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${lessonData.title}</h1>
          <p class="text-gray-600 mt-4 max-w-lg text-lg">${lessonData.description}</p>
          <div class="mt-8 flex gap-2 text-sm bg-white/60 p-2 rounded-full px-4">
            <span>🎯 Chapitre 4</span> • <span>⏱️ ~20 min</span> • <span>🧑‍🏫 Niveau débutant</span>
          </div>
          <div class="mt-10 text-indigo-500 animate-pulse text-sm">👆 Cliquez sur suivant pour commencer</div>
        </div>
      `
    });

    // Slide des objectifs
    let objectivesHtml = `<div class="p-6 md:p-8"><h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">🎯 Objectifs d'apprentissage</h2><ul class="space-y-4 text-lg">`;
    lessonData.objectives.forEach(obj => {
      objectivesHtml += `<li class="flex items-start gap-3"><span class="text-indigo-600 text-2xl leading-6">✓</span> <span>${obj}</span></li>`;
    });
    objectivesHtml += `</ul><div class="mt-8 bg-gray-100 p-4 rounded-xl italic text-gray-700">💡 Après cette leçon, vous serez capable de manipuler des tableaux simples en C#.</div></div>`;
    slidesArray.push({ type: "objectives", html: objectivesHtml });

    // Ajout des slides de contenu depuis lessonData.contentSlides
    lessonData.contentSlides.forEach((slide, idx) => {
      slidesArray.push({
        type: "content",
        title: slide.title,
        html: `
          <div class="p-6 md:p-8">
            <div class="flex items-center gap-2 mb-5">
              <span class="text-indigo-500 text-2xl">📖</span>
              <h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2>
            </div>
            <div class="prose prose-indigo max-w-none">
              ${slide.content}
            </div>
          </div>
        `
      });
    });

    // Variable d'état du slide courant
    let currentSlide = 0;
    let totalSlides = slidesArray.length;

    // Fonction pour re-rendre le slider et mettre à jour la progression
    function renderSlides() {
      const wrapper = $("#slidesWrapper");
      wrapper.empty();
      for (let i = 0; i < slidesArray.length; i++) {
        const slideDiv = $("<div>").addClass("w-full flex-shrink-0 transition-all duration-300 px-2");
        const card = $("<div>").addClass("card-slide bg-white/90 backdrop-blur-sm w-full overflow-hidden");
        card.html(slidesArray[i].html);
        slideDiv.append(card);
        wrapper.append(slideDiv);
      }
      // Ajuster la largeur du conteneur flexible
      $(".slide-container").css("display", "flex");
      updateSlidePosition();
      updateIndicators();
    }

    function updateSlidePosition() {
      const slideWidth = $("#slidesWrapper").parent().width(); // largeur du conteneur parent
      if (slideWidth) {
        const offset = -currentSlide * slideWidth;
        $("#slidesWrapper").css("transform", `translateX(${offset}px)`);
      } else {
        // fallback
        $("#slidesWrapper").css("transform", `translateX(-${currentSlide * 100}%)`);
      }
      updateIndicators();
    }

    function updateIndicators() {
      $("#currentSlideIdx").text(currentSlide + 1);
      $("#totalSlidesCount").text(totalSlides);
      const progressPercent = ((currentSlide + 1) / totalSlides) * 100;
      $("#progressFill").css("width", `${progressPercent}%`);
      // gérer états désactivés des boutons
      if (currentSlide === 0) {
        $("#prevBtn").prop("disabled", true);
      } else {
        $("#prevBtn").prop("disabled", false);
      }
      if (currentSlide === totalSlides - 1) {
        $("#nextBtn").prop("disabled", true).text("Terminé ✓");
      } else {
        $("#nextBtn").prop("disabled", false).text("Suivant ▶");
      }
      // déclencher éventuellement un rafraîchissement MathJax sur le nouveau contenu (pour d'éventuelles équations)
      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    function goPrev() {
      if (currentSlide > 0) {
        currentSlide--;
        updateSlidePosition();
        // scroll léger au sommet pour confort
        $("html, body").animate({ scrollTop: $(".max-w-4xl").offset().top - 20 }, 100);
      }
    }

    function goNext() {
      if (currentSlide < totalSlides - 1) {
        currentSlide++;
        updateSlidePosition();
        $("html, body").animate({ scrollTop: $(".max-w-4xl").offset().top - 20 }, 100);
      } else {
        // si dernier slide, petit message félicitations
        if(currentSlide === totalSlides - 1){
          alert("🎉 Félicitations ! Vous avez terminé la leçon 11. N'oubliez pas de pratiquer avec des exercices.");
        }
      }
    }

    // Gestion du redimensionnement pour réajuster la position
    let resizeTimer;
    $(window).on("resize", function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        updateSlidePosition();
      }, 150);
    });

    $(document).ready(function () {
      renderSlides();
      // Attacher événements
      $("#prevBtn").on("click", goPrev);
      $("#nextBtn").on("click", goNext);
      // navigation clavier (flèches)
      $(document).on("keydown", function(e) {
        if (e.key === "ArrowLeft") {
          goPrev();
          e.preventDefault();
        } else if (e.key === "ArrowRight") {
          goNext();
          e.preventDefault();
        }
      });
      // initialiser la barre de progression
      updateIndicators();
    });
  </script>
</body>
</html>
