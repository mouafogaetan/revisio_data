<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 10 : Navigation avancée - React Native e-commerce</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- Font Awesome 6 (gratuit) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- MathJax (pour formules mathématiques si besoin) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transition fluide entre slides */
    .slide {
      transition: opacity 0.25s ease-in-out;
    }
    body {
      background: #f0f4f8;
    }
    .nav-btn {
      min-width: 44px;
      min-height: 44px;
    }
    /* personnalisation légère pour le confort visuel */
    .card-hover:hover {
      transform: translateY(-3px);
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 font-sans antialiased">

  <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <div class="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl border border-indigo-100 overflow-hidden">
      
      <!-- En-tête avec progression -->
      <div class="bg-indigo-800 px-5 py-3 flex justify-between items-center text-white">
        <div class="flex items-center gap-2">
          <i class="fas fa-compass text-lg"></i>
          <span class="font-semibold text-sm md:text-base">Navigation avancée · React Native</span>
        </div>
        <div class="text-sm bg-indigo-700 px-3 py-1 rounded-full">
          Leçon 10 / 55
        </div>
      </div>

      <!-- conteneur dynamique des slides -->
      <div id="slides-container" class="min-h-[520px] md:min-h-[560px] relative"></div>

      <!-- barre de navigation + indicateurs -->
      <div class="flex justify-between items-center p-5 border-t border-indigo-100 bg-gray-50">
        <button id="prevSlide" class="nav-btn bg-white hover:bg-indigo-100 text-indigo-800 font-semibold py-2 px-5 rounded-full shadow transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <div id="slide-indicators" class="flex gap-2 flex-wrap justify-center"></div>
        <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow transition-all flex items-center gap-2">
          Suivant <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
    <div class="text-center text-sm text-gray-500 mt-6">
      <i class="fas fa-mobile-alt"></i> Navigation conditionnelle, tiroir latéral et deep linking | Support iOS & Android
    </div>
  </div>

  <script>
    // ------------------------------------------------------------
    // Données des slides - Leçon 10 : Implémenter authentification avec navigation conditionnelle,
    // Drawer Navigator et deep links (partage de produits)
    // ------------------------------------------------------------
    const slidesData = [
      {
        type: "title",
        title: "🚀 Navigation avancée dans React Native",
        subtitle: "Authentification conditionnelle, Menu latéral (Drawer) et Deep Links",
        icon: "fa-route",
        bgClass: "bg-gradient-to-r from-indigo-800 to-purple-800"
      },
      {
        type: "objectives",
        title: "🎯 Objectifs de la leçon",
        objectives: [
          "Implémenter l’authentification avec navigation conditionnelle (écrans connectés / non connectés)",
          "Configurer et utiliser un Drawer Navigator pour un menu latéral",
          "Gérer les deep links (liens profonds) pour partager des produits",
          "Comprendre la navigation imbriquée avec Stack + Drawer + Tabs"
        ]
      },
      {
        type: "content",
        title: "🔐 Navigation conditionnelle (Authentification)",
        content: `<p class="mb-3">Dans une application e-commerce, on souhaite afficher des écrans différents selon que l'utilisateur est connecté ou non. Par exemple :</p>
        <ul class="list-disc pl-6 space-y-2 mb-4">
          <li><strong>Non connecté</strong> : écran de connexion, écran d'inscription, page d'accueil publique.</li>
          <li><strong>Connecté</strong> : panier, profil, historique commandes, menu complet.</li>
        </ul>
        <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500">
          <i class="fas fa-code-branch text-indigo-600 mr-2"></i> <strong>Principe :</strong> on utilise un état global (Zustand/Context) pour connaître le statut de l'utilisateur. Ensuite, on choisit dynamiquement le Root Navigator (AuthStack ou AppStack).
        </div>
        <pre class="bg-gray-900 text-green-200 p-4 rounded-xl overflow-x-auto text-sm mt-4">
// Exemple : App.js simplifié avec navigation conditionnelle
import { NavigationContainer } from '@react-navigation/native';
import { useAuthStore } from './store/authStore';
import AuthNavigator from './navigation/AuthNavigator';
import AppDrawerNavigator from './navigation/AppDrawerNavigator';

export default function App() {
  const { user } = useAuthStore();
  return (
    &lt;NavigationContainer&gt;
      {user ? &lt;AppDrawerNavigator /&gt; : &lt;AuthNavigator /&gt;}
    &lt;/NavigationContainer&gt;
  );
}
        </pre>
        <p class="mt-3 text-sm text-gray-600">Ainsi, après connexion, l'utilisateur accède automatiquement aux écrans protégés.</p>`
      },
      {
        type: "content",
        title: "📱 Drawer Navigator : menu latéral",
        content: `<p>Le <strong>Drawer Navigator</strong> crée un menu coulissant (gauche ou droite) très utilisé pour les sections principales d'une app : Profil, Commandes, Paramètres, Déconnexion.</p>
        <div class="grid md:grid-cols-2 gap-4 mt-3">
          <div class="bg-white p-4 rounded-2xl shadow-sm border">
            <i class="fas fa-tasks text-indigo-500 text-xl mb-2"></i>
            <h3 class="font-bold">Installation</h3>
            <code class="block text-xs bg-gray-100 p-2 rounded mt-1">npm install @react-navigation/drawer react-native-gesture-handler react-native-reanimated</code>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border">
            <i class="fas fa-sliders-h text-indigo-500 text-xl mb-2"></i>
            <h3 class="font-bold">Configuration de base</h3>
            <pre class="text-xs bg-gray-100 p-2 rounded mt-1 overflow-auto">
const Drawer = createDrawerNavigator();
&lt;Drawer.Navigator&gt;
  &lt;Drawer.Screen name="Accueil" component={HomeStack} /&gt;
  &lt;Drawer.Screen name="Mon Profil" component={ProfileScreen} /&gt;
  &lt;Drawer.Screen name="Commandes" component={OrdersScreen} /&gt;
&lt;/Drawer.Navigator&gt;
            </pre>
          </div>
        </div>
        <div class="mt-4 p-3 bg-yellow-50 rounded-lg border border-yellow-200">
          <i class="fas fa-lightbulb text-yellow-600"></i> <strong>Astuce :</strong> On imbrique souvent un Stack Navigator dans chaque onglet Drawer pour gérer les sous-écrans.
        </div>`
      },
      {
        type: "content",
        title: "🧩 Imbrication Stack + Drawer + Bottom Tabs",
        content: `<p>Dans une vraie app e-commerce, vous aurez besoin de combiner plusieurs types de navigation :</p>
        <div class="bg-gray-100 p-4 rounded-xl font-mono text-sm">
          🧱 Structure typique :<br/>
          &nbsp;&nbsp;📁 AppDrawerNavigator (Drawer)<br/>
          &nbsp;&nbsp;&nbsp;&nbsp;├─ 🏠 Accueil → BottomTabNavigator (Accueil, Recherche, Panier)<br/>
          &nbsp;&nbsp;&nbsp;&nbsp;├─ 👤 Profil → StackNavigator (Profil, Modifier profil, Adresses)<br/>
          &nbsp;&nbsp;&nbsp;&nbsp;├─ 📦 Commandes → StackNavigator (Liste commandes, Détail)<br/>
          &nbsp;&nbsp;&nbsp;&nbsp;└─ 🚪 Déconnexion
        </div>
        <p class="mt-3">Chaque élément du drawer peut être soit un écran simple, soit un navigateur complet (Stack, Tabs). Cela permet une navigation très riche.</p>
        <div class="mt-4 flex justify-center">
          <div class="bg-indigo-100 p-3 rounded-full text-indigo-800 text-sm"><i class="fas fa-share-alt"></i> Navigation flexible et intuitive</div>
        </div>`
      },
      {
        type: "content",
        title: "🔗 Deep Links (liens profonds) pour partage de produits",
        content: `<p>Les <strong>deep links</strong> permettent d'ouvrir directement un écran spécifique de l'application depuis un lien web (ex: partage de produit par SMS / WhatsApp).</p>
        <div class="bg-green-50 p-4 rounded-xl border border-green-300">
          <i class="fas fa-link text-green-600"></i> Exemple de lien : <code class="bg-white px-1 rounded">monapp://product/123</code> ouvre directement l'écran du produit avec l'ID 123.
        </div>
        <h3 class="font-bold text-lg mt-4">Configuration avec React Navigation</h3>
        <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg overflow-auto text-sm">
// Dans NavigationContainer
const linking = {
  prefixes: ['monapp://', 'https://moncommerce.com'],
  config: {
    screens: {
      ProductDetail: 'product/:id',
      Profile: 'account',
      Home: '',
    }
  }
};

&lt;NavigationContainer linking={linking}&gt;
  {/* ... */}
&lt;/NavigationContainer&gt;
        </pre>
        <p class="mt-2 text-sm">Ainsi, quand un utilisateur clique sur <span class="font-mono bg-gray-200 px-1">https://moncommerce.com/product/456</span>, l'app s'ouvre sur la fiche produit !</p>`
      },
      {
        type: "content",
        title: "🎁 Exemple concret : partage de produit avec deep link",
        content: `<div class="flex flex-col md:flex-row gap-5">
          <div class="flex-1 bg-white rounded-xl shadow p-4">
            <i class="fas fa-share-square text-2xl text-blue-500"></i>
            <h3 class="font-bold text-lg mt-1">Étape 1 - Partager</h3>
            <p class="text-sm mt-2">L'utilisateur appuie sur "Partager" → génération d'un lien unique :</p>
            <code class="block bg-gray-100 p-2 rounded mt-2 text-xs">const shareUrl = \`myapp://product/\${productId}\`;</code>
            <p class="text-sm mt-2">On utilise <code class="bg-gray-200">expo-sharing</code> ou <code class="bg-gray-200">Share</code> de React Native.</p>
          </div>
          <div class="flex-1 bg-white rounded-xl shadow p-4">
            <i class="fas fa-reply-all text-2xl text-green-500"></i>
            <h3 class="font-bold text-lg mt-1">Étape 2 - Ouverture</h3>
            <p class="text-sm mt-2">Réception du lien → React Navigation extrait l'ID → navigation vers <span class="font-bold">ProductDetailScreen</span> avec les paramètres.</p>
            <div class="mt-2 bg-indigo-50 p-2 rounded text-xs">
              <i class="fas fa-code"></i> Dans l'écran : <code>route.params?.id</code>
            </div>
          </div>
        </div>
        <div class="mt-5 bg-slate-100 p-3 rounded-lg italic text-gray-700">
          ⚡ Avantage : augmente l'engagement utilisateur et permet des campagnes marketing efficaces.
        </div>`
      },
      {
        type: "content",
        title: "🛡️ Gestion de la déconnexion et réinitialisation de la navigation",
        content: `<p>Lorsqu'un utilisateur se déconnecte, il faut non seulement effacer l'état global (token) mais aussi <strong>réinitialiser l'historique de navigation</strong> pour éviter de revenir aux écrans privés.</p>
        <pre class="bg-gray-800 text-green-200 p-3 rounded-xl text-sm">
// Dans un composant de déconnexion
import { CommonActions } from '@react-navigation/native';

const logout = () => {
  // Effacement du store (Zustand / context)
  useAuthStore.getState().logout();
  // Réinitialiser la pile vers l'écran de connexion
  navigation.dispatch(
    CommonActions.reset({
      index: 0,
      routes: [{ name: 'Auth' }],
    })
  );
};
        </pre>
        <p class="mt-2"><i class="fas fa-exclamation-triangle text-amber-500"></i> Sans cette réinitialisation, l'utilisateur pourrait revenir en arrière et voir des données sensibles.</p>`
      },
      {
        type: "content",
        title: "✅ Bonnes pratiques pour la navigation mobile",
        content: `<ul class="list-disc pl-6 space-y-2">
          <li><i class="fas fa-check-circle text-green-500"></i> <strong>Nommer clairement les routes</strong> : AuthStack, AppTabs, ProductDetail</li>
          <li><i class="fas fa-check-circle text-green-500"></i> <strong>Utiliser TypeScript</strong> pour typer les paramètres de navigation (évite les erreurs).</li>
          <li><i class="fas fa-check-circle text-green-500"></i> <strong>Éviter les navigateurs trop profonds</strong> (max 3-4 niveaux).</li>
          <li><i class="fas fa-check-circle text-green-500"></i> <strong>Tester les deep links</strong> avec <code>npx uri-scheme</code> ou sur simulateur.</li>
          <li><i class="fas fa-check-circle text-green-500"></i> Prévoir un écran 404 (NotFound) pour les deep links invalides.</li>
        </ul>
        <div class="mt-5 flex gap-2 flex-wrap justify-center">
          <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm"><i class="fas-regular fa-compass"></i> Drawer + Tabs = puissant</span>
          <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm"><i class="fas fa-link"></i> Deep linking vital pour partage</span>
        </div>`
      },
      {
        type: "summary",
        title: "✨ Récapitulatif de la leçon 10",
        points: [
          "Navigation conditionnelle : AuthNavigator vs AppNavigator selon l’état utilisateur",
          "Drawer Navigator : menu latéral élégant pour les sections principales",
          "Deep links : partage de produits via des URLs personnalisées",
          "Réinitialisation de l’état de navigation lors de la déconnexion",
          "Imbrication de navigators (Stack, Tabs, Drawer) pour une expérience fluide"
        ],
        icon: "fa-check-double"
      }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    // Fonction de rendu de chaque slide
    function renderSlide(slide, idx) {
      if (slide.type === "title") {
        return `
          <div class="slide h-full w-full text-white ${slide.bgClass || 'bg-gradient-to-br from-indigo-700 to-purple-700'} rounded-2xl p-6 md:p-10 flex flex-col justify-center items-center text-center min-h-[500px]">
            <i class="fas ${slide.icon || 'fa-route'} text-6xl md:text-7xl mb-6 drop-shadow-lg"></i>
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4">${slide.title}</h1>
            <p class="text-indigo-100 text-lg md:text-xl max-w-xl">${slide.subtitle || ''}</p>
            <div class="mt-8 text-sm bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm">Navigation avancée · Chapitre 3</div>
          </div>
        `;
      }
      else if (slide.type === "objectives") {
        return `
          <div class="slide p-6 md:p-8 bg-white rounded-2xl min-h-[500px] flex flex-col">
            <div class="flex items-center gap-3 mb-5 border-b border-indigo-200 pb-3">
              <i class="fas fa-bullseye text-indigo-600 text-3xl"></i>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${slide.title}</h2>
            </div>
            <ul class="space-y-4 flex-1">
              ${slide.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700 text-lg"><i class="fas fa-check-circle text-green-500 mt-1"></i><span>${obj}</span></li>`).join('')}
            </ul>
            <div class="mt-6 text-sm text-gray-400"><i class="fas fa-arrow-down"></i> Naviguez pour apprendre à maîtriser la navigation</div>
          </div>
        `;
      }
      else if (slide.type === "content") {
        return `
          <div class="slide p-6 md:p-8 bg-white rounded-2xl min-h-[500px] overflow-y-auto">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-6 border-indigo-500 pl-3 mb-5">${slide.title}</h2>
            <div class="prose max-w-none text-gray-700">${slide.content}</div>
          </div>
        `;
      }
      else if (slide.type === "summary") {
        return `
          <div class="slide p-6 md:p-8 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl min-h-[500px] flex flex-col justify-center">
            <div class="text-center">
              <i class="fas ${slide.icon || 'fa-graduation-cap'} text-5xl text-emerald-700 mb-4"></i>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">${slide.title}</h2>
              <ul class="text-left max-w-md mx-auto space-y-3">
                ${slide.points.map(p => `<li class="flex gap-2 items-start"><i class="fas fa-check text-emerald-600 mt-1"></i><span class="text-gray-700">${p}</span></li>`).join('')}
              </ul>
              <div class="mt-8 p-3 bg-white rounded-xl inline-block shadow">
                <i class="fas fa-lightbulb text-amber-500"></i> Prêt à créer une navigation professionnelle !
              </div>
            </div>
          </div>
        `;
      }
      return `<div class="p-8 text-red-500">Erreur de contenu</div>`;
    }

    // Mise à jour de l'affichage
    function updateSlide() {
      const slideHtml = renderSlide(slidesData[currentIndex], currentIndex);
      $('#slides-container').fadeOut(150, function() {
        $(this).html(slideHtml);
        $(this).fadeIn(200);
      });
      // Générer les indicateurs (dots)
      let indicatorsHtml = '';
      for (let i = 0; i < totalSlides; i++) {
        const activeClass = (i === currentIndex) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
        indicatorsHtml += `<button class="indicator-dot h-2 rounded-full ${activeClass} transition-all mx-1" data-index="${i}"></button>`;
      }
      $('#slide-indicators').html(indicatorsHtml);
      // Gérer l'état des boutons précédent/suivant
      $('#prevSlide').prop('disabled', currentIndex === 0);
      $('#nextSlide').html(currentIndex === totalSlides - 1 ? 'Terminé <i class="fas fa-check-circle ml-2"></i>' : 'Suivant <i class="fas fa-arrow-right ml-2"></i>');
    }

    function nextSlide() {
      if (currentIndex < totalSlides - 1) {
        currentIndex++;
        updateSlide();
      } else {
        alert('🎉 Félicitations ! Vous avez terminé la leçon 10 sur la navigation avancée. Entraînez-vous avec les exercices !');
      }
    }

    function prevSlide() {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlide();
      }
    }

    $(document).ready(function() {
      updateSlide();
      $('#nextSlide').on('click', nextSlide);
      $('#prevSlide').on('click', prevSlide);
      
      // navigation par indicateurs cliquables
      $(document).on('click', '.indicator-dot', function() {
        const idx = $(this).data('index');
        if (idx !== undefined && idx >= 0 && idx < totalSlides) {
          currentIndex = idx;
          updateSlide();
        }
      });
      
      // Swipe gestuel (mobile)
      let touchStartX = 0;
      let touchEndX = 0;
      const container = document.getElementById('slides-container');
      if (container) {
        container.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].screenX;
        });
        container.addEventListener('touchend', (e) => {
          touchEndX = e.changedTouches[0].screenX;
          if (touchEndX < touchStartX - 50) nextSlide();
          if (touchEndX > touchStartX + 50) prevSlide();
        });
      }
    });
  </script>
</body>
</html>
