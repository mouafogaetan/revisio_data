<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "NativeWind : Tailwind pour React Native",
    "contenu": "<div style='display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding:2rem; border-radius:12px; color:white;'><h1 style='font-size:2.2rem; font-weight:bold; margin-bottom:1rem;'>🎨 NativeWind</h1><p style='font-size:1.3rem; max-width:600px;'>Tailwind CSS arrive sur <strong>React Native</strong> !</p><div style='display:flex; flex-wrap:wrap; gap:0.8rem; justify-content:center; margin-top:1.5rem;'><span style='background:#334155; padding:0.5rem 1.2rem; border-radius:50px; color:#facc15;'>⚡ Rapide</span><span style='background:#334155; padding:0.5rem 1.2rem; border-radius:50px; color:#60a5fa;'>📱 Mobile-first</span><span style='background:#334155; padding:0.5rem 1.2rem; border-radius:50px; color:#34d399;'>🔄 Réutilisable</span></div><p style='margin-top:1.5rem; font-size:0.95rem; color:#94a3b8;'>Écrire du CSS utilitaire directement dans vos composants React Native</p></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons découvrir NativeWind, une bibliothèque qui apporte la puissance de Tailwind CSS dans l'univers de React Native. Tailwind est un framework CSS utilitaire très populaire dans le développement web. NativeWind permet d'utiliser exactement les mêmes classes que Tailwind, mais pour les applications mobiles. Fini le style en ligne ou les fichiers de style séparés, on va écrire nos styles directement dans nos composants, de manière rapide et efficace.",
    "note": "NativeWind est l'équivalent de Tailwind pour React Native, avec le même système de classes."
  },
  {
    "titre": "Pourquoi NativeWind ?",
    "contenu": "<div style='display:grid; grid-template-columns:1fr 1fr; gap:1rem; padding:0.5rem;'><div style='background:#f0fdf4; padding:1rem; border-radius:8px; border-left:4px solid #22c55e;'><h4 style='margin-top:0; color:#16a34a;'>✅ Avantages</h4><ul style='padding-left:1.2rem; font-size:0.9rem;'><li>Pas de fichier <code>StyleSheet</code> séparé</li><li>Code plus <strong>lisible</strong> et concis</li><li>Design <strong>cohérent</strong> entre web et mobile</li><li>Autocomplétion dans VS Code</li><li>Thème personnalisable facilement</li></ul></div><div style='background:#fef2f2; padding:1rem; border-radius:8px; border-left:4px solid #ef4444;'><h4 style='margin-top:0; color:#dc2626;'>⚠️ Inconvénients</h4><ul style='padding-left:1.2rem; font-size:0.9rem;'><li>Courbe d'apprentissage initiale</li><li>Bundle plus lourd (purge configurable)</li><li>Certaines classes CSS ne sont pas supportées</li></ul></div></div><div style='background:#dbeafe; padding:0.75rem; border-radius:4px; margin-top:0.5rem;'><p style='margin:0; font-size:0.9rem;'><strong>💡 Comparaison :</strong> StyleSheet vs NativeWind</p><div style='display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem;'><code style='background:#1e293b; color:#e2e8f0; padding:0.5rem; border-radius:4px; flex:1;'>style={styles.container}</code><span>➡️</span><code style='background:#1e293b; color:#e2e8f0; padding:0.5rem; border-radius:4px; flex:1;'>className=\"flex-1 p-4 bg-white\"</code></div></div>",
    "texteParle": "Pourquoi choisir NativeWind plutôt que le StyleSheet classique de React Native ? D'abord, cela rend notre code beaucoup plus lisible et concis. On écrit les classes directement dans le JSX, ce qui évite d'aller chercher les styles ailleurs. Ensuite, c'est parfait si vous venez du développement web et que vous connaissez déjà Tailwind. Enfin, le thème est très facile à personnaliser. Le seul inconvénient est qu'il faut apprendre les classes, mais une fois que c'est fait, le développement est beaucoup plus rapide.",
    "note": "NativeWind est particulièrement recommandé pour les équipes qui utilisent déjà Tailwind sur le web."
  },
  {
    "titre": "Installation de NativeWind",
    "contenu": "<div style='display:flex; flex-direction:column; gap:0.8rem;'><div style='background:#f8fafc; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0;'>1️⃣ Installation des dépendances</h4><div style='background:#1e293b; color:#e2e8f0; padding:0.6rem 1rem; border-radius:4px; overflow-x:auto;'><code style='font-size:0.85rem;'>npm install nativewind tailwindcss-react-native</code></div><p style='font-size:0.85rem; margin-top:0.3rem;'><strong>Pour Expo :</strong> <code>npx expo install nativewind tailwindcss-react-native</code></p></div><div style='background:#f8fafc; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0;'>2️⃣ Initialisation de Tailwind CSS</h4><div style='background:#1e293b; color:#e2e8f0; padding:0.6rem 1rem; border-radius:4px; overflow-x:auto;'><code style='font-size:0.85rem;'>npx tailwindcss init</code></div></div><div style='background:#f8fafc; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0;'>3️⃣ Ajouter le plugin NativeWind</h4><div style='background:#1e293b; color:#e2e8f0; padding:0.6rem 1rem; border-radius:4px; overflow-x:auto;'><code style='font-size:0.85rem;'>plugins: [require('nativewind/tailwind/css')]</code></div></div></div>",
    "texteParle": "L'installation de NativeWind se fait en trois étapes simples. D'abord, on installe les paquets nécessaires via npm ou avec la commande spécifique pour Expo si vous utilisez ce framework. Ensuite, on initialise le fichier de configuration de Tailwind avec la commande npx tailwindcss init. Enfin, on ajoute le plugin NativeWind dans la section plugins du fichier tailwind.config.js. Une fois ces étapes terminées, on est prêt à utiliser NativeWind dans notre projet.",
    "note": "Si vous utilisez Expo, la commande `npx expo install` est recommandée pour la compatibilité."
  },
  {
    "titre": "Configuration du fichier tailwind.config.js",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>/** @type {import('tailwindcss').Config} */\nmodule.exports = {\n  content: [\"./App.{js,jsx,ts,tsx}\", \"./src/**/*.{js,jsx,ts,tsx}\"],\n  theme: {\n    extend: {\n      colors: {\n        primary: '#2563eb',\n        secondary: '#f59e0b',\n      },\n      fontFamily: {\n        sans: ['Inter', 'System'],\n      },\n    },\n  },\n  plugins: [require('nativewind/tailwind/css')],\n};</pre></div><div style='background:#fef3c7; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>🔑 Points clés :</strong></p><ul style='margin:0.3rem 0; font-size:0.85rem;'><li><strong>content</strong> : Où chercher les classes Tailwind</li><li><strong>theme.extend</strong> : Personnaliser les couleurs, polices, etc.</li><li><strong>plugins</strong> : Ajouter le plugin NativeWind</li></ul></div></div>",
    "texteParle": "Le fichier de configuration est très important. On doit d'abord spécifier dans la section 'content' tous les fichiers qui contiennent des classes Tailwind. Généralement, on met le fichier App et tous les fichiers dans le dossier src. Ensuite, on peut personnaliser notre thème en ajoutant des couleurs, des polices, des tailles. C'est ici qu'on va définir la charte graphique de notre application. Enfin, on n'oublie pas d'ajouter le plugin NativeWind pour que tout fonctionne correctement.",
    "note": "La section 'content' est cruciale pour le purge du CSS en production."
  },
  {
    "titre": "Configuration de babel.config.js",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>module.exports = {\n  presets: ['babel-preset-expo'],\n  plugins: [\n    'nativewind/babel',\n    ['@babel/plugin-transform-react-jsx', { runtime: 'automatic' }],\n  ],\n};</pre></div><div style='background:#dbeafe; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>📝 Explication :</strong></p><ul style='margin:0.3rem 0; font-size:0.85rem;'><li><code>nativewind/babel</code> : Transforme les classes en styles React Native</li><li><code>runtime: 'automatic'</code> : Pour la nouvelle syntaxe JSX</li></ul></div></div>",
    "texteParle": "La deuxième configuration se fait dans le fichier babel.config.js. On doit ajouter le plugin 'nativewind/babel' dans la section des plugins. Ce plugin est essentiel car il va transformer les classes Tailwind que nous écrivons dans nos composants en vrais styles React Native compréhensibles par le moteur de rendu. Sans cette transformation, les classes ne seraient pas reconnues. C'est une étape obligatoire pour que NativeWind fonctionne.",
    "note": "Redémarrez le projet après avoir modifié babel.config.js."
  },
  {
    "titre": "Configuration du fichier app.d.ts (TypeScript)",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><p>Pour <strong>TypeScript</strong>, ajoutez un fichier de déclaration pour NativeWind.</p><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>// app.d.ts ou nativeswind-env.d.ts\ntype NativeWindStyle = import('react-native').ViewStyle | import('react-native').TextStyle;\n\ndeclare module 'react-native' {\n  interface ViewProps {\n    className?: string;\n  }\n  interface TextProps {\n    className?: string;\n  }\n}</pre></div><div style='background:#f0fdf4; padding:0.75rem; border-radius:4px; border-left:4px solid #22c55e;'><p style='margin:0; font-size:0.9rem;'><strong>✅ Résultat :</strong> L'autocomplétion fonctionne dans VS Code !</p></div></div>",
    "texteParle": "Si vous utilisez TypeScript, comme c'est le cas dans notre projet, vous devez ajouter un fichier de déclaration pour que TypeScript reconnaisse l'attribut 'className' sur les composants View, Text, etc. Cela permet d'avoir l'autocomplétion dans VS Code et d'éviter les erreurs de compilation. C'est une petite étape mais très importante pour le confort de développement. Créez simplement un fichier avec l'extension .d.ts dans le dossier de votre projet.",
    "note": "Avec les nouvelles versions, cette étape peut être automatique avec @types/nativewind."

  {
    "titre": "Utilisation de base - Composants",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#f8fafc; padding:1rem; border-radius:8px;'><h4 style='margin-top:0;'>📱 Exemple avec un View et un Text</h4><div style='background:#1e293b; color:#e2e8f0; padding:0.8rem; border-radius:4px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>import { View, Text } from 'react-native';\n\nexport default function App() {\n  return (\n    &lt;View className=\"flex-1 justify-center items-center bg-blue-500\"&gt;\n      &lt;Text className=\"text-white text-xl font-bold\"&gt;\n        Bienvenue sur ma boutique !\n      &lt;/Text&gt;\n    &lt;/View&gt;\n  );\n}</pre></div></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>📦 Classes utilisées :</strong></p><ul style='font-size:0.8rem; margin:0.3rem 0;'><li><code>flex-1</code> → Prend tout l'espace</li><li><code>justify-center</code> → Centre verticalement</li><li><code>items-center</code> → Centre horizontalement</li><li><code>bg-blue-500</code> → Fond bleu</li><li><code>text-white</code> → Texte blanc</li></ul></div></div></div>",
    "texteParle": "Maintenant que tout est installé, voyons comment utiliser NativeWind dans nos composants. L'utilisation est très simple : on ajoute l'attribut 'className' à n'importe quel composant React Native comme View, Text, Image, etc. On écrit ensuite les classes Tailwind comme on le ferait en web. Par exemple, 'flex-1' pour prendre tout l'espace, 'justify-center' pour centrer, 'bg-blue-500' pour le fond bleu. Le résultat est un code beaucoup plus concis que le StyleSheet classique.",

  {
    "titre": "Les classes pour le layout (Flexbox)",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#f1f5f9; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0;'>📍 Flexbox en une ligne</h4></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Direction</strong></p><code style='font-size:0.75rem;'>flex-row / flex-col</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Alignement horizontal</strong></p><code style='font-size:0.75rem;'>justify-start / center / end / between</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Alignement vertical</strong></p><code style='font-size:0.75rem;'>items-start / center / end / stretch</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Espacement</strong></p><code style='font-size:0.75rem;'>gap-2 / gap-x-4 / gap-y-4</code></div></div><div style='background:#dbeafe; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>💡 Exemple :</strong> <code className=\"bg-gray-200 p-1 rounded\">flex-row justify-between items-center</code></p></div></div>",
    "texteParle": "NativeWind reprend tout le système de flexbox de Tailwind. On peut facilement définir la direction de notre flex avec 'flex-row' pour horizontal ou 'flex-col' pour vertical. Pour l'alignement, on utilise 'justify' pour l'axe principal et 'items' pour l'axe secondaire. On peut aussi gérer l'espacement entre les éléments avec 'gap'. Ce système permet de faire des mises en page complexes en très peu de lignes de code. C'est particulièrement utile pour les interfaces mobiles.",

    "titre": "Les classes pour le spacing et les tailles",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Padding</strong></p><code style='font-size:0.75rem;'>p-4 / px-4 / py-2 / pt-4</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Margin</strong></p><code style='font-size:0.75rem;'>m-4 / mx-auto / my-2 / mt-4</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Largeur</strong></p><code style='font-size:0.75rem;'>w-12 / w-full / w-1/2</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>Hauteur</strong></p><code style='font-size:0.75rem;'>h-12 / h-full / h-screen</code></div></div><div style='background:#fef3c7; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>📏 Échelle de taille :</strong></p><p style='font-size:0.85rem; margin:0.2rem 0;'>0 → 0, 1 → 0.25rem (4px), 2 → 0.5rem (8px), 3 → 0.75rem (12px), 4 → 1rem (16px), ...</p></div></div>",
    "texteParle": "Pour les marges, les espacements internes et les dimensions, NativeWind utilise le même système que Tailwind. Les valeurs vont de 0 à 96, chaque nombre correspondant à une taille prédéfinie. Par exemple, 'p-4' donne un padding de 16 pixels, 'w-full' donne une largeur de 100%, 'w-1/2' donne une largeur de 50%. C'est très pratique pour créer rapidement des interfaces responsives et cohérentes, surtout sur mobile où l'adaptation aux différentes tailles d'écran est cruciale.",

    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>🎨 Couleurs</strong></p><code style='font-size:0.75rem;'>bg-blue-500 / text-red-600</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>📐 Taille du texte</strong></p><code style='font-size:0.75rem;'>text-xs / text-sm / text-base / text-lg / text-xl</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>✏️ Poids de la police</strong></p><code style='font-size:0.75rem;'>font-thin / font-light / font-normal / font-bold</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>📝 Alignement</strong></p><code style='font-size:0.75rem;'>text-left / text-center / text-right</code></div></div><div style='background:#f1f5f9; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>🎯 Exemple pratique :</strong></p><code style='font-size:0.8rem;'>className=\"text-center text-2xl font-bold text-primary bg-gray-100 p-4 rounded-lg\"</code></div></div>",
    "texteParle": "NativeWind propose une large gamme de couleurs prédéfinies, du bleu au vert en passant par le rouge, avec différentes nuances. On peut aussi utiliser les couleurs qu'on a définies dans notre thème. Pour le texte, on peut contrôler la taille avec 'text-xs', 'text-sm', etc., le poids avec 'font-bold' ou 'font-light', et l'alignement avec 'text-center'. Tout cela permet de créer des interfaces élégantes et cohérentes sans avoir à écrire une seule ligne de CSS personnalisé.",

    "texteParle": "Pour donner du style à vos composants, NativeWind propose aussi des classes pour les bordures, les angles arrondis et les ombres. On peut ajouter une bordure avec 'border', arrondir les coins avec 'rounded' ou 'rounded-full' pour un cercle parfait, et ajouter des ombres avec 'shadow' ou 'shadow-lg'. Ces classes sont très utiles pour créer des cartes de produits, des boutons, ou des modales qui ont un aspect moderne et professionnel.",

  {
    "titre": "Les classes pour le positionnement",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>📍 Position</strong></p><code style='font-size:0.75rem;'>relative / absolute / fixed</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>📌 Placement</strong></p><code style='font-size:0.75rem;'>top-0 / bottom-4 / left-2 / right-0</code></div><div style='background:#f8fafc; padding:0.6rem; border-radius:4px; border:1px solid #e2e8f0;'><p style='margin:0; font-size:0.8rem;'><strong>📐 Z-index</strong></p><code style='font-size:0.75rem;'>z-10 / z-20 / z-50</code></div></div><div style='background:#fef3c7; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>💡 Exemple : Bouton flottant (FAB)</strong></p><code style='font-size:0.8rem;'>className=\"absolute bottom-4 right-4 z-10 bg-primary rounded-full p-4 shadow-lg\"</code></div></div>",
    "texteParle": "Parfois, on a besoin de positionner des éléments de manière spécifique, comme un bouton flottant en bas de l'écran ou un badge sur une icône. NativeWind propose des classes de positionnement avec 'relative' pour un positionnement relatif, 'absolute' pour un positionnement absolu, et 'fixed' pour un positionnement fixe par rapport à l'écran. On peut ensuite utiliser 'top', 'bottom', 'left', 'right' pour placer précisément l'élément. Le z-index est aussi disponible avec 'z-10', 'z-20', etc.",

  {
    "titre": "Personnalisation du thème",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>// tailwind.config.js\ntheme: {\n  extend: {\n    colors: {\n      primary: '#2563eb',\n      secondary: '#f59e0b',\n      accent: '#8b5cf6',\n    },\n    fontFamily: {\n      sans: ['Inter_400Regular', 'System'],\n      bold: ['Inter_700Bold', 'System'],\n    },\n    fontSize: {\n      'xs': 12,\n      'sm': 14,\n      'base': 16,\n      'lg': 20,\n      'xl': 24,\n    },\n  },\n}</pre></div><div style='background:#dbeafe; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>🎨 Utilisation :</strong> <code className=\"bg-gray-200 p-1 rounded\">bg-primary text-white</code></p></div></div>",
    "texteParle": "La personnalisation du thème est un point fort de NativeWind. Dans le fichier tailwind.config.js, on peut définir nos propres couleurs, polices, tailles, etc. Par exemple, on peut ajouter une couleur 'primary' pour notre marque, et l'utiliser partout dans l'application avec 'bg-primary' ou 'text-primary'. On peut aussi définir les polices à utiliser, ce qui est très important pour une application mobile car les polices par défaut ne sont pas toujours les plus esthétiques.",
    "note": "Pour les polices sur React Native, il faut les importer avec expo-font ou react-native-asset."
  },
  {
    "titre": "Résumé et TP à venir",
    "contenu": "<div style='display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;'><div style='background:#f1f5f9; padding:1rem; border-radius:8px;'><h4 style='margin-top:0;'>📋 Ce qu'on a appris</h4><ul style='padding-left:1.2rem; font-size:0.9rem;'><li>✅ Installation de NativeWind</li><li>✅ Configuration tailwind.config.js</li><li>✅ Configuration babel.config.js</li><li>✅ Utilisation des classes (flexbox, spacing, couleurs)</li><li>✅ Personnalisation du thème</li></ul></div><div style='background:#fef3c7; padding:1rem; border-radius:8px; border:2px dashed #f59e0b;'><h4 style='margin-top:0;'>⚙️ Travaux Pratiques</h4><ol style='font-size:0.9rem;'><li><strong>Installer</strong> NativeWind dans votre projet Expo.</li><li><strong>Configurer</strong> le thème avec les couleurs de votre marque.</li><li><strong>Créer</strong> un composant Card produit avec NativeWind.</li><li><strong>Créer</strong> un composant Header avec une barre de recherche.</;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
