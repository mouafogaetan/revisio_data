<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 55 : Finalisation du projet – Démo, documentation & métriques</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        body {
            background: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .slide-card {
            transition: all 0.2s ease;
            border-radius: 1.8rem;
        }
        .nav-btn {
            transition: all 0.2s;
            user-select: none;
        }
        .nav-btn:active { transform: scale(0.96); }
        .progress-bar {
            transition: width 0.3s ease;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            background: #eef2ff;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            color: #1e293b;
        }
        pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .badge-lesson {
            background: #0d9488;
        }
        @media (max-width: 640px) {
            .slide-card { border-radius: 1.25rem; }
            .text-responsive { font-size: 0.95rem; }
        }
        .metric-card {
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="p-4 md:p-6">

<div class="max-w-4xl mx-auto relative">
    <!-- Contexte matière -->
    <div class="mb-4 flex flex-wrap justify-between gap-2 items-center">
        <div class="text-xs md:text-sm font-medium bg-white/80 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm text-gray-600">
            📱 Matière : Développement d'application mobile e-commerce multiplateforme
        </div>
        <div class="text-xs bg-teal-50 text-teal-700 px-3 py-1.5 rounded-full">
            Chapitre 15 · Finalisation & valorisation
        </div>
    </div>

    <!-- Carte principale slide -->
    <div class="slide-card bg-white shadow-xl border border-gray-100 p-5 md:p-8">
        <div class="flex justify-between items-center mb-5 pb-2 border-b border-gray-100 flex-wrap gap-2">
            <div class="flex items-center gap-2">
                <span class="badge-lesson text-white text-xs font-bold px-3 py-1 rounded-full">Leçon 55 / 55</span>
                <span class="text-gray-500 text-sm">🏁 Démo, documentation & métriques</span>
            </div>
            <div class="text-sm text-gray-400" id="slideCounter">Slide 1 / <span id="totalSlides">0</span></div>
        </div>

        <!-- zone de contenu dynamique -->
        <div id="slideContent" class="min-h-[500px] transition-all duration-200"></div>

        <!-- Navigation + progression -->
        <div class="flex justify-between items-center mt-8 pt-5 border-t border-gray-100 gap-3">
            <button id="prevSlide" class="nav-btn bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-5 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition">
                ← Précédent
            </button>
            <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden mx-2">
                <div id="progressFill" class="progress-bar h-full bg-teal-600 rounded-full w-0"></div>
            </div>
            <button id="nextSlide" class="nav-btn bg-teal-700 hover:bg-teal-800 text-white font-semibold py-2 px-6 rounded-full shadow-md transition">
                Suivant →
            </button>
        </div>
    </div>
    <p class="text-center text-xs text-gray-400 mt-6">📱 Navigation tactile (glisser) ou boutons – préparation à la soutenance finale</p>
</div>

<script>
    // ----- Définition des slides pour la leçon 55 -----
    // Objectifs lesson55 (d'après JSON):
    // 0: Préparer une démo sur iOS et Android
    // 1: Documenter l'API et l'architecture
    // 2: Présenter les métriques de performance
    const slides = [
        {
            type: "title",
            title: "🏁 Finalisation du projet e-commerce",
            subtitle: "Démonstration, documentation technique & métriques de performance",
            emoji: "📱🚀",
            description: "Apprenez à préparer une démo professionnelle sur iOS et Android, à documenter votre API et votre architecture, et à présenter des métrices de performance (FPS, temps de chargement, consommation mémoire)."
        },
        {
            type: "objectives",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "Organiser et réaliser une démonstration fluide sur simulateur et appareil réel (iOS & Android)",
                "Rédiger une documentation technique complète : API REST, architecture (Zustand, React Navigation), choix techniques",
                "Collecter et présenter des métriques de performance : temps de rendu, mémoire, requêtes réseau, FPS avec FlashList"
            ]
        },
        {
            type: "demo",
            title: "📱 Préparer une démo cross-platform",
            description: "Une bonne démo doit être fluide, couvrir les cas d'usage principaux (connexion, recherche, ajout panier, paiement) et être testée sur les deux OS.",
            steps: [
                "✅ Utiliser Expo Go ou des builds standalone (EAS) pour tester sur appareils réels",
                "✅ Simuler un environnement réseau réaliste (via Network Link Conditioner ou simulateur Android)",
                "✅ Préparer un script de démo : scénario principal + cas de repli (offline, erreurs API)",
                "✅ Montrer le dark mode (si implémenté) et la gestion responsive",
                "✅ Afficher les notifications, toasts et animations"
            ],
            tip: "💡 Enregistrez une vidéo de secours (mp4) au cas où la connexion réseau serait instable le jour de la présentation."
        },
        {
            type: "documentation",
            title: "📄 Documenter l'API et l'architecture",
            description: "Une documentation claire est essentielle pour la maintenance et l'intégration.",
            sections: [
                "🔹 **Architecture globale** : schéma des dossiers, pattern feature-based, explication du store Zustand",
                "🔹 **API endpoints** : table des routes (GET /products, POST /cart/sync) avec exemples de requêtes/réponses",
                "🔹 **Modèles de données** : types TypeScript / interfaces des produits, utilisateur, panier",
                "🔹 **Gestion d'état** : explication de la persistance AsyncStorage + synchronisation offline",
                "🔹 **Sécurité** : stockage des tokens (expo-secure-store), refresh token, validation Zod"
            ],
            codeEx: "# Documentation API\n\n## GET /products\nRécupère la liste des produits (paginée).\n**Paramètres** : `page`, `limit`, `search`\n**Réponse** : { items: Product[], total: number }\n\n## POST /cart/sync\nEnvoie les modifications offline.\n**Body** : { actions: [...] }"
        },
        {
            type: "metrics",
            title: "📊 Métriques de performance à présenter",
            description: "Pour prouver la qualité de l'application, rassemblez ces indicateurs :",
            metricsList: [
                { name: "Temps de chargement initial (TTI)", tool: "Expo DevTools / Flipper", target: "< 3s" },
                { name: "Images par seconde (FPS)", tool: "React Native Debugger / Flipper", target: "≥ 55 fps" },
                { name: "Mémoire utilisée (heap)", tool: "Hermes / Chrome DevTools", target: "< 80 Mo" },
                { name: "Taille du bundle JS", tool: "expo-optimize / webpack-bundle-analyzer", target: "< 5 Mo" },
                { name: "Requêtes réseau (latence)", tool: "Network plugin Flipper", target: "moyenne < 400 ms" }
            ],
            note: "📈 Utilisez des captures d'écran des outils de mesure et comparez avec/sans optimisation (ex: avant/après FlashList)."
        },
        {
            type: "tips_presentation",
            title: "🎤 Conseils pour la présentation finale",
            tips: [
                "Préparez une introduction rapide (problématique, stack technique)",
                "Faites une démo en direct mais ayez toujours un enregistrement de secours",
                "Mettez en avant les fonctionnalités complexes : panier offline, scan code-barres, synchronisation",
                "Affichez les métriques de performance sur un slide dédié avec graphiques simples",
                "Soyez honnête sur les limites actuelles et proposez des axes d'amélioration"
            ]
        },
        {
            type: "quiz",
            title: "📝 Vérification des acquis",
            question: "Quelle métrique est la plus critique pour évaluer la fluidité du défilement d'une longue liste de produits (ex: catalogue) ?",
            options: [
                "Taille du bundle JavaScript",
                "FPS (images par seconde) pendant le scroll",
                "Temps de réponse de l'API",
                "Consommation de la batterie"
            ],
            correctIndex: 1,
            explanation: "✅ Le FPS (frames per second) mesure directement la fluidité visuelle. Un scroll à 60 FPS est parfait, en dessous de 30 FPS l'utilisateur perçoit des saccades. Les autres métriques sont importantes mais n'impactent pas directement la fluidité du défilement."
        },
        {
            type: "conclusion",
            title: "🏁 Bilan de la leçon et du module",
            summary: "Vous savez désormais préparer une démo professionnelle, documenter votre API et architecture, et prouver la performance de votre application avec des métriques objectives. Ces compétences sont essentielles pour la livraison d'un projet e-commerce en conditions réelles.",
            nextStep: "Félicitations ! Vous avez terminé le module. Vous êtes prêts à développer et livrer des applications React Native pour le marché camerounais et international."
        }
    ];

    let currentIndex = 0;
    const total = slides.length;
    $("#totalSlides").text(total);

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderSlide(index) {
        const slide = slides[index];
        let html = '';

        if (slide.type === 'title') {
            html = `
                <div class="text-center py-4 md:py-8">
                    <div class="text-6xl mb-3">${slide.emoji}</div>
                    <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-teal-800 to-emerald-700 bg-clip-text text-transparent">${slide.title}</h1>
                    <p class="text-gray-600 text-base md:text-lg mt-3 max-w-xl mx-auto">${slide.subtitle}</p>
                    <div class="mt-5 bg-teal-50 inline-block px-5 py-2 rounded-full text-teal-800 text-sm">⏱️ 25 min · clôture du module</div>
                    <div class="mt-4 text-gray-500">${slide.description}</div>
                </div>
            `;
        }
        else if (slide.type === 'objectives') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2 mb-6"><span class="text-3xl">📌</span> ${slide.title}</h2>
                    <ul class="space-y-4">
                        ${slide.objectives.map(obj => `<li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl"><span class="text-teal-500 text-xl">✓</span> <span class="text-gray-700">${obj}</span></li>`).join('')}
                    </ul>
                    <div class="mt-6 p-4 bg-teal-50 rounded-2xl border-l-4 border-teal-400 text-sm">
                        💡 À la fin, vous saurez valoriser votre travail et livrer une app professionnelle.
                    </div>
                </div>
            `;
        }
        else if (slide.type === 'demo') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <p class="text-gray-700 mb-4">${slide.description}</p>
                    <ul class="space-y-3 bg-gray-50 p-4 rounded-2xl mb-4">
                        ${slide.steps.map(s => `<li class="flex gap-2"><span class="text-teal-500 text-xl">📌</span> <span>${s}</span></li>`).join('')}
                    </ul>
                    <div class="bg-amber-50 p-3 rounded-xl text-amber-800 text-sm">${slide.tip}</div>
                </div>
            `;
        }
        else if (slide.type === 'documentation') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <p class="text-gray-700 mb-3">${slide.description}</p>
                    <ul class="space-y-2 mb-4">
                        ${slide.sections.map(s => `<li class="text-gray-700">${s}</li>`).join('')}
                    </ul>
                    <pre><code class="language-markdown">${escapeHtml(slide.codeEx)}</code></pre>
                    <div class="text-xs text-gray-500 mt-2">ℹ️ Utilisez un outil comme Swagger (OpenAPI) pour une documentation interactive de l'API.</div>
                </div>
            `;
        }
        else if (slide.type === 'metrics') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <p class="text-gray-700 mb-4">${slide.description}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                        ${slide.metricsList.map(m => `
                            <div class="bg-white border border-gray-200 rounded-xl p-3 shadow-sm metric-card">
                                <div class="font-bold text-teal-700">${m.name}</div>
                                <div class="text-sm text-gray-500">Outil : ${m.tool}</div>
                                <div class="text-sm font-mono">Cible : ${m.target}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-xl text-indigo-800 text-sm">${slide.note}</div>
                </div>
            `;
        }
        else if (slide.type === 'tips_presentation') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-5">${slide.title}</h2>
                    <div class="grid grid-cols-1 gap-3">
                        ${slide.tips.map(t => `<div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm flex gap-2"><span>🎤</span> ${t}</div>`).join('')}
                    </div>
                    <div class="mt-5 p-3 bg-emerald-50 text-emerald-800 rounded-lg text-sm">✨ N'oubliez pas de remercier votre audience et de proposer une session de questions/réponses.</div>
                </div>
            `;
        }
        else if (slide.type === 'quiz') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <div class="bg-indigo-50 p-5 rounded-2xl">
                        <p class="font-semibold text-gray-800 text-lg mb-4">❓ ${slide.question}</p>
                        <div class="space-y-3" id="quizOptionsContainer">
                            ${slide.options.map((opt, idx) => `<label class="flex items-center gap-3 p-3 bg-white rounded-xl border cursor-pointer hover:bg-gray-50"><input type="radio" name="quizRadio" value="${idx}" class="w-4 h-4 text-teal-600"><span>${opt}</span></label>`).join('')}
                        </div>
                        <button id="quizSubmitBtn" class="mt-5 bg-teal-600 text-white px-6 py-2 rounded-full hover:bg-teal-700">Vérifier ma réponse</button>
                        <div id="quizFeedbackMsg" class="mt-4 text-sm"></div>
                    </div>
                </div>
            `;
        }
        else if (slide.type === 'conclusion') {
            html = `
                <div class="text-center py-6">
                    <div class="text-5xl mb-3">🏁</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <p class="text-gray-700 mb-5">${slide.summary}</p>
                    <div class="bg-green-50 p-4 rounded-2xl text-green-800 text-sm">🚀 ${slide.nextStep}</div>
                </div>
            `;
        }

        $("#slideContent").html(html);
        $("#slideCounter").text(`Slide ${index+1} / ${total}`);
        const progressPercent = ((index) / (total - 1)) * 100;
        $("#progressFill").css("width", `${progressPercent}%`);
        $("#prevSlide").prop("disabled", index === 0);
        $("#nextSlide").prop("disabled", index === total-1);

        if (slide.type === 'quiz') {
            $("#quizSubmitBtn").off('click').on('click', function() {
                const selectedVal = $("input[name='quizRadio']:checked").val();
                if (selectedVal === undefined) {
                    $("#quizFeedbackMsg").html('<span class="text-orange-600">📢 Veuillez choisir une réponse.</span>');
                    return;
                }
                const isCorrect = parseInt(selectedVal) === slide.correctIndex;
                if (isCorrect) {
                    $("#quizFeedbackMsg").html(`<span class="text-green-700 bg-green-100 p-2 rounded-lg inline-block">✅ ${slide.explanation}</span>`);
                } else {
                    $("#quizFeedbackMsg").html(`<span class="text-red-600 bg-red-50 p-2 rounded-lg inline-block">❌ ${slide.explanation}</span>`);
                }
            });
        }
    }

    $("#nextSlide").on("click", () => { if (currentIndex < total-1) { currentIndex++; renderSlide(currentIndex); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
    $("#prevSlide").on("click", () => { if (currentIndex > 0) { currentIndex--; renderSlide(currentIndex); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
    
    let touchStartX = 0;
    $("#slideContent").on("touchstart", (e) => { touchStartX = e.originalEvent.touches[0].clientX; });
    $("#slideContent").on("touchend", (e) => {
        if (!touchStartX) return;
        const diff = e.originalEvent.changedTouches[0].clientX - touchStartX;
        if (Math.abs(diff) > 50) {
            if (diff > 0 && currentIndex > 0) { currentIndex--; renderSlide(currentIndex); }
            else if (diff < 0 && currentIndex < total-1) { currentIndex++; renderSlide(currentIndex); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        touchStartX = 0;
    });

    renderSlide(0);
</script>
</body>
</html>
