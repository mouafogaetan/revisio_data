<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Cours : Organisation du projet React Native | Leçon 3</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- Font Awesome 6 (gratuit, icônes) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- MathJax (au cas où) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* Transition douce pour slides */
    .slide {
      transition: opacity 0.3s ease-in-out;
    }
    body {
      background: #f8fafc;
    }
    /* pour l'accessibilité des boutons tactiles */
    .nav-btn {
      min-width: 44px;
      min-height: 44px;
    }
    /* amélioration du contraste */
    .card-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
    }
    .bg-soft {
      background-color: #ffffffdd;
    }
    @media (max-width: 640px) {
      .slide-content {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 font-sans antialiased">

  <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur principal slides -->
    <div class="relative bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl border border-indigo-100 overflow-hidden">
      
      <!-- En-tête avec progression -->
      <div class="bg-indigo-700 px-5 py-3 flex justify-between items-center text-white">
        <div class="flex items-center gap-2">
          <i class="fas fa-mobile-alt text-lg"></i>
          <span class="font-semibold text-sm md:text-base">Développement mobile e-commerce</span>
        </div>
        <div class="text-sm bg-indigo-800 px-3 py-1 rounded-full">
          Leçon 3 / 55
        </div>
      </div>

      <!-- zone des slides dynamiques -->
      <div id="slides-container" class="min-h-[520px] md:min-h-[560px] relative">
        <!-- le contenu sera injecté via jQuery -->
      </div>

      <!-- Navigation + indicateurs -->
      <div class="flex justify-between items-center p-5 border-t border-indigo-100 bg-gray-50">
        <button id="prevSlide" class="nav-btn bg-white hover:bg-indigo-100 text-indigo-800 font-semibold py-2 px-5 rounded-full shadow transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <div id="slide-indicators" class="flex gap-2 flex-wrap justify-center"></div>
        <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow transition-all flex items-center gap-2">
          Suivant <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- petite note pédagogique -->
    <div class="text-center text-sm text-gray-500 mt-6">
      <i class="fas fa-graduation-cap"></i> Cours interactif – Navigation par slides | Organisation de projet React Native
    </div>
  </div>

  <script>
    // Définition des slides pour la leçon 3 (chap1 - lesson3)
    // Objectif : Créer la structure du projet e-commerce (organisation par fonctionnalités, dossiers, alias)
    const slidesData = [
      {
        type: "title",
        title: "📱 Organisation du projet React Native",
        subtitle: "Bien structurer une application e-commerce multiplateforme",
        icon: "fa-folder-tree",
        bgClass: "bg-gradient-to-r from-indigo-800 to-purple-800"
      },
      {
        type: "objectives",
        title: "🎯 Objectifs de la leçon",
        objectives: [
          "Organiser le code par fonctionnalités (auth, products, cart, orders, profile)",
          "Créer une arborescence de dossiers adaptée (components, screens, navigation, services, hooks, store)",
          "Mettre en place des chemins d'alias avec babel-plugin-module-resolver pour importer plus facilement"
        ]
      },
      {
        type: "content",
        title: "📦 Pourquoi bien organiser son projet ?",
        content: `<p class="mb-4">Dans un projet d'application mobile e-commerce, le code grossit vite. Une mauvaise organisation rend le projet difficile à maintenir, à faire évoluer et à déboguer. Une structure claire permet :</p>
        <ul class="list-disc pl-6 space-y-2">
          <li><i class="fas fa-check-circle text-green-600 mr-2"></i> <strong>Travailler en équipe</strong> sans conflits majeurs</li>
          <li><i class="fas fa-check-circle text-green-600 mr-2"></i> <strong>Retrouver rapidement</strong> les écrans, composants ou logiques métier</li>
          <li><i class="fas fa-check-circle text-green-600 mr-2"></i> <strong>Réutiliser</strong> du code entre fonctionnalités</li>
          <li><i class="fas fa-check-circle text-green-600 mr-2"></i> <strong>Faciliter les tests</strong> et le déploiement</li>
        </ul>
        <div class="mt-6 p-4 bg-indigo-50 rounded-xl border-l-4 border-indigo-500">
          <i class="fas fa-lightbulb text-indigo-600 mr-2"></i> <span class="font-medium">Bon à savoir :</span> Une architecture bien pensée dès le départ évite une "dette technique" coûteuse.
        </div>`
      },
      {
        type: "content",
        title: "🗂️ Organisation par fonctionnalités (feature-based)",
        content: `<p class="mb-4">Au lieu de tout mélanger par type technique (tous les composants ensemble), on regroupe par <strong>fonctionnalités métier</strong> :</p>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mt-2">
          <div class="bg-white rounded-lg p-3 shadow-sm border"><i class="fas fa-user-lock text-indigo-500 mr-2"></i> auth</div>
          <div class="bg-white rounded-lg p-3 shadow-sm border"><i class="fas fa-box-open text-indigo-500 mr-2"></i> products</div>
          <div class="bg-white rounded-lg p-3 shadow-sm border"><i class="fas fa-shopping-cart text-indigo-500 mr-2"></i> cart</div>
          <div class="bg-white rounded-lg p-3 shadow-sm border"><i class="fas fa-truck text-indigo-500 mr-2"></i> orders</div>
          <div class="bg-white rounded-lg p-3 shadow-sm border"><i class="fas fa-user-circle text-indigo-500 mr-2"></i> profile</div>
          <div class="bg-white rounded-lg p-3 shadow-sm border"><i class="fas fa-heart text-indigo-500 mr-2"></i> wishlist</div>
        </div>
        <p class="mt-4 text-gray-700">Chaque fonctionnalité contient ses propres composants, logique, et écrans. Cela rend le projet <strong>modulaire</strong> et chaque partie peut être développée indépendamment.</p>
        <div class="mt-4 bg-gray-100 p-3 rounded-lg text-sm font-mono">
          📁 src/features/auth/  →  screens/, components/, hooks/<br>
          📁 src/features/products/ → etc.
        </div>`
      },
      {
        type: "content",
        title: "📁 Arborescence recommandée (dossiers globaux)",
        content: `<p class="mb-3">Voici l'arborescence classique d'un projet React Native avec Expo, optimisée pour un e-commerce :</p>
        <pre class="bg-gray-900 text-green-300 p-4 rounded-xl overflow-x-auto text-sm font-mono">
src/
├── components/      # Composants réutilisables (Button, Card, Input...)
├── screens/         # Écrans principaux (HomeScreen, CartScreen...)
├── navigation/      # Configuration des navigateurs (stacks, tabs)
├── services/        # Appels API, AsyncStorage, logique externe
├── hooks/           # Hooks personnalisés (useCart, useAuth)
├── store/           # État global (Zustand, Redux)
├── utils/           # Fonctions utilitaires (formatters, validations)
├── constants/       # Couleurs, thème, clés API
└── types/           # TypeScript (interfaces, types)
        </pre>
        <p class="mt-3 text-sm">Cette structure permet de séparer clairement les responsabilités.</p>`
      },
      {
        type: "content",
        title: "🔧 Exemple concret de dossiers dans un projet e-commerce",
        content: `<div class="flex flex-col md:flex-row gap-6">
          <div class="flex-1 bg-white p-4 rounded-2xl shadow-md border">
            <i class="fas fa-layer-group text-indigo-600 text-xl mb-2"></i>
            <h3 class="font-bold text-lg">Organisation typique</h3>
            <ul class="mt-2 space-y-1 text-sm list-disc pl-5">
              <li><strong>screens/</strong> : Home, ProductDetail, Cart, Checkout, Profile</li>
              <li><strong>components/</strong> : ProductCard, RatingStars, QuantitySelector</li>
              <li><strong>navigation/</strong> : AppNavigator, AuthNavigator, TabNavigator</li>
              <li><strong>services/</strong> : api.js, storage.js, paymentService.js</li>
              <li><strong>store/</strong> : cartStore.js, authStore.js, wishlistStore.js</li>
              <li><strong>hooks/</strong> : useCartTotal.js, useProductSearch.js</li>
            </ul>
          </div>
          <div class="flex-1 bg-indigo-50 p-4 rounded-2xl border border-indigo-200">
            <i class="fas fa-code-branch text-indigo-700 text-xl mb-2"></i>
            <h3 class="font-bold text-lg">Avantage immédiat</h3>
            <p class="text-sm mt-1">Quand on cherche un fichier lié au panier, on sait qu'il est dans <code class="bg-gray-200 px-1 rounded">store/cartStore.js</code> ou dans <code class="bg-gray-200 px-1 rounded">screens/CartScreen.js</code> et non éparpillé.</p>
            <p class="text-sm mt-2"><i class="fas fa-smile-wink"></i> Idéal pour les gros projets d'équipe !</p>
          </div>
        </div>`
      },
      {
        type: "content",
        title: "⚙️ Mise en place des chemins d'alias (module-resolver)",
        content: `<p>Importer des fichiers avec des chemins relatifs <span class="bg-gray-200 px-1 rounded">../../../components/Button</span> devient vite pénible. Les <strong>alias</strong> permettent d'importer comme ceci : <code class="bg-gray-800 text-white px-2 py-0.5 rounded">@components/Button</code></p>
        <div class="mt-4 bg-gray-800 text-gray-100 p-4 rounded-lg overflow-auto">
          <p class="text-yellow-300 text-sm"># 1. Installer le plugin</p>
          <code class="block text-green-300">npm install --save-dev babel-plugin-module-resolver</code>
          <p class="text-yellow-300 mt-2 text-sm"># 2. Configurer babel.config.js</p>
          <pre class="text-xs">
module.exports = {
  presets: ['babel-preset-expo'],
  plugins: [
    ['module-resolver', {
      root: ['./src'],
      alias: {
        '@components': './src/components',
        '@screens': './src/screens',
        '@navigation': './src/navigation',
        '@services': './src/services',
        '@hooks': './src/hooks',
        '@store': './src/store',
        '@utils': './src/utils',
      }
    }]
  ]
};
          </pre>
        </div>
        <p class="mt-4 text-green-800 bg-green-50 p-3 rounded-lg"><i class="fas fa-check-circle"></i> Résultat : <code>import { Button } from '@components/Button';</code>  plus besoin de "../../" !</p>`
      },
      {
        type: "content",
        title: "📝 Exemple d'importation améliorée",
        content: `<div class="space-y-4">
          <div class="border-l-4 border-red-400 bg-red-50 p-4 rounded-r-xl">
            <p class="font-mono text-sm text-red-800">❌ Avant (sans alias):</p>
            <code class="block text-sm bg-white p-2 rounded mt-1">import ProductCard from '../../../components/ProductCard';<br>import { useCart } from '../../../hooks/useCart';</code>
          </div>
          <div class="border-l-4 border-green-500 bg-green-50 p-4 rounded-r-xl">
            <p class="font-mono text-sm text-green-800">✅ Après (avec alias):</p>
            <code class="block text-sm bg-white p-2 rounded mt-1">import ProductCard from '@components/ProductCard';<br>import { useCart } from '@hooks/useCart';</code>
          </div>
          <p class="text-gray-700">Les alias rendent le code <strong>plus lisible</strong>, surtout lorsqu'on restructure des dossiers. Moins d'erreurs de chemin !</p>
        </div>`
      },
      {
        type: "content",
        title: "🧠 Bonnes pratiques supplémentaires",
        content: `<ul class="list-disc pl-5 space-y-3">
          <li><i class="fas fa-folder text-amber-500"></i> <strong>Nommage clair</strong> : Utilisez PascalCase pour les composants (ProductCard.js) et camelCase pour les utilitaires (formatPrice.js).</li>
          <li><i class="fas fa-file-code"></i> <strong>Fichier index.js</strong> : Dans chaque dossier, un index peut réexporter facilement les modules pour simplifier les imports.</li>
          <li><i class="fas fa-tachometer-alt"></i> <strong>Séparation stricte</strong> : Le dossier <span class="font-mono bg-gray-200 px-1">services/</span> contient uniquement la communication avec le monde extérieur (API, base de données locale).</li>
          <li><i class="fas fa-robot"></i> <strong>Typage</strong> : Avec TypeScript, structurez vos types dans <span class="font-mono">types/</span> par feature. Ex: <span class="font-mono">types/product.types.ts</span>.</li>
        </ul>
        <div class="mt-5 p-3 bg-indigo-100 rounded-xl flex gap-3 items-start">
          <i class="fas fa-quote-left text-indigo-800 text-2xl"></i>
          <p class="italic text-indigo-900">"Un code bien organisé est un code que vous pourrez relire dans 6 mois sans avoir mal à la tête."</p>
        </div>`
      },
      {
        type: "summary",
        title: "✨ Récapitulatif de la leçon 3",
        points: [
          "Organiser par fonctionnalités : auth, produits, panier, commandes, profil",
          "Arborescence type : components, screens, navigation, services, hooks, store, utils",
          "Chemins d'alias via babel-plugin-module-resolver pour simplifier les imports",
          "Améliore la maintenabilité et la collaboration en équipe"
        ],
        icon: "fa-check-double"
      }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    // Rendu d'un slide selon son type
    function renderSlide(slide, idx) {
      if (slide.type === "title") {
        return `
          <div class="slide h-full w-full text-white ${slide.bgClass || 'bg-gradient-to-br from-indigo-700 to-purple-700'} rounded-2xl p-6 md:p-10 flex flex-col justify-center items-center text-center min-h-[500px]">
            <i class="fas ${slide.icon || 'fa-folder-open'} text-6xl md:text-7xl mb-6 drop-shadow-lg"></i>
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4">${slide.title}</h1>
            <p class="text-indigo-100 text-lg md:text-xl max-w-xl">${slide.subtitle || ''}</p>
            <div class="mt-8 text-sm bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm">Chap 1 · Structure de projet</div>
          </div>
        `;
      }
      else if (slide.type === "objectives") {
        return `
          <div class="slide p-6 md:p-8 bg-white rounded-2xl min-h-[500px] flex flex-col">
            <div class="flex items-center gap-3 mb-5 border-b border-indigo-200 pb-3">
              <i class="fas fa-bullseye text-indigo-600 text-3xl"></i>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${slide.title}</h2>
            </div>
            <ul class="space-y-4 flex-1">
              ${slide.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700 text-lg"><i class="fas fa-check-circle text-green-500 mt-1"></i><span>${obj}</span></li>`).join('')}
            </ul>
            <div class="mt-6 text-sm text-gray-400"><i class="fas fa-arrow-down"></i> Glissez ou naviguez pour apprendre</div>
          </div>
        `;
      }
      else if (slide.type === "content") {
        return `
          <div class="slide p-6 md:p-8 bg-white rounded-2xl min-h-[500px] overflow-y-auto">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-6 border-indigo-500 pl-3 mb-5">${slide.title}</h2>
            <div class="prose max-w-none text-gray-700">${slide.content}</div>
          </div>
        `;
      }
      else if (slide.type === "summary") {
        return `
          <div class="slide p-6 md:p-8 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl min-h-[500px] flex flex-col justify-center">
            <div class="text-center">
              <i class="fas ${slide.icon || 'fa-graduation-cap'} text-5xl text-emerald-700 mb-4"></i>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">${slide.title}</h2>
              <ul class="text-left max-w-md mx-auto space-y-3">
                ${slide.points.map(p => `<li class="flex gap-2 items-start"><i class="fas fa-check text-emerald-600 mt-1"></i><span class="text-gray-700">${p}</span></li>`).join('')}
              </ul>
              <div class="mt-8 p-3 bg-white rounded-xl inline-block shadow">
                <i class="fas fa-lightbulb text-amber-500"></i> Prêt pour la leçon suivante : mise en place de l'état global !
              </div>
            </div>
          </div>
        `;
      }
      return `<div class="p-8">Erreur de contenu</div>`;
    }

    function updateSlide() {
      const slideHtml = renderSlide(slidesData[currentIndex], currentIndex);
      $('#slides-container').fadeOut(150, function() {
        $(this).html(slideHtml);
        $(this).fadeIn(200);
      });
      // Mise à jour des indicateurs
      let indicatorsHtml = '';
      for (let i = 0; i < totalSlides; i++) {
        const activeClass = (i === currentIndex) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
        indicatorsHtml += `<button class="indicator-dot h-2 rounded-full ${activeClass} transition-all mx-1" data-index="${i}"></button>`;
      }
      $('#slide-indicators').html(indicatorsHtml);
      
      // Gestion état boutons
      $('#prevSlide').prop('disabled', currentIndex === 0);
      $('#nextSlide').text(currentIndex === totalSlides-1 ? 'Terminé' : 'Suivant').append(currentIndex === totalSlides-1 ? '' : '<i class="fas fa-arrow-right ml-2"></i>');
    }

    function next() {
      if (currentIndex < totalSlides - 1) {
        currentIndex++;
        updateSlide();
      } else {
        // fin du cours, alerte félicitations
        alert('🎉 Félicitations ! Vous avez terminé la leçon 3 sur l’organisation du projet. Continuez comme ça !');
      }
    }

    function prev() {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlide();
      }
    }

    $(document).ready(function() {
      updateSlide();
      
      $('#nextSlide').on('click', next);
      $('#prevSlide').on('click', prev);
      
      // navigation par indicateurs cliquables
      $(document).on('click', '.indicator-dot', function() {
        const idx = $(this).data('index');
        if (idx !== undefined && idx >= 0 && idx < totalSlides) {
          currentIndex = idx;
          updateSlide();
        }
      });
      
      // Swipe sur mobile simple (optionnel) avec jquery touch events
      let touchstartX = 0;
      let touchendX = 0;
      const slidesContainer = document.getElementById('slides-container');
      if (slidesContainer) {
        slidesContainer.addEventListener('touchstart', (e) => {
          touchstartX = e.changedTouches[0].screenX;
        });
        slidesContainer.addEventListener('touchend', (e) => {
          touchendX = e.changedTouches[0].screenX;
          if (touchendX < touchstartX - 50) next();
          if (touchendX > touchstartX + 50) prev();
        });
      }
    });
  </script>
</body>
</html>
