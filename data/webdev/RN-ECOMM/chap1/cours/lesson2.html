<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 2 : Initialiser un projet React Native avec Expo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Personnalisation des couleurs (visibles, douces) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A2540',     // bleu profond mais doux
                        secondary: '#00A896',   // vert apaisant
                        accent: '#F0F7F4',
                        dark: '#1A2C3E'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (prêt si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        .slide { transition: opacity 0.25s ease-in-out; }
        body { background: linear-gradient(135deg, #F8F9FA 0%, #E9ECEF 100%); }
        .btn-nav:active { transform: scale(0.96); }
        .prose code { background-color: #eef2ff; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-weight: 500; color: #0f172a; font-size: 0.85rem; }
        .prose pre { background-color: #1e293b; color: #e2e8f0; padding: 0.75rem; border-radius: 0.75rem; overflow-x: auto; font-size: 0.8rem; }
    </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-5xl mx-auto px-4 py-5 md:py-8">
    <!-- Entête avec progression et titre -->
    <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
        <div class="flex items-center gap-2">
            <span class="text-3xl">📱</span>
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-slate-800">Initialisation Expo · React Native</h1>
                <p class="text-xs text-slate-500">Leçon 2 · Architecture & Configuration</p>
            </div>
        </div>
        <div class="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full text-sm font-medium shadow-sm border border-slate-200">
            <span id="slideCounter">1</span> / <span id="totalSlides"></span>
        </div>
    </div>

    <!-- Conteneur principal des slides -->
    <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 min-h-[65vh] md:min-h-[70vh]"></div>

    <!-- Navigation et indicateurs -->
    <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
        <button id="prevBtn" class="btn-nav px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">← Précédent</button>
        <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
        <button id="nextBtn" class="btn-nav px-5 py-2.5 bg-primary text-white rounded-xl shadow-md hover:bg-indigo-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">Suivant →</button>
    </div>

    <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">📱 Développement mobile multiplateforme – Cours React Native (Expo) | Interface accessible & responsive</footer>
</div>

<script>
    // ----- Slides pour la leçon 2 : Expo ou CLI ? Initialisation + TypeScript/ESLint -----
    const slidesData = [
        {
            type: "title",
            title: "🚀 Choisir et initialiser un projet React Native",
            subtitle: "Expo vs React Native CLI · Configuration TypeScript",
            desc: "Découvrez les deux approches (Expo recommandé pour débuter) et créez votre première application mobile avec les bonnes pratiques (TypeScript, ESLint, structure)."
        },
        {
            type: "objectifs",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "Comparer Expo et React Native CLI (avantages/inconvénients).",
                "Initialiser un projet Expo avec TypeScript (npx create-expo-app).",
                "Configurer ESLint, Prettier pour un code propre.",
                "Comprendre l’arborescence de base et les commandes essentielles (expo start)."
            ]
        },
        {
            type: "content",
            title: "📲 1. Expo vs React Native CLI",
            content: `
                <div class="grid md:grid-cols-2 gap-5">
                    <div class="bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-500">
                        <h4 class="font-bold text-emerald-800 flex items-center gap-1">✨ Expo (recommandé)</h4>
                        <ul class="list-disc pl-5 text-sm space-y-1 mt-2">
                            <li>Pas besoin de Xcode/Android Studio au démarrage.</li>
                            <li>Développement rapide avec rechargement à chaud (Fast Refresh).</li>
                            <li>Large écosystème de SDK (notifications, appareil photo, etc.).</li>
                            <li>Builds cloud via EAS (Expo Application Services).</li>
                        </ul>
                    </div>
                    <div class="bg-slate-100 p-4 rounded-xl border-l-4 border-slate-500">
                        <h4 class="font-bold text-slate-700 flex items-center gap-1">⚛️ React Native CLI</h4>
                        <ul class="list-disc pl-5 text-sm space-y-1 mt-2">
                            <li>Contrôle total sur le code natif (iOS/Android).</li>
                            <li>Nécessite Xcode et Android Studio installés.</li>
                            <li>Intégration de librairies natives plus flexible.</li>
                            <li>Idéal pour applications très spécifiques.</li>
                        </ul>
                    </div>
                </div>
                <div class="mt-4 bg-amber-50 p-3 rounded-lg text-sm">
                    💡 <strong>Conseil pour les élèves :</strong> Pour la plupart des projets e-commerce, Expo est parfait et accélère le développement. Débutons avec Expo !
                </div>
            `
        },
        {
            type: "content",
            title: "🛠️ 2. Créer un projet Expo avec TypeScript",
            content: `
                <div class="space-y-4">
                    <p>Ouvrez un terminal et exécutez la commande suivante :</p>
                    <div class="bg-gray-900 text-green-300 p-3 rounded-lg font-mono text-sm">
                        npx create-expo-app MonAppEcommerce --template
                    </div>
                    <p>Choisissez le template <strong>"blank (TypeScript)"</strong> lorsque demandé. Cela génère automatiquement un projet avec TypeScript configuré.</p>
                    <p>Sinon, vous pouvez spécifier le template directement :</p>
                    <div class="bg-gray-800 text-white p-2 rounded-lg text-sm">
                        npx create-expo-app MonEcommerce -t expo-template-blank-typescript
                    </div>
                    <p>Ensuite, accédez au dossier et lancez l'application :</p>
                    <div class="bg-gray-800 text-white p-2 rounded-lg text-sm font-mono">
                        cd MonEcommerce <br>
                        npm start   # ou npx expo start
                    </div>
                    <p>Scannez le QR code avec l'application Expo Go (Android ou iOS) pour voir l'application sur votre téléphone.</p>
                </div>
            `
        },
        {
            type: "content",
            title: "🧹 3. Configurer ESLint et Prettier",
            content: `
                <div class="space-y-4">
                    <p>Pour garder un code propre et cohérent, installons ESLint + Prettier :</p>
                    <div class="bg-gray-900 text-green-300 p-2 rounded text-sm font-mono">
                        npm install --save-dev eslint prettier eslint-config-universe @typescript-eslint/eslint-plugin @typescript-eslint/parser
                    </div>
                    <p>Créez un fichier <code class="bg-gray-100 px-1">.eslintrc.js</code> à la racine :</p>
                    <div class="bg-gray-800 text-gray-100 p-3 rounded-lg text-xs">
                        <pre>module.exports = {
  extends: ['universe/native', 'universe/shared/typescript'],
  rules: {
    'prettier/prettier': 'warn'
  }
};</pre>
                    </div>
                    <p>Ajoutez un fichier <code>.prettierrc</code> pour les règles de formatage :</p>
                    <div class="bg-gray-800 text-gray-100 p-2 rounded text-sm">
                        { "semi": true, "singleQuote": true, "trailingComma": "all" }
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-lg text-sm">✅ <strong>Bonus :</strong> Utilisez <code>npm run lint</code> dans les scripts du package.json pour vérifier votre code.</div>
                </div>
            `
        },
        {
            type: "content",
            title: "🏗️ 4. Structure du projet et meilleures pratiques",
            content: `
                <div class="space-y-3">
                    <p>Une organisation claire facilite l'évolution de l'application e-commerce. Voici une structure recommandée :</p>
                    <div class="bg-gray-800 text-gray-200 p-3 rounded-lg font-mono text-xs">
                        <pre>MonAppEcommerce/
├── App.tsx
├── src/
│   ├── components/   (boutons, cartes produits)
│   ├── screens/      (HomeScreen, ProductScreen, CartScreen)
│   ├── navigation/   (navigateurs React Navigation)
│   ├── services/     (api, axios)
│   ├── hooks/        (hooks personnalisés)
│   ├── store/        (Zustand stores)
│   └── utils/        (helpers)
├── assets/ (images, polices)
├── .eslintrc.js
├── .prettierrc
├── app.json (configuration Expo)
└── package.json</pre>
                    </div>
                    <p>Utilisez <code>expo install</code> pour ajouter des librairies compatibles (ex: react-native-paper).</p>
                    <div class="bg-cyan-50 p-2 rounded text-sm italic">📌 À retenir : Expo automatise beaucoup de configurations (Babel, Metro). Vous pouvez personnaliser via <code>app.json</code>.</div>
                </div>
            `
        }
    ];

    let currentSlide = 0;
    const total = slidesData.length;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function buildSlides() {
        let html = '';
        slidesData.forEach((slide, idx) => {
            let inner = '';
            if (slide.type === 'title') {
                inner = `
                    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
                        <div class="bg-indigo-100 p-5 rounded-full mb-5 shadow-md"><span class="text-5xl">📱</span></div>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
                        <p class="text-lg text-secondary font-medium">${escapeHtml(slide.subtitle)}</p>
                        <div class="mt-6 max-w-md bg-white/60 p-4 rounded-xl shadow-inner"><p class="text-slate-600">${escapeHtml(slide.desc)}</p></div>
                    </div>
                `;
            } else if (slide.type === 'objectifs') {
                let list = '';
                slide.objectives.forEach(obj => {
                    list += `<li class="mb-3 flex items-start gap-2"><span class="text-secondary text-xl font-bold">✓</span> <span>${escapeHtml(obj)}</span></li>`;
                });
                inner = `
                    <div class="p-6 md:p-8">
                        <h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2>
                        <ul class="space-y-2 text-base md:text-lg list-none">${list}</ul>
                        <div class="mt-8 bg-gradient-to-r from-primary/5 to-secondary/5 rounded-xl p-4 text-sm italic border">💡 À la fin de cette leçon, vous saurez démarrer un projet React Native moderne et bien configuré.</div>
                    </div>
                `;
            } else if (slide.type === 'content') {
                inner = `
                    <div class="p-5 md:p-7">
                        <h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2>
                        <div class="prose prose-slate max-w-none leading-relaxed">${slide.content}</div>
                    </div>
                `;
            }
            html += `<div class="slide" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">${inner}</div>`;
        });
        return html;
    }

    function generateDots() {
        let dotsHtml = '';
        for (let i = 0; i < total; i++) {
            const activeClass = (i === currentSlide) ? 'bg-primary w-6' : 'bg-gray-300 w-3';
            dotsHtml += `<button class="dot-indicator h-3 rounded-full transition-all mx-1 ${activeClass}" data-index="${i}"></button>`;
        }
        $('#dotsContainer').html(dotsHtml);
        $('.dot-indicator').on('click', function() {
            const idx = parseInt($(this).data('index'));
            if (!isNaN(idx) && idx !== currentSlide && idx >= 0 && idx < total) {
                currentSlide = idx;
                updateSlideAndUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }

    function updateSlideAndUI() {
        $('.slide').each(function(idx) {
            if (idx === currentSlide) $(this).fadeIn(180);
            else $(this).hide();
        });
        $('#slideCounter').text(currentSlide + 1);
        $('#totalSlides').text(total);
        $('#dotsContainer .dot-indicator').each(function(idx) {
            if (idx === currentSlide) {
                $(this).removeClass('bg-gray-300 w-3').addClass('bg-primary w-6');
            } else {
                $(this).removeClass('bg-primary w-6').addClass('bg-gray-300 w-3');
            }
        });
        $('#prevBtn').prop('disabled', currentSlide === 0);
        $('#nextBtn').prop('disabled', currentSlide === total - 1);
        if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
    }

    $(document).ready(function() {
        const slidesHtml = buildSlides();
        $('#slidesContainer').html(slidesHtml);
        $('#totalSlides').text(total);
        generateDots();
        updateSlideAndUI();

        $('#prevBtn').on('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlideAndUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        $('#nextBtn').on('click', () => {
            if (currentSlide < total - 1) {
                currentSlide++;
                updateSlideAndUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') $('#prevBtn').click();
            else if (e.key === 'ArrowRight') $('#nextBtn').click();
        });
    });
</script>
</body>
</html>
