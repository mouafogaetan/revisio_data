<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la Leçon 33",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Nous allons implémenter le système d'avis utilisateur pour notre application e-commerce.</p><ul style='margin-top: 15px; list-style: none; padding: 0;'><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>⭐ <strong>Poster un avis</strong> avec notation par étoiles</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>📷 <strong>Ajouter des photos</strong> aux avis</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>✏️ <strong>Modifier et supprimer</strong> ses avis</li></ul><p style='margin-top: 20px; font-style: italic;'>Les avis clients sont essentiels pour la confiance et les ventes. 🇨🇲</p></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons voir comment implémenter un système d'avis complet pour notre application e-commerce. Les avis clients sont très importants car ils aident les autres utilisateurs à faire leur choix et renforcent la confiance envers votre boutique. Nous allons permettre aux utilisateurs de poster un avis avec une notation par étoiles, d'ajouter des photos à leurs avis, et de modifier ou supprimer leurs avis existants. C'est une fonctionnalité clé pour une application e-commerce réussie.",
    "note": "Les avis authentiques sont un facteur de conversion majeur sur mobile."
  },
  {
    "titre": "Structure du Système d'Avis",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Un avis dans notre application est composé de plusieurs éléments.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>⭐ <strong style='color: #ffb74d;'>Note</strong> : De 1 à 5 étoiles</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📝 <strong style='color: #4fc3f7;'>Commentaire</strong> : Texte de l'avis (minimum 10 caractères)</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📷 <strong style='color: #4caf50;'>Photos</strong> : Jusqu'à 5 images par avis</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>👤 <strong style='color: #ce93d8;'>Auteur</strong> : Nom et photo de profil de l'utilisateur</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📅 <strong style='color: #4fc3f7;'>Date</strong> : Date de publication de l'avis</li></ul></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #ffb74d;'>💡 Important :</span> Seuls les utilisateurs ayant acheté le produit peuvent poster un avis (vérification côté backend).</div></div>",
    "texteParle": "Un avis dans notre application comporte plusieurs éléments. D'abord, une note de 1 à 5 étoiles qui donne une évaluation rapide du produit. Ensuite, un commentaire textuel qui permet à l'utilisateur d'expliquer son expérience. L'utilisateur peut aussi ajouter des photos, jusqu'à 5 images par avis, ce qui rend l'avis plus crédible. On affiche aussi le nom et la photo de profil de l'auteur, ainsi que la date de publication. Il est important que seuls les utilisateurs ayant effectivement acheté le produit puissent poster un avis, pour éviter les faux avis. Cette vérification se fait côté backend.",
    "note": "La photo de l'utilisateur et les photos du produit augmentent la confiance."
  },
  {
    "titre": "Composant de Notation par Étoiles",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Créons un composant réutilisable pour la notation par étoiles.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { TouchableOpacity, View } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'react-native'</span>;<br><span style='color: #ffb74d;'>import</span> { FontAwesome } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@expo/vector-icons'</span>;<br><br><span style='color: #ce93d8;'>interface</span> StarRatingProps {<br>  rating: <span style='color: #ffb74d;'>number</span>;<br>  setRating?: <span style='color: #ffb74d;'>(rating: number) => void</span>;<br>  size: <span style='color: #ffb74d;'>number</span>;<br>  readonly?: <span style='color: #ffb74d;'>boolean</span>;<br>}<br><br><span style='color: #ffb74d;'>export const</span> StarRating = ({ rating, setRating, size, readonly = <span style='color: #ffb74d;'>false</span> }) => {<br>  <span style='color: #ffb74d;'>const</span> stars = [<span style='color: #ffb74d;'>1</span>, <span style='color: #ffb74d;'>2</span>, <span style='color: #ffb74d;'>3</span>, <span style='color: #ffb74d;'>4</span>, <span style='color: #ffb74d;'>5</span>];<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span> }}&gt;<br>      {stars.map((star) => (<br>        &lt;TouchableOpacity<br>          key={star}<br>          onPress={() => !readonly && setRating?.(star)}<br>          disabled={readonly}<br>        &gt;<br>          &lt;FontAwesome<br>            name={star <= rating ? <span style='color: #4fc3f7;'>'star'</span> : <span style='color: #4fc3f7;'>'star-o'</span>}<br>            size={size}<br>            color={star <= rating ? <span style='color: #4fc3f7;'>'#F59E0B'</span> : <span style='color: #4fc3f7;'>'#D1D5DB'</span>}<br>            style={{ marginHorizontal: <span style='color: #ffb74d;'>2</span> }}<br>          /&gt;<br>        &lt;/TouchableOpacity&gt;<br>      ))}<br>    &lt;/View&gt;<br>  );<br>};</div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Utilisation :</span> <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>&lt;StarRating rating={3} setRating={setRating} size={30} /&gt;</code></div></div>",
    "texteParle": "Nous commençons par créer un composant de notation par étoiles réutilisable. Ce composant utilise FontAwesome pour afficher des étoiles pleines ou vides selon la note. Il prend en paramètre la note actuelle, une fonction pour mettre à jour la note, la taille des étoiles, et un booléen pour le rendre en lecture seule. Quand l'utilisateur clique sur une étoile, la note est mise à jour. Le composant peut être utilisé aussi bien pour laisser un avis que pour afficher la note moyenne d'un produit. C'est un composant simple mais essentiel.",
    "note": "La notation par étoiles est la forme la plus courante et la plus rapide d'évaluation."
  },
  {
    "titre": "Formulaire de Publication d'Avis",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Créons le formulaire pour poster un avis avec React Hook Form.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.7em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { useForm, Controller } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'react-hook-form'</span>;<br><span style='color: #ffb74d;'>import</span> { zodResolver } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@hookform/resolvers/zod'</span>;<br><span style='color: #ffb74d;'>import</span> { z } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'zod'</span>;<br><br><span style='color: #ffb74d;'>const</span> reviewSchema = z.object({<br>  rating: z.number().min(<span style='color: #ffb74d;'>1</span>, <span style='color: #4fc3f7;'>'Veuillez donner une note'</span>),<br>  comment: z.string().min(<span style='color: #ffb74d;'>10</span>, <span style='color: #4fc3f7;'>'Le commentaire doit contenir au moins 10 caractères'</span>),<br>  photos: z.array(z.any()).max(<span style='color: #ffb74d;'>5</span>, <span style='color: #4fc3f7;'>'Maximum 5 photos'</span>).optional(),<br>});<br><br><span style='color: #ce93d8;'>function</span> ReviewForm({ productId, onSuccess }) {<br>  <span style='color: #ffb74d;'>const</span> { control, handleSubmit, formState: { errors, isSubmitting } } = useForm({<br>    resolver: zodResolver(reviewSchema),<br>    defaultValues: { rating: <span style='color: #ffb74d;'>0</span>, comment: <span style='color: #4fc3f7;'>''</span>, photos: [] },<br>  });<br>  <br>  <span style='color: #ffb74d;'>const</span> onSubmit = <span style='color: #ffb74d;'>async</span> (data) => {<br>    <span style='color: #ffb74d;'>await</span> reviewService.createReview(productId, data);<br>    onSuccess();<br>  };<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;View&gt;<br>      &lt;Controller<br>        name=<span style='color: #4fc3f7;'>\"rating\"</span><br>        control={control}<br>        render={({ field }) => (<br>          &lt;StarRating<br>            rating={field.value}<br>            setRating={field.onChange}<br>            size={<span style='color: #ffb74d;'>35</span>}<br>          /&gt;<br>        )}<br>      /&gt;<br>      &lt;Controller<br>        name=<span style='color: #4fc3f7;'>\"comment\"</span><br>        control={control}<br>        render={({ field }) => (<br>          &lt;TextInput<br>            value={field.value}<br>            onChangeText={field.onChange}<br>            placeholder=<span style='color: #4fc3f7;'>\"Partagez votre expérience...\"</span><br>            multiline<br>            numberOfLines={<span style='color: #ffb74d;'>4</span>}<br>          /&gt;<br>        )}<br>      /&gt;<br>      &lt;Button title={<span style='color: #4fc3f7;'>\"Publier l'avis\"</span>} onPress={handleSubmit(onSubmit)} disabled={isSubmitting} /&gt;<br>    &lt;/View&gt;<br>  );<br>}</div></div>",
    "texteParle": "Pour le formulaire de publication d'avis, nous utilisons React Hook Form avec validation Zod. Le schéma de validation vérifie que la note est d'au moins 1 étoile, que le commentaire contient au moins 10 caractères, et que l'utilisateur n'ajoute pas plus de 5 photos. Nous utilisons le composant Controller pour gérer les champs personnalisés comme la notation par étoiles. Quand l'utilisateur soumet le formulaire, nous appelons l'API pour créer l'avis et nous informons le composant parent du succès. Cette approche garantit que les données sont valides avant d'être envoyées au serveur.",
    "note": "La validation côté client donne un feedback immédiat à l'utilisateur."
  },
  {
    "titre": "Ajout de Photos aux Avis",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Utilisons <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>expo-image-picker</code> pour sélectionner des photos.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.7em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> * <span style='color: #ffb74d;'>as</span> ImagePicker <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'expo-image-picker'</span>;<br><br><span style='color: #ffb74d;'>const</span> pickImages = <span style='color: #ffb74d;'>async</span> (currentPhotos, setPhotos) => {<br>  <span style='color: #ffb74d;'>const</span> result = <span style='color: #ffb74d;'>await</span> ImagePicker.launchImageLibraryAsync({<br>    mediaTypes: ImagePicker.MediaTypeOptions.Images,<br>    allowsMultipleSelection: <span style='color: #ffb74d;'>true</span>,<br>    selectionLimit: <span style='color: #ffb74d;'>5</span> - currentPhotos.length,<br>    quality: <span style='color: #ffb74d;'>0.8</span>,<br>  });<br>  <br>  <span style='color: #ffb74d;'>if</span> (!result.canceled) {<br>    <span style='color: #ffb74d;'>const</span> newPhotos = [...currentPhotos, ...result.assets.map(asset => asset.uri)];<br>    setPhotos(newPhotos);<br>  }<br>};<br><br><span style='color: #666;'>// Affichage des photos sélectionnées</span><br>&lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span>, flexWrap: <span style='color: #4fc3f7;'>'wrap'</span> }}&gt;<br>  {photos.map((uri, index) => (<br>    &lt;View key={index} style={{ position: <span style='color: #4fc3f7;'>'relative'</span> }}&gt;<br>      &lt;Image source={{ uri }} style={{ width: <span style='color: #ffb74d;'>80</span>, height: <span style='color: #ffb74d;'>80</span>, margin: <span style='color: #ffb74d;'>4</span>, borderRadius: <span style='color: #ffb74d;'>8</span> }} /&gt;<br>      &lt;TouchableOpacity<br>        onPress={() => setPhotos(photos.filter((_, i) => i !== index))}<br>        style={{ position: <span style='color: #4fc3f7;'>'absolute'</span>, top: <span style='color: #ffb74d;'>2</span>, right: <span style='color: #ffb74d;'>2</span>, backgroundColor: <span style='color: #4fc3f7;'>'#EF4444'</span>, borderRadius: <span style='color: #ffb74d;'>12</span>, padding: <span style='color: #ffb74d;'>4</span> }}<br>      &gt;<br>        &lt;Icon name=<span style='color: #4fc3f7;'>\"close\"</span> size={<span style='color: #ffb74d;'>16</span>} color=<span style='color: #4fc3f7;'>'#FFF'</span> /&gt;<br>      &lt;/TouchableOpacity&gt;<br>    &lt;/View&gt;<br>  ))}<br>  {photos.length < <span style='color: #ffb74d;'>5</span> && (<br>    &lt;TouchableOpacity<br>      onPress={() => pickImages(photos, setPhotos)}<br>      style={{ width: <span style='color: #ffb74d;'>80</span>, height: <span style='color: #ffb74d;'>80</span>, margin: <span style='color: #ffb74d;'>4</span>, borderWidth: <span style='color: #ffb74d;'>1</span>, borderColor: <span style='color: #4fc3f7;'>'#D1D5DB'</span>, borderRadius: <span style='color: #ffb74d;'>8</span>, justifyContent: <span style='color: #4fc3f7;'>'center'</span>, alignItems: <span style='color: #4fc3f7;'>'center'</span> }}<br>    &gt;<br>      &lt;Text style={{ fontSize: <span style='color: #ffb74d;'>24</span>, color: <span style='color: #4fc3f7;'>'#9CA3AF'</span> }}&gt;+&lt;/Text&gt;<br>    &lt;/TouchableOpacity&gt;<br>  )}<br>&lt;/View&gt;</div></div>",
    "texteParle": "Pour ajouter des photos aux avis, nous utilisons expo-image-picker. L'utilisateur peut sélectionner jusqu'à 5 photos depuis sa galerie. Nous affichons les photos sélectionnées en miniature, avec la possibilité de les supprimer en cliquant sur la petite croix. Un bouton '+' permet d'ajouter d'autres photos tant que la limite de 5 n'est pas atteinte. Les photos sont compressées avec une qualité de 0.8 pour réduire la taille des fichiers. Cette fonctionnalité enrichit les avis et donne plus d'informations visuelles aux autres utilisateurs.",
    "note": "Les photos dans les avis augmentent la crédibilité et aident à la décision d'achat."
  },
  {
    "titre": "Affichage des Avis",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Affichons les avis dans une FlatList avec des photos et la note.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.7em; overflow-x: auto;'><span style='color: #ce93d8;'>function</span> ReviewItem({ review, currentUser, onEdit, onDelete }) {<br>  <span style='color: #ffb74d;'>const</span> isOwner = review.userId === currentUser.id;<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;View style={{ padding: <span style='color: #ffb74d;'>16</span>, borderBottomWidth: <span style='color: #ffb74d;'>1</span>, borderBottomColor: <span style='color: #4fc3f7;'>'#E5E7EB'</span> }}&gt;<br>      &lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span>, alignItems: <span style='color: #4fc3f7;'>'center'</span>, justifyContent: <span style='color: #4fc3f7;'>'space-between'</span> }}&gt;<br>        &lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span>, alignItems: <span style='color: #4fc3f7;'>'center'</span> }}&gt;<br>          &lt;Image source={{ uri: review.userAvatar }} style={{ width: <span style='color: #ffb74d;'>40</span>, height: <span style='color: #ffb74d;'>40</span>, borderRadius: <span style='color: #ffb74d;'>20</span> }} /&gt;<br>          &lt;View style={{ marginLeft: <span style='color: #ffb74d;'>12</span> }}&gt;<br>            &lt;Text style={{ fontWeight: <span style='color: #4fc3f7;'>'bold'</span> }}&gt;{review.userName}&lt;/Text&gt;<br>            &lt;StarRating rating={review.rating} size={<span style='color: #ffb74d;'>16</span>} readonly /&gt;<br>          &lt;/View&gt;<br>        &lt;/View&gt;<br>        {isOwner && (<br>          &lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span> }}&gt;<br>            &lt;TouchableOpacity onPress={() => onEdit(review)}&gt;<br>              &lt;Text style={{ color: <span style='color: #4fc3f7;'>'#3B82F6'</span>, marginRight: <span style='color: #ffb74d;'>12</span> }}&gt;Modifier&lt;/Text&gt;<br>            &lt;/TouchableOpacity&gt;<br>            &lt;TouchableOpacity onPress={() => onDelete(review.id)}&gt;<br>              &lt;Text style={{ color: <span style='color: #4fc3f7;'>'#EF4444'</span> }}&gt;Supprimer&lt;/Text&gt;<br>            &lt;/TouchableOpacity&gt;<br>          &lt;/View&gt;<br>        )}<br>      &lt;/View&gt;<br>      &lt;Text style={{ marginTop: <span style='color: #ffb74d;'>8</span> }}&gt;{review.comment}&lt;/Text&gt;<br>      {review.photos && review.photos.length > <span style='color: #ffb74d;'>0</span> && (<br>        &lt;ScrollView horizontal style={{ marginTop: <span style='color: #ffb74d;'>8</span> }}&gt;<br>          {review.photos.map((photo, i) => (<br>            &lt;Image key={i} source={{ uri: photo }} style={{ width: <span style='color: #ffb74d;'>80</span>, height: <span style='color: #ffb74d;'>80</span>, marginRight: <span style='color: #ffb74d;'>8</span>, borderRadius: <span style='color: #ffb74d;'>8</span> }} /&gt;<br>          ))}<br>        &lt;/ScrollView&gt;<br>      )}<br>      &lt;Text style={{ fontSize: <span style='color: #ffb74d;'>12</span>, color: <span style='color: #4fc3f7;'>'#6B7280'</span>, marginTop: <span style='color: #ffb74d;'>8</span> }}&gt;{new Date(review.createdAt).toLocaleDateString()}&lt;/Text&gt;<br>    &lt;/View&gt;<br>  );<br>}</div></div>",
    "texteParle": "Pour afficher les avis, nous créons un composant ReviewItem qui affiche chaque avis dans une carte. Nous montrons la photo de profil de l'utilisateur, son nom, la note en étoiles, le commentaire, et les éventuelles photos. Si l'utilisateur connecté est l'auteur de l'avis, nous affichons des boutons pour modifier ou supprimer l'avis. Les photos sont affichées dans un ScrollView horizontal pour économiser de l'espace. Cette présentation claire et complète permet aux autres utilisateurs de consulter facilement les avis.",
    "note": "Afficher les photos des avis améliore la confiance et l'engagement."
  },
  {
    "titre": "Modification et Suppression d'Avis",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Implémentons les fonctionnalités de modification et suppression.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #666;'>// reviewService.ts</span><br><span style='color: #ffb74d;'>export const</span> reviewService = {<br>  updateReview: <span style='color: #ffb74d;'>async</span> (id, data) => {<br>    <span style='color: #ffb74d;'>return</span> api.put(<span style='color: #4fc3f7;'>`/reviews/${id}`</span>, data);<br>  },<br>  deleteReview: <span style='color: #ffb74d;'>async</span> (id) => {<br>    <span style='color: #ffb74d;'>return</span> api.delete(<span style='color: #4fc3f7;'>`/reviews/${id}`</span>);<br>  },<br>};<br><br><span style='color: #666;'>// Hook personnalisé</span><br><span style='color: #ffb74d;'>export const</span> useReviewActions = () => {<br>  <span style='color: #ffb74d;'>const</span> queryClient = useQueryClient();<br>  <br>  <span style='color: #ffb74d;'>const</span> updateMutation = useMutation({<br>    mutationFn: ({ id, data }) => reviewService.updateReview(id, data),<br>    onSuccess: () => {<br>      queryClient.invalidateQueries({ queryKey: [<span style='color: #4fc3f7;'>'reviews'</span>] });<br>      showToast(<span style='color: #4fc3f7;'>'Avis modifié avec succès'</span>, <span style='color: #4fc3f7;'>'success'</span>);<br>    },<br>  });<br>  <br>  <span style='color: #ffb74d;'>const</span> deleteMutation = useMutation({<br>    mutationFn: reviewService.deleteReview,<br>    onSuccess: () => {<br>      queryClient.invalidateQueries({ queryKey: [<span style='color: #4fc3f7;'>'reviews'</span>] });<br>      showToast(<span style='color: #4fc3f7;'>'Avis supprimé'</span>, <span style='color: #4fc3f7;'>'success'</span>);<br>    },<br>  });<br>  <br>  <span style='color: #ffb74d;'>return</span> { updateReview: updateMutation.mutate, deleteReview: deleteMutation.mutate };<br>};</div></div>",
    "texteParle": "Pour la modification et la suppression des avis, nous créons des fonctions dans notre service API. La modification envoie une requête PUT avec les nouvelles données, et la suppression envoie une requête DELETE. Nous utilisons React Query avec useMutation pour gérer ces opérations. En cas de succès, nous invalidons le cache des avis pour que la liste soit automatiquement mise à jour, et nous affichons une notification à l'utilisateur. Cette approche garantit que les modifications sont répercutées immédiatement et que l'expérience utilisateur est fluide.",
    "note": "L'invalidation du cache React Query garantit que les données affichées sont toujours à jour."
  },
  {
    "titre": "Modale de Confirmation pour la Suppression",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Ajoutons une modale de confirmation avant la suppression d'un avis.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ce93d8;'>function</span> DeleteConfirmationModal({ visible, onClose, onConfirm }) {<br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;Modal visible={visible} transparent animationType=<span style='color: #4fc3f7;'>\"fade\"</span>&gt;<br>      &lt;View style={{ flex: <span style='color: #ffb74d;'>1</span>, justifyContent: <span style='color: #4fc3f7;'>'center'</span>, alignItems: <span style='color: #4fc3f7;'>'center'</span>, backgroundColor: <span style='color: #4fc3f7;'>'rgba(0,0,0,0.5)'</span> }}&gt;<br>        &lt;View style={{ backgroundColor: <span style='color: #4fc3f7;'>'#FFF'</span>, padding: <span style='color: #ffb74d;'>20</span>, borderRadius: <span style='color: #ffb74d;'>12</span>, width: <span style='color: #4fc3f7;'>'80%'</span> }}&gt;<br>          &lt;Text style={{ fontSize: <span style='color: #ffb74d;'>18</span>, fontWeight: <span style='color: #4fc3f7;'>'bold'</span>, textAlign: <span style='color: #4fc3f7;'>'center'</span> }}&gt;Supprimer l'avis ?&lt;/Text&gt;<br>          &lt;Text style={{ textAlign: <span style='color: #4fc3f7;'>'center'</span>, marginVertical: <span style='color: #ffb74d;'>12</;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
