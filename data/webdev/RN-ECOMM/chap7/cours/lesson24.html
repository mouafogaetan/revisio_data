<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la Leçon 24",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Nous allons implémenter une barre de recherche performante pour notre application mobile.</p><ul style='margin-top: 15px; list-style: none; padding: 0;'><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>🔍 <strong>Barre de recherche</strong> avec autocomplétion</li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>📜 <strong>Afficher les recherches récentes</strong></li><li style='margin-bottom: 12px; background: #2a2a2a; padding: 12px; border-radius: 8px;'>💡 <strong>Suggestions personnalisées</strong> basées sur l'historique</li></ul><p style='margin-top: 20px; font-style: italic;'>Une bonne recherche est la clé d'une expérience utilisateur réussie sur mobile. 🇨🇲</p></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons nous concentrer sur un élément essentiel de toute application e-commerce : la barre de recherche. Sur mobile, la recherche doit être rapide, intuitive et intelligente. Nous allons voir comment implémenter une barre de recherche avec autocomplétion pour aider l'utilisateur à trouver rapidement ce qu'il cherche. Nous allons aussi sauvegarder les recherches récentes pour permettre à l'utilisateur de retrouver facilement ses précédentes requêtes. Enfin, nous mettrons en place des suggestions personnalisées basées sur l'historique de recherche de l'utilisateur.",
    "note": "La recherche est souvent le premier réflexe de l'utilisateur sur un site e-commerce."
  },
  {
    "titre": "Structure de la Barre de Recherche",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Voici les composants qui composent la barre de recherche.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📱 <strong style='color: #4fc3f7;'>Barre de recherche</strong> : Input avec icône de recherche</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📋 <strong style='color: #4fc3f7;'>Liste de suggestions</strong> : Affiche les résultats en temps réel</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>🕐 <strong style='color: #4fc3f7;'>Historique de recherche</strong> : Dernières recherches de l'utilisateur</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>🔥 <strong style='color: #4fc3f7;'>Suggestions personnalisées</strong> : Basées sur l'historique et les tendances</li></ul></div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #ffb74d;'>💡 Fonctionnement :</span> L'utilisateur tape → autocomplétion en temps réel → suggestions s'affichent → clic sur un résultat → recherche.</div></div>",
    "texteParle": "La barre de recherche mobile se compose de plusieurs éléments. D'abord, un champ de saisie avec une icône de recherche. Quand l'utilisateur tape, une liste de suggestions s'affiche en temps réel. Cette liste peut contenir des produits correspondant à la recherche, ou des catégories. Nous avons aussi l'historique des recherches récentes qui s'affiche quand l'utilisateur clique sur la barre sans avoir encore tapé. Enfin, nous pouvons afficher des suggestions personnalisées basées sur l'historique de l'utilisateur ou sur les tendances du moment. Ces éléments combinés offrent une expérience de recherche fluide et efficace.",
    "note": "L'UX de la recherche mobile doit être rapide et ne pas nécessiter de clics inutiles."
  },
  {
    "titre": "Implémentation de la Barre de Recherche",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Créons un composant SearchBar avec React Native.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { useState, useEffect, useRef } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'react'</span>;<br><span style='color: #ffb74d;'>import</span> { View, TextInput, TouchableOpacity, FlatList } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'react-native'</span>;<br><br><span style='color: #ce93d8;'>interface</span> SearchBarProps {<br>  onSearch: (query: <span style='color: #ffb74d;'>string</span>) => <span style='color: #ffb74d;'>void</span>;<br>  onSuggestionSelect: (suggestion: <span style='color: #ffb74d;'>string</span>) => <span style='color: #ffb74d;'>void</span>;<br>  suggestions: <span style='color: #ffb74d;'>string</span>[];<br>  recentSearches: <span style='color: #ffb74d;'>string</span>[];<br>}<br><br><span style='color: #ffb74d;'>const</span> SearchBar = ({ onSearch, onSuggestionSelect, suggestions, recentSearches }) => {<br>  <span style='color: #ffb74d;'>const</span> [query, setQuery] = useState(<span style='color: #4fc3f7;'>''</span>);<br>  <span style='color: #ffb74d;'>const</span> [isFocused, setIsFocused] = useState(<span style='color: #ffb74d;'>false</span>);<br>  <span style='color: #ffb74d;'>const</span> inputRef = useRef(<span style='color: #ffb74d;'>null</span>);<br>  <br>  <span style='color: #ffb74d;'>const</span> handleChangeText = (text) => {<br>    setQuery(text);<br>    <span style='color: #ffb74d;'>if</span> (text.length > <span style='color: #ffb74d;'>2</span>) {<br>      onSearch(text); <span style='color: #666;'>// Appel API avec debounce</span><br>    }<br>  };<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;View&gt;<br>      &lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span>, alignItems: <span style='color: #4fc3f7;'>'center'</span>, padding: <span style='color: #ffb74d;'>10</span> }}&gt;<br>        &lt;TextInput<br>          ref={inputRef}<br>          value={query}<br>          onChangeText={handleChangeText}<br>          onFocus={() => setIsFocused(<span style='color: #ffb74d;'>true</span>)}<br>          onBlur={() => setTimeout(() => setIsFocused(<span style='color: #ffb74d;'>false</span>), <span style='color: #ffb74d;'>200</span>)}<br>          placeholder=<span style='color: #4fc3f7;'>\"Rechercher un produit...\"</span><br>          style={{ flex: <span style='color: #ffb74d;'>1</span>, borderWidth: <span style='color: #ffb74d;'>1</span>, borderRadius: <span style='color: #ffb74d;'>8</span>, padding: <span style='color: #ffb74d;'>10</span> }}<br>        /&gt;<br>      &lt;/View&gt;<br>      {isFocused && query.length > <span style='color: #ffb74d;'>2</span> && (<br>        &lt;FlatList<br>          data={suggestions}<br>          renderItem={({ item }) => (<br>            &lt;TouchableOpacity onPress={() => onSuggestionSelect(item)}&gt;<br>              &lt;Text&gt;{item}&lt;/Text&gt;<br>            &lt;/TouchableOpacity&gt;<br>          )}<br>        /&gt;<br>      )}<br>    &lt;/View&gt;<br>  );<br>};</div></div>",
    "texteParle": "Voyons maintenant l'implémentation de notre barre de recherche. Nous créons un composant SearchBar qui prend des props comme onSearch, onSuggestionSelect, suggestions et recentSearches. Nous gérons l'état de la requête avec useState, et l'état de focus pour savoir si la barre est active. La fonction handleChangeText est appelée à chaque frappe. Si l'utilisateur a tapé plus de 2 caractères, nous appelons onSearch pour faire la recherche. La liste des suggestions s'affiche en dessous de la barre quand l'utilisateur est en train de taper. C'est un composant simple mais qui sera très utile.",
    "note": "Le seuil de 2 caractères évite des appels API inutiles pour des recherches trop courtes."
  },
  {
    "titre": "Gestion de l'Historique de Recherche",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Stocker les recherches récentes dans <code style='background: #1a1a1a; padding: 2px 6px; border-radius: 4px;'>AsyncStorage</code>.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> AsyncStorage <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@react-native-async-storage/async-storage'</span>;<br><br><span style='color: #ffb74d;'>const</span> SEARCH_HISTORY_KEY = <span style='color: #4fc3f7;'>'@search_history'</span>;<br><span style='color: #ffb74d;'>const</span> MAX_HISTORY = <span style='color: #ffb74d;'>10</span>;<br><br><span style='color: #ffb74d;'>export const</span> searchHistory = {<br>  getHistory: <span style='color: #ffb74d;'>async</span> () => {<br>    <span style='color: #ffb74d;'>try</span> {<br>      <span style='color: #ffb74d;'>const</span> data = <span style='color: #ffb74d;'>await</span> AsyncStorage.getItem(SEARCH_HISTORY_KEY);<br>      <span style='color: #ffb74d;'>return</span> data ? <span style='color: #4fc3f7;'>JSON</span>.parse(data) : [];<br>    } <span style='color: #ffb74d;'>catch</span> (error) {<br>      <span style='color: #ffb74d;'>return</span> [];<br>    }<br>  },<br>  <br>  addSearch: <span style='color: #ffb74d;'>async</span> (query) => {<br>    <span style='color: #ffb74d;'>const</span> history = <span style='color: #ffb74d;'>await</span> searchHistory.getHistory();<br>    <span style='color: #666;'>// Supprimer l'entrée si elle existe déjà</span><br>    <span style='color: #ffb74d;'>const</span> filtered = history.filter(item => item !== query);<br>    <span style='color: #666;'>// Ajouter en tête de liste</span><br>    <span style='color: #ffb74d;'>const</span> newHistory = [query, ...filtered].slice(<span style='color: #ffb74d;'>0</span>, MAX_HISTORY);<br>    <span style='color: #ffb74d;'>await</span> AsyncStorage.setItem(SEARCH_HISTORY_KEY, <span style='color: #4fc3f7;'>JSON</span>.stringify(newHistory));<br>    <span style='color: #ffb74d;'>return</span> newHistory;<br>  },<br>  <br>  clearHistory: <span style='color: #ffb74d;'>async</span> () => {<br>    <span style='color: #ffb74d;'>await</span> AsyncStorage.removeItem(SEARCH_HISTORY_KEY);<br>  },<br>};</div></div>",
    "texteParle": "Pour stocker l'historique des recherches, nous utilisons AsyncStorage. Nous créons un module searchHistory avec trois fonctions principales. getHistory récupère la liste des recherches récentes. addSearch ajoute une nouvelle recherche en tête de liste, supprime les doublons, et limite la liste à 10 entrées maximum. clearHistory permet de vider l'historique. Cette approche permet de conserver les recherches de l'utilisateur entre les sessions, améliorant ainsi l'expérience utilisateur en lui permettant de retrouver facilement ses recherches précédentes.",
    "note": "AsyncStorage est la solution de stockage persistante native de React Native."
  },
  {
    "titre": "Autocomplétion avec Debounce",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Pour éviter trop d'appels API, nous utilisons une technique de <strong>debounce</strong>.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { useRef, useEffect } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'react'</span>;<br><br><span style='color: #ffb74d;'>const</span> useDebounce = (value, delay) => {<br>  <span style='color: #ffb74d;'>const</span> [debouncedValue, setDebouncedValue] = useState(value);<br>  <br>  useEffect(() => {<br>    <span style='color: #ffb74d;'>const</span> handler = setTimeout(() => {<br>      setDebouncedValue(value);<br>    }, delay);<br>    <br>    <span style='color: #ffb74d;'>return</span> () => clearTimeout(handler);<br>  }, [value, delay]);<br>  <br>  <span style='color: #ffb74d;'>return</span> debouncedValue;<br>};<br><br><span style='color: #666;'>// Utilisation dans le composant</span><br><span style='color: #ffb74d;'>const</span> debouncedQuery = useDebounce(query, <span style='color: #ffb74d;'>300</span>);<br><br>useEffect(() => {<br>  <span style='color: #ffb74d;'>if</span> (debouncedQuery.length > <span style='color: #ffb74d;'>2</span>) {<br>    fetchSuggestions(debouncedQuery);<br>  }<br>}, [debouncedQuery]);</div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>⚡ Pourquoi ?</span> Sans debounce, chaque frappe déclencherait un appel API. Avec debounce (300ms), on n'appelle l'API que lorsque l'utilisateur a fini de taper.</div></div>",
    "texteParle": "Pour éviter de surcharger notre API avec des appels à chaque frappe clavier, nous utilisons une technique appelée debounce. Le principe est simple : au lieu de déclencher la recherche à chaque caractère tapé, nous attendons que l'utilisateur ait fini de taper. Nous créons un hook personnalisé useDebounce qui prend la valeur et un délai. Le hook va attendre que l'utilisateur ait arrêté de taper pendant 300 millisecondes avant de mettre à jour la valeur. Ensuite, nous utilisons useEffect pour déclencher la recherche uniquement quand la valeur debounced change. Cela réduit considérablement le nombre d'appels API.",
    "note": "Le debounce est une technique essentielle pour optimiser les performances des barres de recherche."
  },
  {
    "titre": "Suggestions Personnalisées",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Les suggestions peuvent être basées sur l'historique et la popularité des produits.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none; padding: 0;'><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>🕐 <strong style='color: #4fc3f7;'>Suggestions basées sur l'historique</strong> : Proposer des recherches déjà effectuées</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>🔥 <strong style='color: #4fc3f7;'>Suggestions populaires</strong> : Montrer ce que les autres utilisateurs recherchent</li><li style='margin-bottom: 8px; background: #1a2a2a; padding: 10px; border-radius: 6px;'>📦 <strong style='color: #4fc3f7;'>Suggestions de produits</strong> : Afficher des produits correspondant au début de la requête</li></ul></div><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #666;'>// Génération des suggestions</span><br><span style='color: #ffb74d;'>const</span> getSuggestions = <span style='color: #ffb74d;'>async</span> (query) => {<br>  <span style='color: #ffb74d;'>const</span> history = <span style='color: #ffb74d;'>await</span> searchHistory.getHistory();<br>  <span style='color: #666;'>// Filtrer l'historique par correspondance partielle</span><br>  <span style='color: #ffb74d;'>const</span> historyMatches = history.filter(item => <br>    item.toLowerCase().includes(query.toLowerCase())<br>  );<br>  <span style='color: #666;'>// Récupérer les suggestions populaires depuis l'API</span><br>  <span style='color: #ffb74d;'>const</span> popularSuggestions = <span style='color: #ffb74d;'>await</span> api.get(<span style='color: #4fc3f7;'>'/suggestions'</span>, { params: { q: query } });<br>  <span style='color: #666;'>// Combiner les deux sources</span><br>  <span style='color: #ffb74d;'>return</span> [...historyMatches, ...popularSuggestions.data];<br>};</div></div>",
    "texteParle": "Pour rendre les suggestions vraiment utiles, nous pouvons les personnaliser. D'abord, nous pouvons suggérer des recherches déjà effectuées par l'utilisateur, qui correspondent partiellement à ce qu'il est en train de taper. Ensuite, nous pouvons afficher des suggestions populaires, c'est-à-dire ce que les autres utilisateurs recherchent en ce moment. Enfin, nous pouvons proposer directement des noms de produits qui commencent par la requête de l'utilisateur. La combinaison de ces trois sources donne des suggestions très pertinentes et personnalisées.",
    "note": "Les suggestions personnalisées augmentent significativement le taux de conversion."
  },
  {
    "titre": "Affichage des Recherches Récentes",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Quand l'utilisateur clique sur la barre de recherche, afficher l'historique.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ce93d8;'>function</span> RecentSearches({ history, onSelect, onClear }) {<br>  <span style='color: #ffb74d;'>if</span> (history.length === <span style='color: #ffb74d;'>0</span>) {<br>    <span style='color: #ffb74d;'>return</span> &lt;Text&gt;Aucune recherche récente&lt;/Text&gt;;<br>  }<br>  <br>  <span style='color: #ffb74d;'>return</span> (<br>    &lt;View&gt;<br>      &lt;View style={{ flexDirection: <span style='color: #4fc3f7;'>'row'</span>, justifyContent: <span style='color: #4fc3f7;'>'space-between'</span> }}&gt;<br>        &lt;Text style={{ fontWeight: <span style='color: #4fc3f7;'>'bold'</span> }}&gt;Recherches récentes&lt;/Text&gt;<br>        &lt;TouchableOpacity onPress={onClear}&gt;<br>          &lt;Text style={{ color: <span style='color: #4fc3f7;'>'blue'</span> }}&gt;Effacer tout&lt;/Text&gt;<br>        &lt;/TouchableOpacity&gt;<br>      &lt;/View&gt;<br>      {history.map((item) => (<br>        &lt;TouchableOpacity key={item} onPress={() => onSelect(item)}&gt;<br>          &lt;View style={{ padding: <span style='color: #ffb74d;'>12</span>, borderBottomWidth: <span style='color: #ffb74d;'>1</span> }}&gt;<br>            &lt;Text&gt;🕐 {item}&lt;/Text&gt;<br>          &lt;/View&gt;<br>        &lt;/TouchableOpacity&gt;<br>      ))}<br>    &lt;/View&gt;<br>  );<br>}</div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>📌 Fonctionnement :</span> L'historique s'affiche quand la barre est focus et que la requête est vide. L'utilisateur peut cliquer sur une recherche pour la relancer, ou effacer tout l'historique.</div></div>",
    "texteParle": "Pour afficher l'historique des recherches, nous créons un composant RecentSearches. Il reçoit la liste de l'historique, une fonction onSelect pour sélectionner une recherche, et une fonction onClear pour effacer tout l'historique. Si l'historique est vide, nous affichons un message simple. Sinon, nous affichons une liste avec un en-tête et un bouton 'Effacer tout'. Chaque élément de l'historique est un bouton sur lequel l'utilisateur peut cliquer pour relancer la recherche. Cet historique s'affiche automatiquement quand l'utilisateur tape sur la barre de recherche, avant qu'il ne commence à taper.",
    "note": "L'historique des recherches évite à l'utilisateur de retaper les mêmes requêtes."
  },
  {
    "titre": "Optimisation avec FlashList",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Pour les listes de suggestions, utilisons <strong>FlashList</strong> pour de meilleures performances.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #ffb74d;'>import</span> { FlashList } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'@shopify/flash-list'</span>;<br><br>&lt;FlashList<br>  data={suggestions}<br>  renderItem={({ item }) => (<br>    &lt;TouchableOpacity onPress={() => onSuggestionSelect(item)}&gt;<br>      &lt;Text&gt;🔍 {item}&lt;/Text&gt;<br>    &lt;/TouchableOpacity&gt;<br>  )}<br>  estimatedItemSize={<span style='color: #ffb74d;'>50</span>}<br>  keyExtractor={(item, index) => index.toString()}<br>  showsVerticalScrollIndicator={false}<br>  contentContainerStyle={{ paddingBottom: <span style='color: #ffb74d;'>20</span> }}<br>/&gt;</div><div style='background: #2a2a2a; padding: 12px; border-radius: 8px;'><span style='font-weight: bold; color: #4fc3f7;'>⚡ Avantages :</span> FlashList est plus performant que FlatList pour les listes longues car il virtualise mieux le rendu des éléments.</div></div>",
    "texteParle": "Pour afficher les suggestions de manière performante, nous utilisons FlashList de Shopify. FlashList est plus performant que FlatList car il gère mieux la virtualisation et le recyclage des éléments. C'est particulièrement important quand la liste de suggestions est longue, ou quand les suggestions contiennent des images. FlashList permet un défilement plus fluide et réduit l'utilisation de la mémoire. C'est une bonne pratique d'utiliser FlashList pour toutes les listes dans votre application React Native.",
    "note": "FlashList est la solution recommandée par React Native pour les listes performantes."
  },
  {
    "titre": "Intégration avec le Store",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Gérons l'état de la recherche avec Zustand.</p><div style='background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; font-family: monospace; font-size: 0.75em; overflow-x: auto;'><span style='color: #666;'>// searchStore.ts</span><br><span style='color: #ffb74d;'>import</span> { create } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'zustand'</span>;<br><span style='color: #ffb74d;'>import</span> { persist } <span style='color: #ffb74d;'>from</span> <span style='color: #4fc3f7;'>'zustand/middleware'</span>;<br><br><span style='color: #ce93d8;'>interface</span> SearchState {<br>  query: <span style='color: #ffb74d;'>string</span>;<br>  history: <span style='color: #ffb74d;'>string</span>[];<br>  suggestions: <span style='color: #ffb74d;'>string</span>[];<br>  setQuery: (query: <span style='color: #ffb74d;'>string</span>) => <span style='color: #ffb74d;'>void</span>;<br>  addToHistory: (query: <span style='color: #ffb74d;'>string</span>) => <span style='color: #ffb74d;'>void</span>;<br>  clearHistory: () => <span style='color: #ffb74d;'>void</span>;<br>  setSuggestions: (suggestions: <span style='color: #ffb74d;'>string</span>[]) => <span style='color: #ffb74d;'>void</span>;<br>  clearSuggestions: () => <span style='color: #ffb74d;'>void</span>;<br>}<br><br><span style='color: #ffb74d;'>export const</span> useSearchStore = create&lt;SearchState&gt;()(<br>  persist(<br>    (set, get) => ({<br>      query: <span style='color: #4fc3f7;'>''</span>,<br>      history: [],<br>      suggestions: [],<br>      setQuery: (query) => set({ query }),<br>      addToHistory: (query) => {<br>        <span style='color: #ffb74d;'>const</span> currentHistory = get().history;<br>        <span style='color: #ffb74d;'>const</span> newHistory = [query, ...currentHistory.filter(item => item !== query)].slice(<span style='color: #ffb74d;'>0</span>, <span style='color: #ffb74d;'>10</span>);<br>        set({ history: newHistory });<br>      },<br>      clearHistory: () => set({ history: [] }),<br>      setSuggestions: (suggestions) => set({ suggestions }),<br>      clearSuggestions: () => set({ suggestions: [] }),<br>    }),<br>    { name: <span style='color: #4fc3f7;'>'search-storage'</span> }<br>  )<br>);</div></div>",
    "texteParle": "Pour gérer l'état de la recherche de manière centralisée, nous créons un store Zustand dédié. Ce store contient la requête en cours, l'historique des recherches, et les suggestions actuelles. Nous utilisons le middleware persist pour sauvegarder l'historique dans AsyncStorage. Le store fournit des fonctions pour mettre à jour la requête, ajouter une recherche à l'historique, effacer tout l'historique, et gérer les suggestions. Cette approche centralisée facilite l'accès aux données de recherche depuis n'importe quel composant de l'application.",
    "note": "Un store dédié facilite la gestion de l'état de recherche dans toute l'application."
  },
  {
    "titre": "Résumé et Bonnes Pratiques",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.6; color: #e0e0e0;'><p>Récapitulons les points clés de la barre de recherche.</p><div style='background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 15px 0;'><ul style='list-style: none;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
