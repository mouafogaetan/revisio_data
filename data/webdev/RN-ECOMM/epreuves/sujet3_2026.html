<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une application mobile e-commerce multiplateforme",
  "classe": "Développement Web",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Architecture et Navigation de l'Application",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #333;'><p>Vous êtes chef de projet technique dans une startup camerounaise qui développe une application mobile e-commerce appelée <strong>\"AfriShop\"</strong>. L'application doit permettre aux utilisateurs de parcourir un catalogue de produits, de gérer un panier d'achat, de passer des commandes et de gérer leur compte utilisateur.</p><p>L'application doit être développée avec <strong>React Native</strong> en utilisant <strong>Expo</strong> et doit offrir une expérience utilisateur fluide et intuitive.</p><p>Vous devez prendre des décisions d'architecture et de conception pour garantir la scalabilité et la maintenabilité du projet.</p></div>",
      "questions": [
        {
          "question": "<div><span style='font-weight: bold;'>1.1) (3 pts)</span> <span style='font-style: italic;'>Définition des écrans et navigation</span><br><br>a) (1,5 pt) Proposez une structure de navigation pour l'application AfriShop. Vous devez décrire précisément l'agencement des <strong>Bottom Tabs</strong> et des <strong>Stack Navigators</strong> imbriqués, en justifiant votre choix pour chaque écran principal (Accueil, Catalogue, Panier, Profil).<br><br>b) (1,5 pt) Pour la gestion des écrans privés (ceux nécessitant une authentification), décrivez la mise en place d'une <strong>navigation conditionnelle</strong>. Expliquez comment vous allez gérer le flux de l'utilisateur, de l'écran de connexion à l'écran principal, et comment vous allez persister son état de connexion.</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><p><strong>1.1 a) Structure de navigation :</strong></p><p>La navigation est organisée autour d'un <strong>Bottom Tab Navigator</strong> contenant 4 onglets : <strong>Accueil</strong>, <strong>Catalogue</strong>, <strong>Panier</strong> et <strong>Profil</strong> [citation:3]. Chaque onglet est un <strong>Stack Navigator</strong> indépendant pour gérer la navigation imbriquée et les transitions spécifiques à chaque section.</p><ul><li><strong>Accueil (Stack)</strong> : HomeScreen (avec carrousel et catégories), ProductDetailScreen, CategoryProductsScreen.</li><li><strong>Catalogue (Stack)</strong> : CatalogScreen (liste de produits avec filtres), ProductDetailScreen.</li><li><strong>Panier (Stack)</strong> : CartScreen, CheckoutScreen, OrderConfirmationScreen.</li><li><strong>Profil (Stack)</strong> : ProfileScreen, OrdersScreen, SettingsScreen.</li></ul><p>Cette structure permet une navigation intuitive via les onglets en bas, tout en offrant une navigation contextuelle en profondeur pour les détails de produit ou le processus de commande [citation:1].</p><hr><p><strong>1.1 b) Navigation conditionnelle :</strong></p><p>La navigation conditionnelle repose sur un <strong>Root Navigator</strong> qui choisit entre un Stack Navigator pour l'authentification (<code>AuthStack</code>) et le Bottom Tab Navigator de l'application [citation:1][citation:7]. L'état de connexion de l'utilisateur est stocké dans un <code>authStore</code> (Zustand) et persistant via AsyncStorage.</p><p>Un <code>useEffect</code> dans le composant racine surveille l'état de connexion. Si l'utilisateur est connecté, le <code>BottomTabNavigator</code> est montré ; sinon, le <code>AuthStack</code> (LoginScreen, RegisterScreen) est affiché. Ce mécanisme garantit que les écrans privés ne sont jamais accessibles sans authentification, améliorant ainsi la sécurité de l'application [citation:2].</p></div>"
        },
        {
          "question": "<div><span style='font-weight: bold;'>1.2) (3 pts)</span> <span style='font-style: italic;'>Architecture du projet et structure des dossiers</span><br><br>a) (1,5 pt) Proposez une organisation de dossiers pour le projet AfriShop. Vous devez décrire la structure en justifiant le choix entre une organisation <strong>par type</strong> (type-based) et une organisation <strong>par fonctionnalité</strong> (feature-based). Indiquez où seraient placés les fichiers de navigation, les composants réutilisables, les services API, les stores de gestion d'état et les hooks personnalisés.<br><br>b) (1,5 pt) Vous devez intégrer des bibliothèques tierces comme <strong>React Navigation</strong> pour la navigation et <strong>Zustand</strong> pour la gestion d'état. Expliquez comment vous allez structurer leur intégration dans votre projet en détaillant les dossiers et fichiers spécifiques à créer.</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><p><strong>1.2 a) Organisation de dossiers :</strong></p><p>Je recommande une <strong>organisation par fonctionnalité</strong> (feature-based) car elle est plus adaptée aux projets d'e-commerce qui évoluent rapidement et intègrent de nouvelles fonctionnalités de manière itérative [citation:2][citation:7]. Cela facilite la scalabilité et la maintenance en regroupant par domaine métier.</p><p><strong>Structure proposée :</strong></p><pre style='background-color:#f4f4f4;padding:12px;border-radius:6px;font-size:14px;'><code>src/<br>├── features/<br>│   ├── auth/ (Login, Register, store, services)<br>│   ├── products/ (ProductList, ProductDetail, store, services)<br>│   ├── cart/ (CartScreen, store, services)<br>│   └── orders/ (OrderHistory, OrderDetail, store, services)<br>├── navigation/ (RootNavigator, BottomTabs, AuthStack)<br>├── components/ (UI réutilisables : Button, Input, Card...)<br>├── hooks/ (useAuth, useCart...)<br>├── services/ (api.ts avec Axios)<br>├── store/ (index.ts pour Zustand)<br>├── utils/ (constants, helpers)<br>└── assets/ (images, fonts)</code></pre><hr><p><strong>1.2 b) Intégration des bibliothèques :</strong></p><ul><li><strong>React Navigation</strong> : Le dossier <code>navigation/</code> contient <code>RootNavigator.tsx</code>, <code>BottomTabs.tsx</code> et <code>AuthStack.tsx</code>. Les paramètres de navigation (types) sont définis dans un fichier <code>types.ts</code> pour la sécurité de typage.</li><li><strong>Zustand</strong> : Les stores sont centralisés dans le dossier <code>store/</code>. Par exemple, <code>store/authStore.ts</code> gère l'utilisateur et le token, et <code>store/cartStore.ts</code> gère le panier. La persistance est assurée via <code>AsyncStorage</code> et le middleware <code>persist</code> de Zustand.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Gestion de l'État et Connexion API",
      "points": "8 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.6; color: #333;'><p>L'équipe de développement d'AfriShop a choisi d'utiliser <strong>Zustand</strong> pour la gestion de l'état global et <strong>React Query</strong> pour la gestion des appels API. Vous êtes chargé de mettre en place ces deux bibliothèques.</p></div>",
      "questions": [
        {
          "question": "<div><span style='font-weight: bold;'>2.1) (4 pts)</span> <span style='font-style: italic;'>Création d'un store Zustand</span><br><br>a) (2 pts) Écrivez le code TypeScript d'un <strong>store Zustand</strong> pour la gestion du <strong>panier d'achat (cart)</strong>. Ce store doit inclure : les éléments du panier (avec quantité), le total, ainsi que les actions suivantes : <code>addItem</code>, <code>removeItem</code>, <code>updateQuantity</code> et <code>clearCart</code>.<br><br>b) (2 pts) Expliquez comment vous allez <strong>persister</strong> les données du panier à l'aide du middleware <code>persist</code> et d'<code>AsyncStorage</code> pour que l'utilisateur retrouve son panier même après avoir fermé l'application. Discutez des enjeux de sécurité liés au stockage local, en particulier pour les tokens JWT, et proposez une solution de stockage sécurisé.</div>",
          "reponse": "<div style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><p><strong>2.1 a) Store Zustand pour le panier :</strong></p><pre style='background-color:#f4f4f4;padding:12px;border-radius:6px;font-size:14px;'><code>import { create } from 'zustand'<br>import { persist, createJSONStorage } from 'zustand/middleware'<br>import AsyncStorage from '@react-native-async-storage/async-storage'<br><br>type CartItem = {<br>  id: string; name: string; price: number; quantity: number; image: string;<br>}<br><br>type CartStore = {<br>  items: CartItem[];<br>  total: number;<br>  addItem: (item: Omit<CartItem, 'quantity'>) => void;<br>  removeItem: (id: string) => void;<br>  updateQuantity: (id: string, quantity: number) => void;<br>  clearCart: () => void;<br>}<br><br>export const useCartStore = create<CartStore>()(<br>  persist(<br>    (set, get) => ({<br>      items: [],<br>      total: 0,<br>      addItem: (item) => {<br>        const items = get().items;<br>        const existing = items.find(i => i.id === item.id)<br>        if (existing) {<br>          set({ items: items.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i) })<br>        } else {<br>          set({ items: [...items, { ...item, quantity: 1 }] })<br>        }<br>        set({ total: get().items.reduce((sum, i) => sum + i.price * i.quantity, 0) })<br>      },<br>      removeItem: (id) => {<br>        set({ items: get().items.filter(i => i.id !== id) })<br>        set({ total: get().items.reduce((sum, i) => sum + i.price * i.quantity, 0) })<br>      },<br>      updateQuantity: (id, quantity) => {<br>        set({ items: get().items.map(i => i.id === id ? { ...i, quantity } : i) })<br>        set({ total: get().items.reduce((sum, i) => sum + i.price * i.quantity, 0) })<br>      },<br>      clearCart: () => set({ items: [], total: 0 })<br>    }),<br>    {<br>      name: 'cart-storage',<br>      storage: createJSONStorage(() => AsyncStorage),<br>    }<br>  )<br>)</code></pre><hr><p><strong>2.1 b) Persistance et sécurité :</strong></p><p>Le middleware <code>persist</code> avec <code>AsyncStorage</code> persiste automatiquement le panier. Cependant, pour les tokens JWT, il est impératif d'utiliser <code>expo-secure-store</code> car il offre un chiffrement au niveau du système, contrairement à AsyncStorage qui stocke en clair et est vulnérable aux accès non autorisés [citation:2]. Le store d'authentification utilisera donc SecureStore pour la persistance du token.</p></div>"
        },
        {
          "question": "<div><span style='font-weight: bold;'>2.2) (4 pts)</span> <span style='font-style: italic;'>Configuration d'Axios et de React Query</span><br><br>a) (2 pts) Écrivez le code de configuration d'<strong>Axios</strong> pour l'application AfriShop. Vous devez inclure la configuration de la <code>baseURL</code> à partir d'une variable d'environnement, l'ajout automatique du <strong>token JWT</strong> dans les en-têtes via un intercepteur, et la gestion du <strong>refresh token</strong> en cas d'expiration du token (statut 401).<br><br>b) (2 pts) Expliquez comment vous allez intégrer <strong>React Query</strong> (@tanstack/react-query) dans l'application pour gérer les appels API de manière efficace. Décrivez la mise en place du <code>QueryClientProvider</code>, la gestion du cache, le <code>staleTime</code> et les stratégies pour gérer les données en mode hors ligne.</div>",

etour en ligne [citation:1].</p></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
