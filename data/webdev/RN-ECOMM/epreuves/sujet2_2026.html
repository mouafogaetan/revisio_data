<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une application mobile e-commerce multiplateforme",
  "classe": "Développement Web",
  "sequence": "Séquence 2 : Création de l'interface utilisateur et navigation",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours sur l'interface mobile et la navigation",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Répondez aux questions suivantes en vous appuyant sur les bonnes pratiques vues en cours.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.1 (2 pts)</strong> Expliquez en quelques lignes l'intérêt d'utiliser Expo pour développer une application React Native multiplateforme, comparé à React Native CLI. Quels sont les avantages pour un projet e-commerce au Cameroun ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Expo est recommandé car il simplifie le développement avec des outils prêts à l'emploi comme Expo Go pour tester instantanément sur un appareil physique [citation:1]. Pour un projet e-commerce au Cameroun, Expo réduit les délais de développement grâce à sa configuration minimale et permet d'accéder facilement aux fonctionnalités natives (appareil photo, localisation, notifications) via des modules pré-construits. De plus, Expo facilite le déploiement et les mises à jour OTA (Over The Air), ce qui est un avantage pour les startups camerounaises qui doivent itérer rapidement.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.2 (2 pts)</strong> Décrivez l'architecture de dossiers d'un projet React Native organisée par fonctionnalités (auth, products, cart, orders, profile). Quel est l'intérêt de cette approche pour la maintenabilité du projet ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> L'organisation par fonctionnalités consiste à regrouper tous les fichiers relatifs à une même fonctionnalité dans un même dossier. Exemple : <code>src/features/auth/</code> contient les composants, les services, les hooks et les stores liés à l'authentification. Les dossiers transversaux comme <code>components/</code> (composants partagés), <code>screens/</code>, <code>navigation/</code>, <code>services/</code>, <code>hooks/</code> et <code>store/</code> complètent l'architecture [citation:3]. L'intérêt est la maintenabilité : chaque fonctionnalité est autonome, ce qui facilite les modifications, le débogage et l'ajout de nouvelles fonctionnalités sans risque de régression. C'est une approche scalable pour les équipes.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>1.3 (2 pts)</strong> Expliquez la différence entre un Bottom Tab Navigator et un Stack Navigator dans React Navigation. Dans quels cas utilise-t-on l'un ou l'autre ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Le <strong>Bottom Tab Navigator</strong> affiche une barre d'onglets en bas de l'écran, permettant à l'utilisateur de naviguer entre les sections principales de l'application (Accueil, Recherche, Panier, Profil). Il est idéal pour une navigation de premier niveau. Le <strong>Stack Navigator</strong> gère une pile d'écrans où chaque nouvel écran s'empile sur le précédent, avec une navigation par bouton retour. Il est utilisé pour les écrans secondaires (détail d'un produit, formulaire de commande, etc.) [citation:1]. Ces deux navigateurs sont souvent imbriqués : un Stack Navigator est intégré dans chaque onglet du Bottom Tab Navigator.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyser un code de navigation et d'interface",
      "points": "7 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Vous travaillez sur une application e-commerce. Voici un extrait de code qui configure la navigation avec React Navigation.</p><div style='background: #1e293b; padding: 15px; border-radius: 8px; color: #f1f5f9; font-family: monospace; overflow-x: auto;'>import { createBottomTabNavigator } from '@react-navigation/bottom-tabs';<br>import { createNativeStackNavigator } from '@react-navigation/native-stack';<br>import { NavigationContainer } from '@react-navigation/native';<br><br>const Tab = createBottomTabNavigator();<br>const Stack = createNativeStackNavigator();<br><br>function HomeStack() {<br>  return (<br>    &lt;Stack.Navigator&gt;<br>      &lt;Stack.Screen name='Home' component={HomeScreen} /&gt;<br>      &lt;Stack.Screen name='ProductDetail' component={ProductDetailScreen} /&gt;<br>    &lt;/Stack.Navigator&gt;<br>  );<br>}<br><br>function AppNavigator() {<br>  return (<br>    &lt;Tab.Navigator&gt;<br>      &lt;Tab.Screen name='Accueil' component={HomeStack} /&gt;<br>      &lt;Tab.Screen name='Recherche' component={SearchScreen} /&gt;<br>      &lt;Tab.Screen name='Panier' component={CartScreen} /&gt;<br>      &lt;Tab.Screen name='Profil' component={ProfileScreen} /&gt;<br>    &lt;/Tab.Navigator&gt;<br>  );<br>}</div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.1 (1 pt)</strong> Expliquez pourquoi le composant <code>HomeStack</code> est utilisé comme écran du <code>Tab.Screen</code> nommé 'Accueil'. Quel est l'effet recherché ?</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> Le <code>HomeStack</code> est un Stack Navigator qui contient l'écran principal 'Home' et l'écran de détail 'ProductDetail'. En utilisant ce Stack comme écran du Tab 'Accueil', on permet à l'utilisateur de naviguer de l'écran d'accueil vers l'écran de détail du produit, tout en restant dans l'onglet 'Accueil'. La barre d'onglets reste visible pendant cette navigation, ce qui améliore l'expérience utilisateur [citation:1].</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.2 (3 pts)</strong> On souhaite ajouter un Drawer Navigator (menu latéral) pour l'écran 'Profil'. Modifiez le code pour intégrer ce Drawer qui contiendra les écrans 'Profil', 'Commandes' et 'Paramètres'. Écrivez le code complet.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px; white-space: pre-wrap;'>import { createDrawerNavigator } from '@react-navigation/drawer';<br><br>const Drawer = createDrawerNavigator();<br><br>function ProfileDrawer() {<br>  return (<br>    &lt;Drawer.Navigator&gt;<br>      &lt;Drawer.Screen name='Profil' component={ProfileScreen} /&gt;<br>      &lt;Drawer.Screen name='Commandes' component={OrdersScreen} /&gt;<br>      &lt;Drawer.Screen name='Paramètres' component={SettingsScreen} /&gt;<br>    &lt;/Drawer.Navigator&gt;<br>  );<br>}<br><br>function AppNavigator() {<br>  return (<br>    &lt;Tab.Navigator&gt;<br>      &lt;Tab.Screen name='Accueil' component={HomeStack} /&gt;<br>      &lt;Tab.Screen name='Recherche' component={SearchScreen} /&gt;<br>      &lt;Tab.Screen name='Panier' component={CartScreen} /&gt;<br>      &lt;Tab.Screen name='Profil' component={ProfileDrawer} /&gt;<br>    &lt;/Tab.Navigator&gt;<br>  );<br>}</code></p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>2.3 (3 pts)</strong> Comment gérer l'authentification dans cette configuration ? Décrivez la structure de navigation conditionnelle qui permettrait d'afficher un écran de connexion si l'utilisateur n'est pas authentifié, et le reste de l'application sinon.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong> On peut utiliser la navigation conditionnelle en créant deux navigateurs distincts : un Stack Navigator pour les écrans d'authentification (Login, Register) et un autre pour les écrans protégés (le Tab Navigator). Un composant racine, comme <code>RootNavigator</code>, va lire le state d'authentification (via Zustand ou Context) et retourner le navigateur approprié [citation:8]. Par exemple :<br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px;'>function RootNavigator() {<br>  const isAuthenticated = useAuthStore((state) => state.isAuthenticated);<br>  return (<br>    &lt;NavigationContainer&gt;<br>      {isAuthenticated ? &lt;AppNavigator /&gt; : &lt;AuthStackNavigator /&gt;}<br>    &lt;/NavigationContainer&gt;<br>  );<br>}</code><br><br>Cette approche est standard et permet de gérer facilement la redirection vers login si l'utilisateur n'est pas connecté.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Concevoir un écran avec Tailwind et animations",
      "points": "7 pts",
      "enonce": "<div style='font-size: 1rem; line-height: 1.6; color: #0f172a; padding: 10px;'><p>Vous devez créer l'écran d'accueil d'une application e-commerce avec les éléments suivants :</p><ul><li>Un header avec le logo et une icône de panier affichant le nombre d'articles.</li><li>Un carrousel de produits en vedette.</li><li>Une grille de catégories (4 catégories en 2 colonnes).</li><li>Une animation d'apparition des produits au chargement.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3.1 (3 pts)</strong> Écrivez le code React Native avec Tailwind (NativeWind) pour le composant d'affichage d'une catégorie. Utilisez <code>TouchableOpacity</code> et une image. Expliquez comment les classes utilitaires de Tailwind rendent le code responsive.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px; white-space: pre-wrap;'>import { View, Text, TouchableOpacity, Image } from 'react-native';<br><br>const CategoryCard = ({ category, onPress }) => {<br>  return (<br>    &lt;TouchableOpacity onPress={() => onPress(category.id)}<br>      className='flex-1 m-1 rounded-lg overflow-hidden bg-white shadow-sm'&gt;<br>      &lt;Image source={{ uri: category.image }} className='w-full h-24' /&gt;<br>      &lt;View className='p-2 items-center'&gt;<br>        &lt;Text className='text-sm font-medium text-gray-800'&gt;{category.name}&lt;/Text&gt;<br>      &lt;/View&gt;<br>    &lt;/TouchableOpacity&gt;<br>  );<br>};</code><br><br>Avec Tailwind, les classes utilitaires comme <code>flex-1</code> et <code>m-1</code> s'adaptent automatiquement sur tous les écrans. L'absence de classes de taille fixe (px) permet au composant de s'adapter à n'importe quelle largeur d'écran, ce qui est essentiel pour le mobile-first.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><strong>3.2 (4 pts)</strong> Ajoutez une animation avec React Native Reanimated 3 pour que les catégories apparaissent avec un effet de fade-in et un léger décalage (slide up) lorsque l'écran est chargé. Écrivez le code complet en utilisant <code>useSharedValue</code>, <code>useAnimatedStyle</code> et <code>withSpring</code> ou <code>withTiming</code>.</div>",
          "reponse": "<div style='background: #f0fdf4; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e;'><p style='margin: 0;'><strong>Réponse :</strong><br><br><code style='display: block; background: #f1f5f9; padding: 12px; border-radius: 6px; white-space: pre-wrap;'>import { useEffect } from 'react';<br>import { View } from 'react-native';<br>import Animated, { useSharedValue, useAnimatedStyle, withSpring } from 'react-native-reanimated';<br><br>const AnimatedCategoryGrid = ({ categories }) => {<br>  const opacity = useSharedValue(0);<br>  const translateY = useSharedValue(20);<br><br>  useEffect(() => {<br>    opacity.value = withSpring(1, { damping: 10, stiffness: 80 });<br>    translateY.value = withSpring(0, { damping: 10, stiffness: 80 });<br>  }, []);<br><br>  const animatedStyle = useAnimatedStyle(() => ({<br>    opacity: opacity.value,<br>    transform: [{ translateY: translateY.value }],<br>  }));<br><br>  return (<br>    &lt;Animated.View style={[{ flexDirection: 'row', flexWrap: 'wrap' }, animatedStyle]}&gt;<br>      {categories.map((cat, index) => (<br>        &lt;CategoryCard key={cat.id} category={cat} onPress={onPress} delay={index * 50} /&gt;<br>      ))}<br>    &lt;/Animated.View&gt;<br>  );<br>};</code><br><br>L'animation utilise <code>withSpring</code> pour un effet naturel. L'effet de décalage peut être accentué en ajoutant un délai par carte (props <code>delay</code>) pour un effet cascade.</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
