<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une application mobile e-commerce multiplateforme",
  "classe": "Développement Web",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Architecture et navigation de l'application \"CamerShop Mobile\"",
      "points": "8 pts",
      "enonce": "<p>Vous êtes le lead développeur d'une start-up camerounaise qui lance <strong>\"CamerShop Mobile\"</strong>, une application e-commerce multiplateforme (iOS/Android) dédiée aux produits locaux et artisanaux du Cameroun. L'application utilise React Native avec Expo.</p><p style='margin-top:0.8rem; background-color:#f0f4f8; padding:0.8rem; border-radius:8px; color:#1e293b;'><strong>Contexte camerounais :</strong> Surnommé « l’Afrique en miniature », le Cameroun possède une incroyable diversité culturelle avec plus de 200 dialectes et une riche tradition d'artisanat [citation:1]. L'application doit refléter cette diversité et être accessible sur tous les types d'appareils, y compris ceux d'entrée de gamme très répandus au Cameroun.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1) Choix technologique et architecture</strong> <em>(3 pts)</em></p><p>a) Justifiez le choix d'Expo plutôt que React Native CLI pour ce projet.<br>b) Décrivez l'organisation des dossiers que vous mettez en place en utilisant une approche par fonctionnalités.<br>c) Quels sont les avantages d'utiliser TypeScript pour ce projet ?</p>",
          "reponse": "<p><strong>a) Choix d'Expo :</strong> Expo est recommandé car il simplifie considérablement le développement React Native [citation:2]. Il offre des outils clés en main comme le SDK, la CLI et Expo Go pour tester rapidement l'application, et facilite la gestion des builds via EAS [citation:7]. Cela permet à l'équipe de se concentrer sur le produit plutôt que sur la configuration native.</p><p><strong>b) Organisation des dossiers :</strong></p><ul style='list-style-type:disc; padding-left:1.2rem;'><li><code>src/components</code> : Composants réutilisables (Atomic Design)</li><li><code>src/screens</code> : Écrans de l'application</li><li><code>src/navigation</code> : Configuration des navigateurs</li><li><code>src/services</code> : Appels API, authentification</li><li><code>src/store</code> : Gestion d'état avec Zustand</li><li><code>src/hooks</code> : Hooks personnalisés</li><li><code>src/utils</code> : Fonctions utilitaires</li></ul><p><strong>c) TypeScript :</strong> TypeScript apporte une sécurité de typage qui réduit les bugs, améliore l'auto-complétion et facilite la maintenance du code, surtout pour une application évolutive comme CamerShop Mobile.</p>"
        },
        {
          "question": "<p><strong>1.2) Navigation mobile</strong> <em>(3 pts)</em></p><p>a) Quelle est la différence entre un <code>Bottom Tab Navigator</code> et un <code>Stack Navigator</code> ? Quand utiliser l'un plutôt que l'autre ?<br>b) Proposez une structure de navigation pour CamerShop Mobile qui inclut : un Bottom Tab Navigator avec 4 onglets, un Stack Navigator pour les écrans imbriqués, et une gestion de l'authentification.<br>c) Comment implémenter un écran de \"Détails du produit\" accessible depuis la page catalogue tout en gardant un bouton retour ?</p>",
          "reponse": "<p><strong>a) Différence :</strong></p><ul style='list-style-type:disc; padding-left:1.2rem;'><li><strong>Bottom Tab Navigator</strong> : Navigation principale avec des onglets en bas (ex: Accueil, Recherche, Panier, Profil). Idéal pour la structure principale d'une application.</li><li><strong>Stack Navigator</strong> : Navigation par pile (stack) avec une navigation hiérarchique (ex: Catalogue → Détails produit → Panier). Chaque nouvel écran s'empile sur le précédent.</li></ul><p><strong>b) Structure de navigation :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>// Root Navigator avec condition d'auth<br>RootNavigator<br>├── AuthStack (si non connecté)<br>│   ├── Login<br>│   └── Register<br>└── MainTabs (si connecté)<br>    ├── Tab1: Accueil (Stack)<br>    │   ├── Home<br>    │   └── ProductDetails<br>    ├── Tab2: Recherche<br>    │   └── Search<br>    ├── Tab3: Panier (Stack)<br>    │   ├── Cart<br>    │   └── Checkout<br>    └── Tab4: Profil (Stack)<br>        ├── Profile<br>        ├── Orders<br>        └── Settings</code></div><p><strong>c) Détails du produit :</strong> On utilise un Stack Navigator dans l'onglet Accueil. Depuis la page catalogue, on navigue vers ProductDetails avec <code>navigation.navigate('ProductDetails', { productId })</code>. Le bouton retour est géré automatiquement par le Stack Navigator.</p>"
        },
        {
          "question": "<p><strong>1.3) Gestion d'état avec Zustand</strong> <em>(2 pts)</em></p><p>a) Créez un store Zustand pour gérer l'authentification (authStore) avec les propriétés : user, token, isAuthenticated, et les actions : login, logout.<br>b) Comment persister ce store avec AsyncStorage pour que l'utilisateur reste connecté après la fermeture de l'application ?</p>",
          "reponse": "<p><strong>a) AuthStore avec Zustand :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>import { create } from 'zustand';<br><br>interface AuthState {<br>  user: User | null;<br>  token: string | null;<br>  isAuthenticated: boolean;<br>  login: (user: User, token: string) => void;<br>  logout: () => void;<br>}<br><br>export const useAuthStore = create<AuthState>((set) => ({<br>  user: null,<br>  token: null,<br>  isAuthenticated: false,<br>  login: (user, token) => set({ user, token, isAuthenticated: true }),<br>  logout: () => set({ user: null, token: null, isAuthenticated: false })<br>}));</code></div><p><strong>b) Persistance avec AsyncStorage :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>import { persist, createJSONStorage } from 'zustand/middleware';<br>import AsyncStorage from '@react-native-async-storage/async-storage';<br><br>export const useAuthStore = create(<br>  persist(<br>    (set) => ({<br>      user: null,<br>      token: null,<br>      isAuthenticated: false,<br>      login: (user, token) => set({ user, token, isAuthenticated: true }),<br>      logout: () => set({ user: null, token: null, isAuthenticated: false })<br>    }),<br>    {<br>      name: 'auth-storage',<br>      storage: createJSONStorage(() => AsyncStorage)<br>    }<br>  )<br>);</code></div><p>Le middleware <code>persist</code> sauvegarde automatiquement l'état dans AsyncStorage et le restaure au démarrage de l'application.</p>"
        }
      ]
    },
    {
      "titre": "Interface utilisateur et performance mobile",
      "points": "6 pts",
      "enonce": "<p>L'équipe UI/UX a livré les maquettes finales pour CamerShop Mobile. Vous devez maintenant implémenter l'interface utilisateur avec les composants appropriés et optimiser les performances.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1) UI avec React Native Paper</strong> <em>(2 pts)</em></p><p>a) Créez un composant <code>ProductCard</code> réutilisable en utilisant les composants de React Native Paper (Card, Button, Badge, etc.).<br>b) Comment gérer le dark mode dans l'application avec React Native Paper et React Navigation ?</p>",
          "reponse": "<p><strong>a) ProductCard avec React Native Paper :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>import { Card, Button, Badge, Paragraph, Title } from 'react-native-paper';<br><br>const ProductCard = ({ product, onAddToCart }) => {<br>  return (<br>    &lt;Card mode=\"elevated\" style={{ margin: 8 }}&gt;<br>      &lt;Card.Cover source={{ uri: product.image }} /&gt;<br>      &lt;Card.Content&gt;<br>        &lt;Title&gt;{product.name}&lt;/Title&gt;<br>        &lt;Paragraph&gt;{product.price} FCFA&lt;/Paragraph&gt;<br>        {product.isPromo && &lt;Badge style={{ marginTop: 4 }}&gt;Promo&lt;/Badge&gt;}<br>      &lt;/Card.Content&gt;<br>      &lt;Card.Actions&gt;<br>        &lt;Button mode=\"contained\" onPress={() => onAddToCart(product)}&gt;<br>          Ajouter au panier<br>        &lt;/Button&gt;<br>      &lt;/Card.Actions&gt;<br>    &lt;/Card&gt;<br>  );<br>};</code></div><p><strong>b) Dark Mode :</strong> Utiliser <code>PaperProvider</code> avec un thème dynamique de React Navigation :</p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>import { Provider as PaperProvider } from 'react-native-paper';<br><br>const theme = useColorScheme() === 'dark' ? DarkTheme : DefaultTheme;<br><br>return (<br>  &lt;PaperProvider theme={theme}&gt;<br>    &lt;NavigationContainer theme={theme}&gt;<br>      &lt;App /&gt;<br>    &lt;/NavigationContainer&gt;<br>  &lt;/PaperProvider&gt;<br>);</code></div>"
        },
        {
          "question": "<p><strong>2.2) Optimisation des performances</strong> <em>(2 pts)</em></p><p>a) Pourquoi utiliser <code>FlashList</code> plutôt que <code>FlatList</code> pour afficher la liste des produits ? [citation:2]<br>b) Expliquez comment implémenter un chargement infini (pagination) avec <code>FlashList</code>.<br>c) Qu'est-ce que <code>React.memo</code> et comment l'utiliser pour optimiser les <code>ProductCard</code> ?</p>",
          "reponse": "<p><strong>a) FlashList vs FlatList :</strong> FlashList est développé par Shopify et offre des performances supérieures grâce à une meilleure virtualisation et un recyclage plus efficace des composants. Il est particulièrement adapté aux longues listes sur mobile.</p><p><strong>b) Chargement infini avec FlashList :</strong></p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>&lt;FlashList<br>  data={products}<br>  renderItem={({ item }) => &lt;ProductCard product={item} /&gt;}<br>  estimatedItemSize={200}<br>  onEndReached={loadMoreProducts}<br>  onEndReachedThreshold={0.5}<br>  ListFooterComponent={isLoading && &lt;ActivityIndicator /&gt;}<br>/&gt;</code></div><p><strong>c) React.memo :</strong> React.memo est un HOC qui évite les re-rendus inutiles d'un composant si ses props n'ont pas changé. Pour ProductCard :</p><div style='background-color:#1e293b; padding:0.6rem; border-radius:8px; margin-top:0.5rem; color:#e2e8f0; font-size:0.9rem;'><code>const ProductCard = React.memo(({ product, onAddToCart }) => {<br>  // ...<br>});</code></div>"
        },
        {
          "question": "<p><strong>2.3) Capacités natives et engagement</strong> <em>(2 pts)</em></p><p>a) Comment implémenter une fonctionnalité de scan de code-barres pour ajouter rapidement un produit au panier ? [citation:2]<br>b) Décrivez comment mettre en place des notifications push pour informer l'utilisateur du statut de sa commande.<br>c) Comment afficher un badge sur l'icône de l'application indiquant le nombre d'articles dans le panier ?</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
