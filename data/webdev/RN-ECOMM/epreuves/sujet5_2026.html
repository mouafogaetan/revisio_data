<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Développement d'une application mobile e-commerce multiplateforme",
  "classe": "Développement Web",
  "sequence": "Séquence 5 (Chapitres 11 à 15)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Maîtrise de l'optimisation des performances (Chapitre 11)",
      "points": "8 pts",
      "enonce": "<p>L'optimisation des performances est un aspect fondamental pour garantir une expérience utilisateur fluide, en particulier dans une application e-commerce où la rapidité et la réactivité sont déterminantes pour la conversion.</p><p>Cet exercice vise à évaluer votre capacité à mettre en œuvre les techniques avancées d'optimisation vues dans les leçons 37 à 40. Vous répondrez aux questions en vous appuyant sur les bonnes pratiques enseignées, en particulier dans le contexte d'une application mobile e-commerce.</p>",
      "questions": [
        {
          "question": "<p><strong>1. FlashList (2 pts)</strong></p><p>a. Expliquez en quoi <code>FlashList</code> de Shopify est plus performant que <code>FlatList</code> pour afficher une longue liste de produits. (1 pt)</p><p>b. Avec Expo, comment installeriez-vous <code>FlashList</code> et quelles configurations de base recommanderiez-vous pour optimiser son rendu ? (1 pt)</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>a. <code>FlashList</code> est plus performant que <code>FlatList</code> car il utilise un moteur de recyclage des composants plus efficace, optimisant le rendu des listes. Il est conçu spécifiquement pour la virtualisation des composants dans React Native et offre une meilleure gestion de la mémoire et du CPU. Contrairement à <code>FlatList</code>, il rend les composants en dehors de l'écran de manière plus intelligente, ce qui réduit les ralentissements lors du défilement [citation:3].</p><p>b. Pour l'installer avec Expo : <code>npx expo install @shopify/flash-list</code>. Les configurations de base recommandées incluent : l'utilisation de <code>estimatedItemSize</code> pour aider le moteur à calculer la taille des éléments (ex: <code>estimatedItemSize={200}</code>), l'activation du <code>drawDistance</code> pour contrôler le nombre d'éléments à rendre au-delà de l'écran visible, et l'utilisation de <code>getItemType</code> pour optimiser la réutilisation si les éléments ont des structures différentes [citation:3].</p>"
        },
        {
          "question": "<p><strong>2. Gestion des images et de la mémoire (2 pts)</strong></p><p>a. Citez deux techniques pour optimiser l'affichage des images dans une application e-commerce. (1 pt)</p><p>b. Quelles sont les bonnes pratiques pour éviter les fuites de mémoire dans les composants React Native ? (1 pt)</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>a. Deux techniques pour optimiser l'affichage des images : utiliser <code>expo-image</code> pour le caching avancé des images et le redimensionnement automatique ; et implémenter le lazy loading (blurhash ou placeholder) pour afficher un aperçu flou pendant le chargement de l'image complète [citation:3].</p><p>b. Les bonnes pratiques incluent : le nettoyage des <code>setTimeout</code>, <code>setInterval</code> et des listeners dans la fonction de nettoyage du <code>useEffect</code> ; l'annulation des requêtes API inutiles lors du démontage ; et l'utilisation de <code>useCallback</code> et <code>useMemo</code> pour éviter les re-rendus inutiles et les cycles de vie infinis [citation:3].</p>"
        },
        {
          "question": "<p><strong>3. Analyse du bundle et lazy loading (2 pts)</strong></p><p>Expliquez en quoi consiste le <strong>lazy loading</strong> des écrans avec <code>React.lazy</code> et <code>Suspense</code> dans une application React Native. À partir de la leçon 39, détaillez la syntaxe de base pour l'implémenter.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>Le lazy loading est une technique permettant de charger les composants (ici, les écrans) uniquement lorsqu'ils sont nécessaires, réduisant ainsi la taille du bundle initial et améliorant le temps de démarrage de l'application. Avec React.lazy, on définit un import différé (ex: <code>const HomeScreen = React.lazy(() => import('./HomeScreen'));</code>). Le composant <code>Suspense</code> permet d'afficher un composant de chargement (fallback) pendant que le code de l'écran se charge (ex: <code>&lt;Suspense fallback={&lt;LoadingSpinner /&gt;}&gt; &lt;HomeScreen /&gt; &lt;/Suspense&gt;</code>). Cela permet d'améliorer les performances perçues par l'utilisateur.</p>"
        },
        {
          "question": "<p><strong>4. useCallback et useMemo (2 pts)</strong></p><p>Que permettent de faire <code>useCallback</code> et <code>useMemo</code> ? Dans quel contexte leur utilisation est-elle particulièrement cruciale pour l'optimisation des performances d'une application e-commerce ? Donnez un exemple concret.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p><code>useMemo</code> permet de mémoriser le résultat d'un calcul coûteux pour le recalculer uniquement si ses dépendances changent. <code>useCallback</code> est similaire mais pour les fonctions, elle retourne une version mémorisée de la fonction qui ne change que si ses dépendances changent. Leur utilisation est cruciale pour éviter les re-rendus inutiles, surtout lorsqu'on transmet des fonctions ou des valeurs calculées à des composants enfants optimisés avec <code>React.memo</code>. Par exemple, dans une liste de produits, on peut utiliser <code>useCallback</code> pour la fonction <code>handleAddToCart</code> transmise à chaque carte produit, évitant ainsi que chaque carte ne se re-render à chaque changement de l'état parent [citation:3].</p>"
        }
      ]
    },
    {
      "titre": "Utilisation des capacités natives et tests (Chapitres 12 et 13)",
      "points": "8 pts",
      "enonce": "<p>Une application e-commerce moderne se distingue par son utilisation intelligente des fonctionnalités natives du téléphone, couplée à une stratégie de tests robuste pour garantir la fiabilité de l'application.</p><p>Cet exercice explore la maîtrise de l'intégration des modules Expo (comme <code>expo-image-picker</code>, <code>expo-location</code>, <code>expo-sharing</code>) et des techniques de test (unitaires, E2E) essentielles pour la pérennité du projet. Vous justifierez vos choix et détaillerez vos démarches.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Partage d'un produit (2 pts)</strong></p><p>Décrivez la démarche pour implémenter le partage d'un produit sur les réseaux sociaux ou par message dans l'application, en utilisant <code>expo-sharing</code>.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>Pour implémenter le partage, on installe d'abord le package avec <code>npx expo install expo-sharing</code>. Ensuite, on importe <code>import * as Sharing from 'expo-sharing';</code> et <code>import * as FileSystem from 'expo-file-system';</code> si nécessaire. On peut créer un texte de partage (ex: <code>const message = `Découvrez ce produit : ${product.name} - ${product.price} FCFA`;</code>) et un lien profond vers l'application. On appelle ensuite <code>await Sharing.shareAsync(message, { mimeType: 'text/plain', dialogTitle: 'Partager' });</code>. Cette fonction ouvre la boîte de dialogue de partage du système [citation:3].</p>"
        },
        {
          "question": "<p><strong>2. Utilisation de l'appareil photo (2 pts)</strong></p><p>a. Expliquez comment utiliser <code>expo-image-picker</code> pour permettre à l'utilisateur de choisir une photo de profil. (1 pt)</p><p>b. Quelles précautions devez-vous prendre en compte pour la gestion des permissions sur Android et iOS ? (1 pt)</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>a. Après installation avec <code>npx expo install expo-image-picker</code>, on importe <code>import * as ImagePicker from 'expo-image-picker';</code>. Pour ouvrir la galerie, on utilise <code>const result = await ImagePicker.launchImageLibraryAsync({ mediaTypes: ImagePicker.MediaTypeOptions.Images, allowsEditing: true, aspect: [1, 1], quality: 1 });</code>. Si le résultat n'est pas annulé, on utilise <code>result.assets[0].uri</code> pour afficher l'image [citation:3].</p><p>b. Il faut demander les permissions avant d'accéder à la galerie ou à la caméra avec <code>await ImagePicker.requestMediaLibraryPermissionsAsync()</code> et <code>await ImagePicker.requestCameraPermissionsAsync()</code>. Il faut aussi gérer le cas où l'utilisateur refuse, en fournissant un message explicatif et une alternative. Sur Android, la configuration des permissions dans le fichier <code>app.json</code> est nécessaire, et sur iOS, la description de l'utilisation de la caméra et de la galerie dans <code>Info.plist</code> doit être fournie [citation:3].</p>"
        },
        {
          "question": "<p><strong>3. Tests unitaires de l'application (2 pts)</strong></p><p>a. Citez l'outil et la bibliothèque recommandés pour tester les composants React Native. (1 pt)</p><p>b. En quoi consiste un test E2E avec Detox dans une application mobile e-commerce ? Décrivez le scénario testé dans la leçon 46. (1 pt)</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>a. L'outil recommandé est <code>Jest</code> associé à la bibliothèque <code>React Native Testing Library</code> pour les tests unitaires et d'intégration des composants [citation:3].</p><p>b. Un test E2E avec Detox simule le comportement d'un utilisateur réel. Dans la leçon 46, le test du processus d'achat complet est écrit : il se connecte à l'application, recherche un produit, l'ajoute au panier, remplit l'adresse de livraison, simule le paiement et vérifie l'affichage de l'écran de confirmation de commande. Ce test garantit le bon fonctionnement du flux principal de l'application.</p>"
        },
        {
          "question": "<p><strong>4. Tests End-to-End (2 pts)</strong></p><p>Expliquez comment vous exécuteriez les tests Detox sur un émulateur Android. Mentionnez les fichiers de configuration essentiels.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>On utilise la commande <code>npx detox test --configuration android</code>. Avant cela, Detox doit être configuré dans <code>detox.config.js</code> avec les bonnes références à l'émulateur (ex: <code>{ type: 'android.emulator', device: { avdName: 'Pixel_4_API_33' } }</code>) et à l'application. Le fichier <code>e2e/config.json</code> est aussi nécessaire pour la configuration de Jest. On s'assure que l'émulateur est lancé avant d'exécuter la commande.</p>"
        }
      ]
    },
    {
      "titre": "Publication sur les stores (Chapitre 14)",
      "points": "4 pts",
      "enonce": "<p>La publication sur les stores (Google Play Store et Apple App Store) est l'étape finale qui rend votre application accessible aux utilisateurs. Elle nécessite une préparation rigoureuse des builds, des configurations et des assets pour respecter les normes de chaque plateforme.</p><p>Cet exercice portera sur votre capacité à préparer et automatiser le processus de build avec EAS Build.</p>",
      "questions": [
        {
          "question": "<p><strong>1. EAS Build et configuration (2 pts)</strong></p><p>Qu'est-ce qu'<code>EAS Build</code> et pourquoi est-il recommandé pour les projets Expo ? Décrivez les étapes pour configurer un build de production pour Android avec EAS Build.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>EAS Build (Expo Application Services) est un service de compilation cloud qui permet de builder des applications Expo pour iOS et Android sans avoir à configurer un environnement de build complexe sur sa machine locale. Il est recommandé car il simplifie et standardise le processus de build, gère automatiquement la génération des clés de signature et est optimisé pour les projets Expo. Pour configurer un build Android : on installe <code>eas-cli</code> globalement, on exécute <code>eas build:configure</code> pour configurer le projet, puis on utilise <code>eas build --platform android</code> pour lancer le build. EAS Build s'occupe de créer l'APK ou l'AAB signé.</p>"
        },
        {
          "question": "<p><strong>2. Mises à jour OTA (Over The Air) (2 pts)</strong></p><p>Expliquez ce qu'est une mise à jour OTA et comment elle peut être mise en place dans une application Expo pour corriger des bugs critiques ou déployer de nouvelles fonctionnalités sans passer par une re-soumission aux stores.</p>",
          "reponse": "<p><strong>Réponse :</strong></p><p>Une mise à jour OTA (Over The Air) est un mécanisme permettant de modifier les fichiers JavaScript et les assets de l'application sans avoir à construire une nouvelle version native et à passer par le processus de validation des stores. Cela permet de corriger des bugs, d'ajouter des fonctionnalités ou d'effectuer des changements de configuration de manière quasi-instantanée pour les utilisateurs. Avec Expo, cela est rendu possible via les <code>expo-updates</code>. On utilise <code>eas update</code> pour créer un nouveau bundle de mises à jour qui sera téléchargé par l'application au lancement ou en arrière-plan, sans nécessiter de réinstallation.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
