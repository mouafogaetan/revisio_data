<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Les formulaires dans React Native",
    "contenu": "<div style='display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding:2rem; border-radius:12px; color:white;'><h1 style='font-size:2.2rem; font-weight:bold; margin-bottom:1rem;'>📝 Formulaires mobile</h1><p style='font-size:1.2rem; max-width:600px;'>Gérer efficacement les formulaires dans React Native</p><div style='display:flex; flex-wrap:wrap; gap:0.8rem; justify-content:center; margin-top:1.5rem;'><span style='background:#334155; padding:0.5rem 1.2rem; border-radius:50px; color:#60a5fa;'>React Hook Form</span><span style='background:#334155; padding:0.5rem 1.2rem; border-radius:50px; color:#f472b6;'>Zod</span><span style='background:#334155; padding:0.5rem 1.2rem; border-radius:50px; color:#34d399;'>Validation</span></div><p style='margin-top:1.5rem; font-size:0.95rem; color:#94a3b8;'>Des formulaires performants, sécurisés et avec une excellente expérience utilisateur</p></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons aborder un sujet essentiel dans toute application mobile : la gestion des formulaires. Que ce soit pour la connexion, l'inscription, ou la saisie d'adresse de livraison, les formulaires sont partout dans notre application e-commerce. Nous allons voir comment les créer de manière efficace, performante et sécurisée avec deux bibliothèques incontournables : React Hook Form et Zod.",
    "note": "React Hook Form est la bibliothèque de formulaires la plus utilisée dans l'écosystème React."
  },
  {
    "titre": "Pourquoi React Hook Form ?",
    "contenu": "<div style='display:grid; grid-template-columns:1fr 1fr; gap:1rem; padding:0.5rem;'><div style='background:#f0fdf4; padding:1rem; border-radius:8px; border-left:4px solid #22c55e;'><h4 style='margin-top:0; color:#16a34a;'>✅ Avantages</h4><ul style='padding-left:1.2rem; font-size:0.9rem;'><li><strong>Performances</strong> : Pas de re-rendus inutiles</li><li><strong>Validation</strong> : Intégration facile avec Zod</li><li><strong>Mobile-friendly</strong> : Compatible avec React Native</li><li><strong>Contrôlé ou non</strong> : Flexibilité totale</li><li><strong>Gestion d'erreurs</strong> : Messages personnalisables</li></ul></div><div style='background:#fef2f2; padding:1rem; border-radius:8px; border-left:4px solid #ef4444;'><h4 style='margin-top:0; color:#dc2626;'>⚠️ Inconvénients</h4><ul style='padding-left:1.2rem; font-size:0.9rem;'><li>Courbe d'apprentissage initiale</li><li>Configuration un peu complexe au début</li></ul></div></div><div style='background:#dbeafe; padding:0.75rem; border-radius:4px; margin-top:0.5rem;'><p style='margin:0; font-size:0.9rem;'><strong>💡 Alternative :</strong> Formik (plus ancien, moins performant)</p></div>",
    "texteParle": "React Hook Form est devenu la référence pour la gestion des formulaires dans React et React Native. Ses principaux atouts sont la performance, car il évite les re-rendus inutiles de tout le formulaire, et sa flexibilité. Il s'intègre parfaitement avec Zod pour la validation. L'inconvénient est qu'il y a un peu de configuration à apprendre au début, mais une fois maîtrisé, le développement des formulaires devient un vrai plaisir. C'est l'outil que nous allons utiliser pour notre projet e-commerce.",
    "note": "React Hook Form utilise les refs pour suivre les champs, ce qui le rend très performant."
  },
  {
    "titre": "Pourquoi Zod ?",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><p><strong>Zod</strong> est une bibliothèque de validation de schéma qui fonctionne avec TypeScript.</p><div style='display:grid; grid-template-columns:1fr 1fr; gap:1rem;'><div style='background:#f8fafc; padding:1rem; border-radius:8px;'><h4 style='margin-top:0; color:#2563eb;'>📋 Schémas</h4><ul style='font-size:0.9rem;'><li><code>z.string()</code> → Chaîne de caractères</li><li><code>z.number()</code> → Nombre</li><li><code>z.email()</code> → Email valide</li><li><code>z.min(8)</code> → Minimum 8 caractères</li></ul></div><div style='background:#f8fafc; padding:1rem; border-radius:8px;'><h4 style='margin-top:0; color:#2563eb;'>🔒 Sécurité</h4><ul style='font-size:0.9rem;'><li>Validation <strong>coté client</strong></li><li>Validation <strong>coté serveur</strong> (réutilisable)</li><li>TypeScript <strong>inféré</strong> automatiquement</li><li>Messages d'erreur <strong>personnalisés</strong></li></ul></div></div><div style='background:#fef3c7; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>💡 Astuce :</strong> Zod s'utilise avec React Hook Form via <code>zodResolver</code></p></div></div>",
    "texteParle": "Zod est une bibliothèque de validation qui va nous permettre de définir des schémas pour nos données. Par exemple, on peut dire qu'un champ 'email' doit être une chaîne de caractères valide, qu'un mot de passe doit faire au moins 8 caractères, etc. L'avantage de Zod, c'est qu'il génère automatiquement les types TypeScript à partir des schémas. On peut donc réutiliser la même validation côté client et côté serveur. C'est une sécurité supplémentaire pour notre application.",
    "note": "Zod est compatible avec les formulaires React Hook Form via le resolver."
  },
  {
    "titre": "Installation des dépendances",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><p>Pour commencer, on installe les paquets nécessaires :</p><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.85rem;'>npm install react-hook-form @hookform/resolvers zod\n\n# Pour Expo\nnpx expo install react-hook-form @hookform/resolvers zod</pre></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f1f5f9; padding:0.6rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>📦 react-hook-form</strong></p><p style='font-size:0.8rem; margin:0;'>Le cœur du formulaire</p></div><div style='background:#f1f5f9; padding:0.6rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>🔗 @hookform/resolvers</strong></p><p style='font-size:0.8rem; margin:0;'>Le pont vers Zod</p></div><div style='background:#f1f5f9; padding:0.6rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>📐 zod</strong></p><p style='font-size:0.8rem; margin:0;'>La validation des données</p></div></div></div>",
    "texteParle": "Pour installer React Hook Form et Zod dans notre projet, on utilise simplement npm ou la commande Expo si on utilise ce framework. On installe trois paquets : react-hook-form pour la gestion du formulaire, @hookform/resolvers qui fait le pont entre React Hook Form et Zod, et zod pour la définition des schémas de validation. Ces trois bibliothèques fonctionnent ensemble de manière transparente.",
    "note": "Avec Expo, la commande `npx expo install` garantit la compatibilité des versions."

  {
    "titre": "Création du schéma Zod",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>import { z } from 'zod';\n\nexport const loginSchema = z.object({\n  email: z.string()\n    .min(1, \"L'email est requis\")\n    .email(\"Email invalide\"),\n  password: z.string()\n    .min(8, \"Le mot de passe doit faire au moins 8 caractères\")\n    .regex(/[A-Z]/, \"Doit contenir une majuscule\")\n    .regex(/[0-9]/, \"Doit contenir un chiffre\"),\n});\n\nexport type LoginFormData = z.infer&lt;typeof loginSchema&gt;;</pre></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f0fdf4; padding:0.6rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>✅ Email</strong></p><p style='font-size:0.8rem; margin:0;'>Valide le format et la présence</p></div><div style='background:#f0fdf4; padding:0.6rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>✅ Mot de passe</strong></p><p style='font-size:0.8rem; margin:0;'>Longueur et complexité</p></div></div></div>",
    "texteParle": "La première étape est de définir notre schéma de validation avec Zod. On va créer un objet qui décrit chaque champ de notre formulaire. Par exemple, pour un formulaire de connexion, on aura un champ 'email' qui doit être une chaîne non vide et un email valide, et un champ 'password' qui doit faire au moins 8 caractères et contenir une majuscule et un chiffre. Zod nous permet aussi de définir des messages d'erreur personnalisés pour chaque règle. On peut même inférer automatiquement les types TypeScript à partir du schéma.",
    "note": "Les messages d'erreur personnalisés améliorent l'expérience utilisateur."
  },
  {
    "titre": "Configuration du formulaire avec useForm",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>import { useForm } from 'react-hook-form';\nimport { zodResolver } from '@hookform/resolvers/zod';\nimport { loginSchema, LoginFormData } from '../schemas/auth';\n\nconst LoginScreen = () => {\n  const {\n    control,\n    handleSubmit,\n    formState: { errors },\n  } = useForm&lt;LoginFormData&gt;({\n    resolver: zodResolver(loginSchema),\n    defaultValues: {\n      email: '',\n      password: '',\n    },\n  });\n\n  const onSubmit = (data: LoginFormData) => {\n    console.log('Données valides :', data);\n    // Appel API ici\n  };\n\n  // ... retour du formulaire\n};</pre></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>control</strong> : Gère les champs du formulaire</p></div><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>handleSubmit</strong> : Valide et soumet</p></div><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>errors</strong> : Contient les erreurs de validation</p></div></div></div>",
    "texteParle": "Maintenant qu'on a notre schéma, on va configurer le formulaire dans notre composant. On utilise le hook 'useForm' de React Hook Form. On lui passe le resolver qui va relier notre schéma Zod au formulaire, et on peut aussi définir des valeurs par défaut. Le hook retourne plusieurs éléments importants : 'control' qui va nous servir à lier les champs, 'handleSubmit' pour la soumission, et 'errors' qui contient les erreurs de validation. La fonction 'onSubmit' ne sera appelée que si les données sont valides.",
    "note": "Le typage avec TypeScript est automatique grâce à l'inférence de Zod."
  },
  {
    "titre": "Création des champs avec Controller",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>import { Controller } from 'react-hook-form';\nimport { TextInput, Text, View } from 'react-native';\n\n&lt;Controller\n  control={control}\n  name=\"email\"\n  render={({ field: { onChange, value, onBlur } }) => (\n    &lt;View&gt;\n      &lt;Text style={{ marginBottom: 4 }}&gt;Email&lt;/Text&gt;\n      &lt;TextInput\n        style={{ borderWidth: 1, padding: 12, borderRadius: 8 }}\n        placeholder=\"exemple@email.com\"\n        value={value}\n        onChangeText={onChange}\n        onBlur={onBlur}\n        keyboardType=\"email-address\"\n        autoCapitalize=\"none\"\n      /&gt;\n      {errors.email && &lt;Text style={{ color: 'red', marginTop: 4 }}&gt;\n        {errors.email.message}\n      &lt;/Text&gt;}\n    &lt;/View&gt;\n  )}\n/&gt;</pre></div></div>",
    "texteParle": "Pour créer les champs du formulaire dans React Native, on utilise le composant 'Controller' fourni par React Hook Form. Il fait le lien entre le champ natif et le système de gestion du formulaire. On lui passe 'control' qui vient du hook useForm, et le nom du champ qui doit correspondre à notre schéma. La fonction 'render' nous donne des propriétés comme 'onChange', 'value', et 'onBlur' qu'on va passer au composant TextInput. On affiche aussi l'erreur si elle existe.",
    "texteParle": "Pour créer les champs du formulaire dans React Native, on utilise le composant 'Controller' de React Hook Form. Il fait le lien entre le champ natif et le système de gestion du formulaire. On lui passe 'control' qui vient du hook useForm, et le nom du champ qui correspond au schéma. La fonction 'render' nous donne les propriétés comme 'onChange', 'value' et 'onBlur' qu'on passe au composant TextInput. On affiche aussi l'erreur si elle existe.",

    "texteParle": "La gestion des erreurs est cruciale pour une bonne expérience utilisateur. Avec React Hook Form et Zod, les erreurs sont automatiquement générées et stockées dans 'formState.errors'. On peut ensuite les afficher sous chaque champ avec un message clair. Les messages d'erreur doivent être compréhensibles par tous : par exemple, au lieu de dire 'Pattern mismatch', on dit 'L'email doit contenir un @'. C'est aussi important de bien styliser les erreurs avec une couleur rouge pour qu'elles soient visibles.",
    "note": "Afficher les erreurs en temps réel (onBlur) améliore l'expérience utilisateur."

  {
    "titre": "Soumission du formulaire",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.8rem;'>const onSubmit = async (data: LoginFormData) => {\n  try {\n    setLoading(true);\n    const response = await loginUser(data.email, data.password);\n    // Stocker le token\n    // Rediriger vers l'écran d'accueil\n  } catch (error) {\n    // Afficher une erreur globale\n    Toast.show('Erreur de connexion');\n  } finally {\n    setLoading(false);\n  }\n};\n\n// Dans le retour JSX\n&lt;TouchableOpacity onPress={handleSubmit(onSubmit)} disabled={loading}&gt;\n  &lt;Text&gt;{loading ? 'Connexion...' : 'Se connecter'}&lt;/Text&gt;\n&lt;/TouchableOpacity&gt;</pre></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>handleSubmit</strong> : Valide avant d'appeler onSubmit</p></div><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>loading</strong> : Désactive le bouton pendant la soumission</p></div></div></div>",
    "texteParle": "Pour soumettre le formulaire, on utilise la fonction 'handleSubmit' qui va d'abord valider les données avec Zod. Si la validation est réussie, il appelle notre fonction 'onSubmit' avec les données. Dans cette fonction, on va généralement appeler une API pour envoyer les données, gérer le chargement, et afficher des messages de succès ou d'erreur. N'oubliez pas de désactiver le bouton de soumission pendant le chargement pour éviter les doubles soumissions.",
    "note": "Gérer l'état de chargement est essentiel pour une bonne UX mobile."

  {
    "titre": "Formulaire d'inscription complet",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:8px; overflow-x:auto;'><pre style='margin:0; font-size:0.75rem;'>export const registerSchema = z.object({\n  name: z.string().min(2, 'Nom requis'),\n  email: z.string().email('Email invalide'),\n  password: z.string().min(8, '8 caractères minimum')\n    .regex(/[A-Z]/, 'Une majuscule')\n    .regex(/[0-9]/, 'Un chiffre'),\n  confirmPassword: z.string()\n}).refine((data) => data.password === data.confirmPassword, {\n  message: 'Les mots de passe ne correspondent pas',\n  path: ['confirmPassword'],\n});</pre></div><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>🔒 Password</strong> : Validation complexe</p></div><div style='background:#f1f5f9; padding:0.5rem; border-radius:4px;'><p style='margin:0; font-size:0.85rem;'><strong>✅ Confirm</strong> : Validation croisée</p></div></div></div>",
    "texteParle": "Pour un formulaire d'inscription, le schéma Zod est un peu plus complexe. On doit valider le nom, l'email, le mot de passe avec des règles de complexité, et la confirmation du mot de passe. Pour valider que les deux mots de passe sont identiques, on utilise la méthode 'refine' de Zod qui permet de faire des validations croisées. On peut aussi définir le chemin de l'erreur pour qu'elle s'affiche sous le bon champ.",
    "note": "La validation des mots de passe est cruciale pour la sécurité de l'application."

  {
    "titre": "Validation en temps réel",
    "contenu": "<div style='display:flex; flex-direction:column; gap:1rem;'><div style='display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;'><div style='background:#f8fafc; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0; color:#2563eb;'>⚡ Mode de validation</h4><div style='background:#1e293b; color:#e2e8f0; padding:0.5rem; border-radius:4px; font-size:0.8rem;'><pre style='margin:0;'>useForm({\n  mode: 'onChange', // ou 'onBlur', 'onSubmit'\n  reValidateMode: 'onChange',\n})</pre></div></div><div style='background:#f8fafc; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0; color:#2563eb;'>📱 Recommandé</h4><ul style='font-size:0.85rem;'><li><strong>onBlur</strong> : Valide quand on quitte le champ</li><li>UX plus fluide</li><li>Évite les erreurs agressives</li></ul></div></div><div style='background:#dbeafe; padding:0.75rem; border-radius:4px;'><p style='margin:0; font-size:0.9rem;'><strong>💡 Astuce :</strong> Pour les mots de passe, utilisez <code>mode: 'onChange'</code> pour un retour immédiat sur la complexité.</p></div></div>",
    "texteParle": "React Hook Form permet de choisir quand la validation est déclenchée. On peut valider à la soumission, au changement, ou au moment où l'utilisateur quitte le champ. Sur mobile, je recommande d'utiliser le mode 'onBlur' pour la plupart des champs, car cela donne un retour d'information sans être trop agressif. Pour les mots de passe, on peut utiliser 'onChange' pour donner un retour immédiat sur la complexité. Cela améliore considérablement l'expérience utilisateur.",
    "note": "Le mode de validation influence la perception de fluidité du formulaire."

  {

    "contenu": "<div style='display:grid; grid-template-columns:1fr 1fr; gap:1rem; padding:0.5rem;'><div style='background:#f1f5f9; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0;'>📱 Clavier mobile</h4><ul style='font-size:0.85rem;'><li><code>keyboardType=\"email-address\"</code></li><li><code>secureTextEntry</code> pour les mots de passe</li><li><code>autoCapitalize=\"none\"</code> pour les emails</li><li><code>returnKeyType=\"done\"</code></li></ul></div><div style='background:#f1f5f9; padding:0.8rem; border-radius:8px;'><h4 style='margin-top:0;'>🎯 Ergonomie</h4><ul style='font-size:0.85rem;'><li>Boutons assez grands (min 44x44px)</li><li>Messages d'erreur visibles</li><li>Scroll si le formulaire est long</li><li>Indicateur de progression</li></ul></div></div><div style='background:#f0fdf4; padding:0.75rem; border-radius:4px; border-left:4px solid #22c55e;'><p style='margin:0; font-size:0.9rem;'><strong>✅ Conseil :</strong> Testez toujours vos formulaires sur un vrai appareil, pas seulement sur simulateur.</p></div>",
    "texteParle": "Pour finir, quelques bonnes pratiques spécifiques aux formulaires mobiles. D'abord, configurez correctement le clavier : pour un email, utilisez keyboardType 'email-address' qui affiche un clavier avec le @. Pour les mots de passe, utilisez secureTextEntry pour masquer les caractères. Les boutons doivent être assez grands pour être tapotés facilement, au moins 44 pixels. Et n'oubliez pas de tester vos formulaires sur de vrais appareils, car l'expérience au doigt est différente de celle au clavier.",

    "texteParle": "Pour résumer, nous avons vu comment créer des formulaires sécurisés et performants dans React Native avec React Hook Form et Zod. Nous avons appris à définir des schémas de validation, à configurer le formulaire, à gérer les champs et les erreurs, et à soumettre les données. Pour le TP, je vous demande d'installer ces bibliothèques et de créer les formulaires de connexion et d'inscription pour notre application e-commerce. N'oubliez pas les bonnes pratiques mobiles.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
