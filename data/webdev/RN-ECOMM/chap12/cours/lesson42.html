<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>

    <!-- jQuery -->

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Localisation et cartes",
    "contenu": "<h2 style='color: #2c3e50; text-align: center;'>Utiliser la localisation et les cartes</h2><p style='text-align: center;'>Intégrer la géolocalisation pour améliorer l'expérience de livraison et permettre aux utilisateurs de trouver des magasins proches.</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #3498db;'><h3 style='color: #2c3e50; margin-top: 0;'>🎯 Objectifs de la leçon :</h3><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 8px;'>✅ Installer expo-location pour obtenir la position</li><li style='margin-bottom: 8px;'>✅ Utiliser la position pour estimer la livraison</li><li style='margin-bottom: 8px;'>✅ Afficher les magasins proches avec React Native Maps</li></ul></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons intégrer la géolocalisation dans notre application e-commerce. C'est une fonctionnalité très utile pour améliorer l'expérience de livraison. Par exemple, nous pouvons estimer les frais de livraison en fonction de la distance entre l'entrepôt et l'utilisateur, ou proposer des options de livraison plus rapides. Nous pouvons aussi afficher les magasins physiques proches de l'utilisateur. Pour cela, nous allons utiliser deux bibliothèques principales : expo-location pour obtenir la position de l'utilisateur, et react-native-maps pour afficher des cartes interactives.",
    "note": "La géolocalisation est un atout majeur pour les applications e-commerce modernes."
  },
  {
    "titre": "Installation des dépendances",
    "contenu": "<h3 style='color: #2c3e50;'>Préparer les packages</h3><p>Nous installons les bibliothèques nécessaires pour la localisation et les cartes.</p><div style='background-color: #f0f7f0; padding: 15px; border-radius: 8px; border: 1px solid #bdc3c7; margin: 15px 0;'><h4 style='margin-top: 0;'>📦 Installation :</h4><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>npx expo install expo-location\nnpx expo install react-native-maps</code></pre></div><p><strong>Configuration pour iOS :</strong></p><ul><li>Ajouter la permission NSLocationWhenInUseUsageDescription dans <code>app.json</code></li><li>Ajouter la permission NSLocationAlwaysUsageDescription</li></ul><p><strong>Configuration pour Android :</strong></p><ul><li>Ajouter la permission ACCESS_FINE_LOCATION dans <code>AndroidManifest.xml</code></li><li>Ajouter la permission ACCESS_COARSE_LOCATION</li></ul><div style='background-color: #fdf2f2; padding: 15px; border-radius: 8px; border: 1px solid #f5c6cb; margin: 15px 0;'><p style='margin: 0; color: #721c24;'><strong>⚠️ Important :</strong> Sur iOS, il est obligatoire d'ajouter une justification pour l'utilisation de la localisation dans le fichier app.json.</p></div>",
    "texteParle": "Pour utiliser la géolocalisation, nous devons installer deux packages principaux. expo-location nous permet d'obtenir la position de l'utilisateur, que ce soit en une fois ou en continu. react-native-maps nous permet d'afficher des cartes interactives avec des marqueurs. Sur iOS, nous devons ajouter des permissions dans le fichier app.json : NSLocationWhenInUseUsageDescription pour demander l'accès à la localisation pendant l'utilisation de l'application, et éventuellement NSLocationAlwaysUsageDescription pour un accès en arrière-plan. Sur Android, les permissions sont ajoutées dans le fichier AndroidManifest.xml. Il est important de bien configurer ces permissions pour que l'application puisse accéder à la localisation de l'utilisateur.",
    "note": "Les permissions de localisation sont obligatoires sur les deux plateformes."
  },
  {
    "titre": "Obtenir la position",
    "contenu": "<h3 style='color: #2c3e50;'>Récupérer la localisation</h3><p>Nous utilisons expo-location pour demander et obtenir la position de l'utilisateur.</p><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 15px 0;'><h4 style='margin-top: 0;'>📁 hooks/useLocation.ts</h4><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>import * as Location from 'expo-location'\nimport { useState, useEffect } from 'react'\n\nexport const useLocation = () => {\n  const [location, setLocation] = useState(null)\n  const [errorMsg, setErrorMsg] = useState(null)\n  const [loading, setLoading] = useState(true)\n\n  useEffect(() => {\n    const getLocation = async () => {\n      try {\n        // 1. Demander les permissions\n        const { status } = await Location.requestForegroundPermissionsAsync()\n        if (status !== 'granted') {\n          setErrorMsg('Permission de localisation refusée')\n          setLoading(false)\n          return\n        }\n\n        // 2. Obtenir la position actuelle\n        const currentLocation = await Location.getCurrentPositionAsync({\n          accuracy: Location.Accuracy.High,\n        })\n        setLocation(currentLocation)\n      } catch (error) {\n        setErrorMsg(error.message)\n      } finally {\n        setLoading(false)\n      }\n    }\n\n    getLocation()\n  }, [])\n\n  return { location, errorMsg, loading }\n}</code></pre></div>",
    "texteParle": "Pour obtenir la position de l'utilisateur, nous créons un hook personnalisé useLocation. Ce hook gère tout le processus. D'abord, nous demandons les permissions avec requestForegroundPermissionsAsync. Si l'utilisateur refuse, nous stockons un message d'erreur. Ensuite, nous utilisons getCurrentPositionAsync pour obtenir la position actuelle avec une haute précision. Nous stockons la position dans un état et nous la retournons, avec les informations d'erreur et de chargement. Ce hook peut être réutilisé dans n'importe quel écran de l'application. Nous utilisons également une option pour suivre la position en temps réel si nécessaire, par exemple pour les livraisons.",
    "note": "Demandez toujours les permissions avant d'accéder à la localisation."
  },
  {
    "titre": "Affichage de la carte",
    "contenu": "<h3 style='color: #2c3e50;'>Intégrer React Native Maps</h3><p>Nous utilisons MapView pour afficher une carte interactive.</p><div style='background-color: #f0f7f0; padding: 15px; border-radius: 8px; border: 1px solid #bdc3c7; margin: 15px 0;'><h4 style='margin-top: 0;'>📁 components/MapView.tsx</h4><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>import MapView, { Marker, PROVIDER_GOOGLE } from 'react-native-maps'\nimport { View, StyleSheet } from 'react-native'\n\nexport const LocationMap = ({ location, stores }) => {\n  if (!location) return null\n\n  const initialRegion = {\n    latitude: location.coords.latitude,\n    longitude: location.coords.longitude,\n    latitudeDelta: 0.05,\n    longitudeDelta: 0.05,\n  }\n\n  return (\n    &lt;View style={styles.container}&gt;\n      &lt;MapView\n        style={styles.map}\n        provider={PROVIDER_GOOGLE}\n        initialRegion={initialRegion}\n        showsUserLocation={true}\n        showsMyLocationButton={true}\n      &gt;\n        &lt;Marker\n          coordinate={{\n            latitude: location.coords.latitude,\n            longitude: location.coords.longitude,\n          }}\n          title=\"Ma position\"\n          pinColor=\"#e74c3c\"\n        /&gt;\n        {stores.map((store) => (\n          &lt;Marker\n            key={store.id}\n            coordinate={{\n              latitude: store.latitude,\n              longitude: store.longitude,\n            }}\n            title={store.name}\n            description={store.address}\n          /&gt;\n        ))}\n      &lt;/MapView&gt;\n    &lt;/View&gt;\n  )\n}</code></pre></div>",
    "texteParle": "React Native Maps nous permet d'afficher une carte interactive. Nous utilisons le composant MapView qui représente la carte elle-même. Nous pouvons choisir le fournisseur de cartes, par exemple Google Maps avec PROVIDER_GOOGLE. La région initiale est définie par la position de l'utilisateur. Nous activons showsUserLocation pour afficher un point bleu indiquant la position de l'utilisateur sur la carte, et showsMyLocationButton pour ajouter un bouton qui recentre la carte sur la position. Ensuite, nous ajoutons des marqueurs avec le composant Marker. Un marqueur rouge pour la position de l'utilisateur, et des marqueurs pour les magasins proches avec leurs noms et adresses.",
    "note": "Sur Android, il est recommandé d'utiliser PROVIDER_GOOGLE pour de meilleures performances."

  {
    "titre": "Estimer les frais de livraison",
    "contenu": "<h3 style='color: #2c3e50;'>Calculer la distance</h3><p>Nous utilisons la distance entre l'utilisateur et l'entrepôt pour estimer les frais de livraison.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📐 Formule de Haversine :</h4><div class='math-block'><div class='math'>$$ d = 2r \\cdot \\arcsin\\left(\\sqrt{\\sin^2\\left(\\frac{\\Delta\\phi}{2}\\right) + \\cos(\\phi_1) \\cdot \\cos(\\phi_2) \\cdot \\sin^2\\left(\\frac{\\Delta\\lambda}{2}\\right)}\\right) $$</div></div><p style='font-size: 0.9em; margin-top: 10px;'>Où <em>r</em> est le rayon de la Terre (6371 km).</p></div><div style='flex: 1; min-width: 200px; background-color: #e8f8f5; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #1abc9c;'>📝 Code de calcul :</h4><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>const calculateDistance = (lat1, lon1, lat2, lon2) => {\n  const R = 6371 // km\n  const dLat = (lat2 - lat1) * Math.PI / 180\n  const dLon = (lon2 - lon1) * Math.PI / 180\n  const a = Math.sin(dLat/2) ** 2 +\n    Math.cos(lat1 * Math.PI / 180) *\n    Math.cos(lat2 * Math.PI / 180) *\n    Math.sin(dLon/2) ** 2\n  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))\n  return R * c\n}</code></pre></div></div><p><strong>Estimation des frais :</strong></p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>const getShippingCost = (distance) => {\n  if (distance <= 5) return 1000\n  if (distance <= 20) return 2500\n  if (distance <= 50) return 5000\n  return 10000\n}</code></pre>",
    "texteParle": "Une fois que nous avons la position de l'utilisateur, nous pouvons calculer la distance entre lui et notre entrepôt ou nos points de livraison. Pour cela, nous utilisons la formule de Haversine qui calcule la distance entre deux points sur une sphère. Cette formule prend en compte la latitude et la longitude des deux points et retourne la distance en kilomètres. Ensuite, nous définissons une grille tarifaire en fonction de la distance. Par exemple, moins de 5 kilomètres, les frais de livraison sont de 1000 FCFA. Entre 5 et 20 kilomètres, 2500 FCFA. Au-delà de 50 kilomètres, 10000 FCFA. Cette information est affichée à l'utilisateur lors du checkout.",
    "note": "La distance est un facteur clé pour calculer les frais de livraison."
  },
  {
    "titre": "Trouver les magasins proches",
    "contenu": "<h3 style='color: #2c3e50;'>Afficher les points de vente</h3><p>Nous utilisons la position pour trouver et afficher les magasins à proximité.</p><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 15px 0;'><h4 style='margin-top: 0;'>📁 services/storeService.ts</h4><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>export const storeService = {\n  getNearbyStores: async (latitude, longitude, radius = 10) => {\n    const response = await api.get('/stores/nearby', {\n      params: { latitude, longitude, radius }\n    })\n    return response.data // Liste des magasins avec distance\n  },\n\n  // Alternative : calcul côté client\n  getStoresWithDistance: (stores, userLat, userLng) => {\n    return stores.map(store => ({\n      ...store,\n      distance: calculateDistance(\n        userLat, userLng,\n        store.latitude, store.longitude\n      )\n    })).sort((a, b) => a.distance - b.distance)\n  }\n}</code></pre></div><p><strong>Affichage dans la carte :</strong></p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>const NearbyStores = ({ location }) => {\n  const { data: stores } = useQuery({\n    queryKey: ['stores', location],\n    queryFn: () => storeService.getNearbyStores(\n      location.coords.latitude,\n      location.coords.longitude\n    ),\n    enabled: !!location\n  })\n\n  return &lt;LocationMap location={location} stores={stores} /&gt;\n}</code></pre>",
    "texteParle": "Pour afficher les magasins proches de l'utilisateur, nous créons un service qui interroge l'API avec les coordonnées de l'utilisateur et un rayon de recherche, par exemple 10 kilomètres. L'API retourne la liste des magasins avec leur distance calculée. Nous pouvons aussi effectuer le calcul côté client si nous avons déjà la liste complète des magasins. Dans les deux cas, nous utilisons la fonction calculateDistance pour trier les magasins par distance. Ensuite, nous affichons ces magasins sur la carte avec des marqueurs personnalisés. L'utilisateur peut ainsi visualiser où se trouvent les magasins et choisir le plus proche pour un retrait en magasin.",
    "note": "Afficher les magasins proches encourage les utilisateurs à venir en boutique."

  {
    "titre": "Suivi de livraison en temps réel",
    "contenu": "<h3 style='color: #2c3e50;'>Tracker la commande</h3><p>Nous pouvons utiliser la position du livreur pour montrer l'avancement de la livraison.</p><div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'><div style='flex: 1; min-width: 200px; background-color: #fef9e7; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #d4ac0d;'>📱 Fonctionnalités :</h4><ul><li>Position du livreur en temps réel</li><li>Estimation du temps d'arrivée</li><li>Notification quand le livreur approche</li><li>Historique du parcours</li></ul></div><div style='flex: 1; min-width: 200px; background-color: #e8f4fd; padding: 15px; border-radius: 8px;'><h4 style='margin-top: 0; color: #2980b9;'>📝 Code de suivi :</h4><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 6px; overflow-x: auto;'><code>// Suivre la position du livreur\nconst useDeliveryTracking = (orderId) => {\n  const [deliveryLocation, setDeliveryLocation] = useState(null)\n\n  useEffect(() => {\n    const subscription = Location.watchPositionAsync(\n      { accuracy: Location.Accuracy.High },\n      (location) => {\n        // Mettre à jour la position sur la carte\n        setDeliveryLocation(location)\n        // Mettre à jour dans le backend\n        updateDeliveryPosition(orderId, location)\n      }\n    )\n    return () => subscription.remove()\n  }, [orderId])\n\n  return deliveryLocation\n}</code></pre></div></div>",
    "texteParle": "Une fonctionnalité avancée est le suivi de livraison en temps réel. Nous pouvons utiliser watchPositionAsync pour suivre la position du livreur en continu. Chaque fois que la position change, nous mettons à jour la position sur la carte pour que l'utilisateur puisse voir où se trouve le livreur. Nous pouvons aussi estimer le temps d'arrivée en calculant la distance restante et en utilisant la vitesse moyenne du livreur. Lorsque le livreur approche de la destination, nous pouvons envoyer une notification push à l'utilisateur pour l'informer. Cette fonctionnalité offre une transparence totale et rassure l'utilisateur sur l'avancement de sa commande.",

  {
    "titre": "Gestion des permissions",
    "contenu": "<h3 style='color: #2c3e50;'>Demander et gérer les permissions</h3><p>Il est important de gérer correctement les permissions de localisation.</p><div style='background-color: #fdf2f2; padding: 15px; border-radius: 8px; border: 1px solid #f5c6cb; margin: 15px 0;'><h4 style='margin-top: 0; color: #721c24;'>🔴 Cas à gérer :</h4><ul><li><strong>Permission accordée</strong> : Accéder à la position</li><li><strong>Permission refusée</strong> : Expliquer pourquoi c'est utile et redemander</li><li><strong>Permission refusée définitivement</strong> : Rediriger vers les paramètres</li><li><strong>GPS désactivé</strong> : Demander d'activer la localisation</li></ul></div><p><strong>Exemple de gestion :</strong></p><pre style='background-color: #2c3e50; color: #ecf0f1; padding: 12px; border-radius: 6px; overflow-x: auto;'><code>const askLocationPermission = async () => {\n  const { status } = await Location.requestForegroundPermissionsAsync()\n  \n  if (status === 'granted') {\n    // Accès autorisé\n    return true\n  }\n  \n  if (status === 'denied') {\n    // Afficher une explication\n    Alert.alert(\n      'Localisation nécessaire',\n      'La localisation nous permet de vous proposer des options de livraison adaptées.',\n      [\n        { text: 'Ouvrir les paramètres', onPress: openSettings },\n        { text: 'Annuler', style: 'cancel' }\n      ]\n    )\n    return false\n  }\n  \n  return false\n}</code></pre>",
    "texteParle": "La gestion des permissions est un aspect important de la géolocalisation. Sur mobile, l'utilisateur peut accorder ou refuser l'accès à sa localisation. Nous devons gérer les différents cas. Si la permission est accordée, nous accédons à la position. Si elle est refusée, nous affichons une explication claire de pourquoi nous avons besoin de la localisation, avec un bouton pour redemander. Si l'utilisateur a refusé définitivement, nous pouvons le rediriger vers les paramètres de l'application pour qu'il active manuellement la permission. Nous devons aussi gérer le cas où le GPS est désactivé. Une bonne gestion des permissions améliore l'expérience utilisateur et évite les frustrations.",

    "contenu": "<h3 style='color: #2c3e50;'>Points clés à retenir</h3><ul style='list-style-type: none; padding-left: 0;'><li style='margin-bottom: 12px; padding: 10px; background-color: #f8f9fa; border-radius: 6px; border-left: 4px solid #3498db;'><strong>📍 expo-location</strong> : Pour obtenir et suivre la position de l'utilisateur</li><li style='margin-bottom: 12px; padding: 10px; background-color: #f8f9fa; border-radius: 6px; border-left: 4px solid #2ecc71;'><strong>🗺️ react-native-maps</strong> : Pour afficher des cartes interactives</li><li style='margin-bottom: 12px; padding: 10px; background-color: #f8f9fa; border-radius: 6px; border-left: 4px solid #e67e22;'><strong>📐 Formule de Haversine</strong> : Calculer la distance entre deux points géographiques</li><li style='margin-bottom: 12px; padding: 10px; background-color: #f8f9fa; border-radius: 6px; border-left: 4px solid #e74c3c;'><strong>🔐 Permissions</strong> : Gérer tous les cas (accordée, refusée, définitivement refusée)</li><li style='margin-bottom: 12px; padding: 10px; background-color: #f8f9fa; border-radius: 6px; border-left: 4px solid #9b59b6;'><strong>📦 Suivi en temps réel</strong> : watchPositionAsync pour suivre les livreurs</li></ul><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin-top: 15px;'><h4 style='margin-top: 0;'>🚀 Prochaine étape :</h4><p>Nous allons ajouter le partage de produits avec expo-sharing.</p></div>",
    "texteParle": "Pour conclure cette leçon sur la localisation et les cartes, retenez ces points essentiels. expo-location est la bibliothèque à utiliser pour obtenir et suivre la position de l'utilisateur. react-native-maps permet d'afficher des cartes interactives avec des marqueurs. La formule de Haversine est utilisée pour calculer la distance entre deux points géographiques. La gestion des permissions doit être soigneuse pour couvrir tous les cas. Et le suivi en temps réel avec watchPositionAsync est idéal pour les livraisons. Dans la prochaine leçon, nous verrons comment permettre aux utilisateurs de partager des produits avec expo-sharing.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';

            note.style.color = '#2c3e50';

        document.querySelectorAll('.math-block').forEach(block => {

            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
