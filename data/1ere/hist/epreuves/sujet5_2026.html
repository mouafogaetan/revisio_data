<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Première",
  "sequence": "Séquence 5 : Évaluation bilan (Chapitres 1 à 5)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La Renaissance et l'industrialisation (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la Renaissance et les révolutions industrielles. Réponds-y en t'aidant de tes connaissances.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Définis</span> la <strong>Renaissance</strong> en citant deux de ses facteurs.</p>",
          "reponse": "<p>La Renaissance est une période de <strong>renouveau culturel, scientifique et artistique</strong> en Europe, qui débute en Italie au XVIe siècle. Deux facteurs sont : la redécouverte des textes de l'Antiquité et l'affaiblissement du contrôle de l'Église sur les idées.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> une innovation majeure de la <strong>Première Révolution industrielle</strong> (fin XVIIIe - milieu XIXe siècle).</p>",
          "reponse": "<p>La <strong>machine à vapeur</strong> inventée par James Watt est l'innovation clé de la Première Révolution industrielle. Elle utilise le <strong>charbon</strong> comme source d'énergie et transforme des secteurs comme le <strong>textile</strong> et la métallurgie.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Cite</span> une innovation de la <strong>Deuxième Révolution industrielle</strong> (à partir de 1880) dans le domaine des <strong>transports</strong> et une dans le domaine de la <strong>chimie</strong>.</p>",
          "reponse": "<p>- Transports : le <strong>moteur Diesel</strong> (1893) ou la <strong>locomotive électrique</strong> (1879).<br>- Chimie : l'<strong>aspirine</strong> (1899) ou la <strong>dynamite</strong> (1867).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'impérialisme et la Conférence de Berlin (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur l'impérialisme européen et la Conférence de Berlin.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Définis</span> l'<strong>impérialisme</strong>.</p>",
          "reponse": "<p>L'impérialisme est la <strong>domination politique, économique et culturelle</strong> d'un pays puissant sur un pays plus faible ou sur un territoire.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Cite</span> deux fondements <strong>économiques</strong> de l'impérialisme européen en Afrique.</p>",
          "reponse": "<p>- La <strong>recherche de matières premières</strong> (caoutchouc, huile de palme, ivoire).<br>- La recherche de <strong>débouchés</strong> pour les produits manufacturés européens.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le rôle de la <strong>Conférence de Berlin (1884-1885)</strong> dans le partage de l'Afrique. Qu'est-ce que le principe de l'<strong>occupation effective</strong> ?</p>",
          "reponse": "<p>La Conférence de Berlin a organisé le <strong>partage de l'Afrique</strong> entre les puissances européennes. Le principe de l'<strong>occupation effective</strong> stipulait qu'une puissance devait occuper réellement un territoire pour en revendiquer la possession, ce qui a accéléré la conquête coloniale.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les conquêtes coloniales et les résistances (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les conquêtes coloniales en Afrique et les résistances africaines.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> la <strong>stratégie anglaise</strong> en Afrique.</p>",
          "reponse": "<p>La stratégie anglaise était de relier <strong>le Cap (Afrique du Sud) au Caire (Égypte)</strong> pour contrôler une bande continue de territoires, ce qu'on appelle la <strong>stratégie du Cap au Caire</strong>.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Décris</span> la <strong>résistance de Samory Touré</strong> contre les Français.</p>",
          "reponse": "<p>Samory Touré (1830-1900) a résisté aux Français à partir de 1881. Il a construit un <strong>empire</strong> s'étendant du Libéria au Fouta, avec une armée de 35 000 hommes (les <strong>sofas</strong>). Il a signé un traité avec la France en 1886 avant de poursuivre la résistance.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Identifie</span> une résistance <strong>au Cameroun</strong> contre les Allemands.</p>",
          "reponse": "<p>La <strong>résistance des Douala</strong> a eu lieu en décembre 1884 avec le bonbarnement de Bonabéri et la destruction du quartier Joss. D'autres résistances incluent celles des <strong>Bakwéri</strong>, des <strong>Bassa</strong>, des <strong>Bamoun</strong> et des <strong>Foulbé</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : L'impérialisme en Asie (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur l'impérialisme en Asie.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Définis</span> ce qu'est un <strong>traité inégal</strong> en Chine au XIXe siècle.</p>",
          "reponse": "<p>Un <strong>traité inégal</strong> est un accord imposé par une puissance étrangère à la Chine après une défaite militaire. Il contient des clauses désavantageuses pour la Chine, comme l'ouverture de ports, des indemnités et la perte de souveraineté.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Cite</span> une clause du <strong>traité de Nankin (1842)</strong>.</p>",
          "reponse": "<p>Le traité de Nankin impose à la Chine l'<strong>ouverture de 5 ports</strong> au commerce britannique et la <strong>cession de Hong Kong</strong> à la Grande-Bretagne.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le système du <strong>Raj britannique</strong> en Inde.</p>",
          "reponse": "<p>Le <strong>Raj britannique</strong> est le régime de domination de la <strong>Couronne britannique</strong> sur l'Inde à partir de 1858, après la révolte des Cipayes. Il a duré jusqu'à l'indépendance en 1947.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : La Première Guerre mondiale (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la Première Guerre mondiale.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Identifie</span> la <strong>cause immédiate</strong> de la Première Guerre mondiale.</p>",
          "reponse": "<p>La cause immédiate est l'<strong>assassinat de l'archiduc François-Ferdinand</strong>, héritier d'Autriche-Hongrie, le 28 juin 1914 à Sarajevo par <strong>Gavrilo Princip</strong>.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> le <strong>rôle des colonies africaines</strong> dans l'effort de guerre.</p>",
          "reponse": "<p>Les colonies ont fourni des <strong>soldats</strong> (tirailleurs sénégalais) et des <strong>matériaux</strong> pour l'effort de guerre. Les combats ont aussi eu lieu en Afrique, notamment au <strong>Cameroun</strong> (1914-1916).</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le sort des <strong>colonies allemandes</strong> après le traité de Versailles (1919).</p>",
          "reponse": "<p>Les colonies allemandes sont devenues des <strong>mandats</strong> de la Société des Nations (SDN), confiés à la France et à l'Angleterre. Le <strong>Cameroun</strong> et le <strong>Togo</strong> ont été partagés entre la France et l'Angleterre.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Synthèse - Le Cameroun de la fin du XVIe siècle au début du XXe siècle (6 pts)",
      "points": "6 pts",
      "enonce": "<p>Consigne : Rédige un paragraphe construit sur le sujet suivant : <strong>« Le Cameroun, de l'espace précolonial au mandat franco-britannique »</strong>.</p>",
      "questions": [
        {
          "question": "<p>Rédige ton développement.</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> Le Cameroun précolonial est un espace en construction marqué par des <strong>migrations</strong> (Peuls, Bamiléké, Douala) et la <strong>formation d'entités politiques</strong> comme le Royaume Bamoun, les lamidats du Nord et les chefferies bamiléké. Au XIXe siècle, les Européens convoitent le Cameroun pour ses ressources. En 1884, les Allemands signent un <strong>traité avec les Douala</strong> et établissent leur colonie. Après la Première Guerre mondiale, la défaite allemande entraîne le <strong>partage du Cameroun</strong> entre la France (Cameroun oriental) et l'Angleterre (Cameroun occidental) sous forme de <strong>mandats de la SDN</strong>. Ce partage a des conséquences durables : division linguistique (français/anglais), systèmes administratifs différents et difficultés de réunification après l'indépendance.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
