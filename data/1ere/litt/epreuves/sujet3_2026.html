<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Littérature",
 "classe": "Première",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Contraction de texte et discussion",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1.05em; line-height: 1.7; padding: 5px;'><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; color: #222; margin-bottom: 15px;'><h3 style='margin-top: 0;'>Texte : Les images de violence</h3><p style='font-style: italic;'>La fréquence des images de violence au cinéma et sur les écrans de télévision encourage les accès de violence intempestifs et, en même temps, augmente la peur de violence, sans aider le spectateur à comprendre les mécanismes de la violence réelle. Pourtant, certains réalisateurs défendent leur art en affirmant que montrer la violence, c'est la dénoncer. Mais cette justification est-elle toujours valable ?</p><p>Face à cette question, il est légitime de s'interroger sur le rôle des médias et de l'art dans la représentation de la violence. Les images violentes, en se banalisant, peuvent-elles perdre leur pouvoir de choquer et devenir un simple divertissement ? La responsabilité des créateurs et des diffuseurs est engagée, tout comme celle du public qui consomme ces images sans toujours en mesurer les effets.</p><p>Dans un monde où l'information circule en continu, la violence spectacle semble avoir pris le pas sur la violence réelle, comme si les écrans créaient une distance protectrice qui permet d'assister impuissant aux tragédies du monde. Mais cette distance n'est-elle pas une illusion ? Ne risquons-nous pas, à force de voir, de devenir indifférents ?</p></div><p style='font-weight: bold;'>1) Contraction de texte (5 pts)</p><p>Rédigez un résumé de ce texte en <strong>100 mots</strong> (marge de ± 10 %). Vous indiquerez le nombre exact de mots à la fin de votre résumé.</p><p style='font-weight: bold;'>2) Discussion (5 pts)</p><p>Selon vous, l'art et les médias doivent-ils montrer la violence pour mieux la dénoncer, ou au contraire, doivent-ils s'en abstenir pour éviter de la banaliser ? Vous répondrez à cette question dans un développement argumenté et structuré d'environ <strong>250 mots</strong>.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p><strong>1) Contraction de texte (5 pts)</strong></p><p>Rédigez un résumé du texte proposé en <strong>100 mots</strong> (marge de ± 10 %). Vous indiquerez le nombre exact de mots à la fin de votre résumé.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 12px; border-radius: 8px; color: #1e4620;'><p><strong>Résumé :</strong></p><p>La violence à l'écran est accusée d'encourager les comportements agressifs et d'accroître la peur, sans aider à comprendre la violence réelle. Les réalisateurs justifient leur démarche par une volonté de dénonciation. Cependant, cette position interroge : les images violentes, devenues banales, perdent-elles leur pouvoir de choc ? La responsabilité des créateurs, des diffuseurs et du public est en jeu. Dans notre société médiatisée, la violence spectacle semble prendre le pas sur la réalité, créant une illusion de distance qui pourrait conduire à l'indifférence. (102 mots)</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p><strong>2) Discussion (5 pts)</strong></p><p>Selon vous, l'art et les médias doivent-ils montrer la violence pour mieux la dénoncer, ou au contraire, doivent-ils s'en abstenir pour éviter de la banaliser ? Vous répondrez à cette question dans un développement argumenté et structuré d'environ <strong>250 mots</strong>.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e3f2fd; padding: 12px; border-radius: 8px; color: #0d47a1;'><p><strong>Éléments de correction :</strong></p><p><strong>Introduction :</strong> La question de la représentation de la violence dans l'art et les médias est ancienne. Elle oppose deux conceptions : celle qui voit dans la monstration une dénonciation et celle qui y voit une banalisation dangereuse.</p><p><strong>Arguments possibles :</strong></p><ul><li><strong>Pour la monstration :</strong> L'art a un rôle critique et peut dénoncer les violences en les montrant (Goya, Picasso, cinéma engagé). Montrer, c'est alerter et susciter une prise de conscience.</li><li><strong>Contre la monstration :</strong> La répétition des images violentes risque de les banaliser. Le spectateur s'habitue et devient insensible. La violence spectacle l'emporte sur la réalité.</li><li><strong>Position nuancée :</strong> Tout dépend du contexte, de l'intention de l'artiste et du regard du spectateur. L'éducation aux médias est essentielle pour permettre un regard critique.</li></ul><p><strong>Conclusion :</strong> Il ne s'agit pas d'interdire, mais de responsabiliser et de former le public.</p></div>"
       }
     ]
   },
   {
     "titre": "Dissertation littéraire",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1.05em; line-height: 1.7; padding: 5px;'><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; color: #222; margin-bottom: 15px;'><p><strong>Eugène Ionesco a déclaré :</strong></p><p style='font-style: italic;'>« Apporter un message aux hommes, vouloir diriger le cours du monde ou le sauver, c’est l’affaire des fondateurs de religions, des moralistes, des hommes politiques… Une œuvre d’art n’a rien à voir avec les doctrines ». </p></div><p style='font-weight: bold;'>Sujet :</p><p>En vous référant à des œuvres littéraires que vous connaissez, vous vous interrogerez sur la pertinence de cette affirmation. L'œuvre d'art, et particulièrement l'œuvre littéraire, est-elle selon vous indifférente aux doctrines et aux messages ?</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p><strong>Consigne :</strong> Vous répondrez à cette question par une dissertation structurée. Votre devoir comprendra une introduction, un développement en deux ou trois parties et une conclusion.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #fff3e0; padding: 12px; border-radius: 8px; color: #4e342e;'><p><strong>Éléments de correction :</strong></p><p><strong>Introduction :</strong> La citation d'Ionesco pose un débat fondamental sur la nature de l'art et ses rapports avec les idéologies. Elle invite à s'interroger sur l'autonomie de l'œuvre d'art par rapport à tout message ou doctrine. Cette question revient à se demander si l'écrivain doit être un artiste pur ou un intellectuel engagé.</p><p><strong>Plan possible :</strong></p><p><strong>I. L'art pour l'art : une œuvre indifférente aux doctrines</strong></p><ul><li>L'écrivain peut privilégier la beauté formelle et l'exploration esthétique (le Parnasse, Gautier).</li><li>La littérature peut se concevoir comme un jeu, une réflexion sur le langage (OULIPO, Perec).</li></ul><p><strong>II. L'art comme engagement : une œuvre qui porte un message</strong></p><ul><li>L'écrivain engagé prend position contre les injustices (Sartre, Camus).</li><li>Le roman peut être un miroir de la société, une critique des mœurs (Zola, Orwell).</li></ul><p><strong>III. Une position nuancée : l'art est plus qu'un message, mais il n'y est pas indifférent</strong></p><ul><li>Une œuvre peut être porteuse d'un message sans être une simple thèse (Kafka, la poésie).</li><li>C'est le lecteur qui construit le sens de l'œuvre.</li></ul><p><strong>Conclusion :</strong> Une œuvre d'art, par sa complexité, dépasse les doctrines tout en pouvant les interroger, car elle met en jeu l'humain dans toute sa richesse.</p></div>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
