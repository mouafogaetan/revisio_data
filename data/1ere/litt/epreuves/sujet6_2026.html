<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Épreuve</title>

    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],

            },

            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }

    </script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>

            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>

        </div>

                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>

                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Littérature",
  "classe": "Première",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Contraction de texte",
      "points": "10 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p><strong>Consigne :</strong> Vous ferez de ce texte un r\u00E9sum\u00E9 de <strong>120 mots</strong> (+/- 10 %). Vous indiquerez le nombre de mots \u00E0 la fin de votre travail.</p><p><em>« La litt\u00E9rature, depuis ses origines, n'a cess\u00E9 d'interroger le monde et de tenter de donner un sens \u00E0 l'existence humaine. Elle est ce miroir tendu \u00E0 la soci\u00E9t\u00E9 qui lui permet de se voir, de se comprendre et, parfois, de se transformer. L'\u00E9crivain, en cela, occupe une place singuli\u00E8re : il est \u00E0 la fois t\u00E9moin de son temps et cr\u00E9ateur d'univers nouveaux. Par le pouvoir des mots, il d\u00E9nonce les injustices, c\u00E9l\u00E8bre la beaut\u00E9 du monde ou explore les abysses de l'\u00E2me humaine.</em></p><p><em>Mais quelle est la v\u00E9ritable mission de l'\u00E9crivain ? Doit-il se faire le porte-voix des opprim\u00E9s, comme le pensait Sartre pour qui \u00AB le devoir d'un \u00E9crivain est de prendre parti contre toutes les injustices \u00BB ? Ou bien doit-il, \u00E0 l'instar de Flaubert, se contenter de peindre le r\u00E9el avec la plus grande objectivit\u00E9, sans chercher \u00E0 le juger ? Certains, comme Camus, estiment que l'art a pour fonction d'\u00E9clairer l'obscurit\u00E9 du monde, de donner une forme \u00E0 ce qui semble d\u00E9pourvu de sens. D'autres enfin, \u00E0 l'image de Soljenitsyne, consid\u00E8rent qu'une litt\u00E9rature qui n'ose communiquer aux hommes ses propres souffrances ne m\u00E9rite pas le nom de litt\u00E9rature.</em></p><p><em>Au-del\u00E0 de ces divergences, une certitude demeure : la litt\u00E9rature, par sa capacit\u00E9 \u00E0 toucher le lecteur et \u00E0 \u00E9veiller sa conscience, participe \u00E0 l'\u00E9dification d'un monde plus humain. Elle est ce lieu o\u00F9 se confrontent les id\u00E9es, o\u00F9 se forgent les sensibilit\u00E9s, o\u00F9 se pr\u00E9pare l'avenir. En ce sens, elle est irrempla\u00E7able et demeure, malgr\u00E9 les assauts du temps, un rempart contre l'obscurantisme et l'indiff\u00E9rence. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> R\u00E9diger le r\u00E9sum\u00E9 du texte en respectant les consignes.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><p><strong>Exemple de r\u00E9sum\u00E9 (121 mots) :</strong></p><p><em>La litt\u00E9rature interroge le monde et donne un sens \u00E0 l'existence. Miroir de la soci\u00E9t\u00E9, elle permet \u00E0 celle-ci de se comprendre et de se transformer. L'\u00E9crivain est \u00E0 la fois t\u00E9moin et cr\u00E9ateur : par les mots, il d\u00E9nonce, c\u00E9l\u00E8bre ou explore l'\u00E2me humaine.</em></p><p><em>Mais quelle est sa mission ? Pour Sartre, il doit prendre parti contre les injustices. Flaubert pr\u00E9f\u00E8re peindre le r\u00E9el sans le juger. Camus voit dans l'art une fa\u00E7on d'\u00E9clairer le monde. Soljenitsyne pense que la litt\u00E9rature doit communiquer les souffrances.</em></p><p><em>Au-del\u00E0 de ces conceptions, la litt\u00E9rature touche le lecteur et \u00E9veille sa conscience. Elle confronte les id\u00E9es, forge les sensibilit\u00E9s et pr\u00E9pare l'avenir. Irrempla\u00E7able, elle reste un rempart contre l'obscurantisme et l'indiff\u00E9rence.</em></p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Discussion",
      "points": "10 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p><strong>Sujet :</strong> L'auteur du texte affirme que \u00AB la litt\u00E9rature, par sa capacit\u00E9 \u00E0 toucher le lecteur et \u00E0 \u00E9veiller sa conscience, participe \u00E0 l'\u00E9dification d'un monde plus humain \u00BB.</p><p>Selon vous, la litt\u00E9rature peut-elle vraiment contribuer \u00E0 rendre le monde plus humain ?</p><p>Vous appuierez votre r\u00E9flexion sur des exemples tir\u00E9s de vos lectures, de l'actualit\u00E9 ou de votre exp\u00E9rience personnelle.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> R\u00E9diger une discussion structur\u00E9e en trois parties (introduction, d\u00E9veloppement, conclusion) pour r\u00E9pondre \u00E0 la question pos\u00E9e.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><p><strong>Exemple de discussion :</strong></p><p><strong>Introduction :</strong> La litt\u00E9rature, par sa puissance \u00E9vocatrice, a toujours \u00E9t\u00E9 consid\u00E9r\u00E9e comme un vecteur d'humanit\u00E9. Mais peut-elle vraiment contribuer \u00E0 rendre le monde plus humain ? Si elle a le pouvoir d'\u00E9veiller les consciences et de susciter l'empathie, son action reste limit\u00E9e par la r\u00E9sistance du r\u00E9el et l'indiff\u00E9rence de certains lecteurs.</p><p><strong>D\u00E9veloppement :</strong> D'une part, la litt\u00E9rature sensibilise aux causes humaines. Victor Hugo, avec <em>Les Mis\u00E9rables</em>, a d\u00E9nonc\u00E9 la mis\u00E8re sociale et contribu\u00E9 \u00E0 faire \u00E9voluer les mentalit\u00E9s. De m\u00EAme, les romans de John Steinbeck ont montr\u00E9 les souffrances des plus d\u00E9munis lors de la Grande D\u00E9pression. Ainsi, elle \u00E9veille la conscience collective.</p><p>Cependant, son impact est souvent limit\u00E9. Les dictatures ont interdit des \u0153uvres jug\u00E9es subversives, et les combats litt\u00E9raires ne suffisent pas \u00E0 changer le monde. L'exemple de Soljenitsyne, qui a d\u00E9nonc\u00E9 le goulag sans parvenir \u00E0 arr\u00EAter le syst\u00E8me sovi\u00E9tique, en t\u00E9moigne. Le lecteur peut aussi rester indiff\u00E9rent.</p><p>Enfin, la litt\u00E9rature peut \u00E9chouer \u00E0 transformer les consciences si elle est lue pour le seul plaisir esth\u00E9tique. La dimension humaniste de l'\u0153uvre exige une lecture engag\u00E9e.</p><p><strong>Conclusion :</strong> La litt\u00E9rature est un outil puissant d'humanisation, mais son action n'est pas automatique. Elle ouvre des chemins de conscience sans garantir leur parcours. Le r\u00f4le du lecteur est d\u00E9cisif pour que le texte produise ses effets.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Dissertation litt\u00E9raire",
      "points": "10 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p><strong>Sujet :</strong> Albert Camus d\u00E9clare : \u00AB Si le monde \u00E9tait clair, l'art ne serait pas. \u00BB</p><p>En vous appuyant sur des \u0153uvres litt\u00E9raires que vous avez \u00E9tudi\u00E9es ou lues, vous montrerez en quoi la litt\u00E9rature tire sa n\u00E9cessit\u00E9 de l'obscurit\u00E9 du monde.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> R\u00E9diger une dissertation litt\u00E9raire structur\u00E9e en trois parties (introduction, d\u00E9veloppement, conclusion).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><p><strong>Exemple de dissertation :</strong></p><p><strong>Introduction :</strong> \u00AB Si le monde \u00E9tait clair, l'art ne serait pas \u00BB. Cette affirmation de Camus pose une question fondamentale : la litt\u00E9rature trouve-t-elle sa raison d'\u00EAtre dans l'obscurit\u00E9 du monde ? En d'autres termes, l'art na\u00EEt-il de l'incompr\u00E9hension et du myst\u00E8re ?</p><p><strong>D\u00E9veloppement :</strong> D'une part, la litt\u00E9rature puise sa mati\u00E8re dans les zones d'ombre de l'existence. Les grandes \u0153uvres interrogent le sens de la vie, la mort, l'injustice. Beckett, dans <em>En attendant Godot</em>, explore l'absurdit\u00E9 de l'existence humaine. Cette obscurit\u00E9 donne naissance \u00E0 des formes nouvelles.</p><p>D'autre part, l'art transforme cette obscurit\u00E9 en beaut\u00E9. Les po\u00E8tes comme Baudelaire transforment le mal en source d'inspiration po\u00E9tique. Cette alchimie est au c\u0153ur de la cr\u00E9ation.</p><p>Enfin, la litt\u00E9rature propose des \u00E9clairages sur l'obscurit\u00E9 du monde. Elle donne des formes, des sens et des r\u00E9ponses l\u00E0 o\u00F9 le r\u00E9el semble absurde.</p><p><strong>Conclusion :</strong> La litt\u00E9rature est bien une r\u00E9ponse \u00E0 l'obscurit\u00E9 du monde. Elle na\u00EEt du myst\u00E8re et le transforme en qu\u00EAte de sens.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
