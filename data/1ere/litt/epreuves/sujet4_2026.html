<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Littérature",
  "classe": "Première",
  "sequence": "Séquence 4 : Évaluation des techniques d'écriture et de réflexion littéraire",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Je maîtrise les techniques de contraction de texte",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Lis attentivement le texte suivant et réponds aux questions sur la méthodologie de la contraction.</div><div style='background-color: #e2e8f0; padding: 10px; border-radius: 5px; color: #1a202c; margin: 10px 0;'><strong>Texte :</strong><br><i>« La lecture est une activité essentielle au développement intellectuel de l'homme. Elle permet non seulement d'acquérir des connaissances, mais aussi de développer son esprit critique. En effet, le lecteur confronte ses idées à celles de l'auteur, ce qui l'oblige à réfléchir et à se positionner. Cependant, la lecture requiert une certaine concentration et un effort de compréhension. Beaucoup de jeunes, aujourd'hui, préfèrent les divertissements numériques qui ne sollicitent pas autant leur intelligence. Cette tendance est inquiétante, car elle pourrait conduire à un appauvrissement culturel. Il est donc urgent de réhabiliter la lecture dans nos sociétés. »</i></div>",
      "questions": [
        {
          "question": "1) Explique en quoi consiste une contraction de texte (ou résumé) et quelles sont ses principales exigences.",
          "reponse": "Une contraction de texte est une reformulation condensée et fidèle du texte original. Elle doit respecter le nombre de mots imposé, conserver les idées essentielles et le plan du texte, ne pas introduire d'idées personnelles ni de commentaires, et être rédigée dans un style objectif et clair."
        },
        {
          "question": "2) Identifie les idées principales dans le texte proposé. Reformule-les succinctement.",
          "reponse": "Idées principales : 1) La lecture est essentielle au développement intellectuel. 2) Elle développe l'esprit critique par la confrontation d'idées. 3) Elle demande un effort, contrairement aux divertissements numériques. 4) Cette tendance est inquiétante et appelle à une réhabilitation de la lecture."
        },
        {
          "question": "3) Parmi les phrases suivantes, laquelle est une reformulation fidèle de l'idée principale du texte ? Justifie ta réponse. <br> a) <i>« La lecture est indispensable pour se cultiver et doit être encouragée. »</i> <br> b) <i>« La lecture est un bon passe-temps pour les jeunes. »</i> <br> c) <i>« La lecture permet d'acquérir des connaissances et de développer l'esprit critique. »</i>",
          "reponse": "La réponse c) est la reformulation la plus fidèle. Elle reprend exactement les deux premières idées du texte : l'acquisition de connaissances et le développement de l'esprit critique. Les autres propositions sont soit trop générales (a) soit réductrices (b)."
        }
      ]
    },
    {
      "titre": "Je prépare la discussion : analyser et argumenter",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>La discussion est une épreuve qui exige une réflexion personnelle et argumentée sur une question posée à partir du texte.</div>",
      "questions": [
        {
          "question": "1) Définis ce qu'est une discussion en contexte d'examen. Quelles sont ses principales étapes ?",
          "reponse": "La discussion est une réflexion argumentée sur une question posée à partir du texte. Les étapes sont : 1) Analyser le sujet et la question. 2) Déterminer sa position (accord, désaccord, nuance). 3) Construire un plan. 4) Rédiger l'introduction. 5) Développer les arguments avec des exemples. 6) Rédiger la conclusion."
        },
        {
          "question": "2) Imagine que le sujet de discussion est : <i>« La lecture est-elle encore nécessaire à l'ère du numérique ? »</i>. Propose une introduction structurée pour ce sujet.",
          "reponse": "Introduction possible : « À l'ère du numérique, où l'information est instantanée et les divertissements omniprésents, on peut s'interroger sur la nécessité de la lecture traditionnelle. Si certains considèrent la lecture comme une activité obsolète, elle demeure pourtant un outil irremplaçable pour le développement intellectuel et critique. Dans cette discussion, nous verrons d'abord les bienfaits de la lecture, puis les défis posés par le numérique, avant de nuancer notre propos. »"
        },
        {
          "question": "3) Cite trois types d'arguments que tu peux utiliser pour illustrer ton propos dans une discussion.",
          "reponse": "1) Les arguments logiques (raisonnements). 2) Les arguments d'expérience (observations personnelles). 3) Les arguments d'autorité (références à des auteurs, des études)."
        }
      ]
    },
    {
      "titre": "Je me prépare à la dissertation littéraire",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>La dissertation littéraire est une réflexion structurée sur un sujet littéraire, mobilisant des connaissances sur les œuvres étudiées.</div>",
      "questions": [
        {
          "question": "1) Qu'est-ce qu'une dissertation littéraire ? Quelles sont ses principales exigences ?",
          "reponse": "La dissertation littéraire est une réflexion argumentée sur un sujet littéraire. Elle exige de mobiliser ses connaissances des œuvres, de construire une argumentation structurée et cohérente, et de développer une réflexion personnelle et critique. Elle comporte une introduction, un développement en 2 ou 3 parties et une conclusion."
        },
        {
          "question": "2) Analyse le sujet de dissertation suivant et propose une problématique : <i>« La littérature a-t-elle pour seule mission de divertir ? »</i>",
          "reponse": "Problématique : « Si le divertissement a longtemps été une fonction de la littérature, cette dernière ne remplit-elle pas également des missions plus nobles, comme l'éducation, la critique sociale ou la quête de vérité ? »"
        },
        {
          "question": "3) Pour le sujet précédent, propose deux arguments que tu pourrais développer dans ta dissertation.",
          "reponse": "1) La littérature a une fonction éducative et morale : elle instruit, développe l'esprit critique (exemple : les fables de La Fontaine). 2) La littérature a une fonction sociale et politique : elle dénonce les injustices et interroge la société (exemple : les romans de Victor Hugo)."
        }
      ]
    },
    {
      "titre": "Je réfléchis sur le rôle de l'écrivain",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Les conceptions du rôle de l'écrivain sont diverses selon les auteurs. Ces réflexions nourrissent les sujets de dissertation.</div>",
      "questions": [
        {
          "question": "1) Explique la conception de l'écrivain engagé selon Jean-Paul Sartre (sujet 2024).",
          "reponse": "Pour Sartre, l'écrivain a le devoir de prendre parti contre toutes les injustices. Il doit s'engager politiquement et socialement par son écriture, qui est une action sur le monde. L'écrivain ne peut pas rester neutre face aux souffrances humaines."
        },
        {
          "question": "2) Résume la pensée d'Alexandre Soljenitsyne (sujet 2025) sur la mission de la littérature.",
          "reponse": "Pour Soljenitsyne, une littérature qui n'ose pas communiquer les souffrances des hommes ne mérite pas son nom. L'écrivain est un témoin qui doit alerter sur les dangers et les injustices, en partant de l'expérience vécue."
        },
        {
          "question": "3) Compare la vision de l'écrivain chez Sartre et chez Soljenitsyne.",
          "reponse": "Tous deux considèrent que l'écrivain a une responsabilité morale. Chez Sartre, il s'agit d'un engagement politique actif contre les injustices. Chez Soljenitsyne, il s'agit plutôt d'un témoignage sur les souffrances humaines, d'une parole qui révèle la vérité. L'un agit, l'autre témoigne."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
