<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à la valorisation des déchets",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.8; color: #1a1a1a; padding: 10px;'>   <h2 style='color: #1a5276; text-align: center;'>♻️ Qu'est-ce que la valorisation des déchets ?</h2>   <div style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin: 15px 0;'>     <p style='font-size: 1.1em;'>La <strong>valorisation des déchets</strong> est l'ensemble des techniques qui permettent de <strong>transformer</strong> les déchets en <strong>ressources utiles</strong> (matières premières, énergie, engrais, etc.).</p>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #d4efdf; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>🌱 Objectifs</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>🔹 Réduire la quantité de déchets</li>         <li>🔹 Limiter la pollution</li>         <li>🔹 Économiser les ressources naturelles</li>         <li>🔹 Créer de l'emploi</li>       </ul>     </div>     <div style='flex: 1; min-width: 200px; background-color: #d6eaf8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📊 Les 3 principales méthodes</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>🔸 <strong>Compostage</strong> (déchets organiques → engrais)</li>         <li>🔸 <strong>Recyclage</strong> (matières → nouveaux produits)</li>         <li>🔸 <strong>Fermentation</strong> (déchets organiques → biogaz, alcool, vinaigre)</li>       </ul>     </div>   </div>   <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f39c12;'>     <p><strong>💡 À retenir :</strong> La valorisation transforme un problème (les déchets) en une solution (des ressources utiles). Elle s'inscrit dans une logique de <strong>développement durable</strong>.</p>   </div> </div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons étudier les méthodes de valorisation des déchets. La valorisation des déchets est l'ensemble des techniques qui permettent de transformer les déchets en ressources utiles, comme des matières premières, de l'énergie ou des engrais. Les objectifs sont multiples : réduire la quantité de déchets, limiter la pollution, économiser les ressources naturelles, et même créer de l'emploi. Les trois principales méthodes que nous allons étudier sont le compostage, le recyclage et la fermentation. La valorisation transforme un problème en une solution et s'inscrit dans une logique de développement durable.",
    "note": "La valorisation des déchets transforme les déchets en ressources utiles."
  },
  {
    "titre": "Le compostage",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.8; color: #1a1a1a; padding: 10px;'>   <h2 style='color: #1a5276; text-align: center;'>🌱 Le compostage</h2>   <div style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin: 15px 0;'>     <p style='font-size: 1.1em;'>Le <strong>compostage</strong> est une méthode de valorisation des <strong>déchets organiques</strong> (végétaux, épluchures, etc.) qui, par <strong>décomposition naturelle</strong> (aérobie), les transforme en un <strong>engrais riche en nutriments</strong> appelé <strong>compost</strong>.</p>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #d4efdf; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Avantages</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>✅ Réduit les déchets ménagers</li>         <li>✅ Produit un engrais naturel</li>         <li>✅ Enrichit le sol</li>         <li>✅ Réduit l'utilisation d'engrais chimiques</li>       </ul>     </div>     <div style='flex: 1; min-width: 200px; background-color: #d6eaf8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📊 Déchets à composter</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>🍂 Feuilles mortes</li>         <li>🥕 Épluchures de légumes et fruits</li>         <li>🌿 Tontes de gazon</li>         <li>☕ Marc de café, sachets de thé</li>       </ul>     </div>   </div>   <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f39c12;'>     <p><strong>⚠️ À éviter :</strong> Les viandes, les poissons, les produits laitiers, les graisses et les déchets d'animaux domestiques qui peuvent attirer les nuisibles et produire de mauvaises odeurs.</p>   </div> </div>",
    "texteParle": "Le compostage est la première méthode de valorisation que nous allons étudier. Le compostage est une méthode qui consiste à transformer les déchets organiques, comme les végétaux et les épluchures, en un engrais naturel et riche en nutriments appelé compost, grâce à une décomposition naturelle en présence d'oxygène. Les avantages du compostage sont nombreux : il réduit les déchets ménagers, produit un engrais naturel, enrichit le sol et réduit l'utilisation d'engrais chimiques. Les déchets à composter sont principalement les feuilles mortes, les épluchures de fruits et légumes, les tontes de gazon, le marc de café. Il faut éviter de composter les viandes, les poissons, les produits laitiers, les graisses et les déchets d'animaux domestiques, car ils attirent les nuisibles et produisent de mauvaises odeurs.",
    "note": "Le compostage transforme les déchets organiques en compost (engrais naturel)."
  },
  {
    "titre": "Fabrication du compost",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.8; color: #1a1a1a; padding: 10px;'>   <h2 style='color: #1a5276; text-align: center;'>🔧 Fabrication du compost</h2>   <div style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin: 15px 0;'>     <p style='font-size: 1.1em;'>La fabrication du compost suit plusieurs étapes :</p>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étape 1 : Collecte</h4>       <p>Réunir les <strong>déchets organiques</strong> (végétaux, épluchures, tontes) et les <strong>déchets secs</strong> (feuilles mortes, paille) pour un bon équilibre entre carbone et azote.</p>     </div>     <div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étape 2 : Mise en tas</h4>       <p>Déposer les déchets en <strong>couches alternées</strong> (végétaux humides + secs) dans un <strong>composteur</strong> ou un tas aéré.</p>     </div>     <div style='flex: 1; min-width: 200px; background-color: #eaf2f8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étape 3 : Décomposition</h4>       <p>Les <strong>micro-organismes</strong> (bactéries, champignons) décomposent la matière en présence d'<strong>oxygène</strong> (aérobie). Le tas doit être <strong>brassé régulièrement</strong> et <strong>humidifié</strong>.</p>     </div>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #d4efdf; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étape 4 : Maturation</h4>       <p>Après plusieurs semaines/mois, le compost <strong>mûrit</strong> et devient :</p>       <ul style='list-style-type: none; padding: 0;'>         <li>✅ <strong>Homogène</strong> (granuleux)</li>         <li>✅ <strong>Odeur de terre</strong></li>         <li>✅ <strong>De couleur brune</strong></li>       </ul>     </div>     <div style='flex: 1; min-width: 200px; background-color: #d6eaf8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étape 5 : Utilisation</h4>       <p>Le compost est utilisé comme :</p>       <ul style='list-style-type: none; padding: 0;'>         <li>🌿 <strong>Engrais</strong> pour les plantes</li>         <li>🌱 <strong>Amendement</strong> du sol</li>         <li>🏡 <strong>Paillage</strong> pour protéger le sol</li>       </ul>     </div>   </div>   <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f39c12;'>     <p><strong>🔑 Conditions de réussite :</strong> Aération, humidité, bon rapport carbone/azote (C/N). Un compost bien équilibré ne doit pas sentir mauvais.</p>   </div> </div>",
    "texteParle": "La fabrication du compost suit plusieurs étapes. La première étape est la collecte des déchets organiques et des déchets secs pour assurer un bon équilibre entre carbone et azote. La deuxième étape est la mise en tas par couches alternées de végétaux humides et secs. La troisième étape est la décomposition par les micro-organismes en présence d'oxygène, et le tas doit être brassé régulièrement et humidifié. La quatrième étape est la maturation, qui dure plusieurs semaines ou mois, et le compost devient homogène, sent la terre et est de couleur brune. La dernière étape est l'utilisation du compost comme engrais, amendement du sol ou paillage. Les conditions de réussite sont une bonne aération, une humidité adéquate et un bon rapport carbone sur azote. Un compost bien équilibré ne doit pas sentir mauvais.",
    "note": "Le compostage se fait en 5 étapes : collecte, mise en tas, décomposition, maturation, utilisation."
  },
  {
    "titre": "Le recyclage",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.8; color: #1a1a1a; padding: 10px;'>   <h2 style='color: #1a5276; text-align: center;'>♻️ Le recyclage</h2>   <div style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin: 15px 0;'>     <p style='font-size: 1.1em;'>Le <strong>recyclage</strong> consiste à <strong>transformer</strong> des déchets en <strong>matières premières</strong> pour fabriquer de <strong>nouveaux produits</strong>.</p>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #d4efdf; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Déchets recyclables</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>📰 <strong>Papier</strong> (journaux, cartons)</li>         <li>🍾 <strong>Verre</strong> (bouteilles, pots)</li>         <li>🥫 <strong>Plastique</strong> (bouteilles PET, emballages)</li>         <li>🛢️ <strong>Métaux</strong> (aluminium, fer, acier)</li>         <li>👕 <strong>Textiles</strong> (vêtements)</li>       </ul>     </div>     <div style='flex: 1; min-width: 200px; background-color: #d6eaf8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📊 Étapes du recyclage</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>1️⃣ <strong>Collecte</strong> et <strong>tri</strong> des déchets</li>         <li>2️⃣ <strong>Nettoyage</strong> et <strong>broyage</strong></li>         <li>3️⃣ <strong>Fusion</strong> ou <strong>transformation</strong></li>         <li>4️⃣ <strong>Fabrication</strong> de nouveaux produits</li>       </ul>     </div>   </div>   <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f39c12;'>     <p><strong>🌍 Exemples :</strong> Une bouteille en verre recyclée donne une nouvelle bouteille. Des canettes en aluminium recyclées donnent de l'aluminium pour de nouvelles canettes. Le papier recyclé donne du papier journal ou des cartons.</p>   </div> </div>",
    "texteParle": "Le recyclage est une autre méthode de valorisation des déchets. Il consiste à transformer les déchets en matières premières pour fabriquer de nouveaux produits. Les déchets recyclables sont nombreux : le papier, le verre, le plastique, les métaux et les textiles. Le recyclage se fait en plusieurs étapes : d'abord la collecte et le tri des déchets, puis le nettoyage et le broyage, ensuite la fusion ou la transformation, et enfin la fabrication de nouveaux produits. Par exemple, une bouteille en verre recyclée donne une nouvelle bouteille, et des canettes en aluminium recyclées donnent de l'aluminium pour de nouvelles canettes. Le papier recyclé donne du papier journal ou des cartons.",
    "note": "Le recyclage transforme les déchets en nouvelles matières premières."
  },
  {
    "titre": "La fermentation : fabrication du vin",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.8; color: #1a1a1a; padding: 10px;'>   <h2 style='color: #1a5276; text-align: center;'>🍇 Fabrication du vin à partir du raisin</h2>   <div style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin: 15px 0;'>     <p style='font-size: 1.1em;'>La <strong>fermentation alcoolique</strong> est un processus biologique où des <strong>micro-organismes</strong> (levures) transforment les <strong>sucres</strong> (glucose et fructose) du raisin en <strong>alcool (éthanol)</strong> et en <strong>dioxyde de carbone</strong>.</p>   </div>   <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center;'>     <div class='math-block' style='background-color: #ffffff; padding: 15px; border-radius: 8px; display: inline-block;'>       <div class='math'>$$ C_6H_{12}O_6 \\xrightarrow{levures} 2 C_2H_5OH + 2 CO_2 $$</div>     </div>     <p style='margin-top: 10px; font-style: italic;'>Glucose → Éthanol + Dioxyde de carbone</p>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #d4efdf; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étapes</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>1️⃣ <strong>Vendange</strong> (récolte du raisin)</li>         <li>2️⃣ <strong>Foulage</strong> (écrasement des raisins)</li>         <li>3️⃣ <strong>Fermentation</strong> (transformation des sucres en alcool par les levures)</li>         <li>4️⃣ <strong>Pressurage</strong> (séparation du jus du marc)</li>         <li>5️⃣ <strong>Élevage</strong> (vieillissement en fût ou en cuve)</li>         <li>6️⃣ <strong>Mise en bouteille</strong></li>       </ul>     </div>     <div style='flex: 1; min-width: 200px; background-color: #d6eaf8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📊 Conditions de la fermentation</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>🔸 <strong>Température</strong> : entre 20°C et 30°C</li>         <li>🔸 <strong>Absence d'oxygène</strong> (milieu anaérobie)</li>         <li>🔸 <strong>Présence de levures</strong></li>         <li>🔸 <strong>Richesse en sucre</strong> du raisin</li>       </ul>     </div>   </div>   <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f39c12;'>     <p><strong>🍷 Exemple :</strong> Le vin rouge est fabriqué à partir de raisins noirs fermentés avec la peau (qui donne la couleur). Le vin blanc est fabriqué à partir de raisins blancs ou de raisins noirs pressés sans la peau.</p>   </div> </div>",
    "texteParle": "La fermentation est une méthode de valorisation des déchets qui permet de transformer les déchets organiques en produits utiles comme le vin, le vinaigre ou le biogaz. Nous allons d'abord étudier la fabrication du vin à partir du raisin. La fermentation alcoolique est un processus biologique où des levures transforment les sucres du raisin, le glucose et le fructose, en alcool, l'éthanol, et en dioxyde de carbone. La réaction chimique est : glucose donne éthanol plus dioxyde de carbone. Les étapes de fabrication du vin sont : la vendange, le foulage, la fermentation, le pressurage, l'élevage et la mise en bouteille. Les conditions de la fermentation sont une température entre 20 et 30 degrés Celsius, l'absence d'oxygène, la présence de levures et une richesse en sucre du raisin. Par exemple, le vin rouge est fabriqué à partir de raisins noirs fermentés avec la peau, qui donne la couleur, tandis que le vin blanc est fabriqué à partir de raisins blancs ou de raisins noirs pressés sans la peau.",
    "note": "La fermentation alcoolique transforme le glucose en éthanol et CO₂."
  },
  {
    "titre": "Fermentation : fabrication du vinaigre",
    "contenu": "<div style='font-size: 1.1em; line-height: 1.8; color: #1a1a1a; padding: 10px;'>   <h2 style='color: #1a5276; text-align: center;'>🍾 Fabrication du vinaigre à partir du vin</h2>   <div style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin: 15px 0;'>     <p style='font-size: 1.1em;'>La <strong>fermentation acétique</strong> est un processus biologique où des <strong>micro-organismes</strong> (bactéries acétiques, du genre <em>Acetobacter</em>) transforment l'<strong>alcool</strong> (éthanol) du vin en <strong>acide acétique</strong> (vinaigre).</p>   </div>   <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center;'>     <div class='math-block' style='background-color: #ffffff; padding: 15px; border-radius: 8px; display: inline-block;'>       <div class='math'>$$ C_2H_5OH + O_2 \\xrightarrow{bact\\'eries} CH_3COOH + H_2O $$</div>     </div>     <p style='margin-top: 10px; font-style: italic;'>Éthanol + Oxygène → Acide acétique + Eau</p>   </div>   <div style='display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0;'>     <div style='flex: 1; min-width: 200px; background-color: #d4efdf; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📌 Étapes</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>1️⃣ Partir d'un <strong>vin</strong> (rouge ou blanc) de qualité</li>         <li>2️⃣ Ajouter des <strong>bactéries acétiques</strong> (ou utiliser un vinaigre mère)</li>         <li>3️⃣ <strong>Aérer</strong> le mélange (les bactéries ont besoin d'oxygène)</li>         <li>4️⃣ Laisser <strong>fermenter</strong> à température ambiante (20-30°C)</li>         <li>5️⃣ <strong>Filtrer</strong> et <strong>mettre en bouteille</strong></li>       </ul>     </div>     <div style='flex: 1; min-width: 200px; background-color: #d6eaf8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #1a5276; margin-top: 0;'>📊 Conditions</h4>       <ul style='list-style-type: none; padding: 0;'>         <li>🔸 <strong>Présence d'oxygène</strong> (aérobie)</li>         <li>🔸 <strong>Température</strong> : 20-30°C</li>         <li>🔸 <strong>Présence de bactéries acétiques</strong></li>         <li>🔸 <strong>Le vin</strong> (source d'alcool)</li>       </ul>       <p style='margin-top: 10px;'><strong>Durée :</strong> 2 à 3 semaines en moyenne.</p>     </div>   </div>   <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f39c12;'>     <p><strong>🧪 Exemple :</strong> Pour fabriquer du vinaigre de vin, on part d'un vin rouge ou blanc. On y ajoute un vinaigre mère (qui contient les bactéries) et on laisse le tout fermenter en présence d'air. Au bout de quelques semaines, le vin devient du vinaigre.</p>   </div> </div>",
    "texteParle": "La fermentation acétique est un processus qui permet de fabriquer du vinaigre à partir du vin. Ce processus est réalisé par des bactéries acétiques du genre Acetobacter. Ces bactéries transforment l'alcool, c'est-à-dire l'éthanol du vin, en acide acétique, qui est le composant principal du vinaigre. La réaction chimique est : éthanol plus oxygène donne acide acétique plus eau. Les étapes sont les suivantes : on part d'un vin rouge ou blanc de qualité, on y ajoute des bactéries acétiques ou un vinaigre mère, on aère le mélange car les bactéries ont besoin d'oxygène, on laisse fermenter à température ambiante, puis on filtre et on met en bouteille. Les conditions nécessaires sont la présence d'oxygène, une température de 20 à 30 degrés Celsius, la présence de bactéries acétiques, et bien sûr le vin comme source d'alcool. Le processus dure en moyenne 2 à 3 semaines. Par exemple, pour fabriquer du vinaigre de vin, on part d'un vin, on y ajoute un vinaigre mère, et au bout de quelques semaines, le vin devient du vinaigre.",
    "note": "La fermentation acétique transforme l'éthanol en acide acétique (vinaigre)."
  },

        </label>         <label style='background-color: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #d5dbdb;'>           <input type='radio' name='q2' value='1'> La fermentation lactique         </label>         <label style='background-color: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #d5dbdb;'>           <input type='radio' name='q2' value='2'> La fermentation alcoolique         </label>         <label style='background-color: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #d5dbdb;'>           <input type='radio' name='q2' value='3'> La photosynthèse         </label>       </div>     </div>     <div class='qcm-question' style='background-color: #f0f9ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'>       <p><strong>Question 3 :</strong> Quels micro-organismes sont responsables de la transformation du vin en vinaigre ?</p>       <div style='display: flex; flex-direction: column; gap: 8px;'>         <label style='background-color: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #d5dbdb;'>           <input type='radio' name='q3' value='0'> Les levures         </label>         <label style='background-color: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #d5dbdb;'>           <input type='radio';
    // ================================================================

    let currentIndex = 0;

    const $title = $('#slideTitle');

    const $loadingTimeout = $('#loadingTimeout');

    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');

    function showLoading() {
        if (loadingTimeout) {

        $loadingProgressBar.css('animation', 'none');

        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;

                $loadingSub.text('La synthèse vocale a pris trop de temps');

            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;

        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');

        $loadingSub.text('Vous pouvez réessayer');

    // Arrêter la parole proprement
    function stopSpeaking() {

                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
