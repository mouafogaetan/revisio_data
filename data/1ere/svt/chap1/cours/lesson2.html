<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux maladies nutritionnelles",
    "contenu": "<div style='padding: 16px; background: linear-gradient(135deg, #c62828, #e53935); border-radius: 12px; color: #ffffff;'><h2 style='color: #ffffff; margin-top: 0;'>🏥 Les maladies nutritionnelles</h2><p style='color: #ffffff; font-size: 1.1em;'>Une maladie nutritionnelle est une pathologie causée par une <strong>alimentation déséquilibrée</strong>.</p><p style='color: #ffffff;'>On distingue deux grandes catégories :</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0;'><div style='background: rgba(255,255,255,0.15); padding: 12px; border-radius: 8px; text-align: center;; color: #000000'><span style='font-size: 2em;'>⬇️</span><br><strong style='color: #ffeb3b;'>Maladies par carence</strong><br><small style='color: #ffffff;'>Manque d'un nutriment essentiel</small></div><div style='background: rgba(255,255,255,0.15); padding: 12px; border-radius: 8px; text-align: center;; color: #000000'><span style='font-size: 2em;'>⬆️</span><br><strong style='color: #ffeb3b;'>Maladies par excès</strong><br><small style='color: #ffffff;'>Consommation excessive de certains nutriments</small></div></div><div style='background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-top: 8px;; color: #000000'><p style='color: #ffffff; margin: 0; font-style: italic;'>💡 Au Cameroun, comme dans de nombreux pays en développement, les deux types de maladies nutritionnelles coexistent.</p></div></div>",
    "texteParle": "Bienvenue à tous. Aujourd'hui, nous allons parler des maladies nutritionnelles. Une maladie nutritionnelle est une pathologie causée par une alimentation déséquilibrée. On distingue deux grandes catégories de maladies nutritionnelles. Les maladies par carence sont causées par un manque d'un nutriment essentiel dans l'alimentation. Les maladies par excès sont causées par une consommation excessive de certains nutriments. Au Cameroun, comme dans de nombreux pays en développement, ces deux types de maladies nutritionnelles coexistent, ce qui représente un véritable défi de santé publique.",
    "note": "Les maladies nutritionnelles sont causées par une alimentation déséquilibrée."
  },
  {
    "titre": "Le Kwashiorkor",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #c62828;'>⚠️ Le Kwashiorkor</h3><div style='background: #ffebee; padding: 12px; border-radius: 8px; border-left: 4px solid #c62828;; color: #000000'><p><strong>Cause :</strong> Carence en <strong>protides</strong> (protéines) dans l'alimentation</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0;'><div style='background: #fff3e0; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #e65100;'>🧑‍⚕️ Symptômes :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Œdème (gonflement du ventre et des jambes)</li><li>Retard de croissance</li><li>Peau sèche et desquamante</li><li>Cheveux clairsemés et décolorés</li><li>Fatigue et apathie</li></ul></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #2e7d32;'>👨‍👩‍👧‍👦 Populations à risque :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Enfants de 1 à 3 ans</li><li>Enfants sevrés trop tôt</li><li>Enfants ayant une alimentation pauvre en protéines</li></ul></div></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Prévention :</p><p style='margin: 4px 0 0 0;'>Alimentation riche en protéines : viande, poisson, œufs, lait, légumineuses (haricots, pois, soja)</p></div><div style='background: #fff8e1; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffb300;; color: #000000'><p style='margin: 0; font-size: 0.9em;'>📌 <strong>Contexte camerounais :</strong> Le Kwashiorkor est fréquent dans les régions où l'alimentation est majoritairement à base de manioc ou de banane plantain, pauvres en protéines.</p></div></div>",
    "texteParle": "Le Kwashiorkor est une maladie nutritionnelle causée par une carence en protides, c'est-à-dire en protéines. Elle touche principalement les enfants de 1 à 3 ans, notamment ceux qui sont sevrés trop tôt et qui ont une alimentation pauvre en protéines. Les symptômes du Kwashiorkor incluent un œdème, c'est-à-dire un gonflement du ventre et des jambes, un retard de croissance, une peau sèche qui se desquame, des cheveux clairsemés et décolorés, ainsi que de la fatigue et de l'apathie. Pour prévenir le Kwashiorkor, il est important d'avoir une alimentation riche en protéines, comme la viande, le poisson, les œufs, le lait et les légumineuses comme les haricots, les pois et le soja. Au Cameroun, le Kwashiorkor est fréquent dans les régions où l'alimentation est majoritairement à base de manioc ou de banane plantain, qui sont pauvres en protéines.",
    "note": "Le Kwashiorkor est une carence en protéines."
  },
  {
    "titre": "Le Rachitisme",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #c62828;'>⚠️ Le Rachitisme</h3><div style='background: #ffebee; padding: 12px; border-radius: 8px; border-left: 4px solid #c62828;; color: #000000'><p><strong>Cause :</strong> Carence en <strong>vitamine D</strong> et en <strong>calcium</strong></p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0;'><div style='background: #fff3e0; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #e65100;'>🧑‍⚕️ Symptômes :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Déformation des os (jambes arquées)</li><li>Retard de croissance</li><li>Douleurs osseuses</li><li>Fragilité osseuse (fractures)</li><li>Déformation du thorax</li></ul></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #2e7d32;'>👨‍👩‍👧‍👦 Populations à risque :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Enfants en croissance</li><li>Personnes manquant d'exposition au soleil</li><li>Personnes ayant une alimentation pauvre en calcium</li></ul></div></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Prévention :</p><p style='margin: 4px 0 0 0;'>Exposition modérée au soleil (synthèse de la vitamine D) + aliments riches en calcium (lait, fromage, légumes verts)</p></div><div style='background: #fff8e1; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffb300;; color: #000000'><p style='margin: 0; font-size: 0.9em;'>☀️ <strong>Astuce :</strong> Au Cameroun, l'exposition au soleil est suffisante, mais il faut associer une alimentation riche en calcium.</p></div></div>",
    "texteParle": "Le Rachitisme est une maladie nutritionnelle causée par une carence en vitamine D et en calcium. Elle touche principalement les enfants en croissance, les personnes qui manquent d'exposition au soleil et celles qui ont une alimentation pauvre en calcium. Les symptômes du Rachitisme incluent des déformations des os, comme des jambes arquées, un retard de croissance, des douleurs osseuses, une fragilité osseuse qui peut entraîner des fractures, et des déformations du thorax. Pour prévenir le Rachitisme, il est important de s'exposer modérément au soleil, ce qui permet la synthèse de la vitamine D, et de consommer des aliments riches en calcium comme le lait, le fromage et les légumes verts. Au Cameroun, l'exposition au soleil est suffisante, mais il faut associer une alimentation riche en calcium pour prévenir cette maladie.",

  {
    "titre": "Les Avitaminoses",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #c62828;'>⚠️ Les Avitaminoses</h3><p style='margin: 8px 0;'>Les avitaminoses sont des maladies causées par une <strong>carence en vitamines</strong>.</p><div style='overflow-x: auto; margin: 12px 0;'><table style='width: 100%; border-collapse: collapse; font-size: 0.9em; min-width: 300px;'><thead><tr style='background: #c62828; color: #ffffff;'><th style='padding: 8px; border: 1px solid #ddd;'>Vitamine</th><th style='padding: 8px; border: 1px solid #ddd;'>Maladie</th><th style='padding: 8px; border: 1px solid #ddd;'>Symptômes</th></tr></thead><tbody><tr style='background: #ffebee;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Vitamine A</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Cécité nocturne</td><td style='padding: 8px; border: 1px solid #ddd;'>Difficulté à voir la nuit, sécheresse oculaire</td></tr><tr style='background: #fff3e0;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Vitamine B1</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Béribéri</td><td style='padding: 8px; border: 1px solid #ddd;'>Troubles nerveux, faiblesse musculaire</td></tr><tr style='background: #ffebee;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Vitamine C</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Scorbut</td><td style='padding: 8px; border: 1px solid #ddd;'>Saignement des gencives, fatigue, hématomes</td></tr><tr style='background: #fff3e0;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Vitamine D</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Rachitisme</td><td style='padding: 8px; border: 1px solid #ddd;'>Déformation des os (déjà vu)</td></tr><tr style='background: #ffebee;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Vitamine PP</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Pellagre</td><td style='padding: 8px; border: 1px solid #ddd;'>Lésions cutanées, diarrhée, démence</td></tr></tbody></table></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Prévention :</p><p style='margin: 4px 0 0 0;'>Alimentation variée riche en fruits, légumes, viande, poisson et œufs</p></div></div>",
    "texteParle": "Les avitaminoses sont des maladies causées par une carence en vitamines. Chaque vitamine joue un rôle spécifique dans notre corps, et son absence provoque des symptômes particuliers. Une carence en vitamine A provoque la cécité nocturne, c'est-à-dire une difficulté à voir la nuit, et une sécheresse oculaire. Une carence en vitamine B1 provoque le béribéri, qui se manifeste par des troubles nerveux et une faiblesse musculaire. Une carence en vitamine C provoque le scorbut, avec des saignements des gencives, de la fatigue et des hématomes. Une carence en vitamine D provoque le rachitisme que nous avons déjà vu. Une carence en vitamine PP provoque la pellagre, avec des lésions cutanées, de la diarrhée et de la démence. Pour prévenir les avitaminoses, il est important d'avoir une alimentation variée et riche en fruits, en légumes, en viande, en poisson et en œufs.",

    "titre": "L'Obésité",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #e65100;'>📈 L'Obésité</h3><div style='background: #fff3e0; padding: 12px; border-radius: 8px; border-left: 4px solid #e65100;; color: #000000'><p><strong>Cause :</strong> Excès de <strong>lipides</strong> et de <strong>glucides</strong> dans l'alimentation, associé à une <strong>sédentarité</strong></p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0;'><div style='background: #ffebee; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #c62828;'>🧑‍⚕️ Conséquences :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Maladies cardiovasculaires</li><li>Diabète de type 2</li><li>Hypertension artérielle</li><li>Problèmes articulaires</li><li>Troubles respiratoires</li></ul></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #2e7d32;'>👨‍👩‍👧‍👦 Populations à risque :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Personnes consommant trop d'aliments gras et sucrés</li><li>Personnes ayant une activité physique réduite</li><li>Enfants et adolescents (obésité infantile croissante)</li></ul></div></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Prévention :</p><p style='margin: 4px 0 0 0;'>Alimentation équilibrée, réduction des graisses et des sucres, activité physique régulière (30 min/jour)</p></div><div style='background: #fff8e1; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffb300;; color: #000000'><p style='margin: 0; font-size: 0.9em;'>🏃 <strong>Contexte camerounais :</strong> L'obésité est en augmentation dans les zones urbaines en raison de la sédentarité et de la consommation d'aliments transformés riches en graisses et en sucres.</p></div></div>",
    "texteParle": "L'obésité est une maladie nutritionnelle causée par un excès de lipides et de glucides dans l'alimentation, associé à une sédentarité. Elle touche les personnes qui consomment trop d'aliments gras et sucrés, ainsi que celles qui ont une activité physique réduite. L'obésité infantile est également en augmentation chez les enfants et les adolescents. Les conséquences de l'obésité sont graves : elle peut entraîner des maladies cardiovasculaires, le diabète de type 2, l'hypertension artérielle, des problèmes articulaires et des troubles respiratoires. Pour prévenir l'obésité, il est important d'avoir une alimentation équilibrée, de réduire la consommation de graisses et de sucres, et de pratiquer une activité physique régulière, au moins 30 minutes par jour. Au Cameroun, l'obésité est en augmentation dans les zones urbaines en raison de la sédentarité et de la consommation d'aliments transformés riches en graisses et en sucres.",

    "titre": "Le Diabète de type 2",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #e65100;'>📈 Le Diabète de type 2</h3><div style='background: #fff3e0; padding: 12px; border-radius: 8px; border-left: 4px solid #e65100;; color: #000000'><p><strong>Cause :</strong> Excès de <strong>sucre (glucides)</strong> dans l'alimentation, entraînant une résistance à l'insuline</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0;'><div style='background: #ffebee; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #c62828;'>🧑‍⚕️ Symptômes :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Soif excessive (polydipsie)</li><li>Urinations fréquentes (polyurie)</li><li>Fatigue intense</li><li>Perte de poids inexpliquée</li><li>Vision floue</li></ul></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #2e7d32;'>⚠️ Complications :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Maladies cardiovasculaires</li><li>Lésions rénales</li><li>Lésions nerveuses</li><li>Problèmes de vision (cécité)</li><li>Amputations (pieds)</li></ul></div></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Prévention :</p><p style='margin: 4px 0 0 0;'>Limiter la consommation de sucre, privilégier les glucides complexes (féculents, légumineuses), activité physique régulière</p></div><div style='background: #fff8e1; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #ffb300;; color: #000000'><p style='margin: 0; font-size: 0.9em;'>🍚 <strong>Contexte camerounais :</strong> Le diabète est en augmentation, notamment dans les milieux urbains avec la consommation de boissons sucrées et d'aliments transformés.</p></div></div>",
    "texteParle": "Le diabète de type 2 est une maladie nutritionnelle causée par un excès de sucre dans l'alimentation, ce qui entraîne une résistance à l'insuline. Les symptômes du diabète incluent une soif excessive, des urinations fréquentes, une fatigue intense, une perte de poids inexpliquée et une vision floue. Sans traitement, le diabète peut entraîner de graves complications comme des maladies cardiovasculaires, des lésions rénales, des lésions nerveuses, des problèmes de vision pouvant aller jusqu'à la cécité, et des amputations, notamment au niveau des pieds. Pour prévenir le diabète, il est important de limiter la consommation de sucre, de privilégier les glucides complexes comme les féculents et les légumineuses, et de pratiquer une activité physique régulière. Au Cameroun, le diabète est en augmentation, notamment dans les milieux urbains où la consommation de boissons sucrées et d'aliments transformés est plus élevée.",

  {
    "titre": "La Goutte",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #e65100;'>📈 La Goutte</h3><div style='background: #fff3e0; padding: 12px; border-radius: 8px; border-left: 4px solid #e65100;; color: #000000'><p><strong>Cause :</strong> Excès de <strong>protides</strong> (viandes, abats, fruits de mer) entraînant une accumulation d'acide urique dans le sang</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0;'><div style='background: #ffebee; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #c62828;'>🧑‍⚕️ Symptômes :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Articulations enflées et douloureuses</li><li>Rougeur et chaleur au niveau des articulations</li><li>Dépôts de cristaux dans les articulations</li><li>Accès de douleur aiguë (souvent la nuit)</li></ul></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px;; color: #000000'><strong style='color: #2e7d32;'>🦶 Localisation :</strong><ul style='margin: 4px 0; padding-left: 20px;'><li>Articulation du gros orteil (fréquent)</li><li>Cheville</li><li>Genou</li><li>Poignet</li></ul></div></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Prévention :</p><p style='margin: 4px 0 0 0;'>Réduire la consommation de viandes et d'abats, boire beaucoup d'eau, limiter l'alcool</p></div></div>",
    "texteParle": "La goutte est une maladie nutritionnelle causée par un excès de protides, notamment de viandes, d'abats et de fruits de mer. Cet excès entraîne une accumulation d'acide urique dans le sang, qui se dépose sous forme de cristaux dans les articulations. Les symptômes de la goutte sont des articulations enflées et douloureuses, avec rougeur et chaleur. La douleur est souvent intense et survient brutalement, généralement la nuit. L'articulation la plus fréquemment touchée est celle du gros orteil, mais la cheville, le genou et le poignet peuvent également être atteints. Pour prévenir la goutte, il est conseillé de réduire la consommation de viandes et d'abats, de boire beaucoup d'eau pour éliminer l'acide urique, et de limiter la consommation d'alcool.",
    "note": "La goutte est une maladie par excès de protides."
  },
  {
    "titre": "Les Lithiases et maladies cardiovasculaires",
    "contenu": "<div style='padding: 16px;'><h3 style='color: #e65100;'>📈 Lithiases et maladies cardiovasculaires</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0;'><div style='background: #fff3e0; padding: 12px; border-radius: 8px; border: 1px solid #e65100;; color: #000000'><h4 style='margin: 0 0 8px 0; color: #e65100;'>🪨 Lithiases (calculs)</h4><p><strong>Cause :</strong> Excès de <strong>sels minéraux</strong> (calcium, oxalate, acide urique)</p><p><strong>Localisation :</strong> Reins, voies urinaires, vésicule biliaire</p><p><strong>Symptômes :</strong> Douleurs intenses (coliques néphrétiques)</p><p><strong>Prévention :</strong> Boire beaucoup d'eau, limiter les aliments riches en calcium et en oxalates</p></div><div style='background: #ffebee; padding: 12px; border-radius: 8px; border: 1px solid #c62828;; color: #000000'><h4 style='margin: 0 0 8px 0; color: #c62828;'>❤️ Maladies cardiovasculaires</h4><p><strong>Cause :</strong> Excès de <strong>lipides</strong> et de <strong>sel</strong> dans l'alimentation</p><p><strong>Pathologies :</strong> Hypertension, infarctus, AVC, athérosclérose</p><p><strong>Symptômes :</strong> Douleurs thoraciques, essoufflement, fatigue</p><p><strong>Prévention :</strong> Réduire les graisses saturées et le sel, activité physique</p></div></div><div style='background: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #4caf50;; color: #000000'><p style='margin: 0; font-weight: bold;'>✅ Mesures de prévention communes :</p><p style='margin: 4px 0 0 0;'>🥗 Alimentation équilibrée, 💧 hydratation suffisante, 🏃 activité physique régulière</p></div></div>",
    "texteParle": "Les lithiases, également appelées calculs, sont des maladies nutritionnelles causées par un excès de sels minéraux comme le calcium, l'oxalate ou l'acide urique dans l'organisme. Ces calculs peuvent se former dans les reins, les voies urinaires ou la vésicule biliaire, et provoquer des douleurs intenses appelées coliques néphrétiques. Pour prévenir les lithiases, il est important de boire beaucoup d'eau et de limiter les aliments riches en calcium et en oxalates. Les maladies cardiovasculaires sont causées par un excès de lipides et de sel dans l'alimentation. Elles incluent l'hypertension, l'infarctus, les accidents vasculaires cérébraux et l'athérosclérose. Les symptômes incluent des douleurs thoraciques, des essoufflements et de la fatigue. Pour prévenir ces maladies, il faut réduire les graisses saturées et le sel, et pratiquer une activité physique régulière. Une alimentation équilibrée, une hydratation suffisante et une activité physique régulière sont les clés de la prévention.",
    "note": "Les lithiases sont causées par un excès de sels minéraux."

  {
    "titre": "Résumé et points clés",
    "contenu": "<div style='padding: 16px; background: linear-gradient(135deg, #1b5e20, #4caf50); border-radius: 12px; color: #ffffff;'><h2 style='color: #ffffff; margin-top: 0;'>📚 Résumé des maladies nutritionnelles</h2><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0;'><div style='background: rgba(255,255,255;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
