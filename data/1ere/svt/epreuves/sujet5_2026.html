<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT",
  "classe": "Première A",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des connaissances",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p>Réponds aux questions suivantes par des réponses courtes et précises.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. a)</strong> Cite quatre constituants des aliments et donne un exemple d'aliment pour chacun. (1 pt)</p>",
          "reponse": "<ul><li><strong>Glucides</strong> : pain, riz, pomme de terre</li><li><strong>Lipides</strong> : huile, beurre, fromage</li><li><strong>Protides</strong> : viande, poisson, œuf</li><li><strong>Vitamines</strong> : fruits, légumes</li></ul>"
        },
        {
          "question": "<p><strong>1. b)</strong> Distingue un aliment simple d'un aliment composé en donnant un exemple pour chacun. (1 pt)</p>",
          "reponse": "<p><strong>Aliment simple</strong> : contient un seul type de nutriment (exemple : sucre blanc = glucide).</p><p><strong>Aliment composé</strong> : contient plusieurs nutriments (exemple : lait = protides, lipides, glucides).</p>"
        },
        {
          "question": "<p><strong>1. c)</strong> Indique le test chimique permettant de caractériser les protéines et la couleur obtenue en cas de résultat positif. (1 pt)</p>",
          "reponse": "<p>Test au Biuret : coloration <strong>violette</strong> en présence de protéines (protides).</p>"
        },
        {
          "question": "<p><strong>1. d)</strong> Pourquoi le goitre est-il considéré comme une maladie nutritionnelle par carence ? (1 pt)</p>",
          "reponse": "<p>Le goitre est dû à une <strong>carence en iode</strong>, un sel minéral essentiel à la synthèse des hormones thyroïdiennes. Sans iode, la thyroïde grossit (goitre) pour tenter de capter davantage d'iode, ce qui peut entraîner des troubles métaboliques.</p>"
        }
      ]
    },
    {
      "titre": "Application 1 : Analyse d'une étiquette alimentaire",
      "points": "5 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Document :</strong> Étiquette d'un lait aromatisé au chocolat.</p><p><strong>Composition pour 100 mL :</strong></p><ul><li>Protides : 3,2 g</li><li>Lipides : 2,6 g</li><li>Glucides : 10,5 g</li><li>Calcium : 120 mg</li><li>Vitamine D : 0,75 µg</li></ul></div>",
      "questions": [
        {
          "question": "<p><strong>2. a)</strong> Calcule la valeur énergétique de 100 mL de ce lait en kilocalories (kcal). (1 pt) (Rappel : 1 g de protides = 4 kcal, 1 g de lipides = 9 kcal, 1 g de glucides = 4 kcal)</p>",
          "reponse": "<p><strong>Énergie totale :</strong></p><p>Protides : 3,2 × 4 = 12,8 kcal</p><p>Lipides : 2,6 × 9 = 23,4 kcal</p><p>Glucides : 10,5 × 4 = 42 kcal</p><p><strong>Total :</strong> 12,8 + 23,4 + 42 = <strong>78,2 kcal</strong> pour 100 mL.</p>"
        },
        {
          "question": "<p><strong>2. b)</strong> Ce lait est-il un aliment simple ou composé ? Justifie ta réponse. (1 pt)</p>",
          "reponse": "<p>C'est un aliment <strong>composé</strong> car il contient plusieurs nutriments : protides, lipides, glucides, calcium et vitamine D.</p>"
        },
        {
          "question": "<p><strong>2. c)</strong> Quel est le rôle du calcium dans l'organisme ? (1 pt)</p>",
          "reponse": "<p>Le calcium est un <strong>sel minéral</strong> qui intervient dans :</p><ul><li>La constitution des os et des dents.</li><li>La contraction musculaire.</li><li>La coagulation sanguine.</li></ul>"
        },
        {
          "question": "<p><strong>2. d)</strong> Une carence en vitamine D peut provoquer le rachitisme chez l'enfant. Explique le lien entre la vitamine D et le calcium. (1 pt)</p>",
          "reponse": "<p>La vitamine D <strong>favorise l'absorption intestinale du calcium</strong>. Sans vitamine D, le calcium contenu dans les aliments est mal absorbé. L'organisme ne peut pas fixer suffisamment de calcium sur les os, ce qui entraîne le rachitisme (déformation osseuse chez l'enfant).</p>"
        },
        {
          "question": "<p><strong>2. e)</strong> Propose un petit-déjeuner équilibré en utilisant ce lait et d'autres aliments. (1 pt)</p>",
          "reponse": "<p><strong>Exemple de petit-déjeuner équilibré :</strong></p><ul><li>1 bol de ce lait aromatisé (ou un yaourt).</li><li>1 tranche de pain complet (glucides complexes, fibres).</li><li>Un peu de beurre (lipides).</li><li>1 fruit frais (vitamines, fibres).</li><li>Un verre d'eau.</li></ul>"
        }
      ]
    },
    {
      "titre": "Application 2 : Maladies nutritionnelles",
      "points": "3 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Document :</strong> Le tableau suivant présente quatre maladies nutritionnelles.</p><table style='width: 100%; border-collapse: collapse;'><tr><th style='border: 1px solid #ccc; padding: 5px;'>Maladie</th><th style='border: 1px solid #ccc; padding: 5px;'>Cause</th></tr><tr><td style='border: 1px solid #ccc; padding: 5px;'>Kwashiorkor</td><td style='border: 1px solid #ccc; padding: 5px;'>A</td></tr><tr><td style='border: 1px solid #ccc; padding: 5px;'>Obésité</td><td style='border: 1px solid #ccc; padding: 5px;'>B</td></tr><tr><td style='border: 1px solid #ccc; padding: 5px;'>Diabète de type 2</td><td style='border: 1px solid #ccc; padding: 5px;'>C</td></tr><tr><td style='border: 1px solid #ccc; padding: 5px;'>Scorbut</td><td style='border: 1px solid #ccc; padding: 5px;'>D</td></tr></table></div>",
      "questions": [
        {
          "question": "<p><strong>3. a)</strong> Associe à chaque maladie sa cause en reliant les lettres A à D aux propositions suivantes : (2 pts)</p><ul><li>Carence en vitamine C</li><li>Carence en protides</li><li>Excès d'apport énergétique</li><li>Excès de sucre et/ou sédentarité</li></ul>",
          "reponse": "<ul><li>Kwashiorkor → Carence en protides (A)</li><li>Obésité → Excès d'apport énergétique (B)</li><li>Diabète de type 2 → Excès de sucre et/ou sédentarité (C)</li><li>Scorbut → Carence en vitamine C (D)</li></ul>"
        },
        {
          "question": "<p><strong>3. b)</strong> Cite une autre maladie due à une carence en sels minéraux et précise le sel minéral concerné. (1 pt)</p>",
          "reponse": "<ul><li><strong>Rachitisme</strong> : carence en <strong>calcium</strong> ou en <strong>vitamine D</strong>.</li><li><strong>Goitre</strong> : carence en <strong>iode</strong>.</li><li><strong>Anémie</strong> : carence en <strong>fer</strong>.</li></ul>"
        }
      ]
    },
    {
      "titre": "Application 3 : Équilibre alimentaire et nutrition",
      "points": "3 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Document :</strong> Le repas d'un adolescent sportif est composé de :</p><ul><li>200 g de pâtes (glucides).</li><li>150 g de steak haché (protides, lipides).</li><li>200 g de légumes verts (vitamines, minéraux, fibres).</li><li>1 yaourt (protides, lipides, calcium).</li></ul></div>",
      "questions": [
        {
          "question": "<p><strong>4. a)</strong> Justifie en quoi ce repas est globalement équilibré. (1 pt)</p>",
          "reponse": "<p>Ce repas est équilibré car il contient :</p><ul><li>Des <strong>glucides</strong> (pâtes) pour fournir de l'énergie.</li><li>Des <strong>protides</strong> (steak, yaourt) pour la construction et la réparation des tissus.</li><li>Des <strong>lipides</strong> (steak, yaourt) pour l'énergie et les fonctions vitales.</li><li>Des <strong>vitamines et minéraux</strong> (légumes, yaourt) pour les réactions métaboliques.</li><li>Des <strong>fibres</strong> (légumes) pour le bon fonctionnement du système digestif.</li></ul><p>La présence des trois macronutriments et de micronutriments est un gage d'équilibre.</p>"
        },
        {
          "question": "<p><strong>4. b)</strong> Quels nutriments manquent-ils ou sont en quantité insuffisante pour un adolescent sportif ? (1 pt)</p>",
          "reponse": "<p><strong>Manque possible :</strong></p><ul><li>Des <strong>légumes secs</strong> (lentilles, haricots) pour des protéines végétales et des fibres.</li><li>Un <strong>fruit</strong> en dessert pour les vitamines (surtout la vitamine C).</li><li>De l'<strong>eau</strong> en quantité suffisante pour l'hydratation.</li></ul><p>Un sportif a des besoins énergétiques plus élevés, donc les portions de glucides (pâtes) peuvent être augmentées ou complétées par des féculents.</p>"
        },
        {
          "question": "<p><strong>4. c)</strong> Comment varierait ce repas pour une personne âgée de 70 ans ayant une activité physique faible ? (1 pt)</p>",
          "reponse": "<p><strong>Pour une personne âgée sédentaire :</strong></p><ul><li>Réduire la quantité de glucides (moins de pâtes) car les besoins énergétiques sont moindres.</li><li>Maintenir un apport en protides pour lutter contre la fonte musculaire.</li><li>Privilégier des légumes cuits (plus faciles à digérer).</li><li>Veiller à un apport suffisant en calcium (yaourt, fromage) pour prévenir l'ostéoporose.</li><li>Assurer une bonne hydratation (eau, soupe).</li></ul>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
