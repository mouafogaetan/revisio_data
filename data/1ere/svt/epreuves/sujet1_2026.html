<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT 1ère A",
  "classe": "Première A",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les constituants des aliments et leur identification",
      "points": "6 pts",
      "enonce": "<p>Pour mieux comprendre la composition des aliments, un élève de Première A réalise des tests de caractérisation sur différents aliments.</p><div style='max-width: 100%; margin: 15px 0; padding: 10px; background: #f5f7fa; border-radius: 8px;'><img alt='Schéma de trois tubes à essai contenant respectivement une solution de glucose, une solution d'amidon et une solution d'albumine. Des flèches indiquent l'ajout des réactifs : Lugol pour l'amidon, liqueur de Fehling pour le glucose et réactif de Biuret pour l'albumine. Les résultats positifs sont représentés : coloration bleu-noir pour le Lugol, précipité rouge brique pour Fehling et coloration violette pour Biuret.' src=''></div><p>Le tableau ci-dessous pr\u00e9sente les r\u00e9sultats obtenus par l'\u00e9l\u00e8ve pour trois aliments A, B et C.</p><div style='max-width: 100%; margin: 15px 0; padding: 10px; background: #f5f7fa; border-radius: 8px;'><table style='width:100%; border-collapse:collapse;'><thead style='background:#e9ecef;'><tr><th style='padding:8px; border:1px solid #ddd;'>Aliment</th><th style='padding:8px; border:1px solid #ddd;'>Test au Lugol</th><th style='padding:8px; border:1px solid #ddd;'>Test \u00e0 la liqueur de Fehling</th><th style='padding:8px; border:1px solid #ddd;'>Test au Biuret</th></tr></thead><tbody><tr><td style='padding:8px; border:1px solid #ddd;'>A</td><td style='padding:8px; border:1px solid #ddd;'>Coloration bleu-noir</td><td style='padding:8px; border:1px solid #ddd;'>Pas de pr\u00e9cipit\u00e9 rouge</td><td style='padding:8px; border:1px solid #ddd;'>Coloration violette</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>B</td><td style='padding:8px; border:1px solid #ddd;'>Pas de coloration bleu-noir</td><td style='padding:8px; border:1px solid #ddd;'>Pr\u00e9cipit\u00e9 rouge brique</td><td style='padding:8px; border:1px solid #ddd;'>Coloration violette</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>C</td><td style='padding:8px; border:1px solid #ddd;'>Pas de coloration bleu-noir</td><td style='padding:8px; border:1px solid #ddd;'>Pas de pr\u00e9cipit\u00e9 rouge</td><td style='padding:8px; border:1px solid #ddd;'>Coloration bleue</td></tr></tbody></table></div>",
      "questions": [
        {
          "question": "<p> Identifie le nutriment contenu dans chacun des aliments A, B et C en justifiant ta r\u00e9ponse \u00e0 partir des r\u00e9sultats des tests.</p>",
          "reponse": "<p><b>Aliment A :</b> contient de l'amidon (test au Lugol positif : coloration bleu-noir) et des protides (test au Biuret positif : coloration violette). C'est un aliment compos\u00e9.</p><p><b>Aliment B :</b> contient du glucose (test \u00e0 la liqueur de Fehling positif : pr\u00e9cipit\u00e9 rouge brique) et des protides (test au Biuret positif : coloration violette). C'est un aliment compos\u00e9.</p><p><b>Aliment C :</b> ne contient ni glucides (tests n\u00e9gatifs), ni protides (test Biuret n\u00e9gatif car une coloration bleue correspond \u00e0 l'absence de protides). Il pourrait contenir des lipides ou des sels min\u00e9raux.</p>"
        },
        {
          "question": "<p> Pr\u00e9cise le r\u00f4le principal de chacun des nutriments identifi\u00e9s chez l'Homme.</p>",
          "reponse": "<p><b>Les glucides (amidon, glucose) :</b> r\u00f4le \u00e9nerg\u00e9tique. Ils fournissent de l'\u00e9nergie rapidement mobilisable, notamment pour les muscles et le cerveau.</p><p><b>Les protides :</b> r\u00f4le structural et fonctionnel. Ils participent \u00e0 la construction et au renouvellement des tissus (muscles, peau, os) et \u00e0 la fabrication d'enzymes et d'anticorps.</p><p><b>Les lipides :</b> r\u00f4le \u00e9nerg\u00e9tique de r\u00e9serve et r\u00f4le structural (membranes cellulaires).</p>"
        },
        {
          "question": "<p> Cite deux autres constituants des aliments qui n'ont pas \u00e9t\u00e9 test\u00e9s et donne un exemple d'aliment qui en est riche.</p>",
          "reponse": "<p><b>Les vitamines :</b> pr\u00e9sentes dans les fruits et les l\u00e9gumes (ex: vitamine C dans l'orange).</p><p><b>Les sels min\u00e9raux :</b> pr\u00e9sents dans les produits laitiers (calcium), les l\u00e9gumes verts (fer) ou le sel de table (sodium, chlore).</p><p>L'eau est \u00e9galement un constituant essentiel des aliments.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'équilibre alimentaire et les besoins énergétiques",
      "points": "8 pts",
      "enonce": "<p>Un adolescent de 16 ans, pratiquant du football en club, souhaite analyser son repas du midi pour v\u00e9rifier s'il est \u00e9quilibr\u00e9. Le repas est compos\u00e9 de :</p><ul><li>150 g de steak hach\u00e9 (5% de mati\u00e8res grasses)</li><li>200 g de p\u00e2tes</li><li>50 g de fromage</li><li>1 yaourt nature (125 g)</li><li>1 pomme (150 g)</li><li>1 verre d'eau</li></ul><p>Les valeurs \u00e9nerg\u00e9tiques et la composition sont fournies dans le tableau ci-dessous :</p><div style='max-width: 100%; margin: 15px 0; padding: 10px; background: #f5f7fa; border-radius: 8px;'><table style='width:100%; border-collapse:collapse;'><thead style='background:#e9ecef;'><tr><th style='padding:8px; border:1px solid #ddd;'>Aliment</th><th style='padding:8px; border:1px solid #ddd;'>Glucides (g/100g)</th><th style='padding:8px; border:1px solid #ddd;'>Lipides (g/100g)</th><th style='padding:8px; border:1px solid #ddd;'>Protides (g/100g)</th><th style='padding:8px; border:1px solid #ddd;'>Valeur \u00e9nerg\u00e9tique (kcal/100g)</th></tr></thead><tbody><tr><td style='padding:8px; border:1px solid #ddd;'>Steak hach\u00e9 5% MG</td><td style='padding:8px; border:1px solid #ddd;'>0</td><td style='padding:8px; border:1px solid #ddd;'>5,0</td><td style='padding:8px; border:1px solid #ddd;'>20,0</td><td style='padding:8px; border:1px solid #ddd;'>130</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>P\u00e2tes cuites</td><td style='padding:8px; border:1px solid #ddd;'>30,0</td><td style='padding:8px; border:1px solid #ddd;'>0,5</td><td style='padding:8px; border:1px solid #ddd;'>5,0</td><td style='padding:8px; border:1px solid #ddd;'>140</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>Fromage</td><td style='padding:8px; border:1px solid #ddd;'>0,5</td><td style='padding:8px; border:1px solid #ddd;'>25,0</td><td style='padding:8px; border:1px solid #ddd;'>20,0</td><td style='padding:8px; border:1px solid #ddd;'>300</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>Yaourt nature</td><td style='padding:8px; border:1px solid #ddd;'>5,0</td><td style='padding:8px; border:1px solid #ddd;'>1,0</td><td style='padding:8px; border:1px solid #ddd;'>4,0</td><td style='padding:8px; border:1px solid #ddd;'>45</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>Pomme</td><td style='padding:8px; border:1px solid #ddd;'>12,0</td><td style='padding:8px; border:1px solid #ddd;'>0,3</td><td style='padding:8px; border:1px solid #ddd;'>0,3</td><td style='padding:8px; border:1px solid #ddd;'>52</td></tr></tbody></table></div>",
      "questions": [
        {
          "question": "<p> Calcule la valeur \u00e9nerg\u00e9tique totale de ce repas en kilocalories (kcal).</p>",
          "reponse": "<p>On calcule la valeur \u00e9nerg\u00e9tique pour chaque aliment :</p><ul><li>Steak : 150 g = 1,5 × 130 = 195 kcal</li><li>P\u00e2tes : 200 g = 2,0 × 140 = 280 kcal</li><li>Fromage : 50 g = 0,5 × 300 = 150 kcal</li><li>Yaourt : 125 g = 1,25 × 45 = 56,25 kcal</li><li>Pomme : 150 g = 1,5 × 52 = 78 kcal</li></ul><p>Total du repas : 195 + 280 + 150 + 56,25 + 78 = <b>759,25 kcal</b></p>"
        },
        {
          "question": "<p> D\u00e9termine la masse de protides, lipides et glucides apport\u00e9e par ce repas.</p>",
          "reponse": "<p><b>Protides :</b></p><ul><li>Steak : 150 × 20/100 = 30,0 g</li><li>P\u00e2tes : 200 × 5/100 = 10,0 g</li><li>Fromage : 50 × 20/100 = 10,0 g</li><li>Yaourt : 125 × 4/100 = 5,0 g</li><li>Pomme : 150 × 0,3/100 = 0,45 g</li></ul><p><b>Total protides : 55,45 g</b></p><p><b>Lipides :</b></p><ul><li>Steak : 150 × 5/100 = 7,5 g</li><li>P\u00e2tes : 200 × 0,5/100 = 1,0 g</li><li>Fromage : 50 × 25/100 = 12,5 g</li><li>Yaourt : 125 × 1/100 = 1,25 g</li><li>Pomme : 150 × 0,3/100 = 0,45 g</li></ul><p><b>Total lipides : 22,70 g</b></p><p><b>Glucides :</b></p><ul><li>P\u00e2tes : 200 × 30/100 = 60,0 g</li><li>Fromage : 50 × 0,5/100 = 0,25 g</li><li>Yaourt : 125 × 5/100 = 6,25 g</li><li>Pomme : 150 × 12/100 = 18,0 g</li></ul><p><b>Total glucides : 84,50 g</b></p>"
        },
        {
          "question": "<p> Ce repas est-il \u00e9quilibr\u00e9 ? Justifie ta r\u00e9ponse en analysant la r\u00e9partition des nutriments.</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
