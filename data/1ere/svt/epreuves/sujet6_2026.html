<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT 1ère A",
  "classe": "Première",
  "sequence": "Séquence 6 : Nutrition, génétique, immunologie et environnement",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Nutrition et équilibre alimentaire",
      "points": "6 pts",
      "enonce": "<p>Un adolescent de 16 ans, sportif, consulte un nutritionniste pour établir un menu équilibré. Voici la composition de son petit-déjeuner type :</p><ul><li>1 bol de lait (250 mL) : glucides 12 g, lipides 8 g, protides 8 g</li><li>2 tartines de pain (60 g) : glucides 30 g, lipides 1 g, protides 6 g</li><li>1 orange (150 g) : glucides 15 g, lipides 0,2 g, protides 1,5 g</li></ul><p>On rappelle les valeurs énergétiques : glucides = 17 kJ/g, lipides = 38 kJ/g, protides = 17 kJ/g.</p><div class='math-block'><div class='math'>$$ \\text{Valeur énergétique} = 17\\text{m}_g + 38\\text{m}_l + 17\\text{m}_p $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) Citer les principaux constituants des aliments et donner leur rôle dans l'organisme.</p>",
          "reponse": "<p>Les principaux constituants des aliments sont :</p><ul><li><strong>Glucides</strong> : source d'énergie rapide pour l'organisme.</li><li><strong>Lipides</strong> : source d'énergie de réserve, constituent les membranes cellulaires.</li><li><strong>Protides</strong> : rôle structural (muscles, tissus) et fonctionnel (enzymes, hormones).</li><li><strong>Vitamines et sels minéraux</strong> : rôle de régulateurs des réactions métaboliques.</li><li><strong>Eau</strong> : constituant majoritaire, milieu des réactions chimiques.</li></ul>"
        },
        {
          "question": "<p><strong>1.2</strong> (2 pts) Calculer la valeur énergétique totale de ce petit-déjeuner en kilojoules (kJ).</p>",
          "reponse": "<p>Valeur énergétique = 17 × (masse totale de glucides) + 38 × (masse totale de lipides) + 17 × (masse totale de protides)</p><p>Glucides totaux = 12 + 30 + 15 = 57 g</p><p>Lipides totaux = 8 + 1 + 0,2 = 9,2 g</p><p>Protides totaux = 8 + 6 + 1,5 = 15,5 g</p><p>Valeur énergétique = 17 × 57 + 38 × 9,2 + 17 × 15,5 = 969 + 349,6 + 263,5 = <strong>1 582,1 kJ</strong></p>"
        },
        {
          "question": "<p><strong>1.3</strong> (1,5 pts) Sachant que les besoins énergétiques quotidiens de cet adolescent sont de 11 500 kJ, analyser si ce petit-déjeuner est adapté (proportion par rapport aux repas de la journée).</p>",
          "reponse": "<p>Le petit-déjeuner représente environ 20 % de l'apport énergétique journalier (1 582,1 / 11 500 ≈ 0,1375 soit 13,8 %). Un petit-déjeuner équilibré doit couvrir environ 20 à 25 % des besoins quotidiens. Ce petit-déjeuner est donc <strong>insuffisant</strong> pour un adolescent sportif. Il faudrait l'enrichir, par exemple avec des fruits secs, un œuf ou des céréales complètes.</p>"
        },
        {
          "question": "<p><strong>1.4</strong> (1,5 pts) Proposer deux améliorations pour rendre ce repas plus équilibré.</p>",
          "reponse": "<p>Deux améliorations possibles :</p><ul><li>Ajouter une source de protéines animales (œuf, jambon, fromage) pour augmenter l'apport en protides.</li><li>Ajouter un fruit (banane, pomme) ou un produit céréalier complet pour augmenter l'apport en glucides complexes et en fibres.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Génétique et hérédité",
      "points": "7 pts",
      "enonce": "<p>Une famille consulte un généticien pour une anomalie héréditaire : la drépanocytose (maladie génétique autosomique récessive). Voici l'arbre généalogique de la famille :</p><ul><li>Les parents I₁ et I₂ sont sains et ont deux enfants : II₁ (fille) atteinte de drépanocytose et II₂ (garçon) sain.</li><li>II₂ épouse une femme saine II₃ (non porteuse). Ils ont deux enfants : III₁ (garçon) sain et III₂ (fille) saine.</li></ul>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) a) Définir le caryotype humain normal. <br>b) Donner la formule chromosomique d'un homme et d'une femme.</p>",
          "reponse": "<p>a) Le <strong>caryotype</strong> est l'ensemble des chromosomes d'une cellule, classés par paire et par taille. Le caryotype humain normal comporte 46 chromosomes (23 paires).</p><p>b) Formule chromosomique :</p><ul><li>Femme : <strong>46, XX</strong></li><li>Homme : <strong>46, XY</strong></li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1,5 pts) a) Définir la drépanocytose. <br>b) Expliquer son mode de transmission à partir de l'arbre généalogique.</p>",
          "reponse": "<p>a) La <strong>drépanocytose</strong> (ou anémie falciforme) est une maladie génétique due à une mutation du gène de l'hémoglobine. Elle se caractérise par la production d'hémoglobine anormale (HbS) qui déforme les globules rouges en forme de faucille.</p><p>b) L'arbre montre que la fille II₁ est atteinte alors que ses deux parents sont sains. La maladie est donc <strong>récessive</strong> (les parents sont porteurs sains). La transmission est <strong>autosomique</strong> (non liée au sexe) car elle touche aussi bien les hommes que les femmes.</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (2 pts) a) Écrire les génotypes des individus I₁, I₂ et II₁. <br>b) Calculer le risque pour II₂ et sa femme d'avoir un enfant atteint (sachant que II₂ est porteur et II₃ est non porteuse).</p>",
          "reponse": "<p>a) Génotypes :</p><ul><li>I₁ et I₂ (parents sains mais porteurs) : <strong>Aa</strong> (A = allèle normal, a = allèle drépanocytaire)</li><li>II₁ (fille atteinte) : <strong>aa</strong></li></ul><p>b) Si II₂ est porteur (Aa) et II₃ est non porteuse (AA) :</p><p>Tableau de croisement :</p><ul><li>Gamètes de II₂ : A ou a</li><li>Gamètes de II₃ : A ou A</li><li>Génotypes possibles : AA (50 %) et Aa (50 %)</li><li>Risque d'avoir un enfant atteint (aa) : <strong>0 %</strong></li></ul>"
        },
        {
          "question": "<p><strong>2.4</strong> (1,5 pts) a) Définir le daltonisme. <br>b) En quoi son mode de transmission diffère-t-il de celui de la drépanocytose ?</p>",
          "reponse": "<p>a) Le <strong>daltonisme</strong> est une anomalie de la vision des couleurs, due à une mutation d'un gène porté par le chromosome X. C'est une maladie <strong>héréditaire liée au sexe</strong> (gonosomale).</p><p>b) Différence :</p><ul><li>La drépanocytose est une maladie <strong>autosomique</strong> (gène sur un autosome).</li><li>Le daltonisme est une maladie <strong>gonosomale</strong> (gène sur le chromosome X).</li><li>Le daltonisme touche préférentiellement les hommes (un seul allèle muté suffit car ils n'ont qu'un chromosome X), alors que la drépanocytose touche les deux sexes de manière égale.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Immunologie et santé reproductive",
      "points": "4 pts",
      "enonce": "<p>Le VIH (Virus de l'Immunodéficience Humaine) est responsable du SIDA. Il infecte certaines cellules du système immunitaire.</p><p>On rappelle que le VIH se transmet par voie sanguine, sexuelle et de la mère à l'enfant.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) a) Citer les principales cellules du système immunitaire. <br>b) Laquelle est spécifiquement ciblée par le VIH ?</p>",
          "reponse": "<p>a) Les principales cellules immunitaires sont :</p><ul><li><strong>Phagocytes</strong> (macrophages, neutrophiles)</li><li><strong>Lymphocytes B</strong> (production d'anticorps)</li><li><strong>Lymphocytes T4</strong> (lymphocytes auxiliaires)</li><li><strong>Lymphocytes T8</strong> (lymphocytes cytotoxiques)</li></ul><p>b) Le VIH cible spécifiquement les <strong>lymphocytes T4</strong> (CD4+).</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (1 pt) Expliquer le mode d'action du VIH et ses conséquences sur le système immunitaire.</p>",
          "reponse": "<p>Le VIH pénètre dans les lymphocytes T4, il intègre son matériel génétique dans l'ADN de la cellule hôte et se multiplie à l'intérieur. Cela détruit les lymphocytes T4 et réduit leur nombre.</p><p>La destruction des lymphocytes T4 entraîne une <strong>immunodéficience</strong> : le système immunitaire est affaibli, ce qui rend l'organisme vulnérable aux <strong>infections opportunistes</strong> (tuberculose, pneumocystose, etc.) et à certains cancers.</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) Citer les modes de contamination du VIH.</p>",
          "reponse": "<p>Les modes de contamination du VIH sont :</p><ul><li><strong>Voie sexuelle</strong> (rapports non protégés)</li><li><strong>Voie sanguine</strong> (transfusion sanguine, partage de seringues)</li><li><strong>Transmission materno-fœtale</strong> (de la mère à l'enfant pendant la grossesse, l'accouchement ou l'allaitement)</li></ul>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) a) Distinguer deux méthodes contraceptives. <br>b) Expliquer le rôle de la césarienne dans la prévention de la transmission mère-enfant du VIH.</p>",
          "reponse": "<p>a) Deux méthodes contraceptives :</p><ul><li><strong>Méthode barrière</strong> : préservatif (masculin ou féminin).</li><li><strong>Méthode hormonale</strong> : pilule contraceptive, implant, stérilet hormonal.</li></ul><p>b) La <strong>césarienne programmée</strong> réduit le risque de transmission du VIH de la mère à l'enfant en évitant le contact prolongé du nouveau-né avec les sécrétions maternelles et le sang lors de l'accouchement vaginal.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Environnement et développement durable",
      "points": "3 pts",
      "enonce": "<p>Les déchets ménagers sont un enjeu majeur pour l'environnement. On distingue les déchets biodégradables et non biodégradables.</p><p>Dans une commune, la collecte des déchets rapporte 150 kg de déchets par habitant et par an, dont 60 % sont biodégradables.</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) Classer les déchets suivants en biodégradables ou non biodégradables : épluchures de fruits, bouteille en plastique, verre, marc de café, papier, piles usagées.</p>",
          "reponse": "<p><strong>Biodégradables</strong> : épluchures de fruits, marc de café, papier.</p><p><strong>Non biodégradables</strong> : bouteille en plastique, verre, piles usagées.</p>"
        },
        {
          "question": "<p><strong>4.2</strong> (1 pt) Calculer la masse de déchets biodégradables produits par cette commune de 50 000 habitants en un an.</p>",
          "reponse": "<p>Déchets par habitant et par an = 150 kg</p><p>Déchets biodégradables par habitant = 150 × 0,60 = 90 kg</p><p>Pour 50 000 habitants : 90 × 50 000 = <strong>4 500 000 kg = 4 500 tonnes</strong></p>"
        },
        {
          "question": "<p><strong>4.3</strong> (1 pt) a) Expliquer la technique du compostage. <br>b) Citer un autre procédé de valorisation des déchets.</p>",
          "reponse": "<p>a) Le <strong>compostage</strong> est un procédé de transformation des déchets organiques (biodégradables) en un fertilisant naturel appelé compost. Il se fait par décomposition aérobie (en présence d'oxygène) grâce à l'action de micro-organismes (bactéries, champignons) et de petits invertébrés (vers de terre).</p><p>b) Un autre procédé de valorisation est le <strong>recyclage</strong> (transformation des déchets en nouveaux produits, comme le verre, le plastique, le papier). On peut aussi citer la <strong>fermentation</strong> (production de biogaz).</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
