<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVT 1ère A",
 "classe": "Première",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Équilibre alimentaire et besoins énergétiques",
     "points": "4 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Une élève de 17 ans, de poids normal (55 kg), pratique une activité sportive modérée (1h de marche par jour). Ses besoins énergétiques quotidiens sont estimés à 2200 kcal.</p><p>Voici la composition de son petit-déjeuner :</p><ul style='list-style-type: disc; padding-left: 20px;'><li>1 bol de lait (250 mL) : 120 kcal, protides 8g, glucides 12g, lipides 5g</li><li>2 tartines de pain complet (60g) : 150 kcal, protides 6g, glucides 30g, lipides 1g</li><li>1 portion de beurre (10g) : 75 kcal, protides 0g, glucides 0g, lipides 8g</li><li>1 fruit (orange, 150g) : 60 kcal, protides 1g, glucides 14g, lipides 0g</li></ul></div>",
     "questions": [
       {
         "question": "<p> Calculer la valeur énergétique totale de ce petit-déjeuner. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Valeur énergétique totale = 120 + 150 + 75 + 60 = <strong>405 kcal</strong>.</p>"
       },
       {
         "question": "<p> Calculer la contribution énergétique de chaque nutriment (protides, glucides, lipides) en pourcentage des apports totaux. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les apports énergétiques sont de 4 kcal/g pour les glucides et protides, 9 kcal/g pour les lipides.</p><p>Glucides : (12 + 30 + 14) × 4 = 56 × 4 = 224 kcal, soit 224/405 × 100 = <strong>55,3%</strong></p><p>Protides : (8 + 6 + 1) × 4 = 15 × 4 = 60 kcal, soit 60/405 × 100 = <strong>14,8%</strong></p><p>Lipides : (5 + 1 + 8) × 9 = 14 × 9 = 126 kcal, soit 126/405 × 100 = <strong>31,1%</strong></p>"
       },
       {
         "question": "<p> Ce petit-déjeuner est-il équilibré ? Justifier en comparant avec les apports recommandés (glucides 50-55%, protides 12-15%, lipides 30-35%). (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les apports en glucides (55,3%) et en lipides (31,1%) sont dans les normes recommandées. L'apport en protides (14,8%) est également satisfaisant. Ce petit-déjeuner est donc équilibré. Toutefois, il ne représente que 405/2200 ≈ 18,4% des besoins quotidiens, ce qui est insuffisant pour un repas du matin (idéalement 20-25%).</p>"
       }
     ]
   },
   {
     "titre": "Analyse d'un arbre généalogique : la drépanocytose",
     "points": "6 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>La drépanocytose est une maladie génétique affectant l'hémoglobine. Elle est due à une mutation du gène de la β-globine situé sur l'autosome 11.</p><p>L'arbre généalogique ci-dessous représente une famille touchée par la drépanocytose. Les individus malades sont représentés en noir.</p><div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529; margin: 10px 0;'><p style='margin: 0;'>📊 Légende de l'arbre généalogique (à visualiser) :</p><ul style='list-style-type: disc; padding-left: 20px;'><li>I1 et I2 : parents sains (non malades)</li><li>II1, II2, II3 : trois enfants : II1 et II2 sont sains, II3 est malade</li></ul></div><p>On donne les allèles : <span style='font-style: italic;'>A</span> (normal) dominant, <span style='font-style: italic;'>S</span> (drépanocytaire) récessif.</p></div>",
     "questions": [
       {
         "question": "<p> Déterminer le génotype des parents I1 et I2. Justifier la réponse. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les parents sont sains mais ont un enfant malade. Le caractère malade étant récessif (génotype SS), chaque parent a forcément transmis un allèle S. Leur génotype est donc <strong>A//S</strong> (hétérozygotes).</p>"
       },
       {
         "question": "<p> Quelle est la probabilité que l'individu II1 (sain) soit porteur sain de la maladie ? (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les parents étant A//S et A//S, la descendance possible est : AA (1/4), AS (1/2), SS (1/4). L'individu II1 étant sain, il ne peut pas être SS. Il est donc soit AA (probabilité 1/3) soit AS (probabilité 2/3). La probabilité qu'il soit porteur sain (AS) est donc de <strong>2/3</strong>.</p>"
       },
       {
         "question": "<p> Si l'individu II1 (porteur sain) a un enfant avec une personne saine non porteuse (AA), quelle est la probabilité que l'enfant soit atteint de drépanocytose ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le croisement est A//S × A//A. Les génotypes possibles sont : AA (1/2) et AS (1/2). Aucun enfant ne sera SS. La probabilité d'avoir un enfant atteint de drépanocytose est donc de <strong>0%</strong>.</p>"
       },
       {
         "question": "<p> Déterminer la formule chromosomique de l'individu I1 si son caryotype est normal. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> S'il s'agit d'un homme, la formule est <strong>46, XY</strong>. S'il s'agit d'une femme, la formule est <strong>46, XX</strong>. La question ne précise pas le sexe, les deux réponses sont acceptables.</p>"
       },
       {
         "question": "<p> Qu'est-ce qu'une maladie autosomique récessive ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Une maladie autosomique récessive est une maladie due à un allèle récessif situé sur un chromosome non sexuel (autosome). Elle ne s'exprime que chez les individus possédant deux copies de l'allèle muté (génotype homozygote).</p>"
       }
     ]
   },
   {
     "titre": "Le système immunitaire et le VIH/SIDA",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Le VIH (Virus de l'Immunodéficience Humaine) est responsable du SIDA (Syndrome d'Immuno-Déficience Acquise). Il infecte certaines cellules du système immunitaire.</p></div>",
     "questions": [
       {
         "question": "<p> Quelles sont les cellules cibles du VIH dans le système immunitaire ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le VIH cible principalement les <strong>lymphocytes T4</strong> (ou lymphocytes T auxiliaires/CD4). Il peut aussi infecter les macrophages et les cellules dendritiques.</p>"
       },
       {
         "question": "<p> Expliquer comment le VIH se multiplie dans l'organisme et les conséquences sur le système immunitaire. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le VIH se fixe sur les récepteurs CD4 des lymphocytes T4, puis y pénètre. Il reverse son ARN en ADN grâce à l'enzyme transcriptase inverse, puis intègre son génome dans celui de la cellule hôte. Il utilise ensuite la machinerie de la cellule pour se multiplier. La destruction progressive des lymphocytes T4 entraîne une <strong>immunodéficience</strong>, rendant l'organisme vulnérable aux infections dites opportunistes.</p>"
       },
       {
         "question": "<p> Citer deux modes de contamination du VIH. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le VIH se transmet par : (1) <strong>voie sexuelle</strong> (rapports non protégés), (2) <strong>voie sanguine</strong> (transfusion de sang contaminé, partage d'aiguilles), (3) <strong>voie mère-enfant</strong> (pendant la grossesse, l'accouchement ou l'allaitement).</p>"
       },
       {
         "question": "<p> Qu'est-ce qu'une maladie opportuniste ? Donner un exemple. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Une maladie opportuniste est une infection ou une tumeur qui profite de l'affaiblissement du système immunitaire pour se développer. Exemples : la <strong>tuberculose</strong>, la <strong>pneumocystose</strong>, le <strong>sarcome de Kaposi</strong>, ou la <strong>cryptococcose</strong>.</p>"
       }
     ]
   },
   {
     "titre": "Gestion des déchets et développement durable",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Dans une commune, la population produit quotidiennement 5 tonnes de déchets ménagers. La municipalité souhaite mettre en place une politique de valorisation des déchets.</p></div>",
     "questions": [
       {
         "question": "<p> Classer les déchets suivants en biodégradables et non biodégradables : épluchures de fruits, bouteille en plastique, papier journal, pile électrique, feuilles mortes, canette en aluminium. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> <strong>Biodégradables</strong> : épluchures de fruits, papier journal (sauf encres toxiques), feuilles mortes.<br><strong>Non biodégradables</strong> : bouteille en plastique, pile électrique, canette en aluminium.</p>"
       },
       {
         "question": "<p> Expliquer le processus de compostage et ses avantages. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le compostage est un processus de décomposition aérobie des déchets organiques par des micro-organismes (bactéries, champignons) et des invertébrés (vers de terre). Il produit un fertilisant naturel appelé compost. <strong>Avantages</strong> : réduction des déchets enfouis, production d'engrais naturel, amélioration de la structure du sol, réduction des émissions de méthane (gaz à effet de serre).</p>"
       },
       {
         "question": "<p> Expliquer brièvement le recyclage du verre et du plastique. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le <strong>verre</strong> est collecté, trié par couleur, broyé (calcin), puis refondu avec du sable pour fabriquer de nouveaux objets. Le <strong>plastique</strong> est trié par type (PET, PEHD, etc.), lavé, broyé en paillettes, puis transformé en granulés pour fabriquer de nouveaux produits.</p>"
       },
       {
         "question": "<p> Quelles sont les conséquences d'une mauvaise gestion des déchets sur l'environnement et la santé humaine ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les conséquences sont : pollution des sols et des nappes phréatiques (lixiviats), pollution de l'air (émissions de gaz toxiques), prolifération de vecteurs de maladies (moustiques, rats), risques de maladies respiratoires et cutanées pour les riverains, et impact négatif sur les écosystèmes.</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
