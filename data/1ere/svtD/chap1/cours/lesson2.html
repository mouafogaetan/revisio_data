<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en cours de SVT",
    "contenu": "<div style='text-align: center; padding: 15px;'><h2 style='color: #2c3e50;'>🧬 Leçon 2 : Structure et composition chimique d'un chromosome</h2><p style='font-size: 1.1em; color: #34495e; margin-top: 15px;'>Classe : Première D</p><p style='font-size: 1em; color: #7f8c8d;'>Lycée de [Votre établissement]</p><div style='background: #8e44ad; color: white; padding: 15px; border-radius: 10px; margin-top: 20px;'><p style='margin: 0; font-size: 1.1em;'>🎯 Objectifs de la leçon :</p><ul style='text-align: left; list-style-type: none; padding: 0;'><li>✓ Décrire la structure d'un chromosome</li><li>✓ Expliquer la structure en double hélice de l'ADN</li><li>✓ Définir la notion de gène</li><li>✓ Décrire le mécanisme de la réplication de l'ADN</li><li>✓ Définir le test d'ADN et ses utilités</li></ul></div></div>",
    "texteParle": "Bonjour à tous et bienvenue en cours de Sciences de la Vie et de la Terre. Aujourd'hui, nous allons aborder la leçon numéro 2 qui s'intitule Structure et composition chimique d'un chromosome. Cette leçon est fondamentale car elle nous permet de comprendre comment l'information génétique est organisée et transmise dans nos cellules. Nous allons découvrir la structure des chromosomes, la molécule d'ADN qui les compose, sa structure en double hélice, la notion de gène, et le mécanisme de la réplication de l'ADN. Nous verrons également comment ces connaissances sont appliquées dans les tests d'ADN. C'est une leçon passionnante qui nous plonge au cœur de la génétique.",
    "note": "Les chromosomes sont les supports de l'information génétique."
  },
  {
    "titre": "Qu'est-ce qu'un chromosome ?",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>Un <strong>chromosome</strong> est une structure présente dans le noyau des cellules eucaryotes, constituée d'une molécule d'<strong>ADN</strong> associée à des protéines appelées <strong>histones</strong>.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques :</h4><ul style='list-style-type: none; padding: 0;'><li>🧬 Chaque espèce possède un nombre caractéristique de chromosomes</li><li>🧬 L'Homme possède <strong>46 chromosomes</strong> (23 paires)</li><li>🧬 Les chromosomes contiennent l'<strong>information génétique</strong></li></ul></div></div>",
    "texteParle": "Commençons par définir ce qu'est un chromosome. Un chromosome est une structure qui se trouve dans le noyau de nos cellules. Il est constitué d'une très longue molécule d'ADN qui est associée à des protéines appelées histones. Chaque espèce possède un nombre caractéristique de chromosomes. Par exemple, l'espèce humaine possède 46 chromosomes, organisés en 23 paires. C'est dans les chromosomes que se trouve toute l'information génétique qui détermine nos caractéristiques héréditaires.",
    "note": "Les chromosomes sont visibles au microscope lors de la division cellulaire."
  },
  {
    "titre": "Structure d'un chromosome",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Composition d'un chromosome :</h3><ul><li><strong>ADN</strong> : acide désoxyribonucléique (support de l'information génétique)</li><li><strong>Histones</strong> : protéines autour desquelles l'ADN s'enroule</li><li><strong>Chromatine</strong> : complexe ADN + histones</li></ul></div><div style='background: #ecf0f1; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Organisation :</h4><p style='text-align: center;'><span style='color: #2980b9;'>ADN</span> <span style='color: #f1c40f;'>→</span> <span style='color: #27ae60;'>Chromatine</span> <span style='color: #f1c40f;'>→</span> <span style='color: #8e44ad;'>Chromosome</span></p><p>L'ADN s'enroule autour des histones, formant des nucléosomes, qui se compactent pour former la chromatine, puis le chromosome.</p></div></div>",
    "texteParle": "Un chromosome est composé d'ADN et de protéines appelées histones. L'ADN est le support de l'information génétique, tandis que les histones permettent de compacter l'ADN dans le noyau. L'ensemble ADN + histones forme la chromatine. Pour comprendre l'organisation, imaginez que l'ADN est un long fil qui s'enroule autour de petites bobines que sont les histones. Ces bobines s'assemblent pour former la chromatine, qui se compacte encore davantage pour former le chromosome lors de la division cellulaire.",
    "note": "La compaction de l'ADN permet de le faire tenir dans le noyau."
  },
  {
    "titre": "L'ADN : le support de l'information génétique",
    "contenu": "<div style='padding: 10px;'><div style='background: #fdedec; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c;'><h3 style='color: #2c3e50; margin-top: 0;'>L'ADN : acide désoxyribonucléique</h3><ul><li>• C'est une <strong>macromolécule</strong> présente dans le noyau</li><li>• Elle est composée de <strong>nucléotides</strong></li><li>• Chaque nucléotide est formé de : un sucre (désoxyribose), un groupe phosphate, une base azotée</li></ul></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Les bases azotées :</h4><p><span style='color: #2980b9;'>A</span> = Adénine, <span style='color: #27ae60;'>T</span> = Thymine, <span style='color: #e74c3c;'>G</span> = Guanine, <span style='color: #f1c40f;'>C</span> = Cytosine</p></div></div>",
    "texteParle": "L'ADN, ou acide désoxyribonucléique, est le support de l'information génétique. C'est une très longue molécule composée de l'assemblage de petites unités appelées nucléotides. Chaque nucléotide est composé de trois éléments : un sucre appelé désoxyribose, un groupe phosphate, et une base azotée. Il existe quatre bases azotées différentes : l'adénine (A), la thymine (T), la guanine (G) et la cytosine (C). C'est la séquence de ces bases qui constitue l'information génétique.",
    "note": "La séquence des bases azotées est le langage de l'information génétique."
  },
  {
    "titre": "La structure en double hélice de l'ADN",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Modèle de Watson et Crick (1953) :</h3><ul><li>• Deux chaînes de nucléotides <strong>antiparallèles</strong></li><li>• Elles s'enroulent en une <strong>double hélice</strong></li><li>• Les bases sont reliées par des <strong>liaisons hydrogène</strong></li><li>• <strong>Complémentarité des bases</strong> : A-T et G-C</li></ul></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Règle de complémentarité :</h4><p style='text-align: center; font-size: 1.1em;'><span style='color: #2980b9;'>A</span> = <span style='color: #27ae60;'>T</span> et <span style='color: #e74c3c;'>G</span> = <span style='color: #f1c40f;'>C</span></p></div></div>",
    "texteParle": "La structure de l'ADN a été élucidée en 1953 par les scientifiques Watson et Crick. Selon leur modèle, l'ADN est composé de deux chaînes de nucléotides qui s'enroulent en une double hélice, comme un escalier en colimaçon. Les deux chaînes sont antiparallèles, c'est-à-dire qu'elles sont orientées en sens inverse. Les bases azotées sont reliées entre elles par des liaisons hydrogène, selon une règle de complémentarité très stricte : l'adénine (A) s'associe toujours avec la thymine (T), et la guanine (G) s'associe toujours avec la cytosine (C). C'est cette complémentarité qui est à la base de la réplication de l'ADN.",
    "note": "La double hélice de l'ADN est comme une échelle torsadée."
  },
  {
    "titre": "La notion de gène",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition d'un gène :</h3><p style='font-size: 1.1em;'>Un <strong>gène</strong> est un <strong>segment d'ADN</strong> qui contient l'information nécessaire à la synthèse d'une <strong>protéine</strong> ou d'un <strong>ARN</strong>.</p></div><div style='background: #ecf0f1; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques :</h4><ul><li>• Chaque gène occupe une position fixe sur un chromosome : le <strong>locus</strong></li><li>• Les gènes sont responsables des <strong>caractères héréditaires</strong></li><li>• Un chromosome peut contenir des milliers de gènes</li></ul></div></div>",
    "texteParle": "Un gène est un fragment d'ADN qui porte une information précise. En général, un gène contient les instructions nécessaires à la fabrication d'une protéine. Chaque gène occupe une position fixe et spécifique sur un chromosome, qu'on appelle le locus. C'est l'ensemble des gènes d'un individu, son génome, qui détermine ses caractéristiques héréditaires. Un chromosome peut contenir des milliers de gènes disposés les uns à la suite des autres comme des perles sur un collier.",
    "note": "Les gènes sont les unités de base de l'hérédité."
  },
  {
    "titre": "L'organisation des gènes sur les chromosomes",
    "contenu": "<div style='padding: 10px;'><div style='background: #fef9e7; padding: 15px; border-radius: 10px; border-left: 5px solid #f1c40f;'><h3 style='color: #2c3e50; margin-top: 0;'>Organisation du génome :</h3><ul><li>• Les gènes sont disposés <strong>linéairement</strong> sur les chromosomes</li><li>• Entre les gènes se trouvent des <strong>séquences non codantes</strong></li><li>• Certaines séquences non codantes ont un rôle régulateur</li></ul></div><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Le génome humain :</h4><ul><li>• Environ <strong>20 000 à 25 000 gènes</strong></li><li>• Les gènes ne représentent qu'environ <strong>2%</strong> de l'ADN total</li><li>• Le reste est constitué de séquences non codantes</li></ul></div></div>",
    "texteParle": "Les gènes ne sont pas les seuls éléments présents sur l'ADN. Ils sont disposés de manière linéaire sur les chromosomes, et entre eux se trouvent de longues séquences qui ne codent pas pour des protéines. Ces séquences, appelées séquences non codantes, représentent la majorité de l'ADN humain. Certaines d'entre elles ont un rôle important dans la régulation de l'expression des gènes. Le génome humain contient environ 20 000 à 25 000 gènes, ce qui ne représente que 2% de l'ensemble de notre ADN. Le reste est parfois appelé ADN poubelle, mais ce terme est trompeur car de nombreuses séquences non codantes ont des fonctions importantes.",

  {
    "titre": "La réplication de l'ADN",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>La <strong>réplication</strong> est le mécanisme par lequel une molécule d'ADN est dupliquée pour donner deux molécules identiques.</p></div><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques :</h4><ul><li>• Réplication <strong>semi-conservative</strong></li><li>• Chaque nouvelle molécule d'ADN contient un brin ancien et un brin nouveau</li><li>• Se produit pendant l'<strong>interphase</strong> (phase S)</li></ul></div></div>",
    "texteParle": "Avant chaque division cellulaire, l'ADN doit être dupliqué pour que chaque cellule fille reçoive une copie complète du patrimoine génétique. Ce processus de duplication s'appelle la réplication de l'ADN. Elle est dite semi-conservative car chaque nouvelle molécule d'ADN est composée d'un brin ancien (conservé) et d'un brin nouvellement synthétisé. La réplication se produit pendant l'interphase, plus précisément pendant la phase S du cycle cellulaire.",
    "note": "La réplication semi-conservative garantit la transmission fidèle de l'information génétique."

    "texteParle": "Le mécanisme de la réplication se déroule en plusieurs étapes. D'abord, les deux brins de l'ADN se séparent grâce à une enzyme appelée hélicase, formant ce qu'on appelle une fourche de réplication. Ensuite, chaque brin sert de modèle ou de matrice pour la synthèse d'un nouveau brin. Cette synthèse est réalisée par une enzyme appelée ADN polymérase, qui ajoute les nucléotides complémentaires : une adénine en face d'une thymine, et une guanine en face d'une cytosine. Enfin, des enzymes de réparation corrigent les éventuelles erreurs pour garantir la fidélité de la réplication.",
    "note": "L'ADN polymérase est l'enzyme clé de la réplication."

    "texteParle": "La nature semi-conservative de la réplication a été démontrée par l'expérience de Meselson et Stahl en 1958. Ils ont utilisé deux isotopes de l'azote : l'azote lourd (¹⁵N) et l'azote léger (¹⁴N). En cultivant des bactéries dans un milieu contenant de l'azote lourd, puis en les transférant dans un milieu contenant de l'azote léger, ils ont observé que les molécules d'ADN obtenues après une génération étaient hybrides (contenant à la fois de l'azote lourd et de l'azote léger). Cela prouve que chaque nouvelle molécule conserve un brin de l'ADN parental (ancien) et contient un brin nouvellement synthétisé.",
    "note": "L'expérience de Meselson et Stahl est une expérience historique de la biologie moléculaire."

  {
    "titre": "La nécessité de la réplication",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Pourquoi la réplication est-elle nécessaire ?</h3><ul><li>• Avant chaque <strong>division cellulaire</strong> (mitose ou méiose)</li><li>• Pour que chaque cellule fille reçoive une copie <strong>identique</strong> du patrimoine génétique</li><li>• Pour assurer la <strong>transmission fidèle</strong> de l'information génétique d'une génération à l'autre</li><li>• Pour maintenir l'<strong>identité biologique</strong> des organismes</li></ul></div></div>",
    "texteParle": "La réplication de l'ADN est un processus essentiel pour la vie. Elle est nécessaire avant chaque division cellulaire, que ce soit la mitose ou la méiose. En effet, lorsque la cellule se divise, chaque cellule fille doit recevoir une copie complète et identique du patrimoine génétique. Sans réplication, les cellules filles ne recevraient que la moitié de l'information génétique et ne pourraient pas survivre. C'est donc la réplication de l'ADN qui assure la transmission fidèle de l'information génétique d'une génération à l'autre et qui maintient l'identité biologique des organismes.",

    "texteParle": "Un test d'ADN est une analyse génétique qui permet d'identifier un individu ou d'établir des liens de parenté. Il repose sur le principe que chaque individu possède un ADN unique (à l'exception des vrais jumeaux). Les tests d'ADN ont de nombreuses applications. Dans le domaine judiciaire, ils permettent d'identifier des criminels ou des victimes. En médecine légale, ils servent à reconnaître les victimes de catastrophes. En recherche de paternité, ils permettent de déterminer avec une très grande certitude les liens de filiation. En médecine, ils sont utilisés pour diagnostiquer des maladies génétiques. En anthropologie, ils aident à retracer les migrations humaines.",

    "texteParle": "Un test d'ADN se déroule en plusieurs étapes. D'abord, on prélève un échantillon de cellules, qui peut être du sang, de la salive, des cheveux, etc. Ensuite, on extrait l'ADN des cellules. On amplifie ensuite l'ADN par une technique appelée PCR, la réaction en chaîne par polymérase, qui permet d'obtenir une quantité suffisante d'ADN pour l'analyse. Enfin, on analyse les profils génétiques, c'est-à-dire qu'on compare les séquences d'ADN de l'échantillon avec celles d'une autre personne ou d'une base de données. L'interprétation des résultats permet de déterminer s'il y a correspondance.",

    "texteParle": "Pour terminer cette leçon, retenons les points essentiels. Un chromosome est composé d'ADN associé à des protéines appelées histones. L'ADN a une structure en double hélice, avec une complémentarité des bases : l'adénine s'associe avec la thymine, et la guanine avec la cytosine. Un gène est un segment d'ADN qui contient l'information pour fabriquer une protéine. La réplication de l'ADN est semi-conservative : chaque nouvelle molécule contient un brin ancien et un brin nouveau. Elle est nécessaire avant chaque division cellulaire pour assurer la transmission fidèle de l'information génétique. Enfin, le test d'ADN permet l'identification des individus et la recherche en paternité. Merci pour votre attention et à bientôt pour le prochain cours !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';

        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';

        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {

    });
