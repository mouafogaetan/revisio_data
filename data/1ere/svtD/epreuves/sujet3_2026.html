<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>

            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <main class="slide-body" id="slideBody"></main>

                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>

            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVT 1ère D",
 "classe": "Première D",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Le cycle du carbone",
     "points": "8 pts",
     "enonce": "<p>Le carbone est un \u00e9l\u00e9ment chimique essentiel \u00e0 la vie sur Terre. Il circule en permanence entre diff\u00e9rents r\u00e9servoirs. Le document ci-dessous sch\u00e9matise ce cycle biog\u00e9ochimique.</p><div style='max-width: 100%; margin: 15px 0; padding: 10px; background: #f5f7fa; border-radius: 8px;'><img alt='Sch\u00e9ma du cycle du carbone montrant les r\u00e9servoirs (atmosph\u00e8re, v\u00e9g\u00e9taux, animaux, sol, oc\u00e9ans, roches carbonat\u00e9es, combustibles fossiles) et les fl\u00e8ches illustrant les flux principaux (photosynth\u00e8se, respiration, d\u00e9composition, combustion, \u00e9changes oc\u00e9aniques).' src=''></div>",
     "questions": [
       {
         "question": "<p> Identifie les quatre principaux r\u00e9servoirs de carbone pr\u00e9sents \u00e0 la surface de la Terre.</p>",
         "reponse": "<p>Les quatre principaux r\u00e9servoirs de carbone sont :</p><ul><li><b>L'atmosph\u00e8re</b> : sous forme de dioxyde de carbone (CO₂) et de m\u00e9thane (CH₄).</li><li><b>La biomasse</b> : v\u00e9g\u00e9taux (for\u00eats), animaux et micro-organismes.</li><li><b>Les oc\u00e9ans</b> : carbone dissous dans l'eau et organismes marins.</li><li><b>Les roches s\u00e9dimentaires et combustibles fossiles</b> : calcaires, charbon, p\u00e9trole, gaz naturel.</li></ul>"
       },
       {
         "question": "<p> D\u00e9cris les flux de carbone entre l'atmosph\u00e8re et la biomasse terrestre. Pr\u00e9cise leur sens et les processus biologiques impliqu\u00e9s.</p>",
         "reponse": "<p>Les \u00e9changes entre l'atmosph\u00e8re et la biomasse terrestre se font dans les deux sens :</p><ul><li><b>Flux de l'atmosph\u00e8re vers la biomasse :</b> la <b>photosynth\u00e8se</b> permet aux v\u00e9g\u00e9taux de capter le CO₂ atmosph\u00e9rique et de le transformer en mati\u00e8re organique (glucides).</li><li><b>Flux de la biomasse vers l'atmosph\u00e8re :</b> la <b>respiration</b> des v\u00e9g\u00e9taux et des animaux lib\u00e8re du CO₂ dans l'atmosph\u00e8re. La <b>d\u00e9composition</b> de la mati\u00e8re organique par les micro-organismes du sol produit \u00e9galement du CO₂.</li></ul>"
       },
       {
         "question": "<p> Explique en quoi les activit\u00e9s humaines perturbent le cycle du carbone.</p>",
         "reponse": "<p>Les activit\u00e9s humaines perturbent le cycle du carbone de plusieurs mani\u00e8res :</p><ul><li><b>La combustion des \u00e9nergies fossiles</b> (charbon, p\u00e9trole, gaz) lib\u00e8re dans l'atmosph\u00e8re du CO₂ qui \u00e9tait stock\u00e9 dans les roches depuis des millions d'ann\u00e9es.</li><li><b>La d\u00e9forestation</b> r\u00e9duit la quantit\u00e9 de v\u00e9g\u00e9taux et donc la capacit\u00e9 de photosynth\u00e8se, diminuant ainsi l'absorption du CO₂ atmosph\u00e9rique.</li><li><b>L'agriculture intensive</b> lib\u00e8re du carbone stock\u00e9 dans les sols et \u00e9met du m\u00e9thane (CH₄).</li></ul><p>Ces perturbations provoquent une augmentation de la concentration des gaz \u00e0 effet de serre dans l'atmosph\u00e8re, ce qui contribue au r\u00e9chauffement climatique.</p>"
       },
       {
         "question": "<p> Cite deux cons\u00e9quences majeures de l'augmentation du CO₂ atmosph\u00e9rique sur l'environnement.</p>",
         "reponse": "<p>L'augmentation du CO₂ atmosph\u00e9rique a des cons\u00e9quences graves :</p><ul><li><b>L'intensification de l'effet de serre</b> et le r\u00e9chauffement climatique, entra\u00eenant la fonte des glaciers, l'\u00e9l\u00e9vation du niveau de la mer et des \u00e9v\u00e9nements climatiques extr\u00eames (s\u00e9cheresses, inondations).</li><li><b>L'acidification des oc\u00e9ans</b> : le CO₂ se dissout dans l'eau, formant de l'acide carbonique, ce qui modifie le pH et menace les organismes marins (coraux, mollusques).</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Flux d'\u00e9nergie et pyramides \u00e9cologiques",
     "points": "6 pts",
     "enonce": "<p>Dans un \u00e9cosyst\u00e8me, l'\u00e9nergie circule des producteurs vers les consommateurs selon les niveaux trophiques. Le tableau ci-dessous pr\u00e9sente les quantit\u00e9s d'\u00e9nergie (en kcal/m²/an) disponibles \u00e0 chaque niveau trophique d'une prairie.</p><div style='max-width: 100%; margin: 15px 0; padding: 10px; background: #f5f7fa; border-radius: 8px;'><table style='width:100%; border-collapse:collapse;'><thead style='background:#e9ecef;'><tr><th style='padding:8px; border:1px solid #ddd;'>Niveau trophique</th><th style='padding:8px; border:1px solid #ddd;'>\u00c9nergie (kcal/m²/an)</th></tr></thead><tbody><tr><td style='padding:8px; border:1px solid #ddd;'>Rayonnement solaire total</td><td style='padding:8px; border:1px solid #ddd;'>800 000</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>Producteurs primaires (v\u00e9g\u00e9taux)</td><td style='padding:8px; border:1px solid #ddd;'>4 000</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>Consommateurs primaires (herbivores)</td><td style='padding:8px; border:1px solid #ddd;'>400</td></tr><tr><td style='padding:8px; border:1px solid #ddd;'>Consommateurs secondaires (carnivores)</td><td style='padding:8px; border:1px solid #ddd;'>40</td></tr></tbody></table></div>",
     "questions": [
       {
         "question": "<p> Calcule le pourcentage d'\u00e9nergie solaire capt\u00e9e par les producteurs primaires. Explique pourquoi ce rendement est faible.</p>",
         "reponse": "<p>Pourcentage = (4 000 / 800 000) × 100 = 0,5%.</p><p>Ce rendement est faible car :</p><ul><li>La majorit\u00e9 de la lumi\u00e8re solaire est r\u00e9fl\u00e9chie ou non absorb\u00e9e par les v\u00e9g\u00e9taux.</li><li>Seules certaines longueurs d'onde sont utilis\u00e9es par la chlorophylle.</li><li>Une partie de l'\u00e9nergie est dissip\u00e9e sous forme de chaleur.</li></ul>"
       },
       {
         "question": "<p> Analyse la diminution de l'\u00e9nergie entre les niveaux trophiques successifs. Calcule le pourcentage d'\u00e9nergie transmis d'un niveau au suivant.</p>",
         "reponse": "<p>Transmission producteurs → consommateurs primaires : (400/4000) × 100 = 10%</p><p>Transmission consommateurs primaires → consommateurs secondaires : (40/400) × 100 = 10%</p><p>On constate qu'environ 10% de l'\u00e9nergie d'un niveau trophique est transmise au niveau sup\u00e9rieur. C'est la <b>r\u00e8gle des 10%</b>.</p><p>Cette perte s'explique par :</p><ul><li>La dissipation de chaleur due aux r\u00e9actions m\u00e9taboliques.</li><li>Les d\u00e9penses \u00e9nerg\u00e9tiques de l'organisme (mouvements, croissance).</li><li>Les parties non consomm\u00e9es des aliments.</li></ul>"
       },
       {
         "question": "<p> D\u00e9finis les niveaux trophiques et donne un exemple d'organisme pour chacun des niveaux pr\u00e9sent\u00e9s dans le tableau.</p>",
         "reponse": "<p><b>Producteurs primaires</b> : organismes autotrophes qui produisent de la mati\u00e8re organique par photosynth\u00e8se. Exemple : l'herbe de la prairie.</p><p><b>Consommateurs primaires</b> : animaux herbivores qui se nourrissent des v\u00e9g\u00e9taux. Exemple : une sauterelle ou un lapin.</p><p><b>Consommateurs secondaires</b> : animaux carnivores qui se nourrissent des herbivores. Exemple : un oiseau ou un renard.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Le cycle de l'azote",
     "points": "6 pts",
     "enonce": "<p>L'azote est un \u00e9l\u00e9ment indispensable \u00e0 la vie, notamment pour la synth\u00e8se des prot\u00e9ines et des acides nucl\u00e9iques. Le cycle de l'azote comporte plusieurs \u00e9tapes cl\u00e9s.</p>",
     "questions": [
       {
         "question": "<p> Cite les principales formes de l'azote dans l'\u00e9cosyst\u00e8me.</p>",
         "reponse": "<p>Les principales formes de l'azote dans l'\u00e9cosyst\u00e8me sont :</p><ul><li><b>Azote atmosph\u00e9rique (N₂)</b> : forme inerte, non utilisable directement par la plupart des \u00eatres vivants.</li><li><b>Ammonium (NH₄⁺)</b> et <b>nitrate (NO₃⁻)</b> : formes min\u00e9rales utilisables par les v\u00e9g\u00e9taux.</li><li><b>Mati\u00e8re organique azot\u00e9e</b> : prot\u00e9ines, acides nucl\u00e9iques pr\u00e9sents dans les \u00eatres vivants.</li></ul>"
       },
       {
         "question": "<p> Explique les quatre \u00e9tapes principales du cycle de l'azote : fixation, nitrification, assimilation, d\u00e9nitrification.</p>",
         "reponse": "<p><b>Fixation de l'azote :</b> transformation du N₂ atmosph\u00e9rique en ammonium (NH₄⁺) par des bact\u00e9ries fixatrices (libres ou symbiotiques comme les Rhizobium) ou par des proc\u00e9d\u00e9s physico-chimiques (foudre).</p><p><b>Nitrification :</b> oxydation de l'ammonium en nitrate (NO₃⁻) par des bact\u00e9ries nitrifiantes (Nitrosomonas puis Nitrobacter). Le nitrate est la forme d'azote la plus assimilable par les plantes.</p><p><b>Assimilation :</b> absorption des ions nitrates par les racines des v\u00e9g\u00e9taux et leur incorporation dans les mol\u00e9cules organiques (prot\u00e9ines, ADN).</p><p><b>D\u00e9nitrification :</b> r\u00e9duction des nitrates en azote gazeux (N₂) par des bact\u00e9ries d\u00e9nitrifiantes dans des conditions ana\u00e9robies, ce qui retourne l'azote \u00e0 l'atmosph\u00e8re.</p>"
       },
       {
         "question": "<p> L'azote est un nutriment essentiel pour les cultures. Comment l'agriculture moderne r\u00e9pond-elle aux besoins en azote des v\u00e9g\u00e9taux ?</p>",
         "reponse": "<p>L'agriculture moderne utilise des <b>engrais azot\u00e9s</b> (nitrates, ammonitrates) pour compenser les pertes dues aux r\u00e9coltes et \u00e0 la d\u00e9nitrification. Ces engrais permettent d'augmenter les rendements mais peuvent entra\u00eener des <b>pollutions</b> (nitrates dans les eaux) s'ils sont utilis\u00e9s en exc\u00e8s.</p><p>Alternativement, les pratiques agricoles durables utilisent la <b>rotation des cultures</b> et la <b>culture de l\u00e9gumineuses</b> (qui fixent l'azote atmosph\u00e9rique) pour enrichir naturellement le sol.</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
