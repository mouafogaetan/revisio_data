<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT 1ère D",
  "classe": "Première",
  "sequence": "Séquence 6 : Immunologie, santé reproductive et éducation nutritionnelle",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Le soi et le non-soi - Les marqueurs de l'identité immunologique",
      "points": "5 pts",
      "enonce": "<p>Le système immunitaire est capable de distinguer les cellules de l'organisme (le \"soi\") des éléments étrangers (le \"non-soi\"). Cette reconnaissance est assurée par des marqueurs moléculaires présents à la surface des cellules.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1,5 pts) a) Expliquer ce que l'on appelle le \"soi\" en immunologie. <br>b) Citer les deux types de marqueurs du soi (majeurs et mineurs) en donnant leur rôle.</p>",
          "reponse": "<p>a) Le <strong>soi</strong> est l'ensemble des molécules (marqueurs) présentes à la surface des cellules d'un organisme, qui permettent au système immunitaire de les reconnaître comme \"amies\" et de ne pas les attaquer.</p><p>b) Les marqueurs du soi :</p><ul><li><strong>Marqueurs majeurs</strong> : le <strong>Complexe Majeur d'Histocompatibilité (CMH)</strong> (ou HLA chez l'Homme). Chaque individu possède un CMH unique, qui est le principal marqueur d'identité cellulaire.</li><li><strong>Marqueurs mineurs</strong> : les <strong>antigènes des groupes sanguins</strong> (système ABO, facteur Rhésus).</li></ul>"
        },
        {
          "question": "<p><strong>1.2</strong> (1,5 pts) a) Définir le \"non-soi\". <br>b) Donner des exemples d'éléments considérés comme non-soi par l'organisme.</p>",
          "reponse": "<p>a) Le <strong>non-soi</strong> est tout élément étranger à l'organisme, reconnu comme \"ennemi\" par le système immunitaire.</p><p>b) Exemples de non-soi :</p><ul><li>Agents infectieux : bactéries, virus, parasites, champignons.</li><li>Cellules étrangères : cellules d'un autre individu (greffe, transfusion).</li><li>Molécules étrangères : toxines, allergènes, polluants.</li><li>Cellules tumorales (qui ne présentent plus les marqueurs normaux du soi).</li></ul>"
        },
        {
          "question": "<p><strong>1.3</strong> (2 pts) Expliquer pourquoi une greffe entre deux individus non apparentés est souvent rejetée, contrairement à une greffe entre jumeaux vrais (monozygotes).</p>",
          "reponse": "<p>Le rejet de greffe est dû à la reconnaissance du \"non-soi\" par le système immunitaire du receveur.</p><ul><li><strong>Greffe entre individus non apparentés</strong> : les marqueurs CMH (Complexe Majeur d'Histocompatibilité) sont différents. Les lymphocytes T du receveur reconnaissent les cellules du donneur comme étrangères et déclenchent une réaction immunitaire (rejet).</li><li><strong>Greffe entre jumeaux vrais (monozygotes)</strong> : les jumeaux vrais sont issus du même œuf et possèdent donc le <strong>même patrimoine génétique</strong> (et donc les mêmes marqueurs CMH). Les cellules du donneur sont reconnues comme \"soi\", il n'y a donc pas de rejet (greffe isogénique).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les cellules immunitaires et leur rôle dans la défense de l'organisme",
      "points": "5 pts",
      "enonce": "<p>Le système immunitaire mobilise différentes cellules pour assurer la défense de l'organisme contre les agressions. Chaque type cellulaire a un rôle spécifique dans la réponse immunitaire.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) Citer les trois principales catégories de cellules immunitaires et indiquer leur origine (organe producteur).</p>",
          "reponse": "<p>Les trois principales catégories de cellules immunitaires sont :</p><ul><li><strong>Phagocytes</strong> (macrophages, polynucléaires neutrophiles) : issus de la moelle osseuse.</li><li><strong>Lymphocytes B</strong> : issus de la moelle osseuse, maturation dans la moelle osseuse.</li><li><strong>Lymphocytes T</strong> : issus de la moelle osseuse, maturation dans le thymus.</li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1,5 pts) Décrire le rôle des phagocytes dans la réponse immunitaire (phagocytose).</p>",
          "reponse": "<p>Les <strong>phagocytes</strong> (macrophages, polynucléaires neutrophiles) assurent la <strong>phagocytose</strong>, mécanisme de défense non spécifique :</p><ol><li><strong>Reconnaissance</strong> : les phagocytes reconnaissent et adhèrent aux agents pathogènes grâce à des récepteurs membranaires.</li><li><strong>Ingestion</strong> : ils englobent les micro-organismes et les déchets cellulaires dans une vacuole (phagosome).</li><li><strong>Digestion</strong> : le phagosome fusionne avec des lysosomes contenant des enzymes hydrolytiques, qui détruisent les agents pathogènes.</li><li><strong>Présentation d'antigènes</strong> : les phagocytes (en particulier les cellules présentatrices d'antigènes) exposent des fragments d'antigènes à leur surface (associés au CMH) pour activer les lymphocytes.</li></ol>"
        },
        {
          "question": "<p><strong>2.3</strong> (1,5 pts) Distinguer les lymphocytes B des lymphocytes T en précisant leur rôle respectif dans la réponse immunitaire.</p>",
          "reponse": "<p>Les <strong>lymphocytes B</strong> et les <strong>lymphocytes T</strong> sont les cellules de l'immunité spécifique (adaptative).</p><ul><li><strong>Lymphocytes B</strong> : ils produisent des <strong>anticorps</strong> (immunoglobulines) dirigés contre des antigènes spécifiques. Après activation, ils se différencient en plasmocytes (producteurs d'anticorps) et en lymphocytes B mémoire (mémoire immunitaire).</li><li><strong>Lymphocytes T</strong> : ils comprennent plusieurs sous-populations :<br>- <strong>Lymphocytes T4 (auxiliaires)</strong> : ils activent d'autres cellules immunitaires (lymphocytes B, macrophages, lymphocytes T8) par la sécrétion de cytokines.<br>- <strong>Lymphocytes T8 (cytotoxiques)</strong> : ils détruisent les cellules infectées par des virus ou les cellules tumorales.</li></ul>"
        },
        {
          "question": "<p><strong>2.4</strong> (1 pt) Expliquer pourquoi les lymphocytes T4 sont qualifiés de \"chefs d'orchestre\" de la réponse immunitaire.</p>",
          "reponse": "<p>Les <strong>lymphocytes T4 (CD4+)</strong> sont appelés \"chefs d'orchestre\" car ils coordonnent l'ensemble de la réponse immunitaire :</p><ul><li>Ils sécrètent des <strong>cytokines</strong> (interleukines) qui activent et stimulent la prolifération des :<br>- Lymphocytes B (pour la production d'anticorps).<br>- Lymphocytes T8 (pour la destruction des cellules infectées).<br>- Macrophages (pour renforcer la phagocytose).</li><li>Sans les lymphocytes T4, la réponse immunitaire adaptative ne peut pas se mettre en place efficacement.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Le VIH/SIDA - Mode d'action et conséquences",
      "points": "6 pts",
      "enonce": "<p>Le VIH (Virus de l'Immunodéficience Humaine) est responsable du SIDA. Il cible spécifiquement certaines cellules du système immunitaire, entraînant une immunodéficience progressive.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1,5 pts) a) Décrire la structure du VIH. <br>b) Expliquer pourquoi le VIH est qualifié de rétrovirus.</p>",
          "reponse": "<p>a) Structure du VIH :</p><ul><li>Une <strong>enveloppe</strong> constituée d'une bicouche lipidique (provenant de la cellule hôte) avec des <strong>glycoprotéines</strong> (gp120, gp41) permettant la reconnaissance et l'entrée dans les cellules cibles.</li><li>Une <strong>capside</strong> (coque protéique) contenant :<br>- Deux molécules d'ARN (le matériel génétique du virus).<br>- L'enzyme <strong>réverse transcriptase</strong> (qui permet la transcription inverse).<br>- L'enzyme <strong>intégrase</strong> (qui permet l'intégration de l'ADN viral dans le génome de la cellule hôte).</li></ul><p>b) Le VIH est un <strong>rétrovirus</strong> car son matériel génétique est constitué d'ARN. Pour se répliquer, il doit utiliser l'enzyme <strong>réverse transcriptase</strong> pour transcrire son ARN en ADN (transcription inverse), qui sera ensuite intégré dans le génome de la cellule hôte.</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (1,5 pts) Expliquer le mode d'action du VIH en détaillant les étapes suivantes : reconnaissance, entrée, rétrotranscription, intégration, production de nouveaux virus.</p>",
          "reponse": "<p>Le VIH cible les <strong>lymphocytes T4 (CD4+)</strong> :</p><ol><li><strong>Reconnaissance et entrée</strong> : la glycoprotéine gp120 du virus se fixe sur le récepteur CD4 et les corécepteurs (CCR5, CXCR4) du lymphocyte T4. La gp41 permet la fusion de l'enveloppe virale avec la membrane cellulaire, libérant le contenu viral dans le cytoplasme.</li><li><strong>Rétrotranscription</strong> : l'enzyme réverse transcriptase transcrit l'ARN viral en ADN double brin.</li><li><strong>Intégration</strong> : l'enzyme intégrase intègre l'ADN viral (provirus) dans le génome de la cellule hôte.</li><li><strong>Production de nouveaux virus</strong> : le provirus est transcrit en ARN (génome viral) et en ARNm qui codent les protéines virales. Les nouvelles particules virales s'assemblent et bourgeonnent à la surface de la cellule, formant de nouveaux virus infectieux.</li></ol>"
        },
        {
          "question": "<p><strong>3.3</strong> (1,5 pts) a) Décrire les trois phases de l'infection par le VIH. <br>b) Expliquer la notion de séropositivité.</p>",
          "reponse": "<p>a) Les trois phases de l'infection par le VIH :</p><ul><li><strong>Phase de primo-infection</strong> : 2 à 6 semaines après la contamination. Multiplication rapide du virus (virémie élevée). Apparition possible de symptômes (fièvre, fatigue, adénopathies).</li><li><strong>Phase asymptomatique (latence clinique)</strong> : durée de plusieurs années (5 à 10 ans en moyenne). Le virus se multiplie lentement, détruisant progressivement les lymphocytes T4. Le patient est séropositif mais ne présente pas de symptômes.</li><li><strong>Phase SIDA</strong> : destruction massive des lymphocytes T4 (moins de 200 CD4/mm³). Immunodéficience sévère. Apparition de <strong>maladies opportunistes</strong> (tuberculose, pneumocystose, sarcome de Kaposi) et de certains cancers.</li></ul><p>b) La <strong>séropositivité</strong> est la présence d'<strong>anticorps anti-VIH</strong> (produits par le système immunitaire) dans le sang. Un test de dépistage (ELISA) permet de détecter ces anticorps. Un patient séropositif est infecté par le VIH et peut transmettre le virus.</p>"
        },
        {
          "question": "<p><strong>3.4</strong> (1,5 pts) Citer les moyens de lutte contre le VIH/SIDA : <br>a) Moyens de prévention <br>b) Moyens de traitement</p>",
          "reponse": "<p>a) <strong>Moyens de prévention</strong> :</p><ul><li>Utilisation du <strong>préservatif</strong> (masculin ou féminin) lors des rapports sexuels.</li><li><strong>Dépistage</strong> volontaire et systématique.</li><li>Information et éducation sur les modes de transmission (sanguine, sexuelle, materno-fœtale).</li><li>Utilisation de matériel à usage unique (seringues) et dépistage des produits sanguins.</li><li>Traitement antirétroviral chez la femme enceinte séropositive pour limiter la transmission mère-enfant (avec césarienne programmée).</li></ul><p>b) <strong>Moyens de traitement</strong> :</p><ul><li><strong>Trithérapie</strong> : association de plusieurs médicaments antirétroviraux (inhibiteurs de protéase, inhibiteurs de transcriptase inverse, etc.) qui bloquent les différentes étapes du cycle viral.</li><li>Le traitement permet de réduire la charge virale, de maintenir le taux de lymphocytes T4, de retarder l'entrée dans la phase SIDA et de limiter la transmission.</li></ul>"

          "reponse": "<p>a) Les <strong>mutilations génitales</strong> (dont l'excision) sont des interventions chirurgicales non médicales qui consistent en l'ablation partielle ou totale des organes génitaux externes de la femme, pour des raisons culturelles ou religieuses.</p><p>b) Conséquences de l'excision :</p><ul><li><strong>Conséquences physiques</strong> : hémorragies, infections (tétanos, septicémie), douleurs chroniques, complications obstétricales (accouchements difficiles, fistules), troubles urinaires.</li><li><strong>Conséquences psychologiques</strong> : traumatismes, stress post-traumatique, anxiété, dépression, troubles de la sexualité.</li></ul>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
