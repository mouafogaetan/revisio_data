<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = [
  {
    "intitule": "Les bases de la perspective cavalière",
    "type": "ressource",
    "niveau": "easy",
    "enonce": {
      "texte": "<p>La perspective cavalière est une technique de représentation d'objets en trois dimensions sur une surface plane (feuille de dessin).</p><p><strong>Question :</strong> À partir des définitions suivantes, associe chaque terme à sa définition correcte.</p><ul><li><strong>A. Perspective cavalière</strong></li><li><strong>B. Fuyantes</strong></li><li><strong>C. Angle de fuite (α)</strong></li><li><strong>D. Coefficient de réduction (K ou R)</strong></li></ul><p><strong>Définitions :</strong></p><ul><li>1. Droites parallèles entre elles, perpendiculaires au plan de projection, qui donnent l'illusion de la profondeur.</li><li>2. Projection oblique d'un objet sur un plan.</li><li>3. Rapport entre la longueur représentée d'une fuyante et sa longueur réelle. Sa valeur est comprise entre 0,5 et 1.</li><li>4. Angle formé par les fuyantes avec l'horizontale. Sa valeur est généralement de 30°, 45° ou 60°.</li></ul>",
      "images": []
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Associe chaque terme à sa définition correspondante en écrivant la lettre et le numéro correspondant (exemple : A → 1).",
        "niveau": "easy",
        "reponse": "A → 2, B → 1, C → 4, D → 3",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Donne la définition de la perspective cavalière.",
            "niveau": "easy",
            "reponse": "La perspective cavalière est une projection oblique d'un objet sur un plan."
          },
          {
            "numero": "1.b",
            "texte": "Que sont les fuyantes en perspective cavalière ?",
            "niveau": "easy",
            "reponse": "Les fuyantes sont des droites parallèles entre elles, perpendiculaires au plan de projection, qui donnent l'illusion de la profondeur."
          }
        ]
      }
    ]
  },
  {
    "intitule": "Caractéristiques de la perspective cavalière",
    "type": "ressource",
    "niveau": "medium",
    "enonce": {
      "texte": "<p>En perspective cavalière, la représentation d'un objet est définie par plusieurs paramètres.</p><p><strong>Rappel :</strong> L'angle de fuite (α) est l'angle que font les fuyantes avec l'horizontale. Le coefficient de réduction (K) est le rapport entre la longueur de la fuyante sur le dessin et sa longueur réelle.</p><p>On considère un cube de 5 cm d'arête. On souhaite le représenter en perspective cavalière avec un angle de fuite α = 30° et un coefficient de réduction K = 0,7.</p>",
      "images": []
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Calcule la longueur de la fuyante sur le dessin pour une arête du cube.",
        "niveau": "medium",
        "reponse": "Longueur fuyante = 5 cm × 0,7 = 3,5 cm",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Quelle est la longueur de la fuyante sur le dessin si l'arête réelle mesure 5 cm ? (Formule : l = L × K)",
            "niveau": "medium",
            "reponse": "l = 5 × 0,7 = 3,5 cm"
          },
          {
            "numero": "1.b",
            "texte": "Explique l'effet du coefficient de réduction sur la représentation de l'objet.",
            "niveau": "medium",
            "reponse": "Plus le coefficient de réduction est petit, plus les fuyantes sont courtes, ce qui donne l'impression que l'objet est vu de plus loin ou de plus haut. Plus le coefficient est proche de 1, plus la profondeur est marquée."
          }
        ]
      }
    ]
  },
  {
    "intitule": "Construction d'un pavé droit en perspective",
    "type": "competence",
    "niveau": "medium",
    "enonce": {
      "texte": "<p>Un élève doit représenter un pavé droit (parallélépipède rectangle) de dimensions : Longueur = 8 cm, Largeur = 4 cm, Hauteur = 6 cm.</p><p>Il choisit une perspective cavalière avec un angle de fuite α = 45° et un coefficient de réduction K = 0,6.</p>",
      "images": [
        "Schéma d'un pavé droit en perspective cavalière avec ses dimensions (L=8 cm, l=4 cm, h=6 cm), l'angle de fuite α=45° et le coefficient de réduction K=0,6."
      ]
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Décris les étapes pour construire ce pavé droit en perspective cavalière.",
        "niveau": "medium",
        "reponse": "1. Tracer la face avant (rectangle de 8 cm × 6 cm). 2. À partir de chaque sommet, tracer les fuyantes avec un angle de 45° par rapport à l'horizontale. 3. Reporter sur chaque fuyante la longueur réduite : l = 4 × 0,6 = 2,4 cm. 4. Relier les extrémités des fuyantes pour former la face arrière. 5. Tracer les arêtes cachées en pointillés.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Calcule la longueur des fuyantes sur le dessin pour la largeur de 4 cm.",
            "niveau": "medium",
            "reponse": "l = 4 × 0,6 = 2,4 cm"
          },
          {
            "numero": "1.b",
            "texte": "Sur le dessin, quelle est la nature de la face avant et de la face arrière ?",
            "niveau": "medium",
            "reponse": "La face avant et la face arrière sont des rectangles identiques (8 cm × 6 cm) et sont représentées en vraie grandeur (forme et dimensions conservées)."
          },
          {
            "numero": "1.c",
            "texte": "Quelles arêtes doivent être représentées en pointillés ? Justifie ta réponse.",
            "niveau": "medium",
            "reponse": "Les arêtes cachées par l'objet lui-même (les arêtes de la face arrière qui ne sont pas visibles) doivent être représentées en pointillés pour indiquer qu'elles ne sont pas directement visibles."
          }
        ]
      }
    ]
  },
  {
    "intitule": "Application : Boîte à chaussures",
    "type": "competence",
    "niveau": "hard",
    "enonce": {
      "texte": "<p>Paul, un élève de 4e au Cameroun, doit réaliser le dessin technique d'une boîte à chaussures pour son projet de technologie. Il veut représenter cette boîte en perspective cavalière.</p><p>La boîte mesure 30 cm de long, 20 cm de large et 12 cm de haut. Il souhaite utiliser un angle de fuite de 30° et un coefficient de réduction de 0,8 pour un dessin à l'échelle 1:2 (c'est-à-dire que le dessin est deux fois plus petit que la réalité).</p><p>Aide Paul à réaliser son dessin en répondant aux questions suivantes.</p>",
      "images": [
        "Boîte à chaussures ouverte avec ses dimensions (30 cm × 20 cm × 12 cm)."
      ]
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Pour commencer, calcule les dimensions de la face avant sur le dessin.",
        "niveau": "hard",
        "reponse": "Face avant : longueur = 30 cm × (1/2) = 15 cm ; hauteur = 12 cm × (1/2) = 6 cm",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Quelle est la longueur réelle de la face avant sur le dessin ?",
            "niveau": "hard",
            "reponse": "La longueur réelle est de 30 cm, mais à l'échelle 1:2, elle sera de 15 cm sur le dessin."
          },
          {
            "numero": "1.b",
            "texte": "Calcule la longueur des fuyantes sur le dessin pour la largeur de 20 cm.",
            "niveau": "hard",
            "reponse": "Largeur sur le dessin : 20 cm × (1/2) = 10 cm. Longueur de la fuyante : l = 10 × 0,8 = 8 cm."
          },
          {
            "numero": "1.c",
            "texte": "Propose un protocole détaillé pour construire la perspective de cette boîte.",
            "niveau": "very hard",
            "reponse": "1. Tracer la face avant : un rectangle de 15 cm sur 6 cm. 2. À partir de chaque sommet, tracer les fuyantes vers la droite (ou la gauche) en faisant un angle de 30° avec l'horizontale. 3. Mesurer et reporter la longueur des fuyantes : 8 cm sur chaque fuyante. 4. Relier les extrémités des fuyantes pour obtenir la face arrière (un rectangle de 15 cm sur 6 cm). 5. Tracer les arêtes cachées (celles de la face arrière qui sont derrière) en pointillés. 6. Vérifier que toutes les arêtes sont bien parallèles entre elles et que les angles sont respectés."
          },
          {
            "numero": "1.d",
            "texte": "Si Paul veut que sa boîte paraisse plus profonde, que doit-il modifier comme paramètre ?",
            "niveau": "hard",
            "reponse": "Pour que la boîte paraisse plus profonde, Paul peut augmenter le coefficient de réduction K (le rapprocher de 1) ou augmenter l'angle de fuite α (par exemple, le passer de 30° à 45°)."
          }
        ]
      }
    ]
  },
  {
    "intitule": "Analyse d'une perspective",
    "type": "competence",
    "niveau": "very hard",
    "enonce": {
      "texte": "<p>Voici la représentation d'une maison en perspective cavalière.</p><p>La base de la maison est un rectangle de 10 m sur 6 m. La hauteur des murs est de 4 m. Le toit est un prisme de hauteur 3 m.</p><p>Le dessin a été réalisé avec une échelle de 1:100, un angle de fuite de 60° et un coefficient de réduction de 0,7.</p>",
      "images": [
        "Dessin d'une maison en perspective cavalière, avec une base rectangulaire, des murs et un toit en prisme."
      ]
    },
    "questions": [
      {
        "numero": 1,
        "texte": "À partir des informations données, explique si le dessin de la maison respecte les règles de la perspective cavalière.",
        "niveau": "very hard",
        "reponse": "Pour vérifier, il faut contrôler : 1. Que la face avant est un rectangle en vraie grandeur (10 m × 4 m, soit 10 cm × 4 cm sur le dessin). 2. Que les fuyantes sont parallèles entre elles et font un angle de 60° avec l'horizontale. 3. Que la longueur des fuyantes correspond à la largeur réelle (6 m) multipliée par l'échelle (1/100) et par le coefficient de réduction (0,7), soit 6 × 0,01 × 0,7 = 0,042 m = 4,2 cm. 4. Que la face arrière est un rectangle identique à la face avant et est bien placée.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Calcule la longueur des fuyantes sur le dessin pour la largeur de la maison.",
            "niveau": "hard",
            "reponse": "Largeur réelle : 6 m. Largeur sur le dessin (échelle) : 6 m × 1/100 = 0,06 m = 6 cm. Longueur de la fuyante : 6 × 0,7 = 4,2 cm."
          },
          {
            "numero": "1.b",
            "texte": "Sachant que les fuyantes tracées sur le dessin mesurent 4,2 cm, déduis-en le coefficient de réduction utilisé.",
            "niveau": "hard",
            "reponse": "Le coefficient de réduction est déjà donné dans l'énoncé : K = 0,7. La longueur des fuyantes confirme ce coefficient (4,2 cm / 6 cm = 0,7)."
          },
          {
            "numero": "1.c",
            "texte": "Évalue la qualité de ce dessin. Quels aspects pourraient être améliorés ?",
            "niveau": "very hard",
            "reponse": "La qualité du dessin dépend du respect des règles : parallélisme, angles, proportions. Des améliorations possibles : 1. S'assurer que les lignes sont bien parallèles. 2. Vérifier que l'angle de fuite est constant. 3. Utiliser des pointillés pour les arêtes cachées. 4. Ajouter des cotes pour indiquer les dimensions réelles. 5. Vérifier la cohérence de l'échelle."
          }
        ]
      }
    ]
  }
];
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
