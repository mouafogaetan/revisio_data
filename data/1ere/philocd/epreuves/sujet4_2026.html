<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philo 1ère CD",
  "classe": "Première",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Partie A : Vérification des ressources",
      "points": "9 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>\n<p><strong>Texte :</strong></p>\n<div style='background-color: #f9f9f9; padding: 15px; border-left: 4px solid #2c3e50; margin: 15px 0;'>\n<p>« La philosophie, pour Russell, est une activité de l’esprit qui consiste à examiner les fondements de nos croyances, à douter de ce qui paraît évident, et à élargir notre conception du possible. Elle ne donne pas de réponses définitives, mais elle nous libère des préjugés et de l’autorité de la coutume. »</p>\n<p style='text-align: right;'><strong>Bertrand Russell, <em>Problèmes de philosophie</em>, 1912</strong></p>\n</div>\n<p><strong>A1 - Vérification des savoirs (3 pts)</strong></p>\n<p>Définissez les concepts suivants tirés du texte :</p>\n</div>",
      "questions": [
        {
          "question": "1) Définissez le concept de <strong>préjugé</strong>.",
          "reponse": "Un préjugé est une opinion ou une attitude préconçue, souvent négative, adoptée sans examen critique préalable. Il repose sur des généralisations hâtives et des stéréotypes, et s'oppose à la réflexion rationnelle et objective."
        },
        {
          "question": "2) Définissez le concept de <strong>doute</strong> en philosophie.",
          "reponse": "Le doute philosophique est une attitude d'interrogation méthodique qui consiste à suspendre son jugement sur ce qui n'est pas certainement vrai. Il ne s'agit pas d'un scepticisme paralysant, mais d'un outil pour éprouver la solidité de nos connaissances et accéder à la vérité, comme chez Descartes."
        },
        {
          "question": "3) Définissez le concept de <strong>dogmatisme</strong>.",
          "reponse": "Le dogmatisme est une attitude consistant à affirmer des vérités comme évidentes et indiscutables, sans les soumettre à l'examen critique de la raison. Le dogmatique refuse le doute et s'en tient à des croyances ou à des principes qu'il considère comme absolus."
        }
      ]
    },
    {
      "titre": "Partie A : Vérification des savoir-faire",
      "points": "6 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>\n<p><strong>Texte :</strong> (voir le texte de Russell ci-dessus)</p>\n<p><strong>A2 - Vérification des savoir-faire (6 pts)</strong></p>\n</div>",
      "questions": [
        {
          "question": "a) Dégagez le thème philosophique de ce texte. (2 pts)",
          "reponse": "Le thème philosophique de ce texte est la définition de la philosophie comme activité critique et libératrice, qui interroge les fondements de nos croyances et nous affranchit des préjugés et de l'opinion commune."
        },
        {
          "question": "b) Dégagez la thèse de l'auteur. (1 pt)",
          "reponse": "La thèse de Russell est que la philosophie ne se réduit pas à un ensemble de connaissances, mais qu'elle est avant tout une pratique de l'esprit, un exercice du doute et de la raison qui permet de se libérer des préjugés et de la tyrannie de la coutume."
        },
        {
          "question": "c) Déclinez la structure logique du texte (postulat, arguments, conclusion). (3 pts)",
          "reponse": "<strong>Postulat (Prémisse) :</strong> La philosophie est une activité de l'esprit qui examine les fondements de nos croyances.<br><strong>Arguments :</strong> <br>1. Elle consiste à douter de ce qui paraît évident.<br>2. Elle élargit notre conception du possible.<br><strong>Conclusion :</strong> La philosophie nous libère des préjugés et de l'autorité de la coutume."
        }
      ]
    },
    {
      "titre": "Partie B : Vérification de l'agir compétent",
      "points": "9 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>\n<p><strong>Essai personnel :</strong></p>\n<p>En te fondant sur ta culture philosophique, et dans le respect des règles de la logique, <strong>est-il légitime de penser que le philosophe est un guide pour sa société ?</strong></p>\n<p><strong>Consigne :</strong> Dans le respect de la structure d'une dissertation philosophique (thèse, antithèse, synthèse), rédige ton texte en deux pages au plus en prenant en compte les tâches ci-après :</p>\n<ul>\n<li><strong>Première tâche : la thèse</strong> (3 pts)</li>\n<li><strong>Deuxième tâche : l'antithèse</strong> (3 pts)</li>\n<li><strong>Troisième tâche : la synthèse</strong> (3 pts)</li>\n</ul>\n<p><em>N.B. Les 3 points de chaque tâche seront répartis comme suit : pertinence 1 pt, cohérence 1 pt, correction 1 pt.</em></p>\n</div>",
      "questions": [
        {
          "question": "Rédigez la première partie (thèse) : montrez que le philosophe, par sa sagesse et sa capacité critique, peut éclairer la société et la guider vers le progrès.",
          "reponse": "Le philosophe, par sa formation à la pensée critique et sa connaissance des grandes questions humaines, apparaît comme un guide légitime pour la société.<br><br>1) Le philosophe possède une sagesse que le commun des mortels n'atteint pas. Depuis Platon, le philosophe est celui qui a accès à la vérité, aux Idées, et qui peut ainsi sortir ses concitoyens de la caverne de l'ignorance. Sa fonction est donc d'éclairer la cité.<br><br>2) Le philosophe est un critique des préjugés et des illusions. Comme le montre Russell, la philosophie libère des préjugés et de la coutume. Le philosophe peut ainsi dénoncer les fausses évidences sur lesquelles reposent parfois les décisions politiques ou sociales.<br><br>3) Le philosophe est un éducateur. Sa mission est d'apprendre aux citoyens à penser par eux-mêmes, à douter et à raisonner. Ce faisant, il les prépare à une citoyenneté éclairée et responsable. Platon, dans *La République*, confie aux philosophes la charge de gouverner, car seuls eux ont une vision juste du Bien et de la Justice."
        },
        {
          "question": "Rédigez la deuxième partie (antithèse) : montrez les limites et les dangers de cette prétention, en soulignant que le philosophe n'est pas un surhomme et que sa vision peut être abstraite ou élitiste.",
          "reponse": "Cependant, l'idée que le philosophe puisse être un guide pour la société peut être remise en cause pour plusieurs raisons.<br><br>1) Le philosophe n'est pas infaillible. Sa sagesse est relative et ses opinions peuvent être erronées. L'histoire montre que des philosophes ont soutenu des idées contestables, voire dangereuses (comme Nietzsche, dont les idées ont parfois été détournées).<br><br>2) Le philosophe est souvent trop abstrait. Ses théories, élaborées dans la solitude du cabinet, peuvent être inadaptées à la complexité du réel et aux besoins concrets des hommes. Son idéalisme risque de le couper des réalités sociales.<br><br>3) Le philosophe peut être élitiste et mépriser le peuple. La tentation est grande pour le philosophe de se considérer comme supérieur, ce qui contredit l'idée même de démocratie. Comme le rappelle Socrate, le philosophe doit avant tout interroger, mais laisser les citoyens décider par eux-mêmes."
        },
        {
          "question": "Rédigez la troisième partie (synthèse) : proposez une vision nuancée en montrant que le philosophe est un guide discret, un éclaireur qui invite à la réflexion sans imposer sa pensée, en accord avec la méthode socratique.",
          "reponse": "La légitimité du philosophe comme guide ne se situe pas dans un rôle de domination ou de gouvernement direct, mais dans une fonction d'éveil et d'accompagnement.<br><br>1) Le philosophe est un éveilleur. Comme Socrate, il pratique la maïeutique : il ne donne pas la vérité, mais aide chacun à l'accoucher par lui-même. Son rôle est d'interroger, de déstabiliser les certitudes, pour faire naître une pensée personnelle et critique.<br><br>2) Le philosophe est un témoin. Il éclaire les enjeux d'une époque, met en garde contre les dérives, et propose des horizons de sens. Il est un intellectuel engagé, comme Sartre, qui pense que l'écrivain est responsable de son temps.<br><br>3) Le philosophe est un citoyen. Il ne se place pas au-dessus de la société, mais en son sein. Il participe au débat public en apportant son regard critique, mais laisse la décision finale aux citoyens. Sa légitimité repose sur la force de ses arguments, non sur l'autorité de sa parole."
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
