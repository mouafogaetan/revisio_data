<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philo 1ère CD",
  "classe": "Première",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "PREMIÈRE PARTIE : VÉRIFICATION DES RESSOURCES",
      "points": "9 pts",
      "enonce": "<div style='font-size: 1.1rem;'><p><strong>Consigne générale :</strong> Lis attentivement le texte ci-dessous et réponds aux questions y afférentes.</p><div style='background: #f4f6f8; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #1a5276;'><p style='font-style: italic;'>« La philosophie ne commence qu'avec la décision de soumettre l'héritage philosophique et culturel à une critique sans complaisance. Pour le philosophe aucune donnée, aucune idée si vénérable soit-elle, n'est recevable avant d'être passée au crible de la pensée critique. En fait la philosophie est essentiellement sacrilège en ceci qu'elle se veut l'instance normative suprême ayant seule droit de fixer ce qui doit ou non être tenu pour sacré, et de ce fait abolit le sacré pour autant qu'il veut s'imposer à l'homme du dehors. C'est pourquoi tous les grands philosophes commencent par invalider ce qui était considéré jusqu'à eux comme absolu. »</p><p style='text-align: right;'>Marcien TOWA, <em>Essai sur la problématique philosophique dans l'Afrique</em></p></div></div>",
      "questions": [
        {
          "question": "<p><strong>A1 - VÉRIFICATION DES SAVOIRS</strong> (1 pt x 3 = 3 pts)</p><p>Définis les concepts suivants :</p><p>a) Philosophie</p><p>b) Sacrilège</p><p>c) Absolu</p>",
          "reponse": "<p><strong>Correction :</strong></p><p><strong>a) Philosophie :</strong> La philosophie est une activité réflexive qui consiste à interroger de manière critique les fondements de nos croyances, de nos connaissances et de nos actions. Elle vise à élucider les concepts fondamentaux et à atteindre une compréhension rationnelle du monde et de l'existence humaine [citation:1].</p><p><strong>b) Sacrilège :</strong> Une action ou une parole qui profane ou viole ce qui est considéré comme sacré. Au sens philosophique, le terme désigne l'acte de remettre en question, par la critique, des idées ou des institutions vénérées et considérées comme intouchables.</p><p><strong>c) Absolu :</strong> Ce qui est indépendant, inconditionné et ne dépend d'aucune autre réalité. En philosophie, l'absolu s'oppose au relatif et peut désigner Dieu, la Vérité ultime ou un principe fondamental qui échappe à toute remise en question.</p>"
        },
        {
          "question": "<p><strong>A2 - VÉRIFICATION DES SAVOIR-FAIRE</strong> (6 pts)</p><p><strong>1<sup>ère</sup> question :</strong> Présente le thème et le problème philosophique de ce texte. (2 pts)</p><p><strong>2<sup>ème</sup> question :</strong> Dégage la thèse de l'auteur. (1 pt)</p><p><strong>3<sup>ème</sup> question :</strong> Décline la structure logique du texte (postulat, arguments, conclusion). (3 pts)</p>",
          "reponse": "<p><strong>Correction :</strong></p><p><strong>1. Thème et problème :</strong></p><ul><li><strong>Thème :</strong> La nature et la fonction de la philosophie comme activité critique.</li><li><strong>Problème :</strong> La philosophie doit-elle se contenter de transmettre un héritage culturel ou doit-elle le soumettre à une critique radicale pour être véritablement philosophique ? [citation:3]</li></ul><p><strong>2. Thèse :</strong> La thèse de Marcien Towa est que la philosophie authentique commence par une critique sans complaisance de l'héritage culturel. Elle ne peut se réduire à une simple transmission de connaissances ; elle doit être une instance normative suprême qui remet en question les idées reçues et les pseudo-absolus [citation:3].</p><p><strong>3. Structure logique :</strong></p><ul><li><strong>Postulat :</strong> La philosophie est une activité qui exige une décision initiale de soumettre l'héritage reçu à la critique.</li><li><strong>Arguments :</strong><ul><li>Argument 1 : Aucune idée, aussi vénérable soit-elle, n'est recevable sans passer par le « crible de la pensée critique ».</li><li>Argument 2 : La philosophie est « sacrilège » car elle abolit le sacré imposé de l'extérieur pour s'affirmer comme instance normative suprême.</li></ul></li><li><strong>Conclusion :</strong> Tous les grands philosophes commencent par invalider ce qui était tenu pour absolu, ce qui confirme la nature essentiellement critique de la démarche philosophique.</li></ul>"
        }
      ]
    },
    {
      "titre": "DEUXIÈME PARTIE : VÉRIFICATION DE L'AGIR COMPÉTENT",
      "points": "9 pts",
      "enonce": "<div style='font-size: 1.1rem;'><p><strong>Essai personnel :</strong></p><div style='background: #f4f6f8; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #1a5276;'><p style='font-style: italic;'>En te fondant sur ta culture philosophique, et dans le respect des règles de la logique, est-il légitime de penser avec René DESCARTES que : <strong>« c'est proprement avoir les yeux fermés, sans jamais tâcher de les ouvrir que de vivre sans philosopher »</strong> ?</p></div><p><strong>Consigne :</strong> Dans le respect de la structure d'une dissertation, rédige ton texte en deux (2) pages au plus en prenant en compte les tâches ci-après :</p><ul><li><strong>1<sup>ère</sup> tâche :</strong> La thèse (3 pts)</li><li><strong>2<sup>ème</sup> tâche :</strong> L'antithèse (3 pts)</li><li><strong>3<sup>ème</sup> tâche :</strong> La synthèse (3 pts)</li><li><strong>Présentation :</strong> (2 pts) [Non inclus dans les 9 points, note sur 2 points supplémentaires]</li></ul></div>",
      "questions": [
        {
          "question": "<p><strong>1<sup>ère</sup> tâche : La thèse</strong> (3 pts)</p><p>Développe une argumentation en faveur de la position de Descartes, en montrant que philosopher est une nécessité pour une vie humaine accomplie. Tu t'appuieras sur des auteurs tels que Socrate, Kant ou Bertrand Russell.</p>",
          "reponse": "<p><strong>Correction indicative :</strong></p><p>Il est légitime de soutenir avec Descartes que vivre sans philosopher, c'est « avoir les yeux fermés ». La philosophie, par son exercice critique, permet de sortir de l'ignorance et des préjugés. Comme le montre Socrate avec sa méthode de la maïeutique, philosopher, c'est interroger ses propres certitudes et accéder à une connaissance plus authentique de soi-même et du monde.</p><p>Pour Emmanuel Kant, la philosophie est une activité critique qui interroge les fondements de nos connaissances. Sans cette critique, nous restons dans un état de minorité, incapables de penser par nous-mêmes. Ainsi, refuser de philosopher, c'est renoncer à sa liberté intellectuelle.</p><p>Enfin, Bertrand Russell voit dans la philosophie une libération des préjugés [citation:1]. L'exercice du doute et de la raison nous affranchit des opinions reçues et nous ouvre à une compréhension plus large et plus nuancée du monde. Vivre sans philosopher, c'est donc se condamner à une vie d'illusions et de conformisme.</p>"
        },
        {
          "question": "<p><strong>2<sup>ème</sup> tâche : L'antithèse</strong> (3 pts)</p><p>Montre les limites de la position cartésienne en développant des arguments qui nuancent l'idée que philosopher est une nécessité absolue. Tu peux notamment interroger la possibilité pour tous de philosopher, ou les dangers d'une philosophie trop éloignée du concret.</p>",
          "reponse": "<p><strong>Correction indicative :</strong></p><p>On peut toutefois nuancer la position de Descartes. Tous les hommes n'ont pas les mêmes moyens intellectuels ou matériels pour philosopher. Dans certaines conditions d'existence, la lutte pour la survie ou l'absence d'accès à la culture ne laisse guère de place à la réflexion philosophique.</p><p>De plus, une philosophie trop abstraite, déconnectée des réalités concrètes, peut devenir vaine et inefficace. Elle risque de s'enfermer dans des spéculations stériles et de négliger les préoccupations pratiques des hommes. La philosophie ne doit pas être une tour d'ivoire mais doit s'incarner dans le monde.</p><p>Enfin, certains soutiennent que l'action précède la pensée. C'est en agissant, en s'engageant, que l'homme apprend et se construit. Une vie d'action vaut parfois mieux qu'une vie de pure contemplation, et le philosophe ne doit pas mépriser ceux qui choisissent de vivre pleinement plutôt que de philosopher sans cesse.</p>"
        },
        {
          "question": "<p><strong>3<sup>ème</sup> tâche : La synthèse</strong> (3 pts)</p><p>Dépasse l'opposition entre la thèse et l'antithèse pour proposer une réponse personnelle et équilibrée. Comment concilier la nécessité de la réflexion philosophique avec les exigences de la vie concrète ?</p>",
          "reponse": "<p><strong>Correction indicative :</strong></p><p>Il est possible de dépasser cette opposition en considérant que la philosophie n'est pas une activité coupée du monde, mais un mode d'être qui enrichit l'expérience humaine. Philosopher, ce n'est pas nécessairement vivre en ermite, mais c'est adopter une attitude réflexive qui éclaire les choix et les actions.</p><p>La philosophie peut être une « sagesse pratique » qui guide l'homme dans sa vie quotidienne. Elle l'aide à discerner le vrai du faux, le bien du mal, et à fonder ses décisions sur des principes rationnels. Ainsi comprise, elle devient un outil d'émancipation et d'épanouissement.</p><p>En définitive, philosopher, ce n'est pas fuir le monde, mais le comprendre pour mieux agir. C'est donner un sens à son existence et contribuer à l'édification d'une société plus juste et plus humaine. La philosophie ne nous enlève pas les yeux de la réalité ; elle nous apprend à mieux la voir.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
