<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philo 1ère CD",
  "classe": "Première",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Commentaire de texte philosophique",
      "points": "10 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p><strong>Texte :</strong></p><div style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #2980b9;'>« La philosophie, en général, est inoffensive, et l'on peut même dire qu'elle est parfaitement inutile. En quoi pourrait-elle être utile, puisqu'elle ne sert à rien de pratique ? Elle sert à penser. […] La philosophie est la critique des idées reçues. Elle nous apprend à douter de ce qui semble évident, à examiner ce qu'on nous présente comme allant de soi. Elle nous oblige à réfléchir, à nous interroger sur le sens de nos actes et de nos paroles. Elle est, en ce sens, une école de liberté. » (Bertrand Russell)</div><p>L'élève, après une lecture attentive, montrera qu'il a saisi le sens général du texte, dégagera le problème philosophique posé, et proposera une interprétation personnelle et argumentée des thèses de l'auteur.</p></div>",
      "questions": [
        {
          "question": "1) Lisez attentivement le texte et répondez aux questions suivantes : a) Identifiez le thème principal du texte. b) Reformulez la thèse de l'auteur en une ou deux phrases. c) Dégagez le problème philosophique posé par le texte.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> a) Le thème principal du texte est l'utilité de la philosophie. <br> b) Thèse de Russell : La philosophie, bien que paraissant inutile sur le plan pratique, est essentielle car elle nous apprend à penser par nous-mêmes, à critiquer les idées reçues et à nous libérer des préjugés. <br> c) Problème philosophique : La philosophie est-elle vraiment inutile, ou remplit-elle une fonction essentielle pour l'homme ?</div>"
        },
        {
          "question": "2) Dans un développement structuré (introduction, développement, conclusion), vous commenterez ce texte. Vous expliquerez comment l'auteur justifie l'utilité de la philosophie et vous confronterez sa thèse à celle d'autres philosophes (Socrate, Descartes ou Kant).",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> <strong>I. Introduction</strong> : Présentation du texte et de l'auteur (Bertrand Russell, philosophe contemporain). Annonce du problème : la philosophie est-elle vraiment inutile ? Thèse de l'auteur : la philosophie est une critique libératrice. Annonce du plan.<br><br><strong>II. Développement</strong> :<br> a) Explication de la thèse de Russell : La philosophie est une remise en question des évidences, un examen critique des idées reçues. Elle ne produit pas de résultats pratiques mais forme l'esprit à la liberté (exemples : Socrate, Descartes).<br> b) Confrontation avec d'autres philosophes : Socrate et la maïeutique comme interrogation permanente. Descartes et le doute méthodique comme fondement de la certitude. Kant et la philosophie comme activité critique qui interroge les fondements de nos connaissances.<br><br><strong>III. Conclusion</strong> : Bilan de l'analyse. Russell a raison de souligner la fonction critique de la philosophie. Cependant, celle-ci ne se limite pas à la critique ; elle est aussi une construction de sens, une quête de sagesse. La philosophie est utile parce qu'elle nous rend plus libres et plus conscients.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Dissertation philosophique",
      "points": "10 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p>« L'homme est condamné à être libre » (Jean-Paul Sartre).</p><div style='background: #f8f9fa; padding: 15px; border-radius: 8px;'>Dans un essai de problématisation structuré (introduction, développement dialectique, conclusion), vous analyserez le sens de cette affirmation et vous discuterez de sa pertinence. Vous mobiliserez vos connaissances philosophiques (auteurs, concepts) pour étayer votre réflexion.</div></div>",
      "questions": [
        {
          "question": "1) Analysez le sujet : dégagez le problème philosophique posé par l'affirmation de Sartre. Formulez une problématique claire.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> <strong>Analyse des termes :</strong> « Homme » (l'être humain, sa nature), « condamné » (contrainte, obligation inéluctable), « libre » (autonomie, capacité de choix). <br> <strong>Problème :</strong> L'homme est-il fondamentalement libre, et cette liberté est-elle un fardeau ou une chance ?<br> <strong>Problématique :</strong> En quel sens peut-on dire que la liberté humaine est une condamnation, et cette conception est-elle juste ?</div>"
        },
        {
          "question": "2) Rédigez une introduction complète pour ce sujet de dissertation.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> <strong>Amorce :</strong> La liberté est souvent considérée comme la valeur suprême, le bien le plus précieux de l'homme. Pourtant, certains philosophes, à l'instar de Jean-Paul Sartre, en font une source d'angoisse. <br> <strong>Définition du sujet et problématique :</strong> Dans sa formule célèbre « L'homme est condamné à être libre », Sartre semble faire de la liberté un fardeau, une situation imposée dont nous ne pouvons nous défaire. Dès lors, la liberté est-elle vraiment une chance ou plutôt une malédiction ? <br> <strong>Annonce du plan :</strong> Nous verrons d'abord que la liberté est d'abord une responsabilité lourde et angoissante, avant de montrer qu'elle est aussi une condition de l'authenticité et qu'elle peut être vécue comme une chance.</div>"
        },
        {
          "question": "3) Proposez un développement structuré pour cette dissertation (plan dialectique détaillé avec arguments et références).",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> <strong>I. La liberté comme fardeau et source d'angoisse (Thèse)</strong> <br> A. L'homme est « condamné » à la liberté : il ne peut pas ne pas choisir (Sartre, 'L'Être et le Néant'). <br> B. L'angoisse de la liberté : l'homme est responsable de ses actes et de ses choix, sans excuse possible (Sartre, 'L'existentialisme est un humanisme'). <br> C. La liberté implique la solitude : l'homme est seul face à ses choix (Kierkegaard). <br> <br> <strong>II. La liberté comme condition de l'authenticité et de la responsabilité (Antithèse)</strong> <br> A. La liberté est ce qui fait la dignité de l'homme : il est un sujet et non un objet (Kant). <br> B. La liberté est une chance de se réaliser, de donner un sens à sa vie (Sartre). <br> C. L'homme n'est pas condamné, il est invité à s'assumer pleinement (Nietzsche, 'Ainsi parlait Zarathoustra'). <br> <br> <strong>III. Synthèse : La liberté, une conquête et une responsabilité partagée</strong> <br> A. La liberté est à la fois une contrainte et une opportunité. <br> B. La liberté ne peut être pleinement vécue sans la reconnaissance de l'autre (Hegel, dialectique du maître et de l'esclave). <br> C. La liberté est une tâche indéfinie, une conquête permanente (Sartre).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Connaissance des auteurs et concepts",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p>1) Identifiez l'auteur de la phrase suivante et situez-la dans son contexte philosophique : « Je pense, donc je suis ».</p><p>2) Expliquez la position de ce philosophe sur la question de la connaissance.</p><p>3) Associez chaque auteur à une idée ou un courant philosophique :</p><div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><ul><li><strong>a) Socrate</strong></li><li><strong>b) Descartes</strong></li><li><strong>c) Kant</strong></li><li><strong>d) Sartre</strong></li></ul></div></div>",
      "questions": [
        {
          "question": "1) Identifiez l'auteur de la phrase « Je pense, donc je suis ».",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Cette phrase est de René Descartes, philosophe du XVIIe siècle, figure majeure du rationalisme.</div>"
        },
        {
          "question": "2) Expliquez la position de Descartes sur la connaissance.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Descartes est un rationaliste. Il affirme que la connaissance certaine ne peut être fondée que sur la raison. Le doute méthodique lui permet de tout remettre en question pour trouver une certitude indubitable : le « cogito ». La raison et les idées innées sont les sources de la connaissance véritable.</div>"
        },
        {
          "question": "3) Associez chaque auteur à une idée ou un courant : Socrate, Descartes, Kant, Sartre.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> a) Socrate → La maïeutique, l'ironie, la philosophie comme interrogation permanente (« Tout ce que je sais, c'est que je ne sais rien »). <br> b) Descartes → Le doute méthodique, le cogito, le rationalisme. <br> c) Kant → La critique de la raison pure, l'impératif catégorique, la distinction entre la méthode sceptique et le scepticisme. <br> d) Sartre → L'existentialisme, la liberté, l'engagement, la condamnation à être libre.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
