<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Philo 1ère CD",
  "classe": "Première",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Vocabulaire et concepts fondamentaux",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Pour aborder la philosophie, il est essentiel de maîtriser un vocabulaire précis. Les concepts clés permettent de formuler des questions et de structurer la réflexion.</p>",
      "questions": [
        {
          "question": "1) Définissez avec précision les concepts suivants : la raison, le doute et la certitude.",
          "reponse": "<b>La raison</b> est la faculté de l'esprit humain qui permet de distinguer le vrai du faux, de juger et de raisonner. Elle est le fondement de la pensée philosophique.<br><b>Le doute</b> est une attitude de remise en question, qui consiste à suspendre son jugement pour examiner les choses avec rigueur. Il est un moteur de la recherche philosophique.<br><b>La certitude</b> est un état de l'esprit dans lequel on tient une chose pour vraie, sans aucune hésitation. Elle peut être le fruit d'une connaissance évidente ou d'une croyance dogmatique."
        },
        {
          "question": "2) Distinguez le sens commun de la notion de 'vérité' de son sens philosophique.",
          "reponse": "Dans le <b>sens commun</b>, la vérité est souvent définie comme la conformité de ce que l'on dit avec ce qui est, une adéquation entre le discours et la réalité. En <b>philosophie</b>, la question de la vérité est plus complexe. Il s'agit de s'interroger sur les critères, les limites et les fondements de cette adéquation. La vérité devient alors un problème, une question ouverte qui interroge la possibilité même de connaître la réalité en soi."
        },
        {
          "question": "3) Expliquez la différence entre le scepticisme en tant que méthode et le scepticisme en tant que doctrine.",
          "reponse": "Le <b>scepticisme comme méthode</b> est une attitude critique qui consiste à douter de manière provisoire pour examiner les choses avec rigueur, à l'instar de Descartes ou de Kant. C'est un outil au service de la recherche de la vérité. En revanche, le <b>scepticisme comme doctrine</b> affirme que la vérité est inaccessible et que l'homme ne peut rien connaître avec certitude. Il conduit à un renoncement à la recherche de la vérité, ce que Kant jugeait nuisible."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse de texte - La philosophie selon Bertrand Russell",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>« La philosophie est à envisager comme une libération des préjugés, des habitudes et des croyances qui nous ont été inculquées depuis l'enfance, et comme un exercice de la raison qui nous permet d'atteindre une compréhension plus profonde de nous-mêmes et du monde. »<br><b>Bertrand Russell</b>, <i>Problèmes de philosophie</i>.</p>",
      "questions": [
        {
          "question": "1) En vous appuyant sur le texte, expliquez ce que Russell entend par une 'libération des préjugés'.",
          "reponse": "Pour Russell, la philosophie est une activité de libération. Elle nous permet de prendre du recul par rapport aux idées reçues, aux croyances et aux préjugés que nous avons hérités de notre éducation ou de notre environnement social. En exerçant notre raison, nous pouvons nous affranchir de ces schémas de pensée pour accéder à une vision plus objective et plus vraie des choses."
        },
        {
          "question": "2) En quoi l'exercice de la raison permet-il, selon l'auteur, une compréhension plus profonde du monde ?",
          "reponse": "Pour Russell, la raison est un outil d'exploration. En exerçant notre raison, nous ne nous contentons pas d'accepter les apparences ou les opinions. Nous interrogeons, nous analysons et nous cherchons à comprendre les causes et les principes qui sous-tendent la réalité. Cette démarche, propre à la philosophie, nous ouvre à une connaissance plus profonde, en nous éloignant des certitudes superficielles pour aborder les questions fondamentales."
        },
        {
          "question": "3) Montrez en quoi la conception de la philosophie de Russell s'oppose à une vision dogmatique de la connaissance.",
          "reponse": "La conception de Russell s'oppose au dogmatisme, qui consiste à imposer des croyances comme des vérités indiscutables. En prônant la 'libération des préjugés' et 'l'exercice de la raison', Russell défend une philosophie qui est une démarche personnelle et critique. Elle ne fournit pas des réponses toutes faites, mais offre des outils pour les chercher. Cette approche est ouverte, dynamique et autocritique, à l'inverse de l'attitude dogmatique qui fige la pensée dans des certitudes absolues."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Dissertation - La philosophie est-elle une simple opinion ?",
      "points": "8 pts",
      "enonce": "<p style='font-size: 1.1em; line-height: 1.6;'>Le sujet de dissertation est le suivant : <b>« La philosophie est-elle une simple opinion ? »</b></p><p style='font-size: 1.1em; line-height: 1.6;'>Vous traiterez ce sujet en suivant la méthode dialectique (thèse - antithèse - synthèse). Votre réflexion devra s'appuyer sur des arguments et des références aux auteurs étudiés (Platon, Socrate, Descartes, Kant, Russell, Ebénézer Njoh-Mouelle...).</p>",
      "questions": [
        {
          "question": "1) Présentez l'introduction complète de votre dissertation (amorce, analyse du sujet, problématique, annonce du plan).",
          "reponse": "<b>Amorce :</b> « Que sais-je ? » Cette question, emblématique de la démarche philosophique, semble placer la philosophie sur le terrain de l'incertitude, là où l'opinion est reine. Pourtant, philosopher ne s'identifie-t-il pas à un effort pour échapper à l'arbitraire des opinions afin d'atteindre une forme de vérité ou de savoir ?<br><b>Analyse du sujet :</b> Le sujet nous invite à interroger la nature même de la philosophie. L'opinion est un jugement personnel, souvent subjectif et non fondé rationnellement. La philosophie, en revanche, se présente comme une recherche de la sagesse, une quête de vérité par l'exercice de la raison. Ainsi, le cœur du problème est de savoir si la philosophie est une simple opinion, c'est-à-dire une production subjective parmi d'autres, ou si elle possède une spécificité qui lui confère une valeur et une portée différentes.<br><b>Problématique :</b> La philosophie, en tant qu'exercice de la raison et remise en question des évidences, peut-elle prétendre à autre chose qu'à une simple opinion ? En quoi se distingue-t-elle d'un point de vue subjectif ?<br><b>Annonce du plan :</b> Nous verrons d'abord que la philosophie semble, comme l'opinion, être une construction personnelle et sujette à controverse. Cependant, nous montrerons qu'elle s'en distingue fondamentalement par sa méthode critique et son ambition de vérité. Enfin, nous verrons que la philosophie est plutôt une démarche, un cheminement qui nous invite à dépasser l'opinion vers une connaissance plus rationnelle."
        },
        {
          "question": "2) Développez un argument pour la partie 'thèse' en montrant que la philosophie peut être une opinion.",
          "reponse": "Un premier abord peut laisser penser que la philosophie n'est qu'une opinion. Chaque philosophe élabore un système de pensée, une vision du monde qui peut sembler personnelle et contestable. Par exemple, si pour Platon, la réalité est celle des Idées, pour un matérialiste, la réalité est purement physique. Ces positions contradictoires illustrent la dimension subjective de la philosophie. De plus, à l'instar de l'opinion, la philosophie n'apporte pas de vérités scientifiques indubitables, mais des interprétations du monde qui évoluent avec le temps et les civilisations. Dans le contexte camerounais, certains pourraient réduire la philosophie à des croyances ou à un contenu idéologique, comme le souligne Ebénézer Njoh-Mouelle, ce qui la rapprocherait d'une simple opinion."
        },
        {
          "question": "3) Développez un argument pour la partie 'antithèse' en montrant les limites de cette première position et la spécificité de la philosophie.",
          "reponse": "Cependant, la philosophie ne se réduit pas à une opinion car elle se distingue par une méthode rigoureuse. L'opinion se donne souvent pour évidente, sans examen critique. La philosophie, à l'inverse, procède par questionnement et remise en cause, comme le montrent la maïeutique socratique ou le doute méthodique cartésien. Son ambition n'est pas de produire une opinion de plus, mais de fonder la connaissance sur la raison. Pour Kant, l'activité critique de la philosophie nous permet de distinguer ce qui relève de la raison de ce qui relève du simple préjugé. Elle vise une universalité, une vérité qui puisse être partagée par tous les esprits rationnels, ce que l'opinion ne prétend pas. Ainsi, la philosophie se présente comme une connaissance raisonnée, non comme une croyance subjective."
        },
        {
          "question": "4) Proposez une conclusion pour cette dissertation.",
          "reponse": "En conclusion, la question « La philosophie est-elle une simple opinion ? » nous a conduits à distinguer deux conceptions. Si son expression peut parfois sembler subjective et plurielle, la philosophie, dans son essence, est une activité de la raison, une critique des évidences et une quête de vérité. Son ambition de fonder la connaissance et d'offrir des outils pour penser par soi-même la distingue fondamentalement de l'opinion qui reste prisonnière du subjectif et du préjugé. En définitive, la philosophie est un cheminement, un exercice de la pensée qui nous invite à dépasser l'opinion pour accéder à une compréhension plus libre et plus éclairée du monde et de nous-mêmes."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
