<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Première",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Maîtrise des connaissances (Questions à réponses courtes)",
      "points": "6 pts",
      "enonce": "<p>Répondez de manière précise et concise aux questions suivantes. Chaque réponse est notée sur 1 ou 2 points.</p>",
      "questions": [
        {
          "question": "<p> (1 pt) Définissez les concepts suivants : <em>Accroissement naturel</em> et <em>Solde migratoire</em>.</p>",
          "reponse": "<p><strong>Accroissement naturel :</strong> Différence entre le nombre de naissances et le nombre de décès sur une période donnée, exprimée en général en pourcentage ou pour mille.</p><p><strong>Solde migratoire :</strong> Différence entre le nombre de personnes entrant sur un territoire (immigration) et le nombre de personnes le quittant (émigration) sur une période donnée.</p>"
        },
        {
          "question": "<p> (2 pts) Citez et expliquez brièvement deux facteurs expliquant la forte croissance démographique de la population mondiale depuis le XIXe siècle.</p>",
          "reponse": "<ul><li><strong>Progrès médical :</strong> Les avancées dans le domaine de la santé (vaccination, antibiotiques, amélioration des soins) ont permis une baisse drastique de la mortalité, en particulier infantile [citation:1].</li><li><strong>Amélioration de l'hygiène :</strong> L'accès à l'eau potable, l'assainissement et les mesures d'hygiène publique ont réduit la propagation des maladies, contribuant à une augmentation de l'espérance de vie.</li></ul>"
        },
        {
          "question": "<p> (1 pt) Distinguez <em>migration interne</em> et <em>migration internationale</em>.</p>",
          "reponse": "<p>Une <strong>migration interne</strong> est un déplacement de population à l'intérieur des frontières d'un même pays (ex : des campagnes vers les villes). Une <strong>migration internationale</strong> est un déplacement qui implique le franchissement d'une frontière nationale (ex : du Cameroun vers la France).</p>"
        },
        {
          "question": "<p> (2 pts) Identifiez deux problèmes sociaux et deux problèmes environnementaux majeurs rencontrés dans les grandes villes des pays en développement.</p>",
          "reponse": "<ul><li><strong>Problèmes sociaux :</strong> Chômage élevé, insécurité, logements insalubres et développement de bidonvilles.</li><li><strong>Problèmes environnementaux :</strong> Pollution de l'air et de l'eau, accumulation de déchets solides, problèmes de circulation et d'engorgement.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Analyse de documents et de données",
      "points": "4 pts",
      "enonce": "<p>Le document ci-dessous présente les politiques démographiques de deux pays aux situations opposées. Analysez-le et répondez aux questions.</p>",
      "questions": [
        {
          "question": "<p><strong>Document :</strong> <em>« En Inde, la politique de planning familial, initiée dès les années 1950, s'est durcie dans les années 1970 avec des campagnes de stérilisation massive, souvent coercitives. Aujourd'hui, l'État indien promeut la famille de deux enfants et investit dans la contraception. À l'inverse, la France, avec un indice de fécondité d'environ 1,8 enfant par femme, mène une politique nataliste active depuis la Seconde Guerre mondiale. Celle-ci repose sur des mesures incitatives comme les allocations familiales généreuses, un système de congés parentaux et un accès abordable aux modes de garde pour encourager les naissances. »</em> (Document adapté)</p><p> (1 pt) De quel type de politique démographique relève l'action de l'Inde ? Et celle de la France ?</p>",
          "reponse": "<p>La politique de l'Inde est une politique <strong>malthusienne</strong> ou <strong>restrictive</strong> qui vise à limiter les naissances. La politique de la France est une politique <strong>nataliste</strong> ou <strong>incitative</strong> qui vise à encourager les naissances.</p>"
        },
        {
          "question": "<p> (2 pts) Expliquez, à partir du texte, les objectifs de chacune de ces politiques et les moyens mis en œuvre pour les atteindre.</p>",
          "reponse": "<p>L'Inde cherche à limiter sa croissance démographique pour réduire la pression sur les ressources et l'environnement. Ses moyens sont coercitifs (stérilisation) et incitatifs (famille de deux enfants, contraception). La France, confrontée à une fécondité faible, cherche à maintenir une population dynamique pour assurer le renouvellement des générations et soutenir l'économie. Ses moyens sont purement incitatifs : aides financières, congés parentaux, et structures d'accueil pour faciliter la vie familiale.</p>"
        },
        {
          "question": "<p> (1 pt) Expliquez en quoi la politique de la France peut être considérée comme une réponse au problème de <em>sous-population</em> ou de vieillissement de sa population.</p>",
          "reponse": "<p>Une faible natalité entraîne un vieillissement de la population (augmentation de la part des personnes âgées). La politique nataliste vise à augmenter le nombre de naissances pour rééquilibrer la pyramide des âges, garantir un renouvellement des générations et disposer d'une main-d'œuvre suffisante à l'avenir.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Étude de cas et réflexion (Questions de synthèse)",
      "points": "10 pts",
      "enonce": "<p>L'urbanisation rapide est un phénomène majeur dans les pays en développement. Lisez attentivement l'étude de cas et répondez aux questions.</p>",
      "questions": [
        {
          "question": "<p><strong>Document :</strong> <em>« À Douala, la capitale économique du Cameroun, la population est passée de quelques centaines de milliers d'habitants à l'indépendance à plus de 3 millions aujourd'hui. Cette croissance fulgurante est principalement due à un exode rural massif, alimenté par la recherche d'emplois et de meilleures conditions de vie. Cet afflux constant a provoqué un étalement urbain incontrôlé et une multiplication de quartiers précaires, dépourvus d'infrastructures de base comme l'eau potable et l'électricité. Les conséquences sont multiples : chômage élevé, insécurité, embouteillages monstres, pollution et difficultés de gestion des déchets. Les relations entre la ville et sa campagne environnante sont paradoxales : la ville est un pôle d'attraction qui pompe les ressources humaines, mais elle génère aussi des flux financiers (argent envoyé par les migrants aux familles restées au village) et constitue un débouché pour les produits agricoles. »</em></p><p> (2 pts) Identifiez les deux principales causes de la croissance urbaine de Douala, telles qu'elles sont décrites dans le texte.</p>",
          "reponse": "<p>Les deux principales causes sont : l'<strong>exode rural</strong> (départ massif des populations des campagnes vers la ville) et la <strong>croissance naturelle</strong> (excédent des naissances sur les décès au sein de la population urbaine déjà installée).</p>"
        },
        {
          "question": "<p> (3 pts) Le texte mentionne plusieurs problèmes urbains. Classez-les en problèmes sociaux et problèmes environnementaux.</p>",
          "reponse": "<ul><li><strong>Problèmes sociaux :</strong> Chômage, insécurité, habitat précaire (bidonvilles), manque d'infrastructures de base (eau, électricité).</li><li><strong>Problèmes environnementaux :</strong> Pollution, embouteillages, gestion difficile des déchets.</li></ul>"
        },
        {
          "question": "<p> (3 pts) Expliquez en quoi les relations entre Douala et ses campagnes sont à la fois <em>complémentaires</em> et <em>tendues</em>.</p>",
          "reponse": "<p><strong>Complémentarités :</strong> La ville fournit un marché pour les produits agricoles des campagnes et génère des transferts de fonds (argent des migrants) qui participent au développement rural. Les campagnes fournissent à la ville la main-d'œuvre nécessaire à son économie.</p><p><strong>Tensions :</strong> La ville attire massivement les jeunes, ce qui prive les campagnes de bras valides (exode rural) et peut entraîner un déclin des activités agricoles.</p>"
        },
        {
          "question": "<p> (2 pts) Proposez une solution pour améliorer la gestion des déchets à Douala, en tenant compte des contraintes d'une ville en développement.</p>",
          "reponse": "<p>Une solution pourrait être la mise en place d'un système de collecte participatif et décentralisé, en appuyant des initiatives locales de tri et de recyclage (valorisation des déchets organiques en compost, recyclage du plastique). Cela créerait des emplois et des revenus, tout en réduisant les coûts pour la municipalité. Une campagne de sensibilisation à la réduction des déchets est également essentielle.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
