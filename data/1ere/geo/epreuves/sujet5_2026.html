<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Première",
  "sequence": "Séquence 5 : Évaluation bilan (Modules 1 à 5)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Croissance démographique et ses problèmes (4 pts)",
      "points": "4 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur la croissance démographique mondiale. Réponds-y en t'aidant de tes connaissances.</p>",
      "questions": [
        {
          "question": "<p> Définis les termes suivants : natalité, mortalité et accroissement naturel.</p>",
          "reponse": "<ul><li><strong>Natalité</strong> : nombre de naissances pour 1000 habitants en un an.</li><li><strong>Mortalité</strong> : nombre de décès pour 1000 habitants en un an.</li><li><strong>Accroissement naturel</strong> : différence entre le taux de natalité et le taux de mortalité. Il mesure la croissance naturelle d'une population.</li></ul>"
        },
        {
          "question": "<p> Quels sont les deux principaux facteurs qui expliquent la forte croissance démographique des pays en développement ?</p>",
          "reponse": "<p>Les deux principaux facteurs sont : les progrès de la médecine et de l'hygiène, qui ont permis de réduire la mortalité, et le maintien d'une forte natalité dans certains pays.</p>"
        },
        {
          "question": "<p> Cite trois problèmes liés à la surpopulation dans les pays en développement.</p>",
          "reponse": "<p>Parmi les problèmes liés à la surpopulation, on peut citer : la pression sur les ressources alimentaires, le chômage et le sous-emploi, la dégradation de l'environnement, et l'insuffisance des infrastructures.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les migrations internationales (4 pts)",
      "points": "4 pts",
      "enonce": "<p>Consigne : Analyse le texte suivant puis réponds aux questions.</p><div style='background-color:#f3e5f5;padding:15px;border-radius:8px;border-left:4px solid #8e24aa;'><p><em>« Chaque année, des milliers de jeunes Africains quittent leur pays pour rejoindre l'Europe. Ils fuient la pauvreté, le chômage et parfois les conflits. Ils traversent le désert et la Méditerranée au péril de leur vie. Ces migrants envoient de l'argent à leur famille restée au pays. Mais leur départ prive aussi leur pays d'origine de main-d'œuvre qualifiée. »</em></p></div>",
      "questions": [
        {
          "question": "<p> De quel type de migration s'agit-il dans ce texte ? Justifie ta réponse.</p>",
          "reponse": "<p>Il s'agit d'une migration internationale (ou migratoire) et économique. Elle est internationale car elle concerne un départ d'Afrique vers l'Europe. Elle est économique car les migrants fuient la pauvreté et le chômage pour trouver de meilleures conditions de vie.</p>"
        },
        {
          "question": "<p> Quels sont les effets positifs de cette migration pour le pays d'origine ?</p>",
          "reponse": "<p>Un effet positif est le transfert de fonds (l'argent envoyé par les migrants) qui aide les familles restées au pays et peut contribuer à l'économie locale.</p>"
        },
        {
          "question": "<p> Quels sont les effets négatifs pour le pays d'origine ?</p>",
          "reponse": "<p>Un effet négatif est la fuite des cerveaux, c'est-à-dire le départ de la main-d'œuvre qualifiée (les jeunes éduqués) qui prive le pays de compétences nécessaires à son développement.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les villes et l'expansion urbaine (4 pts)",
      "points": "4 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur le phénomène d'urbanisation dans le monde.</p>",
      "questions": [
        {
          "question": "<p> Qu'est-ce que l'urbanisation ?</p>",
          "reponse": "<p>L'urbanisation est l'augmentation de la proportion de la population vivant dans les villes. Elle est mesurée par le taux d'urbanisation.</p>"
        },
        {
          "question": "<p> Quelles sont les deux principales causes de l'explosion urbaine dans les pays en développement ?</p>",
          "reponse": "<p>Les deux principales causes sont l'exode rural, c'est-à-dire le départ des populations des campagnes vers les villes, et la croissance naturelle de la population urbaine.</p>"
        },
        {
          "question": "<p> Cite deux problèmes sociaux et deux problèmes environnementaux rencontrés par les grandes villes des pays en développement.</p>",
          "reponse": "<p><strong>Problèmes sociaux :</strong> chômage, insécurité, logements insalubres (bidonvilles).<br><strong>Problèmes environnementaux :</strong> pollution de l'air et de l'eau, accumulation de déchets, problèmes de circulation.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Activités agricoles et pastorales (4 pts)",
      "points": "4 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les activités primaires.</p>",
      "questions": [
        {
          "question": "<p> Distingue l'agriculture traditionnelle de l'agriculture moderne.</p>",
          "reponse": "<p>L'agriculture traditionnelle est une agriculture vivrière, souvent extensive, qui utilise des outils rudimentaires et des méthodes anciennes. L'agriculture moderne est une agriculture commerciale, intensive, qui utilise des engrais, des pesticides, des machines et des techniques de pointe.</p>"
        },
        {
          "question": "<p> Cite trois difficultés rencontrées par le secteur agricole dans les pays en développement.</p>",
          "reponse": "<p>Les difficultés sont : le manque de financement et d'équipement, les aléas climatiques (sécheresses, inondations), la faiblesse des infrastructures (routes, entrepôts) et l'exode rural des jeunes.</p>"
        },
        {
          "question": "<p> Qu'est-ce que le foncier et quel est son importance dans les activités agro-pastorales ?</p>",
          "reponse": "<p>Le foncier désigne l'ensemble des terres et des droits sur la terre. Son importance est cruciale car l'accès à la terre est nécessaire pour pratiquer l'agriculture et l'élevage. Les conflits fonciers sont fréquents dans les zones rurales.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Activités artisanales et industrielles (4 pts)",
      "points": "4 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les activités secondaires.</p>",
      "questions": [
        {
          "question": "<p> Quelles sont les caractéristiques principales de l'artisanat ?</p>",
          "reponse": "<p>L'artisanat est une activité de production à petite échelle, souvent familiale, qui repose sur le travail manuel et des outils simples. Les produits sont souvent uniques.</p>"
        },
        {
          "question": "<p> Cite deux difficultés du secteur artisanal dans les pays en développement.</p>",
          "reponse": "<p>Deux difficultés sont le manque de formation et le faible accès au crédit, ce qui limite l'innovation et l'expansion des entreprises.</p>"
        },
        {
          "question": "<p> En quoi une industrie agroalimentaire diffère-t-elle d'une industrie lourde ?</p>",
          "reponse": "<p>Une industrie agroalimentaire transforme des produits agricoles (ex : jus de fruits, huilerie). Une industrie lourde utilise des matières premières lourdes comme le minerai de fer pour produire de l'acier, des machines, etc. Elles n'ont pas les mêmes marchés ou besoins en énergie.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Synthèse - La question démographique (4 pts)",
      "points": "4 pts",
      "enonce": "<p>Consigne : À partir de tes connaissances sur la question démographique, rédige un paragraphe construit sur le sujet suivant : « Les problèmes démographiques et les tentatives de solutions dans le monde ». Ta réponse doit être structurée (introduction, développement, conclusion).</p>",
      "questions": [
        {
          "question": "<p>Rédige ton paragraphe.</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> La question démographique est au cœur des préoccupations mondiales. D'un côté, la surpopulation dans les pays en développement crée une pression énorme sur les ressources (eau, nourriture, énergie) et génère des problèmes comme le chômage, la dégradation de l'environnement et l'insuffisance des services sociaux. De l'autre côté, les pays développés sont confrontés à la sous-population (vieillissement de la population, manque de main-d'œuvre). Pour répondre à ces défis, des politiques démographiques ont été mises en œuvre. Les pays qui subissent la surpopulation, comme l'Inde ou le Nigeria, mettent parfois en place des politiques malthusiennes pour limiter les naissances. À l'inverse, les pays développés, comme le Japon ou la France, adoptent des politiques natalistes pour encourager la natalité ou facilitent l'immigration pour compenser le déficit démographique. Malgré ces politiques, la question démographique reste un défi majeur du 21e siècle.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
