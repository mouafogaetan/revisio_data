<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction",
    "contenu": "<div style='text-align: center; padding: 20px 10px;'><h2 style='color: #2c3e50; margin-bottom: 15px;'>📟 L'INVITE DE COMMANDES</h2><div style='background: #f8f9fa; padding: 20px; border-radius: 12px; border-left: 4px solid #3498db;; color: #000000'><p style='font-size: 1.1em; line-height: 1.6; color: #2c3e50;'>Bienvenue dans ce cours sur l'invite de commandes, un outil puissant pour interagir directement avec votre système d'exploitation.</p><p style='font-size: 1em; color: #34495e; margin-top: 10px;'>Nous allons découvrir comment utiliser cette interface textuelle pour contrôler votre ordinateur de manière efficace.</p></div></div>",
    "texteParle": "Bonjour et bienvenue dans ce cours sur l'invite de commandes, un outil puissant pour interagir directement avec votre système d'exploitation. Dans cette leçon, nous allons découvrir comment utiliser cette interface textuelle pour contrôler votre ordinateur de manière efficace.",
    "note": "L'invite de commandes est un outil essentiel pour tout utilisateur avancé."
  },
  {
    "titre": "Définition",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #e8f4fd; padding: 15px; border-radius: 12px;; color: #000000'><h3 style='color: #2c3e50; margin-top: 0;'>🔍 Qu'est-ce que l'invite de commandes ?</h3><p style='font-size: 1em; line-height: 1.6; color: #34495e;'><strong>L'invite de commandes</strong> (ou <strong>CMD</strong>) est une <span style='background: #d4edda; padding: 2px 6px; border-radius: 4px;; color: #000000'>interface textuelle</span> qui permet d'interagir avec le système d'exploitation en saisissant des <strong>commandes</strong>.</p><ul style='color: #34495e; line-height: 1.6; padding-left: 20px;'><li>Elle est <strong>plus rapide</strong> que l'interface graphique pour certaines tâches</li><li>Elle permet d'<strong>automatiser</strong> des actions répétitives</li><li>Elle donne un <strong>contrôle précis</strong> sur le système</li></ul></div></div>",
    "texteParle": "L'invite de commandes, aussi appelée CMD, est une interface textuelle qui permet d'interagir avec le système d'exploitation en saisissant des commandes. Contrairement à l'interface graphique que vous utilisez habituellement, ici vous tapez des instructions directement. C'est plus rapide pour certaines tâches, cela permet d'automatiser des actions répétitives et donne un contrôle plus précis sur le système.",
    "note": "L'invite de commandes est née avec les premiers systèmes d'exploitation, bien avant l'apparition des interfaces graphiques."
  },
  {
    "titre": "Pourquoi l'utiliser ?",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #fff3cd; padding: 15px; border-radius: 12px; border-left: 4px solid #ffc107;; color: #000000'><h3 style='color: #856404; margin-top: 0;'>⚡ Avantages de l'invite de commandes</h3><ul style='color: #856404; line-height: 1.8; padding-left: 20px;'><li><strong>🔹 Rapidité</strong> : Exécution instantanée des commandes</li><li><strong>🔹 Puissance</strong> : Accès à des fonctionnalités avancées</li><li><strong>🔹 Automatisation</strong> : Création de scripts pour automatiser des tâches</li><li><strong>🔹 Dépannage</strong> : Outils de diagnostic et de réparation</li></ul></div></div>",
    "texteParle": "L'invite de commandes offre plusieurs avantages. Elle permet une exécution instantanée des commandes, ce qui est plus rapide que de naviguer dans plusieurs menus. Elle donne accès à des fonctionnalités avancées du système d'exploitation. Vous pouvez créer des scripts pour automatiser des tâches répétitives. Et elle est très utile pour le dépannage grâce à ses outils de diagnostic.",
    "note": "L'invite de commandes est souvent utilisée par les administrateurs système et les développeurs."
  },
  {
    "titre": "Comment l'ouvrir",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #d1ecf1; padding: 15px; border-radius: 12px; border-left: 4px solid #17a2b8;; color: #000000'><h3 style='color: #0c5460; margin-top: 0;'>🚪 Ouvrir l'invite de commandes</h3><p style='color: #0c5460; font-weight: bold;'>Méthodes sous Windows :</p><ul style='color: #0c5460; line-height: 1.8; padding-left: 20px;'><li><strong>Méthode 1 :</strong> Démarrer → taper <span style='background: #0c5460; color: white; padding: 2px 8px; border-radius: 4px;'>cmd</span> → Entrée</li><li><strong>Méthode 2 :</strong> Touche <kbd>Windows</kbd> + <kbd>R</kbd> → taper <span style='background: #0c5460; color: white; padding: 2px 8px; border-radius: 4px;'>cmd</span> → Entrée</li><li><strong>Méthode 3 :</strong> Dans le menu Démarrer, rechercher <span style='background: #0c5460; color: white; padding: 2px 8px; border-radius: 4px;'>Invite de commandes</span></li></ul><p style='color: #0c5460; font-style: italic;'>Pour les privilèges administrateur : clic droit → <strong>Exécuter en tant qu'administrateur</strong></p></div></div>",
    "texteParle": "Pour ouvrir l'invite de commandes sous Windows, vous avez plusieurs méthodes. La plus simple est de cliquer sur Démarrer, de taper cmd dans la barre de recherche et d'appuyer sur Entrée. Vous pouvez aussi utiliser la touche Windows plus la touche R, taper cmd et appuyer sur Entrée. Enfin, vous pouvez chercher Invite de commandes dans le menu Démarrer. Si vous avez besoin de droits d'administrateur, faites un clic droit sur Invite de commandes et choisissez Exécuter en tant qu'administrateur.",
    "note": "Sur macOS, l'équivalent est le Terminal. Sur Linux, c'est le shell Bash."
  },
  {
    "titre": "Interface",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #2c3e50; padding: 15px; border-radius: 12px; color: #ecf0f1;'><h3 style='color: #ecf0f1; margin-top: 0;'>🖥️ Interface de l'invite de commandes</h3><div style='background: #1a1a2e; padding: 12px; border-radius: 8px; font-family: monospace; color: #00ff41; font-size: 0.95em;'>Microsoft Windows [Version 10.0.19045]<br>C:\\Users\\Eleve><span style='background: #00ff41; color: #1a1a2e; padding: 0 4px;'>_</span></div><ul style='color: #ecf0f1; line-height: 1.8; padding-left: 20px; margin-top: 10px;'><li><strong>Fenêtre noire</strong> : Interface principale</li><li><strong>Texte vert</strong> : Le curseur clignotant (invite)</li><li><strong>Chemin</strong> : Indique le répertoire courant (ex: <span style='background: #34495e; padding: 0 4px;; color: #ffffff'>C:\\Users\\Eleve</span>)</li><li><strong>Historique</strong> : Utilisez les flèches ↑ ↓ pour naviguer</li></ul></div></div>",
    "texteParle": "L'interface de l'invite de commandes est simple. Vous voyez une fenêtre noire avec du texte vert. Le curseur clignotant est votre invite de commandes, c'est là que vous allez taper vos instructions. Le chemin affiché avant le curseur indique le répertoire dans lequel vous vous trouvez. Vous pouvez utiliser les flèches haut et bas pour naviguer dans l'historique des commandes que vous avez déjà saisies.",
    "note": "L'interface peut sembler austère, mais elle est très efficace pour les tâches avancées."
  },
  {
    "titre": "Syntaxe des commandes",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #e9ecef; padding: 15px; border-radius: 12px;; color: #000000'><h3 style='color: #2c3e50; margin-top: 0;'>📝 Syntaxe des commandes</h3><p style='color: #2c3e50; font-weight: bold;'>Structure d'une commande :</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.95em; text-align: center;'>nom_de_la_commande [options] [arguments]</div><ul style='color: #2c3e50; line-height: 1.8; padding-left: 20px; margin-top: 10px;'><li><strong>nom_de_la_commande</strong> : L'action à effectuer (ex: DIR, CD)</li><li><strong>[options]</strong> : Modifient le comportement (ex: <span style='background: #dee2e6; padding: 0 4px;; color: #000000'>/W</span> pour affichage large)</li><li><strong>[arguments]</strong> : Informations supplémentaires (ex: un nom de fichier)</li></ul><p style='color: #2c3e50; font-style: italic;'>Exemple : <span style='background: #343a40; color: #f8f9fa; padding: 2px 6px; border-radius: 4px;'>DIR /W</span></p></div></div>",
    "texteParle": "La syntaxe des commandes est simple. Chaque commande suit un modèle : d'abord le nom de la commande, puis éventuellement des options qui modifient le comportement de la commande, et enfin des arguments qui donnent des informations supplémentaires. Par exemple, dans la commande DIR /W, DIR est le nom de la commande et /W est une option qui change la façon dont les fichiers sont affichés.",
    "note": "Il est important de respecter la casse ? Non, les commandes DOS ne sont pas sensibles à la casse."
  },
  {
    "titre": "Commande DIR",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #d4edda; padding: 15px; border-radius: 12px; border-left: 4px solid #28a745;; color: #000000'><h3 style='color: #155724; margin-top: 0;'>📂 Commande DIR</h3><p style='color: #155724;'><strong>DIR</strong> : Affiche la liste des fichiers et dossiers du répertoire courant.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>DIR</span></div><p style='color: #155724; font-weight: bold; margin-top: 8px;'>Options utiles :</p><ul style='color: #155724; line-height: 1.6; padding-left: 20px;'><li><span style='background: #c3e6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>DIR /W</span> : Affichage large (5 colonnes)</li><li><span style='background: #c3e6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>DIR /P</span> : Affichage page par page</li><li><span style='background: #c3e6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>DIR /?</span> : Affiche l'aide de la commande</li></ul></div></div>",
    "texteParle": "La commande DIR est l'une des plus utilisées. Elle permet d'afficher la liste des fichiers et dossiers présents dans le répertoire courant. Si vous ajoutez l'option /W, vous obtenez un affichage large sur cinq colonnes, ce qui est pratique pour voir plus de fichiers à la fois. L'option /P affiche les résultats page par page, ce qui est utile quand il y a beaucoup de fichiers. Enfin, DIR /? vous montre toute l'aide disponible pour cette commande.",
    "texteParle": "La commande DIR est l'une des plus utilisées. Elle permet d'afficher la liste des fichiers et dossiers présents dans le répertoire courant. Si vous ajoutez l'option /W, vous obtenez un affichage large sur cinq colonnes, ce qui est pratique pour voir plus de fichiers à la fois. L'option /P affiche les résultats page par page, ce qui est utile quand il y a beaucoup de fichiers. Enfin, DIR /? vous montre toute l'aide disponible pour cette commande.",
    "note": "DIR /W est très pratique pour avoir une vue d'ensemble des fichiers d'un répertoire."
  },
  {
    "titre": "Commande CD",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #cce5ff; padding: 15px; border-radius: 12px; border-left: 4px solid #007bff;; color: #000000'><h3 style='color: #004085; margin-top: 0;'>📁 Commande CD</h3><p style='color: #004085;'><strong>CD</strong> (Change Directory) : Permet de changer de répertoire.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>CD Documents</span><br><span style='color: #6c757d;'>C:\\Users\\Eleve\\Documents></span></div><p style='color: #004085; font-weight: bold; margin-top: 8px;'>Raccourcis :</p><ul style='color: #004085; line-height: 1.6; padding-left: 20px;'><li><span style='background: #b8daff; padding: 0 4px; border-radius: 4px;; color: #000000'>CD ..</span> : Remonte d'un niveau (dossier parent)</li><li><span style='background: #b8daff; padding: 0 4px; border-radius: 4px;; color: #000000'>CD \\</span> : Va à la racine du disque (C:\\)</li><li><span style='background: #b8daff; padding: 0 4px; border-radius: 4px;; color: #000000'>CD</span> : Affiche le chemin du répertoire courant</li></ul></div></div>",
    "texteParle": "La commande CD, pour Change Directory, permet de changer de répertoire. Pour entrer dans un dossier, tapez CD suivi du nom du dossier. Le chemin affiché se met à jour pour indiquer votre nouvelle position. Les raccourcis CD .. vous permettent de remonter d'un niveau vers le dossier parent, CD \\ vous emmène directement à la racine du disque, et CD tout seul affiche simplement le chemin où vous vous trouvez.",
    "note": "CD .. est très utile pour naviguer rapidement dans l'arborescence."
  },
  {
    "titre": "Commande MD",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #d1ecf1; padding: 15px; border-radius: 12px; border-left: 4px solid #17a2b8;; color: #000000'><h3 style='color: #0c5460; margin-top: 0;'>📁 Commande MD</h3><p style='color: #0c5460;'><strong>MD</strong> (Make Directory) ou <strong>MKDIR</strong> : Crée un nouveau dossier.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>MD COURS</span></div><p style='color: #0c5460; font-weight: bold; margin-top: 8px;'>Exemple d'utilisation :</p><ul style='color: #0c5460; line-height: 1.6; padding-left: 20px;'><li><span style='background: #b8e2e8; padding: 0 4px; border-radius: 4px;; color: #000000'>MD COURS</span> → Crée un dossier appelé <strong>COURS</strong></li><li><span style='background: #b8e2e8; padding: 0 4px; border-radius: 4px;; color: #000000'>MD \"Mes Documents\"</span> → Avec des espaces, utiliser les guillemets</li></ul></div></div>",
    "texteParle": "La commande MD, qui signifie Make Directory ou MKDIR, sert à créer un nouveau dossier. C'est très simple : tapez MD suivi du nom que vous voulez donner à votre nouveau dossier. Par exemple, MD COURS créera un dossier nommé COURS dans le répertoire où vous vous trouvez. Si le nom du dossier contient des espaces, il faut mettre le nom entre guillemets.",
    "note": "MD est l'équivalent de l'option 'Nouveau dossier' de l'explorateur Windows."
  },
  {
    "titre": "Commande RD",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #f8d7da; padding: 15px; border-radius: 12px; border-left: 4px solid #dc3545;; color: #000000'><h3 style='color: #721c24; margin-top: 0;'>🗑️ Commande RD</h3><p style='color: #721c24;'><strong>RD</strong> (Remove Directory) ou <strong>RMDIR</strong> : Supprime un dossier.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>RD COURS</span></div><p style='color: #721c24; font-weight: bold; margin-top: 8px;'>⚠️ Précautions :</p><ul style='color: #721c24; line-height: 1.6; padding-left: 20px;'><li>Le dossier doit être <strong>vide</strong> pour être supprimé</li><li>Pour supprimer un dossier non vide : <span style='background: #f5c6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>RD /S COURS</span></li><li>Attention, la suppression est <strong>définitive</strong> !</li></ul></div></div>",
    "texteParle": "La commande RD, pour Remove Directory ou RMDIR, permet de supprimer un dossier. Il faut que le dossier soit vide pour pouvoir le supprimer. Si vous voulez supprimer un dossier avec son contenu, vous pouvez utiliser l'option /S. Attention, la suppression est définitive, il n'y a pas de corbeille ! Faites donc très attention quand vous utilisez cette commande.",
    "note": "RD est une commande puissante qui peut supprimer des dossiers en masse."
  },
  {
    "titre": "Commande REN",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #e8e8e8; padding: 15px; border-radius: 12px; border-left: 4px solid #6c757d;; color: #000000'><h3 style='color: #2c3e50; margin-top: 0;'>✏️ Commande REN</h3><p style='color: #2c3e50;'><strong>REN</strong> (Rename) : Renomme un fichier ou un dossier.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>REN Mathématiques Informatique</span></div><p style='color: #2c3e50; font-weight: bold; margin-top: 8px;'>Syntaxe :</p><ul style='color: #2c3e50; line-height: 1.6; padding-left: 20px;'><li><span style='background: #d6d8db; padding: 0 4px; border-radius: 4px;; color: #000000'>REN ancien_nom nouveau_nom</span></li><li>Exemple : <span style='background: #d6d8db; padding: 0 4px; border-radius: 4px;; color: #000000'>REN Maths Info</span> → Maths devient Info</li></ul></div></div>",
    "texteParle": "La commande REN, pour Rename, permet de renommer un fichier ou un dossier. La syntaxe est simple : REN suivi de l'ancien nom puis du nouveau nom. Par exemple, REN Mathématiques Informatique renommera le dossier Mathématiques en Informatique. C'est très pratique pour corriger des noms ou pour organiser vos fichiers.",
    "note": "REN fonctionne aussi bien pour les fichiers que pour les dossiers."
  },
  {
    "titre": "Commande DEL",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #f8d7da; padding: 15px; border-radius: 12px; border-left: 4px solid #dc3545;; color: #000000'><h3 style='color: #721c24; margin-top: 0;'>🗑️ Commande DEL</h3><p style='color: #721c24;'><strong>DEL</strong> (Delete) : Supprime des fichiers.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>DEL notes.txt</span></div><p style='color: #721c24; font-weight: bold; margin-top: 8px;'>⚠️ Précautions :</p><ul style='color: #721c24; line-height: 1.6; padding-left: 20px;'><li>Suppression <strong>définitive</strong> (pas de corbeille)</li><li>Utiliser des <strong>wildcards</strong> : <span style='background: #f5c6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>DEL *.txt</span> supprime tous les .txt</li><li><span style='background: #f5c6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>DEL /P</span> : Demande confirmation avant chaque suppression</li></ul></div></div>",
    "texteParle": "La commande DEL, pour Delete, permet de supprimer des fichiers. Attention, cette suppression est définitive, il n'y a pas de corbeille ! Vous pouvez supprimer un fichier spécifique comme DEL notes.txt, ou utiliser des wildcards comme l'étoile pour supprimer tous les fichiers d'un certain type, par exemple DEL *.txt pour supprimer tous les fichiers texte. L'option /P vous permet de demander une confirmation avant chaque suppression pour plus de sécurité.",
    "note": "DEL est l'équivalent de la poubelle de l'explorateur Windows, mais sans passage par la corbeille."
  },
  {
    "titre": "Commande COPY",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #d4edda; padding: 15px; border-radius: 12px; border-left: 4px solid #28a745;; color: #000000'><h3 style='color: #155724; margin-top: 0;'>📋 Commande COPY</h3><p style='color: #155724;'><strong>COPY</strong> : Copie des fichiers d'un emplacement à un autre.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>COPY notes.txt Documents\\</span></div><p style='color: #155724; font-weight: bold; margin-top: 8px;'>Syntaxe :</p><ul style='color: #155724; line-height: 1.6; padding-left: 20px;'><li><span style='background: #c3e6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>COPY source destination</span></li><li>Exemple : <span style='background: #c3e6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>COPY fichier.txt C:\\Backup\\</span></li><li>Copie vers le répertoire courant : <span style='background: #c3e6cb; padding: 0 4px; border-radius: 4px;; color: #000000'>COPY C:\\source\\*.txt .</span></li></ul></div></div>",
    "texteParle": "La commande COPY permet de copier des fichiers d'un emplacement à un autre. La syntaxe est COPY source destination. Par exemple, COPY notes.txt Documents\\ copiera le fichier notes.txt dans le dossier Documents. Vous pouvez aussi utiliser le point comme destination pour copier vers le répertoire courant. C'est très pratique pour faire des sauvegardes ou pour organiser vos fichiers.",
    "note": "COPY préserve la date et l'heure de création du fichier source."
  },
  {
    "titre": "Commande TYPE",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #e2e3e5; padding: 15px; border-radius: 12px; border-left: 4px solid #6c757d;; color: #000000'><h3 style='color: #2c3e50; margin-top: 0;'>📄 Commande TYPE</h3><p style='color: #2c3e50;'><strong>TYPE</strong> : Affiche le contenu d'un fichier texte dans la console.</p><div style='background: #343a40; padding: 12px; border-radius: 8px; font-family: monospace; color: #f8f9fa; font-size: 0.9em;'><span style='color: #6c757d;'>C:\\Users\\Eleve></span><span style='color: #00ff41;'>TYPE notes.txt</span></div><p style='color: #2c3e50; font-weight: bold; margin-top: 8px;'>Utilités :</p><ul style='color: #2c3e50; line-height: 1.6; padding-left: 20px;'><li>Voir le contenu d'un fichier sans l'ouvrir</li><li>Vérifier rapidement le contenu d'un fichier de configuration</li><li>Pour les fichiers longs, utiliser <span style='background: #ced4da; padding: 0 4px; border-radius: 4px;; color: #000000'>TYPE nom_fichier | MORE</span></li></ul></div></div>",
    "texteParle": "La commande TYPE permet d'afficher le contenu d'un fichier texte directement dans la console. C'est pratique pour vérifier rapidement ce qu'il y a dans un fichier sans avoir à l'ouvrir avec un logiciel. Par exemple, TYPE notes.txt affichera le contenu du fichier notes.txt. Si le fichier est très long, vous pouvez utiliser TYPE suivi du nom du fichier et du symbole pipe suivi de MORE pour afficher le contenu page par page.",
    "note": "TYPE ne fonctionne correctement qu'avec des fichiers texte, pas avec des fichiers binaires."
  },
  {
    "titre": "Résumé des commandes",
    "contenu": "<div style='padding: 5px 10px;'><div style='background: #2c3e50; padding: 15px; border-radius: 12px; color: #ecf0f1;'><h3 style='color: #ecf0f1; margin-top: 0;'>📌 Résumé des commandes de base</h3><table style='width: 100%; border-collapse: collapse; color: #ecf0f1;'><tr style='background: #34495e;; color: #ffffff'><th style='padding: 8px; border: 1px solid #2c3e50; text-align: left;'>Commande</th><th style='padding: 8px; border: 1px solid #2c3e50; text-align: left;'>Action</th></tr><tr style='background: #3d566e;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>DIR</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Affiche les fichiers/dossiers</td></tr><tr style='background: #2c3e50;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>CD</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Change de répertoire</td></tr><tr style='background: #3d566e;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>MD</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Crée un dossier</td></tr><tr style='background: #2c3e50;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>RD</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Supprime un dossier</td></tr><tr style='background: #3d566e;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>REN</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Renomme un fichier/dossier</td></tr><tr style='background: #2c3e50;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>DEL</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Supprime des fichiers</td></tr><tr style='background: #3d566e;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>COPY</span></td><td style='padding: 8px; border: 1px solid #2c3e50;'>Copie des fichiers</td></tr><tr style='background: #2c3e50;; color: #ffffff'><td style='padding: 8px; border: 1px solid #2c3e50;'><span style='color: #00ff41;'>TYPE</span></td><td style='padding: 8px; border;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
