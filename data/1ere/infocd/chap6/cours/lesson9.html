<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en Info 1ère CD",
    "contenu": "<div style='display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; min-height: 60vh;'>   <h1 style='color: #2c3e50; font-size: 2.2rem;'>🗄️ Généralités sur les Bases de Données</h1>   <p style='font-size: 1.3rem; color: #34495e; margin-top: 15px;'>Cours d'Informatique - Classe de Première CD</p>   <div style='background-color: #ecf0f1; padding: 15px; border-radius: 10px; margin-top: 30px; width: 90%;'>     <p style='margin: 0; color: #2c3e50;'>🔑 Compétence visée : <strong>Décrire les concepts des bases de données</strong></p>   </div>   <p style='margin-top: 40px; color: #7f8c8d;'>Découvrons ensemble comment les données sont organisées !</p> </div>",
    "texteParle": "Bonjour et bienvenue à tous en classe de Première CD. Aujourd'hui, nous allons entamer un nouveau chapitre passionnant sur les bases de données. Nous allons découvrir ce qu'est une base de données, à quoi elle sert, et pourquoi elles sont si importantes dans notre monde numérique. Préparez-vous à plonger dans l'univers de la gestion des données !",
    "note": "Ce chapitre est essentiel pour comprendre la gestion de l'information."
  },
  {
    "titre": "Qu'est-ce qu'une BD ?",
    "contenu": "<div style='padding: 10px;'>   <h3 style='color: #2980b9;'>Définition d'une Base de Données (BD)</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; border-left: 5px solid #2980b9;'>     <p style='font-size: 1.1rem;'><strong>Une base de données</strong> est un <span style='color: #e74c3c; font-weight: bold;'>ensemble structuré de données</span> stockées de façon organisée pour faciliter leur accès, leur gestion et leur mise à jour.</p>   </div>   <div style='margin-top: 20px;'>     <h4 style='color: #2c3e50;'>Caractéristiques principales :</h4>     <ul style='list-style-type: disc; padding-left: 20px;'>       <li>▶️ Les données sont <strong>organisées</strong> selon une structure logique.</li>       <li>▶️ Elles sont <strong>persistantes</strong> (conservées dans le temps).</li>       <li>▶️ Elles peuvent être <strong>interrogées</strong> et <strong>modifiées</strong> efficacement.</li>       <li>▶️ Elles sont <strong>partagées</strong> entre plusieurs utilisateurs.</li>     </ul>   </div>   <div style='background-color: #fcf3cf; padding: 12px; border-radius: 8px; margin-top: 15px;'>     <p style='margin: 0;'><span style='font-weight: bold;'>📌 Exemple :</span> Le carnet d'adresses de votre téléphone est une base de données.</p>   </div> </div>",
    "texteParle": "Commençons par définir ce qu'est une base de données. Une base de données est un ensemble structuré de données stockées de façon organisée. Imaginez un grand classeur avec des fiches bien rangées. Les données sont organisées selon une structure logique, elles sont persistantes car elles restent dans le temps, et elles peuvent être facilement interrogées ou modifiées. Un exemple simple est le carnet d'adresses de votre téléphone.",
    "note": "Une base de données peut être comparée à une bibliothèque bien organisée."
  },
  {
    "titre": "Utilité des bases de données",
    "contenu": "<div style='padding: 10px;'>   <h3 style='color: #2980b9;'>Pourquoi utiliser des bases de données ?</h3>   <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;'>     <div style='background-color: #d5f5e3; padding: 12px; border-radius: 8px; text-align: center;'>       <span style='font-size: 2rem;'>📊</span>       <p style='font-weight: bold; margin: 5px 0 0;'>Gestion massive de données</p>     </div>     <div style='background-color: #d6eaf8; padding: 12px; border-radius: 8px; text-align: center;'>       <span style='font-size: 2rem;'>🔍</span>       <p style='font-weight: bold; margin: 5px 0 0;'>Recherche rapide</p>     </div>     <div style='background-color: #fdebd0; padding: 12px; border-radius: 8px; text-align: center;'>       <span style='font-size: 2rem;'>🔄</span>       <p style='font-weight: bold; margin: 5px 0 0;'>Mise à jour facile</p>     </div>     <div style='background-color: #e8daef; padding: 12px; border-radius: 8px; text-align: center;'>       <span style='font-size: 2rem;'>👥</span>       <p style='font-weight: bold; margin: 5px 0 0;'>Partage entre utilisateurs</p>     </div>   </div>   <div style='background-color: #ecf0f1; padding: 12px; border-radius: 8px;'>     <p style='margin: 0;'>💡 Une base de données permet de <strong>réduire la redondance</strong> des données et d'<strong>assurer leur cohérence</strong>.</p>   </div> </div>",
    "texteParle": "Pourquoi utilisons-nous des bases de données ? Elles permettent de gérer de grandes quantités de données, de faire des recherches rapidement, de mettre à jour les informations facilement, et de les partager entre plusieurs utilisateurs. Elles réduisent aussi les doublons et assurent la cohérence des informations. C'est essentiel dans les entreprises, les hôpitaux, les écoles et même pour les applications que nous utilisons tous les jours.",
    "note": "Les bases de données sont partout autour de nous, dans nos téléphones, nos banques, et même notre école."
  },
  {
    "titre": "Qu'est-ce qu'un SGBD ?",
    "contenu": "<div style='padding: 10px;'>   <h3 style='color: #2980b9;'>Système de Gestion de Base de Données (SGBD)</h3>   <div style='background-color: #f4e9f9; padding: 15px; border-radius: 8px; border-left: 5px solid #8e44ad;'>     <p style='font-size: 1.1rem;'><strong>Un SGBD</strong> est un <span style='color: #8e44ad; font-weight: bold;'>logiciel</span> qui permet de créer, gérer et manipuler une base de données.</p>   </div>   <div style='margin-top: 20px;'>     <h4 style='color: #2c3e50;'>Fonctions principales d'un SGBD :</h4>     <ul style='list-style-type: disc; padding-left: 20px;'>       <li>✅ Définir la structure des données (création de tables).</li>       <li>✅ Ajouter, modifier et supprimer des données.</li>       <li>✅ Interroger les données avec des requêtes.</li>       <li>✅ Gérer les accès et la sécurité.</li>       <li>✅ Assurer l'intégrité et la cohérence des données.</li>     </ul>   </div>   <div style='background-color: #fdebd0; padding: 12px; border-radius: 8px; margin-top: 10px;'>     <p style='margin: 0;'><span style='font-weight: bold;'>🔑 Exemples de SGBD :</span> MySQL, PostgreSQL, Oracle, Microsoft SQL Server, SQLite.</p>   </div> </div>",
    "texteParle": "Maintenant, parlons du Système de Gestion de Base de Données, ou SGBD. C'est un logiciel qui permet de créer, gérer et manipuler une base de données. Il offre plusieurs fonctions comme la définition de la structure des données, l'ajout, la modification et la suppression de données, mais aussi l'interrogation et la gestion des accès. Parmi les SGBD les plus connus, nous avons MySQL, PostgreSQL, Oracle, Microsoft SQL Server ou SQLite.",
    "note": "Un SGBD peut être comparé à un bibliothécaire qui organise et gère les livres de la bibliothèque."

  {

    "texteParle": "Voyons maintenant comment une base de données est structurée. Elle se compose de plusieurs niveaux. D'abord, la base de données elle-même qui contient plusieurs tables. Chaque table est comme une feuille de calcul avec des lignes et des colonnes. Les colonnes sont appelées des champs et représentent les différentes catégories d'informations. Les lignes sont appelées des enregistrements, chaque enregistrement contient des valeurs pour chaque champ.",

    "texteParle": "Dans une base de données, les clés sont très importantes. Une clé primaire est un champ qui identifie de manière unique chaque enregistrement d'une table. Elle doit être unique et ne pas être nulle. Une clé étrangère, en revanche, est un champ qui fait référence à la clé primaire d'une autre table, ce qui permet de relier les tables entre elles et d'assurer l'intégrité des données. Par exemple, l'identifiant de l'étudiant est la clé primaire dans la table Étudiants, et l'identifiant de l'étudiant dans la table Notes est une clé étrangère.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
