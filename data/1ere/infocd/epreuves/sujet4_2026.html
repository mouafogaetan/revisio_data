<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info 1ère CD",
  "classe": "Première",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Installation d'un système d'exploitation",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>Répondez aux questions suivantes sur l'installation d'un système d'exploitation.</p>",
      "questions": [
        {
          "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Qu'est-ce qu'un système d'exploitation ? Donnez deux exemples.</span></p>",
          "reponse": "<p>Un <strong>système d'exploitation (SE)</strong> est un logiciel qui permet de faire fonctionner un ordinateur et de gérer ses ressources. Il fait le lien entre les logiciels et le matériel. Des exemples de systèmes d'exploitation sont <strong>Windows</strong> et <strong>Linux</strong>.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Que signifie « partitionner » un disque dur ?</span></p>",
          "reponse": "<p><strong>Partitionner</strong> un disque dur consiste à diviser l'espace de stockage en plusieurs <strong>parties logiques</strong> appelées partitions. Cela permet d'organiser les données, d'installer plusieurs systèmes d'exploitation sur un même disque ou de séparer les données des programmes.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Qu'est-ce que le formatage d'un disque dur ?</span></p>",
          "reponse": "<p>Le <strong>formatage</strong> est l'opération qui consiste à préparer un disque dur ou une partition à recevoir des données. Il efface les données existantes et crée une structure de fichiers (comme NTFS ou FAT32) qui permettra au système d'exploitation d'y écrire et de lire des informations.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Utilisation de l'invite de commandes",
      "points": "5 pts",
      "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>On dispose des commandes DOS suivantes : <code>DIR</code>, <code>CD</code>, <code>MD</code>, <code>RD</code>, <code>REN</code>, <code>DEL</code>, <code>COPY</code>, <code>TYPE</code>. Répondez aux questions.</p>",
      "questions": [
        {
          "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Quelle commande permet d'afficher la liste des fichiers et dossiers du répertoire courant ?</span></p>",
          "reponse": "<p>La commande <strong><code>DIR</code></strong> permet d'afficher la liste des fichiers et des sous-répertoires du répertoire courant.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Écrire la commande pour créer un répertoire nommé <code>COURS</code>.</span></p>",
          "reponse": "<p>La commande est : <strong><code>MD COURS</code></strong> (ou <code>MKDIR COURS</code>).</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Que fait la commande <code>REN Math Informatique</code> ?</span></p>",
          "reponse": "<p>La commande <strong><code>REN Math Informatique</code></strong> renomme le répertoire ou le fichier nommé <code>Math</code> en <code>Informatique</code>.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>4) <span style='font-weight: normal;'>Expliquez l'utilité de la commande <code>CD</code>.</span></p>",
          "reponse": "<p>La commande <strong><code>CD</code></strong> (Change Directory) permet de <strong>changer de répertoire</strong> courant. Par exemple, <code>CD COURS</code> permet d'entrer dans le répertoire nommé <code>COURS</code>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Sécurité informatique",
      "points": "5 pts",
      "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>La sécurité informatique est un enjeu majeur dans notre société numérique. Répondez aux questions.</p><div style='background-color: #f5f5dc; padding: 15px; border-radius: 10px; border-left: 5px solid #8B0000;'><p style='font-style: italic;'>« La cybersécurité est l'ensemble des techniques visant à protéger les systèmes informatiques contre les attaques et les menaces. »</p></div>",
      "questions": [
        {
          "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Citez les trois principes fondamentaux de la sécurité informatique et donnez une brève définition pour chacun.</span></p>",
          "reponse": "<p>Les trois principes fondamentaux sont :<br>- <strong>Confidentialité</strong> : garantir que seules les personnes autorisées ont accès à l'information.<br>- <strong>Intégrité</strong> : garantir que les données ne sont pas modifiées sans autorisation.<br>- <strong>Disponibilité</strong> : garantir que les données sont accessibles lorsque nécessaire.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Définissez les termes suivants : antivirus, pare-feu, chiffrement.</span></p>",
          "reponse": "<p>- <strong>Antivirus</strong> : Logiciel qui détecte, bloque et supprime les logiciels malveillants (virus).<br>- <strong>Pare-feu</strong> (firewall) : Système qui contrôle et filtre les communications réseau pour protéger l'ordinateur des intrusions.<br>- <strong>Chiffrement</strong> : Procédé qui transforme des données en un code illisible sans une clé de déchiffrement, pour garantir leur confidentialité.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Qu'est-ce qu'une sauvegarde (backup) et pourquoi est-elle importante ?</span></p>",
          "reponse": "<p>Une <strong>sauvegarde</strong> est la copie de données importantes sur un support externe (disque dur, clé USB, Cloud). Elle est importante car elle permet de <strong>récupérer les données</strong> en cas de perte, de panne matérielle, de virus ou de suppression accidentelle.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : QCM – Systèmes d'information et bases de données",
      "points": "6 pts",
      "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>Pour chaque question, cochez la bonne réponse.</p>",
      "questions": [
        {
          "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Un Système d'Information (SI) est :</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) Un simple logiciel de traitement de texte.</li><li>B) Un ensemble de ressources organisées pour collecter, stocker, traiter et diffuser l'information.</li><li>C) Un navigateur web.</li><li>D) Un disque dur externe.</li></ul>",
          "reponse": "<p><strong>Réponse correcte : B</strong> - Un <strong>Système d'Information</strong> est un ensemble de ressources (matérielles, logicielles, humaines) organisées pour collecter, stocker, traiter et diffuser l'information.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Dans une base de données, une ligne d'une table s'appelle :</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) Un champ</li><li>B) Un enregistrement</li><li>C) Une colonne</li><li>D) Une clé primaire</li></ul>",
          "reponse": "<p><strong>Réponse correcte : B</strong> - Une <strong>ligne</strong> dans une table de base de données est appelée un <strong>enregistrement</strong> (ou tuple). Une colonne est un champ.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Quelle est la fonction d'une clé primaire ?</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) Permettre de lier plusieurs tables.</li><li>B) Identifier de manière unique chaque enregistrement d'une table.</li><li>C) Autoriser les valeurs nulles.</li><li>D) Afficher les données dans l'ordre alphabétique.</li></ul>",
          "reponse": "<p><strong>Réponse correcte : B</strong> - Une <strong>clé primaire</strong> est un champ (ou un groupe de champs) qui <strong>identifie de manière unique</strong> chaque enregistrement dans une table.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>4) <span style='font-weight: normal;'>Parmi les méthodes suivantes, laquelle est une méthode d'analyse et de conception de systèmes d'information ?</span></p><ul style='list-style-type: none; padding-left: 10px;'><li>A) MERISE</li><li>B) Photoshop</li><li>C) HTML</li><li>D) SQL</li></ul>",
          "reponse": "<p><strong>Réponse correcte : A</strong> - <strong>MERISE</strong> est une méthode d'analyse et de conception de systèmes d'information (SI).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Calcul de la taille d'une image",
      "points": "4 pts",
      "enonce": "<p style='font-size: 1.1rem; line-height: 1.6;'>Une image numérique a une définition de 1920 × 1080 pixels et une profondeur de couleur de 24 bits. Calculez la taille de cette image en octets puis en Mégaoctets (Mo).</p>",
      "questions": [
        {
          "question": "<p style='font-weight: bold;'>1) <span style='font-weight: normal;'>Calculez la taille en bits de cette image.</span></p>",
          "reponse": "<p>Taille (bits) = Définition × Profondeur = 1920 × 1080 × 24.<br>1920 × 1080 = 2 073 600 pixels.<br>Taille (bits) = 2 073 600 × 24 = <strong>49 766 400 bits</strong>.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>2) <span style='font-weight: normal;'>Convertissez la taille obtenue en octets.</span></p>",
          "reponse": "<p>Taille (octets) = Taille (bits) / 8.<br>49 766 400 / 8 = <strong>6 220 800 octets</strong>.</p>"
        },
        {
          "question": "<p style='font-weight: bold;'>3) <span style='font-weight: normal;'>Convertissez la taille en Mégaoctets (Mo). On donne 1 Mo = 1024 Ko et 1 Ko = 1024 octets.</span></p>",
          "reponse": "<p>On convertit d'abord en Ko : 6 220 800 / 1024 = 6075 Ko (arrondi).<br>Puis en Mo : 6075 / 1024 = <strong>5,93 Mo</strong> (arrondi).</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
