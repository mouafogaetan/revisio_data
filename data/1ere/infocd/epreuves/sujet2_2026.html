<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Première CD",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Installation et post-installation d'un SE (7 pts)",
      "points": "7 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Un nouveau disque dur a été installé dans l'ordinateur du laboratoire d'informatique. L'administrateur souhaite y installer un système d'exploitation et effectuer les opérations nécessaires.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1,5 pt)</strong> Définis un <strong>système d'exploitation</strong> et cite deux types de systèmes d'exploitation.</p>",
          "reponse": "<p><strong>Système d'exploitation :</strong> Un système d'exploitation (SE) est un ensemble de programmes qui gère les ressources matérielles d'un ordinateur et fournit une interface entre l'utilisateur et le matériel.</p><p><strong>Types :</strong> Windows, Linux, macOS (citer deux).</p>"
        },
        {
          "question": "<p><strong>2. (1,5 pt)</strong> Quelle action doit-on réaliser avant d'installer un système d'exploitation sur un disque dur vierge ? Définis cette action.</p>",
          "reponse": "<p>Avant d'installer un SE, on doit <strong>partitionner</strong> le disque dur.</p><p><strong>Partitionnement :</strong> C'est l'action de diviser un disque dur en plusieurs parties logiques appelées partitions. Chaque partition peut être utilisée comme un disque indépendant.</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Définis une <strong>partition secondaire</strong>.</p>",
          "reponse": "<p>Une <strong>partition secondaire</strong> est une partie d'un disque dur dédiée à une utilisation spécifique. Elle se trouve à l'intérieur d'une partition étendue et ne peut pas être amorçable.</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Cite trois opérations que l'on doit effectuer après l'installation d'un système d'exploitation (post-installation).</p>",
          "reponse": "<p><strong>Opérations post-installation :</strong></p><ul><li>Installer les pilotes (drivers) des périphériques.</li><li>Configurer les paramètres système (date, heure, réseau).</li><li>Installer les logiciels nécessaires.</li></ul>"
        },
        {
          "question": "<p><strong>5. (2 pts)</strong> Explique l'utilité d'un <strong>point de restauration</strong> et indique comment le créer sous Windows.</p>",
          "reponse": "<p><strong>Utilité :</strong> Un point de restauration permet de ramener les éléments du système à un état antérieur, en cas de problème (mauvaise installation, virus, etc.). Il ne supprime pas les fichiers personnels.</p><p><strong>Création :</strong> Panneau de configuration → Système → Protection du système → Créer.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Invite de commandes (DOS) (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #fff5e6; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>L'invite de commandes permet d'interagir avec le système d'exploitation via des commandes textuelles.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis l'<strong>invite de commandes</strong>.</p>",
          "reponse": "<p>L'<strong>invite de commandes</strong> est une interface textuelle qui permet à l'utilisateur d'interagir avec le système d'exploitation en saisissant des commandes.</p>"
        },
        {
          "question": "<p><strong>2. (4 pts)</strong> Quelle commande permet de réaliser chacune des actions suivantes ?</p><ul><li><strong>a) (0,75 pt)</strong> Afficher tous les fichiers et sous-répertoires du répertoire courant.</li><li><strong>b) (0,75 pt)</strong> Créer un répertoire nommé 'COURS'.</li><li><strong>c) (0,75 pt)</strong> Supprimer un répertoire nommé 'MATHEMATIQUES'.</li><li><strong>d) (0,75 pt)</strong> Renommer un fichier 'ancien.txt' en 'nouveau.txt'.</li><li><strong>e) (0,5 pt)</strong> Afficher l'aide de la commande DIR.</li><li><strong>f) (0,5 pt)</strong> Copier un fichier 'source.txt' vers 'dest.txt'.</li></ul>",
          "reponse": "<p><strong>a)</strong> DIR<br><strong>b)</strong> MD COURS ou MKDIR COURS<br><strong>c)</strong> RD MATHEMATIQUES ou RMDIR MATHEMATIQUES<br><strong>d)</strong> REN ancien.txt nouveau.txt<br><strong>e)</strong> DIR /?<br><strong>f)</strong> COPY source.txt dest.txt</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Quelle commande permet d'afficher le contenu d'un fichier texte ?</p>",
          "reponse": "<p>La commande <strong>TYPE</strong> permet d'afficher le contenu d'un fichier texte.</p><p>Exemple : <code>TYPE monFichier.txt</code></p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Sécurité informatique (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #f0fff0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Un élève du lycée reçoit un e-mail suspect lui demandant ses identifiants de connexion. Il se demande comment se protéger.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis la <strong>cybersécurité</strong>.</p>",
          "reponse": "<p>La <strong>cybersécurité</strong> est l'ensemble des techniques, des pratiques et des politiques visant à protéger les systèmes informatiques, les réseaux et les données contre les cyberattaques et les accès non autorisés.</p>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Énonce les quatre principes fondamentaux de la sécurité informatique.</p>",
          "reponse": "<p><strong>Les quatre principes fondamentaux :</strong></p><ul><li><strong>Intégrité :</strong> Les données ne doivent pas être modifiées sans autorisation.</li><li><strong>Confidentialité :</strong> Seules les personnes autorisées peuvent accéder aux données.</li><li><strong>Disponibilité :</strong> Les données et les systèmes doivent être accessibles quand on en a besoin.</li><li><strong>Authentification :</strong> Vérifier l'identité d'un utilisateur avant de lui accorder l'accès.</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> À quelle menace correspond l'e-mail suspect reçu par l'élève ? Définis cette menace.</p>",
          "reponse": "<p>Il s'agit d'une tentative d'<strong>hameçonnage (phishing)</strong>.</p><p><strong>Définition :</strong> L'hameçonnage est une technique de fraude qui consiste à envoyer des e-mails ou des messages se faisant passer pour une entité de confiance, dans le but de soutirer des informations personnelles (identifiants, mots de passe, numéros de carte bancaire).</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Cite deux techniques de protection contre ce type de menace.</p>",
          "reponse": "<p><strong>Techniques de protection :</strong></p><ul><li><strong>Authentification forte :</strong> Utiliser l'authentification à deux facteurs (mot de passe + code reçu par SMS).</li><li><strong>Vigilance :</strong> Ne jamais cliquer sur les liens suspects et vérifier l'adresse de l'expéditeur.</li></ul>"
        },
        {
          "question": "<p><strong>5. (1 pt)</strong> Explique l'utilité d'une sauvegarde régulière des données.</p>",
          "reponse": "<p>La sauvegarde régulière permet de <strong>récupérer ses données en cas de problème</strong> (panne matérielle, virus, suppression accidentelle, ransomware). Elle garantit la disponibilité des informations.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Images numériques et multimédia (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #e6f2ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Un photographe souhaite stocker une image numérique de haute qualité pour une impression sur un grand format. Il doit connaître les caractéristiques de l'image.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis la <strong>définition</strong> d'une image numérique.</p>",
          "reponse": "<p>La <strong>définition</strong> d'une image numérique est le nombre total de pixels qui la composent. Elle correspond au produit du nombre de colonnes par le nombre de lignes.</p>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Qu'est-ce que la <strong>profondeur des couleurs</strong> d'une image ?</p>",
          "reponse": "<p>La <strong>profondeur des couleurs</strong> est le nombre de bits utilisés pour coder chaque pixel d'une image. Plus ce nombre est élevé, plus l'image peut contenir de couleurs différentes.</p>"
        },
        {
          "question": "<p><strong>3. (3 pts)</strong> Calcule la taille d'une image ayant une définition de 1920×1080 pixels et une profondeur de couleurs de 24 bits.</p><p>Formules :</p><ul><li>Taille (bits) = Définition × Profondeur</li><li>Taille (octets) = Taille (bits) / 8</li><li>1 Ko = 1024 octets, 1 Mo = 1024 Ko</li></ul>",
          "reponse": "<p><strong>Calcul :</strong></p><p>Définition = 1920 × 1080 = 2 073 600 pixels</p><p>Taille (bits) = 2 073 600 × 24 = 49 766 400 bits</p><p>Taille (octets) = 49 766 400 / 8 = 6 220 800 octets</p><p>Taille (Ko) = 6 220 800 / 1024 ≈ 6075 Ko</p><p>Taille (Mo) = 6075 / 1024 ≈ <strong>5,93 Mo</strong></p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Algorithmique et structures de données (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #e8f4fd; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Un élève doit écrire un algorithme pour gérer les notes de la classe.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Définis une <strong>structure itérative (boucle)</strong> et cite les trois types de boucles.</p>",
          "reponse": "<p>Une <strong>structure itérative</strong> permet d'exécuter une séquence d'instructions de manière répétée.</p><p><strong>Types :</strong></p><ul><li>Boucle POUR (FOR) : quand le nombre d'itérations est connu.</li><li>Boucle TANT QUE (WHILE) : quand le nombre d'itérations dépend d'une condition.</li><li>Boucle REPETER JUSQU'A (DO...WHILE) : exécute au moins une fois.</li></ul>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Écris l'algorithme d'une boucle POUR qui affiche les nombres de 1 à 10.</p><p>Syntaxe : pour i allant de 1 à N pas=1 faire ... finpour</p>",
          "reponse": "<p><strong>Algorithme :</strong></p><pre style='background: #f4f4f9; padding: 10px; border-radius: 5px;'>Algorithme AfficherNombres\n    Variable i : entier\n    Début\n        Pour i allant de 1 à 10 pas = 1 faire\n            Ecrire(i)\n        FinPour\n    Fin</pre>"
        },

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
