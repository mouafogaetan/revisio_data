<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Première",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercise 1: Verb Tenses (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Complete the sentences with the correct verb tense: Present Simple, Present Continuous, Past Simple, Past Continuous, Present Perfect, or Past Perfect.</strong></p>",
      "questions": [
        {
          "question": "<p>1. Every day, my brother _______________ (walk) to school.</p>",
          "reponse": "<p><strong>walks</strong> (Present Simple - habit)</p>"
        },
        {
          "question": "<p>2. Right now, the students _______________ (write) their exam.</p>",
          "reponse": "<p><strong>are writing</strong> (Present Continuous - action in progress)</p>"
        },
        {
          "question": "<p>3. Last week, we _______________ (visit) our grandmother.</p>",
          "reponse": "<p><strong>visited</strong> (Past Simple - completed past action)</p>"
        },
        {
          "question": "<p>4. While I _______________ (watch) TV, my sister called me.</p>",
          "reponse": "<p><strong>was watching</strong> (Past Continuous - interrupted action)</p>"
        },
        {
          "question": "<p>5. She _______________ (not / finish) her homework yet.</p>",
          "reponse": "<p><strong>has not finished</strong> (Present Perfect - recent action with 'yet')</p>"
        },
        {
          "question": "<p>6. By the time we arrived, they _______________ (already / leave).</p>",
          "reponse": "<p><strong>had already left</strong> (Past Perfect - action before another past action)</p>"
        },
        {
          "question": "<p>7. I think it _______________ (rain) tomorrow.</p>",
          "reponse": "<p><strong>will rain</strong> (Future - prediction with 'will')</p>"
        },
        {
          "question": "<p>8. They _______________ (build) a new school in our neighbourhood next year.</p>",
          "reponse": "<p><strong>are going to build</strong> (Future - intention with 'going to')</p>"
        }
      ]
    },
    {
      "titre": "Exercise 2: Modal Auxiliaries (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Fill in the blanks with the appropriate modal verb: can, could, may, must, have to, should, ought to, might, mustn't.</strong></p>",
      "questions": [
        {
          "question": "<p>1. You _______________ brush your teeth twice a day to have healthy teeth. (advice)</p>",
          "reponse": "<p><strong>should</strong> or <strong>ought to</strong></p>"
        },
        {
          "question": "<p>2. Students _______________ use their phones during the exam. (prohibition)</p>",
          "reponse": "<p><strong>mustn't</strong></p>"
        },
        {
          "question": "<p>3. I _______________ speak three languages: English, French, and German. (ability)</p>",
          "reponse": "<p><strong>can</strong></p>"
        },
        {
          "question": "<p>4. _______________ I open the window? It's very hot. (asking for permission)</p>",
          "reponse": "<p><strong>May</strong> or <strong>Can</strong> or <strong>Could</strong></p>"
        },
        {
          "question": "<p>5. She _______________ be at the library. She always studies there in the afternoon. (deduction)</p>",
          "reponse": "<p><strong>must</strong></p>"
        },
        {
          "question": "<p>6. He _______________ come to the party, but he is not sure yet. (probability)</p>",
          "reponse": "<p><strong>might</strong> or <strong>may</strong> or <strong>could</strong></p>"
        },
        {
          "question": "<p>7. In Cameroon, all citizens _______________ pay taxes. (obligation)</p>",
          "reponse": "<p><strong>have to</strong> or <strong>must</strong></p>"
        },
        {
          "question": "<p>8. When I was a child, I _______________ play football all day. (past ability)</p>",
          "reponse": "<p><strong>could</strong></p>"
        }
      ]
    },
    {
      "titre": "Exercise 3: Conditionals (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Complete the following conditional sentences with the correct form of the verbs in brackets.</strong></p>",
      "questions": [
        {
          "question": "<p>1. If you heat water to 100°C, it _______________ (boil). (Type 0)</p>",
          "reponse": "<p><strong>boils</strong></p>"
        },
        {
          "question": "<p>2. If it rains tomorrow, we _______________ (not / go) to the football match. (Type 1)</p>",
          "reponse": "<p><strong>will not go</strong></p>"
        },
        {
          "question": "<p>3. If I _______________ (be) a doctor, I would help people in rural areas. (Type 2)</p>",
          "reponse": "<p><strong>were</strong></p>"
        },
        {
          "question": "<p>4. If they _______________ (arrive) late, they would have missed the beginning of the show. (Type 3)</p>",
          "reponse": "<p><strong>had arrived</strong></p>"
        },
        {
          "question": "<p>5. She would travel around the world if she _______________ (have) enough money. (Type 2)</p>",
          "reponse": "<p><strong>had</strong></p>"
        },
        {
          "question": "<p>6. Unless you _______________ (study) hard, you will not pass the exam. (Type 1)</p>",
          "reponse": "<p><strong>study</strong></p>"
        },
        {
          "question": "<p>7. If I _______________ (know) about the meeting, I would have attended it. (Type 3)</p>",
          "reponse": "<p><strong>had known</strong></p>"
        },
        {
          "question": "<p>8. If you mix red and blue, you _______________ (get) purple. (Type 0)</p>",
          "reponse": "<p><strong>get</strong></p>"
        }
      ]
    },
    {
      "titre": "Exercise 4: Reported Speech (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Rewrite the following sentences in reported (indirect) speech.</strong></p>",
      "questions": [
        {
          "question": "<p>1. The teacher said, \"The Earth goes around the Sun.\"</p>",
          "reponse": "<p>The teacher said that the Earth <strong>goes</strong> around the Sun. (general truth - no change)</p>"
        },
        {
          "question": "<p>2. Peter said, \"I am reading a good book.\"</p>",
          "reponse": "<p>Peter said that he <strong>was reading</strong> a good book.</p>"
        },
        {
          "question": "<p>3. \"We visited the museum yesterday,\" she told us.</p>",
          "reponse": "<p>She told us that they <strong>had visited</strong> the museum the day before.</p>"
        },
        {
          "question": "<p>4. \"I will come to the party tomorrow,\" he said.</p>",
          "reponse": "<p>He said that he <strong>would come</strong> to the party the next day.</p>"
        },
        {
          "question": "<p>5. \"Can you help me with the project?\" she asked.</p>",
          "reponse": "<p>She asked if I <strong>could help</strong> her with the project.</p>"
        },
        {
          "question": "<p>6. \"Where do you live?\" he asked me.</p>",
          "reponse": "<p>He asked me where I <strong>lived</strong>.</p>"
        },
        {
          "question": "<p>7. \"Don't touch the wires!\" the security guard warned us.</p>",
          "reponse": "<p>The security guard warned us <strong>not to touch</strong> the wires.</p>"
        },
        {
          "question": "<p>8. \"Please bring me a glass of water,\" she asked the waiter.</p>",
          "reponse": "<p>She asked the waiter <strong>to bring</strong> her a glass of water.</p>"
        }
      ]
    },
    {
      "titre": "Exercise 5: Passive Voice (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Change the following sentences from active to passive voice.</strong></p>",
      "questions": [
        {
          "question": "<p>1. The police arrested the thief yesterday.</p>",
          "reponse": "<p>The thief <strong>was arrested</strong> (by the police) yesterday.</p>"
        },
        {
          "question": "<p>2. The students are organizing a charity event.</p>",
          "reponse": "<p>A charity event <strong>is being organized</strong> (by the students).</p>"
        },
        {
          "question": "<p>3. The company will launch a new product next month.</p>",
          "reponse": "<p>A new product <strong>will be launched</strong> (by the company) next month.</p>"
        },
        {
          "question": "<p>4. They have already finished the project.</p>",
          "reponse": "<p>The project <strong>has already been finished</strong> (by them).</p>"
        },
        {
          "question": "<p>5. People speak English all over the world.</p>",
          "reponse": "<p>English <strong>is spoken</strong> all over the world.</p>"
        },
        {
          "question": "<p>6. She was cleaning the room when I arrived.</p>",
          "reponse": "<p>The room <strong>was being cleaned</strong> (by her) when I arrived.</p>"
        },
        {
          "question": "<p>7. They had booked the tickets before the show.</p>",
          "reponse": "<p>The tickets <strong>had been booked</strong> (by them) before the show.</p>"
        },
        {
          "question": "<p>8. The government must build more hospitals.</p>",
          "reponse": "<p>More hospitals <strong>must be built</strong> (by the government).</p>"
        }
      ]
    },
    {
      "titre": "Exercise 6: Relative Pronouns (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Complete the sentences with a relative pronoun: who, which, that, whose, whom. Then identify if the clause is defining (D) or non-defining (ND).</strong></p>",
      "questions": [
        {
          "question": "<p>1. The student _______________ won the competition is in my class.</p>",
          "reponse": "<p><strong>who</strong> or <strong>that</strong> (D)</p>"
        },
        {
          "question": "<p>2. This is the book _______________ I told you about.</p>",
          "reponse": "<p><strong>which</strong> or <strong>that</strong> (D)</p>"
        },
        {
          "question": "<p>3. My sister, _______________ lives in France, is a doctor.</p>",
          "reponse": "<p><strong>who</strong> (ND)</p>"
        },
        {
          "question": "<p>4. The man _______________ car was stolen reported it to the police.</p>",
          "reponse": "<p><strong>whose</strong> (D)</p>"
        },
        {
          "question": "<p>5. I met the singer _______________ you admire so much.</p>",
          "reponse": "<p><strong>whom</strong> or <strong>who</strong> or <strong>that</strong> (D)</p>"
        },
        {
          "question": "<p>6. The club, _______________ was founded in 1990, has many members.</p>",
          "reponse": "<p><strong>which</strong> (ND)</p>"
        },
        {
          "question": "<p>7. The children _______________ play in the garden are my neighbours.</p>",
          "reponse": "<p><strong>who</strong> or <strong>that</strong> (D)</p>"
        },
        {
          "question": "<p>8. The house _______________ windows are broken needs repairs.</p>",
          "reponse": "<p><strong>whose</strong> (D)</p>"
        }
      ]
    },
    {
      "titre": "Exercise 7: Question Tags (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Add the correct question tag to the following sentences.</strong></p>",
      "questions": [
        {
          "question": "<p>1. She is a good student, _______________ ?</p>",
          "reponse": "<p><strong>isn't she?</strong></p>"
        },
        {
          "question": "<p>2. They didn't finish their homework, _______________ ?</p>",
          "reponse": "<p><strong>did they?</strong></p>"
        },
        {
          "question": "<p>3. Let's go to the cinema, _______________ ?</p>",
          "reponse": "<p><strong>shall we?</strong></p>"
        },
        {
          "question": "<p>4. I am the best candidate, _______________ ?</p>",
          "reponse": "<p><strong>aren't I?</strong></p>"
        },
        {
          "question": "<p>5. Close the door, _______________ ?</p>",
          "reponse": "<p><strong>will you?</strong></p>"
        },
        {
          "question": "<p>6. Everyone knows the answer, _______________ ?</p>",
          "reponse": "<p><strong>don't they?</strong></p>"
        },
        {
          "question": "<p>7. He can swim well, _______________ ?</p>",
          "reponse": "<p><strong>can't he?</strong></p>"
        },
        {
          "question": "<p>8. Nothing was wrong, _______________ ?</p>",
          "reponse": "<p><strong>was it?</strong></p>"
        }
      ]
    },
    {
      "titre": "Exercise 8: Specific Structures and Vocabulary (4 pts)",
      "points": "4 pts",
      "enonce": "<p><strong>Part A: Complete the sentences using either...or, neither...nor, or not only...but also.</strong></p><p><strong>Part B: Fill in the blanks with the appropriate vocabulary (human rights, governance, health, environment, education).</strong></p>",
      "questions": [
        {
          "question": "<p><strong>Part A (2 pts):</strong></p><p>1. She wants to study _______________ law _______________ journalism. (choice)</p>",
          "reponse": "<p><strong>either ... or</strong></p>"
        },
        {
          "question": "<p>2. He _______________ plays football _______________ basketball. (negation)</p>",
          "reponse": "<p><strong>neither ... nor</strong></p>"
        },
        {
          "question": "<p>3. The festival _______________ celebrates culture _______________ promotes tourism. (addition)</p>",
          "reponse": "<p><strong>not only ... but also</strong></p>"
        },
        {
          "question": "<p>4. You can have _______________ coffee _______________ tea. (choice)</p>",
          "reponse": "<p><strong>either ... or</strong></p>"
        },
        {
          "question": "<p><strong>Part B (2 pts):</strong></p><p>5. _______________ means treating all people equally regardless of their background.</p>",
          "reponse": "<p><strong>Equality</strong></p>"
        },
        {
          "question": "<p>6. The destruction of forests causes _______________ pollution.</p>",
          "reponse": "<p><strong>environmental</strong></p>"
        },
        {
          "question": "<p>7. In a _______________, leaders are elected by the people.</p>",
          "reponse": "<p><strong>democracy</strong></p>"
        },
        {
          "question": "<p>8. Regular exercise is important for good _______________.</p>",
          "reponse": "<p><strong>health</strong></p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
