<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue",
  "classe": "Première",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Analyse des paramètres de la communication (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Lisez attentivement l'extrait suivant puis répondez aux questions.</p><p><em>« Maman, je t'en supplie, ne me regarde pas comme ça. Je sais que j'ai mal agi, mais tu ne peux pas comprendre ce que je ressens. C'est comme si un poids énorme s'était abattu sur mes épaules et que je n'arrivais plus à respirer. S'il te plaît, écoute-moi avant de juger. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Identifier l'émetteur et le récepteur dans cet extrait. Justifier votre réponse en relevant les indices qui vous ont permis de les identifier.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Émetteur :</strong> L'enfant (ou le locuteur) qui parle à sa mère.<br><strong>Indices :</strong> Emploi de la 1ère personne (« je sais », « je ressens »), adjectif possessif (« mes épaules »).<br><strong>Récepteur :</strong> La mère du locuteur.<br><strong>Indices :</strong> Interpellation directe (« Maman »), emploi de la 2ème personne (« tu », « t' »).</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Décrire la nature de la relation entre l'émetteur et le récepteur. Quelle est l'attitude de l'émetteur envers le récepteur ?</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La relation est une relation familiale (mère-enfant). L'attitude de l'émetteur est marquée par la supplication, la culpabilité et un appel à la compréhension. Il est en position d'infériorité, cherchant à apaiser une tension.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> a) Identifier le référent principal de ce texte.<br>b) Déterminer l'attitude de l'émetteur vis-à-vis du référent.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a)</strong> Le référent principal est l'acte répréhensible que l'émetteur a commis et qui a déçu sa mère.<br><strong>b)</strong> L'attitude de l'émetteur est marquée par le regret, la culpabilité et la crainte du jugement de sa mère.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Fonctions du langage et énonciation (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Analysez le dialogue suivant.</p><p><strong>Jean :</strong> « Bonjour Marie, comment vas-tu ? »<br><strong>Marie :</strong> « Je vais bien, merci. Mais je suis vraiment fatiguée de ce travail. »<br><strong>Jean :</strong> « Écoute, prends du repos, tu as besoin de te ressourcer. »<br><strong>Marie :</strong> « Tu as raison, peut-être que je devrais prendre quelques jours de congé. »</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Identifier la fonction du langage dominante dans la réplique de Jean : « Bonjour Marie, comment vas-tu ? » Justifier votre réponse.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La fonction <strong>phatique</strong> est dominante ici. Cette réplique sert à établir et maintenir le contact avec l'interlocuteur, à s'assurer que le canal est ouvert.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Dans la réplique de Marie : « Je vais bien, merci. Mais je suis vraiment fatiguée de ce travail. », quelle(s) fonction(s) du langage sont à l'œuvre ? Justifier.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Deux fonctions sont à l'œuvre :<br>- La fonction <strong>référentielle</strong> (« Je vais bien, merci ») car elle apporte une information objective sur son état de santé.<br>- La fonction <strong>expressive</strong> (« je suis vraiment fatiguée ») car elle exprime un sentiment personnel.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> Identifier la fonction du langage dominante dans la réplique de Jean : « Écoute, prends du repos, tu as besoin de te ressourcer. » Relever les indices et expliquer l'intention de l'émetteur.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La fonction <strong>conative</strong> est dominante. Les indices sont : l'emploi de l'impératif (« prends »), l'interpellation (« Écoute »), et l'usage du pronom personnel « tu ». L'intention de l'émetteur est d'influencer le comportement de Marie, de lui donner un conseil pour qu'elle agisse.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>4)</strong> Dans la réplique de Marie : « Tu as raison, peut-être que je devrais prendre quelques jours de congé. », identifier la fonction du langage qui traduit une mise à distance ou une hésitation.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La fonction <strong>expressive</strong> se manifeste à travers le conditionnel (« devrais ») et l'adverbe d'opinion (« peut-être ») qui expriment une hésitation, une hypothèse.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Étude grammaticale et stylistique (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Étudiez le texte suivant d'Émile Zola :</p><p><em>« La grande foire ronflait, dans ce coin de Paris, avec une gaieté énorme. Les tourne-disques beuglaient des airs à la mode, les marchands de gaufres et de pommes d'amour criaient leurs marchandises d'une voix enrouée. Une foule immense, piétinant dans l'odeur de friture et de sucre, hurlait de joie, tournoyait au milieu des lumières clignotantes. Cependant, au fond de son cœur, il restait seul, comme un noyé au milieu d'un océan de plaisirs. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Relever les temps du passé utilisés dans ce texte. Identifier leur valeur dans chaque cas.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Imparfait</strong> (« ronflait », « beuglaient », « criaient », « restait », « hurlait », « tournoyait ») : Valeur descriptive, action en cours ou répétée dans le passé.<br><strong>Passé simple</strong> : Aucun dans le texte.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Identifier le mode des verbes suivants : « piétinant », « tournoyait ».</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>« piétinant » est un participe présent (mode impersonnel).<br>« tournoyait » est à l'indicatif.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> a) Relever deux figures de style dans ce texte et les nommer.<br>b) Analyser l'effet produit par chacune de ces figures.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a)</strong> <em>« une foule immense »</em> : Hyperbole ; <em>« comme un noyé au milieu d'un océan de plaisirs »</em> : Comparaison.<br><strong>b)</strong> L'hyperbole crée une impression de grandeur et d'intensité. La comparaison suggère un sentiment d'isolement et de noyade dans le tumulte ambiant.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>4)</strong> Construire le champ lexical de la fête dans ce texte, puis identifier la tonalité qui en découle.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Champ lexical :</strong> gaieté, beuglaient, marchands, foule immense, hurlait de joie, lumières clignotantes.<br><strong>Tonalité :</strong> La tonalité est d'abord festive puis pathétique lorsqu'elle se concentre sur la solitude du personnage central.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Production écrite (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Situation : Vous êtes le secrétaire général de l'association des élèves de votre lycée. Vous devez écrire un discours pour motiver vos camarades à s'engager davantage dans les activités humanitaires de l'école.</p><p><strong>Consignes :</strong><br>- Utilisez les pronoms <strong>« je »</strong> et <strong>« nous »</strong> pour créer un lien avec votre auditoire (fonction expressive).<br>- Utilisez des phrases impératives et des questions rhétoriques pour interpeller vos camarades (fonction conative).<br>- Utilisez au moins une métaphore et une hyperbole pour renforcer votre message.<br>- Rédigez un discours de 15 à 20 lignes.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Rédiger le discours en respectant les consignes.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><p><strong>Discours du secrétaire général :</strong></p><p><em>« Chers camarades, chers amis,</em></p><p><em>Je vous parle aujourd'hui avec le cœur. Nous sommes les bâtisseurs de demain, et pourtant, sommes-nous vraiment à la hauteur de cette responsabilité ? Je vois autour de moi des talents, des énergies, mais je vois aussi trop d'indifférence face à la misère qui nous entoure.</em></p><p><em>Ne restons pas spectateurs de notre temps ! Le monde est une grande famille, et chaque élève est une brique indispensable à sa construction. Engageons-nous ! Donnons de notre temps, de notre sourire, de notre énergie pour ceux qui en ont besoin.</em></p><p><em>Je sais que vous avez le cœur grand comme l'océan. Alors, ne laissons pas cette flamme s'éteindre. Rejoignez-nous, et ensemble, nous ferons de notre lycée un phare d'espoir. La solidarité est la clé d'un avenir meilleur. Alors, qu'attendez-vous ? Relevez le défi avec nous ! »</em></p></div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Souligner dans votre discours :<br>a) Un exemple de fonction expressive.<br>b) Un exemple de fonction conative.<br>c) Une métaphore et une hyperbole.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><p><strong>a) Fonction expressive :</strong> <em>« Je vous parle aujourd'hui avec le cœur. »</em> (exprimer un sentiment personnel).</p><p><strong>b) Fonction conative :</strong> <em>« Engageons-nous ! »</em> ou <em>« Alors, qu'attendez-vous ? »</em> (inciter à l'action).</p><p><strong>c) Métaphore :</strong> <em>« notre lycée un phare d'espoir. »</em><br><strong>Hyperbole :</strong> <em>« Vous avez le cœur grand comme l'océan. »</em></p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
