<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue",
  "classe": "Première",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Paramètres de la communication (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur l'identification des paramètres de la communication et de la relation entre les interlocuteurs.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Dans le passage suivant : <em>« Ne me regarde pas ainsi, mon ami. Tu sais bien que je n'ai jamais voulu te faire de mal. »</em></p><p>a) Identifie l'émetteur et le récepteur.<br>b) Quels indices permettent de reconnaître le récepteur ?</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Émetteur :</strong> Le locuteur (celui qui parle, identifié par les pronoms « me », « je »). <strong>Récepteur :</strong> Le destinataire, désigné par « mon ami » et le pronom « te ».</p><p><strong>b) Indices reconnaissant le récepteur :</strong> L'apostrophe « mon ami », le pronom personnel de la 2e personne « te », l'adjectif possessif « ton » sous-entendu.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Analyser la relation entre l'émetteur et le récepteur dans cette phrase : <em>« Veuillez vous asseoir et m'écouter attentivement, je vous prie. »</em></p><p>a) Quelle est la nature de la relation ?<br>b) Quelle est l'attitude de l'émetteur ?</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Nature de la relation :</strong> La relation est hiérarchique ou formelle (usage du « vous » de politesse et de la formule « je vous prie »).</p><p><strong>b) Attitude de l'émetteur :</strong> L'émetteur adopte une attitude de respect et d'autorité (il donne un ordre poli).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1 pt)</strong> Explique ce qu'est un <strong>référent</strong> et identifie-le dans le sujet suivant : <em>« Les conséquences du réchauffement climatique sont de plus en plus visibles. »</em></p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Le <strong>référent</strong> est ce dont on parle, le sujet du discours. Ici, le référent est <strong>« les conséquences du réchauffement climatique »</strong>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Fonctions du langage (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice vise à identifier et analyser les fonctions du langage selon le modèle de Jakobson.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (2 pts)</strong> a) Nomme les six fonctions du langage selon Jakobson.<br>b) Laquelle est centrée sur le récepteur ?</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Les six fonctions sont :</strong> expressive, conative, référentielle, phatique, métalinguistique et poétique.</p><p><strong>b) La fonction conative (ou impressive)</strong> est centrée sur le récepteur. Elle vise à agir sur le destinataire.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (2 pts)</strong> Lisez ce passage : <em>« Hélas ! Je suis triste et fatigué de cette vie. Que vais-je devenir ? »</em></p><p>a) Quelle est la fonction dominante ? Justifie ta réponse en relevant des indices précis.<br>b) Interprète l'intention de l'émetteur.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) Fonction dominante :</strong> La fonction expressive (ou émotive).</p><p><strong>Indices :</strong> L'interjection « Hélas ! », le pronom personnel de la 1re personne « je », le vocabulaire affectif (« triste », « fatigué »), les points d'exclamation et d'interrogation qui expriment l'émotion.</p><p><strong>b) Intention :</strong> L'émetteur cherche à exprimer son sentiment de profonde tristesse et son désarroi face à l'avenir.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Temps, modes et concordance (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur l'identification des valeurs des temps et des modes, et l'application des règles de concordance.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Dans les phrases suivantes, identifie le temps utilisé et justifie sa valeur :<br>a) <em>Il lisait tranquillement quand on frappa à la porte.</em><br>b) <em>Dès qu'il eut terminé son travail, il sortit.</em></p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) « lisait » :</strong> Imparfait. Il exprime une action en cours (ou de second plan) dans le passé, interrompue par une action ponctuelle (« frappa »). Il a une valeur de description/durée.</p><p><strong>b) « eut terminé » :</strong> Plus-que-parfait. Il exprime une action antérieure à une autre action passée (celle exprimée par le passé simple « sortit »).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Distingue les valeurs du conditionnel dans ces phrases :<br>a) <em>Il aimerait voyager autour du monde.</em><br>b) <em>Il m'a dit qu'il viendrait demain.</em></p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) « aimerait » :</strong> Valeur de souhait ou de rêve.</p><p><strong>b) « viendrait » :</strong> Valeur de futur dans le passé (il a dit qu'il viendrait).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Complète les phrases en conjuguant le verbe au mode et au temps qui conviennent :<br>a) Je veux que tu (faire) ... tes devoirs.<br>b) Il faut que vous (partir) ... avant la nuit.<br>c) (Prendre) ... votre parapluie, il va pleuvoir !</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) fasses</strong> (subjonctif présent, après « que » exprimant la volonté).</p><p><strong>b) partiez</strong> (subjonctif présent, après « il faut que »).</p><p><strong>c) Prenez</strong> (impératif présent, ordre/conseil).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>4. (1.5 pts)</strong> Applique la règle de concordance des temps :<br>a) Il m'a assuré qu'il (venir) ... à ma fête.<br>b) Je savais qu'il (être) ... le meilleur.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) viendrait</strong> (Futur dans le passé).</p><p><strong>b) était</strong> (Imparfait de l'indicatif).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Phrase, ponctuation et connecteurs (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur les types de phrases, la ponctuation et les connecteurs logiques.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> a) Identifie le type de chaque phrase :<br><em>- « Quel beau paysage ! »<br>- « Vas-tu à l'école ? »<br>- « Ferme la porte. »</em><br>b) Quelle est l'intention du locuteur dans la dernière phrase ?</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a)</strong></p><ul><li><em>« Quel beau paysage ! »</em> → Phrase exclamative (exprime l'admiration).</li><li><em>« Vas-tu à l'école ? »</em> → Phrase interrogative (pose une question).</li><li><em>« Ferme la porte. »</em> → Phrase impérative (exprime un ordre ou un conseil).</li></ul><p><strong>b) Intention :</strong> Le locuteur veut faire agir le récepteur (lui donner un ordre).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1 pt)</strong> Explique le rôle du signe de ponctuation dans chaque cas :<br>a) <em>« Il est grand, fort et courageux. »</em> (la virgule)<br>b) <em>« Il est parti... sans dire au revoir. »</em> (les points de suspension)</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>a) La virgule :</strong> Elle sert à séparer les éléments d'une énumération.</p><p><strong>b) Les points de suspension :</strong> Ils marquent une hésitation, un sous-entendu ou laissent la phrase en suspens. Ici, ils suggèrent peut-être une déception ou un reproche.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Dans la phrase suivante, identifie les connecteurs logiques et donne leur valeur : <em>« Il voulait sortir mais il pleuvait, donc il resta à la maison parce qu'il n'avait pas de parapluie. »</em></p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li><strong>« mais » :</strong> Connecteur d'opposition.</li><li><strong>« donc » :</strong> Connecteur de conséquence.</li><li><strong>« parce que » :</strong> Connecteur de cause.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Champs lexicaux (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur la construction et l'analyse des champs lexicaux.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (2 pts)</strong> Lis le texte suivant : <em>« La chambre était plongée dans l'obscurité. Une angoisse sourde l'étreignait. Des larmes silencieuses coulaient sur ses joues, tandis qu'un profond désespoir s'emparait de son âme. »</em></p><p>a) Quels sont les deux champs lexicaux dominants ? Justifie ta réponse en relevant des mots du texte.<br>b) Quel est le rapport entre ces deux champs lexicaux ?</p></div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
