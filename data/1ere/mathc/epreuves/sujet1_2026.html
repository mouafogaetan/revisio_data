<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Première C",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations et inéquations du second degré",
      "points": "4 pts",
      "enonce": "<p>On considère le trinôme du second degré \\( f(x) = 2x^2 - 3x - 2 \\).</p>",
      "questions": [
        {
          "question": "1) Résoudre dans \\(\\mathbb{R}\\) l'équation \\( f(x) = 0 \\). (Justifier en calculant le discriminant \\(\\Delta\\)).",
          "reponse": "<p>On a \\(a = 2\\), \\(b = -3\\), \\(c = -2\\).</p><p>\\(\\Delta = b^2 - 4ac = (-3)^2 - 4(2)(-2) = 9 + 16 = 25\\).</p><p>Comme \\(\\Delta > 0\\), l'équation admet deux racines réelles distinctes :</p><div class='math-block'><div class='math'>$$ x_1 = \\frac{-b - \\sqrt{\\Delta}}{2a} = \\frac{3 - 5}{4} = -\\frac{1}{2} $$</div></div><div class='math-block'><div class='math'>$$ x_2 = \\frac{-b + \\sqrt{\\Delta}}{2a} = \\frac{3 + 5}{4} = 2 $$</div></div><p>L'ensemble des solutions est donc \\( S = \\{-\\frac{1}{2} ; 2\\} \\).</p>"
        },
        {
          "question": "2) Factoriser le trinôme \\( f(x) \\).",
          "reponse": "<p>D'après la question précédente, on a :</p><div class='math-block'><div class='math'>$$ f(x) = 2(x - x_1)(x - x_2) = 2\\left(x + \\frac{1}{2}\\right)(x - 2) $$</div></div><p>Ou encore \\( f(x) = (2x + 1)(x - 2) \\).</p>"
        },
        {
          "question": "3) Déterminer le signe de \\( f(x) \\) et en déduire l'ensemble des solutions de l'inéquation \\( f(x) \\geq 0 \\).",
          "reponse": "<p>Le coefficient \\(a = 2\\) est strictement positif. Le trinôme est donc du signe de \\(a\\) à l'extérieur des racines, et du signe contraire entre les racines.</p><p>Ainsi :</p><ul><li>\\(f(x) > 0\\) pour \\(x \\in ]-\\infty ; -\\frac{1}{2}[ \\cup ]2 ; +\\infty[\\)</li><li>\\(f(x) < 0\\) pour \\(x \\in ]-\\frac{1}{2} ; 2[\\)</li><li>\\(f(x) = 0\\) pour \\(x = -\\frac{1}{2}\\) ou \\(x = 2\\)</li></ul><p>Par conséquent, l'ensemble des solutions de \\( f(x) \\geq 0 \\) est :</p><div class='math-block'><div class='math'>$$ S = \\left]-\\infty ; -\\frac{1}{2}\\right] \\cup [2 ; +\\infty[ $$</div></div>"
        },
        {
          "question": "4) En utilisant les relations entre les coefficients et les racines, calculer la somme et le produit des racines de \\( f(x) = 0 \\).",
          "reponse": "<p>Soient \\(x_1\\) et \\(x_2\\) les racines du trinôme.</p><p>La somme des racines est :</p><div class='math-block'><div class='math'>$$ S = x_1 + x_2 = -\\frac{b}{a} = \\frac{3}{2} $$</div></div><p>Le produit des racines est :</p><div class='math-block'><div class='math'>$$ P = x_1 \\times x_2 = \\frac{c}{a} = -1 $$</div></div><p>On vérifie avec les valeurs trouvées : \\( -\\frac{1}{2} + 2 = \\frac{3}{2} \\) et \\( -\\frac{1}{2} \\times 2 = -1 \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Polynôme de degré 3",
      "points": "3 pts",
      "enonce": "<p>Soit \\( P(x) = x^3 - 2x^2 - 5x + 6 \\).</p>",
      "questions": [
        {
          "question": "1) Vérifier que \\( \\alpha = 1 \\) est une racine du polynôme \\( P(x) \\).",
          "reponse": "<p>On calcule \\(P(1) = 1^3 - 2(1)^2 - 5(1) + 6 = 1 - 2 - 5 + 6 = 0\\).</p><p>Comme \\(P(1) = 0\\), on en conclut que \\( \\alpha = 1 \\) est bien une racine de \\(P(x)\\).</p>"
        },
        {
          "question": "2) Factoriser \\( P(x) \\) par \\( (x - 1) \\) en utilisant la division euclidienne ou l'identification des coefficients.",
          "reponse": "<p>En effectuant la division euclidienne de \\(P(x)\\) par \\((x - 1)\\), on obtient :</p><div class='math-block'><div class='math'>$$ P(x) = (x - 1)(x^2 - x - 6) $$</div></div><p>Ensuite, on factorise le trinôme \\( x^2 - x - 6 \\) :</p><p>Son discriminant est \\(\\Delta = (-1)^2 - 4(1)(-6) = 1 + 24 = 25\\).</p><p>Ses racines sont \\( x_1 = \\frac{1 - 5}{2} = -2 \\) et \\( x_2 = \\frac{1 + 5}{2} = 3 \\).</p><p>Donc \\( x^2 - x - 6 = (x + 2)(x - 3) \\).</p><p>Finalement, la factorisation complète est :</p><div class='math-block'><div class='math'>$$ P(x) = (x - 1)(x + 2)(x - 3) $$</div></div>"
        },
        {
          "question": "3) Déterminer le signe de \\( P(x) \\) selon les valeurs de \\(x\\).",
          "reponse": "<p>Les racines du polynôme sont \\( -2 \\), \\( 1 \\) et \\( 3 \\). Le coefficient dominant est positif.</p><p>Le tableau de signes est le suivant :</p><table><thead><tr><th>\\(x\\)</th><th>\\(-\\infty\\)</th><th>\\(-2\\)</th><th>\\(1\\)</th><th>\\(3\\)</th><th>\\(+\\infty\\)</th></tr></thead><tbody><tr><td>\\((x+2)\\)</td><td>\\(-\\)</td><td>0</td><td>\\(+\\)</td><td>\\(+\\)</td><td>\\(+\\)</td></tr><tr><td>\\((x-1)\\)</td><td>\\(-\\)</td><td>\\(-\\)</td><td>0</td><td>\\(+\\)</td><td>\\(+\\)</td></tr><tr><td>\\((x-3)\\)</td><td>\\(-\\)</td><td>\\(-\\)</td><td>\\(-\\)</td><td>0</td><td>\\(+\\)</td></tr><tr><td>\\(P(x)\\)</td><td>\\(-\\)</td><td>0</td><td>\\(+\\)</td><td>0</td><td>\\(-\\)</td><td>0</td><td>\\(+\\)</td></tr></tbody></table><p>Ainsi, \\(P(x)\\) est positif sur \\( ]-2 ; 1[ \\cup ]3 ; +\\infty[ \\) et négatif sur \\( ]-\\infty ; -2[ \\cup ]1 ; 3[ \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Équation irrationnelle",
      "points": "3 pts",
      "enonce": "<p>Résoudre dans \\(\\mathbb{R}\\) l'équation suivante :</p><div class='math-block'><div class='math'>$$ \\sqrt{2x + 3} = x $$</div></div>",
      "questions": [
        {
          "question": "Résoudre l'équation \\( \\sqrt{2x + 3} = x \\). (Penser à vérifier les conditions d'existence et à élever au carré).",
          "reponse": "<p><strong>1. Conditions d'existence :</strong></p><p>Il faut que \\(2x + 3 \\geq 0\\) et que \\(x \\geq 0\\) (car une racine carrée est toujours positive).</p><p>L'équation est donc définie pour \\(x \\geq -\\frac{3}{2}\\) et \\(x \\geq 0\\), soit \\(x \\geq 0\\).</p><p><strong>2. Résolution :</strong></p><p>Élevons les deux membres au carré :</p><div class='math-block'><div class='math'>$$ (\\sqrt{2x + 3})^2 = x^2 $$</div></div><div class='math-block'><div class='math'>$$ 2x + 3 = x^2 $$</div></div><div class='math-block'><div class='math'>$$ x^2 - 2x - 3 = 0 $$</div></div><p>Le discriminant est \\(\\Delta = (-2)^2 - 4(1)(-3) = 4 + 12 = 16\\).</p><p>Les solutions de cette équation du second degré sont :</p><div class='math-block'><div class='math'>$$ x_1 = \\frac{2 - 4}{2} = -1 $$</div></div><div class='math-block'><div class='math'>$$ x_2 = \\frac{2 + 4}{2} = 3 $$</div></div><p><strong>3. Vérification des solutions :</strong></p><p>On doit vérifier que les solutions trouvées appartiennent bien à l'ensemble de définition \\(x \\geq 0\\).</p><ul><li>\\(x = -1\\) ne convient pas car \\(-1 < 0\\).</li><li>\\(x = 3\\) convient car \\(3 \\geq 0\\).</li></ul><p>L'ensemble des solutions est donc \\( S = \\{3\\} \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Système d'équations",
      "points": "5 pts",
      "enonce": "<p>On considère le système d'équations linéaires suivant :</p><div class='math-block'><div class='math'>$$ \\begin{cases} 2x + y = 5 \\\\ -x + 3y = 1 \\end{cases} $$</div></div>",
      "questions": [
        {
          "question": "1) Résoudre ce système par la méthode de substitution.",
          "reponse": "<p>De la première équation, on exprime \\(y\\) en fonction de \\(x\\) :</p><div class='math-block'><div class='math'>$$ y = 5 - 2x $$</div></div><p>On substitue cette expression dans la deuxième équation :</p><div class='math-block'><div class='math'>$$ -x + 3(5 - 2x) = 1 $$</div></div><div class='math-block'><div class='math'>$$ -x + 15 - 6x = 1 $$</div></div><div class='math-block'><div class='math'>$$ -7x = -14 $$</div></div><div class='math-block'><div class='math'>$$ x = 2 $$</div></div><p>On remplace \\(x\\) par 2 dans l'expression de \\(y\\) :</p><div class='math-block'><div class='math'>$$ y = 5 - 2(2) = 5 - 4 = 1 $$</div></div><p>La solution du système est le couple \\((x; y) = (2; 1)\\).</p>"
        },
        {
          "question": "2) Résoudre ce système par la méthode de combinaison (ou addition).",
          "reponse": "<p>On souhaite éliminer \\(x\\). On multiplie la deuxième équation par 2 :</p><div class='math-block'><div class='math'>$$ \\begin{cases} 2x + y = 5 \\\\ -2x + 6y = 2 \\end{cases} $$</div></div><p>On additionne les deux équations membre à membre :</p><div class='math-block'><div class='math'>$$ (2x + y) + (-2x + 6y) = 5 + 2 $$</div></div><div class='math-block'><div class='math'>$$ 7y = 7 $$</div></div><div class='math-block'><div class='math'>$$ y = 1 $$</div></div><p>On remplace \\(y\\) par 1 dans la première équation :</p><div class='math-block'><div class='math'>$$ 2x + 1 = 5 $$</div></div><div class='math-block'><div class='math'>$$ 2x = 4 $$</div></div><div class='math-block'><div class='math'>$$ x = 2 $$</div></div><p>La solution du système est bien \\((x; y) = (2; 1)\\).</p>"
        },
        {
          "question": "3) Interpréter géométriquement la solution trouvée.",
          "reponse": "<p>Chaque équation du système représente une droite dans le plan.</p><ul><li>\\(2x + y = 5\\) est l'équation d'une droite \\(D_1\\).</li><li>\\(-x + 3y = 1\\) est l'équation d'une droite \\(D_2\\).</li></ul><p>Le couple \\((2; 1)\\) est l'unique point d'intersection des deux droites \\(D_1\\) et \\(D_2\\).</p><p>Les deux droites sont donc sécantes au point de coordonnées \\( (2; 1) \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Système se ramenant au second degré",
      "points": "5 pts",
      "enonce": "<p>Résoudre dans \\(\\mathbb{R}^2\\) le système suivant :</p><div class='math-block'><div class='math'>$$ \\begin{cases} x + y = 5 \\\\ xy = 6 \\end{cases} $$</div></div>",
      "questions": [
        {
          "question": "Résoudre ce système non linéaire. (Indice : Utiliser la substitution et les relations entre la somme et le produit des racines).",
          "reponse": "<p><strong>Méthode 1 : Substitution</strong></p><p>De la première équation, on a \\(y = 5 - x\\).</p><p>On remplace dans la seconde équation :</p><div class='math-block'><div class='math'>$$ x(5 - x) = 6 $$</div></div><div class='math-block'><div class='math'>$$ -x^2 + 5x - 6 = 0 $$</div></div><div class='math-block'><div class='math'>$$ x^2 - 5x + 6 = 0 $$</div></div><p>Le discriminant est \\(\\Delta = (-5)^2 - 4(1)(6) = 25 - 24 = 1\\).</p><p>Les solutions sont :</p><div class='math-block'><div class='math'>$$ x_1 = \\frac{5 - 1}{2} = 2 $$</div></div><div class='math-block'><div class='math'>$$ x_2 = \\frac{5 + 1}{2} = 3 $$</div></div><p>On en déduit les valeurs de \\(y\\) correspondantes :</p><ul><li>Si \\(x = 2\\), alors \\(y = 5 - 2 = 3\\).</li><li>Si \\(x = 3\\), alors \\(y = 5 - 3 = 2\\).</li></ul><p>Les solutions sont donc les couples \\((2; 3)\\) et \\((3; 2)\\).</p><p><strong>Méthode 2 : Relations somme-produit</strong></p><p>\\(x\\) et \\(y\\) sont les racines d'une équation du second degré dont la somme est \\(S = 5\\) et le produit est \\(P = 6\\).</p><p>L'équation est \\(t^2 - St + P = 0\\), soit \\(t^2 - 5t + 6 = 0\\), dont les racines sont \\(2\\) et \\(3\\).</p><p>Les solutions sont donc les couples \\((2; 3)\\) et \\((3; 2)\\).</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
