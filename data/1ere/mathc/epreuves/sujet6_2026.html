<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Mathématiques",
 "classe": "Première C",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Équations, inéquations, systèmes et polynômes",
     "points": "4 pts",
     "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Cet exercice porte sur la résolution d'équations, d'inéquations et de systèmes, ainsi que sur les polynômes.</p></div>",
     "questions": [
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Résoudre dans \\(\\mathbb{R}\\) l'inéquation suivante :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(-2x^2 + 5x - 2 \\geq 0\\)</div></div></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Le discriminant est \\(\\Delta = 5^2 - 4(-2)(-2) = 25 - 16 = 9\\). Les racines sont :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(x_1 = \\frac{-5 - 3}{-4} = 2\\) et \\(x_2 = \\frac{-5 + 3}{-4} = \\frac{1}{2}\\)</div></div><p>Le coefficient \\(a = -2 < 0\\), donc le polynôme est positif entre les racines. L'ensemble solution est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\left[\\frac{1}{2}, 2\\right]\\)</div></div></div>"
       },
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Résoudre le système d'équations suivant :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\begin{cases} x + y + z = 6 \\\\ x - y + 2z = 5 \\\\ 2x + y - z = 1 \\end{cases}\\)</div></div></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Par combinaison, de la première et de la deuxième équation, on obtient \\(2x + 3z = 11\\).</p><p>De la première et de la troisième, on obtient \\(3x + z = 7\\).</p><p>En résolvant le système \\(\\begin{cases} 2x + 3z = 11 \\\\ 3x + z = 7 \\end{cases}\\), on trouve \\(x = 2\\) et \\(z = 1\\).</p><p>Enfin, \\(y = 6 - x - z = 6 - 2 - 1 = 3\\).</p><p>La solution est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\{(2, 3, 1)\\}\\)</div></div></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Limites, continuité et dérivation",
     "points": "4 pts",
     "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>On considère la fonction \\(f\\) définie par :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(f(x) = \\frac{x^2 - 4}{x - 2}\\)</div></div><p>pour \\(x \\neq 2\\).</p></div>",
     "questions": [
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Simplifier l'expression de \\(f(x)\\) pour \\(x \\neq 2\\).</p></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>On factorise le numérateur : \\(x^2 - 4 = (x-2)(x+2)\\).</p><p>Donc pour \\(x \\neq 2\\) :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(f(x) = \\frac{(x-2)(x+2)}{x-2} = x + 2\\)</div></div></div>"
       },
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Calculer \\(\\lim_{x \\to 2} f(x)\\). La fonction \\(f\\) est-elle définie en \\(x=2\\) ? Est-elle prolongeable par continuité ?</p></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>D'après la simplification, \\(\\lim_{x \\to 2} f(x) = \\lim_{x \\to 2} (x+2) = 4\\).</p><p>La fonction n'est pas définie en \\(x=2\\) (division par zéro).</p><p>Comme la limite existe et est finie, \\(f\\) est prolongeable par continuité en posant \\(f(2) = 4\\).</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Géométrie analytique et transformations",
     "points": "4 pts",
     "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Dans le plan muni d'un repère orthonormé, on donne les points \\(A(1, 2)\\), \\(B(4, 6)\\) et \\(C(5, 1)\\).</p></div>",
     "questions": [
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Déterminer l'équation cartésienne de la droite \\((AB)\\).</p></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Le coefficient directeur de \\((AB)\\) est \\(m = \\frac{6-2}{4-1} = \\frac{4}{3}\\).</p><p>L'équation est \\(y = \\frac{4}{3}x + p\\). En utilisant \\(A(1,2)\\), on a \\(2 = \\frac{4}{3} + p \\Rightarrow p = \\frac{2}{3}\\).</p><p>Donc \\((AB) : y = \\frac{4}{3}x + \\frac{2}{3}\\).</p><p>En multipliant par 3, on obtient :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\((AB) : 4x - 3y + 2 = 0\\)</div></div></div>"
       },
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Déterminer l'équation du cercle de diamètre \\([AB]\\).</p></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Le centre du cercle est le milieu de \\([AB]\\) : \\(\\Omega\\left(\\frac{1+4}{2}, \\frac{2+6}{2}\\right) = \\left(\\frac{5}{2}, 4\\right)\\).</p><p>Le rayon est \\(R = \\frac{AB}{2} = \\frac{\\sqrt{(4-1)^2 + (6-2)^2}}{2} = \\frac{\\sqrt{9 + 16}}{2} = \\frac{5}{2}\\).</p><p>L'équation est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\((x - \\frac{5}{2})^2 + (y - 4)^2 = \\frac{25}{4}\\)</div></div></div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Statistiques et probabilités",
     "points": "4 pts",
     "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Le tableau suivant donne les notes obtenues par les élèves d'une classe de Première C à un devoir de mathématiques :</p><div style='overflow-x: auto; margin: 12px 0;'><table style='border-collapse: collapse; width: 100%; font-size: 0.95rem;'><thead><tr style='background: #f3f4f6;'><th style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>Notes</th><th style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>[0, 4[</th><th style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>[4, 8[</th><th style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>[8, 12[</th><th style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>[12, 16[</th><th style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>[16, 20[</th></tr></thead><tbody><tr><td style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'><strong>Effectifs</strong></td><td style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>3</td><td style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>6</td><td style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>9</td><td style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>5</td><td style='border: 1px solid #d1d5db; padding: 8px; text-align: center;'>2</td></tr></tbody></table></div></div>",
     "questions": [
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Calculer la moyenne de cette série statistique (on prendra les centres de classes : 2, 6, 10, 14, 18).</p></div>",
         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>L'effectif total est \\(N = 3 + 6 + 9 + 5 + 2 = 25\\).</p><p>La moyenne est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\bar{x} = \\frac{3 \\times 2 + 6 \\times 6 + 9 \\times 10 + 5 \\times 14 + 2 \\times 18}{25}\\)</div></div><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\bar{x} = \\frac{6 + 36 + 90 + 70 + 36}{25} = \\frac{238}{25} = 9,52\\)</div></div><p>La moyenne est de <strong>9,52</strong> sur 20.</p></div>"
       },
       {
         "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Calculer la variance et l'écart-type de cette série.</p></div>",

         "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Pour montrer que \\(f\\) est linéaire, on vérifie les deux propriétés :</p><p><strong>Additivité :</strong> \\(f(u+v) = f(u) + f(v)\\) pour tous \\(u, v \\in \\mathbb{R}^2\\).</p><p>Soit \\(u = (x_1, y_1)\\) et \\(v = (x_2, y_2)\\). On a \\(f(u+v) = (2(x_1+x_2) + (y_1+y_2), (x_1+x_2) - (y_1+y_2)) = (2x_1+y_1, x_1-y_1) + (2x_2+y_2, x_2-y_2) = f(u) + f(v)\\).</p><p><strong>Homogénéité :</strong> \\(f(\\alpha u) = \\alpha f(u)\\) pour tout \\(\\alpha \\in \\mathbb{R}\\).</p><p>\\(f(\\alpha x, \\alpha y) = (2\\alpha x + \\alpha y, \\alpha x - \\alpha y) = \\alpha(2x + y, x - y) = \\alpha f(x,y)\\).</p><p>Donc \\(f\\) est bien un endomorphisme de \\(\\mathbb{R}^2\\).</p></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
