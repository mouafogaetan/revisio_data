<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Maths 1ère C",
 "classe": "Première C",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Équations, inéquations et polynômes",
     "points": "5 pts",
     "enonce": "<p>On considère le polynôme \\( P(x) = 2x^3 - 3x^2 - 8x + 12 \\).</p>",
     "questions":[
       {
         "question": "<p>1) Vérifier que 2 est une racine de \\( P(x) \\).</p>",
         "reponse": "<p>\\( P(2) = 2(2)^3 - 3(2)^2 - 8(2) + 12 = 16 - 12 - 16 + 12 = 0 \\). Donc 2 est bien une racine de \\( P(x) \\).</p>"
       },
       {
         "question": "<p>2) Déterminer les réels \\( a, b, c \\) tels que \\( P(x) = (x-2)(ax^2 + bx + c) \\).</p>",
         "reponse": "<p>En effectuant la division euclidienne ou par identification, on obtient :<br>\\( P(x) = (x-2)(2x^2 + x - 6) \\).<br>Donc \\( a=2, b=1, c=-6 \\).</p>"
       },
       {
         "question": "<p>3) Résoudre dans \\( \\mathbb{R} \\) l'équation \\( P(x) = 0 \\).</p>",
         "reponse": "<p>\\( P(x)=0 \\iff (x-2)(2x^2 + x - 6) = 0 \\).<br>On résout \\( 2x^2 + x - 6 = 0 \\).<br>\\( \\Delta = 1 - 4(2)(-6) = 49 \\).<br>Les solutions sont \\( x = \\frac{-1 - 7}{4} = -2 \\) et \\( x = \\frac{-1 + 7}{4} = \\frac{3}{2} \\).<br>L'ensemble des solutions est \\( S = \\{-2; \\frac{3}{2}; 2\\} \\).</p>"
       },
       {
         "question": "<p>4) Résoudre l'inéquation \\( P(x) \\leq 0 \\).</p>",
         "reponse": "<p>D'après la factorisation, le signe de \\( P(x) \\) est donné par celui de \\( (x-2)(2x^2 + x - 6) \\).<br>\\( 2x^2 + x - 6 \\) est du signe de \\( a=2 \\) (positif) à l'extérieur des racines et négatif entre \\( -2 \\) et \\( \\frac{3}{2} \\).<br>L'étude du signe sur un tableau donne \\( P(x) \\leq 0 \\) pour \\( x \\in [-2; \\frac{3}{2}] \\cup [2; +\\infty[ \\).</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Systèmes d'équations et fonctions",
     "points": "6 pts",
     "enonce": "<p><b>Partie A :</b> Résoudre le système suivant :<br>\\[ \\begin{cases} 2x + y - z = 1 \\\\ x - y + 2z = 7 \\\\ 3x + 2y - z = 4 \\end{cases} \\]</p><p><b>Partie B :</b> Soit \\( f \\) la fonction définie sur \\( \\mathbb{R} \\setminus \\{1\\} \\) par \\( f(x) = \\frac{x^2 - 3x + 4}{x-1} \\). On note \\( \\mathcal{C}_f \\) sa courbe représentative.</p>",
     "questions":[
       {
         "question": "<p><b>Partie A :</b> Résoudre le système.</p>",
         "reponse": "<p>En utilisant la méthode de substitution ou de combinaison, on trouve :<br>\\( x = 2, y = -1, z = 2 \\).</p>"
       },
       {
         "question": "<p><b>Partie B :</b> 1) Déterminer la limite de \\( f \\) en \\( 1 \\). Que peut-on en déduire graphiquement ?</p>",
         "reponse": "<p>\\( \\lim\\limits_{x \\to 1} x^2 - 3x + 4 = 2 \\) et \\( \\lim\\limits_{x \\to 1} x-1 = 0 \\).<br>Donc \\( \\lim\\limits_{x \\to 1^+} f(x) = +\\infty \\) et \\( \\lim\\limits_{x \\to 1^-} f(x) = -\\infty \\).<br>La droite d'équation \\( x=1 \\) est une asymptote verticale à \\( \\mathcal{C}_f \\).</p>"
       },
       {
         "question": "<p><b>Partie B :</b> 2) Déterminer les réels \\( a, b, c \\) tels que \\( f(x) = ax + b + \\frac{c}{x-1} \\).</p>",
         "reponse": "<p>En effectuant la division euclidienne de \\( x^2 - 3x + 4 \\) par \\( x-1 \\), on obtient :<br>\\( x^2 - 3x + 4 = (x-1)(x-2) + 2 \\).<br>Donc \\( f(x) = x-2 + \\frac{2}{x-1} \\). Ainsi \\( a=1, b=-2, c=2 \\).</p>"
       },
       {
         "question": "<p><b>Partie B :</b> 3) Calculer \\( f'(x) \\) et étudier le sens de variation de \\( f \\).</p>",
         "reponse": "<p>\\( f'(x) = 1 - \\frac{2}{(x-1)^2} = \\frac{(x-1)^2 - 2}{(x-1)^2} = \\frac{x^2 - 2x - 1}{(x-1)^2} \\).<br>Le signe de \\( f'(x) \\) est celui de \\( x^2 - 2x - 1 \\).<br>Les racines sont \\( 1 - \\sqrt{2} \\) et \\( 1 + \\sqrt{2} \\).<br>\\( f \\) est croissante sur \\( ]-\\infty; 1-\\sqrt{2}[ \\) et sur \\( ]1+\\sqrt{2}; +\\infty[ \\), et décroissante sur \\( ]1-\\sqrt{2}; 1[ \\) et sur \\( ]1; 1+\\sqrt{2}[ \\).</p>"
       },
       {
         "question": "<p><b>Partie B :</b> 4) Déterminer l'équation de l'asymptote oblique à \\( \\mathcal{C}_f \\) en \\( +\\infty \\) et \\( -\\infty \\).</p>",
         "reponse": "<p>D'après l'écriture \\( f(x) = x-2 + \\frac{2}{x-1} \\), on a \\( \\lim\\limits_{x \\to \\pm\\infty} [f(x) - (x-2)] = 0 \\).<br>La droite d'équation \\( y = x-2 \\) est une asymptote oblique à \\( \\mathcal{C}_f \\) en \\( +\\infty \\) et en \\( -\\infty \\).</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Suites numériques",
     "points": "4 pts",
     "enonce": "<p>Soit \\( (u_n) \\) une suite arithmétique de raison \\( r = -3 \\) et de premier terme \\( u_0 = 10 \\).</p>",
     "questions":[
       {
         "question": "<p>1) Exprimer \\( u_n \\) en fonction de \\( n \\).</p>",
         "reponse": "<p>Pour une suite arithmétique, \\( u_n = u_0 + nr \\).<br>Donc \\( u_n = 10 - 3n \\).</p>"
       },
       {
         "question": "<p>2) Calculer \\( u_{10} \\).</p>",
         "reponse": "<p>\\( u_{10} = 10 - 3 \\times 10 = 10 - 30 = -20 \\).</p>"
       },
       {
         "question": "<p>3) Calculer la somme \\( S = u_0 + u_1 + \\dots + u_{10} \\).</p>",
         "reponse": "<p>La somme des \\( n \\) premiers termes d'une suite arithmétique est \\( S_n = \\frac{n+1}{2}(u_0 + u_n) \\).<br>Ici \\( n=10 \\), \\( S = \\frac{11}{2}(10 + (-20)) = \\frac{11}{2} \\times (-10) = -55 \\).</p>"
       },
       {
         "question": "<p>4) Déterminer le sens de variation de la suite \\( (u_n) \\).</p>",
         "reponse": "<p>La raison \\( r=-3 \\) est négative, donc la suite \\( (u_n) \\) est strictement décroissante.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Géométrie analytique et barycentre",
     "points": "5 pts",
     "enonce": "<p>On considère les points \\( A(2; -1) \\), \\( B(4; 3) \\) et \\( C(-1; 2) \\) dans un repère orthonormé \\( (O; \\vec{i}, \\vec{j}) \\).</p>",
     "questions":[
       {
         "question": "<p>1) Déterminer une équation cartésienne de la droite \\( (AB) \\).</p>",
         "reponse": "<p>Le coefficient directeur de \\( (AB) \\) est \\( m = \\frac{3 - (-1)}{4-2} = \\frac{4}{2} = 2 \\).<br>L'équation de \\( (AB) \\) est \\( y - (-1) = 2(x-2) \\) soit \\( y = 2x - 5 \\).<br>Une équation cartésienne est \\( 2x - y - 5 = 0 \\).</p>"
       },
       {
         "question": "<p>2) Calculer la distance du point \\( C \\) à la droite \\( (AB) \\).</p>",
         "reponse": "<p>La distance de \\( C(x_C;y_C) \\) à la droite \\( ax+by+c=0 \\) est \\( d = \\frac{|ax_C + by_C + c|}{\\sqrt{a^2 + b^2}} \\).<br>Pour \\( (AB) : 2x - y - 5 = 0 \\) et \\( C(-1;2) \\),<br>\\( d = \\frac{|2(-1) - (2) - 5|}{\\sqrt{2^2 + (-1)^2}} = \\frac{|-9|}{\\sqrt{5}} = \\frac{9}{\\sqrt{5}} = \\frac{9\\sqrt{5}}{5} \\).</p>"
       },
       {
         "question": "<p>3) Déterminer une équation du cercle \\( \\mathcal{C} \\) de centre \\( A \\) et passant par \\( B \\).</p>",
         "reponse": "<p>Le rayon du cercle est \\( R = AB = \\sqrt{(4-2)^2 + (3-(-1))^2} = \\sqrt{4 + 16} = 2\\sqrt{5} \\).<br>L'équation du cercle est \\( (x-2)^2 + (y+1)^2 = (2\\sqrt{5})^2 \\) soit \\( (x-2)^2 + (y+1)^2 = 20 \\).</p>"
       },
       {
         "question": "<p>4) Déterminer les coordonnées du barycentre \\( G \\) des points pondérés \\( (A, 2), (B, -1), (C, 3) \\).</p>",
         "reponse": "<p>Les coordonnées de \\( G \\) sont données par :<br>\\( x_G = \\frac{2 x_A - 1 x_B + 3 x_C}{2-1+3} = \\frac{2(2) - 1(4) + 3(-1)}{4} = \\frac{4 - 4 - 3}{4} = -\\frac{3}{4} \\).<br>\\( y_G = \\frac{2 y_A - 1 y_B + 3 y_C}{4} = \\frac{2(-1) - 1(3) + 3(2)}{4} = \\frac{-2 - 3 + 6}{4} = \\frac{1}{4} \\).<br>Ainsi \\( G\\left(-\\frac{3}{4}; \\frac{1}{4}\\right) \\).</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
