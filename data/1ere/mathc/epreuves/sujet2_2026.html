<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques 1ère C",
  "classe": "Première",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations, inéquations et polynômes (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur la résolution d'équations et d'inéquations du second degré.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Résolution d'équations (1.5 pts)</strong></p><p>Résoudre dans $\\mathbb{R}$ les équations suivantes :</p><p>a) (0.75 pt) $2x^2 - 5x - 3 = 0$</p><p>b) (0.75 pt) $3x^2 + 4x + 1 = 0$</p>",
          "reponse": "<p><strong>a) (0.75 pt)</strong> $2x^2 - 5x - 3 = 0$</p><p>$\\Delta = (-5)^2 - 4 \\times 2 \\times (-3) = 25 + 24 = 49$</p><p>$x_1 = \\dfrac{5 - 7}{4} = -\\dfrac{1}{2}$ et $x_2 = \\dfrac{5 + 7}{4} = 3$</p><p>$S = \\left\\{-\\dfrac{1}{2}; 3\\right\\}$</p><p><strong>b) (0.75 pt)</strong> $3x^2 + 4x + 1 = 0$</p><p>$\\Delta = 16 - 12 = 4$</p><p>$x_1 = \\dfrac{-4 - 2}{6} = -1$ et $x_2 = \\dfrac{-4 + 2}{6} = -\\dfrac{1}{3}$</p><p>$S = \\left\\{-1; -\\dfrac{1}{3}\\right\\}$</p>"
        },
        {
          "question": "<p><strong>2. Factorisation et signe d'un trinôme (1.5 pts)</strong></p><p>Soit $P(x) = x^2 - 2x - 3$.</p><p>a) (0.5 pt) Déterminer les racines de $P$.</p><p>b) (0.5 pt) En déduire la factorisation de $P$.</p><p>c) (0.5 pt) Déterminer le signe de $P(x)$ et résoudre $P(x) \\leq 0$.</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> $P(x) = x^2 - 2x - 3$</p><p>$\\Delta = 4 + 12 = 16$, $x_1 = \\dfrac{2 - 4}{2} = -1$, $x_2 = \\dfrac{2 + 4}{2} = 3$</p><p><strong>b) (0.5 pt)</strong> $P(x) = (x + 1)(x - 3)$</p><p><strong>c) (0.5 pt)</strong> Tableau de signes :</p><p>\[
\\begin{array}{c|ccccc}
x & -\\infty & & -1 & & 3 & & +\\infty \\\\
\\hline
P(x) & + & & 0 & - & 0 & +
\\end{array}
\]</p><p>$P(x) \\leq 0 \\Rightarrow S = [-1; 3]$</p>"
        },
        {
          "question": "<p><strong>3. Relations entre coefficients et racines (1 pt)</strong></p><p>Déterminer deux nombres dont la somme est 5 et le produit est 6.</p>",
          "reponse": "<p><strong>3. (1 pt)</strong></p><p>Soit $S = 5$ et $P = 6$. Les deux nombres sont les racines de :</p><p>$x^2 - Sx + P = 0 \\Rightarrow x^2 - 5x + 6 = 0$</p><p>$\\Delta = 25 - 24 = 1$, $x_1 = \\dfrac{5 - 1}{2} = 2$, $x_2 = \\dfrac{5 + 1}{2} = 3$</p><p>Les deux nombres sont <strong>2 et 3</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Polynômes de degré 3 (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur la factorisation et le signe des polynômes de degré 3.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Factorisation d'un polynôme de degré 3 (2 pts)</strong></p><p>Soit $P(x) = x^3 - 2x^2 - x + 2$.</p><p>a) (0.5 pt) Vérifier que $x = 1$ est une racine de $P$.</p><p>b) (1 pt) Factoriser $P(x)$ par $(x - 1)$.</p><p>c) (0.5 pt) Donner la forme factorisée complète de $P$.</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> $P(1) = 1 - 2 - 1 + 2 = 0$, donc $x = 1$ est une racine.</p><p><strong>b) (1 pt)</strong> Division euclidienne :</p><p>$\\begin{array}{r|rrrr} & 1 & -2 & -1 & 2 \\\\ 1 & & 1 & -1 & -2 \\\\ \\hline & 1 & -1 & -2 & 0 \\end{array}$</p><p>$P(x) = (x - 1)(x^2 - x - 2)$</p><p><strong>c) (0.5 pt)</strong> $x^2 - x - 2 = (x - 2)(x + 1)$</p><p>$P(x) = (x - 1)(x - 2)(x + 1)$</p>"
        },
        {
          "question": "<p><strong>2. Signe d'un polynôme de degré 3 (1 pt)</strong></p><p>À l'aide de la factorisation précédente, déterminer le signe de $P(x)$.</p>",
          "reponse": "<p><strong>2. (1 pt)</strong></p><p>$P(x) = (x + 1)(x - 1)(x - 2)$</p><p>Tableau de signes :</p><p>\[
\\begin{array}{c|ccccccc}
x & -\\infty & & -1 & & 1 & & 2 & & +\\infty \\\\
\\hline
x+1 & - & & 0 & + & & + & & + \\\\
x-1 & - & & - & & 0 & + & & + \\\\
x-2 & - & & - & & - & & 0 & + \\\\
\\hline
P(x) & - & & 0 & + & & 0 & - & & 0 & +
\\end{array}
\]</p><p>Sur $]-\\infty; -1[ \\cup ]1; 2[$, $P(x) < 0$</p><p>Sur $]-1; 1[ \\cup ]2; +\\infty[$, $P(x) > 0$</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Systèmes d'équations (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur la résolution de systèmes linéaires et non linéaires.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Système linéaire (2 pts)</strong></p><p>Résoudre le système suivant :</p><p>$\\begin{cases} 2x + y - z = 1 \\\\ x - y + 2z = 3 \\\\ 3x + 2y - z = 2 \\end{cases}$</p>",
          "reponse": "<p><strong>1. (2 pts)</strong></p><p>$\\begin{cases} 2x + y - z = 1 \\quad (1) \\\\ x - y + 2z = 3 \\quad (2) \\\\ 3x + 2y - z = 2 \\quad (3) \\end{cases}$</p><p>De (2), $x = y - 2z + 3$.</p><p>Dans (1) : $2(y - 2z + 3) + y - z = 1 \\Rightarrow 2y - 4z + 6 + y - z = 1 \\Rightarrow 3y - 5z = -5 \\quad (4)$</p><p>Dans (3) : $3(y - 2z + 3) + 2y - z = 2 \\Rightarrow 3y - 6z + 9 + 2y - z = 2 \\Rightarrow 5y - 7z = -7 \\quad (5)$</p><p>De (4), $y = \\dfrac{5z - 5}{3}$.</p><p>Dans (5) : $5\\left(\\dfrac{5z - 5}{3}\\right) - 7z = -7 \\Rightarrow \\dfrac{25z - 25}{3} - 7z = -7 \\Rightarrow 25z - 25 - 21z = -21 \\Rightarrow 4z = 4 \\Rightarrow z = 1$</p><p>$y = \\dfrac{5(1) - 5}{3} = 0$, $x = 0 - 2(1) + 3 = 1$</p><p>$S = \\{(1; 0; 1)\\}$</p>"
        },
        {
          "question": "<p><strong>2. Système se ramenant au second degré (2 pts)</strong></p><p>Résoudre le système :</p><p>$\\begin{cases} x + y = 7 \\\\ xy = 12 \\end{cases}$</p>",
          "reponse": "<p><strong>2. (2 pts)</strong></p><p>Soit $S = 7$ et $P = 12$. $x$ et $y$ sont les racines de :</p><p>$X^2 - 7X + 12 = 0$</p><p>$\\Delta = 49 - 48 = 1$, $X_1 = \\dfrac{7 - 1}{2} = 3$, $X_2 = \\dfrac{7 + 1}{2} = 4$</p><p>Les solutions sont $(3; 4)$ et $(4; 3)$.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Limites et continuité (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur le calcul de limites et la continuité des fonctions.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Calcul de limites (2 pts)</strong></p><p>Calculer les limites suivantes :</p><p>a) (0.75 pt) $\\lim\\limits_{x \\to +\\infty} (3x^2 - 5x + 2)$</p><p>b) (0.75 pt) $\\lim\\limits_{x \\to 2} \\dfrac{x^2 - 4}{x - 2}$</p><p>c) (0.5 pt) $\\lim\\limits_{x \\to 1} \\dfrac{\\sqrt{x} - 1}{x - 1}$</p>",
          "reponse": "<p><strong>a) (0.75 pt)</strong> $\\lim\\limits_{x \\to +\\infty} (3x^2 - 5x + 2) = +\\infty$</p><p><strong>b) (0.75 pt)</strong> $\\lim\\limits_{x \\to 2} \\dfrac{x^2 - 4}{x - 2} = \\lim\\limits_{x \\to 2} \\dfrac{(x - 2)(x + 2)}{x - 2} = \\lim\\limits_{x \\to 2} (x + 2) = 4$</p><p><strong>c) (0.5 pt)</strong> $\\lim\\limits_{x \\to 1} \\dfrac{\\sqrt{x} - 1}{x - 1} = \\lim\\limits_{x \\to 1} \\dfrac{(\\sqrt{x} - 1)(\\sqrt{x} + 1)}{(x - 1)(\\sqrt{x} + 1)} = \\lim\\limits_{x \\to 1} \\dfrac{x - 1}{(x - 1)(\\sqrt{x} + 1)} = \\lim\\limits_{x \\to 1} \\dfrac{1}{\\sqrt{x} + 1} = \\dfrac{1}{2}$</p>"
        },
        {
          "question": "<p><strong>2. Continuité (2 pts)</strong></p><p>Soit $f$ la fonction définie par $f(x) = \\begin{cases} \\dfrac{x^2 - 1}{x - 1} & \\text{si } x \\neq 1 \\\\ a & \\text{si } x = 1 \\end{cases}$</p><p>Déterminer la valeur de $a$ pour que $f$ soit continue en $1$.</p>",
          "reponse": "<p><strong>2. (2 pts)</strong></p><p>Pour que $f$ soit continue en $1$, il faut que $\\lim\\limits_{x \\to 1} f(x) = f(1) = a$.</p><p>$\\lim\\limits_{x \\to 1} \\dfrac{x^2 - 1}{x - 1} = \\lim\\limits_{x \\to 1} \\dfrac{(x - 1)(x + 1)}{x - 1} = \\lim\\limits_{x \\to 1} (x + 1) = 2$</p><p>Donc <strong>$a = 2$</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Dérivation et étude de fonctions (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur le calcul de dérivées et l'étude complète d'une fonction.</p></div>",
      "questions": [
        {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
