<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Philo 1ère A",
 "classe": "1ère",
 "sequence": "Séquence 5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Commentaire de texte philosophique",
     "points": "10 pts",
     "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-style: italic; margin-bottom: 20px;'>« La liberté est le pouvoir que nous avons de faire ce que nous voulons, mais elle n'est pas la faculté de faire ce que nous souhaitons. » — Jean-Jacques Rousseau, <em>Du Contrat Social</em>.</p> <p>Après avoir lu attentivement ce texte, tu dois en faire un commentaire philosophique structuré.</p> </div>",
     "questions": [
       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-weight: bold;'>1) Introduction (3 pts)</p> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin-bottom: 10px;'>a) <span style='font-weight: bold;'>Situe le texte :</span> Identifie l'auteur (Jean-Jacques Rousseau), l'œuvre (<em>Du Contrat Social</em>) et le thème principal du texte. (1 pt)</li> <li style='margin-bottom: 10px;'>b) <span style='font-weight: bold;'>Dégage la thèse de l'auteur :</span> Quelle est l'idée centrale que Rousseau défend dans cet extrait ? (1 pt)</li> <li style='margin-bottom: 10px;'>c) <span style='font-weight: bold;'>Formule une problématique :</span> Transforme le texte en une question philosophique qui guidera ton analyse. (1 pt)</li> </ul> </div>",
         "reponse": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>a) Situation du texte :</span> Ce texte est un extrait de <em>Du Contrat Social</em> de Jean-Jacques Rousseau, philosophe des Lumières. Il aborde la question de la liberté, un thème central de la philosophie politique et morale.</p> <p><span style='font-weight: bold;'>b) Thèse de l'auteur :</span> Rousseau distingue la liberté comme <span style='font-style: italic;'>pouvoir</span> (capacité d'agir) de la liberté comme <span style='font-style: italic;'>faculté</span> (possibilité de réaliser ses désirs). Il soutient que la liberté véritable ne consiste pas à satisfaire tous ses souhaits, mais à agir selon sa volonté, dans le cadre des lois et de la raison.</p> <p><span style='font-weight: bold;'>c) Problématique :</span> En quoi la liberté humaine se distingue-t-elle de la simple satisfaction des désirs, et comment cette distinction éclaire-t-elle notre compréhension de la liberté politique et morale ?</p> </div>"
       },
       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-weight: bold;'>2) Développement (5 pts)</p> <p style='margin-bottom: 10px;'>a) <span style='font-weight: bold;'>Explication analytique (2 pts) :</span> Explique clairement la distinction faite par Rousseau entre « pouvoir » et « faculté ». Utilise des exemples concrets pour illustrer cette différence.</p> <p style='margin-bottom: 10px;'>b) <span style='font-weight: bold;'>Réfutation (1,5 pt) :</span> Confronte la thèse de Rousseau à une autre position philosophique. Par exemple, la pensée de Jean-Paul Sartre sur la liberté comme « condamnation » peut être mobilisée pour discuter cette conception.</p> <p style='margin-bottom: 10px;'>c) <span style='font-weight: bold;'>Réinterprétation (1,5 pt) :</span> Propose une lecture personnelle de la thèse de Rousseau. Peux-tu montrer en quoi cette distinction est encore pertinente aujourd'hui, ou au contraire, en quoi elle pourrait être limitée ?</p> </div>",
         "reponse": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>a) Explication analytique :</span> Rousseau distingue le « pouvoir » comme capacité d'agir (par exemple, j'ai le pouvoir de lever mon bras) de la « faculté » comme capacité de réaliser tous ses désirs (par exemple, je souhaite voler, mais je n'en ai pas la faculté). La liberté, pour Rousseau, est donc un pouvoir d'autodétermination, non une toute-puissance. Elle est limitée par la raison, la loi et les contraintes naturelles.</p> <p><span style='font-weight: bold;'>b) Réfutation :</span> Sartre, dans <em>L'Être et le Néant</em>, affirme que l'homme est « condamné à être libre », ce qui signifie que la liberté est totale et sans limite (sauf celles que l'on se donne). Cette position s'oppose à la conception rousseauiste d'une liberté encadrée par la raison et la loi. Pour Sartre, la liberté est radicale et angoissante, car elle nous rend responsables de tout, y compris de nos désirs.</p> <p><span style='font-weight: bold;'>c) Réinterprétation :</span> La distinction de Rousseau est toujours utile pour penser la liberté dans les sociétés démocratiques. Elle nous invite à distinguer la liberté (agir selon notre volonté) de la licence (faire tout ce qui nous plaît). Cependant, on peut critiquer Rousseau en affirmant que la liberté ne se réduit pas à un pouvoir d'agir, mais implique aussi la possibilité de transformer les contraintes sociales et naturelles qui limitent notre action.</p> </div>"
       },
       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-weight: bold;'>3) Conclusion (2 pts)</p> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin-bottom: 10px;'>a) <span style='font-weight: bold;'>Rappelle le problème et la thèse :</span> Résume le cheminement de ta réflexion. (0,5 pt)</li> <li style='margin-bottom: 10px;'>b) <span style='font-weight: bold;'>Fais le bilan :</span> Quelle est la portée de la thèse de Rousseau ? (0,75 pt)</li> <li style='margin-bottom: 10px;'>c) <span style='font-weight: bold;'>Propose une ouverture :</span> À partir de cette analyse, pose une question plus large qui prolonge la réflexion. (0,75 pt)</li> </ul> </div>",
         "reponse": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>a) Rappel :</span> Nous avons analysé la distinction rousseauiste entre pouvoir et faculté, qui souligne que la liberté véritable n'est pas la satisfaction de tous nos désirs, mais l'obéissance à la loi que nous nous sommes donnée.</p> <p><span style='font-weight: bold;'>b) Bilan :</span> La thèse de Rousseau a une portée éthique et politique majeure : elle fonde la légitimité de l'État sur la volonté générale et éclaire le débat sur la liberté individuelle et la contrainte sociale.</p> <p><span style='font-weight: bold;'>c) Ouverture :</span> Cette réflexion nous invite à nous demander : <span style='font-style: italic;'>« Jusqu'où la liberté peut-elle être limitée au nom du bien commun ? »</span>, une question toujours centrale dans nos démocraties contemporaines.</p> </div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Dissertation philosophique",
     "points": "10 pts",
     "enonce": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>Sujet :</span> « L'homme peut-il se connaître lui-même ? »</p> <p>Tu traiteras ce sujet sous forme de dissertation philosophique, en respectant la méthode de l'essai de problématisation.</p> </div>",
     "questions": [
       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-weight: bold;'>1) Introduction (3 pts)</p> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin-bottom: 10px;'>a) <span style='font-weight: bold;'>Amène le sujet :</span> Propose une accroche (citation, constat, actualité) qui introduit la question de la connaissance de soi. (0,5 pt)</li> <li style='margin-bottom: 10px;'>b) <span style='font-weight: bold;'>Pose le problème :</span> Explique pourquoi cette question est un problème philosophique. (1 pt)</li> <li style='margin-bottom: 10px;'>c) <span style='font-weight: bold;'>Formule la problématique :</span> Transforme le sujet en une question directrice. (0,75 pt)</li> <li style='margin-bottom: 10px;'>d) <span style='font-weight: bold;'>Annonce le plan :</span> Présente les grandes parties de ta réflexion. (0,75 pt)</li> </ul> </div>",
         "reponse": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>a) Accroche :</span> « Connais-toi toi-même », cet adage inscrit sur le fronton du temple de Delphes résume à lui seul l'ambition et la difficulté de la quête de soi.</p> <p><span style='font-weight: bold;'>b) Problème :</span> La question de la connaissance de soi est un problème philosophique car elle met en jeu notre identité, notre liberté et notre rapport aux autres. Si je peux me connaître parfaitement, je suis transparent à moi-même. Mais si je ne peux pas me connaître, alors je demeure un mystère pour moi-même, ce qui remet en question ma capacité à agir librement et à me comprendre.</p> <p><span style='font-weight: bold;'>c) Problématique :</span> Dans quelle mesure la connaissance de soi est-elle possible, et quelles sont les limites de cette entreprise ?</p> <p><span style='font-weight: bold;'>d) Plan :</span> Nous verrons d'abord que la connaissance de soi semble possible et même nécessaire (thèse), puis que celle-ci est en réalité impossible ou limitée (antithèse), pour enfin proposer une conception nuancée de la connaissance de soi comme processus inachevé (synthèse).</p> </div>"
       },
       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-weight: bold;'>2) Développement (5 pts)</p> <p>Rédige le développement de ta dissertation en trois parties dialectiques : thèse, antithèse, synthèse.</p> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin-bottom: 10px;'>a) <span style='font-weight: bold;'>Thèse (1,5 pt) :</span> Défends l'idée que la connaissance de soi est possible. Pour cela, tu peux t'appuyer sur la pensée de Socrate (« Connais-toi toi-même »), de Descartes (le cogito) ou encore de Kant (la conscience morale).</li> <li style='margin-bottom: 10px;'>b) <span style='font-weight: bold;'>Antithèse (1,5 pt) :</span> Montre les limites de cette connaissance de soi. Tu peux mobiliser la psychanalyse freudienne (l'inconscient), la critique nietzschéenne de la conscience ou encore la sociologie de Bourdieu (les déterminismes sociaux).</li> <li style='margin-bottom: 10px;'>c) <span style='font-weight: bold;'>Synthèse (2 pts) :</span> Propose un dépassement. Par exemple, la connaissance de soi est un processus dynamique (Pascal, Sartre), ou encore, elle passe par le regard des autres (Ricœur, l'identité narrative).</li> </ul> </div>",
         "reponse": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>a) Thèse :</span> La connaissance de soi est possible et même nécessaire. Socrate en fait le fondement de la sagesse et de la vie bonne. Descartes, avec le cogito, établit que la conscience de soi est la vérité première et indubitable. Enfin, pour Kant, la conscience morale est le lieu où l'homme se connaît comme être libre et sujet de la loi morale. Ces auteurs montrent que l'homme a accès à lui-même par la raison et la conscience.</p> <p><span style='font-weight: bold;'>b) Antithèse :</span> Cependant, la connaissance de soi est limitée par des forces qui nous échappent. Freud, avec la découverte de l'inconscient, montre que le moi n'est pas maître dans sa propre maison : une grande partie de notre vie psychique nous est cachée. Nietzsche critique la conscience comme un « phénomène superficiel » qui nous trompe sur notre véritable nature. Enfin, Bourdieu souligne que nos choix et nos goûts sont largement déterminés par notre position sociale, ce qui remet en question l'idée d'un moi autonome et transparent à lui-même.</p> <p><span style='font-weight: bold;'>c) Synthèse :</span> Plutôt que de trancher entre la possibilité et l'impossibilité de la connaissance de soi, on peut la concevoir comme un processus inachevé et dynamique. Pascal souligne que le moi est « haïssable » et insaisissable, mais cette insaisissabilité même est une invitation à un travail constant sur soi. Sartre affirme que l'homme est un « projet », et que sa connaissance de soi se fait dans l'action et l'engagement. Enfin, Ricœur propose le concept d'« identité narrative » : c'est par le récit de notre vie, par l'interprétation de notre histoire et par le regard des autres que nous nous connaissons. Ainsi, la connaissance de soi n'est pas une donnée statique, mais une quête perpétuelle.</p> </div>"
       },
       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p style='font-weight: bold;'>3) Conclusion (2 pts)</p> <ul style='list-style-type: none; padding-left: 0;'> <li style='margin-bottom: 10px;'>a) <span style='font-weight: bold;'>Rappelle le problème :</span> Résume le cheminement de ta réflexion. (0,5 pt)</li> <li style='margin-bottom: 10px;'>b) <span style='font-weight: bold;'>Dresse le bilan :</span> Quelle est ta réponse à la problématique ? (0,75 pt)</li> <li style='margin-bottom: 10px;'>c) <span style='font-weight: bold;'>Ouvre la réflexion :</span> Propose une question plus large qui découle de ton analyse. (0,75 pt)</li> </ul> </div>",
         "reponse": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p><span style='font-weight: bold;'>a) Rappel :</span> Nous avons exploré la question de la connaissance de soi, en montrant qu'elle est à la fois possible (par la raison, la conscience) et limitée (par l'inconscient, les déterminismes sociaux).</p> <p><span style='font-weight: bold;'>b) Bilan :</span> La connaissance de soi n'est pas un état définitif, mais un processus dynamique, une quête sans fin qui se fait dans l'action, le récit et la confrontation avec autrui.</p> <p><span style='font-weight: bold;'>c) Ouverture :</span> Cette réflexion nous invite à nous interroger sur le rôle des autres dans la construction de notre identité : <span style='font-style: italic;'>« Dans quelle mesure notre identité est-elle le reflet du regard que les autres portent sur nous ? »</span></p> </div>"

       {
         "question": "<div style='font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.6; color: #1d1d1f; background-color: #ffffff; padding: 5px;'> <p>1) Cite deux auteurs de la philosophie antique et précise une idée centrale défendue par chacun d'eux. (2 pts)</p> </div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
