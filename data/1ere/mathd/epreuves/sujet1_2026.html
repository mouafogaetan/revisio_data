<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Première D",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations et inéquations du second degré",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Cet exercice porte sur la résolution d'équations et d'inéquations du second degré.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Résoudre dans \\(\\mathbb{R}\\) l'équation suivante :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(3x^2 - 5x - 2 = 0\\)</div></div></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Le discriminant est \\(\\Delta = (-5)^2 - 4(3)(-2) = 25 + 24 = 49\\).</p><p>Les racines sont :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(x_1 = \\frac{5 - \\sqrt{49}}{6} = \\frac{5 - 7}{6} = -\\frac{1}{3}\\)</div></div><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(x_2 = \\frac{5 + \\sqrt{49}}{6} = \\frac{5 + 7}{6} = 2\\)</div></div><p>L'ensemble solution est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\left\\{-\\frac{1}{3}, 2\\right\\}\\)</div></div></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Résoudre dans \\(\\mathbb{R}\\) l'inéquation suivante :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(-2x^2 + 3x + 5 > 0\\)</div></div></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Le discriminant est \\(\\Delta = 3^2 - 4(-2)(5) = 9 + 40 = 49\\).</p><p>Les racines sont :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(x_1 = \\frac{-3 - 7}{-4} = \\frac{5}{2}\\) et \\(x_2 = \\frac{-3 + 7}{-4} = -1\\)</div></div><p>Le coefficient \\(a = -2 < 0\\), donc le polynôme est positif entre les racines.</p><p>L'ensemble solution est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\left]-1, \\frac{5}{2}\\right[\\)</div></div></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Établir la forme canonique du trinôme \\(f(x) = 2x^2 - 8x + 5\\).</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(f(x) = 2(x^2 - 4x) + 5 = 2[(x-2)^2 - 4] + 5 = 2(x-2)^2 - 8 + 5 = 2(x-2)^2 - 3\\)</div></div></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> En posant \\(X = \\cos x\\), résoudre dans \\([0, 2\\pi]\\) l'équation :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(2\\cos^2 x - 5\\cos x - 3 = 0\\)</div></div></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>En posant \\(X = \\cos x\\), l'équation devient \\(2X^2 - 5X - 3 = 0\\).</p><p>Le discriminant est \\(\\Delta = 25 - 4(2)(-3) = 25 + 24 = 49\\).</p><p>Les racines sont : \\(X_1 = \\frac{5 - 7}{4} = -\\frac{1}{2}\\) et \\(X_2 = \\frac{5 + 7}{4} = 3\\).</p><p>La valeur \\(X_2 = 3\\) est impossible car \\(\\cos x \\in [-1, 1]\\).</p><p>On doit résoudre \\(\\cos x = -\\frac{1}{2}\\).</p><p>Dans \\([0, 2\\pi]\\), les solutions sont :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\left\\{\\frac{2\\pi}{3}, \\frac{4\\pi}{3}\\right\\}\\)</div></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Polynômes de degré 3",
      "points": "3 pts",
      "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>On considère le polynôme \\(P(x) = 2x^3 - 5x^2 - 4x + 3\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Vérifier que \\(1\\) est une racine de \\(P(x)\\).</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>\\(P(1) = 2(1)^3 - 5(1)^2 - 4(1) + 3 = 2 - 5 - 4 + 3 = -4\\).</p><p>Donc \\(1\\) n'est pas une racine de \\(P(x)\\).</p><p>Vérifions plutôt \\(x = -1\\) : \\(P(-1) = 2(-1)^3 - 5(-1)^2 - 4(-1) + 3 = -2 - 5 + 4 + 3 = 0\\).</p><p>Donc \\(-1\\) est une racine de \\(P(x)\\).</p></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Factoriser \\(P(x)\\) en produit de facteurs du premier degré.</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>On sait que \\(-1\\) est une racine, donc \\(P(x) = (x+1)(2x^2 + ax + b)\\).</p><p>Par identification : \\(2x^3 + ax^2 + bx + 2x^2 + ax + b = 2x^3 + (a+2)x^2 + (a+b)x + b\\).</p><p>On doit avoir : \\(a+2 = -5 \\Rightarrow a = -7\\), \\(b = 3\\), et \\(a+b = -7+3 = -4\\) ce qui est vérifié.</p><p>Donc \\(P(x) = (x+1)(2x^2 - 7x + 3)\\).</p><p>On factorise \\(2x^2 - 7x + 3\\) : \\(\\Delta = 49 - 24 = 25\\).</p><p>Les racines sont : \\(x_1 = \\frac{7 - 5}{4} = \\frac{1}{2}\\) et \\(x_2 = \\frac{7 + 5}{4} = 3\\).</p><p>Donc \\(2x^2 - 7x + 3 = 2\\left(x - \\frac{1}{2}\\right)(x-3) = (2x-1)(x-3)\\).</p><p>Finalement :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(P(x) = (x+1)(2x-1)(x-3)\\)</div></div></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Dresser le tableau de signe de \\(P(x)\\) et résoudre l'inéquation \\(P(x) \\geq 0\\).</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Les racines sont \\(-1, \\frac{1}{2}, 3\\).</p><p>Tableau de signes :</p><div style='overflow-x: auto; margin: 12px 0;'><table style='border-collapse: collapse; width: 100%; font-size: 0.95rem; text-align: center;'><tr><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(x\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\infty\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-1\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(\\frac{1}{2}\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(3\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\infty\\)</td></tr><tr><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(x+1\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(0\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\)</td></tr><tr><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(2x-1\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(0\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\)</td></tr><tr><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(x-3\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(-\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(0\\)</td><td style='border: 1px solid #d1d5db; padding: 8px;'>\\(+\\)</td></tr><tr><td style='border: 1px solid     {
      "titre": "Exercice 3 : Systèmes d'équations",

      "questions": [
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Résoudre le système d'équations linéaires suivant :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\begin{cases} 2x + 3y = 5 \\\\ x - 2y = -1 \\end{cases}\\)</div></div></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>De la deuxième équation, \\(x = -1 + 2y\\).</p><p>En substituant dans la première : \\(2(-1+2y) + 3y = 5\\), soit \\(-2 + 4y + 3y = 5\\), donc \\(7y = 7\\), d'où \\(y = 1\\).</p><p>Alors \\(x = -1 + 2(1) = 1\\).</p><p>La solution est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\{(1, 1)\\}\\)</div></div></div>"

          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>De la première équation, \\(z = x + y - 2\\).</p><p>Substituons dans la deuxième : \\(2x - y + 3(x+y-2) = 1\\)</p><p>\\(2x - y + 3x + 3y - 6 = 1 \\Rightarrow 5x + 2y = 7\\)</p><p>Substituons dans la troisième : \\(3x + 2y - 2(x+y-2) = 5\\)</p><p>\\(3x + 2y - 2x - 2y + 4 = 5 \\Rightarrow x = 1\\)</p><p>Alors \\(5(1) + 2y = 7 \\Rightarrow y = 1\\).</p><p>Et \\(z = 1 + 1 - 2 = 0\\).</p><p>La solution est :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\{(1, 1, 0)\\}\\)</div></div></div>"

          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Résoudre le système non linéaire suivant :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\begin{cases} x^2 + y^2 = 25 \\\\ x + y = 7 \\end{cases}\\)</div></div></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>De la deuxième équation, \\(y = 7 - x\\).</p><p>En substituant dans la première : \\(x^2 + (7-x)^2 = 25\\)</p><p>\\(x^2 + 49 - 14x + x^2 = 25 \\Rightarrow 2x^2 - 14x + 24 = 0\\)</p><p>\\(x^2 - 7x + 12 = 0\\)</p><p>Les racines sont \\(x = 3\\) et \\(x = 4\\).</p><p>Si \\(x = 3\\), \\(y = 4\\) ; si \\(x = 4\\), \\(y = 3\\).</p><p>Les solutions sont :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(S = \\{(3, 4), (4, 3)\\}\\)</div></div></div>"
        }

      "questions": [
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Mettre en équation le problème en désignant par \\(x\\) le nombre d'articles A et par \\(y\\) le nombre d'articles B.</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>\\(\\begin{cases} x + y = 18 \\\\ 2000x + 3000y = 44000 \\end{cases}\\)</p></div>",

        },
        {

          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Divisons la deuxième équation par 1000 : \\(2x + 3y = 44\\).</p><p>De la première équation, \\(x = 18 - y\\).</p><p>En substituant : \\(2(18-y) + 3y = 44 \\Rightarrow 36 - 2y + 3y = 44 \\Rightarrow y = 8\\).</p><p>Alors \\(x = 18 - 8 = 10\\).</p><p>Le commerçant a acheté <strong>10 articles A</strong> et <strong>8 articles B</strong>.</p></div>",

    {
      "titre": "Exercice 5 : Trigonométrie",
      "points": "5 pts",
      "enonce": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>Cet exercice porte sur les formules de transformation en trigonométrie.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Simplifier les expressions suivantes :</p><p>a) \\(\\cos\\left(\\frac{\\pi}{3} + x\\right) + \\cos\\left(\\frac{\\pi}{3} - x\\right)\\)</p><p>b) \\(\\sin(2a) \\cos a\\)</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>a) En utilisant la formule \\(\\cos(a+b) + \\cos(a-b) = 2\\cos a \\cos b\\) :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\cos\\left(\\frac{\\pi}{3} + x\\right) + \\cos\\left(\\frac{\\pi}{3} - x\\right) = 2\\cos\\left(\\frac{\\pi}{3}\\right) \\cos x = 2 \\times \\frac{1}{2} \\cos x = \\cos x\\)</div></div><p>b) En utilisant \\(\\sin(2a) = 2\\sin a \\cos a\\) :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\sin(2a) \\cos a = 2\\sin a \\cos^2 a\\)</div></div></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Exprimer \\(\\cos(3x)\\) en fonction de \\(\\cos x\\).</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\cos(3x) = \\cos(2x+x) = \\cos(2x)\\cos x - \\sin(2x)\\sin x\\)</div></div><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(= (2\\cos^2 x - 1)\\cos x - (2\\sin x \\cos x)\\sin x\\)</div></div><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(= 2\\cos^3 x - \\cos x - 2\\sin^2 x \\cos x\\)</div></div><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(= 2\\cos^3 x - \\cos x - 2(1-\\cos^2 x)\\cos x\\)</div></div><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(= 2\\cos^3 x - \\cos x - 2\\cos x + 2\\cos^3 x = 4\\cos^3 x - 3\\cos x\\)</div></div></div>"
        },
        {
          "question": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p> Transformer \\(\\sin x + \\cos x\\) en une expression de la forme \\(R \\cos(x - \\varphi)\\).</p></div>",
          "reponse": "<div style='font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a;'><p>On a \\(\\sin x + \\cos x = R \\cos(x - \\varphi) = R(\\cos x \\cos \\varphi + \\sin x \\sin \\varphi)\\).</p><p>Par identification :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div class='math' style='font-size: 1.2rem;'>\\(\\begin{cases} R \\cos \\varphi = 1 \\\\ R \\sin \\varphi = 1 \\end{cases}\\)</div></div><p>Donc \\(R^2 = 2 \\Rightarrow R = \\sqrt{2}\\) et \\(\\tan \\varphi = 1 \\Rightarrow \\varphi = \\frac{\\pi}{4}\\).</p><p>Finalement :</p><div class='math-block' style='background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center;'><div;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
