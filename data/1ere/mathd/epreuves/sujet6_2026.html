<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Mathématiques",
 "classe": "Première D",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Suites définies par récurrence",
     "points": "3 pts",
     "enonce": "<p>Soit la suite \\( (u_n) \\) définie par \\( u_0 = 2 \\) et pour tout entier naturel \\( n \\), \\( u_{n+1} = 2u_n - 3 \\).</p>",
     "questions": [
       {
         "question": "1) Calculer les termes \\( u_1 \\), \\( u_2 \\) et \\( u_3 \\).",
         "reponse": "<p>\\( u_1 = 2 \\times 2 - 3 = 1 \\)</p><p>\\( u_2 = 2 \\times 1 - 3 = -1 \\)</p><p>\\( u_3 = 2 \\times (-1) - 3 = -5 \\)</p>"
       },
       {
         "question": "2) Démontrer que la suite \\( (v_n) \\) définie par \\( v_n = u_n - 3 \\) est une suite géométrique. Donner sa raison et son premier terme.",
         "reponse": "<p>Pour tout \\( n \\), on a :</p><div class='math-block'><div class='math'>$$ v_{n+1} = u_{n+1} - 3 = (2u_n - 3) - 3 = 2u_n - 6 = 2(u_n - 3) = 2v_n $$</div></div><p>La suite \\( (v_n) \\) est donc géométrique de raison \\( q = 2 \\).</p><p>Son premier terme est \\( v_0 = u_0 - 3 = 2 - 3 = -1 \\).</p>"
       },
       {
         "question": "3) Exprimer \\( v_n \\) puis \\( u_n \\) en fonction de \\( n \\).",
         "reponse": "<p>Comme \\( (v_n) \\) est géométrique de raison 2 et de premier terme -1, on a :</p><div class='math-block'><div class='math'>$$ v_n = v_0 \\times q^n = -1 \\times 2^n $$</div></div><p>Comme \\( v_n = u_n - 3 \\), on en déduit :</p><div class='math-block'><div class='math'>$$ u_n = v_n + 3 = -2^n + 3 $$</div></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Étude de la variation d'une suite",
     "points": "3 pts",
     "enonce": "<p>On considère la suite \\( (u_n) \\) définie pour tout entier \\( n \\geq 1 \\) par :</p><div class='math-block'><div class='math'>$$ u_n = \\frac{n}{2n + 1} $$</div></div>",
     "questions": [
       {
         "question": "1) Calculer les quatre premiers termes de la suite.",
         "reponse": "<ul><li>\\( u_1 = \\frac{1}{2 \\times 1 + 1} = \\frac{1}{3} \\)</li><li>\\( u_2 = \\frac{2}{2 \\times 2 + 1} = \\frac{2}{5} \\)</li><li>\\( u_3 = \\frac{3}{2 \\times 3 + 1} = \\frac{3}{7} \\)</li><li>\\( u_4 = \\frac{4}{2 \\times 4 + 1} = \\frac{4}{9} \\)</li></ul>"
       },
       {
         "question": "2) Démontrer que la suite \\( (u_n) \\) est strictement croissante.",
         "reponse": "<p>Pour tout \\( n \\geq 1 \\), on étudie le signe de \\( u_{n+1} - u_n \\) :</p><div class='math-block'><div class='math'>$$ u_{n+1} - u_n = \\frac{n+1}{2(n+1) + 1} - \\frac{n}{2n + 1} = \\frac{n+1}{2n + 3} - \\frac{n}{2n + 1} $$</div></div><p>On réduit au même dénominateur :</p><div class='math-block'><div class='math'>$$ u_{n+1} - u_n = \\frac{(n+1)(2n+1) - n(2n+3)}{(2n+3)(2n+1)} $$</div></div><div class='math-block'><div class='math'>$$ = \\frac{(2n^2 + n + 2n + 1) - (2n^2 + 3n)}{(2n+3)(2n+1)} $$</div></div><div class='math-block'><div class='math'>$$ = \\frac{2n^2 + 3n + 1 - 2n^2 - 3n}{(2n+3)(2n+1)} = \\frac{1}{(2n+3)(2n+1)} > 0 $$</div></div><p>Comme \\( u_{n+1} - u_n > 0 \\) pour tout \\( n \\geq 1 \\), la suite \\( (u_n) \\) est strictement croissante.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Reconnaissance d'une suite arithmétique",
     "points": "2 pts",
     "enonce": "<p>Soit la suite \\( (u_n) \\) définie pour tout entier naturel \\( n \\) par \\( u_n = 5 - 3n \\).</p>",
     "questions": [
       {
         "question": "1) Calculer \\( u_0 \\), \\( u_1 \\) et \\( u_2 \\). La suite est-elle arithmétique ?",
         "reponse": "<ul><li>\\( u_0 = 5 \\)</li><li>\\( u_1 = 5 - 3 = 2 \\)</li><li>\\( u_2 = 5 - 6 = -1 \\)</li></ul><p>On constate que \\( u_1 - u_0 = 2 - 5 = -3 \\) et \\( u_2 - u_1 = -1 - 2 = -3 \\).</p><p>La différence entre deux termes consécutifs est constante et vaut \\( -3 \\).</p><p>La suite \\( (u_n) \\) est donc arithmétique de raison \\( r = -3 \\).</p>"
       },
       {
         "question": "2) Donner l'expression du terme général \\( u_n \\) en fonction de \\( n \\).",
         "reponse": "<p>Pour une suite arithmétique de premier terme \\( u_0 \\) et de raison \\( r \\), on a :</p><div class='math-block'><div class='math'>$$ u_n = u_0 + nr $$</div></div><p>Ici, \\( u_n = 5 - 3n \\), ce qui est cohérent avec la définition donnée.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Problème concret sur les suites arithmétiques",
     "points": "4 pts",
     "enonce": "<p>Un propriétaire d'une petite entreprise de transport à Douala décide d'acheter un nouveau véhicule. La première année, il effectue 5 000 km. Chaque année suivante, il parcourt 2 000 km de plus que l'année précédente.</p>",
     "questions": [
       {
         "question": "1) Quelle distance parcourt-il la 5e année ?",
         "reponse": "<p>La suite des distances parcourues est une suite arithmétique de premier terme \\( u_1 = 5000 \\) et de raison \\( r = 2000 \\).</p><p>Le terme général est \\( u_n = u_1 + (n-1)r = 5000 + (n-1) \\times 2000 \\).</p><p>Pour la 5e année : \\( u_5 = 5000 + 4 \\times 2000 = 5000 + 8000 = 13000 \\) km.</p>"
       },
       {
         "question": "2) Quelle distance totale aura-t-il parcouru au bout de 5 ans ?",
         "reponse": "<p>La somme des \\( n \\) premiers termes d'une suite arithmétique est :</p><div class='math-block'><div class='math'>$$ S_n = \\frac{n(u_1 + u_n)}{2} $$</div></div><p>Au bout de 5 ans :</p><div class='math-block'><div class='math'>$$ S_5 = \\frac{5(5000 + 13000)}{2} = \\frac{5 \\times 18000}{2} = 45000 $$</div></div><p>Il aura parcouru 45 000 km au bout de 5 ans.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 5 : Problème concret sur les suites géométriques",
     "points": "4 pts",
     "enonce": "<p>Un capital de 200 000 FCFA est placé à intérêts composés au taux annuel de 5%. On note \\( C_n \\) le capital au bout de \\( n \\) années.</p>",
     "questions": [
       {
         "question": "1) Exprimer \\( C_{n+1} \\) en fonction de \\( C_n \\). Quelle est la nature de la suite \\( (C_n) \\) ?",
         "reponse": "<p>Chaque année, le capital est multiplié par \\( 1 + 5\\% = 1 + 0,05 = 1,05 \\).</p><p>On a donc : \\( C_{n+1} = 1,05 \\times C_n \\).</p><p>La suite \\( (C_n) \\) est géométrique de raison \\( q = 1,05 \\) et de premier terme \\( C_0 = 200000 \\).</p>"
       },
       {
         "question": "2) Exprimer \\( C_n \\) en fonction de \\( n \\).",
         "reponse": "<p>Pour une suite géométrique de premier terme \\( C_0 \\) et de raison \\( q \\), on a :</p><div class='math-block'><div class='math'>$$ C_n = C_0 \\times q^n $$</div></div><p>Donc : \\( C_n = 200000 \\times (1,05)^n \\).</p>"
       },
       {
         "question": "3) Calculer le capital obtenu au bout de 5 ans (arrondir à l'entier).",
         "reponse": "<p>\\( C_5 = 200000 \\times (1,05)^5 \\)</p><p>\\( (1,05)^5 = 1,2762815625 \\)</p><p>\\( C_5 = 200000 \\times 1,2762815625 = 255256,3125 \\)</p><p>Au bout de 5 ans, le capital sera de 255 256 FCFA (arrondi à l'entier).</p>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
