<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths 1ère D",
  "classe": "Première",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Statistiques et dénombrement",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Un professeur a relevé les notes de 20 élèves à un devoir de mathématiques. Les résultats sont consignés dans le tableau suivant :</p><div style='overflow-x: auto;'><table style='border-collapse: collapse; width: 100%; background: #ffffff; color: #1e293b; font-size: 0.9rem;'><tr style='background: #e2e8f0;'><th style='border: 1px solid #cbd5e1; padding: 0.5rem;'>Notes</th><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>[0;4[</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>[4;8[</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>[8;12[</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>[12;16[</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>[16;20]</td></tr><tr><th style='border: 1px solid #cbd5e1; padding: 0.5rem;'>Effectif</th><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>2</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>5</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>8</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>4</td><td style='border: 1px solid #cbd5e1; padding: 0.5rem;'>1</td></tr></table></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> a) Calculer la moyenne de cette série statistique.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Centres des classes : 2 ; 6 ; 10 ; 14 ; 18<br>\\(\\bar{x} = \\frac{2 \\times 2 + 5 \\times 6 + 8 \\times 10 + 4 \\times 14 + 1 \\times 18}{20} = \\frac{4 + 30 + 80 + 56 + 18}{20} = \\frac{188}{20} = 9,4\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> b) Calculer la variance et l'écart-type de cette série.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(V = \\frac{2(2-9,4)^2 + 5(6-9,4)^2 + 8(10-9,4)^2 + 4(14-9,4)^2 + 1(18-9,4)^2}{20}\\)<br>\\(= \\frac{2 \\times 54,76 + 5 \\times 11,56 + 8 \\times 0,36 + 4 \\times 21,16 + 1 \\times 73,96}{20}\\)<br>\\(= \\frac{109,52 + 57,8 + 2,88 + 84,64 + 73,96}{20} = \\frac{328,8}{20} = 16,44\\)<br>\\(\\sigma = \\sqrt{16,44} \\approx 4,05\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> a) Construire le tableau des effectifs cumulés croissants.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Classes : [0;4[, [4;8[, [8;12[, [12;16[, [16;20]<br>Effectifs cumulés croissants : 2 ; 7 ; 15 ; 19 ; 20</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> b) Déterminer la classe médiane de cette série.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Effectif total = 20, la médiane est la moyenne de la 10e et 11e valeur.<br>La 10e valeur se trouve dans la classe [8 ; 12[, donc la classe médiane est [8 ; 12[.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> On choisit simultanément 3 élèves parmi les 20 pour une cérémonie de remise de prix.<br>a) Combien de comités différents peut-on former ?</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(C_{20}^3 = \\frac{20 \\times 19 \\times 18}{3 \\times 2 \\times 1} = 1140\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> b) Combien de comités peuvent être formés avec exactement 2 élèves ayant une note supérieure ou égale à 12 ?</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Nombre d'élèves ayant une note \\(\\geq 12\\) : \\(4 + 1 = 5\\)<br>Nombre d'élèves ayant une note < 12 : \\(20 - 5 = 15\\)<br>\\(C_5^2 \\times C_{15}^1 = 10 \\times 15 = 150\\)</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Trigonométrie",
      "points": "5 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Soit \\(x\\) un nombre réel tel que \\(0 < x < \\frac{\\pi}{2}\\) et \\(\\cos x = \\frac{3}{5}\\).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Calculer \\(\\sin x\\), \\(\\sin 2x\\) et \\(\\cos 2x\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(\\sin x = \\sqrt{1 - \\cos^2 x} = \\sqrt{1 - \\frac{9}{25}} = \\sqrt{\\frac{16}{25}} = \\frac{4}{5}\\)<br>\\(\\sin 2x = 2\\sin x \\cos x = 2 \\times \\frac{4}{5} \\times \\frac{3}{5} = \\frac{24}{25}\\)<br>\\(\\cos 2x = \\cos^2 x - \\sin^2 x = \\frac{9}{25} - \\frac{16}{25} = -\\frac{7}{25}\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Exprimer \\(f(x) = \\sin x - \\sqrt{3}\\cos x\\) sous la forme \\(R\\sin(x - \\phi)\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(R = \\sqrt{1^2 + (-\\sqrt{3})^2} = 2\\)<br>\\(\\sin\\phi = \\frac{\\sqrt{3}}{2}\\) et \\(\\cos\\phi = \\frac{1}{2}\\) donc \\(\\phi = \\frac{\\pi}{3}\\)<br>\\(f(x) = 2\\sin\\left(x - \\frac{\\pi}{3}\\right)\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> Résoudre dans \\([0; 2\\pi]\\) l'équation : \\(\\sin x - \\sqrt{3}\\cos x = 1\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(2\\sin\\left(x - \\frac{\\pi}{3}\\right) = 1 \\Rightarrow \\sin\\left(x - \\frac{\\pi}{3}\\right) = \\frac{1}{2}\\)<br>\\(x - \\frac{\\pi}{3} = \\frac{\\pi}{6} + 2k\\pi\\) ou \\(x - \\frac{\\pi}{3} = \\frac{5\\pi}{6} + 2k\\pi\\)<br>\\(x = \\frac{\\pi}{2} + 2k\\pi\\) ou \\(x = \\frac{7\\pi}{6} + 2k\\pi\\)<br>Dans \\([0; 2\\pi]\\) : \\(x = \\frac{\\pi}{2}\\) et \\(x = \\frac{7\\pi}{6}\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>4)</strong> Résoudre dans \\([0; 2\\pi]\\) l'inéquation : \\(\\sin x - \\sqrt{3}\\cos x \\leq 1\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(2\\sin\\left(x - \\frac{\\pi}{3}\\right) \\leq 1 \\Rightarrow \\sin\\left(x - \\frac{\\pi}{3}\\right) \\leq \\frac{1}{2}\\)<br>Sur le cercle trigonométrique : \\(x - \\frac{\\pi}{3} \\in \\left[-\\frac{\\pi}{6}; \\frac{\\pi}{6}\\right]\\) ou \\(x - \\frac{\\pi}{3} \\in \\left[\\frac{5\\pi}{6}; \\frac{13\\pi}{6}\\right]\\)<br>\\(S = [0; \\frac{\\pi}{2}] \\cup [\\frac{7\\pi}{6}; 2\\pi]\\)</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Suites numériques",
      "points": "3 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Soit la suite \\((u_n)\\) définie par \\(u_0 = 0,5\\) et \\(u_{n+1} = 3u_n - 2\\) pour tout \\(n \\in \\mathbb{N}\\).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> a) Calculer \\(u_1\\), \\(u_2\\) et \\(u_3\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(u_1 = 3 \\times 0,5 - 2 = 1,5 - 2 = -0,5\\)<br>\\(u_2 = 3 \\times (-0,5) - 2 = -1,5 - 2 = -3,5\\)<br>\\(u_3 = 3 \\times (-3,5) - 2 = -10,5 - 2 = -12,5\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> b) Déterminer le sens de variation de la suite \\((u_n)\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(u_{n+1} - u_n = (3u_n - 2) - u_n = 2u_n - 2 = 2(u_n - 1)\\)<br>Comme \\(u_n < 1\\) pour \\(n \\geq 1\\), \\(u_{n+1} - u_n < 0\\), donc la suite est strictement décroissante à partir de \\(n \\geq 0\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> a) Déterminer le point fixe \\(\\alpha\\) de cette suite.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>On résout \\(\\alpha = 3\\alpha - 2 \\Rightarrow 2\\alpha = 2 \\Rightarrow \\alpha = 1\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> b) Exprimer \\(u_n\\) en fonction de \\(n\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Posons \\(v_n = u_n - \\alpha = u_n - 1\\). Alors \\(v_{n+1} = u_{n+1} - 1 = (3u_n - 2) - 1 = 3u_n - 3 = 3(u_n - 1) = 3v_n\\)<br>\\((v_n)\\) est une suite géométrique de raison 3 et de premier terme \\(v_0 = u_0 - 1 = -0,5 = -\\frac{1}{2}\\)<br>\\(v_n = -\\frac{1}{2} \\times 3^n\\)<br>Donc \\(u_n = 1 - \\frac{1}{2} \\times 3^n\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> c) Calculer \\(\\lim_{n \\to +\\infty} u_n\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(\\lim_{n \\to +\\infty} 3^n = +\\infty\\) donc \\(\\lim_{n \\to +\\infty} u_n = -\\infty\\)</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Étude de fonctions et barycentre",
      "points": "8 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Soit la fonction \\(f\\) définie sur \\(\\mathbb{R}\\setminus\\{1\\}\\) par \\(f(x) = \\frac{x^2 + 1}{x - 1}\\). On note \\((C_f)\\) sa courbe représentative dans un repère orthonormé \\((O, \\vec{i}, \\vec{j})\\).</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> a) Déterminer les limites de \\(f\\) aux bornes de son ensemble de définition.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(\\lim_{x \\to +\\infty} f(x) = +\\infty\\) et \\(\\lim_{x \\to -\\infty} f(x) = -\\infty\\)<br>\\(\\lim_{x \\to 1^+} f(x) = +\\infty\\) et \\(\\lim_{x \\to 1^-} f(x) = -\\infty\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> b) En déduire les asymptotes éventuelles de \\((C_f)\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>Asymptote verticale : \\(x = 1\\) car \\(\\lim_{x \\to 1} f(x) = \\pm\\infty\\)<br>Asymptote oblique : \\(f(x) = x + 1 + \\frac{2}{x-1}\\), donc \\(y = x + 1\\) est asymptote oblique.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> a) Calculer la dérivée \\(f'(x)\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(f'(x) = \\frac{2x(x-1) - (x^2+1)}{(x-1)^2} = \\frac{2x^2 - 2x - x^2 - 1}{(x-1)^2} = \\frac{x^2 - 2x - 1}{(x-1)^2}\\)</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> b) Dresser le tableau de variations de \\(f\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(x^2 - 2x - 1 = 0 \\Rightarrow x = 1 \\pm \\sqrt{2}\\)<br>\\(f'\\) est positive sur \\(] -\\infty ; 1-\\sqrt{2}[ \\cup ]1+\\sqrt{2} ; +\\infty[\\)<br>\\(f'\\) est négative sur \\(]1-\\sqrt{2} ; 1[ \\cup ]1 ; 1+\\sqrt{2}[\\)<br>\\(f\\) admet un maximum local en \\(x = 1-\\sqrt{2}\\) et un minimum local en \\(x = 1+\\sqrt{2}\\).</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> Soit \\(A\\) le barycentre des points pondérés \\((O,1)\\) et \\((I,2)\\) où \\(I\\) est le point d'intersection de \\((C_f)\\) avec l'axe des ordonnées. Déterminer les coordonnées de \\(A\\).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>\\(I(0 ; f(0)) = (0 ; -1)\\)<br>\\(\\overrightarrow{OA} = \\frac{1 \\times \\overrightarrow{OO} + 2 \\times \\overrightarrow{OI}}{1+2} = \\frac{2}{3}\\overrightarrow{OI}\\)<br>\\(A\\left(0 ; -\\frac{2}{3}\\right)\\)</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
