<style>

    .note-box {

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;

    .loading-text {

    .loading-progress {

    .loading-progress-bar {

        border-radius: 50%;

    .status-badge.idle .dot {

    }
    .status-badge.speaking .dot {

        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {

        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {

        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;

    }
    @keyframes pulse-dot {

    .footer-buttons {
        display: flex;

        align-items: center;

    .btn {

        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;

        gap: 5px;

        -webkit-user-select: none;

<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->

<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h2 style='color: #2c3e50;'>Leçon 9 : Nombre dérivé et fonction dérivée</h2><p style='font-size: 1.1em; line-height: 1.6;'>La dérivation est un outil fondamental en mathématiques qui permet d'étudier le <strong>taux de variation</strong> d'une fonction en un point donné.</p><p style='font-size: 1.1em; line-height: 1.6;'>Cette notion est essentielle pour comprendre comment une fonction évolue, déterminer ses variations et résoudre de nombreux problèmes concrets.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0;'><strong>🎯 Objectifs de la leçon :</strong></p><ul style='line-height: 1.8;'><li>Calculer le nombre dérivé d'une fonction en un point</li><li>Déterminer l'équation de la tangente à une courbe en un point</li><li>Connaître et appliquer les formules de dérivées des fonctions usuelles</li></ul></div></div>",
    "texteParle": "Bonjour à tous. Bienvenue dans la leçon sur le nombre dérivé et la fonction dérivée. La dérivation est un outil fondamental en mathématiques qui permet d'étudier le taux de variation d'une fonction en un point donné. Cette notion est essentielle pour comprendre comment une fonction évolue, déterminer ses variations et résoudre de nombreux problèmes concrets. Dans cette leçon, nous allons apprendre à calculer le nombre dérivé d'une fonction en un point, à déterminer l'équation de la tangente à une courbe en un point, et à connaître et appliquer les formules de dérivées des fonctions usuelles.",
    "note": "La dérivation permet de mesurer la variation instantanée d'une fonction."
  },
  {
    "titre": "Définition du nombre dérivé",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Qu'est-ce que le nombre dérivé ?</h3><p style='line-height: 1.6;'>Le <strong>nombre dérivé</strong> d'une fonction <em>f</em> en un point <em>a</em>, noté <strong>f'(a)</strong>, est la limite du taux d'accroissement lorsque <em>h</em> tend vers 0.</p><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; margin: 10px 0;'><p style='margin: 0;'><strong>✏️ Définition :</strong></p><div class='math-block'><div class='math'>$$f'(a) = \\lim_{h \\to 0} \\frac{f(a+h) - f(a)}{h}$$</div></div></div><p style='line-height: 1.6;'>Ce quotient représente le coefficient directeur de la sécante passant par les points d'abscisses <em>a</em> et <em>a+h</em>. Quand <em>h</em> tend vers 0, la sécante tend vers la <strong>tangente</strong> à la courbe au point d'abscisse <em>a</em>.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>📌 Exemple :</strong> Calculer le nombre dérivé de <em>f(x) = x²</em> en <em>a = 3</em>.</p><p style='margin: 5px 0;'>$$\\frac{f(3+h) - f(3)}{h} = \\frac{(3+h)^2 - 9}{h} = \\frac{9 + 6h + h^2 - 9}{h} = \\frac{6h + h^2}{h} = 6 + h$$</p><p style='margin: 5px 0;'>$$f'(3) = \\lim_{h \\to 0} (6 + h) = 6$$</p></div></div>",
    "texteParle": "Commençons par la définition du nombre dérivé. Le nombre dérivé d'une fonction f en un point a, noté f prime de a, est la limite du taux d'accroissement lorsque h tend vers 0. Ce taux d'accroissement est le quotient de la différence des images par la différence des abscisses. Il représente le coefficient directeur de la sécante qui passe par les points d'abscisses a et a plus h. Quand h tend vers 0, cette sécante se rapproche de la tangente à la courbe au point d'abscisse a. Prenons un exemple concret. Pour la fonction f de x égale x au carré, calculons le nombre dérivé en a égale 3. On calcule le taux d'accroissement, on simplifie, et on trouve que la limite est 6. Donc f prime de 3 est égal à 6.",
    "note": "Le nombre dérivé f'(a) est le coefficient directeur de la tangente à la courbe au point d'abscisse a."
  },
  {
    "titre": "Interprétation géométrique",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Interprétation géométrique</h3><p style='line-height: 1.6;'>Le nombre dérivé <strong>f'(a)</strong> est le coefficient directeur de la <strong>tangente</strong> à la courbe représentative de <em>f</em> au point d'abscisse <em>a</em>.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>📌 La tangente en un point :</strong></p><ul style='line-height: 1.8;'><li>Si <em>f'(a) > 0</em>, la tangente est croissante (la courbe monte)</li><li>Si <em>f'(a) < 0</em>, la tangente est décroissante (la courbe descend)</li><li>Si <em>f'(a) = 0</em>, la tangente est horizontale</li></ul></div><div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>💡 Interprétation physique :</strong></p><p style='margin: 5px 0;'>Le nombre dérivé d'une fonction représente la <strong>vitesse instantanée</strong> de variation de cette fonction. Par exemple, si <em>f(t)</em> est la position d'un mobile, <em>f'(t)</em> est sa vitesse instantanée.</p></div></div>",
    "texteParle": "Parlons maintenant de l'interprétation géométrique du nombre dérivé. Le nombre dérivé f prime de a est le coefficient directeur de la tangente à la courbe représentative de la fonction au point d'abscisse a. Cela signifie que si f prime de a est positif, la tangente est croissante et la courbe monte en ce point. Si f prime de a est négatif, la tangente est décroissante et la courbe descend. Si f prime de a est nul, la tangente est horizontale. Le nombre dérivé a aussi une interprétation physique : c'est la vitesse instantanée de variation de la fonction. Par exemple, si f de t représente la position d'un mobile en fonction du temps, alors f prime de t est sa vitesse instantanée à l'instant t.",
    "note": "f'(a) > 0 → tangente ascendante, f'(a) < 0 → tangente descendante, f'(a) = 0 → tangente horizontale."
  },
  {
    "titre": "Équation de la tangente",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Équation de la tangente</h3><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; margin: 10px 0;'><p style='margin: 0;'><strong>✏️ Formule :</strong></p><div class='math-block'><div class='math'>$$y = f'(a)(x - a) + f(a)$$</div></div></div><p style='line-height: 1.6;'>La tangente à la courbe de <em>f</em> au point d'abscisse <em>a</em> est une droite dont l'équation est donnée par cette formule.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>📌 Exemple :</strong> Déterminer l'équation de la tangente à <em>f(x) = x²</em> en <em>a = 3</em>.</p><p style='margin: 5px 0;'>On a : <em>f(3) = 9</em> et <em>f'(3) = 6</em></p><p style='margin: 5px 0;'>Donc : $$y = 6(x - 3) + 9 = 6x - 18 + 9 = 6x - 9$$</p><p style='margin: 5px 0;'><strong>L'équation de la tangente est :</strong> <em>y = 6x − 9</em></p></div></div>",
    "texteParle": "Maintenant que nous savons calculer le nombre dérivé, nous pouvons déterminer l'équation de la tangente à une courbe en un point. La formule est simple : l'équation de la tangente est y égale f prime de a multiplié par x moins a, plus f de a. Reprenons notre exemple de la fonction f de x égale x au carré en a égale 3. Nous avons f de 3 égale 9 et f prime de 3 égale 6. En appliquant la formule, nous obtenons y égale 6 fois x moins 3 plus 9, ce qui donne y égale 6x moins 9. C'est l'équation de la tangente à la parabole au point d'abscisse 3. Cette équation nous permet de tracer la tangente et d'étudier le comportement local de la fonction.",
    "note": "La tangente est la meilleure approximation affine de la fonction au voisinage du point."
  },
  {
    "titre": "Dérivées des fonctions usuelles (1)",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Dérivées des fonctions usuelles</h3><p style='line-height: 1.6;'>Pour faciliter les calculs, il est essentiel de connaître les dérivées des fonctions de référence :</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0; overflow-x: auto;'><table style='border-collapse: collapse; width: 100%; max-width: 400px; margin: 0 auto; font-size: 0.95em;'><tr style='background-color: #2c3e50; color: white;'><th style='border: 1px solid #333; padding: 8px; text-align: center;'>Fonction</th><th style='border: 1px solid #333; padding: 8px; text-align: center;'>Dérivée</th></tr><tr><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f(x) = k</em> (constante)</td><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f'(x) = 0</em></td></tr><tr style='background-color: #f5f5f5;'><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f(x) = x</em></td><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f'(x) = 1</em></td></tr><tr><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f(x) = x²</em></td><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f'(x) = 2x</em></td></tr><tr style='background-color: #f5f5f5;'><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f(x) = x³</em></td><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f'(x) = 3x²</em></td></tr><tr><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f(x) = xⁿ</em></td><td style='border: 1px solid #333; padding: 8px; text-align: center;'><em>f'(x) = nxⁿ⁻¹</em></td></tr></table></div></div>",
    "texteParle": "Pour faciliter les calculs de dérivées, il est essentiel de connaître par cœur les dérivées des fonctions de référence. Commençons par les fonctions puissances. La dérivée d'une fonction constante est nulle. La dérivée de x est 1. La dérivée de x au carré est 2x. La dérivée de x au cube est 3x au carré. Et de façon générale, la dérivée de x puissance n est n fois x puissance n moins 1. Ces formules sont à connaître parfaitement car elles sont la base de tous les calculs de dérivées que nous ferons. N'hésitez pas à les mémoriser et à vous entraîner à les appliquer sur des exemples simples.",
    "note": "La dérivée de xⁿ est n×xⁿ⁻¹ (pour n réel)."

  {

    "texteParle": "Continuons avec les autres fonctions usuelles. La dérivée de un sur x est moins un sur x au carré. Attention au signe moins, c'est une erreur fréquente. La dérivée de racine carrée de x est un sur deux racine carrée de x. Pour les fonctions trigonométriques, la dérivée de sinus x est cosinus x, la dérivée de cosinus x est moins sinus x, et la dérivée de tangente x est un plus tangente carré x ou un sur cosinus carré x. Ces formules sont également à connaître par cœur. Elles seront très utiles pour dériver des fonctions plus complexes dans les exercices à venir.",
    "note": "Les dérivées des fonctions trigonométriques sont indispensables pour l'étude de nombreuses fonctions."
  },
  {
    "titre": "Opérations sur les dérivées",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Opérations sur les dérivées</h3><p style='line-height: 1.6;'>Pour calculer la dérivée d'une combinaison de fonctions, on utilise les règles suivantes :</p><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; margin: 10px 0;'><p style='margin: 0;'><strong>✏️ Règles de dérivation :</strong></p><div class='math-block'><div class='math'>$$(u + v)' = u' + v'$$</div><div class='math'>$$(ku)' = ku' \\quad (k \\in \\mathbb{R})$$</div><div class='math'>$$(uv)' = u'v + uv'$$</div><div class='math'>$$\\left(\\frac{u}{v}\\right)' = \\frac{u'v - uv'}{v^2}$$</div></div></div><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>📌 Exemple :</strong> Dériver <em>f(x) = x³ sin x</em></p><p style='margin: 5px 0;'>On pose <em>u = x³</em> et <em>v = sin x</em></p><p style='margin: 5px 0;'><em>u' = 3x²</em> et <em>v' = cos x</em></p><p style='margin: 5px 0;'><em>f'(x) = 3x² sin x + x³ cos x</em></p></div></div>",
    "texteParle": "Parfois, une fonction est une combinaison de plusieurs fonctions. Pour dériver ce type de fonction, nous utilisons des règles de calcul. La dérivée d'une somme est la somme des dérivées. La dérivée d'une fonction multipliée par une constante est la constante multipliée par la dérivée de la fonction. Pour un produit de deux fonctions, la formule est : dérivée de u fois v égale u prime v plus u v prime. Et pour un quotient, la formule est : dérivée de u sur v égale u prime v moins u v prime sur v au carré. Prenons un exemple : dérivons f de x égale x au cube fois sinus x. On pose u égale x cube et v égale sinus x. On calcule les dérivées, puis on applique la formule du produit. On obtient f prime de x égale 3x carré sinus x plus x cube cosinus x.",
    "note": "Ces règles de dérivation sont indispensables pour dériver des fonctions complexes."
  },
  {
    "titre": "Dérivée d'une fonction composée",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Dérivée d'une fonction composée</h3><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; margin: 10px 0;'><p style='margin: 0;'><strong>✏️ Formule :</strong></p><div class='math-block'><div class='math'>$$(f \\circ g)'(x) = f'(g(x)) \\times g'(x)$$</div></div></div><p style='line-height: 1.6;'>Cette formule est souvent appelée la <strong>règle de la chaîne</strong>.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>📌 Exemple :</strong> Dériver <em>f(x) = (2x + 1)³</em></p><p style='margin: 5px 0;'>On pose <em>g(x) = 2x + 1</em> et <em>h(x) = x³</em></p><p style='margin: 5px 0;'>Alors <em>f(x) = h(g(x))</em></p><p style='margin: 5px 0;'><em>g'(x) = 2</em> et <em>h'(x) = 3x²</em></p><p style='margin: 5px 0;'><em>f'(x) = 3(2x + 1)² × 2 = 6(2x + 1)²</em></p></div></div>",
    "texteParle": "Il arrive souvent qu'une fonction soit la composée de deux fonctions. Par exemple, f de x égale deux x plus un le tout au cube. Pour dériver ce type de fonction, on utilise la formule de dérivation des fonctions composées, aussi appelée règle de la chaîne. La dérivée de f composée g est f prime de g de x multiplié par g prime de x. Dans notre exemple, on pose g de x égale deux x plus un et h de x égale x cube. Alors f est égale à h composée g. On calcule g prime de x égale 2 et h prime de x égale 3x carré. En appliquant la formule, on obtient f prime de x égale 3 fois deux x plus un au carré fois 2, ce qui donne 6 fois deux x plus un au carré.",
    "note": "La règle de la chaîne est essentielle pour dériver des fonctions composées."

  {
    "titre": "Synthèse",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'><h3 style='color: #2c3e50;'>Ce qu'il faut retenir</h3><div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin: 10px 0;'><h4 style='margin-top: 0;'>📋 Résumé des points clés :</h4><ul style='line-height: 1.8; font-size: 1.05em;'><li><strong>Nombre dérivé :</strong> $$f'(a) = \\lim_{h \\to 0} \\frac{f(a+h) - f(a)}{h}$$</li><li><strong>Tangente :</strong> $$y = f'(a)(x - a) + f(a)$$</li><li><strong>Dérivées usuelles :</strong> (xⁿ)' = nxⁿ⁻¹, (sin x)' = cos x, (cos x)' = -sin x</li><li><strong>Opérations :</strong> (uv)' = u'v + uv', (u/v)' = (u'v - uv')/v²</li><li><strong>Composée :</strong> (f∘g)' = f'(g) × g'</li></ul></div><div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>✅ Point important :</strong> La maîtrise des dérivées est la base de l'étude complète des fonctions. Entraînez-vous régulièrement !</p></div></div>",
    "texteParle": "Pour conclure cette leçon, faisons une synthèse des points essentiels. Le nombre dérivé est la limite du taux d'accroissement quand h tend vers 0. L'équation de la tangente est donnée par la formule y égale f prime de a fois x moins a plus f de a. Les dérivées des fonctions usuelles sont à connaître par cœur, ainsi que les règles de dérivation des opérations et des fonctions composées. La maîtrise de ces notions est la base de l'étude complète des fonctions. Je vous encourage à vous entraîner régulièrement avec des exercices variés pour bien assimiler ces concepts. La dérivation est un outil puissant qui vous sera utile dans de nombreux domaines des mathématiques. Bon courage et à bientôt !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
