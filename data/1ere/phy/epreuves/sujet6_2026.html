<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Première",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Nature de la lumière et énergie des photons",
      "points": "4 pts",
      "enonce": "<p>Le Soleil, notre principale source de lumière, peut être modélisé comme un corps noir dont la température de surface est d'environ 5800 K. La loi de Wien, qui relie la longueur d'onde d'émission maximale d'un corps chaud à sa température, est un outil fondamental pour comprendre le rayonnement des étoiles.</p><p>Par ailleurs, l'étude de la lumière a conduit au développement du modèle corpusculaire, où la lumière est considérée comme un flux de photons. L'énergie de ces photons est directement liée à la fréquence de la radiation.</p><p>Données : Constante de Planck, h = 6,63 × 10⁻³⁴ J·s; Célérité de la lumière dans le vide, c = 3,00 × 10⁸ m·s⁻¹; Constante de Wien, b = 2,90 × 10⁻³ m·K</p>",
      "questions": [
        {
          "question": "<p><strong>1.1 (0,75 pt)</strong> Situer le domaine du visible sur le spectre des ondes électromagnétiques en indiquant les longueurs d'onde et les couleurs extrêmes.</p>",
          "reponse": "<p>Le domaine visible s'étend approximativement de <strong>380 nm (violet)</strong> à <strong>780 nm (rouge)</strong>. Les couleurs se succèdent dans l'ordre : violet, indigo, bleu, vert, jaune, orange, rouge.</p>"
        },
        {
          "question": "<p><strong>1.2 (0,75 pt)</strong> À l'aide de la loi de Wien, calculer la longueur d'onde λ<sub>max</sub> pour laquelle l'émission du Soleil est maximale. Exprimer le résultat en mètres, puis en nanomètres.</p>",
          "reponse": "<p>La loi de Wien est : λ<sub>max</sub> · T = b.</p><p>Donc λ<sub>max</sub> = b / T = (2,90 × 10⁻³) / 5800 ≈ <strong>5,00 × 10⁻⁷ m</strong>.</p><p>En nanomètres : 5,00 × 10⁻⁷ m = <strong>500 nm</strong>.</p>"
        },
        {
          "question": "<p><strong>1.3 (0,75 pt)</strong> Cette radiation est-elle visible ? Justifier votre réponse.</p>",
          "reponse": "<p>Oui, elle est visible car 500 nm se situe dans le domaine du visible (entre 380 nm et 780 nm). Cette longueur d'onde correspond à la couleur <strong>vert-cyan</strong>, ce qui explique la couleur jaune-blanc perçue du Soleil.</p>"
        },
        {
          "question": "<p><strong>1.4 (1,0 pt)</strong> Calculer la fréquence ν et l'énergie E d'un photon correspondant à cette radiation émise par le Soleil.</p>",
          "reponse": "<p>La fréquence est donnée par : ν = c / λ = (3,00 × 10⁸) / (5,00 × 10⁻⁷) = <strong>6,00 × 10¹⁴ Hz</strong>.</p><p>L'énergie du photon est : E = h·ν = 6,63 × 10⁻³⁴ × 6,00 × 10¹⁴ ≈ <strong>3,98 × 10⁻¹⁹ J</strong>.</p>"
        },
        {
          "question": "<p><strong>1.5 (0,75 pt)</strong> Expliquer brièvement ce qu'est un photon et comment se manifeste l'interaction lumière-matière par émission ou absorption de photons.</p>",
          "reponse": "<p>Un photon est le <strong>quantum d'énergie</strong>, c'est-à-dire le plus petit paquet d'énergie transporté par une onde électromagnétique. Il se comporte à la fois comme une particule et comme une onde.</p><p>L'interaction lumière-matière se fait par <strong>échange de photons</strong> : lorsqu'un atome absorbe un photon, il gagne de l'énergie (passage à un état excité). Lorsqu'un atome émet un photon, il perd de l'énergie (retour à l'état fondamental). Cette émission est caractéristique de l'élément et constitue son spectre d'émission.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Lentilles minces et modélisation de l'œil",
      "points": "5 pts",
      "enonce": "<p>L'œil humain peut être modélisé par un système optique simple appelé <strong>œil réduit</strong>. Dans ce modèle, le cristallin est assimilé à une lentille convergente de distance focale variable, et la rétine au plan de l'image.</p><p>On considère un œil réduit dont la distance entre le cristallin (centre optique O) et la rétine est de 17 mm. Cet œil observe un objet AB de 5 cm de hauteur placé à 25 cm devant l'œil (distance qui correspond au punctum proximum d'un œil normal).</p><p>Données : OA = -25 cm; AB = 5 cm; OA' = 17 mm = 1,7 cm</p>",
      "questions": [
        {
          "question": "<p><strong>2.1 (0,5 pt)</strong> Rappeler les conditions de Gauss pour qu'une lentille mince donne une image nette.</p>",
          "reponse": "<p>Les conditions de Gauss sont au nombre de deux :</p><ul><li>Le faisceau lumineux doit être <strong>paraxial</strong> : les rayons doivent faire un angle faible avec l'axe optique.</li><li>L'objet doit être <strong>au voisinage de l'axe optique</strong>.</li></ul><p>Ces conditions permettent d'utiliser l'approximation de Gauss (les angles sont petits, sin θ ≈ tan θ ≈ θ), ce qui simplifie les calculs et garantit la stigmatisme approché.</p>"
        },
        {
          "question": "<p><strong>2.2 (0,75 pt)</strong> Appliquer la formule de conjugaison de Descartes (1/OA' - 1/OA = 1/f') pour déterminer la distance focale f' du cristallin nécessaire à la formation d'une image nette sur la rétine.</p>",
          "reponse": "<p>On applique la formule de conjugaison de Descartes :</p><p>1/OA' - 1/OA = 1/f'</p><p>avec OA = -25 cm et OA' = 1,7 cm.</p><p>1/f' = 1/1,7 - 1/(-25) = 1/1,7 + 1/25</p><p>1/f' ≈ 0,588 + 0,04 = 0,628 cm⁻¹</p><p>Donc f' ≈ <strong>1,59 cm = 15,9 mm</strong>.</p><p>La distance focale du cristallin doit être d'environ 15,9 mm.</p>"
        },
        {
          "question": "<p><strong>2.3 (0,75 pt)</strong> Calculer la vergence C de cette lentille, en dioptries (δ).</p>",
          "reponse": "<p>La vergence C est l'inverse de la distance focale exprimée en mètres :</p><p>f' = 1,59 cm = 1,59 × 10⁻² m</p><p>C = 1/f' = 1 / (1,59 × 10⁻²) ≈ <strong>62,9 δ</strong>.</p><p>La vergence du cristallin est d'environ 63 dioptries.</p>"
        },
        {
          "question": "<p><strong>2.4 (1,0 pt)</strong> Calculer le grandissement γ de l'image et déterminer la taille de l'image A'B' formée sur la rétine.</p>",
          "reponse": "<p>Le grandissement est donné par : γ = OA' / OA.</p><p>γ = 1,7 / (-25) = <strong>-0,068</strong>.</p><p>Le signe négatif indique que l'image est <strong>renversée</strong> par rapport à l'objet.</p><p>La taille de l'image est : A'B' = γ × AB = 0,068 × 5 = <strong>0,34 cm = 3,4 mm</strong>.</p><p>L'image mesurera 3,4 mm sur la rétine.</p>"
        },
        {
          "question": "<p><strong>2.5 (0,5 pt)</strong> Un œil myope a un punctum remotum plus court que l'œil normal. Quel type de défaut cela représente-t-il ? Proposer le type de lentille correctrice adapté.</p>",
          "reponse": "<p>L'œil myope voit de près mais mal de loin : l'image d'un objet lointain se forme en avant de la rétine. Le punctum remotum est situé à une distance finie (moins de l'infini).</p><p>La correction de la myopie se fait à l'aide d'une <strong>lentille divergente</strong> (verres concaves), qui écarte les rayons lumineux avant qu'ils n'atteignent l'œil, permettant à l'image de se former sur la rétine.</p>"
        },
        {
          "question": "<p><strong>2.6 (0,5 pt)</strong> Expliquer brièvement le phénomène d'accommodation.</p>",
          "reponse": "<p>L'accommodation est le mécanisme par lequel l'œil modifie la vergence du cristallin (en modifiant sa courbure grâce aux muscles ciliaires) afin de former une image nette sur la rétine pour des objets situés à des distances différentes. C'est une mise au point automatique et continue pour voir net de près ou de loin.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Électricité - Générateur et récepteur",
      "points": "6 pts",
      "enonce": "<p>On souhaite étudier le fonctionnement d'un petit moteur électrique. Ce moteur est alimenté par un générateur de force électromotrice E = 12 V et de résistance interne r = 0,5 Ω.</p><p>Le moteur (récepteur) a une force contre-électromotrice E' = 9 V et une résistance interne r' = 1,5 Ω.</p><p>Le circuit série est fermé sur le moteur.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1 (0,75 pt)</strong> Rappeler les caractéristiques d'un générateur dans le modèle de Thévenin. Donner l'expression de la tension U aux bornes du générateur en fonction du courant I.</p>",
          "reponse": "<p>Un générateur est modélisé par une <strong>force électromotrice E</strong> et une <strong>résistance interne r</strong>.</p><p>La tension à ses bornes est : <strong>U = E - r·I</strong></p><p>Cette expression traduit le fait que la tension disponible aux bornes diminue lorsque le courant augmente (à cause de la chute de tension dans la résistance interne).</p>"
        },
        {
          "question": "<p><strong>3.2 (0,75 pt)</strong> Rappeler la caractéristique d'un récepteur et donner l'expression de la tension U' aux bornes du moteur en fonction du courant I.</p>",
          "reponse": "<p>Un récepteur est modélisé par une <strong>force contre-électromotrice E'</strong> et une <strong>résistance interne r'</strong>.</p><p>La tension à ses bornes est : <strong>U' = E' + r'·I</strong></p><p>Cette expression montre qu'une partie de la tension est utilisée pour vaincre la force contre-électromotrice (travail utile), et l'autre partie est dissipée par effet Joule dans la résistance interne.</p>"
        },
        {
          "question": "<p><strong>3.3 (1,0 pt)</strong> Appliquer la loi de Pouillet pour calculer l'intensité I du courant dans le circuit.</p>",
          "reponse": "<p>La loi de Pouillet pour un circuit série simple est :</p><p>I = (E - E') / (r + r')</p><p>Application numérique :</p><p>I = (12 - 9) / (0,5 + 1,5) = 3 / 2 = <strong>1,5 A</strong>.</p><p>Le courant circulant dans le circuit est de 1,5 A.</p>"
        },
        {
          "question": "<p><strong>3.4 (0,75 pt)</strong> Calculer les tensions U aux bornes du générateur et U' aux bornes du moteur.</p>",
          "reponse": "<p>U = E - r·I = 12 - 0,5 × 1,5 = 12 - 0,75 = <strong>11,25 V</strong>.</p><p>U' = E' + r'·I = 9 + 1,5 × 1,5 = 9 + 2,25 = <strong>11,25 V</strong>.</p><p>Les deux tensions sont bien égales, comme il se doit pour des dipôles en série.</p>"
        },
        {
          "question": "<p><strong>3.5 (1,0 pt)</strong> Calculer la puissance électrique totale fournie par le générateur et les différentes puissances mises en jeu dans le moteur (puissance reçue, puissance utile mécanique, puissance dissipée par effet Joule).</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
