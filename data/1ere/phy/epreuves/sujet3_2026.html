<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = [
  {
    "intitule": "Définition et caractéristiques des récepteurs",
    "type": "ressource",
    "niveau": "easy",
    "enonce": {
      "texte": "<p>Un récepteur électrique est un dipôle qui reçoit de l'énergie électrique et la transforme en une autre forme d'énergie (mécanique, thermique, chimique, etc.).</p><p>Il est caractérisé par :</p><ul><li>Une <strong>force contre-électromotrice</strong> (f.c.é.m.) notée $E'$ (en volts), qui représente la partie de l'énergie électrique transformée en énergie utile.</li><li>Une <strong>résistance interne</strong> $r'$ (en ohms), qui rend compte des pertes par effet Joule.</li></ul><p>La loi d'Ohm pour un récepteur s'écrit : $U = E' + r'I$, où $U$ est la tension à ses bornes et $I$ l'intensité du courant qui le traverse.</p>",
      "images": []
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Un moteur électrique est alimenté sous une tension $U = 12\\text{ V}$. Il est parcouru par un courant d'intensité $I = 2\\text{ A}$. Sa force contre-électromotrice est $E' = 10\\text{ V}$.",
        "niveau": "medium",
        "reponse": "Voir sous-questions.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Calcule la résistance interne $r'$ du moteur.",
            "niveau": "medium",
            "reponse": "$r' = \\dfrac{U - E'}{I} = \\dfrac{12 - 10}{2} = 1\\ \\Omega$"
          },
          {
            "numero": "1.b",
            "texte": "Détermine la puissance électrique reçue par le moteur.",
            "niveau": "medium",
            "reponse": "$P = U \\times I = 12 \\times 2 = 24\\ \\text{W}$"
          },
          {
            "numero": "1.c",
            "texte": "Calcule la puissance utile (transformée en énergie mécanique) et la puissance dissipée par effet Joule.",
            "niveau": "medium",
            "reponse": "$P_{utile} = E' \\times I = 10 \\times 2 = 20\\ \\text{W}$ ; $P_{Joule} = r'I^2 = 1 \\times 2^2 = 4\\ \\text{W}$ (ou $P - P_{utile} = 24 - 20 = 4\\ \\text{W}$)"
          },
          {
            "numero": "1.d",
            "texte": "Déduis-en le rendement du moteur.",
            "niveau": "medium",
            "reponse": "$\\eta = \\dfrac{P_{utile}}{P} = \\dfrac{20}{24} \\approx 0,83$ soit $83\\%$"
          }
        ]
      }
    ]
  },
  {
    "intitule": "Caractéristique d'un récepteur",
    "type": "ressource",
    "niveau": "easy",
    "enonce": {
      "texte": "<p>La caractéristique $U = f(I)$ d'un récepteur est une droite d'équation $U = E' + r'I$.</p>",
      "images": [
        "Graphique représentant la caractéristique U = f(I) d'un récepteur : une droite croissante passant par (0, E') avec une pente r'."
      ]
    },
    "questions": [
      {
        "numero": 1,
        "texte": "On a tracé la caractéristique d'un récepteur. La droite coupe l'axe des ordonnées (U) à $U_0 = 6\\text{ V}$ et sa pente est $p = 0,5\\ \\text{V/A}$.",
        "niveau": "medium",
        "reponse": "Voir sous-questions.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Détermine la force contre-électromotrice $E'$ et la résistance interne $r'$ du récepteur.",
            "niveau": "easy",
            "reponse": "$E' = U_0 = 6\\ \\text{V}$ ; $r' = p = 0,5\\ \\Omega$"
          },
          {
            "numero": "1.b",
            "texte": "Écris l'équation de la caractéristique.",
            "niveau": "easy",
            "reponse": "$U = 6 + 0,5I$"
          }
        ]
      }
    ]
  },
  {
    "intitule": "Association de récepteurs en série",
    "type": "ressource",
    "niveau": "hard",
    "enonce": {
      "texte": "<p>On associe en série deux récepteurs :</p><ul><li>Récepteur 1 : $E'_1 = 4\\ \\text{V}$, $r'_1 = 2\\ \\Omega$</li><li>Récepteur 2 : $E'_2 = 6\\ \\text{V}$, $r'_2 = 3\\ \\Omega$</li></ul><p>L'ensemble est traversé par un courant d'intensité $I = 1,5\\ \\text{A}$.</p>",
      "images": [
        "Schéma de deux récepteurs en série (l'un à la suite de l'autre) avec les flèches de tension et de courant."
      ]
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Calcule la tension aux bornes de chaque récepteur et la tension totale aux bornes de l'association.",
        "niveau": "hard",
        "reponse": "Voir sous-questions.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Quelle est la tension aux bornes du récepteur 1 ?",
            "niveau": "hard",
            "reponse": "$U_1 = E'_1 + r'_1 I = 4 + 2 \\times 1,5 = 7\\ \\text{V}$"
          },
          {
            "numero": "1.b",
            "texte": "Quelle est la tension aux bornes du récepteur 2 ?",
            "niveau": "hard",
            "reponse": "$U_2 = E'_2 + r'_2 I = 6 + 3 \\times 1,5 = 10,5\\ \\text{V}$"
          },
          {
            "numero": "1.c",
            "texte": "Détermine la tension totale aux bornes de l'association.",
            "niveau": "hard",
            "reponse": "$U_{totale} = U_1 + U_2 = 7 + 10,5 = 17,5\\ \\text{V}$"
          },
          {
            "numero": "1.d",
            "texte": "Quelle est la force contre-électromotrice équivalente $E'_{eq}$ et la résistance interne équivalente $r'_{eq}$ de l'association ?",
            "niveau": "hard",
            "reponse": "$E'_{eq} = E'_1 + E'_2 = 4 + 6 = 10\\ \\text{V}$ ; $r'_{eq} = r'_1 + r'_2 = 2 + 3 = 5\\ \\Omega$"
          }
        ]
      }
    ]
  },
  {
    "intitule": "Application : Moteur de voiture électrique",
    "type": "competence",
    "niveau": "hard",
    "enonce": {
      "texte": "<p>Un moteur de voiture électrique est alimenté par une batterie délivrant une tension $U = 36\\ \\text{V}$. Le moteur a une force contre-électromotrice $E' = 32\\ \\text{V}$ et une résistance interne $r' = 0,5\\ \\Omega$.</p>",
      "images": []
    },
    "questions": [
      {
        "numero": 1,
        "texte": "Le moteur est parcouru par un courant d'intensité $I = 8\\ \\text{A}$.",
        "niveau": "hard",
        "reponse": "Voir sous-questions.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Calcule la tension aux bornes du moteur. Est-elle égale à la tension de la batterie ?",
            "niveau": "hard",
            "reponse": "$U_{moteur} = E' + r'I = 32 + 0,5 \\times 8 = 36\\ \\text{V}$. Oui, elle est égale à la tension de la batterie (le moteur est branché aux bornes de la batterie)."
          },
          {
            "numero": "1.b",
            "texte": "Calcule la puissance électrique fournie par la batterie.",
            "niveau": "hard",
            "reponse": "$P_{fournie} = U \\times I = 36 \\times 8 = 288\\ \\text{W}$"
          },
          {
            "numero": "1.c",
            "texte": "Calcule la puissance utile du moteur (puissance mécanique).",
            "niveau": "hard",
            "reponse": "$P_{utile} = E' \\times I = 32 \\times 8 = 256\\ \\text{W}$"
          },
          {
            "numero": "1.d",
            "texte": "Calcule la puissance dissipée par effet Joule dans le moteur.",
            "niveau": "hard",
            "reponse": "$P_{Joule} = r'I^2 = 0,5 \\times 8^2 = 32\\ \\text{W}$"
          },
          {
            "numero": "1.e",
            "texte": "Détermine le rendement du moteur.",
            "niveau": "hard",
            "reponse": "$\\eta = \\dfrac{P_{utile}}{P_{fournie}} = \\dfrac{256}{288} \\approx 0,889$ soit $88,9\\%$"
          }
        ]
      }
    ]
  },
  {
    "intitule": "Electrolyseur",
    "type": "competence",
    "niveau": "very hard",
    "enonce": {
      "texte": "<p>Un électrolyseur est un récepteur qui transforme l'énergie électrique en énergie chimique. Il est caractérisé par une force contre-électromotrice $E'$ (tension de décomposition) et une résistance interne $r'$.</p><p>Un électrolyseur est alimenté par un générateur de force électromotrice $E = 12\\ \\text{V}$ et de résistance interne $r = 1\\ \\Omega$. L'électrolyseur a pour caractéristiques $E' = 8\\ \\text{V}$ et $r' = 2\\ \\Omega$.</p>",
      "images": [
        "Schéma d'un circuit électrique simple composé d'un générateur (E, r) en série avec un électrolyseur (E', r')."
      ]
    },
    "questions": [
      {
        "numero": 1,
        "texte": "En appliquant la loi d'Ohm généralisée (loi de Pouillet), détermine l'intensité du courant dans le circuit.",
        "niveau": "very hard",
        "reponse": "Voir sous-questions.",
        "sousQuestions": [
          {
            "numero": "1.a",
            "texte": "Écris la relation entre la tension du générateur, la f.c.é.m. du récepteur et l'intensité.",
            "niveau": "very hard",
            "reponse": "$U = E' + (r' + r)I$"
          },
          {
            "numero": "1.b",
            "texte": "Calcule l'intensité $I$ du courant.",
            "niveau": "very hard",
            "reponse": "$U = E' + (r' + r)I \\Rightarrow 12 = 8 + (2 + 1)I \\Rightarrow 4 = 3I \\Rightarrow I = \\dfrac{4}{3} \\approx 1,33\\ \\text{A}$"
          },
          {
            "numero": "1.c",
            "texte": "Calcule la tension aux bornes de l'électrolyseur.",
            "niveau": "very hard",
            "reponse": "$U_{electrolyseur} = E' + r'I = 8 + 2 \\times \\dfrac{4}{3} = 8 + \\dfrac{8}{3} = \\dfrac{32}{3} \\approx 10,67\\ \\text{V}$"
          }
        ]
      }
    ]
  }
];

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
