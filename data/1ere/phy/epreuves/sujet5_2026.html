<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Première",
  "sequence": "Séquence 5 : Ondes et optique",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La lumière, de la source à l'œil",
      "points": "6 pts",
      "enonce": "<p>La compréhension de la lumière est essentielle en physique. Cet exercice explore sa nature, ses sources et son interaction avec la matière.</p><div class='math-block'><div class='math'>$$E = h \\cdot \\nu$$</div></div> <div class='math-block'><div class='math'>$$\\lambda_{max} \\cdot T = 2,898 \\times 10^{-3} \\, m \\cdot K$$</div></div>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (2 pts) Un objet est vu car il diffuse la lumière. Parmi les objets suivants, lequel peut être considéré comme une source <strong>primaire</strong> de lumière ? Justifiez.</p><ul><li>La Lune</li><li>Une feuille de papier</li><li>Le Soleil</li><li>Un miroir</li></ul>",
          "reponse": "<p>La bonne réponse est <strong>Le Soleil</strong>. Une source primaire de lumière produit sa propre lumière, contrairement aux sources secondaires qui ne font que diffuser ou réfléchir la lumière d'une source primaire [citation:4].</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (2 pts) Le spectre visible n'est qu'une petite partie du spectre électromagnétique. <br>a) Placez les couleurs de l'arc-en-ciel (rouge, bleu, vert, violet) dans l'ordre croissant de leur fréquence. <br>b) La lumière bleue a-t-elle une énergie plus grande ou plus petite que la lumière rouge ? Expliquez à l'aide de la relation de Planck (<span class='math-inline'>\\(E = h \\cdot \\nu\\)</span>).</p>",
          "reponse": "<p>a) L'ordre croissant des fréquences est : <strong>Rouge → Vert → Bleu → Violet</strong>. Le violet a la plus grande fréquence et la plus courte longueur d'onde.</p><p>b) L'énergie est proportionnelle à la fréquence (<span class='math-inline'>\\(E = h\\nu\\)</span>). La lumière bleue ayant une fréquence plus élevée que la lumière rouge, son énergie est <strong>plus grande</strong>.</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (2 pts) La loi de Wien (<span class='math-inline'>\\(\\lambda_{max} \\cdot T = 2,898 \\times 10^{-3}\\)</span> m·K) permet de relier la température d'une source et la longueur d'onde à laquelle elle émet le plus.</p><p>Une étoile lointaine émet un spectre dont le pic d'intensité se situe à <span class='math-inline'>\\(\\lambda_{max} = 290 \\, nm\\)</span>.</p><p>a) Exprimez <span class='math-inline'>\\(\\lambda_{max}\\)</span> en mètres. <br>b) Calculez la température de cette étoile en kelvins (K).</p>",
          "reponse": "<p>a) <span class='math-inline'>\\(\\lambda_{max} = 290 \\, nm = 290 \\times 10^{-9} \\, m = 2,90 \\times 10^{-7} \\, m\\)</span>.</p><p>b) D'après la loi de Wien : <span class='math-inline'>\\(T = \\dfrac{2,898 \\times 10^{-3}}{\\lambda_{max}}\\)</span>.</p><p>Application numérique : <span class='math-inline'>\\(T = \\dfrac{2,898 \\times 10^{-3}}{2,90 \\times 10^{-7}} \\approx 1,00 \\times 10^{4} \\, K\\)</span>.</p><p>La température de l'étoile est d'environ <strong>10 000 K</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'œil réduit et ses défauts",
      "points": "6 pts",
      "enonce": "<p>L'œil humain est un instrument d'optique remarquable. On le modélise souvent par un « œil réduit », constitué d'une lentille convergente (le cristallin) et d'un écran (la rétine).</p><div class='math-block'><div class='math'>$$\\dfrac{1}{\\overline{OA'}} - \\dfrac{1}{\\overline{OA}} = \\dfrac{1}{f'}$$</div></div>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1,5 pts) <br> a) Qu'est-ce que le phénomène d'accommodation ? <br>b) Pour un œil normal (emmétrope), où se trouve le punctum remotum (PR) ? Où se trouve le punctum proximum (PP) ?</p>",
          "reponse": "<p>a) L'accommodation est le processus par lequel l'œil modifie la vergence du cristallin (en le déformant) pour former une image nette d'un objet sur la rétine, quelle que soit sa distance.</p><p>b) Pour un œil emmétrope, le PR est à l'<strong>infini</strong> (vision sans accommodation). Le PP est à la distance minimale de vision distincte, soit environ <strong>25 cm</strong> pour un œil normal (accommodation maximale).</p>"
        },
        {
          "question": "<p><strong>2.2</strong> (3 pts) Un étudiant est myope. Son cristallin est trop convergent, ce qui fait que l'image d'un objet lointain se forme en avant de sa rétine. Sa distance focale au repos est <span class='math-inline'>\\(f' = 1,6 \\, cm\\)</span>. La distance entre le cristallin et la rétine est <span class='math-inline'>\\(\\overline{OA'} = 1,7 \\, cm\\)</span>.</p><p>a) Pour un objet à l'infini, où se forme son image ? Montrez par un calcul que l'image se forme bien avant la rétine.</p><p>b) Calculez la distance à laquelle se trouve son punctum remotum (PR).</p>",
          "reponse": "<p>a) Pour un objet à l'infini <span class='math-inline'>\\((\\overline{OA} = -\\infty)\\)</span>, la formule de conjugaison donne <span class='math-inline'>\\(\\dfrac{1}{\\overline{OA'}} = \\dfrac{1}{f'}\\)</span>, donc <span class='math-inline'>\\(\\overline{OA'} = f' = 1,6\\, cm\\)</span>. L'image se forme à 1,6 cm du cristallin, donc <strong>en avant</strong> de la rétine qui est à 1,7 cm.</p><p>b) Le PR est la distance de l'objet <span class='math-inline'>\\(\\overline{OA}\\)</span> pour laquelle l'image se forme sur la rétine (<span class='math-inline'>\\(\\overline{OA'} = 0,017\\, m\\)</span>).</p><p>Application numérique : <span class='math-inline'>\\(\\dfrac{1}{-\\overline{OA}} = \\dfrac{1}{f'} - \\dfrac{1}{\\overline{OA'}} = \\dfrac{1}{0,016} - \\dfrac{1}{0,017} \\approx 62,5 - 58,8 = 3,7 \\, m^{-1}\\)</span>.</p><p>Donc <span class='math-inline'>\\(\\overline{OA} = -\\dfrac{1}{3,7} \\approx -0,27\\, m\\)</span>. Son PR est à <strong>27 cm</strong> devant son œil.</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (1,5 pts) Quel type de lentille (convergente ou divergente) permet de corriger la myopie ? Justifiez votre réponse en expliquant son effet sur les rayons lumineux.</p>",
          "reponse": "<p>La myopie se corrige avec une lentille <strong>divergente</strong>. Cette lentille écarte les rayons lumineux avant qu'ils n'atteignent le cristallin. Ainsi, l'image formée par l'ensemble 'lentille divergente + œil' se déplace vers l'arrière et se forme précisément sur la rétine.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Instruments d'optique",
      "points": "8 pts",
      "enonce": "<p>Les instruments d'optique (loupe, microscope, lunette astronomique) sont des systèmes de lentilles qui aident l'œil à observer des objets petits ou lointains.</p><div class='math-block'><div class='math'>$$C = \\dfrac{1}{f'}$$</div></div>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (2 pts) Une loupe est une lentille convergente de distance focale <span class='math-inline'>\\(f' = 5,0\\, cm\\)</span>. Elle est utilisée pour observer un timbre.</p><p>a) Calculez la vergence <span class='math-inline'>\\(C\\)</span> de cette loupe en dioptries (<span class='math-inline'>\\(\\delta\\)</span>). <br>b) Où doit-on placer le timbre par rapport à la loupe pour observer une image agrandie et droite ?</p>",
          "reponse": "<p>a) <span class='math-inline'>\\(C = \\dfrac{1}{f'} = \\dfrac{1}{0,05} = 20 \\, \\delta\\)</span>.</p><p>b) Pour observer une image agrandie et droite à travers une loupe, l'objet doit être placé <strong>entre le foyer objet (F) et le centre optique (O)</strong> de la lentille (<span class='math-inline'>\\(\\overline{OA} < f'\\)</span>). L'image est alors virtuelle, agrandie et du même côté que l'objet.</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (3 pts) Un microscope est composé de deux lentilles convergentes : l'objectif et l'oculaire. <br>a) Quel est le rôle de l'objectif ? Quel est le rôle de l'oculaire ? <br>b) Expliquez brièvement pourquoi l'image finale observée à travers un microscope est renversée par rapport à l'objet.</p>",
          "reponse": "<p>a) L'<strong>objectif</strong> est une lentille de courte distance focale qui donne un <strong>premier agrandissement</strong> de l'objet en formant une image réelle et agrandie. L'<strong>oculaire</strong> fonctionne comme une loupe et donne un <strong>deuxième agrandissement</strong> de cette image en formant une image virtuelle que l'œil observe confortablement.</p><p>b) L'image est renversée car l'objectif produit une image réelle renversée de l'objet. L'oculaire agrandit cette image sans la redresser, l'image finale observée reste donc renversée par rapport à l'objet initial.</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (3 pts) La lunette astronomique et le télescope de Newton sont deux instruments utilisés pour observer les astres. <br>a) Citez une différence fondamentale dans leur constitution (type d'élément optique principal). <br>b) Quels sont les avantages d'un télescope à miroirs par rapport à une lunette à lentilles ?</p>",
          "reponse": "<p>a) La <strong>lunette astronomique</strong> utilise des <strong>lentilles</strong> (un objectif et un oculaire) pour former l'image. Le <strong>télescope de Newton</strong> utilise un <strong>miroir primaire concave</strong> pour capter et focaliser la lumière.</p><p>b) Les avantages du télescope à miroirs sont : <br>- <strong>Absence d'aberration chromatique</strong> : les miroirs ne dispersent pas la lumière comme les lentilles. <br>- <strong>Fabrication plus aisée</strong> : un grand miroir est plus facile à fabriquer et à supporter qu'une grande lentille. <br>- Les miroirs peuvent être très grands, permettant de collecter plus de lumière et d'observer des objets plus lointains [citation:4][citation:5].</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
