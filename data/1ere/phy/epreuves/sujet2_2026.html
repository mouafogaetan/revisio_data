<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Physique",
 "classe": "Première",
 "sequence": "Séquence 2",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Étude d'un corps en chute libre sur un plan incliné",
     "points": "4 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Un solide de masse <span style='font-style: italic;'>m</span> = 200 g glisse sans frottement sur un plan incliné d'un angle α = 30° par rapport à l'horizontale. Le solide part du point A avec une vitesse initiale nulle et arrive au point B après avoir parcouru une distance AB = 2 m. On prendra <span style='font-style: italic;'>g</span> = 10 m/s².</p><p><div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>Un schéma représentant un plan incliné avec l'angle α, le point A en haut et le point B en bas, ainsi que les forces appliquées (poids et réaction) serait utile.</div></p></div>",
     "questions": [
       {
         "question": "<p> Calculer le travail du poids <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>P</span>) lorsque le solide se déplace de A à B. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le travail du poids est donné par <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>P</span>) = <span style='font-style: italic;'>m</span> × <span style='font-style: italic;'>g</span> × (<span style='font-style: italic;'>h</span><sub>A</sub> − <span style='font-style: italic;'>h</span><sub>B</sub>). La dénivellation est <span style='font-style: italic;'>h</span> = <span style='font-style: italic;'>AB</span> × sin(α) = 2 × sin(30°) = 2 × 0,5 = 1 m. Donc <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>P</span>) = 0,2 × 10 × 1 = <strong>2 J</strong>.</p>"
       },
       {
         "question": "<p> En appliquant le théorème de l'énergie cinétique (TEC), calculer la vitesse du solide au point B. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le TEC s'écrit Δ<span style='font-style: italic;'>E</span><sub>c</sub> = <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>P</span>) + <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>R</span>). La réaction est perpendiculaire au mouvement, donc <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>R</span>) = 0. De plus, <span style='font-style: italic;'>v</span><sub>A</sub> = 0, donc Δ<span style='font-style: italic;'>E</span><sub>c</sub> = ½ × <span style='font-style: italic;'>m</span> × <span style='font-style: italic;'>v</span><sub>B</sub>². On a donc ½ × 0,2 × <span style='font-style: italic;'>v</span><sub>B</sub>² = 2 ⇒ <span style='font-style: italic;'>v</span><sub>B</sub>² = 20 ⇒ <span style='font-style: italic;'>v</span><sub>B</sub> = √20 ≈ <strong>4,47 m/s</strong>.</p>"
       },
       {
         "question": "<p> Si le solide glisse sur le même plan incliné, mais avec des frottements, l'énergie mécanique du système est-elle conservée ? Justifier votre réponse. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Non, l'énergie mécanique n'est pas conservée. La force de frottement étant une force non conservative, elle dissipe une partie de l'énergie sous forme de chaleur. La variation d'énergie mécanique est égale au travail des forces non conservatives : Δ<span style='font-style: italic;'>E</span><sub>m</sub> = <span style='font-style: italic;'>W</span>(<span style='font-weight: bold;'>f</span>) < 0.</p>"
       }
     ]
   },
   {
     "titre": "Étude d'une lentille convergente et de l'œil réduit",
     "points": "6 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p><strong>Partie A : Lentille convergente (3 pts)</strong></p><p>Une lentille mince convergente a pour distance focale <span style='font-style: italic;'>f'</span> = 10 cm. Un objet AB de hauteur 2 cm est placé perpendiculairement à l'axe optique, à 20 cm du centre optique O de la lentille.</p><p><strong>Partie B : L'œil réduit et la myopie (3 pts)</strong></p><p>L'œil d'un patient myope possède un punctum remotum (PR) situé à 1,5 m devant l'œil.</p></div>",
     "questions": [
       {
         "question": "<p><strong>Partie A - 1.</strong> Calculer la vergence <span style='font-style: italic;'>C</span> de cette lentille. (0,5 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> La vergence <span style='font-style: italic;'>C</span> = 1/<span style='font-style: italic;'>f'</span> = 1/0,10 = <strong>+10 δ</strong> (dioptries).</p>"
       },
       {
         "question": "<p><strong>Partie A - 2.</strong> En utilisant la formule de conjugaison de Descartes (1/OA' − 1/OA = 1/<span style='font-style: italic;'>f'</span>), calculer la position de l'image A'B'. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> OA = −20 cm = −0,20 m. On a 1/OA' − 1/(−0,20) = 1/0,10 ⇒ 1/OA' + 5 = 10 ⇒ 1/OA' = 5 ⇒ OA' = 0,20 m = <strong>+20 cm</strong>. L'image est réelle, renversée et se forme à 20 cm de la lentille.</p>"
       },
       {
         "question": "<p><strong>Partie A - 3.</strong> Calculer le grandissement γ et en déduire la taille de l'image A'B'. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> γ = OA'/OA = 0,20/(−0,20) = <strong>−1</strong>. Donc A'B' = γ × AB = −1 × 2 = <strong>−2 cm</strong>. L'image est de même taille que l'objet, renversée.</p>"
       },
       {
         "question": "<p><strong>Partie B - 1.</strong> Définir le punctum remotum (PR) d'un œil. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le punctum remotum est le point le plus éloigné de l'œil qui peut être vu nettement sans accommoder. Pour un œil emmétrope (normal), le PR est situé à l'infini.</p>"
       },
       {
         "question": "<p><strong>Partie B - 2.</strong> Expliquer pourquoi la myopie est corrigée par une lentille divergente. (2 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'œil myope est trop convergent : les rayons lumineux venant de l'infini convergent en avant de la rétine. Une lentille divergente placée devant l'œil diverge légèrement les rayons incidents, ce qui a pour effet de reculer l'image et de la faire coïncider avec la rétine. Ainsi, l'image d'un objet à l'infini se forme sur la rétine après correction.</p>"
       }
     ]
   },
   {
     "titre": "Modèle corpusculaire de la lumière et photon",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>On considère une lampe qui émet une lumière monochromatique de longueur d'onde λ = 600 nm dans le vide. La puissance de la lampe est P = 100 W. On donne : <span style='font-style: italic;'>h</span> = 6,63 × 10<sup>−34</sup> J·s, <span style='font-style: italic;'>c</span> = 3,0 × 10<sup>8</sup> m·s<sup>−1</sup>.</p></div>",
     "questions": [
       {
         "question": "<p> Calculer la fréquence <span style='font-style: italic;'>ν</span> de cette radiation lumineuse. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> <span style='font-style: italic;'>ν</span> = <span style='font-style: italic;'>c</span>/λ = 3,0 × 10<sup>8</sup> / (600 × 10<sup>−9</sup>) = <strong>5,0 × 10<sup>14</sup> Hz</strong>.</p>"
       },
       {
         "question": "<p> En déduire l'énergie <span style='font-style: italic;'>E</span> d'un photon de cette lumière, en Joules puis en électron-volts (eV). (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> <span style='font-style: italic;'>E</span> = <span style='font-style: italic;'>hν</span> = 6,63 × 10<sup>−34</sup> × 5,0 × 10<sup>14</sup> = <strong>3,315 × 10<sup>−19</sup> J</strong>. En eV : <span style='font-style: italic;'>E</span> = 3,315 × 10<sup>−19</sup> / (1,6 × 10<sup>−19</sup>) ≈ <strong>2,07 eV</strong>.</p>"
       },
       {
         "question": "<p> Calculer le nombre <span style='font-style: italic;'>N</span> de photons émis par cette lampe chaque seconde. (2 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> La puissance P = <span style='font-style: italic;'>N</span> × <span style='font-style: italic;'>E</span> (pour une émission de <span style='font-style: italic;'>N</span> photons par seconde). Donc <span style='font-style: italic;'>N</span> = P/<span style='font-style: italic;'>E</span> = 100 / (3,315 × 10<sup>−19</sup>) = <strong>3,02 × 10<sup>20</sup> photons/s</strong>.</p>"
       },
       {
         "question": "<p> Comment évolue l'énergie d'un photon si la fréquence de la lumière augmente ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'énergie d'un photon est directement proportionnelle à sa fréquence (<span style='font-style: italic;'>E</span> = <span style='font-style: italic;'>hν</span>). Plus la fréquence est élevée, plus l'énergie du photon est grande.</p>"
       }
     ]
   },
   {
     "titre": "Circuit électrique : générateur et récepteur",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>On réalise le circuit électrique suivant : un générateur de force électromotrice <span style='font-style: italic;'>E</span> = 24 V et de résistance interne <span style='font-style: italic;'>r</span> = 1 Ω alimente un moteur (récepteur) de force contre-électromotrice <span style='font-style: italic;'>E'</span> = 18 V et de résistance interne <span style='font-style: italic;'>r'</span> = 2 Ω.</p><p><div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>Un schéma représentant le générateur en série avec le moteur serait utile.</div></p></div>",
     "questions": [
       {
         "question": "<p> Écrire la loi d'Ohm pour le générateur et pour le récepteur (moteur). (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Pour le générateur : <span style='font-style: italic;'>U</span> = <span style='font-style: italic;'>E</span> − <span style='font-style: italic;'>r</span><span style='font-style: italic;'>I</span>. Pour le récepteur : <span style='font-style: italic;'>U</span> = <span style='font-style: italic;'>E'</span> + <span style='font-style: italic;'>r'</span><span style='font-style: italic;'>I</span>.</p>"
       },
       {
         "question": "<p> Calculer l'intensité <span style='font-style: italic;'>I</span> du courant dans le circuit. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> En régime permanent, la tension <span style='font-style: italic;'>U</span> est la même pour les deux dipôles. On a donc <span style='font-style: italic;'>E</span> − <span style='font-style: italic;'>r</span><span style='font-style: italic;'>I</span> = <span style='font-style: italic;'>E'</span> + <span style='font-style: italic;'>r'</span><span style='font-style: italic;'>I</span> ⇒ 24 − 1<span style='font-style: italic;'>I</span> = 18 + 2<span style='font-style: italic;'>I</span> ⇒ 6 = 3<span style='font-style: italic;'>I</span> ⇒ <span style='font-style: italic;'>I</span> = <strong>2 A</strong>.</p>"
       },
       {
         "question": "<p> Calculer la puissance totale fournie par le générateur, la puissance utile du moteur et la puissance dissipée par effet Joule dans le moteur. (2,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> La puissance totale fournie par le générateur est <span style='font-style: italic;'>P</span><sub>tot</sub> = <span style='font-style: italic;'>E</span> × <span style='font-style: italic;'>I</span> = 24 × 2 = <strong>48 W</strong>.<br>La puissance utile du moteur est <span style='font-style: italic;'>P</span><sub>u</sub> = <span style='font-style: italic;'>E'</span> × <span style='font-style: italic;'>I</span> = 18 × 2 = <strong>36 W</strong>.<br>La puissance dissipée par effet Joule dans le moteur est <span style='font-style: italic;'>P</span><sub>j</sub> = <span style='font-style: italic;'>r'</span> × <span style='font-style: italic;'>I</span>² = 2 × 2² = <strong>8 W</strong>.</p>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
