<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Première",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Caractéristique d'un récepteur",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un moteur électrique est monté dans un circuit. Sa force contre-électromotrice est \\(E' = 110\\,V\\) et sa résistance interne est \\(r' = 5\\,\\Omega\\).</p><p>Le moteur est traversé par un courant d'intensité \\(I = 2\\,A\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Calculer la tension \\(U\\) aux bornes du moteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>On utilise la loi d'Ohm pour un récepteur :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$U = E' + r' \\cdot I$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$U = 110 + 5 \\times 2 = 110 + 10 = 120\\,V$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Calculer la puissance électrique reçue par le moteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La puissance reçue est donnée par :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$P_{reçue} = U \\cdot I$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$P_{reçue} = 120 \\times 2 = 240\\,W$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Calculer la puissance utile du moteur (puissance convertie en énergie mécanique).</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La puissance utile est donnée par :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$P_{utile} = E' \\cdot I$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$P_{utile} = 110 \\times 2 = 220\\,W$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>4) Calculer la puissance perdue par effet Joule dans le moteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La puissance perdue par effet Joule est :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$P_{Joule} = r' \\cdot I^2$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$P_{Joule} = 5 \\times 2^2 = 5 \\times 4 = 20\\,W$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>5) En déduire le rendement de ce moteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Le rendement est le rapport entre la puissance utile et la puissance reçue :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$\\eta = \\frac{P_{utile}}{P_{reçue}}$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\eta = \\frac{220}{240} \\approx 0,917 = 91,7\\%$$</div></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Circuit avec générateur et récepteur",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un circuit électrique est constitué d'un générateur (de force électromotrice \\(E = 24\\,V\\) et de résistance interne \\(r = 2\\,\\Omega\\)) qui alimente un récepteur (de force contre-électromotrice \\(E' = 18\\,V\\) et de résistance interne \\(r' = 4\\,\\Omega\\)).</p><p>Le circuit est fermé par un fil de connexion de résistance négligeable.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Faire un schéma du circuit en indiquant le sens du courant et les polarités des dipôles.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><div style='background-color: #f0f3f4; padding: 15px; border-radius: 8px; text-align: center;'><span style='font-size: 1.1em; font-weight: bold;'>Générateur (E, r) ——— (E', r') Récepteur</span><br><span style='font-size: 0.9em;'>Le courant circule du pôle + du générateur vers le récepteur.</span></div><p style='margin-top: 10px;'>La flèche de la tension \\(U\\) aux bornes du générateur est opposée au courant, tandis que celle du récepteur est dans le sens du courant.</p></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Calculer l'intensité du courant dans le circuit en utilisant la loi de Pouillet.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La loi de Pouillet pour un circuit série s'écrit :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$I = \\frac{E - E'}{r + r'}$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$I = \\frac{24 - 18}{2 + 4} = \\frac{6}{6} = 1\\,A$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Calculer la tension aux bornes du générateur et du récepteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Pour le générateur :</strong></p><div class='math-block' style='background-color: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 5px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$U_G = E - r \\cdot I = 24 - 2 \\times 1 = 22\\,V$$</div></div><p><strong>Pour le récepteur :</strong></p><div class='math-block' style='background-color: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 5px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$U_R = E' + r' \\cdot I = 18 + 4 \\times 1 = 22\\,V$$</div></div><p>On retrouve bien l'égalité des tensions car les dipôles sont en série.</p></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>4) Faire le bilan des puissances dans ce circuit.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Pour le générateur :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Puissance fournie : \\(P_{fournie} = E \\cdot I = 24 \\times 1 = 24\\,W\\)</li><li>Puissance perdue par effet Joule : \\(P_{Joule} = r \\cdot I^2 = 2 \\times 1^2 = 2\\,W\\)</li><li>Puissance utile : \\(P_{utile} = U_G \\cdot I = 22 \\times 1 = 22\\,W\\)</li></ul><p><strong>Pour le récepteur :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Puissance reçue : \\(P_{reçue} = U_R \\cdot I = 22 \\times 1 = 22\\,W\\)</li><li>Puissance utile : \\(P_{utile} = E' \\cdot I = 18 \\times 1 = 18\\,W\\)</li><li>Puissance perdue par effet Joule : \\(P_{Joule} = r' \\cdot I^2 = 4 \\times 1^2 = 4\\,W\\)</li></ul><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Vérification :</strong> La puissance fournie par le générateur (24 W) est égale à la somme des pertes par effet Joule (2 W + 4 W = 6 W) et de la puissance utile du récepteur (18 W).</p></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Point de fonctionnement",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>On considère le circuit suivant composé d'un générateur de caractéristique \\(U = 20 - 2I\\) et d'un récepteur de caractéristique \\(U = 5 + 3I\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Déterminer la force électromotrice \\(E\\) et la résistance interne \\(r\\) du générateur, ainsi que la force contre-électromotrice \\(E'\\) et la résistance interne \\(r'\\) du récepteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Pour le générateur :</strong> \\(U = E - rI = 20 - 2I\\)</p><ul style='list-style-type: disc; color: #333;'><li>\\(E = 20\\,V\\)</li><li>\\(r = 2\\,\\Omega\\)</li></ul><p><strong>Pour le récepteur :</strong> \\(U = E' + r'I = 5 + 3I\\)</p><ul style='list-style-type: disc; color: #333;'><li>\\(E' = 5\\,V\\)</li><li>\\(r' = 3\\,\\Omega\\)</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Déterminer le point de fonctionnement du circuit : l'intensité \\(I\\) et la tension \\(U\\) communes.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Au point de fonctionnement, les tensions sont égales :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$20 - 2I = 5 + 3I$$</div></div><p>Résolution :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$20 - 5 = 3I + 2I \\Rightarrow 15 = 5I \\Rightarrow I = 3\\,A$$</div></div><p>Calcul de la tension :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$U = 20 - 2 \\times 3 = 20 - 6 = 14\\,V$$</div></div><p>Le point de fonctionnement est donc \\(I = 3\\,A\\) et \\(U = 14\\,V\\).</p></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Calculer la puissance fournie par le générateur et la puissance reçue par le récepteur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Puissance fournie par le générateur :</strong></p><div class='math-block' style='background-color: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 5px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$P_G = E \\cdot I = 20 \\times 3 = 60\\,W$$</div></div><p><strong>Puissance reçue par le récepteur :</strong></p><div class='math-block' style='background-color: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 5px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$P_R = U \\cdot I = 14 \\times 3 = 42\\,W$$</div></div><p>La différence \\(60 - 42 = 18\\,W\\) correspond à la somme des pertes par effet Joule dans les deux dipôles.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Rendement d'un récepteur",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un électrolyseur est alimenté par une tension \\(U = 12\\,V\\).</p><p>Sa force contre-électromotrice est \\(E' = 9\\,V\\) et sa résistance interne est \\(r' = 0,5\\,\\Omega\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Calculer l'intensité du courant qui traverse l'électrolyseur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>On utilise la loi d'Ohm pour un récepteur :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$U = E' + r' \\cdot I$$</div></div><p>On isole \\(I\\) :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$I = \\frac{U - E'}{r'} = \\frac{12 - 9}{0,5} = \\frac{3}{0,5} = 6\\,A$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Calculer la puissance utile (chimique) et la puissance perdue par effet Joule.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Puissance utile (chimique) :</strong></p><div class='math-block' style='background-color: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 5px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$P_{utile} = E' \\cdot I = 9 \\times 6 = 54\\,W$$</div></div><p><strong>Puissance perdue par effet Joule :</strong></p><div class='math-block' style='background-color: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 5px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$P_{Joule} = r' \\cdot I^2 = 0,5 \\times 6^2 = 0,5 \\times 36 = 18\\,W$$</div></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Calculer le rendement de l'électrolyseur.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Le rendement est :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$\\eta = \\frac{P_{utile}}{P_{reçue}}$$</div></div><p>Avec \\(P_{reçue} = U \\cdot I = 12 \\times 6 = 72\\,W\\).</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\eta = \\frac{54}{72} = 0,75 = 75\\%$$</div></div></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
