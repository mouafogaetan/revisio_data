<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue au Chapitre 8",
    "contenu": "<div style='display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; text-align: center;'>   <h1 style='font-size: 2.5rem; margin-bottom: 1rem;'>🔭 Chapitre 8</h1>   <h2 style='font-size: 1.8rem; color: #2c3e50;'>Instruments d'optique</h2>   <p style='font-size: 1.2rem; margin-top: 2rem; max-width: 600px;'>Découvrons le télescope de Newton, un instrument révolutionnaire qui a changé notre vision de l'Univers.</p>   <p style='font-size: 1rem; margin-top: 1rem; font-style: italic;'>Leçon 19 : Le télescope de Newton</p> </div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons explorer un instrument d'optique fascinant : le télescope de Newton. Inventé par le célèbre physicien Isaac Newton au 17e siècle, cet instrument utilise des miroirs plutôt que des lentilles pour observer les astres. Nous allons comprendre son fonctionnement, son schéma et pourquoi il présente des avantages par rapport aux télescopes à lentilles. Préparez-vous à voyager dans l'Univers !",
    "note": "Introduction au télescope de Newton. Contextualisation historique."
  },
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='background-color: #f8f9fa; padding: 1.5rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);'>   <h3 style='color: #2980b9; text-align: center;'>À la fin de cette leçon, vous serez capables de :</h3>   <ul style='list-style-type: none; padding: 0;'>     <li style='padding: 10px 0; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 15px;'>       <span style='font-size: 1.5rem;'>🎯</span>       <span style='font-size: 1.1rem;'>Décrire et schématiser un télescope de Newton (miroir primaire, miroir secondaire).</span>     </li>     <li style='padding: 10px 0; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 15px;'>       <span style='font-size: 1.5rem;'>🎯</span>       <span style='font-size: 1.1rem;'>Expliquer son principe de fonctionnement.</span>     </li>     <li style='padding: 10px 0; display: flex; align-items: center; gap: 15px;'>       <span style='font-size: 1.5rem;'>🎯</span>       <span style='font-size: 1.1rem;'>Comprendre son intérêt par rapport aux instruments à lentilles.</span>     </li>   </ul> </div>",
    "texteParle": "Voici les objectifs de cette leçon. Nous allons apprendre à décrire et à schématiser un télescope de Newton en identifiant ses deux miroirs principaux. Nous comprendrons comment il fonctionne en utilisant la réflexion de la lumière. Enfin, nous verrons pourquoi cet instrument est préféré aux télescopes à lentilles pour l'observation astronomique.",
    "note": "Présentation des objectifs d'apprentissage."
  },
  {
    "titre": "Pourquoi un télescope à miroirs ?",
    "contenu": "<div>   <div style='background-color: #eaf2f8; padding: 1.5rem; border-radius: 15px; border-left: 6px solid #2980b9;'>     <h3 style='margin-top: 0; color: #1a5276;'>Les limites des télescopes à lentilles</h3>     <ul style='list-style-type: none; padding: 0;'>       <li style='padding: 8px 0; display: flex; gap: 10px;'>         <span style='color: #e74c3c; font-size: 1.2rem;'>❌</span>         <span><strong>L'aberration chromatique :</strong> les lentilles décomposent la lumière blanche en couleurs, ce qui crée des images floues et colorées sur les bords.</span>       </li>       <li style='padding: 8px 0; display: flex; gap: 10px;'>         <span style='color: #e74c3c; font-size: 1.2rem;'>❌</span>         <span><strong>Les grandes lentilles sont lourdes :</strong> elles se déforment sous leur propre poids, ce qui limite leur taille.</span>       </li>       <li style='padding: 8px 0; display: flex; gap: 10px;'>         <span style='color: #e74c3c; font-size: 1.2rem;'>❌</span>         <span><strong>La fabrication :</strong> il est difficile de fabriquer de grandes lentilles parfaitement homogènes sans défauts.</span>       </li>     </ul>   </div>   <div style='background-color: #d5f5e3; padding: 1rem; border-radius: 10px; margin-top: 1rem; border-left: 6px solid #27ae60;'>     <p style='margin: 0; font-size: 1rem;'>✅ <strong>Solution de Newton :</strong> utiliser des miroirs qui ne souffrent pas d'aberration chromatique et qui peuvent être fabriqués en très grand format.</p>   </div> </div>",
    "texteParle": "Avant de découvrir le télescope de Newton, comprenons pourquoi il a été inventé. Les télescopes à lentilles, ou réfracteurs, présentaient plusieurs problèmes. D'abord, l'aberration chromatique : les lentilles décomposent la lumière en couleurs, ce qui donne des images floues. Ensuite, les grandes lentilles sont très lourdes et se déforment. Enfin, il est difficile de fabriquer de grandes lentilles parfaites. Newton a eu l'idée géniale de remplacer les lentilles par des miroirs pour résoudre ces problèmes.",
    "note": "Explication des limites des télescopes à lentilles."
  },
  {
    "titre": "Le schéma du télescope de Newton",
    "contenu": "<div style='text-align: center;'>   <svg viewBox='0 0 450 300' style='width: 100%; max-width: 450px; height: auto; background-color: #fdfcfb; border-radius: 15px; padding: 10px;'>     <!-- Tube -->     <rect x='30' y='80' width='380' height='120' fill='#d5d8dc' stroke='#2c3e50' stroke-width='2' rx='5' />     <!-- Miroir primaire (concave) -->     <path d='M 30 100 Q 220 60 30 180' fill='#b3d9ff' stroke='#2980b9' stroke-width='3' />     <text x='45' y='210' font-size='12' font-weight='bold' fill='#2980b9'>Miroir primaire</text>     <!-- Miroir secondaire (plan) -->     <line x1='220' y1='95' x2='220' y2='185' stroke='#e67e22' stroke-width='4' />     <text x='225' y='105' font-size='12' font-weight='bold' fill='#e67e22'>Miroir secondaire</text>     <!-- Rayons lumineux incidents -->     <line x1='10' y1='50' x2='30' y2='100' stroke='#f1c40f' stroke-width='2' stroke-dasharray='5,3' />     <line x1='10' y1='120' x2='30' y2='140' stroke='#f1c40f' stroke-width='2' stroke-dasharray='5,3' />     <!-- Rayons réfléchis par le miroir primaire -->     <line x1='30' y1='100' x2='220' y2='120' stroke='#e74c3c' stroke-width='2' />     <line x1='30' y1='140' x2='220' y2='130' stroke='#e74c3c' stroke-width='2' />     <!-- Rayons réfléchis par le miroir secondaire -->     <line x1='220' y1='120' x2='380' y2='140' stroke='#27ae60' stroke-width='2' />     <line x1='220' y1='130' x2='380' y2='120' stroke='#27ae60' stroke-width='2' />     <!-- Oculaire -->     <ellipse cx='390' cy='130' rx='15' ry='40' fill='#f9e79f' stroke='#d4ac0d' stroke-width='2' />     <text x='395' y='115' font-size='10' font-weight='bold' fill='#7d6608'>Oculaire</text>     <!-- Légende -->     <text x='30' y='260' font-size='10' fill='#666'>🔵 Miroir primaire concave</text>     <text x='30' y='275' font-size='10' fill='#666'>🟠 Miroir secondaire plan</text>     <text x='30' y='290' font-size='10' fill='#666'>🟡 Rayons incidents</text>     <text x='200' y='260' font-size='10' fill='#666'>🔴 Réflexion primaire</text>     <text x='200' y='275' font-size='10' fill='#666'>🟢 Réflexion secondaire</text>   </svg>   <p style='margin-top: 0.5rem; font-size: 0.9rem; color: #555;'>Figure 1 : Schéma du télescope de Newton.</p> </div>",
    "texteParle": "Voici le schéma du télescope de Newton. Il est constitué d'un tube à l'intérieur duquel se trouvent deux miroirs. Le grand miroir, appelé miroir primaire, est concave. Il capte la lumière et la réfléchit vers un petit miroir plan, le miroir secondaire, placé à 45 degrés. Ce dernier renvoie la lumière sur le côté, où se trouve l'oculaire. C'est en regardant dans cet oculaire que l'astronome observe l'image.",
    "note": "Schéma interactif illustrant le télescope de Newton."
  },
  {
    "titre": "Les éléments du télescope",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 1.2rem;'>   <div style='background-color: #eaf2f8; padding: 1rem; border-radius: 10px; border-left: 6px solid #2980b9;'>     <h4 style='margin: 0 0 0.5rem 0; color: #1a5276;'>🔵 Miroir primaire</h4>     <p style='margin: 0;'>C'est un <strong>miroir concave</strong> de grande taille. Il collecte un maximum de lumière provenant des astres lointains. Plus il est grand, plus le télescope est puissant.</p>   </div>   <div style='background-color: #fdebd0; padding: 1rem; border-radius: 10px; border-left: 6px solid #e67e22;'>     <h4 style='margin: 0 0 0.5rem 0; color: #a04000;'>🟠 Miroir secondaire</h4>     <p style='margin: 0;'>C'est un <strong>miroir plan</strong> placé à 45° par rapport à l'axe du tube. Il dévie les rayons lumineux vers l'oculaire situé sur le côté du tube.</p>   </div>   <div style='background-color: #d5f5e3; padding: 1rem; border-radius: 10px; border-left: 6px solid #27ae60;'>     <h4 style='margin: 0 0 0.5rem 0; color: #1a7a3a;'>🔍 Oculaire</h4>     <p style='margin: 0;'>C'est une <strong>lentille convergente</strong> qui permet d'observer l'image formée par les miroirs. C'est par lui que l'œil voit l'astre agrandi.</p>   </div> </div>",
    "texteParle": "Le télescope de Newton est composé de trois éléments essentiels. Le premier est le miroir primaire, un grand miroir concave qui capte la lumière. C'est le cœur du télescope. Plus il est grand, plus le télescope collecte de lumière. Le deuxième est le miroir secondaire, un petit miroir plan incliné à 45 degrés qui renvoie la lumière sur le côté. Enfin, l'oculaire est une lentille à travers laquelle on observe l'image. Ces trois éléments travaillent en harmonie.",
    "note": "Description des composants du télescope."
  },
  {
    "titre": "Le principe de fonctionnement",
    "contenu": "<div style='background-color: #f0f3f4; padding: 1.5rem; border-radius: 15px;'>   <h3 style='margin-top: 0; color: #2c3e50; text-align: center;'>Comment ça marche ?</h3>   <div style='display: flex; flex-direction: column; gap: 1rem;'>     <div style='background-color: white; padding: 1rem; border-radius: 10px; display: flex; align-items: center; gap: 15px;'>       <span style='background-color: #2980b9; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>1</span>       <span>La lumière provenant d'un astre entre dans le tube du télescope.</span>     </div>     <div style='background-color: white; padding: 1rem; border-radius: 10px; display: flex; align-items: center; gap: 15px;'>       <span style='background-color: #2980b9; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>2</span>       <span>Le <strong>miroir primaire concave</strong> réfléchit et concentre la lumière vers le foyer situé au milieu du tube.</span>     </div>     <div style='background-color: white; padding: 1rem; border-radius: 10px; display: flex; align-items: center; gap: 15px;'>       <span style='background-color: #2980b9; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>3</span>       <span>Le <strong>miroir secondaire plan</strong>, placé à 45°, dévie les rayons sur le côté du tube.</span>     </div>     <div style='background-color: white; padding: 1rem; border-radius: 10px; display: flex; align-items: center; gap: 15px;'>       <span style='background-color: #2980b9; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>4</span>       <span>L'image est agrandie par l'<strong>oculaire</strong> et observée par l'œil.</span>     </div>   </div>   <div style='background-color: #fef9e7; padding: 0.8rem; border-radius: 8px; margin-top: 1rem; border: 1px solid #f1c40f;'>     <p style='margin: 0; font-size: 0.95rem;'>💡 La lumière est réfléchie deux fois avant d'atteindre l'œil : une fois par le miroir primaire, une fois par le miroir secondaire.</p>   </div> </div>",
    "texteParle": "Le fonctionnement du télescope de Newton est élégant et simple. La lumière venant d'une étoile entre dans le tube. Le grand miroir concave capte cette lumière et la réfléchit vers un point focal au milieu du tube. Mais avant que la lumière n'atteigne ce foyer, elle est interceptée par un petit miroir plan incliné à 45 degrés, qui la dévie sur le côté. L'image ainsi formée est ensuite agrandie par l'oculaire que l'observateur regarde. C'est grâce à ce système que nous pouvons voir des astres très lointains.",
    "note": "Explication étape par étape du fonctionnement."
  },
  {
    "titre": "Les avantages du télescope à miroirs",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 1rem;'>   <div style='background-color: #d5f5e3; padding: 1.2rem; border-radius: 10px; display: flex; align-items: flex-start; gap: 15px;'>     <span style='font-size: 2rem;'>✅</span>     <div>       <h4 style='margin: 0; color: #1a7a3a;'>Pas d'aberration chromatique</h4>       <p style='margin: 0.3rem 0 0 0;'>Les miroirs réfléchissent toutes les couleurs de la même manière. L'image est nette et sans défauts de couleur.</p>     </div>   </div>   <div style='background-color: #d5f5e3; padding: 1.2rem; border-radius: 10px; display: flex; align-items: flex-start; gap: 15px;'>     <span style='font-size: 2rem;'>✅</span>     <div>       <h4 style='margin: 0; color: #1a7a3a;'>Miroirs plus légers et plus grands</h4>       <p style='margin: 0.3rem 0 0 0;'>On peut fabriquer des miroirs de très grande taille, jusqu'à plusieurs mètres de diamètre, pour collecter plus de lumière.</p>     </div>   </div>   <div style='background-color: #d5f5e3; padding: 1.2rem; border-radius: 10px; display: flex; align-items: flex-start; gap: 15px;'>     <span style='font-size: 2rem;'>✅</span>     <div>       <h4 style='margin: 0; color: #1a7a3a;'>Fabrication plus facile</h4>       <p style='margin: 0.3rem 0 0 0;'>Un miroir n'a besoin d'être poli que sur une seule face, contrairement à une lentille qui doit être parfaite sur les deux faces.</p>     </div>   </div> </div>",
    "texteParle": "Le télescope de Newton présente de nombreux avantages. Le plus important est l'absence d'aberration chromatique : comme les miroirs réfléchissent toutes les couleurs de la même façon, l'image est nette et sans franges colorées. Ensuite, on peut fabriquer des miroirs beaucoup plus grands que les lentilles, car ils sont plus légers et moins chers. Cela permet de collecter plus de lumière et d'observer des astres plus lointains. C'est pour toutes ces raisons que les télescopes modernes utilisent des miroirs.",
    "note": "Présentation des avantages des télescopes à miroirs."
  },
  {
    "titre": "Télescope de Newton vs Réfracteur",
    "contenu": "<div style='overflow-x: auto;'>   <table style='width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 300px;'>     <thead>       <tr style='background-color: #2c3e50; color: white;'>         <th style='padding: 10px; border: 1px solid #ddd;'>Caractéristique</th>         <th style='padding: 10px; border: 1px solid #ddd;'>Newton (Réflecteur)</th>         <th style='padding: 10px; border: 1px solid #ddd;'>Réfracteur (Lentilles)</th>       </tr>     </thead>     <tbody>       <tr style='background-color: #f8f9fa;'>         <td style='padding: 8px; border: 1px solid #ddd; font-weight: bold;'>Élément principal</td>         <td style='padding: 8px; border: 1px solid #ddd;'>Miroir concave</td>         <td style='padding: 8px; border: 1px solid #ddd;'>Lentille convergente</td>       </tr>       <tr>         <td style='padding: 8px; border: 1px solid #ddd; font-weight: bold;'>Aberration chromatique</td>         <td style='padding: 8px; border: 1px solid #ddd; color: #27ae60;'>Absente ✅</td>         <td style='padding: 8px; border: 1px solid #ddd; color: #e74c3c;'>Présente ❌</td>       </tr>       <tr style='background-color: #f8f9fa;'>         <td style='padding: 8px; border: 1px solid #ddd; font-weight: bold;'>Taille maximale</td>         <td style='padding: 8px; border: 1px solid #ddd; color: #27ae60;'>Très grande (plusieurs mètres) ✅</td>         <td style='padding: 8px; border: 1px solid #ddd; color: #e74c3c;'>Limitée (1 mètre max) ❌</td>       </tr>       <tr>         <td style='padding: 8px; border: 1px solid #ddd; font-weight: bold;'>Coût</td>         <td style='padding: 8px; border: 1px solid #ddd; color: #27ae60;'>Plus économique ✅</td>         <td style='padding: 8px; border: 1px solid #ddd; color: #e74c3c;'>Très coûteux ❌</td>       </tr>     </tbody>   </table> </div> <div style='background-color: #fef9e7; padding: 0.8rem; border-radius: 8px; margin-top: 1rem; border: 1px solid #f1c40f;'>   <p style='margin: 0; font-size: 0.95rem;'>📌 Les télescopes modernes comme le JWST (James Webb) utilisent des miroirs, héritiers du concept de Newton.</p> </div>",
    "texteParle": "Comparons le télescope de Newton avec un télescope classique à lentilles. Le télescope de Newton utilise un miroir, l'autre utilise une lentille. Le miroir ne produit pas d'aberration chromatique, alors que la lentille en produit. Le miroir peut être fabriqué en très grande taille, ce qui est impossible pour une lentille. Enfin, le coût de fabrication d'un miroir est bien inférieur. C'est pour ces raisons que tous les grands télescopes modernes sont des télescopes à miroirs.",
    "note": "Tableau comparatif entre télescope à miroirs et à lentilles."
  },
  {
    "titre": "Application : Le télescope James Webb",
    "contenu": "<div style='background-color: #eaf2f8; padding: 1.5rem; border-radius: 15px;'>   <h3 style='color: #1a5276; text-align: center;'>🌌 Un héritier de Newton</h3>   <div style='display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;'>     <div style='flex: 1 1 200px; background-color: white; padding: 1rem; border-radius: 10px; text-align: center;'>       <span style='font-size: 3rem;'>🛰️</span>       <h4 style='margin: 0.5rem 0;'>Télescope James Webb</h4>       <p style='font-size: 0.9rem;'>Le plus grand télescope spatial, avec un miroir de 6,5 mètres de diamètre.</p>     </div>     <div style='flex: 1 1 200px; background-color: white; padding: 1rem; border-radius: 10px; text-align: center;'>       <span style='font-size: 3rem;'>🔭</span>       <h4 style='margin: 0.5rem 0;'>Miroirs en miroir</h4>       <p style='font-size: 0.9rem;'>Il utilise 18 miroirs hexagonaux qui s'assemblent pour former un grand miroir, comme Newton l'avait imaginé.</p>     </div>     <div style='flex: 1 1 200px; background-color: white; padding: 1rem; border-radius: 10px; text-align: center;'>       <span style='font-size: 3rem;'>✨</span>       <h4 style='margin: 0.5rem 0;'>Images exceptionnelles</h4>       <p style='font-size: 0.9rem;'>Il observe les galaxies les plus lointaines, grâce à la puissance de ses miroirs.</p>     </div>   </div>   <div style='background-color: #fef9e7; padding: 0.8rem; border-radius: 8px; margin-top: 1rem; border: 1px solid #f1c40f;'>     <p style='margin: 0; font-size: 0.95rem;'>💡 Le télescope James Webb est le successeur moderne du télescope de Newton, utilisant le même principe optique.</p>   </div> </div>",
    "texteParle": "Pour illustrer l'importance du télescope de Newton, regardons un de ses héritiers modernes : le télescope spatial James Webb. Lancé en 2021, il est le plus grand télescope spatial jamais construit, avec un miroir de 6,5 mètres de diamètre. Ce miroir est composé de 18 petits miroirs hexagonaux qui s'assemblent pour former un seul grand miroir. C'est exactement le même principe que le télescope de Newton : un grand miroir qui collecte la lumière des étoiles lointaines.",
    "note": "Exemple concret d'application moderne du principe de Newton."
  },
  {
    "titre": "À retenir sur le télescope de Newton",
    "contenu": "<div style='background: linear-gradient(145deg, #1a5276, #2c3e50); color: white; padding: 1.5rem; border-radius: 15px;'>   <h3 style='text-align: center; margin-top: 0;'>📌 Les 4 points essentiels</h3>   <ul style='list-style-type: none; padding: 0;'>     <li style='padding: 10px 0; border-bottom: 1px solid #5d6d7e; display: flex; gap: 15px; align-items: flex-start;'>       <span style='background-color: #f39c12; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>1</span>       <span>Le télescope de Newton utilise un <strong>miroir primaire concave</strong> et un <strong>miroir secondaire plan</strong>.</span>     </li>     <li style='padding: 10px 0; border-bottom: 1px solid #5d6d7e; display: flex; gap: 15px; align-items: flex-start;'>       <span style='background-color: #f39c12; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>2</span>       <span>La lumière est <strong>réfléchie deux fois</strong> avant d'atteindre l'oculaire.</span>     </li>     <li style='padding: 10px 0; border-bottom: 1px solid #5d6d7e; display: flex; gap: 15px; align-items: flex-start;'>       <span style='background-color: #f39c12; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>3</span>       <span>Il n'a pas d'<strong>aberration chromatique</strong> et peut être fabriqué en très grande taille.</span>     </li>     <li style='padding: 10px 0; display: flex; gap: 15px; align-items: flex-start;'>       <span style='background-color: #f39c12; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0;'>4</span>       <span>Il est à l'origine de tous les <strong>grands télescopes modernes</strong> (comme le James Webb).</span>     </li>   </ul> </div>",
    "texteParle": "Retenons les points essentiels de cette leçon. Le télescope de Newton est un instrument à miroirs composé d'un miroir primaire concave et d'un miroir secondaire plan. La lumière est réfléchie deux fois avant d'être observée. Il présente des avantages majeurs : pas d'aberration chromatique et possibilité de grandes tailles. C'est le modèle qui a inspiré tous les grands télescopes modernes, y compris le célèbre James Webb.",
    "note": "Synthèse des points clés de la leçon."
  },
  {
    "titre": "À vous de jouer !",
    "contenu": "<div style='text-align: center;'>   <h3>🧐 Testez vos connaissances</h3>   <div style='background-color: #f0f3f4; padding: 1.5rem; border-radius: 15px; max-width: 450px; margin: 1rem auto;'>     <div style='background-color: white; padding: 1rem; border-radius: 10px;'>       <p style='font-weight: bold;'>Pourquoi utilise-t-on des miroirs plutôt que des lentilles dans les grands télescopes modernes ?</p>     </div>     <div style='display: flex; flex-direction: column; gap: 0.6rem; margin: 1rem 0;'>       <button onclick=\"document.getElementById('reponse-exo').innerHTML = '✅ Les miroirs n\\'ont pas d\\'aberration chromatique, sont plus légers, peuvent être très grands, et sont moins chers à fabriquer.'; document.getElementById('reponse-exo').style.display='block';\" style='background-color: #2980b9; color: white; padding: 0.8rem; border: none; border-radius: 8px; cursor: pointer;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
