<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Español",
  "classe": "Première",
  "sequence": "Secuencia 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Ejercicio 1 : Comprensión escrita - Los peligros de la desinformación (5 puntos)",
      "points": "5 pts",
      "enonce": "<p>Lee el siguiente texto y responde a las preguntas:</p><div style='background-color:#f5f5f5; color:#000000; border-radius:8px; padding:15px; margin:15px 0;'><p><strong>El poder de las redes sociales</strong></p><p>Las redes sociales se han convertido en el principal medio de comunicación para los jóvenes. Sin embargo, el uso irresponsable de estas herramientas puede tener consecuencias graves. La difusión de noticias falsas, los discursos de odio y el acoso cibernético son algunos de los peligros que enfrentan los usuarios.</p><p>Los expertos recomiendan verificar siempre la fuente de la información antes de compartirla. «En la era digital, todos tenemos la responsabilidad de ser ciudadanos críticos», afirma el periodista Andrés López. Además, es fundamental proteger la privacidad y pensar antes de publicar cualquier contenido.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Comprensión (2 pts)</strong></p><p>a) ¿Cuáles son los peligros de las redes sociales mencionados en el texto? (0.5 pt)</p><p>b) ¿Qué recomiendan los expertos? (0.5 pt)</p><p>c) ¿Qué responsabilidad tenemos los ciudadanos en la era digital? (1 pt)</p>",
          "reponse": "<p>a) Los peligros mencionados son: la difusión de noticias falsas, los discursos de odio y el acoso cibernético.</p><p>b) Recomiendan verificar siempre la fuente de la información y proteger la privacidad.</p><p>c) Tenemos la responsabilidad de ser ciudadanos críticos y pensar antes de publicar cualquier contenido.</p>"
        },
        {
          "question": "<p><strong>2. Vocabulario (1 pt)</strong></p><p>Encuentra en el texto un sinónimo de:</p><p>a) Peligros (0.5 pt)</p><p>b) Examinar (0.5 pt)</p>",
          "reponse": "<p>a) Peligros → Amenazas / Riesgos (no aparece en el texto, pero se sobreentiende). En el texto se menciona la palabra "Peligros" directamente.</p><p>b) Examinar → Verificar (aparece en el texto).</p>"
        },
        {
          "question": "<p><strong>3. Expresión escrita (2 pts)</strong></p><p>Escribe un breve mensaje (50-60 palabras) recomendando a un amigo cómo usar las redes sociales de forma segura.</p>",
          "reponse": "<p>Hola Juan, te recomiendo que uses las redes sociales con cuidado. No compartas información personal y verifica siempre las noticias antes de difundirlas. Si ves algún mensaje sospechoso, no lo reenvíes. La privacidad es muy importante. ¡Un abrazo!</p>"
        }
      ]
    },
    {
      "titre": "Ejercicio 2 : Correspondencia formal (5 puntos)",
      "points": "5 pts",
      "enonce": "<p>En este ejercicio, vas a escribir una carta formal para presentar una queja.</p>",
      "questions": [
        {
          "question": "<p><strong>Producción escrita (5 pts)</strong></p><p>Escribe una carta formal de reclamación a una empresa de Internet (por ejemplo, <em>CamNet</em>) porque has tenido cortes de servicio durante una semana. Debes incluir:</p><ul><li>Tus datos personales (nombre, dirección).</li><li>La descripción del problema.</li><li>Las consecuencias de los cortes para tu trabajo o estudios.</li><li>Una petición concreta (reembolso, reparación).</li><li>Fórmulas de cortesía apropiadas.</li></ul><p>(Extensión: 120-150 palabras)</p>",
          "reponse": "<p>Juan Pérez<br>Calle 14, N° 45, Yaundé<br>Tel: 677 88 99 00</p><p>Yaundé, 15 de junio de 2025</p><p>Servicio de Atención al Cliente<br>CamNet<br>Avenida de las Naciones, 100<br>Yaundé</p><p>Asunto: Reclamación por cortes de servicio</p><p>Estimados señores:</p><p>Me dirijo a ustedes para presentar una reclamación formal por los repetidos cortes de servicio de Internet que he sufrido durante la última semana (del 8 al 14 de junio). Estos cortes han afectado gravemente mi actividad profesional, ya que trabajo desde casa y no he podido acceder a mis archivos ni asistir a reuniones en línea.</p><p>Como cliente fiel de su empresa, considero que esta situación es inaceptable. Por lo tanto, les solicito una pronta reparación del servicio y un reembolso proporcional de la factura del mes en curso.</p><p>Quedo a la espera de su respuesta y agradezco su atención.</p><p>Atentamente,</p><p>Juan Pérez</p>"
        }
      ]
    },
    {
      "titre": "Ejercicio 3 : Expresión oral – El impacto de la inmigración (5 puntos)",
      "points": "5 pts",
      "enonce": "<p>La inmigración clandestina es un problema que afecta a muchos jóvenes africanos. Observa la situación y participa en un debate en clase.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Expresión oral (5 pts)</strong></p><p>Prepara un discurso de 2 minutos para animar a los jóvenes a quedarse en su país y luchar por su futuro. Debes:</p><ul><li>Mencionar las causas de la emigración clandestina (paro, pobreza, falta de oportunidades).</li><li>Explicar las consecuencias (peligros del viaje, explotación en el extranjero).</li><li>Proponer soluciones (formación, emprendimiento, apoyo del gobierno).</li><li>Utilizar un vocabulario apropiado (verbos de opinión, conectores).</li></ul>",
          "reponse": "<p>Buenos días a todos,</p><p>Hoy quiero hablarles de un tema que nos afecta a muchos jóvenes: la inmigración clandestina. Es cierto que en nuestro país hay dificultades como el paro y la falta de oportunidades, pero creo que marcharse de forma irregular no es la solución. Miles de jóvenes pierden la vida en el intento o son explotados en el extranjero.</p><p>En lugar de arriesgarlo todo, debemos luchar por nuestro futuro aquí. Podemos formarnos, crear nuestras propias empresas y exigir al gobierno más apoyo para los jóvenes. No necesitamos huir para tener éxito; podemos construir nuestro propio país.</p><p>Confío en que, juntos, podemos cambiar las cosas. ¡No dejemos que el miedo nos empuje a irnos!</p>"
        }
      ]
    },
    {
      "titre": "Ejercicio 4 : Gramática – Uso del subjuntivo para expresar deseos y consejos (5 puntos)",
      "points": "5 pts",
      "enonce": "<p>En las relaciones internacionales y en el ámbito profesional, a menudo utilizamos el subjuntivo para dar consejos y expresar deseos.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Subjuntivo y recomendaciones (2 pts)</strong></p><p>Completa las siguientes frases con el presente de subjuntivo de los verbos entre paréntesis:</p><p>a) Los expertos recomiendan que los jóvenes ______ (formarse) en nuevas tecnologías. (1 pt)</p><p>b) Es importante que nosotros ______ (combatir) la corrupción en el ámbito profesional. (1 pt)</p>",
          "reponse": "<p>a) Los expertos recomiendan que los jóvenes <strong>se formen</strong> en nuevas tecnologías.</p><p>b) Es importante que nosotros <strong>combatamos</strong> la corrupción en el ámbito profesional.</p>"
        },
        {
          "question": "<p><strong>2. Expresión de deseos (2 pts)</strong></p><p>Transforma estas oraciones utilizando el subjuntivo:</p><p>a) (Deseo) La presa no contamina el río. → Espero que ______. (1 pt)</p><p>b) (Consejo) Nosotros debemos preservar el patrimonio cultural. → Es necesario que ______. (1 pt)</p>",
          "reponse": "<p>a) Espero que <strong>la presa no contamine</strong> el río.</p><p>b) Es necesario que <strong>nosotros preservemos</strong> el patrimonio cultural.</p>"
        },
        {
          "question": "<p><strong>3. Expresión de duda (1 pt)</strong></p><p>Indica si la siguiente frase expresa certeza o duda:</p><p>«No creo que los medios de comunicación tradicionales desaparezcan.»</p>",
          "reponse": "<p>La frase expresa <strong>duda</strong> porque el verbo "creer" está en negativo.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
