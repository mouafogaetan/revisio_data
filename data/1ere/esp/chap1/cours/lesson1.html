<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introducción a la familia",
    "contenu": "<div style='padding: 15px; background: linear-gradient(135deg, #1a237e, #0d47a1); border-radius: 12px; color: white;'><h2 style='color: #ffd54f; margin-top: 0; text-align: center;'>👨‍👩‍👧‍👦 La familia</h2><div style='background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><h3 style='color: #fff; margin-top: 0;'>Lección 1 : Presentación de las familias y conflictos familiares</h3><p style='font-size: 16px; line-height: 1.6;'>En esta lección, vamos a aprender a presentar a los miembros de nuestra familia, describir las relaciones familiares y expresar los conflictos que pueden surgir entre padres e hijos.</p><div style='background: rgba(255,215,0,0.2); padding: 10px; border-radius: 6px; margin-top: 10px;; color: #000000'><p style='font-size: 15px; color: #ffd54f; margin: 0; text-align: center;'><strong>🎯 Objetivo :</strong> Saber hablar de la familia en español.</p></div></div></div>",
    "texteParle": "Buenos días a todos los alumnos de Première. Hoy vamos a comenzar una nueva lección muy interesante sobre la familia. La familia es una parte muy importante de nuestra vida. En esta lección, vamos a aprender a presentar a los miembros de nuestra familia, a describir las relaciones que tenemos con ellos y también a expresar los conflictos que pueden surgir entre padres e hijos. Al final de esta lección, ustedes serán capaces de hablar de su familia en español con fluidez.",
    "note": "Objetivo de la lección : Hablar de la familia en español"
  },
  {
    "titre": "Los miembros de la familia",
    "contenu": "<div style='padding: 15px; background: #e3f2fd; border-radius: 12px; border-left: 5px solid #0d47a1;; color: #000000'><h3 style='color: #0d47a1; margin-top: 0;'>👨‍👩‍👧‍👦 Los miembros de la familia</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'>A continuación, algunos miembros de la familia en español :</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 15px;'><div style='background: #e3f2fd; padding: 8px; border-radius: 4px;; color: #000000'><strong>El padre</strong> - El papá</div><div style='background: #f3e5f5; padding: 8px; border-radius: 4px;; color: #000000'><strong>La madre</strong> - La mamá</div><div style='background: #e8f5e9; padding: 8px; border-radius: 4px;; color: #000000'><strong>El hijo</strong> - La hija</div><div style='background: #fff3e0; padding: 8px; border-radius: 4px;; color: #000000'><strong>El hermano</strong> - La hermana</div><div style='background: #fce4ec; padding: 8px; border-radius: 4px;; color: #000000'><strong>El abuelo</strong> - La abuela</div><div style='background: #e0f7fa; padding: 8px; border-radius: 4px;; color: #000000'><strong>El tío</strong> - La tía</div><div style='background: #f3e5f5; padding: 8px; border-radius: 4px;; color: #000000'><strong>El primo</strong> - La prima</div><div style='background: #e8f5e9; padding: 8px; border-radius: 4px;; color: #000000'><strong>El sobrino</strong> - La sobrina</div></div><div style='background: #fff3e0; padding: 12px; border-radius: 6px; margin-top: 12px;; color: #000000'><p style='font-size: 15px; color: #e65100; margin: 0;'><strong>💡 Recuerda :</strong> En español, el masculino (el) se usa para grupos mixtos.</p></div></div></div>",
    "texteParle": "Comencemos por aprender los nombres de los miembros de la familia en español. Hay muchas palabras importantes que debemos conocer. El padre o el papá, la madre o la mamá, el hijo y la hija, el hermano y la hermana, el abuelo y la abuela, el tío y la tía, el primo y la prima, el sobrino y la sobrina. Recuerden que en español, cuando hablamos de un grupo mixto de hombres y mujeres, usamos el masculino. Por ejemplo, \"mis hermanos\" puede significar mis hermanos y hermanas.",
    "note": "Vocabulario de los miembros de la familia"
  },
  {
    "titre": "Verbos para hablar de la familia",
    "contenu": "<div style='padding: 15px; background: #f3e5f5; border-radius: 12px;; color: #000000'><h3 style='color: #4a148c; margin-top: 0;'>📝 Verbos importantes</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'>Para hablar de la familia, usamos estos verbos :</p><div style='display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px;'><div style='background: #f3e5f5; padding: 10px; border-radius: 6px; border-left: 4px solid #4a148c;; color: #000000'><strong style='color: #4a148c;'>Tener</strong> - Yo <strong>tengo</strong> un hermano. (J'ai un frère)</div><div style='background: #e3f2fd; padding: 10px; border-radius: 6px; border-left: 4px solid #0d47a1;; color: #000000'><strong style='color: #0d47a1;'>Llamarse</strong> - Mi hermana <strong>se llama</strong> María. (Ma sœur s'appelle Marie)</div><div style='background: #e8f5e9; padding: 10px; border-radius: 6px; border-left: 4px solid #1b5e20;; color: #000000'><strong style='color: #1b5e20;'>Ser</strong> - Mi padre <strong>es</strong> ingeniero. (Mon père est ingénieur)</div><div style='background: #fff3e0; padding: 10px; border-radius: 6px; border-left: 4px solid #e65100;; color: #000000'><strong style='color: #e65100;'>Vivir</strong> - Mi familia <strong>vive</strong> en Yaundé. (Ma famille vit à Yaoundé)</div></div><div style='background: #ffeb3b; padding: 12px; border-radius: 6px; margin-top: 12px; text-align: center;; color: #000000'><p style='font-size: 15px; color: #333; margin: 0;'><strong>🔑 Atención :</strong> Estos verbos son muy útiles para presentar a tu familia.</p></div></div></div>",
    "texteParle": "Para hablar de la familia en español, necesitamos conocer algunos verbos importantes. El verbo \"tener\" es muy útil para decir que tenemos un familiar. Por ejemplo, \"tengo un hermano\". El verbo \"llamarse\" se usa para decir cómo se llama alguien. Por ejemplo, \"mi hermana se llama María\". El verbo \"ser\" se usa para describir la profesión o las características de alguien. Por ejemplo, \"mi padre es ingeniero\". Y el verbo \"vivir\" se usa para decir dónde vive la familia. Por ejemplo, \"mi familia vive en Yaundé\". Estos verbos son la base para presentar a tu familia.",
    "note": "Verbos clave : tener, llamarse, ser, vivir"
  },
  {
    "titre": "Adjetivos para describir a la familia",
    "contenu": "<div style='padding: 15px; background: #e8f5e9; border-radius: 12px;; color: #000000'><h3 style='color: #1b5e20; margin-top: 0;'>📝 Adjetivos para describir</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'>Para describir a los miembros de tu familia, usa estos adjetivos :</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background: #e8f5e9; padding: 8px; border-radius: 4px;; color: #000000'><strong>Grande</strong> / <strong>Pequeña</strong></div><div style='background: #e3f2fd; padding: 8px; border-radius: 4px;; color: #000000'><strong>Unida</strong> / <strong>Desunida</strong></div><div style='background: #f3e5f5; padding: 8px; border-radius: 4px;; color: #000000'><strong>Feliz</strong> / <strong>Triste</strong></div><div style='background: #fff3e0; padding: 8px; border-radius: 4px;; color: #000000'><strong>Comprensiva</strong> / <strong>Estricta</strong></div><div style='background: #fce4ec; padding: 8px; border-radius: 4px;; color: #000000'><strong>Amorosa</strong> / <strong>Conflictiva</strong></div><div style='background: #e0f7fa; padding: 8px; border-radius: 4px;; color: #000000'><strong>Numerosa</strong> / <strong>Reducida</strong></div></div><div style='background: #fff3e0; padding: 12px; border-radius: 6px; margin-top: 12px;; color: #000000'><p style='font-size: 15px; color: #e65100; margin: 0;'><strong>💡 Ejemplo :</strong> Mi familia es grande y unida. (Ma famille est grande et unie.)</p></div></div></div>",
    "texteParle": "Para describir a tu familia, necesitas conocer algunos adjetivos. Puedes decir si tu familia es grande o pequeña, unida o desunida, feliz o triste. También puedes decir si tus padres son comprensivos o estrictos, si tu familia es amorosa o conflictiva, numerosa o reducida. Por ejemplo, puedes decir : \"Mi familia es grande y unida. Mis padres son comprensivos y amorosos.\" Estos adjetivos te ayudarán a describir mejor las relaciones familiares.",
    "note": "Adjetivos para describir la familia"
  },
  {
    "titre": "Mi familia",
    "contenu": "<div style='padding: 15px; background: #fff3e0; border-radius: 12px;; color: #000000'><h3 style='color: #e65100; margin-top: 0;'>📝 Mi familia</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'><strong>Ejemplo de presentación :</strong></p><div style='background: #fff8e1; padding: 15px; border-radius: 8px; border-left: 4px solid #e65100; margin-top: 10px;; color: #000000'><p style='font-size: 15px; line-height: 1.8;'><em>« Mi familia está compuesta por cinco personas: mi padre, mi madre, mi hermano mayor, mi hermana pequeña y yo. Mi padre se llama Jean y es funcionario. Mi madre se llama Marie y es profesora. Mi hermano mayor tiene veinte años y estudia en la universidad. Mi hermana pequeña tiene diez años y va al colegio. Nosotros vivimos en Douala. Somos una familia muy unida y nos gusta pasar tiempo juntos. »</em></p></div><div style='background: #e8f5e9; padding: 12px; border-radius: 6px; margin-top: 12px;; color: #000000'><p style='font-size: 15px; color: #1b5e20; margin: 0;'><strong>💡 Ahora, ¡es tu turno !</strong> Prepara una presentación de tu familia.</p></div></div></div>",
    "texteParle": "Ahora, veamos un ejemplo de cómo presentar a tu familia. \"Mi familia está compuesta por cinco personas: mi padre, mi madre, mi hermano mayor, mi hermana pequeña y yo. Mi padre se llama Jean y es funcionario. Mi madre se llama Marie y es profesora. Mi hermano mayor tiene veinte años y estudia en la universidad. Mi hermana pequeña tiene diez años y va al colegio. Nosotros vivimos en Douala. Somos una familia muy unida y nos gusta pasar tiempo juntos.\" Este es un buen ejemplo de cómo presentar a tu familia. Ahora, es tu turno de preparar una presentación de tu familia.",
    "note": "Ejemplo de presentación de la familia"
  },
  {
    "titre": "Los conflictos familiares",
    "contenu": "<div style='padding: 15px; background: #fce4ec; border-radius: 12px;; color: #000000'><h3 style='color: #c62828; margin-top: 0;'>⚠️ Los conflictos familiares</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'>Los conflictos entre padres e hijos son comunes. Algunas causas frecuentes :</p><div style='display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px;'><div style='background: #ffebee; padding: 10px; border-radius: 6px; border-left: 4px solid #c62828;; color: #000000'><strong style='color: #c62828;'>📌 Diferencias generacionales</strong><br><span style='font-size: 14px;'>Los padres y los hijos tienen visiones diferentes de la vida.</span></div><div style='background: #ffebee; padding: 10px; border-radius: 6px; border-left: 4px solid #c62828;; color: #000000'><strong style='color: #c62828;'>📌 Problemas de comunicación</strong><br><span style='font-size: 14px;'>Falta de diálogo entre padres e hijos.</span></div><div style='background: #ffebee; padding: 10px; border-radius: 6px; border-left: 4px solid #c62828;; color: #000000'><strong style='color: #c62828;'>📌 Exigencias escolares</strong><br><span style='font-size: 14px;'>Presión por los estudios y las notas.</span></div><div style='background: #ffebee; padding: 10px; border-radius: 6px; border-left: 4px solid #c62828;; color: #000000'><strong style='color: #c62828;'>📌 Uso de la tecnología</strong><br><span style='font-size: 14px;'>Conflictos por el uso del teléfono, redes sociales, videojuegos.</span></div></div></div></div>",
    "texteParle": "Ahora vamos a hablar de un tema importante: los conflictos familiares. Los conflictos entre padres e hijos son comunes en todas las familias. Algunas causas frecuentes son las diferencias generacionales, los problemas de comunicación, las exigencias escolares y el uso de la tecnología. Los padres y los hijos a menudo tienen visiones diferentes de la vida. A veces, falta diálogo entre ellos. Los padres pueden tener muchas exigencias sobre los estudios de sus hijos. Y el uso excesivo del teléfono, las redes sociales y los videojuegos también puede causar conflictos.",
    "note": "Causas de los conflictos familiares"
  },
  {
    "titre": "Expresar conflictos en español",
    "contenu": "<div style='padding: 15px; background: #f3e5f5; border-radius: 12px;; color: #000000'><h3 style='color: #4a148c; margin-top: 0;'>🗣️ Expresar conflictos</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'>Para expresar conflictos en español, usamos estas expresiones :</p><div style='display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px;'><div style='background: #f3e5f5; padding: 10px; border-radius: 6px;; color: #000000'><strong style='color: #4a148c;'>Expresar desacuerdo :</strong><br><span style='font-size: 14px;'>• No estoy de acuerdo con mis padres.<br>• Mis padres no me entienden.<br>• Creo que mis padres son demasiado estrictos.</span></div><div style='background: #e3f2fd; padding: 10px; border-radius: 6px;; color: #000000'><strong style='color: #0d47a1;'>Expresar frustración :</strong><br><span style='font-size: 14px;'>• Estoy harto de las discusiones.<br>• Me siento incomprendido.<br>• Siempre discuto con mi hermano.</span></div><div style='background: #e8f5e9; padding: 10px; border-radius: 6px;; color: #000000'><strong style='color: #1b5e20;'>Proponer soluciones :</strong><br><span style='font-size: 14px;'>• Deberíamos hablar más.<br>• Es importante escucharse mutuamente.<br>• Necesitamos llegar a un acuerdo.</span></div></div></div></div>",
    "texteParle": "Para expresar conflictos en español, hay varias expresiones útiles. Para expresar desacuerdo, puedes decir: \"No estoy de acuerdo con mis padres\", \"Mis padres no me entienden\", o \"Creo que mis padres son demasiado estrictos\". Para expresar frustración, puedes decir: \"Estoy harto de las discusiones\", \"Me siento incomprendido\", o \"Siempre discuto con mi hermano\". Y para proponer soluciones, puedes decir: \"Deberíamos hablar más\", \"Es importante escucharse mutuamente\", o \"Necesitamos llegar a un acuerdo\". Estas expresiones te ayudarán a hablar sobre los conflictos familiares.",
    "note": "Expresiones para hablar de conflictos"
  },
  {
    "titre": "Ejemplo de conflicto : Felicitas",
    "contenu": "<div style='padding: 15px; background: #fff3e0; border-radius: 12px;; color: #000000'><h3 style='color: #e65100; margin-top: 0;'>📖 Lectura : Felicitas</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><div style='background: #fff8e1; padding: 15px; border-radius: 8px; border-left: 4px solid #e65100;; color: #000000'><p style='font-size: 15px; line-height: 1.8;'><em>« Felicitas tiene quince años y vive con sus padres en Yaundé. Ella quiere salir con sus amigos el sábado por la noche, pero sus padres no la dejan. Dicen que es demasiado joven y que debe concentrarse en sus estudios. Felicitas está muy enfadada y discute con sus padres. Les dice que no la entienden y que es demasiado estricta. Sus padres le responden que solo quieren protegerla. »</em></p></div><div style='background: #e8f5e9; padding: 12px; border-radius: 6px; margin-top: 12px;; color: #000000'><p style='font-size: 15px; color: #1b5e20; margin: 0;'><strong>💡 Pregunta :</strong> ¿Qué harías tú en esta situación ? ¿Cómo se podría resolver este conflicto ?</p></div></div></div>",
    "texteParle": "Ahora, vamos a leer un texto sobre un conflicto familiar. Se titula \"Felicitas\". Felicitas tiene quince años y vive con sus padres en Yaundé. Ella quiere salir con sus amigos el sábado por la noche, pero sus padres no la dejan. Dicen que es demasiado joven y que debe concentrarse en sus estudios. Felicitas está muy enfadada y discute con sus padres. Les dice que no la entienden y que es demasiado estricta. Sus padres le responden que solo quieren protegerla. ¿Qué harías tú en esta situación? ¿Cómo se podría resolver este conflicto?",
    "note": "Texto sobre un conflicto familiar"
  },
  {
    "titre": "Vocabulario de conflictos",
    "contenu": "<div style='padding: 15px; background: #e3f2fd; border-radius: 12px;; color: #000000'><h3 style='color: #0d47a1; margin-top: 0;'>📝 Vocabulario de conflictos</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 15px;'><div style='background: #fce4ec; padding: 8px; border-radius: 4px;; color: #000000'><strong>Discutir</strong> - Discuter</div><div style='background: #ffebee; padding: 8px; border-radius: 4px;; color: #000000'><strong>Enfadarse</strong> - Se fâcher</div><div style='background: #fff3e0; padding: 8px; border-radius: 4px;; color: #000000'><strong>Prohibir</strong> - Interdire</div><div style='background: #e8f5e9; padding: 8px; border-radius: 4px;; color: #000000'><strong>Permitir</strong> - Permettre</div><div style='background: #e3f2fd; padding: 8px; border-radius: 4px;; color: #000000'><strong>Entender</strong> - Comprendre</div><div style='background: #f3e5f5; padding: 8px; border-radius: 4px;; color: #000000'><strong>Obedece</strong> - Obéir</div><div style='background: #fce4ec; padding: 8px; border-radius: 4px;; color: #000000'><strong>Reclamar</strong> - Réclamer</div><div style='background: #fff3e0; padding: 8px; border-radius: 4px;; color: #000000'><strong>Negociar</strong> - Négocier</div></div><div style='background: #ffeb3b; padding: 12px; border-radius: 6px; margin-top: 12px; text-align: center;; color: #000000'><p style='font-size: 15px; color: #333; margin: 0;'><strong>🔑 Importante :</strong> Este vocabulario te ayudará a expresar conflictos.</p></div></div></div>",
    "texteParle": "Aquí tienes un vocabulario muy útil para hablar de conflictos familiares. Discutir, enfadarse, prohibir, permitir, entender, obedecer, reclamar, negociar. Estos verbos te ayudarán a expresar lo que sucede en los conflictos familiares. Por ejemplo, puedes decir: \"Discuto con mis padres porque me prohíben salir.\" o \"Mis padres no me entienden y yo me enfado.\" Aprender este vocabulario te permitirá expresar tus sentimientos y tus opiniones sobre los conflictos familiares.",
    "note": "Vocabulario de conflictos familiares"
  },
  {
    "titre": "Consejos para resolver conflictos",
    "contenu": "<div style='padding: 15px; background: #e8f5e9; border-radius: 12px;; color: #000000'><h3 style='color: #1b5e20; margin-top: 0;'>💡 Consejos para resolver conflictos</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><div style='display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px;'><div style='background: #e8f5e9; padding: 10px; border-radius: 6px; border-left: 4px solid #1b5e20;; color: #000000'><span style='font-size: 20px;'>1️⃣</span> <strong style='color: #1b5e20;'>Hablar con calma</strong><br><span style='font-size: 14px;'>Es importante no gritar ni insultar. Hablar con respeto.</span></div><div style='background: #e3f2fd; padding: 10px; border-radius: 6px; border-left: 4px solid #0d47a1;; color: #000000'><span style='font-size: 20px;'>2️⃣</span> <strong style='color: #0d47a1;'>Escuchar</strong><br><span style='font-size: 14px;'>Escuchar los puntos de vista de los demás sin interrumpir.</span></div><div style='background: #f3e5f5; padding: 10px; border-radius: 6px; border-left: 4px solid #4a148c;; color: #000000'><span style='font-size: 20px;'>3️⃣</span> <strong style='color: #4a148c;'>Buscar soluciones juntos</strong><br><span style='font-size: 14px;'>No imponer, sino buscar un acuerdo que beneficie a todos.</span></div><div style='background: #fff3e0; padding: 10px; border-radius: 6px; border-left: 4px solid #e65100;; color: #000000'><span style='font-size: 20px;'>4️⃣</span> <strong style='color: #e65100;'>Ser paciente</strong><br><span style='font-size: 14px;'>Los conflictos no se resuelven de un día para otro. Tiempo y paciencia.</span></div></div></div></div>",
    "texteParle": "Para resolver los conflictos familiares, aquí tienes algunos consejos. Primero, hablar con calma. Es importante no gritar ni insultar. Segundo, escuchar. Escuchar los puntos de vista de los demás sin interrumpir. Tercero, buscar soluciones juntos. No imponer, sino buscar un acuerdo que beneficie a todos. Y cuarto, ser paciente. Los conflictos no se resuelven de un día para otro. Se necesita tiempo y paciencia. Con estos consejos, los conflictos pueden resolverse de manera más pacífica y constructiva.",
    "note": "Consejos para resolver conflictos familiares"
  },
  {
    "titre": "Expresar opiniones",
    "contenu": "<div style='padding: 15px; background: #f3e5f5; border-radius: 12px;; color: #000000'><h3 style='color: #4a148c; margin-top: 0;'>🗣️ Expresar opiniones</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'>Para dar tu opinión sobre los conflictos familiares, usa estas expresiones :</p><div style='display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px;'><div style='background: #f3e5f5; padding: 10px; border-radius: 6px;; color: #000000'><strong style='color: #4a148c;'>Dar una opinión :</strong><br><span style='font-size: 14px;'>• En mi opinión, los padres deben ser más flexibles.<br>• Creo que los hijos deben obedecer a sus padres.<br>• Pienso que la comunicación es la clave.</span></div><div style='background: #e3f2fd; padding: 10px; border-radius: 6px;; color: #000000'><strong style='color: #0d47a1;'>Estar de acuerdo o en desacuerdo :</strong><br><span style='font-size: 14px;'>• Estoy de acuerdo con mis padres.<br>• No estoy de acuerdo con la actitud de Felicitas.<br>• Comparto la opinión de mis padres.</span></div></div><div style='background: #ffeb3b; padding: 12px; border-radius: 6px; margin-top: 12px; text-align: center;; color: #000000'><p style='font-size: 15px; color: #333; margin: 0;'><strong>💡 Practica :</strong> Da tu opinión sobre el caso de Felicitas.</p></div></div></div>",
    "texteParle": "Para dar tu opinión sobre los conflictos familiares, es importante conocer algunas expresiones útiles. Para dar una opinión, puedes decir: \"En mi opinión, los padres deben ser más flexibles\", \"Creo que los hijos deben obedecer a sus padres\", o \"Pienso que la comunicación es la clave\". Para estar de acuerdo o en desacuerdo, puedes decir: \"Estoy de acuerdo con mis padres\", \"No estoy de acuerdo con la actitud de Felicitas\", o \"Comparto la opinión de mis padres\". Ahora, practica dando tu opinión sobre el caso de Felicitas.",
    "note": "Expresiones para dar opinión"
  },
  {
    "titre": "Exercice : Presenta tu familia",
    "contenu": "<div style='padding: 15px; background: #fff3e0; border-radius: 12px;; color: #000000'><h3 style='color: #e65100; margin-top: 0;'>✏️ Exercice : Presenta tu familia</h3><div style='background: white; padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='font-size: 16px; line-height: 1.8;'><strong>Consigne :</strong> Escribe un texto para presentar a tu familia.</p><div style='background: #fff8e1; padding: 12px; border-radius: 6px; margin-top: 10px;; color: #000000'><p style='font-size: 15px; line-height: 1.8;'><strong>Preguntas para ayudarte :</strong></p><ul style='font-size: 14px; line-height: 2;'><li>¿Cómo se llama tu familia ?</li><li>¿Cuántas personas hay en tu familia ?</li><li>¿Cómo se llaman tus padres y tus hermanos ?</li><li>¿Qué hacen tus padres ?</li><li>¿Dónde viven ?</li><li>¿Cómo describirías a tu familia ?</li><li>¿Tienes algún conflicto familiar ?</li></ul></div><div style='background: #e8f5e9; padding: 12px; border-radius: 6px; margin-top: 12px; text-align: center;; color: #000000'><p style='font-size: 15px; color: #1b5e20; margin: 0;'><strong>💡 ¡Buena suerte !</strong> Usa el vocabulario y las expresiones aprendidas.</p></div></div></div>",
    "texteParle": "Para terminar esta lección, vamos a hacer un ejercicio. Vas a escribir un texto para presentar a tu familia. Aquí tienes algunas preguntas para ayudarte. ¿Cómo se llama tu familia? ¿Cuántas personas hay en tu familia? ¿Cómo se llaman tus padres y tus hermanos? ¿Qué hacen tus padres? ¿Dónde viven? ¿Cómo describirías a tu familia? ¿Tienes algún conflicto familiar? Usa el vocabulario y las expresiones que hemos aprendido hoy. ¡Buena suerte!",
    "note": "Exercice : Presenta tu familia"
  },
  {
    "titre": "Conclusión",
    "contenu": "<div style='padding: 15px; background: linear-gradient(135deg, #1a237e, #0d47a1); border-radius: 12px; color: white;'><h3 style='color: #ffd54f; margin-top: 0; text-align: center;'>🎯 Conclusión</h3><div style='background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-top: 10px;; color: #000000'><ul style='font-size: 16px; line-height: 2;'><li>✅ Hemos aprendido a <strong>presentar a los miembros</strong> de la familia.</li><li>✅ Hemos <strong>descrito las relaciones</strong> familiares.</li><li>✅ Hemos <strong>expresado conflictos</strong> entre padres e hijos.</li><li>✅ Hemos utilizado <strong>vocabulario y expresiones</strong;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
