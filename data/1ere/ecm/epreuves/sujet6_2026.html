<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Éducation Civique et Morale",
 "classe": "Première",
 "sequence": "Séquence 6 : Violences et stratégies de paix",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Savoir définir et distinguer les formes de violence",
     "points": "4 pts",
     "enonce": "<p>Lis attentivement les définitions suivantes puis réponds aux questions.</p><ul><li><strong>Définition A :</strong> Atteinte à l'intégrité corporelle d'une personne, comme les coups, les blessures, les violences sexuelles.</li><li><strong>Définition B :</strong> Atteinte à la dignité et à la considération d'une personne, comme les humiliations, le mépris, le dénigrement.</li><li><strong>Définition C :</strong> Atteinte aux biens et aux possessions d'une personne, comme les vols, les destructions de biens.</li></ul>",
     "questions":[
       {
         "question": "1. a) À quelle forme d'atteinte correspondent les définitions A, B et C ? (Relie chaque définition à son type).<br><br><strong>Type 1 : Atteinte à l'intégrité patrimoniale<br>Type 2 : Atteinte à l'intégrité physique<br>Type 3 : Atteinte à l'intégrité morale</strong><br><br>b) Cite un exemple concret (de la vie quotidienne ou de l'actualité) pour chaque type d'atteinte.",
         "reponse": "a) Définition A → Type 2 (Atteinte à l'intégrité physique) ; Définition B → Type 3 (Atteinte à l'intégrité morale) ; Définition C → Type 1 (Atteinte à l'intégrité patrimoniale).<br><br>b) <ul><li><strong>Intégrité physique :</strong> Un élève victime de coups de la part d'un camarade.</li><li><strong>Intégrité morale :</strong> Un élève humilié ou moqué sur les réseaux sociaux (cyberharcèlement).</li><li><strong>Intégrité patrimoniale :</strong> Un incendie criminel dans un marché qui détruit les biens des commerçants.</li></ul>"
       }
     ]
   },
   {
     "titre": "L'extrémisme violent : définitions et causes",
     "points": "6 pts",
     "enonce": "<p>L'extrémisme violent est un phénomène qui menace la paix et la stabilité des sociétés, y compris au Cameroun.</p><p><strong>Document :</strong> Article de presse (extrait) : <i>'Des experts s'accordent à dire que l'extrémisme violent prospère souvent dans des environnements marqués par la pauvreté, le sentiment d'injustice, et un accès limité à l'éducation. La manipulation identitaire, souvent utilisée par des groupes armés, exacerbe les tensions entre communautés.'</i></p>",
     "questions":[
       {
         "question": "2. a) D'après tes connaissances et le document, définis l'extrémisme violent.<br><br>b) À partir du document, identifie et explique deux causes de l'extrémisme violent.<br><br>c) Cite une manifestation de l'extrémisme violent que tu connais au Cameroun.",
         "reponse": "a) L'extrémisme violent est le recours à la violence, y compris armée, pour imposer ses idées politiques, religieuses ou identitaires à une population. Il se caractérise par le refus du dialogue et le mépris des vies humaines.<br><br>b) <ul><li><strong>Pauvreté et exclusion :</strong> Le document mentionne la pauvreté comme un terreau fertile. Des personnes sans emploi et sans perspectives peuvent être plus facilement recrutées par des groupes extrémistes qui leur promettent une rémunération ou un sentiment d'appartenance.</li><li><strong>Sentiment d'injustice :</strong> L'injustice ressentie par certaines communautés, qui se sentent marginalisées ou mal représentées, peut être exploitée par des manipulateurs pour justifier le recours à la violence.</li></ul><br>c) <ul><li>Les attaques de Boko Haram dans la région de l'Extrême-Nord.</li><li>Les conflits intercommunautaires dans certaines régions, notamment autour de la question des ressources (pâturages, eau).</li></ul>"
       }
     ]
   },
   {
     "titre": "Conséquences et acteurs de la lutte contre l'extrémisme violent",
     "points": "4 pts",
     "enonce": "<p>L'extrémisme violent a des conséquences dramatiques sur les populations et nécessite une réponse coordonnée de plusieurs acteurs.</p>",
     "questions":[
       {
         "question": "3. a) Analyse les conséquences de l'extrémisme violent. Cite deux types de conséquences.<br><br>b) Identifie les principaux acteurs de la lutte contre l'extrémisme violent au Cameroun et dans le monde. Donne un exemple pour chaque niveau (national et international).",
         "reponse": "a) <ul><li><strong>Conséquences humaines :</strong> Pertes en vies humaines, déplacements forcés de populations, traumatismes psychologiques profonds chez les victimes, surtout les enfants.</li><li><strong>Conséquences sociales et économiques :</strong> Destruction des infrastructures (écoles, hôpitaux, ponts), ralentissement de l'activité économique, augmentation de la méfiance entre communautés, ce qui fragilise le tissu social.</li></ul><br>b) <ul><li><strong>Au niveau national :</strong> L'État du Cameroun, à travers l'armée (BIR, forces spéciales) et les forces de police, mène des opérations de maintien de l'ordre et de lutte contre les groupes armés. Les autorités locales et les chefs traditionnels jouent aussi un rôle de médiation et de prévention.</li><li><strong>Au niveau international :</strong> Les Nations Unies, à travers ses agences (comme le HCR pour les réfugiés), apporte une aide humanitaire et soutient les initiatives de paix. La Force Multinationale Mixte (FMM) est un exemple de coopération régionale (Cameroun, Tchad, Niger, Nigeria, Bénin) contre Boko Haram.</li></ul>"
       }
     ]
   },
   {
     "titre": "Les stratégies de promotion de la paix",
     "points": "6 pts",
     "enonce": "<p>La paix ne se limite pas à l'absence de guerre. Elle se construit à travers des stratégies et des acteurs variés.</p>",
     "questions":[
       {
         "question": "4. a) Distingue la 'paix négative' de la 'paix positive'.<br><br>b) Explique les stratégies suivantes de promotion de la paix, en les illustrant par un exemple concret : le dialogue social, l'éducation à la paix, la médiation.<br><br>c) Cite un acteur (institution ou organisation) qui œuvre pour la paix au Cameroun et précise son rôle.",
         "reponse": "a) <ul><li><strong>Paix négative :</strong> C'est l'absence de guerre ou de violence directe. Elle est considérée comme une paix fragile car les tensions et les causes profondes du conflit persistent.</li><li><strong>Paix positive :</strong> C'est une situation où les causes structurelles de la violence (injustice, inégalité, exclusion) sont résolues par la justice sociale, l'équité et la cohésion sociale. C'est une paix durable et constructive.</li></ul><br>b) <ul><li><strong>Dialogue social :</strong> C'est un échange entre les parties concernées pour trouver des solutions communes sans recourir à la violence. <br><em>Exemple :</em> Des réunions organisées par le préfet entre les éleveurs et les agriculteurs pour gérer pacifiquement l'accès à l'eau et aux pâturages.</li><li><strong>Éducation à la paix :</strong> C'est un processus qui vise à transmettre des connaissances, des attitudes et des compétences pour promouvoir la tolérance, le respect et la résolution non-violente des conflits. <br><em>Exemple :</em> L'organisation de débats en classe sur le vivre-ensemble ou la participation à des projets de sensibilisation contre la xénophobie dans les établissements scolaires.</li><li><strong>Médiation :</strong> C'est un processus dans lequel un tiers neutre (médiateur) aide les parties en conflit à communiquer, à comprendre leurs besoins respectifs et à trouver un accord acceptable pour tous. <br><em>Exemple :</em> L'intervention d'une personnalité religieuse, d'un chef traditionnel ou d'une ONG (comme le Cercle des Jeunes) pour résoudre un conflit foncier entre deux familles, évitant ainsi une escalade vers la violence.</li></ul><br>c) <ul><li><strong>La Commission Nationale pour la Promotion du Bilinguisme et du Multiculturalisme (CNPBM) :</strong> Elle a pour mission de promouvoir le vivre-ensemble et de pacifier les relations entre les communautés culturelles et linguistiques du Cameroun.</li><li><strong>Acteurs de la société civile :</strong> Des organisations comme le Cercle des Jeunes Démocrates ou des associations de femmes jouent un rôle crucial dans la médiation communautaire et la prévention des conflits.</li></ul>"
       }
     ]
   },
   {
     "titre": "Méthodes de règlement pacifique des conflits",
     "points": "5 pts",
     "enonce": "<p>Il existe plusieurs méthodes pour régler les différents de manière pacifique. Choisis la méthode la plus adaptée dans les situations suivantes et justifie ton choix.</p>",
     "questions":[
       {
         "question": "5. <strong>Situation 1 :</strong> Un conflit entre deux associations de parents d'élèves pour l'utilisation d'un espace sportif communal.<br><br><strong>Situation 2 :</strong> Un litige commercial important entre deux sociétés sur la livraison de marchandises, et le contrat prévoit le recours à un arbitre.<br><br><strong>Situation 3 :</strong> Un conflit familial pour une succession, qui s'envenime et menace la cohésion de la famille.",
         "reponse": "<ul><li><strong>Situation 1 :</strong> La <strong>médiation</strong> est la méthode la plus adaptée. Un tiers neutre, comme un responsable de la mairie ou un notable du quartier, peut aider les deux associations à discuter et à trouver un accord sur un planning d'utilisation ou un partage des espaces.</li><li><strong>Situation 2 :</strong> La <strong>négociation ou l'arbitrage</strong> est la méthode à privilégier. Les deux entreprises peuvent d'abord tenter une négociation directe. Si elle échoue, le recours à l'arbitrage (comme prévu dans le contrat) est approprié. L'arbitre rendra une décision qui s'impose aux deux parties, évitant ainsi un long et coûteux procès.</li><li><strong>Situation 3 :</strong> La <strong>conciliation</strong> ou la <strong>médiation</strong> familiale est recommandée. Un conciliateur de justice ou un aîné de la famille peut proposer des solutions et aider les membres à se parler pour trouver un terrain d'entente, en préservant les liens familiaux avant d'envisager une procédure judiciaire.</li></ul>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
