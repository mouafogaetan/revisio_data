<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale",
  "classe": "Première",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Définition et protection des droits humains (3 points)",
      "points": "3 pts",
      "enonce": "<p>Cet exercice porte sur les droits fondamentaux et les institutions qui les protègent.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Définition et catégories (2 pts)</strong></p><p>a) Définis les droits de l'homme. (0,75 pt)</p><p>b) Cite et explique brièvement deux catégories de droits de l'homme. (0,75 pt)</p><p>c) Nomme une institution camerounaise de protection des droits de l'homme. (0,5 pt)</p>",
          "reponse": "<p>a) Les droits de l'homme sont l'ensemble des prérogatives reconnues à tout individu, du seul fait de sa qualité d'être humain, sans distinction de race, de sexe, de religion ou de nationalité.</p><p>b) Les droits civils et politiques (droit à la vie, à la liberté, à la sûreté) garantissent les libertés fondamentales. Les droits économiques, sociaux et culturels (droit à l'éducation, à la santé, au travail) assurent le bien-être matériel et social.</p><p>c) La Commission Nationale des Droits de l'Homme et des Libertés (CNDHL) au Cameroun.</p>"
        },
        {
          "question": "<p><strong>2. Rôle de la Croix Rouge (1 pt)</strong></p><p>Quelle est la mission principale de la Croix Rouge ?</p>",
          "reponse": "<p>La mission principale de la Croix Rouge est de porter secours aux victimes de conflits armés et de catastrophes naturelles, en respectant le droit international humanitaire.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'intégrité morale et la lutte contre la corruption (3 points)",
      "points": "3 pts",
      "enonce": "<p>Ce thème aborde l'importance de l'intégrité morale et les structures de lutte contre la corruption au Cameroun.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Définition et valeurs (1,5 pts)</strong></p><p>a) Définis l'intégrité morale. (0,75 pt)</p><p>b) Cite deux valeurs fondamentales de l'intégrité morale. (0,75 pt)</p>",
          "reponse": "<p>a) L'intégrité morale est la qualité d'une personne honnête, droite et incorruptible, qui agit conformément aux principes éthiques et moraux.</p><p>b) Les valeurs fondamentales de l'intégrité morale sont : l'honnêteté (dire la vérité, ne pas tromper), la probité (rectitude, désintéressement) et la transparence (clarté dans les actions).</p>"
        },
        {
          "question": "<p><strong>2. Institutions de lutte (1,5 pts)</strong></p><p>a) Quelle institution camerounaise est chargée de la lutte contre la corruption ? (0,75 pt)</p><p>b) Quel est le rôle de cette institution ? (0,75 pt)</p>",
          "reponse": "<p>a) La CONAC (Commission Nationale Anti-Corruption) est l'institution camerounaise chargée de la lutte contre la corruption.</p><p>b) La CONAC a pour rôle de sensibiliser, de prévenir et de lutter contre les pratiques de corruption, tout en recevant les dénonciations et en collaborant avec la justice.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Médias, opinion publique et esprit critique (4 points)",
      "points": "4 pts",
      "enonce": "<p>Cet exercice porte sur le rôle des médias et l'importance du recoupement des informations.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Rôle des médias (2 pts)</strong></p><p>a) Cite et explique deux missions essentielles de la presse. (1 pt)</p><p>b) À ton avis, pourquoi est-il important de développer son esprit critique face aux informations diffusées par les médias ? (1 pt)</p>",
          "reponse": "<p>a) Les missions essentielles de la presse sont : informer (fournir des faits et des analyses sur l'actualité), éduquer (contribuer à la formation intellectuelle des citoyens), et divertir (proposer des contenus de loisir).</p><p>b) Il est important de développer son esprit critique pour ne pas être manipulé par de fausses informations (désinformation), pour distinguer l'information vérifiée de la rumeur et pour se forger sa propre opinion sur les sujets de société.</p>"
        },
        {
          "question": "<p><strong>2. Recoupement de l'information (2 pts)</strong></p><p>a) Définis le recoupement de l'information. (1 pt)</p><p>b) Explique pourquoi le recoupement est essentiel à l'ère des réseaux sociaux. (1 pt)</p>",
          "reponse": "<p>a) Le recoupement de l'information consiste à vérifier une information en la confrontant à plusieurs sources indépendantes et fiables avant de la considérer comme vraie.</p><p>b) Le recoupement est essentiel à l'ère des réseaux sociaux car la circulation des fausses informations (fake news) y est rapide et massive. Les réseaux sociaux peuvent amplifier des rumeurs, des manipulations et des appels à la haine. Vérifier les sources permet de ne pas participer à la propagation de ces fausses informations.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les formes de violence et l'extrémisme (3 points)",
      "points": "3 pts",
      "enonce": "<p>Ce sujet traite des différentes formes de violence et des moyens de lutter contre l'extrémisme.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Reconnaissance des violences (1,5 pts)</strong></p><p>Définis les trois types d'atteintes suivants :</p><p>a) Atteinte à l'intégrité physique (0,5 pt)</p><p>b) Atteinte à l'intégrité morale (0,5 pt)</p><p>c) Atteinte à l'intégrité patrimoniale (0,5 pt)</p>",
          "reponse": "<p>a) L'atteinte à l'intégrité physique désigne toute violence corporelle (coups et blessures, violences sexuelles, homicides).</p><p>b) L'atteinte à l'intégrité morale regroupe les humiliations, les discriminations, le mépris, le dénigrement et le harcèlement moral.</p><p>c) L'atteinte à l'intégrité patrimoniale concerne les vols, les destructions de biens, les incendies criminels et les spoliations.</p>"
        },
        {
          "question": "<p><strong>2. Causes et lutte contre l'extrémisme (1,5 pts)</strong></p><p>a) Cite deux causes de l'extrémisme violent. (1 pt)</p><p>b) Propose une stratégie de prévention pour lutter contre ce phénomène. (0,5 pt)</p>",
          "reponse": "<p>a) Les causes de l'extrémisme violent incluent : la pauvreté et l'exclusion sociale, l'ignorance et l'endoctrinement, le sentiment d'injustice, ou encore la manipulation identitaire.</p><p>b) Une stratégie de prévention efficace est l'éducation à la paix et à la citoyenneté, qui permet de développer l'esprit critique, de promouvoir le dialogue et de renforcer le vivre-ensemble.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Stratégies de paix et résolution des conflits (3 points)",
      "points": "3 pts",
      "enonce": "<p>Cet exercice porte sur la promotion de la paix et les méthodes de règlement pacifique des différends.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Concepts de paix (1,5 pts)</strong></p><p>a) Définis la paix. (0,75 pt)</p><p>b) Distingue la paix négative de la paix positive. (0,75 pt)</p>",
          "reponse": "<p>a) La paix est un état d'harmonie sociale et d'absence de violence, que ce soit au niveau individuel, communautaire ou international.</p><p>b) La paix négative se limite à une simple absence de guerre ou de conflit armé. La paix positive, quant à elle, est un état de justice sociale, de respect des droits, de solidarité et de bien-être partagé.</p>"
        },
        {
          "question": "<p><strong>2. Méthodes de règlement pacifique (1,5 pts)</strong></p><p>Cite et explique deux méthodes de règlement pacifique des conflits. (1,5 pts)</p>",
          "reponse": "<p>Deux méthodes de règlement pacifique des conflits sont :</p><p>La négociation : un dialogue direct entre les parties en conflit pour trouver un accord mutuellement acceptable.</p><p>La médiation : l'intervention d'un tiers neutre (le médiateur) qui facilite la communication entre les parties et les aide à trouver une solution.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
