<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Éducation Civique et Morale",
 "classe": "Première",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Les droits humains et leur protection",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Les droits humains sont des prérogatives reconnues à tout être humain.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez les droits de l'homme et présentez brièvement la Déclaration Universelle des Droits de l'Homme (1948). (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Les droits de l'homme sont un ensemble de prérogatives reconnues à tout individu, garantissant sa dignité et sa liberté. La Déclaration Universelle des Droits de l'Homme, adoptée en 1948 par l'ONU, est un texte fondamental qui énonce les droits inaliénables de chaque être humain, indépendamment de sa nationalité, de son origine ou de sa religion.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>2.</strong> Classez les droits suivants dans les bonnes catégories : droit à l'éducation, droit à la paix, droit à la vie. (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>- Droit à l'éducation : droit économique, social et culturel.<br>- Droit à la paix : droit de solidarité.<br>- Droit à la vie : droit civil et politique.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>3.</strong> Citez deux institutions de protection des droits de l'homme au Cameroun et expliquez brièvement leur mission. (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>- La Commission Nationale des Droits de l'Homme et des Libertés (CNDHL) : institution nationale chargée de la promotion et de la protection des droits de l'homme au Cameroun.<br>- Le Ministère de la Justice : garant de la protection judiciaire des citoyens, il veille au respect des droits fondamentaux devant les tribunaux.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>4.</strong> Donnez un exemple de violation des droits humains que vous pouvez observer dans la vie quotidienne. (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>- La discrimination à l'emploi fondée sur le sexe ou l'origine ethnique.<br>- La privation d'accès à une éducation de qualité pour certaines communautés.<br>- Des violences physiques ou verbales, comme les humiliations et le harcèlement.</div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : L'intégrité morale",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>L'intégrité morale est une qualité essentielle dans la vie sociale et professionnelle.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1em;'><strong>1.</strong> Qu'est-ce que l'intégrité morale ? Quelles sont ses valeurs fondamentales ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>L'intégrité morale est la qualité d'une personne honnête, droite, incorruptible et respectueuse des principes éthiques. Ses valeurs fondamentales sont l'honnêteté, la probité, la transparence, la justice et le respect de la dignité humaine.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>2.</strong> Au Cameroun, quelles institutions luttent contre les manquements à l'intégrité morale ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Les principales institutions sont la Commission Nationale Anti-Corruption (CONAC), chargée de prévenir et de lutter contre la corruption, et le Consortium pour la lutte contre la corruption (CONSUPE).</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>3.</strong> Pourquoi l'intégrité morale est-elle importante dans la fonction publique ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>L'intégrité morale dans la fonction publique est indispensable pour garantir la bonne gestion des ressources publiques, la confiance des citoyens envers l'État, et l'équité dans le traitement des usagers. Elle permet de lutter contre la corruption et de promouvoir une administration transparente et juste.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>4.</strong> Proposez un mécanisme de dénonciation des atteintes à l'intégrité morale. (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Un mécanisme efficace est la saisine directe des institutions compétentes comme la CONAC ou le CONSUPE, qui disposent de canaux de dénonciation anonyme. Il peut également s'agir du recours aux autorités judiciaires ou administratives compétentes (tribunaux, ministères, médiateur).</div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Médias, opinion publique et esprit critique",
     "points": "5 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Les médias exercent une influence considérable sur l'opinion publique.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez les médias et citez les principaux types présents au Cameroun. (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Les médias sont des moyens de diffusion massive de l'information. Au Cameroun, on distingue :<br>- La presse écrite (Cameroon Tribune, Mutations, etc.)<br>- Les médias audiovisuels (CRTV, Canal 2, radios)<br>- Les médias numériques (internet, réseaux sociaux).</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>2.</strong> Qu'est-ce que le recoupement de l'information et pourquoi est-il fondamental ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Le recoupement de l'information consiste à vérifier une information auprès de plusieurs sources indépendantes avant de la considérer comme fiable. Il est fondamental pour distinguer les faits des rumeurs, lutter contre la désinformation et garantir l'exercice d'un journalisme responsable.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>3.</strong> Quels sont les principaux dangers des médias pour l'opinion publique ? (1,5 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Les principaux dangers sont :<br>- La propagation de fausses informations (désinformation) qui peut manipuler l'opinion.<br>- Les appels à la haine ou au tribalisme qui menacent la cohésion sociale.<br>- Les atteintes à la réputation des personnes ou des institutions par la diffamation.<br>- La marchandisation de l'information au profit de la publicité, qui peut déformer la réalité.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>4.</strong> Expliquez la différence entre une information journalistique et une information commerciale (publicité). (0,5 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>L'information journalistique a pour vocation d'informer le citoyen de manière objective et vérifiée, tandis que l'information commerciale (publicité) cherche à promouvoir un produit ou un service, souvent en cherchant à influencer les comportements d'achat par des messages séduisants.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>5.</strong> Pourquoi est-il important de développer un esprit critique face aux médias ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Développer un esprit critique permet de ne pas être passif face aux informations reçues, de questionner leur source, leur objectivité et leur finalité. Cela permet de se forger une opinion éclairée et de résister aux manipulations et aux discours de haine, contribuant ainsi à une citoyenneté active et responsable.</div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Les formes de violence et l'extrémisme violent",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Les violences et l'extrémisme violent menacent la stabilité des sociétés.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez les atteintes à l'intégrité physique, morale et patrimoniale. (1,5 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>- Atteintes à l'intégrité physique : violences corporelles (coups, blessures), violences sexuelles (harcèlement, viol), homicides.<br>- Atteintes à l'intégrité morale : humiliations, discriminations, mépris, dénigrement, harcèlement moral.<br>- Atteintes à l'intégrité patrimoniale : vols, destructions de biens, incendies criminels, spoliations.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>2.</strong> Qu'est-ce que l'extrémisme violent ? Citez deux de ses causes. (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>L'extrémisme violent est le recours à la violence pour imposer ses idées politiques, religieuses ou idéologiques. Ses causes sont multiples : la pauvreté et l'exclusion sociale, l'ignorance et l'endoctrinement, le sentiment d'injustice, ou la manipulation identitaire.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>3.</strong> Quelles sont les conséquences de l'extrémisme violent sur les populations ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Les conséquences sont graves : pertes en vies humaines, déplacements forcés de populations, destruction des biens et des infrastructures, traumatismes psychologiques profonds. Ces violences freinent le développement et détruisent le tissu social.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>4.</strong> Quels acteurs participent à la lutte contre l'extrémisme violent ? (0,5 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>Les acteurs sont multiples : l'État avec ses forces de défense et de sécurité, les organisations internationales (ONU, Union africaine), la société civile, les associations locales, les institutions religieuses et les communautés elles-mêmes.</div>"
       }
     ]
   },
   {
     "titre": "Exercice 5 : La paix et le règlement pacifique des conflits",
     "points": "3 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>La paix est un idéal à construire au quotidien.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1em;'><strong>1.</strong> Quelle différence faites-vous entre paix négative et paix positive ? (1 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>La paix négative est l'absence de guerre ou de violence directe, tandis que la paix positive va au-delà : c'est un état de justice sociale, d'équité et d'harmonie durable, fondé sur le respect des droits humains et la solidarité.</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>2.</strong> Citez et expliquez deux méthodes de règlement pacifique des conflits. (1,5 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>- La médiation : un tiers neutre intervient pour faciliter le dialogue entre les parties en conflit et les aider à trouver une solution acceptée par tous.<br>- L'arbitrage : les parties confient la résolution de leur conflit à un arbitre (tiers impartial) qui rend une décision qui s'impose à elles. (On peut aussi citer la négociation, la conciliation, ou le recours à la justice).</div>"
       },
       {
         "question": "<div style='font-size: 1em;'><strong>3.</strong> Selon vous, quel est le rôle de l'éducation dans la promotion de la paix ? (0,5 pt)</div>",
         "reponse": "<div style='font-size: 1em;'>L'éducation joue un rôle fondamental en transmettant les valeurs de tolérance, de respect et de dialogue. L'éducation à la paix apprend aux jeunes à gérer les conflits sans violence et à construire ensemble un avenir commun.</div>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
