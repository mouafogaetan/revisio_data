<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Première A",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Optimisation de l'environnement de travail (8 pts)",
      "points": "8 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'>\n<p>Le disque dur de l'ordinateur du laboratoire est en panne. Le technicien doit installer un nouveau disque dur et préparer l'ordinateur pour qu'il fonctionne correctement. Réponds aux questions suivantes en justifiant tes réponses.</p>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Définis les termes suivants :</p>\n<ul>\n  <li><strong>a) Partitionnement (1 pt)</strong></li>\n  <li><strong>b) Formatage (1 pt)</strong></li>\n</ul>",
          "reponse": "<p><strong>a) Partitionnement :</strong> Le partitionnement est l'action de diviser un disque dur en plusieurs parties logiques appelées partitions. Chaque partition fonctionne comme un disque indépendant.</p>\n<p><strong>b) Formatage :</strong> Le formatage est l'opération qui prépare un disque ou une partition à recevoir des données en y créant un système de fichiers. Il efface toutes les données existantes.</p>"
        },
        {
          "question": "<p><strong>2. (3 pts)</strong> Le technicien décide de partitionner le disque dur. Explique l'utilité du partitionnement d'un disque dur.</p>\n<p>(Cite au moins deux avantages)</p>",
          "reponse": "<p>L'utilité du partitionnement est :</p>\n<ul>\n  <li><strong>Organisation des données :</strong> Cela permet de séparer les données, par exemple les fichiers système sur une partition et les fichiers personnels sur une autre. En cas de problème sur une partition, les autres ne sont pas affectées.</li>\n  <li><strong>Installation de plusieurs systèmes d'exploitation :</strong> Le partitionnement permet d'installer plusieurs systèmes d'exploitation (comme Windows et Linux) sur le même disque dur.</li>\n</ul>"
        },
        {
          "question": "<p><strong>3. (3 pts)</strong> Explique clairement la différence entre le formatage et le partitionnement. Quelle action doit être réalisée en premier ? Justifie ta réponse.</p>",
          "reponse": "<p><strong>Différence :</strong></p>\n<ul>\n  <li>Le <strong>partitionnement</strong> est une opération logique qui divise le disque en parties distinctes.</li>\n  <li>Le <strong>formatage</strong> est une opération physique/logique qui prépare une partition à stocker des fichiers en créant un système de fichiers.</li>\n</ul>\n<p><strong>Ordre :</strong> Le partitionnement doit être réalisé en premier, car le formatage s'applique à une partition spécifique. Il faut d'abord créer les partitions, puis les formater.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Sécurité informatique (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #fff5e6; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'>\n<p>Un élève du lycée a oublié son mot de passe pour se connecter à son compte informatique. Il te demande de l'aider à comprendre les enjeux de la sécurité informatique.</p>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (1.5 pt)</strong> Définis la <strong>sécurité informatique</strong>.</p>",
          "reponse": "<p>La sécurité informatique est l'ensemble des moyens techniques, humains et juridiques mis en place pour protéger les systèmes informatiques, les données et les échanges contre les menaces (accès non autorisé, destruction, modification, etc.).</p>"
        },
        {
          "question": "<p><strong>2. (1.5 pt)</strong> Énonce les trois principes fondamentaux de la sécurité informatique en les expliquant brièvement.</p>",
          "reponse": "<p>Les trois principes fondamentaux sont :</p>\n<ul>\n  <li><strong>Confidentialité :</strong> Garantir que seules les personnes autorisées peuvent accéder à l'information.</li>\n  <li><strong>Intégrité :</strong> Assurer que les données ne sont pas modifiées de manière non autorisée.</li>\n  <li><strong>Disponibilité :</strong> Garantir que les données et les systèmes sont accessibles quand les utilisateurs en ont besoin.</li>\n</ul>"
        },
        {
          "question": "<p><strong>3. (1.5 pt)</strong> Définis les termes :</p>\n<ul>\n  <li><strong>a) Antivirus (0.75 pt)</strong></li>\n  <li><strong>b) Cryptage (0.75 pt)</strong></li>\n</ul>",
          "reponse": "<p><strong>a) Antivirus :</strong> Un antivirus est un logiciel conçu pour détecter, bloquer et supprimer les logiciels malveillants (virus, vers, chevaux de Troie) d'un ordinateur.</p>\n<p><strong>b) Cryptage :</strong> Le cryptage est un procédé qui consiste à transformer des données en un format illisible sans une clé de déchiffrement, afin de protéger leur confidentialité.</p>"
        },
        {
          "question": "<p><strong>4. (1.5 pt)</strong> Donne deux exemples de techniques de protection des données.</p>",
          "reponse": "<p>Exemples :</p>\n<ul>\n  <li><strong>Mot de passe :</strong> Utiliser un mot de passe fort et unique pour se connecter à ses comptes.</li>\n  <li><strong>Sauvegarde régulière :</strong> Faire des copies de sécurité de ses fichiers importants sur un support externe ou dans le Cloud pour les récupérer en cas de problème.</li>\n</ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Feuille de calcul (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #f0fff0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'>\n<p>Tu dois créer une feuille de calcul pour gérer les notes de ta classe en Informatique. Les notes des cinq premiers élèves sur 20 sont les suivantes :</p>\n<ul>\n  <li>Élève 1 : 14, 16, 12</li>\n  <li>Élève 2 : 10, 8, 15</li>\n  <li>Élève 3 : 18, 17, 19</li>\n  <li>Élève 4 : 9, 11, 10</li>\n  <li>Élève 5 : 13, 14, 12</li>\n</ul>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Identifie les éléments d'une feuille de calcul en répondant aux questions :</p>\n<ul>\n  <li><strong>a) (1 pt)</strong> Définis une plage de cellules.</li>\n  <li><strong>b) (1 pt)</strong> Quelle est la différence entre une colonne et une ligne ?</li>\n</ul>",
          "reponse": "<p><strong>a) Plage de cellules :</strong> Une plage de cellules est un ensemble de cellules sélectionnées dans une feuille de calcul. Elle est désignée par les coordonnées de la cellule en haut à gauche et celle en bas à droite séparées par deux points (exemple : B2:E4).</p>\n<p><strong>b) Différence colonne/ligne :</strong> Une colonne est un ensemble de cellules alignées verticalement (identifiées par une lettre), tandis qu'une ligne est un ensemble de cellules alignées horizontalement (identifiées par un numéro).</p>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> À l'aide d'un tableur, organise ces données comme suit :</p>\n<ul>\n  <li><strong>a) (1 pt)</strong> Crée un tableau avec les colonnes : NOM, Note T1, Note T2, Note T3, MOYENNE.</li>\n  <li><strong>b) (1 pt)</strong> Quelle formule utiliserais-tu pour calculer la moyenne de l'Élève 1 ? (Utilise la fonction appropriée)</li>\n</ul>",
          "reponse": "<p><strong>a)</strong> Tableau :</p>\n<table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'>\n  <tr style='background: #d4edda;'><th>NOM</th><th>Note T1</th><th>Note T2</th><th>Note T3</th><th>MOYENNE</th></tr>\n  <tr><td>Élève 1</td><td>14</td><td>16</td><td>12</td><td></td></tr>\n  <tr><td>Élève 2</td><td>10</td><td>8</td><td>15</td><td></td></tr>\n  <tr><td>Élève 3</td><td>18</td><td>17</td><td>19</td><td></td></tr>\n  <tr><td>Élève 4</td><td>9</td><td>11</td><td>10</td><td></td></tr>\n  <tr><td>Élève 5</td><td>13</td><td>14</td><td>12</td><td></td></tr>\n</table>\n<p><strong>b)</strong> La formule pour calculer la moyenne de l'Élève 1 est : <strong>=MOYENNE(B2:D2)</strong> (si B2, C2 et D2 contiennent les notes).</p>"
        },
        {
          "question": "<p><strong>3. (2 pts)</strong> Interprète les résultats :</p>\n<ul>\n  <li><strong>a) (1 pt)</strong> Quel élève a la meilleure moyenne ? Justifie.</li>\n  <li><strong>b) (1 pt)</strong> Quelle est la moyenne de la classe en Note T1 ?</li>\n</ul>",
          "reponse": "<p><strong>a)</strong> L'Élève 3 a la meilleure moyenne car ses notes sont les plus élevées : (18+17+19)/3 = 18.</p>\n<p><strong>b)</strong> La moyenne de la classe en Note T1 est : (14+10+18+9+13)/5 = 64/5 = 12.8.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : PréAO et Multimédia (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #e6f2ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'>\n<p>Le club d'Informatique du lycée souhaite créer une présentation pour les nouveaux élèves de Première A. Les membres du club doivent utiliser les outils de PréAO (Préparation Assistée par Ordinateur) pour réaliser ce travail.</p>\n</div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis la <strong>PréAO</strong>.</p>",
          "reponse": "<p>La PréAO (Préparation Assistée par Ordinateur) désigne l'ensemble des techniques et des logiciels utilisés pour créer des présentations assistées par ordinateur, comme des diaporamas destinés à être projetés lors d'exposés, de conférences ou de cours.</p>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Cite deux usages des logiciels de présentation.</p>",
          "reponse": "<p>Usages :</p>\n<ul>\n  <li><strong>Enseignement :</strong> Pour présenter des cours de manière structurée et visuelle, avec des images, des schémas et des animations.</li>\n  <li><strong>Communication professionnelle :</strong> Pour présenter des rapports, des résultats de projet ou des propositions commerciales de façon claire et synthétique.</li>\n</ul>"
        },
        {
          "question": "<p><strong>3. (2 pts)</strong> Explique comment tu procéderais pour :</p>\n<ul>\n  <li><strong>a) (1 pt)</strong> Animer un objet dans une diapositive sous MS PowerPoint.</li>\n  <li><strong>b) (1 pt)</strong> Insérer une vidéo dans une présentation.</li>\n</ul>",
          "reponse": "<p><strong>a) Animer un objet :</strong> Sous MS PowerPoint, je sélectionne l'objet (image, texte, forme), je vais dans l'onglet 'Animation' et je choisis une animation parmi les différentes catégories (Entrée, Accentuation, Sortie). Je peux ensuite configurer la durée, le déclencheur et l'ordre de l'animation.</p>\n<p><strong>b) Insérer une vidéo :</strong> Je vais dans l'onglet 'Insertion', je clique sur 'Vidéo', puis je sélectionne 'Vidéo sur mon PC' ou 'Vidéo en ligne' selon la source. Ensuite, je choisis le fichier vidéo, et je le positionne sur la diapositive. Je peux ajuster la taille et les options de lecture.</p>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
