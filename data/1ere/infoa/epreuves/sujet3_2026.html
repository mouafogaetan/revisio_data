<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info 1ère A",
  "classe": "Première A",
  "sequence": "Évaluation séquentielle n°3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Optimisation et sécurité de l'environnement informatique (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Cet exercice porte sur l'optimisation d'un environnement de travail et les concepts fondamentaux de la sécurité informatique.</div>",
      "questions": [
        {
          "question": "1) Définissez les termes suivants : <ul><li>Partitionnement</li><li>Pilote (driver)</li><li>Formatage</li></ul>",
          "reponse": "<ul><li><strong>Partitionnement</strong> : Opération qui consiste à diviser un disque dur en plusieurs parties logiques appelées partitions, afin d'organiser les données ou d'installer plusieurs systèmes d'exploitation.</li><li><strong>Pilote (driver)</strong> : Logiciel qui permet au système d'exploitation de communiquer avec un périphérique matériel (imprimante, carte graphique, etc.)</li><li><strong>Formatage</strong> : Opération qui prépare un support de stockage (disque dur, clé USB) à recevoir des données en créant un système de fichiers.</li></ul>"
        },
        {
          "question": "2) Citez trois actions nécessaires pour préparer un nouveau disque dur à recevoir des données.",
          "reponse": "<ul><li>Le partitionnement (division en parties logiques)</li><li>Le formatage (création du système de fichiers)</li><li>L'installation d'un système d'exploitation (si le disque doit être bootable)</li></ul>"
        },
        {
          "question": "3) Énoncez les trois principes fondamentaux de la sécurité informatique et expliquez-les brièvement.",
          "reponse": "<ul><li><strong>Confidentialité</strong> : Garantir que les données ne sont accessibles qu'aux personnes autorisées.</li><li><strong>Intégrité</strong> : Assurer que les données ne sont pas altérées ou modifiées de manière non autorisée.</li><li><strong>Disponibilité</strong> : Veiller à ce que les données et les systèmes soient accessibles et fonctionnels quand les utilisateurs en ont besoin.</li></ul>"
        },
        {
          "question": "4) Expliquez l'utilité du cryptage et de la sauvegarde dans la protection des données.",
          "reponse": "<ul><li><strong>Le cryptage</strong> : Transforme les données en un format illisible sans la clé de déchiffrement, protégeant ainsi la confidentialité des informations même si elles sont interceptées.</li><li><strong>La sauvegarde</strong> : Crée une copie des données sur un support séparé, permettant de les restaurer en cas de perte, de panne matérielle ou de cyberattaque (ransomware).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Tableur - Formules et fonctions (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Vous travaillez sur un tableur. Voici une feuille de calcul avec les notes de trois élèves :</div><div style='overflow-x:auto; margin:12px 0;'><table style='border-collapse:collapse; width:100%; min-width:250px; background:#f9f9f9;'><tr style='background:#e0e0e0;'><th style='border:1px solid #ccc; padding:8px; text-align:center;'> </th><th style='border:1px solid #ccc; padding:8px; text-align:center;'>A</th><th style='border:1px solid #ccc; padding:8px; text-align:center;'>B</th><th style='border:1px solid #ccc; padding:8px; text-align:center;'>C</th></tr><tr><td style='border:1px solid #ccc; padding:8px; font-weight:bold;'>1</td><td style='border:1px solid #ccc; padding:8px;'><strong>Élève</strong></td><td style='border:1px solid #ccc; padding:8px;'><strong>Maths</strong></td><td style='border:1px solid #ccc; padding:8px;'><strong>Physique</strong></td></tr><tr><td style='border:1px solid #ccc; padding:8px; font-weight:bold;'>2</td><td style='border:1px solid #ccc; padding:8px;'>Alice</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>15</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>12</td></tr><tr><td style='border:1px solid #ccc; padding:8px; font-weight:bold;'>3</td><td style='border:1px solid #ccc; padding:8px;'>Bob</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>11</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>14</td></tr><tr><td style='border:1px solid #ccc; padding:8px; font-weight:bold;'>4</td><td style='border:1px solid #ccc; padding:8px;'>Charlie</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>8</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>9</td></tr></table></div>",
      "questions": [
        {
          "question": "1) Quelle formule doit-on écrire dans la cellule D2 pour calculer la moyenne d'Alice en Maths et Physique ?",
          "reponse": "`=MOYENNE(B2:C2)` ou `=(B2+C2)/2`"
        },
        {
          "question": "2) Écrivez la formule à utiliser pour obtenir la somme des notes de Maths (colonne B) dans la cellule B5.",
          "reponse": "`=SOMME(B2:B4)`"
        },
        {
          "question": "3) Quelle fonction permet de compter le nombre d'élèves qui ont une note supérieure ou égale à 10 en Physique ? Écrivez la formule correspondante pour la colonne C (cellules C2 à C4).",
          "reponse": "La fonction est `NB.SI`. La formule serait `=NB.SI(C2:C4;\">=10\")`."
        },
        {
          "question": "4) Interprétez le résultat de la formule `=MOYENNE(C2:C4)`. Que représente-t-il ?",
          "reponse": "Cette formule calcule la moyenne des notes de Physique pour les trois élèves (Alice, Bob et Charlie). Le résultat est (12+14+9)/3 = 11.67 environ."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Algorithmique et programmation (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Le programme ci-dessous, écrit en langage naturel, permet de calculer le périmètre et la surface d'un rectangle à partir de sa longueur et de sa largeur.</div><div style='background:#f0f0f0; padding:12px; border-radius:8px; margin:12px 0; font-family:monospace;'><strong>Algorithme : CalculRectangle</strong><br>Variables : L, l, P, S en Nombre<br>Début<br>    Écrire(\"Entrez la longueur : \")<br>    Lire(L)<br>    Écrire(\"Entrez la largeur : \")<br>    Lire(l)<br>    P ← 2 * (L + l)<br>    S ← L * l<br>    Écrire(\"Le périmètre est : \", P)<br>    Écrire(\"La surface est : \", S)<br>Fin</div>",
      "questions": [
        {
          "question": "1) Donnez la définition des termes suivants : <ul><li>Algorithme</li><li>Variable</li><li>Instruction d'affectation</li></ul>",
          "reponse": "<ul><li><strong>Algorithme</strong> : Une suite finie et ordonnée d'instructions qui permet de résoudre un problème ou d'effectuer une tâche.</li><li><strong>Variable</strong> : Un espace mémoire nommé qui peut contenir une valeur et dont le contenu peut varier au cours de l'exécution du programme.</li><li><strong>Instruction d'affectation</strong> : Une instruction qui permet de stocker une valeur dans une variable (comme `P ← 2 * (L + l)`).</li></ul>"
        },
        {
          "question": "2) Identifiez dans l'algorithme ci-dessus : <ul><li>Une instruction d'affectation</li><li>Une instruction d'affichage</li><li>Une instruction d'entrée (lecture)</li></ul>",
          "reponse": "<ul><li><strong>Instruction d'affectation</strong> : `P ← 2 * (L + l)` ou `S ← L * l`</li><li><strong>Instruction d'affichage</strong> : `Écrire(\"Le périmètre est : \", P)` ou `Écrire(\"Entrez la longueur : \")`</li><li><strong>Instruction d'entrée</strong> : `Lire(L)` ou `Lire(l)`</li></ul>"
        },
        {
          "question": "3) Réalisez la trace d'exécution de l'algorithme pour les valeurs L=7 et l=3. Présentez votre réponse sous forme de tableau.",
          "reponse": "<div style='overflow-x:auto;'><table style='border-collapse:collapse; width:100%; min-width:200px;'><tr style='background:#e0e0e0;'><th style='border:1px solid #ccc; padding:8px;'>Étape</th><th style='border:1px solid #ccc; padding:8px;'>Instruction</th><th style='border:1px solid #ccc; padding:8px;'>Valeur de L</th><th style='border:1px solid #ccc; padding:8px;'>Valeur de l</th><th style='border:1px solid #ccc; padding:8px;'>Valeur de P</th><th style='border:1px solid #ccc; padding:8px;'>Valeur de S</th></tr><tr><td style='border:1px solid #ccc; padding:8px; text-align:center;'>1</td><td style='border:1px solid #ccc; padding:8px;'>Lire(L)</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>7</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>? (non définie)</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>? </td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>? </td></tr><tr><td style='border:1px solid #ccc; padding:8px; text-align:center;'>2</td><td style='border:1px solid #ccc; padding:8px;'>Lire(l)</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>7</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>3</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>? </td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>? </td></tr><tr><td style='border:1px solid #ccc; padding:8px; text-align:center;'>3</td><td style='border:1px solid #ccc; padding:8px;'>P ← 2*(L+l)</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>7</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>3</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>20</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>? </td></tr><tr><td style='border:1px solid #ccc; padding:8px; text-align:center;'>4</td><td style='border:1px solid #ccc; padding:8px;'>S ← L * l</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>7</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>3</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>20</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>21</td></tr></table></div>"
        },
        {
          "question": "4) Représentez graphiquement cet algorithme sous la forme d'un organigramme en utilisant les symboles adéquats.",
          "reponse": "L'organigramme utilise : un symbole de début/fin (rectangle aux bords arrondis) pour 'Début' et 'Fin', un symbole d'entrée/sortie (parallélogramme) pour les instructions 'Écrire' et 'Lire', et un symbole de traitement (rectangle) pour les affectations 'P ← ...' et 'S ← ...'. Les flèches relient les étapes dans l'ordre séquentiel."
        }
      ]
    },
    {
      "titre": "Exercice 4 : Infographie et multimédia (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Les questions suivantes portent sur les images, les sons et les vidéos.</div>",
      "questions": [
        {
          "question": "1) Distinguez une image matricielle (bitmap) d'une image vectorielle.",
          "reponse": "<ul><li><strong>Image matricielle (bitmap)</strong> : Composée d'une grille de pixels, chaque pixel ayant une couleur définie. Elle perd en qualité lorsqu'on l'agrandit (pixelisation). Exemples : JPEG, PNG, GIF.</li><li><strong>Image vectorielle</strong> : Composée d'objets géométriques définis par des formules mathématiques (lignes, courbes, polygones). Elle peut être agrandie à l'infini sans perte de qualité. Exemples : SVG, AI, EPS.</li></ul>"
        },
        {
          "question": "2) Calculez la résolution d'une image (nombre total de pixels) qui a une largeur de 1920 pixels et une hauteur de 1080 pixels.",
          "reponse": "La résolution (nombre total de pixels) est : 1920 x 1080 = 2 073 600 pixels, soit environ 2,07 mégapixels."
        },
        {
          "question": "3) Citez deux formats de fichiers pour chaque type de média ci-dessous. <ul><li>Images</li><li>Sons</li><li>Vidéos</li></ul>",
          "reponse": "<ul><li><strong>Images</strong> : JPEG, PNG</li><li><strong>Sons</strong> : MP3, WAV</li><li><strong>Vidéos</strong> : MP4, AVI</li></ul>"
        },
        {
          "question": "4) Citez deux logiciels de traitement d'images et une opération infographique courante.",
          "reponse": "<ul><li><strong>Logiciels</strong> : Adobe Photoshop, GIMP.</li><li><strong>Opération infographique</strong> : Recadrage (couper une partie de l'image pour améliorer la composition), correction des imperfections (supprimer des défauts), montage (assembler plusieurs images).</li></ul>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
