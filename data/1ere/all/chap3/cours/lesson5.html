<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */

    }

        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>

</div>
<script>
$(function() {
    // ================================================================

    const slides = [
    {
        "titre": "Einführung: Gesundheit und Lebensweise",
        "contenu": "<div style='font-size: 0.95rem; line-height: 1.6; color:#fff'><p><strong>Willkommen zum Thema:</strong> Gesundheit und Lebensweise.</p><p>Heute sprechen wir über wichtige Themen, die unser tägliches Leben betreffen:</p><ul style='list-style-type: none; padding: 0; color:#000'><li style='background: #e8f5e9; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>🏥 Krankheiten (Diabetes, Adipositas)</strong></li><li style='background: #e3f2fd; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>🧼 Hygiene und gesunde Ernährung</strong></li><li style='background: #f3e5f5; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>🌿 Traditionelle vs. moderne Medizin</strong></li></ul><p style='margin-top: 15px;'><em>Ziel: Wir lernen, über Krankheiten zu sprechen, über Hygiene zu diskutieren und die Rolle der traditionellen Medizin zu verstehen.</em></p></div>",
        "texteParle": "Bonjour à tous et bienvenue. Aujourd'hui, nous abordons un sujet très important : la santé et le mode de vie. Nous allons parler des maladies comme le diabète et l'obésité, de l'hygiène et de l'alimentation saine. Nous discuterons également du rôle de la médecine traditionnelle par rapport à la médecine moderne. L'objectif est d'apprendre à parler de ces sujets et à adopter de bonnes habitudes pour notre bien-être.",
        "note": "Introduction du sujet : santé et mode de vie."
    },
    {
        "titre": "Krankheiten: Diabetes und Adipositas",
        "contenu": "<div style='display: flex; flex-direction: column; gap: 10px; font-size: 0.95rem;'><div style='background: #ffebee; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>🍬 Diabetes (Zuckerkrankheit)</h4><p><strong>Ursachen:</strong> Ungesunde Ernährung, zu viel Zucker, Bewegungsmangel.</p><p><strong>Symptome:</strong> Durst, Müdigkeit, häufiges Wasserlassen.</p><p><strong>Behandlung:</strong> Diät, Bewegung, Medikamente (Insulin).</p></div><div style='background: #fff3e0; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>⚖️ Adipositas (Fettleibigkeit)</h4><p><strong>Ursachen:</strong> Ungesunde Ernährung, zu viel fettes Essen, wenig Bewegung.</p><p><strong>Folgen:</strong> Herzprobleme, Gelenkschmerzen, Diabetes-Risiko.</p><p><strong>Lösungen:</strong> Sport, gesunde Ernährung, mehr Obst und Gemüse.</p></div><p style='background: #e3f2fd; padding: 10px; border-radius: 5px;; color: #000000'><strong>Merke:</strong> Diese Krankheiten sind oft vermeidbar!</p></div>",
        "texteParle": "Commençons par deux maladies courantes : le diabète et l'obésité. Le diabète est causé par une alimentation trop sucrée et un manque d'exercice. Les symptômes sont la soif, la fatigue et une envie fréquente d'uriner. On le traite avec un régime alimentaire, de l'exercice et parfois des médicaments. L'obésité, quant à elle, est due à une mauvaise alimentation riche en graisses et à un manque d'activité physique. Elle peut entraîner des problèmes cardiaques et augmenter le risque de diabète. La bonne nouvelle, c'est que ces maladies sont souvent évitables.",
        "note": "Description des causes, symptômes et traitements du diabète et de l'obésité."
    },
    {
        "titre": "Hygiene und gesunde Ernährung",
        "contenu": "<div style='display: flex; flex-direction: column; gap: 10px; font-size: 0.95rem;'><div style='background: #e8f5e9; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>🧼 Hygiene</h4><ul><li><strong>Händewaschen:</strong> Vor dem Essen und nach dem Toilettengang.</li><li><strong>Zähneputzen:</strong> Mindestens zweimal täglich.</li><li><strong>Duschen:</strong> Regelmäßig, besonders bei Hitze.</li><li><strong>Krankheitsübertragung:</strong> Hygiene schützt vor Infektionen.</li></ul></div><div style='background: #e3f2fd; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>🥗 Gesunde Ernährung</h4><ul><li><strong>Obst und Gemüse:</strong> Täglich essen.</li><li><strong>Wasser trinken:</strong> Mindestens 1,5 Liter pro Tag.</li><li><strong>Weniger Zucker und Fett:</strong> Vermeiden von Süßigkeiten und Fast Food.</li><li><strong>Regelmäßige Mahlzeiten:</strong> Nicht springen!</li></ul></div></div>",
        "texteParle": "Pour rester en bonne santé, l'hygiène et l'alimentation sont essentielles. Lavez-vous les mains avant de manger et après être allé aux toilettes. Brossez-vous les dents deux fois par jour. Prenez des douches régulières, surtout quand il fait chaud. Une bonne hygiène protège contre les infections. Pour l'alimentation, mangez des fruits et des légumes tous les jours. Buvez beaucoup d'eau, au moins un litre et demi par jour. Évitez le sucre et les graisses, ainsi que la malbouffe. Et surtout, ne sautez pas de repas !",
        "note": "Conseils d'hygiène et d'alimentation saine."
    },
    {
        "titre": "Traditionelle vs. Moderne Medizin",
        "contenu": "<div style='display: flex; flex-direction: column; gap: 10px; font-size: 0.95rem;'><div style='background: #f3e5f5; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>🌿 Traditionelle Medizin</h4><ul><li><strong>Heilpflanzen:</strong> Bittere Cola, Neem, Aloe vera.</li><li><strong>Heiler (Tradipraktiker):</strong> Wissen über Kräuter und Rituale.</li><li><strong>Vorteile:</strong> Natürlich, oft günstiger, kulturell verankert.</li><li><strong>Nachteile:</strong> Nicht immer wissenschaftlich geprüft.</li></ul></div><div style='background: #e8eaf6; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>🏥 Moderne Medizin</h4><ul><li><strong>Krankenhäuser und Ärzte:</strong> Moderne Diagnostik.</li><li><strong>Medikamente:</strong> Chemisch hergestellt, wissenschaftlich getestet.</li><li><strong>Vorteile:</strong> Wirksam bei akuten Krankheiten, Operationen.</li><li><strong>Nachteile:</strong> Teuer, nicht immer zugänglich.</li></ul></div><div style='background: #fff9c4; padding: 10px; border-radius: 5px;; color: #000000'><p><strong>Fazit:</strong> Beide Systeme haben ihre Vorteile. Oft ist eine Kombination sinnvoll!</p></div></div>",
        "texteParle": "Parlons maintenant de la médecine traditionnelle et moderne. Au Cameroun, la médecine traditionnelle est très présente. On utilise des plantes comme le Neem ou l'Aloe vera. Les tradipraticiens ont un savoir sur les herbes et les rituels. Les avantages sont que c'est naturel, souvent moins cher et ancré dans la culture. Cependant, ce n'est pas toujours scientifiquement prouvé. La médecine moderne utilise des hôpitaux, des médecins et des médicaments testés. Elle est efficace pour les maladies aiguës et les opérations. Elle peut être chère et pas toujours accessible. En réalité, les deux systèmes peuvent se compléter.",
        "note": "Comparaison des avantages et inconvénients des deux systèmes médicaux."
    },
    {
        "titre": "Grammatik: Wechselpräpositionen (Dativ/Akkusativ)",
        "contenu": "<div style='font-size: 0.95rem; background: #e8eaf6; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>🔄 Wechselpräpositionen</h4><p>Es gibt 9 Präpositionen, die je nach Situation den Dativ oder den Akkusativ verlangen.</p><table style='width: 100%; border-collapse: collapse; margin: 10px 0;'><tr style='background: #c5cae9;; color: #000000'><th style='padding: 8px; border: 1px solid #5c6bc0;'>Präposition</th><th style='padding: 8px; border: 1px solid #5c6bc0;'>Dativ (Wo?)</th><th style='padding: 8px; border: 1px solid #5c6bc0;'>Akkusativ (Wohin?)</th></tr><tr><td style='padding: 8px; border: 1px solid #5c6bc0;'>in</td><td style='padding: 8px; border: 1px solid #5c6bc0;'>im Krankenhaus</td><td style='padding: 8px; border: 1px solid #5c6bc0;'>ins Krankenhaus</td></tr><tr><td style='padding: 8px; border: 1px solid #5c6bc0;'>auf</td><td style='padding: 8px; border: 1px solid #5c6bc0;'>auf dem Tisch</td><td style='padding: 8px; border: 1px solid #5c6bc0;'>auf den Tisch</td></tr><tr><td style='padding: 8px; border: 1px solid #5c6bc0;'>unter</td><td style='padding: 8px; border: 1px solid #5c6bc0;'>unter der Decke</td><td style='padding: 8px; border: 1px solid #5c6bc0;'>unter die Decke</td></tr></table><p><strong>Regel:</strong> Dativ = Ort/Position (Wo?); Akkusativ = Bewegung/Richtung (Wohin?)</p><p><em>Beispiele:</em> \"Die Medizin <strong>liegt auf dem Tisch</strong>.\" (Wo?) \"Ich lege die Medizin <strong>auf den Tisch</strong>.\" (Wohin?)</p></div>",
        "texteParle": "Nous allons réviser les prépositions à cas variable en allemand. Il y a 9 prépositions qui peuvent utiliser le datif ou l'accusatif selon le contexte. La règle est simple : on utilise le datif pour indiquer une position ou un lieu fixe, en répondant à la question 'Wo?' (où ?). On utilise l'accusatif pour indiquer un mouvement ou une direction, en répondant à 'Wohin?' (vers où ?). Par exemple, 'Die Medizin liegt auf dem Tisch' (le médicament est sur la table) utilise le datif. 'Ich lege die Medizin auf den Tisch' (je mets le médicament sur la table) utilise l'accusatif.",
        "note": "Règle des prépositions à cas variable avec exemples."
    },
    {
        "titre": "Wechselpräpositionen: Übungsbeispiele",
        "contenu": "<div style='font-size: 0.95rem; background: #e8eaf6; padding: 15px; border-radius: 10px;; color: #000000'><h4 style='margin-top: 0;'>📝 Beispiele</h4><p>Setze die richtige Form (Dativ oder Akkusativ) ein:</p><ul style='list-style: none; padding: 0;'><li style='background: #c5cae9; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>1.</strong> Das Wasser ist <strong>in</strong> ______ (die Flasche). (Wo?) → Dativ: <em>der Flasche</em></li><li style='background: #c5cae9; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>2.</strong> Ich lege das Buch <strong>auf</strong> ______ (der Tisch). (Wohin?) → Akkusativ: <em>den Tisch</em></li><li style='background: #c5cae9; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>3.</strong> Der Arzt legt die Spritze <strong>unter</strong> ______ (das Kissen). → Akkusativ: <em>das Kissen</em></li><li style='background: #c5cae9; margin: 5px 0; padding: 8px; border-radius: 5px;; color: #000000'><strong>4.</strong> Die Patientin sitzt <strong>auf</strong> ______ (der Stuhl). → Dativ: <em>dem Stuhl</em></li></ul><p><em>Fazit: Frage nach \"Wo?\" (Dativ) oder \"Wohin?\" (Akkusativ).</em></p></div>",
        "texteParle": "Voici quelques exercices pour pratiquer les prépositions à cas variable. Dans chaque phrase, vous devez choisir entre le datif et l'accusatif. Rappelez-vous : si la question est 'Wo?' (où ?), on utilise le datif. Si la question est 'Wohin?' (vers où ?), on utilise l'accusatif. Par exemple, 'Das Wasser ist in der Flasche' (l'eau est dans la bouteille) utilise le datif. 'Ich lege das Buch auf den Tisch' (je pose le livre sur la table) utilise l'accusatif.",
        "note": "Exercices d'application sur les prépositions à cas variable."
    },
    {
        "titre": "Diskussion: Rolle der traditionellen Medizin",
        "contenu": "<div style='background: #e8f5e9; padding: 15px; border-radius: 10px; font-size: 0.95rem;; color: #000000'><h4 style='margin-top: 0;'>🗣️ Diskussion in der Klasse</h4><p><strong>Thema:</strong> <em>\"Sollte die traditionelle Medizin in Kamerun stärker gefördert werden?\"</em></p><p><strong>Fragen zur Diskussion:</strong></p><ol><li>Warum nutzen viele Menschen in Kamerun traditionelle Medizin?</li><li>Welche Vorteile hat die traditionelle Medizin?</li><li>Welche Nachteile hat sie im Vergleich zur modernen Medizin?</li><li>Wie könnte man die beiden Systeme besser kombinieren?</li></ol><p><span style='background: #c8e6c9; padding: 2px 8px; border-radius: 4px;; color: #000000'><strong>Tipp:</strong> Nutzt den Wortschatz und die Grammatik (Wechselpräpositionen) aus der Stunde!</span></p></div>",
        "texteParle": "Pour terminer, nous allons organiser une discussion en classe. Le thème est : 'La médecine traditionnelle devrait-elle être davantage soutenue au Cameroun ?'. Réfléchissez à pourquoi beaucoup de gens l'utilisent, quels sont ses avantages par rapport à la médecine moderne, et comment on pourrait mieux combiner les deux systèmes. N'oubliez pas d'utiliser le vocabulaire de la leçon et les prépositions à cas variable.",
        "note": "Sujet de discussion sur le rôle de la médecine traditionnelle."
    },
    {
        "titre": "Projekt: Interview vorbereiten",
        "contenu": "<div style='background: #fff3e0; padding: 15px; border-radius: 10px; font-size: 0.95rem;; color: #000000'><h4 style='margin-top: 0;'>🎤 Projekt: Interview mit einem Arzt oder Tradipraktiker</h4><p><strong>Arbeitsauftrag:</strong></p><ol><li>Bildet Gruppen von 3-4 Schülern.</li><li>Bereitet Fragen für ein Interview vor (auf Deutsch!).</li><li>Überlegt, ob ihr einen Arzt oder einen traditionellen Heiler befragen möchtet.</li><li>Führt das Interview (oder spielt es in der Klasse vor).</li><li>Präsentiert die Ergebnisse der Klasse.</li></ol><p><strong>Beispielfragen:</strong></p><ul><li><em>\"Warum haben Sie diesen Beruf gewählt?\"</em></li><li><em>\"Welche Krankheiten behandeln Sie am häufigsten?\"</em></li><li><em>\"Was ist Ihrer Meinung nach die beste Medizin?\"</em></li></ul></div>",
        "texteParle": "Nous allons maintenant travailler sur un projet. Vous allez préparer un interview avec un médecin ou un tradipraticien. Formez des groupes de 3 ou 4, préparez des questions en allemand, et décidez qui vous voulez interroger. Vous pouvez mener l'interview dans la vraie vie, ou la jouer en classe. Présentez ensuite vos résultats à la classe. Utilisez les questions proposées comme exemple.",
        "note": "Consignes pour le projet d'interview."
    }
];
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
</script>
