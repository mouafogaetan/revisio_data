<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Première",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Questions de cours sur l'aluminothermie",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p>Répondez aux questions suivantes en vous appuyant sur vos connaissances.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Définissez l'aluminothermie. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'aluminothermie est un procédé de réduction d'oxydes métalliques par l'aluminium en poudre. Cette réaction est très exothermique, c'est-à-dire qu'elle dégage une grande quantité de chaleur, ce qui permet d'atteindre des températures de l'ordre de 2800 °C et d'obtenir le métal pur à l'état liquide.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Écrivez l'équation chimique bilan de la réaction entre l'aluminium et l'oxyde de fer (III). Nommez les produits formés. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'équation bilan est : <div class='math-block' style='background-color: #f8f9fa; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center;'><div class='math' style='font-size: 1.2em;'>$$ \\mathrm{Fe_2O_3 + 2Al \\rightarrow 2Fe + Al_2O_3} $$</div></div>Les produits formés sont le fer (Fe) et l'oxyde d'aluminium (Al₂O₃).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Justifiez que l'aluminothermie est une réaction d'oxydoréduction. Identifiez l'oxydant et le réducteur. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>C'est une réaction d'oxydoréduction car il y a un transfert d'électrons entre l'aluminium et le fer. On peut décomposer la réaction en deux demi-équations :<br>- <strong>Réduction</strong> de l'oxyde de fer : \( \\mathrm{Fe_2O_3 + 6e^- \\rightarrow 2Fe + 3O^{2-}} \). L'oxyde de fer est l'oxydant.<br>- <strong>Oxydation</strong> de l'aluminium : \( \\mathrm{2Al + 3O^{2-} \\rightarrow Al_2O_3 + 6e^-} \). L'aluminium est le réducteur.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Application de la sidérurgie",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p>La sidérurgie est l'industrie de la production de la fonte et de l'acier. On s'intéresse ici à la réaction de réduction du minerai de fer dans un haut-fourneau.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Écrivez l'équation bilan de la réduction de l'oxyde de fer (III) par le monoxyde de carbone. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'équation est : <div class='math-block' style='background-color: #f8f9fa; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center;'><div class='math' style='font-size: 1.2em;'>$$ \\mathrm{Fe_2O_3 + 3CO \\rightarrow 2Fe + 3CO_2} $$</div></div></div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Le minerai utilisé est l'hématite. Quelle est sa formule chimique ? (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'hématite a pour formule chimique Fe₂O₃.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Expliquez la différence entre la fonte et l'acier. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>La fonte est le produit obtenu directement dans le haut-fourneau. C'est un alliage de fer et de carbone dont la teneur en carbone est comprise entre 2 % et 4,3 %. L'acier est obtenu par affinage de la fonte, c'est-à-dire en éliminant le carbone en excès, pour obtenir un alliage avec une teneur en carbone inférieure à 2 %.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Expliquez le rôle du calcaire (CaCO₃) ajouté dans le haut-fourneau. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le calcaire se décompose dans le haut-fourneau en chaux (CaO) selon l'équation : CaCO₃ → CaO + CO₂. La chaux formée réagit avec la silice (SiO₂), qui est une impureté présente dans le minerai, pour former un silicate de calcium (CaSiO₃). Ce silicate, appelé scorie, est liquide et moins dense que la fonte, ce qui permet de le séparer facilement par décantation.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : L'aluminothermie en pratique",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p>L'aluminothermie est un procédé industriel important, notamment pour la soudure des rails.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Citez deux applications industrielles de l'aluminothermie. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Deux applications industrielles de l'aluminothermie sont :<br>- La soudure des rails de chemin de fer.<br>- La production de métaux purs comme le fer à partir de leurs oxydes, par exemple pour obtenir du vanadium ou du chrome.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Expliquez le principe de la soudure des rails par aluminothermie. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le principe consiste à placer un mélange d'oxyde de fer (thermite) et de poudre d'aluminium dans un creuset placé au-dessus des deux extrémités des rails à souder. On amorce la réaction exothermique qui produit du fer liquide à très haute température (jusqu'à 3500 °C). Ce fer liquide coule dans un moule placé autour des rails, fait fondre leurs extrémités et se solidifie, réalisant ainsi une soudure homogène et de très bonne qualité mécanique et électrique [citation:1][citation:4].</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Comment se nomme le mélange réactif utilisé dans cette soudure ? (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le mélange réactif est appelé thermite. Il est composé d'oxyde de fer (Fe₂O₃) et de poudre d'aluminium (Al) [citation:3].</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> L'utilisation de l'aluminium est-elle une méthode économique pour produire du fer à grande échelle ? Justifiez votre réponse. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Non, l'utilisation de l'aluminium n'est pas économiquement viable pour la production massive de fer. La production d'aluminium est elle-même très coûteuse en énergie. Dans la sidérurgie, on utilise préférentiellement le coke comme réducteur, car il est moins cher et plus accessible [citation:2]. L'aluminothermie est réservée à des applications où la qualité exceptionnelle du produit ou la spécificité du procédé (comme la soudure sur site) justifient son coût.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Synthèse - De l'oxydoréduction à l'industrie",
      "points": "8 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'><p>L'aluminothermie et la sidérurgie sont deux processus industriels qui exploitent les principes de l'oxydoréduction.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Dans les deux procédés (sidérurgie et aluminothermie), quel est le but de la réaction chimique ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le but est de réduire l'oxyde de fer pour obtenir du fer métallique. Dans la sidérurgie, on utilise le monoxyde de carbone, tandis que dans l'aluminothermie, on utilise l'aluminium.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Établissez les demi-équations électroniques pour la réaction d'aluminothermie (\( \\mathrm{Fe_2O_3 + 2Al \\rightarrow 2Fe + Al_2O_3} \)). (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>Les demi-équations sont :<br>- Réduction : \( \\mathrm{Fe_2O_3 + 6e^- \\rightarrow 2Fe + 3O^{2-}} \)<br>- Oxydation : \( \\mathrm{2Al + 3O^{2-} \\rightarrow Al_2O_3 + 6e^-} \)</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Établissez les demi-équations électroniques pour la réaction de réduction du minerai de fer (\( \\mathrm{Fe_2O_3 + 3CO \\rightarrow 2Fe + 3CO_2} \)). (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>Les demi-équations sont :<br>- Réduction : \( \\mathrm{Fe_2O_3 + 6e^- \\rightarrow 2Fe + 3O^{2-}} \)<br>- Oxydation : \( \\mathrm{3CO + 3O^{2-} \\rightarrow 3CO_2 + 6e^-} \) (Cette dernière peut être simplifiée en : \( \\mathrm{CO + O^{2-} \\rightarrow CO_2 + 2e^-} \)).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Comparez le rôle de l'aluminium et du monoxyde de carbone dans ces réactions. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Dans les deux réactions, l'aluminium et le monoxyde de carbone jouent le rôle de réducteurs. Ils cèdent des électrons, ce qui permet la réduction du fer contenu dans l'oxyde de fer (III). L'aluminium s'oxyde en Al₂O₃ et le CO s'oxyde en CO₂.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>5.</strong> Pourquoi l'aluminothermie est-elle utilisée pour la soudure des rails alors que la sidérurgie est la méthode de choix pour la production de masse ? (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>L'aluminothermie est utilisée pour la soudure des rails car c'est un procédé autonome qui ne nécessite pas de source d'énergie externe, et qui permet d'atteindre localement les très hautes températures nécessaires pour réaliser une soudure de qualité, en fusionnant parfaitement les extrémités des rails en acier [citation:1]. La réaction est déclenchée simplement et se déroule rapidement, ce qui est pratique sur un chantier.<br>La sidérurgie est privilégiée pour la production de masse car elle est beaucoup moins coûteuse : le coke est un réducteur bon marché et disponible en grande quantité, contrairement à l'aluminium qui est un métal coûteux à produire [citation:2]. La sidérurgie permet de traiter des quantités énormes de minerai de manière continue et économiquement viable.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
